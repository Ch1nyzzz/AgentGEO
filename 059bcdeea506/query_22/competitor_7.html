y the ability to virtually inspect and interactively customize the product presentation. We follow this notion and expect a positive impact of interactivity on enjoyment.</span></p><p data-dcnode-id="10512" id="p0165"><span data-dcnode-id="10528" instrument_node="">Further, online retailing research confirms that interactivity elicits hedonic values (</span><a class="workspace-trigger" data-dcnode-id="10526" href="#b0510" name="bb0510"><span data-dcnode-id="10527" instrument_node="">Yoo, Lee, &amp; Park, 2010</span></a><span data-dcnode-id="10525" instrument_node="">), which consist of pleasant feelings while using a product. We argue that the positive feelings that arise from using AR spread from the medium to the product and lead to more positive evaluations, specifically product liking. Product liking comprises an affective evaluation of a chosen product. Research has demonstrated that ownership imagery stimulates psychological ownership and positive product evaluations (</span><a class="workspace-trigger" data-dcnode-id="10523" href="#b0230" name="bb0230"><span data-dcnode-id="10524" instrument_node="">Kamleitner &amp; Feuchtl, 2015</span></a><span data-dcnode-id="10522" instrument_node="">). Moreover, the effect of ownership on evaluation is presumably even stronger when consumers can interact with virtual products. This interaction leads to greater familiarity with and more positive attitudes toward the product, thereby enhancing product liking.</span></p><section data-dcnode-id="10513"><p data-dcnode-id="10517" id="n0005"><strong data-dcnode-id="10518"><span data-dcnode-id="10521" instrument_node="">H1</span><sub data-dcnode-id="10519"><span data-dcnode-id="10520" instrument_node="">a–c</span></sub></strong></p><p data-dcnode-id="10514" id="p0170"><em data-dcnode-id="10515"><span data-dcnode-id="10516" instrument_node="">Interactivity positively affects a) immersion, b) enjoyment, and c) product liking.</span></em></p></section><p></p><p data-dcnode-id="10489"><span data-dcnode-id="10511" instrument_node="">In a virtual reality (VR) context, the quality of experience is composed of user experience and quality of service, of which the latter comprises factors such as response time, reliability, error, and latency (</span><a class="workspace-trigger" data-dcnode-id="10509" href="#b0165" name="bb0165"><span data-dcnode-id="10510" instrument_node="">Hamam, Eid, El Saddik, &amp; Georganas, 2008</span></a><span data-dcnode-id="10508" instrument_node="">). Since the ultimate quality of experience is total immersion, we argue that smoothly and reliably running AR product presentations are required to create a feeling of being absorbed and expect that system quality is a driver of immersion. Following research on innovative technologies (</span><a class="workspace-trigger" data-dcnode-id="10506" href="#b0495" name="bb0495"><span data-dcnode-id="10507" instrument_node="">Yang et al., 2016</span></a><span data-dcnode-id="10505" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10503" href="#b0270" name="bb0270"><span data-dcnode-id="10504" instrument_node="">Kowalczuk, 2018</span></a><span data-dcnode-id="10502" instrument_node="">), we posit that media usefulness is a cognitive response to system quality. Media usefulness encompasses the extent to which individuals believe that AR improves their shopping experience in terms of product search, evaluation, and choice quality through decreased time and effort. We assume that consumers perceive AR-based product presentations as more useful the more reliably, accurately, and fluently they are processed. Thus, we follow </span><a class="workspace-trigger" data-dcnode-id="10500" href="#b0240" name="bb0240"><span data-dcnode-id="10501" instrument_node="">Kim and Hyun (2016)</span></a><span data-dcnode-id="10499" instrument_node="">, who demonstrate that system, information, and service quality enhance media usefulness in an AR context.</span></p><section data-dcnode-id="10490"><p data-dcnode-id="10494" id="n0010"><strong data-dcnode-id="10495"><span data-dcnode-id="10498" instrument_node="">H2</span><sub data-dcnode-id="10496"><span data-dcnode-id="10497" instrument_node="">a,b</span></sub></strong></p><p data-dcnode-id="10491" id="p0180"><em data-dcnode-id="10492"><span data-dcnode-id="10493" instrument_node="">System quality positively affects a) immersion and b) media usefulness.</span></em></p></section><p></p><p data-dcnode-id="10462" id="p0175"><span data-dcnode-id="10488" instrument_node="">Mobile online touch points aim to provide consumers with purchase relevant information. Research has found that mobile AR apps are perceived as useful because of the information they provide (</span><a class="workspace-trigger" data-dcnode-id="10486" href="#b0165" name="bb0165"><span data-dcnode-id="10487" instrument_node="">Olsson, Lagerstam, Kärkkäinen, &amp; Väänänen-Vainio-Mattila, 2013</span></a><span data-dcnode-id="10485" instrument_node="">). Moreover, previous AR studies show that information quality (</span><a class="workspace-trigger" data-dcnode-id="10483" href="#b0495" name="bb0495"><span data-dcnode-id="10484" instrument_node="">Kim et al., 2016</span></a><span data-dcnode-id="10482" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10480" href="#b0270" name="bb0270"><span data-dcnode-id="10481" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10479" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10477" href="#b0240" name="bb0240"><span data-dcnode-id="10478" instrument_node="">Kim and Hyun, 2016</span></a><span data-dcnode-id="10476" instrument_node="">) and perceived informativeness (</span><a class="workspace-trigger" data-dcnode-id="10474" href="#b0405" name="bb0405"><span data-dcnode-id="10475" instrument_node="">Rese et al., 2014</span></a><span data-dcnode-id="10473" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10471" href="#b0400" name="bb0400"><span data-dcnode-id="10472" instrument_node="">Rese et al., 2017</span></a><span data-dcnode-id="10470" instrument_node="">) increase perceived usefulness. Hence, product informativeness is a driver of media usefulness.</span></p><section data-dcnode-id="10463"><p data-dcnode-id="10467" id="n0015"><strong data-dcnode-id="10468"><span data-dcnode-id="10469" instrument_node="">H3</span></strong></p><p data-dcnode-id="10464" id="p0190"><em data-dcnode-id="10465"><span data-dcnode-id="10466" instrument_node="">Product informativeness positively affects media usefulness.</span></em></p></section><p></p><p data-dcnode-id="10457"><span data-dcnode-id="10461" instrument_node="">The more realistic the product presentation, the better consumers can imagine and inspect the augmented product. This enhances their shopping experience, helps them save time and effort, and thus increases the usefulness of the medium. </span><a class="workspace-trigger" data-dcnode-id="10459" href="#b0505" name="bb0505"><span data-dcnode-id="10460" instrument_node="">Yim et al. (2017)</span></a><span data-dcnode-id="10458" instrument_node=""> identify vividness as an antecedent of media usefulness. Since vividness captures the graphical quality of the displayed products in terms of clearness, sharpness, definition, and level of detail, we suggest a positive impact of reality congruence on media usefulness.</span></p><p data-dcnode-id="10438" id="p0185"><a class="workspace-trigger" data-dcnode-id="10455" href="#b0325" name="bb0325"><span data-dcnode-id="10456" instrument_node="">Phillips, Olson, and Baumgartner (1995)</span></a><span data-dcnode-id="10454" instrument_node=""> state that consumption visions help consumers imagine the future consumption of and interaction with specific products, which in turn increases the confidence of having chosen the right product. Choice confidence “reflects the clarity with which the consumer understands his or her preferences and the extent to which those preferences are believed to be correct” (</span><a class="workspace-trigger" data-dcnode-id="10452" href="#b0265" name="bb0265"><span data-dcnode-id="10453" instrument_node="">Andrews, 2013, p. 751</span></a><span data-dcnode-id="10451" instrument_node="">). While consumption visions are assumed to be perceived mentally, with AR, consumers can not only mentally but also virtually try and experience products they do not yet own. Furthermore, </span><a class="workspace-trigger" data-dcnode-id="10449" href="#b0335" name="bb0335"><span data-dcnode-id="10450" instrument_node="">Poushneh (2018)</span></a><span data-dcnode-id="10448" instrument_node=""> argues that 3D product presentations can increase certainty while shopping online since they enable consumers to better evaluate the desired product. Hence, we propose a positive effect of reality congruence on choice confidence.</span></p><section data-dcnode-id="10439"><p data-dcnode-id="10443" id="n0020"><strong data-dcnode-id="10444"><span data-dcnode-id="10447" instrument_node="">H4</span><sub data-dcnode-id="10445"><span data-dcnode-id="10446" instrument_node="">a,b</span></sub></strong></p><p data-dcnode-id="10440" id="p0205"><em data-dcnode-id="10441"><span data-dcnode-id="10442" instrument_node="">Reality congruence positively affects a) media usefulness and b) choice confidence.</span></em></p></section><p></p></section><section data-dcnode-id="10315" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10431" id="st060"><span data-dcnode-id="10436" instrument_node="">3.3</span><span data-dcnode-id="10434" instrument_node="">. </span><span data-dcnode-id="10432" instrument_node="">Interplay of affective, cognitive, and behavioral responses</span></h3><p data-dcnode-id="10410" id="p0210"><span data-dcnode-id="10430" instrument_node="">Research assumes that individuals highly immersed in an activity do not necessarily perceive positive feelings during the flow experience, but do so afterward (e.g., </span><a class="workspace-trigger" data-dcnode-id="10428" href="#b0305" name="bb0305"><span data-dcnode-id="10429" instrument_node="">Mainemelis, 2001</span></a><span data-dcnode-id="10427" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10425" href="#b0310" name="bb0310"><span data-dcnode-id="10426" instrument_node="">Mainemelis and Dionysiou, 2015</span></a><span data-dcnode-id="10424" instrument_node="">). Following this notion, </span><a class="workspace-trigger" data-dcnode-id="10422" href="#b0105" name="bb0105"><span data-dcnode-id="10423" instrument_node="">Drengner et al. (2018)</span></a><span data-dcnode-id="10421" instrument_node=""> propose a process perspective of flow and expect enjoyment to be the outcome of an immersive state. In an AR context, </span><a class="workspace-trigger" data-dcnode-id="10419" href="#b0505" name="bb0505"><span data-dcnode-id="10420" instrument_node="">Yim et al. (2017)</span></a><span data-dcnode-id="10418" instrument_node=""> identify the positive influence of immersion on enjoyment. In line with earlier studies, we conclude that consumers using AR do not have positive feelings while being immersed, but do so afterward.</span></p><section data-dcnode-id="10411"><p data-dcnode-id="10415" id="n0025"><strong data-dcnode-id="10416"><span data-dcnode-id="10417" instrument_node="">H5</span></strong></p><p data-dcnode-id="10412" id="p0215"><em data-dcnode-id="10413"><span data-dcnode-id="10414" instrument_node="">Immersion positively affects enjoyment.</span></em></p></section><p></p><p data-dcnode-id="10386"><span data-dcnode-id="10409" instrument_node="">Prior research has identified enjoyment as a main driver of online retail shopping (</span><a class="workspace-trigger" data-dcnode-id="10407" href="#b0050" name="bb0050"><span data-dcnode-id="10408" instrument_node="">Childers, Carr, Peck, &amp; Carson, 2001</span></a><span data-dcnode-id="10406" instrument_node="">). In a VR context, </span><a class="workspace-trigger" data-dcnode-id="10404" href="#b0100" name="bb0100"><span data-dcnode-id="10405" instrument_node="">Domina, Lee, and MacGillivray (2012)</span></a><span data-dcnode-id="10403" instrument_node=""> find a significant positive effect of enjoyment on shopping intention. In addition, research indicates that enjoyment either directly (</span><a class="workspace-trigger" data-dcnode-id="10401" href="#b0455" name="bb0455"><span data-dcnode-id="10402" instrument_node="">Spreer &amp; Kallweit, 2014</span></a><span data-dcnode-id="10400" instrument_node="">) or indirectly through attitude toward use positively influences the intention to use AR (</span><a class="workspace-trigger" data-dcnode-id="10398" href="#b0335" name="bb0335"><span data-dcnode-id="10399" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10397" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10395" href="#b0505" name="bb0505"><span data-dcnode-id="10396" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10394" instrument_node="">). In line with this literature, we argue that enjoyment is an important factor for inducing reuse intentions as a behavioral response.</span></p><section data-dcnode-id="10387"><p data-dcnode-id="10391" id="n0030"><strong data-dcnode-id="10392"><span data-dcnode-id="10393" instrument_node="">H6</span></strong></p><p data-dcnode-id="10388" id="p0225"><em data-dcnode-id="10389"><span data-dcnode-id="10390" instrument_node="">Enjoyment positively affects reuse intention.</span></em></p></section><p></p><p data-dcnode-id="10366" id="p0220"><span data-dcnode-id="10385" instrument_node="">A further antecedent of reuse intention is media usefulness. Based on uses and gratification theory (</span><a class="workspace-trigger" data-dcnode-id="10383" href="#b0050" name="bb0050"><span data-dcnode-id="10384" instrument_node="">Katz, Blumler, &amp; Gurevitch, 1973</span></a><span data-dcnode-id="10382" instrument_node="">), </span><a class="workspace-trigger" data-dcnode-id="10380" href="#b0100" name="bb0100"><span data-dcnode-id="10381" instrument_node="">Rauschnabel (2018)</span></a><span data-dcnode-id="10379" instrument_node=""> identifies media usefulness as a cognitive gratification that elicits media usage intentions. Furthermore, in the AR literature, empirical evidence indicates that media and perceived usefulness are major antecedents of use and reuse intentions (</span><a class="workspace-trigger" data-dcnode-id="10377" href="#b0455" name="bb0455"><span data-dcnode-id="10378" instrument_node="">Kim et al., 2016</span></a><span data-dcnode-id="10376" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10374" href="#b0335" name="bb0335"><span data-dcnode-id="10375" instrument_node="">Kim and Hyun, 2016</span></a><span data-dcnode-id="10373" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10371" href="#b0505" name="bb0505"><span data-dcnode-id="10372" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10370" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10368" href="#b0405" name="bb0405"><span data-dcnode-id="10369" instrument_node="">Rese et al., 2014</span></a><span data-dcnode-id="10367" instrument_node="">, 2017). Hence, we posit that media usefulness is an additional relevant factor influencing reuse intention.</span></p><p data-dcnode-id="10349"><span data-dcnode-id="10365" instrument_node="">Owing to the vast number of products available on the Internet, purchase decisions are becoming more complex. Since consumers also feel increasingly time pressured, online retailers face the challenge of providing their customers with appropriate (i.e., relevant yet not superfluous) product information on which consumers can base their purchase decisions (</span><a class="workspace-trigger" data-dcnode-id="10363" href="#b0020" name="bb0020"><span data-dcnode-id="10364" instrument_node="">Ariely, 2000</span></a><span data-dcnode-id="10362" instrument_node="">). Interactive media such as AR have the potential to solve this problem by allowing consumers to attain virtually generated information by themselves. Since AR thus helps save time and effort when evaluating a product and improves product search and choice quality, it is reasonable to conclude that AR constitutes a helpful decision aid. In line with </span><a class="workspace-trigger" data-dcnode-id="10360" href="#b0320" name="bb0320"><span data-dcnode-id="10361" instrument_node="">Oh, Yoon, and Shyu (2008)</span></a><span data-dcnode-id="10359" instrument_node="">, who state that interactive decision aids lead to higher choice confidence, we expect a positive influence of media usefulness on choice confidence.</span></p><section data-dcnode-id="10350"><p data-dcnode-id="10354" id="n0035"><strong data-dcnode-id="10355"><span data-dcnode-id="10358" instrument_node="">H7</span><sub data-dcnode-id="10356"><span data-dcnode-id="10357" instrument_node="">a,b</span></sub></strong></p><p data-dcnode-id="10351" id="p0240"><em data-dcnode-id="10352"><span data-dcnode-id="10353" instrument_node="">Media usefulness positively affects a) reuse intention and b) choice confidence.</span></em></p></section><p></p><p data-dcnode-id="10338" id="p0230"><span data-dcnode-id="10348" instrument_node="">According to feelings-as-information theory (</span><a class="workspace-trigger" data-dcnode-id="10346" href="#b0235" name="bb0235"><span data-dcnode-id="10347" instrument_node="">Schwarz, 2012</span></a><span data-dcnode-id="10345" instrument_node="">), the initial affective reactions to an object can be cognitively appraised and they consequently determine the resulting beliefs. Thus, in line with the notion that choice confidence can result from internal processes, inferences, and intuition (</span><a class="workspace-trigger" data-dcnode-id="10343" href="#b0385" name="bb0385"><span data-dcnode-id="10344" instrument_node="">Andrews, 2013</span></a><span data-dcnode-id="10342" instrument_node="">), we argue that product liking leads to affect-consistent beliefs (</span><a class="workspace-trigger" data-dcnode-id="10340" href="#b0265" name="bb0265"><span data-dcnode-id="10341" instrument_node="">Verhagen &amp; Bloemers, 2018</span></a><span data-dcnode-id="10339" instrument_node="">) and thus enhances choice confidence.</span></p><p data-dcnode-id="10316" id="p0235"><span data-dcnode-id="10337" instrument_node="">Furthermore, decision aids decrease the cognitive effort required to make decisions and simultaneously increase decision confidence (</span><a class="workspace-trigger" data-dcnode-id="10335" href="#b0020" name="bb0020"><span data-dcnode-id="10336" instrument_node="">Sismeiro &amp; Bucklin, 2004</span></a><span data-dcnode-id="10334" instrument_node="">). In contrast to web-based product presentations, VR enables consumers to better imagine and evaluate how products will look in reality (</span><a class="workspace-trigger" data-dcnode-id="10332" href="#b0320" name="bb0320"><span data-dcnode-id="10333" instrument_node="">Oh et al., 2008</span></a><span data-dcnode-id="10331" instrument_node="">). Since AR further increases imagination by augmenting the product into the real world, we conclude that consumers are even more confident about their chosen product and their final purchase decision.</span></p><section data-dcnode-id="10324"><p data-dcnode-id="10328" id="n0040"><strong data-dcnode-id="10329"><span data-dcnode-id="10330" instrument_node="">H8</span></strong></p><p data-dcnode-id="10325" id="p0255"><em data-dcnode-id="10326"><span data-dcnode-id="10327" instrument_node="">Product liking positively affects choice confidence.</span></em></p></section><section data-dcnode-id="10317"><p data-dcnode-id="10321" id="n0045"><strong data-dcnode-id="10322"><span data-dcnode-id="10323" instrument_node="">H9</span></strong></p><p data-dcnode-id="10318" id="p0260"><em data-dcnode-id="10319"><span data-dcnode-id="10320" instrument_node="">Choice confidence positively affects purchase intention.</span></em></p></section><p></p></section><section data-dcnode-id="10234" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10309" id="st065"><span data-dcnode-id="10314" instrument_node="">3.4</span><span data-dcnode-id="10312" instrument_node="">. </span><span data-dcnode-id="10310" instrument_node="">Mediating effects</span></h3><p data-dcnode-id="10235" id="p0265"><span data-dcnode-id="10308" instrument_node="">As noted earlier, AR characteristics are assumed to elicit affective and cognitive consumer responses, which in turn affect the relevant behavioral responses. Thus, in the suggested model, the affective responses of immersion, enjoyment, and product liking and the cognitive responses of media usefulness and choice confidence are placed between the AR characteristics and dependent variables. Hence, AR characteristics influence reuse and purchase intention through the affective and cognitive mechanisms in the proposed model, resulting in the following mediations:</span></p><section data-dcnode-id="10299"><p data-dcnode-id="10303" id="n0050"><strong data-dcnode-id="10304"><span data-dcnode-id="10307" instrument_node="">H10</span><sub data-dcnode-id="10305"><span data-dcnode-id="10306" instrument_node="">a,b</span></sub></strong></p><p data-dcnode-id="10300" id="p0270"><em data-dcnode-id="10301"><span data-dcnode-id="10302" instrument_node="">The effect of interactivity on reuse intention is mediated by a) immersion and enjoyment and b) enjoyment.</span></em></p></section><section data-dcnode-id="10290"><p data-dcnode-id="10294" id="n0055"><strong data-dcnode-id="10295"><span data-dcnode-id="10298" instrument_node="">H10</span><sub data-dcnode-id="10296"><span data-dcnode-id="10297" instrument_node="">c</span></sub></strong></p><p data-dcnode-id="10291" id="p0275"><em data-dcnode-id="10292"><span data-dcnode-id="10293" instrument_node="">The effect of interactivity on purchase intention is mediated by product liking and choice confidence.</span></em></p></section><section data-dcnode-id="10281"><p data-dcnode-id="10285" id="n0060"><strong data-dcnode-id="10286"><span data-dcnode-id="10289" instrument_node="">H11</span><sub data-dcnode-id="10287"><span data-dcnode-id="10288" instrument_node="">a,b</span></sub></strong></p><p data-dcnode-id="10282" id="p0280"><em data-dcnode-id="10283"><span data-dcnode-id="10284" instrument_node="">The effect of system quality on reuse intention is mediated by a) immersion and enjoyment and b) media usefulness.</span></em></p></section><section data-dcnode-id="10272"><p data-dcnode-id="10276" id="n0065"><strong data-dcnode-id="10277"><span data-dcnode-id="10280" instrument_node="">H11</span><sub data-dcnode-id="10278"><span data-dcnode-id="10279" instrument_node="">c</span></sub></strong></p><p data-dcnode-id="10273" id="p0285"><em data-dcnode-id="10274"><span data-dcnode-id="10275" instrument_node="">The effect of system quality on purchase intention is mediated by media usefulness and choice confidence.</span></em></p></section><section data-dcnode-id="10263"><p data-dcnode-id="10267" id="n0070"><strong data-dcnode-id="10268"><span data-dcnode-id="10271" instrument_node="">H12</span><sub data-dcnode-id="10269"><span data-dcnode-id="10270" instrument_node="">a</span></sub></strong></p><p data-dcnode-id="10264" id="p0290"><em data-dcnode-id="10265"><span data-dcnode-id="10266" instrument_node="">The effect of product informativeness on reuse intention is mediated by media usefulness.</span></em></p></section><section data-dcnode-id="10254"><p data-dcnode-id="10258" id="n0075"><strong data-dcnode-id="10259"><span data-dcnode-id="10262" instrument_node="">H12</span><sub data-dcnode-id="10260"><span data-dcnode-id="10261" instrument_node="">b</span></sub></strong></p><p data-dcnode-id="10255" id="p0295"><em data-dcnode-id="10256"><span data-dcnode-id="10257" instrument_node="">The effect of product informativeness on purchase intention is mediated by media usefulness and choice confidence.</span></em></p></section><section data-dcnode-id="10245"><p data-dcnode-id="10249" id="n0080"><strong data-dcnode-id="10250"><span data-dcnode-id="10253" instrument_node="">H13</span><sub data-dcnode-id="10251"><span data-dcnode-id="10252" instrument_node="">a</span></sub></strong></p><p data-dcnode-id="10246" id="p0300"><em data-dcnode-id="10247"><span data-dcnode-id="10248" instrument_node="">The effect of reality congruence on reuse intention is mediated by media usefulness.</span></em></p></section><section data-dcnode-id="10236"><p data-dcnode-id="10240" id="n0085"><strong data-dcnode-id="10241"><span data-dcnode-id="10244" instrument_node="">H13</span><sub data-dcnode-id="10242"><span data-dcnode-id="10243" instrument_node="">b,c</span></sub></strong></p><p data-dcnode-id="10237" id="p0305"><em data-dcnode-id="10238"><span data-dcnode-id="10239" instrument_node="">The effect of reality congruence on purchase intention is mediated by b) media usefulness and choice confidence and c) choice confidence.</span></em></p></section><p></p></section><section data-dcnode-id="10210" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10228" id="st070"><span data-dcnode-id="10233" instrument_node="">3.5</span><span data-dcnode-id="10231" instrument_node="">. </span><span data-dcnode-id="10229" instrument_node="">Control variables</span></h3><p data-dcnode-id="10211" id="p0310"><span data-dcnode-id="10227" instrument_node="">Three control variables are integrated into the basic model to account for individual differences in age, sex, and previous media experience, defined as the degree of a user’s familiarity with AR (</span><a class="workspace-trigger" data-dcnode-id="10225" href="#b0505" name="bb0505"><span data-dcnode-id="10226" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10224" instrument_node="">). Controlling for previous media experience allows us to single out the variations in reuse intention that arise from distinct levels of knowledge about AR. Furthermore, previous research has shown that age and sex affect technology and media use (</span><a class="workspace-trigger" data-dcnode-id="10222" href="#b0065" name="bb0065"><span data-dcnode-id="10223" instrument_node="">Correa, Hinsley, &amp; De Zuniga, 2010</span></a><span data-dcnode-id="10221" instrument_node="">); these demographic variables are also commonly controlled for in related research fields (</span><a class="workspace-trigger" data-dcnode-id="10219" href="#b0060" name="bb0060"><span data-dcnode-id="10220" instrument_node="">Chuah et al., 2016</span></a><span data-dcnode-id="10218" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10216" href="#b0385" name="bb0385"><span data-dcnode-id="10217" instrument_node="">Rauschnabel, 2018</span></a><span data-dcnode-id="10215" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10213" href="#b0395" name="bb0395"><span data-dcnode-id="10214" instrument_node="">Rauschnabel et al., 2018</span></a><span data-dcnode-id="10212" instrument_node="">).</span></p></section></section><section data-dcnode-id="10137" id="s0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10203" id="st075"><span data-dcnode-id="10208" instrument_node="">4</span><span data-dcnode-id="10206" instrument_node="">. </span><span data-dcnode-id="10204" instrument_node="">Method</span></h2><section data-dcnode-id="10183" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10197" id="st080"><span data-dcnode-id="10202" instrument_node="">4.1</span><span data-dcnode-id="10200" instrument_node="">. </span><span data-dcnode-id="10198" instrument_node="">Data collection</span></h3><p data-dcnode-id="10195" id="p0315"><span data-dcnode-id="10196" instrument_node="">To test the proposed model, a laboratory experiment was conducted with 400 participants recruited at a German university in November and December 2018. Undergraduate students earned extra credits for a marketing course as an incentive for completing the study. In the first step, participants were asked to imagine that they have been hired at the university. They were assigned to one of two conditions and invited to select a desk chair in the price range of €149–250 either by using the IKEA Place AR app or by browsing the IKEA mobile website on their smartphones (Appendix A). In the second step, they completed an online questionnaire. At the beginning of the questionnaire, respondents were asked to indicate the name of the chosen chair to verify that they participated attentively in the experiment. Because of inappropriate responses to this question, two participants were excluded from the sample. Thus, N&nbsp;=&nbsp;398 participants (55.5% women) remained in the final data set, of which n&nbsp;=&nbsp;208 used the IKEA Place app and n&nbsp;=&nbsp;190 the IKEA mobile website. On average, participants were 25.58&nbsp;years old (SD&nbsp;=&nbsp;8.68) and indicated being rather experienced in using mobile AR apps (M&nbsp;=&nbsp;4.35, SD&nbsp;=&nbsp;2.31).</span></p><p data-dcnode-id="10184" id="p0320"><span data-dcnode-id="10194" instrument_node="">Studying new media and innovative technologies with students is an established procedure. In the AR context, research has successfully conducted controlled experiments with the IKEA Place app and students (</span><a class="workspace-trigger" data-dcnode-id="10192" href="#b0390" name="bb0390"><span data-dcnode-id="10193" instrument_node="">Rauschnabel et al., 2019</span></a><span data-dcnode-id="10191" instrument_node="">). Students are also often attracted to new technologies early (</span><a class="workspace-trigger" data-dcnode-id="10189" href="#b0385" name="bb0385"><span data-dcnode-id="10190" instrument_node="">Rauschnabel, 2018</span></a><span data-dcnode-id="10188" instrument_node="">), and a homogeneous sample increases internal validity, as it may rule out additional exogeneous variables (</span><a class="workspace-trigger" data-dcnode-id="10186" href="#b0060" name="bb0060"><span data-dcnode-id="10187" instrument_node="">Chuah et al., 2016</span></a><span data-dcnode-id="10185" instrument_node="">).</span></p></section><section data-dcnode-id="10138" id="s0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10177" id="st085"><span data-dcnode-id="10182" instrument_node="">4.2</span><span data-dcnode-id="10180" instrument_node="">. </span><span data-dcnode-id="10178" instrument_node="">Measures</span></h3><p data-dcnode-id="10139" id="p0325"><span data-dcnode-id="10176" instrument_node="">The measurement scales for product informativeness (</span><a class="workspace-trigger" data-dcnode-id="10174" href="#b0405" name="bb0405"><span data-dcnode-id="10175" instrument_node="">Rese et al., 2014</span></a><span data-dcnode-id="10173" instrument_node="">), media usefulness (</span><a class="workspace-trigger" data-dcnode-id="10171" href="#b0505" name="bb0505"><span data-dcnode-id="10172" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10170" instrument_node="">), immersion (</span><a class="workspace-trigger" data-dcnode-id="10168" href="#b0505" name="bb0505"><span data-dcnode-id="10169" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10167" instrument_node="">), interactivity (</span><a class="workspace-trigger" data-dcnode-id="10165" href="#b0335" name="bb0335"><span data-dcnode-id="10166" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10164" instrument_node="">), reuse (</span><a class="workspace-trigger" data-dcnode-id="10162" href="#b0240" name="bb0240"><span data-dcnode-id="10163" instrument_node="">Kim &amp; Hyun, 2016</span></a><span data-dcnode-id="10161" instrument_node="">), and purchase intention (</span><a class="workspace-trigger" data-dcnode-id="10159" href="#b0505" name="bb0505"><span data-dcnode-id="10160" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10158" instrument_node="">) were adopted from extant AR research. To capture reality congruence, a measure was developed based on the aesthetic quality items of </span><a class="workspace-trigger" data-dcnode-id="10156" href="#b0335" name="bb0335"><span data-dcnode-id="10157" instrument_node="">Pantano et al. (2017)</span></a><span data-dcnode-id="10155" instrument_node="">. Additionally, scales for choice confidence (</span><a class="workspace-trigger" data-dcnode-id="10153" href="#b0320" name="bb0320"><span data-dcnode-id="10154" instrument_node="">Oh et al., 2008</span></a><span data-dcnode-id="10152" instrument_node="">), product liking (</span><a class="workspace-trigger" data-dcnode-id="10150" href="#b0070" name="bb0070"><span data-dcnode-id="10151" instrument_node="">Cox &amp; Cox, 1988</span></a><span data-dcnode-id="10149" instrument_node="">), enjoyment (</span><a class="workspace-trigger" data-dcnode-id="10147" href="#b0480" name="bb0480"><span data-dcnode-id="10148" instrument_node="">Venkatesh &amp; Bala, 2008</span></a><span data-dcnode-id="10146" instrument_node="">), and system quality (</span><a class="workspace-trigger" data-dcnode-id="10144" href="#b0270" name="bb0270"><span data-dcnode-id="10145" instrument_node="">Kowalczuk, 2018</span></a><span data-dcnode-id="10143" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10141" href="#b0340" name="bb0340"><span data-dcnode-id="10142" instrument_node="">Park et al., 2015</span></a><span data-dcnode-id="10140" instrument_node="">) were included from studies of VR and innovative technologies. All the items were adapted to the AR and web contexts and measured on seven-point Likert or semantic differential scales.</span></p></section></section><section data-dcnode-id="7302" id="s0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10131" id="st090"><span data-dcnode-id="10136" instrument_node="">5</span><span data-dcnode-id="10134" instrument_node="">. </span><span data-dcnode-id="10132" instrument_node="">Empirical analysis and results</span></h2><section data-dcnode-id="8363" id="s0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10125" id="st095"><span data-dcnode-id="10130" instrument_node="">5.1</span><span data-dcnode-id="10128" instrument_node="">. </span><span data-dcnode-id="10126" instrument_node="">Measurement model assessment</span></h3><p data-dcnode-id="10114" id="p0330"><span data-dcnode-id="10124" instrument_node="">The proposed model was validated using partial least squares structural equation modeling (PLS-SEM), which focuses on maximizing the explained variance of the endogenous constructs (</span><a class="workspace-trigger" data-dcnode-id="10122" href="#b0175" name="bb0175"><span data-dcnode-id="10123" instrument_node="">Henseler, Ringle, &amp; Sarstedt, 2012</span></a><span data-dcnode-id="10121" instrument_node="">) and provides robust solutions even for complex models and nonnormally distributed data (</span><a class="workspace-trigger" data-dcnode-id="10119" href="#b0055" name="bb0055"><span data-dcnode-id="10120" instrument_node="">Chin and Newsted, 1999</span></a><span data-dcnode-id="10118" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10116" href="#b0175" name="bb0175"><span data-dcnode-id="10117" instrument_node="">Henseler et al., 2012</span></a><span data-dcnode-id="10115" instrument_node="">). SmartPLS 3.2.8 was used to assess the measurement and structural model separately for both conditions (web/app); to contrast the results, a multigroup analysis (MGA) was employed.</span></p><div data-dcnode-id="8762"><p data-dcnode-id="10102" id="p0335"><span data-dcnode-id="10113" instrument_node="">One item from each of the scales for ode-id="8360" instrument_node="">. </span><span data-dcnode-id="8358" instrument_node="">Descriptive statistics</span></h3><div data-dcnode-id="8119"><p data-dcnode-id="8352" id="p0345"><span data-dcnode-id="8356" instrument_node="">To investigate the differences between the two forms of product presentation, a nonparametric Mann–Whitney test was applied since a Shapiro–Wilk test indicated that all the variables were nonnormally distributed. Overall, the results in </span><a class="workspace-trigger" data-dcnode-id="8354" href="#t0025" name="bt0025"><span data-dcnode-id="8355" instrument_node="">Table 5</span></a><span data-dcnode-id="8353" instrument_node=""> imply that the characteristics of system quality and product informativeness, the cognitive response of media usefulness, and the behavioral response of reuse intention achieve significantly higher values in the web condition. On the contrary, the affective responses of immersion and enjoyment are significantly higher rated in the AR condition. Hence, in contrast to the initial assumption, the overall pattern shows that cognitive and behavioral responses are perceived as higher in the web condition and that only affective responses are perceived as higher in the AR condition.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="8120" id="t0025"><span class="captions" data-dcnode-id="8344"><span data-dcnode-id="8345" id="cn0035"><p data-dcnode-id="8346" id="sp0060"><span class="label" data-dcnode-id="8350"><span data-dcnode-id="8351" instrument_node="">Table 5</span></span><span data-dcnode-id="8349" instrument_node="">. </span><span data-dcnode-id="8347" instrument_node="">Results of the Mann–Whitney Test.</span></p></span></span><div class="groups" data-dcnode-id="8121"><table data-dcnode-id="8122"><thead data-dcnode-id="8319"><tr class="rowsep-1 valign-top" data-dcnode-id="8332"><th class="align-left" data-dcnode-id="8342" rowspan="2" scope="col"><span data-dcnode-id="8343" instrument ta-dcnode-id="8153"><span data-dcnode-id="8154" instrument_node="">4.68</span></td><td class="align-center" data-dcnode-id="8151"><span data-dcnode-id="8152" instrument_node="">1.66</span></td><td class="align-left" data-dcnode-id="8150"></td><td class="align-center" data-dcnode-id="8148"><span data-dcnode-id="8149" instrument_node="">5.21</span></td><td class="align-center" data-dcnode-id="8146"><span data-dcnode-id="8147" instrument_node="">1.53</span></td><td class="align-center" data-dcnode-id="8144"><span data-dcnode-id="8145" instrument_node="">0.001</span></td></tr><tr class="valign-top" data-dcnode-id="8127"><td class="align-left" data-dcnode-id="8139"><span data-dcnode-id="8142" instrument_node="">&nbsp;</span><span data-dcnode-id="8140" instrument_node="">Purchase Intention</span></td><td class="align-center" data-dcnode-id="8137"><span data-dcnode-id="8138" instrument_node="">4.32</span></td><td class="align-center" data-dcnode-id="8135"><span data-dcnode-id="8136" instrument_node="">1.71</span></td><td class="align-left" data-dcnode-id="8134"></td><td class="align-center" data-dcnode-id="8132"><span data-dcnode-id="8133" instrument_node="">4.41</span></td><td class="align-center" data-dcnode-id="8130"><span data-dcnode-id="8131" instrument_node="">1.76</span></td><td class="align-center" data-dcnode-id="8128"><span data-dcnode-id="8129" instrument_node="">0.495</span></td></tr><tr class="valign-top" data-dcnode-id="8124"><td class="align-left" colspan="7" data-dcnode-id="8125"><span data-dcnode-id="8126" instrument_node="">Note: Means were computed using the aggregate scale values.</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="7820" id="s0090"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8112" id="st105"><span data-dcnode-id="8117" instrument_node="">5.3</span><span data-dcnode-id="8115" instrument_node="">. </span><span data-dcnode-id="8113" instrument_node="">Structural model assessment</span></h3><div data-dcnode-id="8081"><p data-dcnode-id="8107" id="p0350"><span data-dcnode-id="8111" instrument_node="">The significances of the path coefficients in the proposed model were assessed separately for both conditions. </span><a class="workspace-trigger" data-dcnode-id="8109" href="#f0010" name="bf0010"><span data-dcnode-id="8110" instrument_node="">Fig. 2</span></a><span data-dcnode-id="8108" instrument_node=""> displays the parameter estimates.</span></p><figure class="figure text-xs" data-dcnode-id="8082" id="f0010"><span data-dcnode-id="8091"><img alt="" aria-describedby="cn0010" data-dcnode-id="8106" height="461" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-gr2.jpg&amp;raw"><span data-dcnode-id="8105" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8092"><li data-dcnode-id="8099"><a class="anchor download-link u-font-sans" data-dcnode-id="8100" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-gr2_lrg.jpg" target="_blank" title="Download high-res image (502KB)"><span class="anchor-text" data-dcnode-id="8101"><span data-dcnode-id="8104" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8102"><span data-dcnode-id="8103" instrument_node="">Download high-res image (502KB)</span></span></span></a></li><li data-dcnode-id="8093"><a class="anchor download-link u-font-sans" data-dcnode-id="8094" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8095"><span data-dcnode-id="8098" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8096"><span data-dcnode-id="8097" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8083"><span data-dcnode-id="8084" id="cn0010"><p data-dcnode-id="8085" id="sp0035"><span class="label" data-dcnode-id="8089"><span data-dcnode-id="8090" instrument_node="">Fig. 2</span></span><span data-dcnode-id="8088" instrument_node="">. </span><span data-dcnode-id="8086" instrument_node="">Model and Results.</span></p></span></span></figure></div><p data-dcnode-id="7897" id="p0355"><span data-dcnode-id="8080" instrument_node="">The results for the AR condition indicate that all hypotheses except for one (H3</span><sub data-dcnode-id="8078"><span data-dcnode-id="8079" instrument_node="">d</span></sub><span data-dcnode-id="8077" instrument_node="">) are corroborated and that the AR characteristics positively influence affective consumer responses. Interactivity has a significant effect on immersion (H1</span><sub data-dcnode-id="8075"><span data-dcnode-id="8076" instrument_node="">a</span></sub><span data-dcnode-id="8074" instrument_node="">; β</span><sub data-dcnode-id="8072"><span data-dcnode-id="8073" instrument_node="">H1a</span></sub><span data-dcnode-id="8071" instrument_node="">&nbsp;=&nbsp;0.242; p</span><span data-dcnode-id="8069" instrument_node="">&nbsp;</span><span data-dcnode-id="8067" instrument_node="">≤</span><span data-dcnode-id="8065" instrument_node="">&nbsp;</span><span data-dcnode-id="8063" instrument_node="">0.01), enjoyment (H1</span><sub data-dcnode-id="8061"><span data-dcnode-id="8062" instrument_node="">b</span></sub><span data-dcnode-id="8060" instrument_node="">; β</span><sub data-dcnode-id="8058"><span data-dcnode-id="8059" instrument_node="">H1b</span></sub><span data-dcnode-id="8057" instrument_node="">&nbsp;=&nbsp;0.494; p</span><span data-dcnode-id="8055" instrument_node="">&nbsp;</span><span data-dcnode-id="8053" instrument_node="">≤</span><span data-dcnode-id="8051" instrument_node="">&nbsp;</span><span data-dcnode-id="8049" instrument_node="">0.001), and product liking (H1</span><sub data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">c</span></sub><span data-dcnode-id="8046" instrument_node="">; β</span><sub data-dcnode-id="8044"><span data-dcnode-id="8045" instrument_node="">H1c</span></sub><span data-dcnode-id="8043" instrument_node="">&nbsp;=&nbsp;0.368; p</span><span data-dcnode-id="8041" instrument_node="">&nbsp;</span><span data-dcnode-id="8039" instrument_node="">≤</span><span data-dcnode-id="8037" instrument_node="">&nbsp;</span><span data-dcnode-id="8035" instrument_node="">0.001). The findings further show that system quality enhances immersion (H2</span><sub data-dcnode-id="8033"><span data-dcnode-id="8034" instrument_node="">a</span></sub><span data-dcnode-id="8032" instrument_node="">; β</span><sub data-dcnode-id="8030"><span data-dcnode-id="8031" instrument_node="">H2a</span></sub><span data-dcnode-id="8029" instrument_node="">&nbsp;=&nbsp;0.300; p</span><span data-dcnode-id="8027" instrument_node="">&nbsp;</span><span data-dcnode-id="8025" instrument_node="">≤</span><span data-dcnode-id="8023" instrument_node="">&nbsp;</span><span data-dcnode-id="8021" instrument_node="">0.001) and media usefulness (H2</span><sub data-dcnode-id="8019"><span data-dcnode-id="8020" instrument_node="">b</span></sub><span data-dcnode-id="8018" instrument_node="">; β</span><sub data-dcnode-id="8016"><span data-dcnode-id="8017" instrument_node="">H2b</span></sub><span data-dcnode-id="8015" instrument_node="">&nbsp;=&nbsp;0.365; p</span><span data-dcnode-id="8013" instrument_node="">&nbsp;</span><span data-dcnode-id="8011" instrument_node="">≤</span><span data-dcnode-id="8009" instrument_node="">&nbsp;</span><span data-dcnode-id="8007" instrument_node="">0.001). The AR characteristic of product informativeness significantly affects media usefulness (H3; β</span><sub data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">H3</span></sub><span data-dcnode-id="8004" instrument_node="">&nbsp;=&nbsp;0.355; p</span><span data-dcnode-id="8002" instrument_node="">&nbsp;</span><span data-dcnode-id="8000" instrument_node="">≤</span><span data-dcnode-id="7998" instrument_node="">&nbsp;</span><span data-dcnode-id="7996" instrument_node="">0.001). While the hypothesized relationship between reality congruence and media usefulness (H4</span><sub data-dcnode-id="7994"><span data-dcnode-id="7995" instrument_node="">a</span></sub><span data-dcnode-id="7993" instrument_node="">; β</span><sub data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">H4a</span></sub><span data-dcnode-id="7990" instrument_node="">&nbsp;=&nbsp;0.164; p</span><span data-dcnode-id="7988" instrument_node="">&nbsp;</span><span data-dcnode-id="7986" instrument_node="">≤</span><span data-dcnode-id="7984" instrument_node="">&nbsp;</span><span data-dcnode-id="7982" instrument_node="">0.01) turns out to be significant, the effect on choice confidence is not (H4</span><sub data-dcnode-id="7980"><span data-dcnode-id="7981" instrument_node="">b</span></sub><span data-dcnode-id="7979" instrument_node="">; β</span><sub data-dcnode-id="7977"><span data-dcnode-id="7978" instrument_node="">H4b</span></sub><span data-dcnode-id="7976" instrument_node="">&nbsp;=&nbsp;0.118; p&nbsp;=&nbsp;0.062). Concerning the interrelations of affective responses, the results imply that immersion exerts a significant effect on enjoyment (H5; β</span><sub data-dcnode-id="7974"><span data-dcnode-id="7975" instrument_node="">H5</span></sub><span data-dcnode-id="7973" instrument_node="">&nbsp;=&nbsp;0.338; p</span><span data-dcnode-id="7971" instrument_node="">&nbsp;</span><span data-dcnode-id="7969" instrument_node="">≤</span><span data-dcnode-id="7967" instrument_node="">&nbsp;</span><span data-dcnode-id="7965" instrument_node="">0.001). In terms of behavioral responses, enjoyment (H6; β</span><sub data-dcnode-id="7963"><span data-dcnode-id="7964" instrument_node="">H6</span></sub><span data-dcnode-id="7962" instrument_node="">&nbsp;=&nbsp;0.368; p</span><span data-dcnode-id="7960" instrument_node="">&nbsp;</span><span data-dcnode-id="7958" instrument_node="">≤</span><span data-dcnode-id="7956" instrument_node="">&nbsp;</span><span data-dcnode-id="7954" instrument_node="">0.001) and media usefulness (H7</span><sub data-dcnode-id="7952"><span data-dcnode-id="7953" instrument_node="">a</span></sub><span data-dcnode-id="7951" instrument_node="">; β</span><sub data-dcnode-id="7949"><span data-dcnode-id="7950" instrument_node="">H7a</span></sub><span data-dcnode-id="7948" instrument_node="">&nbsp;=&nbsp;0.346; p</span><span data-dcnode-id="7946" instrument_node="">&nbsp;</span><span data-dcnode-id="7944" instrument_node="">≤</span><span data-dcnode-id="7942" instrument_node="">&nbsp;</span><span data-dcnode-id="7940" instrument_node="">0.001) influence reuse intention. In addition, media usefulness (H7</span><sub data-dcnode-id="7938"><span data-dcnode-id="7939" instrument_node="">b</span></sub><span data-dcnode-id="7937" instrument_node="">; β</span><sub data-dcnode-id="7935"><span data-dcnode-id="7936" instrument_node="">H7b</span></sub><span data-dcnode-id="7934" instrument_node="">&nbsp;=&nbsp;0.167; p</span><span data-dcnode-id="7932" instrument_node="">&nbsp;</span><span data-dcnode-id="7930" instrument_node="">≤</span><span data-dcnode-id="7928" instrument_node="">&nbsp;</span><span data-dcnode-id="7926" instrument_node="">0.05) and product liking (H8; β</span><sub data-dcnode-id="7924"><span data-dcnode-id="7925" instrument_node="">H8</span></sub><span data-dcnode-id="7923" instrument_node="">&nbsp;=&nbsp;0.552; p</span><span data-dcnode-id="7921" instrument_node="">&nbsp;</span><span data-dcnode-id="7919" instrument_node="">≤</span><span data-dcnode-id="7917" instrument_node="">&nbsp;</span><span data-dcnode-id="7915" instrument_node="">0.001) significantly affect choice confidence, which is a strong predictor of the behavioral response of purchase intention (H9; β</span><sub data-dcnode-id="7911"><span data-dcnode-id="7914" instrument_node="">H9</span><span data-dcnode-id="7912" instrument_node="">&nbsp;</span></sub><span data-dcnode-id="7910" instrument_node="">=</span><span data-dcnode-id="7908" instrument_node="">&nbsp;</span><span data-dcnode-id="7906" instrument_node="">0.527; p</span><span data-dcnode-id="7904" instrument_node="">&nbsp;</span><span data-dcnode-id="7902" instrument_node="">≤</span><span data-dcnode-id="7900" instrument_node="">&nbsp;</span><span data-dcnode-id="7898" instrument_node="">0.001).</span></p><p data-dcnode-id="7837" id="p0360"><span data-dcnode-id="7896" instrument_node="">In the web condition, three divergent findings emerge. In contrast to the AR condition, no empirical support is found for the effects of system quality on immersion (H2</span><sub data-dcnode-id="7894"><span data-dcnode-id="7895" instrument_node="">a</span></sub><span data-dcnode-id="7893" instrument_node="">; β</span><sub data-dcnode-id="7889"><span data-dcnode-id="7892" instrument_node="">H2a</span><span data-dcnode-id="7890" instrument_node="">&nbsp;</span></sub><span data-dcnode-id="7888" instrument_node="">=</span><span data-dcnode-id="7886" instrument_node="">&nbsp;</span><span data-dcnode-id="7884" instrument_node="">0.068; p&nbsp;=&nbsp;0.344) and media usefulness on choice confidence (H7</span><sub data-dcnode-id="7882"><span data-dcnode-id="7883" instrument_node="">b</span></sub><span data-dcnode-id="7881" instrument_node="">; β</span><sub data-dcnode-id="7877"><span data-dcnode-id="7880" instrument_node="">H7b</span><span data-dcnode-id="7878" instrument_node="">&nbsp;</span></sub><span data-dcnode-id="7876" instrument_node="">=</span><span data-dcnode-id="7874" instrument_node="">&nbsp;</span><span data-dcnode-id="7872" instrument_node="">0.123; p&nbsp;=&nbsp;.061). The influence of reality congruence on choice confidence, however, turns out to be significant (H4</span><sub data-dcnode-id="7870"><span data-dcnode-id="7871" instrument_node="">b</span></sub><span data-dcnode-id="7869" instrument_node="">; β</span><sub data-dcnode-id="7867"><span data-dcnode-id="7868" instrument_node="">H4b</span></sub><span data-dcnode-id="7866" instrument_node="">&nbsp;=&nbsp;0.199; p</span><span data-dcnode-id="7864" instrument_node="">&nbsp;</span><span data-dcnode-id="7862" instrument_node="">≤</span><span data-dcnode-id="7860" instrument_node="">&nbsp;</span><span data-dcnode-id="7858" instrument_node="">0.01). While both models show an appropriate predictive power for all the dependent variables, more variance of reuse (R</span><sup data-dcnode-id="7856"><span data-dcnode-id="7857" instrument_node="">2</span></sup><sub data-dcnode-id="7854"><span data-dcnode-id="7855" instrument_node="">AR</span></sub><span data-dcnode-id="7853" instrument_node="">&nbsp;=&nbsp;0.44 vs. R</span><sup data-dcnode-id="7851"><span data-dcnode-id="7852" instrument_node="">2</span></sup><sub data-dcnode-id="7849"><span data-dcnode-id="7850" instrument_node="">web</span></sub><span data-dcnode-id="7848" instrument_node="">&nbsp;=&nbsp;0.27) and purchase intention (R</span><sup data-dcnode-id="7846"><span data-dcnode-id="7847" instrument_node="">2</span></sup><sub data-dcnode-id="7844"><span data-dcnode-id="7845" instrument_node="">AR</span></sub><span data-dcnode-id="7843" instrument_node="">&nbsp;=&nbsp;0.28 vs. R</span><sup data-dcnode-id="7841"><span data-dcnode-id="7842" instrument_node="">2</span></sup><sub data-dcnode-id="7839"><span data-dcnode-id="7840" instrument_node="">web</span></sub><span data-dcnode-id="7838" instrument_node="">&nbsp;=&nbsp;0.14) is explained in the AR than in the web condition.</span></p><p data-dcnode-id="7821" id="p0365"><span data-dcnode-id="7836" instrument_node="">To assess whether the observed differences between both groups are significant, an MGA was conducted. Specifically, the PLS-MGA approach was used, in line with the nonparametric nature of PLS-SEM. The bootstrap results (5,000 samples, no sign changes; two-tailed, p&nbsp;&lt;&nbsp;0.05) show that the effects of interactivity on enjoyment (H1</span><sub data-dcnode-id="7834"><span data-dcnode-id="7835" instrument_node="">b</span></sub><span data-dcnode-id="7833" instrument_node="">; β</span><sub data-dcnode-id="7829"><span data-dcnode-id="7832" instrument_node="">|AR-Web|</span><span data-dcnode-id="7830" instrument_node="">&nbsp;</span></sub><span data-dcnode-id="7828" instrument_node="">= 0.197; p&nbsp;=&nbsp;.02) and system quality on immersion (H2</span><sub data-dcnode-id="7826"><span data-dcnode-id="7827" instrument_node="">a</span></sub><span data-dcnode-id="7825" instrument_node="">; β</span><sub data-dcnode-id="7823"><span data-dcnode-id="7824" instrument_node="">|AR-Web|</span></sub><span data-dcnode-id="7822" instrument_node=""> = 0.232; p&nbsp;=&nbsp;.023) differ significantly between both conditions (Appendix B).</span></p></section><section data-dcnode-id="7371" id="s0095"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7814" id="st110"><span data-dcnode-id="7819" instrument_node="">5.4</span><span data-dcnode-id="7817" instrument_node="">. </span><span data-dcnode-id="7815" instrument_node="">Mediation tests</span></h3><div data-dcnode-id="7401"><p data-dcnode-id="7806" id="p0370"><span data-dcnode-id="7813" instrument_node="">As this study explores the mechanisms through which AR characteristics drive reuse and purchase intention, additional mediation tests were carried out. Building on the hypotheses that were significant in the overall analysis, several important mediation paths through the cognitive and affective responses for AR-based and web-based product presentations were identified. Testing these mediators provides deeper insights into the mechanisms through which AR characteristics influence behavioral consumer responses. In accordance with </span><a class="workspace-trigger" data-dcnode-id="7811" href="#b0375" name="bb0375"><span data-dcnode-id="7812" instrument_node="">Preacher and Hayes (2008)</span></a><span data-dcnode-id="7810" instrument_node="">, bootstrapping (5,000 samples) was employed to test the hypothesized mediations. </span><a class="workspace-trigger" data-dcnode-id="7808" href="#t0030" name="bt0030"><span data-dcnode-id="7809" instrument_node="">Table 6</span></a><span data-dcnode-id="7807" instrument_node=""> displays the results of the mediation analysis separately for both product presentation types.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7402" id="t0030"><span class="captions" data-dcnode-id="7798"><span data-dcnode-id="7799" id="cn0040"><p data-dcnode-id="7800" id="sp0065"><span class="label" data-dcnode-id="7804"><span data-dcnode-id="7805" instrument_node="">Table 6</span></span><span data-dcnode-id="7803" instrument_node="">. </span><span data-dcnode-id="7801" instrument_node="">Mediation Paths: The Impact of AR on Consumer Responses.</span></p></span></span><div class="groups" data-dcnode-id="7403"><table data-dcnode-id="7404"><thead data-dcnode-id="7752"><tr class="valign-top" data-dcnode-id="7783"><th class="align-left rowsep-1" data-dcnode-id="7796" rowspan="2" scope="col"><span data-dcnode-id="7797" instrument_node="">Paths</span></th><th class="align-center rowsep-1" colspan="4" data-dcnode-id="7794" scope="col"><span data-dcnode-id="7795" instrument_node="">IKEA Place AR app</span></th><td class="align-center rowsep-1" data-dcnode-id="7791" scope="col"><span class="screen-reader-only" data-dcnode-id="7792"><span data-dcnode-id="7793" instrument_node="">Empty Cell</span></span></td><th class="align-center rowsep-1" colspan="4" data-dcnode-id="7789" scope="col"><span data-dcnode-id="7790" instrument_node="">IKEA mobile website</span></th><td class="align-center" data-dcnode-id="7786" scope="col"><span class="screen-reader-only" data-dcnode-id="7787"><span data-dcnode-id="7788" instrument_node="">Empty Cell</span></span></td><th clas
