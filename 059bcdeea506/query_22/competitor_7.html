</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as010&quot;><p id=&quot;sp0010&quot;>This study explores the relative advantage of augmented reality (AR) over web-based product presentations. We develop a consumer response model and compare consumers’ reactions to the IKEA Place app and IKEA mobile website on smartphones. The results reveal that AR outperforms web-based product presentations by generating greater immersion and enjoyment, whereas the opposite is true for media usefulness. The findings further show that behavioral responses (reuse and purchase intention) are formed by affective (immersion, enjoyment, product liking) and cognitive (media usefulness, choice confidence) responses to the AR characteristics (interactivity, system quality, product informativeness, reality congruence). Since the reuse intentions of AR apps result from enjoyment and usefulness, retailers should improve system quality, product informativeness, and reality congruence to enhance media usefulness and interactivity to increase enjoyment. To achieve high purchase intentions, they should also increase interactivity, as it boosts product liking and in turn ensures confidence about the chosen products.</p></div></div></div>" data-dcnode-id="12426" lang="en" name="citation_abstract"><span data-dcnode-id="12425" instrument_node="">

nstrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="11784" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="11787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jbusres.2020.10.050" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="11788" instrument_node="">https://doi.org/10.1016/j.jbusres.2020.10.050</span></a><a class="rights-and-content" data-dcnode-id="11785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0148296320307220%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11786" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="11783"></section><section class="ReferencedArticles" data-dcnode-id="11782"></section><div class="PageDivider" data-dcnode-id="11781"></div><div class="Abstracts u-font-serif" data-dcnode-id="11748" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="11755" id="ab005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11779"><span data-dcnode-id="11780" instrument_node="">Highlights</span></h2><div data-dcnode-id="11756" id="as005"><p data-dcnode-id="11757" id="sp0005"></p><dl class="list" data-dcnode-id="11758"><dt class="list-label" data-dcnode-id="11777"><span data-dcnode-id="11778" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11774"><p data-dcnode-id="11775" id="p0030"><span data-dcnode-id="11776" instrument_node="">AR characteristics elicit affective, cognitive, and behavioral consumer responses.</span></p></dd><dt class="list-label" data-dcnode-id="11772"><span data-dcnode-id="11773" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11769"><p data-dcnode-id="11770" id="p0035"><span data-dcnode-id="11771" instrument_node="">AR causes higher affective but lower cognitive responses than web.</span></p></dd><dt class="list-label" data-dcnode-id="11767"><span data-dcnode-id="11768" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11764"><p data-dcnode-id="11765" id="p0040"><span data-dcnode-id="11766" instrument_node="">The greater media usefulness and enjoyment, the higher AR reuse intentions.</span></p></dd><dt class="list-label" data-dcnode-id="11762"><span data-dcnode-id="11763" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11759"><p data-dcnode-id="11760" id="p0045"><span data-dcnode-id="11761" instrument_node="">The greater choice confidence, the higher AR-induced purchase intentions.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="11749" id="ab010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11753"><span data-dcnode-id="11754" instrument_node="">Abstract</span></h2><div data-dcnode-id="11750" id="as010"><p data-dcnode-id="11751" id="sp0010"><span data-dcnode-id="11752" instrument_node="">This study explores the relative advantage of augmented reality (AR) over web-based product presentations. We develop a consumer response model and compare consumers’ reactions to the IKEA Place app and IKEA mobile website on smartphones. The results reveal that AR outperforms web-based product presentations by generating greater immersion and enjoyment, whereas the opposite is true for media usefulness. The findings further show that behavioral responses (reuse and purchase intention) are formed by affective (immersion, enjoyment, product liking) and cognitive (media usefulness, choice confidence) responses to the AR characteristics (interactivity, system quality, product informativeness, reality congruence). Since the reuse intentions of AR apps result from enjoyment and usefulness, retailers should improve system quality, product informativeness, and reality congruence to enhance media usefulness and interactivity to increase enjoyment. To achieve high purchase intentions, they should also increase interactivity, as it boosts product liking and in turn ensures confidence about the chosen products.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="11725" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="11737"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="11738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0148296320306834"><svg class="icon icon-navigate-left" data-dcnode-id="11746" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="11747"></path></svg><span class="button-alternative-text" data-dcnode-id="11739"><strong data-dcnode-id="11744"><span data-dcnode-id="11745" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="11742"><span data-dcnode-id="11743" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="11740"><span data-dcnode-id="11741" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="11726"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="11727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0148296320307839"><span class="button-alternative-text" data-dcnode-id="11730"><strong data-dcnode-id="11735"><span data-dcnode-id="11736" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="11733"><span data-dcnode-id="11734" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="11731"><span data-dcnode-id="11732" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="11728" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="11729"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="11703"><div class="keywords-section" data-dcnode-id="11704" id="kg005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11723"><span data-dcnode-id="11724" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="11720" id="k0005"><span data-dcnode-id="11721"><span data-dcnode-id="11722" instrument_node="">Augmented reality</span></span></div><div class="keyword" data-dcnode-id="11717" id="k0010"><span data-dcnode-id="11718"><span data-dcnode-id="11719" instrument_node="">AR marketing</span></span></div><div class="keyword" data-dcnode-id="11714" id="k0015"><span data-dcnode-id="11715"><span data-dcnode-id="11716" instrument_node="">Perceived reality congruence</span></span></div><div class="keyword" data-dcnode-id="11711" id="k0020"><span data-dcnode-id="11712"><span data-dcnode-id="11713" instrument_node="">Consumer response system</span></span></div><div class="keyword" data-dcnode-id="11708" id="k0025"><span data-dcnode-id="11709"><span data-dcnode-id="11710" instrument_node="">E-commerce</span></span></div><div class="keyword" data-dcnode-id="11705" id="k0030"><span data-dcnode-id="11706"><span data-dcnode-id="11707" instrument_node="">Product presentations</span></span></div></div></div><span data-dcnode-id="11702" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="6630" id="body"><div data-dcnode-id="7147"><section data-dcnode-id="11586" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11696" id="st020"><span data-dcnode-id="11701" instrument_node="">1</span><span data-dcnode-id="11699" instrument_node="">. </span><span data-dcnode-id="11697" instrument_node="">Introduction</span></h2><p data-dcnode-id="11673" id="p0050"><span data-dcnode-id="11695" instrument_node="">One of the central objectives in today’s retailing environments is the creation of superior customer experiences. To achieve effective online experiences, scholars have emphasized the importance of overcoming the physical separation between consumers and products through well-designed digitally enhanced product presentations (</span><a class="workspace-trigger" data-dcnode-id="11693" href="#b0040" name="bb0040"><span data-dcnode-id="11694" instrument_node="">Bleier, Harmeling, &amp; Palmatier, 2019</span></a><span data-dcnode-id="11692" instrument_node="">). Rapid advances in technology and the strong diffusion of mobile devices provide retailers with more options for presenting their products and increasing these experiences. Augmented reality (AR), an innovative tool that superimposes virtual objects (e.g., images, texts, and sounds) on the user’s real environment (</span><a class="workspace-trigger" data-dcnode-id="11690" href="#b0120" name="bb0120"><span data-dcnode-id="11691" instrument_node="">Faust et al., 2012</span></a><span data-dcnode-id="11689" instrument_node="">), has emerged as one of the most promising options in recent years. AR expands the “physical environment with computer-generated perceptual information, leveraging visual, auditory, haptic, somatosensory, and olfactory modalities” (</span><a class="workspace-trigger" data-dcnode-id="11687" href="#b0410" name="bb0410"><span data-dcnode-id="11688" instrument_node="">Roggeveen &amp; Sethuraman, 2018, p. 3</span></a><span data-dcnode-id="11686" instrument_node="">) and therefore adds a completely new experience that requires less imagination than even highly vivid web-based product presentations. By integrating AR-based product presentations into their e-commerce channels, retailers can increase customer value and create outstanding experiences across the touch points within the customer journey (</span><a class="workspace-trigger" data-dcnode-id="11684" href="#b0170" name="bb0170"><span data-dcnode-id="11685" instrument_node="">Heller et al., 2019</span></a><span data-dcnode-id="11683" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11681" href="#b0285" name="bb0285"><span data-dcnode-id="11682" instrument_node="">Lemon and Verhoef, 2016</span></a><span data-dcnode-id="11680" instrument_node="">). Among those retailers that have already explored the possibilities of AR are IKEA, Ray-Ban, and Sephora. While IKEA lets consumers place catalog items to give them a real-time scale view of the desired product at their homes, Ray-Ban and Sephora offer magic mirrors to provide consumers with a better impression of how the firms’ sunglasses or make-up will look on them. Underlining its huge potential, recent market research anticipates AR to reach a market size of $85 billion in 2025, of which $11.4 billion would account for AR in retailing (</span><a class="workspace-trigger" data-dcnode-id="11678" href="#b0435" name="bb0435"><span data-dcnode-id="11679" instrument_node="">Singh, 2019</span></a><span data-dcnode-id="11677" instrument_node="">). The expected 1.9 billion monthly active users by 2022 underpin that mobile AR applications, in particular, are becoming increasingly relevant (</span><a class="workspace-trigger" data-dcnode-id="11675" href="#b0470" name="bb0470"><span data-dcnode-id="11676" instrument_node="">Tractica, 2017</span></a><span data-dcnode-id="11674" instrument_node="">).</span></p><p data-dcnode-id="11668" id="p0055"><span data-dcnode-id="11672" instrument_node="">Considering the high investments associated with developing and introducing AR, a better understanding is needed of the relative advantage of AR-based product presentations over web-based ones on smartphones to guide retailers on whether it is worth investing in AR. For this reason, this study addresses the following two research questions: 1) What are the relevant characteristics of product presentations on smartphones and how do consumers cognitively, affectively, and behaviorally respond to these characteristics? 2) How do cognitive, affective, and behavioral consumer responses to AR-based and web-based product presentations on smartphones differ? To answer these questions, this study builds on the experiential hierarchy model (EHM; </span><a class="workspace-trigger" data-dcnode-id="11670" href="#b0200" name="bb0200"><span data-dcnode-id="11671" instrument_node="">Holbrook &amp; Hirschman, 1982</span></a><span data-dcnode-id="11669" instrument_node="">) to develop a model that explains through which mechanisms AR characteristics are processed before resulting in behavioral responses and compare the reactions to the IKEA Place app with those to the IKEA mobile website on smartphones.</span></p><p data-dcnode-id="11648" id="p0060"><span data-dcnode-id="11667" instrument_node="">This research contributes to the literature in several ways. First, despite the relevance and importance of AR for retailing, research examining the relative advantage of AR-based over web-based product presentations is scarce. Instead, the reactions to these product presentation types have been mostly considered in two separate research streams. In the first, scholars (e.g., </span><a class="workspace-trigger" data-dcnode-id="11665" href="#b0005" name="bb0005"><span data-dcnode-id="11666" instrument_node="">Algharabat et al., 2017</span></a><span data-dcnode-id="11664" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11662" href="#b0225" name="bb0225"><span data-dcnode-id="11663" instrument_node="">Jiang and Benbasat, 2007</span></a><span data-dcnode-id="11661" instrument_node="">) have exclusively focused on web-based product presentations by comparing presentations with more vivid, interactive, and three-dimensional content with traditional product presentations comprising static pictures and text descriptions (</span><a class="workspace-trigger" data-dcnode-id="11659" href="#b0490" name="bb0490"><span data-dcnode-id="11660" instrument_node="">Wang et al., 2019</span></a><span data-dcnode-id="11658" instrument_node="">). In the second stream of the literature, researchers have almost entirely focused on consumer reactions to AR (e.g., </span><a class="workspace-trigger" data-dcnode-id="11656" href="#b0445" name="bb0445"><span data-dcnode-id="11657" instrument_node="">Smink, Frowijn, van Reijmersdal, van Noort, &amp; Neijens, 2019</span></a><span data-dcnode-id="11655" instrument_node="">). In this branch, only </span><a class="workspace-trigger" data-dcnode-id="11653" href="#b0505" name="bb0505"><span data-dcnode-id="11654" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="11652" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11650" href="#b0500" name="bb0500"><span data-dcnode-id="11651" instrument_node="">Yim and Park, 2019</span></a><span data-dcnode-id="11649" instrument_node=""> systematically contrast AR-based with traditional web-based product presentations.</span></p><p data-dcnode-id="11628" id="p0065"><span data-dcnode-id="11647" instrument_node="">Second, while </span><a class="workspace-trigger" data-dcnode-id="11645" href="#b0505" name="bb0505"><span data-dcnode-id="11646" instrument_node="">Yim et al. (2017)</span></a><span data-dcnode-id="11644" instrument_node=""> focus on two functional mechanisms, namely, vividness and interactivity, this study additionally incorporates informativeness and system quality, which have been proven to be relevant for both AR-based product presentations (e.g., </span><a class="workspace-trigger" data-dcnode-id="11642" href="#b0240" name="bb0240"><span data-dcnode-id="11643" instrument_node="">Kim and Hyun, 2016</span></a><span data-dcnode-id="11641" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11639" href="#b0400" name="bb0400"><span data-dcnode-id="11640" instrument_node="">Rese et al., 2017</span></a><span data-dcnode-id="11638" instrument_node="">) and web-based product presentations (e.g., </span><a class="workspace-trigger" data-dcnode-id="11636" href="#b0040" name="bb0040"><span data-dcnode-id="11637" instrument_node="">Bleier et al., 2019</span></a><span data-dcnode-id="11635" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11633" href="#b0450" name="bb0450"><span data-dcnode-id="11634" instrument_node="">Sohn, 2017</span></a><span data-dcnode-id="11632" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11630" href="#b0490" name="bb0490"><span data-dcnode-id="11631" instrument_node="">Wang et al., 2019</span></a><span data-dcnode-id="11629" instrument_node="">). Beyond that, reality congruence is introduced as a new important factor capturing the extent to which the displayed product matches the real product.</span></p><p data-dcnode-id="11614" id="p0070"><span data-dcnode-id="11627" instrument_node="">Third, while the AR literature has focused on explaining either the purchase (e.g., </span><a class="workspace-trigger" data-dcnode-id="11625" href="#b0035" name="bb0035"><span data-dcnode-id="11626" instrument_node="">Beck &amp; Crié, 2018</span></a><span data-dcnode-id="11624" instrument_node="">) or use intention (e.g., </span><a class="workspace-trigger" data-dcnode-id="11622" href="#b0335" name="bb0335"><span data-dcnode-id="11623" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="11621" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11619" href="#b0400" name="bb0400"><span data-dcnode-id="11620" instrument_node="">Rese et al., 2017</span></a><span data-dcnode-id="11618" instrument_node="">), this study contributes to the body of knowledge by examining the interplay of the variables relevant for both and jointly considers them in one model. Hence, this research addresses the important issue that soon, AR will no longer be understood as a means of boosting brand engagement and awareness, but much more attention will be paid to the accountable effects of AR on reuse and purchase intentions as well as sales (</span><a class="workspace-trigger" data-dcnode-id="11616" href="#b0030" name="bb0030"><span data-dcnode-id="11617" instrument_node="">BCG, 2018</span></a><span data-dcnode-id="11615" instrument_node="">).</span></p><p data-dcnode-id="11603" id="p0075"><span data-dcnode-id="11613" instrument_node="">Fourth, in the AR literature, only </span><a class="workspace-trigger" data-dcnode-id="11611" href="#b0365" name="bb0365"><span data-dcnode-id="11612" instrument_node="">Poushneh and Vasquez-Parraga, 2017a</span></a><span data-dcnode-id="11610" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11608" href="#b0370" name="bb0370"><span data-dcnode-id="11609" instrument_node="">Poushneh and Vasquez-Parraga, 2017b</span></a><span data-dcnode-id="11607" instrument_node=""> explicitly consider the experiential nature of AR. They, however, do not investigate how experiences elicit behavioral consequences. By building on the EHM, this study further contributes to research by taking the information processing as well as experiential nature of product presentations into account. Furthermore, while </span><a class="workspace-trigger" data-dcnode-id="11605" href="#b0220" name="bb0220"><span data-dcnode-id="11606" instrument_node="">Javornik (2016)</span></a><span data-dcnode-id="11604" instrument_node=""> proposes that AR elicits affective, cognitive, and behavioral responses, the underlying mechanisms and their interrelations have been inadequately addressed in extant research. By positing that the input variables are processed by an intervening response system consisting of affective, cognitive, and behavioral responses, the EHM is appropriate for analyzing the reactions to the system characteristics of both AR-based and web-based product presentations.</span></p><p data-dcnode-id="11592" id="p0080"><span data-dcnode-id="11602" instrument_node="">Finally, prior studies (</span><a class="workspace-trigger" data-dcnode-id="11600" href="#b0505" name="bb0505"><span data-dcnode-id="11601" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="11599" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11597" href="#b0500" name="bb0500"><span data-dcnode-id="11598" instrument_node="">Yim and Park, 2019</span></a><span data-dcnode-id="11596" instrument_node="">) have investigated consumer reactions to AR and web-based product presentations on personal computers (PCs). Consumers, however, tend to shift from PCs to ubiquitously available mobile devices, especially smartphones, when shopping online. Since these devices are becoming increasingly powerful, they can perform even highly computation-intensive product presentations and thus provide easy and flexible access to the world of AR. Hence, research investigating the relative advantage of AR-based over web-based product presentations on smartphones is not only called for by scholars (</span><a class="workspace-trigger" data-dcnode-id="11594" href="#b0505" name="bb0505"><span data-dcnode-id="11595" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="11593" instrument_node="">), but also timely, necessary, and in line with consumers’ current online shopping habits.</span></p><p data-dcnode-id="11587" id="p0085"><span data-dcnode-id="11591" instrument_node="">The remainder of this paper is organized as follows. In the next section, the theoretical framework is outlined by integrating the EHM into the customer journey (</span><a class="workspace-trigger" data-dcnode-id="11589" href="#b0285" name="bb0285"><span data-dcnode-id="11590" instrument_node="">Lemon &amp; Verhoef, 2016</span></a><span data-dcnode-id="11588" instrument_node="">), and the existing literature on AR in retail settings is reviewed through the lens of the EHM. In Section 3, the proposed research model, which demonstrates how AR characteristics elicit cognitive, affective, and behavioral consumer responses, is presented. Section 4 outlines the research method, including the study design and data collection. Thereafter, in Section 5, we report the empirical data analysis conducted to test our proposed hypotheses and compare the results for AR-based and web-based product presentations. This paper concludes with a discussion of the findings, implications, as well as limitations and future research directions.</span></p></section><section data-dcnode-id="10614" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11580" id="st025"><span data-dcnode-id="11585" instrument_node="">2</span><span data-dcnode-id="11583" instrument_node="">. </span><span data-dcnode-id="11581" instrument_node="">Theoretical framework</span></h2><section data-dcnode-id="11044" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11574" id="st030"><span data-dcnode-id="11579" instrument_node="">2.1</span><span data-dcnode-id="11577" instrument_node="">. </span><span data-dcnode-id="11575" instrument_node="">AR-based experiences along the customer journey</span></h3><p data-dcnode-id="11548" id="p0090"><span data-dcnode-id="11573" instrument_node="">The customer decision journey is defined as “the process a customer goes through, across all stages and touch points, that makes up the customer experience” (</span><a class="workspace-trigger" data-dcnode-id="11571" href="#b0285" name="bb0285"><span data-dcnode-id="11572" instrument_node="">Lemon &amp; Verhoef, 2016, p. 71</span></a><span data-dcnode-id="11570" instrument_node="">). This journey is dynamic and iterative, and it extends across the pre-purchase, purchase, and post-purchase stages (</span><a class="workspace-trigger" data-dcnode-id="11568" href="#b0285" name="bb0285"><span data-dcnode-id="11569" instrument_node="">Lemon &amp; Verhoef, 2016</span></a><span data-dcnode-id="11567" instrument_node="">). Customers experience different touch points on this journey, among which this study focuses on the two most prominent brand- and partner-owned online touch points: mobile apps and browser-accessible mobile websites (</span><a class="workspace-trigger" data-dcnode-id="11565" href="#b0285" name="bb0285"><span data-dcnode-id="11566" instrument_node="">Lemon and Verhoef, 2016</span></a><span data-dcnode-id="11564" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11562" href="#b0450" name="bb0450"><span data-dcnode-id="11563" instrument_node="">Sohn, 2017</span></a><span data-dcnode-id="11561" instrument_node="">). Since both touch points allow customers to gather information about products before purchasing them, they are especially relevant for the pre-purchase stage that captures all customer experiences from the initial need recognition to the consideration of satisfying them through purchases (</span><a class="workspace-trigger" data-dcnode-id="11559" href="#b0285" name="bb0285"><span data-dcnode-id="11560" instrument_node="">Lemon &amp; Verhoef, 2016</span></a><span data-dcnode-id="11558" instrument_node="">). Along this journey, customers engage in the different marketing mix elements provided by the company. AR marketing, the use of AR for marketing purposes (</span><a class="workspace-trigger" data-dcnode-id="11556" href="#b0390" name="bb0390"><span data-dcnode-id="11557" instrument_node="">Rauschnabel, Felix, &amp; Hinsch, 2019</span></a><span data-dcnode-id="11555" instrument_node="">), provides companies with new opportunities to embellish the classic marketing mix variables of product, price, place, and promotion (</span><a class="workspace-trigger" data-dcnode-id="11553" href="#b0110" name="bb0110"><span data-dcnode-id="11554" instrument_node="">Dwivedi et al., 2020</span></a><span data-dcnode-id="11552" instrument_node="">). In a B2C context, for example, this means that retailers can use AR to extend existing or create new offerings (“product”), to leverage their e-commerce activities (“place”), and to draw potential customers’ attention to their brands and products (“promotion”). While the pricing of AR-based content will become increasingly important for retailers in the future (“price”), AR is currently used as a communication tool in e-commerce that has the ability to generate benefits in the pre-purchase and purchase stages of the customer journey (</span><a class="workspace-trigger" data-dcnode-id="11550" href="#b0390" name="bb0390"><span data-dcnode-id="11551" instrument_node="">Rauschnabel et al., 2019</span></a><span data-dcnode-id="11549" instrument_node="">).</span></p><p data-dcnode-id="11531" id="p0095"><span data-dcnode-id="11547" instrument_node="">Since consumers increasingly long for experiences in the marketplace (</span><a class="workspace-trigger" data-dcnode-id="11545" href="#b0350" name="bb0350"><span data-dcnode-id="11546" instrument_node="">Pelletier &amp; Collier, 2018</span></a><span data-dcnode-id="11544" instrument_node="">), this research builds on the EHM (</span><a class="workspace-trigger" data-dcnode-id="11542" href="#b0200" name="bb0200"><span data-dcnode-id="11543" instrument_node="">Holbrook &amp; Hirschman, 1982</span></a><span data-dcnode-id="11541" instrument_node="">) to identify and understand consumer responses to mobile AR-based and web-based product presentations. In line with traditional hierarchy models (</span><a class="workspace-trigger" data-dcnode-id="11539" href="#b0275" name="bb0275"><span data-dcnode-id="11540" instrument_node="">Lavidge &amp; Steiner, 1961</span></a><span data-dcnode-id="11538" instrument_node="">), the EHM posits that environmental or consumer inputs are processed by an intervening response system (</span><a class="workspace-trigger" data-dcnode-id="11536" href="#b0200" name="bb0200"><span data-dcnode-id="11537" instrument_node="">Holbrook &amp; Hirschman, 1982</span></a><span data-dcnode-id="11535" instrument_node="">). In the EHM, these input variables elicit affective, cognitive, and behavioral responses, leading to output consequences such as real usage and purchase. In contrast to earlier consumer response models, </span><a class="workspace-trigger" data-dcnode-id="11533" href="#b0200" name="bb0200"><span data-dcnode-id="11534" instrument_node="">Holbrook and Hirschman (1982)</span></a><span data-dcnode-id="11532" instrument_node=""> propose that consumers derive value from consumption experiences rather than the good or service itself. From this experience-oriented perspective, they regard consumer responses on the customer journey as being of an information processing or experiential nature. Thus, the EHM and customer journey framework perfectly complement each other.</span></p><div data-dcnode-id="11045"><p data-dcnode-id="11526" id="p0100"><span data-dcnode-id="11530" instrument_node="">We review the literature on AR in retail settings (</span><a class="workspace-trigger" data-dcnode-id="11528" href="#t0005" name="bt0005"><span data-dcnode-id="11529" instrument_node="">Table 1</span></a><span data-dcnode-id="11527" instrument_node="">) to identify the most relevant AR characteristics and show the extent to which they also apply to web-based product presentations. Furthermore, we discuss consumer responses to these characteristics through the lens of the EHM.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="11046" id="t0005"><span class="captions" data-dcnode-id="11518"><span data-dcnode-id="11519" id="cn0015"><p data-dcnode-id="11520" id="sp0040"><span class="label" data-dcnode-id="11524"><span data-dcnode-id="11525" instrument_node="">Table 1</span></span><span data-dcnode-id="11523" instrument_node="">. </span><span data-dcnode-id="11521" instrument_node="">Prior Research on AR in Retailing.</span></p></span></span><div class="groups" data-dcnode-id="11047"><table data-dcnode-id="11048"><thead data-dcnode-id="11502"><tr class="rowsep-1 valign-top" data-dcnode-id="11503"><th class="align-left" data-dcnode-id="11516" scope="col"><span data-dcnode-id="11517" instrument_node="">Study</span></th><th class="align-left" data-dcnode-id="11514" scope="col"><span data-dcnode-id="11515" instrument_node="">Technology, product, device</span></th><th class="align-left" data-dcnode-id="11512" scope="col"><span data-dcnode-id="11513" instrument_node="">AR characteristics</span></th><th class="align-left" data-dcnode-id="11510" scope="col"><span data-dcnode-id="11511" instrument_node="">Affective responses</span></th><th class="align-left" data-dcnode-id="11508" scope="col"><span data-dcnode-id="11509" instrument_node="">Cognitive responses</span></th><th class="align-left" data-dcnode-id="11506" scope="col"><span data-dcnode-id="11507" instrument_node="">Behavioral responses</span></th><th class="align-left" data-dcnode-id="11504" scope="col"><span data-dcnode-id="11505" instrument_node="">Individual factors</span></th></tr></thead><tbody data-dcnode-id="11049"><tr class="valign-top" data-dcnode-id="11488"><td class="align-left" data-dcnode-id="11499"><a class="workspace-trigger" data-dcnode-id="11500" href="#b0245" name="bb0245"><span data-dcnode-id="11501" instrument_node="">Kim and Forsythe (2007)</span></a></td><td class="align-left" data-dcnode-id="11497"><span data-dcnode-id="11498" instrument_node="">3D vs. virtual try-on, apparel, PC</span></td><td class="align-left" data-dcnode-id="11496"></td><td class="align-left" data-dcnode-id="11494"><span data-dcnode-id="11495" instrument_node="">Entertainment value, attitude toward using</span></td><td class="align-left" data-dcnode-id="11492"><span data-dcnode-id="11493" instrument_node="">Usefulness, ease of use</span></td><td class="align-left" data-dcnode-id="11490" d="11075"><a class="workspace-trigger" data-dcnode-id="11076" href="#b0500" name="bb0500"><span data-dcnode-id="11077" instrument_node="">Yim and Park (2019)</span></a></td><td class="align-left" data-dcnode-id="11073"><span data-dcnode-id="11074" instrument_node="">AR vs. Web, sunglasses, PC</span></td><td class="align-left" data-dcnode-id="11072"></td><td class="align-left" data-dcnode-id="11070"><span data-dcnode-id="11071" instrument_node="">Enjoyment, attitude toward technology</span></td><td class="align-left" data-dcnode-id="11068"><span data-dcnode-id="11069" instrument_node="">Usefulness</span></td><td class="align-left" data-dcnode-id="11066"><span data-dcnode-id="11067" instrument_node="">Adoption intention</span></td><td class="align-left" data-dcnode-id="11065"></td></tr><tr class="valign-top" data-dcnode-id="11050"><td class="align-left" data-dcnode-id="11062"><span data-dcnode-id="11063" instrument_node="">This study</span></td><td class="align-left" data-dcnode-id="11060"><span data-dcnode-id="11061" instrument_node="">AR app (IKEA Place) vs. mobile website (IKEA), furniture, own smartphone</span></td><td class="align-left" data-dcnode-id="11058"><span data-dcnode-id="11059" instrument_node="">System quality, reality congruence, interactivity, product informativeness</span></td><td class="align-left" data-dcnode-id="11056"><span data-dcnode-id="11057" instrument_node="">Enjoyment, immersion, product liking</span></td><td class="align-left" data-dcnode-id="11054"><span data-dcnode-id="11055" instrument_node="">Usefulness, choice confidence</span></td><td class="align-left" data-dcnode-id="11052"><span data-dcnode-id="11053" instrument_node="">Purchase intention, reuse intention</span></td><td class="align-left" data-dcnode-id="11051"></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="10714" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11038" id="st035"><span data-dcnode-id="11043" instrument_node="">2.2</span><span data-dcnode-id="11041" instrument_node="">. </span><span data-dcnode-id="11039" instrument_node="">AR characteristics</span></h3><div data-dcnode-id="10861"><p data-dcnode-id="11033" id="p0105"><span data-dcnode-id="11037" instrument_node="">As shown in </span><a class="workspace-trigger" data-dcnode-id="11035" href="#t0010" name="bt0010"><span data-dcnode-id="11036" instrument_node="">Table 2</span></a><span data-dcnode-id="11034" instrument_node="">, the extant literature has examined different, but partly overlapping, AR characteristics, which can be classified into five categories: variables that deal with the 1) interaction with virtual products, 2) processing quality, 3) information about displayed products, 4) quality of virtual product presentation, and 5) handling of personal information.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="10862" id="t0010"><span class="captions" data-dcnode-id="11025"><span data-dcnode-id="11026" id="cn0020"><p data-dcnode-id="11027" id="sp0045"><span class="label" data-dcnode-id="11031"><span data-dcnode-id="11032" instrument_node="">Table 2</span></span><span data-dcnode-id="11030" instrument_node="">. </span><span data-dcnode-id="11028" instrument_node="">Categorization of the Investigated AR Characteristics.</span></p></span></span><div class="groups" data-dcnode-id="10863"><table data-dcnode-id="10864"><thead data-dcnode-id="11015"><tr class="rowsep-1 valign-top" data-dcnode-id="11016"><th class="align-left" data-dcnode-id="11023" scope="col"><span data-dcnode-id="11024" instrument_node="">Category</span></th><th class="align-left" data-dcnode-id="11021" scope="col"><span data-dcnode-id="11022" instrument_node="">Definition</span></th><th class="align-left" data-dcnode-id="11019" scope="col"><span data-dcnode-id="11020" instrument_node="">Subsumed constructs</span></th><th class="align-left" data-dcnode-id="11017" scope="col"><span data-dcnode-id="11018" instrument_node="">Source</span></th></tr></thead><tbody data-dcnode-id="10865"><tr class="valign-top" data-dcnode-id="11005"><td class="align-left" data-dcnode-id="11013" rowspan="3"><span data-dcnode-id="11014" instrument_node="">1) Interaction with virtual products</span></td><td class="align-left" data-dcnode-id="11011" rowspan="3"><span data-dcnode-id="11012" instrument_node="">Captures all the constructs that address the extent to which the user can interact with the virtual product (e.g., position, rotate)</span></td><td class="align-left" data-dcnode-id="11009"><span data-dcnode-id="11010" instrument_node="">Control</span></td><td class="align-left" data-dcnode-id="11006"><a class="workspace-trigger" data-dcnode-id="11007" href="#b0220" name="bb0220"><span data-dcnode-id="11008" instrument_node="">Javornik (2016)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10999"><td class="align-left" data-dcnode-id="11003"><span data-dcnode-id="11004" instrument_node="">Simulated physical control</span></td><td class="align-left" data-dcnode-id="11000"><a class="workspace-trigger" data-dcnode-id="11001" href="#b0185" name="bb0185"><span data-dcnode-id="11002" instrument_node="">Hilken et al. (2017)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10990"><td class="align-left" data-dcnode-id="10997"><span data-dcnode-id="10998" instrument_node="">Interactivity</span></td><td class="align-left" data-dcnode-id="10991"><a class="workspace-trigger" data-dcnode-id="10995" href="#b0335" name="bb0335"><span data-dcnode-id="10996" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10994" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10992" href="#b0505" name="bb0505"><span data-dcnode-id="10993" instrument_node="">Yim et al., 2017</span></a></td></tr><tr class="valign-top" data-dcnode-id="10980"><td class="align-left" data-dcnode-id="10988" rowspan="3"><span data-dcnode-id="10989" instrument_node="">2) Processing quality</span></td><td class="align-left" data-dcnode-id="10986" rowspan="3"><span data-dcnode-id="10987" instrument_node="">Captures all the constructs that address how accurately, reliably, and promptly AR provides the requested services.</span></td><td class="align-left" data-dcnode-id="10984"><span data-dcnode-id="10985" instrument_node="">Responsiveness</span></td><td class="align-left" data-dcnode-id="10981"><a class="workspace-trigger" data-dcnode-id="10982" href="#b0220" name="bb0220"><span data-dcnode-id="10983" instrument_node="">Javornik (2016)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10974"><td class="align-left" data-dcnode-id="10978"><span data-dcnode-id="10979" instrument_node="">Response time</span></td><td class="align-left" data-dcnode-id="10975"><a class="workspace-trigger" data-dcnode-id="10976" href="#b0335" name="bb0335"><span data-dcnode-id="10977" instrument_node="">Pantano et al. (2017)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10968"><td class="align-left" data-dcnode-id="10972"><span data-dcnode-id="10973" instrument_node="">Service and system quality</span></td><td class="align-left" data-dcnode-id="10969"><a class="workspace-trigger" data-dcnode-id="10970" href="#b0240" name="bb0240"><span data-dcnode-id="10971" instrument_node="">Kim and Hyun (2016)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10958"><td class="align-left" data-dcnode-id="10966" rowspan="3"><span data-dcnode-id="10967" instrument_node="">3) Information about virtual products</span></td><td class="align-left" data-dcnode-id="10964" rowspan="3"><span data-dcnode-id="10965" instrument_node="">Captures all the constructs that address the quality and amount of information AR provides about the virtual products.</span></td><td class="align-left" data-dcnode-id="10962"><span data-dcnode-id="10963" instrument_node="">Quality of information</span></td><td class="align-left" data-dcnode-id="10959"><a class="workspace-trigger" data-dcnode-id="10960" href="#b0335" name="bb0335"><span data-dcnode-id="10961" instrument_node="">Pantano et al. (2017)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10952"><td class="align-left" data-dcnode-id="10956"><span data-dcnode-id="10957" instrument_node="">Information quality</span></td><td class="align-left" data-dcnode-id="10953"><a class="workspace-trigger" data-dcnode-id="10954" href="#b0240" name="bb0240"><span data-dcnode-id="10955" instrument_node="">Kim and Hyun (2016)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10940"><td class="align-left" data-dcnode-id="10950"><span data-dcnode-id="10951" instrument_node="">Informativeness</span></td><td class="align-left" data-dcnode-id="10941"><a class="workspace-trigger" data-dcnode-id="10948" href="#b0405" name="bb0405"><span data-dcnode-id="10949" instrument_node="">Rese et al., 2014</span></a><span data-dcnode-id="10947" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10945" href="#b0400" name="bb0400"><span data-dcnode-id="10946" instrument_node="">Rese et al., 2017</span></a><span data-dcnode-id="10944" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10942" href="#b0445" name="bb0445"><span data-dcnode-id="10943" instrument_node="">Smink et al., 2019</span></a></td></tr><tr class="valign-top" data-dcnode-id="10930"><td class="align-left" data-dcnode-id="10938" rowspan="7"><span data-dcnode-id="10939" instrument_node="">4) Quality of virtual product presentation</span></td><td class="align-left" data-dcnode-id="10936" rowspan="7"><span data-dcnode-id="10937" instrument_node="">Captures all the constructs that address the graphical visualization quality and environmental embedding of virtual products/objects.</span></td><td class="align-left" data-dcnode-id="10934"><span data-dcnode-id="10935" instrument_node="">Spatial presence</span></td><td class="align-left" data-dcnode-id="10931"><a class="workspace-trigger" data-dcnode-id="10932" href="#b0185" name="bb0185"><span data-dcnode-id="10933" instrument_node="">Hilken et al. (2017)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10924"><td class="align-left" data-dcnode-id="10928"><span data-dcnode-id="10929" instrument_node="">Environmental embedding</span></td><td class="align-left" data-dcnode-id="10925"><a class="workspace-trigger" data-dcnode-id="10926" href="#b0185" name="bb0185"><span data-dcnode-id="10927" instrument_node="">Hilken et al. (2017)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10918"><td class="align-left" data-dcnode-id="10922"><span data-dcnode-id="10923" instrument_node="">Vividness</span></td><td class="align-left" data-dcnode-id="10919"><a class="workspace-trigger" data-dcnode-id="10920" href="#b0505" name="bb0505"><span data-dcnode-id="10921" instrument_node="">Yim et al. (2017)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10912"><td class="align-left" data-dcnode-id="10916"><span data-dcnode-id="10917" instrument_node="">Aesthetics</span></td><td class="align-left" data-dcnode-id="10913"><a class="workspace-trigger" data-dcnode-id="10914" href="#b0205" name="bb0205"><span data-dcnode-id="10915" instrument_node="">Huang and Liao (2015)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10903"><td class="align-left" data-dcnode-id="10910"><span data-dcnode-id="10911" instrument_node="">Aesthetic quality</span></td><td class="align-left" data-dcnode-id="10904"><a class="workspace-trigger" data-dcnode-id="10908" href="#b0335" name="bb0335"><span data-dcnode-id="10909" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10907" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10905" href="#b0370" name="bb0370"><span data-dcnode-id="10906" instrument_node="">Poushneh and Vasquez-Parraga, 2017b</span></a></td></tr><tr class="valign-top" data-dcnode-id="10894"><td class="align-left" data-dcnode-id="10901"><span data-dcnode-id="10902" instrument_node="">Augmentation quality</span></td><td class="align-left" data-dcnode-id="10895"><a class="workspace-trigger" data-dcnode-id="10899" href="#b0360" name="bb0360"><span data-dcnode-id="10900" instrument_node="">Poushneh, 2018</span></a><span data-dcnode-id="10898" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10896" href="#b0390" name="bb0390"><span data-dcnode-id="10897" instrument_node="">Rauschnabel et al., 2019</span></a></td></tr><tr class="valign-top" data-dcnode-id="10888"><td class="align-left" data-dcnode-id="10892"><span data-dcnode-id="10893" instrument_node="">Augmentation</span></td><td class="align-left" data-dcnode-id="10889"><a class="workspace-trigger" data-dcnode-id="10890" href="#b0220" name="bb0220"><span data-dcnode-id="10891" instrument_node="">Javornik (2016)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10878"><td class="align-left" data-dcnode-id="10886" rowspan="3"><span data-dcnode-id="10887" instrument_node="">5) Handling of personal information</span></td><td class="align-left" data-dcnode-id="10884" rowspan="3"><span data-dcnode-id="10885" instrument_node="">Captures all the constructs that address the perception of data and security concerns when using AR.</span></td><td class="align-left" data-dcnode-id="10882"><span data-dcnode-id="10883" instrument_node="">Information privacy control</span></td><td class="align-left" data-dcnode-id="10879"><a class="workspace-trigger" data-dcnode-id="10880" href="#b0370" name="bb0370"><span data-dcnode-id="10881" instrument_node="">Poushneh and Vasquez-Parraga (2017b)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10872"><td class="align-left" data-dcnode-id="10876"><span data-dcnode-id="10877" instrument_node="">Control of access to personal information</span></td><td class="align-left" data-dcnode-id="10873"><a class="workspace-trigger" data-dcnode-id="10874" href="#b0360" name="bb0360"><span data-dcnode-id="10875" instrument_node="">Poushneh (2018)</span></a></td></tr><tr class="valign-top" data-dcnode-id="10866"><td class="align-left" data-dcnode-id="10870"><span data-dcnode-id="10871" instrument_node="">Intrusiveness</span></td><td class="align-left" data-dcnode-id="10867"><a class="workspace-trigger" data-dcnode-id="10868" href="#b0445" name="bb0445"><span data-dcnode-id="10869" instrument_node="">Smink et al. (2019)</span></a></td></tr></tbody></table></div></div></div><p data-dcnode-id="10827" id="p0110"><em data-dcnode-id="10859"><span data-dcnode-id="10860" instrument_node="">Interaction with virtual products</span></em><span data-dcnode-id="10858" instrument_node=""> encompasses control (</span><a class="workspace-trigger" data-dcnode-id="10856" href="#b0220" name="bb0220"><span data-dcnode-id="10857" instrument_node="">Javornik, 2016</span></a><span data-dcnode-id="10855" instrument_node="">), simulated physical control (</span><a class="workspace-trigger" data-dcnode-id="10853" href="#b0185" name="bb0185"><span data-dcnode-id="10854" instrument_node="">Hilken, de Ruyter, Chylinski, Mahr, &amp; Keeling, 2017</span></a><span data-dcnode-id="10852" instrument_node="">), and interactivity (</span><a class="workspace-trigger" data-dcnode-id="10850" href="#b0335" name="bb0335"><span data-dcnode-id="10851" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10849" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10847" href="#b0505" name="bb0505"><span data-dcnode-id="10848" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10846" instrument_node="">). Among these, interactivity, defined as the extent to which consumers can directly interact with virtual products (</span><a class="workspace-trigger" data-dcnode-id="10844" href="#b0460" name="bb0460"><span data-dcnode-id="10845" instrument_node="">Steuer, 1992</span></a><span data-dcnode-id="10843" instrument_node="">), constitutes a core characteristic of immersive experiences (e.g., </span><a class="workspace-trigger" data-dcnode-id="10841" href="#b0335" name="bb0335"><span data-dcnode-id="10842" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10840" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10838" href="#b0505" name="bb0505"><span data-dcnode-id="10839" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10837" instrument_node="">). In an AR context, interactivity reflects the degree to which consumers can position virtual products in their actual physical environment and use 360-degree rotation to inspect them thoroughly. In the web context, interactivity encompasses the visual inspection of product presentations with the help of interactive functions such as rotation, zoom, and enlargement (</span><a class="workspace-trigger" data-dcnode-id="10835" href="#b0005" name="bb0005"><span data-dcnode-id="10836" instrument_node="">Algharabat et al., 2017</span></a><span data-dcnode-id="10834" instrument_node="">). Although this interaction happens on the user’s screen and not in their physical environment, research also regards interactivity as one of the core factors of web-based product presentations (e.g., </span><a class="workspace-trigger" data-dcnode-id="10832" href="#b0125" name="bb0125"><span data-dcnode-id="10833" instrument_node="">Fiore et al., 2005</span></a><span data-dcnode-id="10831" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10829" href="#b0225" name="bb0225"><span data-dcnode-id="10830" instrument_node="">Jiang and Benbasat, 2007</span></a><span data-dcnode-id="10828" instrument_node="">).</span></p><p data-dcnode-id="10804" id="p0115"><span data-dcnode-id="10826" instrument_node="">The category </span><em data-dcnode-id="10824"><span data-dcnode-id="10825" instrument_node="">processing quality</span></em><span data-dcnode-id="10823" instrument_node=""> comprises responsiveness (</span><a class="workspace-trigger" data-dcnode-id="10821" href="#b0220" name="bb0220"><span data-dcnode-id="10822" instrument_node="">Javornik, 2016</span></a><span data-dcnode-id="10820" instrument_node="">), response time (</span><a class="workspace-trigger" data-dcnode-id="10818" href="#b0335" name="bb0335"><span data-dcnode-id="10819" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10817" instrument_node="">), and service and system quality (</span><a class="workspace-trigger" data-dcnode-id="10815" href="#b0240" name="bb0240"><span data-dcnode-id="10816" instrument_node="">Kim &amp; Hyun, 2016</span></a><span data-dcnode-id="10814" instrument_node="">). In a qualitative study, </span><a class="workspace-trigger" data-dcnode-id="10812" href="#b0465" name="bb0465"><span data-dcnode-id="10813" instrument_node="">tom Dieck and Jung (2018)</span></a><span data-dcnode-id="10811" instrument_node=""> prove the importance of the latter for the adoption of mobile AR technology in the tourism context. As system quality captures the system’s capacity to perform accurately and reliably in such a way that it provides the requested services at an adequate processing speed (</span><a class="workspace-trigger" data-dcnode-id="10809" href="#b0270" name="bb0270"><span data-dcnode-id="10810" instrument_node="">Kowalczuk, 2018</span></a><span data-dcnode-id="10808" instrument_node="">), it contains the relevant quality aspects already considered in the AR literature. In addition, in the context of web-based product presentations, </span><a class="workspace-trigger" data-dcnode-id="10806" href="#b0450" name="bb0450"><span data-dcnode-id="10807" instrument_node="">Sohn (2017)</span></a><span data-dcnode-id="10805" instrument_node=""> demonstrates the relevance of technical and functional quality for mobile online stores. Since a high degree of system quality is required to make both product presentations work, it is a crucial factor constituting the user experience.</span></p><p data-dcnode-id="10770" id="p0120"><em data-dcnode-id="10802"><span data-dcnode-id="10803" instrument_node="">Information about virtual products</span></em><span data-dcnode-id="10801" instrument_node=""> summarizes three similar factors: quality of information (</span><a class="workspace-trigger" data-dcnode-id="10799" href="#b0335" name="bb0335"><span data-dcnode-id="10800" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10798" instrument_node="">), information quality (</span><a class="workspace-trigger" data-dcnode-id="10796" href="#b0240" name="bb0240"><span data-dcnode-id="10797" instrument_node="">Kim &amp; Hyun, 2016</span></a><span data-dcnode-id="10795" instrument_node="">), and informativeness (</span><a class="workspace-trigger" data-dcnode-id="10793" href="#b0405" name="bb0405"><span data-dcnode-id="10794" instrument_node="">Rese et al., 2014</span></a><span data-dcnode-id="10792" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10790" href="#b0400" name="bb0400"><span data-dcnode-id="10791" instrument_node="">Rese et al., 2017</span></a><span data-dcnode-id="10789" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10787" href="#b0445" name="bb0445"><span data-dcnode-id="10788" instrument_node="">Smink et al., 2019</span></a><span data-dcnode-id="10786" instrument_node="">). Following </span><a class="workspace-trigger" data-dcnode-id="10784" href="#b0295" name="bb0295"><span data-dcnode-id="10785" instrument_node="">Lim and Ting, 2012</span></a><span data-dcnode-id="10783" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10781" href="#b0405" name="bb0405"><span data-dcnode-id="10782" instrument_node="">Rese et al., 2014</span></a><span data-dcnode-id="10780" instrument_node="">, product informativeness is defined as the degree to which mobile online touch points provide helpful product information for purchase decisions. In online purchases, consumers must typically ground their product choices on less information than for in-store shopping, where they can sensorially experience the offered products. While websites with interactive product presentations enable a virtual exploration of the good (</span><a class="workspace-trigger" data-dcnode-id="10778" href="#b0515" name="bb0515"><span data-dcnode-id="10779" instrument_node="">Yoon, Laffey, &amp; Oh, 2008</span></a><span data-dcnode-id="10777" instrument_node="">), </span><a class="workspace-trigger" data-dcnode-id="10775" href="#b0360" name="bb0360"><span data-dcnode-id="10776" instrument_node="">Poushneh, 2018</span></a><span data-dcnode-id="10774" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10772" href="#b0335" name="bb0335"><span data-dcnode-id="10773" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10771" instrument_node=""> argue that AR has the potential to compensate for this information deficit by simulating shopping experiences and allowing consumers to directly experience virtual products. Thus, while AR provides additional information by consolidating reality and virtuality, establishing highly informative product presentations is crucial in both contexts.</span></p><p data-dcnode-id="10732" id="p0125"><span data-dcnode-id="10769" instrument_node="">Further, AR research has shown that the following factors addressing the </span><em data-dcnode-id="10767"><span data-dcnode-id="10768" instrument_node="">quality of virtual product presentations</span></em><span data-dcnode-id="10766" instrument_node=""> are relevant for eliciting positive affective and cognitive consumer responses: spatial presence (</span><a class="workspace-trigger" data-dcnode-id="10764" href="#b0185" name="bb0185"><span data-dcnode-id="10765" instrument_node="">Hilken et al., 2017</span></a><span data-dcnode-id="10763" instrument_node="">), environmental embedding (</span><a class="workspace-trigger" data-dcnode-id="10761" href="#b0185" name="bb0185"><span data-dcnode-id="10762" instrument_node="">Hilken et al., 2017</span></a><span data-dcnode-id="10760" instrument_node="">), vividness (</span><a class="workspace-trigger" data-dcnode-id="10758" href="#b0505" name="bb0505"><span data-dcnode-id="10759" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10757" instrument_node="">), aesthetics (</span><a class="workspace-trigger" data-dcnode-id="10755" href="#b0205" name="bb0205"><span data-dcnode-id="10756" instrument_node="">Huang &amp; Liao, 2015</span></a><span data-dcnode-id="10754" instrument_node="">), aesthetic quality (</span><a class="workspace-trigger" data-dcnode-id="10752" href="#b0335" name="bb0335"><span data-dcnode-id="10753" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10751" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10749" href="#b0370" name="bb0370"><span data-dcnode-id="10750" instrument_node="">Poushneh and Vasquez-Parraga, 2017b</span></a><span data-dcnode-id="10748" instrument_node="">), augmentation quality (</span><a class="workspace-trigger" data-dcnode-id="10746" href="#b0360" name="bb0360"><span data-dcnode-id="10747" instrument_node="">Poushneh, 2018</span></a><span data-dcnode-id="10745" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10743" href="#b0390" name="bb0390"><span data-dcnode-id="10744" instrument_node="">Rauschnabel et al., 2019</span></a><span data-dcnode-id="10742" instrument_node="">), and augmentation (</span><a class="workspace-trigger" data-dcnode-id="10740" href="#b0220" name="bb0220"><span data-dcnode-id="10741" instrument_node="">Javornik, 2016</span></a><span data-dcnode-id="10739" instrument_node="">). While these aspects are mostly concerned with the graphical quality of the displayed products, we argue that not only the quality of the virtual product presentation but also the degree to which the consumer perceives that the augmented product matches the real product is important for eliciting positive consumer reactions. Therefore, this study introduces reality congruence, which beyond quality also comprises the fit between the virtual and real products. In web-based product presentations, 3D authenticity captures this fit between the real and displayed objects (</span><a class="workspace-trigger" data-dcnode-id="10737" href="#b0005" name="bb0005"><span data-dcnode-id="10738" instrument_node="">Algharabat et al., 2017</span></a><span data-dcnode-id="10736" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10734" href="#b0010" name="bb0010"><span data-dcnode-id="10735" instrument_node="">Algharabat and Dennis, 2010</span></a><span data-dcnode-id="10733" instrument_node="">). If the product presentations are of poor quality or the wrong size, pixelated, inaccurate, or unrealistic, they do not create value for the customer. For these reasons, reality congruence is important for eliciting positive consumer responses to both product presentation types.</span></p><p data-dcnode-id="10715" id="p0130"><span data-dcnode-id="10731" instrument_node="">The last category, </span><em data-dcnode-id="10729"><span data-dcnode-id="10730" instrument_node="">handling of personal information,</span></em><span data-dcnode-id="10728" instrument_node=""> covers information privacy control (</span><a class="workspace-trigger" data-dcnode-id="10726" href="#b0370" name="bb0370"><span data-dcnode-id="10727" instrument_node="">Poushneh &amp; Vasquez-Parraga, 2017b</span></a><span data-dcnode-id="10725" instrument_node="">), control of access to personal information (</span><a class="workspace-trigger" data-dcnode-id="10723" href="#b0360" name="bb0360"><span data-dcnode-id="10724" instrument_node="">Poushneh, 2018</span></a><span data-dcnode-id="10722" instrument_node="">), and intrusiveness (</span><a class="workspace-trigger" data-dcnode-id="10720" href="#b0445" name="bb0445"><span data-dcnode-id="10721" instrument_node="">Smink et al., 2019</span></a><span data-dcnode-id="10719" instrument_node="">). Research has shown that the use of smart glasses, which automatically and constantly screen the environment, could cause privacy concerns (</span><a class="workspace-trigger" data-dcnode-id="10717" href="#b0395" name="bb0395"><span data-dcnode-id="10718" instrument_node="">Rauschnabel, He, &amp; Ro, 2018</span></a><span data-dcnode-id="10716" instrument_node="">). However, since mobile AR applications, especially the IKEA Place app, require only time-limited camera access, are directed at the environment, and do not save the recorded content, the last category is less relevant in the context of this study.</span></p></section><section data-dcnode-id="10615" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10708" id="st040"><span data-dcnode-id="10713" instrument_node="">2.3</span><span data-dcnode-id="10711" instrument_node="">. </span><span data-dcnode-id="10709" instrument_node="">Consumer responses to AR characteristics</span></h3><p data-dcnode-id="10703" id="p0135"><span data-dcnode-id="10707" instrument_node="">The core of the EHM constitutes a comprehensive consumer response system, which consists of affective, cognitive, and behavioral responses. Each of these dimensions comprises a rational information processing and an experiential perspective considering more subconscious elements (</span><a class="workspace-trigger" data-dcnode-id="10705" href="#b0200" name="bb0200"><span data-dcnode-id="10706" instrument_node="">Holbrook &amp; Hirschman, 1982</span></a><span data-dcnode-id="10704" instrument_node="">).</span></p><p data-dcnode-id="10678" id="p0140"><em data-dcnode-id="10701"><span data-dcnode-id="10702" instrument_node="">Affective responses</span></em><span data-dcnode-id="10700" instrument_node="">. In the affective state, the information processing perspective centers on attitudes and preferences, while disregarding experiential hedonic responses. However, emotional reactions are especially key requirements for the application of the experiential perspective (</span><a class="workspace-trigger" data-dcnode-id="10698" href="#b0200" name="bb0200"><span data-dcnode-id="10699" instrument_node="">Holbrook &amp; Hirschman, 1982</span></a><span data-dcnode-id="10697" instrument_node="">). While, for example, </span><a class="workspace-trigger" data-dcnode-id="10695" href="#b0220" name="bb0220"><span data-dcnode-id="10696" instrument_node="">Javornik (2016)</span></a><span data-dcnode-id="10694" instrument_node=""> examines the attitude toward the brand/app as an affective construct, other researchers have acknowledged the importance of assessing experiential affective responses to AR. As shown in </span><a class="workspace-trigger" data-dcnode-id="10692" href="#t0005" name="bt0005"><span data-dcnode-id="10693" instrument_node="">Table 1</span></a><span data-dcnode-id="10691" instrument_node="">, they have considered enjoyment and immersion (</span><a class="workspace-trigger" data-dcnode-id="10689" href="#b0505" name="bb0505"><span data-dcnode-id="10690" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10688" instrument_node="">), flow (</span><a class="workspace-trigger" data-dcnode-id="10686" href="#b0210" name="bb0210"><span data-dcnode-id="10687" instrument_node="">Huang &amp; Liao, 2017</span></a><span data-dcnode-id="10685" instrument_node="">), and playfulness (</span><a class="workspace-trigger" data-dcnode-id="10683" href="#b0205" name="bb0205"><span data-dcnode-id="10684" instrument_node="">Huang &amp; Liao, 2015</span></a><span data-dcnode-id="10682" instrument_node="">). In accordance with these studies, this research suggests that the experiential factors of enjoyment and immersion are the focal affective responses to AR. Moreover, product liking, an affective evaluation of the product’s design, is assumed to be particularly relevant for AR in retail settings (</span><a class="workspace-trigger" data-dcnode-id="10680" href="#b0075" name="bb0075"><span data-dcnode-id="10681" instrument_node="">Cox &amp; Cox, 2002</span></a><span data-dcnode-id="10679" instrument_node="">).</span></p><p data-dcnode-id="10650" id="p0145"><em data-dcnode-id="10676"><span data-dcnode-id="10677" instrument_node="">Cognitive responses</span></em><span data-dcnode-id="10675" instrument_node="">. From an information processing perspective, the cognitive state is determined by memories, knowledge structures, and thoughts (</span><a class="workspace-trigger" data-dcnode-id="10673" href="#b0275" name="bb0275"><span data-dcnode-id="10674" instrument_node="">Lavidge &amp; Steiner, 1961</span></a><span data-dcnode-id="10672" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="10670" href="#b0200" name="bb0200"><span data-dcnode-id="10671" instrument_node="">Holbrook and Hirschman (1982)</span></a><span data-dcnode-id="10669" instrument_node=""> additionally consider more subconscious cognitive elements (e.g., images and fantasies) in the experiential view. Owing to the difficulty of capturing these soft aspects, the extant AR literature (</span><a class="workspace-trigger" data-dcnode-id="10667" href="#t0005" name="bt0005"><span data-dcnode-id="10668" instrument_node="">Table 1</span></a><span data-dcnode-id="10666" instrument_node="">) has examined the following cognitive responses to AR inherent in the information processing perspective: psychological ownership and decision comfort (</span><a class="workspace-trigger" data-dcnode-id="10664" href="#b0185" name="bb0185"><span data-dcnode-id="10665" instrument_node="">Hilken et al., 2017</span></a><span data-dcnode-id="10663" instrument_node="">), media usefulness (e.g., </span><a class="workspace-trigger" data-dcnode-id="10661" href="#b0505" name="bb0505"><span data-dcnode-id="10662" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10660" instrument_node="">), and perceived ease of use (</span><a class="workspace-trigger" data-dcnode-id="10658" href="#b0205" name="bb0205"><span data-dcnode-id="10659" instrument_node="">Huang and Liao, 2015</span></a><span data-dcnode-id="10657" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10655" href="#b0405" name="bb0405"><span data-dcnode-id="10656" instrument_node="">Rese et al., 2014</span></a><span data-dcnode-id="10654" instrument_node="">). In line with studies highlighting utilitarian aspects as the most dominant cognitive response, this study focuses on media usefulness. Since AR apps contribute to reducing purchase uncertainty (</span><a class="workspace-trigger" data-dcnode-id="10652" href="#b0090" name="bb0090"><span data-dcnode-id="10653" instrument_node="">Dacko, 2017</span></a><span data-dcnode-id="10651" instrument_node="">), choice confidence, which has not yet been considered in AR research, is also examined.</span></p><p data-dcnode-id="10616" id="p0150"><em data-dcnode-id="10648"><span data-dcnode-id="10649" instrument_node="">Behavioral responses</span></em><span data-dcnode-id="10647" instrument_node="">. The experiential perspective recognizes that consumer behavior is driven by the desire for experiences and draws attention to the mental events associated with the act of consumption (</span><a class="workspace-trigger" data-dcnode-id="10645" href="#b0200" name="bb0200"><span data-dcnode-id="10646" instrument_node="">Holbrook &amp; Hirschman, 1982</span></a><span data-dcnode-id="10644" instrument_node="">). The AR literature has largely focused on the information processing perspective by explaining how AR affects consumers’ willingness to buy (</span><a class="workspace-trigger" data-dcnode-id="10642" href="#b0370" name="bb0370"><span data-dcnode-id="10643" instrument_node="">Poushneh &amp; Vasquez-Parraga, 2017b</span></a><span data-dcnode-id="10641" instrument_node="">) as well as their purchase (e.g., </span><a class="workspace-trigger" data-dcnode-id="10639" href="#b0035" name="bb0035"><span data-dcnode-id="10640" instrument_node="">Beck and Crié, 2018</span></a><span data-dcnode-id="10638" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10636" href="#b0445" name="bb0445"><span data-dcnode-id="10637" instrument_node="">Smink et al., 2019</span></a><span data-dcnode-id="10635" instrument_node="">), recommendation (</span><a class="workspace-trigger" data-dcnode-id="10633" href="#b0185" name="bb0185"><span data-dcnode-id="10634" instrument_node="">Hilken et al., 2017</span></a><span data-dcnode-id="10632" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10630" href="#b0220" name="bb0220"><span data-dcnode-id="10631" instrument_node="">Javornik, 2016</span></a><span data-dcnode-id="10629" instrument_node="">), use (</span><a class="workspace-trigger" data-dcnode-id="10627" href="#b0335" name="bb0335"><span data-dcnode-id="10628" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="10626" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10624" href="#b0400" name="bb0400"><span data-dcnode-id="10625" instrument_node="">Rese et al., 2017</span></a><span data-dcnode-id="10623" instrument_node="">), and reuse intentions (e.g., </span><a class="workspace-trigger" data-dcnode-id="10621" href="#b0220" name="bb0220"><span data-dcnode-id="10622" instrument_node="">Javornik, 2016</span></a><span data-dcnode-id="10620" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10618" href="#b0240" name="bb0240"><span data-dcnode-id="10619" instrument_node="">Kim and Hyun, 2016</span></a><span data-dcnode-id="10617" instrument_node="">). This research centers on reuse and purchase intentions, which are especially important for retailers to generate subsequent conversions and revenues in the pre-purchase stage.</span></p></section></section><section data-dcnode-id="10209" id="s0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10608" id="st045"><span data-dcnode-id="10613" instrument_node="">3</span><span data-dcnode-id="10611" instrument_node="">. </span><span data-dcnode-id="10609" instrument_node="">Model development</span></h2><section data-dcnode-id="10567" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10602" id="st050"><span data-dcnode-id="10607" instrument_node="">3.1</span><span data-dcnode-id="10605" instrument_node="">. </span><span data-dcnode-id="10603" instrument_node="">Model overview</span></h3><div data-dcnode-id="10568"><p data-dcnode-id="10594" id="p0155"><span data-dcnode-id="10601" instrument_node="">A comprehensive model (</span><a class="workspace-trigger" data-dcnode-id="10599" href="#f0005" name="bf0005"><span data-dcnode-id="10600" instrument_node="">Fig. 1</span></a><span data-dcnode-id="10598" instrument_node="">) is developed to investigate how AR characteristics (interactivity, system quality, product informativeness, and reality congruence) lead to affective (immersion, enjoyment, and product liking) and cognitive (media usefulness and choice confidence) consumer responses. Subsequently, we investigate these affective and cognitive responses as mediators causing changes in the behavioral consumer responses (reuse and purchase intention). The proposed model is assumed to be valid for both AR-based and web-based product presentations. However, in contrast to the latter, AR enables consumers to visually experience, position, and inspect the desired goods in their physical environment. Owing to the utilitarian benefits associated with AR, we hypothesize that consumers perceive cognitive constructs as higher for AR-based than for web-based product presentations. Concerning the hedonic side of AR, we follow </span><a class="workspace-trigger" data-dcnode-id="10596" href="#b0505" name="bb0505"><span data-dcnode-id="10597" instrument_node="">Yim et al. (2017)</span></a><span data-dcnode-id="10595" instrument_node=""> and suggest higher affective consumer responses in the AR than in the web condition. We ultimately assume stronger behavioral responses in the AR condition.</span></p><figure class="figure text-xs" data-dcnode-id="10569" id="f0005"><span data-dcnode-id="10578"><img alt="" aria-describedby="cn0005" data-dcnode-id="10593" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-gr1.jpg&amp;raw"><span data-dcnode-id="10592" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10579"><li data-dcnode-id="10586"><a class="anchor download-link u-font-sans" data-dcnode-id="10587" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-gr1_lrg.jpg" target="_blank" title="Download high-res image (445KB)"><span class="anchor-text" data-dcnode-id="10588"><span data-dcnode-id="10591" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10589"><span data-dcnode-id="10590" instrument_node="">Download high-res image (445KB)</span></span></span></a></li><li data-dcnode-id="10580"><a class="anchor download-link u-font-sans" data-dcnode-id="10581" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10582"><span data-dcnode-id="10585" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10583"><span data-dcnode-id="10584" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10570"><span data-dcnode-id="10571" id="cn0005"><p data-dcnode-id="10572" id="sp0030"><span class="label" data-dcnode-id="10576"><span data-dcnode-id="10577" instrument_node="">Fig. 1</span></span><span data-dcnode-id="10575" instrument_node="">. </span><span data-dcnode-id="10573" instrument_node="">Conceptual Model.</span></p></span></span></figure></div></section><section data-dcnode-id="10437" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10561" id="st055"><span data-dcnode-id="10566" instrument_node="">3.2</span><span data-dcnode-id="10564" instrument_node="">. </span><span data-dcnode-id="10562" instrument_node="">Affective and cognitive responses to AR characteristics</span></h3><p data-dcnode-id="10529" id="p0160"><span data-dcnode-id="10560" instrument_node="">In the context of vivid product presentations, immersion and enjoyment are conceived as the most relevant affective consumer responses to interactivity. While immersion describes the degree to which AR creates a feeling of being temporarily absorbed by virtual product presentations (</span><a class="workspace-trigger" data-dcnode-id="10558" href="#b0330" name="bb0330"><span data-dcnode-id="10559" instrument_node="">Palmer, 1995</span></a><span data-dcnode-id="10557" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10555" href="#b0505" name="bb0505"><span data-dcnode-id="10556" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="10554" instrument_node="">), enjoyment is defined as the extent to which the use of AR is perceived as enjoyable in its own right, regardless of the anticipated consequences (</span><a class="workspace-trigger" data-dcnode-id="10552" href="#b0095" name="bb0095"><span data-dcnode-id="10553" instrument_node="">Davis, Bagozzi, &amp; Warshaw, 1992</span></a><span data-dcnode-id="10551" instrument_node="">). Both are integral parts of the flow construct, which can be defined as the state in which a consumer focuses entirely on the interaction with a medium and screens out irrelevant perceptions (</span><a class="workspace-trigger" data-dcnode-id="10549" href="#b0195" name="bb0195"><span data-dcnode-id="10550" instrument_node="">Hoffman &amp; Novak, 1996</span></a><span data-dcnode-id="10548" instrument_node="">). Despite an inconsistent understanding of the flow construct (see </span><a class="workspace-trigger" data-dcnode-id="10546" href="#b0105" name="bb0105"><span data-dcnode-id="10547" instrument_node="">Drengner, Jahn, and Furchheim (2018)</span></a><span data-dcnode-id="10545" instrument_node=""> for a comprehensive discussion), research has agreed upon enjoyment and immersion as relevant factors constituting flow (</span><a class="workspace-trigger" data-dcnode-id="10543" href="#b0080" name="bb0080"><span data-dcnode-id="10544" instrument_node="">Csikszentmihalyi, 1975</span></a><span data-dcnode-id="10542" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="10540" href="#b0475" name="bb0475"><span data-dcnode-id="10541" instrument_node="">Van Noort, Voorveld, and Van Reijmersdal (2012)</span></a><span data-dcnode-id="10539" instrument_node=""> show that higher levels of website interactivity induce higher levels of flow. Since </span><a class="workspace-trigger" data-dcnode-id="10537" href="#b0505" name="bb0505"><span data-dcnode-id="10538" instrument_node="">Yim et al. (2017)</span></a><span data-dcnode-id="10536" instrument_node=""> confirm the effect of interactivity on immersion in an AR setting, we also hypothesize that interactivity enhances immersion. The findings on the effect of interactivity on enjoyment, however, are mixed. In contrast to </span><a class="workspace-trigger" data-dcnode-id="10534" href="#b0335" name="bb0335"><span data-dcnode-id="10535" instrument_node="">Pantano et al. (2017)</span></a><span data-dcnode-id="10533" instrument_node="">, who find no support for this effect, </span><a class="workspace-trigger" data-dcnode-id="10531" href="#b0290" name="bb0290"><span data-dcnode-id="10532" instrument_node="">Li, Daugherty, and Biocca (2001)</span></a><span data-dcnode-id="10530" instrument_node=""> state that enjoyment is particularly influenced b
