</span><article class="article" data-dcnode-id="1281"><span data-dcnode-id="1356" instrument_node="">
</span><div class="hlFld-Abstract" data-dcnode-id="1345"><a data-dcnode-id="1355" name="abstract"></a><div class="sectionInfo abstractSectionHeading" data-dcnode-id="1352"><div class="sectionHeading" data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">ABSTRACT</span></div></div><div class="abstractSection abstractInFull" data-dcnode-id="1346"><p class="summary-title" data-dcnode-id="1349"><b data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">ABSTRACT</span></b></p><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">As competition intensifies in the retail industry organizations are increasingly turning to forms of artificial intelligence as a means of differentiation. E-commerce companies are moving towards integrating technologies such as chatbots and augmented reality interactive technology which have proved to be popular solutions to customer service in the practitioner domain. However, little is known about consumers’ attitude and engagement with these emerging technologies when used in a retail environment. A theory-based research model which was designed to uncover the motivational mechanisms needed to provide engagement and effective decision-making processes in this context. Empirical testing conducted with a field study supported the proposed model.</span></p></div></div><div class="abstractKeywords" data-dcnode-id="1328"><div class="hlFld-KeywordText" data-dcnode-id="1329"><div data-dcnode-id="1330"><p aria-label="Keywords" class="kwd-title" data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">KEYWORDS: </span></p><a class="kwd-btn keyword-click" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/keyword/Augmented%2BReality%2BInteractive%2BTechnology" role="button"><span data-dcnode-id="1342" instrument_node="">Augmented reality interactive technology</span></a><a class="kwd-btn keyword-click" data-dcnode-id="1339" href=
