</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4950" id="p-0080" num="0079"><span data-dcnode-id="4969" instrument_node="">Experiences for an end user </span><b class="style-scope patent-text" data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">202</span></b><span data-dcnode-id="4966" instrument_node=""> are generally created by content authors </span><b class="style-scope patent-text" data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">240</span></b><span data-dcnode-id="4963" instrument_node=""> via content tools </span><b class="style-scope patent-text" data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">242</span></b><span data-dcnode-id="4960" instrument_node="">. For example, a content author </span><b class="style-scope patent-text" data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">240</span></b><span data-dcnode-id="4957" instrument_node=""> would have done the fix to the shoe data in the example above. Content authors </span><b class="style-scope patent-text" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">240</span></b><span data-dcnode-id="4954" instrument_node=""> may represent manufacturers or may represent retailers. The content creation process is described in greater detail with respect to </span><figref class="style-scope patent-text" data-dcnode-id="4952" idrefs="DRAWINGS"><span data-dcnode-id="4953" instrument_node="">FIG. 5</span></figref><span data-dcnode-id="4951" instrument_node=""> below.</span></div><span data-dcnode-id="4949" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4947" id="h-0008" num="0000"><span data-dcnode-id="4948" instrument_node="">Programmatic Overview</span></div><span data-dcnode-id="4946" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4923" id="p-0081" num="0080"><span data-dcnode-id="4945" instrument_node="">The content management system </span><b class="style-scope patent-text" data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">216</span></b><span data-dcnode-id="4942" instrument_node=""> exposes its functionality to web services </span><b class="style-scope patent-text" data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">214</span></b><span data-dcnode-id="4939" instrument_node=""> and other entities via an application programming interface (API). </span><figref class="style-scope patent-text" data-dcnode-id="4937" idrefs="DRAWINGS"><span data-dcnode-id="4938" instrument_node="">FIG. 3</span></figref><span data-dcnode-id="4936" instrument_node=""> is a block diagram of the functions exposed via the API. Specifically, the API exposes at least four blocks of functionality: security APIs </span><b class="style-scope patent-text" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">302</span></b><span data-dcnode-id="4933" instrument_node="">, programmatic support APIs </span><b class="style-scope patent-text" data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">304</span></b><span data-dcnode-id="4930" instrument_node="">, model manipulation APIs </span><b class="style-scope patent-text" data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">306</span></b><span data-dcnode-id="4927" instrument_node="">, and rendering APIs </span><b class="style-scope patent-text" data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">308</span></b><span data-dcnode-id="4924" instrument_node="">.</span></div><span data-dcnode-id="4922" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4893" id="p-0082" num="0081"><span data-dcnode-id="4921" instrument_node="">Security APIs </span><b class="style-scope patent-text" data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">302</span></b><span data-dcnode-id="4918" instrument_node=""> provide authentication for an account for a party seeking access to the content management system </span><b class="style-scope patent-text" data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">216</span></b><span data-dcnode-id="4915" instrument_node="">. Accounts may be registered or deregistered via the registerUser( ) API </span><b class="style-scope patent-text" data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">310</span></b><span data-dcnode-id="4912" instrument_node="">. Calling this API creates, updates, or deletes data in the account data store </span><b class="style-scope patent-text" data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">228</span></b><span data-dcnode-id="4909" instrument_node="">. A session on the content management system </span><b class="style-scope patent-text" data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">216</span></b><span data-dcnode-id="4906" instrument_node=""> may be initiated via the login( ) API </span><b class="style-scope patent-text" data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">312</span></b><span data-dcnode-id="4903" instrument_node="">, and that session terminated via the logout( ) API </span><b class="style-scope patent-text" data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">314</span></b><span data-dcnode-id="4900" instrument_node="">. If the logout( ) API </span><b class="style-scope patent-text" data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">314</span></b><span data-dcnode-id="4897" instrument_node=""> is not called after a predetermined time, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">216</span></b><span data-dcnode-id="4894" instrument_node=""> will terminate the session independently.</span></div><span data-dcnode-id="4892" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4866" id="p-0083" num="0082"><span data-dcnode-id="4891" instrument_node="">Programmatic support APIs </span><b class="style-scope patent-text" data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">304</span></b><span data-dcnode-id="4888" instrument_node=""> provide convenience functions for programmers using the APIs </span><b class="style-scope patent-text" data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">300</span></b><span data-dcnode-id="4885" instrument_node=""> for the content management system </span><b class="style-scope patent-text" data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">216</span></b><span data-dcnode-id="4882" instrument_node="">. Programmatic support APIs </span><b class="style-scope patent-text" data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">304</span></b><span data-dcnode-id="4879" instrument_node=""> primarily provide enumeration functions of the API set </span><b class="style-scope patent-text" data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">300</span></b><span data-dcnode-id="4876" instrument_node=""> and of models. Specifically list( ) </span><b class="style-scope patent-text" data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">316</span></b><span data-dcnode-id="4873" instrument_node=""> enumerates the functions of the API set </span><b class="style-scope patent-text" data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">300</span></b><span data-dcnode-id="4870" instrument_node=""> and listModels( ) </span><b class="style-scope patent-text" data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">318</span></b><span data-dcnode-id="4867" instrument_node=""> enumerates the models accessible in memory.</span></div><span data-dcnode-id="4865" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4848" id="p-0084" num="0083"><span data-dcnode-id="4864" instrument_node="">Model manipulation APIs </span><b class="style-scope patent-text" data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">306</span></b><span data-dcnode-id="4861" instrument_node=""> provide functions to add, remove, and update data to models as well as to receive models. Specifically the model manipulation APIs </span><b class="style-scope patent-text" data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">306</span></b><span data-dcnode-id="4858" instrument_node=""> include addModelData( ) </span><b class="style-scope patent-text" data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">320</span></b><span data-dcnode-id="4855" instrument_node=""> which allows the uploading of data to a model; and updateModelData( ) </span><b class="style-scope patent-text" data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">322</span></b><span data-dcnode-id="4852" instrument_node=""> which allows the updating of data already in a model. Model data may be retrieved in GL library form via getModelData( ) </span><b class="style-scope patent-text" data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">324</span></b><span data-dcnode-id="4849" instrument_node="">. Received data may include virtual object data such as objects, shaders and textures. Received data may also include product data such as points of interest, pricing, and branding data. Yet other received data may also include slideshow data, scene data, and potentially third party data.</span></div><span data-dcnode-id="4847" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4842" id="p-0085" num="0084"><span data-dcnode-id="4846" instrument_node="">In the event a client is determined not to support the GL library, the getNoGL( ) </span><b class="style-scope patent-text" data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">326</span></b><span data-dcnode-id="4843" instrument_node=""> function may be called to use non-GL virtual data.</span></div><span data-dcnode-id="4841" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4836" id="p-0086" num="0085"><span data-dcnode-id="4840" instrument_node="">Model data comprise multiple files from multiple sources. Some data may be moderately sensitive. Accordingly, the model manipulation APIs include compileJS( ) </span><b class="style-scope patent-text" data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">328</span></b><span data-dcnode-id="4837" instrument_node=""> which takes the constituent model data files, makes it into a single file, and potentially performs an obfuscation function on the data. The obfuscation function makes it somewhat difficult to reconstruct the data if the data is intercepted.</span></div><span data-dcnode-id="4835" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4824" id="p-0087" num="0086"><span data-dcnode-id="4834" instrument_node="">Rendering APIs </span><b class="style-scope patent-text" data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">308</span></b><span data-dcnode-id="4831" instrument_node=""> provide functions to render data to a known quality of service. Specifically, the nbtStatus( ) </span><b class="style-scope patent-text" data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">330</span></b><span data-dcnode-id="4828" instrument_node=""> method allows a programmer to perform a performance check (NBT stands for Next Best Thing). Calling renderNBT( ) </span><b class="style-scope patent-text" data-dcnode-id="4826"><span data-dcnode-id="4827" instrument_node="">332</span></b><span data-dcnode-id="4825" instrument_node=""> renders the next best level of quality available to a client.</span></div><span data-dcnode-id="4823" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4821" id="h-0009" num="0000"><span data-dcnode-id="4822" instrument_node="">Data Service Process for Augmented Reality E-Commerce</span></div><span data-dcnode-id="4820" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4785" id="p-0088" num="0087"><span data-dcnode-id="4819" instrument_node=""> </span><figref class="style-scope patent-text" data-dcnode-id="4817" idrefs="DRAWINGS"><span data-dcnode-id="4818" instrument_node="">FIG. 4</span></figref><span data-dcnode-id="4816" instrument_node=""> provides a flow chart of a process </span><b class="style-scope patent-text" data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">400</span></b><span data-dcnode-id="4813" instrument_node=""> illustrating the content service cycle as part of augmented reality E-Commerce. At </span><b class="style-scope patent-text" data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">402</span></b><span data-dcnode-id="4810" instrument_node="">, an end user </span><b class="style-scope patent-text" data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">202</span></b><span data-dcnode-id="4807" instrument_node=""> provides input via an input device </span><b class="style-scope patent-text" data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">204</span></b><span data-dcnode-id="4804" instrument_node="">. The input may be tracked by client software such as a viewer, or by other tracking software local to the end user at the end user's computer </span><b class="style-scope patent-text" data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">208</span></b><span data-dcnode-id="4801" instrument_node="">. The end user's computer </span><b class="style-scope patent-text" data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">208</span></b><span data-dcnode-id="4798" instrument_node=""> is communicatively connected to a web service </span><b class="style-scope patent-text" data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">214</span></b><span data-dcnode-id="4795" instrument_node=""> over a network </span><b class="style-scope patent-text" data-dcnode-id="4793"><span data-dcnode-id="4794" instrument_node="">212</span></b><span data-dcnode-id="4792" instrument_node="">. At </span><b class="style-scope patent-text" data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">404</span></b><span data-dcnode-id="4789" instrument_node="">, client software sends any input corresponding to a data request for a model to web service </span><b class="style-scope patent-text" data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">214</span></b><span data-dcnode-id="4786" instrument_node="">.</span></div><span data-dcnode-id="4784" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4746" id="p-0089" num="0088"><span data-dcnode-id="4783" instrument_node="">The web service </span><b class="style-scope patent-text" data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">214</span></b><span data-dcnode-id="4780" instrument_node=""> calls the content management system </span><b class="style-scope patent-text" data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">216</span></b><span data-dcnode-id="4777" instrument_node=""> over the network </span><b class="style-scope patent-text" data-dcnode-id="4775"><span data-dcnode-id="4776" instrument_node="">212</span></b><span data-dcnode-id="4774" instrument_node="">, via one or more API calls </span><b class="style-scope patent-text" data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node="">300</span></b><span data-dcnode-id="4771" instrument_node="">. At </span><b class="style-scope patent-text" data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">406</span></b><span data-dcnode-id="4768" instrument_node="">, if the web service </span><b class="style-scope patent-text" data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">214</span></b><span data-dcnode-id="4765" instrument_node=""> is not authenticated (“No” at decision </span><b class="style-scope patent-text" data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">408</span></b><span data-dcnode-id="4762" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="4760"><span data-dcnode-id="4761" instrument_node="">400</span></b><span data-dcnode-id="4759" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="4757"><span data-dcnode-id="4758" instrument_node="">418</span></b><span data-dcnode-id="4756" instrument_node="">. At </span><b class="style-scope patent-text" data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">418</span></b><span data-dcnode-id="4753" instrument_node="">, web service </span><b class="style-scope patent-text" data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">214</span></b><span data-dcnode-id="4750" instrument_node=""> may create a sessions using the Security APIs </span><b class="style-scope patent-text" data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">302</span></b><span data-dcnode-id="4747" instrument_node="">.</span></div><span data-dcnode-id="4745" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4713" id="p-0090" num="0089"><span data-dcnode-id="4744" instrument_node="">However, if the web service </span><b class="style-scope patent-text" data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">214</span></b><span data-dcnode-id="4741" instrument_node=""> is authenticated (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">408</span></b><span data-dcnode-id="4738" instrument_node="">), then process </span><b class="style-scope patent-text" data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">400</span></b><span data-dcnode-id="4735" instrument_node=""> may continue to </span><b class="style-scope patent-text" data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">410</span></b><span data-dcnode-id="4732" instrument_node="">. At </span><b class="style-scope patent-text" data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">410</span></b><span data-dcnode-id="4729" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">214</span></b><span data-dcnode-id="4726" instrument_node=""> may call one or more APIs </span><b class="style-scope patent-text" data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">300</span></b><span data-dcnode-id="4723" instrument_node=""> to retrieve model data. Typically the model data corresponds to the request for at least one end user </span><b class="style-scope patent-text" data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">202</span></b><span data-dcnode-id="4720" instrument_node="">. Alternatively, requests may be batched to minimize the number of network round trips between the web service </span><b class="style-scope patent-text" data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">214</span></b><span data-dcnode-id="4717" instrument_node=""> and the content management system </span><b class="style-scope patent-text" data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">216</span></b><span data-dcnode-id="4714" instrument_node="">.</span></div><span data-dcnode-id="4712" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4683" id="p-0091" num="0090"><span data-dcnode-id="4711" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node="">412</span></b><span data-dcnode-id="4708" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">216</span></b><span data-dcnode-id="4705" instrument_node=""> runs queries via query engine </span><b class="style-scope patent-text" data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">220</span></b><span data-dcnode-id="4702" instrument_node=""> to retrieve the requested model data from data stores </span><b class="style-scope patent-text" data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node="">222</span></b><span data-dcnode-id="4699" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">224</span></b><span data-dcnode-id="4696" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">226</span></b><span data-dcnode-id="4693" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">228</span></b><span data-dcnode-id="4690" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">230</span></b><span data-dcnode-id="4687" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">232</span></b><span data-dcnode-id="4684" instrument_node="">.</span></div><span data-dcnode-id="4682" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4665" id="p-0092" num="0091"><span data-dcnode-id="4681" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">414</span></b><span data-dcnode-id="4678" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">216</span></b><span data-dcnode-id="4675" instrument_node=""> constructs a single file for the retrieved model data, and deploys it in Content Distribution Network </span><b class="style-scope patent-text" data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">234</span></b><span data-dcnode-id="4672" instrument_node="">. Alternatively, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">216</span></b><span data-dcnode-id="4669" instrument_node=""> may serve the retrieved data model, either as a single file, or in multiple files, directly back to the web service </span><b class="style-scope patent-text" data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">214</span></b><span data-dcnode-id="4666" instrument_node="">.</span></div><span data-dcnode-id="4664" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4650" id="p-0093" num="0092"><span data-dcnode-id="4663" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">416</span></b><span data-dcnode-id="4660" instrument_node="">, the Content Distribution Network </span><b class="style-scope patent-text" data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">234</span></b><span data-dcnode-id="4657" instrument_node=""> serves the retrieved data either to the web service for forwarding to the end user, or potentially directly back to the end user's computer </span><b class="style-scope patent-text" data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">208</span></b><span data-dcnode-id="4654" instrument_node=""> for rendering via rendering device </span><b class="style-scope patent-text" data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">206</span></b><span data-dcnode-id="4651" instrument_node="">.</span></div><span data-dcnode-id="4649" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4647" id="h-0010" num="0000"><span data-dcnode-id="4648" instrument_node="">Content Authoring for Augmented Reality E-Commerce</span></div><span data-dcnode-id="4646" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4629" id="p-0094" num="0093"><span data-dcnode-id="4645" instrument_node="">The virtual image data </span><b class="style-scope patent-text" data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">222</span></b><span data-dcnode-id="4642" instrument_node=""> comprising the models may be authored by a content author </span><b class="style-scope patent-text" data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">240</span></b><span data-dcnode-id="4639" instrument_node=""> using content tools </span><b class="style-scope patent-text" data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">242</span></b><span data-dcnode-id="4636" instrument_node="">. A virtual image for a single product is a model, i.e., a graphical 3D virtual object to be rendered corresponding to the product. Because a typical manufacturer may have thousands of products, saving even a relatively small amount of time, such as five minutes, in capturing an individual image may result in a significant time and money savings. </span><figref class="style-scope patent-text" data-dcnode-id="4634" idrefs="DRAWINGS"><span data-dcnode-id="4635" instrument_node="">FIG. 5</span></figref><span data-dcnode-id="4633" instrument_node=""> is a flow chart of the content authoring process </span><b class="style-scope patent-text" data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node="">500</span></b><span data-dcnode-id="4630" instrument_node="">.</span></div><span data-dcnode-id="4628" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4620" id="p-0095" num="0094"><span data-dcnode-id="4627" instrument_node="">A model is generated from various model sources of data. Sources may include 3D scans, 2D images, metadata and textual content. At </span><b class="style-scope patent-text" data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">502</span></b><span data-dcnode-id="4624" instrument_node="">, a content author receives generated data sources for a model. A typical case is that the content author </span><b class="style-scope patent-text" data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">240</span></b><span data-dcnode-id="4621" instrument_node=""> is also the person to perform the 3D scans and other data capture. 3D scans may be performed using a photometric process. Textures can be captured and edited using standard editors such as Photoscan™, PMVS2 and similar software.</span></div><span data-dcnode-id="4619" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4614" id="p-0096" num="0095"><span data-dcnode-id="4618" instrument_node="">One of the more time intensive steps in generating a model is to ensure the model may be usable as a 360° spin representation. Conventional mounting techniques where mounts are hidden behind the product cannot be effectively used, since the back of the product will be imaged as well. Conventionally, a content author </span><b class="style-scope patent-text" data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">240</span></b><span data-dcnode-id="4615" instrument_node=""> may mount a product from the back, scan the front, then remount the product on the front and scan the back. However this effectively doubles the amount of time to scan the object since mounting accounts for most of the capture time.</span></div><span data-dcnode-id="4613" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4605" id="p-0097" num="0096"><span data-dcnode-id="4612" instrument_node="">In general, the content authoring tools </span><b class="style-scope patent-text" data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">242</span></b><span data-dcnode-id="4609" instrument_node=""> may incorporate other functionalities that lower the amount of time to perform a scan. For example, content authoring tools </span><b class="style-scope patent-text" data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">242</span></b><span data-dcnode-id="4606" instrument_node=""> used in scanning are to utilize higher end graphical processing units (GPU), and to used motion control systems to decrease mounting time.</span></div><span data-dcnode-id="4604" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4602" id="p-0098" num="0097"><span data-dcnode-id="4603" instrument_node="">An alternative mounting technique is to have a boom hold the object with a thread into a light box. Once the object is still, a 3D scan and/or 360° panoramic series of photos may be taken without the mounting being visible, and without multiple mountings being performed.</span></div><span data-dcnode-id="4601" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4596" id="p-0099" num="0098"><span data-dcnode-id="4600" instrument_node="">Soft goods, such as apparel, also present a challenge. Typically, an end user </span><b class="style-scope patent-text" data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">202</span></b><span data-dcnode-id="4597" instrument_node=""> may desire to virtually wear a virtual clothing object. Thus the object cannot be scanned as folded. Rather the object is placed on a special mannequin that is completely covered by the object. For example, a shirt is held in a mount that comprises only a torso and arms as long as the sleeves. This differs from a conventional mannequin that would also show arms, and potentially a head. Accordingly, the specialized mounts may minimize any surface area that would be subject to a 3D scan.</span></div><span data-dcnode-id="4595" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4590" id="p-0100" num="0099"><span data-dcnode-id="4594" instrument_node="">Another issue in generating a 360° spin representation is to obtain uniform lighting. To address this issue, a content author </span><b class="style-scope patent-text" data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">240</span></b><span data-dcnode-id="4591" instrument_node=""> may use a computer numerical control (CNC) boom to hold a camera and primary lighting. The object to be scanned may be in a light box with standalone lights, but a primary light may be held by the boom holding the camera. In this way, as the CNC boom is programmed to capture a series images of the object while revolving about the object, the primary light on the boom provides a constant lighting contribution.</span></div><span data-dcnode-id="4589" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4581" id="p-0101" num="0100"><span data-dcnode-id="4588" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">504</span></b><span data-dcnode-id="4585" instrument_node="">, once the data sources have been generated or received from third parties, the data is extracted from the data sources. At </span><b class="style-scope patent-text" data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">506</span></b><span data-dcnode-id="4582" instrument_node="">, the data is voxelized, or converted into voxels. Note that a voxel is a volumetric pixel—the 3D analogue for a 2D pixel.</span></div><span data-dcnode-id="4580" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4575" id="p-0102" num="0101"><span data-dcnode-id="4579" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">508</span></b><span data-dcnode-id="4576" instrument_node="">, at least some subset of the voxelized data is selected for a point cloud corresponding to the object. The voxelized data may optionally be used to generate a virtual 3D mesh for the object. The 3D mesh is a computerized wireframe of the surface of the object. The mesh is used to project images, lighting, and other image data to generate the 3D graphical likeness of the object.</span></div><span data-dcnode-id="4574" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4569" id="p-0103" num="0102"><span data-dcnode-id="4573" instrument_node="">With the point cloud and other generated data, the data is finally consolidated in </span><b class="style-scope patent-text" data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">510</span></b><span data-dcnode-id="4570" instrument_node=""> into a model. As previously described above, a model may comprise, an object file, a mesh, a series of images, other maps, and other assets used to generate a virtual image of the object.</span></div><span data-dcnode-id="4568" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4557" id="p-0104" num="0103"><span data-dcnode-id="4567" instrument_node="">When generating a model, another time bottlenecks is in </span><b class="style-scope patent-text" data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">512</span></b><span data-dcnode-id="4564" instrument_node=""> where the content author </span><b class="style-scope patent-text" data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">240</span></b><span data-dcnode-id="4561" instrument_node=""> performs model specific corrections. Corrections may include the following issues. Errors during 3D scan may yield mesh errors and accordingly yield a bad topology. Such errors may be corrected by hand, or automatically detected. For example, scans of similar products could be compared to flag areas that are different. For example a scan of a first shoe, known to be correct could be compared to a second shoe. If the second shoe indicates a spike not in the first shoe, the spike may be flagged as an anomaly. In such cases the spike could turn out to be a mount that was inadvertently scanned, and the content author </span><b class="style-scope patent-text" data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">240</span></b><span data-dcnode-id="4558" instrument_node=""> may remove the spike.</span></div><span data-dcnode-id="4556" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4554" id="p-0105" num="0104"><span data-dcnode-id="4555" instrument_node="">Images may be misaligned when added to a mesh. Typically a series of 2D images taken of the object are projected onto the 3D mesh. However, sometimes 2D images do not project properly on the mesh. Software may scan the borders of objects and automatically seek misalignments. For example, a standardized scan of a tailored shirt would expect seam lines around pockets, the collar, and the sides of the shirt. Software could scan for broken seams in the model indicated misaligned images.</span></div><span data-dcnode-id="4553" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4551" id="p-0106" num="0105"><span data-dcnode-id="4552" instrument_node="">In addition to potential misalignment, different 2D images projected onto a mesh may have been captured with slightly different lighting causing non-matching color. As described above, software may scan the borders and overlaps of 2D images and test for non-matching color. Where detected, the colors may be blended on the model or the original 2D images changed.</span></div><span data-dcnode-id="4550" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4545" id="p-0107" num="0106"><span data-dcnode-id="4549" instrument_node="">3D scans may be used to capture the shape of an object. In order to make a photorealistic model, a content author </span><b class="style-scope patent-text" data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">240</span></b><span data-dcnode-id="4546" instrument_node=""> may build a specular map from the data. The specular map may capture the lighting properties of the object, in particular the shininess/reflectiveness of the object. In general, pictures taken of the object could be used to extract material properties of the object.</span></div><span data-dcnode-id="4544" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4536" id="p-0108" num="0107"><span data-dcnode-id="4543" instrument_node="">Once the model has been corrected, it may be used as virtual image. However, in </span><b class="style-scope patent-text" data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">514</span></b><span data-dcnode-id="4540" instrument_node="">, the content author </span><b class="style-scope patent-text" data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">240</span></b><span data-dcnode-id="4537" instrument_node=""> may opt to perform image augmentation. For example, if the object is something that might be printed locally, such as with a 3D printer, the content author may wish to add mounting to the object.</span></div><span data-dcnode-id="4535" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4527" id="p-0109" num="0108"><span data-dcnode-id="4534" instrument_node="">Furthermore, the content author </span><b class="style-scope patent-text" data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">240</span></b><span data-dcnode-id="4531" instrument_node=""> may opt to provide image provenance or versioning in </span><b class="style-scope patent-text" data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">516</span></b><span data-dcnode-id="4528" instrument_node="">. Metadata for image provenance is used when using third party data sources, where copyright and other image ownership is to be tracked. Versioning is used to track iterations of the model itself. As time goes on, the model is likely to undergo modifications and corrections. Such modifications and corrections may be tracked by a versioning data.</span></div><span data-dcnode-id="4526" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4524" id="h-0011" num="0000"><span data-dcnode-id="4525" instrument_node="">User Experience Process for Augmented Reality E-Commerce</span></div><span data-dcnode-id="4523" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4491" id="p-0110" num="0109"><span data-dcnode-id="4522" instrument_node=""> </span><figref class="style-scope patent-text" data-dcnode-id="4520" idrefs="DRAWINGS"><span data-dcnode-id="4521" instrument_node="">FIG. 6</span></figref><span data-dcnode-id="4519" instrument_node=""> is an exemplary process </span><b class="style-scope patent-text" data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">600</span></b><span data-dcnode-id="4516" instrument_node=""> that provides an augmented reality e-commerce experience to a user. At </span><b class="style-scope patent-text" data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">602</span></b><span data-dcnode-id="4513" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">214</span></b><span data-dcnode-id="4510" instrument_node=""> may receive user input from a user as captured by the input devices </span><b class="style-scope patent-text" data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">204</span></b><span data-dcnode-id="4507" instrument_node="">. The input devices </span><b class="style-scope patent-text" data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">204</span></b><span data-dcnode-id="4504" instrument_node=""> may include cameras, microphones, touch surfaces, wearable sensors, or other sensing devices that are configured to capture motions or actions of the user. For example, the user input may include specific gestures made by the user via the user's arms or hands, gestures made using the fingers (e.g., a pinch command), selection of virtual icons, and/or voice commands. In some embodiments, the input devices </span><b class="style-scope patent-text" data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">204</span></b><span data-dcnode-id="4501" instrument_node=""> may be configured to capture motions or actions that are performed by persons with disabilities. Such motions or actions may include movement of facial features (e.g., winking of eyes, twitching of facial muscles), blowing of air through a person's mouth in specific patterns, movement of limbs or head in particular ways, and/or so forth. In some embodiments, the input devices </span><b class="style-scope patent-text" data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">204</span></b><span data-dcnode-id="4498" instrument_node=""> may have logic to translate such inputs into commands. Such commands are then passed by the input device </span><b class="style-scope patent-text" data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">204</span></b><span data-dcnode-id="4495" instrument_node=""> to the web service </span><b class="style-scope patent-text" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">214</span></b><span data-dcnode-id="4492" instrument_node="">.</span></div><span data-dcnode-id="4490" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4458" id="p-0111" num="0110"><span data-dcnode-id="4489" instrument_node="">At decision </span><b class="style-scope patent-text" data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">604</span></b><span data-dcnode-id="4486" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">214</span></b><span data-dcnode-id="4483" instrument_node=""> may determine whether the user input includes a command to perform a query for a particular 3D product representation. In various embodiments, the web service </span><b class="style-scope patent-text" data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">214</span></b><span data-dcnode-id="4480" instrument_node=""> may include command processing logic that recognizes query commands. For example, the input devices </span><b class="style-scope patent-text" data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">204</span></b><span data-dcnode-id="4477" instrument_node=""> may translate a touch gesture or a voice command regarding a particular product into a command. In turn, the command may be recognized by the command processing logic of the web service </span><b class="style-scope patent-text" data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">214</span></b><span data-dcnode-id="4474" instrument_node=""> as a query command Thus, if the user input is recognized at decision </span><b class="style-scope patent-text" data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">604</span></b><span data-dcnode-id="4471" instrument_node=""> by the web service </span><b class="style-scope patent-text" data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">214</span></b><span data-dcnode-id="4468" instrument_node=""> as a query command (“Yes” at </span><b class="style-scope patent-text" data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">604</span></b><span data-dcnode-id="4465" instrument_node="">), the process </span><b class="style-scope patent-text" data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">600</span></b><span data-dcnode-id="4462" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">606</span></b><span data-dcnode-id="4459" instrument_node="">.</span></div><span data-dcnode-id="4457" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4416" id="p-0112" num="0111"><span data-dcnode-id="4456" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">606</span></b><span data-dcnode-id="4453" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">214</span></b><span data-dcnode-id="4450" instrument_node=""> may pass the query command to the query engine </span><b class="style-scope patent-text" data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">220</span></b><span data-dcnode-id="4447" instrument_node=""> of the content management system </span><b class="style-scope patent-text" data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">216</span></b><span data-dcnode-id="4444" instrument_node="">. In turn, the query engine </span><b class="style-scope patent-text" data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">220</span></b><span data-dcnode-id="4441" instrument_node=""> may determine image data and product data that are to be retrieved in response to the query command. In various embodiments, the web service </span><b class="style-scope patent-text" data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">214</span></b><span data-dcnode-id="4438" instrument_node=""> my pass the query command to the query engine </span><b class="style-scope patent-text" data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">220</span></b><span data-dcnode-id="4435" instrument_node=""> via an API call, such as one of the API calls </span><b class="style-scope patent-text" data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">218</span></b><span data-dcnode-id="4432" instrument_node="">. The query engine </span><b class="style-scope patent-text" data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">220</span></b><span data-dcnode-id="4429" instrument_node=""> may parse the query command to determine a 3D product representation of a product that is to be retrieved. Upon making such a determination, the query engine </span><b class="style-scope patent-text" data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">220</span></b><span data-dcnode-id="4426" instrument_node=""> may retrieve image data for the selected 3D product representation. For example, the query engine </span><b class="style-scope patent-text" data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">220</span></b><span data-dcnode-id="4423" instrument_node=""> may retrieve the image data from the virtual image database </span><b class="style-scope patent-text" data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">222</span></b><span data-dcnode-id="4420" instrument_node="">. The image data for the product may be linked to the product data for the product. The linkage may be through a common product identifier, such as a Universal Product Code (UPC) that is shared by the image data and the product data. The product data may include audio product data, multimedia product data, product identification information, product specifications, product inventory information, product price information, product shipping information, and/or so forth. The product data may be stored in the product database </span><b class="style-scope patent-text" data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">224</span></b><span data-dcnode-id="4417" instrument_node="">.</span></div><span data-dcnode-id="4415" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4401" id="p-0113" num="0112"><span data-dcnode-id="4414" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">608</span></b><span data-dcnode-id="4411" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">216</span></b><span data-dcnode-id="4408" instrument_node=""> may compile the image data and the product data that are retrieved by the query engine </span><b class="style-scope patent-text" data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">220</span></b><span data-dcnode-id="4405" instrument_node=""> into an integrated file. The compilation into the integrated file may serve to obfuscate the content of the file. For example, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">216</span></b><span data-dcnode-id="4402" instrument_node=""> may use a compilation tool, such as the compileJS( ) API call, to perform the compilation of the integrated file.</span></div><span data-dcnode-id="4400" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4377" id="p-0114" num="0113"><span data-dcnode-id="4399" instrument_node="">At decision </span><b class="style-scope patent-text" data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">610</span></b><span data-dcnode-id="4396" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">216</span></b><span data-dcnode-id="4393" instrument_node=""> may determine whether new image data is received. In various embodiments, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">216</span></b><span data-dcnode-id="4390" instrument_node=""> may receive new image data as part of a general update to the virtual image database </span><b class="style-scope patent-text" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">222</span></b><span data-dcnode-id="4387" instrument_node=""> or a specific update to the image data for the product that is the object of the query command. For example, the new image data may be a correction to the existing image data or additional image data that is previously unavailable for the product. Accordingly, if the content management system </span><b class="style-scope patent-text" data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">216</span></b><span data-dcnode-id="4384" instrument_node=""> determines that new image data is received, the process </span><b class="style-scope patent-text" data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">600</span></b><span data-dcnode-id="4381" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">612</span></b><span data-dcnode-id="4378" instrument_node="">.</span></div><span data-dcnode-id="4376" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4365" id="p-0115" num="0114"><span data-dcnode-id="4375" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">612</span></b><span data-dcnode-id="4372" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">216</span></b><span data-dcnode-id="4369" instrument_node=""> may decompile the integrated file for the product that is the object of the query command. The content management system </span><b class="style-scope patent-text" data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">216</span></b><span data-dcnode-id="4366" instrument_node=""> may use the compilation tool or an equivalent software tool that is compatible with the compilation tool to decompile the integrated file. The de-compilation of the integrated file may once again expose the image data and the product data.</span></div><span data-dcnode-id="4364" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4347" id="p-0116" num="0115"><span data-dcnode-id="4363" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">614</span></b><span data-dcnode-id="4360" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">216</span></b><span data-dcnode-id="4357" instrument_node=""> may incorporate the new image data into the integrated file. In various embodiments, the integration may be performed with the supplementation of the image data with the new image data. For example, if the image data is stored in the form of multiple data files that are catalogued via a master file list, then the name of a new file that includes the new image data is placed in the master file list. However, if the image data is a single data file, then the new image data may be appended to the data file at the end of the existing image data, or appended at one or more appropriate places in the data file. Once the new image data and the existing image data are merged, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">216</span></b><span data-dcnode-id="4354" instrument_node=""> may use the compilation tool to compile the image data and the product data into an integrated file. Subsequently, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">216</span></b><span data-dcnode-id="4351" instrument_node=""> may transmit the integrated file to the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">206</span></b><span data-dcnode-id="4348" instrument_node="">.</span></div><span data-dcnode-id="4346" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4326" id="p-0117" num="0116"><span data-dcnode-id="4345" instrument_node="">In some embodiments, the incorporation of the new image data into the integrate file may be performed by a rendering device, such as one of the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">206</span></b><span data-dcnode-id="4342" instrument_node="">. In other words, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">216</span></b><span data-dcnode-id="4339" instrument_node=""> may offload this task to the rendering device. The rendering device may perform such incorporation after receiving the integrated file and the new image data from the content management system </span><b class="style-scope patent-text" data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">216</span></b><span data-dcnode-id="4336" instrument_node="">. In such embodiments, the rendering device may be equipped with de-compilation and compilation tools, as well as processing logic for performing the incorporation of the new image data into the integrated file. Returning to decision </span><b class="style-scope patent-text" data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">610</span></b><span data-dcnode-id="4333" instrument_node="">, if the content management system </span><b class="style-scope patent-text" data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">216</span></b><span data-dcnode-id="4330" instrument_node=""> determines that no new image data is received, the content management system may directly transmit the integrated file to the rendering device </span><b class="style-scope patent-text" data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">206</span></b><span data-dcnode-id="4327" instrument_node="">.</span></div><span data-dcnode-id="4325" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4308" id="p-0118" num="0117"><span data-dcnode-id="4324" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">616</span></b><span data-dcnode-id="4321" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">216</span></b><span data-dcnode-id="4318" instrument_node=""> may provide augmentations that are to be rendered along with the integrated file to the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">206</span></b><span data-dcnode-id="4315" instrument_node="">. The augmentations may include points of interest, color swatches, visual textures, and additional product information. The augmentation may be provided in the form of an augmentation data file to the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">206</span></b><span data-dcnode-id="4312" instrument_node="">. The points of interest may be selectable features that are overlaid onto a 3D product representation. The selectable features may further explain or highlight specific features of the product. For example, when a user selects a particular point of interest, additional details regarding a specific feature may be rendered or displayed as part of the 3D product representation. In some embodiments, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">216</span></b><span data-dcnode-id="4309" instrument_node=""> may tailor the points of interest to a user based on user profile information, such as prior purchase history, prior product browsing history, user demographic information, user social media expressions, and/or so forth.</span></div><span data-dcnode-id="4307" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4305" id="p-0119" num="0118"><span data-dcnode-id="4306" instrument_node="">The color swatches may be rendered as a part of the 3D product representation. The color swatches may serve to provide additional color options for a product that may capture the interest of the user. For example, a 3D product representation for a footwear may have a default color. In such a scenario, the color swatches may be selected to modify the default color into other colors. Likewise, the visual textures may be rendered as a part of the 3D product representation. The visual textures may serve to provide additional visual options for the product that may appeal to the user. For example, textures such as stainless steel, wood, polished aluminum, leather, chrome, and brushed nickel may be texture options that are selected and rendered for different aspects of the 3D product representation.</span></div><span data-dcnode-id="4304" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4296" id="p-0120" num="0119"><span data-dcnode-id="4303" instrument_node="">Additional product information may be rendered with the 3D product representation to inform the user. In various embodiments, the additional product information that is provided by the content management system </span><b class="style-scope patent-text" data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">216</span></b><span data-dcnode-id="4300" instrument_node=""> may be localized for the user. For example, the additional product information may be a translation of a product name or product description that is displayed according to the geographical region from which the user is viewing the representation. The geographical region may be determined via a global position system (GPS) locator, an IP address of the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">206</span></b><span data-dcnode-id="4297" instrument_node="">, cellular triangulation, and/or other technologies. The additional product information may also be localized to meet governmental regulations and standards. For example, the additional product information may include health warnings, manufacturing information, usage information, or other appropriate labeling data. Other product information that may be rendered with the 3D product representation may include product reviews, product ratings, related products, user comments, associated social media trends, and/or so forth.</span></div><span data-dcnode-id="4295" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4269" id="p-0121" num="0120"><span data-dcnode-id="4294" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">618</span></b><span data-dcnode-id="4291" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">216</span></b><span data-dcnode-id="4288" instrument_node=""> may provide iconography for rendering with the 3D product representation to the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">206</span></b><span data-dcnode-id="4285" instrument_node="">. The iconography may be provided based on user activity, and can be provided in the form of an iconography file that can be rendered along with the 3D product representation. The iconography data may be stored in the iconography database </span><b class="style-scope patent-text" data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">226</span></b><span data-dcnode-id="4282" instrument_node="">. For example, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">216</span></b><span data-dcnode-id="4279" instrument_node=""> may be aware that the user has looked at the 3D product representation several times in the past or has placed the 3D product representation in a virtual holding place. Accordingly, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">216</span></b><span data-dcnode-id="4276" instrument_node=""> may provide iconography in the form of a virtual buy button that is to be displayed with the 3D product representation. In some instances, the virtual buy button may be accompanied by a custom tailored discount offer to further encourage the user to make the purchase. In another example, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">216</span></b><span data-dcnode-id="4273" instrument_node=""> may be aware that the user has been looking for a product with a particular feature. Accordingly, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">216</span></b><span data-dcnode-id="4270" instrument_node=""> may provide iconography in the form of virtual highlighting (e.g., semi-transparent amber overlay) that draws the attention of the user to a particular feature shown in the 3D product representation.</span></div><span data-dcnode-id="4268" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4248" id="p-0122" num="0121"><span data-dcnode-id="4267" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">620</span></b><span data-dcnode-id="4264" instrument_node="">, the content management system </span><b class="style-scope patent-text" data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">216</span></b><span data-dcnode-id="4261" instrument_node=""> may command shaders on the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">206</span></b><span data-dcnode-id="4258" instrument_node=""> to modify the way in which they present the image data based on environmental input. In various embodiments, the shaders may augment the image data with occlusions, reflections, refractions, and/or other visual effects. Such modification may enable the rendering device </span><b class="style-scope patent-text" data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">206</span></b><span data-dcnode-id="4255" instrument_node=""> to present the 3D product representation in an enhanced virtual reality or an augmented reality. In such embodiments, the input devices </span><b class="style-scope patent-text" data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">204</span></b><span data-dcnode-id="4252" instrument_node=""> may include cameras and/or wearable locators that detect the eye position, orientation, and movement of the user. Input devices such as cameras and scanners may also detect and map the placement of objects in a real environment. The cameras may further detect lighting conditions, which may light source positions, light level, light temperature, and/or other lighting parameters in the real environment. Based on these inputs, the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">206</span></b><span data-dcnode-id="4249" instrument_node=""> may modify the image data of the product for presentation in an augment reality that is visible through the real environment, or for presentation in a virtual reality that simulates the real environment. For example, occlusion includes hiding certain surfaces of an image from view, reflection is the duplication of at least a portion of image to simulate optical effects, and refraction is the splitting of light into its constituent waves.</span></div><span data-dcnode-id="4247" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4230" id="p-0123" num="0122"><span data-dcnode-id="4246" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">622</span></b><span data-dcnode-id="4243" instrument_node="">, the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">206</span></b><span data-dcnode-id="4240" instrument_node=""> may use the shaders to render the image data into a 3D product representation, as well as render the augmentations for the 3D product representation. The rendering device </span><b class="style-scope patent-text" data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">206</span></b><span data-dcnode-id="4237" instrument_node=""> may render the 3D product representation into a rendered augmented reality environment or a rendered virtual reality environment. In various embodiments, the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">206</span></b><span data-dcnode-id="4234" instrument_node=""> may implement one or more optimizations for the rendering. In some embodiments, the shaders may be configured to skip the rendering of image data for visual surfaces that are blocked by other visual surfaces or objects in the foreground. In other embodiments, the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">206</span></b><span data-dcnode-id="4231" instrument_node=""> may pre-rendering certain image data (e.g., the background of the virtual reality environment) to speed up the rendering process.</span></div><span data-dcnode-id="4229" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4197" id="p-0124" num="0123"><span data-dcnode-id="4228" instrument_node="">Returning to decision </span><b class="style-scope patent-text" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">604</span></b><span data-dcnode-id="4225" instrument_node="">, if the user input is not recognized by the web service </span><b class="style-scope patent-text" data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">214</span></b><span data-dcnode-id="4222" instrument_node=""> as a query command (“No” at </span><b class="style-scope patent-text" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">604</span></b><span data-dcnode-id="4219" instrument_node="">), the process </span><b class="style-scope patent-text" data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">600</span></b><span data-dcnode-id="4216" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">624</span></b><span data-dcnode-id="4213" instrument_node="">. At </span><b class="style-scope patent-text" data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">624</span></b><span data-dcnode-id="4210" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">214</span></b><span data-dcnode-id="4207" instrument_node=""> may parse a non-query related user command from the user input and process the user command accordingly. For example, if the user command is a command to rotate or manipulate a rendered 3D product representation, the web service </span><b class="style-scope patent-text" data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">214</span></b><span data-dcnode-id="4204" instrument_node=""> will pass the command to the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">206</span></b><span data-dcnode-id="4201" instrument_node="">. In some embodiments, the manipulation may be performed with a locked field of view so that the 3D product representation may be presented from the correct perspective. However, if the user command is a purchase command, the web service </span><b class="style-scope patent-text" data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">214</span></b><span data-dcnode-id="4198" instrument_node=""> may process the purchase transaction for the product that is represented by the 3D product representation.</span></div><span data-dcnode-id="4196" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4194" id="h-0012" num="0000"><span data-dcnode-id="4195" instrument_node="">Augmented Reality E-Commerce Use Cases</span></div><span data-dcnode-id="4193" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4158" id="p-0125" num="0124"><span data-dcnode-id="4192" instrument_node=""> </span><figref class="style-scope patent-text" data-dcnode-id="4190" idrefs="DRAWINGS"><span data-dcnode-id="4191" instrument_node="">FIG. 7</span></figref><span data-dcnode-id="4189" instrument_node=""> is an exemplary search process </span><b class="style-scope patent-text" data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">700</span></b><span data-dcnode-id="4186" instrument_node=""> for augmented reality e-commerce. At </span><b class="style-scope patent-text" data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">702</span></b><span data-dcnode-id="4183" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">214</span></b><span data-dcnode-id="4180" instrument_node=""> may present a virtual or augmented reality environment to a user that displays 3D product representations of available products. The web service </span><b class="style-scope patent-text" data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">214</span></b><span data-dcnode-id="4177" instrument_node=""> may present the environment by sending virtual or augmented reality image data, product image data, and product data from the content management system </span><b class="style-scope patent-text" data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">216</span></b><span data-dcnode-id="4174" instrument_node=""> to the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">206</span></b><span data-dcnode-id="4171" instrument_node="">. The image data and the product data may be sent from the content management system </span><b class="style-scope patent-text" data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">216</span></b><span data-dcnode-id="4168" instrument_node=""> to the rendering device </span><b class="style-scope patent-text" data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">206</span></b><span data-dcnode-id="4165" instrument_node=""> via the web service </span><b class="style-scope patent-text" data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">214</span></b><span data-dcnode-id="4162" instrument_node="">. The 3D product representations may be presented in a way that enables a user to browse and learn about the available products. In some embodiments, the 3D product representations may be presented as a cover flow. The cover flow may enable the user to sweep through the 3D product representations via user inputs to the input devices </span><b class="style-scope patent-text" data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">204</span></b><span data-dcnode-id="4159" instrument_node="">. The cover flow may provide the user with an experience of flipping through the products. The user inputs may include gestures, voice commands, body movements, facial expressions, selection of virtual icons, etc. In other embodiments, the 3D product representations may be presented via other sequential data presentation techniques, such as a slideshow.</span></div><span data-dcnode-id="4157" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4155" id="p-0126" num="0125"><span data-dcnode-id="4156" instrument_node="">The 3D product representations of products may be displayed in the cover flow or other sequential presentation according to the amount of slotting fees paid by each product vendor or manufacturer. For example, the cost of placing a 3D product representation at a beginning or end of a sequential presentation may be higher, as users typically remember objects at the beginning or end of a sequence better than objects that are in the middle of the sequence. In another example, 3D product representations that are visually prominent may cost more in terms of slotting fee than other 3D product representations. A 3D product representation may be made more visually prominent because of its size, color, resolution, description, etc., relative to such characteristics of the other 3D product representations.</span></div><span data-dcnode-id="4154" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4152" id="p-0127" num="0126"><span data-dcnode-id="4153" instrument_node="">In various embodiments, the 3D product representations may be presented with product data. Such product data may include price information, brand information, and/or user generated content. The user generated content may include product reviews, product commentaries, user product ratings, as well as other user generated information. Such user generate content may assist the user in learning more about the products, evaluating the products, and making purchase decisions with respect to the products.</span></div><span data-dcnode-id="4151" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4128" id="p-0128" num="0127"><span data-dcnode-id="4150" instrument_node="">At decision </span><b class="style-scope patent-text" data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">704</span></b><span data-dcnode-id="4147" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">214</span></b><span data-dcnode-id="4144" instrument_node=""> may determine whether a collaboration request is received from the one or more other users. A collaboration request may initiate a session in which an additional user is able to share in the same virtual reality or augmented reality experience with the user. Accordingly, the additional user may view the same the 3D product representations in the same environment. In some embodiments, the additional user may also have the same ability to control the flow and manipulation of the 3D product representations. According, if the web service </span><b class="style-scope patent-text" data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">214</span></b><span data-dcnode-id="4141" instrument_node=""> determines that one or more collaboration requests are received at decision </span><b class="style-scope patent-text" data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">704</span></b><span data-dcnode-id="4138" instrument_node=""> (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">704</span></b><span data-dcnode-id="4135" instrument_node="">), the process </span><b class="style-scope patent-text" data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">700</span></b><span data-dcnode-id="4132" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">706</span></b><span data-dcnode-id="4129" instrument_node="">.</span></div><span data-dcnode-id="4127" instrument_node="">
