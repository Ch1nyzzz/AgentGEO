</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4101" id="p-0129" num="0128"><span data-dcnode-id="4126" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">706</span></b><span data-dcnode-id="4123" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">214</span></b><span data-dcnode-id="4120" instrument_node=""> may initiate a sharing of the virtual or augmented reality environment with the one or more additional users. In various embodiments, the web service </span><b class="style-scope patent-text" data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">214</span></b><span data-dcnode-id="4117" instrument_node=""> may prompt the rendering devices of each additional user to retrieve the appropriate virtual or augmented reality environment data, product image data, and product data from the content management system </span><b class="style-scope patent-text" data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">216</span></b><span data-dcnode-id="4114" instrument_node=""> for presentation. The virtual or augmented reality environment may be fully interactive, such that each additional user may communicate with the user in the environment, as well as control the 3D product representations using corresponding input devices. The virtual or augmented reality environment data may also include avatar image data, such that the user may see a virtual or an augmented representation of the additional user, and vice versa. However, if the web service </span><b class="style-scope patent-text" data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">214</span></b><span data-dcnode-id="4111" instrument_node=""> determines that no collaboration requests are received (“No” at decision </span><b class="style-scope patent-text" data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">704</span></b><span data-dcnode-id="4108" instrument_node="">), then the process </span><b class="style-scope patent-text" data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">700</span></b><span data-dcnode-id="4105" instrument_node=""> may proceed directly to </span><b class="style-scope patent-text" data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">708</span></b><span data-dcnode-id="4102" instrument_node="">.</span></div><span data-dcnode-id="4100" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4080" id="p-0130" num="0129"><span data-dcnode-id="4099" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">708</span></b><span data-dcnode-id="4096" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">214</span></b><span data-dcnode-id="4093" instrument_node=""> may ascertain a state of the user from observed body language. The observed body language may include facial expressions, body movements, hand gestures, and/or so forth. The web service </span><b class="style-scope patent-text" data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">214</span></b><span data-dcnode-id="4090" instrument_node=""> may receive the body language through the input devices </span><b class="style-scope patent-text" data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">204</span></b><span data-dcnode-id="4087" instrument_node="">. In some embodiments, the web service </span><b class="style-scope patent-text" data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">214</span></b><span data-dcnode-id="4084" instrument_node=""> may process the body language using a cognitive model to determine the state of the user. The state of the user may be one of contentment, sadness, frustration, displeasure, anger, happiness, etc. In other embodiments, the web service </span><b class="style-scope patent-text" data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">214</span></b><span data-dcnode-id="4081" instrument_node=""> may process the body language using other forms of machine learning and classification techniques. For example, a classifier may be trained using various approaches, such as supervised learning, unsupervised learning, semi-supervised learning, naïve Bayes, Bayesian networks, decision trees, neural networks, fuzzy logic models, and/or probabilistic classification models to determine the state of the user.</span></div><span data-dcnode-id="4079" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4059" id="p-0131" num="0130"><span data-dcnode-id="4078" instrument_node="">At decision </span><b class="style-scope patent-text" data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">710</span></b><span data-dcnode-id="4075" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">214</span></b><span data-dcnode-id="4072" instrument_node=""> may determine whether the state of the user indicates that the user desires assistance. In various embodiments, assistance may be triggered if the detected state of the user is one of frustration, displeasure, anger, or some other relevant state. Thus, if the web service </span><b class="style-scope patent-text" data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">214</span></b><span data-dcnode-id="4069" instrument_node=""> determines that the user desires assistance (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">710</span></b><span data-dcnode-id="4066" instrument_node="">), the process </span><b class="style-scope patent-text" data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">700</span></b><span data-dcnode-id="4063" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">712</span></b><span data-dcnode-id="4060" instrument_node="">.</span></div><span data-dcnode-id="4058" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4023" id="p-0132" num="0131"><span data-dcnode-id="4057" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">712</span></b><span data-dcnode-id="4054" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">214</span></b><span data-dcnode-id="4051" instrument_node=""> may present the virtual assistance to the user in the virtual or augmented reality environment. The web service </span><b class="style-scope patent-text" data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">214</span></b><span data-dcnode-id="4048" instrument_node=""> may provide the virtual assistance by providing image data, audio data, and multimedia data from the content management system </span><b class="style-scope patent-text" data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">216</span></b><span data-dcnode-id="4045" instrument_node=""> for presentation by the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">206</span></b><span data-dcnode-id="4042" instrument_node=""> to the user. The virtual assistance may be provided by an automated avatar assistant that is programmed to respond to voice queries from the user with machine generated answers. Alternatively, the virtual assistance may be provide by a virtual representation of a real human assistant who is able to offer help and guide the user. In still other embodiments, the web service </span><b class="style-scope patent-text" data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">214</span></b><span data-dcnode-id="4039" instrument_node=""> may initially provide automated assistance, but escalates to real human assistance if the automated assistance is unable to provide the user with a satisfactory resolution. However, if the web service </span><b class="style-scope patent-text" data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">214</span></b><span data-dcnode-id="4036" instrument_node=""> determines that no user assistance is desired at decision </span><b class="style-scope patent-text" data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">710</span></b><span data-dcnode-id="4033" instrument_node=""> (“No” at decision </span><b class="style-scope patent-text" data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">710</span></b><span data-dcnode-id="4030" instrument_node="">), the process </span><b class="style-scope patent-text" data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">700</span></b><span data-dcnode-id="4027" instrument_node=""> may proceed directly to </span><b class="style-scope patent-text" data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">714</span></b><span data-dcnode-id="4024" instrument_node="">.</span></div><span data-dcnode-id="4022" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4005" id="p-0133" num="0132"><span data-dcnode-id="4021" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">714</span></b><span data-dcnode-id="4018" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">214</span></b><span data-dcnode-id="4015" instrument_node=""> may receive a product selection action by the user. In various embodiments, the user may make a product selection via an interaction with the corresponding 3D product representation that is sequentially presented. For example, the user may select the product by making a pinch gesture on the 3D product representation or virtually touching the 3D product representation. In turn, the web service </span><b class="style-scope patent-text" data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">214</span></b><span data-dcnode-id="4012" instrument_node=""> may present an in-depth version of the 3D product representation. The in-depth version of the 3D product representation may include additional features or show more information than the initial representation. These features and information may include augmentations (e.g., selectable points of interest, selectable textures and colors, iconography), supplementary descriptions, and custom tailored offers. The web service </span><b class="style-scope patent-text" data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">214</span></b><span data-dcnode-id="4009" instrument_node=""> may present the in-depth version based on data retrieved from the content management system </span><b class="style-scope patent-text" data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">216</span></b><span data-dcnode-id="4006" instrument_node="">. The user may manipulate and view the 3D product representation using different angles, perspectives, zoom factors, lighting conditions, alternative views, etc. For example, if the user is looking at a vehicle, the alternative view includes additional accessories that may be installed on the vehicle. Likewise, colors may be overlaid on the 3D product representation to show alternative color options.</span></div><span data-dcnode-id="4004" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3993" id="p-0134" num="0133"><span data-dcnode-id="4003" instrument_node="">The rendering devices </span><b class="style-scope patent-text" data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">206</span></b><span data-dcnode-id="4000" instrument_node=""> may include a haptic feedback device that is able to provide haptic feedback with respect to the physical textures of a product represented by a 3D product representation. The haptic feedback information may be stored in the haptic database </span><b class="style-scope patent-text" data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">232</span></b><span data-dcnode-id="3997" instrument_node="">. For example, the haptic feedback device may be a glove or another article of clothing worn by the user. In at least one embodiment, the haptic feedback device is able to provide physical texture feedback using electrical impulses. The haptic feedback device may simulate physical textures that have various degrees of smoothness, roughness, temperature, etc. In some instances, the haptic feedback device may also provide force feedback to simulate product response to manipulation. For example, bending the sole of a virtual shoe may cause the haptic feedback to simulate the elasticity of the sole and the ability of the sole to return to its original shape. In various embodiments, the web service </span><b class="style-scope patent-text" data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">214</span></b><span data-dcnode-id="3994" instrument_node=""> may receive multiple product selection actions and provide corresponding in-depth versions of the 3D product representations and feedback.</span></div><span data-dcnode-id="3992" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3984" id="p-0135" num="0134"><span data-dcnode-id="3991" instrument_node="">The presentation of the in-depth 3D product representations may involve the use of a virtual mirror. In some embodiments, the virtual mirror may be implemented using rendering devices (e.g., a 3D display) that presents a virtual representation of the user with the product. For example, if the product is a piece of clothing, input devices </span><b class="style-scope patent-text" data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">204</span></b><span data-dcnode-id="3988" instrument_node=""> may capture a 3D virtual likeness of the user. The web service </span><b class="style-scope patent-text" data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">214</span></b><span data-dcnode-id="3985" instrument_node=""> may then graft the 3D representation of the clothing onto the 3D virtual likeness of the user for display by the rendering devices. In this way, the user may be free to view product and the virtual likeness from multiple angles (e.g., 360° degree spin), in order to make a purchase decision.</span></div><span data-dcnode-id="3983" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3978" id="p-0136" num="0135"><span data-dcnode-id="3982" instrument_node="">In other embodiments, the virtual mirror may be implemented using rendering devices in the form of 3D display goggles or helmet. The 3D display goggles or helmet may be equipped with input devices in the form of cameras that capture a real-time image of the user. In such embodiments, the web service </span><b class="style-scope patent-text" data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">214</span></b><span data-dcnode-id="3979" instrument_node=""> may digitally enhance or augment the real-time image of the user so that the 3D display goggles or helmet are digitally erased from the user's head. Such digital enhancement or augmentation may be perform using a 3D image of the user's head from when the user is not wearing the 3D display goggles or helmet. This implementation, which uses 3D display goggles or helmet, may enable the user to look at the 3D likeness of the user with the 3D representation of the product in a virtual mirror, as well as look at the user's own body with the product in an augmented reality view. For example, if the 3D representation is that of a pair of shoes, the user will be able to see a 3D image of himself wearing the 3D representation of the shoes in the virtual mirror, as well as look down to see the 3D representation of the shoes on his or her own feet.</span></div><span data-dcnode-id="3977" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3960" id="p-0137" num="0136"><span data-dcnode-id="3976" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">716</span></b><span data-dcnode-id="3973" instrument_node="">, the web service </span><b class="style-scope patent-text" data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">214</span></b><span data-dcnode-id="3970" instrument_node=""> may receive a product purchase action from the user. The user may make the purchase action by making a predetermined gesture, such as virtually pressing a virtual buy button that is instantiated with the 3D product representation of the product. The gesture may be capture by the input devices </span><b class="style-scope patent-text" data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">204</span></b><span data-dcnode-id="3967" instrument_node=""> and transmitted to the web service </span><b class="style-scope patent-text" data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">214</span></b><span data-dcnode-id="3964" instrument_node="">. In turn, the web service </span><b class="style-scope patent-text" data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">214</span></b><span data-dcnode-id="3961" instrument_node=""> may initiate and complete a product purchase transaction for the product.</span></div><span data-dcnode-id="3959" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3954" id="p-0138" num="0137"><span data-dcnode-id="3958" instrument_node="">In some instances, the product being purchased by the user may not be a product that the user is looking at in a current purchase session. Instead, the product may be a something that the user looked at previously and virtually saved in the virtual or augmented reality environment. In one scenario, the virtual or augmented reality environment may include virtual holding place where the user can store 3D product representations of interest (e.g., products that the user is contemplating to purchase). Accordingly, the user is able to retrieve a 3D product representation and purchase the corresponding product in the same manner as other products. In some embodiments, special offers or discounts may be sent to the user by the web service </span><b class="style-scope patent-text" data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">214</span></b><span data-dcnode-id="3955" instrument_node=""> on behalf of manufacturers or vendors in the virtual or augmented reality environment to further motivate the user to make a purchase.</span></div><span data-dcnode-id="3953" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3942" id="p-0139" num="0138"><span data-dcnode-id="3952" instrument_node="">The purchase transaction may be completed using various transaction instruments, such as a credit card, a debit card, an electronic checking account, a gift card, a digital wallet, etc. Data related to such transaction instruments may be stored in the account database </span><b class="style-scope patent-text" data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">228</span></b><span data-dcnode-id="3949" instrument_node="">. The web service </span><b class="style-scope patent-text" data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">214</span></b><span data-dcnode-id="3946" instrument_node=""> may use a transaction engine to process the purchase transaction. Subsequently, the product may be electronically delivered to the user if the product is a virtual or non-tangible good. Otherwise, if the product is a physical good, then the product may be physically delivered to the user or picked up by the user. In some embodiments, the transaction engine used by the web service </span><b class="style-scope patent-text" data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">214</span></b><span data-dcnode-id="3943" instrument_node=""> may implement security measures with respect to the purchase transaction. For example, the transaction engine may cause an input device in the form of a camera to obtain a scan of the user's face, or a retinal scanner to obtain a scan of the user's eye. The transaction engine may then authorize the transaction if a scan match stored scan data belonging to the user. Other security measures concurrently or alternatively implemented by the transaction engine may include the input of correct security codes, passwords, personal identification numbers (PINs), etc.</span></div><span data-dcnode-id="3941" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3936" id="p-0140" num="0139"><span data-dcnode-id="3940" instrument_node="">The transaction engine may also implement purchase transaction security through the use of behavior data as stored in the cross reference table </span><b class="style-scope patent-text" data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">230</span></b><span data-dcnode-id="3937" instrument_node="">. In such implementations, the transaction engine may flag purchase attempts that do not fit existing user behavior patterns or user profile information as potentially fraudulent. For example, a purchase of a product for delivery to a different part of the country may be flagged. In another example, a purchase of accessories for a product that the user does not own may also trigger a flag. The transaction engine may enable the user to confirm a flagged purchase transaction via additional user authentication, such as telephone, web, or email based identity verification. Through the use of these behavior-based security measures, the transaction engine may prevent or mitigate identity theft and fraudulent purchases. The transaction engine may also support auditing functions, such as the viewing of purchase histories, payment histories, delivery histories, etc., by the user and other authorized parties.</span></div><span data-dcnode-id="3935" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3924" id="p-0141" num="0140"><span data-dcnode-id="3934" instrument_node="">The web service </span><b class="style-scope patent-text" data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">214</span></b><span data-dcnode-id="3931" instrument_node=""> may record aspect of the user browsing, selection, and/or purchase experience for replay by the user or another authorized party. In some implementations, the user may desire to review the various features of the product that the user browsed. Accordingly, the user may select a virtual record feature that is present by the web service </span><b class="style-scope patent-text" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">214</span></b><span data-dcnode-id="3928" instrument_node=""> in the virtual or augmented reality environment to record a manipulation of the 3D product representation. Subsequently, the user may reactivate the virtual or augmented reality environment and replay the manipulation of the 3D product representation via a replay option. In other implementations, the user may desire the share a browsing and/or purchase experience with another user. The web service </span><b class="style-scope patent-text" data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">214</span></b><span data-dcnode-id="3925" instrument_node=""> may once again be activated to record the manipulation of the 3D product representation, which may include a purchase of the corresponding product. The recorded data file may be shared with another user, and the other user may view the recorded data file in a virtual or augmented reality environment as a replay of the user's experience.</span></div><span data-dcnode-id="3923" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3921" id="h-0013" num="0000"><span data-dcnode-id="3922" instrument_node="">Analytics for Augmented Reality E-Commerce</span></div><span data-dcnode-id="3920" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3909" id="p-0142" num="0141"><span data-dcnode-id="3919" instrument_node="">The analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">238</span></b><span data-dcnode-id="3916" instrument_node=""> may track user browsing and manipulations of 3D product representations as well as the user purchases of the products represented by the 3D product representations. The tracked information may be stored in the analytics database </span><b class="style-scope patent-text" data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">236</span></b><span data-dcnode-id="3913" instrument_node="">. The tracking of user manipulation of the 3D product representation may include tracking the orientations, scales, and/or directions at which the user viewed the 3D product representation, as well as user facial features and gestures used during the manipulation. Camera angle with respect to the 3D product representation, user dwell time at each of the orientation, scale, angle, and/or direction, features or descriptions selected or view are also tracked. The tracking of user purchase information may include the purchase price, the number of times the user viewed the 3D product representation before making a purchase of the product, offers or incentives associated with the purchase, and/or so forth. Accordingly, the analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">238</span></b><span data-dcnode-id="3910" instrument_node=""> may generate metrics based on the tracked information.</span></div><span data-dcnode-id="3908" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3906" id="p-0143" num="0142"><span data-dcnode-id="3907" instrument_node="">In various embodiments, the metrics may indicate what aspects of the 3D experience was difficult for the user to understand. For example, a user repeatedly selecting a virtual control in the virtual or augmented reality environment within a predetermined time period may indicate that the user is unclear as the functionality of the virtual control. The metrics may indicate products that most captures each user's interest. Such metrics may be determined based on a frequency that users view particular 3D product representations, dwell time on specific 3D product representations, whether the user saved a 3D product representation for later viewing, and/or so forth. Conversely, the metrics may also indicate the dislikes of users. For example, a 3D product representation that is placed prominently in a cover flow for a user in which the user never views may be an indicated that the user dislikes the product. In another example, one or multiple instances in which user gestures or facial impressions show frustration or anger while viewing a 3D product representation may also indicate that the user dislikes the corresponding product.</span></div><span data-dcnode-id="3905" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3903" id="p-0144" num="0143"><span data-dcnode-id="3904" instrument_node="">The metrics may also reveal the actual driving force in the user making a purchase. For example, the metrics may indicate that average user dwell time and/or purchases by a group users on a 3D product representation increased or decreased after a change. The change may be the additional or removal of certain image data, overlaid information, or iconography from the 3D product representation. The metrics may also show the most frequently viewed 3D image, description, or augmentation prior to purchase of a product by a group of users. Such statistics may be used to increase or maintain the number of sales for a product.</span></div><span data-dcnode-id="3902" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3897" id="p-0145" num="0144"><span data-dcnode-id="3901" instrument_node="">The analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">238</span></b><span data-dcnode-id="3898" instrument_node=""> may also provide replay of the user experiences with the 3D product representations. The replays may be performed per user, per product, or per purchase. The replay of the purchase decisions of the individual users may serve to visually identify common patterns in the purchase decisions as well as the visual imagery that may have motivated the purchase decisions.</span></div><span data-dcnode-id="3896" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3876" id="p-0146" num="0145"><span data-dcnode-id="3895" instrument_node="">The analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">238</span></b><span data-dcnode-id="3892" instrument_node=""> may also show points of interest in the 3D product representations that are viewed or ignored by the users. By collecting viewership statistics across a group of users and cross referencing this information with purchase data, the analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">238</span></b><span data-dcnode-id="3889" instrument_node=""> may identify points of interests that do not contribute to purchases or otherwise distracting users from making purchases. Further, the analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">238</span></b><span data-dcnode-id="3886" instrument_node=""> may identify points of interest that are to be removed. For example, a point of interest regarding a product that is ignored by predetermined percentage of users who purchased the product may be removed from presentation by the analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">238</span></b><span data-dcnode-id="3883" instrument_node="">. The removal of a point of interest for a product may provide an opportunity for the addition of another point of interest for the product. The point of interest to be added may be similar to a point of interest that has worked well for a comparable product (e.g., viewed by a predetermined percentage of users that purchased the comparable product). In some embodiments, the analytics engine </span><b class="style-scope patent-text" data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">238</span></b><span data-dcnode-id="3880" instrument_node=""> may automatically relay the points of interest removal and addition instructions to the web service </span><b class="style-scope patent-text" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">214</span></b><span data-dcnode-id="3877" instrument_node="">.</span></div><span data-dcnode-id="3875" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3849" id="p-0147" num="0146"><span data-dcnode-id="3874" instrument_node="">In some embodiments, the analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">238</span></b><span data-dcnode-id="3871" instrument_node=""> may use the tracked information to provide recommendations of additional products to users. For example, if a user prefers goods of a particular manufacturer, type, style, price point, brand, etc., the analytics engine </span><b class="style-scope patent-text" data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">238</span></b><span data-dcnode-id="3868" instrument_node=""> may communicate this information to the web service </span><b class="style-scope patent-text" data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">214</span></b><span data-dcnode-id="3865" instrument_node="">. In turn, the web service </span><b class="style-scope patent-text" data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">214</span></b><span data-dcnode-id="3862" instrument_node=""> may provide recommendations of similar products to the user during a subsequent visit of the virtual or augmented reality environment by the user. The analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">238</span></b><span data-dcnode-id="3859" instrument_node=""> may also use the tracked information to recommend a virtual reality environment to the user based on the user's product purchases. For example, the analytics engine </span><b class="style-scope patent-text" data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">238</span></b><span data-dcnode-id="3856" instrument_node=""> may recommend to a user that buys traditional furniture items a virtual environment that resembles a Tudor-style private study, while a user that purchases modern furniture items may be recommend an industrial loft style virtual environment. The analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">238</span></b><span data-dcnode-id="3853" instrument_node=""> may provide such recommendation to the web service </span><b class="style-scope patent-text" data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">214</span></b><span data-dcnode-id="3850" instrument_node=""> for implementation using 3D image data upon approval of the user.</span></div><span data-dcnode-id="3848" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3840" id="p-0148" num="0147"><span data-dcnode-id="3847" instrument_node="">Further, the analytics engine </span><b class="style-scope patent-text" data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">238</span></b><span data-dcnode-id="3844" instrument_node=""> may compare the user return visit rate or conversion rate for purchases made as result of 3D experiences in a virtual or augmented reality environment to purchases that result from other sales techniques. Based on such comparison, the analytic engine </span><b class="style-scope patent-text" data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">238</span></b><span data-dcnode-id="3841" instrument_node=""> may generate metrics and statistics that show the effectiveness of the virtual or augmented reality environment in promoting products. The metrics and statistics may show comparisons of time to conversion, impressions per conversion, cost per conversion, customer visit gain or loss rate, and/or so forth. In some instances, such metrics may be used to sign up additional manufacturers or vendors for the 3D virtual or augmented reality e-commerce platform.</span></div><span data-dcnode-id="3839" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3837" id="h-0014" num="0000"><span data-dcnode-id="3838" instrument_node="">Augmented Reality e-Commerce and Virtual Shelving for In-Store Retail</span></div><span data-dcnode-id="3836" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3834" id="p-0149" num="0148"><span data-dcnode-id="3835" instrument_node="">Augmented reality technology may be used to enhance the retail shopping experience for consumers. Described herein are exemplary processes for an in-store augmented reality shopping experience.</span></div><span data-dcnode-id="3833" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3831" id="h-0015" num="0000"><span data-dcnode-id="3832" instrument_node="">Synchronizing a Virtual Shelf to a Physical Environment</span></div><span data-dcnode-id="3830" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3822" id="p-0150" num="0149"><span data-dcnode-id="3829" instrument_node=""> </span><figref class="style-scope patent-text" data-dcnode-id="3827" idrefs="DRAWINGS"><span data-dcnode-id="3828" instrument_node="">FIG. 8</span></figref><span data-dcnode-id="3826" instrument_node=""> is an exemplary process </span><b class="style-scope patent-text" data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">800</span></b><span data-dcnode-id="3823" instrument_node=""> for synchronizing a virtual shelf to a physical environment for in-store augmented reality e-commerce. A virtual shelf may be an augmented reality display of one or more shelves viewed by a user using an augmented reality device, in which one or more 3D objects that virtually represent real-world products appear to the user to be overlaid upon a portion of the user's surrounding physical environment, such as a physical shelf or a table. Virtually shelved 3D objects may be world-locked to a real-world shelf, table or surface. Specifically, as a user moves, the virtually shelved 3D objects appear to stay on the real-world shelf, table or surface.</span></div><span data-dcnode-id="3821" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3819" id="p-0151" num="0150"><span data-dcnode-id="3820" instrument_node="">Further note that virtually shelved 3D objects may appear next to real world objects on display as well, and may be world locked to those real world objects as well as, or instead of, a real-world shelf, table or surface. For example, a virtually shelved 3D object may be an accessory to the real world object, and therefore it may be desirable to world lock the virtual object and real world object together.</span></div><span data-dcnode-id="3818" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3810" id="p-0152" num="0151"><span data-dcnode-id="3817" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">802</span></b><span data-dcnode-id="3814" instrument_node="">, responsive to a request by an experience manager, an augmented reality device may receive a virtual shelf blueprint file. The virtual shelf blueprint file may include positional information for display locations file, and may be stored in and retrieved from a virtual image database. An experience manager may be a content author </span><b class="style-scope patent-text" data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">240</span></b><span data-dcnode-id="3811" instrument_node="">.</span></div><span data-dcnode-id="3809" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3804" id="p-0153" num="0152"><span data-dcnode-id="3808" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">804</span></b><span data-dcnode-id="3805" instrument_node="">, the augmented reality device may direct the experience manager to scan a first reference marker in the real world. A reference marker may be any reference object that may be detected by a sensor on an augmented reality device. A reference marker may be, for example, a reflective tracking ball, an RFID tag, an image of a QR bar code, or any other object which may be detected by a radio sensor, camera, or other type of electronic sensor.</span></div><span data-dcnode-id="3803" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3801" id="p-0154" num="0153"><span data-dcnode-id="3802" instrument_node="">The virtual shelf blueprint file may correspond to a real-world shelf constructed to correspond with the virtual shelf, such that the real-world shelf has reference markers built onto or otherwise displayed on the locations of the real-world shelf corresponding to the reference points in the virtual shelf blueprint file. Alternatively, markers may be on real world objects expected to be on the real-world shelf as well.</span></div><span data-dcnode-id="3800" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3792" id="p-0155" num="0154"><span data-dcnode-id="3799" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">806</span></b><span data-dcnode-id="3796" instrument_node="">, the augmented reality device receives the geospatial data related to the first reference marker after the experience manager has scanned the first reference marker using an augmented reality device sensor. The geospatial data may include the positional data of the first reference marker. At </span><b class="style-scope patent-text" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">808</span></b><span data-dcnode-id="3793" instrument_node="">, the augmented reality device assigns the positional data relating to the scan of the first reference marker to the corresponding reference point in the virtual shelf blueprint file, then prompting the experience manager to scan a second real-world reference marker.</span></div><span data-dcnode-id="3791" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3783" id="p-0156" num="0155"><span data-dcnode-id="3790" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">810</span></b><span data-dcnode-id="3787" instrument_node="">, the augmented reality device receives the geospatial data related to the second reference marker after the experience manager has scanned the second reference marker using an augmented reality device sensor. The geospatial data may include the positional data of the second reference marker. At </span><b class="style-scope patent-text" data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">812</span></b><span data-dcnode-id="3784" instrument_node="">, the augmented reality device assigns the positional data relating to the scan of the second reference marker to the corresponding reference point in the virtual shelf blueprint file.</span></div><span data-dcnode-id="3782" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3777" id="p-0157" num="0156"><span data-dcnode-id="3781" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">814</span></b><span data-dcnode-id="3778" instrument_node="">, the augmented reality device synchronizes the virtual shelf blue print file to the physical shelf using at least the positional data of the first and second reference markers. In some embodiments, additional scanned reference markers may be used to enhance the synchronization process. Once the virtual shelf has been mapped to the physical world, the virtual shelf may be populated with 3D objects pre-determined to be displayed on the virtual shelf. Alternatively, a user who may be an experience manager may assign 3D objects to the available positions on a virtual shelf.</span></div><span data-dcnode-id="3776" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3774" id="h-0016" num="0000"><span data-dcnode-id="3775" instrument_node="">Virtual Shelf Experience Management</span></div><span data-dcnode-id="3773" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3759" id="p-0158" num="0157"><span data-dcnode-id="3772" instrument_node=""> </span><figref class="style-scope patent-text" data-dcnode-id="3770" idrefs="DRAWINGS"><span data-dcnode-id="3771" instrument_node="">FIG. 9</span></figref><span data-dcnode-id="3769" instrument_node=""> is an exemplary process </span><b class="style-scope patent-text" data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">900</span></b><span data-dcnode-id="3766" instrument_node=""> for virtual shelf experience management for in-store augmented reality e-commerce. At </span><b class="style-scope patent-text" data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">902</span></b><span data-dcnode-id="3763" instrument_node="">, an augmented reality device receives a command from a user, who may be an experience manager, to update the virtual shelf information of a 3D object. Alternatively, the user may have issued a command instead to choose a 3D object to assign to a particular location on a virtual shelf A 3D object's virtual shelf location may be stored in virtual image data </span><b class="style-scope patent-text" data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">222</span></b><span data-dcnode-id="3760" instrument_node="">, and may include the position on the virtual shelf as well as the page number of the virtual shelf A virtual shelf display may have a plurality of pages.</span></div><span data-dcnode-id="3758" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3753" id="p-0159" num="0158"><span data-dcnode-id="3757" instrument_node="">In some embodiments, a 3D object may be assigned a display rank instead of a position and page number. In this case, a virtual shelf may populate 3D objects according to display rank. At </span><b class="style-scope patent-text" data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">904</span></b><span data-dcnode-id="3754" instrument_node="">, the augmented reality device receives the user's assignment of a 3D object's virtual shelf position and page number. A user may be given the option to adjust the default display positioning of the assigned 3D object with respect to the orientation of the virtual shelf and/or physical environment augmented reality device.</span></div><span data-dcnode-id="3752" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3741" id="p-0160" num="0159"><span data-dcnode-id="3751" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">906</span></b><span data-dcnode-id="3748" instrument_node="">, the augmented reality device may receive a user's adjustment of the display positioning of the assigned 3D object. In some embodiments, an experience manager may set the default amount of time a consumer may look at a 3D object before metadata related to the 3D object or other related media is surfaced. The metadata or other related media may be accessed from virtual image data </span><b class="style-scope patent-text" data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">222</span></b><span data-dcnode-id="3745" instrument_node=""> or product data </span><b class="style-scope patent-text" data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">224</span></b><span data-dcnode-id="3742" instrument_node="">. Automatically surfaced metadata may be displayed near or overlaid upon the 3D object. Alternatively automatic presentation of metadata or other related media may be triggered by a user looking at a particular reference marker. In various embodiments, the amount of time which may trigger the automatic presentation may be configured to be any length of time between a brief instant and several seconds.</span></div><span data-dcnode-id="3740" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3738" id="p-0161" num="0160"><span data-dcnode-id="3739" instrument_node="">Note that the surfacing of metadata or other related media need not be specific to the 3D object. In the case where a virtual 3D object is displayed along with real world objects on the virtual shelf, a user's gaze may land on location on the virtual shelf predetermined to have a real world object. The gaze landing on that location may trigger the surfacing of metadata or other related media related to the real world object at that location.</span></div><span data-dcnode-id="3737" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3732" id="p-0162" num="0161"><span data-dcnode-id="3736" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">908</span></b><span data-dcnode-id="3733" instrument_node="">, an augmented reality device receives an adjustment of the default time period for automatic presentation of metadata responsive to a user's gaze upon the 3D object. In some embodiments, an experience manager may be allowed to dial up or down the degree of augmented reality visualization in the experience of the user. Similarly he or she may wish to adjust the level of detail in his or her own experience. The adjustment may be related to the granularity of displayed metadata or to the exclusion or inclusion of a certain type of 3D object.</span></div><span data-dcnode-id="3731" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3723" id="p-0163" num="0162"><span data-dcnode-id="3730" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">910</span></b><span data-dcnode-id="3727" instrument_node="">, the augmented reality device receives an adjustment of the default level of detail for a virtual shelf experience. At </span><b class="style-scope patent-text" data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">912</span></b><span data-dcnode-id="3724" instrument_node="">, the augmented reality device may pre-cache the virtual shelf display, including 3D objects on the first page of the display, so that the experience manager may quickly preview the virtual shelf within an augmented reality view either on the augmented reality device or on a device such as a laptop or a tablet.</span></div><span data-dcnode-id="3722" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3702" id="p-0164" num="0163"><span data-dcnode-id="3721" instrument_node="">At decision </span><b class="style-scope patent-text" data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">914</span></b><span data-dcnode-id="3718" instrument_node="">, the augmented reality device may present the user with an option preview the virtual shelf experience that a consumer may see with the latest settings created by the experience manager. Accordingly, if the user selects an option to preview the virtual shelf experience that a consumer may see with the latest settings created by the experience manager (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">914</span></b><span data-dcnode-id="3715" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">900</span></b><span data-dcnode-id="3712" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">916</span></b><span data-dcnode-id="3709" instrument_node="">. However, if the user does not select the option to preview the virtual shelf experience, process </span><b class="style-scope patent-text" data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">900</span></b><span data-dcnode-id="3706" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">918</span></b><span data-dcnode-id="3703" instrument_node="">.</span></div><span data-dcnode-id="3701" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3693" id="p-0165" num="0164"><span data-dcnode-id="3700" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">916</span></b><span data-dcnode-id="3697" instrument_node="">, the augmented reality device renders the virtual shelf for the experience manager to visualize within an augmented reality view either on the augmented reality device or on a device such as a laptop or a tablet. At </span><b class="style-scope patent-text" data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">918</span></b><span data-dcnode-id="3694" instrument_node="">, the experience manager may choose to save the latest changes to be viewed later by the experience manager or as the default virtual shelf layout by a consumer. In various embodiments, an experience manager may implement changes to virtual shelving display using an application on a laptop or tablet, or using an augmented reality device. In some embodiments, an experience manager may view analytics to gain insights on consumer behavior. The analytics view may be called a “Brand Portal” and may require privileged credentials for access. The Brand Portal may provide tools for an experience manager or other brand manager to work with existing tools and software used for determining the placement of products on shelves within the store.</span></div><span data-dcnode-id="3692" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3690" id="h-0017" num="0000"><span data-dcnode-id="3691" instrument_node="">In-Store Augmented Reality Utilizing Reference Markers</span></div><span data-dcnode-id="3689" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3678" id="p-0166" num="0165"><span data-dcnode-id="3688" instrument_node=""> </span><figref class="style-scope patent-text" data-dcnode-id="3686" idrefs="DRAWINGS"><span data-dcnode-id="3687" instrument_node="">FIG. 10</span></figref><span data-dcnode-id="3685" instrument_node=""> is an exemplary process </span><b class="style-scope patent-text" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">1000</span></b><span data-dcnode-id="3682" instrument_node=""> for using reference markers for improved augmented reality device performance and user experience. At </span><b class="style-scope patent-text" data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">1002</span></b><span data-dcnode-id="3679" instrument_node="">, a reference marker is detected by an augmented reality device sensor. The detection of the reference marker by the augmented reality device sensor may provide a positional data to the augmented reality device which may be used to assist in the device's positional tracking functionality. Utilizing reference points may save reduce the processing power necessary for an augmented reality device to render complex world-locked 3D objects while tracking the position of the augmented reality device and the user's field of vision as the user moves and attaining a high quality of experience for the user.</span></div><span data-dcnode-id="3677" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3675" id="p-0167" num="0166"><span data-dcnode-id="3676" instrument_node="">For example, the reference marker may be an RFID tag mounted upon or contained within a real-world shelf A radio sensor connected the augmented reality device may detect the RFID tag without needing the RFID tag to be within a line of sight from the augmented reality device. When the radio sensor detects that the RFID tag is within a predetermined proximity, the augmented reality device may be configured to trigger an event such as pre-caching a 3D object or initiating an introductory media presentation. In some embodiments, a reference marker may be an object that may be sensed by a light sensor, infrared sensor, RFID sensor, or Kinect sensor, such as a reflective tracking ball or QR bar code.</span></div><span data-dcnode-id="3674" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3657" id="p-0168" num="0167"><span data-dcnode-id="3673" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">1004</span></b><span data-dcnode-id="3670" instrument_node="">, the augmented reality device incorporates into its positional tracking processing the positional data indicated by or related to the sensed reference marker. At decision </span><b class="style-scope patent-text" data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">1006</span></b><span data-dcnode-id="3667" instrument_node="">, the augmented reality device may determine from the data provided by the sensed reference marker whether the reference marker corresponds to triggered metadata, rich media, or the presentation of a 3D object. Triggered media corresponding to a reference marker may be any image, 3D object, animation, or video that may appear when a reference marker is within a predetermined proximity to the augmented reality device, or alternatively, when the reference marker is within the field of vision of the user wearing the augmented reality device for a predetermined period of time. Accordingly, if the reference marker does not correspond to triggered metadata, rich media, or the presentation of a 3D object (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">1006</span></b><span data-dcnode-id="3664" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">1000</span></b><span data-dcnode-id="3661" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">1008</span></b><span data-dcnode-id="3658" instrument_node="">.</span></div><span data-dcnode-id="3656" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3645" id="p-0169" num="0168"><span data-dcnode-id="3655" instrument_node="">However, if the reference marker does not correspond to triggered metadata, rich media, or the presentation of a 3D object (“No” at decision </span><b class="style-scope patent-text" data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">1006</span></b><span data-dcnode-id="3652" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">1000</span></b><span data-dcnode-id="3649" instrument_node=""> may proceed to decision </span><b class="style-scope patent-text" data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">1014</span></b><span data-dcnode-id="3646" instrument_node="">. Accordingly, the augmented reality device may passively detect when the reference marker is no longer sensed to be within the proximity of the device.</span></div><span data-dcnode-id="3644" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3636" id="p-0170" num="0169"><span data-dcnode-id="3643" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">1008</span></b><span data-dcnode-id="3640" instrument_node="">, the augmented reality device pre-caches the 3D object determined to be corresponding to the reference marker in step </span><b class="style-scope patent-text" data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">1006</span></b><span data-dcnode-id="3637" instrument_node="">. For example, a 3D object relating to an RFID tag may be pre-cached to be viewed if a user triggers the rendering and presentation of the 3D object by directing their field of vision toward a particular real-world location or reference marker.</span></div><span data-dcnode-id="3635" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3633" id="p-0171" num="0170"><span data-dcnode-id="3634" instrument_node="">In some embodiments, the data to be pre-cached may be uploaded to the augmented reality device wirelessly from local storage near the reference marker. The local storage may be any storage device capable of transmitting data to the augmented reality device, and may be configured by an experience manager.</span></div><span data-dcnode-id="3632" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3630" id="p-0172" num="0171"><span data-dcnode-id="3631" instrument_node="">Alternatively, the data to be pre-cached may be uploaded to the augmented reality device wirelessly from a wireless router positioned near the reference marker. The wireless router may be a conventional Wi-Fi router or may be a higher-frequency router which may require a line of sight to transfer data to the augmented reality device.</span></div><span data-dcnode-id="3629" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3624" id="p-0173" num="0172"><span data-dcnode-id="3628" instrument_node="">At decision </span><b class="style-scope patent-text" data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">1010</span></b><span data-dcnode-id="3625" instrument_node="">, the augmented reality device may sense that the user has directed the field of vision of the augmented reality device toward the display location of the 3D object, metadata display, or other media corresponding to the originally sensed reference marker. The display location is the area or reference point in the real-world which the 3D object corresponding is configured to be world-locked and displayed.</span></div><span data-dcnode-id="3623" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3612" id="p-0174" num="0173"><span data-dcnode-id="3622" instrument_node="">If the augmented reality device has sensed that the user has directed the field of vision of the augmented reality device toward the display location of the 3D object, metadata display, or other media corresponding to the originally sensed reference marker (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">1010</span></b><span data-dcnode-id="3619" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">1000</span></b><span data-dcnode-id="3616" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">1012</span></b><span data-dcnode-id="3613" instrument_node="">.</span></div><span data-dcnode-id="3611" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3600" id="p-0175" num="0174"><span data-dcnode-id="3610" instrument_node="">If the augmented reality device has not sensed that the user has directed the field of vision of the augmented reality device toward the display location of the 3D object, metadata display, or other media corresponding to the originally sensed reference marker (“No” at decision </span><b class="style-scope patent-text" data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">1006</span></b><span data-dcnode-id="3607" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">1000</span></b><span data-dcnode-id="3604" instrument_node=""> may proceed to decision </span><b class="style-scope patent-text" data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">1014</span></b><span data-dcnode-id="3601" instrument_node="">.</span></div><span data-dcnode-id="3599" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3582" id="p-0176" num="0175"><span data-dcnode-id="3598" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">1012</span></b><span data-dcnode-id="3595" instrument_node="">, the augmented reality device presents the pre-cached asset. At decision </span><b class="style-scope patent-text" data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">1014</span></b><span data-dcnode-id="3592" instrument_node="">, the augmented reality device may determine whether the reference marker is within the predetermined proximity of the augmented reality device. Accordingly, if augmented reality device has determined that the reference marker is no longer within the predetermined proximity of the augmented reality device (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">1014</span></b><span data-dcnode-id="3589" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">1000</span></b><span data-dcnode-id="3586" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">1016</span></b><span data-dcnode-id="3583" instrument_node="">.</span></div><span data-dcnode-id="3581" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3567" id="p-0177" num="0176"><span data-dcnode-id="3580" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">1016</span></b><span data-dcnode-id="3577" instrument_node="">, the augmented reality device may delete from its cache any unused data relating to the reference marker. However, if augmented reality device has not determined that the reference marker is no longer within the predetermined proximity of the augmented reality device (“No” at decision </span><b class="style-scope patent-text" data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">1014</span></b><span data-dcnode-id="3574" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">1000</span></b><span data-dcnode-id="3571" instrument_node=""> may return to </span><b class="style-scope patent-text" data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">1002</span></b><span data-dcnode-id="3568" instrument_node="">.</span></div><span data-dcnode-id="3566" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3564" id="h-0018" num="0000"><span data-dcnode-id="3565" instrument_node="">In-Store Augmented Reality User Experience</span></div><span data-dcnode-id="3563" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3555" id="p-0178" num="0177"><span data-dcnode-id="3562" instrument_node=""> </span><figref class="style-scope patent-text" data-dcnode-id="3560" idrefs="DRAWINGS"><span data-dcnode-id="3561" instrument_node="">FIG. 11</span></figref><span data-dcnode-id="3559" instrument_node=""> is an exemplary process </span><b class="style-scope patent-text" data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">1100</span></b><span data-dcnode-id="3556" instrument_node=""> for in-store augmented reality e-commerce user experience. The real-world area of an in-store virtual shopping experience may be a portion of a larger store such as a department store or a brand retail store. The real-world area may include a unit of physical display shelves which corresponds to virtual shelves pre-configured to display 3D objects for a user using an augmented reality device. The real-world area may also include a display platform, which may be on the floor near the display shelves. Additionally, within the real-world area may be a display table which may be used for displaying featured items, presentations, interactive experiences, or other 3D objects selected by the user to be displayed.</span></div><span data-dcnode-id="3554" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3549" id="p-0179" num="0178"><span data-dcnode-id="3553" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">1102</span></b><span data-dcnode-id="3550" instrument_node="">, an augmented reality device may receive a request from a user to initiate a virtual shopping experience. The virtual shopping experience may include a virtual shelf display corresponding to a real-world object such as a table or shelves. The virtual shelf display may include 3D objects preconfigured by an experience manager to populate in predetermined positions on the real-world shelves.</span></div><span data-dcnode-id="3548" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3546" id="p-0180" num="0179"><span data-dcnode-id="3547" instrument_node="">In some embodiments, a virtual shopping experience may include a pre-recorded presentation of a person or animated character. For example a celebrity, paid actor, or animated cartoon character may appear to the user of the augmented reality device to be present within the real-world environment of the user as a part of the initiated virtual shopping experience.</span></div><span data-dcnode-id="3545" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3531" id="p-0181" num="0180"><span data-dcnode-id="3544" instrument_node="">At decision </span><b class="style-scope patent-text" data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">1104</span></b><span data-dcnode-id="3541" instrument_node="">, the augmented reality device may determine that the virtual shopping experience includes introductory media, such as a pre-recorded presentation of a celebrity. Accordingly, if the augmented reality device has not determine that the virtual shopping experience includes introductory media, such as a pre-recorded presentation of a celebrity (“No” at decision </span><b class="style-scope patent-text" data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">1104</span></b><span data-dcnode-id="3538" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">1100</span></b><span data-dcnode-id="3535" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">1108</span></b><span data-dcnode-id="3532" instrument_node="">.</span></div><span data-dcnode-id="3530" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3519" id="p-0182" num="0181"><span data-dcnode-id="3529" instrument_node="">However, if the augmented reality device has determined that the virtual shopping experience includes introductory media, such as a pre-recorded presentation of a celebrity (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">1104</span></b><span data-dcnode-id="3526" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">1100</span></b><span data-dcnode-id="3523" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">1106</span></b><span data-dcnode-id="3520" instrument_node="">.</span></div><span data-dcnode-id="3518" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3507" id="p-0183" num="0182"><span data-dcnode-id="3517" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">1106</span></b><span data-dcnode-id="3514" instrument_node="">, the augmented reality devices renders and presents the introductory media at a predetermined location, such as on a platform. At </span><b class="style-scope patent-text" data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">1108</span></b><span data-dcnode-id="3511" instrument_node="">, the augmented reality devices renders and presents 3D objects according to the virtual shelf layout of the virtual shopping experience. At </span><b class="style-scope patent-text" data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">1110</span></b><span data-dcnode-id="3508" instrument_node="">, a user may select a particular 3D object to be displayed on a display surface such as a table. The user may have the option of zooming in, customizing the item related to the 3D object, and interacting in different ways with the 3D object using the user interface. The user may at any time during the virtual shopping experience have the ability to choose items which he or she may possibly purchase.</span></div><span data-dcnode-id="3506" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3501" id="p-0184" num="0183"><span data-dcnode-id="3505" instrument_node="">A virtual shelf layout may have more 3D objects available to view than available spaces on the real-world shelf, and so the augmented reality device may provide an option to the user to view the next page of 3D objects. At </span><b class="style-scope patent-text" data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">1112</span></b><span data-dcnode-id="3502" instrument_node="">, the augmented reality device may receive the user's command to turn the page, and may render and present the next page of 3D objects. In some embodiments, the next page may have already been pre-cached if memory was available.</span></div><span data-dcnode-id="3500" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3477" id="p-0185" num="0184"><span data-dcnode-id="3499" instrument_node="">At decision </span><b class="style-scope patent-text" data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">1114</span></b><span data-dcnode-id="3496" instrument_node="">, the augmented reality device may detect that the user has looked at a 3D object for the period of time pre-configured to trigger automatic surfacing of metadata related to the 3D object. Accordingly, if the augmented reality device has not detected that the user has looked at a 3D object for the period of time pre-configured to trigger automatic surfacing of metadata related to the 3D object (“No” at decision </span><b class="style-scope patent-text" data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">1114</span></b><span data-dcnode-id="3493" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">1100</span></b><span data-dcnode-id="3490" instrument_node=""> may return to </span><b class="style-scope patent-text" data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">1110</span></b><span data-dcnode-id="3487" instrument_node="">. However, if the augmented reality device has detected that the user has looked at a 3D object for the period of time pre-configured to trigger automatic surfacing of metadata related to the 3D object (“Yes” at decision </span><b class="style-scope patent-text" data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">1114</span></b><span data-dcnode-id="3484" instrument_node="">), process </span><b class="style-scope patent-text" data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">1100</span></b><span data-dcnode-id="3481" instrument_node=""> may proceed to </span><b class="style-scope patent-text" data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">1116</span></b><span data-dcnode-id="3478" instrument_node="">.</span></div><span data-dcnode-id="3476" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3471" id="p-0186" num="0185"><span data-dcnode-id="3475" instrument_node="">At </span><b class="style-scope patent-text" data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">1116</span></b><span data-dcnode-id="3472" instrument_node="">, the augmented reality device presents the metadata related to the 3D object. The metadata may be displayed near the 3D object or overlaid upon the 3D object. Additionally, media such as product reviews, instructional or promotional videos, or data related to pricing comparisons on websites such as Amazon.com or Walmart.com may be displayed.</span></div><span data-dcnode-id="3470" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3468" id="p-0187" num="0186"><span data-dcnode-id="3469" instrument_node="">In some embodiments, two users wearing separate headsets may experience the same virtual shopping experience, i.e., simultaneously view a virtual shelf of 3D objects or interact with a 3D object. One user may be a guide or salesman or both users may be shoppers.</span></div><span data-dcnode-id="3467" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3465" id="p-0188" num="0187"><span data-dcnode-id="3466" instrument_node="">In some embodiments, an augmented reality device may be used for a virtual shopping experience throughout a large store, such as a department store or a home improvement store. A virtual shopping experience in a large store may be configured to have virtual shelf displays in several aisles. A shopper may use an augmented reality device for in-store navigation to find the correct aisle for a certain item, or for searching the store for sale-priced items.</span></div><span data-dcnode-id="3464" instrument_node="">
