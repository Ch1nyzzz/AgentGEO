</span><div class="abstract style-scope patent-text" data-dcnode-id="7011"><span data-dcnode-id="7012" instrument_node="">The augmented reality e-commerce may maximize limited physical space within a store by providing virtual displays of products in predetermined physical spaces. A virtual shelf blueprint that includes positional information for virtual display locations on a virtual shelf may be received. Subsequently, geospatial sensor scans of multiple reference markers in a real-world may be received. The multiple reference markers may correspond to reference points in the virtual shelf blueprint. The virtual shelf may be mapped to the real-world based on the multiple reference markers, in which the mapping may be performed by assigning positional data of the multiple reference markers to the reference points in the virtual shelf blueprint. The virtual shelf may be populated with one or more 3-dimensional (3D) objects that virtually represent at least one real-world product for viewing via an augmented reality device.</span></div><span data-dcnode-id="7010" instrument_node="">
</span></abstract><span data-dcnode-id="7008" instrument_node="">

</span><section class="flex style-scope patent-text" data-dcnode-id="3452" id="text"><div class="description style-scope patent-text" data-dcnode-id="3454" lang="EN" load-source="patent-office" mxw-id="PDES187088726"><span data-dcnode-id="5822" instrument_node="">
</span><heading class="style-scope patent-text" data-dcnode-id="5820" id="h-0001"><span data-dcnode-id="5821" instrument_node="">CROSS REFERENCE TO RELATED PATENT APPLICATION</span></heading><span data-dcnode-id="5819" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5817" id="p-0002" num="0001"><span data-dcnode-id="5818" instrument_node="">This application claims priority to U.S. Provisional Patent Application No. 62/222,146, filed on Sep. 22, 2015, entitled “Augmented Reality E-Commerce for In-Store Retail,” which is hereby incorporated by reference in its entirety.</span></div><span data-dcnode-id="5816" instrument_node="">
</span><heading class="style-scope patent-text" data-dcnode-id="5814" id="h-0002"><span data-dcnode-id="5815" instrument_node="">BACKGROUND</span></heading><span data-dcnode-id="5813" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5811" id="p-0003" num="0002"><span data-dcnode-id="5812" instrument_node="">There are many techniques to generate illusions, or specifically to present artificial experiences over an observer's experiences. Illusion techniques may relate to how to position imagery within an environment. For example, the Pepper's Ghost illusion uses half mirrors or semi-reflective glass panes to present images next to physical objects. Illusion techniques may also relate to how to animate imagery. With the advent of computerized graphics, there are an increasing number of illusion techniques related to computer animations. For example, the Pinball 2000™ platform from WMS Industries, Inc., uses Pepper's Ghost techniques to display computer generated objects not only next to pinball bumpers and obstacles, but also to interact with the pinball in motion.</span></div><span data-dcnode-id="5810" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5808" id="p-0004" num="0003"><span data-dcnode-id="5809" instrument_node="">Accordingly, objects may be fully computer generated. Such objects are called virtual objects. In general, virtual items are computer generated items. For example, a computer generated environment is called a virtual environment. In contrast, real world items are called physical items. Moreover, the real world comprises a physical environment and physical objects. While physical items may be called real items in some contexts, the term “physical” is used in this patent application to prevent confusion in referring to objects in augmented or virtual “reality” environments and objects in the “real world.”</span></div><span data-dcnode-id="5807" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5805" id="p-0005" num="0004"><span data-dcnode-id="5806" instrument_node="">The technique of overlaying animated virtual objects over physical objects and a physical environment is called augmented reality. Specifically, an observer's experience in the physical world is augmented with computer animations presented in observer's context. Thus, the addition of virtual objects not only add to the observer's experience, the virtual objects are also relevant to the observer's activities at that time.</span></div><span data-dcnode-id="5804" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5802" id="p-0006" num="0005"><span data-dcnode-id="5803" instrument_node="">Augmented reality is distinct from virtual reality. Augmented reality overlays virtual objects over the physical world. In contrast, virtual reality is comprised solely virtual objects and generally is a completely virtual experience. For example, Google Glasses™ allow an observer to perceive the physical world through glasses, but overlay virtual objects over the glasses to augment the wearer's experience. However, Oculus Rift™ displays solely virtual objects. A virtual reality headset worn by a user may project into the user's field of vision images that may cause the user to perceive that he or she is immersed in a virtual world.</span></div><span data-dcnode-id="5801" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5799" id="p-0007" num="0006"><span data-dcnode-id="5800" instrument_node="">One common experience is that of commerce. With the rise of the internet, e-commerce, the searching, inspecting and purchasing of objects via a computer, usually over the internet, has become a daily experience. With the ubiquity of computing resources and multimedia capture devices, e-commerce experiences have been the subject of augmented reality. For example, Lego™ stores have computer screens such that when a customer holds an unboxed Lego kit, the screen shows the customer holding the box with an animated virtual constructed kit on the box. As the customer moves the box, the virtual objects move as well, thereby providing the customer with a degree of manipulation control over the virtual objects.</span></div><span data-dcnode-id="5798" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5796" id="p-0008" num="0007"><span data-dcnode-id="5797" instrument_node="">Further, companies have found that the chance of a customer making a purchase is greatly improved when guided by a company representative who can adapt to the specific needs of the customer. For example, intervention by a car salesman may increase the chance a customer may purchase a car at a car lot. Additionally, sales representatives for companies selling home appliances often visit the homes of prospective customers. This method has been known to facilitate sales by addressing constraints specific to a given customer's home, e.g., special measurements and interior design considerations.</span></div><span data-dcnode-id="5795" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5793" id="p-0009" num="0008"><span data-dcnode-id="5794" instrument_node="">Accordingly, sales rates may be further increased by allowing enhanced visualization of products within the home before having to expensively ship a physical product which may not be a good fit. The sales process would benefit from enhanced methods for quickly taking measurements and identifying constraints within the home.</span></div><span data-dcnode-id="5792" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5790" id="p-0010" num="0009"><span data-dcnode-id="5791" instrument_node="">E-commerce has greatly affected the way consumers shop for retail goods online as well as in a retail setting, such as in a department store or in a brand retail store. When shopping in a retail store, consumers are often omni-channel shopping, which is to say that they are using a mobile device to compare prices and similar items available in other stores or through e-commerce websites. Accordingly, retail stores often have limited physical space to display items that consumers are often actively comparing with a larger selection of similar goods.</span></div><span data-dcnode-id="5789" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5787" id="p-0011" num="0010"><span data-dcnode-id="5788" instrument_node="">Additionally, limitations of conventional augmented reality devices include constraints related to storing, caching, and rendering complex 3-dimensional image files. It has been particularly challenging to provide a high quality of experience while rendering the visualization of one or more complex 3-dimensional objects world-locked to the user's physical environment—that is virtual objects tied or anchored to real world objects as not to appear to slip or move away from the real world objects—while a user is moving around.</span></div><span data-dcnode-id="5786" instrument_node="">
</span><description-of-drawings class="style-scope patent-text" data-dcnode-id="5712"><span data-dcnode-id="5785" instrument_node="">

</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5780" id="p-0012" num="0011"><span data-dcnode-id="5781" instrument_node="">The Detailed Description is set forth with reference to the accompanying figures.</span></div><span data-dcnode-id="5779" instrument_node="">

</span><heading class="style-scope patent-text" data-dcnode-id="5709" id="h-0004"><span data-dcnode-id="5710" instrument_node="">DETAILED DESCRIPTION</span></heading><span data-dcnode-id="5708" instrument_node="">
</span><heading class="style-scope patent-text" data-dcnode-id="5706" id="h-0005"><span data-dcnode-id="5707" instrument_node="">Definitions</span></heading><span data-dcnode-id="5705" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5703" id="p-0024" num="0023"><span data-dcnode-id="5704" instrument_node="">Preliminary to proceeding with the detailed description, the following term definitions are provided:</span></div><span data-dcnode-id="5702" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5700" id="p-0025" num="0024"><span data-dcnode-id="5701" instrument_node="">360° Spin Representation—Model data for a virtual object so that it may be viewed from any angle, where an observer may move around the object, and where the mounting is not visible. A consequence of 360° spin representation is that it is more difficult to create content since mounts are harder to hide, and non-rigid objects have to be made rigid.</span></div><span data-dcnode-id="5699" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5697" id="p-0026" num="0025"><span data-dcnode-id="5698" instrument_node="">Augmented Reality—The overlaying of virtual objects and/or other virtual experiences over the physical environment and/or physical objects in the context of an observer's activities.</span></div><span data-dcnode-id="5696" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5694" id="p-0027" num="0026"><span data-dcnode-id="5695" instrument_node="">Brand Data—Product promotional data from the manufacturer of a product, which may include: logos, endorsements, and coupons.</span></div><span data-dcnode-id="5693" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5691" id="p-0028" num="0027"><span data-dcnode-id="5692" instrument_node="">Environment—The area surrounding an observer providing context and a locale for the observer to interact with the objects.</span></div><span data-dcnode-id="5690" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5688" id="p-0029" num="0028"><span data-dcnode-id="5689" instrument_node="">Immersion—Completely surrounded with a virtual environment and virtual objects. For example the Oculus Rift™ provides an immersive virtual experience.</span></div><span data-dcnode-id="5687" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5685" id="p-0030" num="0029"><span data-dcnode-id="5686" instrument_node="">Model—A graphical three-dimensional (3D) virtual object to be rendered.</span></div><span data-dcnode-id="5684" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5682" id="p-0031" num="0030"><span data-dcnode-id="5683" instrument_node="">Model Data—The data used to render a Model. Model data may comprise: objects, meshes, textures, and shaders.</span></div><span data-dcnode-id="5681" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5679" id="p-0032" num="0031"><span data-dcnode-id="5680" instrument_node="">Next Best Thing (NBT)—A virtual object model data representation with fidelity less than 360° spin representation. NBT is a resolution fallback if a computer client lacks support 360° spin representation.</span></div><span data-dcnode-id="5678" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5676" id="p-0033" num="0032"><span data-dcnode-id="5677" instrument_node="">Overlay—The adding of virtual objects to a physical environment. For example, Google Glasses™ overlays virtual objects over the physical environment as perceived through the glasses.</span></div><span data-dcnode-id="5675" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5673" id="p-0034" num="0033"><span data-dcnode-id="5674" instrument_node="">Photorealism/Photorealistic—The quality of being visually indistinguishable from physical objects.</span></div><span data-dcnode-id="5672" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5670" id="p-0035" num="0034"><span data-dcnode-id="5671" instrument_node="">Product Data—Data specific to a product to be sold, which may include: product name, Stock Keeping Unit (SKU), price, Universal Product Code (UPC) number, and branding data.</span></div><span data-dcnode-id="5669" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5667" id="p-0036" num="0035"><span data-dcnode-id="5668" instrument_node="">User Generated Content—Product data created by customers and may include: multimedia reviews, ratings, and unboxing videos.</span></div><span data-dcnode-id="5666" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5664" id="p-0037" num="0036"><span data-dcnode-id="5665" instrument_node="">Virtual Reality—A computer generated experience comprising a virtual environment and virtual objects.</span></div><span data-dcnode-id="5663" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5661" id="p-0038" num="0037"><span data-dcnode-id="5662" instrument_node="">WebGL—A standard Application Programming Interface (API) to render graphics, in which a viewer or rendering platform does not support WebGL, or in which platform support is lacking. Typically, a platform will support fallback to other alternative graphical APIs if WebGL is not supported.</span></div><span data-dcnode-id="5660" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5658" id="h-0006" num="0000"><span data-dcnode-id="5659" instrument_node="">Overview of Augmented Reality E-Commerce</span></div><span data-dcnode-id="5657" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5649" id="p-0039" num="0038"><span data-dcnode-id="5656" instrument_node="">An augmented reality e-commerce platform may be conceived as a content management system. Content is authored and maintained. Content is served upon request subject to various constraints, typically to an intermediary such as a web site. Content is rendered to an end user. Service of content is generally metered, billed, and audited. These processes are illustrated with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5654" idrefs="DRAWINGS"><span data-dcnode-id="5655" instrument_node="">FIG. 1</span></figref><span data-dcnode-id="5653" instrument_node="">, a context diagram for augmented reality e-commerce </span><b class="style-scope patent-text" data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">100</span></b><span data-dcnode-id="5650" instrument_node="">.</span></div><span data-dcnode-id="5648" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5616" id="p-0040" num="0039"><span data-dcnode-id="5647" instrument_node="">The augmented reality e-commerce platform, or platform for short, </span><b class="style-scope patent-text" data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">102</span></b><span data-dcnode-id="5644" instrument_node=""> receives content from content authors </span><b class="style-scope patent-text" data-dcnode-id="5642"><span data-dcnode-id="5643" instrument_node="">104</span></b><span data-dcnode-id="5641" instrument_node="">. Content authors </span><b class="style-scope patent-text" data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">104</span></b><span data-dcnode-id="5638" instrument_node=""> may be developers for the platform </span><b class="style-scope patent-text" data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">106</span></b><span data-dcnode-id="5635" instrument_node="">, third parties </span><b class="style-scope patent-text" data-dcnode-id="5633"><span data-dcnode-id="5634" instrument_node="">108</span></b><span data-dcnode-id="5632" instrument_node="">, or commercial sources such as retailers and manufacturers </span><b class="style-scope patent-text" data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">110</span></b><span data-dcnode-id="5629" instrument_node="">. Content authors </span><b class="style-scope patent-text" data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">104</span></b><span data-dcnode-id="5626" instrument_node=""> may use standard tools </span><b class="style-scope patent-text" data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">112</span></b><span data-dcnode-id="5623" instrument_node=""> to develop content prior to upload to the platform </span><b class="style-scope patent-text" data-dcnode-id="5621"><span data-dcnode-id="5622" instrument_node="">102</span></b><span data-dcnode-id="5620" instrument_node="">. The content authoring process is described in greater detail with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5618" idrefs="DRAWINGS"><span data-dcnode-id="5619" instrument_node="">FIG. 5</span></figref><span data-dcnode-id="5617" instrument_node="">.</span></div><span data-dcnode-id="5615" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5580" id="p-0041" num="0040"><span data-dcnode-id="5614" instrument_node="">The augmented reality e-commerce platform </span><b class="style-scope patent-text" data-dcnode-id="5612"><span data-dcnode-id="5613" instrument_node="">102</span></b><span data-dcnode-id="5611" instrument_node=""> (platform) serves content based on requests from a consumer facing web site </span><b class="style-scope patent-text" data-dcnode-id="5609"><span data-dcnode-id="5610" instrument_node="">114</span></b><span data-dcnode-id="5608" instrument_node="">. The augmented reality e-commerce platform </span><b class="style-scope patent-text" data-dcnode-id="5606"><span data-dcnode-id="5607" instrument_node="">102</span></b><span data-dcnode-id="5605" instrument_node=""> may take on many manifestations, one of which is a content management system by itself, others are the content management system combined with other infrastructure. The content management system and its surrounding infrastructure are discussed in further detail with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5603" idrefs="DRAWINGS"><span data-dcnode-id="5604" instrument_node="">FIG. 2</span></figref><span data-dcnode-id="5602" instrument_node="">. The web site </span><b class="style-scope patent-text" data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">114</span></b><span data-dcnode-id="5599" instrument_node=""> is generally making requests in response to prompts from an end user </span><b class="style-scope patent-text" data-dcnode-id="5597"><span data-dcnode-id="5598" instrument_node="">116</span></b><span data-dcnode-id="5596" instrument_node="">, where the end user is operating an augmented reality viewer </span><b class="style-scope patent-text" data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">118</span></b><span data-dcnode-id="5593" instrument_node=""> that is coupled to a computer </span><b class="style-scope patent-text" data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">120</span></b><span data-dcnode-id="5590" instrument_node="">. In turn, the augmented virtual reality viewer </span><b class="style-scope patent-text" data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">118</span></b><span data-dcnode-id="5587" instrument_node=""> is used by the end user to access the web site </span><b class="style-scope patent-text" data-dcnode-id="5585"><span data-dcnode-id="5586" instrument_node="">114</span></b><span data-dcnode-id="5584" instrument_node="">. The service of content process is described in greater detail with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5582" idrefs="DRAWINGS"><span data-dcnode-id="5583" instrument_node="">FIG. 4</span></figref><span data-dcnode-id="5581" instrument_node="">.</span></div><span data-dcnode-id="5579" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5547" id="p-0042" num="0041"><span data-dcnode-id="5578" instrument_node="">As mentioned above, the web site </span><b class="style-scope patent-text" data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">114</span></b><span data-dcnode-id="5575" instrument_node=""> makes requests of the augmented reality e-commerce platform </span><b class="style-scope patent-text" data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">102</span></b><span data-dcnode-id="5572" instrument_node=""> based on prompts from an end user </span><b class="style-scope patent-text" data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">116</span></b><span data-dcnode-id="5569" instrument_node="">. The web site </span><b class="style-scope patent-text" data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">114</span></b><span data-dcnode-id="5566" instrument_node=""> generally does not merely forward requests from end user </span><b class="style-scope patent-text" data-dcnode-id="5564"><span data-dcnode-id="5565" instrument_node="">116</span></b><span data-dcnode-id="5563" instrument_node="">. Rather, the web site </span><b class="style-scope patent-text" data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">114</span></b><span data-dcnode-id="5560" instrument_node=""> constructs an augmented reality experience by using the content served from the platform </span><b class="style-scope patent-text" data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">102</span></b><span data-dcnode-id="5557" instrument_node=""> as virtual objects to overlay over the physical environment and objects of the end user </span><b class="style-scope patent-text" data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">116</span></b><span data-dcnode-id="5554" instrument_node="">. The logic as to what virtual objects to overlay, and how, generally resides in the web site </span><b class="style-scope patent-text" data-dcnode-id="5552"><span data-dcnode-id="5553" instrument_node="">114</span></b><span data-dcnode-id="5551" instrument_node="">. The process to generate and present an augmented reality end user experience is described in greater detail with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5549" idrefs="DRAWINGS"><span data-dcnode-id="5550" instrument_node="">FIG. 6</span></figref><span data-dcnode-id="5548" instrument_node="">.</span></div><span data-dcnode-id="5546" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5523" id="p-0043" num="0042"><span data-dcnode-id="5545" instrument_node="">The various entities interacting with the augmented reality e-commerce platform </span><b class="style-scope patent-text" data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">102</span></b><span data-dcnode-id="5542" instrument_node=""> may be interested in collecting metrics from end users </span><b class="style-scope patent-text" data-dcnode-id="5540"><span data-dcnode-id="5541" instrument_node="">116</span></b><span data-dcnode-id="5539" instrument_node=""> and others and performing statistical analyses. This process is known as analytics. In this way, those entities may evaluate their processes. For example, manufacturers and retailers may evaluate sales and interactions of their products and presentations to end users </span><b class="style-scope patent-text" data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">116</span></b><span data-dcnode-id="5536" instrument_node="">. Content authors may choose to modify content based on feedback from end users </span><b class="style-scope patent-text" data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">116</span></b><span data-dcnode-id="5533" instrument_node="">. The platform </span><b class="style-scope patent-text" data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">102</span></b><span data-dcnode-id="5530" instrument_node=""> itself may use feedback from the end user </span><b class="style-scope patent-text" data-dcnode-id="5528"><span data-dcnode-id="5529" instrument_node="">116</span></b><span data-dcnode-id="5527" instrument_node=""> to optimize services. Analytics with the e-commerce augmented reality platform is described in further detail with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5525" idrefs="DRAWINGS"><span data-dcnode-id="5526" instrument_node="">FIG. 7</span></figref><span data-dcnode-id="5524" instrument_node="">.</span></div><span data-dcnode-id="5522" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5520" id="h-0007" num="0000"><span data-dcnode-id="5521" instrument_node="">Example Environment for Augmented Reality E-Commerce</span></div><span data-dcnode-id="5519" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5508" id="p-0044" num="0043"><span data-dcnode-id="5518" instrument_node="">The hardware, software and communications environment is describe with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5516" idrefs="DRAWINGS"><span data-dcnode-id="5517" instrument_node="">FIG. 2</span></figref><span data-dcnode-id="5515" instrument_node="">. Specifically, </span><figref class="style-scope patent-text" data-dcnode-id="5513" idrefs="DRAWINGS"><span data-dcnode-id="5514" instrument_node="">FIG. 2</span></figref><span data-dcnode-id="5512" instrument_node=""> is an infrastructure diagram </span><b class="style-scope patent-text" data-dcnode-id="5510"><span data-dcnode-id="5511" instrument_node="">200</span></b><span data-dcnode-id="5509" instrument_node=""> of an exemplary hosting environment for augmented reality e-commerce.</span></div><span data-dcnode-id="5507" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5505" id="p-0045" num="0044"><span data-dcnode-id="5506" instrument_node="">Prior to describing the exemplary hosting environment, a description of a computer and of computer readable media is provided as follows. Requests to the augmented reality e-commerce platform may be done from a client side device. A client side device may be any device with a processor, memory, and a network connection sufficient to connect to a cloud server, either directly or via the Internet. In most instances, there may be an operating system. Typical configurations are a central processing unit, RAM, and Wi-Fi or Ethernet connectivity. The memory may be computer-readable media and/or may have access to other computer-readable media, as described below, and may run a client application comprised of computer executable code resident in the memory and/or other computer-readable media.</span></div><span data-dcnode-id="5504" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5502" id="p-0046" num="0045"><span data-dcnode-id="5503" instrument_node="">Similarly a server, including a cloud hosted server, may be device with a processor, memory, and a network connection sufficient to connect to a client device or other server either directly, or via the Internet. As with a client device, typically there may be an operating system. Typical configurations are a central processing unit, RAM, and Wi-Fi or Ethernet connectivity. The memory may be computer-readable media and/or will have access to other computer-readable media, and may run one or more server applications comprised of computer executable code resident in the memory and/or other computer-readable media.</span></div><span data-dcnode-id="5501" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5499" id="p-0047" num="0046"><span data-dcnode-id="5500" instrument_node="">A server, including a cloud server, will generally run a virtualization environment that may create virtual machines. In each virtual machine, there may be an operating system, or system level environment. Each virtual machine may spawn processes, each of which may support at least one application. An execution environment such as a Java Virtual Machine, or .NET™ runtime may execute in a virtual machine and manage processes and threads.</span></div><span data-dcnode-id="5498" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5496" id="p-0048" num="0047"><span data-dcnode-id="5497" instrument_node="">Computer-readable media includes, at least two types of media, namely computer storage media and communications media. Computer storage media includes volatile and non-volatile, removable and non-removable media implemented in any method or technology for storage of information such as computer readable instructions, data structures, program modules, or other data. Computer storage media includes, but is not limited to, RAM, ROM, EEPROM, flash memory or other memory technology, CD-ROM, digital versatile disks (DVD) or other optical storage, magnetic cassettes, magnetic tape, magnetic disk storage or other magnetic storage devices, or any other non-transmission medium that can be used to store information for access by a computing device. In contrast, communication media may embody computer readable instructions, data structures, program modules, or other data in a modulated data signal, such as a carrier wave, or other transmission mechanism. As defined herein, computer storage media does not include communication media.</span></div><span data-dcnode-id="5495" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5472" id="p-0049" num="0048"><span data-dcnode-id="5494" instrument_node="">Turning back to infrastructure diagram </span><b class="style-scope patent-text" data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">200</span></b><span data-dcnode-id="5491" instrument_node=""> of </span><figref class="style-scope patent-text" data-dcnode-id="5489" idrefs="DRAWINGS"><span data-dcnode-id="5490" instrument_node="">FIG. 2</span></figref><span data-dcnode-id="5488" instrument_node="">, end user, or user </span><b class="style-scope patent-text" data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">202</span></b><span data-dcnode-id="5485" instrument_node=""> for short, has access to a platform capable of accessing the internet and participating in augmented reality. There may be input devices </span><b class="style-scope patent-text" data-dcnode-id="5483"><span data-dcnode-id="5484" instrument_node="">204</span></b><span data-dcnode-id="5482" instrument_node="">, such as cameras, one or more rendering devices </span><b class="style-scope patent-text" data-dcnode-id="5480"><span data-dcnode-id="5481" instrument_node="">206</span></b><span data-dcnode-id="5479" instrument_node="">, a client computer </span><b class="style-scope patent-text" data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">208</span></b><span data-dcnode-id="5476" instrument_node="">, and potentially a 3D printer </span><b class="style-scope patent-text" data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">210</span></b><span data-dcnode-id="5473" instrument_node="">.</span></div><span data-dcnode-id="5471" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5451" id="p-0050" num="0049"><span data-dcnode-id="5470" instrument_node="">Input devices </span><b class="style-scope patent-text" data-dcnode-id="5468"><span data-dcnode-id="5469" instrument_node="">204</span></b><span data-dcnode-id="5467" instrument_node=""> may operate as part of the rendering devices </span><b class="style-scope patent-text" data-dcnode-id="5465"><span data-dcnode-id="5466" instrument_node="">206</span></b><span data-dcnode-id="5464" instrument_node="">, or may simply be input devices tracking the user </span><b class="style-scope patent-text" data-dcnode-id="5462"><span data-dcnode-id="5463" instrument_node="">202</span></b><span data-dcnode-id="5461" instrument_node=""> or the environment of the user. For example, a rendering device </span><b class="style-scope patent-text" data-dcnode-id="5459"><span data-dcnode-id="5460" instrument_node="">206</span></b><span data-dcnode-id="5458" instrument_node="">, may be, for example, Google Glasses or may be an augmented computer monitor. The glasses may have a camera to track what the user </span><b class="style-scope patent-text" data-dcnode-id="5456"><span data-dcnode-id="5457" instrument_node="">202</span></b><span data-dcnode-id="5455" instrument_node=""> is viewing. To do so, input devices </span><b class="style-scope patent-text" data-dcnode-id="5453"><span data-dcnode-id="5454" instrument_node="">204</span></b><span data-dcnode-id="5452" instrument_node="">, may include a head tracking depth sensor, eye tracking depth sensor, a microphone, perhaps for voice command, or other cameras to detect the user's gestures, reactions and facial expressions.</span></div><span data-dcnode-id="5450" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5436" id="p-0051" num="0050"><span data-dcnode-id="5449" instrument_node="">Since the platform </span><b class="style-scope patent-text" data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node="">102</span></b><span data-dcnode-id="5446" instrument_node=""> may support gesture input, input device </span><b class="style-scope patent-text" data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node="">204</span></b><span data-dcnode-id="5443" instrument_node=""> in the form of cameras may be trained on the user </span><b class="style-scope patent-text" data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">202</span></b><span data-dcnode-id="5440" instrument_node=""> to detect gestures. Furthermore, in the case of cameras used to detect the user's reactions and facial expressions, the input devices </span><b class="style-scope patent-text" data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">204</span></b><span data-dcnode-id="5437" instrument_node=""> may thereby be used to collect input for a cognitive modeling based analysis to determine the user's positive or negative attitude to the augmented reality environment and objects rendered.</span></div><span data-dcnode-id="5435" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5421" id="p-0052" num="0051"><span data-dcnode-id="5434" instrument_node="">Input devices </span><b class="style-scope patent-text" data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">204</span></b><span data-dcnode-id="5431" instrument_node=""> need not be specific to a user </span><b class="style-scope patent-text" data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">202</span></b><span data-dcnode-id="5428" instrument_node="">. Input devices </span><b class="style-scope patent-text" data-dcnode-id="5426"><span data-dcnode-id="5427" instrument_node="">204</span></b><span data-dcnode-id="5425" instrument_node=""> may include environmental cameras to detect lighting within the user's physical environment. Input devices </span><b class="style-scope patent-text" data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">204</span></b><span data-dcnode-id="5422" instrument_node=""> may also include microphones and environmental sensors. For example, microphones may be used as an input for noise cancellation to mute unwanted physical world sounds. A temperature sensor may be used to detect temperature which in turn could be used as an input to select virtual environment visual settings.</span></div><span data-dcnode-id="5420" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5403" id="p-0053" num="0052"><span data-dcnode-id="5419" instrument_node="">The client side portion of the platform </span><b class="style-scope patent-text" data-dcnode-id="5417"><span data-dcnode-id="5418" instrument_node="">102</span></b><span data-dcnode-id="5416" instrument_node=""> is agnostic to input devices. The platform </span><b class="style-scope patent-text" data-dcnode-id="5414"><span data-dcnode-id="5415" instrument_node="">102</span></b><span data-dcnode-id="5413" instrument_node=""> may equally support both virtual reality and augmented reality rendering devices </span><b class="style-scope patent-text" data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">206</span></b><span data-dcnode-id="5410" instrument_node="">. Accordingly, the platform </span><b class="style-scope patent-text" data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">102</span></b><span data-dcnode-id="5407" instrument_node=""> may equally support immersion or overlay rendering devices </span><b class="style-scope patent-text" data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">206</span></b><span data-dcnode-id="5404" instrument_node="">.</span></div><span data-dcnode-id="5402" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5394" id="p-0054" num="0053"><span data-dcnode-id="5401" instrument_node="">Rendering devices </span><b class="style-scope patent-text" data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">206</span></b><span data-dcnode-id="5398" instrument_node=""> are not limited strictly to video rendering via video screens. Rendering devices </span><b class="style-scope patent-text" data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">206</span></b><span data-dcnode-id="5395" instrument_node=""> may include haptic feedback via haptic gloves, force feedback via mechanical devices, and speakers to render sound.</span></div><span data-dcnode-id="5393" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5379" id="p-0055" num="0054"><span data-dcnode-id="5392" instrument_node="">Input devices </span><b class="style-scope patent-text" data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">204</span></b><span data-dcnode-id="5389" instrument_node=""> and rendering devices </span><b class="style-scope patent-text" data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">206</span></b><span data-dcnode-id="5386" instrument_node=""> are communicatively coupled to a computer </span><b class="style-scope patent-text" data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">208</span></b><span data-dcnode-id="5383" instrument_node="">. Logic to handle input and output, including device drivers and client applications are resident in the computer </span><b class="style-scope patent-text" data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">208</span></b><span data-dcnode-id="5380" instrument_node="">. Logic may include logic to parse gestures from a rendering device hereby to create computer commands. Logic may include logic to identify alternative forms of input, for example in support of the Americans with Disabilities Act (ADA).</span></div><span data-dcnode-id="5378" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5367" id="p-0056" num="0055"><span data-dcnode-id="5377" instrument_node="">In the case of ADA logic, a user </span><b class="style-scope patent-text" data-dcnode-id="5375"><span data-dcnode-id="5376" instrument_node="">202</span></b><span data-dcnode-id="5374" instrument_node=""> may set a preference in user logic to select modalities of input, or a set of predefined visual or auditory inputs comprising a distinct set of expressions. One modality may be finger gestures, another modality may be arm gestures, and a third modality may be voice commands. The logic stores a master set of computer commands. Each computer command corresponds to a computer routine or set of routines that are to be executed when the respective computer command is invoked. A user </span><b class="style-scope patent-text" data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">202</span></b><span data-dcnode-id="5371" instrument_node=""> may select a modality which creates a default mapping of the inputs comprising the modality to the master set of computer commands. Thus when the input is performed, the corresponding computer command is invoked, and the respective routine or routines are executed. The mapping of individual gestures to commands may be edited by the user </span><b class="style-scope patent-text" data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">202</span></b><span data-dcnode-id="5368" instrument_node=""> via a utility that allows manual mapping. Gestures from different modalities may be combined in a custom modality. For example, voice commands could be used for some computer commands and arm gestures for others.</span></div><span data-dcnode-id="5366" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5355" id="p-0057" num="0056"><span data-dcnode-id="5365" instrument_node="">Computer </span><b class="style-scope patent-text" data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">208</span></b><span data-dcnode-id="5362" instrument_node=""> may also be communicatively coupled to other devices such as 3D printer </span><b class="style-scope patent-text" data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">210</span></b><span data-dcnode-id="5359" instrument_node="">. A 3D printer comprises one or more heated nozzles feeding filament, typically plastic, and is used to create a sculpture as specified in a virtual file. The 3D printer </span><b class="style-scope patent-text" data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">210</span></b><span data-dcnode-id="5356" instrument_node=""> may thereby be used to turn virtual objects into physical objects, subject to scale and material constraints.</span></div><span data-dcnode-id="5354" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5307" id="p-0058" num="0057"><span data-dcnode-id="5353" instrument_node="">The client side components of the platform </span><b class="style-scope patent-text" data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">102</span></b><span data-dcnode-id="5350" instrument_node=""> access a network </span><b class="style-scope patent-text" data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">212</span></b><span data-dcnode-id="5347" instrument_node="">, usually the Internet, and thereby may access a web service </span><b class="style-scope patent-text" data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">214</span></b><span data-dcnode-id="5344" instrument_node="">. A web service </span><b class="style-scope patent-text" data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">214</span></b><span data-dcnode-id="5341" instrument_node=""> may be a web site, potentially for a manufacturer or retailer, where user </span><b class="style-scope patent-text" data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">202</span></b><span data-dcnode-id="5338" instrument_node=""> may browse goods for potential purchase. The web site </span><b class="style-scope patent-text" data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">214</span></b><span data-dcnode-id="5335" instrument_node=""> generally encapsulates logic to serve virtual goods, to track user accounts, to track and fulfil sales, and other commercial activities. To support these activities, the web service </span><b class="style-scope patent-text" data-dcnode-id="5333"><span data-dcnode-id="5334" instrument_node="">214</span></b><span data-dcnode-id="5332" instrument_node=""> will access virtual object assets and other assets from a content management system </span><b class="style-scope patent-text" data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">216</span></b><span data-dcnode-id="5329" instrument_node=""> over network </span><b class="style-scope patent-text" data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">212</span></b><span data-dcnode-id="5326" instrument_node=""> via API calls </span><b class="style-scope patent-text" data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">218</span></b><span data-dcnode-id="5323" instrument_node="">. The API calls </span><b class="style-scope patent-text" data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">218</span></b><span data-dcnode-id="5320" instrument_node=""> are described in further detail with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5318" idrefs="DRAWINGS"><span data-dcnode-id="5319" instrument_node="">FIG. 3</span></figref><span data-dcnode-id="5317" instrument_node="">. Generally the content management system </span><b class="style-scope patent-text" data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">216</span></b><span data-dcnode-id="5314" instrument_node=""> will be owned by another entity. Accordingly, the web site </span><b class="style-scope patent-text" data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">214</span></b><span data-dcnode-id="5311" instrument_node="">, may render payments to the content management system </span><b class="style-scope patent-text" data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">216</span></b><span data-dcnode-id="5308" instrument_node="">.</span></div><span data-dcnode-id="5306" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5283" id="p-0059" num="0058"><span data-dcnode-id="5305" instrument_node="">The web site </span><b class="style-scope patent-text" data-dcnode-id="5303"><span data-dcnode-id="5304" instrument_node="">214</span></b><span data-dcnode-id="5302" instrument_node=""> may serve virtual objects via WebGL. However, if the web site </span><b class="style-scope patent-text" data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">214</span></b><span data-dcnode-id="5299" instrument_node=""> detects that either the user's rendering devices </span><b class="style-scope patent-text" data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">206</span></b><span data-dcnode-id="5296" instrument_node=""> or computer </span><b class="style-scope patent-text" data-dcnode-id="5294"><span data-dcnode-id="5295" instrument_node="">208</span></b><span data-dcnode-id="5293" instrument_node=""> do not support WebGL, or there are communications limitations, the web site </span><b class="style-scope patent-text" data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">214</span></b><span data-dcnode-id="5290" instrument_node=""> may encapsulate logic to fallback to alternative graphical rendering languages or representations. The web site </span><b class="style-scope patent-text" data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">214</span></b><span data-dcnode-id="5287" instrument_node=""> may determine that WebGL is not supported, for example via a user profile setting, a user selection from an application, or via querying an application resident on the client computer </span><b class="style-scope patent-text" data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">208</span></b><span data-dcnode-id="5284" instrument_node="">.</span></div><span data-dcnode-id="5282" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5259" id="p-0060" num="0059"><span data-dcnode-id="5281" instrument_node="">The content management system </span><b class="style-scope patent-text" data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">216</span></b><span data-dcnode-id="5278" instrument_node=""> is generally resident on a cloud provider, but alternatively may reside on local servers on a LAN. Upon receiving an API call from web service </span><b class="style-scope patent-text" data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">214</span></b><span data-dcnode-id="5275" instrument_node="">, such as a web site, the content management system </span><b class="style-scope patent-text" data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">216</span></b><span data-dcnode-id="5272" instrument_node=""> will service the request. The APIs are described in further detail with respect to </span><figref class="style-scope patent-text" data-dcnode-id="5270" idrefs="DRAWINGS"><span data-dcnode-id="5271" instrument_node="">FIG. 3</span></figref><span data-dcnode-id="5269" instrument_node="">. If the request is a query, a query engine </span><b class="style-scope patent-text" data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">220</span></b><span data-dcnode-id="5266" instrument_node=""> may be invoked. Alternatively, a query engine </span><b class="style-scope patent-text" data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">220</span></b><span data-dcnode-id="5263" instrument_node=""> may be resident in web site </span><b class="style-scope patent-text" data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">214</span></b><span data-dcnode-id="5260" instrument_node="">.</span></div><span data-dcnode-id="5258" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5229" id="p-0061" num="0060"><span data-dcnode-id="5257" instrument_node="">The API request may result in the content management system accessing data stores </span><b class="style-scope patent-text" data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">222</span></b><span data-dcnode-id="5254" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">224</span></b><span data-dcnode-id="5251" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">226</span></b><span data-dcnode-id="5248" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">228</span></b><span data-dcnode-id="5245" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">230</span></b><span data-dcnode-id="5242" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">232</span></b><span data-dcnode-id="5239" instrument_node=""> to serve the request. Where the request is to serve data, the content management system </span><b class="style-scope patent-text" data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">216</span></b><span data-dcnode-id="5236" instrument_node=""> may serve data on a Content Distribution Network </span><b class="style-scope patent-text" data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">234</span></b><span data-dcnode-id="5233" instrument_node="">, for subsequent access by the web service </span><b class="style-scope patent-text" data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">214</span></b><span data-dcnode-id="5230" instrument_node="">.</span></div><span data-dcnode-id="5228" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5208" id="p-0062" num="0061"><span data-dcnode-id="5227" instrument_node="">The content management system may allow a user to access one or more data stores. The data stores include virtual image data </span><b class="style-scope patent-text" data-dcnode-id="5225"><span data-dcnode-id="5226" instrument_node="">222</span></b><span data-dcnode-id="5224" instrument_node="">, product data </span><b class="style-scope patent-text" data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">224</span></b><span data-dcnode-id="5221" instrument_node="">, iconography data </span><b class="style-scope patent-text" data-dcnode-id="5219"><span data-dcnode-id="5220" instrument_node="">226</span></b><span data-dcnode-id="5218" instrument_node="">, account data </span><b class="style-scope patent-text" data-dcnode-id="5216"><span data-dcnode-id="5217" instrument_node="">228</span></b><span data-dcnode-id="5215" instrument_node="">, cross reference data </span><b class="style-scope patent-text" data-dcnode-id="5213"><span data-dcnode-id="5214" instrument_node="">230</span></b><span data-dcnode-id="5212" instrument_node=""> and haptics data </span><b class="style-scope patent-text" data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">232</span></b><span data-dcnode-id="5209" instrument_node=""> as described as follows.</span></div><span data-dcnode-id="5207" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5199" id="p-0063" num="0062"><span data-dcnode-id="5206" instrument_node="">Virtual image data </span><b class="style-scope patent-text" data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node="">222</span></b><span data-dcnode-id="5203" instrument_node=""> comprises all the data to display a virtual object. Virtual images are often referred to as virtual models, virtual assets or models for short. Model data is the data used to render a model. Virtual image data </span><b class="style-scope patent-text" data-dcnode-id="5201"><span data-dcnode-id="5202" instrument_node="">222</span></b><span data-dcnode-id="5200" instrument_node=""> comprise the identities of the models and the model data. Model data may include object files, rigging, meshes, textures, shaders, haptic textures, as well as other image data. In some cases, the data may be preprocessed in order to save processing time during rendering. Furthermore, provenance and versioning data may be associated with the models.</span></div><span data-dcnode-id="5198" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5184" id="p-0064" num="0063"><span data-dcnode-id="5197" instrument_node="">One feature supported by virtual image data </span><b class="style-scope patent-text" data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">222</span></b><span data-dcnode-id="5194" instrument_node=""> is an association with optional features for a product. Consider a product such as a chair. The chair may have different colors, textures, sizes, materials, or other options. The chair may be virtually modified by rendering with a selected option. In the case of model data, some features may be added. For example, one version of a chair will have arms, and the another version will not. Instead of creating model data of two separate chairs, the armless version may be stored and the arms virtually added during rendering. The model data for the option, in this case the arms, may be associated with the model data for the armless chair. When the user </span><b class="style-scope patent-text" data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">202</span></b><span data-dcnode-id="5191" instrument_node=""> selects the arms option, the content management system </span><b class="style-scope patent-text" data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">216</span></b><span data-dcnode-id="5188" instrument_node=""> would retrieve the virtual image data </span><b class="style-scope patent-text" data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">222</span></b><span data-dcnode-id="5185" instrument_node=""> for the arms.</span></div><span data-dcnode-id="5183" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5178" id="p-0065" num="0064"><span data-dcnode-id="5182" instrument_node="">Some options may include localizations. For example, a rendering of a television may display either American English sample content or Japanese sample content depending on the locale and preferences of a user </span><b class="style-scope patent-text" data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">202</span></b><span data-dcnode-id="5179" instrument_node="">.</span></div><span data-dcnode-id="5177" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5172" id="p-0066" num="0065"><span data-dcnode-id="5176" instrument_node="">Product data </span><b class="style-scope patent-text" data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">224</span></b><span data-dcnode-id="5173" instrument_node=""> comprise the commercial data associated with a model. Product data may include product names and identifiers such as Universal Product Codes and Stock Keeping Unit identifiers. Product data also includes user generated content such as ratings, reviews, metadata and links to relevant content such as unboxing videos, and other multimedia reviews. Product data may also include branding data, which is data provided by the manufacturer including logos, brand names, endorsements, and coupons.</span></div><span data-dcnode-id="5171" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5157" id="p-0067" num="0066"><span data-dcnode-id="5170" instrument_node="">One feature supported by product data </span><b class="style-scope patent-text" data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">224</span></b><span data-dcnode-id="5167" instrument_node=""> is a point of interest system. Specifically, a model will have points of interest to be called out to potential consumers, such that the user can obtain more information about that point of interest. The identity of the points of interest as well as the additional information content is stored as product data </span><b class="style-scope patent-text" data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">224</span></b><span data-dcnode-id="5164" instrument_node="">. By way of illustration, consider a shirt in the form of a model. It may be useful to have a point of interest to a seam that uses double needle tailoring. The product data would cross reference a point on the model, and would associate a discussion of double needle tailoring in the context of the shirt. When a particular command from an end user </span><b class="style-scope patent-text" data-dcnode-id="5162"><span data-dcnode-id="5163" instrument_node="">202</span></b><span data-dcnode-id="5161" instrument_node=""> to show the additional content is received, the content is retrieved from the product data </span><b class="style-scope patent-text" data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">224</span></b><span data-dcnode-id="5158" instrument_node="">.</span></div><span data-dcnode-id="5156" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5151" id="p-0068" num="0067"><span data-dcnode-id="5155" instrument_node="">Iconography data </span><b class="style-scope patent-text" data-dcnode-id="5153"><span data-dcnode-id="5154" instrument_node="">226</span></b><span data-dcnode-id="5152" instrument_node=""> comprises the set of data used to represent prompts and dialogs with a user. It comprises user interface data which includes user gesture patterns, mappings of gestures to user actions, data to enable behavior recognition via cognitive or other models, icons, common dialog boxes, common menus, standard widgets and gadgets.</span></div><span data-dcnode-id="5150" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5139" id="p-0069" num="0068"><span data-dcnode-id="5149" instrument_node="">Iconography data </span><b class="style-scope patent-text" data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">226</span></b><span data-dcnode-id="5146" instrument_node=""> enables the provision of a consistent user experience. For example, visual cues such as icons may be overlaid on a model, and since the visual cues all come from the same iconography database </span><b class="style-scope patent-text" data-dcnode-id="5144"><span data-dcnode-id="5145" instrument_node="">226</span></b><span data-dcnode-id="5143" instrument_node="">, the user </span><b class="style-scope patent-text" data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">202</span></b><span data-dcnode-id="5140" instrument_node=""> may become trained to recognize available options and activities indicated by the visual cues.</span></div><span data-dcnode-id="5138" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5115" id="p-0070" num="0069"><span data-dcnode-id="5137" instrument_node="">Account data </span><b class="style-scope patent-text" data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">228</span></b><span data-dcnode-id="5134" instrument_node=""> stores all identity information for a web service </span><b class="style-scope patent-text" data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">214</span></b><span data-dcnode-id="5131" instrument_node="">. Accordingly, account data </span><b class="style-scope patent-text" data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">228</span></b><span data-dcnode-id="5128" instrument_node=""> may include identity/account information, links to a method of payment, and preferences. In some cases, the web service </span><b class="style-scope patent-text" data-dcnode-id="5126"><span data-dcnode-id="5127" instrument_node="">214</span></b><span data-dcnode-id="5125" instrument_node=""> may also store identity/account information, links to a method of payment, and preferences, of end users </span><b class="style-scope patent-text" data-dcnode-id="5123"><span data-dcnode-id="5124" instrument_node="">202</span></b><span data-dcnode-id="5122" instrument_node=""> as well. This enables the possibility of the content management system </span><b class="style-scope patent-text" data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">216</span></b><span data-dcnode-id="5119" instrument_node=""> to provide fulfillment and tracking of transactions at an end user </span><b class="style-scope patent-text" data-dcnode-id="5117"><span data-dcnode-id="5118" instrument_node="">202</span></b><span data-dcnode-id="5116" instrument_node=""> degree of fidelity.</span></div><span data-dcnode-id="5114" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5097" id="p-0071" num="0070"><span data-dcnode-id="5113" instrument_node="">Cross reference table </span><b class="style-scope patent-text" data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">230</span></b><span data-dcnode-id="5110" instrument_node=""> enables the linking of virtual image data </span><b class="style-scope patent-text" data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">222</span></b><span data-dcnode-id="5107" instrument_node=""> to product data </span><b class="style-scope patent-text" data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">224</span></b><span data-dcnode-id="5104" instrument_node=""> or other third party data. The cross referencing may be via UPC, SKU or other indices. Furthermore, cross reference table </span><b class="style-scope patent-text" data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">230</span></b><span data-dcnode-id="5101" instrument_node=""> may also cross reference by a web service identifier, an end user identifier and/or a date time stamp. In this way, the data infrastructure for the content management system </span><b class="style-scope patent-text" data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">216</span></b><span data-dcnode-id="5098" instrument_node=""> may track all transactions of served data on a per web service, per end user, and/or per transaction basis.</span></div><span data-dcnode-id="5096" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5073" id="p-0072" num="0071"><span data-dcnode-id="5095" instrument_node="">A further degree of detail may be stored by the cross reference table </span><b class="style-scope patent-text" data-dcnode-id="5093"><span data-dcnode-id="5094" instrument_node="">230</span></b><span data-dcnode-id="5092" instrument_node="">. The web service </span><b class="style-scope patent-text" data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">214</span></b><span data-dcnode-id="5089" instrument_node=""> may track all input actions that are inputted by the end user </span><b class="style-scope patent-text" data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">202</span></b><span data-dcnode-id="5086" instrument_node=""> via the input devices </span><b class="style-scope patent-text" data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">204</span></b><span data-dcnode-id="5083" instrument_node="">. Thus the cross reference table may store a cross reference between one or more input actions in sequence and an action by the end user </span><b class="style-scope patent-text" data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">202</span></b><span data-dcnode-id="5080" instrument_node="">. In this way, the content management system </span><b class="style-scope patent-text" data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">216</span></b><span data-dcnode-id="5077" instrument_node=""> can correlate any action by an end user </span><b class="style-scope patent-text" data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">202</span></b><span data-dcnode-id="5074" instrument_node=""> to any transaction or sequence of input actions. This data is used later for analytics.</span></div><span data-dcnode-id="5072" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5052" id="p-0073" num="0072"><span data-dcnode-id="5071" instrument_node="">One of the end user </span><b class="style-scope patent-text" data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">202</span></b><span data-dcnode-id="5068" instrument_node=""> input devices </span><b class="style-scope patent-text" data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">204</span></b><span data-dcnode-id="5065" instrument_node=""> may be a haptic glove or other haptic feedback peripheral. The haptic texture library data store </span><b class="style-scope patent-text" data-dcnode-id="5063"><span data-dcnode-id="5064" instrument_node="">232</span></b><span data-dcnode-id="5062" instrument_node=""> enables haptic textures to be encoded onto virtual image data </span><b class="style-scope patent-text" data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">222</span></b><span data-dcnode-id="5059" instrument_node=""> or product data </span><b class="style-scope patent-text" data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">224</span></b><span data-dcnode-id="5056" instrument_node=""> in terms of texture information in the haptic texture library </span><b class="style-scope patent-text" data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">232</span></b><span data-dcnode-id="5053" instrument_node="">. The haptic texture library may include the following: one or more haptic textures, comprising a plurality of substantially flat polygon with one or more raised surfaces. Each polygon will have a predefined density of raised surfaces. A smooth surface may have little to no raised surfaces, whereas a rough surface may have a high density. Similarly, the amplitude of the raised surfaces may be specified. Smooth surfaces may have relatively low amplitudes, but rough surfaces may have relatively high amplitudes. The slope of a raised surface may also be stored. Steep slopes may represent prickly surfaces whereas shallow slopes may represent pebbled surfaces. The degree of give that a surface provides may also be stored. High degrees of give tend to be sticky, whereas low degrees of give tend to be merely rough.</span></div><span data-dcnode-id="5051" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5046" id="p-0074" num="0073"><span data-dcnode-id="5050" instrument_node="">The haptic texture library </span><b class="style-scope patent-text" data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">232</span></b><span data-dcnode-id="5047" instrument_node=""> polygons generally may be tessellated over a surface. Over a large surface, the same polygon may be flagged to repeat in a tessellation and may be flagged to have the orientation of the polygon randomly selected.</span></div><span data-dcnode-id="5045" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5040" id="p-0075" num="0074"><span data-dcnode-id="5044" instrument_node="">Since surfaces are not necessarily uniform, the haptic texture </span><b class="style-scope patent-text" data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">232</span></b><span data-dcnode-id="5041" instrument_node=""> may support overlay maps where the overlays indicate raised surfaces or depressed surfaces. In this way, scratches on a surface, or ridges of a surface may be expressed.</span></div><span data-dcnode-id="5039" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5037" id="p-0076" num="0075"><span data-dcnode-id="5038" instrument_node="">In rendering a surface, the surface is first subdivided into different zones indicating different types of textures. One or more patterns, and a polygon density for each zone is selected. The polygons are then tessellated onto the surface. If the repeat or random orientation flags are set, then the patterns are set accordingly. If an overlay is specified, then the overlay covers the surface, and scratches and ridges are rendered accordingly.</span></div><span data-dcnode-id="5036" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="5016" id="p-0077" num="0076"><span data-dcnode-id="5035" instrument_node="">The content management system </span><b class="style-scope patent-text" data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">216</span></b><span data-dcnode-id="5032" instrument_node=""> is enabled via the cross reference table </span><b class="style-scope patent-text" data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">230</span></b><span data-dcnode-id="5029" instrument_node=""> and other data stores to track any and all 3D action by an end user </span><b class="style-scope patent-text" data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">202</span></b><span data-dcnode-id="5026" instrument_node="">. Sequences of actions, stored in analytic data </span><b class="style-scope patent-text" data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">236</span></b><span data-dcnode-id="5023" instrument_node="">, may be cross correlated against transactions and activities by an end user </span><b class="style-scope patent-text" data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">202</span></b><span data-dcnode-id="5020" instrument_node=""> via the cross reference table </span><b class="style-scope patent-text" data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">230</span></b><span data-dcnode-id="5017" instrument_node="">. By storing a date time stamp on activities, the content management system can track linger times between actions, which in turn may be used as part of cognitive and/or behavioral analysis.</span></div><span data-dcnode-id="5015" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4986" id="p-0078" num="0077"><span data-dcnode-id="5014" instrument_node="">Analytic engine </span><b class="style-scope patent-text" data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">238</span></b><span data-dcnode-id="5011" instrument_node=""> is coupled for analytic data </span><b class="style-scope patent-text" data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">236</span></b><span data-dcnode-id="5008" instrument_node=""> as well as the other content management system data stores </span><b class="style-scope patent-text" data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">222</span></b><span data-dcnode-id="5005" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">224</span></b><span data-dcnode-id="5002" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">226</span></b><span data-dcnode-id="4999" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="4997"><span data-dcnode-id="4998" instrument_node="">228</span></b><span data-dcnode-id="4996" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">230</span></b><span data-dcnode-id="4993" instrument_node="">, </span><b class="style-scope patent-text" data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">232</span></b><span data-dcnode-id="4990" instrument_node="">. The analytic engine provides an administrator with query and statistical analysis capabilities in order to detect behavioral patterns of one or more end users </span><b class="style-scope patent-text" data-dcnode-id="4988"><span data-dcnode-id="4989" instrument_node="">202</span></b><span data-dcnode-id="4987" instrument_node="">.</span></div><span data-dcnode-id="4985" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="4971" id="p-0079" num="0078"><span data-dcnode-id="4984" instrument_node="">An important function of the analytic engine </span><b class="style-scope patent-text" data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">238</span></b><span data-dcnode-id="4981" instrument_node=""> is the determination of the success of an advertising campaign. For example, the analytic data </span><b class="style-scope patent-text" data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">236</span></b><span data-dcnode-id="4978" instrument_node=""> may indicate that a user reviews a virtual product such as a shoe. However, the analytic engine </span><b class="style-scope patent-text" data-dcnode-id="4976"><span data-dcnode-id="4977" instrument_node="">238</span></b><span data-dcnode-id="4975" instrument_node=""> may determine that the majority of users that look at the sole of a shoe end up not buying the shoe. A review of the virtual image data </span><b class="style-scope patent-text" data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">222</span></b><span data-dcnode-id="4972" instrument_node=""> may indicate that the model data of the sole is poorly aligned with the rest of the shoe. Accordingly, the owner of the model data may make the relevant data fixes.</span></div><span data-dcnode-id="4970" instrument_node="">
