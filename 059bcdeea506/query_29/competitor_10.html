</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3462" id="p-0189" num="0188"><span data-dcnode-id="3463" instrument_node="">The augmented reality e-commerce processes described herein may maximize limited physical space within a store by providing virtual displays of world-locked 3D objects in predetermined physical spaces. Furthermore, many of the described techniques may provide a high quality of experience for a user despite the data storage and processing power limitations of existing augmented reality devices. Additionally, the described processes may provide an exciting and useful experience for consumers.</span></div><span data-dcnode-id="3461" instrument_node="">
</span><heading class="style-scope patent-text" data-dcnode-id="3459" id="h-0019"><span data-dcnode-id="3460" instrument_node="">CONCLUSION</span></heading><span data-dcnode-id="3458" instrument_node="">
</span><div class="description-paragraph style-scope patent-text" data-dcnode-id="3456" id="p-0190" num="0189"><span data-dcnode-id="3457" instrument_node="">Although the subject matter has been described in language specific to structural features and/or methodological acts, it is to be understood that the subject matter defined in the appended claims is not necessarily limited to the specific features or acts described above. Rather, the specific features and acts described above are disclosed as example forms of implementing the claims.</span></div><span data-dcnode-id="3455" instrument_node="">
</span></div><span data-dcnode-id="3453" instrument_node="">

</span><claim-statement class="style-scope patent-text" data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">What is claimed is:</span></claim-statement><span data-dcnode-id="3380" instrument_node="">
</span><div class="claim style-scope patent-text" data-dcnode-id="3354"><span data-dcnode-id="3379" instrument_node=""> </span><div class="claim style-scope patent-text" data-dcnode-id="3356" id="CLM-00001" num="00001"><span data-dcnode-id="3378" instrument_node="">
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3358"><span data-dcnode-id="3377" instrument_node="">1. One or more non-transitory computer-readable media storing computer-executable instructions that upon execution cause one or more processors to perform acts comprising:
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">receiving a virtual shelf blueprint that includes positional information for virtual display locations on a virtual shelf;</span></div><span data-dcnode-id="3374" instrument_node="">
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">receiving geospatial sensor scans of multiple reference markers in a real-world, the multiple reference markers corresponding to reference points in the virtual shelf blueprint;</span></div><span data-dcnode-id="3371" instrument_node="">
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">mapping the virtual shelf to the real-world based on the multiple reference markers by assigning positional data of the multiple reference markers to the reference points in the virtual shelf blueprint;</span></div><span data-dcnode-id="3368" instrument_node="">
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">populating the virtual shelf with one or more 3-dimensional (3D) objects that virtually represent at least one real-world product for viewing via an augmented reality device;</span></div><span data-dcnode-id="3365" instrument_node="">
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">tracking user selections of points of interests for the one or more 3D objects via one or more augmented reality devices, each point of interest providing metadata regarding a feature of a corresponding 3D object; and</span></div><span data-dcnode-id="3362" instrument_node="">
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">removing a point of interest for a 3D object from being selected for presentation with the 3D object via the augmented reality device in response to determining that the point of interest is ignored by a predetermined percentage of users who purchased one or more real-world products represented by the 3D object.</span></div><span data-dcnode-id="3359" instrument_node="">
</span></div><span data-dcnode-id="3357" instrument_node="">
</span></div><span data-dcnode-id="3355" instrument_node="">
</span></div><span data-dcnode-id="3353" instrument_node=""> </span><div class="claim-dependent style-scope patent-text" data-dcnode-id="3336"><span data-dcnode-id="3352" instrument_node=""> </span><div class="claim style-scope patent-text" data-dcnode-id="3338" id="CLM-00002" num="00002"><span data-dcnode-id="3351" instrument_node="">
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3340"><span data-dcnode-id="3350" instrument_node="">2. The one or more non-transitory computer-readable media of </span><claim-ref class="style-scope patent-text" data-dcnode-id="3348" idref="CLM-00001"><span data-dcnode-id="3349" instrument_node="">claim 1</span></claim-ref><span data-dcnode-id="3347" instrument_node="">, wherein the acts further comprise at least one of:
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">assigning a 3D object for display on the virtual shelf based on a first user input that is received via an input device of the augmented reality device; or</span></div><span data-dcnode-id="3344" instrument_node="">
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">adjusting a position of the 3D object on the virtual shelf based on a second user input that is received via the input device of the augmented reality device.</span></div><span data-dcnode-id="3341" instrument_node="">
</span></div><span data-dcnode-id="3339" instrument_node="">

</span><div class="claim-text style-scope patent-text" data-dcnode-id="3328"><span data-dcnode-id="3332" instrument_node="">3. The one or more non-transitory computer-readable media of </span><claim-ref class="style-scope patent-text" data-dcnode-id="3330" idref="CLM-00001"><span data-dcnode-id="3331" instrument_node="">claim 1</span></claim-ref><span data-dcnode-id="3329" instrument_node="">, wherein the acts further comprise presenting metadata related to a 3D object near or overlaid on the 3D object for viewing via the augmented reality device in response to a detection that the 3D object is within a field of vision of a user wearing the augmented reality device for a predetermined amount of time.</span></div><span data-dcnode-id="3327" instrument_node="">

</span><div class="claim-text style-scope patent-text" data-dcnode-id="3292"><span data-dcnode-id="3296" instrument_node="">6. The one or more non-transitory computer-readable media of </span><claim-ref class="style-scope patent-text" data-dcnode-id="3294" idref="CLM-00001"><span data-dcnode-id="3295" instrument_node="">claim 1</span></claim-ref><span data-dcnode-id="3293" instrument_node="">, wherein the virtual shelf including the one or more 3D objects is cached in a local memory of the augmented reality device for presentation via the augmented reality device.</span></div><span data-dcnode-id="3291" instrument_node="">

</span><div class="claim-text style-scope patent-text" data-dcnode-id="3262"><span data-dcnode-id="3272" instrument_node="">8. The one or more non-transitory computer-readable media of </span><claim-ref class="style-scope patent-text" data-dcnode-id="3270" idref="CLM-00007"><span data-dcnode-id="3271" instrument_node="">claim 7</span></claim-ref><span data-dcnode-id="3269" instrument_node="">, wherein the acts further comprise:
</span><div class="claim-text style-scope patent-text" data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">receiving an indication that a reference marker is scanned via a sensor associated with the augmented reality device; and</span></div><span data-dcnode-id="3266" instrument_node="">
