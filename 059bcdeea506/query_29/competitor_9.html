</span><blockquote class="wp-block-quote" data-dcnode-id="2170"><p data-dcnode-id="2171"><em data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">“Is it possible to perform real-time augmented reality in real-time video with OpenCV?”</span></em></p></blockquote><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">It absolutely is — and the rest of this tutorial will show you how.</span></p><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2161"><strong data-dcnode-id="2162"><span data-dcnode-id="2165" instrument_node="">To learn how to perform real-time augmented reality with OpenCV, </span><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">just keep reading.</span></em></strong></p><span data-dcnode-id="2160" instrument_node="">

</span><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">In the first part of this tutorial, you will learn how OpenCV can facilitate augmented reality in video streams in real time.</span></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">From there, we’ll configure our development environment and review our project directory structure.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">We’ll then review two Python scripts:</span></p><span data-dcnode-id="2127" instrument_node="">
</span><ul data-dcnode-id="2112"><span data-dcnode-id="2126" instrument_node="">
</span><li data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">The first one will contain a helper function, </span><code class="EnlighterJSRAW" data-dcnode-id="2123" data-enlighter-language="python"><span data-dcnode-id="2124" instrument_node="">find_and_warp</span></code><span data-dcnode-id="2122" instrument_node="">, which will accept an input image, detect augmented reality markers, and then warp a source image onto the input.</span></li><span data-dcnode-id="2120" instrument_node="">
</span><li data-dcnode-id="2114"><span data-dcnode-id="2119" instrument_node="">The second script will act as a driver script and utilize our </span><code data-dcnode-id="2116"><code class="EnlighterJSRAW" data-dcnode-id="2117" data-enlighter-language="python"><span data-dcnode-id="2118" instrument_node="">find_and_warp</span></code></code><span data-dcnode-id="2115" instrument_node=""> function within a real-time video stream.</span></li><span data-dcnode-id="2113" instrument_node="">
</span></ul><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">We’ll wrap up the tutorial with a discussion of our real-time augmented reality results.</span></p><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Let’s get started!</span></p><span data-dcnode-id="2105" instrument_node="">
</span><h3 data-dcnode-id="2102" id="how-can-we-apply-augmented-reality-to-real-time-video-streams-with-opencv"><strong data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">How can we apply augmented reality to real-time video streams with OpenCV?</span></strong></h3><span data-dcnode-id="2101" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2092"><figure class="aligncenter size-large" data-dcnode-id="2093"><img alt="" class="wp-image-17640" data-dcnode-id="2100" data-lazy-sizes="(max-width: 630px) 100vw, 630px" data-lazy-src="https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=700x438&amp;lossy=1&amp;strip=1&amp;webp=1" data-lazy-srcset="https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=126x79&amp;lossy=1&amp;strip=1&amp;webp=1 126w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example-300x188.jpg?lossy=1&amp;strip=1&amp;webp=1 300w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=378x237&amp;lossy=1&amp;strip=1&amp;webp=1 378w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=504x315&amp;lossy=1&amp;strip=1&amp;webp=1 504w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=630x394&amp;lossy=1&amp;strip=1&amp;webp=1 630w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?lossy=1&amp;strip=1&amp;webp=1 700w" height="438" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20438'%3E%3C/svg%3E" width="700"><noscript data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">&lt;img width="700" height="438" src="https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?lossy=1&amp;strip=1&amp;webp=1" alt="" class="wp-image-17640" srcset="https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=126x79&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 126w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example-300x188.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 300w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=378x237&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 378w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=504x315&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 504w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?size=630x394&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 630w, https://929687.smushcdn.com/2633864/wp-content/uploads/2021/01/opencv_video_augmented_reality_example.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 700w" sizes="(max-width: 630px) 100vw, 630px" /&gt;</span></noscript><figcaption data-dcnode-id="2094"><strong data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Figure 1:</span></strong><span data-dcnode-id="2095" instrument_node=""> OpenCV can be used to apply augmented reality to real-time video streams.</span></figcaption></figure></div><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">The very reason the OpenCV library exists is to facilitate real-time image processing. The library accepts input images/frames, processes them as quickly as possible, and then returns the results.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Since OpenCV is geared to work with real-time image processing, we can also use OpenCV to facilitate real-time augmented reality.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">For the purposes of this tutorial we will:</span></p><span data-dcnode-id="2082" instrument_node="">
</span><ol data-dcnode-id="2071"><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Access our video stream</span></li><li data-dcnode-id="2076"><a aria-label=" (opens in a new tab)" data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pyimagesearch.com/2020/12/21/detecting-aruco-markers-with-opencv-and-python/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2079" instrument_node="">Detect ArUco markers</span></a><span data-dcnode-id="2077" instrument_node=""> in each input frame</span></li><li data-dcnode-id="2072"><span data-dcnode-id="2075" instrument_node="">Take a source image and apply a perspective transform to map the source input onto the frame, </span><em data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">thus creating our augmented reality output!</span></em></li></ol><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2061"><strong data-dcnode-id="2062"><span data-dcnode-id="2069" instrument_node="">And just to make this project </span><em data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">even more</span></em><span data-dcnode-id="2066" instrument_node=""> fun and interesting, we’ll utilize </span><em data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">two</span></em><span data-dcnode-id="2063" instrument_node=""> video streams:</span></strong></p><span data-dcnode-id="2060" instrument_node="">
</span><ol data-dcnode-id="2055"><li data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">The first video stream will act as our “eyes” into the real world (i.e., what our camera sees).</span></li><li data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">We’ll then read frames from the second video stream and then transform them into the first.</span></li></ol><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">By the end of this tutorial, you will have a fully functional OpenCV augmented reality project running in real time!</span></p><span data-dcnode-id="2051" instrument_node="">
</span><h3 data-dcnode-id="2048" id="configuring-your-development-environment"><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Configuring your development environment</span></strong></h3><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">In order to perform real-time augmented reality with OpenCV, you need to have the OpenCV library installed.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Luckily, OpenCV is pip-installable:</span></p><span data-dcnode-id="2041" instrument_node="">

</span><h3 data-dcnode-id="1852" id="implementing-our-marker-detectoraugmented-reality-utility-function"><strong data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Implementing our marker detector/augmented reality utility function</span></strong></h3><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1850" instrument_node="">Before we can implement augmented reality with OpenCV in real-time video streams, we first need to create a helper function, </span><code class="EnlighterJSRAW" data-dcnode-id="1848" data-enlighter-language="python"><span data-dcnode-id="1849" instrument_node="">find_and_warp</span></code><span data-dcnode-id="1847" instrument_node="">, which as the name suggests, will:</span></p><span data-dcnode-id="1845" instrument_node="">
</span><ol data-dcnode-id="1838"><li data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Accept an input image and source image</span></li><li data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Find the four ArUco tags on the input image</span></li><li data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Construct and apply a homography matrix to warp the source image into the input surface</span></li></ol><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Additionally, we’ll include logic to handle when all four ArUco reference points are not detected (and how to ensure there is no flickering/choppiness in our output).</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1833" instrument_node="">Open up the </span><code data-dcnode-id="1830"><code class="EnlighterJSRAW" data-dcnode-id="1831" data-enlighter-language="python"><span data-dcnode-id="1832" instrument_node="">augmented_reality.py</span></code></code><span data-dcnode-id="1829" instrument_node=""> file inside the </span><code class="EnlighterJSRAW" data-dcnode-id="1827" data-enlighter-language="python"><span data-dcnode-id="1828" instrument_node="">pyimagesearch</span></code><span data-dcnode-id="1826" instrument_node=""> module of our project directory structure, and let’s get to work:</span></p><span data-dcnode-id="1824" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1822" data-enlighter-group="3" data-enlighter-highlight="" data-enlighter-language="python" data-enlighter-linenumbers="true" data-enlighter-lineoffset="1" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1823" instrument_node=""># import the necessary packages
import numpy as np
import cv2

# initialize our cached reference points

</span><p data-dcnode-id="1803"><span data-dcnode-id="1807" instrument_node="">We then initialize a global variable, </span><code class="EnlighterJSRAW" data-dcnode-id="1805" data-enlighter-language="python"><span data-dcnode-id="1806" instrument_node="">CACHED_REF_POINTS</span></code><span data-dcnode-id="1804" instrument_node="">, which is our cached reference points (i.e., location of ArUco tag markers in the previous frames).</span></p><span data-dcnode-id="1802" instrument_node="">
</span></div><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1799" instrument_node="">Due to changes in lighting conditions, viewpoint, or motion blur, there will be times when our four reference ArUco markers </span><em data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">cannot</span></em><span data-dcnode-id="1796" instrument_node=""> be detected in a given input frame.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">When that happens we have two courses of action:</span></p><span data-dcnode-id="1791" instrument_node="">
</span><ol data-dcnode-id="1782"><li data-dcnode-id="1787"><strong data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Return from the function with empty output.</span></strong><span data-dcnode-id="1788" instrument_node=""> The benefit to this approach is that it’s simple and easy to implement (and also logically sound). The problem is that it creates a “flickering” effect if the ArUco tags are found in frame #1, missed in #2, and then found again in frame #3.</span></li><li data-dcnode-id="1783"><strong data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Fall back on the previous known location of ArUco markers.</span></strong><span data-dcnode-id="1784" instrument_node=""> This is the caching method. It reduces flickering and helps create a seamless augmented reality experience, but if the reference markers move quickly, then the effects may appear a bit “laggy.”</span></li></ol><span data-dcnode-id="1781" instrument_node="">

</span><p data-dcnode-id="1772"><span data-dcnode-id="1777" instrument_node="">With our imports and variable initializations taken care of, let’s move on to our </span><code data-dcnode-id="1774"><code class="EnlighterJSRAW" data-dcnode-id="1775" data-enlighter-language="python"><span data-dcnode-id="1776" instrument_node="">find_and_warp</span></code></code><span data-dcnode-id="1773" instrument_node=""> function.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1769" data-enlighter-group="4" data-enlighter-highlight="" data-enlighter-language="python" data-enlighter-linenumbers="true" data-enlighter-lineoffset="8" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1770" instrument_node="">def find_and_warp(frame, source, cornerIDs, arucoDict, arucoParams,

</span><p data-dcnode-id="1643"><strong data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Line 24</span></strong><span data-dcnode-id="1653" instrument_node=""> initializes a list of </span><code class="EnlighterJSRAW" data-dcnode-id="1651" data-enlighter-language="python"><span data-dcnode-id="1652" instrument_node="">ids</span></code><span data-dcnode-id="1650" instrument_node="">. If we found four corners, then our </span><code class="EnlighterJSRAW" data-dcnode-id="1648" data-enlighter-language="python"><span data-dcnode-id="1649" instrument_node="">ids</span></code><span data-dcnode-id="1647" instrument_node=""> list is a 1-d NumPy array of the ArUco markers detected. Otherwise, we set </span><code class="EnlighterJSRAW" data-dcnode-id="1645" data-enlighter-language="python"><span data-dcnode-id="1646" instrument_node="">ids</span></code><span data-dcnode-id="1644" instrument_node=""> to an empty array.</span></p><span data-dcnode-id="1642" instrument_node="">

</span><div class="cl-preview-section" data-dcnode-id="1630"><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1632"><strong data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Line 27</span></strong><span data-dcnode-id="1636" instrument_node=""> initializes our list of reference points (</span><code class="EnlighterJSRAW" data-dcnode-id="1634" data-enlighter-language="python"><span data-dcnode-id="1635" instrument_node="">refPts</span></code><span data-dcnode-id="1633" instrument_node="">), which correspond to the four detected ArUco markers.</span></p><span data-dcnode-id="1631" instrument_node="">
</span></div><span data-dcnode-id="1629" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1621"><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node="">We can now loop over our </span><code class="EnlighterJSRAW" data-dcnode-id="1625" data-enlighter-language="python"><span data-dcnode-id="1626" instrument_node="">cornerIDs</span></code><span data-dcnode-id="1624" instrument_node="">:</span></p><span data-dcnode-id="1622" instrument_node="">
</span></div><span data-dcnode-id="1620" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1618" data-enlighter-group="6" data-enlighter-highlight="" data-enlighter-language="python" data-enlighter-linenumbers="true" data-enlighter-lineoffset="29" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1619" instrument_node="">	# loop over the IDs of the ArUco markers in top-left, top-right,
	# bottom-right, and bottom-left order
	for i in cornerIDs:
		# grab the index of the corner with the current ID
		j = np.squeeze(np.where(ids == i))

		# if we receive an empty list instead of an integer index,
		# then we could not find the marker with the current ID
		if j.size == 0:
			continue

		# otherwise, append the corner (x, y)-coordinates to our list
		# of reference points
		corner = np.squeeze(corners[j])
		refPts.append(corner)</span></pre><span data-dcnode-id="1617" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1603"><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1605"><strong data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Line 33</span></strong><span data-dcnode-id="1613" instrument_node=""> finds the index, </span><code data-dcnode-id="1610"><code class="EnlighterJSRAW" data-dcnode-id="1611" data-enlighter-language="python"><span data-dcnode-id="1612" instrument_node="">j</span></code></code><span data-dcnode-id="1609" instrument_node="">, of the corner marker ID, </span><code class="EnlighterJSRAW" data-dcnode-id="1607" data-enlighter-language="python"><span data-dcnode-id="1608" instrument_node="">i</span></code><span data-dcnode-id="1606" instrument_node="">.</span></p><span data-dcnode-id="1604" instrument_node="">
</span></div><span data-dcnode-id="1602" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1591"><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1600" instrument_node="">If no such marker exists for the current marker ID, </span><code class="EnlighterJSRAW" data-dcnode-id="1598" data-enlighter-language="python"><span data-dcnode-id="1599" instrument_node="">i</span></code><span data-dcnode-id="1597" instrument_node="">, then we continue looping (</span><strong data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Lines 37 and 38</span></strong><span data-dcnode-id="1594" instrument_node="">).</span></p><span data-dcnode-id="1592" instrument_node="">
</span></div><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1589" instrument_node="">Otherwise, we add the corner </span><em data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">(x, y)</span></em><span data-dcnode-id="1586" instrument_node="">-coordinates to our reference list (</span><strong data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Lines 42 and 43</span></strong><span data-dcnode-id="1583" instrument_node="">).</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1578"><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">But what happens if we could not find all four reference points? What happens then?</span></strong></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">The next code block addresses that question:</span></p><span data-dcnode-id="1574" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1572" data-enlighter-group="7" data-enlighter-highlight="" data-enlighter-language="python" data-enlighter-linenumbers="true" data-enlighter-lineoffset="45" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1573" instrument_node="">	# check to see if we failed to find the four ArUco markers
	if len(refPts) != 4:
		# if we are allowed to use cached reference points, fall
		# back on them
		if useCache and CACHED_REF_PTS is not None:
			refPts = CACHED_REF_PTS

		# otherwise, we cannot use the cache and/or there are no
		# previous cached reference points, so return early
		else:
			return None

	# if we are allowed to use cached reference points, then update
	# the cache with the current set
	if useCache:
		CACHED_REF_PTS = refPts</span></pre><span data-dcnode-id="1571" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1564"><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1566"><strong data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Line 46</span></strong><span data-dcnode-id="1567" instrument_node=""> makes a check to see if we failed to detect all four ArUco markers. When that happens we have two choices:</span></p><span data-dcnode-id="1565" instrument_node="">
</span></div><span data-dcnode-id="1563" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1539"><span data-dcnode-id="1562" instrument_node="">
</span><ol data-dcnode-id="1541"><span data-dcnode-id="1561" instrument_node="">
</span><li data-dcnode-id="1553"><span data-dcnode-id="1560" instrument_node="">Fall back on the cache and use our </span><code class="EnlighterJSRAW" data-dcnode-id="1558" data-enlighter-language="python"><span data-dcnode-id="1559" instrument_node="">CACHED_REF_PTS</span></code><span data-dcnode-id="1557" instrument_node=""> (</span><strong data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Lines 49 and 50</span></strong><span data-dcnode-id="1554" instrument_node="">)</span></li><span data-dcnode-id="1552" instrument_node="">
</span><li data-dcnode-id="1543"><span data-dcnode-id="1551" instrument_node="">Simply return </span><code data-dcnode-id="1548"><code class="EnlighterJSRAW" data-dcnode-id="1549" data-enlighter-language="python"><span data-dcnode-id="1550" instrument_node="">None</span></code></code><span data-dcnode-id="1547" instrument_node=""> to the calling function, indicating that we could not perform the augmented reality transform (</span><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Lines 54 and 55</span></strong><span data-dcnode-id="1544" instrument_node="">)</span></li><span data-dcnode-id="1542" instrument_node="">
</span></ol><span data-dcnode-id="1540" instrument_node="">
</span></div><span data-dcnode-id="1538" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1523"><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1536" instrument_node="">Provided we are using the reference point cache, we update our </span><code data-dcnode-id="1533"><code class="EnlighterJSRAW" data-dcnode-id="1534" data-enlighter-language="python"><span data-dcnode-id="1535" instrument_node="">CACHED_REF_PTS</span></code></code><span data-dcnode-id="1532" instrument_node=""> on </span><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Lines 59 and 60</span></strong><span data-dcnode-id="1529" instrument_node=""> with the current set of </span><code class="EnlighterJSRAW" data-dcnode-id="1527" data-enlighter-language="python"><span data-dcnode-id="1528" instrument_node="">refPts</span></code><span data-dcnode-id="1526" instrument_node="">.</span></p><span data-dcnode-id="1524" instrument_node="">
</span></div><span data-dcnode-id="1522" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1513"><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1520" instrument_node="">Given our </span><code data-dcnode-id="1517"><code class="EnlighterJSRAW" data-dcnode-id="1518" data-enlighter-language="python"><span data-dcnode-id="1519" instrument_node="">refPts</span></code></code><span data-dcnode-id="1516" instrument_node=""> (cached or otherwise) we now need to construct our homography matrix and apply a perspective warp:</span></p><span data-dcnode-id="1514" instrument_node="">
</span></div><span data-dcnode-id="1512" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1510" data-enlighter-group="8" data-enlighter-highlight="" data-enlighter-language="python" data-enlighter-linenumbers="true" data-enlighter-lineoffset="62" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1511" instrument_node="">	# unpack our ArUco reference points and use the reference points
	# to define the *destination* transform matrix, making sure the
	# points are specified in top-left, top-right, bottom-right, and
	# bottom-left order
	(refPtTL, refPtTR, refPtBR, refPtBL) = refPts
	dstMat = [refPtTL[0], refPtTR[1], refPtBR[2], refPtBL[3]]
	dstMat = np.array(dstMat)

	# define the transform matrix for the *source* image in top-left,
	# top-right, bottom-right, and bottom-left order
	srcMat = np.array([[0, 0], [srcW, 0], [srcW, srcH], [0, srcH]])

	# compute the homography matrix and then warp the source image to
	# the destination based on the homography
	(H, _) = cv2.findHomography(srcMat, dstMat)
	warped = cv2.warpPerspective(source, H, (imgW, imgH))</span></pre><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1508" instrument_node="">The code above, as well as in the remainder of this function, is essentially identical to that of </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pyimagesearch.com/2021/01/04/opencv-augmented-reality-ar/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1507" instrument_node="">last week</span></a><span data-dcnode-id="1505" instrument_node="">, so I will defer a detailed discussion of these code blocks to the previous guide.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1483"><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1485"><strong data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Lines 66-68</span></strong><span data-dcnode-id="1499" instrument_node=""> construct our destination matrix (i.e., where the </span><code data-dcnode-id="1496"><code class="EnlighterJSRAW" data-dcnode-id="1497" data-enlighter-language="python"><span data-dcnode-id="1498" instrument_node="">source</span></code></code><span data-dcnode-id="1495" instrument_node=""> image will be mapped to in the input </span><code class="EnlighterJSRAW" data-dcnode-id="1493" data-enlighter-language="python"><span data-dcnode-id="1494" instrument_node="">frame</span></code><span data-dcnode-id="1492" instrument_node="">), while </span><strong data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Line 72</span></strong><span data-dcnode-id="1489" instrument_node=""> creates the source matrix, which is simply the top-left, top-right, bottom-right, and bottom-left corners of the </span><code class="EnlighterJSRAW" data-dcnode-id="1487" data-enlighter-language="python"><span data-dcnode-id="1488" instrument_node="">source</span></code><span data-dcnode-id="1486" instrument_node=""> image.</span></p><span data-dcnode-id="1484" instrument_node="">
</span></div><span data-dcnode-id="1482" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1468"><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1470"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Line 76</span></strong><span data-dcnode-id="1478" instrument_node=""> computes our homography matrix from the two matrices. This homography matrix is used on </span><strong data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Line 77</span></strong><span data-dcnode-id="1475" instrument_node=""> to construct the </span><code data-dcnode-id="1472"><code class="EnlighterJSRAW" data-dcnode-id="1473" data-enlighter-language="python"><span data-dcnode-id="1474" instrument_node="">warped</span></code></code><span data-dcnode-id="1471" instrument_node=""> image.</span></p><span data-dcnode-id="1469" instrument_node="">
</span></div><span data-dcnode-id="1467" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1456"><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1465" instrument_node="">From there we need to prepare a mask that will allow us to seamlessly apply the </span><code class="EnlighterJSRAW" data-dcnode-id="1463" data-enlighter-language="python"><span data-dcnode-id="1464" instrument_node="">warped</span></code><span data-dcnode-id="1462" instrument_node=""> image to the </span><code class="EnlighterJSRAW" data-dcnode-id="1460" data-enlighter-language="python"><span data-dcnode-id="1461" instrument_node="">frame</span></code><span data-dcnode-id="1459" instrument_node="">:</span></p><span data-dcnode-id="1457" instrument_node="">
</span></div><span data-dcnode-id="1455" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1453" data-enlighter-group="9" data-enlighter-highlight="" data-enlighter-language="python" data-enlighter-linenumbers="true" data-enlighter-lineoffset="79" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1454" instrument_node="">	# construct a mask for the source image now that the perspective
	# warp has taken place (we'll need this mask to copy the source
	# image into the destination)
	mask = np.zeros((imgH, imgW), dtype="uint8")
	cv2.fillConvexPoly(mask, dstMat.astype("int32"), (255, 255, 255),
		cv2.LINE_AA)

	# this step is optional, but to give the source image a black
	# border surrounding it when applied to the source image, you
	# can apply a dilation operation
	rect = cv2.getStructuringElement(cv2.MORPH_RECT, (3, 3))
	mask = cv2.dilate(mask, rect, iterations=2)

	# create a three channel version of the mask by stacking it
	# depth-wise, such that we can copy the warped source image
	# into the input image
	maskScaled = mask.copy() / 255.0
	maskScaled = np.dstack([maskScaled] * 3)</span></pre><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1438"><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Lines 82-84</span></strong><span data-dcnode-id="1449" instrument_node=""> allocate memory for a </span><code data-dcnode-id="1446"><code class="EnlighterJSRAW" data-dcnode-id="1447" data-enlighter-language="python"><span data-dcnode-id="1448" instrument_node="">mask</span></code></code><span data-dcnode-id="1445" instrument_node=""> that we then fill in with </span><em data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">white</span></em><span data-dcnode-id="1442" instrument_node=""> for the foreground and </span><em data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">black</span></em><span data-dcnode-id="1439" instrument_node=""> for the background.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">A dilation operation is performed on </span><strong data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Lines 89 and 90</span></strong><span data-dcnode-id="1433" instrument_node=""> to create a black border surrounding the source image (optional, but looks good for aesthetic purposes).</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1430" instrument_node="">We then scale our mask from the range </span><em data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">[0, 255]</span></em><span data-dcnode-id="1427" instrument_node=""> to </span><em data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">[0, 1]</span></em><span data-dcnode-id="1424" instrument_node=""> and then stack it depth-wise, resulting in a 3-channel mask.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1421" instrument_node="">The final step is to use the </span><code class="EnlighterJSRAW" data-dcnode-id="1419" data-enlighter-language="python"><span data-dcnode-id="1420" instrument_node="">mask</span></code><span data-dcnode-id="1418" instrument_node=""> to apply the </span><code class="EnlighterJSRAW" data-dcnode-id="1416" data-enlighter-language="python"><span data-dcnode-id="1417" instrument_node="">warped</span></code><span data-dcnode-id="1415" instrument_node=""> image to the input surface:</span></p><span data-dcnode-id="1413" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1411" data-enlighter-group="10" data-enlighter-highlight="" data-enlighter-language="python" data-enlighter-linenumbers="true" data-enlighter-lineoffset="98" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1412" instrument_node="">	# copy the warped source image into the input image by
	# (1) multiplying the warped image and masked together,
	# (2) then multiplying the original input image with the
	# mask (giving more weight to the input where there
	# *ARE NOT* masked pixels), and (3) adding the resulting
	# multiplications together
	warpedMultiplied = cv2.multiply(warped.astype("float"),
		maskScaled)
	imageMultiplied = cv2.multiply(frame.astype(float),
		1.0 - maskScaled)
	output = cv2.add(warpedMultiplied, imageMultiplied)
	output = output.astype("uint8")

	# return the output frame to the calling function
	return output</span></pre><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1397"><strong data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Lines 104-109</span></strong><span data-dcnode-id="1407" instrument_node=""> copy the </span><code data-dcnode-id="1404"><code class="EnlighterJSRAW" data-dcnode-id="1405" data-enlighter-language="python"><span data-dcnode-id="1406" instrument_node="">warped</span></code></code><span data-dcnode-id="1403" instrument_node=""> image onto the output </span><code class="EnlighterJSRAW" data-dcnode-id="1401" data-enlighter-language="python"><span data-dcnode-id="1402" instrument_node="">frame</span></code><span data-dcnode-id="1400" instrument_node="">, which we then return to the calling function on </span><strong data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Line 112.</span></strong></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1395" instrument_node="">For a more detailed review of the actual homography matrix construction, warp transform, and post-processing tasks, refer to </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pyimagesearch.com/2021/01/04/opencv-augmented-reality-ar/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1394" instrument_node="">last week’s guide</span></a><span data-dcnode-id="1392" instrument_node="">.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><h3 data-dcnode-id="1387" id="creating-our-opencv-video-augmented-reality-driver-script"><strong data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Creating our OpenCV video augmented reality driver script</span></strong></h3><span data-dcnode-id="1386" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1373"><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1384" instrument_node="">With our </span><code data-dcnode-id="1381"><code class="EnlighterJSRAW" data-dcnode-id="1382" data-enlighter-language="python"><span data-dcnode-id="1383" instrument_node="">find_and_warp</span></code></code><span data-dcnode-id="1380" instrument_node=""> helper function implemented, we can move on to creating our </span><code data-dcnode-id="1377"><code class="EnlighterJSRAW" data-dcnode-id="1378" data-enlighter-language="python"><span data-dcnode-id="1379" instrument_node="">opencv_ar_video.py</span></code></code><span data-dcnode-id="1376" instrument_node=""> script, which is responsible for real-time augmented reality.</span></p><span data-dcnode-id="1374" instrument_node="">
</span></div><span data-dcnode-id="1372" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1363"><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1370" instrument_node="">Let’s open up the </span><code data-dcnode-id="1367"><code class="EnlighterJSRAW" data-dcnode-id="1368" data-enlighter-language="python"><span data-dcnode-id="1369" instrument_node="">opencv_ar_video.py</span></code></code><span data-dcnode-id="1366" instrument_node=""> script and start coding:</span></p><span data-dcnode-id="1364" instrument_node="">
</span></div><span data-dcnode-id="1362" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1360" data-enlighter-group="11" data-enlighter-highlight="" data-enlighter-language="python" data-enlighter-linenumbers="true" data-enlighter-lineoffset="1" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1361" instrument_node=""># import the necessary packages

</span><div class="cl-preview-section" data-dcnode-id="1352"><span data-dcnode-id="1358" instrument_node="">

</span><li data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node="">The source </span><code class="EnlighterJSRAW" data-dcnode-id="1037" data-enlighter-language="python"><span data-dcnode-id="1038" instrument_node="">--input</span></code><span data-dcnode-id="1036" instrument_node=""> video file runs out of frames</span></li><span data-dcnode-id="1034" instrument_node="">
</span></ol><span data-dcnode-id="1032" instrument_node="">
</span></div><span data-dcnode-id="1030" instrument_node="">
</span><div class="cl-preview-section" data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Take a second to congratulate yourself on implementing real-time augmented reality with OpenCV!</span></p><span data-dcnode-id="1026" instrument_node="">
</span></div><span data-dcnode-id="1024" instrument_node="">
</span><h3 data-dcnode-id="1021" id="augmented-reality-in-real-time-video-streams-with-opencv"><strong data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Augmented reality in real-time video streams with OpenCV</span></strong></h3><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Ready to perform augmented reality in real-time video streams with OpenCV?</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1016" instrument_node="">Start by using the </span><strong data-dcnode-id="1013"><em data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">“Downloads”</span></em></strong><span data-dcnode-id="1012" instrument_node=""> section of this tutorial to download the source code and example video.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">From there, open up a terminal, and execute the following command:</span></p><span data-dcnode-id="1007" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="1005" data-enlighter-group="17" data-enlighter-highlight="" data-enlighter-language="shell" data-enlighter-linenumbers="true" data-enlighter-lineoffset="1" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="1006" instrument_node="">$ python opencv_ar_video.py --input videos/jp_trailer_short.mp4
[INFO] initializing marker detector...
[INFO] accessing video stream...
[INFO] starting video stream...</span></pre><span data-dcnode-id="1004" instrument_node="">
</span><div class="wistia_responsive_padding" data-dcnode-id="1000" style="padding:59.38% 0 0 0;position:relative;"><div class="wistia_responsive_wrapper" data-dcnode-id="1001" style="height:100%;left:0;position:absolute;top:0;width:100%;"><div class="wistia_embed wistia_async_cqr41pvdzw videoFoam=true" data-dcnode-id="1002" style="height:100%;position:relative;width:100%"><span data-dcnode-id="1003" instrument_node=""> </span></div></div></div><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">As you can see from my output, we are:</span></p><span data-dcnode-id="996" instrument_node="">
</span><ol data-dcnode-id="980"><li data-dcnode-id="988"><span data-dcnode-id="995" instrument_node="">Reading frames from </span><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">both</span></em><span data-dcnode-id="992" instrument_node=""> my camera sensor as well as the </span><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Jurassic Park</span></em><span data-dcnode-id="989" instrument_node=""> trailer video residing on disk</span></li><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Detecting the ArUco tags on the card</span></li><li data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">Applying a perspective warp to transform the video frame from the </span><em data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Jurassic Park</span></em><span data-dcnode-id="982" instrument_node=""> trailer onto the real-world environment captured by my camera</span></li></ol><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Furthermore, note that our augmented reality application is running in real time!</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">However, there is a bit of an issue …</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="965"><strong data-dcnode-id="966"><span data-dcnode-id="972" instrument_node="">Notice there is </span><em data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">considerable flickering</span></em><span data-dcnode-id="969" instrument_node=""> that appears in the output frames — </span><em data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">why is that?</span></em></strong></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">The reason is that the ArUco marker detection is not fully “stable.” In some frames all four markers are detected and in others they are not.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">An ideal solution would be to ensure all four markers are </span><em data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">always</span></em><span data-dcnode-id="957" instrument_node=""> detected, but that can’t be guaranteed in every scenario.</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Instead, what we can do is fall back on reference point caching:</span></p><span data-dcnode-id="952" instrument_node="">
</span><pre class="EnlighterJSRAW" data-dcnode-id="950" data-enlighter-group="18" data-enlighter-highlight="" data-enlighter-language="shell" data-enlighter-linenumbers="true" data-enlighter-lineoffset="1" data-enlighter-theme="" data-enlighter-title="OpenCV Video Augmented Reality"><span data-dcnode-id="951" instrument_node="">$ python opencv_ar_video.py --input videos/jp_trailer_short.mp4 --cache 1
[INFO] initializing marker detector...
[INFO] accessing video stream...
[INFO] starting video stream...</span></pre><span data-dcnode-id="949" instrument_node="">
</span><div class="wistia_responsive_padding" data-dcnode-id="945" style="padding:58.13% 0 0 0;position:relative;"><div class="wistia_responsive_wrapper" data-dcnode-id="946" style="height:100%;left:0;position:absolute;top:0;width:100%;"><div class="wistia_embed wistia_async_41723a41k2 videoFoam=true" data-dcnode-id="947" style="height:100%;position:relative;width:100%"><span data-dcnode-id="948" instrument_node=""> </span></div></div></div><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="943" instrument_node="">Using reference point caching you can now see that our results are a bit better. When the four ArUco markers are not detected in the </span><em data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">current</span></em><span data-dcnode-id="940" instrument_node=""> frame, we fall back to their location in the </span><em data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">previous</span></em><span data-dcnode-id="937" instrument_node=""> frame where all four were detected.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Another potential solution is to utilize optical flow to help aid in reference point tracking (but that topic is outside the scope of this tutorial).</span></p><span data-dcnode-id="932" instrument_node="">

</span><h2 data-dcnode-id="798" id="summary"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Summary</span></strong></h2><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">In this tutorial you learned how to perform real-time augmented reality with OpenCV.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="793" instrument_node="">Using OpenCV, we were able to access our webcam, </span><a aria-label=" (opens in a new tab)" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pyimagesearch.com/2020/12/21/detecting-aruco-markers-with-opencv-and-python/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="792" instrument_node="">detect ArUco tags</span></a><span data-dcnode-id="790" instrument_node="">, and then transform an input image/frame into our scene, </span><em data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">all while running in real time!</span></em></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="780"><strong data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">However, one of the biggest drawbacks to this augmented reality approach is that it </span><em data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">requires</span></em><span data-dcnode-id="782" instrument_node=""> we use markers/fiducials, such as ArUco tags, AprilTags, etc.</span></strong></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="778" instrument_node="">There is an active area of augmented reality research called </span><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">markerless augmented reality.</span></strong></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="773" instrument_node="">With markerless augmented reality we </span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">do not</span></em><span data-dcnode-id="770" instrument_node=""> need prior knowledge of the real-world environment, such as specific markers or objects that </span><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">have</span></em><span data-dcnode-id="767" instrument_node=""> to reside in our video stream.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Markerless augmented reality makes for much more beautiful, immersive experiences; however, most markerless augmented reality systems require flat textures/regions in order to work.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">And furthermore, markerless augmented reality requires </span><em data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">significantly</span></em><span data-dcnode-id="758" instrument_node=""> more complex and computationally expensive algorithms.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">We’ll cover markerless augmented reality in a future set of tutorials on the PyImageSearch blog.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="748"><strong data-dcnode-id="749"><span data-dcnode-id="752" instrument_node="">To download the source code to this post (and be notified when future tutorials are published here on PyImageSearch), </span><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">simply enter your email address in the form below!</span></em></strong></p><span data-dcnode-id="747" instrument_node="">
