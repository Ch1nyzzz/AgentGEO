</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Although previous research has highlighted that virtual reality (VR) technologies can enhance customer experience, the efficacy of VR technologies in real estate remains unclear. Therefore, this study examines the effects of offering consumers a non-immersive VR experience via a widely available technology, that allows them to view real estate products. Participants accessed the website of a real estate agency that presented apartments through either static photos or interactive 360° visits. The latter condition was associated with better “visiting” experiences and more positive attitudes toward both the products and the agency. This study highlights the advantages of such technologies in enhancing customer experience and attitudes, particularly in the highly competitive real estate industry.</p></div></div></div>" data-dcnode-id="809" lang="en" name="citation_abstract"><span data-dcnode-id="808" instrument_node="">

ria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jretconser.2020.102175" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="443" instrument_node="">https://doi.org/10.1016/j.jretconser.2020.102175</span></a><a class="rights-and-content" data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0969698920308274%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="441" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="438"></section><section class="ReferencedArticles" data-dcnode-id="437"></section><div class="PageDivider" data-dcnode-id="436"></div><div class="Abstracts u-font-serif" data-dcnode-id="429" id="abstracts"><div class="abstract author" data-dcnode-id="430" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Abstract</span></h2><div data-dcnode-id="431" id="abssec0010"><p data-dcnode-id="432" id="abspara0010"><span data-dcnode-id="433" instrument_node="">Although previous research has highlighted that virtual reality (VR) technologies can enhance customer experience, the efficacy of VR technologies in real estate remains unclear. Therefore, this study examines the effects of offering consumers a non-immersive VR experience via a widely available technology, that allows them to view real estate products. Participants accessed the website of a real estate agency that presented apartments through either static photos or interactive 360° visits. The latter condition was associated with better “visiting” experiences and more positive attitudes toward both the products and the agency. This study highlights the advantages of such technologies in enhancing customer experience and attitudes, particularly in the highly competitive real estate industry.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="406" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="418"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698918306313"><svg class="icon icon-navigate-left" data-dcnode-id="427" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="428"></path></svg><span class="button-alternative-text" data-dcnode-id="420"><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="407"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S096969891931567X"><span class="button-alternative-text" data-dcnode-id="411"><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="409" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="410"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="390"><div class="keywords-section" data-dcnode-id="391" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="401" id="kwrd0010"><span data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Non-immersive virtual reality</span></span></div><div class="keyword" data-dcnode-id="398" id="kwrd0015"><span data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">360° visit</span></span></div><div class="keyword" data-dcnode-id="395" id="kwrd0020"><span data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Customer experience</span></span></div><div class="keyword" data-dcnode-id="392" id="kwrd0025"><span data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Service provider</span></span></div></div></div><span data-dcnode-id="389" instrument_node=""></span><div class="related-content-links u-hide-from-md" data-dcnode-id="382"><button class="button button-anchor vsi-button" data-dcnode-id="386" type="button"><span class="button-text" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="383" type="button"><span class="button-text" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="381"></div><div data-dcnode-id="259" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="260"><div class="PageDivider" data-dcnode-id="380"></div><header data-dcnode-id="377" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Cited by (17)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="261"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="262"><ul data-dcnode-id="268"><li class="ListArticleItem" data-dcnode-id="359"><div class="sub-heading" data-dcnode-id="371"><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698922000704" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="375" id="citing-articles-article0-title"><span data-dcnode-id="376" instrument_node="">In the consumers’ eye: A mixed-method approach to understanding how VR-Content influences unbranded product quality perceptions</span></h3></a><div class="article-source ellipsis" data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">2022, Journal of Retailing and Consumer Services</span></div></div><div class="buttons" data-dcnode-id="365"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="366" type="button"><span class="button-link-text" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="367" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="368"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="360"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="361" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="362"><p data-dcnode-id="363" id="abspara0010"><span data-dcnode-id="364" instrument_node="">Virtual reality (VR) is an exciting technology that offers great promise as a novel promotional tool. The notion that promotional tools can signal brand quality to consumers is supported in the literature, but the impact for products when brand signals are not paramount is less understood. We use a mixed-method approach to explore how VR-content influences consumers' quality perceptions for products where branding is less relied upon. Findings from a qualitative study reveal that the perception of VR-content's innovativeness acts as a heuristic to signal product quality for unbranded property products. Results from two quasi-experimental studies reveal that while industry-perceived innovative VR-content may not signal consumers' product quality perceptions, consumers' perception of media innovativeness can signal product quality for the offering and increase purchase intentions. Theoretical and managerial implications are discussed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="341"><div class="sub-heading" data-dcnode-id="353"><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698922000431" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="357" id="citing-articles-article1-title"><span data-dcnode-id="358" instrument_node="">Customer engagement in the context of retail mobile apps: A contingency model integrating spatial presence experience and its drivers</span></h3></a><div class="article-source ellipsis" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">2022, Journal of Retailing and Consumer Services</span></div></div><div class="buttons" data-dcnode-id="347"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="348" type="button"><span class="button-link-text" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="349" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="350"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="342"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="343" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="344"><p data-dcnode-id="345" id="abspara0010"><span data-dcnode-id="346" instrument_node="">This study develops and investigates the mechanisms through which retail mobile-app cognitions—i.e., interactivity and vividness—are translated into spatial presence experience and subsequently result in customer engagement under the parasol of the hierarchy-of-effects model and the situated cognition theory. The contingency roles of need for cognition and domain-specific interest as individual intrinsic tendencies and issue-specific motivations, respectively, are also scrutinized. A dataset obtained from a survey of 558 customers is employed to estimate the proposed research model. The results indicate that interactivity and vividness significantly stimulate the spatial presence experience, i.e., feelings of “being there” in the mobile-app environment; in turn, this drives customers to become more engaged and contribute to retailers that provide such experiences. The moderating roles of the two motivations are also identified.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="323"><div class="sub-heading" data-dcnode-id="335"><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2090447921003968" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="339" id="citing-articles-article2-title"><span data-dcnode-id="340" instrument_node="">Development of smart application for house condition survey</span></h3></a><div class="article-source ellipsis" data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">2022, Ain Shams Engineering Journal</span></div></div><div class="buttons" data-dcnode-id="329"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="330" type="button"><span class="button-link-text" data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="331" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="332"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="324"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="325" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="326"><p data-dcnode-id="327" id="sp0005"><span data-dcnode-id="328" instrument_node="">Information based technologies and devices have proven their effectiveness in almost all the aspects of life. In near past it was hard to believe that, building systems and devices can be controlled through phone. However, IT has made it possible and today it is difficulty to think of a normal life without IT. Mobile application is another marvel of IT technology that allows people to carry all essential businesses through various types of mobile applications. Easiness, secure and resourceful are three factors that moves the masses of population to switch overuse of mobile technology. This study has been planned to develop a mobile application to conduct house condition survey. Methodology of study is planned on three core factors i.e. literature review, a data of building defects, and application development process. An inclusive database of low rise building defects (secondary data) was acquired from from earlier research of first author. The acquired secondary data from Chohan, A.H (2007) has surfaced the various types of building defects and their implications in low rise RCC construction/buildings. Data was validated through participation at site and 10 major segments of building defects were identified. Through review of literature research validity was established, application development process was accomplished and various IoT models and similar application were identified. In application development process, study has set the hierarchy of building defects, construed app. development process in domain of building surveying, validate the data, and developed a conceptual plan of smart survey. In addition, defined the development process of mobile application. In section 3, this research has explained the development of mobile application through three major steps i.e. classifying data, setting defects hierarchy and application development. Study has succeeded to surface a prototype framework of smart “Smart Condition Survey” (SCS) which can be practically used for development of real-time mobile application.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="305"><div class="sub-heading" data-dcnode-id="317"><a data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698921004367" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="321" id="citing-articles-article3-title"><span data-dcnode-id="322" instrument_node="">Examining consumer experience in using m-banking apps: A study of its antecedents and outcomes</span></h3></a><div class="article-source ellipsis" data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">2022, Journal of Retailing and Consumer Services</span></div></div><div class="buttons" data-dcnode-id="311"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="312" type="button"><span class="button-link-text" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="313" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="314"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="306"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="307" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="308"><p data-dcnode-id="309" id="abspara0010"><span data-dcnode-id="310" instrument_node="">The purpose of this study is to examine the antecedents and outcomes of consumer experience (CX) with mobile banking (m-banking) apps. To understand the linkage of CX with other constructs, data collection was done using a structured questionnaire through an online survey. A sample of 473 respondents were analysed using structural equation modeling by testing the proposed hypotheses in AMOS (Analysis of Moment Structures) version 22.0. The findings revealed that convenience, trust, and social influence play a significant role in enhancing CX with the m-banking app use. Apps attributes was found to be relatively less important and no relationship was found between customer support and CX. Customer loyalty and customer intention to continue using the m-banking apps were observed as significant outcome variables. This study will contribute to the growing literature on CX and will guide managers in recognizing the importance of CX in designing appropriate strategies for the promotion of m-banking and engaging their customers in a developing country context.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="287"><div class="sub-heading" data-dcnode-id="299"><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1474034621002081" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="303" id="citing-articles-article4-title"><span data-dcnode-id="304" instrument_node="">An integrated framework of user experience-oriented smart service requirement analysis for smart product service system development</span></h3></a><div class="article-source ellipsis" data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">2022, Advanced Engineering Informatics</span></div></div><div class="buttons" data-dcnode-id="293"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="294" type="button"><span class="button-link-text" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="295" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="296"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="288"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="289" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="290"><p data-dcnode-id="291" id="sp0005"><span data-dcnode-id="292" instrument_node="">The rapid deployment of digital technologies drives the conventional product service system (PSS) to shift into a new paradigm known as smart PSS. Empowered with smart capabilities, smart PSS has great potential in creating positive user experience (UX). The requirements analysis is an essential task for successful development of smart PSS with strong UX. Nevertheless, there is still a lack of research on the requirement analysis of smart PSS by incorporating smart-enabled UX perspective. Hence, this paper proposes a framework of user experience-oriented smart service requirement (UXO-SSR) analysis for smart PSS development. At first, the relevant factors (e.g., user personas and activity journey) are integrated to conceptualize the UX in smart PSS context. Second, a four-phase model is proposed for identifying UXO-SSR, which can provide an effective tool for acquiring UX requirements of smart PSS from holistic perspective. Third, a novel asymmetric trapezium cloud-based uncertain linguistic BWM approach is developed to evaluate the priority of the identified UXO-SSRs. The approach can appropriately handle the hybrid uncertainties (i.e., hesitancy, fuzziness and randomness) of linguistic evaluation information, thereby improving the accuracy of evaluation results. Finally, a case study of smart sleep service system is presented to demonstrate the feasibility and reliability of the proposed framework.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="269"><div class="sub-heading" data-dcnode-id="281"><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0148296321005579" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="285" id="citing-articles-article5-title"><span data-dcnode-id="286" instrument_node="">Virtual reality marketing and customer advocacy: Transforming experiences from story-telling to story-doing</span></h3></a><div class="article-source ellipsis" data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">2021, Journal of Business Research</span></div></div><div class="buttons" data-dcnode-id="275"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="276" type="button"><span class="button-link-text" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="277" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="278"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="270"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="271" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="272"><p data-dcnode-id="273" id="sp0010"><span data-dcnode-id="274" instrument_node="">Marketing managers strive to build branded experiences that both excite and engage their customers in novel ways in order to enhance attitudes and encourage positive behaviors towards their brands. As it offers immersive and interactive encounters, Virtual Reality (VR) technology is a promising tool for managers to create these experiences, evidenced by increasing and successful VR marketing applications. Yet, the literature offers little guidance on how VR experiences can be strategically designed to create favorable customer perceptions, attitudes, and behaviors. Based on five semi-structured focus groups of 27 VR consumers, this article constructs a framework that deconstructs VR branded experiences into both narrative and social interactions to optimize strategic customer outcomes. An experimental study validates the findings after which practical recommendations to maximize the success of VR branding campaigns and a future research agenda for VR marketing is provided.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85086469365%26md5%3Dd3bc74e0df9febc0625fa7eeeee3e1d" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="266" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="267"></path></svg><span class="button-alternative-text" data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a aria-disabled="false" class="anchor full-text-link" data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698920308274" tabindex="0"><span class="anchor-text" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">View full text</span></span></a><div class="Copyright" data-dcnode-id="253"><span class="copyright-line" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">© 2020 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SpecialIssueArticles" data-dcnode-id="236" id="virtual-special-issue"><div class="part-of-issue u-padding-s-bottom" data-dcnode-id="237"><h2 class="part-of-issue-text u-h4" data-dcnode-id="250"><span data-dcnode-id="251" ins
