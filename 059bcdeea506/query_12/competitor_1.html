</span><h1 class="h1 standard-heading" data-dcnode-id="864" itemprop="name headline"><span data-dcnode-id="865" instrument_node="">Immersive technology</span></h1><span data-dcnode-id="863" instrument_node="">
</span></div><span data-dcnode-id="860" instrument_node="">
</span><div class="xs-12 lg-6 mt-0 mb-0" data-dcnode-id="843"><span data-dcnode-id="859" instrument_node="">
</span><p class="preamble" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">
                    5G and immersive technology is fundamentally changing the way we live,&nbsp;work&nbsp;and consume information and media. Now’s the time to bridge the gap between the digital and physical worlds. Discover new use case opportunities&nbsp;and how to capture the market potential today.&nbsp;
                </span></p><span data-dcnode-id="856" instrument_node="">
</span><div class="page-meta" data-dcnode-id="845"><span data-dcnode-id="855" instrument_node="">

</span><h2 class="heading section-menu-target id_119b3539-8029-4064-b0be-84c89a2b6931" data-dcnode-id="828" id="theeraofimmersiveexperiences"><span data-dcnode-id="829" instrument_node="">

                    </span></h2><span data-dcnode-id="827" instrument_node="">
</span></div><span data-dcnode-id="825" instrument_node="">
</span></div><span data-dcnode-id="823" instrument_node="">

</span><div class="row" data-dcnode-id="809"><span data-dcnode-id="816" instrument_node="">
</span><div class="xs-12 mt-0" data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">5G blurs the boundaries between the physical world and the digital space, allowing consumers to step into 360-degree immersive digital experiences. With immersive technologies becoming more intuitive and natural – moving from being screen based to voice or gesture based – interactive content has the power to transform enterprises and deliver consumer experiences that will define the media and gaming industry for years to come.</span></p><span data-dcnode-id="812" instrument_node="">

</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">5G will bring new use cases and business models&nbsp;that will transform industry and enterprises, unlocking untapped value for all players across the entire ecosystem.&nbsp;Connectivity is key, and&nbsp;service providers are in&nbsp;prime&nbsp;position to enable the realization of immersive experiences on a large scale by:</span></p><span data-dcnode-id="691" instrument_node="">
</span><ul data-dcnode-id="680"><span data-dcnode-id="690" instrument_node="">
</span><li data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Capitalizing on 5G networks</span></li><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Leveraging partnerships</span></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Extending roles as connectivity providers</span></li><span data-dcnode-id="681" instrument_node="">
</span></ul><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Monetizing this market will require new and more dynamic ways of selling connectivity to consumers, delivering upon a combination of instant, personalized and app-specific needs for network performance. Together with partners, now’s the time to start exploring how to wrap this into a great consumer experience, including aspects of packaging,&nbsp;pricing&nbsp;and service delivery.</span></p><span data-dcnode-id="676" instrument_node="">

</span><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Gaming: Immersive multiplayer gaming</span></li><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Manufacturing: Digital twins for training, collaboration and enhanced maintenance</span></li><span data-dcnode-id="583" instrument_node="">
