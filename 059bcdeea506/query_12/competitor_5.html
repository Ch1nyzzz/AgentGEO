 9.985-6.7l-.015-.065z" data-dcnode-id="2235" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Email</span></span></a></div></div><p class="meta" data-dcnode-id="2200"><span class="estimated-reading" data-dcnode-id="2222"><span data-dcnode-id="2227" instrument_node="">Estimated reading time</span><br data-dcnode-id="2226"><strong data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">6 minutes</span></strong><br data-dcnode-id="2223"></span><span data-dcnode-id="2221" instrument_node="">30th September 2019</span><br data-dcnode-id="2220"><span data-dcnode-id="2219" instrument_node="">Author: </span><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turtl.co/blog/author/nick/"><span data-dcnode-id="2218" instrument_node="">Nick Mason</span></a><br data-dcnode-id="2216"><span data-dcnode-id="2215" instrument_node="">Posted in: </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turtl.co/blog/category/distribution/"><span data-dcnode-id="2214" instrument_node="">Content Distribution &amp; Promotion</span></a><span data-dcnode-id="2212" instrument_node="">, </span><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turtl.co/blog/category/content-operations/"><span data-dcnode-id="2211" instrument_node="">Content Operations</span></a><span data-dcnode-id="2209" instrument_node="">, </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turtl.co/blog/category/production/"><span data-dcnode-id="2208" instrument_node="">Content Production</span></a><span data-dcnode-id="2206" instrument_node="">, </span><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turtl.co/blog/category/customer-insights/"><span data-dcnode-id="2205" instrument_node="">Customer Insights</span></a><span data-dcnode-id="2203" instrument_node="">, </span><a data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turtl.co/blog/category/tech/"><span data-dcnode-id="2202" instrument_node="">Technology</span></a></p><p data-dcnode-id="2197"><span data-dcnode-id="2198" style="font-weight: 400;"><span data-dcnode-id="2199" instrument_node="">With virtual technology making Black Mirror look more like a documentary every day, it’s no surprise forward-thinking companies have already started to experiment with immersive technology in their brand marketing.&nbsp;</span></span></p><p data-dcnode-id="2190"><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/search/news%3FsortBy%3D%26dateRange%3D%26blob%3Dvirtual%2Breality%2Bvalue" rel="noopener" target="_blank"><span data-dcnode-id="2195" style="font-weight: 400;"><span data-dcnode-id="2196" instrument_node="">The Global Virtual Reality Market</span></span></a><span data-dcnode-id="2193" instrument_node="">&nbsp;</span><span data-dcnode-id="2191" style="font-weight: 400;"><span data-dcnode-id="2192" instrument_node="">was valued at 3.13 billion USD in 2017. Many expect it to climb to 49.7 billion by just 2023. The fact that we’re already seeing VR and AR immersive technologies appear in brand marketing is evidence of that.</span></span></p><p data-dcnode-id="2187"><span data-dcnode-id="2188" style="font-weight: 400;"><span data-dcnode-id="2189" instrument_node=""> Traditional marketing methods are being transformed by this wave of new tech and it’s likely to continue. Here are 5 reasons why:</span></span></p><h2 data-dcnode-id="2184"><b data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">1. Immersive technology elevates live experiences</span></b></h2><p data-dcnode-id="2181"><span data-dcnode-id="2182" style="font-weight: 400;"><span data-dcnode-id="2183" instrument_node="">The days of uninspiring fold-up desks and branded pens are becoming a distant memory. Now, brands are using immersive technology to give visitors a fully developed live experience with their brand.</span></span></p><p data-dcnode-id="2178"><span data-dcnode-id="2179" style="font-weight: 400;"><span data-dcnode-id="2180" instrument_node="">At the 2016 San Diego Comic-Con, FX offered visitors a VR immersive experience. They were strapped to hospital beds and had HTC Vive headsets placed on their heads.</span></span></p><p data-dcnode-id="2175"><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vrscout.com/news/american-horror-story-vr-scariest-comic-con/" rel="noopener" target="_blank"><img alt="Group of people experiencing virtual reality / immersive technology" class="aligncenter wp-image-4546 size-full" data-dcnode-id="2177" height="384" sizes="(max-width: 592px) 100vw, 592px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turtl.co/app/uploads/Screenshot-2019-09-26-at-10.47.15.png&amp;raw" srcset="https://turtl.co/app/uploads/Screenshot-2019-09-26-at-10.47.15.png 592w, https://turtl.co/app/uploads/Screenshot-2019-09-26-at-10.47.15-150x97.png 150w, https://turtl.co/app/uploads/Screenshot-2019-09-26-at-10.47.15-300x195.png 300w, https://turtl.co/app/uploads/Screenshot-2019-09-26-at-10.47.15-250x162.png 250w, https://turtl.co/app/uploads/Screenshot-2019-09-26-at-10.47.15-262x170.png 262w" width="592"></a></p><p data-dcnode-id="2170"><span data-dcnode-id="2174" instrument_node="">The guests were then taken on a 5-minute virtual horror adventure to get people excited about the new season of American Horror Story. The experience was so popular it was </span><a data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rollingstone.com/movies/movie-lists/25-best-things-we-saw-at-san-diego-comic-con-2016-128426/american-horror-story-gives-virtual-reality-gurney-rides-102275/" rel="noopener" target="_blank"><span data-dcnode-id="2173" instrument_node="">fully booked</span></a><span data-dcnode-id="2171" instrument_node=""> throughout the entire convention.</span></p><p data-dcnode-id="2165"><span data-dcnode-id="2169" instrument_node="">Rekorderlig took a similar path when they launched “Rekorderland” in London this summer. Rekorderland was a </span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lbbonline.com/news/rekorderlig-launches-londons-first-ever-mixed-reality-experience" rel="noopener" target="_blank"><span data-dcnode-id="2168" instrument_node="">mixed reality experience</span></a><span data-dcnode-id="2166" instrument_node=""> allowing visitors to wear AR headsets that added holographic images and waves of light to the venue. They could also use Snapchat to interact with their drinks.</span></p><iframe allowfullscreen="true" allowtransparency="true" class="instagram-media instagram-media-rendered" data-dcnode-id="1937" data-instgrm-payload-id="instagram-media-payload-0" frameborder="0" height="923" id="instagram-embed-0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/BxzxJ9Qnljo/embed/captioned/%3Fcr%3D1%26v%3D12%26wp%3D540%26rd%3Dhttps%253A%252F%252Fturtl.co%26rp%3D%252Fblog%252Fimmersive-technology-brand-marketing%252F%23%257B%2522ci%2522%253A0%252C%2522os%2522%253A2345.4099999944447%252C%2522ls%2522%253A472.88499999558553%252C%2522le%2522%253A2089.995000002091%257D&amp;raw" style="background: white; max-width: 540px; width: calc(100% - 2px); border-radius: 3px; border: 1px solid rgb(219, 219, 219); box-shadow: none; display: block; margin: 0px 0px 12px; min-width: 326px; padding: 0px;"><html class="js not-logged-in client-root js-focus-visible" data-dcnode-id="1939" lang="en"><head data-dcnode-id="2122"><meta charset="utf-8"><span data-dcnode-id="2163" instrument_node="">

</span></body></html></iframe><p data-dcnode-id="1935"></p><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">These live digital experiences are incredibly effective in evoking some sort of emotional response from the audience. Instead of replacing the physical experience, the technology amplifies it, offering an extremely well-rounded interaction with the brand.</span></p><h2 data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">2. It digitalizes try-before-you-buy</span></h2><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">You’re much more likely to convince someone to part with their hard-earned cash if they can see exactly what they’ll receive in return. Before, in order to do this, you would have to get those people into your store to physically try it out. But now thanks to AR technology, people can try things out from anywhere (as long as they’ve got their phones).</span></p><p data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node="">Snapchat started introducing increasingly sophisticated AR shopping lenses from April 2018. These AR lenses allow Snapchat users to interact with the branding and products of affiliated companies. Wish.com reported seeing </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thedrum.com/news/2018/09/27/snapchat-rolls-out-self-serve-shoppable-ads-globally"><span data-dcnode-id="1927" instrument_node="">17 times the engagement</span></a><span data-dcnode-id="1925" instrument_node=""> with the immersive ads, as opposed to their static product ads on Snapchat.</span></p><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">YouTube has also collaborated with various beauty brands to create their “AR Beauty Try On” feature. This allows users to watch makeup tutorials on one part of their screen while virtually trying on the affiliated makeup in another.</span></p><p data-dcnode-id="1918"></p><div class="wt-cli-iframe-placeholder" data-dcnode-id="1919" data-src="https://www.youtube.com/embed/6xxYsI23_Go?feature=oembed&amp;enablejsapi=1&amp;origin=https://turtl.co" id="WmZObGRUcHg=" style="width:750px; height:422px; background-image:linear-gradient(rgba(255,255,255,.2),rgba(255,255,255,.2)),url('https://img.youtube.com/vi/6xxYsI23_Go/maxresdefault.jpg'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; background-color: #b2b0b059; position: relative; display: flex; align-items: center; justify-content: center; max-width:100%;"><div cky-i18n="gdpr.blocker.placeHolder" class="wt-cli-inner-text" data-dcnode-id="1920" style="text-align: center; display: flex; align-items: center; padding: 10px 16px; background-color: rgba(0, 0, 0, 0.8); color: rgb(255, 255, 255);"><span data-dcnode-id="1921" instrument_node="">Please accept the cookie consent</span></div></div><p></p><p data-dcnode-id="1914"><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blog.google/products/marketingplatform/360/immersive-branded-experiences-youtube-and-display-ads/"><span data-dcnode-id="1917" instrument_node="">YouTube reported</span></a><span data-dcnode-id="1915" instrument_node=""> that their collaboration with MAC was particularly successful. They found that 30% of viewers activated the virtual feature and spent an average of 80 seconds trying on lipstick.</span></p><p data-dcnode-id="1909"><span data-dcnode-id="1913" instrument_node="">Before this technology was available, you would never expect someone to interact with an ad for that long. This immersive technology is so successful at brand marketing because it hugely extends the amount of time consumers&nbsp;</span><em data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">want&nbsp;</span></em><span data-dcnode-id="1910" instrument_node="">to interact with branded materials, including advertisements.</span></p><h2 data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">3. It maximizes social media</span></h2><p data-dcnode-id="1903"><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turtl.co/blog/social-media-content-strategy/"><span data-dcnode-id="1906" instrument_node="">Social media</span></a><span data-dcnode-id="1904" instrument_node=""> has played a large role in brand marketing in recent years but this is completely maximized with the use of immersive technologies. As AR is usually visible through a smartphone, social media platforms are perfectly positioned as the delivery tool.</span></p><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Just take a look at the success of Footlocker’s AR experience with Snapchat. When users used Snapchat’s AR filter on this Nike poster in a Footlocker store, Lebron James leaped out of the 2D poster and slam dunked a virtual hoop.</span></p><blockquote class="twitter-tweet" data-dcnode-id="1884"><p data-dcnode-id="1896" dir="ltr" lang="en"><span data-dcnode-id="1900" instrument_node="">.</span><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/KingJames%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1899" instrument_node="">@KingJames</span></a><span data-dcnode-id="1897" instrument_node=""> dunking at Foot Locker through Snapchat AR. 👀</span></p><p data-dcnode-id="1889"><span data-dcnode-id="1895" instrument_node="">📹 </span><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/keiths%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1894" instrument_node="">@keiths</span></a><span data-dcnode-id="1892" instrument_node=""> </span><a data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/feJCsn0cHM"><span data-dcnode-id="1891" instrument_node="">pic.twitter.com/feJCsn0cHM</span></a></p><p data-dcnode-id="1885"><span data-dcnode-id="1888" instrument_node="">— B/R Kicks (@brkicks) </span><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/brkicks/status/1093268770729193472%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1887" instrument_node="">February 6, 2019</span></a></p></blockquote><p data-dcnode-id="1882"></p><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">A video of the ad has received 2.2 million views, more than 12,000 retweets, and 50,000 likes.</span></p><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">These huge social media successes are likely one of the major driving forces behind more and more brands elevating their brand marketing with immersive technology. And can you blame them? Those numbers are pretty irresistible.</span></p><h2 data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">4. It’s better for the environment</span></h2><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Traditional brand marketing relied a lot on events and giveaways. I don’t think I need to tell you why giving away mountains of merchandise (probably plastic) to people who probably didn’t even want or need it in the first place is a bad thing.</span></p><p data-dcnode-id="1869"><span data-dcnode-id="1873" instrument_node="">Throwaway plastic has had catastrophic effects on the planet. By 2016, </span><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/environment/2019/may/15/single-use-plastics-a-serious-climate-change-hazard-study-warns"><span data-dcnode-id="1872" instrument_node="">8.3bn metric tonnes</span></a><span data-dcnode-id="1870" instrument_node=""> of plastic had been produced and two-thirds of that plastic has been released into the environment and is still there today.</span></p><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">By creating partially (AR) or fully (VR) digital experiences for consumers to engage with brands, this hugely reduces brand marketing waste. With this technology, if someone isn’t interested in the brand and doesn’t want to engage with the experience, that’s it. They just move on with their lives. More importantly, they’re not going to politely take your lovely merch and toss it out as soon as they’re home.</span></p><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">McDonald’s is a great example of a company integrating technology with their brand giveaways to reduce waste. They started “Happy Goggles” in Sweden where the Happy Meal Box can be turned into VR goggles with a slot for a smartphone. Take a look:</span></p><p data-dcnode-id="1861"></p><div class="wt-cli-iframe-placeholder" data-dcnode-id="1862" data-src="https://www.youtube.com/embed/bnYg752URcE?feature=oembed&amp;enablejsapi=1&amp;origin=https://turtl.co" id="TFZjZW5SRXE=" style="width:750px; height:422px; background-image:linear-gradient(rgba(255,255,255,.2),rgba(255,255,255,.2)),url('https://img.youtube.com/vi/bnYg752URcE/maxresdefault.jpg'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; background-color: #b2b0b059; position: relative; display: flex; align-items: center; justify-content: center; max-width:100%;"><div cky-i18n="gdpr.blocker.placeHolder" class="wt-cli-inner-text" data-dcnode-id="1863" style="text-align: center; display: flex; align-items: center; padding: 10px 16px; background-color: rgba(0, 0, 0, 0.8); color: rgb(255, 255, 255);"><span data-dcnode-id="1864" instrument_node="">Please accept the cookie consent</span></div></div><p></p><p data-dcnode-id="1856"><span data-dcnode-id="1860" instrument_node="">With all of the pressure on fast-food restaurants like McDonald’s to stop giving out plastic toys to children, this could be a much more responsible alternative. Burger King is stopping all their plastic toys in the UK, which is estimated to save </span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//metro.co.uk/2019/09/19/plastic-toys-mcdonalds-burger-king-way-10769491/"><span data-dcnode-id="1859" instrument_node="">320 tonnes of waste</span></a><span data-dcnode-id="1857" instrument_node=""> annually. McDonald’s has responded by saying they will start giving children the option to choose fruit instead, but this has been widely criticized.</span></p><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">The Swedish trial is considered a much better alternative. Not only does it replace plastic toys with immersive tech, but encourages children to take disposable packaging and repurpose it. A win-win for the planet!</span></p><h2 data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">5. It optimizes touchpoints</span></h2><p data-dcnode-id="1848"><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankmycell.com/blog/how-many-phones-are-in-the-world"><span data-dcnode-id="1851" instrument_node="">5.13 billion</span></a><span data-dcnode-id="1849" instrument_node=""> people have some sort of mobile device. Innovative technology is allowing brands to scale their operations to a level previously impossible. AR technology allows anyone with a smartphone to engage with brands. VR technology, while still less accessible, will likely increase in popularity in the coming years.</span></p><p data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node="">In 2019, </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edition.cnn.com/2019/08/22/tech/facebook-vr-future/index.html"><span data-dcnode-id="1846" instrument_node="">tech market research firm IDC</span></a><span data-dcnode-id="1844" instrument_node=""> predicts that VR and AR headset makers will sell 7.6 million headsets, the vast majority of which are expected to be VR. That’s up from just 5.9 million in 2018. While it’s not incredibly fast, and a large number of enterprises buy it rather than individual consumers, they are increasing.</span></p><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Once consumers have engaged with a brand through this immersive technology, some industry experts believe they’re more likely to come back for more than with traditional marketing.</span></p><p data-dcnode-id="1837"><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.campaignlive.co.uk/article/tech-bringing-brand-experiences-life/1595833"><span data-dcnode-id="1840" instrument_node="">Nick Riggall</span></a><span data-dcnode-id="1838" instrument_node="">, VP of emerging technologies at the George P. Johnson Experience Marketing agency, who works with tech giants CISCO, IBM, and Google, raises some interesting points on this. He argues that these immersive technological approaches might deliver softer but more meaningful results in the long term. This approach moves away from chasing leads and sign-ups as a numerical value. Instead, we work towards creating an emotional connection with consumers, which should ultimately drive more authentic and long-lasting brand loyalty.</span></p><h2 data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">The future of brand marketing?</span></h2><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">There is rapid improvement in the quality and accessibility of immersive technology, and increasing pressure on companies to create as little waste as possible. Subsequently, it’s likely the shift towards tech-focused brand marketing will only increase in the future.</span></p><p data-dcnode-id="1825"><span data-dcnode-id="1832" instrument_node="">These immersive technologies transcend the confines of digital and physical brand marketing and create an experience that merges the two. Whether it’s at an event, in a store, or in someone’s home, these </span><em data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">digital</span></em><span data-dcnode-id="1829" instrument_node=""> experiences encourage </span><em data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">physical</span></em><span data-dcnode-id="1826" instrument_node=""> participation, which maximizes brand engagement.</span></p><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">You might not be ready to fully buy into the VR/AR world, but more and more big brands are testing the waters. As a result, they are seeing some pretty exciting outcomes. So don’t be late to the (virtual) party …</span></p><div class="addtoany_shortcode" data-dcnode-id="1797"><div class="a2a_kit a2a_kit_size_32 addtoany_list" data-a2a-title="5 reasons immersive technology is the future of brand marketing" data-a2a-url="https://turtl.co/blog/immersive-technology-brand-marketing/" data-dcnode-id="1798" style="line-height: 32px;"><a class="a2a_button_linkedin" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/%23linkedin" rel="nofollow noopener" target="_blank" title="LinkedIn"><span class="a2a_svg a2a_s__default a2a_s_linkedin" data-dcnode-id="1820" style="background-color: rgb(0, 123, 181);"><svg aria-hidden="true" data-dcnode-id="1821" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M6.227 12.61h4.19v13.48h-4.19V12.61zm2.095-6.7a2.43 2.43 0 010 4.86c-1.344 0-2.428-1.09-2.428-2.43s1.084-2.43 2.428-2.43m4.72 6.7h4.02v1.84h.058c.56-1.058 1.927-2.176 3.965-2.176 4.238 0 5.02 2.792 5.02 6.42v7.395h-4.183v-6.56c0-1.564-.03-3.574-2.178-3.574-2.18 0-2.514 1.7-2.514 3.46v6.668h-4.187V12.61z" data-dcnode-id="1822" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">LinkedIn</span></sp el class="cky-switch" data-dcnode-id="1110" for="cky-checkbox-category-necessary" onclick="event.stopPropagation();"><input data-dcnode-id="1112" disabled="" id="cky-checkbox-category-necessary" type="checkbox"><div class="cky-slider" data-dcnode-id="1111"></div></label></div><div cky-i18n="detail.tabItem.necessary.text" class="cky-tab-desc" data-dcnode-id="904" style="color:#565662"><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Necessary cookies are crucial for the basic functions of the website and the website will not work in its intended way without them. These cookies do not store any personally identifiable data.</span></p><div class="cky-table-wrapper" data-dcnode-id="905" id="cky-table-wrapper-necessary"><table class="cky-cookie-audit-table" data-dcnode-id="906" id="cky-cookie-audit-table-necessary"><thead data-dcnode-id="1097"><tr data-dcnode-id="1098"><th cky-i18n="auditTable.cookie" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Cookie</span></th><th cky-i18n="auditTable.type" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Type</span></th><th cky-i18n="auditTable.duration" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Duration</span></th><th cky-i18n="auditTable.description" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Description</span></th></tr></thead><tbody data-dcnode-id="907"><tr data-dcnode-id="1088"><td data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">PHPSESSID</span></td><td cky-i18n="cookies.PHPSESSID.type" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">https</span></td><td cky-i18n="cookies.PHPSESSID.duration" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">session</span></td><td cky-i18n="cookies.PHPSESSID.description" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">This cookie is native to PHP applications. The cookie is used to store and identify a users' unique session ID for the purpose of managing user session on the website. The cookie is a session cookies and is deleted when all the browser windows are closed.</span></td></tr><tr data-dcnode-id="1079"><td data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">__cfduid</span></td><td cky-i18n="cookies.__cfduid.type" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">https</span></td><td cky-i18n="cookies.__cfduid.duration" data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">1 month</span></td><td cky-i18n="cookies.__cfduid.description" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">The cookie is used by cdn services like CloudFare to identify individual clients behind a shared IP address and apply security settings on a per-client basis. It does not correspond to any user ID in the web application and does not store any personally identifiable information.</span></td></tr><tr data-dcnode-id="1070"><td data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">_GRECAPTCHA</span></td><td cky-i18n="cookies._GRECAPTCHA.type" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">https</span></td><td cky-i18n="cookies._GRECAPTCHA.duration" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">5 months 27 days</span></td><td cky-i18n="cookies._GRECAPTCHA.description" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">This cookie is set by Google. In addition to certain standard Google cookies, reCAPTCHA sets a necessary cookie (_GRECAPTCHA) when executed for the purpose of providing its risk analysis.</span></td></tr><tr data-dcnode-id="1061"><td data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">__hssrc</span></td><td cky-i18n="cookies.__hssrc.type" data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">https</span></td><td cky-i18n="cookies.__hssrc.duration" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">session</span></td><td cky-i18n="cookies.__hssrc.description" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">This cookie is set by Hubspot. According to their documentation, whenever HubSpot changes the session cookie, this cookie is also set to determine if the visitor has restarted their browser. If this cookie does not exist when HubSpot manages cookies, it is considered a new session.</span></td></tr><tr data-dcnode-id="1052"><td data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">JSESSIONID</span></td><td cky-i18n="cookies.JSESSIONID.type" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">https</span></td><td cky-i18n="cookies.JSESSIONID.duration" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">session</span></td><td cky-i18n="cookies.JSESSIONID.description" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Used by sites written in JSP. General purpose platform session cookies that are used to maintain users' state across page requests.</span></td></tr><tr data-dcnode-id="1043"><td data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">cky-active-check</span></td><td cky-i18n="cookies.cky-active-check.type" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">https</span></td><td cky-i18n="cookies.cky-active-check.duration" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">1 day</span></td><td cky-i18n="cookies.cky-active-check.description" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">The cookie is set by CookieYes to check if the consent banner is active on the website.</span></td></tr><tr data-dcnode-id="1034"><td data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">cookieyesID</span></td><td cky-i18n="cookies.cookieyesID.type" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">https</span></td><td cky-i18n="cookies.cookieyesID.d " instrument_node="">Type</span></th><th cky-i18n="auditTable.duration" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Duration</span></th><th cky-i18n="auditTable.description" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Description</span></th></tr></thead><tbody data-dcnode-id="391"><tr data-dcnode-id="527"><td data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">_uetvid</span></td><td cky-i18n="cookies._uetvid.type" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">https</span></td><td cky-i18n="cookies._uetvid.duration" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">16 days 6 hours</span></td><td cky-i18n="cookies._uetvid.description" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Used to track visitors on multiple websites, in order to present relevant advertisement based on the visitor's preferences.</span></td></tr><tr data-dcnode-id="518"><td data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">UserMatchHistory</span></td><td cky-i18n="cookies.UserMatchHistory.type" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">https</span></td><td cky-i18n="cookies.UserMatchHistory.duration" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">1 month</span></td><td cky-i18n="cookies.UserMatchHistory.description" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Linkedin - Used to track visitors on multiple websites, in order to present relevant advertisement based on the visitor's preferences.</span></td></tr><tr data-dcnode-id="509"><td data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">MUID</span></td><td cky-i18n="cookies.MUID.type" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">https</span></td><td cky-i18n="cookies.MUID.duration" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">1 year 24 days</span></td><td cky-i18n="cookies.MUID.description" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Used by Microsoft as a unique identifier. The cookie is set by embedded Microsoft scripts. The purpose of this cookie is to synchronize the ID across many different Microsoft domains to enable user tracking.</span></td></tr><tr data-dcnode-id="500"><td data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">test_cookie</span></td><td cky-i18n="cookies.test_cookie.type" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">https</span></td><td cky-i18n="cookies.test_cookie.duration" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">15 minutes</span></td><td cky-i18n="cookies.test_cookie.description" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">This cookie is set by doubleclick.net. The purpose of the cookie is to determine if the user's browser supports cookies.</span></td></tr><tr data-dcnode-id="491"><td data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">bscookie</span></td><td cky-i18n="cookies.bscookie.type" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">https</span></td><td cky-i18n="cookies.bscookie.duration" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">2 years</span></td><td cky-i18n="cookies.bscookie.description" data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">This cookie is a browser ID cookie set by Linked share Buttons and ad tags. </span></td></tr><tr data-dcnode-id="482"><td data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">_fbp</span></td><td cky-i18n="cookies._fbp.type" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">https</span></td><td cky-i18n="cookies._fbp.duration" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">3 months</span></td><td cky-i18n="cookies._fbp.description" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">This cookie is set by Facebook to deliver advertisement when they are on Facebook or a digital platform powered by Facebook advertising after visiting this website.</span></td></tr><tr data-dcnode-id="473"><td data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">fr</span></td><td cky-i18n="cookies.fr.type" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">https</span></td><td cky-i18n="cookies.fr.duration" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">3 months</span></td><td cky-i18n="cookies.fr.description" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">The cookie is set by Facebook to show relevant advertisments to the users and measure and improve the advertisements. The cookie also tracks the behavior of the user across the web on sites that have Facebook pixel or Facebook social plugin.</span></td></tr><tr data-dcnode-id="464"><td data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">VISITOR_INFO1_LIVE</span></td><td cky-i18n="cookies.VISITOR_INFO1_LIVE.type" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">https</span></td><td cky-i18n="cookies.VISITOR_INFO1_LIVE.duration" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">5 months 27 days</span></td><td cky-i18n="cookies.VISITOR_INFO1_LIVE.description" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">This cookie is set by Youtube. Used to track the information of the embedded YouTube videos on a website.</span></td></tr><tr data-dcnode-id="455"><td data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">IDE</span></td><td cky-i18n="cookies.IDE.type" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">https</span></td><td cky-i18n="cookies.IDE.duration" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">1 year 24 days</span></td><td cky-i18n="cookies.IDE.description" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Used by Google DoubleClick and stores information about how the user uses the website and any other advertisement before visiting the website. This is used to present users with ads that are relevant to them according to the user profile.</span></td></tr><tr data-dcnode-id="446"><td data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">ANONCHK</span></td><td cky-i18n="cookies.ANONCHK.type" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">https</span></td><td cky-i18n="cookies.ANONCHK.duration" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">10 minutes</span></td><td cky-i18n="cookies.ANONCHK.description" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">The ANONCHK cookie, set by Bing, is used to store a user's session ID and also verify the clicks from ads on the Bing search engine. The cookie helps in reporting and personalization as well.</span></td></tr><tr data-dcnode-id="437"><td data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">yt-remote-device-id</span></td><td cky-i18n="cookies.yt-remote-device-id.type" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">https</span></td><td cky-i18n="cookies.yt-remote-device-id.duration" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">never</span></td><td cky-i18n="cookies.yt-remote-device-id.description" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">YouTube sets this cookie to store the video preferences of the user using embedded YouTube video.</span></td></tr><tr data-dcnode-id="428"><td data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">yt-remote-connected-devices</span></td><td cky-i18n="cookies.yt-remote-connected-devices.type" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">https</span></td><td cky-i18n="cookies.yt-remote-connected-devices.duration" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">never</span></td><td cky-i18n="cookies.yt-remote-connected-devices.description" d
