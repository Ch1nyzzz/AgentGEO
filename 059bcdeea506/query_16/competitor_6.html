</span><h2 data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Virtual Reality vs. Augmented Reality in the Beauty Industry</span></h2><span data-dcnode-id="2327" instrument_node="">
</span></div><span data-dcnode-id="2325" instrument_node="">
</span></section><span data-dcnode-id="2323" instrument_node="">
</span><div class="main container cf" data-dcnode-id="1578"><span data-dcnode-id="2322" instrument_node="">
</span><section class="the-posts" data-dcnode-id="2005"><span data-dcnode-id="2321" instrument_node="">
</span><article class="the-post" data-dcnode-id="2009"><span data-dcnode-id="2320" instrument_node="">
</span><div class="meta" data-dcnode-id="2312"><span data-dcnode-id="2319" instrument_node="">
</span><p class="date" data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Last updated on: 2018</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p class="cat" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Beauty</span></p><span data-dcnode-id="2313" instrument_node="">
</span></div><span data-dcnode-id="2311" instrument_node="">
</span><div class="author" data-dcnode-id="2299"><span data-dcnode-id="2310" instrument_node="">
</span><div class="pic" data-dcnode-id="2306"><span data-dcnode-id="2309" instrument_node="">
</span><img alt="" class="avatar avatar-50 photo" data-dcnode-id="2308" height="50" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/b257006e81fd99104c3c83dbc2c7e250%3Fs%3D50%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/b257006e81fd99104c3c83dbc2c7e250?s=100&amp;d=mm&amp;r=g 2x" style="min-width: unset; min-height: unset;" width="50"><span data-dcnode-id="2307" instrument_node=""> </span></div><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2301"><span data-dcnode-id="2304" instrument_node="">by </span><a class="url fn" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digitalbeauty.com/author/katelyn/" rel="author" title="Posts by Katelyn Winker"><span data-dcnode-id="2303" instrument_node="">Katelyn Winker</span></a></p><span data-dcnode-id="2300" instrument_node="">
</span></div><span data-dcnode-id="2298" instrument_node="">
</span><div class="the-content" data-dcnode-id="2140"><p data-dcnode-id="2295"><span data-dcnode-id="2296" style="font-weight: 400;"><span data-dcnode-id="2297" instrument_node="">At first, the crazy ideas of Virtual Reality were just talk; nowadays, everyone and anyone in the tech world takes the concepts of Virtual Reality and Augmented Reality very seriously. These new technological innovations not only continue to impact our daily lives but are impacting and creating opportunities within digital marketing, especially within the beauty industry. As advertisers, it is crucial to take the time to educate yourself on these new concepts as they lay the framework of the future of marketing…and the ideas that stem off them aren’t going anywhere!</span></span></p><span data-dcnode-id="2294" instrument_node="">
</span><h3 data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">What is Virtual Reality?</span></h3><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2289" style="font-weight: 400;"><span data-dcnode-id="2290" instrument_node="">Virtual Reality, or VR, refers to artificial or digital experiences which make it possible to experience anything, anytime, anywhere. People usually access VR through fancy VR</span></span><a data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/best-virtual-reality-headsets-4060322" rel="noopener" target="_blank"><span data-dcnode-id="2288" instrument_node=""> </span><span data-dcnode-id="2286" style="font-weight: 400;"><span data-dcnode-id="2287" instrument_node="">headsets</span></span></a><span data-dcnode-id="2283" style="font-weight: 400;"><span data-dcnode-id="2284" instrument_node="">. This landscape provides users an artificial environment that are experienced through senses such as sight and sound. These computer-generated environments make users feel as if they are in a real world where they can interact and possibly manipulate what is around them.</span></span></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2278"><strong data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Virtual Reality + Digital Marketing</span></strong></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" style="font-weight: 400;"><span data-dcnode-id="2276" instrument_node="">VR is a great opportunity to create more personalized and engaging experiences for consumers. One of the biggest benefits of VR marketing is that it gives an audience the chance to immerse themselves fully into an experience. These experiences can be fun, emotional or intriguing. Regardless of the experience, what matters is that these experiences are SO engaging. This digital environment created by VR allows brands to connect with their customers in a way that brings them closer together because of this shared experience.</span></span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2270"><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Virtual Reality in the Beauty Sphere</span></strong></p><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2267" style="font-weight: 400;"><span data-dcnode-id="2268" instrument_node="">If it’s not a repeat purchase for a brand-loyal product, many beauty consumers like going into a brick-and-mortar store to purchase products such as foundations or lipsticks to be able to try out the variety of shades. However, big beauty players such as L’Oreal are aggressively embracing the digital beauty sphere. Not only did they an app using AR that allows consumers to try on virtually shades virtually, L’Oreal is now utilizing VR for everything from future store design concepts, retailer relations and package testing within their ‘</span></span><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mechdyne.com/article.aspx%3Fid%3D362%26name%3DL%27Or%25C3%25A9al%2BShares%2BTheir%2BBeauty%2BExpertise%2BWhile%2BSlashing%2BDevelopment%2BCosts%2Bwith%2BMechdyne%2BVR%2BSolution" rel="noopener" target="_blank"><span data-dcnode-id="2265" style="font-weight: 400;"><span data-dcnode-id="2266" instrument_node="">Beauty Lab</span></span></a><span data-dcnode-id="2262" style="font-weight: 400;"><span data-dcnode-id="2263" instrument_node="">.’ This space lives at the L’Oreal headquarters in New York and is virtual reality room where sub-brands are encouraged to use the room to better understand their in-store presentation and look and feel of the store.</span></span></p><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2258" style="font-weight: 400;"><span data-dcnode-id="2259" instrument_node="">“We like to think of the Lab as the place where big ideas are allowed to happen,” says Joe Sinisi, assistant vice president of the Future of Retail team. “Collaboration has always been at the heart of our relationship with our retailers, this room just takes it to a whole other level.”</span></span></p><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2254" style="text-align: center;"><img alt="Loreal Beauty Lab " class="alignnone size-full wp-image-4575" data-dcnode-id="2255" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digitalbeauty.com/wp-content/uploads/2018/11/NY-Loreal-Beauty-Lab-resized.jpg&amp;raw" width="300"></p><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2247" style="text-align: center;"><em data-dcnode-id="2248"><span data-dcnode-id="2252" instrument_node="">Image via </span><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mechdyne.com/article.aspx%3Fid%3D362%26name%3DL%27Or%25C3%25A9al%2BShares%2BTheir%2BBeauty%2BExpertise%2BWhile%2BSlashing%2BDevelopment%2BCosts%2Bwith%2BMechdyne%2BVR%2BSolution" rel="noopener" target="_blank"><span data-dcnode-id="2250" style="font-weight: 400;"><span data-dcnode-id="2251" instrument_node="">Machdyne</span></span></a></em></p><span data-dcnode-id="2246" instrument_node="">
</span><h3 data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">What is Augmented Reality?</span></h3><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" style="font-weight: 400;"><span data-dcnode-id="2242" instrument_node="">If you are an active Snapchat user, you are already a user of Augmented Reality! AR is a computer tool that is able to detect live elements such as the human face and add virtual effects to the real-time scenario of the user. This digital technology overlays information in a video, text or image format onto everyday objects in the real world. An example of this technology is the popular Snapchat filters that add different face features to the user whether its dog ears or a warped facial structure. </span></span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2236"><strong data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Augmented Reality + Digital Marketing</span></strong></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" style="font-weight: 400;"><span data-dcnode-id="2234" instrument_node="">AR provides advertisers with the ability to transform a static object such as a magazine ad into an immersive 3D experience. AR marketing differs from VR because, while VR operates by fully immersing the user in a computer-generated environment, AR adds to the environment the user would normally see day-to-day with these digital overlays. Increased brand awareness, customer engagement and experience are big benefits to AR as it brings digital to the real world.</span></span></p><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2217"><span data-dcnode-id="2229" style="font-weight: 400;"><span data-dcnode-id="2230" instrument_node="">Snapchat has already rolled out their AR marketing strategy of</span></span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digitaltrends.com/social-media/snapchat-launches-shoppable-ar-filters/" rel="noopener" target="_blank"><span data-dcnode-id="2228" instrument_node=""> </span><span data-dcnode-id="2226" style="font-weight: 400;"><span data-dcnode-id="2227" instrument_node="">‘Snap and Shop’</span></span></a><span data-dcnode-id="2224" instrument_node=""> </span><span data-dcnode-id="2222" style="font-weight: 400;"><span data-dcnode-id="2223" instrument_node="">&nbsp;with shoppable AR filters. This feature allows businesses to sell products directly from a Snapchat filer on the platform. L’Oreal was the first to actually sponsor a lens on Snapchat to promote their new</span></span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s/%3Fie%3DUTF8%26keywords%3Dl%2527oreal%2Bsilkissime%2Beyeliner%26tag%3Dgooghydr-20%26index%3Daps%26hvadid%3D177529161107%26hvpos%3D1t1%26hvnetw%3Dg%26hvrand%3D804276980820020664%26hvpone%3D%26hvptwo%3D%26hvqmt%3De%26hvdev%3Dc%26hvdvcmdl%3D%26hvlocint%3D%26hvlocphy%3D9031326%26hvtargid%3Dkwd-77052957322%26ref%3Dpd_sl_5dhf2qhmcn_e" rel="noopener" target="_blank"><span data-dcnode-id="2221" instrument_node=""> </span><span data-dcnode-id="2219" style="font-weight: 400;"><span data-dcnode-id="2220" instrument_node="">Silkissime Eyeliner.</span></span></a></p><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2213"><strong data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Augmented Reality in the Beauty Sphere</span></strong></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2210" style="font-weight: 400;"><span data-dcnode-id="2211" instrument_node="">AR has completely changed online retail for cosmetics and other beauty products. In the past year, many brands have launched numerous website and apps allowing consumers to try-on a cosmetic in the comfort of their home before purchasing it. For example,</span></span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digitalbeauty.com/benefit-vr-tool-brow-try-on-experience/" rel="noopener" target="_blank"><span data-dcnode-id="2209" instrument_node=""> </span><span data-dcnode-id="2207" style="font-weight: 400;"><span data-dcnode-id="2208" instrument_node="">Benefit</span></span></a><span data-dcnode-id="2204" style="font-weight: 400;"><span data-dcnode-id="2205" instrument_node=""> allows customers to virtually try on products or services. This typically involves the user uploading a photo while AR works to help the consumer visualize what the product will look like.</span></span></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2200"><img alt="Benefit try it augmented reality tool" class="alignnone size-full wp-image-4576" data-dcnode-id="2201" height="492" loading="lazy" sizes="(max-width: 820px) 100vw, 820px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digitalbeauty.com/wp-content/uploads/2018/11/benefit-try-on-brows-app-t.jpg&amp;raw" srcset="https://digitalbeauty.com/wp-content/uploads/2018/11/benefit-try-on-brows-app-t.jpg 820w, https://digitalbeauty.com/wp-content/uploads/2018/11/benefit-try-on-brows-app-t-300x180.jpg 300w, https://digitalbeauty.com/wp-content/uploads/2018/11/benefit-try-on-brows-app-t-768x461.jpg 768w" width="820"></p><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2193" style="text-align: center;"><em data-dcnode-id="2194"><span data-dcnode-id="2198" instrument_node="">Image via </span><a data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hellomagazine.com/healthandbeauty/makeup/2018011845548/benefit-try-on-different-brow-shapes-app/" rel="noopener" target="_blank"><span data-dcnode-id="2196" style="font-weight: 400;"><span data-dcnode-id="2197" instrument_node="">Hello Magazine</span></span></a></em></p><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2190" style="font-weight: 400;"><span data-dcnode-id="2191" instrument_node="">Other brands such as Sephora have utilized AR for the consumer’s in-store experience. </span></span><span data-dcnode-id="2188" style="font-weight: 400;"><span data-dcnode-id="2189" instrument_node="">At Sephora, you can find your perfect color and shade using its</span></span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digiday.com/marketing/color-iq-sephoras-shade-matching-skin-care-tool-boosts-brand-loyalty/" rel="noopener" target="_blank"><span data-dcnode-id="2187" instrument_node=""> </span><span data-dcnode-id="2185" style="font-weight: 400;"><span data-dcnode-id="2186" instrument_node="">Color IQ foundation finder</span></span></a><span data-dcnode-id="2182" style="font-weight: 400;"><span data-dcnode-id="2183" instrument_node="">. Sephora also &nbsp;launched Lip IQ, a similar program that helps customers find the right lipstick shade. The company continues to launch</span></span><a data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.multivu.com/players/English/7926154-sephora-virtual-artist-cheek-try-on-color-match/" rel="noopener" target="_blank"><span data-dcnode-id="2181" instrument_node=""> </span><span data-dcnode-id="2179" style="font-weight: 400;"><span data-dcnode-id="2180" instrument_node="">new technology</span></span></a><span data-dcnode-id="2176" style="font-weight: 400;"><span data-dcnode-id="2177" instrument_node=""> using AR, including the Cheek Try On, Color Match and Expanded Looks. </span></span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2172"><img alt="sephora pantone color iq" class="alignnone size-full wp-image-4577" data-dcnode-id="2173" height="666" loading="lazy" sizes="(max-width: 888px) 100vw, 888px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digitalbeauty.com/wp-content/uploads/2018/11/Sephora-Pantone-Color-IQ.jpg&amp;raw" srcset="https://digitalbeauty.com/wp-content/uploads/2018/11/Sephora-Pantone-Color-IQ.jpg 888w, https://digitalbeauty.com/wp-content/uploads/2018/11/Sephora-Pantone-Color-IQ-300x225.jpg 300w, https://digitalbeauty.com/wp-content/uploads/2018/11/Sephora-Pantone-Color-IQ-768x576.jpg 768w" width="888"></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2165" style="text-align: center;"><em data-dcnode-id="2166"><span data-dcnode-id="2170" instrument_node="">Image via </span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//beyondclassicallybeautiful.com/2016/01/find-your-perfect-concealer-lipstick-match-with-sephora-pantone-color-iq/" target="_blank"><span data-dcnode-id="2168" style="font-weight: 400;"><span data-dcnode-id="2169" instrument_node="">Beyond Classically Beautiful</span></span></a></em></p><span data-dcnode-id="2164" instrument_node="">
</span><h3 data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Virtual Reality vs. Augmented Reality: What’s the difference?</span></h3><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" style="font-weight: 400;"><span data-dcnode-id="2160" instrument_node="">The majority of people might think VR and AR are the same things but in reality, these are completely different concepts. AR enhances your reality with virtual effects whereas VR takes you to another world by taking you away from reality with the help of some tools.</span></span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2154"><strong data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Virtual + Augmented Reality in Digital Marketing</span></strong></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" style="font-weight: 400;"><span data-dcnode-id="2152" instrument_node="">The future of digital marketing faces a challenge when VR and AR become the prime ad placements for advertisers. There will be no places for advertisers to run display ads, pre-rolls, etc. As technology catches up with the direction of advertising within VR and AR digital environments, consumers will start to see more engaging and interactive ad content being served to them. For example, more 3D content will be streamed directly to consumers through AR designated spaces instead of traditional billboards. VR content will start to appear in online games in the form of an in-game advertisement.</span></span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" style="font-weight: 400;"><span data-dcnode-id="2148" instrument_node=""> As big companies such as Google, Apple and Facebook continue to develop VR and AR technology and app developers continue to refine software and wearable tools, it is likely that both technologies will soon become an established tool for any digital marketing campaigns, especially in the beauty world. By keeping up-to-date with these exciting new technologies, advertisers can begin to plan how to integrate them into the digital marketplace.</span></span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2142"><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">How do you plan to incorporate AR and VR into your marketing campaigns? Let us know below!</span></strong></p><span data-dcnode-id="2141" instrument_node="">

ode-id="279" instrument_node="">日本語</span></span><span data-dcnode-id="277" instrument_node=""> </span></div><span data-dcnode-id="275" instrument_node=""> </span></div><span data-dcnode-id="273" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="85" tabindex="0"><span data-dcnode-id="265" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="264"></div><span data-dcnode-id="263" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="87" role="dialog"><span data-dcnode-id="262" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="258" role="button" tabindex="0"><span data-dcnode-id="261" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="260"></i><span data-dcnode-id="259" instrument_node=""> </span></span><span data-dcnode-id="257" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="89"><span data-dcnode-id="256" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="91"><strong class="acsb-title-main" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Compliance status</span></strong><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="236" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="230" instrument_node="">
</span><ol data-dcnode-id="204"><span data-dcnode-id="229" instrument_node="">
</span><li data-dcnode-id="217"><strong class="acsb-title" data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="226" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="225"><br data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="222"><br data-dcnode-id="221"><span data-dcnode-id="220" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="219"><br data-dcnode-id="218"></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="206"><strong class="acsb-title" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="213" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="212"><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="209"><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="205" instrument_node="">
</span></ol><span data-dcnode-id="203" instrument_node="">
</span><strong data-dcnode-id="200" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="201" lang="EN-US"><span data-dcnode-id="202" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="199" instrument_node="">
</span><ul data-dcnode-id="167"><span data-dcnode-id="198" instrument_node="">
</span><li data-dcnode-id="194"><strong class="acsb-title" data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="195" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="193" instrument_node="">
</span><li data-dcnode-id="189"><strong class="acsb-title" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="190" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="188" instrument_node="">
</span><li data-dcnode-id="184"><strong class="acsb-title" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="185" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="179"><strong class="acsb-title" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="180" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="178" instrument_node="">
</span><li data-dcnode-id="174"><strong class="acsb-title" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="175" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="173" instrument_node="">
</span><li data-dcnode-id="169"><strong class="acsb-title" data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="170" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="168" instrument_node="">
</span></ul><span data-dcnode-id="166" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="163"><span data-dcnode-id="164" lang="EN-US"><span data-dcnode-id="165" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="162" instrument_node="">
</span><ol data-dcnode-id="104"><span data-dcnode-id="161" instrument_node="">
</span><li data-dcnode-id="154"><strong class="acsb-title" data-dcnode-id="157"><span data-dcnode-id="159" lang="EN-US"><span data-dcnode-id="160" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="158" instrument_node="">–</span></strong><span data-dcnode-id="155" lang="EN-US"><span data-dcnode-id="156" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="153" instrument_node="">
</span><li data-dcnode-id="146"><span data-dcnode-id="149" lang="EN-US"><strong class="acsb-title" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="150" instrument_node="">&nbsp;</span></span><span data-dcnode-id="147" lang="EN-US"><span data-dcnode-id="148" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="145" instrument_node="">
</span><li data-dcnode-id="139"><span data-dcnode-id="141" lang="EN-US"><strong class="acsb-title" data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Animations –</span></strong><span data-dcnode-id="142" instrument_node="">&nbsp;</span></span><span data-dcnode-id="140" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="138" instrument_node="">
</span><li data-dcnode-id="131"><span data-dcnode-id="134" lang="EN-US"><strong class="acsb-title" data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="135" instrument_node="">&nbsp;</span></span><span data-dcnode-id="132" lang="EN-US"><span data-dcnode-id="133" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="130" instrument_node="">
</span><li data-dcnode-id="123"><span data-dcnode-id="126" lang="EN-US"><strong class="acsb-title" data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="127" instrument_node="">&nbsp;</span></span><span data-dcnode-id="124" lang="EN-US"><span data-dcnode-id="125" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="122" instrument_node="">
</span><li data-dcnode-id="115"><span data-dcnode-id="118" lang="EN-US"><strong class="acsb-title" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="119" instrument_node="">&nbsp;</span></span><span data-dcnode-id="116" lang="EN-US"><span data-dcnode-id="117" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="114" instrument_node="">
</span><li data-dcnode-id="106"><strong class="acsb-title" data-dcnode-id="111"><span data-dcnode-id="112" lang="EN-US"><span data-dcnode-id="113" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="107" lang="EN-US"><strong class="acsb-title" data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">–</span></strong><span data-dcnode-id="108" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="105" instrument_node="">
</span></ol><span data-dcnode-id="103" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="97" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="90" instrument_node=""> </span></div><span data-dcnode-id="88" instrument_node=""> </span></div><span data-dcnode-id="86" instrument_node="">
