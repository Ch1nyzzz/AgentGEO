9" instrument_node="">It cost $9 and changed the world forever.</span></p><span data-dcnode-id="5357" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5356" instrument_node="">Twenty-five years ago, AT&amp;T created </span><a data-dcnode-id="5354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thefirstbannerad.com/"><span data-dcnode-id="5355" instrument_node="">the first banner ad</span></a><span data-dcnode-id="5353" instrument_node=""> the internet had ever seen.</span></p><span data-dcnode-id="5351" instrument_node="">
</span><p data-dcnode-id="5348"><a data-dcnode-id="5349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thefirstbannerad.com/youdid.html"><img alt="STRIP3" class="alignnone" data-dcnode-id="5350" height="98" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.amz.mshcdn.com/FszfNoMsOv2Si84tbL7vc64Rg-E%3D/fit-in/1200x9600/http%253A//mashable.com/wp-content/uploads/2013/08/STRIP3.gif&amp;raw" width="835"></a></p><span data-dcnode-id="5347" instrument_node="">
</span><p data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">It is clearly terrible, but it also changed everything.</span></p><span data-dcnode-id="5344" instrument_node="">
</span><p data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">It can be difficult to pin down the first time virtual or augmented reality was used for advertising, but we do know immersive technology like VR and AR represent the new frontier of marketing media.</span></p><span data-dcnode-id="5341" instrument_node="">
</span><p data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">We went from print to not being able to see anything (radio), to not being able to interact with anything (TV), to not being able to experience anything in space (digital). And now, here we are in the early days of immersive advertising.</span></p><span data-dcnode-id="5338" instrument_node="">
</span><p data-dcnode-id="5327"><span data-dcnode-id="5337" instrument_node="">Soon, </span><a data-dcnode-id="5335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vrfocus.com/2018/07/facebook-are-testing-augmented-reality-adverts-in-the-news-feed/"><span data-dcnode-id="5336" instrument_node="">Facebook</span></a><span data-dcnode-id="5334" instrument_node=""> will begin </span><a data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/unibotai/videos/2061639104164638/"><span data-dcnode-id="5333" instrument_node="">supporting augmented reality ads</span></a><span data-dcnode-id="5331" instrument_node="">. And Shopify has already </span><a data-dcnode-id="5329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.com/blog/shopify-ar"><span data-dcnode-id="5330" instrument_node="">integrated AR into their&nbsp;platform</span></a><span data-dcnode-id="5328" instrument_node="">.</span></p><span data-dcnode-id="5326" instrument_node="">
