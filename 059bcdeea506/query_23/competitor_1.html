</span><div class="pre-content" data-dcnode-id="4866"><div class="entry-terms" data-dcnode-id="4867"><a aria-label="type Article" class="term-link-taxonomy-type" data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/articles/" rel="tag"><span data-dcnode-id="4869" instrument_node="">Article</span></a></div></div><span data-dcnode-id="4865" instrument_node="">
</span><h1 class="hentry-title page-title" data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">14 examples of digital technology in retail stores</span></h1><span data-dcnode-id="4862" instrument_node=""> </span><div class="metawrap" data-dcnode-id="4833"><span data-dcnode-id="4861" instrument_node="">
</span><div class="metadata" data-dcnode-id="4835"><span data-dcnode-id="4860" instrument_node="">
</span><span class="byline" data-dcnode-id="4846"><span data-dcnode-id="4859" instrument_node="">
</span><span class="author vcard" data-dcnode-id="4848"><span data-dcnode-id="4858" instrument_node="">
</span><a aria-label="Author" class="author-avatar entry-thumbnail fixed-height" data-dcnode-id="4856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/nikki-gilliland/"><img alt="" class="attachment-96x96 size-96x96 lazyloaded" data-dcnode-id="4857" data-src="https://econsultancy.imgix.net/content/uploads/2018/09/03145925/Nikki-Gilliland.jpg?auto=compress,format&amp;q=60&amp;w=96&amp;h=96" height="96" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.imgix.net/content/uploads/2018/09/03145925/Nikki-Gilliland.jpg%3Fauto%3Dcompress%2Cformat%26q%3D60%26w%3D96%26h%3D96&amp;raw" width="96"></a><span data-dcnode-id="4855" instrument_node="">By </span><a class="author url fn" data-dcnode-id="4853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/nikki-gilliland/" rel="author" title="Posts by Nikki Gilliland"><span data-dcnode-id="4854" instrument_node="">Nikki Gilliland</span></a><span data-dcnode-id="4852" instrument_node=""> &amp; </span><a class="author url fn" data-dcnode-id="4850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/lizzy-hillier/" rel="author" title="Posts by Lizzy Hillier"><span data-dcnode-id="4851" instrument_node="">Lizzy Hillier</span></a><span data-dcnode-id="4849" instrument_node=""> </span></span><span data-dcnode-id="4847" instrument_node="">
</span></span><span data-dcnode-id="4845" instrument_node="">
</span><time class="entry-date published updated" data-dcnode-id="4837" datetime="2021-03-04T16:24:24+00:00"><span data-dcnode-id="4844" instrument_node="">
</span><span class="hentry-date" data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">March 4th 2021</span></span><span data-dcnode-id="4841" instrument_node="">
</span><span class="hentry-time" data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">16:24</span></span><span data-dcnode-id="4838" instrument_node="">
</span></time><span data-dcnode-id="4836" instrument_node="">
</span></div><span data-dcnode-id="4834" instrument_node="">
</span></div><span data-dcnode-id="4832" instrument_node="">
</span></header><span data-dcnode-id="4830" instrument_node="">
</span><div class="article-body" data-dcnode-id="764"><span data-dcnode-id="4829" instrument_node="">
</span><div class="content" data-dcnode-id="807"><p data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">After the shock of the coronavirus on brick-and-mortar retail, stores have to work harder than ever to compete with each other, and with consumers’ increased appetite for ecommerce. One way of doing this is to use technology to create immersive experiences that will encourage consumers back in-store as the world reopens.</span></p><span data-dcnode-id="4826" instrument_node="">
</span><p data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">Technology can be used in various ways: for experiential purposes, to appeal to mobile users, increase convenience for shoppers, to make them feel safer amid the pandemic (e.g. with contactless options), or to promote a retailer’s online presence.</span></p><span data-dcnode-id="4823" instrument_node="">
</span><p data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">Here are 14 of the most innovative examples of in-store tech from the past few years and more recently since the onset of Covid-19.</span></p><span data-dcnode-id="4820" instrument_node="">
</span><div class="breakout-box" data-dcnode-id="4810"><span data-dcnode-id="4819" instrument_node="">
</span><p data-dcnode-id="4812"><strong data-dcnode-id="4813"><em data-dcnode-id="4814"><span data-dcnode-id="4818" instrument_node="">For more on the use of digital technology in retail, take a look at Econsultancy’s</span><a data-dcnode-id="4816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/digital-transformation-monthly/"><span data-dcnode-id="4817" instrument_node=""> Digital Transformation Monthly reports</span></a><span data-dcnode-id="4815" instrument_node="">.</span></em></strong></p><span data-dcnode-id="4811" instrument_node="">
</span></div><span data-dcnode-id="4809" instrument_node="">
</span><h3 data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">1. Burberry’s social retail store</span></h3><span data-dcnode-id="4806" instrument_node="">
</span><p data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">July 2020 saw the opening of Burberry’s first social retail store in China’s tech capital, Shenzhen. In partnership with Tencent, Burberry hopes to capitalise on both the region’s love of luxury retail and social media; combining the two to make an immersive and interactive experience.</span></p><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">As users interact with a custom mini-programme within the WeChat app, for example booking appointments, learning more about certain products and sharing their own UGC, they accumulate a virtual social currency. This currency is then used to gradually hatch and evolve an animal character on the shopper’s mobile screen while they are moving around the store – a fun and adorable way of gamifying the store experience and rewarding customers for their engagement.</span></p><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">As is common in China, QR codes are also utilised extensively. Clothing rails and other displays include dedicated QR codes to scan in the WeChat mini-programme to help customers find out more about the collections and explore visually-rich storytelling.</span></p><span data-dcnode-id="4797" instrument_node="">

</span><h3 data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">2. Lush’s app-first stores</span></h3><span data-dcnode-id="4273" instrument_node="">
</span><p data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">Harajuku, Japan, is home to the first (and very Instagrammable) Lush store that uses the #LushLabs app as the primary source of product information and in-store interactivity.</span></p><span data-dcnode-id="4270" instrument_node="">
</span><p data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">The store opened in late 2018 and is dedicated solely to the sale of its many different bath bombs, which are displayed in all shapes, colours and sizes, neatly on shelving units around the edge of the retail space, as well as on sushi-style conveyor belts. Shoppers are invited to select bath bombs that appeal to them by scent, visual appeal, or both, and then scan the product with the Lush Lens (a feature of the #LushLabs app).</span></p><span data-dcnode-id="4267" instrument_node="">
</span><p data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">Scanning the bath bomb with your mobile will reveal more information including its name, ingredients, properties and benefits, and visuals showing how it will dissolve in your bathtub. This is in place of the in-person demonstrations and black chalkboards commonly encountered in Lush’s other brick-and-mortar shops. Knowledgeable staff are also on hand to answer any questions and make recommendations if you’re looking for something in particular.</span></p><span data-dcnode-id="4264" instrument_node="">
</span><p data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">The Harajuku store is also completely packaging free, or ‘naked’ as Lush calls it.</span></p><span data-dcnode-id="4261" instrument_node="">

</span><h3 data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">3. M&amp;S’s in-queue checkout</span></h3><span data-dcnode-id="3737" instrument_node="">
</span><p data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">M&amp;S became the first UK food retailer to incorporate on-the-spot payment in its stores in late 2020. Pay With Me allows customers with a small number of items to check out with a M&amp;S staff member while they are queuing, rather than having to wait for a self-service or manned till to become available.</span></p><span data-dcnode-id="3734" instrument_node="">
</span><p data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">A handheld device controlled by the staff member is used to take contactless payment for the items, freeing up long queues to make the store less crowded and ultimately safer for those shopping in-store during the pandemic. Apple Pay is also accepted by the devices.</span></p><span data-dcnode-id="3731" instrument_node="">
</span><p data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">This technology has been rolled out to 200 stores so far as part of its wider effort to make shopping at their brick-and-mortar stores more efficient, convenient and safe, which includes being able to book an in-store shopping slot online in advance.</span></p><span data-dcnode-id="3728" instrument_node="">
</span><p data-dcnode-id="3726"><img alt="M&amp;S pay with me" class="lazyloaded" data-dcnode-id="3727" data-img-id="512147" data-src="https://econsultancy.imgix.net/content/uploads/2021/03/03095748/MS-pay-with-me.png?auto=compress,format&amp;q=60&amp;w=692&amp;h=388" height="388" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.imgix.net/content/uploads/2021/03/03095748/MS-pay-with-me.png%3Fauto%3Dcompress%2Cformat%26q%3D60%26w%3D692%26h%3D388&amp;raw" width="692"></p><span data-dcnode-id="3725" instrument_node="">
</span><p data-dcnode-id="3720"><em data-dcnode-id="3721"><span data-dcnode-id="3724" instrument_node="">Image: </span><a data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporate.marksandspencer.com/media/press-releases/5e0f046f7880b21924350282/pay-with-me-m-and-s-becomes-the-first-uk-food-retailer-to-launch-on-the-spot-payment-solution-to-make-shopping-quicker-easier-and-safer-in-the-final-few-days-before-christmas"><span data-dcnode-id="3723" instrument_node="">M&amp;S</span></a></em></p><span data-dcnode-id="3719" instrument_node="">
</span><h3 data-dcnode-id="3716"><strong data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">4. &amp; Other Stories’ smart vending machines</span></strong></h3><span data-dcnode-id="3715" instrument_node="">
</span><p data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">In summer 2020, Fashion brand &amp; Other Stories debuted a vending machine experience that allows customers to try out a range of products from its beauty and fragrance offering.</span></p><span data-dcnode-id="3712" instrument_node="">
</span><p data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">The vending machine serves as an interactive hub, featuring a large touchscreen through which users can explore the available products in greater detail, alongside in-depth visual storytelling. It’s also very practical too, as visitors will be able to find their beauty and fragrance favourites, or something new, all in one place, rather than scattered on POS amongst its extensive clothing collections.</span></p><span data-dcnode-id="3709" instrument_node="">
</span><p data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">Currently, the vending machine is an exclusive experience found in &amp; Other Stories’ flagship Paris store. Once enough data is collected on its use, the two brands plan on scaling the idea further across additional &amp; Other Stories locations.</span></p><span data-dcnode-id="3706" instrument_node="">
</span><p data-dcnode-id="3704"><img alt="&amp; other stories cosmetics vending machine in galeries lafayette paris" class="alignnone size-large wp-image-505331 lazyloaded" data-dcnode-id="3705" data-img-id="505331" data-sizes="(max-width: 652px) 100vw, 652px" data-src="https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=652&amp;h=438" data-srcset="https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=745&amp;h=500 745w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=450&amp;h=302 450w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=200&amp;h=134 200w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=768&amp;h=515 768w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=110&amp;h=74 110w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=899&amp;h= 899w" height="438" loading="lazy" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg%3Fauto%3Dcompress%2Cformat%26q%3D60%26w%3D652%26h%3D438&amp;raw" srcset="https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=745&amp;h=500 745w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=450&amp;h=302 450w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=200&amp;h=134 200w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=768&amp;h=515 768w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=110&amp;h=74 110w, https://econsultancy.imgix.net/content/uploads/2020/10/05170637/fig-10-other-stories-cosmetics-vending-machine-in-galeries-lafayette-paris.jpg?auto=compress,format&amp;q=60&amp;w=899&amp;h= 899w" width="652"></p><span data-dcnode-id="3703" instrument_node="">
</span><p data-dcnode-id="3698"><em data-dcnode-id="3699"><span data-dcnode-id="3702" instrument_node="">Image: </span><a data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hmgroup.com/news/other-stories-debuts-fragrant-vending-machine-in-paris/"><span data-dcnode-id="3701" instrument_node="">H&amp;M Group</span></a></em></p><span data-dcnode-id="3697" instrument_node="">
</span><p data-dcnode-id="3694"><a class="to-read-link" data-dcnode-id="3695" data-to-read="Read more" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/covid-19-impact-on-beauty-retail-experience/"><span data-dcnode-id="3696" instrument_node="">What does the future hold for beauty retail experience?</span></a></p><span data-dcnode-id="3693" instrument_node="">
</span><h3 data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">5. Hema’s QR codes</span></h3><span data-dcnode-id="3690" instrument_node="">
</span><p data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">In 2016, Chinese ecommerce giant Alibaba opened its first Hema store in China. The premise of the supermarket is to combine elements of online and offline shopping to create the ultimate seamless experience.</span></p><span data-dcnode-id="3687" instrument_node="">
</span><p data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">In-store, customers can scan QR codes on products to get more information (including the exact date food items were harvested, sourced, and delivered). Payment can also be made through the Hema app, making shopping quick and convenient.</span></p><span data-dcnode-id="3684" instrument_node="">
</span><p data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Another impressive element is Hema’s in-store dining experience, which is powered by robots. Customers can use the Hema app to organise a seat at a table, as well as order items from the store to be cooked. Robots are used to move items from shelves to the kitchen and deliver the meals when they are ready. Pretty impressive stuff.</span></p><span data-dcnode-id="3681" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="3666" data-dnt="true" data-width="550"><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3673" dir="ltr" lang="en"><span data-dcnode-id="3679" instrument_node="">At </span><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/Hema%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="3678" instrument_node="">#Hema</span></a><span data-dcnode-id="3676" instrument_node="">, not only can you hand-pick your fresh seafood, but now you can also get it delivered to your table at Hema's newest robotic restaurant. </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/xvvJmjx19P"><span data-dcnode-id="3675" instrument_node="">pic.twitter.com/xvvJmjx19P</span></a></p><span data-dcnode-id="3672" instrument_node="">
</span><p data-dcnode-id="3668"><span data-dcnode-id="3671" instrument_node="">— Alibaba Group (@AlibabaGroup) </span><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/AlibabaGroup/status/1012126548495818753%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="3670" instrument_node="">June 28, 2018</span></a></p><span data-dcnode-id="3667" instrument_node="">
</span></blockquote><span data-dcnode-id="3665" instrument_node="">
</span><p data-dcnode-id="3663"></p><span data-dcnode-id="3662" instrument_node="">
</span><p data-dcnode-id="3659"><a class="to-read-link" data-dcnode-id="3660" data-to-read="Read more" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/retailers-forefront-chinas-new-retail-revolution-hema-7fresh-alibaba/"><span data-dcnode-id="3661" instrument_node="">These are the seven retailers at the forefront of New Retail in China</span></a></p><span data-dcnode-id="3658" instrument_node="">
</span><h3 data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">6. Nike’s Speed Shop</span></h3><span data-dcnode-id="3655" instrument_node="">
</span><p data-dcnode-id="3650"><span data-dcnode-id="3654" instrument_node="">In 2018,&nbsp;</span><a data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/nikes-new-nyc-store-offers-customized-shopping-experience/"><span data-dcnode-id="3653" instrument_node="">Nike opened a flagship store</span></a><span data-dcnode-id="3651" instrument_node=""> in New York City called the ‘Nike House of Innovation 000’. As you might expect from the name, it’s not your ordinary store, including digital elements to create an immersive and highly convenient experience for shoppers.</span></p><span data-dcnode-id="3649" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Alongside customisation studios and instant checkout points, a stand-out feature of the six-floor studio is the ‘Speed Shop’. This allows customers to reserve shoes online to try on in-store. More specifically, customers can arrive (through a dedicated entrance) to find a locker with their name on, which can then be unlocked via their smartphone.</span></p><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Mobile check-out is also available, meaning customers do not even need to speak to anyone (let alone stand in a queue) if they want to buy the shoes in question. The ultimate in convenience shopping.</span></p><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3641"><img alt="nike speed shop" class="alignnone size-full wp-image-464234 lazyloaded" data-dcnode-id="3642" data-img-id="464234" data-src="https://econsultancy.imgix.net/content/uploads/2019/01/21111315/nike-speed-shop.jpg?auto=compress,format&amp;q=60&amp;w=826&amp;h=546" height="546" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.imgix.net/content/uploads/2019/01/21111315/nike-speed-shop.jpg%3Fauto%3Dcompress%2Cformat%26q%3D60%26w%3D826%26h%3D546&amp;raw" width="826"></p><span data-dcnode-id="3640" instrument_node="">
</span><p data-dcnode-id="3635"><em data-dcnode-id="3636"><span data-dcnode-id="3639" instrument_node="">Image: </span><a data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.nike.com/news/nike-nyc-house-of-innovation-000"><span data-dcnode-id="3638" instrument_node="">Nike</span></a></em></p><span data-dcnode-id="3634" instrument_node="">
</span><h3 data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">7. Amazon Go and Amazon Fresh automated checkout</span></h3><span data-dcnode-id="3631" instrument_node="">
</span><p data-dcnode-id="3626"><span data-dcnode-id="3630" instrument_node="">Amazon has revolutionised the online shopping experience, but the brand is now intent on taking a slice of the physical retail pie too with its </span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/is-the-new-amazon-go-the-future-of-brick-and-mortar-retail/"><span data-dcnode-id="3629" instrument_node="">Go stores</span></a><span data-dcnode-id="3627" instrument_node=""> (branded as Fresh in the UK, where the first store outside the US recently opened in Ealing). They use a combination of computer vision, deep learning, and sensor fusion technology to automate the payment and checkout process. This means that customers can enter the store, pick-up items, and leave without queuing or checking out, while payment is automatically made through the Amazon Go app.</span></p><span data-dcnode-id="3625" instrument_node="">
</span><p data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">There are now twenty seven Amazon Go stores open in the US and reported plans for thousands more worldwide.</span></p><span data-dcnode-id="3622" instrument_node="">

</span><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">In August 2020, Amazon unveiled its Amazon Fresh concept store to coincide with its push to expand its grocery offering with demand at a record high. The store, which has fully opened in Woodland Hills, California, features the Amazon Dash Cart lane – a dedicated checkout area which allows customers to skip queues in other lanes if they have signed into the store using a QR code in the Amazon app.</span></p><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Integrated Alexa devices placed around the store help shoppers navigate their way around more quickly and check off items on their Alexa Shopping List as they go.</span></p><span data-dcnode-id="3095" instrument_node="">
</span><p data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">Customer Rich DeMuro demonstrates the in-store experience in the video below:</span></p><span data-dcnode-id="3092" instrument_node="">

</span><h3 data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">8. Bingobox’s unmanned stores</span></h3><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Similar to Amazon Go, China’s BingoBox takes the concept of unmanned stores to the next level. First launched in 2016, there are now thousands of these tiny 24/7 convenience stores located around China for public convenience.</span></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Customers must scan a QR code with the widely used WeChat app, which will grant them access to the store, before being able to browse up to 800 different SKUs including drinks, snacks and even items like condoms and sex toys which some may find awkward to purchase face-to-face with a human cashier. Once these products are selected, BingoBox visitors can utilise the self-checkout complete with RFID on packaging, which eliminates the need for scanning, and then pay using their WeChat account or AliPay. On the way out, there’s even a smart security system that identifies products on a person that have not been paid for and will not let the individual out of the store until they have replaced it on the shelf.</span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">While this is a huge step forward in the widespread use of unmanned retail stores, the BingoBox is not yet fully automated – human staff are required to restock items on a regular basis and there’s also a remote customer service agent on standby in case users need further assistance.</span></p><span data-dcnode-id="2557" instrument_node="">

</span><p data-dcnode-id="2026"><span data-dcnode-id="2030" instrument_node="">In 2018, US grocery chain Kroger rolled out digital price tag technology across hundreds of stores. Called ‘</span><a data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/what-does-kroger-and-microsofts-connected-store-experience-mean-for-retailers/"><span data-dcnode-id="2029" instrument_node="">Kroger Edge</span></a><span data-dcnode-id="2027" instrument_node="">’, the tech digitally displays pricing and nutritional information, allowing the store to instantly and remotely update it.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2024" instrument_node="">Edge is part of a retail-as-a-service </span><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.microsoft.com/2019/01/07/kroger-and-microsoft-partner-to-redefine-customer-experience-introduce-digital-solutions-for-retail-industry/"><span data-dcnode-id="2023" instrument_node="">project between Kroger and Microsoft</span></a><span data-dcnode-id="2021" instrument_node=""> that was formed in 2019 with the aim of redefining the shopping experience.</span></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Customer experience aside, the Edge technology is said to have an impact on the retailer’s sustainability efforts. According to Microsoft, the tech runs on renewable energy, while the illuminated pricing means that Kruger will be able to turn down overhead lighting and therefore reduce energy costs.</span></p><span data-dcnode-id="2016" instrument_node="">

</span><h3 data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">10. Zara’s AR window displays</span></h3><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">In 2018, Zara introduced AR technology to its stores for a limited time through exterior window displays and special in-store AR zones.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Visitors to selected Zara stores were prompted to stand in a specific area of the shop floor and use their phone as a lens when held up to a sensor. Models then appeared sporting pieces from the fashion retailer’s latest collections and interacting with the space around them. This gave shoppers a clearer idea of the way the clothes hung on the body, and how they could be styled, without needing to venture into a changing room if they were pushed for time.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">The exterior window displays worked in just the same way, except the virtual models used the empty display unit behind the window as if it were a catwalk and treated shoppers on the street as the audience.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">AR was also rolled out onto product packaging, ensuring Zara’s ecommerce customers also got a taste of the technology and tempting them to visit the full virtual experience themselves in-store. As with the brick-and-mortar shops, online shoppers could scan a dedicated area of the packaging to replicate a miniature version of a catwalk.</span></p><span data-dcnode-id="1478" instrument_node="">

</span><h3 data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">11. Audi’s VR showroom</span></h3><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">The experience of buying a car no longer starts at the dealership, particularly after the events of 2020. Consumers typically research via websites, social media, and motor forums before committing to a purchase, with some brands now offering online purchasing for convenience since their dealerships were forced to close under Covid-19 restrictions.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Audi proved it was ahead of the game in 2017 when it launched a virtual reality experience in global showrooms to offer a point of difference.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">The VR experience allows consumers to configure their dream car, as well as explore the car’s exterior and interior in realistic detail. The experience also includes special ‘Audi moments’, such as the Le Mans 24 Hours race, whereby users can witness the pit-stop atmosphere.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Through VR technology, Audi is able to offer consumers a dynamic and interactive buying experience, transferring the process from a digital tablet to something much more immersive.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><img alt="Audi-VR" class="alignnone size-full wp-image-464301 lazyload" data-dcnode-id="941" data-img-id="464301" data-src="https://econsultancy.imgix.net/content/uploads/2019/01/22092106/Audi-VR.jpg?auto=compress,format&amp;q=60&amp;w=917&amp;h=619" height="619" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.imgix.net/content/uploads/2019/01/22092106/Audi-VR.jpg%3Fauto%3Dcompress%252Cformat%26q%3D60%26w%3D917%26h%3D619%26q%3D10&amp;raw" width="917"></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="934"><em data-dcnode-id="935"><span data-dcnode-id="938" instrument_node="">Image: </span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.audi-mediacenter.com/en/press-releases/audi-launches-virtual-reality-technology-in-dealerships-9270"><span data-dcnode-id="937" instrument_node="">Audi</span></a></em></p><span data-dcnode-id="933" instrument_node="">
</span><h3 data-dcnode-id="930"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">12. Chanel’s Boutique of Tomorrow</span></strong></h3><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Chanel partnered with Farfetch to unveil the Boutique of Tomorrow at the brand’s flagship store in Paris in late 2019, which brings together online and offline Chanel shopping to create a streamlined omnichannel experience.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="922"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/farfetchs-cmo-on-the-state-of-luxury-fashion-in-2020-and-opportunities-driving-the-brands-success/"><span data-dcnode-id="925" instrument_node="">Speaking at Econsultancy Live 2020, Farfetch CMO explained the aims behind the concept</span></a><span data-dcnode-id="923" instrument_node="">, “When somebody walked into [the] Chanel boutique, the sales associates in store (through an app that was connected to the customer’s app) would know who they were and know what they’d got in their wishlist… had booked an appointment for them to come in store, and all those items that were in their digital wishlist would be miraculously waiting for them in the changing room.”</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">AR operated mirrors inside the boutique’s changing rooms then displayed stylist recommendations based on what the customer was trying on and suggest other products that could complement their choices. There were also several interactive digital devices scattered around the store which enabled customers to access exclusive content </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cpp-luxury.com/chanel-and-farfetch-unveil-the-boutique-of-tomorrow/"><span data-dcnode-id="919" instrument_node="">such as a virtual tour of Coco Chanel’s apartment</span></a><span data-dcnode-id="917" instrument_node="">.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p class="hentry-title page-title" data-dcnode-id="912"><a class="to-read-link" data-dcnode-id="913" data-to-read="Read more" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/farfetchs-cmo-on-the-state-of-luxury-fashion-in-2020-and-opportunities-driving-the-brands-success/"><span data-dcnode-id="914" instrument_node="">Farfetch CMO Gareth Jones on the state of luxury fashion in 2020 and beyond</span></a></p><span data-dcnode-id="911" instrument_node="">
</span><h3 data-dcnode-id="908"><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">13. Sam’s Club’s robotic floor scrubbers and shelf analysts</span></strong></h3><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">AI company Brain Corp supply Sam’s Club robotic floor scrubbers with such technology to help automate monotonous, yet important, tasks that humans would typically perform in order to free up staff for crucial customer service and checkout roles.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">Recently, as covered in </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/reports/digital-transformation-monthly-november-2020/%3Fview%3Dfull"><span data-dcnode-id="902" instrument_node="">November’s edition of the Digital Transformation Monthly report</span></a><span data-dcnode-id="900" instrument_node="">, Sam’s Club has expanded its deal with Brain Corp to pilot the installation of a new range of robots that analyse shelving units across its stores. Data collected by the robot can then be used to verify pricing accuracy, check product locations against the floor plan and monitor stock levels. Staff will receive real-time text alerts if anything is flagged by the system.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">As automated technology like this becomes more commonplace in retail stores and fulfilment centres around the world, it is likely that we’ll see it being gradually adapted to carry out other administrative tasks in the day-to-day running of brick-and-mortar retail.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Below, you can watch a Brain Corp powered robotic cleaner in action.</span></p><span data-dcnode-id="892" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="880" data-dnt="true" data-width="550"><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="887" dir="ltr" lang="en"><span data-dcnode-id="890" instrument_node="">The T380AMR is powered by BrainOS® , an advanced artificial intelligence and robotic technology platform, from Tennant partner Brain Corporation. </span><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/jjrRRWKILS"><span data-dcnode-id="889" instrument_node="">pic.twitter.com/jjrRRWKILS</span></a></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="885" instrument_node="">— Tennant UK (@TennantUK) </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/TennantUK/status/1335871859288649734%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="884" instrument_node="">December 7, 2020</span></a></p><span data-dcnode-id="881" instrument_node="">
</span></blockquote><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">&nbsp;</span></p><span data-dcnode-id="873" instrument_node="">
</span><h3 data-dcnode-id="870"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">14. The CornerShop from Capgemini, The Drum and SharpEnd</span></strong></h3><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Finally, CornerShop is a brand-new live store experience in London created by Capgemini, The Drum and SharpEnd to demonstrate the possibilities of advanced retail technology to consumers, brands and retailers alike.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Split into four corners – dubbed The Automated Store, The Augmented Store, The Purposeful Store and The Personalised Store – which explore a different aspect of the in-store shopping experience, the shop will evolve over time as it is fed real-time data from those interacting with it.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Some of its many features include virtual try-on, with which you can create a digital twin of yourself to try on the latest fashion without the need for changing rooms, and a personalised experience using a mixture of Bluetooth location technology and customer preference input.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">CornerShop even has its very own ‘vertical farm’, from which customers can select and pay for fresh produce grown in-store, as well as a contactless barista bar run by smart assistants.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="853"><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capgemini.com/gb-en/cornershop/"><span data-dcnode-id="856" instrument_node="">In a press release</span></a><span data-dcnode-id="854" instrument_node="">, Capgemini commented, “Digital innovation can enable new ways to evolve the customer experience, improve in-store operations and enable consumers to rediscover the joy of in-person retail, through exciting new options to engage and shop.”</span></p><span data-dcnode-id="852" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="823" data-dnt="true" data-width="550"><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="830" dir="ltr" lang="en"><span data-dcnode-id="850" instrument_node="">Welcome to </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/CornerShop%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="849" instrument_node="">#CornerShop</span></a><span data-dcnode-id="847" instrument_node="">, a real shop in the heart of </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/London%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="846" instrument_node="">#London</span></a><span data-dcnode-id="844" instrument_node="">, where we bring to life the store of tomorrow by transforming the shopping </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/experience%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="843" instrument_node="">#experience</span></a><span data-dcnode-id="841" instrument_node=""> for </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/retailers%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="840" instrument_node="">#retailers</span></a><span data-dcnode-id="838" instrument_node=""> and shoppers. Find out more: </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/6kX4LKvQ8E"><span data-dcnode-id="837" instrument_node="">https://t.co/6kX4LKvQ8E</span></a><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/Capgeminiuk%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="835" instrument_node="">#Capgeminiuk</span></a><span data-dcnode-id="833" instrument_node=""> </span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http </span><p data-dcnode-id="825"><span data-dcnode-id="828" instrument_node="">— CapgeminiUK (@CapgeminiUK) </span><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/CapgeminiUK/status/1357299760902905856%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="827" instrument_node="">February 4, 2021</span></a></p><span data-dcnode-id="824" instrument_node="">

</span><div class="excerpt" data-dcnode-id="628"><p data-dcnode-id="642"><strong data-dcnode-id="643"><span data-dcnode-id="647" instrument_node="">Towards the end of last month, </span><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/blog/64372-facebook-buys-whatsapp-for-16bn-the-meaning-behind-the-money"><span data-dcnode-id="646" instrument_node="">Facebook boldly made mobile messaging service WhatsApp an offer they couldn’t refuse</span></a><span data-dcnode-id="644" instrument_node="">, and a few hours later that $19bn dollar offer was announced to the world. </span></strong></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Technologists, social media experts and analysts scrambled to make their thoughts and predictions heard. </span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Marketers across the world sat up and paid attention to what could be termed as the biggest big data acquisition we’ve witnessed in the era of the internet. </span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="634" instrument_node="">This is particularly so because WhatsApp’s data is now another spring of information, along with Instagram and </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/blog/64253-paper-the-future-of-facebook"><span data-dcnode-id="633" instrument_node="">Paper</span></a><span data-dcnode-id="631" instrument_node="">, that Facebook can analyse and use to its marketing advantage.&nbsp;</span></p><span data-dcnode-id="629" instrument_node="">
</span></div><span data-dcnode-id="627" instrument_node="">

</span><div class="body" data-dcnode-id="555"><span data-dcnode-id="609" instrument_node="">
</span><header data-dcnode-id="596"><span data-dcnode-id="608" instrument_node="">
</span><div class="entry-terms" data-dcnode-id="602"><a aria-label="type Article" class="term-link-taxonomy-type" data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/articles/" rel="tag"><span data-dcnode-id="607" instrument_node="">Article</span></a><span data-dcnode-id="605" instrument_node=""> </span><a aria-label="category Native Apps" class="term-link-taxonomy-category" data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/topics/mobile/native-apps/" rel="tag"><span data-dcnode-id="604" instrument_node="">Native Apps</span></a></div><span data-dcnode-id="601" instrument_node=""> </span><h2 class="hentry-title" data-dcnode-id="598"><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/how-walmart-asda-and-the-rolling-stones-use-mobile-push-notifications/"><span data-dcnode-id="600" instrument_node="">How Walmart, Asda and The Rolling Stones use mobile push notifications</span></a></h2><span data-dcnode-id="597" instrument_node=""> </span></header><span data-dcnode-id="595" instrument_node="">
</span><div class="excerpt" data-dcnode-id="569"><p data-dcnode-id="592"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Push notifications have the potential to be a powerful tool for mobile marketers as they allow businesses to target app users with timely, relevant news and offers.</span></strong></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">A new Mobile Maturity Report from Urban Airship indicates that they are a widely used marketing tactic, with more than half of companies with apps reporting that they use push notifications to engage their audience.&nbsp;</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">With the exception of finance companies, 70% to 80% of companies with apps use push regularly.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">However from personal experience I’ve found that very few companies make use of push messages. My phone is loaded with various apps from all the reviews I’ve written over the past few years, yet only one or two have ever sent me notifications.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">I’ve previously blogged about </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//econsultancy.com/blog/62151-debenhams-makes-great-use-of-its-mobile-app-with-timely-sales-alerts"><span data-dcnode-id="580" instrument_node="">Debenhams’ clever use of push messages</span></a><span data-dcnode-id="578" instrument_node="">, which were timed to coincide with seasonal sales or events such as Valentine’s Day or payday. These messages were enough to make me click through to the Debenhams app, even though it’s not really the sort of retailer I tend to buy from.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">Here I’ll look at the push messages I’ve received from Walmart, Asda and The Rolling Stones. And for more information on mobile marketing, download Econsultancy’s </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//econsultancy.com/reports/mobile-commerce-compendium"><span data-dcnode-id="574" instrument_node="">Mobile Commerce Compendium</span></a><span data-dcnode-id="572" instrument_node="">.</span></p><span data-dcnode-id="570" instrument_node="">
</span></div><span data-dcnode-id="568" instrument_node="">
</span><footer data-dcnode-id="557"><span data-dcnode-id="567" instrument_node="">

</span></footer><span data-dcnode-id="556" instrument_node="">

</span><div class="body" data-dcnode-id="502"><span data-dcnode-id="550" instrument_node="">
</span><header data-dcnode-id="537"><span data-dcnode-id="549" instrument_node="">
</span><div class="entry-terms" data-dcnode-id="543"><a aria-label="type Article" class="term-link-taxonomy-type" data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/articles/" rel="tag"><span data-dcnode-id="548" instrument_node="">Article</span></a><span data-dcnode-id="546" instrument_node=""> </span><a aria-label="category Multichannel" class="term-link-taxonomy-category" data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/topics/customer-experience/multichannel/" rel="tag"><span data-dcnode-id="545" instrument_node="">Multichannel</span></a></div><span data-dcnode-id="542" instrument_node=""> </span><h2 class="hentry-title" data-dcnode-id="539"><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econsultancy.com/what-is-the-state-of-digital-retail-in-london/"><span data-dcnode-id="541" instrument_node="">What is the state of digital retail in London?</span></a></h2><span data-dcnode-id="538" instrument_node=""> </span></header><span data-dcnode-id="536" instrument_node="">
</span><div class="excerpt" data-dcnode-id="516"><p data-dcnode-id="533"><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">How is the world’s shopping capital using mobile and digital experiences to engage customers in-store?</span></strong></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="531" instrument_node="">I’ve previously written about window displays on </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//econsultancy.com/blog/63650-who-is-digital-on-london-s-regent-street"><span data-dcnode-id="530" instrument_node="">Regent Street</span></a><span data-dcnode-id="528" instrument_node="">, but that was a scanty survey. Eccomplished has released some more in-depth </span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eccomplished.com/2014/02/digital-retail-in-london-the-reality-of-omnichannel-in-the-worlds-shopping-capital/"><span data-dcnode-id="527" instrument_node="">research </span></a><span data-dcnode-id="525" instrument_node="">into select stores on Oxford Street and Regent Street in London.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Factors such as signage, interactive media, WiFi, mobile interaction and store layout were surveyed in 40 leading retail outlets by a team of researchers.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Shoppers were also canvassed with the aim of ascertaining whether or not digital in-store offers brands the opportunity to stand out. So, how well are stores implementing technology and is there a gap between best practice and reality?</span></p><span data-dcnode-id="517" instrument_node="">
</span></div><span data-dcnode-id="515" instrument_node="">
</span><footer data-dcnode-id="504"><span data-dcnode-id="514" instrument_node="">
