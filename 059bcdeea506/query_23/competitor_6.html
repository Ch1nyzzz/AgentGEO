</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">A built-in, cross-platform driver component that simplifies setting up tracking of player movements and peripherals by matching a real-world device or object’s position and rotation to its pose – the location of the corresponding virtual object.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="830"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Delivering convincing, realistic, and responsive tracking is much less demanding for creators. For players, immersion and presence are significantly supported.</span></p><span data-dcnode-id="826" instrument_node="">
</span></div><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span></div><span data-dcnode-id="820" instrument_node="">
</span></div><span data-dcnode-id="818" instrument_node="">
</span><div data-dcnode-id="788"><span data-dcnode-id="817" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="790" id="tracking"><span data-dcnode-id="816" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">
</span><div data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Tracking</span></div><span data-dcnode-id="812" instrument_node="">
</span></h2><span data-dcnode-id="810" instrument_node="">
</span><div class="large" data-dcnode-id="792"><span data-dcnode-id="809" instrument_node="">
</span><div data-dcnode-id="794"><p data-dcnode-id="806"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Tracking is crucial for a fully immersive VR experience. Essentially, by tracking the position of the VR HMD – or a peripheral such as a specialized controller – this method tells the computer where a user is looking and what they are doing so that it can accurately and appropriately draw the virtual world around them. The more precise the tracking, the more comfortable the VR experience will be. See also: Motion Tracking, Positional Tracking, and Gaze Tracking.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="799"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Innovative ways to control a game, and – once more – increased immersion and presence. Quality tracking also provides a countermeasure to cyber sickness.</span></p><span data-dcnode-id="795" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node="">
</span></div><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span></div><span data-dcnode-id="787" instrument_node="">
</span><div data-dcnode-id="754"><span data-dcnode-id="786" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="756" id="uncanny-valley"><span data-dcnode-id="785" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="780"><span data-dcnode-id="784" instrument_node="">
</span><div data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Uncanny Valley</span></div><span data-dcnode-id="781" instrument_node="">
</span></h2><span data-dcnode-id="779" instrument_node="">
</span><div class="large" data-dcnode-id="758"><span data-dcnode-id="778" instrument_node="">
</span><div data-dcnode-id="760"><p data-dcnode-id="775"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Initially coined by robotics professor Masahiro Mori in the 1970s, the uncanny valley describes a phenomenon that frames how humans relate to physical or digital objects that take on a human or human-like form. The more an object looks like a human, the more a real human will feel a positive, engaged response to that object. However, at the point an object almost looks like a photorealistic human – but not quite – there is a drop off in the positive response from the viewer. That drop – as seen on a simple line graph – is the eponymous 'valley', and can be felt when we find a robot or computer animated character creepy or unsettling because it almost looks real, but isn’t convincing.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">In many cases, a physical or digital human form that is less than realistic can be more engaging than one that is almost entirely convincing.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="765"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">The uncanny valley effect in VR and other MX forms can do much to break immersion and presence. As a result, content creators often opt to design low-fidelity human characters over hi-fidelity ones that pursue realism to avoid causing a negative response from viewers.</span></p><span data-dcnode-id="761" instrument_node="">
</span></div><span data-dcnode-id="759" instrument_node="">
</span></div><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="755" instrument_node="">
</span></div><span data-dcnode-id="753" instrument_node="">
</span><div data-dcnode-id="723"><span data-dcnode-id="752" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="725" id="vestibular-system"><span data-dcnode-id="751" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="746"><span data-dcnode-id="750" instrument_node="">
</span><div data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Vestibular System</span></div><span data-dcnode-id="747" instrument_node="">
</span></h2><span data-dcnode-id="745" instrument_node="">
</span><div class="large" data-dcnode-id="727"><span data-dcnode-id="744" instrument_node="">
</span><div data-dcnode-id="729"><p data-dcnode-id="741"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">A network of canals in the inner ear that effectively serve as motion detectors, allowing us to balance and understand our movement. Conflicts of the visual and vestibular systems – or “vestibular mismatch” – are at the heart of why we feel cyber sickness and motion sickness.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="734"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">The vestibular system is so fundamental to how we interpret VR, AR and MR content – and why it can thrive or fail – a basic understanding will help you make better content that gives users a more convincing, immersion experience.</span></p><span data-dcnode-id="730" instrument_node="">
</span></div><span data-dcnode-id="728" instrument_node="">
</span></div><span data-dcnode-id="726" instrument_node="">
</span></div><span data-dcnode-id="724" instrument_node="">
</span></div><span data-dcnode-id="722" instrument_node="">
</span><div data-dcnode-id="668"><span data-dcnode-id="721" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="670" id="virtual-reality"><span data-dcnode-id="720" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="715"><span data-dcnode-id="719" instrument_node="">
</span><div data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Virtual Reality</span></div><span data-dcnode-id="716" instrument_node="">
</span></h2><span data-dcnode-id="714" instrument_node="">
</span><div class="large" data-dcnode-id="672"><span data-dcnode-id="713" instrument_node="">
</span><div data-dcnode-id="674"><p data-dcnode-id="710"><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">As virtual reality has evolved and found different uses in different sectors, several different definitions have emerged, most of which significantly overlap with one another. Discrepancies exist. The following elements, however, are near universal in framing what VR offers:</span></p><span data-dcnode-id="706" instrument_node="">
</span><ul data-dcnode-id="695"><span data-dcnode-id="705" instrument_node="">
</span><li data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Computer-generated stereo visuals which entirely surround the user, entirely replacing the real world environment around them. Many believe this definition rightly excludes 360 video from true VR.</span></li><span data-dcnode-id="702" instrument_node="">
</span><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Content is consumed and experienced from a viewer-centric perspective.</span></li><span data-dcnode-id="699" instrument_node="">
</span><li data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Real-time user interaction within the virtual environment is possible, whether through detailed interactions, or simply being able to look around within the experience. Here the real-time element means response comes within a particular time interval that is specific to the application or field.</span></li><span data-dcnode-id="696" instrument_node="">
</span></ul><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="691"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">A high level of VR immersion is achieved by engaging your two most prominent senses, vision and hearing, by using a VR headset and headphones. The VR headset wraps the virtual world or experience nearly to the edge of your natural vision field of view. When you look around, you experience the environment the same as you do when you look around in real life. Headphones amplify the experience by blocking the noise around you, while allowing</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">you to hear the sounds within the VR experience. When you move your head, the sounds within the VR environment move around you like they would in real life.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="683" instrument_node="">3D engines like Unity have made it possible to </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.unity3d.com/Manual/VROverview.html"><span data-dcnode-id="682" instrument_node="">create and deliver highly polished VR content</span></a><span data-dcnode-id="680" instrument_node="">. Such solutions make creating virtual reality experiences a much more accessible pursuit, meaning the display method is becoming more common. That means there is </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.unity3d.com/Manual/XR.html"><span data-dcnode-id="679" instrument_node="">an opportunity to master VR content creation</span></a><span data-dcnode-id="677" instrument_node=""> to engage a growing audience.</span></p><span data-dcnode-id="675" instrument_node="">
</span></div><span data-dcnode-id="673" instrument_node="">
</span></div><span data-dcnode-id="671" instrument_node="">
</span></div><span data-dcnode-id="669" instrument_node="">
</span></div><span data-dcnode-id="667" instrument_node="">
</span><div data-dcnode-id="637"><span data-dcnode-id="666" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="639" id="virtual-realityaugmented-reality-programming"><span data-dcnode-id="665" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">
</span><div data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Virtual Reality/Augmented Reality Programming</span></div><span data-dcnode-id="661" instrument_node="">
</span></h2><span data-dcnode-id="659" instrument_node="">
</span><div class="large" data-dcnode-id="641"><span data-dcnode-id="658" instrument_node="">
</span><div data-dcnode-id="643"><p data-dcnode-id="655"><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Programming for VR and AR is comparable to programming for other display methods and more traditional types of content. C++ and C# are particularly popular forms of programming for AR and VR, reflecting how established development tools have adapted to the arrival of VR and AR while maintaining established conventions of coding.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="648"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Your existing programming skills – or those of your team – are ready for VR and AR development.</span></p><span data-dcnode-id="644" instrument_node="">
</span></div><span data-dcnode-id="642" instrument_node="">
</span></div><span data-dcnode-id="640" instrument_node="">
</span></div><span data-dcnode-id="638" instrument_node="">
</span></div><span data-dcnode-id="636" instrument_node="">
</span><div data-dcnode-id="606"><span data-dcnode-id="635" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="608" id="volumetric-video"><span data-dcnode-id="634" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">
</span><div data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Volumetric Video</span></div><span data-dcnode-id="630" instrument_node="">
</span></h2><span data-dcnode-id="628" instrument_node="">
</span><div class="large" data-dcnode-id="610"><span data-dcnode-id="627" instrument_node="">
</span><div data-dcnode-id="612"><p data-dcnode-id="624"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">A limitation of even the most beautiful 3D 360 video is the challenge of allowing the user to move through the world with agency and freedom. To date, most 360 videos limit the user to adopting and following the original position of the camera at the time it was used to capture the video. Volumetric video moves to address this limitation by capturing the volumetric data of a space being filmed, and for each frame. That data can then be used to present the scene as if it is a rendered graphical scene, meaning the user can walk around the video.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="617"><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Live action stereoscopic 360 video content you can move around in. That may make real some of the wilder predictions for what VR in the future could be.</span></p><span data-dcnode-id="613" instrument_node="">
</span></div><span data-dcnode-id="611" instrument_node="">
</span></div><span data-dcnode-id="609" instrument_node="">
</span></div><span data-dcnode-id="607" instrument_node="">
</span></div><span data-dcnode-id="605" instrument_node="">
</span><div data-dcnode-id="575"><span data-dcnode-id="604" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="577" id="vr-installation"><span data-dcnode-id="603" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="598"><span data-dcnode-id="602" instrument_node="">
</span><div data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">VR Installation</span></div><span data-dcnode-id="599" instrument_node="">
</span></h2><span data-dcnode-id="597" instrument_node="">
</span><div class="large" data-dcnode-id="579"><span data-dcnode-id="596" instrument_node="">
</span><div data-dcnode-id="581"><p data-dcnode-id="593"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">VR Installations are virtual reality experiences specific to a location or site. They can be one time creations – seen in the likes of art installations – or duplicated at multiple locations, such as amusement parks. They are often used as marketing entities. For example, promoting a film at a ComicCon, or advertising a brand at a music festival. Often in such a context they are supported with elaborate physical sets and physical effects such as generated wind or moving floors. Retailers may also implement temporary or permanent VR installations on site, allowing consumers to, for example, test the experience of a new car not stocked at the showroom.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="586"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">VR installations offer consumers a chance to sample high-end virtual reality without investing in any equipment. They also provide a distinct opportunity for creators, as more brands look to employ VR as a marketing tool.</span></p><span data-dcnode-id="582" instrument_node="">
</span></div><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
</span></div><span data-dcnode-id="574" instrument_node="">
</span><div data-dcnode-id="544"><span data-dcnode-id="573" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="546" id="webar"><span data-dcnode-id="572" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">
</span><div data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">WebAR</span></div><span data-dcnode-id="568" instrument_node="">
</span></h2><span data-dcnode-id="566" instrument_node="">
</span><div class="large" data-dcnode-id="548"><span data-dcnode-id="565" instrument_node="">
</span><div data-dcnode-id="550"><p data-dcnode-id="562"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">An open standard that makes it possible to experience AR in a browser, rather than having to download apps. Comparable to WebVR.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="555"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">WebAR should be particularly important to mobile, where websites can deliver AR experiences via smartphone browsers, and where developers can provide simple web apps offering AR content. This should significantly democratize both the creation of AR content and access to it for users. It could also provide a convenient testing capacity for AR developers.</span></p><span data-dcnode-id="551" instrument_node="">
</span></div><span data-dcnode-id="549" instrument_node="">
</span></div><span data-dcnode-id="547" instrument_node="">
</span></div><span data-dcnode-id="545" instrument_node="">
</span></div><span data-dcnode-id="543" instrument_node="">
</span><div data-dcnode-id="513"><span data-dcnode-id="542" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="515" id="webvr"><span data-dcnode-id="541" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="536"><span data-dcnode-id="540" instrument_node="">
</span><div data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">WebVR</span></div><span data-dcnode-id="537" instrument_node="">
</span></h2><span data-dcnode-id="535" instrument_node="">
</span><div class="large" data-dcnode-id="517"><span data-dcnode-id="534" instrument_node="">
</span><div data-dcnode-id="519"><p data-dcnode-id="531"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">An open standard that provides a means through which to experience VR via a browser, instead of having to download specialized apps first.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="524"><strong data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">VR using only a headset and web browser, rather than introducing the cost of high-end computing hardware. That results in more accessible VR, and larger potential audiences for content creators. As with WebAR, this method could in some cases provide developers with a convenient testing option.</span></p><span data-dcnode-id="520" instrument_node="">
</span></div><span data-dcnode-id="518" instrument_node="">
</span></div><span data-dcnode-id="516" instrument_node="">
</span></div><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span><div data-dcnode-id="476"><span data-dcnode-id="511" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default last" data-dcnode-id="478" id="xr"><span data-dcnode-id="510" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="505"><span data-dcnode-id="509" instrument_node="">
</span><div data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">XR</span></div><span data-dcnode-id="506" instrument_node="">
</span></h2><span data-dcnode-id="504" instrument_node="">
</span><div class="large" data-dcnode-id="480"><span data-dcnode-id="503" instrument_node="">
</span><div data-dcnode-id="482"><p data-dcnode-id="500"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Technology-mediated experiences that combine virtual and real-world environments and realities. Here the “X” can be seen as a placeholder for V(R), A(R), or M(R), though it also represents an undefined or variable quality/quantity. XR covers the hardware, software, methods, and experience that make virtual reality, mixed reality, augmented reality, cinematic reality and others a reality. Most definitions of XR encompass platforms and content where the user can take digital objects into reality, or, conversely, see physical objects as present in a digital scene.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">XR experiences include those where users generate new forms of reality by bringing digital objects into the physical world and those that see the bringing physical world objects into the digital world.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">XR is generally used as an umbrella term and is frequently used as a casual shorthand to group technologies such as VR, AR, and MR together.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="487"><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Exploring and understanding XR broadly – instead of focusing on particular environments – should allow creators to remain flexible and evolve with the types of XR that emerge, rather than being stifled by committing to a single form.</span></p><span data-dcnode-id="483" instrument_node="">
</span></div><span data-dcnode-id="481" instrument_node="">
</span></div><span data-dcnode-id="479" instrument_node="">
</span></div><span data-dcnode-id="477" instrument_node="">
</span></div><span data-dcnode-id="475" instrument_node="">
</span></div><span data-dcnode-id="473" instrument_node="">
</span></div><span data-dcnode-id="471" instrument_node="">
</span></div><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span></section><span data-dcnode-id="465" instrument_node="">
