</span><div data-dcnode-id="1882"><p data-dcnode-id="1897"><strong data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">An IMU – or inertial measurement unit – is an electronic device that can detect motion through various means and technologies. IMUs consist of an accelerometer, gyroscope, or compass to measure the absolute rotation of the device with very low latency, and are used, for example, in head tracking. Combined with optical tracking systems, an IMU can be used to determine the view direction of an HMD.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">As with any tracking system, latency and accuracy are key factors for an IMU. Generally, these features aren’t advertised and don’t vary significantly between devices. It is worth noting that the Samsung GearVR includes a dedicated IMU, as opposed to Google Cardboard and Daydream, which both rely on what a given phone’s inbuilt IMU brings to the headsets.</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1887"><strong data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">The same underlying technology that flips your phone from landscape to portrait or provides tilt control to mobile games is used in VR HMDs to match the virtual camera to the user’s head direction. That provides an opportunity for all kinds of innovative forms of control and immersion in VR experiences.</span></p><span data-dcnode-id="1883" instrument_node="">
</span></div><span data-dcnode-id="1881" instrument_node="">
</span></div><span data-dcnode-id="1879" instrument_node="">
</span></div><span data-dcnode-id="1877" instrument_node="">
</span></div><span data-dcnode-id="1875" instrument_node="">
</span><div data-dcnode-id="1842"><span data-dcnode-id="1874" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1844" id="input"><span data-dcnode-id="1873" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1868"><span data-dcnode-id="1872" instrument_node="">
</span><div data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Input</span></div><span data-dcnode-id="1869" instrument_node="">
</span></h2><span data-dcnode-id="1867" instrument_node="">
</span><div class="large" data-dcnode-id="1846"><span data-dcnode-id="1866" instrument_node="">
</span><div data-dcnode-id="1848"><p data-dcnode-id="1863"><strong data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">An input provides a way to interact with a machine, computer or other device. In the case of VR and AR specifically, “input” refers to the method of control you will use for virtual reality and related forms. This most likely means motion tracking with controllers, but many VR, AR, and related experiences let the user interact using a mouse and keyboard or a gamepad.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">As VR matures, many alternative forms of input are becoming available and affordable, from gloves that track the movements of individual fingers, to body suits that allow the entire body to be tracked in a VR experience.</span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1853"><strong data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">For designers, inputs provide many ways to offer unusual game mechanics. For users, they are a means to interact with digital worlds and feel genuinely immersed. Input approaches that don’t compliment the VR content they serve can do much to disconnect the user from the experience, undermining the form’s greatest potential – that of immersion. So 3D creators give input decision making plenty of thought.</span></p><span data-dcnode-id="1849" instrument_node="">
</span></div><span data-dcnode-id="1847" instrument_node="">
</span></div><span data-dcnode-id="1845" instrument_node="">
</span></div><span data-dcnode-id="1843" instrument_node="">
</span></div><span data-dcnode-id="1841" instrument_node="">
</span><div data-dcnode-id="1811"><span data-dcnode-id="1840" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1813" id="inside-outoutside-tracking"><span data-dcnode-id="1839" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1834"><span data-dcnode-id="1838" instrument_node="">
</span><div data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Inside-Out/Outside-In Tracking</span></div><span data-dcnode-id="1835" instrument_node="">
</span></h2><span data-dcnode-id="1833" instrument_node="">
</span><div class="large" data-dcnode-id="1815"><span data-dcnode-id="1832" instrument_node="">
</span><div data-dcnode-id="1817"><p data-dcnode-id="1829"><strong data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">The two major desktop virtual reality platforms – the HTC Vive and Oculus Rift – both rely on either a camera or “lighthouse” to be placed in a fixed position in the room outside of the HMD itself. This is what defines outside-in tracking. Meanwhile, devices like Windows Immersive Mixed Reality headsets and Microsoft HoloLens use a technique called visual odometry to analyze images from cameras mounted on the HMD itself, which serve to track its position relative to the environment around it. That latter method can be understood, by contrast to external camera setups, to offer inside-out tracking.</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1822"><strong data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">While hardware conventions are primarily in the hands of the platform holders themselves, the two options available increase the number of settings in which VR and AR are relevant, and thus the potential landscape of audiences and experiences.</span></p><span data-dcnode-id="1818" instrument_node="">
</span></div><span data-dcnode-id="1816" instrument_node="">
</span></div><span data-dcnode-id="1814" instrument_node="">
</span></div><span data-dcnode-id="1812" instrument_node="">
</span></div><span data-dcnode-id="1810" instrument_node="">
</span><div data-dcnode-id="1780"><span data-dcnode-id="1809" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1782" id="interpupillary-distance-ipd"><span data-dcnode-id="1808" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1803"><span data-dcnode-id="1807" instrument_node="">
</span><div data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Interpupillary Distance (IPD)</span></div><span data-dcnode-id="1804" instrument_node="">
</span></h2><span data-dcnode-id="1802" instrument_node="">
</span><div class="large" data-dcnode-id="1784"><span data-dcnode-id="1801" instrument_node="">
</span><div data-dcnode-id="1786"><p data-dcnode-id="1798"><strong data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">The measured distance between the pupils of a given user’s eyes. IPD can be understood to be something of a "base measurement"&nbsp;that provides a foundation for scale in VR. Some HMDs allow for the physical adjustment of the horizontal displacement of the lenses to better match the individual user’s IPD.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1791"><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">While hardware conventions are primarily in the hands of the platform holders themselves, the two options available increase the number of settings in which VR and AR are relevant, and thus the potential landscape of audiences and experiences.</span></p><span data-dcnode-id="1787" instrument_node="">
</span></div><span data-dcnode-id="1785" instrument_node="">
</span></div><span data-dcnode-id="1783" instrument_node="">
</span></div><span data-dcnode-id="1781" instrument_node="">
</span></div><span data-dcnode-id="1779" instrument_node="">
</span><div data-dcnode-id="1740"><span data-dcnode-id="1778" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1742" id="latency"><span data-dcnode-id="1777" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">
</span><div data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Latency</span></div><span data-dcnode-id="1773" instrument_node="">
</span></h2><span data-dcnode-id="1771" instrument_node="">
</span><div class="large" data-dcnode-id="1744"><span data-dcnode-id="1770" instrument_node="">
</span><div data-dcnode-id="1746"><p data-dcnode-id="1767"><strong data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Latency is the speed at which the virtual world reacts to a user’s movement. A virtual world with high latency could be described as showing lag. As a simple rule, the less latency there is, the more comfortable a given experience will be. The rule of thumb is for latency to be sub 20 milliseconds. The lower the number of milliseconds, the better an experience will be.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Latency can also refer to the rate at which a virtual world updates for the user.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1757"><strong data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Low latency combats cyber sickness, and thus bolsters immersion and presence. At an even more fundamental level, it is a means through which to be comfortable in a virtual world.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Where world updating is concerned, keeping latency to a minimum makes worlds more convincing, and interactive experiences more rewarding.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Latency is an essential factor in the overall quality of an XR experience.</span></p><span data-dcnode-id="1747" instrument_node="">
</span></div><span data-dcnode-id="1745" instrument_node="">
</span></div><span data-dcnode-id="1743" instrument_node="">
</span></div><span data-dcnode-id="1741" instrument_node="">
</span></div><span data-dcnode-id="1739" instrument_node="">
</span><div data-dcnode-id="1703"><span data-dcnode-id="1738" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1705" id="light-field-technology"><span data-dcnode-id="1737" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">
</span><div data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Light Field Technology</span></div><span data-dcnode-id="1733" instrument_node="">
</span></h2><span data-dcnode-id="1731" instrument_node="">
</span><div class="large" data-dcnode-id="1707"><span data-dcnode-id="1730" instrument_node="">
</span><div data-dcnode-id="1709"><p data-dcnode-id="1727"><strong data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node="">Light field technology groups together various computational imaging and display technologies, hardware and image processing solutions that allow the capturing of images and video which can be altered after capture. The result, aperture and focus in video content can be adjusted in post, and potentially within a single user’s individual experience. Pioneered by the company Lytro, </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cseweb.ucsd.edu/~viscomp/projects/LF/papers/SIG17/lfv/"><span data-dcnode-id="1724" instrument_node="">light field technology cameras work in a manner fundamentally similar to contemporary digital cameras</span></a><span data-dcnode-id="1722" instrument_node="">. However, they use a microlens array built up from some 200,000 tiny lenses, which are used to capture myriad distinct perspectives as light hits a camera’s processor from multiple angles. By contrast, a conventional digital camera’s image sensor captures light as it enters from a single perspective, mimicking the fundamentals of a traditional film camera.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Much of the work is also done by processing and calibration software. See also: Light Field Video.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1714"><strong data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Light field technology offers the potential for much more nuanced, realistic and variable 360-video, VR, AR, and MR content, with wild potential for innovative interactions, and the ability for users to move through video experiences without needing to stay anchored to the original viewpoint of the capturing camera.</span></p><span data-dcnode-id="1710" instrument_node="">
</span></div><span data-dcnode-id="1708" instrument_node="">
</span></div><span data-dcnode-id="1706" instrument_node="">
</span></div><span data-dcnode-id="1704" instrument_node="">
</span></div><span data-dcnode-id="1702" instrument_node="">
</span><div data-dcnode-id="1669"><span data-dcnode-id="1701" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1671" id="light-field-video"><span data-dcnode-id="1700" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1695"><span data-dcnode-id="1699" instrument_node="">
</span><div data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Light Field Video</span></div><span data-dcnode-id="1696" instrument_node="">
</span></h2><span data-dcnode-id="1694" instrument_node="">
</span><div class="large" data-dcnode-id="1673"><span data-dcnode-id="1693" instrument_node="">
</span><div data-dcnode-id="1675"><p data-dcnode-id="1690"><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1688" instrument_node="">Using a unique set-up that combines a traditional DSLR video camera and a Lytro Illum camera – the latter of which is a light field camera – a team of academics from Berkeley and San Diego built a hybrid device that allows for light field video at a consumer hardware level. Typically light field technology cameras have a maximum frame rate of just 3FPS, making them unsuitable for video. </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cseweb.ucsd.edu/~viscomp/projects/LF/papers/SIG17/lfv/"><span data-dcnode-id="1687" instrument_node="">This new approach brings all the advantages of light field cameras to video work</span></a><span data-dcnode-id="1685" instrument_node="">, meaning the ability to refocus, change of view, change of aperture and more, all after the point at which the video has been captured.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1680"><strong data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">An emerging technology that brings vast potential and flexibility to 360 and other forms of immersive video, in terms of post-production process and interactive design and creativity. More broadly, light field technology offers ways to simulate real-world cues around focus, perspective, and distance in VR and 360 video content.</span></p><span data-dcnode-id="1676" instrument_node="">
</span></div><span data-dcnode-id="1674" instrument_node="">
</span></div><span data-dcnode-id="1672" instrument_node="">
</span></div><span data-dcnode-id="1670" instrument_node="">
</span></div><span data-dcnode-id="1668" instrument_node="">
</span><div data-dcnode-id="1635"><span data-dcnode-id="1667" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1637" id="low-persistence-display"><span data-dcnode-id="1666" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node="">
</span><div data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Low-Persistence Display</span></div><span data-dcnode-id="1662" instrument_node="">
</span></h2><span data-dcnode-id="1660" instrument_node="">
</span><div class="large" data-dcnode-id="1639"><span data-dcnode-id="1659" instrument_node="">
</span><div data-dcnode-id="1641"><p data-dcnode-id="1656"><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">The ability to look around within an experience is probably one of the most fundamental strengths VR offers. However, many early VR technologies were undermined by the fact that fast user movements could cause blurred visuals, prompt discomfort and break immersion. A low-persistence display offers a means to address this issue.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">As part of Google’s Daydream specification, a low-persistence mode for smartphone displays delivers a major distinguishing feature, elevating the offering from “just using a smartphone with some lenses” to being much more of a true VR HMD; albeit one with the accessibility of mobile platforms. The Samsung Gear VR switches displays into this special mode when it is inserted into the HMD and can be manually activated using Gear VR’s developer mode. In this mode, when viewed from outside of the HMD, the device appears to flicker. For that reason, it is vital that the low-persistence state is temporary.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1646"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">An increasingly refined way to give users the freedom to move as they want and enjoy true presence in the worlds you create.</span></p><span data-dcnode-id="1642" instrument_node="">
</span></div><span data-dcnode-id="1640" instrument_node="">
</span></div><span data-dcnode-id="1638" instrument_node="">
</span></div><span data-dcnode-id="1636" instrument_node="">
</span></div><span data-dcnode-id="1634" instrument_node="">
</span><div data-dcnode-id="1593"><span data-dcnode-id="1633" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1595" id="mixed-reality-mr"><span data-dcnode-id="1632" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">
</span><div data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Mixed Reality (MR)</span></div><span data-dcnode-id="1628" instrument_node="">
</span></h2><span data-dcnode-id="1626" instrument_node="">
</span><div class="large" data-dcnode-id="1597"><span data-dcnode-id="1625" instrument_node="">
</span><div data-dcnode-id="1599"><p data-dcnode-id="1622"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1617"><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/looking-to-the-future-of-mixed-reality-part-i"><span data-dcnode-id="1620" instrument_node="">A mixed reality experience</span></a><span data-dcnode-id="1618" instrument_node=""> is one that seamlessly blends the user’s real-world environment and digitally-created content, where both environments can coexist and interact with each other. It can often be found in VR experiences and installations and can be understood to be a continuum on which pure VR and pure AR are both found. Comparable to Immersive Entertainment/Hyper-Reality.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Mixed reality&nbsp;has seen very broad usage as a marketing term, and many alternative definitions co-exist today, some encompassing AR experiences, or experiences that move back and forth between VR and AR. However, the definition above is increasingly emerging as the agreed meaning of the term.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1610"><strong data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1608" instrument_node="">While mixed reality offers </span><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/looking-to-the-future-of-mixed-reality-part-ii"><span data-dcnode-id="1607" instrument_node="">many design challenges</span></a><span data-dcnode-id="1605" instrument_node="">, and </span><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/looking-to-the-future-of-mixed-reality-part-iii"><span data-dcnode-id="1604" instrument_node="">much progress is needed concerning platforms that host and support it</span></a><span data-dcnode-id="1602" instrument_node="">, there is a tremendous opportunity to bring a diversity of experiences and display methods to audiences through MR. That should mean more content can reach and serve a broader range of people, including those who do not find traditional VR or AR relevant to their abilities, comfort, taste, or budgets.</span></p><span data-dcnode-id="1600" instrument_node="">
</span></div><span data-dcnode-id="1598" instrument_node="">
</span></div><span data-dcnode-id="1596" instrument_node="">
</span></div><span data-dcnode-id="1594" instrument_node="">
</span></div><span data-dcnode-id="1592" instrument_node="">
</span><div data-dcnode-id="1562"><span data-dcnode-id="1591" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1564" id="mixed-reality-capture-aka-mixed-cast"><span data-dcnode-id="1590" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1585"><span data-dcnode-id="1589" instrument_node="">
</span><div data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Mixed Reality Capture (AKA Mixed Cast)</span></div><span data-dcnode-id="1586" instrument_node="">
</span></h2><span data-dcnode-id="1584" instrument_node="">
</span><div class="large" data-dcnode-id="1566"><span data-dcnode-id="1583" instrument_node="">
</span><div data-dcnode-id="1568"><p data-dcnode-id="1580"><strong data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">A term and approach predominantly put forward and facilitated by Oculus, mixed reality capture gives a person outside of a VR experience an impression of what it is like inside that content. The approach, as described by Oculus, lets developers "create videos and other content that merges live footage of people using Rift and Touch in the real world with in-game footage from VR apps.”</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1573"><strong data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Mixed reality capture provides a captivating means through which to share, market, promote and communicate VR experiences.</span></p><span data-dcnode-id="1569" instrument_node="">
</span></div><span data-dcnode-id="1567" instrument_node="">
</span></div><span data-dcnode-id="1565" instrument_node="">
</span></div><span data-dcnode-id="1563" instrument_node="">
</span></div><span data-dcnode-id="1561" instrument_node="">
</span><div data-dcnode-id="1531"><span data-dcnode-id="1560" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1533" id="motion-photon-latency"><span data-dcnode-id="1559" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node="">
</span><div data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Motion-to-Photon Latency</span></div><span data-dcnode-id="1555" instrument_node="">
</span></h2><span data-dcnode-id="1553" instrument_node="">
</span><div class="large" data-dcnode-id="1535"><span data-dcnode-id="1552" instrument_node="">
</span><div data-dcnode-id="1537"><p data-dcnode-id="1549"><strong data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Motion-to-photon latency is the measure of time between when actual motion occurs in the real world and when the eye receives a photon from the HMD screen that reflects this change. Thanks to the extremely high speeds and rather short distances, it is very difficult to measure, but represents the total effectiveness of a VR system from a latency standpoint. Lay users sometimes describe this phenomenon under the same terms as “lag”.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1542"><strong data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">A high frame rate will render smooth motion and avoid the appearance of strobing, which can contribute to motion sickness. However, the underlying cause of VR discomfort is the discrepancy between real-world motion and visual perception. In such a case the computer may well be rendering frames very quickly, but if the tracking data is on a delay, or if the frames need to be encoded and streamed, the high motion-to-photon latency will still cause motion sickness. This issue currently makes it difficult-to-impossible to do VR with cloud-based rendering.</span></p><span data-dcnode-id="1538" instrument_node="">
</span></div><span data-dcnode-id="1536" instrument_node="">
</span></div><span data-dcnode-id="1534" instrument_node="">
</span></div><span data-dcnode-id="1532" instrument_node="">
</span></div><span data-dcnode-id="1530" instrument_node="">
</span><div data-dcnode-id="1497"><span data-dcnode-id="1529" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1499" id="motion-tracking"><span data-dcnode-id="1528" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1523"><span data-dcnode-id="1527" instrument_node="">
</span><div data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Motion Tracking</span></div><span data-dcnode-id="1524" instrument_node="">
</span></h2><span data-dcnode-id="1522" instrument_node="">
</span><div class="large" data-dcnode-id="1501"><span data-dcnode-id="1521" instrument_node="">
</span><div data-dcnode-id="1503"><p data-dcnode-id="1518"><strong data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Motion tracking is the ability to track and record a VR user’s movement and the movement of real-world objects, reading them as inputs and replicating those movements in virtual reality in real-time.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1511"><strong data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1509" instrument_node="">Motion tracking is what allows VR users to move around in an environment just as they would in reality. When you lean in to look at something in a virtual world, you will get closer to that object; just as you would in real life. Motion tracking is one the most significant components required to trick your senses into thinking you are participating in the virtual environment. Equally, it now provides content creators with </span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/animating-inside-vr-mixing-motion-capture-and-keyframes"><span data-dcnode-id="1508" instrument_node="">a means through which to create and shape VR content from within VR</span></a><span data-dcnode-id="1506" instrument_node="">.</span></p><span data-dcnode-id="1504" instrument_node="">
</span></div><span data-dcnode-id="1502" instrument_node="">
</span></div><span data-dcnode-id="1500" instrument_node="">
</span></div><span data-dcnode-id="1498" instrument_node="">
</span></div><span data-dcnode-id="1496" instrument_node="">
</span><div data-dcnode-id="1466"><span data-dcnode-id="1495" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1468" id="multi-pass-stereo-rendering"><span data-dcnode-id="1494" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1489"><span data-dcnode-id="1493" instrument_node="">
</span><div data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Multi-Pass Stereo Rendering</span></div><span data-dcnode-id="1490" instrument_node="">
</span></h2><span data-dcnode-id="1488" instrument_node="">
</span><div class="large" data-dcnode-id="1470"><span data-dcnode-id="1487" instrument_node="">
</span><div data-dcnode-id="1472"><p data-dcnode-id="1484"><strong data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">For virtual reality to offer users stereoscopic 3D, a different image must be provided to each eye. This means rendering two distinct 3D images to an HMD. Multi-pass stereo rendering, however, is less performant than single-pass stereo rendering, and therefore limits the visual fidelity or complexity of possible scenes.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1477"><strong data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">For those making tools for creating games and other VR content, lots of effort must be put into enabling and supporting multi-pass stereo rendering. If you are a VR consumer yourself, multipass rendering might be the reason you may require such a powerful platform through which to use a virtual reality HMD.</span></p><span data-dcnode-id="1473" instrument_node="">
</span></div><span data-dcnode-id="1471" instrument_node="">
</span></div><span data-dcnode-id="1469" instrument_node="">
</span></div><span data-dcnode-id="1467" instrument_node="">
</span></div><span data-dcnode-id="1465" instrument_node="">
</span><div data-dcnode-id="1435"><span data-dcnode-id="1464" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1437" id="non-gaming-virtual-realityaugmented-reality"><span data-dcnode-id="1463" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node="">
</span><div data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Non-Gaming Virtual Reality/Augmented Reality</span></div><span data-dcnode-id="1459" instrument_node="">
</span></h2><span data-dcnode-id="1457" instrument_node="">
</span><div class="large" data-dcnode-id="1439"><span data-dcnode-id="1456" instrument_node="">
</span><div data-dcnode-id="1441"><p data-dcnode-id="1453"><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">VR experiences that include all non-gaming content, such as educational apps, medical training software, architectural visualization, military simulation, promotional installations, amusement park rides, retail uses, and creative tools. These types of experience are beginning to make up a significant portion of the VR content made today.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1446"><strong data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Good news. The more industries and sectors that are embracing VR, the more the ecosystem of virtual reality can grow. That means more tools, more investment, and more talent – fantastic whether you’re a VR creator or a consumer.</span></p><span data-dcnode-id="1442" instrument_node="">
</span></div><span data-dcnode-id="1440" instrument_node="">
</span></div><span data-dcnode-id="1438" instrument_node="">
</span></div><span data-dcnode-id="1436" instrument_node="">
</span></div><span data-dcnode-id="1434" instrument_node="">
</span><div data-dcnode-id="1404"><span data-dcnode-id="1433" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1406" id="opengl-transformation-pipeline"><span data-dcnode-id="1432" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1427"><span data-dcnode-id="1431" instrument_node="">
</span><div data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">OpenGL Transformation Pipeline</span></div><span data-dcnode-id="1428" instrument_node="">
</span></h2><span data-dcnode-id="1426" instrument_node="">
</span><div class="large" data-dcnode-id="1408"><span data-dcnode-id="1425" instrument_node="">
</span><div data-dcnode-id="1410"><p data-dcnode-id="1422"><strong data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">OpenGL transformation occurs in the OpenGL pipeline, and in doing so delivers the same fundamental process as general graphics transformation pipelines, specifically for the cross-language, cross-platform graphics API. OpenGL matrices are used, in a way similar to that seen with the Direct3D Transformation Pipeline’s tailored Matrices.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1415"><strong data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">For those familiar with the OpenGL API, a bespoke Graphics Transformation Pipeline is available.</span></p><span data-dcnode-id="1411" instrument_node="">
</span></div><span data-dcnode-id="1409" instrument_node="">
</span></div><span data-dcnode-id="1407" instrument_node="">
</span></div><span data-dcnode-id="1405" instrument_node="">
</span></div><span data-dcnode-id="1403" instrument_node="">
</span><div data-dcnode-id="1373"><span data-dcnode-id="1402" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1375" id="openvr-sdkapi"><span data-dcnode-id="1401" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1396"><span data-dcnode-id="1400" instrument_node="">
</span><div data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">OpenVR SDK/API</span></div><span data-dcnode-id="1397" instrument_node="">
</span></h2><span data-dcnode-id="1395" instrument_node="">
</span><div class="large" data-dcnode-id="1377"><span data-dcnode-id="1394" instrument_node="">
</span><div data-dcnode-id="1379"><p data-dcnode-id="1391"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">An SDK and API created by Valve specifically to support development for the SteamVR/HTC Vive and similar VR headsets. By contrast, the OpenXR initiative is a broader working group looking to establish general standards to support the creation and distribution of VR and AR content, tools, and hardware.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1384"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">A means to create content for one of the current generation of VR’s most prolific and popular platforms.</span></p><span data-dcnode-id="1380" instrument_node="">
</span></div><span data-dcnode-id="1378" instrument_node="">
</span></div><span data-dcnode-id="1376" instrument_node="">
</span></div><span data-dcnode-id="1374" instrument_node="">
</span></div><span data-dcnode-id="1372" instrument_node="">
</span><div data-dcnode-id="1342"><span data-dcnode-id="1371" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1344" id="openxr"><span data-dcnode-id="1370" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">
</span><div data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">OpenXR</span></div><span data-dcnode-id="1366" instrument_node="">
</span></h2><span data-dcnode-id="1364" instrument_node="">
</span><div class="large" data-dcnode-id="1346"><span data-dcnode-id="1363" instrument_node="">
</span><div data-dcnode-id="1348"><p data-dcnode-id="1360"><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">An initiative to create an open standard for VR and AR apps and devices, and to eliminate the fragmentation of the industry. See also: OpenVR SDK/API.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1353"><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">A more robust, reliable, and advanced ecosystem on which to create VR and AR content.</span></p><span data-dcnode-id="1349" instrument_node="">
</span></div><span data-dcnode-id="1347" instrument_node="">
</span></div><span data-dcnode-id="1345" instrument_node="">
</span></div><span data-dcnode-id="1343" instrument_node="">
</span></div><span data-dcnode-id="1341" instrument_node="">
</span><div data-dcnode-id="1311"><span data-dcnode-id="1340" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1313" id="panoramic-2d3d-video"><span data-dcnode-id="1339" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">
</span><div data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Panoramic 2D/3D Video</span></div><span data-dcnode-id="1335" instrument_node="">
</span></h2><span data-dcnode-id="1333" instrument_node="">
</span><div class="large" data-dcnode-id="1315"><span data-dcnode-id="1332" instrument_node="">
</span><div data-dcnode-id="1317"><p data-dcnode-id="1329"><strong data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">As with many terms in the emerging VR and AR space, panoramic 2D and 3D video cover a relatively broad spectrum. They generally define video content that wraps entirely around the user, be it as a 360-degree band at eye-level, or as an entire sphere. Broadly the term includes both 360 video viewed in a VR HMD context, but equally screen-based installations at venues like amusement parks. Most live action 360 video content today is a 2D image, though with the right equipment – and budget – truly stereoscopic panoramic 3D video is entirely possible.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1322"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Beyond the opportunities 360 video offers, panoramic video provides other content creators – game developers and marketers – with a means to reduce scene complexity by including video as a pre-rendered background in the place of real geometry. 3D Engines like Unity offer built-in support for this kind of video content.</span></p><span data-dcnode-id="1318" instrument_node="">
</span></div><span data-dcnode-id="1316" instrument_node="">
</span></div><span data-dcnode-id="1314" instrument_node="">
</span></div><span data-dcnode-id="1312" instrument_node="">
</span></div><span data-dcnode-id="1310" instrument_node="">
</span><div data-dcnode-id="1277"><span data-dcnode-id="1309" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1279" id="positional-tracking"><span data-dcnode-id="1308" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1303"><span data-dcnode-id="1307" instrument_node="">
</span><div data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Positional Tracking</span></div><span data-dcnode-id="1304" instrument_node="">
</span></h2><span data-dcnode-id="1302" instrument_node="">
</span><div class="large" data-dcnode-id="1281"><span data-dcnode-id="1301" instrument_node="">
</span><div data-dcnode-id="1283"><p data-dcnode-id="1298"><strong data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Positional tracking is the ability to record user movement and the movement of objects in real-time. This translates to users being able to move around in reality, and have those motions reproduced as interactions in a given virtual world.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">While positional tracking as a term touches on similar areas to those defined by head tracking and gaze tracking, it covers HMDs, controllers, props and other real-world objects, including those seen in true mixed reality experiences.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1288"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">At a base level, the relative finesse of positional tracking impacts a VR experiences ability to be convincing and immersive. Beyond that, the expanding potential of the kinds of objects and inputs that can be positionally tracked is significantly broadening the spectrum of experiences virtual reality can offer.</span></p><span data-dcnode-id="1284" instrument_node="">
</span></div><span data-dcnode-id="1282" instrument_node="">
</span></div><span data-dcnode-id="1280" instrument_node="">
</span></div><span data-dcnode-id="1278" instrument_node="">
</span></div><span data-dcnode-id="1276" instrument_node="">
</span><div data-dcnode-id="1246"><span data-dcnode-id="1275" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1248" id="post-fx-vr-or-post-processing-stack"><span data-dcnode-id="1274" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1269"><span data-dcnode-id="1273" instrument_node="">
</span><div data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Post FX for VR (or Post Processing Stack)</span></div><span data-dcnode-id="1270" instrument_node="">
</span></h2><span data-dcnode-id="1268" instrument_node="">
</span><div class="large" data-dcnode-id="1250"><span data-dcnode-id="1267" instrument_node="">
</span><div data-dcnode-id="1252"><p data-dcnode-id="1264"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Post FX for VR offers the application of various visual effects applied after a scene has been created. A post-processing stack combines a complete set of image effects into a single post-process pipeline, allowing cinematic effects to be applied directly and efficiently, and in the correct order for a single pass.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1257"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Approaches like that seen with the post-processing stack provide a straightforward, relatively fast way to garnish VR worlds with an extra degree of nuance and detail, ultimately making them more convincing.</span></p><span data-dcnode-id="1253" instrument_node="">
</span></div><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span></div><span data-dcnode-id="1247" instrument_node="">
</span></div><span data-dcnode-id="1245" instrument_node="">
</span><div data-dcnode-id="1215"><span data-dcnode-id="1244" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1217" id="presence-or-sense-presence"><span data-dcnode-id="1243" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1238"><span data-dcnode-id="1242" instrument_node="">
</span><div data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Presence (or Sense of Presence)</span></div><span data-dcnode-id="1239" instrument_node="">
</span></h2><span data-dcnode-id="1237" instrument_node="">
</span><div class="large" data-dcnode-id="1219"><span data-dcnode-id="1236" instrument_node="">
</span><div data-dcnode-id="1221"><p data-dcnode-id="1233"><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">The sense of being somewhere, be it in reality or a virtual reality. In reality, a present person may be particularly aware and socially interactive. In VR, the term applies to the experience of believing you do occupy the virtual world. We could arguably also be understood to be “present” in a book or film when we forget the real world exists, and that fiction is reality. VR offers a sense of presence unrivaled by almost any other medium or form.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1226"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Presence is arguably the founding strength of VR and a vital tool for achieving immersion of the player. Engendering presence comes from the many techniques used to make quality VR, but perhaps the most important rule is that “anything that reminds a user they are in a VR experience – rather than a reality – will counter presence.” That means an incongruous menu or moment of lag could undermine presence in an instant.</span></p><span data-dcnode-id="1222" instrument_node="">
</span></div><span data-dcnode-id="1220" instrument_node="">
</span></div><span data-dcnode-id="1218" instrument_node="">
</span></div><span data-dcnode-id="1216" instrument_node="">
</span></div><span data-dcnode-id="1214" instrument_node="">
</span><div data-dcnode-id="1177"><span data-dcnode-id="1213" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1179" id="render-loop-aka-render-pipeline"><span data-dcnode-id="1212" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">
</span><div data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Render Loop (AKA Render Pipeline)</span></div><span data-dcnode-id="1208" instrument_node="">
</span></h2><span data-dcnode-id="1206" instrument_node="">
</span><div class="large" data-dcnode-id="1181"><span data-dcnode-id="1205" instrument_node="">
</span><div data-dcnode-id="1183"><p data-dcnode-id="1202"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">A render loop provides the logical architecture which dictates how a rendered frame is composed. A typically render loop may take the following structure and order, for example:</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1195"><em data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Culling &gt; Shadows &gt; Opaque &gt; Transparent &gt; Post Processing &gt; Present</span></em></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">While a render loop is the set of steps the 3D engine goes through to compose a scene, the graphics transformation pipeline is the set of steps to transform an object from its own space into physical screen space.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1188"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">For VR two distinct images must be rendered for each eye. While running two render loops is workable, it is extremely demanding on CPU and GPU resource. However, the development of techniques like Unity’s Single-Pass Stereo Rendering makes rendering loops that support VR content much more efficient, freeing up GPU and CPU for other tasks.</span></p><span data-dcnode-id="1184" instrument_node="">
</span></div><span data-dcnode-id="1182" instrument_node="">
</span></div><span data-dcnode-id="1180" instrument_node="">
</span></div><span data-dcnode-id="1178" instrument_node="">
</span></div><span data-dcnode-id="1176" instrument_node="">
</span><div data-dcnode-id="1146"><span data-dcnode-id="1175" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1148" id="render-target-including-render-target-array"><span data-dcnode-id="1174" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">
</span><div data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Render Target (including Render Target Array)</span></div><span data-dcnode-id="1170" instrument_node="">
</span></h2><span data-dcnode-id="1168" instrument_node="">
</span><div class="large" data-dcnode-id="1150"><span data-dcnode-id="1167" instrument_node="">
</span><div data-dcnode-id="1152"><p data-dcnode-id="1164"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">A render target is a memory buffer that effectively serves as a place to draw to, allowing objects to appear in an end user’s headset. An array of render targets allows for outputting to multiple render targets simultaneously.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1157"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Render Targets are an established convention of game and related development and provide a useful ability to render objects offscreen.</span></p><span data-dcnode-id="1153" instrument_node="">
</span></div><span data-dcnode-id="1151" instrument_node="">
</span></div><span data-dcnode-id="1149" instrument_node="">
</span></div><span data-dcnode-id="1147" instrument_node="">
</span></div><span data-dcnode-id="1145" instrument_node="">
</span><div data-dcnode-id="1115"><span data-dcnode-id="1144" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1117" id="render-texture"><span data-dcnode-id="1143" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node="">
</span><div data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Render Texture</span></div><span data-dcnode-id="1139" instrument_node="">
</span></h2><span data-dcnode-id="1137" instrument_node="">
</span><div class="large" data-dcnode-id="1119"><span data-dcnode-id="1136" instrument_node="">
</span><div data-dcnode-id="1121"><p data-dcnode-id="1133"><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Render textures are unique types of textures that are created and updated at runtime. You can create a new render texture before designating one of your cameras to render into it.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1126"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Render Textures can be used in a material within a game engine, bringing the advantages of runtime.</span></p><span data-dcnode-id="1122" instrument_node="">
</span></div><span data-dcnode-id="1120" instrument_node="">
</span></div><span data-dcnode-id="1118" instrument_node="">
</span></div><span data-dcnode-id="1116" instrument_node="">
</span></div><span data-dcnode-id="1114" instrument_node="">
</span><div data-dcnode-id="1084"><span data-dcnode-id="1113" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1086" id="scene-graph"><span data-dcnode-id="1112" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">
</span><div data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Scene Graph</span></div><span data-dcnode-id="1108" instrument_node="">
</span></h2><span data-dcnode-id="1106" instrument_node="">
</span><div class="large" data-dcnode-id="1088"><span data-dcnode-id="1105" instrument_node="">
</span><div data-dcnode-id="1090"><p data-dcnode-id="1102"><strong data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Scene graphs are specialized data structures that organize the information needed to render a scene. The scene graph is consumed and understood by the renderer. The scene graph can refer to either the scene in its entirety or the portion visible to the view. In the latter context the term “culled scene graph” is used.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1095"><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Well ordered VR worlds are efficient and reliable while putting minimum computational demands onto a system through efficient positioning and scaling of objects in a scene.</span></p><span data-dcnode-id="1091" instrument_node="">
</span></div><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1087" instrument_node="">
</span></div><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
</span><div data-dcnode-id="1051"><span data-dcnode-id="1082" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1053" id="screen-resolution"><span data-dcnode-id="1081" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node="">
</span><div data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Screen Resolution</span></div><span data-dcnode-id="1077" instrument_node="">
</span></h2><span data-dcnode-id="1075" instrument_node="">
</span><div class="large" data-dcnode-id="1055"><span data-dcnode-id="1074" instrument_node="">
</span><div data-dcnode-id="1057"><p data-dcnode-id="1071"><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1066"><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.unity3d.com/ScriptReference/Screen-resolutions.html"><span data-dcnode-id="1069" instrument_node="">Screen resolution</span></a><span data-dcnode-id="1067" instrument_node=""> refers to the number of pixels that are displayed on the screen. Much like a computer monitor or television, the more pixels present, the clearer and more realistic the image quality will be. However, in the case of the screen resolution of a VR headset, because the image is only a few inches away from your eyes, a higher screen resolution is needed so users don't perceive the gaps between individual pixels. Additionally, in the case of VR headsets, the screen is split in half to show one image accurately to each eye.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1062"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">As developer or consumer, when looking for a mid-level or high-end VR headset, look for a screen resolution with a minimum of 2160 by 1200 (or 1080 by 1200 per eye). Anything lower and you may notice what is called the “screen door effect”, which feels like you are looking through a screen door; in other words, you can see the little black dots or lines in the screen.</span></p><span data-dcnode-id="1058" instrument_node="">
</span></div><span data-dcnode-id="1056" instrument_node="">
</span></div><span data-dcnode-id="1054" instrument_node="">
</span></div><span data-dcnode-id="1052" instrument_node="">
</span></div><span data-dcnode-id="1050" instrument_node="">
</span><div data-dcnode-id="1005"><span data-dcnode-id="1049" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1007" id="single-pass-stereo-rendering"><span data-dcnode-id="1048" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">
</span><div data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Single-Pass Stereo Rendering</span></div><span data-dcnode-id="1044" instrument_node="">
</span></h2><span data-dcnode-id="1042" instrument_node="">
</span><div class="large" data-dcnode-id="1009"><span data-dcnode-id="1041" instrument_node="">
</span><div data-dcnode-id="1011"><p data-dcnode-id="1038"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Single-pass stereo rendering is a feature that renders both eye images at the same time into one packed render texture, meaning that the whole scene is only rendered once, and CPU processing time is significantly reduced.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1033" instrument_node="">With </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.unity3d.com/Manual/SinglePassStereoRendering.html"><span data-dcnode-id="1032" instrument_node="">single-pass stereo rendering</span></a><span data-dcnode-id="1030" instrument_node=""> or stereo instancing enabled, a 3D engine like Unity shares culling – whether or not a 3D object should be rendered based on if it is visible to the camera – and shadow data between the eyes. So for each visible object, we only need to render the object once, </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/how-to-maximize-ar-and-vr-performance-with-advanced-stereo-rendering"><span data-dcnode-id="1029" instrument_node="">which can result in considerable speedups, while still delivering robust performance</span></a><span data-dcnode-id="1027" instrument_node="">.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">The difference between single-pass rendering and stereo instancing is that the latter is even more performant, but requires hardware support. Without this feature, the 3D engine renders the scene twice: first to render the left-eye image, and then again for the right-eye image.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">As of Unity 2017.3, all platforms supported have Single Pass Stereo and, where available, Single Pass Instancing.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1016"><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">With the demands traditional render loops place on CPU processing time reduced, you are given more to work with elsewhere on your VR project.</span></p><span data-dcnode-id="1012" instrument_node="">
</span></div><span data-dcnode-id="1010" instrument_node="">
</span></div><span data-dcnode-id="1008" instrument_node="">
</span></div><span data-dcnode-id="1006" instrument_node="">
</span></div><span data-dcnode-id="1004" instrument_node="">
</span><div data-dcnode-id="974"><span data-dcnode-id="1003" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="976" id="six-degrees-freedom-6dof"><span data-dcnode-id="1002" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">
</span><div data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Six Degrees of Freedom (6DOF)</span></div><span data-dcnode-id="998" instrument_node="">
</span></h2><span data-dcnode-id="996" instrument_node="">
</span><div class="large" data-dcnode-id="978"><span data-dcnode-id="995" instrument_node="">
</span><div data-dcnode-id="980"><p data-dcnode-id="992"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">A system that provides six degrees of freedom tracks an object’s position and rotation in three dimensions. The three positional axes combined with the three rotational axes total six “degrees” which can be freely controlled.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="985"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">There is a significant difference between what you can do with 3DOF rotational tracking and full 6DOF tracking. As an example, the original Wii controller only tracked rotation, which forced game developers to use control 'metaphors' for things like throwing a ball or swinging a tennis racquet. On the other hand, the HTC Vive and Oculus Touch controllers can be precisely controlled in space, giving users a sense of where their hands are, delivering more nuance and enabling presence.</span></p><span data-dcnode-id="981" instrument_node="">
</span></div><span data-dcnode-id="979" instrument_node="">
</span></div><span data-dcnode-id="977" instrument_node="">
</span></div><span data-dcnode-id="975" instrument_node="">
</span></div><span data-dcnode-id="973" instrument_node="">
</span><div data-dcnode-id="943"><span data-dcnode-id="972" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="945" id="slam-simultaneous-localization-and-mapping"><span data-dcnode-id="971" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">
</span><div data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">SLAM (Simultaneous Localization and Mapping)</span></div><span data-dcnode-id="967" instrument_node="">
</span></h2><span data-dcnode-id="965" instrument_node="">
</span><div class="large" data-dcnode-id="947"><span data-dcnode-id="964" instrument_node="">
</span><div data-dcnode-id="949"><p data-dcnode-id="961"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Simultaneous localization and mapping is the process whereby a map is generated and updated by an agent – perhaps a vehicle – moving through that space, at the same time that such an agent is tracked in the space. There are many distinct approaches at present, and the technology is emerging as crucial to self-driving cars, domestic robots, and AR applications.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="954"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Establishing SLAM technologies and the algorithms that power them has vast potential to influence the evolution of AR, offering a means for multiple practical applications, as well as in games and other entertainment forms.</span></p><span data-dcnode-id="950" instrument_node="">
</span></div><span data-dcnode-id="948" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">
</span></div><span data-dcnode-id="944" instrument_node="">
</span></div><span data-dcnode-id="942" instrument_node="">
</span><div data-dcnode-id="912"><span data-dcnode-id="941" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="914" id="spatial-audio-or-3d-audio"><span data-dcnode-id="940" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="935"><span data-dcnode-id="939" instrument_node="">
</span><div data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Spatial Audio (or 3D Audio)</span></div><span data-dcnode-id="936" instrument_node="">
</span></h2><span data-dcnode-id="934" instrument_node="">
</span><div class="large" data-dcnode-id="916"><span data-dcnode-id="933" instrument_node="">
</span><div data-dcnode-id="918"><p data-dcnode-id="930"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Spatial audio provides a method through which to build and place audio assets so that – from the VR user’s perspective – a given sound originates from a particular position in a 3D scene. This is like surround-sound in a home theater setup or at the cinema, and very important to presence and immersion in VR.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="923"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Sound is one of the essential components to creating an immersive VR experience. Spatial sound allows you to hear sound all around you and also tracks the sound when you move your head, just like in real life. That means a VR developer can – as well as offering more realism – use sound to direct or guide a player, as well as for more innovative mechanics distinct to VR.</span></p><span data-dcnode-id="919" instrument_node="">
</span></div><span data-dcnode-id="917" instrument_node="">
</span></div><span data-dcnode-id="915" instrument_node="">
</span></div><span data-dcnode-id="913" instrument_node="">
</span></div><span data-dcnode-id="911" instrument_node="">
</span><div data-dcnode-id="881"><span data-dcnode-id="910" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="883" id="stereoscopy"><span data-dcnode-id="909" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="904"><span data-dcnode-id="908" instrument_node="">
</span><div data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Stereoscopy</span></div><span data-dcnode-id="905" instrument_node="">
</span></h2><span data-dcnode-id="903" instrument_node="">
</span><div class="large" data-dcnode-id="885"><span data-dcnode-id="902" instrument_node="">
</span><div data-dcnode-id="887"><p data-dcnode-id="899"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">The reproduction of the effects of binocular vision by photographic or other graphic means. In other words, recreating the experience humans get from seeing the real world with two eyes. Typically stereoscopic approaches provide two distinct images of the same scene: one for the user’s left eye and one for their right eye. This would happen, for example, through the left and right lens of an HMD. The user’s brain then combines the two images to build a 3D scene with depth and perspective, just as is the case with what our left and right eyes see – and how those images are compiled – in reality.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="892"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">VR content that is more immersive, offers more presence and provides a more distinct experience from that seen on traditional flat displays.</span></p><span data-dcnode-id="888" instrument_node="">
</span></div><span data-dcnode-id="886" instrument_node="">
</span></div><span data-dcnode-id="884" instrument_node="">
</span></div><span data-dcnode-id="882" instrument_node="">
</span></div><span data-dcnode-id="880" instrument_node="">
</span><div data-dcnode-id="850"><span data-dcnode-id="879" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="852" id="stereo-instancing"><span data-dcnode-id="878" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">
</span><div data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Stereo Instancing</span></div><span data-dcnode-id="874" instrument_node="">
</span></h2><span data-dcnode-id="872" instrument_node="">
</span><div class="large" data-dcnode-id="854"><span data-dcnode-id="871" instrument_node="">
</span><div data-dcnode-id="856"><p data-dcnode-id="868"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">An evolution of single-pass rendering, and the latest of several rendering optimization approaches that strive to help developers ensure a smoother experience in VR, where the framerate budgets are impossibly small compared to the constraints of traditional game development.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="861"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">A way for developers to save CPU processing times, and free up power they can use elsewhere.</span></p><span data-dcnode-id="857" instrument_node="">
</span></div><span data-dcnode-id="855" instrument_node="">
</span></div><span data-dcnode-id="853" instrument_node="">
</span></div><span data-dcnode-id="851" instrument_node="">
</span></div><span data-dcnode-id="849" instrument_node="">
</span><div data-dcnode-id="819"><span data-dcnode-id="848" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="821" id="tracked-pose-driver"><span data-dcnode-id="847" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">
</span><div data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Tracked Pose Driver</span></div><span data-dcnode-id="843" instrument_node="">
</span></h2><span data-dcnode-id="841" instrument_node="">
</span><div class="large" data-dcnode-id="823"><span data-dcnode-id="840" instrument_node="">
</span><div data-dcnode-id="825"><p data-dcnode-id="837"><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="836" instrument_node="">
