</span><h2 class="md-m-bottom" data-dcnode-id="3010"><span data-dcnode-id="3014" instrument_node="">
</span><div data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">360 Video</span></div><span data-dcnode-id="3011" instrument_node="">
</span></h2><span data-dcnode-id="3009" instrument_node="">
</span><div class="large" data-dcnode-id="2982"><span data-dcnode-id="3008" instrument_node="">
</span><div data-dcnode-id="2984"><p data-dcnode-id="3005"><strong data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="3004" instrument_node="">
</span><p data-dcnode-id="2996"><span data-dcnode-id="3003" instrument_node="">Frequently called "spherical videos"&nbsp;or "immersive videos", </span><a data-dcnode-id="3001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unity.com/solutions/360video"><span data-dcnode-id="3002" instrument_node="">360 videos</span></a><span data-dcnode-id="3000" instrument_node=""> are video recordings where a view in multiple directions is recorded simultaneously. They are typically shot using a specialist omnidirectional camera, or a collection of separate, connected cameras mounted as a spherical array. 360 videos can be live action (cinematography or videography that does not use animation), animated (captured from a 3D scene), or a mix of computer generated-graphics and live action. After being prepared for display via a technology </span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/how-to-integrate-360-video-with-unity"><span data-dcnode-id="2999" instrument_node="">such as a 3D game engine</span></a><span data-dcnode-id="2997" instrument_node="">, 360 videos are then viewed by the user in a headset.</span></p><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">360 videos can be non-interactive or interactive. Non-interactive 360 videos are experiences where the viewer cannot influence the viewing experience outside of perhaps pausing the video or moving their head to take in different "camera angles". Interactive 360 videos are experiences where the viewer can interact with the UI or other interactable elements using gaze or a controller.</span></p><span data-dcnode-id="2992" instrument_node="">
</span><p data-dcnode-id="2989"><strong data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">360 video is an opportunity for creators to work with a variety of industries now wanting to provide content in a marketing or entertainment form. While some of the production of 360 video is distinct from building from digital assets, the post-production process is relatively comparable to creating gaming and other digital MR content.</span></p><span data-dcnode-id="2985" instrument_node="">
</span></div><span data-dcnode-id="2983" instrument_node="">
</span></div><span data-dcnode-id="2981" instrument_node="">
</span></div><span data-dcnode-id="2979" instrument_node="">
</span></div><span data-dcnode-id="2977" instrument_node="">
</span><div data-dcnode-id="2944"><span data-dcnode-id="2976" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2946" id="ambisonic-audio"><span data-dcnode-id="2975" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2970"><span data-dcnode-id="2974" instrument_node="">
</span><div data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Ambisonic Audio</span></div><span data-dcnode-id="2971" instrument_node="">
</span></h2><span data-dcnode-id="2969" instrument_node="">
</span><div class="large" data-dcnode-id="2948"><span data-dcnode-id="2968" instrument_node="">
</span><div data-dcnode-id="2950"><p data-dcnode-id="2965"><strong data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2959"><span data-dcnode-id="2963" instrument_node="">This </span><a data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.unity3d.com/Manual/AmbisonicAudio.html"><span data-dcnode-id="2962" instrument_node="">surround sound technique</span></a><span data-dcnode-id="2960" instrument_node=""> covers sound sources both below and above the user. Officially a "full sphere"&nbsp;technique, it also serves audio sources positioned on the horizontal plane. Ambisonics are stored in a multi-channel format. Instead of each channel mapped to a specific speaker, ambisonics instead represent the sound field in a more general way. The sound field can then be rotated based on the listener’s orientation – for example, the user’s head rotation in XR. The sound field can also be decoded into a format that matches the speaker setup. Ambisonics are commonly paired with 360-degree videos and used as an audio skybox for distant ambient sounds.</span></p><span data-dcnode-id="2958" instrument_node="">
</span><p data-dcnode-id="2955"><strong data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2954" instrument_node="">
</span><p data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">While ambisonic audio does potentially mean more expense – both in memory and production budgets – it grants your VR experience a fully immersive soundscape. Audio design and production are more important for VR than previous display methods, and "3D sound"&nbsp;will make most virtual reality experiences all the more convincing and immersive.</span></p><span data-dcnode-id="2951" instrument_node="">
</span></div><span data-dcnode-id="2949" instrument_node="">
</span></div><span data-dcnode-id="2947" instrument_node="">
</span></div><span data-dcnode-id="2945" instrument_node="">
</span></div><span data-dcnode-id="2943" instrument_node="">
</span><div data-dcnode-id="2913"><span data-dcnode-id="2942" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2915" id="anti-aliasing"><span data-dcnode-id="2941" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2936"><span data-dcnode-id="2940" instrument_node="">
</span><div data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Anti-Aliasing</span></div><span data-dcnode-id="2937" instrument_node="">
</span></h2><span data-dcnode-id="2935" instrument_node="">
</span><div class="large" data-dcnode-id="2917"><span data-dcnode-id="2934" instrument_node="">
</span><div data-dcnode-id="2919"><p data-dcnode-id="2931"><strong data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">At its most fundamental level, anti-aliasing is a technique that smooths the jagged lines on the edges of three-dimensional assets. The approach smooths the color of an edge with the color of pixels immediately surrounding it. Anti-aliasing is particularly crucial in VR, where the jagged edges can undermine immersion and presence.</span></p><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2924"><strong data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Anti-aliasing provides a straightforward and well-established means through which to improve visual fidelity in 3D virtual content. 3D engines like Unity allow developers using forward rendering to enable multisample anti-aliasing in many cases. While deferred rendering does not allow for multisample anti-aliasing, in those cases developers can opt to apply anti-aliasing as a post-effect.</span></p><span data-dcnode-id="2920" instrument_node="">
</span></div><span data-dcnode-id="2918" instrument_node="">
</span></div><span data-dcnode-id="2916" instrument_node="">
</span></div><span data-dcnode-id="2914" instrument_node="">
</span></div><span data-dcnode-id="2912" instrument_node="">
</span><div data-dcnode-id="2882"><span data-dcnode-id="2911" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2884" id="api-application-programming-interface"><span data-dcnode-id="2910" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2905"><span data-dcnode-id="2909" instrument_node="">
</span><div data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">API (Application Programming Interface)</span></div><span data-dcnode-id="2906" instrument_node="">
</span></h2><span data-dcnode-id="2904" instrument_node="">
</span><div class="large" data-dcnode-id="2886"><span data-dcnode-id="2903" instrument_node="">
</span><div data-dcnode-id="2888"><p data-dcnode-id="2900"><strong data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">An API, or “Application Programming Interface”, is a common concept in software development, found throughout VR and AR content development. In essence, it is a standardized interface that lets software connect with an operating system and make use of its resources. APIs are not visible to the user of a VR or AR experience.</span></p><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2893"><strong data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">Accessing and harnessing an operating system’s resources and potential is simpler, standardized and more efficient.</span></p><span data-dcnode-id="2889" instrument_node="">
</span></div><span data-dcnode-id="2887" instrument_node="">
</span></div><span data-dcnode-id="2885" instrument_node="">
</span></div><span data-dcnode-id="2883" instrument_node="">
</span></div><span data-dcnode-id="2881" instrument_node="">
</span><div data-dcnode-id="2846"><span data-dcnode-id="2880" instrument_node="">

</span><div data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">ARCore</span></div><span data-dcnode-id="2875" instrument_node="">
</span></h2><span data-dcnode-id="2873" instrument_node="">
</span><div class="large" data-dcnode-id="2850"><span data-dcnode-id="2872" instrument_node="">
</span><div data-dcnode-id="2852"><p data-dcnode-id="2869"><strong data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2868" instrument_node="">
</span><p data-dcnode-id="2861"><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unity3d.com/partners/google/arcore"><span data-dcnode-id="2867" instrument_node="">A software-only solution for AR</span></a><span data-dcnode-id="2865" instrument_node=""> that works on all Android phones running Android Nougat or any subsequent version of the OS. It will enable </span><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unity.com/unity/features/ar"><span data-dcnode-id="2864" instrument_node="">mobile AR experiences</span></a><span data-dcnode-id="2862" instrument_node=""> at scale in a similar fashion to how ARKit provides for iOS. In fact, the SDK itself has similar functionality to ARKit. Google is unsure if ARCore will be housed within Android, or if it will be a standalone product. They have confirmed it will not be part of the Daydream brand.</span></p><span data-dcnode-id="2860" instrument_node="">
</span><p data-dcnode-id="2857"><strong data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2856" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">If ARCore is as successful as Google hopes, then it gives a vast audience an accessible AR platform. That, of course, means a massive audience for your AR content.</span></p><span data-dcnode-id="2853" instrument_node="">
</span></div><span data-dcnode-id="2851" instrument_node="">

</span><p data-dcnode-id="2827"><span data-dcnode-id="2831" instrument_node="">The software development kit that enables development for </span><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/ar-comes-to-android-with-the-arcore-sdk"><span data-dcnode-id="2830" instrument_node="">AR apps targeting Android devices</span></a><span data-dcnode-id="2828" instrument_node=""> and ARCore.</span></p><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2823"><strong data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">A convenient and efficient way to make content for ARCore devices.</span></p><span data-dcnode-id="2819" instrument_node="">

</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">A framework that allows you to create and launch augmented reality experiences for iPhone and iPad.</span></p><span data-dcnode-id="2795" instrument_node="">

</span><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">The Unity software package that enables development of apps targeting ARKit for iOS.</span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2761"><strong data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">More accessible, high-quality AR development for iOS platforms.</span></p><span data-dcnode-id="2757" instrument_node="">

</span><h2 class="md-m-bottom" data-dcnode-id="2742"><span data-dcnode-id="2746" instrument_node="">
</span><div data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">AR Light Estimation</span></div><span data-dcnode-id="2743" instrument_node="">
</span></h2><span data-dcnode-id="2741" instrument_node="">
</span><div class="large" data-dcnode-id="2723"><span data-dcnode-id="2740" instrument_node="">
</span><div data-dcnode-id="2725"><p data-dcnode-id="2737"><strong data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Information – based on calculated approximations – about any scene lighting associated with captured video frames from an AR session.</span></p><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2730"><strong data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">AR Light Estimation gives you an opportunity to make sure that virtual objects rendered on top of the camera feed look like they belong in the environment, which is essential for immersion.</span></p><span data-dcnode-id="2726" instrument_node="">
</span></div><span data-dcnode-id="2724" instrument_node="">
</span></div><span data-dcnode-id="2722" instrument_node="">
</span></div><span data-dcnode-id="2720" instrument_node="">
</span></div><span data-dcnode-id="2718" instrument_node="">
</span><div data-dcnode-id="2685"><span data-dcnode-id="2717" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2687" id="audio-spatializer"><span data-dcnode-id="2716" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2711"><span data-dcnode-id="2715" instrument_node="">
</span><div data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Audio Spatializer</span></div><span data-dcnode-id="2712" instrument_node="">
</span></h2><span data-dcnode-id="2710" instrument_node="">
</span><div class="large" data-dcnode-id="2689"><span data-dcnode-id="2709" instrument_node="">
</span><div data-dcnode-id="2691"><p data-dcnode-id="2706"><strong data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2700"><span data-dcnode-id="2704" instrument_node="">A feature that changes the way audio is transmitted from an audio source into the surrounding space. A plugin of this kind takes the source and regulates the gains of the left and right ear contributions; </span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.unity3d.com/Manual/VRAudioSpatializer.html"><span data-dcnode-id="2703" instrument_node="">in a 3D engine like Unity the calculation</span></a><span data-dcnode-id="2701" instrument_node=""> is based on the distance and angle between the AudioListener and the AudioSource.</span></p><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2696"><strong data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">More convincing, immersive sound that compliments the 3D nature of your VR content.</span></p><span data-dcnode-id="2692" instrument_node="">
</span></div><span data-dcnode-id="2690" instrument_node="">
</span></div><span data-dcnode-id="2688" instrument_node="">
</span></div><span data-dcnode-id="2686" instrument_node="">
</span></div><span data-dcnode-id="2684" instrument_node="">
</span><div data-dcnode-id="2651"><span data-dcnode-id="2683" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2653" id="audio-spatializer-sdk"><span data-dcnode-id="2682" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2677"><span data-dcnode-id="2681" instrument_node="">
</span><div data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Audio Spatializer SDK</span></div><span data-dcnode-id="2678" instrument_node="">
</span></h2><span data-dcnode-id="2676" instrument_node="">
</span><div class="large" data-dcnode-id="2655"><span data-dcnode-id="2675" instrument_node="">
</span><div data-dcnode-id="2657"><p data-dcnode-id="2672"><strong data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2671" instrument_node="">
</span><p data-dcnode-id="2666"><span data-dcnode-id="2670" instrument_node="">An extension of the native audio plugin SDK that allows </span><a data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.unity3d.com/Manual/AudioSpatializerSDK.html"><span data-dcnode-id="2669" instrument_node="">changing the way audio is transmitted</span></a><span data-dcnode-id="2667" instrument_node=""> from an audio source into the surrounding space. The built-in panning of audio sources is a simple form of spatial audio – it takes the source and regulates the gains of the left and right ear contributions based on the distance and angle between the AudioListener and the AudioSource. This provides simple directional cues for the player on the horizontal plane.</span></p><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2662"><strong data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">This SDK offers a simple, undemanding and efficient means through which to implement the potential offered by audio spatializer features.</span></p><span data-dcnode-id="2658" instrument_node="">
</span></div><span data-dcnode-id="2656" instrument_node="">
</span></div><span data-dcnode-id="2654" instrument_node="">
</span></div><span data-dcnode-id="2652" instrument_node="">
</span></div><span data-dcnode-id="2650" instrument_node="">
</span><div data-dcnode-id="2606"><span data-dcnode-id="2649" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2608" id="augmented-reality-ar"><span data-dcnode-id="2648" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2643"><span data-dcnode-id="2647" instrument_node="">
</span><div data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">Augmented Reality (AR)</span></div><span data-dcnode-id="2644" instrument_node="">
</span></h2><span data-dcnode-id="2642" instrument_node="">
</span><div class="large" data-dcnode-id="2610"><span data-dcnode-id="2641" instrument_node="">
</span><div data-dcnode-id="2612"><p data-dcnode-id="2638"><strong data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Augmented reality is the overlaying of digitally-created content on top of the real world. Augmented reality – or 'AR' – allows the user to interact with both the real world and digital elements or augmentations. AR can be offered to users via headsets like Microsoft’s HoloLens, or through the video camera of a smartphone.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">In both practical and experimental implementations, augmented reality can also replace or diminish the user’s perception of reality. This altered perception could include simulation of an ocular condition for medical training purposes, or gradual obstruction of reality to introduce a game world. It is worth noting that there is a point when augmented reality and virtual reality likely merge, or overlap. See also, Mixed Reality in this glossary.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2628"><strong data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2626" instrument_node="">While much of the consumer interest, investment activity and industry hype first focussed on virtual reality, augmented reality is increasingly becoming more prominent thanks to its lack of dedicated hardware. The accessibility provided by AR by not completely restricting the user’s vision along with the vast potential of untethered usage have increased its popularity. As demonstrated by the phenomenal success of Pokémon GO – as well as AR’s rapid uptake as a tool in industrial and creative workplaces – AR has </span><a data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/community/augmented-world-expo-how-unity-developers-will-be-part-of-the-future"><span data-dcnode-id="2625" instrument_node="">an opportunity to enjoy substantial </span></a><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/community/augmented-world-expo-how-unity-developers-will-be-part-of-the-future"><span data-dcnode-id="2623" instrument_node="">success</span></a><span data-dcnode-id="2621" instrument_node=""> reaching large audiences. For more insights into the opportunity AR presents, check out </span><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/looking-to-the-future-of-mixed-reality-part-i"><span data-dcnode-id="2620" instrument_node="">part one</span></a><span data-dcnode-id="2618" instrument_node=""> and </span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.unity.com/technology/looking-to-the-future-of-mixed-reality-part-ii"><span data-dcnode-id="2617" instrument_node="">part two</span></a><span data-dcnode-id="2615" instrument_node=""> of Unity’s blog exploring the future of augmented reality.</span></p><span data-dcnode-id="2613" instrument_node="">
</span></div><span data-dcnode-id="2611" instrument_node="">
</span></div><span data-dcnode-id="2609" instrument_node="">
</span></div><span data-dcnode-id="2607" instrument_node="">
</span></div><span data-dcnode-id="2605" instrument_node="">
</span><div data-dcnode-id="2572"><span data-dcnode-id="2604" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2574" id="augmented-virtuality"><span data-dcnode-id="2603" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2598"><span data-dcnode-id="2602" instrument_node="">
</span><div data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Augmented Virtuality</span></div><span data-dcnode-id="2599" instrument_node="">
</span></h2><span data-dcnode-id="2597" instrument_node="">
</span><div class="large" data-dcnode-id="2576"><span data-dcnode-id="2596" instrument_node="">
</span><div data-dcnode-id="2578"><p data-dcnode-id="2593"><strong data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Simple definition:</span></strong></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">On the mixed reality continuum, augmented virtuality lies somewhere between AR and VR. The precise definition refers to bringing real-world objects into virtual worlds where they can be interacted with. It could be seen as a reversal of – or mirror to – what augmented reality is.</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Augmented virtuality is perhaps best understood as a specific example or implementation of MR. Use of “augmented virtuality” is imprecise, so consider “augmented virtuality” to be flexible terminology.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2583"><strong data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Augmented virtuality presents a means through which to make VR spaces more intuitive from a UI perspective, as well as more familiar and “friendly” to new users.</span></p><span data-dcnode-id="2579" instrument_node="">
</span></div><span data-dcnode-id="2577" instrument_node="">
</span></div><span data-dcnode-id="2575" instrument_node="">
</span></div><span data-dcnode-id="2573" instrument_node="">
</span></div><span data-dcnode-id="2571" instrument_node="">
</span><div data-dcnode-id="2538"><span data-dcnode-id="2570" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2540" id="cinematic-vr"><span data-dcnode-id="2569" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node="">
</span><div data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Cinematic VR</span></div><span data-dcnode-id="2565" instrument_node="">
</span></h2><span data-dcnode-id="2563" instrument_node="">
</span><div class="large" data-dcnode-id="2542"><span data-dcnode-id="2562" instrument_node="">
</span><div data-dcnode-id="2544"><p data-dcnode-id="2559"><strong data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2557" instrument_node="">VR provides tremendous potential to filmmakers and audiences, offering a new way to deliver stories, harnessing all the immersive potential of VR, and pulling on the power of presence. There are many distinct examples of Cinematic VR, from linear narratives in which the viewer can participate to branching stories and “films” with gameplay-like elements. While there are different interpretations of the term, </span><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unity.com/solutions/cinematicvr"><span data-dcnode-id="2556" instrument_node="">Cinematic VR essentially covers the many approaches</span></a><span data-dcnode-id="2554" instrument_node=""> where virtual reality content appropriates or employs filmmaking methods to deliver narrative experiences.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2549"><strong data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">If you are a filmmaker, there is a revolution in creativity underway. If you are a viewer, film is about to get a great deal more varied and exciting. And if you make content for VR, such as games, Cinematic VR may open the doors for you to spread your wings and create for new industries.</span></p><span data-dcnode-id="2545" instrument_node="">
</span></div><span data-dcnode-id="2543" instrument_node="">
</span></div><span data-dcnode-id="2541" instrument_node="">
</span></div><span data-dcnode-id="2539" instrument_node="">
</span></div><span data-dcnode-id="2537" instrument_node="">
</span><div data-dcnode-id="2507"><span data-dcnode-id="2536" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2509" id="cpu-computer-processing-unit"><span data-dcnode-id="2535" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2530"><span data-dcnode-id="2534" instrument_node="">
</span><div data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">CPU (Computer Processing Unit)</span></div><span data-dcnode-id="2531" instrument_node="">
</span></h2><span data-dcnode-id="2529" instrument_node="">
</span><div class="large" data-dcnode-id="2511"><span data-dcnode-id="2528" instrument_node="">
</span><div data-dcnode-id="2513"><p data-dcnode-id="2525"><strong data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">The computer processing unit can be seen to be the central component of a modern computer. The CPU’s job is to carry out the instructions provided by a computer program. Today you will typically find that CPUs are microprocessors, so they are made up of a single integrated circuit.</span></p><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2518"><strong data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Using a game engine’s profiler, developers can see how much rendering demand is being put on the CPU. Understanding this data, you can optimize areas of VR content to ensure a better, more comfortable experience for users.</span></p><span data-dcnode-id="2514" instrument_node="">
</span></div><span data-dcnode-id="2512" instrument_node="">
</span></div><span data-dcnode-id="2510" instrument_node="">
</span></div><span data-dcnode-id="2508" instrument_node="">
</span></div><span data-dcnode-id="2506" instrument_node="">
</span><div data-dcnode-id="2464"><span data-dcnode-id="2505" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2466" id="cyber-sickness-aka-virtual-reality-sickness-or-simulation-sickness"><span data-dcnode-id="2504" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2499"><span data-dcnode-id="2503" instrument_node="">
</span><div data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Cyber Sickness (AKA Virtual Reality Sickness or Simulation Sickness)</span></div><span data-dcnode-id="2500" instrument_node="">
</span></h2><span data-dcnode-id="2498" instrument_node="">
</span><div class="large" data-dcnode-id="2468"><span data-dcnode-id="2497" instrument_node="">
</span><div data-dcnode-id="2470"><p data-dcnode-id="2494"><strong data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Motion sickness – often felt on a long car journey or plane flight – happens when people are moving through physical space while their brain understands that they are stationary, as their body is not contributing to momentum. Cyber sickness, by contrast, happens when the subject is stationary but has a compelling sense of motion induced through exposure to changing visual imagery. (Arns and Cerney, 2005)</span></p><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">The feeling of cyber sickness is, however, comparable to the experience of motion sickness.</span></p><span data-dcnode-id="2487" instrument_node="">
</span><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">There is not one single factor that causes motion sickness. For example, elements like lag, refresh rate, and update rate of the visual display can each cause sickness. Other factors which may influence sickness are contrast, resolution, color, field of view, viewing region, binocular viewing, scene content, flicker and camera movement.</span></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Early on in the current generation of VR, simulation sickness was deemed to be more common, and it continues to offer a negative association with VR for many users. It is now generally accepted that most onus for preventing cyber sickness falls on the content over the hardware. Many believe users can build up a tolerance to cyber sickness through usage. Much remains to be learned about the experience; particularly its effect on younger users.</span></p><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2478"><strong data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2476" instrument_node="">This provides a significant challenge, both to individual projects and the overall reputation and potential of VR. VR content that prompts cyber sickness can severely limit adoption, and damage the reputation of VR. Do your research. And lots of testing. Fortunately, </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//developer.oculus.com/blog/vr-sickness-the-rift-and-how-game-developers-can-help/"><span data-dcnode-id="2475" instrument_node="">best practices around cyber sickness</span></a><span data-dcnode-id="2473" instrument_node=""> are now shared by the industry.</span></p><span data-dcnode-id="2471" instrument_node="">
</span></div><span data-dcnode-id="2469" instrument_node="">
</span></div><span data-dcnode-id="2467" instrument_node="">
</span></div><span data-dcnode-id="2465" instrument_node="">
</span></div><span data-dcnode-id="2463" instrument_node="">
</span><div data-dcnode-id="2433"><span data-dcnode-id="2462" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2435" id="direct3d-transformation-pipeline"><span data-dcnode-id="2461" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2456"><span data-dcnode-id="2460" instrument_node="">
</span><div data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Direct3D Transformation Pipeline</span></div><span data-dcnode-id="2457" instrument_node="">
</span></h2><span data-dcnode-id="2455" instrument_node="">
</span><div class="large" data-dcnode-id="2437"><span data-dcnode-id="2454" instrument_node="">
</span><div data-dcnode-id="2439"><p data-dcnode-id="2451"><strong data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">The Direct3D Transformation Pipeline is a graphics transformation pipeline specific to the Direct3D graphics API for Microsoft Windows. This implementation of a graphics transformation pipeline uses three Direct 3D matrices: world transform; view transform; projection transform. Direct3D matrices work like those seen in high-level graphics transformation pipelines.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2444"><strong data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">A graphics transformation pipeline is available tailored for those that work with Direct3D.</span></p><span data-dcnode-id="2440" instrument_node="">
</span></div><span data-dcnode-id="2438" instrument_node="">
</span></div><span data-dcnode-id="2436" instrument_node="">
</span></div><span data-dcnode-id="2434" instrument_node="">
</span></div><span data-dcnode-id="2432" instrument_node="">
</span><div data-dcnode-id="2399"><span data-dcnode-id="2431" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2401" id="eye-tracking"><span data-dcnode-id="2430" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2425"><span data-dcnode-id="2429" instrument_node="">
</span><div data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Eye Tracking</span></div><span data-dcnode-id="2426" instrument_node="">
</span></h2><span data-dcnode-id="2424" instrument_node="">
</span><div class="large" data-dcnode-id="2403"><span data-dcnode-id="2423" instrument_node="">
</span><div data-dcnode-id="2405"><p data-dcnode-id="2420"><strong data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Cameras inside the head-mounted display can track which direction the user is looking. Eye tracking can be used as a new input axis; for example, for targeting enemy aircraft in a dogfighting game. For example, the FOVE is an HMD launched on Kickstarter promising eye tracking capabilities and a foveated rendering SDK.</span></p><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">While eye tracking is not a prerequisite for foveated rendering, it can deliver significant improvement through being able to shift the high-detail region based on user eye direction. Furthermore, new users tend to have difficulty overcoming the natural inclination to look around with their eyes. The problem is HMD optics tend to work best when looking straight through them to the center of the screen, ideally the user moves their head to look around. Eye tracking is the first step toward allowing users to use their eyes to naturally track within VR.</span></p><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2410"><strong data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">A way to deliver more comfortable, intuitive VR content that is more immersive.</span></p><span data-dcnode-id="2406" instrument_node="">
</span></div><span data-dcnode-id="2404" instrument_node="">
</span></div><span data-dcnode-id="2402" instrument_node="">
</span></div><span data-dcnode-id="2400" instrument_node="">
</span></div><span data-dcnode-id="2398" instrument_node="">
</span><div data-dcnode-id="2368"><span data-dcnode-id="2397" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2370" id="face-tracking"><span data-dcnode-id="2396" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2391"><span data-dcnode-id="2395" instrument_node="">
</span><div data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Face Tracking</span></div><span data-dcnode-id="2392" instrument_node="">
</span></h2><span data-dcnode-id="2390" instrument_node="">
</span><div class="large" data-dcnode-id="2372"><span data-dcnode-id="2389" instrument_node="">
</span><div data-dcnode-id="2374"><p data-dcnode-id="2386"><strong data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Computer vision technology designed to obtain data from still images and video sequences by tracking certain facial features in real-time.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2379"><strong data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">More convincing and natural in-game characters and interactions, empowering storytelling, immersion and presence, while providing the potential for innovative new mechanisms of interaction.</span></p><span data-dcnode-id="2375" instrument_node="">
</span></div><span data-dcnode-id="2373" instrument_node="">
</span></div><span data-dcnode-id="2371" instrument_node="">
</span></div><span data-dcnode-id="2369" instrument_node="">
</span></div><span data-dcnode-id="2367" instrument_node="">
</span><div data-dcnode-id="2337"><span data-dcnode-id="2366" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2339" id="field-regard"><span data-dcnode-id="2365" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2360"><span data-dcnode-id="2364" instrument_node="">
</span><div data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Field-of-Regard</span></div><span data-dcnode-id="2361" instrument_node="">
</span></h2><span data-dcnode-id="2359" instrument_node="">
</span><div class="large" data-dcnode-id="2341"><span data-dcnode-id="2358" instrument_node="">
</span><div data-dcnode-id="2343"><p data-dcnode-id="2355"><strong data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Related to field-of-view, field-of-regard covers the space a user can see from a given position, including when moving eyes, head, and neck.</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2348"><strong data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Along with field-of-view, field-of-regard is the viewer perspective on which the cinematography or framing of a given VR, AR, or MR experience is established.</span></p><span data-dcnode-id="2344" instrument_node="">
</span></div><span data-dcnode-id="2342" instrument_node="">
</span></div><span data-dcnode-id="2340" instrument_node="">
</span></div><span data-dcnode-id="2338" instrument_node="">
</span></div><span data-dcnode-id="2336" instrument_node="">
</span><div data-dcnode-id="2294"><span data-dcnode-id="2335" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2296" id="field-view-fov"><span data-dcnode-id="2334" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2329"><span data-dcnode-id="2333" instrument_node="">
</span><div data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Field-of-View (FOV)</span></div><span data-dcnode-id="2330" instrument_node="">
</span></h2><span data-dcnode-id="2328" instrument_node="">
</span><div class="large" data-dcnode-id="2298"><span data-dcnode-id="2327" instrument_node="">
</span><div data-dcnode-id="2300"><p data-dcnode-id="2324"><strong data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">The field-of-view is all that you can see while looking straight ahead. FOV is the extent of your natural vision, both in reality and in MX content. The average human field-of-view is approximately 200 degrees.</span></p><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">When researching virtual reality headsets – also known as head-mounted displays or HMDs – you will see that there is a specification for field-of-view. Most current VR headsets have a minimum field of view of 90-to-110 degrees, which is a baseline for a great VR experience. The higher the field of view, the more of the environment the user will see as it will extend to the edge of their vision, and as a result, the more immersive an experience they will have. Similar to the difference between an IMAX movie theater screen and a regular movie theater screen. The IMAX screen is much larger and therefore takes up more of your field-of-view, which allows you to see more, thus creating a more immersive kind of experience.</span></p><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">A wide field-of-view is difficult to achieve because the limitations of lens optics – chromatic aberration and barrel distortion – become more severe, and the optics themselves have to be larger or more complex. Like a photograph taken with a fisheye lens, the images on the HMD screen are distorted to account for the optics of the HMD. Furthermore, widening the field-of-view “stretches” the available screen resolution, meaning that resolution must increase to keep the same pixel densities at higher FOV angles – the potential impact can be lessened by the use of multi-res VR shading and foveated rendering.</span></p><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">It’s also worth noting that some headsets – such as the HoloLens – also present a limited field-of-view. One could understand the field-of-view of a smartphone AR experience to be the available screen size, though this is not a strict technical definition.</span></p><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">In rare cases, field-of-view is referred to as field-of-vision. See also: Field-of-Regard.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2305"><strong data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">If you’re an HMD manufacturer, FOV issues present a lot to think about. For content creators, hardware FOV limitations effectively set the 'canvas' on which your VR or AR vision can be painted, so it’s an important factor – especially for multiformat releases.</span></p><span data-dcnode-id="2301" instrument_node="">
</span></div><span data-dcnode-id="2299" instrument_node="">
</span></div><span data-dcnode-id="2297" instrument_node="">
</span></div><span data-dcnode-id="2295" instrument_node="">
</span></div><span data-dcnode-id="2293" instrument_node="">
</span><div data-dcnode-id="2260"><span data-dcnode-id="2292" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2262" id="foveated-rendering"><span data-dcnode-id="2291" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node="">
</span><div data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Foveated Rendering</span></div><span data-dcnode-id="2287" instrument_node="">
</span></h2><span data-dcnode-id="2285" instrument_node="">
</span><div class="large" data-dcnode-id="2264"><span data-dcnode-id="2284" instrument_node="">
</span><div data-dcnode-id="2266"><p data-dcnode-id="2281"><strong data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">By working to complement human biology, advanced VR rendering engines will be able to spend more time on the center of the visual field, rendering less detail in the periphery areas of the field-of-view.</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">The computer can render the entire scene more quickly if it allows itself to render at a lower resolution, or with simplified objects. Because human eyes perceive more detail in the center of the visual field, there is a lot of detail in each frame that we don’t even see. By rendering at low quality at the edge of the frame, the computer can either spend more time rendering detail in the center or render a single frame quicker.</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2271"><strong data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Foveated rendering offers tremendous speed savings. Equally, it provides more memory to play with where the GPU is concerned, and more freedom to realize your ideas in VR without being limited by the demands of rendering entire scenes at the highest resolution.</span></p><span data-dcnode-id="2267" instrument_node="">
</span></div><span data-dcnode-id="2265" instrument_node="">
</span></div><span data-dcnode-id="2263" instrument_node="">
</span></div><span data-dcnode-id="2261" instrument_node="">
</span></div><span data-dcnode-id="2259" instrument_node="">
</span><div data-dcnode-id="2229"><span data-dcnode-id="2258" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2231" id="frames-second-fps"><span data-dcnode-id="2257" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2252"><span data-dcnode-id="2256" instrument_node="">
</span><div data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Frames-Per-Second (FPS)</span></div><span data-dcnode-id="2253" instrument_node="">
</span></h2><span data-dcnode-id="2251" instrument_node="">
</span><div class="large" data-dcnode-id="2233"><span data-dcnode-id="2250" instrument_node="">
</span><div data-dcnode-id="2235"><p data-dcnode-id="2247"><strong data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">"Frames-Per-Second"&nbsp;– or FPS for short – refers to the number of times an image on the screen is refreshed each second.</span></p><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2240"><strong data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">The higher the frames-per-second, the smoother the motion appears and the more comfortable a VR experience will be. This is extremely important for virtual reality because slow or choppy motion will often prompt simulation sickness. For users to feel comfortable while experiencing VR, they should ensure that they purchase a VR headset that can achieve at least 90 FPS for desktop or console VR, and at least 60 FPS for mobile. Most VR headsets on the market today achieve 60-to-120 frames per second. This is also known as the screen refresh rate and is sometimes identified in Hertz – for example, 90 Hz.</span></p><span data-dcnode-id="2236" instrument_node="">
</span></div><span data-dcnode-id="2234" instrument_node="">
</span></div><span data-dcnode-id="2232" instrument_node="">
</span></div><span data-dcnode-id="2230" instrument_node="">
</span></div><span data-dcnode-id="2228" instrument_node="">
</span><div data-dcnode-id="2198"><span data-dcnode-id="2227" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2200" id="frustum-culling"><span data-dcnode-id="2226" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2221"><span data-dcnode-id="2225" instrument_node="">
</span><div data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Frustum Culling</span></div><span data-dcnode-id="2222" instrument_node="">
</span></h2><span data-dcnode-id="2220" instrument_node="">
</span><div class="large" data-dcnode-id="2202"><span data-dcnode-id="2219" instrument_node="">
</span><div data-dcnode-id="2204"><p data-dcnode-id="2216"><strong data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Near and far clip plane properties are those which determine where the viewpoint of a camera in a scene begins and ends. The planes are laid out perpendicular to the camera’s direction and are measured from its position. The near plane is the closest location that will be rendered, and the far plane is the furthest. The near and far clip planes – together with the planes defined by the field of view of the camera – describe what is popularly known as the camera frustum. Frustum culling involves not displaying objects which are entirely outside of that area. Within 3D engines like Unity, frustum culling happens irrespective of whether you use occlusion culling in your game.</span></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2209"><strong data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Frustum culling can significantly improve performance in virtual reality, helping deliver experiences that are more comfortable, impressive and immersive.</span></p><span data-dcnode-id="2205" instrument_node="">
</span></div><span data-dcnode-id="2203" instrument_node="">
</span></div><span data-dcnode-id="2201" instrument_node="">
</span></div><span data-dcnode-id="2199" instrument_node="">
</span></div><span data-dcnode-id="2197" instrument_node="">
</span><div data-dcnode-id="2167"><span data-dcnode-id="2196" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2169" id="gaze-tracking-aka-eye-tracking"><span data-dcnode-id="2195" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2190"><span data-dcnode-id="2194" instrument_node="">
</span><div data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Gaze Tracking (AKA Eye Tracking)</span></div><span data-dcnode-id="2191" instrument_node="">
</span></h2><span data-dcnode-id="2189" instrument_node="">
</span><div class="large" data-dcnode-id="2171"><span data-dcnode-id="2188" instrument_node="">
</span><div data-dcnode-id="2173"><p data-dcnode-id="2185"><strong data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Tracking the direction and movement of a user’s eyes, and sometimes using the tracked data as an input. See also: Head Tracking.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2178"><strong data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">A method to allow very subtle, nuanced user control and input, and a way to pull data on how users interact with a given experience. Gaze tracking also offers a powerful tool for accessibility, by providing a means for interaction to users with, for example, limited physical movement.</span></p><span data-dcnode-id="2174" instrument_node="">
</span></div><span data-dcnode-id="2172" instrument_node="">
</span></div><span data-dcnode-id="2170" instrument_node="">
</span></div><span data-dcnode-id="2168" instrument_node="">
</span></div><span data-dcnode-id="2166" instrument_node="">
</span><div data-dcnode-id="2136"><span data-dcnode-id="2165" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2138" id="graphics-transformation-pipeline"><span data-dcnode-id="2164" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2159"><span data-dcnode-id="2163" instrument_node="">
</span><div data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Graphics Transformation Pipeline</span></div><span data-dcnode-id="2160" instrument_node="">
</span></h2><span data-dcnode-id="2158" instrument_node="">
</span><div class="large" data-dcnode-id="2140"><span data-dcnode-id="2157" instrument_node="">
</span><div data-dcnode-id="2142"><p data-dcnode-id="2154"><strong data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">The graphics transformation pipeline is an established method to take objects created in graphics software, game engines and the like, and deliver them to their intended space in a scene, and ultimately the user’s view. Graphics transformation pipelines effectively work in the same way with VR and AR as they do with more traditional 3D display methods.</span></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2147"><strong data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">A reliable, established way to ensure that your objects appear in a VR or AR scene as intended. Graphics transformation pipelines and the associated matrices are often provided by a 3D game engine like Unity, meaning you will not have to worry too much about your 3D objects journey to their VR or AR home on a user’s screen.</span></p><span data-dcnode-id="2143" instrument_node="">
</span></div><span data-dcnode-id="2141" instrument_node="">
</span></div><span data-dcnode-id="2139" instrument_node="">
</span></div><span data-dcnode-id="2137" instrument_node="">
</span></div><span data-dcnode-id="2135" instrument_node="">
</span><div data-dcnode-id="2105"><span data-dcnode-id="2134" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2107" id="gpu-graphics-processing-unit"><span data-dcnode-id="2133" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2128"><span data-dcnode-id="2132" instrument_node="">
</span><div data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">GPU (Graphics Processing Unit)</span></div><span data-dcnode-id="2129" instrument_node="">
</span></h2><span data-dcnode-id="2127" instrument_node="">
</span><div class="large" data-dcnode-id="2109"><span data-dcnode-id="2126" instrument_node="">
</span><div data-dcnode-id="2111"><p data-dcnode-id="2123"><strong data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">A graphics processing unit consists of a component – meaning an electronic circuit – specifically employed to accelerate producing images within a frame buffer. In this case, such images are created for display on a screen or similar. They are found in personal computers, workstations, game consoles, mobile devices and many other places. Virtual reality puts considerable demand on a GPU, largely thanks to the display method’s need to create distinct images for the user’s left and right eyes respectively.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2116"><strong data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Consumers need to invest a fair amount to get enough GPU power to support high-end VR solutions such as Oculus Rift and HTC Vive. While cost can significantly limit the potential audience for VR, numerous methods have emerged to optimize GPU performance in virtual reality, many of which are defined in this glossary.</span></p><span data-dcnode-id="2112" instrument_node="">
</span></div><span data-dcnode-id="2110" instrument_node="">
</span></div><span data-dcnode-id="2108" instrument_node="">
</span></div><span data-dcnode-id="2106" instrument_node="">
</span></div><span data-dcnode-id="2104" instrument_node="">
</span><div data-dcnode-id="2071"><span data-dcnode-id="2103" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2073" id="haptics-aka-touch-feedback"><span data-dcnode-id="2102" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2097"><span data-dcnode-id="2101" instrument_node="">
</span><div data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Haptics (AKA Touch Feedback)</span></div><span data-dcnode-id="2098" instrument_node="">
</span></h2><span data-dcnode-id="2096" instrument_node="">
</span><div class="large" data-dcnode-id="2075"><span data-dcnode-id="2095" instrument_node="">
</span><div data-dcnode-id="2077"><p data-dcnode-id="2092"><strong data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2090" instrument_node="">Haptics simulate and stimulate the sense of touch by applying various forces – most commonly vibrations – to the user, via the likes of input devices or specific haptic wearables. Haptics are used to lend a tangibility to an object or movement on screen. Vibrating game controllers offer the classic example, but also includes vibration delivered through a smartphone screen, and modern approaches like </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ultraleap.com/"><span data-dcnode-id="2089" instrument_node="">ultrasound speaker arrays that project textures into the air</span></a><span data-dcnode-id="2087" instrument_node=""> that the VR user can feel as they interact with the content.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2082"><strong data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Another way to improve VR immersion, and particularly presence in VR.</span></p><span data-dcnode-id="2078" instrument_node="">
</span></div><span data-dcnode-id="2076" instrument_node="">
</span></div><span data-dcnode-id="2074" instrument_node="">
</span></div><span data-dcnode-id="2072" instrument_node="">
</span></div><span data-dcnode-id="2070" instrument_node="">
</span><div data-dcnode-id="2037"><span data-dcnode-id="2069" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2039" id="headset-aka-head-mounted-display-or-hmd"><span data-dcnode-id="2068" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2063"><span data-dcnode-id="2067" instrument_node="">
</span><div data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Headset (AKA Head-Mounted Display or HMD)</span></div><span data-dcnode-id="2064" instrument_node="">
</span></h2><span data-dcnode-id="2062" instrument_node="">
</span><div class="large" data-dcnode-id="2041"><span data-dcnode-id="2061" instrument_node="">
</span><div data-dcnode-id="2043"><p data-dcnode-id="2058"><strong data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2056" instrument_node="">A virtual or augmented reality headset typically takes the form of a goggle-like device that the user wears on their head, covering or enclosing the eyes. VR headsets generally contain a screen and lenses that allow the user to see into the virtual world, or a translucent screen on which augmented reality content can be displayed. Many distinct headsets serve multiple different hardware platforms, and anything from a phone to a console can output VR content. That means it is best to </span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unity.com/features/multiplatform"><span data-dcnode-id="2055" instrument_node="">work with creative tools and technology</span></a><span data-dcnode-id="2053" instrument_node=""> that support as many different VR platforms as possible.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2048"><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">The VR headset is the foundation of modern virtual reality and established the template now followed by AR and other HMDs. Technology has come a long way over the last 50-60 years, and the lumbering, uncomfortable and wildly expensive VR headsets of the early 70s have evolved into something around the same size of ski or snowboard goggles. Some VR headsets even use your phone as the screen, like Samsung Gear VR or Google cardboard. When researching VR headsets, look at whether the screens are built-in or if it requires you to use your mobile phone. If you are looking for the best immersive experience, high-end VR Headsets like the Oculus Rift or HTC Vive are worth considering. But remember, high-end VR Headsets will require a high-end computer to run them. If you are looking for a great quality mobile VR experience, Samsung Gear VR and Google Daydream offer more nuanced experiences than the cardboard VR viewers; the latter being extremely affordable, and a great way to demonstrate the fundamental simplicity of VR.</span></p><span data-dcnode-id="2044" instrument_node="">
</span></div><span data-dcnode-id="2042" instrument_node="">
</span></div><span data-dcnode-id="2040" instrument_node="">
</span></div><span data-dcnode-id="2038" instrument_node="">
</span></div><span data-dcnode-id="2036" instrument_node="">
</span><div data-dcnode-id="2003"><span data-dcnode-id="2035" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="2005" id="head-tracking"><span data-dcnode-id="2034" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="2029"><span data-dcnode-id="2033" instrument_node="">
</span><div data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Head Tracking</span></div><span data-dcnode-id="2030" instrument_node="">
</span></h2><span data-dcnode-id="2028" instrument_node="">
</span><div class="large" data-dcnode-id="2007"><span data-dcnode-id="2027" instrument_node="">
</span><div data-dcnode-id="2009"><p data-dcnode-id="2024"><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Using various approaches, head tracking monitors and tracks the position and movements of a given user’s head and neck, offering a potential means for input and interaction.</span></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">For example, if the user’s neck and head are slightly inclined to one side, with head tracking enabled what they see in the HMD could shift to the same angle. A user can equally stretch their neck to look around or up and over something. That same user could make a movement such as "looking at the floor"&nbsp;to activate a specific gameplay action.</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2014"><strong data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Head tracking is close to the heart of what VR offers – a chance to build worlds the user can explore in the same way they interact with the real world.</span></p><span data-dcnode-id="2010" instrument_node="">
</span></div><span data-dcnode-id="2008" instrument_node="">
</span></div><span data-dcnode-id="2006" instrument_node="">
</span></div><span data-dcnode-id="2004" instrument_node="">
</span></div><span data-dcnode-id="2002" instrument_node="">
</span><div data-dcnode-id="1972"><span data-dcnode-id="2001" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1974" id="immersion"><span data-dcnode-id="2000" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1995"><span data-dcnode-id="1999" instrument_node="">
</span><div data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Immersion</span></div><span data-dcnode-id="1996" instrument_node="">
</span></h2><span data-dcnode-id="1994" instrument_node="">
</span><div class="large" data-dcnode-id="1976"><span data-dcnode-id="1993" instrument_node="">
</span><div data-dcnode-id="1978"><p data-dcnode-id="1990"><strong data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Immersion refers to drawing a user completely into a virtual world. While presence in VR specifically refers to the sensation or subconscious belief that you exist within a given experience, immersion tends to be a more general term for becoming entirely encompassed, and forgetting about reality. In VR, immersion takes on a practical sense, as users’ eyes, ears, and sometimes even hands and bodies are engaged, thus blocking out any cues or sensory inputs from reality.</span></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1983"><strong data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Immersion is the primary power of VR – and of some AR creations – whether you are considering immersing your users in a convincing experience, or immersing yourself in one. Immersion is the appeal of VR and provides an opportunity to engage audiences.</span></p><span data-dcnode-id="1979" instrument_node="">
</span></div><span data-dcnode-id="1977" instrument_node="">
</span></div><span data-dcnode-id="1975" instrument_node="">
</span></div><span data-dcnode-id="1973" instrument_node="">
</span></div><span data-dcnode-id="1971" instrument_node="">
</span><div data-dcnode-id="1941"><span data-dcnode-id="1970" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1943" id="immersive-experiences"><span data-dcnode-id="1969" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1964"><span data-dcnode-id="1968" instrument_node="">
</span><div data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Immersive Experiences</span></div><span data-dcnode-id="1965" instrument_node="">
</span></h2><span data-dcnode-id="1963" instrument_node="">
</span><div class="large" data-dcnode-id="1945"><span data-dcnode-id="1962" instrument_node="">
</span><div data-dcnode-id="1947"><p data-dcnode-id="1959"><strong data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">The notion of immersive experiences long predates the current generation of VR and AR, though it includes experiences which use those forms – and potentially all MR and XR content. The term has even been used to cover specific approaches to website design and the likes of amusement park ride design. Where VR is concerned, however, the term refers to fully interactive, minimally interactive and non-gaming experiences. These can be offered both as true VR and 360 video. The term is a very broad one – much like XR – but in this context does not include traditional digital and cinematic experiences consumed via a traditional flat screen.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1952"><strong data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">A chance to engage users, explore new creative forms, educate, entertain, train, serve, promote, and much more.</span></p><span data-dcnode-id="1948" instrument_node="">
</span></div><span data-dcnode-id="1946" instrument_node="">
</span></div><span data-dcnode-id="1944" instrument_node="">
</span></div><span data-dcnode-id="1942" instrument_node="">
</span></div><span data-dcnode-id="1940" instrument_node="">
</span><div data-dcnode-id="1910"><span data-dcnode-id="1939" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1912" id="immersive-entertainmenthyper-reality"><span data-dcnode-id="1938" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1933"><span data-dcnode-id="1937" instrument_node="">
</span><div data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Immersive Entertainment/Hyper-Reality</span></div><span data-dcnode-id="1934" instrument_node="">
</span></h2><span data-dcnode-id="1932" instrument_node="">
</span><div class="large" data-dcnode-id="1914"><span data-dcnode-id="1931" instrument_node="">
</span><div data-dcnode-id="1916"><p data-dcnode-id="1928"><strong data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Definition:</span></strong></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Entertainment, promotional and experiential content that combines real-world physicality with VR or AR, as well as other forms such as narrative writing and filmmaking.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1921"><strong data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">The opportunity:</span></strong></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">An opportunity to craft content for amusement parks, arcades, malls and many other physical venues, which can provide a broad access point through which the public can first experience VR.</span></p><span data-dcnode-id="1917" instrument_node="">
</span></div><span data-dcnode-id="1915" instrument_node="">
</span></div><span data-dcnode-id="1913" instrument_node="">
</span></div><span data-dcnode-id="1911" instrument_node="">
</span></div><span data-dcnode-id="1909" instrument_node="">
</span><div data-dcnode-id="1876"><span data-dcnode-id="1908" instrument_node="">
</span><div class="component-tab component component-tabs--section component-view-mode-default" data-dcnode-id="1878" id="inertial-measurement-unit-imu-aka-odometry"><span data-dcnode-id="1907" instrument_node="">
</span><h2 class="md-m-bottom" data-dcnode-id="1902"><span data-dcnode-id="1906" instrument_node="">
</span><div data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Inertial Measurement Unit (IMU, AKA Odometry)</span></div><span data-dcnode-id="1903" instrument_node="">
</span></h2><span data-dcnode-id="1901" instrument_node="">
</span><div class="large" data-dcnode-id="1880"><span data-dcnode-id="1900" instrument_node="">
