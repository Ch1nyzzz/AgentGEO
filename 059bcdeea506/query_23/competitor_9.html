de="">Immersive Technology and How It Could Transform the Way We Do Business</span></h1></div><div class="fusion-title title fusion-title-2 fusion-no-medium-visibility fusion-no-large-visibility fusion-sep-none fusion-title-center fusion-title-text fusion-title-size-one" data-dcnode-id="1878" style="font-size:40px;margin-top:10px;margin-right:10%;margin-bottom:10%;margin-left:10%;"><h1 class="title-heading-center" data-dcnode-id="1879" style="margin:0;font-size:1em;color:#ffffff;"><span data-dcnode-id="1880" instrument_node="">Immersive Technology and How It Could Transform the Way We Do Business</span></h1></div></div></div></div></div><span data-dcnode-id="1869" instrument_node="">

</span><section data-dcnode-id="438" id="content" style="width: 100%;"><span data-dcnode-id="1864" instrument_node="">
</span><div class="post-862 post type-post status-publish format-standard has-post-thumbnail hentry category-ar category-augmented-reality category-augmentedreality category-blog category-immersive-technology category-learning-technologies category-training category-virtual-reality category-vr-training" data-dcnode-id="440" id="post-862"><span data-dcnode-id="1863" instrument_node="">
</span><div class="post-content" data-dcnode-id="442"><span data-dcnode-id="1862" instrument_node="">
</span><div class="fusion-fullwidth fullwidth-box fusion-builder-row-4 fusion-flex-container nonhundred-percent-fullwidth non-hundred-percent-height-scrolling fusion-no-small-visibility" data-dcnode-id="1562" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;border-width: 0px 0px 0px 0px;border-color:#e2e2e2;border-style:solid;"><div class="fusion-builder-row fusion-row fusion-flex-align-items-flex-start fusion-flex-justify-content-center" data-dcnode-id="1565" style="max-width:calc( 1200px + 50px );margin-left: calc(-50px / 2 );margin-right: calc(-50px / 2 );"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-8 fusion_builder_column_1_1 1_1 fusion-flex-column" data-dcnode-id="1566"><div class="fusion-column-wrapper fusion-flex-justify-content-flex-start fusion-content-layout-column" data-dcnode-id="1569" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-content-tb fusion-content-tb-1" data-dcnode-id="1570"><span data-dcnode-id="1861" instrument_node="">
</span><h2 data-dcnode-id="1858"><strong data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">What is Immersive Technology?</span></strong></h2><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">“Businesses, the economy and society are at a crucial stage in the adoption of virtual reality and augmented reality. Everything is in place for these technologies to now deliver on their promise by improving the way organisations operate, making processes faster and more effective, and creating incredible new experiences.”&nbsp; Jeremy Dalton Head of VR/AR,</span><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pwc.co.uk/"><span data-dcnode-id="1855" instrument_node=""> PwC UK</span></a><span data-dcnode-id="1853" instrument_node="">.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1847"><strong data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Immersive technology</span></strong><span data-dcnode-id="1848" instrument_node=""> refers to technology that replaces or expands the physical world by the creation of 360 space, allowing users to look in any direction and see content. It can take a variety of forms, from virtual reality which shuts out real life spaces to augmented reality, which superimposes a layer of digital content over the physical world. It is a term that can be used in the context of both hardware and software to create and access immersive experiences.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1845" instrument_node="">Over the past few years, there’s been plenty of noise around the potential of immersive tech to transform the world of work.In its</span><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pwc.com/seeingisbelieving"><span data-dcnode-id="1844" instrument_node=""> Seeing is Believing report</span></a><span data-dcnode-id="1842" instrument_node=""> published late last year, PwC predicts that immersive technologies have the potential to deliver a $1.5 trillion boost to the global economy by 2030. But does immersive tech live up to the hype? As the technology has rapidly advanced in sophistication over the past few years, coupled with reductions in unit costs of hardware, immersive tech certainly has the potential to do just that, by offering tangible and impactful solutions to business challenges.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">But for businesses looking to adopt immersive technologies to innovate and grow, making informed decisions about how these technologies work and can be applied is crucial to maximise impact on operations, productivity and connecting with customers and investors.</span></p><span data-dcnode-id="1837" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1835"><img alt="" class="wp-image-1071 lazyloaded" data-dcnode-id="1836" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/10/shutterstock_1562030050-1024x683.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2020/10/shutterstock_1562030050-1024x683.jpg&amp;raw"></figure><span data-dcnode-id="1834" instrument_node="">
</span><h2 data-dcnode-id="1831"><strong data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Examples of Immersive Technology</span></strong></h2><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Getting to know the different types of immersive technology can help you to identify what innovative solution might work best for your business. These include:</span></p><span data-dcnode-id="1827" instrument_node="">
</span><ul data-dcnode-id="1821"><span data-dcnode-id="1826" instrument_node="">
</span><li data-dcnode-id="1823"><strong data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Virtual reality</span></strong></li><span data-dcnode-id="1822" instrument_node="">
</span></ul><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1819" instrument_node="">Virtual reality (VR) offers a total immersion in an alternative environment to your physical space, which is fully blocked out. A high-quality immersive VR experience incorporates a user moving within a virtual world with positional tracking coming into play in VR.&nbsp; </span><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/introduction-positional-tracking-degrees-freedom-6-dof/"><span data-dcnode-id="1818" instrument_node="">Positional tracking and 6 Degrees of Freedom (Dof)</span></a><span data-dcnode-id="1816" instrument_node=""> in VR lets the user reflect actions including jumping, leaning and ducking.&nbsp; It is an important technology that makes VR a more exciting and immersive experience. Content is usually computer generated, and can range from the replication of real life environments through to abstract and imagination-driven spaces. Users access content via a headset, such as </span><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oculus.com/quest/%3Flocale%3Den_GB"><span data-dcnode-id="1815" instrument_node="">Oculus Quest</span></a><span data-dcnode-id="1813" instrument_node=""> or </span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vive.com/uk/"><span data-dcnode-id="1812" instrument_node="">HTC Vive</span></a><span data-dcnode-id="1810" instrument_node="">, and hand controllers can also be incorporated into more interactive experiences, for example to move around the virtual environment, as well as interact with objects and other users.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1808" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1802"><img alt="" class="wp-image-864 lazyautosizes lazyloaded" data-dcnode-id="1807" data-orig-sizes="(max-width: 960px) 100vw, 960px" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1.png" data-sizes="auto" data-srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-300x169.png 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-320x181.png 320w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-510x287.png 510w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-700x394.png 700w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-768x432.png 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-795x447.png 795w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1.png 960w" height="540" sizes="960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1.png&amp;raw" srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-300x169.png 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-320x181.png 320w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-510x287.png 510w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-700x394.png 700w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-768x432.png 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-795x447.png 795w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1.png 960w" width="960"><span data-dcnode-id="1806" instrument_node="">
</span><figcaption data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Oculus Quest is Facebook’s first standalone headset that offers six degrees of freedom (DoF) tracking.</span></figcaption><span data-dcnode-id="1803" instrument_node="">
</span></figure><span data-dcnode-id="1801" instrument_node="">
</span><ul data-dcnode-id="1795"><span data-dcnode-id="1800" instrument_node="">
</span><li data-dcnode-id="1797"><strong data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">360 Degree video</span></strong></li><span data-dcnode-id="1796" instrument_node="">
</span></ul><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">360 degree video differs from VR as it tends to be live filmed, rather than computer generated. Although you are fully immersed in an environment, it is limited by the fact that the user is anchored to the filmmaker’s viewpoint. This means that although you can move your head around to view your virtual world, you can’t walk around independently or interact with your surroundings. Unlike computer generated VR, 360 VR experiences are usually a solitary and passive experience.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><ul data-dcnode-id="1785"><span data-dcnode-id="1790" instrument_node="">
</span><li data-dcnode-id="1787"><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Augmented reality</span></strong></li><span data-dcnode-id="1786" instrument_node="">
</span></ul><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">Augmented reality (AR) really hit the public consciousness when Pokemon Go exploded onto our mobile screens back in 2016. But the potential of augmented reality stretches way beyond cute, on-the-go gaming. This week Punchdrunk announced a </span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thestage.co.uk/news/punchdrunk-announces-partnership-with-pokemon-go-creator-niantic"><span data-dcnode-id="1782" instrument_node="">partnership with Pokemon Go’s creators, Niantic, to create AR immersive theatre experiences</span></a><span data-dcnode-id="1780" instrument_node="">.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Augmented reality works by enhancing the real world by superficially overlaying it with computer generated content. These content assets can take many shapes and forms, so it can be flat and 2D, which is great for instructional information such as wayfinding, or be more complex and ‘real’ in 3D.&nbsp;</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">One of the great things about AR is its accessibility, as it can be accessed on widely used hardware, such as a smartphone or tablet, as well as more sophisticated kit such as the Microsoft Hololens.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><ul data-dcnode-id="1766"><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1768"><strong data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Mixed reality</span></strong></li><span data-dcnode-id="1767" instrument_node="">
</span></ul><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Mixed reality combines elements of virtual and augmented reality. Like augmented reality, it overlays digital content with the real world. This content is anchored to and interacts with objects in the real world. A major difference between mixed and augmented reality is that in mixed reality, digital assets can be visibly obscured by real world objects.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><h2 data-dcnode-id="1759"><strong data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Why Use Immersive Technology?</span></strong></h2><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1757" instrument_node="">For businesses, the </span><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/blog/benefits-immersive-technology/"><span data-dcnode-id="1756" instrument_node="">benefits of immersive technology</span></a><span data-dcnode-id="1754" instrument_node=""> are broad ranging – and compelling. From boosting performance and streamlining workflows, to making workplaces safer, improving the effectiveness of training, as well as transforming marketing and communications; immersive technologies have the power to transform the world of work.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><ul data-dcnode-id="1746"><span data-dcnode-id="1751" instrument_node="">
</span><li data-dcnode-id="1748"><strong data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Transforming workplaces and the way teams work together</span></strong></li><span data-dcnode-id="1747" instrument_node="">
</span></ul><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node="">VR platforms such as Future Visual’s </span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/visionxr"><span data-dcnode-id="1743" instrument_node="">VISIONxR™</span></a><span data-dcnode-id="1741" instrument_node=""> can provide a shared virtual space for collaborative work. This has the potential to revolutionise working processes, allowing teams to work remotely, as well as work on interdependent tasks simultaneously. For example, VR is transforming R&amp;D workflows. By developing virtual, rather than physical prototypes, processes are accelerated, allowing R&amp;D teams to fail fast and learn quickly.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1731"><img alt="" class="wp-image-801 lazyloaded" data-dcnode-id="1738" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/06/Screen-Shot-2020-05-07-at-9.30.23-AM.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2020/06/Screen-Shot-2020-05-07-at-9.30.23-AM.png&amp;raw"><span data-dcnode-id="1737" instrument_node="">
</span><figcaption data-dcnode-id="1733"><span data-dcnode-id="1736" instrument_node="">Future Visual’s remote collaboration platform </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/visionxr"><span data-dcnode-id="1735" instrument_node="">VISIONxR™</span></a></figcaption><span data-dcnode-id="1732" instrument_node="">
</span></figure><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Immersive technologies can also be integrated into the workplace to support process-driven roles, helping to make workplaces safer and lower downtime. Augmented reality is increasingly recognised for its potential to provide maintenance engineers easy access to technical information and manuals through simple visual interfaces that can be accessed on site by mobile phones.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><ul data-dcnode-id="1721"><span data-dcnode-id="1726" instrument_node="">
</span><li data-dcnode-id="1723"><strong data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Improving Training</span></strong></li><span data-dcnode-id="1722" instrument_node="">
</span></ul><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">There’s also tangible evidence that immersive technologies can help improve the effectiveness of training – from significantly improving retention of knowledge, through to learning new skills at a more rapid pace, great for the individual and great for businesses!</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Workplaces and work-based challenges can be realistically replicated in the virtual space. This means that employees can benefit from practical, hands-on training experiences in a risk-free environment. By doing this, they are able to learn from their mistakes and repeat experiences to improve muscle memory. What’s more, they are able to learn alongside teammates.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1713" instrument_node="">You can read more on </span><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/blog/vr-training/"><span data-dcnode-id="1712" instrument_node="">VR Training – Innovation for Today’s Business Reality</span></a><span data-dcnode-id="1710" instrument_node="">.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1702"><img alt="" class="wp-image-355 lazyautosizes lazyloaded" data-dcnode-id="1707" data-orig-sizes="(max-width: 1024px) 100vw, 1024px" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1024x455.png" data-sizes="auto" data-srcset="https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-300x133.png 300w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-768x341.png 768w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1024x455.png 1024w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1536x683.png 1536w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18.png 1906w" height="455" sizes="964px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1024x455.png&amp;raw" srcset="https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-300x133.png 300w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-768x341.png 768w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1024x455.png 1024w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1536x683.png 1536w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18.png 1906w" width="1024"><span data-dcnode-id="1706" instrument_node="">
</span><figcaption data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Future Visual worked with Peugeot to create an unforgettable launch experience with icockpit – fusing 360 live action into a CGI environment.</span></figcaption><span data-dcnode-id="1703" instrument_node="">
</span></figure><span data-dcnode-id="1701" instrument_node="">
</span><ul data-dcnode-id="1695"><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1697"><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Marketing and communications</span></strong></li><span data-dcnode-id="1696" instrument_node="">
</span></ul><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Immersive technologies aren’t just great for internal working practices and procedures, they also provide a powerful tool to communicate with clients and market products and services to potential customers.</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Virtual and augmented realities have the potential to capture attention and wow audiences and provoke active responses, making them an ideal marketing tool. The proliferation of smartphones means that augmented reality has the potential to be widely accessible – and blend seamlessly with additional social media content to connect with potential customers and accelerate purchase decisions. At the opposite end of the immersive scale, location-based VR can help to create meaningful experiential marketing experiences that reinforce positive brand messaging and strengthen engagement.</span></p><span data-dcnode-id="1688" instrument_node="">
</span><h2 data-dcnode-id="1685"><strong data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Use Cases for Immersive Technology</span></strong></h2><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1683" instrument_node="">Hearing how innovation is being successfully applied helps to inspire and embrace emerging technologies and new ways of working. </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/blog/immersive-technology-education/"><span data-dcnode-id="1682" instrument_node="">Immersive technology in education</span></a><span data-dcnode-id="1680" instrument_node=""> and retail highlight how the technology can be applied in various ways across diverse sectors to improve engagement and performance.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><ul data-dcnode-id="1670"><span data-dcnode-id="1677" instrument_node="">
</span><li data-dcnode-id="1672"><strong data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Immersive</span></strong><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node=""> tech in education</span></strong></li><span data-dcnode-id="1671" instrument_node="">
</span></ul><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1665"><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.njit.edu/"><span data-dcnode-id="1668" instrument_node="">The New Jersey Institute of Technology (NJIT)</span></a><span data-dcnode-id="1666" instrument_node=""> notes that “augmented reality has the potential to revolutionise learning in primary and secondary schools more than any other technology has done in the recent past”.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1662"><img alt="" class="wp-image-865 lazyautosizes lazyloaded" data-dcnode-id="1663" data-orig-sizes="(max-width: 1024px) 100vw, 1024px" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1024x540.jpg" data-sizes="auto" data-srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-300x158.jpg 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-768x405.jpg 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1024x540.jpg 1024w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1536x810.jpg 1536w" height="540" sizes="964px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1024x540.jpg&amp;raw" srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-300x158.jpg 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-768x405.jpg 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1024x540.jpg 1024w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1536x810.jpg 1536w" width="1024"></figure><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Immersive technologies have the potential to learn, amaze and inspire in equal measure. It has the power to spark curiosity, creativity and critical thinking, give students the chance to experience different places and times, as well as developing social and emotional skills. This makes it ideal for innovating education and enhancing the current curriculum – and beyond. Moreover, it has the potential to help provide the next generation with the skills needed for the future workplaces.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><ul data-dcnode-id="1652"><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1654"><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">ClassVR</span></strong></li><span data-dcnode-id="1653" instrument_node="">
</span></ul><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">The award winning ClassVR gives a tantalising glimpse into the potential of introducing immersive technologies into schools. It allows students to learn across a range of topics, from improving creative writing to understanding science and maths. Students are able to undertake study at their own speed, which is supplemented with guides and worksheets for collaborative learning. Moreover, it provides crucial support for teachers, from lesson planning with curriculum focused content, through to instructions for classroom management. Anecdotal feedback from teachers highlights that VR improves engagement and enjoyment for students.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><ul data-dcnode-id="1642"><span data-dcnode-id="1647" instrument_node="">
</span><li data-dcnode-id="1644"><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">The Giza Project</span></strong></li><span data-dcnode-id="1643" instrument_node="">
</span></ul><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1637"><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verizon.com/about/our-company/fourth-industrial-revolution/youve-never-seen-history-like-this"><span data-dcnode-id="1640" instrument_node="">The Giza Project</span></a><span data-dcnode-id="1638" instrument_node="">, an international collaboration at Harvard University highlights how higher education students can also benefit from embedding immersive content into courses. It gives students the chance to virtually visit the ancient Pyramids of Giza, and explore underground and through hard-to-access tunnels – areas only accessible with the aid of VR technology. Through virtual 3D mapping, it also allows them to learn more about the chronology and development of these ancient buildings, including the decisions around layout and how rituals played a role in their development.&nbsp;</span></p><span data-dcnode-id="1636" instrument_node="">
</span><ul data-dcnode-id="1630"><span data-dcnode-id="1635" instrument_node="">
</span><li data-dcnode-id="1632"><strong data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Immersive tech in retail</span></strong></li><span data-dcnode-id="1631" instrument_node="">
</span></ul><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">As online shopping has significantly changed shopping behaviours over the past few years. This, coupled with increasing costs of running physical stores means that finding new and effective ways to connect with customers, has never been more crucial for retailers to survive and thrive. Immersive tech holds numerous benefits for the retail sector – from gaining customer insights through to marketing and customer service training for employees. Additionally, one of the key drivers behind the adoption of immersive tech for many innovating retailers is the potential for customers to ‘try before you buy’. This ranges from visualising what clothes might look like without having to try them on physically, through to seeing what furniture looks like outside the retail environment.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1620"><img alt="" class="wp-image-869 lazyautosizes lazyloaded" data-dcnode-id="1625" data-orig-sizes="(max-width: 1024px) 100vw, 1024px" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1024x550.jpg" data-sizes="auto" data-srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-300x161.jpg 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-768x412.jpg 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1024x550.jpg 1024w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1536x824.jpg 1536w" height="550" sizes="964px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1024x550.jpg&amp;raw" srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-300x161.jpg 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-768x412.jpg 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1024x550.jpg 1024w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1536x824.jpg 1536w" width="1024"><span data-dcnode-id="1624" instrument_node="">
</span><figcaption data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Future Visual worked with client John Lewis to produce an in-store experiential VR experience to showcase the full range in an attention-grabbing way.</span></figcaption><span data-dcnode-id="1621" instrument_node="">
</span></figure><span data-dcnode-id="1619" instrument_node="">
</span><ul data-dcnode-id="1613"><span data-dcnode-id="1618" instrument_node="">
</span><li data-dcnode-id="1615"><strong data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">The John Lewis Design Project VR experience</span></strong></li><span data-dcnode-id="1614" instrument_node="">
</span></ul><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">One of the challenges for furniture retailers is displaying their whole range of products in store, where space is premium. When John Lewis launched it’s Design Project brand, it teamed up with Future Visual to produce an in-store experiential VR experience. It transported customers to an apartment entirely furnished with Design Project furniture and décor. Customers were able to move around the room and interact with the products, including being able to pick them up and move them, change colours and fabrics and get an up close 360 view.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">The Design Project VR experience engaged with customers in a novel and unique way, as well as giving John Lewis the chance to gain crucial customer insights into their views on not only the VR experience, but their product range too.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><ul data-dcnode-id="1600"><span data-dcnode-id="1605" instrument_node="">
</span><li data-dcnode-id="1602"><strong data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Digital Fashion – the future trend?</span></strong></li><span data-dcnode-id="1601" instrument_node="">
</span></ul><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Beyond ‘try before you buy’, retail fashion is also experimenting with immersive technologies, where the potential to create new revenue streams is increasingly being recognised. The Fashion Innovation Agency’s Matthew Drinkwater highlights that in the age of fast fashion, clothing is often bought to be worn once for the specific purpose of producing pictures to post across social media channels. This opens a new opportunity for fashion designers and retailers; the production and distribution of digital clothing through AR imagery.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1595" instrument_node="">For example, in 2018, Scandinavian retailer Carlings developed a</span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.voguebusiness.com/technology/digital-fashion-virtual-clothing-3d-design"><span data-dcnode-id="1594" instrument_node=""> digital clothing collection</span></a><span data-dcnode-id="1592" instrument_node="">, costing up to $30 per item. Customer photos were manipulated by digital tailors, so it looked like they were dressed in the digital clothes. To maintain an exclusive feel, the reproduction of garments was limited – and all sold out in less than a week.</span></p><span data-dcnode-id="1590" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1589"><span data-dcnode-id="1588" instrument_node="">
</span><h2 data-dcnode-id="1585"><strong data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">What Does the Future Hold for Immersive Technology?</span></strong></h2><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Current innovations in immersive technologies and their applications across industry sectors highlight the potential of VR, AR and MR to transform business activity and give us a glimpse into an immersive future.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Over the past few years, advances in immersive tech in terms of technical functionality, creativity and usability are mind blowing. But to truly revolutionise the world of business, the immersive tech sector needs to clearly focus on addressing real world challenges across businesses and the overall economy. And for businesses looking to innovate to thrive, it’s crucial to identify the ROI in introducing immersive tech through recognising its impact in supporting growth, streamlining operations, nurturing employees’ skills and connecting with customers.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1577" instrument_node="">To get in touch to discuss your next project contact us here: </span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/contact/"><span data-dcnode-id="1576" instrument_node="">https://www.futurevisual.com/contact/</span></a></p><span data-dcnode-id="1573" instrument_node="">
</span></div></div></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-builder-row-5 fusion-flex-container nonhundred-percent-fullwidth non-hundred-percent-height-scrolling fusion-no-medium-visibility fusion-no-large-visibility" data-dcnode-id="1262" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;border-width: 0px 0px 0px 0px;border-color:#e2e2e2;border-style:solid;"><div class="fusion-builder-row fusion-row fusion-flex-align-items-flex-start fusion-flex-justify-content-center" data-dcnode-id="1265" style="max-width:calc( 1200px + 50px );margin-left: calc(-50px / 2 );margin-right: calc(-50px / 2 );"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-9 fusion_builder_column_1_1 1_1 fusion-flex-column" data-dcnode-id="1266"><div class="fusion-column-wrapper fusion-flex-justify-content-flex-start fusion-content-layout-column" data-dcnode-id="1269" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-content-tb fusion-content-tb-2" data-dcnode-id="1270"><span data-dcnode-id="1561" instrument_node="">
</span><h2 data-dcnode-id="1558"><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">What is Immersive Technology?</span></strong></h2><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1556" instrument_node="">“Businesses, the economy and society are at a crucial stage in the adoption of virtual reality and augmented reality. Everything is in place for these technologies to now deliver on their promise by improving the way organisations operate, making processes faster and more effective, and creating incredible new experiences.”&nbsp; Jeremy Dalton Head of VR/AR,</span><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pwc.co.uk/"><span data-dcnode-id="1555" instrument_node=""> PwC UK</span></a><span data-dcnode-id="1553" instrument_node="">.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1547"><strong data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Immersive technology</span></strong><span data-dcnode-id="1548" instrument_node=""> refers to technology that replaces or expands the physical world by the creation of 360 space, allowing users to look in any direction and see content. It can take a variety of forms, from virtual reality which shuts out real life spaces to augmented reality, which superimposes a layer of digital content over the physical world. It is a term that can be used in the context of both hardware and software to create and access immersive experiences.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">Over the past few years, there’s been plenty of noise around the potential of immersive tech to transform the world of work.In its</span><a data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pwc.com/seeingisbelieving"><span data-dcnode-id="1544" instrument_node=""> Seeing is Believing report</span></a><span data-dcnode-id="1542" instrument_node=""> published late last year, PwC predicts that immersive technologies have the potential to deliver a $1.5 trillion boost to the global economy by 2030. But does immersive tech live up to the hype? As the technology has rapidly advanced in sophistication over the past few years, coupled with reductions in unit costs of hardware, immersive tech certainly has the potential to do just that, by offering tangible and impactful solutions to business challenges.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">But for businesses looking to adopt immersive technologies to innovate and grow, making informed decisions about how these technologies work and can be applied is crucial to maximise impact on operations, productivity and connecting with customers and investors.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1535"><img alt="" class="lazyload wp-image-1071" data-dcnode-id="1536" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/10/shutterstock_1562030050-1024x683.jpg" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="></figure><span data-dcnode-id="1534" instrument_node="">
</span><h2 data-dcnode-id="1531"><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Examples of Immersive Technology</span></strong></h2><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Getting to know the different types of immersive technology can help you to identify what innovative solution might work best for your business. These include:</span></p><span data-dcnode-id="1527" instrument_node="">
</span><ul data-dcnode-id="1521"><span data-dcnode-id="1526" instrument_node="">
</span><li data-dcnode-id="1523"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Virtual reality</span></strong></li><span data-dcnode-id="1522" instrument_node="">
</span></ul><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1519" instrument_node="">Virtual reality (VR) offers a total immersion in an alternative environment to your physical space, which is fully blocked out. A high-quality immersive VR experience incorporates a user moving within a virtual world with positional tracking coming into play in VR.&nbsp; </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/introduction-positional-tracking-degrees-freedom-6-dof/"><span data-dcnode-id="1518" instrument_node="">Positional tracking and 6 Degrees of Freedom (Dof)</span></a><span data-dcnode-id="1516" instrument_node=""> in VR lets the user reflect actions including jumping, leaning and ducking.&nbsp; It is an important technology that makes VR a more exciting and immersive experience. Content is usually computer generated, and can range from the replication of real life environments through to abstract and imagination-driven spaces. Users access content via a headset, such as </span><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oculus.com/quest/%3Flocale%3Den_GB"><span data-dcnode-id="1515" instrument_node="">Oculus Quest</span></a><span data-dcnode-id="1513" instrument_node=""> or </span><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vive.com/uk/"><span data-dcnode-id="1512" instrument_node="">HTC Vive</span></a><span data-dcnode-id="1510" instrument_node="">, and hand controllers can also be incorporated into more interactive experiences, for example to move around the virtual environment, as well as interact with objects and other users.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1508" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1502"><img alt="" class="lazyload wp-image-864" data-dcnode-id="1507" data-orig-sizes="(max-width: 960px) 100vw, 960px" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1.png" data-sizes="auto" data-srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-300x169.png 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-320x181.png 320w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-510x287.png 510w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-700x394.png 700w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-768x432.png 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1-795x447.png 795w, https://www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1.png 960w" height="540" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2020/07/https___blogs-images.forbes.com_solrogers_files_2019_05_190402_Quest_FH_dark_color-1200x675-1.png&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27960%27%20height%3D%27540%27%20viewBox%3D%270%200%20960%20540%27%3E%3Crect%20width%3D%27960%27%20height%3D%27540%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="960"><span data-dcnode-id="1506" instrument_node="">
</span><figcaption data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Oculus Quest is Facebook’s first standalone headset that offers six degrees of freedom (DoF) tracking.</span></figcaption><span data-dcnode-id="1503" instrument_node="">
</span></figure><span data-dcnode-id="1501" instrument_node="">
</span><ul data-dcnode-id="1495"><span data-dcnode-id="1500" instrument_node="">
</span><li data-dcnode-id="1497"><strong data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">360 Degree video</span></strong></li><span data-dcnode-id="1496" instrument_node="">
</span></ul><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">360 degree video differs from VR as it tends to be live filmed, rather than computer generated. Although you are fully immersed in an environment, it is limited by the fact that the user is anchored to the filmmaker’s viewpoint. This means that although you can move your head around to view your virtual world, you can’t walk around independently or interact with your surroundings. Unlike computer generated VR, 360 VR experiences are usually a solitary and passive experience.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><ul data-dcnode-id="1485"><span data-dcnode-id="1490" instrument_node="">
</span><li data-dcnode-id="1487"><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Augmented reality</span></strong></li><span data-dcnode-id="1486" instrument_node="">
</span></ul><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1483" instrument_node="">Augmented reality (AR) really hit the public consciousness when Pokemon Go exploded onto our mobile screens back in 2016. But the potential of augmented reality stretches way beyond cute, on-the-go gaming. This week Punchdrunk announced a </span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thestage.co.uk/news/punchdrunk-announces-partnership-with-pokemon-go-creator-niantic"><span data-dcnode-id="1482" instrument_node="">partnership with Pokemon Go’s creators, Niantic, to create AR immersive theatre experiences</span></a><span data-dcnode-id="1480" instrument_node="">.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Augmented reality works by enhancing the real world by superficially overlaying it with computer generated content. These content assets can take many shapes and forms, so it can be flat and 2D, which is great for instructional information such as wayfinding, or be more complex and ‘real’ in 3D.&nbsp;</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">One of the great things about AR is its accessibility, as it can be accessed on widely used hardware, such as a smartphone or tablet, as well as more sophisticated kit such as the Microsoft Hololens.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><ul data-dcnode-id="1466"><span data-dcnode-id="1471" instrument_node="">
</span><li data-dcnode-id="1468"><strong data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Mixed reality</span></strong></li><span data-dcnode-id="1467" instrument_node="">
</span></ul><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Mixed reality combines elements of virtual and augmented reality. Like augmented reality, it overlays digital content with the real world. This content is anchored to and interacts with objects in the real world. A major difference between mixed and augmented reality is that in mixed reality, digital assets can be visibly obscured by real world objects.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><h2 data-dcnode-id="1459"><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Why Use Immersive Technology?</span></strong></h2><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1457" instrument_node="">For businesses, the </span><a data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/blog/benefits-immersive-technology/"><span data-dcnode-id="1456" instrument_node="">benefits of immersive technology</span></a><span data-dcnode-id="1454" instrument_node=""> are broad ranging – and compelling. From boosting performance and streamlining workflows, to making workplaces safer, improving the effectiveness of training, as well as transforming marketing and communications; immersive technologies have the power to transform the world of work.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><ul data-dcnode-id="1446"><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1448"><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Transforming workplaces and the way teams work together</span></strong></li><span data-dcnode-id="1447" instrument_node="">
</span></ul><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1444" instrument_node="">VR platforms such as Future Visual’s </span><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/visionxr"><span data-dcnode-id="1443" instrument_node="">VISIONxR™</span></a><span data-dcnode-id="1441" instrument_node=""> can provide a shared virtual space for collaborative work. This has the potential to revolutionise working processes, allowing teams to work remotely, as well as work on interdependent tasks simultaneously. For example, VR is transforming R&amp;D workflows. By developing virtual, rather than physical prototypes, processes are accelerated, allowing R&amp;D teams to fail fast and learn quickly.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1431"><img alt="" class="lazyload wp-image-801" data-dcnode-id="1438" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/06/Screen-Shot-2020-05-07-at-9.30.23-AM.png" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="><span data-dcnode-id="1437" instrument_node="">
</span><figcaption data-dcnode-id="1433"><span data-dcnode-id="1436" instrument_node="">Future Visual’s remote collaboration platform </span><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/visionxr"><span data-dcnode-id="1435" instrument_node="">VISIONxR™</span></a></figcaption><span data-dcnode-id="1432" instrument_node="">
</span></figure><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Immersive technologies can also be integrated into the workplace to support process-driven roles, helping to make workplaces safer and lower downtime. Augmented reality is increasingly recognised for its potential to provide maintenance engineers easy access to technical information and manuals through simple visual interfaces that can be accessed on site by mobile phones.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><ul data-dcnode-id="1421"><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1423"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Improving Training</span></strong></li><span data-dcnode-id="1422" instrument_node="">
</span></ul><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">There’s also tangible evidence that immersive technologies can help improve the effectiveness of training – from significantly improving retention of knowledge, through to learning new skills at a more rapid pace, great for the individual and great for businesses!</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Workplaces and work-based challenges can be realistically replicated in the virtual space. This means that employees can benefit from practical, hands-on training experiences in a risk-free environment. By doing this, they are able to learn from their mistakes and repeat experiences to improve muscle memory. What’s more, they are able to learn alongside teammates.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1413" instrument_node="">You can read more on </span><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/blog/vr-training/"><span data-dcnode-id="1412" instrument_node="">VR Training – Innovation for Today’s Business Reality</span></a><span data-dcnode-id="1410" instrument_node="">.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1402"><img alt="" class="lazyload wp-image-355" data-dcnode-id="1407" data-orig-sizes="(max-width: 1024px) 100vw, 1024px" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1024x455.png" data-sizes="auto" data-srcset="https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-300x133.png 300w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-768x341.png 768w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1024x455.png 1024w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1536x683.png 1536w, https://www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18.png 1906w" height="455" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2019/12/ScreenShot2017-05-11at12.00.18-1024x455.png&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%271024%27%20height%3D%27455%27%20viewBox%3D%270%200%201024%20455%27%3E%3Crect%20width%3D%271024%27%20height%3D%27455%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="1024"><span data-dcnode-id="1406" instrument_node="">
</span><figcaption data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Future Visual worked with Peugeot to create an unforgettable launch experience with icockpit – fusing 360 live action into a CGI environment.</span></figcaption><span data-dcnode-id="1403" instrument_node="">
</span></figure><span data-dcnode-id="1401" instrument_node="">
</span><ul data-dcnode-id="1395"><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1397"><strong data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Marketing and communications</span></strong></li><span data-dcnode-id="1396" instrument_node="">
</span></ul><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Immersive technologies aren’t just great for internal working practices and procedures, they also provide a powerful tool to communicate with clients and market products and services to potential customers.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Virtual and augmented realities have the potential to capture attention and wow audiences and provoke active responses, making them an ideal marketing tool. The proliferation of smartphones means that augmented reality has the potential to be widely accessible – and blend seamlessly with additional social media content to connect with potential customers and accelerate purchase decisions. At the opposite end of the immersive scale, location-based VR can help to create meaningful experiential marketing experiences that reinforce positive brand messaging and strengthen engagement.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><h2 data-dcnode-id="1385"><strong data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Use Cases for Immersive Technology</span></strong></h2><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1383" instrument_node="">Hearing how innovation is being successfully applied helps to inspire and embrace emerging technologies and new ways of working. </span><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/blog/immersive-technology-education/"><span data-dcnode-id="1382" instrument_node="">Immersive technology in education</span></a><span data-dcnode-id="1380" instrument_node=""> and retail highlight how the technology can be applied in various ways across diverse sectors to improve engagement and performance.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><ul data-dcnode-id="1370"><span data-dcnode-id="1377" instrument_node="">
</span><li data-dcnode-id="1372"><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Immersive</span></strong><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node=""> tech in education</span></strong></li><span data-dcnode-id="1371" instrument_node="">
</span></ul><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1365"><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.njit.edu/"><span data-dcnode-id="1368" instrument_node="">The New Jersey Institute of Technology (NJIT)</span></a><span data-dcnode-id="1366" instrument_node=""> notes that “augmented reality has the potential to revolutionise learning in primary and secondary schools more than any other technology has done in the recent past”.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1362"><img alt="" class="lazyload wp-image-865" data-dcnode-id="1363" data-orig-sizes="(max-width: 1024px) 100vw, 1024px" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1024x540.jpg" data-sizes="auto" data-srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-300x158.jpg 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-768x405.jpg 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1024x540.jpg 1024w, https://www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1536x810.jpg 1536w" height="540" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2020/07/shutterstock_1255378828-1-1024x540.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%271024%27%20height%3D%27540%27%20viewBox%3D%270%200%201024%20540%27%3E%3Crect%20width%3D%271024%27%20height%3D%27540%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="1024"></figure><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Immersive technologies have the potential to learn, amaze and inspire in equal measure. It has the power to spark curiosity, creativity and critical thinking, give students the chance to experience different places and times, as well as developing social and emotional skills. This makes it ideal for innovating education and enhancing the current curriculum – and beyond. Moreover, it has the potential to help provide the next generation with the skills needed for the future workplaces.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><ul data-dcnode-id="1352"><span data-dcnode-id="1357" instrument_node="">
</span><li data-dcnode-id="1354"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">ClassVR</span></strong></li><span data-dcnode-id="1353" instrument_node="">
</span></ul><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">The award winning ClassVR gives a tantalising glimpse into the potential of introducing immersive technologies into schools. It allows students to learn across a range of topics, from improving creative writing to understanding science and maths. Students are able to undertake study at their own speed, which is supplemented with guides and worksheets for collaborative learning. Moreover, it provides crucial support for teachers, from lesson planning with curriculum focused content, through to instructions for classroom management. Anecdotal feedback from teachers highlights that VR improves engagement and enjoyment for students.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><ul data-dcnode-id="1342"><span data-dcnode-id="1347" instrument_node="">
</span><li data-dcnode-id="1344"><strong data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">The Giza Project</span></strong></li><span data-dcnode-id="1343" instrument_node="">
</span></ul><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1337"><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verizon.com/about/our-company/fourth-industrial-revolution/youve-never-seen-history-like-this"><span data-dcnode-id="1340" instrument_node="">The Giza Project</span></a><span data-dcnode-id="1338" instrument_node="">, an international collaboration at Harvard University highlights how higher education students can also benefit from embedding immersive content into courses. It gives students the chance to virtually visit the ancient Pyramids of Giza, and explore underground and through hard-to-access tunnels – areas only accessible with the aid of VR technology. Through virtual 3D mapping, it also allows them to learn more about the chronology and development of these ancient buildings, including the decisions around layout and how rituals played a role in their development.&nbsp;</span></p><span data-dcnode-id="1336" instrument_node="">
</span><ul data-dcnode-id="1330"><span data-dcnode-id="1335" instrument_node="">
</span><li data-dcnode-id="1332"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Immersive tech in retail</span></strong></li><span data-dcnode-id="1331" instrument_node="">
</span></ul><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">As online shopping has significantly changed shopping behaviours over the past few years. This, coupled with increasing costs of running physical stores means that finding new and effective ways to connect with customers, has never been more crucial for retailers to survive and thrive. Immersive tech holds numerous benefits for the retail sector – from gaining customer insights through to marketing and customer service training for employees. Additionally, one of the key drivers behind the adoption of immersive tech for many innovating retailers is the potential for customers to ‘try before you buy’. This ranges from visualising what clothes might look like without having to try them on physically, through to seeing what furniture looks like outside the retail environment.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1320"><img alt="" class="lazyload wp-image-869" data-dcnode-id="1325" data-orig-sizes="(max-width: 1024px) 100vw, 1024px" data-orig-src="https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1024x550.jpg" data-sizes="auto" data-srcset="https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-300x161.jpg 300w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-768x412.jpg 768w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1024x550.jpg 1024w, https://www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1536x824.jpg 1536w" height="550" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/wp-content/uploads/2020/07/John-Lewis-Design-project-board-shot-instore-1024x550.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%271024%27%20height%3D%27550%27%20viewBox%3D%270%200%201024%20550%27%3E%3Crect%20width%3D%271024%27%20height%3D%27550%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="1024"><span data-dcnode-id="1324" instrument_node="">
</span><figcaption data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Future Visual worked with client John Lewis to produce an in-store experiential VR experience to showcase the full range in an attention-grabbing way.</span></figcaption><span data-dcnode-id="1321" instrument_node="">
</span></figure><span data-dcnode-id="1319" instrument_node="">
</span><ul data-dcnode-id="1313"><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1315"><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">The John Lewis Design Project VR experience</span></strong></li><span data-dcnode-id="1314" instrument_node="">
</span></ul><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">One of the challenges for furniture retailers is displaying their whole range of products in store, where space is premium. When John Lewis launched it’s Design Project brand, it teamed up with Future Visual to produce an in-store experiential VR experience. It transported customers to an apartment entirely furnished with Design Project furniture and décor. Customers were able to move around the room and interact with the products, including being able to pick them up and move them, change colours and fabrics and get an up close 360 view.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">The Design Project VR experience engaged with customers in a novel and unique way, as well as giving John Lewis the chance to gain crucial customer insights into their views on not only the VR experience, but their product range too.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><ul data-dcnode-id="1300"><span data-dcnode-id="1305" instrument_node="">
</span><li data-dcnode-id="1302"><strong data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Digital Fashion – the future trend?</span></strong></li><span data-dcnode-id="1301" instrument_node="">
</span></ul><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Beyond ‘try before you buy’, retail fashion is also experimenting with immersive technologies, where the potential to create new revenue streams is increasingly being recognised. The Fashion Innovation Agency’s Matthew Drinkwater highlights that in the age of fast fashion, clothing is often bought to be worn once for the specific purpose of producing pictures to post across social media channels. This opens a new opportunity for fashion designers and retailers; the production and distribution of digital clothing through AR imagery.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1295" instrument_node="">For example, in 2018, Scandinavian retailer Carlings developed a</span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.voguebusiness.com/technology/digital-fashion-virtual-clothing-3d-design"><span data-dcnode-id="1294" instrument_node=""> digital clothing collection</span></a><span data-dcnode-id="1292" instrument_node="">, costing up to $30 per item. Customer photos were manipulated by digital tailors, so it looked like they were dressed in the digital clothes. To maintain an exclusive feel, the reproduction of garments was limited – and all sold out in less than a week.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">
</span><h2 data-dcnode-id="1285"><strong data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">What Does the Future Hold for Immersive Technology?</span></strong></h2><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Current innovations in immersive technologies and their applications across industry sectors highlight the potential of VR, AR and MR to transform business activity and give us a glimpse into an immersive future.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Over the past few years, advances in immersive tech in terms of technical functionality, creativity and usability are mind blowing. But to truly revolutionise the world of business, the immersive tech sector needs to clearly focus on addressing real world challenges across businesses and the overall economy. And for businesses looking to innovate to thrive, it’s crucial to identify the ROI in introducing immersive tech through recognising its impact in supporting growth, streamlining operations, nurturing employees’ skills and connecting with customers.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1277" instrument_node="">To get in touch to discuss your next project contact us here: </span><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futurevisual.com/contact/"><span data-dcnode-id="1276" instrument_node="">https://www.futurevisual.com/contact/</span></a></p><span data-dcnode-id="1273" instrument_node="">
