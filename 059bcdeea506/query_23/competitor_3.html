</span><div class="large-7 medium-7 columns single-content" data-dcnode-id="298" id="article-body"><span data-dcnode-id="578" instrument_node="">
</span><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Sound technology is slowly making its surprising mark across both e-Commerce and physical shopping, as retailers look harder to create a unique experience for consumers. While both experiences are different, sound is the connective tissue linking them together.</span></p><span data-dcnode-id="573" instrument_node="">
</span><div class="see-also left" data-dcnode-id="563"><div class="row columns" data-dcnode-id="564" data-equalizer="left209303" data-mutate="left209303" data-resize="left209303"><h3 class="read-next-title" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">READ NEXT</span></h3><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2021/09/retailers-are-adopting-blockchain-technology-to-simplify-payments/"><div class="large-12 medium-12 small-4 columns see-also-thumbnail" data-dcnode-id="569" data-equalizer-watch="left209303" style="height: auto;"><img alt="Retail companies should consider blockchain technology to streamline payments, alongside better supply chain and inventory management" class="ratiosquare wp-post-image" data-dcnode-id="570" height="150" loading="lazy" sizes="(max-width: 150px) 100vw, 150px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.techhq.com/wp-content/uploads/2021/09/063_1091456096-150x150.jpg%3F1651278087849&amp;raw" srcset="https://cdn.techhq.com/wp-content/uploads/2021/09/063_1091456096-150x150.jpg 150w, https://cdn.techhq.com/wp-content/uploads/2021/09/063_1091456096-361x361.jpg 361w, https://cdn.techhq.com/wp-content/uploads/2021/09/063_1091456096-160x160.jpg 160w, https://cdn2.techhq.com/wp-content/uploads/2021/09/063_1091456096-167x167.jpg 167w, https://cdn1.techhq.com/wp-content/uploads/2021/09/063_1091456096-409x409.jpg 409w, https://cdn.techhq.com/wp-content/uploads/2021/09/063_1091456096-90x90.jpg 90w, https://cdn.techhq.com/wp-content/uploads/2021/09/063_1091456096-125x125.jpg 125w" width="150"></div><div class="large-12 medium-12 small-8 columns see-also-text" data-dcnode-id="566" data-equalizer-watch="left209303" style="height: auto;"><h4 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Retailers are adopting blockchain technology to simplify payments</span></h4></div></a></div></div><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">For e-Commerce, sound is used to capture the user’s attention. For example, notifications from apps are now being customized to give a catchier sound, that will draw users’ attention across a crowded (and noisy) digital landscape. Multimedia products being displayed on some e-Commerce apps are also able to provide an audio sample of the product. For example, the sound of water filling a cup for a water dispenser product.</span></p><div class="mobile-advert-mpu" data-dcnode-id="551" style="background:#fff"><span data-dcnode-id="559" instrument_node=""> </span><div class="ad-in-article" data-dcnode-id="552"><span data-dcnode-id="558" instrument_node=""> </span><div data-dcnode-id="553" id="in-article" style="text-align: center"><span data-dcnode-id="557" instrument_node=""> </span><span data-dcnode-id="554" instrument_node=""> </span></div></div></div><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">While </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2021/10/fashion-forward-in-an-omnichannel-future/"><span data-dcnode-id="548" instrument_node="">e-Commerce apps</span></a><span data-dcnode-id="546" instrument_node=""> can easily implement audio to their products, it’s a bit more challenging for physical stores. Unlike apps, having sound played in a physical store would mean the audio can be heard by all customers. If it’s too loud, customers may be put off. And if it’s too soft, no one is going to notice it.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="543" instrument_node="">Harnessing next-generation sound technology, several tech startups are now creating immersive soundscapes not only for retail, but for the workplace as well. In fact, </span><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/1151588/It_is_all_in_the_mix_The_interactive_effect_of_music_tempo_and_mode_on_in_store_sales"><span data-dcnode-id="542" instrument_node="">a 2011 study</span></a><span data-dcnode-id="540" instrument_node=""> showed that with the right sound and tempo, in-store sales can increase.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="537" instrument_node="">As such, retailers and companies are integrating sound technology in their stores to create a better experience for shoppers and employees alike. In the US, award-winning</span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spatialinc.com/news/spatial-press-release-spatial-and-made-music-studio-announce-partnership-to-create-and-deploy-transformational-soundscapes"><span data-dcnode-id="536" instrument_node=""> immersive audio software platform</span></a><span data-dcnode-id="534" instrument_node=""> Spatial recently announced a partnership with Made Music Studio to create immersive sonic experiences for any environment, starting with an inaugural series of workplace-focused ambiances.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">In the UK, Audiebant Media, an intelligent audio communication solutions company is partnering with EG Group to develop a multi-sensory platform for the company’s convenience stores. The tech firm offers its clients opportunities to connect with consumers thanks to its advertising surround sound technology and plans to incorporate several strategies to reach millions of car users at roadside retail locations across the UK.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="528" instrument_node="">To understand more about how the use of audio and sound technology can help retailers, </span><em data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">TechHQ</span></em><span data-dcnode-id="525" instrument_node=""> speaks to Calin Pacurariu, co-founder and chief executive officer of Spatial.</span></p><span data-dcnode-id="523" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="519" id="attachment_210354"><img alt="sound technology" aria-describedby="caption-attachment-210354" class="wp-image-210354 size-large" data-dcnode-id="522" height="634" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.techhq.com/wp-content/uploads/2021/11/Calin-Pacurariu-1024x634.jpeg&amp;raw" srcset="https://cdn2.techhq.com/wp-content/uploads/2021/11/Calin-Pacurariu-1024x634.jpeg 1024w, https://cdn2.techhq.com/wp-content/uploads/2021/11/Calin-Pacurariu-300x186.jpeg 300w, https://cdn.techhq.com/wp-content/uploads/2021/11/Calin-Pacurariu-768x476.jpeg 768w, https://cdn.techhq.com/wp-content/uploads/2021/11/Calin-Pacurariu-1536x951.jpeg 1536w, https://cdn2.techhq.com/wp-content/uploads/2021/11/Calin-Pacurariu-2048x1268.jpeg 2048w" width="1024"><p class="wp-caption-text" data-dcnode-id="520" id="caption-attachment-210354"><span data-dcnode-id="521" instrument_node="">Calin Pacurariu, co-founder and chief executive officer of Spatial. (Source – Spatial)</span></p></div><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="515"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">How does sound affect a shopper’s perception? </span></strong></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="513" instrument_node="">Everything that happens on a shopper’s journey to a store, from looking up a brand or an address before getting to the store, to their actual experience of what they purchased long after they leave it, impacts the shopper’s perception of that store, and the brand in general. There’s a lot of innovation in retail that we’ve seen over the last decade that </span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2021/01/digital-transformation-are-we-using-the-term-correctly/"><span data-dcnode-id="512" instrument_node="">focused on digital transformation</span></a><span data-dcnode-id="510" instrument_node=""> — including localized sound experiences like you mention, in-store app experience notifications, or how a product gets demoed, etc.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="507" instrument_node="">Incremental moments of delight and improving the actual shopping experience are great; what we’re looking at is to take that further into affecting the whole mindset of a shopper as part of the holistic experience they move through when they enter a store. </span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2020/12/whatsapp-adds-cart-to-make-in-app-shopping-easier/"><span data-dcnode-id="506" instrument_node="">Immersive auditory experiences</span></a><span data-dcnode-id="504" instrument_node="">, whether loud and quiet, can bridge subconscious touchpoints that dramatically affect our outlook and form lasting connections to a physical space —such as a retail store.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="499"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">How can retailers utilize soundscapes in a new world of hyper-experiential expectations?</span></strong></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="497" instrument_node="">Retail is entering a very exciting decade ahead! The new standard of experience that customers expect today, new needs and challenges imposed by consumers who have adapted to shopping on-demand via their devices, and the current state of various</span><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2021/09/next-looks-can-ai-technology-predict-the-future-of-fashion/"><span data-dcnode-id="496" instrument_node=""> immersive technologies</span></a><span data-dcnode-id="494" instrument_node=""> — all these are increasingly converging today, opening up incredibly exciting opportunities for retailers to significantly rethink the way they design human experiences.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Immersive soundscapes should be a critical part of such new thinking, from the very first stages of design and architecture. The way retail has been developed so far often leaves sound like a last-minute add-on. Playlists, as good as they can be, tend to become looping nightmares for the teams actually working all day long in those spaces. So what can immersive soundscapes do?</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The key underlying fact is that immersive sound can forge deep and lasting emotional connections — consciously or subconsciously — to a brand, a product, or a space. The way we design around that can take different shapes. We can look at a store holistically, and design interactive, realistic soundscapes that transport people, set the mood (e.g., reflect product seasonality in fashion retail), support wayfinding and general user journeys, or intelligently manage noise levels for example based on crowd density. We can also look at more specific applications.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">For example, a fashion shopper could set their desired dressing room atmosphere based on the occasion they’re shopping for (from a quiet beach to a flashing red carpet). A shopper looking for a sneaker might find themselves literally in the middle of a basketball game, on the very court, with players dribbling past them, or a 3-pointer buzzer coming off. All that could be triggered by the simple act of a shopper picking up a shoe from its stand.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="480"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Can sound really change our emotional connection to a place?</span></strong></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">For years, scientists, doctors, and auditory professionals have been studying the effects of sound on the human psyche. In fact, earlier this year, Spatial successfully launched its own prototype demonstrating the power that sound has on our emotions, in partnership with Reimagine Well (a company that creates tech-enabled immersive experiences for patients), the California Institute of the Arts (CalArts), and the Henry Mayo Newhall Clinic.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">The success of the prototype caught the attention of other health systems around the country and enabled Spatial to launch a new partnership in October with Wellstar, a nationally ranked healthcare system in Atlanta, and HealthTunes, a digital streaming platform offering evidence-based sound therapy. The “resiliency rooms” being installed at Wellstar will be designed by HealthTunes using Spatial’s technology, and will aim to help frontline healthcare workers at Wellstar reduce the stress and anxiety brought on by the Covid 19 health crisis.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">Retail offers a number of similar use cases and more (for back of house as well as consumer-facing): soundscapes in retail spaces will be game-changers as retailers can help customers emotionally connect and </span><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2020/11/why-virtual-try-ons-could-be-fashions-holy-grail/"><span data-dcnode-id="471" instrument_node="">create lasting perception</span></a><span data-dcnode-id="469" instrument_node=""> and positive memories of the types of experiences that a brand provides.</span></p><span data-dcnode-id="467" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="463" id="attachment_210355"><img alt="" aria-describedby="caption-attachment-210355" class="wp-image-210355 size-large" data-dcnode-id="466" height="695" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.techhq.com/wp-content/uploads/2021/11/000_9QL974-1024x695.jpg&amp;raw" srcset="https://cdn2.techhq.com/wp-content/uploads/2021/11/000_9QL974-1024x695.jpg 1024w, https://cdn1.techhq.com/wp-content/uploads/2021/11/000_9QL974-300x204.jpg 300w, https://cdn.techhq.com/wp-content/uploads/2021/11/000_9QL974-768x521.jpg 768w, https://cdn2.techhq.com/wp-content/uploads/2021/11/000_9QL974-1536x1043.jpg 1536w, https://cdn.techhq.com/wp-content/uploads/2021/11/000_9QL974-2048x1390.jpg 2048w, https://cdn.techhq.com/wp-content/uploads/2021/11/000_9QL974-109x73.jpg 109w" width="1024"><p class="wp-caption-text" data-dcnode-id="464" id="caption-attachment-210355"><span data-dcnode-id="465" instrument_node="">(Photo by William WEST / AFP)</span></p></div><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="459"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Why sound is an important part of the human experience but is often overlooked due to the primacy of the visual experience?</span></strong></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="457" instrument_node="">There are some reasons for that. First, the technology underlying rich visual experiences advanced at a much faster pace than the technology for sound — or rather, the </span><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2021/11/retail-supply-chain-network-nightmare-christmas/"><span data-dcnode-id="456" instrument_node="">democratization of such technology</span></a><span data-dcnode-id="454" instrument_node="">. Truly immersive sound experiences have been possible for a while, however, their cost is considerable, and those solutions have always relied on expensive hardware and custom, inflexible software and content setups.</span></p><span data-dcnode-id="452" instrument_node="">
</span><div class="see-also wide" data-dcnode-id="441"><div class="row columns" data-dcnode-id="442" data-equalizer="wide208812" data-mutate="wide208812" data-resize="wide208812"><h3 class="read-next-title" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">YOU MIGHT LIKE</span></h3><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2021/09/reimagining-retail-with-personalized-customer-journeys/"><div class="large-5 medium-6 small-4 columns see-also-thumbnail" data-dcnode-id="448" data-equalizer-watch="wide208812" style="height: 160px;"><img alt="Retail is now reimagining how it approaches customer experiences, drives sales, and ensures the safety of employees and consumers in stores using IoT" class="ratiosquare wp-post-image" data-dcnode-id="449" height="150" loading="lazy" sizes="(max-width: 150px) 100vw, 150px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn1.techhq.com/wp-content/uploads/2021/09/000_9D392A-150x150.jpg%3F1651278087850&amp;raw" srcset="https://cdn1.techhq.com/wp-content/uploads/2021/09/000_9D392A-150x150.jpg 150w, https://cdn.techhq.com/wp-content/uploads/2021/09/000_9D392A-361x361.jpg 361w, https://cdn2.techhq.com/wp-content/uploads/2021/09/000_9D392A-160x160.jpg 160w, https://cdn2.techhq.com/wp-content/uploads/2021/09/000_9D392A-167x167.jpg 167w, https://cdn2.techhq.com/wp-content/uploads/2021/09/000_9D392A-409x409.jpg 409w, https://cdn.techhq.com/wp-content/uploads/2021/09/000_9D392A-90x90.jpg 90w, https://cdn.techhq.com/wp-content/uploads/2021/09/000_9D392A-125x125.jpg 125w" width="150"></div><div class="large-7 medium-6 small-8 columns see-also-text" data-dcnode-id="444" data-equalizer-watch="wide208812" style="height: 160px;"><p class="read-next-tag" data-dcnode-id="447"></p><h3 data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Reimagining retail with personalized customer journeys</span></h3></div></a></div></div><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">We want to streamline access to such experiences, as well as their creation &amp; deployment. We make software that empowers people to create audio experiences as you’ve never heard before; immersive, dynamic, and adaptable to any configuration of space or hardware. All that at a fraction of the cost of traditional systems, and with an ecosystem that can adapt, grow, and replicate as needed. Content that can be updated and propagated seamlessly and instantly. Realistic soundscapes that aren’t looping tracks, but intelligent and adaptive.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">But back to the question — the second part for why that hasn’t been done so far is also an awareness of what is even possible, at the earliest stages of design and architecture. When you assume something cannot be done unless you add 7-figure budgets to even get started, in most cases you’re going to not even consider it in your original vision for retail space. Part of our mission is to raise awareness that today, sound can finally come out of the shadows and become a real lever to consider utilizing from the very first phases of design thinking.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="431"><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Can you share with us examples of how retailers are using sound to increase their sales?</span></strong></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Our first retail projects are still in design phases and under confidentiality constraints with top global brands. But I can tell you that the use cases we’re seeing most often relate to the general &amp; adaptive mood-setting in a space, interactivity that amplifies a shopper’s interest in a specific product, and purchase decision-making support at the right moment of a consumer’s journey (e.g., in a dressing room), overlays of traditional music at appropriate moments and more.</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="424"><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Lastly, is using sound technology more expensive compared to the visual experience?&nbsp;</span></strong></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Previously, achieving similar quality of immersion to Spatial’s offerings relied on highly specialized software and proprietary hardware with exorbitant cost. But Spatial’s platform runs on modern inexpensive Macs and a wide range of off-the-shelf amplifiers and speakers which dramatically reduces costs and makes immersive audio solutions a serious contender in the future of immersive design.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="419" instrument_node="">We’ve proven that these </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techhq.com/2021/09/cashierless-stores/"><span data-dcnode-id="418" instrument_node="">immersive retail solutions</span></a><span data-dcnode-id="416" instrument_node=""> can scale from a small locally owned retail boutique to global retail chains utilizing the same underlying Spatial platform. Finally immersive audio is a peer of visual designs that are taken for granted in retail environments.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="413"></p><span data-dcnode-id="412" instrument_node="">
