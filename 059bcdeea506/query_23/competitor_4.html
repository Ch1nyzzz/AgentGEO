</span><h3 data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Creative examples of immersive advertising</span></h3><span data-dcnode-id="462" instrument_node="">
</span><p class="intro" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Transforming advertising into a liveable experience</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" style="font-weight: 400;"><span data-dcnode-id="458" instrument_node="">These creative immersive advertising examples speak for themselves:</span></span></p><span data-dcnode-id="455" instrument_node="">
</span><ul data-dcnode-id="429"><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="451"><span data-dcnode-id="452" style="font-weight: 400;"><span data-dcnode-id="453" instrument_node=""> A 3D tunnel installation, making the viewer feel like they’re in Utah</span></span></li><span data-dcnode-id="450" instrument_node="">
</span><li data-dcnode-id="447"><span data-dcnode-id="448" style="font-weight: 400;"><span data-dcnode-id="449" instrument_node=""> A bus stop with a real-life heated element on the ceiling to advertise Caribou Coffee’s new hot breakfast sandwiches</span></span></li><span data-dcnode-id="446" instrument_node="">
</span><li data-dcnode-id="443"><span data-dcnode-id="444" style="font-weight: 400;"><span data-dcnode-id="445" instrument_node=""> A bridge created as part of the 2006 World Cup campaign in Germany</span></span></li><span data-dcnode-id="442" instrument_node="">
</span><li data-dcnode-id="439"><span data-dcnode-id="440" style="font-weight: 400;"><span data-dcnode-id="441" instrument_node=""> A van, part of a Red Cross campaign, that shows a different view of the world</span></span></li><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="435"><span data-dcnode-id="436" style="font-weight: 400;"><span data-dcnode-id="437" instrument_node=""> A larger-than-life Pringles snack canister, part of a point-of-sale display in an Indian supermarket</span></span></li><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="431"><span data-dcnode-id="432" style="font-weight: 400;"><span data-dcnode-id="433" instrument_node=""> A campaign on the London Underground for Range Rover, featuring a car appearing to drive alongside the escalator</span></span></li><span data-dcnode-id="430" instrument_node="">
</span></ul><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" style="font-weight: 400;"><span data-dcnode-id="427" instrument_node="">Using creative techniques, these brands have created concepts that immerse the viewer with their own branded worlds, transforming advertising from a message to an experience.</span></span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="405"><sup data-dcnode-id="406"><span data-dcnode-id="421" style="font-weight: 400;"><span data-dcnode-id="423" instrument_node="">Images have been sourced from:</span><br data-dcnode-id="422"></span><span data-dcnode-id="418" style="font-weight: 400;"><span data-dcnode-id="420" instrument_node="">Output Magazine</span><br data-dcnode-id="419"></span><span data-dcnode-id="415" style="font-weight: 400;"><span data-dcnode-id="417" instrument_node="">Struck</span><br data-dcnode-id="416"></span><span data-dcnode-id="412" style="font-weight: 400;"><span data-dcnode-id="414" instrument_node="">Adweek</span><br data-dcnode-id="413"></span><span data-dcnode-id="409" style="font-weight: 400;"><span data-dcnode-id="411" instrument_node="">Spacecollective</span><br data-dcnode-id="410"></span><span data-dcnode-id="407" style="font-weight: 400;"><span data-dcnode-id="408" instrument_node="">The Cool Hunter</span></span></sup></p><span data-dcnode-id="404" instrument_node="">
