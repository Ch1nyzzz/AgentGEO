><span data-dcnode-id="804" instrument_node="">Augmented reality (AR) is exciting technology that you will heart lots about in the future. But what is augmented reality? And how can it help you?</span></p><p data-dcnode-id="798"><span data-dcnode-id="802" instrument_node="">The guide below is an introduction to AR to help get you started. Our </span><a class="rank-math-link" data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arvrtips.com/"><span data-dcnode-id="801" instrument_node="">entire website</span></a><span data-dcnode-id="799" instrument_node=""> is dedicated to practical uses for AR so go and check that out next.</span></p><div class="wp-block-uagb-table-of-contents uagb-toc__align-left uagb-toc__columns-1 uagb-block-31f19eaf-52b5-464f-b442-e4054e9983e0" data-dcnode-id="772" data-delay="800" data-offset="30" data-scroll="1"><div class="uagb-toc__wrap" data-dcnode-id="773"><div class="uagb-toc__title-wrap" data-dcnode-id="795"><div class="uagb-toc__title" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node=""> Table Of Contents</span></div></div><div class="uagb-toc__list-wrap" data-dcnode-id="774"><ol class="uagb-toc__list" data-dcnode-id="775"><li class="uagb-toc__list" data-dcnode-id="792"><a data-dcnode-id="793" href="#what-is-augmented-reality"><span data-dcnode-id="794" instrument_node="">What is Augmented Reality?</span></a></li><li class="uagb-toc__list" data-dcnode-id="789"><a data-dcnode-id="790" href="#what-is-ar-used-for"><span data-dcnode-id="791" instrument_node="">What is AR Used For?</span></a></li><li class="uagb-toc__list" data-dcnode-id="786"><a data-dcnode-id="787" href="#augmented-reality-vs-virtual-reality"><span data-dcnode-id="788" instrument_node="">Augmented Reality vs Virtual Reality</span></a></li><li class="uagb-toc__list" data-dcnode-id="776"><a data-dcnode-id="784" href="#examples-of-augmented-reality"><span data-dcnode-id="785" instrument_node="">Examples of Augmented Reality</span></a><ul class="uagb-toc__list" data-dcnode-id="777"><li class="uagb-toc__list" data-dcnode-id="781"><a data-dcnode-id="782" href="#games"><span data-dcnode-id="783" instrument_node="">Games</span></a></li><li class="uagb-toc__list" data-dcnode-id="778"><a data-dcnode-id="779" href="#apps"><span data-dcnode-id="780" instrument_node="">Apps</span></a></li></ul></li></ol></div></div></div><p data-dcnode-id="771"></p><h2 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">What is Augmented Reality?</span></h2><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Augmented Reality is the blending together of the real world environment with the virtual world. To bring the virtual world into view, you need a camera and a screen to create augmented reality.</span></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">The most common device for AR is your smart phone. There are many augmented reality apps which use your camera to overlay virtual features on to your screen.</span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Augmented Reality use exploded for regular consumers back in 2016 with the popularity of the Pokemon Go app, so it is a good example to use.</span></p><div class="wp-block-image" data-dcnode-id="751"><figure class="aligncenter size-large" data-dcnode-id="752"><picture class="wp-image-36" data-dcnode-id="755"><span data-dcnode-id="762" instrument_node=""> </span><source data-dcnode-id="761" data-srcset="https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-example.jpg.webp 809w, https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-example-300x241.jpg.webp 300w, https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-example-768x616.jpg.webp 768w" sizes="(max-width: 809px) 100vw, 809px" srcset="https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-example.jpg.webp 809w, https:/ ode-id="756" instrument_node=""> </span></picture><figcaption data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Pokemon Go AR Example (credit to digital.hbs.edu)</span></figcaption></figure></div><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">As you can see above, your camera shows your real world surroundings. The Pokemon Go game overlays Pikachu into the grass and adds buttons in the corner for taking actions in the game. This blending of the real world with the digital world is augmented reality.</span></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">And this example is just one of many practical uses which we’ll outline below!</span></p><p data-dcnode-id="746"></p><h2 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">What is AR Used For?</span></h2><div class="wp-block-image" data-dcnode-id="734"><figure class="aligncenter size-large" data-dcnode-id="735"><picture class="wp-image-45" data-dcnode-id="736"><span data-dcnode-id="743" instrument_node=""> </span><source data-dcnode-id="742" data-srcset="https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1024x683.jpg.webp 1024w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-300x200.jpg.webp 300w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-768x512.jpg.webp 768w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1536x1024.jpg.webp 1536w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-scaled.jpg.webp 2048w" sizes="(max-width: 1024px) 100vw, 1024px" srcset="https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1024x683.jpg.webp 1024w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-300x200.jpg.webp 300w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-768x512.jpg.webp 768w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1536x1024.jpg.webp 1536w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-scaled.jpg.webp 2048w" type="image/webp"><span data-dcnode-id="741" instrument_node=""> </span><noscript data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">&lt;img width="1024" height="683" src="https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1024x683.jpg" alt="what is augmented reality and what can it be used for?" srcset="https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1024x683.jpg 1024w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-300x200.jpg 300w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-768x512.jpg 768w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1536x1024.jpg 1536w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-scaled.jpg 2048w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;</span></noscript><img alt="what is augmented reality and what can it be used for?" class="lazyloaded" data-dcnode-id="738" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1024x683.jpg" data-srcset="https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1024x683.jpg 1024w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-300x200.jpg 300w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-768x512.jpg 768w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1536x1024.jpg 1536w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-scaled.jpg 2048w" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1024x683.jpg&amp;raw" srcset="https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1024x683.jpg 1024w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-300x200.jpg 300w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-768x512.jpg 768w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-1536x1024.jpg 1536w, https://arvrtips.com/wp-content/uploads/2020/03/augmented-reality-world-hand-scaled.jpg 2048w" width="1024"><span data-dcnode-id="737" instrument_node=""> </span></picture></figure></div><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Augmented reality has many uses and new applications are coming out daily. Traditionally, AR was used by the military and in movies to display heads up display (HUD) information on combat glasses or screens. It was not available to regular people due to high cost and limited computing power.</span></p><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Today, augmented reality is used in or being developed for a number of industries:</span></p><ul data-dcnode-id="717"><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Medical</span></li><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Educational</span></li><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Entertainment</span></li><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Gaming</span></li><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Shopping &amp; Retail</span></li><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Social Media</span></li></ul><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">In the medical field, augmented reality can help doctors practice complex surgeries in a digital environment by displaying live organs and body parts over top of test dummies.</span></p><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">In school, AR can be used to display and teach concepts on a chalkboard digitally.</span></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Many games are being developed with AR, showing digital worlds on your tabletop through your phone’s camera.</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">In the shopping and retail areas, augmented reality can place furniture digitally in your living room or show you how a piece of clothing looks on your before you buy it.</span></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Social media apps like Snapchat and Instagram have come out with AR filters, which detect the shape of your face and overlay different hairstyles, clothing, and accessories.</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">To try out some real world AR examples, check out the section below.</span></p><p data-dcnode-id="704"></p><h2 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Augmented Reality vs Virtual Reality</span></h2><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Compared to virtual reality which aims to physically place you inside of a digital world, augmented reality implements digital features into the real world.</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">AR doesn’t require you to purchase an expensive VR headset. This makes augmented reality more accessible and practical for casual users.</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">One other advantage of augmented reality vs virtual reality is that it has better application in real world situations. A virtual reality headset allows you to immerse yourself in a digital world. VR arcades and games are very popular.</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">By contrast, augmented reality is a better application for real life situations. With a pair of augmented glasses (which look like regular glasses), a person could see instantaneous data such as their body temperature, heart rate, GPS of their surroundings, and more.</span></p><p data-dcnode-id="693"></p><h2 data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Examples of Augmented Reality</span></h2><div class="wp-block-image" data-dcnode-id="681"><figure class="aligncenter size-large" data-dcnode-id="682"><picture class="wp-image-46" data-dcnode-id="683"><span data-dcnode-id="690" instrument_node=""> </span><source data-dcnode-id="689" data-srcset="https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-1024x683.jpg.webp 1024w, https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-300x200.jpg.webp 300w, https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-768x512.jpg.webp 768w, https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-1536x1024.jpg.webp 1536w" sizes="(max-width: 1024px) 100vw, 1024px" srcset="https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-1024x683.jpg.webp 1024w, https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-300x200.jpg.webp 300w, https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-768x512.jpg.webp 768w, https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-1536x1024.jpg.webp 1536w" type="image/webp"><span data-dcnode-id="688" instrument_node=""> </span><noscript data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">&lt;img width="1024" height="683" src="https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-1024x683.jpg" alt="what is augmented reality, examples in the real world" srcset="https://arvrtips.com/wp-content/uploads/2020/03/pokemon-go-augmented-reality-1024x683.jpg 1024w, https://arvrtips.com/wp-content/uploads/
