</span><h1 class="post-header__title" data-dcnode-id="1154"><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_text" data-dcnode-id="1155" data-hs-cos-general-type="meta_field" data-hs-cos-type="text" id="hs_cos_wrapper_name" style=""><span data-dcnode-id="1156" instrument_node="">5 Ways Augmented Reality (AR) Is Transforming Retail</span></span></h1><span data-dcnode-id="1153" instrument_node="">
</span><div class="post-author-tag" data-dcnode-id="1137"><span data-dcnode-id="1152" instrument_node="">
</span><div class="post-author-tag__text" data-dcnode-id="1139"><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1141"><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Written by </span></strong><span data-dcnode-id="1148" instrument_node=""> </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/marketing/author/caroline-forsey"><span data-dcnode-id="1147" instrument_node="">Caroline Forsey</span></a><span data-dcnode-id="1145" instrument_node="">
</span><a class="post-author-tag__twitter" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/cforsey1" target="_blank"><span data-dcnode-id="1144" instrument_node="">

</span></p><span data-dcnode-id="1140" instrument_node="">
</span></div><span data-dcnode-id="1138" instrument_node="">
</span></div><span data-dcnode-id="1136" instrument_node="">
</span></div><span data-dcnode-id="1134" instrument_node="">
</span><div class="post-header__image" data-dcnode-id="1130"><span data-dcnode-id="1133" instrument_node="">
</span><img alt="augmented-reality-retail-1" data-dcnode-id="1132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/hubfs/augmented-reality-retail-1.jpg&amp;raw"><span data-dcnode-id="1131" instrument_node="">

</span><div class="hsg-page-width-normal" data-dcnode-id="741"><span data-dcnode-id="1124" instrument_node="">
</span><section class="blog-post-content" data-dcnode-id="743"><span data-dcnode-id="1123" instrument_node="">
</span><main class="post-body" data-dcnode-id="835"><span data-dcnode-id="1122" instrument_node="">
</span><main class="post-body__content" data-dcnode-id="837"><span data-dcnode-id="1121" instrument_node="">
</span><div class="post-content blogsticky-active" data-dcnode-id="850" id="blog-page-read-time"><span data-dcnode-id="1120" instrument_node="">
</span><div class="post-content__sticky-social" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">
</span></div><span data-dcnode-id="1117" instrument_node="">
</span><div class="hsg-rich-text" data-dcnode-id="852"><span data-dcnode-id="1116" instrument_node="">
</span><div class="hsg-rich-text__wrapper post-content__wrapper blog-postPage-content" data-dcnode-id="854"><span data-dcnode-id="1115" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="884" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">For the past few years, augmented reality (AR) has been discussed as a useful but far-fetched solution, particularly in retail.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1109" instrument_node="">However, partially due to the launches of </span><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apple.com/ios/augmented-reality/" rel="noopener" target="_blank"><span data-dcnode-id="1108" instrument_node="">Apple's ARKit</span></a><span data-dcnode-id="1106" instrument_node=""> and </span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//developers.google.com/ar/" rel="noopener" target="_blank"><span data-dcnode-id="1105" instrument_node="">Google's ARCore</span></a><span data-dcnode-id="1103" instrument_node="">, augmented reality is no longer a future possibility for retail -- it's here. In fact, </span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static1.squarespace.com/static/5a06a8466957da9b9b999b8e/t/5ab1094e1ae6cff292b53b5f/1521551726749/DB-ChangingUKRetail_v2.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1102" instrument_node="">75% of consumers now expect retailers</span></a><span data-dcnode-id="1100" instrument_node=""> to offer an augmented reality experience.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><blockquote data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Brands that take advantage of augmented reality will be the brands that satisfy more customers long-term.&nbsp;</span></p><span data-dcnode-id="1094" instrument_node="">
</span></blockquote><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1091" instrument_node="">While there are many ways AR will transform retail in the upcoming years, we've honed in on five in particular.</span><span class="hs-cta-wrapper" data-dcnode-id="1082" id="hs-cta-wrapper-9250c9ad-08a1-4f8c-8bc5-08b250052eb3"><span class="hs-cta-node hs-cta-9250c9ad-08a1-4f8c-8bc5-08b250052eb3" data-dcnode-id="1086" data-hs-drop="true" id="hs-cta-9250c9ad-08a1-4f8c-8bc5-08b250052eb3" style="visibility: visible;"><a class="cta_button" cta_dest_link="https://offers.hubspot.com/stay-current-emerging-tech?hubs_post-cta=anchor" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chatnoir-webcontent.chatnoir.eu/%3Findex%3Dcw22%26url%3Dhttps%253A//www.hubspot.com/cs/c/%253Fcta_guid%253D33befa18-36b9-400b-8dc6-690f4d33101d%2526signature%253DAAH58kErY5Ziq438gnr5jr-4jbX28zspUA%2526pageId%253D6194254675%2526placement_guid%253D9250c9ad-08a1-4f8c-8bc5-08b250052eb3%2526canon%253Dhttps%25253A%25252F%25252Fblog.hubspot.com%25252Fmarketing%25252Faugmented-reality-retail%2526portal_id%253D53" id="cta_button_53_33befa18-36b9-400b-8dc6-690f4d33101d" rel="noopener" style="" target="_blank" title="Unlock tips, systems &amp; recommended resources to&nbsp;stay&nbsp;ahead of the tech curve."></a></span></span></p><h3 data-dcnode-id="1088"><a class="cta_button" cta_dest_link="https://offers.hubspot.com/stay-current-emerging-tech?hubs_post-cta=anchor" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chatnoir-webcontent.chatnoir.eu/%3Findex%3Dcw22%26url%3Dhttps%253A//www.hubspot.com/cs/c/%253Fcta_guid%253D33befa18-36b9-400b-8dc6-690f4d33101d%2526signature%253DAAH58kErY5Ziq438gnr5jr-4jbX28zspUA%2526pageId%253D6194254675%2526placement_guid%253D9250c9ad-08a1-4f8c-8bc5-08b250052eb3%2526canon%253Dhttps%25253A%25252F%25252Fblog.hubspot.com%25252Fmarketing%25252Faugmented-reality-retail%2526portal_id%253D53" id="cta_button_53_33befa18-36b9-400b-8dc6-690f4d33101d" rel="noopener" style="" target="_blank" title="Unlock tips, systems &amp; recommended resources to&nbsp;stay&nbsp;ahead of the tech curve."><span data-dcnode-id="1089" instrument_node="">Unlock tips, systems &amp; recommended resources to&nbsp;stay&nbsp;ahead of the tech curve.</span></a></h3></span><span data-dcnode-id="1079" style="font-size: 1.1rem;"><span data-dcnode-id="1080" instrument_node="">Take a look at how AR is transforming retail, and then consider how you can incorporate AR into your own retail strategy.</span></span><p></p><span data-dcnode-id="1077" instrument_node="">
</span><h3 data-dcnode-id="1074"><strong data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">1. Virtually Try On 3D Products</span></strong></h3><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">If you're anything like me, a store packed with customers can deter you from trying on products, even if you really need a new pair of sneakers.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">A few brands are using AR to combat this challenge. For instance, Lacoste's LCST Lacoste AR app allows customers to virtually try on shoes -- since its release, </span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enginecreative.co.uk/portfolio/lacoste-lcst-augmented-reality-retail-campaign/" rel="noopener" target="_blank"><span data-dcnode-id="1068" instrument_node="">over 30,000 users have interacted</span></a><span data-dcnode-id="1066" instrument_node=""> with the products within the app.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1056" style="text-align: center;"><img alt="lacoste" data-dcnode-id="1063" sizes="(max-width: 297px) 100vw, 297px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/hs-fs/hubfs/lacoste.png%3Fwidth%3D297%26name%3Dlacoste.png&amp;raw" srcset="https://blog.hubspot.com/hs-fs/hubfs/lacoste.png?width=149&amp;name=lacoste.png 149w, https://blog.hubspot.com/hs-fs/hubfs/lacoste.png?width=297&amp;name=lacoste.png 297w, https://blog.hubspot.com/hs-fs/hubfs/lacoste.png?width=446&amp;name=lacoste.png 446w, https://blog.hubspot.com/hs-fs/hubfs/lacoste.png?width=594&amp;name=lacoste.png 594w, https://blog.hubspot.com/hs-fs/hubfs/lacoste.png?width=743&amp;name=lacoste.png 743w, https://blog.hubspot.com/hs-fs/hubfs/lacoste.png?width=891&amp;name=lacoste.png 891w" style="width: 297px; margin: 0px auto; display: block;" width="297"><em data-dcnode-id="1057" style="color: inherit; font-size: 1.1rem;"><span data-dcnode-id="1058" style="font-size: 11px;"><span data-dcnode-id="1062" instrument_node="">Image courtesy of&nbsp;</span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJcMOyMudH88" rel="noopener" target="_blank"><span data-dcnode-id="1061" instrument_node="">Engine Creative</span></a><span data-dcnode-id="1059" instrument_node="">.&nbsp;&nbsp;</span></span></em></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">Sephora, meanwhile, </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retaildive.com/ex/mobilecommercedaily/sephora-tries-on-augmented-reality-update-for-real-time-facial-recognition" rel="noopener" target="_blank"><span data-dcnode-id="1053" instrument_node="">created a Virtual Artist App with Modiface</span></a><span data-dcnode-id="1051" instrument_node=""> to show Sephora app users how makeup products will look on their face via their phone's camera.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">By the end of 2018, it's estimated mobile devices will account for </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invespcro.com/blog/mobile-commerce/" rel="noopener" target="_blank"><span data-dcnode-id="1047" instrument_node="">27% of all U.S. retail ecommerce sales</span></a><span data-dcnode-id="1045" instrument_node="">. As holiday season approaches, busy shoppers will turn to brands like Lacoste and Sephora to ensure they like the look of a product before making an online purchase. By offering a comparable alternative to the in-store experience, you're able to appeal to a larger demographic.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><h3 data-dcnode-id="1040"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">2. Look at 3D Products In Home </span></strong></h3><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Oftentimes, an in-store experience doesn't help customers visualize how products will fit and look in their homes. One of the biggest ways AR will transform retail is by offering customers the opportunity to see products in home before purchase.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node="">For instance, </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.com/enterprise/augmented-reality-ecommerce-magnolia-market" rel="noopener" target="_blank"><span data-dcnode-id="1034" instrument_node="">Magnolia Market partnered with Shopify's AR team to create an app</span></a><span data-dcnode-id="1032" instrument_node=""> that allows customers to see how the brand's products will look in their homes. Augmented reality helps customers visualize Magnolia Market's products to decide if the products match the existing furniture, or fit well in the room.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1022"><img alt="magnoliamarket" data-dcnode-id="1029" sizes="(max-width: 271px) 100vw, 271px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/hs-fs/hubfs/magnoliamarket.png%3Fwidth%3D271%26name%3Dmagnoliamarket.png&amp;raw" srcset="https://blog.hubspot.com/hs-fs/hubfs/magnoliamarket.png?width=136&amp;name=magnoliamarket.png 136w, https://blog.hubspot.com/hs-fs/hubfs/magnoliamarket.png?width=271&amp;name=magnoliamarket.png 271w, https://blog.hubspot.com/hs-fs/hubfs/magnoliamarket.png?width=407&amp;name=magnoliamarket.png 407w, https://blog.hubspot.com/hs-fs/hubfs/magnoliamarket.png?width=542&amp;name=magnoliamarket.png 542w, https://blog.hubspot.com/hs-fs/hubfs/magnoliamarket.png?width=678&amp;name=magnoliamarket.png 678w, https://blog.hubspot.com/hs-fs/hubfs/magnoliamarket.png?width=813&amp;name=magnoliamarket.png 813w" style="width: 271px; display: block; margin: 0px auto;" width="271"><em data-dcnode-id="1023" style="color: inherit; font-size: 1.1rem;"><span data-dcnode-id="1024" style="font-size: 11px;"><span data-dcnode-id="1028" instrument_node="">Image courtesy of </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D85-bJjlvJFA" rel="noopener" target="_blank"><span data-dcnode-id="1027" instrument_node="">Shopify</span></a><span data-dcnode-id="1025" instrument_node="">.&nbsp;</span></span></em></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1020" instrument_node="">Similarly, Home Depot </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporate.homedepot.com/newsroom/project-color-app-paint" rel="noopener" target="_blank"><span data-dcnode-id="1019" instrument_node="">released their Project Color app in 2015</span></a><span data-dcnode-id="1017" instrument_node="">, which allows users to see how a paint color looks in a room. The AR technology considers lighting, objects, and shadows in the room, so you can get a realistic portrayal of how the paint color will look in real life.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Both Mangolia Market and Home Depot's AR apps allow users to send images through text or on social media to get a friend's opinion before making a purchase.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">As more home improvement retail stores offer AR apps, it will become harder to compete without one. If you had the option of seeing one brand's couch in your home before purchasing, or purchasing from another brand without knowing how it would look, which would you choose?</span></p><span data-dcnode-id="1009" instrument_node="">
</span><h3 data-dcnode-id="1006"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">3. Gather In-Store Information</span></strong></h3><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1004" instrument_node="">Nowadays, </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retaildive.com/news/how-shoppers-use-their-smartphones-in-stores/444147/" rel="noopener" target="_blank"><span data-dcnode-id="1003" instrument_node="">nearly 60% of shoppers</span></a><span data-dcnode-id="1001" instrument_node=""> look up product information and prices while using their mobile phones in stores. Augmented reality could provide a critical solution to meeting those shoppers' needs.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">There's certain product information a shopper can't ask a sales associate -- questions like, "What do other customers think of this product?" AR can fill this gap. For instance, </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.creativeguerrillamarketing.com/augmented-reality/american-apparel-turns-to-augmented-reality/" rel="noopener" target="_blank"><span data-dcnode-id="997" instrument_node="">American Apparel created an AR app</span></a><span data-dcnode-id="995" instrument_node=""> that allows customers to scan signs in-store and pull up product information, including customer reviews, color options, and pricing.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="984"><img alt="american-apparel" data-dcnode-id="992" sizes="(max-width: 2340px) 100vw, 2340px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/hs-fs/hubfs/american-apparel.png%3Fwidth%3D2340%26name%3Damerican-apparel.png&amp;raw" srcset="https://blog.hubspot.com/hs-fs/hubfs/american-apparel.png?width=1170&amp;name=american-apparel.png 1170w, https://blog.hubspot.com/hs-fs/hubfs/american-apparel.png?width=2340&amp;name=american-apparel.png 2340w, https://blog.hubspot.com/hs-fs/hubfs/american-apparel.png?width=3510&amp;name=american-apparel.png 3510w, https://blog.hubspot.com/hs-fs/hubfs/american-apparel.png?width=4680&amp;name=american-apparel.png 4680w, https://blog.hubspot.com/hs-fs/hubfs/american-apparel.png?width=5850&amp;name=american-apparel.png 5850w, https://blog.hubspot.com/hs-fs/hubfs/american-apparel.png?width=7020&amp;name=american-apparel.png 7020w" style="width: 2340px;" width="2340"><em data-dcnode-id="985" style="color: inherit; font-size: 1.1rem;"><span data-dcnode-id="986" style="font-size: 11px;"><span data-dcnode-id="991" instrument_node="">Image courtesy of&nbsp;</span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D0O9CUpqSNRU" rel="noopener" target="_blank"><span data-dcnode-id="990" instrument_node="">AmericanApparelTech</span></a><span data-dcnode-id="988" instrument_node="">.</span><br data-dcnode-id="987"></span></em></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" style="font-size: 1.1rem;"><span data-dcnode-id="982" instrument_node="">Additionally, app users can watch videos of models wearing American Apparel products, or send products to a friend if they think the friend would like it.</span></span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">While users are likely able to find this information online without an AR app, augmented reality helps bridge the gap between offline and online shopping, creating a more cohesive experience. To help your customers find what they need more effortlessly, you might consider using AR in-store.</span></p><span data-dcnode-id="976" instrument_node="">
</span><h3 data-dcnode-id="973"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">4. Use Virtual Fitting Rooms</span></strong></h3><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Fitting rooms, particularly during a busy shopping season, can be a deterrent for shoppers. Sometimes, a shopper might buy an item, try it on at home, and return it just to avoid the fitting room line. Other times, shoppers might decide the item isn't even worth the hassle.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">If you're going to use AR, you'll want to brainstorm how to make the lives of your customers easier. Topshop, for instance, </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.com/2011/05/augmented-reality-kinect-fitting-room-for-topshop-moscow/" rel="noopener" target="_blank"><span data-dcnode-id="967" instrument_node="">partnered with AR Door and used Kinect</span></a><span data-dcnode-id="965" instrument_node=""> motion sensing technology to create a virtual fitting room for customers in their Moscow store. By standing in front of the camera, customers were able to see how clothing items looked on their bodies without physically trying anything on.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="955"><img alt="topshop" data-dcnode-id="962" sizes="(max-width: 313px) 100vw, 313px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/hs-fs/hubfs/topshop.png%3Fwidth%3D313%26name%3Dtopshop.png&amp;raw" srcset="https://blog.hubspot.com/hs-fs/hubfs/topshop.png?width=157&amp;name=topshop.png 157w, https://blog.hubspot.com/hs-fs/hubfs/topshop.png?width=313&amp;name=topshop.png 313w, https://blog.hubspot.com/hs-fs/hubfs/topshop.png?width=470&amp;name=topshop.png 470w, https://blog.hubspot.com/hs-fs/hubfs/topshop.png?width=626&amp;name=topshop.png 626w, https://blog.hubspot.com/hs-fs/hubfs/topshop.png?width=783&amp;name=topshop.png 783w, https://blog.hubspot.com/hs-fs/hubfs/topshop.png?width=939&amp;name=topshop.png 939w" style="width: 313px; display: block; margin: 0px auto;" width="313"><em data-dcnode-id="956" style="color: inherit; font-size: 1.1rem;"><span data-dcnode-id="957" style="font-size: 11px;"><span data-dcnode-id="961" instrument_node="">Image courtesy of </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/marketing/ARDOORMoscow" rel="noopener" target="_blank"><span data-dcnode-id="960" instrument_node="">ARDOORMoscow</span></a><span data-dcnode-id="958" instrument_node="">.</span></span></em></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">Similarly, </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lemonandorange.com/portfolio_item/timberland-campaign/" rel="noopener" target="_blank"><span data-dcnode-id="952" instrument_node="">Timberland created their own virtual fitting room</span></a><span data-dcnode-id="950" instrument_node=""> in Moktow Gallery in 2014. Using Kinect, Timberland's fitting room allowed customers to see how their bodies looked in certain outfits.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Ideally, AR can help you appeal to more customers, including shoppers who are rushed or frustrated by the crowds. To satisfy more people, you might consider incorporating virtual fitting rooms into your store.</span></p><span data-dcnode-id="945" instrument_node="">
</span><h3 data-dcnode-id="942"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">5. Build Brand Awareness </span></strong></h3><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Even though augmented reality is becoming increasingly mainstream, it's still unique and surprising.</span></p><span data-dcnode-id="938" instrument_node="">
</span><blockquote data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Retail stores that use AR in 2018 set themselves apart as especially innovative and modern.</span></p><span data-dcnode-id="934" instrument_node="">
</span></blockquote><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">For instance, </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dandad.org/en/d-ad-airwalk-invisible-popup-store-case-study-insights/" rel="noopener" target="_blank"><span data-dcnode-id="930" instrument_node="">Airwalk used geolocation and AR</span></a><span data-dcnode-id="928" instrument_node=""> to create an "invisible" pop-up shop, promoting the limited-edition relaunch of the Airwalk Jim. To purchase the shoe, customers needed to download Airwalk's app and go to a virtual pop-up store location.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">Airwalk's unusual and fun shopping experience resulted in </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.welovead.com/en/works/details/573Cjmrv" rel="noopener" target="_blank"><span data-dcnode-id="924" instrument_node="">$5 million in earned media, and the ecommerce store's busiest weekend yet</span></a><span data-dcnode-id="922" instrument_node="">. Additionally, the campaign proved Airwalk as a relevant and forward-thinking brand. By understanding their core demographic, Airwalk was able to successfully build brand awareness using AR.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="912"><img alt="airwalk-1" data-dcnode-id="919" sizes="(max-width: 423px) 100vw, 423px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/hs-fs/hubfs/airwalk-1.png%3Fwidth%3D423%26name%3Dairwalk-1.png&amp;raw" srcset="https://blog.hubspot.com/hs-fs/hubfs/airwalk-1.png?width=212&amp;name=airwalk-1.png 212w, https://blog.hubspot.com/hs-fs/hubfs/airwalk-1.png?width=423&amp;name=airwalk-1.png 423w, https://blog.hubspot.com/hs-fs/hubfs/airwalk-1.png?width=635&amp;name=airwalk-1.png 635w, https://blog.hubspot.com/hs-fs/hubfs/airwalk-1.png?width=846&amp;name=airwalk-1.png 846w, https://blog.hubspot.com/hs-fs/hubfs/airwalk-1.png?width=1058&amp;name=airwalk-1.png 1058w, https://blog.hubspot.com/hs-fs/hubfs/airwalk-1.png?width=1269&amp;name=airwalk-1.png 1269w" style="width: 423px; display: block; margin: 0px auto;" width="423"><em data-dcnode-id="913" style="color: inherit; font-size: 1.1rem;"><span data-dcnode-id="914" style="font-size: 11px;"><span data-dcnode-id="918" instrument_node="">Image courtesy of&nbsp;</span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lsnglobal.com/opinion/article/3225/vivian-rosenthal-the-virtual-pop-up-store" rel="noopener" target="_blank"><span data-dcnode-id="917" instrument_node="">LS:N Global.</span></a><span data-dcnode-id="915" instrument_node="">&nbsp;</span></span></em></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Ultimately, it's important you consider how AR would best-suit your customers' needs. To create a sustainable long-term strategy, you'll want to avoid using AR simply for flair -- consider how the technology can enhance your customer's shopping experience, and you're more likely to find lasting success.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="898"><span class="hs-cta-wrapper" data-dcnode-id="900" id="hs-cta-wrapper-3ed01f51-19c6-407b-9e52-c5d5d3f5efea"><span class="hs-cta-node hs-cta-3ed01f51-19c6-407b-9e52-c5d5d3f5efea" data-dcnode-id="904" data-hs-drop="true" id="hs-cta-3ed01f51-19c6-407b-9e52-c5d5d3f5efea" style="visibility: visible;"><a class="cta_button" cta_dest_link="https://offers.hubspot.com/stay-current-emerging-tech?hubs_post-cta=bottom" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hubspot.com/cs/c/%3Fcta_guid%3D2313f8a4-3dad-46b0-a7cb-0873fa6572d1%26signature%3DAAH58kHfZdFV2MS5ArOfoFBsrvvBzvlOfg%26pageId%3D6194254675%26placement_guid%3D3ed01f51-19c6-407b-9e52-c5d5d3f5efea%26canon%3Dhttps%253A%252F%252Fblog.hubspot.com%252Fmarketing%252Faugmented-reality-retail%26portal_id%3D53" id="cta_button_53_2313f8a4-3dad-46b0-a7cb-0873fa6572d1" rel="noopener" target="_blank"><img alt="Stay Current on Emerging Tech" class="hs-cta-img" data-dcnode-id="906" id="hs-cta-img-3ed01f51-19c6-407b-9e52-c5d5d3f5efea" mce_noresize="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/hs-fs/hub/53/hub_generated/resized/bdf5de6b-25cd-423d-83fb-bdd97c3686b3.png&amp;raw" style="border-width: 0px; "></a></span></span></p><span data-dcnode-id="897" instrument_node="">
</span><div data-dcnode-id="885" id="slidebox"><a class="close" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">&nbsp;</span></a><span class="hs-cta-wrapper" data-dcnode-id="887" id="hs-cta-wrapper-f6fb89ac-6d63-4f02-919f-365e3ad2f9f4"><span class="hs-cta-node hs-cta-f6fb89ac-6d63-4f02-919f-365e3ad2f9f4" data-dcnode-id="891" data-hs-drop="true" id="hs-cta-f6fb89ac-6d63-4f02-919f-365e3ad2f9f4" style="visibility: visible;"><a class="cta_button" cta_dest_link="https://offers.hubspot.com/stay-current-emerging-tech?hubs_post-cta=slide" data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hubspot.com/cs/c/%3Fcta_guid%3Db3ff043b-7691-46b3-b152-ffe858d8f274%26signature%3DAAH58kELPsxxoBm8K1tEbAcJmip3AJEGPg%26pageId%3D6194254675%26placement_guid%3Df6fb89ac-6d63-4f02-919f-365e3ad2f9f4%26canon%3Dhttps%253A%252F%252Fblog.hubspot.com%252Fmarketing%252Faugmented-reality-retail%26portal_id%3D53" id="cta_button_53_b3ff043b-7691-46b3-b152-ffe858d8f274" rel="noopener" target="_blank"><img alt="Guide Stay Current on Emerging Tech" class="hs-cta-img" data-dcnode-id="893" id="hs-cta-img-f6fb89ac-6d63-4f02-919f-365e3ad2f9f4" mce_noresize="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/hs-fs/hub/53/hub_generated/resized/abeb3772-4d84-4180-93ce-237803c8aa89.png&amp;raw" style="border-width: 0px; "></a></span></span></div><span data-dcnode-id="883" instrument_node="">
