</span><div class="sv-item-description" data-dcnode-id="1005" style="height: 168px;"><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1017" instrument_node="">Such apps recognize a specific, custom marker – a </span><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">pictogram</span></strong><span data-dcnode-id="1014" instrument_node=""> or a&nbsp;</span><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">QR-code</span></strong><span data-dcnode-id="1011" instrument_node=""> – and then substitute it with pre-set data on the device screen. There can be&nbsp;infinite numbers of both codes and assigned augmentations. Marker-based apps work best when augmentations are </span><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">tied to a specific object</span></strong><span data-dcnode-id="1008" instrument_node="">, for instance, a human anatomy model for medical education or a particular art piece in a gallery.</span></p><span data-dcnode-id="1006" instrument_node="">

</span><div class="sv-item-description" data-dcnode-id="972" style="height: 168px;"><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="987" instrument_node="">To realistically position AR model without using any markers, apps use </span><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">GPS</span></strong><span data-dcnode-id="984" instrument_node="">,&nbsp;built-in </span><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">sensors</span></strong><span data-dcnode-id="981" instrument_node="">, as well as complex </span><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">computer vision algorithms</span></strong><span data-dcnode-id="978" instrument_node="">. This type is used when augmentations are supposed to </span><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">adapt to various locations</span></strong><span data-dcnode-id="975" instrument_node=""> and, for instance, accurately place&nbsp;a furniture piece in a room, show navigation arrows in a tourist spot or point at the best bargain on a product shelf.</span></p><span data-dcnode-id="973" instrument_node="">

</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">We provide integration of AR apps’ back ends with your internal systems&nbsp;regardless of the in-house solutions you use: ERP, CRM, PIM, etc. Our integration processes ensure fast 3D model retrieval from data storage, secure communication with your AR metadata storage and other related services, as well as synchronization of necessary user information with your CRM or other business software. Being ISO 27001-certified, we guarantee security of all your data.</span></p><span data-dcnode-id="574" instrument_node="">
