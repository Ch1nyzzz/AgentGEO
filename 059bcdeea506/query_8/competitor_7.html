</span><p data-dcnode-id="982"><span data-dcnode-id="989" instrument_node="">The excitement about augmented reality in business doesn’t stop mounting. In September 2017 Apple introduced iOS 11, which also embeds ARkit empowering the first augmented reality apps. Google also is in the game with its AR platform Tango, supported by Lenovo and Asus smartphones. First mobile AR browser already exists, becoming also a marketplace for AR apps. AR helps to overcome </span><a aria-label="open link" data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DRo-HfETpzhc" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="988" instrument_node="">language barriers</span></a><span data-dcnode-id="986" instrument_node="">. Even print media like </span><a aria-label="open link" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digiday.com/media/ny-times-launches-first-augmented-reality-project/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="985" instrument_node="">The NYT</span></a><span data-dcnode-id="983" instrument_node=""> is launching augmented reality projects.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="980" instrument_node="">Retailers too are eager to provide new tools that better the shopping experience. The first attempts at </span><a aria-label="open link" data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techspot.com/news/67964-gap-augmented-reality-app-you-try-clothes-home.html" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="979" instrument_node="">virtual dressing rooms</span></a><span data-dcnode-id="977" instrument_node=""> to allow customers to try clothes while shopping online have been made already. Soon, AR is going to affect the way we shop, experts say because all you need is a phone. Moreover, few early adopters of augmented reality, Ikea and Wayfair, have stated it has driven their sales.</span></p><span data-dcnode-id="975" instrument_node="">

</span><h2 class="offer-title" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">
Thank you for feedback.
</span></h2><span data-dcnode-id="925" instrument_node="">
</span></div><span data-dcnode-id="923" instrument_node="">
</span></div><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="920" instrument_node="">The discussion is yet open among marketers – do we bet on augmented reality or reality, as in traditional shopping? Meanwhile, according to Centric Digital </span><a aria-label="open link" data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//centricdigital.com/blog/augmented-reality/how-augmented-reality-could-help-retailers-increase-revenue/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="919" instrument_node="">Augmented reality in retail</span></a><span data-dcnode-id="917" instrument_node=""> study on US customers, </span><b data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">furniture </span></b><span data-dcnode-id="914" instrument_node="">is the top product people want to shop with AR (60%). Other products include clothing (55%), groceries (39%), shoes (35%) and jewelry (25%). So even though the AR technology is not ultimately here yet, AR furniture shopping is already a thing known to customers.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><img alt="Augmented Reality in Furniture" class="aligncenter size-full wp-image-19085" data-dcnode-id="911" height="556" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.thinkmobiles.com/uploads/2017/10/ikea-app.jpg&amp;raw" srcset="https://static.thinkmobiles.com/uploads/2017/10/ikea-app.jpg 1000w, https://static.thinkmobiles.com/uploads/2017/10/ikea-app-300x167.jpg 300w, https://static.thinkmobiles.com/uploads/2017/10/ikea-app-768x427.jpg 768w" width="1000"></p><span data-dcnode-id="909" instrument_node="">
</span><h2 class="descriptionNav" data-dcnode-id="907" id="how-do-ar-apps-work"><span data-dcnode-id="908" instrument_node="">How do AR apps work</span></h2><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Augmented Reality is a way of overlaying virtual animated objects onto real-world surroundings using mobile devices. A live environment augmented by digital data – sounds, images, videos. There are 2 groups of AR apps:</span></p><span data-dcnode-id="903" instrument_node="">
</span><ul data-dcnode-id="893"><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="899"><b data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Marker-based apps</span></b></li><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="895"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Location-based apps</span></strong></li><span data-dcnode-id="894" instrument_node="">
</span></ul><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">First ones work with image recognition using a camera to scan an image (marker) and then add a virtual image on the phone screen. For example, many apps read QR codes and present additional information. Location-based AR apps use GPS to locate places nearby and/or to offer directions, etc.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">The idea for using augmented reality apps is simple:</span></p><span data-dcnode-id="886" instrument_node="">
</span><ul data-dcnode-id="872"><span data-dcnode-id="885" instrument_node="">
</span><li data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Download the app</span></li><span data-dcnode-id="882" instrument_node="">
</span><li data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Get the marker image/code/flyer</span></li><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Place the marker in your environment</span></li><span data-dcnode-id="876" instrument_node="">
</span><li data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Point the device at the marker and interact with augmented reality</span></li><span data-dcnode-id="873" instrument_node="">
</span></ul><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">AR apps are mostly used in commerce, entertainment, games, retail, medicine.</span></p><span data-dcnode-id="868" instrument_node="">
</span><h2 class="descriptionNav" data-dcnode-id="866" id="benefits-of-augmented-reality-in-furniture"><span data-dcnode-id="867" instrument_node="">Benefits of augmented reality in furniture</span></h2><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">Overall, using augmented reality applications </span><b data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">businesses </span></b><span data-dcnode-id="861" instrument_node="">can:</span></p><span data-dcnode-id="859" instrument_node="">
</span><ol data-dcnode-id="845"><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Personalize shopping experiences</span></li><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Entertain and amaze customers</span></li><span data-dcnode-id="852" instrument_node="">
</span><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Engage and retain customers</span></li><span data-dcnode-id="849" instrument_node="">
</span><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Be ahead of the competition</span></li><span data-dcnode-id="846" instrument_node="">
</span></ol><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">While </span><b data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">customers </span></b><span data-dcnode-id="840" instrument_node="">can enjoy AR tools in such ways as:</span></p><span data-dcnode-id="838" instrument_node="">
</span><ol data-dcnode-id="824"><span data-dcnode-id="837" instrument_node="">
</span><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Find and try products remotely</span></li><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Explore brand new ways to shop</span></li><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Making more informed purchasing decisions</span></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Combine buying with entertainment</span></li><span data-dcnode-id="825" instrument_node="">
</span></ol><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">For furniture retailers, the approach of ‘try before you buy’ is crucial and this option for customers is a winning ticket. Offering this yet futuristic technology of AR is of news value alone, to begin with. The mere fact that a retailer has an AR app instantly gets the attention and potentially </span><b data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">increase sales</span></b><span data-dcnode-id="819" instrument_node="">. To prove this point, a good example is GAP chain of stores, that opened up augmented dressing rooms, got big publicity and higher traffic to their website in a result.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="816" instrument_node="">AR is also a fine tool for </span><b data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">personalization </span></b><span data-dcnode-id="813" instrument_node="">of customer needs, especially when it comes to &nbsp;furniture. Shoppers really want the ability to see how the items will look at their homes or offices. IKEA was the first AR ice-breaking furniture company introducing the catalog app for these exact needs. A user takes a photo of a place with the app, browses the catalog and tries selected items onto a place.</span></p><span data-dcnode-id="811" instrument_node="">
</span><h3 class="descriptionNav" data-dcnode-id="809" id="how-can-ar-in-furniture-help-expand-your-business"><span data-dcnode-id="810" instrument_node="">How can AR in furniture help expand your business</span></h3><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Being at the forefront of modern technology, you can benefits from augmented reality in the following ways:</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="801"><b data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Showcasing. </span></b><span data-dcnode-id="802" instrument_node="">Retailers are able to showcase their products visually and interactively with AR tools. A furniture store may offer customers to see how a table of a bed would look like in their house.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="796"><b data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Beat competitors. </span></b><span data-dcnode-id="797" instrument_node="">With such advanced technology as AR, you can compete and easily get ahead of the competition. Offering innovative shopping experiences leads customers your way, no doubt about it.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="791"><b data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Younger customers</span></b><span data-dcnode-id="792" instrument_node=""> and swag (in a good sense). Augmented reality apps are trending among younger audience so why not use it as a new advertising option? And unlike Virtual Reality apps that require additional equipment, AR is more widely available, and there are literally millions of smartphone owners.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="786"><b data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Trials free of risk. </span></b><span data-dcnode-id="787" instrument_node="">With an AR app, people can place a bookshelf in their rooms in a few taps on a phone. Or see how a sofa would look in brown or red color. The risk of product return and logistical expenses is minimized.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="779"><b data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">New marketing opportunities. </span></b><span data-dcnode-id="782" instrument_node="">AR offers new ways to promote your brand, to offer product information, to present new products, to offer helpful 3D experiences to customers. And most importantly, to attract more customers.</span><b data-dcnode-id="780"><span data-dcnode-id="781" instrument_node=""> &nbsp;</span></b></p><span data-dcnode-id="778" instrument_node="">
</span><h2 class="descriptionNav" data-dcnode-id="776" id="examples-of-ar-apps-in-furniture"><span data-dcnode-id="777" instrument_node="">Examples of AR apps in furniture</span></h2><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="769"><b data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">#1 </span></b><a aria-label="open link" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/us/app/ikea-place/id1279244498%3Fmt%3D8" rel="nofollow noreferrer noopener" target="_blank"><b data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">IKEA Place app</span></b></a></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">A successor of Ikea catalog app, the Place app is among the first apps to work with Apple’s ARkit and iOS system. Browsing through the catalog of 2,000 chairs, sofas, tables, and other items, we can use the phone’s camera to place them in a real room as augmented reality 3D objects. Re-positioning, moving closer or further away, different angle view is also possible. The app automatically scales items to real dimensions – Ikea is claiming a 98% rate of accuracy. All in all, a nice example of usability and marketing!</span></p><span data-dcnode-id="765" instrument_node="">
</span><div class="youtube withoutPreview" data-dcnode-id="764" data-height="450px" data-width="100%" id="qQZIzbuymrw" style="width:100%; height:450px"></div><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="757"><b data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">#2 </span></b><a aria-label="open link" data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.houzz.app" rel="nofollow noreferrer noopener" target="_blank"><b data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Houzz</span></b></a></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Houzz is the home decor company and its app offers design and renovation ideas, furniture shopping and 3D imagery. The concept is familiar – place digital furniture items in a room before buying. There are about 300,000 items in the database, and since the app’s launch the company claims that it has been increasing sales and engagement. 50% of shoppers who have bought Houzz products used the AR app to preview items.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><img alt="AR apps for furniture" class="aligncenter size-full wp-image-19086" data-dcnode-id="752" height="602" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.thinkmobiles.com/uploads/2017/10/houzz-app.jpg&amp;raw" srcset="https://static.thinkmobiles.com/uploads/2017/10/houzz-app.jpg 1000w, https://static.thinkmobiles.com/uploads/2017/10/houzz-app-300x181.jpg 300w, https://static.thinkmobiles.com/uploads/2017/10/houzz-app-768x462.jpg 768w, https://static.thinkmobiles.com/uploads/2017/10/houzz-app-500x300.jpg 500w" width="1000"></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="744"><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">#3 </span></b><a aria-label="open link" data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/it/app/augmented-furniture-lite/id853747531%3Fmt%3D8" rel="nofollow noreferrer noopener" target="_blank"><b data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Augmented Furniture </span></b></a></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">With such a name you really know what to expect :). In addition to AR options, AF offers extensive product data, ranging from models, colors, and textures to designer information. The app allows users to view and evaluate the selected items, a so-called “dimensioning tool” helps to check a maximum size. You can also save a configured objects or a furniture set or share it to social media for anyone else to see.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><img alt="Augmented Reality in Furniture" class="aligncenter size-full wp-image-19087" data-dcnode-id="739" height="563" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.thinkmobiles.com/uploads/2017/10/augmented-furniture.jpg&amp;raw" srcset="https://static.thinkmobiles.com/uploads/2017/10/augmented-furniture.jpg 1000w, https://static.thinkmobiles.com/uploads/2017/10/augmented-furniture-300x169.jpg 300w, https://static.thinkmobiles.com/uploads/2017/10/augmented-furniture-768x432.jpg 768w" width="1000"></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="731"><b data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">#4 </span></b><a aria-label="open link" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.wayfair.wayfair%26hl%3Den" rel="nofollow noreferrer noopener" target="_blank"><b data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Wayfair</span></b></a></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">A US online furniture and decor retailer Wayfair started working on augmented reality app in 2016. They have been improving it ever since with the help of ARCore by Google. So far, WayfairView app is available for Asus ZenFone and Lenovo Phab 2. This AR app allows customers to view digital images of furniture, and rotate them in different perspectives in real time as well. A great advantage in terms of business benefits is </span><b data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Add-to-cart button</span></b><span data-dcnode-id="726" instrument_node=""> that leads to the checkout page right away.</span></p><span data-dcnode-id="724" instrument_node="">
</span><div class="youtube withoutPreview" data-dcnode-id="723" data-height="450px" data-width="100%" id="-W4KtSTrnJ4" style="width:100%; height:450px"></div><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="717"><b data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">#5 </span></b><b data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Lowe’s Vision</span></b></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Though it is a beta version yet, Lowe’s Vision app promises rich AR features to let smartphone users place and design 3D imagery in more depth by means of the Tango platform and 2-camera Lenovo phones. Lowe’s partnership with Google Tango is planning to bring augmented reality to a new level. The app also allows accurate measurements in relation to room dimensions.</span></p><span data-dcnode-id="713" instrument_node="">
</span><div class="youtube withoutPreview" data-dcnode-id="712" data-height="450px" data-width="100%" id="2iPH5ZoTWs4" style="width:100%; height:450px"></div><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="708"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Updated in June 2021: The project has been discontinued.</span></strong></p><span data-dcnode-id="707" instrument_node="">
</span><h2 class="descriptionNav" data-dcnode-id="705" id="customer-expectations"><span data-dcnode-id="706" instrument_node="">Customer expectations</span></h2><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">A study called “</span><a aria-label="open link" data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.retailperceptions.com/2016/10/the-impact-of-augmented-reality-on-retail/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="702" instrument_node="">The impact of Augmented Reality on retail</span></a><span data-dcnode-id="700" instrument_node="">” conducted among 1,000 US citizens revealed that 60% have already tried out augmented reality tools for shopping. And they prefer it that way, so AR is starting to make a serious impact on the shopping experience and customer engagement. 68% of respondents also said they would want to spend more time at stores or online if it included augmented reality. Moreover, 40% stated they’d be ready to buy more expensive products.</span></p><span data-dcnode-id="698" instrument_node="">
</span><div class="text-highlight" data-dcnode-id="693"><span data-dcnode-id="697" instrument_node="">
</span><p class="text-highlight-info" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">72% of customers purchased products they hadn’t planned because of Augmented Reality.</span></p><span data-dcnode-id="694" instrument_node="">
</span></div><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Generally, people find ARpositive, helpful and fun, and 45% respondents said it had saved them time. For retailers, augmented reality presents a chance to offer more information to customers (40% of them like to learn about discounts and deals via AR).</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="688" instrument_node="">Another </span><a aria-label="open link" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//centricdigital.com/blog/augmented-reality/how-augmented-reality-could-help-retailers-increase-revenue/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="687" instrument_node="">study</span></a><span data-dcnode-id="685" instrument_node=""> by Centric Digital LLC found that people want to use AR to buy </span><b data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">furniture </span></b><span data-dcnode-id="682" instrument_node="">more than clothing, groceries, and shoes. This makes sense because there are typically different problems associated with those products and furniture.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><img alt="AR in retail" class="aligncenter size-full wp-image-19088" data-dcnode-id="679" height="426" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.thinkmobiles.com/uploads/2017/10/ar-survey.jpg&amp;raw" srcset="https://static.thinkmobiles.com/uploads/2017/10/ar-survey.jpg 900w, https://static.thinkmobiles.com/uploads/2017/10/ar-survey-300x142.jpg 300w, https://static.thinkmobiles.com/uploads/2017/10/ar-survey-768x364.jpg 768w" width="900"></p><span data-dcnode-id="677" instrument_node="">

</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Augmented Reality suits the furniture business perfectly. People want to see virtual interior design ideas in real time, and AR provides them with such ability. Finally, we want to remind that our developer team at ThinkMobiles also has augmented reality developers, that you can hire. To see what they are capable of, please check MyAR project.</span></p><span data-dcnode-id="671" instrument_node="">
