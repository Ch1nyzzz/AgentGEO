</span><section class="blog-post__body" data-blog-post-body="" data-dcnode-id="1035"><span data-dcnode-id="1387" instrument_node="">
</span><div class="rich-text" data-component="rich_text" data-dcnode-id="1037"><div data-dcnode-id="1038" id="hs_cos_wrapper_post_body"><span data-dcnode-id="1039"><div class="blog-post__lead h3" data-dcnode-id="1378"><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Augmented reality (AR) in the fashion industry is a phenomenon that’s been experimented with for a decade or so, but not in the capacity we currently see.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1383" instrument_node="">Today, the sector is quickly learning to use enhanced versions of the real physical world to its advantage. </span><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/blog/virtual-try-ons-sales" rel="noopener"><span data-dcnode-id="1382" instrument_node="">AR technologies in fashion can improve customer experience</span></a><span data-dcnode-id="1380" instrument_node=""> and boost sales. They offer a brand new way to experience products and keep customers more engaged with the brand throughout their shopping journey. </span></p></div><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">What is augmented reality? A technology that superimposes a virtual image onto the real world via a smartphone, tablet, or other enabled electronic devices. How does augmented reality work? When you start the camera on your smartphone to take a picture or record a video, an AR tool adds an object to the frame that doesn’t actually exist.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1374" instrument_node="">How is </span><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/services/virtual-try-on-software" rel="noopener"><span data-dcnode-id="1373" instrument_node="">augmented reality used in fashion</span></a><span data-dcnode-id="1371" instrument_node="">? The technology allows fashion brands to extend their customer base and product lines, make the shopping experience more interactive, creating an element of fun for the consumer. </span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Now, let’s take a look at examples of the best augmented reality in fashion retail.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><h2 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">1. Burberry: Boosting customer engagement with AR</span></h2><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">It’s impossible to discuss examples of innovations in the fashion industry without mentioning Burberry. The UK fashion house famed for trench coats  is creative with its use of AR for customer retention and brand promotion. Read on for some of the iconic company’s most successful AR endeavors.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><h3 data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">An augmented reality fashion app by Danny Sangra</span></h3><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1356" instrument_node="">Burberry collaborated with artist Danny Sangra to create ‘Burberry-inspired’ drawings for a dedicated AR feature in their iOS application. The application combined an e-commerce store with interactive brand features. With the AR component, </span><span data-dcnode-id="1354" data-style-font-weight-bold=""><span data-dcnode-id="1355" instrument_node="">users decorated their surroundings by adding Danny Sangra’s images onto their pictures</span></span><span data-dcnode-id="1353" instrument_node="">, then shared the images on social media, helping the brand reach new consumers. </span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">High-end retailers increasingly focus on reaching customers online. Why? Two thirds of luxury purchases are now influenced by digital, according to Boston Consulting Group. AR is an excellent way to provide engaging and interactive digital experiences to customers, allowing shoppers to experience brands in fresh and exciting ways.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><h3 data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">AR-powered Google shopping experience</span></h3><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1344" instrument_node="">Burberry’s collaboration with Google is another example of </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/blog/luxury-industry-in-the-metaverse" rel="noopener"><span data-dcnode-id="1343" instrument_node="">AR in fashion retail</span></a><span data-dcnode-id="1341" instrument_node="">. It cleverly brought </span><span data-dcnode-id="1339" data-style-font-weight-bold=""><span data-dcnode-id="1340" instrument_node="">the in-store shopping experience straight to shoppers’ digital devices.</span></span><span data-dcnode-id="1338" instrument_node=""> Thanks to this initiative, Burberry offered 3D images of their Black TB bag and Arthur Check Sneaker to customers searching for them online. By  typing the relevant product name in Google, consumers discovered 3D images of the items. </span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1335"></p><figure class="image" data-component="image" data-dcnode-id="1331"><span data-dcnode-id="1334" instrument_node="">
</span><img alt="Burberry_AR_mobile_app" class="image__content" data-dcnode-id="1333" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/hs-fs/hubfs/Burberry_AR_mobile_app.png%3Fwidth%3D700%26name%3DBurberry_AR_mobile_app.png&amp;raw" srcset="https://www.netguru.com/hs-fs/hubfs/Burberry_AR_mobile_app.png?width=375&amp;name=Burberry_AR_mobile_app.png 375w, https://www.netguru.com/hs-fs/hubfs/Burberry_AR_mobile_app.png?width=700&amp;name=Burberry_AR_mobile_app.png 700w, https://www.netguru.com/hs-fs/hubfs/Burberry_AR_mobile_app.png?width=2500&amp;name=Burberry_AR_mobile_app.png 2500w" width="700"><span data-dcnode-id="1332" instrument_node="">
</span></figure><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1329"></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1325"><em data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Image source: Burberry PLC. </span></em></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Collaborating with Google allowed Burberry to reach more potential customers. How? They previously offered 3D images of products, but only via their dedicated app or website. Partnering with Google broadened the reach of the retailer. </span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">Moreover, the solution not only created a more connected experience and </span><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.burberryplc.com/en/news/corporate/2020/burberry-brings-products-to-google-search-through-augmented-real.html" rel="noopener" target="_blank"><span data-dcnode-id="1319" instrument_node="">enhanced personalized luxury commerce</span></a><span data-dcnode-id="1317" instrument_node="">, but also managed customer’s expectations about items. That allowed shoppers to benefit from a more realistic view of products before buying, eliminating the need to go to the store and directly interact with the item in person, and potentially reducing the likelihood of returns.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><h3 data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Building brand buzz with pop-up AR </span></h3><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">AR in fashion retail doesn’t have to focus on selling alone: Burberry uses augmented reality across various locations to create brand energy. </span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">In 2019, they offered a cool AR experience at Ely’s Yard, a popular shopping spot in East London, installing three large porcelain fawns in glass boxes. When passers-by scanned the young deer with Google Lens apps, they saw an aerial view feed of themselves and the animals on their phones. </span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1305"></p><figure class="image" data-component="image" data-dcnode-id="1301"><span data-dcnode-id="1304" instrument_node="">
</span><img alt="Burberry_Ely_ Yard_AR" class="image__content" data-dcnode-id="1303" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/hs-fs/hubfs/Burberry_Ely_%2520Yard_AR.png%3Fwidth%3D700%26name%3DBurberry_Ely_%2520Yard_AR.png&amp;raw" srcset="https://www.netguru.com/hs-fs/hubfs/Burberry_Ely_%20Yard_AR.png?width=375&amp;name=Burberry_Ely_%20Yard_AR.png 375w, https://www.netguru.com/hs-fs/hubfs/Burberry_Ely_%20Yard_AR.png?width=700&amp;name=Burberry_Ely_%20Yard_AR.png 700w, https://www.netguru.com/hs-fs/hubfs/Burberry_Ely_%20Yard_AR.png?width=2328&amp;name=Burberry_Ely_%20Yard_AR.png 2328w" width="700"><span data-dcnode-id="1302" instrument_node="">
</span></figure><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1299"></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1294"><em data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Image source: Burberry PLC.</span></em><span data-dcnode-id="1295" instrument_node=""> </span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">In the same year, Burberry created another AR experience in Japan at the Ginza store. By scanning QR codes displayed in-store, visitors activated an AR lens to look for hidden Burberry fawns on the streets of the upmarket Tokyo neighborhood. In both cases, users shared photos on their social media channels. </span></p><span data-dcnode-id="1290" instrument_node="">
</span><h3 data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Customers immersing in a virtual world</span></h3><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Introducing augmented reality to its marketing activities gave Burberry a competitive advantage. In the past, upscale brands relied on e-commerce to sell low to mid-range luxury goods - they didn’t see online channels as suitable for high-end brand sales, believing customers could receive personalized experiences in bricks-and-mortar stores only. </span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1283" instrument_node="">However, that conviction was proven wrong. Burberry invited customers to a new, digital world and they happily followed. These days, </span><span data-dcnode-id="1281" data-style-font-weight-bold=""><span data-dcnode-id="1282" instrument_node="">shoppers immerse themselves digitally and increasingly purchase extravagant goods online</span></span><span data-dcnode-id="1280" instrument_node="">. The brand already has a solid customer base in China, where </span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techwireasia.com/2020/03/burberry-ups-its-marketing-game-with-augmented-reality/" rel="noopener" target="_blank"><span data-dcnode-id="1279" instrument_node="">almost 80% of purchases are through mobile devices</span></a><span data-dcnode-id="1277" instrument_node="">. Thus, deluxe brands shouldn’t underestimate the power of online channels for boosting sales.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">According to McKinsey, </span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/mckinsey/industries/retail/our%2520insights/luxury%2520in%2520the%2520age%2520of%2520digital%2520darwinism/the-age-of-digital-darwinism.ashx" rel="noopener" target="_blank"><span data-dcnode-id="1273" instrument_node="">one in five luxury purchases will take place online by 2025</span></a><span data-dcnode-id="1271" instrument_node="">, with customers  enthusiastically embracing the digital lifestyle. Furthermore, today, almost 80% of luxury sales are influenced through digital channels.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><h2 data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">2. Gucci: Try on shoes virtually at home</span></h2><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">Gucci created an iOS app powered by AR technology, enabling customers to remotely and virtually try on its Ace sneakers collection. The Italian brand introduced the solution in 2019, before the global lockdown era. Since then, in times of prolonged closures of physical stores, </span><span data-dcnode-id="1263" data-style-font-weight-bold=""><span data-dcnode-id="1264" instrument_node="">it’s proven one of the most effective ways to drive sales.</span></span><span data-dcnode-id="1262" instrument_node=""> Customers increasingly opt for online shopping; that trend will more than likely stay for good.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">Gucci also went a step further, partnering with Snapchat to offer a virtual trying-on experience through the multimedia instant messaging app. That clever move significantly boosted customer engagement, opening a new channel for driving sales. </span><span data-dcnode-id="1257" data-style-font-weight-bold=""><span data-dcnode-id="1258" instrument_node="">Gucci was the first luxury fashion brand to collaborate with the social media</span></span><span data-dcnode-id="1256" instrument_node=""> platform to drive sales with an AR tool. </span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1253"></p><figure class="image" data-component="image" data-dcnode-id="1249"><span data-dcnode-id="1252" instrument_node="">
</span><img alt="Gucci_iOS_app_augmented_reality" class="image__content" data-dcnode-id="1251" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/hs-fs/hubfs/Gucci_iOS_app_augmented_reality.png%3Fwidth%3D700%26name%3DGucci_iOS_app_augmented_reality.png&amp;raw" srcset="https://www.netguru.com/hs-fs/hubfs/Gucci_iOS_app_augmented_reality.png?width=375&amp;name=Gucci_iOS_app_augmented_reality.png 375w, https://www.netguru.com/hs-fs/hubfs/Gucci_iOS_app_augmented_reality.png?width=700&amp;name=Gucci_iOS_app_augmented_reality.png 700w, https://www.netguru.com/hs-fs/hubfs/Gucci_iOS_app_augmented_reality.png?width=1400&amp;name=Gucci_iOS_app_augmented_reality.png 1400w" width="700"><span data-dcnode-id="1250" instrument_node="">
</span></figure><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1247"></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1243"><em data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Image source: VentureBeat</span></em></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">Robert Triefus, Gucci’s Executive Vice-President of Brand and Customer Engagement said the fashion house’s philosophy is to </span><span data-dcnode-id="1239" data-style-font-weight-bold=""><span data-dcnode-id="1240" instrument_node="">bring immersive shopping and entertaining experiences to their customers</span></span><span data-dcnode-id="1238" instrument_node="">. Gucci seeks  to merge physical and digital reality through advanced technologies.  </span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">The idea behind this AR tool? To build a client base remotely, by offering physical experiences with digital tools. According to Triefus, Gucci is always looking for new technologies, striving to give customers unique experiences they won’t get anywhere else.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><h3 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">How did Gucci track the success of its AR solution?</span></h3><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">Robert Tiefus explained that </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DBozvxmyDTGc" rel="noopener" target="_blank"><span data-dcnode-id="1228" instrument_node="">Gucci measured the success</span></a><span data-dcnode-id="1226" instrument_node=""> of the implemented AR solution both qualitatively and quantitatively. In terms of quality, they looked at:</span></p><span data-dcnode-id="1224" instrument_node="">
</span><ul data-dcnode-id="1213"><span data-dcnode-id="1223" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Experiential engagement and the entertainment factor</span></li><span data-dcnode-id="1220" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Time users spent with the application</span></li><span data-dcnode-id="1217" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Seamlessness of customer experience: Could users try multiple sneakers with ease?</span></li><span data-dcnode-id="1214" instrument_node="">
</span></ul><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">For quantitative analysis, they looked at user and conversion metrics, as well as the number of customers moving towards the lower sales funnel, and purchase. Here, the AR-supported shopping experience generated positive ROAS (return on ad spend) for the brand.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">Gucci’sThe AR virtual try-on experience was a triumph. Originally, </span><span data-dcnode-id="1206" data-style-font-weight-bold=""><span data-dcnode-id="1207" instrument_node="">the brand initiated the campaign to generate awareness and boost engagement</span></span><span data-dcnode-id="1205" instrument_node="">, but the ability to make purchases directly from the app pushed many customers to buy the sneakers.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><h2 data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">3. ASOS: ‘See My Fit’ technology</span></h2><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1199" instrument_node="">In 2019, ASOS – one of the biggest online retailers in fashion – launched an experimental AR feature called Virtual Catwalk as part of their shopping app. The feature was designed to further enhance the online customer experience by </span><span data-dcnode-id="1197" data-style-font-weight-bold=""><span data-dcnode-id="1198" instrument_node="">helping app users visualize clothes on human models before making a purchase</span></span><span data-dcnode-id="1196" instrument_node="">. </span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1193" instrument_node="">The feature was a success, so when global lockdowns ensued and photographers and models could no longer work together on traditional campaigns, ASOS decided to scale up their application of AR in fashion retail. How? The company created a feature called ‘See My Fit’ in May 2020. That iteration offered customers the option to see how clothes fit on </span><span data-dcnode-id="1191" data-style-font-weight-bold=""><span data-dcnode-id="1192" instrument_node="">16 different models sizes four to 18, in a realistic-looking setting. </span></span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1188"></p><figure class="image" data-component="image" data-dcnode-id="1184"><span data-dcnode-id="1187" instrument_node="">
</span><img alt="ASOS_see_my_fit_AR" class="image__content" data-dcnode-id="1186" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/hs-fs/hubfs/ASOS_see_my_fit_AR.png%3Fwidth%3D700%26name%3DASOS_see_my_fit_AR.png&amp;raw" srcset="https://www.netguru.com/hs-fs/hubfs/ASOS_see_my_fit_AR.png?width=375&amp;name=ASOS_see_my_fit_AR.png 375w, https://www.netguru.com/hs-fs/hubfs/ASOS_see_my_fit_AR.png?width=700&amp;name=ASOS_see_my_fit_AR.png 700w, https://www.netguru.com/hs-fs/hubfs/ASOS_see_my_fit_AR.png?width=1790&amp;name=ASOS_see_my_fit_AR.png 1790w" width="700"><span data-dcnode-id="1185" instrument_node="">
</span></figure><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1182"></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1178"><em data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Image source: Bustle</span></em></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">The AR models are shown walking and turning around wearing selected clothes, allowing shoppers to see how sizes fit different body types, offering an even more realistic preview. ASOS’s goal? The AR tool would help customers find the right fit and simultaneously solve the pervasive problem of item returns. </span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">According to </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theindustry.fashion/asos-trials-see-my-fit-augmented-reality-tool/" rel="noopener" target="_blank"><span data-dcnode-id="1172" instrument_node="">Tim Carey, Senior Content Manager at ASOS Studios</span></a><span data-dcnode-id="1170" instrument_node="">: “With this trial of See My Fit, we’re using the latest in AR technology to put the power in our customers’ hands, so they can choose to view a dress on the model that they most identify with, in a way that wouldn’t be possible using traditional model-shooting techniques.”</span></p><span data-dcnode-id="1168" instrument_node="">
</span><h3 data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">See My Fit: Reactions</span></h3><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">With the tool, ASOS certainly made a step in the right direction, helping customers see products in context and make more informed decisions. However, the tool was criticized for being unrepresentative of ‘real’ women. </span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1161" instrument_node="">Negative comments came from PR specialist Sunny Bird, creator of Perfect Dress Company, the first UK fashion brand allowing customers to see models of all sizes wearing the same dress on a website. In her view, even though ASOS did present dresses on models of different sizes, </span><span data-dcnode-id="1159" data-style-font-weight-bold=""><span data-dcnode-id="1160" instrument_node="">they weren't inclusive enough and created false expectations</span></span><span data-dcnode-id="1158" instrument_node="">. For example, sizes above 18 were excluded from the trial. Many customers were unsatisfied with that aspect.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><h2 data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">4. Timberland’s magic mirror </span></h2><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1152" instrument_node="">The outdoor fashion retailer opted for the so-called ‘magic mirror’, an AR-powered mirror that </span><span data-dcnode-id="1150" data-style-font-weight-bold=""><span data-dcnode-id="1151" instrument_node="">virtually ‘dresses’ individuals in selected garments from a given collection</span></span><span data-dcnode-id="1149" instrument_node="">. As a result, consumers saw how they would look in specific outfits. </span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Timberland was one of the first brands to bring virtual fitting rooms to Mokotów Gallery, a shopping center in Poland. They implemented the project in collaboration with Lemon &amp; Orange, allowing customers to easily try on selected items from their latest collection. </span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1143"></p><figure class="image" data-component="image" data-dcnode-id="1139"><span data-dcnode-id="1142" instrument_node="">
</span><img alt="Timberland_Magic_Mirror_Augmented_Reality" class="image__content" data-dcnode-id="1141" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/hs-fs/hubfs/Timberland_Magic_Mirror_Augmented_Reality.png%3Fwidth%3D700%26name%3DTimberland_Magic_Mirror_Augmented_Reality.png&amp;raw" srcset="https://www.netguru.com/hs-fs/hubfs/Timberland_Magic_Mirror_Augmented_Reality.png?width=375&amp;name=Timberland_Magic_Mirror_Augmented_Reality.png 375w, https://www.netguru.com/hs-fs/hubfs/Timberland_Magic_Mirror_Augmented_Reality.png?width=700&amp;name=Timberland_Magic_Mirror_Augmented_Reality.png 700w, https://www.netguru.com/hs-fs/hubfs/Timberland_Magic_Mirror_Augmented_Reality.png?width=2786&amp;name=Timberland_Magic_Mirror_Augmented_Reality.png 2786w" width="700"><span data-dcnode-id="1140" instrument_node="">
</span></figure><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1137"></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1133"><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Image source: Lemon&amp;Orange</span></em></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node="">The virtual reality mirror reflection was displayed on a public screen, meaning </span><span data-dcnode-id="1129" data-style-font-weight-bold=""><span data-dcnode-id="1130" instrument_node="">shoppers could quickly and conveniently compare different outfits</span></span><span data-dcnode-id="1128" instrument_node="">, without the need to take their own clothes off. They could also easily seek an opinion from friends or family who accompanied them to physical stores.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">In that way, shoppers ‘tried on’ different outfits without the need to visit the fitting rooms, offering a convenient customer experience to people who didn’t want to wait in line for a vacant fitting room or simply didn’t want to change.   </span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">The smart tool was also a great way to attract new customers: The magic mirror stopped and engaged consumers who didn’t know the brand.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><h3 data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">How did Timberland’s virtual fitting room work? </span></h3><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1116" instrument_node="">The solution used Kinect technology to follow movements and scan faces. It took pictures of users virtually trying on items in front of an 80-inch mirror. Alternatively, customers could also use an app built for iPads. With that solution, </span><span data-dcnode-id="1114" data-style-font-weight-bold=""><span data-dcnode-id="1115" instrument_node="">a user took a selfie of their face and put it on a model.</span></span><span data-dcnode-id="1113" instrument_node=""> That way, they could see how they looked in a given outfit. </span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">When a shopper was satisfied, they could receive the image via email, or post it on Timberland’s fan page. Shoppers could also share their outlifts on Facebook by following the link included in the email, so their friends could comment. By connecting the mirror with social media platforms, Timberland also promoted social shopping.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><h2 data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">5. Lacoste: more than what you see in store</span></h2><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1104" instrument_node="">The last example we’d like to share with you is </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enginecreative.co.uk/portfolio/lacoste-lcst-augmented-reality-retail-campaign/" rel="noopener" target="_blank"><span data-dcnode-id="1103" instrument_node="">the mobile app created by Lacoste</span></a><span data-dcnode-id="1101" instrument_node="">. The French sports fashion brand used augmented reality technology allowing customers in physical stores to digitally ‘try on’ the entire available range of products from their LCST streetwear collection, and interact with additional content prepared by the company.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">When shoppers entered the store, they could use the dedicated app to scan trigger images on the floor and display different color ranges and style options within a given sneaker model. Next, they were able to try them on without having to take their shoes off.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1095"></p><figure class="image" data-component="image" data-dcnode-id="1091"><span data-dcnode-id="1094" instrument_node="">
</span><img alt="Lacoste_Augmented_Reality_Solution" class="image__content" data-dcnode-id="1093" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/hs-fs/hubfs/Lacoste_Augmented_Reality_Solution.png%3Fwidth%3D700%26name%3DLacoste_Augmented_Reality_Solution.png&amp;raw" srcset="https://www.netguru.com/hs-fs/hubfs/Lacoste_Augmented_Reality_Solution.png?width=375&amp;name=Lacoste_Augmented_Reality_Solution.png 375w, https://www.netguru.com/hs-fs/hubfs/Lacoste_Augmented_Reality_Solution.png?width=700&amp;name=Lacoste_Augmented_Reality_Solution.png 700w, https://www.netguru.com/hs-fs/hubfs/Lacoste_Augmented_Reality_Solution.png?width=2642&amp;name=Lacoste_Augmented_Reality_Solution.png 2642w" width="700"><span data-dcnode-id="1092" instrument_node="">
</span></figure><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1089"></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1085"><em data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Image source: Engine Creative</span></em></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1083" instrument_node="">The </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/blog/key-challenges-of-implementing-virtual-try-on-apps" rel="noopener"><span data-dcnode-id="1082" instrument_node="">app allowed consumers to conveniently make purchases</span></a><span data-dcnode-id="1080" instrument_node=""> directly from the app, offering improved customer experience to tech-savvy shoppers. With that, </span><span data-dcnode-id="1078" data-style-font-weight-bold=""><span data-dcnode-id="1079" instrument_node="">the company showed the entire offering while keeping smaller stores and less stock on display.</span></span><span data-dcnode-id="1077" instrument_node=""> The application also helped boost marketing efforts with user-generated content. How? By allowing customers to take photos and share them on social media to seek opinions from friends and family. </span></p><span data-dcnode-id="1075" instrument_node="">
</span><h3 data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">AR tool promoting ‘Bring the Colour’ campaign</span></h3><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Lacoste used the AR-powered app to channel their ‘Bring the Colour’ motto. They wanted to introduce that with a bang, needing an innovative and vibrant campaign to attract new customers and engage the existing base.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">With the app, </span><span data-dcnode-id="1066" data-style-font-weight-bold=""><span data-dcnode-id="1067" instrument_node="">shoppers could color their surroundings by scanning store window displays, in-store signage, and promotional postcards</span></span><span data-dcnode-id="1065" instrument_node=""> to access 3D video animation content. Lacoste was the first brand to combine high resolution 3D product scanning and AR to deliver an interactive product viewing experience for shoppers.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">The campaign successfully promoted the streetwear retailer as bold and edgy. Over 30,000 users interacted with high resolution 3D products using the LCST Lacoste AR app. </span></p><span data-dcnode-id="1060" instrument_node="">
</span><h2 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Augmented reality: Redefining fashion</span></h2><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1056" instrument_node="">We’ve selected several of the many examples of augmented reality in the fashion industry. </span><span data-dcnode-id="1054" data-style-font-weight-bold=""><span data-dcnode-id="1055" instrument_node="">Both high-street and luxury brands use virtual reality in a variety of ways</span></span><span data-dcnode-id="1053" instrument_node="">, from allowing customers to try on items and encouraging </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/blog/virtual-try-ons-interview" rel="noopener"><span data-dcnode-id="1052" instrument_node="">unique user-generated content for brand promotion</span></a><span data-dcnode-id="1050" instrument_node="">, to spurring creativity to play with different products and simplifying the shopping experience by allowing customers to skip queues. </span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1047" instrument_node="">By using AR tools, </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.netguru.com/industries/retail" rel="noopener"><span data-dcnode-id="1046" instrument_node="">fashion brands and online stores boost customer experience</span></a><span data-dcnode-id="1044" instrument_node=""> and engagement, driving sales. Above all, AR in fashion retail offers people a new way to experience products – something increasingly demanding consumers welcome. Using AR technology is a true advancement in the fashion industry, and an innovative way of boosting customer loyalty and </span><span data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">driving growth</span></span><span data-dcnode-id="1041" instrument_node="">. </span></p></span></div></div><span data-dcnode-id="1036" instrument_node="">
</span></section><span data-dcnode-id="1034" instrument_node="">
