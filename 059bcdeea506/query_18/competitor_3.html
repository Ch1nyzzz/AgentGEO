x" loading="lazy" srcset="//images.ctfassets.net/2d5q1td6cyxq/5Vb4GnG6WW4BPPSmZsJd5J/04506c43b3746fa33113a12eceac8c28/0__1_.jpg?w=60&amp;h=60&amp;fit=thumb, //images.ctfassets.net/2d5q1td6cyxq/5Vb4GnG6WW4BPPSmZsJd5J/04506c43b3746fa33113a12eceac8c28/0__1_.jpg?w=120&amp;h=120&amp;fit=thumb 2x"></picture></div></div></div><div class="blog-article__info-text grid-auto grid-flex-at-medium grid-align-justify" data-dcnode-id="1038"><div class="blog-article__author-names" data-dcnode-id="1041"><span class="blog-article__by-authors" data-dcnode-id="1042"><span data-dcnode-id="1046" instrument_node="">By </span><a class="blog-filter__link blog-article__author-filter-link" data-dcnode-id="1043" data-entry-id="637fpKrqsnleDdoCDcDAim" data-js-href="/us/en/townsquare?authors%5B%5D=Jennifer+Gregory" rel="nofollow"><span class="blog-filter__link-text" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Jennifer Gregory</span></span></a></span></div><div class="blog-article__published no-shrink" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">10.01.2021</span></div></div></div></section></div></header><article class="blog-article__body content-hub-body" data-dcnode-id="830"><div class="sticky-banner-waypoint-on" data-dcnode-id="1033" style="position: absolute; top: 0px;"></div><div class="auto-layout-collapse" data-dcnode-id="832"><section class="section-blog-content section-blog-content bg-white auto-layout" data-dcnode-id="833" data-entry-id="4ecK2ykbrgKrC2wuPnUPrI"><div class="content" data-dcnode-id="834"><div class="grid-2-at-large grid-space-medium" data-dcnode-id="835"><div class="column two-thirds-at-large content-width-medium gap-left-none" data-dcnode-id="863"><div class="section-blog-content__markdown" data-dcnode-id="864"><p data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">With the shift to </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//squareup.com/us/en/townsquare/how-to-take-your-omnichannel-strategy-to-the-next-level"><span data-dcnode-id="1031" instrument_node="">omnichannel</span></a><span data-dcnode-id="1029" instrument_node="">, many businesses are creating digital experiences that feel closer to stepping into a store, as well as upleveling their in-store experiences with digital elements. Some businesses are doing this by using augmented reality (AR) and virtual reality (VR) technology, allowing customers to virtually interact with products. But what is AR and VR, and how can brands start using this technology?</span></p><span data-dcnode-id="1027" instrument_node="">
</span><h2 data-dcnode-id="1025" id="what-is-augmented-reality-ar-and-virtual-reality-vr"><span data-dcnode-id="1026" instrument_node="">What is augmented reality (AR) and virtual reality (VR)?</span></h2><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">While the terms AR and VR are sometimes used interchangeably, they are different types of technology your customers can interact with.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Augmented reality (AR) enhances the real physical world with superimposed digital elements, while virtual reality (VR) is an artificial, simulated environment that provides an immersive experience.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1017" instrument_node="">According to </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zionmarketresearch.com/news/global-augmented-reality-ar-market"><span data-dcnode-id="1016" instrument_node="">Zion Market Research</span></a><span data-dcnode-id="1014" instrument_node="">, the global AR market is expected to rise up to $128 billion by 2028. With AR, the customer can see themselves interacting with items in a real-world environment, such as </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//squareup.com/us/en/townsquare/try-before-you-buy-trends"><span data-dcnode-id="1013" instrument_node="">trying on an item of jewelry or clothing</span></a><span data-dcnode-id="1011" instrument_node="">. Ikea was one of the first companies to use this concept with its </span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retaildive.com/news/ikea-nears-rollout-of-augmented-reality-app/505087/"><span data-dcnode-id="1010" instrument_node="">Ikea Place app</span></a><span data-dcnode-id="1008" instrument_node="">, which lets customers see how furniture looks in their room before buying. Another example of how you can incorporate AR: In store, when customers point their phone at a shirt or dress, for example, they can see an overlay showing that item paired with a jacket and accessories.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">You could make it a full blown experience, adding images, sound, and text to engage the customer. For example, you could play music for a customer while they use AR to shop for shoes from home as they point their phone to their feet to see what various shoes look like on. While complex AR experiences may require customers to have additional equipment, simple AR experiences only require customers to have a smartphone or tablet.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">VR can be a more fully immersive experience. For example, a VR experience can immerse a customer in the New York Fashion Week show. As they walk down the runway, their view of the crowd and other models changes. They might even hear cheers from the crowd as though they were there in person. By feeling like part of the action, customers might be more inclined to purchase the clothes that they “modeled” during the experience because the simulation allowed them to see a 360-degree angle of how the clothes looked on their body as well as a sense of how they “felt” wearing the outfits.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><div class="call-to-action" data-dcnode-id="991" data-entry-id="3lXgV21CmRqH6JeiiXXusO"><div class="bg-accent pad-small font-size-base headings-compact align-center" data-dcnode-id="992"><h5 class="gap-top-none" data-dcnode-id="998" data-title-for="3lXgV21CmRqH6JeiiXXusO"><span data-dcnode-id="999" instrument_node="">Get more business stories, delivered once a week</span></h5><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Access the best Town Square stories right in your inbox with our weekly newsletter.</span></p><div class="display-inline-block" data-dcnode-id="993" data-entry-id="2cbuGOMViDvop5C7LTiKnR"><a class="button gap-none" data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//squareup.com/us/en/l/newsletter/subscribe" target="_blank"><span data-dcnode-id="995" instrument_node="">Subscribe</span></a></div></div></div><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">Many brands have successfully used AR and VR on-premise, including educating customers on how to use the products they just purchased. </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clickz.com/how-is-ar-revolutionizing-the-in-store-experience-for-retailers/112696/"><span data-dcnode-id="988" instrument_node="">Uniqlo uses AR-enabled mirrors</span></a><span data-dcnode-id="986" instrument_node=""> in its dressing rooms but a dealership might use the technology to create a driving simulation for situations when test drives aren’t possible.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="983" instrument_node="">Customers may expect immersive experiences within the next year. According to the </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/retail/mrts/www/data/pdf/ec_current.pdf"><span data-dcnode-id="982" instrument_node="">U.S. Department of Commerce</span></a><span data-dcnode-id="980" instrument_node="">, online shopping increased more than 30% from 2019 to 2020. Square’s </span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//squareup.com/us/en/townsquare/future-of-retail"><span data-dcnode-id="979" instrument_node="">Future of Retail report</span></a><span data-dcnode-id="977" instrument_node=""> found that consumers are buying an average of 43% of monthly purchases online. As a result, brands are looking to create more immersive online experiences.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="974" instrument_node="">While AR and VR are not new concepts, the increase in digital shopping has given customers and businesses a greater appetite for the technology. In fact, 33% of businesses surveyed for Square’s </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//squareup.com/us/en/townsquare/future-of-retail"><span data-dcnode-id="973" instrument_node="">Future of Retail report</span></a><span data-dcnode-id="971" instrument_node=""> said that they were interested in providing AR and VR experiences, and 39% of Millennial and Gen Z shoppers are interested in AR and VR shopping. According to </span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foresightfactory.co/mobile-and-technology-to-the-retail-rescue/"><span data-dcnode-id="970" instrument_node="">Foresight Factory’s Future of Shopping repor</span></a><span data-dcnode-id="968" instrument_node="">t,  3 in 10 customers want virtual dressing rooms instead of going to a store for clothes.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="965" instrument_node="">AR and VR technology is becoming more prevalent. Facebook recently announced the prototype of its new virtual reality, </span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/money/companies/facebook-just-showed-us-how-well-work-in-the-metaverse-e2-80-94-heres-what-it-was-like/ar-AANvwhp%3Focid%3DBingNewsSearch"><span data-dcnode-id="964" instrument_node="">Horizon Workrooms</span></a><span data-dcnode-id="962" instrument_node="">, which creates a simulated meeting that even mimics the speakers’ hand gestures. Google showcases AR search results, allowing users to see the items they searched overlayed in their current surroundings. Snap recently </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2021/7/19/22583827/snap-vertebrae-snapchat-ar-shopping-startup-3d-assets"><span data-dcnode-id="961" instrument_node="">purchased a company</span></a><span data-dcnode-id="959" instrument_node=""> with technology that allows brands to create 3D images of their products. With this advancement and others, AR and VR will likely become an expected part of the customer experience in the near future.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="956" instrument_node="">While many smaller businesses haven’t made the leap to a fully immersive technology like virtual reality, they are dipping their toes into more virtual or online experiences. </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hotsamsdetroit.com/"><span data-dcnode-id="955" instrument_node="">Hot Sam’s</span></a><span data-dcnode-id="953" instrument_node="">, a men’s suit shop in Detroit, Michigan, offers a virtual tour of their store on their website. Samantha Shih, the owner of Boston-based custom clothing boutique </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//9tailors.com/"><span data-dcnode-id="952" instrument_node="">9Tailors</span></a><span data-dcnode-id="950" instrument_node="">, says the business is doubling down on their online store and investing in new, virtual experiences.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">“Currently you can shop on our site, buy things that you might need for your workwear. But we’re actually also investing in technology that will allow returning customers and new customers to see what types of design options we have to offer, in a more dynamic way,” she says. “We have a 3D rendering of an actual suit that will change dynamically,” explains Shih, who adds that the company is also investing in AR technology so customers can virtually try on suits.</span></p><span data-dcnode-id="945" instrument_node="">
</span><h2 data-dcnode-id="943" id="should-your-business-offer-ar-or-vr-shopping"><span data-dcnode-id="944" instrument_node="">Should your business offer AR or VR shopping?</span></h2><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Before jumping into AR or VR, make sure it’s the right fit for both your customers and your business. Here are things to consider.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Can your products be showcased by AR or VR experiences? Some products lend themselves to AR or VR technology more than others.</span></p><span data-dcnode-id="936" instrument_node="">
</span><ul data-dcnode-id="910"><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Home goods businesses can relatively easily take a page from Ikea’s playbook and create a virtual living room for staging.</span></li><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Clothing is often a prime candidate for immersive experiences, since seeing how they look on the customer is often the tipping point to convincing a customer to make the purchase.</span></li><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="924"><span data-dcnode-id="928" instrument_node="">Beauty businesses can create an AR experience similar to </span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techrepublic.com/article/how-sephora-is-leveraging-ar-and-ai-to-transform-retail-and-help-customers-buy-cosmetics/"><span data-dcnode-id="927" instrument_node="">Sephora</span></a><span data-dcnode-id="925" instrument_node=""> which allows customers to see makeup or new hairstyles applied on a digital overlay of their face.</span></li><span data-dcnode-id="923" instrument_node="">
</span><li data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">Distilleries and breweries can create an experience similar to </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retaildive.com/news/10-retailers-leading-the-way-in-ar/520520/"><span data-dcnode-id="921" instrument_node="">Patron</span></a><span data-dcnode-id="919" instrument_node=""> where customers have their own friendly bartender and get a behind-the-scenes tour of the distillery.</span></li><span data-dcnode-id="917" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Experiencing a VR downhill ski run to showcase skis that go faster and turn more quickly could help customers decide to spend more on the product.</span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">On the other hand, a retailer selling candles may not see as many benefits from AR/VR experiences if its customers predominantly make their purchases by smelling for the product they’d like to buy.</span></li><span data-dcnode-id="911" instrument_node="">
</span></ul><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Do you have the time and resources to create an experience that exceeds expectations? If you decide to create an AR or VR experience, you want to make sure you can do it in a way that won’t frustrate customers or hurt your business’s reputation. While there are technology products that allow you to create experiences with limited technical expertise, you will need to devote considerable time to designing the right experience — and you’ll also need the tech skills, either in-house or third-party, to integrate the experience into your website. The time involved depends on your current setup and the specifics of your experience.</span></p><span data-dcnode-id="906" instrument_node="">
</span><h2 data-dcnode-id="904" id="getting-started-with-ar-or-vr-shopping"><span data-dcnode-id="905" instrument_node="">Getting started with AR or VR shopping</span></h2><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Once you decide to move forward with AR or VR experiences, the following steps will guide you through the process:</span></p><span data-dcnode-id="900" instrument_node="">
</span><ul data-dcnode-id="868"><span data-dcnode-id="899" instrument_node="">
</span><li data-dcnode-id="895"><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Determine your budget.</span></strong><span data-dcnode-id="896" instrument_node=""> Costs can range depending on the experience you want customers to have and may include virtual reality designers, a new app, developers, etc. If you want to start with something low-lift as a tester, try creating a snapchat filter or an AR-light experience with a customized Instagram sticker and “try on” items for Stories .</span></li><span data-dcnode-id="894" instrument_node="">
</span><li data-dcnode-id="890"><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Decide whether you want to create an AR or VR experience.</span></strong><span data-dcnode-id="891" instrument_node=""> Because AR does not require the customer to use a headset, which can cost upwards of $200 each, many retailers opt for AR experiences. But if the customer base you want to reach is more tech-savvy and would likely own a headset, a VR experience might be worth it and set you apart from competitors.</span></li><span data-dcnode-id="889" instrument_node="">
</span><li data-dcnode-id="885"><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Choose an experience to design.</span></strong><span data-dcnode-id="886" instrument_node=""> Start with a self-contained, high-impact experience. For example, instead of rolling out the experience for all products, consider starting with clothing and then adding other items, such as furniture and artwork. You can also start with a basic clothing try-on and then expand later.</span></li><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="880"><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Research technology.</span></strong><span data-dcnode-id="881" instrument_node=""> Look for prepackaged solutions that allow you to use templates to create the type of experience you want to provide. Look for vendors that will easily integrate with your existing websites and apps.</span></li><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="875"><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Implement the experience.</span></strong><span data-dcnode-id="876" instrument_node=""> Work with your product and vendor to create your AR or VR experience and roll it out to your digital eCommerce platform. Expect the process to take longer than you think it will, and build in time for testing.</span></li><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="870"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Collect feedback.</span></strong><span data-dcnode-id="871" instrument_node=""> Use surveys to follow up with customers who use the AR or VR tools and find out what they thought of the experience. You can then continue to improve and expand your AR or VR offerings based on that feedback.</span></li><span data-dcnode-id="869" instrument_node="">
</span></ul><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">By beginning your AR or VR journey, your interactive and immersive experiences can help you stand apart from your competitors now — and set you up for the future.</span></p></div></div><aside class="column one-third-at-large font-size-small headings-compact" data-dcnode-id="836"><div class="section-blog-content__sidebar grid-space-medium grid-2-at-medium grid-1-at-large" data-dcnode-id="837"><div class="column" data-dcnode-id="838"><div class="blog-content__sidebar-item" data-dcnode-id="839" data-entry-id="FRF7ZuWZlepEjJVnOoPE1"><h6 class="font-eyebrow-small border-bottom pad-bottom-base gap-bottom-line" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Get Your Copy of the 2022 Retail Trends Report</span></h6><div class="gap-bottom-line" data-dcnode-id="846"><div class="picture uid-5QLRLV91PlHwgXEvY1Ffpe-ca35a61eefd09355a301653870efea218b5d7e2db78493eaa41d6a61098ecc13" data-dcnode-id="847"><picture class="apropos" data-dcnode-id="848"><source data-dcnode-id="860" data-srcset="//images.ctfassets.net/2d5q1td6cyxq/5QLRLV91PlHwgXEvY1Ffpe/a701276900456acee99f85486c4e3693/CTA_Retail_-_No_Button.jpg?w=299&amp;h=404&amp;fm=webp&amp;q=85&amp;fit=scale, //images.ctfassets.net/2d5q1td6cyxq/5QLRLV91PlHwgXEvY1Ffpe/a701276900456acee99f85486c4e3693/CTA_Retail_-_No_Button.jpg?w=598&amp;h=808&amp;fm=webp&amp;q=85&amp;fit=scale 2x" media="(min-width: 1292px)" srcset="//images.ctfassets.net/2d5q1td6cyxq/5QLRLV91PlHwgXEvY1Ffpe/a701276900456acee99f85486c4e3693/CTA_Retail_-_No_Button.jpg?w=299&amp;h=404&amp;fm=webp&amp;q=85&amp;fit=scale, //images.ctfassets.net/2d5q1td6cyxq/5QLRLV91PlHwgXEvY1Ffpe/a701276900456acee99f85486c4e3693/CTA_Retail_-_No_Button.jpg?w=598&amp;h=808&amp;fm=webp&amp;q=85&amp;fit=scale 2x" type="image/webp"><source data-dcnode-id="859" data-srcset="//images.ctfassets.net/2d5q1td6cyxq/5QLRLV91PlHwgXEvY1Ffpe/a701276900456acee99f85486c4e3693/CTA_Retail_-_No_Button.jpg?w=299&amp
