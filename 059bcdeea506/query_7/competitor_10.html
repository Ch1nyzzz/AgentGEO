</span><h3 data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Adobe Aero</span></h3></a><span data-dcnode-id="1587" instrument_node="">
</span><p class="subtitle" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Adobe</span></p><span data-dcnode-id="1584" instrument_node="">
</span></div><span data-dcnode-id="1582" instrument_node="">
</span><div class="description" data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">
Introducing Adobe Aero, the most intuitive way to build, view, and share immersive AR experiences. Available on iOS and as a public beta for desktop on Mac and Windows. Blur the lines between physical and digital experiences with Adobe Aero. Create augmented reality experiences using assets you’ve designed in your favorite apps — no complex coding required. Expand your creative canvas. Quickly build a scene by bringing in 2D images from Adobe Photoshop and Illustrator, or 3D models from Adobe Dimension, Substance, third-party apps like Cinema 4D, or asset libraries like Adobe Stock and TurboSquid. Aero optimizes a wide array of assets, including OBJ, GLB, and glTF files, for AR, so you can visualize them in real time. Aero adds a whole new dimension to the way designers tell stories. Make museum sculptures come to life. Send a rocket into orbit around your classroom. Or bring mascots and celebrities right into a retail store.

</span><div class="description" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">
TechViz is a virtual collaborative software for engineers to visualize your 3D data instantly from +200 3D applications like Catia, Navisworks, NX or Creo. TechViz VR software is a unique technology compatible with all VR displays: headsets, powerwalls and immersive rooms. TechViz can handle the largest models while offering fluent display. Its top level data security, enables VR collaboration on any model between multiple locations. Make changes in realtime with your far-based coworkers on the same 3D model in XR without any data conversion.
TechViz offers comprehensive features to accelerate development cycles and fully integrates in your current processes: design review, simulation of operability and ergonomics and we can answer tailored use cases through advanced capabilities.

</span><div class="description" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">
The Mirage Make application project is quite simply allowing everyone to create their own augmented reality.
Mirage Make is aimed at all those who wish to enhance a presentation, a working document or a project model, and particularly the world of education, teachers or students, who will be able to create productions enhanced by augmented reality. This creates a dynamic of motivation among the students who can easily produce captivating documents.
Integrate your content in a few clicks into a virtual reality museum in order to immerse your visitors in an exceptional visit. Your visitors access the museum by scanning a simple QRCode.
Mirage Make allows dyslexics and the visually impaired to read a document in complete autonomy , and immediately . Mirage Make makes it possible to generate, by simple copy / paste of a text , an oral dictation in order to quickly create a large number of differentiated resources for the students.

VisionLib is a multi-platform augmented reality tracking SDK. With its enhanced model tracking, it enables painless 3D object tracking for high class augmented reality applications and the most essential AR cases. Extend the context, augment objects and blend, overlay or pin digital information onto reality. VisionLib’s Model Tracking is basis for a wide range of AR applications that require high performance object recognition and precise tracking, which is essential to the digitalization of industrial processes. AR transforms how we work &amp; learn, visualizing things that would be impossible to see otherwise. It bridges gaps between digital &amp; real to deliver critical information in the context of work. Use CAD &amp; 3D data as reference for object tracking. VisionLib support multiple file formats. VisionLib is available as a Unity or native plug-in, and can be integrated into single apps or full platforms.

With the augmented reality software UBIK, Augmensys provides a powerful tool for the entire industry, branch-independent and application-oriented. UBIK accompanies an industrial plant already throughout the paperless commissioning process, directly at the construction site. Many different data sources are not a problem anymore, since they are seamlessly consolidated for efficient use. Through the whole life cycle of a plant (construction, commissioning, operation and maintenance, shutdown management) UBIK offers intuitive and mobile access to all the digital systems in the background of a plant, for inspectors, maintenance workers, engineers, and operators. The possibility to work mobile with the entire data asset of a company, edit information right on-site and send back photos and voice memos that automatically end up in the right systems, creates a highly effective work environment for anyone who has work to do in the plant.

SmartCam3D® situational awareness software provides geospatial augmented reality overlays on live video at 30+ frames per second. This technology originally served as the primary flight display for the NASA X38 during initial unmanned testing and today is deployed with US Army Tactical Unmanned Systems as a module within the Universal Ground Control Stations used in conjunction with the Hunter, Shadow, and Gray Eagle UAV Platforms. Additional integrations of this technology include EO/IR Gimbals, sUAS Pilot Applications, a plugin for the Android Tactical Assault Kit (ATAK), and a comprehensive Mission Management Application for the manned ISR market. SmartCam3D® provides enhanced situational awareness to a variety of stakeholders and end-users throughout the ISR ecosystem – from the front-line to the Operations Center.
