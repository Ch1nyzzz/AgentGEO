</span><h2 data-dcnode-id="995"><a data-dcnode-id="997" name="indication_title"></a><span data-dcnode-id="996" instrument_node="">How does this medication work? What will it do for me?</span></h2><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="993" instrument_node=""> Guanfacine belongs to the class of medications called&nbsp;</span><i data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">alpha adrenergic agonists</span></i><span data-dcnode-id="990" instrument_node="">. It is used alone and with stimulant medications to</span><b data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">&nbsp;treat symptoms of attention-deficit/hyperactivity disorder (ADHD) in children between the ages of 6 and 17 years</span></b><span data-dcnode-id="987" instrument_node="">. It should be used in combination with other, non-drug measures such as counselling to treat the symptoms of ADHD. Guanfacine is different from other medications used to treat ADHD, because&nbsp;</span><b data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">it is not a stimulant medication like methylphenidate or dextroamphetamine.</span></b><span data-dcnode-id="984" instrument_node="">&nbsp;The way that guanfacine works to treat the symptoms of ADHD has not yet been determined.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="981" instrument_node=""> </span><b data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">This medication may be available under multiple brand names and/or in several different forms.</span></b><span data-dcnode-id="978" instrument_node="">&nbsp;Any specific brand name of this medication may not be available in all of the forms or approved for all of the conditions discussed here. As well, some forms of this medication may not be used for all of the conditions discussed here.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="975" instrument_node=""> </span><b data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Your doctor may have suggested this medication for conditions other than those listed in these drug information articles.&nbsp;</span></b><span data-dcnode-id="972" instrument_node="">If you have not discussed this with your doctor or are not sure why you are taking this medication, speak to your doctor.&nbsp;</span><b data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Do not stop taking this medication without consulting your doctor.</span></b></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="964"><b data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Do not give this medication to anyone else, even if they have the same symptoms as you do.</span></b><span data-dcnode-id="965" instrument_node="">&nbsp;It can be harmful for people to take this medication if their doctor has not prescribed it.</span></p><span data-dcnode-id="963" instrument_node="">
</span><h2 data-dcnode-id="960"><a data-dcnode-id="962" name="dosage_title"></a><span data-dcnode-id="961" instrument_node="">How should I use this medication?</span></h2><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="958" instrument_node=""> The recommended starting dose for guanfacine is 1&nbsp;mg taken once daily. Your child's doctor may gradually increase the dose, based on the effectiveness and side effects of the medication. The maximum daily dose for&nbsp;</span><b data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">children 6 to 12 years of age</span></b><span data-dcnode-id="955" instrument_node="">&nbsp;is&nbsp;</span><b data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">4&nbsp;mg, taken once a day.</span></b><span data-dcnode-id="952" instrument_node="">&nbsp;For&nbsp;</span><b data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">adolescents 13 to 17 years of age,</span></b><span data-dcnode-id="949" instrument_node="">&nbsp;the maximum daily dose is&nbsp;</span><b data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">7&nbsp;mg</span></b><span data-dcnode-id="946" instrument_node="">&nbsp;when used alone or&nbsp;</span><b data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">4&nbsp;mg</span></b><span data-dcnode-id="943" instrument_node="">&nbsp;when used in combination with another medication for ADHD.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="940" instrument_node=""> Many things can affect the dose of medication that a person needs, such as body weight, other medical conditions, and other medications.&nbsp;</span><b data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">If your doctor has recommended a dose different from the ones listed here,</span></b><span data-dcnode-id="937" instrument_node="">&nbsp;do not change the way that you are taking the medication without consulting your doctor.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node=""> This medication should be swallowed whole with a small amount of liquid. Do not chew or crush the tablet as this will cause the medication to be absorbed into the body all at once, possibly causing more side effects.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node=""> Avoid taking this medication along with a meal that is high in fat.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node=""> It is important that this medication be taken exactly as prescribed by your doctor. If this medication is stopped suddenly, both blood pressure and heart rate can increase. If you feel the need to stop the medication, it should be done gradually under supervision of your doctor.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node=""> If you miss a dose, take it as soon as possible and continue with your regular schedule. If it is almost time for your next dose, skip the missed dose and continue with your regular dosing schedule.&nbsp;</span><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Do not take a double dose to make up for a missed one. If you are not sure what to do after missing a dose, contact your doctor or pharmacist for advice.</span></b><span data-dcnode-id="922" instrument_node="">&nbsp;If more than 2 doses in a row are missed, contact your doctor for instructions, since you may need to restart at a lower dose.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node=""> Store this medication at room temperature, protect it from light and moisture, and keep it out of the reach of children.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Do not dispose of medications in wastewater (e.g. down the sink or in the toilet) or in household garbage. Ask your pharmacist how to dispose of medications that are no longer needed or have expired.</span></p><span data-dcnode-id="914" instrument_node="">
</span><h2 data-dcnode-id="911"><a data-dcnode-id="913" name="availableform_title"></a><span data-dcnode-id="912" instrument_node="">What form(s) does this medication come in?</span></h2><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="902"><b data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">1&nbsp;mg</span></b><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
 Each white-to-off-white, round tablet, debossed "503" on the top and "1&nbsp;mg" on the bottom, contains guanfacine hydrochloride equivalent to 1&nbsp;mg of guanfacine. </span><i data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Nonmedicinal ingredients</span></i><span data-dcnode-id="903" instrument_node="">: crospovidone, fumaric acid, glyceryl behenate, hypromellose, lactose, methacrylic acid copolymer, microcrystalline cellulose, and povidone.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="900" instrument_node=""> </span><b data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">2&nbsp;mg</span></b><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
 Each white-to-off-white, oblong tablet, debossed "503" on the top and "2&nbsp;mg" on the bottom, contains guanfacine hydrochloride equivalent to 2&nbsp;mg of guanfacine. </span><i data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Nonmedicinal ingredients</span></i><span data-dcnode-id="893" instrument_node="">: crospovidone, fumaric acid, glyceryl behenate, hypromellose, lactose, methacrylic acid copolymer, microcrystalline cellulose, and povidone.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="890" instrument_node=""> </span><b data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">3&nbsp;mg</span></b><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
 Each green, round tablet, debossed "503" on the top and "3&nbsp;mg" on the bottom, contains guanfacine hydrochloride equivalent to 3&nbsp;mg of guanfacine.&nbsp;</span><i data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Nonmedicinal ingredients</span></i><span data-dcnode-id="883" instrument_node="">: crospovidone, fumaric acid, glyceryl behenate, hypromellose, lactose, methacrylic acid copolymer, microcrystalline cellulose, povidone, and green pigment blend PB-17633.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="880" instrument_node=""> </span><b data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">4&nbsp;mg</span></b><span data-dcnode-id="877" instrument_node="">&nbsp;</span><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">
 Each green, oblong tablet, debossed "503" on the top and "4&nbsp;mg" on the bottom, contains guanfacine hydrochloride equivalent to 4&nbsp;mg of guanfacine.&nbsp;</span><i data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Nonmedicinal ingredients</span></i><span data-dcnode-id="872" instrument_node="">: crospovidone, fumaric acid, glyceryl behenate, hypromellose, lactose, methacrylic acid copolymer, microcrystalline cellulose, povidone, and green pigment blend PB-17633.</span></p><span data-dcnode-id="870" instrument_node="">
</span><h2 data-dcnode-id="867"><a data-dcnode-id="869" name="contraindications_title"></a><span data-dcnode-id="868" instrument_node="">Who should NOT take this medication?</span></h2><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="862"><b data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Do not give this medication to your child if they are allergic to guanfacine or any ingredients of the medication.</span></b><span data-dcnode-id="863" instrument_node=""> </span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node=""> This medication is not intended to be used by children less than 6 years old or adults over the age of 17 years.</span></p><span data-dcnode-id="858" instrument_node="">
</span><h2 data-dcnode-id="855"><a data-dcnode-id="857" name="adverseeffects_title"></a><span data-dcnode-id="856" instrument_node="">What side effects are possible with this medication?</span></h2><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="850"><b data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Many medications can cause side effects.</span></b><span data-dcnode-id="851" instrument_node="">&nbsp;A side effect is an unwanted response to a medication when it is taken in normal doses. Side effects can be mild or severe, temporary or permanent.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="848" instrument_node=""> The side effects listed below are not experienced by everyone who takes this medication.&nbsp;</span><b data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">If you are concerned about side effects, discuss the risks and benefits of this medication with your doctor.</span></b></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">
 The following side effects have been reported by at least 1% of people taking this medication. Many of these side effects can be managed, and some may go away on their own over time.</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="840" instrument_node=""> </span><b data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Contact your doctor if you experience these side effects and they are severe or bothersome. Your pharmacist may be able to advise you on managing side effects.</span></b></p><span data-dcnode-id="836" instrument_node="">
</span><ul data-dcnode-id="813"><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">decreased appetite</span></li><span data-dcnode-id="832" instrument_node="">
</span><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">dizziness</span></li><span data-dcnode-id="829" instrument_node="">
</span><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">drowsiness</span></li><span data-dcnode-id="826" instrument_node="">
</span><li data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">headache</span></li><span data-dcnode-id="823" instrument_node="">
</span><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">nausea</span></li><span data-dcnode-id="820" instrument_node="">
</span><li data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">tiredness</span></li><span data-dcnode-id="817" instrument_node="">
</span><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">trouble sleeping</span></li><span data-dcnode-id="814" instrument_node="">
</span></ul><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="809"><b data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Although most of the side effects listed below don't happen very often, they could lead to serious problems if you do not seek medical attention.</span></b></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="805"><b data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Check with your doctor as soon as possible if any of the following side effects occur:</span></b></p><span data-dcnode-id="804" instrument_node="">
</span><ul data-dcnode-id="775"><span data-dcnode-id="803" instrument_node="">
</span><li data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">aggressive or hostile behavior</span></li><span data-dcnode-id="800" instrument_node="">
</span><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">dizziness when rising from a sitting or lying position</span></li><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">fainting</span></li><span data-dcnode-id="794" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">hallucinations (seeing or hearing things that aren't there)</span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">low blood pressure</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">low heart rate</span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">psychotic or manic symptoms (e.g., paranoia, delusions, unusual excitement, overactivity)</span></li><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">sleepiness</span></li><span data-dcnode-id="779" instrument_node="">
</span><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">stomach pain</span></li><span data-dcnode-id="776" instrument_node="">
</span></ul><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="768"><b data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">Stop taking the medication and seek immediate medical attention if&nbsp;</span><i data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">any</span></i><span data-dcnode-id="770" instrument_node="">&nbsp;of the following occur:</span></b></p><span data-dcnode-id="767" instrument_node="">
</span><ul data-dcnode-id="753"><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">seizures</span></li><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">signs of a serious allergic reaction (e.g., abdominal cramps, difficulty breathing, nausea and vomiting, or swelling of the face and throat)</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">signs of high blood pressure after suddenly stopping the medication (e.g., agitation, confusion, headaches, nervousness, tremors)</span></li><span data-dcnode-id="757" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">thoughts of self-harm or suicide</span></li><span data-dcnode-id="754" instrument_node="">
</span></ul><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="748"><b data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Some people may experience side effects other than those listed.&nbsp;</span></b><span data-dcnode-id="749" instrument_node="">Check with your doctor if you notice any symptom that worries you while you are taking this medication.</span></p><span data-dcnode-id="747" instrument_node="">
</span><h2 data-dcnode-id="744"><a data-dcnode-id="746" name="warnings_title"></a><span data-dcnode-id="745" instrument_node="">Are there any other precautions or warnings for this medication?</span></h2><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="740"><b data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Before you begin using a medication, be sure to inform your doctor of any medical conditions or allergies you may have, any medications you are taking, whether you are pregnant or breast-feeding, and any other significant facts about your health. These factors may affect how you should use this medication.</span></b></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="732"><b data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Abnormal heart rhythms:</span></b><span data-dcnode-id="736" instrument_node="">&nbsp;Guanfacine can cause abnormal heart rhythms. Certain medications (e.g., sotalol, quinidine, chlorpromazine, pimozide, moxifloxacin, mefloquine, pentamidine, tacrolimus) can increase the risk of a type of abnormal heart rhythm called&nbsp;</span><i data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">QT prolongation,</span></i><span data-dcnode-id="733" instrument_node="">&nbsp;and should not be used in combination with this medication. If you have been told that your child is at an increased risk of developing an abnormal heart rhythm, discuss with your doctor how this medication may affect their medical condition, how their medical condition may affect the dosing and effectiveness of this medication, and whether any special monitoring is needed.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="730" instrument_node=""> </span><b data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Blood pressure and heart rate:&nbsp;</span></b><span data-dcnode-id="727" instrument_node="">This medication</span><b data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">&nbsp;</span></b><span data-dcnode-id="724" instrument_node="">may cause decreases in blood pressure or heart rate. If you have low blood pressure or are just starting to take this medication, you should move slowly when you are rising from a sitting or lying down position to reduce the risk of dizziness.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node=""> </span><b data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Drowsiness and reduced alertness:</span></b><span data-dcnode-id="718" instrument_node="">&nbsp;Guanfacine may affect the mental or physical abilities needed to perform tasks that require special attention. Have your child avoid riding a bike, operating machinery, or performing other hazardous tasks until you have determined how this medication affects your child.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="715" instrument_node=""> </span><b data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Kidney function:</span></b><span data-dcnode-id="712" instrument_node="">&nbsp;Kidney disease or reduced kidney function may cause this medication to build up in the body, causing side effects. If your child has reduced kidney function or kidney disease, discuss with your doctor how this medication may affect their medical condition, how their medical condition may affect the dosing and effectiveness of this medication, and whether any special monitoring is needed.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="709" instrument_node=""> </span><b data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Liver function:</span></b><span data-dcnode-id="706" instrument_node="">&nbsp;Liver disease or reduced liver function may cause this medication to build up in the body, causing side effects. If your child has liver problems, discuss with their doctor how this medication may affect their medical condition, how your medical condition may affect the dosing and effectiveness of this medication, and whether any special monitoring is needed.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node=""> </span><b data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Psychiatric and behavioural concerns:&nbsp;</span></b><span data-dcnode-id="700" instrument_node="">Medications used to treat ADHD, including guanfacine, may increase symptoms of mental illnesses such as bipolar disorder, psychosis, or depression. This medication may cause people to feel agitated (restless, anxious, aggressive, emotional) and not like themselves. If you experience these side effects or notice them in a family member who is taking this medication, contact your doctor immediately. Your child should be closely monitored by your doctor for emotional and behaviour changes while taking this medication.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="697" instrument_node=""> </span><b data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Self-harm and suicide risk:</span></b><span data-dcnode-id="694" instrument_node="">&nbsp;People with ADHD may have a slightly increased risk of suicidal thoughts and behaviours. Like other medications for ADHD, guanfacine may contribute to this risk. It is important to watch for suicidal thoughts and behaviors and encourage your child to report any worrisome thoughts or feelings to you. Report any concerns to your child's doctor immediately.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="691" instrument_node=""> </span><b data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Stopping the medication:</span></b><span data-dcnode-id="688" instrument_node="">&nbsp;If this medication needs to be stopped, it should be done gradually, under the supervision of your doctor. Suddenly stopping guanfacine can cause increased blood pressure and heart rate, which, although rare, can cause serious complications, including swelling in the brain. Your doctor can advise you on how to reduce the medication slowly to reduce the risk of developing high blood pressure. If your child complains of headaches or seems confused, nervous, agitated, or has tremors, contact your child's doctor immediately.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="685" instrument_node=""> </span><b data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Pregnancy:</span></b><span data-dcnode-id="682" instrument_node="">&nbsp;This medication should not be used during pregnancy unless the benefits outweigh the risks. If you become pregnant while taking this medication, contact your doctor immediately.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="679" instrument_node=""> </span><b data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Breast-feeding:&nbsp;</span></b><span data-dcnode-id="676" instrument_node="">It is not known if guanfacine passes into breast milk. If you are a breast-feeding mother and are taking this medication, it may affect your baby. Talk to your doctor about whether you should continue breast-feeding.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="673" instrument_node=""> </span><b data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Children:</span></b><span data-dcnode-id="670" instrument_node="">&nbsp;The safety and effectiveness of using this medication have not been established for children less than 6 years old. The effectiveness of using this medication to treat ADHD has not been established for adolescents more than 17 years old.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h2 data-dcnode-id="665"><a data-dcnode-id="667" name="precautions_title"></a><span data-dcnode-id="666" instrument_node="">What other drugs could interact with this medication?</span></h2><span data-dcnode-id="664" instrument_node="">

</span><p data-dcnode-id="402"><b data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">If you are taking any of these medications, speak with your doctor or pharmacist.</span></b><span data-dcnode-id="403" instrument_node="">&nbsp;Depending on your specific circumstances, your doctor may want you to:</span></p><span data-dcnode-id="401" instrument_node="">
</span><ul data-dcnode-id="387"><span data-dcnode-id="400" instrument_node="">
</span><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">stop taking one of the medications,</span></li><span data-dcnode-id="397" instrument_node="">
</span><li data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">change one of the medications to another,</span></li><span data-dcnode-id="394" instrument_node="">
</span><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">change how you are taking one or both of the medications, or</span></li><span data-dcnode-id="391" instrument_node="">
</span><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">leave everything as is.</span></li><span data-dcnode-id="388" instrument_node="">
</span></ul><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="382"><b data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">An interaction between two medications does not always mean that you must stop taking one of them.</span></b><span data-dcnode-id="383" instrument_node="">&nbsp;Speak to your doctor about how any drug interactions are being managed or should be managed.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="380" instrument_node=""> </span><b data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Medications other than those listed above may interact with this medication.</span></b><span data-dcnode-id="377" instrument_node="">&nbsp;Tell your doctor or prescriber about all prescription, over-the-counter (non-prescription), and herbal medications you are taking. Also tell them about any supplements you take. Since caffeine, alcohol, the nicotine from cigarettes, or street drugs can affect the action of many medications, you should let your prescriber know if you use them.</span></p><span data-dcnode-id="375" instrument_node="">
