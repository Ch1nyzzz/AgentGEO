</span><h5 data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">How do I use this trijardy xr discount card?</span></h5><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Print this page and show it at the pharmacy counter when you pay for your medication.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><h5 data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Can I use this trijardy xr savings card with Medicare or my insurance?</span></h5><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">No. This discount cannot be used together with insurance. However, sometimes the discounted price is less than your co-pay, in which case you may choose to use the discount instead of your insurance. If you have Medicare and are enrolled in a Medicare Part D plan, use this discount to save on any prescriptions that are excluded from coverage.</span></p><span data-dcnode-id="1005" instrument_node="">
</span></div><span data-dcnode-id="1003" instrument_node="">
</span><div class="cell small-12 large-6 medium-6 quesAns-box" data-dcnode-id="986"><span data-dcnode-id="1002" instrument_node="">
</span><h5 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">What if the pharmacy won’t accept the discount card?</span></h5><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">The price displayed on the ScriptSave WellRx website is contracted with the pharmacy. Please contact </span><a data-dcnode-id="996" href="tel:8004078156"><span data-dcnode-id="997" instrument_node="">(800) 407-8156</span></a><span data-dcnode-id="995" instrument_node=""> and our customer care specialists will help to resolve the issue.</span></p><span data-dcnode-id="993" instrument_node="">
</span><h5 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Can I re-use my trijardy xr coupon?</span></h5><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Yes you can! However, we recommend getting a savings card as we think they are better looking. For an even better option, why not download our app so your card is always with you.</span></p><span data-dcnode-id="987" instrument_node="">

</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Prescription prices may vary from pharmacy to pharmacy and are subject to change. The pricing estimates given are based on the most recent information available and may change based on when you actually fill your prescription at the pharmacy.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="721"><strong data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">DISCOUNT ONLY - NOT INSURANCE</span></strong><span data-dcnode-id="722" instrument_node="">. Discounts are available exclusively through participating pharmacies. The range of the discounts will vary depending on the type of prescription and the pharmacy chosen. This program does not make payments directly to pharmacies. Members are required to pay for all prescription purchases. Cannot be used in conjunction with insurance. You may contact customer care anytime with questions or concerns, to cancel your registration, or to obtain further information. This program is administered by Medical Security Card Company, LLC, Tucson, AZ.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">*Average and up to savings percentages are based on all discounted prescriptions that were run through the WellRx program in 2020. Discount percentages represent savings provided off of pharmacies’ retail prices for consumers who do not have a discount program and pay cash.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">The day supply is based upon the average dispensing patterns for the specific drug and strength. The Program, as well as the prices and the list of covered drugs, can be modified at any time without notice.</span></p><span data-dcnode-id="714" instrument_node="">
