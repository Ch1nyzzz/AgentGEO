</span><div class="hi-breadcumb" data-dcnode-id="1408"><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1409" id="breadcrumbs"><span data-dcnode-id="1410"><span data-dcnode-id="1411"><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hire-intelligence.co.uk/"><span data-dcnode-id="1416" instrument_node="">Home</span></a><span data-dcnode-id="1414" instrument_node=""> &gt; </span><strong aria-current="page" class="breadcrumb_last" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">What Is The future of XR?</span></strong></span></span></p></div><span data-dcnode-id="1407" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">What Is The future of XR?</span></h1><span data-dcnode-id="1401" instrument_node=""> </span></header><span data-dcnode-id="1398" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1358"><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1393"><img alt="" class="aligncenter error" data-dcnode-id="1396" data-lazy-src="http://hire-intelligence.co.uk/wp-content/uploads/2020/04/Potential-of-VR_v2-FINAL1.jpg" data-ll-status="error" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hire-intelligence.co.uk/wp-content/uploads/2020/04/Potential-of-VR_v2-FINAL1.jpg&amp;raw"><noscript data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">&lt;img class="aligncenter" src="http://hire-intelligence.co.uk/wp-content/uploads/2020/04/Potential-of-VR_v2-FINAL1.jpg" alt="" /&gt;</span></noscript></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Extended Reality (XR) is the umbrella term now being used to describe Virtual Reality (VR) and Augmented Reality (AR) technologies. XR has come a long way since the first head-mounted display was built in 1960. Like many significant technological advances, early prototypes were sponsored by the military. In this case, extended reality was used as an immersive technology in training simulators.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">More recently, the rise of commercially available and affordable XR hardware can in part be attributed to the entertainment and gaming industry. Consumers spent more than double on XR products in 2018 than they did in 2017 and XR is now a major player in those markets. However, XR’s value as a training and educational tool is now being recognised as businesses wake up to its full potential. This increased awareness can most readily be seen in the growing number of XR-related enquiries we receive, which have increased by 394% since 2016, with a 168% increase in rentals over the same period.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><h2 data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">What can Extended Reality be used for?</span></h2><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Additionally, the hardware and software for interacting with XR have improved drastically over the years. XR technologies have improved with sophisticated tech, high-quality imaging and the perception for depth and spatial surroundings. XR software utilises improved programming, such as hand tracking and live movements, so that the environment that XR creates is very similar to the physical environment. Now, a VR headset is available for a fairly affordable price. Products like the Oculus Rift can show students the future, or introduce other emerging technologies.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">In terms of industry use, almost 50% of XR is currently used in education. The interactive technology Google Expeditions allow pupils to sit in their classroom and experience virtual worlds. Similarly, apps such as Unimersiv totally immerse students in the sights and sounds of a foreign culture and language, which is proven to aid learning and development. Indeed, 9 out of 10 teachers in the UK recognise that XR technologies would be a benefit in classroom teaching.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">In healthcare, there are many application areas of virtual reality, such as being used to train surgeons and doctors. Medical professors at Stanford University have stated their intention to educate their students on anatomy using VR technology, and a research team at Cambridge University is seeking to construct 3D models of tumours that can be explored in incredible detail.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Research into VR uses in this field has found that VR allows specialists to change in situations that are usually changing on the spot. For example, research has shown that rehearsing surgery in VR can speed up operations. It is also being used to allow health &amp; safety trainees, and emergency responders to rehearse disaster scenarios in a safe but very real looking environment. Fergus Drake, CEO of not-for-profit Crown Agents, stated: “Virtual Reality allows us to go some way in accurately conveying the pressures of a humanitarian crisis and we hope it appeals to a new generation of those wanting to work in this life-saving field.”</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Aside from educational applications, XR technology is also being used in design, architecture and engineering. Due to the possible application areas of virtual reality, architects can create 1:1 scale models of their projects, which they can then explore, manipulate and test before commencing the build. Similarly, automotive engineers sculpt new cars and engines in Virtual Reality suites, which brings down the cost of building numerous real-world prototypes.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">The many possible VR uses are also helping fashion retailers allow consumers to customise their own garments, as well as building virtual shops so customers can browse their goods from the comfort of their own home. Global furniture makers are using AR technology to allow customers to try out new furniture in their own homes before completing their purchase.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">These are just a few examples of the current and potential uses of XR technology. Hire Intelligence’s General Manager, Mark Bates, says: “The rise of XR shows no sign of abating, it’s revolutionising training and events across a variety of industries. As VR technology continues to develop there are more and more opportunities to learn about and engage with XR and the potential is hugely exciting”.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">It is clear that XR provides users with a creative way to engage in a variety of new environments through simulation technology. With this, XR also offers logical solutions to modern challenges.</span></p><span data-dcnode-id="1359" instrument_node="">
