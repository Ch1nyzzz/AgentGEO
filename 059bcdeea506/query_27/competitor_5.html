-4 0,0 z" data-dcnode-id="612" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="610" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;Unable to execute JavaScript.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div></figure><h2 data-dcnode-id="591"><span data-dcnode-id="592" id="Learning_and_Assessment_Classroom_Apps_For_Teachers"><span data-dcnode-id="593" instrument_node="">Learning and Assessment Classroom Apps For Teachers</span></span></h2><h3 data-dcnode-id="588"><span data-dcnode-id="589" id="15_Freckle"><span data-dcnode-id="590" instrument_node="">15. Freckle</span></span></h3><div class="wp-block-image" data-dcnode-id="583"><figure class="aligncenter size-full" data-dcnode-id="584"><noscript data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Freckle.jpg" alt="Freckle logo" class="wp-image-591"&gt;</span></noscript><img alt="Freckle logo" class="lazyload wp-image-591" data-dcnode-id="585" data-src="https://www.educationcorner.com/wp-content/uploads/Freckle.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="579"><a aria-label="Freckle (opens in a new tab)" data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freckle.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="582" instrument_node="">Freckle</span></a><span data-dcnode-id="580" instrument_node=""> is great! It can be used for practice and reinforcement of ideas but also contains valuable opportunities for engagement; A click from the dashboard takes you to videos and lessons from YouTube, Khan Academy and LearnZillion.</span></p><p class="has-text-align-center" data-dcnode-id="576"><strong data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Students can complete activities of work independently and earn coins to spend in the “piggy store”. </span></strong></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">There a large amount of customisable, printable worksheets in many subject areas. It is a great all-round app for use mainly with younger students in my opinion.</span></p><h3 data-dcnode-id="571"><span data-dcnode-id="572" id="16_Prodigy"><span data-dcnode-id="573" instrument_node="">16. Prodigy</span></span></h3><div class="wp-block-image" data-dcnode-id="566"><figure class="aligncenter size-full" data-dcnode-id="567"><noscript data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">&lt;img width="125" height="125" src="https://www.educationcorner.com/wp-content/uploads/prodigy.png" alt="Prodigy logo" class="wp-image-592"&gt;</span></noscript><img alt="Prodigy logo" class="lazyload wp-image-592" data-dcnode-id="568" data-src="https://www.educationcorner.com/wp-content/uploads/prodigy.png" height="125" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20125%20125%22%3E%3C/svg%3E" width="125"></figure></div><p data-dcnode-id="562"><a aria-label="Prodigy (opens in a new tab)" data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prodigygame.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="565" instrument_node="">Prodigy</span></a><span data-dcnode-id="563" instrument_node=""> is a maths game and is very engaging for students, I have seen whole classes get very competitive and work a such a fast and thorough rate through the quizzes, pitting their wits against other classes. Students need to create an account and need a parents email to sign up.</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">It is mainly aimed at practice rather than initial instruction, it gives excellent feedback for incorrect answers so really helps students of all abilities to show progress.</span></p><p data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">It is set in a fantasy world where students encounter monsters to battle (with their </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/make-math-fun/"><span data-dcnode-id="558" instrument_node="">maths skills</span></a><span data-dcnode-id="556" instrument_node="">!). As they defeat the monsters students earn coins, spells and other rewards.</span></p><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">It also has the benefit of allowing parents to track their child’s progress.</span></p><h3 data-dcnode-id="550"><span data-dcnode-id="551" id="17_Evernote"><span data-dcnode-id="552" instrument_node="">17. Evernote</span></span></h3><div class="wp-block-image" data-dcnode-id="545"><figure class="aligncenter size-full" data-dcnode-id="546"><noscript data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/evernote.png" alt="Evernote logo" class="wp-image-593"&gt;</span></noscript><img alt="Evernote logo" class="lazyload wp-image-593" data-dcnode-id="547" data-src="https://www.educationcorner.com/wp-content/uploads/evernote.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">Essentially </span><a aria-label="Evernote (opens in a new tab)" data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evernote.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="543" instrument_node="">Evernote</span></a><span data-dcnode-id="541" instrument_node=""> is a note-taking app and is great for brainstorming presentations and making lists.</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">You can create checklists, record audio notes, handwrite notes, attach files, drop links and create tables as well. It’s great for creating and organising all of your notes for every subject.</span></p><p class="has-text-align-center" data-dcnode-id="535"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">It is great for teachers and students alike.</span></strong></p><h3 data-dcnode-id="532"><span data-dcnode-id="533" id="18_Edulastic"><span data-dcnode-id="534" instrument_node="">18. Edulastic</span></span></h3><div class="wp-block-image" data-dcnode-id="527"><figure class="aligncenter size-full" data-dcnode-id="528"><noscript data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/edulastic.jpg" alt="Edulastic logo" class="wp-image-594"&gt;</span></noscript><img alt="Edulastic logo" class="lazyload wp-image-594" data-dcnode-id="529" data-src="https://www.educationcorner.com/wp-content/uploads/edulastic.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Like other apps I have mentioned teachers can share assignments with their students but as students complete their tasks, teachers can differentiate follow up instructions on an individual basis.</span></p><p data-dcnode-id="521"><a aria-label="Edulastic (opens in a new tab)" data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edulastic.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="524" instrument_node="">Edulastic</span></a><span data-dcnode-id="522" instrument_node=""> even works seamlessly with Google Classroom.</span></p><h3 data-dcnode-id="518"><span data-dcnode-id="519" id="19_Quizalize"><span data-dcnode-id="520" instrument_node="">19. Quizalize</span></span></h3><div class="wp-block-image" data-dcnode-id="513"><figure class="aligncenter size-full" data-dcnode-id="514"><noscript data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/quizalize.jpg" alt="Quizalize logo" class="wp-image-595"&gt;</span></noscript><img alt="Quizalize logo" class="lazyload wp-image-595" data-dcnode-id="515" data-src="https://www.educationcorner.com/wp-content/uploads/quizalize.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="509"><a aria-label="Quizalize (opens in a new tab)" data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quizalize.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="512" instrument_node="">Quizalize</span></a><span data-dcnode-id="510" instrument_node=""> can be used as a pre-assessment tool as well as for summative and formative assessments.</span></p><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Students can design their own quizzes to challenge classmates and teachers can share the results of all quizzes with the class (there is a tool to hide anything that identifies the students when doing this).</span></p><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">It contains a multiple-choice mode and survey and self-reflection tools.</span></p><h3 data-dcnode-id="502"><span data-dcnode-id="503" id="20_Nearpod"><span data-dcnode-id="504" instrument_node="">20. Nearpod</span></span></h3><div class="wp-block-image" data-dcnode-id="497"><figure class="aligncenter size-full" data-dcnode-id="498"><noscript data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/nearpod.png" alt="Nearpod logo" class="wp-image-596"&gt;</span></noscript><img alt="Nearpod logo" class="lazyload wp-image-596" data-dcnode-id="499" data-src="https://www.educationcorner.com/wp-content/uploads/nearpod.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">Teachers can create entire lessons on </span><a aria-label="Nearpod (opens in a new tab)" data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nearpod.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="495" instrument_node="">Nearpod</span></a><span data-dcnode-id="493" instrument_node=""> or use one of a huge number of pre-made lessons (some are free, others chargeable).</span></p><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">You can even upload your PowerPoint lessons to Nearpod but the formatting can be a little off doing it this way but can easily be rectified in the Nearpod dashboard.</span></p><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">When teaching a Nearpod lesson, teachers share the lesson to the screen of all students and can play videos to each individual screen.</span></p><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">You can take polls or ask questions that students can respond to, the teacher gets all the answers individually and can share model answers to the screen of all students. It can take a little while to get prepared but the benefits far outweigh this minor inconvenience.</span></p><h3 data-dcnode-id="483"><span data-dcnode-id="484" id="21_Formative"><span data-dcnode-id="485" instrument_node="">21. Formative</span></span></h3><div class="wp-block-image" data-dcnode-id="478"><figure class="aligncenter size-full" data-dcnode-id="479"><noscript data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/formative.jpg" alt="Formative logo" class="wp-image-597"&gt;</span></noscript><img alt="Formative logo" class="lazyload wp-image-597" data-dcnode-id="480" data-src="https://www.educationcorner.com/wp-content/uploads/formative.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="473"><span data-dcnode-id="477" instrument_node="">With </span><a aria-label="Formative (opens in a new tab)" data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goformative.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="476" instrument_node="">Formative</span></a><span data-dcnode-id="474" instrument_node="">, teachers can create formative assessments that students can complete at their own pace and submit them on their device.</span></p><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">One brilliant feature is that it allows file uploads and video and audio to be embedded in the assessments.</span></p><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">You can even attach a Quizlet (see review below).</span></p><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">All data from the assessments can be gathered during or after the lessons to inform future lessons and to challenge misconceptions.</span></p><h3 data-dcnode-id="464"><span data-dcnode-id="465" id="22_Plickers"><span data-dcnode-id="466" instrument_node="">22. Plickers</span></span></h3><div class="wp-block-image" data-dcnode-id="459"><figure class="aligncenter size-full" data-dcnode-id="460"><noscript data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Plickers.png" alt="Plickers logo" class="wp-image-598"&gt;</span></noscript><img alt="Plickers logo" class="lazyload wp-image-598" data-dcnode-id="461" data-src="https://www.educationcorner.com/wp-content/uploads/Plickers.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="455"><a aria-label="Plickers (opens in a new tab)" data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plickers.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="458" instrument_node="">Plickers</span></a><span data-dcnode-id="456" instrument_node=""> is very accessible for ALL students as it doesn’t require students to have a device at all!</span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Teachers set up their assessments on the Plickers website and create classes with the names of their student, they use the Plicker app on their phone to control the live quiz.</span></p><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Each student is given a pre-printed card (a paper clicker…Plicker!). The is quiz projected on to the screen in the class. The students then hold up their “Plicker” and the teacher then scans the class with the camera tool on the app.</span></p><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">The app then records the student’s responses and collates the scores on the projected screen.</span></p><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">This is great for introductions or end of lesson formative assessments. Plickers really builds engagement and students really enjoy the interactive quizzes.</span></p><h3 data-dcnode-id="444"><span data-dcnode-id="445" id="23_Edpuzzle"><span data-dcnode-id="446" instrument_node="">23. Edpuzzle</span></span></h3><div class="wp-block-image" data-dcnode-id="439"><figure class="aligncenter size-full" data-dcnode-id="440"><noscript data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/edpuzzle.png" alt="Edpuzzle logo" class="wp-image-599"&gt;</span></noscript><img alt="Edpuzzle logo" class="lazyload wp-image-599" data-dcnode-id="441" data-src="https://www.educationcorner.com/wp-content/uploads/edpuzzle.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="435"><a aria-label="Edpuzzle (opens in a new tab)" data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edpuzzle.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="438" instrument_node="">Edpuzzle</span></a><span data-dcnode-id="436" instrument_node=""> utilises any high-quality videos that can be uploaded from YouTube, TedTalks, Khan Academy etc.</span></p><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">They can be clipped to only show the portion that you want the use and you can record a voice-over of instructions for your students.</span></p><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The best part of Edpuzzle is that it allows you to insert quizzes into the video for your students to do.</span></p><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Edpuzzle is an excellent flipped lesson tool.</span></p><h3 data-dcnode-id="426"><span data-dcnode-id="427" id="24_StudyBlue"><span data-dcnode-id="428" instrument_node="">24. StudyBlue</span></span></h3><div class="wp-block-image" data-dcnode-id="421"><figure class="aligncenter size-full" data-dcnode-id="422"><noscript data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/studyblue.jpg" alt="StudyBlue logo" class="wp-image-600"&gt;</span></noscript><img alt="StudyBlue logo" class="lazyload wp-image-600" data-dcnode-id="423" data-src="https://www.educationcorner.com/wp-content/uploads/studyblue.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="417"><a aria-label="StudyBlue (opens in a new tab)" data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studyblue.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="420" instrument_node="">StudyBlue</span></a><span data-dcnode-id="418" instrument_node=""> utilises flashcards but all wrapped up in an app. They can be viewed on any device by logging into your StudyBlue account.</span></p><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Audio and Video can also be added to the flashcards. The Flashcards can then be shared with your students or students can share them with each other to help study or revise for tests.</span></p><p class="has-text-align-center" data-dcnode-id="412"><strong data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">A simple digital solution that like the original flashcards works fabulously!</span></strong></p><h2 data-dcnode-id="409"><span data-dcnode-id="410" id="Quiz_Classroom_Apps_For_Teachers"><span data-dcnode-id="411" instrument_node="">Quiz Classroom Apps For Teachers</span></span></h2><h3 data-dcnode-id="406"><span data-dcnode-id="407" id="25_Quizizz"><span data-dcnode-id="408" instrument_node="">25. Quizizz</span></span></h3><div class="wp-block-image" data-dcnode-id="401"><figure class="aligncenter size-full" data-dcnode-id="402"><noscript data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/quizizz.png" alt="Quizizz logo" class="wp-image-601"&gt;</span></noscript><img alt="Quizizz logo" class="lazyload wp-image-601" data-dcnode-id="403" data-src="https://www.educationcorner.com/wp-content/uploads/quizizz.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Quizizz provides a huge amount of ready-made quizzes for students to take (Teachers can also create their own).</span></p><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Students answer the questions on their device and a leaderboard is generated on the main classroom screen.</span></p><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Teachers get a report after the quiz where they can use the data to inform future lessons.</span></p><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Quizizz can also be launched through Google Classroom, which is a neat feature.</span></p><h3 data-dcnode-id="390"><span data-dcnode-id="391" id="26_Kahoot"><span data-dcnode-id="392" instrument_node="">26. Kahoot</span></span></h3><div class="wp-block-image" data-dcnode-id="385"><figure class="aligncenter size-full" data-dcnode-id="386"><noscript data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">&lt;img width="300" height="300" src="https://www.educationcorner.com/wp-content/uploads/Kahoot.png" alt="Kahoot logo" class="wp-image-602" srcset="https://www.educationcorner.com/wp-content/uploads/Kahoot.png 300w, https://www.educationcorner.com/wp-content/uploads/Kahoot-150x150.png 150w" sizes="(max-width: 300px) 100vw, 300px"&gt;</span></noscript><img alt="Kahoot logo" class="lazyload wp-image-602" data-dcnode-id="387" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://www.educationcorner.com/wp-content/uploads/Kahoot.png" data-srcset="https://www.educationcorner.com/wp-content/uploads/Kahoot.png 300w, https://www.educationcorner.com/wp-content/uploads/Kahoot-150x150.png 150w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20300%20300%22%3E%3C/svg%3E" width="300"></figure></div><p data-dcnode-id="381"><a aria-label="Kahoot (opens in a new tab)" data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kahoot.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="384" instrument_node="">Kahoot</span></a><span data-dcnode-id="382" instrument_node=""> is very similar to Quizizz in the way it runs. It is the one that I personally use. It not only has educational quizzes but a vast amount of fun user-made quizzes too.</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">It is fantastic for formative assessment or just for end of term fun. I like to run a quiz in my class but also join it from my phone, this builds a huge level of engagement with all my students trying to beat me</span></p><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">(Tip: always practise the test at home first so your students have no chance of beating you!)</span></p><h3 data-dcnode-id="374"><span data-dcnode-id="375" id="27_Gimkit"><span data-dcnode-id="376" instrument_node="">27. Gimkit</span></span></h3><div class="wp-block-image" data-dcnode-id="369"><figure class="aligncenter size-full" data-dcnode-id="370"><noscript data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Gimkit.jpg" alt="Gimkit logo" class="wp-image-603"&gt;</span></noscript><img alt="Gimkit logo" class="lazyload wp-image-603" data-dcnode-id="371" data-src="https://www.educationcorner.com/wp-content/uploads/Gimkit.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="365"><a aria-label="Gimkit (opens in a new tab)" data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gimkit.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="368" instrument_node="">Gimkit</span></a><span data-dcnode-id="366" instrument_node=""> is similar to Kahoot and Quizziz but supercharged.</span></p><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">It allows students to take quizzes in a similar fashion to the other two but unlike both Kahoot and Quizizz students answer questions independently earning “cash” for correct answers.</span></p><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">The quizzes are time-based or are by the amount of cash earned.</span></p><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Teachers can create their own “kit” (quiz) or use a quizlet, it is VERY easy to set up.</span></p><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">A new feature just released is assignments that can be set in the same way as Google Classroom (In fact Gimkit quizzes can now be set in Google Classroom.</span></p><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">The first few kits you set up are free but after that, there is a monthly subscription, the reason for this is that it was created by high school students as a school project and therefore can’t have advertising on there.</span></p><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">It is less than $10 a month and in my opinion well worth that amount.</span></p><h3 data-dcnode-id="350"><span data-dcnode-id="351" id="28_Quizlet"><span data-dcnode-id="352" instrument_node="">28. Quizlet</span></span></h3><div class="wp-block-image" data-dcnode-id="345"><figure class="aligncenter size-full" data-dcnode-id="346"><noscript data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/quizlet.png" alt="Quizlet logo" class="wp-image-604"&gt;</span></noscript><img alt="Quizlet logo" class="lazyload wp-image-604" data-dcnode-id="347" data-src="https://www.educationcorner.com/wp-content/uploads/quizlet.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="341"><a aria-label="Quizlet (opens in a new tab)" data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quizlet.com/en-gb" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="344" instrument_node="">Quizlet</span></a><span data-dcnode-id="342" instrument_node=""> is another quiz app (shocking!) like Quizizz, Kahoot and Gimkit but it also has other tools built-in.</span></p><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">It has flashcards and games. Again, you can make your own resources or use ones that are already made by other users.</span></p><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">As we have seen in a few of the above reviews, you can embed a Quizlet into some other apps, making Quizlet a very versatile tool for the classroom.</span></p><h2 data-dcnode-id="334"><span data-dcnode-id="335" id="Augmented_Reality_Classroom_Apps_For_Teachers"><span data-dcnode-id="336" instrument_node="">Augmented Reality Classroom Apps For Teachers</span></span></h2><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Augmented reality is changing the face of classroom apps for teachers, they can literally bring infinite possibilities into the classroom. I’ve tried to describe them in my reviews but I realised that it was tricky to adequately describe their depth with just words so I’ve included some YouTube clips so you can see how augmented reality works.</span></p><h3 data-dcnode-id="329"><span data-dcnode-id="330" id="29_ChatterPix_Kids"><span data-dcnode-id="331" instrument_node="">29. ChatterPix Kids</span></span></h3><div class="wp-block-image" data-dcnode-id="324"><figure class="aligncenter size-full" data-dcnode-id="325"><noscript data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/chatterpix-kids.png" alt="ChatterPix Kids logo" class="wp-image-605"&gt;</span></noscript><img alt="ChatterPix Kids logo" class="lazyload wp-image-605" data-dcnode-id="326" data-src="https://www.educationcorner.com/wp-content/uploads/chatterpix-kids.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="320"><a aria-label="ChatterPix (opens in a new tab)" data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.duckduckmoose.com/educational-iphone-itouch-apps-for-kids/chatterpixkids/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="323" instrument_node="">ChatterPix</span></a><span data-dcnode-id="321" instrument_node=""> is great fun and has classroom applications for both students and teachers.</span></p><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">It allows the user to animate pictures from your device and make them say anything you want them to.</span></p><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Students could use it to present work they’ve done on a historical figure or teachers could use it as a great hook to introduce a topic or to challenge common misconceptions.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="312"><div class="wp-block-embed__wrapper" data-dcnode-id="313"><span data-dcnode-id="315" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="314" frameborder="0" height="433" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/_Iom-DiDIc8%3Ffeature%3Doembed&amp;raw" title="How to use Chatterpix - WeGo Tech" width="770"></iframe></div></figure><h3 data-dcnode-id="309"><span data-dcnode-id="310" id="30_Curiscope_Virtuali-tee"><span data-dcnode-id="311" instrument_node="">30. Curiscope Virtuali-tee</span></span></h3><div class="wp-block-image" data-dcnode-id="304"><figure class="aligncenter size-full" data-dcnode-id="305"><noscript data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/curiscope.jpg" alt="Curiscope logo" class="wp-image-606"&gt;</span></noscript><img alt="Curiscope logo" class="lazyload wp-image-606" data-dcnode-id="306" data-src="https://www.educationcorner.com/wp-content/uploads/curiscope.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">This one was actually shown to me by one of my year 8 students (who’s mum is an anatomy professor at a local university).</span></p><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">As a Science teacher, I find this app super useful in the classroom but it is also amazing for bringing awe and wonder to younger children too.</span></p><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">It has huge learning potential!</span></p><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">You have to buy a curiscope t-shirt for the app to work but the cost is by far outweighed by the benefit.</span></p><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">When you point the camera tool in the app at someone wearing the t-shirt (or the t-shirt on a hanger) you can see an augmented reality projection of the internal anatomy of the wearer! I</span></p><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">t also works with the camera on selfie mode to allow your students to look inside their own body!</span></p><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">It has clickable parts to the images and audio descriptions and videos that describe the functions of different organs.</span></p><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">There’s also the option to explore with a VR headset but this doesn’t work in selfie mode and it might be a challenge to persuade a friend to stand still for a long time unless you’ve both got t-shirts and headsets.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="284"><div class="wp-block-embed__wrapper" data-dcnode-id="285"><span data-dcnode-id="287" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="286" frameborder="0" height="433" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/4awgo7ni0b8%3Ffeature%3Doembed&amp;raw" title="Curiscope in the Classroom  - St Bartholomew's" width="770"></iframe></div></figure><h3 data-dcnode-id="281"><span data-dcnode-id="282" id="31_Green_Screen"><span data-dcnode-id="283" instrument_node="">31. Green Screen</span></span></h3><div class="wp-block-image" data-dcnode-id="276"><figure class="aligncenter size-full" data-dcnode-id="277"><noscript data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Green-Screen.jpg" alt="Green Screen logo" class="wp-image-607"&gt;</span></noscript><img alt="Green Screen logo" class="lazyload wp-image-607" data-dcnode-id="278" data-src="https://www.educationcorner.com/wp-content/uploads/Green-Screen.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="271"><span data-dcnode-id="275" instrument_node="">For years we’ve seen green screen technology in films and TV shows but now </span><a aria-label="Green Screen (opens in a new tab)" data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.doink.com/post/65521377506/easy-to-use-green-screen-app-by-doink-available" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="274" instrument_node="">Green Screen</span></a><span data-dcnode-id="272" instrument_node=""> gives you the same experience in your classroom!</span></p><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">The possibilities are endless!</span></p><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">You don’t need expensive equipment or a dedicated green screen studio. Just the app and maybe a green curtain or plastic tablecloth (from a dollar/pound shop).</span></p><p class="has-text-align-center" data-dcnode-id="264"><strong data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Put yourself or your students into space, at famous monuments or buildings around the world or even undersea!</span></strong></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-4-3 wp-has-aspect-ratio" data-dcnode-id="260"><div class="wp-block-embed__wrapper" data-dcnode-id="261"><span data-dcnode-id="263" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="262" frameborder="0" height="578" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/QlH3h19ablI%3Ffeature%3Doembed&amp;raw" title="Easy-to-Use Green Screen by DoInk App Enables Creation of Green Screen Effects on iPhone and iPad" width="770"></iframe></div></figure><h3 data-dcnode-id="257"><span data-dcnode-id="258" id="32_Thinglink"><span data-dcnode-id="259" instrument_node="">32. Thinglink</span></span></h3><div class="wp-block-image" data-dcnode-id="252"><figure class="aligncenter size-full" data-dcnode-id="253"><noscript data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Thinglink.jpg" alt="Thinglink logo" class="wp-image-608"&gt;</span></noscript><img alt="Thinglink logo" class="lazyload wp-image-608" data-dcnode-id="254" data-src="https://www.educationcorner.com/wp-content/uploads/Thinglink.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="247"><span data-dcnode-id="251" instrument_node="">The </span><a aria-label="Thinglink (opens in a new tab)" data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thinglink.com/edu" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="250" instrument_node="">Thinglink</span></a><span data-dcnode-id="248" instrument_node=""> app is amazing for so many classroom activities.</span></p><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">It is a web-based tool that lets you add text, video or web-links to a picture.</span></p><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">The interactive images you create can be shared on social media, links or can be embedded into a web page.</span></p><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Like many of the other augmented reality apps in this review, the possibilities for classroom applications are endless!</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-4-3 wp-has-aspect-ratio" data-dcnode-id="237"><div class="wp-block-embed__wrapper" data-dcnode-id="238"><span data-dcnode-id="240" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="239" frameborder="0" height="578" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/D5F226Ck8xg%3Ffeature%3Doembed&amp;raw" title="ThingLink For Teachers" width="770"></iframe></div></figure><h3 data-dcnode-id="234"><span data-dcnode-id="235" id="33_Apple_Clips"><span data-dcnode-id="236" instrument_node="">33. Apple Clips</span></span></h3><div class="wp-block-image" data-dcnode-id="229"><figure class="aligncenter size-full" data-dcnode-id="230"><noscript data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Apple-Clips.jpg" alt="Apple Clips logo" class="wp-image-609"&gt;</span></noscript><img alt="Apple Clips logo" class="lazyload wp-image-609" data-dcnode-id="231" data-src="https://www.educationcorner.com/wp-content/uploads/Apple-Clips.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Where there is an opportunity for new tech ideas…you’ll find an Apple version somewhere and while this isn’t necessarily an augmented reality app it’s close!</span></p><p data-dcnode-id="223"><a aria-label="Apple clips (opens in a new tab)" data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apple.com/uk/clips/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="226" instrument_node="">Apple clips</span></a><span data-dcnode-id="224" instrument_node=""> has many possible uses in the classroom. I find it great for flipped learning and to introduce a lesson. It’s also great for student project presentation work.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="219"><div class="wp-block-embed__wrapper" data-dcnode-id="220"><span data-dcnode-id="222" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="221" frameborder="0" height="433" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0BVV3R0p0cA%3Ffeature%3Doembed&amp;raw" title="How to use Apple Clips" width="770"></iframe></div></figure><h3 data-dcnode-id="216"><span data-dcnode-id="217" id="34_HP_Reveal"><span data-dcnode-id="218" instrument_node="">34. HP Reveal</span></span></h3><div class="wp-block-image" data-dcnode-id="211"><figure class="aligncenter size-full" data-dcnode-id="212"><noscript data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/HP-Reveal.jpg" alt="HP Reveal logo" class="wp-image-610"&gt;</span></noscript><img alt="HP Reveal logo" class="lazyload wp-image-610" data-dcnode-id="213" data-src="https://www.educationcorner.com/wp-content/uploads/HP-Reveal.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="207"><a aria-label="HP Reveal (opens in a new tab)" data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hpreveal.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="210" instrument_node="">HP Reveal</span></a><span data-dcnode-id="208" instrument_node=""> (formerly called Aurasma) is an app that allows the user to create augmented reality triggers in textbooks, class posters or even school bulletin boards.</span></p><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">You take a picture of the “trigger” and add instructions, image or videos that pop up when a student scans that trigger with the app.</span></p><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">You could use a section from a textbook as a trigger that then brings up further learning opportunities when your students scan it.</span></p><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">You could use it on field trips (e.g. a museum) where students can scan areas of the museum that you have set up ahead of time to reveal the learning intentions that you want them to achieve.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="197"><div class="wp-block-embed__wrapper" data-dcnode-id="198"><span data-dcnode-id="200" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="199" frameborder="0" height="433" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/lTGpjG_T7z8%3Ffeature%3Doembed&amp;raw" title="Teachers: How to use HP Reveal app" width="770"></iframe></div></figure><h3 data-dcnode-id="194"><span data-dcnode-id="195" id="35_Figment_AR"><span data-dcnode-id="196" instrument_node="">35. Figment AR</span></span></h3><div class="wp-block-image" data-dcnode-id="189"><figure class="aligncenter size-full" data-dcnode-id="190"><noscript data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Figment-AR.png" alt="Figment AR logo" class="wp-image-611"&gt;</span></noscript><img alt="Figment AR logo" class="lazyload wp-image-611" data-dcnode-id="191" data-src="https://www.educationcorner.com/wp-content/uploads/Figment-AR.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">I’ve saved the best augmented reality app (in my opinion) to last.</span></p><p data-dcnode-id="183"><a aria-label="Figment AR (opens in a new tab)" data-dcnode-id="185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.apple.com/gb/app/figment-ar/id1270018902" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="186" instrument_node="">Figment AR</span></a><span data-dcnode-id="184" instrument_node=""> allows you to completely manipulate the world around you.</span></p><p data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Place animated 3D objects and creatures around you class or portals to different worlds. Add in stock images or videos to the portals or ones you have taken yourself.</span></p><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">No longer does your classroom just have 4 walls and a door, you can now take a journey anywhere in the world and beyond. I have been using this one a lot this year!</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="175"><div class="wp-block-embed__wrapper" data-dcnode-id="176"><span data-dcnode-id="178" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="177" frameborder="0" height="433" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/hR8j6kClRRs%3Ffeature%3Doembed&amp;raw" title="Figment App Preview" width="770"></iframe></div></figure><h2 data-dcnode-id="172"><span data-dcnode-id="173" id="Which_Educational_Apps_for_Students_are_you_Going_to_Use_and_What_are_the_Apps_you_NEED"><span data-dcnode-id="174" instrument_node="">Which Educational Apps for Students are you Going to Use and What are the Apps you NEED?</span></span></h2><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">I’m sure that you have some good ideas for what educational apps for students you could use in your lessons now.</span></p><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">From the research I’ve done for this post I know I will be trying some new ones this year and I’m excited to do so.</span></p><p data-dcnode-id="165"><strong data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Do you know any better ones? </span></strong></p><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">If so, email me or comment below and I’ll include your thoughts.</span></p><h4 data-dcnode-id="160"><b data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Similar Posts:</span></b></h4><ul class="similar-posts" data-dcnode-id="144"><li data-dcnode-id="157"><a data-dcnode-id="158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/benefits-of-ict-in-teaching-a
