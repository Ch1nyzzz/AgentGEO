></noscript><img alt="Photo of author" class="avatar avatar-30 photo dynamic-author-image dynamic-author-image-rounded lazyloaded" data-dcnode-id="1821" data-src="https://www.educationcorner.com/wp-content/uploads/becton-loveless-author-30x30.jpg" data-srcset="https://www.educationcorner.com/wp-content/uploads/becton-loveless-author-60x60.jpg 2x" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/wp-content/uploads/becton-loveless-author-30x30.jpg&amp;raw" srcset="https://www.educationcorner.com/wp-content/uploads/becton-loveless-author-60x60.jpg 2x" width="30"><div class="gb-headline gb-headline-3fb4928a gb-headline-text" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Becton Loveless</span></div><div class="gb-headline gb-headline-f9b55781 gb-headline-text" data-dcnode-id="1815"><span data-dcnode-id="1818" instrument_node="">Last Updated: </span><time class="entry-date updated-date" data-dcnode-id="1816" datetime="2022-04-12T09:24:52+00:00"><span data-dcnode-id="1817" instrument_node="">April 12, 2022</span></time></div></div></div><p data-dcnode-id="1812"></p></header><div class="entry-content" data-dcnode-id="143" itemprop="text"><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">There are so many different educational apps for students out there and because we have such busy schedules it can be a bit of a gamble choosing the right ones, especially as they can sometimes take a while to set up with all of our classes.</span></p><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">This has certainly been the case for me; I start the year intending to break out all the bells and whistles but I end up getting bogged down in the everyday running of my classes and the thought of investing time in researching apps and getting them set up seems too bigger task.</span></p><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">In this post, I review 35 of the most popular and innovative teacher apps. They are not ranked in any order.</span></p><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Which ones will you be using?</span></p><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">I have arranged the educational apps for students reviews into the following sections:</span></p><ul class="td-arrow-list" data-dcnode-id="1788"><li data-dcnode-id="1798"><strong data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Classroom Management.</span></strong></li><li data-dcnode-id="1795"><strong data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Learning and Assessment.</span></strong></li><li data-dcnode-id="1792"><strong data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Quizzes.</span></strong></li><li data-dcnode-id="1789"><strong data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Augmented Reality.</span></strong></li></ul><div class="lwptoc lwptoc-light lwptoc-notInherit" data-dcnode-id="1490" data-lwptoc-initialized="1" data-smooth-scroll="1" data-smooth-scroll-offset="24"><div class="lwptoc_i" data-dcnode-id="1491"><div class="lwptoc_header" data-dcnode-id="1778"><span data-dcnode-id="1787" instrument_node=""> </span><b class="lwptoc_title" data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Contents</span></b><span data-dcnode-id="1784" instrument_node=""> </span><span class="lwptoc_toggle" data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node=""> </span><a class="lwptoc_toggle_label" data-dcnode-id="1781" data-label="hide" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/35-incredible-classroom-apps/"><span data-dcnode-id="1782" instrument_node="">show</span></a><span data-dcnode-id="1780" instrument_node=""> </span></span></div><div class="lwptoc_items" data-dcnode-id="1492" style="display:none;"><div class=" cnode-id="1480"><noscript data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">&lt;img width="300" height="220" src="https://www.educationcorner.com/wp-content/uploads/GC1.png" alt="Google classroom logo" class="wp-image-576"&gt;</span></noscript><img alt="Google classroom logo" class="lazyload wp-image-576" data-dcnode-id="1481" data-src="https://www.educationcorner.com/wp-content/uploads/GC1.png" height="220" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20300%20220%22%3E%3C/svg%3E" width="300"></figure></div><p data-dcnode-id="1475"><a aria-label="Google Classroom (opens in a new tab)" data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//classroom.google.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1478" instrument_node="">Google Classroom</span></a><span data-dcnode-id="1476" instrument_node=""> is excellent.</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">I have been using it for a couple of years now and it has revolutionised my teaching.</span></p><p class="has-text-align-center" data-dcnode-id="1470"><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">It pulls together all of the G-Suite apps (Docs, Slides, Sheets and Draw). </span></strong></p><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Teachers can create assignments and announcements for individual classes. They can attach worksheets slideshows or weblinks (along with many other things) and set deadlines.</span></p><p data-dcnode-id="1463"><span data-dcnode-id="1467" instrument_node="">The </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/effective-feedback-is-not-written-feedback/"><span data-dcnode-id="1466" instrument_node="">work can be marked/graded</span></a><span data-dcnode-id="1464" instrument_node=""> and returned to students for further work.</span></p><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">When a student completes work it gets saved automatically to their Google Classroom class folders in their Google Drive (these are set up automatically). All work is saved securely. Students may submit class comments that are viewable to all students and teachers assigned to that “Classroom”, this leads to collaborative working.</span></p><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Students may also submit private comments to their teachers if they require assistance and don’t want to share their questions with the rest of the students.</span></p><p data-dcnode-id="1452"><span data-dcnode-id="1458" instrument_node="">For further reading, I have written an entire review post; </span><a data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/google-classroom/"><span data-dcnode-id="1457" instrument_node="">The Definitive Google Classroom Review. 2020 Update</span></a><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">, </span></strong><span data-dcnode-id="1453" instrument_node="">it breaks down in detail, from my own experiences, everything Google Classroom can do.</span></p><h3 data-dcnode-id="1449"><span data-dcnode-id="1450" id="2_Apple_Classroom"><span data-dcnode-id="1451" instrument_node="">2. Apple Classroom</span></span></h3><div class="wp-block-image" data-dcnode-id="1444"><figure class="aligncenter size-full" data-dcnode-id="1445"><noscript data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/apple-classroom.jpg" alt="Apple classroom logo" class="wp-image-578"&gt;</span></noscript><img alt="Apple classroom logo" class="lazyload wp-image-578" data-dcnode-id="1446" data-src="https://www.educationcorner.com/wp-content/uploads/apple-classroom.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1439"><span data-dcnode-id="1443" instrument_node="">Whilst the name “</span><a aria-label=" (opens in a new tab)" data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.apple.com/gb/app/classroom/id1085319084" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1442" instrument_node="">Apple Classroom</span></a><span data-dcnode-id="1440" instrument_node="">” suggests a similar app to Google Classroom the two are vastly different.</span></p><p class="has-text-align-center" data-dcnode-id="1436"><strong data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Apple Classroom is an iOS and macOS app that is a student monitoring solution. </span></strong></p><p data-dcnode-id="1432"><span data-dcnode-id="1435" instrument_node="">If you have Apple devices in your school or class then this app is fantastic, it allows teachers to monitor what students are doing on their Apple devices. You can see what they are doing and see what other apps they have open (handy for those sneaky game players!) but that’s not all, you can actually control their device! It’s great for </span><a data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/common-classroom-misbehaviors/"><span data-dcnode-id="1434" instrument_node="">behavior management.</span></a></p><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">On the surface, this seems like a simple app to dictate what students are doing but it is way more. You can open apps or web pages on all devices and lock them so they can only see what you are controlling, an excellent idea for guided lessons.</span></p><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Although only available on Apple devices it is a great tool with huge scope for use in the classroom.</span></p><h3 data-dcnode-id="1425"><span data-dcnode-id="1426" id="3_iDoceo"><span data-dcnode-id="1427" instrument_node="">3. iDoceo</span></span></h3><div class="wp-block-image" data-dcnode-id="1420"><figure class="aligncenter size-full" data-dcnode-id="1421"><noscript data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/idoceo.jpg" alt="iDoceo logo" class="wp-image-579"&gt;</span></noscript><img alt="iDoceo logo" class="lazyload wp-image-579" data-dcnode-id="1422" data-src="https://www.educationcorner.com/wp-content/uploads/idoceo.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1416"><a aria-label="iDoceo (opens in a new tab)" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idoceo.net/index.php/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1419" instrument_node="">iDoceo</span></a><span data-dcnode-id="1417" instrument_node=""> is fantastic if you use an iPad to manage your classes at school.</span></p><p class="has-text-align-center" data-dcnode-id="1413"><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">I have used it for several years and would be lost without it! </span></strong></p><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">However, it is only available on iPads. It is a planner, diary, schedule and grade-book, it also contains seating plan configuration tools (including my favorite…the randomiser!)</span></p><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">You can create classes and import class data from other sources. One of the best features of iDoceo is that you can add files and resources to any of your classes bulletin boards and send individual and bulk emails to your students.</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">It is a great app and will definitely make your life easier. At present, it costs $11.99 in the US and £11.99 in UK.</span></p><h3 data-dcnode-id="1404"><span data-dcnode-id="1405" id="4_Vivi"><span data-dcnode-id="1406" instrument_node="">4. Vivi</span></span></h3><div class="wp-block-image" data-dcnode-id="1399"><figure class="aligncenter size-full" data-dcnode-id="1400"><noscript data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">&lt;img width="300" height="300" src="https://www.educationcorner.com/wp-content/uploads/vivi.jpg" alt="Vivi logo" class="wp-image-580" srcset="https://www.educationcorner.com/wp-content/uploads/vivi.jpg 300w, https://www.educationcorner.com/wp-content/uploads/vivi-150x150.jpg 150w" sizes="(max-width: 300px) 100vw, 300px"&gt;</span></noscript><img alt="Vivi logo" class="lazyload wp-image-580" data-dcnode-id="1401" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://www.educationcorner.com/wp-content/uploads/vivi.jpg" data-srcset="https://www.educationcorner.com/wp-content/uploads/vivi.jpg 300w, https://www.educationcorner.com/wp-content/uploads/vivi-150x150.jpg 150w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20300%20300%22%3E%3C/svg%3E" width="300"></figure></div><p data-dcnode-id="1395"><a aria-label="Vivi (opens in a new tab)" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vivi.io/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1398" instrument_node="">Vivi</span></a><span data-dcnode-id="1396" instrument_node=""> is awesome! It is a wireless presentation and screen mirroring tool (it allows all students and teachers to see the same screen on their devices).</span></p><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Students and teachers can annotate and save content in real-time. It can be used by all devices (so no worry about whether students have Apple, Microsoft or Android etc. devices).</span></p><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">It requires a Blue box to be plugged in your classroom which allows you to be free to move around the class untethered! It is quite costly (about US$300 or £230) so in my opinion its a solution that needs to be bought by your school.</span></p><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">However, if you do get them in your school I’m sure you will love them.</span></p><h3 data-dcnode-id="1386"><span data-dcnode-id="1387" id="5_Flipgrid"><span data-dcnode-id="1388" instrument_node="">5. Flipgrid</span></span></h3><div class="wp-block-image" data-dcnode-id="1381"><figure class="aligncenter size-full" data-dcnode-id="1382"><noscript data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/flipgrid.png" alt="Flipgrid logo" class="wp-image-581"&gt;</span></noscript><img alt="Flipgrid logo" class="lazyload wp-image-581" data-dcnode-id="1383" data-src="https://www.educationcorner.com/wp-content/uploads/flipgrid.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p class="has-text-align-center" data-dcnode-id="1378"><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">All your students need to use Flipgrid is a device with a camera. </span></strong></p><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Basically, students can record video responses to topics or questions you set. in this day and age, students spend huge amounts of time on social media, this app allows that ethos to be bought into the classroom and hopefully this fervour to translate into classroom engagement.</span></p><p data-dcnode-id="1371"><span data-dcnode-id="1375" instrument_node="">It also has the benefit of allowing those students who are less likely to contribute to the class discussion to weigh in and have a voice; we all have those students that give epic responses when spoken to one to one but never feel able to share them openly with the class. </span><a aria-label="Flipgrid (opens in a new tab)" data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.flipgrid.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1374" instrument_node="">Flipgrid</span></a><span data-dcnode-id="1372" instrument_node=""> eliminates this!</span></p><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Students can respond to homework questions or explain more complex ideas in a visual way.</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">They can even post YouTube-style reviews on books, videos watched in class or even get their feedback and what they’ve learnt from a particular lesson.</span></p><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">I’ve seen it used by students recording news reporter style videos, which was pretty cool.</span></p><h3 data-dcnode-id="1362"><span data-dcnode-id="1363" id="6_ClassDojo"><span data-dcnode-id="1364" instrument_node="">6. ClassDojo</span></span></h3><div class="wp-block-image" data-dcnode-id="1357"><figure class="aligncenter size-full" data-dcnode-id="1358"><noscript data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">&lt;img width="240" height="240" src="https://www.educationcorner.com/wp-content/uploads/classdojo.png" alt="ClassDojo logo" class="wp-image-582" srcset="https://www.educationcorner.com/wp-content/uploads/classdojo.png 240w, https://www.educationcorner.com/wp-content/uploads/classdojo-150x150.png 150w" sizes="(max-width: 240px) 100vw, 240px"&gt;</span></noscript><img alt="ClassDojo logo" class="lazyload wp-image-582" data-dcnode-id="1359" data-sizes="(max-width: 240px) 100vw, 240px" data-src="https://www.educationcorner.com/wp-content/uploads/classdojo.png" data-srcset="https://www.educationcorner.com/wp-content/uploads/classdojo.png 240w, https://www.educationcorner.com/wp-content/uploads/classdojo-150x150.png 150w" height="240" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20240%20240%22%3E%3C/svg%3E" width="240"></figure></div><p data-dcnode-id="1352"><span data-dcnode-id="1356" instrument_node="">When doing the research for this article, </span><a aria-label="ClassDojo (opens in a new tab)" data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.classdojo.com/en-gb" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1355" instrument_node="">ClassDojo</span></a><span data-dcnode-id="1353" instrument_node=""> was suggested by my subscribers and Instagram followers more than any other.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node="">In short, it is a </span><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/common-classroom-misbehaviors/"><span data-dcnode-id="1350" instrument_node="">classroom behavior management</span></a><span data-dcnode-id="1348" instrument_node=""> reward system. Students receive +1 or-1 behavior points but unlike other behavior management systems that focus on nondescript gold stars, ClassDojo allows the emphasis to be based on positive feedback with teachers being able to create their own targeted behaviors.</span></p><p class="has-text-align-center" data-dcnode-id="1344"><strong data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Class Dojo creates reports that can be shared with students and/or parents publicly or privately. </span></strong></p><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Each student has an avatar of a little monster (very apt in some cases!) which keeps the app rather fun.</span></p><h3 data-dcnode-id="1339"><span data-dcnode-id="1340" id="7_Seesaw"><span data-dcnode-id="1341" instrument_node="">7. Seesaw</span></span></h3><div class="wp-block-image" data-dcnode-id="1334"><figure class="aligncenter size-full" data-dcnode-id="1335"><noscript data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Seesaw.png" alt="Seesaw logo" class="wp-image-583"&gt;</span></noscript><img alt="Seesaw logo" class="lazyload wp-image-583" data-dcnode-id="1336" data-src="https://www.educationcorner.com/wp-content/uploads/Seesaw.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1330"><a aria-label="Seesaw (opens in a new tab)" data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.seesaw.me/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1333" instrument_node="">Seesaw</span></a><span data-dcnode-id="1331" instrument_node=""> is another app that helps keep parents in the loop.</span></p><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">As we all know collaboration between home and school is essential in education. Seesaw is an online portfolio where students can upload their best work to share with their parents and teachers can add examples of students strengths and areas of development.</span></p><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">I see this as a valuable tool for parent-teacher meetings, it could also help parents from feeling excluded from their child’s learning, thus reducing the time teachers spend in contact with parents as all the work will be there for them to see.</span></p><h3 data-dcnode-id="1323"><span data-dcnode-id="1324" id="8_Remind"><span data-dcnode-id="1325" instrument_node="">8. Remind</span></span></h3><div class="wp-block-image" data-dcnode-id="1318"><figure class="aligncenter size-full" data-dcnode-id="1319"><noscript data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/remind.png" alt="Remind logo" class="wp-image-584"&gt;</span></noscript><img alt="Remind logo" class="lazyload wp-image-584" data-dcnode-id="1320" data-src="https://www.educationcorner.com/wp-content/uploads/remind.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1314"><a aria-label="Remind (opens in a new tab)" data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.remind.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1317" instrument_node="">Remind</span></a><span data-dcnode-id="1315" instrument_node=""> is another parent contact app with a very good added extra.</span></p><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">It allows you to communicate with students and their parents beyond the classroom, the added extra is that your messages can be translated into over 70 languages, totally eliminating the isolation felt by parents for whom English is not their first language.</span></p><p class="has-text-align-center" data-dcnode-id="1309"><strong data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">You can make class announcements, group chats, or contact individuals privately through the app.</span></strong></p><h3 data-dcnode-id="1306"><span data-dcnode-id="1307" id="9_Classtree"><span data-dcnode-id="1308" instrument_node="">9. Classtree</span></span></h3><div class="wp-block-image" data-dcnode-id="1301"><figure class="aligncenter size-full" data-dcnode-id="1302"><noscript data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/classtree.png" alt="Classtree logo" class="wp-image-585"&gt;</span></noscript><img alt="Classtree logo" class="lazyload wp-image-585" data-dcnode-id="1303" data-src="https://www.educationcorner.com/wp-content/uploads/classtree.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1297"><a aria-label="Classtree (opens in a new tab)" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.bytters.classtree%26hl%3Den%26gl%3DUS" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1300" instrument_node="">Classtree</span></a><span data-dcnode-id="1298" instrument_node=""> is similar to Remind but goes a little further.</span></p><p data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">It connects teachers, students and parents but acts a little like a </span><a data-dcnode-id="1294" data-wpil-keyword-link="linked" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/is-social-media-good-or-bad-for-students/" title="social media"><span data-dcnode-id="1295" instrument_node="">social media</span></a><span data-dcnode-id="1293" instrument_node=""> platform in that you can post photos and documents (like classwork) and the parents, student and teacher in question can “like” and comment on them.</span></p><p class="has-text-align-center" data-dcnode-id="1289"><strong data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Users get instant notifications (like social media) and teachers and parents can communicate through a chat function. </span></strong></p><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">An added benefit of Classtree is that you can attach consent forms for field trips and get them signed, returned and downloaded through the app.</span></p><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">That one gets a big “like” from me!</span></p><h3 data-dcnode-id="1282"><span data-dcnode-id="1283" id="10_Google_Hangouts"><span data-dcnode-id="1284" instrument_node="">10. Google Hangouts</span></span></h3><div class="wp-block-image" data-dcnode-id="1277"><figure class="aligncenter size-full" data-dcnode-id="1278"><noscript data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/Google-Hangouts.jpg" alt="Google Hangouts logo" class="wp-image-586"&gt;</span></noscript><img alt="Google Hangouts logo" class="lazyload wp-image-586" data-dcnode-id="1279" data-src="https://www.educationcorner.com/wp-content/uploads/Google-Hangouts.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node="">Essentially </span><a aria-label="Google Hangouts (opens in a new tab)" data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hangouts.google.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1275" instrument_node="">Google Hangouts</span></a><span data-dcnode-id="1273" instrument_node=""> is a messaging app but with a whole lot more built-in.</span></p><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">The obvious uses are easy communication with parents, students and other teachers (especially good if you need another teacher or leader to come and collect a student needing to be removed!) however so much more can be done with it.</span></p><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Google Hangouts allows you to record and save video footage (for instance a visiting speaker that not all students/teachers can get to see) and then send it whoever needs to see it.</span></p><p data-dcnode-id="1263"><span data-dcnode-id="1267" instrument_node="">You can create groups (e.g. classes) for students to allow them to </span><a data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/test-preparation-tips.html"><span data-dcnode-id="1266" instrument_node="">study for a test</span></a><span data-dcnode-id="1264" instrument_node=""> together, virtually.</span></p><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">I have even used it for flipped homework; I sent a video I wanted students to debate for homework. In our next lesson, we looked at the conversation the students had and discussed the points raised.</span></p><h3 data-dcnode-id="1258"><span data-dcnode-id="1259" id="11_DropBox"><span data-dcnode-id="1260" instrument_node="">11. DropBox</span></span></h3><div class="wp-block-image" data-dcnode-id="1253"><figure class="aligncenter size-full" data-dcnode-id="1254"><noscript data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/dropbox.png" alt="DropBox logo" class="wp-image-587"&gt;</span></noscript><img alt="DropBox logo" class="lazyload wp-image-587" data-dcnode-id="1255" data-src="https://www.educationcorner.com/wp-content/uploads/dropbox.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1249"><a aria-label="Dropbox (opens in a new tab)" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dropbox.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1252" instrument_node="">Dropbox</span></a><span data-dcnode-id="1250" instrument_node=""> has been around a while and is an excellent alternative to Google Drive.</span></p><p class="has-text-align-center" data-dcnode-id="1246"><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Where Google Drive allows you to create and edit G Suite files, DropBox lets you create and edit Microsoft Office files. </span></strong></p><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">Storing all your </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationcorner.com/remote-teaching-and-learning/"><span data-dcnode-id="1244" instrument_node="">teaching files remotely</span></a><span data-dcnode-id="1242" instrument_node=""> saves you carrying all sorts of drives around with you and the ability to share files with students means you don’t have to fill their inbox with huge attachments.</span></p><p data-dcnode-id="1235"><span data-dcnode-id="1240" instrument_node="">The basic free account gets you 500Mb of storage but my top tip is if you use their </span><strong data-dcnode-id="1237"><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//help.dropbox.com/accounts-billing/space-storage/earn-space-referring-friends" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1239" instrument_node="">referral scheme</span></a></strong><span data-dcnode-id="1236" instrument_node=""> to invite your students, you get extra storage when they sign up, which they will need to do if you are going to use it for your classes. Win!</span></p><h3 data-dcnode-id="1232"><span data-dcnode-id="1233" id="12_Trello"><span data-dcnode-id="1234" instrument_node="">12. Trello</span></span></h3><div class="wp-block-image" data-dcnode-id="1227"><figure class="aligncenter size-full" data-dcnode-id="1228"><noscript data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/trello.jpg" alt="Trello logo" class="wp-image-588"&gt;</span></noscript><img alt="Trello logo" class="lazyload wp-image-588" data-dcnode-id="1229" data-src="https://www.educationcorner.com/wp-content/uploads/trello.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1223"><a aria-label="Trello (opens in a new tab)" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trello.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1226" instrument_node="">Trello</span></a><span data-dcnode-id="1224" instrument_node=""> is basically an advanced to-do list app with the potential to be very useful for you and your students.</span></p><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">It syncs via a cloud across all devices so they will never be without their work schedule.</span></p><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">You can create multiple lists of tasks to be done. You can upload images assign tasks to other students in a group (particularly useful when students are doing a group project). You or your students can share todo lists to work through together.</span></p><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">I have been using it daily for a couple of years. for work, home and running this website. It helps me keep me organised (rather than having lots of crumpled bits of paper in my pockets which invariably get lost…resulting in missing deadlines!</span></p><h3 data-dcnode-id="1214"><span data-dcnode-id="1215" id="13_Edmodo"><span data-dcnode-id="1216" instrument_node="">13. Edmodo</span></span></h3><div class="wp-block-image" data-dcnode-id="1209"><figure class="aligncenter size-full" data-dcnode-id="1210"><noscript data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/edmodo.jpg" alt="Edmodo logo" class="wp-image-589"&gt;</span></noscript><img alt="Edmodo logo" class="lazyload wp-image-589" data-dcnode-id="1211" data-src="https://www.educationcorner.com/wp-content/uploads/edmodo.jpg" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1205"><a aria-label="Edmodo (opens in a new tab)" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//new.edmodo.com/%3Fgo2url%3D%252Fhome" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1208" instrument_node="">Edmodo</span></a><span data-dcnode-id="1206" instrument_node=""> works in a similar but simpler way to Google Classroom in that teachers can post assignments, messages, polls and quizzes to students.</span></p><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Students, in turn, can submit their work and receive grades.</span></p><h3 data-dcnode-id="1200"><span data-dcnode-id="1201" id="14_Classcraft"><span data-dcnode-id="1202" instrument_node="">14. Classcraft</span></span></h3><div class="wp-block-image" data-dcnode-id="1195"><figure class="aligncenter size-full" data-dcnode-id="1196"><noscript data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">&lt;img width="150" height="150" src="https://www.educationcorner.com/wp-content/uploads/classcraft.png" alt="Classcraft logo" class="wp-image-590"&gt;</span></noscript><img alt="Classcraft logo" class="lazyload wp-image-590" data-dcnode-id="1197" data-src="https://www.educationcorner.com/wp-content/uploads/classcraft.png" height="150" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20150%20150%22%3E%3C/svg%3E" width="150"></figure></div><p data-dcnode-id="1191"><a aria-label="Classcraft (opens in a new tab)" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.classcraft.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1194" instrument_node="">Classcraft</span></a><span data-dcnode-id="1192" instrument_node=""> has me super excited.</span></p><p class="has-text-align-center" data-dcnode-id="1188"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">It’s a totally nerdy version of a classroom and behavior management reward and sanction system. </span></strong></p><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">It takes all those elements and turns it into a game similar to World of Warcraft. Students “play” in teams and gain XP (experience points) for positive behaviors and lose HP (health points) for negative behavior.</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">I used this last year when I had a year/grade 7 tutor group and it worked wonderfully for engagement.</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">I have included a video from the developers as they can explain it more clearly than I can.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="594"><div class="wp-block-embed__wrapper" data-dcnode-id="595"><span data-dcnode-id="1181" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="596" frameborder="0" height="433" src="https://chatnoir-webc
