</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Moon Phases AR is an app which uses 3D visual imagery of the Sun, Earth and Moon to allow users to practice identifying the different phases of the moon and to understand why these vary based on location relative to the sun and earth, this is accompanied by a short quiz students can complete to check their understanding. In addition the app also allows users to practically comprehend the distances between the celestial bodies, and their relative sizes. The app has both an indoor discovery option, for learning within a classroom, and outside scale view, for participation beyond the confines of a room, the chosen activity will vary depending on the content individuals wish to explore. </span></p><span data-dcnode-id="464" instrument_node="">

</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">A career in the construction industry is played out as you are challenged to become a true bridge-building expert. It requires you to improve your skills and earn those promotions as you move up the career ladder making bigger and better bridges! </span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="400"><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Price:</span></strong><span data-dcnode-id="401" instrument_node="">$1.49</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="395"><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Devices:</span></strong><span data-dcnode-id="396" instrument_node="">Android,iPhone and iPad</span></p><span data-dcnode-id="394" instrument_node="">
</span><hr data-dcnode-id="393"><span data-dcnode-id="392" instrument_node="">
</span><h2 data-dcnode-id="388"><span data-dcnode-id="391" instrument_node="">13. </span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/thomas-edison-s-secret-lab"><span data-dcnode-id="390" instrument_node="">Thomas Edison's Secret Lab</span></a></h2><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Go and discover science for yourself as you investigate Edison’s Lab. Find out about the legends of science, sing along to some crazy science songs and even turn your own home into a science lab! </span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="380"><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Price: </span></strong><span data-dcnode-id="381" instrument_node="">$0.79</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="375"><strong data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Devices: </span></strong><span data-dcnode-id="376" instrument_node="">Android,iPhone and iPad</span></p><span data-dcnode-id="374" instrument_node="">
</span><hr data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">
</span><h2 data-dcnode-id="368"><span data-dcnode-id="371" instrument_node="">14. </span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/tory-odyssey-motion-commotion"><span data-dcnode-id="370" instrument_node="">Tory Odyssey: Motion Commotion</span></a></h2><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Battle to survive in a post-apocalyptic world in this action-adventure game that challenges you to think about the science behind the action. </span></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="360"><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Price: </span></strong><span data-dcnode-id="361" instrument_node="">$0.79</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="355"><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Devices: </span></strong><span data-dcnode-id="356" instrument_node="">iPhone and iPad</span></p><span data-dcnode-id="354" instrument_node="">
</span><hr data-dcnode-id="353"><span data-dcnode-id="352" instrument_node="">
</span><h2 data-dcnode-id="348"><span data-dcnode-id="351" instrument_node="">15. </span><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/physicsone-gravity"><span data-dcnode-id="350" instrument_node="">PhysicsOne Gravity</span></a></h2><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Explore and investigate four simple lab experiments on the topic of ‘gravity’. Drop a ball from an alien UFO to study free-fall, fire a canon projectile and observe how balls interact when they oscillate and collide. </span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="340"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Price: </span></strong><span data-dcnode-id="341" instrument_node="">Free</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="335"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Devices: </span></strong><span data-dcnode-id="336" instrument_node="">iPhone and iPad</span></p><span data-dcnode-id="334" instrument_node="">
</span><hr data-dcnode-id="333"><span data-dcnode-id="332" instrument_node="">
</span><h2 data-dcnode-id="328"><span data-dcnode-id="331" instrument_node="">16. </span><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/physics-notes"><span data-dcnode-id="330" instrument_node="">Physics Notes</span></a></h2><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Physics Notes is a very comprehensive app filled with formulae and explanations of all the Physics concepts from A-Level (SATs) to Foundation level in Higher Education. </span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="320"><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Price: </span></strong><span data-dcnode-id="321" instrument_node="">Free</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="315"><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Devices: </span></strong><span data-dcnode-id="316" instrument_node="">Android,iPhone and iPad</span></p><span data-dcnode-id="314" instrument_node="">
</span><hr data-dcnode-id="313"><span data-dcnode-id="312" instrument_node="">
</span><h2 data-dcnode-id="308"><span data-dcnode-id="311" instrument_node="">17. </span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/fun-science-lab"><span data-dcnode-id="310" instrument_node="">Fun Science Lab </span></a></h2><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Fun Science Lab is great for teaching simple experiments for students. Although the app looks very child like you will find the experiments compelling as well as fairly testing. The app provides 9 interactive levels with 3 levels of difficulty in each. Each success is rewarded with a medal and you can track your scores in the collection book. The app also provides in app instructions and diagrams if you get stuck. </span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="300"><strong data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Price: </span></strong><span data-dcnode-id="301" instrument_node="">$2.29</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="295"><strong data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Devices: </span></strong><span data-dcnode-id="296" instrument_node="">iPhone and iPad</span></p><span data-dcnode-id="294" instrument_node="">
</span><hr data-dcnode-id="293"><span data-dcnode-id="292" instrument_node="">
</span><h2 data-dcnode-id="288"><span data-dcnode-id="291" instrument_node="">18. </span><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/crazy-machines"><span data-dcnode-id="290" instrument_node="">Crazy Machines</span></a></h2><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Although this app is not necessarily content driven the app provides a great platform for creating tests, building experiments and solving problems that are Science related. The app has some stunning graphics and collaboration features where you can play against other players or communities. The experiments will test the most proficient scientist and if you are struggling the app will provide some clues however this may have an effect on your score. Work your way through a series of challenging tests or simply build one yourself for your friends to play. </span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="280"><strong data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Price: </span></strong><span data-dcnode-id="281" instrument_node="">$1.49</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="275"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Devices: </span></strong><span data-dcnode-id="276" instrument_node="">iPhone and iPad</span></p><span data-dcnode-id="274" instrument_node="">
</span><hr data-dcnode-id="273"><span data-dcnode-id="272" instrument_node="">
</span><h2 data-dcnode-id="268"><span data-dcnode-id="271" instrument_node="">19. </span><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/exploriments-electricity"><span data-dcnode-id="270" instrument_node="">Exploriments: Electricity</span></a></h2><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">This app lets you explore a variety of electrical circuits, with a focus on the role of switches in controlling circuits and devices. You are introduced to switches in series, in parallel and in combination arrangements. The app includes multiple activities on circuits with switches that give a varying degree of control over devices. It also includes real life examples of circuit usage to aid in your understanding. The app is very nicely presented in what can often be a difficult subject to put across to students. We especially like the examples and autocomplete options. If you are looking for an app to explain circuits then look no further. 
</span></p><p data-dcnode-id="261"><strong data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Price: </span></strong><span data-dcnode-id="262" instrument_node="">$1.49</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="256"><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Devices: </span></strong><span data-dcnode-id="257" instrument_node="">iPhone and iPad</span></p><span data-dcnode-id="255" instrument_node="">
</span><hr data-dcnode-id="254"><span data-dcnode-id="253" instrument_node="">
</span><h2 data-dcnode-id="249"><span data-dcnode-id="252" instrument_node="">20. </span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/orbits"><span data-dcnode-id="251" instrument_node="">Orbits </span></a></h2><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Have fun learning how your solar system works. You have full control over the sun and the planets. Change the behavior of the planets by modifying their mass, radius, or image. Increase the Sun's mass enough and a planet is sucked in, burned up, never to return. </span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="241"><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Price: </span></strong><span data-dcnode-id="242" instrument_node="">$2.29</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="236"><strong data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Devices: </span></strong><span data-dcnode-id="237" instrument_node="">iPhone and iPad</span></p><span data-dcnode-id="235" instrument_node="">
</span><hr data-dcnode-id="234"><span data-dcnode-id="233" instrument_node="">
</span><h2 data-dcnode-id="229"><span data-dcnode-id="232" instrument_node="">21. </span><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/simplerockets"><span data-dcnode-id="231" instrument_node="">SimpleRockets </span></a></h2><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Find out if you have what it takes to become a rocket scientist in SimpleRockets. It’s ideal for those who enjoy playing with physics like in SimplePhysics. It’s also great for classroom settings.   In SimpleRockets, it’s up to you to design the perfect rocket ship. You must choose from a collection of parts and assemble them in the most efficient way in order to complete difficult challenges. It includes a wide variety of rocket engines, fuel tanks, and other gizmos to tinker with, and there’s even parts for rovers so you can get around once you reach your destination </span></p><span data-dcnode-id="225" instrument_node="">
</span><p data-dcnode-id="221"><strong data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Price: </span></strong><span data-dcnode-id="222" instrument_node="">$2.29</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="216"><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Devices: </span></strong><span data-dcnode-id="217" instrument_node="">Android, iOS</span></p><span data-dcnode-id="215" instrument_node="">
</span><hr data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">
</span><h2 data-dcnode-id="209"><span data-dcnode-id="212" instrument_node="">22. </span><a data-dcnode-id="210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationalappstore.com/app/coaster-physics"><span data-dcnode-id="211" instrument_node=""> Coaster Physics</span></a></h2><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">An app that combines the thrills of a roller coaster ride together with the science that makes it happen. See how speed, energy and g-force are affected by loops, corkscrews and vertical drops. For those engineers in the making, design your very own coaster the way you want it. For that extra bit of realism you can even view it all in 3-D!</span></p><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="201"><strong data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Price: </span></strong><span data-dcnode-id="202" instrument_node="">$1.49</span></p><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="196"><strong data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Devices: </span></strong><span data-dcnode-id="197" instrument_node="">iOS</span></p><span data-dcnode-id="195" instrument_node="">
</span><hr data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">

</span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">EveryCircuit app packs custom-built simulation engine optimized for interactive mobile use, serious numerical methods, and realistic device models. </span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="181"><strong data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Price: </span></strong><span data-dcnode-id="182" instrument_node=""> $6</span></p><span data-dcnode-id="180" instrument_node="">
