</span><p data-dcnode-id="643" style="margin: 0cm 0cm 0pt;"></p><p data-dcnode-id="638" style="margin: 0cm 0cm 0pt;"><span data-dcnode-id="642" instrument_node="">Kunming foods are representative of </span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/yunnan-cuisine.htm"><span data-dcnode-id="641" instrument_node="">Yunnan Cuisine</span></a><span data-dcnode-id="639" instrument_node="">, also called Dian dishes, which fuse cooking styles of multiple cities and over 25 nationalities in Yunnan Province. With its high humidity and mild temperatures, Kunming provides abundant fruits and vegetables all year for the local cuisine. In addition, there are numerous snack options in high streets and back lanes. To 'do in Rome as the Romans do', you cannot miss trying the most authentic Dian dishes while traveling to Kunming. Below is a full list of the best 10 Kunming foods the locals like most:</span></p><p data-dcnode-id="637"></p><p data-dcnode-id="636"></p><div class="sectionBorder" data-dcnode-id="612"><div align="justify" class="sectionTitle" data-dcnode-id="629"><div class="subTitle2017" data-dcnode-id="630"><span class="stepNum" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">1 </span></span><span data-dcnode-id="633" instrument_node="">&nbsp;</span><h2 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Rice Noodles with Tofu Puddings (Douhua Mixian)</span></h2></div></div><div align="center" data-dcnode-id="628"></div><div class="div_zoContent" data-dcnode-id="613" style="text-align: justify;"><img alt="" data-dcnode-id="627" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="626" instrument_node=""> Chinese Name: 豆花米线 dòu huā mǐ xiàn</span><br data-dcnode-id="625"><img alt="" data-dcnode-id="624" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="623" instrument_node=""> Flavor: salty and a bit sweet</span><br data-dcnode-id="622"><img alt="" data-dcnode-id="621" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="620" instrument_node=""> Cooking Method: boil and mix</span><br data-dcnode-id="619"><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">Rice Noodles with Tofu Puddings are signature Kunming food and top among all the </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/yunnan-rice-noodles.htm"><span data-dcnode-id="616" instrument_node="">Yunnan rice noodles</span></a><span data-dcnode-id="614" instrument_node="">. After boiling the rice noodles, add in some ingredients like dry pickled vegetables, Chinese leek, and spicy meat sauce. Finally, add some Toufu puddings on the top and it can be served. The light sweet Toufu will properly neutralize the spicy flavor. Remember to mix them before having the first bite.</span></div></div><div class="sectionBorder" data-dcnode-id="591"><div align="justify" class="sectionTitle" data-dcnode-id="605"><div class="subTitle2017" data-dcnode-id="606"><span class="stepNum" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">2</span></span><span data-dcnode-id="609" instrument_node="">&nbsp;</span><h2 data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Yunnan Mashed Potatoes (Old Grandma's Potatoes)</span></h2></div></div><div align="center" data-dcnode-id="604"></div><div class="div_zoContent" data-dcnode-id="592" style="text-align: justify;"><img alt="" data-dcnode-id="603" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="602" instrument_node=""> Chinese Name: 老奶洋芋 lǎo nǎi yáng yù</span><br data-dcnode-id="601"><img alt="" data-dcnode-id="600" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="599" instrument_node=""> Flavor: salty, soft</span><br data-dcnode-id="598"><img alt="" data-dcnode-id="597" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="596" instrument_node=""> Cooking Method: steam or boil, stir-fry</span><br data-dcnode-id="595"><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">As one of the best Kunming foods, Yunnan Mashed Potatoes are popular among people of all ages. The locals often call it Old Grandma’s Potatoes because it can be enjoyed easily even by old granny. The potatoes need to be boiled or steamed first. After that, peel and mash them. At last, the mashed potatoes must be stir-fried with oil, salt, peppers, chopped green onions and coriander.</span></div></div><div class="sectionBorder" data-dcnode-id="570"><div align="justify" class="sectionTitle" data-dcnode-id="584"><div class="subTitle2017" data-dcnode-id="585"><span class="stepNum" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">3</span></span><span data-dcnode-id="588" instrument_node="">&nbsp;</span><h2 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Steam-Pot Chicken</span></h2></div></div><div align="center" data-dcnode-id="583"></div><div class="div_zoContent" data-dcnode-id="571" style="text-align: justify;"><img alt="" data-dcnode-id="582" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="581" instrument_node=""> Chinese Name: 汽锅鸡 qì guō jī</span><br data-dcnode-id="580"><img alt="" data-dcnode-id="579" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="578" instrument_node=""> Flavor: salty and tender</span><br data-dcnode-id="577"><img alt="" data-dcnode-id="576" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="575" instrument_node=""> Cooking Method: steam, boil</span><br data-dcnode-id="574"><br data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">This dish gained its name from its cooking method: steaming the chicken in a pot with a hollow tube in the center. It is a simple tasty dish. To make it, place chicken, ginger, shallot, pepper and salt in the pot and steam for about four hours, during which time steam from the tube contacts the cold pot cover turning to water, then flows back into the pot to become delicious chicken soup. Before serving, remove ginger and shallot.</span></div></div><div class="sectionBorder" data-dcnode-id="549"><div align="justify" class="sectionTitle" data-dcnode-id="563"><div class="subTitle2017" data-dcnode-id="564"><span class="stepNum" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">4</span></span><span data-dcnode-id="567" instrument_node="">&nbsp;</span><h2 data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Roast Rice Cake</span></h2></div></div><div align="center" data-dcnode-id="562"></div><div class="div_zoContent" data-dcnode-id="550" style="text-align: justify;"><img alt="" data-dcnode-id="561" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="560" instrument_node=""> Chinese Name: 烧饵块 shāo ěr kuài</span><br data-dcnode-id="559"><img alt="" data-dcnode-id="558" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="557" instrument_node=""> Flavor: tender, glutinous, salt, sweet</span><br data-dcnode-id="556"><img alt="" data-dcnode-id="555" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="554" instrument_node=""> Cooking Method: roast</span><br data-dcnode-id="553"><br data-dcnode-id="552"><span data-dcnode-id="551" instrument_node="">Shao Erkuai is a unique snack can only be seen in the Yunnan area. However, you will be surprised by its popularity as you can easily find Erkuai stalls in any lanes or streets in Kunming. Erkuai is made of various local rice, mostly are white rice and purple rice. Ground the cooked rice and make them into square or round cake shapes. Then toast them over the heat and brush with sesame sauce or spicy sauce. You can also try eating like locals, wrapping a deep-fried dough stick or hams.&nbsp;&nbsp;</span></div></div><div class="sectionBorder" data-dcnode-id="528"><div align="justify" class="sectionTitle" data-dcnode-id="542"><div class="subTitle2017" data-dcnode-id="543"><span class="stepNum" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">5</span></span><span data-dcnode-id="546" instrument_node="">&nbsp;</span><h2 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Wild Mushroom</span></h2></div></div><div align="center" data-dcnode-id="541"></div><div class="div_zoContent" data-dcnode-id="529" style="text-align: justify;"><img alt="" data-dcnode-id="540" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="539" instrument_node=""> Chinese Name: 野山菌 yě shān jùn</span><br data-dcnode-id="538"><img alt="" data-dcnode-id="537" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="536" instrument_node=""> Flavor: fresh, salty</span><br data-dcnode-id="535"><img alt="" data-dcnode-id="534" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="533" instrument_node=""> Cooking Method: stew, boil or stir-fry</span><br data-dcnode-id="532"><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">Yunnan is a kingdom of wild mushroom, where the edible wild mushroom family is over 200 varieties. The fresh wild mushroom has become a permanent dish on Kunming locals’ menu. After raining, all sorts of mushrooms just come out. With various cooking methods, it can be made into a mild soup with other vegetables or stir-fried with peppers and meat. Moreover, a wild mushroom hot-pot will tickle your taste bud from the very first spite.</span></div></div><div class="sectionBorder" data-dcnode-id="507"><div align="justify" class="sectionTitle" data-dcnode-id="521"><div class="subTitle2017" data-dcnode-id="522"><span class="stepNum" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">6</span></span><span data-dcnode-id="525" instrument_node="">&nbsp;</span><h2 data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Flower Cake</span></h2></div></div><div align="center" data-dcnode-id="520"></div><div class="div_zoContent" data-dcnode-id="508" style="text-align: justify;"><img alt="" data-dcnode-id="519" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="518" instrument_node=""> Chinese Name: 鲜花饼 xiān huā bǐng</span><br data-dcnode-id="517"><img alt="" data-dcnode-id="516" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="515" instrument_node=""> Flavor: sweet, crispy</span><br data-dcnode-id="514"><img alt="" data-dcnode-id="513" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="512" instrument_node=""> Cooking Method: bake</span><br data-dcnode-id="511"><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">As a must-try dessert of Kunming food, Flower Cake, one of the representative Dian-style mooncakes, derived from the Qing Dynasty (1644 - 1911) and used to be praised by the royals. It features the unique filling which is made of Yunnan local roses. Sometimes, other ingredients like yulan magnolia, sesames, peanuts, semen juglandis and jujube paste can be added per preference. The sweet stuffing with a light rose fragrance and crispy crust make it one of the most popular cakes in Yunnan.</span></div></div><div class="sectionBorder" data-dcnode-id="485"><div align="justify" class="sectionTitle" data-dcnode-id="500"><div class="subTitle2017" data-dcnode-id="501"><span class="stepNum" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">7</span></span><span data-dcnode-id="504" instrument_node="">&nbsp;</span><h2 data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Braised Rice with Beans</span></h2></div></div><div align="center" data-dcnode-id="499"></div><div class="div_zoContent" data-dcnode-id="487" style="text-align: justify;"><img alt="" data-dcnode-id="498" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="497" instrument_node=""> Chinese Name: 豆焖饭 dòu mēn fàn</span><br data-dcnode-id="496"><img alt="" data-dcnode-id="495" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="494" instrument_node=""> Flavor: salty</span><br data-dcnode-id="493"><img alt="" data-dcnode-id="492" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="491" instrument_node=""> Cooking Method: boil, braise</span><br data-dcnode-id="490"><br data-dcnode-id="489"><span data-dcnode-id="488" instrument_node="">It’s savory staple food in Kunming and the main ingredients are rice, green beans or peas, potatoes and Xuanwei hams. First, soak the uncooked rice in the water for a while. Cut the potatoes into small pieces, stir-fry them for several minutes and add the chopped hams and green beans. Mix them well and add the water and rice. Boil and braise them for about 20 minutes, and then it can be served with a perfect combination of color, aroma and taste.</span></div><div class="div_zoContent" data-dcnode-id="486"></div></div><div class="sectionBorder" data-dcnode-id="464"><div class="sectionTitle" data-dcnode-id="478"><div class="subTitle2017" data-dcnode-id="479"><span class="stepNum" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">8</span></span><span data-dcnode-id="482" instrument_node="">&nbsp;</span><h2 data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Yunnan Stuffed Bun</span></h2></div></div><div align="center" data-dcnode-id="477"></div><div class="div_zoContent" data-dcnode-id="465" style="text-align: justify;"><img alt="" data-dcnode-id="476" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="475" instrument_node=""> Chinese Name: 破酥包子 pò sū bāo zi</span><br data-dcnode-id="474"><img alt="" data-dcnode-id="473" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="472" instrument_node=""> Flavor: soft, salty, sweet</span><br data-dcnode-id="471"><img alt="" data-dcnode-id="470" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="469" instrument_node=""> Cooking Method: steam</span><br data-dcnode-id="468"><br data-dcnode-id="467"><span data-dcnode-id="466" instrument_node="">Yunnan Stuffed Bun, a popular snack can be seen in Kunming’s fancy hotels and street stalls, is different from the other stuffed buns. Made of low-gluten flour, lard stearin, hams, diced meat, sugar and chopped dried mushrooms, the bun tastes savory but a little bit sweet. The freshly steamed stuffed bun is especially delicious as the soft outer skin and juicy meat fillings seem melting in the mouth, definitely a fabulous Kunming food you cannot miss.</span></div></div><div class="sectionBorder" data-dcnode-id="443"><div class="sectionTitle" data-dcnode-id="457"><div class="subTitle2017" data-dcnode-id="458"><span class="stepNum" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">9</span></span><span data-dcnode-id="461" instrument_node="">&nbsp;</span><h2 data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Pineapple Rice</span></h2></div></div><div align="center" data-dcnode-id="456"></div><div class="div_zoContent" data-dcnode-id="444" style="text-align: justify;"><img alt="" data-dcnode-id="455" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="454" instrument_node=""> Chinese Name: 菠萝饭 bō luó fàn</span><br data-dcnode-id="453"><img alt="" data-dcnode-id="452" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="451" instrument_node=""> Flavor: soft and gluninous, a bit sour &amp; sweet</span><br data-dcnode-id="450"><img alt="" data-dcnode-id="449" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="448" instrument_node=""> Cooking Method: steam</span><br data-dcnode-id="447"><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">Pineapple Rice is one of the favorite dishes of the Yunnan people, a typical delicacy with Dai ethnic characteristics. The sour and sweet flavors make it be served as a dessert sometimes, especially popular among children and ladies. Empty a ripe pineapple, chop the pulp into small cubes and then mix them with rice and glutinous rice. Put the mixture into the empty pineapple. Add some sugar and steam the pineapple. The sweet chewy rice will dominate your mouth and you can enjoy a light fragrance of the pineapple. Pretty yummy!</span></div></div><div class="sectionBorder" data-dcnode-id="422"><div class="sectionTitle" data-dcnode-id="436"><div class="subTitle2017" data-dcnode-id="437"><span class="stepNum" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">10</span></span><span data-dcnode-id="440" instrument_node="">&nbsp;</span><h2 data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Guandu Baked Cake (Guandu Baba)</span></h2></div></div><div align="center" data-dcnode-id="435"></div><div class="div_zoContent" data-dcnode-id="423"><img alt="" data-dcnode-id="434" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="433" instrument_node=""> Chinese Name: 官渡粑粑 guān dù bǎ ba</span><br data-dcnode-id="432"><img alt="" data-dcnode-id="431" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="430" instrument_node=""> Flavor: soft and chewy, sweet, salty</span><br data-dcnode-id="429"><img alt="" data-dcnode-id="428" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="427" instrument_node=""> Cooking Method: roast and bake</span><br data-dcnode-id="426"><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">Guandu is a quaint historical town in Yunnan Province and it is famed for producing a delicious local snack, Baba. This is a Yunnan-style cake made of buckwheat flour dough, sometimes white and corn flour dough with fillings. The cake is baked over hot coals and often two flavors are available. The Baba with sweet fillings composed of sesame, ground peanuts and walnuts mixed with sugar is more common while the salty version filled with oil, meat and pickled vegetables also worth a try.</span></div></div><p data-dcnode-id="415"><br data-dcnode-id="421"><img alt="" data-dcnode-id="420" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="margin: 0px; padding: 0px; border: currentColor; border-image: none; text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="419" instrument_node=""> Read more:</span><br data-dcnode-id="418"><a data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/yunnan-food.htm"><span data-dcnode-id="417" instrument_node="">10 Special Yunnan Foods You Need to Try</span></a></p><p data-dcnode-id="412"><a data-dcnode-id="413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/kunming/things-to-do.htm"><span data-dcnode-id="414" instrument_node="">Top 10 Things to Do in Kunming</span></a></p><span data-dcnode-id="411" instrument_node="">

</span><div data-dcnode-id="120" fromtype="0" id="answers" isload="true" n="3" pageid="1167" typeid="1" v="1167"><form action="https://answers.travelchinaguide.com/search.aspx" class="qa-search" data-dcnode-id="362" id="formcommentsearch" method="post" name="formcommentsearch" style="display:'+(typeof o.attr('noSearch')!='undefined'?'none':'block')+';" target="_blank"><span data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Q &amp; A Search:</span></span><input class="qa-search-text" data-dcnode-id="366" id="txtcommentsearchkeywords" name="txtcommentsearchkeywords" size="50" type="text" validate="{text:'Sorry, please enter the key words.'}" value=""><span data-dcnode-id="365" instrument_node=""> </span><input data-dcnode-id="364" id="txtpageid" name="txtpageid" type="hidden" value="2156"><input class="qa-search-btn" data-dcnode-id="363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-qa-search.gif&amp;raw" type="image"></form><div class="qa-title" data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Questions &amp; Answers on Eat Like a Local: 10 Best Kunming Foods</span></div><a data-dcnode-id="359" id="voice" name="voice"></a><div class="qa-list" data-dcnode-id="155"><div class="qa-list-q-item" data-dcnode-id="318" id="qa591421" idx="0"><div class="qa-list-q-info" data-dcnode-id="350"><span data-dcnode-id="358" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="356" val="0"><span data-dcnode-id="357" instrument_node="">Bruce Pearson</span></font><span data-dcnode-id="355" instrument_node=""> from USA | Apr. 28, 2017 00:21</span><span data-dcnode-id="352" idx="591421" un="Bruce Pearson"><img data-dcnode-id="354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="353" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="351"></div></div><div class="qa-list-q-title" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">I fly into Kunming Saturday afternoon and fly out Monday morning. </span></div><div class="qa-list-q-content" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Will have enough time to visit the Stone Forest and the Yunnan Folk Village. If so, what to you advise is the best course to take?</span></div><div class="qa-list-a" data-dcnode-id="319"><div class="qa-list-a-title" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="320" id="qa-list-a-item-507104" val="507104"><div class="qa-list-a-info" data-dcnode-id="327"><span data-dcnode-id="343" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="341" val="0"><span data-dcnode-id="342" instrument_node="">Bob</span></font><span data-dcnode-id="340" instrument_node=""> from USA | May. 03, 2017 04:53</span><div class="replyAction" data-dcnode-id="330" idx="0"><span class="good" data-dcnode-id="337"><img data-dcnode-id="339" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="338" instrument_node="">1</span></span><span class="bad" data-dcnode-id="334"><img data-dcnode-id="336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="335" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="331" idx="591421" un="Bruce Pearson"><img data-dcnode-id="333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="332" instrument_node="">Reply</span></span></div><br data-dcnode-id="329"><br data-dcnode-id="328"></div><div class="clear" data-dcnode-id="326"></div><span data-dcnode-id="325" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="321"><span data-dcnode-id="324" instrument_node="">If you arrive at the airport in the early afternoon, you may take the airport shuttle bus Route no.2 to Jinjiang Hotel first. Upon arrival, you need to walk 400 meters southwards to Beijing Road Bus Stop and take bus no.44 to the folk village directly. Then you may visit this village and find a hotel near it. On the next morning, you may finish visiting the village and head for Stone Forest. As I know, there is no direct bus operating between these two places, so you are advised to charter a car. If your leaving flight is on the early morning, you may need to catch the direct bus from the Stone Forest to the airport on the Sunday afternoon. This bus usually departs at 08:20, 09:50, 11:10, 12:20, 13:40, 15:10, 16:10 and 17:50. </span><br data-dcnode-id="323"><span data-dcnode-id="322" instrument_node="">If you arrive at the airport in the late afternoon, this schedule will be a little tight for you. You may choose one you want to visit most.</span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="274" id="qa524145" idx="1"><div class="qa-list-q-info" data-dcnode-id="309"><span data-dcnode-id="317" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="315" val="0"><span data-dcnode-id="316" instrument_node="">M Lokman Hossain</span></font><span data-dcnode-id="314" instrument_node=""> from BANGLADESH | Mar. 22, 2016 01:24</span><span data-dcnode-id="311" idx="524145" un="M Lokman Hossain"><img data-dcnode-id="313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="312" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="310"></div></div><div class="qa-list-q-title" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">where can I get Indian food in kunming</span></div><div class="qa-list-q-content" data-dcnode-id="306"></div><div class="qa-list-a" data-dcnode-id="275"><div class="qa-list-a-title" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="276" id="qa-list-a-item-443460" val="443460"><div class="qa-list-a-info" data-dcnode-id="287"><span data-dcnode-id="303" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="301" val="0"><span data-dcnode-id="302" instrument_node="">Gavin</span></font><span data-dcnode-id="300" instrument_node=""> from UNITED KINGDOM | Mar. 22, 2016 03:49</span><div class="replyAction" data-dcnode-id="290" idx="0"><span class="good" data-dcnode-id="297"><img data-dcnode-id="299" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="298" instrument_node="">0</span></span><span class="bad" data-dcnode-id="294"><img data-dcnode-id="296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="295" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="291" idx="524145" un="M Lokman Hossain"><img data-dcnode-id="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="292" instrument_node="">Reply</span></span></div><br data-dcnode-id="289"><br data-dcnode-id="288"></div><div class="clear" data-dcnode-id="286"></div><span data-dcnode-id="285" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="277"><span data-dcnode-id="284" instrument_node="">Oh, there are several indian restaurants in this city. Among them, CACAJA Indian Restaurant and Indian Kitchen are popular ones. You can find authentic indian dishes there. And the prices are acceptable. </span><br data-dcnode-id="283"><span data-dcnode-id="282" instrument_node="">CACAJA Indian Restaurant: No.51, Wenhua Alley</span><br data-dcnode-id="281"><span data-dcnode-id="280" instrument_node="">Indian Kitchen: No.156, Wenlin Street, Wuhua District</span><br data-dcnode-id="279"><span data-dcnode-id="278" instrument_node="">Hope you like. :)</span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="232" id="qa437254" idx="2"><div class="qa-list-q-info" data-dcnode-id="265"><span data-dcnode-id="273" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="271" val="0"><span data-dcnode-id="272" instrument_node="">S L Lau</span></font><span data-dcnode-id="270" instrument_node=""> from MALAYSIA | Nov. 25, 2014 06:08</span><span data-dcnode-id="267" idx="437254" un="S L Lau"><img data-dcnode-id="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="268" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="266"></div></div><div class="qa-list-q-title" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Street food in kunming</span></div><div class="qa-list-q-content" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Where are the famous street food vendors operate during day and night time? What is the most popular place to buy, eat and watching people?</span></div><div class="qa-list-a" data-dcnode-id="233"><div class="qa-list-a-title" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="234" id="qa-list-a-item-351918" val="351918"><div class="qa-list-a-info" data-dcnode-id="242"><span data-dcnode-id="258" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="256" val="0"><sp
