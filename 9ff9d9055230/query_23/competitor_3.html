</span><h1 data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Hunan Cuisine/Xiang Cuisine - Hot (Spicy) and Sour        </span></h1><span data-dcnode-id="997" instrument_node="">
</span><span data-dcnode-id="995" instrument_node="">
</span><div class="authorupdate" data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">Written by </span><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Gavin</span></strong><span data-dcnode-id="991" instrument_node="">Updated Dec. 31, 2021</span></div><span data-dcnode-id="989" instrument_node="">
</span><span data-dcnode-id="986" instrument_node="">
</span><span data-dcnode-id="984" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4231674166786366" data-ad-format="auto" data-ad-slot="1166484387" data-dcnode-id="983" data-full-width-responsive="true" id="adsense-head-ads" style="display:block"></ins><span data-dcnode-id="982" instrument_node="">
</span><span data-dcnode-id="979" instrument_node="">
</span></section><span data-dcnode-id="977" instrument_node="">

</span><div data-dcnode-id="537" id="main_content_pc"><span data-dcnode-id="974" instrument_node="">
</span><div class="pc_content" data-dcnode-id="614"><span data-dcnode-id="973" instrument_node="">
</span><article data-dcnode-id="616"><span data-dcnode-id="972" instrument_node="">
</span><span data-dcnode-id="970" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="968"><img alt="Hunan Cuisine" class="img-responsive" data-dcnode-id="969" height="200" loader="lazy" originalsrc="//images.chinahighlights.com/allpicture/2015/11/cb437fe4268b4ead87ed427a_300x200.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2015/11/cb437fe4268b4ead87ed427a_300x200.webp&amp;raw" style="opacity: 1; transition: opacity 0.5s ease-in-out 0s;" width="300"></div><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Most tourists who visit China get to know the spicy red hot flavors of Sichuan cuisine since it is a tourist favorite. But in Hunan Province, the food is maybe even hotter. Their food tastes less numbing and sourer.</span></p><span data-dcnode-id="964" instrument_node="">
</span><ul class="drop1" data-dcnode-id="947"><span data-dcnode-id="963" instrument_node="">
</span><li data-dcnode-id="959"><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Names:</span></strong><span data-dcnode-id="960" instrument_node=""> Hunan food, Xiang cuisine (湘菜 Xiāngcài /sshyang-tseye/)</span></li><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="954"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Location:</span></strong><span data-dcnode-id="955" instrument_node=""> Hunan Province (southern central China) - Changsha, Zhangjiajie</span></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="949"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Distinctives:</span></strong><span data-dcnode-id="950" instrument_node=""> spicy, favoring sautéing, stir-frying, steaming, and smoking</span></li><span data-dcnode-id="948" instrument_node="">
</span></ul><span data-dcnode-id="946" instrument_node="">
</span><h2 data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">The Flavors of Hunan Cuisine - Hot and Sour, and Salty&nbsp;</span></h2><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="936"><strong data-dcnode-id="938"><span data-dcnode-id="942" instrument_node="">Eating </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/hunan/"><span data-dcnode-id="941" instrument_node="">Hunan</span></a><span data-dcnode-id="939" instrument_node=""> food is fun</span></strong><span data-dcnode-id="937" instrument_node="">. You'll have a chance at trying your tongue on a new kind of cuisine. If you've experienced the burning numbness of Sichuan or Chongqing food, see how your body reacts to the vinegar/chili mix of Hunan food.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="934" instrument_node="">The many different tastes of the food partly stems from an unusually wide variety of agricultural products. Several kinds of chili peppers are grown. </span><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Citrus fruits</span></strong><span data-dcnode-id="931" instrument_node=""> are one of the major crops, and it lends the yummy sour flavor to dishes such as the popular Hunan Orange Chicken.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="925"><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node=""> 'Chopped chili' </span></strong><span data-dcnode-id="926" instrument_node="">(剁辣椒 duò làjiāo /dwor laa-jyaow/) is made from vinegar, chili peppers, and salt. It is liberally applied in noodle soups and meat dishes to produce the sour, hot flavor they love.</span></p><span data-dcnode-id="924" instrument_node="">
</span><h3 data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Stimulate Your Appetite the Chinese Way</span></h3><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Hunan food is actually hotter than Sichuan food.</span></strong><span data-dcnode-id="918" instrument_node=""> The Sichuanese use pepper corn that numbs your mouth so the food all starts tasting the same. Instead, the Hunanese use vinegar with the pepper. It serves to stimulate the taste buds and make them tingle, so you can better perceive the wide range of flavors and the rich variety of ingredients and spices.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="915" instrument_node="">The numbing </span><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/travelguide/chinese-food/chuan-cuisine.htm"><span data-dcnode-id="914" instrument_node="">Sichuan food</span></a><span data-dcnode-id="912" instrument_node=""> might give you a higher blood pressure/pulse rate so that you'll need to drink something cold or go out for a walk to cool down. Hunan food does the opposite. Vinegar lowers blood pressure and cholesterol levels too. So it is </span><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">good for those with high blood pressure</span></strong><span data-dcnode-id="909" instrument_node="">.</span></p><span data-dcnode-id="907" instrument_node="">
</span><h3 data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Why Such Hot (and Sour) Food?</span></h3><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="899"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Common saying:</span></strong><span data-dcnode-id="901" instrument_node=""> 四川人不怕辣，湖南人辣不怕，贵州人怕不辣！ (Sìchuānrén búpà là, Húnánrén là búpà, Guìzhōurén pà búlà!) It means: "Sichuan people don't fear hot food, Hunan people don't fear any degree of spiciness at all, and Guizhou people fear to eat food that isn't spicy."</span><strong data-dcnode-id="900"></strong></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="892"><strong data-dcnode-id="897"></strong><span data-dcnode-id="896" instrument_node="">Perhaps the wet hot summers and chilly wet winters drive the people to eat sour hot foods. The Chinese think that </span><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">extra heat (yang)</span></strong><span data-dcnode-id="893" instrument_node=""> of peppers and other hot spices balances out the excessive cold and wet (yin).</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="887"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Vinegar</span></strong><span data-dcnode-id="888" instrument_node=""> also packs yang, and along with helping with digestion, you'll find that it helps cool your body on hot days. In traditional Chinese medicine, vinegar is used to help people be more comfortable in the heat of summer and stay healthy. It also kills parasites and bacteria that grow in hot weather.</span></p><span data-dcnode-id="886" instrument_node="">
</span><h2 data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Notable Features - Many Vegetables, Hot Seasonings, and Rice</span></h2><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="879"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Crunchy vegetables:</span></strong><span data-dcnode-id="880" instrument_node=""> Eating a wide variety of vegetables keeps them healthy as does their cooking method. They generally like to sauté with a little oil so it is still crunchy "al dente." It preserves vitamins in food this way.</span></p><span data-dcnode-id="878" instrument_node="">
</span><ul class="drop1" data-dcnode-id="871"><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="873"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Refreshing summertime vegetable:</span></strong><span data-dcnode-id="874" instrument_node=""> 'Slapped cucumber' (拍黄瓜 pai huanggua) is an appetizer of cold cucumbers served in garlic, dried chili flakes, and vinegar. To prepare it, cucumbers are 'slapped' down to absorb the vinegar dressing.</span></li><span data-dcnode-id="872" instrument_node="">
</span></ul><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="863"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Daily staple:</span></strong><span data-dcnode-id="867" instrument_node=""> The area is in the subtropical rice growing area of China, so </span><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">white rice</span></strong><span data-dcnode-id="864" instrument_node=""> and rice noodles are the the main staple cereal foods. For example, mi fen (长沙米粉 mǐfěn) rice noodle soup is popular in Changsha.</span></p><span data-dcnode-id="862" instrument_node="">
</span><h3 data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Seasonings of Xiang Cuisine</span></h3><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="855"><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Yang sources:</span></strong><span data-dcnode-id="856" instrument_node=""> They use hot peppers and green onions, shallots, garlic, ginger, spicy oil, duo la jiao and cassia cinnamon to provide the needed daily yang. Soy sauce and tea seed oil are also used in cooking.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="850"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Sweet foods:</span></strong><span data-dcnode-id="851" instrument_node=""> Honey is enjoyed in some dishes, and sugar is used in some dishes and candy. They like sweet food, but not as much as the Cantonese further south. Lotus seed candy is a local product.</span></p><span data-dcnode-id="849" instrument_node="">
</span><h2 data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Their Favorite Cooking Methods</span></h2><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Their cuisine is thought of as the melting pot of the larger regional cuisines around them. Their cooks use various ways to prepare food. They commonly boil soups or stews, stir-fry, sauté (炒香), bake, braise, smoke, pickle or ferment.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="839"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Fermentation:</span></strong><span data-dcnode-id="840" instrument_node=""> To store vegetables and meat for the winter or preserve it through the hot summers, Hunanese have traditionally eaten much pickled and fermented food. They pickle tofu by letting it sit for few weeks. It is then mixed with liquor, salt, star anise, and chili and fermented in pickling jars for a month or more.</span></p><span data-dcnode-id="838" instrument_node="">
