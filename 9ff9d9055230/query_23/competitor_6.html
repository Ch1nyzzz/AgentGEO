" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Beijing Food 2" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Beijing-Food-2.png" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Beijing-Food-2-200x300.png" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Beijing-Food-2.png" data-orig-size="600,900" data-permalink="https://www.adventuresaroundasia.com/food-to-try-beijing/beijing-food-2/#main" height="900" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2018/06/Beijing-Food-2.png&amp;raw" srcset="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Beijing-Food-2.png 600w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Beijing-Food-2-200x300.png 200w" width="600"><p class="wp-caption-text" data-dcnode-id="2897" id="caption-attachment-12272"><span data-dcnode-id="2898" instrument_node="">Pin Me!</span></p></div><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">I get it, Chinese food can be scary. But when I meet people who ‘ve been to China and say they hated the food, I have to say, it breaks my heart a little.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">Yes, Chinese food in China is very different from the “Chinese food” you get back home. But it’s also so much better!</span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">If you come home from your trip and didn’t have an amazing culinary experience, you’re doing China wrong.</span></p><span data-dcnode-id="2886" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Thankfully, I’m here to help! After a total of 3 years in Beijing (and 5 in China), here are the dishes you need to try on your trip to Beijing, where to find them, and how to order them!</span></p><span data-dcnode-id="2883" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2879" id="attachment_11197" style="width: 650px"><img alt="green tea ice cream" aria-describedby="caption-attachment-11197" class="size-large wp-image-11197" data-attachment-id="11197" data-comments-opened="1" data-dcnode-id="2882" data-image-caption="<p>Enjoying Green Tea Ice Cream with my parents!</p>

</span><p data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Now, for all of you China food experts, I’m just going to preface by saying that not all of these dishes are Beijing specialties. Some of the food in this post originally comes from places like Sichuan or Mongolia.</span></p><span data-dcnode-id="2872" instrument_node="">
</span><p data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">However, Beijing is a giant melting pot of Chinese cultures and cuisines, which is why you can find some pretty amazing food here from all over China!</span></p><span data-dcnode-id="2869" instrument_node="">

</span><h2 data-dcnode-id="2336"><span data-dcnode-id="2340" instrument_node="">1. Chinese Egg Crepe – </span><em data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Jianbing</span></em><span data-dcnode-id="2337" instrument_node="">（煎饼）</span></h2><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2334" instrument_node="">A Beijing street food specialty, </span><em data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">jianbing</span></em><span data-dcnode-id="2331" instrument_node=""> is the perfect start to any morning (or afternoon) in Beijing. Expect to find</span><em data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node=""> jianbing</span></em><span data-dcnode-id="2328" instrument_node="">&nbsp;stalls all around the city, with locals frying them up on round grills like the one pictured above.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2325" instrument_node="">Watching the process of creating </span><em data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">jianbing</span></em><span data-dcnode-id="2322" instrument_node=""> is almost as good as actually biting into one. First, your cook will pour a doughy batter (made of wheat and mungbean) on the grill, and spread it around using a flat stick. He’ll crack a few eggs into the mix and let the crepe grill until it’s all ready.</span></p><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2315"><span data-dcnode-id="2319" instrument_node="">You’ll then have the choice of a few fun ingredients like cilantro and scallions, fried wonton to give it a bit of a crunch, and both savory and spicy sauces. If you don’t want an ingredient, just say so! Everything is right in front of you, so it’s easy to </span><a data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/travel-china-without-chinese/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2318" instrument_node="">order without speaking any Chinese</span></a><span data-dcnode-id="2316" instrument_node="">.</span></p><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2313" instrument_node="">Overall, </span><em data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">jianbing</span></em><span data-dcnode-id="2310" instrument_node=""> make a great breakfast or feel free to split one with someone as a late afternoon snack. At only roughly $1 USD a pop, why not grab one as you’re wandering around town!</span></p><span data-dcnode-id="2308" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2304" id="attachment_7089" style="width: 650px"><img alt="Peking Duck " aria-describedby="caption-attachment-7089" class="size-large wp-image-7089" data-attachment-id="7089" data-comments-opened="1" data-dcnode-id="2307" data-image-caption="<p>Gotta love Peking Duck! </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;3.5&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D3100&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1376675487&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;18&quot;,&quot;iso&quot;:&quot;400&quot;,&quot;shutter_speed&quot;:&quot;0.066666666666667&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="DSC_0354_3" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/05/DSC_0354_3-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/05/DSC_0354_3-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/05/DSC_0354_3-e1432838661798.jpg" data-orig-size="650,433" data-permalink="https://www.adventuresaroundasia.com/im-moving-to-beijing/dsc_0354_3/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2015/05/DSC_0354_3-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2305" id="caption-attachment-7089"><span data-dcnode-id="2306" instrument_node="">Gotta love Peking Duck!</span></p></div><span data-dcnode-id="2303" instrument_node="">
</span><h2 data-dcnode-id="2298"><span data-dcnode-id="2302" instrument_node="">2. Peking Duck –&nbsp;</span><em data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">Beijing Kaoya&nbsp;</span></em><span data-dcnode-id="2299" instrument_node="">（北京烤鸭）</span></h2><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2296" instrument_node="">The most famous Beijing cuisine, Peking Duck or </span><em data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Beijing kaoya</span></em><span data-dcnode-id="2293" instrument_node="">, is a must on your trip to Beijing. While you can find this dish at many different Beijing restaurants, your best bet is to actually go to a restaurant that specializes in Peking Duck.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">When at the restaurant, you can choose how much duck you’d like to order depending on the number of people you have. Your chef will then arrive and cut the duck into thin slices in front of you. The meat should have nice crispy skin and should be piled neatly on a plate and placed on your table.</span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Peking duck is always served with thin savory pancakes, spring onion, cucumber, and a sweet bean sauce. Place as much as you want in your little personal pancake and dig in!</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">The best Peking duck places will also offer a blueberry sauce and pop rocks (seriously) for you to dip the skin in. It’s AMAZING.</span></p><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Just do some online research or ask your hotel where the nearest amazing Peking Duck place is. I’ve been to some pretty great ones in Dongsishitiao (near Sanlitun) and over in Haidian district. This is a meal you definitely want to go out of your way to have.</span></p><span data-dcnode-id="2279" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2272" id="attachment_4270" style="width: 650px"><img alt="jiaozi " aria-describedby="caption-attachment-4270" class="size-large wp-image-4270" data-attachment-id="4270" data-comments-opened="1" data-dcnode-id="2278" data-image-caption="<p>Making jiaozi from scratch!</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;3.5&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D3100&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1373622503&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;18&quot;,&quot;iso&quot;:&quot;500&quot;,&quot;shutter_speed&quot;:&quot;0.066666666666667&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="DSC_0193" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193-1024x682.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193.jpg" data-orig-size="700,466" data-permalink="https://www.adventuresaroundasia.com/trip-to-tianjin/dsc_0193/#main" height="426" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193-1024x682.jpg&amp;raw" srcset="https://www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193-1024x682.jpg 1024w, https://www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193-300x200.jpg 300w, https://www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193-750x499.jpg 750w, https://www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193-360x240.jpg 360w, https://www.adventuresaroundasia.com/wp-content/uploads/2013/08/DSC_0193.jpg 700w" width="640"><p class="wp-caption-text" data-dcnode-id="2273" id="caption-attachment-4270"><span data-dcnode-id="2277" instrument_node="">Making </span><em data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">jiaozi</span></em><span data-dcnode-id="2274" instrument_node=""> from scratch!</span></p></div><span data-dcnode-id="2271" instrument_node="">
</span><h2 data-dcnode-id="2266"><span data-dcnode-id="2270" instrument_node="">3. Dumplings – </span><em data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Jiaozi</span></em><span data-dcnode-id="2267" instrument_node=""> （饺子）</span></h2><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2264" instrument_node="">A third Beijing specialty, dumplings, or </span><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">jiaozi,</span></em><span data-dcnode-id="2261" instrument_node=""> are a typical meal you can find all over Beijing. While you can order these tasty little bundles of joy at almost any restaurant in Beijing, I always recommend going to a place that specializes in </span><em data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">jiaozi</span></em><span data-dcnode-id="2258" instrument_node="">.</span></p><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Depending on your preferences, you can have pretty much any flavor under the sun! There are plenty of options for vegetarians, but my favorites are always pork. China just knows what they’re doing when it comes to this meat.</span></p><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">My favorite flavor is pork with spicy green peppers, but pork and chive, pork and green onion, and pork and cabbage are always safe bets. Get a few different plates and split them with your friends. Be sure to dip them in vinegar, and add spicy oil to your vinegar bowl if you want an extra kick.</span></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Dumplings can be made steamed or fried and both are amazing, however, you’re more likely to find steamed dumplings at most Beijing restaurants.&nbsp;I also recommend grabbing a few side dishes like spinach and peanuts or garlic broccoli just to mix things up.</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node="">Your hotel should probably know of a decent dumpling place nearby and can write a few good flavors down for you. If not, </span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lumdimsum.com/2012/07/25/mr-shis-%25E8%2580%2581%25E7%259F%25B3%25E9%25A5%25BA%25E5%25AD%2590-delicious-gulou-hutong-dumplings/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2245" instrument_node="">Mr. Shi’s Dumplings</span></a><span data-dcnode-id="2243" instrument_node=""> (there are a few chains in the hutongs) has an English menu as well as a few Western flavors you can try out (dumplings with cheese??!).</span></p><span data-dcnode-id="2241" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2235" id="attachment_12250" style="width: 650px"><img alt="Mongolia Hot Pot" aria-describedby="caption-attachment-12250" class="size-full wp-image-12250" data-attachment-id="12250" data-comments-opened="1" data-dcnode-id="2240" data-image-caption="<p>Gotta love Mongolia for this one! Photo credit </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Mongolian hot pot" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mongolian-hot-pot.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mongolian-hot-pot-300x225.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mongolian-hot-pot.jpg" data-orig-size="640,480" data-permalink="https://www.adventuresaroundasia.com/food-to-try-beijing/mongolian-hot-pot/#main" height="480" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mongolian-hot-pot.jpg&amp;raw" srcset="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mongolian-hot-pot.jpg 640w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mongolian-hot-pot-300x225.jpg 300w" width="640"><p class="wp-caption-text" data-dcnode-id="2236" id="caption-attachment-12250"><span data-dcnode-id="2239" instrument_node="">Gotta love Mongolia for this one! </span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/ivanwalsh/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2238" instrument_node="">Photo credit</span></a></p></div><span data-dcnode-id="2234" instrument_node="">
</span><h2 data-dcnode-id="2229"><span data-dcnode-id="2233" instrument_node="">4. Mongolian Hot Pot – </span><em data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Menggv Huoguo</span></em><span data-dcnode-id="2230" instrument_node="">（蒙古火锅)</span></h2><span data-dcnode-id="2228" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">While technically from Mongolia (I guess), Mongolian hotpot has become a winter staple in Beijing. Similar to the spicy Sichuan hot pot, Mongolian hot pot is just a little less spicy. Pick from a variety of ingredients and boil them in the hot broth before dipping your veggies, meats, and tofu into a sauce of your choice. Personally, I’m a huge fan of the sesame sauce.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">One thing I love about Mongolian hot pot is that they still use charcoal to heat the pot, unlike most Sichuan hot pot places that use electricity. There’s just something about a steamy, charcoal pot on a cold day!</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">When you go for Mongolian hot pot, you’re going to want a good mix of meats and veggies, however, one thing you definitely shouldn’t skip (unless you’re vegetarian) is the lamb! Just be sure to cook your lamb while holding it between your chopsticks, because it will cook in a matter of seconds. If you plop the lamb into the pot like all the rest of your veggies, you’ll end up with very overcooked meat.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">If you’re looking for a Mongolian hot pot place, it should be easy to recognize due to the distinct shape of the pots, however, your hotel can always give you suggestions on where to find one.</span></p><span data-dcnode-id="2216" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2212" id="attachment_10656" style="width: 650px"><img alt="Malatang" aria-describedby="caption-attachment-10656" class="size-large wp-image-10656" data-attachment-id="10656" data-comments-opened="1" data-dcnode-id="2215" data-image-caption="<p>$2 Malatang is the love of my life.</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0808" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/07/DSC_0808-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/07/DSC_0808-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/07/DSC_0808-e1503052432761.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/this-beijing-life-month-22/dsc_0808/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2017/07/DSC_0808-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2213" id="caption-attachment-10656"><span data-dcnode-id="2214" instrument_node="">Malatang is the love of my life.</span></p></div><span data-dcnode-id="2211" instrument_node="">
</span><h2 data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">5. Malatang –&nbsp;</span><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Malatang</span></em><span data-dcnode-id="2207" instrument_node="">（麻辣烫）</span></h2><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Malatang is without&nbsp;a doubt my FAVORITE Chinese food. Yes, I know it’s technically a Sichuan dish, but I had to include it because A) you can find Malatang all over Bejing and B) Beijing does malatang completely differently than any place you’ll find in Chengdu.</span></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">When you first walk into a malatang place, you’ll need to grab a basket and load up on ingredients. I typically go vegetarian here, because the only meat available is meatballs, crab sticks, and fish balls… although the crab sticks are pretty good.</span></p><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">I recommend loading up on quail eggs, soft tofu, broccoli, cauliflower, spinach, bok choi, red cabbage, lotus root, and veggie balls, or anything else that strikes your fancy. Once you’re done, hand your basket over and they’ll tell you how much your meal costs. You can then decide how spicy you want your malatang to be.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2195" instrument_node="">Here’s a quick guide:&nbsp;</span><em data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">zhong la&nbsp;</span></em><span data-dcnode-id="2192" instrument_node="">(very spicy),&nbsp;</span><em data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">wei la&nbsp;</span></em><span data-dcnode-id="2189" instrument_node="">(medium spicy), </span><em data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">yi dian la</span></em><span data-dcnode-id="2186" instrument_node=""> (a little spicy),&nbsp;</span><em data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">bu la&nbsp;</span></em><span data-dcnode-id="2183" instrument_node="">(not spicy). If that’s too much for you, just say “</span><em data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">lah</span></em><span data-dcnode-id="2180" instrument_node="">” if you want it spicy or “</span><em data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">boo lah</span></em><span data-dcnode-id="2177" instrument_node="">” if you don’t want it spicy. They’ll usually ask if you want sesame sauce (say yes). Soon, your incredible concoction will be all finished!</span></p><span data-dcnode-id="2175" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2168" id="attachment_12251" style="width: 650px"><img alt="Zhajiang mian " aria-describedby="caption-attachment-12251" class="size-full wp-image-12251" data-attachment-id="12251" data-comments-opened="1" data-dcnode-id="2174" data-image-caption="<p>Who doesn’t love noodles? (Photo by LWYang)</p>
