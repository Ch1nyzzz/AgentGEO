</span><h2 data-dcnode-id="2162"><span data-dcnode-id="2166" instrument_node="">6. Zhajiang Noodles – </span><em data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Zhajiang Mian</span></em><span data-dcnode-id="2163" instrument_node=""> （炸酱面）</span></h2><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2160" instrument_node="">If you’re looking for a good plate of authentic Beijing noodles, look no further than </span><em data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">zhajiangmian</span></em><span data-dcnode-id="2157" instrument_node="">. Well… technically they’re from Shandong Province, but Beijing has claimed them as a local delicacy too.</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2154" instrument_node="">Made with hand-pulled wheat noodles, shredded cucumber, pork, bean sprouts and soybean sauce, the savory flavors of </span><em data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Zhajiangmian</span></em><span data-dcnode-id="2151" instrument_node=""> can’t be missed.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">While the English name “noodles with soybean paste” doesn’t sound super appetizing, I’ll let the photo above speak for itself. (Speaking of photos, why am I so bad at remembering to take photos of my food???!)</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2145" instrument_node="">You’ll find a few different styles of </span><em data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Zhajiangmian</span></em><span data-dcnode-id="2142" instrument_node=""> northeastern China, but Beijing is famous for its slightly yellow soybean sauce, as opposed to darker colors you might find in Shandong. For vegetarians, you can also ask to substitute the pork for tofu! Yay!</span></p><span data-dcnode-id="2140" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2133" id="attachment_12257" style="width: 650px"><img alt="kungpao chicken " aria-describedby="caption-attachment-12257" class="size-full wp-image-12257" data-attachment-id="12257" data-comments-opened="1" data-dcnode-id="2139" data-image-caption="<p>It’s different in every Chinese province! (photo credit)</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="kungpao" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/kungpao.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/kungpao-300x199.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/kungpao.jpg" data-orig-size="640,424" data-permalink="https://www.adventuresaroundasia.com/food-to-try-beijing/kungpao/#main" height="424" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2018/06/kungpao.jpg&amp;raw" srcset="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/kungpao.jpg 640w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/kungpao-300x199.jpg 300w" width="640"><p class="wp-caption-text" data-dcnode-id="2134" id="caption-attachment-12257"><span data-dcnode-id="2138" instrument_node="">It’s different in every Chinese province! (</span><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/bokchoi-snowpea/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2137" instrument_node="">photo credit</span></a><span data-dcnode-id="2135" instrument_node="">)</span></p></div><span data-dcnode-id="2132" instrument_node="">
</span><h2 data-dcnode-id="2127"><span data-dcnode-id="2131" instrument_node="">7. Kungpao Chicken – </span><em data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Gongbao Jiding</span></em><span data-dcnode-id="2128" instrument_node=""> （宫保鸡丁）</span></h2><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Another dish that is clearly from Sichuan, Kungpao Chicken is a favorite among locals, travelers, and expats all over China. Every Chinese province seems to have their own version of this Sichuan favorite. While you’ll find very numb-spicy chicken in Sichuan and veggie-loaded kungpao in Yunnan, the Beijing variety features a sweet and savory sauce with a TON of peanuts!</span></p><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">I always recommend kungpao chicken to travelers in China, because it feels like something you might have at a Chinese restaurant back home (that, and sweet and sour pork). If you’re looking for something delicious that can be found at most Chinese restaurants with picture menus, this is it.</span></p><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Try a plate of kungpao chicken in every Chinese province you visit for an interesting reflection of the local cultures and flavors. You won’t be disappointed!</span></p><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2114" style="text-align: center;"><a class="button large" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/ultimate-china-guide-landing-page/" style="" target="_blank"><span data-dcnode-id="2116" instrument_node="">Get Your free China Survival guide!</span></a></p><span data-dcnode-id="2113" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2109" id="attachment_8040" style="width: 650px"><img alt="China candied fruit" aria-describedby="caption-attachment-8040" class="size-large wp-image-8040" data-attachment-id="8040" data-comments-opened="1" data-dcnode-id="2112" data-image-caption="<p>Candied fruit in the winter! </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;2.4&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 4S&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1391945291&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.28&quot;,&quot;iso&quot;:&quot;50&quot;,&quot;shutter_speed&quot;:&quot;0.00625&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="IMG_5156" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/11/IMG_5156-1024x768.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/11/IMG_5156-300x225.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/11/IMG_5156-e1448450388126.jpg" data-orig-size="700,525" data-permalink="https://www.adventuresaroundasia.com/china-expat/img_5156/#main" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2015/11/IMG_5156-1024x768.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2110" id="caption-attachment-8040"><span data-dcnode-id="2111" instrument_node="">Candied fruit in the winter!</span></p></div><span data-dcnode-id="2108" instrument_node="">
</span><h2 data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">8. Candied Hawthornes –&nbsp;</span><em data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Tanghulu</span></em><span data-dcnode-id="2104" instrument_node=""> (糖葫芦)</span></h2><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2097"><span data-dcnode-id="2101" instrument_node="">A Chinese winter favorite, </span><em data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">tanghulu</span></em><span data-dcnode-id="2098" instrument_node=""> is a must-have street food treat. In the cold months, you’ll see little candied fruits on sticks scattered all over Beijing. While you can definitely go for the strawberries, bananas, or mixed fruit, by FAR the best is the candied hawthorns.</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Hawthorns look like tiny apples and are super sour. These sour fruits mix perfectly with the sticky sweet candy coating, while sweeter fruit like strawberries tends to be a bit much after a while.</span></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">I seriously don’t know anyone who doesn’t agree the hawthorns are the best. If you see one of these, definitely grab it.</span></p><span data-dcnode-id="2090" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2086" id="attachment_12253" style="width: 650px"><img alt="dry hot pot" aria-describedby="caption-attachment-12253" class="size-large wp-image-12253" data-attachment-id="12253" data-comments-opened="1" data-dcnode-id="2089" data-image-caption="<p>You can have it spicy or without spice!</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;2.2&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 6s&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1489931551&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.15&quot;,&quot;iso&quot;:&quot;200&quot;,&quot;shutter_speed&quot;:&quot;0.058823529411765&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="dry pot" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/dry-pot-1024x768.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/dry-pot-300x225.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/dry-pot-e1528797322420.jpg" data-orig-size="800,600" data-permalink="https://www.adventuresaroundasia.com/food-to-try-beijing/dry-pot/#main" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2018/06/dry-pot-1024x768.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2087" id="caption-attachment-12253"><span data-dcnode-id="2088" instrument_node="">You can have it spicy or without spice!</span></p></div><span data-dcnode-id="2085" instrument_node="">
</span><h2 data-dcnode-id="2080"><span data-dcnode-id="2084" instrument_node="">9. Dry Hot Pot –&nbsp; </span><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Mala Xiangguo</span></em><span data-dcnode-id="2081" instrument_node=""> (麻辣香锅)</span></h2><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Not in the mood for boiling your food? Try the famous dry pot! Yeah, yeah this one is technically from Sichuan too, but you can find it all over Beijing, especially in mall restaurants for some unknown reason.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Just like hot pot, you’ll pick out all of your ingredients and a flavorful base. After about 20 minutes, your dry pot will be brought out to you with all of your ingredients cooked to perfection. I always get my dry pot spicy, but there are many other non-spicy flavors to choose from.</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2072" instrument_node="">The best ingredients for dry pot are lotus root, tofu noodles/skin, </span><em data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">liang fen</span></em><span data-dcnode-id="2069" instrument_node=""> noodles, broccoli, chicken, cauliflower, veggie balls, or pretty much anything else that catches your eye!</span></p><span data-dcnode-id="2067" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2063" id="attachment_8032" style="width: 650px"><img alt="sweet potato street food" aria-describedby="caption-attachment-8032" class="size-large wp-image-8032" data-attachment-id="8032" data-comments-opened="1" data-dcnode-id="2066" data-image-caption="<p>Street sweet potatoes are my favorite!</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;5.6&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D3100&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1426314663&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;30&quot;,&quot;iso&quot;:&quot;320&quot;,&quot;shutter_speed&quot;:&quot;0.008&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0219" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/11/DSC_0219-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/11/DSC_0219-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2015/11/DSC_0219-e1448449181300.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/china-expat/dsc_0219-2/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2015/11/DSC_0219-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2064" id="caption-attachment-8032"><span data-dcnode-id="2065" instrument_node="">Street sweet potatoes are my favorite!</span></p></div><span data-dcnode-id="2062" instrument_node="">
</span><h2 data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node="">10. Roasted Chestnuts + Sweet Potato – </span><em data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Kao Hongshu+Tanghao Lizi</span></em><span data-dcnode-id="2058" instrument_node=""> （烤红薯+&nbsp;糖炒栗子)</span></h2><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Another street food favorite, you’ll be sure to find roasted sweet potato and chestnuts all over Beijing in the winter months. These cheap street eats are a Beijing staple in the winter and make a great snack on the go.</span></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Grab a giant sweet potato to split with a friend or a small paper bag of chestnuts. You definitely won’t regret it!</span></p><span data-dcnode-id="2050" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2043" id="attachment_12249" style="width: 650px"><img alt="mantou " aria-describedby="caption-attachment-12249" class="size-full wp-image-12249" data-attachment-id="12249" data-comments-opened="1" data-dcnode-id="2049" data-image-caption="<p>Try it with condensed milk! (Photo by politizer)</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Mantou" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mantou.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mantou-300x225.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mantou.jpg" data-orig-size="640,480" data-permalink="https://www.adventuresaroundasia.com/food-to-try-beijing/mantou/#main" height="480" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mantou.jpg&amp;raw" srcset="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mantou.jpg 640w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Mantou-300x225.jpg 300w" width="640"><p class="wp-caption-text" data-dcnode-id="2044" id="caption-attachment-12249"><span data-dcnode-id="2048" instrument_node="">Try it with condensed milk! (Photo by </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/politizer/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2047" instrument_node="">politizer</span></a><span data-dcnode-id="2045" instrument_node="">)</span></p></div><span data-dcnode-id="2042" instrument_node="">
</span><h2 data-dcnode-id="2037"><span data-dcnode-id="2041" instrument_node="">11. Chinese Steamed Bun – </span><em data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Mantou</span></em><span data-dcnode-id="2038" instrument_node=""> （馒头）</span></h2><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Are you craving bread? Well, you’ve come to the right place! In Beijing, you can find many small street-side shops selling steamed mantou buns. Personally, I don’t find the white buns have much flavor, but I have a few friends that buy them to satisfy their carb cravings.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">That said, you might find mantou on your local Beijing restaurant menu, and this is a dish you should definitely try in Beijing. You’ll be given a mixture of fried and steamed mantou, served in a circle around warm condensed milk. Yes, you’ll be dipping fried bread into condensed milk and it’s DELICIOUS.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Seriously, if you’re having a craving for carbs and sugar, this is the dish for you.</span></p><span data-dcnode-id="2027" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2023" id="attachment_10379" style="width: 650px"><img alt="Green tea ice cream" aria-describedby="caption-attachment-10379" class="size-large wp-image-10379" data-attachment-id="10379" data-comments-opened="1" data-dcnode-id="2026" data-image-caption="<p>Eat a green tea ice cream! </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0092" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/05/DSC_0092-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/05/DSC_0092-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/05/DSC_0092-e1494250481231.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/this-beijing-life-month-20/dsc_0092-4/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2017/05/DSC_0092-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2024" id="caption-attachment-10379"><span data-dcnode-id="2025" instrument_node="">Eat a green tea ice cream!</span></p></div><span data-dcnode-id="2022" instrument_node="">
</span><h2 data-dcnode-id="2017"><span data-dcnode-id="2021" instrument_node="">12. Green Tea Ice Cream – </span><em data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Lv Cha Bingqilin</span></em><span data-dcnode-id="2018" instrument_node=""> (绿茶冰淇淋）</span></h2><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Green tea ice cream is one of my absolute favorite summer snacks in China. But you need to go to the right place, and that’s the famous Wuyutai Tai Shop! Wuyutai has been brewing quality tea since the 1880’s and their shops typically have a storefront stall that serves tea ice cream! Here you’ll find green tea and flower tea ice cream served.</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">The best thing about this green tea ice cream is that Wuyutai uses fresh brewed green tea in the ice cream making process, so their $1 tasty cones are super refreshing and not too sweet.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">You can find Wuyutai shops all over Beijing, and it’s definitely worth a stop. You’ll find one right near the Drum and Bell Tower, and another near the Lama Temple. Just DON’T go to the one at Wangfujing because it’s super crowded… and let’s be honest, Wangfujing is completely overrated anyway.</span></p><span data-dcnode-id="2007" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2003" id="attachment_9752" style="width: 650px"><img alt="Beijing jarred yogurt" aria-describedby="caption-attachment-9752" class="size-large wp-image-9752" data-attachment-id="9752" data-comments-opened="1" data-dcnode-id="2006" data-image-caption="<p>honey flavored yogurt </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0760" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0760-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0760-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0760-e1481800278776.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/untour/dsc_0760-2/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0760-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2004" id="caption-attachment-9752"><span data-dcnode-id="2005" instrument_node="">honey flavored yogurt</span></p></div><span data-dcnode-id="2002" instrument_node="">
</span><h2 data-dcnode-id="1997"><span data-dcnode-id="2001" instrument_node="">13. Beijing Jarred Yogurt – </span><em data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Beijing Suannai</span></em><span data-dcnode-id="1998" instrument_node=""> （北京酸奶 ）</span></h2><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Another thing you HAVE to try during your trip to Beijing is a jar of honey yogurt. You’ll find these pretty much all over the city, sold in small shops and convenience stores. This yogurt tastes like greek yogurt with honey and it’s fantastic, especially after a meal of spicy food.</span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">You’ll be given a small jar of yogurt with a straw that you pop through the wax paper on top. Just remember that you can’t leave with the jar unless you want to pay extra!</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1984"><strong data-dcnode-id="1985"><span data-dcnode-id="1989" instrument_node="">Want a list of fun things to do in Beijing? </span><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travellingking.com/15-usual-things-to-do-in-beijing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1988" instrument_node="">Travelling King</span></a><span data-dcnode-id="1986" instrument_node=""> has you covered!</span></strong></p><span data-dcnode-id="1983" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1979" id="attachment_9753" style="width: 650px"><img alt="Chinese chicken wings" aria-describedby="caption-attachment-9753" class="size-large wp-image-9753" data-attachment-id="9753" data-comments-opened="1" data-dcnode-id="1982" data-image-caption="<p>Chinese chicken wings from the UnTour food tour! </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0770" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0770-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0770-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0770-e1481800400868.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/untour/dsc_0770/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0770-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="1980" id="caption-attachment-9753"><span data-dcnode-id="1981" instrument_node="">The spicier the better!</span></p></div><span data-dcnode-id="1978" instrument_node="">
</span><h2 data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">14. Beijing BBQ – </span><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Chuan’r</span></em><span data-dcnode-id="1974" instrument_node=""> (串儿)</span></h2><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">You can’t go to Beijing without some good old fashioned BBQ. Yes, you can find this all over China, but why not have it in Beijing? The best way to enjoy BBQ is on the street… literally. You’ll know you’ve found a BBQ place when you see the “串“ symbol lit up in Christmas lights. It kind of looks like a kebab doesn’t it?</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">You can get pretty much any type of BBQ kebab you want in Beijing, but my favorites are always lamb, chicken wings, “see you tomorrow” golden needle mushrooms, green onion, lotus root, and mantou.</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1965" instrument_node="">Typically locals eat </span><em data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">chuan’r</span></em><span data-dcnode-id="1962" instrument_node=""> as a late-night snack with a plastic cup of cheap beer. You’ll also see a lot of peanuts and edamame as a snack in addition to your kebabs.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">If Chinese character menus are a bit much for you, look for a place that has all the meats and veggies out on display. You can pick your own kebabs and put them in a basket and the chef will cook them right in front of you! Don’t forget to order a giant bottle of Chinese beer to wash it down.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1953" id="attachment_9537" style="width: 650px"><img alt="donkey burger" aria-describedby="caption-attachment-9537" class="size-large wp-image-9537" data-attachment-id="9537" data-comments-opened="1" data-dcnode-id="1956" data-image-caption="<p>Donkey Burgers from UnTour’s food tour! </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;3.5&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D3100&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1475257419&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;18&quot;,&quot;iso&quot;:&quot;400&quot;,&quot;shutter_speed&quot;:&quot;0.025&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="dsc_0767-1" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/11/DSC_0767-1-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/11/DSC_0767-1-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/11/DSC_0767-1-e1478501507607.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/this-beijing-life-month-14/dsc_0767-1/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2016/11/DSC_0767-1-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="1954" id="caption-attachment-9537"><span data-dcnode-id="1955" instrument_node="">Donkey Burgers from UnTour’s food tour!</span></p></div><span data-dcnode-id="1952" instrument_node="">
</span><h2 data-dcnode-id="1947"><span data-dcnode-id="1951" instrument_node="">15.&nbsp;Donkey Burger –&nbsp;</span><em data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Lv Rou Huo Shao</span></em><span data-dcnode-id="1948" instrument_node=""> （驴肉火烧）</span></h2><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Wait… donkey burgers???? Yes, donkey burgers are a thing in Beijing and they’re amazing. You’ll find a few restaurants scattered all over Beijing that specialize in these tasty sandwiches.</span></p><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">They taste sort of like pulled pork on a tasty bit of bread, but yeah, you’re eating donkey. Watch as the chef chops up braised donkey with some green peppers and savory gravy. YUM.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1939" instrument_node="">The best place to find a good donkey burger is </span><a data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebeijinger.com/blog/2010/10/08/best-ass-town-tasty-way-enjoy-donkey-meat" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1938" instrument_node="">Wang Pang Zi Donkey Burger Restaurant</span></a><span data-dcnode-id="1936" instrument_node="">, which can be found at a few different locations across Beijing.</span></p><span data-dcnode-id="1934" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1930" id="attachment_9748" style="width: 650px"><img alt="Roast Muttong UnTour" aria-describedby="caption-attachment-9748" class="size-large wp-image-9748" data-attachment-id="9748" data-comments-opened="1" data-dcnode-id="1933" data-image-caption="<p>Mutton on a spit!</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0739" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0739-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0739-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0739-e1481799757307.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/untour/dsc_0739/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0739-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="1931" id="caption-attachment-9748"><span data-dcnode-id="1932" instrument_node="">Mutton on a spit!</span></p></div><span data-dcnode-id="1929" instrument_node="">
</span><h2 data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node="">16. Beijing Roast Mutton – </span><em data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Kao Yang Tui</span></em><span data-dcnode-id="1925" instrument_node=""> （烤羊腿）</span></h2><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Looking for an interactive eating experience? Well, look no further than Beijing roast mutton leg! You’ll be given a big chunk of lamb which will be roasted over a spit. As the meat cooks you can saw it off with weirdly long knives and forks. Then you’ll take your mutton and dip it in a variety of sauces, chili, cumin, and salt. You can even wrap it in a lettuce leaf and make a little Korean BBQ-esque taco!</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">The best </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">kaoyangtui</span></em><span data-dcnode-id="1916" instrument_node=""> places all seem to be in the Andingmen area of Beijing’s hutongs, however, you’re sure to find other decent places scattered around town.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1911" style="text-align: center;"><a class="button large" data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/ultimate-china-guide-landing-page/" style="" target="_blank"><span data-dcnode-id="1913" instrument_node="">Get Your free China Survival guide!</span></a></p><span data-dcnode-id="1910" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1906" id="attachment_12256" style="width: 650px"><img alt="Spicy Chinese grilled fish" aria-describedby="caption-attachment-12256" class="size-large wp-image-12256" data-attachment-id="12256" data-comments-opened="1" data-dcnode-id="1909" data-image-caption="<p>There’s a fish under here. I promise. </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;2.2&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 6s&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1493497219&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.15&quot;,&quot;iso&quot;:&quot;160&quot;,&quot;shutter_speed&quot;:&quot;0.03030303030303&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Spicy fish" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Spicy-fish-1024x768.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Spicy-fish-300x225.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/Spicy-fish-e1528797434868.jpg" data-orig-size="800,600" data-permalink="https://www.adventuresaroundasia.com/food-to-try-beijing/spicy-fish/#main" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2018/06/Spicy-fish-1024x768.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="1907" id="caption-attachment-12256"><span data-dcnode-id="1908" instrument_node="">There’s a fish under here. I promise.</span></p></div><span data-dcnode-id="1905" instrument_node="">
</span><h2 data-dcnode-id="1900"><span data-dcnode-id="1904" instrument_node="">17. Grilled Whole Fish –&nbsp; </span><em data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Kao Quan Yu</span></em><span data-dcnode-id="1901" instrument_node="">（烤全鱼）</span></h2><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">To be honest, I’m not sure where this dish is from (probably Sichuan) and I don’t even care. You can find grilled whole fish all over Beijing and it’s fantastic!</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Choose a fish, choose a flavor, and choose a bunch of ingredients to be cooked along with your fish, and you’re in for a great meal! I always recommend asking the chef for the fish with the least amount of bones, even if you have to pay a bit extra. If you don’t speak Chinese, typically the chef will recommend a fish for you. Just say yes.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Personally, I love getting a Sichuan (numb spicy) or Hunnan (just plain old spicy) flavor for my fish, but there are plenty of other options! You’ll find pickled flavors… other non-spicy flavors… To be honest, I don’t really pay attention to the non-spicy flavors, but they exist!</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">You’ll definitely want to get a few extra ingredients in addition to the fish, too. My picks are lotus root (surprise), broccoli, pretty much any type of tofu, bean sprouts, and cauliflower. Your waiter will let you know if you need more food or more ingredients.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1886" instrument_node="">To be honest, this is an experience you probably want to have with a Chinese speaker since I have yet to see a </span><em data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">kaoyu</span></em><span data-dcnode-id="1883" instrument_node=""> menu in English, but if you’re up for a challenge, you can definitely attempt </span><em data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">kaoyu</span></em><span data-dcnode-id="1880" instrument_node=""> with no Chinese! Just translate the names of all the ingredients you want and you should be fine!</span></p><span data-dcnode-id="1878" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1874" id="attachment_12254" style="width: 650px"><img alt="huiguorou " aria-describedby="caption-attachment-12254" class="size-large wp-image-12254" data-attachment-id="12254" data-comments-opened="1" data-dcnode-id="1877" data-image-caption="<p>Ugh I miss this so bad</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;4&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D3100&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1505033465&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;24&quot;,&quot;iso&quot;:&quot;560&quot;,&quot;shutter_speed&quot;:&quot;0.066666666666667&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="huiguorou" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou.jpg" data-orig-size="1280,854" data-permalink="https://www.adventuresaroundasia.com/food-to-try-beijing/huiguorou/#main" height="427" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou-1024x683.jpg&amp;raw" srcset="https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou-1024x683.jpg 1024w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou-300x200.jpg 300w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou-768x512.jpg 768w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou-686x458.jpg 686w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou-640x427.jpg 640w, https://www.adventuresaroundasia.com/wp-content/uploads/2018/06/huiguorou.jpg 1280w" width="640"><p class="wp-caption-text" data-dcnode-id="1875" id="caption-attachment-12254"><span data-dcnode-id="1876" instrument_node="">Sichuan style Huiguorou</span></p></div><span data-dcnode-id="1873" instrument_node="">
</span><h2 data-dcnode-id="1868"><span data-dcnode-id="1872" instrument_node="">18. Twice Cooked Pork – </span><em data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Huiguorou</span></em><span data-dcnode-id="1869" instrument_node=""> （回锅肉）</span></h2><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1866" instrument_node="">Another Sichuan dish, this is a popular choice you can find all over China. If you’re looking for some inoffensive, tasty Chinese food, </span><em data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">huiguorou</span></em><span data-dcnode-id="1863" instrument_node=""> is for you!</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1857"><em data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Huiguorou</span></em><span data-dcnode-id="1858" instrument_node="">, or twice cooked pork, is made with fatty pork, which is simmered, sliced and stir-fried along with vegetables like cabbage, bell peppers, onions, or scallions.</span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1855" instrument_node="">A Sichuan restaurant will be sure to make your </span><em data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">huiguorou</span></em><span data-dcnode-id="1852" instrument_node=""> spicy, whereas an average Beijing restaurant will have a less-spicy, oilier version.</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Meat and veggies over rice? Who wouldn’t love that!</span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1838"><strong data-dcnode-id="1839"><span data-dcnode-id="1846" instrument_node="">For the best </span><em data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">huiguorou</span></em><span data-dcnode-id="1843" instrument_node=""> in Beijing, be sure to </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/zhangmama-best-restaurant-beijing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1842" instrument_node="">take a visit to Zhang Mama</span></a><span data-dcnode-id="1840" instrument_node="">!</span></strong></p><span data-dcnode-id="1837" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1833" id="attachment_9992" style="width: 650px"><img alt="Lost Plate Food Tour" aria-describedby="caption-attachment-9992" class="size-large wp-image-9992" data-attachment-id="9992" data-comments-opened="1" data-dcnode-id="1836" data-image-caption="<p>An amazing Chinese taco </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0977" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0977-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0977-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0977-e1486558574505.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/lost-plate-hutong-food-tour/dsc_0977-2/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0977-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="1834" id="caption-attachment-9992"><span data-dcnode-id="1835" instrument_node="">An amazing Chinese taco</span></p></div><span data-dcnode-id="1832" instrument_node="">
</span><h2 data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">19. Emperor’s Pork Pancakes</span></h2><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1828" instrument_node="">Everyone knows Beijing is famous for Peking Duck, served with veggies, plum sauce, and a thin taco. Well, duck isn’t the only incredible taco native to Beijing! I first had these pork pancakes on the </span><a data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/lost-plate-hutong-food-tour/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1827" instrument_node="">Lost Plate Food Tour in Beijing</span></a><span data-dcnode-id="1825" instrument_node="">, and I’ve been hooked ever since!</span></p><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">These pork tacos are made with pig elbow, which is much better than it sounds. You then dip the elbow in a savory, tangy sauce, and load it into your freshly cooked tortilla, along with some scrambled egg and veggies. It’s AMAZING.</span></p><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">In ancient China, emperors would give their favorite employees and officials a pancake filled with pork and egg for the Chinese New Year. If you got a pancake, that meant you were doing a great job. If you didn’t get a pancake, well…</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">There are a few incredible Emperor’s Pork restaurants scattered around Beijing, but the one I went to was nestled deep in Beijing’s hutongs!</span></p><span data-dcnode-id="1814" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1810" id="attachment_9516" style="width: 650px"><img alt="Great Leap beer" aria-describedby="caption-attachment-9516" class="size-large wp-image-9516" data-attachment-id="9516" data-comments-opened="1" data-dcnode-id="1813" data-image-caption="<p>Honey Ma IPA </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;3.5&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D3100&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1475578322&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;18&quot;,&quot;iso&quot;:&quot;900&quot;,&quot;shutter_speed&quot;:&quot;0.066666666666667&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="dsc_0783-1" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/11/DSC_0783-1-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/11/DSC_0783-1-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/11/DSC_0783-1-e1478501993309.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/this-beijing-life-month-14/dsc_0783-1/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2016/11/DSC_0783-1-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="1811" id="caption-attachment-9516"><span data-dcnode-id="1812" instrument_node="">Honey Ma craft beer at Great Leap</span></p></div><span data-dcnode-id="1809" instrument_node="">
</span><h2 data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">20. Beijing Craft Beer</span></h2><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">While craft beer isn’t super traditional, Beijing has developed a few amazing local breweries over the last few years! While there’s too many to mention here, there are two that are a bit more “local” than the rest.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Firstly, we have Great Leap, which is run by a married American and Chinese couple. They originally called their bar Great Leap because of the proverb: If you’re going to take a great leap, you need to do it now when you’re young and fat.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Great Leap makes their beer with only Chinese ingredients. Their most popular beer is the Honey Ma, which actually uses real Sichuan peppercorns! My personal favorite is the Honey Ma IPA, where you can really taste the numbing flavor.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">While in Beijing you should also check out Peiping Machine Brewery off Fangjia Hutong. This brewery is run entirely by locals in the Beijing Brewing Association. They’re always trying out new beers and flavors which they test on their clientele. By far my favorite beer here is the 100 Flowers IPA. Be sure to give it a try when you’re in town!</span></p><span data-dcnode-id="1794" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1790" id="attachment_9750" style="width: 650px"><img alt="Beijing street BBQ" aria-describedby="caption-attachment-9750" class="size-large wp-image-9750" data-attachment-id="9750" data-comments-opened="1" data-dcnode-id="1793" data-image-caption="<p>Beijing’s street BBQ</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0751" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0751-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0751-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0751-e1481800771209.jpg" data-orig-size="700,467" data-permalink="https://www.adventuresaroundasia.com/untour/dsc_0751-3/#main" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2016/12/DSC_0751-1024x683.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="1791" id="caption-attachment-9750"><span data-dcnode-id="1792" instrument_node="">Beijing’s street BBQ (note the chuan’r signs!)</span></p></div><span data-dcnode-id="1789" instrument_node="">
</span><h2 data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Book a Food Tour in Beijing!</span></h2><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">I always recommend booking a food tour on your trip to China, especially if you don’t speak the language or you’re unfamiliar with Chinese food.</span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">I’ve gone on a few excellent food tours in Beijing, and I highly recommend adding them to your China Itinerary!</span></p><span data-dcnode-id="1780" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1776" id="attachment_9989" style="width: 650px"><img alt="Lost Plate Food Tour" aria-describedby="caption-attachment-9989" class="size-large wp-image-9989" data-attachment-id="9989" data-comments-opened="1" data-dcnode-id="1779" data-image-caption="<p>Enjoying the tour with Lost Plate </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="DSC_0964" data-large-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964-1024x683.jpg" data-medium-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964-300x200.jpg" data-orig-file="https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964.jpg" data-orig-size="1275,850" data-permalink="https://www.adventuresaroundasia.com/lost-plate-hutong-food-tour/dsc_0964/#main" height="427" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964-1024x683.jpg&amp;raw" srcset="https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964-1024x683.jpg 1024w, https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964-300x200.jpg 300w, https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964-768x512.jpg 768w, https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964-686x457.jpg 686w, https://www.adventuresaroundasia.com/wp-content/uploads/2017/02/DSC_0964.jpg 1275w" width="640"><p class="wp-caption-text" data-dcnode-id="1777" id="caption-attachment-9989"><span data-dcnode-id="1778" instrument_node="">Enjoying the tour with Lost Plate</span></p></div><span data-dcnode-id="1775" instrument_node="">
</span><h3 data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Lost Plate Food Tour</span></h3><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1771" instrument_node="">Lost Plate is an amazing food tour company that offers tours in Beijing, Shanghai, Chengdu, Xi’an and recently, Cambodia and Portland! My fiance Chris and I actually used to lead a brewery tour for them, which has now morphed into the </span><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lostplate.com/beijing-food-tours/%23nightinbeijing" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1770" instrument_node="">One Night in Beijing tour</span></a><span data-dcnode-id="1768" instrument_node=""> with craft beer, BBQ, and cocktails!</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">This is the tour where you’ll have a chance to try the Emperor’s Pork Pancake, along with a few other delicacies like alcoholic yogurt, sesame noodles, Mongolian BBQ, and more! You’ll also end the tour at a local Beijing craft brewery, Arrow Factory!</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Finally, the best part about this tour is that you’re zipped around on a tuk-tuk stocked with unlimited beer and soda! Who doesn’t love that?</span></p><span data-dcnode-id="1760" instrument_node="">

</span><p data-dcnode-id="1738"><span data-dcnode-id="1742" instrument_node="">On your Beijing Old Dinner food tour, you’ll get to experience many of the items on the list above, from street BBQ to jarred yogurt, to </span><em data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">jiaozi</span></em><span data-dcnode-id="1739" instrument_node=""> and roast mutton leg. YUM.</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">UnTour also offers a Beijing breakfast tour where you can try </span><em data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">jianbing</span></em><span data-dcnode-id="1733" instrument_node=""> and explore a local market!</span></p><span data-dcnode-id="1731" instrument_node="">

</span><h2 data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">What If I Don’t Speak Chinese?</span></h2><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Great question! China is a difficult country to navigate if you don’t speak Chinese, but I have a few tips to help you out.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Firstly, when it comes to finding restaurants, I always recommend asking your hotel or hostel. They know of all the good places around town, and if they don’t they can always do a quick Baidu search for you!</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Next, you’ll want to find places with picture menus and English translations. This makes it really easy to know what you’re ordering. In addition, street food like BBQ can be great, because you just need to fill up a basket with whatever you want.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1709" instrument_node="">You can also always use my two fallbacks: Pleco and pointing at stuff. </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.adventuresaroundasia.com/Pleco" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1708" instrument_node="">Pleco</span></a><span data-dcnode-id="1706" instrument_node=""> is my go-to Chinese dictionary app that you can use without wifi! All you have to do is just show your waiter the Chinese characters. If that doesn’t work… just point at what other people are eating.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1697"><strong data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node="">Thankfully, I’ve created an entire post that goes over all of this in detail called </span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventuresaroundasia.com/travel-china-without-chinese/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1702" instrument_node="">10 Tips for Traveling in China Without Speaking Chinese</span></a><span data-dcnode-id="1700" instrument_node="">.</span></strong><span data-dcnode-id="1698" instrument_node=""> If you’re worried about surviving in China without Mandarin, I definitely recommend checking it out.</span></p><span data-dcnode-id="1696" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1373"><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">OMG! I love Chinese food especially Mongolian Hot Pot! </span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">And you’re so right, it’s totally different than at home. I went to Hong Kong for the first time back in 1999 (Ahem!), and just followed a bunch of random people to the top floor of a shopping mall. I tried the basic stuff and found I didn’t like it ‘cos there was too much soy sauce in it, and ended up eating plain rice. just to be sure!</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">However, the highlight was eating 100 day old eggs and birds nest soup in the market, and when I just saw all these people in a very nice restaurant, and followed them in. </span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">The menu was all in Chinese, and then they gave me a little table stove, a frying pan, a variety of raw meat, and chop sticks. Bear in mind that I was in Asia solo for the very first time then, and I hadn’t used chop sticks before, and really didn’t know what was expected of me! But I’m pretty versatile, I just looked around and did what everyone else was doing! </span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">I’ve been back to Asia many times since then!</span></p><span data-dcnode-id="1374" instrument_node="">
</span></div><span data-dcnode-id="1372" instrument_node="">
