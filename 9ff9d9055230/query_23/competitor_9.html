</span><article class="et_pb_post post-19179 post type-post status-publish format-standard has-post-thumbnail hentry category-salads-soups category-exotic-recipes category-travel-guides tag-asia tag-china" data-dcnode-id="463" id="post-19179"><span data-dcnode-id="3179" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="3164"><span data-dcnode-id="3178" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Black Fungus Salad | 凉拌木耳 | Liángbàn Mù’ěr &amp; Beijing Photo Tour</span></h1><span data-dcnode-id="3175" instrument_node="">
</span><p class="post-meta" data-dcnode-id="3166"><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/salads-soups/" rel="category tag"><span data-dcnode-id="3174" instrument_node="">Salads &amp; Soups</span></a><span data-dcnode-id="3172" instrument_node="">, </span><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/exotic-recipes/" rel="category tag"><span data-dcnode-id="3171" instrument_node="">Exotic World Recipes</span></a><span data-dcnode-id="3169" instrument_node="">, </span><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/travel-guides/" rel="category tag"><span data-dcnode-id="3168" instrument_node="">Travel Guides</span></a></p><span data-dcnode-id="3165" instrument_node="">
</span></div><span data-dcnode-id="3163" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2054"><span data-dcnode-id="3162" instrument_node="">
</span><div data-dcnode-id="3160" data-inserter-version="2" id="ezoic-pub-ad-placeholder-124"></div><h3 data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">Don’t shy away from tasting this lovely Black Fungus Salad called &nbsp;Liángbàn Mù’ěr. This mushroom salad is slightly crunchy, refreshing, and perfectly paired with a spicy soy sauce and rice vinegar dressing.</span></h3><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">Beijing is like the Liángbàn Mù’ěr, or Black Fungus Salad. It looks scary and intimidating at first sight, but if you get over your fear and peel away the layers, you will be rewarded with enchanting and beautiful flavors. Right now everyone is asking me how my trip to Beijing China was. The problem is I cannot respond&nbsp;with a short answer. I just can’t. You better be ready to pull up a chair and listen to me go on for a few minutes.</span></p><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Yes, I loved my trip but it was a shock to the system at first. Your social and cultural compass gets completely off track and it takes about three days for your brain to stop having a ‘deer in&nbsp;headlights’ reaction, only then can you start going with the flow. And you don’t even really realize you are in a culture shock at first, you only realize it later…</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3145"><span data-dcnode-id="3149" instrument_node="">By the way, I found my plane ticket for 507$ CAD, so cheap! Check out my article </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/how-to-find-cheap-flights-skyscanner-flights/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3148" instrument_node="">on how to find cheap flights here</span></a><span data-dcnode-id="3146" instrument_node="">.</span></p><div data-dcnode-id="3143" data-inserter-version="2" id="ezoic-pub-ad-placeholder-132"></div><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3139"><img alt="Black Fungus Salad" class="aligncenter size-full wp-image-19211" data-dcnode-id="3140" height="541" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/black-fungus-salad.jpg&amp;raw" width="900"></p><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">My mind could recognize that I was in a massive urban landscape, but everything else was different. Everything! The food, the social structure, the architecture, the acceptable social behavior, the scrutiny of security in various forms, being observed all the time as a foreigner, the gray clean beauty. I think only people who have been there will get that last part.</span></p><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Beijing is the embodiment of a clash between the very old and the ultra-new. All the last modern inventions battle with the still very present rigid communist conformity. The mystical blends constantly with state of the art science. Coming from a very individualistic Western society, my core was shaken as I was absorbed into the heard communal mentality.</span></p><div data-dcnode-id="3131" data-inserter-version="2" id="ezoic-pub-ad-placeholder-133"></div><span data-dcnode-id="3129" instrument_node="">
</span><h4 data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Me vs Us</span></h4><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">That is a really hard concept to grasp for us. Personal space is non-existent and what happens to you affects everybody. It is not as bad as you imagine but you see it and feel it. I will make a video discussing this topic more in-depth but here is an example: I made 4 Chinese friends before I went on holiday and spent time with them in Beijing. When we walked down the street they did not walk side by side to me but rather pushed up right up against me. All 4 of them, man or woman, you literally walk together!</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">One final thing I want to discuss: you will get stared at all the time. We foreigners are still a new thing and a novelty in China. Even in urban Beijing, many locals will look at you all the time because you look different. It is only curiosity and it is not intimidating at all.</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">After a few days, I always made a point of making contact with people who started at me by staring back with a huge radiant smile, by waving or saying Nĭ hăo (hello). That always startled them but created lovely minute exchanges. And a few times I was approached by more provincial Chinese travelers with complete curiosity who asked if they could take a picture of me with them. I loved that!</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><img alt="Black Fungus Salad" class="aligncenter size-full wp-image-19212" data-dcnode-id="3116" height="900" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/black-fungus-salad-dish.jpg&amp;raw" width="543"></p><div data-dcnode-id="3113" data-inserter-version="2" id="ezoic-pub-ad-placeholder-134"></div><span data-dcnode-id="3111" instrument_node="">
</span><h4 data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Beijing Travel Advice</span></h4><span data-dcnode-id="3108" instrument_node="">
</span><ul data-dcnode-id="3062"><span data-dcnode-id="3107" instrument_node="">
</span><li data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Give Beijing at least 2 weeks if you really want to see the city properly.</span></li><span data-dcnode-id="3104" instrument_node="">
</span><li data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">It is a MASSIVE city.&nbsp;It takes a long time to get from point A to point B. Even the tourist sites are gigantic.</span></li><span data-dcnode-id="3101" instrument_node="">
</span><li data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Stick to the subway and walking. It is really easy to take the subway and everything is also in English.</span></li><span data-dcnode-id="3098" instrument_node="">
</span><li data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Wear excellent shoes. You will walk a lot, like a &nbsp;lot!</span></li><span data-dcnode-id="3095" instrument_node="">
</span><li data-dcnode-id="3090"><span data-dcnode-id="3094" instrument_node="">Try as many weird street foods and snack foods as possible! It’s everywhere. Just make sure meats are well cooked and pick stands with&nbsp;a high turnaround so the food is fresh. </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/chinese-laba-garlic/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3093" instrument_node="">Check out my Beijing Foodporn Diary here</span></a><span data-dcnode-id="3091" instrument_node="">.</span></li><span data-dcnode-id="3089" instrument_node="">
</span><li data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Explore the various hutongs (I’ll tell you about them further) around the city as much as possible, get lost in them. It is amazing how much local&nbsp;life you will see here.</span></li><span data-dcnode-id="3086" instrument_node="">
</span><li data-dcnode-id="3081"><span data-dcnode-id="3085" instrument_node="">Facebook, Twitter, and many other Western websites are blocked in China.&nbsp; You will need a Virtual Private Network (VPN) in order to access these sites and to browse safely.&nbsp; Personally, </span><a data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xvinlink.com/%3Fa_fid%3Dcultureatz" rel="noopener sponsored noreferrer" target="_blank"><span data-dcnode-id="3084" instrument_node="">I used ExpressVPN</span></a><span data-dcnode-id="3082" instrument_node=""> during my trip there and it worked great!</span></li><span data-dcnode-id="3080" instrument_node="">
</span><li data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Beijing is the best city for people watching I have ever experienced. Go to parks and the lakes and watch the Beijingers swim (in winter), play ping pong, dance, do Tai Chi, and play cards or chess.</span></li><span data-dcnode-id="3077" instrument_node="">
</span><li data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Most Chinese people do not speak English, at all. But most people are super friendly, very warm and very generous, they will do their best to help you. You just have to break their ‘shy bubble’.</span></li><span data-dcnode-id="3074" instrument_node="">
</span><li data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Depending on your fitness, see any section of the Great Wall other than crowded Badaling. I went to Mutianyu.</span></li><span data-dcnode-id="3071" instrument_node="">
</span><li data-dcnode-id="3064"><span data-dcnode-id="3070" instrument_node="">Check out my growing&nbsp;</span><span class="branded-page-module-title-text" data-dcnode-id="3065"><span class="" data-dcnode-id="3066"><a class="yt-uix-sessionlink branded-page-module-title-link spf-nolink" data-dcnode-id="3068" data-sessionlink="ei=hQnDWPGWCYb18gSp3KZg&amp;ved=CKMBEM4eIhMIse2PwODM0gIVhrqcCh0prgkMKJsc" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/playlist%3Flist%3DPLbXJ84ueTkUtOon4WT4Cetf3Mu42Wbu8i" rel="noopener" target="_blank"><span data-dcnode-id="3069" instrument_node="">6 days in Beijing China YouTube Series</span></a><span data-dcnode-id="3067" instrument_node="">. I am posting videos weekly with clips from my trip and lots of advice videos will be posted.</span></span></span></li><span data-dcnode-id="3063" instrument_node="">
</span></ul><span data-dcnode-id="3061" instrument_node="">
</span><h4 data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">A&nbsp;Beijing Photo Tour</span></h4><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3056"><img alt="Beijing-lama-temple" class="aligncenter size-full wp-image-19185" data-dcnode-id="3057" height="746" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-lama-temple.jpg&amp;raw" width="900"></p><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3054" instrument_node="">The Yonghe Temple has been here since 1694. This &nbsp;Tibetan Buddhism temple is both a functioning temple and a tourist attraction. I loved the&nbsp;Buddhist temples best because </span><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DWiSyTAwH-Q0%3Fsub_confirmation%3D1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3053" instrument_node="">you can see constantly people coming to pray</span></a><span data-dcnode-id="3051" instrument_node="">. The temple gives out free incense so you can pay your respect at each building.</span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3047"><img alt="Beijing Mao Tianamen Square" class="aligncenter size-full wp-image-19186" data-dcnode-id="3048" height="358" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-Mao.jpg&amp;raw" width="900"></p><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">The ongoing influence of Mao Zedong is still present, from his iconic portrait at one end of Tiananmen Square to the old men all over the city still adhering to the communist fashion.</span></p><div data-dcnode-id="3042" data-inserter-version="2" id="ezoic-pub-ad-placeholder-135"></div><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3038"><img alt="Beijing-Forbidden City Temple of Heaven" class="aligncenter size-full wp-image-19191" data-dcnode-id="3039" height="667" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-architecture.jpg&amp;raw" width="900"></p><span data-dcnode-id="3037" instrument_node="">
</span><h5 data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">A taste of Beijing architecture!</span></h5><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3033" instrument_node="">Top left: the Gate of Supreme Harmony in The Forbidden City.</span><br data-dcnode-id="3032"><span data-dcnode-id="3031" instrument_node="">
Top right: a wall close-up with me of The Temple of Buddhist Virtue at The Summer Palace.</span><br data-dcnode-id="3030"><span data-dcnode-id="3029" instrument_node="">
Bottom left: an example of the ornate woodwork involved in the roof structure of the&nbsp;Hall of Buddhist Tenets&nbsp;at The Summer Palace.</span><br data-dcnode-id="3028"><span data-dcnode-id="3027" instrument_node="">
Bottom right: the Hall of Prayer for Good Harvests in the Temple of Heaven Park.</span></p><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3023"><img alt="Beijing-panjiyuan-market" class="aligncenter size-full wp-image-19187" data-dcnode-id="3024" height="622" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-panjiyuan-market.jpg&amp;raw" width="900"></p><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3014"><span data-dcnode-id="3021" instrument_node="">Top left and bottom right: scenes from the Panjiayuan Antique and Flea Market – </span><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DieNR7uWMcfc%3Fsub_confirmation%3D1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3020" instrument_node="">I just posted here a video of my&nbsp;visit to the market!</span></a><br data-dcnode-id="3018"><span data-dcnode-id="3017" instrument_node="">
Top right: just outside of a hot pot restaurant, no idea why they pile them out there</span><br data-dcnode-id="3016"><span data-dcnode-id="3015" instrument_node="">
Bottom left: an example of mopped biking, they are everywhere!</span></p><div data-dcnode-id="3012" data-inserter-version="2" id="ezoic-pub-ad-placeholder-136"></div><span data-dcnode-id="3010" instrument_node="">
</span><p data-dcnode-id="3008"><img alt="Beijing-hutongs" class="aligncenter size-full wp-image-19184" data-dcnode-id="3009" height="539" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-hutongs.jpg&amp;raw" width="900"></p><span data-dcnode-id="3007" instrument_node="">
</span><p data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">Four varied scenes from residential hutongs called The Eight Hutongs. Hutongs are alleys formed by lines of traditional courtyard residences. Each entrance leads down a labyrinth-like corridor where 4 to 9 families can live. This is the real China, the old Beijing untouched where you can see daily life.</span></p><span data-dcnode-id="3004" instrument_node="">
</span><p data-dcnode-id="3002"><img alt="Beijing-confucius" class="aligncenter size-full wp-image-19192" data-dcnode-id="3003" height="509" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-confucious.jpg&amp;raw" width="900"></p><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">One of my favorite pictures of the entire trip, these guys were out of commission hidden in a dead-end corridor at the Temple of Confucius. They were not on display, there was about 30 of them just placed in storage facing a wall. We were not supposed to be there and take pictures technically.</span></p><div data-dcnode-id="2997" data-inserter-version="2" id="ezoic-pub-ad-placeholder-137"></div><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2993"><img alt="Beijing-Summer-Palace" class="aligncenter size-full wp-image-19190" data-dcnode-id="2994" height="884" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-Summer-Palace.jpg&amp;raw" width="900"></p><span data-dcnode-id="2992" instrument_node="">
</span><p data-dcnode-id="2986"><span data-dcnode-id="2991" instrument_node="">Top: a stunning winter scene at the&nbsp;Zhichun Perceiving the Spring Pavilion at the Summer Palace.</span><br data-dcnode-id="2990"><span data-dcnode-id="2989" instrument_node="">
Bottom left: men fishing in the Houhai, the largest of the three lakes in the city.</span><br data-dcnode-id="2988"><span data-dcnode-id="2987" instrument_node="">
Bottom right: view of the Wànshòu Shān (Longevity Hill) from the&nbsp;Zhichun Pavilion at the Summer Palace.</span></p><span data-dcnode-id="2985" instrument_node="">
</span><p data-dcnode-id="2983"><img alt="Beijing-random" class="aligncenter size-full wp-image-19188" data-dcnode-id="2984" height="590" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-random.jpg&amp;raw" width="900"></p><span data-dcnode-id="2982" instrument_node="">
</span><h5 data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">A few fun random pics!</span></h5><span data-dcnode-id="2979" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="2978" instrument_node="">Top left: a street cat grooming on a roof in the hutongs</span><br data-dcnode-id="2977"><span data-dcnode-id="2976" instrument_node="">
Bottom left: a light festival on the last day of the Spring Festival</span><br data-dcnode-id="2975"><span data-dcnode-id="2974" instrument_node="">
Right: these two came up to me and asked to take a picture of me with them, small town Chinese tourist are very curious about foreigners!!!</span></p><div data-dcnode-id="2971" data-inserter-version="2" id="ezoic-pub-ad-placeholder-138"></div><span data-dcnode-id="2969" instrument_node="">
</span><p data-dcnode-id="2967"><img alt="Beijing-hutongs life" class="aligncenter size-full wp-image-19183" data-dcnode-id="2968" height="774" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-hutongs-life.jpg&amp;raw" width="900"></p><span data-dcnode-id="2966" instrument_node="">
</span><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">More hutong life and scenes. Oh yeah, did I mention there is no plumbing in the hutongs and everyone goes to these public bathrooms? Except for hotels and modern buildings, you will find squat toilets like these. In the hutongs, there is zero privacy as there is no stall separation. It’s all part of the no personal space attitude you find there.</span></p><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2961"><img alt="Great Wall of China" class="aligncenter size-full wp-image-19182" data-dcnode-id="2962" height="1200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-Great-Wall.jpg&amp;raw" width="900"></p><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">No trip to Beijing is complete without a day trip to the Great Wall of China. I went to the Mutianyu section. It is restored but not as crowded as closer sections to Beijing. I was there at the best time: low season so no crowds. I hiked from tower 14 to 20 (see arrow in top pic!).</span></p><div data-dcnode-id="2956" data-inserter-version="2" id="ezoic-pub-ad-placeholder-139"></div><span data-dcnode-id="2954" instrument_node="">
</span><p data-dcnode-id="2952"><img alt="Beijing-restaurant and Black Fungus Salad" class="aligncenter size-full wp-image-19189" data-dcnode-id="2953" height="392" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cultureatz.com/wp-content/uploads/2017/03/Beijing-restaurant-and-Black-Fungus-Salad.jpg&amp;raw" width="900"></p><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">And finally, I just love the outside facade of the restaurant where we went for Pekin Duck. I have no idea what the name was but I can tell you the address is 17 Meishi Street by Qianmen.</span></p><span data-dcnode-id="2948" instrument_node="">
</span><h4 data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Pass the Black Fungus Salad, please!</span></h4><span data-dcnode-id="2945" instrument_node="">
</span><p data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">One food item on my bucket list to try in China was the black fungus (Mù’ěr), an edible jelly fungus that grows on trees in mountainous regions.&nbsp;Don’t freak about because of the word fungus. A fungus is a mushroom!!!! Seen in the photo above the&nbsp;Liángbàn Mù’ěr dish, or Black Fungus Salad, we had that night.</span></p><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2941" instrument_node="">Here is a quick 1 minute Black Fungus Salad recipe video</span><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">

</span><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">This Black Fungus Salad was on the top of my list as well of the recipes to try when I got back home. Just about any Asian grocery store will have dried black fungus in stock. It could also be listed under the names&nbsp;wood ear or cloud ear fungus. For the Black Fungus Salad the smaller the fungus the better. To hydrate just place them in a big bowl of water and leave for a while. They will absorb a lot, and I mean a lot, of water and get a whole lot bigger.</span></p><div data-dcnode-id="2414" data-inserter-version="2" id="ezoic-pub-ad-placeholder-140"></div><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">The fungus is more or less tasteless but has a great slightly crunchy texture. They are delicious served with rice vinegar and soy sauce with a &nbsp;little bit of a spicy kick. Time to take out your&nbsp;Sichuan peppers if you got em’!</span></p><span data-dcnode-id="2409" instrument_node="">

"wprm-recipe-35673-step-0-3" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="2186" style="margin-bottom: 5px"><span data-dcnode-id="2187" instrument_node="">In a bowl mix the garlic, soy sauce, rice vinegar, sugar, salt, oil and Sichuan pepper.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="2182" id="wprm-recipe-35673-step-0-4" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="2183" style="margin-bottom: 5px"><span data-dcnode-id="2184" instrument_node="">Toss the mushrooms with the sauce, and slice Thai chili if using.</span></div></li><li class="wprm-recipe-instruction" data-dcnode-id="2179" id="wprm-recipe-35673-step-0-5" style="list-style-type: decimal;"><div ;="" class="wprm-recipe-instruction-text" data-dcnode-id="2180" style="margin-bottom: 5px"><span data-dcnode-id="2181" instrument_node="">Place in a serving dish and top with spring oinions.</span></div></li></ul></div></div><span data-dcnode-id="2175" instrument_node="">
