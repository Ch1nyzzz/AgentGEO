7 1.717 0 01-1.712 1.712z" data-dcnode-id="4460" fill="#fff"></path></svg></span><span class="a2a_label" data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">Reddit</span></span></a><a class="a2a_button_pinterest" data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uncannymagazine.com/%23pinterest" rel="nofollow noopener" target="_blank" title="Pinterest"><span class="a2a_svg a2a_s__default a2a_s_pinterest" data-dcnode-id="4452" style="background-color: rgb(189, 8, 28); width: 16px; line-height: 16px; height: 16px; background-size: 16px; border-radius: 2px;"><svg aria-hidden="true" data-dcnode-id="4453" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16.539 4.5c-6.277 0-9.442 4.5-9.442 8.253 0 2.272.86 4.293 2.705 5.046.303.125.574.005.662-.33.061-.231.205-.816.27-1.06.088-.331.053-.447-.191-.736-.532-.627-.873-1.439-.873-2.591 0-3.338 2.498-6.327 6.505-6.327 3.548 0 5.497 2.168 5.497 5.062 0 3.81-1.686 7.025-4.188 7.025-1.382 0-2.416-1.142-2.085-2.545.397-1.674 1.166-3.48 1.166-4.689 0-1.081-.581-1.983-1.782-1.983-1.413 0-2.548 1.462-2.548 3.419 0 1.247.421 2.091.421 2.091l-1.699 7.199c-.505 2.137-.076 4.755-.039 5.019.021.158.223.196.314.077.13-.17 1.813-2.247 2.384-4.324.162-.587.929-3.631.929-3.631.46.876 1.801 1.646 3.227 1.646 4.247 0 7.128-3.871 7.128-9.053.003-3.918-3.317-7.568-8.361-7.568z" data-dcnode-id="4454" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">Pinterest</span></span></a></div></div><span data-dcnode-id="4446" instrument_node=""> </span><p class="ad" data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">Advertisement</span></p><span data-dcnode-id="4443" instrument_node="">

</span><article class="post-443 article type-article status-publish hentry article_type-fiction placement-1-2 article_honors-hugo-award-winner-best-novelette article_honors-locus-award-finalist-best-novelette article_honors-theodore-sturgeon-memorial-award-finalist" data-dcnode-id="3433" id="post-443"><span data-dcnode-id="4440" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="4437"><span data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">Folding Beijing</span></span></h2><span data-dcnode-id="4436" instrument_node="">
</span><h4 class="byline" data-dcnode-id="4425"><span data-dcnode-id="4435" instrument_node="">by </span><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uncannymagazine.com/authors/hao-jingfang/"><span data-dcnode-id="4434" instrument_node="">Hao Jingfang</span></a><span data-dcnode-id="4432" instrument_node="">, translated by </span><a data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uncannymagazine.com/authors/ken-liu/"><span data-dcnode-id="4431" instrument_node="">Ken Liu</span></a><span data-dcnode-id="4429" instrument_node="">
										 			in </span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uncannymagazine.com/issues/uncanny-magazine-issue-two/"><span data-dcnode-id="4428" instrument_node="">Uncanny Magazine Issue Two</span></a><span data-dcnode-id="4426" instrument_node=""> 
								 | 16254 Words
			</span></h4><span data-dcnode-id="4424" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3435"><span data-dcnode-id="4423" instrument_node="">
</span><p class="centered" data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">1.</span></p><span data-dcnode-id="4420" instrument_node="">
</span><p data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">At ten of five in the morning, Lao Dao crossed the busy pedestrian lane on his way to find Peng Li.</span></p><span data-dcnode-id="4417" instrument_node="">
</span><p data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">After the end of his shift at the waste processing station, Lao Dao had gone home, first to shower and then to change. He was wearing a white shirt and a pair of brown pants—the only decent clothes he owned. The shirt’s cuffs were frayed, so he rolled them up to his elbows. Lao Dao was forty–eight, single, and long past the age when he still took care of his appearance. As he had no one to pester him about the domestic details, he had simply kept this outfit for years. Every time he wore it, he’d come home afterward, take off the shirt and pants, and fold them up neatly to put away. Working at the waste processing station meant there were few occasions that called for the outfit, save a wedding now and then for a friend’s son or daughter.</span></p><span data-dcnode-id="4414" instrument_node="">
</span><p data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Today, however, he was apprehensive about meeting strangers without looking at least somewhat respectable. After five hours at the waste processing station, he also had misgivings about how he smelled.</span></p><span data-dcnode-id="4411" instrument_node="">
</span><p data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">People who had just gotten off work filled the road. Men and women crowded every street vendor, picking through local produce and bargaining loudly. Customers packed the plastic tables at the food hawker stalls, which were immersed in the aroma of frying oil. They ate heartily with their faces buried in bowls of hot and sour rice noodles, their heads hidden by clouds of white steam. Other stands featured mountains of jujubes and walnuts, and hunks of cured meat swung overhead. This was the busiest hour of the day—work was over, and everyone was hungry and loud.</span></p><span data-dcnode-id="4408" instrument_node="">
</span><p data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">Lao Dao squeezed through the crowd slowly. A waiter carrying dishes shouted and pushed his way through the throng. Lao Dao followed close behind.</span></p><span data-dcnode-id="4405" instrument_node="">
</span><p data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">Peng Li lived some ways down the lane. Lao Dao climbed the stairs but Peng wasn’t home. A neighbor said that Peng usually didn’t return until right before market closing time, but she didn’t know exactly when.</span></p><span data-dcnode-id="4402" instrument_node="">
</span><p data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">Lao Dao became anxious. He glanced down at his watch: Almost 5:00 AM.</span></p><span data-dcnode-id="4399" instrument_node="">
</span><p data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">He went back downstairs to wait at the entrance of the apartment building. A group of hungry teenagers squatted around him, devouring their food. He recognized two of them because he remembered meeting them a couple of times at Peng Li’s home. Each kid had a plate of chow mein or chow fun, and they shared two dishes family–style. The dishes were a mess while pairs of chopsticks continued to search for elusive, overlooked bits of meat amongst the chopped peppers. Lao Dao sniffed his forearms again to be sure that the stench of garbage was off of him. The noisy, quotidian chaos around him assured him with its familiarity.</span></p><span data-dcnode-id="4396" instrument_node="">
</span><p data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">“Listen, do you know how much they charge for an order of twice–cooked pork over there?” a boy named Li asked.</span></p><span data-dcnode-id="4393" instrument_node="">
</span><p data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">“Fuck! I just bit into some sand,” a heavyset kid named Ding said while covering his mouth with one hand, which had very dirty fingernails. “We need to get our money back from the vendor!”</span></p><span data-dcnode-id="4390" instrument_node="">
</span><p data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Li ignored him. “Three hundred and forty yuan!” said Li. “You hear that? Three forty! For twice–cooked pork! And for boiled beef? Four hundred and twenty!”</span></p><span data-dcnode-id="4387" instrument_node="">
</span><p data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">“How could the prices be so expensive?” Ding mumbled as he clutched his cheek. “What do they put in there?”</span></p><span data-dcnode-id="4384" instrument_node="">
</span><p data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">The other two youths weren’t interested in the conversation and concentrated on shoveling food from the plate into the mouth. Li watched them, and his yearning gaze seemed to go through them and focus on something beyond.</span></p><span data-dcnode-id="4381" instrument_node="">
</span><p data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">Lao Dao’s stomach growled. He quickly averted his eyes, but it was too late. His empty stomach felt like an abyss that made his body tremble. It had been a month since he last had a morning meal. He used to spend about a hundred each day on this meal, which translated to three thousand for the month. If he could stick to his plan for a whole year, he’d be able to save enough to afford two months of tuition for Tangtang’s kindergarten.</span></p><span data-dcnode-id="4378" instrument_node="">
</span><p data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">He looked into the distance: The trucks of the city cleaning crew were approaching slowly.</span></p><span data-dcnode-id="4375" instrument_node="">
</span><p data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">He began to steel himself. If Peng Li didn’t return in time, he would have to go on this journey without consulting him. Although it would make the trip far more difficult and dangerous, time was of the essence and he had to go. The loud chants of the woman next to him hawking her jujube interrupted his thoughts and gave him a headache. The peddlers at the other end of the road began to pack up their wares, and the crowd, like fish in a pond disturbed by a stick, dispersed. No one was interested in fighting the city cleaning crew. As the vendors got out of the way, the cleaning trucks patiently advanced. Vehicles were normally not allowed in the pedestrian lane, but the cleaning trucks were an exception. Anybody who dilly–dallied would be packed up by force.</span></p><span data-dcnode-id="4372" instrument_node="">
</span><p data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Finally, Peng Li appeared: His shirt unbuttoned, a toothpick dangling between his lips, strolling leisurely and burping from time to time. Now in his sixties, Peng had become lazy and slovenly. His cheeks drooped like the jowls of a Shar–Pei, giving him the appearance of being perpetually grumpy. Looking at him now, one might get the impression that he was a loser whose only ambition in life was a full belly. However, even as a child, Lao Dao had heard his father recounting Peng Li’s exploits when he had been a young man.</span></p><span data-dcnode-id="4369" instrument_node="">
</span><p data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">Lao Dao went up to meet Peng in the street. Before Peng Li could greet him, Lao Dao blurted out, “I don’t have time to explain, but I need to get to First Space. Can you tell me how?”</span></p><span data-dcnode-id="4366" instrument_node="">
</span><p data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Peng Li was stunned. It had been ten years since anyone brought up First Space with him. He held the remnant of the toothpick in his fingers—it had broken between his teeth without his being aware of it. For some seconds, he said nothing, but then he saw the anxiety on Lao Dao’s face and dragged him toward the apartment building. “Come into my place and let’s talk. You have to start from there anyway to get to where you want to go.”</span></p><span data-dcnode-id="4363" instrument_node="">
</span><p data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">The city cleaning crew was almost upon them, and the crowd scattered like autumn leaves in a wind. “Go home! Go home! The Change is about to start,” someone called from atop one of the trucks.</span></p><span data-dcnode-id="4360" instrument_node="">
</span><p data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">Peng Li took Lao Dao upstairs into his apartment. His ordinary, single–occupancy public housing unit was sparsely furnished: Six square meters in area, a washroom, a cooking corner, a table and a chair, a cocoon–bed equipped with storage drawers underneath for clothes and miscellaneous items. The walls were covered with water stains and footprints, bare save for a few haphazardly installed hooks for jackets, pants, and linens. Once he entered, Peng took all the clothes and towels off the wall–hooks and stuffed them into one of the drawers. During the Change, nothing was supposed to be unsecured. Lao Dao had once lived in a single–occupancy unit just like this one. As soon as he entered, he felt the flavor of the past hanging in the air.</span></p><span data-dcnode-id="4357" instrument_node="">
</span><p data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">Peng Li glared at Lao Dao. “I’m not going to show you the way unless you tell me why.”</span></p><span data-dcnode-id="4354" instrument_node="">
</span><p data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">It was already five&nbsp;thirty. Lao Dao had only half an hour left.</span></p><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">Lao Dao gave him the bare outlines of the story: Picking up the bottle with a message inside; hiding in the trash chute; being entrusted with the errand in Second Space; making his decision and coming here for guidance. He had so little time that he had to leave right away.</span></p><span data-dcnode-id="4348" instrument_node="">
</span><p data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">“You hid in the trash chutes last night to sneak into Second Space?” Peng Li frowned. “That means you had to wait twenty–four hours!”</span></p><span data-dcnode-id="4345" instrument_node="">
</span><p data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">“For two hundred thousand yuan?” Lao Dao said, “Even hiding for a week would be worth it.”</span></p><span data-dcnode-id="4342" instrument_node="">
</span><p data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">“I didn’t know you were so short on money.”</span></p><span data-dcnode-id="4339" instrument_node="">
</span><p data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">Lao Dao was silent for a moment. “Tangtang is going to be old enough for kindergarten in a year. I’ve run out of time.”</span></p><span data-dcnode-id="4336" instrument_node="">
</span><p data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">Lao Dao’s research on kindergarten tuition had shocked him. For schools with decent reputations, the parents had to show up with their bedrolls and line up a couple of days before registration. The two parents had to take turns so that while one held their place in the line, the other could go to the bathroom or grab a bite to eat. Even after lining up for forty–plus hours, a place wasn’t guaranteed. Those with enough money had already bought up most of the openings for their offspring, so the poorer parents had to endure the line, hoping to grab one of the few remaining spots. Mind you, this was just for decent schools. The really good schools? Forget about lining up—every opportunity was sold off to those with money. Lao Dao didn’t harbor unrealistic hopes, but Tangtang had loved music since she was an eighteen–month–old. Every time she heard music in the streets, her face lit up and she twisted her little body and waved her arms about in a dance. She looked especially cute during those moments. Lao Dao was dazzled as though surrounded by stage lights. No matter how much it cost, he vowed to send Tangtang to a kindergarten that offered music and dance lessons.</span></p><span data-dcnode-id="4333" instrument_node="">
</span><p data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">Peng Li took off his shirt and washed while he spoke with Lao Dao. The “washing” consisted only of splashing some drops of water over his face because the water was already shut off and only a thin trickle came out of the faucet. Peng Li took down a dirty towel from the wall and wiped his face carelessly before stuffing the towel into a drawer as well. His moist hair gave off an oily glint.</span></p><span data-dcnode-id="4330" instrument_node="">
</span><p data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">“What are you working so hard for?” Peng Li asked. “It’s not like she’s your real daughter.”</span></p><span data-dcnode-id="4327" instrument_node="">
</span><p data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">“I don’t have time for this,” Lao Dao said. “Just tell me the way.”</span></p><span data-dcnode-id="4324" instrument_node="">
</span><p data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">Peng Li sighed. “Do you understand that if you’re caught, it’s not just a matter of paying a fine? You’re going to be locked up for months.”</span></p><span data-dcnode-id="4321" instrument_node="">
</span><p data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">“I thought you had gone there multiple times.”</span></p><span data-dcnode-id="4318" instrument_node="">
</span><p data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">“Just four times. I got caught the fifth time.”</span></p><span data-dcnode-id="4315" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">“That’s more than enough. If I could make it four times, it would be no big deal to get caught once.”</span></p><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">Lao Dao’s errand required him to deliver a message to First Space—success would earn him a hundred thousand yuan, and if he managed to bring back a reply, two hundred thousand. Sure, it was illegal, but no one would be harmed, and as long as he followed the right route and method, the probability of being caught wasn’t great. And the cash, the cash was very real. He could think of no reason to not take up the offer. He knew that when Peng Li was younger, he had snuck into First Space multiple times to smuggle contraband and made quite a fortune. There was a way.</span></p><span data-dcnode-id="4309" instrument_node="">
</span><p data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">It was a quarter to six. He had to get going, now.</span></p><span data-dcnode-id="4306" instrument_node="">
</span><p data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">Peng Li sighed again. He could see it was useless to try to dissuade Lao Dao. He was old enough to feel lazy and tired of everything, but he remembered how he had felt as a younger man and he would have made the same choice as Lao Dao. Back then, he didn’t care about going to prison. What was the big deal? You lost a few months and got beaten up a few times, but the money made it worthwhile. As long as you refused to divulge the source of the money no matter how much you suffered, you could survive it. The Security Bureau’s agents were only carrying out their assigned routines.</span></p><span data-dcnode-id="4303" instrument_node="">
</span><p data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">Peng Li took Lao Dao to his back window and pointed at the narrow path hidden in the shadows below.</span></p><span data-dcnode-id="4300" instrument_node="">
</span><p data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">“Start by climbing down the drain pipe from my unit. Under the felt cloth you’ll find hidden footholds I installed back in the day—if you stick close enough to the wall, the cameras won’t see you. Once you’re on the ground, stick to the shadows and head that way until you get to the edge. You’ll feel as well as see the cleft. Follow the cleft and go north. Remember, go north.”</span></p><span data-dcnode-id="4297" instrument_node="">
</span><p data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">Then Peng Li explained the technique for entering First Space as the ground turned during the Change. He had to wait until the ground began to cleave and rise. Then, from the elevated edge, he had to swing over and scramble about fifty meters over the cross section until he reached the other side of the turning earth, climb over, and head east. There, he would find a bush that he could hold onto as the ground descended and closed up. He could then conceal himself in the bush. Before Peng had even finished his explanation, Lao Dao was already halfway out the window, getting ready to climb down.</span></p><span data-dcnode-id="4294" instrument_node="">
</span><p data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Peng Li held onto Lao Dao and made sure his foot was securely in the first foothold. Then he stopped. “I’m going to say something that you might not want to hear. I don’t think you should go. Over there … is not so great. If you go, you’ll end up feeling your own life is shit, pointless.”</span></p><span data-dcnode-id="4291" instrument_node="">
</span><p data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">Lao Dao was reaching down with his other foot, testing for the next foothold. His body strained against the windowsill and his words came out labored. “It doesn’t matter. I already know my life is shit without having gone there.”</span></p><span data-dcnode-id="4288" instrument_node="">
</span><p data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">“Take care of yourself,” Peng Li said.</span></p><span data-dcnode-id="4285" instrument_node="">
</span><p data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">Lao Dao followed Peng Li’s directions and groped his way down as quickly as he dared; the footholds felt very secure. He looked up and saw Peng Li light up a cigarette next to the window, taking deep drags. Peng Li put out the cigarette, leaned out, and seemed about to say something more, but ultimately he retreated back into his unit quietly. He closed his window, which glowed with a faint light.</span></p><span data-dcnode-id="4282" instrument_node="">
</span><p data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">Lao Dao imagined Peng Li crawling into his cocoon–bed at the last minute, right before the Change. Like millions of others across the city, the cocoon–bed would release a soporific gas that put him into deep sleep. He would feel nothing as his body was transported by the flipping world, and he would not open his eyes again until tomorrow evening, forty–hours later. Peng Li was no longer young; he was no longer different from the other fifty million who lived in Third Space.</span></p><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">Lao Dao climbed faster, barely touching the footholds. When he was close enough to the ground, he let go and landed on all fours. Luckily, Peng Li’s unit was only on the fourth story, not too far up. He got up and ran through the shadow cast by the building next to the lake. He saw the crevice in the grass where the ground would open up.</span></p><span data-dcnode-id="4276" instrument_node="">
</span><p data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">But before he reached it, he heard the muffled rumbling from behind him, interrupted by a few crisp clangs. Lao Dao turned around and saw Peng Li’s building break in half. The top half folded down and pressed toward him, slowly but inexorably.</span></p><span data-dcnode-id="4273" instrument_node="">
</span><p data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">Shocked, Lao Dao stared at the sight for a few moments before recovering. He raced to the fissure in the ground, and lay prostrate next to it.</span></p><span data-dcnode-id="4270" instrument_node="">
</span><p data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">The Change began. This was a process repeated every twenty–four hours. The whole world started to turn. The sound of steel and masonry folding, grating, colliding filled the air, like an assembly line grinding to a halt. The towering buildings of the city gathered and merged into solid blocks; neon signs, shop awnings, balconies, and other protruding fixtures retracted into the buildings or flattened themselves into a thin layer against the walls, like skin. Every inch of space was utilized as the buildings compacted themselves into the smallest space.</span></p><span data-dcnode-id="4267" instrument_node="">
</span><p data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">The ground rose up. Lao Dao watched and waited until the fissure was wide enough. He crawled over the marble–lined edge onto the earthen wall, grabbing onto bits of metal protruding out of the soil. As the cleft widened and the walls elevated, he climbed, using his hands as well as feet. At first, he was climbing down, testing for purchase with his feet. But soon, as the entire section of ground rotated, he was lifted into the air, and up and down flipped around.</span></p><span data-dcnode-id="4264" instrument_node="">
</span><p class="line-above" data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">Lao Dao was thinking about last night.</span></p><span data-dcnode-id="4261" instrument_node="">
</span><p data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">He had cautiously stuck his head out of the trash heap, alert for any sound from the other side of the gate. The fermenting, rotting garbage around him was pungent: Greasy, fishy, even a bit sweet. He leaned against the iron gate. Outside, the world was waking up.</span></p><span data-dcnode-id="4258" instrument_node="">
</span><p data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">As soon as the yellow glow of the streetlights seeped into the seam under the lifting gate, he squatted and crawled out of the widening opening. The streets were empty; lights came on in the tall buildings, story by story; fixtures extruded from the sides of buildings, unfolding and extending, segment by segment; porches emerged from the walls; the eaves rotated and gradually dropped down into position; stairs extended and descended to the street. On both sides of the road, one black cube after another broke apart and opened, revealing the racks and shelves inside. Signboards emerged from the tops of the cubes and connected together while plastic awnings extended from both sides of the lane to meet in the middle, forming a corridor of shops. The streets were empty, as though Lao Dao were&nbsp;dreaming.</span></p><span data-dcnode-id="4255" instrument_node="">
</span><p data-dcnode-id="4250"><span data-dcnode-id="4254" instrument_node="">The neon lights came on. Tiny flashing LEDs on top of the shops formed into characters advertising jujubes from Xinjiang, </span><em data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">lapi</span></em><span data-dcnode-id="4251" instrument_node=""> noodles from Northeast China, bran dough from Shanghai, and cured meats from Hunan.</span></p><span data-dcnode-id="4249" instrument_node="">
</span><p data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">For the rest of the day, Lao Dao couldn’t forget the scene. He had lived in this city for forty–eight years, but he had never seen such a sight. His days had always started with the cocoon and ended with the cocoon, and the time in between was spent at work or navigating dirty tables at hawker stalls and loudly bargaining crowds surrounding street vendors. This was the first time he had seen the world, bare.</span></p><span data-dcnode-id="4246" instrument_node="">
</span><p class="line-above" data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">Every morning, an observer at some distance from the city—say, a truck driver waiting on the highway into Beijing—could see the entire city fold and unfold.</span></p><span data-dcnode-id="4243" instrument_node="">
</span><p data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">At six in the morning, the truck drivers usually got out of their cabs and walked to the side of the highway, where they rubbed their eyes, still drowsy after an uncomfortable night in the truck. Yawning, they greeted each other and gazed at the distant city center. The break in the highway was just outside the Seventh Ring Road, while all the ground rotation occurred within the Sixth Ring Road. The distance was perfect for taking in the whole city, like gazing at an island in the sea.</span></p><span data-dcnode-id="4240" instrument_node="">
</span><p data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">In the early dawn, the city folded and collapsed. The skyscrapers bowed submissively like the humblest servants until their heads touched their feet; then they broke again, folded again, and twisted their necks and arms, stuffing them into the gaps. The compacted blocks that used to be the skyscrapers shuffled and assembled into dense, gigantic Rubik’s Cubes that fell into a deep slumber.</span></p><span data-dcnode-id="4237" instrument_node="">
</span><p data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">The ground then began to turn. Square by square, pieces of the earth flipped 180 degrees around an axis, revealing the buildings on the other side. The buildings unfolded and stood up, awakening like a herd of beasts under the gray–blue sky. The island that was the city settled in the orange sunlight, spread open, and stood still as misty gray clouds roiled around it.</span></p><span data-dcnode-id="4234" instrument_node="">
</span><p data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">The truck drivers, tired and hungry, admired the endless cycle of urban renewal.</span></p><span data-dcnode-id="4231" instrument_node="">
</span><p class="line-above centered" data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">&nbsp;2.</span></p><span data-dcnode-id="4228" instrument_node="">
</span><p data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">The folding city was divided into three spaces. One side of the earth was First Space, population five million. Their allotted time lasted from six o’clock in the morning to six o’clock the next morning. Then the space went to sleep, and the earth flipped.</span></p><span data-dcnode-id="4225" instrument_node="">
</span><p data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">The other side was shared by Second Space and Third Space. Twenty–five million people lived in Second Space, and their allotted time lasted from six o’clock on that second day to ten o’clock at night. Fifty million people lived in Third Space, allotted the time from ten o’clock at night to six o’clock in the morning, at which point First Space returned. Time had been carefully divided and parceled out to separate the populations: Five million enjoyed the use of twenty–four hours, and seventy–five million enjoyed the next twenty–four hours.</span></p><span data-dcnode-id="4222" instrument_node="">
</span><p data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">The structures on two sides of the ground were not even in weight. To remedy the imbalance, the earth was made thicker in First Space, and extra ballast buried in the soil to make up for the missing people and buildings. The residents of First Space considered the extra soil a natural emblem of their possession of a richer, deeper heritage.</span></p><span data-dcnode-id="4219" instrument_node="">
</span><p data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">Lao Dao had lived in Third Space since birth. He understood very well the reality of his situation, even without Peng Li pointing it out. He was a waste worker; he had processed trash for twenty–eight years, and would do so for the foreseeable future. He had not found the meaning of his existence or the ultimate refuge of cynicism; instead, he continued to hold onto the humble place assigned to him in life.</span></p><span data-dcnode-id="4216" instrument_node="">
</span><p data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">Lao Dao had been born in Beijing. His father was also a waste worker. His father told him that when Lao Dao was born, his father had just gotten his job, and the family had celebrated for three whole days. His father had been a construction worker, one of millions of other construction workers who had come to Beijing from all over China in search of work. His father and others like him had built this folding city. District by district, they had transformed the old city. Like termites swarming over a wooden house, they had chewed up the wreckage of the past, overturned the earth, and constructed a brand new world. They had swung their hammers and wielded their adzes, keeping their heads down; brick by brick, they had walled themselves off until they could no longer see the sky. Dust had obscured their views, and they had not known the grandeur of their work. Finally, when the completed building stood up before them like a living person, they had scattered in terror, as though they had given birth to a monster. But after they calmed down, they realized what an honor it would be to live in such a city in the future, and so they had continued to toil diligently and docilely, to meekly seek out any opportunity to remain in the city. It was said that when the folding city was completed, more than eighty million construction workers had wanted to stay. Ultimately, no more than twenty million were allowed to settle.</span></p><span data-dcnode-id="4213" instrument_node="">
</span><p data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">It had not been easy to get a job at the waste processing station. Although the work only involved sorting trash, so many applied that stringent selection criteria had to be imposed: The desired candidates had to be strong, skillful, discerning, organized, diligent, and unafraid of the stench or difficult environment. Strong–willed, Lao Dao’s father had held fast onto the thin reed of opportunity as the tide of humanity surged and then receded around him, until he found himself a survivor on the dry beach.</span></p><span data-dcnode-id="4210" instrument_node="">
</span><p data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">His father had then kept his head down and labored away in the acidic rotten fetor of garbage and crowding for twenty years. He had built this city; he was also a resident and a decomposer.</span></p><span data-dcnode-id="4207" instrument_node="">
</span><p data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">Construction of the folding city had been completed two years before Lao Dao’s birth. He had never been anywhere else, and had never harbored the desire to go anywhere else. He finished elementary school, middle school, high school, and took the annual college entrance examination three times—failing each time. In the end, he became a waste worker, too. At the waste processing station, he worked for five hours each shift, from eleven at night to four in the morning. Together with tens of thousands of co–workers, he mechanically and quickly sorted through the trash, picking out recyclable bits from the scraps of life from First Space and Second Space and tossing them into the processing furnace. Every day, he faced the trash on the conveyer belt flowing past him like a river, and he scraped off the leftover food from plastic bowls, picked out broken glass bottles, tore off the clean, thin backing from blood–stained sanitary napkins, stuffing it into the recyclables can marked with green lines. This was their lot: to eke out a living by performing the repetitive drudgery as fast as possible, to toil hour after hour for rewards as thin as the wings of cicadas.</span></p><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">Twenty million waste workers lived in Third Space; they were the masters of the night. The other thirty million made a living by selling clothes, food, fuel, or insurance, but most people understood that the waste workers were the backbone of Third Space’s prosperity. Each time he strolled through the neon–bedecked night streets, Lao Dao thought he was walking under rainbows made of food scraps. He couldn’t talk about this feeling with others. The younger generation looked down on the profession of the waste worker. They tried to show off on the dance floors of nightclubs, hoping to find jobs as DJs or dancers. Even working at a clothing store seemed a better choice: their fingers would be touching thin fabric instead of scrabbling through rotting garbage for plastic or metal. The young were no longer so terrified about survival; they cared far more about appearances.</span></p><span data-dcnode-id="4201" instrument_node="">
</span><p data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">Lao Dao didn’t despise his work. But when he had gone to Second Space, he had been terrified of being despised.</span></p><span data-dcnode-id="4198" instrument_node="">
</span><p class="line-above" data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">The previous morning, Lao Dao had snuck his way out of the trash chute with a slip of paper and tried to find the author of the slip based on the address written on it.</span></p><span data-dcnode-id="4195" instrument_node="">
</span><p data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Second Space wasn’t far from Third Space. They were located on the same side of the ground, though they were divided in time. At the Change, the buildings of one space folded and retracted into the ground as the buildings of another space extended into the air, segment by segment, using the tops of the buildings of the other space as its foundation. The only difference between the spaces was the density of buildings. Lao Dao had to wait a full day and night inside the trash chute for the opportunity to emerge as Second Space unfolded. Although this was the first time he had been to Second Space, he wasn’t anxious. He only worried about the rotting smell on him.</span></p><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">Luckily, Qin Tian was a generous soul. Perhaps he had been prepared for what sort of person would show up since the moment he put that slip of paper inside the bottle.</span></p><span data-dcnode-id="4189" instrument_node="">
</span><p data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">Qin Tian was very kind. He knew at a glance why Lao Dao had come. He pulled him inside his home, offered him a hot bath, and gave him one of his own bathrobes to wear. “I have to count on you,” Qin Tian said.</span></p><span data-dcnode-id="4186" instrument_node="">
</span><p data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">Qin was a graduate student living in a university–owned apartment. He had three roommates, and besides the four bedrooms, the apartment had a kitchen and two bathrooms. Lao Dao had never taken a bath in such a spacious bathroom, and he really wanted to soak for a while and get rid of the smell on his body. But he was also afraid of getting the bathtub dirty and didn’t dare to rub his skin too hard with the washcloth. The jets of bubbles coming out of the bathtub walls startled him, and being dried by hot jets of air made him uncomfortable. After the bath, he picked up the bathrobe from Qin Tian and only put it on after hesitating for a while. He laundered his own clothes, as well as a few other shirts casually left in a basin. Business was business, and he didn’t want to owe anyone any favors.</span></p><span data-dcnode-id="4183" instrument_node="">
</span><p data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Qin Tian wanted to send a gift to a woman he liked. They had gotten to know each other from work when Qin Tian had been given the opportunity to go to First Space for an internship with the UN Economic Office, where she was also working. The internship had lasted only a month. Qin told Lao Dao that the young woman was born and bred in First Space, with very strict parents. Her father wouldn’t allow her to date a boy from Second Space, and that was why he couldn’t contact her through regular channels. Qin was optimistic about the future; he was going to apply to the UN’s New Youth Project after graduation, and if he were to be chosen, he would be able to go to work in First Space. He still had another year of school left before he would get his degree, but he was going crazy pining for her. He had made a rose–shaped locket for her that glowed in the dark: This was the gift he would use to ask for her hand in marriage.</span></p><span data-dcnode-id="4180" instrument_node="">
</span><p data-dcnode-id="4175"><span data-dcnode-id="4179" instrument_node="">“I was attending a symposium, you know, the one that discussed the UN’s debt situation? You must have heard of it… anyway, I saw her, and I was like, </span><em data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Ah!</span></em><span data-dcnode-id="4176" instrument_node=""> I went over right away to talk to her. She was helping the VIPs to their seats, and I didn’t know what to say, so I just followed her around. Finally, I pretended that I had to find interpreters, and I asked her to help me. She was so gentle, and her voice was really soft. I had never really asked a girl out, you understand, so I was super nervous… Later, after we started dating, I brought up how we met… Why are you laughing? Yes, we dated. No, I don’t think we quite got to that kind of relationship, but… well, we kissed.” Qin Tian laughed as well, a bit embarrassed. “I’m telling the truth! Don’t you believe me? Yes, I guess sometimes even I can’t believe it. Do you think she really likes me?”</span></p><span data-dcnode-id="4174" instrument_node="">
</span><p data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">“I have no idea,” Lao Dao said. “I’ve never met her.”</span></p><span data-dcnode-id="4171" instrument_node="">
</span><p data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">One of Qin Tian’s roommates came over, and smiling, said, “Uncle, why are you taking his question so seriously? That’s not a real question. He just wants to hear you say, ‘Of course she loves you! You’re so handsome.’”</span></p><span data-dcnode-id="4168" instrument_node="">
</span><p data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">“She must be beautiful.”</span></p><span data-dcnode-id="4165" instrument_node="">
</span><p data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">“I’m not afraid that you’ll laugh at me.” Qin Tian paced back and forth in front of Lao Dao. “When you see her, you’ll understand the meaning of ‘peerless elegance.’”</span></p><span data-dcnode-id="4162" instrument_node="">
</span><p data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">Qin Tian stopped, sinking into a reverie. He was thinking of Yi Yan’s mouth. Her mouth was perhaps his favorite part of her: So tiny, so smooth, with a full bottom lip that glowed with a natural, healthy pink, making him want to give it a loving bite. Her neck also aroused him. Sometimes it appeared so thin that the tendons showed, but the lines were straight and pretty. The skin was fair and smooth, extending down into the collar of her blouse so that his gaze lingered on her second button. The first time he tried to kiss her, she had moved her lips away shyly. He had persisted until she gave in, closing her eyes and returning the kiss. Her lips had felt so soft, and his hands had caressed the curve of her waist and backside, again and again. From that day on, he had lived in the country of longing. She was his dream at night, and also the light he saw when he trembled in his own hand.</span></p><span data-dcnode-id="4159" instrument_node="">
</span><p data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">Qin Tian’s roommate was called Zhang Xian, who seemed to relish the opportunity to converse with Lao Dao.</span></p><span data-dcnode-id="4156" instrument_node="">
</span><p data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">Zhang Xian asked Lao Dao about life in Third Space, and mentioned that he actually wanted to live in Third Space for a while. He had been given the advice that if he wanted to climb up the ladder of government administration, some managerial experience in Third Space would be very helpful. Several prominent officials had all started their careers as Third Space administrators before being promoted to First Space. If they had stayed in Second Space, they wouldn’t have gone anywhere and would have spent the rest of their careers as low–level administrative cadres. Zhang Xian’s ambition was to eventually enter government service, and he was certain he knew the right path. Still, he wanted to go work at a bank for a couple of years first and earn some quick money. Since Lao Dao seemed noncommittal about his plans, Zhang Xian thought Lao Dao disapproved of his careerism.</span></p><span data-dcnode-id="4153" instrument_node="">
</span><p data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">“The current government is too inefficient and ossified,” he added quickly, “slow to respond to challenges, and I don’t see much hope for systematic reform. When I get my opportunity, I’ll push for rapid reforms: Anyone who’s incompetent will be fired.” Since Lao Dao still didn’t seem to show much reaction, he added, “I’ll also work to expand the pool of candidates for government service and promotion, including opening up opportunities for candidates from Third Space.”</span></p><span data-dcnode-id="4150" instrument_node="">
</span><p data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">Lao Dao said nothing. It wasn’t because he disapproved; rather, he found it hard to believe Zhang Xian.</span></p><span data-dcnode-id="4147" instrument_node="">
</span><p data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">While he talked with Lao Dao, Zhang Xian was also putting on a tie and fixing his hair in front of the mirror. He had on a shirt with light blue stripes, and the tie was a bright blue. He closed his eyes and frowned as the mist of hairspray settled around his face, whistling all the while.</span></p><span data-dcnode-id="4144" instrument_node="">
</span><p data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Zhang Xian left with his briefcase for his internship at the bank. Qin Tian said he had to get going as well since he had classes that would last until four in the afternoon. Before he left, he transferred fifty thousand yuan over the net to Lao Dao’s account while Lao Dao watched, and explained that he would transfer the rest after Lao Dao succeeded in his mission.</span></p><span data-dcnode-id="4141" instrument_node="">
</span><p data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">“Have you been saving up for this for a while?” Lao Dao asked. “You’re a student, so money is probably tight. I can accept less if necessary.”</span></p><span data-dcnode-id="4138" instrument_node="">
</span><p data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">“Don’t worry about it. I’m on a paid internship with a financial advisory firm. They pay me around a hundred thousand each month, so the total I’m promising you is about two months of my salary. I can afford it.”</span></p><span data-dcnode-id="4135" instrument_node="">
</span><p data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">Lao Dao said nothing. He earned the standard salary of ten thousand each month.</span></p><span data-dcnode-id="4132" instrument_node="">
</span><p data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">“Please bring back her answer,” Qin Tian said.</span></p><span data-dcnode-id="4129" instrument_node="">
</span><p data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">“I’ll do my best.”</span></p><span data-dcnode-id="4126" instrument_node="">
</span><p data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">“Help yourself to the fridge if you get hungry. Just stay put here and wait for the Change.”</span></p><span data-dcnode-id="4123" instrument_node="">
</span><p data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Lao Dao looked outside the window. He couldn’t get used to the sunlight, which was a bright white, not the yellow he was used to. The street seemed twice as wide in the sun as what Lao Dao remembered from Third Space, and he wasn’t sure if that was a visual illusion. The buildings here weren’t nearly as tall as buildings in Third Space. The sidewalks were filled with people walking very fast, and from time to time, some trotted and tried to shove their way through the crowd, causing those in front of them to begin running as well. Everyone seemed to run across intersections. The men dressed mostly in western suits while the women wore blouses and short skirts, with scarves around their necks and compact, rigid purses in their hands that lent them an air of competence and efficiency. The street was filled with cars, and as they waited at intersections for the light to change, the drivers stuck their heads out of the windows, gazing ahead anxiously. Lao Dao had never seen so many cars; he was used to the mass–transit maglev packed with passengers whooshing by him.</span></p><span data-dcnode-id="4120" instrument_node="">
</span><p data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">Around noon, he heard noises in the hallway outside the apartment. Lao Dao peeked out of the peephole in the door. The floor of the hallway had transformed into a moving conveyor belt, and bags of trash left at the door of each apartment were shoved onto the conveyor belt to be deposited into the chute at the end. Mist filled the hall, turning into soap bubbles that drifted through the air, and then water washed the floor, followed by hot steam.</span></p><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">A noise from behind Lao Dao startled him. He turned around and saw that another of Qin Tian’s roommates had emerged from his bedroom. The young man ignored Lao Dao, his face impassive. He went to some machine next to the balcony and pushed some buttons, and the machine came to life, popping, whirring, grinding. Eventually, the noise stopped, and Lao Dao smelled something delicious. The young man took out a piping hot plate of food from the machine and returned to his room. Through the half–open bedroom door, Lao Dao could see that the young man was sitting on the floor in a pile of blankets and dirty socks, and staring at his wall as he ate and laughed, pushing up his glasses from time to time. After he was done eating, he left the plate at his feet, stood up, and began to fight someone invisible as he faced the wall. He struggled, his breathing labored, as he wrestled the unseen enemy.</span></p><span data-dcnode-id="4114" instrument_node="">
</span><p data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Lao Dao’s last memory of Second Space was the refined air with which everyone conducted themselves before the Change. Looking down from the window of the apartment, everything seemed so orderly that he felt a hint of envy. Starting at a quarter past nine, the stores along the street turned off their lights one after another; groups of friends, their faces red with drink, said goodbye in front of restaurants. Young couples kissed next to taxicabs. And then everyone returned to their homes, and the world went to sleep.</span></p><span data-dcnode-id="4111" instrument_node="">
</span><p data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">It was ten at night. He returned to his world to go to work.</span></p><span data-dcnode-id="4108" instrument_node="">
</span><p class="line-above centered" data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">&nbsp;3.</span></p><span data-dcnode-id="4105" instrument_node="">
</span><p data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">There was no trash chute connecting First Space directly with Third Space. The trash from First Space had to pass through a set of metal gates to be transported into Third Space, and the gates shut as soon as the trash went through. Lao Dao didn’t like the idea of having to go over the flipping ground, but he had no choice.</span></p><span data-dcnode-id="4102" instrument_node="">
</span><p data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">As the wind whipped around him, he crawled up the still–rotating earth toward First Space. He grabbed onto metal structural elements protruding from the soil, struggling to balance his body and calm his heart, until he finally managed to scrabble over the rim of this most distant world. He felt dizzy and nauseated from the intense climb, and forcing down his churning stomach, he remained still on the ground for a while.</span></p><span data-dcnode-id="4099" instrument_node="">
</span><p data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">By the time he got up, the sun had risen.</span></p><span data-dcnode-id="4096" instrument_node="">
</span><p data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">Lao Dao had never seen such a sight. The sun rose gradually. The sky was a deep and pure azure, with an orange fringe at the horizon, decorated with slanted, thin wisps of cloud. The eaves of a nearby building blocked the sun, and the eaves appeared especially dark while the background was dazzlingly bright. As the sun continued to rise, the blue of the sky faded a little, but seemed even more tranquil and clear. Lao Dao stood up and ran at the sun; he wanted to catch a trace of that fading golden color. Silhouettes of waving tree branches broke up the sky. His heart leapt wildly. He had never imagined that a sunrise could be so moving.</span></p><span data-dcnode-id="4093" instrument_node="">
</span><p data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">After a while, he slowed down and calmed himself. He was standing in the middle of the street, lined on both sides with tall trees and wide lawns. He looked around, and he couldn’t see any buildings at all. Confused, he wondered if he had really reached First Space. He pondered the two rows of sturdy gingkoes.</span></p><span data-dcnode-id="4090" instrument_node="">
</span><p data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">He backed up a few steps and turned to look in the direction he had come from. There was a road sign next to the street. He took out his phone and looked at the map—although he wasn’t authorized to download live maps from First Space, he had downloaded and stored some maps before leaving on this trip. He found where he was as well as where he needed to be. He was standing next to a large open park, and the seam he had emerged from was next to a lake in that park.</span></p><span data-dcnode-id="4087" instrument_node="">
</span><p data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Lao Dan ran about a kilometer through the deserted streets until he reached the residential district containing his destination. He hid behind some bushes and observed the beautiful house from a distance.</span></p><span data-dcnode-id="4084" instrument_node="">
</span><p class="line-above" data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">At eight thirty, Yi Yan came out of the house.</span></p><span data-dcnode-id="4081" instrument_node="">
</span><p data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">She was indeed as elegant as Qin Tian’s description had suggested, though perhaps not as pretty. Lao Dao wasn’t surprised, however. No woman could possibly be as beautiful as Qin Tian’s verbal portrait. He also understood why Qin Tian had spoken so much of her mouth. Her eyes and nose were fairly ordinary. She had a good figure: Tall, with delicate bones. She wore a milky white dress with a flowing skirt. Her belt was studded with pearls, and she had on black heels.</span></p><span data-dcnode-id="4078" instrument_node="">
</span><p data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">Lao Dao walked up to her. To avoid startling her, he approached from the front, and bowed deeply when he was still some distance away.</span></p><span data-dcnode-id="4075" instrument_node="">
</span><p data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">She stood still, looking at him in surprise.</span></p><span data-dcnode-id="4072" instrument_node="">
</span><p data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">Lao Dao came closer and explained his mission. He took out the envelope with the locket and Qin Tian’s letter.</span></p><span data-dcnode-id="4069" instrument_node="">
</span><p data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">She looked alarmed. “Please leave,” she whispered. “I can’t talk to you right now.”</span></p><span data-dcnode-id="4066" instrument_node="">
</span><p data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">“Uh… I don’t really need to talk to you,” Lao Dao said. “I just need to give you this letter.”</span></p><span data-dcnode-id="4063" instrument_node="">
</span><p data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">She refused to take it from him, clasping her hands tightly. “I can’t accept this now. Please leave. Really, I’m begging you. All right?” She took out a business card from her purse and handed it to him. “Come find me at this address at noon.”</span></p><span data-dcnode-id="4060" instrument_node="">
</span><p data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">Lao Dao looked at the card. At the top was the name of a bank.</span></p><span data-dcnode-id="4057" instrument_node="">
</span><p data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">“At noon,” she said. “Wait for me in the underground supermarket.”</span></p><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Lao Dao could tell how anxious she was. He nodded, put the card away, and returned to hide behind the bushes. Soon, a man emerged from the house and stopped next to her. The man looked to be about Lao Dao’s age, or maybe a couple of years younger. Dressed in a dark gray, well–fitted suit, he was tall and broad–shouldered. Not fat, just thickset. His face was nondescript: Round, a pair of glasses, hair neatly combed to one side.</span></p><span data-dcnode-id="4051" instrument_node="">
</span><p data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">The man grabbed Yi Yan around the waist and kissed her on the lips. Yi Yan seemed to give in to the kiss reluctantly.</span></p><span data-dcnode-id="4048" instrument_node="">
</span><p data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">Understanding began to dawn on Lao Dao.</span></p><span data-dcnode-id="4045" instrument_node="">
</span><p data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">A single–rider cart arrived in front of the house. The black cart had two wheels and a canopy, and resembled an ancient carriage or rickshaw one might see on TV, except there was no horse or person pulling the cart. The cart stopped and dipped forward. Yi Yan stepped in, sat down, and arranged the skirt of the dress neatly around her knees. The cart straightened and began to move at a slow, steady pace, as though pulled by some invisible horse. After Yi Yan left, a driverless car arrived, and the man got in.</span></p><span data-dcnode-id="4042" instrument_node="">
</span><p class="line-above" data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">Lao Dao paced in place. He felt something was pushing at his throat, but he couldn’t articulate it. Standing in the sun, he closed his eyes. The clean, fresh air filled his lungs and provided some measure of comfort.</span></p><span data-dcnode-id="4039" instrument_node="">
</span><p data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">A moment later, he was on his way. The address Yi Yan had given him was to the east, a little more than three kilometers away. There were very few people in the pedestrian lane, and only scattered cars sped by in a blur on the eight–lane avenue. Occasionally, well–dressed women passed Lao Dao in two–wheeled carts. The passengers adopted such graceful postures that it was as though they were in some fashion show. No one paid any attention to Lao Dao. The trees swayed in the breeze, and the air in their shade seemed suffused with the perfume from the elegant women.</span></p><span data-dcnode-id="4036" instrument_node="">
</span><p data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Yi Yan’s office was in the Xidan commercial district. There were no skyscrapers at all, only a few low buildings scattered around a large park. The buildings seemed isolated from each other but were really parts of a single compound connected via underground passages.</span></p><span data-dcnode-id="4033" instrument_node="">
</span><p data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">Lao Dao found the supermarket. He was early. As soon as he came in, a small shopping cart began to follow him around. Every time he stopped by a shelf, the screen on the cart displayed the names of the goods on the shelf, their description, customer reviews, and comparison with other brands in the same category. All merchandise in the supermarket seemed to be labeled in foreign languages. The packaging for all the food products was very refined, and small cakes and fruits were enticingly arranged on plates for customers. He didn’t dare to touch anything, keeping his distance as though they were dangerous, exotic animals. There seemed to be no guards or clerks in the whole market.</span></p><span data-dcnode-id="4030" instrument_node="">
</span><p data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">More customers appeared before noon. Some men in suits came into the market, grabbed sandwiches, and waved them at the scanner next to the door before hurrying out. No one paid any attention to Lao Dao as he waited in an obscure corner near the door.</span></p><span data-dcnode-id="4027" instrument_node="">
</span><p data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">Yi Yan appeared, and Lao Dao went up to her. Yi Yan glanced around, and without saying anything, led Lao Dao to a small restaurant next door. Two small robots dressed in plaid skirts greeted them, took Yi Yan’s purse, brought them to a booth, and handed them menus. Yi Yan pressed a few spots on the menu to make her selection and handed the menu back to the robot. The robot turned and glided smoothly on its wheels to the back.</span></p><span data-dcnode-id="4024" instrument_node="">
</span><p data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">Yi Yan and Lao Dao sat mutely across from each other. Lao Dao took out the envelope.</span></p><span data-dcnode-id="4021" instrument_node="">
</span><p data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">Yi Yan still didn’t take it from him. “Can you let me explain?”</span></p><span data-dcnode-id="4018" instrument_node="">
</span><p data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">Lao Dao pushed the envelope across the table. “Please take this first.”</span></p><span data-dcnode-id="4015" instrument_node="">
</span><p data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">Yi Yan pushed it back.</span></p><span data-dcnode-id="4012" instrument_node="">
</span><p data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">“Can you let me explain first?”</span></p><span data-dcnode-id="4009" instrument_node="">
</span><p data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">“You don’t need to explain anything,” Lao Dao said. “I didn’t write this letter. I’m just the messenger.”</span></p><span data-dcnode-id="4006" instrument_node="">
</span><p data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">“But you have to go back and give him an answer.” Yi Yan looked down. The little robot returned with two plates, one for each of them. On each plate were two slices of some kind of red sashimi, arranged like flower petals. Yi Yan didn’t pick up her chopsticks, and neither did Lao Dao. The envelope rested between the two plates, and neither touched it. “I didn’t betray him. When I met him last year, I was already engaged. I didn’t lie to him or conceal the truth from him on purpose… Well, maybe I did lie, but it was because he assumed and guessed. He saw Wu Wen come to pick me up once, and he asked me if he was my father. I… I couldn’t answer him, you know? It was just too embarrassing. I…”</span></p><span data-dcnode-id="4003" instrument_node="">
</span><p data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">Yi Yan couldn’t speak any more.</span></p><span data-dcnode-id="4000" instrument_node="">
</span><p data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Lao Dao waited a while. “I’m not interested in what happened between you two. All I care about is that you take the letter.”</span></p><span data-dcnode-id="3997" instrument_node="">
</span><p data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Yi Yan kept her head down, and then she looked up. “After you go back, can you… help me by not telling him everything?”</span></p><span data-dcnode-id="3994" instrument_node="">
</span><p data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">“Why?”</span></p><span data-dcnode-id="3991" instrument_node="">
</span><p data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">“I don’t want him to think that I was just playing with his feelings. I do like him, really. I feel very conflicted.”</span></p><span data-dcnode-id="3988" instrument_node="">
</span><p data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">“None of this is my concern.”</span></p><span data-dcnode-id="3985" instrument_node="">
</span><p data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">“Please, I’m begging you… I really do like him.”</span></p><span data-dcnode-id="3982" instrument_node="">
</span><p data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">Lao Dao was silent for a while.</span></p><span data-dcnode-id="3979" instrument_node="">
</span><p data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">“But you got married in the end?”</span></p><span data-dcnode-id="3976" instrument_node="">
</span><p data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">“Wu Wen was very good to me. We’d been together several years. He knew my parents, and we’d been engaged for a long time. Also, I’m three years older than Qin Tian, and I was afraid he wouldn’t like that. Qin Tian thought I was an intern, like him, and I admit that was my fault for not telling him the truth. I don’t know why I said I was an intern at first, and then it became harder and harder to correct him. I never thought he would be serious.”</span></p><span data-dcnode-id="3973" instrument_node="">
</span><p data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">Slowly, Yi Yan told Lao Dao her story. She was actually an assistant to the bank’s president and had already been working there for two years at the time she met Qin Tian. She had been sent to the UN for training, and was helping out at the symposium. In fact, her husband earned so much money that she didn’t really need to work, but she didn’t like the idea of being at home all day. She worked only half days and took a half–time salary. The rest of the day was hers to do with as she pleased, and she liked learning new things and meeting new people. She really had enjoyed the months she spent training at the UN. She told Lao Dao that there were many wives like her who worked half–time. As a matter of fact, after she got off work at noon, another wealthy wife worked as the president’s assistant in the afternoon. She told Lao Dao that though she had not told Qin Tian the truth, her heart was honest.</span></p><span data-dcnode-id="3970" instrument_node="">
</span><p data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">“And so”—she spooned a serving of the new hot dish onto Lao Dao’s plate—“can you please not tell him, just temporarily? Please… give me a chance to explain to him myself.”</span></p><span data-dcnode-id="3967" instrument_node="">
</span><p data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">Lao Dao didn’t pick up his chopsticks. He was very hungry, but he felt that he could not eat this food.</span></p><span data-dcnode-id="3964" instrument_node="">
</span><p data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">“Then I’d be lying, too,” Lao Dao said.</span></p><span data-dcnode-id="3961" instrument_node="">
</span><p data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Yi Yan opened her purse, took out her wallet, and retrieved five 10,000–yuan bills. She pushed them across the table toward Lao Dao. “Please accept this token of my appreciation.”</span></p><span data-dcnode-id="3958" instrument_node="">
</span><p data-dcnode-id="3953"><span data-dcnode-id="3957" instrument_node="">Lao Dao was stunned. He had never seen bills with such large denominations or needed to use them. Almost subconsciously, he stood up, angry. The way Yi Yan had taken out the money seemed to suggest that she had been anticipating an attempt from him to blackmail her, and he could not accept that. </span><em data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">This is what they think of Third Spacers.</span></em><span data-dcnode-id="3954" instrument_node=""> He felt that if he took her money, he would be selling Qin Tian out. It was true that he really wasn’t Qin Tian’s friend, but he still thought of it as a kind of betrayal. Lao Dao wanted to grab the bills, throw them on the ground, and walk away. But he couldn’t. He looked at the money again: The five thin notes were spread on the table like a broken fan. He could sense the power they had on him. They were baby blue in color, distinct from the brown 1,000–yuan note and the red 100–yuan note. These bills looked deeper, most distant somehow, like a kind of seduction. Several times, he wanted to stop looking at them and leave, but he couldn’t.</span></p><span data-dcnode-id="3952" instrument_node="">
</span><p data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">She continued to rummage through her purse, taking everything out, until she finally found another fifty thousand yuan from an inner pocket and placed them together with the other bills. “This is all I have. Please take it and help me.” She paused. “Look, the reason I don’t want him to know is because I’m not sure what I’m going to do. It’s possible that someday I’ll have the courage to be with him.”</span></p><span data-dcnode-id="3949" instrument_node="">
</span><p data-dcnode-id="3944"><span data-dcnode-id="3948" instrument_node="">Lao Dao looked at the ten notes spread out on the table, and then looked up at her. He sensed that she didn’t believe what she was saying. Her voice was hesitant, belying her words. She was just delaying everything to the future so that she wouldn’t be embarrassed now. She was unlikely to ever elope with Qin Tian, but she also didn’t want him to despise her. Thus, she wanted to keep alive the </span><em data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">possibility</span></em><span data-dcnode-id="3945" instrument_node=""> so that she could feel better about herself.</span></p><span data-dcnode-id="3943" instrument_node="">
</span><p data-dcnode-id="3935"><span data-dcnode-id="3942" instrument_node="">Lao Dao could see that she was lying to herself, but he wanted to lie to himself, too. He told himself, </span><em data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">I have no duty to Qin Tian. All he asked was for me to deliver his message to her, and I’ve done that. The money on the table now represents a new commission, a commitment to keep a secret.</span></em><span data-dcnode-id="3939" instrument_node=""> He waited, and then told himself, </span><em data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">Perhaps someday she really will get together with Qin Tian, and in that case I’ll have done a good deed by keeping silent. Besides, I need to think about Tangtang. Why should I get myself all worked up about strangers instead of thinking about Tangtang’s welfare?</span></em><span data-dcnode-id="3936" instrument_node=""> He felt calmer. He realized that his fingers were already touching the money.</span></p><span data-dcnode-id="3934" instrument_node="">
</span><p data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">“This is… too much.” He wanted to make himself feel better. “I can’t accept so much.”</span></p><span data-dcnode-id="3931" instrument_node="">
</span><p data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">“It’s no big deal.” She stuffed the bills into his hand. “I earn this much in a week. Don’t worry.”</span></p><span data-dcnode-id="3928" instrument_node="">
</span><p data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">“What… what do you want me to tell him?”</span></p><span data-dcnode-id="3925" instrument_node="">
</span><p data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">“Tell him that I can’t be with him now, but I truly like him. I’ll write you a note to bring him.” Yi Yan found a notepad in her purse; it had a picture of a peacock on the cover and the edges of the pages were golden. She ripped out a page and began to write. Her handwriting looked like a string of slanted gourds.</span></p><span data-dcnode-id="3922" instrument_node="">
</span><p data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">As Lao Dao left the restaurant, he glanced back. Yi Yan was sitting in the booth, gazing up at a painting on the wall. She looked so elegant and refined, as though she was never going to leave.</span></p><span data-dcnode-id="3919" instrument_node="">
</span><p data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">He squeezed the bills in his pocket. He despised himself, but he wanted to hold on to the money.</span></p><span data-dcnode-id="3916" instrument_node="">
</span><p class="line-above centered" data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">&nbsp;4.</span></p><span data-dcnode-id="3913" instrument_node="">
</span><p data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">Lao Dao left Xidan and returned the way he had come. He felt exhausted. The pedestrian lane was lined with a row of weeping willows on one side and a row of Chinese parasol trees on the other side. It was late spring, and everything was a lush green. The afternoon sun warmed his stiff face, and brightened his empty heart.</span></p><span data-dcnode-id="3910" instrument_node="">
</span><p data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">He was back at the park from this morning. There were many people in the park now, and the two rows of gingkoes looked stately and luscious. Black cars entered the park from time to time, and most of the people in the park wore either well–fitted western suits made of quality fabric or dark–colored stylish Chinese suits, but everyone gave off a haughty air. There were also some foreigners. Some of the people conversed in small groups; others greeted each other at a distance, and then laughed as they got close enough to shake hands and walk together.</span></p><span data-dcnode-id="3907" instrument_node="">
</span><p data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Lao Dao hesitated, trying to decide where to go. There weren’t that many people in the street, and he would draw attention if he just stood here. But he would look out of place in any public area. He wanted to go back into the park, get close to the fissure, and hide in some corner to take a nap. He felt very sleepy, but he dared not sleep on the street.</span></p><span data-dcnode-id="3904" instrument_node="">
</span><p data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">He noticed that the cars entering the park didn’t seem to need to stop, and so he tried to walk into the park as well. Only when he was close to the park gate did he notice that two robots were patrolling the area. While cars and other pedestrians passed their sentry line with no problems, the robots beeped as soon as Lao Dao approached and turned on their wheels to head for him. In the tranquil afternoon, the noise they made seemed especially loud. The eyes of everyone nearby turned to him. He panicked, uncertain if it was his shabby clothes that alerted the robots. He tried to whisper to the robots, claiming that his suit was left inside the park, but the robots ignored him while they continued to beep and to flash the red lights over their heads. People strolling inside the park stopped and looked at him as though looking at a thief or eccentric person. Soon, three men emerged from a nearby building and ran over. Lao Dao’s heart was in his throat. He wanted to run, but it was too late.</span></p><span data-dcnode-id="3901" instrument_node="">
</span><p data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">“What’s going on?” the man in the lead asked loudly.</span></p><span data-dcnode-id="3898" instrument_node="">
</span><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Lao Dao couldn’t think of anything to say, and he rubbed his pants compulsively.</span></p><span data-dcnode-id="3895" instrument_node="">
