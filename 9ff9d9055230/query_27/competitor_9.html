</span><p data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">The man in the front was in his thirties. He came up to Lao Dao and scanned him with a silver disk about the size of a button, moving his hand around Lao Dao’s person. He looked at Lao Dao suspiciously, as though trying to pry open his shell with a can opener.</span></p><span data-dcnode-id="3892" instrument_node="">
</span><p data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">“There’s no record of this man.” The man gestured at the older man behind him. “Bring him in.”</span></p><span data-dcnode-id="3889" instrument_node="">
</span><p data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Lao Dao started to run away from the park.</span></p><span data-dcnode-id="3886" instrument_node="">
</span><p data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">The two robots silently dashed ahead of him and grabbed onto his legs. Their arms were cuffs and locked easily about his ankles. He tripped and almost fell, but the robots held him up. His arms swung through the air helplessly.</span></p><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">“Why are you trying to run?” The younger man stepped up and glared at him. His tone was now severe.</span></p><span data-dcnode-id="3880" instrument_node="">
</span><p data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">“I…” Lao Dao’s head felt like a droning beehive. He couldn’t think.</span></p><span data-dcnode-id="3877" instrument_node="">
</span><p data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">The two robots lifted Lao Dao by the legs and deposited his feet onto platforms next to their wheels. Then they drove toward the nearest building in parallel, carrying Lao Dao. Their movements were so steady, so smooth, so synchronized, that from a distance, it appeared as if Lao Dao was skating along on a pair of rollerblades, like Nezha riding on his Wind Fire Wheels.</span></p><span data-dcnode-id="3874" instrument_node="">
</span><p data-dcnode-id="3867"><span data-dcnode-id="3873" instrument_node="">Lao Dao felt utterly helpless. He was angry with himself for being so careless. How could he think such a crowded place would be without security measures? He berated himself for being so drowsy that he could commit such a stupid mistake. </span><em data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">It’s all over now</span></em><span data-dcnode-id="3870" instrument_node="">, he thought. </span><em data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">Not only am I not going to get my money, I’m also going to jail.</span></em></p><span data-dcnode-id="3866" instrument_node="">
</span><p data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">The robots followed a narrow path and reached the backdoor of the building, where they stopped. The three men followed behind. The younger man seemed to be arguing with the older man over what to do with Lao Dao, but they spoke so softly that Lao Dao couldn’t hear the details. After a while, the older man came up and unlocked the robots from Lao Dao’s legs. Then he grabbed him by the arm and took him upstairs.</span></p><span data-dcnode-id="3863" instrument_node="">
</span><p data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Lao Dao sighed. He resigned himself to his fate.</span></p><span data-dcnode-id="3860" instrument_node="">
</span><p data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">The man brought him into a room. It looked like a hotel room, very spacious, bigger even than the living room in Qin Tian’s apartment, and about twice the size of his own rental unit. The room was decorated in a dark shade of golden brown, with a king–sized bed in the middle. The wall at the head of the bed showed abstract patterns of shifting colors. Translucent, white curtains covered the French window, and in front of the window sat a small circular table and two comfortable chairs. Lao Dao was anxious, unsure of who the older man was and what he wanted.</span></p><span data-dcnode-id="3857" instrument_node="">
</span><p data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">“Sit, sit!” The older man clapped him on the shoulder and smiled. “Everything’s fine.”</span></p><span data-dcnode-id="3854" instrument_node="">
</span><p data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">Lao Dao looked at him suspiciously.</span></p><span data-dcnode-id="3851" instrument_node="">
</span><p data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">“You’re from Third Space, aren’t you?” The older man pulled him over to the chairs, and gestured for him to sit.</span></p><span data-dcnode-id="3848" instrument_node="">
</span><p data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">“How do you know that?” Lao Dao couldn’t lie.</span></p><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">“From your pants.” The older man pointed at the waist of his pants. “You never even cut off the label. This brand is only sold in Third Space; I remember my mother buying them for my father when I was little.”</span></p><span data-dcnode-id="3842" instrument_node="">
</span><p data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">“Sir, you’re…?”</span></p><span data-dcnode-id="3839" instrument_node="">
</span><p data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">“You don’t need to ‘Sir’ me. I don’t think I’m much older than you are. How old are you? I’m fifty–two.”</span></p><span data-dcnode-id="3836" instrument_node="">
</span><p data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">“Forty–eight.”</span></p><span data-dcnode-id="3833" instrument_node="">
</span><p data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">“See, just older by four years.” He paused, and then added, “My name is Ge Daping. Why don’t you just call me Lao Ge?”</span></p><span data-dcnode-id="3830" instrument_node="">
</span><p data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Lao Dao relaxed a little. Lao Ge took off his jacket and moved his arms about to stretch out the stiff muscles. Then he filled a glass with hot water from a spigot in the wall and handed it to Lao Dao. He had a long face, and the corners of his eyes, the ends of his eyebrows, and his cheeks drooped. Even his glasses seemed about to fall off the end of his nose. His hair was naturally a bit curly and piled loosely on top of his head. As he spoke, his eyebrows bounced up and down comically. He made some tea for himself and asked Lao Dao if he wanted any. Lao Dao shook his head.</span></p><span data-dcnode-id="3827" instrument_node="">
</span><p data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">“I was originally from Third Space as well,” said Lao Ge. “We’re practically from the same hometown! So, you don’t need to be so careful with me. I still have a bit of authority, and I won’t give you up.”</span></p><span data-dcnode-id="3824" instrument_node="">
</span><p data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Lao Dao let out a long sigh, congratulating himself silently for his good luck. He recounted for Lao Ge his experiencing of going to Second Space and then coming to First Space, but omitted the details of what Yi Yan had said. He simply told Lao Ge that he had successfully delivered the message and was just waiting for the Change to head home.</span></p><span data-dcnode-id="3821" instrument_node="">
</span><p data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">Lao Ge also shared his own story with Lao Dao. He had grown up in Third Space, and his parents had worked as deliverymen. When he was fifteen, he entered a military school, and then joined the army. He worked as a radar technician in the army, and because he worked hard, demonstrated good technical skills, and had some good opportunities, he was eventually promoted to an administrative position in the radar department with the rank of brigadier general. Since he didn’t come from a prominent family, that rank was about as high as he could go in the army. He then retired from the army and joined an agency in First Space responsible for logistical support for government enterprises, organizing meetings, arranging travel, and coordinating various social events. The job was blue collar in nature, but since his work involved government officials and he had to coordinate and manage, he was allowed to live in First Space. There were a considerable number of people in First Space like him—chefs, doctors, secretaries, housekeepers—skilled blue–collar workers needed to support the lifestyle of First Space. His agency had run many important social events and functions, and Lao Ge was its director.</span></p><span data-dcnode-id="3818" instrument_node="">
</span><p data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">Lao Ge might have been self–deprecating in describing himself as a “blue collar,” but Lao Dao understood that anyone who could work and live in First Space had extraordinary skills. Even a chef here was likely a master of his art. Lao Ge must be very talented to have risen here from Third Space after a technical career in the army.</span></p><span data-dcnode-id="3815" instrument_node="">
</span><p data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">“You might as well take a nap,” Lao Ge said. “I’ll take you to get something to eat this evening.”</span></p><span data-dcnode-id="3812" instrument_node="">
</span><p data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">Lao Dao still couldn’t believe his good luck, and he felt a bit uneasy. However, he couldn’t resist the call of the white sheets and stuffed pillows, and he fell asleep almost right away.</span></p><span data-dcnode-id="3809" instrument_node="">
</span><p data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">When he woke up, it was dark outside. Lao Ge was combing his hair in front of the mirror. He showed Lao Dao a suit lying on the sofa and told him to change. Then he pinned a tiny badge with a faint red glow to Lao Dao’s lapel—a new identity.</span></p><span data-dcnode-id="3806" instrument_node="">
</span><p data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">The large open lobby downstairs was crowded. Some kind of presentation seemed to have just finished, and attendees conversed in small groups. At one end of the lobby were the open doors leading to the banquet hall; the thick doors were lined with burgundy leather. The lobby was filled with small standing tables. Each table was covered by a white tablecloth tied around the bottom with a golden bow, and the vase in the middle of each table held a lily. Crackers and dried fruits were set out next to the vases for snacking, and a long table to the side offered wine and coffee. Guests mingled and conversed among the tables while small robots holding serving trays shuttled between their legs, collecting empty glasses.</span></p><span data-dcnode-id="3803" instrument_node="">
</span><p data-dcnode-id="3799"><span data-dcnode-id="3802" instrument_node="">Forcing himself to be calm, Lao Dao followed Lao Ge and walked through the convivial scene into the banquet hall. He saw a large hanging banner: </span><em data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">The Folding City at Fifty.</span></em></p><span data-dcnode-id="3798" instrument_node="">
</span><p data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">“What is this?” Lao Dao asked.</span></p><span data-dcnode-id="3795" instrument_node="">
</span><p data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">“A celebration!” Lao Ge was walking about and examining the set up. “Xiao Zhao, come here a minute. I want you to check the table signs one more time. I don’t trust robots for things like this. Sometimes they don’t know how to be flexible.”</span></p><span data-dcnode-id="3792" instrument_node="">
</span><p data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Lao Dao saw that the banquet hall was filled with large round tables with fresh flower centerpieces.</span></p><span data-dcnode-id="3789" instrument_node="">
</span><p data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">The scene seemed unreal to him. He stood in a corner and gazed up at the giant chandelier as though some dazzling reality was hanging over him, and he was but an insignificant presence at its periphery. There was a lectern set up on the dais at the front, and, behind it, the background was an ever–shifting series of images of Beijing. The photographs were perhaps taken from an airplane and captured the entirety of the city: The soft light of dawn and dusk; the dark purple and deep blue sky; clouds racing across the sky; the moon rising from a corner; the sun setting behind a roof. The aerial shots revealed the magnificence of Beijing’s ancient symmetry; the modern expanse of brick courtyards and large green parks that had extended to the Sixth Ring Road; Chinese style theatres; Japanese style museums; minimalist concert halls. And then there were shots of the city as a whole, shots that included both faces of the city during the Change: The earth flipping, revealing the other side studded with skyscrapers with sharp, straight contours; men and women energetically rushing to work; neon signs lighting up the night, blotting out the stars; towering apartment buildings, cinemas, nightclubs full of beautiful people.</span></p><span data-dcnode-id="3786" instrument_node="">
</span><p data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">But there were no shots of where Lao Dao worked.</span></p><span data-dcnode-id="3783" instrument_node="">
</span><p data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">He stared at the screen intently, uncertain if they might show pictures during the construction of the folding city. He hoped to get a glimpse of his father’s era. When he was little, his father had often pointed to buildings outside the window and told him stories that started with “Back then, we…” An old photograph had hung on the wall of their cramped home, and in the picture his father was laying bricks, a task his father had performed thousands, or perhaps hundreds of thousands of times. He had seen that picture so many times that he thought he was sick of it, and yet, at this moment, he hoped to see a scene of workers laying bricks, even if for just a few seconds.</span></p><span data-dcnode-id="3780" instrument_node="">
</span><p data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">He was lost in his thoughts. This was also the first time he had seen what the Change looked like from a distance. He didn’t remember sitting down, and he didn’t know when others had sat down next to him. A man began to speak at the lectern, but Lao Dao wasn’t even listening for the first few minutes.</span></p><span data-dcnode-id="3777" instrument_node="">
</span><p data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">“… advantageous for the development of the service sector. The service economy is dependent on population size and density. Currently, the service industry of our city is responsible for more than 85 percent of our GDP, in line with the general characteristics of world–class metropolises. The other important sectors are the green economy and the recycling economy.” Lao Dao was paying full attention now. “Green economy” and “recycling economy” were often mentioned at the waste processing station, and the phrases were painted on the walls in characters taller than a man. He looked closer at the speaker on the dais: An old man with silvery hair, though he appeared hale and energetic. “… all trash is now sorted and processed, and we’ve achieved our goals for energy conservation and pollution reduction ahead of schedule. We’ve developed a systematic, large–scale recycling economy in which all the rare–earth and precious metals extracted from e–waste are reused in manufacturing, and even the plastics recycling rate exceeds eighty&nbsp;percent. The recycling stations are directly connected to the reprocessing plants…”</span></p><span data-dcnode-id="3774" instrument_node="">
</span><p data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Lao Dao knew of a distant relative who worked at a reprocessing plant in the technopark far from the city. The technopark was just acres and acres of industrial buildings, and he heard that all the plants over there were very similar: The machines pretty much ran on their own, and there were very few workers. At night, when the workers got together, they felt like the last survivors of some dwindling tribe in a desolate wilderness.</span></p><span data-dcnode-id="3771" instrument_node="">
</span><p data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">He drifted off again. Only the wild applause at the end of the speech pulled him out of his chaotic thoughts and back to reality. He also applauded, though he didn’t know what for. He watched the speaker descend the dais and return to his place of honor at the head table. Everyone’s eyes were on him.</span></p><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">Lao Dao saw Wu Wen, Yi Yan’s husband.</span></p><span data-dcnode-id="3765" instrument_node="">
</span><p data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">Wu Wen was at the table next to the head table. As the old man who had given the speech sat down, Wu Wen walked over to offer a toast, and then he seemed to say something that got the old man’s attention. The old man got up and walked with Wu Wen out of the banquet hall. Almost subconsciously, a curious Lao Dao also got up and followed them. He didn’t know where Lao Ge had gone. Robots emerged to serve the dishes for the banquet.</span></p><span data-dcnode-id="3762" instrument_node="">
</span><p data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Lao Dao emerged from the banquet hall and was back in the reception lobby. He eavesdropped on the other two from a distance and only caught snippets of conversation.</span></p><span data-dcnode-id="3759" instrument_node="">
</span><p data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">“… there are many advantages to this proposal,” said Wu Wen. “Yes, I’ve seen their equipment… automatic waste processing… they use a chemical solvent to dissolve and digest everything and then extract reusable materials in bulk… clean, and very economical… would you please give it some consideration?”</span></p><span data-dcnode-id="3756" instrument_node="">
</span><p data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">Wu Wen kept his voice low, but Lao Dao clearly heard “waste processing.” He moved closer.</span></p><span data-dcnode-id="3753" instrument_node="">
</span><p data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">The old man with the silvery hair had a complex expression. Even after Wu Wen was finished, he waited a while before speaking, “You’re certain that the solvent is safe? No toxic pollution?”</span></p><span data-dcnode-id="3750" instrument_node="">
</span><p data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">Wu Wen hesitated. “The current version still generates a bit of pollution but I’m sure they can reduce it to the minimum very quickly.”</span></p><span data-dcnode-id="3747" instrument_node="">
</span><p data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">Lao Dao got even closer.</span></p><span data-dcnode-id="3744" instrument_node="">
</span><p data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">The old man shook his head, staring at Wu Wen. “Things aren’t that simple. If I approve your project and it’s implemented, there will be major consequences. Your process won’t need workers, so what are you going to do with the tens of millions of people who will lose their jobs?”</span></p><span data-dcnode-id="3741" instrument_node="">
</span><p data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">The old man turned away and returned to the banquet hall. Wu Wen remained in place, stunned. A man who had been by the old man’s side—a secretary perhaps—came up to Wu Wen and said sympathetically, “You might as well go back and enjoy the meal. I’m sure you understand how this works. Employment is the number one concern. Do you really think no one has suggested similar technology in the past?”</span></p><span data-dcnode-id="3738" instrument_node="">
</span><p data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">Lao Dao understood vaguely that what they were talking about had to do with him, but he wasn’t sure whether it was good news or bad. Wu Wen’s expression shifted through confusion, annoyance, and then resignation. Lao Dao suddenly felt some sympathy for him: He had his moments of weakness, as well.</span></p><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">The secretary suddenly noticed Lao Dao.</span></p><span data-dcnode-id="3732" instrument_node="">
</span><p data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">“Are you new here?” he asked.</span></p><span data-dcnode-id="3729" instrument_node="">
</span><p data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">Lao Dao was startled. “Ah? Um…”</span></p><span data-dcnode-id="3726" instrument_node="">
</span><p data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">“What’s your name? How come I wasn’t informed about a new member of the staff?”</span></p><span data-dcnode-id="3723" instrument_node="">
</span><p data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Lao Dao’s heart beat wildly. He didn’t know what to say. He pointed to the badge on his lapel, as though hoping the badge would speak or otherwise help him out. But the badge displayed nothing. His palms sweated. The secretary stared at him, his look growing more suspicious by the second. He grabbed another worker in the lobby, and the worker said he didn’t know who Lao Dao was.</span></p><span data-dcnode-id="3720" instrument_node="">
</span><p data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">The secretary’s face was now severe and dark. He grabbed Lao Dao with one hand and punched the keys on his communicator with the other hand.</span></p><span data-dcnode-id="3717" instrument_node="">
</span><p data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">Lao Dao’s heart threatened to jump out of his throat, but just then, he saw Lao Ge.</span></p><span data-dcnode-id="3714" instrument_node="">
</span><p data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">Lao Ge rushed over and with a smooth gesture, hung up the secretary’s communicator. Smiling, he greeted the secretary and bowed deeply. He explained that he was shorthanded for the occasion and had to ask for a colleague from another department to help out tonight. The secretary seemed to believe Lao Ge and returned to the banquet hall. Lao Ge brought Lao Dao back to his own room to avoid any further risks. If anyone really bothered to look into Lao Dao’s identity, they’d discover the truth, and even Lao Ge wouldn’t be able to protect him.</span></p><span data-dcnode-id="3711" instrument_node="">
</span><p data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">“I guess you’re not fated to enjoy the banquet.” Lao Ge laughed. “Just wait here. I’ll get you some food later.”</span></p><span data-dcnode-id="3708" instrument_node="">
</span><p data-dcnode-id="3704"><span data-dcnode-id="3707" instrument_node="">Lao Dao lay down on the bed and fell asleep again. He replayed the conversation between Wu Wen and the old man in his head. </span><em data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Automatic waste processing. What would that look like? Would that be a good thing or bad?</span></em></p><span data-dcnode-id="3703" instrument_node="">
</span><p data-dcnode-id="3698"><span data-dcnode-id="3702" instrument_node="">The next time he woke up, he smelled something delicious. Lao Ge had set out a few dishes on the small circular table, and was taking the last plate out of the warming oven on the wall. Lao Ge also brought over a half bottle of </span><em data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">baijiu</span></em><span data-dcnode-id="3699" instrument_node=""> and filled two glasses.</span></p><span data-dcnode-id="3697" instrument_node="">
</span><p data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">“There was a table where they had only two people, and they left early so most of the dishes weren’t even touched. I brought some back. It’s not much, but maybe you’ll enjoy the taste. Hopefully you won’t hold it against me that I’m offering you leftovers.”</span></p><span data-dcnode-id="3694" instrument_node="">
</span><p data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">“Not at all,” Lao Dao said. “I’m grateful that I get to eat at all. These look wonderful! They must be very expensive, right?”</span></p><span data-dcnode-id="3691" instrument_node="">
</span><p data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">“The food at the banquet is prepared by the kitchen here and not for sale, so I don’t know how much they’d cost in a restaurant.” Lao Ge already started to eat. “They’re nothing special. If I had to guess, maybe ten thousand, twenty thousand? A couple might cost thirty, forty thousand. Not more than that.”</span></p><span data-dcnode-id="3688" instrument_node="">
</span><p data-dcnode-id="3683"><span data-dcnode-id="3687" instrument_node="">After a couple of bites, Lao Dao realized how hungry he was. He was used to skipping meals, and sometimes he could last a whole day without eating. His body would shake uncontrollably then, but he had learned to endure it. But now, the hunger was overwhelming. He wanted to chew quicker because his teeth couldn’t seem to catch up to the demands of his empty stomach. He tried to wash the food down with </span><em data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">baijiu</span></em><span data-dcnode-id="3684" instrument_node="">, which was very fragrant and didn’t sting his throat at all.</span></p><span data-dcnode-id="3682" instrument_node="">
</span><p data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">Lao Ge ate leisurely, and smiled as he watched Lao Dao eat.</span></p><span data-dcnode-id="3679" instrument_node="">
</span><p data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">“Oh.” Now that the pangs of hunger had finally been dulled a bit, Lao Dao remembered the earlier conversation. “Who was the man giving the speech? He seemed a bit familiar.”</span></p><span data-dcnode-id="3676" instrument_node="">
</span><p data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">“He’s always on TV,” Lao Ge said. “That’s my boss. He’s a man with real power—in charge of everything having to do with city operations.”</span></p><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">“They were talking about automatic waste processing earlier. Do you think they’ll really do it?”</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p data-dcnode-id="3665"><span data-dcnode-id="3669" instrument_node="">“Hard to say.” Lao Ge sipped the </span><em data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">baijiu</span></em><span data-dcnode-id="3666" instrument_node=""> and let out a burp. “I suspect not. You have to understand why they went with manual processing in the first place. Back then, the situation here was similar to Europe at the end of the twentieth century. The economy was growing, but so was unemployment. Printing money didn’t solve the problem. The economy refused to obey the Phillips curve.”</span></p><span data-dcnode-id="3664" instrument_node="">
</span><p data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">He saw that Lao Dao looked completely lost, and laughed. “Never mind. You wouldn’t understand these things anyway.”</span></p><span data-dcnode-id="3661" instrument_node="">
</span><p data-dcnode-id="3656"><span data-dcnode-id="3660" instrument_node="">He clinked glasses with Lao Dao and the two drained their </span><em data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">baijiu</span></em><span data-dcnode-id="3657" instrument_node=""> and refilled the glasses.</span></p><span data-dcnode-id="3655" instrument_node="">
</span><p data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">“I’ll just stick to unemployment. I’m sure you understand the concept,” Lao Ge continued. “As the cost of labor goes up and the cost of machinery goes down, at some point, it’ll be cheaper to use machines than people. With the increase in productivity, the GDP goes up, but so does unemployment. What do you do? Enact policies to protect the workers? Better welfare? The more you try to protect workers, the more you increase the cost of labor and make it less attractive for employers to hire people. If you go outside the city now to the industrial districts, there’s almost no one working in those factories. It’s the same thing with farming. Large commercial farms contain thousands and thousands of acres of land, and everything is automated so there’s no need for people. This kind of automation is absolutely necessary if you want to grow your economy—that was how we caught up to Europe and America, remember? Scaling! The problem is: Now you’ve gotten the people off the land and out of the factories, what are you going to do with them? In Europe, they went with the path of forcefully reducing everyone’s working hours and thus increasing employment opportunities. But this saps the vitality of the economy, you understand?</span></p><span data-dcnode-id="3652" instrument_node="">
</span><p data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">“The best way is to reduce the time a certain portion of the population spends living, and then find ways to keep them busy. Do you get it? Right, shove them into the night. There’s another advantage to this approach: The effects of inflation almost can’t be felt at the bottom of the social pyramid. Those who can get loans and afford the interest spend all the money you print. The GDP goes up, but the cost of basic necessities does not. And most of the people won’t even be aware of it.”</span></p><span data-dcnode-id="3649" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Lao Dao listened, only half grasping what was being said. But he could detect something cold and cruel in Lao Ge’s speech. Lao Ge’s manner was still jovial, but he could tell Lao Ge’s joking tone was just an attempt to dull the edge of his words and not hurt him. Not too much.</span></p><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">“Yes, it sounds a bit cold,” Lao Ge admitted. “But it’s the truth. I’m not trying to defend this place just because I live here. But after so many years, you grow a bit numb. There are many things in life we can’t change, and all we can do is to accept and endure.”</span></p><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Lao Dao was finally beginning to understand Lao Ge, but he didn’t know what to say.</span></p><span data-dcnode-id="3640" instrument_node="">
</span><p data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">Both became a bit drunk. They began to reminisce about the past: The foods they ate as children, schoolyard fights. Lao Ge had loved hot and sour rice noodles and stinky tofu. These were not available in First Space, and he missed them dearly. Lao Ge talked about his parents, who still lived in Third Space. He couldn’t visit them often because each trip required him to apply and obtain special approval, which was very burdensome. He mentioned that there were some officially sanctioned ways to go between Third Space and First Space, and a few select people did make the trip often. He hoped that Lao Dao could bring a few things back to his parents because he felt regret and sorrow over his inability to be by their side and care for them.</span></p><span data-dcnode-id="3637" instrument_node="">
</span><p data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">Lao Dao talked about his lonely childhood. In the dim lamplight, he recalled his childhood spent alone wandering at the edge of the landfill.</span></p><span data-dcnode-id="3634" instrument_node="">
</span><p data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">It was now late night. Lao Ge had to go check up on the event downstairs, and he took Lao Dao with him. The dance party downstairs was about to be over, and tired–looking men and women emerged in twos and threes. Lao Ge said that entrepreneurs seemed to have the most energy, and often danced until the morning. The deserted banquet hall after the party looked messy and grubby, like a woman who took off her makeup after a long, tiring day. Lao Ge watched the robots trying to clean up the mess and laughed. “This is the only moment when First Space shows its true face.”</span></p><span data-dcnode-id="3631" instrument_node="">
</span><p data-dcnode-id="3627"><span data-dcnode-id="3630" instrument_node="">Lao Dao checked the time: Three hours until the Change. He sorted his thoughts: </span><em data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">It’s time to leave.</span></em></p><span data-dcnode-id="3626" instrument_node="">
</span><p class="line-above centered" data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">&nbsp;5.</span></p><span data-dcnode-id="3623" instrument_node="">
</span><p data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">The silver–haired speaker returned to his office after the banquet to deal with some paperwork, and then got on a video call with Europe. At midnight, he felt tired. He took off his glasses and rubbed the bridge of his nose. It was finally time to go home. He worked till midnight on most days.</span></p><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">The phone rang. He picked up. It was his secretary.</span></p><span data-dcnode-id="3617" instrument_node="">
</span><p data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">The research group for the conference had reported something troubling. Someone had discovered an error with one of the figures used in the pre–printed conference declaration, and the research group wanted to know if they should re–print the declaration. The old man immediately approved the request. This was very important, and they had to get it right. He asked who was responsible for this, and the secretary told him that it was Director Wu Wen.</span></p><span data-dcnode-id="3614" instrument_node="">
</span><p data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">The old man sat down on his sofa and took a nap. Around four in the morning, the phone rang again. The printing was going a bit slower than expected, and they estimated it would take another hour.</span></p><span data-dcnode-id="3611" instrument_node="">
</span><p data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">He got up and looked outside the window. All was silent. He could see Orion’s bright stars twinkling against the dark sky.</span></p><span data-dcnode-id="3608" instrument_node="">
</span><p data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">The stars of Orion were reflected in the mirror–like surface of the lake. Lao Dao was sitting on the shore of the lake, waiting for the Change.</span></p><span data-dcnode-id="3605" instrument_node="">
</span><p data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">He gazed at the park at night, realizing that this was perhaps the last time he would see a sight such as this. He wasn’t sad or nostalgic. This was a beautiful, peaceful place, but it had nothing to do with him. He wasn’t envious or resentful. He just wanted to remember this experience. There were few lights at night here, nothing like the flashing neon that turned the streets of Third Space bright as day. The buildings of the city seemed to be asleep, breathing evenly and calmly.</span></p><span data-dcnode-id="3602" instrument_node="">
</span><p data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">At five in the morning, the secretary called again to say that the declaration had been re–printed and bound, but the documents were still in the print shop, and they wanted to know if they should delay the scheduled Change.</span></p><span data-dcnode-id="3599" instrument_node="">
</span><p data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">The old man made the decision right away. Of course they had to delay it.</span></p><span data-dcnode-id="3596" instrument_node="">
</span><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">At forty minutes past the hour, the printed declarations were brought to the conference site, but they still had to be stuffed into about three thousand individual folders.</span></p><span data-dcnode-id="3593" instrument_node="">
</span><p data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Lao Dao saw the faint light of dawn. At this time during the year, the sun wouldn’t have risen by six, but it was possible to see the sky brightening near the horizon.</span></p><span data-dcnode-id="3590" instrument_node="">
</span><p data-dcnode-id="3585"><span data-dcnode-id="3589" instrument_node="">He was prepared. He looked at his phone: only a couple more minutes until six. But strangely, there were no signs of the Change. </span><em data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Maybe in First Space, even the Change happens more smoothly and steadily</span></em><span data-dcnode-id="3586" instrument_node="">.</span></p><span data-dcnode-id="3584" instrument_node="">
</span><p data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">At ten after six, the last copy of the declaration was stuffed into its folder.</span></p><span data-dcnode-id="3581" instrument_node="">
</span><p data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">The old man let out a held breath. He gave the order to initiate the Change.</span></p><span data-dcnode-id="3578" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Lao Dao noticed that the earth was finally moving. He stood up and shook the numbness out of his limbs. Carefully, he stepped up to the edge of the widening fissure. As the earth on both sides of the crack lifted up, he clambered over the edge, tested for purchase with his feet, and climbed down. The ground began to turn.</span></p><span data-dcnode-id="3575" instrument_node="">
</span><p data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">At twenty after six, the secretary called again with an emergency. Director Wu Wen had carelessly left a data key with important documents behind at the banquet hall. He was worried that the cleaning robots might remove it, and he had to go retrieve it right away.</span></p><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">The old man was annoyed, but he gave the order to stop the Change and reverse course.</span></p><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Lao Dao was climbing slowly over the cross section of the earth when everything stopped with a jolt. After a moment, the earth started moving again, but now in reverse. The fissure was closing up. Terrified, he climbed up as fast as he dared. Scrabbling over the soil with hands and feet, he had to be careful with his movements.</span></p><span data-dcnode-id="3566" instrument_node="">
</span><p data-dcnode-id="3562"><span data-dcnode-id="3565" instrument_node="">The seam closed faster than he had expected. Just as he reached the top, the two sides of the crack came together. One of his lower legs was caught. Although the soil gave enough to not crush his leg or break his bones, it held him fast and he couldn’t extricate himself despite several attempts. Sweat beaded on his forehead from terror and pain. </span><em data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Has he been discovered?</span></em></p><span data-dcnode-id="3561" instrument_node="">
</span><p data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">Lao Dao lay prostrate on the ground, listening. He seemed to hear steps hurrying toward him. He imagined that soon the police would arrive and catch him. They might cut off his leg and toss him in jail with the stump. He couldn’t tell when his identity had been revealed. As he lay on the grass, he felt the chill of morning dew. The damp air seeped through collar and cuffs, keeping him alert and making him shiver. He silently counted the seconds, hoping against hope that this was but a technical malfunction. He tried to plan for what to say if he was caught. Maybe he should mention how honestly and diligently he had toiled for twenty–eight years and try to buy a bit of sympathy. He didn’t know if he would be prosecuted in court. Fate loomed before his eyes.</span></p><span data-dcnode-id="3558" instrument_node="">
</span><p data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">Fate now pressed into his chest. Of everything he had experienced during the last forty–eight hours, the episode that had made the deepest impression was the conversation with Lao Ge at dinner. He felt that he had approached some aspect of truth, and perhaps that was why he could catch a glimpse of the outline of fate. But the outline was too distant, too cold, too out of reach. He didn’t know what was the point of knowing the truth. If he could see some things clearly but was still powerless to change them, what good did that do? In his case, he couldn’t even see clearly. Fate was like a cloud that momentarily took on some recognizable shape, and by the time he tried to get a closer look, the shape was gone. He knew that he was nothing more than a figure. He was but an ordinary person, one out of 51,280,000 others just like him. And if they didn’t need that much precision and spoke of only 50 million, he was but a rounding error, the same as if he had never existed. He wasn’t even as significant as dust. He grabbed onto the grass.</span></p><span data-dcnode-id="3555" instrument_node="">
</span><p data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">At six thirty, Wu Wen retrieved his data key. At six forty, Wu Wen was back in his home.</span></p><span data-dcnode-id="3552" instrument_node="">
</span><p data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">At six forty–five, the white–haired old man finally lay down on the small bed in his office, exhausted. The order had been issued, and the wheels of the world began to turn slowly. Transparent covers extended over the coffee table and the desk, securing everything in place. The bed released a cloud of soporific gas and extended rails on all sides; then it rose into the air. As the ground and everything on the ground turned, the bed would remain level, like a floating cradle.</span></p><span data-dcnode-id="3549" instrument_node="">
</span><p data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">The Change had started again.</span></p><span data-dcnode-id="3546" instrument_node="">
</span><p data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">After thirty minutes spent in despair, Lao Dao saw a trace of hope again. The ground was moving. He pulled his leg out as soon as the fissure opened, and then returned to the arduous climb over the cross–section as soon as the opening was wide enough. He moved with even more care than before. As circulation returned to his numb leg, his calf itched and ached as though he was being bitten by thousands of ants. Several times, he almost fell. The pain was intolerable, and he had to bite his fist to stop from screaming. He fell; he got up; he fell again; he got up again. He struggled with all his strength and skill to maintain his footing over the rotating earth.</span></p><span data-dcnode-id="3543" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">He couldn’t even remember how he had climbed up the stairs. He only remembered fainting as soon as Qin Tian opened the door to his apartment.</span></p><span data-dcnode-id="3540" instrument_node="">
</span><p class="line-above" data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">Lao Dao slept for ten hours in Second Space. Qin Tian found a classmate in medical school to help dress his wound. He suffered massive damage to his muscles and soft tissue, but luckily, no bones were broken. However, he was going to have some difficulty walking for a while.</span></p><span data-dcnode-id="3537" instrument_node="">
</span><p data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">After waking up, Lao Dao handed Yi Yan’s letter to Qin Tian. He watched as Qin Tian read the letter, his face filling up with happiness as well as loss. He said nothing. He knew that Qin Tian would be immersed in this remote hope for a long time.</span></p><span data-dcnode-id="3534" instrument_node="">
</span><p class="line-above" data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">Returning to Third Space, Lao Dao felt as though he had been traveling for a month. The city was waking up slowly. Most of the residents had slept soundly, and now they picked up their lives from where they had left off the previous cycle. No one would notice that Lao Dao had been away.</span></p><span data-dcnode-id="3531" instrument_node="">
</span><p data-dcnode-id="3524"><span data-dcnode-id="3530" instrument_node="">As soon as the vendors along the pedestrian lane opened shop, he sat down at a plastic table and ordered a bowl of chow mein. For the first time in his life, Lao Dao asked for shredded pork to be added to the noodles. </span><em data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">Just one time</span></em><span data-dcnode-id="3527" instrument_node="">, he thought. </span><em data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">A reward.</span></em></p><span data-dcnode-id="3523" instrument_node="">
</span><p data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">Then he went to Lao Ge’s home and delivered the two boxes of medicine Lao Ge had bought for his parents. The two elders were no longer mobile, and a young woman with a dull demeanor lived with them as a caretaker.</span></p><span data-dcnode-id="3520" instrument_node="">
</span><p data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">Limping, he slowly returned to his own rental unit. The hallway was noisy and chaotic, filled with the commotion of a typical morning: brushing teeth, flushing toilets, arguing families. All around him were disheveled hair and half–dressed bodies.</span></p><span data-dcnode-id="3517" instrument_node="">
</span><p data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">He had to wait a while for the elevator. As soon as he got off at his floor he heard loud arguing noises. It was the two girls who lived next door, Lan Lan and Ah Bei, arguing with the old lady who collected rent. All the units in the building were public housing, but the residential district had an agent who collected rent, and each building, even each floor, had a subagent. The old lady was a long–term resident. She was thin, shriveled, and lived by herself—her son had left and nobody knew where he was. She always kept her door shut and didn’t interact much with the other residents. Lan Lan and Ah Bei had moved in recently, and they worked at a clothing store. Ah Bei was shouting while Lan Lan was trying to hold her back. Ah Bei turned and shouted at Lan Lan; Lan Lan began to cry.</span></p><span data-dcnode-id="3514" instrument_node="">
</span><p data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">“We all have to follow the lease, don’t we?” The old lady pointed at the scrolling text on the screen mounted on the wall. “Don’t you dare accuse me of lying! Do you understand what a lease is? It’s right here in black and white: In autumn and winter, there’s a ten&nbsp;percent surcharge for heat.”</span></p><span data-dcnode-id="3511" instrument_node="">
</span><p data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">“Ha!” Ah Bei lifted her chin at the old lady while combing her hair forcefully. “Do you think we are going to be fooled by such a basic trick? When we’re at work, you turn off the heat. Then you charge us for the electricity we haven’t been using so you can keep the extra for yourself. Do you think we were born yesterday? Every day, when we get home after work, the place is cold as an ice cellar. Just because we’re new, you think you can take advantage of us?”</span></p><span data-dcnode-id="3508" instrument_node="">
</span><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">Ah Bei’s voice was sharp and brittle, and it cut through the air like a knife. Lao Dao looked at Ah Bei, at her young, determined, angry face, and thought she was very beautiful. Ah Bei and Lan Lan often helped him by taking care of Tangtang when he wasn’t home, and sometimes even made porridge for him. He wanted Ah Bei to stop shouting, to forget these trivial things and stop arguing. He wanted to tell her that a girl should sit elegantly and quietly, cover her knees with her skirt, and smile so that her pretty teeth showed. That was how you got others to love you. But he knew that that was not what Ah Bei and Lan Lan needed.</span></p><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">He took out a 10,000–yuan bill from his inner pocket and handed it to the old lady. His hand trembled from weakness. The old lady was stunned, and so were Ah Bei and Lan Lan. He didn’t want to explain. He waved at them and returned to his home.</span></p><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Tangtang was just waking up in her crib, and she rubbed her sleepy eyes. He gazed into Tangtang’s face, and his exhausted heart softened. He remembered how he had found Tangtang at first in front of the waste processing station, and her dirty, tear–stained face. He had never regretted picking her up that day. She laughed, and smacked her lips. He thought that he was fortunate. Although he was injured, he hadn’t been caught and managed to bring back money. He didn’t know how long it would take Tangtang to learn to dance and sing, and become an elegant young lady.</span></p><span data-dcnode-id="3499" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">He checked the time. It was time to go to work.</span></p><span data-dcnode-id="3496" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3481"><em data-dcnode-id="3482"><span data-dcnode-id="3492" instrument_node="">(</span><strong data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">Editors’ Note: This story is the winner of the 2016 Hugo Award for Best Novelette.</span></strong><span data-dcnode-id="3489" instrument_node="">&nbsp;In this issue, </span><a data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uncannymagazine.com/article/interview-hao-jingfang/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3488" instrument_node="">Deborah Stanish interviews Hao Jingfang</span></a><span data-dcnode-id="3486" instrument_node="">. Please also read “</span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uncannymagazine.com/want-write-history-inequality-hao-jingfang-translated-ken-liu/"><span data-dcnode-id="3485" instrument_node="">I Want to Write A History of Inequality</span></a><span data-dcnode-id="3483" instrument_node="">,” an essay about this story by Hao Jingfang, translated by Ken Liu &nbsp;)</span></em></p><span data-dcnode-id="3480" instrument_node="">

</span><h2 data-dcnode-id="3380"><a data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uncannymagazine.com/authors/hao-jingfang/"><span data-dcnode-id="3382" instrument_node="">Hao Jingfang</span></a></h2><span data-dcnode-id="3379" instrument_node="">
</span><p data-dcnode-id="3344"><span data-dcnode-id="3378" instrument_node="">Hao Jingfang has an undergraduate degree from Tsinghua University’s Department of Physics and a PhD from Tsinghua in Economics and Management. Her fiction has appeared in English in various publications, including </span><em data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Lightspeed</span></em><span data-dcnode-id="3375" instrument_node="">, </span><em data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">Clarkesworld</span></em><span data-dcnode-id="3372" instrument_node="">, and </span><em data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">Uncanny</span></em><span data-dcnode-id="3369" instrument_node="">. She has published three full–length novels, </span><em data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">Wandering Maearth</span></em><span data-dcnode-id="3366" instrument_node="">, </span><em data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">Return to Charon</span></em><span data-dcnode-id="3363" instrument_node="">, and </span><em data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Born in 1984</span></em><span data-dcnode-id="3360" instrument_node="">; a book of cultural essays, </span><em data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">Europe in Time</span></em><span data-dcnode-id="3357" instrument_node="">; and several short story collections, </span><em data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Star Travelers</span></em><span data-dcnode-id="3354" instrument_node="">, </span><em data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">To Go the Distance</span></em><span data-dcnode-id="3351" instrument_node="">, and </span><em data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">The Depth of Loneliness</span></em><span data-dcnode-id="3348" instrument_node="">. In 2016, her novelette, “Folding Beijing” (translated by Ken Liu), was a Hugo Award winner and Locus Award and Sturgeon Award finalist. Several of her stories, including “Folding Beijing,” are collected in </span><em data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">Invisible Planets</span></em><span data-dcnode-id="3345" instrument_node="">, an anthology of contemporary Chinese SF edited and translated by Ken Liu.</span></p><span data-dcnode-id="3343" instrument_node="">

</span><h2 data-dcnode-id="3318"><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uncannymagazine.com/authors/ken-liu/"><span data-dcnode-id="3320" instrument_node="">Ken Liu</span></a></h2><span data-dcnode-id="3317" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3316" instrument_node="">Ken Liu (</span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kenliu.name/"><span data-dcnode-id="3315" instrument_node="">http://kenliu.name</span></a><span data-dcnode-id="3313" instrument_node="">) is an American author of speculative fiction. A winner of the Nebula, Hugo, and World Fantasy awards, he wrote </span><em data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">The Dandelion Dynasty</span></em><span data-dcnode-id="3310" instrument_node="">, a silkpunk epic fantasy series (starting with </span><em data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">The Grace of Kings</span></em><span data-dcnode-id="3307" instrument_node="">), as well as </span><em data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">The Paper Menagerie and Other Stories</span></em><span data-dcnode-id="3304" instrument_node=""> and </span><em data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">The Hidden Girl and Other Stories</span></em><span data-dcnode-id="3301" instrument_node="">. He also authored the </span><em data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Star Wars</span></em><span data-dcnode-id="3298" instrument_node=""> novel, </span><em data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">The Legends of Luke Skywalker</span></em><span data-dcnode-id="3295" instrument_node="">.</span></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Prior to becoming a full-time writer, Liu worked as a software engineer, corporate lawyer, and litigation consultant. Liu frequently speaks at conferences and universities on a variety of topics, including futurism, cryptocurrency, history of technology, bookmaking, the mathematics of origami, and other subjects of his expertise.</span></p><span data-dcnode-id="3290" instrument_node="">
