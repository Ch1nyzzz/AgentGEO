</span><div class="thumb tright" data-dcnode-id="4656"><div class="thumbinner" data-dcnode-id="4657" style="width:222px;"><a class="image" data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATao_Ko_Travel_Service_HQ_20131103.jpg"><img alt="" class="thumbimage" data-dcnode-id="4666" data-file-height="1944" data-file-width="2592" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Tao_Ko_Travel_Service_HQ_20131103.jpg/220px-Tao_Ko_Travel_Service_HQ_20131103.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Tao_Ko_Travel_Service_HQ_20131103.jpg/330px-Tao_Ko_Travel_Service_HQ_20131103.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Tao_Ko_Travel_Service_HQ_20131103.jpg/440px-Tao_Ko_Travel_Service_HQ_20131103.jpg 2x" width="220"></a><span data-dcnode-id="4664" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4658"><div class="magnify" data-dcnode-id="4662"><a class="internal" data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATao_Ko_Travel_Service_HQ_20131103.jpg" title="Enlarge"></a></div><span data-dcnode-id="4661" instrument_node="">Travel agency in </span><a data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiwan" title="Taiwan"><span data-dcnode-id="4660" instrument_node="">Taiwan</span></a></div></div></div><span data-dcnode-id="4655" instrument_node="">
</span><p data-dcnode-id="4569"><span data-dcnode-id="4654" instrument_node="">A </span><b data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">travel agency</span></b><span data-dcnode-id="4651" instrument_node=""> is a private </span><a class="mw-redirect" data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retailing" title="Retailing"><span data-dcnode-id="4650" instrument_node="">retailer</span></a><span data-dcnode-id="4648" instrument_node=""> or </span><a data-dcnode-id="4646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_service" title="Public service"><span data-dcnode-id="4647" instrument_node="">public service</span></a><span data-dcnode-id="4645" instrument_node=""> that provides travel and </span><a data-dcnode-id="4643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tourism" title="Tourism"><span data-dcnode-id="4644" instrument_node="">tourism</span></a><span data-dcnode-id="4642" instrument_node="">-related </span><a data-dcnode-id="4640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Service_%28economics%29" title="Service (economics)"><span data-dcnode-id="4641" instrument_node="">services</span></a><span data-dcnode-id="4639" instrument_node=""> to the </span><a class="mw-redirect" data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_public" title="General public"><span data-dcnode-id="4638" instrument_node="">general public</span></a><span data-dcnode-id="4636" instrument_node=""> on behalf of accommodation or travel </span><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supply_chain" title="Supply chain"><span data-dcnode-id="4635" instrument_node="">suppliers</span></a><span data-dcnode-id="4633" instrument_node=""> to offer different kinds of </span><a data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Package_tour" title="Package tour"><span data-dcnode-id="4632" instrument_node="">travelling packages</span></a><span data-dcnode-id="4630" instrument_node=""> for each destination. Travel agencies can provide </span><a data-dcnode-id="4628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outdoor_recreation" title="Outdoor recreation"><span data-dcnode-id="4629" instrument_node="">outdoor recreation</span></a><span data-dcnode-id="4627" instrument_node=""> activities, </span><a data-dcnode-id="4625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airline" title="Airline"><span data-dcnode-id="4626" instrument_node="">airlines</span></a><span data-dcnode-id="4624" instrument_node="">, </span><a data-dcnode-id="4622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Car_rental" title="Car rental"><span data-dcnode-id="4623" instrument_node="">car rentals</span></a><span data-dcnode-id="4621" instrument_node="">, </span><a data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cruise_line" title="Cruise line"><span data-dcnode-id="4620" instrument_node="">cruise lines</span></a><span data-dcnode-id="4618" instrument_node="">, </span><a data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hotel" title="Hotel"><span data-dcnode-id="4617" instrument_node="">hotels</span></a><span data-dcnode-id="4615" instrument_node="">, </span><a data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rail_transport" title="Rail transport"><span data-dcnode-id="4614" instrument_node="">railways</span></a><span data-dcnode-id="4612" instrument_node="">, </span><a data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Travel_insurance" title="Travel insurance"><span data-dcnode-id="4611" instrument_node="">travel insurance</span></a><span data-dcnode-id="4609" instrument_node="">, </span><a data-dcnode-id="4607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Package_tour" title="Package tour"><span data-dcnode-id="4608" instrument_node="">package tours</span></a><span data-dcnode-id="4606" instrument_node="">, </span><a data-dcnode-id="4604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insurance" title="Insurance"><span data-dcnode-id="4605" instrument_node="">insurance</span></a><span data-dcnode-id="4603" instrument_node="">, </span><a data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guide_book" title="Guide book"><span data-dcnode-id="4602" instrument_node="">guide books</span></a><span data-dcnode-id="4600" instrument_node="">, </span><a data-dcnode-id="4598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_important_person" title="Very important person"><span data-dcnode-id="4599" instrument_node="">VIP</span></a><span data-dcnode-id="4597" instrument_node=""> </span><a data-dcnode-id="4595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airport_lounge" title="Airport lounge"><span data-dcnode-id="4596" instrument_node="">airport lounge access</span></a><span data-dcnode-id="4594" instrument_node="">, arranging logistics for luggage and medical items delivery for travellers upon request, </span><a data-dcnode-id="4592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_transport_timetable" title="Public transport timetable"><span data-dcnode-id="4593" instrument_node="">public transport timetables</span></a><span data-dcnode-id="4591" instrument_node="">, </span><a data-dcnode-id="4589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Car_rental" title="Car rental"><span data-dcnode-id="4590" instrument_node="">car rentals</span></a><span data-dcnode-id="4588" instrument_node="">, and </span><a data-dcnode-id="4586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bureau_de_change" title="Bureau de change"><span data-dcnode-id="4587" instrument_node="">bureau de change</span></a><span data-dcnode-id="4585" instrument_node=""> services. Travel agencies can also serve as </span><a data-dcnode-id="4583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_sales_agent_%28airlines%29" title="General sales agent (airlines)"><span data-dcnode-id="4584" instrument_node="">general sales agents</span></a><span data-dcnode-id="4582" instrument_node=""> for airlines that do not have offices in a specific region. A travel agency's main function is to act as an </span><a class="mw-redirect" data-dcnode-id="4580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agent_%28law%29" title="Agent (law)"><span data-dcnode-id="4581" instrument_node="">agent</span></a><span data-dcnode-id="4579" instrument_node="">, selling travel products and services on behalf of a supplier. They are also called Travel Advisors. They do not keep </span><a data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inventory" title="Inventory"><span data-dcnode-id="4578" instrument_node="">inventory</span></a><span data-dcnode-id="4576" instrument_node=""> in-hand unless they have pre-booked hotel rooms or cabins on a cruise ship for a group travel event such as a </span><a data-dcnode-id="4574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wedding" title="Wedding"><span data-dcnode-id="4575" instrument_node="">wedding</span></a><span data-dcnode-id="4573" instrument_node="">, </span><a data-dcnode-id="4571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Honeymoon" title="Honeymoon"><span data-dcnode-id="4572" instrument_node="">honeymoon</span></a><span data-dcnode-id="4570" instrument_node="">, or other group event.

</span><h2 data-dcnode-id="4474"><span class="mw-headline" data-dcnode-id="4482" id="Business_model"><span data-dcnode-id="4483" instrument_node="">Business model</span></span><span class="mw-editsection" data-dcnode-id="4475"><span class="mw-editsection-bracket" data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">[</span></span><a data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTravel_agency%26action%3Dedit%26section%3D1" title="Edit section: Business model"><span data-dcnode-id="4479" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4473" instrument_node="">
</span><p data-dcnode-id="4443"><span data-dcnode-id="4472" instrument_node="">Travel agencies often receive </span><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commission_%28remuneration%29" title="Commission (remuneration)"><span data-dcnode-id="4471" instrument_node="">commissions</span></a><span data-dcnode-id="4469" instrument_node=""> and other benefits and incentives from providers or may charge a </span><a data-dcnode-id="4467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fee" title="Fee"><span data-dcnode-id="4468" instrument_node="">fee</span></a><span data-dcnode-id="4466" instrument_node=""> to the end users.</span><sup class="reference" data-dcnode-id="4463" id="cite_ref-1"><a data-dcnode-id="4464" href="#cite_note-1"><span data-dcnode-id="4465" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4462" instrument_node=""> </span><a data-dcnode-id="4460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hotel" title="Hotel"><span data-dcnode-id="4461" instrument_node="">Hotel</span></a><span data-dcnode-id="4459" instrument_node=""> owners and </span><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tour_operator" title="Tour operator"><span data-dcnode-id="4458" instrument_node="">tour operators</span></a><span data-dcnode-id="4456" instrument_node=""> typically pay a higher commission rate to travel agencies, whereas airlines typically pay a low commission.</span><sup class="reference" data-dcnode-id="4453" id="cite_ref-2"><a data-dcnode-id="4454" href="#cite_note-2"><span data-dcnode-id="4455" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4452" instrument_node=""> The customer is normally not made aware of how much the travel agent is earning in commissions and other benefits.</span><sup class="reference" data-dcnode-id="4449" id="cite_ref-3"><a data-dcnode-id="4450" href="#cite_note-3"><span data-dcnode-id="4451" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4448" instrument_node=""> A 2016 survey of 1,193 travel agents in the United States found that on average 78% of their revenue was from commissions and 22% was generated from fees.</span><sup class="reference" data-dcnode-id="4445" id="cite_ref-4"><a data-dcnode-id="4446" href="#cite_note-4"><span data-dcnode-id="4447" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4444" instrument_node="">
</span></p><span data-dcnode-id="4442" instrument_node="">
</span><h2 data-dcnode-id="4432"><span class="mw-headline" data-dcnode-id="4440" id="Travel_technology"><span data-dcnode-id="4441" instrument_node="">Travel technology</span></span><span class="mw-editsection" data-dcnode-id="4433"><span class="mw-editsection-bracket" data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">[</span></span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTravel_agency%26action%3Dedit%26section%3D2" title="Edit section: Travel technology"><span data-dcnode-id="4437" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4431" instrument_node="">
</span><p data-dcnode-id="4363"><span data-dcnode-id="4430" instrument_node="">Travel agencies use the services of the major </span><a class="mw-redirect" data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_reservations_system" title="Computer reservations system"><span data-dcnode-id="4429" instrument_node="">computer reservations systems</span></a><span data-dcnode-id="4427" instrument_node="">, also known as </span><a data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_distribution_system" title="Global distribution system"><span data-dcnode-id="4426" instrument_node="">global distribution systems</span></a><span data-dcnode-id="4424" instrument_node=""> (GDS), including: </span><a data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amadeus_CRS" title="Amadeus CRS"><span data-dcnode-id="4423" instrument_node="">Amadeus CRS</span></a><span data-dcnode-id="4421" instrument_node="">, </span><a data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_GDS" title="Galileo GDS"><span data-dcnode-id="4420" instrument_node="">Galileo GDS</span></a><span data-dcnode-id="4418" instrument_node="">, </span><a data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sabre_%28computer_system%29" title="Sabre (computer system)"><span data-dcnode-id="4417" instrument_node="">Sabre</span></a><span data-dcnode-id="4415" instrument_node="">, and </span><a data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worldspan" title="Worldspan"><span data-dcnode-id="4414" instrument_node="">Worldspan</span></a><span data-dcnode-id="4412" instrument_node="">, which is a </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subsidiary" title="Subsidiary"><span data-dcnode-id="4411" instrument_node="">subsidiary</span></a><span data-dcnode-id="4409" instrument_node=""> of </span><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Travelport" title="Travelport"><span data-dcnode-id="4408" instrument_node="">Travelport</span></a><span data-dcnode-id="4406" instrument_node="">, which allow for comparison and sorting of hotel and flight rates with multiple companies.</span><sup class="reference" data-dcnode-id="4403" id="cite_ref-5"><a data-dcnode-id="4404" href="#cite_note-5"><span data-dcnode-id="4405" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4402" instrument_node=""> Bookings made via travel agents, including online travel agents, may or may not be confirmed instantly. Unlike online travel agencies, </span><a data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metasearch_engine" title="Metasearch engine"><span data-dcnode-id="4401" instrument_node="">metasearch engines</span></a><span data-dcnode-id="4399" instrument_node=""> and </span><a data-dcnode-id="4397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scraper_site" title="Scraper site"><span data-dcnode-id="4398" instrument_node="">scraper sites</span></a><span data-dcnode-id="4396" instrument_node="">, such as </span><a data-dcnode-id="4394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Skyscanner" title="Skyscanner"><span data-dcnode-id="4395" instrument_node="">Skyscanner</span></a><span data-dcnode-id="4393" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kayak.com" title="Kayak.com"><span data-dcnode-id="4392" instrument_node="">Kayak.com</span></a><span data-dcnode-id="4390" instrument_node="">, </span><a data-dcnode-id="4388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rome2rio" title="Rome2rio"><span data-dcnode-id="4389" instrument_node="">Rome2rio</span></a><span data-dcnode-id="4387" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TripAdvisor" title="TripAdvisor"><span data-dcnode-id="4386" instrument_node="">TripAdvisor</span></a><span data-dcnode-id="4384" instrument_node="">, may or may not have their own booking engine, and instead provide results for search queries and then divert traffic to service providers or online travel agencies for booking.</span><sup class="reference" data-dcnode-id="4381" id="cite_ref-6"><a data-dcnode-id="4382" href="#cite_note-6"><span data-dcnode-id="4383" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="4378" id="cite_ref-7"><a data-dcnode-id="4379" href="#cite_note-7"><span data-dcnode-id="4380" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="4375" id="cite_ref-8"><a data-dcnode-id="4376" href="#cite_note-8"><span data-dcnode-id="4377" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4374" instrument_node=""> Travel agents may also work with </span><a data-dcnode-id="4372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airline_consolidator" title="Airline consolidator"><span data-dcnode-id="4373" instrument_node="">airline consolidators</span></a><span data-dcnode-id="4371" instrument_node="">.</span><sup class="reference" data-dcnode-id="4368" id="cite_ref-9"><a data-dcnode-id="4369" href="#cite_note-9"><span data-dcnode-id="4370" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="4365" id="cite_ref-10"><a data-dcnode-id="4366" href="#cite_note-10"><span data-dcnode-id="4367" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4364" instrument_node="">
</span></p><span data-dcnode-id="4362" instrument_node="">
</span><h2 data-dcnode-id="4352"><span class="mw-headline" data-dcnode-id="4360" id="Types_of_agencies"><span data-dcnode-id="4361" instrument_node="">Types of agencies</span></span><span class="mw-editsection" data-dcnode-id="4353"><span class="mw-editsection-bracket" data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">[</span></span><a data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTravel_agency%26action%3Dedit%26section%3D3" title="Edit section: Types of agencies"><span data-dcnode-id="4357" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4212"><a data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Booking_Holdings" title="Booking Holdings"><span data-dcnode-id="4350" instrument_node="">Booking Holdings</span></a><span data-dcnode-id="4348" instrument_node=""> and </span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expedia_Group" title="Expedia Group"><span data-dcnode-id="4347" instrument_node="">Expedia Group</span></a><span data-dcnode-id="4345" instrument_node="">, both online travel agencies, are the largest travel agencies on the </span><a data-dcnode-id="4343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_top_earning_travel_companies" title="List of top earning travel companies"><span data-dcnode-id="4344" instrument_node="">list of top earning travel companies</span></a><span data-dcnode-id="4342" instrument_node="">.</span><sup class="reference" data-dcnode-id="4339" id="cite_ref-11"><a data-dcnode-id="4340" href="#cite_note-11"><span data-dcnode-id="4341" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4338" instrument_node=""> Travel agencies can be </span><a class="mw-redirect" data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multinational_companies" title="Multinational companies"><span data-dcnode-id="4337" instrument_node="">multinational companies</span></a><span data-dcnode-id="4335" instrument_node="">, referred to as "multiples" in the </span><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="4334" instrument_node="">United Kingdom</span></a><span data-dcnode-id="4332" instrument_node="">. They can also be medium-sized organizations, referred to as "miniples" in the United Kingdom, or can be independent, small companies. They can be structured as a </span><a data-dcnode-id="4330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Limited_liability_company" title="Limited liability company"><span data-dcnode-id="4331" instrument_node="">limited liability company</span></a><span data-dcnode-id="4329" instrument_node="">, a </span><a data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sole_proprietorship" title="Sole proprietorship"><span data-dcnode-id="4328" instrument_node="">sole proprietorship</span></a><span data-dcnode-id="4326" instrument_node="">, or can be set up as a host, </span><a data-dcnode-id="4324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franchising" title="Franchising"><span data-dcnode-id="4325" instrument_node="">franchising</span></a><span data-dcnode-id="4323" instrument_node="">, or </span><a data-dcnode-id="4321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consortium" title="Consortium"><span data-dcnode-id="4322" instrument_node="">consortium</span></a><span data-dcnode-id="4320" instrument_node=""> structure, such as in the case of </span><a data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CWT_%28company%29" title="CWT (company)"><span data-dcnode-id="4319" instrument_node="">CWT</span></a><span data-dcnode-id="4317" instrument_node="">. A traditional travel agent may work for a travel agency or work </span><a class="mw-redirect" data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freelance" title="Freelance"><span data-dcnode-id="4316" instrument_node="">freelance</span></a><span data-dcnode-id="4314" instrument_node="">.</span><sup class="reference" data-dcnode-id="4311" id="cite_ref-12"><a data-dcnode-id="4312" href="#cite_note-12"><span data-dcnode-id="4313" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="4308" id="cite_ref-13"><a data-dcnode-id="4309" href="#cite_note-13"><span data-dcnode-id="4310" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="4305" id="cite_ref-14"><a data-dcnode-id="4306" href="#cite_note-14"><span data-dcnode-id="4307" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="4302" id="cite_ref-15"><a data-dcnode-id="4303" href="#cite_note-15"><span data-dcnode-id="4304" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4301" instrument_node=""> </span><a data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helloworld_Travel" title="Helloworld Travel"><span data-dcnode-id="4300" instrument_node="">Helloworld Travel</span></a><span data-dcnode-id="4298" instrument_node=""> is an example of a franchised travel agency, giving agents access to internal systems for product and bookings.</span><sup class="reference" data-dcnode-id="4295" id="cite_ref-16"><a data-dcnode-id="4296" href="#cite_note-16"><span data-dcnode-id="4297" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4294" instrument_node=""> While most point-to-point travel is now booked online, traditional agents specialize in </span><a data-dcnode-id="4292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Niche_market" title="Niche market"><span data-dcnode-id="4293" instrument_node="">niche markets</span></a><span data-dcnode-id="4291" instrument_node=""> such as corporate travel, luxury travel, cruises, complicated and important trips, and specialty trips.</span><sup class="reference" data-dcnode-id="4288" id="cite_ref-17"><a data-dcnode-id="4289" href="#cite_note-17"><span data-dcnode-id="4290" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4287" instrument_node=""> Other niche markets include travelers with disabilities, travelers over the age of 60, women traveling alone, </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT_tourism" title="LGBT tourism"><span data-dcnode-id="4286" instrument_node="">LGBT tourism</span></a><span data-dcnode-id="4284" instrument_node="">,</span><sup class="reference" data-dcnode-id="4281" id="cite_ref-18"><a data-dcnode-id="4282" href="#cite_note-18"><span data-dcnode-id="4283" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4280" instrument_node=""> the needs of residents in an upmarket </span><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commuter_town" title="Commuter town"><span data-dcnode-id="4279" instrument_node="">commuter town</span></a><span data-dcnode-id="4277" instrument_node=""> or suburb, or a particular group interested in a similar activity, such as a </span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sport" title="Sport"><span data-dcnode-id="4276" instrument_node="">sport</span></a><span data-dcnode-id="4274" instrument_node="">.</span><sup class="reference" data-dcnode-id="4271" id="cite_ref-19"><a data-dcnode-id="4272" href="#cite_note-19"><span data-dcnode-id="4273" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="4268" id="cite_ref-20"><a data-dcnode-id="4269" href="#cite_note-20"><span data-dcnode-id="4270" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="4265" id="cite_ref-21"><a data-dcnode-id="4266" href="#cite_note-21"><span data-dcnode-id="4267" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4264" instrument_node=""> Examples include </span><a class="mw-redirect" data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/StudentUniverse" title="StudentUniverse"><span data-dcnode-id="4263" instrument_node="">StudentUniverse</span></a><span data-dcnode-id="4261" instrument_node=""> and </span><a data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/STA_Travel" title="STA Travel"><span data-dcnode-id="4260" instrument_node="">STA Travel</span></a><span data-dcnode-id="4258" instrument_node="">, which specialize in </span><a data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_travel" title="Youth travel"><span data-dcnode-id="4257" instrument_node="">youth travel</span></a><span data-dcnode-id="4255" instrument_node="">, or </span><a data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CWT_%28company%29" title="CWT (company)"><span data-dcnode-id="4254" instrument_node="">CWT</span></a><span data-dcnode-id="4252" instrument_node="">, which caters to corporate travel. Many use </span><a data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Remote_work" title="Remote work"><span data-dcnode-id="4251" instrument_node="">remote work</span></a><span data-dcnode-id="4249" instrument_node=""> to reduce overhead or provide </span><a data-dcnode-id="4247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concierge" title="Concierge"><span data-dcnode-id="4248" instrument_node="">concierge</span></a><span data-dcnode-id="4246" instrument_node=""> services. Agents can act as "travel consultants" with extensive knowledge of destination regions and specialize in topics like </span><a data-dcnode-id="4244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nautical_tourism" title="Nautical tourism"><span data-dcnode-id="4245" instrument_node="">nautical tourism</span></a><span data-dcnode-id="4243" instrument_node=""> or </span><a data-dcnode-id="4241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_tourism" title="Cultural tourism"><span data-dcnode-id="4242" instrument_node="">cultural tourism</span></a><span data-dcnode-id="4240" instrument_node="">.</span><sup class="reference" data-dcnode-id="4237" id="cite_ref-22"><a data-dcnode-id="4238" href="#cite_note-22"><span data-dcnode-id="4239" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4236" instrument_node=""> Many traditional agents prefer the term "travel advisor" as opposed to "travel agent" to emphasize their advice, expertise, and connections that are of great value.</span><sup class="reference" data-dcnode-id="4233" id="cite_ref-23"><a data-dcnode-id="4234" href="#cite_note-23"><span data-dcnode-id="4235" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4232" instrument_node=""> There are also direct-to-local booking agencies that connect users with travel experts in the country they plan to visit instead of their travel agents in their country of residence. </span><sup class="reference" data-dcnode-id="4229" id="cite_ref-24"><a data-dcnode-id="4230" href="#cite_note-24"><span data-dcnode-id="4231" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="4226" id="cite_ref-25"><a data-dcnode-id="4227" href="#cite_note-25"><span data-dcnode-id="4228" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="4223" id="cite_ref-26"><a data-dcnode-id="4224" href="#cite_note-26"><span data-dcnode-id="4225" instrument_node="">[26]</span></a></sup><i data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">Outbound</span></i><span data-dcnode-id="4220" instrument_node=""> travel agencies offer multi-destinations; </span><i data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">inbound</span></i><span data-dcnode-id="4217" instrument_node=""> travel agencies are based in the destination and deliver an expertise on that location.</span><sup class="reference" data-dcnode-id="4214" id="cite_ref-27"><a data-dcnode-id="4215" href="#cite_note-27"><span data-dcnode-id="4216" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4213" instrument_node="">
</span></p><span data-dcnode-id="4211" instrument_node="">
</span><h2 data-dcnode-id="4201"><span class="mw-headline" data-dcnode-id="4209" id="Licensing"><span data-dcnode-id="4210" instrument_node="">Licensing</span></span><span class="mw-editsection" data-dcnode-id="4202"><span class="mw-editsection-bracket" data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">[</span></span><a data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTravel_agency%26action%3Dedit%26section%3D4" title="Edit section: Licensing"><span data-dcnode-id="4206" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4200" instrument_node="">
</span><p data-dcnode-id="4165"><span data-dcnode-id="4199" instrument_node="">In many countries, all travel agencies are required to be licensed by the </span><a data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Air_Transport_Association" title="International Air Transport Association"><span data-dcnode-id="4198" instrument_node="">International Air Transport Association</span></a><span data-dcnode-id="4196" instrument_node=""> (IATA).</span><sup class="reference" data-dcnode-id="4193" id="cite_ref-28"><a data-dcnode-id="4194" href="#cite_note-28"><span data-dcnode-id="4195" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4192" instrument_node=""> Many are also bonded and represented by IATA, and, for those that issue air tickets, the </span><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_Travel_Organisers%2527_Licensing" title="Air Travel Organisers' Licensing"><span data-dcnode-id="4191" instrument_node="">Air Travel Organisers' Licensing</span></a><span data-dcnode-id="4189" instrument_node=""> (ATOL) in the United Kingdom, and the </span><a data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airlines_Reporting_Corporation" title="Airlines Reporting Corporation"><span data-dcnode-id="4188" instrument_node="">Airlines Reporting Corporation</span></a><span data-dcnode-id="4186" instrument_node=""> in the United States also serve those purposes.</span><sup class="reference" data-dcnode-id="4183" id="cite_ref-29"><a data-dcnode-id="4184" href="#cite_note-29"><span data-dcnode-id="4185" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4182" instrument_node=""> </span><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ABTA_%25E2%2580%2593_The_Travel_Association" title="ABTA – The Travel Association"><span data-dcnode-id="4181" instrument_node="">ABTA – The Travel Association</span></a><span data-dcnode-id="4179" instrument_node=""> the </span><a class="new" data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAssociation_of_Canadian_Travel_Agencies%26action%3Dedit%26redlink%3D1" title="Association of Canadian Travel Agencies (page does not exist)"><span data-dcnode-id="4178" instrument_node="">Association of Canadian Travel Agencies</span></a><span data-dcnode-id="4176" instrument_node=""> (ACTA) The </span><a data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Society_of_Travel_Advisors" title="American Society of Travel Advisors"><span data-dcnode-id="4175" instrument_node="">American Society of Travel Advisors</span></a><span data-dcnode-id="4173" instrument_node=""> (ASTA), represent travel agencies in the United Kingdom, Canada, and the United States respectively.</span><sup class="reference" data-dcnode-id="4170" id="cite_ref-30"><a data-dcnode-id="4171" href="#cite_note-30"><span data-dcnode-id="4172" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="4167" id="cite_ref-31"><a data-dcnode-id="4168" href="#cite_note-31"><span data-dcnode-id="4169" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4166" instrument_node="">
</span></p><span data-dcnode-id="4164" instrument_node="">
</span><h2 data-dcnode-id="4154"><span class="mw-headline" data-dcnode-id="4162" id="History"><span data-dcnode-id="4163" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="4155"><span class="mw-editsection-bracket" data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">[</span></span><a data-dcnode-id="4158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTravel_agency%26action%3Dedit%26section%3D5" title="Edit section: History"><span data-dcnode-id="4159" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4153" instrument_node="">
</span><p data-dcnode-id="4141"><span data-dcnode-id="4152" instrument_node="">In 1758, </span><a data-dcnode-id="4150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cox_%2526_Kings" title="Cox &amp; Kings"><span data-dcnode-id="4151" instrument_node="">Cox &amp; Kings</span></a><span data-dcnode-id="4149" instrument_node=""> became the first travel agency in modern history.</span><sup class="reference" data-dcnode-id="4146" id="cite_ref-32"><a data-dcnode-id="4147" href="#cite_note-32"><span data-dcnode-id="4148" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="4143" id="cite_ref-33"><a data-dcnode-id="4144" href="#cite_note-33"><span data-dcnode-id="4145" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4142" instrument_node="">
</span></p><p data-dcnode-id="4136"><span data-dcnode-id="4140" instrument_node="">In 1840, the </span><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viagens_Abreu" title="Viagens Abreu"><span data-dcnode-id="4139" instrument_node="">Abreu Agency</span></a><span data-dcnode-id="4137" instrument_node=""> was established in Porto by Bernardo Abreu, becoming the world's first agency to open its services to the public.
</span></p><span data-dcnode-id="4135" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4126"><div class="thumbinner" data-dcnode-id="4127" style="width:222px;"><a class="image" data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThomas_Cook_R.I.P._flowers_Enfield%2C_London.jpg"><img alt="" class="thumbimage" data-dcnode-id="4134" data-file-height="2753" data-file-width="3193" decoding="async" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Thomas_Cook_R.I.P._flowers_Enfield%252C_London.jpg/220px-Thomas_Cook_R.I.P._flowers_Enfield%252C_London.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Thomas_Cook_R.I.P._flowers_Enfield%2C_London.jpg/330px-Thomas_Cook_R.I.P._flowers_Enfield%2C_London.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/Thomas_Cook_R.I.P._flowers_Enfield%2C_London.jpg/440px-Thomas_Cook_R.I.P._flowers_Enfield%2C_London.jpg 2x" width="220"></a><span data-dcnode-id="4132" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4128"><div class="magnify" data-dcnode-id="4130"><a class="internal" data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThomas_Cook_R.I.P._flowers_Enfield%2C_London.jpg" title="Enlarge"></a></div><span data-dcnode-id="4129" instrument_node="">A Thomas Cook travel agency in the United Kingdom, which ceased operating in 2019.</span></div></div></div><span data-dcnode-id="4125" instrument_node="">
</span><p data-dcnode-id="4082"><span data-dcnode-id="4124" instrument_node="">In 1841, </span><a data-dcnode-id="4122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Cook" title="Thomas Cook"><span data-dcnode-id="4123" instrument_node="">Thomas Cook</span></a><span data-dcnode-id="4121" instrument_node="">, a </span><a class="mw-redirect" data-dcnode-id="4119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baptist" title="Baptist"><span data-dcnode-id="4120" instrument_node="">Baptist</span></a><span data-dcnode-id="4118" instrument_node=""> preacher who believed that alcohol was to blame for social problems, reached an agreement with the </span><a data-dcnode-id="4116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Midland_Railway" title="Midland Railway"><span data-dcnode-id="4117" instrument_node="">Midland Railway</span></a><span data-dcnode-id="4115" instrument_node=""> to organize the transportation of 500 members of his </span><a data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temperance_movement" title="Temperance movement"><span data-dcnode-id="4114" instrument_node="">temperance movement</span></a><span data-dcnode-id="4112" instrument_node=""> from the </span><a class="mw-redirect" data-dcnode-id="4110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leicester_Campbell_Street_railway_station" title="Leicester Campbell Street railway station"><span data-dcnode-id="4111" instrument_node="">Leicester Campbell Street railway station</span></a><span data-dcnode-id="4109" instrument_node=""> to a rally in </span><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Loughborough" title="Loughborough"><span data-dcnode-id="4108" instrument_node="">Loughborough</span></a><span data-dcnode-id="4106" instrument_node=""> in exchange for a commission.</span><sup class="reference" data-dcnode-id="4103" id="cite_ref-34"><a data-dcnode-id="4104" href="#cite_note-34"><span data-dcnode-id="4105" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="4100" id="cite_ref-35"><a data-dcnode-id="4101" href="#cite_note-35"><span data-dcnode-id="4102" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4099" instrument_node=""> He formed </span><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Cook_%2526_Son" title="Thomas Cook &amp; Son"><span data-dcnode-id="4098" instrument_node="">Thomas Cook &amp; Son</span></a><span data-dcnode-id="4096" instrument_node="">, which later became </span><a class="mw-redirect" data-dcnode-id="4094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Thomas_Cook_Group" title="The Thomas Cook Group"><span data-dcnode-id="4095" instrument_node="">The Thomas Cook Group</span></a><span data-dcnode-id="4093" instrument_node="">. It filed </span><a data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bankruptcy" title="Bankruptcy"><span data-dcnode-id="4092" instrument_node="">bankruptcy</span></a><span data-dcnode-id="4090" instrument_node=""> and underwent </span><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liquidation" title="Liquidation"><span data-dcnode-id="4089" instrument_node="">liquidation</span></a><span data-dcnode-id="4087" instrument_node=""> in 2019.</span><sup class="reference" data-dcnode-id="4084" id="cite_ref-36"><a data-dcnode-id="4085" href="#cite_note-36"><span data-dcnode-id="4086" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4083" instrument_node="">
</span></p><p data-dcnode-id="4073"><span data-dcnode-id="4081" instrument_node="">In 1871, </span><a data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dean_and_Dawson" title="Dean and Dawson"><span data-dcnode-id="4080" instrument_node="">Dean and Dawson</span></a><span data-dcnode-id="4078" instrument_node=""> was founded in the United Kingdom and in the 1950s, it was acquired by Thomas Cook.</span><sup class="reference" data-dcnode-id="4075" id="cite_ref-37"><a data-dcnode-id="4076" href="#cite_note-37"><span data-dcnode-id="4077" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4074" instrument_node="">
</span></p><p data-dcnode-id="4068"><span data-dcnode-id="4072" instrument_node="">In 1870, the </span><a data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polytechnic_Touring_Association" title="Polytechnic Touring Association"><span data-dcnode-id="4071" instrument_node="">Polytechnic Touring Association</span></a><span data-dcnode-id="4069" instrument_node=""> was founded in the United Kingdom.
</span></p><p data-dcnode-id="4059"><span data-dcnode-id="4067" instrument_node="">In 1887, Walter T. Brownell established Brownell Travel, the first travel agency in the United States, and led 10 travelers on a European tour setting sail from New York on the SS </span><i data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">Devonia</span></i><span data-dcnode-id="4064" instrument_node="">.</span><sup class="reference" data-dcnode-id="4061" id="cite_ref-38"><a data-dcnode-id="4062" href="#cite_note-38"><span data-dcnode-id="4063" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4060" instrument_node="">
</span></p><p data-dcnode-id="4053"><span data-dcnode-id="4058" instrument_node="">In 1895, Baldwins Travel was founded by Alfred K Baldwin, originally a printer, bookbinder and publisher in Tunbridge Wells. Baldwins begins selling railway tickets and helping friends to travel to Europe and beyond. News spreads and the former printers slowly build a strong side-line in travel at the back of the Baldwins Stationery shop at 27 Grosvenor Road.</span><sup class="reference" data-dcnode-id="4055" id="cite_ref-39"><a data-dcnode-id="4056" href="#cite_note-39"><span data-dcnode-id="4057" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4054" instrument_node="">
</span></p><p data-dcnode-id="4048"><span data-dcnode-id="4052" instrument_node="">Originally, travel agencies largely catered to middle and upper-class customers but they became more commonplace with the development of </span><a data-dcnode-id="4050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commercial_aviation" title="Commercial aviation"><span data-dcnode-id="4051" instrument_node="">commercial aviation</span></a><span data-dcnode-id="4049" instrument_node="">.
</span></p><p data-dcnode-id="4033"><span data-dcnode-id="4047" instrument_node="">In 1923, after being treated badly by a British travel agency, </span><a class="mw-redirect" data-dcnode-id="4045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/K._P._Chen" title="K. P. Chen"><span data-dcnode-id="4046" instrument_node="">K. P. Chen</span></a><span data-dcnode-id="4044" instrument_node=""> formed what became the </span><a data-dcnode-id="4042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China_Travel_Service" title="China Travel Service"><span data-dcnode-id="4043" instrument_node="">China Travel Service</span></a><span data-dcnode-id="4041" instrument_node="">, the first travel agency in </span><a data-dcnode-id="4039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="4040" instrument_node="">China</span></a><span data-dcnode-id="4038" instrument_node="">.</span><sup class="reference" data-dcnode-id="4035" id="cite_ref-40"><a data-dcnode-id="4036" href="#cite_note-40"><span data-dcnode-id="4037" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4034" instrument_node="">
</span></p><p data-dcnode-id="4015"><span data-dcnode-id="4032" instrument_node="">The industry suffered during </span><a data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="4031" instrument_node="">World War II</span></a><span data-dcnode-id="4029" instrument_node="">. However, the </span><a data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post%25E2%2580%2593World_War_II_economic_expansion" title="Post–World War II economic expansion"><span data-dcnode-id="4028" instrument_node="">Post–World War II economic expansion</span></a><span data-dcnode-id="4026" instrument_node=""> in mass-market </span><a data-dcnode-id="4024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Package_tour" title="Package tour"><span data-dcnode-id="4025" instrument_node="">package tours</span></a><span data-dcnode-id="4023" instrument_node=""> resulted in the proliferation of travel agencies catering to the </span><a data-dcnode-id="4021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_class" title="Working class"><span data-dcnode-id="4022" instrument_node="">working class</span></a><span data-dcnode-id="4020" instrument_node="">.</span><sup class="reference" data-dcnode-id="4017" id="cite_ref-41"><a data-dcnode-id="4018" href="#cite_note-41"><span data-dcnode-id="4019" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4016" instrument_node="">
</span></p><p data-dcnode-id="4006"><span data-dcnode-id="4014" instrument_node="">In 1905, Nippon Travel Agency became the first travel agency in </span><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="4013" instrument_node="">Japan</span></a><span data-dcnode-id="4011" instrument_node="">.</span><sup class="reference" data-dcnode-id="4008" id="cite_ref-42"><a data-dcnode-id="4009" href="#cite_note-42"><span data-dcnode-id="4010" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4007" instrument_node="">
</span></p><p data-dcnode-id="3994"><span data-dcnode-id="4005" instrument_node="">In 1929, </span><a data-dcnode-id="4003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intourist" title="Intourist"><span data-dcnode-id="4004" instrument_node="">Intourist</span></a><span data-dcnode-id="4002" instrument_node=""> was formed as the official state travel agency of the </span><a data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="4001" instrument_node="">Soviet Union</span></a><span data-dcnode-id="3999" instrument_node="">, with the goal of convincing outsiders to visit the country.</span><sup class="reference" data-dcnode-id="3996" id="cite_ref-43"><a data-dcnode-id="3997" href="#cite_note-43"><span data-dcnode-id="3998" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3995" instrument_node="">
</span></p><p data-dcnode-id="3982"><span data-dcnode-id="3993" instrument_node="">During the </span><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="3992" instrument_node="">Cold War</span></a><span data-dcnode-id="3990" instrument_node="">, travel agents were used by people from Western countries to travel behind the </span><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Curtain" title="Iron Curtain"><span data-dcnode-id="3989" instrument_node="">Iron Curtain</span></a><span data-dcnode-id="3987" instrument_node="">.</span><sup class="reference" data-dcnode-id="3984" id="cite_ref-44"><a data-dcnode-id="3985" href="#cite_note-44"><span data-dcnode-id="3986" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3983" instrument_node="">
</span></p><p data-dcnode-id="3974"><span data-dcnode-id="3981" instrument_node="">In 1951, the precursor to </span><a data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helloworld_Travel" title="Helloworld Travel"><span data-dcnode-id="3980" instrument_node="">Helloworld Travel</span></a><span data-dcnode-id="3978" instrument_node=""> became one of the first travel agencies in </span><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australia" title="Australia"><span data-dcnode-id="3977" instrument_node="">Australia</span></a><span data-dcnode-id="3975" instrument_node="">.
</span></p><p data-dcnode-id="3965"><span data-dcnode-id="3973" instrument_node="">In 1955, Henderson Travel Service became the first black-owned travel company and the first to take large groups of black tourists to Africa.</span><sup class="reference" data-dcnode-id="3970" id="cite_ref-45"><a data-dcnode-id="3971" href="#cite_note-45"><span data-dcnode-id="3972" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="3967" id="cite_ref-46"><a data-dcnode-id="3968" href="#cite_note-46"><span data-dcnode-id="3969" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3966" instrument_node="">
</span></p><span data-dcnode-id="3964" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3949"><div class="thumbinner" data-dcnode-id="3950" style="width:222px;"><a class="image" data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKeih%25C3%25A4smatkat_1972.jpg"><img alt="" class="thumbimage" data-dcnode-id="3963" data-file-height="2456" data-file-width="3484" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Keih%25C3%25A4smatkat_1972.jpg/220px-Keih%25C3%25A4smatkat_1972.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Keih%C3%A4smatkat_1972.jpg/330px-Keih%C3%A4smatkat_1972.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Keih%C3%A4smatkat_1972.jpg/440px-Keih%C3%A4smatkat_1972.jpg 2x" width="220"></a><span data-dcnode-id="3961" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3951"><div class="magnify" data-dcnode-id="3959"><a class="internal" data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKeih%25C3%25A4smatkat_1972.jpg" title="Enlarge"></a></div><span data-dcnode-id="3958" instrument_node="">A </span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keih%25C3%25A4smatkat" title="Keihäsmatkat"><span data-dcnode-id="3957" instrument_node="">Keihäsmatkat</span></a><span data-dcnode-id="3955" instrument_node=""> advertisement from </span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhodes" title="Rhodes"><span data-dcnode-id="3954" instrument_node="">Rhodes</span></a><span data-dcnode-id="3952" instrument_node=""> in 1971.</span></div></div></div><span data-dcnode-id="3948" instrument_node="">
</span><p data-dcnode-id="3936"><span data-dcnode-id="3947" instrument_node="">In the early 1980s, </span><a data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Airlines" title="American Airlines"><span data-dcnode-id="3946" instrument_node="">American Airlines</span></a><span data-dcnode-id="3944" instrument_node="">' </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sabre_%28computer_system%29" title="Sabre (computer system)"><span data-dcnode-id="3943" instrument_node="">Sabre</span></a><span data-dcnode-id="3941" instrument_node=""> unit created a direct-to-consumer booking tool for flights, hotels and cars called eAAsySabre.</span><sup class="reference" data-dcnode-id="3938" id="cite_ref-history_47-0"><a data-dcnode-id="3939" href="#cite_note-history-47"><span data-dcnode-id="3940" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3937" instrument_node="">
</span></p><p data-dcnode-id="3927"><span data-dcnode-id="3935" instrument_node="">In 1989, with the liberalization of travel for </span><a data-dcnode-id="3933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Korea" title="South Korea"><span data-dcnode-id="3934" instrument_node="">South Koreans</span></a><span data-dcnode-id="3932" instrument_node="">, Mode Tour became the first travel agency in the country.</span><sup class="reference" data-dcnode-id="3929" id="cite_ref-48"><a data-dcnode-id="3930" href="#cite_note-48"><span data-dcnode-id="3931" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3928" instrument_node="">
</span></p><p data-dcnode-id="3918"><span data-dcnode-id="3926" instrument_node="">In 1991, Hotel Reservations Network, the precursor of </span><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hotels.com" title="Hotels.com"><span data-dcnode-id="3925" instrument_node="">Hotels.com</span></a><span data-dcnode-id="3923" instrument_node="">, was founded. At first, hotels did not pay much in commissions.</span><sup class="reference" data-dcnode-id="3920" id="cite_ref-history_47-1"><a data-dcnode-id="3921" href="#cite_note-history-47"><span data-dcnode-id="3922" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3919" instrument_node="">
</span></p><p data-dcnode-id="3906"><span data-dcnode-id="3917" instrument_node="">With the advent of the </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="3916" instrument_node="">internet</span></a><span data-dcnode-id="3914" instrument_node="">, travel agencies migrated online and underwent </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disintermediation" title="Disintermediation"><span data-dcnode-id="3913" instrument_node="">disintermediation</span></a><span data-dcnode-id="3911" instrument_node=""> by the reduction in costs caused by removing layers from the package holiday distribution network.</span><sup class="reference" data-dcnode-id="3908" id="cite_ref-49"><a data-dcnode-id="3909" href="#cite_note-49"><span data-dcnode-id="3910" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3907" instrument_node="">
</span></p><p data-dcnode-id="3900"><span data-dcnode-id="3905" instrument_node="">In 1994, Travelweb.com launched as the first online directory of hotels.</span><sup class="reference" data-dcnode-id="3902" id="cite_ref-25years_50-0"><a data-dcnode-id="3903" href="#cite_note-25years-50"><span data-dcnode-id="3904" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3901" instrument_node="">
</span></p><p data-dcnode-id="3894"><span data-dcnode-id="3899" instrument_node="">In 1995, Internet Travel Network sold the first airline ticket via the World Wide Web.</span><sup class="reference" data-dcnode-id="3896" id="cite_ref-25years_50-1"><a data-dcnode-id="3897" href="#cite_note-25years-50"><span data-dcnode-id="3898" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3895" instrument_node="">
</span></p><p data-dcnode-id="3882"><span data-dcnode-id="3893" instrument_node="">In October 1996, </span><a class="mw-redirect" data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expedia.com" title="Expedia.com"><span data-dcnode-id="3892" instrument_node="">Expedia.com</span></a><span data-dcnode-id="3890" instrument_node="">, funded with hundreds of millions of dollars by </span><a data-dcnode-id="3888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft" title="Microsoft"><span data-dcnode-id="3889" instrument_node="">Microsoft</span></a><span data-dcnode-id="3887" instrument_node=""> launched as the first large online travel agency.</span><sup class="reference" data-dcnode-id="3884" id="cite_ref-history_47-2"><a data-dcnode-id="3885" href="#cite_note-history-47"><span data-dcnode-id="3886" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3883" instrument_node="">
</span></p><p data-dcnode-id="3873"><span data-dcnode-id="3881" instrument_node="">At the same time, </span><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cheapflights" title="Cheapflights"><span data-dcnode-id="3880" instrument_node="">Cheapflights</span></a><span data-dcnode-id="3878" instrument_node=""> started as a listing service for flight deals from consolidators.</span><sup class="reference" data-dcnode-id="3875" id="cite_ref-history_47-3"><a data-dcnode-id="3876" href="#cite_note-history-47"><span data-dcnode-id="3877" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3874" instrument_node="">
</span></p><p data-dcnode-id="3864"><span data-dcnode-id="3872" instrument_node="">In 1998, </span><a data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lastminute.com" title="Lastminute.com"><span data-dcnode-id="3871" instrument_node="">Lastminute.com</span></a><span data-dcnode-id="3869" instrument_node=""> was founded in the United Kingdom.</span><sup class="reference" data-dcnode-id="3866" id="cite_ref-25years_50-2"><a data-dcnode-id="3867" href="#cite_note-25years-50"><span data-dcnode-id="3868" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3865" instrument_node="">
</span></p><p data-dcnode-id="3845"><span data-dcnode-id="3863" instrument_node="">In 1999, European airlines began eliminating or reducing commissions,</span><sup class="reference" data-dcnode-id="3860" id="cite_ref-51"><a data-dcnode-id="3861" href="#cite_note-51"><span data-dcnode-id="3862" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3859" instrument_node=""> while </span><a data-dcnode-id="3857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Singapore_Airlines" title="Singapore Airlines"><span data-dcnode-id="3858" instrument_node="">Singapore Airlines</span></a><span data-dcnode-id="3856" instrument_node=""> did so in parts of </span><a data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asia" title="Asia"><span data-dcnode-id="3855" instrument_node="">Asia</span></a><span data-dcnode-id="3853" instrument_node="">. In 2002, several airlines in the United States did the same, which led to an unsuccessful lawsuit alleging collusion among the airlines, that was decided on appeal in 2009.</span><sup class="reference" data-dcnode-id="3850" id="cite_ref-52"><a data-dcnode-id="3851" href="#cite_note-52"><span data-dcnode-id="3852" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="3847" id="cite_ref-53"><a data-dcnode-id="3848" href="#cite_note-53"><span data-dcnode-id="3849" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3846" instrument_node="">
</span></p><p data-dcnode-id="3833"><span data-dcnode-id="3844" instrument_node="">In 2007, the launch of the </span><a data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IPhone" title="IPhone"><span data-dcnode-id="3843" instrument_node="">iPhone</span></a><span data-dcnode-id="3841" instrument_node=""> and related </span><a data-dcnode-id="3839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_app" title="Mobile app"><span data-dcnode-id="3840" instrument_node="">mobile apps</span></a><span data-dcnode-id="3838" instrument_node=""> increased travel bookings made online.</span><sup class="reference" data-dcnode-id="3835" id="cite_ref-25years_50-3"><a data-dcnode-id="3836" href="#cite_note-25years-50"><span data-dcnode-id="3837" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3834" instrument_node="">
</span></p><p data-dcnode-id="3821"><span data-dcnode-id="3832" instrument_node="">In 2008, the launch of </span><a data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airbnb" title="Airbnb"><span data-dcnode-id="3831" instrument_node="">Airbnb</span></a><span data-dcnode-id="3829" instrument_node=""> created an </span><a data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Online_marketplace" title="Online marketplace"><span data-dcnode-id="3828" instrument_node="">online marketplace</span></a><span data-dcnode-id="3826" instrument_node=""> for spare bedrooms and apartments.</span><sup class="reference" data-dcnode-id="3823" id="cite_ref-25years_50-4"><a data-dcnode-id="3824" href="#cite_note-25years-50"><span data-dcnode-id="3825" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3822" instrument_node="">
</span></p><p data-dcnode-id="3812"><span data-dcnode-id="3820" instrument_node="">In 2011, the launch of </span><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HotelTonight" title="HotelTonight"><span data-dcnode-id="3819" instrument_node="">HotelTonight</span></a><span data-dcnode-id="3817" instrument_node=""> highlighted instantaneous same-day hotel room booking.</span><sup class="reference" data-dcnode-id="3814" id="cite_ref-25years_50-5"><a data-dcnode-id="3815" href="#cite_note-25years-50"><span data-dcnode-id="3816" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3813" instrument_node="">
</span></p><p data-dcnode-id="3806"><span data-dcnode-id="3811" instrument_node="">In 2021, travel agency Baldwins Travel Group, which was founded in 1895 was bought by business group</span><sup class="reference" data-dcnode-id="3808" id="cite_ref-54"><a data-dcnode-id="3809" href="#cite_note-54"><span data-dcnode-id="3810" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3807" instrument_node=""> Inc &amp; Co.
</span></p><span data-dcnode-id="3805" instrument_node="">
</span><h2 data-dcnode-id="3795"><span class="mw-headline" data-dcnode-id="3803" id="Outlook"><span data-dcnode-id="3804" instrument_node="">Outlook</span></span><span class="mw-editsection" data-dcnode-id="3796"><span class="mw-editsection-bracket" data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">[</span></span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTravel_agency%26action%3Dedit%26section%3D6" title="Edit section: Outlook"><span data-dcnode-id="3800" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3794" instrument_node="">
</span><p data-dcnode-id="3782"><span data-dcnode-id="3793" instrument_node="">According to the United States </span><a data-dcnode-id="3791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bureau_of_Labor_Statistics" title="Bureau of Labor Statistics"><span data-dcnode-id="3792" instrument_node="">Bureau of Labor Statistics</span></a><span data-dcnode-id="3790" instrument_node="">, in 2019, there were 82,000 people who worked as travel agents for their </span><a data-dcnode-id="3788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full-time_job" title="Full-time job"><span data-dcnode-id="3789" instrument_node="">full-time jobs</span></a><span data-dcnode-id="3787" instrument_node="">. That number is projected to decrease by 26% over the next 10 years. However, job prospects should be best for travel agents who specialize in specific destinations or particular types of travelers. In 2019, the median salary was $40,660 per year, compared to the median annual wage for all workers which was $39,810.</span><sup class="reference" data-dcnode-id="3784" id="cite_ref-55"><a data-dcnode-id="3785" href="#cite_note-55"><span data-dcnode-id="3786" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3783" instrument_node="">
</span></p><p data-dcnode-id="3773"><span data-dcnode-id="3781" instrument_node="">Several reports show that the number of people using travel agents to book travel has been increasing.</span><sup class="reference" data-dcnode-id="3778" id="cite_ref-56"><a data-dcnode-id="3779" href="#cite_note-56"><span data-dcnode-id="3780" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="3775" id="cite_ref-57"><a data-dcnode-id="3776" href="#cite_note-57"><span data-dcnode-id="3777" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3774" instrument_node="">
</span></p><span data-dcnode-id="3772" instrument_node="">
