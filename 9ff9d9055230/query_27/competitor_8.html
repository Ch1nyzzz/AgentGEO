</span><article class="article" data-dcnode-id="1182"><span data-dcnode-id="3606" instrument_node="">
</span><p class="fulltext" data-dcnode-id="3605"></p><div class="hlFld-Abstract" data-dcnode-id="3595"><p class="fulltext" data-dcnode-id="3604"></p><div class="sectionInfo abstractSectionHeading" data-dcnode-id="3601"><h2 class="section-heading-2" data-dcnode-id="3602" id="abstract"><span data-dcnode-id="3603" instrument_node="">Abstract</span></h2></div><div class="abstractSection abstractInFull" data-dcnode-id="3596"><span data-dcnode-id="3600" instrument_node=""> </span><p data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">The widely touted concept of the ‘Beijing Consensus’ (BC) suggests that China's economic success violates conventional theories of development and offers developing countries an alternative vision to the Washington Consensus (WC). Although ambitious, the original conception of the BC is not up to the task of being a worthwhile competitor to the alternative model from which its name was coined, not because of the WC's apparent worthiness, but rather because the BC is a misguided and inaccurate summary of China's actual reform experience. It not only gets the empirical facts wrong about China, it also disregards the similarities and differences China's experience shares with other countries, and it distorts China's place in international politics. In spite of these weaknesses, the BC is nevertheless a useful touchstone to consider the evolution of developmental paradigms, compare China's experience with that of others, identify the most distinctive features of China's experience, and evaluate its significance for the development prospects of other countries and for international relations.</span></p><span data-dcnode-id="3597" instrument_node=""> </span></div></div><div class="pb-dropzone" data-dcnode-id="3585" data-pb-dropzone="contentNavigationDropZoneAbs"><div class="widget gql-content-navigation none widget-none" data-dcnode-id="3586" id="d28d5637-3950-463d-a4f7-bc92bc490fff"><span data-dcnode-id="3594" instrument_node="">
</span><div class="wrapped" data-dcnode-id="3588"><span data-dcnode-id="3593" instrument_node="">
</span><div class="widget-body body body-none" data-dcnode-id="3590"><div class="ajaxWidget" data-ajax-observe="true" data-ajax-widget="gql-content-navigation" data-ajax-widget-id="d28d5637-3950-463d-a4f7-bc92bc490fff" data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">
</span></div></div><span data-dcnode-id="3589" instrument_node="">
</span></div><span data-dcnode-id="3587" instrument_node="">
</span></div></div><div class="hlFld-Fulltext" data-dcnode-id="2215"><div class="NLM_sec NLM_sec-type_intro NLM_sec_level_1" data-dcnode-id="3525"><span data-dcnode-id="3584" instrument_node=""> </span><h2 class="section-heading-2" data-dcnode-id="3583" id="_i1"></h2><span data-dcnode-id="3582" instrument_node=""> </span><p data-dcnode-id="3554"><span data-dcnode-id="3581" instrument_node="">China's phenomenal economic success has given rise to a debate about the reasons for its achievements and the implications for broader debates about what constitutes the most appropriate development strategy for developing countries generally. Some believe that the broad liberalization of the last 30 years deserves the credit, which would be consistent with conventional explanations for economic development. Others suggest that just as significant as liberalization has been the measured pace and distinctive sequencing of reforms developed and carried out by a state with strong governing capabilities. They believe China's success challenges conventional theories about the most appropriate development strategies and the role of the state. One observer, Joshua Cooper Ramo, labels what he sees as China's unique approach as the ‘Beijing Consensus’ (BC, </span><i data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">beijing gongshi</span></i><span data-dcnode-id="3578" instrument_node="">), thereby distinguishing it from the ‘Washington Consensus’ (WC, </span><i data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">huashengdun gongshi</span></i><span data-dcnode-id="3575" instrument_node="">), which connotes a more conventional development approach.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3556"><a data-dcnode-id="3573" data-reflink="fn" data-rid="FN0001" href="#"><span data-dcnode-id="3574" instrument_node="">1</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3557"><span class="ref-close" data-dcnode-id="3572" tabindex="0"></span><span data-dcnode-id="3571" instrument_node=""> </span><sup data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node=""> 1.</span></sup><span data-dcnode-id="3568" instrument_node=""> Joshua Cooper Ramo, </span><i data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">The Beijing Consensus: Notes on the New Physics of Chinese Power</span></i><span data-dcnode-id="3565" instrument_node=""> (London: Foreign Policy Centre, 2004), available at: </span><a class="ext-link" data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fpc.org.uk/" target="_blank"><span data-dcnode-id="3564" instrument_node="">http://www.fpc.org.uk</span></a><span data-dcnode-id="3562" instrument_node="">.</span><a data-dcnode-id="3561" id="FN0065"></a><span data-dcnode-id="3560" instrument_node=""> </span><a class="frontnotes" data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3555" instrument_node=""> </span></p><span data-dcnode-id="3553" instrument_node=""> </span><p data-dcnode-id="3533"><span data-dcnode-id="3552" instrument_node="">Ramo's argument, which he detailed in an extended essay in 2004, has touched off a wide debate among scholars and policymakers in China as well as scholars elsewhere.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3535"><a data-dcnode-id="3550" data-reflink="fn" data-rid="FN0002" href="#"><span data-dcnode-id="3551" instrument_node="">2</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3536"><span class="ref-close" data-dcnode-id="3549" tabindex="0"></span><span data-dcnode-id="3548" instrument_node=""> </span><sup data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node=""> 2.</span></sup><span data-dcnode-id="3545" instrument_node=""> Huang Ping and Cui Zhiyuan, eds, </span><i data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Zhongguo yu quanqiu hua: huashengdun gongshi haishi beijing gongshi</span></i><span data-dcnode-id="3542" instrument_node=""> [</span><i data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">China and Globalization: Washington Consensus or Beijing Consensus?</span></i><span data-dcnode-id="3539" instrument_node="">] (Beijing: Social Science Academic Press, August 2005).</span><a class="frontnotes" data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3534" instrument_node=""> In subsequent years, the power of this alternative vision has seemed to grow, particularly in the wake of the global financial crisis, which apparently laid bare the weaknesses of market fundamentalism and highlighted the importance of government regulation. Despite this turn of events, the original conception of the BC is not up to the task of being a worthwhile competitor to the alternative model from which its name was coined, not because of the WC's apparent worthiness, but rather because Ramo's Beijing Consensus is a misguided and inaccurate summary of China's actual reform experience. It not only gets the empirical facts wrong about China, it also disregards the similarities and differences China's experience shares with other countries, and it distorts China's place in international politics. </span></p><span data-dcnode-id="3532" instrument_node=""> </span><p data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">Yet in spite of these weaknesses, the Beijing Consensus is nevertheless a useful touchstone to consider the evolution of developmental paradigms, compare China's experience with that of others, identify the most distinctive features of China's experience, and evaluate its significance for the development prospects of other countries and for international relations. The BC is at once an unpleasant distraction and a useful tool to consider the true import of China's development experience.</span></p><span data-dcnode-id="3529" instrument_node=""> </span><p data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">The article begins with a summary of the Washington Consensus and the debate around it in the wake of the problematic economic performance of Latin America and other regions in the 1990s. To its supporters, this disappointing record showed that the WC was misunderstood and needed to be supplemented. To its critics, the WC needed to be replaced in favor of other approaches, such as those adopted in East Asia where economic success has been accompanied by extensive government intervention in the economy. The article then turns to a discussion of the Beijing Consensus, both in its original form and how it has been interpreted and critiqued in China. The BC is based on a misguided analysis of China's political economy. Although one might expect Chinese commentators to welcome such a laudatory label, ironically, opinion in China has been largely critical of the BC. Given the problems with the BC, we then consider another potentially more useful framework for distinguishing China's record, the China Model. In the conclusion, we discuss the implications of the BC and the China Model for the debate about economic development strategies of individual countries and policies of international institutions. The lessons taken from China may be less revolutionary than the advocates of the BC or China Model imagined.</span></p><span data-dcnode-id="3526" instrument_node=""> </span></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="3214" id="S001"><span data-dcnode-id="3524" instrument_node=""> </span><h2 class="section-heading-2" data-dcnode-id="3522" id="_i2"><span data-dcnode-id="3523" instrument_node="">The Washington Consensus</span></h2><span data-dcnode-id="3521" instrument_node=""> </span><p data-dcnode-id="3486"><span data-dcnode-id="3520" instrument_node="">The WC is the invention of John Williamson, an economist at the Peterson Institute of International Economics in Washington, DC. In 1989 he hosted a conference to draw attention to economic reforms that had been carried out in Latin America over the last decade and to identify areas in need of further reform. In his own paper, which was published in a volume soon after, he included a list of ten policies he ‘thought more or less everyone in Washington would agree were needed more or less everywhere in Latin America’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3503"><a data-dcnode-id="3518" data-reflink="fn" data-rid="FN0003" href="#"><span data-dcnode-id="3519" instrument_node="">3</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3504"><span class="ref-close" data-dcnode-id="3517" tabindex="0"></span><span data-dcnode-id="3516" instrument_node=""> </span><sup data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node=""> 3.</span></sup><span data-dcnode-id="3513" instrument_node=""> John Williamson, ‘What Washington means by policy reform’, in John Williamson, ed., </span><i data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">Latin American Adjustment: How Much Has Happened?</span></i><span data-dcnode-id="3510" instrument_node=""> (Washington, DC: Institute for International Economics, 1990); and John Williamson, ‘A short history of the Washington Consensus’, in Narcis Serra and Joseph E. Stiglitz, eds, </span><i data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">The Washington Consensus Reconsidered: Towards a New Global Governance</span></i><span data-dcnode-id="3507" instrument_node=""> (Oxford: Oxford University Press, 2008), pp. 14–30.</span><a class="frontnotes" data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3502" instrument_node=""> Hence, the name, ‘the Washington Consensus’. The list (see Table </span><button class="ref showTableEventRef" data-dcnode-id="3500" data-id="T0001"><span data-dcnode-id="3501" instrument_node="">1</span></button><span data-dcnode-id="3499" instrument_node="">) was not meant as a criticism of Latin America, nor was it an effort to preach or apply pressure. He believed these reforms were so widely recognized as correct, he equated them with ‘motherhood and apple pie’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3488"><a data-dcnode-id="3497" data-reflink="fn" data-rid="FN0004" href="#"><span data-dcnode-id="3498" instrument_node="">4</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3489"><span class="ref-close" data-dcnode-id="3496" tabindex="0"></span><span data-dcnode-id="3495" instrument_node=""> </span><sup data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node=""> 4.</span></sup><span data-dcnode-id="3492" instrument_node=""> John Williamson, ‘Did the Washington Consensus fail?’, Outline of speech at the Center for Strategic &amp; International Studies, Washington, DC, 6 November 2002.</span><a class="frontnotes" data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3487" instrument_node=""> </span></p><span data-dcnode-id="3485" instrument_node=""> </span><div class="tableViewerArticleInfo hidden" data-dcnode-id="3464"><span class="figViewerTitle" data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">The Myth of the Beijing Consensus</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="3473"><div class="authorsHeading" data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="3474"><a class="entryAuthor" data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DKennedy%252C%2BScott"><span class="hlFld-ContribAuthor" data-dcnode-id="3480"></span></a><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Kennedy%252C%2BScott"><span class="NLM_given-names" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">Scott</span></span><span data-dcnode-id="3476" instrument_node=""> Kennedy</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="3465"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="3470"><a data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10670561003666087"><span data-dcnode-id="3472" instrument_node="">https://doi.org/10.1080/10670561003666087</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="3466"><h6 data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Published online:</span></h6><span data-dcnode-id="3467" instrument_node="">28 April 2010</span></div></div></div><div class="tableView" data-dcnode-id="3451"><div class="tableCaption" data-dcnode-id="3457"><div class="short-legend" data-dcnode-id="3458"><h3 data-dcnode-id="3459"><span data-dcnode-id="3463" instrument_node=""> </span><b data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">Table 1. The Washington Consensus (1989)</span></b><span data-dcnode-id="3460" instrument_node=""> </span></h3></div></div><div class="tableDownloadOption" data-dcnode-id="3452" data-hascsvlnk="true" id="T0001-table-wrapper"><a class="downloadButton btn btn-sm" data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/downloadTable%3Fid%3DT0001%26doi%3D10.1080%252F10670561003666087%26downloadType%3DCSV" role="button"><span data-dcnode-id="3456" instrument_node="">
Download CSV</span></a><a class="downloadButton btn btn-sm displaySizeTable" data-dcnode-id="3453" data-id="T0001" href="#" role="button"><span data-dcnode-id="3454" instrument_node="">Display Table</span></a></div></div><span data-dcnode-id="3450" instrument_node=""> </span><p data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">In the years after the original WC was publicized, Williamson was forced to qualify his original statement. First, he recognized that he had overstated the existence of a consensus on two points. Rather than agreement about the benefits of a competitive exchange rate (#5), there was growing support in the US for a ‘two-corner’ policy option in which a country chooses to either have a fully fixed or a freely floating exchange rate. And he admitted that there was wide disagreement in Washington about how fast countries should liberalize their foreign trade regimes (#6).</span></p><span data-dcnode-id="3447" instrument_node=""> </span><p data-dcnode-id="3430"><span data-dcnode-id="3446" instrument_node="">Williamson also came to appreciate that the WC had been subject to misinterpretation. At the most specific level, he emphasized that point #7 (liberalize foreign direct investment) intentionally did not include liberalization of the capital account because there was never a consensus on that question. Deregulation (#9) was only meant to apply to reducing barriers to entry and exit of companies into markets, and was not meant to dissuade countries from having regulations to protect people's safety and the environment. Nor did it imply that governments could not regulate the prices of public goods such as utilities. And the focus on property rights (#10) was originally meant to provide the informal sector with the ability to gain such rights, as has been detailed by de Soto.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3432"><a data-dcnode-id="3444" data-reflink="fn" data-rid="FN0005" href="#"><span data-dcnode-id="3445" instrument_node="">5</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3433"><span class="ref-close" data-dcnode-id="3443" tabindex="0"></span><span data-dcnode-id="3442" instrument_node=""> </span><sup data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node=""> 5.</span></sup><span data-dcnode-id="3439" instrument_node=""> Hernando de Soto, </span><i data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">The Mystery of Capital: Why Capitalism Triumphs in the West and Fails Everywhere Else</span></i><span data-dcnode-id="3436" instrument_node=""> (London: Black Swan, 2000).</span><a class="frontnotes" data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3431" instrument_node=""> </span></p><span data-dcnode-id="3429" instrument_node=""> </span><p data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">More importantly, Williamson has had a harder time fighting the impression that the WC is embodied in the views and policy prescriptions of the Bretton Woods institutions—the World Bank, the International Monetary Fund, and the World Trade Organization. The former two are renowned for conditioning their assistance on recipients' adherence to policies reminiscent of the WC. In the 1990s, the IMF pressed recipients to open their capital account, including permitting unimpeded portfolio investment. However, Williamson points out that the WC did not include capital account openness across the board because many believe that premature opening can lead to a financial crisis, as occurred in East Asia, Russia, and Latin America in the late 1990s. Since there was not (and is not) a consensus on this point, it by definition could not be included in the WC.</span></p><span data-dcnode-id="3426" instrument_node=""> </span><p data-dcnode-id="3376"><span data-dcnode-id="3425" instrument_node="">Williamson, though, is most upset that the WC is often conflated with the economic ideology of neoliberalism. Williamson likes to point out that he and a famous critic of the WC, Joseph Stiglitz, actually agree on the substance of what makes good economic policies, but that Stiglitz has mistaken the WC for the policies of the IMF and neoliberal ideology.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3402"><a data-dcnode-id="3423" data-reflink="fn" data-rid="FN0006" href="#"><span data-dcnode-id="3424" instrument_node="">6</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3403"><span class="ref-close" data-dcnode-id="3422" tabindex="0"></span><span data-dcnode-id="3421" instrument_node=""> </span><sup data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node=""> 6.</span></sup><span data-dcnode-id="3418" instrument_node=""> For two of his critiques, see Joseph Stiglitz, </span><i data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Globalization and Its Discontents</span></i><span data-dcnode-id="3415" instrument_node=""> (New York: W. W. Norton, 2002); and Serra and Stiglitz, </span><i data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">The Washington Consensus Reconsidered</span></i><span data-dcnode-id="3412" instrument_node="">. For others who have equated the WC and neoliberalism, see Robert Gilpin, </span><i data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Global Political Economy: Understanding the International Economic Order</span></i><span data-dcnode-id="3409" instrument_node=""> (Princeton, NJ: Princeton University Press, 2001); and Charles Gore, ‘The rise and fall of the Washington Consensus as a paradigm for developing countries’, in C. Roe Goddard, Patrick Cronin and Kishore C. Dash, eds, </span><i data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">International Political Economy: State–Market Relations in a Changing Global Order</span></i><span data-dcnode-id="3406" instrument_node="">, 2nd edn (Boulder, CO: Lynne Rienner, 2003), pp. 317–340.</span><a class="frontnotes" data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3401" instrument_node=""> This school of thought can be traced back to Adam Smith in the eighteenth century and through the free-market Mont Pelerin Society since the end of World War II. In the 1990s it was most closely associated with the policies of Margaret Thatcher in Great Britain and Ronald Reagan in the United States.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3390"><a data-dcnode-id="3399" data-reflink="fn" data-rid="FN0007" href="#"><span data-dcnode-id="3400" instrument_node="">7</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3391"><span class="ref-close" data-dcnode-id="3398" tabindex="0"></span><span data-dcnode-id="3397" instrument_node=""> </span><sup data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node=""> 7.</span></sup><span data-dcnode-id="3394" instrument_node=""> The Mont Pelerin Society was founded in 1947 in the Swiss resort of the same name by Friedrich Hayek and other free-market intellectuals to promote classical liberalism.</span><a class="frontnotes" data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3389" instrument_node=""> However, Williamson intentionally left out of the WC several key elements of a neoliberal policy framework, including monetarism, supply-side economics, and a minimalist state that did not provide welfare or address questions of income distribution. ‘If a critic chooses to use the third concept’, he wrote, ‘then surely he should say that he is talking about a concept of the Washington Consensus that has never commanded consensus in Washington’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3378"><a data-dcnode-id="3387" data-reflink="fn" data-rid="FN0008" href="#"><span data-dcnode-id="3388" instrument_node="">8</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3379"><span class="ref-close" data-dcnode-id="3386" tabindex="0"></span><span data-dcnode-id="3385" instrument_node=""> </span><sup data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node=""> 8.</span></sup><span data-dcnode-id="3382" instrument_node=""> Williamson, ‘A short history of the Washington Consensus’.</span><a class="frontnotes" data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3377" instrument_node=""> </span></p><span data-dcnode-id="3375" instrument_node=""> </span><p data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">The misunderstanding about the meaning of the WC is closely tied to differing judgments about the performance of countries who adopted its tenets. In the wake of the apparent failure of the WC to deliver sustained growth in Latin America, Africa, and the former Soviet bloc, the WC came under severe criticism. In response, Williamson went well beyond defending the original list. First, he clarified certain elements. He stressed that although privatization of the state-owned sector was necessary to promote development, how it is carried is equally important, which was revealed in the corrupt process that unfolded in several central European countries.</span></p><span data-dcnode-id="3372" instrument_node=""> </span><p data-dcnode-id="3358"><span data-dcnode-id="3371" instrument_node="">Second, he and others expanded their policy prescriptions in light of both failures and successes of the 1990s. He suggested that the original call to liberalize interest rates (#4) should have also included a call for broader domestic financial liberalization. He says there is also a growing consensus in support of liberalized labor markets and the adoption of crisis avoidance mechanisms, such as measures to reduce swings in the business cycle and curbing foreign borrowing by corporations. He also suggests the adoption of focused industrial policies that support the maturation of ‘national innovation systems’ through education, diffusion of technology information, funding of pre-competitive research, provision of R&amp;D tax incentives, encouragement of venture capital, and support for industrial clusters.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3360"><a data-dcnode-id="3369" data-reflink="fn" data-rid="FN0009" href="#"><span data-dcnode-id="3370" instrument_node="">9</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3361"><span class="ref-close" data-dcnode-id="3368" tabindex="0"></span><span data-dcnode-id="3367" instrument_node=""> </span><sup data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node=""> 9.</span></sup><span data-dcnode-id="3364" instrument_node=""> Williamson, ‘A short history of the Washington Consensus’, p. 27.</span><a class="frontnotes" data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3359" instrument_node=""> There is also agreement, he holds, for policies that target reducing inequality through progressive taxation. </span></p><span data-dcnode-id="3357" instrument_node=""> </span><p data-dcnode-id="3340"><span data-dcnode-id="3356" instrument_node="">The most significant supplement to the WC he has added is to agree with others that the policies of the WC have the best opportunity to succeed in the context of strengthened political institutions. What is often called the WC's ‘second generation’ reforms include a strong judiciary, efficient civil service, and effective prudential financial supervision, an independent central bank, an anti-corruption agency, and a social safety net.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3342"><a data-dcnode-id="3354" data-reflink="fn" data-rid="FN0010" href="#"><span data-dcnode-id="3355" instrument_node="">10</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3343"><span class="ref-close" data-dcnode-id="3353" tabindex="0"></span><span data-dcnode-id="3352" instrument_node=""> </span><sup data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">10.</span></sup><span data-dcnode-id="3349" instrument_node=""> John Williamson, ‘After the Washington Consensus: Latin American growth and sustainable development’, Keynote speech at the </span><i data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Seminar on Latin American Financing and the Role of Development Banks</span></i><span data-dcnode-id="3346" instrument_node="">, IDB, BDMG, and ALIDE, Belo Horizonte, Brazil, 30–31 March 2006.</span><a class="frontnotes" data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3341" instrument_node=""> Williamson does not specifically include democratization as a requirement, but the institutions he does identify in order to generate good governance could be interpreted to be more consistent with a democratic system. </span></p><span data-dcnode-id="3339" instrument_node=""> </span><p data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">And third, Williamson stresses that the WC should not be seen as an unbending ideology. If it was meant as dogma, then ‘hardly anyone who cares about development would want to defend it’. This means both the need to adapt its elements to local circumstances and to recognize that other policies beyond the WC may be necessary to generate sustained growth. Hence, he writes,</span></p><div class="quote" data-dcnode-id="3320"><span data-dcnode-id="3336" instrument_node=""> </span><p data-dcnode-id="3322"><span data-dcnode-id="3335" instrument_node="">There will always be other things that matter besides those included in any attempt to lay out a general set of policy guidelines, and for a policymaker to imagine that s/he can stop thinking and simply follow a set of policies that someone else has concocted is irresponsible.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3324"><a data-dcnode-id="3333" data-reflink="fn" data-rid="FN0011" href="#"><span data-dcnode-id="3334" instrument_node="">11</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3325"><span class="ref-close" data-dcnode-id="3332" tabindex="0"></span><span data-dcnode-id="3331" instrument_node=""> </span><sup data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">11.</span></sup><span data-dcnode-id="3328" instrument_node=""> Williamson, ‘Did the Washington Consensus fail?’.</span><a class="frontnotes" data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3323" instrument_node=""> </span></p><span data-dcnode-id="3321" instrument_node=""> </span></div><span data-dcnode-id="3319" instrument_node=""> </span><p data-dcnode-id="3318"></p><span data-dcnode-id="3317" instrument_node=""> </span><p data-dcnode-id="3300"><span data-dcnode-id="3316" instrument_node="">In September 2004, Williamson joined 27 other economists, including Stiglitz, in issuing the ‘Barcelona Development Agenda’, which carried the same warning: ‘Encouraging developing nations to copy mechanically the institutions of rich countries—as international financial institutions tend to do—is not guaranteed to yield results, and can do more harm than good’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3302"><a data-dcnode-id="3314" data-reflink="fn" data-rid="FN0012" href="#"><span data-dcnode-id="3315" instrument_node="">12</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3303"><span class="ref-close" data-dcnode-id="3313" tabindex="0"></span><span data-dcnode-id="3312" instrument_node=""> </span><sup data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">12.</span></sup><span data-dcnode-id="3309" instrument_node=""> Serra and Stiglitz, </span><i data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">The Washington Consensus Reconsidered</span></i><span data-dcnode-id="3306" instrument_node="">, p. 58.</span><a class="frontnotes" data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3301" instrument_node=""> </span></p><span data-dcnode-id="3299" instrument_node=""> </span><p data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">Williamson believes that his effort to clarify, supplement, and provide flexibility to the WC is in no way a repudiation of the original list and its underlying message. He suggests that earlier misunderstandings of the WC and recent experience require policymakers to be more careful in how economic reforms that support the WC are carried out.</span></p><span data-dcnode-id="3296" instrument_node=""> </span><p data-dcnode-id="3264"><span data-dcnode-id="3295" instrument_node="">Despite the best efforts of Williamson and his allies to rescue the WC, there is no doubt that the WC ‘brand’ has come under withering criticism.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3281"><a data-dcnode-id="3293" data-reflink="fn" data-rid="FN0013" href="#"><span data-dcnode-id="3294" instrument_node="">13</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3282"><span class="ref-close" data-dcnode-id="3292" tabindex="0"></span><span data-dcnode-id="3291" instrument_node=""> </span><sup data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">13.</span></sup><span data-dcnode-id="3288" instrument_node=""> Also see Moises Naím, ‘The Washington Consensus: a damaged brand’, </span><i data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Financial Times</span></i><span data-dcnode-id="3285" instrument_node="">, (28 October 2002).</span><a class="frontnotes" data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3280" instrument_node=""> Although Williamson was careful to focus on the list (and its later elaborations), the WC has been interpreted to mean much more. The end of the Cold War and Fukuyama's ‘end of history’ thesis made democracy and free markets appear as the unquestionable twin tools of modernization. The IMF's conditionality and the stagnation of Japan reinforced that sense. Problems in implementation of economic liberalization and reform became too obvious to overlook as unexpected potholes on the path to the promised land emerged. Critics charge that the revisions to the original WC, particularly the institutional requirements, do not reflect a more mature consensus, but a desperate grasping for new alternatives. Moreover, these various elements raise the bar to unrealistic levels for any country seeking to develop. As Naím puts it, ‘The paradox is that any country capable of meeting such stringent requirements is already a developed country’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3266"><a data-dcnode-id="3278" data-reflink="fn" data-rid="FN0014" href="#"><span data-dcnode-id="3279" instrument_node="">14</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3267"><span class="ref-close" data-dcnode-id="3277" tabindex="0"></span><span data-dcnode-id="3276" instrument_node=""> </span><sup data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">14.</span></sup><span data-dcnode-id="3273" instrument_node=""> Moises Naím, ‘Washington Consensus or Washington confusion?’, </span><i data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="3270" instrument_node="">, (Spring 2000), p. 96.</span><a class="frontnotes" data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3265" instrument_node=""> Despite Williamson's best efforts, the consensus he identified and propelled in the late 1980s collapsed as the new century dawned. </span></p><span data-dcnode-id="3263" instrument_node=""> </span><p data-dcnode-id="3222"><span data-dcnode-id="3262" instrument_node="">In its wake, analysts have been searching for new formulas to propel developing countries toward sustained growth. The most substantial challenge, which actually first gained momentum in the 1980s, has come from proponents of the ‘developmental state’, which is most closely tied with the success of Japan, South Korea, and Taiwan, but which also reflects the experience of France, Ireland, Israel, and others.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3239"><a data-dcnode-id="3260" data-reflink="fn" data-rid="FN0015" href="#"><span data-dcnode-id="3261" instrument_node="">15</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3240"><span class="ref-close" data-dcnode-id="3259" tabindex="0"></span><span data-dcnode-id="3258" instrument_node=""> </span><sup data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">15.</span></sup><span data-dcnode-id="3255" instrument_node=""> Chalmers Johnson, </span><i data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">MITI and the Japanese Miracle</span></i><span data-dcnode-id="3252" instrument_node=""> (Stanford, CA: Stanford University Press, 1983); Alice H. Amsden, </span><i data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">Asia's Next Giant: South Korea and Late Industrialization</span></i><span data-dcnode-id="3249" instrument_node=""> (New York: Oxford University Press, 1989); Robert Wade, </span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Governing the Market: Economic Theory and the Role of Government in East Asian Industrialization</span></i><span data-dcnode-id="3246" instrument_node=""> (Princeton, NJ: Princeton University Press, 1990); and Meredith Woo Cumings, ed., </span><i data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">The Developmental State</span></i><span data-dcnode-id="3243" instrument_node=""> (Ithaca, NY: Cornell University Press, 1999).</span><a class="frontnotes" data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3238" instrument_node=""> These observers collectively argue that markets often fail and that governments need to do more than be good referees and provide public goods (such as infrastructure and education). Developing country governments need to, among other things, guide businesses to invest in the appropriate industries, encourage their success at home and abroad, and protect them from foreign competition. At the turn of the new millennium, critics of the WC intentionally made appeals for several alternative consensuses, including the Monterrey Consensus, the Copenhagen Consensus, the Mexico Consensus, and the Southern Consensus.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3224"><a data-dcnode-id="3236" data-reflink="fn" data-rid="FN0016" href="#"><span data-dcnode-id="3237" instrument_node="">16</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3225"><span class="ref-close" data-dcnode-id="3235" tabindex="0"></span><span data-dcnode-id="3234" instrument_node=""> </span><sup data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">16.</span></sup><span data-dcnode-id="3231" instrument_node=""> The Monterrey Consensus was promoted by the United Nations and former WTO secretary-general Michael Moore to reduce global poverty. The Copenhagen Consensus was developed by asking economists what ten steps could be taken to improve global welfare assuming US$50 billion in additional resources were available. Stemming HIV/AIDS led the list. The Mexico Consensus concerned improving gender equality in Latin America and the Caribbean. See ‘Too much consensus’, </span><i data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="3228" instrument_node="">, (September/October 2004), pp. 16–17; and Gore, ‘The rise and fall of the Washington Consensus as a paradigm for developing countries’, pp. 328–332.</span><a class="frontnotes" data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3223" instrument_node=""> The last, offered by Gore, combines lessons from both Latin America and East Asia by arguing for countries to pursue strategic integration into global economy, use a wide range of industrial policies to promote productivity growth, encourage government–business cooperation, decrease inequality, and foster regional integration and cooperation. </span></p><span data-dcnode-id="3221" instrument_node=""> </span><p data-dcnode-id="3216"><span data-dcnode-id="3220" instrument_node="">The misunderstanding, amendments, and challenges to the WC provide a critical background to understanding the context in which the Beijing Consensus concept emerged. Even if one believes that China's dramatic growth of the past 30 years is the result of only those elements of reform consistent with the WC, all would agree that China has not consistently followed the WC, either the original version or the expanded framework. China has not unquestioningly accepted the advice of the World Bank, and it has avoided needing IMF support because of the conditionality that would accompany such aid. The question then becomes given China's success, might it serve as a symbol for an alternative vision around which a new consensus is emerging? The short answer is that if one views China's record as embodying </span><i data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">the</span></i><span data-dcnode-id="3217" instrument_node=""> new dogma of what works, or what could be perceived as such, the likelihood of achieving agreement is incredibly low. The following sections show why that is the case.</span></p><span data-dcnode-id="3215" instrument_node=""> </span></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2550" id="S002"><span data-dcnode-id="3213" instrument_node=""> </span><h2 class="section-heading-2" data-dcnode-id="3211" id="_i4"><span data-dcnode-id="3212" instrument_node="">The Beijing Consensus</span></h2><span data-dcnode-id="3210" instrument_node=""> </span><p data-dcnode-id="3172"><span data-dcnode-id="3209" instrument_node="">As with the WC, the Beijing Consensus (BC) originated with a single individual, in this case, Joshua Cooper Ramo, who in 2004 published the ambitiously sounding extended essay, ‘The Beijing Consensus: notes on the new physics of Chinese power’. A former editor at </span><i data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Time</span></i><span data-dcnode-id="3206" instrument_node=""> magazine, he was a managing partner in the office of Goldman Sachs chairman John Thornton and a professor at Tsinghua University at the time the essay was published.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3189"><a data-dcnode-id="3204" data-reflink="fn" data-rid="FN0017" href="#"><span data-dcnode-id="3205" instrument_node="">17</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3190"><span class="ref-close" data-dcnode-id="3203" tabindex="0"></span><span data-dcnode-id="3202" instrument_node=""> </span><sup data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">17.</span></sup><span data-dcnode-id="3199" instrument_node=""> As of 2009, Ramo was managing director at Kissinger Associates, an international consulting firm located in New York City. Ramo has published two other monographs: Joshua Cooper Ramo, </span><i data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">Brand China</span></i><span data-dcnode-id="3196" instrument_node=""> (London: Foreign Policy Centre, 2007); and Joshua Cooper Ramo, </span><i data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">The Age of the Unthinkable: Why the New World Disorder Constantly Surprises Us and What We Can Do About It</span></i><span data-dcnode-id="3193" instrument_node=""> (New York: Little, Brown and Company, 2009).</span><a class="frontnotes" data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3188" instrument_node=""> Virtually unknown among China specialists at the time, Ramo's tract took the field by storm and drew immediate attention from Chinese scholars and officialdom. For a time, the BC created a buzz similar to that of the term ‘BRICs’, also invented by Goldman Sachs.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3174"><a data-dcnode-id="3186" data-reflink="fn" data-rid="FN0018" href="#"><span data-dcnode-id="3187" instrument_node="">18</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3175"><span class="ref-close" data-dcnode-id="3185" tabindex="0"></span><span data-dcnode-id="3184" instrument_node=""> </span><sup data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">18.</span></sup><span data-dcnode-id="3181" instrument_node=""> The term BRICs stands for Brazil, Russia, India and China, the world's largest emerging economies. Observers believe Goldman Sachs put forward the BRIC idea as a marketing device in order to generate investment opportunities for itself, but it has become part of the standard lexicon of scholars and policymakers, including in China. See Michael A. Glosny, ‘China and the BRICs: a real (but limited) partnership in a unipolar world’, </span><i data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Polity</span></i><span data-dcnode-id="3178" instrument_node=""> 42(1), (January 2010).</span><a class="frontnotes" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3173" instrument_node=""> </span></p><span data-dcnode-id="3171" instrument_node=""> </span><p data-dcnode-id="3154"><span data-dcnode-id="3170" instrument_node="">If one reads ‘The Beijing Consensus’ as a manifesto meant to trumpet China's success and challenge the normative authority of the WC, then one can admire the boldness of Ramo's effort and the rhetorical flourishes of his prose. The ambition is commendable, particularly from the perspective of a professor whose students usually sit on the fence and are wont to challenge conventional wisdom. Moreover, to the extent the label gains cache and resonates beyond China, it could serve as a challenge to the WC and as a symbol of China's growing soft power.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3156"><a data-dcnode-id="3168" data-reflink="fn" data-rid="FN0019" href="#"><span data-dcnode-id="3169" instrument_node="">19</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3157"><span class="ref-close" data-dcnode-id="3167" tabindex="0"></span><span data-dcnode-id="3166" instrument_node=""> </span><sup data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">19.</span></sup><span data-dcnode-id="3163" instrument_node=""> Joshua Kurlantzick, </span><i data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">Charm Offensive: How China's Soft Power is Transforming the World</span></i><span data-dcnode-id="3160" instrument_node=""> (New Haven, CT: Yale University Press, 2007).</span><a class="frontnotes" data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3155" instrument_node=""> Nevertheless, as a piece of analysis, the BC is relatively incoherent and largely inaccurate. </span></p><span data-dcnode-id="3153" instrument_node=""> </span><p data-dcnode-id="3097"><span data-dcnode-id="3152" instrument_node="">Ramo obviously chose the term ‘Beijing Consensus’ as a provocative response to the Washington Consensus, but the BC's three ‘theorems’ (see Table </span><button class="ref showTableEventRef" data-dcnode-id="3150" data-id="T0002"><span data-dcnode-id="3151" instrument_node="">2</span></button><span data-dcnode-id="3149" instrument_node="">) do not parallel those of the WC.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3129"><a data-dcnode-id="3147" data-reflink="fn" data-rid="FN0020" href="#"><span data-dcnode-id="3148" instrument_node="">20</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3130"><span class="ref-close" data-dcnode-id="3146" tabindex="0"></span><span data-dcnode-id="3145" instrument_node=""> </span><sup data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">20.</span></sup><span data-dcnode-id="3142" instrument_node=""> Dirlik mistakenly dates the term's initial usage to the Fourth World Conference on Women held in Beijing in 1995. At a 1996 meeting in Turkey, Nafis Sadik, Executive Director of the UN Population Fund, commented that the 1994 International Conference on Population and Development (ICPD) had reached a consensus on the importance of achieving sustainable development, which was reconfirmed in Beijing the following year. It is clear that Sadik does not believe he had invented a term because he mentions a ‘Beijing consensus’ without capitalizing the second word, does not place the two words in quotation marks, and does not elaborate at all on anything distinctive about views reached in Beijing. See Arif Dirlik, ‘Beijing Consensus: Beijing “Gongshi”. Who recognizes whom and to what end?’, Position Paper, </span><i data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">Globalization and Autonomy Online Compendium</span></i><span data-dcnode-id="3139" instrument_node="">, (17 January 2006), p. 9, available at: </span><a class="ext-link" data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.globalautonomy.ca/" target="_blank"><span data-dcnode-id="3138" instrument_node="">http://www.globalautonomy.ca</span></a><span data-dcnode-id="3136" instrument_node="">; and Nafis Sadik, ‘Population and sustainable human settlements’, Statement made at the </span><i data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">United Nations Conference on Human Settlements (Habitat II)</span></i><span data-dcnode-id="3133" instrument_node="">, Istanbul, Turkey, 4 June 1996.</span><a class="frontnotes" data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3128" instrument_node=""> Ramo is explicitly concerned with explaining both China's impressive economic development and her growing international influence. The first tenet is that China's modernization has been rooted in innovation and technological leaps, which accounts for rapid increases in total factor productivity. As he puts it, ‘The conventional wisdom is that Chinese growth is an example of what happens when you let loose lots of cheap labor. In fact, innovation-led productivity growth has sustained the Chinese economy and helped to offset disastrous internal imbalances’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3114"><a data-dcnode-id="3126" data-reflink="fn" data-rid="FN0021" href="#"><span data-dcnode-id="3127" instrument_node="">21</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3115"><span class="ref-close" data-dcnode-id="3125" tabindex="0"></span><span data-dcnode-id="3124" instrument_node=""> </span><sup data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">21.</span></sup><span data-dcnode-id="3121" instrument_node=""> Ramo, </span><i data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">The Beijing Consensus</span></i><span data-dcnode-id="3118" instrument_node="">, p. 17.</span><a class="frontnotes" data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3113" instrument_node=""> The second component is that China is intent on not only expanding the economic pie, but on achieving equitable distribution of wealth in which the benefits are widely shared. He notes that recently China's leaders and even local officials have made sustainable and balanced growth a ‘central concern’. There is a widening commitment to reducing the environmental damage from growth; hence, the popularity of adopting ‘green’ as a more accurate measure of the economy's performance.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3099"><a data-dcnode-id="3111" data-reflink="fn" data-rid="FN0022" href="#"><span data-dcnode-id="3112" instrument_node="">22</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3100"><span class="ref-close" data-dcnode-id="3110" tabindex="0"></span><span data-dcnode-id="3109" instrument_node=""> </span><sup data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">22.</span></sup><span data-dcnode-id="3106" instrument_node=""> Ramo, </span><i data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">The Beijing Consensus</span></i><span data-dcnode-id="3103" instrument_node="">, p. 17, pp. 22–23.</span><a class="frontnotes" data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3098" instrument_node=""> </span></p><span data-dcnode-id="3096" instrument_node=""> </span><div class="tableViewerArticleInfo hidden" data-dcnode-id="3075"><span class="figViewerTitle" data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">The Myth of the Beijing Consensus</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="3084"><div class="authorsHeading" data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="3085"><a class="entryAuthor" data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DKennedy%252C%2BScott"><span class="hlFld-ContribAuthor" data-dcnode-id="3091"></span></a><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Kennedy%252C%2BScott"><span class="NLM_given-names" data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Scott</span></span><span data-dcnode-id="3087" instrument_node=""> Kennedy</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="3076"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="3081"><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10670561003666087"><span data-dcnode-id="3083" instrument_node="">https://doi.org/10.1080/10670561003666087</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="3077"><h6 data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Published online:</span></h6><span data-dcnode-id="3078" instrument_node="">28 April 2010</span></div></div></div><div class="tableView" data-dcnode-id="3062"><div class="tableCaption" data-dcnode-id="3068"><div class="short-legend" data-dcnode-id="3069"><h3 data-dcnode-id="3070"><span data-dcnode-id="3074" instrument_node=""> </span><b data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Table 2. The Beijing Consensus</span></b><span data-dcnode-id="3071" instrument_node=""> </span></h3></div></div><div class="tableDownloadOption" data-dcnode-id="3063" data-hascsvlnk="true" id="T0002-table-wrapper"><a class="downloadButton btn btn-sm" data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/downloadTable%3Fid%3DT0002%26doi%3D10.1080%252F10670561003666087%26downloadType%3DCSV" role="button"><span data-dcnode-id="3067" instrument_node="">
Download CSV</span></a><a class="downloadButton btn btn-sm displaySizeTable" data-dcnode-id="3064" data-id="T0002" href="#" role="button"><span data-dcnode-id="3065" instrument_node="">Display Table</span></a></div></div><span data-dcnode-id="3061" instrument_node=""> </span><p data-dcnode-id="3029"><span data-dcnode-id="3060" instrument_node="">The third element of Ramo's BC is the notion that China has been able to maintain control over its development policies and path and that China's success is leading it to challenge the United States by dint of China's attractiveness as a model to others and its own growing power. According to Ramo, China has not felt compelled to strictly follow the WC and instead has pursued policies suited to local circumstances: ‘For China the main point of reference is and has been China itself’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3046"><a data-dcnode-id="3058" data-reflink="fn" data-rid="FN0023" href="#"><span data-dcnode-id="3059" instrument_node="">23</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3047"><span class="ref-close" data-dcnode-id="3057" tabindex="0"></span><span data-dcnode-id="3056" instrument_node=""> </span><sup data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">23.</span></sup><span data-dcnode-id="3053" instrument_node=""> Ramo, </span><i data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">The Beijing Consensus</span></i><span data-dcnode-id="3050" instrument_node="">, p. 17, p. 33.</span><a class="frontnotes" data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3045" instrument_node=""> As a consequence, ‘When measured in terms of comprehensive national power, China is already a rival of the United States in many important areas’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3031"><a data-dcnode-id="3043" data-reflink="fn" data-rid="FN0024" href="#"><span data-dcnode-id="3044" instrument_node="">24</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3032"><span class="ref-close" data-dcnode-id="3042" tabindex="0"></span><span data-dcnode-id="3041" instrument_node=""> </span><sup data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">24.</span></sup><span data-dcnode-id="3038" instrument_node=""> Ramo, </span><i data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">The Beijing Consensus</span></i><span data-dcnode-id="3035" instrument_node="">, p. 17, p. 3.</span><a class="frontnotes" data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3030" instrument_node=""> Equally important, the developing world is flocking to China as an economic partner, political ally, and development model, all of which is eroding the US's global dominance. </span></p><span data-dcnode-id="3028" instrument_node=""> </span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Despite flamboyant flourishes and strategic references to China's wise political leadership, Ramo's Beijing Consensus deals in several myths. Granted, in some ways China has not strictly followed the tenets of the WC and the country has become more influentially globally. Yet making these points does not justify Ramo's grand vision. The following critique focuses primarily on those elements directly related to economic development and does not engage the debate about China's growing international influence and its potential challenge to American hegemony. Elements of the latter issues are taken up in the conclusion.</span></p><span data-dcnode-id="3025" instrument_node=""> </span><p data-dcnode-id="3008"><span data-dcnode-id="3024" instrument_node="">First, technological innovation has not been the centerpiece of China's growth. Ramo sounds like futurologist Alvin Toffler in suggesting China could jump several generations of technology and do so based on its own innovations.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3010"><a data-dcnode-id="3022" data-reflink="fn" data-rid="FN0025" href="#"><span data-dcnode-id="3023" instrument_node="">25</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3011"><span class="ref-close" data-dcnode-id="3021" tabindex="0"></span><span data-dcnode-id="3020" instrument_node=""> </span><sup data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">25.</span></sup><span data-dcnode-id="3017" instrument_node=""> Alvin Toffler, </span><i data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">The Third Wave</span></i><span data-dcnode-id="3014" instrument_node=""> (New York: Bantam Books, 1980).</span><a class="frontnotes" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3009" instrument_node=""> It would be inaccurate to assert that innovation has been irrelevant in China's growth story. There doubtless have been a large number of incremental innovations in different sectors of the economy, and in particular, in manufacturing processes. Moreover, there is a rapidly growing pool of scientists, engineers, and entrepreneurs. The amount of funding dedicated to research and development has expanded in the past decade, particularly among companies. These investments are reflected in a rapid rise in the number of filed patents, copyrights, and trademarks. </span></p><span data-dcnode-id="3007" instrument_node=""> </span><p data-dcnode-id="2957"><span data-dcnode-id="3006" instrument_node="">Nevertheless, the Chinese have not been innovation leaders. For the most part, Chinese enterprises make products and provide services that have been designed or invented outside China. In high technology sectors, the most successful Chinese companies have integrated themselves into global production networks as assemblers and manufacturers of others' designs.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2992"><a data-dcnode-id="3004" data-reflink="fn" data-rid="FN0026" href="#"><span data-dcnode-id="3005" instrument_node="">26</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2993"><span class="ref-close" data-dcnode-id="3003" tabindex="0"></span><span data-dcnode-id="3002" instrument_node=""> </span><sup data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">26.</span></sup><span data-dcnode-id="2999" instrument_node=""> Dieter Ernst and Barry Naughton, ‘China's emerging industrial economy—insights from the IT industry’, in Christopher A. McNally, ed., </span><i data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">China's Emerging Political Economy: Capitalism in the Dragon's Lair</span></i><span data-dcnode-id="2996" instrument_node=""> (New York: Routledge, 2007), pp. 39–59.</span><a class="frontnotes" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2991" instrument_node=""> The great majority of the value added in China's information technology exports originates from outside China, and over 85% of these exports are produced in either joint ventures or wholly owned foreign subsidies of multinationals based in advanced capitalist countries.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2977"><a data-dcnode-id="2989" data-reflink="fn" data-rid="FN0027" href="#"><span data-dcnode-id="2990" instrument_node="">27</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2978"><span class="ref-close" data-dcnode-id="2988" tabindex="0"></span><span data-dcnode-id="2987" instrument_node=""> </span><sup data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">27.</span></sup><span data-dcnode-id="2984" instrument_node=""> Arthur Kroeber, ‘China's push to innovate in information technology’, in Linda Jakobson, ed., </span><i data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Innovation with Chinese Characteristics: High-Tech Research in China</span></i><span data-dcnode-id="2981" instrument_node=""> (Hampshire: Palgrave Macmillan, 2007), pp. 37–70.</span><a class="frontnotes" data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2976" instrument_node=""> Over the last few years China's leaders have trumpeted an effort to promote ‘indigenous innovation’ (</span><i data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">zizhu chuangxin</span></i><span data-dcnode-id="2973" instrument_node="">). A centerpiece of this goal is to develop distinctive technical standards in information technology and then leverage China's huge market size to force other countries to produce to these standards. The record so far, though, has been poor. The great majority of these efforts have failed; only those that are compatible with other foreign technologies show much promise of commercial success.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2959"><a data-dcnode-id="2971" data-reflink="fn" data-rid="FN0028" href="#"><span data-dcnode-id="2972" instrument_node="">28</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2960"><span class="ref-close" data-dcnode-id="2970" tabindex="0"></span><span data-dcnode-id="2969" instrument_node=""> </span><sup data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">28.</span></sup><span data-dcnode-id="2966" instrument_node=""> Scott Kennedy, Richard P. Suttmeier and Jun Su, ‘Standards, stakeholders, and innovation: China's evolving role in the global knowledge economy’, </span><i data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">NBR Special Report</span></i><span data-dcnode-id="2963" instrument_node=""> no. 15 (Seattle, WA: National Bureau of Asian Research, September 2008).</span><a class="frontnotes" data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2958" instrument_node=""> </span></p><span data-dcnode-id="2956" instrument_node=""> </span><p data-dcnode-id="2903"><span data-dcnode-id="2955" instrument_node="">Second, the evidence that China is pursuing sustainable and equitable development is highly limited. At best, these can be seen as future goals which have not been the mainstream of Chinese policy during the Reform era. China has taken significant steps to create a regulatory infrastructure for environmental protection, but just about whenever there appears to be a tradeoff between the environment and growth, the latter wins.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2941"><a data-dcnode-id="2953" data-reflink="fn" data-rid="FN0029" href="#"><span data-dcnode-id="2954" instrument_node="">29</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2942"><span class="ref-close" data-dcnode-id="2952" tabindex="0"></span><span data-dcnode-id="2951" instrument_node=""> </span><sup data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">29.</span></sup><span data-dcnode-id="2948" instrument_node=""> Elizabeth C. Economy, </span><i data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">The River Runs Black: The Environmental Challenge to China's Future</span></i><span data-dcnode-id="2945" instrument_node=""> (Ithaca, NY: Cornell University Press, 2004).</span><a class="frontnotes" data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2940" instrument_node=""> Ramo notes the great interest in Hu Angang's green GDP calculations. However, although the Chinese government did allow a report based on 2004 data to be issued, it has not allowed similar reports to be issued in subsequent years because of the steep deductions in the growth data that emerge from such calculations.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2920"><a data-dcnode-id="2938" data-reflink="fn" data-rid="FN0030" href="#"><span data-dcnode-id="2939" instrument_node="">30</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2921"><span class="ref-close" data-dcnode-id="2937" tabindex="0"></span><span data-dcnode-id="2936" instrument_node=""> </span><sup data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">30.</span></sup><span data-dcnode-id="2933" instrument_node=""> Chinese Academy for Environmental Planning, </span><i data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Green GDP Accounting Study Report 2004, Issued</span></i><span data-dcnode-id="2930" instrument_node="">, (11 September 2006), available at: </span><a class="ext-link" data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//english.gov.cn/2006-09/11/content_384596.htm" target="_blank"><span data-dcnode-id="2929" instrument_node="">http://english.gov.cn/2006-09/11/content_384596.htm</span></a><span data-dcnode-id="2927" instrument_node="">; and Joseph Kahn and Jim Yardley, ‘Choking on growth: as China roars, pollution reaches deadly extremes’, </span><i data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">New York Times</span></i><span data-dcnode-id="2924" instrument_node="">, (26 August 2007).</span><a class="frontnotes" data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2919" instrument_node=""> Similarly, inequality, not equality, has been a chief hallmark of China's growth experience. Several hundred million people have been lifted out of poverty, but regardless of how measured—personal, sectoral, or regional—inequality has expanded. Ramo himself acknowledges this point.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2905"><a data-dcnode-id="2917" data-reflink="fn" data-rid="FN0031" href="#"><span data-dcnode-id="2918" instrument_node="">31</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2906"><span class="ref-close" data-dcnode-id="2916" tabindex="0"></span><span data-dcnode-id="2915" instrument_node=""> </span><sup data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">31.</span></sup><span data-dcnode-id="2912" instrument_node=""> Ramo, </span><i data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">The Beijing Consensus</span></i><span data-dcnode-id="2909" instrument_node="">, p. 24.</span><a class="frontnotes" data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2904" instrument_node=""> Recently, Beijing has eliminated some preferential policies for coastal regions and increased investment in Western China, but the gap between coast and interior is still massive. Poorly constructed schools, homes, and office buildings which were decimated by the May 2008 earthquake in Sichuan are unfortunate evidence that these regional differences persist. </span></p><span data-dcnode-id="2902" instrument_node=""> </span><p data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">The third myth that Ramo offers is that China's economic development strategy is unique. In one sense, that is true. No other country has adopted the same mix of policies and achieved the same results, and certainly China's own development path has been to some extent conditioned in a way by the country's size and political institutions that set it apart from others. Yet extrapolating from having some distinctive elements to hail a new consensus does not say much. The same could be said of the world's every other 191 countries. It would certainly be meaningless to ascribe the label ‘X-country Consensus’ to every nation that has achieved successful development.</span></p><span data-dcnode-id="2899" instrument_node=""> </span><p data-dcnode-id="2885"><span data-dcnode-id="2898" instrument_node="">At the same time, one should note that if one were measure China's policies against the original WC, one would find that China essentially followed eight of the ten elements.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2887"><a data-dcnode-id="2896" data-reflink="fn" data-rid="FN0032" href="#"><span data-dcnode-id="2897" instrument_node="">32</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2888"><span class="ref-close" data-dcnode-id="2895" tabindex="0"></span><span data-dcnode-id="2894" instrument_node=""> </span><sup data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">32.</span></sup><span data-dcnode-id="2891" instrument_node=""> The author thanks Arthur Kroeber for providing this scorecard. Personal correspondence, June 2008.</span><a class="frontnotes" data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2886" instrument_node=""> China closely abided by the WC in terms of fiscal discipline, maintaining a competitive exchange rate (some would say too competitive), liberalizing trade, and liberalizing foreign direct investment. It has made gradual progress on four others: reordering spending away from non-merit subsidies toward public goods, expanding the tax base, easing barriers to market entry, and strengthening property rights. It has moved the least on liberalizing interest rates and privatization, but even on the latter, a substantial portion of SOEs have been privatized since the late 1990s. </span></p><span data-dcnode-id="2884" instrument_node=""> </span><p data-dcnode-id="2852"><span data-dcnode-id="2883" instrument_node="">Despite these areas of overlap, it is entirely reasonable to see that China's behavior has not approached the WC ideal. If we applied a more nuanced comparative lens, we would discover that China's policies and trajectory share similarities and differences with a wide range of countries, including those with more liberal capitalist governance regimes and those with developmental states. This is in part because the intellectual source for most of China's economic reforms has been the experiences of other countries, and China's experts and officials have closely examined and borrowed from elsewhere.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2869"><a data-dcnode-id="2881" data-reflink="fn" data-rid="FN0033" href="#"><span data-dcnode-id="2882" instrument_node="">33</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2870"><span class="ref-close" data-dcnode-id="2880" tabindex="0"></span><span data-dcnode-id="2879" instrument_node=""> </span><sup data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">33.</span></sup><span data-dcnode-id="2876" instrument_node=""> On efforts early in the Reform era to study the experiences of the United States, Eastern Europe, Southeast Asia, Ireland, and elsewhere, see Carol Lee Hamrin, </span><i data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">China and the Challenge of the Future: Changing Political Patterns</span></i><span data-dcnode-id="2873" instrument_node=""> (Boulder, CO: Westview Press, 1990), pp. 30–63.</span><a class="frontnotes" data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2868" instrument_node=""> Ramo would have been closer to the mark if he said China was following in the footsteps of other developmental states.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2854"><a data-dcnode-id="2866" data-reflink="fn" data-rid="FN0034" href="#"><span data-dcnode-id="2867" instrument_node="">34</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2855"><span class="ref-close" data-dcnode-id="2865" tabindex="0"></span><span data-dcnode-id="2864" instrument_node=""> </span><sup data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">34.</span></sup><span data-dcnode-id="2861" instrument_node=""> Randall Peerenboom, </span><i data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">China Modernizes: Threat to the West or Model for the Rest?</span></i><span data-dcnode-id="2858" instrument_node=""> (Oxford: Oxford University Press, 2007), pp. 26–81.</span><a class="frontnotes" data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2853" instrument_node=""> China's government has consistently intervened in the economy, using both macro and micro economic policy tools, and the Chinese have explicitly adopted some of the policies of their neighbors. Ramo says China's special economic zones (SEZs) were the inspiration for those in India, but China borrowed the idea from elsewhere. </span></p><span data-dcnode-id="2851" instrument_node=""> </span><p data-dcnode-id="2816"><span data-dcnode-id="2850" instrument_node="">At the same time, China diverges from its East Asian neighbors in several respects.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2836"><a data-dcnode-id="2848" data-reflink="fn" data-rid="FN0035" href="#"><span data-dcnode-id="2849" instrument_node="">35</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2837"><span class="ref-close" data-dcnode-id="2847" tabindex="0"></span><span data-dcnode-id="2846" instrument_node=""> </span><sup data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">35.</span></sup><span data-dcnode-id="2843" instrument_node=""> Unless noted, the views in this paragraph are taken from several of the chapters in Scott Kennedy, ed., </span><i data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">Beyond the Middle Kingdom: Comparative
