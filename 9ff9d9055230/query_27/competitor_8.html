53" instrument_node=""> </span><sup data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node=""> 7.</span></sup><span data-dcnode-id="1950" instrument_node=""> The Mont Pelerin Society was founded in 1947 in the Swiss resort of the same name by Friedrich Hayek and other free-market intellectuals to promote classical liberalism.</span></p><span data-dcnode-id="1948" instrument_node=""> </span><a data-dcnode-id="1947" id="FN0008"></a><span data-dcnode-id="1946" instrument_node=""> </span><p data-dcnode-id="1941"><span data-dcnode-id="1945" instrument_node=""> </span><sup data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node=""> 8.</span></sup><span data-dcnode-id="1942" instrument_node=""> Williamson, ‘A short history of the Washington Consensus’.</span></p><span data-dcnode-id="1940" instrument_node=""> </span><a data-dcnode-id="1939" id="FN0009"></a><span data-dcnode-id="1938" instrument_node=""> </span><p data-dcnode-id="1933"><span data-dcnode-id="1937" instrument_node=""> </span><sup data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node=""> 9.</span></sup><span data-dcnode-id="1934" instrument_node=""> Williamson, ‘A short history of the Washington Consensus’, p. 27.</span></p><span data-dcnode-id="1932" instrument_node=""> </span><a data-dcnode-id="1931" id="FN0010"></a><span data-dcnode-id="1930" instrument_node=""> </span><p data-dcnode-id="1922"><span data-dcnode-id="1929" instrument_node=""> </span><sup data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">10.</span></sup><span data-dcnode-id="1926" instrument_node=""> John Williamson, ‘After the Washington Consensus: Latin American growth and sustainable development’, Keynote speech at the </span><i data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Seminar on Latin American Financing and the Role of Development Banks</span></i><span data-dcnode-id="1923" instrument_node="">, IDB, BDMG, and ALIDE, Belo Horizonte, Brazil, 30–31 March 2006.</span></p><span data-dcnode-id="1921" instrument_node=""> </span><a data-dcnode-id="1920" id="FN0011"></a><span data-dcnode-id="1919" instrument_node=""> </span><p data-dcnode-id="1914"><span data-dcnode-id="1918" instrument_node=""> </span><sup data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">11.</span></sup><span data-dcnode-id="1915" instrument_node=""> Williamson, ‘Did the Washington Consensus fail?’.</span></p><span data-dcnode-id="1913" instrument_node=""> </span><a data-dcnode-id="1912" id="FN0012"></a><span data-dcnode-id="1911" instrument_node=""> </span><p data-dcnode-id="1903"><span data-dcnode-id="1910" instrument_node=""> </span><sup data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">12.</span></sup><span data-dcnode-id="1907" instrument_node=""> Serra and Stiglitz, </span><i data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">The Washington Consensus Reconsidered</span></i><span data-dcnode-id="1904" instrument_node="">, p. 58.</span></p><span data-dcnode-id="1902" instrument_node=""> </span><a data-dcnode-id="1901" id="FN0013"></a><span data-dcnode-id="1900" instrument_node=""> </span><p data-dcnode-id="1892"><span data-dcnode-id="1899" instrument_node=""> </span><sup data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">13.</span></sup><span data-dcnode-id="1896" instrument_node=""> Also see Moises Naím, ‘The Washington Consensus: a damaged brand’, </span><i data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Financial Times</span></i><span data-dcnode-id="1893" instrument_node="">, (28 October 2002).</span></p><span data-dcnode-id="1891" instrument_node=""> </span><a data-dcnode-id="1890" id="FN0014"></a><span data-dcnode-id="1889" instrument_node=""> </span><p data-dcnode-id="1881"><span data-dcnode-id="1888" instrument_node=""> </span><sup data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">14.</span></sup><span data-dcnode-id="1885" instrument_node=""> Moises Naím, ‘Washington Consensus or Washington confusion?’, </span><i data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="1882" instrument_node="">, (Spring 2000), p. 96.</span></p><span data-dcnode-id="1880" instrument_node=""> </span><a data-dcnode-id="1879" id="FN0015"></a><span data-dcnode-id="1878" instrument_node=""> </span><p data-dcnode-id="1861"><span data-dcnode-id="1877" instrument_node=""> </span><sup data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">15.</span></sup><span data-dcnode-id="1874" instrument_node=""> Chalmers Johnson, </span><i data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">MITI and the Japanese Miracle</span></i><span data-dcnode-id="1871" instrument_node=""> (Stanford, CA: Stanford University Press, 1983); Alice H. Amsden, </span><i data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Asia's Next Giant: South Korea and Late Industrialization</span></i><span data-dcnode-id="1868" instrument_node=""> (New York: Oxford University Press, 1989); Robert Wade, </span><i data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Governing the Market: Economic Theory and the Role of Government in East Asian Industrialization</span></i><span data-dcnode-id="1865" instrument_node=""> (Princeton, NJ: Princeton University Press, 1990); and Meredith Woo Cumings, ed., </span><i data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">The Developmental State</span></i><span data-dcnode-id="1862" instrument_node=""> (Ithaca, NY: Cornell University Press, 1999).</span></p><span data-dcnode-id="1860" instrument_node=""> </span><a data-dcnode-id="1859" id="FN0016"></a><span data-dcnode-id="1858" instrument_node=""> </span><p data-dcnode-id="1850"><span data-dcnode-id="1857" instrument_node=""> </span><sup data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">16.</span></sup><span data-dcnode-id="1854" instrument_node=""> The Monterrey Consensus was promoted by the United Nations and former WTO secretary-general Michael Moore to reduce global poverty. The Copenhagen Consensus was developed by asking economists what ten steps could be taken to improve global welfare assuming US$50 billion in additional resources were available. Stemming HIV/AIDS led the list. The Mexico Consensus concerned improving gender equality in Latin America and the Caribbean. See ‘Too much consensus’, </span><i data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="1851" instrument_node="">, (September/October 2004), pp. 16–17; and Gore, ‘The rise and fall of the Washington Consensus as a paradigm for developing countries’, pp. 328–332.</span></p><span data-dcnode-id="1849" instrument_node=""> </span><a data-dcnode-id="1848" id="FN0017"></a><span data-dcnode-id="1847" instrument_node=""> </span><p data-dcnode-id="1836"><span data-dcnode-id="1846" instrument_node=""> </span><sup data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">17.</span></sup><span data-dcnode-id="1843" instrument_node=""> As of 2009, Ramo was managing director at Kissinger Associates, an international consulting firm located in New York City. Ramo has published two other monographs: Joshua Cooper Ramo, </span><i data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Brand China</span></i><span data-dcnode-id="1840" instrument_node=""> (London: Foreign Policy Centre, 2007); and Joshua Cooper Ramo, </span><i data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">The Age of the Unthinkable: Why the New World Disorder Constantly Surprises Us and What We Can Do About It</span></i><span data-dcnode-id="1837" instrument_node=""> (New York: Little, Brown and Company, 2009).</span></p><span data-dcnode-id="1835" instrument_node=""> </span><a data-dcnode-id="1834" id="FN0018"></a><span data-dcnode-id="1833" instrument_node=""> </span><p data-dcnode-id="1825"><span data-dcnode-id="1832" instrument_node=""> </span><sup data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">18.</span></sup><span data-dcnode-id="1829" instrument_node=""> The term BRICs stands for Brazil, Russia, India and China, the world's largest emerging economies. Observers believe Goldman Sachs put forward the BRIC idea as a marketing device in order to generate investment opportunities for itself, but it has become part of the standard lexicon of scholars and policymakers, including in China. See Michael A. Glosny, ‘China and the BRICs: a real (but limited) partnership in a unipolar world’, </span><i data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Polity</span></i><span data-dcnode-id="1826" instrument_node=""> 42(1), (January 2010).</span></p><span data-dcnode-id="1824" instrument_node=""> </span><a data-dcnode-id="1823" id="FN0019"></a><span data-dcnode-id="1822" instrument_node=""> </span><p data-dcnode-id="1814"><span data-dcnode-id="1821" instrument_node=""> </span><sup data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">19.</span></sup><span data-dcnode-id="1818" instrument_node=""> Joshua Kurlantzick, </span><i data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Charm Offensive: How China's Soft Power is Transforming the World</span></i><span data-dcnode-id="1815" instrument_node=""> (New Haven, CT: Yale University Press, 2007).</span></p><span data-dcnode-id="1813" instrument_node=""> </span><a data-dcnode-id="1812" id="FN0020"></a><span data-dcnode-id="1811" instrument_node=""> </span><p data-dcnode-id="1797"><span data-dcnode-id="1810" instrument_node=""> </span><sup data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">20.</span></sup><span data-dcnode-id="1807" instrument_node=""> Dirlik mistakenly dates the term's initial usage to the Fourth World Conference on Women held in Beijing in 1995. At a 1996 meeting in Turkey, Nafis Sadik, Executive Director of the UN Population Fund, commented that the 1994 International Conference on Population and Development (ICPD) had reached a consensus on the importance of achieving sustainable development, which was reconfirmed in Beijing the following year. It is clear that Sadik does not believe he had invented a term because he mentions a ‘Beijing consensus’ without capitalizing the second word, does not place the two words in quotation marks, and does not elaborate at all on anything distinctive about views reached in Beijing. See Arif Dirlik, ‘Beijing Consensus: Beijing “Gongshi”. Who recognizes whom and to what end?’, Position Paper, </span><i data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Globalization and Autonomy Online Compendium</span></i><span data-dcnode-id="1804" instrument_node="">, (17 January 2006), p. 9, available at: </span><a class="ext-link" data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.globalautonomy.ca/" target="_blank"><span data-dcnode-id="1803" instrument_node="">http://www.globalautonomy.ca</span></a><span data-dcnode-id="1801" instrument_node="">; and Nafis Sadik, ‘Population and sustainable human settlements’, Statement made at the </span><i data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">United Nations Conference on Human Settlements (Habitat II)</span></i><span data-dcnode-id="1798" instrument_node="">, Istanbul, Turkey, 4 June 1996.</span></p><span data-dcnode-id="1796" instrument_node=""> </span><a data-dcnode-id="1795" id="FN0021"></a><span data-dcnode-id="1794" instrument_node=""> </span><p data-dcnode-id="1786"><span data-dcnode-id="1793" instrument_node=""> </span><sup data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">21.</span></sup><span data-dcnode-id="1790" instrument_node=""> Ramo, </span><i data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">The Beijing Consensus</span><
