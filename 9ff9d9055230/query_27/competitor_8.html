Perspectives on China's Capitalist Transition</span></i><span data-dcnode-id="2840" instrument_node=""> (manuscript currently under review).</span><a class="frontnotes" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2835" instrument_node=""> The fastest growing segments of China's economy, the coastal private sector, have achieved their success without central government encouragement and have had to survive in highly competitive markets. Efforts to ‘rationalize’ sectors by forming cartels or banning firms regularly fail. For the last decade, the central government has tried to raise the concentration of the steel sector, but China has over 6,000 steel companies, 2,000 more than when the initiative began. Whereas Japan and South Korea maintained extreme barriers to foreign direct investment and imports, in relative terms, China has been far more open to the international economy. China has been the largest destination in the developing world of FDI for more than a decade, in part because of foreign political pressure and in part because of China's own economic weaknesses that necessitated attracting foreign managerial talent and technology.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2818"><a data-dcnode-id="2833" data-reflink="fn" data-rid="FN0036" href="#"><span data-dcnode-id="2834" instrument_node="">36</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2819"><span class="ref-close" data-dcnode-id="2832" tabindex="0"></span><span data-dcnode-id="2831" instrument_node=""> </span><sup data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">36.</span></sup><span data-dcnode-id="2828" instrument_node=""> James Fallows, who is also a specialist on Japan, writes, ‘China's behavior, and that of its companies, is easier to match with standard economic theories than Japan's’. Fallows' position is rare among specialists of Japan who have turned their attention to China. Chalmers Johnson, Clyde Prestowitz, and Eamonn Fingleton all believe China is following Japan's economic model. See James Fallows, ‘China makes, the world takes’, </span><i data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">The Atlantic Monthly</span></i><span data-dcnode-id="2825" instrument_node=""> 300(1), (July/August 2007), pp. 48–72; and Eamonn Fingleton, </span><i data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">In the Jaws of the Dragon: America's Fate in the Coming Era of Chinese Hegemony</span></i><span data-dcnode-id="2822" instrument_node=""> (New York: Thomas Dunne Books, 2008).</span><a class="frontnotes" data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2817" instrument_node=""> Whereas Japan, South Korea, and Taiwan had highly organized systems for government–business consultation, industry associations are poorly developed in China. Chinese and foreign industry do influence China's economic policies, but most business contact with government occurs through informal, individualized channels, sharing more similarities with government–business relations in Russia and India. And China's social welfare system is far less developed than its neighbors and shares much more in common with other ‘uneven developers’ such as South Africa and Egypt. </span></p><span data-dcnode-id="2815" instrument_node=""> </span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">The ultimate point of all of these examples is that a sweeping generalization of distinctiveness blurs more than it clarifies. Engaging in fine-tuned comparisons across the constituent elements of China's economy is more valuable.</span></p><span data-dcnode-id="2812" instrument_node=""> </span><p data-dcnode-id="2762"><span data-dcnode-id="2811" instrument_node="">The fourth problematic aspect of Ramo's thesis is that he assumes that the different elements of the Chinese state have acted in concert with each other, that together they have pursued a well-defined goal, and that China's economic performance is a reflection of those plans. Such a view ascribes the central role in the story to Deng Xiaoping and subsequent Chinese leaders. While no doubt immensely influential, the record indicates that they have not been all-powerful rulers able to force their vision on the rest of society. To a large extent, China's leadership has had to react to economic and political pressures not of their choosing. During the first 15 years of the Reform era, many policies reflected a compromise between liberal and conservative wings of the Communist Party.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2797"><a data-dcnode-id="2809" data-reflink="fn" data-rid="FN0037" href="#"><span data-dcnode-id="2810" instrument_node="">37</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2798"><span class="ref-close" data-dcnode-id="2808" tabindex="0"></span><span data-dcnode-id="2807" instrument_node=""> </span><sup data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">37.</span></sup><span data-dcnode-id="2804" instrument_node=""> Joseph Fewsmith, </span><i data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Dilemmas of Reform in China: Political Conflict and Economic Debate</span></i><span data-dcnode-id="2801" instrument_node=""> (Armonk, NY: M. E. Sharpe, 1994).</span><a class="frontnotes" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2796" instrument_node=""> Although ideological disagreements have diminished as a result of purges and death, bureaucratic conflicts have continued to shape the adoption and implementation of policies. More recently, lobbying by business interests and other components of society has become central to policy debates at the national and local levels.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2779"><a data-dcnode-id="2794" data-reflink="fn" data-rid="FN0038" href="#"><span data-dcnode-id="2795" instrument_node="">38</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2780"><span class="ref-close" data-dcnode-id="2793" tabindex="0"></span><span data-dcnode-id="2792" instrument_node=""> </span><sup data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">38.</span></sup><span data-dcnode-id="2789" instrument_node=""> Scott Kennedy, </span><i data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">The Business of Lobbying in China</span></i><span data-dcnode-id="2786" instrument_node=""> (Cambridge, MA: Harvard University Press, 2005); Andrew C. Mertha, </span><i data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">China's Water Warriors: Citizen Action and Policy Change</span></i><span data-dcnode-id="2783" instrument_node=""> (Ithaca, NY: Cornell University Press, 2008).</span><a class="frontnotes" data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2778" instrument_node=""> Many of China's most successful policies were first adopted locally, not as centrally-approved experiments, but as violations of central policy, and then were only subsequently endorsed nationally.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2764"><a data-dcnode-id="2776" data-reflink="fn" data-rid="FN0039" href="#"><span data-dcnode-id="2777" instrument_node="">39</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2765"><span class="ref-close" data-dcnode-id="2775" tabindex="0"></span><span data-dcnode-id="2774" instrument_node=""> </span><sup data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">39.</span></sup><span data-dcnode-id="2771" instrument_node=""> Kellee S. Tsai, </span><i data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Capitalism without Democracy: The Private Sector in Contemporary China</span></i><span data-dcnode-id="2768" instrument_node=""> (Ithaca, NY: Cornell University Press, 2007).</span><a class="frontnotes" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2763" instrument_node=""> The bottom line is that compromise between different groups, not consensus, has been the source for most of China's economic policies. </span></p><span data-dcnode-id="2761" instrument_node=""> </span><p data-dcnode-id="2744"><span data-dcnode-id="2760" instrument_node="">The final myth proffered by Ramo is another type of consensus, that China's intelligentsia and officialdom agree with the accuracy of his BC. Writing three years later, Kurlantzick claims Ramo's ideas have garnered wide acceptance in China.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2746"><a data-dcnode-id="2758" data-reflink="fn" data-rid="FN0040" href="#"><span data-dcnode-id="2759" instrument_node="">40</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2747"><span class="ref-close" data-dcnode-id="2757" tabindex="0"></span><span data-dcnode-id="2756" instrument_node=""> </span><sup data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">40.</span></sup><span data-dcnode-id="2753" instrument_node=""> Kurlantzick, </span><i data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Charm Offensive</span></i><span data-dcnode-id="2750" instrument_node="">, pp. 56–58.</span><a class="frontnotes" data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2745" instrument_node=""> My own review of the Chinese debate is that if there is a consensus in China, it is that the BC is wrong and overly antagonistic of the United States and the global community. </span></p><span data-dcnode-id="2743" instrument_node=""> </span><p data-dcnode-id="2660"><span data-dcnode-id="2742" instrument_node="">Some Chinese commentators find utility in the BC. Most importantly, they like that it is critical of the WC, neoliberalism, and the shock therapy approach of Eastern Europe and the former Soviet Union.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2728"><a data-dcnode-id="2740" data-reflink="fn" data-rid="FN0041" href="#"><span data-dcnode-id="2741" instrument_node="">41</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2729"><span class="ref-close" data-dcnode-id="2739" tabindex="0"></span><span data-dcnode-id="2738" instrument_node=""> </span><sup data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">41.</span></sup><span data-dcnode-id="2735" instrument_node=""> ‘The “Washington Consensus” and “Beijing Consensus”’, </span><i data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">People's Daily Online</span></i><span data-dcnode-id="2732" instrument_node="">, (18 June 2005).</span><a class="frontnotes" data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2727" instrument_node=""> Criticism of the WC legitimates development paths that adhere to countries' individual circumstances.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2704"><a data-dcnode-id="2725" data-reflink="fn" data-rid="FN0042" href="#"><span data-dcnode-id="2726" instrument_node="">42</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2705"><span class="ref-close" data-dcnode-id="2724" tabindex="0"></span><span data-dcnode-id="2723" instrument_node=""> </span><sup data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">42.</span></sup><span data-dcnode-id="2720" instrument_node=""> Zhu Yaobin, ‘“Beijing gongshi”: dui quanqiuhua beijingxia zhongguo gaige jieshilide fenxi’ [‘“Beijing Consensus”: analytical persuasiveness of Chinese reform under the background of globalization’], </span><i data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Hunan shehui kexue</span></i><span data-dcnode-id="2717" instrument_node=""> [</span><i data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Huan Social Sciences</span></i><span data-dcnode-id="2714" instrument_node="">] no. 6, (2006), pp. 101–104; and Wang Jianhui, ‘“Beijing gongshi”: fazhan jiazhiguande xin jingjie’ [‘“Beijing Consensus”: new state of a development approach’], </span><i data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Zhongnan caijing zhengfa daxue xuebao</span></i><span data-dcnode-id="2711" instrument_node=""> [</span><i data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Journal of Zhongnan University of Economics and Law</span></i><span data-dcnode-id="2708" instrument_node="">] 148(1), (2005), pp. 15–19.</span><a class="frontnotes" data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2703" instrument_node=""> Others appreciate the BC because it acknowledges China's historic economic success.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2686"><a data-dcnode-id="2701" data-reflink="fn" data-rid="FN0043" href="#"><span data-dcnode-id="2702" instrument_node="">43</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2687"><span class="ref-close" data-dcnode-id="2700" tabindex="0"></span><span data-dcnode-id="2699" instrument_node=""> </span><sup data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">43.</span></sup><span data-dcnode-id="2696" instrument_node=""> Luo Yuezhan and Xiao Liuyi, ‘Fangquan yu shouquande gaige zhanlue—touguo “Beijing gongshi” kan zhongguo jingji gaige’ [‘Reform strategy of releasing and taking power—view China's economic reforms through the “Beijing Consensus”’], </span><i data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Hubei caijing gaodeng zhuanke xuexiao xuebao</span></i><span data-dcnode-id="2693" instrument_node=""> [</span><i data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Journal of Hubei College of Finance and Economics</span></i><span data-dcnode-id="2690" instrument_node="">] 17(2), (2005), pp. 10–12.</span><a class="frontnotes" data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2685" instrument_node=""> Tian and Wei believe that at a minimum the discussion of the BC will generate more research on China.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2662"><a data-dcnode-id="2683" data-reflink="fn" data-rid="FN0044" href="#"><span data-dcnode-id="2684" instrument_node="">44</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2663"><span class="ref-close" data-dcnode-id="2682" tabindex="0"></span><span data-dcnode-id="2681" instrument_node=""> </span><sup data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">44.</span></sup><span data-dcnode-id="2678" instrument_node=""> Tian Chunsheng, ‘“Huashengdun gongshi” yu “beijing gongshi” bijiao chutan’ [‘Comparative initial exploration of “Washington Consensus” and “Beijing Consensus”’], </span><i data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Jingji shehui tizhi bijiao</span></i><span data-dcnode-id="2675" instrument_node=""> [</span><i data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Comparative Economics and Social Systems</span></i><span data-dcnode-id="2672" instrument_node="">] 118(2), (2005), pp. 77–80; and Wei Yangchun, ‘Lixing kandai “Beijing gongshi”’ [‘Rationally view “Beijing Consensus”’], </span><i data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Wenjiao ziliao</span></i><span data-dcnode-id="2669" instrument_node=""> [</span><i data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Reference Materials</span></i><span data-dcnode-id="2666" instrument_node="">] no. 1b, (2007), pp. 213–214.</span><a class="frontnotes" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2661" instrument_node=""> </span></p><span data-dcnode-id="2659" instrument_node=""> </span><p data-dcnode-id="2555"><span data-dcnode-id="2658" instrument_node="">Nevertheless, the large majority of Chinese commentary is critical of the BC. Some believe it is inaccurate or an exaggeration, while others believe it overlooks the most important elements of China's economic reforms.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2629"><a data-dcnode-id="2656" data-reflink="fn" data-rid="FN0045" href="#"><span data-dcnode-id="2657" instrument_node="">45</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2630"><span class="ref-close" data-dcnode-id="2655" tabindex="0"></span><span data-dcnode-id="2654" instrument_node=""> </span><sup data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">45.</span></sup><span data-dcnode-id="2651" instrument_node=""> Pang Zhongying, ‘“Zhongguo tezhengde quanqiuhua” yu “Beijing gongshi”’ [‘“Chinese style globalization” and the “Beijing Consensus”’], </span><i data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Dangdai shijie yu shehui zhuyi</span></i><span data-dcnode-id="2648" instrument_node=""> [</span><i data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Contemporary World and Socialism</span></i><span data-dcnode-id="2645" instrument_node="">] no. 5, (2004), pp. 15–16; Liu Yantang, ‘“Beijing gongshi” de qiantai ci’ [‘Hidden meaning of “Beijing Consensus”’], </span><i data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Liaowang</span></i><span data-dcnode-id="2642" instrument_node=""> [</span><i data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Outlook</span></i><span data-dcnode-id="2639" instrument_node="">] no. 42, (15 October 2007), pp. 102–104; Zou Dongtao, ‘“Huashengdun gongshi”, “Beijing gongshi” yu zhongguo dutede fazhan daolu’ [‘“Washington Consensus”, “Beijing Consensus” and China's unique development path’], </span><i data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Hongguan jingji yanjiu</span></i><span data-dcnode-id="2636" instrument_node=""> [</span><i data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Macroeconomics</span></i><span data-dcnode-id="2633" instrument_node="">] no. 5, (2006), pp. 10–14; and Zhu Yaobin, ‘“Beijing gongshi”’.</span><a class="frontnotes" data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2628" instrument_node=""> Many commentators write that the BC makes claim to a consensus that does not exist.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2599"><a data-dcnode-id="2626" data-reflink="fn" data-rid="FN0046" href="#"><span data-dcnode-id="2627" instrument_node="">46</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2600"><span class="ref-close" data-dcnode-id="2625" tabindex="0"></span><span data-dcnode-id="2624" instrument_node=""> </span><sup data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">46.</span></sup><span data-dcnode-id="2621" instrument_node=""> Zhang Jianjing, ‘“Beijing gongshi” yu Zhongguo ruan shilide tisheng’ [‘“Beijing Consensus” and raising of China's soft power’], </span><i data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">Dangdai shijie yu shehui zhuyi</span></i><span data-dcnode-id="2618" instrument_node=""> [</span><i data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Contemporary World and Socialism</span></i><span data-dcnode-id="2615" instrument_node="">] no. 5, (2004), pp. 10–14; Lu Yanchang, ‘Zhongguo moshi: gainian, lishi ji linian’ [‘China model: concept, history, idea’], </span><i data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Gansu lilun xuekan</span></i><span data-dcnode-id="2612" instrument_node=""> [</span><i data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Gansu Theory Journal</span></i><span data-dcnode-id="2609" instrument_node="">] 170(7), (2005), pp. 10–13; Yuan Shan, ‘Guanyu “beijing gongshi” yanjiude ruogan wenti’ [‘Some problems about “Beijing Consensus” research’], </span><i data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Dangdai shijie yu shehui zhuyi</span></i><span data-dcnode-id="2606" instrument_node=""> [</span><i data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Contemporary World and Socialism</span></i><span data-dcnode-id="2603" instrument_node="">] no. 5, (2004), pp. 17–21; and Wei Yangchun, ‘Lixing kandai “Beijing gongshi”’.</span><a class="frontnotes" data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2598" instrument_node=""> Still others stress that the BC understates the depth of problems that China's economic strategy has produced and the depth of problems still to be overcome.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2581"><a data-dcnode-id="2596" data-reflink="fn" data-rid="FN0047" href="#"><span data-dcnode-id="2597" instrument_node="">47</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2582"><span class="ref-close" data-dcnode-id="2595" tabindex="0"></span><span data-dcnode-id="2594" instrument_node=""> </span><sup data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">47.</span></sup><span data-dcnode-id="2591" instrument_node=""> Li Keqin and Wang Huixing, ‘“Zhongguo moshi” jiqi pushixing chutan’ [‘“China model” and initial exploration of its applicability’], </span><i data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Henan keji daxue xuebao, shehui kexue ban</span></i><span data-dcnode-id="2588" instrument_node=""> [</span><i data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Journal of Henan University of Science and Technology, Social Sciences</span></i><span data-dcnode-id="2585" instrument_node="">] 25(2), (2007), pp. 36–38.</span><a class="frontnotes" data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2580" instrument_node=""> And finally, a number of observers hold that China's economic reform strategy has depended on elements of the WC, such as free prices, competition, limiting inflation, and accession to the WTO. Hence, those elements distinctive to China merely supplement rather than challenge the WC.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2557"><a data-dcnode-id="2578" data-reflink="fn" data-rid="FN0048" href="#"><span data-dcnode-id="2579" instrument_node="">48</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2558"><span class="ref-close" data-dcnode-id="2577" tabindex="0"></span><span data-dcnode-id="2576" instrument_node=""> </span><sup data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">48.</span></sup><span data-dcnode-id="2573" instrument_node=""> Zhou Chunbo, ‘Huashengdun gongshide pochan dao weicheng tixide Beijing gongshi’ [‘Bankrupt Washington Consensus to yet systematic Beijing Consensus’], </span><i data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">Xiandai jingji</span></i><span data-dcnode-id="2570" instrument_node=""> [</span><i data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Modern Economics</span></i><span data-dcnode-id="2567" instrument_node="">] 61(7), (2007), pp. 146–148; Zhao Xiao, ‘Cong “Huashengdun gongshi” dao “Beijing gongshi”’ [‘From “Washington Consensus” to “Beijing Consensus”’], </span><i data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Nanfengchuang</span></i><span data-dcnode-id="2564" instrument_node=""> [</span><i data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Southern Wind Window</span></i><span data-dcnode-id="2561" instrument_node="">], (16 July 2004); Yuan Shan, ‘Guanyu “beijing gongshi” yanjiude ruogan wenti’; and Wei Yangchun, ‘Lixing kandai “Beijing gongshi”’.</span><a class="frontnotes" data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2556" instrument_node=""> </span></p><span data-dcnode-id="2554" instrument_node=""> </span><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Finally, attention to the BC in China emerged in reaction to Ramo's essay but has faded over time. Based on my own experience of living in Beijing in the second half of 2008, one almost never heard Chinese scholars or experts mention the BC without prompting from outsiders. Mention of the term mainly generated criticism and the statement that the BC term was not a Chinese creation. To the extent the BC invoked positive reactions, people simply saw in the term a recognition that China has pursued its own development path and not unquestioningly followed policies dictated by others. The lack of resonance for a Beijing Consensus amongst the intellectual elite and officials in the country that supposedly could benefit most from claiming such a title should be seen as the final nail in the coffin for Ramo's theory.</span></p><span data-dcnode-id="2551" instrument_node=""> </span></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2347" id="S003"><span data-dcnode-id="2549" instrument_node=""> </span><h2 class="section-heading-2" data-dcnode-id="2547" id="_i6"><span data-dcnode-id="2548" instrument_node="">From the Beijing Consensus to the China Model</span></h2><span data-dcnode-id="2546" instrument_node=""> </span><p data-dcnode-id="2541"><span data-dcnode-id="2545" instrument_node="">Given the problems of the BC in terms of both substance and nomenclature, a more productive conversation about China's development experience needs to move in other directions. One of the most popular alternatives of late has been the ‘China Model’ (</span><i data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">zhongguo moshi</span></i><span data-dcnode-id="2542" instrument_node="">). Although the term does not explicitly assume common agreement amongst China's elite and it has attracted more interest by Chinese analysts than the BC, interpretations of the China Model vary far and wide, and none stand up well as a rigorous summary of a distinctive Chinese developmental experience.</span></p><span data-dcnode-id="2540" instrument_node=""> </span><p data-dcnode-id="2487"><span data-dcnode-id="2539" instrument_node="">Unlike the BC, the China Model has no clear provenance, but it appears that the phrase originally was used to distinguish China's gradualist reform strategy from the ‘shock therapy’ approach adopted by post-Communist states of central Europe. In that regard, the China Model is a synonym for the more ideologically inspired, ‘socialism with Chinese characteristics’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2504"><a data-dcnode-id="2537" data-reflink="fn" data-rid="FN0049" href="#"><span data-dcnode-id="2538" instrument_node="">49</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2505"><span class="ref-close" data-dcnode-id="2536" tabindex="0"></span><span data-dcnode-id="2535" instrument_node=""> </span><sup data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">49.</span></sup><span data-dcnode-id="2532" instrument_node=""> Wang Zhuo, ‘Zhongguo gaige shijian dui xifang jingjixue zhuliu lilude juda tiaozhan—Zhongguo moshi shi cujin gongtong fanrong, shixian gongtong fuyuzhi lu’ [‘The immense challenge China's reform experience presents to Western mainstream economic theory—the China model the road to promote common prosperity and to realize common wealth’], </span><i data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Zhongguo caizheng</span></i><span data-dcnode-id="2529" instrument_node=""> [</span><i data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">China Finance</span></i><span data-dcnode-id="2526" instrument_node="">] no. 11, (1993), pp. 35–42; Zheng Xia, ‘Fazhanzhong guojia jingji fazhan moshi zai tan—“zhongguo moshi” de lilun sikao’ [‘Further exploration of developing country economic development model—theoretical thoughts on the “China model”’], </span><i data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Guangzhou shi caimao guanli ganbu xueyuan xuebao</span></i><span data-dcnode-id="2523" instrument_node=""> [</span><i data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Guangzhou Municipal Finance and Trade Cadre College Journal</span></i><span data-dcnode-id="2520" instrument_node="">] no. 2, (1999), pp. 39–41; Zhang Jianzhong, ‘“Zhongguo moshi” zai quanqiuhua zhong jueqi’ [‘The rise of the “China model” in the midst of globalization’], </span><i data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Zhongguo guomen shibao</span></i><span data-dcnode-id="2517" instrument_node=""> [</span><i data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">China National Door Times</span></i><span data-dcnode-id="2514" instrument_node="">], (31 July 2004); and Zhou Jian, ‘Zhongguo moshide fazhan daolu: zhongguo tese shehui zhuyi’ [‘Development road of the China model: socialism with Chinese characteristics’], </span><i data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Guangdong sheng shehui zhuyixue xuebao</span></i><span data-dcnode-id="2511" instrument_node=""> [</span><i data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Journal of Guangdong Institute of Socialism</span></i><span data-dcnode-id="2508" instrument_node="">] no. 4, (October 2007), pp. 24–27.</span><a class="frontnotes" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2503" instrument_node=""> Its purpose is to justify the Reform era's break from Maoist policies while at the same time suggesting it is entirely appropriate for China to follow a path different from its fellow former Socialist comrades. To some analysts, this coda only hides the reality that China is no longer genuinely socialist, and hence, the emergence of the term ‘capitalism with Chinese characteristics’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2489"><a data-dcnode-id="2501" data-reflink="fn" data-rid="FN0050" href="#"><span data-dcnode-id="2502" instrument_node="">50</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2490"><span class="ref-close" data-dcnode-id="2500" tabindex="0"></span><span data-dcnode-id="2499" instrument_node=""> </span><sup data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">50.</span></sup><span data-dcnode-id="2496" instrument_node=""> Shaun Breslin, ‘Capitalism with Chinese characteristics: the public, the private and the international’, Murdoch University Asia Research Center, working paper no. 4 (May 2004); and Yasheng Huang, </span><i data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Capitalism with Chinese Characteristics: Entrepreneurship and the State</span></i><span data-dcnode-id="2493" instrument_node=""> (Cambridge: Cambridge University Press, 2008).</span><a class="frontnotes" data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2488" instrument_node=""> </span></p><span data-dcnode-id="2486" instrument_node=""> </span><p data-dcnode-id="2448"><span data-dcnode-id="2485" instrument_node="">A second way the China Model has been deployed is as a synonym for the Beijing Consensus. Though not sharing the exact meaning, commentators emphasize that China has not followed the WC and permitted extensive state intervention in the economy yet not foisting its own development experience on to other countries.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2468"><a data-dcnode-id="2483" data-reflink="fn" data-rid="FN0051" href="#"><span data-dcnode-id="2484" instrument_node="">51</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2469"><span class="ref-close" data-dcnode-id="2482" tabindex="0"></span><span data-dcnode-id="2481" instrument_node=""> </span><sup data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">51.</span></sup><span data-dcnode-id="2478" instrument_node=""> For one of the more detailed descriptions of the China Model, see Cai Tuo, </span><i data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Quanqiuhua yu zhengzhide zhuanxing</span></i><span data-dcnode-id="2475" instrument_node=""> [</span><i data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Globalization and Political Transformation</span></i><span data-dcnode-id="2472" instrument_node="">] (Beijing: Peking University Press, June 2007), pp. 353–355.</span><a class="frontnotes" data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2467" instrument_node=""> Some who see the overlap between the BC and the China Model argue in favor of using the latter because the BC is more likely to arouse fears overseas of the Chinese threat to the international system.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2450"><a data-dcnode-id="2465" data-reflink="fn" data-rid="FN0052" href="#"><span data-dcnode-id="2466" instrument_node="">52</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2451"><span class="ref-close" data-dcnode-id="2464" tabindex="0"></span><span data-dcnode-id="2463" instrument_node=""> </span><sup data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">52.</span></sup><span data-dcnode-id="2460" instrument_node=""> Qin Fengming, ‘“Hou huashengdun gongshi” yu zhongguo moshi’ [‘“Post-Washington Consensus” and the China model’], </span><i data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Taipingyang xuebao</span></i><span data-dcnode-id="2457" instrument_node=""> [</span><i data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Pacific Journal</span></i><span data-dcnode-id="2454" instrument_node="">] no. 6, (2005), pp. 40–45.</span><a class="frontnotes" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2449" instrument_node=""> Regardless of which of these two terms one favors, though, when the China Model is used this way, it faces most of the same problems noted above about the WC. </span></p><span data-dcnode-id="2447" instrument_node=""> </span><p data-dcnode-id="2385"><span data-dcnode-id="2446" instrument_node="">Another way the China Model has been used is to highlight the strategy of rapid economic reform while simultaneously maintaining China's original political institutions. Yao Yang, a professor at the influential China Center for Economic Research at Peking University, stresses that since officials do not have to be responsive to special interests, China's ‘neutral government’ (</span><i data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">zhongxing zhengfu</span></i><span data-dcnode-id="2443" instrument_node="">) has been able to consistently pursue policies which serve the general interest.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2426"><a data-dcnode-id="2441" data-reflink="fn" data-rid="FN0053" href="#"><span data-dcnode-id="2442" instrument_node="">53</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2427"><span class="ref-close" data-dcnode-id="2440" tabindex="0"></span><span data-dcnode-id="2439" instrument_node=""> </span><sup data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">53.</span></sup><span data-dcnode-id="2436" instrument_node=""> Yao Yang, ‘“Zhongxing zhengfu”: Zhongguo 30 nian fazhan qijide yizhong quanshi’ [‘“Neutral government”: an explanatory note of China's 30 year development miracle’], </span><i data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Diyi caijing ribao</span></i><span data-dcnode-id="2433" instrument_node=""> [</span><i data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">China Business News</span></i><span data-dcnode-id="2430" instrument_node="">], (17 November 2008).</span><a class="frontnotes" data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2425" instrument_node=""> Although this claim may not hold up to detailed scrutiny, a key implication of the analysis is to distinguish China from India and other democratic developing countries, and in doing so, help to justify the continuation of the CCP's one-party rule.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2408"><a data-dcnode-id="2423" data-reflink="fn" data-rid="FN0054" href="#"><span data-dcnode-id="2424" instrument_node="">54</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2409"><span class="ref-close" data-dcnode-id="2422" tabindex="0"></span><span data-dcnode-id="2421" instrument_node=""> </span><sup data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">54.</span></sup><span data-dcnode-id="2418" instrument_node=""> Wu Zengji, ‘Lun “zhongguo moshi” ke chixude tiaojian’ [‘On the conditions to sustain the “China model”’], </span><i data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Lilun tantao</span></i><span data-dcnode-id="2415" instrument_node=""> [</span><i data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Theoretical Investigation</span></i><span data-dcnode-id="2412" instrument_node="">] no. 1, (2005), pp. 5–9.</span><a class="frontnotes" data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2407" instrument_node=""> Critics, on the other hand, use this label to criticize China for pursuing ‘authoritarian capitalism’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2387"><a data-dcnode-id="2405" data-reflink="fn" data-rid="FN0055" href="#"><span data-dcnode-id="2406" instrument_node="">55</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2388"><span class="ref-close" data-dcnode-id="2404" tabindex="0"></span><span data-dcnode-id="2403" instrument_node=""> </span><sup data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">55.</span></sup><span data-dcnode-id="2400" instrument_node=""> Gideon Rachman, ‘Illiberal capitalism: Russia and China chart their own course’, </span><i data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Financial Times</span></i><span data-dcnode-id="2397" instrument_node="">, (8 January 2008); Ian Buruma, ‘The year of the “China model”’, </span><i data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">The Nation</span></i><span data-dcnode-id="2394" instrument_node=""> (Bangkok), (9 January 2008); and Arthur Kroeber, ‘Rising China and the liberal West’, </span><i data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">China Economic Quarterly</span></i><span data-dcnode-id="2391" instrument_node=""> 12(1), (March 2008), pp. 29–44.</span><a class="frontnotes" data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2386" instrument_node=""> Whether meant as praise or criticism, if this is the only basis of the model, then surely it does not deserve the adjective China, since many countries have successfully pursued economic development in the context of a strong authoritarian state. The most obvious examples are several of China's neighbors in the decades after World War II, but one can find additional cases at other points in time (Meiji-era Japan) or in other regions (late nineteenth-century Mexico). </span></p><span data-dcnode-id="2384" instrument_node=""> </span><p data-dcnode-id="2367"><span data-dcnode-id="2383" instrument_node="">Most recently, in the wake of the global financial crisis, the China Model has been re-deployed to refer to China's export-oriented growth strategy. Some analysts believe China has overly embraced globalization and been too dependent on foreign markets and instead needs to promote domestic consumption and higher productivity as the foundation for future economic growth.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2369"><a data-dcnode-id="2381" data-reflink="fn" data-rid="FN0056" href="#"><span data-dcnode-id="2382" instrument_node="">56</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2370"><span class="ref-close" data-dcnode-id="2380" tabindex="0"></span><span data-dcnode-id="2379" instrument_node=""> </span><sup data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">56.</span></sup><span data-dcnode-id="2376" instrument_node=""> Wang Yong, ‘Domestic demand and continued reform: China's search for a new model’, </span><i data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Global Asia</span></i><span data-dcnode-id="2373" instrument_node=""> 3(4), (December 2008), pp. 24–28.</span><a class="frontnotes" data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2368" instrument_node=""> In this usage, the model has been reduced to describe only one aspect of China's economy—its orientation toward the global economy. Observers such as Wang Yong note that China's heavy reliance on exports distinguishes it from large industrialized economies such as the United States, but China in many ways is following the strategy of many of its neighbors. The ironic implication of this last usage is that this strategy emphasizes extensive trade and investment liberalization, which is consistent with the Washington Consensus. </span></p><span data-dcnode-id="2366" instrument_node=""> </span><p data-dcnode-id="2349"><span data-dcnode-id="2365" instrument_node="">In addition to the difficulties noted above, no matter how deployed, the China Model faces two other analytical problems. The word ‘model’ implies a coherence and guiding plan that likely does not square with the reality of China's path. As noted earlier, despite the strong leadership of Deng Xiaoping and subsequent CCP chiefs, many policies have been the product of compromises amongst elites, bureaucrats, and interest groups, and have been in response to short-term problems as much as long-term plans. Finally, the China Model implies a single, consistent strategy, when economic reform has actually proceeded through several stages, each different from the proceeding one. If the China Model is reduced to mean modifying China's policies as circumstances change over time or choosing policies through experimentation, then it is robbed of much analytical rigor.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2351"><a data-dcnode-id="2363" data-reflink="fn" data-rid="FN0057" href="#"><span data-dcnode-id="2364" instrument_node="">57</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2352"><span class="ref-close" data-dcnode-id="2362" tabindex="0"></span><span data-dcnode-id="2361" instrument_node=""> </span><sup data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">57.</span></sup><span data-dcnode-id="2358" instrument_node=""> Nevertheless, a useful discussion of experimentation is Sebastian Heilmann, ‘From local experiments to national policy: the origins of China's distinctive policy process’, </span><i data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">China Journal</span></i><span data-dcnode-id="2355" instrument_node=""> no. 59, (January 2008), pp. 1–30.</span><a class="frontnotes" data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2350" instrument_node=""> </span></p><span data-dcnode-id="2348" instrument_node=""> </span></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2216"><span data-dcnode-id="2346" instrument_node=""> </span><h2 class="section-heading-2" data-dcnode-id="2344" id="_i7"><span data-dcnode-id="2345" instrument_node="">Conclusions</span></h2><span data-dcnode-id="2343" instrument_node=""> </span><p data-dcnode-id="2320"><span data-dcnode-id="2342" instrument_node="">The proponents of the BC and China Model would have observers believe that China's experience directly violates the dogma of the WC and neoliberalism. Although China did not strictly adhere to Williamson's ten tenets or the various elaborations, in particular with regard to governing institutions, fundamentalists on either side may be overstating how far China diverges from standard economic theory. Rodrik argues that the goals of neoliberal analyses do not imply only one type of policy prescription. Hence, he writes that ‘broad objectives of economic reform—namely market-oriented incentives, macroeconomic stability, and outward orientation—do not translate into a unique set of policy actions’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2322"><a data-dcnode-id="2340" data-reflink="fn" data-rid="FN0058" href="#"><span data-dcnode-id="2341" instrument_node="">58</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2323"><span class="ref-close" data-dcnode-id="2339" tabindex="0"></span><span data-dcnode-id="2338" instrument_node=""> </span><sup data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">58.</span></sup><span data-dcnode-id="2335" instrument_node=""> Dani Rodrik, ‘Goodbye Washington Consensus, hello Washington confusion? A review of the World Bank's </span><i data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Economic Growth in the 1990s: Learning from a Decade of Reform</span></i><span data-dcnode-id="2332" instrument_node="">’, </span><i data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Journal of Economic Literature</span></i><span data-dcnode-id="2329" instrument_node=""> 45, (December 2006), p. 977. Also see Dani Rodrik, </span><i data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">One Economics, Many Recipes: Globalization, Institutions, and Economic Growth</span></i><span data-dcnode-id="2326" instrument_node=""> (Princeton, NJ: Princeton University Press, 2007).</span><a class="frontnotes" data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2321" instrument_node=""> For example, property rights (#9) can be secured in individuals, but China through the mid-1990s endowed local governments with such protections, which helps explain the phenomenal success of township and village enterprises (TVE). Rodrik's broader purpose is to show that extensive government intervention can be consistent with traditional economic logic. One of the greatest ironies is that traditional economics is flexible enough to make sense of and make peace with China, undercutting the very rationale for a BC or China Model as a challenger to orthodoxy. </span></p><span data-dcnode-id="2319" instrument_node=""> </span><p data-dcnode-id="2314"><span data-dcnode-id="2318" instrument_node="">Despite their problematic construction, the </span><i data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">perception</span></i><span data-dcnode-id="2315" instrument_node=""> that a Beijing Consensus or China Model exists may still have consequences for China, other countries, and international institutions. These ideas are most likely to have an impact on the place that draws their inspiration. Because it is viewed as a foreign creation, China's leadership has not embraced the BC, and hence, it will never find a place as ideological supplements alongside ‘socialism with Chinese characteristics’ or ‘reform and opening up’. But the government has at least implicitly endorsed the discussion of a China model. That there is no agreement on its contents or utility may be less relevant than that the discussion occurs, which gives legitimacy to any way in which China diverges from the free-market democratic ideal promoted by others.</span></p><span data-dcnode-id="2313" instrument_node=""> </span><p data-dcnode-id="2284"><span data-dcnode-id="2312" instrument_node="">China's experience also has implications for debates about the appropriate role of the state in the economy. Although the Bretton Woods institutions offer policy advice to clients which is often still old-school or new-school WC, their analysts are coming to terms with the success of China and other countries where government has played a large role.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2298"><a data-dcnode-id="2310" data-reflink="fn" data-rid="FN0059" href="#"><span data-dcnode-id="2311" instrument_node="">59</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2299"><span class="ref-close" data-dcnode-id="2309" tabindex="0"></span><span data-dcnode-id="2308" instrument_node=""> </span><sup data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">59.</span></sup><span data-dcnode-id="2305" instrument_node=""> World Bank, </span><i data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Economic Growth in the 1990s: Learning from a Decade of Reform</span></i><span data-dcnode-id="2302" instrument_node=""> (Washington, DC: World Bank, 2005).</span><a class="frontnotes" data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2297" instrument_node=""> No longer is a limited non-interventionist state accepted as always appropriate. Japan and others in East Asia helped initiate this discussion, but perhaps China's success has made it seem appropriate for an even broader swath of countries. China's experience appears to give additional impetus to the breakdown of any universal dogma, a trend only reinforced by the responses of developed countries to the global financial crisis.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2286"><a data-dcnode-id="2295" data-reflink="fn" data-rid="FN0060" href="#"><span data-dcnode-id="2296" instrument_node="">60</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2287"><span class="ref-close" data-dcnode-id="2294" tabindex="0"></span><span data-dcnode-id="2293" instrument_node=""> </span><sup data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">60.</span></sup><span data-dcnode-id="2290" instrument_node=""> There is no indication, however, that such intervention drew any inspiration from China's experience, and the post-crisis policies have been defended as temporary measures in which a return to market principles will follow once the crisis passes.</span><a class="frontnotes" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2285" instrument_node=""> </span></p><span data-dcnode-id="2283" instrument_node=""> </span><p data-dcnode-id="2233"><span data-dcnode-id="2282" instrument_node="">Whereas the BC and China Model may have some lasting resonance on matters political, given the problems of these terms and the flexibility of standard economic theory, it should be clear that the economic significance of these ideas should not be overstated. There are individual elements of China's experience that deserve study and perhaps adoption by others, but they do not add up to a distinctive model. Even Yao Yang, the proponent of a ‘neutral government’ autonomous from social pressures, still stresses the need for China to center reforms around improving and supporting the market, not circumventing it.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2265"><a data-dcnode-id="2280" data-reflink="fn" data-rid="FN0061" href="#"><span data-dcnode-id="2281" instrument_node="">61</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2266"><span class="ref-close" data-dcnode-id="2279" tabindex="0"></span><span data-dcnode-id="2278" instrument_node=""> </span><sup data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">61.</span></sup><span data-dcnode-id="2275" instrument_node=""> Yao Yang, ‘Huashengdun gongshi meiyou guoshi’ [‘The Washington Consensus is not passé’], </span><i data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">21 shiji jingji baodao</span></i><span data-dcnode-id="2272" instrument_node=""> [</span><i data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">21st Century Business Herald</span></i><span data-dcnode-id="2269" instrument_node="">], (27 December 2008).</span><a class="frontnotes" data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2264" instrument_node=""> The BC and China Model do not neatly crystallize features of China's experience that are unique to her or that can be packaged as simple prescriptions for other developing countries to follow. Some countries are deeply interested in learning from China's success.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2247"><a data-dcnode-id="2262" data-reflink="fn" data-rid="FN0062" href="#"><span data-dcnode-id="2263" instrument_node="">62</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2248"><span class="ref-close" data-dcnode-id="2261" tabindex="0"></span><span data-dcnode-id="2260" instrument_node=""> </span><sup data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">62.</span></sup><span data-dcnode-id="2257" instrument_node=""> Selim Raihan, ‘Beyond the Washington Consensus: lessons from China's development experience’, Bangladesh Centre for Policy Dialogue, Report No. 12 (May 2000); Garth Le Pere, ‘Ties create options for Africa’, </span><i data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">China Daily</span></i><span data-dcnode-id="2254" instrument_node="">, (27 February 2008); Barry V. Sautman, ‘Friends and interests: China's distinctive links with Africa’, Hong Kong University of Science and Technology Center on China's Transnational Relations, working paper no. 12, (1 February 2006); and Drew Thompson, ‘China's soft power in Africa: from the “Beijing Consensus” to health diplomacy’, </span><i data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">China Brief</span></i><span data-dcnode-id="2251" instrument_node="">, (13 October 2005).</span><a class="frontnotes" data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2246" instrument_node=""> Some are led by authoritarian leaders intent on following China's lead in achieving both growth and continued one-party rule;</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2235"><a data-dcnode-id="2244" data-reflink="fn" data-rid="FN0063" href="#"><span data-dcnode-id="2245" instrument_node="">63</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2236"><span class="ref-close" data-dcnode-id="2243" tabindex="0"></span><span data-dcnode-id="2242" instrument_node=""> </span><sup data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">63.</span></sup><span data-dcnode-id="2239" instrument_node=""> Joshua Landis, a Syria expert, reported that in his travels around the Middle East he regularly hears officials express strong interest in the ‘China Model’ in their quest to maintain authoritarian rule and achieve sustained economic growth. Discussion with the author, May 2008.</span><a class="frontnotes" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2234" instrument_node=""> yet as has been demonstrated elsewhere, there is no one formula of economic success, and what ‘works’ in China likely will not directly transfer to other circumstances. Those who blindly adopt elements of Chinese policy may very well find themselves in the same place as those who adopted the WC without question, frustrated by economic and political crises. </span></p><span data-dcnode-id="2232" instrument_node=""> </span><p data-dcnode-id="2218"><span data-dcnode-id="2231" instrument_node="">Finally, there are some who are concerned that the BC may provide a foundation for a new North–South conflict,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2220"><a data-dcnode-id="2229" data-reflink="fn" data-rid="FN0064" href="#"><span data-dcnode-id="2230" instrument_node="">64</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2221"><span class="ref-close" data-dcnode-id="2228" tabindex="0"></span><span data-dcnode-id="2227" instrument_node=""> </span><sup data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">64.</span></sup><span data-dcnode-id="2224" instrument_node=""> Dirlik, ‘Beijing Consensus’.</span><a class="frontnotes" data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2219" instrument_node=""> but a close examination of the substance of the BC and China Model and China's own behavior indicate this is not likely. Although the world's governing institutions are adapting somewhat to China's growing role and may have to make greater allowances for state intervention under certain circumstances, in the grand scheme of things these challenges do not match the ideological conflicts of the Cold War between communism or capitalism or even those pitting the global wealthy North against the poor South. On most fronts, China is far more open and market oriented than when reforms began. At the same time, the Chinese government and industry have striven to learn and play by the rules of the international economic system. Even where the Chinese have interpreted these rules to serve protectionist purposes, they have typically followed the practices of developed capitalist countries. China's self-serving application of the rules has become much more relevant than outright non-compliance with its commitments. As a result of the benefits it has obtained through both liberalization and targeted protection, the international economic system has served China well; and hence, the People's Republic is far more likely to be a tinkerer advocating limited reforms than an outright opponent. Global governance institutions need to be reformed substantially, but the challenge is far less likely to come from a China who has deftly adapted to the capitalist world than from the least developed countries who are still trapped in a vicious cycle of poverty from which no consensus, Washington or otherwise, provides easy escape. </span></p><span data-dcnode-id="2217" instrument_node=""> </span></div></div><div class="hidden" data-dcnode-id="2123" id="table-content-T0001"><div class="caption" data-dcnode-id="2210"><span data-dcnode-id="2214" instrument_node=""> </span><b data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Table 1. The Washington Consensus (1989)</span></b><span data-dcnode-id="2211" instrument_node=""> </span></div><table class="table frame_topbot" data-dcnode-id="2124"><colgroup data-dcnode-id="2207"><col data-dcnode-id="2209"><col data-dcnode-id="2208"></colgroup><thead data-dcnode-id="2201" valign="bottom"><tr class="colsep0" data-dcnode-id="2202" valign="top"><th align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2205" valign="bottom"><span data-dcnode-id="2206" instrument_node="">Point</span></th><th align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2203" valign="bottom"><span data-dcnode-id="2204" instrument_node="">Later revised or qualified</span></th></tr></thead><tbody data-dcnode-id="2125"><tr class="colsep0" data-dcnode-id="2196" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">1. Fiscal discipline</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">&nbsp;</span></td></tr><tr class="colsep0" data-dcnode-id="2189" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2192"><span data-dcnode-id="2195" instrument_node="">2. Reordering public expenditure priorities away from non-merit </span><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node=""> subsidies and toward public goods (e.g. health and education)</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">&nbsp;</span></td></tr><tr class="colsep0" data-dcnode-id="2182" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2185"><span data-dcnode-id="2188" instrument_node="">3. Tax reform that combines broad tax base with moderate </span><br data-dcnode-id="2187"><span data-dcnode-id="2186" instrument_node=""> marginal rates</span></td><td align="center" class="colsep0 rowsep0 align_center last" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">*</span></td></tr><tr class="colsep0" data-dcnode-id="2177" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">4. Liberalized interest rates</span></td><td align="center" class="colsep0 rowsep0 align_center last" data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">*</span></td></tr><tr class="colsep0" data-dcnode-id="2172" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">5. A competitive exchange rate</span></td><td align="center" class="colsep0 rowsep0 align_center last" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">*</span></td></tr><tr class="colsep0" data-dcnode-id="2167" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">6. Trade liberalization</span></td><td align="center" class="colsep0 rowsep0 align_center last" data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">*</span></td></tr><tr class="colsep0" data-dcnode-id="2162" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">7. Liberalization of inward foreign direct investment</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">&nbsp;</span></td></tr><tr class="colsep0" data-dcnode-id="2157" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">8. Privatization</span></td><td align="center" class="colsep0 rowsep0 align_center last" data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">*</span></td></tr><tr class="colsep0" data-dcnode-id="2152" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">9. Deregulation to ease barriers of firms for entry and exit of sectors</span></td><td align="center" class="colsep0 rowsep0 align_center last" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">*</span></td></tr><tr class="colsep0" data-dcnode-id="2147" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">10. Strong protection of property rights</span></td><td align="center" class="colsep0 rowsep0 align_center last" data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">*</span></td></tr><tr class="colsep0 last" data-dcnode-id="2126" valign="top"><td class="colsep0 rowsep0 last" colspan="2" data-dcnode-id="2127"><span data-dcnode-id="2146" instrument_node=""> </span><i data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Sources</span></i><span data-dcnode-id="2143" instrument_node="">: John Williamson, ‘What Washington means by policy reform’, in John Williamson, ed., </span><i data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Latin American Adjustment: How Much Has Happened?</span></i><span data-dcnode-id="2140" instrument_node=""> (Washington, DC: Institute for International Economics, 1990); John Williamson, ‘A short history of the Washington Consensus’, in Narcis Serra and Joseph E. Stiglitz, eds, </span><i data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">The Washington Consensus Reconsidered: Towards a New Global Governance</span></i><span data-dcnode-id="2137" instrument_node=""> (Oxford: Oxford University Press, 2008), pp. 14–30; John Williamson, ‘Our </span><i data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">agenda</span></i><span data-dcnode-id="2134" instrument_node=""> and the Washington Consensus’, in Pedro-Pablo Kuczynski and John Williamson, eds, </span><i data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">After the Washington Consensus: Restarting Growth and Reform in Latin America</span></i><span data-dcnode-id="2131" instrument_node=""> (Washington, DC: Institute for International Economics, 2003); and John Williamson, ‘After the Washington Consensus: Latin American growth and sustainable development’, Keynote speech at the </span><i data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Seminar on Latin American Financing and the Role of Development Banks</span></i><span data-dcnode-id="2128" instrument_node="">, IDB, BDMG, and ALIDE, Belo Horizonte, Brazil, 30–31 March 2006.</span></td></tr></tbody></table></div><div class="hidden" data-dcnode-id="2069" id="table-content-T0002"><div class="caption" data-dcnode-id="2118"><span data-dcnode-id="2122" instrument_node=""> </span><b data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Table 2. The Beijing Consensus</span></b><span data-dcnode-id="2119" instrument_node=""> </span></div><table class="table frame_topbot" data-dcnode-id="2070"><colgroup data-dcnode-id="2115"><col data-dcnode-id="2117"><col data-dcnode-id="2116"></colgroup><tbody data-dcnode-id="2071"><tr class="colsep0" data-dcnode-id="2110" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">1.</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Innovation-based development</span></td></tr><tr class="colsep0" data-dcnode-id="2103" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">2.</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2104"><span data-dcnode-id="2107" instrument_node="">Economic success measured not by per capita GDP growth but by its sustainability and level </span><br data-dcnode-id="2106"><span data-dcnode-id="2105" instrument_node=""> of equality</span></td></tr><tr class="colsep0" data-dcnode-id="2098" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">3.</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Self-determination for China and for other countries vis-à-vis the United States:</span></td></tr><tr class="colsep0" data-dcnode-id="2093" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">&nbsp;</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">• Opposition to the Washington Consensus</span></td></tr><tr class="colsep0" data-dcnode-id="2088" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">&nbsp;</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">• Globalization on their own terms</span></td></tr><tr class="colsep0" data-dcnode-id="2083" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">&nbsp;</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">• Chinese influence by example, not weaponry</span></td></tr><tr class="colsep0" data-dcnode-id="2078" valign="top"><td align="left" class="colsep0 rowsep0 align_left" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">&nbsp;</span></td><td align="left" class="colsep0 rowsep0 align_left last" data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">• Develop asymmetric capabilities to balance against the United States</span></td></tr><tr class="colsep0 last" data-dcnode-id="2072" valign="top"><td class="colsep0 rowsep0 last" colspan="2" data-dcnode-id="2073"><span data-dcnode-id="2077" instrument_node="">Source: Joshua Cooper Ramo, </span><i data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">The Beijing Consensus: Notes on the New Physics of Chinese Power</span></i><span data-dcnode-id="2074" instrument_node=""> (London: Foreign Policy Centre, 2004).</span></td></tr></tbody></table></div><a data-dcnode-id="2068" id="inline_frontnotes"></a><h2 data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Notes</span></h2><div class="summation-section" data-dcnode-id="1197"><a data-dcnode-id="2065" id="FN0001"></a><span data-dcnode-id="2064" instrument_node=""> </span><p data-dcnode-id="2051"><span data-dcnode-id="2063" instrument_node=""> </span><sup data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node=""> 1.</span></sup><span data-dcnode-id="2060" instrument_node=""> Joshua Cooper Ramo, </span><i data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">The Beijing Consensus: Notes on the New Physics of Chinese Power</span></i><span data-dcnode-id="2057" instrument_node=""> (London: Foreign Policy Centre, 2004), available at: </span><a class="ext-link" data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fpc.org.uk/" target="_blank"><span data-dcnode-id="2056" instrument_node="">http://www.fpc.org.uk</span></a><span data-dcnode-id="2054" instrument_node="">.</span><a data-dcnode-id="2053" id="FN0065"></a><span data-dcnode-id="2052" instrument_node=""> </span></p><p data-dcnode-id="2040"><span data-dcnode-id="2050" instrument_node=""> </span><sup data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">*</span></sup><span data-dcnode-id="2047" instrument_node="">Scott Kennedy is Associate Professor in the Departments of Political Science and East Asian Languages &amp; Cultures and Director of the Research Center for Chinese Politics &amp; Business (RCCPB) at Indiana University. He is the author of </span><i data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">The Business of Lobbying in China</span></i><span data-dcnode-id="2044" instrument_node=""> (Harvard University Press, 2005). His current research projects focus on the growing role of the Chinese government and industry in global economic governance and the evolution of corporate political activity in China. An earlier version of this paper was presented at the conference, </span><i data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">‘Washington Consensus’ versus ‘Beijing Consensus’: Sustainability of China's Development Model</span></i><span data-dcnode-id="2041" instrument_node="">, National Taiwan University Center for China Studies and University of Denver Center for China–US Cooperation, Denver, CO, 30–31 May 2008. The author thanks participants from this conference, the National Defense University Institute for International Strategic Studies' China Security Perspective Series, and Indiana University's China Studies Group for their feedback. Special appreciation goes to Wang Qun for his valuable research assistance.</span></p><span data-dcnode-id="2039" instrument_node=""> </span><p data-dcnode-id="2038"></p><span data-dcnode-id="2037" instrument_node=""> </span><a data-dcnode-id="2036" id="FN0065"></a><span data-dcnode-id="2035" instrument_node=""> </span><p data-dcnode-id="2024"><span data-dcnode-id="2034" instrument_node=""> </span><sup data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">*</span></sup><span data-dcnode-id="2031" instrument_node="">Scott Kennedy is Associate Professor in the Departments of Political Science and East Asian Languages &amp; Cultures and Director of the Research Center for Chinese Politics &amp; Business (RCCPB) at Indiana University. He is the author of </span><i data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">The Business of Lobbying in China</span></i><span data-dcnode-id="2028" instrument_node=""> (Harvard University Press, 2005). His current research projects focus on the growing role of the Chinese government and industry in global economic governance and the evolution of corporate political activity in China. An earlier version of this paper was presented at the conference, </span><i data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">‘Washington Consensus’ versus ‘Beijing Consensus’: Sustainability of China's Development Model</span></i><span data-dcnode-id="2025" instrument_node="">, National Taiwan University Center for China Studies and University of Denver Center for China–US Cooperation, Denver, CO, 30–31 May 2008. The author thanks participants from this conference, the National Defense University Institute for International Strategic Studies' China Security Perspective Series, and Indiana University's China Studies Group for their feedback. Special appreciation goes to Wang Qun for his valuable research assistance.</span></p><span data-dcnode-id="2023" instrument_node=""> </span><a data-dcnode-id="2022" id="FN0002"></a><span data-dcnode-id="2021" instrument_node=""> </span><p data-dcnode-id="2010"><span data-dcnode-id="2020" instrument_node=""> </span><sup data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node=""> 2.</span></sup><span data-dcnode-id="2017" instrument_node=""> Huang Ping and Cui Zhiyuan, eds, </span><i data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Zhongguo yu quanqiu hua: huashengdun gongshi haishi beijing gongshi</span></i><span data-dcnode-id="2014" instrument_node=""> [</span><i data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">China and Globalization: Washington Consensus or Beijing Consensus?</span></i><span data-dcnode-id="2011" instrument_node="">] (Beijing: Social Science Academic Press, August 2005).</span></p><span data-dcnode-id="2009" instrument_node=""> </span><a data-dcnode-id="2008" id=
