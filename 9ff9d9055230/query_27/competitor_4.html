span></mn></mrow></msub><mo data-dcnode-id="3841" is="true" linebreak="goodbreak"><span data-dcnode-id="3842" instrument_node="">+</span></mo><msub data-dcnode-id="3834" is="true"><mrow data-dcnode-id="3838" is="true"><mi data-dcnode-id="3839" is="true"><span data-dcnode-id="3840" instrument_node="">γ</span></mi></mrow><mrow data-dcnode-id="3835" is="true"><mn data-dcnode-id="3836" is="true"><span data-dcnode-id="3837" instrument_node="">1</span></mn></mrow></msub><msub data-dcnode-id="3821" is="true"><mrow data-dcnode-id="3825" is="true"><mi data-dcnode-id="3832" is="true"><span data-dcnode-id="3833" instrument_node="">C</span></mi><mi data-dcnode-id="3830" is="true"><span data-dcnode-id="3831" instrument_node="">a</span></mi><mi data-dcnode-id="3828" is="true"><span data-dcnode-id="3829" instrument_node="">r</span></mi><mi data-dcnode-id="3826" is="true"><span data-dcnode-id="3827" instrument_node="">s</span></mi></mrow><mrow data-dcnode-id="3822" is="true"><mi data-dcnode-id="3823" is="true"><span data-dcnode-id="3824" instrument_node="">i</span></mi></mrow></msub><mo data-dcnode-id="3819" is="true" linebreak="goodbreak"><span data-dcnode-id="3820" instrument_node="">+</span></mo><msub data-dcnode-id="3812" is="true"><mrow data-dcnode-id="3816" is="true"><mi data-dcnode-id="3817" is="true"><span data-dcnode-id="3818" instrument_node="">X</span></mi></mrow><mrow data-dcnode-id="3813" is="true"><mi data-dcnode-id="3814" is="true"><span data-dcnode-id="3815" instrument_node="">i</span></mi></mrow></msub><mi data-dcnode-id="3810" is="true"><span data-dcnode-id="3811" instrument_node="">γ</span></mi><mo data-dcnode-id="3808" is="true" linebreak="goodbreak"><span data-dcnode-id="3809" instrument_node="">+</span></mo><msub data-dcnode-id="3801" is="true"><mrow data-dcnode-id="3805" is="true"><mi data-dcnode-id="3806" is="true"><span data-dcnode-id="3807" instrument_node="">ε</span></mi></mrow><mrow data-dcnode-id="3802" is="true"><mi data-dcnode-id="3803" is="true"><span data-dcnode-id="3804" instrument_node="">i</span></mi></mrow></msub></math></span></span></span></span></span><span data-dcnode-id="3792" instrument_node="">where </span><em data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Y</span></em><sub data-dcnode-id="3787"><em data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">i</span></em></sub><span data-dcnode-id="3786" instrument_node=""> is the travel outcome, such as VKT, for individual </span><em data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">i</span></em><span data-dcnode-id="3783" instrument_node="">, </span><em data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Cars</span></em><sub data-dcnode-id="3778"><em data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">i</span></em></sub><span data-dcnode-id="3777" instrument_node=""> is the number of cars in the household of individual </span><em data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">i</span></em><span data-dcnode-id="3774" instrument_node="">, </span><em data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">X</span></em><sub data-dcnode-id="3769"><em data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">i</span></em></sub><span data-dcnode-id="3768" instrument_node=""> is a vector of other covariates, and </span><em data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">ε</span></em><sub data-dcnode-id="3763"><em data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">i</span></em></sub><span data-dcnode-id="3762" instrument_node=""> is a random error term. The coefficient of interest is </span><em data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">γ</span></em><sub data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">1</span></sub><span data-dcnode-id="3757" instrument_node="">, the effect of the number of cars a household owns on VKT.</span></p><p data-dcnode-id="3749" id="p0215"><span data-dcnode-id="3755" instrument_node="">Unfortunately, we expect the ordinary least-squares (OLS) estimate of </span><em data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">γ</span></em><sub data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">1</span></sub><span data-dcnode-id="3750" instrument_node=""> to be biased. Unobservable individual parameters such as driving preferences may be correlated with both the number of household cars and VKT. An individual who likes to drive is more likely to buy an additional car than an individual who prefers taking the subway. Moreover, owning a car may increase an individual's job opportunities, raising income and allowing the individual to purchase an additional car.</span></p><p data-dcnode-id="3486" id="p0220"><span data-dcnode-id="3748" instrument_node="">To address these potential sources of bias, we restrict the sample to lottery participants and use the individual's lottery status to instrument for the number of cars. We use a two-stage least squares strategy, where the first stage is equation </span><a class="workspace-trigger" data-dcnode-id="3746" href="#fd1" name="bfd1"><span data-dcnode-id="3747" instrument_node="">(1)</span></a><span data-dcnode-id="3745" instrument_node=""> with the number of household cars as the dependent variable. We use the predicted value </span><span class="math" data-dcnode-id="3695"><span class="MathJax_Preview" data-dcnode-id="3744" style=""></span><span class="MathJax_SVG" data-dcnode-id="3698" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mover accent=&quot;true&quot; is=&quot;true&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>C</mi><mi is=&quot;true&quot;>a</mi><mi is=&quot;true&quot;>r</mi><mi is=&quot;true&quot;>s</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub></mrow><mo is=& 3566" instrument_node="">0</span></mn></mrow></msub><mo data-dcnode-id="3561" is="true" linebreak="goodbreak"><span data-dcnode-id="3562" instrument_node="">+</span></mo><msub data-dcnode-id="3554" is="true"><mrow data-dcnode-id="3558" is="true"><mi data-dcnode-id="3559" is="true"><span data-dcnode-id="3560" instrument_node="">γ</span></mi></mrow><mrow data-dcnode-id="3555" is="true"><mn data-dcnode-id="3556" is="true"><span data-dcnode-id="3557" instrument_node="">1</span></mn></mrow></msub><mrow data-dcnode-id="3536" is="true"><mover accent="true" data-dcnode-id="3537" is="true"><mrow data-dcnode-id="3540" is="true"><msub data-dcnode-id="3541" is="true"><mrow data-dcnode-id="3545" is="true"><mi data-dcnode-id="3552" is="true"><span data-dcnode-id="3553" instrument_node="">C</span></mi><mi data-dcnode-id="3550" is="true"><span data-dcnode-id="3551" instrument_node="">a</span></mi><mi data-dcnode-id="3548" is="true"><span data-dcnode-id="3549" instrument_node="">r</span></mi><mi data-dcnode-id="3546" is="true"><span data-dcnode-id="3547" instrument_node="">s</span></mi></mrow><mrow data-dcnode-id="3542" is="true"><mi data-dcnode-id="3543" is="true"><span data-dcnode-id="3544" instrument_node="">i</span></mi></mrow></msub></mrow><mo data-dcnode-id="3538" is="true"><span data-dcnode-id="3539" instrument_node="">ˆ</span></mo></mover></mrow><mo data-dcnode-id="3534" is="true" linebreak="goodbreak"><span data-dcnode-id="3535" instrument_node="">+</span></mo><msub data-dcnode-id="3527" is="true"><mrow data-dcnode-id="3531" is="true"><mi data-dcnode-id="3532" is="true"><span data-dcnode-id="3533" instrument_node="">γ</span></mi></mrow><mrow data-dcnode-id="3528" is="true"><mn data-dcnode-id="3529" is="true"><span data-dcnode-id="3530" instrument_node="">2</span></mn></mrow></msub><msub data-dcnode-id="3520" is="true"><mrow data-dcnode-id="3524" is="true"><mi data-dcnode-id="3525" is="true"><span data-dcnode-id="3526" instrument_node="">X</span></mi></mrow><mrow data-dcnode-id="3521" is="true"><mi data-dcnode-id="3522" is="true"><span data-dcnode-id="3523" instrument_node="">i</span></mi></mrow></msub><mo data-dcnode-id="3518" is="true" linebreak="goodbreak"><span data-dcnode-id="3519" instrument_node="">+</span></mo><msub data-dcnode-id="3511" is="true"><mrow data-dcnode-id="3515" is="true"><mi data-dcnode-id="3516" is="true"><span data-dcnode-id="3517" instrument_node="">γ</span></mi></mrow><mrow data-dcnode-id="3512" is="true"><mn data-dcnode-id="3513" is="true"><span data-dcnode-id="3514" instrument_node="">3</span></mn></mrow></msub><msub data-dcnode-id="3504" is="true"><mrow data-dcnode-id="3508" is="true"><mi data-dcnode-id="3509" is="true"><span data-dcnode-id="3510" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="3505" is="true"><mi data-dcnode-id="3506" is="true"><span data-dcnode-id="3507" instrument_node="">i</span></mi></mrow></msub><mo data-dcnode-id="3502" is="true" linebreak="goodbreak"><span data-dcnode-id="3503" instrument_node="">+</span></mo><msub data-dcnode-id="3495" is="true"><mrow data-dcnode-id="3499" is="true"><mi data-dcnode-id="3500" is="true"><span data-dcnode-id="3501" instrument_node="">ε</span></mi></mrow><mrow data-dcnode-id="3496" is="true"><mi data-dcnode-id="3497" is="true"><span data-dcnode-id="3498" instrument_node="">i</span></mi></mrow></msub></math></span></span></span></span></span></p><p data-dcnode-id="3472" id="p0225"><span data-dcnode-id="3485" instrument_node="">The dependent variables are similar to those used in the reduced-form estimation, and they include distance and time traveled as well as rush hour travel. This IV strategy is valid under two conditions: (a) conditional on date of entry, winning the lottery is independent of all individual characteristics that might affect </span><em data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">ε</span></em><sub data-dcnode-id="3480"><em data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">i</span></em></sub><span data-dcnode-id="3479" instrument_node="">; and (b) lottery status is a strong predictor of the number of cars. Both of these conditions were established previously: </span><a class="workspace-trigger" data-dcnode-id="3477" href="#tbl2" name="btbl2"><span data-dcnode-id="3478" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="3476" instrument_node=""> supports assumption (a), and </span><a class="workspace-trigger" data-dcnode-id="3474" href="#tbl3" name="btbl3"><span data-dcnode-id="3475" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="3473" instrument_node=""> supports assumption (b).</span></p><p data-dcnode-id="3470" id="p0230"><span data-dcnode-id="3471" instrument_node="">We interpret the IV estimate as the effect of adding a car for those who added one because they won the lottery. Obtaining an additional car has a number of mediating effects on VKT, such as the effect of the higher average fuel economy that results from obtaining a new car (since new cars typically have higher fuel economy than older cars).</span></p><div data-dcnode-id="3244"><p data-dcnode-id="3461" id="p0235"><span data-dcnode-id="3469" instrument_node="">The coefficient estimates are presented in </span><a class="workspace-trigger" data-dcnode-id="3467" href="#tbl5" name="btbl5"><span data-dcnode-id="3468" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="3466" instrument_node="">.</span><a class="workspace-trigger" data-dcnode-id="3463" href="#fn13" name="bfn13"><sup data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">13</span></sup></a><span data-dcnode-id="3462" instrument_node=""> Each coefficient estimate represents the effect of an additional car on the dependent variable for lottery losers. For example, according to row 1 of column 1, each additional car purchased by lottery losers would increase VKT by 12.2 km, almost tripling the average for losers of 6.7 km. Similarly, according to row 1 of column 2, each car added would raise time traveled using a car by 31.9 min, a large increase over the 18.6 min of average car time for lottery losers.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3245" id="tbl5"><span class="captions" data-dcnode-id="3453"><span data-dcnode-id="3454" id="cap0060"><p data-dcnode-id="3455" id="tspara0155"><span class="label" data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Table 5</span></span><span data-dcnode-id="3458" instrument_node="">. </span><span data-dcnode-id="3456" instrument_node="">IV regressions on travel distance and time by car.</span></p></span></span><div class="groups" data-dcnode-id="3260"><table data-dcnode-id="3261"><thead data-dcnode-id="3435"><tr class="rowsep-1 valign-top" data-dcnode-id="3445"><td data-dcnode-id="3450" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">Empty Cell</span></span></td><th colspan="2" data-dcnode-id="3448" scope="col"><span data-dcnode-id="3449" instrument_node="">All Travel</span></th><th colspan="2" data-dcnode-id="3446" scope="col"><span data-dcnode-id="3447" instrument_node="">Commute</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="3436"><th data-dcnode-id="3443" scope="col"><span data-dcnode-id="3444" instrument_node="">Distance (km)</span></th><th data-dcnode-id="3441" scope="col"><span data-dcnode-id="3442" instrument_node="">Time (min)</span></th><th data-dcnode-id="3439" scope="col"><span data-dcnode-id="3440" instrument_node="">Distance (km)</span></th><th data-dcnode-id="3437" scope="col"><span data-dcnode-id="3438" instrument_node="">Time (min)</span></th></tr></thead><tbody data-dcnode-id="3262"><tr class="valign-top" data-dcnode-id="3431"><td data-dcnode-id="3434"></td><td class="rowsep-1 align-left" colspan="4" data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">Lottery Entrants</span></td></tr><tr class="valign-top" ></tr><tr class="valign-top" data-dcnode-id="3263"><th class="align-left" data-dcnode-id="3272" scope="row"><em data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">R</span></em><sup data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">2</span></sup></th><td class="align-left" data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">0.025</span></td><td class="align-left" data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">0.017</span></td><td class="align-left" data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">0.017</span></td><td class="align-left" data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">0.020</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3246"></p><p data-dcnode-id="3249" id="tspara0160"><span data-dcnode-id="3259" instrument_node="">∗</span><em data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">p</span></em><span data-dcnode-id="3256" instrument_node=""> &lt; 0.10, ∗∗</span><em data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">p</span></em><span data-dcnode-id="3253" instrument_node=""> &lt; 0.05, ∗∗∗</span><em data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">p</span></em><span data-dcnode-id="3250" instrument_node=""> &lt; 0.01.</span></p><p data-dcnode-id="3247" id="tspara0165"><span data-dcnode-id="3248" instrument_node="">Regressions include only lottery entrants. All regressions include fixed effects for the day of the week of the interview, for the education level of the entrant, and for the month of entering the lottery. Standard errors are robust and clustered at the city district level.</span></p><p></p></div></div><p data-dcnode-id="3238" id="p0240"><span data-dcnode-id="3243" instrument_node="">Because the commute to work can affect labor market outcomes, we focus on reported trips to work.</span><a class="workspace-trigger" data-dcnode-id="3240" href="#fn14" name="bfn14"><sup data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">14</span></sup></a><span data-dcnode-id="3239" instrument_node=""> We also see very large changes in the distance commuted and average time spent commuting by car. Each car increases distance commuted by car by 5.8 km, which again would triple the average commute distance by car for losers of 2.8 km.</span></p><p data-dcnode-id="3236" id="p0245"><span data-dcnode-id="3237" instrument_node="">Results in the top panel show the effects of cars on travel behavior of lottery entrants. The bottom panel performs the same regressions, except that the dependent variable is the average for all household members of the lottery entrant. Because the unit of observation in these regressions is a lottery entrant, the definition of the dependent variables allows us to take advantage of the randomization of the lottery while characterizing the effects of cars on total household travel. We see the same pattern of results: each car causes large increases in the average distance and time traveled by car.</span></p></section><section data-dcnode-id="3137" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3229" id="sectitle0055"><span data-dcnode-id="3234" instrument_node="">4.2</span><span data-dcnode-id="3232" instrument_node="">. </span><span data-dcnode-id="3230" instrument_node="">Effect on rush hour travel</span></h3><div data-dcnode-id="3138"><p data-dcnode-id="3224" id="p0250"><span data-dcnode-id="3228" instrument_node="">We present our results on whether owning a car affects rush hour vehicle use in </span><a class="workspace-trigger" data-dcnode-id="3226" href="#tbl6" name="btbl6"><span data-dcnode-id="3227" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="3225" instrument_node="">. Cars have a large effect on driving during rush hour: each additional car purchase induced by winning the lottery increases morning rush hour car use by 33.2 percentage points, and increases evening rush hour use by 28.7 percentage points.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3139" id="tbl6"><span class="captions" data-dcnode-id="3216"><span data-dcnode-id="3217" id="cap0065"><p data-dcnode-id="3218" id="tspara0170"><span class="label" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Table 6</span></span><span data-dcnode-id="3221" instrument_node="">. </span><span data-dcnode-id="3219" instrument_node="">IV regressions on whether someone traveled during rush hour by car.</span></p></span></span><div class="groups" data-dcnode-id="3154"><table data-dcnode-id="3155"><thead data-dcnode-id="3207"><tr class="rowsep-1 valign-top" data-dcnode-id="3208"><td data-dcnode-id="3213" scope="col"><span class="screen-reader-only" data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="3211" scope="col"><span data-dcnode-id="3212" instrument_node="">Morning Rush Hour</span></th><th data-dcnode-id="3209" scope="col"><span data-dcnode-id="3210" instrument_node="">Evening Rush Hour</span></th></tr></thead><tbody data-dcnode-id="3156"><tr class="valign-top" data-dcnode-id="3196"><th class="align-left" data-dcnode-id="3205" scope="row"><span data-dcnode-id="3206" instrument_node="">Number of cars</span></th><td class="align-left" data-dcnode-id="3201"><span data-dcnode-id="3204" instrument_node="">0.332∗∗∗</span><br data-dcnode-id="3203"><span data-dcnode-id="3202" instrument_node="">(0.032)</span></td><td class="align-left" data-dcnode-id="3197"><span data-dcnode-id="3200" instrument_node="">0.287∗∗∗</span><br data-dcnode-id="3199"><span data-dcnode-id="3198" instrument_node="">(0.034)</span></td></tr><tr class="valign-top" data-dcnode-id="3185"><th class="align-left" data-dcnode-id="3194" scope="row"><span data-dcnode-id="3195" instrument_node="">Age of member</span></th><td class="align-left" data-dcnode-id="3190"><span data-dcnode-id="3193" instrument_node="">−0.000</span><br data-dcnode-id="3192"><span data-dcnode-id="3191" instrument_node="">(0.000)</span></td><td class="align-left" data-dcnode-id="3186"><span data-dcnode-id="3189" instrument_node="">−0.001∗</span><br data-dcnode-id="3188"><span data-dcnode-id="3187" instrument_node="">(0.000)</span></td></tr><tr class="valign-top" data-dcnode-id="3174"><th class="align-left" data-dcnode-id="3183" scope="row"><span data-dcnode-id="3184" instrument_node="">Is female</span></th><td class="align-left" data-dcnode-id="3179"><span data-dcnode-id="3182" instrument_node="">−0.105∗∗∗</span><br data-dcnode-id="3181"><span data-dcnode-id="3180" instrument_node="">(0.010)</span></td><td class="align-left" data-dcnode-id="3175"><span data-dcnode-id="3178" instrument_node="">−0.105∗∗∗</span><br data-dcnode-id="3177"><span data-dcnode-id="3176" instrument_node="">(0.006)</span></td></tr><tr class="valign-top" data-dcnode-id="3167"><th class="align-left" data-dcnode-id="3172" scope="row"><span data-dcnode-id="3173" instrument_node="">N</span></th><td class="align-left" data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">8057</span></td><td class="align-left" data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">8057</span></td></tr><tr class="valign-top" data-dcnode-id="3157"><th class="align-left" data-dcnode-id="3162" scope="row"><em data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">R</span></em><sup data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">2</span></sup></th><td class="align-left" data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">0.139</span></td><td class="align-left" data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">0.128</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3140"></p><p data-dcnode-id="3143" id="tspara0175"><span data-dcnode-id="3153" instrument_node="">∗</span><em data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">p</span></em><span data-dcnode-id="3150" instrument_node=""> &lt; 0.10, ∗∗</span><em data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">p</span></em><span data-dcnode-id="3147" instrument_node=""> &lt; 0.05, ∗∗∗</span><em data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">p</span></em><span data-dcnode-id="3144" instrument_node=""> &lt; 0.01.</span></p><p data-dcnode-id="3141" id="tspara0180"><span data-dcnode-id="3142" instrument_node="">Regressions include only lottery entrants. All regressions include fixed effects for the day of the week of the interview, for the education level of the entrant, and for the month of entering the lottery. Standard errors are robust and clustered at the city district level.</span></p><p></p></div></div></section></section><section data-dcnode-id="3117" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3130" id="sectitle0060"><span data-dcnode-id="3135" instrument_node="">5</span><span data-dcnode-id="3133" instrument_node="">. </span><span data-dcnode-id="3131" instrument_node="">Heterogeneity results</span></h2><p data-dcnode-id="3128" id="p0255"><span data-dcnode-id="3129" instrument_node="">We examine whether the effects of the number of cars on travel behavior varies by the entrant's age or entry date. Tables documenting these results are relegated to the appendix for brevity.</span></p><p data-dcnode-id="3126" id="p0260"><span data-dcnode-id="3127" instrument_node="">First, we examine whether the effects of winning the lottery varies across age groups. We interact the lottery status with a dummy variable equal to one if the individual is older than 40 (that is, we continue to assume that age is exogenous to travel behavior).</span></p><p data-dcnode-id="3124" id="p0265"><span data-dcnode-id="3125" instrument_node="">Our results show no clear variation with age when we examine the effect of car ownership on either total travel or commute. Again, the main shifts appear to occur in the mode of transportation. Although the age interactions are not statistically significant for total distance and car distance (for both commuting trips and all trips), the age interactions are positive and at least marginally statistically significant for all bus and subway travel and for commuting travel by bus. These results suggest that obtaining a car may cause older individuals to reduce bus or subway travel less than do younger individuals, perhaps because of differential preferences for public transportation across age groups.</span></p><p data-dcnode-id="3122" id="p0270"><span data-dcnode-id="3123" instrument_node="">Second, we examine how entry date might affect travel behavior. Early lottery entrants may have the highest demand for cars; they also are more likely than later entrants to have had sufficient time to adjust their lives in response to a car, for example by changing jobs or housing. In these regressions, we interact entry year fixed effects with lottery status.</span></p><p data-dcnode-id="3120" id="p0275"><span data-dcnode-id="3121" instrument_node="">We first examine whether the number of cars is affected by lottery entry date. We find that entrants in 2012 have the most cars and 2014 entrants have the least cars. However, 2011 entrants and 2013 entrants have very similar numbers of cars.</span></p><p data-dcnode-id="3118" id="p0280"><span data-dcnode-id="3119" instrument_node="">We find no statistically significant differences of travel behavior by entry date. Although there is some difference in the point estimates between entry years, there is no pattern. Our point estimates suggest that 2013 entrants increased their total travel more than did 2011 entrants, but 2014 entrants decreased travel. For commuting distance, 2012 entrants increased travel distance more than 2011 entrants, and 2013 entrants decreased travel. Differences across entry years are not statistically significant, and we conclude that date of entry seems to have no effect on our primary results.</span></p></section><section data-dcnode-id="3042" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3111" id="sectitle0065"><span data-dcnode-id="3116" instrument_node="">6</span><span data-dcnode-id="3114" instrument_node="">. </span><span data-dcnode-id="3112" instrument_node="">Calculations of policy impacts</span></h2><section data-dcnode-id="3071" id="sec6.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3105" id="sectitle0070"><span data-dcnode-id="3110" instrument_node="">6.1</span><span data-dcnode-id="3108" instrument_node="">. </span><span data-dcnode-id="3106" instrument_node="">The potential aggregate impact of vehicle ownership restrictions on the vehicle stock</span></h3><p data-dcnode-id="3103" id="p0285"><span data-dcnode-id="3104" instrument_node="">We use the reduced-form estimates to calculate the effect of ownership restrictions on the stock of cars in Beijing. As we noted in the introduction, these are partial equilibrium calculations, in the sense that we hold fixed at observed levels congestion and other factors that may affect vehicle ownership.</span></p><p data-dcnode-id="3098" id="p0290"><span data-dcnode-id="3102" instrument_node="">More specifically, we assume that if the lottery had not existed, individuals in households who entered the lottery and lost would have been as likely to purchase a car as individuals who entered the lottery at the same time and won. This assumption is supported by the observation that winners and losers are quite similar along observable dimensions (see </span><a class="workspace-trigger" data-dcnode-id="3100" href="#tbl2" name="btbl2"><span data-dcnode-id="3101" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="3099" instrument_node="">), and that randomization of the lottery implies that lottery losers would behave like winners if they had the right to obtain a car. We also assume that individuals who do not enter the lottery would not have purchased a car in the absence of the lottery policy. The lottery entry process involves a short online application with no entry fee; as a result, the cost of entering the lottery is near zero and anyone wishing to purchase a car should have entered.</span></p><p data-dcnode-id="3090" id="p0295"><span data-dcnode-id="3097" instrument_node="">Under the first assumption, our estimates from </span><a class="workspace-trigger" data-dcnode-id="3095" href="#tbl3" name="btbl3"><span data-dcnode-id="3096" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="3094" instrument_node=""> suggest that lottery losers have about 0.64 fewer cars than lottery winners, a reduction of more than half from the 1.21 cars of lottery winners. The estimate of 0.64 is the average difference of the number of cars between winners and losers.</span><a class="workspace-trigger" data-dcnode-id="3091" href="#fn15" name="bfn15"><sup data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">15</span></sup></a></p><p data-dcnode-id="3088" id="p0300"><span data-dcnode-id="3089" instrument_node="">If all losers were hypothetically given the right to obtain an additional car, some of the losers may decide not to obtain a car. The reason is that, to increase their chances of winning, some households have multiple entrants even if they intend to obtain only one additional car. For example, consider a household that has one winner and one loser, but which only wants one additional car. If the loser were given the right to obtain a car, the loser would choose not to obtain a car because the winner already obtained one.</span></p><p data-dcnode-id="3086" id="p0305"><span data-dcnode-id="3087" instrument_node="">As a conservative assumption, we assume that for any household with multiple entrants that include at least one winner, the household would not obtain multiple cars if more than one loser were given the right to obtain a new car. Of the 7278 losers in the survey data, there are 6275 losers from households that do not contain any winners. This assumption is conservative to the extent that any households in our data wish to add multiple vehicles. Under this assumption, we multiply 0.64 cars by the number of households without any winners to determine that Beijing vehicle ownership restrictions removed (0.64∗6275)&nbsp;=&nbsp;4016 new cars from entrants in our sample.</span></p><p data-dcnode-id="3084" id="p0310"><span data-dcnode-id="3085" instrument_node="">Above we noted the possibility that the lottery pulls forward a certain amount of sales, which arises from the fact that the lottery creates uncertainty about when a household can obtain a new car. Because of this uncertainty, individuals may enter the lottery prior to the date they would have purchased a car in the absence of the lottery. If we do not adjust our estimates by this effect, we would overstate the effect of the lottery on the stock of cars. However, as we explain next we can obtain an upper bound on this effect, which yields a lower bound on the change in car stock.</span></p><p data-dcnode-id="3079" id="p0315"><span data-dcnode-id="3083" instrument_node="">Our data show that 1.10 million people entered the lottery in 2011, with this level continuing into early 2012. During the 12-month period prior to the announcement of the lottery, total new car sales in Beijing were 832,416. If we assume that in the absence of the lottery, vehicle sales would have remained at pre-lottery levels, we estimate that (100%∗(1.10 million - 832,416)/1.10 million)&nbsp;=&nbsp;24% of lottery participants were pulled forward. This estimate of the pull-forward effect is an upper bound because it does not account for the fact that about 10% of lottery winners do not purchase a car. Moreover, the use of 2010 sales to proxy for counterfactual 2011 sales is also likely to over-estimate this effect, because vehicle sales in Beijing would probably have increased in the absence of the lottery. </span><a class="workspace-trigger" data-dcnode-id="3081" href="#bib18" name="bbib18"><span data-dcnode-id="3082" instrument_node="">Yang et al. (2014)</span></a><span data-dcnode-id="3080" instrument_node=""> show that car sales increased at double digit growth rates in the years prior to the lottery.</span></p><p data-dcnode-id="3077" id="p0320"><span data-dcnode-id="3078" instrument_node="">Adjusting our estimate of 4016 cars removed by the pull-forward effect yields an estimate of (4016∗(1–0.24))&nbsp;=&nbsp;3031 cars removed by the lottery. The full BTRC survey, representative of the entire city of Beijing and including nonparticipants, has 19,217 cars among those surveyed. This implies that the stock of cars in Beijing would have been (100∗3031/19,217)&nbsp;=&nbsp;16% bigger in the absence of ownership restrictions.</span></p><p data-dcnode-id="3072" id="p0325"><span data-dcnode-id="3076" instrument_node="">We calculate that the stock of vehicles in Beijing has been reduced by (100%∗3031/(3031&nbsp;+&nbsp;19,217))&nbsp;=&nbsp;14% in 2014, a larger decrease than previous work has suggested. </span><a class="workspace-trigger" data-dcnode-id="3074" href="#bib18" name="bbib18"><span data-dcnode-id="3075" instrument_node="">Yang et al. (2014)</span></a><span data-dcnode-id="3073" instrument_node=""> predicted that vehicle ownership restrictions would reduce the stock of cars in Beijing by 11% in the year 2020. While that work used simple extrapolation techniques to estimate the counterfactual, this present paper has the advantage of natural experiment-based identification. Moreover, Yang et al. overestimated the stock of cars under the policy because they assumed that each lottery winner would add one car to the stock of cars of Beijing; this does not account for the fact that many lottery winners choose not to add a car.</span></p></section><section data-dcnode-id="3043" id="sec6.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3065" id="sectitle0075"><span data-dcnode-id="3070" instrument_node="">6.2</span><span data-dcnode-id="3068" instrument_node="">. </span><span data-dcnode-id="3066" instrument_node="">The potential aggregate impact of vehicle ownership restrictions on travel</span></h3><p data-dcnode-id="3063" id="p0330"><span data-dcnode-id="3064" instrument_node="">The above estimates yield the average changes in car use for lottery losers if they were allowed to purchase cars. In this subsection, we place these individual-level results into the broader policy context of Beijing by examining three city-level outcomes: total daily VKT, morning rush hour car use, and evening rush hour car use. These calculations are not meant to estimate the counterfactual vehicle usage levels if vehicle ownership restrictions were not in place, but instead are intended to show how sizeable the reductions of car usage are compared to existing usage.</span></p><p data-dcnode-id="3061" id="p0335"><span data-dcnode-id="3062" instrument_node="">These calculations depend on three assumptions: first, that losers would behave like winners in the absence of the lottery; second, that lottery winners in the absence of vehicle ownership restrictions would behave in the same way; and third, that the behavior of non-entrants would not change in the absence of the lottery. In other words, we are able to examine the direct effects of vehicle ownership restrictions, but not the indirect effects. In particular, if vehicle ownership restrictions reduced congestion, we are unable to observe travel behavior in the presence of the counterfactual congestion. As with the vehicle stock calculations, because of this assumption we consider the results to be partial equilibrium.</span></p><p data-dcnode-id="3049" id="p0340"><span data-dcnode-id="3060" instrument_node="">We first examine the importance of vehicle ownership restrictions on Beijing's total daily VKT. According to reduced-form estimates from </span><a class="workspace-trigger" data-dcnode-id="3058" href="#tbl3" name="btbl3"><span data-dcnode-id="3059" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="3057" instrument_node="">, giving a loser the right to obtain a car would increase VKT by 7.9&nbsp;km. Since there are 6275 lottery losers, total VKT for our sample would be increased by (7.9∗6275&nbsp;=&nbsp;) 49,573&nbsp;km.</span><a class="workspace-trigger" data-dcnode-id="3054" href="#fn16" name="bfn16"><sup data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">16</span></sup></a><span data-dcnode-id="3053" instrument_node=""> This represents a 72% increase in VKT among losers, a 49% increase among all lottery participants, and a (100%∗49,573/336,298&nbsp;=&nbsp;) 15% increase among all households in our sample.</span><a class="workspace-trigger" data-dcnode-id="3050" href="#fn17" name="bfn17"><sup data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">17</span></sup></a></p><p data-dcnode-id="3044" id="p0345"><span data-dcnode-id="3048" instrument_node="">We next study the importance of vehicle ownership restrictions on morning and evening rush hour car use. Based on the reduced-form estimates from </span><a class="workspace-trigger" data-dcnode-id="3046" href="#tbl3" name="btbl3"><span data-dcnode-id="3047" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="3045" instrument_node="">, giving losers the right to purchase cars would cause them to drive an additional (0.211∗6275&nbsp;=&nbsp;) 1324 cars during the morning rush hour and (0.183∗6275&nbsp;=&nbsp;) 1148 cars during the evening rush hour. The full survey sample includes 13,555 individuals who travel by car during the morning rush hour period and 12,152 individuals who travel by car during the evening rush hour period. If all losers were given the right to buy cars, morning and evening rush hour car use would increase by 10%, meaning that the lottery has reduced rush hour car use by 9%. These are large effects that suggest that the policy has heavily reduced congestion during peak hours.</span></p></section></section><section data-dcnode-id="3015" id="sec7"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3036" id="sectitle0080"><span data-dcnode-id="3041" instrument_node="">7</span><span data-dcnode-id="3039" instrument_node="">. </span><span data-dcnode-id="3037" instrument_node="">Discussion and conclusion</span></h2><p data-dcnode-id="3034" id="p0350"><span data-dcnode-id="3035" instrument_node="">The Beijing license plate lottery has sharply reduced vehicle ownership, total travel, and driving during morning and evening rush hours. Winners of the lottery own more than twice as many cars as losers. Moreover, winners drive twice as much as losers, both overall and during morning and evening rush hours. These findings contrast with the mixed evidence regarding the success of vehicle driving restrictions, and they suggest that restricting vehicle ownership can sharply reduce traffic congestion, accidents, and pollution.</span></p><p data-dcnode-id="3032" id="p0355"><span data-dcnode-id="3033" instrument_node="">We also report partial equilibrium estimates of the effects of the lottery on the total stock of cars in Beijing and on total travel. Restricting vehicle ownership has reduced the total stock of cars by 14%, a large amount. The results imply that removing the lottery would increase total VKT in Beijing by 15% and increase morning and evening rush hour car use by 10%. The lottery has sharply reduced driving, which should result in large decreases in congestion. Reductions in driving and congestion would also mean lower air pollution and greenhouse gas emissions. These findings point to the effectiveness of vehicle ownership restriction policies at reducing driving. However, these calculations may overstate the aggregate effects of the lottery to the extent that the initial drop in congestion caused by the lottery increases vehicle ownership and driving in the long run.</span></p><p data-dcnode-id="3030" id="p0360"><span data-dcnode-id="3031" instrument_node="">We find that each additional car roughly triples VKT, which has implications for long-run growth in privately owned vehicle use and fuel consumption. If the relationship holds more broadly, it suggests that future fuel consumption, pollution emissions, and vehicle usage may increase even more quickly than vehicle ownership. Projecting fuel consumption and pollution emissions depends partly on projecting vehicle ownership, a finding that may be useful in the important literature on vehicular contributions to environmental problems.</span></p><p data-dcnode-id="3028" id="p0365"><span data-dcnode-id="3029" instrument_node="">We offer a few caveats related to the external validity of our findings, besides those already noted. First, we believe that our findings apply primarily to large urban cities like Beijing, which combines notoriously high congestion with an extensive public transportation system. To avoid decreasing travel distances or times, other cities contemplating vehicle ownership restrictions should have public transportation in place to provide substitutes for cars taken off the road.</span></p><p data-dcnode-id="3023" id="p0370"><span data-dcnode-id="3027" instrument_node="">Second, car ownership restrictions may reduce congestion (</span><a class="workspace-trigger" data-dcnode-id="3025" href="#bib18" name="bbib18"><span data-dcnode-id="3026" instrument_node="">Yang et al., 2014</span></a><span data-dcnode-id="3024" instrument_node="">) and increase the value and use of new cars. The effects on car use of newly-enacted ownership restrictions, such as the Beijing license plate lottery, may differ from the effects of long-standing policies.</span></p><p data-dcnode-id="3018" id="p0375"><span data-dcnode-id="3022" instrument_node="">Third, the mechanism of the lottery required only an online application and entry was free. As a result, some Beijing residents entered the lottery because they anticipated the possibility of needing a car, and purchased a car when they won because they did not expect to be able to win a second time. Many lottery winners also did not add vehicles to their households. Therefore, the lottery should be regarded as a random mechanism allocating </span><em data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">options</span></em><span data-dcnode-id="3019" instrument_node=""> to purchase cars, rather than allocating cars directly.</span></p><p data-dcnode-id="3016" id="p0380"><span data-dcnode-id="3017" instrument_node="">Finally, as we noted above, taxi use and ridesharing was relatively uncommon during our sample period. The fact that taxi use remained low throughout the sample suggests that restricting ownership did not appreciably affect taxi use. However, it is possible that continued ownership restrictions could cause nontrival increases in ridesharing, which is an important topic for future research.</span></p></section></div><div class="Appendices" data-dcnode-id="1304"><section data-dcnode-id="1331" id="appsec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3010"><span data-dcnode-id="3013" instrument_node="">Appendix A</span><span data-dcnode-id="3011" instrument_node="">. </span></h2><p data-dcnode-id="1332" id="p0385"><span class="display" data-dcnode-id="2747"></span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="2748" id="dtbl1"><span class="captions" data-dcnode-id="3003"><span data-dcnode-id="3004" id="cap0010"><p data-dcnode-id="3005" id="tspara0010"><span class="label" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Appendix Table&nbsp;1</span></span><span data-dcnode-id="3007" instrument_node="">. </span><span data-dcnode-id="3006" instrument_node="">Comparability of Lottery Entrants Winning and Not Winning the Lottery, by Year of Entry. licy</span></h3></a><div class="article-source ellipsis" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">2022, Energy</span></div></div><div class="buttons" data-dcnode-id="527"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="528" type="button"><span class="button-link-text" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="529" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="530"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="522"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="523" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="524"><p data-dcnode-id="525" id="abspara0010"><span data-dcnode-id="526" instrument_node="">To reduce traffic congestion and protect the environment, license plate control (LPC) policy has been implemented in Beijing since 2011. In 2019, 100,000 vehicle license plates were distributed, including 60,000 for electric vehicles (EVs) and 40,000 for gasoline vehicle (GVs). However, whether the current license plate allocation is optimal from a social welfare maximization perspective remains unclear. This paper proposes a two-level Stackelberg game, which portrays the interaction between vehicle applicants and the government to quantify the optimal number of EV license plates under the LPC policy in Beijing. The equilibrium number of EV license plates derived from the Stackelberg model is 58,800, which could increase the social welfare by 0.38%. Sensitivity analysis is conducted to illustrate the impact of important influential factors — total license plate quota, vehicle rental fee, and energy price — on EV adoption. The LPC policy under COVID-19 is also studied through a scenario analysis. If the government additionally increases the total quota by 20,000, 24% could be allocated to GV and 76% to EV. One third reduction of the current vehicle rental fee could increase EV license plates by 10.5%. In terms of energy prices, when gasoline price is low, reducing electricity prices could contribute to EV adoption significantly, while that effect tapers off as gasoline prices increase.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="503"><div class="sub-heading" data-dcnode-id="515"><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0967070X22000312" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="519" id="citing-articles-article1-title"><span data-dcnode-id="520" instrument_node="">Transport accessibility and affordability as the determinant of non-motorized commuting in rural India</span></h3></a><div class="article-source ellipsis" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">2022, Transport Policy</span></div></div><div class="buttons" data-dcnode-id="509"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="510" type="button"><span class="button-link-text" data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="511" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="512"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="504"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="505" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="506"><p data-dcnode-id="507" id="abspara0010"><span data-dcnode-id="508" instrument_node="">Active modes of travel are effective transportation means for accessibility to opportunity in the less-developed regions. There has been less focus on rural commuting in context to developing nations where there is existing ‘accessibility poverty’ in the regions. Earlier studies focused on India's megaregions as a case study region, but factors like vehicle ownership and ease of travel from home to transport modes and/or transport infrastructures were overlooked. The present study assesses the other side of the Indian regional physiognomies, which is predominantly rural and primarily the source of the labor force and marginal workers for all other regions of India. The present study poses the question, ‘What kind of modal accessibility and transport-related affordability influences the various ranges of commuting distances in the rural settings?’ specifically in the Indian rural context and the non-motorized milieu. Multivariate regression analysis is used to investigate the determinant of the share of commuting on foot and by bicycle as a mode of travel as a dependent variable. The key outcomes from the research are: (i) Bicycle ownership by the household appears as the primary determinant for opting ‘on foot’ or by bicycle mode of travel to work. (ii) Despite the proximity to public transport and paratransit modes, commuters optioned for bicycles. (iii) The presence of a high share of disadvantaged groups in the district leads to ‘on foot’ even for long walking distances. (iv) Transport-related variables as the determinant are critical for short-distance commute, while socio-economic variables are crucial for long-distance commuting.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="485"><div class="sub-heading" data-dcnode-id="497"><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0967070X21003073" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="501" id="citing-articles-article2-title"><span data-dcnode-id="502" instrument_node="">Determinants of city-level private car ownership: Effect of vehicle regulation policies and the relative price</span></h3></a><div class="article-source ellipsis" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">2022, Transport Policy</span></div></div><div class="buttons" data-dcnode-id="491"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="492" type="button"><span class="button-link-text" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="493" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="494"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="486"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="487" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="488"><p data-dcnode-id="489" id="abspara0010"><span data-dcnode-id="490" instrument_node="">Despite many prior studies about the determinants of city-level private car ownership in China, limited studies investigate the effects of vehicle regulation policies and relative price (the ratio of the average car price to GDP per capita) on city-level private car ownership simultaneously. Thus, panel data of 212 cities in China from 2006 to 2015 were collected to explore these effects. The potential explanatory variables include relative price, vehicle regulation policies, socio-economic factors, urban characteristics of the city, and transportation-related factors. The pooled model, fixed-effects model, and random effects model are constructed to analyze the panel data. With the fixed effect on the temporal trend, the fixed-effects model turns out to be the best. Variables including relative price, license plate lottery, vehicle use restriction based on the last digit of the license plate, the average salary of employed workers, and the number of taxis per 10,000 population are all found significant. Supportive policies for alternative fuel cars do not significantly affect private car ownership. One percent increase in the relative price is associated with a 0.08% decrease in private car ownership. The license plate lottery and vehicle use restriction policies would reduce private car ownership by 18.94% and 7.7%, respectively. The finding of this study could provide a helpful reference for policymakers to develop appropriate measures to control the growth of private car ownership of a city.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="446"><div class="sub-heading" data-dcnode-id="479"><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0966692321002544" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="483" id="citing-articles-article3-title"><span data-dcnode-id="484" instrument_node="">Do spatial factors outweigh institutional factors? Changes in influencing factors of home-work separation from 2007 to 2017 in Beijing</span></h3></a><div class="article-source ellipsis" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">2021, Journal of Transport Geography</span></div></div><div class="buttons" data-dcnode-id="473"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="474" type="button"><span class="button-link-text" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="475" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="476"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="447"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="448" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="449"><p data-dcnode-id="450" id="sp0030"><span data-dcnode-id="472" instrument_node="">Extensive literature has investigated the impacts of different influencing factors on home-work separation in urban China. However, most studies have adopted a cross-sectional design, which provides little direct evidence on changing trends in these effects in the context of rapid urban transformation. This study examined the 10-year changes in the factors influencing home-work separation in Beijing. By drawing on community surveys conducted in 2007 and 2017, we constructed two regression models under the same framework, considering the implications of sociodemographic, built environment and institutional factors on home-work separation in the respective year. A </span><em data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">t</span></em><span data-dcnode-id="469" instrument_node="">-test was employed to compare the effects of the same factors on home-work separation between the 2007 and 2017 models. We found that the relationships between the influencing factors and residential home-work separation changed substantially from 2007 to 2017, indicating dramatic urban transformations in Chinese cities. Specifically, the effects of the built environment measured by population density and jobs-to-housing ratio became stronger, reflecting the rapid urban expansion and suburbanization of Chinese cities. The effect of </span><em data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">danwei</span></em><span data-dcnode-id="466" instrument_node=""> system became weaker due to the removal of the housing provision responsibility of </span><em data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">danwei</span></em><span data-dcnode-id="463" instrument_node=""> as well as the dissolution of existing </span><em data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">danwei.</span></em><span data-dcnode-id="460" instrument_node=""> The direction of the effect of </span><em data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">hukou</span></em><span data-dcnode-id="457" instrument_node=""> changed from negative to positive because of the relaxation of the </span><em data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">hukou</span></em><span data-dcnode-id="454" instrument_node=""> system. In addition, the effects of sociodemographic attributes changed. The effects of socioeconomic attributes reflecting the market force such as income and education level became stronger, while the effects of demographic attributes related to social role such as gender and age became weaker. We further discuss the debate on institutional constraints and the legacy of </span><em data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">danwei</span></em><span data-dcnode-id="451" instrument_node="">, the transformations in Chinese cities, and the implications for policymaking aiming to reduce home-work separation.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="435"><div class="sub-heading" data-dcnode-id="440"><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1002/cl2.1203" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="444" id="citing-articles-article4-title"><span data-dcnode-id="445" instrument_node="">Studies of the effectiveness of transport sector interventions in low- and middle-income countries: An evidence and gap map</span></h3></a><div class="article-source ellipsis" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">2021, Campbell Systematic Reviews</span></div></div><div class="buttons" data-dcnode-id="439"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="436"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="437" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="438"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="424"><div class="sub-heading" data-dcnode-id="429"><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/ijgi10090622" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="433" id="citing-articles-article5-title"><span data-dcnode-id="434" instrument_node="">Exploring the factors of intercity ridesplitting based on observed and gis data: A case study in china</span></h3></a><div class="article-source ellipsis" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">2021, ISPRS International Journal of Geo-Information</span></div></div><div class="buttons" data-dcnode-id="428"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="425"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="426" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="427"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85075956211%26md5%3D52d9d894a11584aa2be7184bc173f219" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="421" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="422"></path></svg><span class="button-alternative-text" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="400"><dt class="footnote-label" data-dcnode-id="410"><sup data-dcnode-id="411"><a data-dcnode-id="412" href="#baep-article-footnote-id1"><span data-dcnode-id="413" instrument_node="">☆</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="401"><p data-dcnode-id="402" id="ntpara0010"><span data-dcnode-id="409" instrument_node="">Financial support from the </span><span data-dcnode-id="407" id="gs1"><span data-dcnode-id="408" instrument_node="">National Science Foundation of China</span></span><span data-dcnode-id="406" instrument_node=""> (Grant #</span><a data-dcnode-id="404" href="#gs1"><span data-dcnode-id="405" instrument_node="">71403279</span></a><span data-dcnode-id="403" instrument_node="">) is gratefully acknowledged. The authors are grateful to Michael Anderson, Mark Jacobsen, Shanjun Li, and participants in the NBER Environmental and Energy Economics workshop for their helpful comments.</span></p></dd></dl><dl class="footnote" data-dcnode-id="381"><dt class="footnote-label" data-dcnode-id="396"><sup data-dcnode-id="397"><a data-dcnode-id="398" href="#bfn1"><span data-dcnode-id="399" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="382"><p data-dcnode-id="383" id="ntpara0015"><a class="workspace-trigger" data-dcnode-id="394" href="#bib11" name="bbib11"><span data-dcnode-id="395" instrument_node="">Raphael and Rice (2002)</span></a><span data-dcnode-id="393" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="391" href="#bib10" name="bbib10"><span data-dcnode-id="392" instrument_node="">Ong (2002)</span></a><span data-dcnode-id="390" instrument_node=""> attempt to overcome this endogeneity by instrumenting for car ownership using variables such as state-level insurance premiums, gasoline taxes, and population density. These instruments may remove endogeneity concerns at the individual level, but are still open to endogeneity concerns at the level of the locality, since states with households that favor driving may enact favorable policies. A number of studies simultaneously model vehicle ownership and use (e.g., </span><a class="workspace-trigger" data-dcnode-id="388" href="#bib16" name="bbib16"><span data-dcnode-id="389" instrument_node="">West, 2004</span></a><span data-dcnode-id="387" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="385" href="#bib1" name="bbib1"><span data-dcnode-id="386" instrument_node="">Bento et al., 2009</span></a><span data-dcnode-id="384" instrument_node="">), but these cannot overcome the problem of unobserved confounders.</span></p></dd></dl><dl class="footnote" data-dcnode-id="370"><dt class="footnote-label" data-dcnode-id="377"><sup data-dcnode-id="378"><a data-dcnode-id="379" href="#bfn2"><span data-dcnode-id="380" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="371"><p data-dcnode-id="372" id="ntpara0020"><span data-dcnode-id="376" instrument_node="">Our estimates on the effect of Beijing's ownership restrictions are about 27 percent larger than the reduction estimated by </span><a class="workspace-trigger" data-dcnode-id="374" href="#bib18" name="bbib18"><span data-dcnode-id="375" instrument_node="">Yang et al. (2014)</span></a><span data-dcnode-id="373" instrument_node="">. This is due primarily to differences in methodology: they use simple extrapolations, while we use natural experiment-driven variation in vehicle ownership.</span></p></dd></dl><dl class="footnote" data-dcnode-id="362"><dt class="footnote-label" data-dcnode-id="366"><sup data-dcnode-id="367"><a data-dcnode-id="368" href="#bfn3"><span data-dcnode-id="369" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="363"><p data-dcnode-id="364" id="ntpara0025"><span data-dcnode-id="365" instrument_node="">We examine whether this set of rules causes lottery losers to evade these rules by purchasing cars and shifting car travel to non-peak hours. While lottery winners drive more than lottery losers during each hour of the day, both have approximately the same distribution of vehicle usage by hour of day, suggesting that this form of avoidance is not a major concern.</span></p></dd></dl><dl class="footnote" data-dcnode-id="354"><dt class="footnote-label" data-dcnode-id="358"><sup data-dcnode-id="359"><a data-dcnode-id="360" href="#bfn4"><span data-dcnode-id="361" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="355"><p data-dcnode-id="356" id="ntpara0030"><span data-dcnode-id="357" instrument_node="">As in other settings, cars may be driven into Beijing with license plates from other cities. However, cars without Beijing license plates are subject to the continuous threat of fines during restricted hours.</span></p></dd></dl><dl class="footnote" data-dcnode-id="346"><dt class="footnote-label" data-dcnode-id="350"><sup data-dcnode-id="351"><a data-dcnode-id="352" href="#bfn5"><span data-dcnode-id="353" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="347"><p data-dcnode-id="348" id="ntpara0035"><span data-dcnode-id="349" instrument_node="">It is unlikely that households would mis-represent on the survey the number of vehicles owned. The survey is conducted by a private firm (hired by the BTRC), and not by government officials. Additionally, there are no penalties for car ownership as long as the car is not driven during rush hours.</span></p></dd></dl><dl class="footnote" data-dcnode-id="335"><dt class="footnote-label" data-dcnode-id="342"><sup data-dcnode-id="343"><a data-dcnode-id="344" href="#bfn6"><span data-dcnode-id="345" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="336"><p data-dcnode-id="337" id="ntpara0040"><span data-dcnode-id="341" instrument_node="">Differences in some characteristics between treatment and control groups can arise purely out of chance. Even differences of statistical significance are fairly common in pure lotteries, such as those in </span><a class="workspace-trigger" data-dcnode-id="339" href="#bib3" name="bbib3"><span data-dcnode-id="340" instrument_node="">Dobbie and Fryer (2011)</span></a><span data-dcnode-id="338" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="327"><dt class="footnote-label" data-dcnode-id="331"><sup data-dcnode-id="332"><a data-dcnode-id="333" href="#bfn7"><span data-dcnode-id="334" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="328"><p data-dcnode-id="329" id="ntpara0045"><span data-dcnode-id="330" instrument_node="">The BTRC survey asks each household to report the age of the car and monthly spending on fuel. Because these variables are self-reported, responses are usually rounded approximations. For example, the most common response to this question was that spending on fuel was 1000 RMB.</span></p></dd></dl><dl class="footnote" data-dcnode-id="319"><dt class="footnote-label" data-dcnode-id="323"><sup data-dcnode-id="324"><a data-dcnode-id="325" href="#bfn8"><span data-dcnode-id="326" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="320"><p data-dcnode-id="321" id="ntpara0050"><span data-dcnode-id="322" instrument_node="">Ideally, we would be able to observe the distance traveled by observing the route selection of each person during each trip. Because this is not feasible, we estimate the daily distance traveled. First, we divide Beijing into approximately 1600 traffic zones defined by the survey administrators. Each traffic zone is about 1 square km. In the travel survey, the origin and destination of each trip are placed into a traffic zone in Beijing, and the straight-line distances between the centroids of the pairs of traffic zones are calculated. Because the size of the traffic zones is small, this imputation is likely to introduce only a small amount of measurement error. In addition, travel times are not affected by this source of measurement error.</span></p></dd></dl><dl class="footnote" data-dcnode-id="311"><dt class="footnote-label" data-dcnode-id="315"><sup data-dcnode-id="316"><a data-dcnode-id="317" href="#bfn9"><span data-dcnode-id="318" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="312"><p data-dcnode-id="313" id="ntpara0055"><span data-dcnode-id="314" instrument_node="">Note that our fixed effects imply that the coefficient is unbiased even if the ownership restrictions caused individuals to enter the lottery who would have delayed purchasing a new car in the absence of the lottery. Such a “pull-forward” effect would not bias the estimates because the randomization of the lottery implies that the winning and losing households contain similar proportions of such households. Below, we estimate the magnitude of the pull-forward effect to extrapolate our results outside the lottery sample.</span></p></dd></dl><dl class="footnote" data-dcnode-id="303"><dt class="footnote-label" data-dcnode-id="307"><sup data-dcnode-id="308"><a data-dcnode-id="309" href="#bfn10"><span data-dcnode-id="310" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="304"><p data-dcnode-id="305" id="ntpara0060"><span data-dcnode-id="306" instrument_node="">We note that lottery entrants include people who entered between 2011 and 2014. Our estimate is therefore an average treatment effect over these years.</span></p></dd></dl><dl class="footnote" data-dcnode-id="292"><dt class="footnote-label" data-dcnode-id="299"><sup data-dcnode-id="300"><a data-dcnode-id="301" href="#bfn11"><span data-dcnode-id="302" instrument_node="">11</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="293"><p data-dcnode-id="294" id="ntpara0065"><span data-dcnode-id="298" instrument_node="">In informal conversations with Beijing residents, we find that some individuals use cars that relatives and friends have won in the lottery. </span><a class="workspace-trigger" data-dcnode-id="296" href="#bib18" name="bbib18"><span data-dcnode-id="297" instrument_node="">Yang et al. (2014)</span></a><span data-dcnode-id="295" instrument_node=""> note that some individuals purchased license plates through car dealers who hoarded plates prior to the advent of the vehicle lottery.</span></p></dd></dl><dl class="footnote" data-dcnode-id="284"><dt class="footnote-label" data-dcnode-id="288"><sup data-dcnode-id="289"><a data-dcnode-id="290" href="#bfn12"><span data-dcnode-id="291" instrument_node="">12</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="285"><p data-dcnode-id="286" id="ntpara0070"><span data-dcnode-id="287" instrument_node="">Travel by taxi or ridesharing services is relatively uncommon in our sample, accounting for a small share of total VKT.</span></p></dd></dl><dl class="footnote" data-dcnode-id="276"><dt class="footnote-label" data-dcnode-id="280"><sup data-dcnode-id="281"><a data-dcnode-id="282" href="#bfn13"><span data-dcnode-id="283" instrument_node="">13</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="277"><p data-dcnode-id="278" id="ntpara0075"><span data-dcnode-id="279" instrument_node="">The F-statistic for the first stage is 517.22, suggesting that this regression does not suffer from the problem of weak instruments bias.</span></p></dd></dl><dl class="footnote" data-dcnode-id="268"><dt class="footnote-label" data-dcnode-id="272"><sup data-dcnode-id="273"><a data-dcnode-id="274" href="#bfn14"><span data-dcnode-id="275" instrument_node="">14</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="269"><p data-dcnode-id="270" id="ntpara0080"><span data-dcnode-id="271" instrument_node="">We define a trip as a “commute” if the destination is the office and the stated purpose of the trip is going to work.</span></p></dd></dl><dl class="footnote" data-dcnode-id="260"><dt class="footnote-label" data-dcnode-id="264"><sup data-dcnode-id="265"><a data-dcnode-id="266" href="#bfn15"><span data-dcnode-id="267" instrument_node="">15</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="261"><p data-dcnode-id="262" id="ntpara0085"><span data-dcnode-id="263" instrument_node="">We note that lottery entrants include people who entered between 2011 and 2014. Our estimate is therefore an average treatment effect over these years.</span></p></dd></dl><dl class="footnote" data-dcnode-id="252"><dt class="footnote-label" data-dcnode-id="256"><sup data-dcnode-id="257"><a data-dcnode-id="258" href="#bfn16"><span data-dcnode-id="259" instrument_node="">16</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="253"><p data-dcnode-id="254" id="ntpara0090"><span data-dcnode-id="255" instrument_node="">Above we noted the possibility that the lottery could create a pull-forward effect, in which households that would have otherwise delayed purchasing a vehicle instead enter the lottery. Such an effect would not bias the reduced-form estimates. To the extent that such households drive less during the travel day than other households, we would underestimate the effect of the lottery on aggregate VKT.</span></p></dd></dl><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="248"><sup data-dcnode-id="249"><a data-dcnode-id="250" href="#bfn17"><span data-dcnode-id="251" instrument_node="">17</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246" id="ntpara0095"><span data-dcnode-id="247" instrument_node="">To put this figure in context, about 20% of households had at least one member enter the lottery. Households of lottery entrants account for about 32% of all driving.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0095069619300300"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2019 Elsevier Inc. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewB
