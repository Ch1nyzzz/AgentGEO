</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>To combat traffic congestion and air pollution, many cities restrict vehicle ownership, but little is known about how these policies actually affect vehicle ownership, use, or travel time. Leveraging the randomization created by Beijing&amp;#x27;s vehicle license plate lottery, we estimate the effects of the policy on travel behavior. We find that the policy reduces the total stock of cars in Beijing by 14%. It also causes large reductions in vehicle distance traveled, morning rush hour driving, and evening rush hour driving.</p></div></div></div>" data-dcnode-id="5586" lang="en" name="citation_abstract"><span data-dcnode-id="5585" instrument_node="">

icon-cited-by-66" data-dcnode-id="5098" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="5099" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="5085" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jeem.2019.102269" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="5089" instrument_node="">https://doi.org/10.1016/j.jeem.2019.102269</span></a><a class="rights-and-content" data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0095069619300300%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5087" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5084"></section><section class="ReferencedArticles" data-dcnode-id="5083"></section><div class="PageDivider" data-dcnode-id="5082"></div><div class="Abstracts u-font-serif" data-dcnode-id="5075" id="abstracts"><div class="abstract author" data-dcnode-id="5076" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">Abstract</span></h2><div data-dcnode-id="5077" id="abssec0010"><p data-dcnode-id="5078" id="abspara0010"><span data-dcnode-id="5079" instrument_node="">To combat traffic congestion and air pollution, many cities restrict vehicle ownership, but little is known about how these policies actually affect vehicle ownership, use, or travel time. Leveraging the randomization created by Beijing's vehicle license plate lottery, we estimate the effects of the policy on travel behavior. We find that the policy reduces the total stock of cars in Beijing by 14%. It also causes large reductions in vehicle distance traveled, morning rush hour driving, and evening rush hour driving.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5052" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5064"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0095069619309982"><svg class="icon icon-navigate-left" data-dcnode-id="5073" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5074"></path></svg><span class="button-alternative-text" data-dcnode-id="5066"><strong data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5053"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0095069619301664"><span class="button-alternative-text" data-dcnode-id="5057"><strong data-dcnode-id="5062"><span data-dcnode-id="5063" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5055" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5056"></path></svg></a></li></ul><span data-dcnode-id="5051" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="1303" id="body"><div data-dcnode-id="3014"><section data-dcnode-id="4987" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5045" id="sectitle0015"><span data-dcnode-id="5050" instrument_node="">1</span><span data-dcnode-id="5048" instrument_node="">. </span><span data-dcnode-id="5046" instrument_node="">Introduction</span></h2><p data-dcnode-id="5040" id="p0010"><span data-dcnode-id="5044" instrument_node="">Cars are a major contributor to some of the most important environmental issues today: air pollution, congestion, and climate change. Much of the future growth in cars is expected to occur in the developing world. Demand for petroleum in non-OECD countries has passed that of OECD nations, and is expected to grow a further 60% by 2030 (</span><a class="workspace-trigger" data-dcnode-id="5042" href="#bib4" name="bbib4"><span data-dcnode-id="5043" instrument_node="">EIA, 2015</span></a><span data-dcnode-id="5041" instrument_node="">).</span></p><p data-dcnode-id="5026" id="p0015"><span data-dcnode-id="5039" instrument_node="">Despite the large negative externalities associated with cars, policy makers have struggled to formulate an effective response. Road space rationing, where cars with selected license plates are fined if they drive on certain days during peak congestion hours, has been deployed in large cities such as México City, Santiago, and São Paulo. </span><a class="workspace-trigger" data-dcnode-id="5037" href="#bib2" name="bbib2"><span data-dcnode-id="5038" instrument_node="">Davis (2008)</span></a><span data-dcnode-id="5036" instrument_node=""> concludes that driving restrictions have little effect on vehicle use, air pollution, and congestion in México City. </span><a class="workspace-trigger" data-dcnode-id="5034" href="#bib15" name="bbib15"><span data-dcnode-id="5035" instrument_node="">Wang et al. (2013)</span></a><span data-dcnode-id="5033" instrument_node=""> find that almost half of drivers evaded Beijing's vehicle use restrictions. Even so, </span><a class="workspace-trigger" data-dcnode-id="5031" href="#bib14" name="bbib14"><span data-dcnode-id="5032" instrument_node="">Viard and Fu (2015)</span></a><span data-dcnode-id="5030" instrument_node=""> find that the Beijing vehicle use restrictions result in some air quality improvements, and </span><a class="workspace-trigger" data-dcnode-id="5028" href="#bib19" name="bbib19"><span data-dcnode-id="5029" instrument_node="">Zhong et al. (2017)</span></a><span data-dcnode-id="5027" instrument_node=""> find that they reduce ambulance calls and reports of heart-related symptoms. Overall, these studies highlight a key problem with road space rationing: evasion of these policies is widespread, diminishing their effectiveness.</span></p><p data-dcnode-id="5021" id="p0020"><span data-dcnode-id="5025" instrument_node="">In this paper, we study a second type of policy response that an increasing number of cities are undertaking: restrictions on vehicle ownership. In cities like Singapore, Beijing, and Shanghai, potential car buyers cannot freely add cars to their households, but must first bid in an auction or win a lottery for the right to purchase a car. As of 2017, eight Chinese cities with a combined population of more than 165 million restrict vehicle ownership. Many additional cities are considering similar policies (</span><a class="workspace-trigger" data-dcnode-id="5023" href="#bib18" name="bbib18"><span data-dcnode-id="5024" instrument_node="">Yang et al., 2014</span></a><span data-dcnode-id="5022" instrument_node="">). Vehicle ownership restrictions may be more effective than road space rationing because evasion is more difficult: one would have to purchase a car with a license plate from another area and be subject to the constant threat of fines. However, fines have not deterred those evading road space rationing, and no prior study has examined whether vehicle ownership restrictions are actually effective.</span></p><p data-dcnode-id="5019" id="p0025"><span data-dcnode-id="5020" instrument_node="">We perform the first evaluation of the effectiveness of vehicle ownership restrictions at reducing vehicle ownership and vehicle use. Our setting is the Beijing vehicle license plate lottery, which began in 2011 and reduced new car sales by roughly three-fourths in its first year compared to the previous year. The lottery includes a randomized drawing that allows us to overcome the problems of confounders that usually apply to analysis of car ownership. Our paper sheds light on vehicle policies in China, one of the most important car markets and the top contributor worldwide to greenhouse gas emissions. In contrast to the mixed performance of road space rationing, we find unambiguous effects of vehicle ownership restrictions: they sharply cut car ownership and the amount of driving.</span></p><p data-dcnode-id="5013" id="p0030"><span data-dcnode-id="5018" instrument_node="">A major hurdle to analyzing ownership restrictions is that vehicle ownership is surely endogenous; many unobserved characteristics influence both car ownership and travel behavior.</span><a class="workspace-trigger" data-dcnode-id="5015" href="#fn1" name="bfn1"><sup data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">1</span></sup></a><span data-dcnode-id="5014" instrument_node=""> Unobserved individual and household characteristics are likely to be a particularly salient problem when investigating the relationship between vehicle ownership and travel behavior. For example, because cars are often used for commuting, unobserved job opportunities or preferences over modes of transportation may bias attempts to compare households based on the number of cars they own. However, in the Beijing lottery, conditional upon entering, winning the lottery is randomly assigned and is therefore exogenous to all other characteristics of the household. As a result, we can evaluate the effects of the policy by comparing car ownership and travel behavior across winners and losers. Moreover, lottery status represents a natural instrumental variable (IV) for vehicle ownership, allowing us to estimate the effects of vehicle ownership on travel behavior.</span></p><p data-dcnode-id="5011" id="p0035"><span data-dcnode-id="5012" instrument_node="">We first show that lottery outcomes are uncorrelated with determinants of travel behavior, supporting the validity of the empirical strategy. While we cannot directly compare unobservable individual-level attributes, we confirm that observable household and individual attributes that should not be affected by the lottery, such as gender and birth year, are statistically indistinguishable across lottery winners and losers. Furthermore, winning the lottery is a strong predictor of car ownership, reducing concerns about weak instruments bias.</span></p><p data-dcnode-id="5009" id="p0040"><span data-dcnode-id="5010" instrument_node="">Then, we estimate the reduced-form effects of winning the lottery on vehicle ownership and travel. On average, winning the lottery increases the probability that a household has at least one car by 42 percentage points. Winning the lottery more than doubles total distance driven and the probability that the individual drives during the morning or evening rush hours.</span></p><p data-dcnode-id="5007" id="p0045"><span data-dcnode-id="5008" instrument_node="">In addition to the reduced-form effects of winning the lottery on car ownership and travel behavior, we estimate the effects of car ownership on travel behavior. This analysis provides insight into the potential effects on travel behavior of other policies that may affect ownership. To address the endogeneity of ownership, we use the lottery outcome to instrument for the number of vehicles owned by the households. Consistent with the reduced-form estimates, we find that reducing the number of household cars sharply cuts kilometers traveled–both overall and during rush hour times.</span></p><p data-dcnode-id="5001" id="p0050"><span data-dcnode-id="5006" instrument_node="">Finally, we use the reduced-form results to estimate the aggregate effects of the lottery on vehicle ownership and travel. These should be considered partial equilibrium estimates, in that they hold fixed congestion levels (and other factors that may affect vehicle ownership and use) at the levels observed during the lottery. Between 2011 and 2014, these restrictions decreased the total stock of cars in Beijing by 14%, a large amount.</span><a class="workspace-trigger" data-dcnode-id="5003" href="#fn2" name="bfn2"><sup data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">2</span></sup></a><span data-dcnode-id="5002" instrument_node=""> Moreover, removing the lottery would increase total VKT in Beijing by 15%. Similarly, morning and evening rush hour car use would increase by 10%, implying that vehicle ownership restrictions have caused large decreases in congestion. Although we do not observe vehicle emissions, lower VKT implies substantial reductions in emissions of local air pollutants and greenhouse gases.</span></p><p data-dcnode-id="4999" id="p0055"><span data-dcnode-id="5000" instrument_node="">These conclusions have important implications for localities considering vehicle ownership restriction policies. In combination, our findings suggest that these policies are very effective at decreasing the number of cars owned and total distance driven. These changes also would be accompanied by substantial reductions in congestion, fuel consumption, and pollution emissions. In cities such as Beijing, with well-developed public transportation systems, our results also imply that limiting the expansion of vehicle ownership does not significantly increase overall commute distances.</span></p><p data-dcnode-id="4988" id="p0060"><span data-dcnode-id="4998" instrument_node="">The decrease in driving caused by the ownership restrictions implies substantial environmental benefits. However, we note that policies restricting vehicle ownership may still be economically inefficient. External costs of driving clearly vary across space and time, with travel in central areas of cities and during rush hours imposing higher costs. Pricing congestion and emissions would be more efficient because they restrict driving in proportion to external costs. In complementary work using the same data (</span><a class="workspace-trigger" data-dcnode-id="4996" href="#bib8" name="bbib8"><span data-dcnode-id="4997" instrument_node="">Liu et al., 2018a</span></a><span data-dcnode-id="4995" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4993" href="#bib9" name="bbib9"><span data-dcnode-id="4994" instrument_node="">2018b</span></a><span data-dcnode-id="4992" instrument_node="">), we find that the Beijing lottery had unintended consequences, reducing fertility rates and female employment. Moreover, lotteries themselves may be allocatively inefficient compared with auctions, as demonstrated by </span><a class="workspace-trigger" data-dcnode-id="4990" href="#bib7" name="bbib7"><span data-dcnode-id="4991" instrument_node="">Li (2019)</span></a><span data-dcnode-id="4989" instrument_node="">. Notwithstanding these inefficiencies, our analysis shows that Beijing's vehicle ownership restrictions have unambiguously reduced vehicles owned and distance driven, standing in stark contrast to the effects of vehicle usage restrictions.</span></p></section><section data-dcnode-id="4585" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4981" id="sectitle0020"><span data-dcnode-id="4986" instrument_node="">2</span><span data-dcnode-id="4984" instrument_node="">. </span><span data-dcnode-id="4982" instrument_node="">Background, data, and randomization tests</span></h2><section data-dcnode-id="4956" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4975" id="sectitle0025"><span data-dcnode-id="4980" instrument_node="">2.1</span><span data-dcnode-id="4978" instrument_node="">. </span><span data-dcnode-id="4976" instrument_node="">Background</span></h3><p data-dcnode-id="4963" id="p0065"><span data-dcnode-id="4974" instrument_node="">This subsection provides an overview of the lottery system. It draws many of the institutional details from </span><a class="workspace-trigger" data-dcnode-id="4972" href="#bib18" name="bbib18"><span data-dcnode-id="4973" instrument_node="">Yang et al. (2014)</span></a><span data-dcnode-id="4971" instrument_node="">, who describe the background of the lottery. Beijing began its license plate lottery in January 2011. Without a Beijing license plate, cars are prohibited from driving within the area encircled by the fifth ring road between the hours of 7:00 a.m. and 9:00 a.m., and 5:00 p.m. and 8:00 p.m.</span><a class="workspace-trigger" data-dcnode-id="4968" href="#fn3" name="bfn3"><sup data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">3</span></sup></a><span data-dcnode-id="4967" instrument_node=""> Those who already had cars were allowed to keep their vehicles and were allowed to retain their license plates when they traded in or upgraded their old cars. However, no household was able to add to its number of cars without first winning the lottery.</span><a class="workspace-trigger" data-dcnode-id="4964" href="#fn4" name="bfn4"><sup data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">4</span></sup></a></p><p data-dcnode-id="4961" id="p0070"><span data-dcnode-id="4962" instrument_node="">From its inception, the lottery has aimed to reduce new car purchases. In its first months, applicants competed for one of 20,000 new license plates issued each month. To put this figure in perspective, annual new car sales grew at an average rate of 31% between 2001 and 2010 in Beijing, and reached a height of averaging 76,000 cars per month during 2010. During the first drawing, there were 10 times as many lottery applicants as license plates available, and the ratio of license plates offered in the lottery to the number of applicants has continued to drop as the number of license plates drawn remained constant and the pool of applicants swelled. By mid-2012, the probability of winning the lottery in a given month fell to less than 2%, and the success rate fell below 1% in 2015.</span></p><p data-dcnode-id="4959" id="p0075"><span data-dcnode-id="4960" instrument_node="">Officially, license plates won through the lottery adhere to the individual and cannot be transferred. However, there is anecdotal evidence that people lend their cars to relatives and friends for long periods of time; in these cases ownership technically resides with the lottery winner, but all benefits from usage exist with the person actually driving the car. As noted above, this issue should not cause misreporting on the survey and therefore should not affect the internal validity of our analysis because of the randomization of the lottery; the comparison of winners and losers yields unbiased estimates of the differing car ownership and travel behavior across the two groups. For the IV estimation, both the relevance and validity conditions are still satisfied for the instrument of the vehicle lottery. These kinds of effects can reduce the power of the instrument, but we do not find evidence of substantial weak instruments bias.</span></p><p data-dcnode-id="4957" id="p0080"><span data-dcnode-id="4958" instrument_node="">Despite the difficulty of obtaining a new car in Beijing, not all lottery winners purchase vehicles. Because entering the lottery is free and requires only an online website application, many households enter the lottery even if they are not sure that they want to purchase a car. For example, in June 2012, 10.9% of individual lottery winners did not purchase a car, and 22.8% of corporate lottery winners did not purchase a vehicle. This suggests that winning the lottery increases the average number of household vehicles by less than one.</span></p></section><section data-dcnode-id="4827" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4950" id="sectitle0030"><span data-dcnode-id="4955" instrument_node="">2.2</span><span data-dcnode-id="4953" instrument_node="">. </span><span data-dcnode-id="4951" instrument_node="">Data</span></h3><p data-dcnode-id="4945" id="p0085"><span data-dcnode-id="4949" instrument_node="">We leverage a large randomized survey on the transportation behavior of Beijing's residents. This survey is conducted every few years by the Beijing Transportation Research Commission (BTRC), a government agency tasked with understanding and improving Beijing's transportation system. The survey consists of 40,000 households, drawn randomly from a complete list of Beijing households, with the samples proportional to the population for each of Beijing's 16 districts. It was conducted between September and November 2014.</span><a class="workspace-trigger" data-dcnode-id="4946" href="#fn5" name="bfn5"><sup data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">5</span></sup></a></p><p data-dcnode-id="4943" id="p0090"><span data-dcnode-id="4944" instrument_node="">The base survey consists of three types of questions. First, it asks about individuals in the household, including their genders, ages, and relationships with the head of household. Second, it asks about the household and its vehicles, including the numbers and types of vehicles in the household. The third set of questions, constituting the main dataset for this paper, asks household members to describe their travel for a 24-h period.</span></p><p data-dcnode-id="4941" id="p0095"><span data-dcnode-id="4942" instrument_node="">The travel diary starts by asking individuals where they began their day. A respondent reports the departure time from this starting point. Then, the travel diary queries the start and end locations of each leg of travel, the time of travel, the mode of travel, and the general purpose of that travel. For some people, the travel diary is as simple as taking the subway to work, and then returning home using the same route. For others, the travel diary is complex. For example, many Beijing residents commute to work using a combination of modes, such as a subway ride followed by a bus trip. They may go to the supermarket or to a restaurant; they may take a taxi or walk to a lunch destination. Each of these individual trips is recorded in the travel diary data.</span></p><p data-dcnode-id="4939" id="p0100"><span data-dcnode-id="4940" instrument_node="">At our request, the BTRC added to the 2014 survey questions about whether members in the household entered the Beijing car lottery. The survey asked which members entered and their dates of entry, as well as the dates the individuals won. If they won, the survey asked whether and when they purchased cars. About 20% of all households in the BTRC sample had at least one member participate in the lottery.</span></p><div data-dcnode-id="4828"><p data-dcnode-id="4934" id="p0105"><span data-dcnode-id="4938" instrument_node="">Altogether, there were 40,005 households with 101,827 household members included in the BTRC survey. Among these households, 8066 individuals in 7039 households report entering the Beijing vehicle lottery. </span><a class="workspace-trigger" data-dcnode-id="4936" href="#tbl1" name="btbl1"><span data-dcnode-id="4937" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="4935" instrument_node=""> shows that entrants differ from non-entrants in observable ways: entrants are less likely to be female, are younger, and are more highly educated.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4829" id="tbl1"><span class="captions" data-dcnode-id="4926"><span data-dcnode-id="4927" id="cap0040"><p data-dcnode-id="4928" id="tspara0095"><span class="label" data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node="">Table 1</span></span><span data-dcnode-id="4931" instrument_node="">. </span><span data-dcnode-id="4929" instrument_node="">Comparability of individuals entering and not entering the lottery.</span></p></span></span><div class="groups" data-dcnode-id="4844"><table data-dcnode-id="4845"><thead data-dcnode-id="4915"><tr class="rowsep-1 valign-top" data-dcnode-id="4916"><td data-dcnode-id="4923" scope="col"><span class="screen-reader-only" data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="4921" scope="col"><span data-dcnode-id="4922" instrument_node="">Entrants</span></th><th data-dcnode-id="4919" scope="col"><span data-dcnode-id="4920" instrument_node="">Non-entrants</span></th><th data-dcnode-id="4917" scope="col"><span data-dcnode-id="4918" instrument_node="">Difference</span></th></tr></thead><tbody data-dcnode-id="4846"><tr class="valign-top" data-dcnode-id="4900"><th class="align-left" data-dcnode-id="4913" scope="row"><span data-dcnode-id="4914" instrument_node="">Female</span></th><td class="align-left" data-dcnode-id="4909"><span data-dcnode-id="4912" instrument_node="">0.4079</span><br data-dcnode-id="4911"><span data-dcnode-id="4910" instrument_node="">(0.005)</span></td><td class="align-left" data-dcnode-id="4905"><span data-dcnode-id="4908" instrument_node="">0.594</span><br data-dcnode-id="4907"><span data-dcnode-id="4906" instrument_node="">(0.004)</span></td><td class="align-left" data-dcnode-id="4901"><span data-dcnode-id="4904" instrument_node="">−0.187∗∗∗</span><br data-dcnode-id="4903"><span data-dcnode-id="4902" instrument_node="">(0.007)</span></td></tr><tr class="valign-top" data-dcnode-id="4885"><th class="align-left" data-dcnode-id="4898" scope="row"><span data-dcnode-id="4899" instrument_node="">Birth year</span></th><td class="align-left" data-dcnode-id="4894"><span data-dcnode-id="4897" instrument_node="">1975.794</span><br data-dcnode-id="4896"><span data-dcnode-id="4895" instrument_node="">(0.126)</span></td><td class="align-left" data-dcnode-id="4890"><span data-dcnode-id="4893" instrument_node="">1966.468</span><br data-dcnode-id="4892"><span data-dcnode-id="4891" instrument_node="">(0.144)</span></td><td class="align-left" data-dcnode-id="4886"><span data-dcnode-id="4889" instrument_node="">9.326∗∗∗</span><br data-dcnode-id="4888"><span data-dcnode-id="4887" instrument_node="">(0.198)</span></td></tr><tr class="valign-top" data-dcnode-id="4870"><th class="align-left" data-dcnode-id="4883" scope="row"><span data-dcnode-id="4884" instrument_node="">High school graduation rate</span></th><td class="align-left" data-dcnode-id="4879"><span data-dcnode-id="4882" instrument_node="">0.860</span><br data-dcnode-id="4881"><span data-dcnode-id="4880" instrument_node="">(0.004)</span></td><td class="align-left" data-dcnode-id="4875"><span data-dcnode-id="4878" instrument_node="">0.689</span><br data-dcnode-id="4877"><span data-dcnode-id="4876" instrument_node="">(0.004)</span></td><td class="align-left" data-dcnode-id="4871"><span data-dcnode-id="4874" instrument_node="">0.170∗∗∗</span><br data-dcnode-id="4873"><span data-dcnode-id="4872" instrument_node="">(0.006)</span></td></tr><tr class="valign-top" data-dcnode-id="4855"><th class="align-left" data-dcnode-id="4868" scope="row"><span data-dcnode-id="4869" instrument_node="">College graduation rate</span></th><td class="align-left" data-dcnode-id="4864"><span data-dcnode-id="4867" instrument_node="">0.625</span><br data-dcnode-id="4866"><span data-dcnode-id="4865" instrument_node="">(0.005)</span></td><td class="align-left" data-dcnode-id="4860"><span data-dcnode-id="4863" instrument_node="">0.406</span><br data-dcnode-id="4862"><span data-dcnode-id="4861" instrument_node="">(0.005)</span></td><td class="align-left" data-dcnode-id="4856"><span data-dcnode-id="4859" instrument_node="">0.218∗∗∗</span><br data-dcnode-id="4858"><span data-dcnode-id="4857" instrument_node="">(0.007)</span></td></tr><tr class="valign-top" data-dcnode-id="4847"><th class="align-left" data-dcnode-id="4853" scope="row"><span data-dcnode-id="4854" instrument_node="">N</span></th><td class="align-left" data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">10,589</span></td><td class="align-left" data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">8057</span></td><td data-dcnode-id="4848"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4830"></p><p data-dcnode-id="4833" id="tspara0100"><span data-dcnode-id="4843" instrument_node="">∗</span><em data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">p</span></em><span data-dcnode-id="4840" instrument_node=""> &lt; 0.10, ∗∗</span><em data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">p</span></em><span data-dcnode-id="4837" instrument_node=""> &lt; 0.05, ∗∗∗</span><em data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">p</span></em><span data-dcnode-id="4834" instrument_node=""> &lt; 0.01.</span></p><p data-dcnode-id="4831" id="tspara0105"><span data-dcnode-id="4832" instrument_node="">This table compares the baseline characteristics of lottery entrants, who are all aged 18 and over, with the characteristics of non-entrants in our survey who were aged 18 and over.</span></p><p></p></div></div></section><section data-dcnode-id="4586" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4821" id="sectitle0035"><span data-dcnode-id="4826" instrument_node="">2.3</span><span data-dcnode-id="4824" instrument_node="">. </span><span data-dcnode-id="4822" instrument_node="">Tests of randomization</span></h3><p data-dcnode-id="4819" id="p0110"><span data-dcnode-id="4820" instrument_node="">Our empirical strategy relies on the random assignment of lottery status. To be more specific, conditional on date of entry, winning or losing the lottery is independent of all individual characteristics that might affect travel behavior.</span></p><p data-dcnode-id="4817" id="p0115"><span data-dcnode-id="4818" instrument_node="">To provide evidence supporting this condition, we examine whether winning and losing households are similar along observable dimensions that are determined prior to the lottery. Finding that observable characteristics are not correlated with lottery status would decrease the likelihood that unobserved characteristics are correlated with lottery status.</span></p><div data-dcnode-id="4606"><p data-dcnode-id="4812" id="p0120"><span data-dcnode-id="4816" instrument_node="">Among households with at least one entrant, we compare three sets of characteristics: those of the entrants themselves, those of the entrant's household head, and those of all household members. </span><a class="workspace-trigger" data-dcnode-id="4814" href="#tbl2" name="btbl2"><span data-dcnode-id="4815" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="4813" instrument_node=""> presents these results, comparing gender composition, birth years, and education levels across winners and losers. In the table, the similarity between winners and losers would support the validity of the IV strategy using the sample of lottery entrants.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4607" id="tbl2"><span class="captions" data-dcnode-id="4804"><span data-dcnode-id="4805" id="cap0045"><p data-dcnode-id="4806" id="tspara0110"><span class="label" data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">Table 2</span></span><span data-dcnode-id="4809" instrument_node="">. </span><span data-dcnode-id="4807" instrument_node="">Comparability of individuals winning and not winning the lottery for variables unaffected by the lottery.</span></p></span></span><div class="groups" data-dcnode-id="4622"><table data-dcnode-id="4623"><thead data-dcnode-id="4790"><tr class="rowsep-1 valign-top" data-dcnode-id="4796"><td data-dcnode-id="4801" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="4799" scope="col"><span data-dcnode-id="4800" instrument_node="">Losers</span></th><th data-dcnode-id="4797" scope="col"><span data-dcnode-id="4798" instrument_node="">Coefficient</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="4791"><th data-dcnode-id="4794" scope="col"><span data-dcnode-id="4795" instrument_node="">(S.D.)</span></th><th data-dcnode-id="4792" scope="col"><span data-dcnode-id="4793" instrument_node="">(S.E.)</span></th></tr></thead><tbody data-dcnode-id="4624"><tr class="valign-top" data-dcnode-id="4786"><td data-dcnode-id="4789"></td><td class="rowsep-1 align-left" colspan="2" data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">Lottery Entrants</span></td></tr><tr class="valign-top" data-dcnode-id="4775"><th class="align-left" data-dcnode-id="4784" scope="row"><span data-dcnode-id="4785" instrument_node="">Female</span></th><td class="align-left" data-dcnode-id="4780"><span data-dcnode-id="4783" instrument_node="">0.409</span><br data-dcnode-id="4782"><span data-dcnode-id="4781" instrument_node="">(0.492)</span></td><td class="align-left" data-dcnode-id="4776"><span data-dcnode-id="4779" instrument_node="">−0.004</span><br data-dcnode-id= 4"><th class="align-left" data-dcnode-id="4663" scope="row"><span data-dcnode-id="4664" instrument_node="">Birth year</span></th><td class="align-left" data-dcnode-id="4659"><span data-dcnode-id="4662" instrument_node="">1974.877</span><br data-dcnode-id="4661"><span data-dcnode-id="4660" instrument_node="">(10.046)</span></td><td class="align-left" data-dcnode-id="4655"><span data-dcnode-id="4658" instrument_node="">0.289</span><br data-dcnode-id="4657"><span data-dcnode-id="4656" instrument_node="">(0.386)</span></td></tr><tr class="valign-top" data-dcnode-id="4643"><th class="align-left" data-dcnode-id="4652" scope="row"><span data-dcnode-id="4653" instrument_node="">High school graduation rate</span></th><td class="align-left" data-dcnode-id="4648"><span data-dcnode-id="4651" instrument_node="">0.715</span><br data-dcnode-id="4650"><span data-dcnode-id="4649" instrument_node="">(0.288)</span></td><td class="align-left" data-dcnode-id="4644"><span data-dcnode-id="4647" instrument_node="">−0.023∗∗</span><br data-dcnode-id="4646"><span data-dcnode-id="4645" instrument_node="">(0.011)</span></td></tr><tr class="valign-top" data-dcnode-id="4632"><th class="align-left" data-dcnode-id="4641" scope="row"><span data-dcnode-id="4642" instrument_node="">College graduation rate</span></th><td class="align-left" data-dcnode-id="4637"><span data-dcnode-id="4640" instrument_node="">0.473</span><br data-dcnode-id="4639"><span data-dcnode-id="4638" instrument_node="">(0.342)</span></td><td class="align-left" data-dcnode-id="4633"><span data-dcnode-id="4636" instrument_node="">−0.019</span><br data-dcnode-id="4635"><span data-dcnode-id="4634" instrument_node="">(0.013)</span></td></tr><tr class="valign-top" data-dcnode-id="4625"><th class="align-left" data-dcnode-id="4630" scope="row"><span data-dcnode-id="4631" instrument_node="">N</span></th><td class="align-left" data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">7278</span></td><td class="align-left" data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">8057</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4608"></p><p data-dcnode-id="4611" id="tspara0115"><span data-dcnode-id="4621" instrument_node="">∗</span><em data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">p</span></em><span data-dcnode-id="4618" instrument_node=""> &lt; 0.10, ∗∗</span><em data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">p</span></em><span data-dcnode-id="4615" instrument_node=""> &lt; 0.05, ∗∗∗</span><em data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">p</span></em><span data-dcnode-id="4612" instrument_node=""> &lt; 0.01.</span></p><p data-dcnode-id="4609" id="tspara0120"><span data-dcnode-id="4610" instrument_node="">This table includes only lottery entrants, reporting the means and standard deviations for lottery losers in the left column. The right column reports the results of a regression of the indicated variable on whether the entrant won the lottery, along with month-of-entry fixed effects. The top panel includes just the lottery entrants. The middle panel includes the characteristics of the household head for each entrant. The bottom panel includes the average of that household characteristic for each entrant.</span></p><p></p></div></div><p data-dcnode-id="4604" id="p0125"><span data-dcnode-id="4605" instrument_node="">The left column of the table reports the mean and standard deviation of each characteristic for losers. To construct the right column, we regress the characteristic in the row heading on a dummy variable equal to one if the individual wins the lottery. Importantly, we condition on month of entry in this regression. These controls are necessary because early lottery entrants are more likely to obtain a car than later entrants. Earlier entrants not only had more lotteries in which they were entered, but also the Beijing lottery had higher success rates in early months. Moreover, members of households with stronger driving preferences may enter the lottery earlier than other households. Controlling for entry month implies that we are comparing lottery winners and losers who entered at the same time, controlling for potentially unobserved factors correlated with entry date.</span></p><p data-dcnode-id="4602" id="p0130"><span data-dcnode-id="4603" instrument_node="">Lottery entrants constitute the main estimation sample. For this sample, we do not observe large or statistically significant differences between winners and losers.</span></p><p data-dcnode-id="4597" id="p0135"><span data-dcnode-id="4601" instrument_node="">Household members of winners and those of losers differ slightly in their education levels, although not by statistically significant amounts. In </span><a class="workspace-trigger" data-dcnode-id="4599" href="#bib9" name="bbib9"><span data-dcnode-id="4600" instrument_node="">Liu et al. (2018b)</span></a><span data-dcnode-id="4598" instrument_node="">, we explore differences in household composition between households of lottery winners and those of losers. We find that winning a car has a strong influence on the number of babies that lottery entrants choose to have, and the education differences may arise from the larger number of children in the households of winners.</span></p><p data-dcnode-id="4595" id="p0140"><span data-dcnode-id="4596" instrument_node="">We also examined the possibility of recall bias; because some survey respondents are surveyed three years after entering the lottery, they may not accurately remember their date of entry or whether they won the lottery. We conducted many informal interviews with lottery entrants, which confirmed the accuracy of their recollections. Obtaining a car seems important to households that want one, and entrants remember quite clearly the details surrounding their participation in the lottery.</span></p><p data-dcnode-id="4587" id="p0145"><span data-dcnode-id="4594" instrument_node="">As an additional test for recall bias, we segregated respondents by their reported entry year in </span><a class="workspace-trigger" data-dcnode-id="4592" href="#dtbl1" name="bdtbl1"><span data-dcnode-id="4593" instrument_node="">Appendix&nbsp;Table&nbsp;1</span></a><span data-dcnode-id="4591" instrument_node="">. If recall bias affected the random assignment of winners and losers, we should observe differences in the characteristics of winners and losers that increase over time. We do observe some marginally statistically significant differences between winners and losers among our earliest entrants from 2011, but there is no evidence that these differences are larger in magnitude than the differences between winners and losers in later entry years. While we cannot rule out recall bias, the evidence suggests that this is not a serious problem.</span><a class="workspace-trigger" data-dcnode-id="4588" href="#fn6" name="bfn6"><sup data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">6</span></sup></a></p></section></section><section data-dcnode-id="3957" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4579" id="sectitle0040"><span data-dcnode-id="4584" instrument_node="">3</span><span data-dcnode-id="4582" instrument_node="">. </span><span data-dcnode-id="4580" instrument_node="">Reduced-form estimates</span></h2><p data-dcnode-id="4577" id="p0150"><span data-dcnode-id="4578" instrument_node="">Having provided evidence supporting the randomization of the lottery, we examine whether the lottery has affected vehicle ownership and use. We exploit the randomization to estimate the reduced-form effect of the lottery on these outcomes. A naive consideration of the lottery would suggest that average vehicle ownership of winners and losers should differ by one car, but in practice this difference may be less than one if some winners elect not to obtain an additional car or if some losers can circumvent the lottery and obtain an additional car without winning.</span></p><p data-dcnode-id="4393" id="p0155"><span data-dcnode-id="4576" instrument_node="">To estimate the reduced-form effect of vehicle ownership restrictions, we employ the following equation:</span><span class="display" data-dcnode-id="4394"><span class="formula" data-dcnode-id="4395" id="fd1"><span class="label" data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="4396"><span class="MathJax_Preview" data-dcnode-id="4573" style=""></span><span class="MathJax_SVG" data-dcnode-id="4399" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>C</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub><mo is=&quot;true&quot;>=</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>0</mn></mrow></msub><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>1</mn></mrow></msub><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>W</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>2</mn></mrow></msub><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>X</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>3</mn></mrow></msub><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B7;</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3BC;</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="4475" focusable="false" height="2.586ex" role="img" style="vertical-align: -0.741ex;" viewBox="0 -794.4 15618.5 1113.4" width="36.275ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="4476" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="4564" is="true"><g data-dcnode-id="4569" is="true"><g data-dcnode-id="4570" is="true"><use data-dcnode-id="4571" href="#MJMATHI-43"><path d="M50 252Q50 367 117 473T286 641T490 704Q580 704 633 653Q642 643 648 636T656 626L657 623Q660 623 684 649Q691 655 699 663T715 679T725 690L740 705H746Q760 705 760 698Q760 694 728 561Q692 422 692 421Q690 416 687 415T669 413H653Q647 419 647 422Q647 423 648 429T650 449T651 481Q651 552 619 605T510 659Q484 659 454 652T382 628T299 572T226 479Q194 422 175 346T156 222Q156 108 232 58Q280 24 350 24Q441 24 512 92T606 240Q610 253 612 255T628 257Q648 257 648 248Q648 243 647 239Q618 132 523 55T319 -22Q206 -22 128 53T50 252Z" data-dcnode-id="4572" id="MJMATHI-43" stroke-width="1"></path></use></g></g><g data-dcnode-id="4565" is="true" transform="translate(715,-150)"><g data-dcnode-id="4566" is="true"><use data-dcnode-id="4567" href="#MJMATHI-69" transform="scale(0.707)"><path d="M184 600Q184 624 203 642T247 661Q265 661 277 649T290 619Q290 596 270 577T226 557Q211 557 198 567T184 600ZM21 287Q21 295 30 318T54 369T98 420T158 442Q usehold of individual </span><em data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">i</span></em><span data-dcnode-id="4383" instrument_node="">. The dependent variables include the number of cars in the household, whether the household has a car, the average age of vehicles in the household, average VKT per car, total fuel spending, average fuel cost per car in the household,</span><a class="workspace-trigger" data-dcnode-id="4380" href="#fn7" name="bfn7"><sup data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">7</span></sup></a><span data-dcnode-id="4379" instrument_node=""> and distance and time traveled (overall and by mode).</span><a class="workspace-trigger" data-dcnode-id="4376" href="#fn8" name="bfn8"><sup data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">8</span></sup></a><span data-dcnode-id="4375" instrument_node=""> Although these variables are measured at the household level, our analysis is conducted at the individual level. Lottery status is randomly assigned at the individual level, but is potentially endogenous at the household level since some households have more than one lottery entrant. Households with more than one entrant are likely to have greater demand for cars as well as greater demand for travel. Moreover, as discussed in the previous section, the lottery outcome may affect household size, in which case it would not be appropriate to include variables related to household size as independent variables.</span></p><p data-dcnode-id="4360" id="p0165"><span data-dcnode-id="4373" instrument_node="">Among the independent variables, </span><em data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">W</span></em><sub data-dcnode-id="4368"><em data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">i</span></em></sub><span data-dcnode-id="4367" instrument_node=""> is the lottery status of the individuals (whether they have won the lottery). The variable </span><em data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">X</span></em><sub data-dcnode-id="4362"><em data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">i</span></em></sub><span data-dcnode-id="4361" instrument_node=""> is a vector of individual covariates not affected by the lottery, and we include age, gender, fixed effects for education group, and fixed effects for the day of travel in the diary.</span></p><p data-dcnode-id="4344" id="p0170"><span data-dcnode-id="4359" instrument_node="">As with the balance tests reported in the previous section, we include fixed effects for lottery month of entry, </span><em data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">η</span></em><sub data-dcnode-id="4354"><em data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">i</span></em></sub><span data-dcnode-id="4353" instrument_node="">. The coefficient </span><em data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">β</span></em><sub data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">1</span></sub><span data-dcnode-id="4348" instrument_node=""> is identified by within-entry month variation.</span><a class="workspace-trigger" data-dcnode-id="4345" href="#fn9" name="bfn9"><sup data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">9</span></sup></a></p><div data-dcnode-id="4147"><p data-dcnode-id="4331" id="p0175"><span data-dcnode-id="4343" instrument_node="">Because the lottery outcome is randomly assigned, </span><em data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">β</span></em><sub data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">1</span></sub><span data-dcnode-id="4338" instrument_node=""> is the causal effect of winning the lottery on the number of cars in the household of individual </span><em data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">i</span></em><span data-dcnode-id="4335" instrument_node="">. The coefficient represents the change in the number of cars if a loser were given the right to obtain a car. We report the results for these regressions in </span><a class="workspace-trigger" data-dcnode-id="4333" href="#tbl3" name="btbl3"><span data-dcnode-id="4334" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="4332" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4148" id="tbl3"><span class="captions" data-dcnode-id="4323"><span data-dcnode-id="4324" id="cap0050"><p data-dcnode-id="4325" id="tspara0125"><span class="label" data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">Table 3</span></span><span data-dcnode-id="4328" instrument_node="">. </span><span data-dcnode-id="4326" instrument_node="">Reduced-form estimates of the effect of winning the lottery for key vehicle outcomes.</span></p></span></span><div class="groups" data-dcnode-id="4166"><table data-dcnode-id="4167"><thead data-dcnode-id="4309"><tr class="rowsep-1 valign-top" data-dcnode-id="4315"><td data-dcnode-id="4320" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="4318" scope="col"><span data-dcnode-id="4319" instrument_node="">Losers</span></th><th data-dcnode-id="4316" scope="col"><span data-dcnode-id="4317" instrument_node="">Coefficient</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="4310"><th data-dcnode-id="4313" scope="col"><span data-dcnode-id="4314" instrument_node="">(S.D.)</span></th><th data-dcnode-id="4311" scope="col"><span data-dcnode-id="4312" instrument_node="">(S.E.)</span></th></tr></thead><tbody data-dcnode-id="4168"><tr class="valign-top" data-dcnode-id="4305"><td data-dcnode-id="4308"></td><td class="rowsep-1 align-left" colspan="2" data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">Relating to the Stock of Cars</span></td></tr><tr class="valign-top" data-dcnode-id="4294"><th class="align-left" data-dcnode-id="4303" scope="row"><span data-dcnode-id="4304" instrument_node="">Number of cars</span></th><td class="align-left" data-dcnode-id="4299"><span data-dcnode-id="4302" instrument_node="">0.557</span><br data-dcnode-id="4301"><span data-dcnode-id="4300" instrument_node="">(0.613)</span></td><td class="align-left" data-dcnode-id="4295"><span data-dcnode-id="4298" instrument_node="">0.636∗∗∗</span><br data-dcnode-id="4297"><span data-dcnode-id="4296" instrument_node="">(0.021)</span></td></tr><tr class="valign-top" data-dcnode-id="4283"><th class="align-left" data-dcnode-id="4292" scope="row"><span data-dcnode-id="4293" instrument_node="">Has a car</span></th><td class="align-left" data-dcnode-id="4288"><span data-dcnode-id="4291" instrument_node="">0.495</span><br data-dcnode-id="4290"><span data-dcnode-id="4289" instrument_node="">(0.500)</span></td><td class="align-left" data-dcnode-id="4284"><span data-dcnode-id="4287" instrument_node="">0.421∗∗∗</span><br data-dcnode-id="4286"><span data-dcnode-id="4285" instrument_node="">(0.011)</span></td></tr><tr class="valign-top" data-dcnode-id="4272"><th class="align-left" data-dcnode-id="4281" scope="row"><span data-dcnode-id="4282" instrument_node="">Avg. vehicle age</span></th><td class="align-left" data-dcnode-id="4277"><span data-dcnode-id="4280" instrument_node="">4.061</span><br data-dcnode-id="4279"><span data-dcnode-id="4278" instrument_node="">(1.827)</span></td><td class="align-left" data-dcnode-id="4273"><span data-dcnode-id="4276" instrument_node="">−1.484∗∗∗</span><br data-dcnode-id="4275"><span data-dcnode-id="4274" instrument_node="">(0.079)</span></td></tr><tr class="valign-top" data-dcnode-id="4261"><th class="align-left" data-dcnode-id="4270" scope="row"><span data-dcnode-id="4271" instrument_node="">Avg. VKT per car</span></th><td class="align-left" data-dcnode-id="4266"><span data-dcnode-id="4269" instrument_node="">13,220</span><br data-dcnode-id="4268"><span data-dcnode-id="4267" instrument_node="">(13,105)</span></td><td class="align-left" data-dcnode-id="4262"><span data-dcnode-id="4265" instrument_node="">−2898∗∗∗</span><br data-dcnode-id="4264"><span data-dcnode-id="4263" instrument_node="">(608)</span></td></tr><tr class="valign-top" data-dcnode-id="4250"><th class="align-left" data-dcnode-id="4259" scope="row"><span data-dcnode-id="4260" instrument_node="">Fuel cost per household</span></th><td class="align-left" data-dcnode-id="4255"><span data-dcnode-id="4258" instrument_node="">474.5</span><br data-dcnode-id="4257"><span data-dcnode-id="4256" instrument_node="">(803.085)</span></td><td class="align-left" data-dcnode-id="4251"><span data-dcnode-id="4254" instrument_node="">415.084∗∗∗</span><br data-dcnode-id="4253"><span data-dcnode-id="4252" instrument_node="">(27.553)</span></td></tr><tr class="valign-top" data-dcnode-id="4239"><th class="rowsep-1 align-left" data-dcnode-id="4248" scope="row"><span data-dcnode-id="4249" instrument_node="">Fuel cost per car</span></th><td class="rowsep-1 align-left" data-dcnode-id="4244"><span data-dcnode-id="4247" instrument_node="">840.402</span><br data-dcnode-id="4246"><span data-dcnode-id="4245" instrument_node="">(684.800)</span></td><td class="rowsep-1 align-left" data-dcnode-id="4240"><span data-dcnode-id="4243" instrument_node="">−118.468∗∗∗</span><br data-dcnode-id="4242"><span data-dcnode-id="4241" instrument_node="">(16.917)</span></td></tr><tr class="valign-top" data-dcnode-id="4235"><td data-dcnode-id="4238"></td><td class="rowsep-1 align-left" colspan="2" data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">Relating to Travel by Car</span></td></tr><tr class="valign-top" data-dcnode-id="4224"><th class="align-left" data-dcnode-id="4233" scope="row"><span data-dcnode-id="4234" instrument_node="">VKT - all</span></th><td class="align-left" data-dcnode-id="4229"><span data-dcnode-id="4232" instrument_node="">6.693</span><br data-dcnode-id="4231"><span data-dcnode-id="4230" instrument_node="">(18.960)</span></td><td class="align-left" data-dcnode-id="4225"><span data-dcnode-id="4228" instrument_node="">7.868∗∗∗</span><br data-dcnode-id="4227"><span data-dcnode-id="4226" instrument_node="">(1.169)</span></td></tr><tr class="valign-top" data-dcnode-id="4213"><th class="align-left" data-dcnode-id="4222" scope="row"><span data-dcnode-id="4223" instrument_node="">VKT - commute</span></th><td class="align-left" data-dcnode-id="4218"><span data-dcnode-id="4221" instrument_node="">2.255</span><br data-dcnode-id="4220"><span data-dcnode-id="4219" instrument_node="">(7.494)</span></td><td class="align-left" data-dcnode-id="4214"><span data-dcnode-id="4217" instrument_node="">2.895∗∗∗</span><br data-dcnode-id="4216"><span data-dcnode-id="4215" instrument_node="">(0.574)</span></td></tr><tr class="valign-top" data-dcnode-id="4202"><th class="align-left" data-dcnode-id="4211" scope="row"><span data-dcnode-id="4212" instrument_node="">Time of travel (minutes) - all purposes</span></th><td class="align-left" data-dcnode-id="4207"><span data-dcnode-id="4210" instrument_node="">18.607</span><br data-dcnode-id="4209"><span data-dcnode-id="4208" instrument_node="">(50.504)</span></td><td class="align-left" data-dcnode-id="4203"><span data-dcnode-id="4206" instrument_node="">20.307∗∗∗</span><br data-dcnode-id="4205"><span data-dcnode-id="4204" instrument_node="">(2.782)</span></td></tr><tr class="valign-top" data-dcnode-id="4191"><th class="align-left" data-dcnode-id="4200" scope="row"><span data-dcnode-id="4201" instrument_node="">Time of travel (minutes) - commute</span></th><td class="align-left" data-dcnode-id="4196"><span data-dcnode-id="4199" instrument_node="">10.799</span><br data-dcnode-id="4198"><span data-dcnode-id="4197" instrument_node="">(23.760)</span></td><td class="align-left" data-dcnode-id="4192"><span data-dcnode-id="4195" instrument_node="">10.817∗∗∗</span><br data-dcnode-id="4194"><span data-dcnode-id="4193" instrument_node="">(1.719)</span></td></tr><tr class="valign-top" data-dcnode-id="4180"><th class="align-left" data-dcnode-id="4189" scope="row"><span data-dcnode-id="4190" instrument_node="">Used car during morning rush hour</span></th><td class="align-left" data-dcnode-id="4185"><span data-dcnode-id="4188" instrument_node="">0.179</span><br data-dcnode-id="4187"><span data-dcnode-id="4186" instrument_node="">(0.449)</span></td><td class="align-left" data-dcnode-id="4181"><span data-dcnode-id="4184" instrument_node="">0.211∗∗∗</span><br data-dcnode-id="4183"><span data-dcnode-id="4182" instrument_node="">(0.022)</span></td></tr><tr class="valign-top" data-dcnode-id="4169"><th class="align-left" data-dcnode-id="4178" scope="row"><span data-dcnode-id="4179" instrument_node="">Used car during evening rush hour</span></th><td class="align-left" data-dcnode-id="4174"><span data-dcnode-id="4177" instrument_node="">0.146</span><br data-dcnode-id="4176"><span data-dcnode-id="4175" instrument_node="">(0.392)</span></td><td class="align-left" data-dcnode-id="4170"><span data-dcnode-id="4173" instrument_node="">0.183∗∗∗</span><br data-dcnode-id="4172"><span data-dcnode-id="4171" instrument_node="">(0.022)</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4149"></p><p data-dcnode-id="4155" id="tspara0130"><span data-dcnode-id="4165" instrument_node="">∗</span><em data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">p</span></em><span data-dcnode-id="4162" instrument_node=""> &lt; 0.10, ∗∗</span><em data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">p</span></em><span data-dcnode-id="4159" instrument_node=""> &lt; 0.05, ∗∗∗</span><em data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">p</span></em><span data-dcnode-id="4156" instrument_node=""> &lt; 0.01.</span></p><p data-dcnode-id="4150" id="tspara0135"><span data-dcnode-id="4154" instrument_node="">This table includes only lottery entrants, reporting the means and standard deviations for lottery losers in the left column. The right column reports the results of a regression of the indicated variable on whether the entrant won the lottery, along with covariates from equation </span><a class="workspace-trigger" data-dcnode-id="4152" href="#fd1" name="bfd1"><span data-dcnode-id="4153" instrument_node="">(1)</span></a><span data-dcnode-id="4151" instrument_node="">.</span></p><p></p></div></div><p data-dcnode-id="4141" id="p0180"><span data-dcnode-id="4146" instrument_node="">We can see from this table that winning the lottery has a large and statistically significant effect both on the number of cars in the household and whether the household has a car. Winning the lottery increases the number of cars in the household by 0.636 cars, and increases the likelihood that the household has a car by 42.1 percentage points.</span><a class="workspace-trigger" data-dcnode-id="4143" href="#fn10" name="bfn10"><sup data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">10</span></sup></a><span data-dcnode-id="4142" instrument_node=""> Winning the lottery roughly doubles the number of cars and VKT, indicating that VKT increases roughly in proportion to the number of cars.</span></p><p data-dcnode-id="4135" id="p0185"><span data-dcnode-id="4140" instrument_node="">We note several reasons that each lottery win increases the number of cars by less than one full car. First, not every lottery winner purchases a car. As we mentioned earlier, about 10% of lottery winners allow their rights to purchase cars to expire. Second, losers may find other mechanisms to obtain cars. The literature on road space rationing shows widespread evasion of the road use restrictions. There is anecdotal evidence that some evasion of vehicle ownership restrictions is also possible.</span><a class="workspace-trigger" data-dcnode-id="4137" href="#fn11" name="bfn11"><sup data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">11</span></sup></a><span data-dcnode-id="4136" instrument_node=""> Our results suggest that, even accounting for efforts by lottery losers to obtain cars, vehicle ownership restrictions are effective because there is a large gap in vehicle ownership between lottery winners and losers.</span></p><p data-dcnode-id="4133" id="p0190"><span data-dcnode-id="4134" instrument_node="">Other characteristics of cars in the home offer supporting evidence that the lottery has a strong influence on the number of cars. The average age of cars of lottery winners is 1.5 years lower than of lottery losers, suggesting that winning households have newer vehicles. Households of lottery winners report spending more on gasoline than those of lottery losers. Lottery winners report lower average fuel costs per car; this occurs because new cars usually have higher fuel economy than old cars, and some winning households are adding second vehicles.</span></p><p data-dcnode-id="4131" id="p0195"><span data-dcnode-id="4132" instrument_node="">We investigate whether car ownership affects rush hour car use by defining two indicator variables, which are equal to one if the individual travels during the morning or evening rush hour periods. Based on typical hourly congestion levels observed in Beijing, we define the morning rush hour as weekdays between 7 and 10 a.m., and the evening rush hour as between 5 and 8 p.m. Winning the lottery more than doubles the probability that the individual uses a car during the morning or evening rush hour.</span></p><div data-dcnode-id="3958"><p data-dcnode-id="4120" id="p0200"><a class="workspace-trigger" data-dcnode-id="4129" href="#tbl4" name="btbl4"><span data-dcnode-id="4130" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="4128" instrument_node=""> reports estimates of equation </span><a class="workspace-trigger" data-dcnode-id="4126" href="#fd1" name="bfd1"><span data-dcnode-id="4127" instrument_node="">(1)</span></a><span data-dcnode-id="4125" instrument_node=""> for which the dependent variable is the distance or time traveled by the mode indicated in the row heading. An individual's VKT includes all car travel, including cars belonging to the household or not, such as a ride from a friend or from a ridesharing service.</span><a class="workspace-trigger" data-dcnode-id="4122" href="#fn12" name="bfn12"><sup data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">12</span></sup></a><span data-dcnode-id="4121" instrument_node=""> Winning the lottery does not affect total distance traveled by a statistically significant amount, but it does induce substantial substitution of distance traveled from bus and subway to cars. Winning the lottery reduces the time spent taking the bus, subway, or foot/bike, and increases time spent in a car. For each outcome, the effects of the lottery are large relative to the sample mean for losing individuals.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3959" id="tbl4"><span class="captions" data-dcnode-id="4112"><span data-dcnode-id="4113" id="cap0055"><p data-dcnode-id="4114" id="tspara0140"><span class="label" data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">Table 4</span></span><span data-dcnode-id="4117" instrument_node="">. </span><span data-dcnode-id="4115" instrument_node="">Reduced-form estimates of the effect of winning the lottery for overall travel outcomes.</span></p></span></span><div class="groups" data-dcnode-id="3977"><table data-dcnode-id="3978"><thead data-dcnode-id="4098"><tr class="rowsep-1 valign-top" data-dcnode-id="4104"><td data-dcnode-id="4109" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="4107" scope="col"><span data-dcnode-id="4108" instrument_node="">Losers</span></th><th data-dcnode-id="4105" scope="col"><span data-dcnode-id="4106" instrument_node= ></td><td class="align-left" data-dcnode-id="4025"><span data-dcnode-id="4028" instrument_node="">2.026</span><br data-dcnode-id="4027"><span data-dcnode-id="4026" instrument_node="">(2.728)</span></td></tr><tr class="valign-top" data-dcnode-id="4013"><th class="align-left" data-dcnode-id="4022" scope="row"><span data-dcnode-id="4023" instrument_node="">By car</span></th><td class="align-left" data-dcnode-id="4018"><span data-dcnode-id="4021" instrument_node="">18.607</span><br data-dcnode-id="4020"><span data-dcnode-id="4019" instrument_node="">(50.504)</span></td><td class="align-left" data-dcnode-id="4014"><span data-dcnode-id="4017" instrument_node="">20.307∗∗∗</span><br data-dcnode-id="4016"><span data-dcnode-id="4015" instrument_node="">(2.782)</span></td></tr><tr class="valign-top" data-dcnode-id="4002"><th class="align-left" data-dcnode-id="4011" scope="row"><span data-dcnode-id="4012" instrument_node="">By bus</span></th><td class="align-left" data-dcnode-id="4007"><span data-dcnode-id="4010" instrument_node="">23.117</span><br data-dcnode-id="4009"><span data-dcnode-id="4008" instrument_node="">(46.169)</span></td><td class="align-left" data-dcnode-id="4003"><span data-dcnode-id="4006" instrument_node="">−9.707∗∗∗</span><br data-dcnode-id="4005"><span data-dcnode-id="4004" instrument_node="">(1.566)</span></td></tr><tr class="valign-top" data-dcnode-id="3991"><th class="align-left" data-dcnode-id="4000" scope="row"><span data-dcnode-id="4001" instrument_node="">By subway</span></th><td class="align-left" data-dcnode-id="3996"><span data-dcnode-id="3999" instrument_node="">7.347</span><br data-dcnode-id="3998"><span data-dcnode-id="3997" instrument_node="">(24.202)</span></td><td class="align-left" data-dcnode-id="3992"><span data-dcnode-id="3995" instrument_node="">−3.692∗∗∗</span><br data-dcnode-id="3994"><span data-dcnode-id="3993" instrument_node="">(0.793)</span></td></tr><tr class="valign-top" data-dcnode-id="3980"><th class="align-left" data-dcnode-id="3989" scope="row"><span data-dcnode-id="3990" instrument_node="">By foot or bike</span></th><td class="align-left" data-dcnode-id="3985"><span data-dcnode-id="3988" instrument_node="">20.168</span><br data-dcnode-id="3987"><span data-dcnode-id="3986" instrument_node="">(36.606)</span></td><td class="align-left" data-dcnode-id="3981"><span data-dcnode-id="3984" instrument_node="">−4.649∗∗∗</span><br data-dcnode-id="3983"><span data-dcnode-id="3982" instrument_node="">(1.319)</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3960"></p><p data-dcnode-id="3966" id="tspara0145"><span data-dcnode-id="3976" instrument_node="">∗</span><em data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">p</span></em><span data-dcnode-id="3973" instrument_node=""> &lt; 0.10, ∗∗</span><em data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">p</span></em><span data-dcnode-id="3970" instrument_node=""> &lt; 0.05, ∗∗∗</span><em data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">p</span></em><span data-dcnode-id="3967" instrument_node=""> &lt; 0.01.</span></p><p data-dcnode-id="3961" id="tspara0150"><span data-dcnode-id="3965" instrument_node="">This table includes only lottery entrants, reporting the means and standard deviations for lottery losers in the left column. The right column reports the results of a regression of the indicated variable on whether the entrant won the lottery, along with covariates from equation </span><a class="workspace-trigger" data-dcnode-id="3963" href="#fd1" name="bfd1"><span data-dcnode-id="3964" instrument_node="">(1)</span></a><span data-dcnode-id="3962" instrument_node="">.</span></p><p></p></div></div></section><section data-dcnode-id="3136" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3951" id="sectitle0045"><span data-dcnode-id="3956" instrument_node="">4</span><span data-dcnode-id="3954" instrument_node="">. </span><span data-dcnode-id="3952" instrument_node="">IV estimates on the effects of vehicle ownership restrictions</span></h2><section data-dcnode-id="3235" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3945" id="sectitle0050"><span data-dcnode-id="3950" instrument_node="">4.1</span><span data-dcnode-id="3948" instrument_node="">. </span><span data-dcnode-id="3946" instrument_node="">Effect on VKT and travel time</span></h3><p data-dcnode-id="3943" id="p0205"><span data-dcnode-id="3944" instrument_node="">We next turn to estimating the effect of owning an additional car on distance traveled by car (i.e., VKT). Whereas the reduced-form results in the previous section quantify the effects of the lottery on car ownership and travel behavior, the IV estimates are useful for evaluating the effects on VKT of another policy that affects vehicle ownership. For example, if Beijing were to increase registration taxes, vehicle ownership might decrease and the IV results would enable an estimate of the change in VKT that would result from the decline in ownership.</span></p><p data-dcnode-id="3756" id="p0210"><span data-dcnode-id="3942" instrument_node="">A naïve approach might regress travel behavior outcomes on the number of household cars plus controls such as age and education:</span><span class="display" data-dcnode-id="3793"><span class="formula" data-dcnode-id="3794" id="fd2"><span class="label" data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">(2)</span></span><span class="math" data-dcnode-id="3795"><span class="MathJax_Preview" data-dcnode-id="3939" style=""></span><span class="MathJax_SVG" data-dcnode-id="3798" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>Y</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub><mo is=&quot;true&quot;>=</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B3;</mi></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>0</mn></mrow></msub><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B3;</mi></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>1</mn></mrow></msub><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>C</mi><mi is=&quot;true&quot;>a</mi><mi is=&quot;true&quot;>r</mi><mi is=&quot;true&quot;>s</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>X</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub><mi is=&quot;true&quot;>&amp;#x3B3;</mi><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B5;</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub></math>" id="MathJax-Element-2-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="3859" focusable="false" height="2.709ex" role="img" style="vertical-align: -0.864ex;" viewBox="0 -794.4 12955.9 1166.2" width="30.091ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="3860" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="3930" is="true"><g data-dcnode-id="3935" is="true"><g data-dcnode-id="3936" is="true"><use data-dcnode-id="3937" href="#MJMATHI-59"><path d="M66 637Q54 637 49 637T39 638T32 641T30 647T33 664T42 682Q44 683 56 683Q104 680 165 680Q288 680 306 683H316Q322 677 322 674T320 656Q316 643 310 637H298Q242 637 242 624Q242 619 292 477T343 333L346 336Q350 340 358 349T379 373T411 410T454 461Q546 568 561 587T577 618Q577 634 545 637Q528 637 528 647Q528 649 530 661Q5
