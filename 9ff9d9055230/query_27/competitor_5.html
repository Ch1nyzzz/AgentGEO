</span></p><p data-dcnode-id="7730"><span data-dcnode-id="7731" instrument_node="">While you will see cyclists use many creative paths across wide, busy intersections in Beijing, the safest way for cyclists is to observe the traffic signals (there are often special signals for cyclists) and to make left turns in two steps as a pedestrian would. But if you spend any significant amount of time cycling in Beijing, you will probably start adopting more creative approaches. These can be learned by finding a local cyclist going your way and following him or her across the intersection.
</span></p><p data-dcnode-id="7710"><span data-dcnode-id="7729" instrument_node="">Several professional bike rental companies, as well as major hotels and some hostels, rent bikes on an hourly basis. For those who need the security of a guide, a bike touring company like </span><b data-dcnode-id="7727"><span data-dcnode-id="7728" instrument_node="">Bicycle Kingdom Rentals &amp; Tours</span></b><span data-dcnode-id="7726" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="7724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bicyclekingdom.com/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7725" instrument_node="">[107]</span></a><span data-dcnode-id="7723" instrument_node=""> or </span><b data-dcnode-id="7721"><span data-dcnode-id="7722" instrument_node="">Chihaner Adventures</span></b><span data-dcnode-id="7720" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="7718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chihaner.com/bencandy.php%3Ffid%3D75%26aid%3D702" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7719" instrument_node="">[108]</span></a><span data-dcnode-id="7717" instrument_node=""> or </span><b data-dcnode-id="7715"><span data-dcnode-id="7716" instrument_node="">Beijing Bicycle Tour</span></b><span data-dcnode-id="7714" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="7712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bespoketravelcompany.com/urbanedit/bespoke-opposite-house-beijing-bicycle-tour/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7713" instrument_node="">[109]</span></a><span data-dcnode-id="7711" instrument_node=""> would be a great way to go.
</span></p><p data-dcnode-id="7708"><span data-dcnode-id="7709" instrument_node="">If you are staying more than a few days a reasonable bike can be bought for ¥200.  Ensure that you have a good lock included in the price. The cheapest bikes are not worth the additional savings as you will get what you pay for.  The cheapest bikes will start to deteriorate as soon as you begin to ride, so spend a little more and get a bike in the ¥300-400 range. Bike rentals may have good bikes, but you pay a high price and run the risk of the bike being stolen.
</span></p><span data-dcnode-id="7707" instrument_node="">
</span><h3 data-dcnode-id="7697"><span class="mw-headline" data-dcnode-id="7705" id="By_Private_Plane_and_helicopter"><span data-dcnode-id="7706" instrument_node="">By Private Plane and helicopter</span></span><span class="mw-editsection" data-dcnode-id="7698"><span class="mw-editsection-bracket" data-dcnode-id="7703"><span data-dcnode-id="7704" instrument_node="">[</span></span><a data-dcnode-id="7701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D27" title="Edit section: By Private Plane and helicopter"><span data-dcnode-id="7702" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7699"><span data-dcnode-id="7700" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7696" instrument_node="">
</span><p data-dcnode-id="7694"><span data-dcnode-id="7695" instrument_node="">CFA (chinaflightadventures.com) rents and transports passengers to destinations of their choice around Beijing in small private aircraft, very fast over traffic.
</span></p><span data-dcnode-id="7693" instrument_node="">
</span><h3 data-dcnode-id="7683"><span class="mw-headline" data-dcnode-id="7691" id="By_minibus"><span data-dcnode-id="7692" instrument_node="">By minibus</span></span><span class="mw-editsection" data-dcnode-id="7684"><span class="mw-editsection-bracket" data-dcnode-id="7689"><span data-dcnode-id="7690" instrument_node="">[</span></span><a data-dcnode-id="7687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D28" title="Edit section: By minibus"><span data-dcnode-id="7688" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7685"><span data-dcnode-id="7686" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7682" instrument_node="">
</span><p data-dcnode-id="7680"><span data-dcnode-id="7681" instrument_node="">Minibuses are very common in the countryside outside the urban areas. Privately operated, most trips cost less than ¥10 per short journey and only a little more for longer journeys.
</span></p><span data-dcnode-id="7679" instrument_node="">
</span><h3 data-dcnode-id="7669"><span class="mw-headline" data-dcnode-id="7677" id="By_car_2"><span data-dcnode-id="7678" instrument_node="">By car</span></span><span class="mw-editsection" data-dcnode-id="7670"><span class="mw-editsection-bracket" data-dcnode-id="7675"><span data-dcnode-id="7676" instrument_node="">[</span></span><a data-dcnode-id="7673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D29" title="Edit section: By car"><span data-dcnode-id="7674" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7671"><span data-dcnode-id="7672" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7668" instrument_node="">
</span><p data-dcnode-id="7666"><span data-dcnode-id="7667" instrument_node="">Driving in Beijing can be quite complicated, language difficulties included, coupled with seemingly perpetual traffic jams. Many hotels, however, rent cars that come with drivers up to ¥1,000 per day. Nevertheless, public transport will get you to most of the main tourist sites, and you should use them as your primary mode of transport.
</span></p><p data-dcnode-id="7661"><span data-dcnode-id="7665" instrument_node="">You are not permitted to drive a car using the driver license issued by countries other than China. Even Hong Kong and Macau licenses are considered to be foreign and are not accepted. But for short visa holders (&lt; 3 months), it is possible to get a provisional driver's license at the </span><a data-dcnode-id="7663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Beijing_Capital_International_Airport" title="Beijing/Beijing Capital International Airport"><span data-dcnode-id="7664" instrument_node="">PEK airport</span></a><span data-dcnode-id="7662" instrument_node=""> or the transportation police stations in the city in minutes. You need to provide your passport as well as your foreign driver's license, and do a small examination(just to confirm you don't have physical or visual disability that effect the driving security), then you can get the provisional driver's license in minutes. With this license, you can legally drive cars in China. Ask any information desk at the airport for the direction of applying such a provisional driver's license.
</span></p><p data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">At the arrival hall (maybe domestic only) of T2, PEK airport, you can find the counters of many car rental companies, but their English is usually not good. You had better contact them in advance by phone.
</span></p><p data-dcnode-id="7654"><span data-dcnode-id="7658" instrument_node="">Here is an incomplete list of car rental companies serving at the </span><a data-dcnode-id="7656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Beijing_Capital_International_Airport" title="Beijing/Beijing Capital International Airport"><span data-dcnode-id="7657" instrument_node="">PEK airport</span></a><span data-dcnode-id="7655" instrument_node="">:
</span></p><span data-dcnode-id="7653" instrument_node="">
</span><ul data-dcnode-id="7629"><li data-dcnode-id="7646"><b data-dcnode-id="7651"><span data-dcnode-id="7652" instrument_node="">China Auto Rental</span></b><span data-dcnode-id="7650" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="7648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rentauto.net/cms5root/pages/en/index.jsp" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7649" instrument_node="">[110]</span></a><span data-dcnode-id="7647" instrument_node="">, Tel: +86 400 616 6666</span></li><span data-dcnode-id="7645" instrument_node="">
</span><li data-dcnode-id="7635"><b data-dcnode-id="7643"><span data-dcnode-id="7644" instrument_node="">Top One CN</span></b><span data-dcnode-id="7642" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="7640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//toponecn.cn/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7641" instrument_node="">[111]</span></a><span data-dcnode-id="7639" instrument_node="">, </span><a class="external free" data-dcnode-id="7637" href="tel:+86" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7638" instrument_node="">Tel:+86</span></a><span data-dcnode-id="7636" instrument_node=""> 400 678 8588</span></li><span data-dcnode-id="7634" instrument_node="">
</span><li data-dcnode-id="7630"><b data-dcnode-id="7632"><span data-dcnode-id="7633" instrument_node="">Avis</span></b><span data-dcnode-id="7631" instrument_node=""> also operates a car-rental service in Beijing.</span></li></ul><span data-dcnode-id="7628" instrument_node="">
</span><p data-dcnode-id="7626"><span data-dcnode-id="7627" instrument_node="">The daily rate of smaller economic cars is about ¥200-300. You need to deposit around ¥3,000 (possible by using CUP/VISA/MasterCard credit card).
</span></p><p data-dcnode-id="7621"><span data-dcnode-id="7625" instrument_node="">See also </span><a data-dcnode-id="7623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Driving_in_China" title="Driving in China"><span data-dcnode-id="7624" instrument_node="">Driving in China</span></a><span data-dcnode-id="7622" instrument_node="">.
</span></p><span data-dcnode-id="7620" instrument_node="">
</span><h2 data-dcnode-id="7603"><span class="mw-headline" data-dcnode-id="7618" id="See"><span data-dcnode-id="7619" instrument_node="">See</span></span><span class="mw-editsection" data-dcnode-id="7611"><span class="mw-editsection-bracket" data-dcnode-id="7616"><span data-dcnode-id="7617" instrument_node="">[</span></span><a data-dcnode-id="7614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D30" title="Edit section: See"><span data-dcnode-id="7615" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7612"><span data-dcnode-id="7613" instrument_node="">]</span></span></span><span class="mw-editsection" data-dcnode-id="7604"><span class="mw-editsection-bracket" data-dcnode-id="7609"><span data-dcnode-id="7610" instrument_node="">[</span></span><a data-dcnode-id="7607" href="#See" onclick="addListing(this, '30', 'see', 'Beijing');" title="click to add a see listing"><span data-dcnode-id="7608" instrument_node="">add listing</span></a><span class="mw-editsection-bracket" data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7602" instrument_node="">
</span><p data-dcnode-id="7595"><i data-dcnode-id="7597"><span data-dcnode-id="7601" instrument_node="">See the </span><a data-dcnode-id="7599" href="#Districts" title="Beijing"><span data-dcnode-id="7600" instrument_node="">Districts</span></a><span data-dcnode-id="7598" instrument_node=""> articles for individual listings.</span></i><span data-dcnode-id="7596" instrument_node="">
</span></p><span data-dcnode-id="7594" instrument_node="">
</span><h3 data-dcnode-id="7584"><span class="mw-headline" data-dcnode-id="7592" id="Landmarks"><span data-dcnode-id="7593" instrument_node="">Landmarks</span></span><span class="mw-editsection" data-dcnode-id="7585"><span class="mw-editsection-bracket" data-dcnode-id="7590"><span data-dcnode-id="7591" instrument_node="">[</span></span><a data-dcnode-id="7588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D31" title="Edit section: Landmarks"><span data-dcnode-id="7589" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7586"><span data-dcnode-id="7587" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7583" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7574"><div class="thumbinner" data-dcnode-id="7575" style="width:182px;"><a class="image" data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ANiaochao_Neijing.jpeg"><img alt="" class="thumbimage" data-dcnode-id="7582" data-file-height="2304" data-file-width="3072" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/3/30/Niaochao_Neijing.jpeg/180px-Niaochao_Neijing.jpeg&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/3/30/Niaochao_Neijing.jpeg/270px-Niaochao_Neijing.jpeg 1.5x, https://wikitravel.org/upload/shared//thumb/3/30/Niaochao_Neijing.jpeg/360px-Niaochao_Neijing.jpeg 2x" width="180"></a><span data-dcnode-id="7580" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7576"><div class="magnify" data-dcnode-id="7578"><a class="internal" data-dcnode-id="7579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ANiaochao_Neijing.jpeg" title="Enlarge"></a></div><span data-dcnode-id="7577" instrument_node="">National Stadium (Bird's Nest)</span></div></div></div><span data-dcnode-id="7573" instrument_node="">
</span><p data-dcnode-id="7565"><span data-dcnode-id="7572" instrument_node="">The centre of the city and most important landmark is </span><b data-dcnode-id="7570"><span data-dcnode-id="7571" instrument_node="">Tiananmen Square</span></b><span data-dcnode-id="7569" instrument_node=""> in </span><a data-dcnode-id="7567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="7568" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="7566" instrument_node="">.  This is the world's largest public square and a must see for all visitors from abroad and from elsewhere in China. The square is surrounded by grand buildings including the Great Hall of the People, the Museum of Chinese History, the Museum of the Chinese Revolution, the Qianmen Gate and the Forbidden City. It is also home to the Chairman Mao Memorial Hall and the Monument to the People's Martyrs and was also the site of the infamous massacre of student activists by the Peoples Liberation Army in 1989.
</span></p><p data-dcnode-id="7548"><span data-dcnode-id="7564" instrument_node="">The </span><b data-dcnode-id="7562"><span data-dcnode-id="7563" instrument_node="">National Stadium</span></b><span data-dcnode-id="7561" instrument_node=""> or affectionately "Bird's Nest", in </span><a data-dcnode-id="7559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang" title="Beijing/Chaoyang"><span data-dcnode-id="7560" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="7558" instrument_node=""> is a major landmark and a lasting symbol of the 2008 </span><a data-dcnode-id="7556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Olympic_Green" title="Beijing/Olympic Green"><span data-dcnode-id="7557" instrument_node="">Olympic Games</span></a><span data-dcnode-id="7555" instrument_node="">.  Two </span><b data-dcnode-id="7553"><span data-dcnode-id="7554" instrument_node="">contemporary buildings</span></b><span data-dcnode-id="7552" instrument_node=""> in </span><a data-dcnode-id="7550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang" title="Beijing/Chaoyang"><span data-dcnode-id="7551" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="7549" instrument_node=""> are remarkable landmarks: the CCTV Building (sometimes called "The Underpants" or "Bird Legs" by locals) and the World Trade Center Tower III. Both are outstanding examples of contemporary architecture. 
</span></p><p data-dcnode-id="7531"><span data-dcnode-id="7547" instrument_node="">There are also a number of remarkable remains from the </span><b data-dcnode-id="7545"><span data-dcnode-id="7546" instrument_node="">medieval city</span></b><span data-dcnode-id="7544" instrument_node=""> including the Ming Dynasty City Wall Site Park (the only remains of the city wall) in </span><a data-dcnode-id="7542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chongwen" title="Beijing/Chongwen"><span data-dcnode-id="7543" instrument_node="">Chongwen District</span></a><span data-dcnode-id="7541" instrument_node="">, the </span><a data-dcnode-id="7539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Gulou" title="Beijing/Gulou"><span data-dcnode-id="7540" instrument_node="">Drum and Bell Towers</span></a><span data-dcnode-id="7538" instrument_node=""> in </span><a data-dcnode-id="7536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="7537" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="7535" instrument_node="">, and Qianmen in </span><a data-dcnode-id="7533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chongwen" title="Beijing/Chongwen"><span data-dcnode-id="7534" instrument_node="">Chongwen District</span></a><span data-dcnode-id="7532" instrument_node="">.
</span></p><span data-dcnode-id="7530" instrument_node="">
</span><h3 data-dcnode-id="7520"><span class="mw-headline" data-dcnode-id="7528" id="Palaces.2C_temples_and_parks"><span data-dcnode-id="7529" instrument_node="">Palaces, temples and parks</span></span><span class="mw-editsection" data-dcnode-id="7521"><span class="mw-editsection-bracket" data-dcnode-id="7526"><span data-dcnode-id="7527" instrument_node="">[</span></span><a data-dcnode-id="7524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D32" title="Edit section: Palaces, temples and parks"><span data-dcnode-id="7525" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7522"><span data-dcnode-id="7523" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7519" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7510"><div class="thumbinner" data-dcnode-id="7511" style="width:182px;"><a class="image" data-dcnode-id="7517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AIMG_0914.JPG"><img alt="" class="thumbimage" data-dcnode-id="7518" data-file-height="2448" data-file-width="3264" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/3/37/IMG_0914.JPG/180px-IMG_0914.JPG&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/3/37/IMG_0914.JPG/270px-IMG_0914.JPG 1.5x, https://wikitravel.org/upload/shared//thumb/3/37/IMG_0914.JPG/360px-IMG_0914.JPG 2x" width="180"></a><span data-dcnode-id="7516" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7512"><div class="magnify" data-dcnode-id="7514"><a class="internal" data-dcnode-id="7515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AIMG_0914.JPG" title="Enlarge"></a></div><span data-dcnode-id="7513" instrument_node="">Inside the Forbidden City</span></div></div></div><span data-dcnode-id="7509" instrument_node="">
</span><p data-dcnode-id="7507"><span data-dcnode-id="7508" instrument_node="">The city's many green oases are a wonderful break from walking along the never ending boulevards and narrow hutongs.  Locals similarly flock to Beijing's palaces, temples and parks whenever they have time.  The green areas are not only used for relaxing but also for sports, dancing, singing and general recreation.
</span></p><p data-dcnode-id="7496"><span data-dcnode-id="7506" instrument_node="">The most important palace, bar none, is the </span><b data-dcnode-id="7504"><span data-dcnode-id="7505" instrument_node="">Forbidden City</span></b><span data-dcnode-id="7503" instrument_node=""> (故宫博物院) in </span><a data-dcnode-id="7501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="7502" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="7500" instrument_node="">. The Forbidden City was home to the Imperial Court during the Ming and Qing Dynasties. Unlike many other historical sights, the Forbidden City was relatively untouched during the cultural revolution due to the timely intervention of premier Zhou Enlai, who sent a battalion of his troops to guard the palace from the over-zealous Red Guards. Passport is </span><a class="external text" data-dcnode-id="7498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thetravelbrief.com/briefs/the-forbidden-city-bring-your-passport-to-the-forbidden-city" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7499" instrument_node="">required</span></a><span data-dcnode-id="7497" instrument_node=""> for foreigners to buy tickets to the Forbidden City. 
</span></p><p data-dcnode-id="7494"><span data-dcnode-id="7495" instrument_node="">When you come to Beijing, the first place you have to go is the Forbidden City. Because it is one the most significant symbols that shows the culture of China.
Here are some introduction of The Forbidden City:
</span></p><span data-dcnode-id="7493" instrument_node="">
</span><ol data-dcnode-id="7478"><li data-dcnode-id="7491"><span data-dcnode-id="7492" instrument_node=""> The Forbidden City was the Chinese imperial palace from the Ming dynasty to the end of the Qing dynasty—the years 1420 to 1912. </span></li><span data-dcnode-id="7490" instrument_node="">
</span><li data-dcnode-id="7488"><span data-dcnode-id="7489" instrument_node=""> It is located in the center of Beijing, China, and now houses the Palace Museum. </span></li><span data-dcnode-id="7487" instrument_node="">
</span><li data-dcnode-id="7485"><span data-dcnode-id="7486" instrument_node=""> It served as the home of emperors and their households. They lived here and did lots of daily things here. It also served as the ceremonial and political center of Chinese government for almost 500 years. </span></li><span data-dcnode-id="7484" instrument_node="">
</span><li data-dcnode-id="7482"><span data-dcnode-id="7483" instrument_node=""> The Forbidden City was Constructed from 1406 to 1420, the complex consists of 980 buildings and covers over 180 acres.  And it has influenced cultural and architectural developments in East Asia and elsewhere. The Forbidden City was declared a World Heritage Site in 1987, and is listed by UNESCO as the largest collection of preserved ancient wooden structures in the world.</span></li><span data-dcnode-id="7481" instrument_node="">
</span><li data-dcnode-id="7479"><span data-dcnode-id="7480" instrument_node=""> Since 1925 the Forbidden City has been under the charge of the Palace Museum.</span></li></ol><span data-dcnode-id="7477" instrument_node="">
</span><p data-dcnode-id="7461"><span data-dcnode-id="7476" instrument_node="">The </span><b data-dcnode-id="7474"><span data-dcnode-id="7475" instrument_node="">Temple of Heaven</span></b><span data-dcnode-id="7473" instrument_node=""> (天坛) in </span><a data-dcnode-id="7471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chongwen" title="Beijing/Chongwen"><span data-dcnode-id="7472" instrument_node="">Chongwen District</span></a><span data-dcnode-id="7470" instrument_node=""> is the symbol of Beijing and is surrounded by a lively park typically packed with hordes of local people drinking tea, practicing calligraphy or tai-chi or just watching the world go by.  The </span><b data-dcnode-id="7466"><a data-dcnode-id="7468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Yonghegong" title="Beijing/Yonghegong"><span data-dcnode-id="7469" instrument_node="">Yonghegong</span></a><span data-dcnode-id="7467" instrument_node=""> (Lama Temple)</span></b><span data-dcnode-id="7465" instrument_node=""> (雍和宫) in </span><a data-dcnode-id="7463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="7464" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="7462" instrument_node=""> is one of the most important and beautiful temples in the country. 
</span></p><p data-dcnode-id="7426"><span data-dcnode-id="7460" instrument_node="">Other parks are scattered around Beijing.  Some of the best are </span><b data-dcnode-id="7458"><span data-dcnode-id="7459" instrument_node="">Zhongshan Park</span></b><span data-dcnode-id="7457" instrument_node=""> (中山公园) in </span><a data-dcnode-id="7455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng" title="Beijing/Xicheng"><span data-dcnode-id="7456" instrument_node="">Xicheng District</span></a><span data-dcnode-id="7454" instrument_node="">, </span><b data-dcnode-id="7452"><span data-dcnode-id="7453" instrument_node="">Beihai Park</span></b><span data-dcnode-id="7451" instrument_node=""> (北海公园) in </span><a data-dcnode-id="7449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng" title="Beijing/Xicheng"><span data-dcnode-id="7450" instrument_node="">Xicheng District</span></a><span data-dcnode-id="7448" instrument_node="">, </span><b data-dcnode-id="7446"><span data-dcnode-id="7447" instrument_node="">Chaoyang Park</span></b><span data-dcnode-id="7445" instrument_node=""> (朝阳公园) in </span><a data-dcnode-id="7443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang" title="Beijing/Chaoyang"><span data-dcnode-id="7444" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="7442" instrument_node=""> and </span><b data-dcnode-id="7440"><span data-dcnode-id="7441" instrument_node="">Ritan Park</span></b><span data-dcnode-id="7439" instrument_node=""> (日坛公园) in </span><a data-dcnode-id="7437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang" title="Beijing/Chaoyang"><span data-dcnode-id="7438" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="7436" instrument_node="">.  The </span><b data-dcnode-id="7434"><span data-dcnode-id="7435" instrument_node="">Beijing Zoo</span></b><span data-dcnode-id="7433" instrument_node=""> (北京动物园) </span><a class="external autonumber" data-dcnode-id="7431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.beijingzoo.com/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7432" instrument_node="">[112]</span></a><span data-dcnode-id="7430" instrument_node=""> in </span><a data-dcnode-id="7428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng" title="Beijing/Xicheng"><span data-dcnode-id="7429" instrument_node="">Xicheng District</span></a><span data-dcnode-id="7427" instrument_node=""> is famous for its traditional landscaping and giant pandas, however like many zoos, the conditions for the animals have been questioned. The Beijing Aquarium is on the same grounds.
</span></p><p data-dcnode-id="7413"><a data-dcnode-id="7424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Haidian" title="Beijing/Haidian"><span data-dcnode-id="7425" instrument_node="">Haidian District</span></a><span data-dcnode-id="7423" instrument_node=""> is home to the </span><b data-dcnode-id="7421"><span data-dcnode-id="7422" instrument_node="">Summer palace</span></b><span data-dcnode-id="7420" instrument_node=""> (颐和园), the ruins of the Old Summer Palace (圆明园), </span><b data-dcnode-id="7418"><span data-dcnode-id="7419" instrument_node="">Fragrant Hills</span></b><span data-dcnode-id="7417" instrument_node=""> (香山), and the Beijing </span><b data-dcnode-id="7415"><span data-dcnode-id="7416" instrument_node="">Botanical Garden</span></b><span data-dcnode-id="7414" instrument_node=""> (北京植物园). All are quite close together and worth a visit.
</span></p><span data-dcnode-id="7412" instrument_node="">
</span><ul data-dcnode-id="7407"><li data-dcnode-id="7408"><b data-dcnode-id="7410"><span data-dcnode-id="7411" instrument_node="">Nanluoguxiang</span></b><span data-dcnode-id="7409" instrument_node="">(南锣鼓巷)  Nanluoguxiang a total length of 786 meters and 8 meters wide. The Lane is a north-south channel during Yuan Dynasty, as the Beijing Hutong protected areas. That "the capital city of Square Lane alley set of five," said Luo Guo Lane.</span></li></ul><span data-dcnode-id="7406" instrument_node="">
</span><ul data-dcnode-id="7398"><li data-dcnode-id="7399"><b data-dcnode-id="7404"><span data-dcnode-id="7405" instrument_node="">JuYong Guan</span></b><span data-dcnode-id="7403" instrument_node="">  Juyongguan Pass</span><a class="external autonumber" data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greatwall-china.com/ju-yong-guan/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7402" instrument_node="">[113]</span></a><span data-dcnode-id="7400" instrument_node="">, also known as Juyongguan in Chinese, is located 20 kilometers (12 miles) north of Changping County, about 60 kilometers (37 mi) from Beijing. It is a renowned pass of the Great Wall of China. Enlisted in the World Heritage Directory in 1987, it is a national cultural protection unit.</span></li></ul><span data-dcnode-id="7397" instrument_node="">
</span><ul data-dcnode-id="7382"><li data-dcnode-id="7383"><span class="vcard" data-dcnode-id="7384" id="Olympic_Water_Park"><span class="fn org" data-dcnode-id="7395"><span data-dcnode-id="7396" instrument_node="">Olympic Water Park</span></span><span data-dcnode-id="7394" instrument_node=""> (</span><span class="nickname" data-dcnode-id="7391"><span class="non-latin" data-dcnode-id="7392"><span data-dcnode-id="7393" instrument_node="">奥林匹克水上公园</span></span></span><span data-dcnode-id="7390" instrument_node="">). </span><span class="description" data-dcnode-id="7388"><span data-dcnode-id="7389" instrument_node="">Covering a planned area of 162.59 hectare and a floor area of 32,000 square meters, Shunyi Olympic Rowing-Canoeing Park is designated as the venue for rowing, canoeing and marathon swimming competitions of the Beijing 2008 Olympic Games, and also rowing events during the Beijing Paralympics. </span></span><span data-dcnode-id="7387" instrument_node=""> &nbsp;</span><a class="listing-edit" data-dcnode-id="7385" href="#Olympic_Water_Park" onclick="editListing('Olympic_Water_Park', 'see', 'Beijing');return false;" rel="nofollow" title="click to edit Olympic Water Park"><span data-dcnode-id="7386" instrument_node="">edit</span></a></span></li></ul><span data-dcnode-id="7381" instrument_node="">
</span><h3 data-dcnode-id="7371"><span class="mw-headline" data-dcnode-id="7379" id="Museums_and_galleries"><span data-dcnode-id="7380" instrument_node="">Museums and galleries</span></span><span class="mw-editsection" data-dcnode-id="7372"><span class="mw-editsection-bracket" data-dcnode-id="7377"><span data-dcnode-id="7378" instrument_node="">[</span></span><a data-dcnode-id="7375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D33" title="Edit section: Museums and galleries"><span data-dcnode-id="7376" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7373"><span data-dcnode-id="7374" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7370" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7361"><div class="thumbinner" data-dcnode-id="7362" style="width:182px;"><a class="image" data-dcnode-id="7368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AGuo_Jia_Bo_Wu_Guan.jpeg"><img alt="" class="thumbimage" data-dcnode-id="7369" data-file-height="533" data-file-width="800" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/f/f8/Guo_Jia_Bo_Wu_Guan.jpeg/180px-Guo_Jia_Bo_Wu_Guan.jpeg&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/f/f8/Guo_Jia_Bo_Wu_Guan.jpeg/270px-Guo_Jia_Bo_Wu_Guan.jpeg 1.5x, https://wikitravel.org/upload/shared//thumb/f/f8/Guo_Jia_Bo_Wu_Guan.jpeg/360px-Guo_Jia_Bo_Wu_Guan.jpeg 2x" width="180"></a><span data-dcnode-id="7367" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7363"><div class="magnify" data-dcnode-id="7365"><a class="internal" data-dcnode-id="7366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AGuo_Jia_Bo_Wu_Guan.jpeg" title="Enlarge"></a></div><span data-dcnode-id="7364" instrument_node="">National Museum of China</span></div></div></div><span data-dcnode-id="7360" instrument_node="">
</span><p data-dcnode-id="7352"><span data-dcnode-id="7359" instrument_node="">Beijing has more than 100 museums but most are not visited by foreign tourists. The city contains one of the largest and most well known museums the world, the </span><b data-dcnode-id="7357"><span data-dcnode-id="7358" instrument_node="">Palace Museum</span></b><span data-dcnode-id="7356" instrument_node="">, also known as the Forbidden City, a </span><a class="mw-redirect" data-dcnode-id="7354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/World_Heritage_Site%23China" title="World Heritage Site"><span data-dcnode-id="7355" instrument_node="">UNESCO World Heritage Site</span></a><span data-dcnode-id="7353" instrument_node="">. Several museums may have free admission throughout the year or on certain holidays. Additionally, entry tickets must be reserved three days in advance.
</span></p><p data-dcnode-id="7323"><span data-dcnode-id="7351" instrument_node="">One of the most well-known museums in Beijing is the </span><b data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">National Museum</span></b><span data-dcnode-id="7348" instrument_node=""> (国家博物馆) in </span><a data-dcnode-id="7346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="7347" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="7345" instrument_node="">.  The </span><b data-dcnode-id="7343"><span data-dcnode-id="7344" instrument_node="">Military Museum</span></b><span data-dcnode-id="7342" instrument_node=""> (军事博物馆) in </span><a data-dcnode-id="7340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Haidian" title="Beijing/Haidian"><span data-dcnode-id="7341" instrument_node="">Haidian District</span></a><span data-dcnode-id="7339" instrument_node=""> has long been a favorite with domestic and foreign tourists.  The </span><b data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">Capital Museum</span></b><span data-dcnode-id="7336" instrument_node=""> (首都博物馆) in </span><a data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng" title="Beijing/Xicheng"><span data-dcnode-id="7335" instrument_node="">Xicheng District</span></a><span data-dcnode-id="7333" instrument_node=""> is a high profile museum with historical and art exhibitions. The </span><b data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">China Aviation Museum</span></b><span data-dcnode-id="7330" instrument_node=""> (中国民航博物馆) located in the </span><a data-dcnode-id="7328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Northern_Suburbs" title="Beijing/Northern Suburbs"><span data-dcnode-id="7329" instrument_node="">Beijing/Northern Suburbs</span></a><span data-dcnode-id="7327" instrument_node=""> hosts 200+ rare and unique Chinese (mostly Soviet-era) aircraft. Finally, a number of restored former residences of famous Beijingers, especially in </span><a data-dcnode-id="7325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng" title="Beijing/Xicheng"><span data-dcnode-id="7326" instrument_node="">Xicheng District</span></a><span data-dcnode-id="7324" instrument_node="">, give a good insight into daily life in former times.
</span></p><p data-dcnode-id="7309"><span data-dcnode-id="7322" instrument_node="">The </span><b data-dcnode-id="7320"><span data-dcnode-id="7321" instrument_node="">contemporary art scene</span></b><span data-dcnode-id="7319" instrument_node=""> in Beijing is booming and a large number of artists exhibit and sell their art in galleries around the city. The galleries are concentrated in a number of art districts, including the oldest and easiest accessible, but also increasingly commercial and mainstream. The most well known is </span><a data-dcnode-id="7317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/798_Art_Zone" title="Beijing/798 Art Zone"><span data-dcnode-id="7318" instrument_node="">Dashanzi Art District</span></a><span data-dcnode-id="7316" instrument_node=""> in </span><a data-dcnode-id="7314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang" title="Beijing/Chaoyang"><span data-dcnode-id="7315" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="7313" instrument_node="">. Other newer and perhaps more cutting edge art districts include Caochangdi in </span><a data-dcnode-id="7311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang" title="Beijing/Chaoyang"><span data-dcnode-id="7312" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="7310" instrument_node="">, Dashilar near Qianmen, and Songzhuan Artist's Village in Tongzhou District.
</span></p><span data-dcnode-id="7308" instrument_node="">
</span><h2 data-dcnode-id="7298"><span class="mw-headline" data-dcnode-id="7306" id="Prepare"><span data-dcnode-id="7307" instrument_node="">Prepare</span></span><span class="mw-editsection" data-dcnode-id="7299"><span class="mw-editsection-bracket" data-dcnode-id="7304"><span data-dcnode-id="7305" instrument_node="">[</span></span><a data-dcnode-id="7302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D34" title="Edit section: Prepare"><span data-dcnode-id="7303" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7297" instrument_node="">
</span><p data-dcnode-id="7295"><span data-dcnode-id="7296" instrument_node="">While more or less everything can be obtained or arranged on the spot, you should nevertheless prepare a little.
</span></p><span data-dcnode-id="7294" instrument_node="">
</span><ul data-dcnode-id="7270"><li data-dcnode-id="7292"><span data-dcnode-id="7293" instrument_node=""> Consider reading up on all the sights you plan to see first to get a greater understanding of the cultural significance of the sites. Translations into English may be of low quality or non-existent. If anything, a visit to one of the below sites is more likely to pique ones interest and therefore there is always plenty of time to learn more after visiting.</span></li><span data-dcnode-id="7291" instrument_node="">
</span><li data-dcnode-id="7289"><span data-dcnode-id="7290" instrument_node=""> Bring a web-enabled smartphone or consider purchasing a map for those sites within city limits. Note Google Maps and Mainland China have a storied history and at times location services may be off by a few or several hundred metres. English-language maps can be purchased from various bookstores, travel agencies, or street vendors all around Beijing (don't simply pay the asking price, try to haggle!) but similar to guidebooks, may be a bit outdated. Hotels may also prove a good option to purchase a map. Even maps in Chinese-only can still be more helpful than nothing. </span></li><span data-dcnode-id="7288" instrument_node="">
</span><li data-dcnode-id="7286"><span data-dcnode-id="7287" instrument_node=""> If you have an IPhone, you can use offline google map by downloading the Satellite map and caching ( remember traffic and public transit overlays are 200-300 meters off from actual). Make sure you cache enough map information before reaching mainland, as google apps will not be able to access internet. Once you have both satellite and public transit overlays , you can switch between them and navigate easily and it works well enough with in Beijing city limits.</span></li><span data-dcnode-id="7285" instrument_node="">
</span><li data-dcnode-id="7283"><span data-dcnode-id="7284" instrument_node=""> If you are planning to use taxis, make sure you have your destinations written down or printed in Chinese. Hotels provide business cards that are helpful when you are trying to get back.</span></li><span data-dcnode-id="7282" instrument_node="">
</span><li data-dcnode-id="7280"><span data-dcnode-id="7281" instrument_node=""> Especially on trips to the Great Wall, make sure you have some supplies with you, such as ample water, some snacks, sunscreen etc. While those things are also available there, they will be much more expensive and choice is limited. If you come across a Dia market in the city, stock up there: they are well-stocked and arguably the cheapest. Also those who speak the least English.</span></li><span data-dcnode-id="7279" instrument_node="">
</span><li data-dcnode-id="7277"><span data-dcnode-id="7278" instrument_node=""> In general, but especially for shopping, try to always have ample change and small bills. Merchants may be reluctant or unable to give change. Which, however, may be useful in steering the price or getting stuff for free.</span></li><span data-dcnode-id="7276" instrument_node="">
</span><li data-dcnode-id="7274"><span data-dcnode-id="7275" instrument_node=""> If you don't need to, consider not carrying a purse or bag, as it will speed up your passing of the ubiquitous X-ray checks.</span></li><span data-dcnode-id="7273" instrument_node="">
</span><li data-dcnode-id="7271"><span data-dcnode-id="7272" instrument_node=""> Make sure you are familiar with common tourists scams and how to avoid them.</span></li></ul><span data-dcnode-id="7269" instrument_node="">
</span><h2 data-dcnode-id="7259"><span class="mw-headline" data-dcnode-id="7267" id="Talk"><span data-dcnode-id="7268" instrument_node="">Talk</span></span><span class="mw-editsection" data-dcnode-id="7260"><span class="mw-editsection-bracket" data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">[</span></span><a data-dcnode-id="7263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D35" title="Edit section: Talk"><span data-dcnode-id="7264" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7261"><span data-dcnode-id="7262" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7258" instrument_node="">
</span><p data-dcnode-id="7250"><span data-dcnode-id="7257" instrument_node="">The language of Beijing is Mandarin Chinese. Standard Mandarin itself was the administrative language of the Ming and Qing dynasties and was based mainly on the Beijing dialect. For language students this makes studying in Beijing an excellent chance to learn the language in a relatively pure form. That being said, Beijing dialect contains nasal "er" sounds at the end of many words. Hence the ubiquitous mutton kebabs (羊肉串 </span><i data-dcnode-id="7255"><span data-dcnode-id="7256" instrument_node="">yáng ròu chuàn</span></i><span data-dcnode-id="7254" instrument_node="">) become "</span><i data-dcnode-id="7252"><span data-dcnode-id="7253" instrument_node="">yáng ròu chuànr</span></i><span data-dcnode-id="7251" instrument_node="">". In addition, the Beijing dialect consists of many local slangs which have not been incorporated into standard Mandarin. Beijing taxi drivers are famously chatty and will gladly engage students of the language offering excellent chances to practice the language and get a feel for the changes in the city and country from an "Old Beijinger" -- although he or she may lay no claim to Beijing but instead spent most of his or her life in neighboring suburbs or surrounding provinces and thus like many of the people you will see on the street, not be considered a Beijinger.
</span></p><p data-dcnode-id="7248"><span data-dcnode-id="7249" instrument_node="">English is spoken by staff at the main tourist attractions, as well as at major hotels. Otherwise, English speakers are not common, so always get your hotel's business card to show the taxi driver in case you get lost. Likewise, have staff at your hotel write down the names of any tourist attraction you plan to visit in Chinese, so locals can point you out in the right direction.
</span></p><span data-dcnode-id="7247" instrument_node="">
</span><h2 data-dcnode-id="7230"><span class="mw-headline" data-dcnode-id="7245" id="Do"><span data-dcnode-id="7246" instrument_node="">Do</span></span><span class="mw-editsection" data-dcnode-id="7238"><span class="mw-editsection-bracket" data-dcnode-id="7243"><span data-dcnode-id="7244" instrument_node="">[</span></span><a data-dcnode-id="7241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D36" title="Edit section: Do"><span data-dcnode-id="7242" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7239"><span data-dcnode-id="7240" instrument_node="">]</span></span></span><span class="mw-editsection" data-dcnode-id="7231"><span class="mw-editsection-bracket" data-dcnode-id="7236"><span data-dcnode-id="7237" instrument_node="">[</span></span><a data-dcnode-id="7234" href="#Do" onclick="addListing(this, '36', 'do', 'Beijing');" title="click to add a do listing"><span data-dcnode-id="7235" instrument_node="">add listing</span></a><span class="mw-editsection-bracket" data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7229" instrument_node="">
</span><p data-dcnode-id="7222"><i data-dcnode-id="7224"><span data-dcnode-id="7228" instrument_node="">See the </span><a data-dcnode-id="7226" href="#Districts" title="Beijing"><span data-dcnode-id="7227" instrument_node="">Districts</span></a><span data-dcnode-id="7225" instrument_node=""> articles for individual listings.</span></i><span data-dcnode-id="7223" instrument_node="">
</span></p><span data-dcnode-id="7221" instrument_node="">
</span><h3 data-dcnode-id="7211"><span class="mw-headline" data-dcnode-id="7219" id="Festivals"><span data-dcnode-id="7220" instrument_node="">Festivals</span></span><span class="mw-editsection" data-dcnode-id="7212"><span class="mw-editsection-bracket" data-dcnode-id="7217"><span data-dcnode-id="7218" instrument_node="">[</span></span><a data-dcnode-id="7215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D37" title="Edit section: Festivals"><span data-dcnode-id="7216" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7213"><span data-dcnode-id="7214" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7210" instrument_node="">
</span><ul data-dcnode-id="7205"><li data-dcnode-id="7206"><b data-dcnode-id="7208"><span data-dcnode-id="7209" instrument_node="">Temple Fair</span></b><span data-dcnode-id="7207" instrument_node=""> Temple fair is a good choice to enjoy Spring Festival of Beijing. Every Spring Festival, there are dozens of temple fairs in Beijing, such as in Temple of Heaven, Ditan, Beihai, Changdian, Longtan Lake, Lotus Pool Park, etc. If you travel to Beijing during the Spring Festival, Temple Fair is a must-see.</span></li></ul><span data-dcnode-id="7204" instrument_node="">
</span><p data-dcnode-id="7200"><i data-dcnode-id="7202"><span data-dcnode-id="7203" instrument_node="">Time</span></i><span data-dcnode-id="7201" instrument_node="">: Spring Festival (late-Jan to early-Feb depending on Chinese Lunar Calendar)
</span></p><span data-dcnode-id="7199" instrument_node="">
</span><ul data-dcnode-id="7194"><li data-dcnode-id="7195"><b data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">The Grand View Garden Fair</span></b><span data-dcnode-id="7196" instrument_node=""> The Grand View Garden Fair is held every year during the Spring Festival. There are performances and quizzes at the theme of “A Dream of Red Mansions”, one of China’s Four Great Classical Novels. What’s more, costumes of ancient are available for people to take pictures. </span></li></ul><span data-dcnode-id="7193" instrument_node="">
</span><p data-dcnode-id="7186"><i data-dcnode-id="7191"><span data-dcnode-id="7192" instrument_node="">Time</span></i><span data-dcnode-id="7190" instrument_node="">: Spring Festival
</span><i data-dcnode-id="7188"><span data-dcnode-id="7189" instrument_node="">Location</span></i><span data-dcnode-id="7187" instrument_node="">: outside the Chang'anmen(厂安门)
</span></p><span data-dcnode-id="7185" instrument_node="">
</span><ul data-dcnode-id="7180"><li data-dcnode-id="7181"><b data-dcnode-id="7183"><span data-dcnode-id="7184" instrument_node="">Music Festival</span></b><span data-dcnode-id="7182" instrument_node=""> Annual May Day, National Day, there’s a variety of music festivals held in Haidian Park, Chaoyang Park, Tongzhou Canal Park or large parks in the suburban, such as the well known school-sponsored Midi-Music Festival, the Strawberry Music Festival under the label of Modern Sky, as well as the Beijing Pop Festival held in Chaoyang Park. </span></li></ul><span data-dcnode-id="7179" instrument_node="">
</span><p data-dcnode-id="7175"><i data-dcnode-id="7177"><span data-dcnode-id="7178" instrument_node="">Time</span></i><span data-dcnode-id="7176" instrument_node="">: Labour Day (1 May), National Day (1 Oct)
</span></p><span data-dcnode-id="7174" instrument_node="">
</span><ul data-dcnode-id="7169"><li data-dcnode-id="7170"><b data-dcnode-id="7172"><span data-dcnode-id="7173" instrument_node="">Beijing Chrysanthemum Exhibition</span></b><span data-dcnode-id="7171" instrument_node=""> Held every year in major parks of Beijing. The Beihai Park Chrysanthemum Exhibition is the most famous, which has been held for more than twenty sessions, showing varieties of beautiful chrysanthemums.</span></li></ul><span data-dcnode-id="7168" instrument_node="">
</span><p data-dcnode-id="7164"><i data-dcnode-id="7166"><span data-dcnode-id="7167" instrument_node="">Time</span></i><span data-dcnode-id="7165" instrument_node="">: every November
</span></p><span data-dcnode-id="7163" instrument_node="">
</span><ul data-dcnode-id="7158"><li data-dcnode-id="7159"><b data-dcnode-id="7161"><span data-dcnode-id="7162" instrument_node="">Fragrant Hills Red Leaves Festival</span></b><span data-dcnode-id="7160" instrument_node=""> There is Cotinuscoggygria and maples in the west part of Fragrant Hills Park, as well as the hillside around the park, whenever before and after the frost, the leaves of these trees turn read, and the mountains and plains of red leaves are as bright as fire, very spectacular. </span></li></ul><span data-dcnode-id="7157" instrument_node="">
</span><p data-dcnode-id="7150"><i data-dcnode-id="7155"><span data-dcnode-id="7156" instrument_node="">Time</span></i><span data-dcnode-id="7154" instrument_node="">: annually each mid-Oct to mid-Nov
</span><i data-dcnode-id="7152"><span data-dcnode-id="7153" instrument_node="">Location</span></i><span data-dcnode-id="7151" instrument_node="">: Fragrant Hills Park
</span></p><span data-dcnode-id="7149" instrument_node="">
</span><ul data-dcnode-id="7144"><li data-dcnode-id="7145"><b data-dcnode-id="7147"><span data-dcnode-id="7148" instrument_node="">Yanqing Ice and Snow Tourism Festival</span></b><span data-dcnode-id="7146" instrument_node=""> Important winter tourism festival in North China, and it is always famous for its rich and wonderful landscape of snow and ice, snow activities, and unique style of folk landscape. The main activities are Longqing Gorge Ice, alpine skiing, snowmobiling, hot springs resort, snow Temple fair and so on. </span></li></ul><span data-dcnode-id="7143" instrument_node="">
</span><p data-dcnode-id="7136"><i data-dcnode-id="7141"><span data-dcnode-id="7142" instrument_node="">Time</span></i><span data-dcnode-id="7140" instrument_node="">: annually 10 Dec to the end of Feb
</span><i data-dcnode-id="7138"><span data-dcnode-id="7139" instrument_node="">Location</span></i><span data-dcnode-id="7137" instrument_node="">: Shijinglong Ski Resort, Badaling Ski Resort, Longqing Gorge
</span></p><span data-dcnode-id="7135" instrument_node="">
</span><h3 data-dcnode-id="7125"><span class="mw-headline" data-dcnode-id="7133" id="Walks_and_rides"><span data-dcnode-id="7134" instrument_node="">Walks and rides</span></span><span class="mw-editsection" data-dcnode-id="7126"><span class="mw-editsection-bracket" data-dcnode-id="7131"><span data-dcnode-id="7132" instrument_node="">[</span></span><a data-dcnode-id="7129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D38" title="Edit section: Walks and rides"><span data-dcnode-id="7130" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7127"><span data-dcnode-id="7128" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7124" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7115"><div class="thumbinner" data-dcnode-id="7116" style="width:202px;"><a class="image" data-dcnode-id="7122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3APicture_144.jpg"><img alt="" class="thumbimage" data-dcnode-id="7123" data-file-height="852" data-file-width="1136" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/en/thumb/a/ad/Picture_144.jpg/200px-Picture_144.jpg&amp;raw" srcset="/upload/en/thumb/a/ad/Picture_144.jpg/300px-Picture_144.jpg 1.5x, /upload/en/thumb/a/ad/Picture_144.jpg/400px-Picture_144.jpg 2x" width="200"></a><span data-dcnode-id="7121" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7117"><div class="magnify" data-dcnode-id="7119"><a class="internal" data-dcnode-id="7120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3APicture_144.jpg" title="Enlarge"></a></div><span data-dcnode-id="7118" instrument_node="">Great Wall at Badaling</span></div></div></div><span data-dcnode-id="7114" instrument_node="">
</span><p data-dcnode-id="7112"><span data-dcnode-id="7113" instrument_node="">The Great Wall of China  (长城 Chángchéng) is one of the greatest buildings in the world. It has a long history in China. It can trace back to the Spring and autumn Period. In the ancient times, the main purpose of the Great Wall is to defense aggression. It was an important military place in the past.  The Great Wall of China is a series of fortifications made of stone, brick, rammed earth, wood, and other materials, generally built along an east-to-west line across the historical northern borders of China to protect the Chinese states and empires against the raids and invasions of the various nomadic groups of the Eurasian Steppe. The majority of the existing wall is from the Ming Dynasty (1368–1644)
</span></p><span data-dcnode-id="7111" instrument_node="">
</span><ul data-dcnode-id="7093"><li data-dcnode-id="7094"><b data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">The Great Wall of China</span></b><span data-dcnode-id="7108" instrument_node="">  (长城 </span><i data-dcnode-id="7106"><span data-dcnode-id="7107" instrument_node="">Chángchéng</span></i><span data-dcnode-id="7105" instrument_node="">) is about a 1-hour train trip, 1.5 hour bus ride, or 45-60 -minute car ride from the city (be aware of </span><a data-dcnode-id="7103" href="#Stay_safe"><span data-dcnode-id="7104" instrument_node="">bus scams</span></a><span data-dcnode-id="7102" instrument_node="">).  See </span><a data-dcnode-id="7099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Great_Wall_of_China" title="Great Wall of China"><b data-dcnode-id="7100"><span data-dcnode-id="7101" instrument_node="">Great Wall</span></b></a><span data-dcnode-id="7098" instrument_node=""> for general information on the Great Wall. The Badaling section is the most famous, but also over-restored and crowded. Jinshanling, Huanghuacheng and Simatai are more distant but offer a better view of the wall away from the crowds. Mutianyu has been restored, but is far less crowded than Badaling. When going to Badaling go to the Huangtudian Railway station and buy a train ticket (¥6) to Badaling. Or take the public bus 877. The journey takes 1.5 hours. Be quick to get a sit on the train but no one will be against you sitting on the floor.  Crowds are a definite issue with the Great Wall: at popular sections at popular times, it becomes not the Great Wall of China, but rather the Great Wall of Tourists. It is possible to rent a taxi for ¥400-800 for the round trip including waiting time.  You may want to bring a jacket against the wind or cold in the chillier season - in the summer you will need lots of water, and it will be cheaper if you bring your own. For details see </span><a data-dcnode-id="7096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Great_Wall_of_China" title="Great Wall of China"><span data-dcnode-id="7097" instrument_node="">Great Wall of China</span></a><span data-dcnode-id="7095" instrument_node="">.</span></li></ul><span data-dcnode-id="7092" instrument_node="">
</span><ul data-dcnode-id="7070"><li data-dcnode-id="7071"><span class="vcard" data-dcnode-id="7072" id="Hutongs"><span class="fn org" data-dcnode-id="7090"><span data-dcnode-id="7091" instrument_node="">Hutongs</span></span><span data-dcnode-id="7089" instrument_node=""> (</span><span class="nickname" data-dcnode-id="7085"><span class="non-latin" data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">胡同</span></span><span data-dcnode-id="7086" instrument_node=""> Hútòng</span></span><span data-dcnode-id="7084" instrument_node="">). </span><span class="description" data-dcnode-id="7076"><span data-dcnode-id="7083" instrument_node="">Beijing's ancient alleyways, where you can find traditional Beijing architecture. They date back to when Beijing was the capital of the Yuan Dynasty (1266-1368). Most buildings in hutongs are made in the traditional courtyard (四合院 </span><i data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">sìhéyuàn</span></i><span data-dcnode-id="7080" instrument_node="">) style. Many of these courtyard homes were originally occupied by aristocrats, though after the Communist takeover in 1949 the aristocrats were pushed out and replaced with poor families. Hutongs can still be found throughout the area within the 2nd Ring Road, though many are being demolished to make way for new buildings and wider roads. Most popular among tourists are the hutongs near Qianmen, Houhai, and </span><a data-dcnode-id="7078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Yonghegong" title="Beijing/Yonghegong"><span data-dcnode-id="7079" instrument_node="">Yonghegong</span></a><span data-dcnode-id="7077" instrument_node=""> Lama Temple. The hutongs may at first feel intimidating to travellers used to the new wide streets of Beijing, but the locals are very friendly and will often try to help you if you look lost.</span></span><span data-dcnode-id="7075" instrument_node=""> &nbsp;</span><a class="listing-edit" data-dcnode-id="7073" href="#Hutongs" onclick="editListing('Hutongs', 'do', 'Beijing');return false;" rel="nofollow" title="click to edit Hutongs"><span data-dcnode-id="7074" instrument_node="">edit</span></a></span></li></ul><span data-dcnode-id="7069" instrument_node="">
</span><ul data-dcnode-id="7057"><li data-dcnode-id="7058"><span data-dcnode-id="7068" instrument_node=""> </span><span class="vcard" data-dcnode-id="7059" id="Rent_a_bicycle"><span class="fn org" data-dcnode-id="7066"><span data-dcnode-id="7067" instrument_node="">Rent a bicycle</span></span><span data-dcnode-id="7065" instrument_node="">. </span><span class="description" data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">Traverse some of the remaining hutongs.  There is no better way to see Beijing firsthand than on a bicycle but just be very aware of cars and Chinese driving customs and rules for right-of-way.  See above for bike rental information.</span></span><span data-dcnode-id="7062" instrument_node=""> &nbsp;</span><a class="listing-edit" data-dcnode-id="7060" href="#Rent_a_bicycle" onclick="editListing('Rent_a_bicycle', 'do', 'Beijing');return false;" rel="nofollow" title="click to edit Rent a bicycle"><span data-dcnode-id="7061" instrument_node="">edit</span></a></span></li></ul><span data-dcnode-id="7056" instrument_node="">
</span><ul data-dcnode-id="7038"><li data-dcnode-id="7039"><span data-dcnode-id="7055" instrument_node=""> </span><span class="vcard" data-dcnode-id="7040" id="Hidden_City_Game"><span class="fn org" data-dcnode-id="7053"><span data-dcnode-id="7054" instrument_node="">Hidden City Game</span></span><span data-dcnode-id="7052" instrument_node="">, </span><a class="url external autonumber" data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/www.hiddencitygame.com" rel="nofollow"><span data-dcnode-id="7051" instrument_node="">[2]</span></a><span data-dcnode-id="7049" instrument_node="">. </span><span class="description" data-dcnode-id="7047"><span data-dcnode-id="7048" instrument_node="">Explore Beijing's hutongs and parks in a monthly bi-lingual competition on Sunday afternoons for tourists, expats and local Chinese. It's the fun way to discover Beijing's history and culture. Explorers have try of Chinese traditions such as calligraphy, music, art, food and games. Restaurants sponsor prizes totaling over 5000rmb per event. Cost:</span></span><span data-dcnode-id="7046" instrument_node=""> </span><span class="price" data-dcnode-id="7044"><span data-dcnode-id="7045" instrument_node="">60 - 80rmb</span></span><span data-dcnode-id="7043" instrument_node="">. &nbsp;</span><a class="listing-edit" data-dcnode-id="7041" href="#Hidden_City_Game" onclick="editListing('Hidden_City_Game', 'do', 'Beijing');return false;" rel="nofollow" title="click to edit Hidden City Game"><span data-dcnode-id="7042" instrument_node="">edit</span></a></span></li></ul><span data-dcnode-id="7037" instrument_node="">
</span><dl data-dcnode-id="7029"><dd data-dcnode-id="7030"><ul data-dcnode-id="7031"><li data-dcnode-id="7035"><span data-dcnode-id="7036" instrument_node=""> 12:45pm 19th March 2017, Culture Yard, 10 Shique Hutong, 250m east from exit C, Beixinqiao, Line 5</span></li><span data-dcnode-id="7034" instrument_node="">
</span><li data-dcnode-id="7032"><span data-dcnode-id="7033" instrument_node=""> check website for further events: www.hiddencitygame.com</span></li></ul></dd></dl><span data-dcnode-id="7028" instrument_node="">
</span><h3 data-dcnode-id="7018"><span class="mw-headline" data-dcnode-id="7026" id="Theaters_and_concert_halls"><span data-dcnode-id="7027" instrument_node="">Theaters and concert halls</span></span><span class="mw-editsection" data-dcnode-id="7019"><span class="mw-editsection-bracket" data-dcnode-id="7024"><span data-dcnode-id="7025" instrument_node="">[</span></span><a data-dcnode-id="7022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D39" title="Edit section: Theaters and concert halls"><span data-dcnode-id="7023" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7020"><span data-dcnode-id="7021" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7017" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7008"><div class="thumbinner" data-dcnode-id="7009" style="width:202px;"><a class="image" data-dcnode-id="7015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AGuojia_Da_Juyuan.jpeg"><img alt="" class="thumbimage" data-dcnode-id="7016" data-file-height="537" data-file-width="800" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/6/6f/Guojia_Da_Juyuan.jpeg/200px-Guojia_Da_Juyuan.jpeg&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/6/6f/Guojia_Da_Juyuan.jpeg/300px-Guojia_Da_Juyuan.jpeg 1.5x, https://wikitravel.org/upload/shared//thumb/6/6f/Guojia_Da_Juyuan.jpeg/400px-Guojia_Da_Juyuan.jpeg 2x" width="200"></a><span data-dcnode-id="7014" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7010"><div class="magnify" data-dcnode-id="7012"><a class="internal" data-dcnode-id="7013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AGuojia_Da_Juyuan.jpeg" title="Enlarge"></a></div><span data-dcnode-id="7011" instrument_node="">National Theatre for the Performing Arts</span></div></div></div><span data-dcnode-id="7007" instrument_node="">
</span><p data-dcnode-id="7000"><b data-dcnode-id="7005"><span data-dcnode-id="7006" instrument_node="">National Centre for the Performing Arts</span></b><span data-dcnode-id="7004" instrument_node=""> in </span><a data-dcnode-id="7002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng%23Do" title="Beijing/Xicheng"><span data-dcnode-id="7003" instrument_node="">Xicheng District</span></a><span data-dcnode-id="7001" instrument_node=""> is the capital's modern theater complex covering opera, music and theater.  The building itself is worth laying eyes on, even if you do not go to a performance.
</span></p><p data-dcnode-id="6989"><span data-dcnode-id="6999" instrument_node="">The </span><b data-dcnode-id="6997"><span data-dcnode-id="6998" instrument_node="">Peking Opera</span></b><span data-dcnode-id="6996" instrument_node=""> is considered the most famous of all the traditional opera performed around China.  This kind of opera is nothing like western opera with costumes, singing style, music and spectator reactions being distinctly Chinese.  The plot is usually quite simple, so you might be able to understand some of what happens even if you do not understand the language.  Some of the best places to watch Beijing Opera are found in </span><a data-dcnode-id="6994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xuanwu%23Do" title="Beijing/Xuanwu"><span data-dcnode-id="6995" instrument_node="">Xuanwu District</span></a><span data-dcnode-id="6993" instrument_node=""> including Huguang Huguang Theatre and Lao She Teahouse.  There are also a number in </span><a data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng%23Do" title="Beijing/Dongcheng"><span data-dcnode-id="6992" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="6990" instrument_node=""> including Chang'an Grand Theatre.
</span></p><p data-dcnode-id="6979"><b data-dcnode-id="6987"><span data-dcnode-id="6988" instrument_node="">Acrobatics shows</span></b><span data-dcnode-id="6986" instrument_node=""> are also worth a visit if you want to see some traditional Chinese entertainment.  Some of the best shows are found in Tianqiao Acrobatics Theatre in </span><a data-dcnode-id="6984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xuanwu%23Do" title="Beijing/Xuanwu"><span data-dcnode-id="6985" instrument_node="">Xuanwu District</span></a><span data-dcnode-id="6983" instrument_node=""> and in Chaoyang Theatre in </span><a data-dcnode-id="6981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Do" title="Beijing/Chaoyang"><span data-dcnode-id="6982" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="6980" instrument_node="">.
</span></p><p data-dcnode-id="6969"><b data-dcnode-id="6977"><span data-dcnode-id="6978" instrument_node="">Drama plays</span></b><span data-dcnode-id="6976" instrument_node=""> has had a slow start in Beijing and is still not as widespread as you might expect for a city like Beijing, and you will most likely not be able to find many Western plays.  However, some good places for contemporary Chinese plays do exist including Capital Theatre in </span><a data-dcnode-id="6974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng%23Do" title="Beijing/Dongcheng"><span data-dcnode-id="6975" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="6973" instrument_node=""> and Century Theater in </span><a data-dcnode-id="6971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Do" title="Beijing/Chaoyang"><span data-dcnode-id="6972" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="6970" instrument_node="">.
</span></p><p data-dcnode-id="6962"><b data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">Classical music</span></b><span data-dcnode-id="6966" instrument_node=""> has got a much stronger foothold in Beijing than drama plays.  Some of the best places to go are the National Centre for the Performing Arts and the Century Theater both mentioned above as well as Beijing Concert Hall in </span><a data-dcnode-id="6964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng%23Do" title="Beijing/Xicheng"><span data-dcnode-id="6965" instrument_node="">Xicheng District</span></a><span data-dcnode-id="6963" instrument_node="">.
</span></p><p data-dcnode-id="6955"><b data-dcnode-id="6960"><span data-dcnode-id="6961" instrument_node="">Spectaculars</span></b><span data-dcnode-id="6959" instrument_node=""> are been built all over China, in June 2014 DreamWork's ' 'How To Train Your Dragon Live Spectacular' opened in a 4,000 purpose built venue on the grounds of the Beijing Bird's Nest. </span><a class="external text" data-dcnode-id="6957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.damai.cn/event/tickets_69144/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="6958" instrument_node="">tickets</span></a><span data-dcnode-id="6956" instrument_node="">

e roof top terrace to get a view of the authentic </span><i data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">hutong</span></i><span data-dcnode-id="6731" instrument_node=""> culture. Chefs, guides and teachers speak English, Mandarin, Spanish, Dutch and more by request.</span></span><span data-dcnode-id="6729" instrument_node=""> </span><span class="price" data-dcnode-id="6727"><span data-dcnode-id="6728" instrument_node="">¥100-250</span></span><span data-dcnode-id="6726" instrument_node="">. &nbsp;</span><a class="listing-edit" data-dcnode-id="6724" href="#Cooking_Classes_Tea_Tastings_Hutong_Tours_Traditional_Chinese_Medicine" onclick="editListing('Cooking_Classes_Tea_Tastings_Hutong_Tours_Traditional_Chinese_Medicine', 'do', 'Beijing');return false;" rel="nofollow" title="click to edit Cooking Classes, Tea Tastings, Hutong Tours, Traditional Chinese Medicine"><span data-dcnode-id="6725" instrument_node="">edit</span></a></span></li></ul><span data-dcnode-id="6720" instrument_node="">

node-id="6668" instrument_node="">

</span><p data-dcnode-id="6641"><span data-dcnode-id="6645" instrument_node="">Beijing is the center of higher learning in China. In fact, Peking University and Tsinghua University have been consistently ranked among the top universities in the world in recent times. As such it attracts the top talents from across China and is the destination for thousands of foreign scholars each year. Most of the universities are clustered in Haidian District in the northwestern part of the city. Nearly all of the universities in Beijing accept foreign students.  Most foreign students are on Chinese language programs which can last from a few weeks to a couple of years.  If you have a sufficient HSK level </span><a class="external autonumber" data-dcnode-id="6643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hsk.org.cn/english/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="6644" instrument_node="">[114]</span></a><span data-dcnode-id="6642" instrument_node="">  you can enroll in programs to study other subjects.
