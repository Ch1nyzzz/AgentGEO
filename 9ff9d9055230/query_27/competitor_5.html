</span><dl data-dcnode-id="10131"><dd data-dcnode-id="10132"><i data-dcnode-id="10133"><span data-dcnode-id="10140" instrument_node="">Beijing is a </span><a data-dcnode-id="10138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Wikitravel%3AHuge_city_article_template" title="Wikitravel:Huge city article template"><span data-dcnode-id="10139" instrument_node="">huge city</span></a><span data-dcnode-id="10137" instrument_node=""> with several </span><a data-dcnode-id="10135" href="#Districts"><span data-dcnode-id="10136" instrument_node="">district</span></a><span data-dcnode-id="10134" instrument_node=""> articles containing sightseeing, restaurant, nightlife and accommodation listings — have a look at each of them.</span></i></dd></dl><span data-dcnode-id="10130" instrument_node="">
</span><p data-dcnode-id="10117"><b data-dcnode-id="10128"><span data-dcnode-id="10129" instrument_node="">Beijing</span></b><span data-dcnode-id="10127" instrument_node=""> (北京 </span><i data-dcnode-id="10125"><span data-dcnode-id="10126" instrument_node="">Běijīng</span></i><span data-dcnode-id="10124" instrument_node="">) is the capital of the </span><a data-dcnode-id="10122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/China" title="China"><span data-dcnode-id="10123" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="10121" instrument_node="">, the most populous country in the world. With a population of 21,500,000 people, it is the nation's second-largest city after </span><a data-dcnode-id="10119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Shanghai" title="Shanghai"><span data-dcnode-id="10120" instrument_node="">Shanghai</span></a><span data-dcnode-id="10118" instrument_node="">. It was also the seat of the Ming and Qing dynasty emperors until the establishment of the Republic of China in 1911. Beijing is the political, educational and cultural centre of the country and as such it is rich in historical sites and important government and cultural institutions.
</span></p><p data-dcnode-id="10115"><span data-dcnode-id="10116" instrument_node="">The city is marked by its flatness and arid climate. There are only three hills to be found in the city limits (in Jingshan Park to the north of Forbidden City) and mountains surround the capital on three sides. Like the configuration of the Forbidden City, Beijing has concentric "ring roads", which are actually rectangular, that go around the metropolis and serve as good reference points as one attempts to move about the city. Beyond the ring roads are the most-visited portions of the Great Wall of China, which witnesses visitors the world over and Beijing serves as a good headquarters for those who wish to gaze upon one of mankind's more memorable and lasting structures.
</span></p><p data-dcnode-id="10110"><span data-dcnode-id="10114" instrument_node="">Beijing was host to the 2008 </span><a data-dcnode-id="10112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Olympic_Green" title="Beijing/Olympic Green"><span data-dcnode-id="10113" instrument_node="">Summer Olympic Games</span></a><span data-dcnode-id="10111" instrument_node="">, and will also host the 2022 Winter Olympic Games, the first only city to host both these events.
</span></p><span data-dcnode-id="10109" instrument_node="">
</span><h2 data-dcnode-id="10099"><span class="mw-headline" data-dcnode-id="10107" id="Districts"><span data-dcnode-id="10108" instrument_node="">Districts</span></span><span class="mw-editsection" data-dcnode-id="10100"><span class="mw-editsection-bracket" data-dcnode-id="10105"><span data-dcnode-id="10106" instrument_node="">[</span></span><a data-dcnode-id="10103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D1" title="Edit section: Districts"><span data-dcnode-id="10104" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10101"><span data-dcnode-id="10102" instrument_node="">]</span></span></span></h2><span data-dcnode-id="10098" instrument_node="">
</span><p data-dcnode-id="10093"><span data-dcnode-id="10097" instrument_node="">Beijing Municipality is a large region, equal to a province or state. It includes the densely populated metropolitan area of Beijing and even greater area of suburban, semi-rural and mountainous terrain. We have articles on each of the five city districts of Beijing (see the first map) plus some articles on important areas of these districts. The eleven outer districts are grouped into five regional articles (see the second map). The </span><a class="mw-redirect" data-dcnode-id="10095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Great_Wall" title="Great Wall"><span data-dcnode-id="10096" instrument_node="">Great Wall</span></a><span data-dcnode-id="10094" instrument_node=""> of China passes through the rugged north of Beijing Municipality.
</span></p><span data-dcnode-id="10092" instrument_node="">
</span><h3 data-dcnode-id="10082"><span class="mw-headline" data-dcnode-id="10090" id="City_districts"><span data-dcnode-id="10091" instrument_node="">City districts</span></span><span class="mw-editsection" data-dcnode-id="10083"><span class="mw-editsection-bracket" data-dcnode-id="10088"><span data-dcnode-id="10089" instrument_node="">[</span></span><a data-dcnode-id="10086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D2" title="Edit section: City districts"><span data-dcnode-id="10087" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10084"><span data-dcnode-id="10085" instrument_node="">]</span></span></span></h3><span data-dcnode-id="10081" instrument_node="">
</span><p data-dcnode-id="10064"><span data-dcnode-id="10080" instrument_node="">The two districts are located within or around the Second Ring Road and make-up the old walled city of yesteryear. </span><a data-dcnode-id="10078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng" title="Beijing/Xicheng"><span data-dcnode-id="10079" instrument_node="">Xicheng</span></a><span data-dcnode-id="10077" instrument_node=""> means West City and </span><a data-dcnode-id="10075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="10076" instrument_node="">Dongcheng</span></a><span data-dcnode-id="10074" instrument_node=""> means East City. Surrounding these districts are </span><a data-dcnode-id="10072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang" title="Beijing/Chaoyang"><span data-dcnode-id="10073" instrument_node="">Chaoyang</span></a><span data-dcnode-id="10071" instrument_node="">, </span><a data-dcnode-id="10069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Fengtai" title="Beijing/Fengtai"><span data-dcnode-id="10070" instrument_node="">Fengtai</span></a><span data-dcnode-id="10068" instrument_node=""> and </span><a data-dcnode-id="10066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Haidian" title="Beijing/Haidian"><span data-dcnode-id="10067" instrument_node="">Hadian</span></a><span data-dcnode-id="10065" instrument_node="">. These three districts hold impressive new urban and commercial development, have a population of many millions, and generate the economic prosperity of the city:
</span></p><span data-dcnode-id="10063" instrument_node="">
</span><div data-dcnode-id="9897" id="region_list"><span data-dcnode-id="10062" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="10053"><div class="thumbinner" data-dcnode-id="10054" style="width:402px;"><a class="image" data-dcnode-id="10060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing_subway_and_districts_2015.png"><img alt="" class="thumbimage" data-dcnode-id="10061" data-file-height="552" data-file-width="893" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/2/28/Beijing_subway_and_districts_2015.png/400px-Beijing_subway_and_districts_2015.png&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/2/28/Beijing_subway_and_districts_2015.png/600px-Beijing_subway_and_districts_2015.png 1.5x, https://wikitravel.org/upload/shared//thumb/2/28/Beijing_subway_and_districts_2015.png/800px-Beijing_subway_and_districts_2015.png 2x" width="400"></a><span data-dcnode-id="10059" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="10055"><div class="magnify" data-dcnode-id="10057"><a class="internal" data-dcnode-id="10058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing_subway_and_districts_2015.png" title="Enlarge"></a></div><span data-dcnode-id="10056" instrument_node="">City districts and subway summary map</span></div></div></div><span data-dcnode-id="10052" instrument_node="">

eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Wangfujing" title="Beijing/Wangfujing"><span data-dcnode-id="10025" instrument_node="">Wangfujing</span></a></b><span data-dcnode-id="10022" instrument_node=""> (Walking Street), </span><b data-dcnode-id="10019"><a data-dcnode-id="10020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Gulou" title="Beijing/Gulou"><span data-dcnode-id="10021" instrument_node="">Gulou</span></a></b><span data-dcnode-id="10018" instrument_node=""> (the Drum Tower and Nanlougouxiang), </span><b data-dcnode-id="10015"><a data-dcnode-id="10016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Yonghegong" title="Beijing/Yonghegong"><span data-dcnode-id="10017" instrument_node="">Yonghegong</span></a></b><span data-dcnode-id="10014" instrument_node=""> (Yonghe Lama Temple) and </span><b data-dcnode-id="10011"><a data-dcnode-id="10012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongzhimen" title="Beijing/Dongzhimen"><span data-dcnode-id="10013" instrument_node="">Dongzhimen</span></a></b><span data-dcnode-id="10010" instrument_node="">.

</span><h2 data-dcnode-id="9755"><span class="mw-headline" data-dcnode-id="9763" id="Understand"><span data-dcnode-id="9764" instrument_node="">Understand</span></span><span class="mw-editsection" data-dcnode-id="9756"><span class="mw-editsection-bracket" data-dcnode-id="9761"><span data-dcnode-id="9762" instrument_node="">[</span></span><a data-dcnode-id="9759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D4" title="Edit section: Understand"><span data-dcnode-id="9760" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9757"><span data-dcnode-id="9758" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9754" instrument_node="">
</span><h3 data-dcnode-id="9744"><span class="mw-headline" data-dcnode-id="9752" id="History"><span data-dcnode-id="9753" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="9745"><span class="mw-editsection-bracket" data-dcnode-id="9750"><span data-dcnode-id="9751" instrument_node="">[</span></span><a data-dcnode-id="9748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D5" title="Edit section: History"><span data-dcnode-id="9749" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9746"><span data-dcnode-id="9747" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9743" instrument_node="">
</span><p data-dcnode-id="9735"><span data-dcnode-id="9742" instrument_node="">Beijing literally means </span><i data-dcnode-id="9740"><span data-dcnode-id="9741" instrument_node="">Northern Capital</span></i><span data-dcnode-id="9739" instrument_node="">, a role it has played many times in China's long history.  Beijing's history dates back several thousand years but it first became notable in Chinese history after it was made the capital of the State of Yan under the name </span><i data-dcnode-id="9737"><span data-dcnode-id="9738" instrument_node="">Yanjing</span></i><span data-dcnode-id="9736" instrument_node="">. Yan was one of the major kingdoms of the Warring States Period, some 2,000 years ago.  After the fall of Yan, during the later Han and Tang dynasties, the Beijing-area was a major prefecture of northern China.
</span></p><p data-dcnode-id="9727"><span data-dcnode-id="9734" instrument_node="">In 938, Beijing</span><a class="external autonumber" data-dcnode-id="9732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.map-china.com/beijing-local.shtml.htm" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="9733" instrument_node="">[103]</span></a><span data-dcnode-id="9731" instrument_node=""> was conquered by the Khitans and declared the capital of the Liao Dynasty. The Mongols seized the city in 1215. From 1264 Beijing served as the capital of a united China under Kublai Khan. His victorious Mongol forces renamed the city, </span><i data-dcnode-id="9729"><span data-dcnode-id="9730" instrument_node="">Great Capital</span></i><span data-dcnode-id="9728" instrument_node=""> (大都). From there, Kublai and his descendants ruled their empire from a northern location closer to the Mongol homelands. During this period, the walled city was enlarged and many palaces and temples were built.
</span></p><p data-dcnode-id="9719"><span data-dcnode-id="9726" instrument_node="">After the fall of the Mongol-founded Yuan dynasty in 1368, the capital was initially moved to </span><a data-dcnode-id="9724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Nanjing" title="Nanjing"><span data-dcnode-id="9725" instrument_node="">Nanjing</span></a><span data-dcnode-id="9723" instrument_node="">. However, in 1403 the 3rd Ming emperor, Zhu Di, also known as Emperor Yongle, moved it back to Beijing and gave the city its present name. The Ming period was Beijing's </span><i data-dcnode-id="9721"><span data-dcnode-id="9722" instrument_node="">golden era.</span></i><span data-dcnode-id="9720" instrument_node=""> The Forbidden City, the Temple of Heaven and many other Beijing landmarks were built in this period. The capital developed into a huge city becoming the religious and cultural center of Asia.
</span></p><p data-dcnode-id="9717"><span data-dcnode-id="9718" instrument_node="">In 1644, the Manchus overthrew the declining Ming dynasty and established China's last imperial line - the Qing. Despite the changing political climate, Beijing remained the capital. The Manchu imperial family moved into the Forbidden City and remained there until 1911. The Qing built both the Summer Palace and Old Summer Palace. These served as summer retreats for the emperors and their entourages. During the 19th century, Western countries established foreign legations in the Qianmen area south of the Forbidden City. These came under siege during the Boxer Rebellion in 1900.
</span></p><p data-dcnode-id="9712"><span data-dcnode-id="9716" instrument_node="">The Qing dynasty fell in 1911.  In the chaotic first years of Republican China, Beijing was beset by fighting warlords.  Following the Northern Expedition, the Kuomintang moved the capital to Nanjing in 1928, and renamed Beijing as </span><i data-dcnode-id="9714"><span data-dcnode-id="9715" instrument_node="">Beiping</span></i><span data-dcnode-id="9713" instrument_node=""> ("Northern Peace") to emphasize that it was no longer a capital. Beijing remained a center for education and culture throughout the Republican Era. When the Kuomintang was  defeated by the Communists in 1949, the new government proclaimed a People's Republic with its capital at Beijing.
</span></p><p data-dcnode-id="9703"><span data-dcnode-id="9711" instrument_node="">Recommended reading includes </span><i data-dcnode-id="9709"><span data-dcnode-id="9710" instrument_node="">Peking - A Historical and Intimate Description of Its Chief Places of Interest</span></i><span data-dcnode-id="9708" instrument_node="">,  by Juliet Bredon (written in the 1930's (ISBN 0968045987) and </span><i data-dcnode-id="9705"><a class="new" data-dcnode-id="9706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DTwilight_in_the_Forbidden_City%26action%3Dedit%26redlink%3D1" title="Twilight in the Forbidden City (page does not exist)"><span data-dcnode-id="9707" instrument_node="">Twilight in the Forbidden City</span></a></i><span data-dcnode-id="9704" instrument_node="">, by Reginald Fleming Johnston (ISBN 0968045952)).
</span></p><span data-dcnode-id="9702" instrument_node="">
</span><h3 data-dcnode-id="9692"><span class="mw-headline" data-dcnode-id="9700" id="Orientation"><span data-dcnode-id="9701" instrument_node="">Orientation</span></span><span class="mw-editsection" data-dcnode-id="9693"><span class="mw-editsection-bracket" data-dcnode-id="9698"><span data-dcnode-id="9699" instrument_node="">[</span></span><a data-dcnode-id="9696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D6" title="Edit section: Orientation"><span data-dcnode-id="9697" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9694"><span data-dcnode-id="9695" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9691" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9682"><div class="thumbinner" data-dcnode-id="9683" style="width:412px;"><a class="image" data-dcnode-id="9689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AMao_and_lion.jpg"><img alt="" class="thumbimage" data-dcnode-id="9690" data-file-height="576" data-file-width="1024" height="231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/6/60/Mao_and_lion.jpg/410px-Mao_and_lion.jpg&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/6/60/Mao_and_lion.jpg/615px-Mao_and_lion.jpg 1.5x, https://wikitravel.org/upload/shared//thumb/6/60/Mao_and_lion.jpg/820px-Mao_and_lion.jpg 2x" width="410"></a><span data-dcnode-id="9688" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9684"><div class="magnify" data-dcnode-id="9686"><a class="internal" data-dcnode-id="9687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AMao_and_lion.jpg" title="Enlarge"></a></div><span data-dcnode-id="9685" instrument_node="">A stone lion guards Mao's portrait at the Tian'anmen</span></div></div></div><span data-dcnode-id="9681" instrument_node="">Beijing is characterised by its vastness and large distances between locations.  Until recently, the city was almost entirely made up of </span><i data-dcnode-id="9679"><span data-dcnode-id="9680" instrument_node="">hutongs</span></i><span data-dcnode-id="9678" instrument_node=""> with narrow lanes and single story buildings.  Now, many of the hutongs have given way to broad boulevards and modern buildings, contributing to an airy, sprawling feel, in sharp contrast to cities like </span><a data-dcnode-id="9676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Hong_Kong" title="Hong Kong"><span data-dcnode-id="9677" instrument_node="">Hong Kong</span></a><span data-dcnode-id="9675" instrument_node=""> and </span><a data-dcnode-id="9673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Shanghai" title="Shanghai"><span data-dcnode-id="9674" instrument_node="">Shanghai</span></a><span data-dcnode-id="9672" instrument_node="">.
</span><p data-dcnode-id="9670"><span data-dcnode-id="9671" instrument_node="">Beijing is the political centre of the country with official buildings and embassy areas dominating the city. Beijing is also the historical and cultural centre of China with many historical buildings and sites - especially within Ring Road Two.  The city has undergone rapid modernisation in recent years, with improvements of institutions, business environment and work conditions.
</span></p><span data-dcnode-id="9669" instrument_node="">
</span><h3 data-dcnode-id="9659"><span class="mw-headline" data-dcnode-id="9667" id="People"><span data-dcnode-id="9668" instrument_node="">People</span></span><span class="mw-editsection" data-dcnode-id="9660"><span class="mw-editsection-bracket" data-dcnode-id="9665"><span data-dcnode-id="9666" instrument_node="">[</span></span><a data-dcnode-id="9663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D7" title="Edit section: People"><span data-dcnode-id="9664" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9661"><span data-dcnode-id="9662" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9658" instrument_node="">
</span><p data-dcnode-id="9656"><span data-dcnode-id="9657" instrument_node="">Given their city's historical, cultural and political heft, Beijingers are justifiably proud to be citizens of the capital. An attitude known as 大北京主义 or "Great Beijing-ism" is often used to describe their attitude toward people from other regions of China. They are often much more interested in politics and willing to talk about current events than people elsewhere in China. Beijingers also seem to focus on not losing face and often use humor in order to do so. However, many Chinese from other provinces find Beijingers very friendly and straightforward compared with people from Shanghai especially.
</span></p><span data-dcnode-id="9655" instrument_node="">

</span></td></tr><tr data-dcnode-id="9342"><td colspan="13" data-dcnode-id="9343" style="text-align:left; white-space:normal;"><hr data-dcnode-id="9345"><span data-dcnode-id="9344" instrument_node="">Humidity is low except during the summer
</span></td></tr></tbody></table><span data-dcnode-id="9339" instrument_node="">
</span><p data-dcnode-id="9337"><span data-dcnode-id="9338" instrument_node="">Beijing has a monsoon-influenced continental climate with hot, humid summers and cold, dry winters. The best time to visit is in September and October, during the "Golden Autumn" (金秋). Spring is the season for dust storms and is otherwise warm and dry. Summer can be oppressively hot and the tourist crowds tend to be the largest as well; prevailing winds from the south trap pollutants (mountains lie to the north and west), making summer a poor season for air quality. Smog is at its worst, however, in winter, which is cold and dry with infrequent, but beautiful, snow. Temperatures can easily fall below −10 °C (14°F) in winter, and just as readily rise above 35 °C (95°F) in summer.
</span></p><span data-dcnode-id="9336" instrument_node="">
</span><h3 data-dcnode-id="9326"><span class="mw-headline" data-dcnode-id="9334" id="Demographics_and_geography"><span data-dcnode-id="9335" instrument_node="">Demographics and geography</span></span><span class="mw-editsection" data-dcnode-id="9327"><span class="mw-editsection-bracket" data-dcnode-id="9332"><span data-dcnode-id="9333" instrument_node="">[</span></span><a data-dcnode-id="9330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D9" title="Edit section: Demographics and geography"><span data-dcnode-id="9331" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9328"><span data-dcnode-id="9329" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9325" instrument_node="">
</span><p data-dcnode-id="9323"><span data-dcnode-id="9324" instrument_node="">Beijing has a population of greater than 20 million people (as of 2012), with a substantial percentage being migrants, living on 16,800 km² distributed in 18 districts.  The city borders Hebei Province (where much of the pollution which plagues Beijing originates from) to the north, west and south, and Tianjin to the east.
</span></p><span data-dcnode-id="9322" instrument_node="">
</span><h2 data-dcnode-id="9312"><span class="mw-headline" data-dcnode-id="9320" id="Get_in"><span data-dcnode-id="9321" instrument_node="">Get in</span></span><span class="mw-editsection" data-dcnode-id="9313"><span class="mw-editsection-bracket" data-dcnode-id="9318"><span data-dcnode-id="9319" instrument_node="">[</span></span><a data-dcnode-id="9316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D10" title="Edit section: Get in"><span data-dcnode-id="9317" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9314"><span data-dcnode-id="9315" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9311" instrument_node="">
</span><h3 data-dcnode-id="9301"><span class="mw-headline" data-dcnode-id="9309" id="By_plane"><span data-dcnode-id="9310" instrument_node="">By plane</span></span><span class="mw-editsection" data-dcnode-id="9302"><span class="mw-editsection-bracket" data-dcnode-id="9307"><span data-dcnode-id="9308" instrument_node="">[</span></span><a data-dcnode-id="9305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D11" title="Edit section: By plane"><span data-dcnode-id="9306" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9303"><span data-dcnode-id="9304" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9300" instrument_node="">
</span><p data-dcnode-id="9282"><span data-dcnode-id="9299" instrument_node="">Beijing is generally served by </span><b data-dcnode-id="9296"><a class="mw-redirect" data-dcnode-id="9297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing_Capital_International_Airport" title="Beijing Capital International Airport"><span data-dcnode-id="9298" instrument_node="">Beijing Capital International Airport</span></a></b><span data-dcnode-id="9295" instrument_node=""> and </span><b data-dcnode-id="9293"><span data-dcnode-id="9294" instrument_node="">Beijing Daxing International Airport</span></b><span data-dcnode-id="9292" instrument_node=""> for both domestic and foreign flights. Travellers should also consider </span><b data-dcnode-id="9290"><span data-dcnode-id="9291" instrument_node="">Tianjin Binhai International Airport</span></b><span data-dcnode-id="9289" instrument_node="">, which is in the first-tier city of </span><a data-dcnode-id="9287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Tianjin" title="Tianjin"><span data-dcnode-id="9288" instrument_node="">Tianjin</span></a><span data-dcnode-id="9286" instrument_node=""> and just 35-minutes away by express train. Another alternative is </span><b data-dcnode-id="9284"><span data-dcnode-id="9285" instrument_node="">Shijiazhuang Zhengding International Airport</span></b><span data-dcnode-id="9283" instrument_node=""> (1 hour 20 mins by high-speed train from Zhengding Airport station to Beijing West station; as of 2017, a 2nd class single ticket costs ¥111.50).
</span></p><span data-dcnode-id="9281" instrument_node="">
</span><span data-dcnode-id="9280" instrument_node="">
</span><span data-dcnode-id="9279" instrument_node="">
</span><table border="0" cellpadding="8" cellspacing="1" class="pp_infobox" data-dcnode-id="9258" style="float:right; clear:right;margin-left: 1em; width:40%;"><tbody data-dcnode-id="9259"><tr data-dcnode-id="9260"><td align="left" data-dcnode-id="9261" style="background-color:#f3f3ff; border:1px solid blue; padding-left: 0.5em; padding-right: 0.5em" width="100%"><span data-dcnode-id="9278" instrument_node="">
</span><p data-dcnode-id="9267"><b data-dcnode-id="9276"><span data-dcnode-id="9277" instrument_node="">Scams at the airport</span></b><br data-dcnode-id="9275"><span data-dcnode-id="9274" instrument_node="">
</span><b data-dcnode-id="9272"><span data-dcnode-id="9273" instrument_node="">Arrival</span></b><span data-dcnode-id="9271" instrument_node="">: Use the official taxi queue on the ground level. Ignore impostors who may approach you or work at official-looking stands outside the exit, as you will be charged up to ten times the usual fare. Read the </span><a data-dcnode-id="9269" href="#By_taxi"><span data-dcnode-id="9270" instrument_node="">section on taxis</span></a><span data-dcnode-id="9268" instrument_node=""> for details on how to distinguish between fake and legitimate taxis.
</span></p><p data-dcnode-id="9263"><b data-dcnode-id="9265"><span data-dcnode-id="9266" instrument_node="">Departure</span></b><span data-dcnode-id="9264" instrument_node="">: For some time, the airport construction/exit surcharge has been incorporated into the price of the airline ticket so simply ignore anyone attempting to con you into this. Your airline will be sure to inform you of any extra fees upon arriving at the counter! 
</span></p><span data-dcnode-id="9262" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="9257" instrument_node="">
</span><p data-dcnode-id="9254"><br data-dcnode-id="9256"><span data-dcnode-id="9255" instrument_node="">
</span></p><span data-dcnode-id="9253" instrument_node="">
</span><h4 data-dcnode-id="9243"><span class="mw-headline" data-dcnode-id="9251" id="Beijing_Capital_International_Airport"><span data-dcnode-id="9252" instrument_node="">Beijing Capital International Airport</span></span><span class="mw-editsection" data-dcnode-id="9244"><span class="mw-editsection-bracket" data-dcnode-id="9249"><span data-dcnode-id="9250" instrument_node="">[</span></span><a data-dcnode-id="9247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D12" title="Edit section: Beijing Capital International Airport"><span data-dcnode-id="9248" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9245"><span data-dcnode-id="9246" instrument_node="">]</span></span></span></h4><span data-dcnode-id="9242" instrument_node="">
</span><p data-dcnode-id="9236"><i data-dcnode-id="9238"><span data-dcnode-id="9241" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="9239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing_Capital_International_Airport" title="Beijing Capital International Airport"><span data-dcnode-id="9240" instrument_node="">Beijing Capital International Airport</span></a></i><span data-dcnode-id="9237" instrument_node="">
</span></p><p data-dcnode-id="9220"><b data-dcnode-id="9234"><span data-dcnode-id="9235" instrument_node="">Beijing Capital International Airport</span></b><span data-dcnode-id="9233" instrument_node=""> (北京首都国际机场 </span><i data-dcnode-id="9231"><span data-dcnode-id="9232" instrument_node="">Běijīng Shǒudū Guójì Jīchǎng</span></i><span data-dcnode-id="9230" instrument_node="">, </span><a class="extiw" data-dcnode-id="9228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IATA" title="wikipedia:IATA"><span data-dcnode-id="9229" instrument_node="">IATA</span></a><span data-dcnode-id="9227" instrument_node="">: </span><b data-dcnode-id="9225"><span data-dcnode-id="9226" instrument_node="">PEK</span></b><span data-dcnode-id="9224" instrument_node="">) </span><a class="external autonumber" data-dcnode-id="9222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.bcia.com.cn/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="9223" instrument_node="">[104]</span></a><span data-dcnode-id="9221" instrument_node=""> in suburban district Shunyi (approximately 26 km (16 mi) to the northeast of the central districts), is the world's second-busiest (as of 2013 data) and has three terminals. Travel between Terminals 1 and 2 is via a long corridor with travelators. A free shuttle bus runs between Terminal 2 and 3.
</span></p><p data-dcnode-id="9212"><span data-dcnode-id="9219" instrument_node="">A </span><b data-dcnode-id="9217"><span data-dcnode-id="9218" instrument_node="">taxi</span></b><span data-dcnode-id="9216" instrument_node=""> from the airport should cost ¥70-120. Get the Chinese name in characters of your hotel. Do join the regular taxi queue and certainly avoid the various touts. Read the </span><a data-dcnode-id="9214" href="#By_taxi"><span data-dcnode-id="9215" instrument_node="">section on taxis</span></a><span data-dcnode-id="9213" instrument_node=""> for details on how to distinguish between fake and legitimate taxis.
</span></p><p data-dcnode-id="9195"><span data-dcnode-id="9211" instrument_node="">The </span><b data-dcnode-id="9209"><span data-dcnode-id="9210" instrument_node="">Airport Express</span></b><span data-dcnode-id="9208" instrument_node=""> train runs in a one-way loop from T3 to T2, then into the city and Sanyuanqiao Station (connected to Line 10) and </span><a data-dcnode-id="9206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongzhimen" title="Beijing/Dongzhimen"><span data-dcnode-id="9207" instrument_node="">Dongzhimen</span></a><span data-dcnode-id="9205" instrument_node=""> Station (Lines 2, 13).  One-way fare is ¥25 and the trip takes about 20 minutes from T2 to </span><a data-dcnode-id="9203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongzhimen" title="Beijing/Dongzhimen"><span data-dcnode-id="9204" instrument_node="">Dongzhimen</span></a><span data-dcnode-id="9202" instrument_node=""> Station, about 30 minutes from T3. Although the last </span><b data-dcnode-id="9200"><span data-dcnode-id="9201" instrument_node="">Airport Express</span></b><span data-dcnode-id="9199" instrument_node=""> train leaves airport to city at around 23:10, the subway lines normally stop operating before 23:00 on weeknights. </span><b data-dcnode-id="9197"><span data-dcnode-id="9198" instrument_node="">The Airport Express trains do not accept Credit / Debit cards [Nov 2017], make sure you have cash before your ride.</span></b><span data-dcnode-id="9196" instrument_node="">
</span></p><p data-dcnode-id="9162"><span data-dcnode-id="9194" instrument_node="">A slightly cheaper way to get to the city centre is to take the </span><span class="vcard" data-dcnode-id="9164" id="airport_shuttle"><span class="fn org" data-dcnode-id="9192"><span data-dcnode-id="9193" instrument_node="">airport shuttle</span></span><span data-dcnode-id="9191" instrument_node=""> (</span><span class="nickname" data-dcnode-id="9187"><span class="non-latin" data-dcnode-id="9189"><span data-dcnode-id="9190" instrument_node="">机场巴士</span></span><span data-dcnode-id="9188" instrument_node=""> Jīchǎng Bāshì</span></span><span data-dcnode-id="9186" instrument_node="">), </span><span class="tel" data-dcnode-id="9180"><abbr class="type" data-dcnode-id="9184" title="voice"><span data-dcnode-id="9185" instrument_node="">☎</span></abbr><span data-dcnode-id="9183" instrument_node=""> </span><span class="phone value" data-dcnode-id="9181"><span data-dcnode-id="9182" instrument_node="">+86 10 6459-4375 / 6459-4376</span></span></span><span data-dcnode-id="9179" instrument_node="">, </span><a class="url external autonumber" data-dcnode-id="9177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.bcia.com.cn/traffic/airbus/index.shtml" rel="nofollow"><span data-dcnode-id="9178" instrument_node="">[1]</span></a><span data-dcnode-id="9176" instrument_node="">. </span><span class="hours" data-dcnode-id="9174"><span data-dcnode-id="9175" instrument_node="">Buses for each route leave every 10-30 minutes</span></span><span data-dcnode-id="9173" instrument_node="">. </span><span class="description" data-dcnode-id="9171"><span data-dcnode-id="9172" instrument_node="">There are several lines running to different locations throughout Beijing.</span></span><span data-dcnode-id="9170" instrument_node=""> </span><span class="price" data-dcnode-id="9168"><span data-dcnode-id="9169" instrument_node="">¥16 one-way</span></span><span data-dcnode-id="9167" instrument_node="">. &nbsp;</span><a class="listing-edit" data-dcnode-id="9165" href="#airport_shuttle" onclick="editListing('airport_shuttle', 'listing', 'Beijing');return false;" rel="nofollow" title="click to edit airport shuttle"><span data-dcnode-id="9166" instrument_node="">edit</span></a></span><span data-dcnode-id="9163" instrument_node="">
</span></p><span data-dcnode-id="9161" instrument_node="">
</span><h4 data-dcnode-id="9151"><span class="mw-headline" data-dcnode-id="9159" id="Beijing_Daxing_International_Airport"><span data-dcnode-id="9160" instrument_node="">Beijing Daxing International Airport</span></span><span class="mw-editsection" data-dcnode-id="9152"><span class="mw-editsection-bracket" data-dcnode-id="9157"><span data-dcnode-id="9158" instrument_node="">[</span></span><a data-dcnode-id="9155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D13" title="Edit section: Beijing Daxing International Airport"><span data-dcnode-id="9156" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9153"><span data-dcnode-id="9154" instrument_node="">]</span></span></span></h4><span data-dcnode-id="9150" instrument_node="">
</span><p data-dcnode-id="9137"><b data-dcnode-id="9148"><span data-dcnode-id="9149" instrument_node="">Beijing Daxing International Airport</span></b><span data-dcnode-id="9147" instrument_node=""> (北京大兴国际机场 </span><i data-dcnode-id="9145"><span data-dcnode-id="9146" instrument_node="">Běijīng Dàxīng</span></i><span data-dcnode-id="9144" instrument_node="">, IATA: </span><b data-dcnode-id="9142"><span data-dcnode-id="9143" instrument_node="">PKX</span></b><span data-dcnode-id="9141" instrument_node="">) </span><a class="external autonumber" data-dcnode-id="9139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//daxing-pkx-airport.com/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="9140" instrument_node="">[105]</span></a><span data-dcnode-id="9138" instrument_node=""> is a new airport located approximately 46 kilometres (29 mi) south of Tiananmen Square, 26 kilometres (16 mi) west of downtown Langfang, 50 kilometres (31 mi) northeast of Xiong'an New Area, and 65 kilometres (40 mi) south of Beijing Capital International Airport, and is projected to serve Tianjin and Hebei in addition to Beijing. While most flights are domestic in nature (all the major China air carriers such as China Eastern, China Southern, China United and Air China are present at Daxing airport) some international carriers such as Aeroflot, British Airways, Delta Airlines, Finnair, LOT Polish Airlines, Royal Air Maroc, Himalaya Airlines, Royal Brunei Airlines, S7 Airlines, Swiss International, Ural Airlines, and Malaysia Airlines have also either shifted service away from Beijing Capital Airport to Beijing Daxing Airport or have started new service to Beijing Daxing Airport in addition to Beijing Capital Airport. More airlines are expected to serve the airport and/or shift service from Beijing Capital Airport (particularly those affiliated with the Skyteam alliance) as the airport becomes more operational.
</span></p><p data-dcnode-id="9132"><span data-dcnode-id="9136" instrument_node="">The </span><b data-dcnode-id="9134"><span data-dcnode-id="9135" instrument_node="">Daxing Airport Express</span></b><span data-dcnode-id="9133" instrument_node=""> of the Beijing Subway runs from Daxing Airport to Caoqiao where it intersects with Line 10 of the Beijing Subway, with a later extension planned to reach Lize Business District in the near future. Tickets cost 35 RMB (4.4€ / 4.8$) at maximum for an ordinary ticket or 50 RMB (6.3€ / 7$) if you travel business class. 
</span></p><p data-dcnode-id="9127"><span data-dcnode-id="9131" instrument_node="">The airport is also served by a high speed train that connects Beijing Daxing Airport to Beijing West railway station as part of the </span><b data-dcnode-id="9129"><span data-dcnode-id="9130" instrument_node="">Beijing–Xiong'an intercity railway</span></b><span data-dcnode-id="9128" instrument_node=""> which is also currently being extended to later serve Bazhou and Xiong'an as well. Trains operate at speeds of 250 km/h (160 mph) and it currently takes 28 minutes to go from from Beijing West railway station to Beijing Daxing Airport.
</span></p><p data-dcnode-id="9122"><span data-dcnode-id="9126" instrument_node="">For a more cost effective way to get into Beijing there are </span><b data-dcnode-id="9124"><span data-dcnode-id="9125" instrument_node="">shuttle busses</span></b><span data-dcnode-id="9123" instrument_node=""> that go from Beijing Daxing to Beijing Main Railway Station (Line 1), Beijing West Railway Station (Line 2), and Beijing South Railway Station (Line 3). The Daxing airport bus stop is located on the northeastern side of the terminal building. The regular one-way airport bus tickets from Daxing airport cost 40RMB (5€ / 5.5$) for an adult. For the moment, tickets are only available through WeChat app or at WeChat vending machines. 
</span></p><p data-dcnode-id="9118"><b data-dcnode-id="9120"><span data-dcnode-id="9121" instrument_node="">Taxis</span></b><span data-dcnode-id="9119" instrument_node=""> will normally get you to your destination in Beijing from Beijing Daxing Airport in about 80 minutes, with the average fare to be about 220 RMB (29€ / 30.5$) without taking into account the possible waiting-time surcharges. However, you should always be aware of the notorious Beijing traffic jams.
</span></p><p data-dcnode-id="9114"><b data-dcnode-id="9116"><span data-dcnode-id="9117" instrument_node="">VISA-FREE transit</span></b><span data-dcnode-id="9115" instrument_node="">
</span></p><p data-dcnode-id="9112"><span data-dcnode-id="9113" instrument_node="">All visitors get maximum 144 hours transit visa to see the Beijing city. You have to apply for it at the counter which is right after you exit the plane and walk the corridor. It takes around 45 minutes to get it.
</span></p><p data-dcnode-id="9110"><span data-dcnode-id="9111" instrument_node="">After that directly go to Immigration counter which again can take upto 45 minutes to clear (DO NOT go to INTERNATIONAL TRANSFER which is next to Immigration!!).
</span></p><p data-dcnode-id="9108"><span data-dcnode-id="9109" instrument_node="">Right after immigration counter (T-3E) is the shuttle train to T-3C. There you can catch the Airport Express to Dongzhimen cost is 25 Yuan. From Dongzhimen you have to buy a new ticket for your destination.
</span></p><span data-dcnode-id="9107" instrument_node="">
</span><h3 data-dcnode-id="9097"><span class="mw-headline" data-dcnode-id="9105" id="By_train"><span data-dcnode-id="9106" instrument_node="">By train</span></span><span class="mw-editsection" data-dcnode-id="9098"><span class="mw-editsection-bracket" data-dcnode-id="9103"><span data-dcnode-id="9104" instrument_node="">[</span></span><a data-dcnode-id="9101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D14" title="Edit section: By train"><span data-dcnode-id="9102" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9099"><span data-dcnode-id="9100" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9096" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9087"><div class="thumbinner" data-dcnode-id="9088" style="width:302px;"><a class="image" data-dcnode-id="9094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijingwestint.jpg"><img alt="" class="thumbimage" data-dcnode-id="9095" data-file-height="288" data-file-width="599" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/en/thumb/c/cb/Beijingwestint.jpg/300px-Beijingwestint.jpg&amp;raw" srcset="/upload/en/thumb/c/cb/Beijingwestint.jpg/450px-Beijingwestint.jpg 1.5x, /upload/en/c/cb/Beijingwestint.jpg 2x" width="300"></a><span data-dcnode-id="9093" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9089"><div class="magnify" data-dcnode-id="9091"><a class="internal" data-dcnode-id="9092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijingwestint.jpg" title="Enlarge"></a></div><span data-dcnode-id="9090" instrument_node="">Beijing West Railway Station</span></div></div></div><span data-dcnode-id="9086" instrument_node="">

</span><p data-dcnode-id="8014"><span data-dcnode-id="8018" instrument_node="">Most of the buses from the Long Distance Bus Stations will be regular or express buses, which take the expressways; cost from ¥200-600 per trip, have comfy seats, and most rides do not take more than 6-12 hours, but sleeper buses are also available.
Sleeper buses, with bunk beds in rows, average about ¥100 per trip, but many go </span><i data-dcnode-id="8016"><span data-dcnode-id="8017" instrument_node="">really</span></i><span data-dcnode-id="8015" instrument_node=""> slowly up hills, avoid expressways, stop at every city or town, provide "meals" which you have to pay extra for, take the potholed National roads to save money, and a bus ride can take up to 24 hours.  The average speed is only 40 km/hr on the moderately fast sleeper buses, and the range could be from 25 to 60 km/hr.  It may be a good authentic taste of how less wealthy Chinese people travel.
</span></p><span data-dcnode-id="8013" instrument_node="">
</span><h2 data-dcnode-id="8003"><span class="mw-headline" data-dcnode-id="8011" id="Get_around"><span data-dcnode-id="8012" instrument_node="">Get around</span></span><span class="mw-editsection" data-dcnode-id="8004"><span class="mw-editsection-bracket" data-dcnode-id="8009"><span data-dcnode-id="8010" instrument_node="">[</span></span><a data-dcnode-id="8007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D17" title="Edit section: Get around"><span data-dcnode-id="8008" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8002" instrument_node="">
</span><span data-dcnode-id="8001" instrument_node="">
</span><span data-dcnode-id="8000" instrument_node="">
</span><table border="0" cellpadding="8" cellspacing="1" class="pp_infobox" data-dcnode-id="7989" style="float:right; clear:right;margin-left: 1em; width:40%;"><tbody data-dcnode-id="7990"><tr data-dcnode-id="7991"><td align="left" data-dcnode-id="7992" style="background-color:#f3f3ff; border:1px solid blue; padding-left: 0.5em; padding-right: 0.5em" width="100%"><span data-dcnode-id="7999" instrument_node="">
</span><p data-dcnode-id="7994"><b data-dcnode-id="7997"><span data-dcnode-id="7998" instrument_node="">A note on maps</span></b><br data-dcnode-id="7996"><span data-dcnode-id="7995" instrument_node="">
Beijing is changing at such a phenomenal pace and it's one of the physically largest cities in the world. Foreign maps will be unavailable, so you'll need English-language Sinomaps guides at official bookshops (¥30-40) or 5-star hotel concierge desks. Avoid the fake Sinomaps on standard paper, which are years out of date and lack detail.
</span></p><span data-dcnode-id="7993" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="7988" instrument_node="">
</span><p data-dcnode-id="7986"><span data-dcnode-id="7987" instrument_node="">Before embarking on a trip around the city, have the names of places you want to visit written in Chinese characters. The staff at your hotel should help you and take their card to help you get back. Obtain as much detail as possible and take an up-to-date Sinomap guide with you.
</span></p><span data-dcnode-id="7985" instrument_node="">
</span><h3 data-dcnode-id="7975"><span class="mw-headline" data-dcnode-id="7983" id="By_foot"><span data-dcnode-id="7984" instrument_node="">By foot</span></span><span class="mw-editsection" data-dcnode-id="7976"><span class="mw-editsection-bracket" data-dcnode-id="7981"><span data-dcnode-id="7982" instrument_node="">[</span></span><a data-dcnode-id="7979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D18" title="Edit section: By foot"><span data-dcnode-id="7980" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7977"><span data-dcnode-id="7978" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7974" instrument_node="">
</span><p data-dcnode-id="7972"><span data-dcnode-id="7973" instrument_node="">When crossing the road in China, assume that none of the road users will give way to you, even if a policeman is present. Use zebra crossings but most drivers won't stop. Always look around as a car or bike may be right behind you or heading straight for you. Should you find several cars and bicycles veering towards you from different directions, do not try to run to safety; instead, stand still. There is strength in numbers, so when a mass of people crosses together cars are more likely to stop or slow down.
</span></p><span data-dcnode-id="7971" instrument_node="">
</span><h3 data-dcnode-id="7961"><span class="mw-headline" data-dcnode-id="7969" id="By_subway"><span data-dcnode-id="7970" instrument_node="">By subway</span></span><span class="mw-editsection" data-dcnode-id="7962"><span class="mw-editsection-bracket" data-dcnode-id="7967"><span data-dcnode-id="7968" instrument_node="">[</span></span><a data-dcnode-id="7965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D19" title="Edit section: By subway"><span data-dcnode-id="7966" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7963"><span data-dcnode-id="7964" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7960" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7951"><div class="thumbinner" data-dcnode-id="7952" style="width:302px;"><a class="image" data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing-Subway-Plan_en.svg"><img alt="" class="thumbimage" data-dcnode-id="7959" data-file-height="2200" data-file-width="2900" height="228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Beijing-Subway-Plan_en.svg/300px-Beijing-Subway-Plan_en.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Beijing-Subway-Plan_en.svg/450px-Beijing-Subway-Plan_en.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Beijing-Subway-Plan_en.svg/600px-Beijing-Subway-Plan_en.svg.png 2x" width="300"></a><span data-dcnode-id="7957" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7953"><div class="magnify" data-dcnode-id="7955"><a class="internal" data-dcnode-id="7956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing-Subway-Plan_en.svg" title="Enlarge"></a></div><span data-dcnode-id="7954" instrument_node="">Beijing Subway map (note: not to scale)</span></div></div></div><span data-dcnode-id="7950" instrument_node="">
</span><p data-dcnode-id="7943"><i data-dcnode-id="7948"><span data-dcnode-id="7949" instrument_node="">More details:</span></i><span data-dcnode-id="7947" instrument_node=""> </span><a data-dcnode-id="7945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Public_Transport%23By_Subway" title="Beijing/Public Transport"><span data-dcnode-id="7946" instrument_node="">Public Transport by Subway</span></a><span data-dcnode-id="7944" instrument_node="">
</span></p><p data-dcnode-id="7936"><b data-dcnode-id="7941"><span data-dcnode-id="7942" instrument_node="">Beijing Subway</span></b><span data-dcnode-id="7940" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="7938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bjsubway.com/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7939" instrument_node="">[106]</span></a><span data-dcnode-id="7937" instrument_node=""> is a great way to quickly get around the city and is clearly marked in English for travelers. For budget-conscious travelers or those wanting to stretch their legs, it may serve as a better mode of transport than taxis. At ¥3-9 per trip based on distance, it is perhaps the nicest and cheapest subway system in the world. The network has expanded at a furious pace in recent years, with 17 lines currently operating and current lines expanding and new lines under construction or planned. Be warned that during rush hour trains can be extremely crowded and many popular stations have outdoor queues during rush hour(s) so plan accordingly (especially if weather is not agreeable). The last train departs between 22:15 and 23:15 depending on the station. The subway opens again around 05:00. 
</span></p><p data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">Transfers between lines are permitted with the exception of the Airport Express, for which a separate ticket is required.
</span></p><p data-dcnode-id="7932"><span data-dcnode-id="7933" instrument_node="">Subway station entrances are identified by a large blue stylized letter G wrapped around a smaller letter B. Single tickets are purchased at vending machines (with English instructions) which accept ¥1 coins or ¥5 or ¥10 bills and require you to know the station you will be exiting at in order to calculate the correct fare. Subway trips are limited to 4 hours. You must pass your ticket through the turnstiles upon entering and exiting the station, so make sure you don't lose it. Do not buy multiple tickets  thinking it will be a pack of general multiple-use tickets as a ticket is only valid from the station you bought it, on the day you bought it.
</span></p><span data-dcnode-id="7931" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7922"><div class="thumbinner" data-dcnode-id="7923" style="width:242px;"><a class="image" data-dcnode-id="7929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ASubway_beijing.jpg"><img alt="" class="thumbimage" data-dcnode-id="7930" data-file-height="426" data-file-width="640" height="160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/en/thumb/3/31/Subway_beijing.jpg/240px-Subway_beijing.jpg&amp;raw" srcset="/upload/en/thumb/3/31/Subway_beijing.jpg/360px-Subway_beijing.jpg 1.5x, /upload/en/thumb/3/31/Subway_beijing.jpg/480px-Subway_beijing.jpg 2x" width="240"></a><span data-dcnode-id="7928" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7924"><div class="magnify" data-dcnode-id="7926"><a class="internal" data-dcnode-id="7927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ASubway_beijing.jpg" title="Enlarge"></a></div><span data-dcnode-id="7925" instrument_node="">Subway station in Beijing</span></div></div></div><span data-dcnode-id="7921" instrument_node="">
</span><p data-dcnode-id="7913"><span data-dcnode-id="7920" instrument_node="">To avoid the inconvenience of single-ticket purchases, pick up an</span><i data-dcnode-id="7918"><span data-dcnode-id="7919" instrument_node="">Yīkātōng</span></i><span data-dcnode-id="7917" instrument_node=""> (一卡通 ) </span><b data-dcnode-id="7915"><span data-dcnode-id="7916" instrument_node="">pre-paid card</span></b><span data-dcnode-id="7914" instrument_node="">, which has a ¥20 refundable deposit and no expiry. Swipe the card at the entrance turnstile and again upon exiting. The use of the pre-paid card does not reduce the subway fare although it does dramatically reduce bus fares, by 50%. The card's deposit can only be returned at a few stations, so passing it on to a friend may be easier than getting your deposit back. Stations that offer a refund clearly state "Yikatong refund" in the ticket booth; examples include Xizhimen and Haidianhuangzhuang.
</span></p><p data-dcnode-id="7911"><span data-dcnode-id="7912" instrument_node="">If you are carrying luggage, purses or camera bags you must pass through the X-ray checks at the stations. During morning and evening rush hours the stations and trains become very crowded. If you find yourself in a crowded interchange station tunnel, keep calm and go with the flow, however slow it may feel.
</span></p><span data-dcnode-id="7910" instrument_node="">
</span><h3 data-dcnode-id="7900"><span class="mw-headline" data-dcnode-id="7908" id="By_bus_2"><span data-dcnode-id="7909" instrument_node="">By bus</span></span><span class="mw-editsection" data-dcnode-id="7901"><span class="mw-editsection-bracket" data-dcnode-id="7906"><span data-dcnode-id="7907" instrument_node="">[</span></span><a data-dcnode-id="7904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D20" title="Edit section: By bus"><span data-dcnode-id="7905" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7902"><span data-dcnode-id="7903" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7899" instrument_node="">
</span><p data-dcnode-id="7892"><i data-dcnode-id="7897"><span data-dcnode-id="7898" instrument_node="">More details:</span></i><span data-dcnode-id="7896" instrument_node=""> </span><a data-dcnode-id="7894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Public_Transport%23By_Bus" title="Beijing/Public Transport"><span data-dcnode-id="7895" instrument_node="">Public Transport by Bus</span></a><span data-dcnode-id="7893" instrument_node="">
</span></p><p data-dcnode-id="7890"><span data-dcnode-id="7891" instrument_node="">Beijing's bus system is cheap, convenient and covers the entire city—perfect for locals but, alas, difficult to use if you do not understand Chinese or Mandarin. The bus staffs speak little English, and only a few bus lines in the city center broadcast stop names in English. Bus stop signs are also entirely in Chinese.  But should you speak Mandarin, have a healthy sense of adventure, and a fair bit of patience, a bus can get you almost anywhere, and often somewhere that you never intended to go.  It is a great way to see parts of the city that tourists normally do not visit. 
</span></p><p data-dcnode-id="7885"><span data-dcnode-id="7889" instrument_node="">Be aware of a </span><a data-dcnode-id="7887" href="#Stay_safe"><span data-dcnode-id="7888" instrument_node="">scam</span></a><span data-dcnode-id="7886" instrument_node=""> offering bus rides to the Great Wall masquerading as the real bus service.  Instead of directly driving to the Great Wall, you will instead be led to a series of tours to dilapidated theme parks, shops, museums, and other tourist traps before finally reaching the Great Wall near the end of the day.
</span></p><span data-dcnode-id="7884" instrument_node="">
</span><h4 data-dcnode-id="7874"><span class="mw-headline" data-dcnode-id="7882" id="Bus_routes"><span data-dcnode-id="7883" instrument_node="">Bus routes</span></span><span class="mw-editsection" data-dcnode-id="7875"><span class="mw-editsection-bracket" data-dcnode-id="7880"><span data-dcnode-id="7881" instrument_node="">[</span></span><a data-dcnode-id="7878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D21" title="Edit section: Bus routes"><span data-dcnode-id="7879" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7876"><span data-dcnode-id="7877" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7873" instrument_node="">
</span><p data-dcnode-id="7862"><span data-dcnode-id="7872" instrument_node="">Bus lines are numbered from 1-999. Buses under 300 serve the city center. Buses 300 and up run between the city center and further (such as beyond the Third Ring Road).  Buses in the 900s connect Beijing with its "rural" districts (i.e., Changping, Yanqing, Shunyi, etc). Maps of the system are available only in Chinese. The </span><a class="external text" data-dcnode-id="7870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bjbus.com/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7871" instrument_node="">Beijing Public Transport Co.</span></a><span data-dcnode-id="7869" instrument_node=""> website has some information in English, and an interactive map in Chinese. Alternative places to look for bus routes are Google maps, Baidu, </span><a class="external text" data-dcnode-id="7867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//beijing.edushi.com/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7868" instrument_node="">Edushi</span></a><span data-dcnode-id="7866" instrument_node=""> (click the bus flash icon) or </span><a class="external text" data-dcnode-id="7864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bus.mapbar.com/beijing/xianlu/5lu/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="7865" instrument_node="">Mapbar</span></a><span data-dcnode-id="7863" instrument_node="">.
</span></p><span data-dcnode-id="7861" instrument_node="">
</span><h4 data-dcnode-id="7851"><span class="mw-headline" data-dcnode-id="7859" id="Operating_hours"><span data-dcnode-id="7860" instrument_node="">Operating hours</span></span><span class="mw-editsection" data-dcnode-id="7852"><span class="mw-editsection-bracket" data-dcnode-id="7857"><span data-dcnode-id="7858" instrument_node="">[</span></span><a data-dcnode-id="7855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D22" title="Edit section: Operating hours"><span data-dcnode-id="7856" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7853"><span data-dcnode-id="7854" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7850" instrument_node="">
</span><p data-dcnode-id="7848"><span data-dcnode-id="7849" instrument_node="">Most buses with a line number under 200 run daily 05:00-23:00. Buses with a line number greater than 300 run 06:00-22:00. All buses with a line number in the 200s are night buses. Many routes get very crowded during rush hours (06:30-09:00 and 16:00-20:00). On major holidays, there will be more frequent service on most city routes.
</span></p><p data-dcnode-id="7846"><span data-dcnode-id="7847" instrument_node="">Most metro-based bus fares are ¥2 (routes 1 to 199), but with a public transportation card you can get a 60% discount. Some buses have travel thru the metro and on to suburbs and charge distance-based fare, so be sure to swipe your card upon exiting or you will be charged as if traveling the full route (a good rule of thumb is if there is a meter posted at a bus exit, you should swipe). Always have exact fare.
</span></p><p data-dcnode-id="7844"><span data-dcnode-id="7845" instrument_node="">Many other lines operate according to distance.
</span></p><span data-dcnode-id="7843" instrument_node="">
</span><h3 data-dcnode-id="7833"><span class="mw-headline" data-dcnode-id="7841" id="By_taxi"><span data-dcnode-id="7842" instrument_node="">By taxi</span></span><span class="mw-editsection" data-dcnode-id="7834"><span class="mw-editsection-bracket" data-dcnode-id="7839"><span data-dcnode-id="7840" instrument_node="">[</span></span><a data-dcnode-id="7837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D23" title="Edit section: By taxi"><span data-dcnode-id="7838" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7835"><span data-dcnode-id="7836" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7832" instrument_node="">
</span><p data-dcnode-id="7825"><i data-dcnode-id="7830"><span data-dcnode-id="7831" instrument_node="">More details:</span></i><span data-dcnode-id="7829" instrument_node=""> </span><a data-dcnode-id="7827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Public_Transport%23By_Taxi" title="Beijing/Public Transport"><span data-dcnode-id="7828" instrument_node="">Public Transport by Taxi</span></a><span data-dcnode-id="7826" instrument_node="">
</span></p><span data-dcnode-id="7824" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7815"><div class="thumbinner" data-dcnode-id="7816" style="width:302px;"><a class="image" data-dcnode-id="7822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing_taxi_newcolor.jpg"><img alt="" class="thumbimage" data-dcnode-id="7823" data-file-height="600" data-file-width="800" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/en/thumb/3/32/Beijing_taxi_newcolor.jpg/300px-Beijing_taxi_newcolor.jpg&amp;raw" srcset="/upload/en/thumb/3/32/Beijing_taxi_newcolor.jpg/450px-Beijing_taxi_newcolor.jpg 1.5x, /upload/en/thumb/3/32/Beijing_taxi_newcolor.jpg/600px-Beijing_taxi_newcolor.jpg 2x" width="300"></a><span data-dcnode-id="7821" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7817"><div class="magnify" data-dcnode-id="7819"><a class="internal" data-dcnode-id="7820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing_taxi_newcolor.jpg" title="Enlarge"></a></div><span data-dcnode-id="7818" instrument_node="">Beijing taxis, with a dark yellow strip and name of the taxi company in the center, and other parts are dark reddish brown (also could be white, dark green or dark blue)</span></div></div></div><span data-dcnode-id="7814" instrument_node="">
</span><p data-dcnode-id="7812"><span data-dcnode-id="7813" instrument_node="">Taxis are a convenient choice when traveling as a family or with luggage. Fares are very reasonable. Downsides can be attempting to hail one during rush hours (when some drivers simply don't operate due to a hit on their profits) or suffering through traffic jams. Nearly all drivers do not speak English or recognize place names written in English, so it pays to have the Chinese characters for the location ready in advance. Some drivers may be reluctant to pick up foreigners, with some having had bad experiences. If a taxi driver does pick you up, as one should wherever visiting, treat the driver with courtesy and you will likely not have any problems. Once the flag falls, that means the driver is legally obligated to take you to your destination.
</span></p><p data-dcnode-id="7810"><span data-dcnode-id="7811" instrument_node="">In the more remote places of Beijing, you might not be able to find any official taxis. However, in these places there will most likely be plenty of unofficial taxis. Take them when there is no other option, and if so, negotiate the price, although it is likely you'll pay more than a standard fare.
</span></p><p data-dcnode-id="7803"><b data-dcnode-id="7808"><span data-dcnode-id="7809" instrument_node="">NOTE</span></b><span data-dcnode-id="7807" instrument_node=""> It is EXTREMELY difficult for white foreigners to hail a taxi in Beijing. This is due to a) the official fares being fixed artificially low, so there is an undersupply of taxis, b) taxi drivers expect foreigners to have trouble explaining their destination and can't be bothered with it and c) many Chinese book their taxis with apps. This is </span><b data-dcnode-id="7805"><span data-dcnode-id="7806" instrument_node="">not</span></b><span data-dcnode-id="7804" instrument_node=""> like other cities in Asia where taxis are desperate for fares, quite the reverse. Therefore, if you start walking with the expectation that you'll just be able to grab a cab if you get lost or are running late, you're in for a surprise - it's better to get to know the subway system. If you have a lot of luggage and are going to the airport, it might be easier to get one. This might be outdated information as of 2019, since most taxi drivers should be well-used to foreign customers by now and any communication can easily be faciliated by use of the technological marvel that is your smartphone (downloading the offline packages of Chinese and English makes google translate available for use in China, inluding real-time two-way speech translation).
</span></p><p data-dcnode-id="7799"><b data-dcnode-id="7801"><span data-dcnode-id="7802" instrument_node="">Ride hailing apps</span></b><span data-dcnode-id="7800" instrument_node=""> If you have access to a sim card, you can try and use the ride hailing app called "Didi chuxing". It's the app that the locals themselves will use to get around. It works the same way as Uber, and also has english language interface. Be aware that some drivers like to call you when driving to pick you up, and a few times they will drive with a different number plate than stated in the app. Didi also works for Taxis, negating any difficulties described in other sections of this article - especially so if you are accustomed to mobile payment systems like Alipay.
</span></p><p data-dcnode-id="7796"><br data-dcnode-id="7798"><span data-dcnode-id="7797" instrument_node="">
</span></p><span data-dcnode-id="7795" instrument_node="">
</span><h4 data-dcnode-id="7785"><span class="mw-headline" data-dcnode-id="7793" id="Fares_and_meters"><span data-dcnode-id="7794" instrument_node="">Fares and meters</span></span><span class="mw-editsection" data-dcnode-id="7786"><span class="mw-editsection-bracket" data-dcnode-id="7791"><span data-dcnode-id="7792" instrument_node="">[</span></span><a data-dcnode-id="7789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D24" title="Edit section: Fares and meters"><span data-dcnode-id="7790" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7787"><span data-dcnode-id="7788" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7784" instrument_node="">
</span><p data-dcnode-id="7776"><span data-dcnode-id="7783" instrument_node="">Taxis charge a starting fee of ¥13, and an additional ¥2.3/km after the first 3 kilometres. 5 min of waiting time equals ¥2.3 also.  Outside of rush hour, an average daytime trip costs around ¥20-30, and a cross-town journey about ¥50. You will also pay any toll charges which are typically ¥5 or ¥10. At the end, it is a good idea to ask for a </span><b data-dcnode-id="7781"><span data-dcnode-id="7782" instrument_node="">receipt</span></b><span data-dcnode-id="7780" instrument_node=""> (发票 </span><i data-dcnode-id="7778"><span data-dcnode-id="7779" instrument_node="">fā piào</span></i><span data-dcnode-id="7777" instrument_node="">). 
</span></p><p data-dcnode-id="7774"><span data-dcnode-id="7775" instrument_node="">If you want a tour around Beijing and its vicinity, you can ask your hotel to hire a cab for one day or several days. It usually costs ¥400-600 per day, depending on where you go. You can also ask just about any driver to perform this service as most are more than willing to do so.
</span></p><span data-dcnode-id="7773" instrument_node="">
</span><h4 data-dcnode-id="7763"><span class="mw-headline" data-dcnode-id="7771" id="Avoiding_scams_and_fakes"><span data-dcnode-id="7772" instrument_node="">Avoiding scams and fakes</span></span><span class="mw-editsection" data-dcnode-id="7764"><span class="mw-editsection-bracket" data-dcnode-id="7769"><span data-dcnode-id="7770" instrument_node="">[</span></span><a data-dcnode-id="7767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D25" title="Edit section: Avoiding scams and fakes"><span data-dcnode-id="7768" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7765"><span data-dcnode-id="7766" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7762" instrument_node="">
</span><p data-dcnode-id="7760"><span data-dcnode-id="7761" instrument_node="">All official taxis have license plates beginning with the letter "B" which is reserved for public transportation vehicles, as in "京B".  "Black cabs" may look like taxis but their license plates will start with letters other than B.  They generally hang out around tourist sights like the Great Wall and the Summer Palace or around subway stops. Black cabs will charge you a higher fee for the journey and may be entirely unreliable.
</span></p><p data-dcnode-id="7758"><span data-dcnode-id="7759" instrument_node="">There are several "makeshift taxis" running around Beijing including a seat fixed up to the back of an electric scooter. These guys will scam you big time if you don't negotiate a clear fare beforehand. Upon arriving at your destination, for a 2-minute ride, the driver will demand an exorbitant amount and will be very belligerent if you don't pay it.
</span></p><span data-dcnode-id="7757" instrument_node="">
</span><h3 data-dcnode-id="7747"><span class="mw-headline" data-dcnode-id="7755" id="By_bicycle"><span data-dcnode-id="7756" instrument_node="">By bicycle</span></span><span class="mw-editsection" data-dcnode-id="7748"><span class="mw-editsection-bracket" data-dcnode-id="7753"><span data-dcnode-id="7754" instrument_node="">[</span></span><a data-dcnode-id="7751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D26" title="Edit section: By bicycle"><span data-dcnode-id="7752" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7749"><span data-dcnode-id="7750" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7746" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7737"><div class="thumbinner" data-dcnode-id="7738" style="width:302px;"><a class="image" data-dcnode-id="7744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AIMG_0941.jpg"><img alt="" class="thumbimage" data-dcnode-id="7745" data-file-height="3264" data-file-width="2448" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/0/0c/IMG_0941.jpg/300px-IMG_0941.jpg&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/0/0c/IMG_0941.jpg/450px-IMG_0941.jpg 1.5x, https://wikitravel.org/upload/shared//thumb/0/0c/IMG_0941.jpg/600px-IMG_0941.jpg 2x" width="300"></a><span data-dcnode-id="7743" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7739"><div class="magnify" data-dcnode-id="7741"><a class="internal" data-dcnode-id="7742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AIMG_0941.jpg" title="Enlarge"></a></div><span data-dcnode-id="7740" instrument_node="">These drivers can scam tourists big time if a fare hasn't been negotiated beforehand</span></div></div></div><span data-dcnode-id="7736" instrument_node="">
</span><p data-dcnode-id="7734"><span data-dcnode-id="7735" instrument_node="">Once known as a nation of bicycles, China today has an ever growing number of private car owners. It is estimated 1,200 more cars hit the streets in Beijing every day. As a result, nowadays you are guaranteed to see more bikes in the Netherlands than in Beijing. However, the infrastructure from its days as capital of the "Bicycle Kingdom" means exploring Beijing on a bike is excellent. The city is flat as a pancake and all major streets have bike lanes. Bicycling can be faster than traveling by private or public transport because of the traffic congestion in the motorized traffic lanes.
</span></p><p data-dcnode-id="7732"><span data-dcnode-id="7733" instrument_node="">Four-wheeled motorized traffic in Beijing usually observes traffic signals with the exception of making turns at red lights which is often done without slowing or deferring to pedestrians or bicyclists. Pedestrians, bicycles and all other vehicles (for example, motorized bicycles, mopeds and tricycles) generally do not observe traffic signals. Also, cars, trucks and buses do not defer to cyclists on the road so it is common for a vehicle to make a right turn from an inside lane across a bike lane with no concern for cyclists traveling in the bike lane. Sometimes a right-turning vehicle crossing a bike lane will sound its horn as a warning, but not always. Cyclists also need to be on the lookout for wrong-way traffic in the bike lanes, usually bicycles and tricycles but sometimes motor vehicles, too. Wrong-way traffic usually stays close to the curb so you move to the left to get by them, but not always. Bicycling Beijingers tend not to wear helmets, nor do they use lights at night. Few bikes even have rear reflectors. The moderate pace and sheer numbers of bicyclists in Beijing appears to make bike travel safer than it would be otherwise.
