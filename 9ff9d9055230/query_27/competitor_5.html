</span><h2 data-dcnode-id="6096"><span class="mw-headline" data-dcnode-id="6104" id="Work"><span data-dcnode-id="6105" instrument_node="">Work</span></span><span class="mw-editsection" data-dcnode-id="6097"><span class="mw-editsection-bracket" data-dcnode-id="6102"><span data-dcnode-id="6103" instrument_node="">[</span></span><a data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D43" title="Edit section: Work"><span data-dcnode-id="6101" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6095" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6086"><div class="thumbinner" data-dcnode-id="6087" style="width:182px;"><a class="image" data-dcnode-id="6093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing_Cei_Bi_Di_Cei_Bi_Di.jpeg"><img alt="" class="thumbimage" data-dcnode-id="6094" data-file-height="600" data-file-width="750" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/f/f5/Beijing_Cei_Bi_Di_Cei_Bi_Di.jpeg/180px-Beijing_Cei_Bi_Di_Cei_Bi_Di.jpeg&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/f/f5/Beijing_Cei_Bi_Di_Cei_Bi_Di.jpeg/270px-Beijing_Cei_Bi_Di_Cei_Bi_Di.jpeg 1.5x, https://wikitravel.org/upload/shared//thumb/f/f5/Beijing_Cei_Bi_Di_Cei_Bi_Di.jpeg/360px-Beijing_Cei_Bi_Di_Cei_Bi_Di.jpeg 2x" width="180"></a><span data-dcnode-id="6092" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6088"><div class="magnify" data-dcnode-id="6090"><a class="internal" data-dcnode-id="6091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing_Cei_Bi_Di_Cei_Bi_Di.jpeg" title="Enlarge"></a></div><span data-dcnode-id="6089" instrument_node="">CBD</span></div></div></div><span data-dcnode-id="6085" instrument_node="">
</span><p data-dcnode-id="6071"><span data-dcnode-id="6084" instrument_node="">Most of the international business offices are in Chaoyang District around </span><a data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/CBD" title="Beijing/CBD"><span data-dcnode-id="6083" instrument_node="">Guomao</span></a><span data-dcnode-id="6081" instrument_node="">, Dawang, </span><a data-dcnode-id="6079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Wangfujing" title="Beijing/Wangfujing"><span data-dcnode-id="6080" instrument_node="">Wangfujing</span></a><span data-dcnode-id="6078" instrument_node=""> and Chaoyangmen.  The </span><b data-dcnode-id="6076"><span data-dcnode-id="6077" instrument_node="">Central Business District</span></b><span data-dcnode-id="6075" instrument_node=""> or </span><a data-dcnode-id="6073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/CBD" title="Beijing/CBD"><span data-dcnode-id="6074" instrument_node="">CBD</span></a><span data-dcnode-id="6072" instrument_node=""> is centered around Guomao.  Many technology companies have offices in Wangjing (sub-district in Chaoyang District) and Zhongguancun (Haidian District).  
</span></p><p data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">Like all of China, finding a job teaching English in Beijing is relatively easy for native speakers.  In fact, if you are of European descent some employers may assume that you are already qualified enough to teach English to Chinese students. However, more prestigious employers (especially universities and high-end language schools) will generally require an English teaching qualification and a Bachelor's degree (normally in any discipline, although sometimes specifically in English/linguistics). Reputable institutions will provide proper working visa category to ensure legal employment; those which do not are not advised.
</span></p><p data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">Teaching jobs are available teaching a range of ages from kindergarten to elementary, middle and high school students as well as universities and private language centers. Schools usually require native speakers with a degree in any discipline and TEFL certificate. There are plenty of job boards online as well as recruiting agents.
</span></p><p data-dcnode-id="6062"><span data-dcnode-id="6066" instrument_node="">See also: </span><a data-dcnode-id="6064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Teaching_English" title="Teaching English"><span data-dcnode-id="6065" instrument_node="">Teaching English</span></a><span data-dcnode-id="6063" instrument_node="">.
</span></p><span data-dcnode-id="6061" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="6034"><div class="thumbinner" data-dcnode-id="6035" style="width:182px;"><a class="image" data-dcnode-id="6041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AWangfujing_street.jpeg"><img alt="" class="thumbimage" data-dcnode-id="6042" data-file-height="1944" data-file-width="2592" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/b/ba/Wangfujing_street.jpeg/180px-Wangfujing_street.jpeg&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/b/ba/Wangfujing_street.jpeg/270px-Wangfujing_street.jpeg 1.5x, https://wikitravel.org/upload/shared//thumb/b/ba/Wangfujing_street.jpeg/360px-Wangfujing_street.jpeg 2x" width="180"></a><span data-dcnode-id="6040" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6036"><div class="magnify" data-dcnode-id="6038"><a class="internal" data-dcnode-id="6039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AWangfujing_street.jpeg" title="Enlarge"></a></div><span data-dcnode-id="6037" instrument_node="">Wangfujing Street</span></div></div></div><span data-dcnode-id="6033" instrument_node="">
</span><p data-dcnode-id="6026"><i data-dcnode-id="6028"><span data-dcnode-id="6032" instrument_node="">See the </span><a data-dcnode-id="6030" href="#Districts" title="Beijing"><span data-dcnode-id="6031" instrument_node="">Districts</span></a><span data-dcnode-id="6029" instrument_node=""> articles for individual listings.</span></i><span data-dcnode-id="6027" instrument_node="">
</span></p><p data-dcnode-id="6021"><span data-dcnode-id="6025" instrument_node="">Throughout nearly all markets in Beijing, </span><a class="mw-redirect" data-dcnode-id="6023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Haggling" title="Haggling"><span data-dcnode-id="6024" instrument_node="">haggling</span></a><span data-dcnode-id="6022" instrument_node=""> is essential.  Especially when browsing through large, "touristy" shopping areas for common items, do not put it beneath your dignity to start bargaining at 15% of the vendor's initial asking price. In fact, in the most "touristy" markets final prices can often be as low as 15%-20% of the initial asking price, and "removing a zero" isn't a bad entry point in the bargaining process.  After spending some time haggling, never hesitate to threaten walking away, as this is often the quickest way to see a vendor lower his or her prices to a reasonable level. Buying in bulk or in groups may also lower the price. How high or low the vendor sets the asking price depends on the customer, the vendor, the product's popularity, and even the time of day. Vendors also tend to target visible minorities more, such as Caucasians or people of African descent.
</span></p><p data-dcnode-id="6007"><span data-dcnode-id="6020" instrument_node="">The are a number of interesting </span><b data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">markets</span></b><span data-dcnode-id="6017" instrument_node=""> around Beijing where you can find all kind of cheap (and often fake) stuff.  Some of the most popular places are Xizhimen in </span><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng%23Buy" title="Beijing/Xicheng"><span data-dcnode-id="6016" instrument_node="">Xicheng District</span></a><span data-dcnode-id="6014" instrument_node="">, Silk Street or Panjiayuan in </span><a data-dcnode-id="6012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Buy" title="Beijing/Chaoyang"><span data-dcnode-id="6013" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="6011" instrument_node=""> and Hong Qiao Market in </span><a data-dcnode-id="6009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chongwen%23Buy" title="Beijing/Chongwen"><span data-dcnode-id="6010" instrument_node="">Chongwen District</span></a><span data-dcnode-id="6008" instrument_node="">.
</span></p><p data-dcnode-id="5996"><span data-dcnode-id="6006" instrument_node="">As an alternative to the markets you can go to some of </span><b data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">the shopping areas</span></b><span data-dcnode-id="6003" instrument_node=""> lined with shops.  This includes Nanluoguoxiang in </span><a data-dcnode-id="6001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng%23Buy" title="Beijing/Dongcheng"><span data-dcnode-id="6002" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="6000" instrument_node=""> and Qianmen Dajie Pedestrian Street, Dashilan and Liulichang in </span><a data-dcnode-id="5998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xuanwu%23Buy" title="Beijing/Xuanwu"><span data-dcnode-id="5999" instrument_node="">Xuanwu District</span></a><span data-dcnode-id="5997" instrument_node="">.
</span></p><p data-dcnode-id="5982"><span data-dcnode-id="5995" instrument_node="">If you are looking for </span><b data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">traditional Chinese food shops</span></b><span data-dcnode-id="5992" instrument_node=""> try Yinhehua Vegetarian in </span><a data-dcnode-id="5990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng%23Buy" title="Beijing/Dongcheng"><span data-dcnode-id="5991" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="5989" instrument_node="">, Daoxiangcun, Liubiju or The Tea Street in </span><a data-dcnode-id="5987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xuanwu%23Buy" title="Beijing/Xuanwu"><span data-dcnode-id="5988" instrument_node="">Xuanwu District</span></a><span data-dcnode-id="5986" instrument_node="">. Please note that Chongwenmen Food Market in </span><a data-dcnode-id="5984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chongwen%23Buy" title="Beijing/Chongwen"><span data-dcnode-id="5985" instrument_node="">Chongwen District</span></a><span data-dcnode-id="5983" instrument_node=""> has been demolished in 2010.
</span></p><p data-dcnode-id="5968"><span data-dcnode-id="5981" instrument_node="">Visiting </span><b data-dcnode-id="5979"><span data-dcnode-id="5980" instrument_node="">hotel shops and department stores</span></b><span data-dcnode-id="5978" instrument_node=""> is not the most characterful shopping in China, but worth a look. While generally significantly more expensive, they are less likely to sell truly low quality goods. The old style of Chinese retailing is gradually being transformed by shops with a better design sense and souvenir items are getting better each year. Silk clothing, table settings and so on and other spots around town, are worth a look, as are porcelain, specialty tea and other traditional items.  Some of the most popular areas for this kind of shopping are </span><a data-dcnode-id="5976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Wangfujing" title="Beijing/Wangfujing"><span data-dcnode-id="5977" instrument_node="">Wangfujing</span></a><span data-dcnode-id="5975" instrument_node=""> and The Malls at Oriental Plaza both in </span><a data-dcnode-id="5973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng%23Buy" title="Beijing/Dongcheng"><span data-dcnode-id="5974" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="5972" instrument_node=""> as well as Xidan in </span><a data-dcnode-id="5970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng%23Buy" title="Beijing/Xicheng"><span data-dcnode-id="5971" instrument_node="">Xicheng District</span></a><span data-dcnode-id="5969" instrument_node="">.
</span></p><p data-dcnode-id="5964"><b data-dcnode-id="5966"><span data-dcnode-id="5967" instrument_node="">Antiques</span></b><span data-dcnode-id="5965" instrument_node="">
</span></p><p data-dcnode-id="5959"><span data-dcnode-id="5963" instrument_node="">The </span><b data-dcnode-id="5961"><span data-dcnode-id="5962" instrument_node="">carpet</span></b><span data-dcnode-id="5960" instrument_node=""> business is strong in Beijing and you will find all manner of stores selling silk carpets and other varieties.
</span></p><span data-dcnode-id="5958" instrument_node="">
</span><h2 data-dcnode-id="5941"><span class="mw-headline" data-dcnode-id="5956" id="Eat"><span data-dcnode-id="5957" instrument_node="">Eat</span></span><span class="mw-editsection" data-dcnode-id="5949"><span class="mw-editsection-bracket" data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">[</span></span><a data-dcnode-id="5952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D45" title="Edit section: Eat"><span data-dcnode-id="5953" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">]</span></span></span><span class="mw-editsection" data-dcnode-id="5942"><span class="mw-editsection-bracket" data-dcnode-id="5947"><span data-dcnode-id="5948" instrument_node="">[</span></span><a data-dcnode-id="5945" href="#Eat" onclick="addListing(this, '45', 'eat', 'Beijing');" title="click to add a eat listing"><span data-dcnode-id="5946" instrument_node="">add listing</span></a><span class="mw-editsection-bracket" data-dcnode-id="5943"><span data-dcnode-id="5944" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5940" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5931"><div class="thumbinner" data-dcnode-id="5932" style="width:302px;"><a class="image" data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AGhost_street_Beijing.jpg"><img alt="" class="thumbimage" data-dcnode-id="5939" data-file-height="288" data-file-width="384" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/en/thumb/0/0e/Ghost_street_Beijing.jpg/300px-Ghost_street_Beijing.jpg&amp;raw" srcset="/upload/en/0/0e/Ghost_street_Beijing.jpg 1.5x" width="300"></a><span data-dcnode-id="5937" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5933"><div class="magnify" data-dcnode-id="5935"><a class="internal" data-dcnode-id="5936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3AGhost_street_Beijing.jpg" title="Enlarge"></a></div><span data-dcnode-id="5934" instrument_node="">Ghost Street</span></div></div></div><span data-dcnode-id="5930" instrument_node="">
</span><p data-dcnode-id="5923"><i data-dcnode-id="5925"><span data-dcnode-id="5929" instrument_node="">See the </span><a data-dcnode-id="5927" href="#Districts" title="Beijing"><span data-dcnode-id="5928" instrument_node="">Districts</span></a><span data-dcnode-id="5926" instrument_node=""> articles for individual listings.</span></i><span data-dcnode-id="5924" instrument_node="">
</span></p><p data-dcnode-id="5903"><span data-dcnode-id="5922" instrument_node="">Beijing provides an ideal opportunity to sample food from all over the country. Some of Beijing's best restaurants serve food from </span><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Sichuan" title="Sichuan"><span data-dcnode-id="5921" instrument_node="">Sichuan</span></a><span data-dcnode-id="5919" instrument_node="">, </span><a data-dcnode-id="5917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Hunan" title="Hunan"><span data-dcnode-id="5918" instrument_node="">Hunan</span></a><span data-dcnode-id="5916" instrument_node="">, </span><a data-dcnode-id="5914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Guangzhou" title="Guangzhou"><span data-dcnode-id="5915" instrument_node="">Guangzhou</span></a><span data-dcnode-id="5913" instrument_node="">, </span><a data-dcnode-id="5911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Tibet" title="Tibet"><span data-dcnode-id="5912" instrument_node="">Tibet</span></a><span data-dcnode-id="5910" instrument_node="">, </span><a data-dcnode-id="5908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Yunnan" title="Yunnan"><span data-dcnode-id="5909" instrument_node="">Yunnan</span></a><span data-dcnode-id="5907" instrument_node="">, </span><a data-dcnode-id="5905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Xinjiang" title="Xinjiang"><span data-dcnode-id="5906" instrument_node="">Xinjiang</span></a><span data-dcnode-id="5904" instrument_node="">, and more.  
</span></p><span data-dcnode-id="5902" instrument_node="">
</span><ul data-dcnode-id="5897"><li data-dcnode-id="5898"><b data-dcnode-id="5899"><a data-dcnode-id="5900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Sanlitun%23Eat" title="Beijing/Sanlitun"><span data-dcnode-id="5901" instrument_node="">Sanlitun</span></a></b></li></ul><span data-dcnode-id="5896" instrument_node="">
</span><p data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">Sanlitun has Beijing's widest selection of great restaurants, offering a second to none culinary tour of the world's finest cuisine, plus delectable dishes from Nearly every province.
</span></p><span data-dcnode-id="5893" instrument_node="">
</span><ul data-dcnode-id="5888"><li data-dcnode-id="5889"><b data-dcnode-id="5890"><a data-dcnode-id="5891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongzhimen%23Eat" title="Beijing/Dongzhimen"><span data-dcnode-id="5892" instrument_node="">Dongzhimen</span></a></b></li></ul><span data-dcnode-id="5887" instrument_node="">
</span><p data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">Beijing's best loved specialities. You can sample almost anything on Ghost Street, from Sichuan Schuizhuyu and malatang to the rich taste of grilled seafood chuan'er, Peking Duck and even Chicken Kiev.
</span></p><span data-dcnode-id="5884" instrument_node="">
</span><ul data-dcnode-id="5879"><li data-dcnode-id="5880"><b data-dcnode-id="5881"><a data-dcnode-id="5882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Wangfujing%23Eat" title="Beijing/Wangfujing"><span data-dcnode-id="5883" instrument_node="">Wangfujing</span></a></b></li></ul><span data-dcnode-id="5878" instrument_node="">
</span><p data-dcnode-id="5873"><span data-dcnode-id="5877" instrument_node="">New york has its Fifth Avenue, London has Oxford Street and Shanghai has Nanjing Road. Best of them all, Beijing has </span><b data-dcnode-id="5875"><span data-dcnode-id="5876" instrument_node="">Wangfujing Street</span></b><span data-dcnode-id="5874" instrument_node="">. Just nort of the Night Market, a second Food Street opens at night along Dong'anmen Avenue, with a more traditional range of Chinese street foods. Standard restaurants will open at the top levels of each of the Shopping Centres.
</span></p><span data-dcnode-id="5872" instrument_node="">
</span><ul data-dcnode-id="5865"><li data-dcnode-id="5866"><b data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">Wudaokou</span></b><span data-dcnode-id="5869" instrument_node=""> in </span><a data-dcnode-id="5867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Haidian%23Eat" title="Beijing/Haidian"><span data-dcnode-id="5868" instrument_node="">Haidian District</span></a></li></ul><span data-dcnode-id="5864" instrument_node="">
</span><p data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">Wudaokou is the heart of Beijing's university district. Cafés, bars, clubs and restaurants in the area cater to a growing Western and South Korean student population offering simple cuisine like Salads, Sandwiches, pizza and all-day American Breakfast. Prices are more student friendly compared to the embassy districts or Sanlitun.
</span></p><span data-dcnode-id="5861" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5852"><div class="thumbinner" data-dcnode-id="5853" style="width:182px;"><a class="image" data-dcnode-id="5859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3APeking_Duck.jpeg"><img alt="" class="thumbimage" data-dcnode-id="5860" data-file-height="600" data-file-width="800" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/shared//thumb/4/49/Peking_Duck.jpeg/180px-Peking_Duck.jpeg&amp;raw" srcset="https://wikitravel.org/upload/shared//thumb/4/49/Peking_Duck.jpeg/270px-Peking_Duck.jpeg 1.5x, https://wikitravel.org/upload/shared//thumb/4/49/Peking_Duck.jpeg/360px-Peking_Duck.jpeg 2x" width="180"></a><span data-dcnode-id="5858" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5854"><div class="magnify" data-dcnode-id="5856"><a class="internal" data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3APeking_Duck.jpeg" title="Enlarge"></a></div><span data-dcnode-id="5855" instrument_node="">Peking Duck</span></div></div></div><span data-dcnode-id="5851" instrument_node="">
</span><p data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node="">Some restaurants that we may recommand and most famous are&nbsp;: 
</span></p><p data-dcnode-id="5839"><b data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">Peking Roast Duck</span></b><span data-dcnode-id="5846" instrument_node=""> is a famous Beijing specialty served at many restaurants, but there are quite a few restaurants dedicated to the art of roasting the perfect duck.  Expect to pay around ¥90 per whole duck at budget-range establishments, and ¥160-200 at high-end restaurants.  Beijing duck (北京烤鸭 </span><i data-dcnode-id="5844"><span data-dcnode-id="5845" instrument_node="">Bĕijīng kăoyā</span></i><span data-dcnode-id="5843" instrument_node="">) is served with thin pancakes, plum sauce (甜面酱 </span><i data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">tiánmiàn jiàng</span></i><span data-dcnode-id="5840" instrument_node="">)，and slivers of scallions and cucumbers. You spread the sauce on the pancake, put a few pieces of duck, cucumber, and scallions.The end result is a mouthwatering combination of the cool crunchiness of the cucumber, the sharpness of the scallions, and the rich flavors of the duck.
</span></p><p data-dcnode-id="5828"><span data-dcnode-id="5838" instrument_node="">The best way to eat well and on the cheap is to enter one of the ubiquitous restaurants where the locals are eating and pick a few different dishes from the menu. Truth be told, visitors can find Beijing a very inexpensive city for food, especially considering that tipping is not practiced in China (instead along with taxes, built into the menu price). Some of this is due to low wages for restaurant workers and farmers, use of genetically modified or engineered ingredients, or flavor enhancers or preservatives to help speed flavors along or quicken the cooking process. A combination of small eateries and street vendors are popular in areas such as </span><a data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Wangfujing" title="Beijing/Wangfujing"><span data-dcnode-id="5837" instrument_node="">Wangfujing</span></a><span data-dcnode-id="5835" instrument_node="">, Huguosi Street, </span><a data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongzhimen" title="Beijing/Dongzhimen"><span data-dcnode-id="5834" instrument_node="">Gui Jie</span></a><span data-dcnode-id="5832" instrument_node="">, and </span><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Gulou" title="Beijing/Gulou"><span data-dcnode-id="5831" instrument_node="">Gulou</span></a><span data-dcnode-id="5829" instrument_node=""> areas.
</span></p><p data-dcnode-id="5826"><span data-dcnode-id="5827" instrument_node="">Some of the cheapest and most delicious meals can be had on the streets: 
</span></p><span data-dcnode-id="5825" instrument_node="">
</span><ul data-dcnode-id="5817"><li data-dcnode-id="5818"><b data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">Savory pancakes</span></b><span data-dcnode-id="5822" instrument_node=""> (煎饼果子 </span><i data-dcnode-id="5820"><span data-dcnode-id="5821" instrument_node="">Jiānbĭng guŏzi</span></i><span data-dcnode-id="5819" instrument_node="">) are one of the most popular street snacks, eaten from morning till night with most carts operating during the morning commute and then opening again at night for the after-club crowds and night-owls. This is a North China specialty. This delicious pancake is cooked with an egg on a griddle, a fried dough crisp is added, and the whole thing is drizzled in scallions and a savory sauce.  Hot sauce is optional. Not all street vendors are licensed and more than a fair share use recycled oil. For travelers unused to such and spending a few weeks in town may do well to avoid street vendors all together, or risk upset stomachs or worse. Diehard fans often go on a quest for the best cart in the city.  This  treat should only cost ¥2.50, with an extra egg ¥3. There are many styles, such as the egg is fried flat on top of the pancake and the toppings wrapped inside, or folded like a taco. </span></li></ul><span data-dcnode-id="5816" instrument_node="">
</span><ul data-dcnode-id="5802"><li data-dcnode-id="5803"><b data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node="">Lamb kebabs</span></b><span data-dcnode-id="5813" instrument_node=""> (羊肉串儿 </span><i data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">yángròu chuànr</span></i><span data-dcnode-id="5810" instrument_node="">) and other kebabs are grilled on makeshift stands all around Beijing, from the late afternoon to late at night. </span><a data-dcnode-id="5808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Wangfujing" title="Beijing/Wangfujing"><span data-dcnode-id="5809" instrument_node="">Wangfujing</span></a><span data-dcnode-id="5807" instrument_node=""> has a "snack street" selling such mundane fare like lamb, chicken, and beef as well as multiple styles of noodle dishes, such as Sichuan style rice noodles, but the brave can also sample silkworm, scorpion, and various organs all skewered on a stick and grilled to order. Huguosi Street (Line 4 or 6 Ping'anli Station) is also another popular area for goodies such as Shanxi noodles, stuffed buns (or filled, such as </span><i data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">xiǎobǐng jiāròu 小饼夹肉</span></i><span data-dcnode-id="5804" instrument_node="">), mutton soup and sweets of all kinds.</span></li></ul><span data-dcnode-id="5801" instrument_node="">
</span><ul data-dcnode-id="5792"><li data-dcnode-id="5793"><span data-dcnode-id="5800" instrument_node="">A winter specialty, </span><b data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">candied haw berries</span></b><span data-dcnode-id="5797" instrument_node=""> (冰糖葫芦 </span><i data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">bīngtáng húlu</span></i><span data-dcnode-id="5794" instrument_node="">) are dipped in molten sugar which is left to harden in the cold and sold on a stick.  You can also find variations with oranges, grapes, strawberries, and bananas, or dipped in crumbled peanuts as well as sugar.  This sweet snack can also sometimes be found in the spring and the summer, but the haw berries are often from last season's crop.</span></li></ul><span data-dcnode-id="5791" instrument_node="">
</span><p data-dcnode-id="5780"><span data-dcnode-id="5790" instrument_node="">The most famous street for dinner food in Beijing is probably </span><b data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">Guijie</span></b><span data-dcnode-id="5787" instrument_node=""> (簋街/鬼街 </span><i data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">Guǐjiē</span></i><span data-dcnode-id="5784" instrument_node="">), see </span><a data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="5783" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="5781" instrument_node=""> for further detail.
</span></p><p data-dcnode-id="5770"><b data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node="">Street food in Beijing</span></b><span data-dcnode-id="5777" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="5775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theme.hobobe.com/guijie/index.html" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="5776" instrument_node="">[115]</span></a><span data-dcnode-id="5774" instrument_node=""> Gui Street (簋街) is located within </span><a data-dcnode-id="5772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongzhimen" title="Beijing/Dongzhimen"><span data-dcnode-id="5773" instrument_node="">Dongzhimen</span></a><span data-dcnode-id="5771" instrument_node="">, East of the street from Second Ring Road of the Western part of the Dongzhimen overpass and West of the street from East Main Street eastern end crossing.
Gui Street now showcases many excellent cuisines, the centre of a food paradise. Stretching over one kilometer, 90% of the commercial shops in the street house more than 150 eateries. You can definitely find most of the larger restaurants in the capital here. Therefore Gui Street is known for its street food in Beijing.
</span></p><span data-dcnode-id="5769" instrument_node="">
</span><ul data-dcnode-id="5742"><li data-dcnode-id="5765"><b data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">Quanjude (全聚德)</span></b><span data-dcnode-id="5766" instrument_node=""> is the most famous restaurant for Peking Duck and is a national chain. Unlike McDonald’s, the quality, as well as price, among  different Quanjude restaurants differs greatly.  For quality and authentic Peking Duck, only two Quanjude restaurants should be patronized: one in Qianmen (前门) and one in Hepingmen（和平门）.  Both of them are in central locations, providing the most authentic Peking duck dishes (and their prices are dearest too), but the former is right in the middle of tourist area and there is always a very long queue during lunch or dinner time.  The latter is just one subway station away from former with a much bigger capacity, and you will be guided to your seats in no time when you walk in.</span></li><span data-dcnode-id="5764" instrument_node="">
</span><li data-dcnode-id="5743"><span data-dcnode-id="5763" instrument_node=""> </span><span class="vcard" data-dcnode-id="5744" id="Guolin_Home-style_Restaurant"><span class="fn org" data-dcnode-id="5761"><span data-dcnode-id="5762" instrument_node="">Guolin Home-style Restaurant</span></span><span data-dcnode-id="5760" instrument_node=""> (</span><span class="nickname" data-dcnode-id="5756"><span class="non-latin" data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">郭林家常菜</span></span><span data-dcnode-id="5757" instrument_node=""> Guōlín Jiācháng Cài</span></span><span data-dcnode-id="5755" instrument_node="">). </span><span class="description" data-dcnode-id="5748"><span data-dcnode-id="5754" instrument_node="">This well-kept secret among Chinese people has some of the tastiest and most inexpensive ducks in all of Beijing.  Half a duck is ¥58. And all its other delicious, innovative dishes keep customers coming back: be prepared for a bustling, noisy atmosphere, though the interior is often quite nice. Locations all over Beijing—look for a sign with two little pigs—including at Fangzhuang, Zhongguancun, Wudaokou, Xuanwu, and more. You can find one on Xisi Beijie between subway stations Ping'anli and Xinjieku. See also Dadong Roast Duck Restaurant in </span><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="5753" instrument_node="">Beijing/Dongcheng</span></a><span data-dcnode-id="5751" instrument_node=""> or Quanjude in </span><a data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chongwen" title="Beijing/Chongwen"><span data-dcnode-id="5750" instrument_node="">Beijing/Chongwen</span></a></span><span data-dcnode-id="5747" instrument_node=""> &nbsp;</span><a class="listing-edit" data-dcnode-id="5745" href="#Guolin_Home-style_Restaurant" onclick="editListing('Guolin_Home-style_Restaurant', 'eat', 'Beijing');return false;" rel="nofollow" title="click to edit Guolin Home-style Restaurant"><span data-dcnode-id="5746" instrument_node="">edit</span></a></span></li></ul><span data-dcnode-id="5741" instrument_node="">
</span><p data-dcnode-id="5724"><span data-dcnode-id="5740" instrument_node="">Beijing is also known for its </span><b data-dcnode-id="5738"><span data-dcnode-id="5739" instrument_node="">mutton hotpot</span></b><span data-dcnode-id="5737" instrument_node=""> (涮羊肉 </span><i data-dcnode-id="5735"><span data-dcnode-id="5736" instrument_node="">shuàn yáng ròu</span></i><span data-dcnode-id="5734" instrument_node="">), which originally came from the Manchu people and emphasizes mutton over other meats.  Like variations of hotpot (general name 火锅 </span><i data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">huŏ guō</span></i><span data-dcnode-id="5731" instrument_node="">) from elsewhere in China and Japan, hotpot is a cook-it-yourself affair in a steaming pot in the center of the table.  Unlike Sichuan hotpot, mutton hotpot features a savory, non-spicy broth. If that's not exciting enough for you, you can also request a spicy broth (be aware that this is flaming red, filled with peppers, and not for the weak!). To play it safe and satisfy everyone, you can request a yuan-yang (鸳鸯 </span><i data-dcnode-id="5729"><span data-dcnode-id="5730" instrument_node="">yuānyáng</span></i><span data-dcnode-id="5728" instrument_node="">) pot divided down the middle, with spicy broth on one side and regular broth on the other.  Raw ingredients are purchased by the plate, including other types of meat and seafood, vegetables, mushrooms, noodles, and tofu, so it's also perfectly possible to have </span><b data-dcnode-id="5726"><span data-dcnode-id="5727" instrument_node="">vegetarian hotpot</span></b><span data-dcnode-id="5725" instrument_node="">. A dipping sauce, usually sesame, is served as well; you can add chilis, garlic, cilantro, etc, to customize your own sauce. While "raw" sounds dangerous, boiling the meat yourself is the best way to ensure that more risky meats like pork are fully cooked and free of germs. In the city center, hotpot can run as much as ¥40-50 per person, but on the outskirts it can be found for as little as ¥10-25.  Low-budget types may reuse the spices or cooking broth from previous guests, although it has been boiling for several hours.
</span></p><span data-dcnode-id="5723" instrument_node="">
</span><ul data-dcnode-id="5714"><li data-dcnode-id="5715"><span data-dcnode-id="5722" instrument_node="">For </span><b data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">vegetarians</span></b><span data-dcnode-id="5719" instrument_node="">, Beijing's first pure vegetarian buffet restaurant is located at Confucius Temple, see </span><a data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng" title="Beijing/Dongcheng"><span data-dcnode-id="5718" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="5716" instrument_node=""> for further detail.</span></li></ul><span data-dcnode-id="5713" instrument_node="">
</span><ul data-dcnode-id="5708"><li data-dcnode-id="5709"><b data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">Korean restaurants</span></b><span data-dcnode-id="5710" instrument_node=""> are also very common in Beijing, due in part by northern Chinese (males in particular) strong liking of meat. A frequent meal is the grill-it-yourself barbeque, including beef, mutton, chicken, and seafood items as well as some vegetables including greens and potatoes. Restaurants that serve abalone and sharkfin are considered the most expensive restaurants in the city. Expect to pay upwards of ¥800 for a "cheap" meal at one of these restaurants, much more if splurging.</span></li></ul><span data-dcnode-id="5707" instrument_node="">
</span><ul data-dcnode-id="5702"><li data-dcnode-id="5703"><b data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node="">Mongolian restaurant</span></b><span data-dcnode-id="5704" instrument_node=""> is a must-try! There are several in the student district among with other minorities restaurants. Try mutton brains cold cuts, mashed potatoes with spinach, cold lamb with marinated garlic and of course Mongolian tea. You can buy mongolian tea and candies in places where they sell nuts and dried beef. </span></li></ul><span data-dcnode-id="5701" instrument_node="">
</span><p data-dcnode-id="5696"><span data-dcnode-id="5700" instrument_node="">You can also find some local specialties in a supermarket such as </span><i data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">tofu candy</span></i><span data-dcnode-id="5697" instrument_node=""> with different tastes, or mooncakes with various fillings. Green tea ice cream is something very special too.
</span></p><span data-dcnode-id="5695" instrument_node="">
</span><ul data-dcnode-id="5650"><li data-dcnode-id="5672"><span class="vcard" data-dcnode-id="5673" id="Take_a_Beijing_Food_Tour"><span class="fn org" data-dcnode-id="5693"><span data-dcnode-id="5694" instrument_node="">Take a Beijing Food Tour</span></span><span data-dcnode-id="5692" instrument_node="">, </span><span class="tel" data-dcnode-id="5686"><abbr class="type" data-dcnode-id="5690" title="voice"><span data-dcnode-id="5691" instrument_node="">☎</span></abbr><span data-dcnode-id="5689" instrument_node=""> </span><span class="phone value" data-dcnode-id="5687"><span data-dcnode-id="5688" instrument_node="">15692109030</span></span></span><span data-dcnode-id="5685" instrument_node="">, </span><a class="url external autonumber" data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lostplate.com/" rel="nofollow"><span data-dcnode-id="5684" instrument_node="">[39]</span></a><span data-dcnode-id="5682" instrument_node="">. </span><span class="description" data-dcnode-id="5680"><span data-dcnode-id="5681" instrument_node="">Take a local food tour by tuktuk and explore hidden restaurants and bars in Beijing's hutong neighborhood. They drive around the hutongs for about 10km while taking you to 5 off-the-beaten-path, family-run restaurants and 1 local brewery. Multiple tours are available daily</span></span><span data-dcnode-id="5679" instrument_node=""> </span><span class="price" data-dcnode-id="5677"><span data-dcnode-id="5678" instrument_node="">450</span></span><span data-dcnode-id="5676" instrument_node="">. &nbsp;</span><a class="listing-edit" data-dcnode-id="5674" href="#Take_a_Beijing_Food_Tour" onclick="editListing('Take_a_Beijing_Food_Tour', 'eat', 'Beijing');return false;" rel="nofollow" title="click to edit Take a Beijing Food Tour"><span data-dcnode-id="5675" instrument_node="">edit</span></a></span></li><span data-dcnode-id="5671" instrument_node="">
</span><li data-dcnode-id="5651"><span class="vcard" data-dcnode-id="5652" id="UnTour_Food_Tours"><span class="fn org" data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">UnTour Food Tours</span></span><span data-dcnode-id="5668" instrument_node="">, </span><span class="tel" data-dcnode-id="5662"><abbr class="type" data-dcnode-id="5666" title="voice"><span data-dcnode-id="5667" instrument_node="">☎</span></abbr><span data-dcnode-id="5665" instrument_node=""> </span><span class="phone value" data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">13701729642</span></span></span><span data-dcnode-id="5661" instrument_node="">, </span><a class="url external autonumber" data-dcnode-id="5659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.untourfoodtours.com/" rel="nofollow"><span data-dcnode-id="5660" instrument_node="">[40]</span></a><span data-dcnode-id="5658" instrument_node="">. </span><span class="description" data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">UnTour Beijing Food Tours gets off the eaten path, exploring the best hole-in-the-wall restaurants and hidden gems buried in Beijing's famous hutongs. Their food experiences helps tourists and new residents of the Shanghai get comfortable with the city's dynamic food scene fast. They offer two culinary tours of the city, including a street food breakfast and Old Beijing Dinner tours - both in the hutongs.</span></span><span data-dcnode-id="5655" instrument_node=""> &nbsp;</span><a class="listing-edit" data-dcnode-id="5653" href="#UnTour_Food_Tours" onclick="editListing('UnTour_Food_Tours', 'eat', 'Beijing');return false;" rel="nofollow" title="click to edit UnTour Food Tours"><span data-dcnode-id="5654" instrument_node="">edit</span></a></span></li></ul><span data-dcnode-id="5649" instrument_node="">
</span><h2 data-dcnode-id="5632"><span class="mw-headline" data-dcnode-id="5647" id="Drink"><span data-dcnode-id="5648" instrument_node="">Drink</span></span><span class="mw-editsection" data-dcnode-id="5640"><span class="mw-editsection-bracket" data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">[</span></span><a data-dcnode-id="5643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D46" title="Edit section: Drink"><span data-dcnode-id="5644" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">]</span></span></span><span class="mw-editsection" data-dcnode-id="5633"><span class="mw-editsection-bracket" data-dcnode-id="5638"><span data-dcnode-id="5639" instrument_node="">[</span></span><a data-dcnode-id="5636" href="#Drink" onclick="addListing(this, '46', 'drink', 'Beijing');" title="click to add a drink listing"><span data-dcnode-id="5637" instrument_node="">add listing</span></a><span class="mw-editsection-bracket" data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5631" instrument_node="">
</span><p data-dcnode-id="5624"><i data-dcnode-id="5626"><span data-dcnode-id="5630" instrument_node="">See the </span><a data-dcnode-id="5628" href="#Districts" title="Beijing"><span data-dcnode-id="5629" instrument_node="">Districts</span></a><span data-dcnode-id="5627" instrument_node=""> articles for individual listings.</span></i><span data-dcnode-id="5625" instrument_node="">
</span></p><p data-dcnode-id="5619"><span data-dcnode-id="5623" instrument_node="">Most of Beijing's bars are located in one of the bar clusters around the city.  A few years back, the only one was </span><a data-dcnode-id="5621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Sanlitun" title="Beijing/Sanlitun"><span data-dcnode-id="5622" instrument_node="">Sanlitun</span></a><span data-dcnode-id="5620" instrument_node="">, but almost every year the last few years have seen a new area emerge.  The most important areas are:
</span></p><span data-dcnode-id="5618" instrument_node="">
</span><ul data-dcnode-id="5610"><li data-dcnode-id="5611"><b data-dcnode-id="5616"><span data-dcnode-id="5617" instrument_node="">Houhai</span></b><span data-dcnode-id="5615" instrument_node=""> in </span><a data-dcnode-id="5613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xicheng%23Drink" title="Beijing/Xicheng"><span data-dcnode-id="5614" instrument_node="">Xicheng District</span></a><span data-dcnode-id="5612" instrument_node=""> located around the lake, Houhai.  Generally speaking, drinking at any bar in this area can be expensive, even by western standards, and the quality of cocktails or even beer varies greatly.  Make sure you have checked the price before ordering, otherwise you may accidentally order a bottle of spring water whose price can be as much as ¥1,000.</span></li></ul><span data-dcnode-id="5609" instrument_node="">
</span><ul data-dcnode-id="5601"><li data-dcnode-id="5602"><b data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">Nanluoguxiang</span></b><span data-dcnode-id="5606" instrument_node=""> in </span><a data-dcnode-id="5604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng%23Drink" title="Beijing/Dongcheng"><span data-dcnode-id="5605" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="5603" instrument_node=""> is a winding and weaving area in one of the city's most visited hutongs.</span></li></ul><span data-dcnode-id="5600" instrument_node="">
</span><ul data-dcnode-id="5591"><li data-dcnode-id="5592"><b data-dcnode-id="5597"><a data-dcnode-id="5598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Sanlitun%23Drink" title="Beijing/Sanlitun"><span data-dcnode-id="5599" instrument_node="">Sanlitun</span></a></b><span data-dcnode-id="5596" instrument_node=""> in </span><a data-dcnode-id="5594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Drink" title="Beijing/Chaoyang"><span data-dcnode-id="5595" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="5593" instrument_node=""> was once the centre of nightlife in Beijing and still popular with expats.</span></li></ul><span data-dcnode-id="5590" instrument_node="">
</span><ul data-dcnode-id="5579"><li data-dcnode-id="5580"><b data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">Workers' Stadium</span></b><span data-dcnode-id="5587" instrument_node=""> in </span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Drink" title="Beijing/Chaoyang"><span data-dcnode-id="5586" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="5584" instrument_node=""> has taken over part of the action in nearby </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Sanlitun" title="Beijing/Sanlitun"><span data-dcnode-id="5583" instrument_node="">Sanlitun</span></a><span data-dcnode-id="5581" instrument_node="">.</span></li></ul><span data-dcnode-id="5578" instrument_node="">
</span><ul data-dcnode-id="5570"><li data-dcnode-id="5571"><b data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">West Gate of Chaoyang Park</span></b><span data-dcnode-id="5575" instrument_node=""> in </span><a data-dcnode-id="5573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Drink" title="Beijing/Chaoyang"><span data-dcnode-id="5574" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="5572" instrument_node=""> is one of the newest bar areas in Beijing.</span></li></ul><span data-dcnode-id="5569" instrument_node="">
</span><ul data-dcnode-id="5561"><li data-dcnode-id="5562"><b data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">Ladies' Street</span></b><span data-dcnode-id="5566" instrument_node=""> in </span><a data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Drink" title="Beijing/Chaoyang"><span data-dcnode-id="5565" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="5563" instrument_node="">. By day it has some fashion shops, as its name suggests, but it is also home to some interesting new bars, restaurants and clubs.</span></li></ul><span data-dcnode-id="5560" instrument_node="">
</span><ul data-dcnode-id="5552"><li data-dcnode-id="5553"><b data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">Yuan Dynasty Wall Bar Street</span></b><span data-dcnode-id="5557" instrument_node=""> in </span><a data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Drink" title="Beijing/Chaoyang"><span data-dcnode-id="5556" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="5554" instrument_node=""> is a new ready-made bar area located nicely along a small river and a park but with quite uninteresting bars.</span></li></ul><span data-dcnode-id="5551" instrument_node="">
</span><ul data-dcnode-id="5543"><li data-dcnode-id="5544"><b data-dcnode-id="5549"><span data-dcnode-id="5550" instrument_node="">Wudaokou</span></b><span data-dcnode-id="5548" instrument_node=""> in </span><a data-dcnode-id="5546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Haidian%23Drink" title="Beijing/Haidian"><span data-dcnode-id="5547" instrument_node="">Haidian District</span></a><span data-dcnode-id="5545" instrument_node="">, where most of the foreign and local university students hang out.  There are a number of bars and restaurants which serve a great variety of wine, beer and liquor for cheap.  This area is also well known for its huge Korean population and a good place to find Korean food.</span></li></ul><span data-dcnode-id="5542" instrument_node="">
</span><ul data-dcnode-id="5533"><li data-dcnode-id="5534"><b data-dcnode-id="5539"><a data-dcnode-id="5540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/798_Art_Zone%23Drink" title="Beijing/798 Art Zone"><span data-dcnode-id="5541" instrument_node="">Dashanzi</span></a></b><span data-dcnode-id="5538" instrument_node=""> in </span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Drink" title="Beijing/Chaoyang"><span data-dcnode-id="5537" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="5535" instrument_node="">, Beijing's trendy art zone, this old warehouse and factory district has been taken over by art galleries, art shops and bars. Well worth the t</span></li></ul><span data-dcnode-id="5532" instrument_node="">
</span><h3 data-dcnode-id="5522"><span class="mw-headline" data-dcnode-id="5530" id="Tea"><span data-dcnode-id="5531" instrument_node="">Tea</span></span><span class="mw-editsection" data-dcnode-id="5523"><span class="mw-editsection-bracket" data-dcnode-id="5528"><span data-dcnode-id="5529" instrument_node="">[</span></span><a data-dcnode-id="5526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D47" title="Edit section: Tea"><span data-dcnode-id="5527" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5524"><span data-dcnode-id="5525" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5521" instrument_node="">
</span><p data-dcnode-id="5511"><b data-dcnode-id="5519"><span data-dcnode-id="5520" instrument_node="">Tea</span></b><span data-dcnode-id="5518" instrument_node="">, tea, and more tea!  Some shops are in malls and others are stand-alone establishments. Whatever their location, always ask the price before ordering or else brace yourself for the most expensive egg-sized cup of tea in the world. You can experience different styles of tea ceremonies and tea tastings at </span><b data-dcnode-id="5516"><span data-dcnode-id="5517" instrument_node="">tea houses</span></b><span data-dcnode-id="5515" instrument_node=""> especially in the Qianmen area south of Tian'anmen Square.  These can range widely in quality and price. Some tea houses are really tourist traps whose main goal is to milk you of your money (See warning box). You can get a </span><i data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">free</span></i><span data-dcnode-id="5512" instrument_node=""> tea demonstration at most Tenrenfu tea houses which are located throughout the city and at some malls. A private room or a quiet back table in a tea house with mid-range tea for two should cost ¥100-200. After an afternoon in such shops the remaining tea is yours to take home. Once tea is ordered, the table is yours for as long as you like.
</span></p><span data-dcnode-id="5510" instrument_node="">
</span><h3 data-dcnode-id="5500"><span class="mw-headline" data-dcnode-id="5508" id="Coffee"><span data-dcnode-id="5509" instrument_node="">Coffee</span></span><span class="mw-editsection" data-dcnode-id="5501"><span class="mw-editsection-bracket" data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">[</span></span><a data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D48" title="Edit section: Coffee"><span data-dcnode-id="5505" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5502"><span data-dcnode-id="5503" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5499" instrument_node="">
</span><p data-dcnode-id="5491"><span data-dcnode-id="5498" instrument_node="">As a tea-loving country and grower of much of the world's tea, </span><b data-dcnode-id="5496"><span data-dcnode-id="5497" instrument_node="">coffee</span></b><span data-dcnode-id="5495" instrument_node=""> is not as easy to find but a taste for it--along with more expats dotted throughout Beijing--has seen more emerging middle class and students drinking it. For example, the city alone has more than 100 Starbucks locations. Most are situated around shopping malls and in commercial districts of the city. Other international chains such as Costa Coffee and Lavazza also have locations around Beijing. Coffee of varying qualities is also available in the ubiquitous Taiwanese style coffee shops such as </span><b data-dcnode-id="5493"><span data-dcnode-id="5494" instrument_node="">Shangdao Coffee</span></b><span data-dcnode-id="5492" instrument_node="">. These are usually located on the second floor of buildings and often times offer Blue Mountain Coffee, making places like Starbucks seem a real bargain. Most coffee shops offer wireless. Baristas in non-chain coffee shops may not be educated on how to make generally accepted espresso drinks, like lattes and cappuccinos. Espressos, alone, usually taste better and are more consistent.
</span></p><span data-dcnode-id="5490" instrument_node="">
</span><h3 data-dcnode-id="5480"><span class="mw-headline" data-dcnode-id="5488" id="Baijiu"><span data-dcnode-id="5489" instrument_node="">Baijiu</span></span><span class="mw-editsection" data-dcnode-id="5481"><span class="mw-editsection-bracket" data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">[</span></span><a data-dcnode-id="5484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D49" title="Edit section: Baijiu"><span data-dcnode-id="5485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5479" instrument_node="">
</span><p data-dcnode-id="5465"><span data-dcnode-id="5478" instrument_node="">The most common </span><b data-dcnode-id="5476"><span data-dcnode-id="5477" instrument_node="">hard liquor</span></b><span data-dcnode-id="5475" instrument_node=""> is baijiu (白酒 </span><i data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">báijiǔ</span></i><span data-dcnode-id="5472" instrument_node="">), made from distilled grain (usually sorghum) spirits. It comes in a variety of brands and generally for very cheap prices (¥8 for a small bottle) and should be avoided if you want to have a clear mind for your travels on the next day. The most famous local brand is called Erguotou (二锅头 </span><i data-dcnode-id="5470"><span data-dcnode-id="5471" instrument_node="">Èrguōtóu</span></i><span data-dcnode-id="5469" instrument_node="">), which has 54% alcohol content. It should be noted that the local Erguotou is sold in gallon containers, often on the same shelf as water and with a similar price-range and indistinguishable colour. Care must be made not to confuse the two. Maotai (茅台 </span><i data-dcnode-id="5467"><span data-dcnode-id="5468" instrument_node="">Máotái</span></i><span data-dcnode-id="5466" instrument_node="">), the national liquor, is one of the more expensive brands, and it used to cost about as much as an imported bottle of whiskey--but now it costs a lot more, from ¥1,000 to well in excess of ¥10,o00. Wuliangye (五粮液) is another high-end brands, costs around ¥1,000. Due to its mild taste, Wuliangye might be a better option for first time baijiu drinker. A large selection of imported liquor can be found at most bars and big supermarkets. One should better buy expensive liquor (both domestic and imported) from big supermarkets in order to avoid fake ones. Capital Spirits Bar is a good place to sample and learn about baijiu through their tasting flights.
</span></p><span data-dcnode-id="5464" instrument_node="">
</span><h3 data-dcnode-id="5454"><span class="mw-headline" data-dcnode-id="5462" id="Beer"><span data-dcnode-id="5463" instrument_node="">Beer</span></span><span class="mw-editsection" data-dcnode-id="5455"><span class="mw-editsection-bracket" data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">[</span></span><a data-dcnode-id="5458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D50" title="Edit section: Beer"><span data-dcnode-id="5459" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5456"><span data-dcnode-id="5457" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5453" instrument_node="">
</span><p data-dcnode-id="5434"><b data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">Beer</span></b><span data-dcnode-id="5450" instrument_node=""> can be quite good and nearly all are low-alcohol lagers. Beijing's own, Yanjing (燕京 </span><i data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">Yànjīng</span></i><span data-dcnode-id="5447" instrument_node="">), has perhaps the most dominating presence in the city (Yanjing being the city's name from its time 2,000 years ago as capital of the state of Yan).  Beer mostly comes in large bottles and has 3.1%-3.6 alcohol content. Tsingtao (青岛 </span><i data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">Qīngdǎo</span></i><span data-dcnode-id="5444" instrument_node="">), the beer most easily found throughout all of China, is similar in taste and has several bottles which, like Yanjing, come in green. Price per bottle can be ¥10-20 in a restaurant, or ¥2-4, depending on size, from a street vendor. Both Yanjing and Tsingtao come in standard (普通 </span><i data-dcnode-id="5442"><span data-dcnode-id="5443" instrument_node="">pǔtōng</span></i><span data-dcnode-id="5441" instrument_node="">) and pure (纯生 </span><i data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">chúnshēng</span></i><span data-dcnode-id="5438" instrument_node="">) varieties; the difference mainly seems to be price.  Beijing Beer (北京啤酒 </span><i data-dcnode-id="5436"><span data-dcnode-id="5437" instrument_node="">Běijīng Píjiǔ</span></i><span data-dcnode-id="5435" instrument_node="">）is the probably the third most popular brand in the city and typically found for even cheaper than other local brands. Craft beers and microbreweries and specialty beers can found in various German-themed restaurants throughout the city, which have been in the city since the 1980s, as well as a second wave of foreign-style microbreweries in the mid- to late-2000s.
</span></p><span data-dcnode-id="5433" instrument_node="">
</span><h3 data-dcnode-id="5423"><span class="mw-headline" data-dcnode-id="5431" id="Wine"><span data-dcnode-id="5432" instrument_node="">Wine</span></span><span class="mw-editsection" data-dcnode-id="5424"><span class="mw-editsection-bracket" data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">[</span></span><a data-dcnode-id="5427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D51" title="Edit section: Wine"><span data-dcnode-id="5428" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5422" instrument_node="">
</span><p data-dcnode-id="5417"><span data-dcnode-id="5421" instrument_node="">Great Wall is the most popular local brand of grape </span><b data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">wine</span></b><span data-dcnode-id="5418" instrument_node="">.  Wine made in China does not have a great reputation, though this is changing. Giving wine as a gift is not a common custom in most places in China and most people will not be accustomed to wine etiquette or appreciation (white wine is often mixed with Sprite in clubs).  Imported red wines are usually of a better quality and can be found in big supermarkets, import good stores, and some restaurants.
</span></p><span data-dcnode-id="5416" instrument_node="">
</span><h2 data-dcnode-id="5399"><span class="mw-headline" data-dcnode-id="5414" id="Sleep"><span data-dcnode-id="5415" instrument_node="">Sleep</span></span><span class="mw-editsection" data-dcnode-id="5407"><span class="mw-editsection-bracket" data-dcnode-id="5412"><span data-dcnode-id="5413" instrument_node="">[</span></span><a data-dcnode-id="5410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D52" title="Edit section: Sleep"><span data-dcnode-id="5411" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">]</span></span></span><span class="mw-editsection" data-dcnode-id="5400"><span class="mw-editsection-bracket" data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">[</span></span><a data-dcnode-id="5403" href="#Sleep" onclick="addListing(this, '52', 'sleep', 'Beijing');" title="click to add a sleep listing"><span data-dcnode-id="5404" instrument_node="">add listing</span></a><span class="mw-editsection-bracket" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5398" instrument_node="">
</span><p data-dcnode-id="5385"><i data-dcnode-id="5393"><span data-dcnode-id="5397" instrument_node="">See the </span><a data-dcnode-id="5395" href="#Districts" title="Beijing"><span data-dcnode-id="5396" instrument_node="">Districts</span></a><span data-dcnode-id="5394" instrument_node=""> articles for individual listings.</span></i><span data-dcnode-id="5392" instrument_node="">
Be careful to book ahead if you are foreigner. Many hotel and hostel won t host you as they don t have a foreigner license. It can be very difficult to find a room during peak season even if some hotel are empty they wont let you in.
Accommodation aplenty exists in the </span><a data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/CBD" title="Beijing/CBD"><span data-dcnode-id="5391" instrument_node="">CBD</span></a><span data-dcnode-id="5389" instrument_node="">, various embassy areas, universities and business parks. A few hotels are also located very close to the </span><a data-dcnode-id="5387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Beijing_Capital_International_Airport" title="Beijing/Beijing Capital International Airport"><span data-dcnode-id="5388" instrument_node="">airport</span></a><span data-dcnode-id="5386" instrument_node=""> (essentially in one of the airport parking lots).
</span></p><p data-dcnode-id="5374"><span data-dcnode-id="5384" instrument_node="">Tour groups can, perhaps unsurprisingly, reserve rooms at high-quality hotels at rates far below those published. Hostels and western-style travel hotels are almost universally open to foreign guests. The lowest end Chinese accommodations - Zhaodaisuo (招待所) - are generally inaccessible to the foreign community. However, for those determined to get a bargain, you </span><b data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">may</span></b><span data-dcnode-id="5381" instrument_node=""> be able to get a room if you speak Mandarin. Many of the hostels are located in </span><a data-dcnode-id="5379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng%23Sleep" title="Beijing/Dongcheng"><span data-dcnode-id="5380" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="5378" instrument_node=""> and </span><a data-dcnode-id="5376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Xuanwu%23Sleep" title="Beijing/Xuanwu"><span data-dcnode-id="5377" instrument_node="">Xuanwu District</span></a><span data-dcnode-id="5375" instrument_node="">. Discounted rates start around ¥30 for dorms and just below ¥200 for doubles in the cheapest hostels. 
</span></p><p data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">There are a large number of three and four star mid-range hotels throughout the city and in all districts.  The listed rates for these kind of hotels are often in the range of ¥500-1,000 but you can often get a discount of around 50%.
</span></p><p data-dcnode-id="5361"><span data-dcnode-id="5371" instrument_node="">Some 'expensive' hotels are in the city centre, especially in </span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Dongcheng%23Sleep" title="Beijing/Dongcheng"><span data-dcnode-id="5370" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="5368" instrument_node=""> and on the eastern 3rd Ring Road in </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/Chaoyang%23Sleep" title="Beijing/Chaoyang"><span data-dcnode-id="5367" instrument_node="">Chaoyang District</span></a><span data-dcnode-id="5365" instrument_node="">, however by some Western standards these hotels may be viewed as a bargain.  In the outlying areas, especially out by the </span><a data-dcnode-id="5363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Great_Wall_of_China" title="Great Wall of China"><span data-dcnode-id="5364" instrument_node="">Great Wall</span></a><span data-dcnode-id="5362" instrument_node="">, are some country club type resorts as well as some unique, one-of-a-kind, hotels.  For the most expensive hotels, the listed rates start at around ¥4,000, but are often discounted to a level around ¥1,500.
</span></p><span data-dcnode-id="5360" instrument_node="">
</span><ul data-dcnode-id="5293"><li data-dcnode-id="5332"><span class="vcard" data-dcnode-id="5333" id="Tylfull_Hotel"><span class="fn org" data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">Tylfull Hotel</span></span><span data-dcnode-id="5357" instrument_node=""> (</span><span class="nickname" data-dcnode-id="5354"><span class="non-latin" data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">北京泰富酒店</span></span></span><span data-dcnode-id="5353" instrument_node="">), </span><span class="adr" data-dcnode-id="5350"><span class="street-address" data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">Building 1, Courtyard 1, West Tucheng Road. Beijing, Beijing Area 100191 China</span></span></span><span data-dcnode-id="5349" instrument_node="">, </span><span class="tel" data-dcnode-id="5343"><abbr class="type" data-dcnode-id="5347" title="voice"><span data-dcnode-id="5348" instrument_node="">☎</span></abbr><span data-dcnode-id="5346" instrument_node=""> </span><span class="phone value" data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">+8610 53299999</span></span></span><span data-dcnode-id="5342" instrument_node="">, </span><a class="url external autonumber" data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tylfullhotel.com/" rel="nofollow"><span data-dcnode-id="5341" instrument_node="">[41]</span></a><span data-dcnode-id="5339" instrument_node="">. </span><span class="price" data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">800~2000CNY</span></span><span data-dcnode-id="5336" instrument_node="">. &nbsp;</span><a class="listing-edit" data-dcnode-id="5334" href="#Tylfull_Hotel" onclick="editListing('Tylfull_Hotel', 'sleep', 'Beijing');return false;" rel="nofollow" title="click to edit Tylfull Hotel"><span data-dcnode-id="5335" instrument_node="">edit</span></a></span></li><span data-dcnode-id="5331" instrument_node="">
