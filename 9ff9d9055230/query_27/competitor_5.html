</span><h2 data-dcnode-id="5282"><span class="mw-headline" data-dcnode-id="5290" id="Stay_safe"><span data-dcnode-id="5291" instrument_node="">Stay safe</span></span><span class="mw-editsection" data-dcnode-id="5283"><span class="mw-editsection-bracket" data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">[</span></span><a data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D53" title="Edit section: Stay safe"><span data-dcnode-id="5287" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5281" instrument_node="">
</span><h3 data-dcnode-id="5271"><span class="mw-headline" data-dcnode-id="5279" id="Crime"><span data-dcnode-id="5280" instrument_node="">Crime</span></span><span class="mw-editsection" data-dcnode-id="5272"><span class="mw-editsection-bracket" data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">[</span></span><a data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D54" title="Edit section: Crime"><span data-dcnode-id="5276" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5270" instrument_node="">
</span><p data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">Overall, Beijing is a very safe city. Violent crime is extremely rare, and it's not a problem to walk at night in urban areas. Beijing also enjoys the reputation of low crime rates in Asia and even the world.
</span></p><p data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">Some petty crimes such as pickpocketing do happen, and one should be cautious in shopping areas, tourist sites and public transportation. Thieves are more active in the days before and during public holidays like the Lunar New Year and weeklong holidays like the Oct 1-7 National Day. Be very careful in those days.
</span></p><p data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">Despite safe urban areas, some parts of Beijing's suburbs are not safe, because they concentrate almost all severe crimes of the city. They are called "Beijing's corner". Such as the middle western area of Fengtai, the western area of Shijingshan, the eastern frontier of Chaoyang, and the most parts of Daxing (except communities surrounding the metro route). As a tourist, it's unlikely you'll visit these areas anyway and you'd be unlikely to accidentally end up in them. If you did need to go for some reason though, taxi drivers may refuse to take you there.
</span></p><span data-dcnode-id="5263" instrument_node="">
</span><h3 data-dcnode-id="5253"><span class="mw-headline" data-dcnode-id="5261" id="Scams"><span data-dcnode-id="5262" instrument_node="">Scams</span></span><span class="mw-editsection" data-dcnode-id="5254"><span class="mw-editsection-bracket" data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">[</span></span><a data-dcnode-id="5257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D55" title="Edit section: Scams"><span data-dcnode-id="5258" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5252" instrument_node="">
</span><p data-dcnode-id="5247"><span data-dcnode-id="5251" instrument_node="">Tourists are often preyed upon by cheats and touts, who attempt to pull a number of </span><a data-dcnode-id="5249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Common_scams" title="Common scams"><span data-dcnode-id="5250" instrument_node="">scams</span></a><span data-dcnode-id="5248" instrument_node=""> on tourists.  Be especially cautious in the inner city, around Tiananmen Square, and on the tourist-crowded routes to the Great Wall. 
</span></p><p data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">Beware of the Rickshaw scam around Forbidden City. They will ask you to sit in their Rickshaws when you get down from your taxi (because taxis are not allowed near the main entrance) and then they will take you around in narrow lanes. They will then stop in a lonely area to extort money from you. These Rickshaw are best avoided.
</span></p><p data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">On the other hand, fears of scams have led many travelers to be overly dismissive of Chinese people who approach them. Many Chinese are tourists in their capital for the first time as well and they are genuinely curious about foreigners and may just want to practice their English and get a picture with you. Being asked to have your picture taken is very common and there are no known scams associated with this. Be friendly but don't feel pressured to go somewhere you hadn't planned on going in the first place. If you are outside the tourist areas then your chances of being scammed drop dramatically. 
</span></p><p data-dcnode-id="5238"><span data-dcnode-id="5242" instrument_node="">Chinese people are very friendly to travelers and foreigners in general; seeing through a scam requires the same common sense as travelling anywhere in the world. Beijing scams are not particularly innovative or brutal in world-wide comparison, and as long as you </span><i data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">keep your wallet out of sight</span></i><span data-dcnode-id="5239" instrument_node="">, you can always walk away without fear of violence or theft. That said, there are some common scams to be aware of.  
</span></p><span data-dcnode-id="5237" instrument_node="">
</span><ul data-dcnode-id="5231"><li data-dcnode-id="5232"><span data-dcnode-id="5236" instrument_node=""> For tours to the </span><b data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">Great Wall</span></b><span data-dcnode-id="5233" instrument_node="">, be wary: the driver might just stop and set you off before your destination. Only pay afterwards if you are absolutely sure you are at the destination. Do not go for organized tours to the Great Wall in the ¥100-150 range that are advertised by people handing out flyers around the Forbidden City (or in the latest scam, masquerading as the real bus service to the Great Wall which only costs ¥20, but is guaranteed to waste your entire day). Conveniently you are picked up from your hotel (so they know where to get back at you, in case you will not pay), you end up on a shopping tour and afterwards you have to pay upfront to get back to the city. Of course, there are exceptions, and people showing letters of recommendation from their previous travels and pictures are usually okay, as are people offering trips to the wilder parts of the Great Wall (ie. not Badaling or Juyong). Shopping tours are also advertised from certain hotels, ask in advance for a tour without shopping to be sure.</span></li></ul><span data-dcnode-id="5230" instrument_node="">
</span><ul data-dcnode-id="5227"><li data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">At the Bird's Nest, there will be people trying to sell you small items, such as Beijing 2008 Memorabilia, or toys that seems fun to play with. They will tell you that they are offering it to you for much less, then after you pay for your item, shortly after they will claim you never paid for it and will follow you around until you either give back them or pay again. Usually they offer items to you at very good deals, but don't fall for the trick, you'll end up paying double, if not more.</span></li></ul><span data-dcnode-id="5226" instrument_node="">
</span><ul data-dcnode-id="5211"><li data-dcnode-id="5212"><span data-dcnode-id="5225" instrument_node=""> * </span><b data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">Coffee Shop Scam / Tea House Scam / Art Selling Scam / Overly friendly Chinese People:</span></b><span data-dcnode-id="5222" instrument_node=""> When walking near famous landmarks, you'll be approached by Chinese people with a good command of the English language, trying to start a conversation with you. </span><b data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">There is nothing wrong with speaking with them where you're standing at that moment, but the moment they invite you anywhere refuse at all means.</span></b><span data-dcnode-id="5219" instrument_node=""> Do not be tricked by students, young adults or adults offering to go out for a beer or coffee to practice their English. Some scam artists will run up a elaborate bill by ordering food or alcohol and then expect you to pay for it or even half whether or not if you do or do not eat the food they order. </span><b data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">These bills could cost you thousands of RMB</span></b><span data-dcnode-id="5216" instrument_node="">. In Chinese culture if someone invites you out for tea or dinner they pay the bill. If you are feeling this situation is about to happen shift credit cards out of your wallet by going to the bathroom or while sitting at the table. The scam artists can be working with the restaurant and the restaurant will ask you to pay with a credit card. Another sign if it is a scam is if they ask to follow you to a bank or back to your hotel to get additional money to pay them back. These people can come on very nice and come off as very nice people. If they want to follow you back to your hotel or hostel have them wait in the lobby and do not return. These people will likely avoid confrontation and eventually leave. These cases tend to happen mainly when you are alone. But, if you do not have any plans and want to exploit the exchange rate, it is not the worst idea. In any case, be nice and refuse politely / firmly, that will do the job for you. I would advise </span><b data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">NOT</span></b><span data-dcnode-id="5213" instrument_node=""> to go to the police, as it's the scammers word vs. your word, where your Mandarin is limited / non existent, and the scammers can say anything they want about you. Try to obtain any evidence regarding the scam, and if possible dispute the charge with your credit card company after the incident.</span></li></ul><span data-dcnode-id="5210" instrument_node="">
</span><ul data-dcnode-id="5207"><li data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">In Jingshan Park you might meet a seemingly friendly older man who says he's a former English teacher from rural China. He will persuade you to go to a tea room at the entrance on the left hand side of the park. There you'll be met with small cans of beer which are a staggering ¥50 each. Avoid the guy,avoid the tea room. </span></li></ul><span data-dcnode-id="5206" instrument_node="">
</span><ul data-dcnode-id="5203"><li data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node=""> Fake alcohol can sometimes be a problem even at expensive restaurants or clubs. If one buys alcohol from a cart or sidewalk vendor, likelihood increases. Not uncommon for cigarettes purchased from sidewalk vendors to be counterfeit -- if what you're buying is 20% of the cost seen in a legitimate store with a proper business license, it should not surprise.</span></li></ul><span data-dcnode-id="5202" instrument_node="">
</span><ul data-dcnode-id="5193"><li data-dcnode-id="5194"><span data-dcnode-id="5201" instrument_node=""> Watch out for </span><b data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">rickshaw scams</span></b><span data-dcnode-id="5198" instrument_node=""> around the tourist destinations. Take care when offered a ride in a rickshaw (pedicab). Make sure you and your driver know where you are going to be taken in advance and agree on a price </span><b data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">in writing</span></b><span data-dcnode-id="5195" instrument_node="">. The popular rickshaw scam is that you negotiate the very low price for a ride (could be as low as ¥5), and after a ride the rickshaw asks for ¥500 and gets out the laminated card listing the routes and prices. Rickshaw drivers generally charge ¥5 or ¥10 more than a taxi for short distances. It could be more for longer ones.</span></li></ul><span data-dcnode-id="5192" instrument_node="">
</span><ul data-dcnode-id="5189"><li data-dcnode-id="5190"><span data-dcnode-id="5191" instrument_node=""> Be wary of fake money. You may observe Chinese people inspecting their money carefully, and with a reason: there are a lot of counterfeit bills in circulation. This is less of issue in Beijing but still keep that in mind. The most common are 100's and 50's. A few tips for identifying counterfeit bills: </span></li></ul><span data-dcnode-id="5188" instrument_node="">
</span><ul data-dcnode-id="5182"><li data-dcnode-id="5183"><span data-dcnode-id="5187" instrument_node=""> Be very careful if someone wants to </span><b data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">give back</span></b><span data-dcnode-id="5184" instrument_node=""> the largest currency bill (¥50 and ¥100) by the excuse of "no change". In an attempt to pass you a counterfeit bill they may tell you that they have lowered the price in your benefit. Or, they may ask you to contribute an additional sum in order to pass you the ¥100. If they give you back all the change money plus the coins on top (though coins are rare in Beijing) take your time to check each bill carefully.</span></li></ul><span data-dcnode-id="5181" instrument_node="">
</span><ul data-dcnode-id="5175"><li data-dcnode-id="5176"><span data-dcnode-id="5180" instrument_node=""> Another version of the above trick is when a vendor refuses to accept your ¥100 bill claiming that it's </span><b data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">fake</span></b><span data-dcnode-id="5177" instrument_node="">. The truth is most likely that he took your genuine bill and discreetly changed it for a fake one which he now is trying to give back to you. Hard to prove unless you saw the swap. This is especially common in taxis. If your ¥100 bill is from an ATM, do not give the taxi driver a new bill if he says the first one is a fake. He has likely switched your original ¥100 bill with a counterfeit, and will continue to do so with every new ¥100 bill you attempt to pay him with. </span></li></ul><span data-dcnode-id="5174" instrument_node="">
</span><ul data-dcnode-id="5171"><li data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node=""> Attempt to pay taxi fare with the smallest denomination bills as possible. If paying with a ¥100 for a ¥20 ride, for example, may result in a counterfeit ¥50 as part of your change. </span></li></ul><span data-dcnode-id="5170" instrument_node="">
</span><ul data-dcnode-id="5158"><li data-dcnode-id="5159"><span data-dcnode-id="5169" instrument_node=""> To check any ¥50 and ¥100 bill you get, do this: most importantly, check the </span><b data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">paper</span></b><span data-dcnode-id="5166" instrument_node="">. If its torn, thin or very slippery, ask for a different bill. Next, check the </span><b data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">watermark</span></b><span data-dcnode-id="5163" instrument_node="">, it should blur out softly. If there are hard visible corners in the watermark, reject the bill. Last, check the green "100" </span><b data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">imprint</span></b><span data-dcnode-id="5160" instrument_node=""> on the lower left corner. It should be clearly painted on the bill so you can both feel and see a relief. If its missing or not feelable, reject the bill also. Rejecting bills is not considered impolite. It is perfectly acceptable to hand back a bill and ask for a different one.  If the vendor gets upset, you should consider cancelling the purchase and moving on.  If the colouring of a banknote is faded, it does not necessarily mean it is fake.</span></li></ul><span data-dcnode-id="5157" instrument_node="">
</span><ul data-dcnode-id="5154"><li data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">Some price quotes for massages will not include oil but if not refused beforehand, may be added to your bill without your consent.</span></li></ul><span data-dcnode-id="5153" instrument_node="">
</span><ul data-dcnode-id="5150"><li data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node=""> Be careful when buying from peddlers stands. They sell some kind of an Altai dessert (made with sugar, walnuts, peanuts, almonds etc.) but they slice very big pieces and they'll force you to pay for it (1 kg costs more than ¥120). When you ask for them to slice it, take into consideration this dessert is much more dense than it looks (hence weighs a lot more than you think).</span></li></ul><span data-dcnode-id="5149" instrument_node="">
</span><ul data-dcnode-id="5146"><li data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node=""> While not technically a scam beware restaurants where the plates/cutlery/tableware is wrapped in plastic. You would normally just open this and use these plates to eat your meal however if you do they will add a "tableware" charge (often 15 yuan per set) to your bill. If you object they will show you some small print on the menu showing the charge but it is never explained up front to you when you order.</span></li></ul><span data-dcnode-id="5145" instrument_node="">
</span><p data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">Traffic can be crazy in Beijing, and reckless driving is fairly normal. Loud, persistent honking is commonplace. It is simply another way to indicate that the driver is there. Be prepared for drivers to violate traffic laws even to the extent of going in reverse on highways to back up to a missed exit or driving on a sidewalk. Also expect occasional road debris (a piece of wood or torn out tire) to be laying in the roadway. At night, be careful of missing manhole covers or road work taking place without warning or without proper illumination at night. Pedestrians should be very careful crossing the street people will generally stop for you, but they will honk. Keep an eye on the locals and cross with them — there is strength in numbers. Also note some construction trucks will abuse the speed limit and also are known to at times ignore traffic signals. Proceed when clear, not necessarily when the traffic light is green.
</span></p><span data-dcnode-id="5142" instrument_node="">
</span><h3 data-dcnode-id="5132"><span class="mw-headline" data-dcnode-id="5140" id="Emergency_telephone_numbers"><span data-dcnode-id="5141" instrument_node="">Emergency telephone numbers</span></span><span class="mw-editsection" data-dcnode-id="5133"><span class="mw-editsection-bracket" data-dcnode-id="5138"><span data-dcnode-id="5139" instrument_node="">[</span></span><a data-dcnode-id="5136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D56" title="Edit section: Emergency telephone numbers"><span data-dcnode-id="5137" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5131" instrument_node="">
</span><ul data-dcnode-id="5113"><li data-dcnode-id="5126"><span data-dcnode-id="5130" instrument_node=""> Police: </span><b data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">110</span></b><span data-dcnode-id="5127" instrument_node="">.</span></li><span data-dcnode-id="5125" instrument_node="">
</span><li data-dcnode-id="5120"><span data-dcnode-id="5124" instrument_node=""> Medical care: </span><b data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">120</span></b><span data-dcnode-id="5121" instrument_node="">.</span></li><span data-dcnode-id="5119" instrument_node="">
</span><li data-dcnode-id="5114"><span data-dcnode-id="5118" instrument_node=""> Fire alarm: </span><b data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">119</span></b><span data-dcnode-id="5115" instrument_node="">.</span></li></ul><span data-dcnode-id="5112" instrument_node="">
</span><p data-dcnode-id="5110"><span data-dcnode-id="5111" instrument_node="">Remember these three telephone numbers, and they are valid in almost entire mainland China. If you speak in English, you'll be transferred to a translator.
</span></p><span data-dcnode-id="5109" instrument_node="">
</span><h2 data-dcnode-id="5099"><span class="mw-headline" data-dcnode-id="5107" id="Cope"><span data-dcnode-id="5108" instrument_node="">Cope</span></span><span class="mw-editsection" data-dcnode-id="5100"><span class="mw-editsection-bracket" data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">[</span></span><a data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D57" title="Edit section: Cope"><span data-dcnode-id="5104" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5098" instrument_node="">
</span><p data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Good bilingual maps are hard to find in Beijing. Free maps are offered by good hotels, but with a scale of about 1cm=1km they give a general outline and not enough detail to explore by foot. 
</span></p><span data-dcnode-id="5095" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5086"><div class="thumbinner" data-dcnode-id="5087" style="width:242px;"><a class="image" data-dcnode-id="5093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing_haze.jpg"><img alt="" class="thumbimage" data-dcnode-id="5094" data-file-height="426" data-file-width="640" height="160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/upload/en/thumb/d/dc/Beijing_haze.jpg/240px-Beijing_haze.jpg&amp;raw" srcset="/upload/en/thumb/d/dc/Beijing_haze.jpg/360px-Beijing_haze.jpg 1.5x, /upload/en/thumb/d/dc/Beijing_haze.jpg/480px-Beijing_haze.jpg 2x" width="240"></a><span data-dcnode-id="5092" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5088"><div class="magnify" data-dcnode-id="5090"><a class="internal" data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/File%3ABeijing_haze.jpg" title="Enlarge"></a></div><span data-dcnode-id="5089" instrument_node="">Poor air day in Beijing</span></div></div></div><span data-dcnode-id="5085" instrument_node="">
</span><p data-dcnode-id="5078"><b data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">Air pollution</span></b><span data-dcnode-id="5082" instrument_node=""> has traditionally been a big problem in Beijing as the Beijing-Tianjin-Hebei area has a lot of industrial production. Coal burning (used to generate majority of energy and heat), automobile exhaust, and dust storms from the Gobi desert combine to make some of the worst city air problems. In winter the cold air creates an inversion layer and traps the pollution in the city. A white surgical face mask may help with the occasional dust storms. A much higher-grade filter is needed to prevent 2.5 micrometer particulates (known as PM 2.5) from entering the body. Tourist are strongly recommend to check hourly and daily reports of air quality index (</span><a class="external free" data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aqicn.org/city/beijing/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="5081" instrument_node="">http://aqicn.org/city/beijing/</span></a><span data-dcnode-id="5079" instrument_node="">) to know when a mask is necessary.
</span></p><p data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node="">The government has implemented various measures to attempt to combat with the man-made and natural air quality issues. 
</span></p><p data-dcnode-id="5074"><span data-dcnode-id="5075" instrument_node="">Beijing's water supplies are monitored, but it is better to drink filtered or bottled water.
</span></p><p data-dcnode-id="5066"><span data-dcnode-id="5073" instrument_node="">For </span><b data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">general health and food advice</span></b><span data-dcnode-id="5070" instrument_node=""> see the main </span><a data-dcnode-id="5068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/China%23Stay_healthy" title="China"><span data-dcnode-id="5069" instrument_node="">China</span></a><span data-dcnode-id="5067" instrument_node=""> article.
</span></p><span data-dcnode-id="5065" instrument_node="">
</span><h3 data-dcnode-id="5055"><span class="mw-headline" data-dcnode-id="5063" id="Post_office"><span data-dcnode-id="5064" instrument_node="">Post office</span></span><span class="mw-editsection" data-dcnode-id="5056"><span class="mw-editsection-bracket" data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">[</span></span><a data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D58" title="Edit section: Post office"><span data-dcnode-id="5060" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5054" instrument_node="">
</span><p data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">Many available throughout the city which can post international mail.
</span></p><span data-dcnode-id="5051" instrument_node="">
</span><h3 data-dcnode-id="5041"><span class="mw-headline" data-dcnode-id="5049" id="Internet_access"><span data-dcnode-id="5050" instrument_node="">Internet access</span></span><span class="mw-editsection" data-dcnode-id="5042"><span class="mw-editsection-bracket" data-dcnode-id="5047"><span data-dcnode-id="5048" instrument_node="">[</span></span><a data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D59" title="Edit section: Internet access"><span data-dcnode-id="5046" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5040" instrument_node="">
</span><p data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">Internet is highly restricted in China. Google, Facebook, Twitter, Instagram, YouTube and most Western news websites are completely blocked, and it is not uncommon for many foreign websites not to load. Examples of partially blocked sites include Wikipedia, Blogspot, and Tumblr. To circumvent this problem you can purchase a commercial VPN to tunnel out of the firewall. These can cost from free to ~¥120 per month. Be aware that free versions have security holes and can increase your chances of getting hacked.
</span></p><p data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">Free WiFi can be found in all sorts of chain and independent cafes and fast food restaurants, and many sit-down restaurants as well. These cafes can look like restaurants from the outside, but most any place that is called a cafe will have WiFi. WiFi is also common in hostels and hotels. Faster connections may be available for a small fee.
</span></p><p data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">Terminal 3 has a wireless network "Airport WiFi (FREE)". Passengers need to register for an account and then be granted five hours of use.
</span></p><span data-dcnode-id="5033" instrument_node="">
</span><h3 data-dcnode-id="5023"><span class="mw-headline" data-dcnode-id="5031" id="Laundry"><span data-dcnode-id="5032" instrument_node="">Laundry</span></span><span class="mw-editsection" data-dcnode-id="5024"><span class="mw-editsection-bracket" data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">[</span></span><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D60" title="Edit section: Laundry"><span data-dcnode-id="5028" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5022" instrument_node="">
</span><p data-dcnode-id="5014"><span data-dcnode-id="5021" instrument_node="">Laundry is inexpensive to be done in Beijing, as are some dry cleaning shops. Other dry cleaners near embassy areas or the </span><a data-dcnode-id="5019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Beijing/CBD" title="Beijing/CBD"><span data-dcnode-id="5020" instrument_node="">CBD</span></a><span data-dcnode-id="5018" instrument_node=""> may be of higher quality, or simply of higher cost. If near Peking University, try Jingquan laundry service next to several dormitories in the southwest corner of the campus. There is also a pickup and delivery service called </span><a class="external text" data-dcnode-id="5016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.laundrytown.com/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="5017" instrument_node="">Laundry Town</span></a><span data-dcnode-id="5015" instrument_node="">.
</span></p><span data-dcnode-id="5013" instrument_node="">

</span><h2 data-dcnode-id="728"><span class="mw-headline" data-dcnode-id="736" id="Get_out"><span data-dcnode-id="737" instrument_node="">Get out</span></span><span class="mw-editsection" data-dcnode-id="729"><span class="mw-editsection-bracket" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">[</span></span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/wiki/en/index.php%3Ftitle%3DBeijing%26action%3Dedit%26section%3D63" title="Edit section: Get out"><span data-dcnode-id="733" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">]</span></span></span></h2><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Long-distance cyclist-tourists will find national road 109 is a pleasant way to enter or leave Beijing, though lots of work.  It immediately enters steep hills on the edge of the city, but sees little traffic, is well maintained, and passes through the lovely landscape of farmland and forests.  It's remarkable how close to Beijing you are, and how far it feels.
</span></p><span data-dcnode-id="724" instrument_node="">
</span><ul data-dcnode-id="718"><li data-dcnode-id="719"><span data-dcnode-id="723" instrument_node=""> </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Tianjin" title="Tianjin"><span data-dcnode-id="722" instrument_node="">Tianjin</span></a><span data-dcnode-id="720" instrument_node=""> - Around 30 minutes away by bullet train, Tianjin is one of four municipalities within China and contrasts with the capital due to its colonial European influence. Tianjin even has a charming Little Italy area in addition to other interesting historical sites.</span></li></ul><span data-dcnode-id="717" instrument_node="">
</span><ul data-dcnode-id="708"><li data-dcnode-id="709"><span data-dcnode-id="716" instrument_node=""> </span><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Mongolia" title="Mongolia"><span data-dcnode-id="715" instrument_node="">Mongolia</span></a><span data-dcnode-id="713" instrument_node=""> - There is an international train  K23 from Beijing to Ulaanbaatar on Monday or Tuesday every week (28 May 2013 – 27 May 2014  Every Tuesday Departure). The price is USD300. Different from China domestic train tickets, K23 tickets only can buy from travel agents. Price around, as this agent is looking to advertise for free.  You can inquire about the ticket of </span><a class="external text" data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.meettravelexpert.com/book-international-trains-from-beijing-to-ulaanbaatar-or-moscow.html" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="712" instrument_node="">K3 from Beijing to Ulaanbaatar</span></a><span data-dcnode-id="710" instrument_node=""> in advance here.</span></li></ul><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">If you intend to take the Trans-Siberian-Railway to Mongolia you can take an overnight sleeper bus from e.g. Muxiyuan Long Distance Bus Station (木樨园长途客运站) to Inner Mongolia Erlian (二连) (¥180). Note that bus tickets can only be purchased on day of departure. To cross the border from Erlian (二连) to Zamyn Uud (扎门乌德):
</span></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">"2) Crossing the border by bus
</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Buses from Erlian to Zamyn-Uud leave from Erlian bus station on the corner of Chaha’er Street and Youyi Lu near to the Mongolian Consulate. At the time of writing, there is a bus at 13:30 and at least one more later in the afternoon around 15:00. Taking the 13:30 bus should give you enough time to get on the 17:35 Zamyn-Uud to Ulaanbaatar train. This is subject to tickets being available when you arrive in Zamyn-Uud. If you arrive in the afternoon, maybe unlikely.
</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">The process when taking the bus is pretty much the same as when taking the jeep, only since more people have to get off the bus, go through immigration, and get back on the bus again, it takes a little longer. That said, you should be able to get from Erlian to Zamyn-Uud in around two hours. ¥40 plus the same ¥5 exit tax.
</span></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Four hours by train or bus or two hours by car, visit the former imperial retreat of Chengde (256 km/159 mi northeast of Beijing).
</span></p><p data-dcnode-id="694"><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node="">
</span></p><span data-dcnode-id="693" instrument_node="">
</span><ul data-dcnode-id="685"><li data-dcnode-id="686"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikitravel.org/en/Russia" title="Russia"><span data-dcnode-id="692" instrument_node="">Russia</span></a><span data-dcnode-id="690" instrument_node=""> - There are two all-year-around Trans-Siberian trains from Beijing to Moscow. One is K3 which reaches Moscow via Ulaanbaatar, departing on Wednesday every week. The other one is K19 which departs from Beijing on Saturday every week, reaching Moscow via Manchuria. Same as K23, these tickets are only can purchase from a travel agent. You can purchase </span><a class="external text" data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.meettravelexpert.com/book-international-trains-from-beijing-to-ulaanbaatar-or-moscow.html" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="689" instrument_node="">the Trans-Siberian tickets from Beijing to Moscow</span></a><span data-dcnode-id="687" instrument_node=""> in advance.</span></li></ul><span data-dcnode-id="684" instrument_node="">
