cnode-id="199" id="main"><article class="post-501 post type-post status-publish format-standard has-post-thumbnail hentry category-experiential-travel category-china infinite-scroll-item mv-content-wrapper" data-dcnode-id="1072" id="post-501" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="1073"><header aria-label="Content" class="entry-header" data-dcnode-id="1243"><h1 class="entry-title" data-dcnode-id="1258" itemprop="headline"><span data-dcnode-id="1259" instrument_node="">Inside the Forbidden City Between Myth and Reality</span></h1><div class="entry-meta" data-dcnode-id="1244"><span data-dcnode-id="1257" instrument_node=""> </span><span class="posted-on" data-dcnode-id="1252"><time class="updated" data-dcnode-id="1255" datetime="2021-12-12T12:10:28+01:00" itemprop="dateModified"><span data-dcnode-id="1256" instrument_node="">December 12, 2021</span></time><time class="entry-date published" data-dcnode-id="1253" datetime="2021-12-12T10:02:00+01:00" itemprop="datePublished"><span data-dcnode-id="1254" instrument_node="">December 12, 2021</span></time></span><span data-dcnode-id="1251" instrument_node=""> </span><span class="byline" data-dcnode-id="1245"><span data-dcnode-id="1250" instrument_node="">by </span><span class="author vcard" data-dcnode-id="1246" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/author/admin/" itemprop="url" rel="author" title="View all posts by Angela Corrias"><span class="author-name" data-dcnode-id="1248" itemprop="name"><span data-dcnode-id="1249" instrument_node="">Angela Corrias</span></span></a></span></span></div></header><div class="featured-image page-header-image-single" data-dcnode-id="1238"><span data-dcnode-id="1242" instrument_node=""> </span><img alt="Hall in the Forbidden City - Travel Images" class="attachment-full size-full lazyloaded" data-dcnode-id="1241" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg" data-srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City-300x200.jpg 300w" height="665" itemprop="image" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg&amp;raw" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City-300x200.jpg 300w" width="1000"><noscript data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">&lt;img width="1000" height="665" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg" class="attachment-full size-full lazyload" alt="Hall in the Forbidden City - Travel Images" itemprop="image" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City-300x200.jpg 300w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></div><div class="entry-content" data-dcnode-id="1074" itemprop="text"><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">As I walked across the Forbidden City’s entrance gate in Beijing I was overwhelmed with expectations. I had read a lot about it and seen many pictures, and yet I was lured in by curiosity. Definitely one of the first things I wanted to visit in China. I decided to visit Beijing’s Forbidden City on a tour but you can totally visit independently without a guide.</span></p><div class="wp-block-image" data-dcnode-id="1229"><figure class="aligncenter" data-dcnode-id="1230"><img alt="The entrance to the Forbidden City, Beijing" class="lazyloaded" data-dcnode-id="1235" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-entrance.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-entrance.jpg&amp;raw"><noscript data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">&lt;img class="lazyload" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-entrance.jpg" alt="The entrance to the Forbidden City, Beijing"/&gt;</span></noscript><figcaption data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">The entrance to the Forbidden City, Beijing</span></figcaption></figure></div><h2 data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Visiting the Forbidden City in Beijing</span></h2><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">The first thing I noticed was that although it’s a royal palace, it has nothing to do with the royal residences I had visited in Europe, where luxury is really the main parameter used to measure their power and influence.</span></p><div class="wp-block-image" data-dcnode-id="1217"><figure class="aligncenter" data-dcnode-id="1218"><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate.jpg"><img alt="Meridian Gate - Travel Images" class="wp-image-572 lazyloaded" data-dcnode-id="1224" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate.jpg" data-srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate-300x200.jpg 300w" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate.jpg&amp;raw" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate-300x200.jpg 300w" width="1000"><noscript data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">&lt;img width="1000" height="665" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate.jpg" alt="Meridian Gate - Travel Images" class="wp-image-572 lazyload" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Meridian-Gate-300x200.jpg 300w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></a><figcaption data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Meridian Gate of the Forbidden City, Beijing</span></figcaption></figure></div><p data-dcnode-id="1200"><span data-dcnode-id="1216" instrument_node="">The Forbidden City, in Chinese </span><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Gùgong</span></em><span data-dcnode-id="1213" instrument_node=""> (故宫), literally “Former Palace”, is </span><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/destinations/asia/china/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1212" instrument_node="">China</span></a><span data-dcnode-id="1210" instrument_node="">‘s biggest imperial residence. Declared World Heritage Site in 1987 and listed by </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/list/439" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1209" instrument_node="">UNESCO</span></a><span data-dcnode-id="1207" instrument_node=""> as the largest collection of ancient wooden structures in the world, the City was built between 1406 and 1420 and has hosted the emperors of the </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ming_dynasty" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1206" instrument_node="">Ming</span></a><span data-dcnode-id="1204" instrument_node=""> and </span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qing_dynasty" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1203" instrument_node="">Qing</span></a><span data-dcnode-id="1201" instrument_node=""> dynasties. The complex consists of 980 buildings laid out on a surface of 720,000 square meters.</span></p><div class="wp-block-image" data-dcnode-id="1192"><figure class="aligncenter" data-dcnode-id="1193"><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion.jpg"><img alt="Forbidden City pavilion - Travel Images" class="wp-image-517 lazyloaded" data-dcnode-id="1199" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion.jpg" data-srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion-300x200.jpg 300w" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion.jpg&amp;raw" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion-300x200.jpg 300w" width="1000"><noscript data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">&lt;img width="1000" height="665" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion.jpg" alt="Forbidden City pavilion - Travel Images" class="wp-image-517 lazyload" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Forbidden-City-pavilion-300x200.jpg 300w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></a><figcaption data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Pavilion in the Forbidden City</span></figcaption></figure></div><p data-dcnode-id="1181"><span data-dcnode-id="1191" instrument_node="">This walled city is considered one of the best examples of Chinese traditional architecture, as it faithfully reproduces the mystical concepts of </span><em data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Feng Shui</span></em><span data-dcnode-id="1188" instrument_node="">, </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/religion/religions/taoism/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1187" instrument_node="">Taoism</span></a><span data-dcnode-id="1185" instrument_node="">, and </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/shanghai-confucian-temple-worshiping-nature/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1184" instrument_node="">Confucianism</span></a><span data-dcnode-id="1182" instrument_node="">. Ancient Chinese culture believed in a strong harmony between men, nature, and the universe, and the Forbidden City was built following the descriptions of heavenly palaces in traditional fairy tales, with areas devoted to enjoying natural phenomena, such as listening to the rain or the wind, traits common to many gardens and pavilions throughout China.</span></p><div class="wp-block-image" data-dcnode-id="1173"><figure class="aligncenter" data-dcnode-id="1174"><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City.jpg"><img alt="Dragon in the Forbidden City - Travel Images" class="wp-image-518 lazyloaded" data-dcnode-id="1180" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City.jpg" data-srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City-300x200.jpg 300w" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City.jpg&amp;raw" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City-300x200.jpg 300w" width="1000"><noscript data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">&lt;img width="1000" height="665" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City.jpg" alt="Dragon in the Forbidden City - Travel Images" class="wp-image-518 lazyload" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Dragon-in-the-Forbidden-City-300x200.jpg 300w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></a><figcaption data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Statue of a dragon in the Forbidden City</span></figcaption></figure></div><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Despite such celestial-like construction, life within its walls has always been shrouded in mystery, especially when it comes to the emperor’s private life, populated by countless concubines, young, beautiful, and well-educated girls coming from all parts of China, whose sole duty was to please the monarch. The name of “Forbidden City” derives from the fact that nobody was allowed in or out unless specifically stated by the emperor.</span></p><div class="wp-block-image" data-dcnode-id="1163"><figure class="aligncenter" data-dcnode-id="1164"><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City.jpg"><img alt="Emperor throne in the Forbidden City - Travel Images" class="wp-image-520 lazyloaded" data-dcnode-id="1170" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City.jpg" data-srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City-300x200.jpg 300w" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City.jpg&amp;raw" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City-300x200.jpg 300w" width="1000"><noscript data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">&lt;img width="1000" height="665" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City.jpg" alt="Emperor throne in the Forbidden City - Travel Images" class="wp-image-520 lazyload" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-throne-in-the-Forbidden-City-300x200.jpg 300w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></a><figcaption data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">The Emperor’s throne in the Forbidden City</span></figcaption></figure></div><p data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">Within the walls of the Forbidden City Beijing, the emperor used to hold official meetings, receive foreign chiefs of states, read, write and host ceremonies. In a complex of buildings almost entirely inhabited by women struggling for power and competing for the emperor’s favors, very likely stories of jealousy, plots and vendettas thrived. There are rumors that even some nasty affairs such as murder happened behind those walls, and it seems that this was the reason why </span><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Mao-Zedong" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1161" instrument_node="">Mao Zedong</span></a><span data-dcnode-id="1159" instrument_node=""> refused to live there and decided to close it once the Qing dynasty came to an end.</span></p><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Imperial city residence for almost five centuries and to 24 emperors, the Forbidden City was the house of some 9000 people, between servants, guards, eunuchs, concubines, and the royal family. All buildings are made of painted wood and all materials were brought from all parts of China. To avert the risk of fire, huge cauldrons full of water were scattered all throughout the complex.</span></p><div class="wp-block-image" data-dcnode-id="1148"><figure class="aligncenter" data-dcnode-id="1149"><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City.jpg"><img alt="Emperor bedroom in the Forbidden City - Travel Images" class="wp-image-521 lazyloaded" data-dcnode-id="1155" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City.jpg" data-srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City.jpg 965w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City-300x200.jpg 300w" height="642" sizes="(max-width: 965px) 100vw, 965px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City.jpg&amp;raw" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City.jpg 965w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City-300x200.jpg 300w" width="965"><noscript data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">&lt;img width="965" height="642" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City.jpg" alt="Emperor bedroom in the Forbidden City - Travel Images" class="wp-image-521 lazyload" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City.jpg 965w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Emperor-bedroom-in-the-Forbidden-City-300x200.jpg 300w" sizes="(max-width: 965px) 100vw, 965px"&gt;</span></noscript></a><figcaption data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">The Emperor’s bedroom in the Forbidden City</span></figcaption></figure></div><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Although some features changed depending on the dynasty, both Ming and Qing emperors were allowed to have more than one wife and several concubines. Every night the emperor would choose which concubine was supposed to entertain him and the girl would go through hours of what can be considered the forerunner of modern beauty salons, in order to be at her best not to disappoint His Majesty. The number of times a concubine was called by the emperor would determine her social rank.</span></p><div class="wp-block-image" data-dcnode-id="1138"><figure class="aligncenter" data-dcnode-id="1139"><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City.jpg"><img alt="Gate inside the Forbidden City - Travel Images" class="wp-image-522 lazyloaded" data-dcnode-id="1145" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City.jpg" data-srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City-300x200.jpg 300w" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City.jpg&amp;raw" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City-300x200.jpg 300w" width="1000"><noscript data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">&lt;img width="1000" height="665" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City.jpg" alt="Gate inside the Forbidden City - Travel Images" class="wp-image-522 lazyload" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Gate-inside-the-Forbidden-City-300x200.jpg 300w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></a><figcaption data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Red gate inside the Forbidden City where I picture countless concubines walking through over the centuries</span></figcaption></figure></div><p data-dcnode-id="1133"><span data-dcnode-id="1137" instrument_node="">The last Emperor who lived in the Forbidden City was </span><em data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">PuYi</span></em><span data-dcnode-id="1134" instrument_node="">, and was put on the throne to rule the country at the age of three, nonetheless. According to the legend, at the ceremony to crown him as emperor, the child was too scared to stay calm. He was forced to abdicate in 1912 when turbulent times were starting for China but was held in the palace until 1924. Puppet of the Japanese government, PuYi has always been strongly criticized for his weak policies towards Western powers, allowing them to reduce China to a semi-colony. Shanghai itself was divided into foreign concessions.</span></p><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Dawdling about the Forbidden City, even though it’s not as it was during its golden ages, is inevitably captivating.</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">At every step, I couldn’t help but think of the thousands of concubines that within those 10-meter high walls found a career boost and their golden prison at the same time.</span></p><div class="wp-block-image" data-dcnode-id="1121"><figure class="aligncenter" data-dcnode-id="1122"><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg"><img alt="Hall in the Forbidden City - Travel Images" class="wp-image-523 ls-is-cached lazyloaded" data-dcnode-id="1128" data-src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg" data-srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City-300x200.jpg 300w" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg&amp;raw" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City-300x200.jpg 300w" width="1000"><noscript data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">&lt;img width="1000" height="665" src="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg" alt="Hall in the Forbidden City - Travel Images" class="wp-image-523 lazyload" srcset="https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City.jpg 1000w, https://www.chasingtheunexpected.com/wp-content/uploads/2011/06/Hall-in-the-Forbidden-City-300x200.jpg 300w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></a><figcaption data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Hall in the Forbidden City</span></figcaption></figure></div><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Of course, their mentality and priorities were different from mine or from Chinese girls today, but these are the only parameters of comparison I have and the only tools I can use to try to understand how they must have felt. It’s hard to believe they were actually happy to devote their lives to please the emperor, having to compete with other hundreds of girls. They were not allowed to marry unless chosen by the emperor himself as one of his wives, and I fail to believe that, although living the dream of many to be the emperor’s concubine, they didn’t dream of having their own family.</span></p><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Today it’s not possible to visit every room of the Forbidden City, but walking around its wide corridors, through its countless red gates, visiting the most important halls and gardens, gives an idea of how life was within those walls, charming, luxurious, and cruel.</span></p><h2 data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Practical information</span></h2><p data-dcnode-id="1099"><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Address:</span></strong><span data-dcnode-id="1112" instrument_node=""> No.4 Jingshanqian Street, Dongcheng District, Beijing 100009.</span><br data-dcnode-id="1111"><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Opening hours:</span></strong><span data-dcnode-id="1108" instrument_node=""> 8 am-5 pm. Winter until 4.30 pm. Monday closed.</span><br data-dcnode-id="1107"><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Entrance fee:</span></strong><span data-dcnode-id="1104" instrument_node=""> April to October 60</span><meta charset="utf-8" data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">￥, November to March 40</span><meta charset="utf-8" data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">￥.</span></p><h2 data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Explore Beijing with a tour guide</span></h2><p data-dcnode-id="1084"><span data-dcnode-id="1096" instrument_node="">As I mentioned earlier, I booked a tour for almost all my sightseeing in Beijing because I had very few days and I wanted to save time but still visit as much as possible. There are different options, you can either buy online only a </span><strong data-dcnode-id="1093"><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//affiliate.klook.com/redirect%3Faid%3D4702%26aff_adid%3D574625%26k_site%3Dhttps%253A%252F%252Fwww.klook.com%252Fen-AU%252Factivity%252F5692-beijing-palace-museum-ticket-beijing%252F" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1095" instrument_node="">single ticket to the Forbidden City</span></a></strong><span data-dcnode-id="1092" instrument_node="">, a guided tour to a single landmark, or a full-day tour to enter a few attractions with a local expert. There are several tours you can choose from, such as </span><strong data-dcnode-id="1089"><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//affiliate.klook.com/redirect%3Faid%3D4702%26aff_adid%3D574625%26k_site%3Dhttps%253A%252F%252Fwww.klook.com%252Fen-AU%252Factivity%252F1368-iconic-beijing-private-tour-beijing%252F" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1091" instrument_node="">this one</span></a></strong><span data-dcnode-id="1088" instrument_node=""> that takes you to all of Beijing’s iconic landmarks including the </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/beijing-summer-palace-a-walk-through-chinese-majesty/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1087" instrument_node="">Summer Palace</span></a><span data-dcnode-id="1085" instrument_node=""> and the Temple of Heaven.</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1083" instrument_node="">If you are more into a fully guided trip to China, I would consider a well-established and reliable tour company of the likes of G Adventures that operates a few China tours such as an exciting </span><strong data-dcnode-id="1080"><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kqzyfj.com/click-7827627-11555299%3Furl%3Dhttps%253A%252F%252Fwww.gadventures.com%252Ftrips%252Fbest-of-china%252F8146%252F" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1082" instrument_node="">National Geographic Journey 12-day in China tour</span></a></strong><span data-dcnode-id="1079" instrument_node=""> and visit also </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/things-to-do-in-shanghai/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1078" instrument_node="">Shanghai</span></a><span data-dcnode-id="1076" instrument_node=""> and Xi’an.</span></p></div></div></article><div class="comments-area" data-dcnode-id="200"><div data-dcnode-id="202" id="comments"><h3 class="comments-title" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">33 thoughts on “Inside the Forbidden City Between Myth and Reality”</span></h3><ol class="comment-list" data-dcnode-id="245"><li class="comment even thread-even depth-1 parent" data-dcnode-id="1022" id="comment-940"><article class="comment-body" data-dcnode-id="1048" id="div-comment-940" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1056"><div class="comment-author-info" data-dcnode-id="1057"><div class="comment-author vcard" data-dcnode-id="1065" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1069" instrument_node=""> </span><cite class="fn" da ink" data-belowelement="div-comment-1034" data-commentid="1034" data-dcnode-id="564" data-postid="501" data-replyto="Reply to Chole" data-respondelement="respond" href="#comment-1034" rel="nofollow"><span data-dcnode-id="565" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="532"><li class="comment byuser comment-author-admin bypostauthor odd alt depth-2" data-dcnode-id="534" id="comment-1035"><article class="comment-body" data-dcnode-id="535" id="div-comment-1035" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="547"><div class="comment-author-info" data-dcnode-id="548"><div class="comment-author vcard" data-dcnode-id="556" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="560" instrument_node=""> </span><cite class="fn" data-dcnode-id="557" itemprop="name"><a class="url" data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chasingtheunexpected.com/" rel="external nofollow ugc"><span data-dcnode-id="559" instrument_node="">Angela Corrias</span></a></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="549"><span data-dcnode-id="555" instrument_node=""> </span><a data-dcnode-id="550" href="#comment-1035"><span data-dcnode-id="554" instrument_node=""> </span><time data-dcnode-id="552" datetime="2011-06-13T17:12:31+02:00" itemprop="datePublished"><span data-dcnode-id="553" instrument_node=""> June 13, 2011 at 5:12 pm </span></time><span data-dcnode-id="551" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="536" itemprop="text"><p data-dcnode-id="541"><span data-dcnode-id="546" instrument_node="">True, I, along with hundreds of thousands of other tourists that day, walked in the “wrong” direction. Among the reasons I can think of is that my tour guide, again probably along with many other guides, decided t
