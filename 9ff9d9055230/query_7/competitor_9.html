</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">It should be evident to all paying attention that Beijing’s 2022 Winter Olympics will proceed as planned. Forget the meager protests against China’s cruel and immoral treatment of its own. The authoritarian regime appears to be on the verge of another power-play victory.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Also, never mind the plight of China’s Uyghur Muslims, underground Christian churches, Tibetan Buddhists, Falun Gong practitioners, and all the other groups the Beijing government labels a political threat. They’re of no lasting concern to the international elite, who are quick to issue public condemnations and slow when it comes to follow-up.</span></p><div class="gb-container gb-container-07b23f4d" data-dcnode-id="1550"><div class="gb-inside-container" data-dcnode-id="1551"><span data-dcnode-id="1613" instrument_node="">

</span><h2 data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">China’s political power  </span></h2><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">China’s political power — a byproduct of its enormous economic strength — is just too much to counter. And Beijing’s despotic leaders know this well.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">When the International Olympic Committee awarded Beijing the 2008 Summer Olympics, it promised the Games could improve human rights and civil liberties in China.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">There is no such lofty talk this time with Beijing’s 2022 Winter Olympics — the first city to host both the Summer and Winter Games — opening in less than two months on February 4.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Instead, there are some calls for governments to boycott Beijing’s 2022 Winter Olympics, with 3,000 athletes, sponsors, and broadcasters being lobbied by rights groups representing minorities and those otherwise suppressed across China. In a muted response, Australia and the U.S. announced a diplomatic boycott&nbsp;of the Games to protest human rights abuses.</span></p><div class="nspir-content" data-dcnode-id="1526" id="nspir-414717849" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 20px; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-5766119589470154" data-ad-slot="5249022323" data-dcnode-id="1531" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="1530" instrument_node="">
</span><span data-dcnode-id="1527" instrument_node="">
</span></div><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">IOC President Thomas Bach has repeatedly dodged questions about the propriety of holding the Games in China despite evidence of alleged genocide, vast surveillance, and crimes against humanity involving at least 1 million Uyghurs and other largely Muslim minorities. Tibet, a flashpoint in the run-up to 2008, remains one still, as does the organ harvesting of Falun Gong practitioners and other political prisoners.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><div class="wp-block-image td-caption-align-center" data-dcnode-id="1517"><figure class="aligncenter size-large" data-dcnode-id="1518"><img alt="xi" class="wp-image-459030" data-dcnode-id="1521" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vtwp-media.s3-accelerate.amazonaws.com/2021/12/xi-600x400.jpg&amp;raw" srcset="https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/xi-300x200.jpg 300w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/xi-600x400.jpg 600w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/xi-150x100.jpg 150w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/xi-768x512.jpg 768w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/xi-750x500.jpg 750w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/xi.jpg 940w" width="600"><figcaption data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node=""> Xi Jinping inspects troops during a parade to commemorate the 90th anniversary of the founding of the People’s Liberation Army in 2011 in Beijing. (Image: Screenshot via YouTube)</span></figcaption></figure></div><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">“The big difference between the two Beijing Games is that in 2008 Beijing tried to please the world,” Xu Guoqi, a historian at the University of Hong Kong, said to The Associated Press. “In 2022, he does not care about what the rest of the world thinks about it.”</span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">An expert on Chinese sports and the Olympics, Xu said Beijing in 2008 attempted to placate world opinion. “Now it tries its best to tell the world its intentions. If the world does not listen, so be it,” Xu wrote.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Xi Jinping is the most powerful general secretary of the Chinese Communist Party since Chairman Mao, but in 2008, he is also in charge of the Olympics.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">For Olympic officials and aficionados, this includes the possibility that should the games be pulled from Beijing at this relatively late date, it could mean the collapse of the international Olympics movement.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">That’s because as the games become ever more expensive to stage — and as citizen complaints in democratic nations about costs and inconvenience become louder — fewer cities are trying to land them. And that means that the Olympics are increasingly becoming the kind of circus that only authoritarian governments — answering only to themselves — are willing to stage.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><figure class="wp-block-image size-large is-resized td-caption-align-center" data-dcnode-id="1497"><img alt="Hitler" class="wp-image-459138" data-dcnode-id="1500" height="402" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vtwp-media.s3-accelerate.amazonaws.com/2021/12/Hitler-600x402.jpg&amp;raw" srcset="https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/Hitler-300x201.jpg 300w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/Hitler-600x402.jpg 600w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/Hitler-150x100.jpg 150w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/Hitler-768x514.jpg 768w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/Hitler-750x502.jpg 750w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/Hitler.jpg 877w" width="600"><figcaption data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node=""> Adolf Hitler inspects troops during a Wehrmacht parade for his 50th birthday in 1939 in Berlin. (Image: via Public Domain)</span></figcaption></figure><span data-dcnode-id="1496" instrument_node="">
</span><h2 data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Beijing 2022 and Berlin 1936: The parallels </span></h2><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1492" instrument_node="">There are some who see Beijing’s 2022 Winter Olympic Games as akin to </span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nspirement.com/2021/09/03/the-inspiring-story-of-why-two-japanese-olympians-combined-their-medals.html"><span data-dcnode-id="1491" instrument_node="">Berlin’s 1936 Olympic Games</span></a><span data-dcnode-id="1489" instrument_node="">.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1480"><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Moment, </span></em><span data-dcnode-id="1484" instrument_node="">an American-Jewish publication produced in Cambridge, Massachusetts, takes on the Beijing-Berlin connection in its current edition. </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//momentmag.com/an-inconvenient-genocide-uyghur/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1483" instrument_node="">The piece</span></a><span data-dcnode-id="1481" instrument_node="">, by former NPR religion reporter Tom Gjelten, is quite well done. It’s loaded with pertinent information.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Tom’s moral argument against Beijing’s 2022 Winter Olympics relies mostly on China’s treatment of its Uyghur minority. Tom wonders if China’s Uyghurs are analogous to Nazi-era Jews — who were already highly persecuted as Adolf Hitler scaled up his “final solution.”</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Human rights advocates see a parallel between the muted response to China’s repression of the Uyghurs and others and America’s failure to challenge Nazi moves against the Jews in the 1930s, a time when the United States had deep political and economic interests in Germany. </span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Senior American officials, including President Franklin D. Roosevelt, hoped a conciliatory approach to Hitler would encourage Germany to continue payments on its multibillion-dollar debt to U.S. creditors.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><div class="wp-block-image td-caption-align-center" data-dcnode-id="1465"><figure class="aligncenter size-large" data-dcnode-id="1466"><img alt="For others, Jews in particular, there is also this news peg: comparing Beijing's 2022 Winter Olympics to Berlin's 1936 Olympic Games." class="wp-image-459034" data-dcnode-id="1469" height="352" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vtwp-media.s3-accelerate.amazonaws.com/2021/12/china_olympics_protest-600x352.jpg&amp;raw" srcset="https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/china_olympics_protest-300x176.jpg 300w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/china_olympics_protest-600x352.jpg 600w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/china_olympics_protest-150x88.jpg 150w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/china_olympics_protest-768x451.jpg 768w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/china_olympics_protest-750x440.jpg 750w, https://vtwp-media.s3-accelerate.amazonaws.com/2021/12/china_olympics_protest.jpg 1212w" width="600"><figcaption data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">For others, Jews, in particular, there is also this news peg: comparing Beijing’s 2022 Winter Olympics to Berlin’s 1936 Olympic Games. (Image: via Tibet Action Institute)</span></figcaption></figure></div><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Wall Street bankers were heavily invested in German industry in the 1930s and wanted to protect their stakes much as they do today when it concerns China. </span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Major Hollywood studios were omitting movie references to Jewish mistreatment to satisfy Nazi censors and maintain access to the important German film audience, as does Hollywood today regarding China.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">One lesson of those years was that it was a moral failure regarding competing interests that impeded an effective response to criminal horrors.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">The plight of the Uyghur people and others who are suppressed in China today presents an opportunity to see whether the criminal horrors of yesterday are learned today.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1430"><strong data-dcnode-id="1449"><em data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Follow us on </span></em></strong><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/nspirement" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="1446"><em data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Twitter</span></em></strong></a><strong data-dcnode-id="1442"><em data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">, </span></em></strong><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/nspirement" rel="nofollow noopener" target="_blank"><strong data-dcnode-id="1439"><em data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Facebook</span></em></strong></a><strong data-dcnode-id="1435"><em data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">, or </span></em></strong><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/nspirement/_created/" rel="nofollow noopener" target="_blank"><strong data-dcnode-id="1432"><em data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Pinterest</span></em></strong></a></p><span data-dcnode-id="1429" instrument_node="">
