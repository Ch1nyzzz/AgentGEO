</span><h2 data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Brief Impression about Temple of Heaven – Facts</span></h2><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1202" instrument_node="">The Temple of Heaven (天坛) is </span><strong data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">one of the most brilliant ancient architectures in China</span></strong><span data-dcnode-id="1199" instrument_node="">. It is also an outstanding masterpiece of classic imperial buildings throughout Chinese history. The site was </span><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">firstly built in 1420</span></strong><span data-dcnode-id="1196" instrument_node=""> by Yongle Emperor (永乐皇帝), then expanded by the subsequent emperors of both Ming and Qing Dynasty, and had served as the holy place for emperors to pay homage to Heaven and to pray for a year of rich harvest.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1193" instrument_node="">Compared with all other sacrificial sites in the world, the Temple of Heaven is the </span><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">largest not only in the size and scale, but also the forms and traditions</span></strong><span data-dcnode-id="1190" instrument_node="">. In 1998, the UNESCO listed the Temple of Heaven in the </span><strong data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">World Heritage Sites List</span></strong><span data-dcnode-id="1187" instrument_node=""> with description as “</span><strong data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">a masterpiece of architecture and landscape design</span></strong><span data-dcnode-id="1184" instrument_node=""> which simply and graphically illustrates a cosmogony of great importance for the evolution of one of the world’s great civilizations...”</span></p><span data-dcnode-id="1182" instrument_node="">
</span><h2 data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Location &amp; Transportation</span></h2><span data-dcnode-id="1179" instrument_node="">
</span><span data-dcnode-id="1177" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1112"><span data-dcnode-id="1176" instrument_node="">
</span><div class="col-lg-7" data-dcnode-id="1124" style="width: 50% "><span data-dcnode-id="1175" instrument_node="">
</span><h3 data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Where is the Temple of Heaven</span></h3><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">The Temple of Heaven is located in the central area of Beijing City which is also the attraction-gathering region. The famous Forbidden City (Palace Museum) and Tiananmen Square are conveniently situated at the northwest of Temple of Heave within short walking distance.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><ul data-dcnode-id="1144"><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1167" instrument_node="">6 km from </span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/beijing/forbidden-city.html" target="_blank"><span data-dcnode-id="1166" instrument_node="">Forbidden City</span></a></li><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1159"><span data-dcnode-id="1162" instrument_node="">5 km from </span><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/beijing/tiananmen-square.html" target="_blank"><span data-dcnode-id="1161" instrument_node="">Tiananmen Square</span></a></li><span data-dcnode-id="1158" instrument_node="">
</span><li data-dcnode-id="1154"><span data-dcnode-id="1157" instrument_node="">21 km from </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/beijing/summer-palace.html" target="_blank"><span data-dcnode-id="1156" instrument_node="">Summer Palace</span></a></li><span data-dcnode-id="1153" instrument_node="">
</span><li data-dcnode-id="1149"><span data-dcnode-id="1152" instrument_node="">75 km from </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/beijing/badaling-great-wall.html" target="_blank"><span data-dcnode-id="1151" instrument_node="">Badaling Great Wall</span></a></li><span data-dcnode-id="1148" instrument_node="">
</span><li data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">6.5 km from Jingshan Park</span></li><span data-dcnode-id="1145" instrument_node="">
</span></ul><span data-dcnode-id="1143" instrument_node="">
</span><h3 data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Transfer to/around Temple Heaven</span></h3><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1139" instrument_node="">The visit of Temple of Heaven takes about 1~2 hours, so it is usually recommended to tour with other sites in Beijing city, such as the Tiananmen Square, Forbidden City, Summer Palace or </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/beijing/hutong.html" target="_blank"><span data-dcnode-id="1138" instrument_node="">Hutongs</span></a><span data-dcnode-id="1136" instrument_node=""> as a full day tour package  which has covered convenient and private transfer to and around the Temple of Heaven.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1133" instrument_node="">Subway and public buses are also available for independent travelers. You can take </span><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">subway Line 5</span></strong><span data-dcnode-id="1130" instrument_node="">, and exist at Tiantan Dongmen Station which is only several minutes’ walking away from the East Gate of Temple of Heaven. Many </span><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">buses</span></strong><span data-dcnode-id="1127" instrument_node=""> pass by the park, including 120, 17, 2, 35, 36, 504, 53, etc.</span></p><span data-dcnode-id="1125" instrument_node="">
</span></div><span data-dcnode-id="1123" instrument_node="">

</span><div class="col-lg-7" data-dcnode-id="1087"><span data-dcnode-id="1106" instrument_node="">
</span><h3 data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Ming Dynasty</span></h3><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">The Empire Ming founded the capital in Nanjing in its early period. Zhu Yuanzhang (朱元璋), the first emperor built the Temple of Heaven and Earth on the Zhongshan Mountain. Later in 1447, emperor Yongle moved the capital to Beijing, and also constructed the Temple of Heaven and Earth on the southeast of Forbidden City as place for paying homage and praying to the Heaven in 1420. Yongle followed the tradition of sacrificing to the heaven and earth together in a same site – Dasi Pavilion which was the main building of Temple of Heaven and Earth. The tradition had lasted more than 160 years until the Jiajing emperor (嘉靖皇帝) broke it. He built four sites separately as Temple of Heaven, Temple of Earth, Temple of Sun, and Temple of Moon in the 16th century. Since then, the structure had been kept by the following emperors.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><h3 data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Qing Dynasty</span></h3><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">In 1644, Qing Dynasty was founded. Qing also followed the tradition of sacrifice of Ming Dynasty, and set the Temple of Heaven as the place for sacrifice. During the reign of Emperor Qianlong (乾隆, 1736~1795), a large-scale restoration and expansion was made. The old palaces, pavilions, stages, towers, path were renovated. Many new buildings launched, including the famous Echo Wall. Qianlong also ordered to plant thousands of trees around the temples.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><h3 data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Destruction</span></h3><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">The Temple of Heaven once suffered great damages from wars. In August of 1900, the armies of Eight-Nation Alliance invaded Beijing, and occupied the Temple of Heaven. Many relics were destructed. The following civil wars also damaged the Temple of Heaven. Fortunately, several large renovations were launched to preserve the Temple of Heaven after the establishment of PRC in 1949. Now it serves as a historical site, also a public park.</span></p><span data-dcnode-id="1088" instrument_node="">
</span></div><span data-dcnode-id="1086" instrument_node="">
</span><div class="col-lg-5 attraction-box1" data-dcnode-id="1079"><span data-dcnode-id="1085" instrument_node="">
</span><img alt="Temple of Heaven in Qing Dynasty" data-dcnode-id="1084" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/travel-guide/beijing/temple-of-heaven/temple-of-heaven-in-qing-dynasty.jpg&amp;raw"><span data-dcnode-id="1083" instrument_node="">
</span><span data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Temple of Heaven in Qing Dynasty</span></span><span data-dcnode-id="1080" instrument_node="">

</span><span data-dcnode-id="1074" instrument_node="">
</span><h2 data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Architectural Art, Layout &amp; Geomantic Omen</span></h2><span data-dcnode-id="1071" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1046"><span data-dcnode-id="1070" instrument_node="">
</span><div class="col-lg-7" data-dcnode-id="1056"><span data-dcnode-id="1069" instrument_node="">
</span><h3 data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Layout</span></h3><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">The Temple of Heaven is featured in precise structure, peculiar design and magnificent decoration. Covering more than 267 hectares (660 acres), the Temple of Heaven is the general reference of Huanqiu Altar (圜丘) and Qigu Altar(祈谷) which locate separately at an axle path from south to north – Danbi Bridge (丹陛桥). The most important building of Huanqiu Altar is Huangqiongyu Pavillion (皇穹宇). Qigu Altar has Qinian Pavilion (祈年殿), Huangqian Pavilion (皇乾殿) and Qinian Gate (祈年门), etc.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Ancient Chinese mythology believed the Heaven is circle and the Earth is square, which is fully embodied in the design of Temple Heaven. Two long-sketching cordons of wall surrounded the temple complex. The southern outer wall was built like a taller semi-circular representing Heaven. While the northern wall is shorter, rectangular, stands for the Earth. Both the Huanqiu Altar and Qigu Altar are round, and stand on two square yards.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">The brilliant artisans of Qing Dynasty built supernatural sites - Echo Wall, Three-Sound Stone, and Conversation Stone according to the science of acoustics.</span></p><span data-dcnode-id="1057" instrument_node="">
</span></div><span data-dcnode-id="1055" instrument_node="">
</span><div class="col-lg-5 attraction-box1" data-dcnode-id="1048"><span data-dcnode-id="1054" instrument_node="">

</span><span data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Layout of Temple of Heaven</span></span><span data-dcnode-id="1049" instrument_node="">

</span><h2 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Architectural Art, Layout &amp; Geomantic Omen</span></h2><span data-dcnode-id="1042" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1003"><span data-dcnode-id="1041" instrument_node="">
</span><div class="col-lg-7" data-dcnode-id="1021"><span data-dcnode-id="1040" instrument_node="">
</span><h3 data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Important buildings in the park</span></h3><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1033"><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Qinian Hall</span></strong><span data-dcnode-id="1034" instrument_node=""> (Hall of Prayer for Good Harvests) is most magnificent building in the Temple of Heaven. It is a wooden triple-gable circular pavilion which is 38 meters high with a three-level marble stone base. The ancient emperors prayed for good harvests here. There are 28 pillars propping up the hall. The inner 4 pillars are large, and stand for four seasons. The middle 12 pillars represent the twelve months. The outer 12 pillars indicate 12 periods of a day.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1028"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Huangqiongyu Hall</span></strong><span data-dcnode-id="1029" instrument_node=""> (The Imperial Vault of Heaven) is smaller with only one circular gable and one level of marble stone base compared with Qinian Hall. It is the place to enshrine the worshiping tablets of Gods. Inside the hall are pillars and vault decorated by beautiful paintings and carvings. Outside is a circular wall – Echo Wall which can transmit sounds over long distances.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1023"><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Huanqiu Altar</span></strong><span data-dcnode-id="1024" instrument_node="">  (The Circular Mound Altar) is an empty circular platform with three levels of marble stones. Vivid dragons were carved on the stones to stand for the emperors. The number nine stands for power as well as the emperors in ancient China. You will surprisedly  find the balusters and steps are either the sacred number nine or its multiples. In the ancient time, the emperors burn the offerings for Heaven in a stove on the platform.</span></p><span data-dcnode-id="1022" instrument_node="">
</span></div><span data-dcnode-id="1020" instrument_node="">
</span><div class="col-lg-5 attraction-box1" data-dcnode-id="1013"><span data-dcnode-id="1019" instrument_node="">
</span><img alt="Inside Qinian Hall" data-dcnode-id="1018" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/travel-guide/beijing/temple-of-heaven/qinian-hall-iinside.jpg&amp;raw"><span data-dcnode-id="1017" instrument_node="">

</span><h3 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Local folk &amp; activities</span></h3><span data-dcnode-id="999" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="983"><span data-dcnode-id="998" instrument_node="">
</span><div class="col-lg-7" data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">The Temple of Heaven is divided into two parts – public park area and tourist area. The public area now serves as an entertaining and morning exercise place for locals, and is open from early morning to later night. People living near usually like to take exercise or take part in folk activities in the park, such as running, cycling, playing Tai Chi. You can spare some time to stroll leisurely in the park to get involved in the interested activities, or just experience the peaceful atmosphere of local people’s living.</span></p><span data-dcnode-id="994" instrument_node="">
</span></div><span data-dcnode-id="992" instrument_node="">

</span><h2 data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Recommended Visiting Route</span></h2><span data-dcnode-id="979" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="949"><span data-dcnode-id="978" instrument_node="">
</span><div class="col-lg-7" data-dcnode-id="961"><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">There are four gates for entering and exiting  the Temple of Heaven. For a smooth and pleasant visiting, travelers are suggested to start the exploration from the South Gate. Entering the gate, you will first visit the Huanqiu  Altar and its surrounding, such as the Echo Wall, Kitchen for Sacrifice, etc. Then walk through the solemn path of Danbi Bridge, and get to the Qinian Hall. Explore the surrounding sites, and  then continue your trip to the west of Qigu Altar to see the Flower Garden where the emperor stayed during sacrificial ceremonies. On the south of the garden is the Palace of Abstinence. After the sightseeing, leave the site from the West Gate.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="971"><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/beijing-tours/4-days-classic-beijing-tour.html"><span data-dcnode-id="973" instrument_node="">&gt;&gt; 4 Days Classic Beijing Tour Package</span></a></p><span data-dcnode-id="970" instrument_node="">

</span><h2 data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Sacrificial Culture of Temple of Heaven </span></h2><span data-dcnode-id="945" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="926"><span data-dcnode-id="944" instrument_node="">
</span><div class="col-lg-7" data-dcnode-id="936"><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">In the ancient China, the emperors attached great importance on the sacrifice to the Heaven because they are believed to be the son of Heaven. They ruled the county on behalf of Heaven. </span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">To show their respect and gratefulness to the Heaven, the emperors of Ming and Qing Dynasties moved from Forbidden City to encamp in the Temple of Heaven with their retunes twice a year. The emperor would pray to Heaven for good harvests on the altar. Grand ceremony must be held perfectly, because the smallest mistake would bring bad  luck for the whole nation in the next years.</span></p><span data-dcnode-id="937" instrument_node="">
</span></div><span data-dcnode-id="935" instrument_node="">

</span><h3 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Best time to go - seasonal advice - Different views in different season</span></h3><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">March to May and September to November is the best time to visit the Temple of Heaven. But actually the Temple of Heaven is suitable for travel all year around. You can see the blooming lilac during the middle April. In summer days, the whole park is decorated by flourishing green trees. The cool autumn is the best season when the sky is clear and blue. Winter is cold, but you can get rid of the crowds, and focus on exploring the fabulous architectures.</span></p><span data-dcnode-id="916" instrument_node="">

</span><p data-dcnode-id="905"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Notes</span></strong><span data-dcnode-id="906" instrument_node="">: Note: the price include both the entrance fee and tickets for sites for Qigu Altar and Huanqiu  Altar(￥20), Sacrificial Music Hall and Fast Palace (￥10).</span></p><span data-dcnode-id="904" instrument_node="">
</span><h3 data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Tour Guide Service</span></h3><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Independent travelers can rent the self-service audio guide device at the four gates of Temple of Heaven (Chinese, Cantonese, English, French, German, Spanish, Japanese, and Korean). You can also hire a personal tour guide in the park to get more detailed explanation. 

</span></p><span data-dcnode-id="898" instrument_node="">
</span><h2 data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">How to Plan Your Travel in Beijing</span></h2><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">To explore the best highlights of Beijing, including Tiananmen Square, Forbidden City, Great Wall, Temple of Heaven, Summer Palace, Hutongs, you only need 2 or 3 full days, which is available for to 72 Hours Visa-free for Transit in Beijing. If you have more days, you can go for an in-depth Great Wall hiking or photography, and explore more hidden attractions in the city.</span></p><span data-dcnode-id="892" instrument_node="">
