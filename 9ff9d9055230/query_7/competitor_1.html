</span><p data-dcnode-id="1631"><span data-dcnode-id="1643" instrument_node="">Whether you're desiring delicious </span><strong data-dcnode-id="1633"><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/food/beijing-duck.htm"><span data-dcnode-id="1642" instrument_node="">Peking duck</span></a><span data-dcnode-id="1640" instrument_node="">, refined </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/travelguide/chinese-food/vegetarian-food.htm"><span data-dcnode-id="1639" instrument_node="">vegetarian cuisine</span></a><span data-dcnode-id="1637" instrument_node="">, authentic </span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/travelguide/muslim-china/halal-food.htm"><span data-dcnode-id="1636" instrument_node="">halal cuisine</span></a><span data-dcnode-id="1634" instrument_node="">, regional Chinese recipes, or top-notch global gastronomy</span></strong><span data-dcnode-id="1632" instrument_node="">, this city has it all. Our 20 recommendations are grouped by cuisine style.</span></p><span data-dcnode-id="1630" instrument_node="">

</span><h2 data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Peking Duck Restaurants</span></h2><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1550" instrument_node="">There is no doubt that </span><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Peking duck is the most famous dish in Beijing's restaurants</span></strong><span data-dcnode-id="1547" instrument_node="">, and it can be found in most of Beijing's large restaurants. But it is not easy for visitors to pick a suitable one when facing so many roast duck restaurants in Beijing. Read our recommendations to get inspiration and some can’t-go-wrong options.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><h3 data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">1. Quanjuede</span></h3><span data-dcnode-id="1542" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1538"><img alt="" class="img-responsive" data-dcnode-id="1541" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/e69989ddc05b4a8d9126f99c_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2021/08/e69989ddc05b4a8d9126f99c_cut_750x400_238.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Quanjuede is the most famous Peking Duck brand in China</span></span></div><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1536" instrument_node="">There is a saying in China: “If you don’t reach the Great Wall, you’re no hero; if you don’t eat Quanjude duck, you’ll be really sorry!” It boasts&nbsp;the authentic&nbsp;Peking duck cooking technology found at this time-honored chain. </span><strong data-dcnode-id="1532"><span data-dcnode-id="1535" instrument_node="">You can never go wrong when you choose </span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/article-quanjude-roast-duck-restaurant.htm"><span data-dcnode-id="1534" instrument_node="">Quanjude</span></a></strong><span data-dcnode-id="1531" instrument_node="">.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1528" instrument_node="">With branches spanning the globe, Quanjuede is </span><strong data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">the most well-known Beijing duck restaurant in the world</span></strong><span data-dcnode-id="1525" instrument_node="">. Over a hundred years old, the art of roasting the duck and selecting the ideal condiments and dishes to be paired with it is taken from one degree of perfection to the next. Its mid-range pricing has helped to make Quanjuede the quintessential duck restaurant of the city.</span></p><span data-dcnode-id="1523" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1506"><span data-dcnode-id="1522" instrument_node="">
</span><li data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Recommended dishes: Quanjude roast duck, roast duck bone soup, fried mushroom, and shrimp balls</span></li><span data-dcnode-id="1519" instrument_node="">
</span><li data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Price: from 120 yuan per person</span></li><span data-dcnode-id="1516" instrument_node="">
</span><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Open: 11:00am–2:00pm and 5:00–10:00pm</span></li><span data-dcnode-id="1513" instrument_node="">
</span><li data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Address: 30 Qianmen Street, Dongcheng District (near Tian’anmen square)</span></li><span data-dcnode-id="1510" instrument_node="">
</span><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Booking tel.: 10 6511 2418</span></li><span data-dcnode-id="1507" instrument_node="">
</span></ul><span data-dcnode-id="1505" instrument_node="">
</span><h3 data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">2. Dadong</span></h3><span data-dcnode-id="1502" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1498"><img alt="" class="img-responsive" data-dcnode-id="1501" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/ecdbea90608642b7a80487e0_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2021/08/ecdbea90608642b7a80487e0_cut_750x400_238.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Dadong restaurant</span></span></div><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1496" instrument_node="">Dadong is a Peking duck restaurant that </span><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">has</span></strong><span data-dcnode-id="1493" instrument_node=""> </span><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">an international perspective and a very good reputation among foreigners</span></strong><span data-dcnode-id="1490" instrument_node="">. Besides the Peking duck, it has lots of creative dishes that fuse with Western dishes. It is also a family-friendly restaurant.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Dadong uses international technology for cooking that has been lauded by CNN and other local media outlets. Dadong’s exclusive roast duck craft is different from the traditional ways, which makes its roast duck exceptionally crisp but not greasy. Book in advance for this gem of Beijing cuisine.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1468"><span data-dcnode-id="1484" instrument_node="">
</span><li data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Recommended dishes: Dadong “super-lean” roast duck, black pepper beef, Chef Dong’s fried prawns with spicy sauce</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Price: from 350 yuan per person</span></li><span data-dcnode-id="1478" instrument_node="">
</span><li data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Open: 11:00am–10:00pm</span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Address: Floor 6, Wangfu Shopping Center, 301 Wangfujing Street, Dongcheng District</span></li><span data-dcnode-id="1472" instrument_node="">
</span><li data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Booking tel.: 10 65288802</span></li><span data-dcnode-id="1469" instrument_node="">
</span></ul><span data-dcnode-id="1467" instrument_node="">
</span><h3 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">3. Siji Mingfu</span></h3><span data-dcnode-id="1464" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1460"><img alt="" class="img-responsive" data-dcnode-id="1463" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/1a57c67b1fbb4760959bd265.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2021/08/1a57c67b1fbb4760959bd265.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Siji Mingfu Peking Duck</span></span></div><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">Siji Mingfu is a</span><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node=""> Beijing locals’ favorite, using old roasting craft, giving a classic Beijing flavor</span></strong><span data-dcnode-id="1455" instrument_node="">. If you want to experience locals’ dining atmosphere and eat like a local, Siji Mingfu is the option for you.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">All ducks are selected carefully and hooked up in the stove over flaming fruit-tree wood. The meat tastes tender and crispy.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1433"><span data-dcnode-id="1449" instrument_node="">
</span><li data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Recommended dishes:&nbsp;specially selected crispy and tender roast duck, Beijing-style noodles with soybean paste, imperial snack combination</span></li><span data-dcnode-id="1446" instrument_node="">
</span><li data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Price:&nbsp;from 150 yuan per person</span></li><span data-dcnode-id="1443" instrument_node="">
</span><li data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Open:&nbsp;10:30am–10:30pm</span></li><span data-dcnode-id="1440" instrument_node="">
</span><li data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Address:&nbsp;11 Nanchizi Street, Dongcheng District (near the east gate of the Forbidden City)</span></li><span data-dcnode-id="1437" instrument_node="">
</span><li data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Booking tel.: 10 6526 7369</span></li><span data-dcnode-id="1434" instrument_node="">
</span></ul><span data-dcnode-id="1432" instrument_node="">
</span><h3 data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">4. Made in China</span></h3><span data-dcnode-id="1429" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1425"><img alt="" class="img-responsive" data-dcnode-id="1428" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/228e5b2e25334cb58298305f.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Made in China restaurant dishes</span></span></div><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1423" instrument_node="">Located in Grand Hyatt Beijing, Made in China is a well-known high-end Chinese restaurant in Beijing that </span><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">provides an excellent dining environment and top service</span></strong><span data-dcnode-id="1420" instrument_node="">. This restaurant is the high-budget preferred option. This restaurant is famous for specialties from northern China, including Peking duck and beggar's chicken.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1401"><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Recommended dishes: Peking duck baked on fruit tree wood, sautéed spinach with sesame seeds, sweet and sour mandarin fish, beggar’s chicken</span></li><span data-dcnode-id="1414" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Price: from 400 yuan per person</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Open: 11:30am–2:30pm and 5:30–10:30pm</span></li><span data-dcnode-id="1408" instrument_node="">
</span><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Address: 1F Grand Hyatt Beijing, 1 Dong Chang’an Avenue, Dongcheng District (6 minutes’ walk from Wangfujing Street)</span></li><span data-dcnode-id="1405" instrument_node="">
</span><li data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Booking tel.: 10 6510 9024</span></li><span data-dcnode-id="1402" instrument_node="">
</span></ul><span data-dcnode-id="1400" instrument_node="">

</span><div class="rightname" data-dcnode-id="1385" style="font-size: 25px;"><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/"><span data-dcnode-id="1387" instrument_node="">Beijing Travel Guide</span></a></div><span data-dcnode-id="1384" instrument_node="">
</span><span class="rightdestination" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">All things you need to know</span></span><span data-dcnode-id="1381" instrument_node=""> </span><span class="tourbutton" data-dcnode-id="1377"><span data-dcnode-id="1380" instrument_node=""> </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/"><span data-dcnode-id="1379" instrument_node="">view more </span></a></span></div><span data-dcnode-id="1375" instrument_node="">

</span><h2 data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Michelin-Starred Restaurants in Beijing</span></h2><span data-dcnode-id="1370" instrument_node="">
</span><h3 data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">5. Xin Rong Ji (Xinyuan South Road)</span></h3><span data-dcnode-id="1367" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1363"><img alt="" class="img-responsive" data-dcnode-id="1366" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/24df5d5930f24c319d1c056b.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Xin Rong Ji famous for sea food dishes</span></span></div><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1361" instrument_node="">Xin Rong Ji (Xinyuan South Road) was awarded the status “</span><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">2021 Three Michelin Stars Restaurant</span></strong><span data-dcnode-id="1358" instrument_node="">”. Adjacent to the Bulgari Hotel Beijing, Xin Rong Ji (Xinyuan South Road) is the flagship restaurant of Xin Rong Ji Restaurants Inc., which was opened in 2019.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Xin Rong Ji is committed to providing diners with a perfect gourmet experience. It focuses on the selection of quality ingredients, and its cooking focuses on the ingredients' original flavor, nutrition, and health.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">The decoration is based on a classical Chinese style with modern elements, including a bar and an open kitchen. Its personalized service includes dish customization.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1333"><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Recommended dishes: salted bean curd pot, Dongpo braised pork, golden crisp hairtail, roast spring pigeon, honey sweet potato</span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Price: from 860 yuan per person</span></li><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Open: 11:30am–2:00pm and 5:00–9:00pm</span></li><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Address: 101, Floor 1, Qihao Building, 8 Xinyuan South Road, Chaoyang District (not far away from the United States embassy)</span></li><span data-dcnode-id="1337" instrument_node="">
</span><li data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Booking tel.: 10 6501 3667</span></li><span data-dcnode-id="1334" instrument_node="">
</span></ul><span data-dcnode-id="1332" instrument_node="">
</span><h3 data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">6. Shanghai Cuisine</span></h3><span data-dcnode-id="1329" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1325"><img alt="" class="img-responsive" data-dcnode-id="1328" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/9267c94250b648b38f9b9e8c.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Salted Pork in Jelly</span></span></div><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1323" instrument_node="">Shanghai Cuisine is a </span><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">2021 Two Michelin Stars Restaurant</span></strong><span data-dcnode-id="1320" instrument_node="">. The restaurant is decorated in a refined manner. The old gramophone in the corner makes space for a little retro charm, and proper table distance brings the diner a feeling of closeness without imposition.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">The restaurant mainly serves Shanghai cuisine. Cooking with thick oil and red sauce is a feature of Shanghai cuisine, which makes all kinds of foods taste mellow, sweet, and non-greasy.&nbsp;</span></p><span data-dcnode-id="1315" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1298"><span data-dcnode-id="1314" instrument_node="">

</span><p data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">Nestled in Beijing's hutongs, the Georg is </span><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">the newest and hottest upscale contemporary European restaurant opened by Danish design brand Georg Jensen</span></strong><span data-dcnode-id="1135" instrument_node="">, which is also a lifestyle space that combines art, design, and food.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">A single-page menu sticks to about a dozen Nordic-style dishes, in pursuit of the finest natural ingredients and the taste of the food itself, the menu changes by month or season, ensuring that customers eat quality food in season.</span></p><span data-dcnode-id="1130" instrument_node="">

</span><p data-dcnode-id="1052"><span data-dcnode-id="1055" instrument_node="">FLO is a restaurant that specializes in French cuisine. It is affiliated with the France FLO Group. </span><strong data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">The decoration of Beijing FLO Restaurant is extremely exquisite, making people easily imagine they are in Paris’s Terminus Nord.</span></strong></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The authentic French cuisine uses high-quality ingredients combined with original French seasoning, which is cooked by a French chef. It brings customers an amazing taste buds' trip.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1031"><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Recommended dishes: smoked flounder salad, French oysters, steak, mushroom soup, foie gras sauté</span></li><span data-dcnode-id="1044" instrument_node="">
</span><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Price range: from 750 yuan per person</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Open: 11:30am–2:30pm and 5:30–9:00pm</span></li><span data-dcnode-id="1038" instrument_node="">
</span><li data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Address: 18 Xiaoyun Road, Chaoyang District (north of Chaoyang Park)</span></li><span data-dcnode-id="1035" instrument_node="">
</span><li data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Booking tel.: 10 6595 5135</span></li><span data-dcnode-id="1032" instrument_node="">

</span><ul class="infolist" data-dcnode-id="1008"><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1021"><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/cht-fd-01/"><span data-dcnode-id="1023" instrument_node="">13-Day China Gourmet tour</span></a></li><span data-dcnode-id="1020" instrument_node="">

</span><li data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">More </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/tours.htm"><span data-dcnode-id="1013" instrument_node="">Beijing tours</span></a><a data-dcnode-id="1011" id="history"></a></li><span data-dcnode-id="1009" instrument_node="">

</span><h3 data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">11. Temple Restaurant Beijing (TRB) Hutong</span></h3><span data-dcnode-id="1004" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1000"><img alt="" class="img-responsive" data-dcnode-id="1003" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/e5b9fa77fb8441d795fd5147.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">TRB Hutong is located in a Temple</span></span></div><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">Repeatedly voted as one of the best Western restaurants in Beijing, eating out at Temple Restaurant is a great experience. The restaurant has award-winning chefs and is set in an exquisite setting — an ancient Tibetan temple that was only recently discovered. </span><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">The restaurant (and connecting hotel) have won preservation awards, and the temple itself is also recognized by UNESCO</span></strong><span data-dcnode-id="995" instrument_node="">.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><a data-dcnode-id="992" id="Chinese"></a></p><span data-dcnode-id="990" instrument_node="">
</span><h2 data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Chinese-Style Restaurants in Beijing</span></h2><span data-dcnode-id="987" instrument_node="">
</span><h3 data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">12. Haidilao</span></h3><span data-dcnode-id="984" instrument_node="">
</span><div class="infoimage" data-dcnode-id="980"><img alt="" class="img-responsive" data-dcnode-id="983" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/53b0a6f8b559484cb035b3b8_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Haidilao hot pot</span></span></div><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="975"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">For the best, and safest, hotpot in town, Haidilao is a no brainer</span></strong><span data-dcnode-id="976" instrument_node="">. It’s a huge chain with multiple branches, has excellent-quality ingredients, makes the country’s most famous hotpot sauce, and has great service.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">We recommend ordering the fresh noodles — they’re stretched right at your table for great entertainment (and a photo opportunity)!</span></p><span data-dcnode-id="971" instrument_node="">
</span><ul class="infolist" data-dcnode-id="954"><span data-dcnode-id="970" instrument_node="">
</span><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Recommended dishes: crispy meat, smooth shrimp, needle mushrooms, fresh noodles, mango sticky rice</span></li><span data-dcnode-id="967" instrument_node="">
</span><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Price: from 150 yuan per person</span></li><span data-dcnode-id="964" instrument_node="">
</span><li data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Open: 9:00am–12:00am</span></li><span data-dcnode-id="961" instrument_node="">
</span><li data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Address: 8 Gongti North Road, Sanlitun, Chaoyang District</span></li><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Booking tel.: 10 6595 2982</span></li><span data-dcnode-id="955" instrument_node="">

</span><ul class="drop1" data-dcnode-id="938"><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="944"><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/beijing-winter-tour.htm"><span data-dcnode-id="946" instrument_node="">6-Day Beijing Winter Tour with Skiing in a 2022 Olympic Winter Games Venue</span></a></li><span data-dcnode-id="943" instrument_node="">

</span></ul><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">13. Bai Jia Da Yuan</span></h3><span data-dcnode-id="934" instrument_node="">
</span><div class="infoimage" data-dcnode-id="930"><img alt="" class="img-responsive" data-dcnode-id="933" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2016/05/c1b04e5269504caea5344727_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">The dining environment in Bai Jia Da Yuan</span></span></div><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Bai Jia Da Yuan is a garden restaurant of the Qing Dynasty (1644–1912) serving mainly imperial cuisine and also Bai ethnic cuisine.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">Traditional Chinese pavilions dot the gardens and Chinese lanterns illuminate the complex at night. </span><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">All the staff wear traditional Qing Dynasty costumes, which further adds to the unique atmosphere</span></strong><span data-dcnode-id="922" instrument_node="">. The food served is outstanding, not only for the flavors but also for the unique presentation of the dishes. We won't spoil the surprise here, but this is a restaurant you should try!</span></p><span data-dcnode-id="920" instrument_node="">
</span><ul class="infolist" data-dcnode-id="903"><span data-dcnode-id="919" instrument_node="">
</span><li data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Recommended dishes: Chinese toon seedlings mixed with croaker, court barbecued pork, Bai Family fried shrimp, crispy fried duck</span></li><span data-dcnode-id="916" instrument_node="">
</span><li data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Price: from 360 yuan per person</span></li><span data-dcnode-id="913" instrument_node="">
</span><li data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Open: 10:30am–10:30pm</span></li><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Address: 15 Suzhou Street, Haidian District (southeast of Haidian Park)</span></li><span data-dcnode-id="907" instrument_node="">
</span><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Booking tel.: 10 6265 8851</span></li><span data-dcnode-id="904" instrument_node="">
</span></ul><span data-dcnode-id="902" instrument_node="">
</span><h3 data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">14. Hua Jia Yi Yuan</span></h3><span data-dcnode-id="899" instrument_node="">
</span><div class="infoimage" data-dcnode-id="895"><img alt="" class="img-responsive" data-dcnode-id="898" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/e5de19af2e5c4f5cb8403b8e_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">The restaurant is located in a courtyard houses</span></span></div><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Hua Jia Yi Yuan has three branches, each with its own specialty. The Guijie (Ghost Street) Restaurant is simple and unsophisticated. The giant transparent ceiling in the front courtyard is unique, and makes you feel as if you are in a garden while still being indoors. It is therefore a great option for Beijing's colder months.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><a data-dcnode-id="890" id="Vegetarian"></a></p><span data-dcnode-id="888" instrument_node="">
</span><h2 data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Vegetarian Restaurants in Beijing</span></h2><span data-dcnode-id="885" instrument_node="">
</span><h3 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">15. King’s Joy Beijing</span></h3><span data-dcnode-id="882" instrument_node="">
</span><div class="infoimage" data-dcnode-id="878"><img alt="" class="img-responsive" data-dcnode-id="881" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/11d5b504f7564e8abc8a762c_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">This stylish restaurant opposite the Lama Temple is one of the best Vegetarian Restaurant in Beijing</span></span></div><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">King's Joy Beijing is undoubtedly one of the best vegetarian restaurants in town, which was also </span><strong data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">awarded the status 2021 Three Michelin Stars Restaurant</span></strong><span data-dcnode-id="873" instrument_node="">. Yin Dawei, the boss of King's Joy, is a fan of sustainable and healthy lifestyles, so his restaurant attracts lots of celebrities, vegetarians, and businessmen.</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">What's more, it provides a fantastically tranquil dining experience. The interior of the restaurant is comfortably lit and filled with philosophical sentences about vegetarianism.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">The dishes are made using the freshest vegetables and ingredients, generally from close by organic farms or from the special regions they hail from.</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">The restaurant is conveniently located close to Yonghegong Lama Temple and thus conveniently follows a visit to the temple.</span></p><span data-dcnode-id="862" instrument_node="">
</span><ul class="infolist" data-dcnode-id="845"><span data-dcnode-id="861" instrument_node="">
</span><li data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Recommended dishes: sweet and sour lotus root, stir-fried termite mushrooms, asparagus and Chinese yam, matsutake soup, mung bean cake with jujube paste</span></li><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Price: from 1,000 yuan per person</span></li><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Open: 11:00am–10:00pm</span></li><span data-dcnode-id="852" instrument_node="">
</span><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Address: 2 Wudaoying Hutong, Dongcheng District (next to the Lama Temple)</span></li><span data-dcnode-id="849" instrument_node="">
</span><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Booking tel.: 10 8404 9191</span></li><span data-dcnode-id="846" instrument_node="">
</span></ul><span data-dcnode-id="844" instrument_node="">
</span><div class="info_reco_tours" data-dcnode-id="840"><em data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Recommended</span></em><span data-dcnode-id="841" instrument_node=""> Tours:</span></div><span data-dcnode-id="839" instrument_node="">
</span><ul class="drop1" data-dcnode-id="829"><span data-dcnode-id="838" instrument_node="">
</span><li data-dcnode-id="835"><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/cht-ft-04/"><span data-dcnode-id="837" instrument_node="">5-Day Beijing Family Tour</span></a></li><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="831"><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/tours/walking-tour.htm"><span data-dcnode-id="833" instrument_node="">Half-Day Beijing Walking Tour in a Neighborhood</span></a></li><span data-dcnode-id="830" instrument_node="">
</span></ul><span data-dcnode-id="828" instrument_node="">
</span><h3 data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">16. Tian Chu Miao Xiang</span></h3><span data-dcnode-id="825" instrument_node="">
</span><div class="infoimage" data-dcnode-id="821"><img alt="" class="img-responsive" data-dcnode-id="824" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/597e045223064c828c9efd28_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">“steak”* with mushroom sauce</span></span></div><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">The staff of the restaurant regularly study Confucian literature, so the atmosphere of Buddhism and Confucianism is very strong in the restaurant. They use quality natural ingredients for cooking without artificial additives.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="813"><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">The restaurant has a free cooking class available for housewives or foreign guests</span></strong><span data-dcnode-id="814" instrument_node=""> (or anyone else interested) every month. Participants can come to the kitchen and cook with their own hands under the guidance of the chef.</span></p><span data-dcnode-id="812" instrument_node="">
</span><ul class="infolist" data-dcnode-id="795"><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Recommended dishes: sweet and sour “pork”*, “steak”* with mushroom sauce, crispy durian cake (*meat replacements are used)</span></li><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Price: from 120 yuan per person</span></li><span data-dcnode-id="805" instrument_node="">
</span><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Open: 10:00am–10:00pm</span></li><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Address: F2, Chaowai SOHO, B6 Chaowai Street, Chaoyang District</span></li><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Booking tel.: 10 5900 1088</span></li><span data-dcnode-id="796" instrument_node="">
</span></ul><span data-dcnode-id="794" instrument_node="">
</span><h3 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">17. Gong De Lin</span></h3><span data-dcnode-id="791" instrument_node="">
</span><div class="infoimage" data-dcnode-id="787"><img alt="" class="img-responsive" data-dcnode-id="790" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/4adad90b0ff245d59c5af4e4.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Gong De Lin Vegetarian Restaurant</span></span></div><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Gong De Lin Vegetarian Restaurant is a restaurant based on the Buddhist vegetarian tradition and was originally set up in Hangzhou decades ago. It is the same as many other Chinese vegetarian restaurants in the sense that it serves “normal” looking meat dishes, but actually everything is skillfully made using vegetarian ingredients, particularly tofu.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">This restaurant is perfect if you want to try “Peking duck”, but are a vegetarian. You'll be surprised how much the tofu duck looks like an actual Peking duck!</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><a data-dcnode-id="779" id="Halal"></a></p><span data-dcnode-id="777" instrument_node="">
</span><h2 data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Halal Restaurants in Beijing</span></h2><span data-dcnode-id="774" instrument_node="">
</span><h3 data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">18. Hong Bin Building</span></h3><span data-dcnode-id="771" instrument_node="">
</span><div class="infoimage" data-dcnode-id="766"><img alt="" class="img-responsive" data-dcnode-id="770" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/e77bb361661d457b9b2e187b_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="769"></span><span class="infoimagetitle" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Hong Bin Building Halal Restaurant</span></span></div><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Founded in 1853, Hong Bin Lou is a time-honored Muslim restaurant and stands out for its many distinguished visitors, </span><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">such as the former Chinese leader Zhou Enlai and former British Prime Minister Edward Heath</span></strong><span data-dcnode-id="761" instrument_node="">. The pleasant ambiance, unique decorations, and tasty and nutritious food and snacks attract visitors from all over the world.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Hong Bin Building mainly offers a variety of Muslim dishes, such as braised oxtail and sautéed ox tripe with coriander.</span></p><span data-dcnode-id="756" instrument_node="">
</span><ul class="infolist" data-dcnode-id="739"><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Recommended dishes: braised beef tendon in brown sauce, fried fruit roll with sugar, fried peeled prawns with chili and peanuts, mutton kebab, sautéed sea cucumber with green onion, deep-fried squirrel-shaped mandarin fish in sweet and sour sauce.</span></li><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Price: from 160 yuan per person</span></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Open: 11:00am–2:00pm and 5:00–9:00pm</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Address: 11 Exhibition Road, Xicheng District</span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Booking tel.: 10 6899 4560 / 2569</span></li><span data-dcnode-id="740" instrument_node="">
</span></ul><span data-dcnode-id="738" instrument_node="">

</span><h3 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">19. Dong Lai Shun (Wangfujing)</span></h3><span data-dcnode-id="719" instrument_node="">
</span><div class="infoimage" data-dcnode-id="715"><img alt="" class="img-responsive" data-dcnode-id="718" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/b0349c6058654991a19b703e_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Dong Lai Shun mutton hot pot</span></span></div><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="713" instrument_node="">Dong Lai Shun Muslim restaurant has dozens of branches around Beijing city and is famous for its hundred-year-plus history. </span><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">It primarily serves Muslim food and people come here to enjoy its rendition of Mongolian hotpot in particular</span></strong><span data-dcnode-id="710" instrument_node="">.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">The restaurant is also popular because of its perfect combination of Muslim architecture and a quadrangle courtyard, the beautiful antique ornaments, and the soft lighting that creates a comfortable atmosphere.</span></p><span data-dcnode-id="705" instrument_node="">
</span><ul class="infolist" data-dcnode-id="688"><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Recommended dishes: mutton kebab, mutton cut by hand, pickled sweet garlic, sesame seed cake, plum juice, sliced tripe, beef hot pot, fried chopped rice cake</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Price: from 120 yuan per person</span></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Open: 11:00am–9:00pm</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Address: Floor 5, Beijing APM, Wangfujing Street, Dongcheng District</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Booking tel.: 10 6528 0932</span></li><span data-dcnode-id="689" instrument_node="">
</span></ul><span data-dcnode-id="687" instrument_node="">
</span><h3 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">20. Baikui Old Brand (Baikui Laohao)</span></h3><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">This popular restaurant, with a history of more than 100 years, is famed for its braised mutton. The dishes there have an authentic taste and </span><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">the restaurant serves nearly 200 types of Muslim food from all over the country</span></strong><span data-dcnode-id="680" instrument_node="">. Those who love Muslim snacks will enjoy a variety of fine colors and flavors.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">The main restaurant branch at Jiaodaokou has a Tibetan-like appearance, is brightly colored, and has huge windows.</span></p><span data-dcnode-id="675" instrument_node="">
</span><ul class="infolist" data-dcnode-id="658"><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Recommended dishes: fried butter cake, sweetbread soup, sautéed tripe, pea flour cake, seasoned millet mush, fried cake, and fermented bean drink</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Price: from 50 yuan per person</span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Open: 6:00am–9:00pm</span></li><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Address: 158 Jiaodaokou South Avenue, Dongcheng District</span></li><span data-dcnode-id="662" instrument_node="">
