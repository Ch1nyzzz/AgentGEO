</span><h2 data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">History of Lama Temple</span></h2><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1279" instrument_node="">Lama temple was built in </span><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">A.D. 1694</span></strong><span data-dcnode-id="1276" instrument_node="">, the 33rd year during the reign of Emperor Kangxi in the Qing Dynasty (A.D 1644 - 1911). It was originally </span><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">the residence of Prince Yong</span></strong><span data-dcnode-id="1273" instrument_node=""> (the fourth son of Emperor Kangxi) and half of it was </span><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">converted to a lamasery</span></strong><span data-dcnode-id="1270" instrument_node=""> after Prince Yong ascended the throne. In A.D. 1735 when Emperor Yongzheng passed away, his coffin was placed in the temple. The next Emperor Qianlong ordered to change the turquoise tiles of the main halls in Lama Temple to yellow tiles. This has greatly enhanced its status because yellow is the color exclusive to emperors at that time. In A.D. 1744, Yonghe Temple was transformed into a formal Tibetan Buddhist temple and became the center of lama administration of the Qing government. It was open to the public in 1981, and in 1983, it was designated by the State Council of China as the </span><strong data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">national key Buddhist temple</span></strong><span data-dcnode-id="1267" instrument_node=""> in the Han nationality area. </span></p><span data-dcnode-id="1265" instrument_node="">
</span><h2 data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Location of Lama Temple Beijing</span></h2><span data-dcnode-id="1262" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1214"><span data-dcnode-id="1261" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="1226"><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Lama Temple is located at #12 Yonghegong Street, Dongcheng District (北京市东城区雍和宫大街12号), within 2nd Ring Road, near the northeastern corner of Dongcheng District.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1253"><strong data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">From Tian'anmen Square (Beijing Center):</span></strong><span data-dcnode-id="1254" instrument_node=""> about 6km, 30 minutes’ drive</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1248"><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">From the Forbidden City:</span></strong><span data-dcnode-id="1249" instrument_node=""> about 5km, 25 minutes’ drive</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1243"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">From the Temple of Heaven:</span></strong><span data-dcnode-id="1244" instrument_node=""> about 7km, 40 minutes’ drive</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1238"><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">From the Summer Palace:</span></strong><span data-dcnode-id="1239" instrument_node=""> about 19km, 45 minutes’ drive</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1233"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">From Beijing South Railway Station:</span></strong><span data-dcnode-id="1234" instrument_node=""> about 18km, 40 minutes’ drive</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1228"><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">From Beijing Capital International Airport:</span></strong><span data-dcnode-id="1229" instrument_node=""> about 25km, 50 minutes’ drive</span></p><span data-dcnode-id="1227" instrument_node="">
</span></div><span data-dcnode-id="1225" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="1216"><span data-dcnode-id="1224" instrument_node="">
</span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/Lama-Temple-Location-Map.jpg" rel="gallery"><span data-dcnode-id="1223" instrument_node=""> </span><img alt="Lama Temple" data-dcnode-id="1222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/Lama-Temple-Location-Map.jpg&amp;raw"></a><span data-dcnode-id="1220" instrument_node="">
</span><span class="img_p" data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Lama Temple Location Map (Click to Enlarge)</span></span><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span></div><span data-dcnode-id="1213" instrument_node="">
</span><span data-dcnode-id="1211" instrument_node="">
</span><h2 data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Lama Temple Layout</span></h2><span data-dcnode-id="1208" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1170"><span data-dcnode-id="1207" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="1182"><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1205" instrument_node="">Lama Temple covers an area of </span><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">6.6 hectares</span></strong><span data-dcnode-id="1202" instrument_node=""> with 661 rooms, of which 238 are Buddhist halls. Previous a prince residence and later a lama temple, it has a unique architectural style </span><strong data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">integrating the architectural art of the Han, Manchu and Mongolian nationalities</span></strong><span data-dcnode-id="1199" instrument_node="">. Lama Temple is basically a symmetrical complex facing south with five main halls and 7 courtyards in the middle axis and various side halls on both sides.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><h3 data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Highlighting Sights at Lama Temple</span></h3><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">The five magnificent main halls with their side halls, Buddhist sculptures, stone carvings, and tablets in different languages are the highlights of Lama Temple. The halls below are introduced in a location order from south to north.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1188"><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/beijing-tours/beijing-walking-tour.html"><span data-dcnode-id="1190" instrument_node="">&gt;&gt;3 Days Beijing Walking Tour</span></a></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1184"><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/beijing-tours/5-days-experience-the-real-hutong-life-of-beijing.html"><span data-dcnode-id="1186" instrument_node="">&gt;&gt;5 Days Experience the Real Hutong Life of Beijing</span></a></p><span data-dcnode-id="1183" instrument_node="">
</span></div><span data-dcnode-id="1181" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="1172"><span data-dcnode-id="1180" instrument_node="">
</span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/Yonghegong-map.jpg" rel="gallery"><span data-dcnode-id="1179" instrument_node=""> </span><img alt="Lama Temple" data-dcnode-id="1178" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/Yonghegong-map-small.jpg&amp;raw"></a><span data-dcnode-id="1176" instrument_node="">
</span><span class="img_p" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Lama Temple Tourist Map (Click to Enlarge)</span></span><span data-dcnode-id="1173" instrument_node="">
</span></div><span data-dcnode-id="1171" instrument_node="">
</span></div><span data-dcnode-id="1169" instrument_node="">
</span><h4 data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Gate Hall of Harmony and Peace (Yonghe Gate Hall 雍和门殿)</span></h4><span data-dcnode-id="1166" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1141"><span data-dcnode-id="1165" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="1151"><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1163" instrument_node="">Gate Hall of Harmony and Peace used to be the entrance of Yonghe Temple, then later was reconstructed as Hall of Heavenly Kings (天王殿). A vivid bronze lion is guarding the gate. In the middle of the hall, you will see the </span><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">statue of Maitreya</span></strong><span data-dcnode-id="1160" instrument_node=""> with a smiling face sitting on a golden-lacquered carved with dragons. Behind the Maitreya is the armed Skanda, a protector of Buddhist monasteries. On the two sides of the hall, there are statues of </span><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Four Heavenly Kings</span></strong><span data-dcnode-id="1157" instrument_node=""> (four gods in Buddhism that guard the north, west, east, and south of the world) stepping on monsters, showing their duty in suppressing evil spirits and protecting the world. In the north of Yonghe Gate Hall stands the Imperial Stele Pavilion. There is a stone tablet called </span><i data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">The Discourse of Lama</span></i><span data-dcnode-id="1154" instrument_node=""> written by Emperor Qianlong and inscribed in Manchu, Han, Mongolian, and Tibetan languages.</span></p><span data-dcnode-id="1152" instrument_node="">
</span></div><span data-dcnode-id="1150" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="1143"><span data-dcnode-id="1149" instrument_node="">
</span><img alt="Lama Temple" data-dcnode-id="1148" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/yonghe-gate-hall.jpg&amp;raw"><span data-dcnode-id="1147" instrument_node="">
</span><span class="img_p" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Gate Hall of Harmony and Peace</span></span><span data-dcnode-id="1144" instrument_node="">
</span></div><span data-dcnode-id="1142" instrument_node="">
</span></div><span data-dcnode-id="1140" instrument_node="">
</span><h4 data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Hall of Harmony and Peace (Yonghegong Hall 雍和宫殿)</span></h4><span data-dcnode-id="1137" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1109"><span data-dcnode-id="1136" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="1119"><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1134" instrument_node="">Hall of Harmony and Peace, formerly known as Yin'an Hall, used to be the place where Prince Yong met officials. After being converted to Lama Temple, it was equivalent to the Great Buddha's Hall of general monasteries. In the due north of the hall are 3 bronze Buddha as high as 2m. They are: </span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Shakyamuni Buddha</span></strong><span data-dcnode-id="1131" instrument_node=""> (the Buddha of the Present) in the middle, </span><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Dipamkara Buddha</span></strong><span data-dcnode-id="1128" instrument_node=""> (the Buddha of the Past) on the left, and </span><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Maitreya Buddha</span></strong><span data-dcnode-id="1125" instrument_node=""> (the Buddha of the future) on the right. These 3 Buddha indicate that Buddhism has a long history and life span from the ancient past to the infinite future. Avalokitesvara (the goddess of mercy) is worshipped in the northeast and a standing statue of Maitreya is in the northwest. In the courtyard in front of Yonghegong Hall, there is a 1.5m tall bronze </span><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Sumeru</span></strong><span data-dcnode-id="1122" instrument_node="">. It is a famous mountain in ancient Indian mythology and is said to be the center of the world. In Buddhism, Sumeru is the highest mountain and also where Sakyamuni preaches.
</span></p><span data-dcnode-id="1120" instrument_node="">
</span></div><span data-dcnode-id="1118" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="1111"><span data-dcnode-id="1117" instrument_node="">
</span><img alt="Lama Temple" data-dcnode-id="1116" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/Shakyamuni-Buddha.jpg&amp;raw"><span data-dcnode-id="1115" instrument_node="">
</span><span class="img_p" data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Shakyamuni Buddha at Yonghegong Hall</span></span><span data-dcnode-id="1112" instrument_node="">
</span></div><span data-dcnode-id="1110" instrument_node="">
</span></div><span data-dcnode-id="1108" instrument_node="">
</span><h4 data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Hall of Everlasting Protection (Yongyou Hall 永佑殿)</span></h4><span data-dcnode-id="1105" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1086"><span data-dcnode-id="1104" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="1096"><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1102" instrument_node="">When Prince Yong lived in Yonghe Temple, Hall of Everlasting Protection was his study and bedroom. Then it became a place to enshrine the late emperors of the Qing Dynasty. Yongyou Hall seems like consisting of five rooms looking from the outside, but actually </span><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">each one of the five is combined with two rooms</span></strong><span data-dcnode-id="1099" instrument_node="">. So there are 10 rooms in total. In the center of the hall, there are three 2.35m tall sandalwood statues, which are the Buddha of Immeasurable Life (Amitabha) in the middle, Bhaisajya Guru (Medicine Buddha) on the left and Simhanada Buddha (a kind of powerful and noble Buddha) on the right.
</span></p><span data-dcnode-id="1097" instrument_node="">
</span></div><span data-dcnode-id="1095" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="1088"><span data-dcnode-id="1094" instrument_node="">
</span><img alt="Lama Temple" data-dcnode-id="1093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/yongyou-hall.jpg&amp;raw"><span data-dcnode-id="1092" instrument_node="">
</span><span class="img_p" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Hall of Everlasting Protection</span></span><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1087" instrument_node="">
</span></div><span data-dcnode-id="1085" instrument_node="">
</span><h4 data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Hall of the Wheel of the Law (Falun Hall 法轮殿)</span></h4><span data-dcnode-id="1082" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1060"><span data-dcnode-id="1081" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="1070"><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1079" instrument_node="">Hall of the Wheel of the Law is the </span><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">quintessence of Han and Tibetan cultures</span></strong><span data-dcnode-id="1076" instrument_node="">. In the middle of the hall, a smiling 6.1-meter-high bronze Buddha sits on a huge lotus-shaped terrace. It is Tsongkhapa, the founder of the Yellow Hat (Gelug) sect of Tibetan Buddhism. Built in 1924, it took 200,000 silver kuping taels (worth about $5 million US Dollars in 2015) and two years to finish the work. Behind the statue is the </span><strong data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Mountain of 500 Arhats</span></strong><span data-dcnode-id="1073" instrument_node="">, which is known as one of the three greatest woodcarvings in Lama Temple. It is nearly 5 meters high, 3.5 meters long and 30 centimeters thick. The whole mountain body is carved from rosewood, on which are 500 arhats made of gold, silver, copper, iron and tin in different postures.
</span></p><span data-dcnode-id="1071" instrument_node="">
</span></div><span data-dcnode-id="1069" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="1062"><span data-dcnode-id="1068" instrument_node="">
</span><img alt="Lama Temple" data-dcnode-id="1067" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/falun-hall-3.jpg&amp;raw"><span data-dcnode-id="1066" instrument_node="">
</span><span class="img_p" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Glazed Pagoda on the Top of Falun Hall</span></span><span data-dcnode-id="1063" instrument_node="">
</span></div><span data-dcnode-id="1061" instrument_node="">
</span></div><span data-dcnode-id="1059" instrument_node="">
</span><h4 data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Pavilion of Ten Thousand Happiness (Wanfuge Pavilion 万福阁)</span></h4><span data-dcnode-id="1056" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="1034"><span data-dcnode-id="1055" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="1044"><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1053" instrument_node="">Out of Falun Hall is the Pavilion of Ten Thousand Happiness, which is 25 meters high and has three storeies. Yongkang Pavilion and Yansui Pavilion are on its two sides connected by overhead corridors. In the hall, a </span><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">giant Maitreya Buddha</span></strong><span data-dcnode-id="1050" instrument_node=""> stands upright. It is carved by a whole 26m precious white sandalwood tree which is a tribute gift from the 7th Dalai Lama. The Buddha is </span><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">8 meters wide and 18 meters high</span></strong><span data-dcnode-id="1047" instrument_node=""> (the other 8m of the tree is underground). It is said that Emperor Qianlong spent 80,000 silver kuping taels (worth about $2 million US Dollars in 2015) in carving the Buddha. It is also one of the three greatest woodcarvings in Lama Temple. The other one is in the Zhaofo Building in front of Wanfuge Pavilion. It is a Buddha niche made of stale-proof Nanmu (a kind of valuable Chinese wood) and carved with 99 lifelike dragons in an openwork technique. </span></p><span data-dcnode-id="1045" instrument_node="">
</span></div><span data-dcnode-id="1043" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="1036"><span data-dcnode-id="1042" instrument_node="">
</span><img alt="Lama Temple" data-dcnode-id="1041" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/nanmu-buddha.jpg&amp;raw"><span data-dcnode-id="1040" instrument_node="">
</span><span class="img_p" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Towering Nanmu Buddha</span></span><span data-dcnode-id="1037" instrument_node="">
</span></div><span data-dcnode-id="1035" instrument_node="">
</span></div><span data-dcnode-id="1033" instrument_node="">
</span><h2 data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Buddhist Activities Held in Lama Temple</span></h2><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Lama Temple remains a significant role in Tibetan Buddhism. Every year, there will be several Buddhist activities to celebrate the New Year, pay tribute to Buddha, and commemorate important figures such as Panchen Lama and Tsongkhapa. Among them, the Spring Festival Ceremony Dharma Assembly and Great Wish Invocation Dharma Assembly are the grandest.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="980"><span data-dcnode-id="1026" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="1000"><span data-dcnode-id="1025" instrument_node="">
</span><h3 data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Spring Festival Ceremony Dharma Assembly (喜迎新年大法会)</span></h3><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1021" instrument_node="">In China, </span><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">the first day of the first rural month</span></strong><span data-dcnode-id="1018" instrument_node=""> (usually in late January or early February) marks the beginning of a new year. On this day in the Qing Dynasty, Lama Temple would send 36 monks to chant sutras at Zhongzheng Hall in the Forbidden City. Nowadays, at two o'clock in the morning, the monks will get up and get to the main hall to recite the </span><i data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Yamantaka Sutra</span></i><span data-dcnode-id="1015" instrument_node=""> and the </span><i data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Palden Lhamo Sutra</span></i><span data-dcnode-id="1012" instrument_node=""> until dawn. Then accompanied by the deep bell tone, they cross the yards to Falun Hall and chant sutras to pray for peace and prosperity of the country and people. On this day, Lama Temple will be teemed with people coming here to pay respect for Buddha. They will light the incense, walk along the temple, and pray before the Buddha piously.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><h3 data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Great Wish Invocation Dharma Assembly (大愿祈祷法会)</span></h3><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">Great Wish Invocation Dharma Assembly is an important festival of the Gelug sect (adhere to monastic disciplines). In A.D. 1409, the renowned Tsongkhapa held this Dharma Assembly at Jokhang Temple in Lhasa in memory of Sakyamuni. Since then, it was held every year and became a common practice. In the late years of the Qing Dynasty Kangxi Period (A.D. 1662 - 1722), this activity was introduced to Beijing and got support from the imperial court. As a royal monastery, the Lama Temple began to hold this assembly every year. The Great Wish Invocation Dharma Assembly lasts from </span><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">the 23rd day of the first lunar month to the first day of the second lunar month</span></strong><span data-dcnode-id="1003" instrument_node="">, usually falls in some period from mid-February to mid-March. On the 29th day of the first lunar month and the last day of the festival, there will be religious dances to drive out the evil spirits.</span></p><span data-dcnode-id="1001" instrument_node="">
</span></div><span data-dcnode-id="999" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="982"><span data-dcnode-id="998" instrument_node="">
</span><img alt="Lama Temple" data-dcnode-id="997" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/new-year.jpg&amp;raw"><span data-dcnode-id="996" instrument_node="">
</span><span class="img_p" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">People Gather in Lama Temple on New Year's Day</span></span><span data-dcnode-id="993" instrument_node="">
</span><img alt="Lama Temple" data-dcnode-id="992" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/great-wish.jpg&amp;raw"><span data-dcnode-id="991" instrument_node="">
</span><span class="img_p" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Great Wish Invocation Dharma Assembly</span></span><span data-dcnode-id="988" instrument_node="">
</span><img alt="Lama Temple" data-dcnode-id="987" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/dances.jpg&amp;raw"><span data-dcnode-id="986" instrument_node="">
</span><span class="img_p" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Religious Dances with Masks on</span></span><span data-dcnode-id="983" instrument_node="">
</span></div><span data-dcnode-id="981" instrument_node="">
</span></div><span data-dcnode-id="979" instrument_node="">
</span><h2 data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">How to Get to Lama Temple</span></h2><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Located in the downtown area, Lama Temple is easily accessible both by subway and by bus.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="969"><strong data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Subway:</span></strong><span data-dcnode-id="970" instrument_node=""> Take Line 2 or Line 5 and get off at Yonghegong Station (雍和宫站)</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="964"><strong data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Bus:</span></strong><span data-dcnode-id="965" instrument_node=""> Take Bus 13, 684 to Guozijian Station (国子监站); or take Bus 116, 117 to Yonghegong Station (雍和宫站); or take Bus 18, 62, 606, 909, 44, 800, 858 to Yonghegongqiao Dong Station (雍和宫桥东站)
</span></p><span data-dcnode-id="963" instrument_node="">
</span><h3 data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Travel with China Discovery</span></h3><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="959" instrument_node="">As the route for public transportation is not fixed, please remember to double check before going there. If you want to save some time and avoid the transfer troubles, you can consider the tour packages provided by China Discovery. They will cover all the tickets, meals, accommodation, and transportation in your tour so that you can have a worry-free trip with a comfortable vehicle, skilled driver, and professional guide.</span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/about-us/contact-us.html" target="_blank"><span data-dcnode-id="958" instrument_node="">&gt;&gt;Contact us now </span></a></p><span data-dcnode-id="955" instrument_node="">
</span><h2 data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Attraction around Lama Temple</span></h2><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">There is still some distance between Lama Temple and other tourist sites like Tian’anmen Square, Forbidden City, Temple of Heaven, etc. If you still have some spare time after visiting the Lama Temple, the nearby Confucius Temple is a recommended place to go. </span></p><span data-dcnode-id="949" instrument_node="">
</span><h3 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Confucius Temple (孔庙)</span></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Opening hours:</span></strong><span data-dcnode-id="943" instrument_node=""> 8:30 - 17:00 (throughout the year)</span></p><span data-dcnode-id="941" instrument_node="">
</span><div class="row1 clearfix" data-dcnode-id="920"><span data-dcnode-id="940" instrument_node="">
</span><div class="col-lg-8" data-dcnode-id="930"><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="935"><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Entrance Fee:</span></strong><span data-dcnode-id="936" instrument_node=""> CNY 30
</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Confucius Temple is only 200m to the west of Lama Temple, so you can easily walk there. Confucius (551 – 479 B.C.) is considered as the greatest philosopher and educator in China’s history. As the name indicates, Confucius Temple is a place where Confucius was worshipped in the Yuan (A.D. 1271 - 1368), Ming (A.D. 1368 - 1644) and Qing Dynasties (A.D. 1644 - 1911). The temple covers an area of 22,000 square meters with the main buildings distributed along the central axis. Here you can learn a lot about this saint and his theories, and there is a group of stone tablets carved with 51,624 names, birthplaces and ranks of Jinshi (a title granted to the advanced scholars) in the three dynasties.</span></p><span data-dcnode-id="931" instrument_node="">
</span></div><span data-dcnode-id="929" instrument_node="">
</span><div class="col-lg-4 attraction-box1" data-dcnode-id="922"><span data-dcnode-id="928" instrument_node="">
</span><img alt="Confucius Temple" data-dcnode-id="927" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/assets/images/beijing/lama-temple/confucius-temple-768.jpg&amp;raw"><span data-dcnode-id="926" instrument_node="">
</span><span class="img_p" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Confucius Temple</span></span><span data-dcnode-id="923" instrument_node="">
</span></div><span data-dcnode-id="921" instrument_node="">
</span></div><span data-dcnode-id="919" instrument_node="">
</span><h2 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">How to Plan a Beijing Lama Temple Trip</span></h2><span data-dcnode-id="916" instrument_node="">
