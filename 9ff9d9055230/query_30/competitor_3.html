</span><h1 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Top 10 Beijing Street Food</span></h1><span data-dcnode-id="598" instrument_node="">

</span><div class="contcont" data-dcnode-id="324" id="zoom"><span data-dcnode-id="586" instrument_node="">

</span><span data-dcnode-id="582" instrument_node=""> </span><span data-dcnode-id="581" instrument_node=""> </span><span data-dcnode-id="580" instrument_node=""> </span><span data-dcnode-id="576" instrument_node=""> </span><span data-dcnode-id="574" instrument_node=""> </span><span data-dcnode-id="573" instrument_node=""> </span><span data-dcnode-id="568" instrument_node=""> </span><span data-dcnode-id="566" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="564"><tbody data-dcnode-id="565"><tr data-dcnode-id="575"><td align="center" data-dcnode-id="577"><span data-dcnode-id="578"><img alt="Various Snacks in Beijing" data-dcnode-id="579" height="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2013/beijing-snack.jpg&amp;raw" style="display: block;" width="320"></span></td></tr><tr data-dcnode-id="567"><td align="center" data-dcnode-id="569" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="570"><span data-dcnode-id="571" style="font-weight: normal;"><span data-dcnode-id="572" instrument_node="">Various Snacks in Beijing</span></span></span></td></tr></tbody></table><p align="justify" data-dcnode-id="558"><span data-dcnode-id="563" instrument_node="">Having a long history, Beijing street food win universal praise for their wide varieties, superior materials and careful preparation. They combine the snacks of many ethnic groups such as Han, Hui, Mongol and Manchu, as well as Ming and Qing palace snacks.&nbsp;</span><br data-dcnode-id="562"><br data-dcnode-id="561"><img alt="" data-dcnode-id="560" height="17" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="14"><span data-dcnode-id="559" instrument_node="">&nbsp;Tourists can enjoy delicious Beijing snacks while having a taste of the hawking culture along snack streets in this city. The following are the top&nbsp;10 Beijing&nbsp;steet food&nbsp;guide recommended by TravelChinaGuide:</span></p><span data-dcnode-id="557" instrument_node="">&nbsp;</span><p data-dcnode-id="556"></p><p data-dcnode-id="555"></p><div class="subTitle2017" data-dcnode-id="551"><h2 class="h2_01" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">1. Fried-pouch Roll</span></h2><span data-dcnode-id="552" instrument_node="">(dā lián huǒ shāo)</span></div><span data-dcnode-id="550" instrument_node="">It is a pouch-shaped crispy-skinned roll filled with different fillings, including traditional taste of pork with scallion, pork with leek and pork with fennel, etc. Reasonably priced, it is one of a popular Beijing&nbsp;street food&nbsp;in this city. If you like pan-fried dumplings, you might also love this.</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">&nbsp;</span><p data-dcnode-id="547"></p><p data-dcnode-id="546"></p><div class="subTitle2017" data-dcnode-id="542"><h2 class="h2_01" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">2. Cream Fried Cake</span></h2><span data-dcnode-id="543" instrument_node="">(nǎi yóu zhá gāo)</span></div><span data-dcnode-id="541" instrument_node="">Cream Fried Cakes are made of flour, egg, cream, white sugar and vanilla powder. The dough is made with boiling water, so cakes usually bulge into a ball shape after frying in the oil. They are scooped up when they turn golden in color and finally covered with white sugar. It is a nutritious&nbsp;Beijing snack.</span><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">&nbsp;</span><p data-dcnode-id="538"></p><p data-dcnode-id="537"></p><div class="subTitle2017" data-dcnode-id="533"><h2 class="h2_01" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">3. Glutinous Rice Roll with Sweet Bean Flour</span></h2><span data-dcnode-id="534" instrument_node="">(lǘ dǎ gǔn)</span></div><span data-dcnode-id="532" instrument_node="">As one of the old special&nbsp;Beijing street&nbsp;food&nbsp;in this city, it is sweet and glutinous with a strong taste of soybean flour. The ingredients include rhubarb rice flour, sweetened bean paste, white sugar, sesame oil, sweet osmanthus and nuts. Literally, the Chinese name means a donkey rolls on the ground, which vividly describes the process of rolling the stuffed rolls in bean flour.&nbsp;</span><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">&nbsp;</span><p data-dcnode-id="529"></p><p data-dcnode-id="528"></p><div class="subTitle2017" data-dcnode-id="524"><h2 class="h2_01" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">4. Cooked Beef or Sheep Tripe</span></h2><span data-dcnode-id="525" instrument_node="">(bào dǔ)</span></div><span data-dcnode-id="523" instrument_node="">Cooked Beef or Sheep Tripe is a famous food in </span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/wangfujing-snack-street.htm"><span data-dcnode-id="522" instrument_node="">Wangfujing Snack Street</span></a><span data-dcnode-id="520" instrument_node="">,&nbsp; where most of the restaurants offering it are run by Hui people. The preparation of this delicious&nbsp;Beijing traditional street&nbsp;food&nbsp;is very simple: firstly, wash the fresh tripe clean and cut it into strips, then cook them in boiling water. Generally, they are eaten with great relish with an array of dipping sauces including oil, sesame paste, vinegar, capsicol, preserved bean curd soup, caraway and chopped green onion.</span><br data-dcnode-id="519"><span data-dcnode-id="518" instrument_node="">&nbsp;</span><p data-dcnode-id="517"></p><p data-dcnode-id="516"></p><div class="subTitle2017" data-dcnode-id="512"><h2 class="h2_01" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">5. Fried Liver</span></h2><span data-dcnode-id="513" instrument_node="">(chǎo gān)</span></div><span data-dcnode-id="511" instrument_node="">It has a long history dating back to the Song Dynasty (960 AD - 1279 AD). It is basically made of pork liver and intestines, with a blend of garlic, bamboo shoot, celery, carrot, and potato starch solution. It is called fried liver, but it is really just like a thick soup.&nbsp;This&nbsp;Beijing traditional street food is a good choice to eat for breakfast with the steamed stuffed buns.</span><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">&nbsp;</span><p data-dcnode-id="508"></p><p data-dcnode-id="507"></p><span data-dcnode-id="506" instrument_node=""> </span><span data-dcnode-id="505" instrument_node=""> </span><span data-dcnode-id="504" instrument_node=""> </span><span data-dcnode-id="501" instrument_node=""> </span><span data-dcnode-id="499" instrument_node=""> </span><span data-dcnode-id="498" instrument_node=""> </span><span data-dcnode-id="492" instrument_node=""> </span><span data-dcnode-id="490" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="488"><tbody data-dcnode-id="489"><tr data-dcnode-id="500"><td align="center" data-dcnode-id="502"><img alt="Popular Street Food" data-dcnode-id="503" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2013/beijing-food-street.jpg&amp;raw" style="width: 320px; height: 226px; display: block;"></td></tr><tr data-dcnode-id="491"><td align="center" data-dcnode-id="493" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="496" style="font-weight: normal;"><span data-dcnode-id="497" instrument_node="">Popular Street&nbsp;</span></span><span data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Food</span></span></td></tr></tbody></table><div class="subTitle2017" data-dcnode-id="484"><h2 class="h2_01" data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">6. Yellow Pea Cake</span></h2><span data-dcnode-id="485" instrument_node="">(wān dòu huáng)</span></div><span data-dcnode-id="483" instrument_node="">As a traditional folk snack, Yellow Pea Cake was introduced to the Qing Court (1644 AD - 1911 AD) and it was famous for being favored by Empress Dowager Cixi. The main ingredient being fine peas, it is a seasonal snack usually offered in spring. The pieces of cake taste very pleasant and smooth, cool and refreshing, and it is so soft that it just melts in the mouth.</span><br data-dcnode-id="482"><span data-dcnode-id="481" instrument_node="">&nbsp;</span><p data-dcnode-id="480"></p><p data-dcnode-id="479"></p><div class="subTitle2017" data-dcnode-id="475"><h2 class="h2_01" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">7. Steamed Pork Dumplings</span></h2><span data-dcnode-id="476" instrument_node="">(shāo mài)</span></div><span data-dcnode-id="474" instrument_node="">Being different from small steamed buns, the Steamed Pork Dumplings have a unique shape with the top open, like a pomegranate. Traditionally, fillings can be mix of lean meat, radish, Chinese cabbage and fish sauce, but there are also vegetarian ones offered in some restaurants. The steamed dumplings taste delicious especially with vinegar and the minced garlic.&nbsp;</span><br data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">&nbsp;</span><p data-dcnode-id="471"></p><p data-dcnode-id="470"></p><div class="subTitle2017" data-dcnode-id="466"><h2 class="h2_01" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">8. Steamed Rice Cakes with Sweet Stuffing</span></h2><span data-dcnode-id="467" instrument_node="">(ài wō wo)</span></div><span data-dcnode-id="465" instrument_node="">As one of the traditional local snack of Beijing, it is made of sticky rice with fillings of sesame seeds, peach kernels, shelled melon seeds, green plum and sugar. The ball-shaped white cakes taste sticky and soft, and can be found in&nbsp;the&nbsp;city&nbsp;all the year round.&nbsp;</span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">&nbsp;</span><p data-dcnode-id="462"></p><p data-dcnode-id="461"></p><div class="subTitle2017" data-dcnode-id="457"><h2 class="h2_01" data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">9. Sachima</span></h2><span data-dcnode-id="458" instrument_node="">(shā qí mǎ)</span></div><span data-dcnode-id="456" instrument_node="">Sachima, also spelled Shaqima, is originated from a kind of Manchu pastry, which is now regarded as one of the most famous local pastries served at all seasons. The making of this snack is simple: add eggs into the flour, roll the pasta into noodles, and then fry them until they turn to a golden color; and finally, mix the cool noodles thoroughly with the syrup of white sugar, honey and cream. It should be solidified before cutting into squares.</span><br data-dcnode-id="455"><span data-dcnode-id="454" instrument_node="">&nbsp;</span><p data-dcnode-id="453"></p><p data-dcnode-id="452"></p><div class="subTitle2017" data-dcnode-id="448"><h2 class="h2_01" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">10. Seasoned Millet Porridge</span></h2><span data-dcnode-id="449" instrument_node="">(miàn chá)</span></div><span data-dcnode-id="447" instrument_node="">This porridge is usually made of millet or broom corn millet flour, and drizzles with diluted sesame paste and spiced salt. Although the porridge is made with those simple ingredients, it is not easy to cook it well. The cook must be patient and keep stirring the porridge carefully until it thickens. It is a very good breakfast choice in winter.</span><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">&nbsp;
</span><div class="box_blue" data-dcnode-id="387"><p class="c_title_ico_dinning" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Traditional Beijing Food:</span></p><ul data-dcnode-id="406"><span data-dcnode-id="442" instrument_node=""> </span><li data-dcnode-id="439"><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/duck.htm"><span data-dcnode-id="441" instrument_node="">Beijing Roast Duck</span></a></li><span data-dcnode-id="438" instrument_node=""> </span><li data-dcnode-id="435"><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/roastduck/"><span data-dcnode-id="437" instrument_node="">Quanjude Roast Duck Restaurant</span></a></li><span data-dcnode-id="434" instrument_node=""> </span><li data-dcnode-id="431"><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/roastduck/bianyifang.htm"><span data-dcnode-id="433" instrument_node="">Top 10 Peking Duck Restaurants</span></a></li><span data-dcnode-id="430" instrument_node=""> </span><li data-dcnode-id="427"><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/beijing-cuisine.htm"><span data-dcnode-id="429" instrument_node="">Beijing Cuisine</span></a></li><span data-dcnode-id="426" instrument_node=""> </span><li data-dcnode-id="423"><a data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/beijing-food.htm"><span data-dcnode-id="425" instrument_node="">15 Must-eat Beijing Foods</span></a></li><span data-dcnode-id="422" instrument_node=""> </span><li data-dcnode-id="419"><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=h </span><div data-dcnode-id="120" fromtype="0" id="answers" isload="true" n="3" pageid="5103" typeid="1" v="5103"><form action="https://answers.travelchinaguide.com/search.aspx" class="qa-search" data-dcnode-id="289" id="formcommentsearch" method="post" name="formcommentsearch" style="display:'+(typeof o.attr('noSearch')!='undefined'?'none':'block')+';" target="_blank"><span data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Q &amp; A Search:</span></span><input class="qa-search-text" data-dcnode-id="293" id="txtcommentsearchkeywords" name="txtcommentsearchkeywords" size="50" type="text" validate="{text:'Sorry, please enter the key words.'}" value=""><span data-dcnode-id="292" instrument_node=""> </span><input data-dcnode-id="291" id="txtpageid" name="txtpageid" type="hidden" value="2156"><input class="qa-search-btn" data-dcnode-id="290" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-qa-search.gif&amp;raw" type="image"></form><div class="qa-title" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Questions &amp; Answers on Top 10 Beijing Street Food</span></div><a data-dcnode-id="286" id="voice" name="voice"></a><div class="qa-list" data-dcnode-id="155"><div class="qa-list-q-item" data-dcnode-id="247" id="qa723095" idx="0"><div class="qa-list-q-info" data-dcnode-id="277"><span data-dcnode-id="285" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="283" val="0"><span data-dcnode-id="284" instrument_node="">hkd</span></font><span data-dcnode-id="282" instrument_node=""> from PHILIPPINES | Jul. 09, 2019 04:52</span><span data-dcnode-id="279" idx="723095" un="hkd"><img data-dcnode-id="281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="280" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="278"></div></div><div class="qa-list-q-title" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Hi I'am staying at Beijing Longzhaoshu Hotel near fenzhongsi subway </span></div><div class="qa-list-q-content" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">what line should i take if i want to experience night market and street food also where is it located?</span></div><div class="qa-list-a" data-dcnode-id="248"><div class="qa-list-a-title" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="249" id="qa-list-a-item-615884" val="615884"><div class="qa-list-a-info" data-dcnode-id="254"><span data-dcnode-id="270" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="268" val="0"><span data-dcnode-id="269" instrument_node="">Samuel </span></font><span data-dcnode-id="267" instrument_node=""> from USA  | Jul. 09, 2019 19:57</span><div class="replyAction" data-dcnode-id="257" idx="0"><span class="good" data-dcnode-id="264"><img data-dcnode-id="266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="265" instrument_node="">0</span></span><span class="bad" data-dcnode-id="261"><img data-dcnode-id="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="262" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="258" idx="723095" un="hkd"><img data-dcnode-id="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="259" instrument_node="">Reply</span></span></div><br data-dcnode-id="256"><br data-dcnode-id="255"></div><div class="clear" data-dcnode-id="253"></div><span data-dcnode-id="252" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Maybe you can go to Gui Street where you can enjoy night market and street food. It is located in Dongzhimen area. Take metro Line 10 from Fenzhongsi Station to Songjiazhuang Station, then transfer to metro Line 5 to North Xinqiao Station (Exit B), and walk east of 700m to it. It takes around 40 minutes with CNY5. </span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="202" id="qa491089" idx="1"><div class="qa-list-q-info" data-dcnode-id="238"><span data-dcnode-id="246" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="244" val="0"><span data-dcnode-id="245" instrument_node="">Felicia</span></font><span data-dcnode-id="243" instrument_node=""> from PHILIPPINES | Sep. 20, 2015 10:19</span><span data-dcnode-id="240" idx="491089" un="Felicia"><img data-dcnode-id="242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="241" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="239"></div></div><div class="qa-list-q-title" data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Please help with food in Beijing</span></div><div class="qa-list-q-content" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">I don't eat any other meat except for chicken. Please tell me some best chicken or vegeterian dish that I can eat and where can I get those?I dont understand Chinese at all. How will I explain to them? :(</span></div><div class="qa-list-a" data-dcnode-id="203"><div class="qa-list-a-title" data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="204" id="qa-list-a-item-409981" val="409981"><div class="qa-list-a-info" data-dcnode-id="215"><span data-dcnode-id="231" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="229" val="0"><span data-dcnode-id="230" instrument_node="">Adele</span></font><span data-dcnode-id="228" instrument_node=""> from CHINA | Sep. 21, 2015 03:49</span><div class="replyAction" data-dcnode-id="218" idx="0"><span class="good" data-dcnode-id="225"><img data-dcnode-id="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="226" instrument_node="">2</span></span><span class="bad" data-dcnode-id="222"><img data-dcnode-id="224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="223" instrument_node="">1</span></span><span class="btn-qa-reply2" data-dcnode-id="219" idx="491089" un="Felicia"><img data-dcnode-id="221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="220" instrument_node="">Reply</span></span></div><br data-dcnode-id="217"><br data-dcnode-id="216"></div><div class="clear" data-dcnode-id="214"></div><span data-dcnode-id="213" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="205"><span data-dcnode-id="212" instrument_node="">Stewed Chicken in Pot and Big Plate Chicken in Spicy Sauce are recommended. </span><br data-dcnode-id="211"><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">There are many great veg. foods worth a try. You can go to the famous veg. resto Godly for a try. It is located at no. 2, East Qianmen, Chongwen District. </span><br data-dcnode-id="208"><br data-dcnode-id="207"><span data-dcnode-id="206" instrument_node="">Show the Chinese characters to the waiter for chicken food: 请问你们有什么鸡肉特色菜? For veg. food, 我是素食主义者，你们有什么好吃的素菜？</span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="156" id="qa426700" idx="2"><div class="qa-list-q-info" data-dcnode-id="192"><span data-dcnode-id="201" instrument_node="">Asked by </span><font class="uname1" data-dcnode-id="198" val="65865"><a data-dcnode-id="199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.travelchinaguide.com/inc/jumpto.asp%3Fu%3D65865" target="_blank"><span data-dcnode-id="200" instrument_node="">SAULORTAL</span></a></font><span data-dcnode-id="197" instrument_node=""> | Sep. 28, 2014 13:03</span><span data-dcnode-id="194" idx="426700" un="SAULORTAL"><img data-dcnode-id="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="195" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="193"></div></div><div class="qa-list-q-title" data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Night food market in Beijing</span></div><div class="qa-list-q-content" data-dcnode-id="186"><span data-dcnode-id="189" instrument_node="">Hi I will be staying near Dongsi subway station and I would like to go to one of the night food markets and I was wondering if you know anyone close to that area ?</span><br data-dcnode-id="188"><span data-dcnode-id="187" instrument_node="">The hotel is near Wangfujing stret</span></div><div class="qa-list-a" data-dcnode-id="157"><div class="qa-list-a-title" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="158" id="qa-list-a-item-340401" val="340401"><div class="qa-list-a-info" data-dcnode-id="167"><span data-dcnode-id="183" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="181" val="0"><span data-dcnode-id="182" instrument_node="">Judie</span></font><span data-dcnode-id="180" instrument_node=""> from PHILIPPINES | Sep. 28, 2014 22:08</span><div class="replyAction" data-dcnode-id="170" idx="0"><span class="good" data-dcnode-id="177"><img data-dcnode-id="179" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="178" instrument_node="">5</span></span><span class="bad" data-dcnode-id="174"><img data-dcnode-id="176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="175" instrument_node="">1</span></span><span class="btn-qa-reply2" data-dcnode-id="171" idx="426700" un="SAULORTAL"><img data-dcnode-id="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="172" instrument_node="">Reply</span></span></div><br data-dcnode-id="169"><br data-dcnode-id="168"></div><div class="clear" data-dcnode-id="166"></div><span data-dcnode-id="165" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="159"><span data-dcnode-id="164" instrument_node="">Hi, may I know your hotel's detail address?</span><br data-dcnode-id="163"><span data-dcnode-id="162" instrument_node="">As I know, there is a night food market named "Donghuamen Delicious Food Market". You can just take a taxi to there.And this place is near to the Wangfujing Street. </span><br data-dcnode-id="161"><span data-dcnode-id="160" instrument_node="">Or you can go to Guijie Street near Dongsi subway station. There are lots of delicious food in the market. </span></div></div></div></div></div><div class="qa-more" data-dcnode-id="152"><a class="a_b_btn" data-dcnode-id="153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//answers.travelchinaguide.com/beijing-10109.htm" target="_blank"><span data-dcnode-id="154" instrument_node="">More Questions &amp; Answers</span></a></div><div class="videoLoadingCont
