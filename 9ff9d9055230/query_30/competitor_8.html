</span><p data-dcnode-id="1160"><em data-dcnode-id="1161"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">EDITOR’S NOTE:</span></strong><span data-dcnode-id="1162" instrument_node=""> Traveleater BJ Macatulad has been living in Shanghai for over 15 years and spills the beans on what dishes to eat on your next visit to Shanghai.</span></em></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">After many years living in Shanghai, there are now very few culinary delights that I’m not able to track down in my adopted city. This is because all manner of chefs and cooks from the farthest corners of China and the world come to Shanghai, to open or work at restaurants or try to make it big feeding the world’s most populous city.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">But despite having so much choice, there are a few dishes that I find myself returning to time and time again, even after 15 years. With the help of my Shanghainese colleagues, I’ve compiled a list of 25 things to eat in Shanghai that we love, for food pilgrims to experience what eating is like in our city.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><div data-dcnode-id="1125" style="background:#fffce2; padding:40px;"><span data-dcnode-id="1152" instrument_node="">
</span><h2 data-dcnode-id="1150" style="margin-top: 10px; text-align: center;"><span data-dcnode-id="1151" instrument_node="">FOOD IN SHANGHAI QUICK LINKS</span></h2><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Eating at local restaurants is great, but so is going on a food tour. Check out some of the most popular food-related tours and activities in Shanghai.</span></p><span data-dcnode-id="1146" instrument_node="">

</span></div><span data-dcnode-id="1103" instrument_node="">
</span><h1 class="has-text-color" data-dcnode-id="1101" id="shanghai-cuisine" style="color:#ff9a16"><span data-dcnode-id="1102" instrument_node="">WHAT IS SHANGHAI CUISINE?</span></h1><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1096"><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_cuisine" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1099" instrument_node="">Shanghai cuisine</span></a><span data-dcnode-id="1097" instrument_node=""> is a popular style of Chinese food. In the strictest sense, it refers to what’s known as Benbang cuisine – a style of cooking that originated in Shanghai – but it can also refer to the styles of cooking of the surrounding Jiangsu and Zhejiang provinces.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">Traditional Shanghai cuisine makes use of various cooking methods and condiments to create dishes that are lighter, mellower, and a little sweeter compared to other regional Chinese cuisines. Sugar and soy sauce are important ingredients while sweet and sour is a typical Shanghai taste. Seafood is abundant and </span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/china-fried-rice-rice-on-steroids-recipe/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1093" instrument_node="">rice</span></a><span data-dcnode-id="1091" instrument_node=""> is generally preferred over noodles.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">With increased globalization, foreign influences have made their way into Shanghai Chinese food and given rise to a curious style of fusion cooking known as </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haipai_cuisine" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1087" instrument_node="">Haipai cuisine</span></a><span data-dcnode-id="1085" instrument_node="">. It combines regional Chinese and Western cooking traditions to create unique dishes like Shanghai-style borscht, fried pork chops, and potato salad.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><h1 class="has-text-color" data-dcnode-id="1081" id="what-to-eat-in-shanghai" style="color:#ff9a16"><span data-dcnode-id="1082" instrument_node="">THE BEST FOOD IN SHANGHAI</span></h1><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">To make it easier to digest, I’ve categorized this Shanghai food guide and included the dish names in Chinese characters as well as in pinyin for easier ordering. Click on a link to jump to that section.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><div data-dcnode-id="1012"><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">If you are unsure of the Chinese tones, perhaps try saying the pinyin really really fast (like I do when I try out unfamiliar Chinese words), and half the time the food vendor will figure it out.</span></p><span data-dcnode-id="1073" instrument_node="">

</span><h2 class="has-text-color" data-dcnode-id="1009" id="must-try-dishes" style="color:#1baac5"><span data-dcnode-id="1010" instrument_node="">MUST-TRY SHANGHAI DISHES</span></h2><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">These first three dishes are the heavy hitters that appear on every must-eat Shanghai food list. So let’s get these out of the way:</span></p><span data-dcnode-id="1005" instrument_node="">
</span><h3 data-dcnode-id="1003" id="xiao-long-bao"><span data-dcnode-id="1004" instrument_node="">1. Shanghai Soup Dumplings (xiaolongbao 小笼包 or tang bao 汤包)</span></h3><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">These paper-thin dumplings are filled with meat and piping hot soup lying in wait to scald the uninitiated. They’re best dipped in vinegar and julienned ginger, and seriously good.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="992"><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/china-a-dumpling-by-any-other-name/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="998" instrument_node="">Shanghai soup dumplings</span></a><span data-dcnode-id="996" instrument_node=""> are available in most Shanghai restaurants, but many head to one of the branches of </span><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d3448596-Reviews-Din_Tai_Fung_Nanjing_West_Road-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="995" instrument_node="">Din Tai Fung</span></a><span data-dcnode-id="993" instrument_node=""> for its consistent quality.</span></p><span data-dcnode-id="991" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="987"><noscript data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2018/04/xiao-long-bao1.jpg" alt="Xiao long bao" width="1200" height="800"&gt;</span></noscript><img alt="Xiao long bao" class="alignnone lazyload" data-dcnode-id="988" data-src="https://www.willflyforfood.net/wp-content/uploads/2018/04/xiao-long-bao1.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-2" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2018/04/xiao-long-bao1.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">A word of caution, learn how to properly eat xiaolongbao lest you don’t mind burning the inside of your mouth. Many Shanghai restaurants like Din Tai Fung will teach you proper technique.</span></p><span data-dcnode-id="983" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="979"><noscript data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2018/04/xiao-long-bao2.jpg" alt="Piercing the skin of xiao long bao" width="1200" height="800"&gt;</span></noscript><img alt="Piercing the skin of xiao long bao" class="alignnone lazyload" data-dcnode-id="980" data-src="https://www.willflyforfood.net/wp-content/uploads/2018/04/xiao-long-bao2.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-3" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2018/04/xiao-long-bao2.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="978" instrument_node="">
</span><h3 data-dcnode-id="976" id="hong-shao-rou"><span data-dcnode-id="977" instrument_node="">2. Shanghai-Style Braised Pork Belly (hong shao rou 红烧肉)</span></h3><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">This is another dish that no self-respecting Shanghai restaurant menu could ever be without. Tender pork belly cubes are doused in a sweet and sticky sauce – a mixture of vinegar, soy, and sugar that come together in a vibrant red color, hence the Chinese character “hong” (红) in the name.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Hong shao rou perfectly showcases the Shanghainese fondness for mixing savory or sour with blasts of sweet.</span></p><span data-dcnode-id="969" instrument_node="">
</span><div data-dcnode-id="949"><span data-dcnode-id="968" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="964"><noscript data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/shanghai-style-braised-pork-belly.jpg" alt="Hong shao rou" width="1200" height="800"&gt;</span></noscript><img alt="Hong shao rou" class="alignnone lazyload" data-dcnode-id="965" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/shanghai-style-braised-pork-belly.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-4" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/shanghai-style-braised-pork-belly.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="963" instrument_node="">
</span><p class="bottomphotocap" data-dcnode-id="951"><em data-dcnode-id="952"><span data-dcnode-id="962" instrument_node="">“</span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/ruocaled/5982983729/in/photolist-a7GmBT-wRnrz-rkYFn3-5wvVq1-9fifwY-DxRaFp-5wrACK-bCTp8E-b5NFLr-48TNPU-qcRZyK-r4VL5A-dTxbmH-M2qtrW" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="961" instrument_node="">Hong Shao Rou</span></a><span data-dcnode-id="959" instrument_node="">” by </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/ruocaled/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="958" instrument_node="">Ruocaled</span></a><span data-dcnode-id="956" instrument_node="">, used under </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/2.0/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="955" instrument_node="">CC BY 2.0</span></a><span data-dcnode-id="953" instrument_node=""> / Processed in Photoshop and Lightroom</span></em></p><span data-dcnode-id="950" instrument_node="">
</span></div><span data-dcnode-id="948" instrument_node="">
</span><h3 data-dcnode-id="946" id="qing-zheng-da-zha-xie"><span data-dcnode-id="947" instrument_node="">3. Steamed Hairy Crab (qing zheng da zha xie 清蒸大闸蟹)</span></h3><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Come late September/early October, the entire city of Shanghai will be in a tizzy with the arrival of this scarce delicacy from nearby Yangcheng Lake, especially the prized crab roe.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">Tedious to de-bone (or is it de-clawed?) and definitely not wallet-friendly, having this dish for dinner is nonetheless a big event that Shanghainese look forward to every autumn. For the O.G. of hairy crab Shanghai restaurants, head to </span><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d1196230-Reviews-WangBaoHe_Restaurant_HuangPu-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="940" instrument_node="">Wang Bao He</span></a><span data-dcnode-id="938" instrument_node=""> on Fuzhou Road (福州路603号).</span></p><span data-dcnode-id="936" instrument_node="">
</span><div data-dcnode-id="920"><span data-dcnode-id="935" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="931"><noscript data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/steamed-hairy-crab.jpg" alt="Qing zheng da zha xie" width="1200" height="800"&gt;</span></noscript><img alt="Qing zheng da zha xie" class="alignnone lazyload" data-dcnode-id="932" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/steamed-hairy-crab.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-5" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/steamed-hairy-crab.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="930" instrument_node="">
</span><p class="bottomphotocap" data-dcnode-id="922"><em data-dcnode-id="923"><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AGekochte_Wollhandkrabben.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="929" instrument_node="">J. Patrick Fischer</span></a><span data-dcnode-id="927" instrument_node=""> / </span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="926" instrument_node="">CC BY-SA</span></a><span data-dcnode-id="924" instrument_node=""> / Processed in Photoshop and Lightroom</span></em></p><span data-dcnode-id="921" instrument_node="">
</span></div><span data-dcnode-id="919" instrument_node="">
</span><h2 class="has-text-color" data-dcnode-id="917" id="chinese-breakfast" style="color:#1baac5"><span data-dcnode-id="918" instrument_node="">SHANGHAI CHINESE BREAKFAST</span></h2><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Breakfast time is an absolute bonanza for Shanghai street food carts. With droves of worker drones in need of quick sustenance, nearly every downtown street will be buzzing with humble mobile carts, and restaurants will open to the street with breakfast options to grab and go. For serious Shanghai street food lovers, 8-10AM is the optimal time for foraging.</span></p><span data-dcnode-id="913" instrument_node="">
</span><h3 data-dcnode-id="911" id="shao-mai"><span data-dcnode-id="912" instrument_node="">4. Shanghai Shao Mai (烧卖)</span></h3><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Less well-known than its Cantonese cousin – the dim sum mainstay shumai – Shanghai’s version is filled with sticky rice and shaped like a bell, with a small neck and a big, round bottom.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">Fillings may include pork, bamboo shoots, shrimp and lamb, but my favorite is the one stuffed with a cooked egg yolk and threads of crab. I grab this at the convenience store in the mornings, but my local colleagues never fail to scoff that the only acceptable shao mai are the ones at </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d2415528-Reviews-BaiYuLan_Bread_Fang-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="905" instrument_node="">Baiyulan</span></a><span data-dcnode-id="903" instrument_node=""> 白玉兰on Tianyaoqiao Road 天钥桥路98号.</span></p><span data-dcnode-id="901" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="897"><noscript data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/shanghai-shao-mai-dumplings.jpg" alt="Shanghai shao mai" width="1200" height="800"&gt;</span></noscript><img alt="Shanghai shao mai" class="alignnone lazyload" data-dcnode-id="898" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/shanghai-shao-mai-dumplings.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-6" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/shanghai-shao-mai-dumplings.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="896" instrument_node="">
</span><h3 data-dcnode-id="894" id="youtiao"><span data-dcnode-id="895" instrument_node="">5. Deep-Fried Dough (youtiao 油条)</span></h3><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">Often served with rice congee, </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/taipei-food-13-must-eat-restaurants-night-markets-in-taipei-taiwan/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="891" instrument_node="">youtiao</span></a><span data-dcnode-id="889" instrument_node=""> is basically a savory version of a churro, if the churro were bigger and airier. Its name literally translates to “oil strip”, but the Cantonese have an even better name which translates to “oil-fried devil”. Enough said.</span></p><span data-dcnode-id="887" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="883"><noscript data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/deep-fried-dough.jpg" alt="Youtiao" width="1200" height="800"&gt;</span></noscript><img alt="Youtiao" class="alignnone lazyload" data-dcnode-id="884" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/deep-fried-dough.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-7" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/deep-fried-dough.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="882" instrument_node="">
</span><h3 data-dcnode-id="880" id="dan-bing"><span data-dcnode-id="881" instrument_node="">6. Egg Pancake (dan bing 鸡蛋饼)</span></h3><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Originally from Nanjing, this is a breakfast burrito, Chinese style. The wrap is made of egg mixed with a little water, flour and cornstarch, grilled until a bit crispy on the outside but still chewy on the inside.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">In goes a tangy hoisin-flavored sauce and a choose-your-own-adventure spread of fillings, from the wonderful to the weird: chicken, back bacon, hotdogs, potato slivers, tofu skin, seaweed, scallions and wickedly spicy sauce.</span></p><span data-dcnode-id="873" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="869"><noscript data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/egg-pancake1.jpg" alt="Ingredients for dan bing" width="1200" height="1600"&gt;</span></noscript><img alt="Ingredients for dan bing" class="alignnone lazyload" data-dcnode-id="870" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/egg-pancake1.jpg.webp" data-trellis-processed="1" data-webp="true" height="1600" id="mv-trellis-img-8" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/egg-pancake1.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">The queues are always long for this, the ultimate Chinese breakfast! Thankfully, there’s a dan bing stall on practically every street.</span></p><span data-dcnode-id="865" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="861"><noscript data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/egg-pancake2.jpg" alt="Dan bing" width="1200" height="800"&gt;</span></noscript><img alt="Dan bing" class="alignnone lazyload" data-dcnode-id="862" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/egg-pancake2.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-9" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/egg-pancake2.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="858" id="shan-dong-jian-bing"><span data-dcnode-id="859" instrument_node="">7. Shandong Pancake (shan dong jian bing 山东煎饼)</span></h3><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">If dan bing were a burrito, then Shandong pancake would be a crepe. Just like a crepe, the Shandong jian bing is paper-thin and cooked till crispy on a custom flat round grill. No oil is added to the grill, so it’s less greasy than its Chinese burrito cousins – unless, of course, you opt to add a youtiao fried dough stick in the middle.</span></p><span data-dcnode-id="854" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="850"><noscript data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/shandong-pancake1.jpg" alt="Youtiao" width="1200" height="800"&gt;</span></noscript><img alt="Youtiao" class="alignnone lazyload" data-dcnode-id="851" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/shandong-pancake1.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-10" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/shandong-pancake1.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Other common fillings are egg (cracked then spread over the entire surface of the crepe while it’s cooking), chicken, scallions and lettuce leaves, with a slather of hoisin sauce. This is often sold by the same street food stalls offering egg pancakes.</span></p><span data-dcnode-id="846" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="842"><noscript data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/shandong-pancake2.jpg" alt="Shan dong jian bing" width="1200" height="800"&gt;</span></noscript><img alt="Shan dong jian bing" class="alignnone lazyload" data-dcnode-id="843" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/shandong-pancake2.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-11" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/shandong-pancake2.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="841" instrument_node="">
</span><h3 data-dcnode-id="839" id="cong-you-bing"><span data-dcnode-id="840" instrument_node="">8. Scallion Pancake (cong you bing 葱油饼)</span></h3><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">Unlike the dan bing and the Shandong jian bing, which originated somewhere else in China, the </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/taiwanese-food-guide-45-must-try-dishes-in-taiwan/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="836" instrument_node="">scallion pancake</span></a><span data-dcnode-id="834" instrument_node=""> is pure Shanghai. The dough is coiled then flattened like a cinnamon roll, with maximum layers to ensure flakiness.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Two pancakes are slapped together with a generous filling of scallions and a not-so-secret ingredient, pork fat, in the middle. The oily-fried-devilishness of this type of Chinese pancake is probably why fewer street food stalls in Shanghai sell them these days.</span></p><span data-dcnode-id="829" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="825"><noscript data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2018/04/scallion-pancake1.jpg" alt="Cong you bing" width="1200" height="800"&gt;</span></noscript><img alt="Cong you bing" class="alignnone lazyload" data-dcnode-id="826" data-src="https://www.willflyforfood.net/wp-content/uploads/2018/04/scallion-pancake1.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-12" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2018/04/scallion-pancake1.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="824" instrument_node="">
</span><h3 data-dcnode-id="822" id="doujiang"><span data-dcnode-id="823" instrument_node="">9. Soy Milk (doujiang 豆漿)</span></h3><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Together with shao mai, fried dough sticks and pancake anything, soy milk is the final member of Shanghai’s undisputed Four Kings of Chinese Breakfast. This milky extraction of soybean is as ubiquitous in Chinese breakfast tables as cow’s milk is in western households.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Available cold or hot (the hot version being far superior), doujiang is mildly sweet and surprisingly very filling as a standalone breakfast. It’s usually sold by the same street food stalls offering pancakes or steamed buns.</span></p><span data-dcnode-id="815" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="811"><noscript data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2018/04/taiwanese-breakfast2.jpg" alt="Doujiang" width="1200" height="800"&gt;</span></noscript><img alt="Doujiang" class="alignnone lazyload" data-dcnode-id="812" data-src="https://www.willflyforfood.net/wp-content/uploads/2018/04/taiwanese-breakfast2.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-13" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2018/04/taiwanese-breakfast2.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="810" instrument_node="">
</span><h3 data-dcnode-id="808" id="baozi"><span data-dcnode-id="809" instrument_node="">10. Steamed Buns (baozi 包子)</span></h3><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Baozi refers to a family of steamed buns made with a variety of fillings. Minced pork is the most common ingredient, but do try the vegetable version and the red bean paste.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Baozi are cheap and cheerful and found in many small Shanghai street food stalls. Just look out for the huge bamboo steamers.</span></p><span data-dcnode-id="801" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="797"><noscript data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2018/04/baozi1.jpg" alt="Baozi" width="1200" height="800"&gt;</span></noscript><img alt="Baozi" class="alignnone lazyload" data-dcnode-id="798" data-src="https://www.willflyforfood.net/wp-content/uploads/2018/04/baozi1.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-14" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2018/04/baozi1.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="796" instrument_node="">
</span><h2 class="has-text-color" data-dcnode-id="794" id="street-food-snacks" style="color:#1baac5"><span data-dcnode-id="795" instrument_node="">SHANGHAI STREET FOOD &amp; SNACKS</span></h2><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Many of the Chinese breakfast dishes mentioned above can also be categorized as Shanghai street food. Here are a few more that aren’t typically eaten for breakfast.</span></p><span data-dcnode-id="790" instrument_node="">
</span><h3 data-dcnode-id="788" id="xie-ke-huang"><span data-dcnode-id="789" instrument_node="">11. Crab Shell Pie (xie ke huang 蟹壳黄)</span></h3><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">The “poor man’s hairy crab” that is not a crab at all, these savory or sweet pies get their name from their resemblance to a cooked crab shell.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Oven baked and golden brown and about the size of a hockey puck, the outer layer is flaky and sprinkled with toasted sesame. Common fillings include sugar or onion or a vegetable I have yet to identify whose name translates to “taste of moss.”</span></p><span data-dcnode-id="781" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="777"><noscript data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/crab-shell-pie1.jpg" alt="xie ke huang" width="1200" height="800"&gt;</span></noscript><img alt="xie ke huang" class="alignnone lazyload" data-dcnode-id="778" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/crab-shell-pie1.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-15" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/crab-shell-pie1.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">True-blue Shanghainese will line up for hours at </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d8563230-Reviews-Wangjiasha_Dim_Sum_Nanjing_West_Road-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="774" instrument_node="">Wang Jia Sha Dimsum Shop</span></a><span data-dcnode-id="772" instrument_node=""> 王家沙点心店 on 805 West Nanjing Road 南京西路805号, but I cheat and buy them online through their TMall store.</span></p><span data-dcnode-id="770" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="766"><noscript data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/crab-shell-pie2.jpg" alt="Xie ke huang" width="1200" height="800"&gt;</span></noscript><img alt="Xie ke huang" class="alignnone lazyload" data-dcnode-id="767" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/crab-shell-pie2.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-16" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/crab-shell-pie2.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="765" instrument_node="">
</span><h3 data-dcnode-id="763" id="sheng-jian-bao"><span data-dcnode-id="764" instrument_node="">12. Pan-Fried Pork Buns (sheng jian bao 生煎包)</span></h3><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">This is another one of those deceptively simple-looking dishes that packs a powerful taste punch in a cheap, cheap price tag. The </span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/hong-kong-food-guide-19-must-eat-restaurants-street-food-stalls-in-hong-kong/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="760" instrument_node="">sheng jian bao</span></a><span data-dcnode-id="758" instrument_node=""> is the pan-fried version of the soupy xialongbao, with succulent pork and scalding broth inside a chewy, thick-walled bun with a fried, crispy and golden brown bottom.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="755" instrument_node="">I reckon the best-value lunch to be had in Shanghai is a standard order of four pieces of sheng jian bao at </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d2035728-Reviews-Yang_s_Fried_Dumplings_HuangHe_Road-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="754" instrument_node="">Yang’s Fry Dumplings</span></a><span data-dcnode-id="752" instrument_node=""> (many locations throughout the city).</span></p><span data-dcnode-id="750" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="746"><noscript data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2019/08/a-chefs-tour-hong-kong5.jpg" alt="Sheng jian bao" width="1200" height="1360"&gt;</span></noscript><img alt="Sheng jian bao" class="alignnone lazyload" data-dcnode-id="747" data-src="https://www.willflyforfood.net/wp-content/uploads/2019/08/a-chefs-tour-hong-kong5.jpg.webp" data-trellis-processed="1" data-webp="true" height="1360" id="mv-trellis-img-17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2019/08/a-chefs-tour-hong-kong5.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="745" instrument_node="">
</span><h3 data-dcnode-id="743" id="yang-rou-chuan"><span data-dcnode-id="744" instrument_node="">13. Xinjiang Lamb Skewers (yang rou chuan 羊肉串) and Uighur Flatbread (nang bing 馕饼)</span></h3><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Tender, juicy cubes of lamb kebab, coated with cumin and paprika, paired with flatbread hot out of a tandoor oven. This is probably one of the most popular snack foods to come out of the Turkic ethnic group from the far northwest.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">These are harder and harder to find as rapid development pushes away small street food vendors in Shanghai, but you can certainly find them every Friday at the Muslim Market, where a foodie paradise materializes outside Huxi Mosque after Friday prayers. Just go to 1328 Changde Road near Aomen Road (1328常德路近澳门路).</span></p><span data-dcnode-id="736" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="732"><noscript data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2018/05/shao-shao-ke3.jpg" alt="Yang rou chuan" width="1200" height="800"&gt;</span></noscript><img alt="Yang rou chuan" class="alignnone lazyload" data-dcnode-id="733" data-src="https://www.willflyforfood.net/wp-content/uploads/2018/05/shao-shao-ke3.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-18" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2018/05/shao-shao-ke3.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="731" instrument_node="">
</span><h2 class="has-text-color" data-dcnode-id="729" id="restaurant-small-dishes" style="color:#1baac5"><span data-dcnode-id="730" instrument_node="">SHANGHAI RESTAURANT SMALL DISHES</span></h2><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">The next two categories describe dishes that can typically be found at Shanghai Chinese restaurants.</span></p><span data-dcnode-id="725" instrument_node="">
</span><h3 data-dcnode-id="723" id="kao-fu"><span data-dcnode-id="724" instrument_node="">14. Braised Wheat Gluten with Mushrooms (kao fu 烤麸)</span></h3><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">It sounds weird, it looks weird, and it has a seemingly unappetizing mix of parts – tofu-like wheat gluten, fermented black beans, boiled peanuts and wood ear mushrooms – that may make you say “Thank You, Next!”</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">But honestly, it’s delicious, and this is one of the few no-meat dishes that don’t leave me wanting.</span></p><span data-dcnode-id="716" instrument_node="">
</span><div data-dcnode-id="700"><span data-dcnode-id="715" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="711"><noscript data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/braised-wheat-gluten-with-mushrooms.jpg" alt="Kao fu" width="1200" height="800"&gt;</span></noscript><img alt="Kao fu" class="alignnone lazyload" data-dcnode-id="712" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/braised-wheat-gluten-with-mushrooms.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-19" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/braised-wheat-gluten-with-mushrooms.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="710" instrument_node="">
</span><p class="bottomphotocap" data-dcnode-id="702"><em data-dcnode-id="703"><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AKoufu_%28Wheat_Gluten%29_Dish.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="709" instrument_node="">Memm</span></a><span data-dcnode-id="707" instrument_node=""> / </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="706" instrument_node="">CC BY-SA</span></a><span data-dcnode-id="704" instrument_node=""> / Processed in Photoshop and Lightroom</span></em></p><span data-dcnode-id="701" instrument_node="">
</span></div><span data-dcnode-id="699" instrument_node="">
</span><h3 data-dcnode-id="697" id="xin-tai-luan"><span data-dcnode-id="698" instrument_node="">15. Dates Stuffed with Glutinous Rice (xin tai luan 心太軟)</span></h3><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Xin tai luan (which literally translates to “the heart is too soft”) are pitted dates softened in water then stuffed with sticky rice, served warm. Although this dish is sweet, it is always served as an appetizer. This is a Shanghai food classic.</span></p><span data-dcnode-id="693" instrument_node="">
</span><div data-dcnode-id="673"><span data-dcnode-id="692" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="688"><noscript data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/dates-stuffed-with-glutinous-rice.jpg" alt="Xin tai luan" width="1200" height="800"&gt;</span></noscript><img alt="Xin tai luan" class="alignnone lazyload" data-dcnode-id="689" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/dates-stuffed-with-glutinous-rice.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-20" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/dates-stuffed-with-glutinous-rice.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="687" instrument_node="">
</span><p class="bottomphotocap" data-dcnode-id="675"><em data-dcnode-id="676"><span data-dcnode-id="686" instrument_node="">“</span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/kentwang/152889363/in/photolist-evAFv-Xja15V" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="685" instrument_node="">Dates stuffed with sweet rice flour</span></a><span data-dcnode-id="683" instrument_node="">” by </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/kentwang/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="682" instrument_node="">Kent Wang</span></a><span data-dcnode-id="680" instrument_node="">, used under </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/2.0/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="679" instrument_node="">CC BY-SA 2.0</span></a><span data-dcnode-id="677" instrument_node=""> / Processed in Photoshop and Lightroom</span></em></p><span data-dcnode-id="674" instrument_node="">
</span></div><span data-dcnode-id="672" instrument_node="">
</span><h3 data-dcnode-id="670" id="ma-lan-tou-xiang-gan"><span data-dcnode-id="671" instrument_node="">16. Ma Lan Tou Spiced Tofu (ma lan tou xiang gan 马兰头香干)</span></h3><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">This is a quintessentially Shanghai cold appetizer which I’ve never seen anywhere else. A fragrant vegetable with an herb-like taste, ma lan tou is combined with dry spiced tofu, chopped into small cubes.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">It’s often served fancy-like by packing into a small bowl then inverting the molded contents onto a plate. This is another dish that I never fail to order because it’s both very tasty and elusive outside of Shanghai.</span></p><span data-dcnode-id="663" instrument_node="">
</span><div data-dcnode-id="643"><span data-dcnode-id="662" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="658"><noscript data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/ma-lan-tou-spiced-tofu.jpg" alt="Ma lan tou xiang gan" width="1200" height="800"&gt;</span></noscript><img alt="Ma lan tou xiang gan" class="alignnone lazyload" data-dcnode-id="659" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/ma-lan-tou-spiced-tofu.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-21" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/ma-lan-tou-spiced-tofu.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="657" instrument_node="">
</span><p class="bottomphotocap" data-dcnode-id="645"><em data-dcnode-id="646"><span data-dcnode-id="656" instrument_node="">“</span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/garysoup/25945321284/in/photolist-6hPTdh-jVQrib-SmJeGt-6hPTA1-FwGy6A" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="655" instrument_node="">Ma Lan Tou at Gourmet Noodle House</span></a><span data-dcnode-id="653" instrument_node="">” by </span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/garysoup/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="652" instrument_node="">Gary Stevens</span></a><span data-dcnode-id="650" instrument_node="">, used under </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/2.0/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="649" instrument_node="">CC BY 2.0</span></a><span data-dcnode-id="647" instrument_node=""> / Processed in Photoshop and Lightroom</span></em></p><span data-dcnode-id="644" instrument_node="">
</span></div><span data-dcnode-id="642" instrument_node="">
</span><h3 data-dcnode-id="640" id="dou-miao"><span data-dcnode-id="641" instrument_node="">17. Stir-Fried Pea Shoots (dou miao 豆苗)</span></h3><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Dou miao is my number one favorite green leafy vegetable of all time. It is most commonly prepared very quickly sauteed with garlic, because when something is so good to begin with, you don’t mess with it.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Dou miao is only available during the winter months, so when it shows up on Shanghai restaurant menus again, it’s always incredibly fresh. YUM!</span></p><span data-dcnode-id="633" instrument_node="">
</span><div data-dcnode-id="617"><span data-dcnode-id="632" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="628"><noscript data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/stir-fried-pea-shoots.jpg" alt="Dou miao" width="1200" height="800"&gt;</span></noscript><img alt="Dou miao" class="alignnone lazyload" data-dcnode-id="629" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/stir-fried-pea-shoots.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-22" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/stir-fried-pea-shoots.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="627" instrument_node="">
</span><p class="bottomphotocap" data-dcnode-id="619"><em data-dcnode-id="620"><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AStir_fried_pea_sprouts.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="626" instrument_node="">stu_spivack</span></a><span data-dcnode-id="624" instrument_node=""> / </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/2.0" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="623" instrument_node="">CC BY</span></a><span data-dcnode-id="621" instrument_node=""> / Processed in Photoshop and Lightroom</span></em></p><span data-dcnode-id="618" instrument_node="">
</span></div><span data-dcnode-id="616" instrument_node="">
</span><h3 data-dcnode-id="614" id="su-jian-shan-yu"><span data-dcnode-id="615" instrument_node="">18. Crispy Fried Eel (su jian shan yu 酥煎鳝鱼)</span></h3><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Popular during the Qing Dynasty, this dish has been around for over a century. Twice-fried, extra-crispy boneless strips of eel with a thick and sticky brown glaze – crunchy and salty-sweet, it’s the very definition of more-ish.</span></p><span data-dcnode-id="610" instrument_node="">
</span><h2 class="has-text-color" data-dcnode-id="608" id="restaurant-mains" style="color:#1baac5"><span data-dcnode-id="609" instrument_node="">SHANGHAI RESTAURANT MAINS</span></h2><span data-dcnode-id="607" instrument_node="">
</span><h3 data-dcnode-id="605" id="qing-chao-he-xia"><span data-dcnode-id="606" instrument_node="">19. Stir-Fried River Shrimp (qing chao he xia 清炒河虾)</span></h3><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">This is a very delicate Chinese dish that goes by the more appropriate name Crystal Shrimp. These river shrimp are smaller, sweeter, and juicier than any shrimp I’ve ever tasted. Minimal ingredients are added to highlight their freshness, but a light dip in vinegar adds just the right flavor punch.</span></p><span data-dcnode-id="601" instrument_node="">
</span><h3 data-dcnode-id="599" id="huang yu mian"><span data-dcnode-id="600" instrument_node="">20. Yellow Croaker Noodle Soup (huang yu mian 黄鱼面)</span></h3><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">Admittedly, this is not my favorite fish dish in China; I prefer the </span><a data-dcnode-id="595" href="#song-shu-gui-yu"><span data-dcnode-id="596" instrument_node="">squirrel-shaped mandarin fish</span></a><span data-dcnode-id="594" instrument_node="">. But the Shanghainese absolutely love yellow croaker!</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">It stays juicy and tender no matter how long it’s cooked. In this dish, chunks of yellow croaker sit atop a bed of springy noodles in a creamy, yellow-gold broth with a hint of sourness from vinegar.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">If you are doing the tourist thing at Xintiandi, grab a bowl at </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d14179306-Reviews-Xie_Huang_Yu-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="587" instrument_node="">Xie Huang Yu</span></a><span data-dcnode-id="585" instrument_node=""> 蟹黄鱼 (太仓路200号) but avoid peak lunch or dinner hours.</span></p><span data-dcnode-id="583" instrument_node="">
</span><h3 data-dcnode-id="581" id="song-shu-gui-yu"><span data-dcnode-id="582" instrument_node="">21. Squirrel-Shaped Mandarin Fish (song shu gui yu 松鼠桂鱼)</span></h3><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Originating from nearby Suzhou City, to call this a mere sweet and sour fish does injustice to its artful presentation.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">The body of a Mandarin fish is carefully scored before deep-frying so that it stands straight out to resemble what is described as a “squirrel” shape (which I honestly don’t see, but who cares, it’s so pretty) before being covered with sweet-sour tomato sauce and pine nuts.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">The scoring makes it extra crispy and good-looking that it has earned a permanent place in every fancy Shanghai Chinese restaurant.</span></p><span data-dcnode-id="571" instrument_node="">
</span><div data-dcnode-id="555"><span data-dcnode-id="570" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="566"><noscript data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/squirrel-shaped-mandarin-fish.jpg" alt="Song shu gui yu" width="1200" height="800"&gt;</span></noscript><img alt="Song shu gui yu" class="alignnone lazyload" data-dcnode-id="567" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/squirrel-shaped-mandarin-fish.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-23" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/squirrel-shaped-mandarin-fish.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="565" instrument_node="">
</span><p class="bottomphotocap" data-dcnode-id="557"><em data-dcnode-id="558"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASquirrel-shaped_mandarin_fish_%288482833747%29.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="564" instrument_node="">Charles Haynes from Hobart, Australia</span></a><span data-dcnode-id="562" instrument_node=""> / </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/2.0" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="561" instrument_node="">CC BY-SA</span></a><span data-dcnode-id="559" instrument_node=""> / Processed in Photoshop and Lightroom</span></em></p><span data-dcnode-id="556" instrument_node="">
</span></div><span data-dcnode-id="554" instrument_node="">
</span><h3 data-dcnode-id="552" id="xie-huang-lao-fan"><span data-dcnode-id="553" instrument_node="">22. Old Jesse’s Clay Pot Rice with Crab (xie huang lao fan 蟹黄捞饭)</span></h3><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="550" instrument_node="">For this particular dish, don’t go anywhere else except to the famous Shanghai restaurant, </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d10835953-Reviews-Old_Jesse_Tianping_Road-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="549" instrument_node="">Old Jesse or Lao Ji Shi</span></a><span data-dcnode-id="547" instrument_node=""> (老吉士). This hole-in-the-wall is always cramped, it’s always busy, and the staff alternate between ignoring you and rushing you to make room for the queue.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">Many say it’s way overrated. But Old Jesse is the home of a Chinese dish that I think is mind-blowingly delicious: a pot of rice in a sizzling clay pot, the bottom bits charred and crispy, and the top generously smothered with picked crab meat and roe, finished with a little vinegar and ginger. It’s a flavor and texture bomb that will never disappoint. Go to the original restaurant on </span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d10835953-Reviews-Old_Jesse_Tianping_Road-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="543" instrument_node="">Tianping Road</span></a><span data-dcnode-id="541" instrument_node=""> (天平路41号).</span></p><span data-dcnode-id="539" instrument_node="">
</span><h3 data-dcnode-id="537" id="old-jesses-crab-anything"><span data-dcnode-id="538" instrument_node="">23. Old Jesse’s Crab Anything Dishes</span></h3><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">While we’re at it, anything with crab at </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d10835953-Reviews-Old_Jesse_Tianping_Road-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="534" instrument_node="">Old Jesse</span></a><span data-dcnode-id="532" instrument_node=""> is a crowd pleaser, even outside peak crab season. There’s crab with bean curd, crab with vermicelli noodles, crab soup, drunken crab, yada yada.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">You can probably order all the appetizers and mains on this list while you are there, and Old Jesse’s version can compete with the best. Just be sure to reserve well in advance; there are only two seatings, at 6:30PM and at 8:30PM.</span></p><span data-dcnode-id="527" instrument_node="">
</span><h2 class="has-text-color" data-dcnode-id="525" id="desserts" style="color:#1baac5"><span data-dcnode-id="526" instrument_node="">SHANGHAI DESSERTS</span></h2><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">And lastly, just a couple of desserts to try in Shanghai, one classic Chinese and the other not so much.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h3 data-dcnode-id="519" id="tang-yuan"><span data-dcnode-id="520" instrument_node="">24. Glutinous Rice Balls (tang yuan 汤圆)</span></h3><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Translating as “soup balls”, this dessert of pillow-y soft sticky rice balls stuffed with black sesame paste is basically mochi swimming in a bowl of ginger and osmanthus soup.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Each bite brings out a burst of fragrant black sesame, whose warmth and sweetness pairs perfectly with the cold and slightly tangy soup. Hot and cold, slightly sweet and slightly tangy, this is hands down my favorite Chinese dessert.</span></p><span data-dcnode-id="512" instrument_node="">
</span><div data-dcnode-id="492"><span data-dcnode-id="511" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="507"><noscript data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">&lt;img loading="lazy" class="alignnone" title="What to Eat in Shanghai" src="https://www.willflyforfood.net/wp-content/uploads/2020/09/glutinous-rice-balls.jpg" alt="Tang yuan" width="1200" height="800"&gt;</span></noscript><img alt="Tang yuan" class="alignnone lazyload" data-dcnode-id="508" data-src="https://www.willflyforfood.net/wp-content/uploads/2020/09/glutinous-rice-balls.jpg.webp" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-24" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/wp-content/uploads/2020/09/glutinous-rice-balls.jpg.webp&amp;raw" title="What to Eat in Shanghai" width="1200"></figure><span data-dcnode-id="506" instrument_node="">
</span><p class="bottomphotocap" data-dcnode-id="494"><em data-dcnode-id="495"><span data-dcnode-id="505" instrument_node="">“</span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/avlxyz/76394629/in/photolist-7KxsM-7Jikt-7Jik3-v9dsa-v9dr5-ZCuX5H-7CU11u-5MSMLV-5M2FCD-rDNxGD-5M2FKk-5M6TEu-5M6THf-5MSMQ6-5MX38U-5MX3b7-7twJ1k-5MywXH-9uLSe-7twHYD-wiZzm-6M2jHe-c34tbQ-7twHWr-VMpfgq-MDyiF1-q3RfQ7-gvLLmM-gvLAmE-gvKKih-t5py-gvLpWG-4g3S3m-4qwnJq-6hKKJt-ejue8b-fZcVG9-g6Z8xs-gvLQNH-gvLdsi-gvLM9D-fUundp-gvLaMZ-gvLk4p-gvL9KP-gvKBns-gvLTEz-gvKAyd-gvKLWh-MDyh9o" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="504" instrument_node="">Tang Yuan 汤圆</span></a><span data-dcnode-id="502" instrument_node="">” by </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/avlxyz/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="501" instrument_node="">Alpha</span></a><span data-dcnode-id="499" instrument_node="">, used under </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/2.0/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="498" instrument_node="">CC BY-SA 2.0</span></a><span data-dcnode-id="496" instrument_node=""> / Processed in Photoshop and Lightroom</span></em></p><span data-dcnode-id="493" instrument_node="">
</span></div><span data-dcnode-id="491" instrument_node="">
</span><h3 data-dcnode-id="489" id="lemon-tart"><span data-dcnode-id="490" instrument_node="">25. Mr. &amp; Mrs. Bund’s Lemon Tart</span></h3><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="487" instrument_node="">Okay, this is not a Chinese dish, and it didn’t even originate in China. The French chef who created this lemon tart – </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d1550812-Reviews-Mr_Mrs_Bund_Modern_Eatery_by_Paul_Pairet-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="486" instrument_node="">Paul Pairet</span></a><span data-dcnode-id="484" instrument_node="">, the very same one of Ultraviolet fame, a.k.a. the most expensive restaurant meal – sorry, I mean “sensory dining experience” in Shanghai – purportedly created this somewhere in France before he became a celebrity chef at one of the best restaurants in Shanghai.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Those who detest deconstructed and molecular anything (me) might even say it’s too pretentious. But DAMN! This lemon tart is exceptionally good. It’s also surprising, it’s clever, it’s photogenic. It is Everything.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Paul Pairet has taken a lemon, candied it in water for three days, hollowed it out then stuffed it (with the rind still unbroken, say what?) with a sour lemon sorbet, lemon curd and vanilla Chantilly.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">The tart and sweet filing oozes out with the lightest piercing by a dessert fork, which is wonderful with a bite of the sweet lemon sable that accompanies the tart. It is in my opinion, the best dessert in Shanghai.</span></p><span data-dcnode-id="473" instrument_node="">

</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Throughout this food guide are my recommendations on the best restaurants in Shanghai to try a few of these dishes. I’ve listed them below for easy reference.</span></p><span data-dcnode-id="467" instrument_node="">

</span><p data-dcnode-id="403"><strong data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">OLD JESSE (LAO JI SHI, 老吉士)</span></strong><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node="">Old Jesse’s Clay Pot Rice with Crab (xie huang lao fan 蟹黄捞饭)</span><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node="">Anything with crab</span><br data-dcnode-id="406"><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d10835953-Reviews-Old_Jesse_Tianping_Road-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="405" instrument_node="">Restaurant details</span></a></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="394"><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">PAUL PAIRET</span></strong><br data-dcnode-id="399"><span data-dcnode-id="398" instrument_node="">Mr. &amp; Mrs. Bund’s Lemon Tart</span><br data-dcnode-id="397"><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7816338/type/dlg/https%3A//www.tripadvisor.com.ph/Restaurant_Review-g308272-d1550812-Reviews-Mr_Mrs_Bund_Modern_Eatery_by_Paul_Pairet-Shanghai.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="396" instrument_node="">Restaurant details</span></a></p><span data-dcnode-id="393" instrument_node="">
</span><h1 class="has-text-color" data-dcnode-id="391" id="food-tours" style="color:#ff9a16"><span data-dcnode-id="392" instrument_node="">SHANGHAI FOOD TOURS</span></h1><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">As demonstrated by this guide, no one knows the food in Shanghai better than a local. What better way to experience Shanghainese food than by going on a food tour? </span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="386" instrument_node="">A food-obsessed local will take you to the best restaurants and street food stalls in Shanghai so you don’t have to do the research, plus they’ll explain all the dishes to you in more detail. Check out </span><a data-dcnode-id="384" data-gyg-scraped="1650833473746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s%3Fq%3DShanghai%2C%2520China%26searchSource%3D2%26p%3D1%26lc%3Dl178%26themes%3Dfood-drinks%26partner_id%3DFJOYZFL%26deeplink_id%3D761b49cb-382f-5f1f-8c7c-ed278d1c03e1" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="385" instrument_node="">Get Your Guide</span></a><span data-dcnode-id="383" instrument_node=""> for a list of food tours in Shanghai.</span></p><span data-dcnode-id="381" instrument_node="">
</span><h1 class="has-text-color" data-dcnode-id="379" id="cooking-classes" style="color:#ff9a16"><span data-dcnode-id="380" instrument_node="">SHANGHAI COOKING CLASSES</span></h1><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="377" instrument_node="">Aside from food tours, we also enjoy taking cooking classes when we travel. It’s a hands-on way of learning more about the local cuisine. If you enjoy cooking and would like to make Shanghainese food, then check out </span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cookly.me/cooking-class/shanghai/%3Fref%3Dwillflyforfood" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="376" instrument_node="">Cookly</span></a><span data-dcnode-id="374" instrument_node=""> for a list of cooking classes in Shanghai.</span></p><span data-dcnode-id="372" instrument_node="">
</span><h1 class="has-text-color" data-dcnode-id="370" style="color:#ff9a16"><span data-dcnode-id="371" instrument_node="">FINAL THOUGHTS ON THE FOOD IN SHANGHAI</span></h1><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367" style="margin-top: -10px;"><span data-dcnode-id="368" instrument_node="">by JB Macatulad</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="365" instrument_node="">It may seem odd that we haven’t been to Shanghai or China despite my sister living there for close to two decades. After all, China is one of the world’s </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/best-countries-for-food/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="364" instrument_node="">best countries for food</span></a><span data-dcnode-id="362" instrument_node="">.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">We have our reasons for putting it off, one of them being that a trip to China just seems so daunting. It’s such a vast country with so many interesting regional cuisines that we don’t know how to begin. To truly explore the cuisine, I think a trip to China merits a minimum stay of six months.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="356" instrument_node="">I don’t know as much yet about China’s regional cuisines but based on what I’ve read, Yunnan and Shanxi provinces are of interest, as are Shanghai and Beijing. Among many others, </span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willflyforfood.net/china-peking-duck-four-classic-ways-to-enjoy-beijings-bird/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="355" instrument_node="">Peking duck</span></a><span data-dcnode-id="353" instrument_node=""> in Beijing is something we absolutely need to experience.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">With so much good food to be had in China, it’s only a matter of time before we finally make that trip. And with my sister living in China’s economic capital for close to twenty years, I’m sure a good chunk of that time will be spent exploring the food in Shanghai.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">As you can probably tell from this delicious article, we already have the best guide.</span></p><span data-dcnode-id="345" instrument_node="">
</span><h2 data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Disclosure</span></h2><span data-dcnode-id="342" instrument_node="">
