</span><p data-dcnode-id="1469"><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/food/beijing-duck.htm"><span data-dcnode-id="1477" instrument_node="">Beijing roast duck</span></a><span data-dcnode-id="1475" instrument_node="">, or Peking duck, </span><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">is the epitome of Beijing cuisine and </span></strong><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">the dish you must try when visiting Beijing</span></strong><span data-dcnode-id="1470" instrument_node="">. The dish is mostly esteemed for the thin, crispy skin, with authentic versions of the dish serving mostly skin and little meat.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">While sauces and accompaniments will vary between restaurants (the most common being scallion and cucumber) it is difficult to go wrong with roast duck in Beijing. If you eat at one of Beijing’s more famous duck restaurants it will also be accompanied by a short demonstration on the correct way to assemble a Peking duck wrap using chopsticks.</span></p><span data-dcnode-id="1465" instrument_node="">

</span><div class="infoimage" data-dcnode-id="1394"><img alt="Chinese Dumplings" class="img-responsive" data-dcnode-id="1397" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2019/01/c0455bd1cb6945d29160065f_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2019/01/c0455bd1cb6945d29160065f_cut_750x400_238.webp&amp;raw" style="opacity: 1; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Chinese Dumplings</span></span></div><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Jiaozi is another dish that can be found anywhere across Beijing.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">While there are a number of better-known dumpling restaurants and chains, some of the tastiest dumplings (and most interesting experiences) can be found in smaller, less conspicuous family eateries where dumplings are the only thing on the menu. At these restaurants you can often sit and watch the next batch of dumplings being rolled and filled as you eat.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">A plate of Jiaozi with a soy sauce, vinegar and chili dip is synonymous with Northern Chinese cuisine.</span></p><span data-dcnode-id="1384" instrument_node="">

</span><h2 data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">4. Noodles with Soybean Paste — Zhajiang Mian</span></h2><span data-dcnode-id="1156" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1152"><img alt="Noodles with Soybean Paste" class="img-responsive" data-dcnode-id="1155" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2017/10/277d82e838ce48e9be578fd4_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Noodles with Soybean Paste</span></span></div><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Zhajiang mian is very popular when it comes to traditional Beijing cuisine, and is sometimes referred to simply as ‘Beijing noodles’.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1147" instrument_node="">It has three main ingredients: wide hand-pulled noodles, vegetable pieces, and pork. Vegetables vary seasonally, but there are never less than seven kinds.</span><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node=""> It is an ideal lunch time snack for visitors</span></strong><span data-dcnode-id="1144" instrument_node=""> </span><strong data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">short on time</span></strong><span data-dcnode-id="1141" instrument_node=""> as it is usually ready seconds after you order. As an added bonus it is very inexpensive.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1117"><span data-dcnode-id="1138" instrument_node="">
</span><li data-dcnode-id="1134"><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Chinese:</span></strong><span data-dcnode-id="1135" instrument_node=""> 炸酱面 (zhájiàng miàn /jaa-jyang myen/ ‘fried-sauce noodles’)</span></li><span data-dcnode-id="1133" instrument_node="">
</span><li data-dcnode-id="1129"><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Restaurant recommendation:</span></strong><span data-dcnode-id="1130" instrument_node=""> Old Beijing Zhajiang Noodle King (老北京炸酱面大王)</span></li><span data-dcnode-id="1128" instrument_node="">
</span><li data-dcnode-id="1124"><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Address:</span></strong><span data-dcnode-id="1125" instrument_node=""> 56 Dong Xinglongjie, Dongcheng District 东城区东兴隆街56号</span></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1119"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Price:</span></strong><span data-dcnode-id="1120" instrument_node=""> CN¥15</span></li><span data-dcnode-id="1118" instrument_node="">
</span></ul><span data-dcnode-id="1116" instrument_node="">
</span><h2 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">5. Mongolian Hotpot</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1109"><img alt="Mongolian Hotpot" class="img-responsive" data-dcnode-id="1112" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2017/10/b47b7ad3ec05427a98ba5d07_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Mongolian Hotpot</span></span></div><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">Mongolian hotpot, </span><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">a dish that’s history dates back over 1,000 years</span></strong><span data-dcnode-id="1104" instrument_node="">, is as much about the enjoyment of the cooking as it is the taste.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Traditional hotpot meals involve sitting around a large pot of boiling soup, in which you cook your own food. Although Mongolian hotpot usually involves a large amount of lamb, any number of meats, vegetables, and breads are available. These are sliced thin to ensure they cook quickly and evenly.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">This northern-Chinese style of hotpot uses a soup that is less spicy and generally less flavored than its southern counterparts, with more emphasis being placed on the ingredients that are cooked rather than what they are cooked in.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1074"><span data-dcnode-id="1095" instrument_node="">
</span><li data-dcnode-id="1091"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Chinese:</span></strong><span data-dcnode-id="1092" instrument_node=""> 蒙古火锅 (Ménggǔ huǒguō /mnng-goo hwor-gwor/)</span></li><span data-dcnode-id="1090" instrument_node="">
</span><li data-dcnode-id="1086"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Restaurant recommendation:</span></strong><span data-dcnode-id="1087" instrument_node=""> Dong Lai Shun (东来顺)</span></li><span data-dcnode-id="1085" instrument_node="">
</span><li data-dcnode-id="1081"><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Address:</span></strong><span data-dcnode-id="1082" instrument_node=""> 91 Tiantan Road, Dongcheng District 市东城区天坛路91号</span></li><span data-dcnode-id="1080" instrument_node="">
</span><li data-dcnode-id="1076"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Price:</span></strong><span data-dcnode-id="1077" instrument_node=""> CN¥140/person (for an entire meal)</span></li><span data-dcnode-id="1075" instrument_node="">
</span></ul><span data-dcnode-id="1073" instrument_node="">
</span><h2 data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">6. Donkey Burgers</span></h2><span data-dcnode-id="1070" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1066"><img alt="Donkey Burgers" class="img-responsive" data-dcnode-id="1069" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/e8ca8db0649f4d0ca82670aa_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Donkey Burgers</span></span></div><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Originating in the city of Baoding in northern Hebei Province, Beijing has adopted the donkey burger as its own. Restaurants offering this dish serve a number of different donkey meals, however the one to try is the donkey burger. Shredded donkey meat is served in a piping-hot, crunchy bun with a green pepper relish.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1058"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">The contrast between the succulent meat, crunchy bun, and sweet relish make it incredibly tasty</span></strong><span data-dcnode-id="1059" instrument_node=""> and you are unlikely to stop at one. Look out for a big 驴肉 (‘donkey meat’) sign clearly visible on the front of all restaurants offering this food.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1035"><span data-dcnode-id="1056" instrument_node="">
</span><li data-dcnode-id="1052"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Chinese:</span></strong><span data-dcnode-id="1053" instrument_node=""> 驴肉火烧 (lǘròu huǒshāo /lyoo-roh hwor-shaow/)</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1047"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Restaurant recommendation:</span></strong><span data-dcnode-id="1048" instrument_node=""> Wang Pangzi (王胖子)</span></li><span data-dcnode-id="1046" instrument_node="">
</span><li data-dcnode-id="1042"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Address: </span></strong><span data-dcnode-id="1043" instrument_node="">76 Gulou Xidajie, Xicheng District 鼓楼西大街76号</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1037"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Price:</span></strong><span data-dcnode-id="1038" instrument_node=""> CN¥10–12/burger</span></li><span data-dcnode-id="1036" instrument_node="">
</span></ul><span data-dcnode-id="1034" instrument_node="">
</span><h2 data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">7. Dry Wok Potato Wedges</span></h2><span data-dcnode-id="1031" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1027"><img alt="Dry Wok Potato Wedges" class="img-responsive" data-dcnode-id="1030" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/cd4505a9e0a847b0b2aba367_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Dry Wok Potato Wedges</span></span></div><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">The literal translation of this dish — ‘dry wok potato wedges’ — offers diners a fairly accurate idea of what to expect.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Slices of potato, crispy pork, and chilies simmer in an iron pot sat atop an open flame. As you are working your way through the meat and potatoes, the bed of sliced onions that is hidden underneath slowly caramelizes in oil, leaving you with a delicious snack to finish your meal on.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1016"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">It is a dish best enjoyed during the colder months</span></strong><span data-dcnode-id="1017" instrument_node="">, but is popular with locals all year round.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><ul class="infolist" data-dcnode-id="993"><span data-dcnode-id="1014" instrument_node="">
</span><li data-dcnode-id="1010"><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Chinese:</span></strong><span data-dcnode-id="1011" instrument_node=""> 干锅土豆片 (gàn guō tǔdòu piàn /gan gwor too-doh pyen/)</span></li><span data-dcnode-id="1009" instrument_node="">
</span><li data-dcnode-id="1005"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Restaurant recommendation: </span></strong><span data-dcnode-id="1006" instrument_node="">Any of the rows of restaurants along Ghost Street will serve this dish. It is best enjoyed as part of a larger meal, so it is recommended that you choose a restaurant along this street that serves other dishes you are interested in.</span></li><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="1000"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Address:</span></strong><span data-dcnode-id="1001" instrument_node=""> Ghost Street (Dongzhimen Nei Dajie, Chaoyang District) 鬼街（东直门内大街）</span></li><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="995"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Price:</span></strong><span data-dcnode-id="996" instrument_node=""> CN¥18–30</span></li><span data-dcnode-id="994" instrument_node="">
</span></ul><span data-dcnode-id="992" instrument_node="">
</span><div class="info_reco_tours" data-dcnode-id="988"><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Recommended</span></em><span data-dcnode-id="989" instrument_node=""> Beijing Tours:</span></div><span data-dcnode-id="987" instrument_node="">
</span><ul class="infolist" data-dcnode-id="971"><span data-dcnode-id="986" instrument_node="">
</span><li data-dcnode-id="983"><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/bj-1/"><span data-dcnode-id="985" instrument_node="">4-Day Emperor's Tour of Beijing Tour</span></a></li><span data-dcnode-id="982" instrument_node="">
</span><li data-dcnode-id="978"><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/cht-ft-04/"><span data-dcnode-id="981" instrument_node="">5-Day Beijing Family Tour</span></a><span data-dcnode-id="979" instrument_node="">&nbsp;</span></li><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="973"><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/contactus/"><span data-dcnode-id="976" instrument_node="">Contact us</span></a><span data-dcnode-id="974" instrument_node=""> to create a trip based on your needs.</span></li><span data-dcnode-id="972" instrument_node="">
</span></ul><span data-dcnode-id="970" instrument_node="">
</span><h2 data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">8. Tudou Si — Shredded Potato</span></h2><span data-dcnode-id="967" instrument_node="">
</span><div class="infoimage" data-dcnode-id="963"><img alt="Shredded Potato" class="img-responsive" data-dcnode-id="966" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/1d2bb04c63f5434291d3b77f_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Shredded Potato</span></span></div><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">This dish is another great option for potato lovers. Thinly shredded potatoes are stir-fried with green peppers and seasoning and can be served hot or cold. Don't be fooled by the plain look of the potatoes as they are coated in a sweet gloss which give the dish its flavor.</span></p><span data-dcnode-id="959" instrument_node="">
</span><ul class="infolist" data-dcnode-id="937"><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="954"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Chinese:</span></strong><span data-dcnode-id="955" instrument_node=""> 土豆丝 (tǔdòu sī /too-doh srr/)</span></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="949"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Restaurant recommendation:</span></strong><span data-dcnode-id="950" instrument_node=""> Shijin Yuan (十锦园）</span></li><span data-dcnode-id="948" instrument_node="">
</span><li data-dcnode-id="944"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Address:</span></strong><span data-dcnode-id="945" instrument_node=""> 13 Sanlitun, Chaoyang District 朝阳区三里屯13号</span></li><span data-dcnode-id="943" instrument_node="">
</span><li data-dcnode-id="939"><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Price:</span></strong><span data-dcnode-id="940" instrument_node=""> CN¥15</span></li><span data-dcnode-id="938" instrument_node="">
</span></ul><span data-dcnode-id="936" instrument_node="">
</span><h2 data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">9. Rolling Donkey</span></h2><span data-dcnode-id="933" instrument_node="">
</span><div class="infoimage" data-dcnode-id="929"><img alt="Rolling Donkey" class="img-responsive" data-dcnode-id="932" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/d5221f991bf04853a6afe556_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Rolling Donkey</span></span></div><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Unlike the donkey sandwich, this dish doesn't actually contain meat of any kind, let alone donkey. Rolling donkey refers to a kind of traditional Beijing snack with a soft skin made of glutinous rice flour and a red bean stuffing, also known in southern China as ‘rolling horse’ (马打滚 mǎ dǎgǔn).</span></p><span data-dcnode-id="925" instrument_node="">

</span><li data-dcnode-id="915"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Restaurant recommendation:</span></strong><span data-dcnode-id="916" instrument_node=""> Bai Ji Niangao (白记年糕)</span></li><span data-dcnode-id="914" instrument_node="">

</span></ul><span data-dcnode-id="902" instrument_node="">
</span><h2 data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">10. Tuckahoe Pie</span></h2><span data-dcnode-id="899" instrument_node="">
</span><div class="infoimage" data-dcnode-id="894"><img alt="Tuckahoe Pie" class="img-responsive" data-dcnode-id="898" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/4cce3c3ab9ef49298e6db19a_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Tuckahoe Pie</span></span><span class="infoimagetitle" data-dcnode-id="895"></span></div><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Tuckahoe pie is a traditional paper-thin snack in the shape of a full moon, which is popular in Beijing. It consists of a basic pancake wrapped in sugar, honey, and an assortment of nuts.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">According to a legend, tuckahoe pie originated in the Southern Song Dynasty (1127–1279), and the preparation method and the required equipment are well documented. </span><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">The herb tuckahoe has many medicinal properties</span></strong><span data-dcnode-id="886" instrument_node="">, and therefore it is popular with Chinese people, especially women and the elderly.</span></p><span data-dcnode-id="884" instrument_node="">
</span><ul class="infolist" data-dcnode-id="867"><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="879"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Chinese:</span></strong><span data-dcnode-id="880" instrument_node=""> 茯苓夹饼 (fúlíng jiābǐng /foo-ling jyaa-bing/)</span></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="874"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Recommended eateries: </span></strong><span data-dcnode-id="875" instrument_node="">Multiple food stalls and shops can be found along Wangfujing Snack Street (王府井小吃街) selling this snack and many other Beijing snack streets.</span></li><span data-dcnode-id="873" instrument_node="">
</span><li data-dcnode-id="869"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Price: </span></strong><span data-dcnode-id="870" instrument_node="">CN¥25/box</span></li><span data-dcnode-id="868" instrument_node="">
</span></ul><span data-dcnode-id="866" instrument_node="">
</span><h2 data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">11. Tanghulu — Candied Fruit on a Stick</span></h2><span data-dcnode-id="863" instrument_node="">
</span><div class="infoimage" data-dcnode-id="859"><img alt="Candied Fruit on a Stick" class="img-responsive" data-dcnode-id="862" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2019/11/c39397a4525c4522836f10c5_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Candied Fruit on a Stick</span></span></div><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="857" instrument_node="">Tanghulu, the "Chinese toffee apple", is an old Beijing-style dessert consisting of a skewer with fruits dipped in liquid sugar then dried. They are about 20 cm (8”) long and include many kinds of fruits coated in sugar, such as crabapples, kiwis, cherries, tomatoes, pineapples, grapes, strawberries, and so on. </span><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">When you bite into a tanghulu, it has a wonderful crunch</span></strong><span data-dcnode-id="854" instrument_node="">!</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">In Beijing, they are easy to buy from carts by the side of the street, and are popular with kids.</span></p><span data-dcnode-id="849" instrument_node="">
</span><ul class="infolist" data-dcnode-id="827"><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="844"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Chinese:&nbsp;</span></strong><span data-dcnode-id="845" instrument_node="">糖葫芦 (tánghúlu /tung-hoo-loo/)</span></li><span data-dcnode-id="843" instrument_node="">
</span><li data-dcnode-id="839"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Restaurant recommendation:</span></strong><span data-dcnode-id="840" instrument_node=""> Ma Ji Tanghulu</span></li><span data-dcnode-id="838" instrument_node="">
</span><li data-dcnode-id="834"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Address:</span></strong><span data-dcnode-id="835" instrument_node=""> 1/F, Niu Jie Halal Supermarket, 5 Niu Jie, Xicheng District 西城区牛街5号牛街清真超市1楼</span></li><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="829"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Price:</span></strong><span data-dcnode-id="830" instrument_node=""> CN¥10/stick</span></li><span data-dcnode-id="828" instrument_node="">
</span></ul><span data-dcnode-id="826" instrument_node="">

</span></ul><span data-dcnode-id="810" instrument_node="">
</span><h2 data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">12. Wandou Huang — Pea Flour Cake</span></h2><span data-dcnode-id="807" instrument_node="">
</span><div class="infoimage" data-dcnode-id="803"><img alt="Pea Flour Cake" class="img-responsive" data-dcnode-id="806" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2019/03/862f8b60a76e417c958a3bee_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Pea Flour Cake</span></span></div><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="801" instrument_node="">Pea flour cake is a traditional snack from Beijing. It is made of white peas. It used to be an imperial snack, and was one of </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/travelguide/china-history/ci-xi.htm"><span data-dcnode-id="800" instrument_node="">Emperor Dowager Cixi</span></a><span data-dcnode-id="798" instrument_node="">’s favorites. It has a yellow look, with a fine and smooth texture that melts in the mouth. Locals usually eat it in spring.</span></p><span data-dcnode-id="796" instrument_node="">
</span><ul class="infolist" data-dcnode-id="774"><span data-dcnode-id="795" instrument_node="">
</span><li data-dcnode-id="791"><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Chinese:</span></strong><span data-dcnode-id="792" instrument_node=""> 豌豆黄 (wāndòu huáng /wan-doh hwung/ ‘pea yellow’)</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="786"><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Restaurant recommendation:</span></strong><span data-dcnode-id="787" instrument_node=""> Bai Ji Niangao (白记年糕)</span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="781"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Address:</span></strong><span data-dcnode-id="782" instrument_node=""> 1/F, Niu Jie Halal Supermarket, 5 Niu Jie, Xicheng District 西城区牛街5号牛街清真超市1楼</span></li><span data-dcnode-id="780" instrument_node="">

</span></ul><span data-dcnode-id="773" instrument_node="">
</span><h2 data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">13. Aiwowo — Glutinous Rice Balls</span></h2><span data-dcnode-id="770" instrument_node="">
</span><div class="infoimage" data-dcnode-id="766"><img alt="Glutinous Rice Balls" class="img-responsive" data-dcnode-id="769" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/aa9216aa8c9e4c7dadcfe202_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Glutinous Rice Balls</span></span></div><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Aiwowo is a traditional dessert with a long history. It used to be served as a royal food. Its skins are made of glutinous rice flour, and the </span><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">various stuffings are suitable for all ages and tastes</span></strong><span data-dcnode-id="761" instrument_node="">. They include walnuts, sesame seeds, melon seeds, yam paste, and other natural ingredients.</span></p><span data-dcnode-id="759" instrument_node="">
</span><ul class="infolist" data-dcnode-id="737"><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="754"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Chinese:</span></strong><span data-dcnode-id="755" instrument_node=""> 艾窝窝 (àiwōwo /eye-wor-wor/ ‘wormwood nests’)</span></li><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="749"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Restaurant recommendation:</span></strong><span data-dcnode-id="750" instrument_node=""> Huguo Temple Snack shop (护国寺小吃)</span></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="744"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Address: </span></strong><span data-dcnode-id="745" instrument_node="">About 100 m east of Huguo Temple Hotel; 68 Huguosi Street, Xicheng District 西城区护国寺街68号，护国寺宾馆东侧约100米</span></li><span data-dcnode-id="743" instrument_node="">

</span></ul><span data-dcnode-id="736" instrument_node="">
</span><h2 data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">14. Dalian Huoshao — Fried Pancakes with Fillings</span></h2><span data-dcnode-id="733" instrument_node="">
</span><div class="infoimage" data-dcnode-id="729"><img alt="Fried Pancakes with Fillings" class="img-responsive" data-dcnode-id="732" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/02595e6758f5446aa5f6d781_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Fried Pancakes with Fillings</span></span></div><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">The history of this food dates back to 1876. Locals usually eat dalian huoshao for breakfast. These deep-fried rolls of wheaten dough filled with minced pork and vegetables taste similar to fried dumplings, but more juicy.</span></p><span data-dcnode-id="725" instrument_node="">
</span><ul class="infolist" data-dcnode-id="703"><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="720"><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Chinese:</span></strong><span data-dcnode-id="721" instrument_node=""> 褡裢火烧 (dālián huǒshāo /daa-lyen hwor-shao/ ‘cloth-pouch fried’)</span></li><span data-dcnode-id="719" instrument_node="">

</span></ul><span data-dcnode-id="702" instrument_node="">
</span><h2 data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">15. Zhizi Kaorou — Iron Grid Barbecue</span></h2><span data-dcnode-id="699" instrument_node="">
</span><div class="infoimage" data-dcnode-id="695"><img alt="Iron Grid Barbecue" class="img-responsive" data-dcnode-id="698" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/fa1fd38d582e4f638f9d955b_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Iron Grid Barbecue</span></span></div><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">A zhizi is an iron plate made of iron rods, which can be heated and used for roasting, so that the excess fat of the barbecue drips away through the gaps. </span><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">It is mainly used for halal beef and mutton</span></strong><span data-dcnode-id="690" instrument_node="">.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">The firewood for the barbecue is mainly aromatic wood, such as pine, jujube, pear, and other fruit trees’, so that the aroma is imparted into the meat. Side dishes are usually green onions and coriander.</span></p><span data-dcnode-id="685" instrument_node="">
</span><ul class="infolist" data-dcnode-id="663"><span data-dcnode-id="684" instrument_node="">
