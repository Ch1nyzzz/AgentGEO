G" data-dcnode-id="204"><div class="_1f8jsghvos4Zk1p-n8veYU" data-dcnode-id="1407"><img alt="Not just what to eat in Japan—but where, too. " class="_1MwUyUNFpNtn27W7qYmqk0" data-dcnode-id="1413" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afar-production.imgix.net/uploads/images/afar_post_headers/images/CBaaFyu8rt/original_shutterstock_1571082148.jpg%3Fauto%3Dcompress%2Cformat%26fit%3Dcrop%26crop%3Dtop%26lossless%3Dtrue%26w%3D1080&amp;raw" srcset="https://afar-production.imgix.net/uploads/images/afar_post_headers/images/CBaaFyu8rt/original_shutterstock_1571082148.jpg?auto=compress,format&amp;fit=crop&amp;crop=top&amp;lossless=true&amp;w=1080&amp;dpr=1 1x,https://afar-production.imgix.net/uploads/images/afar_post_headers/images/CBaaFyu8rt/original_shutterstock_1571082148.jpg?auto=compress,format&amp;fit=crop&amp;crop=top&amp;lossless=true&amp;w=1080&amp;dpr=2 2x,https://afar-production.imgix.net/uploads/images/afar_post_headers/images/CBaaFyu8rt/original_shutterstock_1571082148.jpg?auto=compress,format&amp;fit=crop&amp;crop=top&amp;lossless=true&amp;w=1080&amp;dpr=3 3x"><div class="_3BA2en2kGL5sKSrZeJ-jJl" data-dcnode-id="1408"><p class="_1UD7WH7_2g72oYdZNLdkVo" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Photo by VTT Studio/Shutterstock</span></p><p class="_3_co4H4pKW6R819f73m4TD" data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Not just what to eat in Japan—but where, too. </span></p></div></div><p class="_2QQVrLwCnkKfFdI-e-waF0" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Japanese cuisine is popular the world over and for good reason. Whether you’re looking for the best foods in Japan, or at your neighborhood Japanese restaurants, this guide to traditional Japanese food has you covered.</span></p><div class="Hlq9dlNfar-Vkx5tVEAiD" data-dcnode-id="205" data-gtm-event="article-body"><div class="_2_raTjeG0Jd1AkfomhQjWY" data-dcnode-id="1390"><div class="_3lVX9Yn2BkD9gNnZndy1KS" data-dcnode-id="1391" data-gtm-event="social-icons-vertical"><div class="_1BwQwy8eZ-xmrdczxYTCLO" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node=""> share this article </span></div><div aria-label="facebook" class="SocialMediaShareButton SocialMediaShareButton--facebook" data-dcnode-id="1401" role="button" tabindex="0"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l ISr7lt8794eDFdzeYWpU3 _26a_N_QzuCWXJ-Di_MhjkQ" data-dcnode-id="1402" data-gtm-label="facebook"></i></div><div aria-label="twitter" class="SocialMediaShareButton SocialMediaShareButton--twitter" data-dcnode-id="1399" role="button" tabindex="0"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l xRYATJ--aPrEniZDwctRg _2OPDghgbqJSVU9q9yyP6gH" data-dcnode-id="1400" data-gtm-label="twitter"></i></div><div aria-label="pinterest" class="SocialMediaShareButton SocialMediaShareButton--pinterest" data-dcnode-id="1397" role="button" tabindex="0"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l ebkEeME0GxISXsuAEuWYX _31vuR2t0B8_opfbJw_sn9R" data-dcnode-id="1398" data-gtm-label="pinterest"></i></div><div aria-label="email" class="SocialMediaShareButton SocialMediaShareButton--email" data-dcnode-id="1395" role="button" tabindex="0"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l _25eVkCDel0AJ56APRVFGKx _3xVQ2ofZ3i74Y92s_StEAx" data-dcnode-id="1396" data-gtm-label="email"></i></div><div class="_2lEf5vs34JbH3PClR7vwWF" data-dcnode-id="1392"><a data-dcnode-id="1393" data-gtm-label="flipboard" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//share.flipboard.com/bookmarklet/popout%3Fv%3D2%26title%3DA%2520Guide%2520to%2520Traditional%2520Japanese%2520Food%3A%252010%2520Essential%2520Dishes%2520to%2520Try%2520From%2520Japan%26url%3Dhttps%3A//www.afar.com/magazine/traditional-japanese-food%3Futm_medium%3Dsocial%26utm_source%3Dsshare" rel="noopener noreferrer" target="popup"><img alt="flipboard" data-dcnode-id="1394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.flipboard.com/badges/flipboard_mrrw.png&amp;raw"></a></div></div></div><div data-dcnode-id="683"><p data-dcnode-id="1372"><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.afar.com/travel-guides/japan/guide"><span class="initial-letter letter-J" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">J</span></span><span data-dcnode-id="1387" instrument_node="">apan</span></a><span data-dcnode-id="1385" instrument_node=""> proudly claims a rich and varied culture surrounding its cuisine. </span><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Kyōdo ryōri</span></em><span data-dcnode-id="1382" instrument_node="">, or regional dishes, dominate menus as you move throughout the island nation, where a rotating showcase of plates are powered by the bounty of </span><em data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">shun no mono</span></em><span data-dcnode-id="1379" instrument_node=""> (seasonal ingredients). And then there’s always the regional take on </span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.afar.com/magazine/sake-ignorant-the-three-things-you-need-to-know"><span data-dcnode-id="1378" instrument_node="">sake</span></a><span data-dcnode-id="1376" instrument_node=""> to accompany it—which is referred to as </span><em data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">jizake</span></em><span data-dcnode-id="1373" instrument_node=""> when it’s locally brewed.</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1370" instrument_node="">The overall traditional culinary culture of the Japanese even has a name—</span><em data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">washoku</span></em><span data-dcnode-id="1367" instrument_node="">—which has been recognized by UNESCO as an Intangible Cultural Heritage of Humanity. That complex and diverse gastronomy is owed, in part, to the geography of the country, which affords it access to edible riches from both the land and, more predominantly, the sea. Seafood—and sea vegetables—are readily plucked from the ocean, while the earth is cultivated for staples like rice and soybeans. Incorporating a wide variety of seafood and vegetables, as well as fermented foods like pickles or miso soup (known for their probiotic health benefits), Japanese cuisine is traditionally low in fat and high in nutrition.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">But in a culture driven by ritual and presentation, there are elements that go beyond what is plated, too. As it is said that the Japanese eat with their eyes, a traditional meal will include five colors—it’s believed this magic number guarantees that the body is getting a nutritious meal.&nbsp;</span></p><span data-dcnode-id="1362" instrument_node="">

ass="ytp-svg-shadow" data-dcnode-id="881" href="#ytp-id-21"><path d="M27,9 L9,9 C7.9,9 7,9.9 7,11 L7,14 L9,14 L9,11 L27,11 L27,25 L20,25 L20,27 L27,27 C28.1,27 29,26.1 29,25 L29,11 C29,9.9 28.1,9 27,9 L27,9 Z M7,24 L7,27 L10,27 C10,25.34 8.66,24 7,24 L7,24 Z M7,20 L7,22 C9.76,22 12,24.24 12,27 L14,27 C14,23.13 10.87,20 7,20 L7,20 Z M7,16 L7,18 C11.97,18 16,22.03 16,27 L18,27 C18,20.92 13.07,16 7,16 L7,16 Z" data-dcnode-id="882" fill="#fff" id="ytp-id-21"></path></use><path d="M27,9 L9,9 C7.9,9 7,9.9 7,11 L7,14 L9,14 L9,11 L27,11 L27,25 L20,25 L20,27 L27,27 C28.1,27 29,26.1 29,25 L29,11 C29,9.9 28.1,9 27,9 L27,9 Z M7,24 L7,27 L10,27 C10,25.34 8.66,24 7,24 L7,24 Z M7,20 L7,22 C9.76,22 12,24.24 12,27 L14,27 C14,23.13 10.87,20 7,20 L7,20 Z M7,16 L7,18 C11.97,18 16,22.03 16,27 L18,27 C18,20.92 13.07,16 7,16 L7,16 Z" data-dcnode-id="880" fill="#fff" id="ytp-id-21"></path></svg></button><button class="ytp-fullscreen-button ytp-button" data-dcnode-id="860" title="Full screen (f)"><svg data-dcnode-id="861" height="100%" version="1.1" viewbox="0 0 36 36" width="100%"><g class="ytp-fullscreen-button-corner-0" data-dcnode-id="874"><use class="ytp-svg-shadow" data-dcnode-id="876" href="#ytp-id-6"><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="877" id="ytp-id-6"></path></use><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="875" id="ytp-id-6"></path></g><g class="ytp-fullscreen-button-corner-1" data-dcnode-id="870"><use class="ytp-svg-shadow" data-dcnode-id="872" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="873" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="871" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="866"><use class="ytp-svg-shadow" data-dcnode-id="868" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0, </span><h2 data-dcnode-id="840"><span data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">History of Japanese Cuisine</span></span></h2><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="838" instrument_node="">In 675 B.C.E., the Japanese Emperor Tenmu set a law prohibiting the consumption of meat from mammals largely due to religious reasons. For 12 centuries, the island nation enjoyed a diet rich in seafood and vegetable dishes. During the Kamakura period (1192–1333) </span><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">shojin ryori</span></em><span data-dcnode-id="835" instrument_node=""> (Buddhist vegetarian cuisine) became popular with the general public; as a result, the Japanese diet today is rich in a variety of vegetables, tofu, and soy prepared in a number of forms including fried tofu and </span><em data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">yuba</span></em><span data-dcnode-id="832" instrument_node="">, or gossamer thin sheets of soy milk. Shojin ryori also practices using every part of ingredients, so that nothing goes to waste. This belief is still adhered to in traditional kitchens to this day.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="829" instrument_node="">Central to Japanese cuisine is </span><em data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">gohan</span></em><span data-dcnode-id="826" instrument_node="">, or rice. (Gohan also refers to a meal, which reflects how integral rice is to the diet.) When the cuisine takes form as we now know it is during the Muromachi period (1392–1573) when the roots of </span><em data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">ichiju sansai</span></em><span data-dcnode-id="823" instrument_node="">, one soup and three side dishes, are established. Many set meals at restaurants and homes follow this model: three side dishes, soup, rice, and pickles. It is considered a framework for a balanced and nutritious meal.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="820" instrument_node="">During the late Edo period (1603–1867), restaurants that specialize in one dish also became popular. Tokyo in particular is known for </span><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">senmon ryori ten</span></em><span data-dcnode-id="817" instrument_node="">—restaurants that serve one dish such as soba, tonkatsu, ramen, yakitori, and sushi. The owner of the shop becomes a </span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">shokunin</span></em><span data-dcnode-id="814" instrument_node=""> or specialist in the cuisine.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">For the most part, the Japanese did not eat meat until 1872, when the emperor Meiji rescinded the prohibition. (The emperor himself ate meat and that helped to relax society’s view.) But it wasn’t until after the Great Kanto Earthquake in 1923, when foreign countries sent emergency rations to Japan including canned corned beef, that the consumption of meat became accepted by the masses.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Other influences on Japanese cuisine were also imported from overseas. Chopsticks, advanced pottery techniques, tofu, tea, sushi, noodles, and much more arrived from China and Korea. Tempura is an import from Portugal and curry from the British Royal Navy. Western Europe introduced beef and pork, and thus began the Westernization of the Japanese diet.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="805" instrument_node="">The Japanese pantry is based on fermented foods that are made with a mold called </span><em data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">koji</span></em><span data-dcnode-id="802" instrument_node=""> (aspergillus oryzae), such as soy sauce, sake, rice vinegar, and miso. Umami, the delicious fifth flavor of the palate, is also an integral part of the cuisine. It is naturally found in kombu (kelp, a sea vegetable) and </span><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">katsuobushi </span></em><span data-dcnode-id="799" instrument_node="">(smoked and dried skipjack tuna flakes). The two are used for making dashi stock, which is the base for many dishes.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Here are 10 traditional Japanese foods to try on your next trip to Japan (or at least on your next outing to the neighborhood Japanese restaurant).</span></p><span data-dcnode-id="794" instrument_node="">
</span><div class="article-content-media" data-dcnode-id="779" data-img-id="272237"><span data-dcnode-id="793" instrument_node="">
</span><img alt="Soba is traditionally served with shredded nori as a garnish." class="_1MwUyUNFpNtn27W7qYmqk0" data-dcnode-id="792" data-reactroot="" data-src="https://afar-production.imgix.net/uploads/images/post_images/images/7tdP89v9ce/original_shutterstock_499805623.jpg?auto=compress,format&amp;lossless=true&amp;w=845" data-srcset="https://afar-production.imgix.net/uploads/images/post_images/images/7tdP89v9ce/original_shutterstock_499805623.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=1 1x,https://afar-production.imgix.net/uploads/images/post_images/images/7tdP89v9ce/original_shutterstock_499805623.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=2 2x,https://afar-production.imgix.net/uploads/images/post_images/images/7tdP89v9ce/original_shutterstock_499805623.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=3 3x" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afar-production.imgix.net/uploads/images/post_images/images/7tdP89v9ce/original_shutterstock_499805623.jpg%3Fauto%3Dcompress%2Cformat%26lossless%3Dtrue%26w%3D845&amp;raw"><div class="_2Zaf7mG_Ubg8QePexxO1Ea" data-dcnode-id="789" data-reactroot=""><a data-dcnode-id="790" data-pin-custom="true" data-pin-do="buttonPin" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fdescription%3DSoba%2520is%2520traditionally%2520served%2520with%2520shredded%2520nori%2520as%2520a%2520garnish.%26media%3Dhttps%3A//afar-production.imgix.net/uploads/images/post_images/images/7tdP89v9ce/original_shutterstock_499805623.jpg%3Fauto%3Dcompress%2Cformat%26lossless%3Dtrue%26w%3D845%26url%3Dhttps%3A//www.afar.com/magazine/traditional-japanese-food%26utm_campaign%3Dsocialshare%26utm_medium%3Dsocial%26utm_source%3Dsshare"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l ebkEeME0GxISXsuAEuWYX _31vuR2t0B8_opfbJw_sn9R Rw4sXfUF_KLTZu0sh67W" data-dcnode-id="791"></i></a></div><div class="image-meta-data" data-dcnode-id="781"><span data-dcnode-id="788" instrument_node="">
</span><div class="photo-credit" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Photo by Piyato/Shutterstock</span></div><span data-dcnode-id="785" instrument_node="">
</span><div class="caption-text" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Soba is traditionally served with shredded nori as a garnish.</span></div><span data-dcnode-id="782" instrument_node="">
</span></div><span data-dcnode-id="780" instrument_node="">
</span></div><span data-dcnode-id="778" instrument_node="">
</span><h2 data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">1. Soba</span></h2><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="774" instrument_node="">The nutritious buckwheat grain has been harvested in Japan for over a thousand years, and in the 16th century, it was first transformed into noodles, or soba. Soba aficionados tend to prefer cold noodles, </span><em data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">zaru soba</span></em><span data-dcnode-id="771" instrument_node="">, rather than hot, </span><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">kake soba</span></em><span data-dcnode-id="768" instrument_node="">, to best appreciate their aroma and texture. This style of cold noodle is served with a dipping sauce called </span><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">tsuyu </span></em><span data-dcnode-id="765" instrument_node="">that’s based on </span><em data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">dashi</span></em><span data-dcnode-id="762" instrument_node="">, a popular Japanese soup stock. Just don’t toss whatever sauce you don’t finish—you can mix it in later with some of the hot water that the soba was cooked in (called </span><em data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">soba-yu</span></em><span data-dcnode-id="759" instrument_node="">), which is commonly offered by restaurants as a savory soup to finish the meal.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="756" instrument_node="">Look for </span><em data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">sobaya</span></em><span data-dcnode-id="753" instrument_node=""> (soba shop) signs that say </span><em data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">teuchi soba</span></em><span data-dcnode-id="750" instrument_node=""> for handmade noodles, and keep in mind that 100 percent buckwheat noodles (</span><em data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">jūwari</span></em><span data-dcnode-id="747" instrument_node="">) are not as common as </span><em data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">ni-hachi</span></em><span data-dcnode-id="744" instrument_node="">, which are noodles made of 20 percent flour and 80 percent buckwheat.</span></p><span data-dcnode-id="742" instrument_node="">
</span><h3 data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Where to Eat Soba in Japan</span></h3><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="731"><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.honmuraantokyo.com/eng/" rel="noopener" target="_blank"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Honmura An</span></strong></a><span data-dcnode-id="735" instrument_node=""> in the Roppongi quarter of Tokyo offers a nice list of small plates as well as handmade soba noodles, featuring toppings like uni or </span><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">yuba</span></em><span data-dcnode-id="732" instrument_node="">, soy milk skin.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="719"><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honke-owariya.co.jp/en/whatisowariya/" rel="noopener" target="_blank"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Honke Owariya</span></strong></a><span data-dcnode-id="726" instrument_node=""> has been serving soba in </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.afar.com/travel-guides/japan/kyoto/guide"><span data-dcnode-id="725" instrument_node="">Kyoto</span></a><span data-dcnode-id="723" instrument_node=""> for over 500 years. Try its signature dish, Hourai soba, which incorporates eight different toppings, including shrimp tempura, nori, shiitake mushrooms, wasabi, and grated daikon. Pair it with</span><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node=""> soba shōchū</span></em><span data-dcnode-id="720" instrument_node="">, a distilled spirit made with buckwheat and served mixed in with the hot water that the soba noodles were cooked in.</span></p><span data-dcnode-id="718" instrument_node="">
</span><h2 data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">2. Tempura</span></h2><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Tempura, a style of deep-fried foods—including seasonal vegetables, shrimp, and white fish that are first dipped into an egg and flour batter—was introduced to Japan by Portuguese missionaries in the mid-16th century. The Japanese twist on the dish is its dipping sauce, a blend of soy sauce and other seasonings that’s enhanced by grated daikon radish. The meal is rounded out with rice, miso soup, and pickles.</span></p><span data-dcnode-id="712" instrument_node="">
</span><h3 data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Where to Eat Tempura in Japan</span></h3><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="704"><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kagurazaka-tenko.jp/" rel="noopener" target="_blank"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Tenko</span></strong></a><span data-dcnode-id="705" instrument_node="">, in Tokyo’s Kagurazaka district, is housed in a former geisha house, and its excellent selection of tempura is popular with chefs from around the world, including chef Nobuyuki “Nobu” Matsuhisa.</span></p><span data-dcnode-id="703" instrument_node="">
</span><div class="article-content-media" data-dcnode-id="688" data-img-id="272233"><span data-dcnode-id="702" instrument_node="">
</span><img alt="Osaka is known for its plethora of okonomiyaki restaurants." class="_1MwUyUNFpNtn27W7qYmqk0" data-dcnode-id="701" data-reactroot="" data-src="https://afar-production.imgix.net/uploads/images/post_images/images/lgKBVKZ5Pt/original_shutterstock_1389220697.jpg?auto=compress,format&amp;lossless=true&amp;w=845" data-srcset="https://afar-production.imgix.net/uploads/images/post_images/images/lgKBVKZ5Pt/original_shutterstock_1389220697.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=1 1x,https://afar-production.imgix.net/uploads/images/post_images/images/lgKBVKZ5Pt/original_shutterstock_1389220697.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=2 2x,https://afar-production.imgix.net/uploads/images/post_images/images/lgKBVKZ5Pt/original_shutterstock_1389220697.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=3 3x" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afar-production.imgix.net/uploads/images/post_images/images/lgKBVKZ5Pt/original_shutterstock_1389220697.jpg%3Fauto%3Dcompress%2Cformat%26lossless%3Dtrue%26w%3D845&amp;raw"><div class="_2Zaf7mG_Ubg8QePexxO1Ea" data-dcnode-id="698" data-reactroot=""><a data-dcnode-id="699" data-pin-custom="true" data-pin-do="buttonPin" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fdescription%3DOsaka%2520is%2520known%2520for%2520its%2520plethora%2520of%2520okonomiyaki%2520restaurants.%26media%3Dhttps%3A//afar-production.imgix.net/uploads/images/post_images/images/lgKBVKZ5Pt/original_shutterstock_1389220697.jpg%3Fauto%3Dcompress%2Cformat%26lossless%3Dtrue%26w%3D845%26url%3Dhttps%3A//www.afar.com/magazine/traditional-japanese-food%26utm_campaign%3Dsocialshare%26utm_medium%3Dsocial%26utm_source%3Dsshare"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l ebkEeME0GxISXsuAEuWYX _31vuR2t0B8_opfbJw_sn9R Rw4sXfUF_KLTZu0sh67W" data-dcnode-id="700"></i></a></div><div class="image-meta-data" data-dcnode-id="690"><span data-dcnode-id="697" instrument_node="">
</span><div class="photo-credit" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Photo by SubstanceTProductions/Shutterstock</span></div><span data-dcnode-id="694" instrument_node="">
</span><div class="caption-text" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Osaka is known for its plethora of okonomiyaki restaurants.</span></div><span data-dcnode-id="691" instrument_node="">
</span></div><span data-dcnode-id="689" instrument_node="">
</span></div><span data-dcnode-id="687" instrument_node="">
</span><h2 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">3. Okonomiyaki</span></h2><span data-dcnode-id="684" instrument_node="">
</span></div><div class="ZZAilYOLYlkw-Hv02mHW8" data-dcnode-id="677"><div class="adContainer" data-dcnode-id="678"><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">ADVERTISEMENT</span></p><div class="_1idBj71TQVPU78JmUmINCH _3xZf5JXG5Q0sMG7o-bkXQy _3wcIc2Iqzhd3gyDT4nMprE" data-dcnode-id="679"><div data-dcnode-id="680" style="width: 300px; height: 250px;"></div></div></div></div><div data-dcnode-id="433"><p data-dcnode-id="663"><span data-dcnode-id="676" instrument_node="">Savory pancakes, called </span><em data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">okonomiyaki</span></em><span data-dcnode-id="673" instrument_node="">, are based on flour that’s mixed with egg and chopped cabbage and enhanced by optional fillings like squid, bacon, or shrimp. At restaurants, the waitstaff will mix the customer-selected ingredients and pour it onto a</span><em data-dcnode-id="671"><span data-dcnode-id="672" instrument_node=""> teppan</span></em><span data-dcnode-id="670" instrument_node="">, a tabletop iron grill, in front of the diner. Just before it is ready to eat, the pancake is seasoned with a savory brown sauce and mayonnaise, and garnished with smoky</span><em data-dcnode-id="668"><span data-dcnode-id="669" instrument_node=""> katsuobushi</span></em><span data-dcnode-id="667" instrument_node=""> flakes (made of dried and smoked skipjack tuna) and </span><em data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">aonori</span></em><span data-dcnode-id="664" instrument_node=""> seaweed. Tip: It’s hot near the iron grill—an ice-cold beer is recommended.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">This communal-style meal is popular with friends and family who sit around the hot plate, sharing the pancakes. The dish has cultivated an especially strong following in the city of Osaka, where okonomiyaki is prominently featured on many restaurant menus.</span></p><span data-dcnode-id="659" instrument_node="">
</span><h3 data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Where to Eat Okonomiyaki in Japan</span></h3><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="651"><strong data-dcnode-id="653"><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mizuno.gorp.jp/" rel="noopener" target="_blank"><span data-dcnode-id="655" instrument_node="">Mizuno</span></a></strong><span data-dcnode-id="652" instrument_node="">, in the Dotonbori neighborhood of Osaka, is one of the best of the many okonomiyaki-specialized local eateries in a city where the pancakes are a sort of soul food for its denizens; it’s a popular eatery, so be prepared to queue.</span></p><span data-dcnode-id="650" instrument_node="">
</span><h2 data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">4. Tonkatsu</span></h2><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="646" instrument_node="">Breaded and deep-fried pork cutlets, </span><em data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">tonkatsu</span></em><span data-dcnode-id="643" instrument_node=""> (the word comes from </span><em data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">ton</span></em><span data-dcnode-id="640" instrument_node=""> for pork and </span><em data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">katsu</span></em><span data-dcnode-id="637" instrument_node=""> from cutlets) is similar to German-style schnitzel, except that the German version is cooked in butter and in Japan it’s deep-fried in oil. Many culinary historians believe that Tokyo’s Rengatei restaurant first served </span><em data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">tonkatsu</span></em><span data-dcnode-id="634" instrument_node=""> back in 1895 (while the restaurant is still up and running, it’s not as good as Maisen, our recommendation below). </span><em data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Tonkatsu</span></em><span data-dcnode-id="631" instrument_node=""> is traditionally served with julienned cabbage, white rice, and miso soup (bonus: many restaurants will offer free refills of the cabbage and rice). Not a fan of pork? Swap it out for variations of other ingredients that can be similarly breaded and deep-fried like shrimp (</span><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">ebi furai</span></em><span data-dcnode-id="628" instrument_node="">) or chicken (</span><em data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">chikin katsu</span></em><span data-dcnode-id="625" instrument_node="">).</span></p><span data-dcnode-id="623" instrument_node="">
</span><h3 data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Where to Eat Tonkatsu in Japan</span></h3><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="612"><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mai-sen.com/" rel="noopener" target="_blank"><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Maisen</span></strong></a><span data-dcnode-id="616" instrument_node=""> is housed in a former Tokyo bathhouse, affording a unique space in which to sample </span><em data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">tonkatsu</span></em><span data-dcnode-id="613" instrument_node="">. Five brands of pork are on the menu, each affording a signature flavor: Try the marbled and tender Tokyo X, or the Chamiton, which has an inherent sweetness.</span></p><span data-dcnode-id="611" instrument_node="">
</span><div class="article-content-media" data-dcnode-id="596" data-img-id="272235"><span data-dcnode-id="610" instrument_node="">
</span><img alt="Wagyu beef is known for its characteristic marbling." class="lazyStatic _1MwUyUNFpNtn27W7qYmqk0" data-dcnode-id="609" data-reactroot="" data-src="https://afar-production.imgix.net/uploads/images/post_images/images/bZrCnf9ToE/original_shutterstock_1484900747.jpg?auto=compress,format&amp;lossless=true&amp;w=845" data-srcset="https://afar-production.imgix.net/uploads/images/post_images/images/bZrCnf9ToE/original_shutterstock_1484900747.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=1 1x,https://afar-production.imgix.net/uploads/images/post_images/images/bZrCnf9ToE/original_shutterstock_1484900747.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=2 2x,https://afar-production.imgix.net/uploads/images/post_images/images/bZrCnf9ToE/original_shutterstock_1484900747.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=3 3x" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afar-production.imgix.net/assets/placeholder-image.jpg%3Flossless%3Dtrue%26auto%3Dcompress%2Cformat&amp;raw"><div class="_2Zaf7mG_Ubg8QePexxO1Ea" data-dcnode-id="606" data-reactroot=""><a data-dcnode-id="607" data-pin-custom="true" data-pin-do="buttonPin" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fdescription%3DWagyu%2520beef%2520is%2520known%2520for%2520its%2520characteristic%2520marbling.%26media%3Dhttps%3A//afar-production.imgix.net/uploads/images/post_images/images/bZrCnf9ToE/original_shutterstock_1484900747.jpg%3Fauto%3Dcompress%2Cformat%26lossless%3Dtrue%26w%3D845%26url%3Dhttps%3A//www.afar.com/magazine/traditional-japanese-food%26utm_campaign%3Dsocialshare%26utm_medium%3Dsocial%26utm_source%3Dsshare"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l ebkEeME0GxISXsuAEuWYX _31vuR2t0B8_opfbJw_sn9R Rw4sXfUF_KLTZu0sh67W" data-dcnode-id="608"></i></a></div><div class="image-meta-data" data-dcnode-id="598"><span data-dcnode-id="605" instrument_node="">

</span><div class="caption-text" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Wagyu beef is known for its characteristic marbling.</span></div><span data-dcnode-id="599" instrument_node="">
</span></div><span data-dcnode-id="597" instrument_node="">
</span></div><span data-dcnode-id="595" instrument_node="">
</span><h2 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">5. Wagyu</span></h2><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="591" instrument_node="">Marbled Japanese beef, called </span><em data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">wagyu</span></em><span data-dcnode-id="588" instrument_node="">&nbsp;(</span><em data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">wa</span></em><span data-dcnode-id="585" instrument_node=""> means Japanese and </span><em data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">gyu</span></em><span data-dcnode-id="582" instrument_node="">&nbsp;is beef), comes from four cattle breeds that are raised throughout Japan, with popular brands like Kobe beef, Matsuzaka-gyu, and Hida-gyu. The marbling itself is called </span><em data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">shimofuri</span></em><span data-dcnode-id="579" instrument_node=""> and makes for tender cuts of beef that melt in your mouth.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="570"><em data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Sukiyaki</span></em><span data-dcnode-id="574" instrument_node="">, created in the late 1900s, is one popular dish that features </span><em data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">wagyu</span></em><span data-dcnode-id="571" instrument_node="">, sliced thin and cooked in a cast-iron pan on a portable tabletop grill, along with vegetables and tofu, in a sweet soy broth. The finishing touch is a coating of raw egg, layered on just before eating.</span></p><span data-dcnode-id="569" instrument_node="">
</span><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Where to Eat Wagyu in Japan</span></h3><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="551"><strong data-dcnode-id="562"><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//restaurants.tokyo.park.hyatt.co.jp/en/nyg.html" rel="noopener" target="_blank"><span data-dcnode-id="565" instrument_node="">New York Grill</span></a><span data-dcnode-id="563" instrument_node=""> </span></strong><span data-dcnode-id="561" instrument_node="">at the </span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.afar.com/places/park-hyatt-tokyo-xin-su-qu"><span data-dcnode-id="560" instrument_node="">Park Hyatt Tokyo</span></a><span data-dcnode-id="558" instrument_node=""> is one of the largest purchasers of Kobe beef in Japan (the dinner menu includes </span><em data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">wagyu</span></em><span data-dcnode-id="555" instrument_node="">&nbsp;steaks from five Japanese regions), and its marbled beef is as memorable as the fabulous views of the city from the lauded hotel eatery’s 52nd floor (which was immortalized in the film </span><em data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Lost in Translation</span></em><span data-dcnode-id="552" instrument_node="">).</span></p><span data-dcnode-id="550" instrument_node="">
</span><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">6. Kaiseki</span></h2><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="543"><em data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Kaiseki</span></em><span data-dcnode-id="544" instrument_node="">, a multicourse meal of seasonal dishes, is influenced by several ancient traditions, including elements of Japanese imperial court cuisine that date back 1,000 years. Modern-day kaiseki feasts typically feature 10 courses like sashimi, a grilled dish, and a soup, rounded out with rice, pickles, and something sweet, like sliced fresh fruit.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Keep in mind that evening kaiseki meals can run several hundred dollars. If you’re watching your budget, look for kaiseki restaurants that offer a shorter and more wallet-friendly menu at lunchtime. Be sure to let the restaurant know ahead of time of any allergies or dietary restrictions.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Kyoto, where kaiseki originated, is especially notable for having many kaiseki-specialized restaurants.</span></p><span data-dcnode-id="536" instrument_node="">
</span><h3 data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Where to Eat Kaiseki in Japan</span></h3><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="528"><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seiwasou-kyoto.com/" rel="noopener" target="_blank"><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Seiwasou</span></strong></a><span data-dcnode-id="529" instrument_node="">, in Kyoto’s Fushimi District, is helmed by the restaurant’s third-generation chef Tetsuo Takenaka. Pair an outstanding kaiseki experience with neighborhood-sourced sake and views of the eatery’s manicured Japanese garden.</span></p><span data-dcnode-id="527" instrument_node="">
</span><div class="article-content-media" data-dcnode-id="512" data-img-id="272240"><span data-dcnode-id="526" instrument_node="">
</span><img alt="Traditional yakitori uses almost every part of the chicken." class="lazyStatic _1MwUyUNFpNtn27W7qYmqk0" data-dcnode-id="525" data-reactroot="" data-src="https://afar-production.imgix.net/uploads/images/post_images/images/AgN2W54yRt/original_shutterstock_1489557986.jpg?auto=compress,format&amp;lossless=true&amp;w=845" data-srcset="https://afar-production.imgix.net/uploads/images/post_images/images/AgN2W54yRt/original_shutterstock_1489557986.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=1 1x,https://afar-production.imgix.net/uploads/images/post_images/images/AgN2W54yRt/original_shutterstock_1489557986.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=2 2x,https://afar-production.imgix.net/uploads/images/post_images/images/AgN2W54yRt/original_shutterstock_1489557986.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=3 3x" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afar-production.imgix.net/assets/placeholder-image.jpg%3Flossless%3Dtrue%26auto%3Dcompress%2Cformat&amp;raw"><div class="_2Zaf7mG_Ubg8QePexxO1Ea" data-dcnode-id="522" data-reactroot=""><a data-dcnode-id="523" data-pin-custom="true" data-pin-do="buttonPin" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fdescription%3DTraditional%2520yakitori%2520uses%2520almost%2520every%2520part%2520of%2520the%2520chicken.%26media%3Dhttps%3A//afar-production.imgix.net/uploads/images/post_images/images/AgN2W54yRt/original_shutterstock_1489557986.jpg%3Fauto%3Dcompress%2Cformat%26lossless%3Dtrue%26w%3D845%26url%3Dhttps%3A//www.afar.com/magazine/traditional-japanese-food%26utm_campaign%3Dsocialshare%26utm_medium%3Dsocial%26utm_source%3Dsshare"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l ebkEeME0GxISXsuAEuWYX _31vuR2t0B8_opfbJw_sn9R Rw4sXfUF_KLTZu0sh67W" data-dcnode-id="524"></i></a></div><div class="image-meta-data" data-dcnode-id="514"><span data-dcnode-id="521" instrument_node="">
</span><div class="photo-credit" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Photo by Artit Wongpradu/Shutterstock</span></div><span data-dcnode-id="518" instrument_node="">
</span><div class="caption-text" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Traditional yakitori uses almost every part of the chicken.</span></div><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="513" instrument_node="">
</span></div><span data-dcnode-id="511" instrument_node="">
</span><h2 data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">7. Yakitori</span></h2><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="507" instrument_node="">Grilled chicken skewers cooked over charcoal and seasoned with salt or a sweet soy sauce, yakitori is a classic after-work meal for the Japanese—and is typically served with ice- cold mugs of beer. Traditional yakitori uses almost every part of the chicken: thigh, breast, liver, gizzard, heart, and skin. (Some unique skewers include cartilage, </span><em data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">tsukune</span></em><span data-dcnode-id="504" instrument_node=""> ground chicken balls, or </span><em data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">bonjiri, </span></em><span data-dcnode-id="501" instrument_node="">the fatty part near the tail of the chicken.) The pleasure of yakitori is experiencing the different textures: crunchy cartilage, chewy chicken skin, rich gizzard, and the resistance of tsukune chicken balls with minced cartilage.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="498" instrument_node="">Diners put empty skewers into large cups. </span><em data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Shichimi </span></em><span data-dcnode-id="495" instrument_node="">seven-spice and </span><em data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">kona zansho</span></em><span data-dcnode-id="492" instrument_node=""> powdered </span><em data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">sansho</span></em><span data-dcnode-id="489" instrument_node=""> prickly ash peppercorns are on the counter to season the yakitori. A meal will be rounded out with pickles, edamame, grilled onigiri rice balls, and chicken soup. When you order the skewers, most shops will ask if you want each skewer salted or with the </span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">tare</span></em><span data-dcnode-id="486" instrument_node=""> sweet soy sauce. To make it easy, say </span><em data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">omakase</span></em><span data-dcnode-id="483" instrument_node=""> and leave it up to the grill master to season each skewer as the shop recommends.</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="480" instrument_node="">Yakitori restaurants run from casual standing bars under the train tracks to upscale wooden counters overlooking an open kitchen. The higher-end restaurants will use a smokeless </span><em data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">binchotan</span></em><span data-dcnode-id="477" instrument_node=""> charcoal. (</span><em data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Yaki</span></em><span data-dcnode-id="474" instrument_node=""> means grilled and </span><em data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">tori</span></em><span data-dcnode-id="471" instrument_node=""> means chicken.) Some yakitori restaurants will also serve </span><em data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">yakiton</span></em><span data-dcnode-id="468" instrument_node="">, grilled pork skewers.</span></p><span data-dcnode-id="466" instrument_node="">
</span><h3 data-dcnode-id="463"><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Where to Eat Yakitori in Japan</span></strong></h3><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="461" instrument_node="">The </span><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">omakase</span></em><span data-dcnode-id="458" instrument_node=""> course menu at </span><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ginza-birdland.sakura.ne.jp/" rel="noopener" target="_blank"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Ginza Bird Land</span></strong></a><span data-dcnode-id="454" instrument_node=""> includes popular skewers and the signature house-made chicken liver pâté. Birdland has an excellent wine list and Riedel glasses to elevate the meal. Fun fact: The basement restaurant is next door to the world’s most famous sushi shop, Sukiyabashi Jiro, and fifth-generation Nodaiwa unagi restaurant.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="447"><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.isehiro.co.jp/" rel="noopener" target="_blank"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Kyobashi Isehiro</span></strong></a><span data-dcnode-id="448" instrument_node="">, a short walk from Tokyo Station, has been serving yakitori for 100 years. The shop is famous for tsukune, balls of ground chicken and minced cartilage, that have a rich texture like firm matzo balls.</span></p><span data-dcnode-id="446" instrument_node="">
</span><h2 data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">8. Ramen</span></h2><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="442" instrument_node="">A Chinese import, ramen shops (</span><em data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">ramenya</span></em><span data-dcnode-id="439" instrument_node="">), staffed by cooks from China, began to operate in Tokyo in the early 1900s. Compared to the Chinese version, however, Japanese ramen claims a lighter and more delicate broth, though its meatiness—it’s usually infused with pork, but also chicken, and sometimes, seafood—is still more potent than the soup served with soba or udon noodle dishes. The thin noodles, meanwhile, are made with flour and baking soda, giving it a chewy texture. Nowadays, ramen is served in a variety of styles: with soup, without soup, hot, cold, with a dipping sauce, and with a variety of toppings. Regional variations will introduce local ingredients and flavorings, too.</span></p><span data-dcnode-id="437" instrument_node="">
</span><h3 data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Where to Eat Ramen in Japan</span></h3><span data-dcnode-id="434" instrument_node="">
</span></div><div class="ZZAilYOLYlkw-Hv02mHW8" data-dcnode-id="427"><div class="adContainer" data-dcnode-id="428"><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">ADVERTISEMENT</span></p><div class="_1idBj71TQVPU78JmUmINCH _3xZf5JXG5Q0sMG7o-bkXQy _3wcIc2Iqzhd3gyDT4nMprE" data-dcnode-id="429"><div data-dcnode-id="430" style="width: 300px; height: 250px;"></div></div></div></div><div data-dcnode-id="206"><p data-dcnode-id="421"><strong data-dcnode-id="423"><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/kagari_honten/" rel="noopener" target="_blank"><span data-dcnode-id="426" instrument_node="">Kagari Honten</span></a><span data-dcnode-id="424" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="422" instrument_node="">in Tokyo’s Ginza quarter specializes in a creamy chicken ramen that features thin noodles, topped with seasonal vegetables. (Note: The shop is cashless, so bring along a credit card.)</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="414"><strong data-dcnode-id="416"><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//menya-kaijin.com/" rel="noopener" target="_blank"><span data-dcnode-id="419" instrument_node="">Menya Kaijin</span></a><span data-dcnode-id="417" instrument_node=""> </span></strong><span data-dcnode-id="415" instrument_node="">offers a unique menu of seafood-based ramen in Tokyo (at Shinjuku), with a broth that’s determined each morning depending on what’s available at the fish market.</span></p><span data-dcnode-id="413" instrument_node="">
</span><div class="article-content-media" data-dcnode-id="398" data-img-id="272229"><span data-dcnode-id="412" instrument_node="">
</span><img alt="Japan has no shortage of excellent sushi restaurants." class="lazyStatic _1MwUyUNFpNtn27W7qYmqk0" data-dcnode-id="411" data-reactroot="" data-src="https://afar-production.imgix.net/uploads/images/post_images/images/iLxLVTiyaw/original_moiz-k-malik--MRRuk0J06U-unsplash.jpg?auto=compress,format&amp;lossless=true&amp;w=845" data-srcset="https://afar-production.imgix.net/uploads/images/post_images/images/iLxLVTiyaw/original_moiz-k-malik--MRRuk0J06U-unsplash.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=1 1x,https://afar-production.imgix.net/uploads/images/post_images/images/iLxLVTiyaw/original_moiz-k-malik--MRRuk0J06U-unsplash.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=2 2x,https://afar-production.imgix.net/uploads/images/post_images/images/iLxLVTiyaw/original_moiz-k-malik--MRRuk0J06U-unsplash.jpg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=3 3x" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afar-production.imgix.net/assets/placeholder-image.jpg%3Flossless%3Dtrue%26auto%3Dcompress%2Cformat&amp;raw"><div class="_2Zaf7mG_Ubg8QePexxO1Ea" data-dcnode-id="408" data-reactroot=""><a data-dcnode-id="409" data-pin-custom="true" data-pin-do="buttonPin" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fdescription%3DJapan%2520has%2520no%2520shortage%2520of%2520excellent%2520sushi%2520restaurants.%26media%3Dhttps%3A//afar-production.imgix.net/uploads/images/post_images/images/iLxLVTiyaw/original_moiz-k-malik--MRRuk0J06U-unsplash.jpg%3Fauto%3Dcompress%2Cformat%26lossless%3Dtrue%26w%3D845%26url%3Dhttps%3A//www.afar.com/magazine/traditional-japanese-food%26utm_campaign%3Dsocialshare%26utm_medium%3Dsocial%26utm_source%3Dsshare"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l ebkEeME0GxISXsuAEuWYX _31vuR2t0B8_opfbJw_sn9R Rw4sXfUF_KLTZu0sh67W" data-dcnode-id="410"></i></a></div><div class="image-meta-data" data-dcnode-id="400"><span data-dcnode-id="407" instrument_node="">

</span><div class="caption-text" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Japan has no shortage of excellent sushi restaurants.</span></div><span data-dcnode-id="401" instrument_node="">
</span></div><span data-dcnode-id="399" instrument_node="">
</span></div><span data-dcnode-id="397" instrument_node="">
</span><h2 data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">9. Sushi</span></h2><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="393" instrument_node="">Dating back to 8th-century Japan, when fish was preserved in fermented rice, sushi is likely the country’s most popular culinary export today, although few are familiar with its many varied forms. It is often equated with </span><em data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">nigirizushi</span></em><span data-dcnode-id="390" instrument_node="">, the </span><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.afar.com/travel-guides/japan/tokyo/guide"><span data-dcnode-id="389" instrument_node="">Tokyo</span></a><span data-dcnode-id="387" instrument_node="">-style sushi that tops off bite-sized vinegar-marinated white rice with seasonal seafood. But there are other types of sushi, too, including </span><em data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">chirashizushi</span></em><span data-dcnode-id="384" instrument_node="">, or scattered sushi, a dish popularly prepared in the home, with ingredients (like seafood, sweet omelet, and vegetables) “scattered” atop the rice, or </span><em data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">oshizushi</span></em><span data-dcnode-id="381" instrument_node="">, an Osaka-style pressed sushi crowned with pickled Pacific mackerel.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="378" instrument_node="">Throughout the country, sushi styles are greatly influenced by the available local seafood. In Tokyo, for instance, the menu is driven by seasonal seafood caught in Tokyo Bay (like </span><em data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">anago</span></em><span data-dcnode-id="375" instrument_node="">, a saltwater eel, or </span><em data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">kohada</span></em><span data-dcnode-id="372" instrument_node="">, gizzard shad). Often, the fish is served raw, but it can also be pickled, cured, or cooked. Commonplace everywhere, though, is the dish's base of Japanese-sourced rice that’s mixed with vinegar (and sometimes sugar), along with a garnishing of wasabi (a spicy plant-based condiment) and soy sauce (with sauce flavors that change throughout the country—the soy sauce used in </span><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.afar.com/travel-tips/the-best-of-kyushu-2f0e746d-a8fb-45e5-a3d2-65da6a00ac67"><span data-dcnode-id="371" instrument_node="">Kyushu</span></a><span data-dcnode-id="369" instrument_node="">, an island in southern Japan, for instance, is sweet).</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="366" instrument_node="">Sample sushi at a</span><em data-dcnode-id="364"><span data-dcnode-id="365" instrument_node=""> sushiya</span></em><span data-dcnode-id="363" instrument_node="">—a traditional restaurant that specializes in the cuisine, where you’ll get the freshest flavors by asking for shun no mono (seasonal ingredients) and </span><em data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">jizakana</span></em><span data-dcnode-id="360" instrument_node=""> (local seafood).</span></p><span data-dcnode-id="358" instrument_node="">
</span><h3 data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Where to Eat Sushi in Japan</span></h3><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="341"><strong data-dcnode-id="352"><a data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kyubey.jp/" rel="noopener" target="_blank"><span data-dcnode-id="354" instrument_node="">Ginza Kyubey</span></a></strong><span data-dcnode-id="351" instrument_node="">—a third-generation sushiya—is an excellent spot to experience top-quality sushi in Tokyo. The founder created </span><em data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">gunkanzushi</span></em><span data-dcnode-id="348" instrument_node="">, sushi wrapped in a long strip of nori seaweed that can hold delicate ingredients like </span><em data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">uni</span></em><span data-dcnode-id="345" instrument_node=""> (sea urchin) or</span><em data-dcnode-id="343"><span data-dcnode-id="344" instrument_node=""> ikura</span></em><span data-dcnode-id="342" instrument_node=""> (salmon roe).</span></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="326"><strong data-dcnode-id="337"><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maimon-susi.com/" rel="noopener" target="_blank"><span data-dcnode-id="339" instrument_node="">Maimon Sushi</span></a></strong><span data-dcnode-id="336" instrument_node=""> is a high-end </span><em data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">kaitenzushi</span></em><span data-dcnode-id="333" instrument_node=""> in the city of Kanazawa, offering conveyor-belt sushi, where twice-daily seafood deliveries ensure optimal freshness. Kanazawa is famed for its sushi dishes thanks to its location on the Sea of Japan, which comes stocked with seafood like </span><em data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">shiro ebi</span></em><span data-dcnode-id="330" instrument_node=""> (white shrimp) and </span><em data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">nodoguro</span></em><span data-dcnode-id="327" instrument_node=""> (black throat, which is a rich, fatty fish).</span></p><span data-dcnode-id="325" instrument_node="">
</span><h2 data-dcnode-id="320"><span data-dcnode-id="324" instrument_node="">10.&nbsp;</span><span data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Shabu-Shabu</span></span><span data-dcnode-id="321" instrument_node="">
</span></h2><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="318" instrument_node="">In 1938, Dr. Shoya Yoshida traveled to Beijing, where he tried </span><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">shuan yan rou</span></em><span data-dcnode-id="315" instrument_node="">, a hot pot made with lamb and served with a sauce to dip the cooked meat. Upon returning to Kyoto a few years later, he taught the dish to a restaurant. The dish was adapted for the Japanese palate and beef replaced the lamb. Thin slices of beef are dragged through a hot kombu broth until just cooked. The hot pot was called </span><em data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">gyuniku no mizudaki</span></em><span data-dcnode-id="312" instrument_node="">, beef hot pot. Later, an Osaka restaurant served the dish and shortened the name to </span><em data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">shabu</span></em><span data-dcnode-id="309" instrument_node="">-</span><em data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">shabu</span></em><span data-dcnode-id="306" instrument_node="">, which describes the sound of the meat swishing in the hot broth.</span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="303" instrument_node="">The wagyu beef is sliced one to two millimeters thin, so that it cooks in seconds. After the color of the beef changes, it can be dipped in an aromatic and tart soy sauce and citrus ponzu or a creamy sesame </span><em data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">gomadare</span></em><span data-dcnode-id="300" instrument_node="">. Grated daikon with chile pepper can be added to the ponzu. After the meat is cooked, vegetables are added to the hot pot. Traditional ingredients include shiitake, Napa cabbage, chrysanthemum greens, leeks, carrots, and tofu. The meal ends with either udon noodles or rice being added to the hot pot.</span></p><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="297" instrument_node="">Shabu-shabu hot pots are served throughout Japan, and regional differences showcase local ingredients to replace the wagyu beef, such as crab, octopus, salmon, </span><em data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">shirako</span></em><span data-dcnode-id="294" instrument_node=""> (cod milt), or </span><em data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">buri</span></em><span data-dcnode-id="291" instrument_node=""> (yellowtail), a fatty fish in winter.</span></p><span data-dcnode-id="289" instrument_node="">
</span><h3 data-dcnode-id="286"><span data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Where to Eat Shabu-Shabu in Japan</span></span></h3><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="280"><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asakusaimahan.co.jp/english/e_restaurant" rel="noopener" target="_blank"><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Imahan Honten</span></strong></a><span data-dcnode-id="281" instrument_node="">, in Tokyo’s historic Asakusa district, is a sixth-generation shop specializing in wagyu beef dishes such as shabu-shabu and sukiyaki. In the multi-story building, popular with locals, the shabu-shabu is served at low tables.</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="270"><strong data-dcnode-id="275"><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seryna.co.jp/en/seryna/roppongi/" rel="noopener" target="_blank"><span data-dcnode-id="278" instrument_node="">Roppongi Seryna Honten</span></a><span data-dcnode-id="276" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="274" instrument_node="">specializes in serving the famed marbled Kobe beef and crab shabu-shabu. The Tokyo Roppongi </span><em data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">honten</span></em><span data-dcnode-id="271" instrument_node=""> main shop has a luxurious Western interior.</span></p><span data-dcnode-id="269" instrument_node="">
</span><div class="article-content-media" data-dcnode-id="254" data-img-id="272227"><span data-dcnode-id="268" instrument_node="">
</span><img alt="Tea ceremonies are a time for quiet and reflection." class="lazyStatic _1MwUyUNFpNtn27W7qYmqk0" data-dcnode-id="267" data-reactroot="" data-src="https://afar-production.imgix.net/uploads/images/post_images/images/vtASK2ZJ1X/original_JF4_115273.jpeg?auto=compress,format&amp;lossless=true&amp;w=845" data-srcset="https://afar-production.imgix.net/uploads/images/post_images/images/vtASK2ZJ1X/original_JF4_115273.jpeg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=1 1x,https://afar-production.imgix.net/uploads/images/post_images/images/vtASK2ZJ1X/original_JF4_115273.jpeg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=2 2x,https://afar-production.imgix.net/uploads/images/post_images/images/vtASK2ZJ1X/original_JF4_115273.jpeg?auto=compress,format&amp;lossless=true&amp;w=845&amp;dpr=3 3x" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afar-production.imgix.net/assets/placeholder-image.jpg%3Flossless%3Dtrue%26auto%3Dcompress%2Cformat&amp;raw"><div class="_2Zaf7mG_Ubg8QePexxO1Ea" data-dcnode-id="264" data-reactroot=""><a data-dcnode-id="265" data-pin-custom="true" data-pin-do="buttonPin" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fdescription%3DTea%2520ceremonies%2520are%2520a%2520time%2520for%2520quiet%2520and%2520reflection.%26media%3Dhttps%3A//afar-production.imgix.net/uploads/images/post_images/images/vtASK2ZJ1X/original_JF4_115273.jpeg%3Fauto%3Dcompress%2Cformat%26lossless%3Dtrue%26w%3D845%26url%3Dhttps%3A//www.afar.com/magazine/traditional-japanese-food%26utm_campaign%3Dsocialshare%26utm_medium%3Dsocial%26utm_source%3Dsshare"><i class="_1xxwKoVqAaQ7FYmg-3h6Z9 _2_deLbIhfY1iDKDSDryS8l ebkEeME0GxISXsuAEuWYX _31vuR2t0B8_opfbJw_sn9R Rw4sXfUF_KLTZu0sh67W" data-dcnode-id="266"></i></a></div><div class="image-meta-data" data-dcnode-id="256"><span data-dcnode-id="263" instrument_node="">

</span><div class="caption-text" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Tea ceremonies are a time for quiet and reflection.</span></div><span data-dcnode-id="257" instrument_node="">
</span></div><span data-dcnode-id="255" instrument_node="">
</span></div><span data-dcnode-id="253" instrument_node="">
</span><h2 data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">All About Japanese Tea Ceremonies</span></h2><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="249" instrument_node="">In the 1300s, the tea ceremony was popular with Zen monks and samurai warriors for social and political purposes. By the 1400s, the Japanese tea ceremony was an artistic experience based on codified procedures that were established by Zen priest Shukou Murata. He pioneered the traditional setting in a small tatami mat room with simple aesthetics. Then as now, the focus was on the interaction between the host serving the tea, the recipient, and the tea utensils including the </span><em data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">chawan</span></em><span data-dcnode-id="246" instrument_node=""> (tea bowl) and the sweet </span><em data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">wagashi</span></em><span data-dcnode-id="243" instrument_node=""> (Japanese confectionery) served with the powdered bitter green tea.</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Sen no Rikyu was one of Japan’s most influential tea masters. In the late 1500s he built 40 new teahouses and established Murata’s principles of a simple setting. During the Meiji period (1868–1912), the government recognized the tea ceremony as an important cultural heritage, and tea began to be enjoyed by commoners more often.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="234"><em data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Chado</span></em><span data-dcnode-id="235" instrument_node="">, literally the way of tea, is rooted in Buddhism. It is a time for meditation and for quiet reflection of the environment and the season. Practitioners of the art will dress in kimonos and will source wagashi from specialty shops that incorporate seasonal motifs into the sweets. Chawan bowls are collected by hosts to serve the bright green matcha to guests. Part of the ritual is taking in the loveliness of the large bowls after drinking the tea. Guests will traditionally sit on straw mats on the floor. In contrast to the traditional tea ceremony are modern tea shops that are larger spaces with Western-style seating in chairs and a more relaxed environment than the traditional ceremony.</span></p><span data-dcnode-id="233" instrument_node="">
</span><h3 data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Where to Experience a Tea Ceremony in Japan</span></h3><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="229" instrument_node="">A traditional Japanese garden is a photogenic background to the tea ceremony at</span><a data-dcnode-id="226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tea-kyoto.com/" rel="noopener" target="_blank"><strong data-dcnode-id="227"><span data-dcnode-id="228" instrument_node=""> Camellia Kyoto </span></strong></a><span data-dcnode-id="225" instrument_node="">with English-speaking staff. Chikiriya matcha from Kyoto’s famed Uji district is partnered with seasonal wagashi from the reputable Oimatsu confectionery shop.</span></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="222" instrument_node="">For a modern tea ceremony in Tokyo, the room at </span><a data-dcnode-id="219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sakurai-tea.jp/" rel="noopener" target="_blank"><strong data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Sakurai Tea</span></strong></a><span data-dcnode-id="218" instrument_node=""> is filled with cool copper and warm wood. The master sits behind the counter preparing the tea in front of you, whisking matcha, roasting hojicha green tea, or even making cocktails from boozy tea-infused spirits.</span></p><span data-dcnode-id="216" instrument_node="">
