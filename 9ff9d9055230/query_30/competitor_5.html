Hello! My name is John Damalas. My wife and I took a 5-day tour of Beijing in September 2012. Even before arriving in Beijing, I received fantastic service from Ms. Vivian Tang - travel advisor from tour-beijing.com. All of my questions regarding the tour or China in general were always promptly answered. My tour guide Stanley, was very nice and spoke English well. He was able to answer my questions during the tour and always had an interesting fact to share with me that made the tour even more memorable. </span><br data-dcnode-id="690"><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node="">
</span><div data-dcnode-id="686" id="title_465_25"><span data-dcnode-id="687" instrument_node="">Day 01: Arrival at Beijing</span></div><span data-dcnode-id="685" instrument_node="">
</span><span data-dcnode-id="683" instrument_node="">We arrived in Beijing at 5:30pm by CA986 just in time to see the sunset. Quite a nice welcome to Beijing. Actually, it was daylight flight for most of the time. We left the States in the afternoon and flew against the sun and the entire flight in time to see it set in Beijing. After the smooth Immigration and Customs at the </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/beijing_airport/" target="_blank"><span data-dcnode-id="682" instrument_node="">Beijing Capital International Airport</span></a><span data-dcnode-id="680" instrument_node="">, we went out and expected our tour guide in Beijing. But the first things I saw were a Starbucks and a KFC framed in the doorway to the side of the airporthall. Later in our trip in Beijing, we found lots of Starbucks and KFCs. We saw more KFC and Starbucks than any other American chains!</span><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">
</span><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">
</span><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Meeting our tour guide:</span></strong><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">
We went through the crowds of people and found our tour guide - Stanley Li , holding a little white piece of paper with the sign of </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/" target="_blank"><span data-dcnode-id="671" instrument_node="">Tour-Beijing.com</span></a><span data-dcnode-id="669" instrument_node="">. It was not very visible, but we did found him anyhow. Stanley Li looked very kind and gave us a big smile. He took us to the parking lot. Our driver, Mr. Liu helped us to drop off our luggage and put into the luggage rack of the car. Stanley Li said the black car would accommpany us for the 5-day tour in Beijing. He further explained that it was their national car - Red Flag Car! </span><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">
</span><br data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">
</span><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">18:30 -19:30 Drive to Best Western Premier Royal Phoenix Beijing </span></strong><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
It was a peak hour and the traffic was heavy. Mr. Liu did quite a good job and drove us to </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/hotel/best_western_premier_royal_phoenix_beijing.php" target="_blank"><span data-dcnode-id="660" instrument_node="">Best Western Premier Royal Phoenix Beijing</span></a><span data-dcnode-id="658" instrument_node=""> faster than we expected. We stood at the frontdesk for registration. We showed our passport and soon we got the room card with key. The bellboy came with us into our room. We tipped him US$ 1. No dinner was provided on the first night and free for rest of the day. Stanley Li made a morning call for us at 7:30am and 9:00am for pick-up time. </span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">
</span><br data-dcnode-id="655"><span data-dcnode-id="654" instrument_node="">
</span><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Best Western Premier Royal Phoenix Beijing</span></strong><br data-dcnode-id="651"><span data-dcnode-id="650" instrument_node="">
</span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/hotel/best_western_premier_royal_phoenix_beijing.php" target="_blank"><span data-dcnode-id="649" instrument_node="">Best Western Premier Royal Beijing</span></a><span data-dcnode-id="647" instrument_node=""> is located at the northern tip of </span><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/blog/beijing-travel/beijing-attractions-tips/wangfujing-street-a-famous-pedestrian-street-in-beijing/" target="_blank"><span data-dcnode-id="646" instrument_node="">Wangfujing Commercial Street</span></a><span data-dcnode-id="644" instrument_node=""> (dubbed as the number one street in China). It is a high class leisure and business hotel built according to the international 5 star hotel's standard. It has seven floors with 200 rooms ranging from standard rooms, luxury roons and suites with elegant decorations. It is located in a hutong (alley) with only 5 minutes walk to the main street - Wangfujing Street. You can walk to Forbidden City, Tiananmen Square if you want. The subway stops are also within a walking distance.</span><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">
</span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">
</span><span data-dcnode-id="639" instrument_node="">
</span><span data-dcnode-id="638" instrument_node="">

King-sized Room at  Best Western Premier Royal Beijing</span></td></tr></tbody></table><span data-dcnode-id="628" instrument_node="">
</span><br data-dcnode-id="627"><span data-dcnode-id="626" instrument_node="">
Looking for snacks and   food</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">
No dinner. The   hotel offered very good dinner buffet. But we tried to explore a little and left   the hotel.&nbsp;The hotel&nbsp;is located in a hutong (alley) with only 5 minutes walk to   the main street - </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/blog/beijing-travel/beijing-attractions-tips/wangfujing-street-a-famous-pedestrian-street-in-beijing/" target="_blank"><span data-dcnode-id="623" instrument_node="">Wangfujing Street</span></a><span data-dcnode-id="621" instrument_node="">. There are many shops and restaurants   on the main street. After dinner, my wife Mary looked very tired. We went back   and had a deep sleep.</span><br data-dcnode-id="620"><span data-dcnode-id="619" instrument_node="">
</span><span data-dcnode-id="618" instrument_node="">

</span><br data-dcnode-id="606"><span data-dcnode-id="605" instrument_node="">

</span><div data-dcnode-id="601" id="title_465_25"><span data-dcnode-id="602" instrument_node="">Day 02: Beijing</span></div><span data-dcnode-id="600" instrument_node="">
</span><span data-dcnode-id="598" instrument_node="">
</span><span class="px13_444444_Arial" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Temple of Heaven, Forbidden City, Tiananmen Square and Summer Palace</span></span><br data-dcnode-id="595"><span data-dcnode-id="594" instrument_node="">
</span><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">
</span><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">6:30-8:30 Breakfast at Best Western Premier Royal Phoenix Beijing</span></strong><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">
The breakfast buffet was delicious. There were plenty of choices and it exceeded my expectations. We ate a lot because we wanted to try a little of everything. Later we soon came to know it was also one of best food we were going to get in Beijing. So each morning we both had a lot for breakfast.</span><br data-dcnode-id="587"><br data-dcnode-id="586"><span data-dcnode-id="585" instrument_node="">
</span><strong data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">9:00-10:15 Temple of Heaven</span></strong><br data-dcnode-id="582"><span data-dcnode-id="581" instrument_node="">
We had booked a private tour instead of a large group. The first attraction we visited was </span><a class="px12_333333_line" data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/temple_of_heaven.php" target="_blank"><span data-dcnode-id="580" instrument_node="">Temple of Heaven</span></a><span data-dcnode-id="578" instrument_node=""> ( Tiantan ). Temple of Heaven was actually a park, neat and big. There are a lot of locals, retired people who come here in the morning to hang out with friends and do morning exercises. There was a lot of activity everywhere you looked around. Our guide told us about people playing Taichi ball. In the open areas, people also did ribbon dancing, ballroom dancing, playing cards and dominoes. There was music and singing.</span><br data-dcnode-id="577"><br data-dcnode-id="576"><span data-dcnode-id="575" instrument_node="">

The Temple of Heaven was constructed in 1420 AD during the Ming Dynasty as a site for the emperors to offer sacrifices to heaven. Many elements of the temple have symbolic meaning. For example, nine is a good and lucky number in Chinese culture.
</span><span data-dcnode-id="574" instrument_node="">
</span><span data-dcnode-id="573" instrument_node="">
</span><span data-dcnode-id="568" instrument_node="">
</span><span data-dcnode-id="566" instrument_node="">
</span><table background="../image/image_background.jpg" border="0" bordercolor="#959595" cellpadding="0" cellspacing="0" data-dcnode-id="564" width="570"><tbody data-dcnode-id="565"><tr data-dcnode-id="567"><td align="center" data-dcnode-id="569" height="388" width="590"><img align="absbottom" data-dcnode-id="572" height="361" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/photos/travelogues/trip_to_beijing/My%2520Trip%2520to%2520Beijing2.jpg&amp;raw" width="560"><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">
      Temple of Heaven</span></td></tr></tbody></table><span data-dcnode-id="563" instrument_node="">
</span><br data-dcnode-id="562"><span data-dcnode-id="561" instrument_node="">
</span><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">10:15-11:00 Tiananmen Square</span></strong><br data-dcnode-id="558"><span data-dcnode-id="557" instrument_node="">
After we got to the </span><a class="px12_333333_line" data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/tiananmen_square.php" target="_blank"><span data-dcnode-id="556" instrument_node="">Tiananmen Square</span></a><span data-dcnode-id="554" instrument_node="">, we walked through a lot of people. When we got to the end of the Square nearest the famous Tiananmen gate, our tour guide had a photographer take a picture of our whole group in front of the gate. That evening, he took orders for the picture and a Tianamen Square book for 120 RMB to be delivered the next morning. Afterwards, we got some 10 minutes free time, but that was probably 5 minutes too long.

</span><span data-dcnode-id="553" instrument_node="">

      Tiananmen Square</span></td></tr></tbody></table><span data-dcnode-id="542" instrument_node="">
</span><br data-dcnode-id="541"><span data-dcnode-id="540" instrument_node="">
</span><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">11:00-12:00 Forbidden City</span></strong><br data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">
Looking at the </span><a class="px12_333333_line" data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/forbidden_city.php" target="_blank"><span data-dcnode-id="535" instrument_node="">Forbidden City</span></a><span data-dcnode-id="533" instrument_node="">, I felt I was walking into a history textbook with all of the spectacular architecture and statues. The palace was built between 1406 and 1420, but was burnt down, rebuilt, sacked and renovated countless times, so most of the architecture you can see today dates from the 1700’s and on wards. The Forbidden City was the seat of Imperial power for 500 years, and is now a major tourist attraction in China.

Lunch wasn't great. But parts of it were passable. We had 3 dishes and one soup. Later we knew we had the lunch more or less the same. But due to the different restautants, we did find some difference. Because we had most of the dinners on our own or at the hotel, we didn't find meals any problem during our trip to Beijing. One interesting thing you'll see is almost all the restaurants employ hostesses. Some of them were quite pretty! Mainly due to the sufficient labor market, many restautants can easily find very nice employees.

</span><strong data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">15:40-17:30 Summer   Palace</span></strong><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">
The </span><a class="px12_333333_line" data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/summer_palace.php" target="_blank"><span data-dcnode-id="496" instrument_node="">Summer Palace</span></a><span data-dcnode-id="494" instrument_node=""> was a place I had not known of previously. It was nice   enough but probably would be the most beautiful during the summertime. The   Summer Palace was originally a royal garden and a temporary dwelling palace for   emperors of Qing Dynasty, Its predecessor was the Garden of Clear Ripples   (Qingyiyuan) started in 1750 and burned down by the British and French allied   troops in 1860. In 1886, Empress Dowager Cixi used navy outlays and other funds   in the reconstruction and renamed the park as Summer Palace in 1888. The Summer   Palace in northwest suburban Beijing is the largest and most complete imperial   garden existing in China. Just a note: one can walk or take a dragon boat across   Kunming Lake. The boat ride was not included as part of the tour. Stanley told   us to pay RMB 10 to have the boat ride. It was all right. The boat ride saved us   some time. Actually I had hoped to take the ferry to the island in the middle of   the lake!</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">
</span><span data-dcnode-id="491" instrument_node="">
</span><span data-dcnode-id="490" instrument_node="">

</span><span data-dcnode-id="483" instrument_node="">

      Summer Palace</span></td></tr></tbody></table><span data-dcnode-id="480" instrument_node="">
</span><br data-dcnode-id="479"><span data-dcnode-id="478" instrument_node="">
From the Summer Palace, we drove back to </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/hotel/best_western_premier_royal_phoenix_beijing.php" target="_blank"><span data-dcnode-id="477" instrument_node="">Best Western Premier Royal Beijing</span></a><span data-dcnode-id="475" instrument_node="">. Traffic in Beijing is pretty insane. It took us about 1.5 hours to get to the hotel.</span><br data-dcnode-id="474"><br data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">
 
So many bicycles, scooters and luxury cars</span><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">
Not surprisingly, we saw many bicycles and scooters in Beijing. China is growing incredibly fast. And the gap between the rich and poor is big. Yes, we saw thousands of bicycles and many average income people. But we also saw a huge number of Audis and Mercedes all over the city.</span><br data-dcnode-id="469"><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">

As an metropolitan city, Beijing has a lot of Western influence. You can easily find many of the signs were both in Chinese and English. For the time we were in Beijing, I had a hard time feeling we were in China! To me it just looked like one really huge Chinatown. There was so much English, I almost thought that I could manage it by without understanding any Chinese. With the speed that China is developing at, I may not recognize Beijing the next time I return.</span><br data-dcnode-id="466"><br data-dcnode-id="465"><span data-dcnode-id="464" instrument_node="">
</span><div data-dcnode-id="462" id="title_465_25"><span data-dcnode-id="463" instrument_node="">Day 03: Beijing - Ming Tombs and Badaling Great Wall</span></div><span data-dcnode-id="461" instrument_node="">

</span><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">11:00-12:00 Ming Tombs</span></strong><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">
The Ming Dynasty Tombs are located 50 km north of Beijing. Thirteen Ming Dynasty emperors were buried in this area. The visit to </span><a class="px12_333333_line" data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/excursion_guide/ming_tomb.php" target="_blank"><span data-dcnode-id="454" instrument_node="">Ming Tombs</span></a><span data-dcnode-id="452" instrument_node=""> is generally combined with a visit to the Great Wall. Otherwise known as the “13 Tombs”, this is the burial site of 13 out of 17 emperors of the Ming Dynasty. However, the only one you can et a good look at is the tomb of Emperor Wanli, who reigned from 1537 to 1620. This tomb was unearthed in 1956. One interesting thing was the fruit vendors all the places! They even put the fruit into our car and talked about aggressive marketing.

The dinning hall was on the second floor. The first floor was actually the cloisonne factory. </span><br data-dcnode-id="432"><br data-dcnode-id="431"><span data-dcnode-id="430" instrument_node="">

The Great Wall is in fact now no longer contiguous. Much of it is in disrepair. Five sections have been rebuilt and repaved for tourist. They are </span><a class="px12_333333_line" data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/great_wall/badaling.php" target="_blank"><span data-dcnode-id="425" instrument_node="">Badaling Great Wall</span></a><span data-dcnode-id="423" instrument_node="">, </span><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/great_wall/juyongguan.php" target="_blank"><span data-dcnode-id="422" instrument_node="">Juyongguan Great Wall</span></a><span data-dcnode-id="420" instrument_node="">, </span><a class="px12_333333_line" data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/great_wall/mutianyu.php" target="_blank"><span data-dcnode-id="419" instrument_node="">Mutainyu Great Wall</span></a><span data-dcnode-id="417" instrument_node="">, </span><a class="px12_333333_line" data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/great_wall/jinshanling.php"><span data-dcnode-id="416" instrument_node="">Jinshanling Great Wall</span></a><span data-dcnode-id="414" instrument_node=""> and </span><a class="px12_333333_line" data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/great_wall/simatai.php" target="_blank"><span data-dcnode-id="413" instrument_node="">Simatai Great Wall</span></a><span data-dcnode-id="411" instrument_node="">. We went to the section at Badaling. This part of the wall was contructed during the Ming Dynasty. Badaling was the first part of the wall opened to the public in 1957. We took a cable car up and down. To commemorate, we bought a laminated certificate showing we had climbed the wall. Vendors could be found all along the way to the top. The wall is very steep in parts. It was a pity that it was a litte bit foggy. It was hard to make out the miles and miles of wall that extended off into the misty distance. At least it didn't rain as it looked like it was threatening to when we first arrived. Later we knew that July and August is the raining season in Beijing. We found a Starbucks at the wall! Many tourists took took the cable car up and down the wall. But we insisted on hiking by our feet.

</span><strong data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">9:00-10:30 Visit Shichahai bar area and Hutong tour</span></strong><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">
First drive to Shichahai bar area. Mr. Stanley said that </span><a class="px12_333333_line" data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/shichahai.php" target="_blank"><span data-dcnode-id="387" instrument_node="">Shichahai Area</span></a><span data-dcnode-id="385" instrument_node=""> is a centraly preserved zone showcasing the life of old Beijing. It is comprised of three-lake area: Qian Hai Lake (Front Sea); Hou Hai Lake (Back Sea) and Xi Hai Lake(Western Sea). Lots of bars are clustered in the Shichahai area or along the Shichahai lakeshore. Then we were arranged to take a pedicab to visit Da Jinsi Hutong Tao, the most famous hutongs keeping the original layout. In the course of the hutong tour, we were arranged to visit Mr.Dacheng Bai, a local folk craftsman, famous for making "Zongren Bai", a traditional "Zongren", a kind the figurines of drama characters made from the hair of a pig or a horse, cloth and silk, listed a city-level intangible cultural heritage in Beijing.

</span><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">10:00am - 10:30am</span></strong><br data-dcnode-id="368"><span data-dcnode-id="367" instrument_node="">
We drop off at the </span><a class="px12_333333_line" data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/silver_ingot_bridge.php" target="_blank"><span data-dcnode-id="366" instrument_node="">the Silver Ingot Bridge</span></a><span data-dcnode-id="364" instrument_node="">( Yinding Bridge ), a narrow channel joining Qianhai Lake and the Houhai Lake, the hub of Shichhai area with surrounding quiet hutongs. Walking along the </span><a class="px12_333333_line" data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/yandai_xiejie.php" target="_blank"><span data-dcnode-id="363" instrument_node="">Yandai Xiejie</span></a><span data-dcnode-id="361" instrument_node="">( Tobacco Pipe Lean Street ), a quaint 800-year-old hutong located directly north of Yinding Bridge between Qianhai and Houhai and the south of the Drum Tower, used to be well-known for sellers of long-stemmed pipes, hence the name.

</span><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">10:30am - 11:00am  Bell Tower and Drum Tower</span></strong><br data-dcnode-id="344"><span data-dcnode-id="343" instrument_node="">
Before experiencing the local hutong food lunch, we pass by Beijing's </span><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/bell_tower_and_drum_tower.php" target="_blank"><span data-dcnode-id="342" instrument_node="">Bell Tower and Drum Tower</span></a><span data-dcnode-id="340" instrument_node="">. They are visibly prominent constructions and represent the symbol of this old city. They were originally built in 1272. You will have outside visits to the two high towers （entrance tickets not included).

We are arranged in a private and traditional Siheyuan (courtyard) and have a home-style lunch prepared by by the hostess Ms Wu.

</span><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">14:30-17:00 Lama Temple</span></strong><br data-dcnode-id="316"><span data-dcnode-id="315" instrument_node="">
After lunch, visit </span><a class="px12_333333_line" data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/lama_temple.php" target="_blank"><span data-dcnode-id="314" instrument_node="">Lama Temple</span></a><span data-dcnode-id="312" instrument_node="">, also called the Yonghe Lamasery, or Yonghegong. It is the most handsome and impressive Buddhist temple in the city. Lama Temple was built in the 33 Qing Kangxi year (1694) and it is now the largest and best-preserved Lamasery of Yellwo Sect in Beijing. It was the residence of Emperor Yongzheng before his ascending to the throne. Built initially in 1694 during the Qing Dynasty, this building was the residence of Emperor Yongzheng when he was just a prince. However, in 1744 the Qing Dynasty formally changed the status of the dwelling to that of a lamasery, and so Yonghe Lamasery became the national centre of Lama administration.

      Lama Temple</span></td></tr></tbody></table><span data-dcnode-id="300" instrument_node="">
</span><br data-dcnode-id="299"><span data-dcnode-id="298" instrument_node="">
</span><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">18:00-19:00 Peking Duck Dinner at Quanjude Restaurant</span></strong><br data-dcnode-id="295"><span data-dcnode-id="294" instrument_node="">
I was surprised to see that other dishes were also included with my duck. The duck was juicy and tender and the waiters made sure I was taken care of. But the duck soup was not very good. My wife made a horrible face on the first taste. I looked around and felt the other tourists also showed no interest in having the soup. Oh well, at least I can say I had </span><a data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/restaurants_dining_guide/beijing_duck.php" target="_blank"><span data-dcnode-id="293" instrument_node="">Beijing Duck</span></a><span data-dcnode-id="291" instrument_node=""> in Beijing, two of the must to do things in Beijing and the other is the great wall hiking.

</span><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">19:30-20:45 Beijing Opera</span></strong><br data-dcnode-id="274"><span data-dcnode-id="273" instrument_node="">
We sit at the rear of the theater - Liyuan Theater nestled on the first floor of Qianmen Hotel. Next time if I came to enjoy Beijing opera, we'd prefer the seats at the front which would cost us around US$ 30 per person. Beijing Opera is a number of stylized action, including singing, dancing, dialogue and acrobatic fighting to tell a story or present different characters and their feelings of happiness, anger, sorrow, surprise, fear and sadness. In Peking opera there are four main types of roles: sheng (male) dan (young female), jing( painted face,male), and chou (clown, male or female). The characters may be loyal or treacherous, beautiful or ugly, good or bad, their images being vividly presented. After the show, we were returned to our hotel.

</span><div data-dcnode-id="255" id="title_465_25"><span data-dcnode-id="256" instrument_node="">Day 05: Beijing - Wangjing free shopping and leave Beijing</span></div><span data-dcnode-id="254" instrument_node="">
</span><span data-dcnode-id="252" instrument_node="">
Our Plane CA985 leaving Beijing at 17:00. So we still had lots of time in the morning. Stanley would come to pick us up at our hotel at 14:00. We took a taxi to Wangfujing Street, the capital's well-known shopping street, now it becomes a pedestrian street, a window to show Beijing's modern life. It is worth strolling even if you are not interested in buying anything. </span><br data-dcnode-id="251"><br data-dcnode-id="250"><span data-dcnode-id="249" instrument_node="">

We returned to our hotel at 13:30 and found Stanley were already there waiting for us. Mr. Stanly was very helpful and resourceful. He had made our trip to Beijing quite rewarding. We would take another tour the next time and we are fortunate enough to visit Beijing.
