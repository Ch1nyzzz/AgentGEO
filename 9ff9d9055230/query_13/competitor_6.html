</span><h3 data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Why travel from&nbsp;Beijing to Lhasa?</span></h3><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Lhasa is often the wonder destination for both domestic and foreign travelers, while Beijing is one of the most popular gateway city to Lhasa, capital of Tibet Autonomous Region. Many tourists to Lhasa always make Beijing as the first station for them to have an overview of the imperial history and culture of China and then travel from Beijing to Lhasa by train or by plane.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><h3 data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">How to travel from&nbsp;Beijing to Tibet?</span></h3><span data-dcnode-id="1583" instrument_node="">
</span><h4 data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Option 1. Beijing to Lhasa by Train</span></h4><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Beijing Lhasa railway including the world's highest railway, Qinghai-Tibet Railway, is an adventure tour route of traveling to Tibet from Beijing. The Qinghai-Tibet railway, which runs between Xining, the capital of Qinghai province, and Lhasa, the capital of the Tibet autonomous region, makes up the major part of your Beijing Lhasa train journey and authorities have been planning this project for a century. But it was only in 1984 that the first section of track - an 814-km stretch from Xining to Golmud - both in Qinghai province, was completed. The railway climbs from 2,829 meters above sea level at Golmud to 3,641 meters at Lhasa and it is crowned the highest railway in the world. More than 550 km of track is laid on permanently frozen earth and its highest point reaches 5,072 meters above sea level.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1573" style="text-align: center;"><img alt="Beijing Lhasa Train" data-dcnode-id="1576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/beijin-lhasa-train-route-map.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Beijing Lhasa Train"><em data-dcnode-id="1574" style="text-align: center;"><span data-dcnode-id="1575" instrument_node="">Taking a train from Beijing to Lhasa is one of the most popular way among tourists traveling Tibet.</span></em></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Beijing Lhasa train costs you nearly 41 hours. The 41-hour train trip to Lhasa from Beijing is a zen-like way for those who want to slow their busy minds before arriving in Tibet. Once you choose Z21 train to Lhasa from Beijing, just feel the shocks this man-made world wonder will bring to you.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1568" instrument_node="">See&nbsp;more at </span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tibettravel.org/tibet-train/beijing-to-lhasa-train.html" target="_blank"><span data-dcnode-id="1567" instrument_node="">Beijing to Lhasa train schedule and price</span></a></p><span data-dcnode-id="1564" instrument_node="">
</span><h4 data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Option 2. Beijing to Lhasa by Air</span></h4><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">There are ten direct flights between Beijing and Lhasa every day, run by Tibet Airlines, Air China, Shandong Airlines and Shenzhen Airlines. The flights to Tibet would departs from Beijing Capital International Airport (BCIA) and arrive at Lhasa Gonggar Airport at noon or night.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1554" style="text-align: center;"><img alt="Beijing to Lhasa Flight" data-dcnode-id="1557" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/beijing-lhasa-flight-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Beijing to Lhasa Flight"><em data-dcnode-id="1555" style="text-align: center;"><span data-dcnode-id="1556" instrument_node="">Taking flights to Lhasa from Beijing is the most convenient way to enter Tibet.</span></em></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Five direct flights from Beijing to Lhasa would stop over at Xining, Chengdu or Xi’an, which cost you nearly 7 hours to get to Lhasa from Beijing by plane. Besides, another five non-stop flights to Lhasa from Beijing have shortened the distance between Beijing and Lhasa. It just takes you 4:30 hours, saving two hours off the travel time from Beijing to Lhasa by air.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1549" instrument_node="">See more at </span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tibettravel.org/flights-to-tibet/beijing-to-lhasa.html" target="_blank"><span data-dcnode-id="1548" instrument_node="">Beijing to Lhasa flight schedule</span></a></p><span data-dcnode-id="1545" instrument_node="">
</span><div class="title" data-dcnode-id="1542"><span data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Before you get to Lhasa, do plan at least one day tour in Beijing.</span></span></div><span data-dcnode-id="1541" instrument_node="">
</span><h3 data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Facts about Beijing</span></h3><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Formerly known as Peking, the intriguing capital of the People's Republic of China, Beijing, has also been one of the four ancient capitals of the country. Located in northern China, Beijing has been a major political and cultural centre and has significant importance in the history of China. From Zhongdu, Dadu, Beijing, Beiping and Yanjing, the city was known by different names during the successive rule of various dynasties in China.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1534" instrument_node="">Beijing is a metropolis city in Northern China and also the official capital of the People's republic of China. Beijing enjoys advanced transportation system, with the second busiest airport in the world and busiest in Asia, the largest railway hub in China, 17 line subways and 5 main concentric ring roads. However, once you get to Beijing, you will see thousands of cyclists on the roads.&nbsp;Here we just list some </span><em data-dcnode-id="1531"><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Beijing facts</span></strong></em><span data-dcnode-id="1530" instrument_node=""> for your review:</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1527" instrument_node="">1. Beijing is the capital of China.</span><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node=""> 2. Beijing is the second largest city of China, after Shanghai.</span><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node=""> 3. Beijing hosted the 2008 Summer Olympics.</span><br data-dcnode-id="1522"><span data-dcnode-id="1521" instrument_node=""> 4. Beijing is referred as the one of the 'Four Great Ancient Capitals of China'.</span><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node=""> 5. Beijing is the major transportation hub of China, as it houses many roads and railways.</span><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node=""> 6. Beijing is the political, cultural and educational nerve center of China.</span><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node=""> 7. In the Imperial Times, Beijing was also known as Peking.</span><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node=""> 8. The literal meaning of the term Beijing is 'Northern Capital'.</span><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node=""> 9. The capital city enjoys four distinct seasons. July is the hottest at 75°F and January is the coldest at 18°F. Spring and autumn are the shortest seasons.</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node=""> 10. The city flower of Beijing is the China Rose or Chrysanthemum and the city tree is Arborviate or Chinese Scholar Tree.</span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node=""> 11. The most famous food in Beijing is Beijing Duck.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><h3 data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">What to See in Beijing, the hottest destination in China ?</span></h3><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">As one of the most visited cities in China, Beijing is a confluence of the thousand years of the history and ultra-modern reality. In Beijing, you will be delighted and intrigued by its ancient culture and fast development.&nbsp;Beijing is significant in a number of ways and attracts visitors from all over the world:</span></p><span data-dcnode-id="1499" instrument_node="">
</span><h4 data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Forbidden City</span></h4><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">The magnificent Forbidden City is the largest and the best-preserved imperial palace complex in the world. It has 9,999 rooms in flourishing period with just a single room short of the number that ancient Chinese belief represents 'Divine Perfection' and surrounded by a moat six meters deep and ten-meter high wall. Spreading over 250 acres, this large palace complex was built between 1406 and 1420, but was burnt down, rebuilt, sacked and renovated countless times, so most of the architecture you can see today dates from the 18th century and on wards during the Qing Dynasty. For five centuries, this palace functioned as the administrative center of the country.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1489" style="text-align: center;"><img alt="Forbidden City Beijing" data-dcnode-id="1492" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/forbidden-city-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Forbidden City Beijing"><em data-dcnode-id="1490" style="text-align: center;"><span data-dcnode-id="1491" instrument_node="">Forbidden City is the ancient imperial palace of the emperors of China, which is famed to be the world's largest surviving palace complex.</span></em></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Tips for visiting Forbidden City:</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1484" instrument_node="">1. Wear comfortable shoes as you have to walk a lot.</span><br data-dcnode-id="1483"><span data-dcnode-id="1482" instrument_node=""> 2. If you are group tourists, hiring a guide is highly recommended. It really is helpful to have a guide explain the stories behind the site and tell you about the important historical parts in the forbidden city.</span><br data-dcnode-id="1481"><span data-dcnode-id="1480" instrument_node=""> 3. If you are non-group tourists, you can rent multilingual guide recorder either at Meridian Gate (southern gate of Forbidden city) or the Gate of Divine Prowess (Northern gate of Forbidden City) and return it when you finish your tour of Forbidden City.</span><br data-dcnode-id="1479"><span data-dcnode-id="1478" instrument_node=""> 4. Opening Hour: 08:20-17:00 (Apr.1-Oct.31) , 08:30-16:30 (Nov.1-Mar.31); closed on every Monday</span><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node=""> 5. Time of stopping ticket selling: 16:00pm (Apr.1-Oct.31), 15:30pm (Nov.1-Mar.31)</span><br data-dcnode-id="1475"><span data-dcnode-id="1474" instrument_node=""> 6. Travel Time: 4-8 hours</span><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node=""> 7. Entrance Fee: RMB 40 (low season) ; RMB 60 (peak season)</span></p><span data-dcnode-id="1470" instrument_node="">
</span><h4 data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Great Wall of China</span></h4><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">The Great Wall of China is one of the 'Eight Wonders of the World' and is enlisted in the World Heritage Directory. This immense wall was built to keep out invaders as well as to retain the inhabitants. It spans five provinces from Shanhaiguan Pass in the east to Jiayuguan Pass in the west, looking like a gigantic dragon across deserts, grasslands and mountains. In the downtown area of Beijing, it is possible to climb Badaling Great Wall. If you are in a rush, you can get the most out of your visit to Beijing by hiking one of the sections of the Great Wall. The Great Wall snaking across Beijing in its northern part is about 600 kilometers long. Along the total length of the Great Wall around Beijing, there are major eight sections including Badaling, Juyongguan, Huanghuacheng, Jiankou, Mutianyu, Gubeikou, Jinshanling, and Simatai. Most of the sections of Great Wall in Beijing are well-preserved and mainly the remains from the Ming Dynasty, an era of huge construction.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1460" style="text-align: center;"><img alt="Great Wall of China" data-dcnode-id="1463" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/great-wall-7001.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Great Wall of China"><em data-dcnode-id="1461" style="text-align: center;"><span data-dcnode-id="1462" instrument_node="">The Great Wall of China stretches along the northern part of Beijing Municipality, which is the greatest tourist attraction for the visitors coming to the city.</span></em></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Tips for visiting the Badaling Great Wall:</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1455" instrument_node="">1. Strong footwear is needed for climbing the Great Wall.</span><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node=""> 2. In summer, please prepare for sunblock, sunglasses and water.</span><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node=""> 3. Opening Hours: 06:40-18:30</span><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node=""> 4. Hiking Time: 2.5 hours</span><br data-dcnode-id="1448"><span data-dcnode-id="1447" instrument_node=""> 5. Entrance Fee: RMB 46</span></p><span data-dcnode-id="1445" instrument_node="">
</span><h4 data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Tiananmen Square</span></h4><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">The solemn and respectful Tiananmen Square is the largest central city square in the world, which serves not only Beijing's symbol but also the whole of China. This immense courtyard is surrounded by a variety of significant edifices such as the Tiananmen Tower on its north, Great Hall of the People on its west, Mao Zedong Memorial Hall on the south, Monument to the People's Heroes and National Museum of China on the east. At sunrise and sunset the raising and lowering ceremony of the Chinese National Flag is well worth the watching. The precision of the young troops is very well performed.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1435" style="text-align: center;"><img alt="Tiananmen Square and Forbidden City" data-dcnode-id="1438" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/tiananmen-square-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Tiananmen Square and Forbidden City"><em data-dcnode-id="1436" style="text-align: center;"><span data-dcnode-id="1437" instrument_node="">Located in the heart of Beijing City, Tiananmen Square is the site for massive parades and rallies.</span></em></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Tips for visiting the Tiananmen Square:</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1430" instrument_node="">1. Go there about 30 minutes early to have a good seat.</span><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node=""> 2. Spend the time to see the people (soldiers, tourists and locals) who make the square a true highlight for the first time visitors.</span><br data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node=""> 3. Open Time: whole day</span><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node=""> 4. Travel time: 2-4 hours</span><br data-dcnode-id="1423"><span data-dcnode-id="1422" instrument_node=""> 5.&nbsp;Entrance Fee:&nbsp;Tiananmen Square - Free; Chairman Mao's Mausoleum - Free; Tiananmen Tower - RMB 15; The Great Hall of the People - RMB 15; The National Museum of China - RMB 15</span></p><span data-dcnode-id="1420" instrument_node="">
</span><h4 data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Temple of Heaven</span></h4><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Due to religion was always related with the supreme imperial power, Beijing at one time served as the focus of religious life with lots of beautiful temples. The Temple of Heaven, where the Emperors paid homage to the glory of heaven, is the largest group of structures in the country dedicated to rituals. To be opposite, the Altar of Earth was used to worship the God of the Earth. The Great Bell Temple, where the Emperor prayed for rainfall in the Qing Dynasty. But I recommend Temple of Heaven as a real highlight of Beijing. It used as a complex of sacrificial buildings for the Ming and Qing emperors, and is the largest one in Beijing among several royal altars to Heaven, Earth, the Sun, the Moon and other deities or symbolic forces of Nature. What makes the temple unique is the century-old trees - line upon line of Chinese cypress, Chinese juniper and scholar trees. Some of the cypresses are more than 600 years old. Dr. Henry Kissinger, when he visited the temple, stated that while the USA could recreate the Temple of Heaven if it desired, it could not create the trees!</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1410" style="text-align: center;"><img alt="Temple of Heaven Beijing" data-dcnode-id="1413" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/temple-of-heaven-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Temple of Heaven Beijing"><em data-dcnode-id="1411" style="text-align: center;"><span data-dcnode-id="1412" instrument_node="">Temple of Heaven is located in the southern part of Beijing, and has been one of the most holy places for the whole country for more than five centuries.</span></em></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Tips for visiting Temple of Heaven :</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1405" instrument_node="">1. Go to the Temple of Heaven in the early morning to see groups of people practicing all types of kung fu and taiji. You can also practice with them if you are so inclined.</span><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node=""> 2. Open Time: 6:00-22:00</span><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node=""> 3. Travel Time: 3-4 hours</span><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node=""> 4. Entrance Fee: RMB 30 (low season) ; RMB 35 (peak season)</span></p><span data-dcnode-id="1397" instrument_node="">
</span><h4 data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Summer Palace</span></h4><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">As the largest royal garden in China, Beijing's Summer Palace is actually a parklike imperial retreat spread out over 10 square miles. Once a summer retreat for emperors, this 290-acre park is still a retreat for the tourists, who can relax here or walk around ancient pavilions, mansions, temples, bridges and huge lake. Summer Palace mainly consists of Longevity Hill (Wanshoushan) and Kunming Lake. Much of it is covered by Kunming Lake. With masterly design and artistic architecture and integrating the essence of Chinese garden arts, the Summer Palace has a title of "Imperial Garden Museum". It is an imperial garden most completely reserved with richest landscapes and concentrated buildings. The Summer Palace was added to the world cultural heritage list in 1998.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1387" style="text-align: center;"><img alt="Summer Palace Beijing" data-dcnode-id="1390" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/summer-palace-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Summer Palace Beijing"><em data-dcnode-id="1388" style="text-align: center;"><span data-dcnode-id="1389" instrument_node="">The Summer Palace in northwest suburban Beijing is the largest and most complete imperial garden existing in China.</span></em></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Tips for visiting Summer Palace :</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1382" instrument_node="">1. Open Time: 6:30-18:00</span><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node=""> 2. Travel Time: 4-5 hours</span><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node=""> 3. Entrance Fee: RMB 20 (low season) ; RMB 30 (peak season)</span></p><span data-dcnode-id="1376" instrument_node="">
</span><h4 data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Ming Tombs</span></h4><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">This is an amazing site for many reasons. First, it is outside Beijing, so you have a chance to escape the city and see a bit of the countryside. Second, it is relatively near the Great Wall, so you can visit both in one day. Third, the tomb itself is an eye opener. Some 50 kilometers northwest of the downtown Beijing, this is the burial site of 13 out of 17 emperors of the Ming Dynasty. There are just two tombs which have been excavated and open to the public: Dingling and Changling. Changling is the first tomb to be built. It took 2 years for renovation, and was opened in 1958. Dingling has been excavated so thoroughly that one has to get into the burial chamber itself. However, it is a very steep climb down and people who have problems with their heart or kneels are not suggested to visit the underground tomb. For wheel-chair users or those who don't want to go deep inside a tomb, I recommend Changling Tomb.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1366" style="text-align: center;"><img alt="Ming Tombs Beijing" data-dcnode-id="1369" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/ming-tombs-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Ming Tombs Beijing"><em data-dcnode-id="1367" style="text-align: center;"><span data-dcnode-id="1368" instrument_node="">The Ming Tombs is also known as the "13 Tombs".</span></em></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Tips for visiting Ming Tombs :</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1361" instrument_node="">1. Opening Time: Changling Tomb (08:30-17:30), Dingling Tomb (08:30-18:00)</span><br data-dcnode-id="1360"><span data-dcnode-id="1359" instrument_node=""> 2. Travel Time: 2 hours</span><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node=""> 3. Entrance Fees:&nbsp;RMB 100 (low season) ; RMB 150 (peak season)</span></p><span data-dcnode-id="1355" instrument_node="">
</span><h4 data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Beijing Hutong</span></h4><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Do you have the experience of taking a pedicab? In the old Beijing hutong areas, you can find the ancient transportation tools now still preserved for tourists as the main traffic tool of visiting hutongs - Beijing unique old city lanes. The neighborhoods of narrow, twisting streets represent the "real life" of Beijing, where passageways connect to courtyards of traditional compact homes. Pedicab tours of the hutongs cover the attractions that normally include the Bell Tower, courtyard neighborhoods and Prince Gong's mansion which should be the most magnificent courtyard and was the residence of an official and then a prince. There are lots of many small restaurant, bars, and inns. From the top of the Bell Tower you can overlook the surrounding hutongs. The most interesting part of the hutong tour is walking through "Pipe Tobacco Alley" near the Bell Tower. On this tour you will enjoy the real people's Beijing. On the other end of Pipe Tobacco Alley has some of Beijing's fashionable cafes.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1345" style="text-align: center;"><img alt="Beijing Hutong Tour" data-dcnode-id="1348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/beijing-hutong-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Beijing Hutong Tour"><em data-dcnode-id="1346" style="text-align: center;"><span data-dcnode-id="1347" instrument_node="">If you’d like to experience the local life, there is a great deal of Beijing's Hutongs and Courtyards distributed for your choice.</span></em></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Tips for visiting Hutongs in Beijing :</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1340" instrument_node="">1.Two Sites for Hutong Exploring: Shichahai Area: north of Beihai Park; Dazhalan Area: south of Tiananmen Square</span><br data-dcnode-id="1339"><span data-dcnode-id="1338" instrument_node=""> 2. If you are interested in Chinese calligraphy, painting or other artwork, you can pay a visit to Liulichang Street.</span><br data-dcnode-id="1337"><span data-dcnode-id="1336" instrument_node=""> 3. The Lugou Bridge carved with marvelous stone lions is an optional place for you a take a walk.</span><br data-dcnode-id="1335"><span data-dcnode-id="1334" instrument_node=""> 4. Rickshaw: RMB 50-100</span></p><span data-dcnode-id="1332" instrument_node="">
</span><h4 data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Olympic Sites - Bird's Nest and Water Cube</span></h4><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Thanks for the 29th Summer Olympics, Beijing has been well-known for travelers all over the world. This hospitable metropolis of China has been mixed with lots of modern elements, which is also a new part for its mysterious orient civilization. There are so many representative buildings displaying this international metropolis, such as the Beijing National Stadium (Bird's Nest) and the National Aquatics Center for 2008 Olympics. Usain Bolt of Jamaica broke the world record by winning both the 100 and 200 gold medals at the Olympics; at the Water Cube (the National Aquatics Centre), Michael Phelps of America makes history with 8 Gold Medals in Beijing! A visit to the Beijing Olympic Green sitting at the north end of the Beijing city's axis is an eye-opener for your Beijing trip.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1322" style="text-align: center;"><img alt="Bird's Nest and Water Cube" data-dcnode-id="1325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/water-cube-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Bird's Nest and Water Cube"><em data-dcnode-id="1323" style="text-align: center;"><span data-dcnode-id="1324" instrument_node="">Olympic Sites - Bird's Nest and Water Cube are worth your coming!</span></em></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Tips for visiting Bird's Nest and Water Cube :</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1317" instrument_node="">1. Opening Hours: Bird's Nest: 09:00-21:00; Water Cube: 09:00-20:00 (May-October) ; 09:00-18:00 (November-April)</span><br data-dcnode-id="1316"><span data-dcnode-id="1315" instrument_node=""> 2. Travel Time: 2 hours</span><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node=""> 3. Entrance Fee: Bird's Nest: RMB 50; Water Cube: RMB 30.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><h3 data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">How about Nightlife in Beijing?</span></h3><span data-dcnode-id="1308" instrument_node="">
</span><h4 data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Enjoy Beijing Roast&nbsp;Duck</span></h4><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1301" style="text-align: center;"><img alt="Beijing Duck Restaurant" data-dcnode-id="1304" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/beijing-roast-duck-700.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Beijing Duck Restaurant"><em data-dcnode-id="1302" style="text-align: center;"><span data-dcnode-id="1303" instrument_node="">Beijing duck is the local flavor of Beijing.</span></em></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Climbing the Great Wall, savoring Beijing Duck and enjoying Beijing Opera are the three "musts" for those visiting Beijing for the first time, which you cannot miss. The traditional method of preparing Beijing Duck has a history of over a hundred years and boasts a great reputation to this day. If you ask which is the best Beijing duck house ( restaurant ) in Beijing, different people will offer you different answers. Actually it is quite a personal taste of which one is the best.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><h4 data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Watch Beijing Opera</span></h4><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1290" style="text-align: center;"><img alt="Beijing Opera Characters" data-dcnode-id="1293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.tibettravel.org/assets/images/how-to-get-to-tibet/beijing-opera-700jpg.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" title="Beijing Opera Characters"><em data-dcnode-id="1291" style="text-align: center;"><span data-dcnode-id="1292" instrument_node="">After treat yourself with a delicious Beijing Duck, you can spend the rest time of the night on watching Beijing Opera.</span></em></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Beijing Opera is a number of stylized action, including singing, dancing, dialogue and acrobatic fighting to tell a story or present different characters and their feelings of happiness, anger, sorrow, surprise, fear and sadness. In Beijing opera there are four main types of roles: sheng (male), dan (young female), jing( painted face,male), and chou (clown, male or female). The characters may be loyal or treacherous, beautiful or ugly, good or bad, their images being vividly presented.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><h3 data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Recommended Day Tours in Beijing</span></h3><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1282" instrument_node="">There are hundreds of tourist scenic spots and historic sites in Beijing. Some are accessible and some are a little far from the city center. Among them, there are some must-see attractions in Beijing - Tiananmen Square, Forbidden City, Temple of Heaven, Summer Palace, Ming Tombs, Great Wall, Hutong, etc. Just </span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tibettravel.org/tibet-travel-agency/tibet-tour-agency.html" target="_blank"><span data-dcnode-id="1281" instrument_node="">contact us for your personal Beijing Tibet tour</span></a><span data-dcnode-id="1279" instrument_node="">.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1273"><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">1. One day Beijing tour - Tiananmen Square, Forbidden City, Temple of Heaven &amp; Summer Palace</span></strong><span data-dcnode-id="1274" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1271" instrument_node="">This day you will visit the most well-known tourist attractions in the city. At about 8:00am, go to visit Tiananmen Square- the largest city square in the World, and the Forbidden City the largest and best-preserved ancient imperial palace compound in the world with over 500 years of history. It takes about 3 hours to visit these two sites. Then go to the Temple of Heaven. On the way, you will have a chance to visit a traditional Chinese medicine culture store. It cost another hour to visit the Temple of Heaven- the largest ancient imperial worship center where the ancient Emperors prayed for peace and a bountiful harvest. In this case, lunch time is coming. You can have a Chinese style lunch in a local Restaurant or go to have a taste of Beijing Duck. After lunch, take short walk in a pearl market and then visit the Summer Palace for about 2 hours. It is the largest and most beautiful imperial garden in China.</span><br data-dcnode-id="1270"><span data-dcnode-id="1269" instrument_node=""> Cost:&nbsp;About RMB 250</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1264"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">2. Beijing Highlight Day Tour - Tiananmen Square, Forbidden City and Badaling Great Wall</span></strong></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Around 8:30 am, proceed to visit Tiananmen Square, the largest city-center square in the world. Located in the heart of Beijing City. Then move on to Forbidden City, the largest and best-preserved palatial complex still existing, also known as the Palace Museum. For almost 500 years, it served as the seat-bed of the Emperors in Ming and Qing Dynasties as well as the ceremonial and political centre of Chinese government.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1259" instrument_node="">After lunch, have half day excursion to Badaling Great Wall. The wall is about 80 kilometers northwest from downtown Beijing. The Badaling section of Great Wall is about 3, 740 meters long and averagely 8 meters high. The highest section is 15 meters high. The wall is wide enough for five horses to ride abreast. It is one of the most gorgeous and magnificent part of the Great Wall in Beijing. The Badaling Great Wall is the well preserved Ming Dynasty Great Wall with original appearance.</span><br data-dcnode-id="1258"><span data-dcnode-id="1257" instrument_node=""> Cost: Around RMB 400</span></p><span data-dcnode-id="1255" instrument_node="">
