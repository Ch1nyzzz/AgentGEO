</span><p data-dcnode-id="1299"><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Sanlitun</span></strong><span data-dcnode-id="1300" instrument_node="">&nbsp;got its name for being three li away from downtown Beijing (that’s 1.5 km, or about a mile, away).</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node="">It is </span><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">one of the most famous entertainment areas in Beijing</span></strong><span data-dcnode-id="1294" instrument_node="">. The main areas in Sanlitun include Taikoo Li, Bar Street, Worker's Stadium, and the embassy district.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">You could spend your day exploring the shopping malls and spend your night in its many bars.</span></p><span data-dcnode-id="1289" instrument_node="">

</span><h2 data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Why Is Sanlitun Famous?</span></h2><span data-dcnode-id="1143" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1139"><img alt="Sanlitun" class="img-responsive" data-dcnode-id="1142" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/84001c6244ae44f5b70415f4_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2021/08/84001c6244ae44f5b70415f4_cut_750x400_349.webp&amp;raw" style="opacity: 1; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Sanlitun</span></span></div><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">There are few other places in Beijing like Sanlitun that speak to the city's most bare-faced desire and “madness”.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1134" instrument_node="">Sanlitun is known for its colorful </span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">nightlife</span></strong><span data-dcnode-id="1131" instrument_node=""> and being a bellwether of </span><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">fashion</span></strong><span data-dcnode-id="1128" instrument_node=""> trends. It houses many kinds of bars and clubs, large shopping malls like Taikoo Li and SOHO, and other entertainments.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1125" instrument_node="">Sanlitun </span><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">shows the dynamic and modern side of Beijing</span></strong><span data-dcnode-id="1122" instrument_node="">. Together with the </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/forbidden-city/"><span data-dcnode-id="1121" instrument_node="">Forbidden City</span></a><span data-dcnode-id="1119" instrument_node=""> and the </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/greatwall/"><span data-dcnode-id="1118" instrument_node="">Great Wall</span></a><span data-dcnode-id="1116" instrument_node="">, it has become a name card of Beijing. It is the best place in Beijing for shopping, dining, and entertainment.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><h3 data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Fashion Trend Landmark</span></h3><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1110" instrument_node="">Sanlitun is </span><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">very popular among young people</span></strong><span data-dcnode-id="1107" instrument_node="">. It is full of well-dressed young men and women.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">You will see many people snapping young, trendy, and beautiful locals through their long-lens cameras. Maybe one of these outfits will go viral online and become a trend of the season.&nbsp;</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">You can find many world-famous brands, ranging from luxury shops to forefront designer brands to street fashion brands.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><h3 data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Glitzy Nightlife</span></h3><span data-dcnode-id="1096" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1092"><img alt="Sanlitun night view" class="img-responsive" data-dcnode-id="1095" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/1d2f99d0620549d7bbe4626f_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2021/08/1d2f99d0620549d7bbe4626f_cut_750x400_349.webp&amp;raw" style="opacity: 1; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Sanlitun at night</span></span></div><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">There is a local saying: “Sanlitun has the longest nights in Beijing.” Sanlitun is at its busiest at night.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node="">You can </span><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">find all kinds of bars there</span></strong><span data-dcnode-id="1084" instrument_node="">. They will set tables on the sidewalk where guests can drink, watch football games on TV, and chat. Some bars will have live bands, magic shows, cocktail shows, dance shows, and themed events. These bars are open from the afternoon to the early morning of the next day.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1081" instrument_node="">In addition to bars, there are many </span><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">other recreational activities</span></strong><span data-dcnode-id="1078" instrument_node=""> you can do in the evening — fitness, spas, watching movies, hunting for snacks… &gt;&gt;</span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/nightlife.htm"><span data-dcnode-id="1077" instrument_node="">Things to Do in Beijing at Night</span></a></p><span data-dcnode-id="1074" instrument_node="">
</span><h3 data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">The Legation Quarter — Gathering Area for Foreigners</span></h3><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Beijing now has three legation quarters, one of which is in Sanlitun.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">There are embassies from Australia, Canada, Germany, the European Union, Italy, Indonesia, and other countries and regions in Sanlitun. &nbsp;</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1064" instrument_node="">Thus, Sanlitun has an important community of foreign people living in Beijing. Restaurants, bars, and shopping malls have sprung up. Several international </span><a data-dcnode-id="1063" id="taikooli"></a><span data-dcnode-id="1062" instrument_node="">schools are located nearby.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><h2 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Shop at Taikoo Li Sanlitun</span></h2><span data-dcnode-id="1057" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1053"><img alt="Sanlitun Taikoo Li" class="img-responsive" data-dcnode-id="1056" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2017/10/737df256cd2b4235a90b894a_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Taikoo Li</span></span></div><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">Sanlitun Taikoo Li was awarded national recognition as a “Five-Star Shopping Center”. Taikoo Li is an open shopping area, composed of 19 modern buildings. It </span><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">combines fashion, shopping, music, business, and art</span></strong><span data-dcnode-id="1048" instrument_node=""> from around the world. &nbsp;</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Taikoo Li is divided into two regions: north and south.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1039"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Taikoo Li South</span></strong><span data-dcnode-id="1040" instrument_node=""> contains 260+ stores and restaurants for fashion and sports brands like COS, Adidas, and Apple. There is also a huge outdoor LED screen and plaza, where various stores’ events and street performances are often held.&nbsp;</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1032"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Taikoo Li North</span></strong><span data-dcnode-id="1035" instrument_node=""> contains more luxury fashion brands such as Balmain, Givenchy, and Off-White. There is also a great hotel called the Opposite House — famous Japanese </span><a data-dcnode-id="1034" id="bar"></a><span data-dcnode-id="1033" instrument_node="">architect Kengo Kuma’s first hotel work.&nbsp;</span></p><span data-dcnode-id="1031" instrument_node="">
</span><div class="info_reco_tours" data-dcnode-id="1027"><em data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Recommended</span></em><span data-dcnode-id="1028" instrument_node=""> Tours:</span></div><span data-dcnode-id="1026" instrument_node="">

</span><h2 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Having Fun in Sanlitun Bar Street</span></h2><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="992" instrument_node="">Bar Street is located on the east side of Sanlitun North Road, around the Workers’ Stadium, with a total length of 260 meters. It is one of the </span><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">busiest streets in Beijing at night</span></strong><span data-dcnode-id="989" instrument_node="">. People flock there seeking relaxation. It especially attracts local young people, celebrities, and foreigners.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">There are more than 80 bars in Bar Street. Statistically, 60% of the bars in Beijing are gathered there! </span><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Sanlitun was the earliest bar community in Beijing</span></strong><span data-dcnode-id="983" instrument_node=""> and is the origin of Beijing bar culture. The first bar appeared there in 1989.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="966"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Some popular bars</span></strong><span data-dcnode-id="978" instrument_node=""> include </span><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Long Jing</span></em><span data-dcnode-id="975" instrument_node=""> (a modern tea house and cocktail lounge), </span><em data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Red Dog</span></em><span data-dcnode-id="972" instrument_node=""> (its artistic design blends with disco music), </span><a data-dcnode-id="971" id="soho"></a><span data-dcnode-id="970" instrument_node="">and </span><em data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">KOKOMO</span></em><span data-dcnode-id="967" instrument_node=""> (known for its rooftop).</span></p><span data-dcnode-id="965" instrument_node="">
</span><h2 data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Dive into Sanlitun SOHO</span></h2><span data-dcnode-id="962" instrument_node="">
</span><div class="infoimage" data-dcnode-id="958"><img alt="Sanlitun SOHO" class="img-responsive" data-dcnode-id="961" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/2f103e81d1c64f8794e95793_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Sanlitun SOHO</span></span></div><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">Compared with Taikoo Li which is more suitable for shopping, the stores in SOHO are mainly </span><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">beauty salons, with some buyer's shops and restaurants</span></strong><span data-dcnode-id="953" instrument_node="">. Sanlitun SOHO has five malls: Malls 1, 2, 3, 5, and 6.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">If you want to buy some fashion or vintage clothes, you could go to malls 1 and 2. If you want to find some nice beauty salons, you could go to malls 3, 5, and 6.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Other shopping malls</span></strong><span data-dcnode-id="945" instrument_node=""> in Sanlitun </span><a data-dcnode-id="944" id="yashow"></a><span data-dcnode-id="943" instrument_node="">include 3.3 Mansion, Topwin Center, and Shimao Plaza.</span></p><span data-dcnode-id="941" instrument_node="">
</span><h2 data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Explore Yashow Market</span></h2><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="937" instrument_node="">In Sanlitun, there are not only high-end shopping malls, but also a local market. Yashow Market is a popular destination for tourists </span><a data-dcnode-id="936" id="food"></a><span data-dcnode-id="935" instrument_node="">wishing to buy </span><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">fake name-brand clothes</span></strong><span data-dcnode-id="932" instrument_node="">. You can discover what a market of fake products looks like by visiting there.</span></p><span data-dcnode-id="930" instrument_node="">

</span><h2 data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Enjoy Food at Nali Patio</span></h2><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Nali Patio, a four-story building painted in white, is loaded with Beijing’s hottest restaurants and bars. It is rated </span><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">among Beijing’s top 10 gourmet landmarks</span></strong><span data-dcnode-id="777" instrument_node="">.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">From a Lanzhou ramen restaurant to Japanese izakaya, from Spanish dishes to Italian cuisine to Mexican food, you can </span><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">eat cuisines from all over the world in one place</span></strong><span data-dcnode-id="771" instrument_node="">.</span></p><span data-dcnode-id="769" instrument_node="">
</span><h2 data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Enjoy Peaceful Moments in Sanlitun West Street</span></h2><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Sanlitun West Street is a lane connecting the north and south of Taikoo Li. It used to be called ‘dirty street’ because of its dirty and messy environment. Now it is a tidy and artistic block.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="762" instrument_node="">The City Bookstore and famous Sanlian </span><a data-dcnode-id="761" id="stadium"></a><span data-dcnode-id="760" instrument_node="">Taofen Bookstore there, both open 24 hours, are great places to enjoy some quiet time. </span><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Read a book while having coffee</span></strong><span data-dcnode-id="757" instrument_node="">.</span></p><span data-dcnode-id="755" instrument_node="">
</span><h2 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Watch a Football Game at Workers’ Stadium</span></h2><span data-dcnode-id="752" instrument_node="">
</span><div class="infoimage" data-dcnode-id="748"><img alt="Workers’ Stadium" class="img-responsive" data-dcnode-id="751" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/0177bc3c24d0469fb0168823_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Workers’ Stadium</span></span></div><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="746" instrument_node="">The Workers’ Stadium is a preferred venue for many concerts and football matches. Now, it is under renovation to be finished at the end of 2022. It will then serve </span><a data-dcnode-id="745" id="history"></a><span data-dcnode-id="744" instrument_node="">as the venue for the opening and closing ceremonies and final of the </span><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">2023 Asian Cup</span></strong><span data-dcnode-id="741" instrument_node="">. &nbsp;</span></p><span data-dcnode-id="739" instrument_node="">
</span><h2 data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Sanlitun History and Development</span></h2><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="735" instrument_node="">In the early 1950s, large-scale urban construction began in </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/"><span data-dcnode-id="734" instrument_node="">Beijing</span></a><span data-dcnode-id="732" instrument_node="">. Many </span><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">relocated households moved to Sanlitun</span></strong><span data-dcnode-id="729" instrument_node="">. Bungalows and temporary sheds were its original appearance.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">In the early 1960s, </span><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">a new legation quarter was established</span></strong><span data-dcnode-id="723" instrument_node=""> in Sanlitun. From then on, it became a gathering place for foreigners. With the construction of the legation quarter, Sanlitun became increasingly prosperous.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">In the early 1980s, China's first joint-venture hotel, BEI Zhaolong Hotel, opened there. Later in the 80s, Beijing's first bar also opened in Sanlitun, which became an after-work hangout for embassy staff.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">Seeing the bar’s booming success, more and more people opened bars in Sanlitun. Then, it became the </span><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">representation of Beijing's night economy</span></strong><span data-dcnode-id="714" instrument_node="">. Sanlitun’s vitality attracted more and more businessmen to invest in developments there.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="711" instrument_node="">Now, Sanlitun is </span><a data-dcnode-id="710" id="how"></a><span data-dcnode-id="709" instrument_node="">an important </span><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">fashion and business hub</span></strong><span data-dcnode-id="706" instrument_node=""> in Beijing.&nbsp;</span></p><span data-dcnode-id="704" instrument_node="">
</span><div class="info_reco_tours" data-dcnode-id="700"><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Recommended</span></em><span data-dcnode-id="701" instrument_node=""> Tours:</span></div><span data-dcnode-id="699" instrument_node="">
</span><ul class="drop1" data-dcnode-id="689"><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="695"><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/bj-30-gp/"><span data-dcnode-id="697" instrument_node="">6-Day Beijing Chinese New Year Tour</span></a></li><span data-dcnode-id="694" instrument_node="">
</span><li data-dcnode-id="691"><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/tours/hutong-tour.htm"><span data-dcnode-id="693" instrument_node="">1-Day Beijing Hutong Tour</span></a></li><span data-dcnode-id="690" instrument_node="">
</span></ul><span data-dcnode-id="688" instrument_node="">
</span><h2 data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">How to Get to Sanlitun?</span></h2><span data-dcnode-id="685" instrument_node="">
