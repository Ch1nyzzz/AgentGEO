</span><div class="photoBlock300 autowidht" data-dcnode-id="1524"><img alt="Chill Bar" class="img-responsive" data-dcnode-id="1526" height="198" loader="lazy" originalsrc="//images.chinahighlights.com/allpicture/2014/08/901193fb117f4904b0ba1cd5_cp_279x273.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2014/08/901193fb117f4904b0ba1cd5_cp_279x273.png&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="298"><span data-dcnode-id="1525" instrument_node="">Chill Bar</span></div><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Recently combined with Drum and Bell Bar after it suffered under Beijing's most recent wave of gentrification, in true Beijing style, nobody really knows what this bar is now called, but that doesn't make it any less great.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">It is located very close to Andingmen Station, and has an inside as well as an outside. The inside here is non-smoking, and looks like an extremely cozy living room. The outside and the deck are also decorated comfortably, with sofa's and pillows for lounging on the floor. The staff is extremely friendly, and they also have a pizza menu. Sundays from 2-6pm you can get free flow Tsingtao beers and mixed drinks for just 50 yuan.</span></p><span data-dcnode-id="1517" instrument_node="">

</span><div class="photoBlock300 autowidht" data-dcnode-id="1233"><img alt="Spiced Dark and Stormy, Mao Mao Chong bar, Beijing" class="img-responsive" data-dcnode-id="1235" height="289" loader="lazy" originalsrc="//images.chinahighlights.com/allpicture/2014/08/232fb5d10a694becb63d5456_cp_299x288.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2014/08/232fb5d10a694becb63d5456_cp_299x288.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="299"><span data-dcnode-id="1234" instrument_node="">"Spiced Dark and Stormy", at Mao Mao Chong</span></div><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Mao Mao Chong is an expat favourite, and has ranked highly on expat magazine awards — and it is not hard to see why. Not only is this bar's name adorable (Mao Mao Chong translates as 'The Hairy Caterpillar'), but the bar serves great cocktails, crafted with precision, in an intimate setting right in Beijing's hutongs.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1228" instrument_node="">A lot of the </span><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">cocktails</span></strong><span data-dcnode-id="1225" instrument_node=""> in Mao Mao Chong are Chinese renditions of the classics, with chilli's and Sichuan peppercorns as a key ingredient. For example, there is the Bloody Mao, which is a spicier version of the Bloody Mary.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1222" instrument_node="">On top of this, it is one of the only bars in the area that is non-smoking, making for a pleasant change around Beijing, and potentially even a dinner destination for families' because the pizza's are also amazing. If you can, come here on a Wednesday when a special selection of drinks are only 35 yuan. Otherwise, </span><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">prices</span></strong><span data-dcnode-id="1219" instrument_node=""> for cocktails range between 40 and 70 yuan.</span></p><span data-dcnode-id="1217" instrument_node="">
