                    As a combination of several different cuisines, Beijing cuisine includes many classic and traditional dishes and a large number of snacks and desserts. The following is the15 must-eat Beijing foods deserving try.</span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="653"><h2 class="h2_01" data-dcnode-id="654"><span data-dcnode-id="657" instrument_node="">1. </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/duck.htm"><span data-dcnode-id="656" instrument_node="">Peking Duck</span></a></h2></div><span data-dcnode-id="652" instrument_node=""> </span><span data-dcnode-id="651" instrument_node=""> </span><span data-dcnode-id="650" instrument_node=""> </span><span data-dcnode-id="647" instrument_node=""> </span><span data-dcnode-id="645" instrument_node=""> </span><span data-dcnode-id="644" instrument_node=""> </span><span data-dcnode-id="641" instrument_node=""> </span><span data-dcnode-id="639" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="637"><tbody data-dcnode-id="638"><tr data-dcnode-id="646"><td align="center" data-dcnode-id="648"><img alt="Peking Duck" data-dcnode-id="649" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2019/1220140431.jpg&amp;raw" style="width: 350px; height: 260px; float: none; display: block;"></td></tr><tr data-dcnode-id="640"><td align="center" data-dcnode-id="642" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="643" instrument_node="">Peking Duck</span></td></tr></tbody></table><p data-dcnode-id="623"><img alt="" data-dcnode-id="636" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="635" instrument_node="">&nbsp;Chinese Name: 北京烤鸭 běi jīng kǎo yā</span><br data-dcnode-id="634"><img alt="" data-dcnode-id="633" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="632" instrument_node="">&nbsp;Flavor: salty, sweet, crispy, tender</span><br data-dcnode-id="631"><img alt="" data-dcnode-id="630" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="629" instrument_node="">&nbsp;Cook Method: roast</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">Peking duck is undoubtedly the best food in Beijing worth trying. The high quality fresh duck is roasted wholly, tasting fleshy fat but not greasy, crispy outside and tender inside. After being served, a chef will slice the whole duck in front of you, and you can wrap the duck slices with sliced scallion and sweet flour paste in thin pancake and enjoy. Two most famous restaurants to taste this Beijing food is </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/roastduck/"><span data-dcnode-id="626" instrument_node="">Quan Ju De</span></a><span data-dcnode-id="624" instrument_node=""> and Bian Yi Fang.</span></p><p data-dcnode-id="616"><img alt="" data-dcnode-id="622" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="621" instrument_node="">&nbsp;See more about </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/roastduck/bianyifang.htm"><span data-dcnode-id="620" instrument_node="">Top 10 Peking Duck Restaurants</span></a><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">&nbsp;</span></p><p data-dcnode-id="615"></p><p data-dcnode-id="614"></p><div class="subTitle2017" data-dcnode-id="611"><h2 class="h2_01" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">2. Instant-boiled Mutton</span></h2></div><p data-dcnode-id="598"><img alt="" data-dcnode-id="610" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="609" instrument_node="">&nbsp;Chinese Name: 涮羊肉 shuàn yáng ròu</span><br data-dcnode-id="608"><img alt="" data-dcnode-id="607" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="606" instrument_node="">&nbsp;Flavor: fresh, salty</span><br data-dcnode-id="605"><img alt="" data-dcnode-id="604" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="603" instrument_node="">&nbsp;Cook Method: instant-boil</span><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node="">This is a must eat in Beijing, also called mutton hot pot. The mutton is cut into slices as thin as paper and boiled in boiling water just for several seconds. The boiled mutton slices are often eaten with condiment sauce made of sesame paste, sesame oil, coriander, fermented bean curd and so on. The side vegetable for mutton hot pot is often Chinese cabbage, tofu, mushroom, pickled vegetables and so on. The pot used is a special cooper pot with a tube in the middle.</span><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">&nbsp;</span></p><p data-dcnode-id="597"></p><p data-dcnode-id="596"></p><div class="subTitle2017" data-dcnode-id="593"><h2 class="h2_01" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">3. Noodles with Soy Bean Paste (Zhajiangmian)</span></h2></div><p data-dcnode-id="575"><img alt="" data-dcnode-id="592" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="591" instrument_node="">&nbsp;Chinese Name: 炸酱面 zhá jiàng miàn</span><br data-dcnode-id="590"><img alt="" data-dcnode-id="589" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="588" instrument_node="">&nbsp;Flavor: salty, sauce flavor</span><br data-dcnode-id="587"><img alt="" data-dcnode-id="586" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="585" instrument_node="">&nbsp;Cook Method: boil, stir-fry</span><br data-dcnode-id="584"><span data-dcnode-id="583" instrument_node="">It is the best food in Beijing China among common Beijingers. The soul of Zhajiangmian is the fried soy bean paste, which is cooked with chopped pork, soy bean paste, sweet flour paste and other condiments. The boiled noodles are topped with the fried soy bean paste and other vegetables like sliced cucumber, green bean, soybean and bean sprout. You can also add chili oil and vinegar based on your own taste.</span><br data-dcnode-id="582"><img alt="" data-dcnode-id="581" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="580" instrument_node="">&nbsp;Read more: </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/tour/food/chinese-cooking/minced-pork-noodles.htm"><span data-dcnode-id="579" instrument_node="">Recipe - How to Make Zhajiangmian</span></a><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">&nbsp;</span></p><p data-dcnode-id="574"></p><p data-dcnode-id="573"></p><p data-dcnode-id="572"></p><p data-dcnode-id="571"></p><div class="subTitle2017" data-dcnode-id="568"><h2 class="h2_01" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">4. Sautéed Meat Shreds with Soy Bean Paste</span></h2></div><p data-dcnode-id="557"><img alt="" data-dcnode-id="567" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="566" instrument_node="">&nbsp;Chinese Name: 京酱肉丝 jīng jiàng ròu sī</span><br data-dcnode-id="565"><img alt="" data-dcnode-id="564" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="563" instrument_node="">&nbsp;Flavor: salty, slightly sweet, sauce flavor</span><br data-dcnode-id="562"><img alt="" data-dcnode-id="561" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="560" instrument_node="">&nbsp;Cook Method: quick fry</span><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">Sautéed Meat Shreds with Soy Bean Paste is a well-known food to eat in Beijing and is one of the classic dishes in Beijing cuisine. Lean pork is the main ingredient, supplemented with sweet flour paste, onion, ginger and other seasonings. You can wrap it into Chinese bread while eating.</span></p><span data-dcnode-id="556" instrument_node=""> </span><span data-dcnode-id="555" instrument_node=""> </span><span data-dcnode-id="554" instrument_node=""> </span><span data-dcnode-id="533" instrument_node=""> </span><span data-dcnode-id="512" instrument_node=""> </span><span data-dcnode-id="510" instrument_node=""> </span><table align="center" border="0" data-dcnode-id="508" style="margin: 0px auto;"><tbody data-dcnode-id="509"><tr data-dcnode-id="511"><td data-dcnode-id="534"><span data-dcnode-id="553" instrument_node=""> </span><span data-dcnode-id="552" instrument_node=""> </span><span data-dcnode-id="551" instrument_node=""> </span><span data-dcnode-id="550" instrument_node=""> </span><span data-dcnode-id="547" instrument_node=""> </span><span data-dcnode-id="545" instrument_node=""> </span><span data-dcnode-id="544" instrument_node=""> </span><span data-dcnode-id="541" instrument_node=""> </span><span data-dcnode-id="539" instrument_node=""> </span><span data-dcnode-id="537" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="536"><tbody data-dcnode-id="538"><tr data-dcnode-id="546"><td align="center" data-dcnode-id="548"><img alt="Sautéed Meat Shreds with Soy Bean Paste" data-dcnode-id="549" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2019/1220140413.jpg&amp;raw" style="width: 350px; height: 260px; display: block;"></td></tr><tr data-dcnode-id="540"><td align="center" data-dcnode-id="542" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="543" instrument_node="">Sautéed Meat Shreds with Soy Bean Paste</span></td></tr></tbody></table><span data-dcnode-id="535" instrument_node=""> </span></td><td data-dcnode-id="513"><span data-dcnode-id="532" instrument_node=""> </span><span data-dcnode-id="531" instrument_node=""> </span><span data-dcnode-id="530" instrument_node=""> </span><span data-dcnode-id="529" instrument_node=""> </span><span data-dcnode-id="526" instrument_node=""> </span><span data-dcnode-id="524" instrument_node=""> </span><span data-dcnode-id="523" instrument_node=""> </span><span data-dcnode-id="520" instrument_node=""> </span><span data-dcnode-id="518" instrument_node=""> </span><span data-dcnode-id="516" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="515"><tbody data-dcnode-id="517"><tr data-dcnode-id="525"><td align="center" data-dcnode-id="527"><img alt="Quick-fried Mutton with Scallions" data-dcnode-id="528" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2019/mutton-dish.jpg&amp;raw" style="width: 350px; height: 260px; display: block;"></td></tr><tr data-dcnode-id="519"><td align="center" data-dcnode-id="521" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="522" instrument_node="">Quick-fried Mutton with Scallions</span></td></tr></tbody></table><span data-dcnode-id="514" instrument_node=""> </span></td></tr></tbody></table><p data-dcnode-id="507"></p><div class="subTitle2017" data-dcnode-id="504"><h2 class="h2_01" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">5. Quick-fried Mutton with Scallions</span></h2></div><p data-dcnode-id="491"><img alt="" data-dcnode-id="503" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="502" instrument_node="">&nbsp;Chinese Name: 葱爆羊肉 cōng bào yáng ròu</span><br data-dcnode-id="501"><img alt="" data-dcnode-id="500" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="499" instrument_node="">&nbsp;Flavor: fresh, salty, tender</span><br data-dcnode-id="498"><img alt="" data-dcnode-id="497" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="496" instrument_node="">&nbsp;Cook Method: quick fry</span><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node="">This is one of traditional Beijing dishes. The knack for cooking it is the cooking time and heat. The mutton is simply seasoned and quickly stir-fried to maintain its original and fresh flavor. The scallion and onion added when stir-frying is to release the strange smell of mutton. It tastes fresh, tender and has a natural flavor of scallion.</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">&nbsp;</span></p><p data-dcnode-id="490"></p><p data-dcnode-id="489"></p><div class="subTitle2017" data-dcnode-id="486"><h2 class="h2_01" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">6. Peking Barbecue</span></h2></div><p data-dcnode-id="473"><img alt="" data-dcnode-id="485" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="484" instrument_node="">&nbsp;Chinese Name: 北京烤肉 běi jīng kǎo ròu</span><br data-dcnode-id="483"><img alt="" data-dcnode-id="482" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="481" instrument_node="">&nbsp;Flavor: salty, fresh</span><br data-dcnode-id="480"><img alt="" data-dcnode-id="479" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="478" instrument_node="">&nbsp;Cook Method: barbecue</span><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">It is one of the best food in Beijing. The materials for Beijing Barbecue is often mutton and beef. Before barbecuing, the meat is dipped into condiment sauce made of soy sauce, cooking wine, ginger juice, sugar, and sesame oil. The scallion and onion is put on the baking tray first. After they turn tender, the meat with condiment sauce is put on the scallion and onion. The barbecued beef and mutton is often eaten together with baked wheaten cake and cucumber.</span><br data-dcnode-id="475"><span data-dcnode-id="474" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="470"><h2 class="h2_01" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">7. Steamed Bread Soaked in Fish head Soup</span></h2></div><p data-dcnode-id="457"><img alt="" data-dcnode-id="469" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="468" instrument_node="">&nbsp;Chinese Name: 鱼头泡饼 yú tóu pào bǐng</span><br data-dcnode-id="467"><img alt="" data-dcnode-id="466" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="465" instrument_node="">&nbsp;Flavor: salty, slightly spicy, fresh</span><br data-dcnode-id="464"><img alt="" data-dcnode-id="463" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="462" instrument_node="">&nbsp;Cook Method: fry, stir-fry, and brew</span><br data-dcnode-id="461"><span data-dcnode-id="460" instrument_node="">It is a local traditional Beijing food. The fish head is first fried and then stir-fried with green onion, ginger, garlic and dry red chili, etc, then brewed with soup, soy sauce, tomato paste, etc. The steamed bread is served as a side dish and needs to be dipped into the soup before eating.</span><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="454"><h2 class="h2_01" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">8. Quick-fried Tripe</span></h2></div><img alt="" data-dcnode-id="453" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="452" instrument_node="">&nbsp;Chinese Name: 爆肚 bào dǔ</span><br data-dcnode-id="451"><img alt="" data-dcnode-id="450" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="449" instrument_node="">&nbsp;Flavor: tender and salty</span><br data-dcnode-id="448"><img alt="" data-dcnode-id="447" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="446" instrument_node="">&nbsp;Cook Method: quick boil</span><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">It is a popular traditional snack in Tianjin and Beijing, mostly provided by Muslim restaurants and roadside stalls at snack street. The materials are ox tripe or goat tripe. The sliced tripe is quickly boiled, and eat with dipping sauce made of sesame paste, vinegar, soy sauce, sesame oil, red chili oil, sugar, chopped coriander and green onion, etc.</span><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="439"><h2 class="h2_01" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">9. Stewed Liver</span></h2></div><p data-dcnode-id="423"><img alt="" data-dcnode-id="438" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="437" instrument_node="">&nbsp;Chinese Name: 炒肝 chǎo gān</span><br data-dcnode-id="436"><img alt="" data-dcnode-id="435" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="434" instrument_node="">&nbsp;Flavor: salty</span><br data-dcnode-id="433"><img alt="" data-dcnode-id="432" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="431" instrument_node="">&nbsp;Cook Method: stew</span><br data-dcnode-id="430"><span data-dcnode-id="429" instrument_node="">Originated in </span><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/history/song/"><span data-dcnode-id="428" instrument_node="">Song Dynasty</span></a><span data-dcnode-id="426" instrument_node=""> (960 - 1279 AD), it is a classic and popular Beijing China food. The main materials are pig liver and pork intestines. The liver and intestines need to be boiled first and then stewed with pork bone soup and mushroom soup; finally, thicken the mixture with starchy sauce.</span><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="420"><h2 class="h2_01" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">10. Tofu With Crab Roe</span></h2></div><p data-dcnode-id="407"><img alt="" data-dcnode-id="419" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="418" instrument_node="">&nbsp;Chinese Name: 蟹黄豆腐 xiè huáng dòu fu</span><br data-dcnode-id="417"><img alt="" data-dcnode-id="416" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="415" instrument_node="">&nbsp;Flavor: salty, tender and fresh</span><br data-dcnode-id="414"><img alt="" data-dcnode-id="413" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="412" instrument_node="">&nbsp;Cook Method: stir-fry, braise</span><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node="">This is a Beijing dish from Huaiyang cuisine. The crab roe can be replaced by salted egg yolk if you do not have crab roe. The tofu is tender with a fresh flavor of crab roe.</span><br data-dcnode-id="409"><span data-dcnode-id="408" instrument_node="">&nbsp;</span></p><p data-dcnode-id="406"></p><div class="subTitle2017" data-dcnode-id="403"><h2 class="h2_01" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">11. Arhat Prawns (Luohan Prawns)</span></h2></div><p data-dcnode-id="390"><img alt="" data-dcnode-id="402" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="401" instrument_node="">&nbsp;Chinese Name: 罗汉大虾 luó hàn dà xiā</span><br data-dcnode-id="400"><img alt="" data-dcnode-id="399" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="398" instrument_node="">&nbsp;Flavor: salty and fresh</span><br data-dcnode-id="397"><img alt="" data-dcnode-id="396" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="395" instrument_node="">&nbsp;Cook Method: fry and stir-fry</span><br data-dcnode-id="394"><span data-dcnode-id="393" instrument_node="">It is a dish in Tan cuisine, a branch of Beijing food. The prawns are cut into three parts: head, body and tail and cooked separately. The tail is always fried. The head is first pan-fried and then braised with tomato ketchup and soup while the body part is first fried and then braised with soup and various seasonings. The cooked three parts are finely put on the plate. Since its body part bulges which looks like a big-bellied Arhat, hence the name Arhat Prawns.</span><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="387"><h2 class="h2_01" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">12. Braised Shark’s Fin in Rice Wine Sauce</span></h2></div><p data-dcnode-id="376"><img alt="" data-dcnode-id="386" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="385" instrument_node="">&nbsp;Chinese Name: 黄焖鱼翅 huáng mèn yú chì</span><br data-dcnode-id="384"><img alt="" data-dcnode-id="383" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="382" instrument_node="">&nbsp;Flavor: salty, tender and umami</span><br data-dcnode-id="381"><img alt="" data-dcnode-id="380" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="379" instrument_node="">&nbsp;Cook Method: braise</span><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node="">It is also an exquisite Beijing food in Tan cuisine as well as an imperial dish. The materials not only include shark’s fin, but also chicken, duck, bacon and dried scallop to enhance the umami taste of the shark’s fin. The dish tastes tender and juicy with a bright yellow color.</span></p><span data-dcnode-id="375" instrument_node=""> </span><span data-dcnode-id="374" instrument_node=""> </span><span data-dcnode-id="373" instrument_node=""> </span><span data-dcnode-id="352" instrument_node=""> </span><span data-dcnode-id="331" instrument_node=""> </span><span data-dcnode-id="329" instrument_node=""> </span><table align="center" border="0" data-dcnode-id="327" style="margin: 0px auto;"><tbody data-dcnode-id="328"><tr data-dcnode-id="330"><td data-dcnode-id="353"><span data-dcnode-id="372" instrument_node=""> </span><span data-dcnode-id="371" instrument_node=""> </span><span data-dcnode-id="370" instrument_node=""> </span><span data-dcnode-id="369" instrument_node=""> </span><span data-dcnode-id="366" instrument_node=""> </span><span data-dcnode-id="364" instrument_node=""> </span><span data-dcnode-id="363" instrument_node=""> </span><span data-dcnode-id="360" instrument_node=""> </span><span data-dcnode-id="358" instrument_node=""> </span><span data-dcnode-id="356" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="355"><tbody data-dcnode-id="357"><tr data-dcnode-id="365"><td align="center" data-dcnode-id="367"><img alt="Braised Shark’s Fin in Rice Wine Sauce" data-dcnode-id="368" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2019/1220140441.jpg&amp;raw" style="width: 350px; height: 260px; display: block;"></td></tr><tr data-dcnode-id="359"><td align="center" data-dcnode-id="361" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="362" instrument_node="">Braised Shark’s Fin in Rice Wine Sauce</span></td></tr></tbody></table><span data-dcnode-id="354" instrument_node=""> </span></td><td data-dcnode-id="332"><span data-dcnode-id="351" instrument_node=""> </span><span data-dcnode-id="350" instrument_node=""> </span><span data-dcnode-id="349" instrument_node=""> </span><span data-dcnode-id="348" instrument_node=""> </span><span data-dcnode-id="345" instrument_node=""> </span><span data-dcnode-id="343" instrument_node=""> </span><span data-dcnode-id="342" instrument_node=""> </span><span data-dcnode-id="339" instrument_node=""> </span><span data-dcnode-id="337" instrument_node=""> </span><span data-dcnode-id="335" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="334"><tbody data-dcnode-id="336"><tr data-dcnode-id="344"><td align="center" data-dcnode-id="346"><img alt="Bird’s Nest Soup" data-dcnode-id="347" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2019/1220140451.jpg&amp;raw" style="width: 350px; height: 260px; display: block;"></td></tr><tr data-dcnode-id="338"><td align="center" data-dcnode-id="340" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="341" instrument_node="">Bird’s Nest Soup</span></td></tr></tbody></table><span data-dcnode-id="333" instrument_node=""> </span></td></tr></tbody></table><div class="subTitle2017" data-dcnode-id="324"><h2 class="h2_01" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">13. Bird’s Nest Soup</span></h2></div><p data-dcnode-id="311"><img alt="" data-dcnode-id="323" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="322" instrument_node="">&nbsp;Chinese Name: 清汤燕窝 qīng tāng yàn wō</span><br data-dcnode-id="321"><img alt="" data-dcnode-id="320" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="319" instrument_node="">&nbsp;Flavor: light and fresh</span><br data-dcnode-id="318"><img alt="" data-dcnode-id="317" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="316" instrument_node="">&nbsp;Cook Method: boil and steam</span><br data-dcnode-id="315"><span data-dcnode-id="314" instrument_node="">The main materials are chicken, bacon and bird's nest. The bird's nest is braised with chicken soup and chicken breast paste and then steamed with seasonings like salt, rice cooking wine and ground pepper over high heat for half an hour. It is nutritious and recommended for females.</span><br data-dcnode-id="313"><span data-dcnode-id="312" instrument_node="">&nbsp;</span></p><p data-dcnode-id="310"></p><p data-dcnode-id="309"></p><div class="subTitle2017" data-dcnode-id="306"><h2 class="h2_01" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">14. Pea Cake</span></h2></div><p data-dcnode-id="297"><img alt="" data-dcnode-id="305" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="304" instrument_node="">&nbsp;Chinese Name: 豌豆黄 wān dòu huáng</span><br data-dcnode-id="303"><img alt="" data-dcnode-id="302" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="301" instrument_node="">&nbsp;Flavor: sweet and tender</span><br data-dcnode-id="300"><img alt="" data-dcnode-id="299" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="298" instrument_node="">&nbsp;Cook Method: boil</span></p><span data-dcnode-id="296" instrument_node=""> </span><span data-dcnode-id="295" instrument_node=""> </span><span data-dcnode-id="294" instrument_node=""> </span><span data-dcnode-id="291" instrument_node=""> </span><span data-dcnode-id="289" instrument_node=""> </span><span data-dcnode-id="288" instrument_node=""> </span><span data-dcnode-id="285" instrument_node=""> </span><span data-dcnode-id="283" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="281"><tbody data-dcnode-id="282"><tr data-dcnode-id="290"><td align="center" data-dcnode-id="292"><img alt="Fried Chop Rice Cake (Rolling Donkey)" data-dcnode-id="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2019/1129145907.jpg&amp;raw" style="width: 350px; height: 260px; float: none; display: block;"></td></tr><tr data-dcnode-id="284"><td align="center" data-dcnode-id="286" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="287" instrument_node="">Fried Chop Rice Cake (Rolling Donkey)</span></td></tr></tbody></table><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">It is a traditional Beijing seasonal dessert in spring. The main ingredients are dried pea, sugar, sweet osmanthus or honey and agar. It is golden yellow and tastes tender and has the aroma of pea and osmanthus.</span></p><span data-dcnode-id="278" instrument_node="">&nbsp;</span><p data-dcnode-id="277"></p><p data-dcnode-id="276"></p><div class="subTitle2017" data-dcnode-id="273"><h2 class="h2_01" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">15. Fried Chop Rice Cake / Rolling Donkey</span></h2></div><p data-dcnode-id="262"><img alt="" data-dcnode-id="272" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="271" instrument_node="">&nbsp;Chinese Name: 驴打滚 lǘ dǎ gǔn</span><br data-dcnode-id="270"><img alt="" data-dcnode-id="269" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="268" instrument_node="">&nbsp;Flavor: sweet and tender</span><br data-dcnode-id="267"><img alt="" data-dcnode-id="266" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="265" instrument_node="">&nbsp;Cook Method: steam</span><br data-dcnode-id="264"><span data-dcnode-id="263" instrument_node="">This is one of best local food in Beijing and a classic dessert. It is made of glutinous millet flour, soybean powder, sweetened bean paste, sugar, brown sugar or sweet red bean paste, sesame oil and osmanthus. The red bean paste or thick brown sugar syrup is wrapped into the glutinous millet dough, and then rolled in the fried soybean powder, looking like the donkey rolling in blowing dust, which is why it is called rolling donkey.</span></p><div class="box_blue" data-dcnode-id="204"><p class="c_title_ico_dinning" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Traditional Beijing Food:</span></p><ul data-dcnode-id="223"><span data-dcnode-id="259" instrument_node=""> </span><li data-dcnode-id="256"><a data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/duck.htm"><span data-d
