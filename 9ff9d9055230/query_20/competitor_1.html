educationaltours.com/guide/beijing-shopping.htm"><span data-dcnode-id="468" instrument_node="">Shopping in Beijing</span></a></li><li data-dcnode-id="463"><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/beijing-2022-olympic-winter-games.htm"><span data-dcnode-id="465" instrument_node="">2022 Olympic Winter Games</span></a></li></ul><span data-dcnode-id="461" instrument_node="">

</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node=""> Beijing’s rich historical culture is not only reflected in architecture and scenery, but also in its cuisine that embodies the cultural heritage and draws upon humanistic contents. In addition to the best-known culinary export, Peking Duck, let’s explore other dishes. </span></p><span data-dcnode-id="455" instrument_node=""> </span><h2 data-dcnode-id="453"><span data-dcnode-id="454" instrument_node=""> 1.Peking Duck (Běijīng kǎoyā) </span></h2><span data-dcnode-id="452" instrument_node=""> </span><div class="photoBlock" data-dcnode-id="448"><span data-dcnode-id="451" instrument_node=""> </span><img alt="peking duck" class="img-responsive" data-dcnode-id="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/media/image/2018-07/15323338028689.jpg&amp;raw"><span data-dcnode-id="449" instrument_node=""> </span></div><span data-dcnode-id="447" instrument_node=""> </span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node=""> Beijing roast Duck is the epitome of Beijing cuisine. It is made with high-quality meat-duck which is roasted in an oven. The dish is mostly esteemed for the thin, crispy skin, with authentic versions of the dish serving mostly skin and little meat. </span></p><span data-dcnode-id="444" instrument_node=""> </span><p data-dcnode-id="439"><span data-dcnode-id="443" instrument_node=""> </span><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Characteristics</span></strong><span data-dcnode-id="440" instrument_node="">:It is cooked using wood from fruit trees and the inner flame will bring special fragrance to the dish. </span></p><span data-dcnode-id="438" instrument_node=""> </span><p data-dcnode-id="427"><span data-dcnode-id="437" instrument_node=""> </span><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">How to eat</span></strong><span data-dcnode-id="434" instrument_node="">: A carved roast duck is enjoyed with accompaniments. There are usually three ways to eat. </span><br data-dcnode-id="433"><span data-dcnode-id="432" instrument_node=""> 1）	Use chopsticks to pick up some sweet soybean sauce over the thin pancakes or baked sesame-seed cake, put on a few slices of duck meat, scallion, cucumber or turnip strips and roll them all to take a bit bite.</span><br data-dcnode-id="431"><span data-dcnode-id="430" instrument_node=""> 2）	Mashed garlic and soy sauce, or turnip strips with roast duck will provide the spicy version of the dish.</span><br data-dcnode-id="429"><span data-dcnode-id="428" instrument_node=""> 3）	Some people choose to eat the crispy duck skin with fine white sugar. </span></p><span data-dcnode-id="426" instrument_node=""> </span><p data-dcnode-id="409"><span data-dcnode-id="425" instrument_node=""> </span><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Recommendations:</span></strong><span data-dcnode-id="422" instrument_node=""> Quan Ju De:</span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node=""> Wangfujing Branch </span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node=""> Address: No. 9, Shuaifuyuan Hutong, Wangfujing Street, Dongcheng District, Beijing </span><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node=""> Tian’anmen Branch </span><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node=""> Address: No. 44, Dongjiaominxiang Hutong, Dongcheng District, Beijing (South of National Museum) </span><br data-dcnode-id="413"><span data-dcnode-id="412" instrument_node=""> Beijing Da Dong Roast Duck Restaurant: </span><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node=""> Address: 5F, Jinbao Place, No. 88, Jinbao Street, Dongcheng District, Beijing </span></p><span data-dcnode-id="408" instrument_node=""> </span><h2 data-dcnode-id="406"><span data-dcnode-id="407" instrument_node=""> 2.	Copper Hotpot (Tóng guō shuàn ròu) </span></h2><span data-dcnode-id="405" instrument_node=""> </span><div class="photoBlock" data-dcnode-id="401"><span data-dcnode-id="404" instrument_node=""> </span><img alt="copper hotpot" class="img-responsive" data-dcnode-id="403" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/media/image/2018-07/15323338305902.jpg&amp;raw"><span data-dcnode-id="402" instrument_node=""> </span></div><span data-dcnode-id="400" instrument_node=""> </span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node=""> This old Beijing hotpot is also known as “boiled mutton”. There is actually a default and proper sequence for cooking materials in the traditional clear boiling broth with cabbages and tofu (different from the renowned spicy broth in Sichuan Province, China). 1. Tripes; 2. Mutton; 3. Vegetables; 4. Noodles made of various grains. The hotpot is very simple to handle and it tastes good. </span></p><span data-dcnode-id="397" instrument_node=""> </span><p data-dcnode-id="392"><span data-dcnode-id="396" instrument_node=""> </span><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Characteristics</span></strong><span data-dcnode-id="393" instrument_node="">: A ham shank from a wether (castrated sheep), where the lean and fat is separable, is selected. The mutton is well cooked in the pot in just 10 seconds. </span></p><span data-dcnode-id="391" instrument_node=""> </span><p data-dcnode-id="386"><span data-dcnode-id="390" instrument_node=""> </span><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">How to eat</span></strong><span data-dcnode-id="387" instrument_node="">: Broth for cooking (garlic, ginger, red dates and shiitake mushrooms, and no seasoning) and sesame paste (favored paste in Beijing) for applying to the cooked food. </span></p><span data-dcnode-id="385" instrument_node=""> </span><p data-dcnode-id="374"><span data-dcnode-id="384" instrument_node=""> </span><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Recommendations:</span></strong><span data-dcnode-id="381" instrument_node=""> Jubaoyuan, Niujie Branch </span><br data-dcnode-id="380"><span data-dcnode-id="379" instrument_node=""> Address: No. 5-2, Niu Street, Xicheng District, Beijing </span><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node=""> Dong Lai Shun, Tian’anmen Branch:</span><br data-dcnode-id="376"><span data-dcnode-id="375" instrument_node=""> No. 44, Dongjiamin Lane, Dongcheng District, Beijing (300 m south of National Museum) </span></p><span data-dcnode-id="373" instrument_node=""> </span><h2 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node=""> 3.	Beijing Fried Noodles (Zhá jiàng miàn) </span></h2><span data-dcnode-id="370" instrument_node=""> </span><div class="photoBlock" data-dcnode-id="366"><span data-dcnode-id="369" instrument_node=""> </span><img alt="beijing fried noodles" class="img-responsive" data-dcnode-id="368" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/media/image/2018-07/15323338817896.jpg&amp;raw"><span data-dcnode-id="367" instrument_node=""> </span></div><span data-dcnode-id="365" instrument_node=""> </span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node=""> Beijing Fried Noodles is a unique local dish, made from stir-fried shredded vegetables, sauce and boiled noodles. Cut up cucumbers, Chinese toon leaves, well cooked bean sprouts, green beans and soy beans are all prepared for the shreds. Fry diced meat with onion and ginger in the oil and add soybean paste or sweet noodle sauce to make the proper sauce. Boil and take out the noodles and gently splash the shreds and sauce. That is how to make a bowl of Beijing Fried Noodles. Or, boil and take out the noodles and cool them in the cold water. Cover the noodles with the prepared shreds and sauce and the “water cooled noodles” (Guò shuǐmiàn) or the “cool noodles” (Liáng miàn) can be served. </span></p><span data-dcnode-id="362" instrument_node=""> </span><p data-dcnode-id="355"><span data-dcnode-id="361" instrument_node=""> </span><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Characteristics</span></strong><span data-dcnode-id="358" instrument_node="">: The hand-made noodles are chewy. The authentic noodle sauce must be fried in a small bowl of dried oil to allow the integration of the material flavors. The dense sauce can maintain its shape when a chopstick divides it. The moisture, sweetness, and fragrance therein is well balanced. </span><br data-dcnode-id="357"><span data-dcnode-id="356" instrument_node=""> Seasonal vegetables such as bean sprouts, turnip strips, sliced cucumber, shallot leaves, celery shreds and sliced cabbage can all be made as the raw material of the shreds. </span></p><span data-dcnode-id="354" instrument_node=""> </span><p data-dcnode-id="345"><span data-dcnode-id="353" instrument_node=""> </span><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Recommendation</span></strong><span data-dcnode-id="350" instrument_node="">:</span><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node=""> Haiwanju </span><br data-dcnode-id="347"><span data-dcnode-id="346" instrument_node=""> Address: No. 11, Zengguang Road, Haidian District, Beijing (northwest of Ganjiakou Building) </span></p><span data-dcnode-id="344" instrument_node=""> </span><h2 data-dcnode-id="342"><span data-dcnode-id="343" instrument_node=""> 4.	Zhizi Barbecue (Zhì zi kǎoròu) </span></h2><span data-dcnode-id="341" instrument_node=""> </span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node=""> Zhizi barbecue is a traditional way to barbecue in Beijing. A large round oven with grates is made from a bar of cast iron. When the charcoal fire is vigorous, beef, mutton, shreded shallots and coriander are spread over the Zhizi. As they are quickly stirred with long chopsticks, the house is filled with wonderful aromas. </span></p><span data-dcnode-id="338" instrument_node=""> </span><div class="photoBlock" data-dcnode-id="334"><span data-dcnode-id="337" instrument_node=""> </span><img alt="zhizi barbecue" class="img-responsive" data-dcnode-id="336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/media/image/2018-07/15323339353266.jpg&amp;raw"><span data-dcnode-id="335" instrument_node=""> </span></div><span data-dcnode-id="333" instrument_node=""> </span><p data-dcnode-id="328"><span data-dcnode-id="332" instrument_node=""> </span><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Characteristics</span></strong><span data-dcnode-id="329" instrument_node="">: The grates in the iron Zhizi are flat and framed by a round iron belt. The gaps between the grates allow the escape of the grease and the effective grilling of the meat. The meat becomes really tender. </span></p><span data-dcnode-id="327" instrument_node=""> </span><p data-dcnode-id="314"><span data-dcnode-id="326" instrument_node=""> </span><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Recommendation</span></strong><span data-dcnode-id="323" instrument_node="">:</span><br data-dcnode-id="322"><span data-dcnode-id="321" instrument_node=""> Kaorou Wan，Yonghegong Branch</span><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node=""> Address: No. 185, Yonghegong Street, Dongcheng District, Beijing (near the west exit of Gui Street)</span><br data-dcnode-id="318"><span data-dcnode-id="317" instrument_node=""> Kaorou Wan</span><br data-dcnode-id="316"><span data-dcnode-id="315" instrument_node=""> Address: No. 14, East Front of Qianhai, Di’anmenwai Avenue, Xicheng District, Beijing </span></p><span data-dcnode-id="313" instrument_node=""> </span><h2 data-dcnode-id="311"><span data-dcnode-id="312" instrument_node=""> 5.	Beijing sauce pork (Jīng jiàng ròu sī) </span></h2><span data-dcnode-id="310" instrument_node=""> </span><div class="photoBlock" data-dcnode-id="306"><span data-dcnode-id="309" instrument_node=""> </span><img alt="beijing sauce pork" class="img-responsive" data-dcnode-id="308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/media/image/2018-07/15323339731871.jpg&amp;raw"><span data-dcnode-id="307" instrument_node=""> </span></div><span data-dcnode-id="305" instrument_node=""> </span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node=""> Beijing sauce pork is a well-known dish. The meat is tender, the sauce is rich, and the flavor is neither too salty nor too sweet. </span></p><span data-dcnode-id="302" instrument_node=""> </span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node=""> Characteristics: It is made with sweet noodles sauce, shallot, ginger and other seasonings. The northern cooking approach contributes to a slightly salty and still sweet sauce. </span></p><span data-dcnode-id="299" instrument_node=""> </span><p data-dcnode-id="294"><span data-dcnode-id="298" instrument_node=""> </span><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">How to eat</span></strong><span data-dcnode-id="295" instrument_node="">: The dish is accompanied by sliced shallot, cucumber or any seasonal vegetables and wrapped in the tofu skin. </span></p><span data-dcnode-id="293" instrument_node=""> </span><p data-dcnode-id="280"><span data-dcnode-id="292" instrument_node=""> </span><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Recommendation</span></strong><span data-dcnode-id="289" instrument_node="">:</span><br data-dcnode-id="288"><span data-dcnode-id="287" instrument_node=""> Jin Bai Wan, Jinsong Branch </span><br data-dcnode-id="286"><span data-dcnode-id="285" instrument_node=""> Address: Commercial Building, No.43, Songyuxili, Panjiayuan, Chaoyang District, Beijing</span><br data-dcnode-id="284"><span data-dcnode-id="283" instrument_node=""> Beijing Da Dong Roast Duck Restaurant: </span><br data-dcnode-id="282"><span data-dcnode-id="281" instrument_node=""> Address: 5F, Jinbao Place, No. 88, Jinbao Street, Dongcheng District, Beijing </span></p><span data-dcnode-id="279" instrument_node=""> </span><h2 data-dcnode-id="277"><span data-dcnode-id="278" instrument_node=""> 6.	Qingfeng Steamed Buns (Qìng fēng bāozi) </span></h2><span data-dcnode-id="276" instrument_node=""> </span><div class="photoBlock" data-dcnode-id="272"><span data-dcnode-id="275" instrument_node=""> </span><img alt="qingfeng steamed buns" class="img-responsive" data-dcnode-id="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/media/image/2018-07/15323339977142.jpg&amp;raw"><span data-dcnode-id="273" instrument_node=""> </span></div><span data-dcnode-id="271" instrument_node=""> </span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node=""> Qingfeng Steamed Buns restaurant was founded in 1948. It started no different than other restaurants. But its tasty steamed buns became its specialty in 1956 along with the official brand “Qingfeng Steamed Buns”. The time honored bun shop is loved by local people. Its generous and delicious stuffing is known by all. </span></p><span data-dcnode-id="268" instrument_node=""> </span><p data-dcnode-id="259"><span data-dcnode-id="267" instrument_node=""> </span><strong data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Recommendation</span></strong><span data-dcnode-id="264" instrument_node="">:</span><br data-dcnode-id="263"><span data-dcnode-id="262" instrument_node=""> Qingfeng Steamed Buns, Qianmenxi Street Branch </span><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node=""> Address: No. 4, Zhengyang Market, Qianmenxi Avenue, Xicheng District, Beijing. </span></p><span data-dcnode-id="258" instrument_node=""> </span><h2 data-dcnode-id="256"><span data-dcnode-id="257" instrument_node=""> 7.	Lamb Spine (Yáng xiēzi) </span></h2><span data-dcnode-id="255" instrument_node=""> </span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node=""> Lamb Spine serves the complete lamb (Yáng) spin with tenderloin attached. As it resembles the shape of a scorpion (xiēzi), it is commonly known as Yáng xiēzi. The mutton attached on the bones is very tasty. It is often cooked in a hot pot and is a nice winter dish. </span></p><span data-dcnode-id="252" instrument_node=""> </span><div class="photoBlock" data-dcnode-id="248"><span data-dcnode-id="251" instrument_node=""> </span><img alt="lamb spine" class="img-responsive" data-dcnode-id="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/media/image/2018-07/15323340224399.jpg&amp;raw"><span data-dcnode-id="249" instrument_node=""> </span></div><span data-dcnode-id="247" instrument_node=""> </span><p data-dcnode-id="240"><span data-dcnode-id="246" instrument_node=""> </span><strong data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">How to eat: </span></strong><span data-dcnode-id="243" instrument_node=""> </span><br data-dcnode-id="242"><span data-dcnode-id="241" instrument_node=""> Disposable gloves are prepared for take down the mutton by hands, but not by chopsticks. The well stewed food is tender and juicy. The bone marrow and soup are also consider as precious nutrition. All raw materials can be cooked into the rich soup. </span></p><span data-dcnode-id="239" instrument_node=""> </span><p data-dcnode-id="228"><span data-dcnode-id="238" instrument_node=""> </span><strong data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Recommendation</span></strong><span data-dcnode-id="235" instrument_node="">: </span><br data-dcnode-id="234"><span data-dcnode-id="233" instrument_node=""> Xie Wang Fu</span><br data-dcnode-id="232"><span data-dcnode-id="231" instrument_node=""> Address: 1F, Building 5, Songjingbei Road, Chaoyang District, Beijing (Northeast side of Panjiayuan Bridge) Xiezi Li</span><br data-dcnode-id="230"><span data-dcnode-id="229" instrument_node=""> Address: 1F, No. 7 Building, Xibianmen West Lane, Xicheng District, Beijing (Northwest Side Road at Tianning Bridge) </span></p><span data-dcnode-id="227" instrument_node=""> </span><h2 data-dcnode-id="225"><span data-dcnode-id="226" instrument_node=""> 8.	Quick Boiled Lamb Noodles (Yángròu cuān miàn) </span></h2><span data-dcnode-id="224" instrument_node=""> </span><div class="photoBlock" data-dcnode-id="220"><span data-dcnode-id="223" instrument_node=""> </span><img alt="quick boiled lamb noddles" class="img-responsive" data-dcnode-id="222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/media/image/2018-07/15323340493454.jpg&amp;raw"><span data-dcnode-id="221" instrument_node=""> </span></div><span data-dcnode-id="219" instrument_node=""> </span><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node=""> Quick Boiled Lamb Noodles is a home-cooked local Beijing cuisine. It is delicious and nutritious. Apply soy sauce, sesame oil and other seasoning over sliced mutton. When the noodles are almost cooked, spread the slices into the pot with chopsticks. When the meet turns gray, fish out all the noodles and mutton. Dress the dish with pepper to have a good meal. </span></p><span data-dcnode-id="216" instrument_node=""> </span><p data-dcnode-id="211"><span data-dcnode-id="215" instrument_node=""> </span><strong data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Characteristics</span></strong><span data-dcnode-id="212" instrument_node="">: Cuān requires fishing food out of the pot when it is just cooked. The time for the food in the already boiling water should be very short as mutton is so easy to cook. </span></p><span data-dcnode-id="210" instrument_node=""> </span><p data-dcnode-id="201"><span data-dcnode-id="209" instrument_node=""> </span><strong data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Recommendation</span></strong><span data-dcnode-id="206" instrument_node="">:</span><br data-dcnode-id="205"><span data-dcnode-id="204" instrument_node=""> Xiaoyuezhai Qingzhen (Halal) Handmade Noodles</span><br data-dcnode-id="203"><span data-dcnode-id="202" instrument_node=""> Address: No. 4, Yong'anmennei Avenue, Xicheng District (originally in Xuanwu District), Beijing (Opposite to Beijing Hui People Hospital) </span></p><span data-dcnode-id="200" instrument_node=""> </span><p data-dcnode-id="197"><strong data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">You may also like:</span></strong></p><span data-dcnode-id="196" instrument_node=""> </span><ol data-dcnode-id="178" style="list-style-type:disc;"><span data-dcnode-id="195" instrument_node=""> </span><li data-dcnode-id="192"><a data-dcnode-id="193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/guide/beijing-pastries.htm"><span data-dcnode-id="194" instrument_node="">Beijing Pastries</span></a></li><span data-dcnode-id="191" instrument_node=""> </span><li data-dcnode-id="188"><a data-dcnode-id="189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/guide/beijing-delicacies.htm"><span data-dcnode-id="190" instrument_node="">Beijing Delicacies</span></a></li><span data-dcnode-id="187" instrument_node=""> </span><li data-dcnode-id="184"><a data-dcnode-id="185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaeducationaltours.com/guide/beijing-snack-streets.htm"><span data-dcnode-id="186" instrument_node="">Top 4 Beijing Snack Streets</span></a></li><span data-dcnode-id="183" instrument_node=""> </span><li data-dcnode-id="180"><a data-dcnode-id="181" href="https:
