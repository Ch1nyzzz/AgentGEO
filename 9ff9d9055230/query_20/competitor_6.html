</span><h1 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Jiangxi Food</span></h1><span data-dcnode-id="667" instrument_node="">
</span><span data-dcnode-id="665" instrument_node="">
</span><div class="authorupdate" data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">Written by </span><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Kelly Pang</span></strong><span data-dcnode-id="661" instrument_node="">Updated Feb. 8, 2021</span></div><span data-dcnode-id="659" instrument_node="">
</span></section><span data-dcnode-id="657" instrument_node="">
</span></div><span data-dcnode-id="655" instrument_node="">
</span><div data-dcnode-id="537" id="main_content_pc"><span data-dcnode-id="654" instrument_node="">
</span><div class="pc_content" data-dcnode-id="615"><span data-dcnode-id="653" instrument_node="">
</span><article data-dcnode-id="617"><span data-dcnode-id="652" instrument_node="">
</span><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="646"><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/jiangxi/"><span data-dcnode-id="649" instrument_node="">Jiangxi</span></a><span data-dcnode-id="647" instrument_node=""> cuisine, also known as Gan cuisine (Gan, 赣in Chinese, is the shortname of Jiangxi), features crisp quality, fragrance and modest taste (not too salty or spicy). Relishing the various local snacks is an important tourist activity for visitors in Jiangxi.</span></p><span data-dcnode-id="645" instrument_node="">
</span><h2 data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Fried snacks</span></h2><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Whenever visitors come to Jiangxi, they can go for the fried snack bars along streets. Strings of ingredients with dried bean curd, sausages, vegetables, kelp rolls, cutlet, bananas or lotus root slices are well prepared. Visitors can select as will, after the vendor putting them in a hot frying pan for a while and wiping some spice, coming the time for tasting.</span></p><span data-dcnode-id="639" instrument_node="">
</span><h2 data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Nanchang rice-flour noodles</span></h2><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Nanchang rice-flour noodles have a long history, featuring pure white color, and non-smash quality through cooking or frying for a long time. They are made of high quality rice, going through several procedures, such as soaking, grinding, filtering, and so on. Cooking methods are also simple. You can steam, boil or stir-fry, you can even eat the cold Nanchang rice-flour noodles mixed with sesame oil, soy sauce, chopped green onion, and pepper in particular which the Nanchang people like the best.</span></p><span data-dcnode-id="633" instrument_node="">
</span><h2 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Lushan San Shi (Lushan Three Stones)</span></h2><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">The popular dishes, “Lushan San Shi” (庐山三石), namely Lushan Stone Chicken (庐山石鸡), Lushan Stone Fish(庐山石鱼) and Lushan Stone Mushroom (庐山石耳), and they are regarded as a rare taste of world. The raw ingredients are precious and expensive stuffs from Mount Lu.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">The stone chicken is actually a kind of edible frog living in caves, or among rocks, while its meat is as delicious as chicken, hence its name. The stone fish lives in the waterfalls or springs around Mount Lu and builds its nest in stone crevices. Its meat tastes very delicate. The Stone Mushroom, looked like a person’s ear, is a kind of wild fungus growing on unfrequented steep cliffs.</span></p><span data-dcnode-id="624" instrument_node="">
</span><h2 data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Wuyuan Steamed Tofu (婺源糊豆腐)</span></h2><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Wuyuan dining follows the tradition of Hui Cuisine (one of the eight famous cuisines of China, derived from North China’s Anhui Province) (/travelguide/chinese-food/hui-cuisine.htm) featuring braising and stewing. As a representative dish of local cuisine, steamed tofu is very popular among visitors. Following is the cooking method of steamed tofu. Pour the diced tofu which is about the size of bean into the hot pan with soup-stock, adding lard, and some sauces like salt, spices. Braising for several minutes, then plus some shrimps meat, mushroom, sliced bamboo shoots or some thing else up to your own flavor. Then comes the key step, you need stir with one hand, and sift rice flour with another hand. At last, you can add some chopped coriander, green starch and lard, and it is time for putting the tofu in a plate. Plus some sesame oil, pepper, and shopped green onion, it is time for relishing the famous steamed tofu.</span></p><span data-dcnode-id="618" instrument_node="">
</span></article><span data-dcnode-id="616" instrument_node="">
</span></div><span data-dcnode-id="614" instrument_node="">
