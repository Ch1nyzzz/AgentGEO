</span><h2 data-dcnode-id="9075"><span class="mw-headline" data-dcnode-id="9083" id="Background"><span data-dcnode-id="9084" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="9076"><span class="mw-editsection-bracket" data-dcnode-id="9081"><span data-dcnode-id="9082" instrument_node="">[</span></span><a data-dcnode-id="9079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="9080" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9077"><span data-dcnode-id="9078" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9074" instrument_node="">
</span><p data-dcnode-id="9034"><span data-dcnode-id="9073" instrument_node="">As Beijing has been the capital of China for centuries, its cuisine is influenced by culinary traditions from all over China, but the style that has the greatest influence on Beijing cuisine is that of the eastern coastal province of </span><a data-dcnode-id="9071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shandong_cuisine" title="Shandong cuisine"><span data-dcnode-id="9072" instrument_node="">Shandong</span></a><span data-dcnode-id="9070" instrument_node="">.</span><sup class="reference" data-dcnode-id="9067" id="cite_ref-BJCRS1_1-0"><a data-dcnode-id="9068" href="#cite_note-BJCRS1-1"><span data-dcnode-id="9069" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="9064" id="cite_ref-BJCRS2_2-0"><a data-dcnode-id="9065" href="#cite_note-BJCRS2-2"><span data-dcnode-id="9066" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="9061" id="cite_ref-BJCRS3_3-0"><a data-dcnode-id="9062" href="#cite_note-BJCRS3-3"><span data-dcnode-id="9063" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="9058" id="cite_ref-BJCRS4_4-0"><a data-dcnode-id="9059" href="#cite_note-BJCRS4-4"><span data-dcnode-id="9060" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9057" instrument_node=""> Beijing cuisine has itself, in turn, also greatly influenced other Chinese cuisines, particularly the cuisine of </span><a data-dcnode-id="9055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liaoning_cuisine" title="Liaoning cuisine"><span data-dcnode-id="9056" instrument_node="">Liaoning</span></a><span data-dcnode-id="9054" instrument_node="">, the </span><a data-dcnode-id="9052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_imperial_cuisine" title="Chinese imperial cuisine"><span data-dcnode-id="9053" instrument_node="">Chinese imperial cuisine</span></a><span data-dcnode-id="9051" instrument_node=""> and the </span><a data-dcnode-id="9049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_aristocrat_cuisine" title="Chinese aristocrat cuisine"><span data-dcnode-id="9050" instrument_node="">Chinese aristocrat cuisine</span></a><span data-dcnode-id="9048" instrument_node="">.</span><sup class="reference" data-dcnode-id="9045" id="cite_ref-BJCRS1_1-1"><a data-dcnode-id="9046" href="#cite_note-BJCRS1-1"><span data-dcnode-id="9047" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="9042" id="cite_ref-BJCRS2_2-1"><a data-dcnode-id="9043" href="#cite_note-BJCRS2-2"><span data-dcnode-id="9044" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="9039" id="cite_ref-BJCRS3_3-1"><a data-dcnode-id="9040" href="#cite_note-BJCRS3-3"><span data-dcnode-id="9041" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="9036" id="cite_ref-BJCRS4_4-1"><a data-dcnode-id="9037" href="#cite_note-BJCRS4-4"><span data-dcnode-id="9038" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9035" instrument_node="">
</span></p><p data-dcnode-id="9012"><span data-dcnode-id="9033" instrument_node="">Another tradition that influenced Beijing cuisine (as well as influenced by the latter itself) is the Chinese imperial cuisine that originated from the "Emperor's Kitchen" (</span><span data-dcnode-id="9031" lang="zh"><span data-dcnode-id="9032" instrument_node="">御膳房</span></span><span data-dcnode-id="9030" instrument_node="">; </span><i data-dcnode-id="9027"><span data-dcnode-id="9028" lang="zh-Latn-pinyin"><span data-dcnode-id="9029" instrument_node="">yùshànfáng</span></span></i><span data-dcnode-id="9026" instrument_node="">), which referred to the cooking facilities inside the </span><a data-dcnode-id="9024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forbidden_City" title="Forbidden City"><span data-dcnode-id="9025" instrument_node="">Forbidden City</span></a><span data-dcnode-id="9023" instrument_node="">, where thousands of cooks from different parts of China showed their best culinary skills to please the imperial family and officials. Therefore, it is sometimes difficult to determine the actual origin of a dish as the term "Mandarin" is generalised and refers not only to Beijing, but other provinces as well. However, some generalisation of Beijing cuisine can be characterised as follows: Foods that originated in Beijing are often snacks rather than main courses, and they are typically sold by small shops or street vendors. There is emphasis on dark soy paste, sesame paste, sesame oil and scallions, and </span><a class="mw-redirect" data-dcnode-id="9021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fermented_tofu" title="Fermented tofu"><span data-dcnode-id="9022" instrument_node="">fermented tofu</span></a><span data-dcnode-id="9020" instrument_node=""> is often served as a condiment. In terms of cooking techniques, methods relating to different ways of frying are often used.</span><sup class="reference" data-dcnode-id="9017" id="cite_ref-BJCRS1_1-2"><a data-dcnode-id="9018" href="#cite_note-BJCRS1-1"><span data-dcnode-id="9019" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="9014" id="cite_ref-BJCRS4_4-2"><a data-dcnode-id="9015" href="#cite_note-BJCRS4-4"><span data-dcnode-id="9016" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9013" instrument_node=""> There is less emphasis on rice as an accompaniment as compared to many other regions in China, as local rice production in Beijing is limited by the relatively dry climate.
</span></p><p data-dcnode-id="9006"><span data-dcnode-id="9011" instrument_node="">Many dishes in Beijing cuisine that are served as main courses are derived from a variety of Chinese Halal foods, particularly lamb and beef dishes,</span><sup class="reference" data-dcnode-id="9008" id="cite_ref-5"><a data-dcnode-id="9009" href="#cite_note-5"><span data-dcnode-id="9010" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9007" instrument_node=""> as well as from Huaiyang cuisine.
</span></p><p data-dcnode-id="8961"><a data-dcnode-id="9004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Huaiyang_cuisine" title="Huaiyang cuisine"><span data-dcnode-id="9005" instrument_node="">Huaiyang cuisine</span></a><span data-dcnode-id="9003" instrument_node=""> has been praised since ancient times in China and it was a general practice for an official travelling to Beijing to take up a new post to bring along with him a chef specialising in Huaiyang cuisine. When these officials had completed their terms in the capital and returned to their native provinces, most of the chefs they brought along often remained in Beijing. They opened their own restaurants or were hired by wealthy locals.</span><sup class="reference" data-dcnode-id="9000" id="cite_ref-BJCRS1_1-3"><a data-dcnode-id="9001" href="#cite_note-BJCRS1-1"><span data-dcnode-id="9002" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="8997" id="cite_ref-BJCRS4_4-3"><a data-dcnode-id="8998" href="#cite_note-BJCRS4-4"><span data-dcnode-id="8999" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8996" instrument_node=""> The imperial clan of the </span><a data-dcnode-id="8994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ming_dynasty" title="Ming dynasty"><span data-dcnode-id="8995" instrument_node="">Ming dynasty</span></a><span data-dcnode-id="8993" instrument_node="">, the </span><a data-dcnode-id="8991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Zhu" title="House of Zhu"><span data-dcnode-id="8992" instrument_node="">House of Zhu</span></a><span data-dcnode-id="8990" instrument_node="">, who had ancestry from </span><a data-dcnode-id="8988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jiangsu" title="Jiangsu"><span data-dcnode-id="8989" instrument_node="">Jiangsu Province</span></a><span data-dcnode-id="8987" instrument_node="">, also contributed greatly in introducing Huaiyang cuisine to Beijing when the capital was moved from </span><a data-dcnode-id="8985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nanjing" title="Nanjing"><span data-dcnode-id="8986" instrument_node="">Nanjing</span></a><span data-dcnode-id="8984" instrument_node=""> to Beijing in the 15th century, because the imperial kitchen was mainly Huaiyang style. The element of traditional Beijing culinary and gastronomical cultures of enjoying artistic performances such as </span><a class="mw-redirect" data-dcnode-id="8982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing_opera" title="Beijing opera"><span data-dcnode-id="8983" instrument_node="">Beijing opera</span></a><span data-dcnode-id="8981" instrument_node=""> while dining directly developed from the similar practice in the culture of </span><a data-dcnode-id="8979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jiangsu_cuisine" title="Jiangsu cuisine"><span data-dcnode-id="8980" instrument_node="">Jiangsu</span></a><span data-dcnode-id="8978" instrument_node=""> and Huaiyang cuisines.</span><sup class="reference" data-dcnode-id="8975" id="cite_ref-BJCRS1_1-4"><a data-dcnode-id="8976" href="#cite_note-BJCRS1-1"><span data-dcnode-id="8977" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="8972" id="cite_ref-BJCRS2_2-2"><a data-dcnode-id="8973" href="#cite_note-BJCRS2-2"><span data-dcnode-id="8974" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="8969" id="cite_ref-BJCRS3_3-2"><a data-dcnode-id="8970" href="#cite_note-BJCRS3-3"><span data-dcnode-id="8971" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="8966" id="cite_ref-BJCRS4_4-4"><a data-dcnode-id="8967" href="#cite_note-BJCRS4-4"><span data-dcnode-id="8968" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="8963" id="cite_ref-BJCRS5_6-0"><a data-dcnode-id="8964" href="#cite_note-BJCRS5-6"><span data-dcnode-id="8965" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8962" instrument_node="">
</span></p><p data-dcnode-id="8945"><a data-dcnode-id="8959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Islamic_cuisine" title="Chinese Islamic cuisine"><span data-dcnode-id="8960" instrument_node="">Chinese Islamic cuisine</span></a><span data-dcnode-id="8958" instrument_node=""> is another important component of Beijing cuisine and was first prominently introduced when Beijing became the capital of the </span><a data-dcnode-id="8956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuan_dynasty" title="Yuan dynasty"><span data-dcnode-id="8957" instrument_node="">Yuan dynasty</span></a><span data-dcnode-id="8955" instrument_node="">. However, the most significant contribution to the formation of Beijing cuisine came from </span><a data-dcnode-id="8953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shandong_cuisine" title="Shandong cuisine"><span data-dcnode-id="8954" instrument_node="">Shandong cuisine</span></a><span data-dcnode-id="8952" instrument_node="">, as most chefs from </span><a data-dcnode-id="8950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shandong" title="Shandong"><span data-dcnode-id="8951" instrument_node="">Shandong Province</span></a><span data-dcnode-id="8949" instrument_node=""> came to Beijing en masse during the </span><a data-dcnode-id="8947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qing_dynasty" title="Qing dynasty"><span data-dcnode-id="8948" instrument_node="">Qing dynasty</span></a><span data-dcnode-id="8946" instrument_node="">. Unlike the earlier two cuisines, which were brought by the ruling class such as nobles, aristocrats and bureaucrats and then spread to the general populace, the introduction of Shandong cuisine begun with serving the general populace, with much wider market segment, from wealthy merchants to the working class.
</span></p><span data-dcnode-id="8944" instrument_node="">
</span><h2 data-dcnode-id="8934"><span class="mw-headline" data-dcnode-id="8942" id="History"><span data-dcnode-id="8943" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="8935"><span class="mw-editsection-bracket" data-dcnode-id="8940"><span data-dcnode-id="8941" instrument_node="">[</span></span><a data-dcnode-id="8938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D2" title="Edit section: History"><span data-dcnode-id="8939" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8936"><span data-dcnode-id="8937" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8933" instrument_node="">
</span><p data-dcnode-id="8909"><span data-dcnode-id="8932" instrument_node="">The </span><a data-dcnode-id="8930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qing_dynasty" title="Qing dynasty"><span data-dcnode-id="8931" instrument_node="">Qing dynasty</span></a><span data-dcnode-id="8929" instrument_node=""> was a major period in the formation of Beijing cuisine. Before the </span><a data-dcnode-id="8927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boxer_Rebellion" title="Boxer Rebellion"><span data-dcnode-id="8928" instrument_node="">Boxer Rebellion</span></a><span data-dcnode-id="8926" instrument_node="">, the </span><a data-dcnode-id="8924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foodservice" title="Foodservice"><span data-dcnode-id="8925" instrument_node="">foodservice</span></a><span data-dcnode-id="8923" instrument_node=""> establishments in Beijing were strictly stratified by the foodservice guild. Each category of the establishment was specifically based on its ability to provide for a particular segment of the market. The top ranking establishments served nobles, aristocrats, and wealthy merchants and landlords, while lower ranking establishments served the populace of lower financial and social status. It was during this period when Beijing cuisine gained fame and became recognised by the Chinese culinary society, and the stratification of the foodservice was one of its most obvious characteristics as part of its culinary and gastronomic cultures during this first peak of its formation.</span><sup class="reference" data-dcnode-id="8920" id="cite_ref-BJCRS1_1-5"><a data-dcnode-id="8921" href="#cite_note-BJCRS1-1"><span data-dcnode-id="8922" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="8917" id="cite_ref-BJCRS2_2-3"><a data-dcnode-id="8918" href="#cite_note-BJCRS2-2"><span data-dcnode-id="8919" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="8914" id="cite_ref-BJCRS3_3-3"><a data-dcnode-id="8915" href="#cite_note-BJCRS3-3"><span data-dcnode-id="8916" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="8911" id="cite_ref-BJCRS4_4-5"><a data-dcnode-id="8912" href="#cite_note-BJCRS4-4"><span data-dcnode-id="8913" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8910" instrument_node="">
</span></p><p data-dcnode-id="8891"><span data-dcnode-id="8908" instrument_node="">The official stratification was an integral part of the local culture of Beijing and it was not finally abolished officially after the end of the Qing dynasty, which resulted in the second peak in the formation of Beijing cuisine. Meals previously offered to nobles and aristocrats were made available to anyone who could afford them instead of being restricted only to the upper class. As chefs freely switched between jobs offered by different establishments, they brought their skills that further enriched and developed Beijing cuisine. Though the stratification of food services in Beijing was no longer effected by imperial laws, the structure more or less remained despite continuous weakening due to the financial background of the local clientele. The different classes are listed in the following subsections.</span><sup class="reference" data-dcnode-id="8905" id="cite_ref-BJCRS1_1-6"><a data-dcnode-id="8906" href="#cite_note-BJCRS1-1"><span data-dcnode-id="8907" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="8902" id="cite_ref-BJCRS2_2-4"><a data-dcnode-id="8903" href="#cite_note-BJCRS2-2"><span data-dcnode-id="8904" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="8899" id="cite_ref-BJCRS3_3-4"><a data-dcnode-id="8900" href="#cite_note-BJCRS3-3"><span data-dcnode-id="8901" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="8896" id="cite_ref-BJCRS4_4-6"><a data-dcnode-id="8897" href="#cite_note-BJCRS4-4"><span data-dcnode-id="8898" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="8893" id="cite_ref-BJCRS5_6-1"><a data-dcnode-id="8894" href="#cite_note-BJCRS5-6"><span data-dcnode-id="8895" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8892" instrument_node="">
</span></p><span data-dcnode-id="8890" instrument_node="">
</span><h3 data-dcnode-id="8880"><span class="mw-headline" data-dcnode-id="8888" id="Zhuang"><span data-dcnode-id="8889" instrument_node="">Zhuang</span></span><span class="mw-editsection" data-dcnode-id="8881"><span class="mw-editsection-bracket" data-dcnode-id="8886"><span data-dcnode-id="8887" instrument_node="">[</span></span><a data-dcnode-id="8884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D3" title="Edit section: Zhuang"><span data-dcnode-id="8885" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8882"><span data-dcnode-id="8883" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8879" instrument_node="">
</span><p data-dcnode-id="8849"><i data-dcnode-id="8877"><span data-dcnode-id="8878" instrument_node="">Zhuang</span></i><span data-dcnode-id="8876" instrument_node=""> (</span><span data-dcnode-id="8874" lang="zh-Hans"><span data-dcnode-id="8875" instrument_node="">庄</span></span><span data-dcnode-id="8873" instrument_node="">; </span><span data-dcnode-id="8871" lang="zh-Hant"><span data-dcnode-id="8872" instrument_node="">莊</span></span><span data-dcnode-id="8870" instrument_node="">; </span><i data-dcnode-id="8867"><span data-dcnode-id="8868" lang="zh-Latn-pinyin"><span data-dcnode-id="8869" instrument_node="">zhuāng</span></span></i><span data-dcnode-id="8866" instrument_node="">; 'village'), or </span><i data-dcnode-id="8864"><span data-dcnode-id="8865" instrument_node="">zhuang zihao</span></i><span data-dcnode-id="8863" instrument_node=""> (</span><span data-dcnode-id="8861" lang="zh-Hans"><span data-dcnode-id="8862" instrument_node="">庄字号</span></span><span data-dcnode-id="8860" instrument_node="">; </span><span data-dcnode-id="8858" lang="zh-Hant"><span data-dcnode-id="8859" instrument_node="">莊字號</span></span><span data-dcnode-id="8857" instrument_node="">; </span><i data-dcnode-id="8854"><span data-dcnode-id="8855" lang="zh-Latn-pinyin"><span data-dcnode-id="8856" instrument_node="">zhuāng zìhào</span></span></i><span data-dcnode-id="8853" instrument_node="">; 'village brand') were the top-ranking foodservice establishments, not only in providing foods, but entertainment as well. The form of entertainment provided was usually </span><a class="mw-redirect" data-dcnode-id="8851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing_opera" title="Beijing opera"><span data-dcnode-id="8852" instrument_node="">Beijing opera</span></a><span data-dcnode-id="8850" instrument_node="">, and establishments of this class always had long-term contracts with an opera troupe to perform onsite or contracts with famous performers, such as national-treasure-class performers, to perform onsite, though not on a daily basis. Establishments of this category only accepted customers who came as a group and ordered banquets by appointment, and the banquets provided by establishments of this category often included most, if not all tables, at the site. The bulk foodservice business was catering at customers' homes or other locations, often for birthdays, marriages, funerals, promotions and other important celebrations and festivals. When catering, these establishments not only provided what was on the menu, but fulfilled customers' requests.
</span></p><p data-dcnode-id="8835"><i data-dcnode-id="8847"><span data-dcnode-id="8848" instrument_node="">Leng zhuangzi</span></i><span data-dcnode-id="8846" instrument_node=""> (</span><span data-dcnode-id="8844" lang="zh-Hans"><span data-dcnode-id="8845" instrument_node="">冷庄子</span></span><span data-dcnode-id="8843" instrument_node="">; </span><span data-dcnode-id="8841" lang="zh-Hant"><span data-dcnode-id="8842" instrument_node="">冷莊子</span></span><span data-dcnode-id="8840" instrument_node="">; </span><i data-dcnode-id="8837"><span data-dcnode-id="8838" lang="zh-Latn-pinyin"><span data-dcnode-id="8839" instrument_node="">lěng zhuāngzǐ</span></span></i><span data-dcnode-id="8836" instrument_node="">; 'cold village') lacked any rooms to host banquets, and thus their business was purely catering.
</span></p><span data-dcnode-id="8834" instrument_node="">
</span><h3 data-dcnode-id="8824"><span class="mw-headline" data-dcnode-id="8832" id="Tang"><span data-dcnode-id="8833" instrument_node="">Tang</span></span><span class="mw-editsection" data-dcnode-id="8825"><span class="mw-editsection-bracket" data-dcnode-id="8830"><span data-dcnode-id="8831" instrument_node="">[</span></span><a data-dcnode-id="8828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D4" title="Edit section: Tang"><span data-dcnode-id="8829" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8826"><span data-dcnode-id="8827" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8823" instrument_node="">
</span><p data-dcnode-id="8793"><i data-dcnode-id="8821"><span data-dcnode-id="8822" instrument_node="">Tang</span></i><span data-dcnode-id="8820" instrument_node=""> (</span><span data-dcnode-id="8818" lang="zh"><span data-dcnode-id="8819" instrument_node="">堂</span></span><span data-dcnode-id="8817" instrument_node="">; </span><i data-dcnode-id="8814"><span data-dcnode-id="8815" lang="zh-Latn-pinyin"><span data-dcnode-id="8816" instrument_node="">táng</span></span></i><span data-dcnode-id="8813" instrument_node="">; 'auditorium'), or </span><i data-dcnode-id="8811"><span data-dcnode-id="8812" instrument_node="">tang zihao</span></i><span data-dcnode-id="8810" instrument_node=""> (</span><span data-dcnode-id="8808" lang="zh-Hans"><span data-dcnode-id="8809" instrument_node="">堂字号</span></span><span data-dcnode-id="8807" instrument_node="">; </span><span data-dcnode-id="8805" lang="zh-Hant"><span data-dcnode-id="8806" instrument_node="">堂字號</span></span><span data-dcnode-id="8804" instrument_node="">; </span><i data-dcnode-id="8801"><span data-dcnode-id="8802" lang="zh-Latn-pinyin"><span data-dcnode-id="8803" instrument_node="">táng zìhào</span></span></i><span data-dcnode-id="8800" instrument_node="">; 'auditorium brand'), are similar to </span><i data-dcnode-id="8798"><span data-dcnode-id="8799" instrument_node="">zhuang</span></i><span data-dcnode-id="8797" instrument_node=""> establishments, but the business of these second-class establishments were generally evenly divided among onsite banquet hosting and catering (at customers' homes). Establishments of this class would also have long-term contracts with </span><a class="mw-redirect" data-dcnode-id="8795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing_opera" title="Beijing opera"><span data-dcnode-id="8796" instrument_node="">Beijing opera</span></a><span data-dcnode-id="8794" instrument_node=""> troupes to perform onsite, but they did not have long-term contracts with famous performers, such as national-treasure-class performers, to perform onsite on regular basis; however these top performers would still perform at establishments of this category occasionally. In terms of catering at the customers' sites, establishments of this category often only provided dishes strictly according to their menu.
</span></p><span data-dcnode-id="8792" instrument_node="">
</span><h3 data-dcnode-id="8782"><span class="mw-headline" data-dcnode-id="8790" id="Ting"><span data-dcnode-id="8791" instrument_node="">Ting</span></span><span class="mw-editsection" data-dcnode-id="8783"><span class="mw-editsection-bracket" data-dcnode-id="8788"><span data-dcnode-id="8789" instrument_node="">[</span></span><a data-dcnode-id="8786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D5" title="Edit section: Ting"><span data-dcnode-id="8787" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8784"><span data-dcnode-id="8785" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8781" instrument_node="">
</span><p data-dcnode-id="8751"><i data-dcnode-id="8779"><span data-dcnode-id="8780" instrument_node="">Ting</span></i><span data-dcnode-id="8778" instrument_node=""> (</span><span data-dcnode-id="8776" lang="zh-Hans"><span data-dcnode-id="8777" instrument_node="">厅</span></span><span data-dcnode-id="8775" instrument_node="">; </span><span data-dcnode-id="8773" lang="zh-Hant"><span data-dcnode-id="8774" instrument_node="">廳</span></span><span data-dcnode-id="8772" instrument_node="">; </span><i data-dcnode-id="8769"><span data-dcnode-id="8770" lang="zh-Latn-pinyin"><span data-dcnode-id="8771" instrument_node="">tīng</span></span></i><span data-dcnode-id="8768" instrument_node="">; 'foyer'), or </span><i data-dcnode-id="8766"><span data-dcnode-id="8767" instrument_node="">ting zihao</span></i><span data-dcnode-id="8765" instrument_node=""> (</span><span data-dcnode-id="8763" lang="zh-Hans"><span data-dcnode-id="8764" instrument_node="">厅字号</span></span><span data-dcnode-id="8762" instrument_node="">; </span><span data-dcnode-id="8760" lang="zh-Hant"><span data-dcnode-id="8761" instrument_node="">廳字號</span></span><span data-dcnode-id="8759" instrument_node="">; </span><i data-dcnode-id="8756"><span data-dcnode-id="8757" lang="zh-Latn-pinyin"><span data-dcnode-id="8758" instrument_node="">tīng zìhào</span></span></i><span data-dcnode-id="8755" instrument_node="">; 'foyer brand') are foodservice establishments which had more business in onsite banquet hosting than catering at customers' homes. For onsite banquet hosting, entertainment was still provided, but establishments of this category did not have long-term contracts with </span><a class="mw-redirect" data-dcnode-id="8753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing_opera" title="Beijing opera"><span data-dcnode-id="8754" instrument_node="">Beijing opera</span></a><span data-dcnode-id="8752" instrument_node=""> troupes, so that performers varied from time to time, and top performers usually did not perform here or at any lower-ranking establishments. For catering, different establishments of this category were incapable of handling significant catering on their own, but generally had to combine resources with other establishments of the same ranking (or lower) to do the job.
</span></p><span data-dcnode-id="8750" instrument_node="">
</span><h3 data-dcnode-id="8740"><span class="mw-headline" data-dcnode-id="8748" id="Yuan"><span data-dcnode-id="8749" instrument_node="">Yuan</span></span><span class="mw-editsection" data-dcnode-id="8741"><span class="mw-editsection-bracket" data-dcnode-id="8746"><span data-dcnode-id="8747" instrument_node="">[</span></span><a data-dcnode-id="8744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D6" title="Edit section: Yuan"><span data-dcnode-id="8745" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8742"><span data-dcnode-id="8743" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8739" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8727"><div class="thumbinner" data-dcnode-id="8728" style="width:222px;"><a class="image" data-dcnode-id="8737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25E4%25BA%25AC%25E9%2586%25AC%25E5%259C%2592.jpg"><img alt="" class="thumbimage" data-dcnode-id="8738" data-file-height="4993" data-file-width="6369" decoding="async" height="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/55/%25E4%25BA%25AC%25E9%2586%25AC%25E5%259C%2592.jpg/220px-%25E4%25BA%25AC%25E9%2586%25AC%25E5%259C%2592.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/55/%E4%BA%AC%E9%86%AC%E5%9C%92.jpg/330px-%E4%BA%AC%E9%86%AC%E5%9C%92.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/55/%E4%BA%AC%E9%86%AC%E5%9C%92.jpg/440px-%E4%BA%AC%E9%86%AC%E5%9C%92.jpg 2x" width="220"></a><span data-dcnode-id="8736" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8729"><div class="magnify" data-dcnode-id="8734"><a class="internal" data-dcnode-id="8735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25E4%25BA%25AC%25E9%2586%25AC%25E5%259C%2592.jpg" title="Enlarge"></a></div><span data-dcnode-id="8733" instrument_node="">A Jing Jiang Yuan (京醬園) near </span><a data-dcnode-id="8731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beihai_Park" title="Beihai Park"><span data-dcnode-id="8732" instrument_node="">Beihai</span></a><span data-dcnode-id="8730" instrument_node="">, circa 1879.</span></div></div></div><span data-dcnode-id="8726" instrument_node="">
</span><p data-dcnode-id="8693"><i data-dcnode-id="8724"><span data-dcnode-id="8725" instrument_node="">Yuan</span></i><span data-dcnode-id="8723" instrument_node=""> (</span><span data-dcnode-id="8721" lang="zh-Hans"><span data-dcnode-id="8722" instrument_node="">园</span></span><span data-dcnode-id="8720" instrument_node="">; </span><span data-dcnode-id="8718" lang="zh-Hant"><span data-dcnode-id="8719" instrument_node="">園</span></span><span data-dcnode-id="8717" instrument_node="">; </span><i data-dcnode-id="8714"><span data-dcnode-id="8715" lang="zh-Latn-pinyin"><span data-dcnode-id="8716" instrument_node="">yuán</span></span></i><span data-dcnode-id="8713" instrument_node="">; 'garden'), or </span><i data-dcnode-id="8711"><span data-dcnode-id="8712" instrument_node="">yuan zihao</span></i><span data-dcnode-id="8710" instrument_node=""> (</span><span data-dcnode-id="8708" lang="zh-Hans"><span data-dcnode-id="8709" instrument_node="">园字号</span></span><span data-dcnode-id="8707" instrument_node="">; </span><span data-dcnode-id="8705" lang="zh-Hant"><span data-dcnode-id="8706" instrument_node="">園字號</span></span><span data-dcnode-id="8704" instrument_node="">; </span><i data-dcnode-id="8701"><span data-dcnode-id="8702" lang="zh-Latn-pinyin"><span data-dcnode-id="8703" instrument_node="">yuán zìhào</span></span></i><span data-dcnode-id="8700" instrument_node="">; 'garden brand') did nearly all their business in hosting banquets onsite. Entertainment was not provided on a regular basis, but there were stages built onsite for </span><a class="mw-redirect" data-dcnode-id="8698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing_opera" title="Beijing opera"><span data-dcnode-id="8699" instrument_node="">Beijing opera</span></a><span data-dcnode-id="8697" instrument_node=""> performers. Instead of being hired by the establishments like in the previous three categories, performers at establishments of this category were usually contractors who paid the establishment to perform and split the earnings according to a certain percentage. Occasionally, establishments of this category would be called upon to help cater at customers' homes, but had to work with others, never taking the lead as establishments like the </span><i data-dcnode-id="8695"><span data-dcnode-id="8696" instrument_node="">ting</span></i><span data-dcnode-id="8694" instrument_node="">.
</span></p><span data-dcnode-id="8692" instrument_node="">
</span><h3 data-dcnode-id="8682"><span class="mw-headline" data-dcnode-id="8690" id="Lou"><span data-dcnode-id="8691" instrument_node="">Lou</span></span><span class="mw-editsection" data-dcnode-id="8683"><span class="mw-editsection-bracket" data-dcnode-id="8688"><span data-dcnode-id="8689" instrument_node="">[</span></span><a data-dcnode-id="8686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D7" title="Edit section: Lou"><span data-dcnode-id="8687" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8684"><span data-dcnode-id="8685" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8681" instrument_node="">
</span><p data-dcnode-id="8654"><i data-dcnode-id="8679"><span data-dcnode-id="8680" instrument_node="">Lou</span></i><span data-dcnode-id="8678" instrument_node=""> (</span><span data-dcnode-id="8676" lang="zh-Hans"><span data-dcnode-id="8677" instrument_node="">楼</span></span><span data-dcnode-id="8675" instrument_node="">; </span><span data-dcnode-id="8673" lang="zh-Hant"><span data-dcnode-id="8674" instrument_node="">樓</span></span><span data-dcnode-id="8672" instrument_node="">; </span><i data-dcnode-id="8669"><span data-dcnode-id="8670" lang="zh-Latn-pinyin"><span data-dcnode-id="8671" instrument_node="">lóu</span></span></i><span data-dcnode-id="8668" instrument_node="">; 'story, floor'), or </span><i data-dcnode-id="8666"><span data-dcnode-id="8667" instrument_node="">lou zihao</span></i><span data-dcnode-id="8665" instrument_node=""> (</span><span data-dcnode-id="8663" lang="zh-Hans"><span data-dcnode-id="8664" instrument_node="">楼字号</span></span><span data-dcnode-id="8662" instrument_node="">; </span><span data-dcnode-id="8660" lang="zh-Hant"><span data-dcnode-id="8661" instrument_node="">樓字號</span></span><span data-dcnode-id="8659" instrument_node="">; </span><i data-dcnode-id="8656"><span data-dcnode-id="8657" lang="zh-Latn-pinyin"><span data-dcnode-id="8658" instrument_node="">lóu zìhào</span></span></i><span data-dcnode-id="8655" instrument_node="">; 'story brand') did the bulk of their business hosting banquets onsite by appointment. In addition, a smaller portion of the business was in serving different customers onsite on a walk-in basis. Occasionally, when catering at customers' homes, establishments of this category would only provide the few specialty dishes they were famous for.
</span></p><span data-dcnode-id="8653" instrument_node="">
</span><h3 data-dcnode-id="8643"><span class="mw-headline" data-dcnode-id="8651" id="Ju"><span data-dcnode-id="8652" instrument_node="">Ju</span></span><span class="mw-editsection" data-dcnode-id="8644"><span class="mw-editsection-bracket" data-dcnode-id="8649"><span data-dcnode-id="8650" instrument_node="">[</span></span><a data-dcnode-id="8647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D8" title="Edit section: Ju"><span data-dcnode-id="8648" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8645"><span data-dcnode-id="8646" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8642" instrument_node="">
</span><p data-dcnode-id="8615"><i data-dcnode-id="8640"><span data-dcnode-id="8641" instrument_node="">Ju</span></i><span data-dcnode-id="8639" instrument_node=""> (</span><span data-dcnode-id="8637" lang="zh"><span data-dcnode-id="8638" instrument_node="">居</span></span><span data-dcnode-id="8636" instrument_node="">; </span><i data-dcnode-id="8633"><span data-dcnode-id="8634" lang="zh-Latn-pinyin"><span data-dcnode-id="8635" instrument_node="">jū</span></span></i><span data-dcnode-id="8632" instrument_node="">; 'residence'), or </span><i data-dcnode-id="8630"><span data-dcnode-id="8631" instrument_node="">ju zihao</span></i><span data-dcnode-id="8629" instrument_node=""> (</span><span data-dcnode-id="8627" lang="zh-Hans"><span data-dcnode-id="8628" instrument_node="">居字号</span></span><span data-dcnode-id="8626" instrument_node="">; </span><span data-dcnode-id="8624" lang="zh-Hant"><span data-dcnode-id="8625" instrument_node="">居字號</span></span><span data-dcnode-id="8623" instrument_node="">; </span><i data-dcnode-id="8620"><span data-dcnode-id="8621" lang="zh-Latn-pinyin"><span data-dcnode-id="8622" instrument_node="">jū zìhào</span></span></i><span data-dcnode-id="8619" instrument_node="">; 'residence brand') generally divided their business evenly into two areas: serving different customers onsite on a walk-in basis, and hosting banquets by appointment for customers who came as one group. Occasionally, when catering at the customers' homes, establishments of this category would only provide the few specialty dishes they were famous for, just like the </span><i data-dcnode-id="8617"><span data-dcnode-id="8618" instrument_node="">lou</span></i><span data-dcnode-id="8616" instrument_node="">. However, unlike those establishments, which always cooked their specialty dishes on location, establishment of this category would either cook on location or simply bring the already-cooked food to the location.
</span></p><span data-dcnode-id="8614" instrument_node="">
</span><h3 data-dcnode-id="8604"><span class="mw-headline" data-dcnode-id="8612" id="Zhai"><span data-dcnode-id="8613" instrument_node="">Zhai</span></span><span class="mw-editsection" data-dcnode-id="8605"><span class="mw-editsection-bracket" data-dcnode-id="8610"><span data-dcnode-id="8611" instrument_node="">[</span></span><a data-dcnode-id="8608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D9" title="Edit section: Zhai"><span data-dcnode-id="8609" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8606"><span data-dcnode-id="8607" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8603" instrument_node="">
</span><p data-dcnode-id="8573"><i data-dcnode-id="8601"><span data-dcnode-id="8602" instrument_node="">Zhai</span></i><span data-dcnode-id="8600" instrument_node=""> (</span><span data-dcnode-id="8598" lang="zh-Hans"><span data-dcnode-id="8599" instrument_node="">斋</span></span><span data-dcnode-id="8597" instrument_node="">; </span><span data-dcnode-id="8595" lang="zh-Hant"><span data-dcnode-id="8596" instrument_node="">齋</span></span><span data-dcnode-id="8594" instrument_node="">; </span><i data-dcnode-id="8591"><span data-dcnode-id="8592" lang="zh-Latn-pinyin"><span data-dcnode-id="8593" instrument_node="">zhāi</span></span></i><span data-dcnode-id="8590" instrument_node="">; 'study'), or </span><i data-dcnode-id="8588"><span data-dcnode-id="8589" instrument_node="">zhai zihao</span></i><span data-dcnode-id="8587" instrument_node=""> (</span><span data-dcnode-id="8585" lang="zh-Hans"><span data-dcnode-id="8586" instrument_node="">斋字号</span></span><span data-dcnode-id="8584" instrument_node="">; </span><span data-dcnode-id="8582" lang="zh-Hant"><span data-dcnode-id="8583" instrument_node="">齋字號</span></span><span data-dcnode-id="8581" instrument_node="">; </span><i data-dcnode-id="8578"><span data-dcnode-id="8579" lang="zh-Latn-pinyin"><span data-dcnode-id="8580" instrument_node="">zhāi zìhào</span></span></i><span data-dcnode-id="8577" instrument_node="">; 'study brand') were mainly in the business of serving different customers onsite on a walk-in basis, but a small portion of their income did come from hosting banquets by appointment for customers who came as one group. Similar to the </span><i data-dcnode-id="8575"><span data-dcnode-id="8576" instrument_node="">ju</span></i><span data-dcnode-id="8574" instrument_node="">, when catering at customers’ homes, establishments of this category would also only provide the few specialty dishes they are famous for, but they would mostly bring the already-cooked dishes to the location, and would only cook on location occasionally.
</span></p><span data-dcnode-id="8572" instrument_node="">
</span><h3 data-dcnode-id="8562"><span class="mw-headline" data-dcnode-id="8570" id="Fang"><span data-dcnode-id="8571" instrument_node="">Fang</span></span><span class="mw-editsection" data-dcnode-id="8563"><span class="mw-editsection-bracket" data-dcnode-id="8568"><span data-dcnode-id="8569" instrument_node="">[</span></span><a data-dcnode-id="8566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D10" title="Edit section: Fang"><span data-dcnode-id="8567" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8564"><span data-dcnode-id="8565" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8561" instrument_node="">
</span><p data-dcnode-id="8537"><i data-dcnode-id="8559"><span data-dcnode-id="8560" instrument_node="">Fang</span></i><span data-dcnode-id="8558" instrument_node=""> (</span><span data-dcnode-id="8556" lang="zh"><span data-dcnode-id="8557" instrument_node="">坊</span></span><span data-dcnode-id="8555" instrument_node="">; </span><i data-dcnode-id="8552"><span data-dcnode-id="8553" lang="zh-Latn-pinyin"><span data-dcnode-id="8554" instrument_node="">fǎng</span></span></i><span data-dcnode-id="8551" instrument_node="">; 'workshop'), or </span><i data-dcnode-id="8549"><span data-dcnode-id="8550" instrument_node="">fang zihao</span></i><span data-dcnode-id="8548" instrument_node=""> (</span><span data-dcnode-id="8546" lang="zh-Hans"><span data-dcnode-id="8547" instrument_node="">坊字号</span></span><span data-dcnode-id="8545" instrument_node="">; </span><span data-dcnode-id="8543" lang="zh-Hant"><span data-dcnode-id="8544" instrument_node="">坊字號</span></span><span data-dcnode-id="8542" instrument_node="">; </span><i data-dcnode-id="8539"><span data-dcnode-id="8540" lang="zh-Latn-pinyin"><span data-dcnode-id="8541" instrument_node="">fǎng zìhào</span></span></i><span data-dcnode-id="8538" instrument_node="">; 'workshop brand'). Foodservice establishments of this category generally did not offer the service of hosting banquets made by appointment for customers who came as one group, but instead, often only offered to serve different customers onsite on a walk-in basis. Establishments of this category or lower would not be called upon to perform catering at the customers' homes for special events.
</span></p><span data-dcnode-id="8536" instrument_node="">
</span><h3 data-dcnode-id="8526"><span class="mw-headline" data-dcnode-id="8534" id="Guan"><span data-dcnode-id="8535" instrument_node="">Guan</span></span><span class="mw-editsection" data-dcnode-id="8527"><span class="mw-editsection-bracket" data-dcnode-id="8532"><span data-dcnode-id="8533" instrument_node="">[</span></span><a data-dcnode-id="8530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D11" title="Edit section: Guan"><span data-dcnode-id="8531" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8528"><span data-dcnode-id="8529" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8525" instrument_node="">
</span><p data-dcnode-id="8498"><i data-dcnode-id="8523"><span data-dcnode-id="8524" instrument_node="">Guan</span></i><span data-dcnode-id="8522" instrument_node=""> (</span><span data-dcnode-id="8520" lang="zh-Hans"><span data-dcnode-id="8521" instrument_node="">馆</span></span><span data-dcnode-id="8519" instrument_node="">; </span><span data-dcnode-id="8517" lang="zh-Hant"><span data-dcnode-id="8518" instrument_node="">館</span></span><span data-dcnode-id="8516" instrument_node="">; </span><i data-dcnode-id="8513"><span data-dcnode-id="8514" lang="zh-Latn-pinyin"><span data-dcnode-id="8515" instrument_node="">guǎn</span></span></i><span data-dcnode-id="8512" instrument_node="">; 'restaurant'), or </span><i data-dcnode-id="8510"><span data-dcnode-id="8511" instrument_node="">guan zihao</span></i><span data-dcnode-id="8509" instrument_node=""> (</span><span data-dcnode-id="8507" lang="zh-Hans"><span data-dcnode-id="8508" instrument_node="">馆字号</span></span><span data-dcnode-id="8506" instrument_node="">; </span><span data-dcnode-id="8504" lang="zh-Hant"><span data-dcnode-id="8505" instrument_node="">館字號</span></span><span data-dcnode-id="8503" instrument_node="">; </span><i data-dcnode-id="8500"><span data-dcnode-id="8501" lang="zh-Latn-pinyin"><span data-dcnode-id="8502" instrument_node="">guǎn zìhào</span></span></i><span data-dcnode-id="8499" instrument_node="">; 'restaurant brand'). Foodservice establishments of this category mainly served different customers onsite on a walk-in basis, and in addition, a portion of the income would be earned from selling to-goes.
</span></p><span data-dcnode-id="8497" instrument_node="">
</span><h3 data-dcnode-id="8487"><span class="mw-headline" data-dcnode-id="8495" id="Dian"><span data-dcnode-id="8496" instrument_node="">Dian</span></span><span class="mw-editsection" data-dcnode-id="8488"><span class="mw-editsection-bracket" data-dcnode-id="8493"><span data-dcnode-id="8494" instrument_node="">[</span></span><a data-dcnode-id="8491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D12" title="Edit section: Dian"><span data-dcnode-id="8492" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8489"><span data-dcnode-id="8490" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8486" instrument_node="">
</span><p data-dcnode-id="8462"><i data-dcnode-id="8484"><span data-dcnode-id="8485" instrument_node="">Dian</span></i><span data-dcnode-id="8483" instrument_node=""> (</span><span data-dcnode-id="8481" lang="zh"><span data-dcnode-id="8482" instrument_node="">店</span></span><span data-dcnode-id="8480" instrument_node="">; </span><i data-dcnode-id="8477"><span data-dcnode-id="8478" lang="zh-Latn-pinyin"><span data-dcnode-id="8479" instrument_node="">diàn</span></span></i><span data-dcnode-id="8476" instrument_node="">; 'shop'), or </span><i data-dcnode-id="8474"><span data-dcnode-id="8475" instrument_node="">dian zihao</span></i><span data-dcnode-id="8473" instrument_node=""> (</span><span data-dcnode-id="8471" lang="zh-Hans"><span data-dcnode-id="8472" instrument_node="">店字号</span></span><span data-dcnode-id="8470" instrument_node="">; </span><span data-dcnode-id="8468" lang="zh-Hant"><span data-dcnode-id="8469" instrument_node="">店字號</span></span><span data-dcnode-id="8467" instrument_node="">; </span><i data-dcnode-id="8464"><span data-dcnode-id="8465" lang="zh-Latn-pinyin"><span data-dcnode-id="8466" instrument_node="">diàn zìhào</span></span></i><span data-dcnode-id="8463" instrument_node="">; 'shop brand'). Foodservice establishments of this category had their own place, like all previous categories, but serving different customers to dine onsite on a walk-in basis only provided half of the overall income, while the other half came from selling to-goes.
</span></p><span data-dcnode-id="8461" instrument_node="">
</span><h3 data-dcnode-id="8451"><span class="mw-headline" data-dcnode-id="8459" id="Pu"><span data-dcnode-id="8460" instrument_node="">Pu</span></span><span class="mw-editsection" data-dcnode-id="8452"><span class="mw-editsection-bracket" data-dcnode-id="8457"><span data-dcnode-id="8458" instrument_node="">[</span></span><a data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D13" title="Edit section: Pu"><span data-dcnode-id="8456" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8453"><span data-dcnode-id="8454" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8450" instrument_node="">
</span><p data-dcnode-id="8420"><i data-dcnode-id="8448"><span data-dcnode-id="8449" instrument_node="">Pu</span></i><span data-dcnode-id="8447" instrument_node=""> (</span><span data-dcnode-id="8445" lang="zh-Hans"><span data-dcnode-id="8446" instrument_node="">铺</span></span><span data-dcnode-id="8444" instrument_node="">; </span><span data-dcnode-id="8442" lang="zh-Hant"><span data-dcnode-id="8443" instrument_node="">鋪</span></span><span data-dcnode-id="8441" instrument_node="">; </span><i data-dcnode-id="8438"><span data-dcnode-id="8439" lang="zh-Latn-pinyin"><span data-dcnode-id="8440" instrument_node="">pù</span></span></i><span data-dcnode-id="8437" instrument_node="">; 'store'), or </span><i data-dcnode-id="8435"><span data-dcnode-id="8436" instrument_node="">pu zihao</span></i><span data-dcnode-id="8434" instrument_node=""> (</span><span data-dcnode-id="8432" lang="zh-Hans"><span data-dcnode-id="8433" instrument_node="">铺字号</span></span><span data-dcnode-id="8431" instrument_node="">; </span><span data-dcnode-id="8429" lang="zh-Hant"><span data-dcnode-id="8430" instrument_node="">鋪字號</span></span><span data-dcnode-id="8428" instrument_node="">; </span><i data-dcnode-id="8425"><span data-dcnode-id="8426" lang="zh-Latn-pinyin"><span data-dcnode-id="8427" instrument_node="">pù zìhào</span></span></i><span data-dcnode-id="8424" instrument_node="">; 'store brand'). Foodservice establishments of this category ranked next to the last, and they were often named after the owners' last names.  Establishments of this category had fixed spots of business for having their own places, but smaller than </span><i data-dcnode-id="8422"><span data-dcnode-id="8423" instrument_node="">dian</span></i><span data-dcnode-id="8421" instrument_node="">, and thus did not have tables, but only seats for customers. As a result, the bulk of the income of establishments of this category was from selling to-goes, while income earned from customers dining onsite only provided a small portion of the overall income.
</span></p><span data-dcnode-id="8419" instrument_node="">
</span><h3 data-dcnode-id="8409"><span class="mw-headline" data-dcnode-id="8417" id="Tan"><span data-dcnode-id="8418" instrument_node="">Tan</span></span><span class="mw-editsection" data-dcnode-id="8410"><span class="mw-editsection-bracket" data-dcnode-id="8415"><span data-dcnode-id="8416" instrument_node="">[</span></span><a data-dcnode-id="8413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBeijing_cuisine%26action%3Dedit%26section%3D14" title="Edit section: Tan"><span data-dcnode-id="8414" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8411"><span data-dcnode-id="8412" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8408" instrument_node="">
</span><p data-dcnode-id="8381"><i data-dcnode-id="8406"><span data-dcnode-id="8407" instrument_node="">Tan</span></i><span data-dcnode-id="8405" instrument_node=""> (</span><span data-dcnode-id="8403" lang="zh-Hans"><span data-dcnode-id="8404" instrument_node="">摊</span></span><span data-dcnode-id="8402" instrument_node="">; </span><span data-dcnode-id="8400" lang="zh-Hant"><span data-dcnode-id="8401" instrument_node="">攤</span></span><span data-dcnode-id="8399" instrument_node="">; </span><i data-dcnode-id="8396"><span data-dcnode-id="8397" lang="zh-Latn-pinyin"><span data-dcnode-id="8398" instrument_node="">tān</span></span></i><span data-dcnode-id="8395" instrument_node="">; 'stand'), or </span><i data-dcnode-id="8393"><span data-dcnode-id="8394" instrument_node="">tan zihao</span></i><span data-dcnode-id="8392" instrument_node=""> (</span><span data-dcnode-id="8390" lang="zh-Hans"><span data-dcnode-id="8391" instrument_node="">摊字号</span></span><span data-dcnode-id="8389" instrument_node="">; </span><span data-dcnode-id="8387" lang="zh-Hant"><span data-dcnode-id="8388" instrument_node="">攤字號</span></span><span data-dcnode-id="8386" instrument_node="">; </span><i data-dcnode-id="8383"><span data-dcnode-id="8384" lang="zh-Latn-pinyin"><span data-dcnode-id="8385" instrument_node="">tān zìhào</span></span></i><span data-dcnode-id="8382" instrument_node="">; 'stand brand'). The lowest ranking foodservice establishments without any tables, and selling to-goes was the only form of business. In addition to name the food stand after the owners' last name or the food sold, these food stands were also often named after the owners' nicknames.
</span></p><span data-dcnode-id="8380" instrument_node="">
