Beijing holds all the flavors of China. Each province’s traditional food can be found on tables of its long-operating family chain restaurants, inside hutong (narrow alley) holes-in-the-wall, and hawked by vocal street vendors. Practice your chopstick skills (or pack a fork), because you’re about to get a crash course in some of Beijing’s most beloved and flavorful plates.

Born in Nanjing and made famous in Beijing, this dish dates back to 1330 A.D., when chefs would serve it to Chinese emperors. In modern times, cooks slice the whole-roasted duck table side, finely separating the juicy, crispy sweet skin and tender roasted meat. Plates of small pancakes, spring onions, and cucumbers are served with it. Fill the pancakes with a little of everything on offer, place a dollop of hoisin sauce on top, roll it up, and then bite into the savory mixture. Head to </span><a data-component="link" data-dcnode-id="1642" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pages/Beijing-DaDong-Roast-Duck-Restaurant/187403494632473" rel="noopener" target="_blank"><span data-dcnode-id="1643" instrument_node="">Dadong Roast Duck Restaurant</span></a><span data-dcnode-id="1641" instrument_node=""> 北京大董烤鸭店 to have a chef carve one for you.

Jianbing, a giant eggy crepe, is both an art form and food. Made to order, street vendors pour batter over a giant circular griddle, then spread it in circle with a small wooden rake. The vendor cracks an egg and spreads it around, then throws spring onions, cilantro, and salt on top. Once partially cooked, the cook folds it in half, adds hot pepper and hoisin sauces, some pickles, and fried crackers, and then folds and cuts it once more. Finally, it gets shoved it into a bag for customers to eat on the go. Cheap and delicious, try it </span><a data-component="link" data-dcnode-id="1593" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dianping.com/shop/18997739" rel="noopener" target="_blank"><span data-dcnode-id="1594" instrument_node="">Dahua Jiangbing</span></a><span data-dcnode-id="1592" instrument_node=""> (大华煎饼) or find it on most streets in Beijing.
</span></p><span data-dcnode-id="1590" instrument_node="">

Curl up with Beijing-style hot pot in winter, a dish reminiscent of a village soup. Diners gather around a large boiling pot of broth, then throw uncooked ingredients into it, making an ever-changing soup. The pot is divided into two sections: salty broth and spicy broth. Mutton, garlic, vegetables, noodles, tofu, spices, pepper, and mushrooms get tossed into both sides, making a piping hot soup that diners can alter in flavor simply by adding more of their favorite ingredients.
</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p class="comp mntl-sc-block travel-sc-block-html mntl-sc-block-html" data-dcnode-id="1540" id="mntl-sc-block_2-0-9"><span data-dcnode-id="1544" instrument_node="">
Beijing-style hot pot is famous for its focus on the quality of the lamb and the brass or copper pots they use to cook it in, as opposed to one of the other 30 styles of hot pot in China. Try Beijing-style hot pot at </span><a data-component="link" data-dcnode-id="1542" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.feinfood.com/restaurant/China/Beijing/Dong%2520Lai%2520Shun%2520Beijing%2520Hot%2520pot%28%25E4%25B8%259C%25E6%259D%25A5%25E9%25A1%25BA%25E6%2596%25B0%25E4%25B8%259C%25E5%25AE%2589%25E9%25A5%25AD%25E5%25BA%2584%29.xhtml" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1543" instrument_node="">Dong Lai Shun Restaurant</span></a><span data-dcnode-id="1541" instrument_node=""> (东来顺火锅店).

Chewy hand-pulled noodles full of pork smothered in rich sweet bean paste are combined with julienne carrots, cucumbers, and spring onions in this Beijing staple. Though originally from Shandong, the noodles ended up in Beijing when the infamous Empress Dowager Cixi sampled them on her way back to Beijing via Xi’an, then decided to bring the chef with her. This dish can be found all over Beijing from street vendors to high-end restaurants. Chew your heart out on Zhajiangmian at </span><a data-component="link" data-dcnode-id="1486" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chinadaily.com.cn/english/bjweekend/2004-03/19/content_316249.htm" rel="noopener" target="_blank"><span data-dcnode-id="1487" instrument_node="">Lao Beijing Zha Jiang Mian Da Wang</span></a><span data-dcnode-id="1485" instrument_node=""> (老北京炸酱面大王).

</span><p class="comp mntl-sc-block travel-sc-block-html mntl-sc-block-html" data-dcnode-id="1445" id="mntl-sc-block_2-0-14"><span data-dcnode-id="1449" instrument_node="">
This one’s for the spice lovers. Food from Sichuan is characterized by garlic and insanely hot chilis and peppercorns, especially by la jiao (a numbing berry which stuns different parts of your tongue as you eat it). Although normally dried, the la jiao in the Sichuan-style beef at </span><a data-component="link" data-dcnode-id="1447" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pages/Siji-Minfu/216908668843409" rel="noopener" target="_blank"><span data-dcnode-id="1448" instrument_node="">Siji Minfu</span></a><span data-dcnode-id="1446" instrument_node=""> (四季民福烤鸭店) comes out fresh and green, still attached to the branch and packing even more heat than the dried version. The beef itself is tender to the point of perfection, and oh-so-juicy, but have tea or rice on hand in case of mouth fire.
</span></p><span data-dcnode-id="1444" instrument_node="">

These plump packets of meat and veggies taste good any way you cook them: boiled, fried, or steamed. Usually made with pork, leeks, and veggies, jiaozi (what the Western world calls "dumplings") come served with vinegar and sesame dipping sauce and are eaten in mass during Chinese New Year by locals. Other jiaozi fillings include shrimp, lamb, cabbage, eggs, crab, mushrooms, carrots, or garlic. For vegetarian options, going to a Buddhist restaurant will be a safe bet, or for more fanciful as well as traditional flavors, try </span><a data-component="link" data-dcnode-id="1398" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pages/Mr-Shis-Dumplings/337168083063832" rel="noopener" target="_blank"><span data-dcnode-id="1399" instrument_node="">Mr. Shi’s Dumplings.</span></a><span data-dcnode-id="1397" instrument_node="">

This Chongqing-style whole grilled fish comes out simmering with flavor—full of chilis, cilantro, green veggies, and mushrooms, the fish soaks in spices and natural juices in a small brazier place in the center of the table. Although the city isn't coastal, this Beijing river fish will not disappoint. Super fresh and with enough meat for large groups, it’s also the right option for those who like their spice as much as their seafood. Hop over to </span><a data-component="link" data-dcnode-id="1349" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/dir/39.91906%2C116.45058/%4039.919063%2C116.4483763%2C17z" rel="noopener" target="_blank"><span data-dcnode-id="1350" instrument_node="">La Shang Yin</span></a><span data-dcnode-id="1348" instrument_node=""> with five of your best friends to give it a try.

Where can you get fatty, grilled mutton roasted on a spit over your own personal table fire? The hutongs of course! An experience and a meal in one, diners cook then cut their own leg of lamb on small grills placed in the center of the table for this Xinjiang delicacy. Served with garlic, cumin dry spice, peanut dipping sauce, and vegetables, diners can make their own concoctions to dip the meat in and mix with its rich char-grilled flavor. Having trouble cutting it yourself? Just send it to the back for a little help from the kitchen at </span><a data-component="link" data-dcnode-id="1321" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Tanhua%2BBarbecue%2BGigot%2B%2528Gongmenkou%2BWest%2BIntersection%2529%2C%2BXicheng%2BQu%2C%2BBeijing%2BShi%2C%2BChina/%4039.9251238%2C116.3600673%2C17z/data%3D%213m1%214b1%214m5%213m4%211s0x35f0525b197411bb%3A0x41829087b45e8d85%218m2%213d39.9251238%214d116.362256" rel="noopener" target="_blank"><span data-dcnode-id="1322" instrument_node="">Tan Hua Kao Yang Tiu</span></a><span data-dcnode-id="1320" instrument_node=""> (No.6 Beixinqiao 3rd Hutong, Dongcheng District).

Locals love a big cup of coffee in winter or summer for breakfast. Made from fermented mug beans, this slightly sour beverage can be served hot or cold, it smells like eggs, and it's brimming with vitamin C and protein. You might need to hold your nose as you drink it, but Bejing locals swear by its health properties and happily gulp it down between dunks of fragrant jiaoquan (a type of Chinese donut) in it. Nibble on a few of the salty pickle slices that come on the side to really balance out the flavors. Make your way to </span><a data-component="link" data-dcnode-id="1282" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Fclient%3Dfirefox-b-d%26q%3DLao%2520Ciqikou%2520Restaurant%25E8%2580%2581%25E7%25A3%2581%25E5%2599%25A8%25E5%258F%25A3%25E8%25B1%2586%25E6%25B1%2581%25E5%25BA%2597%26sxsrf%3DACYBGNQIqtxDK4uIyQ2EywIjBfAynGolGg%3A1569245861596%26npsic%3D0%26rflfq%3D1%26rlha%3D0%26rllag%3D39876963%2C116422812%2C1642%26tbm%3Dlcl%26rldimm%3D14451323309684640969%26phdesc%3DM-SlubT8DBI%26ved%3D2ahUKEwjZ25SxiOfkAhXZGLkGHfRvDBYQvS4wAHoECAoQGA%26rldoc%3D1%26tbs%3Dlrf%3A%212m1%211e2%212m1%211e16%213sIAE%2Clf%3A1%2Clf_ui%3A9%23rlfi%3Dhd%3A%3Bsi%3A14451323309684640969%2Cy%2CM-SlubT8DBI%3Bmv%3A%255B%255B39.89349970000001%2C116.47457630000001%255D%2C%255B39.801526599999995%2C116.4072777%255D%255D%3Btbs%3Alrf%3A%212m1%211e2%212m1%211e16%213sIAE%2Clf%3A1%2Clf_ui%3A9" rel="noopener" target="_blank"><span data-dcnode-id="1283" instrument_node="">Laociqikou Restaurant</span></a><span data-dcnode-id="1281" instrument_node=""> 老磁器口豆汁店 at No.5 Commercial Building, Temple of Heaven North, Dongcheng District to give it a try.

Sweet food, street food, these candied hawthorns on a stick are an iconic Beijing treat. To create this sugary snack, cooks hollow out Chinese hawthorns and then stuff them with red bean paste. They skewer them on a bamboo stick, dip them in boiling sweet syrup, and let them cool until a hard shell forms. Pop them in your mouth and savor their sugary sour crunch. You can buy them anywhere in the city from street vendors, or if you come during Chinese New Year, purchase some at one of the </span><a data-component="link" data-dcnode-id="1233" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topchinatravel.com/beijing/famous-temple-fairs-in-beijing.htm" rel="noopener" target="_blank"><span data-dcnode-id="1234" instrument_node="">temple fairs</span></a><span data-dcnode-id="1232" instrument_node=""> in the city.
</span></p><span data-dcnode-id="1230" instrument_node="">
