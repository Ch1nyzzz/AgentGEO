</span><p align="justify" data-dcnode-id="1326"><span data-dcnode-id="1373" instrument_node="">
</span><span data-dcnode-id="1367"><b data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Location:</span></b><span data-dcnode-id="1370" instrument_node=""> City center, at the north of Tiananmen Square, Beijing Municipality. </span><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node="">
</span></span><span data-dcnode-id="1363"><b data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Opening time:</span></b><span data-dcnode-id="1364" instrument_node=""> </span></span><span data-dcnode-id="1359"><span data-dcnode-id="1362" instrument_node="">08:30 - 17:00 (Apr 1 - Oct 31, tickets not available after 16:00, last entry at 16:10)</span><br data-dcnode-id="1361"><span data-dcnode-id="1360" instrument_node="">
</span></span><span data-dcnode-id="1355"><span data-dcnode-id="1358" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 08:30 - 16:30 (Nov 1 - Mar 31, tickets not available after 15:30, last entry at 15:40)</span><br data-dcnode-id="1357"><span data-dcnode-id="1356" instrument_node="">
</span></span><span data-dcnode-id="1350"><strong data-dcnode-id="1351"><span data-dcnode-id="1354" instrument_node="">How to get to The Forbidden City:</span><br data-dcnode-id="1353"><span data-dcnode-id="1352" instrument_node="">
</span></strong></span><span data-dcnode-id="1344"><em data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">- Subway:</span></em><span data-dcnode-id="1347" instrument_node=""> Line 1 (Tiananmen Xi (West) or Tiananmen Dong (East) Stations); Line 2 (Qianmen Station)</span><br data-dcnode-id="1346"><span data-dcnode-id="1345" instrument_node="">
</span></span><span data-dcnode-id="1338"><em data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">- Bus:</span></em><span data-dcnode-id="1341" instrument_node=""> 1, 2, 5, 10, 20, 52, 120 and 802 (Tiananmen Xi (West) or Tiananmen Dong (East) Stations; 9, 17, 44, 48, 59, 66,&nbsp;803,&nbsp;808 (Qianmen, Qianmen Xi, or Qianmen Dong Stations); 101, 103, 109, 124, 202, 685 and 814 (Gugong (Forbidden City) Station)</span><br data-dcnode-id="1340"><span data-dcnode-id="1339" instrument_node="">
</span></span><span data-dcnode-id="1332"><b data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Best time for visit: </span></b><span data-dcnode-id="1335" instrument_node="">all year long, special interest in March-June and August-November periods, avoid weekends and national holidays for more quietness.</span><br data-dcnode-id="1334"><span data-dcnode-id="1333" instrument_node="">
</span></span><span data-dcnode-id="1328"><b data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Recommended time for a visit:</span></b><span data-dcnode-id="1329" instrument_node=""> 3-4 hours</span></span><span data-dcnode-id="1327" instrument_node="">
</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p align="justify" data-dcnode-id="1318"><span data-dcnode-id="1324" instrument_node="">
</span><b data-dcnode-id="1320"><span data-dcnode-id="1321"><br data-dcnode-id="1323"><span data-dcnode-id="1322" instrument_node="">
The Emperors' dwelling / Imperial Palace</span></span></b><span data-dcnode-id="1319" instrument_node="">
</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p align="justify" data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node="">
</span><span data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">As China's symbol world-wide like the Great Wall or the Temple of Heaven, the Forbidden City (called "Gu Gong", "故宫"in Chinese, literally meaning "Old Palace") is the most important masterpiece of Chinese history and culture. This real Imperial Palace Museum was for centuries the imperial place for 24 emperors starting from the Ming Dynasty (1368–1644). Believed as Sons of the Heaven, emperors and their families were the only ones allowed to enter the place as the complex had been created according to ancient Chinese astronomy establishing that emperors should live at the center of Heaven: the "Purple Star" (Polaris). Called the "Purple Forbidden City" in ancient times the site took naturally its name of the "Forbidden City" for ordinary people were not allowed to enter such a divine place. The Forbidden City is the perfect place where some millions of preserved historical relics have been collected, displayed in a site that has kept its original splendid architecture for the pleasure of millions of tourists visiting the old city every year.</span></span><span data-dcnode-id="1313" instrument_node="">
</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p align="justify" data-dcnode-id="1305"><span data-dcnode-id="1310" instrument_node="">
</span><b data-dcnode-id="1307"><span data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">History around the Forbidden City</span></span></b><span data-dcnode-id="1306" instrument_node="">
</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p align="justify" data-dcnode-id="1299"><span data-dcnode-id="1303" instrument_node="">
</span><span data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Together with its awe-inspiring architecture comes the impressive historical richness hiding behind the walls of the Forbidden City. During over 5 centuries, the Imperial Forbidden City has been home to 24 Emperors: 14 during the Ming Dynasty (1368–1644) and 10 during the Qing Dynasty (1644–1911). This was in 1406 that the construction of the "Emperor's Palace" started under the request of Emperor Yongle (Ming Dynasty). During 14 years, million of workers and thousands of artisans worked hard in the conception of such a building. The stone used in the construction were the one of the nearby Mount Fang (房山Fang Shan) that were carried pieces after pieces to the city. This is even said that some bricks were made from a combination of white lime and glutinous rice! </span></span><span data-dcnode-id="1300" instrument_node="">
</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p align="center" data-dcnode-id="1294"><span data-dcnode-id="1297" instrument_node="">
</span><img align="absMiddle" alt="A peaceful sight of one of the watch towers of the Forbidden City." border="4" data-dcnode-id="1296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712154425671.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="1295" instrument_node="">
</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p align="center" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">
	&nbsp;
</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p align="justify" data-dcnode-id="1285"><span data-dcnode-id="1289" instrument_node="">
</span><span data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">As incredible as it can be, these materials ended to be particularly strong for there are still standing today in the capital. Finished in 1420, the Forbidden City started to become the headquarter of China for the capital city of the country moved there from Nanjing. Wartimes, historical events and dynasties' shifts made hard damages to the holly city that was burnt down, rebuilt, sacked and renovated a countless of times. Thus, most of the architecture which can be admired today by tourists traces back to the 1700s onwards. Previously being a site where only emperors were authorized to reside with their imperial family and concubines, the fall of the last emperor of China in 1912 changed the destiny of the city that started to be opened to public and tourists. Recognized by the Chinese central government in 1961 for its important role in China's history, the Forbidden City became progressively a major tourist attraction. The nomination to UNESCO World Cultural Heritage Site in 1987 paid a large tribute to this ancient Chinese and human masterpiece that has succeeded in resisting Dynasties, wars, modern times and tourists' continuous visits.</span></span><span data-dcnode-id="1286" instrument_node="">
</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p align="justify" data-dcnode-id="1278"><span data-dcnode-id="1283" instrument_node="">
</span><b data-dcnode-id="1280"><span data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Features of the Forbidden City</span></span></b><span data-dcnode-id="1279" instrument_node="">
</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p align="justify" data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node="">
</span><span data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Representing the world's largest complex still preserved from human activity, the Forbidden City is a jewel of China's history and culture, representing the Emperor's supreme power given from the Heaven. Being the center of China for centuries, the Forbidden City's architecture was not left to chance as this was supposed to represent the city in the Heaven. The rectangular complex covers an area of 74 hectares (183 acres) and over 150,000&nbsp;square meters&nbsp;(1,600,000 square feet). It consists of 90 palaces and courtyards, 980 buildings and 8,704 rooms, visitors are able to visit most of the halls and rooms though some of them are kept secret. Every single aspect of the houses is a treasure and curiosity in itself so that it takes a long way to visit everything in a day.</span></span><span data-dcnode-id="1273" instrument_node="">
</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p align="center" data-dcnode-id="1267"><span data-dcnode-id="1270" instrument_node="">
</span><img align="absMiddle" alt="A glance at a gate of the Forbidden City" border="4" data-dcnode-id="1269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712153704640.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="1268" instrument_node="">
</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p align="justify" data-dcnode-id="1256"><span data-dcnode-id="1265" instrument_node="">
</span><span data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">As any ancient city in China or in the world, the Forbidden City is surrounded by a huge city wall: 10-meter-high, 52-meter-wide and representing a total circumference of 3, 430 meters. The 4 city gates located on each side of the city wall have all their function: the Gate of Divine Might (神武门Shen Wu Men, for daily exit and entry of the servants) on the north, the Meridian Gate (午门Wu Men, the main entrance as well as the exact place where emperors announced the new lunar calendar on the winter solstice and other important event. No one else but emperors could walk through it except empresses entering it on the day they married emperors, and the top three examinees of the annual final imperial exams walking out of it for one time) on the south, the Eastern Flowery Gate (东华门Dong Hua Men, ministers entered it to attend the daily morning levee) on the east, and the Western Flowery Gate (西华门Xi Hua Men, coffins of emperors were carted through this gate) on the west. The north and south </span></span><a data-dcnode-id="1262" name="OLE_LINK1"></a><span data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">gate</span></span><span data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">s are at a distance of 961 meters, while the west and east ones at 753 meters away. On top of that, the four corners of the City are composed of watchtowers which were guarded in the past by imperial soldiers and officers to assure security to His Majesty.</span></span><span data-dcnode-id="1257" instrument_node="">
</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p align="justify" data-dcnode-id="1250"><span data-dcnode-id="1254" instrument_node="">
</span><span data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Different than any other building of China, the Forbidden City is inspiring respect and marvel to its visitors who have the opportunity to feel the impressive historical events that occurred there hundreds of years ago. Some particularities of the City are the typical yellow roofs that symbolizes in China the Royal Family hence its predominance all over the site except for one building that displays a black colored roof. Called Pavilion of Literary Profundity (文渊阁Wen Yuan Ge), the building is in fact the Royal Library: the black color in ancient Chinese symbolism was supposed to represent water, thus extinguishing any possible fire in the building. By visiting the Forbidden City, no one can deny the considerable skills that artisans and workers had already during ancient times in building outstanding and large-scale places. Indeed, as grandiose as it stands, the Forbidden City is today listed as one of the five most important palaces in the world (together with the Palace of Versailles of France, Buckingham Palace of UK, the White House of USA and the Kremlin of Russia). </span></span><span data-dcnode-id="1251" instrument_node="">
</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p align="justify" data-dcnode-id="1243"><span data-dcnode-id="1248" instrument_node="">
</span><b data-dcnode-id="1245"><span data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">The Forbidden City in depth</span></span></b><span data-dcnode-id="1244" instrument_node="">
</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p align="center" data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">
</span><a data-dcnode-id="1239" href="file:///p://192.168.0.2/en/images/fileUpload/110712154608484.jpg"><img align="absMiddle" alt="A aeroview of the Forbidden City, Beijing" border="4" data-dcnode-id="1240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712154608484.jpg&amp;raw" style="width:500px;height:350px;"></a><span data-dcnode-id="1238" instrument_node="">
</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p align="justify" data-dcnode-id="1231"><span data-dcnode-id="1235" instrument_node="">
</span><span data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">In order to understand the general disposition of the mighty Beijing Forbidden City, this section is going to describe the site in depth for preparing your visit. You could also consult our different Forbidden City Maps for more information!</span></span><span data-dcnode-id="1232" instrument_node="">
</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p align="justify" data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">
</span><span data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">The Forbidden City is divided into 2 different parts: the southern section (or Outer Court) and the northern section (or Inner court).</span></span><span data-dcnode-id="1226" instrument_node="">
</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p align="justify" data-dcnode-id="1217"><span data-dcnode-id="1223" instrument_node="">
</span><span data-dcnode-id="1219"><b data-dcnode-id="1220"><i data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The Outer Court</span></i></b></span><span data-dcnode-id="1218" instrument_node="">
</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p align="justify" data-dcnode-id="1211"><span data-dcnode-id="1215" instrument_node="">
</span><span data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">The Outer Court is the southern section of the Forbidden City. This section is where the Emperor exercised his power over the nation by attending ceremonies and conducting state affairs. The Outer Court is composed of 3 main buildings:</span></span><span data-dcnode-id="1212" instrument_node="">
</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p align="justify" data-dcnode-id="1197"><span data-dcnode-id="1209" instrument_node="">
</span><span data-dcnode-id="1205"><span data-dcnode-id="1208" instrument_node="">- The Hall of Supreme Harmony (太和殿Tai He Dian)</span><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">
</span></span><span data-dcnode-id="1201"><span data-dcnode-id="1204" instrument_node="">- The Hall of Central Harmony (中和殿Zhong He Dian)</span><br data-dcnode-id="1203"><span data-dcnode-id="1202" instrument_node="">
</span></span><span data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">- The Hall of Preserving Harmony (保和殿Bao Be Dian)</span></span><span data-dcnode-id="1198" instrument_node="">
</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p align="center" data-dcnode-id="1192"><span data-dcnode-id="1195" instrument_node="">
</span><img align="absMiddle" alt="The Hall of Supreme Harmony is the most important and largest one among the three main buildings of the Outer Court of Forbidden City, Beijing." border="4" data-dcnode-id="1194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712154333859.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="1193" instrument_node="">
</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p align="justify" data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">
</span><span data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">A couple of side gardens doted with interesting halls are also there for the pleasure of visitors.</span></span><span data-dcnode-id="1187" instrument_node="">
</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p align="justify" data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">
</span><span data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Out of the 3 buildings, the Hall of Supreme Harmony is the most important and largest one where stands what visitors are most enthusiast into seeing:&nbsp; the Emperor Dragon Throne (龙椅Long Yi). The Hall of Central Harmony located behind is the usual resting and rehearsing place of emperors prior to presiding over grand events. Events were indeed usually held in that hall. Finally, the Hall of the Preserving Harmony was the building used for holding banquets and imperial examinations. Standing straight out of that building, the Gate of Heavenly Peace (乾清门Qian Qing Men) is welcoming visitors as it is the main gateway to the Inner Court of the Forbidden City.</span></span><span data-dcnode-id="1181" instrument_node="">
</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p align="justify" data-dcnode-id="1172"><span data-dcnode-id="1178" instrument_node="">
</span><span data-dcnode-id="1174"><b data-dcnode-id="1175"><i data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">The Inner Court</span></i></b></span><span data-dcnode-id="1173" instrument_node="">
</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p align="justify" data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">
</span><span data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">The Inner Court is the northern section of the Forbidden City. This Court was where the Emperor and his Royal Family and concubines lived, His Majesty handled everyday affairs and the country's future. That section is composed of 3 main structures:</span></span><span data-dcnode-id="1167" instrument_node="">
</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p align="justify" data-dcnode-id="1152"><span data-dcnode-id="1164" instrument_node="">
</span><span data-dcnode-id="1160"><span data-dcnode-id="1163" instrument_node="">- The Palace of Heavenly Purity (乾清宫Qian Qing Gong)</span><br data-dcnode-id="1162"><span data-dcnode-id="1161" instrument_node="">
</span></span><span data-dcnode-id="1156"><span data-dcnode-id="1159" instrument_node="">- The Palace of Union and Peace (交泰殿Jiao Tai Dian)</span><br data-dcnode-id="1158"><span data-dcnode-id="1157" instrument_node="">
</span></span><span data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">- The Palace of Terrestrial Tranquility (坤宁宫Kun Ning Gong)</span></span><span data-dcnode-id="1153" instrument_node="">
</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p align="justify" data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">
</span><span data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Beside them, 12 more palaces stand: 6 on the eastern side, 6 on the western side. These were the residences of the emperors' concubines converted today into exhibition halls.</span></span><span data-dcnode-id="1147" instrument_node="">
</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p align="center" data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node="">
</span><span data-dcnode-id="1142"><img align="absMiddle" alt="The bridal room of emperors and emperesses inside the Palace of Terrestrial Tranquility." border="4" data-dcnode-id="1143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712161754875.jpg&amp;raw" style="width:500px;height:350px;"></span><span data-dcnode-id="1141" instrument_node="">
</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p align="justify" data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">
</span><span data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">The Palace of Heavenly Purity is the first structure encountered. As emperors' bedchambers, the palace is mainly filled with common but luxurious house cupboards and relics of the royal family. The Palace of Union and Peace is where all the imperial seals were stored. Finally, the Palace of Terrestrial Tranquility is the ancient emperor's wedding room.</span></span><span data-dcnode-id="1135" instrument_node="">
</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p align="justify" data-dcnode-id="1128"><span data-dcnode-id="1132" instrument_node="">
</span><span data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Visitors continuing the visit a little bit further north will discover the Imperial Garden, offering a great and relaxing aesthetic twist after the visit of old rocks.</span></span><span data-dcnode-id="1129" instrument_node="">
</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p align="justify" data-dcnode-id="1120"><span data-dcnode-id="1126" instrument_node="">
</span><span data-dcnode-id="1122"><b data-dcnode-id="1123"><em data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Exit</span></em></b></span><span data-dcnode-id="1121" instrument_node="">
</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p align="justify" data-dcnode-id="1109"><span data-dcnode-id="1118" instrument_node="">
</span><span data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">By finishing the visit in the Inner Court, visitors can conveniently exit the site of the Forbidden City by </span></span><a data-dcnode-id="1115" name="OLE_LINK2"></a><span data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">the Gate of Divine Might</span></span><span data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node=""> (神武门Shen Wu Men), located straight behind the Imperial Garden.</span></span><span data-dcnode-id="1110" instrument_node="">
</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p align="justify" data-dcnode-id="1100"><span data-dcnode-id="1107" instrument_node="">
</span><span data-dcnode-id="1102"><b data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Forbidden City</span></b><b data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node=""> travel tips</span></b></span><span data-dcnode-id="1101" instrument_node="">
</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p align="justify" data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node="">
</span><span data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">To make your visit of the Forbidden City more convenient, here are some travel tips dedicated to the site.</span></span><span data-dcnode-id="1095" instrument_node="">
</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p align="justify" data-dcnode-id="1048"><span data-dcnode-id="1092" instrument_node="">
</span><span data-dcnode-id="1085"><span data-dcnode-id="1091" instrument_node="">- </span><b data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Tourist Service Center: </span></b><span data-dcnode-id="1088" instrument_node="">Located at the Arrow Pavilion (箭亭Jian Ting)</span><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">
- </span></span><span data-dcnode-id="1079"><b data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Audio Guide: </span></b><span data-dcnode-id="1082" instrument_node="">to rent from the Tour Guide Service at the Meridian Gate (午门Wu Men) or at the Gate of Divine Might (神武门Shen Wu Men) for 40 RMB (10 RMB for Chinese mandarin and Cantonese languages), deposit: 100 RMB.</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
- </span></span><span data-dcnode-id="1073"><b data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Languages available:</span></b><span data-dcnode-id="1076" instrument_node=""> English, French, German, Portuguese, Spanish, Italian, Arabic, Russian, Japanese, Korean, Thai, Chinese and Cantonese. </span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
- </span></span><span data-dcnode-id="1067"><b data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Bag Check Service: </span></b><span data-dcnode-id="1070" instrument_node="">a deposit is available (free of charge) at the Meridian Gate (Wu Men) and at the Gate of Divine Might (Shen Wu Men) (08:30-18:00). A service of carrying bags from one gate to another is also available.</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
- </span></span><span data-dcnode-id="1061"><b data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Wheelchairs &amp; Strollers:</span></b><span data-dcnode-id="1064" instrument_node=""> at the Tour Guide Service, Meridian Gate (Wu Men) and Gate of Divine Might (Shen Wu Men), free of charge.</span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
-</span></span><span data-dcnode-id="1050"><span data-dcnode-id="1060" instrument_node="">&nbsp;</span><b data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Special Notes: </span></b><span data-dcnode-id="1057" instrument_node="">during high seasons (May Day, National Day Holiday (October 1</span><sup data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">st</span></sup><span data-dcnode-id="1054" instrument_node=""> -7</span><sup data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">th</span></sup><span data-dcnode-id="1051" instrument_node="">) and summer holiday) a limited number of 80,000 visitors/day is allowed (half and half groups and individual visitors).</span></span><span data-dcnode-id="1049" instrument_node="">
</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p align="justify" data-dcnode-id="1041"><span data-dcnode-id="1046" instrument_node="">
</span><b data-dcnode-id="1043"><span data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">What to see in the Forbidden City today?</span></span></b><span data-dcnode-id="1042" instrument_node="">
</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p align="justify" data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node="">
</span><span data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Generally speaking, everything has to be seen in the Forbidden City! The site is indeed in itself a curiosity so every traveler will find its own way in visiting the site. However, it is recommended to do a 3-4 hours visit due to the really large-scale size of this Old City. By visiting the site, visitors usually start by visiting Tiananmen Square and entering the city through every single tour passing to Beijing is including the visit to the Forbidden City, so there is no threat to miss this outstanding China attraction standing on the first positions of the top ten China attractions list.</span></span><span data-dcnode-id="1036" instrument_node="">
</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p align="justify" data-dcnode-id="1029"><span data-dcnode-id="1033" instrument_node="">
</span><span data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Inside the city, some permanent exhibitions that may arouse your curiosity are held in different halls and palaces: an interesting way to learn more about Chinese Culture.</span></span><span data-dcnode-id="1030" instrument_node="">
</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p align="justify" data-dcnode-id="1022"><span data-dcnode-id="1027" instrument_node="">
</span><span data-dcnode-id="1024"><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Chinese Crafts</span></b></span><span data-dcnode-id="1023" instrument_node="">
</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p align="center" data-dcnode-id="1017"><span data-dcnode-id="1020" instrument_node="">
</span><img align="absMiddle" alt="A precious handicraft carved from red coral is collected in the Forbidden City." border="4" data-dcnode-id="1019" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712154040484.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="1018" instrument_node="">
</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p align="justify" data-dcnode-id="999"><span data-dcnode-id="1015" instrument_node="">
</span><span data-dcnode-id="1011"><span data-dcnode-id="1014" instrument_node="">- Ceramics Gallery: in the Pavilion of Literary Profundity (文渊阁Wen Yuan Ge)</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
</span></span><span data-dcnode-id="1007"><span data-dcnode-id="1010" instrument_node="">- Gold and Silver Wares Gallery: in the Palace of Great Brilliance in the Six Eastern Palaces</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
</span></span><span data-dcnode-id="1003"><span data-dcnode-id="1006" instrument_node="">- Bronze Ware Gallery: in the corridor rooms around the Palace of Heavenly Purity (乾清宫Qian Qing Gong)</span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">
</span></span><span data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">- Jade Gallery: in the Palace of Gathering Essence (钟粹宫Zhong Cui Gong) in the Six Eastern Palaces (东六宫Dong Liu Gong)</span></span><span data-dcnode-id="1000" instrument_node="">
</span></p><span data-dcnode-id="998" instrument_node="">
</span><p align="justify" data-dcnode-id="992"><span data-dcnode-id="997" instrument_node="">
</span><span data-dcnode-id="994"><b data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Chinese Art</span></b></span><span data-dcnode-id="993" instrument_node="">
</span></p><span data-dcnode-id="991" instrument_node="">
</span><p align="justify" data-dcnode-id="986"><span data-dcnode-id="990" instrument_node="">
</span><span data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">- Chinese Painting and Calligraphy Gallery: in the Hall of Martial Valor</span></span><span data-dcnode-id="987" instrument_node="">
</span></p><span data-dcnode-id="985" instrument_node="">
</span><p align="justify" data-dcnode-id="979"><span data-dcnode-id="984" instrument_node="">
</span><span data-dcnode-id="981"><b data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Imperial Relics</span></b></span><span data-dcnode-id="980" instrument_node="">
</span></p><span data-dcnode-id="978" instrument_node="">
</span><p align="center" data-dcnode-id="974"><span data-dcnode-id="977" instrument_node="">
</span><img align="absMiddle" alt="Such exquisite gold jewel case decorated with priceless diamonds was the favorite of the imperial famale." border="4" data-dcnode-id="976" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712154051656.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="975" instrument_node="">
</span></p><span data-dcnode-id="973" instrument_node="">
</span><p align="justify" data-dcnode-id="960"><span data-dcnode-id="972" instrument_node="">
</span><span data-dcnode-id="968"><span data-dcnode-id="971" instrument_node="">- Treasure Gallery: in the Palace of Tranquil Longevity area</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">
- </span></span><span data-dcnode-id="964"><span data-dcnode-id="967" instrument_node="">Timepieces Gallery: in the Hall for Ancestry Worship</span><br data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">
- </span></span><span data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Qing Imperial Opera Gallery: in the Pavilion of Pleasant Sounds and Hall for Viewing Opera</span></span><span data-dcnode-id="961" instrument_node="">
</span></p><span data-dcnode-id="959" instrument_node="">
</span><p align="justify" data-dcnode-id="953"><span data-dcnode-id="958" instrument_node="">
</span><b data-dcnode-id="955"><span data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The Meridian Gate </span></span></b><span data-dcnode-id="954" instrument_node="">
</span></p><span data-dcnode-id="952" instrument_node="">
</span><p align="center" data-dcnode-id="948"><span data-dcnode-id="951" instrument_node="">
</span><img align="absMiddle" alt="The Meridian Gate (Wu Men) is the main entrance of the Forbidden City." border="4" data-dcnode-id="950" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712153721031.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="949" instrument_node="">
</span></p><span data-dcnode-id="947" instrument_node="">
</span><p align="justify" data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">
</span><span data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Called "Wu Men (午门)" in Chinese, the Meridian Gate is the southern entrance of the Forbidden City and the largest and most imposing of the entrances of the site. Greatest of the gates, it is also the highest building of this Imperial Old City of China. In Ancient times, everyone entering the Forbidden City had to observe strict rules concerning its use as it was the place where emperors issued the almanac of next year and other important events. When a general returned from a battle, his captives would be "offered" to the emperor in a ceremony here, which was known as a victorious ceremony of "Accepting War Captives". Before this ceremony the emperor would pay sacrifice to altars such as the Altar of Earth and Grain (in today's Zhongshan Park) and the Altar of Imperial Ancestry (today's Cultural Palace of the Working People), which are close to the Meridian Gate.</span></span><span data-dcnode-id="943" instrument_node="">
</span></p><span data-dcnode-id="941" instrument_node="">
</span><p align="justify" data-dcnode-id="935"><span data-dcnode-id="940" instrument_node="">
</span><b data-dcnode-id="937"><span data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">The Gate of Supreme Harmony</span></span></b><span data-dcnode-id="936" instrument_node="">
</span></p><span data-dcnode-id="934" instrument_node="">
</span><p align="center" data-dcnode-id="930"><span data-dcnode-id="933" instrument_node="">
</span><img align="absMiddle" alt="Lions have been being seen as the most august entrance guards in China." border="4" data-dcnode-id="932" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712154454765.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="931" instrument_node="">
</span></p><span data-dcnode-id="929" instrument_node="">
</span><p align="justify" data-dcnode-id="924"><span data-dcnode-id="928" instrument_node="">
</span><span data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">The Gate of Supreme Harmony (太和门Tai He men) is the main entrance to the grand Outer Court of the Forbidden City. Located north of the square, it is the main gate of the Outer Court guarded by two bronze lions symbolizing the imperial power. Particularity that can be applied to lions "guarding" Chinese gates in general all over China, there is a precise way to position the 2 animals. Indeed, the lion on the east side should be the male with its right front paw over a globe symbol of the imperial power extended world-wide. The lion on the west side should be a female with its left front paw on a lion club, denoting a thriving and prosperous imperial family. So, when seeing 2 lions at the entrance of a gate or temple, one should be aware that the place is normally one dedicated to one emperor, symbolizing the Supreme Harmony of its reign. This particular gate played an important role in the development of emperors' life as it was there that emperors' wedding ceremonies were usually held.</span></span><span data-dcnode-id="925" instrument_node="">
</span></p><span data-dcnode-id="923" instrument_node="">
</span><p align="justify" data-dcnode-id="917"><span data-dcnode-id="922" instrument_node="">
</span><b data-dcnode-id="919"><span data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">The Hall of Supreme Harmony</span></span></b><span data-dcnode-id="918" instrument_node="">
</span></p><span data-dcnode-id="916" instrument_node="">
</span><p align="justify" data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">
</span><span data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The Hall of Supreme Harmony (太和殿Tai He Dian), also called "The Hall of the Golden Throne" is actually the grandest hall of the Forbidden City and the largest wooden structure in China. Originally constructed in 1402 during the Ming Dynasty (1368-1644), the building was burnt down in later years. After some reconstruction and back to life, the Hall of Supreme Harmony that visitors have the chance to admire today is tracing back to 1695, time at which the reconstruction finished according to the plan of Emperor Kangxi, a sagacious emperor in the Qing Dynasty (1644-1911). During the dynasties that governed China, the hall was used to hold ceremonies on grand occasions, such as: the Emperor's enthronement, birthday and wedding day, the dispatch of generals to battles, the winter solstice and the Spring Festival.</span></span><span data-dcnode-id="912" instrument_node="">
</span></p><span data-dcnode-id="910" instrument_node="">
</span><p align="justify" data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">
</span><span data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Since ancient times, the Hall was a symbol of the imperial power as it figured as the highest structure in the empire during the Ming (1368-1644) and Qing (1644-1911) dynasties. In order to keep that supremacy, no other buildings in the whole country were permitted to be higher. Of a 37.44 meters high, 63.96 meters in width and 37.2 meters in length the hall looks really impressive in the middle of the Old City. There are a total of 72 pillars, in 6 rows supporting the roof. Doors and windows are embossed with clouds and dragons, typical drawings of ancient China and the Emperor. The Hall of Supreme Harmony, as representing the Imperial Supremacy is a very luxurious building with for example its floor paved with fake golden bricks really precious to Chinese Culture.</span></span><span data-dcnode-id="906" instrument_node="">
</span></p><span data-dcnode-id="904" instrument_node="">
</span><p align="center" data-dcnode-id="900"><span data-dcnode-id="903" instrument_node="">
</span><img align="absMiddle" alt="The resplendent and magnificent Emperor Dragon Throne inside the Hall of Heavenly Purity, with &quot;&quot;Justice and Brightness&quot; in Chinese written on a plaque hanging above." border="4" data-dcnode-id="902" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712153956015.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="901" instrument_node="">
</span></p><span data-dcnode-id="899" instrument_node="">
</span><p align="justify" data-dcnode-id="894"><span data-dcnode-id="898" instrument_node="">
</span><span data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">In Chinese culture, an emperor is the incarnation of the dragon. As a consequence, the hall is dominated by dragon designs on the throne, columns, windows and ceilings. In ancient times, only emperors were allowed to have clothes, drawings and other things with a dragon. The common people would get into trouble if found in possession of such representation of the mystic animal. The golden throne sits on a platform in the north of the hall, with an elegant wall screen behind and three gilded columns on each side. In front of the throne, there are mythical beasts, cranes, and incense burners, which have their own symbolic meaning. The extraordinary ceiling above the throne changes in shape and has a dragon with a pearl in his mouth. The pearl is said to be able to distinguish whether the emperor is the legitimate inheritor or not. It would fall off the ceiling if an illegitimate successor ascended the throne.</span></span><span data-dcnode-id="895" instrument_node="">
</span></p><span data-dcnode-id="893" instrument_node="">
</span><p align="justify" data-dcnode-id="887"><span data-dcnode-id="892" instrument_node="">
</span><b data-dcnode-id="889"><span data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The Hall of Central Harmony</span></span></b><span data-dcnode-id="888" instrument_node="">
</span></p><span data-dcnode-id="886" instrument_node="">
</span><p align="justify" data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">
</span><span data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">The Hall of Central Harmony (中和殿Zhong He Dian) is the smallest hall among the three main halls in the Outer Court. This pavilion-style hall used to be the place for emperors to do preparations for ceremonies. Covering a total area of 580 square meters, the hall is a square structure built like a pavilion, each side of which is five bays long, measuring 24.15m. The hall has a single-eaved roof with a gilded pinnacle gleaming brightly in the sunshine.</span></span><span data-dcnode-id="882" instrument_node="">
</span></p><span data-dcnode-id="880" instrument_node="">
</span><p align="justify" data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">
</span><span data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Built in 1420, during the eighteenth years of Emperor Yongle reign (1403-1424), the hall was first named "Hua Hai Dian" at the beginning of the Ming Dynasty (1368-1644). In the reign of Emperor Jiajing (1522-1566), the hall was burnt down and was then renamed "Zhong Ji Dian" after reconstruction. The ancient ink marks of the three Chinese characters (中极殿Zhong Ji Dian) written on the building can still be seen. The Qing imperial household came to live in the Forbidden City in the first year of the reign of Emperor Shunzhi (1644-1661), and called the hall "Zhong He Dian" instead of "Zhong Ji Dian". The two Chinese characters "zhong" and "he", imply that each party can be satisfied only if they are treated without any bias, promoting "the golden mean" of Confucius. Having undergone three fires, the present hall takes on the look of what it was after reconstruction in 1627, seventh year of Emperor Tianqi (1621-1627) of the Ming Dynasty (1368-1644).</span></span><span data-dcnode-id="876" instrument_node="">
</span></p><span data-dcnode-id="874" instrument_node="">
</span><p align="justify" data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">
</span><span data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Inside the Hall stands a throne with 2 golden beasts on each side. The mythical beasts are named "Luduan (甪端)" with four legs and only one horn, said to be able to run 9000 km/day, speak many different languages and foretell the future. Placed beside the throne, the beasts were there to indicate emperors' brilliance and providence.</span></span><span data-dcnode-id="870" instrument_node="">
</span></p><span data-dcnode-id="868" instrument_node="">
</span><p align="justify" data-dcnode-id="862"><span data-dcnode-id="867" instrument_node="">
</span><b data-dcnode-id="864"><span data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">The Hall of Preserving Harmony</span></span></b><span data-dcnode-id="863" instrument_node="">
</span></p><span data-dcnode-id="861" instrument_node="">
</span><p align="justify" data-dcnode-id="856"><span data-dcnode-id="860" instrument_node="">
</span><span data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The Hall of Preserving Harmony (保和殿Bao He Dian) is the last main hall in the Outer Court. This rectangular wooden hall has multiple eaves, with ten different animal statues at each corner. It stands at the northern end of the three-tier marble terrace. Similar in style but somewhat smaller than the Hall of Supreme Harmony it is larger than the Hall of Central Harmony.</span></span><span data-dcnode-id="857" instrument_node="">
</span></p><span data-dcnode-id="855" instrument_node="">
</span><p align="justify" data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">
</span><span data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">The hall was built in 1420, rebuilt in 1625 and renovated in 1765. The emperors of Ming dynasty would usually change into their ritual garments here prior to the ceremonial installation of an empress or crown prince. During the Qing Dynasty (1644-1911), feasts were given to nobles and ministers on special occasions, such as the Spring Festival (lunar January 1st), the Lantern Festival (lunar January 15) and princesses' wedding days. The candidates who had won a series of preliminary contests took the Final Imperial Examination at the hall. The Final Imperial Examination took place every three years and the topic for an essay was assigned by the emperor himself.</span></span><span data-dcnode-id="851" instrument_node="">
</span></p><span data-dcnode-id="849" instrument_node="">
</span><p align="justify" data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">
</span><span data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">You may notice a number of large marble blocks or rocks on the road. The most impressive one is the huge marble ramp behind the Hall of Preserving Harmony, which was carved with cloud and dragons design. 16 meters long, 3 meters in width and 1.7 meters in thickness, and weighs about 200 tons the hall is still very imposing. This huge rock was quarried from Fangshan District, around 70 km southwest of Beijing. On the ramp, the nine dragons fly behind the floating clouds representing the unity of the great empire and emperors' divine power granted by the Heaven.</span></span><span data-dcnode-id="845" instrument_node="">
</span></p><span data-dcnode-id="843" instrument_node="">
</span><p align="justify" data-dcnode-id="837"><span data-dcnode-id="842" instrument_node="">
</span><b data-dcnode-id="839"><span data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">The Gate of Heavenly Purity</span></span></b><span data-dcnode-id="838" instrument_node="">
</span></p><span data-dcnode-id="836" instrument_node="">
</span><p align="justify" data-dcnode-id="831"><span data-dcnode-id="835" instrument_node="">
</span><span data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The Gate of Heavenly Purity (乾清门Qian Qing Men) is the building that separates the Forbidden City into two parts: the Outer Court and the Inner Court. That is actually behind this gate that locates is the residential area of emperors. In front of the gate stands a pair of golden lions, a little smaller than those guarding the Gate of Supreme Harmony but having the same symbolical meaning of Supreme Harmony of one Emperor's reign. Frightening devils away for their fierce look, the lion are to Chinese people the perfect gate-guarders ever. Beside the lions, ten huge golden vats are laid. Not only garnitures but also hold water in case of fire, the vats weigh over 2,000 kilograms and can hold more than 2,000 kilograms (4,409 pounds) of water! Although decorative, their prime function was to hold vast amount of water to fight the outbreak of fire. A total of 308 vats spread around the Forbidden City, 22 of which are of the same design as those seen by this gate.</span></span><span data-dcnode-id="832" instrument_node="">
</span></p><span data-dcnode-id="830" instrument_node="">
</span><p align="center" data-dcnode-id="826"><span data-dcnode-id="829" instrument_node="">
</span><img align="absMiddle" alt="The huge copper vat was not only functioned as water container but also a decoration in front of the palace." border="4" data-dcnode-id="828" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712155226515.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="827" instrument_node="">
</span></p><span data-dcnode-id="825" instrument_node="">
</span><p align="justify" data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">
</span><span data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The gate was established in 1420 and rebuilt in 1655 after series of fires. 5-bay-wide, 3-bay-deep and 16-meter-high, the Gate of Heavenly Purity is a structure with single-eaved roof, resting on the 1.5-meter-high white marble base of Buddhist-style building surrounded by carved stone balustrades. By continuing the visit outside the gate, visitors will discover the four huge gleaming, gilded bronze vats. </span></span><span data-dcnode-id="821" instrument_node="">
</span></p><span data-dcnode-id="819" instrument_node="">
</span><p align="justify" data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">
</span><span data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Emperor Kangxi, the second successor of the Qing Dynasty (1644-1911), was the emperor who started to hold court at this gate instead of the Gate of Supreme Harmony that was used by its predecessors. There, ministers used to gather at dawn to report the state affairs and listen to emperors' decision. In the east stands the Upper Study Building, the place where princes studied in the Qing Dynasty. In the west, the smaller houses were the offices of the General Command Centre (军机处Jun Ji Chu), initially a military institution.</span></span><span data-dcnode-id="815" instrument_node="">
</span></p><span data-dcnode-id="813" instrument_node="">
</span><p align="justify" data-dcnode-id="807"><span data-dcnode-id="812" instrument_node="">
</span><b data-dcnode-id="809"><span data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">The Hall of Heavenly Purity</span></span></b><span data-dcnode-id="808" instrument_node="">
</span></p><span data-dcnode-id="806" instrument_node="">
</span><p align="justify" data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">
</span><span data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">The Hall of Heavenly Purity (乾清宫Qian Qing Gong), 20 metres in height, is actually the largest hall in the Inner Court of the Forbidden City. Throughout the Ming Dynasty (1368-1644) and the earliest period of the Qing Dynasty (1644-1911), 16 emperors lived in that hall. Emperor Yongzheng, third emperor of the Qing Dynasty, moved to live in the Hall of Metal Cultivation. Hence, the hall was the place where emperors used to hold council, interview his ministers and foreign ambassadors and read submitted documents. Festivals, family banquets and ceremonies often took place in the hall.</span></span><span data-dcnode-id="802" instrument_node="">
</span></p><span data-dcnode-id="800" instrument_node="">
</span><p align="justify" data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">
</span><span data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">In the centre of the Hall, a throne surrounded by cloisonne incense burners, long red candles, couplets written by Qing emperors, and large mirrors stand. Mirrors were placed beside the throne of the Emperor to ward off evil spirits. The Chinese characters written on a plaque over the throne and signifying "Justice and Brightness (正大光明Zheng Da Guang Ming)" were written there by Emperor Yongzheng. Strangely enough, that plaque has much more symbolical meaning than we think. Indeed, behind the plaque stands a box where names of crown princes were placed on duplicate documents and a copy would be placed in a box behind this plaque. This method was used to designate the prince who would take the crown upon the death of the emperor.</span></span><span data-dcnode-id="796" instrument_node="">
</span></p><span data-dcnode-id="794" instrument_node="">
</span><p align="justify" data-dcnode-id="788"><span data-dcnode-id="793" instrument_node="">
</span><b data-dcnode-id="790"><span data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">The Hall of Union and Peace</span></span></b><span data-dcnode-id="789" instrument_node="">
</span></p><span data-dcnode-id="787" instrument_node="">
</span><p align="justify" data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">
</span><span data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Also called the Hall of Celestial and Terrestrial Union (交泰殿Jiao Tai Dian), that hall is one of the three main palaces in the Inner Court of the Forbidden City. It is located between the other two main palaces - the Palace of Heavenly Purity (乾清宫Qian Qing Gong) and the Palace of Earthly Tranquility (Kun Ning Gong). The hall was established during the reign of Emperor Jiajing (1522-1566), Ming Dynasty (1368-1644), and restored in the second half of the 1650s. It is a single-roof structure with a gilded bronze spherical pinnacle. Square in shape, it is 3-bays wide and 3-bays deep, smaller than the Hall of Central Harmony (zhonghedian). Originally, the name of that hall was taken from the "Book of Changes" (or I Ching, 易经), meaning the union of heaven and earth, peace and harmony for the whole nation. Due to the authoritarian role of eunuchs during the Ming Dynasty, Emperor Shunzhi (1644-1661) tried to forbid there interference into state affairs by setting an iron sign in the hall.</span></span><span data-dcnode-id="783" instrument_node="">
</span></p><span data-dcnode-id="781" instrument_node="">
</span><p align="center" data-dcnode-id="777"><span data-dcnode-id="780" instrument_node="">
</span><img align="absMiddle" alt="At New Year's Day,the winter solstice and her birthday,the emperess would hold cereminies at the Hall of Union and Peace, recieving tributes and congratulations from other concubines and ministers." border="4" data-dcnode-id="779" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712164718546.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="778" instrument_node="">
</span></p><span data-dcnode-id="776" instrument_node="">
</span><p align="justify" data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">
</span><span data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">During the Spring Festival, Winter Solstice and birthday, empresses used to hold ceremonies in the Hall of Union and Peace, receiving tributes from the imperial concubines, the princesses and the princes' wives. That started at the reign of Emperor Qianlong that the hall used to keep twenty-five imperial seals, each of which was designed for a certain purpose. </span></span><span data-dcnode-id="772" instrument_node="">
</span></p><span data-dcnode-id="770" instrument_node="">
</span><p align="justify" data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">
</span><span data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Behind the throne, visitors can see a screen with an ode to the Hall of Union and Peace written by Emperor Qianlong. Above it, two characters on a plaque advise Emperors to govern the state with virtue. A 1745 clepsydra stands in the east of the hall.</span></span><span data-dcnode-id="766" instrument_node="">
</span></p><span data-dcnode-id="764" instrument_node="">
</span><p align="justify" data-dcnode-id="758"><span data-dcnode-id="763" instrument_node="">
</span><b data-dcnode-id="760"><span data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">The Hall of Earthly Tranquility</span></span></b><span data-dcnode-id="759" instrument_node="">
</span></p><span data-dcnode-id="757" instrument_node="">
</span><p align="justify" data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">
</span><span data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Called "坤宁宫 (Kun Ning Gong)" in Chinese, the Hall of Earthly Tranquility is a building built in 1420, used as empresses' residence during the Ming Dynasty (1368-1644). In 1655, the hall was restored and divided into two parts. The two chambers in the east were changed into bridal rooms while the remaining four chambers were used as a place of worship. Manchu Qing rulers at the head of the country for a while, were not satisfied with the palace looking too much "Han" for them. As a result they rebuilt it to the Manchu's style, replicating their palaces in Shenyang (their capital before their entry to central China).</span></span><span data-dcnode-id="753" instrument_node="">
</span></p><span data-dcnode-id="751" instrument_node="">
</span><p align="justify" data-dcnode-id="746"><span data-dcnode-id="750" instrument_node="">
</span><span data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">The chamber for bridals is painted in red and palace's lamps are hung high with Chinese characters meaning "double happiness" to create a warm and happy atmosphere. Word as auspicious signs for whenever the emperor opened the door, he would see the character. The bed canopy and quilt that can be seen in the chamber were both embroidered with 100 children playing, hence the name "100 Children Canopy" and "100 Children Quilt". Just referred as a bridal room, the newly wed emperor and empress only lived in the chamber for several days, and then the emperor moved to the Hall of Mental Cultivation (养心殿Yang Xin Dian) while the empress moved to another dwelling palace in the Forbidden City. </span></span><span data-dcnode-id="747" instrument_node="">
</span></p><span data-dcnode-id="745" instrument_node="">
</span><p align="justify" data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">
</span><span data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">A special custom around that chamber is still to be learnt. Indeed, if emperors got married before coming to the throne, the place for marrying would mot be there. As a consequence, just 3 emperors lived there: Kangxi (1662-1722), Tongzhi (1862-1874), and Guangxu (1875-1908) for they ascended the throne at early ages. Emperors' weddings were extremely luxurious, costing extraordinaire amounts of money despite the extreme poverty of the country. </span></span><span data-dcnode-id="741" instrument_node="">
</span></p><span data-dcnode-id="739" instrument_node="">
</span><p align="justify" data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">
</span><span data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Behind the Hall of Earthly Tranquility, stands the Gate of Earthly Tranquility (坤宁门Kun Ning Men) : the imperial doctors' duty room, dispensary and the eunuchs duty room flanking it can be seen there.</span></span><span data-dcnode-id="735" instrument_node="">
</span></p><span data-dcnode-id="733" instrument_node="">
</span><p align="justify" data-dcnode-id="727"><span data-dcnode-id="732" instrument_node="">
</span><b data-dcnode-id="729"><span data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">The Hall of Mental Cultivation</span></span></b><span data-dcnode-id="728" instrument_node="">
</span></p><span data-dcnode-id="726" instrument_node="">
</span><p align="justify" data-dcnode-id="721"><span data-dcnode-id="725" instrument_node="">
</span><span data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The Hall of Mental Cultivation (养心殿Yang Xin Dian) was where Emperor Yongzheng, third successor of the Qing Dynasty (1644-1911), moved for making it his residence. Subsequently, seven emperors lived in the hall and handled their routine work there. It has a separate courtyard with a gate as its entrance and stands to the southwest of the Hall of Heavenly Purity.</span></span><span data-dcnode-id="722" instrument_node="">
</span></p><span data-dcnode-id="720" instrument_node="">
</span><p align="center" data-dcnode-id="716"><span data-dcnode-id="719" instrument_node="">
</span><img align="absMiddle" alt="A room inside the Hall of Mental Cultivation is furnished and decorated in its original style." border="4" data-dcnode-id="718" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712170557343.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="717" instrument_node="">
</span></p><span data-dcnode-id="715" instrument_node="">
</span><p align="justify" data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">
</span><span data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">The notorious Empress Dowager Cixi (慈禧太后), attended to state affairs sitting behind a curtain in the East Warmth Chamber (东暖阁Dong Nuan Ge). From behind this curtain, she corruptly ruled China for 48 years first as a regent and domineering mother of her son and subsequently as regent to her adoptive nephew. Emperors from Yongzheng (1678-1735) to Xianfeng (1831-1861) held private audiences in the West Warmth Chamber (西暖阁Xi Nuan Ge). The small house in the west, named Hall of Three Rare Treasures (三希堂San Xi Tang), was so-called because Emperor Qianlong (1711-1799) collected and held three outstanding calligraphy masterpieces.</span></span><span data-dcnode-id="711" instrument_node="">
</span></p><span data-dcnode-id="709" instrument_node="">
</span><p align="justify" data-dcnode-id="704"><span data-dcnode-id="708" instrument_node="">
</span><span data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">The hall is composed of 5 imperial bedrooms, a rear hall for temporary lodgings, provided for empresses and concubines respectively when they were summoned to attend the emperor. Without invitation from the emperor they were expressly forbidden to come in this place.</span></span><span data-dcnode-id="705" instrument_node="">
</span></p><span data-dcnode-id="703" instrument_node="">
</span><p align="justify" data-dcnode-id="697"><span data-dcnode-id="702" instrument_node="">
</span><b data-dcnode-id="699"><span data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">The Six Western Palaces</span></span></b><span data-dcnode-id="698" instrument_node="">
</span></p><span data-dcnode-id="696" instrument_node="">
</span><p align="justify" data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">
</span><span data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The Six Western Palaces (西六宫Xi Liu Gong) site lies to the north of the Hall of Mental Cultivation. The 6 palaces form a group of three palaces on either side, constituting an alley that runs from north to south. This part of the Forbidden City is one of the oldest one:</span></span><span data-dcnode-id="692" instrument_node="">
</span></p><span data-dcnode-id="690" instrument_node="">
</span><p align="justify" data-dcnode-id="665"><span data-dcnode-id="689" instrument_node="">
</span><span data-dcnode-id="685"><span data-dcnode-id="688" instrument_node="">- The Palace of Eternal Longevity (永寿宫Yong Shou Gong)</span><br data-dcnode-id="687"><span data-dcnode-id="686" instrument_node="">
</span></span><span data-dcnode-id="681"><span data-dcnode-id="684" instrument_node="">- The Palace of the Queen Consort (翊坤宫Yi Kun Gong)</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
</span></span><span data-dcnode-id="677"><span data-dcnode-id="680" instrument_node="">- The Palace for Gathering Elegance (储秀宫Chu Xiu Gong)</span><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">
</span></span><span data-dcnode-id="673"><span data-dcnode-id="676" instrument_node="">- The Hall of the Supreme Pole (太极殿Tai Ji Dian)</span><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">
</span></span><span data-dcnode-id="669"><span data-dcnode-id="672" instrument_node="">- The Palace of Eternal Spring (长春宫Chang Chun Gong)</span><br data-dcnode-id="671"><span data-dcnode-id="670" instrument_node="">
</span></span><span data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">- The Palace of Universal Happiness (咸福宫Xian Fu Gong)</span></span><span data-dcnode-id="666" instrument_node="">
</span></p><span data-dcnode-id="664" instrument_node="">
</span><p align="justify" data-dcnode-id="659"><span data-dcnode-id="663" instrument_node="">
</span><span data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">All composed of a courtyard, front hall, rear hall and annexes. Because of emperors' polygamy, these buildings were needed to lodge the thousands of concubines of the "Son of Heaven".</span></span><span data-dcnode-id="660" instrument_node="">
</span></p><span data-dcnode-id="658" instrument_node="">
</span><p align="justify" data-dcnode-id="653"><span data-dcnode-id="657" instrument_node="">
</span><span data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">The Palace of Eternal Spring is the most famous of the 6 for it is where seeing an amazing fresco: "A Dream of Red Mansions", like a noted Chinese novel that became very popular in the late Qing Dynasty (1644-1911). Liking this book, the Empress Dowager Cixi asked for painting a fresco representing the masterpiece. The Palace for Gathering Elegance is like its name suggests it a place full of charms. A dresser, ivory boat and other rare crafts are displayed there.</span></span><span data-dcnode-id="654" instrument_node="">
</span></p><span data-dcnode-id="652" instrument_node="">
</span><p align="justify" data-dcnode-id="646"><span data-dcnode-id="651" instrument_node="">
</span><b data-dcnode-id="648"><span data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">The Hall for Ancestral Worship</span></span></b><span data-dcnode-id="647" instrument_node="">
</span></p><span data-dcnode-id="645" instrument_node="">
</span><p align="justify" data-dcnode-id="640"><span data-dcnode-id="644" instrument_node="">
</span><span data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Located in the eastside of the Inner Court, the Hall for Ancestry Worship (奉先殿Feng Xian Dian) was the imperial household during the Ming (1368-1644) and Qing (1644-1911) dynasties, where worshiping ancestors. Constructed during the Ming, rebuilt in 1657 and restored many times later on some original things can still be seen by visitors. It is a "工-shaped" structure with a white base in Buddhist style, composed of both a front and a rear hall connected by a lobby. The front hall is the main hall, 9 bays wide and 4 bays deep, covering an area of 122,500 square meters. It has a double-eaved roof and glazed facing tile. The door opened in the front fifth bay and the back fifth bay meets the lobby. The rear hall is the bed chamber, 9 bays wide and 2 bays deep, covering an area of 75,500 square meters. Southward, outside the Gate for Ancestry Worship (奉先门Feng Xian Men) stands a cluster of rooms, serving as Sacred Warehouse and Sacred Kitchen. While in the east outside the Gate for Ancestry Worship is a small part itself, including 3 small halls, set up for the Emperor Jiajing (1522-1566) of Ming Dynasty to worship his father.</span></span><span data-dcnode-id="641" instrument_node="">
</span></p><span data-dcnode-id="639" instrument_node="">
</span><p align="justify" data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">
</span><span data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Now the hall has been converted into an exhibition hall dedicated to clocks and watches, for some manufactured by the Imperial workshop or made in Guangzhou and Suzhou; and others imported from England, France, German, Swiss, America and Japan, sent as gifts to the emperors. Though made over two thousands years ago, their beauty is still recognized in the world. For travelers interested to visit the Hall and its collection of ancient relics, here are some useful informations:</span></span><span data-dcnode-id="635" instrument_node="">
</span></p><span data-dcnode-id="633" instrument_node="">
</span><p align="justify" data-dcnode-id="624"><span data-dcnode-id="632" instrument_node="">
</span><span data-dcnode-id="628"><span data-dcnode-id="631" instrument_node="">- Admission Fees: CNY 10</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">
</span></span><span data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">- Opening Hours: 08:30-16:20 (Oct. 16 to Apr.15), 08:30-17:00 (Apr. 16 to Oct. 15)</span></span><span data-dcnode-id="625" instrument_node="">
</span></p><span data-dcnode-id="623" instrument_node="">
</span><p align="justify" data-dcnode-id="617"><span data-dcnode-id="622" instrument_node="">
</span><b data-dcnode-id="619"><span data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The Six Eastern Palaces</span></span></b><span data-dcnode-id="618" instrument_node="">
</span></p><span data-dcnode-id="616" instrument_node="">
</span><p align="justify" data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">
</span><span data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Like the Six Western Palaces(东六宫Dong Liu Gong), this bunch of palaces was also the residence of the emperor's concubines. It consists of:</span></span><span data-dcnode-id="612" instrument_node="">
</span></p><span data-dcnode-id="610" instrument_node="">
</span><p align="justify" data-dcnode-id="585"><span data-dcnode-id="609" instrument_node="">
</span><span data-dcnode-id="605"><span data-dcnode-id="608" instrument_node="">- Palace of Great Benevolence (景仁宫Jing Ren Gong)</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">
</span></span><span data-dcnode-id="601"><span data-dcnode-id="604" instrument_node="">- Palace of Heavenly Favor (承乾宫Cheng Qian Gong)</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">
</span></span><span data-dcnode-id="597"><span data-dcnode-id="600" instrument_node="">- Palace of Purity (钟粹宫Zhong Cui Gong)</span><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">
</span></span><span data-dcnode-id="593"><span data-dcnode-id="596" instrument_node="">- Palace of Lasting Happiness (延禧宫Yan Xi Gong)</span><br data-dcnode-id="595"><span data-dcnode-id="594" instrument_node="">
</span></span><span data-dcnode-id="589"><span data-dcnode-id="592" instrument_node="">- Palace of Eternal Harmony (永和宫Yong He Gong)</span><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">
</span></span><span data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">- Palace of Great Brilliance (景阳宫Jing Yang Gong)</span></span><span data-dcnode-id="586" instrument_node="">
</span></p><span data-dcnode-id="584" instrument_node="">
</span><p align="justify" data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">
</span><span data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">The 6 palaces are now home to several exhibitions, namely, the Palace of Great Benevolence houses an exhibition of more than 500 ancient Chinese bronzes. The Palace of Lasting Happiness rebuilt in 1931 is today a storeroom and actually the only modern building made of armored concrete. The Palace of Heavenly Favor was where the famous Dong E concubine (董鄂妃, the beloved concubine of Emperor Shunzhi) and its harem were located, turned today as an exhibition hall for a large number of bronze wares. The Palace of Great Brilliance houses Ming and Qing Crafts Exhibitions: lacquer wares, items of jade, stoneware, glassware and metal wares created during these dynasties are displayed for the curiosity of visitors. Finally, the Palace of Purity was the palace where the crown prince lived during the Ming Dynasty.</span></span><span data-dcnode-id="580" instrument_node="">
</span></p><span data-dcnode-id="578" instrument_node="">
</span><p align="justify" data-dcnode-id="572"><span data-dcnode-id="577" instrument_node="">
</span><b data-dcnode-id="574"><span data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">The Nine Dragon Wall</span></span></b><span data-dcnode-id="573" instrument_node="">
</span></p><span data-dcnode-id="571" instrument_node="">
</span><p align="justify" data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">
</span><span data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Located to the east of the Six Eastern Palaces and the Hall of Ancestral Worship, the Nine Dragon Wall (九龙墙, Jiu Long Qiang) is one of three most famous walls of this style in China, with the other two in Beihai Park (Beijing) and Datong City (Shanxi Province).</span></span><span data-dcnode-id="567" instrument_node="">
</span></p><span data-dcnode-id="565" instrument_node="">
</span><p align="center" data-dcnode-id="561"><span data-dcnode-id="564" instrument_node="">
</span><img align="absMiddle" alt="The Nine Dragon Wall symbolised the spereme power of emperors." border="4" data-dcnode-id="563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712162811687.jpg&amp;raw" style="width:500px;height:350px;"><span data-dcnode-id="562" instrument_node="">
</span></p><span data-dcnode-id="560" instrument_node="">
</span><p align="justify" data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">
</span><span data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Built in 1773 during the Qing Dynasty (1644-1911), this marvelous wall is 20.4 meters long and 3.5 meters high. The Wall displays 9 dragons, each playing with a pearl, carved in a very lifelike manner. Yellow, blue, purple and white are applied to the carvings to depict the writhing dragons, and make the wall very attractive. The face of the wall has 270 pieces of colored glaze, 5 ridges and another 9 small dragons on the main ridge. According to Chinese symbolism and beliefs, the numbers were not a hazard. Indeed, 270 is a multiple of 9×5: numbers, when combined, signifying the supreme status of a sovereign, called "九五之尊(Jiu Wu Zhi Zun)" in Chinese. One strange thing about the fresco is the piece of wood located at the belly of the third white dragon. It is said that a carpenter carved it to replace a broken piece of glaze tile that broke by the end of the construction, otherwise all the craftsmen would have been punished for not finishing on time. Not discovered by the emperor, the wall was a pride of the court and is a great highlight of the Forbidden City today.</span></span><span data-dcnode-id="556" instrument_node="">
</span></p><span data-dcnode-id="554" instrument_node="">
</span><p align="justify" data-dcnode-id="548"><span data-dcnode-id="553" instrument_node="">
</span><b data-dcnode-id="550"><span data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The Palace of Tranquil Longevity</span></span></b><span data-dcnode-id="549" instrument_node="">
</span></p><span data-dcnode-id="547" instrument_node="">
</span><p align="justify" data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">
</span><span data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">At the north of the Nine Dragon Wall locates a building complex built for the emperors who abdicated from the throne. Covering an area of 46,000 square meters, the whole area is surrounded by lofty, red perimeter walls. It consists of:</span></span><span data-dcnode-id="543" instrument_node="">
</span></p><span data-dcnode-id="541" instrument_node="">
</span><p align="justify" data-dcnode-id="519"><span data-dcnode-id="540" instrument_node="">
</span><span data-dcnode-id="536"><span data-dcnode-id="539" instrument_node="">- The Palace of Tranquil Longevity (宁寿宫Ning Shou Gong)</span><br data-dcnode-id="538"><span data-dcnode-id="537" instrument_node="">
</span></span><span data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">- The Hall of Temper Cultivation</span></span><a data-dcnode-id="533" name="OLE_LINK3"></a><span data-dcnode-id="531"><span data-dcnode-id="532" instrument_node=""> (</span></span><span data-dcnode-id="527"><span data-dcnode-id="530" instrument_node="">养性殿Yang Xing Dian)</span><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">
</span></span><span data-dcnode-id="523"><span data-dcnode-id="526" instrument_node="">- The Hall of Joyful Longevity (乐寿堂Le Shou Tang)</span><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">
</span></span><span data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">- The Hall of Maintaining Harmony (颐和轩Yi He Xuan)</span></span><span data-dcnode-id="520" instrument_node="">
</span></p><span data-dcnode-id="518" instrument_node="">
</span><p align="justify" data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">
