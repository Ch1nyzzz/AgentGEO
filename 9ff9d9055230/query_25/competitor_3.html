</span><span data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Real little city inside the Forbidden City, this group of buildings is the equivalent to the Outer Court and the Inner Court. The idea of building the Palace of the Tranquil Longevity Complex was brought up by Emperor Qianlong (1736-1795) who had planned to move to this area to meditate and pray after resignation. The building started to be built in 1772. After being emperor for 60 years, he resigned from the throne to show his respect for his grandfather Emperor Kangxi (1662-1722) who ruled for 61 years, by ruling one year less.</span></span><span data-dcnode-id="514" instrument_node="">
</span></p><span data-dcnode-id="512" instrument_node="">
</span><p align="justify" data-dcnode-id="506"><span data-dcnode-id="511" instrument_node="">
</span><b data-dcnode-id="508"><span data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">The Hall of Joyful Longevity</span></span></b><span data-dcnode-id="507" instrument_node="">
</span></p><span data-dcnode-id="505" instrument_node="">
</span><p align="justify" data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">
</span><span data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Situated behind the Palace of Tranquil Longevity, the Hall of Joyful Longevity (乐寿堂Le Shou Tang) is the emperor's living area after his retirement. The Hall consists of:</span></span><span data-dcnode-id="501" instrument_node="">
</span></p><span data-dcnode-id="499" instrument_node="">
</span><p align="justify" data-dcnode-id="486"><span data-dcnode-id="498" instrument_node="">
</span><span data-dcnode-id="494"><span data-dcnode-id="497" instrument_node="">- The Hall of Temper Cultivation (养性殿Yang Xing Dian): the bedroom</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">
</span></span><span data-dcnode-id="490"><span data-dcnode-id="493" instrument_node="">- The Hall of Joyful Longevity (乐寿堂Le Shou Tang)</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">
</span></span><span data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">- The Hall of Maintaining Harmony (颐和轩Yi He Xuan)</span></span><span data-dcnode-id="487" instrument_node="">
</span></p><span data-dcnode-id="485" instrument_node="">
</span><p align="justify" data-dcnode-id="480"><span data-dcnode-id="484" instrument_node="">
</span><span data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">The famous Empress Dowager Cixi lived here in her late years, pretending not to be interfering in state affairs. A noteworthy jade carving describing "Yu The Great" and his water-control project is to be seen at the north gate of the hall. Respected as a legendary flood-control hero as well as the supposed first emperor of the Xia Dynasty (21st-16th century BC), his works are still recorded as the most ingenious one for that period of time. Now, the 3 Halls house many precious royal articles like clothes, ornaments, furnishings and daily utensils.</span></span><span data-dcnode-id="481" instrument_node="">
</span></p><span data-dcnode-id="479" instrument_node="">
</span><p align="justify" data-dcnode-id="471"><span data-dcnode-id="478" instrument_node="">
</span><span data-dcnode-id="473"><b data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Imperial</span></b><b data-dcnode-id="474"><span data-dcnode-id="475" instrument_node=""> Garden</span></b></span><span data-dcnode-id="472" instrument_node="">
</span></p><span data-dcnode-id="470" instrument_node="">
</span><p align="center" data-dcnode-id="464"><span data-dcnode-id="469" instrument_node="">
</span><span data-dcnode-id="466"><b data-dcnode-id="467"><img align="absMiddle" alt="A corner of the Imperial Garden. Rockery is a common element of traditional Chinese gardening." border="4" data-dcnode-id="468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitourchina.com/FileUpload/FileUpload/110712171805640.jpg&amp;raw" style="width:500px;height:350px;"></b></span><span data-dcnode-id="465" instrument_node="">
</span></p><span data-dcnode-id="463" instrument_node="">
</span><p align="justify" data-dcnode-id="458"><span data-dcnode-id="462" instrument_node="">
</span><span data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Behind the Hall of Earthly Tranquility is the Imperial Garden (御花园Yu Hua Yuan) where the imperial family members recreated themselves. It is rectangular in shape and covers approximately 12,000 square meters. This was a private retreat for the imperial family and is the most typical of the Chinese imperial garden design.</span></span><span data-dcnode-id="459" instrument_node="">
</span></p><span data-dcnode-id="457" instrument_node="">
</span><p align="justify" data-dcnode-id="452"><span data-dcnode-id="456" instrument_node="">
</span><span data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Growing in front of the hall is a 400 year old pine tree. The Hall of Imperial Peace is the dominant building in the garden and occupies the central position. Surrounded by a wall, it dates from the 15th century. The doors are protected from evil spirits by two gilded unicorns. Inside the hall prayers were offered up to the Taoist God of Water (真武大帝Zhen Wu Da Di) for the protection of the Forbidden City from destruction by fire.</span></span><span data-dcnode-id="453" instrument_node="">
</span></p><span data-dcnode-id="451" instrument_node="">
</span><p align="justify" data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">
</span><span data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">At each of the four corners of the garden there is a pavilion symbolizing the four seasons. The Pavilion of Myriad Springs is the most famous and occupies the eastern corner. Built in 1535 and restored during the Qing Dynasty, this is pavilion the pavilion symbolizing spring.</span></span><span data-dcnode-id="447" instrument_node="">
</span></p><span data-dcnode-id="445" instrument_node="">
</span><p align="justify" data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">
</span><span data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Located in the north-east is the Gathering Beauty Hill (堆秀山Dui Xiu Shan), an artificial mountain with a cave stands the Pavilion of Imperial View (御景园Yu Jing Yuan) where emperors used to sit for meditation. During the year, emperors would climb up to the pavilion on the Double Ninth Festival (重阳节, Chong Yang Jie) to enjoy the scenery with the royal family. The Gate of Divine Might (神武门Shen Wu Men) is at the northern end of the garden: the rear exit from the Forbidden City.</span></span><span data-dcnode-id="441" instrument_node="">
</span></p><span data-dcnode-id="439" instrument_node="">
</span></div><span data-dcnode-id="437" instrument_node="">

</span><h3 data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Top attractions in Beijing</span></h3><span data-dcnode-id="381" instrument_node="">
