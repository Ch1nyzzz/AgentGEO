</span><p data-dcnode-id="2472"><span data-dcnode-id="2494" instrument_node="">The </span><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forbidden_City" title="Forbidden City"><span data-dcnode-id="2493" instrument_node="">Forbidden City</span></a><span data-dcnode-id="2491" instrument_node=""> was first built in the early-15th century as the palace of the Ming emperors of China. It is located in the centre of </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing" title="Beijing"><span data-dcnode-id="2490" instrument_node="">Beijing</span></a><span data-dcnode-id="2488" instrument_node="">, </span><a data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="2487" instrument_node="">China</span></a><span data-dcnode-id="2485" instrument_node="">, and was the </span><a data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="2484" instrument_node="">Chinese</span></a><span data-dcnode-id="2482" instrument_node=""> imperial palace from the early-</span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ming_dynasty" title="Ming dynasty"><span data-dcnode-id="2481" instrument_node="">Ming dynasty</span></a><span data-dcnode-id="2479" instrument_node=""> in 1420 to the end of the </span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qing_dynasty" title="Qing dynasty"><span data-dcnode-id="2478" instrument_node="">Qing dynasty</span></a><span data-dcnode-id="2476" instrument_node=""> in 1912, continuing to be home of the last emperor </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puyi" title="Puyi"><span data-dcnode-id="2475" instrument_node="">Puyi</span></a><span data-dcnode-id="2473" instrument_node=""> until 1924, since when it has been a museum.
</span></p><p data-dcnode-id="2456"><span data-dcnode-id="2471" instrument_node="">Built from 1406 to 1420, the palace complex has undergone many changes.</span><sup class="reference" data-dcnode-id="2468" id="cite_ref-1"><a data-dcnode-id="2469" href="#cite_note-1"><span data-dcnode-id="2470" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2467" instrument_node=""> After serving as the imperial palace for some five hundred years, the Forbidden City became a museum, the Palace Museum, in 1925. In 1987, it was declared a </span><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Heritage_Site" title="World Heritage Site"><span data-dcnode-id="2466" instrument_node="">World Heritage Site</span></a><span data-dcnode-id="2464" instrument_node=""> by </span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO" title="UNESCO"><span data-dcnode-id="2463" instrument_node="">UNESCO</span></a><span data-dcnode-id="2461" instrument_node="">.</span><sup class="reference" data-dcnode-id="2458" id="cite_ref-UNESCO_2-0"><a data-dcnode-id="2459" href="#cite_note-UNESCO-2"><span data-dcnode-id="2460" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2457" instrument_node="">
</span></p><span data-dcnode-id="2455" instrument_node="">

</span><h2 data-dcnode-id="2369"><span class="mw-headline" data-dcnode-id="2377" id="Construction_and_Ming_Dynasty"><span data-dcnode-id="2378" instrument_node="">Construction and Ming Dynasty</span></span><span class="mw-editsection" data-dcnode-id="2370"><span class="mw-editsection-bracket" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">[</span></span><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_Forbidden_City%26action%3Dedit%26section%3D1" title="Edit section: Construction and Ming Dynasty"><span data-dcnode-id="2374" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2368" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2356"><div class="thumbinner" data-dcnode-id="2357" style="width:222px;"><a class="image" data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVerbotene-Stadt1500.jpg"><img alt="" class="thumbimage" data-dcnode-id="2367" data-file-height="879" data-file-width="583" decoding="async" height="332" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Verbotene-Stadt1500.jpg/220px-Verbotene-Stadt1500.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Verbotene-Stadt1500.jpg/330px-Verbotene-Stadt1500.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Verbotene-Stadt1500.jpg/440px-Verbotene-Stadt1500.jpg 2x" width="220"></a><span data-dcnode-id="2365" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2358"><div class="magnify" data-dcnode-id="2363"><a class="internal" data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVerbotene-Stadt1500.jpg" title="Enlarge"></a></div><span data-dcnode-id="2362" instrument_node="">The Forbidden City as depicted in a </span><a class="mw-redirect" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ming_Dynasty" title="Ming Dynasty"><span data-dcnode-id="2361" instrument_node="">Ming Dynasty</span></a><span data-dcnode-id="2359" instrument_node=""> painting</span></div></div></div><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2354" instrument_node="">The site of the Forbidden City was situated on the </span><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khanbaliq" title="Khanbaliq"><span data-dcnode-id="2353" instrument_node="">Imperial city</span></a><span data-dcnode-id="2351" instrument_node=""> during the </span><a class="mw-redirect" data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongol" title="Mongol"><span data-dcnode-id="2350" instrument_node="">Mongol</span></a><span data-dcnode-id="2348" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuan_Dynasty" title="Yuan Dynasty"><span data-dcnode-id="2347" instrument_node="">Yuan Dynasty</span></a><span data-dcnode-id="2345" instrument_node="">. After the collapse of the Yuan Dynasty, the </span><a data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hongwu_Emperor" title="Hongwu Emperor"><span data-dcnode-id="2344" instrument_node="">Hongwu Emperor</span></a><span data-dcnode-id="2342" instrument_node=""> of the </span><a class="mw-redirect" data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ming_Dynasty" title="Ming Dynasty"><span data-dcnode-id="2341" instrument_node="">Ming Dynasty</span></a><span data-dcnode-id="2339" instrument_node=""> moved the capital from Beijing in the north to </span><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nanjing" title="Nanjing"><span data-dcnode-id="2338" instrument_node="">Nanjing</span></a><span data-dcnode-id="2336" instrument_node=""> in the south, and in 1369 ordered that the Yuan palaces be razed.  His son Zhu Di was created Prince of Yan with his seat in Beijing. In 1402, Zhu Di usurped the throne and became the </span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yongle_Emperor" title="Yongle Emperor"><span data-dcnode-id="2335" instrument_node="">Yongle Emperor</span></a><span data-dcnode-id="2333" instrument_node="">.  He made Beijing a secondary capital of the Ming empire, and construction began in 1406 of what would become the Forbidden City.</span><sup class="reference" data-dcnode-id="2330" id="cite_ref-Yu_18_3-0"><a data-dcnode-id="2331" href="#cite_note-Yu_18-3"><span data-dcnode-id="2332" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2329" instrument_node=""> The Forbidden City's plan was designed by many architects and designers, and then it was examined by the Emperor's Ministry of Work.</span><sup class="reference" data-dcnode-id="2326" id="cite_ref-journal_4-0"><a data-dcnode-id="2327" href="#cite_note-journal-4"><span data-dcnode-id="2328" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2325" instrument_node=""> The chief architects and engineers include Cai Xin,</span><sup class="reference" data-dcnode-id="2322" id="cite_ref-journal_4-1"><a data-dcnode-id="2323" href="#cite_note-journal-4"><span data-dcnode-id="2324" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="2319" id="cite_ref-5"><a data-dcnode-id="2320" href="#cite_note-5"><span data-dcnode-id="2321" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2318" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nguyen_An" title="Nguyen An"><span data-dcnode-id="2317" instrument_node="">Nguyen An</span></a><span data-dcnode-id="2315" instrument_node="">, a </span><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnamese_people" title="Vietnamese people"><span data-dcnode-id="2314" instrument_node="">Vietnamese</span></a><span data-dcnode-id="2312" instrument_node=""> eunuch (unverified information),</span><sup class="reference" data-dcnode-id="2309" id="cite_ref-6"><a data-dcnode-id="2310" href="#cite_note-6"><span data-dcnode-id="2311" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2308" instrument_node=""> </span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuai_Xiang" title="Kuai Xiang"><span data-dcnode-id="2307" instrument_node="">Kuai Xiang</span></a><span data-dcnode-id="2305" instrument_node="">, Lu Xiang and others.</span><sup class="reference" data-dcnode-id="2302" id="cite_ref-journal_4-2"><a data-dcnode-id="2303" href="#cite_note-journal-4"><span data-dcnode-id="2304" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2301" instrument_node="">
</span></p><p data-dcnode-id="2269"><span data-dcnode-id="2299" instrument_node="">Construction lasted 14 years and employed the work of 100,000 skilled artisans and up to a million labourers.</span><sup class="reference" data-dcnode-id="2296" id="cite_ref-Yang_15_7-0"><a data-dcnode-id="2297" href="#cite_note-Yang_15-7"><span data-dcnode-id="2298" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2295" instrument_node="">  The pillars of the most important halls were made of whole logs of precious </span><i data-dcnode-id="2292"><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phoebe_%28plant%29" title="Phoebe (plant)"><span data-dcnode-id="2294" instrument_node="">Phoebe zhennan</span></a></i><span data-dcnode-id="2291" instrument_node=""> wood (</span><a data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_language" title="Chinese language"><span data-dcnode-id="2290" instrument_node="">Chinese</span></a><span data-dcnode-id="2288" instrument_node="">: </span><span data-dcnode-id="2286" lang="zh"><span data-dcnode-id="2287" instrument_node="">楠木</span></span><span data-dcnode-id="2285" instrument_node="">; </span><a data-dcnode-id="2283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pinyin" title="Pinyin"><span data-dcnode-id="2284" instrument_node="">pinyin</span></a><span data-dcnode-id="2282" instrument_node="">: </span><i data-dcnode-id="2279"><span data-dcnode-id="2280" lang="zh-Latn-pinyin"><span data-dcnode-id="2281" instrument_node="">nánmù</span></span></i><span data-dcnode-id="2278" instrument_node="">) found in the jungles of south-western China.  Such a feat was not to be repeated in subsequent years — the great pillars seen today were rebuilt using multiple pieces of pinewood in the Qing Dynasty.</span><sup class="reference" data-dcnode-id="2275" id="cite_ref-8"><a data-dcnode-id="2276" href="#cite_note-8"><span data-dcnode-id="2277" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2274" instrument_node=""> The grand terraces and large stone carvings were made of stone from quarries near Beijing.  The larger pieces could not be transported conventionally. Instead, wells were dug along the way, and water from the wells was poured on the road in deep winter, forming a layer of ice. The stones were dragged along the ice.</span><sup class="reference" data-dcnode-id="2271" id="cite_ref-CCTV_9-0"><a data-dcnode-id="2272" href="#cite_note-CCTV-9"><span data-dcnode-id="2273" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2270" instrument_node="">
</span></p><p data-dcnode-id="2240"><span data-dcnode-id="2268" instrument_node="">The floors of major halls were paved with "golden bricks" (</span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_language" title="Chinese language"><span data-dcnode-id="2267" instrument_node="">Chinese</span></a><span data-dcnode-id="2265" instrument_node="">: </span><span data-dcnode-id="2263" lang="zh"><span data-dcnode-id="2264" instrument_node="">金砖</span></span><span data-dcnode-id="2262" instrument_node="">; </span><a data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pinyin" title="Pinyin"><span data-dcnode-id="2261" instrument_node="">pinyin</span></a><span data-dcnode-id="2259" instrument_node="">: </span><i data-dcnode-id="2256"><span data-dcnode-id="2257" lang="zh-Latn-pinyin"><span data-dcnode-id="2258" instrument_node="">jīnzhuān</span></span></i><span data-dcnode-id="2255" instrument_node="">), baked with clay from seven counties of </span><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suzhou" title="Suzhou"><span data-dcnode-id="2254" instrument_node="">Suzhou</span></a><span data-dcnode-id="2252" instrument_node=""> and </span><a data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Songjiang_Town" title="Songjiang Town"><span data-dcnode-id="2251" instrument_node="">Songjiang</span></a><span data-dcnode-id="2249" instrument_node=""> prefectures.</span><sup class="reference" data-dcnode-id="2246" id="cite_ref-Yu_21_10-0"><a data-dcnode-id="2247" href="#cite_note-Yu_21-10"><span data-dcnode-id="2248" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2245" instrument_node=""> Each batch took months to bake, resulting in smooth bricks that ring with a metallic sound.</span><sup class="reference" data-dcnode-id="2242" id="cite_ref-Yang_15_7-1"><a data-dcnode-id="2243" href="#cite_note-Yang_15-7"><span data-dcnode-id="2244" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2241" instrument_node="">  Much of the interior pavings seen today are six-century-old originals.
</span></p><p data-dcnode-id="2231"><span data-dcnode-id="2239" instrument_node="">Soil excavated during construction of the moat was piled up to the north of the palace to create an artificial hill, the </span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jingshan_Park" title="Jingshan Park"><span data-dcnode-id="2238" instrument_node="">Jingshan hill</span></a><span data-dcnode-id="2236" instrument_node="">.</span><sup class="reference" data-dcnode-id="2233" id="cite_ref-Yu_20_11-0"><a data-dcnode-id="2234" href="#cite_note-Yu_20-11"><span data-dcnode-id="2235" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2232" instrument_node="">
</span></p><p data-dcnode-id="2222"><span data-dcnode-id="2230" instrument_node="">Even before the palace was completed, Zhu Di moved to Beijing under the guise of "touring and hunting" (巡狩): the administrative centre of the empire gradually shifted from Nanjing to Beijing. When the palace was completed in 1420, Zhu Di moved there and Beijing officially became the primary capital of the empire.</span><sup class="reference" data-dcnode-id="2227" id="cite_ref-CCTV_9-1"><a data-dcnode-id="2228" href="#cite_note-CCTV-9"><span data-dcnode-id="2229" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2226" instrument_node=""> However, scarcely nine months after their construction, the three main halls including the </span><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Throne_room" title="Throne room"><span data-dcnode-id="2225" instrument_node="">throne room</span></a><span data-dcnode-id="2223" instrument_node=""> burnt down, and it would be 23 years before they were rebuilt.
</span></p><p data-dcnode-id="2197"><span data-dcnode-id="2221" instrument_node="">From 1420 to 1644, the Forbidden City was the seat of the Ming Dynasty. In April 1644, rebel forces led by </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Li_Zicheng" title="Li Zicheng"><span data-dcnode-id="2220" instrument_node="">Li Zicheng</span></a><span data-dcnode-id="2218" instrument_node=""> captured it, and </span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chongzhen_Emperor" title="Chongzhen Emperor"><span data-dcnode-id="2217" instrument_node="">Chongzhen</span></a><span data-dcnode-id="2215" instrument_node="">, the last emperor of the Ming Dynasty, hanged himself on Jingshan Hill.  Li Zicheng proclaimed himself emperor of the </span><a class="mw-redirect" data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shun_Dynasty" title="Shun Dynasty"><span data-dcnode-id="2214" instrument_node="">Shun Dynasty</span></a><span data-dcnode-id="2212" instrument_node=""> at the Hall of Military Eminence.</span><sup class="reference" data-dcnode-id="2209" id="cite_ref-12"><a data-dcnode-id="2210" href="#cite_note-12"><span data-dcnode-id="2211" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2208" instrument_node=""> However, he soon fled before the combined armies of former Ming general </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wu_Sangui" title="Wu Sangui"><span data-dcnode-id="2207" instrument_node="">Wu Sangui</span></a><span data-dcnode-id="2205" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manchu" title="Manchu"><span data-dcnode-id="2204" instrument_node="">Manchu</span></a><span data-dcnode-id="2202" instrument_node=""> forces, setting fire to parts of the Forbidden City in the process.</span><sup class="reference" data-dcnode-id="2199" id="cite_ref-13"><a data-dcnode-id="2200" href="#cite_note-13"><span data-dcnode-id="2201" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2198" instrument_node="">
</span></p><span data-dcnode-id="2196" instrument_node="">
</span><h2 data-dcnode-id="2186"><span class="mw-headline" data-dcnode-id="2194" id="Qing_Dynasty"><span data-dcnode-id="2195" instrument_node="">Qing Dynasty</span></span><span class="mw-editsection" data-dcnode-id="2187"><span class="mw-editsection-bracket" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">[</span></span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_Forbidden_City%26action%3Dedit%26section%3D2" title="Edit section: Qing Dynasty"><span data-dcnode-id="2191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2185" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2173"><div class="thumbinner" data-dcnode-id="2174" style="width:222px;"><a class="image" data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKangxi-Verbotene-Stadt1.jpg"><img alt="" class="thumbimage" data-dcnode-id="2184" data-file-height="840" data-file-width="945" decoding="async" height="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/27/Kangxi-Verbotene-Stadt1.jpg/220px-Kangxi-Verbotene-Stadt1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/27/Kangxi-Verbotene-Stadt1.jpg/330px-Kangxi-Verbotene-Stadt1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/27/Kangxi-Verbotene-Stadt1.jpg/440px-Kangxi-Verbotene-Stadt1.jpg 2x" width="220"></a><span data-dcnode-id="2182" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2175"><div class="magnify" data-dcnode-id="2180"><a class="internal" data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKangxi-Verbotene-Stadt1.jpg" title="Enlarge"></a></div><span data-dcnode-id="2179" instrument_node="">The </span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kangxi_Emperor" title="Kangxi Emperor"><span data-dcnode-id="2178" instrument_node="">Kangxi Emperor</span></a><span data-dcnode-id="2176" instrument_node=""> returning to the Forbidden City after a tour to the south.</span></div></div></div><span data-dcnode-id="2172" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2160"><div class="thumbinner" data-dcnode-id="2161" style="width:222px;"><a class="image" data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADie_Gartenlaube_%281853%29_b_445.jpg"><img alt="" class="thumbimage" data-dcnode-id="2171" data-file-height="1294" data-file-width="2016" decoding="async" height="141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Die_Gartenlaube_%25281853%2529_b_445.jpg/220px-Die_Gartenlaube_%25281853%2529_b_445.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Die_Gartenlaube_%281853%29_b_445.jpg/330px-Die_Gartenlaube_%281853%29_b_445.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/08/Die_Gartenlaube_%281853%29_b_445.jpg/440px-Die_Gartenlaube_%281853%29_b_445.jpg 2x" width="220"></a><span data-dcnode-id="2169" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2162"><div class="magnify" data-dcnode-id="2167"><a class="internal" data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADie_Gartenlaube_%281853%29_b_445.jpg" title="Enlarge"></a></div><span data-dcnode-id="2166" instrument_node="">A depiction of the Forbidden City in the German book </span><i data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">The Garden Arbor</span></i><span data-dcnode-id="2163" instrument_node=""> (1853)</span></div></div></div><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2158" instrument_node="">By October 1644, the Manchus had achieved supremacy in northern China, and prince regent </span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dorgon" title="Dorgon"><span data-dcnode-id="2157" instrument_node="">Dorgon</span></a><span data-dcnode-id="2155" instrument_node=""> proclaimed the </span><a class="mw-redirect" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qing_Dynasty" title="Qing Dynasty"><span data-dcnode-id="2154" instrument_node="">Qing Dynasty</span></a><span data-dcnode-id="2152" instrument_node=""> as the successor to the Ming. A ceremony was held at the Forbidden City to proclaim the young </span><a data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shunzhi_Emperor" title="Shunzhi Emperor"><span data-dcnode-id="2151" instrument_node="">Shunzhi Emperor</span></a><span data-dcnode-id="2149" instrument_node=""> as ruler of all China.</span><sup class="reference" data-dcnode-id="2146" id="cite_ref-14"><a data-dcnode-id="2147" href="#cite_note-14"><span data-dcnode-id="2148" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2145" instrument_node="">  The Qing rulers largely maintained the Palace's Ming Dynasty scheme, except for the names of some of the principal buildings. The Ming Dynasty names favoured the character </span><i data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">ji</span></i><span data-dcnode-id="2142" instrument_node=""> (</span><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simplified_Chinese_characters" title="Simplified Chinese characters"><span data-dcnode-id="2141" instrument_node="">simplified Chinese</span></a><span data-dcnode-id="2139" instrument_node="">: </span><span data-dcnode-id="2137" lang="zh-Hans"><span data-dcnode-id="2138" instrument_node="">极</span></span><span data-dcnode-id="2136" instrument_node="">; </span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traditional_Chinese_characters" title="Traditional Chinese characters"><span data-dcnode-id="2135" instrument_node="">traditional Chinese</span></a><span data-dcnode-id="2133" instrument_node="">: </span><span data-dcnode-id="2131" lang="zh-Hant"><span data-dcnode-id="2132" instrument_node="">極</span></span><span data-dcnode-id="2130" instrument_node="">), meaning "supremacy" or "extremity", while the new Qing names favoured names meaning "peace" and "harmony"; for example, </span><i data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Huangji Dian</span></i><span data-dcnode-id="2127" instrument_node="">, the "Hall of Imperial Supremacy", was changed to </span><i data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Taihe Dian</span></i><span data-dcnode-id="2124" instrument_node="">, the "</span><a data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hall_of_Supreme_Harmony" title="Hall of Supreme Harmony"><span data-dcnode-id="2123" instrument_node="">Hall of Supreme Harmony</span></a><span data-dcnode-id="2121" instrument_node="">".</span><sup class="reference" data-dcnode-id="2118" id="cite_ref-CCTV２_15-0"><a data-dcnode-id="2119" href="#cite_note-CCTV%EF%BC%92-15"><span data-dcnode-id="2120" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2117" instrument_node="">
</span></p><p data-dcnode-id="2094"><span data-dcnode-id="2115" instrument_node="">In addition, signs and </span><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nameplate" title="Nameplate"><span data-dcnode-id="2114" instrument_node="">name plates</span></a><span data-dcnode-id="2112" instrument_node=""> were made bilingual (</span><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_language" title="Chinese language"><span data-dcnode-id="2111" instrument_node="">Chinese</span></a><span data-dcnode-id="2109" instrument_node=""> and </span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manchu_language" title="Manchu language"><span data-dcnode-id="2108" instrument_node="">Manchu</span></a><span data-dcnode-id="2106" instrument_node="">),</span><sup class="reference" data-dcnode-id="2103" id="cite_ref-16"><a data-dcnode-id="2104" href="#cite_note-16"><span data-dcnode-id="2105" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2102" instrument_node=""> and the main part of the Empress's official bedchamber, the Hall of Earthly Tranquility, became a </span><a data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shamanism" title="Shamanism"><span data-dcnode-id="2101" instrument_node="">Shamanist</span></a><span data-dcnode-id="2099" instrument_node=""> shrine.</span><sup class="reference" data-dcnode-id="2096" id="cite_ref-17"><a data-dcnode-id="2097" href="#cite_note-17"><span data-dcnode-id="2098" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2095" instrument_node="">
</span></p><p data-dcnode-id="2079"><span data-dcnode-id="2093" instrument_node="">The Forbidden City thus became the power centre of the Qing Dynasty. In 1860, during the Second </span><a class="mw-redirect" data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opium_War" title="Opium War"><span data-dcnode-id="2092" instrument_node="">Opium War</span></a><span data-dcnode-id="2090" instrument_node="">, Anglo-French forces took control of the Forbidden City and occupied it until the end of the war.</span><sup class="reference" data-dcnode-id="2087" id="cite_ref-CCTV11_18-0"><a data-dcnode-id="2088" href="#cite_note-CCTV11-18"><span data-dcnode-id="2089" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2086" instrument_node=""> In 1900 </span><a data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empress_Dowager_Cixi" title="Empress Dowager Cixi"><span data-dcnode-id="2085" instrument_node="">Empress Dowager Cixi</span></a><span data-dcnode-id="2083" instrument_node=""> fled from the Forbidden City during the </span><a data-dcnode-id="2081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boxer_Rebellion" title="Boxer Rebellion"><span data-dcnode-id="2082" instrument_node="">Boxer Rebellion</span></a><span data-dcnode-id="2080" instrument_node="">, leaving it to be occupied by forces of the treaty powers until the following year.
</span></p><p data-dcnode-id="2061"><span data-dcnode-id="2078" instrument_node="">After being home to twenty-four emperors, fourteen of the Ming Dynasty and ten of the Qing Dynasty, the Forbidden City ceased to be the political centre of China in 1912, with the abdication of </span><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puyi" title="Puyi"><span data-dcnode-id="2077" instrument_node="">Puyi</span></a><span data-dcnode-id="2075" instrument_node="">, the last Emperor of China.  However, under </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Articles_of_Favourable_Treatment_of_the_Great_Qing_Emperor_after_His_Abdication" title="Articles of Favourable Treatment of the Great Qing Emperor after His Abdication"><span data-dcnode-id="2074" instrument_node="">an agreement</span></a><span data-dcnode-id="2072" instrument_node=""> signed between the </span><a class="mw-redirect" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aisin_Gioro" title="Aisin Gioro"><span data-dcnode-id="2071" instrument_node="">Qing imperial house</span></a><span data-dcnode-id="2069" instrument_node=""> and the new </span><a class="mw-redirect" data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_China_%281912%25E2%2580%259349%29" title="Republic of China (1912–49)"><span data-dcnode-id="2068" instrument_node="">Republic of China</span></a><span data-dcnode-id="2066" instrument_node=""> government, Puyi was allowed, in fact required, to live within the walls of the Forbidden City. Puyi and his family retained the use of the Inner Court, while the Outer Court was handed over to the Republican authorities. A museum was established in the Outer Court in 1914.</span><sup class="reference" data-dcnode-id="2063" id="cite_ref-19"><a data-dcnode-id="2064" href="#cite_note-19"><span data-dcnode-id="2065" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2062" instrument_node="">
</span></p><span data-dcnode-id="2060" instrument_node="">
</span><h2 data-dcnode-id="2050"><span class="mw-headline" data-dcnode-id="2058" id="After_the_revolution"><span data-dcnode-id="2059" instrument_node="">After the revolution</span></span><span class="mw-editsection" data-dcnode-id="2051"><span class="mw-editsection-bracket" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">[</span></span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_Forbidden_City%26action%3Dedit%26section%3D3" title="Edit section: After the revolution"><span data-dcnode-id="2055" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2049" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2034"><div class="thumbinner" data-dcnode-id="2035" style="width:222px;"><a class="image" data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATropasRepublicanasCiudadProhibida19170712--fightforrepublic00putn.jpeg"><img alt="" class="thumbimage" data-dcnode-id="2048" data-file-height="900" data-file-width="1500" decoding="async" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d5/TropasRepublicanasCiudadProhibida19170712--fightforrepublic00putn.jpeg/220px-TropasRepublicanasCiudadProhibida19170712--fightforrepublic00putn.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d5/TropasRepublicanasCiudadProhibida19170712--fightforrepublic00putn.jpeg/330px-TropasRepublicanasCiudadProhibida19170712--fightforrepublic00putn.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d5/TropasRepublicanasCiudadProhibida19170712--fightforrepublic00putn.jpeg/440px-TropasRepublicanasCiudadProhibida19170712--fightforrepublic00putn.jpeg 2x" width="220"></a><span data-dcnode-id="2046" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2036"><div class="magnify" data-dcnode-id="2044"><a class="internal" data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATropasRepublicanasCiudadProhibida19170712--fightforrepublic00putn.jpeg" title="Enlarge"></a></div><span data-dcnode-id="2043" instrument_node="">Republican troops fighting to retake the Forbidden City on July 12, 1917, after </span><a data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhang_Xun" title="Zhang Xun"><span data-dcnode-id="2042" instrument_node="">Zhang Xun</span></a><span data-dcnode-id="2040" instrument_node="">'s </span><a data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manchu_Restoration" title="Manchu Restoration"><span data-dcnode-id="2039" instrument_node="">attempted imperial restoration</span></a><span data-dcnode-id="2037" instrument_node="">.</span></div></div></div><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2032" instrument_node="">Opposition to Puyi staying in the palace grew during the </span><a data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beiyang_government" title="Beiyang government"><span data-dcnode-id="2031" instrument_node="">Beiyang government</span></a><span data-dcnode-id="2029" instrument_node=""> of the Republic of China.</span><sup class="reference" data-dcnode-id="2026" id="cite_ref-Yan4_20-0"><a data-dcnode-id="2027" href="#cite_note-Yan4-20"><span data-dcnode-id="2028" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2025" instrument_node="">
</span></p><p data-dcnode-id="1994"><span data-dcnode-id="2023" instrument_node="">In 1923 </span><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reginald_Johnston" title="Reginald Johnston"><span data-dcnode-id="2022" instrument_node="">Reginald Johnston</span></a><span data-dcnode-id="2020" instrument_node="">, Puyi's English teacher, warned Puyi about </span><a class="mw-redirect" data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eunuch_%28court_official%29" title="Eunuch (court official)"><span data-dcnode-id="2019" instrument_node="">eunuchs</span></a><span data-dcnode-id="2017" instrument_node=""> smuggling treasures out of the palace and selling them in antique shops. Puyi ordered an audit of the palace's collections. Before it began, a fire consumed the gardens of the Palace of Establishing Prosperity (建福宫) where the bulk of the </span><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qianlong_Emperor" title="Qianlong Emperor"><span data-dcnode-id="2016" instrument_node="">Qianlong Emperor</span></a><span data-dcnode-id="2014" instrument_node="">'s collection of art works was stored.</span><sup class="reference" data-dcnode-id="2011" id="cite_ref-Jianfu1_21-0"><a data-dcnode-id="2012" href="#cite_note-Jianfu1-21"><span data-dcnode-id="2013" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2010" instrument_node=""> In his memoir, Puyi claimed the fire was started by the eunuchs to conceal their embezzlement. This fire further fuelled public sentiments against Puyi's continued occupation of the palace.</span><sup class="reference" data-dcnode-id="2007" id="cite_ref-22"><a data-dcnode-id="2008" href="#cite_note-22"><span data-dcnode-id="2009" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2006" instrument_node=""> The gardens were not rebuilt until 2005.</span><sup class="reference" data-dcnode-id="2003" id="cite_ref-Jianfu2_23-0"><a data-dcnode-id="2004" href="#cite_note-Jianfu2-23"><span data-dcnode-id="2005" instrument_node="">[23]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="1996" style="white-space:nowrap;"><span data-dcnode-id="2002" instrument_node="">[</span><i data-dcnode-id="1998"><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="2000" title="The material near this tag failed verification of its source citation(s). (February 2016)"><span data-dcnode-id="2001" instrument_node="">failed verification</span></span></a></i><span data-dcnode-id="1997" instrument_node="">]</span></sup><span data-dcnode-id="1995" instrument_node="">
</span></p><p data-dcnode-id="1975"><span data-dcnode-id="1993" instrument_node="">In 1924, </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feng_Yuxiang" title="Feng Yuxiang"><span data-dcnode-id="1992" instrument_node="">Feng Yuxiang</span></a><span data-dcnode-id="1990" instrument_node=""> </span><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing_Coup" title="Beijing Coup"><span data-dcnode-id="1989" instrument_node="">took control of Beijing in a coup</span></a><span data-dcnode-id="1987" instrument_node="">. Denouncing the previous agreement with the Qing imperial house, Feng expelled Puyi from the Palace.</span><sup class="reference" data-dcnode-id="1984" id="cite_ref-Yan4_20-1"><a data-dcnode-id="1985" href="#cite_note-Yan4-20"><span data-dcnode-id="1986" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1983" instrument_node=""> On October 10, 1925 (</span><a class="mw-redirect" data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Double_Ten_Day" title="Double Ten Day"><span data-dcnode-id="1982" instrument_node="">Double Ten Day</span></a><span data-dcnode-id="1980" instrument_node="">), the Palace Museum was established in the Forbidden City. The large amount of treasures and curiosities housed there were gradually catalogued and put on public display.</span><sup class="reference" data-dcnode-id="1977" id="cite_ref-24"><a data-dcnode-id="1978" href="#cite_note-24"><span data-dcnode-id="1979" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1976" instrument_node="">
</span></p><p data-dcnode-id="1945"><span data-dcnode-id="1974" instrument_node="">Soon, however, the </span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Sino-Japanese_War" title="Second Sino-Japanese War"><span data-dcnode-id="1973" instrument_node="">Japanese invasion of China</span></a><span data-dcnode-id="1971" instrument_node=""> threatened the safety of these national treasures, and they were moved out of the Forbidden City. Starting in 1933, important artefacts were packed and evacuated. They were first shipped to Nanjing and thence to Shanghai. However, the </span><a class="mw-redirect" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japanese_Imperial_Army" title="Japanese Imperial Army"><span data-dcnode-id="1970" instrument_node="">Japanese forces</span></a><span data-dcnode-id="1968" instrument_node=""> soon threatened Shanghai. The </span><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Executive_Yuan" title="Executive Yuan"><span data-dcnode-id="1967" instrument_node="">Executive Yuan</span></a><span data-dcnode-id="1965" instrument_node=""> decided to evacuate the collections to the remote west. The artifacts were split into three lots. One took the northern route towards </span><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shaanxi" title="Shaanxi"><span data-dcnode-id="1964" instrument_node="">Shaanxi</span></a><span data-dcnode-id="1962" instrument_node="">. One was shipped up the </span><a class="mw-redirect" data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yangtze_River" title="Yangtze River"><span data-dcnode-id="1961" instrument_node="">Yangtze River</span></a><span data-dcnode-id="1959" instrument_node=""> towards </span><a data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sichuan" title="Sichuan"><span data-dcnode-id="1958" instrument_node="">Sichuan</span></a><span data-dcnode-id="1956" instrument_node="">. The final lot was transported south towards </span><a data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guangxi" title="Guangxi"><span data-dcnode-id="1955" instrument_node="">Guangxi</span></a><span data-dcnode-id="1953" instrument_node="">. The pace of the Japanese advance forced the artifacts to be moved quickly to escape bombing and capture, often with just hours' notice. In the end, all three collections reached the relative safety of </span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sichuan" title="Sichuan"><span data-dcnode-id="1952" instrument_node="">Sichuan</span></a><span data-dcnode-id="1950" instrument_node="">, where they stayed until the end of the war.</span><sup class="reference" data-dcnode-id="1947" id="cite_ref-25"><a data-dcnode-id="1948" href="#cite_note-25"><span data-dcnode-id="1949" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1946" instrument_node="">
</span></p><p data-dcnode-id="1936"><span data-dcnode-id="1944" instrument_node="">Meanwhile, the Japanese army captured the Forbidden City in Beijing, but were only able to remove a few large bronze tubs and a few pieces of cannon. Most of these were recovered after the war, in </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tianjin" title="Tianjin"><span data-dcnode-id="1943" instrument_node="">Tianjin</span></a><span data-dcnode-id="1941" instrument_node="">.</span><sup class="reference" data-dcnode-id="1938" id="cite_ref-CCTV11_18-1"><a data-dcnode-id="1939" href="#cite_note-CCTV11-18"><span data-dcnode-id="1940" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1937" instrument_node="">
</span></p><p data-dcnode-id="1927"><span data-dcnode-id="1935" instrument_node="">At the end of </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="1934" instrument_node="">World War II</span></a><span data-dcnode-id="1932" instrument_node=""> in 1945, the artifacts were moved back to Nanjing and Beijing.  Remarkably, none were damaged or lost.</span><sup class="reference" data-dcnode-id="1929" id="cite_ref-26"><a data-dcnode-id="1930" href="#cite_note-26"><span data-dcnode-id="1931" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1928" instrument_node="">
</span></p><p data-dcnode-id="1906"><span data-dcnode-id="1926" instrument_node="">In the late 1940s, with the </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuomintang" title="Kuomintang"><span data-dcnode-id="1925" instrument_node="">Kuomintang</span></a><span data-dcnode-id="1923" instrument_node=""> losing the Chinese Civil War, </span><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chiang_Kai-shek" title="Chiang Kai-shek"><span data-dcnode-id="1922" instrument_node="">Chiang Kai-shek</span></a><span data-dcnode-id="1920" instrument_node=""> ordered the artifacts from the Forbidden City and the National Museum in Nanjing to be moved to </span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiwan" title="Taiwan"><span data-dcnode-id="1919" instrument_node="">Taiwan</span></a><span data-dcnode-id="1917" instrument_node="">. In the event no artifacts were shipped from Beijing, but many of the best collections stored in Nanjing were shipped to Taiwan, and today form the core of the </span><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Palace_Museum" title="National Palace Museum"><span data-dcnode-id="1916" instrument_node="">National Palace Museum</span></a><span data-dcnode-id="1914" instrument_node=""> in </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taipei" title="Taipei"><span data-dcnode-id="1913" instrument_node="">Taipei</span></a><span data-dcnode-id="1911" instrument_node="">.</span><sup class="reference" data-dcnode-id="1908" id="cite_ref-Three_27-0"><a data-dcnode-id="1909" href="#cite_note-Three-27"><span data-dcnode-id="1910" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1907" instrument_node="">
</span></p><span data-dcnode-id="1905" instrument_node="">
</span><h2 data-dcnode-id="1894"><span data-dcnode-id="1904" id="Under_the_People.27s_Republic_of_China"></span><span class="mw-headline" data-dcnode-id="1902" id="Under_the_People's_Republic_of_China"><span data-dcnode-id="1903" instrument_node="">Under the People's Republic of China</span></span><span class="mw-editsection" data-dcnode-id="1895"><span class="mw-editsection-bracket" data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">[</span></span><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_Forbidden_City%26action%3Dedit%26section%3D4" title="Edit section: Under the People's Republic of China"><span data-dcnode-id="1899" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1893" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1884"><div class="thumbinner" data-dcnode-id="1885" style="width:222px;"><a class="image" data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AForbiddencity_notopen06.JPG"><img alt="" class="thumbimage" data-dcnode-id="1892" data-file-height="600" data-file-width="800" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Forbiddencity_notopen06.JPG/220px-Forbiddencity_notopen06.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Forbiddencity_notopen06.JPG/330px-Forbiddencity_notopen06.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Forbiddencity_notopen06.JPG/440px-Forbiddencity_notopen06.JPG 2x" width="220"></a><span data-dcnode-id="1890" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1886"><div class="magnify" data-dcnode-id="1888"><a class="internal" data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AForbiddencity_notopen06.JPG" title="Enlarge"></a></div><span data-dcnode-id="1887" instrument_node="">The East Glorious Gate under renovation as part of the 19-year restoration process.</span></div></div></div><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1882" instrument_node="">In 1949, the People's Republic of China was proclaimed at </span><a data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tiananmen" title="Tiananmen"><span data-dcnode-id="1881" instrument_node="">Tiananmen</span></a><span data-dcnode-id="1879" instrument_node="">, directly in front of the Forbidden City. Over the next two decades various proposals were made to raze or reconstruct the Forbidden City to create a public park, a transport interchange, or "places of entertainment".</span><sup class="reference" data-dcnode-id="1876" id="cite_ref-28"><a data-dcnode-id="1877" href="#cite_note-28"><span data-dcnode-id="1878" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1875" instrument_node="">
</span></p><p data-dcnode-id="1868"><span data-dcnode-id="1873" instrument_node="">The Forbidden City suffered some damage during this period, including the dismantling of the throne in the Hall of Middle Harmony, the removal of name tablets from several buildings and gardens, and the demolition of some minor gates and structures.</span><sup class="reference" data-dcnode-id="1870" id="cite_ref-29"><a data-dcnode-id="1871" href="#cite_note-29"><span data-dcnode-id="1872" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1869" instrument_node="">
</span></p><p data-dcnode-id="1850"><span data-dcnode-id="1867" instrument_node="">The damage peaked during the </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_Revolution" title="Cultural Revolution"><span data-dcnode-id="1866" instrument_node="">Cultural Revolution</span></a><span data-dcnode-id="1864" instrument_node="">. In 1966, the Hall of Worshipping Ancestors was modified and some artifacts destroyed for an exhibition of revolutionary mud sculptures. However, further destruction was prevented when Premier </span><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhou_Enlai" title="Zhou Enlai"><span data-dcnode-id="1863" instrument_node="">Zhou Enlai</span></a><span data-dcnode-id="1861" instrument_node=""> intervened by sending an army battalion to guard the city. These troops also prevented ransacking by the </span><a class="mw-redirect" data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Guards_%28China%29" title="Red Guards (China)"><span data-dcnode-id="1860" instrument_node="">Red Guards</span></a><span data-dcnode-id="1858" instrument_node=""> who were swept up in the storm to demolish the "</span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_Olds" title="Four Olds"><span data-dcnode-id="1857" instrument_node="">Four Olds</span></a><span data-dcnode-id="1855" instrument_node="">". From 1966 to 1971, all gates to the Forbidden City were sealed, saving it from more destruction.</span><sup class="reference" data-dcnode-id="1852" id="cite_ref-30"><a data-dcnode-id="1853" href="#cite_note-30"><span data-dcnode-id="1854" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1851" instrument_node="">
</span></p><p data-dcnode-id="1835"><span data-dcnode-id="1849" instrument_node="">The Forbidden City was declared a </span><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Heritage_Site" title="World Heritage Site"><span data-dcnode-id="1848" instrument_node="">World Heritage Site</span></a><span data-dcnode-id="1846" instrument_node=""> in 1987 by </span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO" title="UNESCO"><span data-dcnode-id="1845" instrument_node="">UNESCO</span></a><span data-dcnode-id="1843" instrument_node=""> as the "Imperial Palace of the Ming and Qing Dynasties",</span><sup class="reference" data-dcnode-id="1840" id="cite_ref-31"><a data-dcnode-id="1841" href="#cite_note-31"><span data-dcnode-id="1842" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1839" instrument_node=""> due to its significant place in the development of </span><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_architecture" title="Chinese architecture"><span data-dcnode-id="1838" instrument_node="">Chinese architecture</span></a><span data-dcnode-id="1836" instrument_node=""> and culture.
</span></p><span data-dcnode-id="1834" instrument_node="">
</span><h2 data-dcnode-id="1824"><span class="mw-headline" data-dcnode-id="1832" id="Present"><span data-dcnode-id="1833" instrument_node="">Present</span></span><span class="mw-editsection" data-dcnode-id="1825"><span class="mw-editsection-bracket" data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">[</span></span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_Forbidden_City%26action%3Dedit%26section%3D5" title="Edit section: Present"><span data-dcnode-id="1829" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1823" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1814"><div class="thumbinner" data-dcnode-id="1815" style="width:222px;"><a class="image" data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABeijing-forbidden9.jpg"><img alt="" class="thumbimage" data-dcnode-id="1822" data-file-height="1714" data-file-width="2285" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Beijing-forbidden9.jpg/220px-Beijing-forbidden9.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Beijing-forbidden9.jpg/330px-Beijing-forbidden9.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Beijing-forbidden9.jpg/440px-Beijing-forbidden9.jpg 2x" width="220"></a><span data-dcnode-id="1820" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1816"><div class="magnify" data-dcnode-id="1818"><a class="internal" data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABeijing-forbidden9.jpg" title="Enlarge"></a></div><span data-dcnode-id="1817" instrument_node="">Tourists inside the Palace Museum</span></div></div></div><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1812" instrument_node="">Currently, the Palace Museum is responsible for the preservation and restoration of the Forbidden City. Building heights around the Forbidden City are restricted. In 2005, a sixteen-year restoration project was started to repair and restore all buildings in the Forbidden City to their pre-1912 state. This is the largest restoration of the Forbidden City undertaken in two centuries, and involves progressively closing off sections of the Forbidden City for assessment, repairs, and restoration.</span><sup class="reference" data-dcnode-id="1809" id="cite_ref-32"><a data-dcnode-id="1810" href="#cite_note-32"><span data-dcnode-id="1811" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1808" instrument_node=""> Also as part of the project, some derelict or destroyed sections are being rebuilt. The gardens of the Palace of Establishing Prosperity, destroyed by fire in 1923, were rebuilt in 2005, but remain closed to the public.</span><sup class="reference" data-dcnode-id="1805" id="cite_ref-Jianfu2_23-1"><a data-dcnode-id="1806" href="#cite_note-Jianfu2-23"><span data-dcnode-id="1807" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1804" instrument_node=""> The interior was also designed in a different style, and the buildings are used by visiting </span><a class="mw-redirect" data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_Important_Person" title="Very Important Person"><span data-dcnode-id="1803" instrument_node="">dignitaries</span></a><span data-dcnode-id="1801" instrument_node="">.</span><sup class="reference" data-dcnode-id="1798" id="cite_ref-Jianfu1_21-1"><a data-dcnode-id="1799" href="#cite_note-Jianfu1-21"><span data-dcnode-id="1800" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1797" instrument_node="">
</span></p><span data-dcnode-id="1795" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1783"><div class="thumbinner" data-dcnode-id="1784" style="width:222px;"><a class="image" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFood_Court_at_the_Forbidden_City.jpg"><img alt="An area enclosed on three sides by red walls in traditional Chinese architectural style. All have screened windows and entrances; behind the rear wall is an even higher one. In the middle are tables, and at the right foreground is an ice cream cart and a red umbrella" class="thumbimage" data-dcnode-id="1794" data-file-height="3504" data-file-width="6048" decoding="async" height="127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Food_Court_at_the_Forbidden_City.jpg/220px-Food_Court_at_the_Forbidden_City.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Food_Court_at_the_Forbidden_City.jpg/330px-Food_Court_at_the_Forbidden_City.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/53/Food_Court_at_the_Forbidden_City.jpg/440px-Food_Court_at_the_Forbidden_City.jpg 2x" width="220"></a><span data-dcnode-id="1792" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1785"><div class="magnify" data-dcnode-id="1790"><a class="internal" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFood_Court_at_the_Forbidden_City.jpg" title="Enlarge"></a></div><span data-dcnode-id="1789" instrument_node="">A </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_court" title="Food court"><span data-dcnode-id="1788" instrument_node="">food court</span></a><span data-dcnode-id="1786" instrument_node=""> in the Six Western Palaces</span></div></div></div><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1781" instrument_node="">While effort has been made to prevent the commercialisation of the palace, a variety of commercial enterprises exist, such as souvenir shops and photography stands. These commercial enterprises often rouse controversy. A </span><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Starbucks" title="Starbucks"><span data-dcnode-id="1780" instrument_node="">Starbucks</span></a><span data-dcnode-id="1778" instrument_node=""> store, which opened in 2000, sparked objections</span><sup class="reference" data-dcnode-id="1775" id="cite_ref-33"><a data-dcnode-id="1776" href="#cite_note-33"><span data-dcnode-id="1777" instrument_node="">[33]</span></a></sup><span data-dcnode-id="1774" instrument_node=""> and eventually closed on July 13, 2007.</span><sup class="reference" data-dcnode-id="1771" id="cite_ref-34"><a data-dcnode-id="1772" href="#cite_note-34"><span data-dcnode-id="1773" instrument_node="">[34]</span></a></sup><span data-dcnode-id="1770" instrument_node=""> Chinese media also took notice of a pair of souvenir shops that refused to admit Chinese citizens in 2006.</span><sup class="reference" data-dcnode-id="1767" id="cite_ref-35"><a data-dcnode-id="1768" href="#cite_note-35"><span data-dcnode-id="1769" instrument_node="">[35]</span></a></sup><span data-dcnode-id="1766" instrument_node="">  According to the reports, the purpose was to preserve an atmosphere where foreigners could be victims of </span><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Price_gouging" title="Price gouging"><span data-dcnode-id="1765" instrument_node="">price gouging</span></a><span data-dcnode-id="1763" instrument_node="">. The Palace Museum promised to investigate the matter. Some commentators, such as influential </span><a class="mw-redirect" data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phoenix_TV" title="Phoenix TV"><span data-dcnode-id="1762" instrument_node="">Phoenix TV</span></a><span data-dcnode-id="1760" instrument_node=""> host Luqiu Luwei, have further questioned the whole practice of renting out premises in the Forbidden City as retail space.</span><sup class="reference" data-dcnode-id="1757" id="cite_ref-36"><a data-dcnode-id="1758" href="#cite_note-36"><span data-dcnode-id="1759" instrument_node="">[36]</span></a></sup><span data-dcnode-id="1756" instrument_node="">
</span></p><p data-dcnode-id="1720"><span data-dcnode-id="1754" instrument_node="">In 2005, </span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IBM" title="IBM"><span data-dcnode-id="1753" instrument_node=""> IBM Corporation</span></a><span data-dcnode-id="1751" instrument_node=""> and the Palace Museum announced a joint project to build a World Wide Web-based </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/3D_modeling" title="3D modeling"><span data-dcnode-id="1750" instrument_node="">virtual model</span></a><span data-dcnode-id="1748" instrument_node=""> of the Forbidden City and associated sites in </span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing" title="Beijing"><span data-dcnode-id="1747" instrument_node="">Beijing</span></a><span data-dcnode-id="1745" instrument_node="">.</span><sup class="reference" data-dcnode-id="1742" id="cite_ref-IBM_37-0"><a data-dcnode-id="1743" href="#cite_note-IBM-37"><span data-dcnode-id="1744" instrument_node="">[37]</span></a></sup><span data-dcnode-id="1741" instrument_node=""> The online cultural heritage project, titled </span><i data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">The Forbidden City: Beyond Space and Time</span></i><span data-dcnode-id="1738" instrument_node="">, is presented in both </span><a data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_language" title="English language"><span data-dcnode-id="1737" instrument_node="">English</span></a><span data-dcnode-id="1735" instrument_node=""> and </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_language" title="Chinese language"><span data-dcnode-id="1734" instrument_node="">Chinese</span></a><span data-dcnode-id="1732" instrument_node="">, and provides interactive, </span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/3D_computer_graphics" title="3D computer graphics"><span data-dcnode-id="1731" instrument_node="">three-dimensional</span></a><span data-dcnode-id="1729" instrument_node="">, representations of Forbidden City structures and cultural artifacts.</span><sup class="reference" data-dcnode-id="1726" id="cite_ref-IBM_37-1"><a data-dcnode-id="1727" href="#cite_note-IBM-37"><span data-dcnode-id="1728" instrument_node="">[37]</span></a></sup><span data-dcnode-id="1725" instrument_node=""> The virtual Forbidden City consists of some 800 buildings, and launched in October 2008.</span><sup class="reference" data-dcnode-id="1722" id="cite_ref-38"><a data-dcnode-id="1723" href="#cite_note-38"><span data-dcnode-id="1724" instrument_node="">[38]</span></a></sup><span data-dcnode-id="1721" instrument_node="">
</span></p><span data-dcnode-id="1719" instrument_node="">
