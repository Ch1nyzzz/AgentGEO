</span><h1 data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">  The Forbidden City</span></h1><span data-dcnode-id="355" instrument_node="">
</span><div class="content" data-dcnode-id="236"><img alt="The Forbidden City" class="imag" data-dcnode-id="354" height="383" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaculturetour.com/images/tours/beijing/forbidden.jpg&amp;raw" title="The Forbidden City" width="711"><span data-dcnode-id="353" instrument_node="">
</span><h2 data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">The History of the Forbidden City</span></h2><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">The Forbidden City (zǐjinchéng) was the  Chinese Imperial Palace of 24 Emperors from the Ming Dynasty (1368–1644) to the Qing  Dynasty (1644-1911). Also known as the Imperial Palace (Gùgōng), it is  the largest and best-preserved collection of ancient buildings in China.  Covering an area of 720,000 square meters, there are 980 remaining buildings  and 8,704 rooms contained within a 10 meter city wall and a 52 meter moat. On  each of the four sides there is a huge gate. &nbsp;The Meridian Gate (Wu men) in the south and  Divine Might Gate (Shenwu men) in the north provide entrance for tourists.  Tiananmen also serves as the main entrance of the Forbidden City in the south. &nbsp;</span></p><span data-dcnode-id="347" instrument_node="">
</span><h2 data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">So why was this Imperial Palace called the  Forbidden City? </span></h2><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">According to ancient Chinese astrology, “Zi” (Purple) refers to  the North Star, known as the “Ziwei” Star in ancient China, home of the  Celestial Emperor. The site of the palace was a mirror of the celestial one.  “Jin” (Forbidden) symbolized that everything must be controlled by the Emperor,  and “Cheng” literally means a city within walls. Common people were not allowed  to enter the Forbidden City freely. Thus, the name “Zijin cheng” was formed. It  can also be called “Gugong” because it means the former palace for Emperors.  There is now a Palace Museum inside the Forbidden City.    </span></p><span data-dcnode-id="341" instrument_node="">
</span><h2 data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Two main parts of the Forbidden City</span></h2><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">The Forbidden City is mainly divided into  two parts: the southern Outer Court (or Front Court) which was used for  ceremonial purposes such as the enthronement of the Crown Prince, the Emperor's  birthday, imperial marriage ceremonies and official business. The northern Inner  Court (or Back Palace) was the residence of the Emperor and his households and  used for day-to-day affairs of state.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node=""> After entering from the southern Meridian  Gate (Wu men), there is a huge Palace Courtyard. The Palace courtyard contains  the “stream of golden water” and five bridges, all decorated with carved  torches symbolizing power and masculinity. The Outer court is guarded by a row  of lions protecting the Gate of Supreme Harmony. The Gate of Celestial Purity is  where the emperor attended to state affairs.</span></p><span data-dcnode-id="332" instrument_node="">
</span><img alt="The Forbidden City" class="imag" data-dcnode-id="331" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaculturetour.com/images/tours/beijing/forbidden-city-2.jpg&amp;raw" title="The Forbidden City"><h2 data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">When the Palace Museum was built?</span></h2><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node=""> The Palace Museum was built in 1925 and is  well-known for its wonderful collection of historic, cultural, classic and  artistic items. There are over 1.5 million displays dating from as early as the  Shang Dynasty (1766 BC to 1122  BC) all the way through to the Qing Dynasty, including  ceramics, paintings, bronze ware, timepieces, jade, palace artifacts, and an  eclectic mix of fascinating articles.</span></p><span data-dcnode-id="325" instrument_node="">
</span><h2 data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">The Forbidden City was listed as a World  Heritage Site in 1987</span></h2><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">The Forbidden City was listed as a World  Heritage Site in 1987 by UNESCO. Its design exerted great influence on East  Asian, and even modern architecture. Many movies were shot by using this site,  such as “the Forbidden City” and “the Last Emperor”.&nbsp; </span></p><img alt="The Forbidden City" class="imag" data-dcnode-id="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaculturetour.com/images/tours/beijing/forbidden-city-3.jpg&amp;raw" title="The Forbidden City"><span data-dcnode-id="318" instrument_node="">
</span><h3 align="center" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Comment  from the World Heritage Committee </span></h3><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">For  five hundred years, the Forbidden City has been a symbol of supreme power. As  an architectural structure with various gardens and 9,000 rooms housing fine  furniture and artworks. It is considered a witness to invaluable civilization  of the Ming and Qing Dynasties. </span></p><span data-dcnode-id="312" instrument_node="">
</span><h3 align="center" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Introduction</span></h3><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Located  at the heart of Beijing, the Forbidden City is referred to as the Palace  Museum. In the past, it was the imperial palace of the Ming and Qing Dynasties  (1368-1911 AD), with 24 emperors once living there. Today, it is also known as  the Palace Museum. The solemn and magnificence of Forbidden City hailed it as  one of the five most famous palaces in the world, the others being the Palace  of Versailles in France, the Buckingham Palace in Great Britain, the White  House in the United States and the Kremlin in Russia. Additionally, it is  listed one as one of the world cultural heritage sites. </span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="305" instrument_node="">With  an area of 720,000 meters squared, the Forbidden City is the largest and ancient  architectural structure in China </span><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">with 9999 palaces and rooms</span></strong><span data-dcnode-id="302" instrument_node="">. It is crowned for  its magnificence due to its sea of palaces that is rare in China. </span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">The  eastern and western regions of the Forbidden City are asymmetrical with an axis  stretching from north to south, which overlap the axis of Beijing. The three  major halls, three major palaces and imperial garden are located on its axis.  The palaces on the axis are flanked by other majestic palaces and pavilions,  each of which consist of interior and exterior halls. The interior halls surround  Taihe Hall, Zhonghe Hall and Baohe Hall with Wenhua Hall and Wuying Hall on the  two sides, while the exterior halls revolves around Qianqing Palace, Jiaotai  Hall and Kunning Palace with six other halls on both sides. The layout is all  well arranged. On each corner of the city wall there is an exquisite turret.  The 10-meter-tall city wall extends 3,400 meters squared, outside which is a  52-meter-wide moat. </span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Today,  there are many comprehensive art galleries in the Forbidden City, displaying art  pieces such as paintings, porcelains, bronze vessels, handicrafts of the Ming  and Qing Dynasties, inscriptions, toys, the four treasures of the study, clocks  and calligraphic works, altogether 1,052,653 pieces of rare and precious  pieces. This number accounts for one sixth of China’s  cultural relics. For this reason, it is hailed as a museum housing the largest  number of cultural relics. Housing China’s  priceless national treasures, it is well known as a world-renowned museum of  ancient cultures and arts. </span></p><img alt="The Forbidden City" class="imag" data-dcnode-id="294" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaculturetour.com/images/tours/beijing/forbidden-city-4.jpg&amp;raw" title="The Forbidden City"><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">On  July 1, 2004, the 28th World Cultural Heritage Conference held in  Suzhou, China approved to inscribe Shenyang Imperial Palace on the World  Cultural Heritage Site List. </span></p><span data-dcnode-id="290" instrument_node="">
</span><h4 align="center" data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Cultural  Heritages </span></h4><span data-dcnode-id="287" instrument_node="">
</span><h3 data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">An  ancient architectural masterpiece unparalleled elsewhere  </span></h3><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">The  Forbidden City is known as one of the largest architectural structures in  China. The palaces on the eastern and western sides are symmetrical with an  axis stretching from the Bell Tower and Drum Tower in the north to Yongding  Gate in the south. Today, it serves as a symbol of the time-honored Chinese  history and shows the marvelous achievements the ancient Chinese have made in  architecture. </span></p><span data-dcnode-id="281" instrument_node="">
</span><h3 data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">A  precious treasure trove of cultural relics  </span></h3><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Today,  there are various comprehensive art galleries in the Forbidden City, displaying  art pieces such as paintings, porcelains, bronze vessels, handicrafts of the  Ming and Qing Dynasties, inscriptions, toys, the four treasures of the study,  clocks and calligraphic works, altogether 1,052,653 pieces of rare and precious  pieces. This number accounts for one sixth of China’s  cultural relics. Thus, it is hailed as a museum housing the largest amount of  cultural relics. Housing China’s  priceless national treasures, it is known as a world-renowned museum of ancient  culture and art. </span></p><img alt="The Forbidden City" class="imag" data-dcnode-id="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaculturetour.com/images/tours/beijing/forbidden-city-5.jpg&amp;raw" title="The Forbidden City"><span data-dcnode-id="274" instrument_node="">
</span><h3 data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">The  germ of ancient Chinese imperial palaces  </span></h3><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">The  construction of the Forbidden City was initiated by Emperor Zhu Di of the Ming  Dynasty. As the largest architectural ensemble with the largest amount of  cultural relics that are unparalleled. It is said to be a world-renowned  imperial architecture complex characterized by a structured layout and  exquisite adornments. </span></p><span data-dcnode-id="268" instrument_node="">
</span><h3 data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Promote  cultural exchange between China and other countries  </span></h3><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">The  cultural relics in the Forbidden City are displayed in two themes, the palace  theme and the art theme. There are 51 authentic displays shown in over 10  exhibition halls there. Over one hundred exhibitions have been hosted, and for  over then times, they have made their way into Europe, Asia, America, Oceania  and Africa. All these exhibitions help promote the splendid ancient Chinese  civilization and facilitate the cultural exchanges between China and other  countries in the world. </span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node=""> The  Forbidden City, also known as the Palace Museum, used to be the imperial palace  of the Ming and Qing Dynasties. As the largest ancient imperial architectural structure  in China, it was inscribed on the World Cultural Heritage Site List in 1987. </span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">The  construction of the Forbidden City started in 1406 AD (the 4th year  of the Yongming Period of the Ming Dynasty) and was completed in 1420 AD (the  18th year of the Yongming Period of the Ming Dynasty). Today, it has  a history of over 580 years. From Emperor Yongle of the Ming Dynasty to Emperor  Fuyi of the Qing Dynasty (the last emperor in China), 24 emperors once lived there.  Its status as the supreme court lasts for 491 years. </span></p><img alt="The Forbidden City" class="imag" data-dcnode-id="256" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaculturetour.com/images/tours/beijing/forbidden-city-6.jpg&amp;raw" title="The Forbidden City"><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Located  at the heart of Beijing, the Forbidden City just reposes on the axis of Beijing  that stretches 8 kilometers. The structures in the eastern and western sides  are asymmetrical with an axis that overlaps with that of Beijing. Today, the  People’s Cultural Palace is  located in front of the Forbidden City used to be Imperial Ancestral Temple  where emperors honored and worshipped their ancestors. The Zhongshan Park on  the right front used to be alters where emperors offered sacrifices to the god  of land and the god of grains. There was once a government office in the front  and a trade market at the back. </span></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">The  Forbidden City has an area of over 720,000 meters squared, 960 meters in length  and 750 meters in width. Today, there are over 8,000 rooms, surrounded by a  10-meter-high city wall, outside of which is a 52-meter-wide moat. Each  direction has a gate, in particular Meridian Gate in the south, Shenwu Gate in  the north, Donghua Gate in the east and Xihua Gate in the west. It consists of  interior and exterior regions. The exterior region surrounds Taihe Hall,  Zhonghe Hall and Baohe Hall with Wenhua Hall and Wuying Hall on the two sides,  which was for ceremonies, while the interior region revolves around Qianqing  Palace, Jiaotai Hall and Kunning Palace with other six halls on both sides.  Kunming Palace was where emperors handled national affairs and their concubines  lived. Also, on the eastern side lies Ningshou Palace, which was where Emperor  Kangxi spent the last years of his life. </span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Since  the founding of the People’s  Republic of China in 1949, large-scale renovations have been made to the Forbidden  City, and a profusion of cultural relics have been reorganized. In 1961, the  State Council designated it as a cultural heritage site under the state  protection. Today, it houses over 1,500,000 pieces of cultural relics. </span></p><p data-dcnode-id="242"><span data-dcnode-id="246" instrument_node=""> </span><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaculturetour.com/beijing/world-heritage-sites-in-beijing.htm" title="List of World    Heritage Sites in Beijing"><span data-dcnode-id="245" instrument_node="">» List of World    Heritage Sites in Beijing</span></a><span data-dcnode-id="243" instrument_node=""> </span></p><span data-dcnode-id="241" instrument_node="">
</span><h3 data-dcnode-id="238"><a data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinaculturetour.com/culture/china-world-heritage-sites.htm" title="» World Cultural Heritage Sites in China"><span data-dcnode-id="240" instrument_node="">» List of World Cultural &amp; Natural Heritage Sites in China</span></a></h3><span data-dcnode-id="237" instrument_node="">
</span></div><span data-dcnode-id="235" instrument_node="">
