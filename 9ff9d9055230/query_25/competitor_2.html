</span><div class="col-xs-24 col-sm-16 col-md-18 travelguideinfo" data-dcnode-id="189"><span data-dcnode-id="366" instrument_node="">
</span><div data-dcnode-id="274"><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="364" instrument_node="">
</span><img alt="the forbidden city" data-dcnode-id="363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mybeijingchina.com/images/attraction/forbidden-city-s.jpg&amp;raw"><span data-dcnode-id="362" instrument_node="">The Forbidden City in Beijing is said to be the best preserved imperial palace complex in the world. The home of 24 emperors during Ming and Qing dynasties (1368 to 1912), The Forbidden City was listed as the World’s Cultural Heritage by UNESCO in 1987.
	</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">
		The Forbidden City sits in the central Beijing facing Tiananmen Square and has been designated as a National Palace Museum. The Forbidden City is counted as one of the world's five Palaces (the Forbidden City in Beijing, the French Palace of Versailles, Buckingham Palace, the White House and Kremlin). The palace of the Forbidden City is China 's largest and most significant ancient architectural complex with a total area of over 720 thousand square meters.
	</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">
		The Forbidden City is a “must see” site in Beijing with the maximum visiting numbers of visitors being up to 80,000 people per day.
	</span></p><span data-dcnode-id="354" instrument_node="">
</span><div data-dcnode-id="320"><span data-dcnode-id="353" instrument_node="">
</span><div data-dcnode-id="345"><span data-dcnode-id="352" instrument_node="">
</span><h2 data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">
				History
			</span></h2><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">
				The history of Forbidden City has been traced back to 1406, after Ming Emperor Zhuli seized the throne and decided to move the capital city to Beijing from Nanjing. The Emperor ordered his Beijing Palace built in style of the Palace in Nanjing. The palace had a 14 years construction period and was completed in 1420, the year of Yongle.
			</span></p><span data-dcnode-id="346" instrument_node="">
</span></div><span data-dcnode-id="344" instrument_node="">
</span><div class="clear" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">
			&nbsp;
		</span></div><span data-dcnode-id="341" instrument_node="">
</span><h2 data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">
			Layout
		</span></h2><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="337" instrument_node="">
</span><img alt="the forbidden city" data-dcnode-id="336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mybeijingchina.com/images/attraction/forbidden-city-layout.jpg&amp;raw"><span data-dcnode-id="335" instrument_node="">According to the theory of ancient Chinese astrology, the location of the palace is in transit, regarded as the Celestial Emperor, corresponding to heaven. There is an axis that runs through the Forbidden City and this represents the royal supremacy. The three main halls, the imperial harems and the imperial garden are all situated on this central axis.
		</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">
			Rooms on both sides of the axis are symmetric distribution of many palaces do not lack magnificence. These rooms can be divided into two parts - the outer court and inner court.
		</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">
			The outer court consists of Hall of Supreme Harmony, Hall of Central Harmony and Hall of Preserve as the three main halls, Wenhua Hall and Wuying Hall are the two wings.
		</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">
			The inner court consists of the Hall of Celestial Purity, the Hall of Celestial and Terrestrial Union and Hall of Terrestrial Tranquility and the six rooms on the east and west for its two wings. There is a strict and orderly layout.
		</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">
			At the four corners of the Forbidden City lay delicate and exquisite turrets which were for observation and defense. The Forbidden City is built in a square shape, and the inner city is surrounded by 10 m high, 3400 m long wall. Outside the wall is a 52 meters wide moat.
		</span></p><span data-dcnode-id="321" instrument_node="">
</span></div><span data-dcnode-id="319" instrument_node="">
</span><div class="clear" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">
		&nbsp;
	</span></div><span data-dcnode-id="316" instrument_node="">
</span><div data-dcnode-id="305"><span data-dcnode-id="315" instrument_node="">
</span><h2 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">
			Relics
		</span></h2><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">
			Some of the rooms and halls in the Forbidden City have been set up as history museums, painting museums, pottery museums, bronze museum, art museum of the Ming and Qing Dynasties, the four treasures museum, watch museum and the Qing court judgments exhibition.
		</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">
			These museums contain a huge display a large collection of ancient art works. A total of 1,052,653 pieces are preserved in the Forbidden City, accounting for one sixth of the total number of the Chinese cultural relics. The Forbidden City is the largest history museum cultural relics in China. Many of these relics are unique and a priceless national treasure.
		</span></p><span data-dcnode-id="306" instrument_node="">
</span></div><span data-dcnode-id="304" instrument_node="">
</span><div class="clear" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">
		&nbsp;
	</span></div><span data-dcnode-id="301" instrument_node="">
</span><div data-dcnode-id="279"><span data-dcnode-id="300" instrument_node="">
</span><h2 data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">
			How to Visit The Forbidden City
		</span></h2><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="296" instrument_node="">
</span><img alt="the forbidden city" data-dcnode-id="295" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mybeijingchina.com/images/attraction/layout.jpg&amp;raw"><span data-dcnode-id="294" instrument_node="">The middle route (recommended): Meridian Gate → The Halls in Taihemen→ Qianqingmen→ Jiaotaidian→ Kunninggong→ Imperial Garden → Shenwumen
		</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">
			The East Route: Meridian Gate → the three Hall of Taihemen→ Qianqingmen→ Six Eastern Palace → Ningshougong→ Zhenfei Well
		</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">
			The West Route: Meridian Gate → The Hall of Taihemen→ Qianqinggong → Yangxin Hall→ Six Western Palace
		</span></p><span data-dcnode-id="286" instrument_node="">
</span><h2 data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">
			Best Time to Visit
		</span></h2><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">
			The best time to visit Forbidden City is from late April to early June, late August to the end of November. The weather of these months is good with not too much rain. Late April to early June is spring time in Beijing. The spring blossoms in the Imperial Palace are gorgeous.
		</span></p><span data-dcnode-id="280" instrument_node="">
</span></div><span data-dcnode-id="278" instrument_node="">
</span><div class="clear" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">
		&nbsp;
	</span></div><span data-dcnode-id="275" instrument_node="">
</span></div><span data-dcnode-id="273" instrument_node="">
</span><div class="cptinfoall" data-dcnode-id="227"><span data-dcnode-id="272" instrument_node="">
</span><h2 data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">
		Recommended Beijing Tours including a visit of Forbidden City
	</span></h2><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">
		The Forbidden City is the largest surviving palace complex in the world. Its ancient palatial structure has been influential in the subsequent development of Chinese architecture, as well as providing inspiration for many modern constructions. The Forbidden City is one of the must-see attractions in Beijing.
	</span></p><span data-dcnode-id="266" instrument_node="">

</span><li data-dcnode-id="253"><span data-dcnode-id="258" instrument_node="">
</span><strong data-dcnode-id="255"><a data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mybeijingchina.com/beijing-tours/beijing-day-trips/bjalc-28/" style="text-decoration:underline;"><span data-dcnode-id="257" instrument_node="">One day Beijing Forbidden City Tour</span></a></strong><span data-dcnode-id="254" instrument_node="">: best preserved imperial palace and the largest ancient palatial structure
