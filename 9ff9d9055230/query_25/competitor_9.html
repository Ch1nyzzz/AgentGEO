><span data-dcnode-id="3673" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3674" instrument_node="">Khajuraho temples.</span></span></p><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.m.wikipedia.org/wiki/Khajuraho_Group_of_Monuments" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="en.m.wikipedia.org"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="3652" style="box-sizing: border-box; position: relative; margin-bottom: 1em;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="3654" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="3669" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="3671" style="box-sizing: border-box; background-image: url(&quot;https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Khajuraho_Group_of_Monuments_4.jpg/640px-Khajuraho_Group_of_Monuments_4.jpg&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="3670" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="3655" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="3656" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3657" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="3667" style="box-sizing: border-box;"><span data-dcnode-id="3668" instrument_node="">Khajuraho Group of Monuments - Wikipedia</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="3665" style="box-sizing: border-box;"><span data-dcnode-id="3666" instrument_node="">The Khajuraho Group of Monuments are a group of Hindu and Jain temples in Chhatarpur district , Madhya Pradesh , India , about 175 kilometres southeast of Jhansi . They are a UNESCO World Heritage Site . [1] [2] The temples are famous for their nagara -style architectural symbolism and their erotic sculptures , which are about 10% off the sculptures there. [3] Most Khajuraho temples were built between 885 AD and 1050 AD by the Chandela dynasty. [4] [5] Historical records note that the Khajuraho temple site had 85 temples by the 12th century, spread over 20 square kilometers. Of these, only about 25 temples have survived, spread over six square kilometers. [2] Of the surviving temples, the Kandariya Mahadeva Temple is decorated with a profusion of sculptures with intricate details, symbolism and expressiveness of ancient Indian art. [6] When these monuments were built, the boys in the place lived in hermitages , by being brahmcharis (bachelor) until they attained manhood and these sculptures helped them to learn about the worldly role of 'householder'. [7] [8] The Khajuraho group of temples were built together but were dedicated to two religions, Hinduism and Jainism , suggesting a tradition of acceptance and respect for diverse religious views among Hindus and Jains in the region. [9] The Khajuraho monuments are located in the Indian state of Madhya Pradesh , in Chatarpur district , about 620 kilometres (385&nbsp;mi) southeast of New Delhi . The temples are located near a small town also known as Khajuraho , [10] with a population of about 24,481 people (2011 Census). Khajuraho is served by Civil Aerodrome Khajuraho (IATA Code: HJR), with services to Delhi, Agra , Varanasi and Mumbai . [11] The site is also linked by the Indian Railways service, with the railway station located approximately six kilometres from the entrance to the monuments. The monuments are about ten kilometres off the east-west National Highway 75 , and about 50 kilometres from the city of Chhatarpur , which is connected to the state capital Bhopal by the SW-NE running National Highway 86 . The 10th-century Bhand Deva Temple in Rajasthan was built in the style of the Khajuraho monuments and is often referred to as 'Little Khajuraho'. The Khajuraho group of monuments was built during the rule of the Chandela dynasty. The building activity started almost immediately after the rise of their power, throughout their kingdom to be later known as Bundelkhand . [12] Most temples were built during the reigns of the Hindu kings Yashovarman and Dhanga . Yashovarman's legacy is best exhibited by the Lakshmana Temple . Vishvanatha temple best highlights King Dhanga's reign. [13] : 22 The largest and currently most famous surviving temple is Kandariya Mahadeva built in the reign of King Vidyadhara . [14] The temple inscriptions suggest many of the currently surviving temples were complete between 970 and 1030 AD, with further temples completed during the following decades. [9] The Khajuraho temp</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="3658" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="3661" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16p --n_medium" data-dcnode-id="3591" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3592" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3593" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-1e6217e75fddc7e2e6cd6a65f8dbf357-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="3590" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3586" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3587"><div class="q-box unzoomed" data-dcnode-id="3588" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3589" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-8701166eba782d79319cac8f3e5c549c-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3583" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3584" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3585" instrument_node="">Fatehpur Sikri, another city you may visit if you're in Agra.</span></span></p><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.m.wikipedia.org/wiki/Fatehpur_Sikri" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="en.m.wikipedia.org"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="3563" style="box-sizing: border-box; position: relative; margin-bottom: 1em;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="3565" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="3580" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="3582" style="box-sizing: border-box; background-image: url(&quot;https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Fatehput_Sikiri_Buland_Darwaza_gate_2010.jpg/640px-Fatehput_Sikiri_Buland_Darwaza_gate_2010.jpg&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="3581" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="3566" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="3567" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3568" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="3578" style="box-sizing: border-box;"><span data-dcnode-id="3579" instrument_node="">Fatehpur Sikri - Wikipedia</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="3576" style="box-sizing: border-box;"><span data-dcnode-id="3577" instrument_node="">Fatehpur Sikri ( Hindi: [ˈfətɛɦpʊɾ ˈsiːkɾiː] ) is a town in the Agra District of Uttar Pradesh , India . Situated 37 kms from the district headquarters Agra , [3] Fatehpur Sikri itself was founded as the capital of Mughal Empire in 1571 by Emperor Akbar , serving this role from 1571 to 1585, when Akbar abandoned it due to a campaign in Punjab and was later completely abandoned in 1610. [4] The name of the city is derived from the village called Sikri which occupied the spot before. An Archaeological Survey of India (ASI) excavation from 1999 to 2000 indicated that there was a habitation, temples and commercial centres here before Akbar built his capital. The region was settled by Sungas following their expansion. It was controlled by Sikarwar Rajputs from 7th to 16th century CE till the Battle of Khanwa (1527). The khanqah of Sheikh Salim Chishti existed earlier at this place. Akbar's son Jahangir was born at the village of Sikri to his consort Mariam-uz-Zamani in 1569 [5] and that year Akbar began construction of a religious compound to commemorate the Sheikh who had predicted the birth. After Jahangir's second birthday, he began the construction of a walled city and imperial palace here. The city came to be known as Fatehpur Sikri , the "City of Victory", after Akbar's victorious Gujarat campaign in 1573 . After occupying Agra in 1803, the East India Company established an administrative centre here and it remained so until 1850. In 1815, the Marquess of Hastings ordered repair of monuments at Sikri. Fatehpur Sikri was awarded the status of UNESCO World Heritage Site in 1986. [6] [7] Archaeological evidence points to settlement of the region since the Painted Grey Ware period . According to historian Syed Ali Nadeem Rezavi, the region flourished under Sunga rule and then under Sikarwar Rajputs, who built a fortress when they controlled the area from 7th to 16th century, till the Battle of Khanwa (1527). The area later came under the rule of the Delhi Sultanate and many mosques were built at the place which grew in size during the period of the Khalji dynasty . [8] [9] Basing his arguments on the excavations by the Archaeological Survey of India (ASI) in 1999–2000 at the Chabeli Tila, senior Agra journalist Bhanu Pratap Singh said the antique pieces, statues, and structures all point to a lost "culture and religious site," more than 1,000 years ago. "The excavations yielded a rich crop of Jain statues, hundreds of them, including the foundation stone of a temple with the date. The statues were a thousand years old of Bhagwan Adi Nath, Bhagwan Rishabh Nath , Bhagwan Mahavir and Jain Yakshinis ," said Swarup Chandra Jain, senior leader of the Jain community . Historian Sugam Anand states that there is proof of habitation, temples and commercial centres before Akbar established it as his capital. He states that the open space on a ridge was used by Akbar to build his capital. [10] [11] [12] But preceding Akbar's appropriation of the site for his ca</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="3569" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="3572" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3573"><svg data-dcnode-id="3574" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 edCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3556"><div class="q-box unzoomed" data-dcnode-id="3557" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3558" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-53f06b07454269008aa1cec62cf23b34-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="3554" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3550" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3551"><div class="q-box unzoomed" data-dcnode-id="3552" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3553" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-9ef7151e7bcc85207c4f384e4fb7394a-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="3549" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3545" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3546"><div class="q-box unzoomed" data-dcnode-id="3547" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3548" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-043cda3047a088cabeefabb48c82b26b-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="3544" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3540" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3541"><div class="q-box unzoomed" data-dcnode-id="3542" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3543" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-9d8de1cd65ce02d3ede8d1f2e2a829e6-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.m.wikipedia.org/wiki/Ajanta_Caves" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="en.m.wikipedia.org"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="3520" style="box-sizing: border-box; position: relative; margin-bottom: 1em;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="3522" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="3537" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="3539" style="box-sizing: border-box; background-image: url(&quot;https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Ajanta_%2863%29.jpg/640px-Ajanta_%2863%29.jpg&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="3538" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="3523" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="3524" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3525" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="3535" style="box-sizing: border-box;"><span data-dcnode-id="3536" instrument_node="">Ajanta Caves - Wikipedia</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="3533" style="box-sizing: border-box;"><span data-dcnode-id="3534" instrument_node="">The Ajanta Caves are approximately 30 rock-cut Buddhist cave monuments dating from the 2nd century BCE to about 480 CE in the Aurangabad district of Maharashtra state in India . [1] [note 1] The caves include paintings and rock-cut sculptures described as among the finest surviving examples of ancient Indian art , particularly expressive paintings that present emotions through gesture, pose and form. [3] [4] [5] Cave 19, Ajanta, a 5th-century chaitya hall. They are universally regarded as masterpieces of Buddhist religious art . The caves were built in two phases, the first starting around the 2nd century BCE and the second occurring from 400 to 650 CE, according to older accounts, or in a brief period of 460–480 CE according to later scholarship. [6] The site is a protected monument in the care of the Archaeological Survey of India , [7] and since 1983, the Ajanta Caves have been a UNESCO World Heritage Site . The Ajanta Caves constitute ancient monasteries and worship-halls of different Buddhist traditions carved into a 75-metre (246&nbsp;ft) wall of rock. [8] [9] The caves also present paintings depicting the past lives [10] and rebirths of the Buddha, pictorial tales from Aryasura's Jatakamala , and rock-cut sculptures of Buddhist deities. [8] [11] [12] Textual records suggest that these caves served as a monsoon retreat for monks, as well as a resting site for merchants and pilgrims in ancient India. [8] While vivid colours and mural wall-painting were abundant in Indian history as evidenced by historical records, Caves 16, 17, 1 and 2 of Ajanta form the largest corpus of surviving ancient Indian wall-painting. [13] Panoramic view of Ajanta Caves from the nearby hill The Ajanta Caves are mentioned in the memoirs of several medieval-era Chinese Buddhist travellers to India and by a Mughal-era official of Akbar era in the early 17th century. [14] They were covered by jungle until accidentally "discovered" and brought to Western attention in 1819 by a colonial British officer Captain John Smith on a tiger-hunting party. [15] The caves are in the rocky northern wall of the U-shaped gorge of the river Waghur , [16] in the Deccan plateau . [17] [18] Within the gorge are a number of waterfalls, audible from outside the caves when the river is high. [19] With the Ellora Caves , Ajanta is one of the major tourist attractions of Maharashtra . It is about 6 kilometres (3.7 miles) from Fardapur , 59 kilometres (37 miles) from the city of Jalgaon , Maharashtra , India ,  104 kilometres (65 miles) from the city of Aurangabad , and 350 kilometres (220 miles) east-northeast of Mumbai . [8] [20] Ajanta is 100 kilometres (62 miles) from the Ellora Caves, which contain Hindu , Jain and Buddhist caves, the last dating from a period similar to Ajanta. The Ajanta style is also found in the Ellora Caves and other sites such as the Elephanta Caves , Aurangabad Caves , Shivleni Caves and the cave temples of Karnataka . [21] The Ajanta Caves are generally agreed to have b</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="3526" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="3529" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3530"><svg data-dcnode-id="3531" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 1.874c.15.03.304.034.461.051v1.378l-.477-.032A4.07 4.07 0 0 1 9.073 13.1c-.771-.891-1.103-1.932-.994-3.103.093-1.002.513-1.853 1.229-2.563l3.25-3.23c.859-.847 1.906-1.246 3.11-1.199a4.01 4.01 0 0 1 2.678 1.128 4.01 4.01 0 0 1 1.302 3.112 3.996 3.996 0 0 1-1.161 2.77l-1.421 1.418a.256.256 0 0 1-.032.027l-.719-1.217zm-8.784 3.697-.973.969a2.744 2.744 0 0 0-.028 3.881 2.77 2.77 0 0 0 3.909.044l3.31-3.301c.764-.782.987-1.732.651-2.769s-1.083-1.651-2.155-1.871l-.137-.021V9.508c.383.031.511.031.774.111 1.639.502 2.648 1.578 2.973 3.237.274 1.395-.124 2.637-1.123 3.658l-3.311 3.301c-.725.715-1.607 1.101-2.625 1.175-2.082.152-3.982-1.284-4.365-3.323-.264-1.409.106-2.652 1.098-3.695l1.413-1.411c.011-.011.474.813.78 1.204l-.192.174z" data-dcnode-id="3532" fill="#666" fill-rule="evenodd"></path></svg></span></span><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-wordBreak--break-all qu-color--gray_light qu-passColorToLinks" data-dcnode-id="3527" style="box-sizing: border-box; width: 100%;" width="100%"><span data-dcnode-id="3528" instrument_node="">https://en.m.wikipedia.org/wiki/Ajanta_Caves</span></div></div></div></div></div></div><div class="q-absolute qu-hover--cursor--pointer qu-hover--bg--darken qu-zIndex--base qu-display--flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3521" style="box-sizing: border-box; position: absolute; inset: 0px;"></div></div></a><span data-dcnode-id="3518" instrument_node=""> </span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.m.wikipedia.org/wiki/Ellora_Caves" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="en.m.wikipedia.org"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="3498" style="box-sizing: border-box; position: relative;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="3500" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="3515" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="3517" style="box-sizing: border-box; background-image: url(&quot;https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Ellora_Caves%2C_India%2C_Kailasanatha_Temple_2.jpg/640px-Ellora_Caves%2C_India%2C_Kailasanatha_Temple_2.jpg&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="3516" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="3501" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="3502" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3503" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="3513" style="box-sizing: border-box;"><span data-dcnode-id="3514" instrument_node="">Ellora Caves - Wikipedia</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="3511" style="box-sizing: border-box;"><span data-dcnode-id="3512" instrument_node="">Ellora (\e-ˈlȯr-ə\, IAST : Vērūḷ ) is a UNESCO World Heritage Site located in the Aurangabad district of Maharashtra , India . It is one of the largest rock-cut Hindu temple cave complexes in the world, with artwork dating from the period 600–1000 CE. [1] [2] Cave 16 features the largest single monolithic rock excavation in the world, the Kailash temple , a chariot-shaped monument dedicated to Lord Shiva . The Kailash temple excavation also features sculptures depicting the gods, goddesses found in Hinduism as well as relief panels summarizing the two major Hindu Epics . [3] [4] [5] There are over 100 caves at the site, all excavated from the basalt cliffs in the Charanandri Hills, 34 of which are open to public. [3] These consist of 17 Hindu (caves 13–29), 12 Buddhist (caves 1–12) and 5 Jain (caves 30–34) caves, [6] [7] each group representing deities and mythologies prevalent in the 1st millennium CE, as well as monasteries of each respective religion. [6] They were built close to one another and illustrate the religious harmony that existed in ancient India. [2] [8] All of the Ellora monuments were built during the Rashtrakuta dynasty , which constructed part of the Hindu and Buddhist caves, and the Yadava dynasty , which constructed a number of the Jain caves. Funding for the construction of the monuments was provided by royals, traders and the wealthy of the region. [3] [9] Although the caves served as temples and a rest stop for pilgrims, [7] the site's location on an ancient South Asian trade route also made it an important commercial centre in the Deccan region. [10] It is 29 kilometres (18 miles) north-west of Aurangabad , and about 300 kilometres (190 miles) east-northeast of Mumbai . Today, the Ellora Caves, along with the nearby Ajanta Caves , are a major tourist attraction in the Marathwada region of Maharashtra and a protected monument under the Archaeological Survey of India (ASI). [11] Etymology Edit Ellora, also called Verul or Elura, is the short form of the ancient name Elloorpuram . [12] The older form of the name has been found in ancient references such as the Baroda inscription of 812 CE which mentions "the greatness of this edifice" and that "this great edifice was built on a hill by Krishnaraja at Elapura, the edifice in the inscription being the Kailasa temple. [3] In the Indian tradition, each cave is named and has a suffix Guha (Sanskrit), Lena or Leni (Marathi), meaning cave. [3] [13] Ellora Caves, general map (the rock is depicted as dark green) The Ellora caves are situated in state of Maharashtra about 29 kilometres (18 miles) northwest of the city of Aurangabad , 300 kilometres (190 miles) east-northeast of Mumbai , 235 kilometres (146 miles) from Pune and about 100 kilometres (62 miles) west of the Ajanta Caves , 2.3 kilometres (1.42 miles) from Grishneshwar Temple (India). Ellora occupies a relatively flat rocky region of the Western Ghats , where ancient volcanic activity had created multilayered basalt formati</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="3504" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="3507" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: id="3153"><div class="q-box unzoomed" data-dcnode-id="3154" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-ea9a60d0de0d6189f003a6d5e600514d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3149" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3150" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3151" instrument_node="">I came back recently from China, and off course I visited Tienanmen Square and The Forbidden City, ( What a beautiful structures, man, my eye balls rolled, very nicely preserved ) and a miracle in my view The Great Wall of China? Chinese people and China both are very proud of their heritage, and show case these massive buildings to the coming generations and the world. My hats off to them and one of most oldest continuous civilization.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3145" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3146"><div class="q-box unzoomed" data-dcnode-id="3147" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3148" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-40e5185253d0b9a2c807ba25506b3f18-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><span data-dcnode-id="3144" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="3140" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3141"><div class="q-box unzoomed" data-dcnode-id="3142" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b95e1f21485a2f486af8ce69dba31a71-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3137" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3138" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3139" instrument_node="">These buildings as I saw were empty, well kept, well preserved, and some of the rooms were left as they were originally.</span></span></p><span data-dcnode-id="3136" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3133" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3134" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3135" instrument_node="">I was very fortunately to see some of the spots where “ The Last Emperor “ was filmed, this world famous film is one of the rare film, ever allowed by Chinese Government to be filmed in the famous “ Forbidden City” I was also very fortunate to see the court where “ The last emperor “ hid the insect in a tiny box. My experience was total magically, emotional and mesmerizing</span></span></p><span data-dcnode-id="3132" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3129" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3130" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3131" instrument_node="">This is one of the huge complexes in the prime land of Beijing, to the best of my understanding it is used for ceremonial or big public functions or extreme cultural values, history and tremendous amount of pride. It is biggest tourist attraction, and I believe every Chinese want to see in life time.</span></span></p><span data-dcnode-id="3128" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3125" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3126" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3127" instrument_node="">with best regards</span></span></p><span data-dcnode-id="3124" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3121" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3122" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3123" instrument_node="">sam</span></span></p><span data-dcnode-id="3120" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3117" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3118" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3119" instrument_node="">I am going back in November and then several following trips.</span></span></p><span data-dcnode-id="3116" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode- id="864" instrument_node="">Most outstanding feature: It’s the largest imperial palace in the world.</span></span></p><span data-dcnode-id="861" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="858" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="859" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="860" instrument_node="">Things to see: imperial living and governing quarters, valuable artworks, and traditional gardens</span></span></p><span data-dcnode-id="857" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="854" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="855" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="856" instrument_node="">Time needed: at least 2–3 hours</span></span></p><span data-dcnode-id="853" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="850" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="851" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="852" instrument_node="">Location: the center of Beijing, north of Tian’anmen Square</span></span></p><span data-dcnode-id="849" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="846" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="847" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="848" instrument_node="">Open: 8:30am–5:30pm or 8:30am–5pm off-peak; closed on Mondays</span></span></p><span data-dcnode-id="845" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="842" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="843" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="844" instrument_node="">Entry: 60 yuan April–October; 40 yuan November–March</span></span></p><span data-dcnode-id="841" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="838" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="839" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="840" instrument_node="">10 Numbers to Describe the Forbidden City</span></span></p><span data-dcnode-id="837" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="834" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="835" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="836" instrument_node="">1. The Forbidden City took 14 years to build (from 1406 to 1420).</span></span></p><span data-dcnode-id="833" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="830" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="831" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="832" instrument_node="">2. It was built by over 1,000,000 workers, including more than 100,000 craftsmen.</span></span></p><span data-dcnode-id="829" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="826" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="827" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="828" instrument_node="">3. It was the imperial palace of China for 492 years (1420–1912).</span></span></p><span data-dcnode-id="825" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="822" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="823" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="824" instrument_node="">4. It was the home of 24 emperors — 14 of the Ming dynasty and 10 of the Qing dynasty</span></span></p><span data-dcnode-id="821" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="818" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="819" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="820" instrument_node="">5. It covers 0.72 sq km (0.28 sq mi), of which 15 hectares (38 acres) are floor area.</span></span></p><span data-dcnode-id="817" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="814" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="816" instrument_node="">6. It has 980 buildings in over 70 palace compounds, with over 8,700 rooms.</span></span></p><span data-dcnode-id="813" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="810" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="811" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="812" instrument_node="">7. It is 961 meters long from south to north and 753 meters wide.</span></span></p><span data-dcnode-id="809" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="806" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="807" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="808" instrument_node="">8. It is surrounded by a 10-meter-high wall, which is 3.4 km (2 miles) long.</span></span></p><span data-dcnode-id="805" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="802" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="803" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="804" instrument_node="">9. It has a 52-meter wide moat round it.</span></span></p><span data-dcnode-id="801" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="798" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="799" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="800" instrument_node="">10. It hosts 14 million visitors per year, a maximum of 80,000 visitors per day.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="731" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="732" style="box-sizing: border-box; transition-property: box-shadow; transition-durat
