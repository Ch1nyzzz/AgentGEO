</span><div class="content" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">I am currently teaching an ESL class made up of Chinese students studying at the high beginner level.  The school where I teach allows me to show movies once a week to the students.  So far, they have watched the movies "Mulan", "Up" and "Twas The Night Before Christmas".  For next semester, I will show the movie "Snow Dogs" and I am thinking of having them watch "Lassie Come Home".  Could someone please recommend other movies that would be appropriate to show?  Thanks in advance for your help!</span></div><span data-dcnode-id="2354" instrument_node="">
</span></div><span data-dcnode-id="2352" instrument_node="">

</span><h3 data-dcnode-id="2295"><span data-dcnode-id="2299" instrument_node="">
</span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15326%23p15326"><span data-dcnode-id="2298" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="2296" instrument_node="">
</span></h3><span data-dcnode-id="2294" instrument_node="">
</span><p class="author" data-dcnode-id="2278"><span data-dcnode-id="2293" instrument_node="">
</span><span data-dcnode-id="2289"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="2292"></i><span class="sr-only" data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Unread post</span></span></span><span data-dcnode-id="2288" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="2282"><span data-dcnode-id="2287" instrument_node="">by </span><strong data-dcnode-id="2284"><span class="username" data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">rwells</span></span></strong><span data-dcnode-id="2283" instrument_node=""> » </span></span><time data-dcnode-id="2280" datetime="2011-02-08T20:12:34+00:00"><span data-dcnode-id="2281" instrument_node="">Tue Feb 08, 2011 8:12 pm</span></time><span data-dcnode-id="2279" instrument_node="">
</span></p><span data-dcnode-id="2277" instrument_node="">
</span><div class="content" data-dcnode-id="2248"><span data-dcnode-id="2276" instrument_node="">Movies are definitely a fun way to have students hear the language at the pace it is used in everyday life. When teaching in Korea I found the animated film </span><em class="text-italics" data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">The Iron Giant</span></em><span data-dcnode-id="2273" instrument_node=""> to be enjoyable for both children and adults. Showing DVDs with English subtitles is a good idea, as it allows students to read words they may not have understood aurally. In addition to discussing the characters or plot of the movie upon finishing, it can also be a good opportunity to create various activities related to the film.</span><br data-dcnode-id="2272"><span data-dcnode-id="2271" instrument_node="">
</span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">
If you are looking for movies to show absolute beginners (not so much for language comprehension, but just for fun), </span><em class="text-italics" data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Mr. Bean</span></em><span data-dcnode-id="2266" instrument_node=""> episodes, especially </span><em class="text-italics" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Merry Christmas Mr. Bean</span></em><span data-dcnode-id="2263" instrument_node="">, always get a good laugh. And I'm not just saying that because my name is Rowan!</span><br data-dcnode-id="2262"><span data-dcnode-id="2261" instrument_node="">
</span><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node="">
My classroom also had a good internet connection and large monitor, so I was able to incorporate Youtube video's related to the subject matter to engage the students and stimulate discussion.</span><br data-dcnode-id="2258"><span data-dcnode-id="2257" instrument_node="">
</span><br data-dcnode-id="2256"><span data-dcnode-id="2255" instrument_node="">
Enjoy!</span><br data-dcnode-id="2254"><span data-dcnode-id="2253" instrument_node="">
</span><br data-dcnode-id="2252"><span data-dcnode-id="2251" instrument_node="">
Rowan Wells</span><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">
Oxford Seminars</span></div><span data-dcnode-id="2247" instrument_node="">

</span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15356%23p15356"><span data-dcnode-id="2191" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="2189" instrument_node="">
</span></h3><span data-dcnode-id="2187" instrument_node="">
</span><p class="author" data-dcnode-id="2171"><span data-dcnode-id="2186" instrument_node="">
</span><span data-dcnode-id="2182"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="2185"></i><span class="sr-only" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Unread post</span></span></span><span data-dcnode-id="2181" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="2175"><span data-dcnode-id="2180" instrument_node="">by </span><strong data-dcnode-id="2177"><span class="username" data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">samuel</span></span></strong><span data-dcnode-id="2176" instrument_node=""> » </span></span><time data-dcnode-id="2173" datetime="2011-02-17T16:52:20+00:00"><span data-dcnode-id="2174" instrument_node="">Thu Feb 17, 2011 4:52 pm</span></time><span data-dcnode-id="2172" instrument_node="">
</span></p><span data-dcnode-id="2170" instrument_node="">
</span><div class="content" data-dcnode-id="2128"><span data-dcnode-id="2169" instrument_node="">Movies should be watched a lot more in the language classroom because they are an excellent source for authentic language that is produced at a normal rate. Depending on the level of English, I would consider always leaving subtitles on unless students are very skilled. Interesting movies that would be enjoyable are animations and comedies! For example, any Adam Sandler movie will always be a hit in the classroom! I would probably show the movie Click personally because it has a great message behind it. You can teach that to your students. </span><br data-dcnode-id="2168"><span data-dcnode-id="2167" instrument_node="">
Regarding animations, Shrek is always quite appreciated and is easily usable to create fun post-viewing activities. </span><br data-dcnode-id="2166"><span data-dcnode-id="2165" instrument_node="">
</span><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">
A list of good movies:</span><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">
</span><br data-dcnode-id="2160"><span data-dcnode-id="2159" instrument_node="">
-Mr. Deeds</span><br data-dcnode-id="2158"><span data-dcnode-id="2157" instrument_node="">
-50 first dates</span><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node="">
-Big Daddy</span><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">
-Billy Madison</span><br data-dcnode-id="2152"><span data-dcnode-id="2151" instrument_node="">
-Happy Gilmore</span><br data-dcnode-id="2150"><span data-dcnode-id="2149" instrument_node="">
</span><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node="">
Animations:</span><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">
</span><br data-dcnode-id="2144"><span data-dcnode-id="2143" instrument_node="">
-Toy story</span><br data-dcnode-id="2142"><span data-dcnode-id="2141" instrument_node="">
-The aristocats</span><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">
-Bambi</span><br data-dcnode-id="2138"><span data-dcnode-id="2137" instrument_node="">
-Ice age</span><br data-dcnode-id="2136"><span data-dcnode-id="2135" instrument_node="">
-Antz</span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">
-Finding Nemo</span><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">
</span><br data-dcnode-id="2130"><span data-dcnode-id="2129" instrument_node="">
There are so many great movies out there! The list could go on and on and on!</span></div><span data-dcnode-id="2127" instrument_node="">

</span><h3 data-dcnode-id="2068"><span data-dcnode-id="2072" instrument_node="">
</span><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15409%23p15409"><span data-dcnode-id="2071" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="2069" instrument_node="">
</span></h3><span data-dcnode-id="2067" instrument_node="">
</span><p class="author" data-dcnode-id="2051"><span data-dcnode-id="2066" instrument_node="">
</span><span data-dcnode-id="2062"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="2065"></i><span class="sr-only" data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Unread post</span></span></span><span data-dcnode-id="2061" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="2055"><span data-dcnode-id="2060" instrument_node="">by </span><strong data-dcnode-id="2057"><span class="username" data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">JEEPY</span></span></strong><span data-dcnode-id="2056" instrument_node=""> » </span></span><time data-dcnode-id="2053" datetime="2011-02-24T14:48:19+00:00"><span data-dcnode-id="2054" instrument_node="">Thu Feb 24, 2011 2:48 pm</span></time><span data-dcnode-id="2052" instrument_node="">
</span></p><span data-dcnode-id="2050" instrument_node="">
</span><div class="content" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Samuel, I totally agree with you. I think integrating movies is an awesome idea in ESL teaching. As far as I am concerned, I believe that there shouldn't be any taboos in an ESL classroom and thus almost every movie can be used (as long as they use relevant English material and that they lead to a discussion). Also, students tend to be more involved in the movie if they watch something unexpected or something that can be considered harsh. One movie I would recommend watching in class is American beauty: awesome movie and you have a lot you can say about it. Also, maybe you can share movies you really enjoyed when you were their age (they probably didn't see). Also, make sure they didn't see the movie (if more than 5 students have seen it, scratch it from the list). There you go buddy.</span></div><span data-dcnode-id="2047" instrument_node="">
</span></div><span data-dcnode-id="2045" instrument_node="">

</span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15430%23p15430"><span data-dcnode-id="1991" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="1989" instrument_node="">
</span></h3><span data-dcnode-id="1987" instrument_node="">
</span><p class="author" data-dcnode-id="1971"><span data-dcnode-id="1986" instrument_node="">
</span><span data-dcnode-id="1982"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="1985"></i><span class="sr-only" data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Unread post</span></span></span><span data-dcnode-id="1981" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1975"><span data-dcnode-id="1980" instrument_node="">by </span><strong data-dcnode-id="1977"><span class="username" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">MikeV</span></span></strong><span data-dcnode-id="1976" instrument_node=""> » </span></span><time data-dcnode-id="1973" datetime="2011-02-24T15:01:58+00:00"><span data-dcnode-id="1974" instrument_node="">Thu Feb 24, 2011 3:01 pm</span></time><span data-dcnode-id="1972" instrument_node="">
</span></p><span data-dcnode-id="1970" instrument_node="">
</span><div class="content" data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">If you want to help them practice their understanding of English through movies, I suggest you first show them animation movies such as the ones samuel suggested (Toy Story series, Ice age series, etc.). With a colorful visual support, it is always easier to understand the dialogues. If needed, there are always the subtitles you can use. I personally like the Shrek series a lot, as they incorporate humour and morals through an easy speech with an easy-to-understand story. The story of each movie (there are 4) refers to well known fairy tales characters as well. If you wanted to make short questionnaires on the movies, you could even refer on these. It would be appropriate if you wanted to include extra cultural information to your teaching! However, if you find good movies that are not animated and are easy to understand, go ahead. It is always enjoyable for students when they can understand the story. I think comedies are the easiest ones you could pick for your students' comprehension. Note that I never taught english as foreign language therefore I can only imagine what it is like! I hope I helped you!</span></div><span data-dcnode-id="1967" instrument_node="">

</span><h3 data-dcnode-id="1905"><span data-dcnode-id="1909" instrument_node="">
</span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15434%23p15434"><span data-dcnode-id="1908" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="1906" instrument_node="">
</span></h3><span data-dcnode-id="1904" instrument_node="">
</span><p class="author" data-dcnode-id="1888"><span data-dcnode-id="1903" instrument_node="">
</span><span data-dcnode-id="1899"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="1902"></i><span class="sr-only" data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Unread post</span></span></span><span data-dcnode-id="1898" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1892"><span data-dcnode-id="1897" instrument_node="">by </span><strong data-dcnode-id="1894"><span class="username" data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">amrif</span></span></strong><span data-dcnode-id="1893" instrument_node=""> » </span></span><time data-dcnode-id="1890" datetime="2011-02-24T15:05:29+00:00"><span data-dcnode-id="1891" instrument_node="">Thu Feb 24, 2011 3:05 pm</span></time><span data-dcnode-id="1889" instrument_node="">
</span></p><span data-dcnode-id="1887" instrument_node="">
</span><div class="content" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Movies are a great way for students to relax/unwind and learn all at the same time.  They will want to understand what is happening so they will focus and force themselves to listen and learn. I would say that animated/cartoon movies are always a great choice. They do not use the most complicated language, and the story lines are pretty straight-forward. Any Disney or Pixar movie is a great choice. Some of them have already been mentioned: Toy Story, Finding Nemo, and Ice Age.  Another thing that teachers can use in their class, are television series. They are shorter (between 30min-1hr) and this is very useful in a classroom environment.</span></div><span data-dcnode-id="1884" instrument_node="">

</span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15436%23p15436"><span data-dcnode-id="1828" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="1826" instrument_node="">

</span><p class="author" data-dcnode-id="1808"><span data-dcnode-id="1823" instrument_node="">
</span><span data-dcnode-id="1819"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="1822"></i><span class="sr-only" data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Unread post</span></span></span><span data-dcnode-id="1818" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1812"><span data-dcnode-id="1817" instrument_node="">by </span><strong data-dcnode-id="1814"><span class="username" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">cyndie</span></span></strong><span data-dcnode-id="1813" instrument_node=""> » </span></span><time data-dcnode-id="1810" datetime="2011-02-24T15:06:03+00:00"><span data-dcnode-id="1811" instrument_node="">Thu Feb 24, 2011 3:06 pm</span></time><span data-dcnode-id="1809" instrument_node="">
</span></p><span data-dcnode-id="1807" instrument_node="">
</span><div class="content" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">I think that movies are en excellent way to improve students' knowledge of English while having fun. Some movies are very interestig for kids and adults as well. I'm thinking about animation movies like Shrek or How to train your dragon. These are all movies that are perfect for students of 10 years old or around that age. In a later stage, teachers could even provide questions for the learners to pay a close attention to the movie dialogue. Having closed captioning movies is also a good way to improve students' reading skills. Overall, I think that movies are more than useful for leanres to improve their English.</span></div><span data-dcnode-id="1804" instrument_node="">

</span><a data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15440%23p15440"><span data-dcnode-id="1745" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="1743" instrument_node="">
</span></h3><span data-dcnode-id="1741" instrument_node="">
</span><p class="author" data-dcnode-id="1725"><span data-dcnode-id="1740" instrument_node="">
</span><span data-dcnode-id="1736"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="1739"></i><span class="sr-only" data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Unread post</span></span></span><span data-dcnode-id="1735" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1729"><span data-dcnode-id="1734" instrument_node="">by </span><strong data-dcnode-id="1731"><span class="username" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">samantha</span></span></strong><span data-dcnode-id="1730" instrument_node=""> » </span></span><time data-dcnode-id="1727" datetime="2011-02-24T15:10:21+00:00"><span data-dcnode-id="1728" instrument_node="">Thu Feb 24, 2011 3:10 pm</span></time><span data-dcnode-id="1726" instrument_node="">
</span></p><span data-dcnode-id="1724" instrument_node="">
</span><div class="content" data-dcnode-id="1720"><span data-dcnode-id="1723" instrument_node="">Movies are a great way for students to learn English. Depending on the students level of English you way want to consider the length of the motion picture you are showing. Movies are great because teachers can choose to present the motion picture with or without subtitles. The subtitles will help students follow the story. </span><br data-dcnode-id="1722"><span data-dcnode-id="1721" instrument_node="">
For less advanced learners, watching short television episodes can be a great way for students to learn English in context. Since the episode is short, you can also view the show more than once. Two viewings of the episode allow students to grasp the content, and it’s also a good way to make sure that they have understood everything. Before viewing a second time, teachers can allow students to ask questions to clarify certain misunderstandings. Then, once they watch it a second time, they understand even better.</span></div><span data-dcnode-id="1719" instrument_node="">

</span><div class="content" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">For elementary students any movies similar to Shrek or Ice Age are more than appropriate. These movies are amusing on two very different level: the actions and the conversations or topics are quite funny. This why I believe that these movies could still be appropriate for high school learners. On the secondary level, it is more difficult to choose the right movie since at this age, most of the students enjoy movies that simply couldn't be show at school. Many teachers like to ask the students what movie they would like to watch. It is not a bad idea, however you have to make sure that the movie is appropriate for every students. Watching the movie before is more than required. On the other hand, you are sure that they will enjoy the movie. However, please use your judgment!</span></div><span data-dcnode-id="1639" instrument_node="">
</span></div><span data-dcnode-id="1637" instrument_node="">

</span><h3 data-dcnode-id="1580"><span data-dcnode-id="1584" instrument_node="">
</span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15452%23p15452"><span data-dcnode-id="1583" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="1581" instrument_node="">
</span></h3><span data-dcnode-id="1579" instrument_node="">
</span><p class="author" data-dcnode-id="1563"><span data-dcnode-id="1578" instrument_node="">
</span><span data-dcnode-id="1574"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="1577"></i><span class="sr-only" data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Unread post</span></span></span><span data-dcnode-id="1573" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1567"><span data-dcnode-id="1572" instrument_node="">by </span><strong data-dcnode-id="1569"><span class="username" data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">jetar</span></span></strong><span data-dcnode-id="1568" instrument_node=""> » </span></span><time data-dcnode-id="1565" datetime="2011-02-24T15:24:31+00:00"><span data-dcnode-id="1566" instrument_node="">Thu Feb 24, 2011 3:24 pm</span></time><span data-dcnode-id="1564" instrument_node="">
</span></p><span data-dcnode-id="1562" instrument_node="">
</span><div class="content" data-dcnode-id="1558"><span data-dcnode-id="1561" instrument_node="">First I want to say that it is good that your school allows you to have your beginner ESL learners watch movies in English every week.  Since movies are authentic materials which provide a lot of input and visual support, I think it will help your students a lot.</span><br data-dcnode-id="1560"><span data-dcnode-id="1559" instrument_node="">
To answer your question, I do not have specific movie suggestions for you.  However, I think it would be a good idea to ask your students what kind of movies they would like to watch.  If the movies are related to their interests, it will motivate them a lot.  You could also ask them to give you titles of movies they already saw and liked.  Since they would have already seen them in their native language, it could help them to better understand the English version.</span></div><span data-dcnode-id="1557" instrument_node="">

</span><h3 data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">
</span><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15501%23p15501"><span data-dcnode-id="1501" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="1499" instrument_node="">
</span></h3><span data-dcnode-id="1497" instrument_node="">
</span><p class="author" data-dcnode-id="1481"><span data-dcnode-id="1496" instrument_node="">
</span><span data-dcnode-id="1492"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="1495"></i><span class="sr-only" data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Unread post</span></span></span><span data-dcnode-id="1491" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1485"><span data-dcnode-id="1490" instrument_node="">by </span><strong data-dcnode-id="1487"><span class="username" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">eigonosekai</span></span></strong><span data-dcnode-id="1486" instrument_node=""> » </span></span><time data-dcnode-id="1483" datetime="2011-03-03T15:27:52+00:00"><span data-dcnode-id="1484" instrument_node="">Thu Mar 03, 2011 3:27 pm</span></time><span data-dcnode-id="1482" instrument_node="">
</span></p><span data-dcnode-id="1480" instrument_node="">
</span><div class="content" data-dcnode-id="1474"><span data-dcnode-id="1479" instrument_node="">There is always a way to use different kinds of movies in the classroom. Last semester, I prepared an Halloween activity for my 6 graders on scary movies. This may sound wrong, but I carefully chose a few scenes from popular movies suitable for them (Hocus Pocus, Poltergueist, Goosebumps and Signs). They loved it and they even asked their parents if they could watch the full movie at home. The scenes I selected did not show unsuitable content such as blood, violence, gore, super scary stuff, etc. Plus, if students were interested in watching the full movie, their parents had the possibility to refuse and ask them to wait until they feel their kids are old enough to watch it.  </span><br data-dcnode-id="1478"><span data-dcnode-id="1477" instrument_node="">
''Suitable'' movies for the classroom also mean that you have to present movies which have proper language content (no bad language, appropriate language level).</span><br data-dcnode-id="1476"><span data-dcnode-id="1475" instrument_node="">
Some documentaries can also be very interesting to show to your students.</span></div><span data-dcnode-id="1473" instrument_node="">

</span><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D15541%23p15541"><span data-dcnode-id="1414" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="1412" instrument_node="">
</span></h3><span data-dcnode-id="1410" instrument_node="">
</span><p class="author" data-dcnode-id="1394"><span data-dcnode-id="1409" instrument_node="">
</span><span data-dcnode-id="1405"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="1408"></i><span class="sr-only" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Unread post</span></span></span><span data-dcnode-id="1404" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1398"><span data-dcnode-id="1403" instrument_node="">by </span><strong data-dcnode-id="1400"><span class="username" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">paddyinthailand</span></span></strong><span data-dcnode-id="1399" instrument_node=""> » </span></span><time data-dcnode-id="1396" datetime="2011-03-11T15:22:32+00:00"><span data-dcnode-id="1397" instrument_node="">Fri Mar 11, 2011 3:22 pm</span></time><span data-dcnode-id="1395" instrument_node="">
</span></p><span data-dcnode-id="1393" instrument_node="">
</span><div class="content" data-dcnode-id="1381"><span data-dcnode-id="1392" instrument_node="">Hi,</span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">
I teach primary school kids and while a lot of the animated cartoons of Disney/Pixar are good, some of the English used can be way above the level of my beginner students.  However, I have found a couple of movies with content suitable for kids, an appropriately easy level of English and plots which the kids found thoroughly engaging.</span><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
</span><br data-dcnode-id="1387"><span data-dcnode-id="1386" instrument_node="">
Both The Karate Kid(2010) and E.T.(1981) use readily accessible English and are entertaining movies to boot.  There are plenty of scenes where the English used is useful even for very low-level beginners.  The scene where Elliott names and explains the functions of various household items to E.T. is a perfect example.</span><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">
</span><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">
Hopw they prove useful to some of you.</span></div><span data-dcnode-id="1380" instrument_node="">

</span></h3><span data-dcnode-id="1320" instrument_node="">
</span><p class="author" data-dcnode-id="1304"><span data-dcnode-id="1319" instrument_node="">
</span><span data-dcnode-id="1315"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="1318"></i><span class="sr-only" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Unread post</span></span></span><span data-dcnode-id="1314" instrument_node="">

</span></p><span data-dcnode-id="1303" instrument_node="">
</span><div class="content" data-dcnode-id="1200"><span data-dcnode-id="1302" instrument_node="">Although I agree with most, I won't repeat what people have written about the great benefits movies can provide. </span><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">
</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">
I would like to try to add some information and tips:</span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">
</span><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">
1. The movies you watch with students should be appropriate for the age level. I don't show movies with excessive sex, drugs, language, violence ect. to my high school students. (They can watch those on their own).</span><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">
</span><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node="">
2. Decide whether the movie is a learning tool or just entertainment. If it's just entertainment, don't waste their time and money by doing a movie in class.</span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">
</span><br data-dcnode-id="1287"><span data-dcnode-id="1286" instrument_node="">
Many of the titles listed in this forum have so much slapstick comedy and visuals, that the students will tend to focus on that instead of trying to understand the dialogue and messages of the movie. A healthy combination of visuals/slapstick comedy and comprehensible dialogue is great. </span><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">
</span><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">
3. Try to show movies that will give ESL students a better understanding of another culture. Right now I am working with students who will go to college in the U.S. so I pick movies that will show American culture, particularly high school/college life. </span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">
</span><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">
4. </span><strong class="text-strong" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Pre-teach blocking vocab.</span></strong><span data-dcnode-id="1275" instrument_node=""> Try to integrate it into your class in the days preceding the movie. </span><br data-dcnode-id="1274"><span data-dcnode-id="1273" instrument_node="">
</span><br data-dcnode-id="1272"><span data-dcnode-id="1271" instrument_node="">
5. Have the students write a summary, or a description of their favorite character, so that they actually pay attention to the movie, not just the visuals, and reflect on the content of the movie in English. </span><br data-dcnode-id="1270"><span data-dcnode-id="1269" instrument_node="">
</span><br data-dcnode-id="1268"><span data-dcnode-id="1267" instrument_node="">
6. Try to show movies they have not already seen. (I know someone has said this already). This may cancel out any movie made in the past ten years;)  If they have already seen the dubbed version, they may not pay attention as much to the language, as they already know what is being said and what will happen. Also, they may be bored.</span><br data-dcnode-id="1266"><span data-dcnode-id="1265" instrument_node="">
</span><br data-dcnode-id="1264"><span data-dcnode-id="1263" instrument_node="">
The language in older movies seems easier to understand than newer movies anyway. Thin 80's and 90's. This may just be my perception. </span><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">
</span><br data-dcnode-id="1260"><span data-dcnode-id="1259" instrument_node="">
7. Get feedback after the movie. Did they like it? Why? Why not? What were their favorite parts? I also give them a few questions to answer during/after the movie. </span><br data-dcnode-id="1258"><span data-dcnode-id="1257" instrument_node="">
</span><br data-dcnode-id="1256"><span data-dcnode-id="1255" instrument_node="">
8. Subtitles or no subtitles? I try not to use them if they are not </span><span data-dcnode-id="1253" style="text-decoration:underline"><span data-dcnode-id="1254" instrument_node="">absolutely necessary</span></span><span data-dcnode-id="1252" instrument_node="">. The students tend to read more than listen if they are there, but I </span><em class="text-italics" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">do</span></em><span data-dcnode-id="1249" instrument_node=""> want them to understand. </span><br data-dcnode-id="1248"><span data-dcnode-id="1247" instrument_node="">
</span><br data-dcnode-id="1246"><span data-dcnode-id="1245" instrument_node="">
Here are a few movies I have done. Many are oldies but goodies. (They all reflect American culture/American holidays/high school life)</span><br data-dcnode-id="1244"><span data-dcnode-id="1243" instrument_node="">
</span><br data-dcnode-id="1242"><span data-dcnode-id="1241" instrument_node="">
</span><strong class="text-strong" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">I have pre-teach vocab lists and questions I made for each of these movies, which I would be happy to share if anyone is interested.</span></strong><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">
</span><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">
Little rascals</span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">
The sandlot</span><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">
Can't buy me love</span><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">
10 things I hate about you</span><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node="">
Mean girls</span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node="">
the goonies (they loved this)</span><br data-dcnode-id="1224"><span data-dcnode-id="1223" instrument_node="">
ghostbusters</span><br data-dcnode-id="1222"><span data-dcnode-id="1221" instrument_node="">
Back to the future</span><br data-dcnode-id="1220"><span data-dcnode-id="1219" instrument_node="">

Family vacation (for christmas)</span><br data-dcnode-id="1214"><span data-dcnode-id="1213" instrument_node="">
don't tell mom the babysitter's dead</span><br data-dcnode-id="1212"><span data-dcnode-id="1211" instrument_node="">
Clueless</span><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">
Encino man (i did a reading lesson on cave men the day before to prepare. This was a HUGE hit)</span><br data-dcnode-id="1208"><span data-dcnode-id="1207" instrument_node="">
ferris buellers day off</span><br data-dcnode-id="1206"><span data-dcnode-id="1205" instrument_node="">

home alone (also a good christmas movie)</span></div><span data-dcnode-id="1199" instrument_node="">

</span><h3 data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">
</span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D32649%23p32649"><span data-dcnode-id="873" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="871" instrument_node="">
</span></h3><span data-dcnode-id="869" instrument_node="">
</span><p class="author" data-dcnode-id="853"><span data-dcnode-id="868" instrument_node="">
</span><span data-dcnode-id="864"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="867"></i><span class="sr-only" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Unread post</span></span></span><span data-dcnode-id="863" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="857"><span data-dcnode-id="862" instrument_node="">by </span><strong data-dcnode-id="859"><span class="username" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Syl</span></span></strong><span data-dcnode-id="858" instrument_node=""> » </span></span><time data-dcnode-id="855" datetime="2016-05-22T12:22:38+00:00"><span data-dcnode-id="856" instrument_node="">Sun May 22, 2016 12:22 pm</span></time><span data-dcnode-id="854" instrument_node="">
</span></p><span data-dcnode-id="852" instrument_node="">
</span><div class="content" data-dcnode-id="814"><blockquote data-dcnode-id="820"><div data-dcnode-id="821"><cite data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Shmooie wrote:</span></cite><span data-dcnode-id="849" instrument_node="">Although I agree with most, I won't repeat what people have written about the great benefits movies can provide. </span><br data-dcnode-id="848"><span data-dcnode-id="847" instrument_node="">
</span><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">
I would like to try to add some information and tips:</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
1. The movies you watch with students should be appropriate for the age level. I don't show movies with excessive sex, drugs, language, violence ect. to my high school students. (They can watch those on their own).</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">
2. Decide whether the movie is a learning tool or just entertainment. If it's just entertainment, don't waste their time and money by doing a movie in class.</span><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node="">
</span><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node="">
Many of the titles listed in this forum have so much slapstick comedy and visuals, that the students will tend to focus on that instead of trying to understand the dialogue and messages of the movie. A healthy combination of visuals/slapstick comedy and comprehensible dialogue is great. </span><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">
</span><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">
3. Try to show movies that will give ESL students a better understanding of another culture. Right now I am working with students who will go to college in the U.S. so I pick movies that will show American culture, particularly high school/college life. </span><br data-dcnode-id="828"><span data-dcnode-id="827" instrument_node="">
</span><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
4. </span><strong class="text-strong" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Pre-teach blocking vocab.</span></strong><span data-dcnode-id="822" instrument_node=""> Try to integrate it into your class in the days preceding the movie. ..............</span></div></blockquote><span data-dcnode-id="819" instrument_node="">
I haven't copied everything, it's all written above....</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
</span><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
I totally agree with Shnooie! Movies must be studied by teachers before shown to learners. My humble advice: don't use them because you haven't prepared enough material for the lesson, like some teachers I know use to do. Check them first, this issue is very delicate and parents don't like their kids to be exposed to scenes or dialogues or even bad language that are intended for grown-ups.</span></div><span data-dcnode-id="813" instrument_node="">
</span></div><span data-dcnode-id="811" instrument_node="">
</span></div><span data-dcnode-id="809" instrument_node="">

</span><h3 data-dcnode-id="749"><span data-dcnode-id="755" instrument_node="">
</span><img alt="" data-dcnode-id="754" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/images/icons/misc/heart.gif&amp;raw" title="" width="16"><span data-dcnode-id="753" instrument_node="">
</span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.englishclub.com/tefl-forums/viewtopic.php%3Fp%3D32748%23p32748"><span data-dcnode-id="752" instrument_node="">Re: Suitable Movies for the ESL Classroom</span></a><span data-dcnode-id="750" instrument_node="">
</span></h3><span data-dcnode-id="748" instrument_node="">
</span><p class="author" data-dcnode-id="732"><span data-dcnode-id="747" instrument_node="">
</span><span data-dcnode-id="743"><i aria-hidden="true" class="icon fa-file fa-fw icon-red icon-md" data-dcnode-id="746"></i><span class="sr-only" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Unread post</span></span></span><span data-dcnode-id="742" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="736"><span data-dcnode-id="741" instrument_node="">by </span><strong data-dcnode-id="738"><span class="username" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">vcooke</span></span></strong><span data-dcnode-id="737" instrument_node=""> » </span></span><time data-dcnode-id="734" datetime="2016-06-21T06:50:48+00:00"><span data-dcnode-id="735" instrument_node="">Tue Jun 21, 2016 6:50 am</span></time><span data-dcnode-id="733" instrument_node="">
</span></p><span data-dcnode-id="731" instrument_node="">
</span><div class="content" data-dcnode-id="615"><blockquote data-dcnode-id="623"><div data-dcnode-id="624"><cite data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Shmooie wrote:</span></cite><span data-dcnode-id="728" instrument_node="">Although I agree with most, I won't repeat what people have written about the great benefits movies can provide. </span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
</span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node="">
I would like to try to add some information and tips:</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">
</span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
1. The movies you watch with students should be appropriate for the age level. I don't show movies with excessive sex, drugs, language, violence ect. to my high school students. (They can watch those on their own).</span><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">
</span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
2. Decide whether the movie is a learning tool or just entertainment. If it's just entertainment, don't waste their time and money by doing a movie in class.</span><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node="">
</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
Many of the titles listed in this forum have so much slapstick comedy and visuals, that the students will tend to focus on that instead of trying to understand the dialogue and messages of the movie. A healthy combination of visuals/slapstick comedy and comprehensible dialogue is great. </span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
3. Try to show movies that will give ESL students a better understanding of another culture. Right now I am working with students who will go to college in the U.S. so I pick movies that will show American culture, particularly high school/college life. </span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">
</span><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">
4. </span><strong class="text-strong" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Pre-teach blocking vocab.</span></strong><span data-dcnode-id="701" instrument_node=""> Try to integrate it into your class in the days preceding the movie. </span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">
</span><br data-dcnode-id="698"><span data-dcnode-id="697" instrument_node="">
5. Have the students write a summary, or a description of their favorite character, so that they actually pay attention to the movie, not just the visuals, and reflect on the content of the movie in English. </span><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node="">
</span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">
6. Try to show movies they have not already seen. (I know someone has said this already). This may cancel out any movie made in the past ten years;)  If they have already seen the dubbed version, they may not pay attention as much to the language, as they already know what is being said and what will happen. Also, they may be bored.</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">
</span><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">
The language in older movies seems easier to understand than newer movies anyway. Thin 80's and 90's. This may just be my perception. </span><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">
</span><br data-dcnode-id="686"><span data-dcnode-id="685" instrument_node="">
7. Get feedback after the movie. Did they like it? Why? Why not? What were their favorite parts? I also give them a few questions to answer during/after the movie. </span><br data-dcnode-id="684"><span data-dcnode-id="683" instrument_node="">
</span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">
8. Subtitles or no subtitles? I try not to use them if they are not </span><span data-dcnode-id="679" style="text-decoration:underline"><span data-dcnode-id="680" instrument_node="">absolutely necessary</span></span><span data-dcnode-id="678" instrument_node="">. The students tend to read more than listen if they are there, but I </span><em class="text-italics" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">do</span></em><span data-dcnode-id="675" instrument_node=""> want them to understand. </span><br data-dcnode-id="674"><span data-dcnode-id="673" instrument_node="">
</span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">
Here are a few movies I have done. Many are oldies but goodies. (They all reflect American culture/American holidays/high school life)</span><br data-dcnode-id="670"><span data-dcnode-id="669" instrument_node="">
</span><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">
</span><strong class="text-strong" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">I have pre-teach vocab lists and questions I made for each of these movies, which I would be happy to share if anyone is interested.</span></strong><br data-dcnode-id="664"><span data-dcnode-id="663" instrument_node="">
</span><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
Little rascals</span><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
The sandlot</span><br data-dcnode-id="658"><span data-dcnode-id="657" instrument_node="">
Can't buy me love</span><br data-dcnode-id="656"><span data-dcnode-id="655" instrument_node="">
10 things I hate about you</span><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">
Mean girls</span><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node="">
the goonies (they loved this)</span><br data-dcnode-id="650"><span data-dcnode-id="649" instrument_node="">
ghostbusters</span><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">
Back to the future</span><br data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">
Ernest scared stupid (for holloween)</span><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node="">
trains planes and automobiles</span><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">
Family vacation (for christmas)</span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">
don't tell mom the babysitter's dead</span><br data-dcnode-id="638"><span data-dcnode-id="637" instrument_node="">
Clueless</span><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">
Encino man (i did a reading lesson on cav</span><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">
e men the day before to prepare. This was a HUGE hit)</span><br data-dcnode-id="632"><span data-dcnode-id="631" instrument_node="">
ferris buellers day off</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">
bill and ted's excellent adventure</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
casper</span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">
home alone (also a good christmas movie)</span></div></blockquote><span data-dcnode-id="622" instrument_node="">
