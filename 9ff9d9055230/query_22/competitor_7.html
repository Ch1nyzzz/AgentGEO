.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="956" fill="#e7711b"></path></svg></span><span class="wp-star" data-dcnode-id="951"><svg data-dcnode-id="952" height="17" viewBox="0 0 1792 1792" width="17"><path d="M1728 647q0 22-26 48l-363 354 86 500q1 7 1 20 0 21-10.5 35.5t-30.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="953" fill="#e7711b"></path></svg></span></span></span><span class="wp-google-text" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">As an individual with an international profile who regularly conducts business and also has many personal relationships in China, I highly recommend the Perth Beijing School for mature students wishing to learn to speak, listen/understand, read and write Chinese language.The class sizes are modest and allow personal interaction with teachers and fellow students. The school staff are highly responsive to students at all times and the learning experience encapsulates cultural elements, as it progresses, by its very interesting nature.Now progressing through HSK2 level, we are blessed with the superb 'laoshi' Li Xiaoli with very high level teaching and language ability; far broader than Chinese alone. This level of professionalism strongly supports the learning experience. Not only is the learning experience positive and productive, the value-for-money of their teaching 'product' is very good.Highly recommend PBCS; five stars here!Dennis Parsons.</span></span></div></div></div><div class="wp-google-review" data-dcnode-id="916"><div class="wp-google-left" data-dcnode-id="942"><img alt="Dominique French" class="rplg-review-avatar rplg-blazy b-error" data-dcnode-id="943" data-src="https://lh3.googleusercontent.com/a/AATXAJwLzdfEUYc3OQeoqSa5dmadAqCTe-KSrSV1U_zM=s56-c0x00000000-c
