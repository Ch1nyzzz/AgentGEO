</span><p data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">The old lanes of the </span><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Beijing hutongs</span></strong><span data-dcnode-id="1241" instrument_node="">, many laid out hundreds of years ago during the Ming and Qing dynasty eras (1368-1912), retain some of the traditional culture and way of life of the past.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Visiting the Beijing hutongs for shopping, dining, and experiencing the street life is a way to get in touch with the everyday people and experience the daily life of people in Beijing.</span></p><span data-dcnode-id="1236" instrument_node="">

</span></div><span data-dcnode-id="1217" instrument_node="">
</span><h2 data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">What Is a Hutong?</span></h2><span data-dcnode-id="1214" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1210"><img alt="A Beijing hutong" class="img-responsive" data-dcnode-id="1213" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2015/05/94e369a5997c4ac8b9255b9e_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2015/05/94e369a5997c4ac8b9255b9e_cut_750x400_349.webp&amp;raw" style="opacity: 1; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">A Beijing Hutong</span></span></div><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1203"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">A hutong is a </span></strong><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">lane or alley</span></strong><span data-dcnode-id="1204" instrument_node="">&nbsp;formed by traditional courtyard compounds lining both sides. These hutongs range from little alleys 40 centimeters wide to streets 10 meters wide.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">The compounds that line the lanes and alleys are called "</span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/travelguide/architecture/siheyuan.htm"><span data-dcnode-id="1200" instrument_node="">siheyuan</span></a><span data-dcnode-id="1198" instrument_node="">" (四合院 sìhéyuàn /srr-her-ywhen/). The word means: 'four joined-together courtyard.' They are old buildings arranged on four sides around a courtyard, and the buildings and the courtyard are enclosed by a wall.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">The hutong streets and alleys crisscross with each other and meander in confusing ways. It is fun to walk around in them. See our </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/article-recommended-courtyards.htm" t=""><span data-dcnode-id="1194" instrument_node="">Recommended Siheyuan Courtyards in Beijing</span></a><span data-dcnode-id="1192" instrument_node="">.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><h2 data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Hutong History</span></h2><span data-dcnode-id="1187" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1183"><img alt="An old style hutong of the past" class="img-responsive" data-dcnode-id="1186" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2017/10/6967883ed04345c1b4448728_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2017/10/6967883ed04345c1b4448728_cut_750x400_349.webp&amp;raw" style="opacity: 1; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">An old style hutong of the past</span></span></div><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1181" instrument_node="">Beijing hutongs have a history of&nbsp;</span><b data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">more than 700 years</span></b><span data-dcnode-id="1178" instrument_node="">. The hutong first appeared in the Yuan Dynasty (1271–1368).</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1172"><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">The Mongolians</span></strong><span data-dcnode-id="1173" instrument_node=""> captured the Beijing area in 1215, and in 1271 they started to build their Yuan Empire capital called Dadu (大都 Dàdū).</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1170" instrument_node="">It was recorded that in the Yuan Empire a 36-meter-wide road was called a standard street, a 18-meter-wide one was a small street, and </span><strong data-dcnode-id="1166"><span data-dcnode-id="1169" instrument_node="">a 9-meter-wide lane was named a </span><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">hutong</span></em></strong><span data-dcnode-id="1165" instrument_node=""> (胡同 hùtōng /hoo-tong/ 'haphazardly together').</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1162" instrument_node="">Perhaps the name describes the haphazard unplanned construction of many of the hutongs. The word </span><strong data-dcnode-id="1159"><em data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">hutong</span></em></strong><span data-dcnode-id="1158" instrument_node=""> originates from the Mongolian word </span><strong data-dcnode-id="1155"><em data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">hottog</span></em></strong><span data-dcnode-id="1154" instrument_node=""> that means 'water well' in Mongolian. In ancient times, villagers dug a well and then lived around it.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1151" instrument_node="">In the Ming (1368–1644) and Qing (1644–1912) empires, the officials and wealthy people built their grand </span><em data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">siheyuan</span></em><span data-dcnode-id="1148" instrument_node=""> compounds close to the Forbidden City of the emperors along hutong lanes that were wide and laid out according to a plan. A good example is the </span><strong data-dcnode-id="1144"><a data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Qiao Family Grand Courtyard</span></a><span data-dcnode-id="1145" instrument_node="">.</span></strong><span data-dcnode-id="1143" instrument_node=""> The commoners and poorer people, however, built smaller </span><em data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">siheyuan</span></em><span data-dcnode-id="1140" instrument_node=""> around narrower lanes and alleys, laid out haphazardly on the outskirts of the capital city. See more on </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/hutong"><span data-dcnode-id="1139" instrument_node="">Hutong History.</span></a></p><span data-dcnode-id="1136" instrument_node="">
</span><div class="info_reco_tours" data-dcnode-id="1132"><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Recommended</span></em><span data-dcnode-id="1133" instrument_node=""> Tours:</span></div><span data-dcnode-id="1131" instrument_node="">
</span><ul class="drop1" data-dcnode-id="1121"><span data-dcnode-id="1130" instrument_node="">

</span><h2 data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Hutong Culture</span></h2><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Beijing's hutongs are not only its old network of roads. They represent an important stage in the development and evolution of the capital's history and culture.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1091"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">The hutongs reflect the&nbsp;culture of the common people</span></strong><span data-dcnode-id="1092" instrument_node="">,&nbsp;while the Forbidden City, Summer Palace, and the Temple of Heaven are symbols of imperial culture.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><h3 data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Life in the Beijing Hutongs</span></h3><span data-dcnode-id="1087" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1083"><img alt="Hutong's life" class="img-responsive" data-dcnode-id="1086" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2017/10/45c56c47effa405e82d4e23e_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2017/10/45c56c47effa405e82d4e23e_cut_750x400_349.webp&amp;raw" style="opacity: 1; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Neighbors in Hutong</span></span></div><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Beijing's hutongs showcase the traditional daily life of ordinary people in Beijing and give a glimpse of old Beijing.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1078" instrument_node="">The narrow and compact hutongs </span><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">stimulate deep and warm relationships</span></strong><span data-dcnode-id="1075" instrument_node=""> among neighbors. The people meet, chat, eat, and play games such as mahjong in the lanes and public spaces. &nbsp;</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">Hundreds of residents in a hutong may </span><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">share the same bathroom</span></strong><span data-dcnode-id="1069" instrument_node="">, so even while using bathrooms or bathing, they had to&nbsp;live with each other intimately.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">The familiarity and closer relationships are what the hutong Beijinger's cherish, and many hope to stay there.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><h3 data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Hutong Names</span></h3><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Beijing's hutongs have descriptive names. There were many ways to name a hutong, such as:</span></p><span data-dcnode-id="1058" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1026"><span data-dcnode-id="1057" instrument_node="">
</span><li data-dcnode-id="1053"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Landmarks</span></strong><span data-dcnode-id="1054" instrument_node=""> (usually temples, city gates, and government organizations), e.g.&nbsp;Guanyinsi Hutong ('Guanyin&nbsp;Temple Alley') and Gongyuan Hutong (Gongyuan was where imperial examinations were held);</span></li><span data-dcnode-id="1052" instrument_node="">
</span><li data-dcnode-id="1048"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Markets</span></strong><span data-dcnode-id="1049" instrument_node="">, e.g. Yangshi Hutong ('Sheep Market Alley'), Luomashi Hutong ('Mule and Horse Market Alley'), and Mishi Hutong ('Rice Market Alley');</span></li><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1043"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Scenery</span></strong><span data-dcnode-id="1044" instrument_node="">, e.g. Liushu Hutong ('Willow Alley') and Shijinhuyuan Hutong ('Assorted Garden Alley');</span></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1038"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Layout</span></strong><span data-dcnode-id="1039" instrument_node="">, e.g. Yandai Xie Jie ('Tobacco Pouch Inclined Street') and Jiudaowan Hutong ('Nine Bends Alley');</span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1033"><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Auspiciousness</span></strong><span data-dcnode-id="1034" instrument_node="">, e.g. Xiqing Hutong ('Happy Alley');</span></li><span data-dcnode-id="1032" instrument_node="">
</span><li data-dcnode-id="1028"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Notable residents</span></strong><span data-dcnode-id="1029" instrument_node="">, e.g. Shaguo Liu Hutong (Casserole-Pot Liu was a notable craftsman) and Mengduan Hutong (Meng Duan was a Beijing mayor in the Ming era).</span></li><span data-dcnode-id="1027" instrument_node="">
</span></ul><span data-dcnode-id="1025" instrument_node="">

</span><h2 data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Top Beijing Hutongs You Must Visit</span></h2><span data-dcnode-id="1003" instrument_node="">
</span><div class="infoimage" data-dcnode-id="999"><img alt="Nanluogu Xiang" class="img-responsive" data-dcnode-id="1002" height="399" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2015/07/cc7ec3a0a4b14c24bd36e1e5_cut_750x399_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Nanluogu Xiang</span></span></div><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Of all the hutongs connecting the old traditional residential areas in Beijing, there are a handful or two of famous and interesting hutongs that stand out from the rest.</span></p><span data-dcnode-id="995" instrument_node="">
</span><ul class="infolist" data-dcnode-id="951"><span data-dcnode-id="994" instrument_node="">
</span><li data-dcnode-id="989"><span data-dcnode-id="993" instrument_node="">The </span><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">longest</span></strong><span data-dcnode-id="990" instrument_node=""> hutong — Dongxijiaomin Xiang at 6.5 kilometers (4 miles) used to be the diplomatic area after the Second Opium War in 1860.</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="983"><span data-dcnode-id="987" instrument_node="">The </span><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">shortest</span></strong><span data-dcnode-id="984" instrument_node=""> hutong — Yichidajie ('One-Foot Street') is 20 meters (65 feet) long.</span></li><span data-dcnode-id="982" instrument_node="">
</span><li data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">The </span><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">narrowest</span></strong><span data-dcnode-id="978" instrument_node=""> hutong — Qianshi ('Coin Market') Hutong is only 0.4 meters (16 inches) wide at its narrowest and used to be a financial exchange, but as banks on both sides of the hutong expanded unchecked, it became the narrowest hutong.</span></li><span data-dcnode-id="976" instrument_node="">
</span><li data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">The </span><strong data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">widest</span></strong><span data-dcnode-id="972" instrument_node=""> hutong — Lingjing Hutong's broadest part is 32 meters (104 feet) wide.</span></li><span data-dcnode-id="970" instrument_node="">
</span><li data-dcnode-id="965"><span data-dcnode-id="969" instrument_node="">The </span><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">oldest</span></strong><span data-dcnode-id="966" instrument_node=""> hutong — Sanmiaojie ('Three Temples Street') Hutong can be dated back to 900 years ago.</span></li><span data-dcnode-id="964" instrument_node="">
</span><li data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">The </span><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">most tortuous</span></strong><span data-dcnode-id="960" instrument_node=""> hutong — Jiuwan ('Nine Bends') Hutong is 390 meters long with more than 13 turns!</span></li><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="953"><span data-dcnode-id="957" instrument_node="">The </span><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">most famous</span></strong><span data-dcnode-id="954" instrument_node=""> hutongs — Nanluogu Xiang and Yandaixie Street are popular for shopping and eating.</span></li><span data-dcnode-id="952" instrument_node="">
</span></ul><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">Learn more about the stories behind the hutongs on </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/hutong/top-hutongs.htm"><span data-dcnode-id="948" instrument_node="">The Top 10 Hutongs in Beijing</span></a><span data-dcnode-id="946" instrument_node="">.</span></p><span data-dcnode-id="944" instrument_node="">

</span><h2 data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Top Things to Do in Beijing Hutongs</span></h2><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Beijing's hutongs are the best places to explore the quintessential Beijinger's life and find many authentic hidden delicacies.</span></p><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Take a Rickshaw</span></h3><span data-dcnode-id="789" instrument_node="">
</span><div class="infoimage" data-dcnode-id="785"><img alt="Take a rickshaw to explore hutongs" class="img-responsive" data-dcnode-id="788" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2015/05/f5da439d7a254bbea80ccf8f_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Take a Rickshaw to Explore Beijing Hutongs</span></span></div><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">This is a classic way to get an overview of the traditional hutongs in a short time and has been a must-do activity in Beijing for years.</span></p><span data-dcnode-id="781" instrument_node="">
</span><h3 data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Visit a Local Hutong Family</span></h3><span data-dcnode-id="778" instrument_node="">
</span><div class="infoimage" data-dcnode-id="774"><img alt="A hutong house" class="img-responsive" data-dcnode-id="777" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture//2019/06/23e0d74e5a5f4640abfdd8fa_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Learn paper cutting in a hutong family</span></span></div><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Join a family in their typical Beijing home for lunch and learn about Chinese cooking and their health philosophies. Become an expert who can tell authentic Chinese cooking from dishes served by best-selling overseas Chinatown restaurants.</span></p><span data-dcnode-id="770" instrument_node="">
</span><h3 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Hunt for Hutong Snacks</span></h3><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Authentic local food is often hidden away in small, unremarkable restaurants in the hutongs.&nbsp;Find traditional Beijing beef pie, Beijing roast duck, Beijing traditional yogurt, bingtang hulu (sugar-coated haws on a stick), etc.</span></p><span data-dcnode-id="764" instrument_node="">
</span><ul class="infolist" data-dcnode-id="750"><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="760"><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/food/beijing-street-snacks.htm"><span data-dcnode-id="762" instrument_node="">The Top 12 Beijing Street Snacks</span></a></li><span data-dcnode-id="759" instrument_node="">
</span><li data-dcnode-id="756"><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/hutong-food.htm"><span data-dcnode-id="758" instrument_node="">Best Food and Restaurants in Beijing Hutongs</span></a></li><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="752"><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/hutong-cafes.htm"><span data-dcnode-id="754" instrument_node="">The Best Cafes in Beijing's Hutongs</span></a></li><span data-dcnode-id="751" instrument_node="">
</span></ul><span data-dcnode-id="749" instrument_node="">
</span><h3 data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Savor Interesting Shopfronts</span></h3><span data-dcnode-id="746" instrument_node="">
</span><div class="infoimage" data-dcnode-id="742"><img alt="A hutong shop" class="img-responsive" data-dcnode-id="745" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/c53df469989b4229af341ad6_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">A Hutong Shop</span></span></div><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">There are thousands of interesting shops and brand-name stores where you can bargain for trinkets and a variety of interesting items.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">See </span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/top-things-to-do-hutong.htm"><span data-dcnode-id="736" instrument_node="">The Top 6 Things to Do in the Hutongs</span></a><span data-dcnode-id="734" instrument_node="">.</span></p><span data-dcnode-id="732" instrument_node="">
</span><h2 data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Tips for Visiting Hutongs in Beijing</span></h2><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Though the hutongs are public areas and better signposted, there are some things you should pay attention to when visiting…</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="725" instrument_node="">In the hutongs, you will mostly see common people's courtyard houses. Sightseeing outside is welcome, but </span><strong data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">do not enter</span></strong><span data-dcnode-id="722" instrument_node=""> without the owners' permission (many open doors lead to their courtyards).</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="716"><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Plan your time and route well</span></strong><span data-dcnode-id="717" instrument_node="">: it is easy to lose track of time and your way in the winding alleys.</span></p><span data-dcnode-id="715" instrument_node="">
</span><h3 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">A Sample 1-Day Hutong Tour Itinerary</span></h3><span data-dcnode-id="712" instrument_node="">
</span><ul class="infolist" data-dcnode-id="700"><span data-dcnode-id="711" instrument_node="">
</span><li data-dcnode-id="707"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Morning</span></strong><span data-dcnode-id="708" instrument_node="">: explore the ancient buildings in the hutongs (e.g. the Lama Temple and Confucian Temple)</span></li><span data-dcnode-id="706" instrument_node="">
</span><li data-dcnode-id="702"><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Afternoon</span></strong><span data-dcnode-id="703" instrument_node="">: visit a hutong family, the Drum Tower, and the most famous hutong: Yandaixie Street.</span></li><span data-dcnode-id="701" instrument_node="">
</span></ul><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="698" instrument_node="">For more details, please see our </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/tours/hutong-tour.htm"><span data-dcnode-id="697" instrument_node="">1-Day Beijing Hutong Tour</span></a><span data-dcnode-id="695" instrument_node="">.</span></p><span data-dcnode-id="693" instrument_node="">
</span><div class="info_reco_tours" data-dcnode-id="689"><em data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Recommended</span></em><span data-dcnode-id="690" instrument_node=""> Tours:</span></div><span data-dcnode-id="688" instrument_node="">
</span><ul class="drop1" data-dcnode-id="678"><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="684"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/bj-1/"><span data-dcnode-id="686" instrument_node="">4-Day Beijing Private Tour</span></a></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="680"><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/bj-30-gp/"><span data-dcnode-id="682" instrument_node="">6-Day Beijing Chinese New Year Tour</span></a></li><span data-dcnode-id="679" instrument_node="">
</span></ul><span data-dcnode-id="677" instrument_node="">
</span><h2 data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Tour Beijing's Hutongs with Us</span></h2><span data-dcnode-id="674" instrument_node="">
</span><div class="infoimage" data-dcnode-id="670"><img alt="A Beijing hutong" class="img-responsive" data-dcnode-id="673" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2019/11/f5f3fa40b97449a3bc3cd479_cut_750x400_349.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Tour Beijing hutongs</span></span></div><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Beijing's hutongs are the carrier of Beijing culture. They are a window on the real Beijing. A local guide will give you more insight into the hutongs' culture and history.</span></p><span data-dcnode-id="666" instrument_node="">
</span><ul class="infolist" data-dcnode-id="646"><span data-dcnode-id="665" instrument_node="">
