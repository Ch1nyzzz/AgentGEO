</span><p data-dcnode-id="1652"><span data-dcnode-id="1659" instrument_node="">Beijing’s attractions </span><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">are second to none in China</span></strong><span data-dcnode-id="1656" instrument_node="">, with famous tourist spots of various types: historical, cultural, scenic, and modern. The capital is home to some of the country's best-known tourist attractions, such as </span><strong data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">the Great Wall of China, the Forbidden City, and the Temple of Heaven</span></strong><span data-dcnode-id="1653" instrument_node="">.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node="">Here we introduce the 12 best must-see attractions in Beijing to help you better plan your trip, according to </span><strong data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">our first-hand experience and customers’ ratings</span></strong><span data-dcnode-id="1647" instrument_node="">.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1634"><span data-dcnode-id="1644" instrument_node="">
</span><li data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Top historical sights: the Forbidden City, the Great Wall, the Summer Palace, Lama Temple, the Temple of Heaven, the Ming Tombs, and Jinshan Park</span></li><span data-dcnode-id="1641" instrument_node="">

</span><li data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Top modern sights: Beijing Olympic Park, 798 Art Zone</span></li><span data-dcnode-id="1635" instrument_node="">

</span><h2 data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">1. The Forbidden City</span></h2><span data-dcnode-id="1611" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1607"><img alt="" class="img-responsive" data-dcnode-id="1610" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/09/18f0e711f54e4f4e879c3db8_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2021/09/18f0e711f54e4f4e879c3db8_cut_750x400_238.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Panorama of The Forbidden City</span></span></div><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1602"><strong data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Open: </span></strong><span data-dcnode-id="1603" instrument_node="">8:30am–5:00pm Apr.–Oct.; 8:30am–4:30pm Nov.–Mar.; closed on Mondays</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1597"><strong data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="1598" instrument_node=""> 2 hours</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1592"><strong data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Entry:</span></strong><span data-dcnode-id="1593" instrument_node=""> CN¥60 (US$9)</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1590" instrument_node="">The Forbidden City was for almost five centuries the palatial heart of China. Constructed in 1420, it is China's best-preserved imperial palace, and </span><strong data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">the largest ancient palatial structure in the world</span></strong><span data-dcnode-id="1587" instrument_node="">. It is also a magnificent treasure trove, which holds </span><strong data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">more than a million rare and valuable works of art</span></strong><span data-dcnode-id="1584" instrument_node="">. The collection includes ceramics, paintings, calligraphy, bronzes, timepieces, jade pieces, ancient books, and historical documents.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">There, you can witness the grand architecture, learn about China’s royal culture inside the city walls, and appreciate the precious treasures of the royal court.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1578" instrument_node="">More on </span><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/forbidden-city/"><span data-dcnode-id="1577" instrument_node="">The Forbidden City</span></a><span data-dcnode-id="1575" instrument_node=""> &gt;&gt;&gt;</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1572" instrument_node="">How to make the most of your time in this huge imperial palace complex? </span><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Visiting halls along the central axis from The Meridian Gate to the Gate of Devine Might is the most common route</span></strong><span data-dcnode-id="1569" instrument_node="">. Some of the most important buildings are located on this axis, such as the Hall of Supreme Harmony, Hall of Central Harmony, Hall of Preserving Harmony, and Palace of Heavenly Purity.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1566" instrument_node="">However, you might want to travel with us for </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/forbidden-city-heritage-walk.htm"><span data-dcnode-id="1565" instrument_node="">a deeper Forbidden City exploration</span></a><span data-dcnode-id="1563" instrument_node="">. Rather than simply taking you round to see the buildings, and giving you textbook recitals or routine guide presentations, we attempt to bring the emperors’ lives to life for you, through fascinating stories with original iPad pictures and videos. You will be </span><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">taken to see places that you would never find by yourself or on a standard tour</span></strong><span data-dcnode-id="1560" instrument_node="">.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="1555"><img alt="WeChat: chinahighlightstour" class="img-responsive" data-dcnode-id="1557" height="200" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/03/8896afb7471440dda5b9dc47_cut_300x200_10.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2021/03/8896afb7471440dda5b9dc47_cut_300x200_10.webp&amp;raw" style="opacity: 1; transition: opacity 0.5s ease-in-out 0s;" width="300"><span data-dcnode-id="1556" instrument_node="">Scan the QR Code to contact us on Wechat!</span></div><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1551"><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Tips:</span></strong></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">For the protection of relics and visitors’ safety, there is a restriction on daily visitor numbers. As tickets are limited, they are always sold out quickly, so it is not wise to wait to buy them on the day. It is highly recommended to book entry tickets in advance. You can scan the QR code on the right with WeChat or </span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/contactus/"><span data-dcnode-id="1548" instrument_node="">send us a quick inquiry</span></a><span data-dcnode-id="1546" instrument_node=""> to book the tickets.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><div class="righttour" data-dcnode-id="1526"><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/"><img alt="Beijing trip" class="img-responsive" data-dcnode-id="1543" height="500" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2015/10/0737277da892436db2906dd5_cut_800x500_10.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2015/10/0737277da892436db2906dd5_cut_800x500_10.webp&amp;raw" style="width: 100%; opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="800"></a><span data-dcnode-id="1541" instrument_node="">
</span><div class="rightinfo" data-dcnode-id="1528" style="min-width: 260px;"><span data-dcnode-id="1540" instrument_node="">

</span><h2 data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">2. The Great Wall of China</span></h2><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">&nbsp;</span><img alt="" class="img-responsive" data-dcnode-id="1520" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/09/d21a85e4298740cea02aefe2_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2021/09/d21a85e4298740cea02aefe2_cut_750x400_238.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Jinshanling Great Wall section</span></span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1512"><strong data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Open:</span></strong><span data-dcnode-id="1513" instrument_node=""> 8:30am–5:00pm</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1507"><strong data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="1508" instrument_node=""> 2 hours for sightseeing, half a day for hiking</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1502"><strong data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Entry:</span></strong><span data-dcnode-id="1503" instrument_node=""> Prices vary for different Great Wall sections.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1494"><a data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/greatwall/"><span data-dcnode-id="1500" instrument_node="">The Great Wall of China</span></a><span data-dcnode-id="1498" instrument_node=""> is</span><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node=""> one of the greatest sights in the world</span></strong><span data-dcnode-id="1495" instrument_node="">. Over 6,000 km (4,000 miles) long, its winding path over rugged country and steep mountains takes in some great scenery.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">The most popular Great Wall sections are in the mountains north of Beijing:</span></p><span data-dcnode-id="1490" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1467"><span data-dcnode-id="1489" instrument_node="">
</span><li data-dcnode-id="1484"><span data-dcnode-id="1488" instrument_node="">The Mutianyu Great Wall section (2 hours’ driving from the center of Beijing): </span><strong data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">With less crowding and children-friendly facilities, it is the most popular section among foreign travelers</span></strong><span data-dcnode-id="1485" instrument_node="">. You can take the cable cars up/down, and the “toboggan” ride down is great fun, suitable for both adults and children.</span></li><span data-dcnode-id="1483" instrument_node="">
</span><li data-dcnode-id="1475"><span data-dcnode-id="1482" instrument_node="">The Badaling Great Wall section (1½ hours’ driving from the center of Beijing) is a restored Great Wall section that </span><strong data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">is somewhat disabled-friendly</span></strong><span data-dcnode-id="1479" instrument_node="">, there are lifts and elevators available to get onto one part of the Wall. It is very popular among Chinese tourist groups, hence</span><strong data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node=""> it’s the most crowded by far</span></strong><span data-dcnode-id="1476" instrument_node="">.</span></li><span data-dcnode-id="1474" instrument_node="">
</span><li data-dcnode-id="1469"><span data-dcnode-id="1473" instrument_node="">Jinshanling Great Wall section (3 hours’ driving from the center of Beijing) is regarded as</span><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node=""> the most photogenic and most beautiful section of the Great Wall</span></strong><span data-dcnode-id="1470" instrument_node="">, replete with many original features. It is the photographers' favorite. As it is further from Beijing, it has fewer crowds.</span></li><span data-dcnode-id="1468" instrument_node="">
</span></ul><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Jinshanling is also the most popular Great Wall section for hiking. The walking difficulty on this section is graded as moderate.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1446"><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1454"><span data-dcnode-id="1461" instrument_node="">Jiankou Great Wall section (2 hours’ driving from the center of Beijing) is an unrepaired Great Wall section </span><strong data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">built on towering ridges with cliffs on each side!</span></strong><span data-dcnode-id="1458" instrument_node=""> </span><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">This is also the most challenging section</span></strong><span data-dcnode-id="1455" instrument_node="">. It is only recommended for experienced and sure-footed mountain hikers.</span></li><span data-dcnode-id="1453" instrument_node="">
</span><li data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">Huanghuacheng Great Wall section (2 hours’ driving from the center of Beijing) is divided by a lake, and some parts are even immersed in the water. </span><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">It is the only "Great Wall in Water"</span></strong><span data-dcnode-id="1449" instrument_node="">. During summer, this Great Wall section is swathed in yellow, as masses of wildflowers come into bloom (hence its name ‘Yellow Flower Wall’).</span></li><span data-dcnode-id="1447" instrument_node="">
</span></ul><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1444" instrument_node="">There is no cable car available, so </span><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">this uncrowded Great Wall section is more popular with hikers</span></strong><span data-dcnode-id="1441" instrument_node="">. It provides a challenge for hikers because the paths are steep and out of repair.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node="">More on </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/greatwall/section/"><span data-dcnode-id="1437" instrument_node="">The Most Recommended Great Wall sections</span></a><span data-dcnode-id="1435" instrument_node="">&gt;&gt;&gt;</span></p><span data-dcnode-id="1433" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1429"><img alt="" class="img-responsive" data-dcnode-id="1432" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2017/08/227a8813241f4e7c98822ebd_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2017/08/227a8813241f4e7c98822ebd_cut_750x400_238.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Hiking on the Great Wall</span></span></div><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1424"><strong data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Hiking the Great Wall is another popular way to explore the Great Wall</span></strong><span data-dcnode-id="1425" instrument_node="">. Tread the centuries-old bricks and walk-through watchtower ruins. Take your time and feel history come to life. Our two most popular hiking routes suit different hikers:</span></p><span data-dcnode-id="1423" instrument_node="">
</span><ul class="infolist" data-dcnode-id="1401"><span data-dcnode-id="1422" instrument_node="">
</span><li data-dcnode-id="1413"><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/day-tours/beijing/1-day-great-wall-hiking-from-simatai-jinshanling.htm"><span data-dcnode-id="1421" instrument_node="">Hiking from Jinshanling to Simatai West</span></a><span data-dcnode-id="1419" instrument_node=""> — 6 km (4 miles), 4 hours:</span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">
</span><strong data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">It is a moderate hiking route that is suitable for most common visitors</span></strong><span data-dcnode-id="1414" instrument_node="">. This section has breathtaking views and offers stunning photo opportunities that vary with the seasons.</span></li><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1403"><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/day-tours/beijing/1-day-great-wall-hiking-from-jiankou-mutianyu.htm"><span data-dcnode-id="1411" instrument_node="">Trekking from Jiankou to Mutianyu</span></a><span data-dcnode-id="1409" instrument_node=""> — 10 km (6 miles), 5 hours:</span><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">
</span><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">This is a route for experienced and sure-footed mountain hikers</span></strong><span data-dcnode-id="1404" instrument_node="">. It allows you to see the spectacular cliff-top ruined towers at Jiankou and the restored wall at Mutianyu. This is a challenging section of the Great Wall. You'll need to be in good health to negotiate the steep ascents and descents on rocky trails.</span></li><span data-dcnode-id="1402" instrument_node="">
</span></ul><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1399" instrument_node="">We have more </span><a data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/greatwall/hiking.htm"><span data-dcnode-id="1398" instrument_node="">Great Wall hiking tours</span></a><span data-dcnode-id="1396" instrument_node=""> to choose from.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><div class="info_reco_tours" data-dcnode-id="1390"><em data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Recommended</span></em><span data-dcnode-id="1391" instrument_node=""> Beijing Tours:</span></div><span data-dcnode-id="1389" instrument_node="">

</span><h2 data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">3. The Temple of Heaven</span></h2><span data-dcnode-id="1349" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1345"><img alt="" class="img-responsive" data-dcnode-id="1348" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2019/01/88106980e39e48c08418e3fc_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">The Hall of Prayer for Good Harvests</span></span></div><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1340"><strong data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Open:</span></strong><span data-dcnode-id="1341" instrument_node=""> 6:00am–5:30pm Apr.–Oct.; 6:30am–5:00pm Nov.–Mar.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1335"><strong data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="1336" instrument_node=""> 2 hours</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1330"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Entry:</span></strong><span data-dcnode-id="1331" instrument_node=""> CN¥34 (US$5)</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1328" instrument_node="">The Temple of Heaven is an imperial worship site where emperors of the Ming and Qing dynasties took part in annual ceremonies to pray for a good harvest for the next year. The annual sacrificial ceremonies at the Temple of Heaven were </span><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">the emperors' most important religious and political activities</span></strong><span data-dcnode-id="1325" instrument_node="">.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">The Circular Mound Altar and The Hall of Prayer for Good Harvests are the must-see highlights, you can learn about the culture of heaven worship, architectural geomancy, and the medieval China’s sacrificial rites.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1319" instrument_node="">If you’re travel with kids, </span><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">a visit to the Echo Wall is strongly recommended</span></strong><span data-dcnode-id="1316" instrument_node="">. Your kid(s) will be surprised by the magic of the echo. If you say something to him/her quietly at one end of the wall, they should hear your message even though standing 100–150 meters away.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Nowadays, the Temple of Heaven stands in a public park that is full of life. In the morning lots of local elderly people meet there to sing, exercise and do tai chi. The park is south of Central Beijing, about 15 minutes south of the Forbidden City by car.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1310" instrument_node="">More on </span><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/attraction/temple-of-heaven.htm"><span data-dcnode-id="1309" instrument_node="">The Temple of Heaven</span></a><span data-dcnode-id="1307" instrument_node="">&gt;&gt;&gt;</span></p><span data-dcnode-id="1305" instrument_node="">
</span><h2 data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">4. The Summer Palace</span></h2><span data-dcnode-id="1302" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1298"><img alt="" class="img-responsive" data-dcnode-id="1301" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/d6b36a27058c418a9ae5d71b_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Seventeen-Arch Bridge</span></span></div><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1293"><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Open:</span></strong><span data-dcnode-id="1294" instrument_node=""> 6:30am–6:00pm Apr.–Oct.; 8:30am–5:00pm Nov.–Mar.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1288"><strong data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="1289" instrument_node=""> 1½ hours</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1283"><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Entry:</span></strong><span data-dcnode-id="1284" instrument_node=""> CN¥30 (US$5)</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1281" instrument_node="">The Summer Palace is 15 kilometers (9 miles) from downtown Beijing. It was a summer retreat for the royal family of the Qing Dynasty (1644–1912). It is also</span><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node=""> the largest and best-preserved imperial garden in China</span></strong><span data-dcnode-id="1278" instrument_node="">, with famous landscaped views and cultural points of interest. The Summer Palace </span><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">has greatly influenced Chinese horticulture and landscape gardening</span></strong><span data-dcnode-id="1275" instrument_node="">.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">The Long Corridor in the Summer Palace gardens is the most notable sight, with every on beam decorated with colorful paintings — more than 14,000 in total. You can stroll around it and listen to tales described by the paintings.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Tip: If you have plenty of time for a visit and do not mind waiting in line for a while, relaxing on a boat on Kunming Lake is a highly recommended activity.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1266" instrument_node="">More on </span><a data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/attraction/summer-palace.htm"><span data-dcnode-id="1265" instrument_node="">The Summer Palace</span></a><span data-dcnode-id="1263" instrument_node="">&nbsp;&gt;&gt;&gt;</span></p><span data-dcnode-id="1261" instrument_node="">

</span><h2 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">5. The Hutongs</span></h2><span data-dcnode-id="1128" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1124"><img alt="" class="img-responsive" data-dcnode-id="1127" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/2e0f2e02736045d4b0f60c89_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Beijing Hutongs</span></span></div><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1119"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Open:</span></strong><span data-dcnode-id="1120" instrument_node=""> open all-day</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1114"><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="1115" instrument_node=""> 2 hours</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1109"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Entry:</span></strong><span data-dcnode-id="1110" instrument_node=""> free</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">With over 700 years of history, the hutongs represent an important stage in the development and evolution of Beijing's history and culture. They showcase the traditional daily life of ordinary people in Beijing and give a glimpse of old Beijing as it was.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1104" instrument_node="">Of all the hundreds of hutongs in Beijing, </span><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Tobacco Pouch Street&nbsp;</span></strong><span data-dcnode-id="1101" instrument_node="">(烟袋斜街) and </span><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Nanlougu Hutong </span></strong><span data-dcnode-id="1098" instrument_node="">(南锣鼓巷) are two of the most famous and interesting hutongs that stand out from the rest. Both streets preserve the character of a commoners’ street in Beijing and highlight some of the city’s traditional customs.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1095" instrument_node="">In the hutongs, you can hop on a rickshaw to </span><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">ride through the narrow alleys, appreciate the well-preserved courtyard residences and their long histories, sample great street food, experience local handicrafts, do a cooking class</span></strong><span data-dcnode-id="1092" instrument_node="">...</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1089" instrument_node="">See more on </span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/hutong/"><span data-dcnode-id="1088" instrument_node="">Beijing’s Hutongs</span></a><span data-dcnode-id="1086" instrument_node="">&nbsp;&gt;&gt;&gt;</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">Our </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/best-hutong-tours.htm"><span data-dcnode-id="1082" instrument_node="">Hutong tours</span></a><span data-dcnode-id="1080" instrument_node=""> focus more on local cultural experiences. You can explore a non-commercial hutong and discover what ordinary people’s lives are like.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1077" instrument_node="">On our </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/tours/hutong-tour.htm"><span data-dcnode-id="1076" instrument_node="">1-Day Beijing Hutong Tour</span></a><span data-dcnode-id="1074" instrument_node="">, you will </span><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">have a chance to walk into a traditional courtyard residence and visit a hutong family</span></strong><span data-dcnode-id="1071" instrument_node="">. Learn about the architectural features of traditional residential houses in old Beijing and the customs of their residents. Chat with your hosts and get an idea of the hutong lifestyle.</span></p><span data-dcnode-id="1069" instrument_node="">

</span><ul class="infolist" data-dcnode-id="1047"><span data-dcnode-id="1063" instrument_node="">

</span><h2 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">6. Lama Temple</span></h2><span data-dcnode-id="1043" instrument_node="">
</span><div class="infoimage" data-dcnode-id="1039"><img alt="" class="img-responsive" data-dcnode-id="1042" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/08/f3a2579ac3bb491a99f81a33_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">The prayers are praying at the Yonghe gate</span></span></div><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1034"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Open:</span></strong><span data-dcnode-id="1035" instrument_node=""> 9:00am–4:30pm Apr.–Oct.; 9:00am–4:00pm Nov.–Mar.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1029"><strong data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="1030" instrument_node=""> 1½ hours</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1024"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Entry:</span></strong><span data-dcnode-id="1025" instrument_node=""> CN¥25 (US$4)</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1022" instrument_node="">Yonghegong (‘</span><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Harmony Temple</span></em><span data-dcnode-id="1019" instrument_node="">’) in Chinese, Lama Temple is </span><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">one of the most famous Tibetan Buddhist lamaseries outside Tibet</span></strong><span data-dcnode-id="1016" instrument_node="">. Today, it is not only a museum of Tibetan Buddhism but also </span><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">a functioning temple where people pray</span></strong><span data-dcnode-id="1013" instrument_node="">.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">This temple was formed from a royal palace conversion. Its buildings are a combination of imperial Qing and Tibet style. While visiting, you will not only able to get a rough understanding of Tibetan Buddhism, but also you can appreciate wonderful architecture and a variety of Buddhist statues, especially the 18-meter (59-foot) high Maitreya Buddha in Wanfu Pavilion. It was carved from one precious white sandalwood log from Nepal.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">See more on </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/attraction/lama-temple.htm"><span data-dcnode-id="1006" instrument_node="">Lama Temple</span></a><span data-dcnode-id="1004" instrument_node=""> &gt;&gt;&gt;</span></p><span data-dcnode-id="1002" instrument_node="">
</span><h2 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">7. Gubei Water Town</span></h2><span data-dcnode-id="999" instrument_node="">
</span><div class="infoimage" data-dcnode-id="995"><img alt="" class="img-responsive" data-dcnode-id="998" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2019/09/1be0188ef8d04f859def912f_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Sunset of Gubei water town</span></span></div><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="990"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Open:</span></strong><span data-dcnode-id="991" instrument_node=""> all day</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="985"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="986" instrument_node=""> a full day</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="980"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Entry:</span></strong><span data-dcnode-id="981" instrument_node=""> CN¥150 (US$23)</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="975"><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/greatwall/section/simatai-gubei-water-town.htm"><span data-dcnode-id="978" instrument_node="">Gubei Water Town</span></a><span data-dcnode-id="976" instrument_node=""> is a large resort and town in traditional Chinese style that nestles below the Simatai Great Wall section. Its buildings have been built in the traditional Beijing courtyard style. It boasts a combination of mountain views, quaint waterways, and ancient village ambience.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">An overnight stay in the water town is highly recommended, which will offer you an opportunity to enjoy the </span><strong data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">stunning night views of the tastefully-lit and cable-car-accessed Simatai section of the Great Wall</span></strong><span data-dcnode-id="970" instrument_node="">.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">There are 5-star hotels/resorts and hundreds of economical inns, which cater to different tastes and interests. Do not miss</span><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node=""> the natural mineral hot spring experience </span></strong><span data-dcnode-id="964" instrument_node="">there. When you check in, most hotels will give you complimentary vouchers for one of the springs in Gubei Water Town.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="955"><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/contactus/"><span data-dcnode-id="961" instrument_node="">Contact us</span></a><span data-dcnode-id="959" instrument_node=""> for a bespoke visit or see our </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/bj-3/"><span data-dcnode-id="958" instrument_node="">Cultural Experience in Gubei Water Town and Great Wall Night Tour</span></a><span data-dcnode-id="956" instrument_node=""> if you are interested.</span></p><span data-dcnode-id="954" instrument_node="">
</span><div class="info_reco_tours" data-dcnode-id="950"><em data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Recommended</span></em><span data-dcnode-id="951" instrument_node=""> Tours:</span></div><span data-dcnode-id="949" instrument_node="">
</span><ul class="drop1" data-dcnode-id="935"><span data-dcnode-id="948" instrument_node="">
</span><li data-dcnode-id="945"><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/tour/beijingtour/bj-1/"><span data-dcnode-id="947" instrument_node="">4-Day Beijing Private Tour</span></a></li><span data-dcnode-id="944" instrument_node="">
</span><li data-dcnode-id="941"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/winter-olympics/travel-packages/beijing-2022-winter-olympics-vacation.htm"><span data-dcnode-id="943" instrument_node="">7-Day Beijing Winter Olympics Travel Package</span></a></li><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="937"><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/tours/in-depth-culture-tour.htm"><span data-dcnode-id="939" instrument_node="">1-Day In-Depth Beijing Culture Tour</span></a></li><span data-dcnode-id="936" instrument_node="">
</span></ul><span data-dcnode-id="934" instrument_node="">
</span><h2 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">8. Tian'anmen Square</span></h2><span data-dcnode-id="931" instrument_node="">
</span><div class="infoimage" data-dcnode-id="927"><img alt="" class="img-responsive" data-dcnode-id="930" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/09/d717d989ff614f4b90689b86_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Beijing Tian'anmen Square</span></span></div><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="922"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Open:</span></strong><span data-dcnode-id="923" instrument_node=""> all day</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="918" instrument_node=""> 1 hour</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="912"><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Entry:</span></strong><span data-dcnode-id="913" instrument_node=""> free</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="910" instrument_node="">Tian'anmen Square is </span><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">the largest famous city square</span></strong><span data-dcnode-id="907" instrument_node="">. In the center of Beijing, it sits to the south of the Forbidden City. Tian'anmen Square </span><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">is very symbolic for Chinese people</span></strong><span data-dcnode-id="904" instrument_node="">, as it was the site of several key events in Chinese history, such as the founding of the People's Republic of China in 1949.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Nowadays, it is still the most significant square in China, where grand ceremonies and National Day anniversary parades are held.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="898" instrument_node="">Each morning, </span><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">the flag-raising ceremony is held at sunrise, which is open to the public most of the time</span></strong><span data-dcnode-id="895" instrument_node="">. On the night before Chinese National Day, many Chinese even sit up near the square for a whole night just to watch the flag being raised the next morning. </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/contactus/"><span data-dcnode-id="894" instrument_node="">Join us</span></a><span data-dcnode-id="892" instrument_node=""> to witness this solemn ceremony in Beijing.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Tian'anmen Square is surrounded by many imposing buildings including the ‘Heavenly Peace Gate’ (Tian’anmen — entrance to the Forbidden City), top museums, government buildings, and Chairman Mao's Mausoleum.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">See more on </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/attraction/tiananmen-square.htm"><span data-dcnode-id="885" instrument_node="">Tian'anmen Square</span></a><span data-dcnode-id="883" instrument_node="">&nbsp;&gt;&gt;&gt;</span></p><span data-dcnode-id="881" instrument_node="">
</span><h2 data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">9. The Ming Tombs</span></h2><span data-dcnode-id="878" instrument_node="">
</span><div class="infoimage" data-dcnode-id="874"><img alt="" class="img-responsive" data-dcnode-id="877" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2021/09/e945d905f5be43f2a27888ea_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">The Ming Tombs</span></span></div><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="869"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Open:</span></strong><span data-dcnode-id="870" instrument_node=""> 8:00am–5:30pm Apr.–Oct.; 8:30am–4:30pm Nov.–Mar.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="864"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="865" instrument_node=""> 2½ hours</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="859"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Entry:</span></strong><span data-dcnode-id="860" instrument_node=""> CN¥110 (US$17) includes Dingling, Changling, and the Sacred Way</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="857" instrument_node="">The Ming Tombs is where 13 out of the 16 emperors of the Ming Dynasty (1367–1644) were buried (along with 23 empresses and several concubines, princes, and princesses). Thus, it is also known as the ‘Thirteen Tombs’. It is </span><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">the best-preserved Chinese imperial tombs complex and has been recognized by UNESCO as World Cultural Heritage</span></strong><span data-dcnode-id="854" instrument_node="">.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Currently, only three tombs (Changling, Dingling, and Zhaoling) are open to the public. Leading to the tombs, the&nbsp;Sacred Way offers a reverent and interesting stroll between animal and human statues. In Changling, you can see magnificent architecture and learn about Chinese fengshui theory. The highlight of Dingling is the stone underground palace. Zhaoling stands out for its above-ground architecture.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="848" instrument_node="">The Ming Tombs are 50 kilometers (30 miles) from Beijing city. As the Badaling Great Wall section is not far away, </span><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">the tombs are usually visited as part of a Great Wall day trip</span></strong><span data-dcnode-id="845" instrument_node="">. Please feel free to </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/contactus/"><span data-dcnode-id="844" instrument_node="">contact us</span></a><span data-dcnode-id="842" instrument_node=""> for a customized Ming Tombs private tour.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="839" instrument_node="">See more on </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/ming-tombs/"><span data-dcnode-id="838" instrument_node="">The Ming Tombs</span></a><span data-dcnode-id="836" instrument_node="">&nbsp;&gt;&gt;&gt;</span></p><span data-dcnode-id="834" instrument_node="">
</span><h2 data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">10. Jingshan Park</span></h2><span data-dcnode-id="831" instrument_node="">
</span><div class="infoimage" data-dcnode-id="827"><img alt="" class="img-responsive" data-dcnode-id="830" height="400" loader="lazy" originalsrc="https://images.chinahighlights.com/allpicture/2017/10/cb7b5d5ad0614c36b6294caa_cut_750x400_238.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="750"><span class="infoimagetitle" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">The summit of the Jingshan Park</span></span></div><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="822"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Open:</span></strong><span data-dcnode-id="823" instrument_node=""> 6:00am–9:00pm Apr.–Oct.; 6:30am–8:00pm Nov.–Mar.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Recommended visit:</span></strong><span data-dcnode-id="818" instrument_node=""> 1 hour</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="812"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Entry: </span></strong><span data-dcnode-id="813" instrument_node="">CN¥10 (US$1.5)</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="804"><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/attraction/jingshan-park.htm"><span data-dcnode-id="810" instrument_node="">Jingshan Park</span></a><span data-dcnode-id="808" instrument_node=""> used to be a part of the Forbidden City.</span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node=""> Its front gate faces the north gate of the Forbidden City</span></strong><span data-dcnode-id="805" instrument_node="">.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="796"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">The hill in the park is the highest point in Beijing City</span></strong><span data-dcnode-id="800" instrument_node=""> (apart from the modern tower buildings), made with the earth removed to create the palace moat. </span><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">It is well worth a climb on a clear day for a panoramic view of the Forbidden City and Beijing</span></strong><span data-dcnode-id="797" instrument_node="">. The path to the top of the hill is a little steep, and may not be suitable for seniors or those who have difficulty with hundreds of steps.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">The park is also a place to experience local culture, as many local people go there to play interesting traditional instruments etc. every day.</span></p><span data-dcnode-id="792" instrument_node="">

</span><p data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">Beijing Olympic Park is a spacious park </span><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">built for the 2008 Beijing Olympic Games</span></strong><span data-dcnode-id="732" instrument_node="">. It contains the main venues used during the 2008 Olympics and Paralympic Games, The Bird’s Nest and the Water Cube are the outstanding highlights of this park, which has become a landmark of Beijing.</span></p><span data-dcnode-id="730" instrument_node="">
</span><ul class="infolist" data-dcnode-id="714"><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="721"><span data-dcnode-id="728" instrument_node="">The Bird's Nest Stadium: Its outer shell is the world's largest steel structure, forming part of the most complex Olympic stadium ever constructed. The opening and closing ceremonies for</span><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node=""> the upcoming 2022 Beijing Winter Olympics will be also held there</span></strong><span data-dcnode-id="725" instrument_node="">. Click here for the latest on </span><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/winter-olympics/"><span data-dcnode-id="724" instrument_node="">tickets for the 2022 Beijing Winter Olympics</span></a><span data-dcnode-id="722" instrument_node="">.</span></li><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="719" instrument_node="">The Water Cube: It was the venue for the 2008 Olympic swimming and diving competitions, and continues to host events. It got its name due to its huge blue cube structure with a soap bubble design. At night, it turns into a glowing blue cube alongside the fiery red National Stadium. It is to be</span><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node=""> the curling venue for the 2022 Beijing Winter Olympics.</span></strong></li><span data-dcnode-id="715" instrument_node="">
</span></ul><span data-dcnode-id="713" instrument_node="">

</span><h2 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">12. 798 Art Zone</span></h2><span data-dcnode-id="704" instrument_node="">

</span><p data-dcnode-id="695"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Open:</span></strong><span data-dcnode-id="696" instrument_node=""> 10:00am–6:00pm</span></p><span data-dcnode-id="694" instrument_node="">

</span><p data-dcnode-id="685"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Entry:</span></strong><span data-dcnode-id="686" instrument_node=""> free</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">Converted from an old factory compound, </span><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">nowadays this zone has become synonymous with art and originality</span></strong><span data-dcnode-id="680" instrument_node="">. There are a range of contemporary art galleries, stylish boutiques, creatively designed architectures, and cafes. No matter whether you are an art enthusiast or not, 798 Art District will show you a different Beijing.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">Top art exhibitions and fashion shows are frequently held in 798, where there are more than 500 art studios from all over the world. </span><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Ullens Center for Contemporary Art is a must-see highlight in the Zone</span></strong><span data-dcnode-id="674" instrument_node="">. An exciting collection of local and international artists exhibit in an atmospheric three-story Bauhaus structure.</span></p><span data-dcnode-id="672" instrument_node="">
