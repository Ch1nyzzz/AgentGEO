</span><h1 data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Chongqing Attractions</span></h1><span data-dcnode-id="1893" instrument_node="">
</span><div class="content" data-dcnode-id="1846"><p data-dcnode-id="1868"><a data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/chongqing-tours.html" target="_blank" title="Chongqing"><span data-dcnode-id="1892" instrument_node="">Chongqing</span></a><span data-dcnode-id="1890" instrument_node="">&nbsp;is the only southeast municipality in China, also being called the “Little Hong Kong” and “8D Magic City” due to its’ special landform. There are lots of places worth to visit in Chongqing. You can enjoy Ba and Shu art, culture and delicious food in Chongqing downtown, visit </span><strong data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Ciqikou Ancient Town</span></strong><span data-dcnode-id="1887" instrument_node="">, </span><strong data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Hongya Cave</span></strong><span data-dcnode-id="1884" instrument_node="">, </span><strong data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Three Gorges Museum</span></strong><span data-dcnode-id="1881" instrument_node="">, and </span><strong data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Chaotianmen Bridge</span></strong><span data-dcnode-id="1878" instrument_node=""> etc. Then take a natural adventure to Chongqing suburb, you can appreciate the astonishing </span><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Dazu Rock Carvings</span></strong><span data-dcnode-id="1875" instrument_node="">, immerse in the wonderland </span><strong data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Wulong Karst Natural Park</span></strong><span data-dcnode-id="1872" instrument_node="">, and hike to holy </span><strong data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Jinfo Montains</span></strong><span data-dcnode-id="1869" instrument_node=""> etc.</span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1866" instrument_node="">Chongqing is also the most popular place to start a </span><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/yangtze-cruises.html" target="_blank" title="Yangtze River cruise"><span data-dcnode-id="1865" instrument_node="">Yangtze River cruise</span></a><span data-dcnode-id="1863" instrument_node="">. As one of the most relaxing and rewarding way to discover the charm central part of China and savor the natural scenery,&nbsp;Yangtze River cruise becomes a must take tour while visiting China and the best way to explore the&nbsp;</span><strong data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Three Gorges</span></strong><span data-dcnode-id="1860" instrument_node="">. Besides enjoying the leisure onboard activities, you can also visit numerous shore excursions including&nbsp;</span><strong data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Fengdu Ghost City</span></strong><span data-dcnode-id="1857" instrument_node="">,&nbsp;</span><strong data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Shibaozhai Pagoda</span></strong><span data-dcnode-id="1854" instrument_node="">, </span><strong data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">White Emperor City</span></strong><span data-dcnode-id="1851" instrument_node="">&nbsp;and so on.</span></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">No matter how you spend your time in Chongqing, you will never forget this Chinese city overflowing with beauty and history.</span></p></div><div class="rightpic" data-dcnode-id="1838"><span data-dcnode-id="1845" instrument_node="">

</span><p data-dcnode-id="1760"><span data-dcnode-id="1765" instrument_node="">Known as the little Chongqing, </span><strong data-dcnode-id="1762"><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/chongqing/ciqikou-ancient-town.html" target="_blank"><span data-dcnode-id="1764" instrument_node="">Ciqikou Ancient Town</span></a></strong><span data-dcnode-id="1761" instrument_node="">, 14 kilometers to the west of Chongqing, is perched on a hill overlooking the Jialing River in the west of the city. It is a century old town that could date back to the late Ming Dynasty (1368-1644), featuring well-restored buildings.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">“One flagstone road, and one thousand years’ Ciqikoi”, visiting Ciqikou Ancient Town offers excellent cultural experience. You could see the local residents dedicated to their traditional way of life, taste the local famous snacks and food, enjoy a cup of tea in the teahouse, and appreciate the Shu Embroidery and other handcrafts. </span></p><span data-dcnode-id="1756" instrument_node="">

</span><p data-dcnode-id="1691"><strong data-dcnode-id="1693"><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/chongqing/chongqing-china-three-gorges-museum.html" target="_blank"><span data-dcnode-id="1695" instrument_node="">Three Gorges Museum</span></a></strong><span data-dcnode-id="1692" instrument_node="">, built in 1951, is one of the largest museums in south-west China with unique architectural design. It is not only a typical museum of the Yangtze Three Gorges but also a comprehensive museum of history and arts.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">This interesting museum has over 170,000 relics and artifacts. In addition, the 23,000 meters floor-space of the museum can be divided into four major exhibition hall with several themes, one the hall is dedicated to the “history and spirit of the splendid Three Gorges”, and one dedicated to the “long history of the ancient Bashu Area”…Paying a visit to Three Gorges Museum before or after your Yangtze River cruise, you could have an overall understanding of Yangtze.

</span><p data-dcnode-id="1630"><span class="bld" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Type:</span></span><span data-dcnode-id="1631" instrument_node="">  Parks &amp; Gardens</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1625"><span class="bld" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Recommended Length of Visit:</span></span><span data-dcnode-id="1626" instrument_node=""> 1-2 hours </span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">E’ling Park, also called the Goose Neck Park, is the earliest personally owned garden. It offers a good view of both the Yangtze River and Jiangling River. Standing atop of the pagoda, you could have a bird’s eye view of Chongqing city. </span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Originally a private garden built during the Qing dynasty, the park was named Yiyuan, and later Liyuan. The name was changed to E'ling when a calligrapher named Zhaoxi wrote to the garden's owner and told him that the hill was shaped like the head of a goose. All the architecture and artwork is done in the traditional Chinese way. Visiting E’ling Park in summer days, you'll soon get cool. It is a great place to see all the lights up at the night time. </span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1615"><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/chongqing-tours/1-day-chongqing-tour.html" target="_blank" title="1 Day Chongqing Short Stay Tour"><span data-dcnode-id="1617" instrument_node="">&gt;&gt; 1 Day Chongqing Short Stay Tour</span></a></p><span data-dcnode-id="1614" instrument_node="">

</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">If you haven’t seen Giant Panda yet, you could take this great chance to have a closer contact with the cute bears in Chongqing Zoo. </span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Chongqing Zoo is surrounded by beautiful mountains with abundant natural scenery, making it a true treasure in the area. It is home to more than 200 different animal species, and more than 6,000 animals in total. The Panda House covers an area of about 2 hectares, and is the undoubted highlight for visitors. Visitors could see the precious and childlike giant panda as well as other rare animals such as golden monkeys and South China Tigers.  </span></p><span data-dcnode-id="1558" instrument_node="">

</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Hongya Cave is located in Chongqing’s core commercial district of Jiefangbei on Cangbai Road and at the intersection of the Yangtze and Jialing Rivers. The area combines travel, business, and cultural scenery into one grand view, with an overriding theme of stilted buildings which stands for the famous traditional Bayu minority architectural style on raised wooden stilts. It’s an attraction for Chongqing visitors. The mid-levels house food courts with a wide variety of inexpensive snacks and meals while the upper floors contain upscale restaurants and a Starbucks.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Hongya Cave is a leisure, entertainment, shopping and food heaven for people, while offering a commercial kingdom of Bayu culture, cuisine, and entertainment.</span></p><span data-dcnode-id="1486" instrument_node="">

</span><p data-dcnode-id="1428"><strong data-dcnode-id="1430"><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/chongqing/dazu-rock-carvings.html" target="_blank"><span data-dcnode-id="1432" instrument_node="">Dazu Rock Carvings</span></a></strong><span data-dcnode-id="1429" instrument_node="">, about 120 km from Chongqing, are a series of Chinese religious sculptures and carvings, dating back as far as the 7th Century AD, depicting and influenced by Buddhist, Confucian and Taoist beliefs.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Listed as a World Heritage Site, the Dazu Rock Carvings are made up of 75 protected sites containing some 50,000 statues, with over 100,000 Chinese characters forming inscriptions and epigraphs. It has gained the fame as “the pearls of the oriental art” and are rewarded as World Heritage Site by UNESCO in 1999. Among all these, Baodingshan and Beishan are the most well-known and popular sites. </span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">As one of the spectacular grotto arts, Dazu Rock Carvings are on a par with Mogao Caves, Longmen Grottoes and Yungang Grottoes in China. </span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1418"><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/chongqing-tours/2-days-chongqing-dazu-tour.html" target="_blank" title="2 Days Chongqing Highlights Tour with Dazu Rock Carvings"><span data-dcnode-id="1420" instrument_node="">&gt;&gt; 2 Days Chongqing Highlights Tour with Dazu Rock Carvings</span></a></p><span data-dcnode-id="1417" instrument_node="">

</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Wulong Karst, an important part of South China Karst, features spectacular karst landscapes, including the three main parts of the Natural Three Stone Bridges (Tianlong Bridge, Qinglong Bridge, and Heilong Bridge), Furong Cave and Houping Tiankengs. What’s more, the Fairy Mountains National Forest Park is also a highlight in Wulong. </span></p><span data-dcnode-id="1344" instrument_node="">

</span><p data-dcnode-id="1277"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">General Joseph W. Stilwell Museum</span></strong><span data-dcnode-id="1278" instrument_node="">, built in 1991, is the former residence of General Stilwell from 1942 to 1944. General Stilwell, the Chief of Staff of the Allied Forces in China and the Commander in Chief of the US forces in the China Burma India Theater. By visiting the museum, one can understand the General common but colorful life in China and see the fact that General Stilwell helped the Chinese government and people flight against Fascist during World War II. The museum is composed with Stilwell’s office, bedroom, dinning room, basement and his aide’s office. Over 100 items from the past are on display, including radio, telephone, script and uniform. In the basement, over 200 old photos tell the story of Stilwell and his life in China. This museum covered only 500 square meters but receives more than 30000 American visitors every year. Although it has been renovated several times, the style of it has not been changed. </span></p><span data-dcnode-id="1276" instrument_node="">

</span><p data-dcnode-id="1218"><span class="bld" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Recommended Length of Visit:</span></span><span data-dcnode-id="1219" instrument_node=""> 2 to 3 hours </span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1213"><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Huguang Guide Hall</span></strong><span data-dcnode-id="1214" instrument_node=""> is the largest ancient group of guide halls in south of Yangtze River in China which has the high building, cultural, historical and artistic value. The building group was fist built in 1759 under the regime of Emperor Qianlong in Qing Dynasty created as an early form of union hall and was expanded many times tuning it into a sprawling complex of buildings, courtyards, and gardens around 100 years later. The complex covered around 8500 square kilometers and composed with many halls such as Guangdong Hall, Jiangnan Hall, Lianghu Hall, Jiangxi Hall and there are four other towers for opera shows. The wooden building walls, doors and windows were delicately carved. It is a classic example of an ancient Chinese Guild hall. Unfortunately, it was damaged by fire. However with government’s support and builder’s high quality work, the complex was refurbished and reopened in 2005. The now renovated halls and rooms are about 300 years old and still in use. Many theaters, opera stage and temple-halls can be seen while local performances are shown here daily. Some of the rooms are turned into a migration museum. Visitors can enjoy the architecture, watch performance, eat and shop here. </span></p><span data-dcnode-id="1212" instrument_node="">

</span><p data-dcnode-id="1159"><span class="bld" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Type:</span></span><span data-dcnode-id="1160" instrument_node=""> shopping pedestrian, landmark </span></p><span data-dcnode-id="1158" instrument_node="">

</span><p data-dcnode-id="1145"><span data-dcnode-id="1152" instrument_node="">Located in the center of downtown Chongqing, </span><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Jiefangbei CBD</span></strong><span data-dcnode-id="1149" instrument_node=""> is covered 24400 square meters, 400 meters from east to west and 350 meters from north to south. There are three main roads in Jiefangbei pedestrian street, which are Minquan Road, Minzu Road and Zourong Road, and the intersection, also the center of Jiefangbei is the </span><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">People’s Liberation Monument</span></strong><span data-dcnode-id="1146" instrument_node="">. This drab clock tower, the landmark of Chongqing, is to celebrate the Communists’ liberation of the city from seventy years of colonial and right-wing occupation. Around the Square there are over 3000 stores and shops, it is absolutely a paradise for shopaholic. There are also many food streets here to cater for visitors who come to try local special dishes. More than 300,000 people visit Jiefangbei CBD every day on the average, and on holidays the figures may exceed 900,000. It’s definitely one of the most busiest part of downtown Chongqing.</span></p><span data-dcnode-id="1144" instrument_node="">

</span><p data-dcnode-id="1086"><span class="bld" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Recommended Length of Visit:</span></span><span data-dcnode-id="1087" instrument_node=""> 30 minutes </span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1075"><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Chaotianmen Bridge</span></strong><span data-dcnode-id="1082" instrument_node=""> is also known as Chaotianmen Yangtze River Bridge. The construction of this bridge started at December 2004. On April 29, 2009, Chaotianmen Bridge was officially opened to traffic. Chaotianmen Bridge connects Wulidian in Jiangbei district in the west and Danzishi in Nan’an District in the east, with the total length 1741meters, and the main span is 552 meters long. When it was first built, it was the longest arch bridge in the world. The design scheme of the bridge was called "The River Gate of The City", so as to highlight the landscape effect. Through the gate of this city, one can see the scenery of Yuzhong Peninsula. Except the piers, the main framework of this bridge is red. With few piers designed to enter the water minimized the damage to the river landscape. Besides, the bridge also integrates the two city CARDS, Jiefangbei and Chaotianmen. It is a good place to appreciate </span><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">the confluence of two rivers</span></strong><span data-dcnode-id="1079" instrument_node=""> and </span><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">the night view</span></strong><span data-dcnode-id="1076" instrument_node=""> of mountain city. </span></p><span data-dcnode-id="1074" instrument_node="">

</span><p data-dcnode-id="1008"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Chaotianmen Dock</span></strong><span data-dcnode-id="1018" instrument_node="">, also known as Chaotianmen Wharf, is located at the confluence of Yangtze River and Jialing River of Yuzhong District in Chongqing. More than 85% of tourists would visit Chaotianmen Dock, because it is the main embarked and disembarked place of </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/yangtze-cruises.html" target="_blank" title="Yangtze River cruise"><span data-dcnode-id="1017" instrument_node="">Yangtze River cruise</span></a><span data-dcnode-id="1015" instrument_node=""> tour and short Chongqing city cruising trip. Since </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/chongqing/chaotianmen-dock.html" target="_blank" title="Chaotianmen Dock"><span data-dcnode-id="1014" instrument_node="">Chaotianmen Dock</span></a><span data-dcnode-id="1012" instrument_node=""> is settled at the city center area, it’s very convenience for you to travel from Chaotianmen dock to other scenic spots such as Hongya Cave, Jiefangbei, Three Gorges Museum, Ciqikou Ancient Town and so on. If you have several hours left before boarding the cruise, you can have a short shopping and dining time at </span><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Raffles City</span></strong><span data-dcnode-id="1009" instrument_node="">, It’s also recommended place for tourist to enjoy the stunning night view of Chongqing. </span></p><span data-dcnode-id="1007" instrument_node="">

</span><p data-dcnode-id="954"><span class="bld" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Type:</span></span><span data-dcnode-id="955" instrument_node=""> nature and parks, mountains </span></p><span data-dcnode-id="953" instrument_node="">

</span><p data-dcnode-id="941"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Chongqing Wulong Fairy Mountain</span></strong><span data-dcnode-id="945" instrument_node=""> is a national forest park covers 8910 hectares and with an average altitude of 1900m, belonged to Wuling Mountain Range in the eastern Chongqing. Surrounded by Wu River, Fairy Mountain is reputed as “Eastern Switzerland” and “Summer Palace in Mountain City”. Forest sea, marvelous peaks, alpine meadow and snowfield are the four wonders in </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinadiscovery.com/chongqing/wulong-karst-landscape.html" target="_blank" title="Fairy Mountain"><span data-dcnode-id="944" instrument_node="">Fairy Mountain</span></a><span data-dcnode-id="942" instrument_node="">. You can climb up and having a bird view of Fairy Mountain in Spring, enjoy a short leisure and adventurous vacation in summer, record the colorful Fairy Mountain with photograph in autumn and take some ice sports such as skating ans skiing in winter. The scenery is picturesque all year around. </span></p><span data-dcnode-id="940" instrument_node="">

</span><p data-dcnode-id="884"><span class="bld" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Type:</span></span><span data-dcnode-id="885" instrument_node=""> nature and parks, mountains </span></p><span data-dcnode-id="883" instrument_node="">

</span><p data-dcnode-id="865"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Heishan Valley</span></strong><span data-dcnode-id="875" instrument_node="">, also known as Black Mountain Valley, covers 40 square miles, located in Heishan Mountain Town of Wansheng Economic Development District in Chongqing city. The primitive natural environment in this scenic area is well preserved. You can enjoy the natural beauty of high mountains, steep cliffs, grand waterfall, deep valley, as well as various animals and plants. Heishan Valley is a summer resort and natural air conditioner in hot days. Walking on the plank roads and floating bridges in </span><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Carp River Gorges</span></strong><span data-dcnode-id="872" instrument_node="">, you can see carp swimming beneath, giving a feeling of wandering in an underwater palace. Visitors can also go through the </span><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Fish Leaping Gorge</span></strong><span data-dcnode-id="869" instrument_node=""> and observe the carp closely. There is also a waterfall looks like a fish, called </span><strong data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Fish-like Waterfall</span></strong><span data-dcnode-id="866" instrument_node=""> in Heishan Valley Scenic Area. When the sun shines right on it, a looming rainbow would appear. It would be a perfect place for you to escape from the hustle and bustle city life. </span></p><span data-dcnode-id="864" instrument_node="">

</span><p data-dcnode-id="795"><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Mountain Jinfo</span></strong><span data-dcnode-id="796" instrument_node=""> located in Nanchuan District, Chongqing city is a World Natural Heritage and National 5A Scenic Area for its’ primitive natural landscape, rare stones, mysterious caves, adventurous cliffs and historic temples. It’s a perfect place for a summer escape. In the afterglow of the sunset, Mountain Jinfo looks like a giant Buddha shinning with boundless golden radiance, hence it also being called “Golden Buddha Mountain”. There are several scenic spot in Jinfo Mountain that are recommended including Azure Stream Valley, Qianniuping Scenic Area, Chinese Medicine Pool and Jinfo Mountain Peak. </span></p><span data-dcnode-id="794" instrument_node="">

</span><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">Surrounded by high rise skyscrapers, </span><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Luohan Temple</span></strong><span data-dcnode-id="731" instrument_node=""> is located in Minzu Road, Yuzhong District. It is one of the important Buddhist temple in Han nationality region. Built about 1000 years ago, the temple has a long entrance way flanked by rock carvings, a hall of painted terracotta arhat sculptures and a hall containing a large gold Buddha figure. The original building complex was destroyed by Fascist Booming in 1942 and the Great Cultural Revolution. In 1984, the government allocated special funds for reconstruction. The building complex we see nowadays are contained with the archway, Mountain Gate, Ming Stele Pavilion, Ancient Buddha Rock, Arhat Hall, the Main Shrine Hall, Phra Mondop and Guest Room. There are total 524 exquisite and vivid clay statues in Arhat hall, even nowadays you can still find lots of people paying their respects to the buddhist deities everyday.</span></p><span data-dcnode-id="729" instrument_node="">
