</span><p data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">If you are searching for a nightlife hotspot, the Cornish town of Newquay is an excellent place to look. Sat on </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jtgtravel.com/europe/united-kingdom/cornwall-or-devon/"><span data-dcnode-id="687" instrument_node="">Cornwall’s</span></a><span data-dcnode-id="685" instrument_node=""> scenic North Coast, Newquay offers sea, sand, and sometimes sun – a perfect British substitute for a lads’ or girls’ holiday abroad. Over the past few decades, nightlife in Newquay has boomed, and the town now holds a fantastic party reputation.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">So, while we’ve established that Newquay offers fantastic nightlife, which clubs and pubs should you add to your list? Newquay has plenty of venues, whether you want beach-side cocktails, an indie DJ, or just bassline and strobe lighting.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">To help you to narrow down all your choices, we have curated a guide to the crème de la crème of nightlife in Newquay. Here are our top 7 best bars and clubs in Newquay.</span></p><span data-dcnode-id="677" instrument_node="">

</span><figure class="wp-block-image size-full" data-dcnode-id="622"><img alt="A blue margarita with plenty of ice cubes and a slice of lime." class="wp-image-9833 lazyloaded td-animation-stack-type0-2" data-dcnode-id="627" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1" data-srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-265x198.jpg?lossy=0&amp;strip=1&amp;webp=1 265w" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1.jpg%3Flossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-265x198.jpg?lossy=0&amp;strip=1&amp;webp=1 265w" width="800"><noscript data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">&lt;img width="800" height="600" src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1" alt="A blue margarita with plenty of ice cubes and a slice of lime." class="wp-image-9833" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-300x225.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-768x576.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-150x113.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-600x450.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-696x522.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 696w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/margarita-1839361_1280-1-265x198.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 265w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">A margarita via Pixabay.</span></figcaption></figure><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Rated Newquay’s number one on Trip Advisor, this Cornish speakeasy is popular with locals and tourists alike. The bar takes its name from the traditional folk character Tom Thumb. Only the size of a thumb, Tom runs amok in his tales, with a passion for adventure and a knack for getting into trouble.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">As a ‘passion forward, spirit and quality led bar’, an expertly concocted drink at the Tom Thumb Cocktail Bar is sure to lead you to some mischief as well. Stick to the ‘Classics’, such as the zesty whisky favorite The Old Fashioned or tequila-based Margarita. Or shake things up a bit with the in-house ‘Originals’, such as Absinthe-based Three Times a Lady – Tom Thumb’s menu demands a thorough sampling. And, for drinks and bar snacks, guests can opt to sit at the bar or snatch up a table with a group of friends.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Visitors should note that Tom Thumb has a no stag or hen event policy, alongside a dress code that can be checked in advance online. If you’d like to grab a drink, the bar is open to serve from Wednesday to Sunday from 3 pm to 11:30 pm.</span></p><span data-dcnode-id="612" instrument_node="">
</span><h2 data-dcnode-id="608"><span class="ez-toc-section" data-dcnode-id="611" id="Whiskers"></span><span data-dcnode-id="610" instrument_node="">Whiskers</span><span class="ez-toc-section-end" data-dcnode-id="609"></span></h2><span data-dcnode-id="607" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="601"><img alt="A close-up of a microphone with lights in the background. Whiskers' live music makes is a fantastic venue for nightlife in Newquay." class="wp-image-9838 lazyloaded td-animation-stack-type0-2" data-dcnode-id="606" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1" data-srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-265x198.jpg?lossy=0&amp;strip=1&amp;webp=1 265w" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1.jpg%3Flossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-265x198.jpg?lossy=0&amp;strip=1&amp;webp=1 265w" width="800"><noscript data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">&lt;img width="800" height="600" src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1" alt="A close-up of a microphone with lights in the background. Whiskers' live music makes is a fantastic venue for nightlife in Newquay." class="wp-image-9838" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-300x225.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-768x576.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-150x113.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-600x450.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-696x522.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 696w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/mic-3989881_1280-1-265x198.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 265w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">A microphone via Pixabay.</span></figcaption></figure><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">From open comedy mics to live music, Whiskers is the place to be entertained. You can plan a drink to align with your preferred music genre by checking for events on their website beforehand.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">&nbsp;The general weekly rule is that Friday and Saturday are for ‘rotating genres’ and DJ’ party vibes’, so Whiskers will be a good pick for a classic weekend night out. If you want to catch an Open Mic, Monday is your day, while for jazz and blues, C Bone and the Doc attract a crowd on Tuesdays. Wednesday and Thursdays offer ‘grass roots live music’ – featuring local, upcoming talent. With such a packed weekly schedule, it is no wonder that Whiskers makes The Lonely Planet Guide to England.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">If you are already planning a visit, opening hours at Whiskers are late to late. Their hours are stated online as 7 pm until 2:30 am – which leaves plenty of time for you to party.</span></p><span data-dcnode-id="591" instrument_node="">
</span><h2 data-dcnode-id="587"><span class="ez-toc-section" data-dcnode-id="590" id="Belushis"></span><span data-dcnode-id="589" instrument_node="">Belushi’s</span><span class="ez-toc-section-end" data-dcnode-id="588"></span></h2><span data-dcnode-id="586" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="580"><img alt="A row of beer taps with stocked fridges behind the bar." class="wp-image-9835 lazyloaded td-animation-stack-type0-2" data-dcnode-id="585" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1" data-srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1.jpg%3Flossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w" width="800"><noscript data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">&lt;img width="800" height="600" src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1" alt="A row of beer taps with stocked fridges behind the bar." class="wp-image-9835" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-300x225.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-768x576.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-150x113.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-600x450.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/uk-5067835_1280-1-696x522.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 696w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">A bar via Pixabay.</span></figcaption></figure><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Look no further than Belushi’s for beach views, live sports, and a delicious burger menu. The bar is an excellent spot to start (or end) a night out in Newquay. With the venue split over two levels, partiers can choose to watch the footy with a craft beer or enjoy cliff-top vistas with a 2 for £10 Classic Cocktail in hand.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Belushi’s focus is on the fun. With live music and weekend DJs, the venue especially comes to life on a Friday and Saturday evening. Although beer pong, pool tables, and an outdoor beer garden welcome nightlife antics throughout the week. The venue even offers a surfing school – because what better way to nurse a hangover?</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">During the week, Belushi’s hours differ a little. From Monday to Wednesday, the bar is open from 4 pm until midnight. On Thursday to Sunday, the bar is open from noon until midnight, while Friday and Saturday, the opening hours are from noon until 1 am. To explore the bar for yourself, you will find Belushi’s on Fore Street, near the Western end of Towan Beach.</span></p><span data-dcnode-id="570" instrument_node="">
</span><h2 data-dcnode-id="566"><span class="ez-toc-section" data-dcnode-id="569" id="Rebellion_Roast_House"></span><span data-dcnode-id="568" instrument_node="">Rebellion Roast House</span><span class="ez-toc-section-end" data-dcnode-id="567"></span></h2><span data-dcnode-id="565" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="559"><img alt="A multi-colored cocktail, fading from orange to blue, with ice and a slice of lemon. The Rebellion Roast House's cocktails make it a great venue for nightlife in Newquay." class="wp-image-9840 lazyloaded td-animation-stack-type0-2" data-dcnode-id="564" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1" data-srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1.jpg%3Flossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w" width="800"><noscript data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">&lt;img width="800" height="600" src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1.jpg?lossy=0&amp;strip=1&amp;webp=1" alt="A multi-colored cocktail, fading from orange to blue, with ice and a slice of lemon. The Rebellion Roast House's cocktails make it a great venue for nightlife in Newquay." class="wp-image-9840" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-300x225.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-768x576.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-150x113.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-600x450.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/cocktail-3327242_1280-1-696x522.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 696w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">A multi-colored cocktail via Pixabay. </span></figcaption></figure><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">With a passion for the rebellious and unique twists on the classics, the Rebellion Roast House has accrued an impressive 4.5 google rating. The spot is well-suited to a pre-club drink or hearty meal – offering a complete food and drinks menu. Trust us, drinking at the Roast House is not an experience you want to forget in the morning after haze.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">For a hot challenge, try a Mad Hot Mary, brewed with Chilli Devil Water Moonshine and served with a ‘candied bacon skewer’. The color-changing Mad Hatters cocktail is a great way to experience the magic of mixology. Or perhaps the Unmanageable Mule – brewed with Moonshine, kiwi, and mint and filled with magical color-changing ice. The drinks list at the Rebellion Roast House caters doggedly to a unique guest experience.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Located on Cliff Road, the Roast House is a three-minute walk to Great Western Beach, making it a great beach day combination. And, open 11 am to 11 pm daily, the Rebellion Roast House is a reliable nightlife option. A perfect venue to indulge in the extraordinary, the Rebellion Roast House is a valuable asset to nightlife in Newquay.</span></p><span data-dcnode-id="549" instrument_node="">
</span><h2 data-dcnode-id="545"><span class="ez-toc-section" data-dcnode-id="548" id="The_Dead_Famous_Late_Night_Liquor_Lounge"></span><span data-dcnode-id="547" instrument_node="">The Dead Famous Late Night Liquor Lounge</span><span class="ez-toc-section-end" data-dcnode-id="546"></span></h2><span data-dcnode-id="544" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="538"><img alt="Two double whiskies with two ice cubes in each and a cigar in front of them. The Dead Famous' grungy atmosphere makes it a trendy venue for nightlife in Newquay." class="wp-image-9836 lazyloaded td-animation-stack-type0-2" data-dcnode-id="543" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1" data-srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1.jpg%3Flossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w" width="800"><noscript data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">&lt;img width="800" height="600" src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1" alt="Two double whiskies with two ice cubes in each and a cigar in front of them. The Dead Famous' grungy atmosphere makes it a trendy venue for nightlife in Newquay." class="wp-image-9836" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-300x225.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-768x576.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-150x113.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-600x450.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/whiskey-3313592_1280-1-1-696x522.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 696w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Two whiskies via Pixabay.</span></figcaption></figure><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">The Dead Famous; a late-night bar and grill that prides itself on serving top-quality ‘hard liquor’. Whether you are sipping a ‘Tears of a Clown’ cocktail or a whiskey on the rocks, the grunge rock-style ambiance guarantees a trendy experience. Inside, guests can enjoy atmospheric red lighting and live music. Think LA meets Newquay in an intimate partier’s haven.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">The Dead Famous Late Night Liquor Lounge hosts many DJ nights, ranging from Blues to RnB. Because of the variety, for an even better experience, coincide your visit with your favorite genre choice. Friday and Saturdays are the lounge’s prime days, where you can expect a packed dance floor and lots of new faces to meet.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Although, don’t write The Dead Famous off for daytime drinks and dining. For alfresco beverages or food, guests can opt to sit on the Seaview deck to soak up the sun and ocean views. Open seven days a week from 12 pm until 4 am, The Dead Famous is a versatile addition to nightlife in Newquay. From the perfect early hours haunt to scenic midday dining, the lounge deserves a firm spot on your list of best bars and clubs.</span></p><span data-dcnode-id="528" instrument_node="">
</span><h2 data-dcnode-id="524"><span class="ez-toc-section" data-dcnode-id="527" id="Tall_Trees_club"></span><span data-dcnode-id="526" instrument_node="">Tall Trees club</span><span class="ez-toc-section-end" data-dcnode-id="525"></span></h2><span data-dcnode-id="523" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="516"><img alt="A spotlight on an empty stage with red curtains and a drum kit on the stage corner. Tall Trees is a great venue for nightlife in Newquay." class="wp-image-9837 lazyload td-animation-stack-type0-1" data-dcnode-id="522" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1" data-srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w" height="600" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="800"><noscript data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">&lt;img width="800" height="600" src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1" alt="A spotlight on an empty stage with red curtains and a drum kit on the stage corner. Tall Trees is a great venue for nightlife in Newquay." class="wp-image-9837" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-300x225.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-768x576.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-150x113.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-600x450.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-monica-silvestre-713149-1-1-696x522.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 696w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="517"><em data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">A stage via Pexels.</span></em></figcaption></figure><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="514" instrument_node="">Tall Trees is widely credited for bringing nightlife to Newquay. One of the oldest venues in town, the club opened in the 80s and has been hosting partiers ever since. In fact, according to </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cornwalllive.com/news/inside-story-1990s-newquay-nightclub-1460487" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="513" instrument_node="">Cornwall Live</span></a><span data-dcnode-id="511" instrument_node="">, Tall Trees was so renowned that ‘in 1998, it was voted number one club in the South West by Ministry of Sound magazine’.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Nowadays, Tall Trees is a nightclub-turned-cabaret. With a fully stocked bar for all your beverage needs, you can experience a twist on a classic night out. The shows range from entertaining to unforgettable – running along the lines of why not have a beer and attend a hypnosis event?</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">To plan ahead, you can find details of upcoming events on Tall Trees official website or social media, so you can see if any night-time events coincide with your visit. For evening entertainment, it doesn’t get more out there.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Tall Trees is an iconic venue in Newquay and the original epicenter of the local nightlife. The club is ideal for someone looking to combine entertainment and partying, and the evening performances will suit a weekend dedicated to Cornish nightlife.</span></p><span data-dcnode-id="500" instrument_node="">
</span><h2 data-dcnode-id="496"><span class="ez-toc-section" data-dcnode-id="499" id="Berties_Club"></span><span data-dcnode-id="498" instrument_node="">Bertie’s Club</span><span class="ez-toc-section-end" data-dcnode-id="497"></span></h2><span data-dcnode-id="495" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="489"><img alt="A band playing in a clubby environment  with a guitarist at the front of the stage.  Bertie's Club is one of the best places for nightlife in Newquay." class="wp-image-9842 lazyload td-animation-stack-type0-1" data-dcnode-id="494" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1" data-srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-300x225.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-768x576.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-150x113.jpg?lossy=0&amp;strip=1&amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-600x450.jpg?lossy=0&amp;strip=1&amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-696x522.jpg?lossy=0&amp;strip=1&amp;webp=1 696w" height="600" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="800"><noscript data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">&lt;img width="800" height="600" src="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1.jpg?lossy=0&amp;strip=1&amp;webp=1" alt="A band playing in a clubby environment  with a guitarist at the front of the stage.  Bertie's Club is one of the best places for nightlife in Newquay." class="wp-image-9842" srcset="https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 800w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-300x225.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 300w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-768x576.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 768w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-150x113.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 150w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-600x450.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 600w, https://912689.smushcdn.com/2247719/wp-content/uploads/2021/09/pexels-sebastian-ervi-1763075-1-1-696x522.jpg?lossy=0&amp;amp;strip=1&amp;amp;webp=1 696w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Nightlife scenes via Pixabay.</span></figcaption></figure><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">For classic nightclub vibes, Bertie’s Nightclub is your best bet. With DJs, VIP booths, packed dance floors, and lots of strobe lighting – Bertie’s hosts the best of Newquay’s clubbing nights.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">The club has some key weekly events, so don’t miss the memo. Throughout summer, a favorite weekly event is Bertie’s Friday Foam Party, which also hosts special offers for £2 drinks. Bar hopping around Newquay for pre-drinks is worth every dime. However, Bertie’s Nightclub is budget-friendly, with plenty of drinks deals – giving you the option to scratch pre-drinks altogether and hit the club early.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">If you do want to splash out on a more luxury experience, VIP booths can be booked for £20 a person and seat from 4 to 12 guests. VIP booths come with ‘drinks to the value of the booth booking’- for example, four people booking would entitle guests to £80 worth of drinks for the group. For a lads’ or girls’ holiday, the VIP experience is one way to go out with a bang!</span></p><span data-dcnode-id="479" instrument_node="">
</span><h2 data-dcnode-id="475"><span class="ez-toc-section" data-dcnode-id="478" id="Is_Newquay_good_for_nightlife"></span><span data-dcnode-id="477" instrument_node="">Is Newquay good for nightlife?</span><span class="ez-toc-section-end" data-dcnode-id="476"></span></h2><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Newquay is great for nightlife, offering excellent bars and clubs within a short walking distance. Between the club deals at Bertie’s Nightclub and the sleek vibes at the Tom Thumb Liquor Bar, the town speaks to quality over quantity while still providing diverse venue choices.</span></p><span data-dcnode-id="471" instrument_node="">
</span><h2 data-dcnode-id="467"><span class="ez-toc-section" data-dcnode-id="470" id="What_time_do_pubs_shut_in_Newquay"></span><span data-dcnode-id="469" instrument_node="">What time do pubs shut in Newquay?</span><span class="ez-toc-section-end" data-dcnode-id="468"></span></h2><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">As a general rule, in Newquay pubs tend to close at around midnight on Friday and Saturdays and 11 pm on other nights. However, Newquay’s bars stay open until the early hours – with The Dead Famous Late Night Liquor Lounge open until 4 am all week.</span></p><span data-dcnode-id="463" instrument_node="">
</span><h2 data-dcnode-id="459"><span class="ez-toc-section" data-dcnode-id="462" id="Where_are_the_best_clubs_in_Newquay_for_students"></span><span data-dcnode-id="461" instrument_node="">Where are the best clubs in Newquay for students?</span><span class="ez-toc-section-end" data-dcnode-id="460"></span></h2><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">For students, Bertie’s Nightclub is the best club in Newquay. With set DJ events and Friday Foam Parties, the club is a great place to meet new people and is action-packed with fun. Plus, Bertie’s Nightclub drinks deals make for an affordable student night out.</span></p><span data-dcnode-id="455" instrument_node="">
