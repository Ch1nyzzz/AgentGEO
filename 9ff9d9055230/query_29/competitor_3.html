</span><div data-dcnode-id="1743" id="title_465_25"><span data-dcnode-id="1744" instrument_node="">Beijing History</span></div><span data-dcnode-id="1742" instrument_node="">
</span><span data-dcnode-id="1740" instrument_node="">
</span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/blog/beijing-travel/beijing-events-holidays-festivals/" target="_blank"><img align="right" alt="Monthly Events &amp; Festivals Beijing" border="0" data-dcnode-id="1739" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/images/e_f_b.jpg&amp;raw" width="216"></a><span data-dcnode-id="1737" instrument_node="">Beijing (北京）literally means "the northen capital". The city construction of Beijing has a history of over 800 years dated back to the year 1153 AD when the Jin Dynasty (1115-1234) built Beijing as its capital later named "Zhongdu". Mongol armies seized Zhongdu in 1215. Kublai Khan rebuilt the city and gave it the Chinese (Han) name of Dadu or Great Capital as capital city called "Dadu" in Yuan Dynasty (1271 – 1368). </span><br data-dcnode-id="1736"><span data-dcnode-id="1735" instrument_node="">
</span><br data-dcnode-id="1734"><span data-dcnode-id="1733" instrument_node="">
On August 2, 1368, Ming troops conquered Dadu and renamed it Beiping (Northern Peace). Zhu Yuanzhang was the founding emperor of the Ming Dynasty (1368-1644). When the Manchus founded the Qing Dynasty in 1644, they began to build suburban gardens, the most famous of which was Yuanmingyuan. </span><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node="">
</span><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">
Qing Dynasty (1644 - 1911) left the city wall and palaces built in Ming Dynasty almost intact. So Beijing's city plan was first laid out in the Yuan Dynasty (1271 - 1368). Yet only after massive reconstruction during the Ming and Qing (1644-1911), did the city come as an architectural masterpiece as the capital of the Chinese empire. </span><br data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">
</span><br data-dcnode-id="1726"><span data-dcnode-id="1725" instrument_node="">
Nanjing was officially made the capital of the Republic of China in 1928. Beijing was renamed Beiping (北平), meaning "northern peace" or "north pacified". During the 
Anti-Japanese War, Beiping fell to Japan on 29 July 1937. </span><br data-dcnode-id="1724"><span data-dcnode-id="1723" instrument_node="">
</span><br data-dcnode-id="1722"><span data-dcnode-id="1721" instrument_node="">
On 1 October, 1949, the Communist Party of China, under the leadership of Mao Zedong, announced in Tiananmen the founding of the People's Republic of China and renamed the city back to Beijing. This date became China's national day. </span><br data-dcnode-id="1720"><span data-dcnode-id="1719" instrument_node="">
</span><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node="">
</span><a data-dcnode-id="1716" id="2" name="2"></a><span data-dcnode-id="1715" instrument_node="">
</span><div data-dcnode-id="1713" id="title_465_25"><span data-dcnode-id="1714" instrument_node="">Beijing Location</span></div><span data-dcnode-id="1712" instrument_node="">
</span><span data-dcnode-id="1710" instrument_node="">
Beijing is situated at 40 degrees north latitude and 116 degrees of longitudes. Beijing covers an area of 16,800 square kilometers, 38% of it is flat land and 62% mountains. </span><br data-dcnode-id="1709"><span data-dcnode-id="1708" instrument_node="">
</span><br data-dcnode-id="1707"><span data-dcnode-id="1706" instrument_node="">
Beijing is located in northern China, abutting Hebei Province to the north, west, south, and to the east in a small part, and Tianjin Municipality to the southeast. As a port city of Beijing, Tianjin is about 200km to the southeast of Beijing. </span><br data-dcnode-id="1705"><span data-dcnode-id="1704" instrument_node="">
</span><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">
Beijing is surrouded on its three sides (north, northwest and west) by mountains with its southeast opening to the south and east extending to Bohai Sea. The Great Wall of China runs across the northern part of Beijing. </span><br data-dcnode-id="1701"><span data-dcnode-id="1700" instrument_node="">
</span><br data-dcnode-id="1699"><span data-dcnode-id="1698" instrument_node="">
</span><a data-dcnode-id="1697" id="3" name="3"></a><span data-dcnode-id="1696" instrument_node="">
</span><div data-dcnode-id="1694" id="title_465_25"><span data-dcnode-id="1695" instrument_node="">Beijing Population &amp; Administration</span></div><span data-dcnode-id="1693" instrument_node="">
</span><span data-dcnode-id="1691" instrument_node="">
Beijing has a population of&nbsp;20 million in the year of 2009, about 5 million live in the city proper and the rest on the outskirts. It is divided into 14 districts and 2 counties. </span><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node="">
</span><span data-dcnode-id="1688" instrument_node="">
</span><span data-dcnode-id="1687" instrument_node="">

</span><div data-dcnode-id="1588" id="title_465_25"><span data-dcnode-id="1589" instrument_node="">Beijing Economic Development</span></div><span data-dcnode-id="1587" instrument_node="">
</span><span data-dcnode-id="1585" instrument_node="">
Through more than 50 years of construction sinnce 1949, Beijing has changed from a consumer-city to a major city with various industries. </span><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node="">
</span><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node="">
Beijing ranks second among the top 50 cities in China in terms of comprehensive power, and is the first among the 40 best cities in China in terms of investment enviroment. </span><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node="">
</span><br data-dcnode-id="1578"><span data-dcnode-id="1577" instrument_node="">
With China's reform and opening up, Beijing is improving urban construction on an unprecedented scale. Its speed of development is astonishing and it brings about changes day by day. Around this graceful ancient capital, a large number of key national projects, massive infrastructure buildings and moden residential houses have sprung up. </span><br data-dcnode-id="1576"><span data-dcnode-id="1575" instrument_node="">
</span><br data-dcnode-id="1574"><span data-dcnode-id="1573" instrument_node="">
Wasteland and low, dilapidated houses are gradually disappearing, replaced by newly-built residential quarters of different styles and surrounded by greenbelts. Wide and smooth highways, magnificent overpasses and expressways link Beijing with its neighboring provinces and cities. And eye-catching green trees and gardens have made Beijing resemble a huge scroll of painting pleasing to both the eye and the mind. </span><br data-dcnode-id="1572"><span data-dcnode-id="1571" instrument_node="">
</span><br data-dcnode-id="1570"><span data-dcnode-id="1569" instrument_node="">
Beijing is one of the most developed cities in China. Beijing is home to 26 Fortune Global 500 companies, the third most in the world behind Tokyo and Paris, and over 100 of the largest companies in China. </span><br data-dcnode-id="1568"><span data-dcnode-id="1567" instrument_node="">
</span><br data-dcnode-id="1566"><span data-dcnode-id="1565" instrument_node="">
In 2010, Beijing's GDP reached 1.37 trillion RMB. Its per capita GDP was 78,194 RMB. In 2009, Beijing's GDP was 1.19 trillion RMB (US$174 billion), a growth of 10.1% over the previous year. Its GDP per capita was 68,788 RMB (US$10,070), an increase of 6.2% over 2008 </span><br data-dcnode-id="1564"><span data-dcnode-id="1563" instrument_node="">
</span><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node="">
</span><a data-dcnode-id="1560" id="5" name="5"></a><span data-dcnode-id="1559" instrument_node="">
</span><div data-dcnode-id="1557" id="title_465_25"><span data-dcnode-id="1558" instrument_node="">Beijing Education &amp; Health</span></div><span data-dcnode-id="1556" instrument_node="">
</span><span data-dcnode-id="1554" instrument_node="">

</span><br data-dcnode-id="1551"><span data-dcnode-id="1550" instrument_node="">
Much attention is being paid to special schools with total about 600 now. more than 500 scientific research Institutions, over 300 publishing houses, as well as hundreds of newspapers and periodicals. In medical and health care, the city has more than 500 hospitals, about 65600 sick beds, with around. </span><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node="">
</span><br data-dcnode-id="1547"><span data-dcnode-id="1546" instrument_node="">
</span><a data-dcnode-id="1545" id="6" name="6"></a><span data-dcnode-id="1544" instrument_node="">
</span><div data-dcnode-id="1542" id="title_465_25"><span data-dcnode-id="1543" instrument_node="">Beijing Culture</span></div><span data-dcnode-id="1541" instrument_node="">
Beijing culture is an important part of China culture which includes literature, music, visual arts, martial arts, cuisine etc. Beijing or Peking opera, is a traditional form of Chinese theatre well known throughout the nation. Beijing cuisine is the local style of cooking. Beijing Roast Duck is perhaps the best known dish. </span><br data-dcnode-id="1540"><span data-dcnode-id="1539" instrument_node="">
</span><br data-dcnode-id="1538"><span data-dcnode-id="1537" instrument_node="">
</span><a data-dcnode-id="1536" id="7" name="7"></a><span data-dcnode-id="1535" instrument_node="">
</span><div data-dcnode-id="1533" id="title_465_25"><span data-dcnode-id="1534" instrument_node="">Beijing Religion</span></div><span data-dcnode-id="1532" instrument_node="">
Beijing, as elsewhere  in China, is a city with religious freedom and respects every religion. Buddhism, Taoism, Islam, Catholicism and Christianity are religions found in Beijing. Religious activities are carried out in Buddhist temples, Taoist temples, mosques and churches in Beijing. </span><br data-dcnode-id="1531"><span data-dcnode-id="1530" instrument_node="">
</span><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">

</span><span data-dcnode-id="1382" instrument_node="">
Beijing's climate is defined as "continental monsoon." Beijing has distinctive four seasons. 
In spring time, Beijing is a bit dusty and windy. Spring is short here and excursions are a popular form of tourism. 
Summer is hot, but the hot weather is short-lived, plus, rainfall is plentiful. 
Autumn, lasting about 50 days, is the best season for tourism and the temperature is mild and the sun is out a lot. 
Winter is long and cold, but the ice lantern shows an skiing still attract many tourists. </span><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node="">
