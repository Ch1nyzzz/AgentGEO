cnode-id="458"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/burke-mountain/ski-resort"><span data-dcnode-id="460" instrument_node="">Burke Mountain</span></a></div><div data-dcnode-id="455"><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/jay-peak/ski-resort"><span data-dcnode-id="457" instrument_node="">Jay Peak</span></a></div><div data-dcnode-id="452"><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/killington-resort/ski-resort"><span data-dcnode-id="454" instrument_node="">Killington Resort</span></a></div><div data-dcnode-id="449"><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/mad-river-glen/ski-resort"><span data-dcnode-id="451" instrument_node="">Mad River Glen</span></a></div><div data-dcnode-id="446"><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/magic-mountain/ski-resort"><span data-dcnode-id="448" instrument_node="">Magic Mountain</span></a></div></div><div data-dcnode-id="420"><div data-dcnode-id="442"><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/mount-snow/ski-resort"><span data-dcnode-id="444" instrument_node="">Mount Snow</span></a></div><div data-dcnode-id="439"><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/okemo-mountain-resort/ski-resort"><span data-dcnode-id="441" instrument_node="">Okemo Mountain Resort</span></a></div><div data-dcnode-id="436"><a data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/pico-mountain-at-killington/ski-resort"><span data-dcnode-id="438" instrument_node="">Pico Mountain </span></a></div><div data-dcnode-id="433"><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/smugglers-notch-resort/ski-resort"><span data-dcnode-id="435" instrument_node="">Smugglers' Notch Resort</span></a></div><div data-dcnode-id="430"><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/stowe-mountain-resort/ski-resort"><span data-dcnode-id="432" instrument_node="">Stowe Mountain</span></a></div><div data-dcnode-id="427"><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/stratton-mountain/ski-resort"><span data-dcnode-id="429" instrument_node="">Stratton Mountain</span></a></div><div data-dcnode-id="424"><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/sugarbush/ski-resort"><span data-dcnode-id="426" instrument_node="">Sugarbush</span></a></div><div data-dcnode-id="421"><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/suicide-six/ski-resort"><span data-dcnode-id="423" instrument_node="">Suicide Six</span></a></div></div></div></article></div></div><div class="styles_regionFAQ__3-OtM" data-dcnode-id="180"><article class="styles_box__3DPH2" data-dcnode-id="181"><div class="styles_box__m1CLQ" data-dcnode-id="412"><h2 class="styles_title__iYnrH" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Vermont Ski Resorts FAQ</span></h2><div class="styles_links__jQtZe" data-dcnode-id="413"></div></div><div class="styles_box__1sXJN styles_boxFAQ__CyqYa" data-dcnode-id="182"><div class="styles_descriptionRegion__3DegA" data-dcnode-id="183"><p data-dcnode-id="404"><span data-dcnode-id="411" instrument_node="">The Green Mountain State of Vermont is a favorite for skiers and snowboarders from all over the Northeast United States, Eastern Canada and, for that matter, around the world. Ski resorts are located along the spine of the state from the classic </span><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/mount-snow/ski-resort"><span data-dcnode-id="410" instrument_node="">Mount Snow</span></a><span data-dcnode-id="408" instrument_node=""> in the south to </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/jay-peak/ski-resort"><span data-dcnode-id="407" instrument_node="">Jay Peak</span></a><span data-dcnode-id="405" instrument_node=""> almost at the Canadian border.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Skiing in Vermont combines a sense of history with what’s become known as “Eastern Skiing” – plenty of steep trails &nbsp;with more modern Western-like slopes in places for beginners and intermediates.</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="399" instrument_node="">But that sense of history is everywhere: The story goes that Bunny Bertram, a Dartmouth College ski instructor, joked after installing a rope tow on “Hill 6” in 1935 that it would be “suicide to ski down that steep slope.” Hence </span><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/suicide-six/ski-resort"><span data-dcnode-id="398" instrument_node="">Suicide Six</span></a><span data-dcnode-id="396" instrument_node=""> in So. Pomfret became the state’s first ski area. The next year, landowner Craig Burt, Sepp Ruschp and the Mt. Mansfield Ski Club opened a rope tow on the Toll House slope and </span><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/stowe-mountain-resort/ski-resort"><span data-dcnode-id="395" instrument_node="">Stowe</span></a><span data-dcnode-id="393" instrument_node=""> began its run to becoming the King of all Eastern Skiing.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">No matter which resort you choose, Vermont skiing and snowboarding is right up there with the best of the resorts in the United States. Just different.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="387"></p><span data-dcnode-id="386" instrument_node="">
</span><h3 data-dcnode-id="383"><strong data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">What are Vermont's best ski resorts?</span></strong></h3><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Well, it’s hard to pick, but here is a variety of choices up and down the state.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="378"></p><span data-dcnode-id="377" instrument_node="">
</span><h4 data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Top rated ski resorts in Southern Vermont</span></h4><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="373" instrument_node="">Stratton Mountain, about 30 minutes from the shopping mecca of Manchester, is possibly the most upscale resort in the state. It’s a beautiful setting (winter and summer) with a lively village at the base of the mountain. It’s family friendly and a good mix of slopes and trails for all abilities. </span><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/bromley-mountain/ski-resort"><span data-dcnode-id="372" instrument_node="">Bromley</span></a><span data-dcnode-id="370" instrument_node="">, across the valley in Peru and even closer to Manchester, is a throwback ski area dating back to the thirties and created by Pabst Brewing Company scion Fred Pabst. Today, it still has the laid-back feeling, but with modern lifts and services. </span><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/magic-mountain/ski-resort"><span data-dcnode-id="369" instrument_node="">Magic Mountain</span></a><span data-dcnode-id="367" instrument_node=""> in Londonderry completes the ”snowy triangle" of Stratton, Bromley and Magic. It’s a smaller resort with a Swiss flavor and has been upgraded in recent years.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Mt. Snow in Dover came online in the 1950s and became an instant favorite. Developed by Walt Schoenknecht, a classic ski industry character, it was famous in 1960s for Fountain Mountain, a 350-foot frozen fountain in the middle of Snow Lake. Today, it remains a family-friendly, good skiing and riding mountain. It is now owned by Vail Resorts.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Okemo is technically in South Central Vermont, but why quibble? This always has been one of the best run family mountains and continues to be since Vail Resorts acquired it in 2018. It sits in Ludlow, a relaxed town at the base of the mountain. Look for the iconic village clocktower.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="358"></p><span data-dcnode-id="357" instrument_node="">
</span><h4 data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Top rated ski resorts in Central Vermont</span></h4><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Killington, or as it is widely known, “The Beast of the East,” is a big, sprawling ski mountain spread over 7 peaks. This resort is BIG. Ski or ride over 3,000 acres with more lifts on a single mountain (21 lifts carrying more than 35,000 people per hour) than any other in North America. Yes, it's the biggest in Vermont. Every possible type of terrain can be found here and it’s surprisingly manageable. The resort sits just east of Rutland with more lodging, bars, honky tonks and whatever than you can handle on a weekend or vacation. The snowmaking alone is incedible.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="347"><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/sugarbush/ski-resort"><span data-dcnode-id="350" instrument_node="">Sugarbush,</span></a><span data-dcnode-id="348" instrument_node=""> along the Rte. 100 corridor in the Mad River Valley, is a long-time skier favorite in Vermont. There are two mountains, Mt. Ellen and Lincoln Peak, nearly 600 skiable acres&nbsp;plus 2,000 acres of backcountry skiing in the Slide Brook Wilderness area. Originally nicknamed “Mascara Mountain” in the '60s because of the New York Park Ave. crowd who hopped into a ski bus and partied to, during and from the mountain every weekend. And, yes, the glamorous Stein Eriksen led the ski school in the '60s after being lured East from Aspen. The ski area has been totally&nbsp; transformed and the lodging is catching up, too.</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="342"><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/mad-river-glen/ski-resort"><span data-dcnode-id="345" instrument_node="">Mad River Glen</span></a><span data-dcnode-id="343" instrument_node="">, less than five miles from its neighbor Sugarbush, is a throwback ski area with narrow runs cut among the trees and a longtime motto: “Ski It If You Can.” Sure, there’s lots and lots of tough stuff on the mountain (probably the toughest in the East), but here’s the dirty little secret. Even beginners can ski and learn here by using the rope tow on Calle’s Corner. The ski school will get them reaqdy to tackle the main mountain quickly. Give it a try. The skier fanatics here are legendary and loyal. By the way, leave the snowboard at home. Not allowed.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="340"></p><span data-dcnode-id="339" instrument_node="">
</span><h4 data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Top rated ski resorts in Northern Vermont</span></h4><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Bolton Valley is a snowball’s throw from Burlington (OK, 30 minutes). It’s a mid-sized comfortable mountain for all members of the family to enjoy. This is a self-contained high mountain village with 71 trails and glades and 100km of Nordic and backcountry trails. The annual snowfall average is 312 inches. Your wallet won’t break here either.</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Stowe is well-known as the granddaddy of American ski resorts, certainly in the East. The &nbsp;village of Stowe and the resort are about 45 minutes from Burlington. The area's lift system includes a gondola that shuttles guests between Mount Mansfield, Vermont's highest peak, and its "sister," easier, mountain, Spruce Peak. The Lodge at Spruce Peak, located in the base village, is a luxury, ski-in/ski-out hotel and spa. The famous “Front Four” trails – National, Goat, Star and Liftline - on Mt. Mansfield offer the challenge for your trip. Stowe, now owned by Vail Resorts, is the first Vermont mountain to offer the Epic Pass.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Smugglers’ Notch, as noted above, is one of the most family-friendly ski resorts in the country and has held that rightful designation for many years. Jeffersonville is a tiny town Smuggs calls home. The “Notch” is created by the closed Route 108 that separates Stowe from Smuggs. &nbsp;Getting there is about a 45-minute drive via Rte. 100 N and I-15 W.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Jay Peak, in the way-northern town of Jay just south of the Canadian border, may have the most abundant snowfall in the Northeast. Look for some of the East’s best terrain providing skiers and riders with exciting tree glades, long groomed trails, and abundant natural snowfall.&nbsp; There’s also a terrific water park. It may be somewhat hard to get to, but worth the trip.</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Cochran’s Ski Area in Richmond is a delightful small ski area that originally served as training headquarters for the famed skiing Cochran family with the hill literally in their back yard. Barbara Ann won gold at the Sopporo, Japan Olympics in slalom in 1972. All four of Ginny and Mickey Cochran competed in the Olympics. Now, all these years later, Barbara Ann’s son Ryan took home a silver medal in the Super G in Beijing. There’s no better place to learn to ski than at this little gem.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="320"></p><span data-dcnode-id="319" instrument_node="">
</span><h3 data-dcnode-id="316"><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Which Vermont ski resorts are best for beginners?</span></strong></h3><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="314" instrument_node="">The truth is almost all Vermont ski areas are suitable for family getaways. </span><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/smugglers-notch-resort/ski-resort"><span data-dcnode-id="313" instrument_node="">Smugglers’ Notch</span></a><span data-dcnode-id="311" instrument_node=""> at the top of the state in Jeffersonville is recognized nationwide as a perfect place for the family and its many programs cater to welcoming them. </span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/bolton-valley/ski-resort"><span data-dcnode-id="310" instrument_node="">Bolton Valley</span></a><span data-dcnode-id="308" instrument_node=""> is an ideal, small resort close to Burlington that knows how to welcome families as well. </span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/stratton-mountain/ski-resort"><span data-dcnode-id="307" instrument_node="">Stratton Mountain</span></a><span data-dcnode-id="305" instrument_node="">, </span><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/mount-snow/ski-resort"><span data-dcnode-id="304" instrument_node="">Mount Snow</span></a><span data-dcnode-id="302" instrument_node=""> and </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/okemo-mountain-resort/ski-resort"><span data-dcnode-id="301" instrument_node="">Okemo</span></a><span data-dcnode-id="299" instrument_node=""> ski resort in Southern Vermont are all good choices.</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="296"></p><span data-dcnode-id="295" instrument_node="">
</span><h3 data-dcnode-id="292"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Is there a great party mountain in Vermont?</span></strong></h3><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="290" instrument_node="">Oh, yes, there certainly is and, hand’s down, it’s </span><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/killington-resort/ski-resort"><span data-dcnode-id="289" instrument_node="">Killington</span></a><span data-dcnode-id="287" instrument_node=""> in Central Vermont, just up Route 4 from Rutland. The main access road up to the mountain is loaded with bars, restaurants and nightlife. So many choices: The Wobbly Barn and Pickle Barrel are the most notorious, but apres ski, head for the Lookout Tavern. Many offer a shuttle so you can party-hearty. The all-day place to party Euro-style is the Roaring Brook Umbrella Bar at the base of Superstar.</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="284"></p><span data-dcnode-id="283" instrument_node="">
</span><h3 data-dcnode-id="280"><strong data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Where’s the most Vertical drop in Vermont?</span></strong></h3><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Killington wins that one, too, at 3,050 feet, with Sugarbush at 2,650 feet and Smuggs at 2,610. Not exactly Rocky Mountain numbers but your legs will feel like it.</span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="275"></p><span data-dcnode-id="274" instrument_node="">
</span><h3 data-dcnode-id="271"><strong data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Are there good terrain parks in Vermont?</span></strong></h3><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Killington is the big winner. You’ll find the best park set-ups in New England here from the Stash to Dream Maker to Timberline, meaning there are features all across the mountain. Keep Sugarbush and Mt. Snow on your list, too.</span></p><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="266"></p><span data-dcnode-id="265" instrument_node="">
</span><h3 data-dcnode-id="262"><b data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Here are frequently asked questions about Vermont skiing and riding</span></b></h3><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="260"></p><span data-dcnode-id="259" instrument_node="">
</span><h4 data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">How many ski resorts are there in Vermont?</span></h4><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">You’ll find 22 total ski resorts of all sizes here.</span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="252"></p><span data-dcnode-id="251" instrument_node="">
</span><h4 data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Is Killington or Stowe better?</span></h4><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">The size of both mountains is comparable and there’s plenty of terrain for all levels of skiers and riders at both. Consider Stowe a bit more high-end with a traditional Vermont village and high-quality restaurants. Killington has more of a big brawling feel with most of the action along the access road.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="244"></p><span data-dcnode-id="243" instrument_node="">
</span><h4 data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">What are some cool ski towns in Vermont?</span></h4><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Stowe is a 200-year-old village with a quaint main street loaded with Vermont charm and a historic flavor. Families will love staying at&nbsp;Stoweflake Mountain Resort&nbsp;and the Austrian-inspired&nbsp;Trapp Family&nbsp;Lodge (great cross country skiing here). Don’t miss Stowe’s Winter Carnival in January. Stowe is named by Fodor’s Travel as the “#1 Ski Town for Foodies in the United States.”</span></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Warren is a tiny town located at the southern end of the Mad River Valley near Sugarbush and Mad River Glen. No trip to Warren is complete without a visit to the famous&nbsp;Warren Store, where you'll find groceries and a legendary deli. The&nbsp;West Hill House B&amp;B&nbsp;offers a&nbsp;selection of Vermont beers and unique Quaich single malt Scotch bar.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Manchester in southern Vermont is close to Bromley, Magic Mountain and Stratton Mountains. There are multiple options for&nbsp;lodging in Manchester, including&nbsp;The Equinox, one of the town's oldest resorts, where The Green Mountain Boys, led by Ethan Allen,&nbsp; met in the tavern to determine their role in the Revolutionary War. Or cozy inns like the&nbsp;Wilburton Inn,&nbsp;The Reluctant Panther Inn, or the&nbsp;Inn at Manchester. Shopaholics will love the wide variety of shops at the Manchester Designer Outlets during your stay. Good eats await at Ye Olde Tavern, the Marsh Tavern in the Equinox, or Up for Breakfast featuring a variety of scones and Zody’s Double Hex long known for its burgers.</span></p><span data-dcnode-id="231" instrument_node="">
</span><p data-dcnode-id="230"></p><span data-dcnode-id="229" instrument_node="">
</span><h4 data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">How cold is it?</span></h4><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Vermont is New England's only landlocked state, leaving it prone to hefty amounts of snowfall. Winter lasts nearly half the year in Vermont's Green Mountains Here’s a sampling of winter temps in Rutland (expect cooler temperatures farther north and in higher elevations): December temps&nbsp;can range from a high of 34°F to a low of 16°F; January with a high of 29°F to a low of 8°F. February’s average increases by a few degrees from 32°F to a low of 9°F. March offers “balmy” temps of 42°-19°F. It may be cold but it’s pretty. OK, pretty cold.</span></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="222"></p><span data-dcnode-id="221" instrument_node="">
</span><h4 data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">How do you get here?</span></h4><span data-dcnode-id="218" instrument_node="">
</span><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">There are four main ways to access Vermont skiing or boarding: auto, train, bus and air. Burlington International Airport, Vermont’s largest, is just 3 miles east of the “big city,” off I-89. Main airlines servicing the airport are Continental, Delta, JetBlue, Porter, United, and US Airways. It is also served by a number of other airlines offering non-stops to cities within the country and Canada, with worldwide connections.</span></p><span data-dcnode-id="215" instrument_node="">
</span><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Albany International Airport, located 7 miles to the northwest of New York’s state capitol, is easily accessible from I-87, I-88 and I-90 and is closest to southern Vermont resorts like Stratton and Bromley. &nbsp;Seven airlines currently operate from Albany, including&nbsp;Southwest, United, Jet Blue, Boutique Air, Cape Air, Delta, and American. You can opt to either rent a car at the airport and drive to Vermont (3 hours in good weather) or take the bus (5 hours, 27 minutes) from Albany to the Downtown Transit Center in Burlington.</span></p><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Daily service on Amtrak’s Vermonter train takes you between Washington, D.C. and St. Albans in northern Vermont – a 13 hour-45 minute ride - running through New York City to Connecticut, Massachusetts, New Hampshire and Vermont.</span></p><span data-dcnode-id="209" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Skiers living in New York City often opt for Greyhound (prices are about $50-$60)&nbsp;and charter bus service leaving mid-town Manhattan Friday afternoons and returning late Sunday. Be sure to check out the ski clubs for weekend packages and longer trips; transportation is often included.</span></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="205"></p><span data-dcnode-id="204" instrument_node="">
</span><h3 data-dcnode-id="201"><strong data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Vermont is a state of mind, too</span></strong></h3><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">There’s one of those words here that people try to use to describe the essense of this state, even if it's hard to pronounce: ”Quintessential.” It literally means “representing the most perfect or typical example of a quality or class.” If ever there was a quintessential place to ski and ride, this is it.</span></p><p data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Skiing in Vermont combines a sense of history with what’s become known as “Eastern Skiing” – plenty of steep trails &nbsp;with more modern Western-like slopes in places for beginners and intermediates.</span></p><span data-dcnode-id="195" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="194" instrument_node="">But that sense of history is everywhere: The story goes that Bunny Bertram, a Dartmouth College ski instructor, joked after installing a rope tow on “Hill 6” in 1935 that it would be “suicide to ski down that steep slope.” Hence </span><a data-dcnode-id="192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/suicide-six/ski-resort"><span data-dcnode-id="193" instrument_node="">Suicide Six</span></a><span data-dcnode-id="191" instrument_node=""> in So. Pomfret became the state’s first ski area. The next year, landowner Craig Burt, Sepp Ruschp and the Mt. Mansfield Ski Club opened a rope tow on the Toll House slope and </span><a data-dcnode-id="189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/stowe-mountain-resort/ski-resort"><span data-dcnode-id="190" instrument_node="">Stowe</span></a><span data-dcnode-id="188" instrument_node=""> began its run to becoming the King of all Eastern Skiing.</span></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">No matter which resort you choose, Vermont skiing and snowboarding is right up there with the best of the resorts in the United States. Just different.</span></p></div></div></article></div><div class="md-show m-0" data-dcnode-id="125"><div class="styles_allResorts__2tlux" data-dcnode-id="126"><article class="styles_box__3DPH2" data-dcnode-id="127"><div class="styles_box__m1CLQ" data-dcnode-id="176"><h2 class="styles_title__iYnrH" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">All Resorts</span></h2><div class="styles_links__jQtZe" data-dcnode-id="177"></div></div><div class="styles_box__1sXJN styles_resortsList__3pFyu" data-dcnode-id="128"><div data-dcnode-id="154"><div data-dcnode-id="173"><a data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/bolton-valley/ski-resort"><span data-dcnode-id="175" instrument_node="">Bolton Valley</span></a></div><div data-dcnode-id="170"><a data-dcnode-id="171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/bromley-mountain/ski-resort"><span data-dcnode-id="172" instrument_node="">Bromley Mountain</span></a></div><div data-dcnode-id="167"><a data-dcnode-id="168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/burke-mountain/ski-resort"><span data-dcnode-id="169" instrument_node="">Burke Mountain</span></a></div><div data-dcnode-id="164"><a data-dcnode-id="165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/jay-peak/ski-resort"><span data-dcnode-id="166" instrument_node="">Jay Peak</span></a></div><div data-dcnode-id="161"><a data-dcnode-id="162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthesnow.com/vermont/killington-resort/ski-resort"><span data-dcnode-id="163" instr
