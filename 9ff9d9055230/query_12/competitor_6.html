igh-res image (675KB)</span></span></span></a></li><li data-dcnode-id="4547"><a class="anchor download-link u-font-sans" data-dcnode-id="4548" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr8.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4549"><span data-dcnode-id="4552" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4538"><span data-dcnode-id="4539" id="cap0045"><p data-dcnode-id="4540" id="fspara0045"><span class="label" data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Fig. 8</span></span><span data-dcnode-id="4542" instrument_node="">. </span><span data-dcnode-id="4541" instrument_node="">Comparison of the top 30 scenes' perception in four continents.</span></p></span></span></figure><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4490" id="tbl3"><span class="captions" data-dcnode-id="4530"><span data-dcnode-id="4531" id="cap0080"><p data-dcnode-id="4532" id="tspara0020"><span class="label" data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">Table 3</span></span><span data-dcnode-id="4534" instrument_node="">. </span><span data-dcnode-id="4533" instrument_node="">Specific proportions of the 30 scenes' perception in four continents.</span></p></span></span><div class="groups" data-dcnode-id="4491"><table data-dcnode-id="4492"><thead data-dcnode-id="4522"><tr class="rowsep-1 valign-top" data-dcnode-id="4523"><th data-dcnode-id="4528" scope="col"><span data-dcnode-id="4529" instrument_node="">Continent</span></th><th data-dcnode-id="4526" scope="col"><span data-dcnode-id="4527" instrument_node="">Scene (&gt;30%)</span></th><th data-dcnode-id="4524" scope="col"><span data-dcnode-id="4525" instrument_node="">Scene (&lt;20%)</span></th></tr></thead><tbody data-dcnode-id="4493"><tr class="valign-top" data-dcnode-id="4515"><td class="align-left" data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">Asia</span></td><td class="align-left" data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">mall courtyard (48%), aircraft (43%), panda (38%), fallen leaves (78%), flower (32%), food (31%)</span></td><td class="align-left" data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">mountain (16%), stage (13%), bicycle (18%), restaurant (19%), overlook (19%),skyscraper (14%), European buildings (19%),car (17%), worksite (18%), indoor basketball court (7%)</span></td></tr><tr class="valign-top" data-dcnode-id="4508"><td class="align-left" data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">North American</span></td><td class="align-left" data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">Indoor basketball court (57%), overlook (30%), flower (42%), food (31%), skyscraper (30%), worksite (32%)</span></td><td class="align-left" data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">Aircraft (9%), panda (15%), fallen leaves (10%), sunset (16%)</span></td></tr><tr class="valign-top" data-dcnode-id="4501"><td class="align-left" data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">Europe</span></td><td class="align-left" data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">Worksite (30%), panda (36%), overlook (39%), night (35%), blue sky (30%)</span></td><td class="align-left" data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">Cabin (19%), playground (19%), aircraft (16%), stage (14%), fallen leaves (5%), food (14%)</span></td></tr><tr class="valign-top" data-dcnode-id="4494"><td class="align-left" data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Oceania</span></td><td class="align-left" data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">Cabin (36%), European buildings (33%), playground (33%), skyscraper (33%), aircraft (33%), snow (32%), restaurant (34%), sunset (37%), stage (47%), mountain (37%),</span></td><td class="align-left" data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Mall courtyard (7%), indoor basketball court (13%), panda (10%), fallen leaves (7%), flower (7%), overlook (14%), food (8%), night (9%), green plant (20%), blue sky (19%)</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4487" id="p0200"><span data-dcnode-id="4488" instrument_node="">Intercontinental differences are discovered as follows. For Asian tourists, they are more interested in the mall courtyard (48%) and aircraft (43%), especially, pay more attention at fallen leaves (78%) than the tourists from the other three continents. Shopping malls and airports are the places that Asian tourists most willing to share. Panda (38%) is indeed important in the mind of Asian tourists, and they are more interested in food (31%) but pay less attention to the condition of restaurants (19%). They are totally not interested in sports and stage performances. They also pay little attention to overlook (19%), skyscraper (14%), European buildings (18%) and worksite (13%), which formed the urban visual space. For Oceania tourists, their enthusiasm for stage (47%) is much higher than the other three continents. At the same time, they are more interested in European buildings (33%), playground (33%), skyscraper (33%), aircraft (33%), snow (32%), sunset (37%) and mountain (37%) than the other three continents. But they particularly dislike Mall courtyard (7%), fallen leaves (7%), flower (7%), night (9%), and pandas (10%), which are representatives of Chinese tourism image. Besides, they are not very interested in food (8%), even they pay much attention to the restaurant environment (34%). For Europe tourists, they are more prefer to overlook (39%) and night (35%) relatively, and has a better recognition for panda (36%), but they are particularly insensitive for fallen leaves (6%), and are not so interested in food (14%) and stage (14%). North American tourists show more enthusiasm for indoor basketball court (59%) than the other three continents, and they are more interested in flowers (42%) than the other three continents. Aircraft (9%) and fallen leaves (10%) are not so attractive to them, and panda (15%), neither.</span></p></section><section data-dcnode-id="4449" id="sec5.1.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4482" id="sectitle0110"><span data-dcnode-id="4485" instrument_node="">5.1.3</span><span data-dcnode-id="4484" instrument_node="">. </span><span data-dcnode-id="4483" instrument_node="">National differences</span></h4><div data-dcnode-id="4452"><p data-dcnode-id="4477" id="p0205"><span data-dcnode-id="4481" instrument_node="">By applying the method of hierarchical cluster analysis, the preference of tourists from 30 countries was clustered according to the proportions of 12 categories of photos' scene cognition. With the group distance of 5, the tourists from different countries could be divided into four groups (</span><a class="workspace-trigger" data-dcnode-id="4479" href="#fig9" name="bfig9"><span data-dcnode-id="4480" instrument_node="">Fig. 9</span></a><span data-dcnode-id="4478" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4453" id="fig9"><span data-dcnode-id="4461"><img alt="Fig. 9" aria-describedby="cap0050" data-dcnode-id="4476" height="768" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr9.jpg&amp;raw"><span data-dcnode-id="4475" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4462"><li data-dcnode-id="4469"><a class="anchor download-link u-font-sans" data-dcnode-id="4470" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr9_lrg.jpg" target="_blank" title="Download high-res image (439KB)"><span class="anchor-text" data-dcnode-id="4471"><span data-dcnode-id="4474" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">Download high-res image (439KB)</span></span></span></a></li><li data-dcnode-id="4463"><a class="anchor download-link u-font-sans" data-dcnode-id="4464" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr9.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4465"><span data-dcnode-id="4468" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4454"><span data-dcnode-id="4455" id="cap0050"><p data-dcnode-id="4456" id="fspara0050"><span class="label" data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">Fig. 9</span></span><span data-dcnode-id="4458" instrument_node="">. </span><span data-dcnode-id="4457" instrument_node="">Hierarchical cluster of countries referring to the photos' scenes.</span></p></span></span></figure></div><p data-dcnode-id="4450" id="p0210"><span data-dcnode-id="4451" instrument_node="">Group I (13 countries/regions) includes 5 Asian countries or regions (Hong Kong, India, Indonesia, Malaysia, Russia), 6 European countries (Finland, Germany, Netherlands, Norway, Poland, Spain) and 2 Oceanian countries (Australia, Austria). The group characteristics of tourists are high preference for urban buildings, plants and natural phenomena, medium preference for tourism interpretation, and low preference for insects &amp;animals and entertainment &amp; leisure. Group II (8 countries/regions) includes 3 Asian countries or regions (Israel, Japan, Taiwan),2 North American counties (Canada and US) and 3 European countries (France, Ireland, Switzerland). The group characteristics of tourists are high preference for urban building and natural phenomenon, medium preference for traffic and food, and low preference for insects &amp; animals and water. Group III (2 countries) includes Denmark and Singapore. The group characteristics of tourists are high preference for natural and plant scenes; medium preference for insects and animals and mountain, and low preference for tourism interpretation. Group IV (6 countries) includes 1 Asian country (Philippines), 1 Oceanian country (New Zealand) and 4 European countries (Belgium, Italy, Sweden, UK). The group characteristics of tourists are high preference for urban building and natural scenes, medium preference for mountain and plant, and low preference for shopping and entertainment.</span></p></section></section><section data-dcnode-id="4324" id="sec5.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4444" id="sectitle0115"><span data-dcnode-id="4447" instrument_node="">5.2</span><span data-dcnode-id="4446" instrument_node="">. </span><span data-dcnode-id="4445" instrument_node="">Spatial distribution</span></h3><section data-dcnode-id="4409" id="sec5.2.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4440" id="sectitle0120"><span data-dcnode-id="4443" instrument_node="">5.2.1</span><span data-dcnode-id="4442" instrument_node="">. </span><span data-dcnode-id="4441" instrument_node="">Spatial distribution of tourists' footprints</span></h4><div data-dcnode-id="4410"><p data-dcnode-id="4435" id="p0215"><span data-dcnode-id="4439" instrument_node="">Based on the result conducted in the software of ArcGIS (</span><a class="workspace-trigger" data-dcnode-id="4437" href="#fig10" name="bfig10"><span data-dcnode-id="4438" instrument_node="">Fig. 10</span></a><span data-dcnode-id="4436" instrument_node="">), the footprint's distributions of tourists from the four continents in Beijing are compared. North American tourists have the most extensive footprint distribution. The area's rank of tourist footprint distribution is like NA &gt; EU &gt; AS &gt; Oceania. Tourists from four continents are all gathering around the traditional scenic spots. One dense area is the central urban area, composed by Forbidden City, Tiananmen Square and the Temple of Heaven. The other dense area is in Northwest Mountain, where are located the Great Wall scenic spots. Outside the central urban area, the distribution of tourists' footprint from four continents is quite different. The footprints of tourists from North America and Europe are more intensive in San-li-tun area than Asian and Oceanian tourists, while European tourists are less likely to enter the Winter Palace.</span></p><figure class="figure text-xs" data-dcnode-id="4411" id="fig10"><span data-dcnode-id="4419"><img alt="Fig. 10" aria-describedby="cap0055" data-dcnode-id="4434" height="671" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr10.jpg&amp;raw"><span data-dcnode-id="4433" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4420"><li data-dcnode-id="4427"><a class="anchor download-link u-font-sans" data-dcnode-id="4428" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr10_lrg.jpg" target="_blank" title="Download high-res image (2MB)"><span class="anchor-text" data-dcnode-id="4429"><span data-dcnode-id="4432" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">Download high-res image (2MB)</span></span></span></a></li><li data-dcnode-id="4421"><a class="anchor download-link u-font-sans" data-dcnode-id="4422" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr10.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4423"><span data-dcnode-id="4426" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4412"><span data-dcnode-id="4413" id="cap0055"><p data-dcnode-id="4414" id="fspara0055"><span class="label" data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">Fig. 10</span></span><span data-dcnode-id="4416" instrument_node="">. </span><span data-dcnode-id="4415" instrument_node="">Intercontinental differences of distribution of tourists' footprint.</span></p></span></span></figure></div></section><section data-dcnode-id="4325" id="sec5.2.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4405" id="sectitle0125"><span data-dcnode-id="4408" instrument_node="">5.2.2</span><span data-dcnode-id="4407" instrument_node="">. </span><span data-dcnode-id="4406" instrument_node="">Spatial distribution of tourists with 11 scene categories</span></h4><div data-dcnode-id="4326"><p data-dcnode-id="4375" id="p0220"><span data-dcnode-id="4404" instrument_node="">Referring to the spatial distribution of tourism resources in Beijing (</span><a class="workspace-trigger" data-dcnode-id="4402" href="#fig11" name="bfig11"><span data-dcnode-id="4403" instrument_node="">Fig. 11</span></a><span data-dcnode-id="4401" instrument_node="">) and tourists' footprints' distribution in tourism destinations (</span><a class="workspace-trigger" data-dcnode-id="4399" href="#fig12" name="bfig12"><span data-dcnode-id="4400" instrument_node="">Fig. 12</span></a><span data-dcnode-id="4398" instrument_node="">) conducted in the software of ArcGIS, several characteristics can be drawn. </span><strong data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">Mountain and water</span></strong><span data-dcnode-id="4395" instrument_node=""> are clearly and precisely perceived by tourists. Mountain perception is mainly scattered in Badaling Great Wall and Mutianyu Great Walls. Water perception is displayed in the Beihai Park and the Summer Palace. </span><strong data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">Insect &amp; animal</span></strong><span data-dcnode-id="4392" instrument_node=""> perception shows a concentration in Beijing zoo. Tourists' perceptions of </span><strong data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">building, culture, and interpretation</span></strong><span data-dcnode-id="4389" instrument_node=""> are mainly concentrated in traditional scenic spots and cultural heritage-such as Summer Palace, Forbidden City and so on, which possess a higher value of protection and a higher demand for interpretation. Tourists' perception of </span><strong data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">food</span></strong><span data-dcnode-id="4386" instrument_node=""> is displayed in two types of scenic spots-traditional scenic spots and modern shopping areas. The former is around the Forbidden City, Beihai Park, Summer Palace and other scenic areas.The latter is around Wangfujing, Sanlitun commercial areas. “Sightseeing&nbsp;+&nbsp;food” and “shopping&nbsp;+&nbsp;food” become the main combination of tourists' behaviors. Tourists' perception of </span><strong data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">entertainment</span></strong><span data-dcnode-id="4383" instrument_node=""> formed two centers, one is in the Olympic Sports Park, the other is in the traditional cultural communities. The Olympic Sports Park provides space for watching sports, and the traditional cultural communities provide space for tourists observing local recreational activities in the traditional neighborhoods, for example, chess, mahjong. Tourists' </span><strong data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">traffic</span></strong><span data-dcnode-id="4376"><span data-dcnode-id="4380" instrument_node=""> perception gathers in the old central city and airport. The former mainly shows the mixed traffic landscape around the traditional scenic spots, and the other is illustrated by </span><a class="topic-link" data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/airplane" title="Learn more about airplanes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4379" instrument_node="">airplanes</span></a><span data-dcnode-id="4377" instrument_node=""> in the airport.</span></span></p><figure class="figure text-xs" data-dcnode-id="4351" id="fig11"><span data-dcnode-id="4359"><img alt="Fig. 11" aria-describedby="cap0060" data-dcnode-id="4374" height="454" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr11.jpg&amp;raw"><span data-dcnode-id="4373" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4360"><li data-dcnode-id="4367"><a class="anchor download-link u-font-sans" data-dcnode-id="4368" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr11_lrg.jpg" target="_blank" title="Download high-res image (862KB)"><span class="anchor-text" data-dcnode-id="4369"><span data-dcnode-id="4372" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Download high-res image (862KB)</span></span></span></a></li><li data-dcnode-id="4361"><a class="anchor download-link u-font-sans" data-dcnode-id="4362" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr11.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4363"><span data-dcnode-id="4366" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4352"><span data-dcnode-id="4353" id="cap0060"><p data-dcnode-id="4354" id="fspara0060"><span class="label" data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">Fig. 11</span></span><span data-dcnode-id="4356" instrument_node="">. </span><span data-dcnode-id="4355" instrument_node="">Distribution of tourism resources in Beijing.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4327" id="fig12"><span data-dcnode-id="4335"><img alt="Fig. 12" aria-describedby="cap0065" data-dcnode-id="4350" height="1024" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr12.jpg&amp;raw"><span data-dcnode-id="4349" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4336"><li data-dcnode-id="4343"><a class="anchor download-link u-font-sans" data-dcnode-id="4344" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr12_lrg.jpg" target="_blank" title="Download high-res image (2MB)"><span class="anchor-text" data-dcnode-id="4345"><span data-dcnode-id="4348" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">Download high-res image (2MB)</span></span></span></a></li><li data-dcnode-id="4337"><a class="anchor download-link u-font-sans" data-dcnode-id="4338" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr12.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4339"><span data-dcnode-id="4342" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4328"><span data-dcnode-id="4329" id="cap0065"><p data-dcnode-id="4330" id="fspara0065"><span class="label" data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">Fig. 12</span></span><span data-dcnode-id="4332" instrument_node="">. </span><span data-dcnode-id="4331" instrument_node="">Spatial distribution of different perception in the tourist destination.</span></p></span></span></figure></div></section></section></section><section data-dcnode-id="4293" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4319" id="sectitle0130"><span data-dcnode-id="4322" instrument_node="">6</span><span data-dcnode-id="4321" instrument_node="">. </span><span data-dcnode-id="4320" instrument_node="">Conclusion and discussion</span></h2><section data-dcnode-id="4305" id="sec6.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4315" id="sectitle0135"><span data-dcnode-id="4318" instrument_node="">6.1</span><span data-dcnode-id="4317" instrument_node="">. </span><span data-dcnode-id="4316" instrument_node="">Evidence and theory for tourism destination development</span></h3><p data-dcnode-id="4313" id="p0225"><span data-dcnode-id="4314" instrument_node="">In all, the traditional scenic spots are the main perceived subjective for inbound tourists in Beijing. Specifically, the traditional buildings in Forbidden City, Temple of Heaven Park, Summer Palace are the prominent perceived contents in the Beijing, and Great Wall which is located in the mountains are the secondary perceived content following the traditional building. Tourism destinations should extend the tourism attractions from traditional scenic spots to more modern scenic spots, and lead tourists to take more experiential activities. Compared to the traditional scenic spots, some specific attractions should be given more attention. The first is food, which is supposed to be the most popular destination representative in China, but did not receive strong recognition by all inbound tourists. In contrastto food, the perception of the stage is unexpectedly high from inbound tourists, it indicates that theatrical activities should be included as an attraction enhancement in Beijing, and more possibilities should be given to tourists who are interested in local cultural shows.</span></p><p data-dcnode-id="4311" id="p0230"><span data-dcnode-id="4312" instrument_node="">Also, influenced by cultural, social, and economic factors, tourists' preferences and recreational needs are complicated and diverse, but groups do exist among countries. All these specific results could give clues to more appropriate and detailed marketing promotion for DMOs. For Asian tourists, their recognition and preference of pandas, food, and other traditional Chinese images are more remarkable and shopping has become a behavioral feature of Asian tourists, while they are reluctant to pay time and money for participation in stage performances. North American show enthusiasm about basketball, and their footprints are the most widely distributed. European tourists pay more attention to the attributes of the sky and pandas, but they are not willing to try Chinese food and stage performances. Oceania has the smallest footprint, they show outstanding interests in the stage, but little interests in the blue sky, night, shopping malls, and flowers. From all these piece of evidence, differential marketing strategies for tourists from different continents could be experly made by DMOs for destination promotion.</span></p><p data-dcnode-id="4306" id="p0280"><span data-dcnode-id="4310" instrument_node="">The visual content analysis of big pictorial data provides a new way of understanding tourists’ preferences. This study also induced a new category with 103 attributes, which make a contributes to the theoretical framework of the tourism destination image. As the 103 scenes are selected from the most common scenes appearing in shoot photos, this study adds the details to the attribute-holistic framework of destination image proposed by Echtner and Ritchie (</span><a class="workspace-trigger" data-dcnode-id="4308" href="#bib11" name="bbib11"><span data-dcnode-id="4309" instrument_node="">Echtner &amp; Ritchie, 1993</span></a><span data-dcnode-id="4307" instrument_node="">), and the developed category extends the topologic knowledge about “what” is perceived by tourists, which could be applied and examined in the destination cognitive image analysis.</span></p></section><section data-dcnode-id="4294" id="sec6.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4301" id="sectitle0140"><span data-dcnode-id="4304" instrument_node="">6.2</span><span data-dcnode-id="4303" instrument_node="">. </span><span data-dcnode-id="4302" instrument_node="">Reflection of the newly developed methodology</span></h3><p data-dcnode-id="4299" id="p0235"><span data-dcnode-id="4300" instrument_node="">The applicability of the newly developed methodology is one of the objectives of this study. Compared with previous studies, the innovation of this research method lies in the substitution of artificial intelligence analysis for natural intelligence analysis. The application of computer vision technology shows advantages in time-saving and data analyzing towards a huge number of photos. This research pioneered the application of computer vision technology for the study of destination cognitive image. The results show that scene recognition technology provides abundant evidence and information for revealing tourists' perception and behavior preferences in tourist destinations. As an initial attempt, this study opens a door for widely applying the interdisciplinary technologies- “computer vision” into tourism research. These visual AI technologies include but are not limited to the following aspects: visual semantic segmentation, visual emotional analysis, short video content recognition, etc.</span></p><p data-dcnode-id="4297" id="p0240"><span data-dcnode-id="4298" instrument_node="">Arising from this study, the merits of the new methods include the clarity of users' portrait, the capture of spatiotemporal information, and the richness and inductiveness of the recognized contents. By the data mining in social media, users' home location can be obtained, which makes it possible to compare tourists' behavior and preferences partly with demographic information. The spatiotemporal information attached by photos makes it possible to caption the tourists' behavior trajectory. Specifically, computer vision technology enables researchers to recognize the most common 103 scenes in human photography, which are flexibility and inductivity for topologic analysis.</span></p><p data-dcnode-id="4295" id="p0245"><span data-dcnode-id="4296" instrument_node="">Besides, the application of computer vision technology does have shortcomings, when the research topic is related to complex cultural and social issues, e.g., host-guest interaction, the symbolic meaning of pictures could not be well interpreted through this particular machine learning model. Or when the research needs to discover some new defined scene outside the list of 103 scenes, it is necessary to reassess the possibility of this AI-based method as it will consume a lot of energy and time to train a new machine learning model which could fit the research question.</span></p></section></section><section data-dcnode-id="4284" id="sec7"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4289" id="sectitle0145"><span data-dcnode-id="4292" instrument_node="">7</span><span data-dcnode-id="4291" instrument_node="">. </span><span data-dcnode-id="4290" instrument_node="">Limitations and future work</span></h2><p data-dcnode-id="4287" id="p0250"><span data-dcnode-id="4288" instrument_node="">Big data and computer vision technology are the highlights of this study. Limitations exist in both two aspects. For the former, tourists' photos shared on Flickr were taken as the big data resource, the popularity of Flickr varies from country to country in the world, which could influence the study results. For the latter, we selected and adopted a mature computer vision model that could optimum fit the study aim of the destination image, other than designing a new model, and this study's framework has somehow limited and adjusted to the outcomes of this adopted model. This limitation would be gradually broken through, as the supporting requirement for AI technology from tourism field becomes more specific and more precise after some pioneering attempts.</span></p><p data-dcnode-id="4285" id="p0255"><span data-dcnode-id="4286" instrument_node="">In the future, with the development of computer deep learning and big data mining technology, precisely identifying the content of massive tourist photos by artificial intelligence would continually deepen the tourism destination image study in the big data era. The whole spectrum of tourism marketing would be re-appraised and probably restructured as a result of the growing amount of sophisticated techniques emerging which offer more detailed information on what tourists do. It is also a changing time for DMOs, how to make use of AI as a viable and necessary part for the operations would need more practical exploration.</span></p></section></div><section data-dcnode-id="4272" id="ack0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4281" id="sectitle0155"><span data-dcnode-id="4282" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="4273" id="p0275"><span data-dcnode-id="4280" instrument_node="">Thanks to </span><span data-dcnode-id="4278" id="gs1"><span data-dcnode-id="4279" instrument_node="">National Natural Science Foundation of China</span></span><span data-dcnode-id="4277" instrument_node=""> (</span><a data-dcnode-id="4275" href="#gs1"><span data-dcnode-id="4276" instrument_node="">51608278</span></a><span data-dcnode-id="4274" instrument_node="">) for supporting this research. We are also grateful to Professor Carson Lewis Jenkins, visiting professor, college of Tourism and Service management, Nankai University, for his valuable comments and suggestions on previous drafts of this article. We would like to thank Dr Zhibin Lin from Durham University Business School for his helpful comments.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="4267"><button class="button button-anchor" data-dcnode-id="4268" type="button"><span class="button-text" data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="4266"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="399" id="cebib0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="400" id="cebibsec0010"><dl class="references" data-dcnode-id="401" id="reference-links-cebibsec0010"><dt class="label" data-dcnode-id="4261"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4262" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="4263" instrument_node="">Albers and James, 1988</span></a></dt><dd class="reference" data-dcnode-id="4201" id="sref1"><div class="contribution" data- scribedby="ref-id-sref63" class="link" data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DDetecting%2520tourism%2520destinations%2520using%2520scalable%2520geospatial%2520analysis%2520based%2520on%2520cloud%2520computing%2520platform%26publication_year%3D2015%26author%3DX.%2520Zhou%26author%3DC.%2520Xu%26author%3DB.%2520Kimmons" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="405" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="275" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="276"><div class="PageDivider" data-dcnode-id="398"></div><header data-dcnode-id="395" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Cited by (87)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="277"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="278"><ul data-dcnode-id="284"><li class="ListArticleItem" data-dcnode-id="377"><div class="sub-heading" data-dcnode-id="389"><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1353829222000533" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="393" id="citing-articles-article0-title"><span data-dcnode-id="394" instrument_node="">Understanding the role of urban social and physical environment in opioid overdose events using found geospatial data</span></h3></a><div class="article-source ellipsis" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">2022, Health and Place</span></div></div><div class="buttons" data-dcnode-id="383"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="384" type="button"><span class="button-link-text" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="385" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="386"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="378"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="379" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="380"><p data-dcnode-id="381" id="abspara0010"><span data-dcnode-id="382" instrument_node="">Opioid use disorder is a serious public health crisis in the United States. Manifestations such as opioid overdose events (OOEs) vary within and across communities and there is growing evidence that this variation is partially rooted in community-level social and economic conditions. The lack of high spatial resolution, timely data has hampered research into the associations between OOEs and social and physical environments. We explore the use of non-traditional, “found” geospatial data collected for other purposes as indicators of urban social-environmental conditions and their relationships with OOEs at the neighborhood level. We evaluate the use of Google Street View images and non-emergency “311” service requests, along with US Census data as indicators of social and physical conditions in community neighborhoods. We estimate negative binomial regression models with OOE data from first responders in Columbus, Ohio, USA between January 1, 2016, and December 31, 2017. Higher numbers of OOEs were positively associated with service request indicators of neighborhood physical and social disorder and street view imagery rated as boring or depressing based on a pre-trained random forest regression model. Perceived safety, wealth, and liveliness measures from the street view imagery were negatively associated with risk of an OOE. Age group 50–64 was positively associated with risk of an OOE but age 35–49 was negative. White population, percentage of individuals living in poverty, and percentage of vacant housing units were also found significantly positive however, median income and percentage of people with a bachelor’s degree or higher were found negative. Our result shows neighborhood social and physical environment characteristics are associated with likelihood of OOEs. Our study adds to the scientific evidence that the opioid epidemic crisis is partially rooted in social inequality, distress and underinvestment. It also shows the previously underutilized data sources hold promise for providing insights into this complex problem to help inform the development of population-level interventions and harm reduction policies.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="357"><div class="sub-heading" data-dcnode-id="371"><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2213078022000032" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="375" id="citing-articles-article1-title"><span data-dcnode-id="376" instrument_node="">Destination image of Chitwan National Park, Nepal: Insights from a content analysis of online photographs</span></h3></a><div class="article-source ellipsis" data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">2022, Journal of Outdoor Recreation and Tourism</span></div></div><div class="buttons" data-dcnode-id="365"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="366" type="button"><span class="button-link-text" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="367" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="368"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="358"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="359" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="360"><p data-dcnode-id="363" id="abspara0010"><span data-dcnode-id="364" instrument_node="">There are millions of publicly available photographs posted by people visiting protected areas on social media, but can they enhance our understanding of the preferences of nature-based tourists, and if so, how are such areas marketed? To explore the uses of this still novel source of data, we compared the content of photographs posted by tourists (perceived image(s)) with those posted by tourism organizations online (projected destination image(s)) using Chitwan National Park in Nepal as a case study. This involved comparing the content of 645 photographs posted online by government and tourism companies with 1214 photographs taken by tourists in the Park and posted to the social media platform Flickr. The findings highlighted similarities including the popularity of wildlife and landscapes in photographs, but also discordances in how cultural attributes were more popular in photographs posted by tourists than those promoting tourism. When the geolocations of Flickr photographs were mapped across the Park, spatial and temporal hotspots were identified relating to specific content, while the popularity of photographs with others on Flickr indicated that potential future tourists may also value wildlife and culture in the Park. The findings highlight how destination marketing online could better match what tourists shared about the Park and identify what they valued where and when in the Park. It also illustrates how other parks where nature-based tourism is economically, socially, and ecologically valuable, but resources limited, could harness free and readily available social media content to improve destination marketing and management, despite some recognized limitations with social media data.</span></p><p data-dcnode-id="361" id="fsp1234"><span data-dcnode-id="362" instrument_node="">The content of social media photographs and metadata about when and where images were taken can provide useful insights into tourist preferences. For Chitwan National Park, Nepal there were congruence in some aspects of projected (online images provided by tourism organisations) and perceived destination images from social media. This case study highlights how nature-based tourism destinations in developing countries could harness social media as a useful, low cost and time-effective way to obtain additional information about tourists. For Chitwan the results indicate how park authorities should continue to focus on wildlife and landscapes in marketing but also emphasize cultural attributes.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="339"><div class="sub-heading" data-dcnode-id="351"><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162521007848" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="355" id="citing-articles-article2-title"><span data-dcnode-id="356" instrument_node="">Forecasting the macrolevel determinants of entrepreneurial opportunities using artificial intelligence models</span></h3></a><div class="article-source ellipsis" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">2022, Technological Forecasting and Social Change</span></div></div><div class="buttons" data-dcnode-id="345"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="346" type="button"><span class="button-link-text" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="347" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="348"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="340"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="341" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="342"><p data-dcnode-id="343" id="spara014"><span data-dcnode-id="344" instrument_node="">To date, entrepreneurship researchers have tended to avoid state-of-the-art artificial intelligence techniques; in this paper, we fill that gap. Based on eclectic entrepreneurship theory, we present an original work that uses artificial intelligence to forecast the macrolevel determinants of entrepreneurial opportunity. Modern artificial intelligence could open new areas for future research opportunities in entrepreneurship and help close the gap between theory and practice. Our empirical analysis offers two major results by using a panel dataset of 149 countries covering 2007–2018 and six machine-learning models. First, entrepreneurs prefer to exploit opportunities in countries with stable economic governance that provide high education standards, health, social capital, and a safe, natural environment. Second, CatBoost regression performs better in predicting entrepreneurial opportunity compared to linear regression and more advanced machine-learning models. Recommendations for policy-makers and managers and directions for future studies are also discussed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="321"><div class="sub-heading" data-dcnode-id="333"><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1877050922003167" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="337" id="citing-articles-article3-title"><span data-dcnode-id="338" instrument_node="">Predicting A New Hotel Rating System by Analysing UGC Content from Tripadvisor: Machine Learning Application to Analyse Service Robots Influence</span></h3></a><div class="article-source ellipsis" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">2022, Procedia Computer Science</span></div></div><div class="buttons" data-dcnode-id="327"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="328" type="button"><span class="button-link-text" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="329" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="330"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="322"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="323" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="324"><p data-dcnode-id="325" id="spara0122"><span data-dcnode-id="326" instrument_node="">Industry 4.0 tools permit computerized creation measures, and Artificial Intelligence (AI) approaches are pivotal in investigating the travel industry. Applying these devices to decipher User Generated Content (UGC) is fundamental to understand better client’s necessities, opinions, and assumptions regarding tourism services. Through this research, an exploratory analysis of results is developed through Machine Learning Models to understand better the role played by robot and traveler typologies on the rating given to hotels considering TripAdvisor reviews of 74 hotels. The purpose of this exploratory research is to develop a methodology focused on analyzing online reviews related to service robots in hotels using Machine Learning techniques to train the data collected from TripAdvisor. Preliminary results show a link between the hotel rating given in TripAdvisor and the robot typology implemented in hotels.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="303"><div class="sub-heading" data-dcnode-id="315"><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2667010021003346" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="319" id="citing-articles-article4-title"><span data-dcnode-id="320" instrument_node="">Understanding the visual image of Kailash Sacred Landscape through geo-tagged landscape photos mapping</span></h3></a><div class="article-source ellipsis" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">2021, Environmental Challenges</span></div></div><div class="buttons" data-dcnode-id="309"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="310" type="button"><span class="button-link-text" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="311" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="312"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="304"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="305" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="306"><p data-dcnode-id="307" id="spara016"><span data-dcnode-id="308" instrument_node="">Kailash is one of the most important sacred landscape in Trans-Himalayan region and worshiped by multiple nations and religions. The visual construction of this sacred landscape is a complex process of cultural practice, and even in the era of Internet and big data, the burgeoning photo sharing websites, social media have further influenced people's gaze and imagination of Kailash. The research paper focuses on people's visual perception of Kailash Sacred Landscape and proposed a hypothesis that the images of Kailash become a product of viewer's selection of iconic symbols from landscape and then be reconstructed through visual media. The research mainly includes two parts. The first part focuses on the GIS spatial analysis of the complex visual landscape of Kailash. Viewshed analysis reveals the visual prominence of Kailash in the whole region, and also the change in people's visual perception of this mountain during the kora trek. The second part focuses on of the geo-tagged photos collected form social media. Visual content analysis based on computer vision is adopted to recognize items from collected photos. Most visual elements can be integrated into a higher-level set of 8 visual elements. According to the ratio of each element, hierarchical clustering is adopted to describe the similarity between each photo. The dendrogram of clustering result shows all the photos can be generally divided into 9 groups, which reflects different paradigms of people's visual expression of Kailash.&nbsp;In conclusion, this research reveals how Kailash is represented through filtered images&nbsp;in a web-based context. Also, it explores and extends the applications of GIS and AI technology in cultural landscape research.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="285"><div class="sub-heading" data-dcnode-id="297"><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2211973621001124" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="301" id="citing-articles-article5-title"><span data-dcnode-id="302" instrument_node="">Effects of destination resource combination on tourist perceived value: In the context of Chinese ancient towns</span></h3></a><div class="article-source ellipsis" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">2021, Tourism Management Perspectives</span></div></div><div class="buttons" data-dcnode-id="291"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="292" type="button"><span class="button-link-text" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="293" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="294"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="286"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="287" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="288"><p data-dcnode-id="289" id="sp0050"><span data-dcnode-id="290" instrument_node="">Destination resources lay an essential foundation for the development of destinations and the balanced combination of divergent destination resources can create a pleasant tourist perceived value. This paper aims to identify specific combinations of destination resources that contribute to a thriving tourist perceived value. Based on the resource-based view and crisp set qualitative comparative analysis method (csQCA), we find that destination's core resources need to cooperate with other destination resources to yield a superior tourist perceived value. In addition, for destinations with less abundant core resources, an appropriate combination of destination resources can still provide a positive perceived value. Our paper extends the understanding and application of the resource-based view. Furthermore, the results provide insights into destination resources and tourist perceived value.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85068543983%26md5%3Dc5fdfe63e12734ba777b13cfcf4c81" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="282" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="283"></path></svg><span class="button-alternative-text" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="article-biography" data-dcnode-id="268" id="vt1"><img alt="" data-dcnode-id="274" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-fx1.jpg&amp;raw"><span data-dcnode-id="273" instrument_node=""></span><p data-dcnode-id="269" id="biospara0010"><strong data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Dr. Kun Zhang</span></strong><span data-dcnode-id="270" instrument_node="">, is a lecturer in College of Tourism and Service Management at Nankai University. Her research interests are tourism planning, with the focus on tourism destination image and AI technology, tourists' demands and sustainable tourism planning.</span></p></div><div class="article-biography" data-dcnode-id="261" id="vt2"><img alt="" data-dcnode-id="267" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-fx2.jpg&amp;raw"><span data-dcnode-id="266" instrument_node=""></span><p data-dcnode-id="262" id="biospara0015"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Dr. Ye Chen,</span></strong><span data-dcnode-id="263" instrument_node=""> is a Professor in College of Tourism and Service Management at Nankai University. His research interests include: destination marketing, service marketing and consumer behavior. His research has been published in academic journals such as Tourism Management, Current Issues in Tourism, Total Quality Management &amp; Business Excellence, Tourism Tribune, among others.</span></p></div><div class="article-biography" data-dcnode-id="254" id="vt3"><img alt="" data-dcnode-id="260" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-fx3.jpg&amp;raw"><span data-dcnode-id="259" instrument_node=""></span><p data-dcnode-id="255" id="biospara0020"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Chunlin Li,</span></strong><span data-dcnode-id="256" instrument_node=""> is an undergraduate student in College of Tourism and Service Management at Nankai University.</span></p></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="250"><sup data-dcnode-id="251"><a data-dcnode-id="252" href="#bfn1"><span data-dcnode-id="253" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246" id="ntpara0010"><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beijingcitylab.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="249" instrument_node="">https://www.beijingcitylab.com</span></a><span data-dcnode-id="247" instrument_node="">.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0261517719301384"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2019 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg
