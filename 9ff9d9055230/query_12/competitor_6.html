</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Visual content analysis of tourist photos is an effective way to excavate tourist behavior and explore tourists&amp;#x27; cognition in the tourism destination. With the development of computer deep learning and big data mining technology, identifying the content of massive numbers of tourist photos by Artificial Intelligence (AI) approaches breaks through the limitations of manual approaches of identifying photos&amp;#x27; visual information, e.g. small sample size, complex identification process and results deviation. In this study, 35,356 Flickr tourists&amp;#x27; photos in Beijing were identified into 103 scenes by computer deep learning technology. Comparison through statistical analysis for behaviors and perceptions of tourists from different continents and countries was conducted. Tourists&amp;#x27; cognitive maps with different perceptual themes were visualized according to photos&amp;#x27; geographical information by ArcGIS. The field of how to apply AI technology into tourism destination research was explored and extended by this trial study.</p></div></div></div>" data-dcnode-id="6045" lang="en" name="citation_abstract"><span data-dcnode-id="6044" instrument_node="">

a-dcnode-id="5512" id="export-citation-popover"><div data-dcnode-id="5513" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="5514" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="5517" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="5518" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="5515"><span data-dcnode-id="5516" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="5504" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="5507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.tourman.2019.07.002" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="5508" instrument_node="">https://doi.org/10.1016/j.tourman.2019.07.002</span></a><a class="rights-and-content" data-dcnode-id="5505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0261517719301384%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5506" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5503"></section><section class="ReferencedArticles" data-dcnode-id="5502"></section><div class="PageDivider" data-dcnode-id="5501"></div><div class="Abstracts u-font-serif" data-dcnode-id="5463" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="5470" id="abs0015" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5499"><span data-dcnode-id="5500" instrument_node="">Highlights</span></h2><div data-dcnode-id="5471" id="abssec0015"><p data-dcnode-id="5472" id="abspara0015"></p><dl class="list" data-dcnode-id="5473"><dt class="list-label" data-dcnode-id="5497"><span data-dcnode-id="5498" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5494"><p data-dcnode-id="5495" id="p0010"><span data-dcnode-id="5496" instrument_node="">Computer deep learning model is applied for analyzing tourists' photos.</span></p></dd><dt class="list-label" data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5489"><p data-dcnode-id="5490" id="p0015"><span data-dcnode-id="5491" instrument_node="">A dataset of tourist photos is built for visual scene recognition.</span></p></dd><dt class="list-label" data-dcnode-id="5487"><span data-dcnode-id="5488" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5484"><p data-dcnode-id="5485" id="p0020"><span data-dcnode-id="5486" instrument_node="">Tourist behaviors and perceptions from different countries are compared.</span></p></dd><dt class="list-label" data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5479"><p data-dcnode-id="5480" id="p0025"><span data-dcnode-id="5481" instrument_node="">Tourist behaviors and perceptions in the tourism destination are visualized.</span></p></dd><dt class="list-label" data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5474"><p data-dcnode-id="5475" id="p0030"><span data-dcnode-id="5476" instrument_node="">The study extends the use of computer vision technology in tourism research.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="5464" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5468"><span data-dcnode-id="5469" instrument_node="">Abstract</span></h2><div data-dcnode-id="5465" id="abssec0010"><p data-dcnode-id="5466" id="abspara0010"><span data-dcnode-id="5467" instrument_node="">Visual content analysis of tourist photos is an effective way to excavate tourist behavior and explore tourists' cognition in the tourism destination. With the development of computer deep learning and big data mining technology, identifying the content of massive numbers of tourist photos by Artificial Intelligence (AI) approaches breaks through the limitations of manual approaches of identifying photos' visual information, e.g. small sample size, complex identification process and results deviation. In this study, 35,356 Flickr tourists' photos in Beijing were identified into 103 scenes by computer deep learning technology. Comparison through statistical analysis for behaviors and perceptions of tourists from different continents and countries was conducted. Tourists' cognitive maps with different perceptual themes were visualized according to photos' geographical information by ArcGIS. The field of how to apply AI technology into tourism destination research was explored and extended by this trial study.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5440" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5452"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S026151771930127X"><svg class="icon icon-navigate-left" data-dcnode-id="5461" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5462"></path></svg><span class="button-alternative-text" data-dcnode-id="5454"><strong data-dcnode-id="5459"><span data-dcnode-id="5460" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5441"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261517719301360"><span class="button-alternative-text" data-dcnode-id="5445"><strong data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5446"><span data-dcnode-id="5447" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5443" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5444"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5421"><div class="keywords-section" data-dcnode-id="5422" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5435" id="kwrd0010"><span data-dcnode-id="5436"><span data-dcnode-id="5437" instrument_node="">Tourism destination</span></span></div><div class="keyword" data-dcnode-id="5432" id="kwrd0015"><span data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">Tourists' behaviors</span></span></div><div class="keyword" data-dcnode-id="5429" id="kwrd0020"><span data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">Tourists' perception</span></span></div><div class="keyword" data-dcnode-id="5426" id="kwrd0025"><span data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">Visual content analysis</span></span></div><div class="keyword" data-dcnode-id="5423" id="kwrd0030"><span data-dcnode-id="5424"><span data-dcnode-id="5425" instrument_node="">Computer deep learning model</span></span></div></div></div><span data-dcnode-id="5420" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4271" id="body"><div data-dcnode-id="4283"><section data-dcnode-id="5380" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5416" id="sectitle0025"><span data-dcnode-id="5419" instrument_node="">1</span><span data-dcnode-id="5418" instrument_node="">. </span><span data-dcnode-id="5417" instrument_node="">Introduction</span></h2><p data-dcnode-id="5411" id="p0035"><span data-dcnode-id="5415" instrument_node="">The human society is stepping into the third information civilization. Information technology is connected to travel and tourism in so many ways and provides possibilities to access a variety of data, in massive quantities, in different formats, and potentially real-time. Information technology in tourism research has already shifted from primarily a marketing-driven tool to a knowledge creation tool (</span><a class="workspace-trigger" data-dcnode-id="5413" href="#bib60" name="bbib60"><span data-dcnode-id="5414" instrument_node="">Xiang, 2018</span></a><span data-dcnode-id="5412" instrument_node="">).</span></p><p data-dcnode-id="5397" id="p0040"><span data-dcnode-id="5410" instrument_node="">In such a knowledge-creating era, unconventional, big data sources are emerging, with the potential to improve our knowledge of tourism at unprecedented detail for vast world regions (</span><a class="workspace-trigger" data-dcnode-id="5408" href="#bib2" name="bbib2"><span data-dcnode-id="5409" instrument_node="">Batista E Silva et al., 2018</span></a><span data-dcnode-id="5407" instrument_node="">), and it is one of the most representative paradigms and represents an emerging investigative field for researchers and practitioners (</span><a class="workspace-trigger" data-dcnode-id="5405" href="#bib58" name="bbib58"><span data-dcnode-id="5406" instrument_node="">Vecchio, Mele, Ndou, &amp; Secundo, 2018</span></a><span data-dcnode-id="5404" instrument_node="">). By data sources, the tourism-related big data fall into three primary categories: users generated content (UGC) data, including online textual data and online photo data; device data (by devices), including GPS data, mobile roaming data, Bluetooth data, etc.; and transaction data (by operations), including web search data, webpage visiting data, online booking data, etc. (</span><a class="workspace-trigger" data-dcnode-id="5402" href="#bib36" name="bbib36"><span data-dcnode-id="5403" instrument_node="">Li, Xu, Tang, Wang, &amp; Li, 2018</span></a><span data-dcnode-id="5401" instrument_node="">). Especially, as web users are becoming increasingly enthusiastic about interacting, sharing, and working together through online collaborative media (</span><a class="workspace-trigger" data-dcnode-id="5399" href="#bib23" name="bbib23"><span data-dcnode-id="5400" instrument_node="">Hussain &amp; Cambria, 2018</span></a><span data-dcnode-id="5398" instrument_node="">) and the mining possibility of big data in social networks are increasing in the era of social media and connectivity (Web 2.0), tourism research based on UGC data has increased rapidly in recent years.</span></p><p data-dcnode-id="5383" id="p0045"><span data-dcnode-id="5396" instrument_node="">Online textual data and online photo data are the main types of UGC data. For the former e.g., review data and blog data, mainly used for satisfaction studies and tourism recommendation and tourist sentiment (</span><a class="workspace-trigger" data-dcnode-id="5394" href="#bib10" name="bbib10"><span data-dcnode-id="5395" instrument_node="">Deng &amp; Li, 2018</span></a><span data-dcnode-id="5393" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5391" href="#bib25" name="bbib25"><span data-dcnode-id="5392" instrument_node="">Jang &amp; Moutinho, 2019</span></a><span data-dcnode-id="5390" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5388" href="#bib34" name="bbib34"><span data-dcnode-id="5389" instrument_node="">Liu, Huang, Bao, &amp; Chen, 2019</span></a><span data-dcnode-id="5387" instrument_node="">). Compared to textual data, the photos uploaded by tourists involve a wealth of interesting information and are more informative in spatio-temporal attributes, providing a new perspective to study tourists and destinations. Mainly, there are three ways for the applications of online photo data in tourism research: the study of metadata imbedded by photos (such as location, time, etc.), the study of text attached by photos (such as title, description, tag, etc.), and the study of the photos' visual content itself. As limited to the technical threshold of information mining and content analysis, from metadata to text, and then to visual content, the carrying difficulty of the three subjects' study increases gradually. Photo data themselves involve a wealth of interesting information apart from metadata.However, most existing studies conducted analyses indirectly on the metadata or textural data embedded in photos. As a gap, mining the most abundant picture content is less performed, and powerful photo mining techniques acting directly on images are needed (</span><a class="workspace-trigger" data-dcnode-id="5385" href="#bib36" name="bbib36"><span data-dcnode-id="5386" instrument_node="">Li et al., 2018</span></a><span data-dcnode-id="5384" instrument_node="">). Facing the challenge of mining the picture content itself, computer vision, and image processing technology in the field of artifical intelligence (AI ) have already made much progress. Through computer deep learning, effectively reading massive picture data and visual content recognition is possible. The popularization of Python and other coding techniques make interdisciplinary cooperation between computer and tourism research inevitable. It is time to make a better attempt to adopt the computer vision and image processing technology to identify the content of UGC photos.</span></p><p data-dcnode-id="5381" id="p0050"><span data-dcnode-id="5382" instrument_node="">With the aims of filling this gap and detecting more valuable information from visual metadata for tourism destination research, this study takes “how to effectively apply computer vision technology into tourists' behaviors and perception analysis in the field of tourism destination study” as the core question. By using photos' visual content as a new form of data, specific objectives are (1) to establish the tourists' photo dataset of 137265 photos of Beijing by data mining in social network Flickr and identify the visual contents of photo into 103 scenes and 11 categories by computer deep learning; (2) compare perception and behavior preference of tourists from different continents and countries and (3) explore the feasibility of using the computer deep learning model in the study of tourists' perception and behavior preference in tourism destinations.</span></p></section><section data-dcnode-id="5128" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5376" id="sectitle0030"><span data-dcnode-id="5379" instrument_node="">2</span><span data-dcnode-id="5378" instrument_node="">. </span><span data-dcnode-id="5377" instrument_node="">Theoretical background</span></h2><section data-dcnode-id="5328" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5372" id="sectitle0035"><span data-dcnode-id="5375" instrument_node="">2.1</span><span data-dcnode-id="5374" instrument_node="">. </span><span data-dcnode-id="5373" instrument_node="">Photographs as the representation of tourism destination image (TDI)</span></h3><p data-dcnode-id="5343" id="p0055"><span data-dcnode-id="5371" instrument_node="">In the Web 2.0 Era, the “Travel 2.0” phenomenon is catalyzed, which is characterized by a high level of social interaction and exchange of travel-related content between tourists on the Internet (</span><a class="workspace-trigger" data-dcnode-id="5369" href="#bib31" name="bbib31"><span data-dcnode-id="5370" instrument_node="">Leung, Lee &amp; Law, 2012</span></a><span data-dcnode-id="5368" instrument_node="">). The building of TDI has transformed from the destination marketer's domination (</span><a class="workspace-trigger" data-dcnode-id="5366" href="#bib17" name="bbib17"><span data-dcnode-id="5367" instrument_node="">Gunn, 1972</span></a><span data-dcnode-id="5365" instrument_node="">) to a dynamic interaction process between tourist and promotion (</span><a class="workspace-trigger" data-dcnode-id="5363" href="#bib16" name="bbib16"><span data-dcnode-id="5364" instrument_node="">Gilbert &amp; Hancock, 2006</span></a><span data-dcnode-id="5362" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5360" href="#bib21" name="bbib21"><span data-dcnode-id="5361" instrument_node="">Hunter, 2013</span></a><span data-dcnode-id="5359" instrument_node="">), and then to a new stage, which is primarily shaped by tourists' behavior, perception, experience and their dissemination through various social networks, and gives pressure to the destination management organizations (DMOs) of examining and modifying their projected destination image (PDI). In the research process, the current destination image study emphasizes the qualitative dimensions as the quantitative measurement (</span><a class="workspace-trigger" data-dcnode-id="5357" href="#bib7" name="bbib7"><span data-dcnode-id="5358" instrument_node="">Chi, Wu, Morrison, Zhang, &amp; Chen, 2015</span></a><span data-dcnode-id="5356" instrument_node="">), and try to figure out a holistic destination image by detecting through several attributes or dimensions. For example, </span><a class="workspace-trigger" data-dcnode-id="5354" href="#bib11" name="bbib11"><span data-dcnode-id="5355" instrument_node="">Echtner and Ritchie (1993)</span></a><span data-dcnode-id="5353" instrument_node=""> used the attribute-holistic framework to form a destination image (</span><a class="workspace-trigger" data-dcnode-id="5351" href="#bib11" name="bbib11"><span data-dcnode-id="5352" instrument_node="">Echtner &amp; Ritchie, 1993</span></a><span data-dcnode-id="5350" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5348" href="#bib48" name="bbib48"><span data-dcnode-id="5349" instrument_node="">Qu, Kim, and Im (2011)</span></a><span data-dcnode-id="5347" instrument_node=""> pointed out that the overall or holistic image of a destination is formed by the interaction with cognitive, affective, and unique images (</span><a class="workspace-trigger" data-dcnode-id="5345" href="#bib48" name="bbib48"><span data-dcnode-id="5346" instrument_node="">Qu, Kim &amp; Im, 2011</span></a><span data-dcnode-id="5344" instrument_node="">).</span></p><p data-dcnode-id="5329" id="p0060"><span data-dcnode-id="5342" instrument_node="">In this sense, photos can be understood as a compression of the destination's image (</span><a class="workspace-trigger" data-dcnode-id="5340" href="#bib46" name="bbib46"><span data-dcnode-id="5341" instrument_node="">Pan, Lee &amp; Tsai, 2014a</span></a><span data-dcnode-id="5339" instrument_node="">), as the visual images have a more significant impact on people's memories and attitudes than other forms of messages, such as text, sound, and so on (</span><a class="workspace-trigger" data-dcnode-id="5337" href="#bib29" name="bbib29"><span data-dcnode-id="5338" instrument_node="">Kim, Kim &amp; Wise, 2014</span></a><span data-dcnode-id="5336" instrument_node="">). Photographs stand for tourists' perception, experience and even sentiment (</span><a class="workspace-trigger" data-dcnode-id="5334" href="#bib47" name="bbib47"><span data-dcnode-id="5335" instrument_node="">Pan, Lee &amp; Tsai, 2014b</span></a><span data-dcnode-id="5333" instrument_node="">) towards tourism destinations. Thus, they serve as a pictorial representation of the cognition of TDI and provide a means to convey or construct a TDI (</span><a class="workspace-trigger" data-dcnode-id="5331" href="#bib22" name="bbib22"><span data-dcnode-id="5332" instrument_node="">Hunter, 2016</span></a><span data-dcnode-id="5330" instrument_node="">).</span></p></section><section data-dcnode-id="5269" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5324" id="sectitle0040"><span data-dcnode-id="5327" instrument_node="">2.2</span><span data-dcnode-id="5326" instrument_node="">. </span><span data-dcnode-id="5325" instrument_node="">Photographs as a spatial-temporal mirror for tourists' behavior</span></h3><p data-dcnode-id="5313" id="p0065"><span data-dcnode-id="5323" instrument_node="">Recently, GPS chips became a standard component inside many cameras and smartphones, and geographical information can be embedded into the photo's EXIF when taking a photo. Thus, the popular photo-sharing websites enable “geo-tagging” in their tagging interface. Latitude and longitude can be automatically extracted (</span><a class="workspace-trigger" data-dcnode-id="5321" href="#bib26" name="bbib26"><span data-dcnode-id="5322" instrument_node="">Jiang, Yin, Wang, &amp; Yu, 2013</span></a><span data-dcnode-id="5320" instrument_node="">). These increasing geo-tagged photos provide opportunities in tourism research by providing high spatial and temporal data that make it possible to analyze the spatiotemporal patterns of a large number of tourists (</span><a class="workspace-trigger" data-dcnode-id="5318" href="#bib51" name="bbib51"><span data-dcnode-id="5319" instrument_node="">Salas-Olmedo, Moya-Gómez, García-Palomares, &amp; Gutiérrez, 2018</span></a><span data-dcnode-id="5317" instrument_node="">)，like photo-takers’ trails and movements, and trajectory patterns (</span><a class="workspace-trigger" data-dcnode-id="5315" href="#bib5" name="bbib5"><span data-dcnode-id="5316" instrument_node="">Cai, Lee &amp;Lee, 2018</span></a><span data-dcnode-id="5314" instrument_node=""> ). In recent years, there have been numbers of spatiotemporal analyses of tourist behavior by using geographic information of UGC geotagged photos.</span></p><p data-dcnode-id="5272" id="p0070"><span data-dcnode-id="5312" instrument_node="">According to the overall complexity of the research question and data processing technology, the study of tourist behavior based on geo-tagged photos could be grouped into three categories. In the first type, geographic coordinate information is the independent and unique analysis data for obtaining spatial distributions characteristics, like urban area of interest (AOI), place of interest (PoI) (</span><a class="workspace-trigger" data-dcnode-id="5310" href="#bib4" name="bbib4"><span data-dcnode-id="5311" instrument_node="">Cai, Hio, Bermingham, Lee, &amp; Lee, 2014</span></a><span data-dcnode-id="5309" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5307" href="#bib14" name="bbib14"><span data-dcnode-id="5308" instrument_node="">García-Palomares, Gutiérrez &amp; Mínguez, 2015</span></a><span data-dcnode-id="5306" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5304" href="#bib18" name="bbib18"><span data-dcnode-id="5305" instrument_node="">Han &amp; Lee, 2015</span></a><span data-dcnode-id="5303" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5301" href="#bib20" name="bbib20"><span data-dcnode-id="5302" instrument_node="">Hu et al., 2015</span></a><span data-dcnode-id="5300" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5298" href="#bib63" name="bbib63"><span data-dcnode-id="5299" instrument_node="">Zhou, Xu &amp; Kimmons, 2015</span></a><span data-dcnode-id="5297" instrument_node="">) and geographic preferences (</span><a class="workspace-trigger" data-dcnode-id="5295" href="#bib56" name="bbib56"><span data-dcnode-id="5296" instrument_node="">Su, Wan, Hu, &amp; Cai, 2016</span></a><span data-dcnode-id="5294" instrument_node="">), aggregated clustering frequently appeared in the methodology of this kind of study. In the second type, both spatial and temporal analysis are conducted using a dataset combination of geographic coordination and time sequence. Tourists behavior, tourist's trajectory, and pattern of tourist's trajectory are the primary research content (</span><a class="workspace-trigger" data-dcnode-id="5292" href="#bib50" name="bbib50"><span data-dcnode-id="5293" instrument_node="">Salas-Olmedo, Moya-Gómez, García-Palomares, &amp; Gutiérrez, 2017</span></a><span data-dcnode-id="5291" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5289" href="#bib54" name="bbib54"><span data-dcnode-id="5290" instrument_node="">Straumann, Çöltekin &amp; Andrienko, 2014</span></a><span data-dcnode-id="5288" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5286" href="#bib59" name="bbib59"><span data-dcnode-id="5287" instrument_node="">Vu, Li, Law, &amp; Ye, 2015</span></a><span data-dcnode-id="5285" instrument_node="">). Based on this research, the further study aimed at travel route recommendation to the tourism spots are carried out with computer depth learning (</span><a class="workspace-trigger" data-dcnode-id="5283" href="#bib9" name="bbib9"><span data-dcnode-id="5284" instrument_node="">Chua, Servillo, Marcheggiani, &amp; Moere, 2016</span></a><span data-dcnode-id="5282" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5280" href="#bib15" name="bbib15"><span data-dcnode-id="5281" instrument_node="">Gavric, Culibrk, Lugonja, Mirkovic, &amp; Crnojevic, 2011</span></a><span data-dcnode-id="5279" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5277" href="#bib55" name="bbib55"><span data-dcnode-id="5278" instrument_node="">Sun, Fan, Bakillah, &amp; Zipf, 2015</span></a><span data-dcnode-id="5276" instrument_node="">). For the third type, more attached metadata with geo-tagged photos are applied to research, semantic tourist's trajectory analysis appears as a more deep-going analysis for the characteristics of tourist behavior and smart itinerary recommendation (</span><a class="workspace-trigger" data-dcnode-id="5274" href="#bib5" name="bbib5"><span data-dcnode-id="5275" instrument_node="">Cai, Lee, &amp; Lee, 2018</span></a><span data-dcnode-id="5273" instrument_node="">).</span></p><p data-dcnode-id="5270" id="p0075"><span data-dcnode-id="5271" instrument_node="">In all the three categories, the analytic dimension of behavioral differences between tourists and locals are covered. In addition to the geographic coordinate information, tag, capture, and other textual information describing the photo are usually combined into the spatial analysis as a complement. However, the interpretation of the visual content of the photo itself is rarely involved in any geo-tagged based study.</span></p></section><section data-dcnode-id="5129" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5265" id="sectitle0045"><span data-dcnode-id="5268" instrument_node="">2.3</span><span data-dcnode-id="5267" instrument_node="">. </span><span data-dcnode-id="5266" instrument_node="">Visual content analysis of photos in tourism and related research fields</span></h3><p data-dcnode-id="5263" id="p0080"><span data-dcnode-id="5264" instrument_node="">This paper reviews the literature about visual content analysis of the photo from three research aspects: the data source of photos, study theme and dimension, and methodology for visual content analysis.</span></p><p data-dcnode-id="5238" id="p0085"><strong data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">Photo source.</span></strong><span data-dcnode-id="5260" instrument_node=""> There are three main ways of photos material selection with chronological order: (1) the convention media resource, e.g., 145 photos published in The New York Times Travel Section “Why We Travel” from 2008 to 2012 were extracted for analysis (</span><a class="workspace-trigger" data-dcnode-id="5258" href="#bib47" name="bbib47"><span data-dcnode-id="5259" instrument_node="">Pan, Lee, &amp; Tsai, 2014b</span></a><span data-dcnode-id="5257" instrument_node="">); (2) online engine website, online keywords search in the mainstream engine website is an approach for sampling, and it uses the specific research topics-online destination image (</span><a class="workspace-trigger" data-dcnode-id="5255" href="#bib8" name="bbib8"><span data-dcnode-id="5256" instrument_node="">Choi, Lehto &amp; Morrison, 2007</span></a><span data-dcnode-id="5254" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5252" href="#bib21" name="bbib21"><span data-dcnode-id="5253" instrument_node="">Hunter, 2013</span></a><span data-dcnode-id="5251" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5249" href="#bib22" name="bbib22"><span data-dcnode-id="5250" instrument_node="">2016</span></a><span data-dcnode-id="5248" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5246" href="#bib38" name="bbib38"><span data-dcnode-id="5247" instrument_node="">Mak, 2017</span></a><span data-dcnode-id="5245" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5243" href="#bib62" name="bbib62"><span data-dcnode-id="5244" instrument_node="">Zhou, 2014</span></a><span data-dcnode-id="5242" instrument_node="">); (3) UGC photos in the social network, keywords for tags searching still were used for samplings in the data collection, and social network like Flickr instead of online engine website (</span><a class="workspace-trigger" data-dcnode-id="5240" href="#bib53" name="bbib53"><span data-dcnode-id="5241" instrument_node="">Stepchenkova &amp; Zhan, 2013</span></a><span data-dcnode-id="5239" instrument_node="">). The change in the selection of materials is closely related to the evolution and development of the media and social networks.</span></p><p data-dcnode-id="5198" id="p0090"><strong data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">Study theme and dimension.</span></strong><span data-dcnode-id="5235" instrument_node=""> How the pictorial materials reflect the destination image is the identified theme, and it unfolds in diverse aspect. First, photos are viewed as a representative semiotic for a destination. Semiotics theory is adopted for interpreting photos' representations of a tourism destination (</span><a class="workspace-trigger" data-dcnode-id="5233" href="#bib42" name="bbib42"><span data-dcnode-id="5234" instrument_node="">Nöth, 1990</span></a><span data-dcnode-id="5232" instrument_node="">), typical content-semiotic procedures with sampling, content analysis, reflexive semiotic, synecdoche, and synthesis are applied (</span><a class="workspace-trigger" data-dcnode-id="5230" href="#bib21" name="bbib21"><span data-dcnode-id="5231" instrument_node="">Hunter, 2013</span></a><span data-dcnode-id="5229" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5227" href="#bib22" name="bbib22"><span data-dcnode-id="5228" instrument_node="">2016</span></a><span data-dcnode-id="5226" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5224" href="#bib30" name="bbib30"><span data-dcnode-id="5225" instrument_node="">Leeuwen, 2003</span></a><span data-dcnode-id="5223" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5221" href="#bib39" name="bbib39"><span data-dcnode-id="5222" instrument_node="">Mcgregor, 2000</span></a><span data-dcnode-id="5220" instrument_node="">). Second, photos that express the travel experience towards the destination. Tags, captions or other textural photo descriptions are the substitution of the photo itself for content analysis (</span><a class="workspace-trigger" data-dcnode-id="5218" href="#bib47" name="bbib47"><span data-dcnode-id="5219" instrument_node="">Pan et al., 2014b</span></a><span data-dcnode-id="5217" instrument_node="">), correlation analysis between affective qualities of places/landscape and the descriptive adjectives were conducted by “content analysis” and “semiotic analysis” (</span><a class="workspace-trigger" data-dcnode-id="5215" href="#bib1" name="bbib1"><span data-dcnode-id="5216" instrument_node="">Albers &amp; James, 1988</span></a><span data-dcnode-id="5214" instrument_node="">). Third, photos as indicators for diagnosing the TDI divergences between DMO (destination management organizations) and tourists, tourists &amp; residents, are different information resources (</span><a class="workspace-trigger" data-dcnode-id="5212" href="#bib8" name="bbib8"><span data-dcnode-id="5213" instrument_node="">Choi, Lehto, &amp; Morrison, 2007</span></a><span data-dcnode-id="5211" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5209" href="#bib38" name="bbib38"><span data-dcnode-id="5210" instrument_node="">Mak, 2017</span></a><span data-dcnode-id="5208" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5206" href="#bib57" name="bbib57"><span data-dcnode-id="5207" instrument_node="">Valek &amp; Williams, 2018</span></a><span data-dcnode-id="5205" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5203" href="#bib43" name="bbib43"><span data-dcnode-id="5204" instrument_node="">Önder &amp; Marchiori, 2017</span></a><span data-dcnode-id="5202" instrument_node="">). Fourth, photos as logos serving for branding landmarks. The most suitable landmarks photos were found through the content analysis of tourist geo-tagged photos (</span><a class="workspace-trigger" data-dcnode-id="5200" href="#bib28" name="bbib28"><span data-dcnode-id="5201" instrument_node="">Kennedy, Naaman, Ahern, Nair, &amp; Rattenbury, 2007</span></a><span data-dcnode-id="5199" instrument_node="">).</span></p><p data-dcnode-id="5182" id="p0095"><strong data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">Methodology for visual content analysis.</span></strong><span data-dcnode-id="5195" instrument_node=""> Visual content analysis is a systematic, observational method used for exploring how the studied phenomenon is represented (</span><a class="workspace-trigger" data-dcnode-id="5193" href="#bib3" name="bbib3"><span data-dcnode-id="5194" instrument_node="">Bell, 2001</span></a><span data-dcnode-id="5192" instrument_node="">). It allows the quantification of samples of observable content classified into distinct categories (</span><a class="workspace-trigger" data-dcnode-id="5190" href="#bib3" name="bbib3"><span data-dcnode-id="5191" instrument_node="">Bell, 2001</span></a><span data-dcnode-id="5189" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5187" href="#bib38" name="bbib38"><span data-dcnode-id="5188" instrument_node="">Mak, 2017</span></a><span data-dcnode-id="5186" instrument_node="">). Content analysis is attribute-based and is primarily concerned with quantitatively describing the appearance of specific themes and attributes in the collection of images, allowing the main focal items in the pictures to be identified and their frequencies, co-occurrence, clustering, and other related issues to be recoded (</span><a class="workspace-trigger" data-dcnode-id="5184" href="#bib53" name="bbib53"><span data-dcnode-id="5185" instrument_node="">Stepchenkova &amp; Zhan, 2013</span></a><span data-dcnode-id="5183" instrument_node="">). Trained category and coding researcher are the crucial part of the procedure. In addition, Mise en scene refers to shot density, shot scale, shot angle, and shot composition, which has been employed as a complement for visual content analysis. NVivo, textblob, ThoughtView, and other related software are applied as tools for data statistics.</span></p><p data-dcnode-id="5157" id="p0100"><span data-dcnode-id="5177"><span data-dcnode-id="5181" instrument_node="">Compared to the tourism destination image, the concept of city image has existed in the research field of urban space for decades. Lynch maintained that city </span><a class="topic-link" data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/image-formation" title="Learn more about image formation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5180" instrument_node="">image formation</span></a><span data-dcnode-id="5178" instrument_node=""> is the result of a bilateral process led by the observer and the environment (</span></span><a class="workspace-trigger" data-dcnode-id="5175" href="#bib37" name="bbib37"><span data-dcnode-id="5176" instrument_node="">Lynch, 1960</span></a><span data-dcnode-id="5174" instrument_node="">). City image, which includes both of the tourists' and residents' perspectives, is utilized in the initial phase of a city's brand development (</span><a class="workspace-trigger" data-dcnode-id="5172" href="#bib27" name="bbib27"><span data-dcnode-id="5173" instrument_node="">Kavaratzis, 2004</span></a><span data-dcnode-id="5171" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5169" href="#bib44" name="bbib44"><span data-dcnode-id="5170" instrument_node="">Oshimi &amp; Harada, 2018</span></a><span data-dcnode-id="5164"><span data-dcnode-id="5168" instrument_node="">). There are already several attempts in the field of city and </span><a class="topic-link" data-dcnode-id="5166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/urban-planning" title="Learn more about urban planning from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5167" instrument_node="">urban planning</span></a><span data-dcnode-id="5165" instrument_node=""> with Visual content analysis of UGC photo. For example, Liu downloaded photos of 26 cities in the world (an average of 100,000 photos per city) with geographic information from Panoramio and Flickr using python scripting language, and categorized the photos into 102 scenes and 7 perceptions (the Green Perception, Water Perception, Transportation Perception, High-rises Perception, Architecture Perception, Socializing Perception, and Athletic Perception) by content analysis, which is built on a computer vision technique - scene understanding. The characteristics and spatial distribution of seven perceptions were statistically analyzed (</span></span><a class="workspace-trigger" data-dcnode-id="5162" href="#bib35" name="bbib35"><span data-dcnode-id="5163" instrument_node="">Liu, Zhou, Zhao, &amp; Ryan, 2016</span></a><span data-dcnode-id="5161" instrument_node="">). Except the image issue, online data shared on social networks, particularly geo-tagged photos, are taken as an increasingly attractive source of information about cultural ecosystem services, a content analysis of 1.404 photos uploaded in Flickr and Panoramio has been conducted in five European cities for exploring how they represent cultural ecosystem services (</span><a class="workspace-trigger" data-dcnode-id="5159" href="#bib45" name="bbib45"><span data-dcnode-id="5160" instrument_node="">Oteros-Rozas, Martín-López, Fagerholm, Bieling, &amp; Plieninger, 2018</span></a><span data-dcnode-id="5158" instrument_node="">).</span></p><p data-dcnode-id="5134" id="p0105"><span data-dcnode-id="5156" instrument_node="">Excepted using UGC photos as the resource for the exploration of city image, goolge street view (GSV) is another photo resource for content analysis in the urban study. Study issues include urban greening (</span><a class="workspace-trigger" data-dcnode-id="5154" href="#bib33" name="bbib33"><span data-dcnode-id="5155" instrument_node="">Li, Ratti &amp; Seiferling, 2018</span></a><span data-dcnode-id="5153" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5151" href="#bib32" name="bbib32"><span data-dcnode-id="5152" instrument_node="">Li &amp; Ratti, 2018</span></a><span data-dcnode-id="5150" instrument_node="">), Neighborhood walkability (</span><a class="workspace-trigger" data-dcnode-id="5148" href="#bib61" name="bbib61"><span data-dcnode-id="5149" instrument_node="">Yin, Cheng, Wang, &amp; Shao, 2015</span></a><span data-dcnode-id="5147" instrument_node="">), Bikeability (</span><a class="workspace-trigger" data-dcnode-id="5145" href="#bib12" name="bbib12"><span data-dcnode-id="5146" instrument_node="">Evans-Cowley &amp; Akar, 2014</span></a><span data-dcnode-id="5144" instrument_node="">), perceived naturalness (</span><a class="workspace-trigger" data-dcnode-id="5142" href="#bib24" name="bbib24"><span data-dcnode-id="5143" instrument_node="">Hyam, 2017</span></a><span data-dcnode-id="5141" instrument_node="">), public open spaces (</span><a class="workspace-trigger" data-dcnode-id="5139" href="#bib41" name="bbib41"><span data-dcnode-id="5140" instrument_node="">Mygind et al., 2016</span></a><span data-dcnode-id="5138" instrument_node="">) and so on. Nearly all the new emerging studies with content analysis using GSV has employed a deep learning method by computer vision technology (</span><a class="workspace-trigger" data-dcnode-id="5136" href="#bib49" name="bbib49"><span data-dcnode-id="5137" instrument_node="">Rzotkiewicz, Pearson, Dougherty, Shortridge, &amp; Wilson, 2018</span></a><span data-dcnode-id="5135" instrument_node="">). All these give inspiration for the pictorial content analysis with big data in tourism research.</span></p><p data-dcnode-id="5132" id="p0110"><span data-dcnode-id="5133" instrument_node="">Therefore, big data has uniqueness and advantages compared to traditional data collection, and the content of the photo also holds great potential and effectiveness compared to textual material. It is the inexorable tendency to use deep-going mining for applying the visual pictorial contents into tourism research in the social network occupied era, as it is the most popular visual information in our present world and filled all the corners. Currently, the research concerning visual content-analysis fall into two approaches: one is the conventional way, which manually identifies visual contents of photo and taking attached textual information as complement, and the other is an emerging approach which interpreting the photo's content with the help of computer vision technology. For the conventional content analysis, the limited numbers of photos constrained the size of the sample, and the instability and irregularity of artificial coding for the visual content category show a common drawback. On the contrary, the emerging approach has an unparalleled advantage in the big datasets and relatively standardized classification processing by machine learning. However, the conventional approach holds a relatively mature conceptual and theoretical framework compared to the study using computer vision technology. Also, a well-designed and performed deep learning technology itself takes great time and energy in the phase of coding and machine training.</span></p><p data-dcnode-id="5130" id="p0115"><span data-dcnode-id="5131" instrument_node="">This study will refer to the theoretical framework of the conventional visual content study, and adopt an already well-performed visual content identification process in computer vision technology, and then explore the characteristics of tourist perception and the reflected destination image by combining the results of the pictorial content analysis and geo-tagged based spatial analysis.</span></p></section></section><section data-dcnode-id="5095" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5124" id="sectitle0050"><span data-dcnode-id="5127" instrument_node="">3</span><span data-dcnode-id="5126" instrument_node="">. </span><span data-dcnode-id="5125" instrument_node="">Dataset and the study city</span></h2><section data-dcnode-id="5105" id="sec3.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5120" id="sectitle0055"><span data-dcnode-id="5123" instrument_node="">3.1</span><span data-dcnode-id="5122" instrument_node="">. </span><span data-dcnode-id="5121" instrument_node="">Dataset-Flickr YFCC 100M</span></h3><p data-dcnode-id="5115" id="p0120"><span data-dcnode-id="5119" instrument_node="">In July 2015, Yahoo released a visual content dataset titled “Yahoo Flickr Creative Commons 100M” (YFCC 100M), the most extensive public multimedia collection that has ever been released. The dataset contains a total of 100 million media objects from the inception of Flickr in 2004 until early 2014, of which approximately 99.2 million photos and 0.8 million videos. Each media object in the dataset is represented by 23 pieces of metadata (</span><a class="workspace-trigger" data-dcnode-id="5117" href="#bib52" name="bbib52"><span data-dcnode-id="5118" instrument_node="">Shamma et al., 2016</span></a><span data-dcnode-id="5116" instrument_node="">). All the metadata are presented in line. In this study, five types of information are employed as: (1) photo/video identifier and user NSID (PID-picture identification/UID-user identification), used to identifying and counting the photo or user (2) date taken (day and time), used for tracking tourists' trajectory (3) title/description/user tags (comma-separated) used for analyzing tourists cognition and behavior (4) longitude and latitude, used for matching geographical coordinates (5) photo/video download URL, used for download of the original photos.</span></p><p data-dcnode-id="5106" id="p0125"><span data-dcnode-id="5114" instrument_node="">In all, YFCC 100M contains 48,366,323 geo-tagged photos (</span><a class="workspace-trigger" data-dcnode-id="5112" href="#bib10" name="bbib10"><span data-dcnode-id="5113" instrument_node="">Deng &amp; Li, 2018</span></a><span data-dcnode-id="5111" instrument_node="">), and BCL</span><a class="workspace-trigger" data-dcnode-id="5108" href="#fn1" name="bfn1"><sup data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">1</span></sup></a><span data-dcnode-id="5107" instrument_node=""> (Beijing city lab) selected all the 2,171,162 photos in China for researchers. It saves a lot of energy for handing the original dataset from Flickr and make it easier to cut out the data located in the study city.</span></p></section><section data-dcnode-id="5096" id="sec3.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5101" id="sectitle0060"><span data-dcnode-id="5104" instrument_node="">3.2</span><span data-dcnode-id="5103" instrument_node="">. </span><span data-dcnode-id="5102" instrument_node="">The study city</span></h3><p data-dcnode-id="5099" id="p0130"><span data-dcnode-id="5100" instrument_node="">Beijing is the capital of the People's Republic of China, it has been the political, economic, and cultural center of China for over 800 years from the Yuan Dynasty. It also serves as the most important transportation hub and port of entry. Now it has become one of the most popular travel destinations in the world, world-famous scenic spots include Great Wall, Forbidden City, Summer Palace, Olympic Park, and so on. In 2017, 293.54 million Chinese tourists and 3.92 million international visitors had visited Beijing, according to the Beijing Statistics Bureau. Statistics by BCL labs show that Beijing has the largest number of photos; it indicates Beijing is the most popular destination for tourists.</span></p><p data-dcnode-id="5097" id="p0135"><span data-dcnode-id="5098" instrument_node="">For establishing the dataset in Beijing, both original metadata and the filtered BCL data are taken. Firstly, geo-tagged photos in Beijing were selected by Beijing administrative boundary in ArcGIS. Then, the completed metadata was supplemented by matching the PID (each photo has a distinctive PID) through writing script code in Python. 144967 metadata of photos were selected in Beijing, and each one has a download URL. By allocating the task to the computer with programming, the original uploaded photos by users were automatically downloaded. As users have deleted some of the photos, 137265 photos were found. By code designed in Python, information of the user's birthplace, city and country are retrieved by invoking API (Application Programming Interface) data. According to the three geographic locations filled by the users themselves, 1075 foreign users' countries were identified effectively, and 35356 photos uploaded by them were taken as the object of scene recognition. It should be noted that there is a restriction for Flickr in China; Flickr users who upload photos shot in Beijing are mainly tourists who come from overseas. For this reason, the perception of tourism destination image in this study is generated from oversea tourists.</span></p></section></section><section data-dcnode-id="4904" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5091" id="sectitle0065"><span data-dcnode-id="5094" instrument_node="">4</span><span data-dcnode-id="5093" instrument_node="">. </span><span data-dcnode-id="5092" instrument_node="">Methodology</span></h2><section data-dcnode-id="5051" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5087" id="sectitle0070"><span data-dcnode-id="5090" instrument_node="">4.1</span><span data-dcnode-id="5089" instrument_node="">. </span><span data-dcnode-id="5088" instrument_node="">Research process</span></h3><div data-dcnode-id="5057"><p data-dcnode-id="5082" id="p0140"><span data-dcnode-id="5086" instrument_node="">The overall research is divided into four steps, the first step is data collection and screening, the second step is the process of photo content analysis by computer deep learning model, the third step is the analysis of the results, which includes comparative perceptual analysis of tourists from different places in the world and spatial distribution with different preferences, and then the conclusion of the study is the last step (</span><a class="workspace-trigger" data-dcnode-id="5084" href="#fig1" name="bfig1"><span data-dcnode-id="5085" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5083" instrument_node="">). Compared to the conventional photo-based tourism research methods, the substation of the artificial intelligence approach for natural intelligence approach in step 2 is the innovation, and the category developed based on the output of the machine learning model is a new way of induction for destination cognitive image analysis.</span></p><figure class="figure text-xs" data-dcnode-id="5058" id="fig1"><span data-dcnode-id="5066"><img alt="Fig. 1" aria-describedby="cap0010" data-dcnode-id="5081" height="838" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr1.jpg&amp;raw"><span data-dcnode-id="5080" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5067"><li data-dcnode-id="5074"><a class="anchor download-link u-font-sans" data-dcnode-id="5075" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr1_lrg.jpg" target="_blank" title="Download high-res image (804KB)"><span class="anchor-text" data-dcnode-id="5076"><span data-dcnode-id="5079" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">Download high-res image (804KB)</span></span></span></a></li><li data-dcnode-id="5068"><a class="anchor download-link u-font-sans" data-dcnode-id="5069" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5070"><span data-dcnode-id="5073" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5059"><span data-dcnode-id="5060" id="cap0010"><p data-dcnode-id="5061" id="fspara0010"><span class="label" data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5063" instrument_node="">. </span><span data-dcnode-id="5062" instrument_node="">Research process.</span></p></span></span></figure></div><p data-dcnode-id="5052" id="p0145"><span data-dcnode-id="5056" instrument_node="">Data collection and screening has been introduced in section </span><a class="workspace-trigger" data-dcnode-id="5054" href="#sec3" name="bsec3"><span data-dcnode-id="5055" instrument_node="">3</span></a><span data-dcnode-id="5053" instrument_node="">. In step 2, the deep learning model of scene recognition is employed for recognizing the contents of tourists' photos. The purpose of scene recognition is to identify the tourist photos referring to 103 scenes, and each photo would belong to one unique scene. In step 3, statistical analysis and spatial analysis are conducted in parallel as two independent and complementary approaches for analyzing the data results of scene recognition, tourists' home information (country and continent), and photos' geographical information (longitude and latitude) are applied for comparative statistic analysis and spatial positioning. Statistical analysis is mainly to detect perceptual differences between tourists from different countries and continents. Hierarchical clustering analysis and ANOVA (analysis of variance) are the specific methods in statistical analysis. Spatial analysis is applied to discover the spatial distribution characteristics of tourists' behaviors preference with different scenes by the help of ArcGIS. The last part is responding to the research objective based on the analysis process and comes to a conclusion.</span></p></section><section data-dcnode-id="5005" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5047" id="sectitle0075"><span data-dcnode-id="5050" instrument_node="">4.2</span><span data-dcnode-id="5049" instrument_node="">. </span><span data-dcnode-id="5048" instrument_node="">Deep learning models for recognizing photos' content</span></h3><div data-dcnode-id="5008"><p data-dcnode-id="5033" id="p0150"><span data-dcnode-id="5046" instrument_node="">This study employs widely spread ResNet (</span><a class="workspace-trigger" data-dcnode-id="5044" href="#bib19" name="bbib19"><span data-dcnode-id="5045" instrument_node="">He, Zhang, Ren, &amp; Sun, 2015</span></a><span data-dcnode-id="5043" instrument_node="">, pp. 770–778) for the image classification task-scene recognition. This deep learning structure obtained very successful results in these two computer vision competitions-ImageNet and MS-COCO. The core idea exploited in these models -residual connections, is found to improve gradient flow greatly, thus allowing training of much deeper models with tens or even hundreds of layers. Three realizations which are ResNet-50, ResNet-101 and ResNet-152 are proposed, then it chooses ResNet-101 in these experiments. A demonstrated model structure with only 101 layers is shown in </span><a class="workspace-trigger" data-dcnode-id="5041" href="#fig2" name="bfig2"><span data-dcnode-id="5042" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5040" instrument_node="">. As an output, 103 scenes are recognized by taking tourists' photos as input. The designing of the machine learning model for scene recognition is the key technology of this study. As it is already a mature field in computer vision, there are many frontier papers about the details (structure and code) of the model (</span><a class="workspace-trigger" data-dcnode-id="5038" href="#bib6" name="bbib6"><span data-dcnode-id="5039" instrument_node="">Cheng, Zhang, Fan, &amp; Harris, 2018</span></a><span data-dcnode-id="5037" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5035" href="#bib40" name="bbib40"><span data-dcnode-id="5036" instrument_node="">Meiyin &amp; Li, 2015</span></a><span data-dcnode-id="5034" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5009" id="fig2"><span data-dcnode-id="5017"><img alt="Fig. 2" aria-describedby="cap0015" data-dcnode-id="5032" height="95" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr2.jpg&amp;raw"><span data-dcnode-id="5031" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5018"><li data-dcnode-id="5025"><a class="anchor download-link u-font-sans" data-dcnode-id="5026" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr2_lrg.jpg" target="_blank" title="Download high-res image (232KB)"><span class="anchor-text" data-dcnode-id="5027"><span data-dcnode-id="5030" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">Download high-res image (232KB)</span></span></span></a></li><li data-dcnode-id="5019"><a class="anchor download-link u-font-sans" data-dcnode-id="5020" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5021"><span data-dcnode-id="5024" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5022"><span data-dcnode-id="5023" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5010"><span data-dcnode-id="5011" id="cap0015"><p data-dcnode-id="5012" id="fspara0015"><span class="label" data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Fig. 2</span></span><span data-dcnode-id="5014" instrument_node="">. </span><span data-dcnode-id="5013" instrument_node="">Model structure of ResNet.</span></p></span></span></figure></div><p data-dcnode-id="5006" id="p0155"><span data-dcnode-id="5007" instrument_node="">This applied deep learning model has been tested with experimental data, experimental results show that it is efficient and robust for scene recognition with recall rate and high precision, the recall rate achieved 90% , and the false recognition rate is 0.1%. The recall rate indicates the ratio of the number of identified scenes to the total number of this scene. The false recognition rate means the proportion of the number of the false identified scenes to the total number of this scene.</span></p></section><section data-dcnode-id="4922" id="sec4.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5001" id="sectitle0080"><span data-dcnode-id="5004" instrument_node="">4.3</span><span data-dcnode-id="5003" instrument_node="">. </span><span data-dcnode-id="5002" instrument_node="">Perceptual categories developed from 103 scenes</span></h3><div data-dcnode-id="4923"><p data-dcnode-id="4996" id="p0160"><span data-dcnode-id="5000" instrument_node="">103 scenes are too fragmented to analyze the general characteristics of tourists' perception. By referring to the similarity of tourists' perception, 103 scenes are reclassified into 11 categories (</span><a class="workspace-trigger" data-dcnode-id="4998" href="#tbl1" name="btbl1"><span data-dcnode-id="4999" instrument_node="">Table 1</span></a><span data-dcnode-id="4997" instrument_node="">), which covered most tourists' perception in tourism destinations.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4924" id="tbl1"><span class="captions" data-dcnode-id="4989"><span data-dcnode-id="4990" id="cap0070"><p data-dcnode-id="4991" id="tspara0010"><span class="label" data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">Table 1</span></span><span data-dcnode-id="4993" instrument_node="">. </span><span data-dcnode-id="4992" instrument_node="">11 Categories development from 103 recognized scenes.</span></p></span></span><div class="groups" data-dcnode-id="4925"><table data-dcnode-id="4926"><thead data-dcnode-id="4983"><tr class="rowsep-1 valign-top" data-dcnode-id="4984"><th data-dcnode-id="4987" scope="col"><span data-dcnode-id="4988" instrument_node="">perception type</span></th><th data-dcnode-id="4985" scope="col"><span data-dcnode-id="4986" instrument_node="">scene</span></th></tr></thead><tbody data-dcnode-id="4927"><tr class="valign-top" data-dcnode-id="4978"><td class="align-left" data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">culture</span></td><td class="align-left" data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">dragon dance, fireworks, Fu character, library, lion dance, red envelope, stage, Xi character</span></td></tr><tr class="valign-top" data-dcnode-id="4973"><td class="align-left" data-dcnode-id="4976"><span data-dcnode-id="4977" instrument_node="">entertainment</span></td><td class="align-left" data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">badminton court, bar, baseball court, billiard room, bowling alley, chess, football court, go, indoor basketball court, mahjong, ping-pong court, playground, swimming pool, tennis court</span></td></tr><tr class="valign-top" data-dcnode-id="4968"><td class="align-left" data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">food</span></td><td class="align-left" data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">dining room, food, McDonald's, restaurant</span></td></tr><tr class="valign-top" data-dcnode-id="4963"><td class="align-left" data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">insect and animal</span></td><td class="align-left" data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">bee, butterfly, camel, cat, deer, dog, dragonfly, elephant, giraffe, kangaroo, ladybug, leopard, lion, ornamental fish, panda, peacock, penguin, rabbit, rhinoceros, tiger, tortoise</span></td></tr><tr class="valign-top" data-dcnode-id="4958"><td class="align-left" data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">mountain</span></td><td class="align-left" data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">mountain</span></td></tr><tr class="valign-top" data-dcnode-id="4953"><td class="align-left" data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">natural phenomenon</span></td><td class="align-left" data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">night, overcast, snow, sunset, blue sky</span></td></tr><tr class="valign-top" data-dcnode-id="4948"><td class="align-left" data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">plant</span></td><td class="align-left" data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">fallen leaves, flower, green plant</span></td></tr><tr class="valign-top" data-dcnode-id="4943"><td class="align-left" data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">interpretation</span></td><td class="align-left" data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">map, text</span></td></tr><tr class="valign-top" data-dcnode-id="4938"><td class="align-left" data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">traffic</span></td><td class="align-left" data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">aircraft, bicycle, cabin, car, helicopter, in car, motorcycle, ship, station, train</span></td></tr><tr class="valign-top" data-dcnode-id="4933"><td class="align-left" data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">building</span></td><td class="align-left" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">cathedral hall, corridor, European buildings, Islamic buildings, old buildings, overlook, skyscraper, wide-angle tower, worksite</span></td></tr><tr class="valign-top" data-dcnode-id="4928"><td class="align-left" data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">water</span></td><td class="align-left" data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">beach, bridge, waterfall, waterside, water surface</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="4905" id="sec4.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4918" id="sectitle0085"><span data-dcnode-id="4921" instrument_node="">4.4</span><span data-dcnode-id="4920" instrument_node="">. </span><span data-dcnode-id="4919" instrument_node="">Tools for statistical and spatial analysis</span></h3><p data-dcnode-id="4916" id="p0165"><span data-dcnode-id="4917" instrument_node="">In this study, the tools of analysis of variance and hierarchical cluster analysis were used for statistical analysis, and fishnet and kernel density analysis in ArcGIS were used for spatial analysis.</span></p><p data-dcnode-id="4908" id="p0170"><span data-dcnode-id="4915" instrument_node="">ANOVA is a collection of statistical models developed by Ronald Fisher (</span><a class="workspace-trigger" data-dcnode-id="4913" href="#bib13" name="bbib13"><span data-dcnode-id="4914" instrument_node="">Fisher, 1921</span></a><span data-dcnode-id="4912" instrument_node="">), which could be used to analyze the differences among group means in a sample. This model provides a statistical test of whether the population means of several groups are similar and to what extent, and therefore generalizes the </span><em data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">t</span></em><span data-dcnode-id="4909" instrument_node="">-test to more than two groups. ANOVA is useful for comparing three or more group means for statistical significance. In this study, ANOVA aims to detect whether a statistic significance exists in tourists from different places of the world. Hierarchical clustering is a method of cluster analysis which seeks to build a hierarchy of clusters. The principle of this method is to define the similarity or distance between network nodes by a given network topology structure, and then use single-link hierarchical clustering or full-link hierarchical clustering to form a tree-like graph hierarchical structure of network nodes. With this tool, the similarities and divergence of tourists' behaviors and perceptions from different continents and countries/regions could be explored.</span></p><p data-dcnode-id="4906" id="p0175"><span data-dcnode-id="4907" instrument_node="">By using fishnet in ArcGIS, Beijing was divided into 5&nbsp;km * 5&nbsp;km grids, with matching the longitude and latitude attributes of photos, the place where the photos were shot could be located, and the number of photographs in each grid is counted. Through this process, the distribution of the tourists' footprints could be displayed. The kernel density analysis in ArcGIS could calculate the density of point elements around each output raster pixel, which is the best option for visualizing the aggregation characteristics of tourists' behavior and perception in Beijing.</span></p></section></section><section data-dcnode-id="4323" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4900" id="sectitle0090"><span data-dcnode-id="4903" instrument_node="">5</span><span data-dcnode-id="4902" instrument_node="">. </span><span data-dcnode-id="4901" instrument_node="">Result</span></h2><section data-dcnode-id="4448" id="sec5.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4896" id="sectitle0095"><span data-dcnode-id="4899" instrument_node="">5.1</span><span data-dcnode-id="4898" instrument_node="">. </span><span data-dcnode-id="4897" instrument_node="">Statistical analysis</span></h3><section data-dcnode-id="4831" id="sec5.1.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4892" id="sectitle0100"><span data-dcnode-id="4895" instrument_node="">5.1.1</span><span data-dcnode-id="4894" instrument_node="">. </span><span data-dcnode-id="4893" instrument_node="">Descriptive analysis</span></h4><div data-dcnode-id="4832"><p data-dcnode-id="4881" id="p0180"><span data-dcnode-id="4891" instrument_node="">According to the statistics, 35356 photos uploaded by 1075 tourists from 64 countries/regions and 6 continents (Asia, Europe, North America, Oceania, South America and Africa) are collected (</span><a class="workspace-trigger" data-dcnode-id="4889" href="#fig3" name="bfig3"><span data-dcnode-id="4890" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4888" instrument_node="">). The number of tourists and photos from North America (365/13728), Europe (443/12542), Asia (189/7205) and Oceania (47/1355) are relatively abundant, while South America (27/384) and Africa (5/143) have the least number of tourists and photos. Looking at the distribution in countries, as Flickr is most prevalent in the United States and Britain, these two countries hold the most significant number of tourists and photos comparing to other countries. Specifically, the United States ranked 1st place with 299 tourists and 11746 photos (</span><a class="workspace-trigger" data-dcnode-id="4886" href="#fig3" name="bfig3"><span data-dcnode-id="4887" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4885" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4883" href="#fig4" name="bfig4"><span data-dcnode-id="4884" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4882" instrument_node="">), which means each American tourist uploaded average 39 photos. As the total number of tourists in South America and Africa is too small, the statistical analysis is restricted within four continents: Asia, Europe, North America and Oceania. With the same reason, only 30 countries whose photos have exceeded 100 were selected as the subjects for this research.</span></p><figure class="figure text-xs" data-dcnode-id="4857" id="fig3"><span data-dcnode-id="4865"><img alt="Fig. 3" aria-describedby="cap0020" data-dcnode-id="4880" height="308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr3.jpg&amp;raw"><span data-dcnode-id="4879" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4866"><li data-dcnode-id="4873"><a class="anchor download-link u-font-sans" data-dcnode-id="4874" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr3_lrg.jpg" target="_blank" title="Download high-res image (341KB)"><span class="anchor-text" data-dcnode-id="4875"><span data-dcnode-id="4878" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">Download high-res image (341KB)</span></span></span></a></li><li data-dcnode-id="4867"><a class="anchor download-link u-font-sans" data-dcnode-id="4868" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261517719301384-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-
