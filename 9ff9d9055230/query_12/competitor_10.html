e travel itinerary. In the questionnaire, we provide participants with detailed introductions to 12 tourist destinations, which are either open or are currently under development in Zaolinwan Park. These tourist destinations are of different types and are located at different functional zones planned by the local planning agency. As such, they can represent the diversity of tourism programs planned in Zaolinwan Park.</span></p><p data-dcnode-id="5672"><span data-dcnode-id="5673" instrument_node="">Participants are asked to arrange their itinerary in two steps. Participants are first asked if they would like to spend one day or two days in the park. They then arrange their travel itinerary during each day of their visit. In particular, participants will choose tourism destinations that they would like to visit and indicate when they would like to enter the park (start the tourism activities of the day), the sequence of visiting different tourism destinations, and how much time they would like to spend at each of the destinations. Additional questions about the visitors themselves (i.e., their self-identified tourist category) are also asked to validate the tourist typologies collected from social media comments. Interviewers were trained on the importance of minimizing selection bias by asking every second or third tourist they met at the entry of the park. A total of 420 participants were recruited at Zaolinwan Park on four weekends. The face-to-face questionnaire approach yielded a relatively high response and completion rate, as 398 valid questionnaires (94.8 percent) were received. Among them, the majority were from Yangzhou and the nearest city Nanjing (61.06 percent), while 23.12 percent were from other cities of Jiangsu. The rest of the participants were from Zhejiang (6.28 percent), Shanghai (4.52 percent), Anhui (4.02 percent), and other provinces (1.01 percent). As Zaolinwan Park develops, we expect a large increase in the number of tourists from other cities in Jiangsu, Shanghai, Zhejiang, and Anhui.</span></p></div></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="5213" id="S003-S2002"><h3 class="section-heading-3" data-dcnode-id="5668" id="_i11"><span data-dcnode-id="5669" instrument_node="">Identifying Tourist Preferences</span></h3><p data-dcnode-id="5447"><span data-dcnode-id="5667" instrument_node="">Tourist classification is important for planning facilities and services at tourism destinations as the varying needs of all types of tourists should be met (Figueredo et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="5606"><a data-dcnode-id="5665" data-reflink="_i27" data-rid="CIT0015" href="#"><span data-dcnode-id="5666" instrument_node="">2017</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5607"><span class="ref-close" data-dcnode-id="5664" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5663"></span><span data-dcnode-id="5608"><span class="hlFld-ContribAuthor" data-dcnode-id="5659"><span class="NLM_given-names" data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">M.</span></span><span data-dcnode-id="5660" instrument_node=""> Figueredo</span></span><span data-dcnode-id="5658" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5654"><span class="NLM_given-names" data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">N.</span></span><span data-dcnode-id="5655" instrument_node=""> Cacho</span></span><span data-dcnode-id="5653" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5649"><span class="NLM_given-names" data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">A.</span></span><span data-dcnode-id="5650" instrument_node=""> Thome</span></span><span data-dcnode-id="5648" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5644"><span class="NLM_given-names" data-dcnode-id="5646"><span data-dcnode-id="5647" instrument_node="">A.</span></span><span data-dcnode-id="5645" instrument_node=""> Cacho</span></span><span data-dcnode-id="5643" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5639"><span class="NLM_given-names" data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">F.</span></span><span data-dcnode-id="5640" instrument_node=""> Lopes</span></span><span data-dcnode-id="5638" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5634"><span class="NLM_given-names" data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">M.</span></span><span data-dcnode-id="5635" instrument_node=""> Araujo</span></span><span data-dcnode-id="5633" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">Using Social Media Photos to Identify Tourism Preferences in Smart Tourism Destination</span></span><span data-dcnode-id="5630" instrument_node="">,” </span><i data-dcnode-id="5628"><span data-dcnode-id="5629" instrument_node="">Proceedings of IEEE International Conference on Big Data</span></i><span data-dcnode-id="5627" instrument_node=""> (</span><span class="NLM_year" data-dcnode-id="5625"><span data-dcnode-id="5626" instrument_node="">2017</span></span><span data-dcnode-id="5624" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5622"><span data-dcnode-id="5623" instrument_node="">4068</span></span><span data-dcnode-id="5621" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">4073</span></span><span data-dcnode-id="5618" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5609"><span data-dcnode-id="5617" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5614"><a data-dcnode-id="5615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0015%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1109%252FBigData.2017.8258423" target="_blank"><span data-dcnode-id="5616" instrument_node="">[Crossref]</span></a></span><span class="googleScholar-container" data-dcnode-id="5610"><span data-dcnode-id="5613" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2017%26pages%3D4068-4073%26author%3DM.%2BFigueredo%26author%3DN.%2BCacho%26author%3DA.%2BThome%26author%3DA.%2BCacho%26author%3DF.%2BLopes%26author%3DM.%2BAraujo%26title%3DUsing%2BSocial%2BMedia%2BPhotos%2Bto%2BIdentify%2BTourism%2BPreferences%2Bin%2BSmart%2BTourism%2BDestination" target="_blank"><span data-dcnode-id="5612" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5605" instrument_node="">). Understanding the preferences of different tourists will guide the planning, development, and management strategies for smart tourism (Figueredo et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="5544"><a data-dcnode-id="5603" data-reflink="_i27" data-rid="CIT0015" href="#"><span data-dcnode-id="5604" instrument_node="">2017</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5545"><span class="ref-close" data-dcnode-id="5602" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5601"></span><span data-dcnode-id="5546"><span class="hlFld-ContribAuthor" data-dcnode-id="5597"><span class="NLM_given-names" data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">M.</span></span><span data-dcnode-id="5598" instrument_node=""> Figueredo</span></span><span data-dcnode-id="5596" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5592"><span class="NLM_given-names" data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">N.</span></span><span data-dcn data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">R.</span></span><span data-dcnode-id="5491" instrument_node=""> Qiu</span></span><span data-dcnode-id="5489" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5485"><span class="NLM_given-names" data-dcnode-id="5487"><span data-dcnode-id="5488" instrument_node="">W.</span></span><span data-dcnode-id="5486" instrument_node=""> Xu</span></span><span data-dcnode-id="5484" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5480"><span class="NLM_given-names" data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">S.</span></span><span data-dcnode-id="5481" instrument_node=""> Li</span></span><span data-dcnode-id="5479" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">Agent-Based Modeling of the Spatial Diffusion of Tourist Flow: A Case Study of Sichuan, China</span></span><span data-dcnode-id="5476" instrument_node="">,” </span><i data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">Journal of China Tourism Research</span></i><span data-dcnode-id="5473" instrument_node=""> 12: 1 (</span><span class="NLM_year" data-dcnode-id="5471"><span data-dcnode-id="5472" instrument_node="">2016</span></span><span data-dcnode-id="5470" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5468"><span data-dcnode-id="5469" instrument_node="">85</span></span><span data-dcnode-id="5467" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5465"><span data-dcnode-id="5466" instrument_node="">107</span></span><span data-dcnode-id="5464" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5452"><span data-dcnode-id="5463" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5457"><a data-dcnode-id="5461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/19388160.2016.1160847" target="_blank"><span data-dcnode-id="5462" instrument_node="">[Taylor &amp; Francis Online]</span></a><span data-dcnode-id="5460" instrument_node="">, </span><a data-dcnode-id="5458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0037%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000452512700006" target="_blank"><span data-dcnode-id="5459" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5453"><span data-dcnode-id="5456" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D12%26publication_year%3D2016%26pages%3D85-107%26issue%3D1%26author%3DR.%2BQiu%26author%3DW.%2BXu%26author%3DS.%2BLi%26title%3DAgent-Based%2BModeling%2Bof%2Bthe%2BSpatial%2BDiffusion%2Bof%2BTourist%2BFlow%253A%2BA%2BCase%2BStudy%2Bof%2BSichuan%252C%2BChina" target="_blank"><span data-dcnode-id="5455" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5448" instrument_node="">).</span></p><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5309" id="S003-S2002-S3001"><h4 class="section-heading-4" data-dcnode-id="5445" id="_i12"><span data-dcnode-id="5446" instrument_node="">Detecting Tourist Preference Using Social Media</span></h4><p data-dcnode-id="5358"><span data-dcnode-id="5444" instrument_node="">Based on social media comments, we applied a topic modelling approach to identify tourists’ typologies and preferences by recognizing semantic patterns within the comment collections. Specifically, the Latent Dirichlet Allocation (LDA) was used considering its simple yet powerful nature (Adams and Janowicz, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5400"><a data-dcnode-id="5442" data-reflink="_i27" data-rid="CIT0001" href="#"><span data-dcnode-id="5443" instrument_node="">2015</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5401"><span class="ref-close" data-dcnode-id="5441" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5440"></span><span data-dcnode-id="5402"><span class="hlFld-ContribAuthor" data-dcnode-id="5436"><span class="NLM_given-names" data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">B.</span></span><span data-dcnode-id="5437" instrument_node=""> Adams</span></span><span data-dcnode-id="5435" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5431"><span class="NLM_given-names" data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">K.</span></span><span data-dcnode-id="5432" instrument_node=""> Janowicz</span></span><span data-dcnode-id="5430" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node="">Thematic Signatures for Cleansing and Enriching Place-Related Linked Data</span></span><span data-dcnode-id="5427" instrument_node="">,” </span><i data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">International Journal of Geographical Information Science</span></i><span data-dcnode-id="5424" instrument_node=""> 29: 4 (</span><span class="NLM_year" data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">2015</span></span><span data-dcnode-id="5421" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">556</span></span><span data-dcnode-id="5418" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">579</span></span><span data-dcnode-id="5415" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5403"><span data-dcnode-id="5414" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5408"><a data-dcnode-id="5412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/13658816.2014.989855" target="_blank"><span data-dcnode-id="5413" instrument_node="">[Taylor &amp; Francis Online]</span></a><span data-dcnode-id="5411" instrument_node="">, </span><a data-dcnode-id="5409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0001%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000355190200003" target="_blank"><span data-dcnode-id="5410" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5404"><span data-dcnode-id="5407" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D29%26publication_year%3D2015%26pages%3D556-579%26issue%3D4%26author%3DB.%2BAdams%26author%3DK.%2BJanowicz%26title%3DThematic%2BSignatures%2Bfor%2BCleansing%2Band%2BEnriching%2BPlace-Related%2BLinked%2BData" target="_blank"><span data-dcnode-id="5406" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5399" instrument_node="">; Blei, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5360"><a data-dcnode-id="5397" data-reflink="_i27" data-rid="CIT0005" href="#"><span data-dcnode-id="5398" instrument_node="">2012</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5361"><span class="ref-close" data-dcnode-id="5396" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5395"></span><span data-dcnode-id="5362"><span class="hlFld-ContribAuthor" data-dcnode-id="5391"><span class="NLM_given-names" data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">D. M.</span></span><span data-dcnode-id="5392" instrument_node=""> Blei</span></span><span data-dcnode-id="5390" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5388"><span data-dcnode-id="5389" instrument_node="">Introduction to Probabilistic Topic Modeling</span></span><span data-dcnode-id="5387" instrument_node="">,” </span><i data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">Communications of the ACM</span></i><span data-dcnode-id="5384" instrument_node=""> 55: 4 (</span><span class="NLM_year" data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">2012</span></span><span data-dcnode-id="5381" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">77</span></span><span data-dcnode-id="5378" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5376"><span data-dcnode-id="5377" instrument_node="">84</span></span><span data-dcnode-id="5375" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5363"><span data-dcnode-id="5374" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5368"><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0005%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1145%252F2133806.2133826" target="_blank"><span data-dcnode-id="5373" instrument_node="">[Crossref]</span></a><span data-dcnode-id="5371" instrument_node="">, </span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0005%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000302915000026" target="_blank"><span data-dcnode-id="5370" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5364"><span data-dcnode-id="5367" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D55%26publication_year%3D2012%26pages%3D77-84%26issue%3D4%26author%3DD.%2BM.%2BBlei%26title%3DIntroduction%2Bto%2BProbabilistic%2BTopic%2BModeling" target="_blank"><span data-dcnode-id="5366" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5359" instrument_node="">). Using the method, a set of latent sub-topics, each of which is associated with a list of keywords, will be identified. The meaning of the topics can then be interpreted based on the keywords.</span></p><p data-dcnode-id="5312"><span data-dcnode-id="5357" instrument_node="">Following Zhang and Feick (</span><span class="ref-lnk lazy-ref" data-dcnode-id="5314"><a data-dcnode-id="5355" data-reflink="_i27" data-rid="CIT0045" href="#"><span data-dcnode-id="5356" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5315"><span class="ref-close" data-dcnode-id="5354" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5353"></span><span data-dcnode-id="5316"><span class="hlFld-ContribAuthor" data-dcnode-id="5349"><span class="NLM_given-names" data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">S.</span></span><span data-dcnode-id="5350" instrument_node=""> Zhang</span></span><span data-dcnode-id="5348" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5344"><span class="NLM_given-names" data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">R.</span></span><span data-dcnode-id="5345" instrument_node=""> Feick</span></span><span data-dcnode-id="5343" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">Understanding Public Opinions from Geosocial Media</span></span><span data-dcnode-id="5340" instrument_node="">,” </span><i data-dcnode-id="5338"><span data-dcnode-id="5339" instrument_node="">ISPRS International Journal of Geo-Information</span></i><span data-dcnode-id="5337" instrument_node=""> 5: 6 (</span><span class="NLM_year" data-dcnode-id="5335"><span data-dcnode-id="5336" instrument_node="">2016</span></span><span data-dcnode-id="5334" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">74</span></span><span data-dcnode-id="5331" instrument_node="">. doi:</span><a data-dcnode-id="5329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/ijgi5060074"><span data-dcnode-id="5330" instrument_node="">https://doi.org/10.3390/ijgi5060074</span></a><span class="refLink-block" data-dcnode-id="5317"><span data-dcnode-id="5328" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5322"><a data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0045%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.3390%252Fijgi5060074" target="_blank"><span data-dcnode-id="5327" instrument_node="">[Crossref]</span></a><span data-dcnode-id="5325" instrument_node="">, </span><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0045%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000379861200001" target="_blank"><span data-dcnode-id="5324" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5318"><span data-dcnode-id="5321" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D5%26publication_year%3D2016%26pages%3D74%26issue%3D6%26author%3DS.%2BZhang%26author%3DR.%2BFeick%26title%3DUnderstanding%2BPublic%2BOpinions%2Bfrom%2BGeosocial%2BMedia%26doi%3D10.3390%252Fijgi5060074" target="_blank"><span data-dcnode-id="5320" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5313" instrument_node="">), this paper applies a hierarchical topic modelling approach in which texts are modelled as a topic hierarchy that is composed of various topic paths, so that the relationship among topics could be identified and more details in the text could be revealed. All of the social media comments are first considered as an entire corpus which is divided into a collection of sub-corpora by the LDA method. As a result, a set of topics (e.g., accommodation, food, and scenery attractions) could be identified. The same procedure is repeated for these sub-topics by reassigning the words in the corpus to a set of new corpora, until the number of messages the corpus contains is less than a minimum threshold. This recursive procedure is automated using Python scripting.</span></p><p data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Based on the topic hierarchy, the meaning of each topic is manually interpreted based on the keywords associated with the topic. Topics that are related to tourist typologies, popular activities or attractions, food and accommodation preferences are identified and the relationships among tourist typologies and tourist preferences are recognized based on the topic paths. In addition, the percentages of tourists in favor of different activities, food, and accommodation choices are calculated based on the portion of a sub-corpus that represents tourist preference shares to the sub-corpus that represents a tourist type.</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5214" id="S003-S2002-S3002"><h4 class="section-heading-4" data-dcnode-id="5307" id="_i13"><span data-dcnode-id="5308" instrument_node="">Identifying Aggregated Itineraries</span></h4><p data-dcnode-id="5215"><span data-dcnode-id="5306" instrument_node="">Understanding tourists’ itineraries is important for understanding visitor dynamics and their impacts on transportation, infrastructure, and sustainable tourism strategies, particularly in the context of multi-destination tourism (Connell and Page, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5262"><a data-dcnode-id="5304" data-reflink="_i27" data-rid="CIT0011" href="#"><span data-dcnode-id="5305" instrument_node="">2008</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5263"><span class="ref-close" data-dcnode-id="5303" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5302"></span><span data-dcnode-id="5264"><span class="hlFld-ContribAuthor" data-dcnode-id="5298"><span class="NLM_given-names" data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">J.</span></span><span data-dcnode-id="5299" instrument_node=""> Connell</span></span><span data-dcnode-id="5297" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5293"><span class="NLM_given-names" data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">S. J.</span></span><span data-dcnode-id="5294" instrument_node=""> Page</span></span><span data-dcnode-id="5292" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">Exploring the Spatial Patterns of Car-Based Tourist Travel in Loch Lomond and Trossachs National Park, Scotland</span></span><span data-dcnode-id="5289" instrument_node="">,” </span><i data-dcnode-id="5287"><span data-dcnode-id="5288" instrument_node="">Tourism Management</span></i><span data-dcnode-id="5286" instrument_node=""> 29: 3 (</span><span class="NLM_year" data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">2008</span></span><span data-dcnode-id="5283" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">561</span></span><span data-dcnode-id="5280" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">580</span></span><span data-dcnode-id="5277" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5265"><span data-dcnode-id="5276" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5270"><a data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0011%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.tourman.2007.03.019" target="_blank"><span data-dcnode-id="5275" instrument_node="">[Crossref]</span></a><span data-dcnode-id="5273" instrument_node="">, </span><a data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0011%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000253624500013" target="_blank"><span data-dcnode-id="5272" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5266"><span data-dcnode-id="5269" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D29%26publication_year%3D2008%26pages%3D561-580%26issue%3D3%26author%3DJ.%2BConnell%26author%3DS.%2BJ.%2BPage%26title%3DExploring%2Bthe%2BSpatial%2BPatterns%2Bof%2BCar-Based%2BTourist%2BTravel%2Bin%2BLoch%2BLomond%2Band%2BTrossachs%2BNational%2BPark%252C%2BScotland" target="_blank"><span data-dcnode-id="5268" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5261" instrument_node="">; Popp and McCole, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5217"><a data-dcnode-id="5259" data-reflink="_i27" data-rid="CIT0036" href="#"><span data-dcnode-id="5260" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5218"><span class="ref-close" data-dcnode-id="5258" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5257"></span><span data-dcnode-id="5219"><span class="hlFld-ContribAuthor" data-dcnode-id="5253"><span class="NLM_given-names" data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">L.</span></span><span data-dcnode-id="5254" instrument_node=""> Popp</span></span><span data-dcnode-id="5252" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5248"><span class="NLM_given-names" data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">D.</span></span><span data-dcnode-id="5249" instrument_node=""> McCole</span></span><span data-dcnode-id="5247" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">Understanding Tourists’ Itineraries in Emerging Rural Tourism Regions: The Application of Paper-Based Itinerary Mapping Methodology to a Wine Tourism Region in Michigan</span></span><span data-dcnode-id="5244" instrument_node="">,” </span><i data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">Current Issues in Tourism</span></i><span data-dcnode-id="5241" instrument_node=""> 19: 10 (</span><span class="NLM_year" data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">2016</span></span><span data-dcnode-id="5238" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">988</span></span><span data-dcnode-id="5235" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">1004</span></span><span data-dcnode-id="5232" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5220"><span data-dcnode-id="5231" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5225"><a data-dcnode-id="5229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/13683500.2014.942259" target="_blank"><span data-dcnode-id="5230" instrument_node="">[Taylor &amp; Francis Online]</span></a><span data-dcnode-id="5228" instrument_node="">, </span><a data-dcnode-id="5226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0036%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000378794900003" target="_blank"><span data-dcnode-id="5227" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5221"><span data-dcnode-id="5224" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D19%26publication_year%3D2016%26pages%3D988-1004%26issue%3D10%26author%3DL.%2BPopp%26author%3DD.%2BMcCole%26title%3DUnderstanding%2BTourists%25E2%2580%2599%2BItineraries%2Bin%2BEmerging%2BRural%2BTourism%2BRegions%3A%2BThe%2BApplication%2Bof%2BPaper-Based%2BItinerary%2BMapping%2BMethodology%2Bto%2Ba%2BWine%2BTourism%2BRegion%2Bin%2BMichigan" target="_blank"><span data-dcnode-id="5223" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5216" instrument_node="">). Based on the self-planned itineraries provided by respondents, we aggregate their itineraries using frequency analysis. Specifically, the percentage of tourists with different tourist types going to different tourism destinations at a particular time of day are calculated. For instance, if 50 participants of tourist Group 1 choose tourist destination A as their first destination choice, the percentage of the 50 participants takes up in the total number of tourists in Group 1 is calculated. As a result, a list that represents the likelihood of any type of tourist going to any destination at different times of the day are generated. Note that most tourism destinations in the park are quite time consuming. Therefore, we use one hour as a minimum time interval. Moreover, the agent-based model will focus on simulating tourists’ movements in one day. For participants who choose to pay a two-day visit to the park, their itinerary of the second day will be considered as a separate answer.</span></p></div></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4930" id="S003-S2003"><h3 class="section-heading-3" data-dcnode-id="5211" id="_i14"><span data-dcnode-id="5212" instrument_node="">Modelling the Decision-Making Procedure of Tourist Agents</span></h3><p data-dcnode-id="5206"><span data-dcnode-id="5210" instrument_node="">Based on the above analysis, tourist preferences are quantified by calculating the percentages of tourists in each tourist type choosing a particular tourism option (e.g., activities, a tourist destination, a particular type of food). These preferences are used as parameters in developing an agent-based model that simulates the decision-making processes of tourist agents following the procedure presented in </span><a data-dcnode-id="5208" href="#F0003"><span data-dcnode-id="5209" instrument_node="">Figure 3</span></a><span data-dcnode-id="5207" instrument_node="">. </span></p><div class="figure figureViewer" data-dcnode-id="5141" id="F0003"><div class="hidden figureViewerArticleInfo" data-dcnode-id="5154"><span class="figViewerTitle" data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node="">Coupling Social Media and Agent-Based Modelling: A Novel Approach for Supporting Smart Tourism Planning</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="5163"><div class="authorsHeading" data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="5164"><a class="entryAuthor" data-dcnode-id="5200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhang%252C%2BShanqi"><span class="hlFld-ContribAuthor" data-dcnode-id="5201"></span></a><a data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhang%252C%2BShanqi"><span class="NLM_given-names" data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">Shanqi</span></span><span data-dcnode-id="5197" instrument_node=""> Zhang</span></a><span data-dcnode-id="5195" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhen%252C%2BFeng"><span class="hlFld-ContribAuthor" data-dcnode-id="5194"></span></a><a data-dcnode-id="5189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhen%252C%2BFeng"><span class="NLM_given-names" data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">Feng</span></span><span data-dcnode-id="5190" instrument_node=""> Zhen</span></a><span data-dcnode-id="5188" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="5186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DWang%252C%2BBo"><span class="hlFld-ContribAuthor" data-dcnode-id="5187"></span></a><a data-dcnode-id="5182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Wang%252C%2BBo"><span class="NLM_given-names" data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">Bo</span></span><span data-dcnode-id="5183" instrument_node=""> Wang</span></a><span data-dcnode-id="5181" instrument_node=""> </span><a data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orcid.org/0000-0003-3877-4549"><img data-dcnode-id="5180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/templates/jsp/images/orcid.png&amp;raw"></a><span data-dcnode-id="5178" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="5176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DLi%252C%2BZherui"><span class="hlFld-ContribAuthor" data-dcnode-id="5177"></span></a><a data-dcnode-id="5172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Li%252C%2BZherui"><span class="NLM_given-names" data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">Zherui</span></span><span data-dcnode-id="5173" instrument_node=""> Li</span></a><span data-dcnode-id="5171" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="5169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DQin%252C%2BXiao"><span class="hlFld-ContribAuthor" data-dcnode-id="5170"></span></a><a data-dcnode-id="5165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Qin%252C%2BXiao"><span class="NLM_given-names" data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Xiao</span></span><span data-dcnode-id="5166" instrument_node=""> Qin</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="5155"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="5160"><a data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10630732.2020.1847987"><span data-dcnode-id="5162" instrument_node="">https://doi.org/10.1080/10630732.2020.1847987</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="5156"><h6 data-dcnode-id="5158"><span data-dcnode-id="5159" instrument_node="">Published online:</span></h6><span data-dcnode-id="5157" instrument_node="">07 December 2020</span></div></div></div><div class="figureThumbnailContainer" data-dcnode-id="5142"><div class="figureInfo" data-dcnode-id="5148"><div class="short-legend" data-dcnode-id="5149"><p class="captionText" data-dcnode-id="5150"><span class="captionLabel" data-dcnode-id="5152"><span data-dcnode-id="5153" instrument_node="">Figure 3. </span></span><span data-dcnode-id="5151" instrument_node=""> The flowchart of tourist agent decision-making</span></p></div></div><a aria-label="thumbnail image" class="thumbnail" data-dcnode-id="5146" href="#"><img data-dcnode-id="5147" data-src="{&quot;type&quot;:&quot;image&quot;,&quot;src&quot;:&quot;/na101/home/literatum/publisher/tandf/journals/content/cjut20/2022/cjut20.v029.i02/10630732.2020.1847987/20220526/images/medium/cjut_a_1847987_f0003_ob.jpg&quot;}" height="315" id="F0003image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1080&amp;raw" width="500"></a><div class="figureDownloadOptions" data-dcnode-id="5143"><a class="downloadBtn btn btn-sm" data-dcnode-id="5144" href="#" role="button"><span data-dcnode-id="5145" instrument_node="">Display full size</span></a></div></div></div><div class="hidden rs_skip" data-dcnode-id="5136" id="fig-description-F0003"><p class="captionText" data-dcnode-id="5137"><span class="captionLabel" data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">Figure 3. </span></span><span data-dcnode-id="5138" instrument_node=""> The flowchart of tourist agent decision-making</span></p></div><div class="hidden rs_skip" data-dcnode-id="5134" id="figureFootNote-F0003"><div class="figureFootNote-F0003" data-dcnode-id="5135"></div></div><p data-dcnode-id="5133"></p><p data-dcnode-id="5041"><span data-dcnode-id="5132" instrument_node="">Based on tourist typologies as identified from social media, </span><i data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">x</span></i><span data-dcnode-id="5129" instrument_node=""> types of tourist agents (</span><i data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">x</span></i><span data-dcnode-id="5126" instrument_node=""> is the number of different tourist categories) are defined in the model. When the model is initiated, tourist agents of each type are added to the model based on the predicted numbers of tourists and the proportion of each tourist type, as suggested by local planning agency. We then assign tourist destination choices based on the analysis results of tourists’ preferred activities and itineraries. Particularly, a Monte Carlo method is used following Berger and Schreinemachers (</span><span class="ref-lnk lazy-ref" data-dcnode-id="5085"><a data-dcnode-id="5124" data-reflink="_i27" data-rid="CIT0003" href="#"><span data-dcnode-id="5125" instrument_node="">2006</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5086"><span class="ref-close" data-dcnode-id="5123" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5122"></span><span data-dcnode-id="5087"><span class="hlFld-ContribAuthor" data-dcnode-id="5118"><span class="NLM_given-names" data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">T.</span></span><span data-dcnode-id="5119" instrument_node=""> Berger</span></span><span data-dcnode-id="5117" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5113"><span class="NLM_given-names" data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">P.</span></span><span data-dcnode-id="5114" instrument_node=""> Schreinemachers</span></span><span data-dcnode-id="5112" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5110"><span data-dcnode-id="5111" instrument_node="">Creating Agents and Landscapes for Multiagent Systems from Random Samples</span></span><span data-dcnode-id="5109" instrument_node="">,” </span><i data-dcnode-id="5107"><span data-dcnode-id="5108" instrument_node="">Ecology and Society</span></i><span data-dcnode-id="5106" instrument_node=""> 11: 2 (</span><span class="NLM_year" data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">2006</span></span><span data-dcnode-id="5103" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">19</span></span><span data-dcnode-id="5100" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5088"><span data-dcnode-id="5099" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5093"><a data-dcnode-id="5097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0003%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.5751%252FES-01736-110219" target="_blank"><span data-dcnode-id="5098" instrument_node="">[Crossref]</span></a><span data-dcnode-id="5096" instrument_node="">, </span><a data-dcnode-id="5094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0003%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000243280800019" target="_blank"><span data-dcnode-id="5095" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5089"><span data-dcnode-id="5092" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D11%26publication_year%3D2006%26pages%3D19%26issue%3D2%26author%3DT.%2BBerger%26author%3DP.%2BSchreinemachers%26title%3DCreating%2BAgents%2Band%2BLandscapes%2Bfor%2BMultiagent%2BSystems%2Bfrom%2BRandom%2BSamples" target="_blank"><span data-dcnode-id="5091" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5084" instrument_node="">) and Johnson and Sieber (</span><span class="ref-lnk lazy-ref" data-dcnode-id="5043"><a data-dcnode-id="5082" data-reflink="_i27" data-rid="CIT0023" href="#"><span data-dcnode-id="5083" instrument_node="">2011a</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5044"><span class="ref-close" data-dcnode-id="5081" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5080"></span><span data-dcnode-id="5045"><span class="hlFld-ContribAuthor" data-dcnode-id="5076"><span class="NLM_given-names" data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">P. A.</span></span><span data-dcnode-id="5077" instrument_node=""> Johnson</span></span><span data-dcnode-id="5075" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5071"><span class="NLM_given-names" data-dcnode-id="5073"><span data-dcnode-id="5074" instrument_node="">R. E.</span></span><span data-dcnode-id="5072" instrument_node=""> Sieber</span></span><span data-dcnode-id="5070" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">Negotiating Constraints to the Adoption of Agent-Based Modeling in Tourism Planning</span></span><span data-dcnode-id="5067" instrument_node="">,” </span><i data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">Environment and Planning B: Planning and Design</span></i><span data-dcnode-id="5064" instrument_node="">. 38: 2 (</span><span class="NLM_year" data-dcnode-id="5062"><span data-dcnode-id="5063" instrument_node="">2011a</span></span><span data-dcnode-id="5061" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5059"><span data-dcnode-id="5060" instrument_node="">307</span></span><span data-dcnode-id="5058" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5056"><span data-dcnode-id="5057" instrument_node="">321</span></span><span data-dcnode-id="5055" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5046"><span data-dcnode-id="5054" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5051"><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0023%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1068%252Fb36109" target="_blank"><span data-dcnode-id="5053" instrument_node="">[Crossref]</span></a></span><span class="googleScholar-container" data-dcnode-id="5047"><span data-dcnode-id="5050" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D38%26publication_year%3D2011a%26pages%3D307-321%26issue%3D2%26author%3DP.%2BA.%2BJohnson%26author%3DR.%2BE.%2BSieber%26title%3DNegotiating%2BConstraints%2Bto%2Bthe%2BAdoption%2Bof%2BAgent-Based%2BModeling%2Bin%2BTourism%2BPlanning" target="_blank"><span data-dcnode-id="5049" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5042" instrument_node="">).</span></p><p data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">The tourist agents’ first destinations are determined by the first destination selected by questionnaire participants. Based on the questionnaire, for each tourist type, the percentage of people choosing each tourism destination is calculated. For each tourist agent, a random integer between 0 and 100 is then drawn, and the first destination will be chosen accordingly. Note that although the tourism park only has one entrance now, more entrances from different directions of the park are planned to open. The park will also offer electric cars for sightseeing. The influence of distance from the park entrance to a tourist’s first destination is, therefore, not considered, as the first destination is also likely to be the one a tourist wants to visit the most. We also determine the tour time (i.e., the time a tourist agent would like to spend at a tourist destination), ending tour time, and whether the tourist agent will stay over at the park (i.e., if they would have a second day visit) for each tourist agent using the similar Monto Carlo method based on the planned itineraries identified from the questionnaire.</span></p><p data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">Once the tourist agent finishes the first destination, its next tour location will be determined by considering destination choices, activity preferences, and transportation factors. First, tourists’ preferred activities and tourism destinations, as identified by social media comments and questionnaire respectively, are grouped based on the characteristics of functional zones. Second, based on the destination and activity preferences, each tourist agent is assigned a preference by using a similar method for choosing the first destination. If a match under both destination and activity preferences is found based on the random integer drawn, the functional zone will be considered as a candidate location for the tourist agent’s next visit.</span></p><p data-dcnode-id="4935"><span data-dcnode-id="5036" instrument_node="">Transportation time is an important factor for tourists to determine their subsequent tourist locations (Qiu et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="4987"><a data-dcnode-id="5034" data-reflink="_i27" data-rid="CIT0037" href="#"><span data-dcnode-id="5035" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4988"><span class="ref-close" data-dcnode-id="5033" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5032"></span><span data-dcnode-id="4989"><span class="hlFld-ContribAuthor" data-dcnode-id="5028"><span class="NLM_given-names" data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">R.</span></span><span data-dcnode-id="5029" instrument_node=""> Qiu</span></span><span data-dcnode-id="5027" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5023"><span class="NLM_given-names" data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">W.</span></span><span data-dcnode-id="5024" instrument_node=""> Xu</span></span><span data-dcnode-id="5022" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5018"><span class="NLM_given-names" data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">S.</span></span><span data-dcnode-id="5019" instrument_node=""> Li</span></span><span data-dcnode-id="5017" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Agent-Based Modeling of the Spatial Diffusion of Tourist Flow: A Case Study of Sichuan, China</span></span><span data-dcnode-id="5014" instrument_node="">,” </span><i data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">Journal of China Tourism Research</span></i><span data-dcnode-id="5011" instrument_node=""> 12: 1 (</span><span class="NLM_year" data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">2016</span></span><span data-dcnode-id="5008" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">85</span></span><span data-dcnode-id="5005" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">107</span></span><span data-dcnode-id="5002" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4990"><span data-dcnode-id="5001" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4995"><a data-dcnode-id="4999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/19388160.2016.1160847" target="_blank"><span data-dcnode-id="5000" instrument_node="">[Taylor &amp; Francis Online]</span></a><span data-dcnode-id="4998" instrument_node="">, </span><a data-dcnode-id="4996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0037%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000452512700006" target="_blank"><span data-dcnode-id="4997" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="4991"><span data-dcnode-id="4994" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D12%26publication_year%3D2016%26pages%3D85-107%26issue%3D1%26author%3DR.%2BQiu%26author%3DW.%2BXu%26author%3DS.%2BLi%26title%3DAgent-Based%2BModeling%2Bof%2Bthe%2BSpatial%2BDiffusion%2Bof%2BTourist%2BFlow%253A%2BA%2BCase%2BStudy%2Bof%2BSichuan%252C%2BChina" target="_blank"><span data-dcnode-id="4993" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4986" instrument_node="">). Note that distance is not considered in the questionnaire, as a considerable portion of the tourism park is still under development and the planning programs are not finalized. Following Qiu et al. (</span><span class="ref-lnk lazy-ref" data-dcnode-id="4937"><a data-dcnode-id="4984" data-reflink="_i27" data-rid="CIT0037" href="#"><span data-dcnode-id="4985" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4938"><span class="ref-close" data-dcnode-id="4983" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4982"></span><span data-dcnode-id="4939"><span class="hlFld-ContribAuthor" data-dcnode-id="4978"><span class="NLM_given-names" data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">R.</span></span><span data-dcnode-id="4979" instrument_node=""> Qiu</span></span><span data-dcnode-id="4977" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4973"><span class="NLM_given-names" data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">W.</span></span><span data-dcnode-id="4974" instrument_node=""> Xu</span></span><span data-dcnode-id="4972" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="4968"><span class="NLM_given-names" data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">S.</span></span><span data-dcnode-id="4969" instrument_node=""> Li</span></span><span data-dcnode-id="4967" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">Agent-Based Modeling of the Spatial Diffusion of Tourist Flow: A Case Study of Sichuan, China</span></span><span data-dcnode-id="4964" instrument_node="">,” </span><i data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">Journal of China Tourism Research</span></i><span data-dcnode-id="4961" instrument_node=""> 12: 1 (</span><span class="NLM_year" data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">2016</span></span><span data-dcnode-id="4958" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">85</span></span><span data-dcnode-id="4955" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">107</span></span><span data-dcnode-id="4952" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4940"><span data-dcnode-id="4951" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4945"><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/19388160.2016.1160847" target="_blank"><span data-dcnode-id="4950" instrument_node="">[Taylor &amp; Francis Online]</span></a><span data-dcnode-id="4948" instrument_node="">, </span><a data-dcnode-id="4946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0037%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000452512700006" target="_blank"><span data-dcnode-id="4947" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="4941"><span data-dcnode-id="4944" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D12%26publication_year%3D2016%26pages%3D85-107%26issue%3D1%26author%3DR.%2BQiu%26author%3DW.%2BXu%26author%3DS.%2BLi%26title%3DAgent-Based%2BModeling%2Bof%2Bthe%2BSpatial%2BDiffusion%2Bof%2BTourist%2BFlow%253A%2BA%2BCase%2BStudy%2Bof%2BSichuan%252C%2BChina" target="_blank"><span data-dcnode-id="4943" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4936" instrument_node="">), we use a tourism utility function to evaluate the influence of the distance between the tourist agent’s current location and the next one. In particular, the utility function considers the ratio between tour time and transportation time. Here, the tour time is based on the time a tourist would like to spend at the destination as suggested by the questionnaire, and the transportation time is estimated based on the average speed of an electric car used for sightseeing. In the tourism park, some functional zones may partially share similar characteristics in terms of the activities they offer. We compare the utility function among different candidate zones and choose the one that has the largest utility value as the tourist agent’s next location. However, if only one candidate is available, the tourist agent will go to the only candidate zone nevertheless.</span></p><p data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">Considering that there are multiple tourism destinations within a functional zone, the importance of tourism destinations is pre-assigned by local planners. The likelihood of a tourist agent going to a tourism destination in a functional zone is randomly assigned, with the more important tourism destinations are more likely to be visited. Once the next visit location is determined, a path is chosen for the tourist agent by considering all the possibilities of going from the current location to the next one. Similarly, the major roads are given higher priority than alleys when assigning paths for the tourist agent.</span></p><p data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">Around noon time, tourists will likely have lunch. The tourist agent’s food preferences will be assigned based on analysis results of social media comments using the same Monto Carlo method. A lunch time between 1 hour to 1.5 hours is randomly assigned to the agent. The tourist agent will continue tour activity (i.e., continue the previous tour if it has not been finished or choose the new one if the previous one has ended) after lunch. The above procedure will be repeated until the ending time of the tourist agent is reached. If the tourist agent chooses to stay at the park, its accommodation preference is similarly assigned based on analysis results of social media comments.</span></p></div></div><div class="NLM_sec NLM_sec-type_results NLM_sec_level_1" data-dcnode-id="4440" id="S004"><h2 class="section-heading-2" data-dcnode-id="4927" id="_i16"><span data-dcnode-id="4928" instrument_node="">Results</span></h2><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4621" id="S004-S2001"><h3 class="section-heading-3" data-dcnode-id="4925" id="_i17"><span data-dcnode-id="4926" instrument_node="">Tourist Preference</span></h3><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="4920" id="S004-S2001-S3001"><h4 class="section-heading-4" data-dcnode-id="4923" id="_i18"><span data-dcnode-id="4924" instrument_node="">Classification of Tourists</span></h4><p data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">Four types of tourists are identified from online reviews using the method described. They are families with children (35.97 percent), students (6.31 percent), young workers (24.95 percent), and seniors (32.77 percent). To further validate the results, all the questionnaire participants were asked to self-identify if they belong to one of the aforementioned groups or not. As a result, only five participants (1.26 percent) considered themselves to belong to other groups, while 32.91 percent of the respondents identified themselves as families with children, 10.30 percent as students, 18.84 percent as young workers, and 36.18 percent as seniors. As such, we believe that the four tourist groups identified from online reviews are representative.</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="4846" id="S004-S2001-S3002"><h4 class="section-heading-4" data-dcnode-id="4918" id="_i19"><span data-dcnode-id="4919" instrument_node="">Popular Attractions</span></h4><p data-dcnode-id="4913"><span data-dcnode-id="4917" instrument_node="">The LDA method is used to identify what types of tourist sites attract tourists the most based on social media data. </span><button class="ref showTableEventRef" data-dcnode-id="4915" data-id="T0001"><span data-dcnode-id="4916" instrument_node="">Table 1</span></button><span data-dcnode-id="4914" instrument_node=""> shows top attractions for each tourist group. The results show that for young workers and students, sports related activities and attractions are of their most interest, activities such as go-karts, shooting, and paintball are particularly popular. For families with children, they prefer, not surprisingly, child-friendly activities (e.g., grape-picking) and places (e.g., forest park, historical sites, and museum). Senior tourists differently prefer agricultural and health related activities. The farms with planting lessons or spa with Chinese medicine are more popular among senior tourists. </span></p><div class="tableViewerArticleInfo hidden" data-dcnode-id="4861"><span class="figViewerTitle" data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">Coupling Social Media and Agent-Based Modelling: A Novel Approach for Supporting Smart Tourism Planning</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="4870"><div class="authorsHeading" data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="4871"><a class="entryAuthor" data-dcnode-id="4907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhang%252C%2BShanqi"><span class="hlFld-ContribAuthor" data-dcnode-id="4908"></span></a><a data-dcnode-id="4903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhang%252C%2BShanqi"><span class="NLM_given-names" data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">Shanqi</span></span><span data-dcnode-id="4904" instrument_node=""> Zhang</span></a><span data-dcnode-id="4902" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhen%252C%2BFeng"><span class="hlFld-ContribAuthor" data-dcnode-id="4901"></span></a><a data-dcnode-id="4896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhen%252C%2BFeng"><span class="NLM_given-names" data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">Feng</span></span><span data-dcnode-id="4897" instrument_node=""> Zhen</span></a><span data-dcnode-id="4895" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DWang%252C%2BBo"><span class="hlFld-ContribAuthor" data-dcnode-id="4894"></span></a><a data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Wang%252C%2BBo"><span class="NLM_given-names" data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">Bo</span></span><span data-dcnode-id="4890" instrument_node=""> Wang</span></a><span data-dcnode-id="4888" instrument_node=""> </span><a data-dcnode-id="4886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orcid.org/0000-0003-3877-4549"><img data-dcnode-id="4887" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/templates/jsp/images/orcid.png&amp;raw"></a><span data-dcnode-id="4885" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DLi%252C%2BZherui"><span class="hlFld-ContribAuthor" data-dcnode-id="4884"></span></a><a data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Li%252C%2BZherui"><span class="NLM_given-names" data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">Zherui</span></span><span data-dcnode-id="4880" instrument_node=""> Li</span></a><span data-dcnode-id="4878" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="4876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DQi
