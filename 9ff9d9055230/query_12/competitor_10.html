</span><article class="article" data-dcnode-id="1205"><span data-dcnode-id="7929" instrument_node="">
</span><p class="fulltext" data-dcnode-id="7928"></p><div class="hlFld-Abstract" data-dcnode-id="7917"><p class="fulltext" data-dcnode-id="7927"></p><div class="sectionInfo abstractSectionHeading" data-dcnode-id="7924"><h2 class="section-heading-2" data-dcnode-id="7925" id="abstract"><span data-dcnode-id="7926" instrument_node="">ABSTRACT</span></h2></div><div class="abstractSection abstractInFull" data-dcnode-id="7918"><p class="summary-title" data-dcnode-id="7921"><b data-dcnode-id="7922"><span data-dcnode-id="7923" instrument_node="">ABSTRACT</span></b></p><p data-dcnode-id="7919"><span data-dcnode-id="7920" instrument_node="">Accounting for tourists’ various needs, preferences, and behavioral patterns is critical for improved smart tourism planning. This paper presents a novel approach that integrates social media and agent-based modelling (ABM) to analyze tourist preference and simulate tourist decision-making. The proposed approach first uses social media to extract knowledge about tourist typologies and tourist preferences. The knowledge, together with that supplemented by questionnaire data, is used for developing an ABM that simulates tourist movements. The approach is applied for the planning of Zaolinwan Park in China. The case study suggests that the incorporation of social media could provide opportunities for an enriched understanding of tourist preference of potential customers and that the modelling of tourist movements can shed light on the planning of infrastructure (e.g., roads and alleys) and service facilities (e.g., food, shopping, and accommodation), which are essential to the functioning of tourism. While this study focuses on tourism planning, the presented method could be applied to other infrastructure and service planning scenarios at community and urban levels.</span></p></div></div><div class="abstractKeywords" data-dcnode-id="7902"><div class="hlFld-KeywordText" data-dcnode-id="7903"><div data-dcnode-id="7904"><p aria-label="Keywords" 0732.2020.1847987%26key%3D000390065800001" target="_blank"><span data-dcnode-id="7788" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="7782"><span data-dcnode-id="7785" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="7783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D56%26publication_year%3D2017%26pages%3D3-15%26issue%3D1%26author%3DS.%2BNicholls%26author%3DB.%2BAmelung%26author%3DJ.%2BStudent%26title%3DAgent-Based%2BModeling%253A%2BA%2BPowerful%2BTool%2Bfor%2BTourism%2BResearchers" target="_blank"><span data-dcnode-id="7784" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="7777" instrument_node="">). Developments in computed-based approaches, planning support systems (PSS) in particular, provide a valuable approach to understanding tourism-related phenomenon and support decision-making of tourism destination development (Campagna et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="7710"><a data-dcnode-id="7775" data-reflink="_i27" data-rid="CIT0008" href="#"><span data-dcnode-id="7776" instrument_node="">2015</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="7711"><span class="ref-close" data-dcnode-id="7774" tabindex="0"></span><span class="ref-icon" data-dcnode-id="7773"></span><span data-dcnode-id="7712"><span class="hlFld-ContribAuthor" data-dcnode-id="7769"><span class="NLM_given-names" data-dcnode-id="7771"><span data-dcnode-id="7772" instrument_node="">M.</span></span><span data-dcnode-id="7770" instrument_node=""> Campagna</span></span><span data-dcnode-id="7768" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="7764"><span class="NLM_given-names" data-dcnode-id="7766"><span data-dcnode-id="7767" instrument_node="">R.</span></span><span data-dcnode-id="7765" instrument_nod -dcnode-id="6497" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6490" instrument_node="">; Zhang and Feick, </span><span class="ref-lnk lazy-ref" data-dcnode-id="6447"><a data-dcnode-id="6488" data-reflink="_i27" data-rid="CIT0045" href="#"><span data-dcnode-id="6489" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6448"><span class="ref-close" data-dcnode-id="6487" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6486"></span><span data-dcnode-id="6449"><span class="hlFld-ContribAuthor" data-dcnode-id="6482"><span class="NLM_given-names" data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">S.</span></span><span data-dcnode-id="6483" instrument_node=""> Zhang</span></span><span data-dcnode-id="6481" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="6477"><span class="NLM_given-names" data-dcnode-id="6479"><span data-dcnode-id="6480" instrument_node="">R.</span></span><span data-dcnode-id="6478" instrument_node=""> Feick</span></span><span data-dcnode-id="6476" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="6474"><span data-dcnode-id="6475" instrument_node="">Understanding Public Opinions from Geosocial Media</span></span><span data-dcnode-id="6473" instrument_node="">,” </span><i data-dcnode-id="6471"><span data-dcnode-id="6472" instrument_node="">ISPRS International Journal of Geo-Information</span></i><span data-dcnode-id="6470" instrument_node=""> 5: 6 (</span><span class="NLM_year" data-dcnode-id="6468"><span data-dcnode-id="6469" instrument_node="">2016</span></span><span data-dcnode-id="6467" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6465"><span data-dcnode-id="6466" instrument_node="">74</span></span><span data-dcnode-id="6464" instrument_node="">. doi:</span><a data-dcnode-id="6462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/ijgi5060074"><span data-dcnode-id="6463" instrument_node="">https://doi.org/10.3390/ijgi5060074</span></a><span class="refLink-block" data-dcnode-id="6450"><span data-dcnode-id="6461" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6455"><a data-dcnode-id="6459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0045%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.3390%252Fijgi5060074" target="_blank"><span data-dcnode-id="6460" instrument_node="">[Crossref]</span></a><span data-dcnode-id="6458" instrument_node="">, </span><a data-dcnode-id="6456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0045%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000379861200001" target="_blank"><span data-dcnode-id="6457" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="6451"><span data-dcnode-id="6454" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D5%26publication_year%3D2016%26pages%3D74%26issue%3D6%26author%3DS.%2BZhang%26author%3DR.%2BFeick%26title%3DUnderstanding%2BPublic%2BOpinions%2Bfrom%2BGeosocial%2BMedia%26doi%3D10.3390%252Fijgi5060074" target="_blank"><span data-dcnode-id="6453" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6446" instrument_node="">).</span></p><p data-dcnode-id="6242"><span data-dcnode-id="6444" instrument_node="">Despite the acknowledgement of the value of social media, relatively few researchers have integrated social media with ABM to support decision-making of tourism planning. The challenges may come from several directions. First, ABM often requires detailed information regarding tourist decision-making to simulate individual-based processes. While studies have developed methods to acquire insights into tourism activities using social media, they often focus on a specific aspect. Few have presented a coherent workflow for extracting tourism-related knowledge that could support the development of ABM. Second, social media data often lack information regarding an individuals’ socioeconomic characteristics (e.g., age and gender). This information, however, is important for supporting tourism planning as different types or compositions of tourists often have diverse needs and preferences and result in varying decision-making procedures (Nicholls et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="6395"><a data-dcnode-id="6442" data-reflink="_i27" data-rid="CIT0032" href="#"><span data-dcnode-id="6443" instrument_node="">2017</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6396"><span class="ref-close" data-dcnode-id="6441" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6440"></span><span data-dcnode-id="6397"><span class="hlFld-ContribAuthor" data-dcnode-id="6436"><span class="NLM_given-names" data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">S.</span></span><span data-dcnode-id="6437" instrument_node=""> Nicholls</span></span><span data-dcnode-id="6435" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6431"><span class="NLM_given-names" data-dcnode-id="6433"><span data-dcnode-id="6434" instrument_node="">B.</span></span><span data-dcnode-id="6432" instrument_node=""> Amelung</span></span><span data-dcnode-id="6430" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="6426"><span class="NLM_given-names" data-dcnode-id="6428"><span data-dcnode-id="6429" instrument_node="">J.</span></span><span data-dcnode-id="6427" instrument_node=""> Student</span></span><span data-dcnode-id="6425" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="6423"><span data-dcnode-id="6424" instrument_node="">Agent-Based Modeling: A Powerful Tool for Tourism Researchers</span></span><span data-dcnode-id="6422" instrument_node="">,” </span><i data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">Journal of Travel Research</span></i><span data-dcnode-id="6419" instrument_node=""> 56: 1 (</span><span class="NLM_year" data-dcnode-id="6417"><span data-dcnode-id="6418" instrument_node="">2017</span></span><span data-dcnode-id="6416" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6414"><span data-dcnode-id="6415" instrument_node="">3</span></span><span data-dcnode-id="6413" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">15</span></span><span data-dcnode-id="6410" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6398"><span data-dcnode-id="6409" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6403"><a data-dcnode-id="6407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0032%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1177%252F0047287515620490" target="_blank"><span data-dcnode-id="6408" instrument_node="">[Crossref]</span></a><span data-dcnode-id="6406" instrument_node="">, </span><a data-dcnode-id="6404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0032%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000390065800001" target="_blank"><span data-dcnode-id="6405" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="6399"><span data-dcnode-id="6402" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D56%26publication_year%3D2017%26pages%3D3-15%26issue%3D1%26author%3DS.%2BNicholls%26author%3DB.%2BAmelung%26author%3DJ.%2BStudent%26title%3DAgent-Based%2BModeling%253A%2BA%2BPowerful%2BTool%2Bfor%2BTourism%2BResearchers" target="_blank"><span data-dcnode-id="6401" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6394" instrument_node="">). Third, issues of accuracy and credibility are persistent challenges of using social media for formal decision-making and tourism studies (Heikinheimo et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="6333"><a data-dcnode-id="6392" data-reflink="_i27" data-rid="CIT0020" href="#"><span data-dcnode-id="6393" instrument_node="">2017</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6334"><span class="ref-close" data-dcnode-id="6391" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6390"></span><span data-dcnode-id="6335"><span class="hlFld-ContribAuthor" data-dcnode-id="6386"><span class="NLM_given-names" data-dcnode-id="6388"><span data-dcnode-id="6389" instrument_node="">V.</span></span><span data-dcnode-id="6387" instrument_node=""> Heikinheimo</span></span><span data-dcnode-id="6385" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6381"><span class="NLM_given-names" data-dcnode-id="6383"><span data-dcnode-id="6384" instrument_node="">E. D.</span></span><span data-dcnode-id="6382" instrument_node=""> Minin</span></span><span data-dcnode-id="6380" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6376"><span class="NLM_given-names" data-dcnode-id="6378"><span data-dcnode-id="6379" instrument_node="">H.</span></span><span data-dcnode-id="6377" instrument_node=""> Tenkanen</span></span><span data-dcnode-id="6375" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6371"><span class="NLM_given-names" data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">A.</span></span><span data-dcnode-id="6372" instrument_node=""> Hausmann</span></span><span data-dcnode-id="6370" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6366"><span class="NLM_given-names" data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">J.</span></span><span data-dcnode-id="6367" instrument_node=""> Erkkonen</span></span><span data-dcnode-id="6365" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="6361"><span class="NLM_given-names" data-dcnode-id="6363"><span data-dcnode-id="6364" instrument_node="">T.</span></span><span data-dcnode-id="6362" instrument_node=""> Toivonen</span></span><span data-dcnode-id="6360" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="6358"><span data-dcnode-id="6359" instrument_node="">User-Generated Geographic Information for Visitor Monitoring in a National Park: A Comparison of Social Media Data and Visitor Survey</span></span><span data-dcnode-id="6357" instrument_node="">,” </span><i data-dcnode-id="6355"><span data-dcnode-id="6356" instrument_node="">ISPRS International Journal of Geo-Information</span></i><span data-dcnode-id="6354" instrument_node=""> 6: 3 (</span><span class="NLM_year" data-dcnode-id="6352"><span data-dcnode-id="6353" instrument_node="">2017</span></span><span data-dcnode-id="6351" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6349"><span data-dcnode-id="6350" instrument_node="">85</span></span><span data-dcnode-id="6348" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6336"><span data-dcnode-id="6347" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6341"><a data-dcnode-id="6345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0020%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.3390%252Fijgi6030085" target="_blank"><span data-dcnode-id="6346" instrument_node="">[Crossref]</span></a><span data-dcnode-id="6344" instrument_node="">, </span><a data-dcnode-id="6342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0020%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000398732200028" target="_blank"><span data-dcnode-id="6343" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="6337"><span data-dcnode-id="6340" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D6%26publication_year%3D2017%26pages%3D85%26issue%3D3%26author%3DV.%2BHeikinheimo%26author%3DE.%2BD.%2BMinin%26author%3DH.%2BTenkanen%26author%3DA.%2BHausmann%26author%3DJ.%2BErkkonen%26author%3DT.%2BToivonen%26title%3DUser-Generated%2BGeographic%2BInformation%2Bfor%2BVisitor%2BMonitoring%2Bin%2Ba%2BNational%2BPark%253A%2BA%2BComparison%2Bof%2BSocial%2BMedia%2BData%2Band%2BVisitor%2BSurvey" target="_blank"><span data-dcnode-id="6339" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6332" instrument_node="">). How to validate social media knowledge and approve its fitness for use remain to be further studied (Wang et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="6281"><a data-dcnode-id="6330" data-reflink="_i27" data-rid="CIT0040" href="#"><span data-dcnode-id="6331" instrument_node="">2020</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6282"><span class="ref-close" data-dcnode-id="6329" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6328"></span><span data-dcnode-id="6283"><span class="hlFld-ContribAuthor" data-dcnode-id="6324"><span class="NLM_given-names" data-dcnode-id="6326"><span data-dcnode-id="6327" instrument_node="">B.</span></span><span data-dcnode-id="6325" instrument_node=""> Wang</span></span><span data-dcnode-id="6323" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6319"><span class="NLM_given-names" data-dcnode-id="6321"><span data-dcnode-id="6322" instrument_node="">B. P. Y.</span></span><span data-dcnode-id="6320" instrument_node=""> Loo</span></span><span data-dcnode-id="6318" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6314"><span class="NLM_given-names" data-dcnode-id="6316"><span data-dcnode-id="6317" instrument_node="">F.</span></span><span data-dcnode-id="6315" instrument_node=""> Zhen</span></span><span data-dcnode-id="6313" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="6309"><span class="NLM_given-names" data-dcnode-id="6311"><span data-dcnode-id="6312" instrument_node="">G. L.</span></span><span data-dcnode-id="6310" instrument_node=""> Xi</span></span><span data-dcnode-id="6308" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="6306"><span data-dcnode-id="6307" instrument_node="">Urban Resilience from the Lens of Social Media Data: Responses to Urban Flooding in Nanjing, China</span></span><span data-dcnode-id="6305" instrument_node="">,” </span><i data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">Cities</span></i><span data-dcnode-id="6302" instrument_node=""> 106 (</span><span class="NLM_year" data-dcnode-id="6300"><span data-dcnode-id="6301" instrument_node="">2020</span></span><span data-dcnode-id="6299" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6297"><span data-dcnode-id="6298" instrument_node="">102884</span></span><span data-dcnode-id="6296" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6284"><span data-dcnode-id="6295" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6289"><a data-dcnode-id="6293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0040%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.cities.2020.102884" target="_blank"><span data-dcnode-id="6294" instrument_node="">[Crossref]</span></a><span data-dcnode-id="6292" instrument_node="">, </span><a data-dcnode-id="6290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0040%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000576636800001" target="_blank"><span data-dcnode-id="6291" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="6285"><span data-dcnode-id="6288" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D106%26publication_year%3D2020%26pages%3D102884%26author%3DB.%2BWang%26author%3DB.%2BP.%2BY.%2BLoo%26author%3DF.%2BZhen%26author%3DG.%2BL.%2BXi%26title%3DUrban%2BResilience%2Bfrom%2Bthe%2BLens%2Bof%2BSocial%2BMedia%2BData%253A%2BResponses%2Bto%2BUrban%2BFlooding%2Bin%2BNanjing%252C%2BChina" target="_blank"><span data-dcnode-id="6287" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6280" instrument_node="">; Zhang, </span><span class="ref-lnk lazy-ref" data-dcnode-id="6244"><a data-dcnode-id="6278" data-reflink="_i27" data-rid="CIT0044" href="#"><span data-dcnode-id="6279" instrument_node="">2019</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6245"><span class="ref-close" data-dcnode-id="6277" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6276"></span><span data-dcnode-id="6246"><span class="hlFld-ContribAuthor" data-dcnode-id="6272"><span class="NLM_given-names" data-dcnode-id="6274"><span data-dcnode-id="6275" instrument_node="">S.</span></span><span data-dcnode-id="6273" instrument_node=""> Zhang</span></span><span data-dcnode-id="6271" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="6269"><span data-dcnode-id="6270" instrument_node="">Public Participation in the Geoweb Era : Geosocial Media Use in Local Government</span></span><span data-dcnode-id="6268" instrument_node="">,” </span><i data-dcnode-id="6266"><span data-dcnode-id="6267" instrument_node="">Cities</span></i><span data-dcnode-id="6265" instrument_node=""> 85 (</span><span class="NLM_year" data-dcnode-id="6263"><span data-dcnode-id="6264" instrument_node="">2019</span></span><span data-dcnode-id="6262" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">38</span></span><span data-dcnode-id="6259" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">50</span></span><span data-dcnode-id="6256" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6247"><span data-dcnode-id="6255" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6252"><a data-dcnode-id="6253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0044%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.cities.2018.12.004" target="_blank"><span data-dcnode-id="6254" instrument_node="">[Crossref]</span></a></span><span class="googleScholar-container" data-dcnode-id="6248"><span data-dcnode-id="6251" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D85%26publication_year%3D2019%26pages%3D38-50%26author%3DS.%2BZhang%26title%3DPublic%2BParticipation%2Bin%2Bthe%2BGeoweb%2BEra%25E2%2580%25AF%3A%2BGeosocial%2BMedia%2BUse%2Bin%2BLocal%2BGovernment" target="_blank"><span data-dcnode-id="6250" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6243" instrument_node="">).</span></p><p data-dcnode-id="6240"><span data-dcnode-id="6241" instrument_node="">This study aims to address some of these challenges by developing an integrated approach that combines social media data and agent-based modelling. The proposed approach consists of two parts: it first classifies tourists and analyzes tourist preferences, particularly regarding sites of interest and potential itineraries tourists might take, using online reviews obtained from several social media sites and supplementary questionnaires collected from local tourists. Second, based on the identified preferences, an agent-based model is designed to simulate the movement patterns of tourists, concerning different decision-making procedures of different types of tourists. The proposed method can shed light on developing strategies for planning infrastructure (e.g., roads and alleys) and service facilities (e.g., food and accommodation), which are essential for the functioning of tourism. The proposed method is applied for the planning of Zaolinwan Park in China. Using the proposed method, tourist distributions at tourist sites and population flows among tourist sites at different times of the day can be simulated. The results can provide support for further decision-making by planners and local authorities.</span></p><p data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">After offering background information about the planning of Zaolinwan Park, we describe our data and methods. Then the analysis and modelling results are presented. Finally, we conclude with a discussion on the advantages of integrating social media with PSS for decision-making in tourism planning and on the challenges of practicing the proposed approach that should be addressed in future studies.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5964" id="S002"><h2 class="section-heading-2" data-dcnode-id="6235" id="_i4"><span data-dcnode-id="6236" instrument_node="">Background Information</span></h2><p data-dcnode-id="6040"><span data-dcnode-id="6234" instrument_node="">Zaolinwan is located in the City of Yizheng, a county-level city in the City of Yangzhou, Jiangsu province, China (See </span><a data-dcnode-id="6232" href="#F0001"><span data-dcnode-id="6233" instrument_node="">Figure 1</span></a><span data-dcnode-id="6231" instrument_node="">). Due to its rich agricultural resources and pleasant natural environment, Zaolinwan hosted the 2018 Jiangsu Horticultural Exhibition and will hold the 2021 World Horticultural Expo. The local government intended to take the two events as opportunities for developing the tourism industry in the area based on several considerations. First, in recent years, agritourism, including farmers’ markets, non-profit agricultural tours, rural resorts, and other leisure and hospitality businesses, has received increasing attention in China and attracted visitors to the countryside (Yang, </span><span class="ref-lnk lazy-ref" data-dcnode-id="6195"><a data-dcnode-id="6229" data-reflink="_i27" data-rid="CIT0043" href="#"><span data-dcnode-id="6230" instrument_node="">2012</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6196"><span class="ref-close" data-dcnode-id="6228" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6227"></span><span data-dcnode-id="6197"><span class="hlFld-ContribAuthor" data-dcnode-id="6223"><span class="NLM_given-names" data-dcnode-id="6225"><span data-dcnode-id="6226" instrument_node="">L.</span></span><span data-dcnode-id="6224" instrument_node=""> Yang</span></span><span data-dcnode-id="6222" instrument_node="">. “</span><span class="NLM_article-title" data-dcnode-id="6220"><span data-dcnode-id="6221" instrument_node="">Impacts and Challenges in Agritourism Development in Yunnan, China</span></span><span data-dcnode-id="6219" instrument_node="">,” </span><i data-dcnode-id="6217"><span data-dcnode-id="6218" instrument_node="">Tourism Planning &amp; Development</span></i><span data-dcnode-id="6216" instrument_node=""> 9: 4 (</span><span class="NLM_year" data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">2012</span></span><span data-dcnode-id="6213" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">369</span></span><span data-dcnode-id="6210" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">381</span></span><span data-dcnode-id="6207" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6198"><span data-dcnode-id="6206" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6203"><a data-dcnode-id="6204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/21568316.2012.726257" target="_blank"><span data-dcnode-id="6205" instrument_node="">[Taylor &amp; Francis Online]</span></a></span><span class="googleScholar-container" data-dcnode-id="6199"><span data-dcnode-id="6202" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D9%26publication_year%3D2012%26pages%3D369-381%26issue%3D4%26author%3DL.%2BYang%26title%3DImpacts%2Band%2BChallenges%2Bin%2BAgritourism%2BDevelopment%2Bin%2BYunnan%252C%2BChina" target="_blank"><span data-dcnode-id="6201" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6194" instrument_node="">). The abundant agricultural activities, particularly tea production, ecological farming, and seedling planting in the local area has provided a suitable environment for developing agritourism. Second, because of an aging population with an improved socioeconomic status, senior tourism is quickly developing in China. Seniors have become a prime tourist segment, as they have fewer time constraints to travel and have fewer financial commitments compared with younger adults (Gu et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="6132"><a data-dcnode-id="6192" data-reflink="_i27" data-rid="CIT0018" href="#"><span data-dcnode-id="6193" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6133"><span class="ref-close" data-dcnode-id="6191" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6190"></span><span data-dcnode-id="6134"><span class="hlFld-ContribAuthor" data-dcnode-id="6186"><span class="NLM_given-names" data-dcnode-id="6188"><span data-dcnode-id="6189" instrument_node="">D.</span></span><span data-dcnode-id="6187" instrument_node=""> Gu</span></span><span data-dcnode-id="6185" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6181"><span class="NLM_given-names" data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">H.</span></span><span data-dcnode-id="6182" instrument_node=""> Zhu</span></span><span data-dcnode-id="6180" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6176"><span class="NLM_given-names" data-dcnode-id="6178"><span data-dcnode-id="6179" instrument_node="">T.</span></span><span data-dcnode-id="6177" instrument_node=""> Brown</span></span><span data-dcnode-id="6175" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="6171"><span class="NLM_given-names" data-dcnode-id="6173"><span data-dcnode-id="6174" instrument_node="">H.</span></span><span data-dcnode-id="6172" instrument_node=""> Hoenig</span></span><span data-dcnode-id="6170" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="6166"><span class="NLM_given-names" data-dcnode-id="6168"><span data-dcnode-id="6169" instrument_node="">Y.</span></span><span data-dcnode-id="6167" instrument_node=""> Zeng</span></span><span data-dcnode-id="6165" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="6163"><span data-dcnode-id="6164" instrument_node="">Tourism Experiences and Self-Rated Health among Older Adults in China</span></span><span data-dcnode-id="6162" instrument_node="">,” </span><i data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">Journal of Aging and Health</span></i><span data-dcnode-id="6159" instrument_node=""> 28: 4 (</span><span class="NLM_year" data-dcnode-id="6157"><span data-dcnode-id="6158" instrument_node="">2016</span></span><span data-dcnode-id="6156" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">675</span></span><span data-dcnode-id="6153" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">703</span></span><span data-dcnode-id="6150" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6135"><span data-dcnode-id="6149" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6140"><a data-dcnode-id="6147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0018%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1177%252F0898264315609906" target="_blank"><span data-dcnode-id="6148" instrument_node="">[Crossref]</span></a><span data-dcnode-id="6146" instrument_node="">, </span><a data-dcnode-id="6144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0018%26dbid%3D8%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D26486781" target="_blank"><span data-dcnode-id="6145" instrument_node="">[PubMed]</span></a><span data-dcnode-id="6143" instrument_node="">, </span><a data-dcnode-id="6141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0018%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000375714700007" target="_blank"><span data-dcnode-id="6142" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="6136"><span data-dcnode-id="6139" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D28%26publication_year%3D2016%26pages%3D675-703%26issue%3D4%26author%3DD.%2BGu%26author%3DH.%2BZhu%26author%3DT.%2BBrown%26author%3DH.%2BHoenig%26author%3DY.%2BZeng%26title%3DTourism%2BExperiences%2Band%2BSelf-Rated%2BHealth%2Bamong%2BOlder%2BAdults%2Bin%2BChina" target="_blank"><span data-dcnode-id="6138" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6131" instrument_node="">; Patterson and Balderas, </span><span class="ref-lnk lazy-ref" data-dcnode-id="6087"><a data-dcnode-id="6129" data-reflink="_i27" data-rid="CIT0034" href="#"><span data-dcnode-id="6130" instrument_node="">2020</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6088"><span class="ref-close" data-dcnode-id="6128" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6127"></span><span data-dcnode-id="6089"><span class="hlFld-ContribAuthor" data-dcnode-id="6123"><span class="NLM_given-names" data-dcnode-id="6125"><span data-dcnode-id="6126" instrument_node="">I.</span></span><span data-dcnode-id="6124" instrument_node=""> Patterson</span></span><span data-dcnode-id="6122" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="6118"><span class="NLM_given-names" data-dcnode-id="6120"><span data-dcnode-id="6121" instrument_node="">A.</span></span><span data-dcnode-id="6119" instrument_node=""> Balderas</span></span><span data-dcnode-id="6117" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">Continuing and Emerging Trends of Senior Tourism: A Review of the Literature</span></span><span data-dcnode-id="6114" instrument_node="">,” </span><i data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">Journal of Population Ageing</span></i><span data-dcnode-id="6111" instrument_node=""> 13 (</span><span class="NLM_year" data-dcnode-id="6109"><span data-dcnode-id="6110" instrument_node="">2020</span></span><span data-dcnode-id="6108" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6106"><span data-dcnode-id="6107" instrument_node="">385</span></span><span data-dcnode-id="6105" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6103"><span data-dcnode-id="6104" instrument_node="">399</span></span><span data-dcnode-id="6102" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6090"><span data-dcnode-id="6101" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6095"><a data-dcnode-id="6099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0034%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1007%252Fs12062-018-9228-4" target="_blank"><span data-dcnode-id="6100" instrument_node="">[Crossref]</span></a><span data-dcnode-id="6098" instrument_node="">, </span><a data-dcnode-id="6096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0034%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000580596500001" target="_blank"><span data-dcnode-id="6097" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="6091"><span data-dcnode-id="6094" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D13%26publication_year%3D2020%26pages%3D385-399%26author%3DI.%2BPatterson%26author%3DA.%2BBalderas%26title%3DContinuing%2Band%2BEmerging%2BTrends%2Bof%2BSenior%2BTourism%253A%2BA%2BReview%2Bof%2Bthe%2BLiterature" target="_blank"><span data-dcnode-id="6093" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6086" instrument_node="">). The natural environment makes Zaolinwan Park an ideal destination for senior tourists. There are some local resorts where seniors can spend a week or even longer for a recreational trip or vacation. The local planning agency aims to further develop health-related recreational programs for attracting senior tourists. Third, the rapid developments in transportation infrastructure such as highways and high-speed rail (Wang and Loo, </span><span class="ref-lnk lazy-ref" data-dcnode-id="6042"><a data-dcnode-id="6084" data-reflink="_i27" data-rid="CIT0039" href="#"><span data-dcnode-id="6085" instrument_node="">2019</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="6043"><span class="ref-close" data-dcnode-id="6083" tabindex="0"></span><span class="ref-icon" data-dcnode-id="6082"></span><span data-dcnode-id="6044"><span class="hlFld-ContribAuthor" data-dcnode-id="6078"><span class="NLM_given-names" data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">B.</span></span><span data-dcnode-id="6079" instrument_node=""> Wang</span></span><span data-dcnode-id="6077" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="6073"><span class="NLM_given-names" data-dcnode-id="6075"><span data-dcnode-id="6076" instrument_node="">B. P .Y.</span></span><span data-dcnode-id="6074" instrument_node=""> Loo</span></span><span data-dcnode-id="6072" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="6070"><span data-dcnode-id="6071" instrument_node="">Travel Time Use and Its Impact on High-Speed-Railway Passengers’ Travel Satisfaction in the E-Society</span></span><span data-dcnode-id="6069" instrument_node="">,” </span><i data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">International Journal of Sustainable Transportation</span></i><span data-dcnode-id="6066" instrument_node=""> 13: 3 (</span><span class="NLM_year" data-dcnode-id="6064"><span data-dcnode-id="6065" instrument_node="">2019</span></span><span data-dcnode-id="6063" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">197</span></span><span data-dcnode-id="6060" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="6058"><span data-dcnode-id="6059" instrument_node="">209</span></span><span data-dcnode-id="6057" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="6045"><span data-dcnode-id="6056" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="6050"><a data-dcnode-id="6054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/15568318.2018.1459968" target="_blank"><span data-dcnode-id="6055" instrument_node="">[Taylor &amp; Francis Online]</span></a><span data-dcnode-id="6053" instrument_node="">, </span><a data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0039%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000465030100004" target="_blank"><span data-dcnode-id="6052" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="6046"><span data-dcnode-id="6049" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="6047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D13%26publication_year%3D2019%26pages%3D197-209%26issue%3D3%26author%3DB.%2BWang%26author%3DB.%2BP%2B.Y.%2BLoo%26title%3DTravel%2BTime%2BUse%2Band%2BIts%2BImpact%2Bon%2BHigh-Speed-Railway%2BPassengers%25E2%2580%2599%2BTravel%2BSatisfaction%2Bin%2Bthe%2BE-Society" target="_blank"><span data-dcnode-id="6048" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="6041" instrument_node="">) also make it convenient to travel from other cities in the Yangtze River Delta Region (including the City of Shanghai and the provinces of Jiangsu, Zhejiang, and Anhui), one of the most developed regions in China, to Zaolinwan Park. There should be a huge potential for Zaolinwan Park to attract urban residents from surrounding cities for some rural-based recreational activities. Moreover, Yangzhou is one of the most popular tourism cities in China. As one of the wealthiest cities in ancient China, Yangzhou is well known for its natural environment, historical architecture, and culture heritage, and captivates a huge number of tourists worldwide every year. Zaolinwan Park could take advantage of its proximity to Yangzhou and attract even more tourists. </span></p><div class="figure figureViewer" data-dcnode-id="5975" id="F0001"><div class="hidden figureViewerArticleInfo" data-dcnode-id="5988"><span class="figViewerTitle" data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">Coupling Social Media and Agent-Based Modelling: A Novel Approach for Supporting Smart Tourism Planning</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="5997"><div class="authorsHeading" data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="5998"><a class="entryAuthor" data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhang%252C%2BShanqi"><span class="hlFld-ContribAuthor" data-dcnode-id="6035"></span></a><a data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhang%252C%2BShanqi"><span class="NLM_given-names" data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">Shanqi</span></span><span data-dcnode-id="6031" instrument_node=""> Zhang</span></a><span data-dcnode-id="6029" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="6027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhen%252C%2BFeng"><span class="hlFld-ContribAuthor" data-dcnode-id="6028"></span></a><a data-dcnode-id="6023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhen%252C%2BFeng"><span class="NLM_given-names" data-dcnode-id="6025"><span data-dcnode-id="6026" instrument_node="">Feng</span></span><span data-dcnode-id="6024" instrument_node=""> Zhen</span></a><span data-dcnode-id="6022" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="6020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DWang%252C%2BBo"><span class="hlFld-ContribAuthor" data-dcnode-id="6021"></span></a><a data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Wang%252C%2BBo"><span class="NLM_given-names" data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">Bo</span></span><span data-dcnode-id="6017" instrument_node=""> Wang</span></a><span data-dcnode-id="6015" instrument_node=""> </span><a data-dcnode-id="6013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orcid.org/0000-0003-3877-4549"><img data-dcnode-id="6014" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/templates/jsp/images/orcid.png&amp;raw"></a><span data-dcnode-id="6012" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="6010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DLi%252C%2BZherui"><span class="hlFld-ContribAuthor" data-dcnode-id="6011"></span></a><a data-dcnode-id="6006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Li%252C%2BZherui"><span class="NLM_given-names" data-dcnode-id="6008"><span data-dcnode-id="6009" instrument_node="">Zherui</span></span><span data-dcnode-id="6007" instrument_node=""> Li</span></a><span data-dcnode-id="6005" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="6003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DQin%252C%2BXiao"><span class="hlFld-ContribAuthor" data-dcnode-id="6004"></span></a><a data-dcnode-id="5999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Qin%252C%2BXiao"><span class="NLM_given-names" data-dcnode-id="6001"><span data-dcnode-id="6002" instrument_node="">Xiao</span></span><span data-dcnode-id="6000" instrument_node=""> Qin</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="5989"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="5994"><a data-dcnode-id="5995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10630732.2020.1847987"><span data-dcnode-id="5996" instrument_node="">https://doi.org/10.1080/10630732.2020.1847987</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="5990"><h6 data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">Published online:</span></h6><span data-dcnode-id="5991" instrument_node="">07 December 2020</span></div></div></div><div class="figureThumbnailContainer" data-dcnode-id="5976"><div class="figureInfo" data-dcnode-id="5982"><div class="short-legend" data-dcnode-id="5983"><p class="captionText" data-dcnode-id="5984"><span class="captionLabel" data-dcnode-id="5986"><span data-dcnode-id="5987" instrument_node="">Figure 1. </span></span><span data-dcnode-id="5985" instrument_node=""> Map of the study area</span></p></div></div><a aria-label="thumbnail image" class="thumbnail" data-dcnode-id="5980" href="#"><img data-dcnode-id="5981" data-src="{&quot;type&quot;:&quot;image&quot;,&quot;src&quot;:&quot;/na101/home/literatum/publisher/tandf/journals/content/cjut20/2022/cjut20.v029.i02/10630732.2020.1847987/20220526/images/medium/cjut_a_1847987_f0001_oc.jpg&quot;}" height="272" id="F0001image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1080&amp;raw" width="500"></a><div class="figureDownloadOptions" data-dcnode-id="5977"><a class="downloadBtn btn btn-sm" data-dcnode-id="5978" href="#" role="button"><span data-dcnode-id="5979" instrument_node="">Display full size</span></a></div></div></div><div class="hidden rs_skip" data-dcnode-id="5970" id="fig-description-F0001"><p class="captionText" data-dcnode-id="5971"><span class="captionLabel" data-dcnode-id="5973"><span data-dcnode-id="5974" instrument_node="">Figure 1. </span></span><span data-dcnode-id="5972" instrument_node=""> Map of the study area</span></p></div><div class="hidden rs_skip" data-dcnode-id="5968" id="figureFootNote-F0001"><div class="figureFootNote-F0001" data-dcnode-id="5969"></div></div><p data-dcnode-id="5967"></p><p data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">As an important component of the tourism plans of Yangzhou, Zaolinwan Park was opened in 2018 and aims to develop itself into a tourism area characterized by agritourism, recreation, and senior tourism. Prior to the opening of the 2018 Jiangsu Horticultural Exhibition, a number of tourism destinations were developed and had attracted large numbers of tourists, particularly during the exhibition. However, a large portion of the park is still under development. This paper is motivated by a project delegated by the local planning agency. Currently, the local planning agency is making development plans for Zaolinwan Park by dividing the park into a series of functional zones, each of which will consist of a number of tourism destinations that share a similar theme (e.g., ecological farming and health-related programs). Based on several rounds of discussion with the local planning agency, a consensus was reached that the development plans for infrastructure and service facilities should be made based on an improved understanding of potential tourists’ preferences. As such, an approach that integrates social media and agent-based modelling, as presented in this paper, was developed to assist the local planning agency in understanding potential tourist movements in the park under a particular planning scenario, which would support the decision-making of planning infrastructure and service facilities.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="4929" id="S003"><h2 class="section-heading-2" data-dcnode-id="5962" id="_i6"><span data-dcnode-id="5963" instrument_node="">Data and Methods</span></h2><p data-dcnode-id="5957"><span data-dcnode-id="5961" instrument_node="">The proposed method consists of two steps (See </span><a data-dcnode-id="5959" href="#F0002"><span data-dcnode-id="5960" instrument_node="">Figure 2</span></a><span data-dcnode-id="5958" instrument_node="">). At the first stage, social media data are used as the primary source to identify the preferences of potential visitors to Zaolinwan Park, supplemented by questionnaire data. In particular, tourist typologies are first identified using social media data and then validated by questionnaire data. The preferred activities, food, and accommodation choices of different tourist groups are also obtained from social media comments. Questionnaire data are further used to understand how visitors may plan their itineraries in the park. At the second stage, identified preferences and behaviors of different types of tourist agents are used to develop an agent-based model to simulate the decision-making process of tourist agents. </span></p><div class="figure figureViewer" data-dcnode-id="5892" id="F0002"><div class="hidden figureViewerArticleInfo" data-dcnode-id="5905"><span class="figViewerTitle" data-dcnode-id="5955"><span data-dcnode-id="5956" instrument_node="">Coupling Social Media and Agent-Based Modelling: A Novel Approach for Supporting Smart Tourism Planning</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="5914"><div class="authorsHeading" data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="5915"><a class="entryAuthor" data-dcnode-id="5951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhang%252C%2BShanqi"><span class="hlFld-ContribAuthor" data-dcnode-id="5952"></span></a><a data-dcnode-id="5947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhang%252C%2BShanqi"><span class="NLM_given-names" data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">Shanqi</span></span><span data-dcnode-id="5948" instrument_node=""> Zhang</span></a><span data-dcnode-id="5946" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhen%252C%2BFeng"><span class="hlFld-ContribAuthor" data-dcnode-id="5945"></span></a><a data-dcnode-id="5940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhen%252C%2BFeng"><span class="NLM_given-names" data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">Feng</span></span><span data-dcnode-id="5941" instrument_node=""> Zhen</span></a><span data-dcnode-id="5939" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="5937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DWang%252C%2BBo"><span class="hlFld-ContribAuthor" data-dcnode-id="5938"></span></a><a data-dcnode-id="5933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Wang%252C%2BBo"><span class="NLM_given-names" data-dcnode-id="5935"><span data-dcnode-id="5936" instrument_node="">Bo</span></span><span data-dcnode-id="5934" instrument_node=""> Wang</span></a><span data-dcnode-id="5932" instrument_node=""> </span><a data-dcnode-id="5930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orcid.org/0000-0003-3877-4549"><img data-dcnode-id="5931" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/templates/jsp/images/orcid.png&amp;raw"></a><span data-dcnode-id="5929" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DLi%252C%2BZherui"><span class="hlFld-ContribAuthor" data-dcnode-id="5928"></span></a><a data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Li%252C%2BZherui"><span class="NLM_given-names" data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">Zherui</span></span><span data-dcnode-id="5924" instrument_node=""> Li</span></a><span data-dcnode-id="5922" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DQin%252C%2BXiao"><span class="hlFld-ContribAuthor" data-dcnode-id="5921"></span></a><a data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Qin%252C%2BXiao"><span class="NLM_given-names" data-dcnode-id="5918"><span data-dcnode-id="5919" instrument_node="">Xiao</span></span><span data-dcnode-id="5917" instrument_node=""> Qin</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="5906"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="5911"><a data-dcnode-id="5912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10630732.2020.1847987"><span data-dcnode-id="5913" instrument_node="">https://doi.org/10.1080/10630732.2020.1847987</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="5907"><h6 data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">Published online:</span></h6><span data-dcnode-id="5908" instrument_node="">07 December 2020</span></div></div></div><div class="figureThumbnailContainer" data-dcnode-id="5893"><div class="figureInfo" data-dcnode-id="5899"><div class="short-legend" data-dcnode-id="5900"><p class="captionText" data-dcnode-id="5901"><span class="captionLabel" data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">Figure 2. </span></span><span data-dcnode-id="5902" instrument_node=""> The workflow of the proposed approach</span></p></div></div><a aria-label="thumbnail image" class="thumbnail" data-dcnode-id="5897" href="#"><img data-dcnode-id="5898" data-src="{&quot;type&quot;:&quot;image&quot;,&quot;src&quot;:&quot;/na101/home/literatum/publisher/tandf/journals/content/cjut20/2022/cjut20.v029.i02/10630732.2020.1847987/20220526/images/medium/cjut_a_1847987_f0002_ob.jpg&quot;}" height="233" id="F0002image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1080&amp;raw" width="500"></a><div class="figureDownloadOptions" data-dcnode-id="5894"><a class="downloadBtn btn btn-sm" data-dcnode-id="5895" href="#" role="button"><span data-dcnode-id="5896" instrument_node="">Display full size</span></a></div></div></div><div class="hidden rs_skip" data-dcnode-id="5887" id="fig-description-F0002"><p class="captionText" data-dcnode-id="5888"><span class="captionLabel" data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">Figure 2. </span></span><span data-dcnode-id="5889" instrument_node=""> The workflow of the proposed approach</span></p></div><div class="hidden rs_skip" data-dcnode-id="5885" id="figureFootNote-F0002"><div class="figureFootNote-F0002" data-dcnode-id="5886"></div></div><p data-dcnode-id="5884"></p><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="5670" id="S003-S2001"><h3 class="section-heading-3" data-dcnode-id="5882" id="_i8"><span data-dcnode-id="5883" instrument_node="">Data</span></h3><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5802" id="S003-S2001-S3001"><h4 class="section-heading-4" data-dcnode-id="5880" id="_i9"><span data-dcnode-id="5881" instrument_node="">Social Media Data</span></h4><p data-dcnode-id="5805"><span data-dcnode-id="5879" instrument_node="">Tourists’ reviews are collected from the social media platform Ctrip (</span><a class="ext-link" data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//you.ctrip.com/" target="_blank"><span data-dcnode-id="5878" instrument_node="">http://you.ctrip.com</span></a><span data-dcnode-id="5876" instrument_node="">), the largest travel website in China (Guo et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="5807"><a data-dcnode-id="5874" data-reflink="_i27" data-rid="CIT0019" href="#"><span data-dcnode-id="5875" instrument_node="">2019</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5808"><span class="ref-close" data-dcnode-id="5873" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5872"></span><span data-dcnode-id="5809"><span class="hlFld-ContribAuthor" data-dcnode-id="5868"><span class="NLM_given-names" data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">S.</span></span><span data-dcnode-id="5869" instrument_node=""> Guo</span></span><span data-dcnode-id="5867" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5863"><span class="NLM_given-names" data-dcnode-id="5865"><span data-dcnode-id="5866" instrument_node="">G.</span></span><span data-dcnode-id="5864" instrument_node=""> Yang</span></span><span data-dcnode-id="5862" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5858"><span class="NLM_given-names" data-dcnode-id="5860"><span data-dcnode-id="5861" instrument_node="">T.</span></span><span data-dcnode-id="5859" instrument_node=""> Pei</span></span><span data-dcnode-id="5857" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5853"><span class="NLM_given-names" data-dcnode-id="5855"><span data-dcnode-id="5856" instrument_node="">T.</span></span><span data-dcnode-id="5854" instrument_node=""> Ma</span></span><span data-dcnode-id="5852" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5848"><span class="NLM_given-names" data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">C.</span></span><span data-dcnode-id="5849" instrument_node=""> Song</span></span><span data-dcnode-id="5847" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5843"><span class="NLM_given-names" data-dcnode-id="5845"><span data-dcnode-id="5846" instrument_node="">H.</span></span><span data-dcnode-id="5844" instrument_node=""> Shu</span></span><span data-dcnode-id="5842" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5838"><span class="NLM_given-names" data-dcnode-id="5840"><span data-dcnode-id="5841" instrument_node="">Y.</span></span><span data-dcnode-id="5839" instrument_node=""> Du</span></span><span data-dcnode-id="5837" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">Analysis of Factors Affecting Urban Park Service Area in Beijing: Perspectives from Multi-Source Geographic Data</span></span><span data-dcnode-id="5834" instrument_node="">,” </span><i data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">Landscape and Urban Planning</span></i><span data-dcnode-id="5831" instrument_node=""> 181 (</span><span class="NLM_year" data-dcnode-id="5829"><span data-dcnode-id="5830" instrument_node="">2019</span></span><span data-dcnode-id="5828" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5826"><span data-dcnode-id="5827" instrument_node="">103</span></span><span data-dcnode-id="5825" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">117</span></span><span data-dcnode-id="5822" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5810"><span data-dcnode-id="5821" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5815"><a data-dcnode-id="5819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0019%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.landurbplan.2018.09.016" target="_blank"><span data-dcnode-id="5820" instrument_node="">[Crossref]</span></a><span data-dcnode-id="5818" instrument_node="">, </span><a data-dcnode-id="5816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0019%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000450376400009" target="_blank"><span data-dcnode-id="5817" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5811"><span data-dcnode-id="5814" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D181%26publication_year%3D2019%26pages%3D103-117%26author%3DS.%2BGuo%26author%3DG.%2BYang%26author%3DT.%2BPei%26author%3DT.%2BMa%26author%3DC.%2BSong%26author%3DH.%2BShu%26author%3DY.%2BDu%26title%3DAnalysis%2Bof%2BFactors%2BAffecting%2BUrban%2BPark%2BService%2BArea%2Bin%2BBeijing%3A%25E2%2580%25AFPerspectives%2Bfrom%2BMulti-Source%2BGeographic%2BData" target="_blank"><span data-dcnode-id="5813" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5806" instrument_node="">). People can share comments on the places they visit and their travel experiences on the website. The comments are mainly short paragraphs about impressive or unimpressive attractions and scenery, as well as experiences with food, transportation, and accommodation services. Considering that the newly opened Zaolinwan Park has not received a large number of online comments and that the local planning agency aims to attract tourists mainly from the Yangtze River Delta Region, we collect comments on tourism destinations that have similar characteristics with those of Zaolinwan Park, in terms of their representative tourism destination images, in the cities of the Yangtze River Delta Region. Based on the characteristics of planned tourism destinations in Zaolinwan Park as well as its development goals, tourism destinations characterized by agritourism, horticultural gardening, sports, and recreation are considered. The assumption is that tourist comments regarding these tourist destinations could shed light on the preferences of the potential tourists of Zaolinwan Park. Using Python scripting, a list of tourism destinations as well as comments associated with these destinations are first obtained from the Ctrip website by going through all the cities in the Yangtze River Delta Region. The tourism destinations are then filtered using a list of keywords, including “horticultural garden,” “ecological garden,” “ecological park,” “farming,” “gardening,” “mountain village,” “recreation park,” “sports park,” and “water park.” Only tourism sites with the name that has one or more abovementioned keywords are kept in the dataset. A manual examination is further applied to ensure the relevance of identified tourism destinations.</span></p><p data-dcnode-id="5803"><span data-dcnode-id="5804" instrument_node="">Finally, a total of 18,737 reviews, published during June 2014 and April 2018, from 349 tourism destinations were harvested in the selected region. Of the 18,737 reviews, 7,831 have information regarding reviewer’s self-claimed current residency. Among them, 5,567 reviewers (71.11 percent) claimed that they are from the Yangtze River Delta Region (32.35 percent from Shanghai, 19.44 percent from Jiangsu, 14.83 percent from Zhejiang, 4.51 percent from Anhui). The rest of the tourists are from all over the country, including Guangdong (4.23 percent), Chongqing (2.44 percent), Shandong (2.40 percent) and Beijing (2.38 percent), and overseas (1.11 percent). Although the residency information of slightly over half of the reviews is missing, we expect that the origins of these self-claimed reviewers are almost representative of that of all the reviewers. The composition of reviewers suggests that tourists visiting the identified tourist destinations are mostly from the Yangtze River Delta Region. As such, we consider that the preferences identified from social media would be representative for tourists who might visit Zaolinwan Park in the future.</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5671" id="S003-S2001-S3002"><h4 class="section-heading-4" data-dcnode-id="5800" id="_i10"><span data-dcnode-id="5801" instrument_node="">Questionnaire Data</span></h4><p data-dcnode-id="5674"><span data-dcnode-id="5799" instrument_node="">While social media comments contain rich information about tourists’ perceptions and experiences regarding tourism destinations, they are limited in representing detailed travel itineraries. However, understanding tourists’ itinerary choices is critical to simulating the space-time processes of tourists’ movements. Considering that quite a portion of the park is still under development, we use an additional questionnaire, the most commonly used approach for collecting itinerary data (Popp and McCole, </span><span class="ref-lnk lazy-ref" data-dcnode-id="5755"><a data-dcnode-id="5797" data-reflink="_i27" data-rid="CIT0036" href="#"><span data-dcnode-id="5798" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5756"><span class="ref-close" data-dcnode-id="5796" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5795"></span><span data-dcnode-id="5757"><span class="hlFld-ContribAuthor" data-dcnode-id="5791"><span class="NLM_given-names" data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">L.</span></span><span data-dcnode-id="5792" instrument_node=""> Popp</span></span><span data-dcnode-id="5790" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5786"><span class="NLM_given-names" data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">D.</span></span><span data-dcnode-id="5787" instrument_node=""> McCole</span></span><span data-dcnode-id="5785" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">Understanding Tourists’ Itineraries in Emerging Rural Tourism Regions: The Application of Paper-Based Itinerary Mapping Methodology to a Wine Tourism Region in Michigan</span></span><span data-dcnode-id="5782" instrument_node="">,” </span><i data-dcnode-id="5780"><span data-dcnode-id="5781" instrument_node="">Current Issues in Tourism</span></i><span data-dcnode-id="5779" instrument_node=""> 19: 10 (</span><span class="NLM_year" data-dcnode-id="5777"><span data-dcnode-id="5778" instrument_node="">2016</span></span><span data-dcnode-id="5776" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">988</span></span><span data-dcnode-id="5773" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">1004</span></span><span data-dcnode-id="5770" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="5758"><span data-dcnode-id="5769" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5763"><a data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/13683500.2014.942259" target="_blank"><span data-dcnode-id="5768" instrument_node="">[Taylor &amp; Francis Online]</span></a><span data-dcnode-id="5766" instrument_node="">, </span><a data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0036%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000378794900003" target="_blank"><span data-dcnode-id="5765" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="5759"><span data-dcnode-id="5762" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="5760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D19%26publication_year%3D2016%26pages%3D988-1004%26issue%3D10%26author%3DL.%2BPopp%26author%3DD.%2BMcCole%26title%3DUnderstanding%2BTourists%25E2%2580%2599%2BItineraries%2Bin%2BEmerging%2BRural%2BTourism%2BRegions%3A%2BThe%2BApplication%2Bof%2BPaper-Based%2BItinerary%2BMapping%2BMethodology%2Bto%2Ba%2BWine%2BTourism%2BRegion%2Bin%2BMichigan" target="_blank"><span data-dcnode-id="5761" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5754" instrument_node="">; Wang et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="5676"><a data-dcnode-id="5752" data-reflink="_i27" data-rid="CIT0041" href="#"><span data-dcnode-id="5753" instrument_node="">2015</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="5677"><span class="ref-close" data-dcnode-id="5751" tabindex="0"></span><span class="ref-icon" data-dcnode-id="5750"></span><span data-dcnode-id="5678"><span class="hlFld-ContribAuthor" data-dcnode-id="5746"><span class="NLM_given-names" data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">D.</span></span><span data-dcnode-id="5747" instrument_node=""> Wang</span></span><span data-dcnode-id="5745" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5741"><span class="NLM_given-names" data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">C.</span></span><span data-dcnode-id="5742" instrument_node=""> Wang</span></span><span data-dcnode-id="5740" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5736"><span class="NLM_given-names" data-dcnode-id="5738"><span data-dcnode-id="5739" instrument_node="">W.</span></span><span data-dcnode-id="5737" instrument_node=""> Zhu</span></span><span data-dcnode-id="5735" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5731"><span class="NLM_given-names" data-dcnode-id="5733"><span data-dcnode-id="5734" instrument_node="">H.</span></span><span data-dcnode-id="5732" instrument_node=""> Lu</span></span><span data-dcnode-id="5730" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5726"><span class="NLM_given-names" data-dcnode-id="5728"><span data-dcnode-id="5729" instrument_node="">Z.</span></span><span data-dcnode-id="5727" instrument_node=""> Wang</span></span><span data-dcnode-id="5725" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5721"><span class="NLM_given-names" data-dcnode-id="5723"><span data-dcnode-id="5724" instrument_node="">P.</span></span><span data-dcnode-id="5722" instrument_node=""> Gao</span></span><span data-dcnode-id="5720" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5716"><span class="NLM_given-names" data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">J.</span></span><span data-dcnode-id="5717" instrument_node=""> Liu</span></span><span data-dcnode-id="5715" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5711"><span class="NLM_given-names" data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">A.</span></span><span data-dcnode-id="5712" instrument_node=""> Wang</span></span><span data-dcnode-id="5710" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="5706"><span class="NLM_given-names" data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">Y.</span></span><span data-dcnode-id="5707" instrument_node=""> Zhao</span></span><span data-dcnode-id="5705" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="5701"><span class="NLM_given-names" data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">Y.</span></span><span data-dcnode-id="5702" instrument_node=""> Li</span></span><span data-dcnode-id="5700" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">Large-Scale Exposition Planning and Management Optimization Based on Visitor’s Behaviour Simulation: A Case Study of Qingdao International Horticultural Exposition 2014</span></span><span data-dcnode-id="5697" instrument_node="">,” </span><i data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">City Planning Review</span></i><span data-dcnode-id="5694" instrument_node=""> 39: 2 (</span><span class="NLM_year" data-dcnode-id="5692"><span data-dcnode-id="5693" instrument_node="">2015</span></span><span data-dcnode-id="5691" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">65</span></span><span data-dcnode-id="5688" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">70</span></span><span data-dcnode-id="5685" instrument_node=""> [in Chinese].</span><span class="refLink-block" data-dcnode-id="5679"><span data-dcnode-id="5684" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="5683"></span><span class="googleScholar-container" data-dcnode-id="5680"><a class="google-scholar" data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D39%26publication_year%3D2015%26pages%3D65-70%26issue%3D2%26author%3DD.%2BWang%26author%3DC.%2BWang%26author%3DW.%2BZhu%26author%3DH.%2BLu%26author%3DZ.%2BWang%26author%3DP.%2BGao%26author%3DJ.%2BLiu%26author%3DA.%2BWang%26author%3DY.%2BZhao%26author%3DY.%2BLi%26title%3DLarge-Scale%2BExposition%2BPlanning%2Band%2BManagement%2BOptimization%2BBased%2Bon%2BVisitor%25E2%2580%2599s%2BBehaviour%2BSimulation%3A%2BA%2BCase%2BStudy%2Bof%2BQingdao%2BInternational%2BHorticultural%2BExposition%2B2014" target="_blank"><span data-dcnode-id="5682" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="5675" instrument_node="">), to understand how tourists intend to arrange their tentativ
