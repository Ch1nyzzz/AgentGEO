Download CSV</span></a><a class="downloadButton btn btn-sm displaySizeTable" data-dcnode-id="4707" data-id="T0003" href="#" role="button"><span data-dcnode-id="4708" instrument_node="">Display Table</span></a></div></div><p data-dcnode-id="4704"></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="4622" id="S004-S2001-S3004"><h4 class="section-heading-4" data-dcnode-id="4701" id="_i21"><span data-dcnode-id="4702" instrument_node="">Popular Tour Routes</span></h4><p data-dcnode-id="4696"><span data-dcnode-id="4700" instrument_node="">Based on the questionnaire, we identified the most probable/preferred tour routes for each tourist group. To showcase the result, </span><a data-dcnode-id="4698" href="#F0004"><span data-dcnode-id="4699" instrument_node="">Figure 4</span></a><span data-dcnode-id="4697" instrument_node=""> represents a simplified directed weighted graph constructed based on tourists’ choices. In the Figure, the node represents the exemplar attractions, with the size of the node indicating the popularity of the attraction. The choices of participants in terms of their self-identified tourist group and their preferred tourist attractions are consistent with what we have identified from online reviews, which further indicate the reliability of social media analysis results. The colors of the nodes represent the sequence people choose to visit a particular place. For instance, the majority of student groups choose to first visit cross-country club, sports park, and water park after they arrive at the park. Therefore, these places are marked as the first place in the graph. For simplicity, we have not shown the detailed itinerary by hour as used in the model, but use sequence 1,2,3 to provide an overview on the sequential patterns of aggregated visitations. Two nodes are connected if a tourist chooses to move from one node to another. The width of the edge indicating the number of people who choose the route, while the arrow indicates the direction from one node to another. From the graphs, it can be seen that the four tourist groups have quite different visitation patterns. For example, tourists in the groups of families with children, students, and young workers are more likely to start with time-consuming activities such as visiting water parks or doing sports-related activities, whereas seniors like to go to farmer’s market or visit some cultural attractions first. </span></p><div class="figure figureViewer" data-dcnode-id="4631" id="F0004"><div class="hidden figureViewerArticleInfo" data-dcnode-id="4644"><span class="figViewerTitle" data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">Coupling Social Media and Agent-Based Modelling: A Novel Approach for Supporting Smart Tourism Planning</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="4653"><div class="authorsHeading" data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="4654"><a class="entryAuthor" data-dcnode-id="4690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhang%252C%2BShanqi"><span class="hlFld-ContribAuthor" data-dcnode-id="4691"></span></a><a data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhang%252C%2BShanqi"><span class="NLM_given-names" data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">Shanqi</span></span><span data-dcnode-id="4687" instrument_node=""> Zhang</span></a><span data-dcnode-id="4685" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhen%252C%2BFeng"><span class="hlFld-ContribAuthor" data-dcnode-id="4684"></span></a><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhen%252C%2BFeng"><span class="NLM_given-names" data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">Feng</span></span><span data-dcnode-id="4680" instrument_node=""> Zhen</span></a><span data-dcnode-id="4678" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DWang%252C%2BBo"><span class="hlFld-ContribAuthor" data-dcnode-id="4677"></span></a><a data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Wang%252C%2BBo"><span class="NLM_given-names" data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">Bo</span></span><span data-dcnode-id="4673" instrument_node=""> Wang</span></a><span data-dcnode-id="4671" instrument_node=""> </span><a data-dcnode-id="4669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orcid.org/0000-0003-3877-4549"><img data-dcnode-id="4670" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/templates/jsp/images/orcid.png&amp;raw"></a><span data-dcnode-id="4668" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DLi%252C%2BZherui"><span class="hlFld-ContribAuthor" data-dcnode-id="4667"></span></a><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Li%252C%2BZherui"><span class="NLM_given-names" data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">Zherui</span></span><span data-dcnode-id="4663" instrument_node=""> Li</span></a><span data-dcnode-id="4661" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DQin%252C%2BXiao"><span class="hlFld-ContribAuthor" data-dcnode-id="4660"></span></a><a data-dcnode-id="4655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Qin%252C%2BXiao"><span class="NLM_given-names" data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">Xiao</span></span><span data-dcnode-id="4656" instrument_node=""> Qin</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="4645"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="4650"><a data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10630732.2020.1847987"><span data-dcnode-id="4652" instrument_node="">https://doi.org/10.1080/10630732.2020.1847987</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="4646"><h6 data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">Published online:</span></h6><span data-dcnode-id="4647" instrument_node="">07 December 2020</span></div></div></div><div class="figureThumbnailContainer" data-dcnode-id="4632"><div class="figureInfo" data-dcnode-id="4638"><div class="short-legend" data-dcnode-id="4639"><p class="captionText" data-dcnode-id="4640"><span class="captionLabel" data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">Figure 4. </span></span><span data-dcnode-id="4641" instrument_node=""> Preferred tour routes of each tourist group</span></p></div></div><a aria-label="thumbnail image" class="thumbnail" data-dcnode-id="4636" href="#"><img data-dcnode-id="4637" data-src="{&quot;type&quot;:&quot;image&quot;,&quot;src&quot;:&quot;/na101/home/literatum/publisher/tandf/journals/content/cjut20/2022/cjut20.v029.i02/10630732.2020.1847987/20220526/images/medium/cjut_a_1847987_f0004_oc.jpg&quot;}" height="300" id="F0004image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1080&amp;raw" width="500"></a><div class="figureDownloadOptions" data-dcnode-id="4633"><a class="downloadBtn btn btn-sm" data-dcnode-id="4634" href="#" role="button"><span data-dcnode-id="4635" instrument_node="">Display full size</span></a></div></div></div><div class="hidden rs_skip" data-dcnode-id="4626" id="fig-description-F0004"><p class="captionText" data-dcnode-id="4627"><span class="captionLabel" data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">Figure 4. </span></span><span data-dcnode-id="4628" instrument_node=""> Preferred tour routes of each tourist group</span></p></div><div class="hidden rs_skip" data-dcnode-id="4624" id="figureFootNote-F0004"><div class="figureFootNote-F0004" data-dcnode-id="4625"></div></div><p data-dcnode-id="4623"></p></div></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4441" id="S004-S2002"><h3 class="section-heading-3" data-dcnode-id="4619" id="_i23"><span data-dcnode-id="4620" instrument_node="">Modelling Results</span></h3><p data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">We further simulated the movements of tourists through several methods. Note that the number of tourists who would visit the park in one day is a required input for the simulation model. However, the prediction of tourist counts and composition is beyond the scope of this study. In the following, the number for each tourist group is an approximate number suggested by local tourist agencies, based on their local knowledge. In practice, decision-makers can further determine the number based on surveys and other prediction techniques.</span></p><p data-dcnode-id="4604"><a data-dcnode-id="4615" href="#F0005"><span data-dcnode-id="4616" instrument_node="">Figure 5</span></a><span data-dcnode-id="4614" instrument_node="">a shows the division of functional zones. The park is divided into eight functional zones, each of which has a major development theme. Within each zone, there are multiple parcels that represent potential tourism destinations. Note that the plan has not been finalized yet, the modelling approach rather provides a tool for planners to understand potential tourism phenomena under a particular planning scenario. Under the planning scenario as suggested by </span><a data-dcnode-id="4612" href="#F0005"><span data-dcnode-id="4613" instrument_node="">Figure 5</span></a><span data-dcnode-id="4611" instrument_node="">a, </span><a data-dcnode-id="4609" href="#F0005"><span data-dcnode-id="4610" instrument_node="">Figures 5b</span></a><span data-dcnode-id="4608" instrument_node="">–</span><a data-dcnode-id="4606" href="#F0005"><span data-dcnode-id="4607" instrument_node="">5g</span></a><span data-dcnode-id="4605" instrument_node=""> show the spatial distributions of tourists at different times of the day from 8am to 6pm based on a two-hour time interval. Tourists tend to be more clustered at the core areas of the park (i.e., creative culture expo zone where the exhibition is held and waterside vacation zone) at the beginning of the tour, and become more scattered in other parts of the park later in the day. At the end of the day, there is a high concentration of tourists at the health programs zone due to several reasons, including that people are likely to relax after a day of touring by having a spa or other similar activities, and that a relatively larger portion of senior tourists, who are willing to stay over, are attracted to the zone. </span></p><div class="figure figureViewer" data-dcnode-id="4539" id="F0005"><div class="hidden figureViewerArticleInfo" data-dcnode-id="4552"><span class="figViewerTitle" data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">Coupling Social Media and Agent-Based Modelling: A Novel Approach for Supporting Smart Tourism Planning</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="4561"><div class="authorsHeading" data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="4562"><a class="entryAuthor" data-dcnode-id="4598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhang%252C%2BShanqi"><span class="hlFld-ContribAuthor" data-dcnode-id="4599"></span></a><a data-dcnode-id="4594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhang%252C%2BShanqi"><span class="NLM_given-names" data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">Shanqi</span></span><span data-dcnode-id="4595" instrument_node=""> Zhang</span></a><span data-dcnode-id="4593" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhen%252C%2BFeng"><span class="hlFld-ContribAuthor" data-dcnode-id="4592"></span></a><a data-dcnode-id="4587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhen%252C%2BFeng"><span class="NLM_given-names" data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">Feng</span></span><span data-dcnode-id="4588" instrument_node=""> Zhen</span></a><span data-dcnode-id="4586" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DWang%252C%2BBo"><span class="hlFld-ContribAuthor" data-dcnode-id="4585"></span></a><a data-dcnode-id="4580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Wang%252C%2BBo"><span class="NLM_given-names" data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">Bo</span></span><span data-dcnode-id="4581" instrument_node=""> Wang</span></a><span data-dcnode-id="4579" instrument_node=""> </span><a data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orcid.org/0000-0003-3877-4549"><img data-dcnode-id="4578" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/templates/jsp/images/orcid.png&amp;raw"></a><span data-dcnode-id="4576" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DLi%252C%2BZherui"><span class="hlFld-ContribAuthor" data-dcnode-id="4575"></span></a><a data-dcnode-id="4570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Li%252C%2BZherui"><span class="NLM_given-names" data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">Zherui</span></span><span data-dcnode-id="4571" instrument_node=""> Li</span></a><span data-dcnode-id="4569" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="4567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DQin%252C%2BXiao"><span class="hlFld-ContribAuthor" data-dcnode-id="4568"></span></a><a data-dcnode-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Qin%252C%2BXiao"><span class="NLM_given-names" data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">Xiao</span></span><span data-dcnode-id="4564" instrument_node=""> Qin</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="4553"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="4558"><a data-dcnode-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10630732.2020.1847987"><span data-dcnode-id="4560" instrument_node="">https://doi.org/10.1080/10630732.2020.1847987</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="4554"><h6 data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">Published online:</span></h6><span data-dcnode-id="4555" instrument_node="">07 December 2020</span></div></div></div><div class="figureThumbnailContainer" data-dcnode-id="4540"><div class="figureInfo" data-dcnode-id="4546"><div class="short-legend" data-dcnode-id="4547"><p class="captionText" data-dcnode-id="4548"><span class="captionLabel" data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">Figure 5. </span></span><span data-dcnode-id="4549" instrument_node=""> (a) The map of functional zones and the spatial distributions of tourists at (b) 8am, (c) 10am, (d) 12pm, (e) 2pm, (f) 4pm, and (g) 6pm based on simulation results</span></p></div></div><a aria-label="thumbnail image" class="thumbnail" data-dcnode-id="4544" href="#"><img data-dcnode-id="4545" data-src="{&quot;type&quot;:&quot;image&quot;,&quot;src&quot;:&quot;/na101/home/literatum/publisher/tandf/journals/content/cjut20/2022/cjut20.v029.i02/10630732.2020.1847987/20220526/images/medium/cjut_a_1847987_f0005_oc.jpg&quot;}" height="429" id="F0005image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1080&amp;raw" width="500"></a><div class="figureDownloadOptions" data-dcnode-id="4541"><a class="downloadBtn btn btn-sm" data-dcnode-id="4542" href="#" role="button"><span data-dcnode-id="4543" instrument_node="">Display full size</span></a></div></div></div><div class="hidden rs_skip" data-dcnode-id="4534" id="fig-description-F0005"><p class="captionText" data-dcnode-id="4535"><span class="captionLabel" data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">Figure 5. </span></span><span data-dcnode-id="4536" instrument_node=""> (a) The map of functional zones and the spatial distributions of tourists at (b) 8am, (c) 10am, (d) 12pm, (e) 2pm, (f) 4pm, and (g) 6pm based on simulation results</span></p></div><div class="hidden rs_skip" data-dcnode-id="4532" id="figureFootNote-F0005"><div class="figureFootNote-F0005" data-dcnode-id="4533"></div></div><p data-dcnode-id="4531"></p><p data-dcnode-id="4523"><span data-dcnode-id="4530" instrument_node="">Tourist distributions on different road segments also shed light on transportation management and services. As shown in </span><a data-dcnode-id="4528" href="#F0005"><span data-dcnode-id="4529" instrument_node="">Figures 5c</span></a><span data-dcnode-id="4527" instrument_node="">–</span><a data-dcnode-id="4525" href="#F0005"><span data-dcnode-id="4526" instrument_node="">5g</span></a><span data-dcnode-id="4524" instrument_node="">, the width of the road segment represents the number of tourists in the past two hours. It can be seen that the major roads in the center of the park carry the most tourist volume, yet some alleys in the northern park that are anticipated to have a relatively large tourist volume should draw attention from local planners for infrastructure planning and service provision.</span></p><p data-dcnode-id="4515"><span data-dcnode-id="4522" instrument_node="">Tourist distributions, together with tourists’ food and accommodation preferences, could also shed light on planning service facilities. </span><a data-dcnode-id="4520" href="#F0006"><span data-dcnode-id="4521" instrument_node="">Figure 6</span></a><span data-dcnode-id="4519" instrument_node="">a gives an example of tourist distribution around 12pm. As it is around the lunch time, the varying distribution of different groups could shed light on the arrangement of food-related facilities. For instance, western-styled fast food could be located at areas where students and young workers are more likely to gather around noon time. In areas where there is a high concentration of all tourist groups, local food and street food could attract more tourists, as they are favored by all groups. Similarly, accommodation facilities may be arranged at locations where people are most likely to finish their tour of the day (</span><a data-dcnode-id="4517" href="#F0006"><span data-dcnode-id="4518" instrument_node="">Figure 6</span></a><span data-dcnode-id="4516" instrument_node="">b). </span></p><div class="figure figureViewer" data-dcnode-id="4450" id="F0006"><div class="hidden figureViewerArticleInfo" data-dcnode-id="4463"><span class="figViewerTitle" data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">Coupling Social Media and Agent-Based Modelling: A Novel Approach for Supporting Smart Tourism Planning</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="4472"><div class="authorsHeading" data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="4473"><a class="entryAuthor" data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhang%252C%2BShanqi"><span class="hlFld-ContribAuthor" data-dcnode-id="4510"></span></a><a data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhang%252C%2BShanqi"><span class="NLM_given-names" data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">Shanqi</span></span><span data-dcnode-id="4506" instrument_node=""> Zhang</span></a><span data-dcnode-id="4504" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DZhen%252C%2BFeng"><span class="hlFld-ContribAuthor" data-dcnode-id="4503"></span></a><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Zhen%252C%2BFeng"><span class="NLM_given-names" data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">Feng</span></span><span data-dcnode-id="4499" instrument_node=""> Zhen</span></a><span data-dcnode-id="4497" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DWang%252C%2BBo"><span class="hlFld-ContribAuthor" data-dcnode-id="4496"></span></a><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Wang%252C%2BBo"><span class="NLM_given-names" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">Bo</span></span><span data-dcnode-id="4492" instrument_node=""> Wang</span></a><span data-dcnode-id="4490" instrument_node=""> </span><a data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orcid.org/0000-0003-3877-4549"><img data-dcnode-id="4489" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/templates/jsp/images/orcid.png&amp;raw"></a><span data-dcnode-id="4487" instrument_node="">, </span><a class="entryAuthor" data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DLi%252C%2BZherui"><span class="hlFld-ContribAuthor" data-dcnode-id="4486"></span></a><a data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Li%252C%2BZherui"><span class="NLM_given-names" data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">Zherui</span></span><span data-dcnode-id="4482" instrument_node=""> Li</span></a><span data-dcnode-id="4480" instrument_node=""> &amp; </span><a class="entryAuthor" data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DQin%252C%2BXiao"><span class="hlFld-ContribAuthor" data-dcnode-id="4479"></span></a><a data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Qin%252C%2BXiao"><span class="NLM_given-names" data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">Xiao</span></span><span data-dcnode-id="4475" instrument_node=""> Qin</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="4464"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="4469"><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10630732.2020.1847987"><span data-dcnode-id="4471" instrument_node="">https://doi.org/10.1080/10630732.2020.1847987</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="4465"><h6 data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">Published online:</span></h6><span data-dcnode-id="4466" instrument_node="">07 December 2020</span></div></div></div><div class="figureThumbnailContainer" data-dcnode-id="4451"><div class="figureInfo" data-dcnode-id="4457"><div class="short-legend" data-dcnode-id="4458"><p class="captionText" data-dcnode-id="4459"><span class="captionLabel" data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">Figure 6. </span></span><span data-dcnode-id="4460" instrument_node=""> The distribution of different tourist groups at functional zones at (a) 12pm and (b) 6pm based on simulation results</span></p></div></div><a aria-label="thumbnail image" class="thumbnail" data-dcnode-id="4455" href="#"><img data-dcnode-id="4456" data-src="{&quot;type&quot;:&quot;image&quot;,&quot;src&quot;:&quot;/na101/home/literatum/publisher/tandf/journals/content/cjut20/2022/cjut20.v029.i02/10630732.2020.1847987/20220526/images/medium/cjut_a_1847987_f0006_oc.jpg&quot;}" height="478" id="F0006image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1080&amp;raw" width="500"></a><div class="figureDownloadOptions" data-dcnode-id="4452"><a class="downloadBtn btn btn-sm" data-dcnode-id="4453" href="#" role="button"><span data-dcnode-id="4454" instrument_node="">Display full size</span></a></div></div></div><div class="hidden rs_skip" data-dcnode-id="4445" id="fig-description-F0006"><p class="captionText" data-dcnode-id="4446"><span class="captionLabel" data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">Figure 6. </span></span><span data-dcnode-id="4447" instrument_node=""> The distribution of different tourist groups at functional zones at (a) 12pm and (b) 6pm based on simulation results</span></p></div><div class="hidden rs_skip" data-dcnode-id="4443" id="figureFootNote-F0006"><div class="figureFootNote-F0006" data-dcnode-id="4444"></div></div><p data-dcnode-id="4442"></p></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="3570" id="S005"><h2 class="section-heading-2" data-dcnode-id="4438" id="_i26"><span data-dcnode-id="4439" instrument_node="">Discussion and Conclusion</span></h2><p data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">This study proposes an integrated approach coupling social media with agent-based modelling. Natural language process methods are deployed to extract knowledge from social media regarding tourist typologies and preferences of tourism-related activities, food, and accommodation choices. The derived typology is then validated by questionnaire data. Further, tourist preferences identified from social media are combined with tourist itineraries obtained from the questionnaire, to provide a prior knowledge for developing an agent-based model that simulates tourist movements within the park. The simulated results, particularly the spatiotemporal patterns of tourist distributions and the interactions among different functional zones of the tourism park, could shed light on the planning facilities and service provision (such as food, accommodation, and transportation services and facilities) in the newly developed tourism park.</span></p><p data-dcnode-id="4170"><span data-dcnode-id="4435" instrument_node="">The novelty of the proposed approach is twofold. First, while the potential of social media in understanding the behaviors, perceptions, and travel patterns of tourists has been widely acknowledged, how the knowledge derived from social media could be integrated with decision-making procedures and support tourism planning remains a challenge. This study takes one step forward by integrating social media with agent-based modelling to support decision-making in a tourism planning process. This integration may provide several benefits. Previous studies have suggested that social media could provide a more convenient form of public participation as there are fewer spatial and temporal constraints associated with social media participation (Massa, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4405"><a data-dcnode-id="4433" data-reflink="_i27" data-rid="CIT0030" href="#"><span data-dcnode-id="4434" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4406"><span class="ref-close" data-dcnode-id="4432" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4431"></span><span data-dcnode-id="4407"><span class="hlFld-ContribAuthor" data-dcnode-id="4427"><span class="NLM_given-names" data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">P.</span></span><span data-dcnode-id="4428" instrument_node=""> Massa</span></span><span data-dcnode-id="4426" instrument_node="">, </span><i data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">Social Media Geographic Information (SMGI): Opportunities for Spatial Planning and Governance</span></i><span data-dcnode-id="4423" instrument_node=""> (</span><span class="NLM_publisher-loc" data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">Cagliari</span></span><span data-dcnode-id="4420" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">Università Degli Studi Di Cagliari Scuola</span></span><span data-dcnode-id="4417" instrument_node="">, </span><span class="NLM_year" data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">2016</span></span><span data-dcnode-id="4414" instrument_node="">).</span><span class="refLink-block" data-dcnode-id="4408"><span data-dcnode-id="4413" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4412"></span><span class="googleScholar-container" data-dcnode-id="4409"><a class="google-scholar" data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2016%26author%3DP.%2BMassa%26title%3DSocial%2BMedia%2BGeographic%2BInformation%2B%2528SMGI%2529%253A%2BOpportunities%2Bfor%2BSpatial%2BPlanning%2Band%2BGovernance" target="_blank"><span data-dcnode-id="4411" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4404" instrument_node="">; Wukich and Mergel, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4360"><a data-dcnode-id="4402" data-reflink="_i27" data-rid="CIT0042" href="#"><span data-dcnode-id="4403" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4361"><span class="ref-close" data-dcnode-id="4401" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4400"></span><span data-dcnode-id="4362"><span class="hlFld-ContribAuthor" data-dcnode-id="4396"><span class="NLM_given-names" data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">C.</span></span><span data-dcnode-id="4397" instrument_node=""> Wukich</span></span><span data-dcnode-id="4395" instrument_node=""> and </span><span class="hlFld-ContribAuthor" data-dcnode-id="4391"><span class="NLM_given-names" data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">I.</span></span><span data-dcnode-id="4392" instrument_node=""> Mergel</span></span><span data-dcnode-id="4390" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Reusing Social Media Information in Government</span></span><span data-dcnode-id="4387" instrument_node="">,” </span><i data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">Government Information Quarterly</span></i><span data-dcnode-id="4384" instrument_node=""> 33: 2 (</span><span class="NLM_year" data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">2016</span></span><span data-dcnode-id="4381" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">305</span></span><span data-dcnode-id="4378" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">312</span></span><span data-dcnode-id="4375" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4363"><span data-dcnode-id="4374" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4368"><a data-dcnode-id="4372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0042%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.giq.2016.01.011" target="_blank"><span data-dcnode-id="4373" instrument_node="">[Crossref]</span></a><span data-dcnode-id="4371" instrument_node="">, </span><a data-dcnode-id="4369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0042%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000378759100009" target="_blank"><span data-dcnode-id="4370" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="4364"><span data-dcnode-id="4367" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D33%26publication_year%3D2016%26pages%3D305-312%26issue%3D2%26author%3DC.%2BWukich%26author%3DI.%2BMergel%26title%3DReusing%2BSocial%2BMedia%2BInformation%2Bin%2BGovernment" target="_blank"><span data-dcnode-id="4366" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4359" instrument_node="">). In our study, social media serves not only as a supplementary of a traditional participation approach but also provides an additional avenue for broadening participation. Zaolinwan Park is a newly opened tourism park and there have not been many tourists. By extracting tourist reviews at similar tourism locations in cities in the Yangtze River Delta Region, insights can be obtained regarding the preferences of potential tourists. Identified preferences could further shed light on facility planning, development plans, and marketing strategies in Zaolinwan Park. Moreover, the fine temporal resolution of social media provides decision-makers with opportunities to probe into changes in public perceptions and to monitor dynamic environments (Dunkel, </span><span class="ref-lnk lazy-ref" data-dcnode-id="4320"><a data-dcnode-id="4357" data-reflink="_i27" data-rid="CIT0013" href="#"><span data-dcnode-id="4358" instrument_node="">2015</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4321"><span class="ref-close" data-dcnode-id="4356" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4355"></span><span data-dcnode-id="4322"><span class="hlFld-ContribAuthor" data-dcnode-id="4351"><span class="NLM_given-names" data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">A.</span></span><span data-dcnode-id="4352" instrument_node=""> Dunkel</span></span><span data-dcnode-id="4350" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">Visualizing the Perceived Environment Using Crowdsourced Photo Geodata</span></span><span data-dcnode-id="4347" instrument_node="">,” </span><i data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">Landscape and Urban Planning</span></i><span data-dcnode-id="4344" instrument_node=""> 142 (</span><span class="NLM_year" data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">2015</span></span><span data-dcnode-id="4341" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">173</span></span><span data-dcnode-id="4338" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">186</span></span><span data-dcnode-id="4335" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4323"><span data-dcnode-id="4334" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4328"><a data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0013%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.landurbplan.2015.02.022" target="_blank"><span data-dcnode-id="4333" instrument_node="">[Crossref]</span></a><span data-dcnode-id="4331" instrument_node="">, </span><a data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0013%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000363350100019" target="_blank"><span data-dcnode-id="4330" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="4324"><span data-dcnode-id="4327" instrument_node="" njing, China</span></span><span data-dcnode-id="4247" instrument_node="">,” </span><i data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">Environment and Planning B: Urban Analytics and City Science</span></i><span data-dcnode-id="4244" instrument_node=""> (</span><span class="NLM_year" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">2020</span></span><span data-dcnode-id="4241" instrument_node="">) doi </span><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/2399808320934818"><span data-dcnode-id="4240" instrument_node="">https://doi.org/10.1177/2399808320934818</span></a><span class="refLink-block" data-dcnode-id="4230"><span data-dcnode-id="4238" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4235"><a data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0007%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1177%252F2399808320934818" target="_blank"><span data-dcnode-id="4237" instrument_node="">[Crossref]</span></a></span><span class="googleScholar-container" data-dcnode-id="4231"><span data-dcnode-id="4234" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2020%26author%3DZ.%2BP.%2BCai%26author%3DB.%2BWang%26author%3DC.%2BCong%26author%3DV.%2BCvetkovic%26title%3DSpatial%2BDynamic%2BModelling%2Bfor%2BUrban%2BScenario%2BPlanning%253A%2BA%2BCase%2BStudy%2Bof%2BNanjing%252C%2BChina%26doi%3D10.1177%252F2399808320934818" target="_blank"><span data-dcnode-id="4233" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4226" instrument_node="">; Deal et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="4172"><a data-dcnode-id="4224" data-reflink="_i27" data-rid="CIT0012" href="#"><span data-dcnode-id="4225" instrument_node="">2017</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4173"><span class="ref-close" data-dcnode-id="4223" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4222"></span><span data-dcnode-id="4174"><span class="hlFld-ContribAuthor" data-dcnode-id="4218"><span class="NLM_given-names" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">B.</span></span><span data-dcnode-id="4219" instrument_node=""> Deal</span></span><span data-dcnode-id="4217" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4213"><span class="NLM_given-names" data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">H.</span></span><span data-dcnode-id="4214" instrument_node=""> Pan</span></span><span data-dcnode-id="4212" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4208"><span class="NLM_given-names" data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">S.</span></span><span data-dcnode-id="4209" instrument_node=""> Timm</span></span><span data-dcnode-id="4207" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="4203"><span class="NLM_given-names" data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">V.</span></span><span data-dcnode-id="4204" instrument_node=""> Pallathucheril</span></span><span data-dcnode-id="4202" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">The Role of Multidirectional Temporal Analysis in Scenario Planning Exercises and Planning Support Systems</span></span><span data-dcnode-id="4199" instrument_node="">,” </span><i data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">Computers, Environment and Urban Systems</span></i><span data-dcnode-id="4196" instrument_node=""> 64 (</span><span class="NLM_year" data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">2017</span></span><span data-dcnode-id="4193" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">91</span></span><span data-dcnode-id="4190" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">102</span></span><span data-dcnode-id="4187" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4175"><span data-dcnode-id="4186" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4180"><a data-dcnode-id="4184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0012%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.compenvurbsys.2017.01.004" target="_blank"><span data-dcnode-id="4185" instrument_node="">[Crossref]</span></a><span data-dcnode-id="4183" instrument_node="">, </span><a data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0012%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000403623600008" target="_blank"><span data-dcnode-id="4182" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="4176"><span data-dcnode-id="4179" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D64%26publication_year%3D2017%26pages%3D91-102%26author%3DB.%2BDeal%26author%3DH.%2BPan%26author%3DS.%2BTimm%26author%3DV.%2BPallathucheril%26title%3DThe%2BRole%2Bof%2BMultidirectional%2BTemporal%2BAnalysis%2Bin%2BScenario%2BPlanning%2BExercises%2Band%2BPlanning%2BSupport%2BSystems" target="_blank"><span data-dcnode-id="4178" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4171" instrument_node="">). The proposed approach will allow planners to continuously track and analyze public interests through social media and integrate the results with agent-based modelling to support decision-making in future development scenarios.</span></p><p data-dcnode-id="4100"><span data-dcnode-id="4169" instrument_node="">Second, the traditional questionnaire method is integrated with social media data for the purposes of obtaining a more complete understanding of public preferences, and of validating some of the knowledge decoded from social media reviews. On the one hand, the two datasets could reflect different aspects of tourist preferences. Social media, as online communication platforms, have the advantage of obtaining public preferences from the wider public. Yet the comments are often general or limited to certain topics (such as price, food, accommodation, etc.). In our case, with a newly developed tourism park, it is relatively difficult to collect detailed tourists’ itineraries from social media. Questionnaires could well supplement social media as these could provide details regarding itineraries tourists intend to take. The proposed approach takes advantage of the two datasets by incorporating these two aspects. As such, both individual-based space-time behaviors and the preferences of tourism-related activities could be obtained. On the other hand, despite the advantages of social media as aforementioned, social media data are unstructured, vary in quality, and are often of unknown relevance to specific needs (Campagna et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="4102"><a data-dcnode-id="4167" data-reflink="_i27" data-rid="CIT0008" href="#"><span data-dcnode-id="4168" instrument_node="">2015</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4103"><span class="ref-close" data-dcnode-id="4166" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4165"></span><span data-dcnode-id="4104"><span class="hlFld-ContribAuthor" data-dcnode-id="4161"><span class="NLM_given-names" data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">M.</span></span><span data-dcnode-id="4162" instrument_node=""> Campagna</span></span><span data-dcnode-id="4160" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4156"><span class="NLM_given-names" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">R.</span></span><span data-dcnode-id="4157" instrument_node=""> Floris</span></span><span data-dcnode-id="4155" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="4151"><span class="NLM_given-names" data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">P.</span></span><span data-dcnode-id="4152" instrument_node=""> Massa</span></span><span data-dcnode-id="4150" instrument_node="">, “</span><span class="NLM_chapter-title" data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">The Role of Social MediaGeographic Information (SMGI) in Spatial Planning</span></span><span data-dcnode-id="4147" instrument_node="">,” in </span><span class="hlFld-ContribAuthor" data-dcnode-id="4143"><span class="NLM_given-names" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">S.</span></span><span data-dcnode-id="4144" instrument_node=""> Geertman</span></span><span data-dcnode-id="4142" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4138"><span class="NLM_given-names" data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">R.</span></span><span data-dcnode-id="4139" instrument_node=""> Goodspeed</span></span><span data-dcnode-id="4137" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="4133"><span class="NLM_given-names" data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">J.</span></span><span data-dcnode-id="4134" instrument_node=""> Stillwell</span></span><span data-dcnode-id="4132" instrument_node="">, eds, </span><i data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">Planning Support Systems and Smart Cities</span></i><span data-dcnode-id="4129" instrument_node=""> (</span><span class="NLM_publisher-loc" data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Cham</span></span><span data-dcnode-id="4126" instrument_node="">: </span><span class="NLM_publisher-name" data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">Springer</span></span><span data-dcnode-id="4123" instrument_node="">, </span><span class="NLM_year" data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">2015</span></span><span data-dcnode-id="4120" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">41</span></span><span data-dcnode-id="4117" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">60</span></span><span data-dcnode-id="4114" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="4105"><span data-dcnode-id="4113" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4110"><a data-dcnode-id="4111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0008%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1007%252F978-3-319-18368-8_3" target="_blank"><span data-dcnode-id="4112" instrument_node="">[Crossref]</span></a></span><span class="googleScholar-container" data-dcnode-id="4106"><span data-dcnode-id="4109" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2015%26pages%3D41-60%26author%3DM.%2BCampagna%26author%3DR.%2BFloris%26author%3DP.%2BMassa%26title%3DThe%2BRole%2Bof%2BSocial%2BMediaGeographic%2BInformation%2B%2528SMGI%2529%2Bin%2BSpatial%2BPlanning" target="_blank"><span data-dcnode-id="4108" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="4101" instrument_node="">). This study suggests that we can validate the typologies of tourists resulting from social media using questionnaires. While more sound techniques should be developed for cross-validation among different datasets, the endeavor as presented in this study makes one step further in presenting the potential of validating social media data using traditional questionnaire-based data, which could shed light on addressing some of the accuracy and credibility challenges of adopting social media for formal decision-making.</span></p><p data-dcnode-id="3773"><span data-dcnode-id="4099" instrument_node="">In the context of PSS, the field has been increasingly expanded by incorporating new types of big data including social media and new analytical methods to support decision-making (Cai et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="4052"><a data-dcnode-id="4097" data-reflink="_i27" data-rid="CIT0007" href="#"><span data-dcnode-id="4098" instrument_node="">2020</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="4053"><span class="ref-close" data-dcnode-id="4096" tabindex="0"></span><span class="ref-icon" data-dcnode-id="4095"></span><span data-dcnode-id="4054"><span class="hlFld-ContribAuthor" data-dcnode-id="4091"><span class="NLM_given-names" data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">Z. P.</span></span><span data-dcnode-id="4092" instrument_node=""> Cai</span></span><span data-dcnode-id="4090" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4086"><span class="NLM_given-names" data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">B.</span></span><span data-dcnode-id="4087" instrument_node=""> Wang</span></span><span data-dcnode-id="4085" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4081"><span class="NLM_given-names" data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">C.</span></span><span data-dcnode-id="4082" instrument_node=""> Cong</span></span><span data-dcnode-id="4080" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="4076"><span class="NLM_given-names" data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">V.</span></span><span data-dcnode-id="4077" instrument_node=""> Cvetkovic</span></span><span data-dcnode-id="4075" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Spatial Dynamic Modelling for Urban Scenario Planning: A Case Study of Nanjing, China</span></span><span data-dcnode-id="4072" instrument_node="">,” </span><i data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">Environment and Planning B: Urban Analytics and City Science</span></i><span data-dcnode-id="4069" instrument_node=""> (</span><span class="NLM_year" data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">2020</span></span><span data-dcnode-id="4066" instrument_node="">) doi </span><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/2399808320934818"><span data-dcnode-id="4065" instrument_node="">https://doi.org/10.1177/2399808320934818</span></a><span class="refLink-block" data-dcnode-id="4055"><span data-dcnode-id="4063" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="4060"><a data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0007%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987% 5"><span data-dcnode-id="4036" instrument_node="">S. N.</span></span><span data-dcnode-id="4034" instrument_node=""> Lieske</span></span><span data-dcnode-id="4032" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4028"><span class="NLM_given-names" data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">S.</span></span><span data-dcnode-id="4029" instrument_node=""> Glackin</span></span><span data-dcnode-id="4027" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4023"><span class="NLM_given-names" data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">G.</span></span><span data-dcnode-id="4024" instrument_node=""> Thomson</span></span><span data-dcnode-id="4022" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4018"><span class="NLM_given-names" data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">H.</span></span><span data-dcnode-id="4019" instrument_node=""> Shearer</span></span><span data-dcnode-id="4017" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="4013"><span class="NLM_given-names" data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">H.</span></span><span data-dcnode-id="4014" instrument_node=""> Dai</span></span><span data-dcnode-id="4012" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="4008"><span class="NLM_given-names" data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">P.</span></span><span data-dcnode-id="4009" instrument_node=""> Newman</span></span><span data-dcnode-id="4007" instrument_node="">, </span><span class="NLM_article-title" data-dcnode-id="4003"><span data-dcnode-id="4006" instrument_node="">“Planning Support Systems for Smart Cities,” </span><i data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">City</span></i></span><i data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">,</span></i><span data-dcnode-id="4000" instrument_node=""> </span><i data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Culture and Society</span></i><span data-dcnode-id="3997" instrument_node=""> 12 (</span><span class="NLM_year" data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">2018</span></span><span data-dcnode-id="3994" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">13</span></span><span data-dcnode-id="3991" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">24</span></span><span data-dcnode-id="3988" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="3982"><span data-dcnode-id="3987" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="3986"></span><span class="googleScholar-container" data-dcnode-id="3983"><a class="google-scholar" data-dcnode-id="3984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D12%26publication_year%3D2018%26pages%3D13-24%26author%3DC.%2BPettit%26author%3DA.%2BBakelmun%26author%3DS.%2BN.%2BLieske%26author%3DS.%2BGlackin%26author%3DG.%2BThomson%26author%3DH.%2BShearer%26author%3DH.%2BDai%26author%3DP.%2BNewman%26title%3D%25E2%2580%259CPlanning%2BSupport%2BSystems%2Bfor%2BSmart%2BCities%252C%25E2%2580%259D%2BCity" target="_blank"><span data-dcnode-id="3985" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="3978" instrument_node="">). This paper contributes to the emerging efforts by proposing a practical approach that links different types of data to benefit tourism-related decision-making. Moreover, previous studies consider that it is challenging to use social media for long-term planning (Shreenath and Meijer, </span><span class="ref-lnk lazy-ref" data-dcnode-id="3911"><a data-dcnode-id= ref" data-dcnode-id="3775"><a data-dcnode-id="3824" data-reflink="_i27" data-rid="CIT0040" href="#"><span data-dcnode-id="3825" instrument_node="">2020</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3776"><span class="ref-close" data-dcnode-id="3823" tabindex="0"></span><span class="ref-icon" data-dcnode-id="3822"></span><span data-dcnode-id="3777"><span class="hlFld-ContribAuthor" data-dcnode-id="3818"><span class="NLM_given-names" data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">B.</span></span><span data-dcnode-id="3819" instrument_node=""> Wang</span></span><span data-dcnode-id="3817" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="3813"><span class="NLM_given-names" data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">B. P. Y.</span></span><span data-dcnode-id="3814" instrument_node=""> Loo</span></span><span data-dcnode-id="3812" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="3808"><span class="NLM_given-names" data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">F.</span></span><span data-dcnode-id="3809" instrument_node=""> Zhen</span></span><span data-dcnode-id="3807" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="3803"><span class="NLM_given-names" data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">G. L.</span></span><span data-dcnode-id="3804" instrument_node=""> Xi</span></span><span data-dcnode-id="3802" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">Urban Resilience from the Lens of Social Media Data: Responses to Urban Flooding in Nanjing, China</span></span><span data-dcnode-id="3799" instrument_node="">,” </span><i data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">Cities</span></i><span data-dcnode-id="3796" instrument_node=""> 106 (</span><span class="NLM_year" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">2020</span></span><span data-dcnode-id="3793" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">102884</span></span><span data-dcnode-id="3790" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="3778"><span data-dcnode-id="3789" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="3783"><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0040%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.cities.2020.102884" target="_blank"><span data-dcnode-id="3788" instrument_node="">[Crossref]</span></a><span data-dcnode-id="3786" instrument_node="">, </span><a data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0040%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000576636800001" target="_blank"><span data-dcnode-id="3785" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="3779"><span data-dcnode-id="3782" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D106%26publication_year%3D2020%26pages%3D102884%26author%3DB.%2BWang%26author%3DB.%2BP.%2BY.%2BLoo%26author%3DF.%2BZhen%26author%3DG.%2BL.%2BXi%26title%3DUrban%2BResilience%2Bfrom%2Bthe%2BLens%2Bof%2BSocial%2BMedia%2BData%253A%2BResponses%2Bto%2BUrban%2BFlooding%2Bin%2BNanjing%252C%2BChina" target="_blank"><span data-dcnode-id="3781" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="3774" instrument_node="">). The public opinions can be further integrated with human movement patterns, collected by methods such as questionnaires, GPS records, or online digital tracing, to provide decision-makers with knowledge about how people may interact with urban facilities and environments.</span></p><p data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">Despite the contributions of this study, there are several remaining challenges that should be addressed in future studies. First, considering that Zaolinwan Park mainly aims to attract tourists from the Yangtze River Delta Region and that the majority of tourists identified from both social media and questionnaires are from the same region, the proposed approach does not differentiate tourists from different origins. For tourist sites whose target customers are from more diverse origins (e.g., international tourists), there might be a need to differentiate local tourists and non-local tourists, given that their tourism behaviors may vary drastically. It is also important to consider the differences of tourism behaviors across groups of different socioeconomic status. In this case, a more detailed division of agents should be included in the model to simulate varying tourist preferences possessed by tourists with divergent backgrounds. Second, while the approach as presented in this study can serve as a methodological framework to support the exploration of tourism dynamics, more real-world data are necessary to validate the proposed model and enable its predictive use. In this study, the proposed approach is only applied to one planning scenario. Along with the development of the tourism park, planners can use the approach to simulate tourist decision-making under different planning scenarios and with different parameters (e.g., the number of tourists per day). With more real-world monitoring data about the tourism dynamics in the park, planners can further calibrate and verify the model by comparing the modelling results with real-world situations.</span></p><p data-dcnode-id="3571"><span data-dcnode-id="3770" instrument_node="">In addition, despite the technical focus of this paper, future research should further examine how social-media-based practices may fit into formal decision-making procedures by addressing various organizational, institutional, technical, and legislative factors. In practice, official planning agencies need to consider how many human and financial resources need to be allocated for the new practice; whether the new practice conflicts with existing frameworks and procedures; whether new strategies, procedures, policies, and legislation need to be established; and whether new tools and systems need to be developed and how are they compatible with the legacy IT systems of the organization (Bertot et al., </span><span class="ref-lnk lazy-ref" data-dcnode-id="3721"><a data-dcnode-id="3768" data-reflink="_i27" data-rid="CIT0004" href="#"><span data-dcnode-id="3769" instrument_node="">2016</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3722"><span class="ref-close" data-dcnode-id="3767" tabindex="0"></span><span class="ref-icon" data-dcnode-id="3766"></span><span data-dcnode-id="3723"><span class="hlFld-ContribAuthor" data-dcnode-id="3762"><span class="NLM_given-names" data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">J.</span></span><span data-dcnode-id="3763" instrument_node=""> Bertot</span></span><span data-dcnode-id="3761" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="3757"><span class="NLM_given-names" data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">E.</span></span><span data-dcnode-id="3758" instrument_node=""> Estevez</span></span><span data-dcnode-id="3756" instrument_node="">, and </span><span class="hlFld-ContribAuthor" data-dcnode-id="3752"><span class="NLM_given-names" data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">T.</span></span><span data-dcnode-id="3753" instrument_node=""> Janowski</span></span><span data-dcnode-id="3751" instrument_node="">, “</span><span class="NLM_article-title" data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Universal and Contextualized Public Services: Digital Public Service Innovation Framework</span></span><span data-dcnode-id="3748" instrument_node="">,” </span><i data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">Government Information Quarterly</span></i><span data-dcnode-id="3745" instrument_node=""> 33: 2 (</span><span class="NLM_year" data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">2016</span></span><span data-dcnode-id="3742" instrument_node="">) </span><span class="NLM_fpage" data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">211</span></span><span data-dcnode-id="3739" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">222</span></span><span data-dcnode-id="3736" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="3724"><span data-dcnode-id="3735" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="3729"><a data-dcnode-id="3733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0004%26dbid%3D16%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D10.1016%252Fj.giq.2016.05.004" target="_blank"><span data-dcnode-id="3734" instrument_node="">[Crossref]</span></a><span data-dcnode-id="3732" instrument_node="">, </span><a data-dcnode-id="3730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0004%26dbid%3D128%26doi%3D10.1080%252F10630732.2020.1847987%26key%3D000378759100001" target="_blank"><span data-dcnode-id="3731" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="3725"><span data-dcnode
