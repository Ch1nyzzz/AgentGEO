</span><div class="entry-meta" data-dcnode-id="1604"><a class="entry-date published" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedayitinerary.com/one-day-in-beijing-itinerary/"><span data-dcnode-id="1611" instrument_node="">May 31, 2019</span></a><time class="updated" data-dcnode-id="1608" datetime="2020-01-21T12:20:10+01:00"><span data-dcnode-id="1609" instrument_node="">January 21, 2020</span></time><span class="byline vcard" data-dcnode-id="1605"><a class="url fn n molongui-disabled-link" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Anca B.</span></a></span></div><h1 class="entry-title" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">
One Day in Beijing Itinerary – Top Things to Do in Beijing, China</span></h1><span data-dcnode-id="1601" instrument_node="">
</span><div class="entry-content" data-dcnode-id="833"><span data-dcnode-id="1600" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1595"><em data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">It is hard to conceptualize a city like Beijing unless you experience it first-hand. With almost 22 million people milling around, going about their daily lives, ambitious urban projects underway in the background, all one well-oiled machine, working in perfect harmony day after day, growing and expanding with layers of culture and history over three millennia. Jam-packed with ancient sites and marvels of modern architecture, Beijing, the sprawling capital of China, is representative of everything modern China is about – the good and the bad. </span></em><em data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Reminders of former imperial glory such as the magnificent Forbidden City stand side-by-side with Tiananmen Square, the site of Mao Zedong’s mausoleum and a permanent reminder of the communist revolution that transformed China’s political and cultural identity. But Beijing is so much more – with numerous exciting cultural events happening year-round, with attractive art exhibitions, picturesque gardens, sprawling architectural complexes, and seven UNESCO World Heritage Sites located in or around the city, including The Great Wall, a timeless man-made wonder meandering through the surrounding valleys and mountains. If China is the future, then Beijing is both its prow and its anchor, at the forefront of all new developments, but still deeply rooted in history and centuries-old cultural identity.</span></em></p><span data-dcnode-id="1594" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1592"><img alt="One day in Beijing Itinerary" class="wp-image-10450" data-attachment-id="10450" data-comments-opened="1" data-dcnode-id="1593" data-image-caption="" data-image-description="<p>One day in Beijing Itinerary</p>" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="One day in Beijing Itinerary" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?fit=723%2C542&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?fit=300%2C225&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?fit=800%2C600&amp;ssl=1" data-orig-size="800,600" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/one-day-in-beijing-itinerary-1/" height="451" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg%3Fresize%3D723%252C542&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?w=800&amp;ssl=1 800w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?resize=300%2C225&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?resize=768%2C576&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?resize=450%2C338&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?resize=600%2C450&amp;ssl=1 600w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?resize=60%2C45&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?resize=550%2C413&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?resize=400%2C300&amp;ssl=1 400w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/06/One-day-in-Beijing-Itinerary-1.jpg?resize=220%2C165&amp;ssl=1 220w" width="602"></figure><span data-dcnode-id="1591" instrument_node="">

</span><h2 data-dcnode-id="1574"><strong data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">WHAT’S THE BEST TIME TO VISIT BEIJING?</span></strong></h2><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1572" instrument_node="">There are two major things to take into account when choosing when to visit Beijing. One of them is the weather, and the other one the </span><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Chinese national holidays</span></strong><span data-dcnode-id="1569" instrument_node=""> that you will have to try to plan your trip around in case you want to avoid high hotel rates and long waiting lines basically everywhere you go. The weather in Beijing is relatively typical, with </span><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">four distinct seasons</span></strong><span data-dcnode-id="1566" instrument_node="">. The spring is quite short and windy, the summers are long and hot, the autumn pleasant and cool, and the winter long and freezing. To avoid the extremes (37 °C/99 °F in August and July, -15 °C/5 °F in January), the best time to visit Beijing is either </span><strong data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">between March and May or September to October</span></strong><span data-dcnode-id="1563" instrument_node="">. </span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1560" instrument_node="">Overall, </span><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">autumn is the best season</span></strong><span data-dcnode-id="1557" instrument_node=""> due to warm, dry and sunny days and pleasant, cool evenings. As for the holidays, steer clear of International New Year, Chinese New Year, Qing Ming Jie (Tomb Sweeping Day) in April, Labor Day (May 1</span><sup data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">st</span></sup><span data-dcnode-id="1554" instrument_node="">), Dragon Boat Festival in June, Mid-Autumn Festival in September, and the National Holiday (October 1</span><sup data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">st</span></sup><span data-dcnode-id="1551" instrument_node="">-7</span><sup data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">th</span></sup><span data-dcnode-id="1548" instrument_node="">). The reason why these holidays may be a poor choice are the high prices and overcrowded public areas. However, if you are a fan of festivals, you might as well give it a go. </span></p><span data-dcnode-id="1546" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1540"><img alt="Tiananmen Square" class="wp-image-10411" data-attachment-id="10411" data-comments-opened="1" data-dcnode-id="1545" data-image-caption="<p>Tiananmen Square</p>" data-image-description="<p>Tiananmen Square</p>" data-image-meta="{&quot;aperture&quot;:&quot;8&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D600&quot;,&quot;caption&quot;:&quot;Tiananmen Square&quot;,&quot;created_timestamp&quot;:&quot;1367013312&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;28&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.004&quot;,&quot;title&quot;:&quot;Tiananmen Square&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Tiananmen Square, Beijing" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/tiananmen-square/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1541"><span data-dcnode-id="1544" instrument_node="">Tiananmen Square, Source: Flickr, Author: xiquinhosilva </span><br data-dcnode-id="1543"><br data-dcnode-id="1542"></figcaption></figure><span data-dcnode-id="1539" instrument_node="">
</span><h2 data-dcnode-id="1536"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">A FEW FACTS ABOUT BEIJING</span></strong></h2><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1534" instrument_node="">With history going back </span><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">3,000 years</span></strong><span data-dcnode-id="1531" instrument_node="">, Beijing is </span><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">among the oldest cities</span></strong><span data-dcnode-id="1528" instrument_node=""> in the world, close to the same age as London. The area of Beijing is also one of the oldest inhabited areas, with recovered fossils of the </span><strong data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Peking Man</span></strong><span data-dcnode-id="1525" instrument_node=""> (Homo Erectus) indicating that human ancestors inhabited the area from 770,000 to 230,000 years ago. Today, the fossils can be seen at the Peking Man World Heritage Site at Zhoukoudian. During the course of its history, </span><strong data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Beijing had many names</span></strong><span data-dcnode-id="1522" instrument_node="">, such as Jicheng (‘City of Ji’), Beiping (‘Central Peace’), Yanjing (Capital of Yan’), Zhongdu (‘Central Capital’), Nanjing (‘Southern Capital’), Dadu (‘Great Capital’), and many others. </span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1519" instrument_node="">The name </span><strong data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Beijing, meaning ‘Northern Capital’</span></strong><span data-dcnode-id="1516" instrument_node="">, was the city’s 16</span><sup data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">th</span></sup><span data-dcnode-id="1513" instrument_node=""> name, adopted in 1403. As mentioned earlier, Beijing has seven UNESCO World Heritage Sites. These are the Forbidden City, the Temple of Heaven, the Summer Palace, the Ming Tombs, the Peking Man Site at Zhoukoudian, parts of the Great Wall, and the Grand Canal, also known the Jing–Hang Grand Canal among the Chinese. When it comes to lesser-known facts, in 2022, Beijing will become the first city to host both the Summer and the Winter Olympic Games when the 2022 Winter Olympics are held there. </span></p><span data-dcnode-id="1511" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1505"><img alt="Streets of Beijing" class="wp-image-10406" data-attachment-id="10406" data-comments-opened="1" data-dcnode-id="1510" data-image-caption="<p>Streets of Beijing</p>" data-image-description="<p>Streets of Beijing</p>" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;PENTAX K-30&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1436543499&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;10&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.0055555555555556&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Streets of Beijing" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/streets-of-beijing/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Streets-of-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1506"><span data-dcnode-id="1509" instrument_node="">Streets of Beijing, Source: Flickr, Author: Rob Oo</span><br data-dcnode-id="1508"><br data-dcnode-id="1507"></figcaption></figure><span data-dcnode-id="1504" instrument_node="">
</span><h2 data-dcnode-id="1501"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">ONE DAY IN BEIJING ITINERARY</span></strong></h2><span data-dcnode-id="1500" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1496"><span data-dcnode-id="1499" instrument_node="">Follow this guide and make the most of your trip even if you’re short on time. These are the top sights and things to do on your one day in Beijing.</span><br data-dcnode-id="1498"><br data-dcnode-id="1497"></p><span data-dcnode-id="1495" instrument_node="">
</span><h3 data-dcnode-id="1492"><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Plan to Start Your Day
Early</span></strong></h3><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node="">In order to have enough time for all the top things to do in Beijing, you will have to start your day early, </span><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">around 6 AM</span></strong><span data-dcnode-id="1487" instrument_node="">. While it may seem too early, almost all visitors recommend getting to the most popular landmarks early in the day. In the afternoon, sometimes it is near-impossible to come close to a popular attraction. </span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1484" instrument_node="">For example, the Temple of Heaven sees most of its visitors around 3 PM. It is hard to predict how long you’ll have to </span><strong data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">wait in line</span></strong><span data-dcnode-id="1481" instrument_node=""> in order to see a landmark or enter a museum, which is why you’ll have to take the wait times into consideration and make </span><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">reservations in advance whenever you can</span></strong><span data-dcnode-id="1478" instrument_node=""> to make your one day in Beijing as enjoyable and stress-free as possible.</span><br data-dcnode-id="1477"><br data-dcnode-id="1476"></p><span data-dcnode-id="1474" instrument_node="">
</span><h3 data-dcnode-id="1471"><strong data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Visit the Temple of
Heaven First</span></strong></h3><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1469" instrument_node="">Located in
the southeastern part of central Beijing, the </span><a class="external" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple_of_Heaven" rel="nofollow" target="_blank"><strong data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Temple of Heaven</span></strong></a><span data-dcnode-id="1465" instrument_node=""> is a famous imperial temple complex </span><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">built in 1420</span></strong><span data-dcnode-id="1462" instrument_node="">. Occupying 267 hectares
(660 acres), the Temple of Heaven (with the surrounding complex) is the largest
religious building in China. In the past, it was used for prayer by the Ming
and Qing emperors during annual ceremonies. Today, there are several
playgrounds and recreation grounds within the complex, making it a popular
destination for families and adults looking to relax or work out. Some of the
side buildings and open spaces host regular presentations, choral shows, ethnic
dances, and so on. The </span><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">complex is open
6AM–8PM</span></strong><span data-dcnode-id="1459" instrument_node="">, although the central building closes earlier, at 4PM.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1451"><img alt="Temple of Heaven" class="wp-image-10408" data-attachment-id="10408" data-comments-opened="1" data-dcnode-id="1456" data-image-caption="<p>Temple of Heaven</p>" data-image-description="<p>Temple of Heaven</p>" data-image-meta="{&quot;aperture&quot;:&quot;7.1&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D600&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1367073329&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;28&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.005&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Temple of Heaven, Beijing" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/temple-of-heaven-beijing/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Temple-of-Heaven-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1452"><span data-dcnode-id="1455" instrument_node="">Temple of Heaven, Source: Flickr, Author: xiquinhosilva </span><br data-dcnode-id="1454"><br data-dcnode-id="1453"></figcaption></figure><span data-dcnode-id="1450" instrument_node="">
</span><h3 data-dcnode-id="1447"><strong data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Explore Tiananmen
Square</span></strong></h3><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1445" instrument_node="">One of the most important places to see in Beijing after the Temple of Heaven is </span><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Tiananmen Square</span></strong><span data-dcnode-id="1442" instrument_node="">, situated almost directly to the north. If you hail a taxi, you can get there in 15 minutes, while walking the entire 3.7 km stretch may take around 45 minutes. The square is </span><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">one of the largest city squares in the world</span></strong><span data-dcnode-id="1439" instrument_node="">, notable for its impressive 37m obelisk and other landmarks such as the Chairman Mao Zedong Memorial Hall, the Great Hall of the People, the National Museum of China, and others. </span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1436" instrument_node="">Mao’s embalmed body is housed in the Memorial Hall, which is symbolic since Mao proclaimed the </span><strong data-dcnode-id="1431"><span data-dcnode-id="1435" instrument_node="">founding of the People’s Republic of China in Tiananmen Square on October 1</span><sup data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">st</span></sup><span data-dcnode-id="1432" instrument_node=""> 1949</span></strong><span data-dcnode-id="1430" instrument_node="">. The anniversary is still celebrated on the square, attracting up to 1 million people, all of them standing shoulder-to-shoulder. In the West, the square is famous for the </span><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">1989 Tiananmen Square protests</span></strong><span data-dcnode-id="1427" instrument_node=""> or the June Fourth Incident as the Chinese call it, which produced (among other things) the iconic “Tank Man” image, now a widely recognizable symbol of civil disobedience. Ironically, or perhaps fittingly, you are required to show your passport upon entering the square.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1419"><img alt="Tiananmen Square" class="wp-image-10410" data-attachment-id="10410" data-comments-opened="1" data-dcnode-id="1424" data-image-caption="<p>Tiananmen Square</p>" data-image-description="<p>Tiananmen Square</p>" data-image-meta="{&quot;aperture&quot;:&quot;4&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;Canon EOS 5D Mark III&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1479909340&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;21&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.0125&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Tiananmen Square, Beijing (2)" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/tiananmen-square-beijing-2/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Tiananmen-Square-Beijing-2.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1420"><span data-dcnode-id="1423" instrument_node="">Tiananmen Square</span><br data-dcnode-id="1422"><br data-dcnode-id="1421"></figcaption></figure><span data-dcnode-id="1418" instrument_node="">
</span><h3 data-dcnode-id="1415"><strong data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Consider Visiting the
Mausoleum of Mao Zedong</span></strong></h3><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1413" instrument_node="">If you
want, you can enter the </span><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Chairman Mao Zedong
Memorial Hall</span></strong><span data-dcnode-id="1410" instrument_node=""> and see
his embalmed body in a crystal coffin. Depending on who you ask, the experience
can be described as eerie, ridiculous, or exciting, but it is undoubtedly among
the more unusual things to do in Beijing. There is a huge queue that forms
every morning, but it moves fast, and you have about a minute in the Central
Hall to feel the atmosphere of reverence and the heavy weight of history
hanging over the place. </span></p><span data-dcnode-id="1408" instrument_node="">

erary.com/wp-content/uploads/2019/05/Mao-Zedong-Memorial-Hall-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Mao-Zedong-Memorial-Hall-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Mao-Zedong-Memorial-Hall-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Mao-Zedong-Memorial-Hall-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Mao-Zedong-Memorial-Hall-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Mao-Zedong-Memorial-Hall-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1403"><span data-dcnode-id="1406" instrument_node="">Mao Zedong Memorial Hall, Source: Flickr, Author: xiquinhosilva </span><br data-dcnode-id="1405"><br data-dcnode-id="1404"></figcaption></figure><span data-dcnode-id="1401" instrument_node="">
</span><h3 data-dcnode-id="1398"><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Take a Trip Back in
Time at the Forbidden City</span></strong></h3><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1396" instrument_node="">The next stop, the </span><strong data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">legendary Forbidden City</span></strong><span data-dcnode-id="1393" instrument_node="">, is located about 1.4 km north of Tiananmen Square, so you can easily get there in 15 minutes or less on foot. The Forbidden City’s monumental entrance is just across Chang’an Avenue. Formerly an enormous imperial palace reflecting the unlimited power and wealth of the Chinese emperors from the Ming dynasty to the end of the Qing dynasty (</span><strong data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">between 1420 and 1912</span></strong><span data-dcnode-id="1390" instrument_node="">), the Forbidden City was more than just a lavish, opulent home. It as the de-facto seat of government and the most important political center in the country. </span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1387" instrument_node="">With 980 buildings in total, the complex occupies 72 hectares (more than 180 acres). A perfect example of traditional Chinese architecture, the Forbidden City has exerted an immense influence on the culture and architecture of the entire region in Asia, way beyond the borders of imperial China. Due to its immeasurable significance, it has been listed as a World Heritage Site by UNESCO in 1987, with a special emphasis placed on the Forbidden City </span><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">being the largest collection of preserved ancient wooden structures anywhere in the world</span></strong><span data-dcnode-id="1384" instrument_node="">.</span></p><span data-dcnode-id="1382" instrument_node="">

</span><h3 data-dcnode-id="1367"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Explore the Palace
Complex and the Museum</span></strong></h3><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node="">Today, the Forbidden City is managed by the </span><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Palace Museum (since 1925),</span></strong><span data-dcnode-id="1362" instrument_node=""> with an unparalleled collection of ancient artefacts and artwork, containing the original imperial collections, as well as numerous priceless pieces that have been added since. You need to come prepared, knowing that the place will be very crowded. After all, 15 million visitors admire the exhibitions every year. It is worth it, though, and the audio guide is available in multiple languages, providing for an informative, exciting experience. </span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1359" instrument_node="">There is one thing you absolutely must do in Beijing, however. Always </span><strong data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">book everything in advance</span></strong><span data-dcnode-id="1356" instrument_node="">. You can buy the tickets to the Forbidden City </span><a class="external" data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gugong.228.com.cn/" rel="nofollow" target="_blank"><span data-dcnode-id="1355" instrument_node="">here</span></a><span data-dcnode-id="1353" instrument_node="">. After exploring the Forbidden City, stick around for a couple of minutes and check out the nearby </span><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Beihai Park,</span></strong><span data-dcnode-id="1350" instrument_node=""> a gorgeous former imperial park with a large lake. In the vicinity, there are several “Hutong” streets. </span><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Hutong</span></strong><span data-dcnode-id="1347" instrument_node=""> are a particular type of street/narrow alley usually associated with Beijing, formed by joining old courtyard residences and forming a neighborhood. </span></p><span data-dcnode-id="1345" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1339"><img alt="The Palace Museum" class="wp-image-10409" data-attachment-id="10409" data-comments-opened="1" data-dcnode-id="1344" data-image-caption="<p>The Palace Museum</p>" data-image-description="<p>The Palace Museum</p>" data-image-meta="{&quot;aperture&quot;:&quot;8&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D600&quot;,&quot;caption&quot;:&quot;Gate of Heavenly Peace&quot;,&quot;created_timestamp&quot;:&quot;1367015318&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;34&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.004&quot;,&quot;title&quot;:&quot;Gate of Heavenly Peace&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="The Palace Museum, Beijing" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/gate-of-heavenly-peace/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/The-Palace-Museum-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1340"><span data-dcnode-id="1343" instrument_node="">The Palace Museum, Source: Flickr, Author: xiquinhosilva </span><br data-dcnode-id="1342"><br data-dcnode-id="1341"></figcaption></figure><span data-dcnode-id="1338" instrument_node="">
</span><h3 data-dcnode-id="1335"><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Take a Taxi to Lama
Temple</span></strong></h3><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1321"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Lama Temple</span></strong><span data-dcnode-id="1331" instrument_node=""> is a colorful, masterfully built Buddhist temple on 12 Yonghegong Street, approx. 20 minutes by car from the Forbidden City due north. The temple was built in </span><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">1694</span></strong><span data-dcnode-id="1328" instrument_node=""> as a series of beautiful pavilions with bronze statues, incense burners, and a large </span><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">fifty-four-foot high Buddha </span></strong><span data-dcnode-id="1325" instrument_node="">statue made from Tibetan sandalwood. The temple is a great place to seek refuge from the large spaces and hordes of tourists at Tiananmen Square and the Forbidden City. You will love the serenity of the </span><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">spread-out courtyards and halls</span></strong><span data-dcnode-id="1322" instrument_node="">. </span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">If you want to see everything, it may take as much as an hour and a half, but you should just take a leisurely stroll, relax and feel the atmosphere, and move on as soon as you feel ready, in order to save some time for all of the other things to do in Beijing.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1311"><img alt="Lama Temple" class="wp-image-10401" data-attachment-id="10401" data-comments-opened="1" data-dcnode-id="1316" data-image-caption="<p>Lama Temple</p>" data-image-description="<p>Lama Temple</p>" data-image-meta="{&quot;aperture&quot;:&quot;8&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D600&quot;,&quot;caption&quot;:&quot;Lama Temple&quot;,&quot;created_timestamp&quot;:&quot;1367444307&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;32&quot;,&quot;iso&quot;:&quot;125&quot;,&quot;shutter_speed&quot;:&quot;0.004&quot;,&quot;title&quot;:&quot;Lama Temple&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Lama Temple, Beijing" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/lama-temple/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Lama-Temple-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1312"><span data-dcnode-id="1315" instrument_node="">Lama Temple, Source: Flickr, Author: xiquinhosilva</span><br data-dcnode-id="1314"><br data-dcnode-id="1313"></figcaption></figure><span data-dcnode-id="1310" instrument_node="">
</span><h3 data-dcnode-id="1307"><strong data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Choose a Nearby
Restaurant for Lunch</span></strong></h3><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1305" instrument_node="">After a hectic morning and a few moments of repose at Lama Temple, it should already be around 2 PM. Since you’ll probably feel pretty famished by then, plan to have lunch at a nearby restaurant. There are many great restaurants in Beijing, but not all of them serve food that is very popular among Westerners. Luckily, there’s a great option </span><strong data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">just across the street from Lama Temple</span></strong><span data-dcnode-id="1302" instrument_node="">. </span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1296"><strong data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">King’s Joy Beijing </span></strong><span data-dcnode-id="1297" instrument_node="">is an upscale restaurant specializing in vegetarian and vegan food inspired by local Chinese and Asian cuisine. The restaurant is a favorite among Beijing’s elite, frequently attracting celebrities and dignitaries with creative menu entries such as sweet and sour monkey’s head mushrooms, savory tofu kebabs, and sushi-inspired dragonfruit rolls -all of them completely meat-free, yet compromising nothing when it comes to taste and diversity. </span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1294" instrument_node="">If you are just </span><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">looking for a quick bite</span></strong><span data-dcnode-id="1291" instrument_node="">, however, the </span><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">nearby KFC</span></strong><span data-dcnode-id="1288" instrument_node=""> will do the trick, especially if you are not in the mood for experimentation and crave the reliability of an American fast-food chain. </span><br data-dcnode-id="1287"><br data-dcnode-id="1286"></p><span data-dcnode-id="1284" instrument_node="">
</span><h3 data-dcnode-id="1281"><strong data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Visit the Summer Palace</span></strong></h3><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1279" instrument_node="">Located almost 19 km from King’s Joy Beijing and Lama Temple, the </span><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Summer Palace</span></strong><span data-dcnode-id="1276" instrument_node=""> is another famous Beijing landmark that is best reached by car/taxi. It takes about 30 minutes to get to this stunning lakefront palace, formerly a cloistered retreat for members of the Chinese imperial family. The palace was first built in 1750, but was later mostly destroyed in the war of 1860. It was eventually completely restored in 1886, remaining to this day an exemplary masterpiece of Chinese landscape garden design. </span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1273" instrument_node="">What makes the </span><a class="external" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Summer_Palace" rel="nofollow" target="_blank"><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Summer Palace</span></strong></a><strong data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node=""> </span></strong><span data-dcnode-id="1267" instrument_node="">truly special is how artificial features such as palaces, pavilions, bridges, and temples perfectly complement the natural characteristics of the landscape, forming </span><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">one harmonious whole</span></strong><span data-dcnode-id="1264" instrument_node=""> with the open water and the lush green hills. Due to its unique aesthetic value and significance as an impressive symbol of one of the world’s oldest civilizations, the Summer Palace was added to </span><strong data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">UNESCO’s list of World Heritage Sites in 1998</span></strong><span data-dcnode-id="1261" instrument_node="">.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1253"><img alt="Summer Palace" class="wp-image-10407" data-attachment-id="10407" data-comments-opened="1" data-dcnode-id="1258" data-image-caption="<p>Summer Palace</p>" data-image-description="<p>Summer Palace</p>" data-image-meta="{&quot;aperture&quot;:&quot;5.6&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D600&quot;,&quot;caption&quot;:&quot;Summer Palace&quot;,&quot;created_timestamp&quot;:&quot;1367110308&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;36&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.005&quot;,&quot;title&quot;:&quot;Summer Palace&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Summer Palace, Beijing" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/summer-palace/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Summer-Palace-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1254"><span data-dcnode-id="1257" instrument_node="">Summer Palace, Source: Flickr, Author: xiquinhosilva </span><br data-dcnode-id="1256"><br data-dcnode-id="1255"></figcaption></figure><span data-dcnode-id="1252" instrument_node="">
</span><h3 data-dcnode-id="1249"><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Go for a Short Walk to
Kunming Lake</span></strong></h3><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1247" instrument_node="">While at the </span><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Summer Palace</span></strong><span data-dcnode-id="1244" instrument_node="">, take the time to explore the palace grounds and the surrounding scenic spots, including numerous temples, bridges, secluded gardens, and narrow paths. Take a short walk south and admire </span><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Kunming Lake</span></strong><span data-dcnode-id="1241" instrument_node="">, the central lake on the palace grounds. It is a pretty shallow man-made lake, but it covers a large area – 2.2 square kilometers (0.8 sq. mi), nearly three quarters of the grounds. </span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node="">The predecessors of Kunming Lake, Xihu Lake and Wengshan (Jar Hill) had been used for irrigation over a period of three-and-a-half millennia before being developed into a reservoir for the capital in 1291. When the gardens around the Summer Palace were being created, </span><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">10,000 laborers were put to work </span></strong><span data-dcnode-id="1235" instrument_node="">on digging up and expanding the lake. When you look upon the serene waters and the large expanse that the lake is covering, it is hard to imagine that this could be the work of human hands. </span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1232" instrument_node="">Go for a stroll along the lake and explore the area until nightfall. The long land bridge separating Kunming Lake and West Lake diagonally is a perfect spot to snap some </span><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">amazing photos of the Summer Palace</span></strong><span data-dcnode-id="1229" instrument_node=""> from across the water, especially around sunset, with golden rays of sunshine falling over the ornate rooftops.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1221"><img alt="Kunming Lake" class="wp-image-10400" data-attachment-id="10400" data-comments-opened="1" data-dcnode-id="1226" data-image-caption="<p>Kunming Lake</p>" data-image-description="<p>Kunming Lake</p>" data-image-meta="{&quot;aperture&quot;:&quot;5.6&quot;,&quot;credit&quot;:&quot;Nikolaj Potanin&quot;,&quot;camera&quot;:&quot;Canon EOS 50D&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1374709906&quot;,&quot;copyright&quot;:&quot;Copyright: Nikolaj Potanin&quot;,&quot;focal_length&quot;:&quot;18&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.0025&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Kunming Lake, Beijing" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/kunming-lake-beijing/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Kunming-Lake-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"><figcaption data-dcnode-id="1222"><span data-dcnode-id="1225" instrument_node="">Kunming Lake, Source: Flickr, Author: Nikolaj Potanin </span><br data-dcnode-id="1224"><br data-dcnode-id="1223"></figcaption></figure><span data-dcnode-id="1220" instrument_node="">
</span><h3 data-dcnode-id="1217"><strong data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Try the Original
Peking Duck</span></strong></h3><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1215" instrument_node="">Trying the legendary Peking duck is one of those things that you absolutely must do in Beijing. A famous dish that has been prepared since the Imperial era, </span><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Peking duck</span></strong><span data-dcnode-id="1212" instrument_node=""> is characterized by its crisp, thin skin and special seasoning. For the ultimate roasted duck in Beijing, whether you are looking for the traditional experience (mostly just skin, very little meat), or a contemporary take on the renowned dish, visit </span><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Li Qun Roast Duck Restaurant.</span></strong><span data-dcnode-id="1209" instrument_node=""> The interior feels very 80s, and you can tell that it doesn’t try to impress with upscale décor and touristy bells and whistles. Instead, the focus is on the food itself, and, seeing as a lot of locals go there, they must be doing something right. </span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">If you are looking for unusual things to do in Beijing and you’d love to try something completely new, order the duck intestines with green pepper or chili sauce or the braised duck gizzard. The restaurant is located on 11 Beixiangfeng Hutong in Dongcheng Qu district). You can get there by hopping aboard the Subway Line 4 Daxing Line from Beigongmen. Hiring a taxi may be a good option, too. </span></p><span data-dcnode-id="1204" instrument_node="">

dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/cn/raffles-beijing-beijing.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DBeijingWTS" rel="nofollow" target="_blank"><span data-dcnode-id="1175" instrument_node="">Beijing Hotel NUO Forbidden City</span></a><span data-dcnode-id="1173" instrument_node=""> </span></strong><span data-dcnode-id="1171" instrument_node="">showcases the timeless charm of Old China, at the same time uncompromisingly featuring all the modern amenities expected from a hotel of its rank, including an indoor pool with a spa, free Wi-Fi throughout the property, and air-conditioned rooms with flat-screen satellite TVs. The rooms are beautifully furnished, with gorgeous and tasteful period furniture complimenting the hotel’s </span><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">classic French-Orient architecture</span></strong><span data-dcnode-id="1168" instrument_node="">. </span></p><span data-dcnode-id="1166" instrument_node=""> </span><p class="has-text-align-center" data-dcnode-id="1161"><a class="external" data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/horizon-inn-san-jose.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DSanJoseWTS" rel="nofollow" target="_blank"></a><strong data-dcnode-id="1162"><a class="external" data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/cn/raffles-beijing-beijing.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DBeijingWTS" rel="nofollow" target="_blank"><span data-dcnode-id="1164" instrument_node="">BOOK A ROOM HERE</span></a></strong></p></div></div><p data-dcnode-id="1158"></p><span data-dcnode-id="1157" instrument_node="">

an><p class="has-text-align-left" data-dcnode-id="1096"><span data-dcnode-id="1101" instrument_node="">A charming hotel that feels very warm and welcoming due to its many design elements made of stone and wood, </span><strong data-dcnode-id="1098"><a class="external" data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/cn/bei-jing-le-zai-jing-pin-jiu-dian.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DBeijingWTS" rel="nofollow" target="_blank"><span data-dcnode-id="1100" instrument_node="">Beijing 161 hotel LeZaiNanluo Boutique Hotel</span></a></strong><span data-dcnode-id="1097" instrument_node=""> seems to sprout from Beijing’s gardens and gorgeously manicured parks. While not as close to the city center as the previous two entries, this property is stilly very well connected. It is located less than 500 m from Nanluoguxiang Subway Station (Line 6 &amp; 8), with the forbidden city just a 10-minute drive away. All of the rooms are well-appointed, spacious, and fitted with flat-screen cable TVs and air conditioning. You can enjoy a view of the garden from your room or enjoy some time outside on the hotel’s sun terrace. </span></p><span data-dcnode-id="1095" instrument_node=""> </span><p class="has-text-align-center" data-dcnode-id="1090"><a class="external" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/horizon-inn-san-jose.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DSanJoseWTS" rel="nofollow" target="_blank"></a><strong data-dcnode-id="1091"><a class="external" data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/cn/bei-jing-le-zai-jing-pin-jiu-dian.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DBeijingWTS" rel="nofollow" target="_blank"><span data-dcnode-id="1093" instrument_node="">BOOK A ROOM HERE</span></a></strong></p></div></div><p data-dcnode-id="1087"></p><span data-dcnode-id="1086" instrument_node="">
</span><div class="wp-block-media-text alignwide has-background has-very-light-gray-background-color is-stacked-on-mobile" data-dcnode-id="1050" style="grid-template-columns:44% auto"><figure class="wp-block-media-text__media" data-dcnode-id="1084"><img alt="Simple Family Beijing" class="wp-image-10405" data-attachment-id="10405" data-comments-opened="1" data-dcnode-id="1085" data-image-caption="<p>Simple Family Beijing</p>" data-image-description="<p>Simple Family Beijing</p>" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Simple Family Beijing" data-large-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?fit=723%2C482&amp;ssl=1" data-medium-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://onedayitinerary.com/one-day-in-beijing-itinerary/simple-family-beijing/" data-recalc-dims="1" height="482" loading="lazy" sizes="(max-width: 723px) 100vw, 723px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing-1024x683.jpg%3Fresize%3D723%252C482&amp;raw" srcset="https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?resize=450%2C300&amp;ssl=1 450w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?resize=675%2C450&amp;ssl=1 675w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?resize=60%2C40&amp;ssl=1 60w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?resize=550%2C367&amp;ssl=1 550w, https://i0.wp.com/onedayitinerary.com/wp-content/uploads/2019/05/Simple-Family-Beijing.jpg?resize=220%2C147&amp;ssl=1 220w" width="723"></figure><div class="wp-block-media-text__content" data-dcnode-id="1051"><span data-dcnode-id="1083" instrument_node=""> </span><p data-dcnode-id="1082"></p><span data-dcnode-id="1081" instrument_node=""> </span><h4 class="has-text-align-left" data-dcnode-id="1077"><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Simple Family Beijing</span></strong><span data-dcnode-id="1078" instrument_node=""> </span></h4><span data-dcnode-id="1076" instrument_node=""> </span><p data-dcnode-id="1075"></p><span data-dcnode-id="1074" instrument_node=""> </span><p class="has-text-align-left has-small-font-size" data-dcnode-id="1071"><em data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Floor 16, Unit 1, Yongli International Building West Block, No. 21 Gongti North Road, Chaoyang</span></em></p><span data-dcnode-id="1070" instrument_node=""> </span><p class="has-text-align-left" data-dcnode-id="1058"><span data-dcnode-id="1069" instrument_node="">Although </span><strong data-dcnode-id="1066"><a class="external" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/cn/simple.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DBeijingWTS" rel="nofollow" target="_blank"><span data-dcnode-id="1068" instrument_node="">Simple Family Beijing</span></a></strong><span data-dcnode-id="1065" instrument_node=""> is a bit peripheral, you will fall in love with its amazing visuals, whether you choose to stay in a room with a private bathroom or the cleverly decorated tent area, with ethnic elements and small details meant to remind you of camping in the wilderness. The </span><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">tipi-like tents</span></strong><span data-dcnode-id="1062" instrument_node=""> will wake up the kid inside you, like you are at your friend’s house for a sleepover and you are building forts. The friendly, accommodating staff at the front desk speak both Russian and </span><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">English</span></strong><span data-dcnode-id="1059" instrument_node="">, making things much easier in case you don’t speak Mandarin. </span></p><span data-dcnode-id="1057" instrument_node=""> </span><p class="has-text-align-center" data-dcnode-id="1052"><a class="external" data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/horizon-inn-san-jose.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DSanJoseWTS" rel="nofollow" target="_blank"></a><strong data-dcnode-id="1053"><a class="external" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/cn/simple.en.html%3Faid%3D1243908%26no_rooms%3D1%26group_adults%3D1%26label%3DBeijingWTS" rel="nofollow" target="_blank"><span data-dcnode-id="1055" instrument_node="">BOOK A ROOM HERE</span></a></strong></p></div></div><p data-dcnode-id="1049"></p><span data-dcnode-id="1048" instrument_node="">
</span><h2 data-dcnode-id="1045"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">DAY TRIPS FROM BEIJING</span></strong></h2><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">There are so many things to do in Beijing that you will never be able to do it all if you’ve only got one day to spend. And Beijing is only the tip of the iceberg in terms of what the surrounding area has to offer. If you choose to extend your stay and spend more than one day in Beijing, here are some ideas on how you might spend your time. Obviously, doing the Great Wall tour from Beijing is a must. </span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">The </span><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Great Wall of Badaling </span></strong><span data-dcnode-id="1037" instrument_node="">is a particularly famous portion of the Great Wall that rises to 3,282 feet and can easily be reached on a day trip from Beijing. This section of the wall is the best-preserved and the most complete and is quite easy to climb compared to some other sections. When it comes to other Beijing day tours, a lot of the best ones can be done by air. </span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1034" instrument_node="">For example, there is the </span><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Day Trip to Chengdu from Beijing by Air</span></strong><span data-dcnode-id="1031" instrument_node="">, as well as the </span><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Full Day Tour of Shanghai from Beijing by Air. </span></strong><span data-dcnode-id="1028" instrument_node="">In case you want to see two of the most famous UNESCO World Heritage Sites in China in one day, consider the </span><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Great Wall of China at Badaling and Ming Tombs Day Tour from Beijing. </span></strong><span data-dcnode-id="1025" instrument_node="">For an overview of these and other Beijing day tours with recommendations and special offers, check out this article. </span><br data-dcnode-id="1024"><br data-dcnode-id="1023"></p><span data-dcnode-id="1021" instrument_node="">
</span><h2 data-dcnode-id="1018"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">EXTRA TIPS FOR VISITING BEIJING</span></strong></h2><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">-Most
businesses nowadays in China accept credit cards such as Visa and Mastercard,
although UnionPay is still the more widely accepted card scheme. Nevertheless,
you will still </span><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">need to carry cash</span></strong><span data-dcnode-id="1013" instrument_node=""> –
in some parts, it is the only payment method.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1010" instrument_node="">-In the
same vein, don’t expect that you will be able to pay with dollars or euros. The
</span><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">only currency that vendors will consider
is the yuan</span></strong><span data-dcnode-id="1007" instrument_node="">, the official Chinese currency. </span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1004" instrument_node="">-Also,</span><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node=""> notify your bank if you intend to travel
to China</span></strong><span data-dcnode-id="1001" instrument_node=""> and use your cards there. Otherwise, your cards may get cancelled
mid-trip due to “suspicious activity”.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">-If you
don’t speak Mandarin, you may want to </span><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">print
the name of your hotel and its address as it is written in Chinese characters</span></strong><span data-dcnode-id="995" instrument_node="">.
Google Maps screenshots of the hotel’s location also help if you want your taxi
driver to know where you’re going.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="992" instrument_node="">–</span><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Beijing is a safe city to visit</span></strong><span data-dcnode-id="989" instrument_node=""> in
spite of its huge size. Pickpocketing isn’t exceedingly common, and foreigners
aren’t specifically targeted. </span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">–</span><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Don’t drink the tap water</span></strong><span data-dcnode-id="983" instrument_node=""> in Beijing
and other parts of China as it is not safe to drink.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="980" instrument_node="">-Blowing your nose in public is considered very impolite in China.  –</span><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Consider getting a local SIM card</span></strong><span data-dcnode-id="977" instrument_node=""> to avoid steep international roaming charges.</span><br data-dcnode-id="976"><br data-dcnode-id="975"></p><span data-dcnode-id="973" instrument_node="">
</span><h2 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">PIN FOR LATER!</span></h2><span data-dcnode-id="970" instrument_node="">

</span><div class="awac-wrapper" data-dcnode-id="930"><div class="awac widget pagesinwidgets_page_section-4" data-dcnode-id="931"><h2 class="widget-title widgettitle" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Make sure you have everything you need</span></h2><span data-dcnode-id="948" instrument_node=""> </span><div class="homepage_section" data-dcnode-id="932"><span data-dcnode-id="947" instrument_node=""> </span><h2 data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">What to pack for your next trip?</span></h2><span data-dcnode-id="944" instrument_node=""> </span><p class="has-very-light-gray-background-color has-background" data-dcnode-id="933"><span data-dcnode-id="943" instrument_node="">Make your next trip as simple and as enjoyable as possible by packing smart. It’s amazing how much stress </span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedayitinerary.com/top-travel-items/"><span data-dcnode-id="942" instrument_node="">top travel items</span></a><span data-dcnode-id="940" instrument_node=""> can save you, so choose carefully.</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">Things like lightweight travel backpacks, for example, are ideal for short trips and allow you to move around with ease, and a passport holder will make sure you keep your documents safe at all times.</span><br data-dcnode-id="937"><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedayitinerary.com/how-to-pack-for-a-short-trip-travel-checklist/"><span data-dcnode-id="936" instrument_node="">Check our travel checklist guide for 2021</span></a><span data-dcnode-id="934" instrument_node=""> to make sure you haven’t missed anything, and travel to your next destination in style and with maximum comfort.</span></p></div></div></div><div class="relpost-thumb-wrapper" data-dcnode-id="907"><div class="relpost-thumb-contai
