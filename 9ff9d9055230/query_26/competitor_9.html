2.083 2.083v7.334a2.086 2.086 0 01-2.084 2.083l-9.88.01zm0-10.01a.59.59 0 00-.584.594v7.333a.584.584 0 00.584.584l9.88-.011a.584.584 0 00.584-.583V5.333a.584.584 0 00-.584-.583h-2.28a.75.75 0 01-.711-.513L9.453 2.75H6.201l-.496 1.487a.75.75 0 01-.711.513H3.06z" data-dcnode-id="2188"></path><path d="M8 12.556a3.75 3.75 0 110-7.501 3.75 3.75 0 010 7.5zm0-6a2.25 2.25 0 100 4.5 2.25 2.25 0 000-4.5z" data-dcnode-id="2187"></path></svg></span></div><span class="css-1oibaro" data-dcnode-id="2181" data-font-weight="semibold"><a class="css-1m051bw" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yelp.com/biz_photos/beijing-cuisines-manchester%3Fuserid%3D1wE7oHKgNOLPM0QWS3jm9w"><span data-dcnode-id="2183" instrument_node="">9 photos</span></a></span></div></div><div class="margin-b2__09f24__CEMjT border-color--default__09f24__NPAKY" data-dcnode-id="2157"><p class="comment__09f24__gu0rG css-qgunke" data-dcnode-id="2158"><span class="raw__09f24__T4Ezm" data-dcnode-id="2159" lang="en"><span data-dcnode-id="2178" instrument_node="">You know, in all honesty, I found this place on the drive up from Boston to Manchester, NH to pick up rental car at the airport. My friend and I decided to come back here for a late lunch. </span><br data-dcnode-id="2177"><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">Sometimes good gems are found when you least expect it. I was tired from a half day of travel from Rochester NY. Thankful for my friend who picked me up at Boston Logan airport and drove me up here to Manchester, NH to Pick up my rental car, so I treated her and her mom to a late lunch here at Beijing Cuisines. With that said, we arrived here around 2:30pm to a quiet and calm restaurant on a causal Sunday afternoon. There was a couple of tables occupied, but mostly empty, as it was way after the lunch rush. I was famished at the time and thankful to be here. We spent about 45 minutes or so from start to finish. It was awesome that this restaurant also had a restroom too. Not sure about the WiFi though, but it wasn't needed at the time. I would say that Beijing Cuisines did have a limited menu, considering that I've been to places where they had pages of specialities based on proteins and whether it had noodles or not. Still, Beijing Cuisines here in Manchester, NH had a pretty good spread of entrees that would have been a blessing for your stomach and tastebuds. </span><br data-dcnode-id="2174"><br data-dcnode-id="2173"><span data-dcnode-id="2172" instrument_node="">The overall experience here at Beijing Cuisines in Manchester, NH can be categorized as being good yet average at the same time. When you're famished after a day of travel, everything seemed to look absurdly tasty and delicious. Yet, I felt like it was pretty good to average Chinese fare. I should have asked for something off menu in the Chinese language to see if they could've understood me. Could have impressed my friends too as a bonus. Lol Still, the service was average yet friendly, nice, simplistic, and basic at the same time. It was nice to have the ambiance quiet, so that we could hang out and talk without having to shout over the noise. &nbsp;We all ordered some form of entree, which usually didn't come with rice. Rice is apparently extra in these parts, so it was ordered as well. I guess I'm spoiled when I get my rice included with the entree, but that's probably says more about me than most. I believe I got the beef with mushrooms in oyster sauce. The fried rice they gave me is way different than the usual rice I'm used to. I'm sure it's the type of rice they use. Still deliciously good though. My friends opted for a lemon chicken dish, some sort of stir fly vegetables, and a side order of won ton soup, I think.</span><br data-dcnode-id="2171"><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">Beijing Cuisine Chinese restaurant is located at 2650 Brown Avenue in rural Manchester, New Hampshire. They accept major credit cards, which is always a good thing, as well as cash. If you drive too fast, you probably will miss them entirely. They have &nbsp;a sizable parking lot that can hold up to about 12 cars at a time. Best bet is to have your own private car or rent one either in Manchester, NH or in Boston. This place is a nice stopping point for lunch or dinner, even drinks if you are passing through the area. You can also use Lyft or uber also, since I'm not sure how public transportation works here, but you're basically about a mile or so from Manchester NH regional airport. For the most part though, it was a pretty good experience here having a late lunch on Sunday afternoon with friends before driving 2 1/2 hours to Portland Maine. I needed the fuel to get me there and Chinese food seemed to do the trick that day. Thanks Beijing Cuisines Chinese restaurant for being there when I needed it! Definitely recommended if you're in the area and passing through.</span><br data-dcnode-id="2168"><br data-dcnode-id="2167"><span data-dcnode-id="2166" instrument_node="">3.5 stars for the overall experience. 4.0 stars for the service. 3.5 stars for the food. It was delicious but Chinese food is Chinese food. I grew up with it.</span><br data-dcnode-id="2165"><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">Support local!</span><br data-dcnode-id="2162"><br data-dcnode-id="2161"><span data-dcnode-id="2160" instrument_node="">B-</span></span></p></div><div class="arrange__09f24__LDfbs vertical-align-middle__09f24__zU9sE border-color--default__09f24__NPAKY" data-dcnode-id="2104"><div class="arrange-unit__09f24__rqHTg arrange-unit-fill__09f24__CUubG border-color--default__09f24__NPAKY" data-dcnode-id="2105"><span class="display--inline__09f24__c6N_k margin-r1-5__09f24__ot4bd border-color--default__09f24__NPAKY" data-dcnode-id="2140"><button class="button__09f24__x2pTP css-1a4ogqp" data-activated="false" data-button="true" data-dcn _09f24__NPAKY" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">First to Review</span></span></span></div></div><div class="margin-b2__09f24__CEMjT border-color--default__09f24__NPAKY" data-dcnode-id="995"><p class="comment__09f24__gu0rG css-qgunke" data-dcnode-id="996"><span class="raw__09f24__T4Ezm" data-dcnode-id="997" lang="en"><span data-dcnode-id="1007" instrument_node="">Beijing Cuisines serves basic Chinese food including 28 lunch specials ($4.75-$6.75) &amp; 18 dinner combinations ($7.95) plus Mandarin &amp; Szechuan specialties. Closed on Mondays.</span><br data-dcnode-id="1006"><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">The dining room in the front of the place is not fancy with bright green colored tables (and silk flowers) with booth and table seating. There's also a cocktail lounge in the back.</span><br data-dcnode-id="1003"><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">Stopped here for a weeknight dinner and was seated in the deserted dining room. I had the Dinner #2: Egg Roll, 4 Chicken Fingers, Pepper Steak with Onions, &amp; Pork Fried Rice, all of the food was served hot and tasted decent. My waitress was very quiet and didn't say much other than taking my order and bringing out complementary hot tea and duck sauce. A good quiet dinner after a long day of work, not bad!!</span><br data-dcnode-id="1000"><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">Beijing Cuisines is located on the western side of Brown Ave across from the Brown Ave/Goffs Falls Rd traffic signal with very tight parking on a slight down slope.</span></span></p></div><div class="margin-t3__09f24__riq4X margin-b2__09f24__CEMjT border-color--default__09f24__NPAKY" data-dcnode-id="988"><div class="arrange__09f24__LDfbs gutter-2__09f24__CCmUo layout-wrap__09f24__GEBlv margin-b1__09f24__vaLrm border-color--default__09f24__NPAKY" data-dcnode-id="989"><div class="arrange-unit__09f24__rqHT
