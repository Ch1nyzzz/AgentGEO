</span><p data-dcnode-id="611"><span data-dcnode-id="614" instrument_node="">Beijing&nbsp;will not only ensure that you have a full and interesting day but will also present you with colorful choices for the nightlife.</span><br data-dcnode-id="613"><span data-dcnode-id="612" instrument_node="">&nbsp;</span></p><p data-dcnode-id="610"></p><span data-dcnode-id="609" instrument_node=""> </span><span data-dcnode-id="608" instrument_node=""> </span><span data-dcnode-id="607" instrument_node=""> </span><span data-dcnode-id="603" instrument_node=""> </span><span data-dcnode-id="601" instrument_node=""> </span><span data-dcnode-id="600" instrument_node=""> </span><span data-dcnode-id="594" instrument_node=""> </span><span data-dcnode-id="592" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="590"><tbody data-dcnode-id="591"><tr data-dcnode-id="602"><td align="center" data-dcnode-id="604"><span data-dcnode-id="605"><img alt="Peking Opera" data-dcnode-id="606" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/0021500/10021437tm.jpg&amp;raw" style="width: 350px; height: 260px; display: block;"></span></td></tr><tr data-dcnode-id="593"><td align="center" data-dcnode-id="595" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="596"><span data-dcnode-id="597" style="font-weight: normal;"><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/picture/beijing/peking-opera/"><span data-dcnode-id="599" instrument_node="">Beijing Opera Pictures</span></a></span></span></td></tr></tbody></table><div class="subTitle2017" data-dcnode-id="587"><h2 class="h2_01" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Beijing Nightlife Things to Do</span></h2></div><span data-dcnode-id="586" instrument_node="">Traditional performances such as the </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/arts/beijing_opera/"><span data-dcnode-id="585" instrument_node="">Beijing Opera</span></a><span data-dcnode-id="583" instrument_node="">, acrobatic shows and dramatic performances in the teahouses are popular with the more mature visitors to the city, while the younger generation seems to favor the snack markets, pubs, clubs and cafes. For the stranger who wishes to become acquainted with the city, a stroll along Chang'an Street to Tian'anmen Square is highly recommended.</span><br data-dcnode-id="582"><span data-dcnode-id="581" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="578"><h3 class="h3_02" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Tianqiao (Overbridge) Area</span></h3></div><span data-dcnode-id="577" instrument_node="">For foreigners to experience Beijing nightlife, Tianqiao is a great choice! It's a place that cannot be omitted when considering the nightlife options for the old&nbsp;local people&nbsp;is the Tianqiao (Overbridge) Area. In actual fact it is not a bridge but a location popular for gathering to eat, drink and to enjoy the entertainments and amusements on offer there. Tianqiao has been a favorite venue for ordinary folk since the Yuan Dynasty (1271-1368). This area was also the cradle of Chinese folk culture and art where many original folk performances such as acrobatics and music were devised. The area has changed somewhat over the centuries but the quality of the entertainment here continues to be of a high standard. Two of the most famous venues are the Tianqiao Theater and Tianqiaole Tea House (the name means Happy Overbridge) and it can be found at No.30 in Beiwei Rd, Xicheng District). The theatre specializes in modern song and dance performances while by contrast the teahouse offers the more traditional arts of Beijing Opera, Acrobatics, Martial Arts as well as folk songs. Visitors to China may be a little apprehensive about going to the opera but it is an experience not to be missed as the performances are really quite spectacular, including as they do music, dance, acrobatics and spectacular costumes.</span><br data-dcnode-id="576"><span data-dcnode-id="575" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="572"><h3 class="h3_02" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Lao She Teahouse</span></h3></div><span data-dcnode-id="571" instrument_node="">Other places to explore Chinese folk culture include the </span><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/laoshe-teahouse.htm"><span data-dcnode-id="570" instrument_node="">Lao She Teahouse</span></a><span data-dcnode-id="568" instrument_node=""> (3F, building 3, Xi Da Jie, Qianmen), where you can experience the famous Chinese tea culture and find a quiet place to relax and maybe do some reading.</span><br data-dcnode-id="567"><img alt="" data-dcnode-id="566" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="565" instrument_node="">&nbsp;See more </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/teahouse.htm"><span data-dcnode-id="564" instrument_node="">Teahouses in Beijing</span></a><br data-dcnode-id="562"><span data-dcnode-id="561" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="558"><h3 class="h3_02" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Liyuan Theater</span></h3></div><p data-dcnode-id="557"></p><p data-dcnode-id="553"><span data-dcnode-id="556" instrument_node="">There is also the Liyuan Theater (inside Jianguo Hotel, Qianmen, at No. 175 in Yongan Lu) here there are nightly performances at 19:30 pm of genuine Beijing Opera and other folk performances. One need not be concerned about language difficulties with Chinese opera and drama as both make considerable use of mime. The opera often has subtitle boards displaying a translation. As a result they are quite easy to understand.</span><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="550"><h3 class="h3_02" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Acrobatic Shows</span></h3></div><span data-dcnode-id="549" instrument_node="">Chinese acrobatics have a long history and is one of the most popular art forms among Chinese people. Performers have achieved worldwide fame for their wonderful skills and marvelous acts. Acrobatic Shows can be seen at the Chaoyang Theatre or Wansheng Theatre, 95, Tianqiao Market, Xicheng District.</span><br data-dcnode-id="548"><img alt="" data-dcnode-id="547" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="padding: 0px; margin: 0px; border: none; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px; text-align: justify;" width="17"><span data-dcnode-id="546" instrument_node=""> </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/acrobatic-shows-in-beijing.htm"><span data-dcnode-id="545" instrument_node="">Top 4 places to See Acrobatic Shows</span></a><br data-dcnode-id="543"><span data-dcnode-id="542" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="539"><h3 class="h3_02" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Other Traditional Chinese Performance</span></h3></div><span data-dcnode-id="538" instrument_node="">The Kung Fu shows, puppet shows, exotic ballet, opera, concert and modern drama are put on every day in this city. Full details are published in the daily newspapers and information is usually available at your hotel's reception desk.</span><br data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="533"><h3 class="h3_02" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Theatres &amp; Concerts</span></h3></div><span data-dcnode-id="532" instrument_node="">Understandably, as the nation's capital,&nbsp;this city&nbsp;is also its cultural center and the </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/performing-arts-national-centre.htm"><span data-dcnode-id="531" instrument_node="">National Centre for the Performing Arts</span></a><span data-dcnode-id="529" instrument_node="">, Capital Theatre, the Concert Hall, the China Folk Culture Palace each offer the very best of entertainment adding greatly to the wide choice of nightlife pastimes in Beijing. Program details and ticket prices as well as addresses of the various venues can usually be found in the current 'Beijing Daily'.</span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="524"><h3 class="h3_02" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Night Markets</span></h3></div><span data-dcnode-id="523" instrument_node="">Every city has its night market and&nbsp;this one&nbsp;is no exception. When the curtain of darkness falls, the snack handcarts come alive. Dongdan Street, Xidan Street, Donghuamen Gate and Longfusi Temple area are the main four night market areas. Snacks include&nbsp;local specialities as well as many that are traditional in other parts of the country, some of which are from minority districts.</span><br data-dcnode-id="522"><img alt="" data-dcnode-id="521" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="520" instrument_node="">&nbsp;See&nbsp;</span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/snackstreet.htm"><span data-dcnode-id="519" instrument_node="">10 Best Beijing Night Markets &amp; Snack Streets</span></a><br data-dcnode-id="517"><span data-dcnode-id="516" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="513"><h3 class="h3_02" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Walking along Chang'an Street</span></h3></div><span data-dcnode-id="512" instrument_node="">We would highly recommend a leisurely stroll along the Chang'an Street to observe the scene as one of your nightlife choices. Maybe you would like to do this in style by hiring a rickshaw, what could be more in keeping with the ambiance than that? The street extends all the way to the Forbidden City and Tian'anmen Square. The palace complex in shadow has an ethereal beauty that is all its own and that is certain to evoke sentiments of the past glory, mystery and intrigue that was once Imperial China.</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="507"><h2 class="h2_01" data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Guide for Foreigners: Top&nbsp;Clubs &amp; Bars</span></h2></div><span data-dcnode-id="506" instrument_node="">For your Beijing nightlife guide, we recommended some&nbsp;popular bars and&nbsp;best nightclubs&nbsp;in Beijing for such performances here:</span><br data-dcnode-id="505"><span data-dcnode-id="504" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="501"><h3 class="h3_02" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Huguang Huiguan Ancient Opera Building</span></h3></div><span data-dcnode-id="500" instrument_node="">Address: 3, Hufang Rd, Xicheng District</span><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="495"><h3 class="h3_02" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Beijing Concert Hall</span></h3></div><span data-dcnode-id="494" instrument_node="">Address: 1, North Xinhua Street, Xicheng District</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="489"><h3 class="h3_02" data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Beijing People's Art Theater</span></h3></div><span data-dcnode-id="488" instrument_node="">Address: 22, Wangfujing Street, Dongcheng District</span><br data-dcnode-id="487"><br data-dcnode-id="486"><img alt="An elegant teahouse" class="clsphotogalleryimg" data-dcnode-id="485" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/0026500/10026254tm.jpg&amp;raw" style="width: 350px; height: 260px; float: right;"><div class="subTitle2017" data-dcnode-id="481"><h3 class="h3_02" data-dcnode-id="482"><a data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/sanlitun-bar-street.htm"><span data-dcnode-id="484" instrument_node="">Sanlitun Bar Street</span></a></h3></div><span data-dcnode-id="480" instrument_node="">Sanlitun&nbsp;Bar Street and the surrounding Embassy Area in Chaoyang District is also a must for many foreign visitors and young people. Here you can find many Beijing clubs and bars. The various bars attract the staff from the Embassies and white-collar workers alike. Here you will find rock-and-roll, hip-hop and Jazz among the many activities. This is a good place to see first-hand something of modern China after a day of exploring its historical past.</span><br data-dcnode-id="479"><span data-dcnode-id="478" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="475"><h3 class="h3_02" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">VICS</span></h3></div><span data-dcnode-id="474" instrument_node="">Location: in the east inside of the North Entrance of </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/workers-stadium.htm"><span data-dcnode-id="473" instrument_node="">Workers' Stadium</span></a><span data-dcnode-id="471" instrument_node="">, Chaoyang District</span><br data-dcnode-id="470"><span data-dcnode-id="469" instrument_node="">Opening hours: 20:00 - 03:00</span><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">Cost for ticket: 30 Yuan at weekend, 20 Yuan on Wednesday (Lady's night) and women can enjoy cocktail for free at that night (excluding special activities)</span><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">Music: Hip-hop, R&amp;B</span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="460"><h3 class="h3_02" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">JJ Bar</span></h3></div><span data-dcnode-id="459" instrument_node="">Address: A2, Chaibang Hutong, Andingmennei Da Jie, Dongcheng District</span><br data-dcnode-id="458"><span data-dcnode-id="457" instrument_node="">Opening hours: for 24 hours</span><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">Average cost per person: 20 Yuan - 30 Yuan</span><br data-dcnode-id="454"><span data-dcnode-id="453" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="450"><h3 class="h3_02" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Beijing Hugo Club</span></h3></div><span data-dcnode-id="449" instrument_node="">Address: B143, Xiwai Da Jie, Haidian District</span><br data-dcnode-id="448"><span data-dcnode-id="447" instrument_node="">Opening hours: from 09:00 until late</span><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="442"><h3 class="h3_02" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Banana</span></h3></div><span data-dcnode-id="441" instrument_node="">Address: 22, Jianguomenwai Street, Chaoyang Distrcit</span><br data-dcnode-id="440"><span data-dcnode-id="439" instrument_node="">Opening hours: 20:30 - 04:00 from Sunday to Thursday and 20:30 - 05:00 on Friday and Saturday</span><br data-dcnode-id="438"><span data-dcnode-id="437" instrument_node="">Cost for ticket: 20 Yuan from Sunday to Thursday and 30 Yuan on Friday and Saturday</span><p data-dcnode-id="436"></p><div class="recomLinks" data-dcnode-id="388"><div class="subTitle" data-dcnode-id="433"><h2 class="recomTitle" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">You May Like</span></h2></div><div class="recomUnits" data-dcnode-id="390"><div class="linkUnit" data-dcnode-id="423"><span data-dcnode-id="432" instrument_node=""> </span><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/events.htm" target="_blank"><span class="linkPhoto" data-dcnode-id="429"><span data-dcnode-id="431" instrument_node=""> </span><img alt="" data-dcnode-id="430" isload="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2010/acrobatic-show.jpg&amp;raw" xsrc="null"></span><span class="linkTitle" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Beijing Theatres</span></span><span data-dcnode-id="426" instrument_node=""> </span></a><div class="clear" data-dcnode-id="424"></div></div><div class="linkUnit" data-dcnode-id="413"><span data-dcnode-id="422" instrument_node=""> </span><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/opera-theaters.htm" target="_blank"><span class="linkPhoto" data-dcnode-id="419"><span data-dcnode-id="421" instrument_node=""> </span><img alt="" data-dcnode-id="420" isload="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2010/0630103234.jpg&amp;raw" xsrc="null"></span><span class="linkTitle" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Best Beijing Opera Theaters</span></span><span data-dcnode-id="416" instrument_node=""> </span></a><div class="clear" data-dcnode-id="414"></div></div><div class="linkUnit" data-dcnode-id="401"><span data-dcnode-id="412" instrument_node=""> </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/beijing-evening-tours.htm" target="_blank"><span class="linkPhoto" data-dcnode-id="409"><span data-dcnode-id="411" instrument_node=""> </span><img alt="" data-dcnode-id="410" isload="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/tour/image/water-cube-516801.jpg&amp;raw" xsrc="null"></span><span class="linkTitle" data-dcnode-id="405"><span data-dcnode-id="408" instrument_node="">Private Beijing Night Tour from </span><span data-dcnode-id="406" style="color:#C10000"><span data-dcnode-id="407" instrument_node="">$59</span></span></span><span data-dcnode-id="404" instrument_node=""> </span></a><div class="clear" data-dcnode-id="402"></div></div><div class="linkUnit" data-dcnode-id="391"><span data-dcnode-id="400" instrument_node=""> </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/beijing/night-tours.htm" target="_blank"><span class="linkPhoto" data-dcnode-id="397"><span data-dcnode-id="399" instrument_node=""> </span><img alt="" data-dcnode-id="398" isload="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/1218093243.jpg&amp;raw" xsrc="null"></span><span class="linkTitle" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Beijing Night Tours  –  8 Things to Do at Night</span></span><span data-dcnode-id="394" instrument_node=""> </span></a><div class="clear" data-dcnode-id="392"></div></div></div><div class="clear" data-dcnode-id="389"></div></div><span data-dcnode-id="387" instrument_node="">

ss="qa-list-q-title" data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Where should we go for a night out in beijing? </span></div><div class="qa-list-q-content" data-dcnode-id="320"><span data-dcnode-id="323" instrument_node="">Should we visit the Houhai bars or go somewhere else? Could you please suggest area and place (bar or club)?</span><br data-dcnode-id="322"><span data-dcnode-id="321" instrument_node="">Thank you.</span></div><div class="qa-list-a" data-dcnode-id="289"><div class="qa-list-a-title" data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="290" id="qa-list-a-item-414898" val="414898"><div class="qa-list-a-info" data-dcnode-id="301"><span data-dcnode-id="317" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="315" val="0"><span data-dcnode-id="316" instrument_node="">John</span></font><span data-dcnode-id="314" instrument_node=""> from USA | Oct. 20, 2015 20:19</span><div class="replyAction" data-dcnode-id="304" idx="0"><span class="good" data-dcnode-id="311"><img data-dcnode-id="313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="312" instrument_node="">2</span></span><span class="bad" data-dcnode-id="308"><img data-dcnode-id="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="309" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="305" idx="496074" un="Sorayia"><img data-dcnode-id="307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="306" instrument_node="">Reply</span></span></div><br data-dcnode-id="303"><br data-dcnode-id="302"></div><div class="clear" data-dcnode-id="300"></div><span data-dcnode-id="299" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="291"><span data-dcnode-id="298" instrument_node="">Hi, Sorayia! Houhai bars are a nice choice. As I know, the Houhai NO. 5 Bar at no. 5 on the north bank of Houhai in Xicheng District is pretty good. Take subway line 5, get off at Shichahai Station, leave from Exit A1, and walk west for about 328 yards (300 meters). </span><br data-dcnode-id="297"><br data-dcnode-id="296"><span data-dcnode-id="295" instrument_node="">Moreover, Sanlitun Bar Street is great place to go during night. You may reach there by subway 10, get off at Tuanjiehu Station, leave from Exit A, and walk for about 547 yards (500 meters). </span><br data-dcnode-id="294"><br data-dcnode-id="293"><span data-dcnode-id="292" instrument_node="">Have fun!</span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="246" id="qa450324" idx="1"><div class="qa-list-q-info" data-dcnode-id="279"><span data-dcnode-id="287" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="285" val="0"><span data-dcnode-id="286" instrument_node="">dipika</span></font><span data-dcnode-id="284" instrument_node=""> from INDIA | Feb. 03, 2015 02:34</span><span data-dcnode-id="281" idx="450324" un="dipika"><img data-dcnode-id="283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="282" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="280"></div></div><div class="qa-list-q-title" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">How to go to see the great wall of china- take a bus tour?</span></div><div class="qa-list-q-content" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Thanks Cindy, which shows were worth it? Cost of tickets? And again, How to go to see the great wall of china- take a bus tour ? From Hotel New Otani Chang Fu Gong </span></div><div class="qa-list-a" data-dcnode-id="247"><div class="qa-list-a-title" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="248" id="qa-list-a-item-366180" val="366180"><div class="qa-list-a-info" data-dcnode-id="256"><span data-dcnode-id="272" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="270" val="0"><span data-dcnode-id="271" instrument_node="">Cindy</span></font><span data-dcnode-id="269" instrument_node=""> from USA | Feb. 03, 2015 02:45</span><div class="replyAction" data-dcnode-id="259" idx="0"><span class="good" data-dcnode-id="266"><img data-dcnode-id="268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="267" instrument_node="">0</span></span><span class="bad" data-dcnode-id="263"><img data-dcnode-id="265" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="264" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="260" idx="450324" un="dipika"><img data-dcnode-id="262" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="261" instrument_node="">Reply</span></span></div><br data-dcnode-id="258"><br data-dcnode-id="257"></div><div class="clear" data-dcnode-id="255"></div><span data-dcnode-id="254" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="249"><span data-dcnode-id="253" instrument_node="">Well, each show have different features, all of them are worth seeing. You can just choose one you are interested of. </span><br data-dcnode-id="252"><span data-dcnode-id="251" instrument_node="">For the bus tour to the Great Wall, you can take it at Beijing Tourist Center. You can walk westwards from the hotel to Jianguomen, take subway line 2 there and get off at Qianmen. After getting off at exit C, walk southwards to reach. </span><br data-dcnode-id="250"></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="198" id="qa450133" idx="2"><div class="qa-list-q-info" data-dcnode-id="237"><span data-dcnode-id="245" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="243" val="0"><span data-dcnode-id="244" instrument_node="">Dipika</span></font><span data-dcnode-id="242" instrument_node=""> from INDIA | Feb. 02, 2015 04:47</span><span data-dcnode-id="239" idx="450133" un="Dipika"><img data-dcnode-id="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="240" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="238"></div></div><div class="qa-list-q-title" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Where &amp; how to reach from Hotel New Otani Chang Fu Gong to see Opera and acrobatics in Beijing?</span></div><div class="qa-list-q-content" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">My husband and I are visiting for the first time, wish to see Opera, acrobatics, great wall, and what's best. Please let us know where &amp; how to go from Hotel New Otani Chang Fu Gong , 8th-11th April, 2015. Where can we obtain discounted tickets?</span></div><div class="qa-list-a" data-dcnode-id="199"><div class="qa-list-a-title" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="200" id="qa-list-a-item-366004" val="366004"><div class="qa-list-a-info" data-dcnode-id="214"><span data-dcnode-id="230" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="228" val="0"><span data-dcnode-id="229" instrument_node="">Cindy</span></font><span data-dcnode-id="227" instrument_node=""> from USA | Feb. 02, 2015 21:24</span><div class="replyAction" data-dcnode-id="217" idx="0"><span class="good" data-dcnode-id="224"><img data-dcnode-id="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="225" instrument_node="">0</span></span><span class="bad" data-dcnode-id="221"><img data-dcnode-id="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="222" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="218" idx="450133" un="Dipika"><img data-dcnode-id="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="219" instrument_node="">Reply</span></span></div><br data-dcnode-id="216"><br data-dcnode-id="215"></div><div class="clear" data-dcnode-id="213"></div><span data-dcnode-id="212" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="201"><span data-dcnode-id="211" instrument_node="">Do you want to go the Rea Theater from your hotel?</span><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">You can see many performances in this theater. It's located at No.44, Happy Avenue, Dongcheng District.</span><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">You can take public bus no. 827 at East Railway station, and get off at Gymnasium Station. After arriving, walk to the destination directly.</span><br data-dcnode-id="206"><span data-dcnode-id="205" instrument_node="">Or you can take a taxi. The cab fare is CNY 20 to 25. </span><br data-dcnode-id="204"><br data-dcnode-id="203"><span data-dcnode-id="202" instrument_node="">As far as I know, there is no such discounted tickets. So you are suggested to buy the ticket from the formal resources.</span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="156" id="qa388692" idx="3"><div class="qa-list-q-info" data-dcnode-id="189"><span data-dcnode-id="197" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="195" val="0"><span data-dcnode-id="196" instrument_node="">Kingkong123</span></font><span data-dcnode-id="194" instrument_node=""> from PHILIPPINES | Mar. 14, 2014 23:28</span><span data-dcnode-id="191" idx="388692" un="Kingkong123"><img data-dcnode-id="193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="192" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="190"></div></div><div class="qa-list-q-title" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">How much is the entrance fee to acrobat show? </span></div><div class="qa-list-q-content" data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Do kids (6 &amp; 5yrs old) allowed to watch? How to go there from 161 hostel?</span></div><div class="qa-list-a" data-dcnode-id="157"><div class="qa-list-a-title" data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="158" id="qa-list-a-item-301878" val="301878"><div class="qa-list-a-info" data-dcnode-id="166"><span data-dcnode-id="182" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="180" val="0"><span data-dcnode-id="181" instrument_node="">Niana</span></font><span data-dcnode-id="179" instrument_node=""> from DENMARK | Mar. 15, 2014 01:30</span><div class="replyAction" data-dcnode-id="169" idx="0"><span class="good" data-dcnode-id="176"><img data-dcnode-id="178" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="177" instrument_node="">0</span></span><span class="bad" data-dcnode-id="173"><img data-dcnode-id="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="174" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="170" idx="388692" un="Kingkong123"><img data-dcnode-id="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="171" instrument_node="">Reply</span></span></div><br data-dcnode-id="168"><br data-dcnode-id="167"></div><div class="clear" data-dcnode-id="165"></div><span data-dcnode-id="164" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="159"><span data-dcnode-id="163" instrument_node="">Firstly, I'd like to tell you that it is allowed and fine to let your kids at that gae to see the acrobat show! As I know, the latest show costs CNY100/person. </span><br data-dcnode-id="162"><br data-dcnode-id="161"><span data-dcnode-id="160" instrument_node="">Walk from your hostel to Dongsi Luku South stop to take bus no. 110 or 106 to get off at Tianqiao Station and walk to Wansheng Theater for the show!</span></div></div></div></div></div><div class="qa-more" data-dcnode-id="152"><a class="a_b_btn" data-dcnode-id="153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//answers.travelchinaguide.com/beijing-10109.htm" target="_blank"><span data-dcnode-id="154" instrument_node="">More Questions &amp; Answers</span></a></div><div class="videoLoadingContainer" data-dcnode-id="151" style="text-align:center;display:block"></div><div class="qa-form" data-dcnode-id="122"><div class="qa-form-title" data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Ask a Question</span></div><form dat
