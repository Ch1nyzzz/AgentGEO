</span><h1 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Sanlitun, Beijing</span></h1><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span><span data-dcnode-id="565" instrument_node="">
</span><span data-dcnode-id="562" instrument_node="">
</span><div class="clear" data-dcnode-id="561"></div><span data-dcnode-id="560" instrument_node="">
</span><div class="c_imgcontainer" data-dcnode-id="559"></div><span data-dcnode-id="558" instrument_node="">
</span><div class="contcont" data-dcnode-id="359" id="zoom"><span data-dcnode-id="557" instrument_node="">
</span><span data-dcnode-id="555" instrument_node="">
</span><div data-dcnode-id="363" id="artFlag"><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="553" instrument_node="">Located in the northeast Beijing near the embassy area, Sanlitun is a fashion center gathering many shopping malls, bars, restaurants, cinemas and arts stores, etc., which is popular among young people. It is especially lively at night and a good place for night life. There are 10 vertical and 12 horizontal streets in the area now. In ancient time, it is a village three li (1,640 yards) away from the inner city, thus the name, literally a 3-li away village.</span><br data-dcnode-id="552"><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">Sanlitun Address: Between Baijiazhuang Road and Dongzhimen Wai Street in south-north, and between East 3rd Ring Road and Xindong Road in east-west.</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="544"><h2 class="h2_01" data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Top Things to Do in Sanlitun Beijing</span></h2></div><p data-dcnode-id="543"></p><span data-dcnode-id="542" instrument_node=""> </span><span data-dcnode-id="541" instrument_node=""> </span><span data-dcnode-id="540" instrument_node=""> </span><span data-dcnode-id="536" instrument_node=""> </span><span data-dcnode-id="534" instrument_node=""> </span><span data-dcnode-id="533" instrument_node=""> </span><span data-dcnode-id="528" instrument_node=""> </span><span data-dcnode-id="526" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="524"><tbody data-dcnode-id="525"><tr data-dcnode-id="535"><td align="center" data-dcnode-id="537"><span data-dcnode-id="538"><img alt="Beijing Bar Street" data-dcnode-id="539" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2012/beijing-bar-street.jpg&amp;raw" style="width: 350px; height: 260px; display: block;"></span></td></tr><tr data-dcnode-id="527"><td align="center" data-dcnode-id="529" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="530"><span data-dcnode-id="531" style="font-weight: normal;"><span data-dcnode-id="532" instrument_node="">Beijing Bar Street</span></span></span></td></tr></tbody></table><p data-dcnode-id="523"></p><div class="subTitle2017" data-dcnode-id="518"><h3 class="h3_02" data-dcnode-id="519"><span data-dcnode-id="522" instrument_node="">Enjoy Lively Nightlife at </span><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/sanlitun-bar-street.htm"><span data-dcnode-id="521" instrument_node="">Sanlitun Bar Street</span></a></h3></div><p data-dcnode-id="511"><span data-dcnode-id="517" instrument_node="">Sanlitun is world-famous for Sanlitun bar street, which is the liveliest place in Beijing at night. Sanlitun Bar Street is in the east side of North Sanlitun Street, covering an area of 1,648 square meters (18,000 square feet) with a length of 260 meters (850 feet). Over 80 bars are on Sanlitun Bar Street, and more than 60 percent of Beijing's bars are gathered nearby. The most famous bars on Sanlitun Bar Street include Boys &amp; Girls, Red Moon Club, Swing, Lan Kwai Fong, Down Town, No. 52, Day Off and so on. Some do business from afternoon to the next morning, while others are open 24 hours. But generally, their busiest time is from 21:00 to late night. Adjacent to embassy area, there are many foreigners in these bars.</span><br data-dcnode-id="516"><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">Drinks available include imported wines, homemade wines, cocktails, soft drinks, and fruit juices etc. The bands would play music on the stages, the singers would sing, magicians would perform magic shows, and people would dance to relax. During major soccer tournaments, all bars on Sanlitun Bar Street place tables on the sidewalk where guests can drink, watch the game, and talk about the game.</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="508"><h3 class="h3_02" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Know Cutting-Edge Fashion at Taikoo Li Sanlitun</span></h3></div><p data-dcnode-id="507"></p><p data-dcnode-id="495"><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/taikoo-li-sanlitun.htm"><span data-dcnode-id="506" instrument_node="">Taikoo Li Sanlitun</span></a><span data-dcnode-id="504" instrument_node=""> is an open shopping area and comprehensive recreation area opposite to Sanlitun Bar Street. It was opened in 2008 with the name Sanlitun Village; and in 2013, it was renamed as Sanlitun Taikoo Li. Flagship stores of world famous brands, various bars and restaurants with international cuisines and unique five-star hotels are gathered here. Being a fashion leader in Beijing, the once Sanlitun village has become a fashionable landmark and urban tourist attraction in Beijing that attracts artists and tourists from all over the world.</span><br data-dcnode-id="503"><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">Stores are distributed along inter-connected paths in the southern area. This layout, with no fixed route, makes Sanlitun shopping a discovery tour. You will be amazed by its world famous brand flagship stores, such as Adidas, Uniqlo, Mango, Puma, Steve Madden, Nike, Columbia, North Face, Crocodiles, Apple, Hong Kong jewelry brand Chow Tai Fook, Quiksilver, C.P.U, Twice, Fossil, Reiss and Q’ggle.</span><br data-dcnode-id="500"><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">Many luxury stores ranging from creative luxury shops to forefront designer brands, such as Rolex, the French fashion brand agnès b, MFG, Paris fashion handbags brand LONGCHAMP, Italian furniture brand Natuzzi, Emporio Armani and local original designs, have opened their stores in the northern area.</span><br data-dcnode-id="497"><span data-dcnode-id="496" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="492"><h3 class="h3_02" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Sanlitun SOHO</span></h3></div><p data-dcnode-id="491"></p><span data-dcnode-id="490" instrument_node=""> </span><span data-dcnode-id="489" instrument_node=""> </span><span data-dcnode-id="488" instrument_node=""> </span><span data-dcnode-id="484" instrument_node=""> </span><span data-dcnode-id="482" instrument_node=""> </span><span data-dcnode-id="481" instrument_node=""> </span><span data-dcnode-id="476" instrument_node=""> </span><span data-dcnode-id="474" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="472"><tbody data-dcnode-id="473"><tr data-dcnode-id="483"><td align="center" data-dcnode-id="485"><span data-dcnode-id="486"><img alt="Sanlitun Shopping Mall" data-dcnode-id="487" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2012/beijing-sanlitun.jpg&amp;raw" style="width: 350px; height: 260px; display: block;"></span></td></tr><tr data-dcnode-id="475"><td align="center" data-dcnode-id="477" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="478"><span data-dcnode-id="479" style="font-weight: normal;"><span data-dcnode-id="480" instrument_node="">Shopping Mall near Sanlitun</span></span></span></td></tr></tbody></table><p data-dcnode-id="465"><span data-dcnode-id="471" instrument_node="">Another famous Sanlitun shopping plaza is SOHO. There are 5 shopping areas, in the whole Sanlitun SOHO with quite many stores and restaurants, for example, famous Vogue and Vera selling shoes. You can also have a hairdressing at hair shops, like Moon Hair Salon. Shishaking, Shoon Shine, Top Gloria, Kyovintage, etc. are all the stores in Sanlitun SOHO for shopping.</span><br data-dcnode-id="470"><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">What’s more, the Pacific Department Store, Sanlitun Yashow Market, Topwin Center, etc. are also great shopping malls in Sanlitun Beijing.</span><br data-dcnode-id="467"><span data-dcnode-id="466" instrument_node="">&nbsp;</span></p><p data-dcnode-id="464"></p><div class="subTitle2017" data-dcnode-id="461"><h3 class="h3_02" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Try Fine Foods from All Over the World</span></h3></div><p data-dcnode-id="460"></p><p data-dcnode-id="456"><span data-dcnode-id="459" instrument_node="">There are many restaurants in Sanlitun offering different cuisines, ranging from innovative Chinese to American and from traditional Vietnamese to authentic Spanish Tapas. The food is consistent with the high-end surroundings. Some of the famous Sanlitun restaurants include Hong Kong Hotpot Restaurant, Miss Fu in Chengdu of Sichuan cuisine, Hidden Kitchen of Hunan cuisine, Biteapitta of Middle East foods, Lily's American Diner LAD, Home Thai, and so on.</span><br data-dcnode-id="458"><span data-dcnode-id="457" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="453"><h3 class="h3_02" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Watch the Latest Movies</span></h3></div><p data-dcnode-id="452"></p><p data-dcnode-id="448"><span data-dcnode-id="451" instrument_node="">There are several cinemas in Sanlitun, among which the largest and most famous is Megabox. Megabox is located in south area of Taikoo Li Sanlitun, providing a relaxing environment with the first-class audio and visual systems and comfortable seating to ensure a high-quality viewing experience. You are allowed to take food and drink there to watch movies except melon seeds and burgers that may influence others. Of course, you can also buy popcorns and other snacks in the cinema. Other luxury Sanlitun cinemas are available there as well, like Cinker Cimemas in Pacific Century Place, IVIMOVIE Movie Street in Shimao Plaza.</span><br data-dcnode-id="450"><span data-dcnode-id="449" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="445"><h3 class="h3_02" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Appreciate the Most Popular Arts</span></h3></div><p data-dcnode-id="444"></p><p data-dcnode-id="440"><span data-dcnode-id="443" instrument_node="">Art in Sanlitun is integrated into the details of life. You may see sculptures of local artists and world-renowned designer displayed on the street or on the square. There are also a large number of indoor art galleries, photography studios, fashion shows and photography exhibitions. You can also enjoy colorful performances, such as magic and comedy.</span><br data-dcnode-id="442"><span data-dcnode-id="441" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="437"><h2 class="h2_01" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">How to get to Sanlitun Beijing</span></h2></div><p data-dcnode-id="436"></p><div class="subTitle2017" data-dcnode-id="433"><h3 class="h3_02" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">By Subway:</span></h3></div><p data-dcnode-id="432"></p><p data-dcnode-id="425"><span data-dcnode-id="431" instrument_node="">Take </span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/transportation/subway-line10.htm"><span data-dcnode-id="430" instrument_node="">subway line 10</span></a><span data-dcnode-id="428" instrument_node=""> and get off at Tuanjiehu Station through Exit A, and then walk westwards along North Gongren Tiyuchang Road.</span><br data-dcnode-id="427"><span data-dcnode-id="426" instrument_node="">&nbsp;</span></p><div class="subTitle2017" data-dcnode-id="422"><h3 class="h3_02" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">By Bus:</span></h3></div><p data-dcnode-id="421"></p><p data-dcnode-id="417"><span data-dcnode-id="420" instrument_node="">Buses 113, 115, 431, 701, Te 16, Night Bus 3, or Night Bus 34 can take you directly to Sanlitun.</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">Take bus 3, 110, 117, 118, 120, 403, Night Bus 6, or Night Bus 24 and get off at Worker's Stadium Stop.</span></p><br data-dcnode-id="416"><img alt="" data-dcnode-id="415" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="414" instrument_node="">&nbsp;Recommended Nearby Attractions:</span><br data-dcnode-id="413"><img alt="" data-dcnode-id="412" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="411" instrument_node="">&nbsp; </span><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/chaoyang-park.htm"><span data-dcnode-id="410" instrument_node="">Chaoyang Park</span></a><span data-dcnode-id="408" instrument_node=""> (Sun Park)</span><br data-dcnode-id="407"><img alt="" data-dcnode-id="406" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="405" instrument_node="">&nbsp; </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/dongyue-temple.htm"><span data-dcnode-id="404" instrument_node="">Dongyue Temple</span></a><br data-dcnode-id="402"><img alt="" data-dcnode-id="401" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="400" instrument_node="">&nbsp; </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/yonghe.htm"><span data-dcnode-id="399" instrument_node="">Yonghe&nbsp;Temple</span></a><span data-dcnode-id="397" instrument_node=""> (Harmony and Peace Palace Lamasery)</span><br data-dcnode-id="396"><img alt="" data-dcnode-id="395" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="394" instrument_node="">&nbsp; </span><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/ritan-park.htm"><span data-dcnode-id="393" instrument_node="">Temple of the Sun</span></a><span data-dcnode-id="391" instrument_node=""> (Ritan Park)</span><br data-dcnode-id="390"><img alt="" data-dcnode-id="389" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="388" instrument_node="">&nbsp; </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/workers-stadium.htm"><span data-dcnode-id="387" instrument_node="">Workers' Stadium</span></a><br data-dcnode-id="385"><br data-dcnode-id="384"><img alt="" data-dcnode-id="383" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="382" instrument_node="">&nbsp;</span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/beijing/top-10-places-to-visit.htm"><span data-dcnode-id="381" instrument_node="">Top 10 Places to Visit in Beijing</span></a><br data-dcnode-id="379"><img alt="" data-dcnode-id="378" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="377" instrument_node="">&nbsp;</span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/beijing/night-tours.htm"><span data-dcnode-id="376" instrument_node="">Beijing Night Tours&nbsp; –&nbsp; Top 8 Night Activities</span></a><p data-dcnode-id="374"></p><span data-dcnode-id="373" instrument_node="">
