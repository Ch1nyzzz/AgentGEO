</span><span data-dcnode-id="702" instrument_node=""> </span><span data-dcnode-id="701" instrument_node=""> </span><span data-dcnode-id="700" instrument_node=""> </span><span data-dcnode-id="694" instrument_node=""> </span><span data-dcnode-id="692" instrument_node=""> </span><span data-dcnode-id="691" instrument_node=""> </span><span data-dcnode-id="688" instrument_node=""> </span><span data-dcnode-id="686" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic ixboxTable" data-dcnode-id="684"><tbody data-dcnode-id="685"><tr data-dcnode-id="693"><td align="center" data-dcnode-id="695"><span data-dcnode-id="699" instrument_node=""> </span><div class="ixbox noTitle dw350h260" data-dcnode-id="697"><img alt="Hutong Tour by Rickshaw" data-dcnode-id="698" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2009/0831173511.jpg&amp;raw" style="float: none; display: block;"></div><span data-dcnode-id="696" instrument_node=""> </span></td></tr><tr data-dcnode-id="687"><td align="center" data-dcnode-id="689" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="690" instrument_node="">Tour by Rickshaw</span></td></tr></tbody></table><p data-dcnode-id="658"><span data-dcnode-id="683" instrument_node="">Crisscrossing hutongs and </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/hutong/yard.htm"><span data-dcnode-id="682" instrument_node="">old courtyards</span></a><span data-dcnode-id="680" instrument_node=""> form the living places of the natives in Beijing. Many folk activities still remain there.</span><br data-dcnode-id="679"><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">In central Beijing, there are two main areas for the ancient small alleys - one is the </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/shichahai.htm"><span data-dcnode-id="676" instrument_node="">Shichahai</span></a><span data-dcnode-id="674" instrument_node=""> and </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/bell.htm"><span data-dcnode-id="673" instrument_node="">Bell / Drum Towers</span></a><span data-dcnode-id="671" instrument_node=""> Area not far to the north of the </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/forbidden.htm"><span data-dcnode-id="670" instrument_node="">Forbidden City</span></a><span data-dcnode-id="668" instrument_node="">, and the other is the </span><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/qianmen.htm"><span data-dcnode-id="667" instrument_node="">Qianmen</span></a><span data-dcnode-id="665" instrument_node=""> and </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/dashilan-street.htm"><span data-dcnode-id="664" instrument_node="">Dashilar</span></a><span data-dcnode-id="662" instrument_node=""> Area to the south of the </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/tianan.htm"><span data-dcnode-id="661" instrument_node="">Tiananmen Square</span></a><span data-dcnode-id="659" instrument_node="">.</span></p><div class="subTitle2017" data-dcnode-id="653"><h2 class="h2_01" data-dcnode-id="655"><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/nanluogu-xiang.htm"><span data-dcnode-id="657" instrument_node="">Nanluoguxiang</span></a></h2><span data-dcnode-id="654" instrument_node="">(South Gong and Drum Lane)</span></div><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">This old lane is renowned for its long history, culture, specialty stores, and distinctive foods. It is 2,582 feet (787 meters) long and 26 feet (8 meters) wide, with its north end joining East Drum Tower Street, and the south end connecting East Di'anmen Street. This alley is also called Centipede Street because of the eight alleys symmetrically arranged on the two sides of the major lane.</span></p><span data-dcnode-id="650" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="645"><h2 class="h2_01" data-dcnode-id="647"><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/yandai-xiejie.htm"><span data-dcnode-id="649" instrument_node="">Yandaixie Street</span></a></h2><span data-dcnode-id="646" instrument_node="">(Yandai Xiejie)</span></div><span data-dcnode-id="644" instrument_node="">It measures 761 feet (232 meters) long, connecting Di'anmen Outer Street at the east end and the junction of Xiaoshibei and Ya'er Hutongs at the west end. The slender street is like a pipe's stem, stretching from northeast to southwest, and its east end looks like the pipe's mouth. Besides, there used to be a bunch of pipe shops in late </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/history/qing.htm"><span data-dcnode-id="643" instrument_node="">Qing Dynasty</span></a><span data-dcnode-id="641" instrument_node=""> (1644 – 1911). So people called this street Skewed Tobacco Pouch. Today, many different kinds of bars, tea houses, coffee rooms and souvenir shops have mushroomed on the street.</span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">&nbsp;</span><p data-dcnode-id="638"></p><div class="subTitle2017" data-dcnode-id="634"><h2 class="h2_01" data-dcnode-id="635"><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/mao-er-hutong.htm"><span data-dcnode-id="637" instrument_node="">Mao'er Hutong</span></a></h2></div><span data-dcnode-id="633" instrument_node="">It is in the northwest of </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dongcheng-district/"><span data-dcnode-id="632" instrument_node="">Dongcheng District</span></a><span data-dcnode-id="630" instrument_node="">, stretching 1,919 feet (585 meters) from South Gong and Drum Lane to Di'anmen Outer Street. A lot of celebrities have lived there, such as Wan Rong - the last empress, Feng Guozhang - a leader of the Northern Warlords (1912-1926), and Hong Chengchou - a general in the </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/history/ming.htm"><span data-dcnode-id="629" instrument_node="">Ming Dynasty</span></a><span data-dcnode-id="627" instrument_node=""> (1368 –1644). Many of their former residences remain there.</span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="621"><h2 class="h2_01" data-dcnode-id="622"><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/guozijian-street.htm"><span data-dcnode-id="624" instrument_node="">Guozijian Street</span></a></h2></div><span data-dcnode-id="620" instrument_node="">Guozijian Street is to the west of </span><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/yonghe.htm"><span data-dcnode-id="619" instrument_node="">Yonghe Temple</span></a><span data-dcnode-id="617" instrument_node="">, with its east end joining Yonghe Lamasery Street while the west end adjoins Andingmen Inner Street. The street is 2,195 feet (669 meters) in length and 36 feet (11 meters) in width. It is the only old alley in Beijing that still has traditional arches. Guozijian Street is renowned for its old-time Beijing layout and architectures, authentic native lifestyle, </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/confucius.htm"><span data-dcnode-id="616" instrument_node="">Temple of Confucius</span></a><span data-dcnode-id="614" instrument_node=""> and </span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/guozijian.htm"><span data-dcnode-id="613" instrument_node="">Imperial Academy</span></a><span data-dcnode-id="611" instrument_node=""> (Guozijian).</span><p data-dcnode-id="610"></p><div align="justify" data-dcnode-id="394"><span data-dcnode-id="609" instrument_node=""> </span><span data-dcnode-id="608" instrument_node=""> </span><span data-dcnode-id="607" instrument_node=""> </span><span data-dcnode-id="585" instrument_node=""> </span><span data-dcnode-id="561" instrument_node=""> </span><span data-dcnode-id="539" instrument_node=""> </span><span data-dcnode-id="537" instrument_node=""> </span><table align="center" border="0" cellspacing="5" class="ke-zeroborder" data-dcnode-id="535" style="margin: 0px auto;"><tbody data-dcnode-id="536"><tr data-dcnode-id="538"><td data-dcnode-id="586"><span data-dcnode-id="606" instrument_node=""> </span><span data-dcnode-id="605" instrument_node=""> </span><span data-dcnode-id="604" instrument_node=""> </span><span data-dcnode-id="603" instrument_node=""> </span><span data-dcnode-id="599" instrument_node=""> </span><span data-dcnode-id="597" instrument_node=""> </span><span data-dcnode-id="596" instrument_node=""> </span><span data-dcnode-id="593" instrument_node=""> </span><span data-dcnode-id="591" instrument_node=""> </span><span data-dcnode-id="589" instrument_node=""> </span><table cellspacing="0" class="tableInPic" data-dcnode-id="588"><tbody data-dcnode-id="590"><tr data-dcnode-id="598"><td align="center" data-dcnode-id="600"><span data-dcnode-id="601"><img alt="Liulichang Culture Street" data-dcnode-id="602" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2010/beijing-liulichang-street.jpg&amp;raw" style="display: block;"></span></td></tr><tr data-dcnode-id="592"><td align="center" data-dcnode-id="594" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="595" instrument_node="">Liulichang Culture Street</span></td></tr></tbody></table><span data-dcnode-id="587" instrument_node=""> </span></td><td data-dcnode-id="562"><span data-dcnode-id="584" instrument_node=""> </span><span data-dcnode-id="583" instrument_node=""> </span><span data-dcnode-id="582" instrument_node=""> </span><span data-dcnode-id="581" instrument_node=""> </span><span data-dcnode-id="577" instrument_node=""> </span><span data-dcnode-id="575" instrument_node=""> </span><span data-dcnode-id="574" instrument_node=""> </span><span data-dcnode-id="569" instrument_node=""> </span><span data-dcnode-id="567" instrument_node=""> </span><span data-dcnode-id="565" instrument_node=""> </span><table cellspacing="0" class="tableInPic" data-dcnode-id="564"><tbody data-dcnode-id="566"><tr data-dcnode-id="576"><td align="center" data-dcnode-id="578"><span data-dcnode-id="579"><img alt="Entrance of Skewed Tobacco Pouch Street " data-dcnode-id="580" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2009/0831173455.jpg&amp;raw" style="display: block;"></span></td></tr><tr data-dcnode-id="568"><td align="center" data-dcnode-id="570" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="571"><span data-dcnode-id="572" style="font-weight: normal;"><span data-dcnode-id="573" instrument_node="">Skewed Tobacco Pouch Street </span></span></span></td></tr></tbody></table><span data-dcnode-id="563" instrument_node=""> </span></td><td data-dcnode-id="540"><span data-dcnode-id="560" instrument_node=""> </span><span data-dcnode-id="559" instrument_node=""> </span><span data-dcnode-id="558" instrument_node=""> </span><span data-dcnode-id="557" instrument_node=""> </span><span data-dcnode-id="553" instrument_node=""> </span><span data-dcnode-id="551" instrument_node=""> </span><span data-dcnode-id="550" instrument_node=""> </span><span data-dcnode-id="547" instrument_node=""> </span><span data-dcnode-id="545" instrument_node=""> </span><span data-dcnode-id="543" instrument_node=""> </span><table cellspacing="0" class="tableInPic" data-dcnode-id="542"><tbody data-dcnode-id="544"><tr data-dcnode-id="552"><td align="center" data-dcnode-id="554"><span data-dcnode-id="555"><img alt="Tobacco Pouch Store" data-dcnode-id="556" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2009/0402170414.jpg&amp;raw" style="display: block;"></span></td></tr><tr data-dcnode-id="546"><td align="center" data-dcnode-id="548" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="549" instrument_node="">Tobacco Pouch Store</span></td></tr></tbody></table><span data-dcnode-id="541" instrument_node=""> </span></td></tr></tbody></table><span data-dcnode-id="534" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="529"><h2 class="h2_01" data-dcnode-id="531"><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/liuli.htm"><span data-dcnode-id="533" instrument_node="">Liulichang Cultural Street</span></a></h2><span data-dcnode-id="530" instrument_node="">(Colored Glaze Factory Culture Street)</span></div><span data-dcnode-id="528" instrument_node="">This alley has a long history, located outside Heping Gate. Early in the </span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/history/liao/"><span data-dcnode-id="527" instrument_node="">Liao Dynasty</span></a><span data-dcnode-id="525" instrument_node=""> (916 - 1125), it was a village called 'Haiwang'. Then, a colored glaze factory was set up there and thus the name of the alley. Later, it became an antique market. Nowadays, nearly 100 time-honored brands are still there, such as Rongbao Zhai - containing precious </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/arts/chinese-calligraphy.htm"><span data-dcnode-id="524" instrument_node="">calligraphy</span></a><span data-dcnode-id="522" instrument_node=""> and </span><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/arts/chinese-painting.htm"><span data-dcnode-id="521" instrument_node="">paintings</span></a><span data-dcnode-id="519" instrument_node="">, Yungu Zhai - housing quaint enamels and </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/arts/porcelain.htm"><span data-dcnode-id="518" instrument_node="">porcelains</span></a><span data-dcnode-id="516" instrument_node="">, and Yuehai Xuan - selling traditional musical instruments.</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="509"><h2 class="h2_01" data-dcnode-id="511"><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/jinyu-hutong.htm"><span data-dcnode-id="513" instrument_node="">Jinyu Hutong</span></a></h2><span data-dcnode-id="510" instrument_node="">&nbsp;(Goldfish Hutong)</span></div><span data-dcnode-id="508" instrument_node="">With its east end joining North Dongdan Street while the west end adjoins </span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/shopping/wangfujing-dajie/"><span data-dcnode-id="507" instrument_node="">Wangfujing Street</span></a><span data-dcnode-id="505" instrument_node="">, it measures 1,860 feet (567 meters) long. It is wider than other alleys in Beijing and houses the famous Jixiang Theater, Peninsular Hotel, and Novotel Peace Hotel.</span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="498"><h2 class="h2_01" data-dcnode-id="500"><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/dongjiaomin-lane.htm"><span data-dcnode-id="502" instrument_node="">Dongjiaomin Lane</span></a></h2><span data-dcnode-id="499" instrument_node="">&nbsp;(Dongjiaomin Xiang)</span></div><span data-dcnode-id="497" instrument_node="">Together with Xijiaomin Lane, they are called the longest hutong in Beijing, with a length of 9,843 feet (3 kilometers). Stretching from East Tiananmen Square Road to Chongwenmen Inner Street, Dongjiaomin Lane used to be the location of many foreign embassies. There are also sites of old churches, banks, official mansions and clubs. Buildings there form the only European style block in Beijing, which contains the early 20th-century features.</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="490"><h2 class="h2_01" data-dcnode-id="492"><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/xijiaomin-lane.htm"><span data-dcnode-id="494" instrument_node="">Xijiaomin Lane</span></a></h2><span data-dcnode-id="491" instrument_node="">(Xijiaomin Xiang)</span></div><span data-dcnode-id="489" instrument_node="">It is an east-west alley starting from West Tiananmen Square Road to North Xinhua Street, measuring 3,543 feet (1.08 km) in length. More than ten banks were set on this alley from late Qing Dynasty to late 20th century, making it the 'Financial Street of old Beijing'. There are many sites of old banks, such as Central Bank, Continental Bank, and Commercial Guarantee Bank of Beiyang Government.</span><br data-dcnode-id="488"><span data-dcnode-id="487" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="484"><h2 class="h2_01" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Ju'er Hutong</span></h2></div><span data-dcnode-id="483" instrument_node="">With a length of 1,437 feet (438 meters), it starts from Jiaodaokou South Street in the east and ends at South Gong and Drum Lane in the west. It houses the former residence of Rong Lu, a minister in the late Qing Dynasty, including his mansion, ancestral hall, and garden.</span><br data-dcnode-id="482"><span data-dcnode-id="481" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="476"><h2 class="h2_01" data-dcnode-id="478"><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/bada-hutong.htm"><span data-dcnode-id="480" instrument_node="">Bada Hutong</span></a></h2><span data-dcnode-id="477" instrument_node="">&nbsp;(Eight Great Hutongs)</span></div><span data-dcnode-id="475" instrument_node="">Once the synonym for the red-light district in old Beijing, it refers to an area to the west of Guanyin Temple and near Dashilar Street outside Qianmen Gate. This area features eight alleys from west to east named Baishun, Yanzhi, Hanjia, Shaanxi, Stone (Shitou), Zongshu Xiejie, Zhujia, and Xiaoli.</span><span data-dcnode-id="474" instrument_node=""> </span><span data-dcnode-id="473" instrument_node=""> </span><span data-dcnode-id="472" instrument_node=""> </span><span data-dcnode-id="451" instrument_node=""> </span><span data-dcnode-id="430" instrument_node=""> </span><span data-dcnode-id="428" instrument_node=""> </span><table align="center" border="0" cellpadding="5" cellspacing="5" class="ke-zeroborder" data-dcnode-id="426" style="margin: 0px auto;"><tbody data-dcnode-id="427"><tr data-dcnode-id="429"><td data-dcnode-id="452"><span data-dcnode-id="471" instrument_node=""> </span><span data-dcnode-id="470" instrument_node=""> </span><span data-dcnode-id="469" instrument_node=""> </span><span data-dcnode-id="468" instrument_node=""> </span><span data-dcnode-id="465" instrument_node=""> </span><span data-dcnode-id="463" instrument_node=""> </span><span data-dcnode-id="462" instrument_node=""> </span><span data-dcnode-id="459" instrument_node=""> </span><span data-dcnode-id="457" instrument_node=""> </span><span data-dcnode-id="455" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="454"><tbody data-dcnode-id="456"><tr data-dcnode-id="464"><td align="center" data-dcnode-id="466"><img alt="Walk in hutong" data-dcnode-id="467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2009/0831173544.jpg&amp;raw" style="float: none; display: block;"></td></tr><tr data-dcnode-id="458"><td align="center" data-dcnode-id="460" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="461" instrument_node="">Antique Shops along the Street</span></td></tr></tbody></table><span data-dcnode-id="453" instrument_node=""> </span></td><td data-dcnode-id="431"><span data-dcnode-id="450" instrument_node=""> </span><span data-dcnode-id="449" instrument_node=""> </span><span data-dcnode-id="448" instrument_node=""> </span><span data-dcnode-id="447" instrument_node=""> </span><span data-dcnode-id="444" instrument_node=""> </span><span data-dcnode-id="442" instrument_node=""> </span><span data-dcnode-id="441" instrument_node=""> </span><span data-dcnode-id="438" instrument_node=""> </span><span data-dcnode-id="436" instrument_node=""> </span><span data-dcnode-id="434" instrument_node=""> </span><table align="right" cellspacing="0" class="tableInPic" data-dcnode-id="433"><tbody data-dcnode-id="435"><tr data-dcnode-id="443"><td align="center" data-dcnode-id="445"><img alt="Visiting a Courtyard" data-dcnode-id="446" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2010/0727171907.jpg&amp;raw" style="float: none; display: block;"></td></tr><tr data-dcnode-id="437"><td align="center" data-dcnode-id="439" style="background-color: rgb(239, 239, 239); padding: 10px 5px;"><span data-dcnode-id="440" instrument_node="">Visiting a Courtyard</span></td></tr></tbody></table><span data-dcnode-id="432" instrument_node=""> </span></td></tr></tbody></table><p data-dcnode-id="425"></p><div class="subTitle2017" data-dcnode-id="422"><h2 class="h2_01" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Others</span></h2></div><img alt="" data-dcnode-id="421" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="420" instrument_node="">&nbsp;Zhuanta Hutong: It was named after the Brick Tower (Zhuanta in Chinese) inside, commemorating an eminent monk - Wan Song in the </span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/history/jin/"><span data-dcnode-id="419" instrument_node="">Jin Dynasty</span></a><span data-dcnode-id="417" instrument_node=""> (1115 - 1234).</span><p data-dcnode-id="416"></p><p data-dcnode-id="413"><img alt="" data-dcnode-id="415" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="414" instrument_node="">&nbsp;Fengfu Hutong: It is to the west of Wangfujing Street, housing the former residence of Lao She, one of Chinese famous writers in modern times.</span></p><p data-dcnode-id="410"><img alt="" data-dcnode-id="412" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="411" instrument_node="">&nbsp;One Foot Street (Yichi Dajie): It's the shortest one with a length about 33 feet (10 meters).</span></p><p data-dcnode-id="407"><img alt="" data-dcnode-id="409" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="408" instrument_node="">&nbsp;Qianshi Hutong: It was the location of money market (Qianshi) in the Qing Dynasty. Known as the narrowest one in Beijing, its narrowest point is about 1.3 feet (0.4 meters) wide.</span></p><p data-dcnode-id="401"><img alt="" data-dcnode-id="406" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="405" instrument_node="">&nbsp;</span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/lingjing-hutong.htm"><span data-dcnode-id="404" instrument_node="">Lingjing Hutong</span></a><span data-dcnode-id="402" instrument_node="">: It is the widest one with a width of 106 feet (32.18 meters) at the widest point.</span></p><p data-dcnode-id="398"><img alt="" data-dcnode-id="400" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="399" instrument_node="">&nbsp;Jiuwan Hutong: It has the most curves.&nbsp;</span></p><p data-dcnode-id="395"><img alt="" data-dcnode-id="397" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" width="17"><span data-dcnode-id="396" instrument_node="">&nbsp;Sanmiao Street: It is the oldest one dated from the Liao Dynasty.</span></p></div><br data-dcnode-id="393"><img alt="" data-dcnode-id="392" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="391" instrument_node="">&nbsp;&nbsp;</span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/beijing-one-day-tours.htm"><span data-dcnode-id="390" instrument_node="">Beijing Day Tours</span></a><span data-dcnode-id="388" instrument_node="">
