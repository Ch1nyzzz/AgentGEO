</span><h1 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Top 10 Things to Do in Beijing</span></h1><span data-dcnode-id="622" instrument_node="">
</span></div><span data-dcnode-id="620" instrument_node="">

</span><p data-dcnode-id="608" style="margin: 0cm 0cm 0pt;"></p><p data-dcnode-id="603" style="margin: 0cm 0cm 0pt;"><span data-dcnode-id="607" instrument_node="">The 3,000-year-old city of Beijing is the capital of China and offers plenty of things to do and must-see places for tourists. The city has witnessed the prosperity and ruin of several dynasties in ancient China. Its imperial past, rich culture and modern conveniences attract numerous tourists from all over the world.</span><br data-dcnode-id="606"><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">For both first-timers and frequent visitors, what are the things you must to do in Beijing and where do you must go? Besides the Great Wall and Peking Duck, are there any other interesting things to do? You do need to check our following list of top 10 things to do in Beijing.</span></p><span data-dcnode-id="602" instrument_node="">&nbsp;</span><p data-dcnode-id="601"></p><p data-dcnode-id="600"></p><div class="sectionBorder" data-dcnode-id="559"><div align="justify" class="sectionTitle" data-dcnode-id="593"><div class="subTitle2017" data-dcnode-id="594"><span class="stepNum" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">1 </span></span><span data-dcnode-id="597" instrument_node="">&nbsp;</span><h2 data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">The Great Wall of China</span></h2></div></div><div align="center" data-dcnode-id="591"><img alt="Travel to Beijing Great Wall" class="clsphotogalleryimg width100p_420" data-dcnode-id="592" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/great-wall-hiking.jpg&amp;raw" style="width: 700px; height: 350px;"></div><div class="div_zoContent" data-dcnode-id="560" style="text-align: justify;"><span data-dcnode-id="590" instrument_node="">As one of “the Seven Wonders of the World”, the </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/china_great_wall/"><span data-dcnode-id="589" instrument_node="">Great Wall</span></a><span data-dcnode-id="587" instrument_node=""> is indeed number one among the best things to do in Beijing in one day. Many people know the famous saying “One who fails to reach the Great Wall is not a hero!” which was put forward by Chairman Mao. The Great Wall stretches thousands of miles from east to west and it was built over 2,000 years. The </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/china_great_wall/scene/beijing/badaling.htm"><span data-dcnode-id="586" instrument_node="">Badaling</span></a><span data-dcnode-id="584" instrument_node=""> and </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/china_great_wall/scene/beijing/mutianyu.htm"><span data-dcnode-id="583" instrument_node="">Mutianyu</span></a><span data-dcnode-id="581" instrument_node=""> Great Wall in Beijing are the most famous and best preserved sections. Badaling is so popular that surely it will be crowded particularly during holiday periods. Mutianyu provides a good option to enjoy the majestic grace of the wall.</span><br data-dcnode-id="580"><br data-dcnode-id="579"><img alt="" data-dcnode-id="578" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="577" instrument_node="">&nbsp;Recommended Tour: </span><span class="tour_price" data-dcnode-id="572"><img data-dcnode-id="576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/p18.png&amp;raw" style="vertical-align: middle;"><span data-dcnode-id="575" instrument_node="">&nbsp;</span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/group/tour08.htm" target="_blank"><span data-dcnode-id="574" instrument_node="">2 Days Small Group Tour in Beijing</span></a></span><br data-dcnode-id="571"><br data-dcnode-id="570"><img alt="" data-dcnode-id="569" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" style="text-align: justify;" width="15"><span data-dcnode-id="567" style="text-align: justify;"><span data-dcnode-id="568" instrument_node="">&nbsp;</span></span><span data-dcnode-id="566" instrument_node="">Book a </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/badaling-great-wall-tickets-booking.htm"><span data-dcnode-id="565" instrument_node="">Badaling Great Wall Ticket</span></a><span data-dcnode-id="563" instrument_node="">, </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/mutianyu-great-wall-tickets-booking.htm"><span data-dcnode-id="562" instrument_node="">Mutianyu Great Wall Ticket</span></a></div></div><div class="sectionBorder" data-dcnode-id="518"><div align="justify" class="sectionTitle" data-dcnode-id="552"><div class="subTitle2017" data-dcnode-id="553"><span class="stepNum" data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">2</span></span><span data-dcnode-id="556" instrument_node="">&nbsp;</span><h2 data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Visiting the Forbidden City</span></h2></div></div><div align="center" data-dcnode-id="550"><img alt="Beijing - Imperial Capital and First Choice" class="clsphotogalleryimg width100p_420" data-dcnode-id="551" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2016/0309092813.jpg&amp;raw"></div><div class="div_zoContent" data-dcnode-id="519" style="text-align: justify;"><span data-dcnode-id="549" instrument_node="">The </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/forbidden.htm"><span data-dcnode-id="548" instrument_node="">Forbidden City</span></a><span data-dcnode-id="546" instrument_node="">, also known as the Palace Museum, was the imperial palaces for 24 emperors in the Ming and Qing Dynasties (1368 - 1911). It is the most complete and largest wooden structure complex in China and even in the world. One sixth of all of the cultural relics in China are in the Palace Museum making it one of the top 10 things to do in Beijing. If the weather permits, you can enjoy a panoramic view of the Forbidden City from </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/jingshan.htm"><span data-dcnode-id="545" instrument_node="">Jingshan Park</span></a><span data-dcnode-id="543" instrument_node=""> which is located near the north gate of the Palace Museum.</span><br data-dcnode-id="542"><br data-dcnode-id="541"><img alt="" data-dcnode-id="540" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="539" instrument_node="">&nbsp;Recommended Tour: </span><span class="tour_price" data-dcnode-id="531"><img data-dcnode-id="538" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/p18.png&amp;raw" style="vertical-align: middle;"><span data-dcnode-id="537" instrument_node="">&nbsp;</span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/beijing/08.htm" target="_blank"><span data-dcnode-id="536" instrument_node="">1&nbsp;Day Tour to Tiananmen Square - Forbidden City - Badaling</span></a><span data-dcnode-id="534" instrument_node=""> from </span><span data-dcnode-id="532" style="color:#C10000"><span data-dcnode-id="533" instrument_node="">$90</span></span></span><br data-dcnode-id="530"><br data-dcnode-id="529"><img alt="" data-dcnode-id="528" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" style="text-align: justify;" width="15"><span data-dcnode-id="526" style="text-align: justify;"><span data-dcnode-id="527" instrument_node="">&nbsp;</span></span><span data-dcnode-id="525" instrument_node="">Book a </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/forbidden-city/tickets-booking.htm"><span data-dcnode-id="524" instrument_node="">Forbidden City Ticket</span></a><span data-dcnode-id="522" instrument_node="">,&nbsp;</span><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/beijing-jingshan-park-tickets-booking.htm" style="text-align: justify;"><span data-dcnode-id="521" instrument_node="">Jingshan Park&nbsp;Ticket</span></a></div></div><div class="sectionBorder" data-dcnode-id="493"><div align="justify" class="sectionTitle" data-dcnode-id="511"><div class="subTitle2017" data-dcnode-id="512"><span class="stepNum" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">3</span></span><span data-dcnode-id="515" instrument_node="">&nbsp;</span><h2 data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Tiananmen Square</span></h2></div></div><div align="center" data-dcnode-id="509"><img alt="Tiananmen Square, Beijing" class="clsphotogalleryimg width100p_420" data-dcnode-id="510" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/0521172548.jpg&amp;raw" style="width: 700px; height: 350px;"></div><div class="div_zoContent" data-dcnode-id="494" style="text-align: justify;"><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/tianan.htm"><span data-dcnode-id="508" instrument_node="">Tiananmen Square</span></a><span data-dcnode-id="506" instrument_node="">, a symbol of Beijing, is super large, and stands on the central axis of the city. The square has witnessed a lot of important events of China. In fact, it is where the Chairman Mao proclaimed the founding of the People’s Republic of China. Around Tiananmen Square, you can see </span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/tiananmen-square/people-heroes-monument.htm"><span data-dcnode-id="505" instrument_node="">Monument to the People's Heroes</span></a><span data-dcnode-id="503" instrument_node="">, the </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/tiananmen-square/national-museum.htm"><span data-dcnode-id="502" instrument_node="">National Museum of China</span></a><span data-dcnode-id="500" instrument_node="">, and the </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/tiananmen-square/chairman-mao-mausoleum.htm"><span data-dcnode-id="499" instrument_node="">Chairman Mao Memorial Hall</span></a><span data-dcnode-id="497" instrument_node=""> which contains the remains of the great leader. A lot of local people attend the daily Flag-Raising Ceremony on the square and it is one of the must-do things for Chinese tourists. A visit here in the early morning would be a pretty unique experience.</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">&nbsp;</span></div></div><div class="sectionBorder" data-dcnode-id="458"><div align="justify" class="sectionTitle" data-dcnode-id="486"><div class="subTitle2017" data-dcnode-id="487"><span class="stepNum" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">4</span></span><span data-dcnode-id="490" instrument_node="">&nbsp;</span><h2 data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Summer Palace</span></h2></div></div><div align="center" data-dcnode-id="484"><img alt="Summer Palace, Beijing" class="clsphotogalleryimg width100p_420" data-dcnode-id="485" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/0521172415.jpg&amp;raw" style="width: 700px; height: 350px;"></div><div class="div_zoContent" data-dcnode-id="459" style="text-align: justify;"><span data-dcnode-id="483" instrument_node="">The </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/summer.htm"><span data-dcnode-id="482" instrument_node="">Summer Palace</span></a><span data-dcnode-id="480" instrument_node=""> served as a resort for the imperial family in the Qing Dynasty (1644 - 1911). Situated on Kunming Lake and Longevity Hill, the park was constructed in Southern classical garden style and is the best-preserved royal garden in China. Here you can experience the unique design of ancient Chinese buildings and enjoy the fascinating landscape. What’s more, if the weather permits, you can take a boat trip on Kunming Lake and that will be a fun thing to do in Beijing in spring.</span><br data-dcnode-id="479"><br data-dcnode-id="478"><img alt="" data-dcnode-id="477" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="476" instrument_node="">&nbsp;Recommended Tour: &nbsp;</span><span class="tour_price" data-dcnode-id="468"><img data-dcnode-id="475" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/p18.png&amp;raw" style="vertical-align: middle;"><span data-dcnode-id="474" instrument_node="">&nbsp;</span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/tour-bj01.htm" target="_blank"><span data-dcnode-id="473" instrument_node="">Beijing 4-Day Tour with Summer Palace</span></a><span data-dcnode-id="471" instrument_node=""> from </span><span data-dcnode-id="469" style="color:#C10000"><span data-dcnode-id="470" instrument_node="">$539</span></span></span><br data-dcnode-id="467"><br data-dcnode-id="466"><img alt="" data-dcnode-id="465" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" style="text-align: justify;" width="15"><span data-dcnode-id="463" style="text-align: justify;"><span data-dcnode-id="464" instrument_node="">&nbsp;</span></span><span data-dcnode-id="462" instrument_node="">Book a </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/summer-palace-tickets-booking.htm"><span data-dcnode-id="461" instrument_node="">Summer Palace Ticket</span></a></div></div><div class="sectionBorder" data-dcnode-id="434"><div align="justify" class="sectionTitle" data-dcnode-id="451"><div class="subTitle2017" data-dcnode-id="452"><span class="stepNum" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">5</span></span><span data-dcnode-id="455" instrument_node="">&nbsp;</span><h2 data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Tasting Beijing Roast Duck</span></h2></div></div><div align="center" data-dcnode-id="449"><img alt="Tasting Beijing Roast Duck" class="clsphotogalleryimg width100p_420" data-dcnode-id="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/peking-roast-duck.jpg&amp;raw" style="width: 700px; height: 350px;"></div><div class="div_zoContent" data-dcnode-id="435" style="text-align: justify;"><span data-dcnode-id="448" instrument_node="">Tasting </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/duck.htm"><span data-dcnode-id="447" instrument_node="">Roast Duck</span></a><span data-dcnode-id="445" instrument_node="">, a typical local food, is no doubt one of the top 10 things to do in Beijing. The first premier of China, Premier Zhou received the foreign guests with this delicious food at least 27 times. In fact, there are two kinds of Peking Duck Menlu Roasted Duck made in the oven and Gualu Roasted Duck roasted over the fire. The famous </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/roastduck/"><span data-dcnode-id="444" instrument_node="">Quanjude Restaurant</span></a><span data-dcnode-id="442" instrument_node=""> mainly serves Gualu Roasted Duck. Generally, people eat it with a pancake and various vegetables. It is popular among ladies and children to eat with sugar.</span><br data-dcnode-id="441"><br data-dcnode-id="440"><img alt="" data-dcnode-id="439" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="438" instrument_node="">&nbsp;Further Reading: </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/dinning/roastduck/bianyifang.htm"><span data-dcnode-id="437" instrument_node="">Top 10 Peking Duck Restaurants</span></a></div></div><div class="sectionBorder" data-dcnode-id="413"><div align="justify" class="sectionTitle" data-dcnode-id="427"><div class="subTitle2017" data-dcnode-id="428"><span class="stepNum" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">6</span></span><span data-dcnode-id="431" instrument_node="">&nbsp;</span><h2 data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Enjoy Peking Opera</span></h2></div></div><div align="center" data-dcnode-id="425"><img alt="Enjoying the Peking Opera" class="clsphotogalleryimg width100p_420" data-dcnode-id="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/0521171916.jpg&amp;raw" style="width: 700px; height: 350px;"></div><div class="div_zoContent" data-dcnode-id="414" style="text-align: justify;"><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/arts/beijing_opera/"><span data-dcnode-id="424" instrument_node="">Peking Opera</span></a><span data-dcnode-id="422" instrument_node="">, also called Beijing Opera, is regarded as the quintessence of Chinese culture. The compelling performance includes the magnificent costumes, facial makeup, skilled actions, unique vocals and literary stories. The facial masks are particular interesting, and are painted with different colors to reveal specific characteristics. For example, the red face symbolizes loyalty and straightness while the white face shows treachery and paranoia. Enjoying some major representative work, such as Farewell My Concubine in the Chang'an Grand Theatre, would be an interesting thing to do in Beijing at night. The Beijing Opera House and Mei Lanfang Theatre are also recommended places for enjoying the Opera.</span><br data-dcnode-id="421"><br data-dcnode-id="420"><img alt="" data-dcnode-id="419" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" style="cursor: default; color: rgb(51, 51, 51); font-family: sans-serif, Arial, Verdana, &quot;Trebuchet MS&quot;; font-size: 13px; text-align: justify; background-color: rgb(255, 255, 255);" width="15"><span data-dcnode-id="417" style="color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px; text-align: justify;"><span data-dcnode-id="418" instrument_node="">&nbsp;</span></span><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/liyuan-theater-peking-opera-tickets-booking.htm"><span data-dcnode-id="416" instrument_node="">Liyuan Theater Peking Opera Booking</span></a></div></div><div class="sectionBorder" data-dcnode-id="393"><div align="justify" class="sectionTitle" data-dcnode-id="406"><div class="subTitle2017" data-dcnode-id="407"><span class="stepNum" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">7</span></span><span data-dcnode-id="410" instrument_node="">&nbsp;</span><h2 data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Watching a Kungfu Show</span></h2></div></div><div align="center" data-dcnode-id="405"></div><div class="div_zoContent" data-dcnode-id="395" style="text-align: justify;"><span data-dcnode-id="404" instrument_node="">Watching a Kungfu show is another interesting thing to do at night. The Legend of Kung Fu at </span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/red-theater.htm"><span data-dcnode-id="403" instrument_node="">Red Theatre</span></a><span data-dcnode-id="401" instrument_node=""> represents the highest level of the&nbsp;&nbsp;</span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/martial_arts/"><span data-dcnode-id="400" instrument_node="">Chinese Kungfu</span></a><span data-dcnode-id="398" instrument_node="">&nbsp;performance. Here you can see the marvelous martial art skills as well as the elegant, free and graceful dance. The impressive show will give you an incomparable experience.</span><br data-dcnode-id="397"><span data-dcnode-id="396" instrument_node="">&nbsp;</span></div><div class="div_zoContent" data-dcnode-id="394"></div></div><div class="sectionBorder" data-dcnode-id="356"><div class="sectionTitle" data-dcnode-id="386"><div class="subTitle2017" data-dcnode-id="387"><span class="stepNum" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">8</span></span><span data-dcnode-id="390" instrument_node="">&nbsp;</span><h2 data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Old Hutongs</span></h2></div></div><div align="center" data-dcnode-id="384"><img alt="Rickshaw Tour in Old Hutongs" class="clsphotogalleryimg width100p_420" data-dcnode-id="385" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/beijing-hutongs.jpg&amp;raw" style="width: 700px; height: 350px;"></div><div class="div_zoContent" data-dcnode-id="357" style="text-align: justify;"><span data-dcnode-id="383" instrument_node="">Hundreds of crisscrossing </span><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/hutong/"><span data-dcnode-id="382" instrument_node="">Hutongs</span></a><span data-dcnode-id="380" instrument_node=""> form the old blocks of the city, and are must-see places in Beijing. Hutong is the unique name for the local narrow lanes, which are now flourishing with antique residences, boutique stores, featured souvenir shops, popular restaurants and stylish bars. You can take a leisurely stroll or ride a bicycle here just like the old Beijingers, or take a ride on a rickshaw. </span><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/nanluogu-xiang.htm"><span data-dcnode-id="379" instrument_node="">Nanluoguxiang</span></a><span data-dcnode-id="377" instrument_node=""> is a popular Hutong with lots of local foods and crowded with visitors. </span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/houhai.htm"><span data-dcnode-id="376" instrument_node="">Houhai Bar Street</span></a><span data-dcnode-id="374" instrument_node=""> is a good place to have a drink. If you happen to travel in December or January, you may want to try one of the most popular things to do in Beijing in winter – skating on the iced lakes in the </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/shichahai.htm"><span data-dcnode-id="373" instrument_node="">Shichahai Hutong Area</span></a><span data-dcnode-id="371" instrument_node="">.</span><br data-dcnode-id="370"><br data-dcnode-id="369"><img alt="" data-dcnode-id="368" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="367" instrument_node="">&nbsp;Recommended Tour: </span><span class="tour_price" data-dcnode-id="359"><img data-dcnode-id="366" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/p18.png&amp;raw" style="vertical-align: middle;"><span data-dcnode-id="365" instrument_node="">&nbsp;</span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/tour-bj02.htm" target="_blank"><span data-dcnode-id="364" instrument_node="">Beijing 5&nbsp;Days&nbsp;Tour with Hutong</span></a><span data-dcnode-id="362" instrument_node=""> from </span><span data-dcnode-id="360" style="color:#C10000"><span data-dcnode-id="361" instrument_node="">$122</span></span></span><br data-dcnode-id="358"></div></div><div class="sectionBorder" data-dcnode-id="339"><div class="sectionTitle" data-dcnode-id="349"><div class="subTitle2017" data-dcnode-id="350"><span class="stepNum" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">9</span></span><span data-dcnode-id="353" instrument_node="">&nbsp;</span><h2 data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Panjiayuan Flea Market</span></h2></div></div><div align="center" data-dcnode-id="347"><img alt="Panjiayuan Flea Market" class="clsphotogalleryimg width100p_420" data-dcnode-id="348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/0521173750.jpg&amp;raw" style="width: 700px; height: 350px;"></div><div class="div_zoContent" data-dcnode-id="340" style="text-align: justify;"><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/shopping/panjiayuan-market.htm"><u data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Panjiayuan</span></u></a><span data-dcnode-id="343" instrument_node=""> is among the best places to visit for antique lovers. The main items found here include jewelry, jade, handicrafts and decorations. The market started in 1992 and is now the most popular antique market in China. Here you can find many interesting handicrafts or decorations. However, if you want to purchase jewelry or some valuable antiques, we recommend you to consult an expert to guard against being deceived.</span><br data-dcnode-id="342"><span data-dcnode-id="341" instrument_node="">&nbsp;</span></div></div><div class="sectionBorder" data-dcnode-id="312"><div class="sectionTitle" data-dcnode-id="332"><div class="subTitle2017" data-dcnode-id="333"><span class="stepNum" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">10</span></span><span data-dcnode-id="336" instrument_node="">&nbsp;</span><h2 data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Experiencing High Speed Trains</span></h2></div></div><div align="center" data-dcnode-id="331"></div><div class="div_zoContent" data-dcnode-id="313"><span data-dcnode-id="330" instrument_node="">After experiencing all the above, what else should I do in Beijing? Take the extremely modern high speed train and leave the city. </span><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/china-trains/high-speed/"><span data-dcnode-id="329" instrument_node="">China high speed trains</span></a><span data-dcnode-id="327" instrument_node=""> have a great reputation because of their advanced technology, safety and high speed. From the Beijing South Station, you can leave for Tianjin, Jinan, Nanjing, Shanghai, etc. From Beijing West Station, one of the largest stations in Asia, you can go here to Zhengzhou, Wuhan, Changsha, Guangzhou. Some of these make great day trips.</span><br data-dcnode-id="326"><br data-dcnode-id="325"><img alt="" data-dcnode-id="324" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/logo/ico/hot2.gif&amp;raw" width="15"><span data-dcnode-id="323" instrument_node="">&nbsp;Recommended Tour: </span><span class="tour_price" data-dcnode-id="315"><img data-dcnode-id="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/p18.png&amp;raw" style="vertical-align: middle;"><span data-dcnode-id="321" instrument_node="">&nbsp;</span><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/tour-bj03.htm" target="_blank"><span data-dcnode-id="320" instrument_node="">6&nbsp;Days Beijing Shanghai Tour by High Speed Train</span></a><span data-dcnode-id="318" instrument_node=""> from </span><span data-dcnode-id="316" style="color:#C10000"><span data-dcnode-id="317" instrument_node="">$939</span></span></span><br data-dcnode-id="314"></div></div><div class="recomLinks" data-dcnode-id="266"><div class="subTitle" data-dcnode-id="309"><h2 class="recomTitle" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">You May Like</span></h2></div><div class="recomUnits" data-dcnode-id="268"><div class="linkUnit" data-dcnode-id="299"><span data-dcnode-id="308" instrument_node=""> </span><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/beijing.htm" target="_blank"><span class="linkPhoto" data-dcnode-id="305"><span data-dcnode-id="307" instrument_node=""> </span><img alt="" data-dcnode-id="306" xsrc="https://data.travelchinaguide.com/package/image/index/0905145.jpg"></span><span class="linkTitle" data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Beijing Tour Packages</span></span><span data-dcnode-id="302" instrument_node=""> </span></a><div class="clear" data-dcnode-id="300"></div></div><div class="linkUnit" data-dcnode-id="289"><span data-dcnode-id="298" instrument_node=""> </span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/beijing/how-to-plan-a-trip.htm" target="_blank"><span class="linkPhoto" data-dcnode-id="295"><span data-dcnode-id="297" instrument_node=""> </span><img alt="" data-dcnode-id="296" xsrc="/images/photogallery/2010/0520103704.jpg"></span><span class="linkTitle" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">How to Plan a Trip to Beijing Step by Step</span></span><span data-dcnode-id="292" instrument_node=""> </span></a><div class="clear" data-dcnode-id="290"></div></d
