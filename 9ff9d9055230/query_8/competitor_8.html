</span></p><span data-dcnode-id="4067" instrument_node="">
</span><p class="pfeatDesc" data-dcnode-id="4052"><strong data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">Japan</span></strong><span data-dcnode-id="4064" instrument_node=""> at its best!. Start your trip in </span><strong data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">Tokyo</span></strong><span data-dcnode-id="4061" instrument_node="">, the world`s most populous metropolis and recently awarded as the city with best Helpfulness of locals`, `Nightlife`, `Shopping` and Best Local Transportation. Then take the train to </span><strong data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">Kyoto</span></strong><span data-dcnode-id="4058" instrument_node="">, known as the City of the Ten Thousand Shrines for a reason! Since it holds about a quarter of Japan`s National Treasures and popular festivals. Last but not least go to </span><strong data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">Osaka</span></strong><span data-dcnode-id="4055" instrument_node="">, famous for its  delicious traditional food along with its Castle and renowned Osaka Aquarium Kaiyukan, definitely a trip not to be missed!. </span><b data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">This is a flexible vacation package. Select your number of nights in each city, desired hotel and activities.</span></b></p><span data-dcnode-id="4051" instrument_node="">
</span><p class="pfeatIncld" data-dcnode-id="4046"><span data-dcnode-id="4050" instrument_node="">
</span><b data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">Included:</span></b><span data-dcnode-id="4047" instrument_node="">
</span></p><ul data-dcnode-id="4011"><span data-dcnode-id="4045" instrument_node="">
</span><li data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">Flight into Tokyo and out of Osaka</span></li><span data-dcnode-id="4042" instrument_node="">
</span><li data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">High-speed train Shinkansen (Japan Rail Pass - bullet train)</span></li><span data-dcnode-id="4039" instrument_node="">
</span><li data-dcnode-id="4032"><span class="P_Gry_Arial_11" data-dcnode-id="4033"><strong data-dcnode-id="4034"><span data-dcnode-id="4038" instrument_node="">7 Days Japan Rail Pass is included by default. </span><span data-dcnode-id="4036" style="TEXT-DECORATION: underline"><span data-dcnode-id="4037" instrument_node="">Please ensure you select the correct duration of your Japan Rail Pass according to length of travel </span></span><span data-dcnode-id="4035" instrument_node="">(For more details please go to the product description during the booking process).</span></strong></span></li><span data-dcnode-id="4031" instrument_node="">
