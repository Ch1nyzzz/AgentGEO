ata-dcnode-id="767" data-fm-content="tcs-enigma|80001|en_US|cdg|[cdgEditorial]|178236" id="tcs-enigma|80001|en_US|cdg|[cdgEditorial]|178236"><div class="uitk-spacing uitk-type-list-300 editorialTextColumn uitk-spacing-padding-blockstart-unset" data-dcnode-id="768"><h2 class="uitk-heading-4" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Bangkok Vacations</span></h2><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Bid farewell to forgettable vacations spent touring stuffy museums, and instead, plan a vacation in Bangkok. The capital city of Thailand is full of colorful, ancient temples as well as sleek, modern skyscrapers that will have you walking around with your face turned toward the clouds. Book your Asian getaway with Travelocity, and pocket the change you saved to tip your tuk-tuk driver. </span></p><p data-dcnode-id="828"></p><h4 class="uitk-heading-6" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Top Hotels in Bangkok</span></h4><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">You have the foresight to book one of our Bangkok vacation packages, but you still need to find the hotel that speaks to your needs. Do you crave an opulent accommodation overlooking the Chao Phraya River? Or do you prefer to be in close proximity to the airport? We have everything you need from lush accommodations near Lumphini Park to classic suites with sweeping views of the city. </span></p><ul class="uitk-type-list-300 all-y-margin-two" data-dcnode-id="807"><li data-dcnode-id="820"><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/Bangkok-Hotels-Shangri-La-Hotel.h13978.Hotel-Information"><span data-dcnode-id="823" instrument_node="">Shangri-La Hotel, Bangkok</span></a><span data-dcnode-id="821" instrument_node="">: In traditional Thai style, all rooms at the Shangri-La are decorated with silk and teak adornments. With views of either the city or the Chao Phraya River, you’ll feel like royalty as you awake and roll back the curtains to soak it all in. </span></li><li data-dcnode-id="816"><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/Bangkok-Hotels-Lebua-At-State-Tower.h1064957.Hotel-Information"><span data-dcnode-id="819" instrument_node="">Lebua at State Tower</span></a><span data-dcnode-id="817" instrument_node="">: Offering suites with private balconies, living rooms, and kitchenettes, the Lebua is for the traveler looking for home away from home. With the modern luxuries that you’re accustomed to and the traditional excellence of Thai hospitality, you’re bound to enjoy your stay–especially once you give in to temptation and grab a drink at the hotel’s rooftop bar. </span></li><li data-dcnode-id="812"><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/Bangkok-Hotels-The-Sukhothai-Bangkok.h26661.Hotel-Information"><span data-dcnode-id="815" instrument_node="">The Sukhothai Bangkok</span></a><span data-dcnode-id="813" instrument_node="">: Located in close proximity to the sprawling urban greenery of Lumphini Park, the Sukhothai is a must for those who long to be at the center of the city’s action. With standard rooms that are clean and modern to private suites that are as large as an apartment, you’re bound to find the accommodation that suits your style. </span></li><li data-dcnode-id="808"><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/Bangkok-Hotels-Novotel-Suvarnabhumi-Airport.h1507253.Hotel-Information"><span data-dcnode-id="811" instrument_node="">Novotel Suvarnabhumi Airport</span></a><span data-dcnode-id="809" instrument_node="">: Looking to add a touch of convenience to your Thai travels? The Novotel Bangkok Subarnabhumi Airport Hotel is merely a five-minute walk from the airport and allows guests to check in 24 hours a day. Once you’re done adjusting to the time difference inside your luxurious quarters, take a 20-minte Airport Link train ride into the city or enjoy the accommodation’s spacious pool. </span></li></ul><h4 class="uitk-heading-6" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Major Attractions</span></h4><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Although there are many historic buildings to behold during your Bangkok vacation, perhaps none are as extravagant as the city’s Grand Palace. Built in the late 1700s, the former residence of the Thai king is still packed with visitors to this day. Marvel at the structure’s gilded pagodas and admire the ancient emerald Buddha inside the grounds. With intricate statues and shrines at every turn, you could spend hours at the site and still not witness all of its grandeur. </span></p><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Beyond its exquisite temples and friendly inhabitants, Bangkok is known chiefly for its out-of-this-world street food. Adventurous eaters can taste their way through the vendor stalls selling fried noodles and meat skewers in the backpacker’s haven, Khao San Road, but there’s no better place to find delicious eats than in the city’s Chinatown. Yes, Chinatown really does boast the best Thai food. The neighborhood’s bustling food scene doesn’t spring up until after sunset, so proceed with an empty stomach and a sense of adventure once evening settles around the city. From the standard tourist fare, pad Thai, to more adventurous eats, such as freshly boiled blood cockles, whatever you decide to consume is sure to be delicious–and will make your trip to Bangkok one for the culinary books. </span></p><h4 class="uitk-heading-6" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Festivals and Events</span></h4><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">As soon as you touch down in Thailand, you’ll appreciate how friendly locals are. It is known as the Land of Smiles for a reason, after all. However, the country is most jubilant during April when the nation celebrates Songkran. This three-day festival during the hottest month of the year celebrates Thai new year in a truly epic way. Many businesses shut down during Songkran so their employees can take the streets with locals and tourists to soak each other with massive water guns, or toss buckets of icy water at passersby. This tradition symbolizes washing off the misfortune of the past year, and beginning the new year with a clean slate. </span></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">If you’re looking for a beach vacation near Bangkok, head south to Phuket in November for Loy Krathong. Known as the “Festival of Lights,” those participating release small floating lanterns into the water as a token of good luck. Not only will you experience something truly magical, but you’ll be presented with some incredible photo opportunities to boot. </span></p><h3 class="uitk-heading-6" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Tours and Activities in Bangkok</span></h3><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Sensational places, alluring people and unforgettable experiences — that's what traveling is about. Getting excited about your next epic adventure?</span></p><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">So you've packed your Bangkok itinerary with a number of exciting experiences — that's wonderful! If you're searching for just one more thing, here are some suggestions:</span></p><ul class="uitk-type-list-300 all-y-margin-two" data-dcnode-id="770"><li data-dcnode-id="786"><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/things-to-do/bangkok-food-tasting-spice-market-tour.a229107.activity-details"><span data-dcnode-id="788" instrument_node="">Bangkok Food Tasting &amp; Spice Market Tour</span></a></li><li data-dcnode-id="783"><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/things-to-do/uptown-bangkok-bike-tour-with-long-tail-boat-river-crossing.a415867.activity-details"><span data-dcnode-id="785" instrument_node="">Uptown Bangkok Bike Tour with Long-Tail Boat River Crossing</span></a></li><li data-dcnode-id="780"><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/things-to-do/thonburi-klongs-grand-palace-morning-excursion.a409964.activity-details"><span data-dcnode-id="782" instrument_node="">Thonburi Klongs &amp; Grand Palace Morning Excursion</span></a></li><li data-dcnode-id="777"><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/things-to-do/kamavijitra-the-art-of-lovemaking-a-private-siam-erotic-art-museum.a416605.activity-details"><span data-dcnode-id="779" instrument_node="">Kamavijitra: The Art of Lovemaking—a Private Siam Erotic Art Museum</span></a></li><li data-dcnode-id="774"><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/things-to-do/cultural-bike-tour-of-bangkoks-business-district-parks-neighborhoods.a400770.activity-details"><span data-dcnode-id="776" instrument_node="">Cultural Bike Tour of Bangkok's Business District, Parks &amp; Neighborhoods</span></a></li><li data-dcnode-id="771"><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelocity.com/things-to-do/golden-buddha-marble-buddha-gems-gallery-tour.a393754.activity-details"><span data-dcnode-id="773" instrument_node="">Golden Buddha, Marble Buddha &amp; Gems Gallery Tour</span></a></li></ul><p data-dcnode-id="769"></p></div></div></div></div><
