</span><h2 class="tourIndexSubject blue" data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">
</span><div class="subjectField" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">
			FAQs on China Tour Package
		</span></div><span data-dcnode-id="653" instrument_node="">
</span></h2><span data-dcnode-id="651" instrument_node="">
</span><div class="faqList" data-dcnode-id="543"><span data-dcnode-id="650" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="638"><span data-dcnode-id="649" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">
		I am interested in some of your city packages. Can you put all them together and offer me a best China tour itinerary?
	</span></h3><span data-dcnode-id="646" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="640"><span data-dcnode-id="645" instrument_node="">
		Yes, you can optionally pick your favorite private city tour itineraries. All our listed private China travel packages are customizable, and our professional travel consultants will help you work out a personalized trip to your liking.</span><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node="">
</span><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">
As most of the direct international flights from USA, Canada, UK, Australia, New Zealand, Germany, France, India, Malaysia, Singapore and many other countries will land in Beijing and Shanghai, we'll be glad to arrange your transfer to where you'd like to take a private city package.
	</span></div><span data-dcnode-id="639" instrument_node="">
</span></div><span data-dcnode-id="637" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="629"><span data-dcnode-id="636" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">
		What is the opening hour of your tourist sites?
	</span></h3><span data-dcnode-id="633" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">
		As a general rule, the opening hour of most tourist attractions is 08:00 – 17:30 from April to October, and it is 08:30 -17:00 from November to next March. It should be noted that some sightseeing spots have time limits for ticketing, which is usually one hour ahead of the closing time.
	</span></div><span data-dcnode-id="630" instrument_node="">
</span></div><span data-dcnode-id="628" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="620"><span data-dcnode-id="627" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">
		Is tap water drinkable?
	</span></h3><span data-dcnode-id="624" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">
		No, the tap water in China is undrinkable unless it is boiled, but it is safe for brushing teeth. The hotels usually offer water heater in each room and you can use it to get boiled water to make coffee or tea. Two bottled water is provided free of charge in your room on a daily basis. Besides, we also offer bottled water to our clients for free.
	</span></div><span data-dcnode-id="621" instrument_node="">
</span></div><span data-dcnode-id="619" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="607"><span data-dcnode-id="618" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">
		What is the tipping practice in China?
	</span></h3><span data-dcnode-id="615" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="609"><span data-dcnode-id="614" instrument_node="">
		In recognition of good service, tipping guides and drivers during China escorted tours, as well as bellboys who take your luggage to your room has become gradually accepted as common practice in China as elsewhere in the world. But it is still unnecessary to tip for food service or taxis, etc.&nbsp;</span><br data-dcnode-id="613"><span data-dcnode-id="612" instrument_node="">
</span><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">
Tipping is discretionary. If you don't think the service received is satisfactory, then don't tip. TravelChinaGuide does not endorse poor service. However, if you are quite satisfied with the guide or driver's service or their services are beyond your expectation, you could tip to show your appreciation. We will offer suggestions according to the group size.
	</span></div><span data-dcnode-id="608" instrument_node="">
</span></div><span data-dcnode-id="606" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="598"><span data-dcnode-id="605" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">
		I see some of your&nbsp;China vacation packages include a high-speed train experience. Is it air-conditioned? Also, is there dining car available for lunch or dinner?
	</span></h3><span data-dcnode-id="602" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">
		Yes, all the high-speed trains are air-conditioned, and there are dinning carriages available providing food and drink. However, the pre-packed boxed meals and snacks available on board are usually less satisfying, so we suggest you bring some food as simple lunch or dinner should you not wish to use the dining car.
	</span></div><span data-dcnode-id="599" instrument_node="">
</span></div><span data-dcnode-id="597" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="585"><span data-dcnode-id="596" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">
		Where can I see and hold a panda?
	</span></h3><span data-dcnode-id="593" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="587"><span data-dcnode-id="592" instrument_node="">
		Chengdu, famed for being the home of giant pandas, is the best destination for people who would like to see and know more about this lovely creature. You can visit either Chengdu Research Base of Giant Pandas or Dujiangyan Panda Base. The latter one is a little bit far from Chengdu with about 1.5 hours driving time. At present, visitors can only hold a panda cub to take photos for a few precious seconds at Dujiangyan Panda Base.&nbsp;</span><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">
</span><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">
For those who are unable to go to Chengdu due to a tight travel schedule, you may consider visiting the pandas in Beijing Zoo, Chongqing Zoo or Shanghai Zoo.
	</span></div><span data-dcnode-id="586" instrument_node="">
</span></div><span data-dcnode-id="584" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="576"><span data-dcnode-id="583" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">
		Can a vegetarian get proper food when traveling with you? Also, is it difficult to find a suitable restaurant ourselves?
	</span></h3><span data-dcnode-id="580" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">
		Yes, vegetarians are well catered for during our guided tours. For the meals included, we will make proper arrangements according to your food taboos. When the meals are unplanned in our itinerary, you can ask your guide for advice on suitable restaurants. Most of the mid-range restaurants in major tourist cities have photo menus available.
	</span></div><span data-dcnode-id="577" instrument_node="">
</span></div><span data-dcnode-id="575" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="563"><span data-dcnode-id="574" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">
		Can I use US dollars at stores and restaurants? What about Credit Cards?
	</span></h3><span data-dcnode-id="571" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="565"><span data-dcnode-id="570" instrument_node="">
		In most cases, only Chinese currency is accepted in stores and restaurants. Major Credit Cards including Master Card, Visa, American Express, are acceptable in most large department stores and shopping malls. In order to avoid embarrassment, we suggest you ask whether Credit Card is accepted before placing an order.&nbsp;</span><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">
</span><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">
For your convenience, it is more advisable to exchange enough RMB for personal consumption during your trip. It is easy to exchange money at most airports, banks in downtown areas and the star-rated hotels. Usually, the hotels only exchange money for their guests. Remember to take your passport, which has to be presented when converting currency.
	</span></div><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="554"><span data-dcnode-id="561" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">
		Our party consists of three persons, so can we share the same room?
	</span></h3><span data-dcnode-id="558" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">
		Yes, you can stay in the same hotel guest room for convenience. In this case, we will book an extra bed including daily breakfast for the third person during escorted China tours.
	</span></div><span data-dcnode-id="555" instrument_node="">
</span></div><span data-dcnode-id="553" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="545"><span data-dcnode-id="552" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">
		We are planning a honeymoon&nbsp;vacation package to China, what destinations do you recommend?
	</span></h3><span data-dcnode-id="549" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">
		As a diverse and vibrant country, China has long been popular with honeymooning couples. Beijing, Shanghai and Hong Kong are the most frequently visited international metropolises. These three cities never disappoint honeymooners as there is always something of interest to do for all couples. When it comes to the most romantic cities, Guilin with Yangshuo, Lijiang and Hangzhou are greatly favored by newlyweds. Besides, if you want to experience something different, the mysterious Tibet is a good choice.
	</span></div><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="544" instrument_node="">
</span></div><span data-dcnode-id="542" instrument_node="">
</span></div><span data-dcnode-id="540" instrument_node="">
</span><div class="blank20" data-dcnode-id="539"></div><span data-dcnode-id="538" instrument_node="">
