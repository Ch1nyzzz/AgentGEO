</span><div class="jsImg single-img" data-dcnode-id="1437"><div data-dcnode-id="1438"><img align="right" alt="070613_Temple_of_Heaven_Beijing_Chee%20Khiang%20SngF.jpg" class="img-loaded" data-dcnode-id="1439" data-src="https://www.fodors.com/wire/070613_Temple_of_Heaven_Beijing_Chee%20Khiang%20SngF.jpg" data-srcset="" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/wire/070613_Temple_of_Heaven_Beijing_Chee%2520Khiang%2520SngF.jpg&amp;raw" srcset="" width="250"></div></div><div class="sidead pull-right" data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">
</span><div data-dcnode-id="1434" id="div-gpt-ad-397064"><span data-dcnode-id="1435" instrument_node="">
</span></div><span data-dcnode-id="1433" instrument_node="">
</span></div><p class="jsWrap noad" data-dcnode-id="1428"><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024"><span data-dcnode-id="1431" instrument_node="">Beijing </span></a><span data-dcnode-id="1429" instrument_node=""> is a vibrant mix of history and modernity. Day-to-day life unfolds amid one of the world’s richest and most complex historical tapestries. From the commanding austerity of the Forbidden City to the hectic free-for-all of the markets, Beijing seamlessly moves between past and present, beckoning visitors to lose themselves in the furious pace. No traveler who sojourns here is likely to forget the experience. Although one could list a thousand reasons to visit Beijing, the sights below should move to the top of the list.</span></p><p data-dcnode-id="1425"><span class="comments-head" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">The Temple of Heaven</span></span></p><p data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">The </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsig%26property_id%3D174214"><span data-dcnode-id="1423" instrument_node="">Temple of Heaven</span></a><span data-dcnode-id="1421" instrument_node=""> is one of the best examples of religious architecture in China. Construction began in the early 15th century under the order of Yongle. The complex took 14 years to complete; it contains three main buildings where the emperor, as the “Son of Heaven,” offered prayers. The sprawling complex is a pleasant place for wandering: watch locals practicing martial arts, playing traditional instruments, and enjoying ballroom dancing on the grass.</span></p><p data-dcnode-id="1416"><strong data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Tip:</span></strong><span data-dcnode-id="1417" instrument_node=""> The Temple of Heaven isn’t just a tourist sight — it’s a living, functional park. Take time to stroll around the tree-lined avenues and watch the locals relaxing in the park.</span></p><p data-dcnode-id="1413"><span class="comments-head" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Ancient Observatory</span></span></p><p data-dcnode-id="1408"><span data-dcnode-id="1412" instrument_node="">The squat tower of the </span><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsig%26property_id%3D167223"><span data-dcnode-id="1411" instrument_node="">Ancient Observatory</span></a><span data-dcnode-id="1409" instrument_node=""> is filled with primitive stargazing equipment that dates to the time of Ghengis Khan, who believed that his fortunes could be read in the stars. Sculptures adorn some of the astronomical devices on the black-brick roof of Jianguo Tower, the main building that houses the observatory. Among the sculptures are an armillary sphere, used to pinpoint the position of heavenly bodies, and a sextant, used to measure distances between stars and a celestial globe.</span></p><div class="tp-section jsFirstDiv" data-dcnode-id="1331"><span data-dcnode-id="1407" instrument_node="">

</span></div><p data-dcnode-id="800"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Tip:</span></strong><span data-dcnode-id="801" instrument_node=""> The astronomical instruments on the roof of the observatory are a fine juxtaposition with the skyscrapers and elevated highways in the background. This sort of contrast captures the very soul of modern Beijing.</span></p><div class="text-center banner" data-dcnode-id="796"><div class="mid-ad" data-dcnode-id="797" id="div-gpt-ad-817064"></div></div><div class="jsImg single-img" data-dcnode-id="793"><div data-dcnode-id="794"><img align="right" alt="070613_Benoist_Sebire_Panjiayuan_Beijing_Chinese_BrushesF.jpg" class="img-loaded" data-dcnode-id="795" data-src="https://www.fodors.com/wire/070613_Benoist_Sebire_Panjiayuan_Beijing_Chinese_BrushesF.jpg" data-srcset="" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/wire/070613_Benoist_Sebire_Panjiayuan_Beijing_Chinese_BrushesF.jpg&amp;raw" srcset="" width="250"></div></div><p class="jsWrap noad" data-dcnode-id="790"><span class="comments-head top" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Magnificent Markets</span></span></p><p data-dcnode-id="776"><span data-dcnode-id="789" instrument_node="">It’s hard to resist: so much to bargain for, so little time! Beijing’s markets offer a wide variety of goods, from “Maomorabilia” to silk slippers. Visit outdoor </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsho%26property_id%3D167347"><span data-dcnode-id="788" instrument_node="">Panjiayuan </span></a><span data-dcnode-id="786" instrument_node=""> (aka the Dirt Market), where some 3,000 vendors sell factory knockoffs, antiques, Cultural Revolution memorabilia, and handicrafts. For freshwater pearls, and </span><em data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">more</span></em><span data-dcnode-id="783" instrument_node=""> knockoffs, try the </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsho%26property_id%3D167354"><span data-dcnode-id="782" instrument_node="">Silk Alley Market</span></a><span data-dcnode-id="780" instrument_node=""> or the </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsho%26property_id%3D162567"><span data-dcnode-id="779" instrument_node="">Hongqiao Market</span></a><span data-dcnode-id="777" instrument_node="">.</span></p><p data-dcnode-id="772"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Tip:</span></strong><span data-dcnode-id="773" instrument_node=""> When bargaining for the right price, try doing so with a vendor who is alone. He is unlikely to come down on the price if there’s an audience. Also, buying more than one of something gets you a better deal. </span></p><p data-dcnode-id="769"><span class="comments-head" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Confucius Temple</span></span></p><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">Tranquil </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsig%26property_id%3D167219"><span data-dcnode-id="767" instrument_node="">Confucius Temple,</span></a><span data-dcnode-id="765" instrument_node=""> with its towering cypress and pine trees, offers a serene escape from the crowds at nearby Lama Temple. This is the second-largest Confucian temple after that of Qufu, the master’s hometown in Shandong province. First built in the 13th century, the Confucius Temple was renovated in the 18th century. A highlight of a visit here is the cemetery of stone tablets, with its rows of creepy crypts in the front and main courtyards of the temple. On the front stelae you can barely make out the name of thousands of scholars who passed imperial exams.</span></p><div class="text-center banner" data-dcnode-id="760"><div class="mid-ad" data-dcnode-id="761" id="div-gpt-ad-827064"></div></div><p data-dcnode-id="756"><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Tip:</span></strong><span data-dcnode-id="757" instrument_node=""> The surrounding hutongs are packed with teahouses, vegetarian restaurants, and quaint shops selling Tibetan and Buddhist artifacts.</span></p><p data-dcnode-id="753"><span class="comments-head" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Forbidden City</span></span></p><p data-dcnode-id="745"><span data-dcnode-id="752" instrument_node="">The </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dpm.org.cn/"><span data-dcnode-id="751" instrument_node="">Forbidden City </span></a><span data-dcnode-id="749" instrument_node="">has been home to a long line of emperors, beginning with Yongle, in 1420, and ending with Puyi (made famous by Bernardo Bertolucci’s film </span><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The Last Emperor</span></em><span data-dcnode-id="746" instrument_node="">), who was forced out of the complex by a warlord in 1924. The structure, which was built by more than 200,000 workers, is the best preserved and most complete collection of imperial architecture in China. Not-to-be-missed highlights include the Hall of Heavenly Purity, the Hall of Union and Peace, and the Palace of Earthly Peace. The Gallery of Treasures holds, among other things, supremely beautiful examples of imperial ornamentation and a golden pagoda. </span></p><p data-dcnode-id="741"><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Tip:</span></strong><span data-dcnode-id="742" instrument_node=""> Got a craving for java? Believe it or not, there’s a Starbucks here, in the first pavilion, just east of the Gate of Heavenly Purity.</span></p><div class="text-center banner" data-dcnode-id="737"><div class="mid-ad" data-dcnode-id="738" id="div-gpt-ad-837064"></div></div><div class="jsImg single-img" data-dcnode-id="734"><div data-dcnode-id="735"><img align="right" alt="070613_lama_temple_Robert%20ChurchilljpgF.JPG" class="img-loaded" data-dcnode-id="736" data-src="https://www.fodors.com/wire/070613_lama_temple_Robert%20ChurchilljpgF.JPG" data-srcset="" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/wire/070613_lama_temple_Robert%2520ChurchilljpgF.JPG&amp;raw" srcset="" width="250"></div></div><p class="jsWrap noad" data-dcnode-id="731"><span class="comments-head top" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Lama Temple</span></span></p><p data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">The sweet smell of incense permeates </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsig%26property_id%3D446837"><span data-dcnode-id="729" instrument_node="">Lama Temple</span></a><span data-dcnode-id="727" instrument_node="">, one of the few functioning Buddhist temples in Beijing. When Emperor Yongzheng took the throne in 1723, his former residence was converted into this Lamaistic temple. During the Qianlong Period (1736–1795), it became a center of the Yellow Hat sect of Tibetan Buddhism. At its high point, 1,500 lamas lived here. The Hall of Celestial Kings houses a statue of the Maitreya, and the Wanfu Pavilion has a 75.5-foot-high Buddha carved from one piece of sandalwood. Do leave time to wander the Hall of Heavenly Kings. In the courtyard beyond, a pond with a bronze mandala represents paradise.</span></p><p data-dcnode-id="722"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Tip:</span></strong><span data-dcnode-id="723" instrument_node=""> Combine a visit to the Lama Temple with the Confucius Temple and the Imperial Academy, which are a five-minute walk away, within the hutong neighborhood opposite the main entrance. </span></p><p data-dcnode-id="719"><span class="comments-head" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Summer Palace</span></span></p><p data-dcnode-id="714"><span data-dcnode-id="718" instrument_node="">Snapshot: the </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsig%26property_id%3D174217"><span data-dcnode-id="717" instrument_node="">Summer Palace</span></a><span data-dcnode-id="715" instrument_node=""> glowing at dusk. Is there a more authentic Beijing experience? This garden complex dates back eight centuries, to when the first emperor of the Jin Dynasty built the Gold Mountain Palace on Longevity Hill. Notable sights are the Long Corridor (a covered wooden walkway) and the Hall of Benevolent Longevity. At the west end of the lake is the famous Marble Boat that Cixi built with money intended to create a Chinese navy. The palace, which served as an imperial retreat from dripping summer heat, was ransacked by British and French soldiers in 1860 and later burned by Western soldiers seeking revenge for the Boxer Rebellion. </span></p><div class="text-center banner" data-dcnode-id="710"><div class="mid-ad" data-dcnode-id="711" id="div-gpt-ad-847064"></div></div><p data-dcnode-id="706"><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Tip:</span></strong><span data-dcnode-id="707" instrument_node=""> Come early in the morning to get a head start before the coachloads of visitors arrive. You’ll need the better part of a day to explore the grounds.</span></p><p data-dcnode-id="703"><span class="comments-head" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Tiananmen Square</span></span></p><p data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">Walking beneath the red flags of </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024%26cur_section%3Dsig%26property_id%3D167193"><span data-dcnode-id="701" instrument_node="">Tiananmen Square</span></a><span data-dcnode-id="699" instrument_node=""> is quintessential Beijing. The political heart of modern China, the square covers 100 acres, making it the largest public square in the world. It was from the Gate of Heavenly Peace that Mao Zedong pronounced the People’s Republic of China in 1949. Many Westerners think only of the massive student protests here in the 1980s; in fact, it has been the site of protests throughout history.</span></p><p data-dcnode-id="691"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Tip:</span></strong><span data-dcnode-id="695" instrument_node=""> You can access a </span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.roundtiananmensquare.com/"><span data-dcnode-id="694" instrument_node="">360-degree panorama</span></a><span data-dcnode-id="692" instrument_node=""> of the square. </span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Photo credits: (1) ©Istockphoto/Chee Khiang Sng; (2) ©Istockphoto/Benoist_Sebire; (3) ©Istockphoto/ Robert Churchill.</span></p><div class="text-center banner" data-dcnode-id="685"><div class="mid-ad" data-dcnode-id="686" id="div-gpt-ad-857064"></div></div><p data-dcnode-id="682"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Heading east? Start planning now: </span></strong></p><li data-dcnode-id="679"><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/miniguides/mgresults.cfm%3Fdestination%3Dbeijing%4024"><span data-dcnode-id="681" instrument_node="">Fodor’s Beijing</span></a></li><li data-dcnode-id="676"><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fodors.com/wire/archives/002383.cfm"><span data-dcnode-id="678" instrument_node="">Fodor’s Choice Hong Kong</span></a></li><p data-dcnode-id="674"><cf_book_include data-dcnode-id="675" destination_id="24"></cf_book_include></p><input data-dcnode-id="672" id="useLegacyAdSystem" type="hidden" value=""><input data-dcnode-id="671" id="isSpoinsorAdChecked" type="hidden" value="on"><span data-dcnode-id="670" instrument_node="">
