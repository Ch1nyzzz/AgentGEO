</span><div class="photoBlock300 autowidht" data-dcnode-id="1410"><img alt="chinaware" data-dcnode-id="1411" height="225" loader="lazy" originalsrc="//images.chinahighlights.com/allpicture/2014/09/49266fca0d2646c782eb017c_300x225.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2014/09/49266fca0d2646c782eb017c_300x225.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="300"></div><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Beijing has several shopping districts offering a mind-boggling variety of goods.&nbsp;</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1405" instrument_node="">China Highlights tours offer </span><span data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">great flexibility to allow for shopping time</span></span><span data-dcnode-id="1402" instrument_node="">, with ABSOLUTELY NO SHOPS on our itineraries unless specifically requested.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><h2 data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">What to Buy: the Best Souvenirs to Bring Back Home</span></h2><span data-dcnode-id="1397" instrument_node="">
</span><h3 data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">1. Peking Glass Snuff Bottle 内画鼻烟壶</span></h3><span data-dcnode-id="1394" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="1391"><img alt="panjiayuan" data-dcnode-id="1393" height="199" loader="lazy" originalsrc="//images.chinahighlights.com/2013/12/Panjiayuan20504b81331d_cp_298x198.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/2013/12/Panjiayuan20504b81331d_cp_298x198.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="298"><span data-dcnode-id="1392" instrument_node=""> Jewelry of Panjiayuan Antique Market</span></div><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1389" instrument_node="">The Peking glass snuff bottles are a </span><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">traditional Chinese handicraft</span></strong><span data-dcnode-id="1386" instrument_node=""> with a history of about 200 years. They are popular in China and abroad for their unique workmanship and exquisite artistry.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">The snuff bottles are made of special materials, such as jade, and have a unique shape. Ones painted on the inside are particularly famous and admired by collectors. They are also called reverse painted due to the technique.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Most of the paintings inside the bottles are Chinese style, with vivid pictures, simple colors, and elegant layouts, giving them a great collection value.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><ul class="drop1" data-dcnode-id="1366"><span data-dcnode-id="1377" instrument_node="">
</span><li data-dcnode-id="1373"><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Recommended Shopping Places:</span></strong><span data-dcnode-id="1374" instrument_node="">&nbsp;AIKA International Collections Exchange Market 爱家国际收藏品交流市场</span></li><span data-dcnode-id="1372" instrument_node="">

</span><h3 data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">2) Eight Treasures Inkpad 八宝印泥</span></h3><span data-dcnode-id="1343" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="1340"><img alt="panjiayuan" data-dcnode-id="1342" height="199" loader="lazy" originalsrc="//images.chinahighlights.com/2013/12/Panjiayuan8bb938bff655_cp_298x198.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/2013/12/Panjiayuan8bb938bff655_cp_298x198.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="298"><span data-dcnode-id="1341" instrument_node="">Jade seals</span></div><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1338" instrument_node="">The </span><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">famous Eight Treasures inkpad</span></strong><span data-dcnode-id="1335" instrument_node=""> was invented in 1683 and made by the Zhangzhou Stationery Factory. It is known for bright, </span><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">unfading colors</span></strong><span data-dcnode-id="1332" instrument_node=""> and very clear, fire and sunlight proof prints. It has a variety of usages, including signing important contracts and historical records. It is also a must-have for painters and calligraphers.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">The Eight Treasures Inkpad is made from musk, plum, cinnabar, vermillion hue, natural jade, and special oils. The entire process consists of around 30 stages, and maturing takes 6-10 months before the inkpad is finished.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><ul class="drop1" data-dcnode-id="1315"><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1322"><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Recommended Shopping Places:</span></strong><span data-dcnode-id="1323" instrument_node="">Beijing Glass Ancient Culture Street</span></li><span data-dcnode-id="1321" instrument_node="">
</span><li data-dcnode-id="1317"><strong data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Location</span></strong><span data-dcnode-id="1318" instrument_node="">: South Side of Peace Gate Xuanwu District Beijing (北京市宣武区和平门南侧)</span></li><span data-dcnode-id="1316" instrument_node="">
</span></ul><span data-dcnode-id="1314" instrument_node="">
</span><h3 data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">3) Beijing Dough Toys 北京面人</span></h3><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1310" instrument_node="">The Beijing Dough Toy is a </span><strong data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">traditional Chinese folk handicraft</span></strong><span data-dcnode-id="1307" instrument_node="">, which became popular in the beginning of the 21st century.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">The dough toy is made of wheat and sweet rice flour, and with a small bamboo knife the artist shapes the dough skillfully into people and animals in a short time. Among the figures are beautiful princesses, adorable children, and various historical people.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">The dough toys are small, making them one of the best souvenirs. As it is an ancient handicraft, tourists can find them at temple fairs during the Spring Festival.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><ul class="drop1" data-dcnode-id="1287"><span data-dcnode-id="1298" instrument_node="">
</span><li data-dcnode-id="1294"><strong data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Recommended Shopping Places:</span></strong><span data-dcnode-id="1295" instrument_node="">&nbsp;Ancient Beijing Street 老北京一条街</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1289"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Location</span></strong><span data-dcnode-id="1290" instrument_node="">: Floor B1, New Dong'an Market, No.138, Wangfujing Avenue, Dongcheng District, Beijing (北京市东城区王府井大街138号新东安市场B1层)</span></li><span data-dcnode-id="1288" instrument_node="">
</span></ul><span data-dcnode-id="1286" instrument_node="">
</span><h3 data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">4) Blue Glaze Cloisonné 景泰蓝</span></h3><span data-dcnode-id="1283" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="1280"><img alt="panjiayuan market" data-dcnode-id="1282" height="225" loader="lazy" originalsrc="//images.chinahighlights.com/allpicture/3/a5af76b538944088812b0c6e_300x225.JPG" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/3/a5af76b538944088812b0c6e_300x225.JPG&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="300"><span data-dcnode-id="1281" instrument_node=""> Blue Glaze Cloisonné</span></div><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1278" instrument_node="">Famous blue glaze cloisonné is a </span><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">unique traditional handicraft of Beijing,</span></strong><span data-dcnode-id="1275" instrument_node=""> the origin of this type of cloisonné. It can be traced back to the Yuan Dynasty about 1,000 years ago, and became popular during the Ming Dynasty.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">It can be said that the blue glaze cloisonné is a </span><strong data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">collection of all traditional Chinese handicrafts</span></strong><span data-dcnode-id="1269" instrument_node="">, as one piece represents copper, porcelain, and traditional painting and sculpture arts.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Products range from temple tablets, hall screens, and chairs to chopsticks, earrings, and toothpick holders.</span></p><span data-dcnode-id="1264" instrument_node="">

</span><h2 data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Where to Buy</span></h2><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1202"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">The</span></strong><span data-dcnode-id="1206" instrument_node=""> </span><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">traditional shopping districts</span></strong><span data-dcnode-id="1203" instrument_node=""> have always been Wangfujing Street, Qianmen Street, Dongdan and Xidan Commercial Street, but now Jianguomen Outer Street and Chaowai Street have risen to the top in terms of having the latest and most luxurious items.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1198"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Shopping at outdoor markets</span></strong></span><span data-dcnode-id="1197" instrument_node=""> remains a not-to-be-missed experience for foreign travelers. Check out Panjiayuan Collection Street, Xiushui Street, and Liulichang Street for local specialties such as cloisonné, jade pieces, lacquer carvings, antiques, and fresh water pearls.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><h3 data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">1. Top 3 Antique Markets You Should Not Miss</span></h3><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1189"><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">1) Panjiayuan Antique Market 潘家园旧货（古玩）市场</span></strong></p><span data-dcnode-id="1188" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="1185"><img alt="Panjiayuan Antique Market" data-dcnode-id="1187" height="225" loader="lazy" originalsrc="//images.chinahighlights.com/allpicture/2014/09/bfbabe50cf254036867e3e8b_cp_300x225.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2014/09/bfbabe50cf254036867e3e8b_cp_300x225.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="300"><span data-dcnode-id="1186" instrument_node="">Panjiayuan Antique Market</span></div><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1180"><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/video/panjiayuan-antique-market.htm" target="_blank"><span data-dcnode-id="1183" instrument_node="">Panjiayuan Antique Market</span></a><span data-dcnode-id="1181" instrument_node=""> is the largest antique market in China, and the cheapest antique market in Beijing.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">In Panjiayuan Antique Market tourists can find various collectables, such as antique furniture, ancient paintings and books, jade, porcelain, ancient and foreign money, bamboo carvings, Buddhist keepsakes, folk clothes, and cultural relics.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1173"><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">2) Beijing Curio City 北京古玩城</span></strong></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Beijing Curio City is the largest antique exchange center in Asia, and a paradise for collectors and antique lovers. It is also an art gallery for tourists, to enjoy Chinese culture.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Beijing Curio City</span></span><span data-dcnode-id="1166" instrument_node=""> covers an area of 26,400 square meters and holds more than 600 traders, selling ancient furniture, calligraphy and paintings of famous people, jade sculptures, etc.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1161"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">3) Liulichang Ancient Cultural Street 琉璃厂古文化街</span></strong></p><span data-dcnode-id="1160" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="1157"><img alt="Liulichang Ancient Cultural Street" data-dcnode-id="1159" height="225" loader="lazy" originalsrc="//images.chinahighlights.com/allpicture/2014/09/45aa22d5903c4ddd9bf17896_cp_300x225.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.chinahighlights.com/allpicture/2014/09/45aa22d5903c4ddd9bf17896_cp_300x225.webp&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="300"><span data-dcnode-id="1158" instrument_node="">Liulichang Ancient Cultural Street</span></div><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1152"><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/attraction/liulichang-cultural-street.htm" target="_blank"><span data-dcnode-id="1155" instrument_node="">Liulichang Street</span></a><span data-dcnode-id="1153" instrument_node=""> is named after a factory that produced glazed tiles right here in ancient times. It became a famous traditional cultural street during Qing Dynasty, when people from all over the country gathered here to attend the imperial exams.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Over the years the street has become a center for cultural products. Presently, there are around 100 shops. They typically sell ancient paintings and calligraphy, books, writing brushes, ink sticks, paper, ink stones, collectively called the Four Treasures of Study.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1147" instrument_node="">See </span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/article-best-antique-markets.htm"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Best Antiques Markets in Beijing</span></strong></a><span data-dcnode-id="1143" instrument_node="">.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><h3 data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">2. Beijing Specialist Shops</span></h3><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1135"><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">1) Ruifuxiang Silk Clothes Shop 瑞蚨祥</span></strong></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Beijing's Ruifuxiang Silk Clothes Shop opened in 1893, selling silk, wool fabric, cotton cloth, fur, and Chinese style clothes. Clothes made to order are the specialty of Ruifuxiang, famous for their materials and great tailoring. Here, tourists can choose the fabrics and wait for the clothing to be made.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><ul class="drop1" data-dcnode-id="1119"><span data-dcnode-id="1130" instrument_node="">
</span><li data-dcnode-id="1126"><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Location</span></strong><span data-dcnode-id="1127" instrument_node="">: No. 5, Dashilan Street, Xicheng District, Beijing</span></li><span data-dcnode-id="1125" instrument_node="">
</span><li data-dcnode-id="1121"><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Transportation</span></strong><span data-dcnode-id="1122" instrument_node="">: Take city bus line 1, 4, 10, 104, or 803, and get off at Wangfujing Street.</span></li><span data-dcnode-id="1120" instrument_node="">
</span></ul><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1117" instrument_node="">If you want to buy a Qipao, see </span><strong data-dcnode-id="1114"><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/shopping/qipao.htm"><span data-dcnode-id="1116" instrument_node="">Where to Buy a Qipao or Have One Tailor Made in Beijing</span></a></strong><span data-dcnode-id="1113" instrument_node="">.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1108"><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">2) Shengxifu Hatter Shop 盛锡福</span></strong></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Shengxifu Hatter Shop at Wangfujing Avenue is one of the most famous shops in Beijing. It opened in 1911 and many famous people have supposedly ordered hats here, including Chairman Mao and Premier Zhou.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Shengxifu also sell hats to the U.S., Germany, France, Canada, and Singapore.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><ul class="drop1" data-dcnode-id="1089"><span data-dcnode-id="1100" instrument_node="">
</span><li data-dcnode-id="1096"><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Location</span></strong><span data-dcnode-id="1097" instrument_node="">: No. 180, Wangfujing Avenue, Dongcheng District (东城区王府井大街180号)</span></li><span data-dcnode-id="1095" instrument_node="">
</span><li data-dcnode-id="1091"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Subway Line</span></strong><span data-dcnode-id="1092" instrument_node="">: Take subway line 1 and get off at Wangfujing station.</span></li><span data-dcnode-id="1090" instrument_node="">
</span></ul><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1085"><strong data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">3) Neiliansheng Shoe Store 内联升</span></strong></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Neiliansheng Shoe Store is the largest handmade shoe-making company in China, famous for its cloth shoes.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">The headquarters has a Qing Dynasty style layout with yellow tiles and red pillars, reminiscent of the image of a bustling ancient shop.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Neiliansheng Shoe Store was founded in 1853 to make shoes for officials. The Chinese character "Nei" stands for the government while "Liansheng" means "getting promotions". Therefore, all officials wear these shoes as a way to pray for a promotion, and this is how the shoe store got its name.</span></p><span data-dcnode-id="1075" instrument_node="">

</span><p data-dcnode-id="1017"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">1) Qianmen Street 前门大街</span></strong></p><span data-dcnode-id="1016" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="1013"><img alt="qianmen" data-dcnode-id="1015" height="224" loader="lazy" originalsrc="//images.chinahighlights.com/2013/12/qianmena1b50967f3cc_cp_298x223.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="298"><span data-dcnode-id="1014" instrument_node="">Qianmen Street</span></div><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1008"><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chinahighlights.com/beijing/attraction/qianmen-street.htm" target="_blank"><span data-dcnode-id="1011" instrument_node="">Qianmen Street</span></a><span data-dcnode-id="1009" instrument_node=""> is located to the south of Tiananmen Square. It is Beijing's original commercial center from 600 years ago; today, it largely deals in Chinese traditional products.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">This is a </span><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">good place for souvenirs</span></strong><span data-dcnode-id="1003" instrument_node="">, such as stone or jade chops carved with your name. The Lao She Teahouse is located to the west of Qianmen Street, and is a good place to sample Chinese teas, read, or watch a traditional show.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><ul class="drop1" data-dcnode-id="989"><span data-dcnode-id="1000" instrument_node="">

</span><li data-dcnode-id="991"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Transportation</span></strong><span data-dcnode-id="992" instrument_node="">: Take bus 17, 22, or 120, or subway line 2, and get off at Qianmen Stop</span></li><span data-dcnode-id="990" instrument_node="">
</span></ul><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="985"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">2) Xiushui Street 秀水街</span></strong></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="983" instrument_node="">Xiushui Street has a </span><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">silk market</span></strong><span data-dcnode-id="980" instrument_node=""> (open 9am to 9pm) brimming with some of the finest silk products, as well as an amazing array of </span><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">name-brand clothes and bags</span></strong><span data-dcnode-id="977" instrument_node="">, such as Reebok, Adidas, and Gucci.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">Xiushui Street is also one of the few places in Beijing where foreigners can purchase </span><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">clothes and shoes in larger sizes</span></strong><span data-dcnode-id="971" instrument_node="">. The fun of the place may not come from searching for the perfect bag, but from the haggling. "No price is fixed" is the golden rule here. The more you haggle, the better price you get, even 30 percent of the original price.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="966"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">3) Sanlitun Village 三里屯</span></strong></p><span data-dcnode-id="965" instrument_node="">
</span><div class="photoBlock300 autowidht" data-dcnode-id="962"><img alt="beijing Sanlitun Village" data-dcnode-id="964" height="198" loader="lazy" originalsrc="//images.chinahighlights.com/2014/02/beijingf2d4635ce33c_cp_299x197.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.chinahighlights.com/grey.gif&amp;raw" style="opacity: 0; transition: opacity 0.5s ease-in-out 0s;" width="299"><span data-dcnode-id="963" instrument_node="">Sanlitun Village</span></div><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="960" instrument_node="">Beijing Sanlitun Village </span><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Flagship stores</span></strong><span data-dcnode-id="957" instrument_node=""> for many famous brands, especially </span><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">sports brands</span></strong><span data-dcnode-id="954" instrument_node="">, are in Sanlitun Village. It is very popular among Beijing young people as well as tourists.</span></p><span data-dcnode-id="952" instrument_node="">

</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Beijing Xidan Shopping Center is on the bustling Xidan Commercial Street, a famous center with 70 years of history. This market covers a range of prices levels by providing middle and high quality commodities.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Many new shops like Xidan Shopping Center, Xidan Bazaar, Chung-Yo Department Store, and Huanan Mansion have recently been launched. Many world-famous, name-brand products are available, making Xidan a paradise for shoppers.</span></p><span data-dcnode-id="912" instrument_node="">

</span><h3 data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">4. Shopping for Computers and Electronic Products</span></h3><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="888"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Zhongguancun High-Tech Center 中关村科贸电子城</span></strong></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Known as "China's Silicon Valley", Zhongguancun is Beijing's high-tech center because of its many universities and IT-based companies.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Markets sell every kind of computer part that you can imagine. The Zhonghai electronic market sells used computers, parts, and notebooks, and second-hand parts sell at low prices if you do not require the latest model. In addition, many markets offer reasonably priced computer repair services.</span></p><span data-dcnode-id="881" instrument_node="">
