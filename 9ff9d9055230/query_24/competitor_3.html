Heritage means different things to different people. By definition, heritage means an individual's perception of their unique family identity, including the artifacts, culture, traditions, and values passed down through generations. We all absorb our heritage from childhood through experience and through observing. Even though not everything passed down through generations is positive, heritage is widely considered positive. Positive in the sense that the elements being passed down are meaningful elements that identify our families and our cultures, and we are also supposed to pass them down.</span><br data-dcnode-id="6154"><span data-dcnode-id="6153" instrument_node="">
In many cases, what families hold close to heart as heritage is their cultural or ethnic identity. Other families also hold values such as religiosity, strong work ethic, leading a social life, and pursuit of education to be their heritage. For some individuals, their love for certain sports, music, or adventure is part and parcel of what they consider heritage…</span></p><span data-dcnode-id="6151" instrument_node="">

</span><br data-dcnode-id="6084"><span data-dcnode-id="6083" instrument_node="">
This study provides an evaluation of Greenbushes 6254, Western Australia, to best determine how to preserve its culture and heritage to attract more tourists to use the local hotels, shops, and businesses. To this end, the study identifies those factors that have been shown to motivate cultural-heritage tourists to visit various destinations. An evaluation of the potential for Greenbushes 6254 to promote its cultural-heritage tourism features while preserving its existing attractor factors with the support of Lotterywest grants and community engagement is followed by an outline of the study's methodology and a description of the data collection process. Finally, a discussion concerning the special expertise that was required for the study is followed by a summary of the research and important findings in the conclusion.</span><br data-dcnode-id="6082"><span data-dcnode-id="6081" instrument_node="">

</span><p data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">Traditional cultural expressions include tangible and intangible items unique to a specific culture, including everything from visual and performing art forms to religious ceremonies and architecture. It was not until I realized that wearing or using the cultural expressions from other societies often constituted cultural appropriation that I began to examine my own cultural expressions more critically. For example, for non-native people to wear moccasins is a form of cultural appropriation by taking traditional cultural expressions and taking them completely out of context. As Franklin (2016) also points out, some indigenous cultures perform dances or music in front of tourists with potentially problematic results. Yet cultural expressions are one of the most important ways of retaining the core elements of a traditional culture, helping societies to pass on their knowledge, wisdom, and traditions to future generations. Cultural expressions also allow members of a society to communicate and share the beauty…</span></p><span data-dcnode-id="5876" instrument_node="">

</span><br data-dcnode-id="5652"><span data-dcnode-id="5651" instrument_node="">
Time is a foundational factor in every culture. The perception of time is different for most cultures and the determining factor to those differences is often based on the means of production. "Most cultures have some concept of time, although the way they deal with time may differ fundamentally." (Kokole 1994, 35) Tracing the perception of the concept of time in frica can be seen as tracing the European racial prejudices of the intellect of the indigenous populations in the colonized regions of frica. Much of the information regarding the development of time concepts in frican culture is colonial and based on the European interlopers recorded ideas.</span><br data-dcnode-id="5650"><span data-dcnode-id="5649" instrument_node="">
</span><br data-dcnode-id="5648"><span data-dcnode-id="5647" instrument_node="">
Some of those recorded ideas are those of missionaries and others are those of capitalist adventurers, with the intermittent mark of a very few true historians.</span><br data-dcnode-id="5646"><span data-dcnode-id="5645" instrument_node="">

In Mali, as in many other parts of frica, there are…</span></p><span data-dcnode-id="5641" instrument_node="">
</span><p data-dcnode-id="5631"><span data-dcnode-id="5640" instrument_node="">Akan" is an ethnographic and linguistic term used to refer to a cluster of culturally homogenous groups living in central and southern Ghana and parts of the adjoining eastern Cote d'Ivoire. The Akan constitute two broad subcategories: the inland Asante, Bono, Akyem, Akwapem, and Kwawu, who speak the Twi, and the coastal Fante, who speak a dialect of the same name. The Akan dialects are, for the most part, mutually intelligible. Most of these ethnic groups constituted autonomous political systems in the pre-colonial period. www.questia.com/PageManagerHTMLMediator.qst?action=openPageViewer&amp;docId=55458430" (Adjaye 1994, 57)</span><br data-dcnode-id="5639"><span data-dcnode-id="5638" instrument_node="">
</span><br data-dcnode-id="5637"><span data-dcnode-id="5636" instrument_node="">
Studies of Akan time perceptions and calendrical systems have been limited despite the fact that the existence of institutions and mechanisms for time-reckoning have been noted in the literature on the history and ethnography of the Akan for nearly two centuries. Beyond early sparse references by Rattray (1923) and Danquah (1968), a full-length monograph on the subject did not appear until Deborah Fink "Time and Space Measurements of the Bono of Ghana" (1974); however, the author's primary concern was with the applicability of Bono terminologies for measuring volume, weight, and time to formal education, rather than with time-marking systems P.F. Bartle brief five-page paper, "Forty Days: The Akan Calendar" (1978), was an exploratory essay into a single calendrical framework, the 40-day (adaduanan) cycle. Its treatment is consequently restrictive and limited to the 40-day calendrical structure. Similarly, Tom McCaskie "Time and the Calendar in Nineteenth-Century Asante: An Exploratory Essay" (1980) and Ivor Wilks ' "On Mentally Mapping Greater Asante: A Study of Time and Motion" (1992) are concerned primarily with a specific aspect of time: the scheduling of diplomatic and other governmental business in Asante.</span><br data-dcnode-id="5635"><span data-dcnode-id="5634" instrument_node="">
</span><br data-dcnode-id="5633"><span data-dcnode-id="5632" instrument_node="">

The changing demographics of the modern-day multicultural world are increasingly challenging healthcare professionals to consider cultural diversity as a priority in the health sector. Being able to deliver effective care to patients from diverse backgrounds begins with understanding the values, beliefs, and customs associated with different cultures. This text summarizes the writer's experience in a Native American powwow, and explores the effect of the Native American culture on the nursing profession.</span><br data-dcnode-id="5575"><span data-dcnode-id="5574" instrument_node="">

This paper discusses all the facets and considerations inherent to a cultural identity essay. Namely, the paper describes the importance of cultural identity, the definition of cultural identity, and examples of cultural identity—both theoretical and literal examples in the world today. This paper seeks to show how one’s cultural identity is so much more than just a melee of one’s race, environment and heritage. Cultural identity is made up of so many factors and influences, both positive and negative, and both direct and covert. This paper sheds light on how one’s cultural identity manifests and how the cultural identity of two people from the same family can be slightly or tremendously different, as a result of a difference of lived experiences and preferences. Finally, this paper investigates some of the more dominant theories of cultural identity.</span><br data-dcnode-id="5495"><span data-dcnode-id="5494" instrument_node="">

The culture that I have chosen is Native Americans, which for U.S. government purposes are usually defined as Native Americans and Alaskan Natives. This is an umbrella group for all of the different tribes, and people descended from those tribes, so there can be significant cultural differences between the groups. This group often suffers from health care outcomes that are worse than those in the general population. The leading causes of morbidity/mortality among this group have been identified as motor vehicle accidents, suicide, firearms and homicide in order. While motor vehicle accidents are the highest cause among whites as well, the rate of such among Native Americans is more than double either whites or blacks. Suicide rates among Native Americans are nearly five times what they are for whites or blacks. Firearm rates are much higher than those of whites, but lower than those for blacks. The homicide…</span></p><span data-dcnode-id="5430" instrument_node="">

</span><p data-dcnode-id="5291"><span data-dcnode-id="5296" instrument_node="">While in high school, she worked as a waitress at a local diner. Most of the population was black, therefore there was little contact with white customers or employees. Margaret feels that she was socially isolated until the 1950s. She was not exposed to white culture; it was foreign to her. She was only exposed to black culture of the time. They were not allowed in certain stores, restaurants, or other places of business. She remembers "white only" restrooms and "black only" fountains. This cultural isolation was oppressive.</span><br data-dcnode-id="5295"><span data-dcnode-id="5294" instrument_node="">

</span><p data-dcnode-id="4554"><span data-dcnode-id="4559" instrument_node="">We now have the means to study the evolution of the human genome more closely than ever in the past. One of the key ideas presented by the authors is the idea of transmission fidelity. This means that culture can act as an inheritance system, promoting the transmission of certain genetic traits in a predictable fashion. This type of cultural inheritance results in distinct societies that not only share the same cultural traits, but also share similar genetic traits as well. In the past, geography and proximity to others was a factor in this process as well. Richerson, oyd, and Henrich (2010) concluded that cultural evolution and biological evolution occur simultaneously. They also suggested that cultural evolution had a significant influence on biological evolution.</span><br data-dcnode-id="4558"><span data-dcnode-id="4557" instrument_node="">

The Heritage Assessment Tool is a useful way of examining how strongly a person identifies with his or her heritage. It asks questions that can give a healthcare provider information about how long the family has been in the United States, how many generations of the family have been in the United States, how close the family is with other family members, whether the person lives in an ethnically-identified community, and whether the person married someone from the same cultural background (Spector, 2000). Furthermore, the questions in the assessment tool also seem aimed at helping determine whether the person is from a minority ethnic community. While it is not always the case, people who belong to minority groups may be more likely to identify with ethnic sub-communities. This can have a tremendous impact on the healthcare choices made by the individual patient, so that understanding a patient's…</span></p><span data-dcnode-id="4479" instrument_node="">

CULTURAL Characteristic FOUR: Hospitality. An essential part of the Uzbek cultural heritage is hospitality. The country is located at the crossroads where trade routes pass through opening up the door to Central Asia. Many villages had oasis facilities and so caravans passing through would stop and use the hospitality of people in small villages where there was water, shade and rest. The "Silk Road" runs right through Uzbekistan. The hospitality that was shown to these caravans was in the form of safety from the dangers of the road, a place to sleep, food and water for the camels, hot tea, food, and graciousness, according to Central Asian Cultures.</span><br data-dcnode-id="4268"><span data-dcnode-id="4267" instrument_node="">

The conclusion of this story in which Maggie's mother gives her the valued quilts appears to suggest that the author believes that the more interactive application of heritage, as opposed to the passive reverence of heritage as art, is more valid. Walker does not seem to pose the notion that these two views of heritage are incompatible with one another, however. Instead, she indicates that Dee is simply not able to understand the value in the form of heritage that her mother and sisters represent and practice. The following quotation which ends the story and precedes Dee's departure, alludes to this fact.</span><br data-dcnode-id="4190"><span data-dcnode-id="4189" instrument_node="">

As an extension of the sciences of geography and physical morphology, human dimensions research explores various concepts associated with human fairness, risk, biodiversity and sustainability and provides methods to measure public satisfaction and identify different communities of interest, conflict or consensus. Human dimension categories include economics with a focus on the monetary measurement of ecosystems; recreation which seeks to understand the relationship between the recreation setting and human experience; cultural heritage which explores the characteristics of sustainable societies, and lastly environmental psychology and social interactions which involve the measurement of ecosystem-related public perceptions, attitudes and beliefs and the objectives of the concerned parties.</span><br data-dcnode-id="3922"><span data-dcnode-id="3921" instrument_node="">

When Senghor was imprisoned for the already mentioned two years period he composed poetry, read the work of Goethe and delved into Western philosophical works and as well reestablished his link with his fellow Africans and songs and tales were shared from Africa and this resulted in the "fostering [of] an alternative understanding of humanism and society." (Quest, 2005)</span><br data-dcnode-id="3836"><span data-dcnode-id="3835" instrument_node="">
</span><br data-dcnode-id="3834"><span data-dcnode-id="3833" instrument_node="">
The Quest Journal editorial states that it seems nice to think that the prison experiences of Senghor as well as Senghor's knowledge spanning the intellectual traditions of the Western world and his admiration for values, traditions and cultures of Africa together resulted in a "subjectivity that was transcultural and transnational in it sympathies, accomplishments and aspirations." (Quest, 2005) Senghor set the stage for "a post-anthropological humanism, one that truly points to the possibilities for a democratic and cosmopolitan world." (Quest, 2005)</span><br data-dcnode-id="3832"><span data-dcnode-id="3831" instrument_node="">

</span><p data-dcnode-id="3242"><span data-dcnode-id="3253" instrument_node="">This immersion project provided me with the opportunity to learn about Hispanic culture in a way that was much more enjoyable and interesting than reading it in a book. Through this project I got to live as a Hispanic for short times and really feel what they feel during various times of family life. Whether it was attending festivals, church or going to a young girl's coming out party I was surrounded with Hispanic family members that went out of their way to help me understand. I came away with the understanding that the Hispanic culture is about love, celebration and enjoyment of life, something I think many of us could learn from.</span><br data-dcnode-id="3252"><span data-dcnode-id="3251" instrument_node="">

o learn more about the Sydney Opera House, those interested in Australian culture can visit the official Sydney Opera House web site (http://www.sydneyoperahouse.com/visit/index.aspx),which caters primarily to those who want to visit or learn more about the opera house, containing a great quantity of information and photos relating to architecture and events, but few outside links. A similar, but less extensive site catering to tourists and offering information about both tours and events is the 2008 Biennale of Sydney web site (http://www.bos2008.com/app/biennale/venue/6),which also includes a brief history of the attraction and links to other Australian cultural gems. Finally, the Australian Government's Culture and Recreational Portal's information on the Sydney Opera House site (http://www.cultureandrecreation.gov.au/articles/sydneyoperahouse/),which caters to educators, students, and those who simply want to learn about Australia is quite impressive and comprehensive, including a long list of links to information and photos. hus, because of both its contribution to architecture and culture,…</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3174"><span data-dcnode-id="3189" instrument_node="">The Sydney Opera House: A Monument of Both Architectural and Cultural Grandeur modern architectural wonder, the Sydney Opera House was inaugurated in 1973 and continues to maintain its position as one of Australia's most important cultural and architectural sites. Architectural features of significance include the well-known three shells that interlock on the top of the structure and contain different areas of interest -- including restaurants and a theater -- and the pedestrian platforms that lead to ground level. it's architectural significance results not only from the beauty and uniqueness of its impressive design, but also from the engineering feats that resulted in its construction. Designed by Jorn Utozon, a Danish architect, the opera house is lauded for its glorification of the Sydney harbor as well as its modern technology and feel. Furthermore, the building was constructed with an eye on environmentalism and conservation.</span><br data-dcnode-id="3188"><span data-dcnode-id="3187" instrument_node="">
</span><br data-dcnode-id="3186"><span data-dcnode-id="3185" instrument_node="">
In addition to its innovative structural design, however, the opera house lends additional cultural gems to the city of Sydney. An operational performing arts center, the Sydney Opera House offers a variety of cultural entertainment. In fact, the 2008 season lists performances from modern Rock and Roll wonder Sting to Mozart's classical opera Don Giovanni. Additionally, the area offers a variety of tours, restaurants, and bars that introduce the visitor to the cultural scene of Australia.</span><br data-dcnode-id="3184"><span data-dcnode-id="3183" instrument_node="">
</span><br data-dcnode-id="3182"><span data-dcnode-id="3181" instrument_node="">
To learn more about the Sydney Opera House, those interested in Australian culture can visit the official Sydney Opera House web site (&nbsp;</span><a data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sydneyoperahouse.com/visit/index.aspx" rel="NOFOLLOW" target="_blank"><span data-dcnode-id="3180" instrument_node="">http://www.sydneyoperahouse.com/visit/index.aspx</span></a><span data-dcnode-id="3178" instrument_node="">&nbsp;),which caters primarily to those who want to visit or learn more about the opera house, containing a great quantity of information and photos relating to architecture and events, but few outside links. A similar, but less extensive site catering to tourists and offering information about both tours and events is the 2008 Biennale of Sydney web site (&nbsp;</span><a data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bos2008.com/app/biennale/venue/6" rel="NOFOLLOW" target="_blank"><span data-dcnode-id="3177" instrument_node="">http://www.bos2008.com/app/biennale/venue/6</span></a><span data-dcnode-id="3175" instrument_node="">&nbsp;),which also includes a brief history of the attraction and links to other Australian cultural gems. Finally, the Australian Government's Culture and Recreational Portal's information on the Sydney Opera House site (http://www.cultureandrecreation.gov.au/articles/sydneyoperahouse/),which caters to educators, students, and those who simply want to learn about Australia is quite impressive and comprehensive, including a long list of links to information and photos. Thus, because of both its contribution to architecture and culture, the Sydney Opera House is an important monument in Australia and all over the world. Those who want to learn more about the opera house can do so by visiting a variety of sites on the Internet.</span></p><span data-dcnode-id="3173" instrument_node="">

Most studies carried out in the United States to measure intelligence (IQ) indicate a significant gap in the IQ test scores of Blacks and Whites. The gap is more pronounced in certain areas of intelligence such as general intelligence and on tests requiring problem solving and more complex mental operations than on tests of rote learning and immediate memory. The gap has narrowed since the 1970s but still persists stubbornly. Debate has raged among the psychologists and social scientists about the reasons for the gap. The "hereditists" believe that the difference in the IQ test scores of Blacks and Whites is largely due to genetic reasons. The "environmentalists" are equally certain that the gap is due to environmental reasons and has nothing to do with genetics. This paper looks at both the heredity explanation as well as the environmental explanations of…</span></p><span data-dcnode-id="3050" instrument_node="">

</span><br data-dcnode-id="2897"><span data-dcnode-id="2896" instrument_node="">
The difference between education in the East and the West is primarily a difference in culture. Today, cultural differences are less pronounced than they were a century ago. Globalized society has seen cultures meld and melt into one another, so that in many senses the East resembles the West in more ways than one (Igarashi). However, deeply rooted cultural cues still represent a fundamental reason for existing educational differences between the East and the West. This paper will describe these differences and show why they exist.</span><br data-dcnode-id="2895"><span data-dcnode-id="2894" instrument_node="">

Cultural sensitivity is an integral part of effective nursing. Although the definitions of concepts such as 'health' and 'wellness' might seem on their surface to be self-evident, these notions are, in fact, highly mutable and particular to the individual and his or her culture. Cultural insensitivity can result in patients becoming alienated from the medical system and this results in poorer, ineffectual care. One of the reasons instruments such as the Heritage Assessment Tool can be so useful is that it can be a clear and efficient way to establish the culturally-contextual health beliefs of a patient whose experiences and values that are different those of the physician, nurse, or other healthcare provider treating the patient.</span><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">

</span><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node="">
Cultural diversity is that quality or characteristic of any society, community, group or family that consists of a variety of cultural and/or ethnic backgrounds. Thus, for example, a nation like America could be said to be culturally diverse because it is represented by various cultures and ethnicities throughout the land. At the same time, being culturally diverse is also about showing respect and appreciation for and towards the various cultural and ethnic groups within the community. Diversity is something that is recognized rather than something is suppressed or ignored. True cultural diversity is not just the physical make-up of the group of community but also the state of mind of the members of that group regarding how they think about and view diversity. Yet, as DiMaggio and Bryson (2000) show, cultural diversity remains a controversial subject for some.</span><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">

</span><p data-dcnode-id="2346"><span data-dcnode-id="2351" instrument_node="">Not celebrating Christmas, and not having time off from school for Persian religious holidays, has always made me take great notice of the fact that I am "different." As I have matured, however, I have come to appreciate this difference, and to realize that everyone truly is "different" in many ways. It took me quite awhile to come to this realization and to fully accept my culturally diverse identity as a Persian-American, but now that I have I realize that the diversity I struggled with in my youth has actually given me a great advantage in modern society. I am already prepared and well equipped not only to "deal with" cultural diversity, but to actively engage and navigate a world where it is commonplace.</span><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">

</span><br data-dcnode-id="2268"><span data-dcnode-id="2267" instrument_node="">
at first they retained many of their cultural traits and values; however, as time passed and they were assimilated into the Euro-American culture, those cultural traditions and values were lost. In hindsight, the ugly scar on the history of the founding of the United States</span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">
</span><br data-dcnode-id="2264"><span data-dcnode-id="2263" instrument_node="">
can't ever be healed, but the dignity of the history of the Africans who were brought here should be part of history, and be honored.</span><br data-dcnode-id="2262"><span data-dcnode-id="2261" instrument_node="">

The spread of public education in the 20th century gave rise to even greater tensions about the appropriate role of religion within the public education system. The Supreme Court declared that mandated prayers in public schools were unconstitutional, yet the words 'under God' were inserted into the Pledge of Allegiance (Prayer, 2010, eligious Tolerance). Students can wear religious clothing and jewelry to school, and teachers can teach about religion -- but not preach to their students. Walking the fine line between endorsing certain religious traditions within an officially secular community can be tricky, and the definition of what is secular and what is religious continues to evolve with the passage of time. Today, the debates about religion rage on -- the role of so-called 'creationist' science in biology classes that teach about evolution and the right of religious groups to hold meetings on school grounds are two recent examples of…</span></p><span data-dcnode-id="2105" instrument_node="">

In comparing and contrasting the literary techniques of "Wandering in the Garden, Waking from a Dream" and "Soul Mountain," one of the biggest contrasts between the two stories is perspective: Gao Xingjian's "Soul Mountain" is written in the 2nd person, while Pai Hsien-yung's "Wandering in the Garden" is written in 3rd person. The narrator in each story is omniscient, which is their biggest similarity -- but the two differ in style in the sense that "Wandering in the Garden" has a stream-of-consciousness manner that runs through it, taking the reader deep into the main characters thoughts as she revisits her past. The style of "Soul Mountain" is much more descriptive and focused on producing the effect of putting the reader at the heart of the action -- after all, the reader is the subject of the narrative and so it is almost like…</span></p><span data-dcnode-id="2031" instrument_node="">

"1326" instrument_node="">Eliminates flashes and reduces color</span></span><span data-dcnode-id="1324" instrument_node=""> </span><i class="acsbi-vibrate" data-dcnode-id="1323"></i><span data-dcnode-id="1322" instrument_node=""> </span></div><span data-dcnode-id="1320" instrument_node=""> </span><div class="acsb-profile-description" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node=""> This profile enables epileptic and seizure prone users to browse safely by eliminating the risk of seizures that result from flashing or blinking animations and risky color combinations. </span></div><span data-dcnode-id="1317" instrument_node=""> </span><i class="acsb-profile-connected acsbi-chain" data-dcnode-id="1316"></i><span data-dcnode-id="1315" instrument_node=""> </span></div><span data-dcnode-id="1313" instrument_node=""> </span><div aria-pressed="false" class="acsb-profile acsb-profile-vision" data-acsb-action="visionProfile" data-dcnode-id="1283" role="button" tabindex="0"><span data-dcnode-id="1312" instrument_node=""> </span><div aria-hidden="true" class="acsb-profile-toggle" data-dcnode-id="1301"><span data-dcnode-id="1311" instrument_node=""> </span><div class="acsb-toggle acsb-toggle-off" data-dcnode-id="1303"><span data-dcnode-id="1310" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-off" data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">OFF</span></span><span data-dcnode-id="1307" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-on" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">ON</span></span><span data-dcnode-id="1304" instrument_node=""> </span></div><span data-dcnode-id="1302" instrument_node=""> </span></div><span data-dcnode-id="1300" instrument_node=""> </span><div class="acsb-profile-content" data-dcnode-id="1290"><span data-dcnode-id="1299" instrument_node=""> </span><span class="acsb-profile-name" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Vision Impaired Profile</span></span><span data-dcnode-id="1296" instrument_node=""> </span><span class="acsb-profile-text" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Enhances the website's visuals</span></span><span data-dcnode-id="1293" instrument_node=""> </span><i class="acsbi-eye" data-dcnode-id="1292"></i><span data-dcnode-id="1291" instrument_node=""> </span></div><span data-dcnode-id="1289" instrument_node=""> </span><div class="acsb-profile-description" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node=""> This profile adjusts the website, so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others. </span></div><span data-dcnode-id="1286" instrument_node=""> </span><i class="acsb-profile-connected acsbi-chain" data-dcnode-id="1285"></i><span data-dcnode-id="1284" instrument_node=""> </span></div><span data-dcnode-id="1282" instrument_node=""> </span><div aria-pressed="false" class="acsb-profile acsb-profile-cognitive" data-acsb-action="cognitiveProfile" data-dcnode-id="1252" role="button" tabindex="0"><span data-dcnode-id="1281" instrument_node=""> </span><div aria-hidden="true" class="acsb-profile-toggle" data-dcnode-id="1270"><span data-dcnode-id="1280" instrument_node=""> </span><div class="acsb-toggle acsb-toggle-off" data-dcnode-id="1272"><span data-dcnode-id="1279" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-off" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">OFF</span></span><span data-dcnode-id="1276" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-on" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">ON</span></span><span data-dcnode-id="1273" instrument_node=""> </span></div><span data-dcnode-id="1271" instrument_node=""> </span></div><span data-dcnode-id="1269" instrument_node=""> </span><div class="acsb-profile-content" data-dcnode-id="1259"><span data-dcnode-id="1268" instrument_node=""> </span><span class="acsb-profile-name" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Cognitive Disability Profile</span></span><span data-dcnode-id="1265" instrument_node=""> </span><span class="acsb-profile-text" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Assists with reading and focusing</span></span><span data-dcnode-id="1262" instrument_node=""> </span><i class="acsbi-thought" data-dcnode-id="1261"></i><span data-dcnode-id="1260" instrument_node=""> </span></div><span data-dcnode-id="1258" instrument_node=""> </span><div class="acsb-profile-description" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node=""> This profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements of the website more easily. </span></div><span data-dcnode-id="1255" instrument_node=""> </span><i class="acsb-profile-connected acsbi-chain" data-dcnode-id="1254"></i><span data-dcnode-id="1253" instrument_node=""> </span></div><span data-dcnode-id="1251" instrument_node=""> </span><div aria-pressed="false" class="acsb-profile acsb-profile-adhd" data-acsb-action="adhdProfile" data-dcnode-id="1221" role="button" tabindex="0"><span data-dcnode-id="1250" instrument_node=""> </span><div aria-hidden="true" class="acsb-profile-toggle" data-dcnode-id="1239"><span data-dcnode-id="1249" instrument_node=""> </span><div class="acsb-toggle acsb-toggle-off" data-dcnode-id="1241"><span data-dcnode-id="1248" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-off" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">OFF</span></span><span data-dcnode-id="1245" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-on" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">ON</ ode-id="356" instrument_node="">日本語</span></span><span data-dcnode-id="354" instrument_node=""> </span></div><span data-dcnode-id="352" instrument_node=""> </span></div><span data-dcnode-id="350" instrument_node="">
</span></div><span data-dcnode-id="348" instrument_node=""> </span></div><span data-dcnode-id="346" instrument_node=""> </span></div><span data-dcnode-id="344" instrument_node="">
</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="162" tabindex="0"><span data-dcnode-id="342" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="341"></div><span data-dcnode-id="340" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="164" role="dialog"><span data-dcnode-id="339" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="335" role="button" tabindex="0"><span data-dcnode-id="338" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="337"></i><span data-dcnode-id="336" instrument_node=""> </span></span><span data-dcnode-id="334" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="166"><span data-dcnode-id="333" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="168"><strong class="acsb-title-main" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Compliance status</span></strong><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="313" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="307" instrument_node="">
</span><ol data-dcnode-id="281"><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="294"><strong class="acsb-title" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="303" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="302"><br data-dcnode-id="301"><span data-dcnode-id="300" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="299"><br data-dcnode-id="298"><span data-dcnode-id="297" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="296"><br data-dcnode-id="295"></li><span data-dcnode-id="293" instrument_node="">
</span><li data-dcnode-id="283"><strong class="acsb-title" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="290" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="289"><br data-dcnode-id="288"><span data-dcnode-id="287" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="286"><br data-dcnode-id="285"><span data-dcnode-id="284" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="282" instrument_node="">
</span></ol><span data-dcnode-id="280" instrument_node="">
</span><strong data-dcnode-id="277" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="278" lang="EN-US"><span data-dcnode-id="279" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="276" instrument_node="">
</span><ul data-dcnode-id="244"><span data-dcnode-id="275" instrument_node="">
</span><li data-dcnode-id="271"><strong class="acsb-title" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="272" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="270" instrument_node="">
</span><li data-dcnode-id="266"><strong class="acsb-title" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="267" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="265" instrument_node="">
</span><li data-dcnode-id="261"><strong class="acsb-title" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="262" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="260" instrument_node="">
</span><li data-dcnode-id="256"><strong class="acsb-title" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="257" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="251"><strong class="acsb-title" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="252" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="250" instrument_node="">
</span><li data-dcnode-id="246"><strong class="acsb-title" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="247" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="245" instrument_node="">
</span></ul><span data-dcnode-id="243" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="240"><span data-dcnode-id="241" lang="EN-US"><span data-dcnode-id="242" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="239" instrument_node="">
</span><ol data-dcnode-id="181"><span data-dcnode-id="238" instrument_node="">
</span><li data-dcnode-id="231"><strong class="acsb-title" data-dcnode-id="234"><span data-dcnode-id="236" lang="EN-US"><span data-dcnode-id="237" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="235" instrument_node="">–</span></strong><span data-dcnode-id="232" lang="EN-US"><span data-dcnode-id="233" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="230" instrument_node="">
</span><li data-dcnode-id="223"><span data-dcnode-id="226" lang="EN-US"><strong class="acsb-title" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="227" instrument_node="">&nbsp;</span></span><span data-dcnode-id="224" lang="EN-US"><span data-dcnode-id="225" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="216"><span data-dcnode-id="218" lang="EN-US"><strong class="acsb-title" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Animations –</span></strong><span data-dcnode-id="219" instrument_node="">&nbsp;</span></span><span data-dcnode-id="217" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="215" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="211" lang="EN-US"><strong class="acsb-title" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="212" instrument_node="">&nbsp;</span></span><span data-dcnode-id="209" lang="EN-US"><span data-dcnode-id="210" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="207" instrument_node="">
</span><li data-dcnode-id="200"><span data-dcnode-id="203" lang="EN-US"><strong class="acsb-title" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="204" instrument_node="">&nbsp;</span></span><span data-dcnode-id="201" lang="EN-US"><span data-dcnode-id="202" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="192"><span data-dcnode-id="195" lang="EN-US"><strong class="acsb-title" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="196" instrument_node="">&nbsp;</span></span><span data-dcnode-id="193" lang="EN-US"><span data-dcnode-id="194" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="191" instrument_node="">
</span><li data-dcnode-id="183"><strong class="acsb-title" data-dcnode-id="188"><span data-dcnode-id="189" lang="EN-US"><span data-dcnode-id="190" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="184" lang="EN-US"><strong class="acsb-title" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">–</span></strong><span data-dcnode-id="185" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="182" instrument_node="">
</span></ol><span data-dcnode-id="180" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="174" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="167" instrument_node=""> </span></div><span data-dcnode-id="165" instrument_node=""> </span></div><span data-dcnode-id="163" instrument_node="">
