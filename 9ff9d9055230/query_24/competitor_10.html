de-id="2454"></p><p data-dcnode-id="2423"><span data-dcnode-id="2453" instrument_node="">Despite the CI’s repeated efforts to separate its cultural promotional role from anything to do with ideological infiltration, it could not stop such criticisms and worries, which was exacerbated by some Chinese government rhetoric, such as the 2011 speech given by Wang Gengnian, Director of China Radio International: ‘we should quietly plant the seeds of our ideology in foreign countries, we must make good use of our traditional culture to package our socialist ideology.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2441"><a data-dcnode-id="2450" data-reflink="fn" data-rid="FN0034" href="#"><sup data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">34</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2442"><span class="ref-close" data-dcnode-id="2449" tabindex="0"></span><span data-dcnode-id="2448" instrument_node="">34 Marshall Sahlins, </span><i data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Confucius Institute: Academic Malware</span></i><span data-dcnode-id="2445" instrument_node="">, (Prickly Paradigm Press, 2015), p. 8.</span><a class="frontnotes" data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2440" instrument_node=""> Such worries have led to a number of investigations into the CIs and the resulted close-downs in the US,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2425"><a data-dcnode-id="2437" data-reflink="fn" data-rid="FN0035" href="#"><sup data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">35</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2426"><span class="ref-close" data-dcnode-id="2436" tabindex="0"></span><span data-dcnode-id="2435" instrument_node="">35 Elizabeth Redden, ‘More Scrutiny for Confucius Institutes; One to Close’, </span><i data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Inside Higher ED</span></i><span data-dcnode-id="2432" instrument_node="">, (6 February 2018), </span><a class="ext-link" data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insidehighered.com/quicktakes/2018/02/06/more-scrutiny-confucius-institutes-one-close" target="_blank"><span data-dcnode-id="2431" instrument_node="">https://www.insidehighered.com/quicktakes/2018/02/06/more-scrutiny-confucius-institutes-one-close</span></a><span data-dcnode-id="2429" instrument_node=""> (accessed 5 May 2018).</span><a class="frontnotes" data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2424" instrument_node=""> where dual accusations were made against the CI for both ‘political censorship’ when the CI teachers avoided discussing contentious topics, and ‘ideological infiltration’ when those issues were discussed.</span></p><p data-dcnode-id="2386"><span data-dcnode-id="2422" instrument_node="">Hubbert’s research also found that because China is routinely imagined as politically repressive, the purposefully apolitical nature of CI’s pedagogical materials and classroom practices sometimes works counterproductively, as this ‘political absence’ is interpreted as ‘authoritarian presence’, thus ‘reinforcing perceptions of a repressive Chinese government apparatus’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2407"><a data-dcnode-id="2419" data-reflink="fn" data-rid="FN0036" href="#"><sup data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">36</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2408"><span class="ref-close" data-dcnode-id="2418" tabindex="0"></span><span data-dcnode-id="2417" instrument_node="">36 Jennifer Hubbert, ‘The anthropology of Confucius Institute’, </span><i data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Society of East Asian Anthropology</span></i><span data-dcnode-id="2414" instrument_node="">, (5 May 2014), </span><a class="ext-link" data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aaanet.org/sections/seaa/2014/05/the-anthropology-of-confucius-institutes/" target="_blank"><span data-dcnode-id="2413" instrument_node="">http://www.aaanet.org/sections/seaa/2014/05/the-anthropology-of-confucius-institutes/</span></a><span data-dcnode-id="2411" instrument_node=""> (accessed 1 September 2017).</span><a class="frontnotes" data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2406" instrument_node=""> All of her interviewees recognised that Hanban’s ‘attempts to depoliticise the classroom had this paradoxical effect’, which was supported by Lueck et al.’s research finding that despite the CI’s self-proclaimed role focusing only on Chinese language and culture, the narrative of the CI reports in the </span><i data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">New York Times</span></i><span data-dcnode-id="2403" instrument_node=""> defined it as ‘a tool that was being used by the Chinese government to favourably influence American perceptions of China’s domestic policies and international actions. Contributions of the CI to Americans’ knowledge of China’s language and culture went largely unreported’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2388"><a data-dcnode-id="2400" data-reflink="fn" data-rid="FN0037" href="#"><sup data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">37</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2389"><span class="ref-close" data-dcnode-id="2399" tabindex="0"></span><span data-dcnode-id="2398" instrument_node="">37 Therese Lueck, Val Pipps and Yang Lin, ‘China’s Soft Power: A </span><i data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">New York Times</span></i><span data-dcnode-id="2395" instrument_node=""> Introduction of the Confucius Institute’, </span><i data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Howard Journal of Communications</span></i><span data-dcnode-id="2392" instrument_node=""> 25(3), (2014). pp. 324–49.</span><a class="frontnotes" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2387" instrument_node=""> </span></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">The common speculations of the CI’s goal as ideological infiltration rather than just cultural promotion suggests that ideology is an important EV that could work hand in hand with the media and have fatal effects on the DV of CI’s sustainable development. If this variable tends to be more related with CIs operating in a less friendly media environment, the next section will look at another EV that affects CIs operating in a more favourable media environment: nationalism.</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="2186" id="S0003-S2004"><h3 class="section-heading-3" data-dcnode-id="2381" id="_i9"><span data-dcnode-id="2382" instrument_node="">Soft cultural boundary and hard nationalism boundary</span></h3><p data-dcnode-id="2340"><span data-dcnode-id="2380" instrument_node="">According to Duara, ‘every cultural practice is a potential boundary marking a community. These boundaries may be either soft or hard’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2368"><a data-dcnode-id="2377" data-reflink="fn" data-rid="FN0038" href="#"><sup data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">38</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2369"><span class="ref-close" data-dcnode-id="2376" tabindex="0"></span><span data-dcnode-id="2375" instrument_node="">38 Prasenjit Duara, ‘De-constructing the Chinese Nation’, in Unger Jonathan, ed. </span><i data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Chinese Nationalism</span></i><span data-dcnode-id="2372" instrument_node=""> (New York: An East Gate Book, 1996), p. 49.</span><a class="frontnotes" data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2367" instrument_node=""> Groups with soft boundaries between them do not view mutual boundary breaches as a threat, while communities with hard boundaries tend to privilege their differences, and develop an intolerance and suspicion towards other cultures. They mark members off from non-members in a similar way to the identity creation ability of nationalism, which ‘describes the creation of an ideology that serves to celebrate and emphasise the nation as the preeminent collective identity of a people’,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2355"><a data-dcnode-id="2364" data-reflink="fn" data-rid="FN0039" href="#"><sup data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">39</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2356"><span class="ref-close" data-dcnode-id="2363" tabindex="0"></span><span data-dcnode-id="2362" instrument_node="">39 Michael Edson Robinson, </span><i data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Cultural nationalism in colonial Korea, 1920–1925</span></i><span data-dcnode-id="2359" instrument_node=""> (Seattle: University of Washington Press, 2014), p. 9.</span><a class="frontnotes" data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2354" instrument_node=""> thus divides the world into ‘us’ and ‘them’</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2342"><a data-dcnode-id="2351" data-reflink="fn" data-rid="FN0040" href="#"><sup data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">40</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2343"><span class="ref-close" data-dcnode-id="2350" tabindex="0"></span><span data-dcnode-id="2349" instrument_node="">40 Umut Ozkirimli, </span><i data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Contemporary Debates on Nationalism, A Critical Engagement</span></i><span data-dcnode-id="2346" instrument_node=""> (New York: Palgrave, 2005).</span><a class="frontnotes" data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2341" instrument_node=""> . What is under-discussed is the relationship between nationalism and cultural boundaries.</span></p><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">In contrast to the territorial and national boundaries, the most important attribute of cultural boundary is that it is always in flux: soft boundaries can harden, and hard boundaries can soften as well. It is dynamic in nature as a relative concept that must have a reference object. In the frame of reference for this research, China’s cultural boundaries with SK and the UK are at different marks in the spectrum as evidenced by the cross-case data presented in the above sections: the level of cultural understanding, historical connections, people exchange, and media influence as well as their relative positions in the global cultural terrain all contribute to the differences. Duara used the example of changing cultural boundaries between the Manchu and Han in Chinese history in his book, while the author believes this narrative has contemporary and global relevance when mutual transformations can find perfect demonstrations in looking at China’s cultural boundaries with SK and the UK respectively.</span></p><p data-dcnode-id="2310"><span data-dcnode-id="2337" instrument_node="">The cultural boundary between China and the UK is arguably a harder one of the two as Europe is where Orientalism was bred and the UK was in a different ideological camp from China during the Cold War era, so China has been held as both a ‘cultural other’ and ‘ideological other’ in the past. The recent economic rise of China in the globalised era, along with the trans-border exchanges and people mobility has helped generate and stimulate an interest in understanding China, and common national interests in working together has created an agent in softening the traditional boundaries. For example, the news headline of ‘Cameron hails UK as ‘best partner in west’ as he signs £40bn China deal’</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2325"><a data-dcnode-id="2334" data-reflink="fn" data-rid="FN0041" href="#"><sup data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">41</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2326"><span class="ref-close" data-dcnode-id="2333" tabindex="0"></span><span data-dcnode-id="2332" instrument_node="">41 Phillip Inman, ‘Cameron hails UK as “best partner in west” as he signs £40bn China deal’, </span><i data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">The Guardian</span></i><span data-dcnode-id="2329" instrument_node="">, (21 October 2015),</span><a class="frontnotes" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2324" instrument_node=""> during Xi Jinping’s visit in 2015 to kick off the ‘golden era’ indicates a softening of ideological stance by economic interests, and 2015 also launched the first UK-China Year of Cultural Exchange. Then in January 2018, against the backdrop of Brexit, Theresa May visited China with the largest business delegation ever and signed an education deal that will ‘enable more children and more young people than ever to share their ideas about our two great nations’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2312"><a data-dcnode-id="2321" data-reflink="fn" data-rid="FN0042" href="#"><sup data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">42</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2313"><span class="ref-close" data-dcnode-id="2320" tabindex="0"></span><span data-dcnode-id="2319" instrument_node="">42 ‘Theresa May unveils education deal at start of China visit’, BBC News, (30 January 2018), </span><a class="ext-link" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/uk-politics-42865133" target="_blank"><span data-dcnode-id="2318" instrument_node="">www.bbc.co.uk/news/uk-politics-42865133</span></a><span data-dcnode-id="2316" instrument_node=""> (accessed 1 February 2018).</span><a class="frontnotes" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2311" instrument_node=""> </span></p><p data-dcnode-id="2295"><span data-dcnode-id="2309" instrument_node="">Oommen</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2297"><a data-dcnode-id="2306" data-reflink="fn" data-rid="FN0043" href="#"><sup data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">43</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2298"><span class="ref-close" data-dcnode-id="2305" tabindex="0"></span><span data-dcnode-id="2304" instrument_node="">43 T. K. Oommen, ‘Contested Boundaries and Emerging Pluralism’, </span><i data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">International Sociology</span></i><span data-dcnode-id="2301" instrument_node=""> 10, (1995), pp. 251–68.</span><a class="frontnotes" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2296" instrument_node=""> applied the contradictory trends of ‘isms’ to describe the changes in today’s world: </span></p><div class="quote" data-dcnode-id="2292"><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">It is a world of ‘endisms’ (end of history, ideology, nation, geography), ‘postisms’ (postindustrial, postcapitalist, postmodern) and ‘beyondisms’ (beyond the nation-state, beyond the Cold War). Endisms represent the disappearance of boundaries, postisms signify the emergence of new boundaries and beyondisms allude to the elongation of boundaries.</span></p></div><p data-dcnode-id="2291"></p><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">He then concluded that the construction and deconstruction of different types of boundaries, including cultural boundaries, make up the very story of human civilisation and of contemporary social transformations. We can see the new knowledge of ‘not the end of history’ and ‘beyond the Cold War’ and the people flows across established boundaries facilitated by cultural diplomacy can help move the relatively hard cultural boundary between China and the UK towards the softer side.</span></p><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Meanwhile, the role nationalism plays could potentially move the relatively soft cultural boundary between China and SK towards the harder side as well. Its ability to create a sense of national identity is constructed against ‘the other’, thus entails cultural resistance and sensitivity to cultural invasions. Robinson has commented on cultural nationalism in colonial Korea that: </span></p><div class="quote" data-dcnode-id="2271"><p data-dcnode-id="2272"><span data-dcnode-id="2286" instrument_node="">As the idea of nationalism rose among Korean intellectual at the turn of the century, the Confucian tradition came under attack as an obstacle to the creation of a strong national identity. Subservience to foreign ideas and cultural norms inhibited the development of a unique, self-conscious Korean identity. Nationalist, therefore, work to exhume the Korean past as a repository of nationalist symbols smothering under a mantle of excessive veneration for Chinese culture. </span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2274"><a data-dcnode-id="2283" data-reflink="fn" data-rid="FN0044" href="#"><sup data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">44</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2275"><span class="ref-close" data-dcnode-id="2282" tabindex="0"></span><span data-dcnode-id="2281" instrument_node="">44 Michael Edson Robinson, </span><i data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Cultural nationalism in colonial Korea, 1920–1925</span></i><span data-dcnode-id="2278" instrument_node=""> (Seattle: University of Washington Press, 2014), p. 161.</span><a class="frontnotes" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2273" instrument_node=""> </span></p></div><p data-dcnode-id="2270"></p><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">This indicates a delicate balance to strike for the CI as explained by SKD4: </span></p><div class="quote" data-dcnode-id="2243"><p data-dcnode-id="2244"><span data-dcnode-id="2267" instrument_node="">There are aspects of </span><i data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Sadaejuui</span></i><span data-dcnode-id="2264" instrument_node="">,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2246"><a data-dcnode-id="2261" data-reflink="fn" data-rid="FN0045" href="#"><sup data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">45</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2247"><span class="ref-close" data-dcnode-id="2260" tabindex="0"></span><span data-dcnode-id="2259" instrument_node="">45 Sadaejuui (</span><i data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">lit</span></i><span data-dcnode-id="2256" instrument_node="">. ”serving-the-Great-ism,” Hangul: 사대주의, Chinese: 事大主义) is a Korean term which evolved in the mid-20th century from a more widely used historical concept. According to Wikipedia, </span><i data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Sadae</span></i><span data-dcnode-id="2253" instrument_node=""> literally means ‘dealing with the great’ or ‘serving the great’ and interpreted as ‘loving and admiring the great and powerful’; </span><i data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Juui</span></i><span data-dcnode-id="2250" instrument_node=""> means ‘ideology’ and it is conventionally translated as ‘-ism’. The Chinese term is sometimes translated as Flunkeyism in English, I think it is more accurate to keep the Korean expression here.</span><a class="frontnotes" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2245" instrument_node=""> or admiration and worship of China from history; there are also components of contempt. Because Korea had been a tributary state to China for thousands of years in history, that some of the Confucian traditions or rituals that we carry out here in South Korea was already extinct in China, for example, our wedding and funeral ceremonies are more particular about rituals; and we never say ‘Traditional Chinese Medicine’ here, it is known as ‘Traditional Korean Medicine’……Actually we (the CI) are being very careful in using the word ‘introducing’ Chinese culture instead of ‘promoting’ it, we always have to clarify that we are only providing opportunities, not serving the Chinese interests.</span></p></div><p data-dcnode-id="2242"></p><p data-dcnode-id="2189"><span data-dcnode-id="2241" instrument_node="">Jin’s research of CI-related media reports in SK has found that ‘when the general public reads reports revealing the huge national interests of China behind the CIs, such reports tend to stimulate the rise of nationalism’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2226"><a data-dcnode-id="2238" data-reflink="fn" data-rid="FN0046" href="#"><sup data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">46</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2227"><span class="ref-close" data-dcnode-id="2237" tabindex="0"></span><span data-dcnode-id="2236" instrument_node="">46 Xianggui Jin, ‘Hanguo meiti guanyu Kongzi Xueyuan de baodao yu pinlun’ [Media reports and commentaries concerning the Confucius Institutes in South Korea], Zhang Lihua, ed., </span><i data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Zhongguo Wenhua yu Waijiao</span></i><span data-dcnode-id="2233" instrument_node=""> [</span><i data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Chinese Culture and Diplomacy</span></i><span data-dcnode-id="2230" instrument_node="">] (Beijing: zhishi chanquan chubanshe, 2013), p. 239.</span><a class="frontnotes" data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2225" instrument_node=""> The carefulness in avoiding the wording of ‘promoting Chinese culture’ was also shared by SKD1 from China, saying that ‘the Koreans are very sensitive to “cultural invasions” from China, they would accuse you of doing this if you do too much’. Meanwhile, a number of scholars</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2207"><a data-dcnode-id="2222" data-reflink="fn" data-rid="FN0047" href="#"><sup data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">47</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2208"><span class="ref-close" data-dcnode-id="2221" tabindex="0"></span><span data-dcnode-id="2220" instrument_node="">47 Andreas Forsby, ‘An End to Harmony? The Rise of a Sino-Centric China’, </span><i data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Political Perspectives</span></i><span data-dcnode-id="2217" instrument_node=""> 5(3), (2011), pp. 5–26; Mingjiang Li, ‘</span><i data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Soft Power in Chinese Discourse: Popularity and Prospect’ in: RSIS working paper, No. 165</span></i><span data-dcnode-id="2214" instrument_node="">, (2008); S. Rajaratnam School of International Studies, Nanyang Technological University; Xuetong Yan, </span><i data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Ancient Chinese Thought, Modern Chinese Power</span></i><span data-dcnode-id="2211" instrument_node=""> (Princeton: Princeton University Press, 2011).</span><a class="frontnotes" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2206" instrument_node=""> have observed the increasingly assertive Chinese nationalism that emerged out of the domestic discourse from the 1990s onwards, and commented on the Sino-centric tendency towards the distinctness of Chinese identity. This has given its Asian neighbours mixed feelings. On the one hand, these counties are familiar with Confucianism and Confucian values, which carry universal significance in this region. On the other hand, China’s cultural diplomacy needs to tread a fine line between not appearing as too imposing when promoting the traditional aspects of its culture, and not too aggressive when showcasing the recent rise of China. For example, SKLH mentioned the distaste of local people when seeing Chinese national flags dotting around their city centre squares for CI’s China Day events, giving them a feeling of ‘Chinese takeover’. Another example given by SKD4 was the difficulty in selling traditional Chinese dance performances: ‘they are not exotic enough for the Korean audience, we’re very familiar with these art forms, and we also have </span><i data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">our</span></i><span data-dcnode-id="2203" instrument_node=""> own folk dances’. If Orientalism may be blamed for the lack of popularity of such performances in Western countries such as the UK and US; in East Asia, it was regarded as crossing the boundary that they wish to maintain as their own. It is fair to argue that in countries of the same Confucian cultural sphere, the cultural boundary is more carved by cultural nationalism, which ‘aims to regenerate the national community by creating, preserving or strengthening a people’s cultural identity when it is felt to be lacking, inadequate or threatened’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2191"><a data-dcnode-id="2200" data-reflink="fn" data-rid="FN0048" href="#"><sup data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">48</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2192"><span class="ref-close" data-dcnode-id="2199" tabindex="0"></span><span data-dcnode-id="2198" instrument_node="">48 Kosaku Yoshino, </span><i data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Cultural nationalism in contemporary Japan: A sociological enquiry</span></i><span data-dcnode-id="2195" instrument_node="">, (London: Routledge, 1992), p. 1.</span><a class="frontnotes" data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2190" instrument_node=""> While cultural nationalism provides the driving force for China to pursue its dream of national rejuvenation, it also offers defence in the recipient countries in protecting their own national identities.</span></p><p data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">In summary, a soft cultural boundary may coexist with a hard nationalism boundary and vice versa, which means that the CI has to navigate very carefully with these EVs in consideration, drawing on the different attractions of its offerings. This explains why despite the centralised input from Hanban and the globalised outreach of the CI, no standard ‘recipe’ can be found for all the nine CIs interviewed, and stark differences can be observed in their day-to-day activities. Localisation is essential here, as the same message sent would be received and perceived differently in the process of interacting with different ideologies, cultural spheres, historical contexts and media environment of the destinations. In a way, cultural boundaries reconfigure themselves and become more dynamic in the process of cultural diplomacy, during which the ‘end products’ have to be tailored to each destination rather than having one unified model as a fit for all.</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="2125" id="S0003-S2005"><h3 class="section-heading-3" data-dcnode-id="2184" id="_i10"><span data-dcnode-id="2185" instrument_node="">People-to-people interaction as a moderating variable</span></h3><p data-dcnode-id="2166"><span data-dcnode-id="2183" instrument_node="">Aside from all the above variables, there is a very crucial moderator in this process as described by Ed Murrow: ‘the real crucial link in the international exchange is the last three feet, which is bridged by personal contact, one person talking to another’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2168"><a data-dcnode-id="2180" data-reflink="fn" data-rid="FN0049" href="#"><sup data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">49</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2169"><span class="ref-close" data-dcnode-id="2179" tabindex="0"></span><span data-dcnode-id="2178" instrument_node="">49 George Clack, (ed), </span><i data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Edward R. Murrow: Journalism At its Best</span></i><span data-dcnode-id="2175" instrument_node=""> (Washington DC: Department of State, 2006), </span><a class="ext-link" data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//iipdigital.usembassy.gov/media/pdf/books/murrow.pdf" target="_blank"><span data-dcnode-id="2174" instrument_node="">http://iipdigital.usembassy.gov/media/pdf/books/murrow.pdf</span></a><span data-dcnode-id="2172" instrument_node=""> (accessed 12 May 2015).</span><a class="frontnotes" data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2167" instrument_node=""> In the case of China, the phenomenal increase of people-to-people contact is supported by equally unprecedented growth in the two-way traffic: hugely improved international mobility of Chinese citizens, evidenced in the year-on-year sharp increase of Chinese students, tourists and entrepreneurs venturing abroad; reciprocated by substantial increase of the number of ‘foreigners’ coming to China, attracted by its generous offer of scholarships, its booming economy and business opportunities, as well as proliferating international forums and conferences. It is only reasonable to argue that China is now in a better position than ever before to close the cultural encounter to the ‘last three feet’.</span></p><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">What the CI offers can considerably contribute in this aspect: by bringing teachers from China to the host institutions, facilitating student exchange programs between the two partner institutions, organising study tours, and providing scholarships and chances to study in China. All these help correct some of the mystified or imagined ‘knowledge’ about China, like the example given by UKLH1: ‘one primary school pupil said to her parents that the teacher told them “Chinese people eat dogs”. Kids at that age never question what the teacher says, but now they have got a Chinese teacher to double check’. She said quiz is used as an effective means of knowledge transfer at schools: ‘the “true or false” statement would help to some extent dispel the common misconceptions by explaining the correct answers’. If the discourse in a classroom implicitly either mainstreamlises or marginalises certain ideas or values, by being there and telling its own stories, and influencing students with people-to-people contacts, the CI would be able to create a ripple effect elaborated by Xu Lin: </span></p><div class="quote" data-dcnode-id="2148"><p data-dcnode-id="2149"><span data-dcnode-id="2163" instrument_node="">The CI sends over 10,000 tutors and volunteers a year abroad, each of them would teach a minimum of 200 students, and there are another 200 families behind these students. Through them, foreigners would see the amazing changes taking place in China, and the good qualities of Chinese people.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2151"><a data-dcnode-id="2160" data-reflink="fn" data-rid="FN0050" href="#"><sup data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">50</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2152"><span class="ref-close" data-dcnode-id="2159" tabindex="0"></span><span data-dcnode-id="2158" instrument_node="">50 Yi Wang, Wenhua de kunjing zaiyu buzhi bujue, dujia duihua guojia hanban zhuren, Kongzi Xueyuan zong ganshi Xu Lin, [An exclusive interview with Xu Lin, Director of Hanban, 2014], Jiefang Ribao, [Jiefang Daily], (19 September 2014), </span><a class="ext-link" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//newspaper.jfdaily.com/jfrb/html/2014%25E2%2580%259309/19/content_17605.htm" target="_blank"><span data-dcnode-id="2157" instrument_node="">http://newspaper.jfdaily.com/jfrb/html/2014–09/19/content_17605.htm</span></a><span data-dcnode-id="2155" instrument_node=""> (accessed 3 October 2014).</span><a class="frontnotes" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2150" instrument_node=""> </span></p></div><p data-dcnode-id="2147"></p><p data-dcnode-id="2126"><span data-dcnode-id="2146" instrument_node="">On its tenth anniversary, the CI received a congratulatory letter from Xi Jinping, who has commended its contribution to creating ‘people-to-people, heart-to-heart communication’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2128"><a data-dcnode-id="2143" data-reflink="fn" data-rid="FN0051" href="#"><sup data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">51</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2129"><span class="ref-close" data-dcnode-id="2142" tabindex="0"></span><span data-dcnode-id="2141" instrument_node="">51 Jinping Xi, ‘A Letter to Congratulate the Confucius Institute on its 10</span><sup data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">th</span></sup><span data-dcnode-id="2138" instrument_node=""> Anniversary and the First Global Confucius Institute Day’, (25 September 2014), </span><i data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Confucius Institutes Magazine</span></i><span data-dcnode-id="2135" instrument_node="">, Special Issue, 35, (2014), pp. 12–13, </span><a class="ext-link" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.confucius-institute-magazine.com/revistas/english35/" target="_blank"><span data-dcnode-id="2134" instrument_node="">http://www.confucius-institute-magazine.com/revistas/english35/</span></a><span data-dcnode-id="2132" instrument_node=""> (accessed 10 January 2015).</span><a class="frontnotes" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2127" instrument_node=""> In a way, everyone involved in cross-cultural communications can be considered informal ambassadors in cultural diplomacy, as people-to-people interactions can help combat the unbalanced media influence and enhance mutual understanding, thus constitute a moderating variable that can contribute to the CI’s effective operation.</span></p></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2051" id="S0004"><h2 class="section-heading-2" data-dcnode-id="2122" id="_i11"><span data-dcnode-id="2123" instrument_node="">Prominent features of China’s cultural diplomacy</span></h2><p data-dcnode-id="2107"><span data-dcnode-id="2121" instrument_node="">Based on the multiple comparative case studies, three statements are summarised as the prominent features of China’s cultural diplomacy. A comparative perspective plays a critical role in this process, the words of ‘Western’ and ‘Eastern’ countries are used below as ‘tools to think with’,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2109"><a data-dcnode-id="2118" data-reflink="fn" data-rid="FN0052" href="#"><sup data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">52</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2110"><span class="ref-close" data-dcnode-id="2117" tabindex="0"></span><span data-dcnode-id="2116" instrument_node="">52 Stuart Hall, ‘The West and the Rest: Discourse and Power’, In Bram Gieben and Stuart Hall, ed., </span><i data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">The Formations of Modernity: Understanding Modern Societies: An Introduction, Book 1</span></i><span data-dcnode-id="2113" instrument_node="">(Cambridge: Polity Press in association with Blackwell Publishers Ltd and The Open University, 1992), pp. 185–225.</span><a class="frontnotes" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2108" instrument_node=""> and historical, political and cultural constructs rather than a geographical one.</span></p><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">(1) China’s cultural diplomacy faces different challenges in different cultural spheres.</span></p><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">In Western countries with relatively hard cultural boundaries, China’s cultural diplomacy was staged with Orientalism in the background, and anti-communism in the foreground, giving it a dual aim of correcting China’s image as being the ‘cultural other’ and the ‘ideological other’;</span></p><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">In Eastern countries with relatively soft cultural boundaries, the softness can be hardened by the double-edged nature of nationalism, which provides the driving force for China to launch its campaign of cultural diplomacy domestically, and the defending force for the recipient countries to safeguard their national cultural identities.</span></p><p data-dcnode-id="2100"></p><ul class="NLM_list NLM_list-list_type-simple" data-dcnode-id="2093"><li data-dcnode-id="2097"><p class="inline" data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">(2) The challenges faced by its flagship project of the CI show that the separation of the dual mission is hard due to the entangled nature of culture and ideology and the state-led approach to implementing cultural diplomacy, whose sponsorship, censorship and presence on the foreground has a paradoxical effect of taking on an ideological overtone when it wishes to separate it from the cultural dimension.</span></p></li><li data-dcnode-id="2094"><p class="inline" data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">(3) The globalised outreach of the CI is sustained by a centralised input with localised practice in setting different priorities to adapt to different target audiences: focusing on Chinese language teaching in destinations with relatively soft cultural boundaries, and understanding China in destinations with relatively hard cultural boundaries.</span></p></li></ul><p data-dcnode-id="2092"></p><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">In sum, China’s cultural diplomacy was launched while carrying the shadows of being the ‘cultural other’ and ‘ideological other’, when it is delivered in a trademark state-run method, coupled with its long-established party-state and propaganda system and a political ideology vastly different to the dominant Western model, it would only make the classic suffix of ‘Chinese characteristics’ indispensable for an accurate understanding.</span></p><p data-dcnode-id="2075"><span data-dcnode-id="2089" instrument_node="">Although these features are drawn from the comparative case study of the CIs, they also apply to other forms and fronts of cultural diplomacy, such as internationalisation of the Chinese media and artistic exchanges to name a few. Different fronts may face different challenges, but it is the same contested terrain that China’s cultural diplomacy is launched into, and by similar state-led approach that features concentrated state power: at the word of government command, national level resources are allocated in a campaigning style to create a sensational effect, and it is the number that is used as measurement to show the implementer’s political achievements. Barr has commented on ‘the extent to which it attempts to overtly quantify its culture power’</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2077"><a data-dcnode-id="2086" data-reflink="fn" data-rid="FN0053" href="#"><sup data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">53</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2078"><span class="ref-close" data-dcnode-id="2085" tabindex="0"></span><span data-dcnode-id="2084" instrument_node="">53 Michael Barr, ‘Chinese cultural diplomacy: old wine in new bottles?’ In Kerr, ed., </span><i data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">China’s Many Dreams: Comparative Perspectives on China’s Search for National Rejuvenation</span></i><span data-dcnode-id="2081" instrument_node=""> (New York: Palgrave Macmillan, 2015), p. 187.</span><a class="frontnotes" data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2076" instrument_node=""> as a feature of China’s approach to cultural diplomacy.</span></p><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">In the case of the CI, the goal of letting Chinese culture ‘go global’ is set by the central government with abundant financial input channelled down to Hanban as the implementer at the forefront, who once translated the goal into a target of establishing 1,000 CIs by 2020 to overtake the Alliance Française. What Paris has managed to realize in 130&nbsp;years will be achieved by Beijing in less than two decades. This is reminiscent of those slogans in the Great Leap Forward during Mao’s time when ‘great’ was measured by a blind pursuit of speed and scale with little attention paid to actual effects. The number and speed driven mentality risks renders the CI into a kind of vanity project. During the interviews, Chinese directors both in SK and the UK have mentioned it as a ‘box to tick’: the Chinese university wants the CI as a proof of ‘internationalisation’ and university prestige. As UKD2 disclosed, ‘the home institution only cares about this result to show their achievement and get the ¥200,000 matching fund, but does not care much about the process and quality of the end product’. There are also cases of setting up a CI to simply please the Ministry of Education as disclosed by UKD4: ‘in a way, we were entrusted with such a task by the Ministry and are obliged to carry it out as a way of supporting the Ministry’s work’.</span></p><p data-dcnode-id="2052"><span data-dcnode-id="2072" instrument_node="">The number-driven mentality is also evident in the evaluation criteria: both the </span><i data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Methods of Evaluating a Model CI in Europe</span></i><span data-dcnode-id="2069" instrument_node=""> and </span><i data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">CI of the Year</span></i><span data-dcnode-id="2066" instrument_node=""> set a series of numerical thresholds: How many students were enrolled? How many students sat the HSK test? How many people participated in the China Day/CI event? These quantifiable measures of outputs tell us little about the impact: Does the student enrolled in a taster session continue to study Chinese? Does the number of candidates doing HSK show better understanding of China? Does participating in a China Day mean any internalised knowledge? Obviously, the answers cannot be found in those specious numbers, but as told by UKLH2 during the interview, ‘I think Hanban is still number-driven, they just want to know how many activities have been carried out in how many schools’. UKD2 also expressed his concern that the CI tends to go a bit ‘too far, too fast’, because ‘this suits the taste of the Chinese decision makers: they want to see things happen quickly’. When there were comments about CIs being exported faster than China’s high-speed trains, Liu Yandong, Vice-Premier and Chairperson of the Council of the CI Headquarters, simply adopted the new nickname of ‘soul high-speed train’ in her speech commemorating the CI’s tenth anniversary. This analogy was actually used by Shambaugh</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2054"><a data-dcnode-id="2063" data-reflink="fn" data-rid="FN0054" href="#"><sup data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">54</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2055"><span class="ref-close" data-dcnode-id="2062" tabindex="0"></span><span data-dcnode-id="2061" instrument_node="">54 David Shambaugh, </span><i data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">China Goes Global, the Partial Power</span></i><span data-dcnode-id="2058" instrument_node=""> (New York: Oxford University Press, 2013).</span><a class="frontnotes" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2053" instrument_node=""> in criticising China’s unsophisticated approach to cultural diplomacy as constructing high-speed rail—by investing money and expecting to see development. After all, the greatness of a cultural leap outward needs to be measured not by how big the stride is or how extensive the footprints are, but by how deep the footprints are and how long-lasting the impact is.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2042" id="S0005"><h2 class="section-heading-2" data-dcnode-id="2049" id="_i12"><span data-dcnode-id="2050" instrument_node="">Conclusion</span></h2><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Cultural diplomacy is not a one-way dissemination but a two-way interaction between two sets of identities: the sender’s view of China and the audiences’ perception of China. The multiple CI case studies show contrasting pictures between different cultural spheres: In East Asia where shared cultural roots underpin the relatively soft cultural boundaries, the national identities are shored up through cultural nationalism; whereas in Western countries with relatively hard cultural boundaries to China, the disputes that the CIs have caused serve as a reminder that language teaching and cultural activities can be ideologically charged. Soft or hard, cultural diplomacy does not necessarily cross cultural boundaries intact, but has the potential to soften hard boundaries.</span></p><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">This research has found that there are a number of variables at work in this process, and each variable also contains internal dynamics and there are intertwining interactions going on between these variables, and thus there is simply no way to delineate and reflect this complexity with one static diagram. However, the diagram below represents an attempt to chart them all out in action.</span></p><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">The DV of the CI’s effective operation is mainly determined by the IV of its ability to localise its product and process to suit different target audiences, meanwhile, a number of EVs also play important roles, including ideology, nationalism and the media environment in the destinations. In addition, since we now live in an age where human movements across national borders are happening on an unprecedented scale, people-to-people interactions become an important mediator that enables cultural diplomacy to play a more subtle role in facilitating mutual understanding. All the variables and the complexity of their inter-relations contribute to the Chinese characteristics of its cultural leap outward.</span></p></div></div><div class="hidden" data-dcnode-id="1699" id="table-content-UT0001"><table class="table frame_topbot" data-dcnode-id="1700"><colgroup data-dcnode-id="2034"><col align="left" class="align_left" data-dcnode-id="2040"><col align="left" class="align_left" data-dcnode-id="2039"><col align="center" class="align_center" data-dcnode-id="2038"><col align="center" class="align_center" data-dcnode-id="2037"><col align="left" class="align_left" data-dcnode-id="2036"><col align="left" class="align_left" data-dcnode-id="2035"></colgroup><thead data-dcnode-id="2020"><tr class="rowsep1" data-dcnode-id="2021" valign="top"><th align="left" class="rowsep1 align_left" data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node
