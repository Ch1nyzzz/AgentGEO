</span><article class="article" data-dcnode-id="1205"><span data-dcnode-id="3159" instrument_node="">
</span><p class="fulltext" data-dcnode-id="3158"></p><div class="hlFld-Abstract" data-dcnode-id="3147"><p class="fulltext" data-dcnode-id="3157"></p><div class="sectionInfo abstractSectionHeading" data-dcnode-id="3154"><h2 class="section-heading-2" data-dcnode-id="3155" id="abstract"><span data-dcnode-id="3156" instrument_node="">ABSTRACT</span></h2></div><div class="abstractSection abstractInFull" data-dcnode-id="3148"><p class="summary-title" data-dcnode-id="3151"><b data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">ABSTRACT</span></b></p><p data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">This article explores the prominent features of China’s state-led campaign of cultural diplomacy. Through multiple comparative case studies of its flagship project of the Confucius Institute (CI), it aims to identify and contextualise the various variables affecting its effective operation. It finds that this dependent variable is mainly determined by the independent variable of the CI’s ability to localise its product and process to suit different target audiences, along with a number of extraneous variables, including ideology, nationalism and the media environment in the destinations. People-to-people interaction is also an important mediator that contributes to facilitating mutual understanding. All the variables and the complexity of their inter-relations constitute the Chinese characteristics and are charted out in a diagram.</span></p></div></div><div class="pb-dropzone" data-dcnode-id="3137" data-pb-dropzone="contentNavigationDropZoneAbs"><div class="widget gql-content-navigation none widget-none" data-dcnode-id="3138" id="d28d5637-3950-463d-a4f7-bc92bc490fff"><span data-dcnode-id="3146" instrument_node="">
</span><div class="wrapped" data-dcnode-id="3140"><span data-dcnode-id="3145" instrument_node="">
</span><div class="widget-body body body-none" data-dcnode-id="3142"><div class="ajaxWidget" data-ajax-observe="true" data-ajax-widget="gql-content-navigation" data-ajax-widget-id="d28d5637-3950-463d-a4f7-bc92bc490fff" data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">
</span></div></div><span data-dcnode-id="3141" instrument_node="">
</span></div><span data-dcnode-id="3139" instrument_node="">
</span></div></div><div class="hlFld-Fulltext" data-dcnode-id="2041"><div class="NLM_sec NLM_sec-type_intro NLM_sec_level_1" data-dcnode-id="2968" id="S0001"><h2 class="section-heading-2" data-dcnode-id="3135" id="_i2"><span data-dcnode-id="3136" instrument_node="">Introduction</span></h2><p data-dcnode-id="3089"><span data-dcnode-id="3134" instrument_node="">In today’s world that is marked with economic globalisation, political multi-polarisation and cultural diversification, China wishes to re-establish its significance as a major cultural power in its ascent to global prominence through economic rise. A state-led campaign of cultural diplomacy was staged for this purpose. As the term suggests, cultural diplomacy involves both a dimension of ‘culture’ and ‘diplomacy’, and this strategy demonstrates changes in China on both fronts. Following the induction of the national strategy of ‘Going Global’ (</span><i data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">zou chu qu</span></i><span data-dcnode-id="3131" instrument_node="">) in the 10</span><sup data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">th</span></sup><span data-dcnode-id="3128" instrument_node=""> Five Year Plan in 2001, the cultural front responded by announcing its own strategy of ‘going global’ in 2002: the mission of ‘establishing a brand new image of China and building China into an international cultural centre’ was expected to be achieved through ‘infiltrating into mainstream international community and mainstream media’ according to the then Chinese Cultural Minister Sun Jiazheng.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3110"><a data-dcnode-id="3125" data-reflink="fn" data-rid="FN0001" href="#"><sup data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">1</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3111"><span class="ref-close" data-dcnode-id="3124" tabindex="0"></span><span data-dcnode-id="3123" instrument_node="">1 Liying Yang, ‘Xinshiqi Zhongguo wenhua “zouchuqu” zhanlue de yiyi’ [The significance of the ‘going global’ strategy of Chinese culture in the new era], </span><i data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Renmin Luntan</span></i><span data-dcnode-id="3120" instrument_node="">, [</span><i data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">People’s Tribune</span></i><span data-dcnode-id="3117" instrument_node="">], (11 August 2014), </span><a class="ext-link" data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//paper.people.com.cn/rmlt/html/2014-08/11/content_1475959.htm" target="_blank"><span data-dcnode-id="3116" instrument_node="">http://paper.people.com.cn/rmlt/html/2014-08/11/content_1475959.htm</span></a><span data-dcnode-id="3114" instrument_node=""> (accessed 15 June 2018).</span><a class="frontnotes" data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3109" instrument_node=""> Then in 2004, culture was declared to be the third pillar of China’s diplomacy after politics and economy.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3097"><a data-dcnode-id="3106" data-reflink="fn" data-rid="FN0002" href="#"><sup data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">2</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3098"><span class="ref-close" data-dcnode-id="3105" tabindex="0"></span><span data-dcnode-id="3104" instrument_node="">2 Chunyang Zhu, ‘Zhongguo wenhua zouchuqu weihe kunnan chongchong?’ [Why is the ‘Going Global’ of Chinese culture beset in difficulties?] Zhongguo Wenhua Chanye Pinglun [Review of Chinese Cultural </span><i data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Industry</span></i><span data-dcnode-id="3101" instrument_node="">] 2, (2012), pp. 84–104.</span><a class="frontnotes" data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3096" instrument_node=""> The government rhetoric was quickly matched with significant investments into various high-profile initiatives and a series of milestone events that marked the fledgling of a ‘cultural leap outward’: from the debut of the ‘Year of Chinese Culture’ series in France, Italy, Russia, and Australia in 2003, to the opening up of the Confucius Institutes (CIs) all over the world since 2004; then from launching the 24-hour cable news channels and newspapers (</span><i data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">China Daily Asia Weekly</span></i><span data-dcnode-id="3093" instrument_node=""> and </span><i data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">European Weekly</span></i><span data-dcnode-id="3090" instrument_node="">) overseas in 2010, to staging the Chinese image advertisement in New York Time Square in 2011.</span></p><div class="figure figureViewer" data-dcnode-id="3055" id="F0001"><div class="hidden figureViewerArticleInfo" data-dcnode-id="3068"><span class="figViewerTitle" data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">China’s Cultural Diplomacy: A Great Leap Outward with Chinese Characteristics? Multiple Comparative Case Studies of the Confucius Institutes</span></span><div class="articleAuthors articleInfoSection" data-dcnode-id="3077"><div class="authorsHeading" data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">All authors</span></div><div class="authors" data-dcnode-id="3078"><a class="entryAuthor" data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/action/doSearch%3FContrib%3DLiu%252C%2BXin"><span class="hlFld-ContribAuthor" data-dcnode-id="3084"></span></a><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/author/Liu%252C%2BXin"><span class="NLM_given-names" data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Xin</span></span><span data-dcnode-id="3080" instrument_node=""> Liu</span></a></div></div><div class="articleLowerInfo articleInfoSection" data-dcnode-id="3069"><div class="articleLowerInfoSection articleInfoDOI" data-dcnode-id="3074"><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10670564.2018.1557951"><span data-dcnode-id="3076" instrument_node="">https://doi.org/10.1080/10670564.2018.1557951</span></a></div><div class="articleInfoPublicationDate articleLowerInfoSection border" data-dcnode-id="3070"><h6 data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Published online:</span></h6><span data-dcnode-id="3071" instrument_node="">26 December 2018</span></div></div></div><div class="figureThumbnailContainer" data-dcnode-id="3056"><div class="figureInfo" data-dcnode-id="3062"><div class="short-legend" data-dcnode-id="3063"><p class="captionText" data-dcnode-id="3064"><span class="captionLabel" data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Figure 1. </span></span><span data-dcnode-id="3065" instrument_node=""> Chart of variables.</span></p></div></div><a aria-label="thumbnail image" class="thumbnail" data-dcnode-id="3060" href="#"><img data-dcnode-id="3061" data-src="{&quot;type&quot;:&quot;image&quot;,&quot;src&quot;:&quot;/na101/home/literatum/publisher/tandf/journals/content/cjcc20/2019/cjcc20.v028.i118/10670564.2018.1557951/20190701/images/medium/cjcc_a_1557951_f0001_b.gif&quot;}" height="246" id="F0001image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1080&amp;raw" width="500"></a><div class="figureDownloadOptions" data-dcnode-id="3057"><a class="downloadBtn btn btn-sm" data-dcnode-id="3058" href="#" role="button"><span data-dcnode-id="3059" instrument_node="">Display full size</span></a></div></div></div><div class="hidden rs_skip" data-dcnode-id="3050" id="fig-description-F0001"><p class="captionText" data-dcnode-id="3051"><span class="captionLabel" data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Figure 1. </span></span><span data-dcnode-id="3052" instrument_node=""> Chart of variables.</span></p></div><div class="hidden rs_skip" data-dcnode-id="3048" id="figureFootNote-F0001"><div class="figureFootNote-F0001" data-dcnode-id="3049"></div></div><p data-dcnode-id="3047"></p><p data-dcnode-id="3016"><span data-dcnode-id="3046" instrument_node="">On the diplomatic front, there was also a gradual evolvement from the stance of ‘keeping a low profile’ in Deng Xiaoping’s era to ‘striving for achievements’,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3034"><a data-dcnode-id="3043" data-reflink="fn" data-rid="FN0003" href="#"><sup data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">3</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3035"><span class="ref-close" data-dcnode-id="3042" tabindex="0"></span><span data-dcnode-id="3041" instrument_node="">3 Xuetong Yan, ‘From keeping a low profile to striving for achievement’, </span><i data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">The Chinese Journal of International Politics</span></i><span data-dcnode-id="3038" instrument_node=""> 7(2), (2014), pp. 153–84.</span><a class="frontnotes" data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3033" instrument_node=""> which was formally presented as the new strategy in Xi Jinping’s speech at the foreign affairs conference in 2013. Although Deng’s open-door policy that has propelled China’s economic reform was acclaimed as the ‘Great Leap Outward’,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3018"><a data-dcnode-id="3030" data-reflink="fn" data-rid="FN0004" href="#"><sup data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">4</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3019"><span class="ref-close" data-dcnode-id="3029" tabindex="0"></span><span data-dcnode-id="3028" instrument_node="">4 Hang-Sheng Cheng, ‘Great Leap Outward?’ </span><i data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">FRBSF Weekly Letter</span></i><span data-dcnode-id="3025" instrument_node="">, (5 January 1979), </span><a class="ext-link" data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//core.ac.uk/download/pdf/6458094.pdf" target="_blank"><span data-dcnode-id="3024" instrument_node="">https://core.ac.uk/download/pdf/6458094.pdf</span></a><span data-dcnode-id="3022" instrument_node=""> (accessed 8 September 2016).</span><a class="frontnotes" data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="3017" instrument_node=""> it was not fully applicable to the diplomatic front during his time. These concurrent changes taking place in both dimensions of ‘culture’ and ‘diplomacy’ mirror the shifts in China’s self-identity and its drive to reshape its global cultural identity.</span></p><p data-dcnode-id="2969"><span data-dcnode-id="3015" instrument_node="">This article aims to explore the Chinese characteristics of this ‘cultural leap outward’ and discuss what makes it truly ‘great’ by examining the trajectory of China’s global cultural footprints made through its recent expansion of the CIs. Since its first launch in 2004, there were altogether 525 CIs operating in 146 countries and regions around the world by December 2017.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="3000"><a data-dcnode-id="3012" data-reflink="fn" data-rid="FN0005" href="#"><sup data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">5</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="3001"><span class="ref-close" data-dcnode-id="3011" tabindex="0"></span><span data-dcnode-id="3010" instrument_node="">5 About the Confucius Institute/Confucius Classroom, </span><i data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Hanban website</span></i><span data-dcnode-id="3007" instrument_node="">, (2017), </span><a class="ext-link" data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hanban.edu.cn/confuciousinstitutes/node_10961.htm" target="_blank"><span data-dcnode-id="3006" instrument_node="">http://www.hanban.edu.cn/confuciousinstitutes/node_10961.htm</span></a><span data-dcnode-id="3004" instrument_node=""> (accessed 3 May 2018).</span><a class="frontnotes" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2999" instrument_node=""> Nine CIs were closed down or announced their decisions to do so between 2013 and 2018, receiving global media attention and triggering a lot of debates: apart from the Lyon Confucius Institute that was closed by Hanban in 2013,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2987"><a data-dcnode-id="2996" data-reflink="fn" data-rid="FN0006" href="#"><sup data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">6</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2988"><span class="ref-close" data-dcnode-id="2995" tabindex="0"></span><span data-dcnode-id="2994" instrument_node="">6 Christopher R. Hughes, ‘Confucius Institutes and the University: Distinguishing the Political Mission from the Cultural’, </span><i data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Issues &amp; Studies</span></i><span data-dcnode-id="2991" instrument_node=""> 50(4), (2014), pp. 45–83.</span><a class="frontnotes" data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2986" instrument_node=""> the other eight decisions to terminate their renewable CI agreements were all made by the host institutions—Macmaster University in 2013, Chicago and Penn-State universities in 2014, Stockholm University in 2015, and most recently the University of West Florida, Texas A&amp;M University, the University of North Florida and the University of Michigan in 2018. If we look at the sheer number of these closures, the tiny proportion of 9 out of over 500 may be rightfully considered a sign of the ‘success’ of the CI. However, if we look at their calibres and locations, we will note the fact that they were all hosted by prestigious universities in North America and Europe, the two most targeted areas that have received the largest CI spreads: the U.S. is home to the biggest number of CIs (110 in total) in the world, while Europe has the most concentrated coverage (173 in total).</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2971"><a data-dcnode-id="2983" data-reflink="fn" data-rid="FN0007" href="#"><sup data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">7</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2972"><span class="ref-close" data-dcnode-id="2982" tabindex="0"></span><span data-dcnode-id="2981" instrument_node="">7 About the Confucius Institute/Confucius Classroom, </span><i data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Hanban website</span></i><span data-dcnode-id="2978" instrument_node="">, (2017), </span><a class="ext-link" data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hanban.edu.cn/confuciousinstitutes/node_10961.htm" target="_blank"><span data-dcnode-id="2977" instrument_node="">http://www.hanban.edu.cn/confuciousinstitutes/node_10961.htm</span></a><span data-dcnode-id="2975" instrument_node=""> (accessed 24 May 2018).</span><a class="frontnotes" data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2970" instrument_node=""> If the sustainable and effective operation of the CIs is the dependent variable (DV), what is the independent variable (IV) that affects it? This article aims to identify it along with other extraneous variables (EV), and test the causation through multiple comparative case studies of the CIs.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2879" id="S0002"><h2 class="section-heading-2" data-dcnode-id="2966" id="_i4"><span data-dcnode-id="2967" instrument_node="">Data and method</span></h2><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">The CI was selected to be the comparative case study based on two major considerations. Firstly, it represents the most watched effort of China’s cultural diplomacy and is highly controversial. While its impressive speed of global coverage can be seen as evidence for its early success, it has also received its share of criticisms in the short time-frame of the rapid expansion, which can be found in both prestigious academic publications and influential media outlets. This made it a very illustrative case to show both the opportunities and challenges faced by China’s cultural diplomacy and to explore its distinctive features.</span></p><p data-dcnode-id="2895"><span data-dcnode-id="2963" instrument_node="">The second reason is that despite the growing interest in the CI reflected in recent studies and media reports, only a handful of case studies have been done by academics so far, and they have only focused on CIs in one country, such as the US,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2945"><a data-dcnode-id="2960" data-reflink="fn" data-rid="FN0008" href="#"><sup data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">8</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2946"><span class="ref-close" data-dcnode-id="2959" tabindex="0"></span><span data-dcnode-id="2958" instrument_node="">8 Amy Stambach, </span><i data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">Confucius and Crisis in American Universities, Culture, Capital, and Diplomacy in U.S. Public Higher Education</span></i><span data-dcnode-id="2955" instrument_node=""> (New York: Routledge, 2014); Jennifer Hubbert, ‘The anthropology of Confucius Institute’, </span><i data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Society of East Asian Anthropology</span></i><span data-dcnode-id="2952" instrument_node="">, (5 May 2014), </span><a class="ext-link" data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aaanet.org/sections/seaa/2014/05/the-anthropology-of-confucius-institutes/" target="_blank"><span data-dcnode-id="2951" instrument_node="">http://www.aaanet.org/sections/seaa/2014/05/the-anthropology-of-confucius-institutes/</span></a><span data-dcnode-id="2949" instrument_node=""> (accessed 1 September 2017).</span><a class="frontnotes" data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2944" instrument_node=""> Germany,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2932"><a data-dcnode-id="2941" data-reflink="fn" data-rid="FN0009" href="#"><sup data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">9</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2933"><span class="ref-close" data-dcnode-id="2940" tabindex="0"></span><span data-dcnode-id="2939" instrument_node="">9 Falk Hartig, ‘Confucius Institute and the Rise of China’, </span><i data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Journal of Chinese Political Science</span></i><span data-dcnode-id="2936" instrument_node=""> 17(1), (2012), pp. 53–76.</span><a class="frontnotes" data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2931" instrument_node=""> Australia</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2916"><a data-dcnode-id="2928" data-reflink="fn" data-rid="FN0010" href="#"><sup data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">10</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2917"><span class="ref-close" data-dcnode-id="2927" tabindex="0"></span><span data-dcnode-id="2926" instrument_node="">10 Jeffrey Gil, ‘Dragon in the room: who’s afraid of Confucius Institutes?’, </span><i data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">Asia Times</span></i><span data-dcnode-id="2923" instrument_node="">, (21 December 2017), </span><a class="ext-link" data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atimes.com/dragon-room-whos-afraid-confucius-institutes/" target="_blank"><span data-dcnode-id="2922" instrument_node="">http://www.atimes.com/dragon-room-whos-afraid-confucius-institutes/</span></a><span data-dcnode-id="2920" instrument_node=""> (accessed 20 May 2018).</span><a class="frontnotes" data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2915" instrument_node=""> and South Africa.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2897"><a data-dcnode-id="2912" data-reflink="fn" data-rid="FN0011" href="#"><sup data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">11</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2898"><span class="ref-close" data-dcnode-id="2911" tabindex="0"></span><span data-dcnode-id="2910" instrument_node="">11 Falk Hartig, ‘Cultural diplomacy with Chinese characteristics: The case of Confucius Institutes in Australia’, </span><i data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Communication, Politics &amp; Culture</span></i><span data-dcnode-id="2907" instrument_node=""> 42(Part 2), (2012), pp. 256–276, </span><a class="ext-link" data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mams.rmit.edu.au/bd8e4ha8e4t8z.pdf" target="_blank"><span data-dcnode-id="2906" instrument_node="">http://mams.rmit.edu.au/bd8e4ha8e4t8z.pdf</span></a><span data-dcnode-id="2904" instrument_node=""> (accessed 3 March 2016). ;Falk Hartig, ‘The Globalization of Chinese Soft Power: Confucius Institutes in South Africa’, </span><i data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Confucius Institute and the Globalization of China’s Soft Power</span></i><span data-dcnode-id="2901" instrument_node=""> (Los Angeles: Figueroa Press, 2014).</span><a class="frontnotes" data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2896" instrument_node=""> No comparative approach has been applied yet to examine this flagship project of China’s ‘going global’ strategy—both its aim to improve China’s ‘global’ image and the means through ‘global’ coverage make this comparative approach highly relevant and valuable.</span></p><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Careful thought has been put into making a representative selection of the CIs and the case study was carried out in two phases. Five CIs from four different continents were selected in the first phase by taking cultural spheres in Huntington’s terms into consideration: South Korea (SK) in the Confucian cultural sphere of East Asia; UK and France in the Western civilisation of Europe; Mexico in Latin America; and Morocco in the Muslim world of Africa. Nine people were interviewed during the summer of 2013, with seven of them from the Chinese home universities, and two from the host universities. Though the coverage offers a good geographical spectrum, no access to the same spectrum of data sources from each continent was available. Given the special nature of the CI as a partnership between home and host institutions, it would be ideal to interview both directors sent by the home institutions and those hired by the host institutions; similarly, it would gather more balanced views if teachers both seconded from China and those locally hired are interviewed.</span></p><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Therefore, in the second phase, four different CIs were selected for field visits in 2014: two in SK and two in the UK, while four staff at the CI hosted by the author’s university, including both directors from the host and home universities, one seconded teacher and one locally hired administrator, were also interviewed again in a year’s time to compare notes. These selections were made with an intension to keep the contrasting angle between a generally East and West cultural perspective, while allowing both intra-country and cross-region comparisons to enhance validity of the research findings. On top of this, secondary data were collected for CIs based in the US, which hosts the biggest number in the world and saw five setbacks so far; observation also took place in the CI at the author’s university to contribute to data triangulation.</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2890" instrument_node="">In sum, the overall data profile of this research composes multiple sources of documents, including and Annual Reports of the CIs interviewed; </span><i data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">CI Annual Development Reports</span></i><span data-dcnode-id="2887" instrument_node=""> and the </span><i data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Confucius Institutes Magazine</span></i><span data-dcnode-id="2884" instrument_node=""> published by Hanban; substantial literature review from both English and Chinese sources; observations carried out over a period of ten years from 2008 to 2018 at the author’s university; and primary data collected from 27 interviews of five different roles sharing their insights and experiences at nine different CIs. </span><a data-dcnode-id="2882" href="#app0001"><span data-dcnode-id="2883" instrument_node="">Appendix 1</span></a><span data-dcnode-id="2881" instrument_node=""> lists all the codes, dates, venues and corresponding roles of the interviewees.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2124" id="S0003"><h2 class="section-heading-2" data-dcnode-id="2877" id="_i5"><span data-dcnode-id="2878" instrument_node="">Comparing and contrasting the cross-case data</span></h2><p data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">As discussed earlier, both the aim of China’s cultural diplomacy to improve its global cultural position and the means through global coverage of projects such as the CI give this endeavour a global nature. However, the world is not one monolith. It is marked by various boundaries: racial, social, territorial, political and cultural. By drawing on the triangulated data collected, the sections below will first examine how the interactions between the CI and its target audiences differ in different cultural spheres, then test the causation between the DV of the CI’s effective operation and the IV of its ability to localise the product and process, along with other EVs including ideology, nationalism and media environment of the recipient country, as well as the mediating variable of people-to-people interaction.</span></p><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="2768" id="S0003-S2001"><h3 class="section-heading-3" data-dcnode-id="2873" id="_i6"><span data-dcnode-id="2874" instrument_node="">One mission statement, two different priorities</span></h3><p data-dcnode-id="2855"><span data-dcnode-id="2872" instrument_node="">According to the CI’s Constitution and By-laws, it is a non-profit public institution that aims to ‘develop and facilitate the teaching of the Chinese language overseas and promote educational and cultural exchange and cooperation between China and other international communities’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2857"><a data-dcnode-id="2869" data-reflink="fn" data-rid="FN0012" href="#"><sup data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">12</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2858"><span class="ref-close" data-dcnode-id="2868" tabindex="0"></span><span data-dcnode-id="2867" instrument_node="">12 Constitution and By-Laws of the Confucius Institutes, </span><i data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Hanban website</span></i><span data-dcnode-id="2864" instrument_node="">, (2017), </span><a class="ext-link" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//english.hanban.org/node_7880.htm" target="_blank"><span data-dcnode-id="2863" instrument_node="">http://english.hanban.org/node_7880.htm</span></a><span data-dcnode-id="2861" instrument_node=""> (accessed 27 July 2017).</span><a class="frontnotes" data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2856" instrument_node=""> There seems to be an unanimous understanding of the CI’s two-fold mission among all interviewees. However, a clear difference in terms of priority setting can be observed from the responses gathered from the UK and SK.</span></p><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">In SK, where the geographical vicinity, cultural closeness, economic and business connections with China mean that many people have been to China already, or have plenty opportunities to interact with Chinese people, language teaching was made a clear central task of the CI, as pointed by SKD2: </span></p><div class="quote" data-dcnode-id="2850"><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">China is our neighbour, the closest country to us, historically we were heavily influenced by Chinese traditions, Chinese literature and other aspects, so Korean people nowadays are very interested in going to China for various activities, be it trade, educational or cultural exchanges, there are more and more people, both old and young, learning Chinese, we have tens of thousands candidates sitting the HSK tests every year, the largest group in the whole world.</span></p></div><p data-dcnode-id="2849"></p><p data-dcnode-id="2818"><span data-dcnode-id="2848" instrument_node="">In Hanban Director Xu Lin’s own words, ‘the launch of this program is in response to the Chinese language craze, especially in neighbouring countries’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2836"><a data-dcnode-id="2845" data-reflink="fn" data-rid="FN0013" href="#"><sup data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">13</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2837"><span class="ref-close" data-dcnode-id="2844" tabindex="0"></span><span data-dcnode-id="2843" instrument_node="">13 Howard French, ‘Another Chinese Export is all the Rage: China’s Language’, </span><i data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">New York Times</span></i><span data-dcnode-id="2840" instrument_node="">, (11 January 2006), p. A2.</span><a class="frontnotes" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2835" instrument_node=""> This may help explain why the very first CI in the world was established in Seoul, where the host organisation has started to promote the Chinese proficiency test (HSK) in SK since 1993. SK has been the number one source country of international students learning Chinese in China since 2000, with over 20,000 Korean students study in China every year and 120 universities offering Chinese degree courses in SK.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2820"><a data-dcnode-id="2832" data-reflink="fn" data-rid="FN0014" href="#"><sup data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">14</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2821"><span class="ref-close" data-dcnode-id="2831" tabindex="0"></span><span data-dcnode-id="2830" instrument_node="">14 ‘The Evolution and Current Status of Chinese Teaching and Research in South Korea’, </span><i data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Education Office of the Chinese Embassy in South Korea website</span></i><span data-dcnode-id="2827" instrument_node="">, (2017), </span><a class="ext-link" data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chinaedukr.org/publish/portal109/tab5123/info92047.htm" target="_blank"><span data-dcnode-id="2826" instrument_node="">http://www.chinaedukr.org/publish/portal109/tab5123/info92047.htm</span></a><span data-dcnode-id="2824" instrument_node=""> (accessed June 10 2018).</span><a class="frontnotes" data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2819" instrument_node=""> All the three directors interviewed are consistent in commenting that CIs in SK have focused a lot on selling HSK exams and offering scholarships to school students to study in China.</span></p><p data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">This priority of language teaching was echoed by a blunt statement from SKSC1 at teacher level: ‘they (Korean students) are very pragmatic, not interested in the cultural aspects, they only care if they can master the language or not, and Chinese is now included as one of the subjects they can choose to sit in their entrance examinations to go to university’. SKD1 even commented that: </span></p><div class="quote" data-dcnode-id="2813"><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">There is really not much need for the CI to ‘promote’ Chinese language and culture here, in fact, there is such a high demand and inner drive to master the language that more and more Koreans are voluntarily learning the language in the hope to use it as a tool to tap into opportunities offered by this next-door neighbour. As for culture, some of the traditional Chinese cultural practices were kept better in South Korea than in China.</span></p></div><p data-dcnode-id="2812"></p><p data-dcnode-id="2781"><span data-dcnode-id="2811" instrument_node="">Because of this, UKD4 mentioned that many CIs operating in Asia (especially in Japan, SK and Singapore) do not request operating funds from Hanban, but only apply for project funding. This forms a stark contrast to most CIs in other parts of the world that are attracted by Hanban’s funding to nurture the language program, such as Mexico and Morocco, as well as the U.S.,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2799"><a data-dcnode-id="2808" data-reflink="fn" data-rid="FN0015" href="#"><sup data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">15</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2800"><span class="ref-close" data-dcnode-id="2807" tabindex="0"></span><span data-dcnode-id="2806" instrument_node="">15 Marshall Sahlins, </span><i data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Confucius Institute: Academic Malware</span></i><span data-dcnode-id="2803" instrument_node=""> (Prickly Paradigm Press, 2015).</span><a class="frontnotes" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2798" instrument_node=""> and the attraction for learning the language is a lot less in the UK in comparison. When commenting on the fact that the number of UK students choosing to study foreign languages at university level has been in steady decline for the past seven years, Worne,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2783"><a data-dcnode-id="2795" data-reflink="fn" data-rid="FN0016" href="#"><sup data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">16</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2784"><span class="ref-close" data-dcnode-id="2794" tabindex="0"></span><span data-dcnode-id="2793" instrument_node="">16 John Worne, Language learning in the UK: ‘can’t, won’t, don’t’, </span><i data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">The Telegraph</span></i><span data-dcnode-id="2790" instrument_node="">, (27 January 2015), </span><a class="ext-link" data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.telegraph.co.uk/education/educationopinion/11369703/Language-learning-in-the-UK-cant-wont-dont.html" target="_blank"><span data-dcnode-id="2789" instrument_node="">http://www.telegraph.co.uk/education/educationopinion/11369703/Language-learning-in-the-UK-cant-wont-dont.html</span></a><span data-dcnode-id="2787" instrument_node=""> (accessed 1 April 2016).</span><a class="frontnotes" data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2782" instrument_node=""> Director of Strategy at the British Council, used ‘can’t, won’t, don’t’ to sum up the British national view on speaking foreign languages. This was confirmed by responses received from the interviewees: UKLH2 commented that ‘Chinese is not yet a language popular enough that would automatically attract students to learn, actually, it still has the reputation of one of the hardest languages to learn’. Therefore, in UKSC5’s words, ‘trips to China are the “appetiser”, culture is the “main course”, and language teaching is the “side order”’.</span></p><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Unlike SK, study tours to China are the highlight event for all the other CIs interviewed. They all mentioned the visitors’ excitement or even shock to see ‘the real’ China with their own eyes compared to their imaginative impressions, which serves the very purpose of the CI as enunciated by UKLH3: </span></p><div class="quote" data-dcnode-id="2776"><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">When the CI can offer opportunities like this to someone who does not have much expectation, or even some negative expectations of China, to see China with his own eyes and see the difference from media image, Hanban has already achieved its initial purpose. They gain one more person who likes China and wants to speak for China.</span></p></div><p data-dcnode-id="2775"></p><p data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">UKSC2’s remarks explained the ‘radiation effect’ this can generate: ‘then the CI can invite them as guest speakers as the effects are much better than a Chinese speaker. They are not blowing trumpets for China like propaganda, but have a very fair tone’.</span></p><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">The above appears to reveal a pattern of ‘one mission statement, two different priorities’ delivered by the CIs in different destinations: regional differences are clear and allow for localised priorities: language teaching is the core function of the CIs in the East Asian cultural sphere like SK, where traditional China enjoys a very respectable culture image and modern China offers new opportunities; while in Western countries like the UK and US, where vestiges of Orientalism and the Cold War mentality are amplified by the distances in culture and space, Chinese cultural introduction and enhancing local people’s understanding of contemporary China is given more weighting, with trips to China as a particularly effective tool.</span></p><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">While this section shows that the CI’s ability to localise its product to adapt and meet different needs of the target audiences should be the IV, it also reveals other EVs involved in this process that resulted in the ‘two different priorities’. They will be examined in the sections below.</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="2475" id="S0003-S2002"><h3 class="section-heading-3" data-dcnode-id="2766" id="_i7"><span data-dcnode-id="2767" instrument_node="">See China and read China: first-hand knowledge vs. third-hand stories</span></h3><p data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">The study tours and scholarships for university students to learn China first hand may be an effective remedy in relieving the symptoms of holding misperceptions of China, but it does not address the root cause for such misperceptions, which needs to be understood in where do people get their pre-perceptions from. The example below from the author’s direct observation shows how deeply-embedded pre-perceptions can be.</span></p><p data-dcnode-id="2740"><span data-dcnode-id="2763" instrument_node="">In a talk about </span><i data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">China, the New Land of Opportunities</span></i><span data-dcnode-id="2760" instrument_node=""> given to a local British high school, the CI teacher asked if any students in the audience have been to China before, only one raised his hand. So the teacher said she would show them a two-minute video clip first called </span><i data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">China China</span></i><span data-dcnode-id="2757" instrument_node="">,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2745"><a data-dcnode-id="2754" data-reflink="fn" data-rid="FN0017" href="#"><sup data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">17</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2746"><span class="ref-close" data-dcnode-id="2753" tabindex="0"></span><span data-dcnode-id="2752" instrument_node="">17 China China, published on Youtube on November, 18, 2009, </span><a class="ext-link" data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D_etl_qkelX0" target="_blank"><span data-dcnode-id="2751" instrument_node="">https://www.youtube.com/watch?v=_etl_qkelX0</span></a><span data-dcnode-id="2749" instrument_node=""> (accessed 5 May 2016).</span><a class="frontnotes" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2744" instrument_node=""> and then asked students to share their impressions of China with some key words after watching it. There is only one-word narrative ‘China’ in the video, repeating itself numerous times throughout the video with thousands of different snapshots from China, from varied landscapes to a wide variety of wild animals, from diverse food to different ethnic groups, wearing different costumes and following different life styles in rural and urban China, the message is quite strong and clear: This is </span><i data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">all</span></i><span data-dcnode-id="2741" instrument_node=""> China, a country of vast diversity. Yet, when the floor was given to students, the first answer (not from the one who has been to China before) of the key word was ‘communism’. Even the British teacher at present was surprised: where did he get that from? There is not even a glimpse of red flag during the video, nor any images of Chinese leaders or government.</span></p><p data-dcnode-id="2683"><span data-dcnode-id="2739" instrument_node="">So where do people get pre-perceptions from? As pointed out by Morley and Robins, ‘we are all largely dependent on the media for our images of non-local people, places, and events, and the further the “event” from our own direct experiences, the more we depend on media images for the totality of our knowledge’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2727"><a data-dcnode-id="2736" data-reflink="fn" data-rid="FN0018" href="#"><sup data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">18</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2728"><span class="ref-close" data-dcnode-id="2735" tabindex="0"></span><span data-dcnode-id="2734" instrument_node="">18 David Morley and Kevin Robins, </span><i data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Spaces of Identity, Global Media, Electronic Landscapes and Cultural Boundaries</span></i><span data-dcnode-id="2731" instrument_node=""> (London: Routledge, 1995), p. 133.</span><a class="frontnotes" data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2726" instrument_node=""> Manzenreiter simply attributes the responsibility for people’s misperception to the mainstream media that ‘rather than preparing the space for a dialectic exploration of alternative modes and views, the media contribute to the reinforcing of national stereotypes’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2714"><a data-dcnode-id="2723" data-reflink="fn" data-rid="FN0019" href="#"><sup data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">19</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2715"><span class="ref-close" data-dcnode-id="2722" tabindex="0"></span><span data-dcnode-id="2721" instrument_node="">19 Wolfram Manzenreiter, ‘The Beijing Games in the Western Imagination of China: The Weak Power of Soft Power’, </span><i data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Journal of Sport and Social Issues</span></i><span data-dcnode-id="2718" instrument_node=""> 34(1), (2010), pp. 29–48.</span><a class="frontnotes" data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2713" instrument_node=""> This can be seen from the common examples given in the interviews that even when people visit China, they tend to look for the more ‘backward’ side as the ‘real’ China that fits the stereotypes, despite that everything they see with their own eyes is already the real China. For example, UKD1 said the highlight of the trip to China was ‘nights out on a bicycle to local areas’; a similar example was given by Hubbert in her recounts of the ‘Chinese Bridge Summer Camp’ that ‘the night market with snacking on unidentified creatures roasted on a stick’ was what they perceived to be a ‘form of Chinese authenticity’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2698"><a data-dcnode-id="2710" data-reflink="fn" data-rid="FN0020" href="#"><sup data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">20</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2699"><span class="ref-close" data-dcnode-id="2709" tabindex="0"></span><span data-dcnode-id="2708" instrument_node="">20 Jennifer Hubbert, ‘The anthropology of Confucius Institute’, </span><i data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Society of East Asian Anthropology</span></i><span data-dcnode-id="2705" instrument_node="">, (5 May 5 2014), </span><a class="ext-link" data-dcnode-id="2703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//seaa.americananthro.org/2014/05/the-anthropology-of-confucius-institutes/" target="_blank"><span data-dcnode-id="2704" instrument_node="">http://seaa.americananthro.org/2014/05/the-anthropology-of-confucius-institutes/</span></a><span data-dcnode-id="2702" instrument_node=""> (accessed 1 September 2017).</span><a class="frontnotes" data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2697" instrument_node=""> Another British student commented that he found ‘Beijing not as tense politically as imagined: I am not being watched, I can go to places freely and talk to people on the street freely’. These accounts and the ossified image of a communist China planted in that student’s mind show the impact produced by Western media which ‘arrogates to themselves the right to represent all non-Western Others, and thus to provide “us” with the definitions by which “we” distinguish ourselves from ‘them’”.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2685"><a data-dcnode-id="2694" data-reflink="fn" data-rid="FN0021" href="#"><sup data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">21</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2686"><span class="ref-close" data-dcnode-id="2693" tabindex="0"></span><span data-dcnode-id="2692" instrument_node="">21 David Morley and Kevin Robins, </span><i data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">Spaces of Identity, Global Media, Electronic Landscapes and Cultural Boundaries</span></i><span data-dcnode-id="2689" instrument_node=""> (London: Routledge, 1995), p. 134.</span><a class="frontnotes" data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2684" instrument_node=""> </span></p><p data-dcnode-id="2646"><span data-dcnode-id="2682" instrument_node="">Willnat and Metzgar’s</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2670"><a data-dcnode-id="2679" data-reflink="fn" data-rid="FN0022" href="#"><sup data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">22</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2671"><span class="ref-close" data-dcnode-id="2678" tabindex="0"></span><span data-dcnode-id="2677" instrument_node="">22 Lars Willnat and Emily Metzgar, ‘American Perceptions of China and the Chinese: Do the media matter?’ Paper presented at the 65th Annual Meeting of the World Association for Public Opinion Research, Hong Kong, (June 2012), </span><a class="ext-link" data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wapor2012.hkpop.hk/doc/papers/ConcurrentSessionsI/IB/IB-3.pdf" target="_blank"><span data-dcnode-id="2676" instrument_node="">https://wapor2012.hkpop.hk/doc/papers/ConcurrentSessionsI/IB/IB-3.pdf</span></a><span data-dcnode-id="2674" instrument_node=""> (accessed 1 October 2015).</span><a class="frontnotes" data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2669" instrument_node=""> research on ‘</span><i data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">American Perceptions of China and the Chinese: Do the Media Matter?</span></i><span data-dcnode-id="2666" instrument_node="">’ is based on the content analysis of 886 news stories about China published in the </span><i data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">New York Times</span></i><span data-dcnode-id="2663" instrument_node=""> throughout 2010 and a national online survey conducted in early 2011. The findings show significant associations between respondents’ media use and their views of China’s economic, political and military power. Their findings generally support the assumption that the American public is influenced primarily by media agenda setting and framing processes, and that ‘respondents with more news exposure hold more negative perceptions of Chinese foreign and economic policies’. Another similar research done by a Chinese scholar Zhang</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2648"><a data-dcnode-id="2660" data-reflink="fn" data-rid="FN0023" href="#"><sup data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">23</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2649"><span class="ref-close" data-dcnode-id="2659" tabindex="0"></span><span data-dcnode-id="2658" instrument_node="">23 Jian Zhang, Meiguo zhuliu meiti shehua baodao fenxi [China-related report analysis in American main stream media], </span><i data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Guoji Guancha [International Review]</span></i><span data-dcnode-id="2655" instrument_node=""> 1, (2007), </span><a class="ext-link" data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rcgpoc.shisu.edu.cn/c1/d4/c3504a49620/page.htm" target="_blank"><span data-dcnode-id="2654" instrument_node="">http://www.rcgpoc.shisu.edu.cn/c1/d4/c3504a49620/page.htm</span></a><span data-dcnode-id="2652" instrument_node=""> (accessed 30 May 2015).</span><a class="frontnotes" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2647" instrument_node=""> undertook a thorough analysis of the China-related reports in American mainstream media outlets including the NYT, Washington Post, Los Angeles Time and CNN, also found that the US press seldom constructed a favourable image of China, they tend to adopt a negative angle even in reporting developments achieved in China, such as the Olympic successes or breakthroughs China made in exploring outer space, the reporting is persistently constructed in an anti-communist frames and Cold War mentality.</span></p><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">This is supported by the author’s interview findings, for example, UKSC2 commented that: ‘for foreigners who have never been to China, their impression of the country is the one conveyed by the media, which is often tarnished in many countries’. As UKD1 put it: </span></p><div class="quote" data-dcnode-id="2641"><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Some people based their whole understanding of China on the only book they’ve read—Wild Swans; as for contemporary China, again, they based their knowledge on the one media report they’ve read or watched—about China’s environmental problems.</span></p></div><p data-dcnode-id="2640"></p><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">UKLH1 elaborated this with an example: </span></p><div class="quote" data-dcnode-id="2635"><p data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Most people in the local community have a completely outdated knowledge and understanding about China, their image of China is a country where farmers work in the field everywhere with no modern buildings and modern lifestyle, very poor and backward. What is even worse is those who have never been to China but thought they knew a lot about China. Most of their perceptions of China are based on media reports, such as about China’s one child policy and child trafficking, Tibet riots, etc, and use this as their judgement of the whole country.</span></p></div><p data-dcnode-id="2634"></p><p data-dcnode-id="2619"><span data-dcnode-id="2633" instrument_node="">According to Kunczik,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2621"><a data-dcnode-id="2630" data-reflink="fn" data-rid="FN0024" href="#"><sup data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">24</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2622"><span class="ref-close" data-dcnode-id="2629" tabindex="0"></span><span data-dcnode-id="2628" instrument_node="">24 Joshua Kurlantzick, </span><i data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Charm Offensive: How China’s Soft Power is Transforming the World</span></i><span data-dcnode-id="2625" instrument_node=""> (Cambridge MA: Yale University Press, 2007).</span><a class="frontnotes" data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2620" instrument_node=""> mass media and cultural exchange programs are the two strongest image shapers that influence public perceptions of a country in the modern world today. In terms of China, they work well hand-in-hand in most of the Asian countries, while in Western countries such as the UK and US, where fewer people benefit from direct experience in visiting China, both the geographical and cultural distances can expand the gap between first-hand knowledge and third-hand stories. Even when presented with an ‘air of authority’ such as mainstream media, and even when the reporter is reporting live or write the report in-situ, the audience can only see or read what is edited (intentionally or unintentionally) by the reporter, thus can be best classed as second-hand information, while editorials written by commentators with second-hand information can only be taken as ‘stories’ that may not enable the audience to get to know the whole truth. This is why UKD3 believed that ‘China is a much misunderstood country’, and the CI’s role is to ‘show them a China that is not shown in local media’, and ‘to provide a window into China, for those who would otherwise live with their prejudices and ignorance with China’. This was elaborated by UKLH3 who works in a different CI: </span></p><div class="quote" data-dcnode-id="2616"><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">In advanced class, all our students have been to China, they are able to understand China in the Chinese way and more willing to accept the difference, and they would express the difference in a more respectable way. If people do not have the knowledge, they tend to take the opposite stand……Therefore, the scholarship we offer is a great thing, for foreigners to study and stay in China for a period of time. No matter how much we try to teach, or tell them about China here, it will never match the first-hand experience. After having a positive experience of China, the students would come back to talk up China, no need for us to make a painstaking effort. It is much more convincing than what we want to feed their mind.</span></p></div><p data-dcnode-id="2615"></p><p data-dcnode-id="2581"><span data-dcnode-id="2614" instrument_node="">However, research about the CI-related reports in the </span><i data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">New York Times</span></i><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2596"><a data-dcnode-id="2608" data-reflink="fn" data-rid="FN0025" href="#"><i data-dcnode-id="2609"><sup data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">25</span></sup></i></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2597"><span class="ref-close" data-dcnode-id="2607" tabindex="0"></span><span data-dcnode-id="2606" instrument_node="">25 Yi Liu, ’Guojia wenhua shiyu xia de shehua yunlun yanjiu, yi Niuyue Shibao dui Kongzi Xueyuan baodao de neirong weili’ [Research on China-related media from the perspective of national cultural security—a case study of Confucius Institute Reports in New York Times], </span><i data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Xueshu Jiaoliu</span></i><span data-dcnode-id="2603" instrument_node=""> [</span><i data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Academic Exchange</span></i><span data-dcnode-id="2600" instrument_node="">] 4, (2014), pp. 202–05.</span><a class="frontnotes" data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2595" instrument_node=""> found that 35.3% reports were negative, 31.4% were neutral and 27.5% were positive, which is on the whole consistent with Li &amp; Dai’s</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2583"><a data-dcnode-id="2592" data-reflink="fn" data-rid="FN0026" href="#"><sup data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">26</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2584"><span class="ref-close" data-dcnode-id="2591" tabindex="0"></span><span data-dcnode-id="2590" instrument_node="">26 Kaisheng Li and Zhangzheng Dai, ‘Evaluation of Confucius Institute’s Media Environment in the US’, </span><i data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">World Economy and Politics</span></i><span data-dcnode-id="2587" instrument_node=""> 7, (2011), pp. 76–93.</span><a class="frontnotes" data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2582" instrument_node=""> research about the overall American media environment for the CI, sampling 33 media including newspapers, journals, TV, radio and websites, and concluded that 50% were negative reports, 15% were neutral and 35% were positive. There are many examples of selective news reports and selective interviews, even when there are people-in-the-know available with important first-hand experience of the CI, they are not fully engaged with as the media report can be an attempt to exploit pre-established assumptions.</span></p><p data-dcnode-id="2541"><span data-dcnode-id="2580" instrument_node="">In comparison, there were also similar researches done in SK both concerning China-related media coverage and CI-related specifically. One study was carried out in 2005 by Yoo,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2565"><a data-dcnode-id="2577" data-reflink="fn" data-rid="FN0027" href="#"><sup data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">27</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2566"><span class="ref-close" data-dcnode-id="2576" tabindex="0"></span><span data-dcnode-id="2575" instrument_node="">27 Yoo-hee Yoo, ‘</span><i data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">China News in Korean Media’, National Taiwan University Institutional Repository</span></i><span data-dcnode-id="2572" instrument_node="">, (27 November 2007), </span><a class="ext-link" data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ntur.lib.ntu.edu.tw/handle/246246/58325" target="_blank"><span data-dcnode-id="2571" instrument_node="">http://ntur.lib.ntu.edu.tw/handle/246246/58325</span></a><span data-dcnode-id="2569" instrument_node=""> (accessed 13 November 2015).</span><a class="frontnotes" data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2564" instrument_node=""> who analysed 632 randomly selected articles from one of the major Korean newspapers, </span><i data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Joong Ang Ilbo</span></i><span data-dcnode-id="2561" instrument_node="">, from January 2000 to November 2004, just before the first CI was set up. The study found that overall attitude of the newspaper towards China were neutral (54.7%), but 33.3% remained unfavourable. Another study done by Xu</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2549"><a data-dcnode-id="2558" data-reflink="fn" data-rid="FN0028" href="#"><sup data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">28</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2550"><span class="ref-close" data-dcnode-id="2557" tabindex="0"></span><span data-dcnode-id="2556" instrument_node="">28 Yulan Xu, ‘Hanguo meiti zhong de Zhongguo guojia xingxiang, yi Chaoxian Ribao weili’ [China’s national image in Korean media, a case study of Chosun IIbo], Renmin Wang [People’s Daily online]， (23 November 2010), </span><a class="ext-link" data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//media.people.com.cn/GB/22114/206896/207970/13294052.html" target="_blank"><span data-dcnode-id="2555" instrument_node="">http://media.people.com.cn/GB/22114/206896/207970/13294052.html</span></a><span data-dcnode-id="2553" instrument_node=""> (accessed 18 October 2015).</span><a class="frontnotes" data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2548" instrument_node=""> focused on a case study of </span><i data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Chosun Ilbo</span></i><span data-dcnode-id="2545" instrument_node=""> from 2007 to 2008 and found that of the China-related reports, 59.4% were neutral and 20.5% were favourable, in other words, 79.9% of the reports were not negative, showing an overall friendly media environment towards China. In January 2015, a seven-episode documentary </span><i data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Super China</span></i><span data-dcnode-id="2542" instrument_node=""> was aired by KBS TV in SK, which completely shook China: even the Chinese media could not believe this was made by a ‘foreign media’: instead of showing the dark side of China ridden with environmental and human rights issues, it projected the ‘superness’ of China in a very positive light, so positive that many Chinese audiences commented that it had done a better job than China’s own central television CCTV.</span></p><p data-dcnode-id="2526"><span data-dcnode-id="2540" instrument_node="">In the specific CI-related media research, Jin sampled five mainstream newspapers and three TV channels, namely KBS, MBC and SBS,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2528"><a data-dcnode-id="2537" data-reflink="fn" data-rid="FN0029" href="#"><sup data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">29</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2529"><span class="ref-close" data-dcnode-id="2536" tabindex="0"></span><span data-dcnode-id="2535" instrument_node="">29 Xianggui Jin, ‘Hanguo meiti Guanyu Kongzi Xueyuan de baodao yu pinglun’ [Media reports and commentaries concerning the Confucius Institutes in South Korea], In Zhang Lihua, ed.; Zhongguo Wenhua yu Waijiao, [</span><i data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Chinese Culture and Diplomacy</span></i><span data-dcnode-id="2532" instrument_node="">] (Beijing: zhishi chanquan chubanshe, 2013).</span><a class="frontnotes" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2527" instrument_node=""> and collected their reports of the CIs from November 2004 to November 2012. Jin’s research found that: </span></p><div class="quote" data-dcnode-id="2523"><p data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Owing to the far-reaching influence of Confucian thoughts in South Korea, and the homogeneous nature of Confucian culture in Korean society, the fact that the CI was identified as a tool of enhancing Chinese soft power did not lead to more criticisms or oppositions of it; instead, they are more focused on the revelations this may have for South Korea.</span></p></div><p data-dcnode-id="2522"></p><p data-dcnode-id="2478"><span data-dcnode-id="2521" instrument_node="">It is thus not surprising that the 2015 Pew reports has found that ‘overall, despite historical and territorial frictions, Asia-Pacific publics tend to view their regional neighbours in a positive light’, and ‘Asia-Pacific views of China are far more positive than the perception held by Americans’.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2509"><a data-dcnode-id="2518" data-reflink="fn" data-rid="FN0030" href="#"><sup data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">30</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2510"><span class="ref-close" data-dcnode-id="2517" tabindex="0"></span><span data-dcnode-id="2516" instrument_node="">30 Pew Research Centre, ‘How Asia-Pacific Publics See Each Other and Their National Leaders’ (2015), </span><a class="ext-link" data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewglobal.org/2015/09/02/how-asia-pacific-publics-see-each-other-and-their-national-leaders/" target="_blank"><span data-dcnode-id="2515" instrument_node="">http://www.pewglobal.org/2015/09/02/how-asia-pacific-publics-see-each-other-and-their-national-leaders/</span></a><span data-dcnode-id="2513" instrument_node=""> (accessed 3 May 2016).</span><a class="frontnotes" data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2508" instrument_node=""> This shows different media environments in different destinations function as one of the EVs that justify the different foci at different CIs: more on language teaching in East Asia as the historical connection and cultural influence, geographical vicinity and people exchange help achieve the aim of enhancing mutual understandings; while in Western countries such as the UK and US, a better understanding of China and Chinese culture is considered as important as, if not more than mastering its language, and offering first-hand knowledge is used as an effective tool to combat third hand media bias. This helps explain the uneven distribution of CIs all over the world: 110 in the US (No. 1 in the world) and 29 in the UK (No. 1 in Europe), while 649 out of the 1113 Confucius Classrooms (over 58%) in the whole world are located in these two countries alone.</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2493"><a data-dcnode-id="2505" data-reflink="fn" data-rid="FN0031" href="#"><sup data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">31</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2494"><span class="ref-close" data-dcnode-id="2504" tabindex="0"></span><span data-dcnode-id="2503" instrument_node="">31 About the Confucius Institute/Confucius Classroom, </span><i data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Hanban website</span></i><span data-dcnode-id="2500" instrument_node="">, (2017), </span><a class="ext-link" data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hanban.edu.cn/confuciousinstitutes/node_10961.htm" target="_blank"><span data-dcnode-id="2499" instrument_node="">http://www.hanban.edu.cn/confuciousinstitutes/node_10961.htm</span></a><span data-dcnode-id="2497" instrument_node=""> (accessed 24 May 2018).</span><a class="frontnotes" data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2492" instrument_node=""> In contrast, in the whole of Asia (118 CIs and 101 Confucius classrooms in total) where the demand for Chinese language learning is arguably stronger, and the whole of Africa (54 CIs and 30 Confucius Classrooms in total) where the demand for Hanban funding in expanding Chinese provision is arguably stronger, their stronger desire and interest only made them less prioritised target destinations of the CI, because the Chinese government wants to use the CI to ‘correct misunderstandings of China’,</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2480"><a data-dcnode-id="2489" data-reflink="fn" data-rid="FN0032" href="#"><sup data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">32</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2481"><span class="ref-close" data-dcnode-id="2488" tabindex="0"></span><span data-dcnode-id="2487" instrument_node="">32 Joe Tin-yau Lo and Suyan Pan, ‘Confucius Institutes and China’s soft power: practices and paradoxes’, </span><i data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Compare: A Journal of Comparative and International Education</span></i><span data-dcnode-id="2484" instrument_node=""> 46(4), (2016), pp. 512–32.</span><a class="frontnotes" data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2479" instrument_node=""> which are more prevalent in those areas dominated by Western media.</span></p><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">This section discusses the media’s role as an EV in shaping or even solidifying people’s pre-perceptions, thus affecting the media environment where the CI operates in, but what underpins the media framing? The next section will probe it further to trace the root cause by revealing another EV.</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="2383" id="S0003-S2003"><h3 class="section-heading-3" data-dcnode-id="2473" id="_i8"><span data-dcnode-id="2474" instrument_node="">Culture and ideology, the two entangled ‘Otherness’</span></h3><p data-dcnode-id="2458"><span data-dcnode-id="2472" instrument_node="">As discussed above, the media influence means communism still appears to be the lens that China is envisioned today. Compared with the line of ‘cultural superiority and inferiority’ carved by Orientalism, more antagonist camps of ‘friends or enemies’ were created by communism, which was thought to be the other end of binary opposition to freedom and democracy, thus resulted in China being regarded as the ‘ideological other’ based on the perpetuated polarisation mind-set. China’s cultural diplomacy tries to serve the purpose of reshaping China’s image away from being the ‘cultural other’ and ‘ideological other’, but the CI is meant to only focus on the cultural dimension as specified in its mission statement. However, the mixed nature of culture and ideology in that the latter is ‘part of culture which is actively concerned with the establishment and defence of patterns of belief and value’</span><span class="ref-lnk fn-ref-lnk lazy-ref" data-dcnode-id="2460"><a data-dcnode-id="2469" data-reflink="fn" data-rid="FN0033" href="#"><sup data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">33</span></sup></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2461"><span class="ref-close" data-dcnode-id="2468" tabindex="0"></span><span data-dcnode-id="2467" instrument_node="">33 Lloyd Fallers, ‘Ideology and Culture in Uganda Nationalism’, </span><i data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">American Anthropologist</span></i><span data-dcnode-id="2464" instrument_node=""> 3(4), (1961), p. 677.</span><a class="frontnotes" data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">View all notes</span></a></span></span><span data-dcnode-id="2459" instrument_node=""> has rendered the two ‘Otherness’ of China a complex whole over time, making its separation a one-sided wishful thinking. For example, UKD4 stated that ‘our understanding of the name Confucius is purely cultural-related, but in the West, it was interpreted as ideological infiltration, and that means brainwash’. UKD2 used himself as an example to retort such assumption: </span></p><div class="quote" data-dcnode-id="2455"><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">I do not think the CI is trying to sell political ideology, I myself am not even a Communist party member. It is not listed as a criterion to select the CI directors or teachers. What we want to do is cultural promotion, and in today’s information era, it is impossible to brainwash people, local people have full access to a wealth of information.</span></p></div><p data-dcno
