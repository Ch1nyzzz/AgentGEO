ic Landmarks</span></a></div><div class="TagStyle-sc-4thzfa-1 hlgewP" data-dcnode-id="1724"><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/blog/tag-world-heritage-sites-2603/" title="World Heritage Sites"><span data-dcnode-id="1726" instrument_node=""># World Heritage Sites</span></a></div><div class="TagStyle-sc-4thzfa-1 hlgewP" data-dcnode-id="1721"><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/blog/tag-beijing-2807/" title="Beijing"><span data-dcnode-id="1723" instrument_node=""># Beijing</span></a></div></div><div class="gl-travelogue-detail_user" data-dcnode-id="1712"><div class="gl-travelogue-detail_user-pic" data-dcnode-id="1718"><div data-dcnode-id="1719" style="background-image:url(https://ak-d.tripcdn.com/images/a20p1700000114jbr1611_C_30_30_R5.jpg_.webp)"></div></div><div class="gl-travelogue-detail_user-other" data-dcnode-id="1713"><div class="gl-travelogue-detail_user-name" data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">TripBlog</span></div><span class="gl-travelogue-detail_user-date" data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Oct 23, 2019</span></span></div></div><div class="gl-travelogue-detail_article" data-dcnode-id="1315"><div class="ContentStyle-sc-2ijhpf-0 hhbgiH" data-dcnode-id="1316"><div class="text" data-dcnode-id="1701" id="174969172"><p class="" data-dcnode-id="1702"><span data-dcnode-id="1703" style="font-size:10ptpx"><span data-dcnode-id="1704" style="color:#000000"><span data-dcnode-id="1705" style="background-color:#ffffff"><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing-1/" target="_top"><span data-dcnode-id="1711" instrument_node="">Beijing</span></a><span data-dcnode-id="1709" instrument_node=""> is the capital of </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/china-110000/" target="_top"><span data-dcnode-id="1708" instrument_node="">China,</span></a><span data-dcnode-id="1706" instrument_node=""> a high-tech, Asian country. This city has a profound history of about 230,000 to 250,000 years and one of the oldest cities in the world. You can see modern as well as traditional architecture in this city. For the past eight centuries, Beijing is the political center of China. Even today, it serves as a political headquarters and cultural center of the country. </span></span></span></span></p></div><div class="Text-v2qg92-1 kjMOeL catalog-list" data-dcnode-id="1665"><p class="text" data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Contents</span></p><ul class="catalog-list-wrapper" data-dcnode-id="1666"><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1696"><span class="ellipsis" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Yonghe Temple</span></span></li><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1693"><span class="ellipsis" data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Prince Gong's Mansion</span></span></li><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1690"><span class="ellipsis" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Ming Tombs</span></span></li><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1687"><span class="ellipsis" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Old Summer Palace</span></span></li><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1684"><span class="ellipsis" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Confucius Temple and The Imperial College Museum</span></span></li><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1681"><span class="ellipsis" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Forbidden City</span></span></li><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1678"><span class="ellipsis" data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Jingshan Park</span></span></li><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1675"><span class="ellipsis" data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Temple of Heaven</span></span></li><li class="MainWrap-v2qg92-0 cGeNcH" data-dcnode-id="1672"><span class="ellipsis" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Bell and Drum Tower</span></span></li><div class="show-more" data-dcnode-id="1667" role="button" tabindex="0"><p class="more-text" data-dcnode-id="1668"><span data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Show More</span></span><i class="up" data-dcnode-id="1669"></i></p></div></ul></div><div class="text" data-dcnode-id="1659" id="174969173"><p class="" data-dcnode-id="1660"><span data-dcnode-id="1661" style="font-size:10ptpx"><span data-dcnode-id="1662" style="color:#000000"><span data-dcnode-id="1663" style="background-color:#ffffff"><span data-dcnode-id="1664" instrument_node="">Beijing plays an important role in the world's economic network and hence known as a global power city. It is one of the leading centers for culture, business, economics, politics, education, language, diplomacy and science, and technology. </span></span></span></span></p></div><div class="text" data-dcnode-id="1653" id="174969174"><p class="" data-dcnode-id="1654"><span data-dcnode-id="1655" style="font-size:10ptpx"><span data-dcnode-id="1656" style="color:#000000"><span data-dcnode-id="1657" style="background-color:#ffffff"><span data-dcnode-id="1658" instrument_node="">The city offers a long list of things to do in Beijing, such as visiting luxurious palaces, ancient temples, tombs, walls, gates, and walking around the beautiful parks and garden. There are hundreds of popular places that are worth visiting, but it is not possible to tour all of them in one go. With our picked list of best things to do in Beijing, you can cover all the major places and know about the culture and tradition of this vibrant city. </span></span></span></span></p></div><div class="text" data-dcnode-id="1647" id="174969175"><h2 data-dcnode-id="1648"><span data-dcnode-id="1649" style="font-size:10ptpx"><span data-dcnode-id="1650" style="color:#000000"><span data-dcnode-id="1651" style="background-color:#ffffff"><span data-dcnode-id="1652" instrument_node="">Yonghe Temple</span></span></span></span></h2></div><div class="text" data-dcnode-id="1639" id="174969176"><p class="" data-dcnode-id="1640"><span data-dcnode-id="1641" style="font-size:10ptpx"><span data-dcnode-id="1642" style="color:#000000"><span data-dcnode-id="1643" style="background-color:#ffffff"><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing/yonghe-temple-76599/" target="_top"><span data-dcnode-id="1646" instrument_node="">Yonghe Temple</span></a><span data-dcnode-id="1644" instrument_node="">, a place regarded for peace and harmony, is also known as the Lama Temple or the Yonghe Lamasery. This is a temple and monastery located in the Dongcheng district of Beijing. During the Qing Dynasty of China, in 1694, the construction work of the building started. Since then, it was used for many different purposes and finally closed 1949 for almost 32 years. It was opened to the public in 1981, and now it is one of the most visited temples by locals as well as visitors and highly popular tourist attractions of Beijing. </span></span></span></span></p></div><div class="text" data-dcnode-id="1633" id="174969177"><p class="" data-dcnode-id="1634"><span data-dcnode-id="1635" style="font-size:10ptpx"><span data-dcnode-id="1636" style="color:#000000"><span data-dcnode-id="1637" style="background-color:#ffffff"><span data-dcnode-id="1638" instrument_node="">In the building and artworks of the temple, you can see a great influence of Tibetan and Han Chinese style. Each section of the temple has a specific name, and you can visit them one by one. Courtyards separate all these halls. The Hall of Harmony and Peace is the entrance to all the four halls and the main building of the temple. Visit this place to see different kinds of artworks. You cannot miss taking a tour of the highly popular tourist attractions of any city, so add this place in your things to do in Beijing list and enjoy your trip. </span></span></span></span></p></div><div class="text" data-dcnode-id="1627" id="174969178"><p class="" data-dcnode-id="1628"><span data-dcnode-id="1629" style="font-size:10ptpx"><span data-dcnode-id="1630" style="color:#000000"><span data-dcnode-id="1631" style="background-color:#ffffff"><span data-dcnode-id="1632" instrument_node="">It opens every day (Monday to Sunday) from 9 am to 5 pm. But the closing time differs according to the season. In the summer season, it remains open for an extra 30 minutes. So, it is advisable to check the opening and closing time before you are leaving for the Yonghe temple. </span></span></span></span></p></div><div class="text" data-dcnode-id="1621" id="174969179"><p class="" data-dcnode-id="1622"><span data-dcnode-id="1623" style="font-size:10ptpx"><span data-dcnode-id="1624" style="color:#000000"><span data-dcnode-id="1625" style="background-color:#ffffff"><span data-dcnode-id="1626" instrument_node="">Address: 12 Yonghegong St, Dongcheng, China, 100007 </span></span></span></span></p></div><div class="text" data-dcnode-id="1615" id="174969180"><h2 data-dcnode-id="1616"><span data-dcnode-id="1617" style="font-size:10ptpx"><span data-dcnode-id="1618" style="color:#000000"><span data-dcnode-id="1619" style="background-color:#ffffff"><span data-dcnode-id="1620" instrument_node="">Prince Gong's Mansion</span></span></span></span></h2></div><div class="text" data-dcnode-id="1604" id="174969181"><p class="" data-dcnode-id="1605"><span data-dcnode-id="1606" style="font-size:10ptpx"><span data-dcnode-id="1607" style="color:#000000"><span data-dcnode-id="1608" style="background-color:#ffffff"><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing/prince-gong-s-mansion-76613/" target="_top"><span data-dcnode-id="1614" instrument_node="">Prince Gong's Mansion </span></a><span data-dcnode-id="1612" instrument_node="">is another famous tourist attraction in Beijing located in the north of the </span><a class="keyword_link" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.trip.com/travel-guide/attraction/beijing/shichahai-100947/"><span data-dcnode-id="1611" instrument_node="">Shichahai</span></a><span data-dcnode-id="1609" instrument_node=""> lake in Xicheng district. Prince Gong's Mansion is a museum which is also known as the Prince Kung Mansion. This is one of the best-preserved imperial mansions of the city spread over a total area of 60,000 square meters. This place has served as homes to many royal families. </span></span></span></span></p></div><div class="text" data-dcnode-id="1598" id="174969182"><p class="" data-dcnode-id="1599"><span data-dcnode-id="1600" style="font-size:10ptpx"><span data-dcnode-id="1601" style="color:#000000"><span data-dcnode-id="1602" style="background-color:#ffffff"><span data-dcnode-id="1603" instrument_node="">In the complex of the mansion building, you will get to see several courtyards, a grand Peking opera house, and two-story buildings. In some of the courtyards, you will see a temporary art exhibition while some of them exhibit a permanent museum showcasing the history of the mansion. You will see a beautiful garden near the complex which is surrounded by artificial mountains. This place offers a lot of cultural things. Even local people of china visit this place with their families, especially kids. You might find this place a little crowdy on weekends, so plan accordingly. Add this place in your things to do in Beijing list and have lots of fun. </span></span></span></span></p></div><div class="text" data-dcnode-id="1592" id="174969183"><p class="" data-dcnode-id="1593"><span data-dcnode-id="1594" style="font-size:10ptpx"><span data-dcnode-id="1595" style="color:#000000"><span data-dcnode-id="1596" style="background-color:#ffffff"><span data-dcnode-id="1597" instrument_node="">There are two seasons to visit this place; On-season and off-season. In on-season (April 1 - October 31), the mansion opens from 8 am to 5 pm, and in the off-season (November 1 - March 31), it opens from 9 am to 4 pm. </span></span></span></span></p></div><div class="text" data-dcnode-id="1586" id="174969184"><p class="" data-dcnode-id="1587"><span data-dcnode-id="1588" style="font-size:10ptpx"><span data-dcnode-id="1589" style="color:#000000"><span data-dcnode-id="1590" style="background-color:#ffffff"><span data-dcnode-id="1591" instrument_node="">Address: 17 Qianhai W St, Shi Cha Hai, Xicheng, Beijing, China </span></span></span></span></p></div><div class="text" data-dcnode-id="1584" id="174969185"><img alt="Top 11 Must-See Attractions in Beijing" data-dcnode-id="1585" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ak-d.tripcdn.com/images/100f190000017cb52104D_Z_320_10000_R5.jpg_.webp&amp;raw" width="320"></div><div class="text" data-dcnode-id="1578" id="174969186"><h2 data-dcnode-id="1579"><span data-dcnode-id="1580" style="font-size:10ptpx"><span data-dcnode-id="1581" style="color:#000000"><span data-dcnode-id="1582" style="background-color:#ffffff"><span data-dcnode-id="1583" instrument_node="">Ming Tombs</span></span></span></span></h2></div><div class="text" data-dcnode-id="1570" id="174969187"><p class="" data-dcnode-id="1571"><span data-dcnode-id="1572" style="font-size:10ptpx"><span data-dcnode-id="1573" style="color:#000000"><span data-dcnode-id="1574" style="background-color:#ffffff"><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/changping-district/ming-tombs-75600/" target="_top"><span data-dcnode-id="1577" instrument_node="">Ming tombs</span></a><span data-dcnode-id="1575" instrument_node=""> reflect the work, art, architecture, lifestyle, and culture of the Ming Dynasty of China. In Ming tombs, you will see a collection of mausoleums that were built by the emperors of this dynasty. Collectively the Ming tombs are known as the Thirteen Tombs of the Ming Dynasty, and it is one of the most popular tourist attractions of Beijing as well as China. This place lies under the World Cultural Heritages by UNESCO and covers a total area of 120 kilometers. </span></span></span></span></p></div><div class="text" data-dcnode-id="1564" id="174969188"><p class="" data-dcnode-id="1565"><span data-dcnode-id="1566" style="font-size:10ptpx"><span data-dcnode-id="1567" style="color:#000000"><span data-dcnode-id="1568" style="background-color:#ffffff"><span data-dcnode-id="1569" instrument_node="">Witness the precious art, stone carvings, and exhibition rooms amidst the beautiful nature. Nature enhances the beauty of this place in the spring season. </span></span></span></span></p></div><div class="text" data-dcnode-id="1558" id="174969189"><p class="" data-dcnode-id="1559"><span data-dcnode-id="1560" style="font-size:10ptpx"><span data-dcnode-id="1561" style="color:#000000"><span data-dcnode-id="1562" style="background-color:#ffffff"><span data-dcnode-id="1563" instrument_node="">You need to dedicate half-day touring this beautiful historical place of China. This place has a historical significance, and you will be amazed to see the impressive natural landscape surrounding the tombs. You cannot miss this place while you are in Beijing or china. You have to see this place and so add it to the top of the list of things to do in Beijing. </span></span></span></span></p></div><div class="text" data-dcnode-id="1552" id="174969190"><p class="" data-dcnode-id="1553"><span data-dcnode-id="1554" style="font-size:10ptpx"><span data-dcnode-id="1555" style="color:#000000"><span data-dcnode-id="1556" style="background-color:#ffffff"><span data-dcnode-id="1557" instrument_node="">It opens every day (Monday to Sunday) from 8 am to 5:30 pm. But during different seasons, the opening and closing time might differ a bit. In on-season (April 1 - October 31) the tomb opens at 8 am and closes at 5:30 pm while in the off-season (November 1 - March 31), it opens at 8:30 pm and closes at 5 pm. Also, ticket sales stop 30 minutes before the closing time. </span></span></span></span></p></div><div class="text" data-dcnode-id="1546" id="174969191"><p class="" data-dcnode-id="1547"><span data-dcnode-id="1548" style="font-size:10ptpx"><span data-dcnode-id="1549" style="color:#000000"><span data-dcnode-id="1550" style="background-color:#ffffff"><span data-dcnode-id="1551" instrument_node="">Address: 212 Provincial Rd, Changping, China</span></span></span></span></p></div><div class="text" data-dcnode-id="1544" id="174969192"><img alt="Top 11 Must-See Attractions in Beijing" data-dcnode-id="1545" height="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ak-d.tripcdn.com/images/100o190000017b4un376A_Z_320_10000_R5.jpg_.webp&amp;raw" width="320"></div><div class="text" data-dcnode-id="1538" id="174969193"><h2 data-dcnode-id="1539"><span data-dcnode-id="1540" style="font-size:10ptpx"><span data-dcnode-id="1541" style="color:#000000"><span data-dcnode-id="1542" style="background-color:#ffffff"><span data-dcnode-id="1543" instrument_node="">Old Summer Palace</span></span></span></span></h2></div><div class="text" data-dcnode-id="1530" id="174969194"><p class="" data-dcnode-id="1531"><span data-dcnode-id="1532" style="font-size:10ptpx"><span data-dcnode-id="1533" style="color:#000000"><span data-dcnode-id="1534" style="background-color:#ffffff"><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing/old-summer-palace-76625/" target="_top"><span data-dcnode-id="1537" instrument_node="">The Old Summer Palace</span></a><span data-dcnode-id="1535" instrument_node="">, called the Yuanming Yuan (in Chinese), is situated at the Haidian district of Beijing. It was built during the 18th and 19th centuries as a complex of palaces and gardens. The emperor of the Qing Dynasty used to handle state affairs from this place as this was the main imperial residence for them. This imperial garden was made up of three gardens; Garden of Perfect Brightness, Garden of Eternal Spring and Garden of Elegant Spring. </span></span></span></span></p></div><div class="text" data-dcnode-id="1524" id="174969195"><p class="" data-dcnode-id="1525"><span data-dcnode-id="1526" style="font-size:10ptpx"><span data-dcnode-id="1527" style="color:#000000"><span data-dcnode-id="1528" style="background-color:#ffffff"><span data-dcnode-id="1529" instrument_node="">Here you can see an extensive collection of gardens, architecture, numerous arts, and historical treasures like temples, pavilions, halls, and many more. The western mansion is the most visible architectural remains of this place, which you must see. In the scattered ruins of this place, you will see a profound beauty that does justice to the effort of the visitors who come to this public park. Visit this palace by adding this in things to do in Beijing list.</span></span></span></span></p></div><div class="text" data-dcnode-id="1518" id="174969196"><p class="" data-dcnode-id="1519"><span data-dcnode-id="1520" style="font-size:10ptpx"><span data-dcnode-id="1521" style="color:#000000"><span data-dcnode-id="1522" style="background-color:#ffffff"><span data-dcnode-id="1523" instrument_node="">All around the year, the palace has different opening and closing timings for the visitors. From January-March and November-December, the palace opens at 7 am, closes at 5:30 pm and the ticket sale ends at 4:30 pm. In April, September, and October, the Palace opens at 7 am, closes at 6 pm and the ticket sale ends at 4:30 pm. From May-August, the ticket sale ends at 4:30 pm, and you can visit the palace from 7 am to 7 pm. </span></span></span></span></p></div><div class="text" data-dcnode-id="1512" id="174969197"><p class="" data-dcnode-id="1513"><span data-dcnode-id="1514" style="font-size:10ptpx"><span data-dcnode-id="1515" style="color:#000000"><span data-dcnode-id="1516" style="background-color:#ffffff"><span data-dcnode-id="1517" instrument_node="">Address: No. 28, Qinghua West Road, Haidian District, Beijing</span></span></span></span></p></div><div class="text" data-dcnode-id="1510" id="174969198"><img alt="Top 11 Must-See Attractions in Beijing" data-dcnode-id="1511" height="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ak-d.tripcdn.com/images/100a190000017dm8w8E87_Z_320_10000_R5.jpg_.webp&amp;raw" width="320"></div><div class="text" data-dcnode-id="1504" id="174969199"><h2 data-dcnode-id="1505"><span data-dcnode-id="1506" style="font-size:10ptpx"><span data-dcnode-id="1507" style="color:#000000"><span data-dcnode-id="1508" style="background-color:#ffffff"><span data-dcnode-id="1509" instrument_node="">Confucius Temple and The Imperial College Museum</span></span></span></span></h2></div><div class="text" data-dcnode-id="1495" id="174969200"><p class="" data-dcnode-id="1496"><span data-dcnode-id="1497" style="font-size:10ptpx"><span data-dcnode-id="1498" style="color:#000000"><span data-dcnode-id="1499" style="background-color:#ffffff"><span data-dcnode-id="1503" instrument_node="">The </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing/confucius-temple-and-the-imperial-college-museum-15151613/" target="_top"><span data-dcnode-id="1502" instrument_node="">Confucius Temple and The Imperial College Museum</span></a><span data-dcnode-id="1500" instrument_node=""> are the two famous ancient buildings in Beijing. Both of the buildings share a similar kind of themes and are located near each other. So, it is easy for visitors to tour both of them together in one go. </span></span></span></span></p></div><div class="text" data-dcnode-id="1489" id="174969201"><p class="" data-dcnode-id="1490"><span data-dcnode-id="1491" style="font-size:10ptpx"><span data-dcnode-id="1492" style="color:#000000"><span data-dcnode-id="1493" style="background-color:#ffffff"><span data-dcnode-id="1494" instrument_node="">The Confucius temple was built during Yuna, Ming, and Qing dynasties. You need to have 1-2 hours to tour the entire Confucius temple as the temple is really big. You can see the rare ancient architecture of the Yuan dynasty in this temple. Two more important things to see in this temple are the stone tablets in the courtyard and the traditional ritual and music dance “teaching ritual and music” that depicts the ancient traditional art and culture, and it is performed several times a day in the temple. </span></span></span></span></p></div><div class="text" data-dcnode-id="1483" id="174969202"><p class="" data-dcnode-id="1484"><span data-dcnode-id="1485" style="font-size:10ptpx"><span data-dcnode-id="1486" style="color:#000000"><span data-dcnode-id="1487" style="background-color:#ffffff"><span data-dcnode-id="1488" instrument_node="">During the Ming and Qing dynasty, the imperial college was the highest institution for higher education in the country. You can see permanent exhibitions at Imperial College. </span></span></span></span></p></div><div class="text" data-dcnode-id="1477" id="174969203"><p class="" data-dcnode-id="1478"><span data-dcnode-id="1479" style="font-size:10ptpx"><span data-dcnode-id="1480" style="color:#000000"><span data-dcnode-id="1481" style="background-color:#ffffff"><span data-dcnode-id="1482" instrument_node="">May-October is the high season to visit this place, and you can visit this Museum from 8:30 am to 6 pm during this season. During the low season, that is November-April, you can visit here from 8:30 am to 5 pm. It remains closed on Monday during the low season. Visit this temple by adding it to things to do in Beijing list.</span></span></span></span></p></div><div class="text" data-dcnode-id="1471" id="174969204"><p class="" data-dcnode-id="1472"><span data-dcnode-id="1473" style="font-size:10ptpx"><span data-dcnode-id="1474" style="color:#000000"><span data-dcnode-id="1475" style="background-color:#ffffff"><span data-dcnode-id="1476" instrument_node="">Address: No. 15, Guozijian Street, Dongcheng District, Beijing</span></span></span></span></p></div><div class="text" data-dcnode-id="1469" id="174969205"><img alt="Top 11 Must-See Attractions in Beijing" data-dcnode-id="1470" height="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ak-d.tripcdn.com/images/100e190000017f1w93DAD_Z_320_10000_R5.jpg_.webp&amp;raw" width="320"></div><div class="text" data-dcnode-id="1463" id="174969206"><h2 data-dcnode-id="1464"><span data-dcnode-id="1465" style="font-size:10ptpx"><span data-dcnode-id="1466" style="color:#000000"><span data-dcnode-id="1467" style="background-color:#ffffff"><span data-dcnode-id="1468" instrument_node="">Forbidden City</span></span></span></span></h2></div><div class="text" data-dcnode-id="1454" id="174969207"><p class="" data-dcnode-id="1455"><span data-dcnode-id="1456" style="font-size:10ptpx"><span data-dcnode-id="1457" style="color:#000000"><span data-dcnode-id="1458" style="background-color:#ffffff"><span data-dcnode-id="1462" instrument_node="">Have you ever wondered how the largest imperial palace in the world looks like? It looks exactly like the</span><a data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing/forbidden-city-75595/" target="_top"><span data-dcnode-id="1461" instrument_node=""> Forbidden City</span></a><span data-dcnode-id="1459" instrument_node="">. During Ming and qing dynasties, this place served as the Chinese imperial palace. After the end of the ancient rulers, this place served the Chinese government as their ceremonial and political center for almost 500 years. UNESCO has declared this place as the World Heritage Site, and it was listed as the largest collection of preserved ancient wooden structures in the world.</span></span></span></span></p></div><div class="text" data-dcnode-id="1445" id="174969208"><p class="" data-dcnode-id="1446"><span data-dcnode-id="1447" style="font-size:10ptpx"><span data-dcnode-id="1448" style="color:#000000"><span data-dcnode-id="1449" style="background-color:#ffffff"><span data-dcnode-id="1453" instrument_node="">There is a total of 980 buildings that comes under this complex, and it is spread across 72 hectares. There is a Palace museum inside the </span><a class="keyword_link" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.trip.com/travel-guide/attraction/beijing/forbidden-city-75595/"><span data-dcnode-id="1452" instrument_node="">Forbidden City</span></a><span data-dcnode-id="1450" instrument_node=""> which where you can see an extensive collection of artworks, artifacts, and the imperial collections of the Ming and Qing dynasties. Do visit this place if you are an art fan and witness around one million of art exhibited in this place. </span></span></span></span></p></div><div class="text" data-dcnode-id="1436" id="174969209"><p class="" data-dcnode-id="1437"><span data-dcnode-id="1438" style="font-size:10ptpx"><span data-dcnode-id="1439" style="color:#000000"><span data-dcnode-id="1440" style="background-color:#ffffff"><span data-dcnode-id="1444" instrument_node="">During the high season (April-October), the entry to the </span><a class="keyword_link" data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.trip.com/travel-guide/attraction/beijing/forbidden-city-75595/"><span data-dcnode-id="1443" instrument_node="">Forbidden city</span></a><span data-dcnode-id="1441" instrument_node=""> starts at 8:30 am and ends at 5 pm. Whereas during the off-season (November- March), the complex opens at 8;30 am and closes at 4:30 pm. The ticket sale ends one hour before the closing time, and the entry to the complex is stopped 50 minutes before the closing time. The Forbidden City opens every day from Tuesday to Sunday, and it remains closed on Monday throughout the year. Visit this city by adding it in your things to do in Beijing list.</span></span></span></span></p></div><div class="text" data-dcnode-id="1430" id="174969210"><p class="" data-dcnode-id="1431"><span data-dcnode-id="1432" style="font-size:10ptpx"><span data-dcnode-id="1433" style="color:#000000"><span data-dcnode-id="1434" style="background-color:#ffffff"><span data-dcnode-id="1435" instrument_node="">Address: No. 4, Jingshanqian Street, Dongcheng District, Beijing </span></span></span></span></p></div><div class="text" data-dcnode-id="1428" id="174969211"><img alt="Top 11 Must-See Attractions in Beijing" data-dcnode-id="1429" height="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ak-d.tripcdn.com/images/100a190000017dmzv59D5_Z_320_10000_R5.jpg_.webp&amp;raw" width="320"></div><div class="text" data-dcnode-id="1422" id="174969212"><h2 data-dcnode-id="1423"><span data-dcnode-id="1424" style="font-size:10ptpx"><span data-dcnode-id="1425" style="color:#000000"><span data-dcnode-id="1426" style="background-color:#ffffff"><span data-dcnode-id="1427" instrument_node="">Jingshan Park</span></span></span></span></h2></div><div class="text" data-dcnode-id="1414" id="174969213"><p class="" data-dcnode-id="1415"><span data-dcnode-id="1416" style="font-size:10ptpx"><span data-dcnode-id="1417" style="color:#000000"><span data-dcnode-id="1418" style="background-color:#ffffff"><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing/jingshan-park-76610/" target="_top"><span data-dcnode-id="1421" instrument_node="">Jingshan Park</span></a><span data-dcnode-id="1419" instrument_node=""> is an imperial park located within the Forbidden City in Beijing. The park covers an area of 23 hectares. During, Yuan, Qing, and Ming dynasties, this park was originally an imperial garden which turned into a public park. </span></span></span></span></p></div><div class="text" data-dcnode-id="1405" id="174969214"><p class="" data-dcnode-id="1406"><span data-dcnode-id="1407" style="font-size:10ptpx"><span data-dcnode-id="1408" style="color:#000000"><span data-dcnode-id="1409" style="background-color:#ffffff"><span data-dcnode-id="1413" instrument_node="">There is a 43-meter high mountain inside the park from which you can overlook the panoramic view of the Forbidden City. From this mountain, you can get a view of many famous attractions in Beijing like the ancient Drum and Bell Towers and hill-top White Pagoda of </span><a class="keyword_link" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.trip.com/travel-guide/attraction/beijing/beihai-park-75598/"><span data-dcnode-id="1412" instrument_node="">Beihai Park</span></a><span data-dcnode-id="1410" instrument_node="">. There is a planted area of about 1,300 square yards that boasts some charming natural scenery. If you are in Beijing during May, then you can see 200 varieties of peony roses that bloom in this month. People come here to spend leisure time in beautiful surroundings. </span></span></span></span></p></div><div class="text" data-dcnode-id="1399" id="174969215"><p class="" data-dcnode-id="1400"><span data-dcnode-id="1401" style="font-size:10ptpx"><span data-dcnode-id="1402" style="color:#000000"><span data-dcnode-id="1403" style="background-color:#ffffff"><span data-dcnode-id="1404" instrument_node="">From April-October, the park opens at 6:30 am and closes at 9 pm, from January-March, the park opens at 6:30 am and closes at 8 pm. The ticket sale stops 30 minutes before the closing time of the park, so don't be late. Add this place in things to do in Beijing list.</span></span></span></span></p></div><div class="text" data-dcnode-id="1393" id="174969216"><p class="" data-dcnode-id="1394"><span data-dcnode-id="1395" style="font-size:10ptpx"><span data-dcnode-id="1396" style="color:#000000"><span data-dcnode-id="1397" style="background-color:#ffffff"><span data-dcnode-id="1398" instrument_node="">Address: 44 Jingshan W St, Xicheng, Beijing, China, 100009</span></span></span></span></p></div><div class="text" data-dcnode-id="1387" id="174969217"><h2 data-dcnode-id="1388"><span data-dcnode-id="1389" style="font-size:10ptpx"><span data-dcnode-id="1390" style="color:#000000"><span data-dcnode-id="1391" style="background-color:#ffffff"><span data-dcnode-id="1392" instrument_node="">Temple of Heaven</span></span></span></span></h2></div><div class="text" data-dcnode-id="1378" id="174969218"><p class="" data-dcnode-id="1379"><span data-dcnode-id="1380" style="font-size:10ptpx"><span data-dcnode-id="1381" style="color:#000000"><span data-dcnode-id="1382" style="background-color:#ffffff"><span data-dcnode-id="1386" instrument_node="">The </span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing/temple-of-heaven-75599/" target="_top"><span data-dcnode-id="1385" instrument_node="">Temple of Heaven </span></a><span data-dcnode-id="1383" instrument_node="">is a religious building situated in central Beijing. During Ming and Qing dynasty, the temple was the complex which was visited by the emperors only for annual ceremonies of prayer for a good harvest. It is a dignified complex built amidst the gardens and is surrounded by the pine woods that cover an area of 2,700,000 square meters. According to the legends, the temple symbolizes the relationship between earth and heaven or in simpler words relationship between the human world and God's world. </span></span></span></span></p></div><div class="text" data-dcnode-id="1372" id="174969219"><p class="" data-dcnode-id="1373"><span data-dcnode-id="1374" style="font-size:10ptpx"><span data-dcnode-id="1375" style="color:#000000"><span data-dcnode-id="1376" style="background-color:#ffffff"><span data-dcnode-id="1377" instrument_node="">In the complex, you can see three different types of constructions, each of them built according to strict philosophical requirements. These are the Hall of Prayer for Good Harvests, the Imperial Vault of Heaven, and the circular mound altar. The surrounding park and garden of the temple consist of playgrounds, exercise, and game areas where local people come regularly. Include this place in your things to do in Beijing list and see a place decorated by lavishly carved dragons. </span></span></span></span></p></div><div class="text" data-dcnode-id="1363" id="174969220"><p class="" data-dcnode-id="1364"><span data-dcnode-id="1365" style="font-size:10ptpx"><span data-dcnode-id="1366" style="color:#000000"><span data-dcnode-id="1367" style="background-color:#ffffff"><span data-dcnode-id="1371" instrument_node="">There are four doors to enter this complex. During high season (April - October), the </span><a class="keyword_link" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.trip.com/travel-guide/attraction/beijing/temple-of-heaven-75599/"><span data-dcnode-id="1370" instrument_node="">Temple of Heaven</span></a><span data-dcnode-id="1368" instrument_node=""> opens at 6 am and closes at 10 pm. But during the low season (November- March), it opens 30 mins late, which is at 6:30 pm and closes at the same time. It opens every day from Monday to Sunday. </span></span></span></span></p></div><div class="text" data-dcnode-id="1357" id="174969221"><p class="" data-dcnode-id="1358"><span data-dcnode-id="1359" style="font-size:10ptpx"><span data-dcnode-id="1360" style="color:#000000"><span data-dcnode-id="1361" style="background-color:#ffffff"><span data-dcnode-id="1362" instrument_node="">Address: 1 Tiantan E Rd, Dongcheng, China, 100061 </span></span></span></span></p></div><div class="text" data-dcnode-id="1355" id="174969222"><img alt="Top 11 Must-See Attractions in Beijing" data-dcnode-id="1356" height="auto" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ak-d.tripcdn.com/images/100p190000017bgt5D860_Z_320_10000_R5.jpg_.webp&amp;raw" width="320"></div><div class="text" data-dcnode-id="1349" id="174969223"><h2 data-dcnode-id="1350"><span data-dcnode-id="1351" style="font-size:10ptpx"><span data-dcnode-id="1352" style="color:#000000"><span data-dcnode-id="1353" style="background-color:#ffffff"><span data-dcnode-id="1354" instrument_node="">Bell and Drum Tower</span></span></span></span></h2></div><div class="text" data-dcnode-id="1340" id="174969224"><p class="" data-dcnode-id="1341"><span data-dcnode-id="1342" style="font-size:10ptpx"><span data-dcnode-id="1343" style="color:#000000"><span data-dcnode-id="1344" style="background-color:#ffffff"><span data-dcnode-id="1348" instrument_node="">The</span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trip.com/travel-guide/beijing/bell-and-drum-tower-76608/" target="_top"><span data-dcnode-id="1347" instrument_node=""> bell and the drum tower</span></a><span data-dcnode-id="1345" instrument_node=""> are the two different towers in Beijing that stand near each other, and it is one of the most famous tourist attractions of Beijing. You must be thinking that why this place is so popular among the visitors. Well, to know this, continue reading. </span></span></span></span></p></div><div class="text" data-dcnode-id="1334" id="174969225"><p class="" data-dcnode-id="1335"><span data-dcnode-id="1336" style="font-size:10ptpx"><span data-dcnode-id="1337" style="color:#000000"><span data-dcnode-id="1338" style="background-color:#ffffff"><span data-dcnode-id="1339" instrument_node="">In ancient china, drum and bells were the musical instruments that were used later to announce the time by the government and the communities. And in this way, the bell and drum tower became central to official timekeeping during the Yuan, Ming, and Qing dynasties. Still, the tower continues to function as the official timepiece of Beijing, but the only difference is that now you will need a western-styled clockwork for official time-keeping. You can enjoy the drumming rhythms at every hour, starting from 9.30 am to 4.45 pm. The drumming performance is the replica of what was done during the ancient period. Go to this place and watch a different color of the culture that is still being carried there. </span></span></span></span></p></div><div class="text" data-dcnode-id="1328" id="174969226"><p class="" data-dcnode-id="1329"><span data-dcnode-id="1330" style="font-size:10ptpx"><span data-dcnode-id="1331" style="color:#000000"><span data-dcnode-id="1332" style="background-color:#ffffff"><span data-dcnode-id="1333" instrument_node="">It opens every day, from Monday to Sunday at 9 am and closes at 5 pm.</span></span></span></span></p></div><div class="text" data-dcnode-id="1321" id="174969227"><p class="" data-dcnode-id="1322"><span data-dcnode-id="1323" style="font-size:10ptpx"><span data-dcnode-id="1324" style="line-height:107%"><span data-dcnode-id="1325" style="color:#000000"><span data-dcnode-id="1326" style="background-color:#ffffff"><span data-dcnode-id="1327" instrument_node="">Address: No. 9 Zhonglouwan Hutong, Dongcheng District, Beijing</span></span></span></span></span></p></div><div class="text" data-dcnode-i
