</span><p data-dcnode-id="510"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Beijing</span></strong><span data-dcnode-id="523" instrument_node="">, Beijing, the capital of the People's Republic of China, it is not only the nation's political center, but also a cultural, scientific and educational heart as well as a key transportation hub. Beijing has served as a capital of the country for more than 800 years. The city has many places of historic interest and scenic beauty.</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">
</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">
Beijing (北京), is a city crowded with tourists from China and all over the world. Since 1989, many things have changed and Beijing has been growing into a huge metropolitan area with around 16 million people living in an ever expanding area. The old residential neighbourhoods, the Hutongs, are being almost entirely replaced by apartment buildings and shopping malls.</span><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">
</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">
Beijing is one of the most important cities in China from a cultural and political standpoint. The Forbidden Palace, and Tiananmen square are good examples; but hidden between the high rise buildings and 10-lane motorways are some other magnificent examples of culture and religion, like the Temple of Heaven and the Temple of the Sleeping Buddha.</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">
</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">
Close to the city are other significant historical attractions like the Ming Tombs and of course the biggest structure on earth ever built by humans: The Great Wall of China.</span></p><span data-dcnode-id="509" instrument_node="">
