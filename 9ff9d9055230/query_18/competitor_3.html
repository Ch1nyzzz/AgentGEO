</span><div data-dcnode-id="1666" id="baner_blue"><span class="px12_444444_bolder" data-dcnode-id="1675"><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">1.</span></strong></span><span data-dcnode-id="1674" instrument_node=""> </span><a class="px13_444444_u" data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/forbidden_city.php" target="_blank"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Forbidden City</span></strong></a><span data-dcnode-id="1670" instrument_node=""> ( </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/blog/2010/07/21/forbidden-city-travel-tips-the-palace-museum-travel-tips/" target="_blank"><span data-dcnode-id="1669" instrument_node="">Forbidden City Travel Tips – The Palace Museum Travel Tips</span></a><span data-dcnode-id="1667" instrument_node=""> )</span></div><br data-dcnode-id="1665"><span data-dcnode-id="1664" instrument_node="">
</span><span class="px12_455F94" data-dcnode-id="1661"><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/forbidden_city.php" target="_blank"><img align="right" alt="Forbidden City" border="0" data-dcnode-id="1663" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/photos/278_187/forbidden_city_01.jpg&amp;raw" style=" margin-left:3px;" width="278"></a></span><span data-dcnode-id="1660" instrument_node="">To many, many people, Beijing is an ancient capital city in the east. Forbidden City is the right place for you to start your Beijing tour by unveiling its mysterious face. Consisting of over 9,000 rooms and spread over 250 acres, this large palace complex was built between 1406 and 1420, but was burnt down, rebuilt, sacked and renovated countless times, so most of the architecture you can see today dates from the 18th century and on wards during the Qing Dynasty. </span><br data-dcnode-id="1659"><span data-dcnode-id="1658" instrument_node="">
</span><br data-dcnode-id="1657"><span data-dcnode-id="1656" instrument_node="">
Wear comfortable shoes as you have to walk a lot! I highly recommend going with a guide. It really is helpful to have a guide explain the stories behind the site and tell you about the important historical parts in the forbidden city. </span><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">
</span><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node="">
Or if you are non-group tourists, I suggest you rent multi lingual guide recorder either at Meridian Gate ( southern gate of Forbidden city ) or the Gate of Divine Prowess (Northern gate of Forbidden City) and return it when you finish your tour of Forbidden City. </span><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node="">
</span><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">
After you visit the Imperial Palace and go out of the Gate of Divine Prowess, you can enter into Jingshan Park, climb a bit and overlook the panorama of the Imperial Palace. In the evening, especially in summer, Forbidden City is brilliant. Colored lights from all directions lighten Meridian Gate, the Gate of Divine Prowess, turret, palace wall and other main palaces. </span><br data-dcnode-id="1647"><span data-dcnode-id="1646" instrument_node="">
</span><br data-dcnode-id="1645"><span data-dcnode-id="1644" instrument_node="">
</span><span class="px12_455F94" data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">How to get there:</span></span><br data-dcnode-id="1641"><span data-dcnode-id="1640" instrument_node="">
Add: No.4 Jingshan Front Street, Dongcheng District 65132255</span><br data-dcnode-id="1639"><span data-dcnode-id="1638" instrument_node="">
Opening Hour: 8:30-17:00</span><br data-dcnode-id="1637"><span data-dcnode-id="1636" instrument_node="">
Time of fishing selling ticket: 15:00 pm</span><br data-dcnode-id="1635"><span data-dcnode-id="1634" instrument_node="">
Travel Time: two hours</span><br data-dcnode-id="1633"><span data-dcnode-id="1632" instrument_node="">
Entrance Fee: RMB 60</span><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node="">
Take No. 1, 2, 4, 5, 10, 20, 52, 57, 22, 54, 120, 802, special No.1 bus and get off at Zhongshan Phongshan Park stop or Tian An Men stop. </span><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">
Take subway: Subway line 1 and get off at East Tiananmen Square
</span><br data-dcnode-id="1627"><span data-dcnode-id="1626" instrument_node="">
</span><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">
</span><a data-dcnode-id="1623" id="g2" name="g2"></a><br data-dcnode-id="1622"><span data-dcnode-id="1621" instrument_node="">
</span><div data-dcnode-id="1609" id="baner_blue"><span class="px12_444444_bolder" data-dcnode-id="1618"><strong data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">2.</span></strong></span><span data-dcnode-id="1617" instrument_node=""> </span><a class="px13_444444_u" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/tiananmen_square.php" target="_blank"><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Tiananmen Square</span></strong></a><span data-dcnode-id="1613" instrument_node=""> ( </span><a class="px12_333333_line" data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/blog/2010/07/19/tips-for-visiting-tiananmen-square/" target="_blank"><span data-dcnode-id="1612" instrument_node="">Tips for Visiting Tiananmen Square</span></a><span data-dcnode-id="1610" instrument_node=""> )</span></div><span data-dcnode-id="1608" instrument_node="">
</span><br data-dcnode-id="1607"><span data-dcnode-id="1606" instrument_node="">
</span><span class="px12_455F94" data-dcnode-id="1603"><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/tiananmen_square.php" target="_blank"><img align="right" alt="Tiananmen Square" border="0" data-dcnode-id="1605" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/photos/278_187/tiananmen_square_01.jpg&amp;raw" style=" margin-left:3px;" width="278"></a></span><span data-dcnode-id="1602" instrument_node="">What is the symbol of Beijing? There are various answers. But Tiananmen Square is definitely on the top list. Located in the heart of Beijing City, it is the site for massive parades and rallies, which is the largest square of this kind in the world. </span><br data-dcnode-id="1601"><span data-dcnode-id="1600" instrument_node="">
</span><br data-dcnode-id="1599"><span data-dcnode-id="1598" instrument_node="">
This was the site when in 1949, from a rostrum on Tiananmen (the Gate of Heavenly Peace), Chairman Mao proclaimed the establishment of the People's Republic of China. Tiananmen Square is surrounded by Tiananmen ( Gate of Heaven Peace ) on its north ; the Great Hall of the People on its west, the meeting place of national people's congress of the People's Republic of China; on the east of Tiananmen Square is the National Museum of China, and visiting the exhibition is like reading concise China General History; there is Monument to the People's Heroes and Chairman Mao's Mausoleum on the south. </span><br data-dcnode-id="1597"><span data-dcnode-id="1596" instrument_node="">
</span><br data-dcnode-id="1595"><span data-dcnode-id="1594" instrument_node="">
At sunrise and sunset the raising and lowering ceremony of the Chinese National Flag is well worth the watching. The precision of the young troops is very well performed. Go there about 30 minutes early to have a good seat. Spend the time to see the people (soldiers, tourists and locals) makes the square a true highlight for the first time visitors. </span><br data-dcnode-id="1593"><br data-dcnode-id="1592"><span data-dcnode-id="1591" instrument_node="">
</span><span class="px12_455F94" data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">How to get there:</span></span><br data-dcnode-id="1588"><span data-dcnode-id="1587" instrument_node="">
Tiananmen Square: Free</span><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node="">
Tiananmen (Gate of Heavenly Peace): RMB 15</span><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node="">
The Great Hall of the People: RMB 15</span><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node="">
Chairman Mao's Mausoleum: Free</span><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node="">
The National Museum of China: RMB 15</span><br data-dcnode-id="1578"><span data-dcnode-id="1577" instrument_node="">
Open Time (Tiananmen Square): Whole Day</span><br data-dcnode-id="1576"><span data-dcnode-id="1575" instrument_node="">

</span><a data-dcnode-id="1568" id="g3" name="g3"></a><br data-dcnode-id="1567"><div data-dcnode-id="1555" id="baner_blue"><span class="px12_444444_bolder" data-dcnode-id="1564"><strong data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">3.</span></strong></span><span data-dcnode-id="1563" instrument_node=""> </span><a class="px13_444444_u" data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/temple_of_heaven.php" target="_blank"><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Temple of Heaven</span></strong></a><span data-dcnode-id="1559" instrument_node=""> ( </span><a class="px12_333333_line" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/blog/2010/07/22/tips-for-visiting-the-temple-of-heaven/" target="_blank"><span data-dcnode-id="1558" instrument_node="">Tips for Visiting the Temple of Heaven</span></a><span data-dcnode-id="1556" instrument_node=""> )</span></div><span data-dcnode-id="1554" instrument_node="">
</span><br data-dcnode-id="1553"><span data-dcnode-id="1552" instrument_node="">
</span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/temple_of_heaven.php" target="_blank"><img align="right" alt="Temple of Heaven" border="0" data-dcnode-id="1551" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/photos/278_187/temple_of_heaven_01.jpg&amp;raw" style=" margin-left:3px;" width="278"></a><span data-dcnode-id="1549" instrument_node="">I recommend Temple of Heaven as a real highlight of Beijing. It is located in the southern part of Beijing, and has been one of the most holy places for the whole country for more than five centuries. It used as a complex of sacrificial buildings for the Ming and Qing emperors, and is the largest one in Beijing among several royal altars to Heaven, Earth, the Sun, the Moon and other deities or symbolic forces of Nature. </span><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node="">
</span><br data-dcnode-id="1546"><span data-dcnode-id="1545" instrument_node="">
If you go to the Temple of Heaven in the early morning, you can see groups of people practicing all types of kung fu and taiji. Many people contentedly entertain each other with music,songs or quietly playing cards. You can also practice with them if you are so inclined. This is another good activity for the jet lagged. </span><br data-dcnode-id="1544"><span data-dcnode-id="1543" instrument_node="">
</span><br data-dcnode-id="1542"><span data-dcnode-id="1541" instrument_node="">
What makes the temple unique is the century-old trees - line upon line of Chinese cypress, Chinese juniper and scholar trees. Some of the cypresses are more than 600 years old. Dr Henry Kissinger, when he visited the temple, stated that while the USA could recreate the Temple of Heaven if it desired, it could not create the trees!</span><br data-dcnode-id="1540"><br data-dcnode-id="1539"><span data-dcnode-id="1538" instrument_node="">
</span><span class="px12_455F94" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">How to get there:</span></span><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">

</span><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">
</span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/attraction_guide/summer_palace.php" target="_blank"><img align="right" alt="Summer Palace" border="0" data-dcnode-id="1503" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/photos/278_187/summer_palace_01.jpg&amp;raw" style=" margin-left:3px;" width="278"></a><span data-dcnode-id="1501" instrument_node="">As the largest royal garden in China, Beijing's Summer Palace is actually a park like imperial retreat spread out over 10 square miles. The Summer Palace in northwest suburban Beijing is the largest and most complete imperial garden existing in China. </span><br data-dcnode-id="1500"><span data-dcnode-id="1499" instrument_node="">
</span><br data-dcnode-id="1498"><span data-dcnode-id="1497" instrument_node="">
Once a summer retreat for emperors, this 290-acre park is still a retreat for the tourists, who can relax here or walk around ancient pavilions, mansions, temples, bridges and huge lake. Summer Palace mainly consists of Longevity Hill (Washoushan) and Kunming Lake. Much of it is covered by Kunming Lake. With masterly design and artistic architecture and integration the essence of Chinese garden arts, the Summer Palace has a title of "Imperial Garden Museum". </span><br data-dcnode-id="1496"><span data-dcnode-id="1495" instrument_node="">
</span><br data-dcnode-id="1494"><span data-dcnode-id="1493" instrument_node="">
It is an imperial garden most completely reserved with richest landscapes and concentrated buildings. The Summer Palace was added to the world cultural heritage list in 1998</span><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">

</span><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">
</span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/excursion_guide/ming_tomb.php" target="_blank"><img align="right" alt="Ming Tombs" border="0" data-dcnode-id="1454" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tour-beijing.com/photos/278_187/ming_tombs_01.jpg&amp;raw" style=" margin-left:3px;" width="278"></a><span data-dcnode-id="1452" instrument_node="">This is an amazing site for many reasons. First, it is outside Beijing, so you have a chance to escape the city and see a bit of the countryside. Second, it is relatively near the Great Wall, so you can visit both in one day. Third, the tomb itself is an eye opener. </span><br data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node="">
</span><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">
Some 50 kilometers northwest of the downtown Beijing, known as the "13 Tombs", this is the burial site of 13 out of 17 emperors of the Ming Dynasty. There are just two tombs which have been excavated and open to the public: Dingling and Changling. Changling is the first tomb to be built. It took 2 years for renovation, and was opened in 1958. Dingling has been excavated so thoroughly that one has to get into the burial chamber itself. </span><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">
</span><br data-dcnode-id="1445"><span data-dcnode-id="1444" instrument_node="">
However, it is a very steep climb down and people who have problems with their heart or kneels are not suggested to visit the underground tomb. For wheel-chair users or those who don't want to go deep inside a tomb, I recommend Changling Tomb.</span><br data-dcnode-id="1443"><span data-dcnode-id="1442" instrument_node="">

</span><br data-dcnode-id="1399"><span data-dcnode-id="1398" instrument_node="">
Along the total length of the Great Wall around Beijing, there are major eight sections including Badaling, Juyongguan, Huanghuacheng, Jiankou, Mutianyu, Gubeikou, Jinshanling, and Simatai. Most of the sections of Great Wall in Beijing are well-preserved and mainly the remains from the Ming Dynasty, an era of huge construction. For the climbing of the Great Wall, strong footwear is needed! In summer, please prepare for sunblock, sunglasses and water.</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">

</span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">
The neighborhoods of narrow, twisting streets represent the "real life" of Beijing, where passageways connect to courtyards of traditional compact homes. Pedicab tours of the hutongs cover the attractions that normally include the Drum Tower, courtyard neighborhoods and Prince Gong's mansion. </span><br data-dcnode-id="1287"><span data-dcnode-id="1286" instrument_node="">
</span><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">
There are lots of many small restaurants, bars, and inns. From the top of the Bell Tower you can overlook the surrounding hutongs. The most interesting part of the hutong tour is walking through "Pipe Tobacco Alley" near the Bell Tower. On this tour you will enjoy the real people's Beijing. On the other end of Pipe Tobacco Alley has some of Beijing's fashionable cafes.</span><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">
