</span><h1 data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Best Time to Visit Beijing</span></h1><span data-dcnode-id="721" instrument_node="">
</span></div><span data-dcnode-id="719" instrument_node="">

                    What's the best time to visit Beijing? Many people have this question when they go to the ancient capital city for the first time. Although you can enjoy different scenery in each season, but the best time to visit Beijing is surely in the autumn from September to October and early summer from May to June.</span><div align="center" class="ixbox noTitle dw700h583" data-dcnode-id="703"><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/beijing-best-time.jpg"><img alt="Best Time to Visit Beijing" class="clsphotogalleryimg width100p_420" data-dcnode-id="707" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/beijing-best-time.jpg&amp;raw" style="width: 700px; height: 583px;"></a><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">&nbsp;</span></div><div class="subTitle2017" data-dcnode-id="700"><h2 class="h2_01" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Peak season: April to October</span></h2></div><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">The peak season starts from April and ends in October. In this period, the mild temperature and climate is very suitable for travel. As a result, the city is filled with lots of travelers and is unavoidably crowded at some popular sights. The travel cost will also be a little higher since many scenic spots have peak season prices. Nevertheless, while this is the peak season it is still the best time to visit Beijing for the most beautiful scenery.</span></p><span data-dcnode-id="697" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="694"><h2 class="h2_01" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Slack season: November to March</span></h2></div><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">The slack season for Beijing is from November to March when the weather is becoming colder and colder and there are fewer tourists. Accordingly, the airfare, hotels and scenic area tickets cost less. Beijing in January and February is cold with the temperature as low as -10 C, so it's very important for tourists to keep warm from winter chills. Nevertheless, you may enjoy the snowy landscape of the city and have a good time since it will be less crowded in most of the tourist spots.</span></p><p data-dcnode-id="691"></p><div class="contentSplit" data-dcnode-id="690"></div><span data-dcnode-id="689" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="686"><h2 class="h2_01" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Times to Avoid Travel</span></h2></div><p data-dcnode-id="663"><span data-dcnode-id="685" instrument_node="">Try to avoid the two busiest travel peaks of the year – the </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/essential/holidays/chinese-new-year.htm"><span data-dcnode-id="684" instrument_node="">Chinese New Year</span></a><span data-dcnode-id="682" instrument_node=""> in January or February and the </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/intro/festival/national.htm"><span data-dcnode-id="681" instrument_node="">Chinese National Day Holiday</span></a><span data-dcnode-id="679" instrument_node=""> from October 1 to 7. During these two 7-day holidays, there will be large crowds at tourist attractions and you can’t really enjoy yourself. The airfare and hotels might cost three times more than usual, and it is extremely hard to buy a train ticket during the Chinese New Year. It is also better to avoid some 3-day public holidays like the </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/essential/holidays/qingming.htm"><span data-dcnode-id="678" instrument_node="">Qingming Festival</span></a><span data-dcnode-id="676" instrument_node=""> in early April and the </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/essential/holidays/dragon-boat.htm"><span data-dcnode-id="675" instrument_node="">Dragon Boat Festival</span></a><span data-dcnode-id="673" instrument_node=""> in June. If possible, try to avoid the summer vacation from July to August, where there will be a boom of student and family trips.</span><br data-dcnode-id="672"><br data-dcnode-id="671"><img alt="" data-dcnode-id="670" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="text-align: justify; margin: 0px; padding: 0px; border: currentcolor; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="668" style="text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;"><span data-dcnode-id="669" instrument_node="">&nbsp;</span></span><span data-dcnode-id="667" instrument_node="">See More about </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/essential/public-holiday.htm"><span data-dcnode-id="666" instrument_node="">Public Holidays in China</span></a><span data-dcnode-id="664" instrument_node="">&nbsp;</span></p><p data-dcnode-id="662"></p><div class="contentSplit" data-dcnode-id="661"></div><span data-dcnode-id="660" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="657"><h2 class="h2_01" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Travel to Beijing in the Four Seasons</span></h2></div><span data-dcnode-id="656" instrument_node="">&nbsp;</span><div class="subTitle2017" data-dcnode-id="653"><h3 class="h3_02" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Spring: April to May</span></h3></div><p data-dcnode-id="652"></p><p data-dcnode-id="620"><span data-dcnode-id="651" instrument_node="">The spring weather is generally mild but windy, and there will be sharp temperature difference between day and night.</span><br data-dcnode-id="650"><span data-dcnode-id="649" instrument_node="">Average temperature: 14 – 20 </span><img alt="" data-dcnode-id="648" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="647" instrument_node="">C (57 – 68 </span><img alt="" data-dcnode-id="646" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="645" instrument_node="">F)</span><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node="">Clothes: Hoodies, thin sweaters , T-shirts</span><br data-dcnode-id="642"><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">Recommended tour destinations: Hiking on the </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/china_great_wall/"><span data-dcnode-id="639" instrument_node="">Great Wall</span></a><span data-dcnode-id="637" instrument_node=""> and boating on the </span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/summer/kunming-lake.htm"><span data-dcnode-id="636" instrument_node="">Kunming Lake</span></a><span data-dcnode-id="634" instrument_node=""> are good choices. </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/beihai.htm"><span data-dcnode-id="633" instrument_node="">Beihai Park</span></a><span data-dcnode-id="631" instrument_node=""> is also a nice destination for visitors to boat and appreciate some old buildings. In addition, you can take a short trip to the Beijing Arboretum, which holds some natural displays including China's largest Rose Garden.</span><br data-dcnode-id="630"><br data-dcnode-id="629"><img alt="" data-dcnode-id="628" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="text-align: justify; margin: 0px; padding: 0px; border: currentcolor; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="626" style="text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;"><span data-dcnode-id="627" instrument_node="">&nbsp;</span></span><span data-dcnode-id="621"><span data-dcnode-id="622" style="color: rgb(0, 0, 0);"><span data-dcnode-id="625" instrument_node="">See also </span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/where-to-go-in-beijing.htm"><span data-dcnode-id="624" instrument_node="">Where to Go in Beijing in Spring - Top 10 Destinations</span></a></span></span></p><div align="center" data-dcnode-id="616"><img alt="Beijing in Spring" class="clsphotogalleryimg width100p_420" data-dcnode-id="619" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2009/0502161847.jpg&amp;raw" style="width: 700px; height: 350px;"><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">&nbsp;</span></div><div class="subTitle2017" data-dcnode-id="613"><h3 class="h3_02" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Summer: June to August</span></h3></div><p data-dcnode-id="612"></p><p data-dcnode-id="580"><span data-dcnode-id="611" instrument_node="">Beijing's summer is sultry and rainy, and the temperature can reach 40 </span><img alt="" data-dcnode-id="610" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="609" instrument_node="">C.</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">Average temperature: 24 – 28 </span><img alt="" data-dcnode-id="606" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="605" instrument_node="">C (75 – 82 </span><img alt="" data-dcnode-id="604" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="603" instrument_node="">F)</span><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node="">Clothes: Shirts, short sleeves</span><br data-dcnode-id="600"><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">Recommended tour destinations: In the summer you can visit some cool places like the </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/summer.htm"><span data-dcnode-id="597" instrument_node="">Summer Palace</span></a><span data-dcnode-id="595" instrument_node=""> and the </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/hebei/chengde/bishu.htm"><span data-dcnode-id="594" instrument_node="">Mountain Resort of Chengde</span></a><span data-dcnode-id="592" instrument_node="">, which were the resorts of royal families in the Qing Dynasty (1644 - 1911), where you can enjoy the exquisite landscape design and the splendor buildings. Also, the lotus flowers in the Mountain Resort of Chengde bloom from July to September and are very beautiful.</span><br data-dcnode-id="591"><br data-dcnode-id="590"><img alt="" data-dcnode-id="589" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="text-align: justify; margin: 0px; padding: 0px; border: currentcolor; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="587" style="text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;"><span data-dcnode-id="588" instrument_node="">&nbsp;</span></span><span data-dcnode-id="584"><span data-dcnode-id="585" style="color: rgb(0, 0, 0);"><span data-dcnode-id="586" instrument_node="">See also</span></span></span><span data-dcnode-id="583" instrument_node=""> </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/popular-beijing-activities.htm"><span data-dcnode-id="582" instrument_node="">12 Popular Beijing Activities to Beat the Summer Heat</span></a></p><div align="center" data-dcnode-id="576"><img alt="Summer Palace, Beijing" class="clsphotogalleryimg width100p_420" data-dcnode-id="579" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2018/0521172415.jpg&amp;raw" style="width: 700px; height: 350px;"><br data-dcnode-id="578"><span data-dcnode-id="577" instrument_node="">&nbsp;</span></div><div class="subTitle2017" data-dcnode-id="573"><h3 class="h3_02" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Autumn: September to October – BEST Season to Visit Beijing</span></h3></div><p data-dcnode-id="572"></p><p data-dcnode-id="543"><span data-dcnode-id="571" instrument_node="">In autumn, it is less rainy or windy in Beijing and the leaves are changing colors.</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">Average temperature: 13 – 20 </span><img alt="" data-dcnode-id="568" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="567" instrument_node="">C (55 – 68 </span><img alt="" data-dcnode-id="566" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="565" instrument_node="">F)</span><br data-dcnode-id="564"><span data-dcnode-id="563" instrument_node="">Clothes: T-shirts, wind-breakers, jackets</span><br data-dcnode-id="562"><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">Recommended tour destinations: October undoubtedly is the best month to visit Beijing. The most attractive scenic spots in autumn include the </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/china_great_wall/scene/beijing/badaling.htm"><span data-dcnode-id="559" instrument_node="">Badaling Great Wall</span></a><span data-dcnode-id="557" instrument_node="">, </span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/fragrant.htm"><span data-dcnode-id="556" instrument_node="">Fragrant Hills Park</span></a><span data-dcnode-id="554" instrument_node=""> and Wuling Mountain (Frog Mountain) in the suburb of Beijing. Don't miss the Fragrant Hills Park, where the red maple leaves are like fire. The best time to enjoy the maple leaves is from mid October to November.</span><br data-dcnode-id="553"><br data-dcnode-id="552"><img alt="" data-dcnode-id="551" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/heading-arrow1.png&amp;raw" style="text-align: justify; margin: 0px; padding: 0px; border: currentcolor; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;" width="17"><span data-dcnode-id="549" style="text-align: justify; color: rgb(0, 0, 0); font-family: Verdana, Geneva, sans-serif; font-size: 14px;"><span data-dcnode-id="550" instrument_node="">&nbsp;</span></span><span data-dcnode-id="546"><span data-dcnode-id="547" style="color: rgb(0, 0, 0);"><span data-dcnode-id="548" instrument_node="">See also </span></span></span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/package/beautiful-places-in-beijing-in-autumn.htm"><span data-dcnode-id="545" instrument_node="">8 Most Beautiful Places in Beijing in Autumn</span></a></p><div align="center" data-dcnode-id="539"><img alt="Great Wall in Autumn" class="clsphotogalleryimg width100p_420" data-dcnode-id="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/photogallery/2009/0424170249.jpg&amp;raw" style="width: 700px; height: 350px;"><br data-dcnode-id="541"><span data-dcnode-id="540" instrument_node="">&nbsp;</span></div><div class="subTitle2017" data-dcnode-id="534"><h3 class="h3_02" data-dcnode-id="535"><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/winter-tips.htm"><span data-dcnode-id="538" instrument_node="">Winter</span></a><span data-dcnode-id="536" instrument_node="">: November to March</span></h3></div><p data-dcnode-id="533"></p><p data-dcnode-id="502"><span data-dcnode-id="532" instrument_node="">Beijing’s winter lasts for 4 to 5 months and the climate is very dry. Be sure you come prepared to keep warm and moisturize your skin if you visit the city in winter. It is not the best time to travel to Beijing, but you can enjoy different activities and the cheaper prices of the slack season.</span><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">Average temperature: -4 – 5 </span><img alt="" data-dcnode-id="529" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="528" instrument_node="">C (25 – 41 </span><img alt="" data-dcnode-id="527" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/c-words/degree.gif&amp;raw" style="margin: 0px;" width="6"><span data-dcnode-id="526" instrument_node="">F)</span><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">Clothes: Down jackets, thick sweaters, overcoats, scarves</span><br data-dcnode-id="523"><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">Recommended tour destinations: &nbsp;Badaling Ski Resort, Yuyang International Ski Resort and Jundushan Ski Resort are recommended for the skiers. For people who are not interested in skating or skiing, viewing the snow on the </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/attraction/beijing/xishan-forest-park.htm"><span data-dcnode-id="520" instrument_node="">Western Hills</span></a><span data-dcnode-id="518" instrument_node=""> and the </span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/cityguides/beijing/forbidden.htm"><span data-dcnode-id="517" instrument_node="">Forbidden City</span></a><span data-dcnode-id="515" instrument_node=""> can be very enjoy uide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="291" instrument_node="">0</span></span><span class="bad" data-dcnode-id="287"><img data-dcnode-id="289" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="288" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="284" idx="686035" un="Sue "><img data-dcnode-id="286" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="285" instrument_node="">Reply</span></span></div><br data-dcnode-id="282"><br data-dcnode-id="281"></div><div class="clear" data-dcnode-id="279"></div><span data-dcnode-id="278" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">It may be cold in the morning and at night. At noon, it may be sunny and warm. There is less rainfall but more wind. You are advised to prepare jackets, thin sweaters, jeans and sneakers.</span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="212" id="qa623924" idx="2"><div class="qa-list-q-info" data-dcnode-id="264"><span data-dcnode-id="272" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="270" val="0"><span data-dcnode-id="271" instrument_node="">Ambrina</span></font><span data-dcnode-id="269" instrument_node=""> from PAKISTAN | Dec. 12, 2017 00:58</span><span data-dcnode-id="266" idx="623924" un="Ambrina"><img data-dcnode-id="268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="267" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="265"></div></div><div class="qa-list-q-title" data-dcnode-id="262"><span data-dcnode-id="263" instrument_node=""> Would you please guide me about day care or kindergarder near CAS?</span></div><div class="qa-list-q-content" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">I am coming for a year at Beijing with two toddlers. Would you please guide me about day care or kindergarten near Chinese academy of science?</span></div><div class="qa-list-a" data-dcnode-id="213"><div class="qa-list-a-title" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Answers (2)</span></div><div class="qa-list-a-item" data-dcnode-id="236" id="qa-list-a-item-537380" val="537380"><div class="qa-list-a-info" data-dcnode-id="241"><span data-dcnode-id="257" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="255" val="0"><span data-dcnode-id="256" instrument_node="">Amenda</span></font><span data-dcnode-id="254" instrument_node=""> from UK | Dec. 12, 2017 21:30</span><div class="replyAction" data-dcnode-id="244" idx="0"><span class="good" data-dcnode-id="251"><img data-dcnode-id="253" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="252" instrument_node="">3</span></span><span class="bad" data-dcnode-id="248"><img data-dcnode-id="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="249" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="245" idx="623924" un="Ambrina"><img data-dcnode-id="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="246" instrument_node="">Reply</span></span></div><br data-dcnode-id="243"><br data-dcnode-id="242"></div><div class="clear" data-dcnode-id="240"></div><span data-dcnode-id="239" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">You are suggested to take them to Beihai Kindergarten in 22 West Dianmen Street, which is about 8km to Chinese academy of science. You can take Bus 13 to Beihai Biemen, and then you will see the kindergarten. </span></div></div><div class="qa-list-a-item" data-dcnode-id="214" id="qa-list-a-item-537414" val="537414"><div class="qa-list-a-info" data-dcnode-id="219"><span data-dcnode-id="235" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="233" val="0"><span data-dcnode-id="234" instrument_node="">Ambrina</span></font><span data-dcnode-id="232" instrument_node=""> from PAKISTAN | Dec. 13, 2017 01:34</span><div class="replyAction" data-dcnode-id="222" idx="1"><span class="good" data-dcnode-id="229"><img data-dcnode-id="231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="230" instrument_node="">2</span></span><span class="bad" data-dcnode-id="226"><img data-dcnode-id="228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="227" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="223" idx="623924" un="Ambrina"><img data-dcnode-id="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="224" instrument_node="">Reply</span></span></div><br data-dcnode-id="221"><br data-dcnode-id="220"></div><div class="clear" data-dcnode-id="218"></div><span data-dcnode-id="217" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">ok thank you so  much for your kindness.</span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="129" id="qa614332" idx="3"><div class="qa-list-q-info" data-dcnode-id="203"><span data-dcnode-id="211" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="209" val="0"><span data-dcnode-id="210" instrument_node="">yasmine</span></font><span data-dcnode-id="208" instrument_node=""> from MALAYSIA | Oct. 04, 2017 21:12</span><span data-dcnode-id="205" idx="614332" un="yasmine"><img data-dcnode-id="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="206" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="204"></div></div><div class="qa-list-q-title" data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">we are travelling to beijing with infants on end of november. what to expect?</span></div><div class="qa-list-q-content" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">how cold it will be? is it safe to bring baby below 6 months old during winter season? </span></div><div class="qa-list-a" data-dcnode-id="130"><div class="qa-list-a-title" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Answers (3)</span></div><div class="qa-list-a-item" data-dcnode-id="175" id="qa-list-a-item-528156" val="528156"><div class="qa-list-a-info" data-dcnode-id="180"><span data-dcnode-id="196" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="194" val="0"><span data-dcnode-id="195" instrument_node="">Sara</span></font><span data-dcnode-id="193" instrument_node=""> from SWITZERLAND | Oct. 11, 2017 02:20</span><div class="replyAction" data-dcnode-id="183" idx="0"><span class="good" data-dcnode-id="190"><img data-dcnode-id="192" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="191" instrument_node="">2</span></span><span class="bad" data-dcnode-id="187"><img data-dcnode-id="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="188" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="184" idx="614332" un="yasmine"><img data-dcnode-id="186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="185" instrument_node="">Reply</span></span></div><br data-dcnode-id="182"><br data-dcnode-id="181"></div><div class="clear" data-dcnode-id="179"></div><span data-dcnode-id="178" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">According to former data, it may be 10C below zero to 5C with haze, so you are not suggested to bring baby outdoors in such weather. By the way, you need to take your sweaters, heavy coat, gloves and mask. </span></div></div><div class="qa-list-a-item" data-dcnode-id="153" id="qa-list-a-item-528184" val="528184"><div class="qa-list-a-info" data-dcnode-id="158"><span data-dcnode-id="174" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="172" val="0"><span data-dcnode-id="173" instrument_node="">Yasmine</span></font><span data-dcnode-id="171" instrument_node=""> from MALAYSIA | Oct. 11, 2017 03:43</span><div class="replyAction" data-dcnode-id="161" idx="1"><span class="good" data-dcnode-id="168"><img data-dcnode-id="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="169" instrument_node="">2</span></span><span class="bad" data-dcnode-id="165"><img data-dcnode-id="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="166" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="162" idx="614332" un="yasmine"><img data-dcnode-id="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="163" instrument_node="">Reply</span></span></div><br data-dcnode-id="160"><br data-dcnode-id="159"></div><div class="clear" data-dcnode-id="157"></div><span data-dcnode-id="156" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Thank you Sara. We already booked the tickets so its impossible to back off. This is my first travelling to four season country so i have no clue! Other than jacket, wool socks etc, what else do i need to prepare? For infants, especially </span></div></div><div class="qa-list-a-item" data-dcnode-id="131" id="qa-list-a-item-528188" val="528188"><div class="qa-list-a-info" data-dcnode-id="136"><span data-dcnode-id="152" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="150" val="0"><span data-dcnode-id="151" instrument_node="">Sara</span></font><span data-dcnode-id="149" instrument_node=""> from SWITZERLAND | Oct. 11, 2017 03:51</span><div class="replyAction" data-dcnode-id="139" idx="2"><span class="good" data-dcnode-id="146"><img data-dcnode-id="148" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="147" instrument_node="">1</span></span><span class="bad" data-dcnode-id="143"><img data-dcnode-id="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="144" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="140" idx="614332" un="yasmine"><img data-dcnode-id="142" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="141" instrument_node="">Reply</span></span></div><br data-dcnode-id="138"><br data-dcnode-id="137"></div><div class="clear" data-dcnode-id="135"></div><span data-dcnode-id="134" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Well, you need to bring the sweaters, down coat and a heavy scarf. Have a nice trip!</span></div></div></div></div></div><div class="qa-more" data-dcnode-id="125"><a class="a_b_btn" data-dcnode-id="126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//answers.travelchinaguide.com/search.aspx%3Fq%3DBest%2520Time%2520to%2520Visit%2520Beijing" target="_blank"><span data-dcnode-id="127" instrument_node="">More Questions &amp; Answers</span></a></div><div class="videoLoadingContainer" data-dcnode-id="124" style="text-align:center;display:block"></div><div class="qa-form" data-dcnode-id="95"><div class="qa-form-title" data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">Ask a Question</span></div><form data-dcnode-id="98" onsubmit="return false"><div data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Question Summary (100 characters)</span></div><div data-dcnode-id="118"><input class="qa-form-input" data-dcnode-id="119" maxlength="100" type="text"></div><div data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">Details (optional) (2,000 characters)</span></div><div data-dcnode-id="114"><textarea class="qa-form-content" data-dcnode-id="115" maxlength="2000"></textarea></div><div class="qa-user qa-user-question" data-dcnode-id="101"><span class="qa-user-1" data-dcnode-id="110"><i data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">Name</span></i><input data-dcnode-id="111" id="g_name" name="g_name" type="text"></span><span class="qa-user-2" data-dcnode-id="106"><i data-dcnode
