</span><b data-dcnode-id="366"><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457" style="margin-bottom: 11px; margin-top:11px"><span data-dcnode-id="1458" instrument_node="">If you're new to independent travel, or even if 
you're not, the need to plan and book everything yourself can some times seem 
daunting.&nbsp; You often need to book different parts of the trip separately, 
and you need to be sure that it will all fit together.&nbsp; But it's not really 
difficult.&nbsp; This page explains how I plan a complex journey and work out a 
budget for the trip, as you might find the same technique useful.&nbsp; </span></p><span data-dcnode-id="1456" instrument_node="">
</span><h2 data-dcnode-id="1454" style="margin-bottom: 11px; margin-top:22px"><span data-dcnode-id="1455" instrument_node="">Why it pays to plan...</span></h2><span data-dcnode-id="1453" instrument_node="">
</span><ul data-dcnode-id="1427"><span data-dcnode-id="1452" instrument_node="">
</span><li data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449" style="margin-bottom: 11px; margin-top:11px"><span data-dcnode-id="1450" instrument_node="">To make sure your itinerary works.&nbsp; 
OK, so if it takes 48 hours to reach Moscow, and the Moscow-Beijing train only runs on 
Tuesdays and takes 6 days, and the Beijing-Hanoi train only runs on Sundays and 
Thursdays, and you can probably get 3 weeks off work, on what day do you need to 
leave London and will this all fit into 3 weeks?&nbsp; The 
only way to be sure is to plan out an itinerary for yourself...</span></p><span data-dcnode-id="1448" instrument_node="">
</span></li><span data-dcnode-id="1446" instrument_node="">
</span><li data-dcnode-id="1441"><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443" style="margin-bottom: 11px; margin-top:11px"><span data-dcnode-id="1444" instrument_node="">To plan a budget.&nbsp; I'm often asked 'How 
much does a trip like this cost?'&nbsp; This is independent travel, not an 
inclusive package, so it's as long as a piece of string.&nbsp; Do you want a 30 day trip with 5 star hotels and lots of 
tours, stopovers and restaurant meals?&nbsp; Or a 10 day trip with minimal 
stopovers, travelling 2nd class, staying in 
hostels and living on chocolate digestives?&nbsp; The possibilities are endless.&nbsp; The best way to work out costs is to sketch out an itinerary and 
budget and adjust what you want to what you can afford.</span></p><span data-dcnode-id="1442" instrument_node="">
</span></li><span data-dcnode-id="1440" instrument_node="">
</span><li data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437" style="margin-bottom: 11px; margin-top:11px"><span data-dcnode-id="1438" instrument_node="">To make sure you book the right 
trains, ferries &amp; buses for the right date.&nbsp; Obvious, really.&nbsp; But 
with independent travel you'll often have to put the trip together yourself, 
booking each leg of the journey separately via a different agency or website, and it pays to make sure you 
book the 
right tickets for the right day.</span></p><span data-dcnode-id="1436" instrument_node="">
</span></li><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1429"><span data-dcnode-id="1433" instrument_node="">
</span><p align="left" data-dcnode-id="1431" style="margin-bottom: 11px; margin-top:11px"><span data-dcnode-id="1432" instrument_node="">To see if you're happy with how long you get in key 
places.&nbsp; Many people want to stop everywhere and see everything, but 
simply haven't thought through how long they'll actually get in each place after 
allowing for 
travelling time.&nbsp; Again, plan it out, and if necessary adjust your plans, 
trading off longer stays in key 
places for a more relaxed journey against trying to stop everywhere to see 
everything.</span></p><span data-dcnode-id="1430" instrument_node="">
</span></li><span data-dcnode-id="1428" instrument_node="">
</span></ul><span data-dcnode-id="1426" instrument_node="">
</span><h2 data-dcnode-id="1424" style="margin-bottom: 11px; margin-top:22px"><span data-dcnode-id="1425" instrument_node="">The simple spreadsheet 
technique...</span></h2><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421" style="margin-bottom: 15px; margin-top:11px"><span data-dcnode-id="1422" instrument_node="">Doesn't everyone 
do this?&nbsp; I thought this 
was obvious, but feedback suggests they don't, so here's how I sketch out a 
big trip.&nbsp; I use Microsoft Excel to sketch out 
an itinerary and budget like the one below.&nbsp; You can use a table in 
Word or another word processor if you can't use Excel.&nbsp; The 
table below is just an example, so please don't read anything into the times, fares or costs.&nbsp; 
They are 
just to 
demonstrate how to plan a trip, not a real suggested itinerary!&nbsp; This example 
is for a Trans-Siberian trip, 
but the technique works for any complex journey.</span></p><span data-dcnode-id="1420" instrument_node="">

</span><li data-dcnode-id="436"><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438" style="margin-top: 8px; margin-bottom:8px"><span data-dcnode-id="439" instrument_node="">Column A shows the date.&nbsp; If I need to pre-book 
any part of my itinerary, I can now book it for the right date...</span></p><span data-dcnode-id="437" instrument_node="">
</span></li><span data-dcnode-id="435" instrument_node="">
</span><li data-dcnode-id="430"><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432" style="margin-top: 8px; margin-bottom:8px"><span data-dcnode-id="433" instrument_node="">Column B shows the days of the week.&nbsp; If I need to 
take a 
train or ferry that only runs on certain days of the week, I can see that I've got the 
day 
right!</span></p><span data-dcnode-id="431" instrument_node="">
</span></li><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426" style="margin-top: 8px; margin-bottom:8px"><span data-dcnode-id="427" instrument_node="">Column C shows a rough idea of what I might do 
that day.&nbsp; I 
can see how long I get in major stops, and can adjust the itinerary if I think 
it's not long enough.&nbsp; It can be for planning purposes only - you don't 
have to stick to it rigidly once you're travelling!</span></p><span data-dcnode-id="425" instrument_node="">
</span></li><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420" style="margin-top: 8px; margin-bottom:8px"><span data-dcnode-id="421" instrument_node="">Column D shows likely train, bus or ferry costs.&nbsp; 
I use rough estimates if I'm not 100% sure.</span></p><span data-dcnode-id="419" instrument_node="">
</span></li><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="412"><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414" style="margin-top: 8px; margin-bottom:8px"><span data-dcnode-id="415" instrument_node="">Column E shows likely hotel costs.&nbsp; The hotel cost is zero when 
I'm on a sleeper train.&nbsp; I 
also allow a higher budget in an expensive western city than I would in a cheaper city.&nbsp; 
If I know where I want to stay, I enter the actual cost, otherwise I use a rough 
estimate.</span></p><span data-dcnode-id="413" instrument_node="">
</span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="406"><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408" style="margin-top: 8px; margin-bottom:8px"><span data-dcnode-id="409" instrument_node="">Column F is for daily spending on food, local transport, 
normal museum entrance fees 
and so on.&nbsp; Some people try and plan a whole trip using a flat 'budget per 
day' which never changes, but I adjust the amount I budget for depending on whether I'm on a train 
or in a 
city, in a western city or a third world city, likely to want a restaurant meal 
or happy with snacks and so on.</span></p><span data-dcnode-id="407" instrument_node="">
</span></li><span data-dcnode-id="405" instrument_node="">
</span><li data-dcnode-id="400"><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402" style="margin-top: 8px; margin-bottom:8px"><span data-dcnode-id="403" instrument_node="">Column G is for large and predictable  one-off costs, 
like expensive entrance fees to major attractions.&nbsp; For example, the 
entrance fee to Petra in Jordan is about 30 Dinar (£30 or $50).&nbsp; If you've 
only budgeted for £30 a day to cover everything including food, then that's a 
problem, but if you've made provision for predictable large one-off costs like this, 
your budget won't be blown, you won't be stressed, and you won't feel compelled 
to go without food that day...&nbsp; It helps to have read your guidebook to 
anticipate these expenses!</span></p><span data-dcnode-id="401" instrument_node="">
</span></li><span data-dcnode-id="399" instrument_node="">
</span></ul><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="393" style="margin-top: 8px; margin-bottom:8px"><span data-dcnode-id="396" instrument_node="">This planning technique is simply my own method.&nbsp; 
Was this helpful? </span><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seat61.com/email.htm"><span data-dcnode-id="395" instrument_node="">
Let me know what you think!</span></a></p><span data-dcnode-id="392" instrument_node="">
