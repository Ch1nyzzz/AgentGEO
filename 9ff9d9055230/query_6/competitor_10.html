</span></div><span data-dcnode-id="623" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="615"><span data-dcnode-id="622" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">
		Which is more convenient for intercity travel, train or flight?
	</span></h3><span data-dcnode-id="619" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">
		It is suggested you take a high speed train if the travel time is less than 5 or 6 hours, as the trains between major cities are frequently scheduled and the railway stations are usually in the downtown area with easy access. However, for a longer journey, a flight is more convenient to save you from the long-time fatigue you may experience on a train.
	</span></div><span data-dcnode-id="616" instrument_node="">
</span></div><span data-dcnode-id="614" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="604"><span data-dcnode-id="613" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">
		How far in advance should I book the tickets for trains, flights, or buses?
	</span></h3><span data-dcnode-id="610" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="606"><span data-dcnode-id="609" instrument_node="">
		For train tickets, the answer is 'as early as possible', for there is usually a ticket shortage especially during holidays. If you book with an agency like us, you can submit the reservation once your travel date is decided; even if it is months or a year later. If you want to buy the tickets on your own, note that sales on the official website starts 30 days before the train's departure date, and at the railway stations 28 days before.</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">
It is suggested that flight tickets are bought one month before when there is usually a discount. Generally, bus tickets are easy to buy at the bus station, so a reservation is not necessary.
	</span></div><span data-dcnode-id="605" instrument_node="">
</span></div><span data-dcnode-id="603" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="595"><span data-dcnode-id="602" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">
		How about the urban public transport? Which is better, subway or bus? Are taxis convenient and affordable?
	</span></h3><span data-dcnode-id="599" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">
		Public bus is a common vehicle reaching every corner of the city. In big cities, subway is more convenient to avoid traffic jams and save time. Sometimes when there is no direct bus or subway to your destination, taxi is a wise and affordable choice – CNY8-15 for the first 2 or 3 kilometers and about CNY2 for each extra kilometer.
	</span></div><span data-dcnode-id="596" instrument_node="">
</span></div><span data-dcnode-id="594" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="586"><span data-dcnode-id="593" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">
		Is it easy to find a hotel or should I book in advance?
	</span></h3><span data-dcnode-id="590" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">
		It is quite easy to find star-rated hotels, chain hotels, hostels, and inns in most cities. Even in some rural areas, you can find family hostels to spend the night. A reservation is not a must on ordinary days, but you can book one week in advance to ensure a room with satisfactory conditions. An early reservation is terribly necessary during holidays, especially the National Day Holiday from Oct. 1 to 7.
	</span></div><span data-dcnode-id="587" instrument_node="">
</span></div><span data-dcnode-id="585" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="577"><span data-dcnode-id="584" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">
		I cannot speak Chinese. Is it ok? Do Chinese people understand simple English?
	</span></h3><span data-dcnode-id="581" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">
		It is ok for non-Chinese speakers. You can see English instructions at airports, train stations, subway stations, road signs, and scenic areas. Most young people in China can speak simple English. You can ask them for help if needed. Some translation apps can also be helpful.
	</span></div><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="568"><span data-dcnode-id="575" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">
		How much does it cost to travel in China? Where can I exchange money? Is it common to pay by cash or credit card?
	</span></h3><span data-dcnode-id="572" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">
		For a budget independent traveler, a daily cost of USD120-150 is needed to cover the expense of sightseeing, dining, transportation, and accommodation. It is suggested you exchange for CNY at Bank of China or airports as attractions, hotels, and restaurants in China don't accept foreign currency. You can withdraw cash either at the bank counters or ATM machines which have the same symbols as your card. Union Pay credit cards are widely used in China. In some large shopping malls in major cities, credit cards of Visa and MasterCard are acceptable.
	</span></div><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span><div class="faqItem show" data-dcnode-id="559"><span data-dcnode-id="566" instrument_node="">
</span><h3 class="faqTitle" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">
		Where are the best shopping places, for clothes, electronic devices, and specialties like silk?
	</span></h3><span data-dcnode-id="563" instrument_node="">
</span><div class="faqAnswer" data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">
		Beside branded products in big department stores, it is also a good choice to go to shopping streets, such as Wangfujing Street in Beijing, and Nanjing Road in Shanghai. Guangzhou is a famous wholesale center for clothes, shoes, and bags; Yiwu has China's largest small commodity market; Shenzhen and Hong Kong are best places to buy electronic products; Hangzhou abounds with traditional Chinese silk products.
	</span></div><span data-dcnode-id="560" instrument_node="">
</span></div><span data-dcnode-id="558" instrument_node="">
</span></div><span data-dcnode-id="556" instrument_node="">
</span></div><span data-dcnode-id="554" instrument_node="">

 data-dcnode-id="295"><span data-dcnode-id="303" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="301" val="0"><span data-dcnode-id="302" instrument_node="">Shannon</span></font><span data-dcnode-id="300" instrument_node=""> | Apr. 30, 2020 00:32</span><span data-dcnode-id="297" idx="756001" un="Shannon"><img data-dcnode-id="299" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="298" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="296"></div></div><div class="qa-list-q-title" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Hi</span></div><div class="qa-list-q-content" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Does Google maps work in China?</span></div><div class="qa-list-a" data-dcnode-id="266"><div class="qa-list-a-title" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="267" id="qa-list-a-item-648096" val="648096"><div class="qa-list-a-info" data-dcnode-id="272"><span data-dcnode-id="288" instrument_node="">Answered by </span><font class="uname0" data-dcnode-id="286" val="0"><span data-dcnode-id="287" instrument_node="">Lily Chao</span></font><span data-dcnode-id="285" instrument_node=""> | Apr. 30, 2020 01:11</span><div class="replyAction" data-dcnode-id="275" idx="0"><span class="good" data-dcnode-id="282"><img data-dcnode-id="284" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="283" instrument_node="">0</span></span><span class="bad" data-dcnode-id="279"><img data-dcnode-id="281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="280" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="276" idx="756001" un="Shannon"><img data-dcnode-id="278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="277" instrument_node="">Reply</span></span></div><br data-dcnode-id="274"><br data-dcnode-id="273"></div><div class="clear" data-dcnode-id="271"></div><span data-dcnode-id="270" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Google map is blocked in China. You can download Baidu Map or Gaode Map which can be used in China.</span></div></div></div></div><div class="qa-list-q-item" data-dcnode-id="214" id="qa747209" idx="4"><div class="qa-list-q-info" data-dcnode-id="256"><span data-dcnode-id="264" instrument_node="">Asked by </span><font class="uname0" data-dcnode-id="262" val="0"><span data-dcnode-id="263" instrument_node="">pierre belisle</span></font><span data-dcnode-id="261" instrument_node=""> from CANADA | Dec. 23, 2019 08:55</span><span data-dcnode-id="258" idx="747209" un="pierre belisle"><img data-dcnode-id="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="259" instrument_node="">Reply</span></span><div class="clear" data-dcnode-id="257"></div></div><div class="qa-list-q-title" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">montreal to bejing-5 h waiting time at the airport-bejing to singapour 4days- </span></div><div class="qa-list-q-content" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">27 cruise to shanghai- we want to stay in Shanghai for 3 days, are we eligible for 144 hour free transit visa</span></div><div class="qa-list-a" data-dcnode-id="215"><div class="qa-list-a-title" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Answers (1)</span></div><div class="qa-list-a-item" data-dcnode-id="216" id="qa-list-a-item-640063" val="640063"><div class="qa-list-a-info" data-dcnode-id="232"><span data-dcnode-id="249" instrument_node="">Answered by </span><font class="uname1" data-dcnode-id="246" val="90254"><a data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//community.travelchinaguide.com/inc/jumpto.asp%3Fu%3D90254" target="_blank"><span data-dcnode-id="248" instrument_node="">ZUPAN</span></a></font><span data-dcnode-id="245" instrument_node=""> | Dec. 23, 2019 15:32</span><div class="replyAction" data-dcnode-id="235" idx="0"><span class="good" data-dcnode-id="242"><img data-dcnode-id="244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/good0.gif&amp;raw"><span data-dcnode-id="243" instrument_node="">0</span></span><span class="bad" data-dcnode-id="239"><img data-dcnode-id="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/bad0.gif&amp;raw"><span data-dcnode-id="240" instrument_node="">0</span></span><span class="btn-qa-reply2" data-dcnode-id="236" idx="747209" un="pierre belisle"><img data-dcnode-id="238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.travelchinaguide.com/images/background/icon/btn-reply2.gif&amp;raw"><span data-dcnode-id="237" instrument_node="">Reply</span></span></div><br data-dcnode-id="234"><br data-dcnode-id="233"></div><div class="clear" data-dcnode-id="231"></div><span data-dcnode-id="230" instrument_node=""> </span><div class="qa-list-a-content" data-dcnode-id="217"><span data-dcnode-id="229" instrument_node="">Your first stop, the one in Beijing, is eligible for 24 hour visa free transit without any doubt. So, you don't need any kind of visa for your transit in Beijing.</span><br data-dcnode-id="228"><br data-dcnode-id="227"><span data-dcnode-id="226" instrument_node="">You will be also eligible for 144 hour visa free transit in Shanghai, under the two conditions:</span><br data-dcnode-id="225"><br data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">- Your cruise is not allowed to have its last port of call, immediately before Shanghai, in mainland China.</span><br data-dcnode-id="222"><span data-dcnode-id="221" instrument_node="">- Your flight out of Shanghai to, I assume Canada, is not allowed to have any additional landing within mainland China and in the country where your cruise will have its last port of call, immediately before Shanghai.</span><br data-dcnode-id="220"><br data-dcnode-id="219"><span data-dcnode-id="218" instrument_node="">If your itinerary fulfills the above mentioned conditions, you will be definitely eligible for 144 hour visa free transit in Shanghai area. </span></div></div></div></div></div><div class="qa-more" data-dcnode-id="210"><a class="a_b_btn" data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//answers.travelchinaguide.com/10195.htm" target="_blank"><span data-dcnode-id="212" instrument_node="">More Questions &amp; Answers</span></a></div><div class="videoLoadingContainer" data-dcnode-id="209" style="text-align:center;display:block"></div><div class="qa-form" data-dcnode-id="180"><div class="qa-form-title" data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Ask a Question</span></div><form data-dcnode-id="183" onsubmit="return false"><div data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Question Summary (100 characters)</span></div><div data-dcnode-id="203"><input class="qa-form-input" data-dcnode-id="204" maxlength="100" type="text"></div><div data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Details (optional) (2,000 characters)</span></div><div data-dcnode-id="199"><textarea class="qa-form-content" data-dcnode-id="200" maxlength
