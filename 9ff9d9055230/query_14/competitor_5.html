</span><h2 data-dcnode-id="1387" id="h-22-kremlin-and-red-square-moscow"><span data-dcnode-id="1388" instrument_node="">22. Kremlin and Red Square, Moscow</span></h2><span data-dcnode-id="1386" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1375"><span data-dcnode-id="1385" instrument_node="">The </span><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Kremlin</span></strong><span data-dcnode-id="1382" instrument_node=""> and adjoining </span><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Red Square</span></strong><span data-dcnode-id="1379" instrument_node=""> make up
the heart of </span><strong data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Moscow</span></strong><span data-dcnode-id="1376" instrument_node="">. They’ve been at the center of Russia’s history and politics for over
700 years.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1357"><span data-dcnode-id="1373" instrument_node="">In addition to being a political center,
the Kremlin is also home to many Russian Orthodox churches. Chief among them
are the </span><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Cathedral of the Dormition</span></strong><span data-dcnode-id="1370" instrument_node="">, </span><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Church of the Annunciation</span></strong><span data-dcnode-id="1367" instrument_node="">, and </span><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Church of
the Archangel</span></strong><span data-dcnode-id="1364" instrument_node="">. A stone’s throw away is </span><strong data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">St. Basil’s Cathedral</span></strong><span data-dcnode-id="1361" instrument_node="">, perhaps the most iconic structure in all of </span><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Russia</span></strong><span data-dcnode-id="1358" instrument_node="">.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1351"><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">How to get there:
</span></strong><span data-dcnode-id="1353" instrument_node="">Red Square is less than an hour by bus, train,
and car from Moscow’s Sheremetyevo International Airport.</span><strong data-dcnode-id="1352"></strong></p><span data-dcnode-id="1350" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1344"><img alt="St. Basil's Basilica in Moscow, Russia." class="wp-image-4422" data-dcnode-id="1349" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow.jpg" data-lazy-srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow-300x225.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow-768x576.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow-585x439.jpg 585w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20600'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">&lt;img src="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow.jpg" alt="St. Basil's Basilica in Moscow, Russia." class="wp-image-4422" width="800" height="600" srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow-300x225.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow-768x576.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/St-Basils-Basilica-in-Moscow-585x439.jpg 585w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">St. Basil’s Basilica is a Russian Orthodox Church built in 1561. Its flamboyant architecture is totally unique, and something you won’t find anywhere else in Russia (or the world). </span></figcaption></figure><span data-dcnode-id="1343" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1342" style="height:25px"></div><span data-dcnode-id="1341" instrument_node="">
</span><h2 data-dcnode-id="1339" id="h-23-acropolis-of-athens-one-of-the-top-ancient-unesco-sites"><span data-dcnode-id="1340" instrument_node="">23. Acropolis of Athens – One of the Top Ancient UNESCO Sites</span></h2><span data-dcnode-id="1338" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1330"><span data-dcnode-id="1337" instrument_node="">The </span><strong data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Acropolis of Athens</span></strong><span data-dcnode-id="1334" instrument_node=""> is the heart and soul of
the Greek capital. This </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myglobalviewpoint.com/ancient-athens/"><span data-dcnode-id="1333" instrument_node="">ancient citadel</span></a><span data-dcnode-id="1331" instrument_node="">
stands atop a cliff overlooking the bustling city below.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1315"><span data-dcnode-id="1328" instrument_node="">Built during the 5th century B.C.,
the </span><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Acropolis</span></strong><span data-dcnode-id="1325" instrument_node=""> is a complex of temples, monuments, and statues. It includes top sights
such as the </span><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Parthenon</span></strong><span data-dcnode-id="1322" instrument_node="">, </span><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Temple of Athena Nike</span></strong><span data-dcnode-id="1319" instrument_node="">, and </span><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Odeon of
Herodes Atticus</span></strong><span data-dcnode-id="1316" instrument_node="">.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1309"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">How to get there:
</span></strong><span data-dcnode-id="1311" instrument_node="">When you’re in Athens, look up and you won’t
miss it.</span><strong data-dcnode-id="1310"></strong></p><span data-dcnode-id="1308" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1302"><img alt="The Acropolis of Athens is one of the world's most beautiful ancient ruins." class="wp-image-4423" data-dcnode-id="1307" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens.jpg" data-lazy-srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-300x199.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-768x509.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-780x516.jpg 780w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-585x388.jpg 585w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-263x175.jpg 263w" height="530" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20530'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">&lt;img src="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens.jpg" alt="The Acropolis of Athens is one of the world's most beautiful ancient ruins." class="wp-image-4423" width="800" height="530" srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-300x199.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-768x509.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-780x516.jpg 780w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-585x388.jpg 585w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Acropolis-of-Athens-263x175.jpg 263w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">For over 2,000 years, the Acropolis has stood as a symbol of Ancient Greece and its achievements in art, architecture, and philosophy. </span></figcaption></figure><span data-dcnode-id="1301" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1300" style="height:25px"></div><span data-dcnode-id="1299" instrument_node="">
</span><h2 data-dcnode-id="1297" id="h-24-historic-centre-of-bukhara-uzbekistan"><span data-dcnode-id="1298" instrument_node="">24. Historic Centre of Bukhara, Uzbekistan</span></h2><span data-dcnode-id="1296" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1285"><span data-dcnode-id="1295" instrument_node="">Situated along the historic </span><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Silk Road</span></strong><span data-dcnode-id="1292" instrument_node=""> route, </span><strong data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Bukhara</span></strong><span data-dcnode-id="1289" instrument_node=""> is a
city in </span><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Uzbekistan</span></strong><span data-dcnode-id="1286" instrument_node=""> that’s over 2,000 years old. It contains 140 architectural treasures—including
mosques, bazaars, and medressas— making it a hub of Islamic culture.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">This ancient city hasn’t changed
much since medieval times, and that’s precisely why it draws people from all
over the world.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1276"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">How to get there:
</span></strong><span data-dcnode-id="1278" instrument_node="">Bukhara, and Uzbekistan in general, are
definitely off the beaten path. The most convenient way to get here is by
taking a flight from Moscow, which currently has services three days a week
(Wednesday, Friday, and Sunday).</span><strong data-dcnode-id="1277"></strong></p><span data-dcnode-id="1275" instrument_node="">

</span><h2 data-dcnode-id="1252" id="h-25-mount-fuji-japan"><span data-dcnode-id="1253" instrument_node="">25. Mount Fuji, Japan</span></h2><span data-dcnode-id="1251" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1246"><span data-dcnode-id="1250" instrument_node="">At over 12,380 feet (3,775 m) in elevation,
</span><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Mount Fuji</span></strong><span data-dcnode-id="1247" instrument_node=""> towers over the Japanese landscape below. It’s been a source of
inspiration for writers, artists, and worshippers going back over a thousand
years.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1237"><span data-dcnode-id="1244" instrument_node="">This snow-capped mountain is
climbed by hundreds of thousands of pilgrims each year. As of 2013, </span><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Mount Fuji</span></strong><span data-dcnode-id="1241" instrument_node=""> is
deemed as a </span><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">UNESCO
World Heritage Site</span></strong><span data-dcnode-id="1238" instrument_node="">, due to its cultural and
spiritual importance.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1231"><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">How to get there:
</span></strong><span data-dcnode-id="1233" instrument_node="">Mount Fuji is just a 2-hour train ride from
Tokyo.</span><strong data-dcnode-id="1232"></strong></p><span data-dcnode-id="1230" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1224"><img alt="Mt. Fuji is a beautiful mountain in Japan. It's one of the best and most noteworthy UNESCO World Heritage Sites." class="wp-image-4425" data-dcnode-id="1229" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan.jpg" data-lazy-srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan-300x225.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan-768x576.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan-585x439.jpg 585w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20600'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">&lt;img src="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan.jpg" alt="Mt. Fuji is a beautiful mountain in Japan. It's one of the best and most noteworthy UNESCO World Heritage Sites." class="wp-image-4425" width="800" height="600" srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan-300x225.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan-768x576.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mount-Fuji-Japan-585x439.jpg 585w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">“He who climbs Mt. Fuji [once] is a wise man; he who climbs twice is a fool.” – Japanese proverb </span></figcaption></figure><span data-dcnode-id="1223" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1222" style="height:25px"></div><span data-dcnode-id="1221" instrument_node="">
</span><h2 data-dcnode-id="1219" id="h-26-mesa-verde-national-park-usa"><span data-dcnode-id="1220" instrument_node="">26. Mesa Verde National Park, USA</span></h2><span data-dcnode-id="1218" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1202"><span data-dcnode-id="1217" instrument_node="">Located in southwestern</span><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node=""> </span></strong><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myglobalviewpoint.com/coolest-airbnbs-in-colorado/"><span data-dcnode-id="1214" instrument_node="">Colorado</span></a><span data-dcnode-id="1212" instrument_node="">,</span><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node=""> Mesa Verde National Park </span></strong><span data-dcnode-id="1209" instrument_node="">is known for its well-preserved cliff dwellings dating back to 600 A.D. These dwellings belonged to the </span><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Ancestral Pueblo</span></strong><span data-dcnode-id="1206" instrument_node=""> people, who were formerly (and incorrectly) called the </span><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Anasazi</span></strong><span data-dcnode-id="1203" instrument_node="">. </span></p><span data-dcnode-id="1201" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">Archaeologists in </span><strong data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Mesa Verde National Park</span></strong><span data-dcnode-id="1197" instrument_node=""> have uncovered over 5,000 ancient artifacts and 600 cliff dwellings. They were mysteriously abandoned during around 1200 A.D., only to be rediscovered by cowboys in the late 19th century.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Here’s an interesting video covering Mesa Verde National Park:</span></p><span data-dcnode-id="1192" instrument_node="">
</span><div class="youtube-responsive-container" data-dcnode-id="1187"><figure data-dcnode-id="1188"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1191" data-lazy-src="https://www.youtube.com/embed/OFGoEesYLtE" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="315" loading="lazy" src="about:blank" width="560"></iframe><noscript data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">&lt;iframe width="560" height="315" src="https://www.youtube.com/embed/OFGoEesYLtE" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen=""&gt;&lt;/iframe&gt;</span></noscript></figure></div><span data-dcnode-id="1186" instrument_node="">

</span><figure class="wp-block-image is-resized" data-dcnode-id="1170"><img alt="Mesa Verde is one of the most beautiful national parks and best UNESCO World Heritage Sites." class="wp-image-4426" data-dcnode-id="1175" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA.jpg" data-lazy-srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA-300x225.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA-768x576.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA-585x439.jpg 585w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20600'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">&lt;img src="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA.jpg" alt="Mesa Verde is one of the most beautiful national parks and best UNESCO World Heritage Sites." class="wp-image-4426" width="800" height="600" srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA-300x225.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA-768x576.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2019/06/Mesa-Verde-National-Park-USA-585x439.jpg 585w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Mesa Verde National Park is home to some of the best-preserved ruins from ancient Native American civilization. </span></figcaption></figure><span data-dcnode-id="1169" instrument_node="">

</span><h2 data-dcnode-id="1150" id="h-27-rapa-nui-national-park-easter-island"><span data-dcnode-id="1151" instrument_node="">27. Rapa Nui National Park (Easter Island)</span></h2><span data-dcnode-id="1149" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1142"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Easter Island</span></strong><span data-dcnode-id="1146" instrument_node="">, known by its indigenous inhabitants as </span><strong data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Rapa Nui</span></strong><span data-dcnode-id="1143" instrument_node="">, is one of the most unique and mysterious places on Earth. It’s located in the southeastern Pacific Ocean, more than 2,182 miles (3,700 km) from Chile. As such, it’s incredibly isolated and lesser visited than the other UNESCO World Heritage Sites on this list.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1135"><img alt="Moai statues on Easter Island." class="wp-image-7083" data-dcnode-id="1140" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Stone-Statues.jpg" data-lazy-srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Stone-Statues.jpg 600w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Stone-Statues-225x300.jpg 225w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Stone-Statues-585x780.jpg 585w" height="800" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20800'%3E%3C/svg%3E" width="600"><noscript data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">&lt;img src="https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Stone-Statues.jpg" alt="Moai statues on Easter Island." class="wp-image-7083" width="600" height="800" srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Stone-Statues.jpg 600w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Stone-Statues-225x300.jpg 225w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Stone-Statues-585x780.jpg 585w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><figcaption data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Moai statues on Easter Island.</span></figcaption></figure><span data-dcnode-id="1134" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1133" style="height:30px"></div><span data-dcnode-id="1132" instrument_node="">
</span><div class="wp-block-buttons aligncenter" data-dcnode-id="1123"><span data-dcnode-id="1131" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="1125"><a class="wp-block-button__link has-text-color has-background has-luminous-vivid-orange-background-color" data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myglobalviewpoint.com/best-places-to-visit-on-the-east-coast-usa/" style="color:#ffffff"><span data-dcnode-id="1130" instrument_node="">READ </span><strong data-dcnode-id="1127"><em data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Best Places to Visit on the East Coast</span></em></strong></a></div><span data-dcnode-id="1124" instrument_node="">
</span></div><span data-dcnode-id="1122" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1121" style="height:30px"></div><span data-dcnode-id="1120" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">This island is best known for its hundreds of moai statues, made from stone by the early Rapa Nui people who lived on the island around 300 AD. Ecotourism and cultural awareness are paramount here to ensure that the cultural monuments will be preserved for generations to come. </span></p><span data-dcnode-id="1117" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Beyond the open-air museum, there’s also surfing and snorkeling that you can enjoy. </span></p><span data-dcnode-id="1114" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1110"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">How to get there: </span></strong><span data-dcnode-id="1111" instrument_node="">Take a flight to Santiago, Chile, and then from there, a six-hour flight to Easter Island. Note: There’s only one LAN Airlines flight to Easter Island per day.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1103"><img alt="Easter Island is among the best UNESCO World Heritage Sites in 2020" class="wp-image-7082" data-dcnode-id="1108" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO.jpg" data-lazy-srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO-300x134.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO-768x342.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO-585x260.jpg 585w" height="356" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20356'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">&lt;img src="https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO.jpg" alt="Easter Island is among the best UNESCO World Heritage Sites in 2020" class="wp-image-7082" width="800" height="356" srcset="https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO.jpg 800w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO-300x134.jpg 300w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO-768x342.jpg 768w, https://www.myglobalviewpoint.com/wp-content/uploads/2020/07/Easter-Island-Chile-UNESCO-585x260.jpg 585w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Easter Island is one of the most intriguing UNESCO Sites in the world.</span></figcaption></figure><span data-dcnode-id="1102" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1101" style="height:30px"></div><span data-dcnode-id="1100" instrument_node="">
</span><h2 data-dcnode-id="1098" id="h-28-hawaii-volcanoes-national-park"><span data-dcnode-id="1099" instrument_node="">28. Hawaii Volcanoes National Park</span></h2><span data-dcnode-id="1097" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">This national park is comprised of over 500 square miles of sacred land and is home to one of the world’s most active volcanoes, </span><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Kilauea</span></strong><span data-dcnode-id="1093" instrument_node="">. Here you’ll find volcanic craters, deserts and rainforests, and even ancient petroglyphs.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1087"><strong data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Kilauea</span></strong><span data-dcnode-id="1088" instrument_node=""> last erupted in 2018, and it’s considered the only “drive-in” volcano on Earth. It produces tons of lava each day, making it a popular tourist attraction. It’s truly an extraordinary experience to witness the volcano’s sheer power up close.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1081"><span data-dcnode-id="1085" instrument_node="">As a sacred place that has shaped Hawaiian culture for generations, </span><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Hawaii Volcanoes National Park</span></strong><span data-dcnode-id="1082" instrument_node=""> is easily among the best UNESCO World Heritage Sites.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1072"><span data-dcnode-id="1079" instrument_node="">On the same trip to Hawaii, be sure to carve out enough time to go island hopping to nearby Maui, </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myglobalviewpoint.com/things-to-do-on-oahu/"><span data-dcnode-id="1078" instrument_node="">Oahu</span></a><span data-dcnode-id="1076" instrument_node="">, and </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myglobalviewpoint.com/molokai-hawaii-things-to-do-travel-guide/"><span data-dcnode-id="1075" instrument_node="">Molokai</span></a><span data-dcnode-id="1073" instrument_node="">!</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1067"><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">How to get there: </span></strong><span data-dcnode-id="1068" instrument_node="">Take a flight to Hilo, which is located on the Big Island of Hawaii, and then drive about 45 minutes south.</span></p><span data-dcnode-id="1066" instrument_node="">
