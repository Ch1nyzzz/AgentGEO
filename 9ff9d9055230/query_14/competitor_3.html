m/shareArticle%3Ftrk%3D5%2BPlaces%2BIn%2BChina%2BThat%2BSHOULD%2BBe%2BUNESCO%2BWorld%2BHeritage%2BSites%26url%3Dhttps%253A%252F%252Fsublimechina.com%252F5-places-china-unesco-world-heritage-sites%252F" rel="nofollow" target="_blank"><span class="icon" data-dcnode-id="704"></span><span class="text" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Linkedin</span></span></a><a class="mashicon-reddit mashsb-noshadow" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.reddit.com/submit%3Furl%3Dhttps%253A%252F%252Fsublimechina.com%252F5-places-china-unesco-world-heritage-sites%252F%26title%3D5%2BPlaces%2BIn%2BChina%2BThat%2BSHOULD%2BBe%2BUNESCO%2BWorld%2BHeritage%2BSites" rel="nofollow" target="_blank"><span class="icon" data-dcnode-id="700"></span><span class="text" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Reddit</span></span></a><a class="mashicon-tumblr mashsb-noshadow" data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tumblr.com/share%3Fv%3D3%26u%3Dhttps%253A%252F%252Fsublimechina.com%252F5-places-china-unesco-world-heritage-sites%252F%26t%3D5%2BPlaces%2BIn%2BChina%2BThat%2BSHOULD%2BBe%2BUNESCO%2BWorld%2BHeritage%2BSites" rel="nofollow" target="_blank"><span class="icon" data-dcnode-id="696"></span><span class="text" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Tumblr</span></span></a><div class="onoffswitch2 mashsb-noshadow" data-dcnode-id="692" style="display:none;"></div></div></div></div><div data-dcnode-id="688" style="clear:both;"></div><div class="mashsb-toggle-container" data-dcnode-id="687"></div></aside><p data-dcnode-id="681"><span data-dcnode-id="685" instrument_node="">When doing research for this article, it seemed that every site I chose was already a UNESCO heritage site. This was good and bad news. It is great news for China and those travelers with the opportunity to see one of the most amazing countries in the world with some of the world’s greatest treasures. It’s bad news for me because I had to find five sites not on the UNESCO list&nbsp;when nearly everything that came to mind from the Great Wall to </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jiuzhaigou_Valley"><span data-dcnode-id="684" instrument_node="">Jiuzhaigou Valley</span></a><span data-dcnode-id="682" instrument_node="">&nbsp;Scenic and Historic Interest Area is on the list.</span></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">But after some serious thought and research, I found five worthy sites that have not yet been added to the list.</span></p><h2 data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">UNESCO World Heritage Sites</span></h2><h5 data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">What is the UNESCO World Heritage distinction and what does it mean?</span></h5><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">The United Nations Educational, Scientific, and Cultural Organization (UNESCO) founded a World Heritage Committee, which started listing sites during their first conference in 1978. Thirteen sites made the initial list and today there are nearly 1,000 sites worldwide that carry this coveted distinction.</span></p><p data-dcnode-id="668" style="text-align: center;"><span data-dcnode-id="672" instrument_node="">[</span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/create-your-tour"><span data-dcnode-id="671" instrument_node="">Create Custom China Tour Today</span></a><span data-dcnode-id="669" instrument_node="">]</span></p><p data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">Sites are selected for either cultural or natural criteria, with some locations selected as hybrids, warranting inclusion for both their natural and cultural value. Here you can find the </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//whc.unesco.org/en/criteria/"><span data-dcnode-id="666" instrument_node="">full list of criteria</span></a><span data-dcnode-id="664" instrument_node=""> that the World Heritage Committee uses to select the UNESCO World Heritage Sites.</span></p><h2 data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">5 Sites in China that should be UNESCO Heritage Sites</span></h2><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">With fifty UNESCO World Heritage Sites, China has more than any other nation in the world with the exception of Italy, which has fifty-one. However, even with the extensive list of sites designated as UNESCO World Heritage Sites in China, there are many more that are worthy of recognition. I have selected five of the most important sites that are conspicuously absent from the list.</span></p><h3 data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Harbin</span></h3><p data-dcnode-id="655"><img alt="harbin city - resize" class="size-full wp-image-7812 aligncenter" data-dcnode-id="656" height="674" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/wp-content/uploads/2016/09/harbin-city-resize.png&amp;raw" srcset="https://sublimechina.com/wp-content/uploads/2016/09/harbin-city-resize.png 900w, https://sublimechina.com/wp-content/uploads/2016/09/harbin-city-resize-300x225.png 300w, https://sublimechina.com/wp-content/uploads/2016/09/harbin-city-resize-768x575.png 768w" width="900"></p><p data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">In 2010 </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/dont-overlook-magical-city-harbin-visiting-china/"><span data-dcnode-id="653" instrument_node="">Harbin</span></a><span data-dcnode-id="651" instrument_node="">, China was dubbed “City of Music” by UNESCO giving a nod to the city’s rich musical heritage and commitment to fostering the continued growth of classical music. However, I contend that this distinction does not go far enough. Not only does the city continue to serve as a portal for Sino-Russian trade, but its rich history of cultural diffusion has created a truly unique setting of great architecture and other notable cultural aspects.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Moreover, Harbin is the site of the dark moment of Unit 731 where Japanese occupiers carried out cruelties against their Chinese captives. As many people have suggested, sites of terrible atrocities, such as the Killing Fields of Cambodia, be made UNESCO sites so that the world will never forget the evil that has been unleashed so that we may not repeat the mistakes of the past. For many reasons, Harbin should be on the coveted list.</span></p><h3 data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The Yangtze River</span></h3><p data-dcnode-id="644"><img alt="yangzte river" class="size-full wp-image-7813 aligncenter" data-dcnode-id="645" height="620" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/wp-content/uploads/2018/07/yangtse-river-900.jpg&amp;raw" srcset="https://sublimechina.com/wp-content/uploads/2018/07/yangtse-river-900.jpg 960w, https://sublimechina.com/wp-content/uploads/2018/07/yangtse-river-900-300x194.jpg 300w, https://sublimechina.com/wp-content/uploads/2018/07/yangtse-river-900-768x496.jpg 768w" width="960"></p><p data-dcnode-id="639"><span data-dcnode-id="643" instrument_node="">The Yangtze River is a major vein delivering the lifeblood of China. Aside from providing the water necessary to found numerous significant loci of cultural development of China, the Yangtze is gorgeous. Moreover, it supports much of the biodiversity that makes China so unique. UNESCO did inscribe “Three Parallel Rivers of </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/tour/amazing-7-day-tour-of-yunnan-do-kunming-dongchuan-more/"><span data-dcnode-id="642" instrument_node="">Yunnan</span></a><span data-dcnode-id="640" instrument_node=""> Protected Areas,” which includes the Mekong and Salween rivers (along with the Yangtze) in 2003. As they have stated the headwaters of these three great rivers meet at “an epicentre of Chinese biodiversity.”</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Sadly, other portions of the Yangtze are badly polluted. It is so polluted that the Baiji, one of two river dolphins in the world, which lives exclusively in the Yangtze River has been pushed to the brink of extinction. There has not been a sighting of a Baiji since 2007, and many scientists believe that the dolphin is now extinct due to pollution and a loss of habitat. Perhaps a designation of the entire Yangtze River as a UNESCO Heritage Site would spur greater conservation efforts to protect this great river and the creatures that dwell within it.</span></p><h3 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">The Bund</span></h3><p data-dcnode-id="624"><span data-dcnode-id="634" instrument_node="">This waterfront area in </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/shanghai/"><span data-dcnode-id="633" instrument_node="">Shanghai</span></a><span data-dcnode-id="631" instrument_node=""> is a center of culture and history. </span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/attraction/the-bund/"><span data-dcnode-id="630" instrument_node="">The Bund</span></a><span data-dcnode-id="628" instrument_node=""> has a slew of historical buildings, many of which were trading houses and banks for European states such as Italy, France, and Belgium. It was also home to the Russian and British consulates. The rich history and unique architecture of The Bund make it a tourist destination for anyone visiting </span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/shanghai/"><span data-dcnode-id="627" instrument_node="">Shanghai</span></a><span data-dcnode-id="625" instrument_node="">. The Bund is a physical representation of the meeting of Eastern and Western cultures and ideas. This urban treasure is an attraction that is certainly worthy of being named a UNESCO World Heritage Site.</span></p><div class="wp-caption aligncenter" data-dcnode-id="618" id="attachment_2576" style="width: 910px"><img alt="the-bund" aria-describedby="caption-attachment-2576" class="wp-image-2576 size-large" data-dcnode-id="623" height="675" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/wp-content/uploads/2016/09/the-bund-1024x768.jpg&amp;raw" srcset="https://sublimechina.com/wp-content/uploads/2016/09/the-bund-1024x768.jpg 1024w, https://sublimechina.com/wp-content/uploads/2016/09/the-bund-300x225.jpg 300w, https://sublimechina.com/wp-content/uploads/2016/09/the-bund-768x576.jpg 768w, https://sublimechina.com/wp-content/uploads/2016/09/the-bund.jpg 1280w" width="900"><p class="wp-caption-text" data-dcnode-id="619" id="caption-attachment-2576"><span data-dcnode-id="622" instrument_node="">Source: </span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.publicdomainpictures.net/view-image.php%3Fimage%3D3450%26picture%3Dshanghai-clouds"><span data-dcnode-id="621" instrument_node="">publicdomainpictures.net</span></a></p></div><h3 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The Historical Center of Xi’an</span></h3><p data-dcnode-id="614"><img alt="xian-citywall" class="alignnone size-full wp-image-7814 aligncenter" data-dcnode-id="615" height="760" sizes="(max-width: 1140px) 100vw, 1140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/wp-content/uploads/2018/07/xian-citywall-1140.jpg&amp;raw" srcset="https://sublimechina.com/wp-content/uploads/2018/07/xian-citywall-1140.jpg 1140w, https://sublimechina.com/wp-content/uploads/2018/07/xian-citywall-1140-300x200.jpg 300w, https://sublimechina.com/wp-content/uploads/2018/07/xian-citywall-1140-768x512.jpg 768w, https://sublimechina.com/wp-content/uploads/2018/07/xian-citywall-1140-1024x683.jpg 1024w, https://sublimechina.com/wp-content/uploads/2018/07/xian-citywall-1140-400x267.jpg 400w" width="1140"></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">The Silk Road, which became a UNESCO site in 2014, terminated in this ancient capital. The Mausoleum of the First Qin Emperor lies within Xi’an, with its famous terracotta army, has been a UNESCO site since 1987. However, the Historical Center of the ancient capital city does not yet have a UNESCO distinction.</span></p><p data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">A stroll through the Historical Center of Xi’an is a walk through artifacts that link the modern day visitor to China’s rich history. Xi’an’s importance cannot be overstated as it is considered to be one of the four most significant ancient capitals of the world along with Rome, Cairo, and Athens. Its unique position at the end of the Silk Road means that the ancient capital city was a meeting point for numerous cultures, ideas, and religions. The unique history of </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/xian/"><span data-dcnode-id="610" instrument_node="">Xi’an</span></a><span data-dcnode-id="608" instrument_node=""> makes its historical center an obvious choice as a UNESCO World Heritage Site.</span></p><h3 data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Victoria Harbour</span></h3><p data-dcnode-id="600"><span data-dcnode-id="604" instrument_node="">For all of its splendor and rich history, </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/hongkong/"><span data-dcnode-id="603" instrument_node="">Hong Kong</span></a><span data-dcnode-id="601" instrument_node=""> is without a UNESCO World Heritage Site.&nbsp; There are many contenders for this distinction, however, to select just one it is hard to argue against Victoria Harbour.</span></p><p data-dcnode-id="595"><span data-dcnode-id="599" instrument_node="">Victoria Harbour is a signature of </span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/hongkong/"><span data-dcnode-id="598" instrument_node="">Hong Kong</span></a><span data-dcnode-id="596" instrument_node=""> for visitors and locals alike. The scenic harbor is the site for fireworks displays, and its promenade is frequently filled with revelers. The amazing panorama, best seen at night, is renowned throughout the world. With fifty UNESCO sites, China has much to be proud of and to attract visitors. However, Hong Kong has been conspicuously overlooked, and the naming of Victoria Harbour as a UNESCO site would go a long way toward bringing Hong Kong the recognition it deserves.</span></p><div class="wp-caption aligncenter" data-dcnode-id="589" id="attachment_2575" style="width: 910px"><img alt="hong-kong-victoria-harbour" aria-describedby="caption-attachment-2575" class="wp-image-2575 size-large" data-dcnode-id="594" height="599" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sublimechina.com/wp-content/uploads/2016/09/hong-kong-victoria-harbour-1024x681.jpg&amp;raw" srcset="https://sublimechina.com/wp-content/uploads/2016/09/hong-kong-victoria-harbour-1024x681.jpg 1024w, https://sublimechina.com/wp-content/uploads/2016/09/hong-kong-victoria-harbour-300x199.jpg 300w, https://sublimechina.com/wp-content/uploads/2016/09/hong-kong-victoria-harbour-768x510.jpg 768w, https://sublimechina.com/wp-content/uploads/2016/09/hong-kong-victoria-harbour-400x267.jpg 400w" width="900"><p class="wp-caption-text" data-dcnode-id="590" id="caption-attachment-2575"><span data-dcnode-id="593" instrument_node="">Source: </span><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.publicdomainpictures.net/view-image.php%3Fimage%3D138906%26picture%3Dhong-kong-harbor"><span data-dcnode-id="592" instrument_node="">publicdomainpictures.net</span></a></p></div><div class="blog_cta" data-dcnode-id="582"><div class="cta_overlay" data-dcnode-id="588"></div><h3 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Learn How To Book The Cheapest Flights To China</span></h3><p data-dcnode-id="583"><a class="blog_cta_link pop-but pum-trigger" data-dcnode-id="584" href="#" style="cursor: pointer;"><span data-dcnode-id="585" instrument_node="">Download FREE eBook</span></a></p></div><div class="abh_box abh_box_down abh_box_business" data-dcnode-id="513"><ul class="abh_tabs" data-dcnode-id="575"><li class="abh_about abh_active" data-dcnode-id="579"><a data-dcnode-id="580" href="#abh_about"><span data-dcnode-id="581" instrument_node="">About</span></a></li><li class="abh_posts" data-dcnode-id="576"><a data-dcnode-id="577" href="#abh_posts"><span data-dcnode-id="578" instrument_node="">Latest Posts</span></a></li></ul><div class="abh_tab_content" data-dcnode-id="514"><section class="vcard abh_about_tab abh_tab" data-dcnode-id="552" style="display:block"><div class="abh_image" data-dcnode-id="571"><a class="url" data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=
