</span><p data-dcnode-id="1077"><span data-dcnode-id="1081" instrument_node="">This extraordinary town is sure to surpass your expectations. A prominent trading port between the 15th and 19th centuries, Hoi An has been excellently preserved and displays a lovely combination of foreign and native cultures. Even though the town is small, there are plenty of </span><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/best-things-to-do-in-hoi-an-vietnam/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1080" instrument_node="">exciting things to do in Hoi An</span></a><span data-dcnode-id="1078" instrument_node="">, from relaxing on the beach to getting tailor-made clothing.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9014" data-dcnode-id="1070"><img alt="Hoi An in Vietnam" class="wp-image-9014" data-dcnode-id="1075" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288-679x450.jpg 679w, https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288-768x509.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288-1024x679.jpg 1024w" height="994" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20994'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">&lt;img width="1500" height="994" src="https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288.jpg" alt="Hoi An in Vietnam" class="wp-image-9014" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288-679x450.jpg 679w, https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288-768x509.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/hoi-an-vietnam-shutterstock_543460288-1024x679.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Michal Jastrzebski / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1069" instrument_node="">
</span><h2 data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">82. Rio de Janeiro, Brazil</span></h2><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">While Rio is known for many things, its carioca landscapes definitely take the cake. The landscapes encompass major natural elements that have molded the development of the city and stretch from the top of Tijuca National Park’s highest peak at 1,021 meters down to the sea. Some of its key sites are the Rio de Janeiro Botanical Garden, hills around Guanabara Bay, and the renowned Christ the Redeemer statue.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9030" data-dcnode-id="1057"><img alt="Aerial view of Christ The Reedemer Statue and Sugar Loaf Mountain from high angle. Rio de Janeiro in Brazil." class="wp-image-9030" data-dcnode-id="1062" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845.jpg" alt="Aerial view of Christ The Reedemer Statue and Sugar Loaf Mountain from high angle. Rio de Janeiro in Brazil." class="wp-image-9030" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/rio-de-janeiro-brazil-shutterstock_414527845-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">marchello74 / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1056" instrument_node="">
</span><h2 data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">83. Palace and Park of Versailles, France</span></h2><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Once King Louis XIV moved the royal court here from Paris in 1682, it became known as the ideal royal residence at the time and continues to be one of France’s most visited sites. Maintained as the royal residence only until the reign of Louis XVI 107 years later, there continued to be a range of additions and embellishments added by a variety of decorators, sculptors, and architects. The symmetrical gardens designed by landscape architect André Le Nôtre are said to be among the best surviving examples of the French formal garden style.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9043" data-dcnode-id="1044"><img alt="Hall of Mirrors in the palace of Versailles, France" class="wp-image-9043" data-dcnode-id="1049" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290.jpg" alt="Hall of Mirrors in the palace of Versailles, France" class="wp-image-9043" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/versailles-palace-france-shutterstock_751889290-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Mister_Knight / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1043" instrument_node="">
</span><h2 data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">84. Stonehenge, England</span></h2><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Believed to be constructed from 3000 BC to 2000 BC, Stonehenge is one of the world’s most awe-inspiring prehistoric megalithic monuments. Each megalith weighs around 25 tons and stands about 7 feet wide and 13 feet high. Because of its unmatched design and sophistication, it draws visitors from all over the world and its significance continues to be explored.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9035" data-dcnode-id="1031"><img alt="Stonehenge in Wiltshire of England in cloudy weather. It is a prehistoric monument 8 miles north from Salisbury, in the place called Wiltshire in South West England. It is under protection of UNESCO." class="wp-image-9035" data-dcnode-id="1036" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004.jpg" alt="Stonehenge in Wiltshire of England in cloudy weather. It is a prehistoric monument 8 miles north from Salisbury, in the place called Wiltshire in South West England. It is under protection of UNESCO." class="wp-image-9035" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/stonehenge-england-uk-shutterstock_400089004-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Roman Babakin / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1030" instrument_node="">
</span><h2 data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">85. Historic Centre of Tallinn, Estonia</span></h2><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">Established in the 13th century and developed as a central hub of the Hanseatic League, Tallinn gives us more than enough </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/visit-estonia/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1025" instrument_node="">reasons to travel to Estonia</span></a><span data-dcnode-id="1023" instrument_node="">. Strong enough to survive war and fires, impressive architecture is demonstrated in the design of merchant houses as well as lavish churches and buildings. When the medieval lower town highlighted by church spires contrasts with the upper town which houses Toompea Castle and St. Mary’s Cathedral, it makes for a dramatic skyline and a perfect picture opportunity from land and water.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7442" data-dcnode-id="1015"><img alt="Aerial View of Tallinn Old Town in a beautiful summer day, Estonia" class="wp-image-7442" data-dcnode-id="1020" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754.jpg" alt="Aerial View of Tallinn Old Town in a beautiful summer day, Estonia" class="wp-image-7442" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/tallinn-estonia-shutterstock_532896754-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">S-F / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1014" instrument_node="">
</span><h2 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">86. Ancient Kyoto, Japan</span></h2><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Established in 794 AD, Kyoto was the capital of Japan until the mid-19th century. Its UNESCO status includes 17 locations made up of 198 buildings and 12 gardens that date back between the 10th – 17th centuries. Some of the most popular sites include the Zen Buddhist temple Kinkaku-ji and Kamigamo Shrine, one of Japan’s oldest Shinto shrines. Kyoto has also had a huge impact on landscape gardening worldwide, and a visit here will show the impressive development of both Japanese gardens and wooden architecture.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8991" data-dcnode-id="1002"><img alt="Daigo-ji temple with colorful maple trees in autumn, Kyoto, Japan" class="wp-image-8991" data-dcnode-id="1007" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221.jpg" alt="Daigo-ji temple with colorful maple trees in autumn, Kyoto, Japan" class="wp-image-8991" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/ancient-kyoto-japan-shutterstock_520418221-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Patryk Kosmider / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1001" instrument_node="">
</span><h2 data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">87. Bryggen, Norway</span></h2><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Bryggen is an old wharf that houses around 62 buildings on Bergen’s Vågen harbour. It represents the significance of the town during the Hanseatic League’s trading empire between the 14th and mid-16th centuries. The wooden buildings have fallen victim to several fires throughout the years, but they are always rebuilt with the old patterns in an attempt to preserve the authenticity of the original main structures. Bryggen is currently home to museums, restaurants, and shops, and is highlighted by the 300-year-old Bellgården building.</span></p><span data-dcnode-id="995" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8998" data-dcnode-id="989"><img alt="Famous Bryggen street with wooden colored houses in Bergen, Norway, UNESCO world heritage site" class="wp-image-8998" data-dcnode-id="994" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468-680x450.jpg 680w, https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468-768x508.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468-1024x678.jpg 1024w" height="993" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20993'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">&lt;img width="1500" height="993" src="https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468.jpg" alt="Famous Bryggen street with wooden colored houses in Bergen, Norway, UNESCO world heritage site" class="wp-image-8998" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468-680x450.jpg 680w, https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468-768x508.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/bryggen-norway-shutterstock_215341468-1024x678.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Mikhail Varentsov / shutterstock.com</span></figcaption></figure><span data-dcnode-id="988" instrument_node="">
</span><h2 data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">88. Mount Fuji, Japan</span></h2><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Japan’s highest mountain is quite the sight to see. This active stratovolcano rises to around 3,776 meters and is snow-capped for nearly half of the year. UNESCO named 25 locations of interest in this designation, the main sight being the Shintō shrine Fujisan Hongū Sengen Taisha. Throughout the site you’ll see gorgeous waterfalls and springs, Oshi lodging houses, Sengen-jinja shrines, and more.</span></p><span data-dcnode-id="982" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9022" data-dcnode-id="976"><img alt="Mount Fuji with cherry blossom at Lake kawaguchiko in japan" class="wp-image-9022" data-dcnode-id="981" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650.jpg" alt="Mount Fuji with cherry blossom at Lake kawaguchiko in japan" class="wp-image-9022" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-fuji-japan-shutterstock_598347650-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Aeypix / shutterstock.com</span></figcaption></figure><span data-dcnode-id="975" instrument_node="">
</span><h2 data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">89. Historic Centre of Bruges, Belgium</span></h2><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Bruges has remained true to its historic fabric and continues to be an impressive representation of a medieval historic settlement. Its Gothic buildings define part of its identity, and almost all of its medieval architecture is still intact. Bruges is one of Europe’s cultural and commercial capitals, and you’ll find many renowned structures here, including the Belfry of Bruges, Church of Our Lady (one of the highest brick buildings in the world), and the marble sculpture Madonna and Child (believed to be the only one of Michelangelo’s sculptures that left Italy while he was still alive).</span></p><span data-dcnode-id="969" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8997" data-dcnode-id="963"><img alt="Colorful old brick houses in the Market Square in the UNESCO World Heritage Old Town of Bruges, Belgium" class="wp-image-8997" data-dcnode-id="968" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439-678x450.jpg 678w, https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439-1024x680.jpg 1024w" height="996" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20996'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">&lt;img width="1500" height="996" src="https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439.jpg" alt="Colorful old brick houses in the Market Square in the UNESCO World Heritage Old Town of Bruges, Belgium" class="wp-image-8997" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439-678x450.jpg 678w, https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/bruges-brussels-shutterstock_576354439-1024x680.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Gabor Kovacs Photography / shutterstock.com</span></figcaption></figure><span data-dcnode-id="962" instrument_node="">
</span><h2 data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">90. Kremlin and Red Square, Moscow</span></h2><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">United in their connection to significant Russian events since the 13th century, the Kremlin and the Red Square are two of Russia’s most popular sites. Designed to be Moscow’s main marketplace, the Red Square is a plaza that runs between the Kremlin and the cultural area Kitay-gorod. No matter where you look from the Red Square you’ll see a significant building, whether it be the vibrant Saint Basil’s Cathedral or Lenin’s Mausoleum. The fortified Kremlin complex is the president’s official residence and includes five palaces, four cathedrals, several towers, and a host of other things guests can see.</span></p><span data-dcnode-id="956" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7429" data-dcnode-id="950"><img alt="St. Basils cathedral and monument to Minin and Pozharsky on Red Square in Moscow, Russia" class="wp-image-7429" data-dcnode-id="955" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614-677x450.jpg 677w, https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614-1024x681.jpg 1024w" height="997" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20997'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">&lt;img width="1500" height="997" src="https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614.jpg" alt="St. Basils cathedral and monument to Minin and Pozharsky on Red Square in Moscow, Russia" class="wp-image-7429" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614-677x450.jpg 677w, https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/moscow-russia-shutterstock_307926614-1024x681.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">andriano.cz / shutterstock.com</span></figcaption></figure><span data-dcnode-id="949" instrument_node="">
</span><h2 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">91. Loire Valley, France</span></h2><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="945" instrument_node="">This stunning area is defined by historic towns, impressive architecture, and fine wines. If you take a trip to its river banks, you’ll find fruit orchards, vineyards, and asparagus and artichoke fields. While everything in the Loire Valley is beautiful, its highlight is the Château de Chambord, which is one of the world’s most distinct châteaux because of its French Renaissance architectural style. For more information take a look at our </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/visiting-loire-valley-from-paris/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="944" instrument_node="">guide to the Loire Valley here</span></a><span data-dcnode-id="942" instrument_node="">.</span></p><span data-dcnode-id="940" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9001" data-dcnode-id="934"><img alt="Chateau de Chenonceau on the Cher River, Loire Valley, France" class="wp-image-9001" data-dcnode-id="939" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305-657x450.jpg 657w, https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305-768x526.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305-1024x702.jpg 1024w" height="1028" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201028'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">&lt;img width="1500" height="1028" src="https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305.jpg" alt="Chateau de Chenonceau on the Cher River, Loire Valley, France" class="wp-image-9001" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305-657x450.jpg 657w, https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305-768x526.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/chateau-de-chenonceau-loire-valley-france-shutterstock_740873305-1024x702.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">javarman / shutterstock.com</span></figcaption></figure><span data-dcnode-id="933" instrument_node="">
</span><h2 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">92. Erbil Citadel, Iraq</span></h2><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Erbil Citadel is a rare example of a fortified city built on a dramatic tell, an artificial mound formed from the accumulated refuse of people living on the same site for hundreds or thousands of years. Even though there’s no continuous fortification wall, 100 façades of tall, 19th-century homes built against each other give the impression of an impenetrable fortress, and they’re quite a sight to see. While its only remaining religious structure is the Mulla Afandi Mosque, its UNESCO submission boasts, “The Citadel is today one of the most dramatic and visually exciting cultural sites not only in the Middle East but also in the world.”</span></p><span data-dcnode-id="927" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9006" data-dcnode-id="921"><img alt="The Castle of Erbil, Iraq." class="wp-image-9006" data-dcnode-id="926" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158.jpg" alt="The Castle of Erbil, Iraq." class="wp-image-9006" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/erbil-citadel-iraq-shutterstock_189903158-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">fpolat69 / shutterstock.com</span></figcaption></figure><span data-dcnode-id="920" instrument_node="">
</span><h2 data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">93. Pantanal, Brazil/Bolivia/Paraguay</span></h2><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">This conservation area is home to the largest tropical wetland area in the world. Mainly located in Brazil, its estimated area is between 54,000 and 75,000 square miles and it spreads into parts of Paraguay and Bolivia. Thanks to its variety of ecosystems, a lot of flora and fauna thrive here. Home to several threatened species like the giant armadillo, marsh deer, and giant otter, it’s also believed that there are around 300 mammalian species, 400 fish species, 480 reptile species, 1,000 bird species, 3,500 plant species, and more than 9,000 invertebrate subspecies within the Pantanal.</span></p><span data-dcnode-id="914" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9023" data-dcnode-id="908"><img alt="Colorful sunset in Pantanal, Brazil" class="wp-image-9023" data-dcnode-id="913" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947.jpg" alt="Colorful sunset in Pantanal, Brazil" class="wp-image-9023" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/pantanal-south-america-shutterstock_141977947-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">ESB Professional / shutterstock.com</span></figcaption></figure><span data-dcnode-id="907" instrument_node="">
</span><h2 data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">94. Old and New Towns of Edinburgh, Scotland</span></h2><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">The wonderful contrast happening within Scotland’s capital city is what keeps people coming back again and again. The medieval Old Town, highlighted by Edinburgh Castle, shows off many 16th and 17th-century merchant and noble homes like the Gladstone’s Land mansion house; while the neoclassical New Town, which was established starting in 1767, is characterized by its sophisticated Georgian style and its large green spaces. These two distinct but equally great areas make for a </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/best-things-to-do-in-edinburgh/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="902" instrument_node="">ton of fun things to do in Edinburgh</span></a><span data-dcnode-id="900" instrument_node="">.</span></p><span data-dcnode-id="898" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7473" data-dcnode-id="892"><img alt="Edinburgh city in winter from Calton hill, Scotland, UK" class="wp-image-7473" data-dcnode-id="897" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459.jpg" alt="Edinburgh city in winter from Calton hill, Scotland, UK" class="wp-image-7473" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/calton-hill-edinburgh-scotland-shutterstock_297674459-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">alice-photo / shutterstock.com</span></figcaption></figure><span data-dcnode-id="891" instrument_node="">
</span><h2 data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">95. Swiss Alps Jungfrau-Aletsch, Switzerland</span></h2><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">The Alps’ first World Natural Heritage Site, this mountainous region has been instrumental in alpine tourism, mountaineering, European art, and literature. Swiss Alps Jungfrau-Aletsch is the most glaciated part of the European Alps and it’s home to the Aletsch Glacier, Europe’s largest glacier. Many different plant and animal species are found throughout the area, with around 1,250 animal, 1,800 vascular plant, and 700 moss types being identified.</span></p><span data-dcnode-id="885" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9036" data-dcnode-id="879"><img alt="Famous mount Jungfrau in the swiss alps" class="wp-image-9036" data-dcnode-id="884" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111.jpg" alt="Famous mount Jungfrau in the swiss alps" class="wp-image-9036" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/swiss-alps-jungfrau-switzerland-shutterstock_115483111-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Fedor Selivanov / shutterstock.com</span></figcaption></figure><span data-dcnode-id="878" instrument_node="">
</span><h2 data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">96. Notre Dame Cathedral, France</span></h2><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">One of the largest and most famous church buildings in the world, the Notre Dame Cathedral is a </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/best-tours-in-paris-france/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="873" instrument_node="">must-see Parisian attraction</span></a><span data-dcnode-id="871" instrument_node="">. Completed in 1345, its largely believed that this medieval cathedral is one of the greatest examples of French Gothic architecture on the planet.</span></p><span data-dcnode-id="869" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8009" data-dcnode-id="863"><img alt="Notre Dame Cathedral in Paris on a bright afternoon in Spring" class="wp-image-8009" data-dcnode-id="868" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708-640x450.jpg 640w, https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708-768x540.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708-1024x720.jpg 1024w" height="1054" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201054'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">&lt;img width="1500" height="1054" src="https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708.jpg" alt="Notre Dame Cathedral in Paris on a bright afternoon in Spring" class="wp-image-8009" srcset="https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708-640x450.jpg 640w, https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708-768x540.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/10/notre-dame-cathedral-paris-france-shutterstock_572332708-1024x720.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">anyaivanova / shutterstock.com</span></figcaption></figure><span data-dcnode-id="862" instrument_node="">
</span><h2 data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">97. Sydney Opera House, Australia</span></h2><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Inaugurated in 1973, this performing arts center has been labeled an architectural masterpiece. With an expressionist style and an unrivaled design that draws our attention to the vaulted shell structures on the roof, it’s had a great impact on the architectural field. The building has several performance venues and puts on more than 1,500 performances per year. Along with the impressive design, the building is set on the end of a peninsula going into the Sydney Harbour, which gives it a majestic waterscape.</span></p><span data-dcnode-id="856" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9037" data-dcnode-id="850"><img alt="Sydney Opera house close up with office buildings of Sydney Central Business District on the background. Circular Quay, Sydney Harbour" class="wp-image-9037" data-dcnode-id="855" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795.jpg" alt="Sydney Opera house close up with office buildings of Sydney Central Business District on the background. Circular Quay, Sydney Harbour" class="wp-image-9037" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/sydney-opera-house-australia-shutterstock_557938795-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Olga Kashubin / shutterstock.com</span></figcaption></figure><span data-dcnode-id="849" instrument_node="">
</span><h2 data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">98. Prambanan, Indonesia</span></h2><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Prambanan is the largest Hindu temple complex in Indonesia and is dedicated to the deities Vishnu, Shiva, and Brahma. The Prambanan Temple itself contains 240 temples, while the compound contains more than 500. The pointed structures are traditional in Hindu architecture, and the complex is highlighted by the lofty 47-meter-tall central building. In some of the temples you can even admire the narrative panels of bas-reliefs.</span></p><span data-dcnode-id="843" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9026" data-dcnode-id="837"><img alt="View of the Sewu temple complex under a blue sky with clouds. The Sewu temple is the second largest Buddhist temple of Indonesia and is located near the famous Prambanan temple." class="wp-image-9026" data-dcnode-id="842" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606.jpg" alt="View of the Sewu temple complex under a blue sky with clouds. The Sewu temple is the second largest Buddhist temple of Indonesia and is located near the famous Prambanan temple." class="wp-image-9026" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/prambanan-indonesia-shutterstock_518338606-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Juriaan Wossink / shutterstock.com</span></figcaption></figure><span data-dcnode-id="836" instrument_node="">
</span><h2 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">99. Blue Mountains, Australia</span></h2><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Eucalypt forest defines the Blue Mountains where we get to admire beautiful sandstone plateaux, gorges, waterfalls, slot canyons, and more. There’s great diversity with its flora and fauna species, as the Blue Mountains are home to around 1,500 plant species and over 400 types of animals, including many rare species like the spotted-tailed quoll and the Blue Mountain water skink.</span></p><span data-dcnode-id="830" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8785" data-dcnode-id="824"><img alt="Three Sisters Rocks, Blue Mountains National Park, Katoomba, Australia" class="wp-image-8785" data-dcnode-id="829" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567.jpg" alt="Three Sisters Rocks, Blue Mountains National Park, Katoomba, Australia" class="wp-image-8785" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/blue-mountain-national-park-australia-shutterstock_210844567-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Dmitriy Komarov / shutterstock.com</span></figcaption></figure><span data-dcnode-id="823" instrument_node="">
</span><h2 data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">100. Valletta, Malta</span></h2><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">This fortified city is one of the world’s most concentrated historic areas. Malta’s capital city is home to 320 monuments that date back to the 16th century and tell the story of artistic, civil, military, and religious history. While Malta has been ruled by a variety of civilizations from the Phoenicians to the Byzantines, many of these buildings were created during the rule of the Order of St. John. You’ll see mainly Baroque architecture when you walk around the city, with a few neoclassical, modernist, and Mannerist pieces along the way.</span></p><span data-dcnode-id="817" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9041" data-dcnode-id="811"><img alt="Valletta, Malta - The traditional houses and walls of Valletta, the capital city of Malta on an early summer morning before sunrise with clear blue sky" class="wp-image-9041" data-dcnode-id="816" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414.jpg" alt="Valletta, Malta - The traditional houses and walls of Valletta, the capital city of Malta on an early summer morning before sunrise with clear blue sky" class="wp-image-9041" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/valletta-malta-shutterstock_580612414-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Zoltan Gabor / shutterstock.com</span></figcaption></figure><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Being designated an UNESCO World Heritage Site is an honor in itself, but to be at the top of that list means you should try to get to these places as soon as possible :)</span></p><span data-dcnode-id="807" instrument_node="">
