</span><figure class="wp-block-image alignnone size-full wp-image-9048" data-dcnode-id="1427"><img alt="Landscape of Zhangjiajie. Taken from Old House Field. Located in Wulingyuan Scenic and Historic Interest Area which was designated a UNESCO World Heritage Site as well as AAAAA scenic area in china." class="wp-image-9048" data-dcnode-id="1432" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082.jpg" alt="Landscape of Zhangjiajie. Taken from Old House Field. Located in Wulingyuan Scenic and Historic Interest Area which was designated a UNESCO World Heritage Site as well as AAAAA scenic area in china." class="wp-image-9048" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/wulingyuan-china-shutterstock_449250082-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">aphotostory / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1426" instrument_node="">
</span><h2 data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">56. Historic Centre of Florence, Italy</span></h2><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">Stunning art and architecture will surround you as you walk past buildings, museums, and churches displaying the greatness of Michelangelo, Giotto, Brunelleschi, and many other artistic legends. With world-famous attractions like the Galleria dell’Accademia, where you can see Michelangelo’s David statue, and the Uffizi Gallery, one of the largest museums in the world, it’s best to </span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/skip-the-line-tickets-europe/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1421" instrument_node="">book skip-the-line tickets</span></a><span data-dcnode-id="1419" instrument_node=""> in advance so you don’t have to wait in line for hours. The largest concentration of world-renowned works of art is found here, so it should come as no surprise that Florence’s historic centre is one of the most popular UNESCO World Heritage Sites.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7475" data-dcnode-id="1411"><img alt="Beautiful sunset over Cathedral of Santa Maria del Fiore (Duomo), Florence, Italy" class="wp-image-7475" data-dcnode-id="1416" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265.jpg" alt="Beautiful sunset over Cathedral of Santa Maria del Fiore (Duomo), Florence, Italy" class="wp-image-7475" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/sunset-florence-skyline-italy-shutterstock_220854265-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">gillmar / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1410" instrument_node="">
</span><h2 data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">57. Yosemite National Park, USA</span></h2><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1406" instrument_node="">Yosemite’s glacial topology secures its spot among the </span><a data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/best-national-parks-in-the-usa/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1405" instrument_node="">best parks in the USA</span></a><span data-dcnode-id="1403" instrument_node="">. This amazing park is also typically recognized because of its huge sequoias and granite cliffs. In addition, you’ll find all sorts of picture-worthy meadows, waterfalls, streams, mountains, and a variety of plants and animals.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7665" data-dcnode-id="1395"><img alt="Yosemite National Park" class="wp-image-7665" data-dcnode-id="1400" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591.jpg" alt="Yosemite National Park" class="wp-image-7665" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/yosemite-national-park-usa-shutterstock_124360591-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Mikhail Kolesnikov / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1394" instrument_node="">
</span><h2 data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">58. Old City of Dubrovnik, Croatia</span></h2><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1390" instrument_node="">If you’re </span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/best-croatia-itinerary/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1389" instrument_node="">road tripping through Croatia</span></a><span data-dcnode-id="1387" instrument_node="">, Dubrovnik is an absolute must-see destination, and not just because of Game of Thrones. Located on the Dalmatian coast, Dubrovnik was beautifully restored and preserved after a 17th-century earthquake. Now, churches, fountains, monasteries, and palaces decorate the medieval city, and the Baroque, Gothic, and Renaissance architecture are definitely something you’ll rave about while you’re wandering the bustling streets checking out everything from local restaurants to markets.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7462" data-dcnode-id="1379"><img alt="The Old Town of Dubrovnik, Croatia" class="wp-image-7462" data-dcnode-id="1384" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818.jpg" alt="The Old Town of Dubrovnik, Croatia" class="wp-image-7462" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/aerial-view-dubrovnik-croatia-shutterstock_89060818-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Simone Simone / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1378" instrument_node="">
</span><h2 data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">59. Timbuktu, Mali</span></h2><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Located at the gateway to the Sahara Desert, this 5th-century city is known as the hub for spreading Islam throughout Africa. Reminiscent of Timbuktu’s golden age are its three landmark mosques, the 14th century Sankore, the 14th century Djinguereber, and the 15th century Sidi Yahya. Timbuktu’s esteemed past and earthen architecture are impressively displayed throughout the city, mainly in its 16 mausoleums and public holy places.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9039" data-dcnode-id="1366"><img alt="Timbuktu, Mali, Africa" class="wp-image-9039" data-dcnode-id="1371" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448-676x450.jpg 676w, https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448-768x511.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448-1024x681.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448-780x520.jpg 780w" height="998" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20998'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">&lt;img width="1500" height="998" src="https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448.jpg" alt="Timbuktu, Mali, Africa" class="wp-image-9039" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448-676x450.jpg 676w, https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448-768x511.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448-1024x681.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/timbuktu-mali-shutterstock_228834448-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Quick Shot / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1365" instrument_node="">
</span><h2 data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">60. Old Town of Ghadames, Libya</span></h2><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">With archaeological evidence dating it back to the 4th century BC, this Berber town is one of the oldest pre-Saharan settlements. The walled Old Town is located in an oasis and perfectly exemplifies a traditional settlement. Another thing the town is known for is its domestic architecture, which was practically and functionally divided into four levels that included a nearly underground system of passageways, supplies stored on the ground floor, families living on the next floor up, and open-air terraces on the roof.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9010" data-dcnode-id="1353"><img alt="Ghadames, ancient berber city, Libya, UNESCO wold heritage site. The pearl of the desert. " class="wp-image-9010" data-dcnode-id="1358" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966-672x450.jpg 672w, https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966-768x514.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966-1024x685.jpg 1024w" height="1004" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201004'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">&lt;img width="1500" height="1004" src="https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966.jpg" alt="Ghadames, ancient berber city, Libya, UNESCO wold heritage site. The pearl of the desert. " class="wp-image-9010" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966-672x450.jpg 672w, https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966-768x514.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/ghadames-libya-shutterstock_698359966-1024x685.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Aleksandra H. Kossowska / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1352" instrument_node="">
</span><h2 data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">61. Carlsbad Caverns National Park, USA</span></h2><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">A karst landscape defines Carlsbad Caverns National Park which houses more than 119 caves. Its two main standouts are the namesake Carlsbad Cavern and Lechuguilla Cave. Both are known for their natural beauty, reef formations, and geologic features, but Carlsbad Cavern is renowned for having one of the largest limestone cave chambers in the country at 4,000 feet long while Lechuguilla Cave owes its fame to its rare speleothems, or secondary mineral deposits, that provide a natural laboratory to study biological and geological processes.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9000" data-dcnode-id="1340"><img alt="Carlsbad Caverns National Park is a United States National Park located in the Guadalupe Mountains in southeastern New Mexico." class="wp-image-9000" data-dcnode-id="1345" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432.jpg" alt="Carlsbad Caverns National Park is a United States National Park located in the Guadalupe Mountains in southeastern New Mexico." class="wp-image-9000" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/carlsbad-caverns-national-park-usa-shutterstock_24622432-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Mariusz S. Jurgielewicz / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1339" instrument_node="">
</span><h2 data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">62. China Danxia, China</span></h2><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">China Danxia is characterized by red cliffs, natural pillars, waterfalls, ravines, and other striking landscapes. The distinct red color of the cliffs is due to tectonic uplift, erosion, and weathering that has been present since the Neogene. These beautiful landforms help to preserve the evergreen forest where many plants and animals find their homes, of which about 400 species are rare and possibly endangered.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9002" data-dcnode-id="1327"><img alt="Danxia in China" class="wp-image-9002" data-dcnode-id="1332" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654-679x450.jpg 679w, https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654-768x509.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654-1024x679.jpg 1024w" height="994" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20994'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">&lt;img width="1500" height="994" src="https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654.jpg" alt="Danxia in China" class="wp-image-9002" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654-679x450.jpg 679w, https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654-768x509.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/china-danxia-shutterstock_150437654-1024x679.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">suronin / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1326" instrument_node="">
</span><h2 data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">63. Old Walled City of Shibam, Yemen</span></h2><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Also known as the “Manhattan of the Desert”, this 16th-century city was the capital of the Hadramawt Kingdom and is famous for its building construction and gridded streets. Rising from the cliffs are its mud brick tower blocks, some built up to 11 levels high. The rectangular plan of the squares and streets are said to be the most successful example of traditional Hadrami urban architecture. A visit to Shibam will show how much it reflects the Wadi Hadramaut people and their former traditional way of life while also exuding traditional Muslim and Arab culture.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9032" data-dcnode-id="1314"><img alt="Yemeni boys playing soccer at Shibam, Hadramaut province, Yemen" class="wp-image-9032" data-dcnode-id="1319" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640.jpg" alt="Yemeni boys playing soccer at Shibam, Hadramaut province, Yemen" class="wp-image-9032" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/shibam-yemen-shutterstock_164398640-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">javarman / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1313" instrument_node="">
</span><h2 data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">64. Mostar, Bosnia &amp; Herzegovina</span></h2><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1309" instrument_node="">Mainly known for the Old Bridge, or Stari Most, there’s so much more to Mostar. Other than the smells of delicious cuisine and the sounds of traditional live music, there are several popular sites to see that include the remains of Cim Early Christian Basilica, Bishop’s Ordinariate, and the Tara and Halebija Towers. Well-deserving of the honor of being among </span><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/best-places-to-visit-in-europe/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1308" instrument_node="">Europe’s best cities</span></a><span data-dcnode-id="1306" instrument_node="">,</span></p><span data-dcnode-id="1304" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7430" data-dcnode-id="1298"><img alt="Beautiful view on Mostar city with old bridge and ancient buildings on Neretva river in Bosnia and Herzegovina" class="wp-image-7430" data-dcnode-id="1303" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039.jpg" alt="Beautiful view on Mostar city with old bridge and ancient buildings on Neretva river in Bosnia and Herzegovina" class="wp-image-7430" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/mostar-bosnia-shutterstock_291941039-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">RossHelen / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1297" instrument_node="">
</span><h2 data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">65. Meteora, Greece</span></h2><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">This nearly inaccessible sandstone rock formation dates back to the 11th century. Meteora is a breathtaking phenomenon that’s home to one of the biggest and most steeply built complexes, containing 24 Eastern Orthodox monasteries. In addition to the history, architecture, and views on display here, you’re sure to appreciate the 16th-century, post-Byzantine frescoes within the monasteries. The nature here, along with the example of bravery in building the monasteries despite the danger, create an experience that must be seen to be believed. For more information </span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/guide-to-visiting-meteora/"><span data-dcnode-id="1292" instrument_node="">check out our guide to visiting Meteora</span></a><span data-dcnode-id="1290" instrument_node="">.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9020" data-dcnode-id="1282"><img alt="Meteora monasteries. Beautiful view on Monastery of the Holy Trinity placed on the edge of high rock covered of the morning at sun rises, Kastraki, Greece" class="wp-image-9020" data-dcnode-id="1287" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978.jpg" alt="Meteora monasteries. Beautiful view on Monastery of the Holy Trinity placed on the edge of high rock covered of the morning at sun rises, Kastraki, Greece" class="wp-image-9020" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/meteora-greece-shutterstock_517519978-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Oleg Znamenskiy / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1281" instrument_node="">
</span><h2 data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">66. Dorset and East Devon Coast, UK</span></h2><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Frequently called the Jurassic Coast, it’s made up of nearly continuous rock formations that stretch back to the Mesozoic Era. Renowned for its geomorphological and geological features, you’ll be able to see coves, arches, stack rocks, and pinnacles. The Dorset and East Devon Coast include a variety of important fossil localities, both terrestrial and marine, which also makes this impressive geological feature a great contributor to paleontology.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9004" data-dcnode-id="1269"><img alt="Durdle Door, Dorset, Jurassic Coast, England, UK" class="wp-image-9004" data-dcnode-id="1274" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308.jpg" alt="Durdle Door, Dorset, Jurassic Coast, England, UK" class="wp-image-9004" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/durdle-door-dorset-uk-shutterstock_554318308-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Billy Stock / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1268" instrument_node="">
</span><h2 data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">67. Historic Centre of Bukhara, Uzbekistan</span></h2><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">More than 2,000 years old, the city of Bukhara was an important stop on the Silk Road trade route as well as being a medieval hub for Islamic culture and theology. Home to around 140 well-preserved architectural monuments, there are still many mosques, caravanserais, bazaars, and madrassas to be seen. Bukhara is a nearly perfect example of a central Asian medieval city, and it’s highlighted by the Samanid Mausoleum. Not only is the 10th-century tomb a great example of Sassanides architecture, but it’s also the resting place of Ismail Samani, an influential leader during the Samanid Empire.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8999" data-dcnode-id="1256"><img alt="Kalyan minaret and kalyan mosque, Bukhara, Uzbekistan" class="wp-image-8999" data-dcnode-id="1261" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226.jpg" alt="Kalyan minaret and kalyan mosque, Bukhara, Uzbekistan" class="wp-image-8999" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/bukhara-uzbekistan-shutterstock_701295226-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">dinozzaver / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1255" instrument_node="">
</span><h2 data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">68. Białowieża Forest, Poland/Belarus</span></h2><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">The magnificent forest complex is probably most famous for housing ¼ of the world’s European Bison, Europe’s heaviest land animal. The diverse ecosystems mean that in addition to the lowland forests, there are also wetlands, wet meadows, and river valleys. Among Białowieża Forest are seven reptile, 3 amphibian, 59 mammal, more than 250 bird, and over 12,000 invertebrate species.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8996" data-dcnode-id="1243"><img alt="Bialowieza Forest in Poland and Belarus" class="wp-image-8996" data-dcnode-id="1248" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962.jpg" alt="Bialowieza Forest in Poland and Belarus" class="wp-image-8996" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/bialovieza-forest-poland-belarus-shutterstock_77762962-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Aleksander Bolbot / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1242" instrument_node="">
</span><h2 data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">69. Lut Desert, Iran</span></h2><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Among the world’s largest deserts, Lut Desert is one of the hottest and driest places on Earth. Thanks to the strong winds it endures, it’s home to some of the best aeolian yardang landforms, or huge corrugated ridges, on the planet, as well as substantial dune fields and stony deserts. ⅓ of the desert is covered with yardangs that have ridges stretching up to 155 meters high and more than 40 kilometers long, and its dunes are among the world’s tallest, reaching up to 300 meters.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9019" data-dcnode-id="1230"><img alt="Dasht-e-Lut, Lut desert, hottest desert in the world, Iran" class="wp-image-9019" data-dcnode-id="1235" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799.jpg" alt="Dasht-e-Lut, Lut desert, hottest desert in the world, Iran" class="wp-image-9019" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/lut-desert-iran-shutterstock_445335799-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Marcin Szymczak / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1229" instrument_node="">
</span><h2 data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">70. Mount Etna, Italy</span></h2><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">The most active stratovolcano in the world is also the Mediterranean’s highest island mountain. The volcano features cinder cones, lava flows, and summit craters as well as orchards and vineyards. In addition, many endemic plant and animal species call Mount Etna home.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9021" data-dcnode-id="1217"><img alt="Collapsed volcano cone, Mount Etna, Sicily, Italy" class="wp-image-9021" data-dcnode-id="1222" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306.jpg" alt="Collapsed volcano cone, Mount Etna, Sicily, Italy" class="wp-image-9021" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/mount-etna-italy-shutterstock_318101306-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">loneroc / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1216" instrument_node="">
</span><h2 data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">71. Geirangerfjord and Nærøyfjord, Norway</span></h2><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Making up part of the west Norwegian fjord landscape, Geirangerfjord and Nærøyfjord are among the deepest and longest in the world. The two fjords are 120 kilometers from each other, have a width of up to 2.5 kilometers, and they stretch from 500 meters below sea level to up to 1,400 meters above the Norwegian Sea. The natural beauty of the landscape is truly stunning as you’ll find forests, glacial lakes, waterfalls, and more.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9008" data-dcnode-id="1204"><img alt="Geirangerfjord with a ship in a port from above, with mountain peaks covered with snow" class="wp-image-9008" data-dcnode-id="1209" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237.jpg" alt="Geirangerfjord with a ship in a port from above, with mountain peaks covered with snow" class="wp-image-9008" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/gairangerfjord-norway-shutterstock_516328237-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Pavel Tvrdy / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1203" instrument_node="">
</span><h2 data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">72. Agra Fort, India</span></h2><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Often overshadowed by the nearby Taj Mahal, the Agra Fort is a massive 380,000 m² and definitely deserves your time. Until the capital was moved to Delhi in 1638, the Red Fort of Agra housed the emperors of the Mughal Empire. While visitors enter through the impressive, red sandstone Lahore Gate, the star of the show is the Delhi Gate. This 16th-century gate was considered to be a masterpiece during the time of Akbar I. Not only is it inlaid with white marble, but across the drawbridge are two life-size stone elephants that guard the inner gateway. Within the 2.5-kilometer walls there are also palaces, mosques, and halls to see.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8989" data-dcnode-id="1191"><img alt="Agra Red Fort, a Unesco World Heritage site, and one of the biggest tourist highlights, just 2 km of Taj Mahal. Built by several Mughal emperors from XV to XVI centuries. Uttar Pradesh, India." class="wp-image-8989" data-dcnode-id="1196" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971.jpg" alt="Agra Red Fort, a Unesco World Heritage site, and one of the biggest tourist highlights, just 2 km of Taj Mahal. Built by several Mughal emperors from XV to XVI centuries. Uttar Pradesh, India." class="wp-image-8989" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/agra-fort-india-shutterstock_579629971-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Phuong D. Nguyen / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1190" instrument_node="">
</span><h2 data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">73. Silk Roads, China/Kazakhstan/Kyrgyzstan</span></h2><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">The Silk Roads is a 5,000-kilometer stretch of the network that has been connecting civilizations for thousands of years, beginning in the 2nd century BC. Not only did the system of trade routes allow for the exchange of goods, but also for the exchange of cultures, languages, and ideas. The passage includes 33 locations, but along the way you’ll also find other previously assigned World Heritage Sites. The Silk Roads have everything from capital cities and Buddhist cave temples to palace complexes and parts of the Great Wall of China.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9033" data-dcnode-id="1178"><img alt="Beautiful Curvy roads on Old Silk Route, Silk trading route between China and India, Sikkim" class="wp-image-9033" data-dcnode-id="1183" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228-678x450.jpg 678w, https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228-1024x680.jpg 1024w" height="996" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20996'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">&lt;img width="1500" height="996" src="https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228.jpg" alt="Beautiful Curvy roads on Old Silk Route, Silk trading route between China and India, Sikkim" class="wp-image-9033" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228-678x450.jpg 678w, https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/silk-road-asia-shutterstock_239869228-1024x680.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Rudra Narayan Mitra / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1177" instrument_node="">
</span><h2 data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">74. Delphi, Greece</span></h2><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Believed by the Greeks to be the center of the world, Delphi is a substantial archaeological site that had a huge impact on the ancient world. It’s also known for the Pythia, the most famous oracle of Ancient Greece. With many ruins dating back to the 6th century BC, there are plenty of things to see like athletic statues, a theatre, and the Temple of Apollo.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-9003" data-dcnode-id="1165"><img alt="Ancient Ruins at Delphi in Greece" class="wp-image-9003" data-dcnode-id="1170" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737.jpg" alt="Ancient Ruins at Delphi in Greece" class="wp-image-9003" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/delphi-greece-shutterstock_342072737-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">elgreko / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1164" instrument_node="">
</span><h2 data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">75. Antigua Guatemala, Guatemala</span></h2><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">The former Guatemalan capital is an amazingly well-preserved colonial city known for its colonial church ruins and Spanish Baroque architecture. In 1773, the earthquake-prone area was majorly damaged by an earthquake, which led to its main structures being preserved as ruins and the capital being moved to Guatemala City.</span></p><span data-dcnode-id="1158" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7984" data-dcnode-id="1152"><img alt="Agua volcano behind Santa Catalina Arch in the colonial town of Antigua, Guatemala" class="wp-image-7984" data-dcnode-id="1157" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646-677x450.jpg 677w, https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646-1024x681.jpg 1024w" height="997" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20997'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">&lt;img width="1500" height="997" src="https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646.jpg" alt="Agua volcano behind Santa Catalina Arch in the colonial town of Antigua, Guatemala" class="wp-image-7984" srcset="https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646-677x450.jpg 677w, https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/10/antigua-volcano-agua-shutterstock_455082646-1024x681.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">loca4motion / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1151" instrument_node="">
</span><h2 data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">76. Hawaii Volcanoes National Park, USA</span></h2><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Home to two of the most active volcanoes in the world, Mauna Loa and Kilauea, Hawaii Volcanoes National Park was added to the UNESCO World Heritage List in 1987 in recognition of its outstanding natural values. The park is one of the biggest attractions in Hawaii as it offers visitors dramatic volcanic landscapes and glimpses of rare flora and fauna.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8993" data-dcnode-id="1139"><img alt="Hawaii Volcanoes National Park" class="wp-image-7653" data-dcnode-id="1144" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356.jpg" alt="Hawaii Volcanoes National Park" class="wp-image-7653" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/09/hawaii-volcanoes-national-park-usa-shutterstock_569669356-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Yvonne Baur / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1138" instrument_node="">
</span><h2 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">77. Neuschwanstein Castle, Germany</span></h2><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1134" instrument_node="">One of </span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadaffair.com/best-castles-in-germany/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1133" instrument_node="">Germany’s most beautiful castles</span></a><span data-dcnode-id="1131" instrument_node="">, Ludwig II of Bavaria ordered this castle to be built as his own personal lavish hideaway. Construction was completed on the Romanesque Revival building in 1886; shortly after that Ludwig II died and soon after the castle was opened to the public. The palace and its surroundings are so stunning that Neuschwanstein Castle was the inspiration for the iconic Disneyland castle as well as the castle in the Disney film Sleeping Beauty.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7753" data-dcnode-id="1123"><img alt="Neuschwanstein Castle on the top of the mountain in Bavaria, Germany" class="wp-image-7753" data-dcnode-id="1128" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122.jpg" alt="Neuschwanstein Castle on the top of the mountain in Bavaria, Germany" class="wp-image-7753" srcset="https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/10/neuschwanstein-castle-germany-shutterstock_620565122-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Yury Dmitrienko / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1122" instrument_node="">
</span><h2 data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">78. Budapest, Hungary</span></h2><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">While Buda is renowned for its Baroque castle and Pest is known for being the first medieval urban centre, UNESCO brags on Budapest saying it’s, “one of the world’s outstanding urban landscapes and illustrates the great periods in the history of the Hungarian capital”. The ancient city of Aquincum was the beginning of Budapest’s history, and today it’s a leading city showing its strengths in research, education, commerce, and more.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-8276" data-dcnode-id="1110"><img alt="Hungarian Parliament at daytime. Budapest. One of the most beautiful buildings in the Hungarian capital." class="wp-image-8276" data-dcnode-id="1115" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228-780x520.jpg 780w" height="1001" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201001'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">&lt;img width="1500" height="1001" src="https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228.jpg" alt="Hungarian Parliament at daytime. Budapest. One of the most beautiful buildings in the Hungarian capital." class="wp-image-8276" srcset="https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228-674x450.jpg 674w, https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228-768x513.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/01/hungarian-parliament-budapest-shutterstock_422323228-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Brian Kinney / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1109" instrument_node="">
</span><h2 data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">79. Historic Centre of Prague, Czech Republic</span></h2><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Prague’s historic centre contains fascinating culture and architecture that date back to the Middle Ages. The beautiful landscape includes palaces, towers, burgher houses, and more where Gothic, Baroque, and modernist works are on display. While it’s difficult to decide what to see in Prague first, we recommend starting with Prague Castle, Charles Bridge, or St. Vitus Cathedral.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1099"><img alt="Main Square in Prague, Czech Republic" class="wp-image-8899" data-dcnode-id="1102" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair-780x520.jpg 780w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">&lt;img width="1500" height="1000" src="https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair.jpg" alt="Main Square in Prague, Czech Republic" class="wp-image-8899" srcset="https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair-675x450.jpg 675w, https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair-768x512.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair-1024x683.jpg 1024w, https://www.roadaffair.com/wp-content/uploads/2017/12/square-prague-czech-republic-road-affair-780x520.jpg 780w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript></figure><span data-dcnode-id="1098" instrument_node="">
</span><h2 data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">80. Saint Petersburg, Russia</span></h2><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Picturesque landscapes, architecture, and culture characterize this port city. We can thank its founder, Peter the Great, for beginning a project in 1703 that led to more than 400 bridges and several canals beautifying its waterscape. Neoclassical and Baroque styles combine to create a lovely architectural culture that can be viewed in the Hermitage, the world’s second largest culture and art museum, the Marble Palace, and the Winter Palace.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><figure class="wp-block-image alignnone size-full wp-image-7450" data-dcnode-id="1086"><img alt="Church of the Saviour on Spilled Blood, St. Petersburg, Russia" class="wp-image-7450" data-dcnode-id="1091" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000.jpg" data-lazy-srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000-678x450.jpg 678w, https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000-1024x680.jpg 1024w" height="996" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%20996'%3E%3C/svg%3E" width="1500"><noscript data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">&lt;img width="1500" height="996" src="https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000.jpg" alt="Church of the Saviour on Spilled Blood, St. Petersburg, Russia" class="wp-image-7450" srcset="https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000.jpg 1500w, https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000-678x450.jpg 678w, https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000-768x510.jpg 768w, https://www.roadaffair.com/wp-content/uploads/2017/09/saint-petersburg-russia-shutterstock_357158000-1024x680.jpg 1024w" sizes="(max-width: 1500px) 100vw, 1500px" /&gt;</span></noscript><figcaption data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Elena11 / shutterstock.com</span></figcaption></figure><span data-dcnode-id="1085" instrument_node="">
</span><h2 data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">81. Hoi An Ancient Town, Vietnam</span></h2><span data-dcnode-id="1082" instrument_node="">
