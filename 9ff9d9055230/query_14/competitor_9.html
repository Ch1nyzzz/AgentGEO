"-1"><span data-dcnode-id="2596" instrument_node="">World Heritage Process</span></a></li></ul></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-288" data-dcnode-id="2589"><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/visited-sites-2/" role="menuitem" tabindex="-1"><span data-dcnode-id="2591" instrument_node="">Visited Sites</span></a></li></ul></div></div><div data-dcnode-id="2578" id="top-search"><span data-dcnode-id="2585" instrument_node=""> </span><a class="search" data-dcnode-id="2583" href="#"><i class="fa fa-search" data-dcnode-id="2584"></i></a><div class="show-search" data-dcnode-id="2579"><form action="https://worldheritagejourney.com/" data-dcnode-id="2580" id="searchform" method="get" role="search"><span data-dcnode-id="2582" instrument_node=""> </span><input data-dcnode-id="2581" id="s" name="s" placeholder="Search and hit enter..." type="text"></form></div></div><div data-dcnode-id="2562" id="top-social"><span data-dcnode-id="2577" instrument_node=""> </span><a data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/worldheritagejourney" target="_blank"><i class="fa fa-facebook" data-dcnode-id="2576"></i></a><span data-dcnode-id="2574" instrument_node=""> </span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/whjourney" target="_blank"><i class="fa fa-twitter" data-dcnode-id="2573"></i></a><span data-dcnode-id="2571" instrument_node=""> </span><a data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instagram.com/joelontheroad" target="_blank"><i class="fa fa-instagram" data-dcnode-id="2570"></i></a><span data-dcnode-id="2568" instrument_node=""> </span><a data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/worldheritagejourney" target="_blank"><i class="fa fa-pinterest" data-dcnode-id="2567"></i></a><span data-dcnode-id="2565" instrument_node=""> </span><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtube.com/worldheritagejourney" target="_blank"><i class="fa fa-youtube-play" data-dcnode-id="2564"></i></a></div></div></div><header class="noslider" data-dcnode-id="2554" id="header"><div class="container" data-dcnode-id="2555"><div data-dcnode-id="2556" id="logo"><h2 data-dcnode-id="2557"><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/"><img alt="World Heritage Journey" data-dcnode-id="2559" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//worldheritagejourney.com/wp-content/uploads/2018/03/WHJ-Logo-1.png&amp;raw"></a></h2></div></div></header><div class="container" data-dcnode-id="93"><div data-dcnode-id="94" id="content"><div data-dcnode-id="174" id="main"><article class="post-914 post type-post status-publish format-standard has-post-thumbnail hentry category-asia" data-dcnode-id="175" id="post-914"><div class="post-header" data-dcnode-id="2540"><span data-dcnode-id="2553" instrument_node=""> </span><span class="cat" data-dcnode-id="2550"><a data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/category/asia/" rel="category tag"><span data-dcnode-id="2552" instrument_node="">Asia</span></a></span><h1 class="entry-title" data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">World Heritage Sites in Uttar Pradesh</span></h1><span data-dcnode-id="2547" instrument_node=""> </span><span class="title-divider" data-dcnode-id="2546"></span><span data-dcnode-id="2545" instrument_node=""> </span><span class="post-date" data-dcnode-id="2541"><span data-dcnode-id="2544" instrument_node="">Posted on </span><span class="date updated published" data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">November 7, 2020</span></span></span></div><div class="post-img" data-dcnode-id="2537"><span data-dcnode-id="2539" instrument_node=""> </span><img alt="World Heritage Sites in Uttar Pradesh" class="attachment-solopine-full-thumb size-solopine-full-thumb wp-post-image" data-dcnode-id="2538" height="810" loading="lazy" sizes="(max-width: 1080px) 100vw, 1080px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/World-Heritage-Sites-Uttar-Pradesh-1200x900-1.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/World-Heritage-Sites-Uttar-Pradesh-1200x900-1.jpg 1200w, https://worldheritagejourney.com/wp-content/uploads/2020/11/World-Heritage-Sites-Uttar-Pradesh-1200x900-1-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/World-Heritage-Sites-Uttar-Pradesh-1200x900-1-1024x768.jpg 1024w, https://worldheritagejourney.com/wp-content/uploads/2020/11/World-Heritage-Sites-Uttar-Pradesh-1200x900-1-768x576.jpg 768w, https://worldheritagejourney.com/wp-content/uploads/2020/11/World-Heritage-Sites-Uttar-Pradesh-1200x900-1-1080x810.jpg 1080w" width="1080"></div><div class="post-entry" data-dcnode-id="232"><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">There are three UNESCO World Heritage Sites in Uttar Pradesh, India’s most populous state. Located in northern India, Uttar Pradesh (also known as UP) is home to 200 million people, and has some of the most famous World Heritage sites in India. So what are these famous UNESCO sites in UP? Interestingly, they’re all located around the city of Agra: the incredible Taj Mahal, the nearby Agra Fort, and the city complex of Fatehpur Sikri.</span></p><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">So what are these sites? Why are they on the World Heritage List? And what’s it like to visit these Uttar Pradesh UNESCO sites? Read on to find out!</span></p><p data-dcnode-id="2525"><span data-dcnode-id="2532" instrument_node="">And of course, don’t forget to follow </span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/WorldHeritageJourney"><span data-dcnode-id="2531" instrument_node="">World Heritage Journey on Facebook</span></a><span data-dcnode-id="2529" instrument_node=""> for the latest updates, and Subscribe to </span><a data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/WorldHeritageJourney"><span data-dcnode-id="2528" instrument_node="">World Heritage Journey on YouTube</span></a><span data-dcnode-id="2526" instrument_node=""> so that you never miss a video!</span></p><h2 data-dcnode-id="2522"><br data-dcnode-id="2524"><span data-dcnode-id="2523" instrument_node="">World Heritage Sites in Uttar Pradesh: the Taj Mahal</span></h2><figure class="wp-block-image size-large" data-dcnode-id="2517"><img alt="Taj Mahal UNESCO World Heritage Site in Uttar Pradesh" class="wp-image-931" data-dcnode-id="2521" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_1.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_1.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_1.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_1.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="2518"><em data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">The incredible Taj Mahal in Agra, Uttar Pradesh, India</span></em></figcaption></figure><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">First of the World Heritage sites in Uttar Pradesh is one of the world’s most famous places, the incredible Taj Mahal. It was built between 1632 and 1653 by the Mughal emperor, Shah Jahan, as a tomb for his favourite wife, Mumtaz. Commissioned by the stricken emperor after Mumtaz died giving birth in 1631, the Taj Mahal is definitely the world’s most famous monument to love.</span></p><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">The Taj Mahal is constructed entirely of gleaming white marble and it’s located on the banks of the Yamuna river in the city of Agra. It’s estimated to have cost around 32 million rupees at the time, which in 2020 terms is almost a billion US dollars – a staggering sum! The Taj Mahal complex around the main tomb also includes a guesthouse, a mosque, and formal gardens.</span></p><figure class="wp-block-image size-large" data-dcnode-id="2508"><img alt="Mosque at the Taj Mahal" class="wp-image-934" data-dcnode-id="2512" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_4.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_4.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_4.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_4.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="2509"><em data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Mosque facing the Taj Mahal</span></em></figcaption></figure><p data-dcnode-id="2503"><span data-dcnode-id="2507" instrument_node="">It’s absolutely a shining jewel of Islamic art, and some call it the pinnacle of Muslim art in India. Inspired by other Mughal buildings such as Humayun’s Tomb (one of the </span><a data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/world-heritage-sites-delhi/"><span data-dcnode-id="2506" instrument_node="">World Heritage Sites in Delhi</span></a><span data-dcnode-id="2504" instrument_node="">), the Taj is intricate, precise, and beautiful.</span></p><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Although looking at the Taj from a distance with its shimmering marble reflected in the pool is absolutely spectacular, the up-close view is possibly even better. Distant photographs don’t really convey how detailed and intricate every surface of the building is. Islamic script, floral patterns, semi-precious stones, geometric designs and more cover every area of the facade. The whole complex really is a thing of incredible beauty.</span></p><figure class="wp-block-image size-large" data-dcnode-id="2496"><img alt="Intricate Detailing and calligraphy on the Taj Mahal World Heritage Site" class="wp-image-935" data-dcnode-id="2500" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_5.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_5.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_5.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_5.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="2497"><em data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Intricate detailing, calligraphy and carvings on the Taj Mahal facade</span></em></figcaption></figure><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">The inside is quite fascinating as well. Mumtaz’s tomb is located at the precise centre of the whole complex, surrounded with calligraphy, carvings and decorated tiling. However, the actual sarcophagus is relatively plain, in keeping with Islamic law. Shah Jahan himself is buried right next to Mumtaz. Interestingly, the location of his sarcophagus is the only non-symmetrical placement in the entire Taj Mahal complex.</span></p><figure class="wp-block-image size-large" data-dcnode-id="2489"><img alt="Taj Mahal close up" class="wp-image-933" data-dcnode-id="2493" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_3.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_3.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_3.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_3.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="2490"><em data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Closer in at the Taj Mahal, World Heritage Site in Uttar Pradesh</span></em></figcaption></figure><h3 data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Know Before You Go</span></h3><p data-dcnode-id="2482"><span data-dcnode-id="2486" instrument_node="">Tah Mahal is open every day except Fridays. It opens 30 minutes before sunrise and closes 30 minutes before sunset. Tickets are 50 rupees for Indians, 540 rupees for citizens of SAARC and BIMSTEC countries (essential South Asian countries), and 1100 rupees for other foreigners. Access to the mausoleum itself costs an extra 200 rupees regardless of nationality, and is strongly recommended. You can </span><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asi.payumoney.com/"><span data-dcnode-id="2485" instrument_node="">buy tickets online</span></a><span data-dcnode-id="2483" instrument_node=""> directly from the Archaeological Survey of India.</span></p><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Note that motorised vehicles aren’t allowed near the Taj Mahal, so your visit will definitely involve plenty of walking. Be sure to wear comfortable shoes! You’ll also need plenty of water, sunscreen, and a hat.</span></p><p data-dcnode-id="2476"><strong data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">Tip</span></strong><span data-dcnode-id="2477" instrument_node="">: International tourists often arrive early for the sunrise, while domestic tourists arrive during the day. If you’re not worried about catching the sunrise, aim for a mid-morning arrival when it’s quietest!</span></p><figure class="wp-block-image size-large" data-dcnode-id="2471"><img alt="Taj Mahal with Minaret" class="wp-image-932" data-dcnode-id="2475" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_2.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_2.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_2.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/TajMahal_2.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="2472"><em data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Taj Mahal later in the afternoon, a “less busy” time of day!</span></em></figcaption></figure><div class="gyg-iframe-container" data-dcnode-id="1938" style="margin-bottom: 1.5em; height: 609px;"><iframe data-dcnode-id="1939" data-gyg-scraped="1650830241284" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widget.getyourguide.com/default/activites.frame%3Fwidget%3Dactivites%26cpm%3Duttar%2520pradesh%26currency%3DUSD%26locale_code%3Den-US%26number_of_items%3D3%26partner_id%3DR3PROPF%26q%3Dtaj%2520mahal%2520sunrise&amp;raw" style="border:0;height:100%;width:100% id="1931"><em data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Exterior walls at Agra Fort, Uttar Pradesh, India</span></em></figcaption></figure><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Next of the Uttar Pradesh UNESCO sites is the amazing Agra Fort. Normally you’d expect a “fort” to be a hardened military installation. But Agra Fort is really more of an imperial palace and walled city.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1923"><img alt="Agra Fort, Diwan-i-am (Hall of Public Audience)" class="wp-image-924" data-dcnode-id="1927" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_4.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_4.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_4.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_4.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1924"><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Diwan-i-am (Hall of Public Audience) at Agra Fort World Heritage Site</span></em></figcaption></figure><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">It was built for Mughal emperor Akbar the Great between 1565 and 1573, who recognised the strategic importance of the location. Akbar’s grandson Shah Jahan (builder of the Taj Mahal) applied the finishing touches and gave the Fort its current appearance. It stayed as the main residence of the Mughal emperors for the next hundred years, when the capital moved back to Delhi.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1916"><img alt="" class="wp-image-936" data-dcnode-id="1920" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_2.resized-1.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_2.resized-1.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_2.resized-1-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_2.resized-1-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1917"><em data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Jahangir Palace inside Agra Fort, Uttar Pradesh, India</span></em></figcaption></figure><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">The Fort is laid out in a vague semi-circle, covering an impressive 94 acres. It’s constructed almost entirely of red sandstone, and sits just 2.5 kilometres from the Taj Mahal, which you can clearly see from the battlements. As you approach the Fort, enormous walls loom over you, joined with imposing bastions, redoubts and battlements. There’s four gates in the walls, though only one (the Lahore Gate) is still in public use.</span></p><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Inside the walls, there’s plenty to see. Aside from the massive gates, there’s also various temples, audience halls, residences, palaces, and of course exquisite artwork everywhere too. Floral patterns, geometric designs, calligraphy, carving, and much more.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1907"><img alt="Agra Fort, Uttar Pradesh" class="wp-image-923" data-dcnode-id="1911" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_3.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_3.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_3.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_3.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1908"><em data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Audience Hall at Agra Fort, World Heritage Site in Uttar Pradesh</span></em></figcaption></figure><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">You even get some spectacular views of the nearby river, and of course, the Taj Mahal as well. Most of the architecture is done in the very distinctive Mughal style, with its clear Persian and Arabic influences.</span></p><h3 data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Know Before You Go</span></h3><p data-dcnode-id="1898"><span data-dcnode-id="1902" instrument_node="">Agra Fort is open seven days a week, sunrise to sunset. Entry fees are 50 rupees for Indians, 650 rupees ($9 US) for foreigners. Entry on Fridays is slightly cheaper, and you can pre-purchase tickets online from the </span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asi.payumoney.com/"><span data-dcnode-id="1901" instrument_node="">Archaeological Survey of India</span></a><span data-dcnode-id="1899" instrument_node="">. Guides are available on site, though be sure to choose a guide with an official ID badge.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1893"><img alt="Agra Fort, UNESCO Site in Uttar Pradesh" class="wp-image-925" data-dcnode-id="1897" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_5.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_5.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_5.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/AgraFort_5.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1894"><em data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Decoration on a palace building inside Agra Fort, India</span></em></figcaption></figure><div class="gyg-iframe-container" data-dcnode-id="1359" style="margin-bottom: 1.5em; height: 609px;"><iframe data-dcnode-id="1360" data-gyg-scraped="1650830241284" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widget.getyourguide.com/default/activites.frame%3Fwidget%3Dactivites%26cpm%3Duttar%2520pradesh%26currency%3DUSD%26locale_code%3Den-US%26number_of_items%3D3%26partner_id%3DR3PROPF%26q%3Dagra%2520fort&amp;raw" style="border:0;height:100%;width:100%" title="GetYourGuide activites widget"><html data-dcnode-id="1362" data-n-head="%7B%22lang%22:%7B%22ssr%22:%22en%22%7D%7D" lang="en"><head data-dcnode-id="1861"><meta charset="utf-8"><span data-dcnode-id="1891" instrument_node="">

h2.5v2H16a1 1 0 01-1-1z" data-dcnode-id="1372" fill="currentColor" fill-rule="evenodd"></path></symbol><symbol data-dcnode-id="1368" fill="none" id="c-wheelchair" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.5 4.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM4 16a6.003 6.003 0 014-5.659v2.194A4 4 0 1013.874 17h2.043A6.002 6.002 0 014 16z" data-dcnode-id="1370" fill="currentColor"></path><path d="M16.28 16l1.771 5.316 1.898-.632L17.72 14H12v-2.416A4.983 4.983 0 0014 12h1v-2h-1a3 3 0 01-3-3H9v6a3 3 0 003 3h4.28z" data-dcnode-id="1369" fill="currentColor"></path></symbol><symbol data-dcnode-id="1366" fill="none" id="c-wifi" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.607 8.393A14.953 14.953 0 0012 4 14.953 14.953 0 001.393 8.393l1.415 1.415A12.96 12.96 0 0112 6c3.59 0 6.84 1.455 9.192 3.808l1.415-1.415zm-4.243 4.243A8.972 8.972 0 0012 10a8.972 8.972 0 00-6.364 2.636L7.05 14.05A6.978 6.978 0 0112 12c1.933 0 3.683.784 4.95 2.05l1.414-1.414zM12 20a2 2 0 100-4 2 2 0 000 4z" data-dcnode-id="1367" fill="currentColor"></path></symbol></svg></div></body></html></iframe></div><h2 data-dcnode-id="1356"><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">World Heritage Sites in Uttar Pradesh: Fatehpur Sikri</span></h2><figure class="wp-block-image size-large" data-dcnode-id="1351"><img alt="Fatehpur Sikri UNESCO World Heritage Sites in Uttar Pradesh" class="wp-image-927" data-dcnode-id="1355" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_2.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_2.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_2.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_2.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1352"><em data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Fatehpur Sikri UNESCO World Heritage Site in Uttar Pradesh</span></em></figcaption></figure><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">The third and final World Heritage site in UP is Fatehpur Sikri. It’s another large palace complex dating from the time of the Mughals. Fatehpur Sikri is located about thirty kilometres outside of Agra, and was founded as a capital city by the Mughal emperor Akbar the Great in 1571.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Construction lasted for several years, though in 1585 Akbar left to fight a war against Punjab and lost interest in the project. Within 25 years, the city was completely abandoned.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1342"><img alt="Fatehpur Sikri, Anup Talao" class="wp-image-928" data-dcnode-id="1346" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_3.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_3.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_3.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_3.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1343"><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Anup Talao palace at Fatehpur Sikri, Indi</span></em></figcaption></figure><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Originally planned to be an enormous and grand capital city, not much remains these days of Fatehpur Sikri, but what does remain is very striking. Built largely from red sandstone, the fortresses, harems, palaces, mosques, gardens and audience halls are all distinctive and unique.</span></p><p data-dcnode-id="1335"><span data-dcnode-id="1339" instrument_node="">Highlights include the Diwan-I-Am (Hall of Public Audience), the Diwan-khala-I-Khaas (Hall of Private Audience), the Treasury, and the Daulat khana-I-khas (Emperor’s Private Chamber). Interestingly, there’s clear Gujurati influences on display here, as a legacy of the Gujurati craftsmen who built it. If you’ve visited any of the </span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/world-heritage-sites-gujarat/"><span data-dcnode-id="1338" instrument_node="">World Heritage Sites in Gujarat</span></a><span data-dcnode-id="1336" instrument_node="">, you’ll definitely notice the similarities!</span></p><figure class="wp-block-image size-large" data-dcnode-id="1330"><img alt="Fatehpur Sikri, Diwan-i-Khas (Hall of Private Audience)" class="wp-image-926" data-dcnode-id="1334" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_1.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_1.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_1.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_1.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1331"><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Diwan-i-Khas (Hall of Private Audience) at Fatehpur Sikri</span></em></figcaption></figure><p data-dcnode-id="1325"><span data-dcnode-id="1329" instrument_node="">One of the most impressive areas of the complex is the enormous Jama Masjid, or congregational mosque. It’s still one of the largest mosques in India! Nearby is the </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Buland Darwaza</span></em><span data-dcnode-id="1326" instrument_node=""> (Gate of Victory), the highest gateway in the world.</span></p><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Also in this mosque complex is the beautiful Tomb of Salim Chishti. It’s a striking white marble building, often considered the finest example of Mughal architecture. Salim Chishti was a Sufi saint who predicted the birth of Emperor Akbar’s son and heir, Jahangir. The stonework on this building is absolutely exquisite, and really has to be seen to be believed.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1318"><img alt="Fatehpur Sikri, Tomb of Salim Chishti" class="wp-image-930" data-dcnode-id="1322" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_5.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_5.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_5.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_5.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1319"><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Tomb of Salim Chishti at Fatehpur Sikri World Heritage Site, Uttar Pradesh</span></em></figcaption></figure><h3 data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Know Before You Go</span></h3><p data-dcnode-id="1311"><span data-dcnode-id="1315" instrument_node="">Fatehpur Sikir is located 37 kilometres south-west of Agra, about an hour’s drive depending on your driver. It’s open 7 days a week, sunrise to sunset. Tickets are 50 rupees for Indians and citizens of most South Asian countries, while for other foreigners it’s 610 rupees (about $8 USD). Pre-purchase your tickets online from the </span><a data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asi.payumoney.com/"><span data-dcnode-id="1314" instrument_node="">Archaeological Survey of India</span></a><span data-dcnode-id="1312" instrument_node=""> website, or use a tour company in Agra.</span></p><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Fatehpur Sikri is a large site, so a tour guide is recommended. It’s best to stick with the official licensed guides who approach you near the ticket booth. If you do hire an unlicensed guide, be sure to negotiate a price up front.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1304"><img alt="Fatehpur Sikri, Panch Mahal (Ladies' Court)" class="wp-image-929" data-dcnode-id="1308" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_4.resized.jpg&amp;raw" srcset="https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_4.resized.jpg 1000w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_4.resized-300x225.jpg 300w, https://worldheritagejourney.com/wp-content/uploads/2020/11/FatehpurSikri_4.resized-768x576.jpg 768w" width="1000"><figcaption data-dcnode-id="1305"><em data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Panch Mahal (Ladies’ Court) building, Fatehpur Sikri</span></em></figcaption></figure><div class="gyg-iframe-container" data-dcnode-id="770" style="margin-bottom: 1.5em; height: 609px;"><iframe data-dcnode-id="771" data-gyg-scraped="1650830241284" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widget.getyourguide.com/default/activites.frame%3Fwidget%3Dactivites%26cpm%3Duttar%2520pradesh%26currency%3DUSD%26locale_code%3
