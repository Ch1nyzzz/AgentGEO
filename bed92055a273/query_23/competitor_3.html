</span><p data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">
</span></p><p data-dcnode-id="4831"></p><div class="wp-caption alignright" data-dcnode-id="4827" id="attachment_5268" style="width: 374px"><img alt="lines" aria-describedby="caption-attachment-5268" class="wp-image-5268" data-dcnode-id="4830" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/lines-freedom2.jpg&amp;raw" width="364"><p class="wp-caption-text" data-dcnode-id="4828" id="caption-attachment-5268"><span data-dcnode-id="4829" instrument_node="">Lines of people standing outside buildings in Lowndes County, Alabama, on election day, Nov. 1966. By Jim Peppler Southern Courier. ADAH.</span></p></div><p data-dcnode-id="4826"></p><span data-dcnode-id="4825" instrument_node="">
</span><p data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">We’ve all seen the iconic image of President Lyndon Johnson signing the Voting Rights Act of 1965. But what do we know of the history that led to the signing of the legislation?</span></p><span data-dcnode-id="4822" instrument_node="">
</span><p data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">When did the struggle for voting rights begin? Have voting rights always been restricted throughout U.S. history? Who is responsible for the Voting Rights Act getting passed?</span></p><span data-dcnode-id="4819" instrument_node="">
</span><p data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">Through this quiz, and the answers that appear after each response, you can learn some of the history of the&nbsp;struggle for voting rights&nbsp;that is all too often omitted from the textbooks.&nbsp;Teaching for Change designed this quiz to&nbsp;challenge assumptions, deepen understanding, and inspire further learning about the voting rights struggle.</span></p><span data-dcnode-id="4816" instrument_node="">
</span><p data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">The quiz, used as a whole or one question at a time, can serve as a springboard for discussions and research.&nbsp;Please take the quiz, share it, and send us your feedback.</span></p><span data-dcnode-id="4813" instrument_node="">
</span><p data-dcnode-id="4803"><span data-dcnode-id="4812" instrument_node="">Each answer has links to books, articles, and/or websites. Learn more from&nbsp;</span><a data-dcnode-id="4810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/the-voting-rights-act-ten-things-you-should-know/" onclick="javascript:window.open('http://zinnedproject.org/materials/the-voting-rights-act-ten-things-you-should-know/'); return false;"><span data-dcnode-id="4811" instrument_node="">The Voting Rights Act: Ten Things You Should Know</span></a><span data-dcnode-id="4809" instrument_node=""> by Emilye Crosby and Judy Richardson. Our publication,&nbsp;</span><em data-dcnode-id="4805"><a data-dcnode-id="4807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/" onclick="javascript:window.open('http://civilrightsteaching.org/'); return false;" title="book info"><span data-dcnode-id="4808" instrument_node="">Putting the Movement Back into Civil Rights Teaching</span></a><span data-dcnode-id="4806" instrument_node="">,&nbsp;</span></em><span data-dcnode-id="4804" instrument_node="">provides readings and lessons on many of the issues addressed in the quiz and more.</span></p><span data-dcnode-id="4802" instrument_node="">
</span><p data-dcnode-id="4798"><em data-dcnode-id="4799"><span data-dcnode-id="4800" style="font-size: small;"><span data-dcnode-id="4801" instrument_node="">(c) Teaching for Change.</span></span></em></p><span data-dcnode-id="4797" instrument_node="">

</span><p data-dcnode-id="4469"></p><h3 data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">Answer:&nbsp;It varied depending on what state you lived in</span></h3><span data-dcnode-id="4466" instrument_node="">
</span><p data-dcnode-id="4458"><span data-dcnode-id="4465" instrument_node="">The Constitution, as originally drafted, did not specify who had the right to vote in federal elections, </span><a data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crmvet.org/info/votehist.htm" onclick="javascript:window.open('http://www.crmvet.org/info/votehist.htm'); return false;"><span data-dcnode-id="4464" instrument_node="">leaving those rules up to the states</span></a><span data-dcnode-id="4462" instrument_node="">. In most states, only </span><b data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">white, property-owning, Protestant Christian males</span></b><span data-dcnode-id="4459" instrument_node=""> were permitted to vote in the early days of the United States. In 1828 Maryland became the last state to allow white non-Christian men to vote, and in 1856, North Carolina became the last state to allow non-property owning men to vote.</span></p><span data-dcnode-id="4457" instrument_node="">
</span><p data-dcnode-id="4445"><img alt="women vote 1877" class="alignright wp-image-5090" data-dcnode-id="4456" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/07/women-vote-1877-300x202.jpg&amp;raw" width="400"><span data-dcnode-id="4455" instrument_node="">In New Jersey, </span><b data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">single, white, property-owning women</span></b><span data-dcnode-id="4452" instrument_node=""> were </span><a data-dcnode-id="4450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nps.gov/revwar/about_the_revolution/voting_rights.html" onclick="javascript:window.open('http://www.nps.gov/revwar/about_the_revolution/voting_rights.html'); return false;"><span data-dcnode-id="4451" instrument_node="">permitted to vote until 1807</span></a><span data-dcnode-id="4449" instrument_node="">. White women gained the right to vote with the passage of the </span><a data-dcnode-id="4447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/news/tdih/19th-amendment/" onclick="javascript:window.open('https://www.zinnedproject.org/news/tdih/19th-amendment/'); return false;" rel="noopener"><span data-dcnode-id="4448" instrument_node="">19th Amendment</span></a><span data-dcnode-id="4446" instrument_node=""> in 1920.</span></p><span data-dcnode-id="4444" instrument_node="">
</span><p data-dcnode-id="4432"><span data-dcnode-id="4443" instrument_node="">State constitutions protecting voting rights for </span><b data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">free black men</span></b><span data-dcnode-id="4440" instrument_node=""> included those of Delaware (1776), Maryland (1776), New Hampshire (1784), and New York (1777), Pennsylvania (1776), and Massachusetts (1780). But by 1800, free blacks gradually began losing the rights they had “</span><a data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/wgbh/aia/part4/4p2957.html" onclick="javascript:window.open('http://www.pbs.org/wgbh/aia/part4/4p2957.html'); return false;" rel="noopener"><span data-dcnode-id="4439" instrument_node="">through intimidation, changing laws, and mob violence, whites claimed racial supremacy, and increasingly denied blacks their citizenship.</span></a><span data-dcnode-id="4437" instrument_node="">” In 1857 the Supreme Court ruled in </span><a data-dcnode-id="4434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/news/tdih/dred-harriet-scott-decision/" onclick="javascript:window.open('https://www.zinnedproject.org/news/tdih/dred-harriet-scott-decision/'); return false;" rel="noopener"><i data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">Dred Scott v. Sanford</span></i></a><span data-dcnode-id="4433" instrument_node=""> that “a black man has no rights a white man is bound to respect.” African-Americans were thus formally denied the right to citizenship and the right to vote.</span></p><span data-dcnode-id="4431" instrument_node="">
</span><p data-dcnode-id="4423"><span data-dcnode-id="4430" instrument_node="">All people of </span><b data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">Asian descent </span></b><span data-dcnode-id="4427" instrument_node="">were barred from becoming citizens, and thus voting rights, in 1790 by the Naturalization Act. In 1882, the Chinese Exclusion Act barred immigration from China and specifically barred Chinese from becoming U.S. citizens. The </span><a data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//immigrationinamerica.org/591-immigration-act-of-1943.html" onclick="javascript:window.open('http://immigrationinamerica.org/591-immigration-act-of-1943.html'); return false;"><span data-dcnode-id="4426" instrument_node="">Magnuson Act of 1943</span></a><span data-dcnode-id="4424" instrument_node=""> repealed the Chinese Exclusion Act and allowed some Chinese residing in the U.S. to become citizens.</span></p><span data-dcnode-id="4422" instrument_node="">
</span><p data-dcnode-id="4414"><span data-dcnode-id="4421" instrument_node="">All </span><strong data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">Native Americans</span></strong><span data-dcnode-id="4418" instrument_node=""> were granted citizenship by the </span><a data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nps.gov/jame/learn/historyculture/upload/Native-American-Citizenship-2.pdf" onclick="javascript:window.open('http://www.nps.gov/jame/learn/historyculture/upload/Native-American-Citizenship-2.pdf'); return false;"><span data-dcnode-id="4417" instrument_node="">Indian Citizen Act</span></a><span data-dcnode-id="4415" instrument_node=""> of 1924. However, Native Americans continued to be denied voting rights by law in several states, including Arizona and Colorado. In 1957 Utah became the last state to legalize the vote for Native Americans, but restrictions on voting including residency requirements (claiming Native Americans were not residents of the state if they resided on reservations), language tests, and other tests continued to restrict Native American’s right to vote.</span></p><span data-dcnode-id="4413" instrument_node="">
</span><p data-dcnode-id="4402"><span data-dcnode-id="4412" instrument_node="">In 1848 the </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/treaty-of-guadalupe-hidalgo" onclick="javascript:window.open('http://www.history.com/topics/treaty-of-guadalupe-hidalgo'); return false;" rel="noopener"><span data-dcnode-id="4411" instrument_node="">Treaty of Guadalupe Hidalgo</span></a><span data-dcnode-id="4409" instrument_node=""> made the lands now known as Arizona, California, New Mexico, Texas, and Nevada into U.S. territory. All </span><strong data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">Mexican</span></strong><span data-dcnode-id="4406" instrument_node=""> persons within these territories were declared U.S. citizens, but simultaneously </span><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pbs.org/wgbh/americanexperience/films/reconstruction/" onclick="javascript:window.open('https://www.pbs.org/wgbh/americanexperience/films/reconstruction/'); return false;" rel="noopener"><span data-dcnode-id="4405" instrument_node="">denied the right to vote</span></a><span data-dcnode-id="4403" instrument_node=""> by English proficiency, literacy, and property requirements along with violence, intimidation, and racist nativism.</span></p><span data-dcnode-id="4401" instrument_node="">
</span><p data-dcnode-id="4396"><span data-dcnode-id="4400" instrument_node="">In 1870, the </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/materials/teach-the-15-amendment" onclick="javascript:window.open('https://www.zinnedproject.org/materials/teach-the-15-amendment'); return false;" rel="noopener"><span data-dcnode-id="4399" instrument_node="">Fifteenth Amendment</span></a><span data-dcnode-id="4397" instrument_node=""> to the Constitution prohibited federal and state governments from denying a citizen the right to vote based on that citizen’s “race, color, or previous condition of servitude,” but many people of color continued to be effectively disenfranchised.</span></p><p data-dcnode-id="4395"></p><span data-dcnode-id="4394" instrument_node=""> </span></div><span data-dcnode-id="4392" instrument_node="">

</span><span class="wpProQuiz_respone_span" data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">
									Incorrect								</span></span><br data-dcnode-id="4388"><span data-dcnode-id="4387" instrument_node="">

</span><h2 data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">During the Reconstruction Era (1865-1877), which of following events did NOT occur in the South?</span></h2><span data-dcnode-id="4275" instrument_node="">
</span></div><span data-dcnode-id="4273" instrument_node="">
</span><ul class="wpProQuiz_questionList" data-dcnode-id="4221" data-question_id="160" data-type="multiple"><span data-dcnode-id="4272" instrument_node="">

</span><p data-dcnode-id="4211"></p><h3 align="left" data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">Answer: The federal government did NOT provide&nbsp;each male, freed from slavery, with forty acres and a mule.</span></h3><span data-dcnode-id="4208" instrument_node="">
</span><p align="left" data-dcnode-id="4206"><span data-dcnode-id="4207" instrument_node="">While African Americans were owed reparations for the wealth they generated during centuries of enslavement, even the modest request of 40 acres and a mule was not provided. The repercussions of this lack of reparations remain today with the wealth gap based on race.</span></p><span data-dcnode-id="4205" instrument_node="">
</span><p align="left" data-dcnode-id="4196"><img alt="First_colored_senator_and_reps" class="alignright wp-image-5355" data-dcnode-id="4204" height="347" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/First_colored_senator_and_reps.jpg&amp;raw" width="460"><span data-dcnode-id="4203" instrument_node="">Often people taking this quiz select the answers about elected officials, assuming there were no African Americans elected to the U.S. Senate nor Congress until the modern Civil Rights Movement. Historical accounts have often downplayed the accomplishments of Reconstruction and Black civic engagement during that era. However, armed with the right to vote, </span><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/if-we-knew-our-history/when-black-lives-mattered/" onclick="javascript:window.open('https://www.zinnedproject.org/if-we-knew-our-history/when-black-lives-mattered/'); return false;" rel="noopener"><span data-dcnode-id="4202" instrument_node="">Black men elected hundreds of Black legislators to state offices</span></a><span data-dcnode-id="4200" instrument_node=""> (as well as the 16 who served in the U.S. Congress), despite the harassment and violence against African Americans that preceded elections. The new Black politicians passed ambitious civil rights and public education laws. A total of </span><a data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/american-civil-war/black-leaders-during-reconstruction" onclick="javascript:window.open('http://www.history.com/topics/american-civil-war/black-leaders-during-reconstruction'); return false;"><span data-dcnode-id="4199" instrument_node="">265 African-American delegates</span></a><span data-dcnode-id="4197" instrument_node=""> were elected, more than 100 of whom had been born into slavery. In all, 16 African Americans served in the U.S. Congress during Reconstruction; more than 600&nbsp;more were elected to the state legislatures, and hundreds more held local offices across the South.</span></p><span data-dcnode-id="4195" instrument_node="">
</span><p align="left" data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Southern whites frustrated with policies giving people who had been enslaved the right to vote and hold office increasingly turned to intimidation and violence as a means of reaffirming white supremacy. The Ku Klux Klan targeted local Republican leaders and African Americans who challenged their white employers, and at least 35 Black officials were murdered by the Klan and other white supremacist organizations during the Reconstruction era.</span></p><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4191"></p><div class="wp-caption alignright" data-dcnode-id="4186" id="attachment_3080" style="width: 142px"><a data-dcnode-id="4189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/materials/amazing-age-of-john-roy-lynch/" onclick="javascript:window.open('https://www.zinnedproject.org/materials/amazing-age-of-john-roy-lynch/'); return false;" rel="noopener"><img alt="John Roy Lynch" aria-describedby="caption-attachment-3080" class="wp-image-3080" data-dcnode-id="4190" height="139" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2014/01/john-roy-lynch.jpg&amp;raw" width="132"></a><p class="wp-caption-text" data-dcnode-id="4187" id="caption-attachment-3080"><span data-dcnode-id="4188" instrument_node="">John Roy Lynch</span></p></div><p data-dcnode-id="4185"></p><span data-dcnode-id="4184" instrument_node="">
</span><p data-dcnode-id="4176"><span data-dcnode-id="4183" instrument_node="">For example, in 1870, </span><a data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/materials/amazing-age-of-john-roy-lynch/" onclick="javascript:window.open('https://www.zinnedproject.org/materials/amazing-age-of-john-roy-lynch/'); return false;" rel="noopener" title="bio"><span data-dcnode-id="4182" instrument_node="">John Roy Lynch</span></a><span data-dcnode-id="4180" instrument_node=""> joined the first group of Black representatives elected to Mississippi’s state legislature. He was 22 years old. By age 25, Lynch was the first African American from Mississippi to sit in the House of Representatives. Merely 10 years prior, Lynch had been enslaved. Lynch spent the last years of his life trying to correct the negative view of Reconstruction that prevailed in the U.S. by the early 1900s. In 1913, he wrote </span><em data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">The Facts of Reconstruction</span></em><span data-dcnode-id="4177" instrument_node="">, an autobiographical defense of the period. It wasn’t until 1987, more than a hundred years after Lynch’s last term in Washington, that Mississippi elected another Black representative to the U.S. Congress.</span></p><span data-dcnode-id="4175" instrument_node="">
</span><p align="left" data-dcnode-id="4172"><strong data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">Learn more.</span></strong></p><span data-dcnode-id="4171" instrument_node="">

</span><h2 data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">During most of the 20th century, African Americans were prevented from voting by:</span></h2><span data-dcnode-id="4019" instrument_node="">

</span><p data-dcnode-id="3951"></p><div class="wp-caption aligncenter" data-dcnode-id="3947" id="attachment_2790" style="width: 610px"><img alt="question-12" aria-describedby="caption-attachment-2790" class="wp-image-2790" data-dcnode-id="3950" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/08/question-12.jpg&amp;raw" width="600"><p class="wp-caption-text" data-dcnode-id="3948" id="caption-attachment-2790"><span data-dcnode-id="3949" instrument_node="">LEFT: A. Philip Randolph at the Freedom School Convention in Meridian, Miss. RIGHT: Mississippi Freedom Democratic Party, Lauderdale County Meeting at First Union Baptist Church, Meridian. Both photos by Mark Levy.</span></p></div><p data-dcnode-id="3946"></p><span data-dcnode-id="3945" instrument_node="">
</span><p data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">After the Civil War, many African Americans took grave risks to exercise the right to vote, encountering relentless and multifaceted white resistance. While there were important pockets of black voting strength in the South (primarily in urban areas) during Reconstruction, it was not until the mid-1960s that the Civil Rights Movement was able to decisively turn the tide against black disenfranchisement.</span></p><span data-dcnode-id="3942" instrument_node="">
</span><p data-dcnode-id="3941"></p><div class="wp-caption alignleft" data-dcnode-id="3937" id="attachment_2818" style="width: 160px"><img alt="" aria-describedby="caption-attachment-2818" class="wp-image-2818" data-dcnode-id="3940" height="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/08/Gracie-Hawthorne-One-Vote-1-269x300.jpg&amp;raw" width="150"><p class="wp-caption-text" data-dcnode-id="3938" id="caption-attachment-2818"><span data-dcnode-id="3939" instrument_node="">Gracie Hawthorne, volunteer for the 1964 Freedom Summer campaign to register voters in Mississippi. Photo by Herbert Randall.</span></p></div><p data-dcnode-id="3936"></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">One of the best ways to learn about the grassroots work of the Civil Rights Movement is to read the accounts of voter registration campaigns, including the role of Freedom Schools. Here one can learn about the strength and determination of the people who risked their lives to exercise their legal right to vote.</span></p><span data-dcnode-id="3932" instrument_node="">
</span><p data-dcnode-id="3929"><strong data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">More information</span></strong></p><span data-dcnode-id="3928" instrument_node="">
</span><p data-dcnode-id="3924"><a data-dcnode-id="3926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/wnet/jimcrow/" onclick="javascript:window.open('http://www.pbs.org/wnet/jimcrow/'); return false;"><span data-dcnode-id="3927" instrument_node="">The Rise and Fall of Jim Crow</span></a><span data-dcnode-id="3925" instrument_node="">. Documentary film and website on the Jim Crow era in U.S. history.</span></p><span data-dcnode-id="3923" instrument_node="">
</span><p data-dcnode-id="3909"><span data-dcnode-id="3922" instrument_node="">“</span><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thenation.com/article/sncc-battle-scarred-youngsters%23axzz2cbH3W12u" onclick="javascript:window.open('http://www.thenation.com/article/sncc-battle-scarred-youngsters#axzz2cbH3W12u'); return false;" title="Zinn on SNCC"><span data-dcnode-id="3921" instrument_node="">SNCC: The Battle-Scarred Youngsters</span></a><span data-dcnode-id="3919" instrument_node="">.” By </span><a data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/about/howard-zinn/" onclick="javascript:window.open('http://zinnedproject.org/about/howard-zinn/'); return false;" title="Howard Zinn bio"><span data-dcnode-id="3918" instrument_node="">Howard Zinn</span></a><span data-dcnode-id="3916" instrument_node=""> in&nbsp;</span><em data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">The Nation</span></em><span data-dcnode-id="3913" instrument_node="">, October 5, 1963. A report from the front lines of the civil rights battle in Greenwood, Mississippi–a very dangerous place to be. Written in response to the March on Washington, this article provides chilling interviews with young activists who had been jailed for promoting the democratic practice of voting. Read online&nbsp;</span><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thenation.com/article/sncc-battle-scarred-youngsters" onclick="javascript:window.open('http://www.thenation.com/article/sncc-battle-scarred-youngsters'); return false;" title="The Nation"><span data-dcnode-id="3912" instrument_node="">here</span></a><span data-dcnode-id="3910" instrument_node="">.</span></p><span data-dcnode-id="3908" instrument_node="">

</span><p data-dcnode-id="3880"></p><h3 data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">Answer: All of the above</span></h3><span data-dcnode-id="3877" instrument_node="">

</span><p data-dcnode-id="3713"></p><h3 data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Answer: All of the Above</span></h3><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3706"><span data-dcnode-id="3709" instrument_node="">W</span><img alt="" class="alignright size-medium wp-image-5315" data-dcnode-id="3708" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/fannielouhamer-300x225.jpg&amp;raw" width="300"><span data-dcnode-id="3707" instrument_node="">hen people registered to vote in Mississippi, local newspapers were required to print the names and addresses of prospective voters, alerting their employers (who in many cases also owned their homes) and those prepared to use violence.</span></p><span data-dcnode-id="3705" instrument_node="">
</span><p data-dcnode-id="3700"><span data-dcnode-id="3704" instrument_node="">When Mrs. </span><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mshistorynow.mdah.state.ms.us/articles/51/fannie-lou-hamer-civil-rights-activist" onclick="javascript:window.open('http://mshistorynow.mdah.state.ms.us/articles/51/fannie-lou-hamer-civil-rights-activist'); return false;"><span data-dcnode-id="3703" instrument_node="">Fannie Lou Hamer</span></a><span data-dcnode-id="3701" instrument_node=""> took the registration test in August 1962, white officials did not wait for the newspaper. By the time she had returned home, her landlord had left word with her family that she would have to remove her name from the list or leave her home and job the next day. She left that night, but the harassment continued. Within the next year, she had been shot at, charged hundreds of dollars on a water bill, even though she was living in a home without running water, and was viciously beaten in jail.</span></p><span data-dcnode-id="3699" instrument_node="">
</span><p data-dcnode-id="3691"><span data-dcnode-id="3698" instrument_node="">In the video interview below, Mrs. Hamer recounts her eviction from the Marlowe Plantation for attempting to register to vote. The clip is from the film </span><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hrmediaarchive.estuarypress.com/fannie-lou-hamer-tells-her-story/" onclick="javascript:window.open('http://hrmediaarchive.estuarypress.com/fannie-lou-hamer-tells-her-story/'); return false;" rel="noopener"><span data-dcnode-id="3697" instrument_node="">We’ll Never Turn Back</span></a><span data-dcnode-id="3695" instrument_node="">&nbsp;by </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hrmediaarchive.estuarypress.com/" onclick="javascript:window.open('http://hrmediaarchive.estuarypress.com/'); return false;" rel="noopener"><span data-dcnode-id="3694" instrument_node="">Harvey Richards</span></a><span data-dcnode-id="3692" instrument_node="">.</span></p><span data-dcnode-id="3690" instrument_node="">
</span><p data-dcnode-id="3687"></p><div class="fluidvids" data-dcnode-id="3688" style="padding-top: 75%;"><iframe allowfullscreen="allowfullscreen" class="fluidvids-item" data-dcnode-id="3689" data-fluidvids="loaded" frameborder="0" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/PIZ2a2J5v3g%3Frel%3D0&amp;raw" width="480"></iframe></div><p></p><span data-dcnode-id="3686" instrument_node="">
</span><p data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">Mrs. Hamer did not shy away from the dangers of challenging segregation and the denial of voting rights in Mississippi. “I’m gonna be standing up, I’m gonna be moving forward, and if they shoot me, I’m not going to fall back, I’m going to fall 5 feet 4 inches forward.”</span></p><span data-dcnode-id="3683" instrument_node="">

</span><p data-dcnode-id="3619"><span data-dcnode-id="3626" instrument_node="">In the video interview below, Mrs. Hamer recounts her eviction from the Marlowe Plantation for attempting to register to vote. The clip is from the film </span><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hrmediaarchive.estuarypress.com/fannie-lou-hamer-tells-her-story/" onclick="javascript:window.open('http://hrmediaarchive.estuarypress.com/fannie-lou-hamer-tells-her-story/'); return false;" rel="noopener"><span data-dcnode-id="3625" instrument_node="">We’ll Never Turn Back</span></a><span data-dcnode-id="3623" instrument_node="">&nbsp;by </span><a data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hrmediaarchive.estuarypress.com/" onclick="javascript:window.open('http://hrmediaarchive.estuarypress.com/'); return false;" rel="noopener"><span data-dcnode-id="3622" instrument_node="">Harvey Richards</span></a><span data-dcnode-id="3620" instrument_node="">.</span></p><span data-dcnode-id="3618" instrument_node="">

</span><table data-dcnode-id="2882"><tbody data-dcnode-id="2884"><tr data-dcnode-id="2934"><td data-dcnode-id="2947"><b data-dcnode-id="2948"><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/wp-content/uploads/2015/08/herbert_lee.jpg" onclick="javascript:window.open('http://civilrightsteaching.org/wp-content/uploads/2015/08/herbert_lee.jpg'); return false;"><img alt="herbert_lee" class="wp-image-5327 alignnone" data-dcnode-id="2950" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/herbert_lee.jpg&amp;raw" width="108"></a></b></td><td data-dcnode-id="2936"><b data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Herbert Lee: </span></b><span data-dcnode-id="2943" instrument_node="">On Sept. 25, 1961, voting rights activist Herbert Lee was shot and killed by E.H. Hurst, a member of the Mississippi state legislature, at a cotton gin in Liberty in front of about a dozen witnesses. Lee, a farmer, left behind his wife and nine children. Louis Allen, one of the witnesses in Lee’s murder, eventually told the FBI that Lee was shot by Hurst without any provocation. On Jan. 31, 1964, Allen was shot to death on his own driveway. Neither the Lee nor Allen murders have been prosecuted. More on </span><a data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/herbert-lee/" onclick="javascript:window.open('https://snccdigital.org/people/herbert-lee/'); return false;"><span data-dcnode-id="2942" instrument_node="">SNCC Digital Gateway</span></a><span data-dcnode-id="2940" instrument_node="">.&nbsp;&nbsp;Here is a </span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/resource/voting-rights-murder-mystery/" onclick="javascript:window.open('http://civilrightsteaching.org/resource/voting-rights-murder-mystery/'); return false;"><span data-dcnode-id="2939" instrument_node="">classroom lesson</span></a><span data-dcnode-id="2937" instrument_node=""> on the murders of Lee and Allen from Teaching for Change.</span></td></tr><tr data-dcnode-id="2917"><td data-dcnode-id="2930"><img alt="George+W.+Lee" class="alignnone wp-image-5354" data-dcnode-id="2931" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/George-W.-Lee.jpg&amp;raw" width="108"></td><td data-dcnode-id="2919"><b data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Rev. George W. Lee, </span></b><span data-dcnode-id="2926" instrument_node="">one of the first Blacks registered to vote in Humphreys County, Miss. used his pulpit and his printing press to urge others to vote. Lee was head of the Belzoni, Miss. NAACP. Lee was murdered on May 7, 1955. One of the people sent to investigate his murder was Medgar Evers, who was murdered on June 12, 1963. Rosebud Lee, decided to hold an open-coffin ceremony for her late husband. This decision planted the seeds for a similar decision by Mamie Till-Mobley, Emmett Till’s mother. Read more about Lee’s life and murder on the </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bit.ly/JMju3B" onclick="javascript:window.open('http://bit.ly/JMju3B'); return false;" rel="noopener"><span data-dcnode-id="2925" instrument_node="">Miss. Civil Rights Project</span></a><span data-dcnode-id="2923" instrument_node=""> and in a chapter from the book </span><em data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Where Rebels Roost…Mississippi Civil Rights Revisited</span></em><span data-dcnode-id="2920" instrument_node="">.</span></td></tr><tr data-dcnode-id="2901"><td data-dcnode-id="2911"><b data-dcnode-id="2912"><a data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/wp-content/uploads/2015/08/lamar_smith.jpg" onclick="javascript:window.open('http://civilrightsteaching.org/wp-content/uploads/2015/08/lamar_smith.jpg'); return false;"><img alt="lamar_smith" class="alignnone wp-image-5329" data-dcnode-id="2914" height="148" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/lamar_smith-219x300.jpg&amp;raw" width="108"></a></b></td><td data-dcnode-id="2903"><b data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Lamar Smith</span></b><span data-dcnode-id="2907" instrument_node="">, a 63 year old farmer and World War II veteran was a voting rights activist and a member of the Regional Counsel of Negro Leadership. On August 2, he had voted in the primary and helped get others out to vote. There was a run-off primary scheduled for August 23, and , on August 13, Smith was at the courthouse seeking to assist Black voters to fill out absentee ballots so they could vote in the run-off election. He was shot to death in the front of the courthouse in Brookhaven, Lincoln County, Mississippi at about 10 am.&nbsp;</span><a data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/news/tdih/lamar-smith-murdered" onclick="javascript:window.open('https://www.zinnedproject.org/news/tdih/lamar-smith-murdered'); return false;"><span data-dcnode-id="2906" instrument_node="">Learn more</span></a><span data-dcnode-id="2904" instrument_node="">.</span></td></tr><tr data-dcnode-id="2886"><td data-dcnode-id="2896"><a data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/wp-content/uploads/2015/08/jimmieleejackson.jpg" onclick="javascript:window.open('http://civilrightsteaching.org/wp-content/uploads/2015/08/jimmieleejackson.jpg'); return false;"><img alt="Jimmie Lee Jackson" class="alignnone wp-image-5330" data-dcnode-id="2898" height="153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/jimmieleejackson-212x300.jpg&amp;raw" width="108"></a></td><td data-dcnode-id="2888"><strong data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Jimmie Lee Jackson:</span></strong><span data-dcnode-id="2892" instrument_node=""> Jackson’s grandfather, during&nbsp;the demonstrations that day at the county jail for the release of SCLC worker James Orange, was being beaten by the police, and Jackson stepped in to protect him, pulling him inside a café. The police shot Jackson in the stomach inside the café. Jackson fled to the street, where police continued to beat him. Eight days later, he died. The police officer responsible was not brought to justice until 2007, and only served a few months in prison. Jackson is included in the Teaching for Change lesson, </span><a data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.teachingforchange.org/selma-lesson-role-play" onclick="javascript:window.open('http://www.teachingforchange.org/selma-lesson-role-play'); return false;" rel="noopener"><span data-dcnode-id="2891" instrument_node="">Stepping into Selma</span></a><span data-dcnode-id="2889" instrument_node="">.</span></td></tr></tbody></table><span data-dcnode-id="2881" instrument_node="">

</span><div class="wpProQuiz_question_text" data-dcnode-id="2689"><span data-dcnode-id="2693" instrument_node="">
</span><h2 data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">What actions did the FBI take that had the greatest impact on the daily struggle for voting rights during the mid-20th century Civil Rights Movement?</span></h2><span data-dcnode-id="2690" instrument_node="">
</span></div><span data-dcnode-id="2688" instrument_node="">
</span><ul class="wpProQuiz_questionList" data-dcnode-id="2646" data-question_id="143" data-type="multiple"><span data-dcnode-id="2687" instrument_node="">

</span><input class="wpProQuiz_questionInput" data-dcnode-id="2682" name="question_2_143" type="checkbox" value="1"><span data-dcnode-id="2681" instrument_node=""> They protected African Americans who pursued their constitutional right to vote, attend school, use public transportation, pray, and more.                                            </span></label><span data-dcnode-id="2679" instrument_node="">

</span><label data-dcnode-id="2660"><span data-dcnode-id="2663" instrument_node="">

									Correct								</span></span><br data-dcnode-id="2638"><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2636"></p><h3 data-dcnode-id="2631"><span data-dcnode-id="2635" instrument_node="">Answer:</span><b data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node=""> </span></b><span data-dcnode-id="2632" instrument_node="">They collected information, spied on civil rights leaders (including Martin Luther King, Jr.), and spread misinformation.</span></h3><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2626"><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//americanradioworks.publicradio.org/features/king/images/fbifiles/other/full/1.jpg" onclick="javascript:window.open('http://americanradioworks.publicradio.org/features/king/images/fbifiles/other/full/1.jpg'); return false;" rel="noopener"><img alt="FBI" class="alignright wp-image-2580" data-dcnode-id="2629" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/08/FBI-231x300.jpg&amp;raw" width="270"></a><span data-dcnode-id="2627" instrument_node="">The FBI, under J. Edgar Hoover, had a long history of investigating organized efforts by African Americans, including the 1940s March on Washington Movement.</span></p><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2624" instrument_node="">As described the NPR interview with Tim Weiner (author of&nbsp;</span><em data-dcnode-id="2620"><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.npr.org/2013/03/08/173733255/the-history-of-the-fbis-secret-enemies-list" onclick="javascript:window.open('http://www.npr.org/2013/03/08/173733255/the-history-of-the-fbis-secret-enemies-list'); return false;"><span data-dcnode-id="2623" instrument_node="">Enemies: A History of the FBI</span></a><span data-dcnode-id="2621" instrument_node="">):</span></em></p><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2616" style="padding-left: 30px;"><span data-dcnode-id="2617" instrument_node="">Hoover saw the civil rights movement from the 1950s onward and the anti-war movement from the 1960s onward, as presenting the greatest threats to the stability of the American government since the Civil War. These people were enemies of the state, and in particular, Martin Luther King [Jr.] was an enemy of the state. And Hoover aimed to watch over them. If they twitched in the wrong direction, the hammer would come down.</span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">In the fall of 1963, Attorney General Robert F. Kennedy approved wiretaps on all of Martin Luther King, Jr.’s telephones. The FBI even wrote threatening letters to King with the aim of coercing King to step down from his position as the head of the Southern Christian Leadership Conference (SCLC).</span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2606"><span data-dcnode-id="2611" instrument_node="">James W. Loewen notes in </span><i data-dcnode-id="2607"><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.powells.com/book/lies-my-teacher-told-me-everything-your-american-history-textbook-got-wrong-9780743296281%3FpartnerID%3D33733" onclick="javascript:window.open('http://www.powells.com/book/lies-my-teacher-told-me-everything-your-american-history-textbook-got-wrong-9780743296281?partnerID=33733'); return false;" rel="noopener"><span data-dcnode-id="2610" instrument_node="">Lies My Teacher Told Me</span></a><span data-dcnode-id="2608" instrument_node="">,</span></i></p><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2603" style="padding-left: 30px;"><span data-dcnode-id="2604" instrument_node="">In August 1963 Hoover initiated a campaign to destroy Martin Luther King, Jr., and the civil rights movement. With the approval of Attorney General Robert F. Kennedy, he tapped the telephones of King’s associates, bugged King’s hotel rooms, and made tape recordings of King’s conversations with and about women. The FBI then passed on the lurid details, including photographs, transcripts, and tapes, to Sen. Strom Thurmond and other white supremacists, reporters, labor leaders, foundation administrators, and, of course, the president…King wasn’t the only target: Hoover also passed on disinformation about the Mississippi Summer Project; other civil rights organizations such as CORE and SNCC; and other civil rights leaders, including Jesse Jackson.</span></p><span data-dcnode-id="2602" instrument_node="">
</span><p data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">After much public pressure and for political reasons, the FBI did investigate some cases such as the high profile murders of Chaney, Goodman, and Schwerner. But the&nbsp;portrayal of the FBI as central and heroic to the struggle for voting rights, as seen&nbsp;the film&nbsp;Mississippi Burning and elsewhere, is&nbsp;largely inaccurate.</span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2596"><b data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Learn more.</span></b></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><img alt="Millsaps students " class="alignright wp-image-2828 size-medium" data-dcnode-id="2594" height="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/08/Millsaps_student_protesting_civilian_death-300x206.jpg&amp;raw" width="300"></p><span data-dcnode-id="2592" instrument_node="">

</span><p data-dcnode-id="2583"><a data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www2.gwu.edu/~nsarchiv/" onclick="javascript:window.open('http://www2.gwu.edu/~nsarchiv/'); return false;" rel="noopener" title="NSA"><span data-dcnode-id="2586" instrument_node="">National Security Archive</span></a><span data-dcnode-id="2584" instrument_node="">. Online access to&nbsp;declassified U.S. documents.</span></p><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2578"><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mdah.state.ms.us/arrec/digital_archives/sovcom/" onclick="javascript:window.open('http://mdah.state.ms.us/arrec/digital_archives/sovcom/'); return false;" rel="noopener"><span data-dcnode-id="2581" instrument_node="">Mississippi Department of Archives and History (MDAH) Sovereignty Commission Archive</span></a><span data-dcnode-id="2579" instrument_node="">. All the documents from the&nbsp;Sovereignty Commission (an agency created by the state government to spy on and undermine the Civil Rights Movement in Mississippi)&nbsp;are now online.</span></p><span data-dcnode-id="2577" instrument_node="">

</span><p data-dcnode-id="2538"><span data-dcnode-id="2543" instrument_node="">As described the NPR interview with Tim Weiner (author of&nbsp;</span><em data-dcnode-id="2539"><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.npr.org/2013/03/08/173733255/the-history-of-the-fbis-secret-enemies-list" onclick="javascript:window.open('http://www.npr.org/2013/03/08/173733255/the-history-of-the-fbis-secret-enemies-list'); return false;"><span data-dcnode-id="2542" instrument_node="">Enemies: A History of the FBI</span></a><span data-dcnode-id="2540" instrument_node="">):</span></em></p><span data-dcnode-id="2537" instrument_node="">

</span><li class="wpProQuiz_listItem" data-dcnode-id="2160" style="display: none;"><span data-dcnode-id="2466" instrument_node="">

</span><div class="wpProQuiz_question_text" data-dcnode-id="2445"><span data-dcnode-id="2449" instrument_node="">

</span></div><span data-dcnode-id="2444" instrument_node="">

</span><li class="wpProQuiz_questionListItem" data-dcnode-id="2434" data-pos="0"><span data-dcnode-id="2442" instrument_node="">

</span><input class="wpProQuiz_questionInput" data-dcnode-id="2428" name="question_2_144" type="checkbox" value="2"><span data-dcnode-id="2427" instrument_node=""> National civil rights leaders such as Martin Luther King Jr. or Roy Wilkins of the NAACP.                                            </span></label><span data-dcnode-id="2425" instrument_node="">

</span><input class="wpProQuiz_questionInput" data-dcnode-id="2418" name="question_2_144" type="checkbox" value="3"><span data-dcnode-id="2417" instrument_node=""> The March on Washington for Jobs and Freedom.                                            </span></label><span data-dcnode-id="2415" instrument_node="">

</span><label data-dcnode-id="2406"><span data-dcnode-id="2409" instrument_node="">
</span><input class="wpProQuiz_questionInput" data-dcnode-id="2408" name="question_2_144" type="checkbox" value="4"><span data-dcnode-id="2407" instrument_node=""> The federal government.                                            </span></label><span data-dcnode-id="2405" instrument_node="">

</span><p data-dcnode-id="2392"></p><h3 data-dcnode-id="2387" style="text-align: left;"><span data-dcnode-id="2391" instrument_node="">Answer:</span><b data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node=""> </span></b><span data-dcnode-id="2388" instrument_node="">Grassroots activism and organizing.</span></h3><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2378" style="text-align: center;"><img alt="crucial-element" class="alignnone size-full wp-image-5399 aligncenter" data-dcnode-id="2385" height="186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/crucial-element.png&amp;raw" width="600"><span data-dcnode-id="2383" style="font-size: 10pt;"><span data-dcnode-id="2384" instrument_node="">Left photo: Fannie Lou Hamer and Ella Baker address participants at a rally for the MFDP to be seated at the 1964 DNC. (AP Photo)</span></span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">
</span><span data-dcnode-id="2379" style="font-size: 10pt;"><span data-dcnode-id="2380" instrument_node="">Right photo: Gloria Richardson facing off the National Guard, Cambridge, Maryland, May 1964. Photo by Fred Ward</span></span></p><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2376"></p><div class="wp-caption alignright" data-dcnode-id="2372" id="attachment_3019" style="width: 247px"><img alt="" aria-describedby="caption-attachment-3019" class="wp-image-3019 size-medium" data-dcnode-id="2375" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/12/Oxford-237x300.jpg&amp;raw" width="237"><p class="wp-caption-text" data-dcnode-id="2373" id="caption-attachment-3019"><span data-dcnode-id="2374" instrument_node="">SNCC staff leads volunteers in freedom songs during the second 1964 SNCC Orientation Session at Western College for Women in Oxford, Ohio. In the front of the audience, right, is Fannie Lou Hamer and, left, SNCC staff member Chuck Neblett. Courtesy McCain Library and Archives, University of Southern Mississippi.</span></p></div><p data-dcnode-id="2371"></p><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368" style="text-align: left;"><span data-dcnode-id="2369" instrument_node="">Inspiring leaders, large mass demonstrations, and eventually federal civil rights legislation and enforcement all contributed to changes toward greater equality, but grassroots organizers laid the essential foundation of the movement.&nbsp;Largely unacknowledged in textbooks, they performed the unglamorous, painstaking, and often dangerous work of building trust, commitment, and collective action toward local victories.</span></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2360" style="text-align: left;"><span data-dcnode-id="2366" instrument_node="">Charles Payne, the author of&nbsp;</span><em data-dcnode-id="2362"><a data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/ive-got-the-light-of-freedom/" onclick="javascript:window.open('http://zinnedproject.org/materials/ive-got-the-light-of-freedom/'); return false;" rel="noopener" title="book info"><span data-dcnode-id="2365" instrument_node="">I’ve Got the Light of Freedom</span></a><span data-dcnode-id="2363" instrument_node="">,</span></em><span data-dcnode-id="2361" instrument_node="">&nbsp;explains:</span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2357" style="padding-left: 30px; text-align: left;"><span data-dcnode-id="2358" instrument_node="">The leaders were ordinary women and men–sharecroppers, domestics, high school students, beauticians, independent farmers–committed to organizing the civil rights struggle house by house, block by block, relationship by relationship.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2339" style="padding-left: 30px; text-align: left;"><span data-dcnode-id="2355" instrument_node="">The young organizers who were the engines of change in the state were not following any charismatic national leader. Far from being a complete break with the past, their work was based directly on the work of an older generation of activists, people like </span><a data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/baker-ella/" onclick="javascript:window.open('http://zinnedproject.org/materials/baker-ella/'); return false;" rel="noopener" title="profile of Baker"><span data-dcnode-id="2354" instrument_node="">Ella Baker</span></a><span data-dcnode-id="2352" instrument_node="">, </span><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/freedoms-teacher/" onclick="javascript:window.open('http://zinnedproject.org/materials/freedoms-teacher/'); return false;" rel="noopener" title="book about Clark"><span data-dcnode-id="2351" instrument_node="">Septima Clark</span></a><span data-dcnode-id="2349" instrument_node="">, </span><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crmvet.org/nars/amzie.htm" onclick="javascript:window.open('http://www.crmvet.org/nars/amzie.htm'); return false;" rel="noopener" title="interview on CRMvet site"><span data-dcnode-id="2348" instrument_node="">Amzie Moore</span></a><span data-dcnode-id="2346" instrument_node="">, </span><a data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/evers-medgar/" onclick="javascript:window.open('http://zinnedproject.org/materials/evers-medgar/'); return false;" rel="noopener" title="profile of Evers"><span data-dcnode-id="2345" instrument_node="">Medgar Evers</span></a><span data-dcnode-id="2343" instrument_node="">, </span><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mshistorynow.mdah.state.ms.us/articles/363/aaron-henry-a-civil-rights-leader-of-the-20th-century" onclick="javascript:window.open('http://mshistorynow.mdah.state.ms.us/articles/363/aaron-henry-a-civil-rights-leader-of-the-20th-century'); return false;" rel="noopener" title="Henry profile "><span data-dcnode-id="2342" instrument_node="">Aaron Henry</span></a><span data-dcnode-id="2340" instrument_node="">. These leaders set the standards of courage against which young organizers judged themselves; they served as models of activism that balanced humanism with militance.</span></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336" style="text-align: left;"><span data-dcnode-id="2337" instrument_node="">While historians have commonly portrayed the movement leadership as male, ministerial, and well-educated, Payne finds that organizers in Mississippi and elsewhere in the most dangerous parts of the South looked for leadership to working-class rural Blacks, and especially to women.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333" style="text-align: left;"><span data-dcnode-id="2334" instrument_node="">The federal government played a crucial role in enabling progress towards voting rights, but without the public pressure and information generated by grassroots organizing, the legislative and judicial victories won would not have come to pass.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2329" style="text-align: left;"><strong data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">More information</span></strong></p><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2325"><a data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/ive-got-the-light-of-freedom/" onclick="javascript:window.open('http://zinnedproject.org/materials/ive-got-the-light-of-freedom/'); return false;"><img alt="lightoffreedom-264x400" class="alignright" data-dcnode-id="2327" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/08/lightoffreedom-264x400-198x300.jpg&amp;raw" width="119"></a></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2319"><em data-dcnode-id="2321"><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/ive-got-the-light-of-freedom/" onclick="javascript:window.open('http://zinnedproject.org/materials/ive-got-the-light-of-freedom/'); return false;" rel="noopener" title="info on book"><span data-dcnode-id="2323" instrument_node="">I’ve Got the Light of Freedom: The Organizing Tradition and the Mississippi Freedom Struggle</span></a></em><span data-dcnode-id="2320" instrument_node="">. By Charles Payne. 2007. University of California Press. One of the best books on the day-to-day grassroots organizing that was the primary, though less visible, work of the Civil Rights Movement.</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2314"><a data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/standing-on-my-sisters-shoulders/" onclick="javascript:window.open('http://zinnedproject.org/materials/standing-on-my-sisters-shoulders/'); return false;" rel="noopener" title="film description"><span data-dcnode-id="2317" instrument_node="">Standing on My Sisters’ Shoulders</span></a><span data-dcnode-id="2315" instrument_node="">. Film. By Joan Sadoff, Robert Sadoff, and Laura Lipson. 2002. 60 minutes. Documentary film on women in the Civil Rights Movement. While focused on Mississippi, it is useful for shining on a light on the people’s history of the Movement and in particular the role of women.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2306"><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crmvet.org/" onclick="javascript:window.open('http://www.crmvet.org/'); return false;" rel="noopener" title="Visit website."><span data-dcnode-id="2312" instrument_node="">Civil Rights Movement Veterans website</span></a><span data-dcnode-id="2310" instrument_node="">. Created by Veterans of the Southern Freedom Movement (1951-1968), this is where (as they explain), “we tell it like it was, the way we lived it, the way we saw it, the way we&nbsp;</span><i data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">still</span></i><span data-dcnode-id="2307" instrument_node="">&nbsp;see it. With a few minor exceptions, everything on this site was written, created, or spoken by Movement activists who were direct participants in the events they chronicle.</span></p><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2294"><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//socialjusticebooks.org/store/critical-focus-harry-wilson-richards/" onclick="javascript:window.open('https://socialjusticebooks.org/store/critical-focus-harry-wilson-richards/'); return false;" rel="noopener"><img alt="critical" class="alignright wp-image-2234" data-dcnode-id="2304" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/08/critical1-276x300.jpg&amp;raw" width="106"></a><em data-dcnode-id="2299"><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//socialjusticebooks.org/store/critical-focus-harry-wilson-richards/" onclick="javascript:window.open('https://socialjusticebooks.org/store/critical-focus-harry-wilson-richards/'); return false;" rel="noopener" title="Classroom teachers can request a free copy"><span data-dcnode-id="2302" instrument_node="">Critical Focus: The Black and White Photographs of Harvey Wilson Richards</span></a><span data-dcnode-id="2300" instrument_node="">. </span></em><span data-dcnode-id="2298" instrument_node="">This book of photographs is available for </span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/2013/05/treasure-trove-of-historic-movement-photos/" onclick="javascript:window.open('http://zinnedproject.org/2013/05/treasure-trove-of-historic-movement-photos/'); return false;" rel="noopener" title="info"><span data-dcnode-id="2297" instrument_node="">free for teachers</span></a><span data-dcnode-id="2295" instrument_node="">. These photos depict the people’s history of the Civil Rights Movement and related struggles and demonstrate that racism and resistance were not limited to the southern states.</span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2289"><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/" onclick="javascript:window.open('https://snccdigital.org/'); return false;"><span data-dcnode-id="2292" instrument_node="">SNCC Digital Gateway</span></a><span data-dcnode-id="2290" instrument_node="">:&nbsp;This digital gateway draws in documents, photographs, and audiovisual materials found at Duke and other SNCC-related collections in repositories across the country and uses them to chronicle the historic struggles for voting rights that youth, converging with older community leaders, fought for and won.</span></p><p data-dcnode-id="2288"></p><span data-dcnode-id="2287" instrument_node=""> </span></div><span data-dcnode-id="2285" instrument_node="">
</span><div class="wpProQuiz_incorrect" data-dcnode-id="2172" style="display: none;"><span data-dcnode-id="2284" instrument_node="">
</span><span class="wpProQuiz_respone_span" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">
									Incorrect								</span></span><br data-dcnode-id="2281"><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2279"></p><h3 data-dcnode-id="2274" style="text-align: left;"><span data-dcnode-id="2278" instrument_node="">Answer:</span><b data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node=""> </span></b><span data-dcnode-id="2275" instrument_node="">Grassroots activism and organizing.</span></h3><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2265" style="text-align: center;"><img alt="crucial-element" class="alignnone size-full wp-image-5399 aligncenter" data-dcnode-id="2272" height="186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/crucial-element.png&amp;raw" width="600"><span data-dcnode-id="2270" style="font-size: 10pt;"><span data-dcnode-id="2271" instrument_node="">Left photo: Fannie Lou Hamer and Ella Baker address participants at a rally for the MFDP to be seated at the 1964 DNC. (AP Photo)</span></span><br data-dcnode-id="2269"><span data-dcnode-id="2268" instrument_node="">
</span><span data-dcnode-id="2266" style="font-size: 10pt;"><span data-dcnode-id="2267" instrument_node="">Right photo: Gloria Richardson facing off the National Guard, Cambridge, Maryland, May 1964. Photo by Fred Ward</span></span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2263"></p><div class="wp-caption alignright" data-dcnode-id="2259" id="attachment_3019" style="width: 247px"><img alt="" aria-describedby="caption-attachment-3019" class="wp-image-3019 size-medium" data-dcnode-id="2262" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/12/Oxford-237x300.jpg&amp;raw" width="237"><p class="wp-caption-text" data-dcnode-id="2260" id="caption-attachment-3019"><span data-dcnode-id="2261" instrument_node="">SNCC staff leads volunteers in freedom songs during the second 1964 SNCC Orientation Session at Western College for Women in Oxford, Ohio. In the front of the audience, right, is Fannie Lou Hamer and, left, SNCC staff member Chuck Neblett. Courtesy McCain Library and Archives, University of Southern Mississippi.</span></p></div><p data-dcnode-id="2258"></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2255" style="text-align: left;"><span data-dcnode-id="2256" instrument_node="">Inspiring leaders, large mass demonstrations, and eventually federal civil rights legislation and enforcement all contributed to changes toward greater equality, but grassroots organizers laid the essential foundation of the movement.&nbsp;Largely unacknowledged in textbooks, they performed the unglamorous, painstaking, and often dangerous work of building trust, commitment, and collective action toward local victories.</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2247" style="text-align: left;"><span data-dcnode-id="2253" instrument_node="">Charles Payne, the author of&nbsp;</span><em data-dcnode-id="2249"><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/ive-got-the-light-of-freedom/" onclick="javascript:window.open('http://zinnedproject.org/materials/ive-got-the-light-of-freedom/'); return false;" rel="noopener" title="book info"><span data-dcnode-id="2252" instrument_node="">I’ve Got the Light of Freedom</span></a><span data-dcnode-id="2250" instrument_node="">,</span></em><span data-dcnode-id="2248" instrument_node="">&nbsp;explains:</span></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2244" style="padding-left: 30px; text-align: left;"><span data-dcnode-id="2245" instrument_node="">The leaders were ordinary women and men–sharecroppers, domestics, high school students, beauticians, independent farmers–committed to organizing the civil rights struggle house by house, block by block, relationship by relationship.</span></p><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2226" style="padding-left: 30px; text-align: left;"><span data-dcnode-id="2242" instrument_node="">The young organizers who were the engines of change in the state were not following any charismatic national leader. Far from being a complete break with the past, their work was based directly on the work of an older generation of activists, people like </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/baker-ella/" onclick="javascript:window.open('http://zinnedproject.org/materials/baker-ella/'); return false;" rel="noopener" title="profile of Baker"><span data-dcnode-id="2241" instrument_node="">Ella Baker</span></a><span data-dcnode-id="2239" instrument_node="">, </span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/freedoms-teacher/" onclick="javascript:window.open('http://zinnedproject.org/materials/freedoms-teacher/'); return false;" rel="noopener" title="book about Clark"><span data-dcnode-id="2238" instrument_node="">Septima Clark</span></a><span data-dcnode-id="2236" instrument_node="">, </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crmvet.org/nars/amzie.htm" onclick="javascript:window.open('http://www.crmvet.org/nars/amzie.htm'); return false;" rel="noopener" title="interview on CRMvet site"><span data-dcnode-id="2235" instrument_node="">Amzie Moore</span></a><span data-dcnode-id="2233" instrument_node="">, </span><a data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/evers-medgar/" onclick="javascript:window.open('http://zinnedproject.org/materials/evers-medgar/'); return false;" rel="noopener" title="profile of Evers"><span data-dcnode-id="2232" instrument_node="">Medgar Evers</span></a><span data-dcnode-id="2230" instrument_node="">, </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mshistorynow.mdah.state.ms.us/articles/363/aaron-henry-a-civil-rights-leader-of-the-20th-century" onclick="javascript:window.open('http://mshistorynow.mdah.state.ms.us/articles/363/aaron-henry-a-civil-rights-leader-of-the-20th-century'); return false;" rel="noopener" title="Henry profile "><span data-dcnode-id="2229" instrument_node="">Aaron Henry</span></a><span data-dcnode-id="2227" instrument_node="">. These leaders set the standards of courage against which young organizers judged themselves; they served as models of activism that balanced humanism with militance.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223" style="text-align: left;"><span data-dcnode-id="2224" instrument_node="">While historians have commonly portrayed the movement leadership as male, ministerial, and well-educated, Payne finds that organizers in Mississippi and elsewhere in the most dangerous parts of the South looked for leadership to working-class rural Blacks, and especially to women.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220" style="text-align: left;"><span data-dcnode-id="2221" instrument_node="">The federal government played a crucial role in enabling progress towards voting rights, but without the public pressure and information generated by grassroots organizing, the legislative and judicial victories won would not have come to pass.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2216" style="text-align: left;"><strong data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">More information</span></strong></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2212"><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/ive-got-the-light-of-freedom/" onclick="javascript:window.open('http://zinnedproject.org/materials/ive-got-the-light-of-freedom/'); return false;"><img alt="lightoffreedom-264x400" class="alignright" data-dcnode-id="2214" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/08/lightoffreedom-264x400-198x300.jpg&amp;raw" width="119"></a></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2206"><em data-dcnode-id="2208"><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/ive-got-the-light-of-freedom/" onclick="javascript:window.open('http://zinnedproject.org/materials/ive-got-the-light-of-freedom/'); return false;" rel="noopener" title="info on book"><span data-dcnode-id="2210" instrument_node="">I’ve Got the Light of Freedom: The Organizing Tradition and the Mississippi Freedom Struggle</span></a></em><span data-dcnode-id="2207" instrument_node="">. By Charles Payne. 2007. University of California Press. One of the best books on the day-to-day grassroots organizing that was the primary, though less visible, work of the Civil Rights Movement.</span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2201"><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/standing-on-my-sisters-shoulders/" onclick="javascript:window.open('http://zinnedproject.org/materials/standing-on-my-sisters-shoulders/'); return false;" rel="noopener" title="film description"><span data-dcnode-id="2204" instrument_node="">Standing on My Sisters’ Shoulders</span></a><span data-dcnode-id="2202" instrument_node="">. Film. By Joan Sadoff, Robert Sadoff, and Laura Lipson. 2002. 60 minutes. Documentary film on women in the Civil Rights Movement. While focused on Mississippi, it is useful for shining on a light on the people’s history of the Movement and in particular the role of women.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2193"><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crmvet.org/" onclick="javascript:window.open('http://www.crmvet.org/'); return false;" rel="noopener" title="Visit website."><span data-dcnode-id="2199" instrument_node="">Civil Rights Movement Veterans website</span></a><span data-dcnode-id="2197" instrument_node="">. Created by Veterans of the Southern Freedom Movement (1951-1968), this is where (as they explain), “we tell it like it was, the way we lived it, the way we saw it, the way we&nbsp;</span><i data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">still</span></i><span data-dcnode-id="2194" instrument_node="">&nbsp;see it. With a few minor exceptions, everything on this site was written, created, or spoken by Movement activists who were direct participants in the events they chronicle.</span></p><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2181"><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//socialjusticebooks.org/store/critical-focus-harry-wilson-richards/" onclick="javascript:window.open('https://socialjusticebooks.org/store/critical-focus-harry-wilson-richards/'); return false;" rel="noopener"><img alt="critical" class="alignright wp-image-2234" data-dcnode-id="2191" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2013/08/critical1-276x300.jpg&amp;raw" width="106"></a><em data-dcnode-id="2186"><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//socialjusticebooks.org/store/critical-focus-harry-wilson-richards/" onclick="javascript:window.open('https://socialjusticebooks.org/store/critical-focus-harry-wilson-richards/'); return false;" rel="noopener" title="Classroom teachers can request a free copy"><span data-dcnode-id="2189" instrument_node="">Critical Focus: The Black and White Photographs of Harvey Wilson Richards</span></a><span data-dcnode-id="2187" instrument_node="">. </span></em><span data-dcnode-id="2185" instrument_node="">This book of photographs is available for </span><a data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/2013/05/treasure-trove-of-historic-movement-photos/" onclick="javascript:window.open('http://zinnedproject.org/2013/05/treasure-trove-of-historic-movement-photos/'); return false;" rel="noopener" title="info"><span data-dcnode-id="2184" instrument_node="">free for teachers</span></a><span data-dcnode-id="2182" instrument_node="">. These photos depict the people’s history of the Civil Rights Movement and related struggles and demonstrate that racism and resistance were not limited to the southern states.</span></p><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2176"><a data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/" onclick="javascript:window.open('https://snccdigital.org/'); return false;"><span data-dcnode-id="2179" instrument_node="">SNCC Digital Gateway</span></a><span data-dcnode-id="2177" instrument_node="">:&nbsp;This digital gateway draws in documents, photographs, and audiovisual materials found at Duke and other SNCC-related collections in repositories across the country and uses them to chronicle the historic struggles for voting rights that youth, converging with older community leaders, fought for and won.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2174"></p><span data-dcnode-id="2173" instrument_node=""> </span></div><span data-dcnode-id="2171" instrument_node="">

</span><div class="wpProQuiz_question" data-dcnode-id="2092" style="margin: 10px 0 0 0;"><span data-dcnode-id="2142" instrument_node="">
