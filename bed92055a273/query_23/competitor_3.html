</span><p data-dcnode-id="2084"></p><h3 data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Answer: Door-to-Door Canvassing</span></h3><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2080"></p><div class="wp-caption alignright" data-dcnode-id="2076" id="attachment_5318" style="width: 310px"><img alt="canvassing" aria-describedby="caption-attachment-5318" class="wp-image-5318 size-medium" data-dcnode-id="2079" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/canvassing-300x240.jpg&amp;raw" width="300"><p class="wp-caption-text" data-dcnode-id="2077" id="caption-attachment-5318"><span data-dcnode-id="2078" instrument_node="">Doug Smith and Sandy Leigh participate in voter registration canvassing, 1964. Photo (c) Herbert Randall. McCain Library and Archives, USM.</span></p></div><p data-dcnode-id="2075"></p><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Ask anyone to describe the Civil Rights Movement and they’ll tell you about mass demonstrations, inspiring speeches, or sit-ins—challenging segregation. Organizing around voter registration required different tactics and skills.</span></p><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2070" instrument_node="">As Emilye Crosby and Judy Richardson explain in&nbsp;</span><a data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/the-voting-rights-act-ten-things-you-should-know/" onclick="javascript:window.open('http://zinnedproject.org/materials/the-voting-rights-act-ten-things-you-should-know/'); return false;" rel="noopener"><span data-dcnode-id="2069" instrument_node="">The Voting Rights Act: Ten Things You Should Know</span></a><span data-dcnode-id="2067" instrument_node="">, the work of the Student Nonviolent Coordinating Committee exemplified the grassroots, door-to-door, organizing:</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2060" style="padding-left: 30px;"><span data-dcnode-id="2064" instrument_node="">SNCC (the </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/inside-sncc/the-story-of-sncc/" onclick="javascript:window.open('https://snccdigital.org/inside-sncc/the-story-of-sncc/'); return false;" rel="noopener"><span data-dcnode-id="2063" instrument_node="">Student Nonviolent Coordinating Committee</span></a><span data-dcnode-id="2061" instrument_node="">), an organization of young people that emerged from the 1960 sit-in movement, developed an approach to grassroots community organizing that has influenced every subsequent progressive movement. Their voter registration work in the Deep South was built around canvassing—going door-to-door, talking to people—and relied on patience, education, and building relationships. The work could be slow and tedious. It took place out of the spotlight, with few big or quick victories.</span></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2048" style="padding-left: 30px;"><span data-dcnode-id="2058" instrument_node="">Influenced by </span><a data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colorlines.com/articles/ella-taught-me-shattering-myth-leaderless-movement" onclick="javascript:window.open('http://www.colorlines.com/articles/ella-taught-me-shattering-myth-leaderless-movement'); return false;" rel="noopener"><span data-dcnode-id="2057" instrument_node="">Ella Baker</span></a><span data-dcnode-id="2055" instrument_node=""> and community leaders, the young people in </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/sncc/" onclick="javascript:window.open('http://zinnedproject.org/materials/sncc/'); return false;"><span data-dcnode-id="2054" instrument_node="">SNCC</span></a><span data-dcnode-id="2052" instrument_node=""> made decisions by consensus, helped develop leadership skills in others, and challenged hierarchies that privileged wealth and education. In </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crmvet.org/tim/timhis61.htm%231961davvr" onclick="javascript:window.open('http://www.crmvet.org/tim/timhis61.htm#1961davvr'); return false;" rel="noopener"><span data-dcnode-id="2051" instrument_node="">the summer of 1961</span></a><span data-dcnode-id="2049" instrument_node="">, a group of about 16 young people put school and jobs on hold to become SNCC’s first field staff and commit to full-time movement work.</span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045" style="padding-left: 30px;"><span data-dcnode-id="2046" instrument_node="">Over the next four years—working with other organizations and allies—SNCC was successful at organizing rural African American communities and making it impossible for the country to ignore the violence and discrimination at the heart of Jim Crow and white supremacy.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042" style="padding-left: 30px;"><span data-dcnode-id="2043" instrument_node="">Though SNCC was not acting alone, their organizing was at the heart of the movement that moved people to insist that our country eliminate the legal basis of white supremacy. SNCC’s organizing led directly to the Voting Rights Act, expanding the electorate and ending the undemocratic stranglehold of the southern Dixiecrats. Their work made the national Democratic Party more explicitly representative (in race and gender).</span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2039" style="padding-left: 30px;"><span data-dcnode-id="2040" instrument_node="">Perhaps most importantly, SNCC recognized and nurtured leadership in people that the rest of the country had dismissed (like Hamer). Their alliance with these everyday people breathed new life into our democracy—challenging long-standing ideas of who and what was important.</span></p><p data-dcnode-id="2038"></p><span data-dcnode-id="2037" instrument_node=""> </span></div><span data-dcnode-id="2035" instrument_node="">
</span><div class="wpProQuiz_incorrect" data-dcnode-id="1980" style="display: none;"><span data-dcnode-id="2034" instrument_node="">
</span><span class="wpProQuiz_respone_span" data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">
									Incorrect								</span></span><br data-dcnode-id="2031"><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2029"></p><h3 data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Answer: Door-to-Door Canvassing</span></h3><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="2025"></p><div class="wp-caption alignright" data-dcnode-id="2021" id="attachment_5318" style="width: 310px"><img alt="canvassing" aria-describedby="caption-attachment-5318" class="wp-image-5318 size-medium" data-dcnode-id="2024" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/canvassing-300x240.jpg&amp;raw" width="300"><p class="wp-caption-text" data-dcnode-id="2022" id="caption-attachment-5318"><span data-dcnode-id="2023" instrument_node="">Doug Smith and Sandy Leigh participate in voter registration canvassing, 1964. Photo (c) Herbert Randall. McCain Library and Archives, USM.</span></p></div><p data-dcnode-id="2020"></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Ask anyone to describe the Civil Rights Movement and they’ll tell you about mass demonstrations, inspiring speeches, or sit-ins—challenging segregation. Organizing around voter registration required different tactics and skills.</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2015" instrument_node="">As Emilye Crosby and Judy Richardson explain in&nbsp;</span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/the-voting-rights-act-ten-things-you-should-know/" onclick="javascript:window.open('http://zinnedproject.org/materials/the-voting-rights-act-ten-things-you-should-know/'); return false;" rel="noopener"><span data-dcnode-id="2014" instrument_node="">The Voting Rights Act: Ten Things You Should Know</span></a><span data-dcnode-id="2012" instrument_node="">, the work of the Student Nonviolent Coordinating Committee exemplified the grassroots, door-to-door, organizing:</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2005" style="padding-left: 30px;"><span data-dcnode-id="2009" instrument_node="">SNCC (the </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/inside-sncc/the-story-of-sncc/" onclick="javascript:window.open('https://snccdigital.org/inside-sncc/the-story-of-sncc/'); return false;" rel="noopener"><span data-dcnode-id="2008" instrument_node="">Student Nonviolent Coordinating Committee</span></a><span data-dcnode-id="2006" instrument_node="">), an organization of young people that emerged from the 1960 sit-in movement, developed an approach to grassroots community organizing that has influenced every subsequent progressive movement. Their voter registration work in the Deep South was built around canvassing—going door-to-door, talking to people—and relied on patience, education, and building relationships. The work could be slow and tedious. It took place out of the spotlight, with few big or quick victories.</span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="1993" style="padding-left: 30px;"><span data-dcnode-id="2003" instrument_node="">Influenced by </span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colorlines.com/articles/ella-taught-me-shattering-myth-leaderless-movement" onclick="javascript:window.open('http://www.colorlines.com/articles/ella-taught-me-shattering-myth-leaderless-movement'); return false;" rel="noopener"><span data-dcnode-id="2002" instrument_node="">Ella Baker</span></a><span data-dcnode-id="2000" instrument_node=""> and community leaders, the young people in </span><a data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/sncc/" onclick="javascript:window.open('http://zinnedproject.org/materials/sncc/'); return false;"><span data-dcnode-id="1999" instrument_node="">SNCC</span></a><span data-dcnode-id="1997" instrument_node=""> made decisions by consensus, helped develop leadership skills in others, and challenged hierarchies that privileged wealth and education. In </span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crmvet.org/tim/timhis61.htm%231961davvr" onclick="javascript:window.open('http://www.crmvet.org/tim/timhis61.htm#1961davvr'); return false;" rel="noopener"><span data-dcnode-id="1996" instrument_node="">the summer of 1961</span></a><span data-dcnode-id="1994" instrument_node="">, a group of about 16 young people put school and jobs on hold to become SNCC’s first field staff and commit to full-time movement work.</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1990" style="padding-left: 30px;"><span data-dcnode-id="1991" instrument_node="">Over the next four years—working with other organizations and allies—SNCC was successful at organizing rural African American communities and making it impossible for the country to ignore the violence and discrimination at the heart of Jim Crow and white supremacy.</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987" style="padding-left: 30px;"><span data-dcnode-id="1988" instrument_node="">Though SNCC was not acting alone, their organizing was at the heart of the movement that moved people to insist that our country eliminate the legal basis of white supremacy. SNCC’s organizing led directly to the Voting Rights Act, expanding the electorate and ending the undemocratic stranglehold of the southern Dixiecrats. Their work made the national Democratic Party more explicitly representative (in race and gender).</span></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1984" style="padding-left: 30px;"><span data-dcnode-id="1985" instrument_node="">Perhaps most importantly, SNCC recognized and nurtured leadership in people that the rest of the country had dismissed (like Hamer). Their alliance with these everyday people breathed new life into our democracy—challenging long-standing ideas of who and what was important.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1982"></p><span data-dcnode-id="1981" instrument_node=""> </span></div><span data-dcnode-id="1979" instrument_node="">

</span><p data-dcnode-id="1872"></p><h3 data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Answer: All of the Above</span></h3><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1863"><img alt="amelia-boynton-young" class="alignright wp-image-5320" data-dcnode-id="1868" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/amelia-boynton-young-203x300.jpg&amp;raw" width="101"><span data-dcnode-id="1867" instrument_node="">Mrs. Amelia Boynton was a stalwart with the </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/resource/dallas-county-voters-league/" onclick="javascript:window.open('http://civilrightsteaching.org/resource/dallas-county-voters-league/'); return false;"><span data-dcnode-id="1866" instrument_node="">Dallas County Voters League</span></a><span data-dcnode-id="1864" instrument_node=""> and played a critical role for decades in nurturing African American efforts to register to vote. She welcomed SNCC to town and helped support the younger activists and their work. When Judge Hare’s injunction slowed the grassroots organizing, she initiated the invitation to King and SCLC</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1856"><a data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyengine.richmond.edu/episodes/view/5470" onclick="javascript:window.open('https://historyengine.richmond.edu/episodes/view/5470'); return false;" rel="noopener"><img alt="" class="alignleft size-full wp-image-267" data-dcnode-id="1861" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//quiz.teachingforchange.org/wp-content/uploads/2020/07/marie.png&amp;raw" width="140"></a><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyengine.richmond.edu/episodes/view/5470" onclick="javascript:window.open('https://historyengine.richmond.edu/episodes/view/5470'); return false;"><span data-dcnode-id="1859" instrument_node="">Marie Foster</span></a><span data-dcnode-id="1857" instrument_node=""> was another significant local activist, teaching Citizenship classes even before SNCC arrived and remaining steadfast through the slow, brutal work of building a movement in the context of extreme repression. In early 1965 when SCLC began escalating the confrontation in Selma, Mrs. Boynton and Foster were both in the thick of things, inspiring others and putting their own bodies on the line. They were leaders on Bloody Sunday and the subsequent march to Montgomery. Whether working behind the scenes when the movement was just a handful of people or near the front of the line when the entire nation was watching Selma, they were courageous and unwavering.</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1840"><img alt="colialafayette" class="alignright wp-image-5322" data-dcnode-id="1854" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/colialafayette-300x207.jpg&amp;raw" width="217"><span data-dcnode-id="1853" instrument_node="">Though </span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/colia-liddell-lafayette/" onclick="javascript:window.open('https://snccdigital.org/people/colia-liddell-lafayette/'); return false;" rel="noopener" title="Colia Lafayette profile on SNCC One Vote website"><span data-dcnode-id="1852" instrument_node="">Colia Liddell Lafayette</span></a><span data-dcnode-id="1850" instrument_node=""> worked side by side with her husband Bernard, recruiting student workers and doing the painstaking work of building a grassroots movement in Selma, she has become almost invisible and typically mentioned only in passing, as his wife.&nbsp;Her father and grandfather worked with the </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/southern-tenant-farmers-union/" onclick="javascript:window.open('http://zinnedproject.org/materials/southern-tenant-farmers-union/'); return false;" rel="noopener" title="lesson on the Southern Tenant Farmers Union"><span data-dcnode-id="1849" instrument_node="">Southern Tenant Farmers’ Union</span></a><span data-dcnode-id="1847" instrument_node=""> and she was a strong organizer in her own right, founding an important NAACP Youth Branch in Jackson, Mississippi, and working for </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/medgar-evers/" onclick="javascript:window.open('https://snccdigital.org/people/medgar-evers/'); return false;" rel="noopener" title="Medgar Evers profile"><span data-dcnode-id="1846" instrument_node="">Medgar Evers</span></a><span data-dcnode-id="1844" instrument_node=""> before moving to Selma to organize with her new husband. She remained there until, at the request of SNCC Executive Secretary </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/james-forman/" onclick="javascript:window.open('https://snccdigital.org/people/james-forman/'); return false;" rel="noopener" title="James Forman profile from SNCC One Vote website"><span data-dcnode-id="1843" instrument_node="">James Forman</span></a><span data-dcnode-id="1841" instrument_node="">, she relocated to nearby Birmingham to help organize the spring 1963 demonstrations. In Birmingham,&nbsp;being pregnant offered no protection and she was badly injured when white officials used fire hoses to attack demonstrators.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1831"><img alt="prathiahall" class="alignleft wp-image-5324" data-dcnode-id="1838" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/prathiahall.jpg&amp;raw" width="148"><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/prathia-hall/" onclick="javascript:window.open('https://snccdigital.org/people/prathia-hall/'); return false;"><span data-dcnode-id="1837" instrument_node="">Prathia Hall</span></a><span data-dcnode-id="1835" instrument_node="">, a Philadelphia native who began working with SNCC in Southwest Georgia, </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/resource/bloody-selma/" onclick="javascript:window.open('http://civilrightsteaching.org/resource/bloody-selma/'); return false;" rel="noopener" title="Prathia Hall on Selma"><span data-dcnode-id="1834" instrument_node="">joined the Selma effort</span></a><span data-dcnode-id="1832" instrument_node=""> in the fall of 1963 when the Lafayettes moved on to Nashville. Philosophically nonviolent, she was a brilliant organizer and orator who later became an ordained minister. She returned to Selma after Bloody Sunday to help SNCC and local activists figure out how to move forward.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1822"><img alt="DianeNashPhoto" class="alignright wp-image-5323" data-dcnode-id="1829" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/DianeNashPhoto-259x300.jpg&amp;raw" width="129"><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/diane-nash-bevel/" onclick="javascript:window.open('https://snccdigital.org/people/diane-nash-bevel/'); return false;" rel="noopener" title="Nash profile on One Person, One Vote website"><span data-dcnode-id="1828" instrument_node="">Diane Nash</span></a><span data-dcnode-id="1826" instrument_node="">, whose plan for a nonviolent war on Montgomery inspired the initial Selma march, was already a seasoned veteran, leading the Nashville sit-ins, helping found SNCC, and taking decisive action to carry the freedom rides forward. In 1961 she married </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/james-bevel/" onclick="javascript:window.open('https://snccdigital.org/people/james-bevel/'); return false;" rel="noopener"><span data-dcnode-id="1825" instrument_node="">Jim Bevel</span></a><span data-dcnode-id="1823" instrument_node=""> and then followed him out of SNCC and into SCLC. According to SCLC insider Andrew Young, “No small measure of what we saw as Jim’s brilliance was due to Diane’s rational thinking and influence.”</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">These are just a few of the many women who were critical to the movement’s success—in Selma and across the country. Like their male co-workers, they organized, demonstrated, taught, preached, and strategized. They also cooked and housed workers, tried to register, and recruited friends and neighbors. And, like men, they were threatened, attacked, beaten, and fired. Through it all they stood up for themselves and their communities, insisting on their “freedom rights.”</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1808"><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Source:</span></strong><span data-dcnode-id="1812" instrument_node=""> “</span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.teachingforchange.org/selma-bottom-up-history" onclick="javascript:window.open('http://www.teachingforchange.org/selma-bottom-up-history'); return false;" rel="noopener"><span data-dcnode-id="1811" instrument_node="">The Selma Voting Rights Struggle: 15 Key Points from Bottom-Up History and Why It Matters Today</span></a><span data-dcnode-id="1809" instrument_node="">” by Emilye Crosby</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1804"><strong data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">More information</span></strong></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1796"><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/hands-on-the-freedom-plow/" onclick="javascript:window.open('http://zinnedproject.org/materials/hands-on-the-freedom-plow/'); return false;" rel="noopener"><em data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Hands on the Freedom Plow</span></em></a><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/hands-on-the-freedom-plow/" onclick="javascript:window.open('http://zinnedproject.org/materials/hands-on-the-freedom-plow/'); return false;"><img alt="freedom_plow-264x400" class="alignright wp-image-5342" data-dcnode-id="1799" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/freedom_plow-264x400.jpg&amp;raw" width="112"></a><span data-dcnode-id="1797" instrument_node="">: Personal Accounts by Women in SNCC. In Hands on the Freedom Plow, fifty-two women — southern and northern, old and young, rural and urban, black, white, and Latina — share their courageous personal stories of working for the Student Nonviolent Coordinating Committee (SNCC) on the front lines of the Civil Rights Movement.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1790"><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.powells.com/book/womanpower-unlimited-and-the-black-freedom-struggle-in-mississippi-9780820347318%3FpartnerID%3D33733" onclick="javascript:window.open('http://www.powells.com/book/womanpower-unlimited-and-the-black-freedom-struggle-in-mississippi-9780820347318?partnerID=33733'); return false;" rel="noopener"><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Womanpower Unlimited and the Black Freedom Struggle in Mississippi</span></em></a><span data-dcnode-id="1791" instrument_node="">. Tiyi M. Morris provides the first comprehensive examination of the Jackson, Mississippi based women’s organization Womanpower Unlimited.</span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1784"><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/standing-on-my-sisters-shoulders/" onclick="javascript:window.open('http://zinnedproject.org/materials/standing-on-my-sisters-shoulders/'); return false;" rel="noopener"><em data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Standing on My Sisters’ Shoulders (Film)</span></em></a><span data-dcnode-id="1785" instrument_node="">. One of the best films on the Civil Rights Movement, this award-winning documentary reveals the movement in Mississippi in the 1950s and 60s from the point of view of the courageous women who lived it — and emerged as its grassroots leaders.</span></p><span data-dcnode-id="1783" instrument_node="">

</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1777"></p><span data-dcnode-id="1776" instrument_node=""> </span></div><span data-dcnode-id="1774" instrument_node="">

</span><p data-dcnode-id="1768"></p><h3 data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Answer: All of the Above</span></h3><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1759"><img alt="amelia-boynton-young" class="alignright wp-image-5320" data-dcnode-id="1764" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/amelia-boynton-young-203x300.jpg&amp;raw" width="101"><span data-dcnode-id="1763" instrument_node="">Mrs. Amelia Boynton was a stalwart with the </span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/resource/dallas-county-voters-league/" onclick="javascript:window.open('http://civilrightsteaching.org/resource/dallas-county-voters-league/'); return false;"><span data-dcnode-id="1762" instrument_node="">Dallas County Voters League</span></a><span data-dcnode-id="1760" instrument_node=""> and played a critical role for decades in nurturing African American efforts to register to vote. She welcomed SNCC to town and helped support the younger activists and their work. When Judge Hare’s injunction slowed the grassroots organizing, she initiated the invitation to King and SCLC</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1752"><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyengine.richmond.edu/episodes/view/5470" onclick="javascript:window.open('https://historyengine.richmond.edu/episodes/view/5470'); return false;" rel="noopener"><img alt="" class="alignleft size-full wp-image-267" data-dcnode-id="1757" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//quiz.teachingforchange.org/wp-content/uploads/2020/07/marie.png&amp;raw" width="140"></a><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyengine.richmond.edu/episodes/view/5470" onclick="javascript:window.open('https://historyengine.richmond.edu/episodes/view/5470'); return false;"><span data-dcnode-id="1755" instrument_node="">Marie Foster</span></a><span data-dcnode-id="1753" instrument_node=""> was another significant local activist, teaching Citizenship classes even before SNCC arrived and remaining steadfast through the slow, brutal work of building a movement in the context of extreme repression. In early 1965 when SCLC began escalating the confrontation in Selma, Mrs. Boynton and Foster were both in the thick of things, inspiring others and putting their own bodies on the line. They were leaders on Bloody Sunday and the subsequent march to Montgomery. Whether working behind the scenes when the movement was just a handful of people or near the front of the line when the entire nation was watching Selma, they were courageous and unwavering.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1736"><img alt="colialafayette" class="alignright wp-image-5322" data-dcnode-id="1750" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/colialafayette-300x207.jpg&amp;raw" width="217"><span data-dcnode-id="1749" instrument_node="">Though </span><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/colia-liddell-lafayette/" onclick="javascript:window.open('https://snccdigital.org/people/colia-liddell-lafayette/'); return false;" rel="noopener" title="Colia Lafayette profile on SNCC One Vote website"><span data-dcnode-id="1748" instrument_node="">Colia Liddell Lafayette</span></a><span data-dcnode-id="1746" instrument_node=""> worked side by side with her husband Bernard, recruiting student workers and doing the painstaking work of building a grassroots movement in Selma, she has become almost invisible and typically mentioned only in passing, as his wife.&nbsp;Her father and grandfather worked with the </span><a data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/southern-tenant-farmers-union/" onclick="javascript:window.open('http://zinnedproject.org/materials/southern-tenant-farmers-union/'); return false;" rel="noopener" title="lesson on the Southern Tenant Farmers Union"><span data-dcnode-id="1745" instrument_node="">Southern Tenant Farmers’ Union</span></a><span data-dcnode-id="1743" instrument_node=""> and she was a strong organizer in her own right, founding an important NAACP Youth Branch in Jackson, Mississippi, and working for </span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/medgar-evers/" onclick="javascript:window.open('https://snccdigital.org/people/medgar-evers/'); return false;" rel="noopener" title="Medgar Evers profile"><span data-dcnode-id="1742" instrument_node="">Medgar Evers</span></a><span data-dcnode-id="1740" instrument_node=""> before moving to Selma to organize with her new husband. She remained there until, at the request of SNCC Executive Secretary </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/james-forman/" onclick="javascript:window.open('https://snccdigital.org/people/james-forman/'); return false;" rel="noopener" title="James Forman profile from SNCC One Vote website"><span data-dcnode-id="1739" instrument_node="">James Forman</span></a><span data-dcnode-id="1737" instrument_node="">, she relocated to nearby Birmingham to help organize the spring 1963 demonstrations. In Birmingham,&nbsp;being pregnant offered no protection and she was badly injured when white officials used fire hoses to attack demonstrators.</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1727"><img alt="prathiahall" class="alignleft wp-image-5324" data-dcnode-id="1734" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/prathiahall.jpg&amp;raw" width="148"><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/prathia-hall/" onclick="javascript:window.open('https://snccdigital.org/people/prathia-hall/'); return false;"><span data-dcnode-id="1733" instrument_node="">Prathia Hall</span></a><span data-dcnode-id="1731" instrument_node="">, a Philadelphia native who began working with SNCC in Southwest Georgia, </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/resource/bloody-selma/" onclick="javascript:window.open('http://civilrightsteaching.org/resource/bloody-selma/'); return false;" rel="noopener" title="Prathia Hall on Selma"><span data-dcnode-id="1730" instrument_node="">joined the Selma effort</span></a><span data-dcnode-id="1728" instrument_node=""> in the fall of 1963 when the Lafayettes moved on to Nashville. Philosophically nonviolent, she was a brilliant organizer and orator who later became an ordained minister. She returned to Selma after Bloody Sunday to help SNCC and local activists figure out how to move forward.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1718"><img alt="DianeNashPhoto" class="alignright wp-image-5323" data-dcnode-id="1725" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/DianeNashPhoto-259x300.jpg&amp;raw" width="129"><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/diane-nash-bevel/" onclick="javascript:window.open('https://snccdigital.org/people/diane-nash-bevel/'); return false;" rel="noopener" title="Nash profile on One Person, One Vote website"><span data-dcnode-id="1724" instrument_node="">Diane Nash</span></a><span data-dcnode-id="1722" instrument_node="">, whose plan for a nonviolent war on Montgomery inspired the initial Selma march, was already a seasoned veteran, leading the Nashville sit-ins, helping found SNCC, and taking decisive action to carry the freedom rides forward. In 1961 she married </span><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snccdigital.org/people/james-bevel/" onclick="javascript:window.open('https://snccdigital.org/people/james-bevel/'); return false;" rel="noopener"><span data-dcnode-id="1721" instrument_node="">Jim Bevel</span></a><span data-dcnode-id="1719" instrument_node=""> and then followed him out of SNCC and into SCLC. According to SCLC insider Andrew Young, “No small measure of what we saw as Jim’s brilliance was due to Diane’s rational thinking and influence.”</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">These are just a few of the many women who were critical to the movement’s success—in Selma and across the country. Like their male co-workers, they organized, demonstrated, taught, preached, and strategized. They also cooked and housed workers, tried to register, and recruited friends and neighbors. And, like men, they were threatened, attacked, beaten, and fired. Through it all they stood up for themselves and their communities, insisting on their “freedom rights.”</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1704"><strong data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Source:</span></strong><span data-dcnode-id="1708" instrument_node=""> “</span><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.teachingforchange.org/selma-bottom-up-history" onclick="javascript:window.open('http://www.teachingforchange.org/selma-bottom-up-history'); return false;" rel="noopener"><span data-dcnode-id="1707" instrument_node="">The Selma Voting Rights Struggle: 15 Key Points from Bottom-Up History and Why It Matters Today</span></a><span data-dcnode-id="1705" instrument_node="">” by Emilye Crosby</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1700"><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">More information</span></strong></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1692"><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/hands-on-the-freedom-plow/" onclick="javascript:window.open('http://zinnedproject.org/materials/hands-on-the-freedom-plow/'); return false;" rel="noopener"><em data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Hands on the Freedom Plow</span></em></a><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/hands-on-the-freedom-plow/" onclick="javascript:window.open('http://zinnedproject.org/materials/hands-on-the-freedom-plow/'); return false;"><img alt="freedom_plow-264x400" class="alignright wp-image-5342" data-dcnode-id="1695" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/freedom_plow-264x400.jpg&amp;raw" width="112"></a><span data-dcnode-id="1693" instrument_node="">: Personal Accounts by Women in SNCC. In Hands on the Freedom Plow, fifty-two women — southern and northern, old and young, rural and urban, black, white, and Latina — share their courageous personal stories of working for the Student Nonviolent Coordinating Committee (SNCC) on the front lines of the Civil Rights Movement.</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686"><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.powells.com/book/womanpower-unlimited-and-the-black-freedom-struggle-in-mississippi-9780820347318%3FpartnerID%3D33733" onclick="javascript:window.open('http://www.powells.com/book/womanpower-unlimited-and-the-black-freedom-struggle-in-mississippi-9780820347318?partnerID=33733'); return false;" rel="noopener"><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Womanpower Unlimited and the Black Freedom Struggle in Mississippi</span></em></a><span data-dcnode-id="1687" instrument_node="">. Tiyi M. Morris provides the first comprehensive examination of the Jackson, Mississippi based women’s organization Womanpower Unlimited.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1680"><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/standing-on-my-sisters-shoulders/" onclick="javascript:window.open('http://zinnedproject.org/materials/standing-on-my-sisters-shoulders/'); return false;" rel="noopener"><em data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Standing on My Sisters’ Shoulders (Film)</span></em></a><span data-dcnode-id="1681" instrument_node="">. One of the best films on the Civil Rights Movement, this award-winning documentary reveals the movement in Mississippi in the 1950s and 60s from the point of view of the courageous women who lived it — and emerged as its grassroots leaders.</span></p><span data-dcnode-id="1679" instrument_node="">

</span><p data-dcnode-id="1582"></p><h3 data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Answer: Student Nonviolent Coordinating Committee (SNCC)</span></h3><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1576"><img alt="SNCC_1vote-300x266" class="alignright wp-image-5325 size-medium" data-dcnode-id="1578" height="266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/SNCC_1vote-300x266-300x266.jpg&amp;raw" width="300"><span data-dcnode-id="1577" instrument_node="">The concept of “one person, one vote,” regardless of formal education, literacy, class, or race&nbsp;was best championed by the Student Nonviolent Coordinating Committee during the modern Civil Rights Movement.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">John Lewis, speaking for SNCC at the March on Washington for Jobs and Freedom, asserted, “‘One Man, One Vote’ is the African Cry, it must be ours too.”</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1571" instrument_node="">As Emilye Crosby and Judy Richardson explain in, </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/the-voting-rights-act-ten-things-you-should-know/" onclick="javascript:window.open('http://zinnedproject.org/materials/the-voting-rights-act-ten-things-you-should-know/'); return false;" rel="noopener"><span data-dcnode-id="1570" instrument_node="">The Voting Rights Act: Ten Things You Should Know</span></a><span data-dcnode-id="1568" instrument_node="">:</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564" style="padding-left: 30px;"><span data-dcnode-id="1565" instrument_node="">By 1963, in addition to helping people improve their literacy, SNCC began to challenge the whole idea of requiring literacy to vote. Bob Moses pointed out that white Mississippians used the political process to deny Blacks access to quality education and then used their poor education to deny them access to the political process. Moreover, they had encountered many people who had been denied an education but still had more than enough wisdom to vote on their representatives. Stokely Carmichael described the delegates selected to represent the Delta’s Congressional district at a state meeting of the Mississippi Freedom Democratic Party this way:</span></p><span data-dcnode-id="1563" instrument_node="">
</span><blockquote data-dcnode-id="1554"><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1556" style="padding-left: 30px;"><span data-dcnode-id="1561" instrument_node="">The “politically unsophisticated” people in their collective wisdom knew who could be trusted. Who deserved the honor. Who had earned the right. Who had a clear head and strong heart. The delegation was a cross section of service and merit, across sex and age, status or education. I mean you had the old warriors . . . who’d kept hope and dignity alive during some long, dismal, savage years. The valiant women . . . mothers of struggle. And too, the next generation, a few young college students, clearly intended to keep the struggle going. (Carmichael with Thelwell, </span><em data-dcnode-id="1558"><a data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/materials/ready-for-revolution" onclick="javascript:window.open('https://www.zinnedproject.org/materials/ready-for-revolution'); return false;" rel="noopener"><span data-dcnode-id="1560" instrument_node="">Ready for Revolution</span></a></em><span data-dcnode-id="1557" instrument_node="">, p. 394)</span></p><span data-dcnode-id="1555" instrument_node="">
</span></blockquote><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1550"><strong data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">More information</span></strong></p><span data-dcnode-id="1549" instrument_node="">

</span><blockquote data-dcnode-id="1507"><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1509" style="padding-left: 30px;"><span data-dcnode-id="1514" instrument_node="">The “politically unsophisticated” people in their collective wisdom knew who could be trusted. Who deserved the honor. Who had earned the right. Who had a clear head and strong heart. The delegation was a cross section of service and merit, across sex and age, status or education. I mean you had the old warriors . . . who’d kept hope and dignity alive during some long, dismal, savage years. The valiant women . . . mothers of struggle. And too, the next generation, a few young college students, clearly intended to keep the struggle going. (Carmichael with Thelwell, </span><em data-dcnode-id="1511"><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/materials/ready-for-revolution" onclick="javascript:window.open('https://www.zinnedproject.org/materials/ready-for-revolution'); return false;" rel="noopener"><span data-dcnode-id="1513" instrument_node="">Ready for Revolution</span></a></em><span data-dcnode-id="1510" instrument_node="">, p. 394)</span></p><span data-dcnode-id="1508" instrument_node="">

</span><h5 class="wpProQuiz_header" data-dcnode-id="730" style="display: inline-block;"><span data-dcnode-id="734" instrument_node="">
</span><span data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">12</span></span><span data-dcnode-id="731" instrument_node="">. Question                        </span></h5><span data-dcnode-id="729" instrument_node="">
</span><div class="wpProQuiz_question" data-dcnode-id="678" style="margin: 10px 0 0 0;"><span data-dcnode-id="728" instrument_node="">
</span><div class="wpProQuiz_question_text" data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">
</span><h2 data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">In 2020, approximately how many people were legally denied the right to vote due to having been convicted of a felony?</span></h2><span data-dcnode-id="724" instrument_node="">
</span></div><span data-dcnode-id="722" instrument_node="">
</span><ul class="wpProQuiz_questionList" data-dcnode-id="680" data-question_id="161" data-type="multiple"><span data-dcnode-id="721" instrument_node="">
</span><li class="wpProQuiz_questionListItem" data-dcnode-id="712" data-pos="0"><span data-dcnode-id="720" instrument_node="">
</span><span data-dcnode-id="719" style="display:none;"></span><span data-dcnode-id="718" instrument_node="">
</span><label data-dcnode-id="714"><span data-dcnode-id="717" instrument_node="">
</span><input class="wpProQuiz_questionInput" data-dcnode-id="716" name="question_2_161" type="checkbox" value="1"><span data-dcnode-id="715" instrument_node=""> 1.2 Million                                            </span></label><span data-dcnode-id="713" instrument_node="">
</span></li><span data-dcnode-id="711" instrument_node="">
</span><li class="wpProQuiz_questionListItem" data-dcnode-id="702" data-pos="1"><span data-dcnode-id="710" instrument_node="">
</span><span data-dcnode-id="709" style="display:none;"></span><span data-dcnode-id="708" instrument_node="">
</span><label data-dcnode-id="704"><span data-dcnode-id="707" instrument_node="">
</span><input class="wpProQuiz_questionInput" data-dcnode-id="706" name="question_2_161" type="checkbox" value="2"><span data-dcnode-id="705" instrument_node=""> 3.2 Million                                            </span></label><span data-dcnode-id="703" instrument_node="">
</span></li><span data-dcnode-id="701" instrument_node="">
</span><li class="wpProQuiz_questionListItem" data-dcnode-id="692" data-pos="2"><span data-dcnode-id="700" instrument_node="">
</span><span data-dcnode-id="699" style="display:none;"></span><span data-dcnode-id="698" instrument_node="">
</span><label data-dcnode-id="694"><span data-dcnode-id="697" instrument_node="">
</span><input class="wpProQuiz_questionInput" data-dcnode-id="696" name="question_2_161" type="checkbox" value="3"><span data-dcnode-id="695" instrument_node=""> 5.2 Million                                            </span></label><span data-dcnode-id="693" instrument_node="">
</span></li><span data-dcnode-id="691" instrument_node="">
</span><li class="wpProQuiz_questionListItem" data-dcnode-id="682" data-pos="3"><span data-dcnode-id="690" instrument_node="">
</span><span data-dcnode-id="689" style="display:none;"></span><span data-dcnode-id="688" instrument_node="">
</span><label data-dcnode-id="684"><span data-dcnode-id="687" instrument_node="">
</span><input class="wpProQuiz_questionInput" data-dcnode-id="686" name="question_2_161" type="checkbox" value="4"><span data-dcnode-id="685" instrument_node=""> 8.2 Million                                            </span></label><span data-dcnode-id="683" instrument_node="">
</span></li><span data-dcnode-id="681" instrument_node="">
</span></ul><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span><div class="wpProQuiz_response" data-dcnode-id="546" style="display: none;"><span data-dcnode-id="676" instrument_node="">
</span><div class="wpProQuiz_correct" data-dcnode-id="613" style="display: none;"><span data-dcnode-id="675" instrument_node="">
</span><span class="wpProQuiz_respone_span" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">
									Correct								</span></span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="670"></p><h3 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Answer: An estimated 5.2 million Americans are denied the right to because of state laws that prohibit voting by people with felony convictions.</span></h3><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">There is no federal law that protects the rights of a person who has been incarcerated to vote.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="663"></p><div class="wp-caption alignright" data-dcnode-id="659" id="attachment_279" style="width: 510px"><img alt="" aria-describedby="caption-attachment-279" class="wp-image-279" data-dcnode-id="662" height="309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//quiz.teachingforchange.org/wp-content/uploads/2021/03/disfranchisement2.png&amp;raw" width="500"><p class="wp-caption-text" data-dcnode-id="660" id="caption-attachment-279"><span data-dcnode-id="661" instrument_node="">From the Sentencing Project.</span></p></div><p data-dcnode-id="658"></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">Felony disenfranchisement is an obstacle to participation in democratic life which is exacerbated by racial disparities in the criminal justice system, resulting in </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sentencingproject.org/template/page.cfm%3Fid%3D133" onclick="javascript:window.open('http://www.sentencingproject.org/template/page.cfm?id=133'); return false;"><span data-dcnode-id="655" instrument_node="">1 of every 16 African Americans unable to vote</span></a><span data-dcnode-id="653" instrument_node="">.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">In the past 25 years, half the states have changed their laws and practices to expand voting access to people with felony convictions. Despite these important reforms, 5.2 million Americans remain disenfranchised, 2.3 percent of the voting age population. </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sentencingproject.org/publications/locked-out-2020-estimates-of-people-denied-voting-rights-due-to-a-felony-conviction/" onclick="javascript:window.open('https://www.sentencingproject.org/publications/locked-out-2020-estimates-of-people-denied-voting-rights-due-to-a-felony-conviction/'); return false;" rel="noopener"><span data-dcnode-id="649" instrument_node="">Learn more</span></a><span data-dcnode-id="647" instrument_node="">.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="644" instrument_node="">Meanwhile, people currently serving time in jail are counted by the Census as “residing” at their prison address. Those statistics are then used to draw legislative maps, which&nbsp;</span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.demos.org/publication/census-count-and-prisoners-problem-solutions-and-what-census-can-do" onclick="javascript:window.open('http://www.demos.org/publication/census-count-and-prisoners-problem-solutions-and-what-census-can-do'); return false;"><span data-dcnode-id="643" instrument_node="">grants the people who live near large prisons extra influence at the expense of voters everywhere else</span></a><span data-dcnode-id="641" instrument_node="">&nbsp;and undermines the principle of “one person, one vote.”</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">It is estimated that there are more than </span><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prisonpolicy.org/reports/pie2019.html" onclick="javascript:window.open('https://www.prisonpolicy.org/reports/pie2019.html'); return false;"><span data-dcnode-id="637" instrument_node="">2.4 million people</span></a><span data-dcnode-id="635" instrument_node=""> in 1,719 state prisons, 102 federal prisons, 2,259 juvenile correctional facilities, 3,283 local jails, and 79 Indian Country jails as well as in military prisons, immigration detention facilities, civil commitment centers, and prisons in the U.S. territories.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="626"><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/the-new-jim-crow/" onclick="javascript:window.open('http://zinnedproject.org/materials/the-new-jim-crow/'); return false;" rel="noopener"><img alt="9781595581037" class="alignright wp-image-5346" data-dcnode-id="632" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/9781595581037.jpg&amp;raw" width="116"></a><span data-dcnode-id="630" instrument_node="">Because prisons are disproportionately built in rural areas but most incarcerated people call urban areas home, counting prisoners in the wrong place results in a systematic </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prisonersofthecensus.org/impact.html" onclick="javascript:window.open('http://www.prisonersofthecensus.org/impact.html'); return false;"><span data-dcnode-id="629" instrument_node="">transfer of population and political clout from urban to rural areas</span></a><span data-dcnode-id="627" instrument_node="">. For example,&nbsp;60% of Illinois’ prisoners are from Cook County (Chicago), yet 99% of them are counted outside the county.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">More information</span></strong></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="616"><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/the-new-jim-crow/" onclick="javascript:window.open('http://zinnedproject.org/materials/the-new-jim-crow/'); return false;" rel="noopener"><em data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">The New Jim Crow: Mass Incarceration in the Age of Colorblindness</span></em></a><span data-dcnode-id="617" instrument_node="">. In this incisive critique, former litigator-turned-legal-scholar Michelle Alexander provocatively argues that we have not ended racial caste in America: we have simply redesigned it.</span></p><p data-dcnode-id="615"></p><span data-dcnode-id="614" instrument_node=""> </span></div><span data-dcnode-id="612" instrument_node="">
</span><div class="wpProQuiz_incorrect" data-dcnode-id="548" style="display: none;"><span data-dcnode-id="611" instrument_node="">
</span><span class="wpProQuiz_respone_span" data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">
									Incorrect								</span></span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="606"></p><h3 data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Answer: An estimated 5.2 million Americans are denied the right to because of state laws that prohibit voting by people with felony convictions.</span></h3><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">There is no federal law that protects the rights of a person who has been incarcerated to vote.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="599"></p><div class="wp-caption alignright" data-dcnode-id="595" id="attachment_279" style="width: 510px"><img alt="" aria-describedby="caption-attachment-279" class="wp-image-279" data-dcnode-id="598" height="309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//quiz.teachingforchange.org/wp-content/uploads/2021/03/disfranchisement2.png&amp;raw" width="500"><p class="wp-caption-text" data-dcnode-id="596" id="caption-attachment-279"><span data-dcnode-id="597" instrument_node="">From the Sentencing Project.</span></p></div><p data-dcnode-id="594"></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="592" instrument_node="">Felony disenfranchisement is an obstacle to participation in democratic life which is exacerbated by racial disparities in the criminal justice system, resulting in </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sentencingproject.org/template/page.cfm%3Fid%3D133" onclick="javascript:window.open('http://www.sentencingproject.org/template/page.cfm?id=133'); return false;"><span data-dcnode-id="591" instrument_node="">1 of every 16 African Americans unable to vote</span></a><span data-dcnode-id="589" instrument_node="">.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="586" instrument_node="">In the past 25 years, half the states have changed their laws and practices to expand voting access to people with felony convictions. Despite these important reforms, 5.2 million Americans remain disenfranchised, 2.3 percent of the voting age population. </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sentencingproject.org/publications/locked-out-2020-estimates-of-people-denied-voting-rights-due-to-a-felony-conviction/" onclick="javascript:window.open('https://www.sentencingproject.org/publications/locked-out-2020-estimates-of-people-denied-voting-rights-due-to-a-felony-conviction/'); return false;" rel="noopener"><span data-dcnode-id="585" instrument_node="">Learn more</span></a><span data-dcnode-id="583" instrument_node="">.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="580" instrument_node="">Meanwhile, people currently serving time in jail are counted by the Census as “residing” at their prison address. Those statistics are then used to draw legislative maps, which&nbsp;</span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.demos.org/publication/census-count-and-prisoners-problem-solutions-and-what-census-can-do" onclick="javascript:window.open('http://www.demos.org/publication/census-count-and-prisoners-problem-solutions-and-what-census-can-do'); return false;"><span data-dcnode-id="579" instrument_node="">grants the people who live near large prisons extra influence at the expense of voters everywhere else</span></a><span data-dcnode-id="577" instrument_node="">&nbsp;and undermines the principle of “one person, one vote.”</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">It is estimated that there are more than </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prisonpolicy.org/reports/pie2019.html" onclick="javascript:window.open('https://www.prisonpolicy.org/reports/pie2019.html'); return false;"><span data-dcnode-id="573" instrument_node="">2.4 million people</span></a><span data-dcnode-id="571" instrument_node=""> in 1,719 state prisons, 102 federal prisons, 2,259 juvenile correctional facilities, 3,283 local jails, and 79 Indian Country jails as well as in military prisons, immigration detention facilities, civil commitment centers, and prisons in the U.S. territories.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="562"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/the-new-jim-crow/" onclick="javascript:window.open('http://zinnedproject.org/materials/the-new-jim-crow/'); return false;" rel="noopener"><img alt="9781595581037" class="alignright wp-image-5346" data-dcnode-id="568" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/9781595581037.jpg&amp;raw" width="116"></a><span data-dcnode-id="566" instrument_node="">Because prisons are disproportionately built in rural areas but most incarcerated people call urban areas home, counting prisoners in the wrong place results in a systematic </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prisonersofthecensus.org/impact.html" onclick="javascript:window.open('http://www.prisonersofthecensus.org/impact.html'); return false;"><span data-dcnode-id="565" instrument_node="">transfer of population and political clout from urban to rural areas</span></a><span data-dcnode-id="563" instrument_node="">. For example,&nbsp;60% of Illinois’ prisoners are from Cook County (Chicago), yet 99% of them are counted outside the county.</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="558"><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">More information</span></strong></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="552"><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zinnedproject.org/materials/the-new-jim-crow/" onclick="javascript:window.open('http://zinnedproject.org/materials/the-new-jim-crow/'); return false;" rel="noopener"><em data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">The New Jim Crow: Mass Incarceration in the Age of Colorblindness</span></em></a><span data-dcnode-id="553" instrument_node="">. In this incisive critique, former litigator-turned-legal-scholar Michelle Alexander provocatively argues that we have not ended racial caste in America: we have simply redesigned it.</span></p><span data-dcnode-id="551" instrument_node="">

</span><span data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">13</span></span><span data-dcnode-id="521" instrument_node="">. Question                        </span></h5><span data-dcnode-id="519" instrument_node="">
</span><div class="wpProQuiz_question" data-dcnode-id="458" style="margin: 10px 0 0 0;"><span data-dcnode-id="518" instrument_node="">
</span><div class="wpProQuiz_question_text" data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">
</span><h2 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">What measures are used today to discourage voting or politically disadvantage some populations?</span></h2><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span><ul class="wpProQuiz_questionList" data-dcnode-id="460" data-question_id="141" data-type="multiple"><span data-dcnode-id="511" instrument_node="">
</span><li class="wpProQuiz_questionListItem" data-dcnode-id="502" data-pos="0"><span data-dcnode-id="510" instrument_node="">

</span><input class="wpProQuiz_questionInput" data-dcnode-id="496" name="question_2_141" type="checkbox" value="2"><span data-dcnode-id="495" instrument_node=""> Rolling back early voting laws                                            </span></label><span data-dcnode-id="493" instrument_node="">

</span><li class="wpProQuiz_questionListItem" data-dcnode-id="482" data-pos="2"><span data-dcnode-id="490" instrument_node="">

</span><input class="wpProQuiz_questionInput" data-dcnode-id="476" name="question_2_141" type="checkbox" value="4"><span data-dcnode-id="475" instrument_node=""> Denying the right to vote to the incarcerated or formerly incarcerated                                            </span></label><span data-dcnode-id="473" instrument_node="">
</span></li><span data-dcnode-id="471" instrument_node="">

									Correct								</span></span><br data-dcnode-id="452"><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="450"></p><h3 data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Answer: All of the Above</span></h3><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="444"><strong data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Voter ID</span></strong></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="431"><img alt="voterid" class="alignright wp-image-5336 size-medium" data-dcnode-id="442" height="183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/voterid-300x183.png&amp;raw" width="300"><span data-dcnode-id="441" instrument_node="">Some states have put into place laws that require a person to show identification documents in order to vote. Studies have shown that Voter ID laws </span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.msnbc.com/rachel-maddow-show/independent-gao-report-voter-id-lowers-turnout" onclick="javascript:window.open('http://www.msnbc.com/rachel-maddow-show/independent-gao-report-voter-id-lowers-turnout'); return false;" rel="noopener"><span data-dcnode-id="440" instrument_node="">reduce voter turnou</span></a><span data-dcnode-id="438" instrument_node="">t&nbsp;and that they </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/blogs/govbeat/wp/2014/10/09/report-voter-id-laws-reduce-turnout-more-among-african-american-and-younger-voters/" onclick="javascript:window.open('http://www.washingtonpost.com/blogs/govbeat/wp/2014/10/09/report-voter-id-laws-reduce-turnout-more-among-african-american-and-younger-voters/'); return false;" rel="noopener"><span data-dcnode-id="437" instrument_node="">disproportionately keep African-American and young people from voting</span></a><span data-dcnode-id="435" instrument_node="">. Voter ID proponents argue that requiring identification is necessary to cut down on rampant voter fraud. However, studies have shown that </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/blogs/wonkblog/wp/2014/08/06/a-comprehensive-investigation-of-voter-impersonation-finds-31-credible-incidents-out-of-one-billion-ballots-cast/" onclick="javascript:window.open('http://www.washingtonpost.com/blogs/wonkblog/wp/2014/08/06/a-comprehensive-investigation-of-voter-impersonation-finds-31-credible-incidents-out-of-one-billion-ballots-cast/'); return false;" rel="noopener"><span data-dcnode-id="434" instrument_node="">voter fraud is exceedingly rare</span></a><span data-dcnode-id="432" instrument_node="">.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="427"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Early Voting</span></strong></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Unlike many countries with higher voter turnout, in the United States elections are held on Tuesday, a day when most people are working. Allowing early voting is one way to ensure that all people have a chance to vote. The poor and people of color are&nbsp;among the largest beneficiaries of early, flexible voting.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="422" instrument_node="">In 2012, more than 157,000 Ohio voters cast their ballots during the </span><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/blogs/wonkblog/wp/2014/09/30/why-early-voting-is-about-so-much-more-than-convenience/" onclick="javascript:window.open('http://www.washingtonpost.com/blogs/wonkblog/wp/2014/09/30/why-early-voting-is-about-so-much-more-than-convenience/'); return false;"><span data-dcnode-id="421" instrument_node="">days that have now been eliminated</span></a><span data-dcnode-id="419" instrument_node="">. Daniel Smith, a political scientist at the University of Florida, argued in </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aclu.org/sites/default/files/assets/018-01_smith_report.pdf" onclick="javascript:window.open('https://www.aclu.org/sites/default/files/assets/018-01_smith_report.pdf'); return false;"><span data-dcnode-id="418" instrument_node="">an analysis conducted in support of suit against the state</span></a><span data-dcnode-id="416" instrument_node=""> that Blacks have been disproportionately likely to use early balloting in the state and to vote early on the days that have now been canceled (data in other states suggest the same).</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="411"><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Gerrymandering</span></strong></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="406"><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/wp-content/uploads/2015/08/congressional_district_5_map.jpg" onclick="javascript:window.open('http://civilrightsteaching.org/wp-content/uploads/2015/08/congressional_district_5_map.jpg'); return false;"><img alt="Florida District 5" class="alignright wp-image-5337" data-dcnode-id="409" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/congressional_district_5_map.jpg&amp;raw" width="264"></a><span data-dcnode-id="407" instrument_node="">Gerrymandering is the process of redrawing political boundaries in order to give your political party greater numbers and thus a greater chance of winning power.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Gerrymandering has often been used to dilute the power of people of color by creating districts that fragment African-Americans and Latinos across a number of districts or concentrate all people of color in an area into one district to prevent African-Americans or Latinos from gaining a majority of votes on a municipal or county board.</span></p><span data-dcnode-id="402" instrument_node="">

</span><p data-dcnode-id="357"></p><h3 data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Answer: All of the Above</span></h3><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="351"><strong data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Voter ID</span></strong></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="338"><img alt="voterid" class="alignright wp-image-5336 size-medium" data-dcnode-id="349" height="183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/voterid-300x183.png&amp;raw" width="300"><span data-dcnode-id="348" instrument_node="">Some states have put into place laws that require a person to show identification documents in order to vote. Studies have shown that Voter ID laws </span><a data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.msnbc.com/rachel-maddow-show/independent-gao-report-voter-id-lowers-turnout" onclick="javascript:window.open('http://www.msnbc.com/rachel-maddow-show/independent-gao-report-voter-id-lowers-turnout'); return false;" rel="noopener"><span data-dcnode-id="347" instrument_node="">reduce voter turnou</span></a><span data-dcnode-id="345" instrument_node="">t&nbsp;and that they </span><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/blogs/govbeat/wp/2014/10/09/report-voter-id-laws-reduce-turnout-more-among-african-american-and-younger-voters/" onclick="javascript:window.open('http://www.washingtonpost.com/blogs/govbeat/wp/2014/10/09/report-voter-id-laws-reduce-turnout-more-among-african-american-and-younger-voters/'); return false;" rel="noopener"><span data-dcnode-id="344" instrument_node="">disproportionately keep African-American and young people from voting</span></a><span data-dcnode-id="342" instrument_node="">. Voter ID proponents argue that requiring identification is necessary to cut down on rampant voter fraud. However, studies have shown that </span><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/blogs/wonkblog/wp/2014/08/06/a-comprehensive-investigation-of-voter-impersonation-finds-31-credible-incidents-out-of-one-billion-ballots-cast/" onclick="javascript:window.open('http://www.washingtonpost.com/blogs/wonkblog/wp/2014/08/06/a-comprehensive-investigation-of-voter-impersonation-finds-31-credible-incidents-out-of-one-billion-ballots-cast/'); return false;" rel="noopener"><span data-dcnode-id="341" instrument_node="">voter fraud is exceedingly rare</span></a><span data-dcnode-id="339" instrument_node="">.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="334"><strong data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Early Voting</span></strong></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Unlike many countries with higher voter turnout, in the United States elections are held on Tuesday, a day when most people are working. Allowing early voting is one way to ensure that all people have a chance to vote. The poor and people of color are&nbsp;among the largest beneficiaries of early, flexible voting.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="329" instrument_node="">In 2012, more than 157,000 Ohio voters cast their ballots during the </span><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/blogs/wonkblog/wp/2014/09/30/why-early-voting-is-about-so-much-more-than-convenience/" onclick="javascript:window.open('http://www.washingtonpost.com/blogs/wonkblog/wp/2014/09/30/why-early-voting-is-about-so-much-more-than-convenience/'); return false;"><span data-dcnode-id="328" instrument_node="">days that have now been eliminated</span></a><span data-dcnode-id="326" instrument_node="">. Daniel Smith, a political scientist at the University of Florida, argued in </span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aclu.org/sites/default/files/assets/018-01_smith_report.pdf" onclick="javascript:window.open('https://www.aclu.org/sites/default/files/assets/018-01_smith_report.pdf'); return false;"><span data-dcnode-id="325" instrument_node="">an analysis conducted in support of suit against the state</span></a><span data-dcnode-id="323" instrument_node=""> that Blacks have been disproportionately likely to use early balloting in the state and to vote early on the days that have now been canceled (data in other states suggest the same).</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="318"><strong data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Gerrymandering</span></strong></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="313"><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilrightsteaching.org/wp-content/uploads/2015/08/congressional_district_5_map.jpg" onclick="javascript:window.open('http://civilrightsteaching.org/wp-content/uploads/2015/08/congressional_district_5_map.jpg'); return false;"><img alt="Florida District 5" class="alignright wp-image-5337" data-dcnode-id="316" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oldsite.civilrightsteaching.org/wp-content/uploads/2015/08/congressional_district_5_map.jpg&amp;raw" width="264"></a><span data-dcnode-id="314" instrument_node="">Gerrymandering is the process of redrawing political boundaries in order to give your political party greater numbers and thus a greater chance of winning power.</span></p><span data-dcnode-id="312" instrument_node="">
