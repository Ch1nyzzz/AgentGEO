</span><div data-dcnode-id="2558" itemprop="review" itemscope="" itemtype="https://schema.org/Review"><span data-dcnode-id="2609" instrument_node="">
</span><div data-dcnode-id="2576" itemprop="reviewBody"><span data-dcnode-id="2608" instrument_node="">
</span><p data-dcnode-id="2605"><img alt="The Romantics" class="alignleft" data-dcnode-id="2607" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//topdocumentaryfilms.com/wp-content/uploads/2011/12/the-romantics.jpg&amp;raw" width="95"><span data-dcnode-id="2606" instrument_node="">This documentary looks at a group of visionary writers who changed the way we see the world - the Romantics - and examines stories of bloodshed, political upheaval and poetry.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2600"><strong data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Liberty</span></strong><span data-dcnode-id="2601" instrument_node="">. Peter Ackroyd reveals how the radical ideas of liberty that inspired the French Revolution opened up a world of possibility for great British writers such as William Blake, Samuel Taylor Coleridge and William Wordsworth, inspiring some of the greatest works of literature in the English language.</span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Their ideas are the foundations of our modern notions of freedom and their words are performed by David Tennant, Dudley Sutton and David Threlfall.</span></p><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2592"><strong data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Nature</span></strong><span data-dcnode-id="2593" instrument_node="">. Peter Ackroyd summons the ghosts of the Romantics to tell the story of man's escape from the shackles of industry and commerce to the freedom of nature.</span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">As the Industrial Revolution took hold of Britain during the late 18th Century, the Romantics embraced nature in search of sublime experience.</span></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">But this was much more than just a walk in the country; it was a groundbreaking endeavour to understand what it means to be human. They forged poetry of radical protest against a dark world that was descending upon Britain.</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2581"><strong data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Eternity</span></strong><span data-dcnode-id="2582" instrument_node="">. Byron, Keats and Shelley lived short lives, but the radical way they lived them would change the world. At 19, Shelley wrote The Necessity of Atheism - it was banned and burned, but it freed the Romantics from religion.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Through their search for meaning in a world without God, they pioneered the notions of free love, celebrity and secular idolatry that are at the centre of modern Western culture.</span></p><span data-dcnode-id="2577" instrument_node="">

</span><p data-dcnode-id="2361"><i data-dcnode-id="2363"><span data-dcnode-id="2372" instrument_node="">“I couldn't quote you no Dickens, Shelley or Keats</span><br data-dcnode-id="2371"><span data-dcnode-id="2370" instrument_node="">
'cause it's all been said before</span><br data-dcnode-id="2369"><span data-dcnode-id="2368" instrument_node="">
Make the best out of the bad just laugh it off</span><br data-dcnode-id="2367"><span data-dcnode-id="2366" instrument_node="">
You didn't have to come here anyway</span><br data-dcnode-id="2365"><span data-dcnode-id="2364" instrument_node="">
So remember, every picture tells a story don't it”</span></i><span data-dcnode-id="2362" instrument_node=""> </span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">When Rod was God.</span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">So many images, so many stories, so much fearful symmetry.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Finding the right tension between the Apollonian and the Dionysian is as delicate as tightrope walking over an abyss. That’s my monsterization of dear Friedrich. Gods and Monsters, Lambs and Tygers, it’s all the same thing. Make the best out of the bad and just Laugh it off!</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">You said in an earlier post that after studying Blake there was only one way of reading him? I’m not sure if I agree entirely, his body of work covers so much I feel it would be limiting to have such a singular view but would love to hear what you think? I haven’t studied Blake but I’ve been a fan ever since I was a young boy...</span></p><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2345"><i data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">The Crucified One</span></i></p><span data-dcnode-id="2344" instrument_node="">

</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">@AntiTheist666</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Blake – Well the “The Romantics” won’t play and every other source I’ve searched for begins and ends about 30 seconds into it. The search led to a “happen-stance” within frustration.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Blake, from his youth, would by most be called a “dreamer”, a “visionary” and a poet. The proper word would be “mystic” to intone his deep spirituality. His poetry and graphic art stem from that source. If you miss it you miss Blake and in doing so will tend to intellectualize him. The deep pain and frustration with visions of what should be and the reality of what was tore him deeply. You can hear his angst. It drips from every word and in every piece of art.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">He found the same problem within his religion. Where most fled for solace, he found contradiction. The rest is a natural course of events. Expand the study environment (reject the Imperator and the Imprimatur), remain true to the vision, define and redefine the symbols. Why symbols? Blake’s vision is within a metaphysical reality. This should sound familiar:</span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2291" instrument_node="">“All that we See is Vision, from Generated</span><br data-dcnode-id="2290"><span data-dcnode-id="2289" instrument_node="">
Organs gone as soon as come, Permanent in</span><br data-dcnode-id="2288"><span data-dcnode-id="2287" instrument_node="">
The Imagination, Consider’d as Nothing by the</span><br data-dcnode-id="2286"><span data-dcnode-id="2285" instrument_node="">
Natural Man.”</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Stated otherwise empiric reality is just an illusion.</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">W. B. Yeats leaned heavily on Blake for his philosophical, mythical, and esoteric syncretism. Yeats did, however, error (somewhat) through his assumptions. He applied his own search to be the same path as Blake’s. </span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">It’s like never reading Tolkien’s “The Lord of the Rings” and assuming the movie’s ending is true to the book. It Ain’t!</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">There’s an essay that I’m sure you can find. “William Butler Yeats’s ‘The Symbolic System’ of William Blake” by Arianna Antonielli </span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Blake has been used by violent revolutionaries and cold eyed politicians within many systems quoting him from their own philosophical motives to move the unknowing into their schemes. It’s like the The Symbionese Liberation Army quoting Martin Luther King</span></p><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">When I finally find a video that’s view-able the hope is that it brings out these aspects of “The Romantics”.</span></p><span data-dcnode-id="2265" instrument_node="">

</span><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">LOL</span></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">I really am laughing as I write, I just had a small disaster, I exaggerate of course it was just a minor tragedy. No no, it wasn’t that either. It was just a mental dance that didn’t quite turn out as expected. That which it was is now nothing but a memory but I’m still smiling.</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">I laughed because I have lost a rather lengthy reply to you about the essay that contained notes and references and some of my observations. Oh well it’s probably for the best as I could tell straight away that I am out of my depth here. I know less about Yeats than I do about Blake which is not much and I am unfamiliar with many of the titles referred to.</span></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">From the abstract</span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">“...I concentrated on Yeats’s and Ellis’s numerous analyses dedicated to Blake’s mythological and symbolical corpus and, in particular, I examined the last chapter of the first volume of the Quaritch edition. This chapter, entitled “The Symbolic System”, constitutes an unquestionable link between Yeats the reader and scholar of Blake, and Yeats the poet and follower of Blake.” </span></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">I am missing something here? I’m tempted to say what a surprise.</span></p><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">What a nice way to start the essay though</span></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2143"><span data-dcnode-id="2152" instrument_node="">Grant me an old man’s frenzy.</span><br data-dcnode-id="2151"><span data-dcnode-id="2150" instrument_node="">
Myself must I remake</span><br data-dcnode-id="2149"><span data-dcnode-id="2148" instrument_node="">
Till I am […] William Blake</span><br data-dcnode-id="2147"><span data-dcnode-id="2146" instrument_node="">
Who beat upon the wall</span><br data-dcnode-id="2145"><span data-dcnode-id="2144" instrument_node="">
Till Truth obeyed his call; </span></p><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">(W. B. Yeats, An Acre of Grass)</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">You mentioned in your post that Yeats made an error in some way but I think you meant to use the word err? Not that it makes any difference on this occasion but I wondered if I should point out any slightly dyslexic words even if I know what you mean? </span></p><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">On pages 12/13 she refers to “The Works of William Blake”</span></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">“Fundamental in its presentation of Blake’s system explained by Yeats and the conspicuous part of Yeats’s system borrowed by Blake, this chapter constitutes, as I am going to illustrate here, an unquestionable link between Yeats the reader and scholar of Blake, and Yeats the poet and follower of Blake.”</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Arianna Antonielli has taken Yeats on Blake and just cut it in half...surely at least one more cut is necessary?</span></p><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">This in his own words from the preface.</span></p><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">“The reader must not expect to find in this account of Blake's myth, or this explanation of his symbolic writings, a substitute for Blake's own works. A paraphrase is given of most of the more difficult poems, but no single thread of interpretation can fully guide the explorer through the intricate paths of a symbolism where most of the figures of speech have a two-fold meaning, and some are employed systematically in a three-fold, or even a four-fold sense. 'Allegory addressed to the intellectual powers while it is altogether hidden from the corporeal understanding is my definition', writes Blake, 'of the most sublime poetry'.” </span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Which sort of makes my point of not having a singular predominant view.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">From page 15</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">“Blake’s system is rich in symbolic and imaginary elements, often perceived by the ‘natural reader’ as nonsense. Actually, as the two editors never fail to illustrate, every contradiction or paradox may only be overcome through symbolism.”</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">What we cannot speak of we must pass over in silence said Wittgenstein but it doesn’t mean we can’t intuit something even though there aren’t words to describe it. Those that attempt to are often described as insane though.</span></p><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">I’m going to stop here for now as this post is already getting long and I‘m getting lost, I’ll come back to it soon.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">In the meantime, slightly off Piste, but I’d like to ask a question. If you were asked “What is Divine in Man” What would be your answer if you had to use a short quotation by anyone you like? You tell me yours and I’ll tell you mine ;-)</span></p><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2100"><i data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">The Crucified One</span></i></p><span data-dcnode-id="2099" instrument_node="">

</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">@AntiTheist666</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">“I am missing something here?” Yeats searched through participation in various “Cult” expressions. He assumed that of Blake. Blake’s metaphysics were unique to him. He studied Jacob Boehm (depressing fellow), Cabbala and more but not a cultist. </span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">“What is Divine in Man” What a question to ask on a Friday evening? This may disappoint you but I have none. Quotes generally miss the whole.</span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">“Christ in you, the hope of glory” Col. 1:27, this I would normally choose as answer but in a mixed positional group of graduated pros and cons their statements would only reveal their beliefs. The statement is unambiguous and each comment would miss the point.</span></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Examine three words Christ, hope and glory. Hope is universally understood as wished for or desired but yet to be. Glory, in this case, is an achievement. Christ is not a name it’s a position after a chrism is applied. The Hebrew root word is “??????, mashach”, anoint. Anointment is the application of a foreign or outside something or substance.</span></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Its most generality missed that the writer Paul makes a distinction between the personage and the condition. He says Christ and everyone hears Jesus. It’s the same with Buddha. Neither word is a last name. To be anointed one must, at minimum, be in position to receive the chrism.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">I presented the Lacoon for a reason. So mine would be a piece of art perceived and not phrases. The artist is not one but three from the island of Rhodes Agesander, Athenodoros and Polydorus. (That in itself is an historical allegory.)</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">The allegories:</span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Laocoon (Latin), from Greek Laukoun, from laos "people" (but as an adj.) + koeo "I mark or perceive." (a quality)</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Antiphantes (think phantasies) as an example, sycophant from the Greek suko-phantes “fig-blabbers” (as in politicians) this gives us Anti-phantes “against-blabbers” or “oppose-allusions”, idol mind chatter.</span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Thymbraeus (the name invokes Tiber and the Trojan river Thymbris) allegorizes an identification that lies in the future and attest one that lies in the past.</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2027" instrument_node="">So I see the hope of clear perception fighting the ego (helpful and hindering snakes), pointless chatter and histories. So is there anything Divine in man? Is seer the eye that cannot see itself?</span><br data-dcnode-id="2026"><span data-dcnode-id="2025" instrument_node="">
Another would be the Buddhist Wheel of Life with the Buddha detached and pointing to the Moon. (Christ ascended to the Tabernacle not made of hands [not struck].) </span></p><span data-dcnode-id="2023" instrument_node="">

</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Thanks for such a beautiful answer. When I said I am missing something here, I should have said I am missing an awful lot here. Blake and Yeats, I’ve re looked over a fair bit of their work and schematics for few days now and still feel my ability to understand it is poor. There may be a prejudice creeping in here because for many years I had them both down as being slightly mad and of course wrong. Whenever I see grand philosophies I think of Nietzsche.</span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1978" instrument_node=""> </span><i data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">“The will to a system shows a lack of integrity”</span></i></p><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">I knew this to be true even as a young boy. The art of the Dark Destroyer who has to create anew something Harder. I wish I could offer something meaningful about the essay but my knowledge of magic and occultism is also terribly lacking and while I enjoyed it I don’t like being out of my depth. I’ve bookmarked it and may go back to later. </span></p><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Agesander, Athenodoros and Polydorus. Beware of Greeks bearing gifts.</span></p><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Polydorus = many gifts, multi-talented. I know someone else like that.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">What is Divine in Man? </span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">“The union of those who love in service of those who suffer”</span></p><span data-dcnode-id="1959" instrument_node="">

</span><p data-dcnode-id="1683"><span data-dcnode-id="1690" instrument_node="">A Wonderful series! Thank you for uploading.</span><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">
Blake (of which Ackroyd has written an excellent biography) was more of a mystical visionary and symbolist (believing in Platonic and Gnostic concepts, like the demiurgos for example. All of these men were brilliant poets and progressives ahead of their time. Blake was also an artist and engraver (See The William Blake Archive online) It is sad that Keats and Shelley died so young. I didnt know Shelley had a book of Keats' Poems iin his pocket when he drowned. I thought I read somewhere he didn't care too much for his work,, or vice-versa.</span><br data-dcnode-id="1687"><span data-dcnode-id="1686" instrument_node="">
Whatever girders of the mind were loosened by the drug I wouldn't call opium with the 'source' of Kubla Khan but to Coleridge's poetic genius and brilliant mind. *Read The Pains of Sleep for a beautifully written description of anguish opium withdrawal. (words being wholly inadequate to describe such torments, not really. The withdrawal is perhaps not the worst of it but the slavery and emotional impact of being without it.) Though the final two lines stand out rather strangely. It's clear he felt 'such punishments' were for his having sinned (used opium). In the end it sapped his genius and ability to write./</span><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">
(see: STC: A Bondage to Opium by Lefebure) -He is still among my few (along/w Poe and Blake) favorite poets. He was among the most intelligent men of his day. It is difficult to imagine what might have been had he not become an addict.</span></p><span data-dcnode-id="1682" instrument_node="">

</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">I have always respected and liked England and, most of the English peoples I have met. Colonialism didn't make you guys very popular with much of the world, but I am from the U.S. so what can i say about it, we were/are guilty of it as well we just called it something else. I suppose it is because I am from America that I understand plainly how a government can do something horrible and still have conpassionate, decent, responsible, hard working citizens. I am also a chemist and an atheist, so I suppose it is natural for me to like Europe and be disgusted with America right now. After all you guys don't seem to have a problem with christian fundamentalism tryng to destroy or discredit science and, I hear atheist live normal non-paranoid lives in your country. I live in the bible belt, southeastern US, its like going back in time to one of the most predjudice, ignor@nt, backward places on earth- no joke. Anyway, you are right, the Magna Carta was one of the first steps this world took toward real freedom, constitutional rule, etc. England is not by any means a "monster or enemy to personal freedom". Englands history is full of things to be very proud of, things that advanced the human species as a whole. Of course some Americans will always hold a grudge, and vice versa, but not us intelligent folk. Merry xmas Panda man, cheer up!!</span></p><span data-dcnode-id="1209" instrument_node="">

</span><div class="comment-content" data-dcnode-id="855" itemprop="text"><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">They were not rebelling against statist governments, they were rebelling against heriditary rule, monarchy, class divisions,etc. The romantics pushed the idea of every person having certain "god given" rights, the idea of nationhood and citzens being involved in governance, the idea of constitutional rule, the idea of religious tolerance and sepration of church and state, etc. Of course they helped inspire the American and French revolutions, they premoted the very ideas central to these revolutions. </span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">They also premoted a return to nature and spirituality and challenged the prevailing veiw of the scientific revolution that had just ended, the mechanistic veiw of the world. I am sure this is what the BBC writer was referring to when he said they longed to break free of industry and commerce. Remember that the romantic period follows the scientific revolution that took place during the sixteenth, seventeenth, and eighteenth centuries. During this time a mechanistic veiw of the world and human beings was developed to replace the overly superstitious and religious views of the dark ages, and industry began to use this mechasnistic view to exploit the environment for profit. Romantics were trying to say that we needed to return to nature and instead of veiwing it as a machine, or as a collection of resources to exploit, let it inspire our passions and emotions.</span></p><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">

</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">"They were not rebelling against statist governments, they were rebelling against heriditary rule, monarchy" </span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">In both these cases it is still a matter of the state justifying the existence of the individual. The only change was that instead of a mystical god being the source of the law it was a mystical group of men, a collective, or vox populi or volksgiest. Even after the French revolution the individuals had no rights. A woman could be executed for mourning the death of her executed husband, as Dickens noted.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">The only essential change happened when individual rights were established in the US. At that point the state was justified by the individual instead of the other way around.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">That is why the British academic intellectuals at the BBC still ignore the American Revolution: The change has not happened in their minds yet. They, the BBC, are still justified by the state.</span></p><span data-dcnode-id="806" instrument_node="">

</span><div class="comment-content" data-dcnode-id="761" itemprop="text"><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">I will agree with you that the US was a bigger departure from the norm than France after the revolution, I never said otherwise. I also never said that women had equal rights in France after the revolution, in fact you didn't really address any of the points I made other than to say that monarchy and heriditary rule was the same thing as statist governments, which I disagree with as well. The concept of the state didn't even exist at this point, and would not truly take off until right before ww1. I explained the predominate philosophy of the romantic movement and asserted that they did premote the ideals that were at the very center of the American and French revolutions, thats all.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node=""> As far as your comment about women in France not having equal rights after the revolution, I would remind you that it was a British colony in New Zealand during 1893 that first allowed women full voting priviledges, a right they would not fully gain in the US until 1920, and then only because they pointed out that blacks were allowed to vote and yet were not covered by the language of the fourteenth and fifteenth amendments of the constitution, an arguement I am not sure I agree with. I would also remind you that the origins of the modern womens right movement is considered to be 18th century France. Besides that, just because women didn't get full rights doesn't mean that unalienable rights were not a huge part of the French revolution. Read The Rights of Man and of the Citizen, ratified in France during August, 1789. It clearly lays out the principles of unalienable rights, among other concepts, generally thought to be products of the American revolution, mostly by Americans of course. </span></p><span data-dcnode-id="762" instrument_node="">
</span></div><span data-dcnode-id="760" instrument_node="">

</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Yes. Sorry. I rushed through your interesting comments. </span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">They went from monarchy to a kind of popularchy. But as the video points out everyone in Europe, accept for a few nobles, had no rights and were guided by duty. In the French revolution, with the growth of reason (science still lives!) the duty was no longer to the crown but to the state, or the people. Again, this is a change but it is only like a shuffling of the deck chairs on the Titanic. The divine right of kings could not hold sway when European minds were now guided by science and reason. </span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">"the scientific revolution that had just ended, the mechanistic veiw of the world." Science was not ready to die yet. What was dying was a naive materialism that viewed man as a collection of chemicals, a predetermined cue-ball rolling into other cue-balls. The idea was that he had no mind of his own, or a mind whose thoughts were predetermined from before he was born.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Unfortunately the response to the body-without-a-soul view of man was that man could only escape the Calvinistic determinism through: irrationalism.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">My point isn't to say that the Founding Fathers were prior to all other thinkers of the time, but that they were distant enough from Europe's toxic philosophers to not be intellectually subdivided into the warring factions of the body/soul dichotomy.</span></p><span data-dcnode-id="709" instrument_node="">
</span></div><span data-dcnode-id="707" instrument_node="">

</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Wrong again, man you need to read some modern history books. France was the first country to establish unalienable rights (The Rights of Man and of the Citizen ratified 1789), the first country to introduce womens rights (Women's March on Versailles Oct., 5th 1789), the first country to over throw monarchy and introduce a constitution (drafted at the National Constituent Asembly 1791), the first country to have a represenative legistlative branch (Legistlative Assembly 1791-1792), the country that inspired the American revolution and continued to inspire revolt against heriditary rule and monarchy all over the world, especially Europe. Yes, America also inspired many countries to draft a constitution and adopt represenative democracy, but you seem to think we were the first and changed the world all on our own, not so. We owe much to France and the peoples there that had the courage to stand up for the principles that eventually spread across the channel, then across the Atlantic to become the U.S. The people they stood up to were not across an ocean either, they were right there in the country with them, already in control and set up to squash any opposition, very different from the American experience.</span></p><span data-dcnode-id="536" instrument_node="">

</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Third strike Mark, your out (just a joke). However, the bill of rights was adopted by the house of represenatives on August 21, 1789, jointly preposed by congress in Sep. 1789, and finally ratified into the constitution December 15, 1791. So, the French were first. That said they had what was called a constitutional monarchy, mostly just a name. Lois did retain veto powers and sit in as a figure head for a short time after the revolution. This didn't last long though and they are still the foundation of the experiment that became America. I hold a degree in western civics so, yes I have read "the French one" which I, along with most historians, feel lays the foundations for our bill of rights and constitution. You and I should agree to dsagree I suppose. You seem a nice enough guy so I am sorry if I came off rude or anything, have a great xmas Mark.</span></p><span data-dcnode-id="454" instrument_node="">
