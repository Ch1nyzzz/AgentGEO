</span><div data-dcnode-id="5751" itemprop="reviewBody"><span data-dcnode-id="5775" instrument_node="">
</span><p data-dcnode-id="5771"><em data-dcnode-id="5773"><span data-dcnode-id="5774" instrument_node="">The Canary Effect</span></em><span data-dcnode-id="5772" instrument_node=""> is a documentary that looks into the effects of that the United States and its policies have on the Indigenous peoples (Native Americans) who are residents.</span></p><span data-dcnode-id="5770" instrument_node="">
</span><p data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">It premiered at the Tribeca Film Festival and won the Stanley Kubrick Award at the 2006 Traverse City Film Festival (Michael Moore hosts).</span></p><span data-dcnode-id="5767" instrument_node="">
</span><p data-dcnode-id="5762"><span data-dcnode-id="5766" instrument_node="">The movie was directed by Robin Davey and Yellow Thunder Woman, who are both members of LA Based alternative pop group </span><em data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">The Bastard Fairies</span></em><span data-dcnode-id="5763" instrument_node="">.</span></p><span data-dcnode-id="5761" instrument_node="">
</span><p data-dcnode-id="5756"><span data-dcnode-id="5760" instrument_node="">Delving deeply into the often misunderstood and frequently over looked historic realities of the American Indian, </span><em data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">The Canary Effect</span></em><span data-dcnode-id="5757" instrument_node=""> follows the terrifying and horrific abuses instilled upon the Indigenous people of North America, and details the genocidal practices of the US government and its continuing affects on present day Indian country.</span></p><span data-dcnode-id="5755" instrument_node="">
</span><p data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">Featuring interviews with the leading scholars and experts on Indian issues including controversial author Ward Churchill, the film brings together the past and present in a way never before captured so eloquently and boldly on film.</span></p><span data-dcnode-id="5752" instrument_node="">

</span><p data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">After the first Opium War (1839) , the westerners from the USA and Europe carried out culture genocide similar to what they did to the native Americans as described in this documentary in China, the western christian missionaries and xtians(christian zealots, disciples and sheeples) lured, kidnapped and adopted Chinese kids, women and youths to achieve their mission of “killed the Chinese, saved the man”. In order to break down the Chinese determination to protect their identity and dignity. The western Christians used their extraterritorial power to shield Chinese criminals from prosecutions, stole lands and properties, destroyed Chinese culture and artifacts, etc. </span></p><span data-dcnode-id="5385" instrument_node="">
</span><p data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">The incompetent and corrupted Qing court refused to step in to protect the Chinese from the reckless westerner’s culture genocide, it forced the ordinary Chinese to organize themselves to protect their land, families, and culture against the westerners’ ruthless criminal assault, it was called Boxer Movement, but the westerners labelled it Boxer Rebellion, a terrorist movement that threatened the safety of their people in China, and crushed it with an Eight-Nation Alliance armed invasion. </span></p><span data-dcnode-id="5382" instrument_node="">
</span><p data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">The Eight-Nation Alliance troops overrun Qing’s capital Peking, uncontrolled plunder, burning and killing of the capital and surrounding countryside followed. The Eight-Nation Alliance (the American as a member) forced Boxer Protocol on China, the indemnity alone was 450 million taels of silver ($10 billion today’s money) which was more than Qing’s annual tax revenue. Subsequently China went from crippled by Opium to a totally broken and wrecked semi-colony ridden with poverty, deceases and wars, it was a hundred years long humiliation, and human right hell.</span></p><span data-dcnode-id="5379" instrument_node="">
</span><p data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">Have the Americans (the non-natives) changed from the savages described in the film “The Canary Effect”? Not a bit, the Americans have been wrecking havoc around the world the same way they have wrecked havoc to the native Americans ever since. Insane, mad, crazy, psychopathic, double think, morally defunct, blood thirsty, savage... are not bad enough to describe the true nature of the Americans.</span></p><span data-dcnode-id="5376" instrument_node="">
</span></div><span data-dcnode-id="5374" instrument_node="">

</span><p data-dcnode-id="5289"><span data-dcnode-id="5296" instrument_node="">My problem with this entire narrative is that;</span><br data-dcnode-id="5295"><span data-dcnode-id="5294" instrument_node="">
a) aboriginal people get grouped into one entity, which ignores the fact that some tribes attacked, invaded, exploited, forcibly assimilated, and stole the land of others. Europeans come and do the same thing (which has been going on for all of human history) and suddenly history stops.</span><br data-dcnode-id="5293"><span data-dcnode-id="5292" instrument_node="">
b) this documentary presented practically no evidence for how aboriginal people are discriminated against today, and in fact highlighted more cases where they get special treatment (eg. subsidies, expecting to be taken care of by the government, getting to retain ancestral culture,etc.)</span><br data-dcnode-id="5291"><span data-dcnode-id="5290" instrument_node="">
c) It shift responsibility for all native problems, to the whiteman. This is not true, but also explains why they are still struggling to solve their problems.</span></p><span data-dcnode-id="5288" instrument_node="">

</span><div class="comment-content" data-dcnode-id="5237" itemprop="text"><span data-dcnode-id="5253" instrument_node="">
</span><p data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">I think the problem is, you expect their culture to be exactly like ours (European Caucasian). Try to be more open-minded :) In fact, this is the one of the biggest points. Sorry you missed it.</span></p><span data-dcnode-id="5250" instrument_node="">
</span><p data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">a) Agreed, each group was vastly different. But the worst part is, all groups were treated as 'savages'. What a terrible word to call another human being. Even the most 'violent' groups, say Comanche or Apache had a purpose. On all their raids against Americans, recall it was Americans pressing into their land, killing off natural resources (which their culture was based on to survive). Most 'raids' where never more than a handful of people, natives rarely had the intention of slaughter even among their own. You mentioned they pillaged each other, true but never forced a culture on one another. That is a purely European trait. They understood the value of diversity and the value of 'war-games'. Which kept evolution moving.</span></p><span data-dcnode-id="5247" instrument_node="">
</span><p data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">b) The fact that they cannot hunt buffalo for free but are now required to stand in line at the subsidy office is exactly the point. Try not to think link an employee, but a self-autonomous being. The hunters who ravaged 3000+ buffalo a month had no more right to them than the natives. Why did they need to consume so many, why not sustainably hunt them so they are there for years to come? Very little true effort was made to live peaceably with the natives, just empty words. Who is more 'savage' the greedy man who lets resources waste (rot) for a few bucks, or the culture who utilized EVERYTHING from a kill. Taking no more than they need. The reason there were millions of buffalo is because natives didn't sport kill thousands and over-consume. It only took Americans a few years to wipe that slate. Savage.</span></p><span data-dcnode-id="5244" instrument_node="">
</span><p data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">d) Americans did take responsibility, by creating treaties (which they rarely upheld). Likewise, funds and supplies that were supposed to go to the natives were never delivered by the corrupt Indian Bureau. Did anyone hear their cases, or care that they were starving or dying of treatable medical diseases (which whites gave them). Nope. Let's revisit the hundred of treaties that were made and broken by US before we start saying there is no responsibility of the Whiteman.</span></p><span data-dcnode-id="5241" instrument_node="">
</span><p data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">Don't be so naive that every culture is the same. The need to make everyone exactly like ourselves and force our beliefs on them is pitiful. Why would a 'man of god' use military force slave labor to build a mission preaching a religion unwanted to natives. It happened all over the SW. Even after Chief Red Jackets speech, he extended his hand (not his custom btw) but the missionary turned and left never reciprocating the handshake. Savage.</span></p><span data-dcnode-id="5238" instrument_node="">

</span><p data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">The problem this film explores is the psychopathic id of modern culture. Politics, finance, education, inherent racism, ecological failure, they all are at their root part of the mass suicide we call globalization. Native American cultures had a vast amount of knowledge both spiritual and ecological that the "civilization", whether eastern or western, has never possessed. We all need to contemplate how we can reinstate stewardship of the earth to the only true protectors of her; Native inhabitants and cultures.</span></p><span data-dcnode-id="5042" instrument_node="">

</span><div class="comment-content" data-dcnode-id="5000" itemprop="text"><span data-dcnode-id="5006" instrument_node="">
</span><p data-dcnode-id="5002"><span data-dcnode-id="5005" instrument_node="">The American people have been systematically and repeatedly lied to and denied knowledge of the genocide within this country. You, too, will play the game, or pay the price. We've been offered the good life, and good jobs, but only if you don't see and talk about what is taking place within our borders. Where have our teachers been, why have they not told us? Because their jobs depend upon them NOT telling children the truth, and textbooks are used only if they have been censored and rewritten to reflect our 'Official History of the U.S.'. Our military destroyed civilizations that had evolved within North America for thousands of years prior to their 'discovery' by the english. How bizarre, the country was completely occupied when it was discovered by the English, and some of the people are those you've likely never heard of, such as the Melungeons, families of sailors from the Mediterranean area, and Indian women from the southeastern coastal areas of the U.S. The dark skinned Melungeons were pushed up into the hills of Tennessee by the English and Irish, and denied civil rights such as voting and holding office. Only the Seminoles in Florida could avoid confrontation, by slipping back into the everglades.</span><br data-dcnode-id="5004"><span data-dcnode-id="5003" instrument_node="">
So where does this desire to eliminate another race of people come from, since it seems so universal? Lately I've been watching U.S.helicopter crews gleefully killing men, women and children in Iraq using powerful canons mounted on their gunships, and the sounds of their laughter still rings in my ears. What will it take for humans to live together?</span></p><span data-dcnode-id="5001" instrument_node="">

</span><div class="comment-content" data-dcnode-id="4959" itemprop="text"><span data-dcnode-id="4966" instrument_node="">
</span><p data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">The tendency you have described is Universal. Australia - the same story repeats. I believe the root cause is a faulty world-view based on "greed/control" and "relentless urbanisation" ignoring deep spiritual and ecological connections nurtured by indigenous people. From science to medicine, systematically indigenous people have been portrayed as "uncultured" / "aggressive" etc. May be it's true for some instances. But for vast majority of cases it's the other way around. And it's not just white/brown/black people, it's an indoctrination, where racial stereotypes are overblown ignoring the fact that black/brown people can be brainwashed or conditioned in presence of appropriate culture in a similar way. Notice how late-1G or 2G indigenous people behave with current indigenous people only to distant themselves from their true lineage. Humans are strange creatures, really !</span></p><span data-dcnode-id="4963" instrument_node="">
</span><p data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">The only deadly consolation for me is the realisation that many of the socio-economical-ecological crisis plaguing us originates from that same faulty world-view based on "greed/control/domination". Now that whole world has been dominated by people, innate aggression has nothing to do. It vents itself out through corporate profit figures, venture-capital and "hocky stick growth". The same people that butchered dirty tribals are in charge of many VC-funds/Corporations/First-world government. Interestingly Asian countries chew the same pill and turning their souls from agro-indegenous roots to capitalistic roots. It takes lots of self-criticism and un-conditioning to realise that we probably have to stop over-doing / over-developing / over-modernising / over-researching / over-mechanizing and have to connect that "spiritual-and-ecological" knowledge used to be nurtured by tribal / indigenous / aboriginal people around the world. Read "Ascent of Humanity"</span></p><span data-dcnode-id="4960" instrument_node="">

</span><p data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">So many Americans consider themselves religious, and righteous, yet those who manage our governments, our federal and state governments, cannot bring themselves to treat the Amerindians as human beings. It is said the U.S. Government has never honored a treaty with an Indian Nation. I was completely brainwashed, lied to as a child growing up, beginning with the Columbus myths, until today 70 years later I have no trust in any United States leader or institution. If I had the courage I would give up my American citizenship in protest..... but to what end? I know eventually this country will go the way of those others just like us, eaten up by debt and greed and inhumanity. What will it take for the US Government to be kind, to be honest ........ to be human, with other humans?</span></p><span data-dcnode-id="4764" instrument_node="">

</span><p data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">I appreciated this film. Our country's history with the Native American is shameful, and an important revelation of human ignorance, willful or otherwise, that we hope we learn from. The challenge for the Native Americans will be to overcome the pain, choose to heal, move on and build a future with pride and dignity. A future that celebrates and honors what is worthy in its communal traditions, yet rises above the dependencies that cripple it and leave it in poverty, addiction, poor mental and physical health.</span></p><span data-dcnode-id="4684" instrument_node="">

</span><p data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">I am and is still saddened by the way the Native were treated.How horrible and to honor Columbus as an hero when he was nothing but an true mass murder is sickening.They made up all of these lies on the natives,even taught in school lies about them.When I found out the truth about what evil,savage,barbaric acts were done to them-I decided that I would tell as many people as possible the truth.I sign petitions for them every chance I get.They are over in the amazon doing the same things all over again.It is wrong and they need to stop.The Natives deserve an Holiday,an monument,statue,etc in their name and I pray to God that they get it.I am going to fight for their rights as long as I have too.It is truly heartbreaking and horrible that an mass murder have an Holiday named after him.</span></p><span data-dcnode-id="4411" instrument_node="">

</span><p data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">Instead of arguing about past morals etc we should be asking what we can do to help the situation. We need to be aware of the past and what happened, but the more pressing matter is what do we do now? Does anyone know if there's any way of funding mental healthcare or counselling or something on the reservations? We need to help prevent alcoholism and suicide as is a matter of urgency... Also the fact that the US government refuses to acknowledge the suffering of the American Indian community is appalling.</span></p><span data-dcnode-id="4372" instrument_node="">

</span><p data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">You're a bit misinformed about indigenous peoples in the Americas originally coming from Asia (the Bering Strait Theory). Those indigenous peoples would say they have always been here... and in the last several years, a theory that the migration actually went from the Americas to Asia is gaining more traction. But, we digress.</span></p><span data-dcnode-id="4213" instrument_node="">
</span><p data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">The film is not professionally made to hollywood standards, but that is who the creators of this documentary are -- they are not professional film makers, they are storytellers (usually they tell stories through their music) and more importantly, activists. The tools are in the hands of the people -- we don't need experts in order to communicate with each other. </span></p><span data-dcnode-id="4210" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3266" itemprop="text"><span data-dcnode-id="3273" instrument_node="">
</span><p data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">I want to address Kris Smith's commentary about Ward Churchill's statement about spreading small pox. I think you just need to look into parallel historical scenarios to confirm Churchill's statements. For example, Noam Chomsky co-authored a book about Christopher Columbus' diary where he admitted to the fact that they were even privy to spreading some kind of disease or plague to the Native Indians even though humankind was unaware of germ theory until the late 19th century. Moreover, in more contemporary times, it's a fact that the U.S. State Department and War Department illegally inoculated Central Americans with syphilis that was carried in vaccines. Doesn't that sound like biological warfare? I am most certain it is, and it has been used, whether the science confirmed it or not, for hundreds of years, especially in the Americas. I think there is a greater sinister agenda that will possibly reveal itself in our lifetime perhaps. I also think that when someone like Ward Churchill espouses truth the become attacked on all fronts, as Gandhi pointed out, that means your beginning to win. </span></p><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">As A former U.S. Army paratrooper, who served in both Iraq and Afghanistan, I want to apologize for perpetuating the U.S. government's policies that create genocide around the world and within the U.S. It's despicable to me to remain silent as well as attack greater truths that are revealed by our world's most oppressed peoples. The Native American Indian deserves our nation's greatest acknowledgment that their people have had a genocide committed against them in the most profound way. They, the American Indians, deserve recognition as a highly resilient people, but most importantly, they deserve justice and compensation by having their ceded (STOLEN) lands and mineral rights given back to them while also being compensated for having billions, if not trillions, of dollars of revenue stolen from them by the U.S. government and its crony capitalist insiders who do not support a free market what so ever. From the Redwood forest to the Gulf of Mexico, to the Pine Ridge Indian reservation to the Seneca reservation put under water by a dam built by the U.S. government in the early 1960s, to Plymouth Rock to the backwaters of Seminole country down in Florida, may justice and freedom become attained in the hearts and minds of all of the American people, especially the ones who live in the Fourth World, our Native American Indian brothers and sisters who are under economic and political siege. May this scourge against humanity and our Great Spirit stop now! </span></p><span data-dcnode-id="3267" instrument_node="">
</span></div><span data-dcnode-id="3265" instrument_node="">

</span><p data-dcnode-id="3113"><span data-dcnode-id="3117" instrument_node="">True, a good portion of the film talks about certain details that happened in the distant past, however it also talks about many abuses that are happening to the Native Americans </span><b data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">in the present day!</span></b><span data-dcnode-id="3114" instrument_node=""> That said, your statement that it is all in the past begs the question if you have even finished the complete documentary since it shows that a lot of it extends to now.</span></p><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">The fact that Indians are still being abused and oppressed (yes, I mean "oppressed") in the present is demonstrated by the case of the Western Shoshone Indian Tribe.. The U.S. government is currently trying to force the Shoshone's off their ancestral land; land that was never ceded. Yes! It is going on now in 2011. Why? Because there is a huge gold deposite on their land. It matters not that land belongs rightfully to the Shonshone tribe. (See the Documentary "American Outrage" for more details).</span></p><span data-dcnode-id="3109" instrument_node="">

</span><p data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">You, Ma'am, are a Buffoon. Get over it?, Stop Crying?, Educate the Natives? Are you serious? Try and put your head around this fact, and then I'll supply you with a few more. "If", the Holocaust numbers are accurate and six million Jews were killed, what would you consider 80 million? That is an estimation on the number of indigenous deaths that occurred on this continent. Are the Jews still crying about their six million? Do the Jews have a homeland? Do the Jews still have their religion? You bet your Ass on all counts.</span></p><span data-dcnode-id="3073" instrument_node="">
</span><p data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">I'll bet your immediate thought is, "Well, we had to protect ourselves from those savages", right? If it happened again, and China invaded this country and burned all our churches, killed nearly every citizen and then put the remaining ones in little shitty places to live, would you be alright with that too? How about, next, they forced us to wear the kind of clothes they wore, worship their Gods, speak Chinese and go on welfare ... which they made us beg for or get nothing? Still okay with it?</span></p><span data-dcnode-id="3070" instrument_node="">
</span><p data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Suppose, after you had finally accepted the fate you were in and started to accept living in squaller and poverty only to have the Chinese government force you from that land because they had suddenly found gold there and killed many more to make the move swift, still no problem? I hope not. The fact that we have treated the Native people like animals is pathetic and unforgivable and "Why not move on and forget the ancient past"? In Gods name, so we don't repeat such an atrocity and guess what has never stopped? We have carried our brutality all over the globe from Vietnam to Iraq.</span></p><span data-dcnode-id="3067" instrument_node="">
</span><p data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">Over a million dead civilians in Iraq as we continue killing people in three different countries simultaneously and you callously as about crying? I apologize for using the word Buffoon ... it was far too weak a description for someone having such a mindset and a cold heart. I wish you well.</span></p><span data-dcnode-id="3064" instrument_node="">

</span><p data-dcnode-id="2987"><span data-dcnode-id="2994" instrument_node="">I am Native too, maybe it's different in America, but up here in Canada some of these things happened to my parents. Try looking up Indian Residential schools sometime. The ripple effect of a terrible thing cannot just be stopped. That would be like trying to stop a tsunami after an underwater earthquake. It will take time for the people to heal, because it is ONLY NOW that people are actually starting to care about them and everything else surrounding what has happen and is happening. Although you may be native or I am misreading your paragraph, but it seems that you haven't aquired the vast knowledge of this to fully understand what had happen, and why the effects are still happening as they are.</span><br data-dcnode-id="2993"><span data-dcnode-id="2992" instrument_node="">
To get a first hand understanding I reccomend:</span><br data-dcnode-id="2991"><span data-dcnode-id="2990" instrument_node="">
That you be place in a kidnapping, be taken away from everything you have ever known, be beaten, raped, forced to learn a language you know nothing about, not even have the freedom to dress the way you want or freedom to believe who you want to believe. Then be forced to live with others who have gone through this, in a very small space, and have everyone outside that circle of people tell you that you are worthless, you should die, you are the worst thing about society, the world would be better off without another f-cking indian like you. Maybe pop out five kids, two of them are because you were raped, have those kids taken away and go through what you have gone through. Then have people tell your children, and grandchildren to "GET THE F*** OVER IT".</span><br data-dcnode-id="2989"><span data-dcnode-id="2988" instrument_node="">
This will not happen in one generation. I believe we can make a difference, BUT not with your unsympathetic, and obtrusive attitude to something that was utterly horrendous, and deviod of any humanity.</span></p><span data-dcnode-id="2986" instrument_node="">

</span><p data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Stories have to be told or they die, and when they die, we can't remember who we are or why we're here.' This is undeniable but to look forward instead of holding on to the hate,grudges and vengeance associated with the doings of our forefathers is credit to those who in this surviving oppression are big enough to feel no need to vindicate any of the heinous crimes committed man against man that have littered history, big enough to feel no need to take sides in our contemporary age. We cannot forget where we came from but let not the stories retard our evolution of consciousness</span></p><span data-dcnode-id="2875" instrument_node="">

</span><p data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">What a sad and silly response, Miss Anderson. This, unfortunately, is some of the rhetoric used to dismiss and ignore relevant history. You have to make history like this seen/heard and try to process and understand the 'why's" to know what and where to begin. This is not just about 'old history' this is about how history has shaped and dictated policies, laws and practices employed TODAY that have major consequences for people today--Indigenous and non-indigenous folks. Please keep this in mind. It's not about just 'getting over it'---how does one truly get over genocide?</span></p><span data-dcnode-id="2839" instrument_node="">

</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">It's not a stretch at all. We've done pretty much the same things to African Americans that we did to Native peoples. It breaks my heart to know the things that my ancestors have done... and the things we are still doing but are too blind, stupid, or self-centered to acknowledge. We white people, because of our privilege, can be so oblivious and unsympathetic to the situations of others. We hold other races down, and we hold ourselves down. Our politicians and businessmen try to rule the world and amass wealth for themselves. They feed us with ignorant and hateful rhetoric, and we eat it up. We buy all of the shit they sell. We try to be them. It makes me sick to think about it. We white liberals even manage to screw things up and undermine people of color when we try and help their causes. We never get it right, and we hurt people in the process. I don't know what to do. I wish people were equal and free to govern themselves and live their lives as they please - in peace and solidarity with each other. How can it be done?</span></p><span data-dcnode-id="2568" instrument_node="">

</span><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">KasparHauser4, listen up: any of us who are non-aboriginal are descendants of colonizers. Many of those colonizers were Europe's poor that Europe didn't want to have to include socially and economically. So they were sent here and told that if they helped their over-privileged rich elite ruling class by deracinating the continent, they too would find a place at the great table of wealth and prosperity. This was all to benefit the inbred crowned heads of Europe and Britain, and the multinational bankster corporate class. If you agree with the current and ongoing mistreatment and disrespect of this country's rightful owners and first occupants of this country, then you are a tool — a disposable willing tool.</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Now let me tell you what "deracination" means if you're too incompetent to use a dictionary: it means clearing the land by means of genocide. That's right, buddy. If you're a rich (or even comfortably off) white male who is fine with the status quo, you are a tool and an apologist for imperialism and genocide. </span></p><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Now, I am a poor woman from the underclass, and also a descendant of colonizers. But thanks to the opportunity of being educated to the truth that this video provides, plus the sharing of many other First Nations people about their realities, I am able to recognize something that you do not: the difference between right and wrong, and the injustices suffered by many due to an entire toxic system of unearned privileges. </span></p><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">I did not ask to be born here under the terms and conditions that I was, but I can damn well choose the right path since I am here. And that path is one of social justice. </span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">And when I say social justice, I mean not only economic justice and equal rights. I mean respect for First Nations peoples' human rights and their right to have a say in the direction in which this country, and society as a whole, is going. Human rights and social justice also includes the right to human dignity and cultural preservation. Justice is what love looks like in public. Now you think about that.</span></p><span data-dcnode-id="1975" instrument_node="">

</span><p data-dcnode-id="1120"><span data-dcnode-id="1135" instrument_node="">From as far as history goes and in every scale of sizes, humans have taken over other human's land while eredicating their way of life. We are seeing the same of this with the whole world taking over and *bettering in their own terms*, the countries of Africa. It comes hidden in fighting poverty with humanitarian help, in religious teachings (as seen in Missionnaries of Hate), in oil digging as a way of financial help or as a touristic embelishment of some of the best beaches with huge resorts or vast lands as Golf course. All of these actions brings more cash in the pockets of the ones holding the strings and provides an inside nest, they can later claim as their own as Zatarra implied in the FUEL doc.</span><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">
On may 5-7th 2006 I was invited as an artist at Ryerson University for a meeting organized by Lead and Uniterra. I presented an exhibition of African portraits and was a participant in the forum and workshops to help strenghten Canadian Response to the Millenium Development Goals.</span><br data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">
Their brochure said: Extreme poverty has been somewhat clinically defined as having less than US$1 to meet one’s daily needs. More harshly, such poverty has been called “poverty that kills.” Were the Millennium Development Goals to be fully reached in 2015, more than 500 million people [would] be lifted out of extreme poverty.</span><br data-dcnode-id="1130"><span data-dcnode-id="1129" instrument_node="">
More than 300 million [would] no longer suffer from hunger rather than die before reaching their fifth birthdays,</span><br data-dcnode-id="1128"><span data-dcnode-id="1127" instrument_node="">
30 million children [would] be saved. So [would] the lives of more than two million mothers.”</span><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">
While we ate from huge buffet of smoked salmon, roast beef, fancy salads and delicate desserts people talked about what can be done to bring a salary of at least $1.00 a day to every African living. Many suggestions were made, many ideas were brought forward, the one thing they all had in common was providing a nice trip to many people to better their own life abroad. They talked about what could be implemented there in every way possible but never was it mention what we could bring and learn from their family values to better our world here until i got up and took the microphone.</span><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">
I didn't talked from my head or ego i talked from my heart remembering the thousands of people i had met on my two 6 months trip through West Africa. I went to this meeting unpaid but well taken care of. I didn't try to sell any art and even supplied free access to 20 photographs for the Worshop Report that was to be sent to all the people present. I allowed the use of those in the hope that the soul of the people on those photographs would give power to their message. This reminds me, i should write to Nayé Bathely, an African woman from Senegal working for World Bank External Affairs Division Paris, who was touched by my comments and ask her how she is doing.</span><br data-dcnode-id="1122"><span data-dcnode-id="1121" instrument_node="">
az</span></p><span data-dcnode-id="1119" instrument_node="">

</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">I agree with you all in being dumbfounded by the weight of shame and guilt that our nation bears. Waldo, I share your feeling that perhaps - though obviously not possible or likely - we should just dissolve and elect a council of descendents of the wronged to work us in penal colonies. It is hard not to feel a bit hopeless in the face of not only historical atrocities but current systemic brokenness and morally repugnant structural disenfranchisement. What can we do? This is so powerful. You wonder, if someone like Obama (and yes I'm idealistic enough to believe he wants to the right thing and has a heart for justice, despite being handcuffed in any such efforts by our whole messed up government and system) could sit, with no distraction, and watch this film. What might be the result? </span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">For any who haven't watched it and are looking to further brighten their day...ahem, or rather for those who find hard truth to be cleansing though painful, watch End of Poverty on here. This cultural rape has happened all over the globe. Australia's is a very similar story to our own.</span></p><span data-dcnode-id="1077" instrument_node="">

</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">I'm distraught by this. I knew, just from what western so-called civilization commits on a daily basis, that the treatment of the native peoples were bad and at best negligent. But this is just beyond me. </span></p><span data-dcnode-id="999" instrument_node="">

</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Thank you for posting this its an excellent film showing what I have been saying for years "The real illegal immigrants ARE WHITE, came on ships in 1500's to conquer these once great lands to rape, plunder, conquer and eventually fill America with a bunch of fat cheeseburger munching imbeciles." I'm half Iraqi and part Native American. I think what this country has turned into stinks and sometimes wish I was never even born into this messed up polluted hell hole in a downward spiral to nowhere. And I cannot remain silent while I see these same things happening in the Middle East and it makes me sick to my stomach you know like Bill Hicks said I find myself agreeing with the "bad guys" more often than our presidents. People have always discriminated against me because they are dumb, deaf, and blind. Their world is polarized between good and evil, black and white, they can't think for themselves and the world inside their mind is quiet Orwellian "Freedom is Slavery" their thinking is so backwards they couldn't see the truth if you hit em upside with the head with a 10 ton block of truth.</span></p><span data-dcnode-id="957" instrument_node="">

</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Thank you for making this doc available. What a poignant reminder of ourselves &amp; the evil things we do both past &amp; present. Unfortunately like so many other worthy causes &amp; wrongs that need to be righted few if any of the masses will ever become truly aware of these issues addressed in this film. It is usually a very small % of the population that is interested enough in the truth that ever takes the time to educate themselves or sit down for an hour or so to watch a presentation such as this. The classic "preaching to the choir" as indicated by the previous heartfelt &amp; concerned comments. </span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">I believe it is safe to say that the majority of those who watched this film &amp; especially those of you here at Top Docs are appalled at the obscene treatment of the aboriginal peoples of North America. The question remains: How do we truly effect change/reparations &amp; get the masses to gain enough interest to even take the time to search out a doc like this &amp; actually watch it &amp; open their eyes. That was a somewhat rhetorical question. I think we know the answer. Now if only we would act on that knowledge.</span></p><span data-dcnode-id="915" instrument_node="">

</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">goodman, appreciate greatly your sentiments. We should definetly expect more from our leadership.</span></p><span data-dcnode-id="871" instrument_node="">

</span><p data-dcnode-id="624"><span data-dcnode-id="629" instrument_node="">I am 1/4 Cherokee. My Grand Father was full blooded Cherokee. I have wondered for some time, why it is the Jews as well as the Blacks, and how they bitch and moan about "anti-semitism" and "slavery." First of all, just because someone disagrees with a Jew, doesn't make him an "anti-semite." And disagreeing with a black person, doesn't make him a "racist." I'm sick and tired of hearing these EXCUSES for people who cannot dig themselves out of their own deceptions.</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
I don't believe I have ever heard a "red-man" bitch and moan about how THEY are treated, and yet they are STILL being treated inexcusably! The reasons there have so much alcoholism is BECAUSE of HOW they are STILL being treated! The only positive thing I CAN say, is they've stopped scalping them. Instead, they treat them SO poorly, they kill themselves. Arnold needs to go back to Germany. He was obviously NOT "Jewish?"</span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">
It kills my heart to know how these Indians are still being treated, not because I am part Indian, but because I am HUMAN, and I have a CONSCIENCE. That is something most Congress-people do NOT seem to have these days. It is unconscionable to have a job that can make a difference, and yet they do not exercise that ability. The people in Congress need to be looked at with a KEEN eye, and replaced with those that have a heart; and are not first, more concerned with their wallets. Or as in McCain's case, how many homes he has been PAID-OFF with. I mean how many people in America, don't even know how many houses they own? And they were going to APPOINT him President of this country? One of America's biggest problems is, we (I'm referring to our Congressional representatives, AND the White House) think only of PROFIT, rather than with compassion. America is in it's saddest state, since I was born in 1950. The wool is coming off though. I only HOPE...it is in time to save what is left over, since the Act of 1871! As well as the "final solution" of 1913. When the IRS and the "Federal Reserve" took over what was left.</span></p><span data-dcnode-id="623" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">

</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">No words can really describe it. How do you fix any of this? I never have understood the racial issues involved here. Maybe it is just my nature and that I see such proud beauty in the native people and their cultures. I just don't get it from any angle. The people refusing to give jobs to natives? I have seen people with jobs who have no work ethic no skills and are generally a waste of air but they have a job. How are natives so bad that they rate lower than that? The casinos that do make tons of cash dont think that sharing that profit for the betterment of the peoples is important? I hate all of this. As I said there are no words adequate enough. I have been aware of many of the issuesandevents depicted here but not in such depth or context since there are no major reservations around me. I would volunteer my services to one if there was. Just truely pathetic how overlooked they are.</span></p><span data-dcnode-id="411" instrument_node="">
