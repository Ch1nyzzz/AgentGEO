</span><p data-dcnode-id="6581"><img alt="Should I Smoke Dope?" class="alignleft" data-dcnode-id="6583" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//topdocumentaryfilms.com/wp-content/uploads/2010/02/should-smoke-dope.jpg&amp;raw" width="128"><span data-dcnode-id="6582" instrument_node="">Although it's illegal, over 15 million people have tried cannabis. Even politicians admit to having smoked it in their youth.</span></p><span data-dcnode-id="6580" instrument_node="">
</span><p data-dcnode-id="6578"><span data-dcnode-id="6579" instrument_node="">But, in the press, there are more and more frightening stories about the effects of the drug, and there's a growing debate about whether cannabis should be reclassified as a class B drug.</span></p><span data-dcnode-id="6577" instrument_node="">
</span><p data-dcnode-id="6572"><span data-dcnode-id="6576" instrument_node="">In </span><em data-dcnode-id="6574"><span data-dcnode-id="6575" instrument_node="">Should I Smoke Dope</span></em><span data-dcnode-id="6573" instrument_node="">, journalist Nicky Taylor is off to Amsterdam to investigate. While there, she helps out in a coffee shop selling cannabis and discovers firsthand how the drug affects daily life. Back in the UK, Nicky finds out about the genetically modified cannabis called "skunk," which is cheap and increasingly sold on the streets.</span></p><span data-dcnode-id="6571" instrument_node="">
</span><p data-dcnode-id="6569"><span data-dcnode-id="6570" instrument_node="">Can marijuana make you crazy? Is it worse than alcohol? And is it stronger than it used to be? Nicky takes part in a groundbreaking medical trial to answer these questions. Her month-long experiment is both disturbing and revealing.</span></p><span data-dcnode-id="6568" instrument_node="">

</span><p data-dcnode-id="6292"><span data-dcnode-id="6293" instrument_node="">Quick qualification: smoke appx 1.5 oz/ month... Colorado and California high grade marijuana w/ preference to Haze (all strands), Durban Poison, Sour Diesel and Jack Herrer (to name a few).</span></p><span data-dcnode-id="6291" instrument_node="">
</span><p data-dcnode-id="6289"><span data-dcnode-id="6290" instrument_node="">First, she is so naive that I find it absolutely adorable; absolutely fell in love this woman.</span></p><span data-dcnode-id="6288" instrument_node="">
</span><p data-dcnode-id="6286"><span data-dcnode-id="6287" instrument_node="">I don't see this as being a definitive documentary. She is a very experienced user of Alcohol and Cigarettes. Conversely she is a novice/rookie marijuana user and while experienced with one substance, she is then attempting to compare those with something she has no experience with.</span></p><span data-dcnode-id="6285" instrument_node="">
</span><p data-dcnode-id="6283"><span data-dcnode-id="6284" instrument_node="">Nicky qualified herself as smoking pot in college. How often? Did she attempt a couple puffs at a party after getting ripped on alcohol and then claim to have smoked? Or did she really sit down, pass a joint, and experience being high.. Based on her reactions; Definitely not. When you see her in the coffee shop playing 'hand-slaps' with the manager, she is acting completely wasted compared to all the experienced smokers around her who (in the background) act normal.</span></p><span data-dcnode-id="6282" instrument_node="">
</span><p data-dcnode-id="6280"><span data-dcnode-id="6281" instrument_node="">She is 'hamming it up' ... Which I understand for the sake of viewers; Unfortunately it blurs the truth.</span></p><span data-dcnode-id="6279" instrument_node="">
</span><p data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">I believe she honestly attempted to approach this in an objective manner. My reasoning is that when Nicky interacts with people it was very friendly, subjective, and neutral. </span></p><span data-dcnode-id="6276" instrument_node="">
</span><p data-dcnode-id="6274"><span data-dcnode-id="6275" instrument_node="">Unfortunately for viewers a documentaries objective is often slanted by the shows EDITORS and not the journalist... The editors have the final say as to whether this documentary will be pro marijuana, anti-legalization, or completely neutral. On this matter the British government and it's cohorts at BBC have proven that they will always opt for anti-legalization slants.</span></p><span data-dcnode-id="6273" instrument_node="">
</span><p data-dcnode-id="6271"><span data-dcnode-id="6272" instrument_node="">This should not be blamed on Nicky. I want to hug her while passing a joint.</span></p><span data-dcnode-id="6270" instrument_node="">

</span><p data-dcnode-id="6031"><span data-dcnode-id="6032" instrument_node="">This isn't propaganda? I've smoked weed before. Yes, you do get anxious. You may get dry lips. You may get a burning sensation in your mouth linked with pasties. The first time I did it I got a burning sensation in my mouth, but I didn't get any "white stuff" in my mouth. I did indeed have short term memory loss, I was laughing over nothing for 30 minutes and I can't even remember it. Plus we used a home made bong and the hose didn't even go in the water, and had alcohol to drink, both mixed in with cola and shots of what I think was "Bundy Red" I don't really get the munchies the 2nd time I did it, chicken flavoured chips tasted really good, but the morning after it just wasn't as tasty. Then I smoked more weed later that day, this time it wasn't mixed with tabbaco. I had two cones, went inside from the garage, I fell on the ground laughing, i could hear my self breathing heavy, it was really trippy, then I was later glued on the floor just infornt of a coach seat, but this time I didn't get short term memory loss even though the stuff I smoked was certainly stronger, and I had a real bong too, it cost me $35. The weed I got this time had a really strong smell. </span></p><span data-dcnode-id="6030" instrument_node="">

</span><p data-dcnode-id="5914"><span data-dcnode-id="5915" instrument_node="">THC is one of many cannabinoids. Although the ratio of cannabinoids other than THC and THC vary in weed "Skunk" has as much of other cannabinoids as other weed if not more. Testing pure THC versus THC and other cannabinoids as a measure of "skunk" versus other weed is a terrible experimental procedure. A better procedure would be to test an extract of so called "skunk" weed versus an extract of regular weed. Basically in the study shown they were testing a pharmaceutical like marinol, the pure THC, versus a representation of the normal composition of a naturally occurring cannabis plant. Their study showed nothing about "skunk" weed because it inaccurately represented "skunk" weed. They basically showed that a pharmaceutical had a worse effect than a substance that in its natural form is safe.</span></p><span data-dcnode-id="5913" instrument_node="">

</span><p data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">The irony is that this first joint that Nicky Taylor smoked - not 'skunk' cannabis (i.e. sinsemilla bud). Just old fashioned seeded, leavy Jamaica brick weed, with tobacco. I know, because I've bought it. It is seeded, pressed to reduce volume for export, outdoor sun grown weed. Not sinsemilla bud. It has viable seeds in it, which can be grown out into plants. </span></p><span data-dcnode-id="5557" instrument_node="">
</span><p data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">Is weed stronger than it used to be? Consider these lyrics from the 1920s: </span></p><span data-dcnode-id="5554" instrument_node="">
</span><p data-dcnode-id="5528"><span data-dcnode-id="5553" instrument_node="">"Man what's the matter with that cat there?"</span><br data-dcnode-id="5552"><span data-dcnode-id="5551" instrument_node="">
"must be full of reefer"</span><br data-dcnode-id="5550"><span data-dcnode-id="5549" instrument_node="">
"full of reefer?!"</span><br data-dcnode-id="5548"><span data-dcnode-id="5547" instrument_node="">
"yea man"</span><br data-dcnode-id="5546"><span data-dcnode-id="5545" instrument_node="">
"you mean that cats high?!"</span><br data-dcnode-id="5544"><span data-dcnode-id="5543" instrument_node="">
"sailing"</span><br data-dcnode-id="5542"><span data-dcnode-id="5541" instrument_node="">
"sailing"</span><br data-dcnode-id="5540"><span data-dcnode-id="5539" instrument_node="">
"sailing lightly"</span><br data-dcnode-id="5538"><span data-dcnode-id="5537" instrument_node="">
"get away from here</span><br data-dcnode-id="5536"><span data-dcnode-id="5535" instrument_node="">
"Man is that the reefer man?"</span><br data-dcnode-id="5534"><span data-dcnode-id="5533" instrument_node="">
"that's the reefer man"</span><br data-dcnode-id="5532"><span data-dcnode-id="5531" instrument_node="">
"I believe he's losing his mind"</span><br data-dcnode-id="5530"><span data-dcnode-id="5529" instrument_node="">
"I think he's lost his mind!" </span></p><span data-dcnode-id="5527" instrument_node="">
</span><p data-dcnode-id="5523"><span data-dcnode-id="5526" instrument_node="">"If he said he swam to china, and he sells you south carolina"</span><br data-dcnode-id="5525"><span data-dcnode-id="5524" instrument_node="">
"then you know your talking to that reefer man"</span></p><span data-dcnode-id="5522" instrument_node="">
</span><p data-dcnode-id="5518"><span data-dcnode-id="5521" instrument_node="">"If he said he walks the ocean, any time he takes the notion"</span><br data-dcnode-id="5520"><span data-dcnode-id="5519" instrument_node="">
"then you know you're talking to a reefer man."</span></p><span data-dcnode-id="5517" instrument_node="">
</span><p data-dcnode-id="5515"><span data-dcnode-id="5516" instrument_node="">Now that's pretty high. And that's from the 1920s, your great-grandfather's weed. Remember the Cheech &amp; Chong movies from the 1970s? Tell me they didn't get high in the 70s. :) </span></p><span data-dcnode-id="5514" instrument_node="">
</span><p data-dcnode-id="5512"><span data-dcnode-id="5513" instrument_node="">But the argument that 'this is not your parents marijuana' is of course just as old. Hemp got banned as the 'strange new drug that is driving people insane', by calling it marijuana. Which was an obscure slang term for weed, as most slang for weed is pretty obscure. And then there was 'The Skunk'. And in the Americas, 'The Kush'. </span></p><span data-dcnode-id="5511" instrument_node="">
</span><p data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">The more things change... </span></p><span data-dcnode-id="5508" instrument_node="">
</span></div><span data-dcnode-id="5506" instrument_node="">

</span><p data-dcnode-id="5426"><span data-dcnode-id="5433" instrument_node="">okay, well marijuana has had studies that show that adolescents who smoke and have a predisposition to schizophrenia are more likely to get it. now this can be that pot causes something to trigger it, or perhaps people who do have it are more inclined to smoke</span><br data-dcnode-id="5432"><span data-dcnode-id="5431" instrument_node="">
next, being really high can make a person light headed, dizzy, and/or disoriented (usually not for long) but this might not be from the weed itself but the process of smoking it. meaning from the deprivation of oxygen to the brain (aka holding your hit in as long as you can) which would cause someone to stumble and fall, so it's possible</span><br data-dcnode-id="5430"><span data-dcnode-id="5429" instrument_node="">
and unfortunately marijuana can have the affect of insomnia. after all, smoking does cause one's heartbeat to increase and that may make sleep more difficult. simply stating i believe that smoking all you can smoke will most likely put someone sleep rather quickly (cure for insomnia, sorta) however i believe when someone smokes a little bit (say just to get a buzz) i believe the reverse is true and that it rather can keep a person awake by keeping the mind alert</span><br data-dcnode-id="5428"><span data-dcnode-id="5427" instrument_node="">
finally, unfortunately for both activists and prohibitionists there are seemingly many hypocritical properties and effects of marijuana that aren't fully understood. hell, just go to your medicine cabinet and read the back of your aspirin bottle, do you truly understand that?</span></p><span data-dcnode-id="5425" instrument_node="">

</span><p data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">I thought it was a fair review overall (I trust what she was doing was real ad I have seen and felt the same experiences). I also thought it was honest that they showed the experiences of several others (young and old) to be positive experiences. For me its been great and it has been a life saver for me with my arthritis (reduces pain for a while and also inflammation). I have gotten the munchies but I find it no different than after drinking and I get the munchies too. Point is like everyone discusses here is that the experience is different for some people (same a drinking).</span></p><span data-dcnode-id="5346" instrument_node="">
</span><p data-dcnode-id="5342"><span data-dcnode-id="5345" instrument_node="">There's no doubt that it should be legalized and I hope everyone here spreads good word about the health benefits and try to keep things positive. Don't go with the "propaganda" twist because I think it would have been a lot more negative towards cannabis use if that was the case.</span><br data-dcnode-id="5344"><span data-dcnode-id="5343" instrument_node="">
Last point, there is definitely some "science" misinformation.</span></p><span data-dcnode-id="5341" instrument_node="">

</span><p data-dcnode-id="5225"><span data-dcnode-id="5226" instrument_node="">I think it's important to remember that all the experts in this doc have it in their best interests to tow the company line and remain mainstream. The doctors are certainly bias toward pushing pills and it would be unwise financially to promote a plant . Its a weed, toss some seeds around and it would be hard not to grow rampant. It's only been recent that people have had the nerve to actually speak out positively of their experience with THC. Notables like Carl Sagan and Pierre Burton managed to keep their little secret from us, I believe they would have had some valuable insights to share . Imagine the howls that historians will have with our societies conundrum with the weed enigma. We will seem ridiculous that laws sanctioned all the really bad drugs like tobacco, alcohol, prescription pills and a harmless plant was demonized. I'd like to see a Mythbusters episode on the effects of tobacco vs weed on the lungs. That 3 to 1 ratio seems dubious. If fear of lung disease is your issue then quit whining and eat the stuff in a delicious brownie .</span></p><span data-dcnode-id="5224" instrument_node="">

</span><p data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">This documentary was mediocre at best. I am always up for hearing both sides of the argument; but I found this documentary to have a lot of information that has been left out. I did not like how she totally let's her inhibitions go; not with just weed but alcohol too. Also, I've never heard anything about how 1 joint = 3 cigarettes (sounds like B.S. considering everything tobacco contains compared to marijuana). Another thing that bothered me about the documentary is she never fully followed the directions of her experiments; such as her smoking a whole joint instead of taking 2 puffs and waiting 15 minutes, she never actually tried to put the table together, and she made really abrupt stops when she was driving on a closed course; most people who smoke would tell you all the things she was told to do are not impossible tasks when your stoned- they may be challenging but certainly not as much of a challenge as she made it out to be. A really good documentary on marijuana is The Union: the business behind getting high- there is a huge amount of information. </span></p><span data-dcnode-id="5107" instrument_node="">

</span><p data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">weed is s*** in my opinion... i'm neither for nor against it now but i smoked it from the age of about 14 or 15 and i'm only 22, off it maybe 6 months and couldn't be happier i don't need or, even want it anymore... and before you say anything i don't drink either through personal choice, but thats the real dangerous one when any idiot can have it, even though 95% of people can go out and enjoy a few or a good few drinks, 5% can't handle s*** and f*** the place up every weekend. i would think it would make more sense to legalize grass and have drink illegal but i wouldn't want that and its never gonna happen so i don't waste my breath just seems like the logical choice of the two options if you had to ban one, and i'm Irish saying that. still cant get over how much money and time i wasted with weed, it was great for the first few years then it starts to become a chore and really unsociable, and the paranoia and all that other B S it was causing while i was high... but everyone's different some people can smoke for 50 years and enjoy every minute of it, so basically its personal choice at the end of the day.. its a part of society so its not going anywhere so make your own choices, don't be one of those people who take their whole opinions from documentaries, especially with titles as moronic as this one.Its definitely not a gateway drug in my opinion compared to booze And all these ridiculous numbers people throw up are just plain ignorant aswell. Skunk and other potent strains is known to cause psychosis and in some people other underlying mental illness's which could lead to suicide, not to mention the weed that is grown with harmful pesticides and not harvested, cured and prepared properly... the stuff that is sprayed with fiberglass and sandblasted to weigh it down by irresponsible growers can cause serious damage to the human body, or even the crime side of it with shootings and killings, so i don't believe there''s been no deaths form weed in the strict sense of the term but it is by far the least lethal by a time line standard.you get 60 to 80 years on this planet, if your lucky. if you want to have a joint go ahead. if you want to have a million joints, knock yourself out... just use your brain, and know the pros and cons and do what makes you happy. but i'v already spent enough of my time, wasting it with quarters and oz's and now i'm happy.</span></p><span data-dcnode-id="5026" instrument_node="">

</span><p data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">Wow... I thought this "documentary" was bias and full of ignorance. I smoked weed for about 15 years at least 6-12 joints a day until one day I woke up and decided to quit, I also enjoy my occasional drink and if i had to pick between one of those I'd pick booze. Don't get me wrong Cannabis is MUCH MUCH safer and If someone that hasn't tried either or asked for my opinion I'd recommend pot, but hey to each his own. It just makes me sad that stuff like this is out there simply because it misinforms people who are trying to find out about pot and its effects. I HATE that people blame pot as a gateway drug! It's NOT the pot that make you try other drugs It's the people you surround yourself with! I speak from experience luckily for me I also had good friends that steered me away from the "hard drugs"... So basically my point is don't judge something because of what the media or hearsay tells you (Do you know what the tobacco companies used to say about smoking).. Research get your facts straight then make up your mind. Oh And don't think that 100% Right As we all know technology changes and in time we'll find out the truth..... TILL THEN ENJOY YOUR SMOKE/DRINK OR WHATEVER IT IS YOU DO HUST DONT JUDGE OTHERS FOR CHOOSING THEIR PATH IN LIFE AS LONG AS THEY AREN'T HURTING YOU OR OTHERS LIVE AND LET LIVE... THANKS</span></p><span data-dcnode-id="4302" instrument_node="">

</span><p data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">Yeah 11 is way too young to start - kids should wait till voting age before they consider it, as getting stuck into it younger, may, as you say, stunt you in certain ways. I actually read a recent study somewhere suggesting this, that you should wait till you're 18.</span></p><span data-dcnode-id="3743" instrument_node="">
</span><p data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">But there is no such thing as weed that is too strong - it's total BS. All it means is that you should use less of it. And if you're smoking it (as opposed to vaporizing or cooking it) it also means you're sucking less toxic smoke c#$% into your lungs. And yeah maybe you could encourage your son to use a vaporizer if he must use weed - at least it'll spare his lungs.</span></p><span data-dcnode-id="3740" instrument_node="">
</span><p data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">But there are such things as different strains, which have different ratios of the various cannabinoids (THC, CBD etc), which yield their own particular highs. Maybe you'd prefer more of a sativa strain to the indica varieties which are so popular these days.</span></p><span data-dcnode-id="3737" instrument_node="">

</span><p data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">i feel like she was unbios while doing this documentary. i think she was openminded, especialy while doing her first smoke well above the shop owners recomendation. I feel like usualy these documentaries are eather for or against weed so this was a breath of freash air for me. i smoke weed everyday and have descovered its realy actualy different to everyone. She may get lazy but wen i smoke i feel like jogging or working out...especialy working out because every set is like a fresh start aposed to being sober and dealing with the repetativeness...I feel like weed has made me a better person aswell and closer to god</span></p><span data-dcnode-id="3698" instrument_node="">

</span><p data-dcnode-id="3648"><span data-dcnode-id="3661" instrument_node="">Lee</span><br data-dcnode-id="3660"><span data-dcnode-id="3659" instrument_node="">
You make some good points there.</span><br data-dcnode-id="3658"><span data-dcnode-id="3657" instrument_node="">
I started smoking aged 11 and now, aged 45 I really wished I hadnt. My son is 13 and has just told me he's started and the idea of him messing with his brain is horrible to me.</span><br data-dcnode-id="3656"><span data-dcnode-id="3655" instrument_node="">
I feel like my emotional development and capacity to learn were stunted when I started.</span><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">
On top of that I've always felt addicted since I started smoking heavily around ages 21. I live in a place at the moment where it's really hard to find anything to smoke. Partly that's a blessing to me because I go a bit looney tunes if I smoke 24/7. I can physically go without but the other side is me thinking about where and how to score 24/7 and has been for weeks.</span><br data-dcnode-id="3652"><span data-dcnode-id="3651" instrument_node="">
When i do manage to score I smoke and then wonder why I have because I dont really know which way is up anymore. Weed these days is way too strong and is definitely dangerous to drive on to operate machinery. J-rock mentioned driving really slow on weed. That was actually one of my very first experiences with skunk. Just couldnt understand how to drive.</span><br data-dcnode-id="3650"><span data-dcnode-id="3649" instrument_node="">

</span><p data-dcnode-id="3396"><span data-dcnode-id="3401" instrument_node="">Where I live(in Canada), it is not a huge criminal offence to smoke weed. Mainly what cops do if they catch you smoking weed,they will take it away. If you have more than a certain amount on you, then they can say that you are selling it.</span><br data-dcnode-id="3400"><span data-dcnode-id="3399" instrument_node="">

I don't think our government would try to make us addicted to it, as "k" said they would, but we could be living in different countries so I don't know about that. Sure the government might tax it, and price it higher, but I personally would feel safer buying from a coffee shop, like in Amsterdam, than some kid on the street.</span></p><span data-dcnode-id="3395" instrument_node="">
</span><p data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">P.S. I went through the whole of my last high school years smoking weed, and only after a while, could I do normal things with out bursting into giggles.</span></p><span data-dcnode-id="3392" instrument_node="">

</span><p data-dcnode-id="3266"><span data-dcnode-id="3275" instrument_node="">nick</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">
You're living in fantasy land if you're trying to convince people that smoking dope makes you energetic and concentrate better.</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">
It's true that some types of grass give you a short lived energetic buzz and also true that you can get really into a project, at least for a while.</span><br data-dcnode-id="3270"><span data-dcnode-id="3269" instrument_node="">
But don't fool yourself. I am a long term smoker and I either suffer now or have suffered from every adverse effect that's related to smoking. If you carry on, your brain will become slower and you will eventually start buying lesser quality products because you just want to get high.</span><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">
Smoking's great, don't get me wrong but after 32 years of smoking, these days I feel like a junkie, when I score, when I smoke and when I'm coming down. I get incredibly stressed out if I can't score, I often get aggressive when I'm high, I'm forgetful, I drive dangerously, I find it impossible to study or to take in any information apart from watching movies or something. I still enjoy it but I often wish I could stop for good. My brain feels fried to be honest.</span></p><span data-dcnode-id="3265" instrument_node="">
</span><p data-dcnode-id="3261"><span data-dcnode-id="3264" instrument_node="">As a responsible adult with a lot of long term adult pot head friends, I can tell you with 100% certainty that smoking lots of dope has plenty of drawbacks in life.</span><br data-dcnode-id="3263"><span data-dcnode-id="3262" instrument_node="">
So, please continue to enjoy it but don't try to convince the rest of the world that it's all good.</span></p><span data-dcnode-id="3260" instrument_node="">

</span><p data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">A whole lot of propaganda!. First I cannot find any studies linking smoking pot to holes in lung or any kind of lung damage at all. All I can find is a independent Harvard study saying that marijuana inhibits lung tumors. Also he says that lungs can't repair themselves. Also BS! Anyone that has ever put a hole in their lung with a broken rib can tell you that it heals. The Physicians that where paid off in this documentarys should be triped and thrown head first down a flight off stairs. I smoke weed my wife smokes cigs. I train in Muay Thai and can run a few miles. My wife can run around the block and then pukes. If marijuana effects the the lungs in negative way. Then way do so many professonal atheletes smoke week. Allen Iverson, Mike Phelps, Ricky Williams just to name a few.</span></p><span data-dcnode-id="2856" instrument_node="">

</span><p data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">YOU CAN'T BLAME THE DRUG FOR THE USERS ACTIONS!!!!</span></p><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2813" instrument_node="">I believe that addiction is all in the mind. If you don't have self control then you allow yourself to become addicted. Sure, there are chemical additives put in certain drugs to make the body become dependent on that substance, but marijuana is not like that.</span><br data-dcnode-id="2812"><span data-dcnode-id="2811" instrument_node="">
I have been smoking weed for about 4 years now. I know that I'm not addicted. I do smoke nearly everyday, but not all day, everyday. Most of the time it's after I get off from work or before I go to bed. It relaxes me to help me sleep. But when I do smoke I do not allow it to effect me in a negative way. I can still function as I would if I were sober. It just takes that edge off of things.</span><br data-dcnode-id="2810"><span data-dcnode-id="2809" instrument_node="">
There are days where I do not feel like smoking at all. </span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Every drug, including prescription drugs and alcohol, has different effects on people. It just depends on the individuals mind set and surroundings. </span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2803" instrument_node="">I do agree with you that you do not know what has been added to the marijuana, but its not likely that you're going to get a hold of any that is laced. First, If you're buying, you shouldn't be dealing with anyone sketchy. Real pot heads wouldn't try to harm other pot heads,(we stick together)lol. And second, if anyone did have drugs like, pcp or coke, they def wouldn't waste it by lacing weed they are selling to someone else.</span><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">
Now, you may never know what was used to grow the marijuana, but the most harmful thing I can imagine would be Miracle Grow or Round Up. But, if you eat non-organic vegetables from the supermarket you are more than likely getting a higher dosage from those than you are smoking a joint here or there.</span></p><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2798" instrument_node="">Marijuana induced Schizophrenia?  I can't and won't believe that is an illness. Schizophrenia is a word that describes what "society" thinks is an illness.</span><br data-dcnode-id="2797"><span data-dcnode-id="2796" instrument_node="">
Schizophrenia: characterized by abnormalities in the perception or expression of reality.</span><br data-dcnode-id="2795"><span data-dcnode-id="2794" instrument_node="">
IN RESPONSE TO THAT, what do you think makes us all individuals? its our perception of reality! we all have different experiences in life, and how we perceive those experiences make us who we are. So who can say what makes a person normal. WHAT'S NORMAL? it's all about the "rules made by society"......</span></p><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">and that gets me to my next point </span></p><span data-dcnode-id="2789" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">@LOIS JANKE</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-dcnode-id="2782"><span data-dcnode-id="2785" instrument_node="">"PEOPLE ARE MISSING THE BEST OF LIFE"</span><br data-dcnode-id="2784"><span data-dcnode-id="2783" instrument_node="">
In your eyes the "best of life" is what you think would be best for your life. I'm a completely different individual than you because we have had different experiences in our lives. So my point is, "people" should not be categorized as a whole, everyone is an individual.</span></p><span data-dcnode-id="2781" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2780" instrument_node="">"I HAVE NO IDEA WHAT IS SO TERRIBLE ABOUT THIS LIFE THAT ONE HAS TO GO THROUGH IT ANOTHER STATE OF MIND…"</span><br data-dcnode-id="2779"><span data-dcnode-id="2778" instrument_node="">
well until you have the experience of an acid/lsd or mushroom trip you will continue to have no idea...</span><br data-dcnode-id="2777"><span data-dcnode-id="2776" instrument_node="">
I wouldn't say that this life is terrible. But, when you have a hallucinogenic trip it wakes your mind up, or "makes you think" as society would put it. And to society "thinking" is bad. Because when you "think" or become more aware of the real things that should matter in life (or what I like to call "loosing the ego"), that goes against society's set of rules for being "normal". </span></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2770"><span data-dcnode-id="2773" instrument_node="">THERE IS NO SUCH THING AS WEIRD, CRAZY, PSYCHO, NORMAL,ETC.</span><br data-dcnode-id="2772"><span data-dcnode-id="2771" instrument_node="">
WE ARE ALL DIFFERENT INDIVIDUALS, LIVING INDIVIDUAL LIVES, WITH DIFFERENT PURPOSES AND ENCOUNTERING DIFFERENT EXPERIENCES. </span></p><span data-dcnode-id="2769" instrument_node="">
</span><p data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">~Peace</span></p><span data-dcnode-id="2766" instrument_node="">

</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">^When you speak of danger, I think you're trying to say that danger comes from a misunderstanding (or complete lack of understanding) about the substance in question, the way in which it should be taken, as well as the purpose it is taken for. IF that is your statement, allow me to disagree and point out another side:</span></p><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Someone, like say a doctor, on the other hand, who knows the dangers, understands the substance, knows how and why it should be taken, etc. can still develop a dependancy issue. Medical personel have access to morphine and other highly-addictive pain-killers. The fact that a percentage of these people get addicted to these substances show that the real danger is inside of people and you can't legislate morality. This is why cannabis should be legal, regulated, and taxed. People are going to do what they want and right now a lot of people want to have access to cannabis. So America needs to stop spending money trying to enforce prohibition and instead needs to make some money off it. ...Like big pharma would let them anyway... but, we will see.</span></p><span data-dcnode-id="2550" instrument_node="">

</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">haha firstly, this "documentary" is based on no actual evidence. i find it funny how ignorant people are about cannabis in all respects; effects, history, culture, etc. there is huge amount of information if you search for it...for example, every strain gives a totally different effect on the body and mind, some plants (more medically designed strains) can have next to no effect on the mind or body other than simply pain relief.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">secondly, i like the concept that they have in Spain. they prefer you to grow it yourself and smoke it out of public view. this reduces the dangers of buying unknown products, reduces dealers and is virtually unknown that someone is a smoker.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">i have lived in Spain for a few years and found it fantastic. never had any trouble with police or anybody and friends were happy because we new exactly what we were smoking and could control the effects (as well as save money) from home. weed should be a personal choice, as for the cultural, social, physical effects...weeds better than alcohol and doesn't lead to stronger drugs.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1787" instrument_node="">it is the social surroundings that create the problems. Basically, i believe people should be able to choose if they smoke or not but whats important is that your smoking doesnt effect others.</span><br data-dcnode-id="1786"><span data-dcnode-id="1785" instrument_node="">
anyways, smoke up and enjoy</span></p><span data-dcnode-id="1783" instrument_node="">

</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">This was absolutely awesome. People ought not be so passive in the way they consume information. There were so many interesting points available to witness here, albeit unintended by the broadcaster's and presenter; on an social and anthropological level. This is a fascinating insight for instance into what the BBC feels they can get away with broadcasting, and also how a naive middle aged woman responds to the various situations she was in. If your expecting absolute truth or unbiased revelation then I'd recommend watching and reading from a more refined and less restrained media source than BBC3. If you can liberate your mind from a drone-like subjective method of consumption and think about this whole show; from idea-pitch to final edit, then its a brilliant reference to common consensus. AHHH I DON'T AGREE WITH SOMETHING I HEARD NOW I'M MAD, grow up. Today was wake 'n' bake, and what of it?</span></p><span data-dcnode-id="1627" instrument_node="">

</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">@ k, one may grow their own tobacco if they wish or brew their own beer....</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">If it is legalized, taxed, regulated, and controlled then yes there would be manufacturers who would make products similar to cigarettes which contain flavoring, additives, etc that I certainly wouldn't trust either (I think everyone would agree on that). However, since growing smokeable cannabis is as simple as keeping only female plants until they bloom, cutting the blooms, and letting them dry out... who wouldn't do this at home? Sure you can make the process as complicated as you want, but for the average person, why can't they simply have one or two "house plants" that they water every now and then and keep by the window?</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">With legalization comes the freedom to grow it yourself! Let the government and the tobacco companies make all the money they want off of taxed and regulated "commercial" cannabis. More power to them and it might even help stabilize our economy! </span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">As for myself, I'd be happy to keep a couple different strains as house plants and occasionally buy a pack of Camel Cannabis light menthols (coming to a gas station near you) :)</span></p><span data-dcnode-id="981" instrument_node="">
</span></div><span data-dcnode-id="979" instrument_node="">

</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Right at the beginning she states that she smoked cannabis in college. She then carries on with her experiment and behaves as if it is a brand new thing to her - which I suspect it was. Obviously we expect journalists to lie to better promote their own agenda and this was the feel I got from that point on.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">It's all about money and government control. Alcohol causes massive problems; not just health wise but anti social and violent behaviour. Cannabis has been found to have beneficial effects and I`ve yet to meet a stoner that goes running round in public smashing shop windows, getting into fights etc.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">It should be legalised and whilst I mainly agree with "K" I disagree on the whole "Government would put additives into it" argument. If they wanted they could do that to any of the dozens of common daily used consumables. It would be even easier to dose the water supply and if we consider the fluoride additive then they already do. As it stands some really dodgy characters are involved in it's production and the solid form (hash) has been found to contain all sorts of cr^p to bump up the weight. She mentions in the doc that some skunk has been found to be dusted with powdered glass....</span></p><span data-dcnode-id="894" instrument_node="">

</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">My gripe is simple. Why do the brodcast companies insist on finding sweet and good-natured people, who just happen to be naive and uninformed to host these shows about legal issues and scientific experiments? It's like taking a random person off the street and asking them to lead an expedition through Africa. </span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Any "evidence" or "insight" that comes about by programs like these should be completely thrown out. Good or bad.</span></p><span data-dcnode-id="852" instrument_node="">

</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">I'm still waiting for the documentary that gives answers rather than stirring up hype and introducing more questions... I guess the later just makes for better television.</span></p><span data-dcnode-id="846" instrument_node="">

</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">I think both of you took this doc the wrong way. I thought it was actually really well done, fair and it gave you the good and the bad of weed culture. Didn't you hear what the guy at the end was saying about the extremes in how people think about cannabis? I smoke a lot of weed and I can obviously tell you that I haven't gone psychotic but I can also say that it hasn't increased my intelligence or made me any better. It's just a drug that's fun, not harsh, no hangover but at the same time if you smoke it constantly it really does make you dumb. The public just has to hear both sides of the story because all I ever hear is people praising it and pulling out all the facts about how it has no terrible side effects blah blah or people talking about how it's a gateway drug and anyone who smokes it instantly gets lung cancer. I think if people really want to understand they should just experience it themselves because that's really the only way to judge the drug and the culture.</span></p><span data-dcnode-id="472" instrument_node="">

</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Thx for posting Vlatko, we need to see what these douchebags bring to the table.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">As far as the argumentation in this video, it's of poor quality to say the least, factually AND ethically wrong on MANY issues. (EX&gt;: cannabis does NOT lower blood sugar, this evidence has LONG been refuted, on multiple occasions by research at a renowned Israeli Medical University.)</span></p><span data-dcnode-id="427" instrument_node="">

</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">We are dealing, first of all, with a women that is JUST STARTING TO SMOKE, people who start out NEVER smoke weed on a daily basis, NEVER. </span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Secondly, I saw a big bottle of gin on the table of her apartment, yeah, HELLO, BIG RED LIGHT PEOPLE!! WTF Is that? She shouldn't be drinking during this pseudo-scientific adventure of Scientology-like proportion!</span></p><span data-dcnode-id="418" instrument_node="">
