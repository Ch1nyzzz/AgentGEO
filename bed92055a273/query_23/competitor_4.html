</span><p data-dcnode-id="5824"><img alt="After Democracy" class="alignleft" data-dcnode-id="5826" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//topdocumentaryfilms.com/wp-content/uploads/2011/07/after-democracy.jpg&amp;raw" width="95"><span data-dcnode-id="5825" instrument_node="">Can democracy still be saved? Can we address the shortcomings of representative democracy - failing political parties, increasing distrust of government - within the current system or are we set to embark on a journey across a border where nobody ever dared to go?</span></p><span data-dcnode-id="5823" instrument_node="">
</span><p data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">Should we explore a new political model in order to overcome the current multicrises?</span></p><span data-dcnode-id="5820" instrument_node="">
</span><p data-dcnode-id="5815"><span data-dcnode-id="5819" instrument_node="">In </span><em data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">After Democracy</span></em><span data-dcnode-id="5816" instrument_node=""> this urgent question is addressed by Fareed Zakaria, John Keane, Hilary Wainwright, William Dobson and Cheng Li.</span></p><span data-dcnode-id="5814" instrument_node="">
</span><p data-dcnode-id="5812"><span data-dcnode-id="5813" instrument_node="">Many forms of Government have been tried, and will be tried in this world of sin and woe. No one pretends that democracy is perfect or all-wise. Indeed, it has been said that democracy is the worst form of government except all those other forms that have been tried from time to time - Sir Winston Churchill.</span></p><span data-dcnode-id="5811" instrument_node="">

</span><div class="comment-content" data-dcnode-id="5539" itemprop="text"><span data-dcnode-id="5573" instrument_node="">
</span><p data-dcnode-id="5541"><span data-dcnode-id="5572" instrument_node="">We were brought up to believe the United States was a “Democracy.” That we were supposedly a “pluralistic society” or (a belief in power). We were taught the “working class” had a say-so in elections and that power was widely distributed. This, however, is a myth. The fact is, power is held by only a few (an oligarchy). The elites in this oligarchy hold the power in big business and government offices and are not for the interest of the common people or “working class” whether it be health care, a good education, enough to eat, affordable housing etc…these elites or “owning class” are out for profit and will use the “working class” by paying low wages, outsourcing, cutting benefits, anything to make profits soar.</span><br data-dcnode-id="5571"><span data-dcnode-id="5570" instrument_node="">
These elites are not necessarily the rich alone. It is made up of what C.W. Mills coined the “Military-Industrial Complex” where there are three different groups of cooperating elites:</span><br data-dcnode-id="5569"><span data-dcnode-id="5568" instrument_node="">
The Corporate or Business Elites – Which comprise of rich people with connections to corporations, CEOs, stockholders, people with big salaries. People like Microsoft founder Bill Gates and Nike founder Phil Knight.</span><br data-dcnode-id="5567"><span data-dcnode-id="5566" instrument_node="">
Next are the Political Elites – President, Congress, Senators, Speaker of the House and Governors (who decide what government does on a more local basis).</span><br data-dcnode-id="5565"><span data-dcnode-id="5564" instrument_node="">
Then there are the Military Elites – Joint Chiefs of Staff, Generals, and Heads of Services, basically, the “Brass of the Military”.</span><br data-dcnode-id="5563"><span data-dcnode-id="5562" instrument_node="">
All of these elites are connected to one another. The corporate elites lobby for the political elites to gain clout, change or make forced government decisions through lobbying and giving large amounts of money to political parties. And the military elites cooperate with corporate and political elites to gain prestige and hopefully be gainfully employed or somehow very well compensated once their term in the military is up. They sometimes act as spokesmen for corporate elites and/or gain seats in government administrations.</span><br data-dcnode-id="5561"><span data-dcnode-id="5560" instrument_node="">
These elites have control over the “working class”. The government can make the decisions that effect the working class’ lives and corporations can make the calls that effect the lives of the working class such as set wages, outsource, pink slips etc…And the common person which is what I will refer to as the “working class” from here on, are in no position to take on these corporate capitalists. Sure, in a pluralistic society it is possible to start an organization, but the common person doesn’t have the means to start these organizations (the money or the time) and most of them are kept so uninformed throughout their lives, they wouldn’t believe the truth about our politico-economic system if you told them.</span><br data-dcnode-id="5559"><span data-dcnode-id="5558" instrument_node="">
Corporations on the other hand, are able to take and keep control of the common person because they have the means of doing so. They have the money and control over the common persons’ lives. If threatened they can fire or outsource and if they want big changes in tax breaks etc…they can always lobby and threaten the government with outsourcing or whatever it takes to get the changes they want.</span><br data-dcnode-id="5557"><span data-dcnode-id="5556" instrument_node="">
Individuals don’t count for much in the political sense and don’t try to organize interest groups to defeat the elites or are just to naïve to the fact that our government is basically an oligarchy on the side of big business. Thus, most of the common people cannot distinguish between those who own the wealth and those who must work for a living. As long as they get their three meals a day, a roof over their heads and a six-pack to drink while watching the corporate evening news, they don’t realize they’re being kept ignorant of what’s really going on in the world.</span><br data-dcnode-id="5555"><span data-dcnode-id="5554" instrument_node="">
In the meantime, these corporate capitalist elites say they are “putting their money to work” when in all reality, they are pushing more production out of these uninformed couch potatoes and paying less wages while they kick back and watch their profits soar.</span><br data-dcnode-id="5553"><span data-dcnode-id="5552" instrument_node="">
At the same time, between housing costs, medical costs, the cost of food and less wages, the common person is almost worse off than they had been since the great depression.</span><br data-dcnode-id="5551"><span data-dcnode-id="5550" instrument_node="">
In the Communist-Manifesto, Karl Marx says that the state appears to be nothing but an “executive committee (excomm) of the bourgeoisie.” The government is nothing but an executive committee; it may look like a government but it’s just a committee that manages the country for the bourgeoisie (the middle class, a social group opposed to the proletariat in the class struggle; the capitalist class). The capitalists are elites or they work for them. In 19th &amp; 20th century, Western Europe’s working conditions were horrible. In the Sadler reports on working conditions, ‘they must form unions, strike and/or use violence if they had to in order to keep conditions tolerable’. But the government tried to crush these unions. The government was their enemy. In every case, the enemy of the worker was the government. The state creates an “appearance” that makes it seem to be open and democratic, but in “essence”, the state is class dominated by the elites. There is a definite contradiction between “appearance” and “essence”.</span><br data-dcnode-id="5549"><span data-dcnode-id="5548" instrument_node="">
What do you do about it? Under excomm, or Classical Marxism, the executive committee leads to smash state, which leads to bureaucracy; which leads to hierarchy; which leads to oligarchy, which ultimately makes up fascism. Under excomm, the only way to do away with the power elites was through a bloody revolution to overthrow the government. Classical Marxists believe the state is a tool of class under which the capitalists use to control the people.</span><br data-dcnode-id="5547"><span data-dcnode-id="5546" instrument_node="">
Neo-Marxists, however, found the excomm concept flawed. They found that the capitalist class is not inevitable. They believe in a revolution through the ballot box. That you can organize and have working class parties: pass laws and policies to change society towards socialism. The Neo-Marxists believe the state isn’t capitalist, but is dominated by the capitalist class because they have the money and resources to do so. They believe the capitalists win because they are more organized and have more money to spend than the working class. They believe the state is not the executive committee, that it isn’t necessarily a tool of class. They also believe that not everything people do in society is determined by the economy. An example would be the rich as well as the poor can listen to and enjoy opera and classical music. Therefore, they believe there is “Relative Autonomy” of class and culture. That there are correlations between class positions but not necessarily determinations.</span><br data-dcnode-id="5545"><span data-dcnode-id="5544" instrument_node="">
Neo-Marxists believe in “False Consciousness”, to be aware of one’s self, and in order to get there, a person must not let the capitalists control the way we see the world.</span><br data-dcnode-id="5543"><span data-dcnode-id="5542" instrument_node="">
We cannot allow the ruling class to manipulate the way we see the world. Now, through control with consent, the elites can control you through education, the media etc…without our even knowing it. They purposely keep specific information about the government and history out of our lives just so they can control us…that the barrier to class is lack of consciousness. Which, in today’s day and age, is very true. But this can be changed by the working class by being more aware of what’s going on in the world, and not through news outlets like FOX News….total deception. Do the homework involved; read many different sources, preferably outside the United States or if you must, at least get your news from public radio…self supported and not corporately owned and operated. It’s a good start.</span></p><span data-dcnode-id="5540" instrument_node="">

</span><p data-dcnode-id="5418"><span data-dcnode-id="5425" instrument_node="">Democracy, like many other person-based forms of government, works well for small temporary groups of people striving for a singe short term goal. Anything more than that and human diversity takes over to create the hanvs and have nots.</span><br data-dcnode-id="5424"><span data-dcnode-id="5423" instrument_node="">
A representative republic is a better for larger more long-term groups. Still, even that system can get bogged down by a flood of representative groups.</span><br data-dcnode-id="5422"><span data-dcnode-id="5421" instrument_node="">
I believe the next form of governance is something like a Representative Federation. A republic of republics. Such a system attempts to cut down the number or represented groups in a republic to a more managable size.</span><br data-dcnode-id="5420"><span data-dcnode-id="5419" instrument_node="">
This would work as a world government but unfortunatly, we are not on that path. Creeping Corporatocracy seems to have taken a lead role.</span></p><span data-dcnode-id="5417" instrument_node="">

</span><p data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">The critical flaw of democracy can easily be observed in what is currently happening in the U.S: Basically, an ideal democratic system is one where the candidates running for position:</span></p><span data-dcnode-id="5378" instrument_node="">
</span><p data-dcnode-id="5376"><span data-dcnode-id="5377" instrument_node="">1) State their objectives clearly and HONESTLY.</span></p><span data-dcnode-id="5375" instrument_node="">
</span><p data-dcnode-id="5373"><span data-dcnode-id="5374" instrument_node="">2) State their objectives to all those who are going to vote.</span></p><span data-dcnode-id="5372" instrument_node="">
</span><p data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">3)Then the electorate chooses the right candidate as easily as shooting a sitting duck. That simple.</span></p><span data-dcnode-id="5369" instrument_node="">
</span><p data-dcnode-id="5367"><span data-dcnode-id="5368" instrument_node="">However, the flaws are equally simple:</span></p><span data-dcnode-id="5366" instrument_node="">
</span><p data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">1) Politicians study the electorate distribution and stitch their positions on key issues so they can get the job, it is not about principles rather they do/say anything to get into the office.</span></p><span data-dcnode-id="5363" instrument_node="">
</span><p data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">2) The use of the first amendment "freedom of speech" to deceive/lie/twist facts in a tribal side taking as seen very clearly in media outlets like Fox News. So a significant fraction of the population are openly deceived.</span></p><span data-dcnode-id="5360" instrument_node="">
</span><p data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">3) Money determines how many voters are going to hear your message regardless of its truthfulness.</span></p><span data-dcnode-id="5357" instrument_node="">
</span><p data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">4) Might I add -- With points 1 to 3 above, the population itself is not of equal intelligence/education...so Joe might have an expert to do his heart surgery ..or fly in a plane flown by expert pilot.......but beer drinking "Joe Six Pack" as Palin put it, has an equal vote as an economic professor as to which candidate has the best economic policy.</span></p><span data-dcnode-id="5354" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">Democracy looks good on paper just like communism, but democracy is really NOT what is taking place in U.S politics ....and the west did not win the cold war because of democratic values ...but rather what even China adopted out of pragmatic/non-dogmatic approach: CAPITALISM ...it is palatable to human behavior. I believe China now has the most efficient political body and the reason why NO DOUBT it will overtake the U.S style of politics. </span></p><span data-dcnode-id="5351" instrument_node="">
</span><p data-dcnode-id="5347"><span data-dcnode-id="5350" instrument_node="">Abdul</span><br data-dcnode-id="5349"><span data-dcnode-id="5348" instrument_node="">
Somalia </span></p><span data-dcnode-id="5346" instrument_node="">

</span><p data-dcnode-id="5038"><span data-dcnode-id="5043" instrument_node="">These analysts keep talking about democracy (one guy talks about whether we should have 'more' or 'less' democracy!), but humanity has never seen the sun shine on democracy. The closest we have ever come, which is to say nowhere near, is the republic. That's what we have now, kind of, and don't be fooled by the term democracy. Democracy is literally a kingdom of the people, direct rule by the people, a society in which every human being is a leader. It does not allow for any despotism, aristocracy, or representation whatsoever.</span><br data-dcnode-id="5042"><span data-dcnode-id="5041" instrument_node="">
Hey, don't hang the messenger- I'm just saying that this doc has it's terms all screwed up, I'm not advocating a solution, just asking for straight turkey. The term 'representational democracy' does not mean democracy at all. It means 'republic.'</span><br data-dcnode-id="5040"><span data-dcnode-id="5039" instrument_node="">
I think it was Monroe that said, "A republic my dear, if it lasts."</span></p><span data-dcnode-id="5037" instrument_node="">

</span><p data-dcnode-id="4846"><span data-dcnode-id="4851" instrument_node="">You take the side of caution I think. Freedom is intrinsically noble; every human heart thirsts for it. "Give me liberty or give me death" may be just attributed to Patrick Henry, but it's a truism. Because when you lack liberty you lack life- you are the walking dead. If we were truly free we would not have any government at all.</span><br data-dcnode-id="4850"><span data-dcnode-id="4849" instrument_node="">
The Dark Ages weren't really all that dark: it's just as likely you could have been a low caste slave in Rome or a despot in Syria would have had your family murdered while you were tending your sheep. What's wonderful about America for example? Cars? Walmart? Lawn mowers? Blithely watching as civilization declines? Is anyone happy? Does anyone live out one full day of happiness, ever?</span><br data-dcnode-id="4848"><span data-dcnode-id="4847" instrument_node="">
I believe in freedom. I do my best to breathe it in every day. I'm not always happy but I always have faith in people. We can do much better.</span></p><span data-dcnode-id="4845" instrument_node="">

</span><p data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">I like what Fareed Zakaria said around the 15 minute mark about special interests: </span></p><span data-dcnode-id="4766" instrument_node="">
</span><p data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">"They care much more about this issue than society at large so they will hammer the system....the system overweighs the negative efforts of these special interests and underweighs the importance of society in general." </span></p><span data-dcnode-id="4763" instrument_node="">
</span><p data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node="">This comment highlights what I believe is the most critical problem we are experiencing in our democratic society, that being apathy. Our democratically elected governments wouldn't always give the interests of say, big business, priority over the interests of society at large if society at large weren't so apathetic. After all politicians, probably even more than the rest of us, are driven by self-interest. Their popularity will suffer far more by wronging a special interest group than if they wrong the disinterested public at large. </span></p><span data-dcnode-id="4760" instrument_node="">
</span><p data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">Our democracy could achieve so much good if we had an engaged, informed, citizenry who would defend it's own interests. Which begs the question, is such a thing even possible? </span></p><span data-dcnode-id="4757" instrument_node="">

</span><p data-dcnode-id="4714"><span data-dcnode-id="4721" instrument_node="">I think as long as people have to "work themselves free", they won't like being confronted with that question.</span><br data-dcnode-id="4720"><span data-dcnode-id="4719" instrument_node="">
I mean the average person can't really complain now, can he?</span><br data-dcnode-id="4718"><span data-dcnode-id="4717" instrument_node="">
As long as he does what he is supposed to do, nodding the empty head, with no regard to morality or social value as he goes along, he gets rewarded for it, hence he becomes apathetic. Pavlov, you know?</span><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node="">
Dog, bell, drool, human, money, drool.</span></p><span data-dcnode-id="4713" instrument_node="">
</span><p data-dcnode-id="4709"><span data-dcnode-id="4712" instrument_node="">Despite of the economic recessions, we still live in a spoiled and decadent society, we have no time to care, we have to work and when we are done working, we want to party! Don't confuse us with questions like that.</span><br data-dcnode-id="4711"><span data-dcnode-id="4710" instrument_node="">
We live in a society where you have to pay to give. You get punished for being altruistic. Eventually everyone stops giving. Or wants at least something else in return. Oh my god, they killed Kenny!</span></p><span data-dcnode-id="4708" instrument_node="">
</span><p data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">We have to restructure education, economics and social stratification according to social values. Not the other way around. </span></p><span data-dcnode-id="4705" instrument_node="">
</span><p data-dcnode-id="4701"><span data-dcnode-id="4704" instrument_node="">Is it possible? Why not?</span><br data-dcnode-id="4703"><span data-dcnode-id="4702" instrument_node="">
I don't think we're going to live to see that day though.</span></p><span data-dcnode-id="4700" instrument_node="">

</span><div class="comment-content" data-dcnode-id="4107" itemprop="text"><span data-dcnode-id="4120" instrument_node="">
</span><p data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">you've picked up on what might be the greatest systemic weakness of democracy - its vulnerability to special interests. however, the problem is more serious, i think, than could be solved merely by more perfect behavior on the part of the masses.</span></p><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">the system really would need to be reformed to prevent special interests from distorting the larger interest. however, special interests have, from the beginning, seen to it that should reforms are impossible to make.</span></p><span data-dcnode-id="4114" instrument_node="">
</span><p data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">so - i'm pessimistic :). we have sham elections and an autocracy, china has no elections and an autocracy. its hard to say which is preferable, but the main influence of popular opinion currently seems to be mindless and deletorious of the common good, as people seem to be so easily manipulated towards the ends of the affluent.</span></p><span data-dcnode-id="4111" instrument_node="">
</span><p data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">mass communications has been a powerful corrupter of the common mind. that a tool of such great potential has been used, and so effectively, for such a low purpose should tell us something about ourselves, our society, from whence power flows, and what direction is impels us.</span></p><span data-dcnode-id="4108" instrument_node="">
</span></div><span data-dcnode-id="4106" instrument_node="">

</span><cite class="fn" data-dcnode-id="4085" itemprop="name"><span data-dcnode-id="4086" instrument_node="">WTC7</span></cite><span data-dcnode-id="4084" instrument_node=""> </span></span><span data-dcnode-id="4082" instrument_node="">

</span><div class="comment-content" data-dcnode-id="4052" itemprop="text"><span data-dcnode-id="4071" instrument_node="">
</span><p data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">It's a nice documentary, but I don't think it either asks or gives answers to, in my opinion, essential questions.</span></p><span data-dcnode-id="4068" instrument_node="">
</span><p data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">Why has democracy failed? Or has it failed? Democracy (or better, liberal democracy) as organizational principle of a society has not failed in its ideological or organizational aspect. What's wrong with people electing their representatives in state institutions periodically? Is there anything wrong in constitutional protection and guaranties of liberties and rights for all of us? Because that is what liberal democracy basically means.</span></p><span data-dcnode-id="4065" instrument_node="">
</span><p data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">But one should not mix democratic principles with economics of capitalism, especially free-market or corporate capitalism, where the big fish is allowed to devour the weak one. Darwinism in modern human environment at play. Equal opportunities? Does my little grocery shop have any chance against a big super-market chain? Ha! </span></p><span data-dcnode-id="4062" instrument_node="">
</span><p data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">But I am still entitled to vote! The democratic principle is not at fault, it's the Darwinian mentality we are made think we still have not overgrown and the economics at work force us to behave in such a manner. But we have overgrown it - the principle of democracy, respect for other human being we enshrine in our constitutions, proves we are beyond that kind of mentality. </span></p><span data-dcnode-id="4059" instrument_node="">
</span><p data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Unfortunately, democracy is being used by certain elites to further enrich (and empower) themselves by funding politicians, who later on, when elected, are obliged to respond in kind to their "benefactors" and think less of those who elected them. In such a way, the whole idea of democracy is being distorted and misused. Still, I maintain that the democratic principle in itself is the best we have, at the moment anyway. </span></p><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">Look at Norway. A poor country until they discovered oil in their seas. But then, they used it wisely. They reached a certain level of economic independency through oil revenues, and created a state where, indeed, taxes are high, industries/corporations are kept in check by the state, but their labour laws are primarily there to protect workers, and their social services are working as a Swiss watch. I am not claiming their economy is without problems, I am saying that there are ways for a state to fulfill its primary role - to provide security - economic as well as physical - to its citizens and still remain a democracy.</span></p><span data-dcnode-id="4053" instrument_node="">

</span><p data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">I'd like to suggest an answer to your question: Why has democracy failed?</span></p><span data-dcnode-id="4015" instrument_node="">
</span><p data-dcnode-id="4011"><span data-dcnode-id="4014" instrument_node="">First,</span><br data-dcnode-id="4013"><span data-dcnode-id="4012" instrument_node="">
You suggest that we SHOULD not mix democracy with capitalism-I agree, but the thing is, we have and our government has long partnered with capitalism for money connects most everything in modern society (especially politics). Corporations and wealthy individuals run the country. </span></p><span data-dcnode-id="4010" instrument_node="">
</span><p data-dcnode-id="3982"><span data-dcnode-id="4009" instrument_node="">Answer: Democracy Failed</span><br data-dcnode-id="4008"><span data-dcnode-id="4007" instrument_node="">
Why?</span><br data-dcnode-id="4006"><span data-dcnode-id="4005" instrument_node="">
1. Decisions are made based on money and not human health = immoral.</span><br data-dcnode-id="4004"><span data-dcnode-id="4003" instrument_node="">
2. Too much bureaucracy = inefficient.</span><br data-dcnode-id="4002"><span data-dcnode-id="4001" instrument_node="">
3. Democracy does not promote growth</span><br data-dcnode-id="4000"><span data-dcnode-id="3999" instrument_node="">
Example: those at the top want to remain at the top, so if oil makes them money, they don't care about saving the environment.</span><br data-dcnode-id="3998"><span data-dcnode-id="3997" instrument_node="">
4. We are deceived every day believing we have the right to vote, but only the right to vote on other individuals whose job is to:</span><br data-dcnode-id="3996"><span data-dcnode-id="3995" instrument_node="">
A. Appeal to the public</span><br data-dcnode-id="3994"><span data-dcnode-id="3993" instrument_node="">
B. Do anything to be elected</span><br data-dcnode-id="3992"><span data-dcnode-id="3991" instrument_node="">
C. Help those closest to them (friends and family)</span><br data-dcnode-id="3990"><span data-dcnode-id="3989" instrument_node="">
D. Not reconstruct the economy, infrastructure, political, education systems. (Haha, but true)</span><br data-dcnode-id="3988"><span data-dcnode-id="3987" instrument_node="">
WE have no real vote on anything: healthcare, education, science, NASA, military, political policies.</span><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">
This all serves as a basis for failure to me.</span><br data-dcnode-id="3984"><span data-dcnode-id="3983" instrument_node="">
5. Technology growth is already taking jobs from people meaning they cannot make money- which we need to succeed in this system. We cannot create jobs that don't need to be created.</span></p><span data-dcnode-id="3981" instrument_node="">
</span><p data-dcnode-id="3975"><span data-dcnode-id="3980" instrument_node="">Solution:</span><br data-dcnode-id="3979"><span data-dcnode-id="3978" instrument_node="">
EDUCATION, EDUCATION, EDUCATION!!</span><br data-dcnode-id="3977"><span data-dcnode-id="3976" instrument_node="">
IT is key for without it, people will remain in the dark. Provide a web of free information that is highly organized into categories to where YOU chose what you want to learn. Self interest is what drives learning in the first place. This web connects with all sorts of tool for you to use to learn such as a professional individuals on subjects who you can interact with; not just listen to lectures like teachers, the internet, scientific data/evidence/proof on all objects/medicine/food/etc. You have tons of option on this education program for it would include more subjects that what traditional school offers. Add things like philosophy, mechanic, carpentry, astro-physics, survival skills, etc. This web of information will get rid of advertisement and marketing who only wants your money and will provide you with the best knowledge about products. We share info and do not hoard it for financial gain so that we can work together to solve great problems. </span></p><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3970"><span data-dcnode-id="3973" instrument_node="">Lets use technology to help humans and lets use it to jump-start our economy. Lets trade resources instead of borrowing money.</span><br data-dcnode-id="3972"><span data-dcnode-id="3971" instrument_node="">
Ex. Have Sahara provide solar arrays to provide the world renewable energy. Trade that energy for water since they dont have much. WIN WIN situation.</span></p><span data-dcnode-id="3969" instrument_node="">

</span><p data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">@ whiplash,</span></p><span data-dcnode-id="3933" instrument_node="">
</span><p data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">I don't see much disagreement between us. Firstly, we agree that the world is run by wealthy individuals who own banks, corporations, media, etc., you name it. They, more often than not, also own the politicians we think we elect and it can be followed through history (especially the 19th and 20th centuries history) that most (geo-)political decisions were made to satisfy interests of these elites. A number of researchers have provided ample historical evidence that this was (and still is) the case. I am just now reading one of such books - A Century of War: Anglo-American Oil Politics and the NWO by F. William Engdahl.</span></p><span data-dcnode-id="3930" instrument_node="">
</span><p data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">I am well aware of the fact that what is presented to us as democracy today is in practice far away from people controlling the decision making. I understand, thus, why you bring the five points in your comment, and you are right about each of them.</span></p><span data-dcnode-id="3927" instrument_node="">
</span><p data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">Education is the key, and if you read some of my other posts on this thread you will see that I have clearly stated it myself. What we have currently, and what we had for centuries, is education oriented towards satisfying industrial and corporate needs in terms of labour. We are supposed to be sheep bread exclusively to carry out specific tasks, and that is exactly the type of education we are given. Made to care more about decadent lives of Hollywood stars than to understand what is going on around us. Because the manipulation would not work with well educated and people who are taught to think for themselves. </span></p><span data-dcnode-id="3924" instrument_node="">
</span><p data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">But let's be honest and say that we do not have a reasonable and viable alternative to democracy - or whatever we want to call the system we have today - to propose at this stage. Well, anyway, I don't have one and I have not read a single comment that suggests a solution, but I repeat - a viable, realistic solution. It is relatively easy for anyone with a fair level of intelligence or some knowledge of history or politics to point out to the wrongs of democracy as practiced because examples are abundant. What is lacking is - what would be the alternative?</span></p><span data-dcnode-id="3921" instrument_node="">
</span><p data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">This system is far from perfect but it still has a solid potential upon which to build a truly humane society, particularly given the absence of better solutions. The cancer that distort this potential is liberal capitalism with all it brings with it (voracious economy and financial system designed to enrich a few and impoverish the rest). </span></p><span data-dcnode-id="3918" instrument_node="">
</span><p data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">Liberal capitalism demands little or no involvement of the State in regulating the distribution of wealth. In current state of affairs, the State is still the only mechanism which can offer some protection to its citizens. That is one of the reasons why the sovereignty of State is under such intense attack nowadays because it is the only thing still standing (though on week legs) in the way of corporate interests on their march towards absolute control of the entire world. </span></p><span data-dcnode-id="3915" instrument_node="">
</span><p data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">This cancer is what needs to be removed from the democratic system or transformed in such a way that the system could heal. And we better do it while the State is still here, because once it's gone both the plaintiff and the judge will be one and the same - corporate interest.</span></p><span data-dcnode-id="3912" instrument_node="">

</span><p data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">"Xinhua reports that technology giant FoxConn, which manufactures products for Apple and other computer companies, is working to reduce labor costs by replacing a portion of their workforce with robots, with a goal of having one million robots in place in their factories within three years."</span></p><span data-dcnode-id="3830" instrument_node="">
</span><p data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">So without living labour to create suplus value and new value there will be nothing to exploit or appropriate those robots won't be buying ipods and consumer demand in the West HA! Our unemployment is more like 30% if you consider under employed and part-time who want full-time...what are we going to do fire up the ovens or share the wealth?</span></p><span data-dcnode-id="3827" instrument_node="">
</span><p data-dcnode-id="3823"><span data-dcnode-id="3826" instrument_node="">I think these guys have it backwards...we need to expand democracy and supercede capitalism not supercede democracy and allow capitalism to continue...of course being successful petty bourgeois totally wedded to and benefiting from capitalist social relations this seems beyond the pale for these folks to contemplate for some reason. We cannot go back to fuedalism which the entire West is trying to turn us into -serfs- while they seem to think they can keep the system going buying luxury goods for themselves. China's expansion and little experiment with economic free zones, I think they will be more like Norway for their people and are creating good win win relations in Africa they are doing a good job of it not like us-the US will probably go fascist start a war over mid east oil and end the world in a nuclear holocaust rather than share power with the people. I am sure this deficit ceiling baloney is making people realize that they have to organize and fight harder and neither party is on their side.</span><br data-dcnode-id="3825"><span data-dcnode-id="3824" instrument_node="">
RR</span></p><span data-dcnode-id="3822" instrument_node="">

</span><p data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">@ Rocky Racoon,</span></p><span data-dcnode-id="3784" instrument_node="">
</span><p data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">(This is a copy-paste of my comment from the bottom of this page, which you will probably not see unless I place it here, as it was one of your old posts and there was no direct reply option.)</span></p><span data-dcnode-id="3781" instrument_node="">
</span><p data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">I agree that the current social order has too many faults &amp; is in great need of restructuring. But I am afraid that overthrowing it (by which I assume you mean a (global?) revolution), would not solve any (well, not many anyway) of the problems societies are facing today. If you go back through revolutions throughout history, none of them lived to the big ideals &amp; promises of justice, equality, economic security, etc. for all (if there were such revolutions in history, I am certainly not aware of them &amp; would be glad to stand corrected). Even if some of the revolutionaries honestly believed in the proclaimed ideals, very soon they were marginalized, assassinated or kicked out of the game in one way or another &amp; the proclaimed ideals were distorted, in some cases (such as in Communism as we know it) brought to absolute absurdity. </span></p><span data-dcnode-id="3778" instrument_node="">
</span><p data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">I believe that the only way for societies to move on is through education. But not through the existing educational systems, which encourage parroting. A system in which independent and innovative thinking would be encouraged is what is needed. It would be much more difficult to manipulate such people.</span></p><span data-dcnode-id="3775" instrument_node="">
</span><p data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">Truly participatory democracy is very hard to achieve in societies which number millions of people. It was relatively easy in ancient Athens or in tribal societies. The limitations of modern democratic societies are widely discussed among the political theorists of the day but none has yet come to any feasible (in practical terms) solution as far as I know. Robert Dahl, one of the most respected political scientists on this topic, proposed the term "polyarchy" for what we have today, meaning that many have access to the decision-making process (through the so-called "interest groups") but not the majority. That basically translates into - the better organized (&amp; the richer) the interest group is, the more chances it has to influence political decisions. </span></p><span data-dcnode-id="3772" instrument_node="">
</span><p data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">"The workers of the world united" mantra is just a meaningless phrase the communist ideologues of the 20th century picked up from Marx as it sounded attractive for the oppressed. Look where believing those power-hungry thieves of (the basically ok) Marx' humane idea took those uneducated people.</span></p><span data-dcnode-id="3769" instrument_node="">
</span></div><span data-dcnode-id="3767" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3693" itemprop="text"><span data-dcnode-id="3697" instrument_node="">
</span><p data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Well you can't socialize want going from a largely agrarian peasant economy to a modern industrial economy was no easy feat. And no, workers of the world unite is not just some pithy slogan that Marx thought sounded nice-the supercession of class according to Marx will solve the historic riddle that has plagued mankind-in that it would replace the social relations of exploitation and war with those of peace and prosperity. We have now arrived at a point in history where a working class has indeed been globalized and perhaps the clarion call is more apt today and possible given the state of our technology to achieve than it ever was in Marx's time. Has socialism been given half a chance to develop in this era of capitalism? In South America alone at least 30 socialist governments have been overthrown since 1945 and we are still at it full tilt. As to our education system it has been set up not to develop our capacity to learn but to inculcate the prevailing values of society and obediance to authority.. I think that with the Spanish connection through North and South America and the fact that the south has experienced first hand the iron fist of the imperatives of capital....the historic memory of those in the former soviet union who in no way shape or form wanted a capitalist mode of production underlying social relations and with what is going on in the Middle East as well as the protests being generated in Israel-well I wouldn't discount Marxian socialism just yet. What is happening in Britain right now is an example of a disorientated working class, one that has not been exposed to even the theoretical insights that a Marxian analysis brings to the illumination of social reality and a potential program for change. Class has been eviserated from the body politic. Only the "Middle Class" that ideological construct that further obscures class relations and the development of class consciousness is refered to by politicians today if you didn't notice. It is little wonder then that one would have doubts about the only political system that takes capitalism head on. 150 years of intellectual capital has gone into that project of "disproving" Marx, once and for all. But as long as capitalism exists so will it's antithesis Marxism-if even on a theoretical level for a time. Unfortuantely we have only 2 choices-Scientific Marxian Socialism or Capitalist Barbarism and the extinction of the human race-perhaps all life on the planet for that matter. On the other hand, with each passing day the contradictions and vagaries of capitalism bring us one step closer to it's alternative. Democratic Socialism.</span></p><span data-dcnode-id="3694" instrument_node="">
</span></div><span data-dcnode-id="3692" instrument_node="">

</span><p data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">Hi Rocky Racoon,</span></p><span data-dcnode-id="3658" instrument_node="">
</span><p data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">I would like to say first that our opinions on capitalism do not differ. I am in complete agreement with what you said about it and could not add much to it. </span></p><span data-dcnode-id="3655" instrument_node="">
</span><p data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">It is quite clear that the socialist path of many countries in South America has been obstructed as it did not suit the interests of capital, primarily interest of the US capital, which sees it's southern "neighborhood" as its own backyard and has exploited it from the moment these countries gained their independence from the European colonizers. Since the 18th century "Monroe Doctrine" it is obvious that the US did everything to ensure that the region gets under its sphere of influence as a great source of wealth. In absence of 'cooperation' of socialist leaders to fit these interests, the punishment was death.</span></p><span data-dcnode-id="3652" instrument_node="">
</span><p data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">I am in no doubt that loads of intellectuals in the West were working on spreading a distorted picture of Marx' view of the world, but you must admit that the Soviet type of "socialism" did a great service to the creators and implementors of the project of disproving Marx, as you called it.</span></p><span data-dcnode-id="3649" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Just as a side note, I grew up in a 'socialist' country (although things were hardly as harsh as behind the "iron curtain"), and I assure you that I have a pretty solid grasp of Marx' views as we were taught them since a relatively early age. </span></p><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">I would not get into a discussion about classes because I believe that the world today is a bit more complicated than the one which derives from perspective of such division, but I can certainly agree with you that the capitalist system and the distribution of wealth it creates will not last forever. That is because of the simple reason that the human understanding of the functioning of the world around them gains sophistication (not thanks to mainstream education but thanks to alternative sources of education of which Internet is one). </span></p><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">But the main point of my previous post was that you cannot leave the implementation of the proclaimed goals of a revolution to a relatively few individuals without having a populous which understands these goals, a populous that is capable of correcting the distortions that may arise from individuals' interest.</span></p><span data-dcnode-id="3640" instrument_node="">
</span><p data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">To summarize, I think we agree on the (vicious) nature of capitalism, the only difference may be that I believe that the REAL (revolutionary) change requires understanding and participation of the wide population for it to be possible and, most importantly, its results maintainable.</span></p><span data-dcnode-id="3637" instrument_node="">
</span><p data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">My greetings to South America and its efforts to get rid of the US dominance.</span></p><span data-dcnode-id="3634" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3308" itemprop="text"><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">@ Princeton</span></p><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">I have no desire to have this discussion with you again Princeton, we obviously disagree about it, we never seem to reach any common ground on it, and we've done it several times. But don't tell me I am merely hung up on the vilification of the word, as if I am some brain washed f00l that can't think for himself. I have done a lot of research into all forms of government, anarchy included, it was required in my western civics course and political science, and its something I enjoy reading about. History is on my side. Anytime we have had to simply rely on people to do the right thing, they didn't. Anyway, my point is, that my opinion is both informed and well thought out, whether you agree with it or not. I am sure yours is to, but we will have to agree to disagree, because mine isn't going to change on this subject.</span></p><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node=""> The two things that our economy needs to prosper, and any economist will tell you this is fact, is stability and predictability. Without them people don't hire, people don't invest. Anarchy will never provide stability and predictability, it never has and it never will, the whole point of it is freedom to do as you please. People will always "please" to do what ever is best for them right at the moment, which is not always whats best for everyone else. I like the way it sounds, I would love having no po po man chasing me around, but it isn't going to happen and in the long run that's probably for the best. But hey, that's the beauty of our country, if you can convince enough other people, the right people, it doesn't matter what I think. </span></p><span data-dcnode-id="3312" instrument_node="">
</span><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">P.S. You need to chill man, you are going on the defensive immediately, before the debate even gets going. I was referring to the people that would be maintaining infrastructure that we don't pay for directly when I asked what would bring them to work. I suppose your suggestion is that we pay private companies for the roads we drive on, the sanitation system we use, air traffic regulation, communications infrastructure, etc. I guarantee you that would cost us more than the taxes we pay now. Besides, you will never get enough people to just volunteer to pay for these services. What are you going to set up toll bridges and roads, pay toilets, pay phones, pay this pay that everywhere you look? No one would want that, it would be unimaginably inefficient and aggravating. So what, you charge a flat rate to gain access to all infrastructure, well how is that any different than taxes? Or each community gets together and pools there money to pay for a new road, what do they do about the people that couldn't pay or just didn't pay? Are they not able to use the road, who is going to stop them, no laws you know? If they are able to use it without paying, no one will pay, why would they if they can use it for free? Out of a since of doing the right thing? the kindness of their heart? a sense of responsibility? The public as a whole has none of these things right now, if they did we wouldn't be where we are?</span></p><span data-dcnode-id="3309" instrument_node="">
</span></div><span data-dcnode-id="3307" instrument_node="">

</span><p data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">Your right it is a movement in which we expect every person to be responsible enough to do the right things all on their own, to be involved, etc. I am familiar with the technical description put forward by Bakunin, and it sounds wonderful on paper. But, the invariable result is that it gives people the freedom to do what they please, whether that's a good thing or not, and that is my point- that capitalism can not exist along with anarchism. I don't think that's what Bakunin had in mind anyway. In fact the economic systems considered by Bakunin and proposed by supporters of anarchy through out the years where- Mutualism, Collectivist, a form of Communism, Participatory economics, and economic democracy- never capitalism. Recently the term anarcho capitalism was coined to refer to a state where the government is completely separated from the economy but still exists, you still pay taxes, the law still exists, etc. But it was never part of anarchism as laid out by Bakunin and, means something totally different than what Princeton is suggesting, or has suggested in the past I should say. . </span></p><span data-dcnode-id="3199" instrument_node="">

</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">In other words get rid of fiat currency and go back to something like the gold standard, though you seem reluctant to suggest gold by name. I have thought about that a lot, it has been suggested a lot recently. I am not an economist by a long shot but, it seems to me that fiat currency would be o.k., the culprit seems to be this "debt is money" fractional reserve banking system we have. I don't like private banking interests controlling the money supply or interest rates either. I know politicians are crooked as well but at least we can vote them out of office.</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node=""> To be honest though the national economy has become so complicated since it has been integrated into the global economy and began to rely on a service base instead of manufacturing, people like me are lucky if we get it right. I try to find an economist that I really trust, someone that seems to truly understand the system and have the same values as me as far putting people before profit, thinking long term, etc., then for the most part I listen to them. I still research what they recommend but at least I know what solutions are being proposed and how they stack up against the others. Right now I like Paul Krugman, he seems to know his stuff and have the same values as me. </span></p><span data-dcnode-id="2450" instrument_node="">

</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Thanks for your compliments and concern. That sounds like great advise, not just for me but for anyone interested. There are many people on this site that write exceptionally well, some are more creative/poetic and others are more technical. We should all probably check into your suggestions. I know I am going to, I need all the income I can get. </span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">I wrote technical how to type material for a computer support call center for about five years, the trainers used it to train people with no previous experience how to trouble shoot issues and walk people through fixing them via the telephone. I designed training manuals for Dell, Gateway, Sony, and Motorola products, as well as for internal procedures at the call center itself. When they closed down I never pursued that type of work any further, except for volunteer work I have done on political campaigns, writing email scripting and robo-call scripts. Anyway thanks for the advise, I will check into it.</span></p><span data-dcnode-id="2288" instrument_node="">

</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Well done in scratching the surface. Democracy is for grown-up's, but many times politicians act like children aka the debt ceiling debate. It made very good points about the European model, and how EU can tell countries to get their house in order. It also hit the nail on the head about China, no govt model works better than it at the time in doing what is needed for the economy. It didn't bring up what I feel is the most pressing issue we face in the world, population growth. When I was born, there were about a little more than 2.1 billion people in the whole earth, today we it is about to hit 7 billion. It is hard to get that many people to agree to any one thing at any time. I can't give one solution for a fix of the problems, but we need to respect all POV's in any problem and work together for the solution, if not we will only have ourselves to blame when we fail. Isn't that what democracy is? </span></p><span data-dcnode-id="2249" instrument_node="">

</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Go back over previous threads, Princeton's solution has always been anarchy mixed with completely unregulated capitalism. Which I think is ridiculous. I don't think capitalism or any other form of economic model could survive anarchy, people would be free to do as they please and as a result there would be a different style of economy, different implied rules, different customs, everywhere you looked. There would be no means of holding anyone accountable, making parties stick to contracts, deciding the value of currency, how much currency is available, what backs it up, what is the exchange rate, who prints it, etc. </span></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">In the past Princeton has stated that people would just come together and take care of all of this, which is basically recreating what we already have anyway, that is if you think they would be able to create anything. You show me a business model that makes creating and maintaining the intense infrastructure that this country needs, which every one gets equal free use of to be profitable. Its not going to happen. How would we provide for the common defense, maintain sanitation infrastructure, regulate air travel, etc. if profit was all that mattered? Or we had to just depend on people to come to work because they felt like it? No, there are many many problems that free markets can never fix, it simply isn't profitable so why would they even try?"Just like depending on peoples good nature or industrious spirit can't possibly fix everything, if we could rely on that we wouldn't be where we are right now. We choose our government officials from our general public, they are a good example of the average person right now- greedy, short sighted, easily corrupted, etc. I mean people can't even remain civil on this site when trying to come to a consensus about issues- which they never reach, and we are going to expect them to come to a common decision, efficiently execute that decision, and for them to come to work everyday and do there work well simply because they feel like it? </span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">All one need do is look at the places around the globe where anarchy took hold and what happened. I have yet to see it be anything other than a blood bath led by whomever grabbed the power by force first, and these are just little villages and tiny tiny little countries with no real developed modern enemies. They don't face what America would in such a situation, they don't have all this complicated infrastructure to maintain, first world enemies ready to take them out at the first sign of weakness, an expected part to play in the global economy and community. Yeah, go down to Africa and check out real anarchy at work, its a horror show.</span></p><span data-dcnode-id="2166" instrument_node="">
</span></div><span data-dcnode-id="2164" instrument_node="">

</span><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">@waldo Beautifully stated Waldo!! An outline for your up coming book. Waldo I worked with Encyclopedia Britannica North America for many years; An Artist haven. Bill Gates put us out of business. In any case i called on many many writers, mostly technical writers. They live an interesting life. For example one writer wrote for and engineering publication and had absolutely no engineering back ground, he spent many hours in research etc. Your natural talent to unfold and communicate a concept or idea is money in the bank. Just Google Theoretical physics publications and scan the articles then contact the publications and ask what articles their next issue will cover, get their outline. Write the article and send it in, (find out who reads and accepts various articles) Along with a stamped return envelope. Online publications might be good also? And i might add, not just Theoretical physics but anything that might interest you, music etc.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Publications usually pay per word, don't be wordy write good simple short articles and sell more articles not more words. </span></p><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">I mean your writing for us and we appreciate it! Why not get paid. </span></p><span data-dcnode-id="2124" instrument_node="">

</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">"How would we provide for the common defense, maintain sanitation infrastructure........to work because they felt like it?"</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">not because they feel like it.. because people in society care enough about those services to voluntarily pay them and expect them to show up to work.. duh.. how do cell phone towers or Chinese restaurants work . why the employees show up? some government program forcing them to?... </span></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">profit is the only true motive to any biological organism. profit simply means you took what u had and created something that is worth more to someone else. I wouldn't mind a world that ran on that principle </span></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">much better than altruistic delusions about some common good. at least we know that each transaction is a net gain for each party, so on a larger scale.. its benefiting society for each individual to produce something other people are willing to pay for.. regardless what it costs the individual to do so..</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node=""> think about it...</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2072" instrument_node="">and the best part about profit.. it is far more profitable to any sane person to help your community and your fellow men... part of the problem with society is that we're too busy demonizing and trying to control our fellow man, calling them stupid, that it leads to the shortsighted and unnatural idea that its far more profitable to take advantage of and hurt them.</span><br data-dcnode-id="2071"><span data-dcnode-id="2070" instrument_node="">
this is going against our own instincts... but oh well.</span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">its funny how ur argument is that people cannot voluntarily come together to provide common defense and basic infrastructure... even though people come together and do these exact things. </span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Politicians and government agencies focus on infrastructure and defense because the general public cares about these issues... hence the term representatives and public servants.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">the main argument is that by being forced to pay for these services, we're giving this organization of ordinary men and women a blank check to do what it wants and get away with it.</span></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">the only way to keep any organization of ordinary men and women (i.e. govt) efficient and useful to the rest of society is for them to only get paid when they provide some value through voluntary exchange. most crucially, there has to be competition.. its common sense anywhere else but when it comes to infrastructure and defense, competition is a bad thing? u have to explain this, not me or other anarcho-capitalists.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">ure just hung up on the vilification of the term "anarchy" by govt schools and agencies..... i understand, because they have no choice but to ignore the many intellectual arguments for a rational anarchic society.. they just say.. " anarchy.. that means no infrastructure... no common defense.... crazy people doing whatever they want... lord of the flies"</span></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">anarchy simply means.. no forced association... a society where people dealing with each other on a voluntary basis is the norm.. governments may exist, but they simply will not have the ability to shoot those who don't want to pay them, like every other company.</span></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">sure violence will always be necessary in human interactions, but our argument is that one should never initiate such situations, and violence (taxation) should not be the back bone of our entire "civilization".</span></p><span data-dcnode-id="2047" instrument_node="">

</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">@ princeton</span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Profit is just a dangling carrot to keep you going.. it doesn't matter where you're going just as long as you're going. It's like a kitten chasing a light, cute but pointless. Eventually even the kitten doesn't want to play anymore. This is the shizophrenia of capitalism. You don't need 5 ferraris, a castle and properties all over the place, nobody can really be that insecure. You can't expect me to believe that the only things you do are out of interest of making profit? See, this is what I mean. Same thing with religion, that creepy subliminal dogma echoing. We need profit. We need profit. They need your lips around their *****. I can wrap two!</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Look, resources aren't infinite. Maybe some day there won't be anything left to get any profit out of. Have you ever even considered this as a plausible scenario? Ever planted a tree and watched it grow, years and years of patience, aaaah but the virtue! People really need to slow down, their missing all the view.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2004" instrument_node="">"Give a man a fish and you feed him for a day; teach a man to fish and you feed him for a lifetime"</span><br data-dcnode-id="2003"><span data-dcnode-id="2002" instrument_node="">
- Lao Tzu</span></p><span data-dcnode-id="2000" instrument_node="">

</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">I agree with aspects of what princeton, waldo and Oz said are happening and that these are indeed dangerous things that somehow need to be reined in. We know that these things are being perpetrated. The only way to resolve them is one by one. The same way they are infiltrating aspects of our government's and corporations and affecting us day to day.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node=""> Ideally the best way to achieve this is to elect a person or persons(or run yourself) into the position(s) necessary to make the necessary changes. And make sure you are electing people that are trying to achieve this as high priority in their mandate.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1956" instrument_node=""> Some of first priorities to be addressed have all been said before. But we haven't elected people to get it done:</span><br data-dcnode-id="1955"><span data-dcnode-id="1954" instrument_node="">
- Laws passed banning all lobbying from corporations, foreign governments, evreyone.</span><br data-dcnode-id="1953"><span data-dcnode-id="1952" instrument_node="">
- laws limiting how are tax dollars where tax dollars can be spent on</span><br data-dcnode-id="1951"><span data-dcnode-id="1950" instrument_node="">
-laws limiting engagement of conflict in foreign lands</span><br data-dcnode-id="1949"><span data-dcnode-id="1948" instrument_node="">
- laws guaranteeing certain privacy and civil liberties that can't be trumped.</span><br data-dcnode-id="1947"><span data-dcnode-id="1946" instrument_node="">
-laws limiting profits of corporations especially in certain areas of mandatory requirements eg. banking,insurance, energy etc,</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node=""> I think this will be difficult to achieve with anyone who is connected to any of the existing main parties in government in any of our countries(Canada Here) since there is such a culture of patronage prevalent. And all of these people have been steeped and seasoned to the ways of this culture. Otherwise they aren't able to achieve approval and power/status within that party. And as seen before would likely get ostracised. </span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node=""> Corruption due to patronage politics is clearly one of the fundamental problems in my opinion. We are all susceptable to it to a lesser or greater degree. It is in our very nature.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node=""> A person to affect change would have to have a deep understanding of patronage and how it influences us to be able to cut through it and get the job done.</span></p><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1934" instrument_node=""> Do you know people like this?</span><br data-dcnode-id="1933"><span data-dcnode-id="1932" instrument_node="">
Make a party. Or flood an existing smaller one with these people. Educate others.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node=""> I admire what Waldo said about getting more engaged in whats going on instead of being lulled to a state of sheepleness :)</span></p><span data-dcnode-id="1927" instrument_node="">

</span><p data-dcnode-id="1888"><span data-dcnode-id="1891" instrument_node="">@princeton re: profit</span><br data-dcnode-id="1890"><span data-dcnode-id="1889" instrument_node="">
In the briefest possible terms, capitalism is an economic and</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">social system in which the owners of capital (or capitalists) appropriate</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">the surplus product generated by the direct producers (or</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">workers), leading to the accumulation of capital—investment and</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">amassing of wealth—by the owners. Production takes the material</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">form of the production of commodities for a market with the aim</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">of generating profit and promoting accumulation. Individuals in</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">this system pursue their self-interest, checked only by their</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">mutual competition and by the impersonal forces of the market.</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">“Accumulate! Accumulate! That is Moses and the prophets”</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">is the mantra of the system as a whole, as well as for each individual</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">capitalist. The logic of accumulation and competition drives</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">“bourgeois production out of its old course and . . . compels capital</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">to intensify the productive forces of labour.” It gives “capital</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">no rest, and continually whispers in its ear: Go on! Go on!”</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">2 The resulting juggernaut accepts no boundaries to its expansion but</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">continually tries to break them down, developing new technologies</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">and expanding into new markets. Although this has at times</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">paved the way to considerable social progress, the emphasis on</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">accumulation for its own sake, which constitutes the inner logic of</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">capital, carries heavy social and environmental costs, such as: (1)</span></p><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">the polarization of income and wealth; (2) a continually large (iffluctuating) reserve army of the unemployed and underemployed;</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">(3) periodic devastating economic crises; (4) an “externalization”</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">of enormous costs on society and the environment; (5) systematic</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">war and imperialism; and (6) the crippling of the potential of</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">innumerable individuals.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">The essence of capitalism, as described here, can be captured</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">by rewording the First Commandment of the Bible as follows:</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">“Thou shalt have no other gods before the accumulation of capital.”</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Ecologist Richard Levins gives a concrete example of what this</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">means: “Agriculture is not about producing food but about profit.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Food is a side effect. . . . Health service is a commodity, health a byproduct.”</span></p><span data-dcnode-id="1794" instrument_node="">

</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">These united States are on a similar path as the Soviet Union; circa 1989, with dissolution a real possibility.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">I say: bring it on.</span></p><span data-dcnode-id="1411" instrument_node="">

</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">I hope you are right, but I hear a lot about how the government and the elite are working overtime trying to figure out how to police and control the internet, just like they do every other medium. What I am afraid of is they will manage to get legislation passed by just keeping things hush hush, not letting us know what they are doing until it's too late. Or that some tragedy like 9/11 will happen, or if you prefer be purposely perpetrated, and they will use it to get the legislation they want.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node=""> I place my hopes in the public staying a few steps ahead technologically, that we monitor our courts and congress enough that we would see it happening in time to do something about it, and that the internet is global and would take global agreement and action to be policed or controlled. Some times I think I should learn to hack, out of a sense of civil responsibility if for no other reason. (LOL)</span></p><span data-dcnode-id="1326" instrument_node="">
