</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">While I can certainly see why you would feel this way, I think the reality is that we the people are equally to blame. If you'll notice all the differences they pointed out between communism and democracy can be summed up by saying that communism relies on uncorrupted, intelligent, foresighted, well informed, responsible, leaders to be successful and just, while democracy has to look to its citizens for these traits, as well as its leaders, in order to be successful. Which means if all the corruption and greed were washed out of government tomorrow we would still have to do something about our public's childish expectations of something for nothing, there elect and forget attitude toward government, etc.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node=""> I am not saying I am any better than the people I am talking about, I am falling far short of my duties as a citizen as well. I am not talking about patriotism either, at least not in the classical sense, I am talking about civil responsibility, and that's completely different.The whole point of government is to is to help us create, not to create all on their own. If we let them do that we get what we have right now. If we let them make this democracy fail, without at least a decent fight, we are as much to blame as they are. Our fathers and grandfathers made this work for well over a hundred years. Not only work but prosper. The biggest difference I see between then and now is not in the politicians, they were crooked back then to, its in the people. </span></p><span data-dcnode-id="1201" instrument_node="">

</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">agreed ... with some comments: I suggest that the major problem with any government is the bloated nature of the size of government.There are COMMON things we need: roads, communication, healthcare, education, environmental protection, energy, a REASONABLE constablatory, public service... In other words we CERTAINLY NEED FAR LESS GOVERNMENT, and the government we do need needs to be less entangled in profiteering and those failed capitalist roads that lead to nothing more than a private gated community that ends with an oppulent mansion. I recall the Cash for Clunkers. What a joke. It was nothing more than a welfare program for Detroit Auto Makers. The money for the clunkers went to the auto maker in the form of buying a down payment on a NEW CAR, no cash for the old car unless you buy a new car. Socialism for the wealthy! Beautiful, kudos to you GM, Ford and Chrysler! And it isn't just the auto makers, it is the wasteful spending on oil subsidies, extravagant subsidies to agribusiness, useless military industrial spending, big pharma and bigger health failures, the criminal FDA, the lost War on Drugs, the unwinnable war on Terrorism, the list seems endless... JESUS why are we giving money to these criminals and what do we get in return? Hell, we don't even get the "benefit" of a reach around. In short we need localized control: village, township, city, and county. With the possible confederation with other such similar entities for trade. It wouldn't be as difficult as it sounds. It is very simple like kindergarten: do not hurt others, clean up your mess, and make sure you can play another day. LAST: CAPITALISM, COMMUNISM, and FASCISM are all equal opportunity failures. A small minority is always the winner, none of them truly reward skill, intelligence, innovation or creativity. And LAST, it is always to convenient to blame the people. This is a dodge. The choice of the People is limited to the monkeys that Wealth will allow us to actually vote for, we have a severely limited amount of options and those options we do have tend to support the status quo.</span></p><span data-dcnode-id="1165" instrument_node="">

</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">You know, this is a very interesting subject to me personally because I'm Belgian. We have had more than 400 days now without forming an official government. We have 3 main flemish parties and 3 main waloon parties. This seemingly small amount of diversity makes it very difficult to come to any decisive agreements that the debate is never ending. We have become very sceptical towards any notion of real democraty and really don't care a lot either. I mean, we do have a lot of disagreements, as it shows we still have no official government, you don't see us going on the streets blowing eachother's heads off (yet). Should we worry? Or should we just don't care anymore? I got some theories but I don't want to bore you. :p One thing you should still keep in mind.. we're still a kingdom. xD</span></p><span data-dcnode-id="891" instrument_node="">

</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">That's laughable. Almost no one worships these jackals you speak of in my experience. But, when jackals are all you have to choose from you can bet one will get elected. The concept of a real democratic republic that operates the way it is defined would be wonderful in my opinion, but we have never had that in America, at least not since my birth in 1971. We have a democratic republic in name only, in reality we have a de-facto corporatocracy that serves the rich at the expense of the poor, continually manipulates its public, and is bent on world domination by any means necessary. The last man to try and correct this was Robert Kennedy, and they gunned him down in broad daylight, just like they did his brother a few months before, to show the rest of us exactly what happens when you try to "take the power back". I think Obama would have also liked to have corrected this issue, but he found out real quick that the rest of the government would not allow that. They no longer kill people, that's too risky, now they simply use tricks and lies coupled with huge amounts of money and power to manipulate the public into not supporting what is really in their best interest. </span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">As far as a pure democracy, I wouldn't touch it with a ten foot pole. All one need do is read over the comments on many of the threads on this site and others to see that the general public doesn't have a clue and is very easily mislead and manipulated. Besides, majority rule sounds great, until you realize that majority can be just as bad of a tyrant to the minority as any dictator. That's the beauty of a constitutional republic that operates like it was intended, there are protections for everyone's rights, the majority is not allowed to victimize the rights of the minority because their rights are enshrined in the constitution. </span></p><span data-dcnode-id="772" instrument_node="">
</span></div><span data-dcnode-id="770" instrument_node="">

</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Well the public is misinformed, manipulated and deliberately distracted in today's bourgeois democracies. So we would have to overthrow the current social order if we were going to have more participatory democracy and gave people time each day to brush up on the issues. After about a generation or two we would start to wonder whatever took us so long. The ruling class always tries to monopolize knowledge and power that is nothing new. Ever expanding democracy and the tools to implement it are breaking our all over the world. In the Middle East and even in Israel the call for social justice is on the rise. This economic crisis has demonstrated to all just what their objective relation to the mode of production is and has given rise to class identity-it is now possible for the workers of the world to unite....and in spite of being under erasure for the past 40 years it seems the working class is taking matters into its own hands and acting as a self aware class....Let's hope it continues.</span></p><span data-dcnode-id="736" instrument_node="">

</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Your observations are down to the point &amp; absolutely accurate in my view.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">@ Rocky Racoon,</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="693" instrument_node="">I agree that the current social order has too many faults &amp; is in great need of restructuring. But I am afraid that overthrowing it (by which I assume you mean a (global?) revolution), would not solve any (well, not many anyway) of the problems societies are facing today. If you go back</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">
through revolutions throughout history, none of them lived to the big ideals &amp; promises of justice, equality, economic security, etc. for all (if there were such revolutions in history, I am certainly not aware of them &amp; would be glad to stand corrected). Even if some of the revolutionaries honestly believed in the proclaimed ideals, very soon</span><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">
they were marginalized, assassinated or kicked out of the game in one way or another &amp; the proclaimed ideals were distorted, in some cases (such as in Communism as we know it) brought to absolute absurdity. </span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">I believe that the only way for societies to move on is through education. But not through the existing educational systems, which encourage parroting. A system in which independent and innovative thinking would be encouraged is what is needed. It would be much more difficult to manipulate such people.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="683" instrument_node="">Truly participatory democracy is very hard to achieve in societies which number millions of people. It was relatively easy in ancient Athens or in tribal societies. The limitations of modern democratic societies are widely discussed among the political theorists of the day but none has yet come to any feasible (in practical terms) solution as far as I know.</span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">
Robert Dahl, one of the most respected political scientists on this topic, proposed the term "polyarchy" for what we have today, meaning that many have access to the decision-making process (through the so-called "interest groups") but not the majority. That basically translates into - the better organized (&amp; the richer) the interest group is, the more</span><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">
chances it has to influence political decisions. </span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="676" instrument_node="">"The workers of the world united" mantra is just a meaningless phrase the communist ideologues of the 20th century picked up from Marx as it sounded attractive for the oppressed. Look where believing those power-hungry thieves of (the basically ok) Marx' humane idea took those</span><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">
uneducated people.</span></p><span data-dcnode-id="672" instrument_node="">

</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">F*** I hope your trying to be ironic.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">The US is currently and has been since the founding a Republic, according to the actual definition of the term. It possesses a constitution which limits the power of the electorate in order to protect the rights of the individual and minorities. </span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">If you're somehow dissatisfied with the current state of politics in the US, you owe such dissatisfaction to the US governments republican nature, mind you I do not here mean republican in the sense of the political party but political concept. </span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Yes a democracy can be corrupted by it's electorate, dependent as it is on popular will. But of course republicanism escapes none of these controversies either, one need only remember that the framers of the constitution allowed the continuation of slavery, while also originally allowing only land owning white men voting rights. Or that one of the greatest and longest lived of all dictatorships the Roman Empire, was also the product of a republic, in this case the late Roman Republic which voted for it's own subjugation first to Julius and again unto Augustus. </span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Thus a republic which acts to in part to protect the rights of the individual , but does so by protecting it's own power. When a government or form of government is primarily concerned with it's own perpetuation and not the task of governance, does it become unjust or inadequate. </span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Indeed I believe that the greatest problem in US politics right now is that both parties are concerned not with governance, let alone good governance. But rather are consumed by a need to maintain their own political clout, and preserve their ill gotten and perhaps illegitimate power. </span></p><span data-dcnode-id="372" instrument_node="">
</span></div><span data-dcnode-id="370" instrument_node="">
