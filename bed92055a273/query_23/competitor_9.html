</span><p data-dcnode-id="8915"><img alt="Capitalism: A Love Story" class="alignleft" data-dcnode-id="8920" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//topdocumentaryfilms.com/wp-content/uploads/2010/02/capitalism-love-story.jpg&amp;raw" width="128"><span data-dcnode-id="8919" instrument_node="">Michael Moore's </span><em data-dcnode-id="8917"><span data-dcnode-id="8918" instrument_node="">Capitalism: A Love Story</span></em><span data-dcnode-id="8916" instrument_node=""> comes home to the issue he's been examining throughout his career: the disastrous impact of corporate dominance on the everyday lives of Americans (and by default, the rest of the world).</span></p><span data-dcnode-id="8914" instrument_node="">
</span><p data-dcnode-id="8912"><span data-dcnode-id="8913" instrument_node="">But this time the culprit is much bigger than General Motors, and the crime scene far wider than Flint, Michigan. From Middle America, to the halls of power in Washington, to the global financial epicenter in Manhattan, Michael Moore will once again take film goers into uncharted territory. With both humor and outrage, Michael Moore's Capitalism: A Love Story explores a taboo question: What is the price that America pays for its love of capitalism? Years ago, that love seemed so innocent.</span></p><span data-dcnode-id="8911" instrument_node="">
</span><p data-dcnode-id="8909"><span data-dcnode-id="8910" instrument_node="">Today, however, the American dream is looking more like a nightmare as families pay the price with their jobs, their homes and their savings. Moore takes us into the homes of ordinary people whose lives have been turned upside down; and he goes looking for explanations in Washington, DC and elsewhere.</span></p><span data-dcnode-id="8908" instrument_node="">
</span><p data-dcnode-id="8903"><span data-dcnode-id="8907" instrument_node="">What he finds are the all-too-familiar symptoms of a love affair gone astray: lies, abuse, betrayal... and 14,000 jobs being lost every day. </span><em data-dcnode-id="8905"><span data-dcnode-id="8906" instrument_node="">Capitalism: A Love Story</span></em><span data-dcnode-id="8904" instrument_node=""> is both a culmination of Moore's previous works and a look into what a more hopeful future could look like. It is Michael Moore's ultimate quest to answer the question he's posed throughout his illustrious filmmaking career: Who are we and why do we behave the way that we do?</span></p><span data-dcnode-id="8902" instrument_node="">

</span><p data-dcnode-id="8665"><span data-dcnode-id="8666" instrument_node="">To everyone here complaining about MM claiming "capitalism" when it should be "corporatism":</span></p><span data-dcnode-id="8664" instrument_node="">
</span><p data-dcnode-id="8662"><span data-dcnode-id="8663" instrument_node="">If you had heard/viewed any of Moore's myriad interviews, website articles/comments, or read any of his books, you'd already know that he's stated multiple times he has no problem with the concept of capitalism. Nor does he have a problem with the concept of profit, conservatism, or those who wish to carve out a better life for themselves involving bigger and better things.</span></p><span data-dcnode-id="8661" instrument_node="">
</span><p data-dcnode-id="8659"><span data-dcnode-id="8660" instrument_node="">His problem is that corporatism in all its excessive greed IS what capitalism has become today. It is no longer defined as the simple concept of a business struggling to stay fresh and competitive while remaining beneficial - it's now defined as a system where businesses are juggernaut entities that have the government in their back pocket, and continually place ridiculous profit margins ahead of anything else, to the point where they literally leave devastation in their wake for the sake of saving a few extra dollars.</span></p><span data-dcnode-id="8658" instrument_node="">
</span><p data-dcnode-id="8656"><span data-dcnode-id="8657" instrument_node="">The race to acquire to excess dominates American society and it trickles down from these business giants and shady politicians, right to our educational system, media, and our pop culture - in a way that is staggering when compared to any other advanced nation in the world.</span></p><span data-dcnode-id="8655" instrument_node="">
</span><p data-dcnode-id="8653"><span data-dcnode-id="8654" instrument_node="">The people of the U.S. take this rat race toward the American Dream for granted, and all the while the entire system of shady business practices, outsourcing, downsizing, lay-offs, grossly uneven distribution of funds, for profit healthcare, poor education, etc., can all so easily be eliminated should the people realize THEY have the power to instill regulation, standards, ethics, and a little humanity into how everything is run in their country.</span></p><span data-dcnode-id="8652" instrument_node="">
</span></div><span data-dcnode-id="8650" instrument_node="">

</span><p data-dcnode-id="8575"><span data-dcnode-id="8576" instrument_node="">20 years in from "Roger and Me" and Michael Moore still continues to be one of the ultimately greatest voices for political sanity I know of, by making what is BY FAR one of the most important documentaries EVER! I'm re-watching it at home, and realizing TOTALLY, that it is/(was) impossible to get it all on the first viewing... and I'm now also discovering that the DVD extras are truly FANTASTIC! Congressman Elijah Cummings, shedding a tear from his right eye, as he is being interviewed by Michael about the PERMANENT and catastrophic LOSSES being suffered by middle class and poor people, is SO SUPERB! The FDR speech about a new (2nd) Bill of Rights is incredible!!! Spread this film around... it is relevant now more than ever... and its issues are SO crucial to our survival as a species on the planet and any lasting hopes for "We the People" to be free from the obscene + greedy bastards' oppressions! If I were a teacher my class would see this film... whatever I was charged with teaching. Live forever Michael Moore - you are TRULY a saint!!!</span></p><span data-dcnode-id="8574" instrument_node="">

</span><div class="comment-content" data-dcnode-id="7694" itemprop="text"><span data-dcnode-id="7698" instrument_node="">
</span><p data-dcnode-id="7696"><span data-dcnode-id="7697" instrument_node="">Anyone who says capitalism works because it provides a motivation is ignorant and fails to see the bigger picture. Of course it does for a time, but the only way for a seller to make a profit is if the consumer spends and money is transferred from the consumer to the seller. This has, is, and will always result in a perverse exploitation in which the consumer is bound by the expenses of necessities, and can never make a living due to the discrepancies of wealth. For example, a person cannot make a profit out of selling apples if he does not have enough money to buy the apples in the first place, and this is what is happening without regulation of wealth and money. And do you really need to have all these luxuries? Do you really need 5 homes all across America while people are struggling to find a job and living in the back of vans? I hate America as a country because it claims to offer equal opportunity , and yet it seems like only the rich will ever be able to afford good education (and so their children will have more chance of being rich etc.) and healthcare. These need to be nationalised. We Europeans are always antagonised by America because of our socialist principles and yet generally we seem to be the ones who are happier and not being revolutionised by our own people.</span></p><span data-dcnode-id="7695" instrument_node="">

</span><p data-dcnode-id="7261"><span data-dcnode-id="7262" instrument_node="">Essentially and let's keep this simple...the system is not working for the majority. </span></p><span data-dcnode-id="7260" instrument_node="">
</span><p data-dcnode-id="7258"><span data-dcnode-id="7259" instrument_node="">In this century it is a reality that millions of people from 1st world to 3rd are living in extreme poverty without the basics needed for human existence. This continues because it is profitable. </span></p><span data-dcnode-id="7257" instrument_node="">
</span><p data-dcnode-id="7255"><span data-dcnode-id="7256" instrument_node="">We are distracted on a daily basis, to want things, to strive to achieve a certain level of existence weighed against wealth and possessions, men and women are sold insecurities through celebrites, make up, miracle cures- all to make us strive for what cannot be achieved, to keep us spending, wanting and indebting ourselves. </span></p><span data-dcnode-id="7254" instrument_node="">
</span><p data-dcnode-id="7252"><span data-dcnode-id="7253" instrument_node="">While people starve, get kicked out of their family homes because mortgages rocketed without notice or reason, countried where citizens have to pay for health care, education becomes for the wealthy- ostracising the gifted, hard working, creative, passionate people who can't afford to learn...or they do at a higher cost of crippling themselves with debt for years. </span></p><span data-dcnode-id="7251" instrument_node="">
</span><p data-dcnode-id="7249"><span data-dcnode-id="7250" instrument_node="">Time for everyone to peacefully protest, speak out, take issue with these things and try to make a contribution...</span></p><span data-dcnode-id="7248" instrument_node="">
</span><p data-dcnode-id="7246"><span data-dcnode-id="7247" instrument_node="">Every year in the UK we are encouraged to give to charity, huge televised events with big celebrity names pushing the public to give and fair play...they really do and raise millions for the sick, needy etc...</span></p><span data-dcnode-id="7245" instrument_node="">
</span><p data-dcnode-id="7243"><span data-dcnode-id="7244" instrument_node="">How much easier would it be for the top 1000 richest people on Earth to give half of their wealth...truth is the top of the pyramid don't want the whold world to be prosperous, self sufficient and without need...because those countries wouldn't need to borrow any more money and pay high interest either...perhaps they would be less willing to sell their land at flat rate too...</span></p><span data-dcnode-id="7242" instrument_node="">
</span><p data-dcnode-id="7236"><span data-dcnode-id="7241" instrument_node="">Everything has a reason...</span><br data-dcnode-id="7240"><span data-dcnode-id="7239" instrument_node="">
For every suffering, injustice or madness...trace it back...</span><br data-dcnode-id="7238"><span data-dcnode-id="7237" instrument_node="">
Often the reason is greed.</span></p><span data-dcnode-id="7235" instrument_node="">

</span><p data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">The steady privatization of all things natural and otherwise on the planet with the simultaneous consolidation of wealth and ownership of privatized entities indicate a natural evolution of these systems to that of communism. Only instead of the State owning all, private legal "persons" ie corporations will own them. It is no different from the Communist Soviet Union. However, the elite in the USSR simply achieved their goal through the government itself instead of a privatized system for resource annexation. These "persons" are not citizens of any nation and overrule the idea of national borders. Having no physical form to put in jail, the only recourse for these "persons" violations of law and decency is monetary in nature. Given the fact that it is often less costly to break the law and pay fines than to obey the law, we can see the true nature of the corporate state. Politicians go into the system, are processed by a system of legal bribery, and come out stock holders and high profile employees of these banks &amp; companies. And then there's the guys who already had high profile jobs and THEN went into politics (1 of many examples: Cheney). The world has been transformed into the New Rome. The plutocracy have replaced the Emperor. The governments act like the senators. The elite are the true power and represent the land owners. The corporations (eternal and legal persons) and banks are the vessels for the lineages of the elite. Communism / socialism won't work much better. You're still chattel to someone. That is why anarchy is the only way. For you cannot defeat greed. Power corrupts...absolute power corrupts absolutely.</span></p><span data-dcnode-id="6791" instrument_node="">

</span><div class="comment-content" data-dcnode-id="6411" itemprop="text"><span data-dcnode-id="6433" instrument_node="">
</span><p data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">What I find fascinating with people who criticize capitalism is that they ALWAYS do it from a stance of comparing it to perfection.</span></p><span data-dcnode-id="6430" instrument_node="">
</span><p data-dcnode-id="6428"><span data-dcnode-id="6429" instrument_node="">In essence, their argument always amounts to "capitalism isn't perfect, therefore it's evil" :D</span></p><span data-dcnode-id="6427" instrument_node="">
</span><p data-dcnode-id="6425"><span data-dcnode-id="6426" instrument_node="">But none of us "capitalism lovers" claims it's perfect or can be perfect. We believe it's the BEST SYSTEM POSSIBLE. It's the system with the most advantages and least disadvantages - not without flaws, not without pain, not without suffering - just the best in real world terms.</span></p><span data-dcnode-id="6424" instrument_node="">
</span><p data-dcnode-id="6422"><span data-dcnode-id="6423" instrument_node="">The systems they like (instead of capitalism) are always utopian visions that never ever ever ever succeed in practice and always turn out much much much much worse when attempted in practice.</span></p><span data-dcnode-id="6421" instrument_node="">
</span><p data-dcnode-id="6419"><span data-dcnode-id="6420" instrument_node="">What would you rather have </span></p><span data-dcnode-id="6418" instrument_node="">
</span><p data-dcnode-id="6416"><span data-dcnode-id="6417" instrument_node="">- An imperfect system that does mostly good, but also some bad, and is upfront about it... Is proven to work better than ALL systems in all the millenia of human existence, in practice.</span></p><span data-dcnode-id="6415" instrument_node="">
</span><p data-dcnode-id="6413"><span data-dcnode-id="6414" instrument_node="">- A system that claims to be perfect in theory, but when implemented makes everything go to s*it, half the people starving, the other imprisoned... regardless of how well-intentioned it's original theorizers were</span></p><span data-dcnode-id="6412" instrument_node="">
</span></div><span data-dcnode-id="6410" instrument_node="">

</span><p data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">Stop comparing the wide world to your personal view. Things are totally f'ed here. Holding a silver spoon and talking about the overall state of things being "not perfect" and IMPERIALISM (what?!) "does mostly good" (a completely objective viewpoint, of course). Evil is a pretty subjective word but I'm pretty sure plenty of people find profiting off of an innocent's death, coercion, bribery, thievery, greed, war, and gangsterism as pretty damn evil. Don't try to say Capitalism isn't the cause of war. Capitalism means profit. Pure and simple. More war = major profits for banks, defense industry, and oil not to mention all the companies that rebuild the infrastructure. Dude, wake up.</span></p><span data-dcnode-id="6159" instrument_node="">

</span><p data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">Dude we are awake. Take a human civilization history class. Show me a single nation, country, or empire that was a utopia. That is what you are describing. A world where everyone gets along and gives away free stuff. What? Crops don't grow themselves you said?!! Someone has to WORK to get those plants to grow. What?!! Someone has to be paid to build that farmers house? My point is: if you want to eat then you have to work. This is how humanity has ALWAYS been. We understand how societies, economics, and principals of human nature work. Dude, wake up and pick up a history book sometime. Also, last time I checked our WAR FOR OIL in middle east was A GOOD THING. America is spreading democracy with our power. Don't like it. Too late. Go back to the aristocracy or monarchy style humans used to have with kings and queens. At least with democracy we can feel like were making decisions.</span></p><span data-dcnode-id="6123" instrument_node="">

</span><p data-dcnode-id="6086"><span data-dcnode-id="6089" instrument_node="">Haha, yea the war for oil is a good thing alright! Look how much the price of gasoline has gone down since we invaded Afghanistan and Iraq! Yes we are spreading "democracy" with our bombs and guns, of course that's going to work! Newsflash: America is not a democracy, it is a plutocracy where both parties are owned by the ultra-rich. Elections aren't much of a choice when Red Team and Blue Team are both on the payroll of corporate America. How can we possibly spread democracy to the Middle East when we don't even have it in our own country? Stop watching Fox News and read some books for a change. Your ignorance is breathtaking.</span><br data-dcnode-id="6088"><span data-dcnode-id="6087" instrument_node="">
By the way... denouncing capitalism as the global system for exchange of goods and services does not mean one favors laziness or not working. On the contrary, capitalism encourages laziness for the wealthy at the top who pay their underlings the lowest wage possible to do all their work for them to make them more money. Human beings are just another commodity for greedy corporations, and the profit motive becomes their only concern. Look around in America: the people who work the hardest are often the people that make the least money. As a socialist (I call myself one proudly... Obama is anything but one), I believe that the people that benefit from the economy the most (the wealthy) have a greater obligation to give back to the society that has made them so rich. In other words, the ultra-rich should pay more in taxes than they do now. In the Eisenhower years (he was a Republican!), the top bracket paid a 70% income tax, a rate that was so high mainly to pay down the government debt incurred during WWII. Back then, Americans (including the wealthy) had a sense of shared sacrifice. Fast forward to the Bush and Obama years, and we are now in two wars and the rich have had their taxes cut. Kinda makes my head hurt.</span></p><span data-dcnode-id="6085" instrument_node="">

</span><p data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">Capitalism is the greatest system in the world, man's most beautiful concept. It allows for people to trade actual value for actual value. When followed properly, it is the idel of justice. This movie attacks how capitalism has been abused, though it claims to attack capitalism in and of itself. The Banks certainly did evil and are in the wrong--but not because they are capitalists, but rather because their asking for a bailout is a contradiction to the capitalism they seek to defend. This film should be called something more along the lines of "the sins of plutocracy." Never stop believing in true capitalism---without it we have no freedom. </span></p><span data-dcnode-id="6045" instrument_node="">

</span><div class="comment-content" data-dcnode-id="5970" itemprop="text"><span data-dcnode-id="5974" instrument_node="">
</span><p data-dcnode-id="5972"><span data-dcnode-id="5973" instrument_node="">Money is worthless... backed by nothing. Go learn about it. You're not getting anything of value. The only things of value are material goods that are abusively sought after. Accumulation of things. What would be TRULY beautiful is a system where each and every human being is provided the means to a decent life while they add to the community anything of which they like. If you truly love to cook, you cook for people. If you truly love to play music, you do that. Construction? We'd need houses, right? The reality is, this system was invented in order to enact an endless wave of privatizing anything and everything making it all subject to being purchased. Did you know that huge corporations have begun patenting DNA of natural organisms, plant life, animal life, and even portions of the human genome? The act of privatizing water means you are not allowed to have it without some method of payment. That is not freedom. Water is the most basic REAL necessity. You will die of hunger long after you've died of thirst. A real believer in the Bible would find this abhorrent! Do you really think Jesus, Buddha, or any true lover of humanity would like a world where screwing somebody over for profit was considered an honest day's work? Really...</span></p><span data-dcnode-id="5971" instrument_node="">

</span><div class="comment-content" data-dcnode-id="5919" itemprop="text"><span data-dcnode-id="5938" instrument_node="">
</span><p data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">This is why I said he does not argue capitalism, but corporate plutocracy. Capitalism, true capitalism, as envisioned by Adam Smith and defended most successfully by Ayn Rand (among many others), puts the rights of the individual before anything. </span></p><span data-dcnode-id="5935" instrument_node="">
</span><p data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">"What would be TRULY beautiful is a system where each and every human being is provided the means to a decent life while they add to the community anything of which they like. If you truly love to cook, you cook for people. If you truly love to play music, you do that. Construction? We'd need houses, right?" </span></p><span data-dcnode-id="5932" instrument_node="">
</span><p data-dcnode-id="5930"><span data-dcnode-id="5931" instrument_node="">That's essentially true capitalism. I'd only say that "every human being is provided the means to a decent life" is kind of a flawed demand:: that's the goal of commmunism, and it just did not work out (Russia, Cuba, etc.). A man should always earn their life, and find a way in which they can do that, so this doesn't mean "anything," but certainly the idea of "adding to the community" is true. That said, what we have is not right, and Moore is right in challenging it. But true capitalism is certainly the idea that any man has the right to do whatever he pleases with his life. </span></p><span data-dcnode-id="5929" instrument_node="">
</span><p data-dcnode-id="5927"><span data-dcnode-id="5928" instrument_node="">The thing about water---it's a really tough question. It was rather recent (late 1990's early 2000's I think) that the UN recognized water as a commodity. I think this is wrong and that water should be considered a human right. </span></p><span data-dcnode-id="5926" instrument_node="">
</span><p data-dcnode-id="5924"><span data-dcnode-id="5925" instrument_node="">Here's the thing that I wonder though, beyond water, and where I'm not sure I side with the post-industrialists or the industrialists-- i.e. this new(ish) concept of financial institutions being the rich (because their work is not directly related to any violation of human rights) vs. those that produce goods/commodities. A lot of production of goods is great, it provides people jobs, etc. But what is messed up with our system is that most of the super-rich companies got there by non-capitalistic ways, i.e. the violation of human rights, mercenary groups, etc. (I'm thinking of computer and electronics companies needing metal from Congo among other places and enabling an internal warfare between the people of Congo as to who gets this metal, or sweatshops throughout asia and africa.) As soon as force becomes involved, capitalism ceases to be capitalism. But the thing about the post-industrialists, which Moore argues beautifully is the terrible state people end up in after their home forcloses, or they are denied health insurance for w.e. reason. </span></p><span data-dcnode-id="5923" instrument_node="">
</span><p data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node="">I'd like to finish by saying Capitalism is a moral and ethical concept. The words of Christ (and Buddha, and the rest) were also moral, for the most part. That said, people misinterpret the words of the religious all the time, so we end with things like the crusades, religious wars and groups like the Westboro Baptist Church. Likewise, when Capitalism is misinterpreted we get into major f--ked up situations where everyone is bankrupted by a greedy lot who don't respect the system they claim to be the posterboys for. But the fact that the Westboro baptist church exists doesn't make me want to renounce all of Christianity. Likewise, the facts presented in Moore's film should not make people loose faith in the capitalist ethic. </span></p><span data-dcnode-id="5920" instrument_node="">
</span></div><span data-dcnode-id="5918" instrument_node="">

</span><p data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node="">Competition is not a necessary vector for improvement, technology advancement, and societal evolution; in fact, it often brings out the worst in us; wars, lying, stealing, and cheating. What if we "advanced" because it was exciting and that we received an emotional reward while working with like minded and gifted individuals? The bottom line is that the "greed" that is buried deep within our Reptilian Brain, is driving us to be the worst that we can be. Once we identify this biological fact, we can ethically move forward. Until then, we will continue to destroy ourselves and our planet in the almighty name of cash.</span></p><span data-dcnode-id="5848" instrument_node="">

</span><p data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">This film does not argue against capitalism, it argues against how capitalism has been abused. Capitalism is the most ideal system in the world--it values man's mind as his highest asset--which it should be. It allows for productivity to run free. Look at the wonders of Apple, among so many other great companies. The real problem is when professed capitalists undermine capitalism by requesting bail-outs as the banks did. This movie has its fair share of good points, but is filled with bad ones. </span></p><span data-dcnode-id="5808" instrument_node="">

</span><p data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">Michael let Ronnie Raygun off lightly there. Not only did he give the nation away to the corporations in the 80's, he was a big figure in Hollywood part of the McCarthy witch hunts which were about removing all socialists from positions of influence regardless of whether they were a threat or indeed an asset to America or not.</span></p><span data-dcnode-id="5421" instrument_node="">
</span><p data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">Thanks to the likes of Raygun et al the actions of that evicted family forcibly moving back into their disused and boarded up home is actually a crime. The actions of the window glass factory, a crime, the actions of the banksters, well thats just business baby.</span></p><span data-dcnode-id="5418" instrument_node="">
</span><p data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">It is unfortunate that America is only waking up to some of the downfalls of capitalism. Unfortunately the other isms were so thoroughly exorcised from the American soul that to not compete in the "That smells of communism" game is to make election nigh on impossible.</span></p><span data-dcnode-id="5415" instrument_node="">
</span><p data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">The bad news is you have got a long way to go before the system is taken over by people who value society's welfare (Oooh another dirty word) over the wealth of a small minority of individuals being dressed up as economic theory and policy.</span></p><span data-dcnode-id="5412" instrument_node="">
</span><p data-dcnode-id="5410"><span data-dcnode-id="5411" instrument_node="">Here in Europe the scourge of the international finance men has had its effect but the song "The International" is actually known by more than history buffs and academics and its ideas though not always practiced have been freely allowed to circulate. I always found it funny how American friends would fail to understand why we had so many strikes over things they felt were trivial but now the web is full of angry voices saying "start the revolution" but dont know how they are started and more importantly how they are put down. </span></p><span data-dcnode-id="5409" instrument_node="">
</span><p data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">I hate to say it but the very small numbers and lack of solidarity shown in these publicised examples of worker action/community action tell me one thing, when cameras are not there heads are getting cracked and butts dragged to jail. These were nice feelgood tales of hope by a man who thinks he is a socialist or wants socialism.</span></p><span data-dcnode-id="5406" instrument_node="">
</span><p data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">To be a socialist you must absolutely despise the bankers and politicians under their influence with the same lack of remorse they display in their pursuit for money. Its not a battle of superior ideas but powers. The American press quickly hail people power before any power is ever exercised and the powers that be back off and regroup while their opponents pat themselves on the back and disband. European socialist are aware of that so always take the battle that much further even in the face of criticism by the press and often uninvolved members of the public. The last action of people power in America was The Vietnam era actions. </span></p><span data-dcnode-id="5403" instrument_node="">
</span><p data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">I hope you take your country back, not for socialism but for yourselves. Learn the words of the international, coz the opposition have been international and united for a while and thus have a massive headstart.</span></p><span data-dcnode-id="5400" instrument_node="">
</span><p data-dcnode-id="5376"><span data-dcnode-id="5399" instrument_node="">Stand up, damned of the Earth</span><br data-dcnode-id="5398"><span data-dcnode-id="5397" instrument_node="">
Stand up, prisoners of hunger</span><br data-dcnode-id="5396"><span data-dcnode-id="5395" instrument_node="">

</span><div class="comment-content" data-dcnode-id="5017" itemprop="text"><span data-dcnode-id="5033" instrument_node="">
</span><p data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node="">A common mistake is to confuse soviet communism with socialism which it most certainly is not, despite deriving from it. Socialism is not about everyone having the same, as it has been illustrated by the following statement: </span></p><span data-dcnode-id="5030" instrument_node="">
</span><p data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">"From each according to their ability to each according to their needs "</span></p><span data-dcnode-id="5027" instrument_node="">
</span><p data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">Is it not the job of government to regulate and tackle unfairness, ensure that sections of the population do not exploit others and provide services which are either unprofitable or essential to a standard and at a cost that all can afford? </span></p><span data-dcnode-id="5024" instrument_node="">
</span><p data-dcnode-id="5022"><span data-dcnode-id="5023" instrument_node="">Government that follows the principles of Capitalism should be a system that allows private enterprise but prevents market domination by a single or small group of interests. It should provide efficient means of production but at the same time providing for the needs of those doing the work. Competitive markets that are not essential to the needs of the population should be open to private enterprise and allow a fair opportunity to all who would like to invest in them. They should also encourage the development of new ideas and products that enhance the lives of the population as a whole. Surplus profits should be re-invest into the nation in order to improve the living standards of the population as a whole and thereby produce demand for a wider variety of markets that can then in turn provide greater prosperity for all.</span></p><span data-dcnode-id="5021" instrument_node="">
</span><p data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">In my view, one of the crucial flaws of modern capitalism is the huge corporations which are bailed out with public money and are then protected by governments in such a way that allows them to become virtual monopolies which is completely against the basic principles of capitalism itself.</span></p><span data-dcnode-id="5018" instrument_node="">
</span></div><span data-dcnode-id="5016" instrument_node="">
</span><div class="reply" data-dcnode-id="5011"><span data-dcnode-id="5015" instrument_node="">

</span><p data-dcnode-id="4632"><span data-dcnode-id="4637" instrument_node="">In my opinion,</span><br data-dcnode-id="4636"><span data-dcnode-id="4635" instrument_node="">
The only 'real' working society or the 'best' of the worst societies is a self-sustaining society, where trade is allowed between others to benefit each others (neighbors, strangers, other shops, and other countries. The main thing that is different with this 'ideal' society is that every one is educated in all aspects of an ideal citizen. This would include the following: Political activity (in order for the Government to be run 'by the people'), Trades (Fishing, mining, farming, dependent on the needs/demands of people and available resources) in order for all persons to be employed [Those who are not white collar material], Business, Native culture and global culture; and finally courses; mandatory and voluntary to educate parents how to train their children (in such things as communication; parent-child, child-world, values (honesty, hard work etc.), attitude, and education. As well as the preceding list.</span><br data-dcnode-id="4634"><span data-dcnode-id="4633" instrument_node="">
This system will: Cause more failing or obtuse students to still contribute and be employed, Less generation gap, less peer pressure, a government 'by and for the people', and overall a constant increase in standards of living </span></p><span data-dcnode-id="4631" instrument_node="">

</span><p data-dcnode-id="4305"><span data-dcnode-id="4320" instrument_node="">I will start this off by apologizing to whomever this may offend... Almost every point raised in this documentary is a moot point and was poorly represented. I' start at the beginning and work from there.</span><br data-dcnode-id="4319"><span data-dcnode-id="4318" instrument_node="">
First is the mortgages, for those of you who wonder how this works it is essentially you loaning your house to the back as collateral. Like any loan if you can't pay you default and object in question is repossessed. Its far from a modern concept: if you don't pay you don't get what you want.</span><br data-dcnode-id="4317"><span data-dcnode-id="4316" instrument_node="">
Next is the Reagan issue, this documentary claimed that Reagan was the cause of the increase of big business and all sorts of inflation. The first fundamental problem with that is that the graphs shown went from 1980 to 2000 and it doesn't become steep until after 1990 while Reagan was only in office from 1980 to 1988 so the "BIG BUSINESS FAVORITISM" actually would fall under the bush and Clinton administration. Another fundamental problem is the graphs are not accurately portrayed a perfect example would be in the Dow Jones the first separation occurs ant 875 the next is at 15,000 far from equal measurements, this occurs with a few others as well, while the numbers might be right the time frame and the representation are quite off.</span><br data-dcnode-id="4315"><span data-dcnode-id="4314" instrument_node="">
Number Three (feel free to correct me if I miss something),</span><br data-dcnode-id="4313"><span data-dcnode-id="4312" instrument_node="">
The corporations making money off the deaths of their employees. While it isn't something you would expect to hear it makes plenty of sense, they take care of healthcare and premiums (and dental occasionally) they spend a significant amount of money on the employee and the family so getting some back in the pocket isn't so bad. It also seemed as though the companies were being blamed for their deaths, however all of those cases were natural causes so Walmart didn't kill anyone. That brings me to the final point of this specific subject, the logic that Walmart should pay for the funeral cost is peculiar why on, using the logic applied for that should you pay for your neighbors coffin I think not.</span><br data-dcnode-id="4311"><span data-dcnode-id="4310" instrument_node="">
Next is religion, this will be short and sweet. First thing i would like to point out is capitalism is in the bible money is referenced often and even king David bought and sold things especially gold. Second if it wasn't around where would the sin greed have a chance to arise. Third though this is minor, he made a punch at capitalism using Jesus with the phrase you should deregulate banks, just throwing this out there that is a socialist inclusion into the american psuedo-capitalism. Furthermore how would using Jesus to poorly prove a point that really wasn't necessary in the video not sacrilegious.</span><br data-dcnode-id="4309"><span data-dcnode-id="4308" instrument_node="">
Next is the stock market/derivative argument, first i would like to point out the stock market didn't make derivatives you can thank sir Isaac Newton for that. Derivatives are a base part of calculus and even me being a senior in high school I can do them. The point I must emphasize is that according to this documentary wall street is responsible for the confusing derivatives the only flaw with that argument would be that he is suggesting that hundreds of years ago Isaac Newton made calculus to keep the 21st century middle class from making money. I'll stop there since its midnight where I am located</span><br data-dcnode-id="4307"><span data-dcnode-id="4306" instrument_node="">
@Erika: I would like to just throw out that your protecting Micheal Moore is a double standard, according to him capitalism is a sin because it promotes greed, however he is rich and last time i checked gluttony is a sin as well...</span></p><span data-dcnode-id="4304" instrument_node="">
</span></div><span data-dcnode-id="4302" instrument_node="">

</span><p data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">Have you ever heard an argument that was so empty and misguided you just stare with your mouth open wondering if you should even respond or just let this person lay in their ignorance?</span></p><span data-dcnode-id="4266" instrument_node="">
</span><p data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">I'll just hit one or two points. </span></p><span data-dcnode-id="4263" instrument_node="">
</span><p data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Derivatives from calculus are not the same as the derivatives on Wall Street. Look up options, such as short and put calls, covered calls, and try to understand how they work. Options are traded without ever actually owning the object the option gives you the right to sell or buy. It is the single riskiest and most lucrative investment anybody can make. You can't even trade in options with most online trading sites unless you can prove you are what they call a savvy investor. As a licensed agent/broker I have the freedom to do this, but I would not recommend anyone else do it unless they are well educated on the risks. What the banks did with options was make bets that these mortgages would fail. We call this 'selling short' or a short call. If the object loses value the person who sold the short makes a very high percentage of money. Returns on options can be 500%-1000% percent easily. The faster the value of an object falls the more money the person selling the short call makes. Goldman Sachs made billions off the failure of these mortgages. It was in their interest to see the mortgages fail.</span></p><span data-dcnode-id="4260" instrument_node="">
</span><p data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">The bible does not condone capitalism. Read Acts. In acts the apostles set up a commune with equally shared wealth. One person who tried to mislead the apostles about their contribution and wealth was instantly slain, killed, by God. In the Old Testament every seven years was a year of Jubilee. In this year you forgave all debts, let all bond servants go free, and the wealth was redistributed among the masses. This was precisely to prevent run away capitalism from destroying the Israel nation. Money is at best a necessary evil in the Bible. Jesus said render unto Caesar what is Caesar's and unto God what is God's. He was saying "don't be a part of the capitalist regime. Give them their part so you are within the law, but give yourself to God wholeheartedly"</span></p><span data-dcnode-id="4257" instrument_node="">
</span><p data-dcnode-id="4253"><span data-dcnode-id="4256" instrument_node="">One more point.</span><br data-dcnode-id="4255"><span data-dcnode-id="4254" instrument_node="">
As I mentioned above I am licensed to sell securities. Well I am also licensed with the State commissioner of insurance to sell life insurance, a.k.a Death Insurance. It is illegal for anybody or business to take out a policy with them as the beneficiary unless there is a real vested interest in that person. I could take out a life insurance policy on my babysitter, but I could not take out a life insurance policy on my Neighbor. I could not take out a life insurance policy on my paper boy, or my mail man even though I have an interest in their well being. An underwriter should deny such a policy as being illegal and if someone where to discover such a policy existed they should report the company who wrote it to the state commissioner of insurance. Companies are free to take out policies on upper management and key personnel. These people have alot of knowledge and are integral to the functioning of the business. If they die suddenly the company will suffer a significant loss. This is a reasonable justification to take out insurance on their life. However, the two people in the video, the Wal-Mart bakery worker and a middle management person at a bank are not key people that will cause a significant loss to the company. What Wal-Mart and the other companies mentioned are doing is gambling that they will be able to make a nice profit on the death of an employee. They are insuring employees who are easy to replace and would cause no significant financial loss if death were occur suddenly. These policies are on the very fringe of legality. I would argue that the companies would not be able to show they have a justified vested interest. Therefore, these policies should be illegal. What the companies have done is found a way to gamble on the lives of their employees. They have a predicted mortality rate and place bets accordingly. If their employees die as expected the company makes a nice profit. Although, this falls right on the thick gray line between legal and illegal it most definitely immoral and socially irresponsible. I would also say that since Wal-Mart had no business taking out a policy on a cake decorator in the first place it would have decent and civil of them to offer the family assistance with the burial. </span></p><span data-dcnode-id="4252" instrument_node="">
</span><p data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">Unfortunately all decency, morality, and sense of right and wrong has vacated the upper echelons of US business.</span></p><span data-dcnode-id="4249" instrument_node="">

</span><p data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">I think the title of this documentry should be, not, A Love Story; but A True Horror Story; The horror of how human beings treating other human beings for their own gain. Not giving a fiddle about the tragedy of the plight of others's life. They don't care they have the money to feed and clothe, put a roof over their heads, and a job to go to.They have the money to get good health care and the list goes on and on. While us out here stuggle to keep afloat,then to make matters wost bailing out companies who wouldn't pay their workers what was theirs.Just hand them a pink slip and say or not good luck. It's crying shame how greed can destroy lives and bring down the american people, depress and oppress us. capitalism is a good thiong if used the way it was intended, but people have made it into something evil. Throwing people out of their homes that they were in for twenty years or so . The person who commented on that should be ashamed for saying why don't they just deal with it , if you were put in the same situation how would you deal with it. taking jobs away from people and then trying to make a mortgage payment and can't then get your foreclosed does that make any sense. thought this documentry was an eye opener for the uninformed. Any way you cut it. It's pure unadulterated greed and it maked me sick to my stomach and boiled my blood to watch this. So what if Micheal Moore is filthy rich he's gone out there went to school got a degree, and works for his money. As far as him being 400lbs nunya business maybe he has a condition or just loves to eat as i know alot of people do I commend him going up against it all and informing us.Thank you Micheal</span></p><span data-dcnode-id="4209" instrument_node="">

</span><p data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">It's really not about any system or ideology, but about reason and decency. Anything working, healthy and good, can, and will be misused, corrupted and turn self-destructing and ugly in the "right hands" - for the sake of greed, power and self glory. Any system or ideology will work with the use of reason and decency. Any system or ideology will fail with the use of greed and self glory - because the outcome doesn’t lie in the name, but in the action. When wrong people misusing the names and symbols for reason and decency, where the real motivation is power, greed and self glory, they slowly but surely are destroying the society. We blindly fight over systems and ideology, blaming each other and anything externally, while the true solution all the time lies in our own motivations and everyday actions. We are as a society, right now, deeply infected with the greed-and-self-glory-virus. With other words: we are easily misled by the wrong people - and this snowball effect has no happy ending.</span></p><span data-dcnode-id="3660" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3118" itemprop="text"><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">The American middle class which arose out of post-war, and more significantly, post-depression America was of great historical significance. It was the first MASS middle class. While there were clearly Americans left out of this middle class, notably in the south where an apartheid system kept many African Americans in poverty, the post-war middle class was still larger and broader than any previous notions of middle class. Before that time, middle class status was reserved for small business owners and professionals, not for millions of blue, white and pink collar workers.</span></p><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">From the vantage of the 21st century it may seem inevitable that by the middle of the 20th century, the US would have emerged as a triumphant, affluent and middle class society, but it was far from obvious at the time. Enormous investments in physical, social and human infrastructure beginning in the late 19th century, accelerating in the 1930s, but continuing for decades after that were the collective midwife of the American middle class. </span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">Thousands of graduates of public universities, which made higher education available to almost everybody who could succeed academically, formed the backbone of the post-war middle class. Employment and training programs made it possible for people to advance their careers. Social security meant that old people would no longer live in poverty as often and that younger workers would not have to spend as much taking care of their elderly parents. Through collective bargaining, insured by the Wagner Act of 1935, labor unions were able to negotiate wages and benefits so that their members were able to join the middle class as well. Primarily because of America's ugly racial history, some groups were left out of these programs and the middle class as well, but it is clear that without these, and numerous other government interventions, the middle class as we know it would not have existed.</span></p><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">The US government played an integral role in creating, and at times maintaining the American middle class. Today the middle class is threatened both because the values that once defined it are no longer broadly shared and because the federal government has essentially renounced its partnership with the middle class. Deregulation of the finance sector, cuts to social and physical infrastructure, regressive tax policies which slashed the funds to pay for said social programs and irresponsible spending by both parties have put the middle class, and with it American society at risk. </span></p><span data-dcnode-id="3122" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">If the middle class in the US continues to whither away due to recession, constant unemployment, government policies that are not supportive of middle class Americans and that outsource jobs overseas, it will not just be formerly middle class Americans who will suffer, it will also be difficult for American society and democracy to hold together. A large and stable middle class has been central to America's wealth and stability for decades; without this middle class the country's future will be in great peril. i don't think that's too alarmist innit?</span></p><span data-dcnode-id="3119" instrument_node="">
</span></div><span data-dcnode-id="3117" instrument_node="">
</span><div class="reply" data-dcnode-id="3112"><span data-dcnode-id="3116" instrument_node="">

</span><p data-dcnode-id="2862"><span data-dcnode-id="2867" instrument_node="">I agree that to say capitolism is evil is not the right aproach. Capitolism served us fine before greed and corruption took over. Thier was a time when regulation was not needed unless it was to catch an oversight. Now it is needed not for the occasional oversight but for actuall scams and conflicts of interests- We can no longer be niave enough to believe that the system will take care of its self or that the powers that be give a damn about every day people. Capitolism breeds competition which is not always good. We in America seem to think it is always good to be in competition about everything you do. It helps to motivate us to do our best. Well its high time that we should learn that doing your best is about more than beating everyone else. It is about doing right because right is the right thing to do. When we perform at our best we get more out of this experience we call life. We understand more and gain truth. If we all did the best we could without anyone having to feel superiior or inferior we could eliminate most of the constant struggle and strife between the different peoples of this earth. In the end all would gain from the collective efforts of the whole insted of segregating and creating inequality among man kind. As long as we kling to the presemt system we will have at least one division- always. The haves and the have nots. And if thier is division we will fall eventually.</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">
So what of those who will not contribute? Do they also reap the benefit of the system? Thier in lies the rub, what do we do with those that do and can not contribute? What if they can but will not, what then? Who decides what a valid contribution is? It's never as simple as it seems is it.</span><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node="">
I heard a guy say one time that this is just a ride. "A little scary at first, then it gets fun, then you start saying wait a minute is this just a ride or is this real. And someone says hey I can see the tracks its just a ride. From where i sit in the car I can see the road, its o.k. It's just a ride. And then we kill him, we kill all the guys that try and tell us this. But thats o..k. its just a ride. We can change it right now, its easy. No hard work, no savings of money, nothing we have to learn or some great technology we must create.Its just a choice, just a simple choice-right now. Between fear and love." Bill Hicks, check him out if you have not already.</span></p><span data-dcnode-id="2861" instrument_node="">

</span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">I think capitalism can work fine if it's regulated. Problem is, since Reagan our govt has been deregulating big business/big money, supposedly in the name of a "free marketplace." However, there's no "free" market when ordinary people and small businesses can't compete with the Walmarts of the world.</span></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">We always need oversight and accountability over any power--whether the power exists within a politician or within a large &amp; wealthy corporation.</span></p><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">Some socialism is good--public schools, public roads and parks, libraries, etc. Without these resources the poor wouldn't have the resources to express a voice in our society. We need more resources, such as health care &amp; university education made available for everyone--rich and the poor.</span></p><span data-dcnode-id="2816" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Capitalism and socialism can co-exist and provide a check over each other's power. Problem is, we have too many people in our govt with ties to big business/big money. We need to bring back regulations, such as taxation of businesses that outsource work to other countries. Bush admin was giving companies tax breaks to ENCOURAGE them to outsource work to third world countries! Instead they should be penalized for the tremendous harm they've done to our country.</span></p><span data-dcnode-id="2813" instrument_node="">
</span></div><span data-dcnode-id="2811" instrument_node="">

</span><p data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">anyone complaining his info is wrong? Moore carries a $10,000 check with him everywhere he goes, and has been since his first film. That check is for any person that can prove to him just one factlet or bit of information he uses in any of his docs as purposely malicious, biased, fraudulent, or plain wrong. Not one person has ever received the check. </span></p><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Not only does he do his research, but has a network of people under him re-check those facts before he inserts them into his films. The point of a documentary is to let facts, figures, interviews, and footage speak for themselves. Personal opinions are saved for voice-overs and narration. </span></p><span data-dcnode-id="2615" instrument_node="">

</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">don't get distracted all of you take it simple, corruption is not something that is excluded to the economic or political level; selfishness, greed, fear, are all attributes that exert corruption in action to whatever, so we are talking about action, if the mind is not capable of being corrupted, bribed and sticks to what is says, means it; then such a mind can function in any system; so then carefully we can negate a search for a better system, and all that foolishness, trap we get into; in fact such a mind does not need a system at all, so for the time being most of the world lives according to some system so how is it that we can understand all the factors completely, so you see this is really a mathematical problem I have laid out in case you all are wondering of it just philosophically; generally we have such a derogatory view of what corruption is and we place it some place else, in the white house or business, or that business men are corrupt, so that means we have some image of it, but do you ever wonder if you are capable of being corrupted, conforming which is a part of corruption isn't it? this is like that thing a business man told me when talking about buying a car from a private buyer and the price is high, so he said to me all of that does not matter what he says; when he sees the cash we have the real story here</span></p><span data-dcnode-id="2208" instrument_node="">

</span><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">SteveJC</span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">I`m the same I like to have a bite back, but if you read my first comment again it wasn't an attack - perhaps I should have used the word "people" instead of "you."</span></p><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">I do agree with most of your points. I was merely trying to address the points which to me seemed the most relevant and making a sideways point that the individual's ego has very little do with economics and free market systems.</span></p><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">I absolutely cannot stand Michael Moore. He is just as corporate owned as most of the other "crusaders" and although he makes semi decent films which are anti establishment in some regards - they are never about new issues, instead rather pretending to "scoop" on already widely known facts. In some ways it's a good thing because it does make his information become even more main stream but I often wonder what "his" real agenda is. It's what people like him leave out and don't question which points to the real issues.</span></p><span data-dcnode-id="2160" instrument_node="">

</span><p data-dcnode-id="2120"><span data-dcnode-id="2123" instrument_node="">Reward.</span><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node="">
It seems that as money shifted from representing something solid in a bank vault to just a piece of paper, so reward has shifted from something spiritual to something solid, a TV, a house, a car.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2115"><span data-dcnode-id="2118" instrument_node="">Corporatism leads to a culture of reward, of profit, of greed, of corruption.</span><br data-dcnode-id="2117"><span data-dcnode-id="2116" instrument_node="">
When doctors and nurses have to leave to do something else because the financial reward isnt sufficient, yet a corporation can profit from the sick who must pay extortionate parking fees, something is wrong.</span></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">I want a society where people grow up to choose medicine over finance, public service over armed services (not that armed service is bad, but there wouldnt be such a need).</span></p><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2110" instrument_node="">Any alternative to capitalism would have to incorporate (bad choice of word I know!) parts of communism, parts of socialism, parts of capitalism.</span><br data-dcnode-id="2109"><span data-dcnode-id="2108" instrument_node="">
Of course, I'm no expert but I can see that the first step must be the awakening within people of their individual powers and rights and to relearn to take responsibility for ourselves and others. Put an end to corporations leaching off us by providing 'services' that take away personal freedoms and responsibilities.</span><br data-dcnode-id="2107"><span data-dcnode-id="2106" instrument_node="">
In the end, whatever 'ism' is given to this new system, my fear is that media manipulation will be used once again by the empowered few to coerce the newly awakened majority into conforming to producing for the top few percent.</span></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2103" instrument_node="">Hence we are doomed to constantly revolve through alternatives, from one extreme to the other.</span><br data-dcnode-id="2102"><span data-dcnode-id="2101" instrument_node="">
What we can do now though, while accepting that the corrupt few have only acted naturally by their 'survival of the fittest' instincts, is to also learn from nature and act like antibodies attacking a disease, en masse, together, united, with one aim, to make what was previously healthy, healthy again.</span></p><span data-dcnode-id="2099" instrument_node="">
</span></div><span data-dcnode-id="2097" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2047" itemprop="text"><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Yavanna, like NR before. have mentioned my ego which frankly I consider a bizarre contribution, hence my response before. I have not hurled a single insult prior to receiving one.</span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">In defence of democracy, its clear that the ideal has failed and that the system has been hijacked by corporate interests, but the shallow sheen of fairness that it has provided to the general public over recent generations has stemmed civil disorder which in turn has lead to the exceptional developments that we are benefiting from daily, unless of course you are a person (of which there are many) who fails to recognise the wonder that goes along side the injustice of the modern world.</span></p><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Now if I'm reading your post correctly you are saying like me that capitalism is not the problem, in fact I cannot think of a fairer principle than working, receiving then spending as you like. </span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">My beef with the film is the gross simplifications that he uses to make an fundamentally invalid point.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Perhaps his next film should be Electoral reform and how democracy can work. An informed and empowered populace can drive policy for the good of the majority.</span></p><span data-dcnode-id="2048" instrument_node="">

</span><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">"income disparity is inevitable in a market, the worst excesses should be tempered by an uncorrupted government."</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">My comment was a response to the economic and governmental corruption points raised in this discussion and yes I read all the comments and framed mine in response to the most relevant. I did not say "Things are terrible - don't bother to discuss!"</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Apparently THEN I had the temerity to voice an opinion which you regarded as an attack. One thing I have noticed is you are very defensive and insulting towards any commenter whom doesn't agree entirely with you. If you read something into my comments that you feel is contemptuous then you well be right, for instance I`m very unforgiving of people who try to sound clever but are not bright enough to use a spell checker.....</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">As Justin mentioned earlier the problem isn't capitalism. It is corporatism. And to go one step further, it is the power they have over governments that is the root of corruption. Remove connections between the two and there is your simple solution. How to do that would require a massive shift in how Governments are elected and who they consist of. Democracy has failed. We see the corrupt politicians and governments within democratic systems yet can do nothing about it. Politicians are not about to relinquish their power voluntarily.</span></p><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Now can YOU offer any solutions or alternatives?</span></p><span data-dcnode-id="1991" instrument_node="">

</span><p data-dcnode-id="1660"><span data-dcnode-id="1669" instrument_node="">I agree with Eric and Steve. Corruption is the key point of this film but Michael Moore doesnt emphasise it enough and generalises too much about the ideology of capitalism being flawed.</span><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">
I think his films are needed even though you must keep an open mind while watching them. For example, Sicko highlighted the injustice that 9/11 workers have suffered in the lack of healthcare provided to them and it was a truly sad scene when they went to Cuba and a woman found she was being ripped off in America for drugs available in Cuba for only a few cents. And this is the big bad 'red' Cuba they were told to be scared of? Eye opening for them and many other Americans hopefully. So, in that respect if Moores films encourage the media brainwashed to think differently, they are good. And it was done in a way that could'nt be labelled '9/11 conspiracist'.</span><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">
'Corruption : A Love Story' might have been a good film.</span><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">
I was thinking today that theres probably a handful of people who let the money men into positions of power in the Reagan era. I wonder how much of a backhander they got? Was it worth it? Did they buy the big house with it, the big car, the big TV, send the kids to Harvard to be another cog in the machine?</span><br data-dcnode-id="1662"><span data-dcnode-id="1661" instrument_node="">
Corruption is the problem and people power is the answer, as shown in the film.</span></p><span data-dcnode-id="1659" instrument_node="">

</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">eric I would say that a major component of corruption is fear, when people come into competitive positions within businesses or politics they are inevitably shaped into a mould, the only way to progress is to follow orders and replicate the actions of superiors, only in rare circumstances will a junior member of a group have any possibility of steering policy.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">I'm aware of other economic forms but they have only succeeded on paper, China has only now started to really improve the lives of its people and India's flirtation with communist economic forms within a democracy has produced little of value. Africa is a basket case of corruption and abuse by unrestrained capitalists of the western world.</span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Nobodies Right, income disparity is inevitable in a market, the worst excesses should be tempered by an uncorrupted government.</span></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Smash capitalism then try and buy a loaf of bread.</span></p><span data-dcnode-id="1611" instrument_node="">

</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">The worst Moore film in my opinion, he has taken his style of excessive simplification to new level here, to berate the market economy as an inherently evil system is a plain disservice to the gains that we enjoy in our everyday lives, it might come as a surprise to some but even people in India and Africa are glad for increasing standards of technology and life options.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">No-one will claim that the market is perfect, I believe as a social liberal that we need much stronger government intervention to prevent the excesses of greed and imbalance from limiting the markets ability to do good, but I would never lash out in simplistic terms as he has here. I grew past these views by the age of 19. </span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Really really dumb, a real disservice to the left, a shame as I like his other films despite their flaws.</span></p><span data-dcnode-id="1362" instrument_node="">
