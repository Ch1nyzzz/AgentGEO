B1B1B1" data-dcnode-id="2302"><td data-dcnode-id="2303" height="1"><img data-dcnode-id="2304" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/images/newsite/horiz_bar602.gif&amp;raw" width="603"></td></tr><tr data-dcnode-id="2286"><td align="CENTER" data-dcnode-id="2287" height="25" valign="BOTTOM"><font data-dcnode-id="2288" size="-1"><span data-dcnode-id="2301" instrument_node=""> </span><a data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/268/"><span data-dcnode-id="2300" instrument_node="">CONTENTS</span></a><span data-dcnode-id="2298" instrument_node="">&nbsp;·&nbsp;</span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/268/10/"><span data-dcnode-id="2297" instrument_node="">BOOK CONTENTS</span></a><span data-dcnode-id="2295" instrument_node="">&nbsp;·&nbsp;</span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/268/authindex.html"><span data-dcnode-id="2294" instrument_node="">INDEX TO AUTHORS</span></a><span data-dcnode-id="2292" instrument_node="">&nbsp;·&nbsp;</span><a data-dcnode-id="2290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/br/268.html"><span data-dcnode-id="2291" instrument_node="">BIBLIOGRAPHIC RECORD</span></a><span data-dcnode-id="2289" instrument_node=""> </span></font></td></tr></tbody></table></form><span data-dcnode-id="2282" instrument_node=""> </span><span data-dcnode-id="2280" instrument_node=""> </span><span data-dcnode-id="2279" instrument_node=""> </span><span data-dcnode-id="2277" instrument_node=""> </span><span data-dcnode-id="2269" instrument_node=""> </span><span data-dcnode-id="2265" instrument_node=""> </span><span data-dcnode-id="2259" instrument_node=""> </span><span data-dcnode-id="2249" instrument_node=""> </span><span data-dcnode-id="2241" instrument_node=""> </span><span data-dcnode-id="2237" instrument_node=""> </span><span data-dcnode-id="2228" instrument_node=""> </span><span data-dcnode-id="2224" instrument_node=""> </span><span data-dcnode-id="2222" instrument_node=""> </span><table align="CENTER" bgcolor="#ffffff" border="0" cellpadding="0" cellspacing="2" data-dcnode-id="2220" width="601"><tbody data-dcnode-id="2221"><tr data-dcnode-id="2270"><td align="CENTER" data-dcnode-id="2271"><span data-dcnode-id="2276" instrument_node="">&nbsp;&nbsp;The World’s Famous Orations.</span><br data-dcnode-id="2275"><span data-dcnode-id="2274" instrument_node="">America: III. (1861–1905).&nbsp;&nbsp;</span><font data-dcnode-id="2272" size="-1"><span data-dcnode-id="2273" instrument_node="">1906.</span></font></td></tr><tr data-dcnode-id="2266"><td data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2260"><td align="CENTER" data-dcnode-id="2261"><font color="#9C9C63" data-dcnode-id="2262" size="+1"><b data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">On Woman’s Right to the Suffrage</span></b></font></td></tr><tr data-dcnode-id="2256"><td data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2250"><td align="CENTER" data-dcnode-id="2251"><font color="#9C9C63" data-dcnode-id="2252"><span data-dcnode-id="2255" instrument_node="">Susan Brownell Anthony </span><font data-dcnode-id="2253" size="+0"><span data-dcnode-id="2254" instrument_node="">(1820–1906)</span></font></font></td></tr><tr data-dcnode-id="2246"><td data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2242"><td align="CENTER" data-dcnode-id="2243"><font color="#9C9C63" data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">(1873)</span></font></td></tr><tr data-dcnode-id="2238"><td data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2229"><td data-dcnode-id="2230"><table align="CENTER" data-dcnode-id="2231" width="500"><tbody data-dcnode-id="2232"><tr data-dcnode-id="2233"><td data-dcnode-id="2234"><font data-dcnode-id="2235" size="-1"><span data-dcnode-id="2236" instrument_node="">Born in 1820, died in 1906; in early life a social reformer and advocate of the suffrage and other civil rights for women, with which she remained through life closely identified.</span></font></td></tr></tbody></table></td></tr><tr data-dcnode-id="2225"><td data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2219" instrument_node=""> </span><span data-dcnode-id="2218" instrument_node=""> </span><span data-dcnode-id="2216" instrument_node=""> </span><span data-dcnode-id="2212" instrument_node=""> </span><span data-dcnode-id="2175" instrument_node=""> </span><span data-dcnode-id="2166" instrument_node=""> </span><span data-dcnode-id="2154" instrument_node=""> </span><span data-dcnode-id="2145" instrument_node=""> </span><span data-dcnode-id="2136" instrument_node=""> </span><table align="CENTER" bgcolor="#ffffff" border="0" cellpadding="3" cellspacing="0" data-dcnode-id="2134" width="601"><tbody data-dcnode-id="2135"><tr data-dcnode-id="2213"><td data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2176"><td data-dcnode-id="2182"><span data-dcnode-id="2211" instrument_node="">F</span><font data-dcnode-id="2209" size="-1"><span data-dcnode-id="2210" instrument_node="">RIENDS AND</span></font><span data-dcnode-id="2208" instrument_node=""> F</span><font data-dcnode-id="2206" size="-1"><span data-dcnode-id="2207" instrument_node="">ELLOW</span></font><span data-dcnode-id="2205" instrument_node=""> C</span><font data-dcnode-id="2203" size="-1"><span data-dcnode-id="2204" instrument_node="">ITIZENS:—</span></font><span data-dcnode-id="2202" instrument_node="">I stand</span><a data-dcnode-id="2200" name="txt1"><span data-dcnode-id="2201" instrument_node="">&nbsp;</span></a><a data-dcnode-id="2198" href="#note268.10"><span data-dcnode-id="2199" instrument_node="">1</span></a><span data-dcnode-id="2197" instrument_node=""> before you to-night under indictment for the alleged crime of having voted at the last presidential election, without having a lawful right to vote. It shall be my work this evening to prove to you that in thus voting, I not only committed no crime, but, instead, simply exercised my </span><i data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">citizen’s rights,</span></i><span data-dcnode-id="2194" instrument_node=""> guaranteed to me and all United States citizens by the National Constitution, beyond the power of any State to deny.… The preamble of the Federal Constitution says:</span><table cellpadding="1" cellspacing="1" data-dcnode-id="2184"><tbody data-dcnode-id="2185"><tr data-dcnode-id="2186"><td data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="2187"><span data-dcnode-id="2191" instrument_node="">“We, the people of the United States, in order to form a more perfect union, establish justice, insure </span><i data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">domestic</span></i><span data-dcnode-id="2188" instrument_node=""> tranquillity, provide for the common defense, promote the general welfare, and secure the blessings of liberty to ourselves and our posterity, do ordain and establish this Constitution for the United States of America.”</span></td></tr></tbody></table><span data-dcnode-id="2183" instrument_node=""> </span></td><td align="RIGHT" data-dcnode-id="2177" valign="TOP"><font data-dcnode-id="2178" size="-2"><a data-dcnode-id="2179" name="1"><i data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">&nbsp;&nbsp;1</span></i></a></font></td></tr><tr data-dcnode-id="2167"><td data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">&nbsp;&nbsp;It was we, the people; not we, the white male citizens; nor yet we, the male citizens; but we, the whole people, who formed the Union. And we formed it, not to give the blessings of liberty, but to secure them; not to the half of ourselves and the half of our posterity, but to the whole people—women as well as men. And it is a downright mockery to talk to women of their enjoyment of the blessings of liberty while they are denied the use of the only means of securing them provided by this democratic-republican government—the ballot.</span></td><td align="RIGHT" data-dcnode-id="2168" valign="TOP"><font data-dcnode-id="2169" size="-2"><a data-dcnode-id="2170" name="2"><i data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">&nbsp;&nbsp;2</span></i></a></font></td></tr><tr data-dcnode-id="2155"><td data-dcnode-id="2161"><span data-dcnode-id="2165" instrument_node="">&nbsp;&nbsp;For any State to make sex a qualification that must ever result in the disfranchisement of one entire half of the people is to pass a bill of attainder, or an </span><i data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">ex post facto</span></i><span data-dcnode-id="2162" instrument_node=""> law, and is therefore a violation of the supreme law of the land. By it the blessings of liberty are for ever withheld from women and their female posterity. To them this government has no just powers derived from the consent of the governed. To them this government is not a democracy. It is not a republic. It is an odious aristocracy; a hateful oligarchy of sex; the most hateful aristocracy ever established on the face of the globe; an oligarchy of wealth, where the rich govern the poor. An oligarchy of learning, where the educated govern the ignorant, or even an oligarchy of race, where the Saxon rules the African, might be endured; but this oligarchy of sex, which makes father, brothers, husband, sons, the oligarchs over the mother and sisters, the wife and daughters of every household—which ordains all men sovereigns, all women subjects, carries dissension, discord and rebellion into every home of the nation.</span></td><td align="RIGHT" data-dcnode-id="2156" valign="TOP"><font data-dcnode-id="2157" size="-2"><a data-dcnode-id="2158" name="3"><i data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">&nbsp;&nbsp;3</span></i></a></font></td></tr><tr data-dcnode-id="2146"><td data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">&nbsp;&nbsp;Webster, Worcester and Bouvier all define a citizen to be a person in the United States, entitled to vote and hold office.</span></td><td align="RIGHT" data-dcnode-id="2147" valign="TOP"><font data-dcnode-id="2148" size="-2"><a data-dcnode-id="2149" name="4"><i data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">&nbsp;&nbsp;4</span></i></a></font></td></tr><tr data-dcnode-id="2137"><td data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">&nbsp;&nbsp;The only question left to be settled now is: Are women persons? And I hardly believe any of our opponents will have the hardihood to say they are not. Being persons, then, women are citizens; and no State has a right to make any law, or to enforce any old law, that shall abridge their privileges or immunities. Hence, every discrimination against women in the constitutions and laws of the several States is to-day null and void, precisely as in every one against negroes.</span></td><td align="RIGHT" data-dcnode-id="2138" valign="TOP"><font data-dcnode-id="2139" size="-2"><a data-dcnode-id="2140" name="5"><i data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">&nbsp;&nbsp;5</span></i></a></font></td></tr></tbody></table><span data-dcnode-id="2133" instrument_node=""> </span><span data-dcnode-id="2120" instrument_node=""> </span><span data-dcnode-id="2116" instrument_node=""> </span><table align="CENTER" cellpadding="3" data-dcnode-id="2114" width="600"><tbody data-dcnode-id="2115"><tr data-dcnode-id="2130"><td data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2121"><td data-dcnode-id="2122"><a data-dcnode-id="2127" name="note268.10"><b data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Note 1. </span></b></a><span data-dcnode-id="2126" instrument_node="">Delivered in 1873 after she had been arrested, put on trial, and fined one hundred dollars for voting at the presidential election in 1872. She refused to pay the fine and never did pay it.&nbsp;[</span><a data-dcnode-id="2124" href="#txt1"><span data-dcnode-id="2125" instrument_node="">back</span></a><span data-dcnode-id="2123" instrument_node="">]</span></td></tr><tr data-dcnode-id="2117"><td data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2113" instrument_node=""> </span><span data-dcnode-id="2111" instrument_node=""> </span><span data-dcnode-id="2109" instrument_node=""> </span><span data-dcnode-id="2108" instrument_node=""> </span><span data-dcnode-id="2089" instrument_node=""> </span><span data-dcnode-id="2085" instrument_node=""> </span><span data-dcnode-id="2060" instrument_node=""> </span><span data-dcnode-id="2059" instrument_node=""> </span><span data-dcnode-id="2055" instrument_node=""> </span><span data-dcnode-id="2053" instrument_node=""> </span><span data-dcnode-id="2049" instrument_node=""> </span><span data-dcnode-id="121" instrument_node="">
