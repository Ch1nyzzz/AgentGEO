</span></p><p data-dcnode-id="7923"><span data-dcnode-id="7940" instrument_node="">Sexual assault is any involuntary sexual act in which a person is threatened, coerced, or forced to engage against their will, or any sexual touching of a person who has not consented. This includes but is not limited to </span><a data-dcnode-id="7938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rape" title="Rape"><span data-dcnode-id="7939" instrument_node="">rape</span></a><span data-dcnode-id="7937" instrument_node=""> (forcible </span><a data-dcnode-id="7935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_penetration" title="Sexual penetration"><span data-dcnode-id="7936" instrument_node="">sexual penetration</span></a><span data-dcnode-id="7934" instrument_node="">), </span><a data-dcnode-id="7932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Groping" title="Groping"><span data-dcnode-id="7933" instrument_node="">groping</span></a><span data-dcnode-id="7931" instrument_node="">, forced kissing, or the torture of the victim in a sexual manner.</span><sup class="reference" data-dcnode-id="7928" id="cite_ref-71"><a data-dcnode-id="7929" href="#cite_note-71"><span data-dcnode-id="7930" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="7925" id="cite_ref-72"><a data-dcnode-id="7926" href="#cite_note-72"><span data-dcnode-id="7927" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7924" instrument_node=""> In legal terms, sexual assault is a statutory offense in the United States, varying widely state-to-state.
</span></p><p data-dcnode-id="7911"><span data-dcnode-id="7922" instrument_node="">Outside of law, the term </span><i data-dcnode-id="7920"><span data-dcnode-id="7921" instrument_node="">rape </span></i><span data-dcnode-id="7919" instrument_node="">has a less distinguished meaning and is often used interchangeably with sexual assault.</span><sup class="reference" data-dcnode-id="7916" id="cite_ref-Victimology:_Theories_and_Applications_73-0"><a data-dcnode-id="7917" href="#cite_note-Victimology:_Theories_and_Applications-73"><span data-dcnode-id="7918" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="7913" id="cite_ref-Violence_against_women_74-0"><a data-dcnode-id="7914" href="#cite_note-Violence_against_women-74"><span data-dcnode-id="7915" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7912" instrument_node="">
</span></p><p data-dcnode-id="7901"><span data-dcnode-id="7910" instrument_node="">Most rape victims are in their teens or young twenties: according to a study by the CDC and Department of Justice, 83% of rape victims interviewed were under the age of 25, and 54% were under the age of 18. 1 in 6 women had been raped in the study, and 1 in 33 men.</span><sup class="reference" data-dcnode-id="7907" id="cite_ref-Rape_stats_75-0"><a data-dcnode-id="7908" href="#cite_note-Rape_stats-75"><span data-dcnode-id="7909" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7906" instrument_node=""> 1 in 5 women and 1 in 7 men who have experienced sexual violence first experienced this through dating violence as a teen.</span><sup class="reference" data-dcnode-id="7903" id="cite_ref-February_message_76-0"><a data-dcnode-id="7904" href="#cite_note-February_message-76"><span data-dcnode-id="7905" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7902" instrument_node="">
</span></p><p data-dcnode-id="7877"><span data-dcnode-id="7900" instrument_node="">Teen sexual violence does not always equate with </span><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Date_rape" title="Date rape"><span data-dcnode-id="7899" instrument_node="">date rape</span></a><span data-dcnode-id="7897" instrument_node="">, as the term might suggest; the term </span><i data-dcnode-id="7895"><span data-dcnode-id="7896" instrument_node="">date rape</span></i><span data-dcnode-id="7894" instrument_node=""> may describe </span><a class="mw-redirect" data-dcnode-id="7892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drug_facilitated_sexual_assault" title="Drug facilitated sexual assault"><span data-dcnode-id="7893" instrument_node="">drug facilitated sexual assault</span></a><span data-dcnode-id="7891" instrument_node=""> (using drugs and/or alcohol), or a case of </span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acquaintance_rape" title="Acquaintance rape"><span data-dcnode-id="7890" instrument_node="">acquaintance rape</span></a><span data-dcnode-id="7888" instrument_node=""> (usually sexual assault by someone the victim doesn't know well, or just met).</span><sup class="reference" data-dcnode-id="7885" id="cite_ref-womenshealth.gov_77-0"><a data-dcnode-id="7886" href="#cite_note-womenshealth.gov-77"><span data-dcnode-id="7887" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="7882" id="cite_ref-sa.rochester.edu_78-0"><a data-dcnode-id="7883" href="#cite_note-sa.rochester.edu-78"><span data-dcnode-id="7884" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="7879" id="cite_ref-79"><a data-dcnode-id="7880" href="#cite_note-79"><span data-dcnode-id="7881" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7878" instrument_node="">
</span></p><span data-dcnode-id="7876" instrument_node="">
</span><h2 data-dcnode-id="7866"><span class="mw-headline" data-dcnode-id="7874" id="Legal_issues"><span data-dcnode-id="7875" instrument_node="">Legal issues</span></span><span class="mw-editsection" data-dcnode-id="7867"><span class="mw-editsection-bracket" data-dcnode-id="7872"><span data-dcnode-id="7873" instrument_node="">[</span></span><a data-dcnode-id="7870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: Legal issues"><span data-dcnode-id="7871" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7868"><span data-dcnode-id="7869" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7865" instrument_node="">
</span><h3 data-dcnode-id="7855"><span class="mw-headline" data-dcnode-id="7863" id="Legal_access_to_sexual_health_services"><span data-dcnode-id="7864" instrument_node="">Legal access to sexual health services</span></span><span class="mw-editsection" data-dcnode-id="7856"><span class="mw-editsection-bracket" data-dcnode-id="7861"><span data-dcnode-id="7862" instrument_node="">[</span></span><a data-dcnode-id="7859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Legal access to sexual health services"><span data-dcnode-id="7860" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7857"><span data-dcnode-id="7858" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7854" instrument_node="">
</span><p data-dcnode-id="7845"><span data-dcnode-id="7853" instrument_node="">Although young people ages 15-24 in the US bear a disproportionate burden of both new and prevalent </span><sup class="reference" data-dcnode-id="7850" id="cite_ref-80"><a data-dcnode-id="7851" href="#cite_note-80"><span data-dcnode-id="7852" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="7847" id="cite_ref-81"><a data-dcnode-id="7848" href="#cite_note-81"><span data-dcnode-id="7849" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7846" instrument_node=""> chlamydial and gonorrheal infections, young people face unique legal barriers to accessing screening and treatment for STIs, contraception, or abortion.
</span></p><span data-dcnode-id="7844" instrument_node="">
</span><h4 data-dcnode-id="7834"><span class="mw-headline" data-dcnode-id="7842" id="Right_to_medical_consent"><span data-dcnode-id="7843" instrument_node="">Right to medical consent</span></span><span class="mw-editsection" data-dcnode-id="7835"><span class="mw-editsection-bracket" data-dcnode-id="7840"><span data-dcnode-id="7841" instrument_node="">[</span></span><a data-dcnode-id="7838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: Right to medical consent"><span data-dcnode-id="7839" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7836"><span data-dcnode-id="7837" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7833" instrument_node="">
</span><p data-dcnode-id="7821"><span data-dcnode-id="7832" instrument_node="">In the US,&nbsp;the legal rights of minors to </span><a data-dcnode-id="7830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consent" title="Consent"><span data-dcnode-id="7831" instrument_node="">consent</span></a><span data-dcnode-id="7829" instrument_node=""> to STI screening and treatment varies on a state by state level, and the right to </span><a data-dcnode-id="7827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confidentiality" title="Confidentiality"><span data-dcnode-id="7828" instrument_node="">confidential</span></a><span data-dcnode-id="7826" instrument_node=""> access to these services varies as well.</span><sup class="reference" data-dcnode-id="7823" id="cite_ref-:0_82-0"><a data-dcnode-id="7824" href="#cite_note-:0-82"><span data-dcnode-id="7825" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7822" instrument_node=""> This inconsistency in policies between states may lead to confusion and misinformation about what services a young person has a right to access and when there might be risks of parental notification or loss of confidentiality.
</span></p><p data-dcnode-id="7812"><span data-dcnode-id="7820" instrument_node="">In all 50 states and the District of Columbia, at least some minors (under the legal </span><a data-dcnode-id="7818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_majority" title="Age of majority"><span data-dcnode-id="7819" instrument_node="">age of majority</span></a><span data-dcnode-id="7817" instrument_node="">) are permitted to independently&nbsp;(without parental permission or input) consent to STI services. However, there is variation in the age at which this right to consent begins. For example, Illinois allows minors consent to STI services beginning at age 12, but in Hawaii, the right to consent to STI screening begins at age 14. In New Jersey, all individuals regardless of age may consent to chlamydia and gonorrhea screening, but may only consent to HIV screening beginning at age 13.</span><sup class="reference" data-dcnode-id="7814" id="cite_ref-:0_82-1"><a data-dcnode-id="7815" href="#cite_note-:0-82"><span data-dcnode-id="7816" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7813" instrument_node="">
</span></p><span data-dcnode-id="7811" instrument_node="">
</span><h4 data-dcnode-id="7801"><span class="mw-headline" data-dcnode-id="7809" id="Right_to_confidentiality_and_parental_notification_requirements"><span data-dcnode-id="7810" instrument_node="">Right to confidentiality and parental notification requirements</span></span><span class="mw-editsection" data-dcnode-id="7802"><span class="mw-editsection-bracket" data-dcnode-id="7807"><span data-dcnode-id="7808" instrument_node="">[</span></span><a data-dcnode-id="7805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D14" title="Edit section: Right to confidentiality and parental notification requirements"><span data-dcnode-id="7806" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7803"><span data-dcnode-id="7804" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7800" instrument_node="">
</span><p data-dcnode-id="7787"><span data-dcnode-id="7799" instrument_node="">Even in situations where a minor has a legal right to consent to testing or treatment for chlamydia or gonorrhea, 18 states allow a physician to inform a minor's parents that their child has requested or has received STI screening or treatment if the physician deems it in the patient's best interests.</span><sup class="reference" data-dcnode-id="7796" id="cite_ref-:0_82-2"><a data-dcnode-id="7797" href="#cite_note-:0-82"><span data-dcnode-id="7798" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7795" instrument_node=""> 37 states require </span><a class="mw-redirect" data-dcnode-id="7793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parental_involvement_%28abortion%29" title="Parental involvement (abortion)"><span data-dcnode-id="7794" instrument_node="">parental involvement</span></a><span data-dcnode-id="7792" instrument_node=""> in a minor's decision to have an abortion,</span><sup class="reference" data-dcnode-id="7789" id="cite_ref-83"><a data-dcnode-id="7790" href="#cite_note-83"><span data-dcnode-id="7791" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7788" instrument_node=""> notification often being a requirement even when parental permission is not.
</span></p><span data-dcnode-id="7786" instrument_node="">
</span><h5 data-dcnode-id="7776"><span class="mw-headline" data-dcnode-id="7784" id="Confidentiality_exceptions_in_insurance_billing"><span data-dcnode-id="7785" instrument_node="">Confidentiality exceptions in insurance billing</span></span><span class="mw-editsection" data-dcnode-id="7777"><span class="mw-editsection-bracket" data-dcnode-id="7782"><span data-dcnode-id="7783" instrument_node="">[</span></span><a data-dcnode-id="7780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D15" title="Edit section: Confidentiality exceptions in insurance billing"><span data-dcnode-id="7781" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7778"><span data-dcnode-id="7779" instrument_node="">]</span></span></span></h5><span data-dcnode-id="7775" instrument_node="">
</span><p data-dcnode-id="7762"><span data-dcnode-id="7774" instrument_node="">Individuals age 18 or above have a right to consent to and receive confidential STI screening and treatment, as they are legal adults. However, in the US, the Affordable Care Act allows young people who are dependents on their parents' private health insurance plans to retain coverage until age 26.</span><sup class="reference" data-dcnode-id="7771" id="cite_ref-84"><a data-dcnode-id="7772" href="#cite_note-84"><span data-dcnode-id="7773" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7770" instrument_node=""> Billing practices where the </span><a data-dcnode-id="7768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Explanation_of_benefits" title="Explanation of benefits"><span data-dcnode-id="7769" instrument_node="">explanation of benefits</span></a><span data-dcnode-id="7767" instrument_node=""> for care are sent to the insurance policyholder pose a barrier to confidentiality even in adolescents who have a legal right to confidential sexual health services.</span><sup class="reference" data-dcnode-id="7764" id="cite_ref-85"><a data-dcnode-id="7765" href="#cite_note-85"><span data-dcnode-id="7766" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7763" instrument_node="">
</span></p><p data-dcnode-id="7756"><span data-dcnode-id="7761" instrument_node="">2020 US Census Bureau estimates for insurance coverage type in individuals up to age 25 suggest that over 60% of young people in this age range are privately insured.</span><sup class="reference" data-dcnode-id="7758" id="cite_ref-86"><a data-dcnode-id="7759" href="#cite_note-86"><span data-dcnode-id="7760" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7757" instrument_node=""> Although these numbers do not differentiate between private insurance coverage through a parent or through an individual's own workplace, these percentages suggest that insurance billing practices for privately insured dependents pose a significant risk for loss of confidentiality.
</span></p><span data-dcnode-id="7755" instrument_node="">
</span><h3 data-dcnode-id="7745"><span class="mw-headline" data-dcnode-id="7753" id="Sexting"><span data-dcnode-id="7754" instrument_node="">Sexting</span></span><span class="mw-editsection" data-dcnode-id="7746"><span class="mw-editsection-bracket" data-dcnode-id="7751"><span data-dcnode-id="7752" instrument_node="">[</span></span><a data-dcnode-id="7749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D16" title="Edit section: Sexting"><span data-dcnode-id="7750" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7747"><span data-dcnode-id="7748" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7744" instrument_node="">
</span><link data-dcnode-id="7743" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7739" role="note"><span data-dcnode-id="7742" instrument_node="">Main article: </span><a data-dcnode-id="7740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexting" title="Sexting"><span data-dcnode-id="7741" instrument_node="">Sexting</span></a></div><span data-dcnode-id="7738" instrument_node="">
</span><p data-dcnode-id="7730"><a data-dcnode-id="7736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexting" title="Sexting"><span data-dcnode-id="7737" instrument_node="">Sexting</span></a><span data-dcnode-id="7735" instrument_node="">, the sending of sexually explicit messages and/or photographs, has become increasingly popular with adolescents.  However, according to some studies, sexting can "glamorize and normalize sex in a way that might cause some teenagers to start having sex earlier, or in unhealthy ways."</span><sup class="reference" data-dcnode-id="7732" id="cite_ref-McCarthy_87-0"><a data-dcnode-id="7733" href="#cite_note-McCarthy-87"><span data-dcnode-id="7734" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7731" instrument_node="">
</span></p><p data-dcnode-id="7712"><span data-dcnode-id="7729" instrument_node="">More than one fifth of teens have sent sexually suggestive text messages or nude photographs of themselves online.</span><sup class="reference" data-dcnode-id="7726" id="cite_ref-sexting_88-0"><a data-dcnode-id="7727" href="#cite_note-sexting-88"><span data-dcnode-id="7728" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7725" instrument_node="">  Teens who photograph or film themselves or receive photos of others, known as sexting, can be charged with child pornography.</span><sup class="reference" data-dcnode-id="7722" id="cite_ref-A.H._89-0"><a data-dcnode-id="7723" href="#cite_note-A.H.-89"><span data-dcnode-id="7724" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7721" instrument_node="">  Others who post the photos online could also be charged with child pornography and face prison time.</span><sup class="reference" data-dcnode-id="7718" id="cite_ref-childporn_90-0"><a data-dcnode-id="7719" href="#cite_note-childporn-90"><span data-dcnode-id="7720" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7717" instrument_node=""> Sexting can be considered sexual harassment.</span><sup class="reference" data-dcnode-id="7714" id="cite_ref-McCarthy_87-1"><a data-dcnode-id="7715" href="#cite_note-McCarthy-87"><span data-dcnode-id="7716" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7713" instrument_node="">
</span></p><p data-dcnode-id="7706"><span data-dcnode-id="7711" instrument_node="">Sexting is linked to psychological distress among teens. Those involved in sexting are more likely to report a suicide attempt, and have twice the odds of reporting depressive symptoms as students who aren't involved in sexting.  "For girls who send the sexts ... there is a disillusionment and a sense of betrayal when it's posted everywhere. When it gets forwarded to multiple boys at multiple schools and also other girls ... a girl starts getting called names and her reputation is ruined."</span><sup class="reference" data-dcnode-id="7708" id="cite_ref-firstcoastnews.com_91-0"><a data-dcnode-id="7709" href="#cite_note-firstcoastnews.com-91"><span data-dcnode-id="7710" instrument_node="">[90]</span></a></sup><span data-dcnode-id="7707" instrument_node="">
</span></p><p data-dcnode-id="7700"><span data-dcnode-id="7705" instrument_node="">Boys who are victims of sexually predatory teenage girls can also be devastated.  Sexually predatory girls will ask a boy, particularly a sexually naive boy, for photos, and "he's sort of flattered and he feels like a big guy and then she sends them around."</span><sup class="reference" data-dcnode-id="7702" id="cite_ref-firstcoastnews.com_91-1"><a data-dcnode-id="7703" href="#cite_note-firstcoastnews.com-91"><span data-dcnode-id="7704" instrument_node="">[90]</span></a></sup><span data-dcnode-id="7701" instrument_node="">  Unbeknownst to them at the time, their compliance can cause lasting harm.
</span></p><p data-dcnode-id="7694"><span data-dcnode-id="7699" instrument_node="">Often girls who take racy photos of themselves "want to be admired, want someone to want them. A lot of them are lonely and starved for attention. A lot of girls believe they have no choice but to pose in this way. There are also the thrill seekers who do it because it's 'edgy and cool.'"</span><sup class="reference" data-dcnode-id="7696" id="cite_ref-childporn_90-1"><a data-dcnode-id="7697" href="#cite_note-childporn-90"><span data-dcnode-id="7698" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7695" instrument_node="">
</span></p><p data-dcnode-id="7684"><span data-dcnode-id="7693" instrument_node="">Experts say that sexting poses a serious problem, partly because teens do not understand that the images are permanent and can be spread quickly.  "It does not click that what they're doing is destructive, let alone illegal."</span><sup class="reference" data-dcnode-id="7690" id="cite_ref-Keane_92-0"><a data-dcnode-id="7691" href="#cite_note-Keane-92"><span data-dcnode-id="7692" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7689" instrument_node="">  "Once they are out there, it spreads like a virus," police say.</span><sup class="reference" data-dcnode-id="7686" id="cite_ref-Boyle_93-0"><a data-dcnode-id="7687" href="#cite_note-Boyle-93"><span data-dcnode-id="7688" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7685" instrument_node="">
</span></p><span data-dcnode-id="7683" instrument_node="">
</span><h3 data-dcnode-id="7673"><span class="mw-headline" data-dcnode-id="7681" id="Age_of_consent"><span data-dcnode-id="7682" instrument_node="">Age of consent</span></span><span class="mw-editsection" data-dcnode-id="7674"><span class="mw-editsection-bracket" data-dcnode-id="7679"><span data-dcnode-id="7680" instrument_node="">[</span></span><a data-dcnode-id="7677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D17" title="Edit section: Age of consent"><span data-dcnode-id="7678" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7675"><span data-dcnode-id="7676" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7672" instrument_node="">
</span><link data-dcnode-id="7671" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7664" role="note"><span data-dcnode-id="7670" instrument_node="">Main articles: </span><a data-dcnode-id="7668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ages_of_consent_in_the_United_States" title="Ages of consent in the United States"><span data-dcnode-id="7669" instrument_node="">Ages of consent in the United States</span></a><span data-dcnode-id="7667" instrument_node=""> and </span><a data-dcnode-id="7665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statutory_rape" title="Statutory rape"><span data-dcnode-id="7666" instrument_node="">Statutory rape</span></a></div><span data-dcnode-id="7663" instrument_node="">
</span><link data-dcnode-id="7662" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7657" role="note"><span data-dcnode-id="7661" instrument_node="">For a comprehensive list of ages state-by-state, see </span><a data-dcnode-id="7659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ages_of_consent_in_the_United_States%23State_laws" title="Ages of consent in the United States"><span data-dcnode-id="7660" instrument_node="">Ages of consent in the United States §&nbsp;State laws</span></a><span data-dcnode-id="7658" instrument_node="">.</span></div><span data-dcnode-id="7656" instrument_node="">
</span><p data-dcnode-id="7651"><span data-dcnode-id="7655" instrument_node="">Each state has its own </span><a data-dcnode-id="7653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_consent" title="Age of consent"><span data-dcnode-id="7654" instrument_node="">age of consent</span></a><span data-dcnode-id="7652" instrument_node="">. Currently, state laws designate the age of consent as 16, 17, or 18, with more than half of the states designating 16 as the age limit. However, the five most populous states all have a higher age of consent (California: 18, Texas: 17, Florida: 18, New York: 17 and Illinois: 17).
</span></p><p data-dcnode-id="7637"><span data-dcnode-id="7650" instrument_node="">In some common law jurisdictions, statutory rape is sexual activity in which one person is below the age required to legally consent to the behavior.</span><sup class="reference" data-dcnode-id="7647" id="cite_ref-ojjdp_94-0"><a data-dcnode-id="7648" href="#cite_note-ojjdp-94"><span data-dcnode-id="7649" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7646" instrument_node=""> Although it usually refers to adults engaging in sex with minors under the age of consent,</span><sup class="reference" data-dcnode-id="7643" id="cite_ref-ojjdp_94-1"><a data-dcnode-id="7644" href="#cite_note-ojjdp-94"><span data-dcnode-id="7645" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7642" instrument_node=""> it is a generic term, and very few jurisdictions use the actual term "statutory rape" in the language of statutes.</span><sup class="reference" data-dcnode-id="7639" id="cite_ref-ovc_95-0"><a data-dcnode-id="7640" href="#cite_note-ovc-95"><span data-dcnode-id="7641" instrument_node="">[94]</span></a></sup><span data-dcnode-id="7638" instrument_node="">
</span></p><p data-dcnode-id="7631"><span data-dcnode-id="7636" instrument_node="">In statutory rape, overt force or threat need not be present. The laws presume coercion, because a minor or mentally challenged adult is legally incapable of giving consent to the act. Statutory rape laws are based on the premise that until a person reaches a certain age, he or she is legally incapable of consenting to sexual intercourse. Thus, even if a minor engages in sexual intercourse willingly, the intercourse is not consensual.</span><sup class="reference" data-dcnode-id="7633" id="cite_ref-gutt2_96-0"><a data-dcnode-id="7634" href="#cite_note-gutt2-96"><span data-dcnode-id="7635" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7632" instrument_node="">
</span></p><p data-dcnode-id="7619"><span data-dcnode-id="7630" instrument_node="">Often, teenage couples engage in sexual conduct as part of an intimate relationship. This may occur before either participant has reached the age of consent, or after one has but the other has not. In the latter case, in most jurisdictions, the person who has reached the age of consent is guilty of statutory rape. In some jurisdictions (such as California), if two minors have sex with each other, they are both guilty of engaging in unlawful sex with the other person.</span><sup class="reference" data-dcnode-id="7627" id="cite_ref-97"><a data-dcnode-id="7628" href="#cite_note-97"><span data-dcnode-id="7629" instrument_node="">[96]</span></a></sup><sup class="reference" data-dcnode-id="7624" id="cite_ref-98"><a data-dcnode-id="7625" href="#cite_note-98"><span data-dcnode-id="7626" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7623" instrument_node=""> The act itself is </span><a data-dcnode-id="7621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prima_facie" title="Prima facie"><span data-dcnode-id="7622" instrument_node="">prima facie</span></a><span data-dcnode-id="7620" instrument_node=""> evidence of guilt when one participant is incapable of legally consenting.
</span></p><p data-dcnode-id="7614"><span data-dcnode-id="7618" instrument_node="">Some jurisdictions have passed so-called "</span><a class="mw-redirect" data-dcnode-id="7616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romeo_and_Juliet_laws" title="Romeo and Juliet laws"><span data-dcnode-id="7617" instrument_node="">Romeo and Juliet laws</span></a><span data-dcnode-id="7615" instrument_node="">," which serve to reduce or eliminate the penalty of the crime in cases where the couple's age difference is minor and the sexual contact would not have been rape if both partners were legally able to give consent.
</span></p><span data-dcnode-id="7613" instrument_node="">
</span><h2 data-dcnode-id="7603"><span class="mw-headline" data-dcnode-id="7611" id="Social_and_cultural_influences"><span data-dcnode-id="7612" instrument_node="">Social and cultural influences</span></span><span class="mw-editsection" data-dcnode-id="7604"><span class="mw-editsection-bracket" data-dcnode-id="7609"><span data-dcnode-id="7610" instrument_node="">[</span></span><a data-dcnode-id="7607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D18" title="Edit section: Social and cultural influences"><span data-dcnode-id="7608" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7602" instrument_node="">
</span><h3 data-dcnode-id="7592"><span class="mw-headline" data-dcnode-id="7600" id="Media"><span data-dcnode-id="7601" instrument_node="">Media</span></span><span class="mw-editsection" data-dcnode-id="7593"><span class="mw-editsection-bracket" data-dcnode-id="7598"><span data-dcnode-id="7599" instrument_node="">[</span></span><a data-dcnode-id="7596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D19" title="Edit section: Media"><span data-dcnode-id="7597" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7594"><span data-dcnode-id="7595" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7591" instrument_node="">
</span><link data-dcnode-id="7590" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7586" role="note"><span data-dcnode-id="7589" instrument_node="">Main article: </span><a data-dcnode-id="7587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Media_and_American_adolescent_sexuality" title="Media and American adolescent sexuality"><span data-dcnode-id="7588" instrument_node="">Media and American adolescent sexuality</span></a></div><span data-dcnode-id="7585" instrument_node="">
</span><p data-dcnode-id="7565"><span data-dcnode-id="7584" instrument_node="">The </span><a data-dcnode-id="7582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Academy_of_Pediatrics" title="American Academy of Pediatrics"><span data-dcnode-id="7583" instrument_node="">American Academy of Pediatrics</span></a><span data-dcnode-id="7581" instrument_node=""> has argued that media representations of sexuality may influence teen sexual behavior;</span><sup class="reference" data-dcnode-id="7578" id="cite_ref-PED_media_31-1"><a data-dcnode-id="7579" href="#cite_note-PED_media-31"><span data-dcnode-id="7580" instrument_node="">[31]</span></a></sup><span data-dcnode-id="7577" instrument_node=""> this view is supported by various scholars,</span><sup class="reference" data-dcnode-id="7574" id="cite_ref-depts.washington.edu_99-0"><a data-dcnode-id="7575" href="#cite_note-depts.washington.edu-99"><span data-dcnode-id="7576" instrument_node="">[98]</span></a></sup><sup class="reference" data-dcnode-id="7571" id="cite_ref-Strasburger_100-0"><a data-dcnode-id="7572" href="#cite_note-Strasburger-100"><span data-dcnode-id="7573" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7570" instrument_node=""> while other scholars disagree.</span><sup class="reference" data-dcnode-id="7567" id="cite_ref-Steinberg_101-0"><a data-dcnode-id="7568" href="#cite_note-Steinberg-101"><span data-dcnode-id="7569" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7566" instrument_node="">
</span></p><p data-dcnode-id="7551"><span data-dcnode-id="7564" instrument_node="">Research indicates that sexual messages contained in film, television, and music are becoming more explicit in dialog, lyrics, and behavior. In television programming aimed at teens, more than 90% of episodes had at least one sexual reference in it with an average of 7.9 references per hour.</span><sup class="reference" data-dcnode-id="7561" id="cite_ref-aubrey_102-0"><a data-dcnode-id="7562" href="#cite_note-aubrey-102"><span data-dcnode-id="7563" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7560" instrument_node=""> Researchers have found a correlation between the amount of television with high sexual content that teenagers watch and an increased likelihood of them becoming pregnant or fathering a child out of wedlock, and believe that reducing the amount of sexual content adolescents watch on television could substantially reduce the teen pregnancy rate.</span><sup class="reference" data-dcnode-id="7557" id="cite_ref-tv_sex_103-0"><a data-dcnode-id="7558" href="#cite_note-tv_sex-103"><span data-dcnode-id="7559" instrument_node="">[102]</span></a></sup><span data-dcnode-id="7556" instrument_node=""> By contrast, other scholars have argued that such claims have been premature; Steinberg and Monahan found that media effects diminished once other factors were controlled.</span><sup class="reference" data-dcnode-id="7553" id="cite_ref-Steinberg_101-1"><a data-dcnode-id="7554" href="#cite_note-Steinberg-101"><span data-dcnode-id="7555" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7552" instrument_node="">
</span></p><p data-dcnode-id="7535"><span data-dcnode-id="7550" instrument_node="">Scholarly studies suggest that approximately 15% of youth intentionally seek </span><a data-dcnode-id="7548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pornography" title="Pornography"><span data-dcnode-id="7549" instrument_node="">pornography</span></a><span data-dcnode-id="7547" instrument_node=""> in a given year.</span><sup class="reference" data-dcnode-id="7544" id="cite_ref-Ybarra_104-0"><a data-dcnode-id="7545" href="#cite_note-Ybarra-104"><span data-dcnode-id="7546" instrument_node="">[103]</span></a></sup><span data-dcnode-id="7543" instrument_node=""> Donna Freitas, author of </span><i data-dcnode-id="7541"><span data-dcnode-id="7542" instrument_node="">The End of Sex: How Hookup Culture is Leaving a Generation Unhappy, Sexually Unfulfilled, and Confused About Intimacy</span></i><span data-dcnode-id="7540" instrument_node="">, has this to say about porn:</span><sup class="reference" data-dcnode-id="7537" id="cite_ref-Freitas_30-2"><a data-dcnode-id="7538" href="#cite_note-Freitas-30"><span data-dcnode-id="7539" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7536" instrument_node="">
</span></p><span data-dcnode-id="7534" instrument_node="">
</span><blockquote data-dcnode-id="7531"><p data-dcnode-id="7532"><span data-dcnode-id="7533" instrument_node="">Many boys learn to assume that the things women do in porn—how they dress and act around men—is also how women are supposed to act in real life. These same boys are learning to expect girls their own age to act like the women in porn videos, too&nbsp; ... &nbsp;Social media and Internet porn are influencing junior-high and high-school girls' understanding of sexiness. Girls are learning to use porn and porn archetypes to impress boys as early as middle school.</span></p></blockquote><span data-dcnode-id="7530" instrument_node="">
</span><h3 data-dcnode-id="7520"><span class="mw-headline" data-dcnode-id="7528" id="Peers"><span data-dcnode-id="7529" instrument_node="">Peers</span></span><span class="mw-editsection" data-dcnode-id="7521"><span class="mw-editsection-bracket" data-dcnode-id="7526"><span data-dcnode-id="7527" instrument_node="">[</span></span><a data-dcnode-id="7524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D20" title="Edit section: Peers"><span data-dcnode-id="7525" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7522"><span data-dcnode-id="7523" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7519" instrument_node="">
</span><p data-dcnode-id="7509"><span data-dcnode-id="7518" instrument_node="">Both boys and girls feel pressure from their friends to have sex. The perception adolescents have of their best friends' sexual behavior has a significant association with their own sex behavior.</span><sup class="reference" data-dcnode-id="7515" id="cite_ref-Prinstein_105-0"><a data-dcnode-id="7516" href="#cite_note-Prinstein-105"><span data-dcnode-id="7517" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7514" instrument_node="">  Sexually active peers have a negative effect on adolescent sexual delay; however, responsive parent-adolescent sex discussions can buffer these effects.</span><sup class="reference" data-dcnode-id="7511" id="cite_ref-Fasula_106-0"><a data-dcnode-id="7512" href="#cite_note-Fasula-106"><span data-dcnode-id="7513" instrument_node="">[105]</span></a></sup><span data-dcnode-id="7510" instrument_node="">
</span></p><p data-dcnode-id="7503"><span data-dcnode-id="7508" instrument_node="">In a 2003 study, 89% of girls reported feeling pressured by boys to have sex, while 49% of boys reported feeling pressured by girls to have sex.  In contrast, 67% of boys felt pressured by other boys, while 53% of girls felt pressured by other girls.</span><sup class="reference" data-dcnode-id="7505" id="cite_ref-kaiser_gender_roles_14-1"><a data-dcnode-id="7506" href="#cite_note-kaiser_gender_roles-14"><span data-dcnode-id="7507" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7504" instrument_node="">
</span></p><p data-dcnode-id="7497"><span data-dcnode-id="7502" instrument_node="">Adolescents who reported sexual activity had high levels of reputation-based popularity, but not likeability among peers; however, sex with more partners was associated with lower levels of popularity.</span><sup class="reference" data-dcnode-id="7499" id="cite_ref-Prinstein_105-1"><a data-dcnode-id="7500" href="#cite_note-Prinstein-105"><span data-dcnode-id="7501" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7498" instrument_node="">
</span></p><span data-dcnode-id="7496" instrument_node="">
</span><h2 data-dcnode-id="7486"><span class="mw-headline" data-dcnode-id="7494" id="Sexual_education_given_to_teens"><span data-dcnode-id="7495" instrument_node="">Sexual education given to teens</span></span><span class="mw-editsection" data-dcnode-id="7487"><span class="mw-editsection-bracket" data-dcnode-id="7492"><span data-dcnode-id="7493" instrument_node="">[</span></span><a data-dcnode-id="7490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D21" title="Edit section: Sexual education given to teens"><span data-dcnode-id="7491" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7488"><span data-dcnode-id="7489" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7485" instrument_node="">
</span><link data-dcnode-id="7484" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7480" role="note"><span data-dcnode-id="7483" instrument_node="">Main article: </span><a data-dcnode-id="7481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_education_in_the_United_States" title="Sex education in the United States"><span data-dcnode-id="7482" instrument_node="">Sex education in the United States</span></a></div><span data-dcnode-id="7479" instrument_node="">
</span><p data-dcnode-id="7467"><span data-dcnode-id="7478" instrument_node="">Two main forms of sex education are taught in American schools: comprehensive and </span><a data-dcnode-id="7476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstinence-only_sex_education" title="Abstinence-only sex education"><span data-dcnode-id="7477" instrument_node="">abstinence-only</span></a><span data-dcnode-id="7475" instrument_node="">. Comprehensive sex education covers abstinence as a positive choice, but also teaches about contraception use and the avoidance of STIs if the teen becomes  sexually active. A 2002 study conducted by the </span><a data-dcnode-id="7473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaiser_Family_Foundation" title="Kaiser Family Foundation"><span data-dcnode-id="7474" instrument_node="">Kaiser Family Foundation</span></a><span data-dcnode-id="7472" instrument_node=""> found that 58% of secondary school principals describe their sex education curriculum as comprehensive.</span><sup class="reference" data-dcnode-id="7469" id="cite_ref-Kaiser_2002_7-4"><a data-dcnode-id="7470" href="#cite_note-Kaiser_2002-7"><span data-dcnode-id="7471" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7468" instrument_node="">  The difference between these two approaches, and their impact on teen behavior, remains a controversial subject in the United States.
</span></p><p data-dcnode-id="7448"><span data-dcnode-id="7466" instrument_node="">There have been numerous studies on the effectiveness of both approaches, and conflicting data on American public opinion. Public opinion polls conducted over the years have found that the majority of Americans favor broader sex education programs over those that teach only abstinence, although abstinence educators recently published poll data with the totally opposite conclusion.</span><sup class="reference" data-dcnode-id="7463" id="cite_ref-Sex_Education:_Politicians,_Parents,_Teachers_and_Teens_107-0"><a data-dcnode-id="7464" href="#cite_note-Sex_Education:_Politicians,_Parents,_Teachers_and_Teens-107"><span data-dcnode-id="7465" instrument_node="">[106]</span></a></sup><sup class="reference" data-dcnode-id="7460" id="cite_ref-On_Our_Side:_Public_Support_for_Comprehensive_Sexuality_Education_108-0"><a data-dcnode-id="7461" href="#cite_note-On_Our_Side:_Public_Support_for_Comprehensive_Sexuality_Education-108"><span data-dcnode-id="7462" instrument_node="">[107]</span></a></sup><sup class="reference" data-dcnode-id="7457" id="cite_ref-NAEA_Executive_Summary_of_Key_Findings_109-0"><a data-dcnode-id="7458" href="#cite_note-NAEA_Executive_Summary_of_Key_Findings-109"><span data-dcnode-id="7459" instrument_node="">[108]</span></a></sup><span data-dcnode-id="7456" instrument_node=""> The poll sponsored by the National Abstinence Education Association and conducted by </span><a class="mw-redirect" data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zogby_International" title="Zogby International"><span data-dcnode-id="7455" instrument_node="">Zogby International</span></a><span data-dcnode-id="7453" instrument_node=""> found that:</span><sup class="reference" data-dcnode-id="7450" id="cite_ref-zogby_110-0"><a data-dcnode-id="7451" href="#cite_note-zogby-110"><span data-dcnode-id="7452" instrument_node="">[109]</span></a></sup><span data-dcnode-id="7449" instrument_node="">
</span></p><span data-dcnode-id="7447" instrument_node="">
</span><blockquote data-dcnode-id="7444"><p data-dcnode-id="7445"><span data-dcnode-id="7446" instrument_node="">When parents become aware of what abstinence education vs. comprehensive sex education actually teaches, support for abstinence programs jumps from 40% to 60%, while support for comprehensive programs drops from 50% to 30%. This sharp increase in support of abstinence education is seen across all political and economic groups. The majority of parents reject the so-called "comprehensive" sex education approach, which focuses on promoting and demonstrating contraceptive use. Sixty-six percent of parents think that the importance of the "wait to have sex" message ends up being lost when programs demonstrate and encourage the use of contraception.</span></p></blockquote><span data-dcnode-id="7443" instrument_node="">
</span><p data-dcnode-id="7437"><span data-dcnode-id="7442" instrument_node="">Experts also encourage sex educators to include oral sex and emotional concerns as part of their curriculum.  Their findings also support earlier studies that conclude:</span><sup class="reference" data-dcnode-id="7439" id="cite_ref-uc_12-3"><a data-dcnode-id="7440" href="#cite_note-uc-12"><span data-dcnode-id="7441" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7438" instrument_node="">
</span></p><p data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">It is equally encouraged by experts that included in the curriculum sex educators make mention of the fact that the CDC's research confirms that youths with HIV are the least likely age group to be aware of having the infection as they tend to have a suppressed viral load. Highlighting this would encourage them to stay alert and regularly get tested. 
</span></p><span data-dcnode-id="7434" instrument_node="">
</span><blockquote data-dcnode-id="7431"><p data-dcnode-id="7432"><span data-dcnode-id="7433" instrument_node="">... sexual risk-taking should be considered from a dynamic relationship perspective, rather than solely from a traditional disease-model perspective. Prevention programs rarely discuss adolescents' social and emotional concerns regarding sex ...  Discussion about potential negative consequences, such as experiencing guilt or feeling used by one's partner, may lead some adolescents to delay the onset of sexual behavior until they feel more sure of the strength of their relationship with a partner and more comfortable with the idea of becoming sexually active. Identification of common negative social and emotional consequences of having sex may also be useful in screening for adolescents at risk of experiencing more-serious adverse outcomes after having sex.</span></p></blockquote><span data-dcnode-id="7430" instrument_node="">
</span><h3 data-dcnode-id="7420"><span class="mw-headline" data-dcnode-id="7428" id="Comprehensive"><span data-dcnode-id="7429" instrument_node="">Comprehensive</span></span><span class="mw-editsection" data-dcnode-id="7421"><span class="mw-editsection-bracket" data-dcnode-id="7426"><span data-dcnode-id="7427" instrument_node="">[</span></span><a data-dcnode-id="7424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D22" title="Edit section: Comprehensive"><span data-dcnode-id="7425" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7422"><span data-dcnode-id="7423" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7419" instrument_node="">
</span><p data-dcnode-id="7388"><span data-dcnode-id="7418" instrument_node="">The </span><a data-dcnode-id="7416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Association_of_School_Psychologists" title="National Association of School Psychologists"><span data-dcnode-id="7417" instrument_node="">National Association of School Psychologists</span></a><span data-dcnode-id="7415" instrument_node="">,</span><sup class="reference" data-dcnode-id="7412" id="cite_ref-NASP_111-0"><a data-dcnode-id="7413" href="#cite_note-NASP-111"><span data-dcnode-id="7414" instrument_node="">[110]</span></a></sup><span data-dcnode-id="7411" instrument_node=""> the </span><a data-dcnode-id="7409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Academy_of_Pediatrics" title="American Academy of Pediatrics"><span data-dcnode-id="7410" instrument_node="">American Academy of Pediatrics</span></a><span data-dcnode-id="7408" instrument_node="">,</span><sup class="reference" data-dcnode-id="7405" id="cite_ref-AAP_112-0"><a data-dcnode-id="7406" href="#cite_note-AAP-112"><span data-dcnode-id="7407" instrument_node="">[111]</span></a></sup><span data-dcnode-id="7404" instrument_node=""> the </span><a data-dcnode-id="7402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Public_Health_Association" title="American Public Health Association"><span data-dcnode-id="7403" instrument_node="">American Public Health Association</span></a><span data-dcnode-id="7401" instrument_node="">,</span><sup class="reference" data-dcnode-id="7398" id="cite_ref-APHA_113-0"><a data-dcnode-id="7399" href="#cite_note-APHA-113"><span data-dcnode-id="7400" instrument_node="">[112]</span></a></sup><span data-dcnode-id="7397" instrument_node=""> the Society for Adolescent Medicine</span><sup class="reference" data-dcnode-id="7394" id="cite_ref-Adolescent_Health_114-0"><a data-dcnode-id="7395" href="#cite_note-Adolescent_Health-114"><span data-dcnode-id="7396" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7393" instrument_node=""> and the American College Health Association,</span><sup class="reference" data-dcnode-id="7390" id="cite_ref-Adolescent_Health_114-1"><a data-dcnode-id="7391" href="#cite_note-Adolescent_Health-114"><span data-dcnode-id="7392" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7389" instrument_node=""> have all stated official support for comprehensive sex education. Comprehensive sex education curricula are intended to reduce sexually transmitted infections and out-of-wedlock or teenage pregnancies.
</span></p><p data-dcnode-id="7383"><span data-dcnode-id="7387" instrument_node="">Proponents of this approach argue that sexual behavior after puberty is a given, and it is therefore crucial to provide information about the risks and how they can be minimized.  They hold that abstinence-only sex ed and </span><a data-dcnode-id="7385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_conservatism" title="Social conservatism"><span data-dcnode-id="7386" instrument_node="">conservative</span></a><span data-dcnode-id="7384" instrument_node=""> moralizing will only alienate students and thus weaken the message.
</span></p><p data-dcnode-id="7374"><span data-dcnode-id="7382" instrument_node="">A report issued by the </span><a data-dcnode-id="7380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Health_and_Human_Services" title="United States Department of Health and Human Services"><span data-dcnode-id="7381" instrument_node="">Department of Health and Human Services</span></a><span data-dcnode-id="7379" instrument_node=""> has found the "most consistent and clear finding is that sex education does not cause adolescents to initiate sex when they would not otherwise have done so." The same report also found that:</span><sup class="reference" data-dcnode-id="7376" id="cite_ref-Beginning_19-1"><a data-dcnode-id="7377" href="#cite_note-Beginning-19"><span data-dcnode-id="7378" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7375" instrument_node="">
</span></p><span data-dcnode-id="7373" instrument_node="">
</span><blockquote data-dcnode-id="7370"><p data-dcnode-id="7371"><span data-dcnode-id="7372" instrument_node="">Family life or sex education in the public schools, which traditionally has consisted largely of providing factual information at the secondary school level, is the most general or pervasive approach to preventing pregnancy among adolescents ... Adolescents who begin having sexual intercourse need to understand the importance of using an effective contraceptive every time they have sex. This requires convincing sexually active teens who have never used contraception to do so. In addition, sexually active teens who sometimes use contraceptives need to use them more consistently (every time they have sex) and use them correctly.</span></p></blockquote><span data-dcnode-id="7369" instrument_node="">
</span><h3 data-dcnode-id="7359"><span class="mw-headline" data-dcnode-id="7367" id="Abstinence-only"><span data-dcnode-id="7368" instrument_node="">Abstinence-only</span></span><span class="mw-editsection" data-dcnode-id="7360"><span class="mw-editsection-bracket" data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">[</span></span><a data-dcnode-id="7363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D23" title="Edit section: Abstinence-only"><span data-dcnode-id="7364" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7358" instrument_node="">
</span><link data-dcnode-id="7357" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7353" role="note"><span data-dcnode-id="7356" instrument_node="">Main article: </span><a data-dcnode-id="7354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstinence-only_sex_education" title="Abstinence-only sex education"><span data-dcnode-id="7355" instrument_node="">Abstinence-only sex education</span></a></div><span data-dcnode-id="7352" instrument_node="">
</span><p data-dcnode-id="7350"><span data-dcnode-id="7351" instrument_node="">Abstinence-only sex education tells teenagers that they should be sexually abstinent until marriage and does not provide information about contraception. In the Kaiser study, 34% of high-school principals said their school's main message was abstinence-only. Some Christian organizations advocate abstinence-only sex education because it is the only approach they find acceptable and in accordance with their churches' teachings.
</span></p><p data-dcnode-id="7348"><span data-dcnode-id="7349" instrument_node="">Some organizations promote what they consider to be "sexual purity", which encompasses abstaining from not only intercourse before marriage, but also from sexual thoughts, sexual touching, pornography, and actions that are known to lead to sexual arousal. Advocates of abstinence-only sex education object to comprehensive curricula which fail to teach moral behavior; they maintain that curricula should promote conventional (or conservative) morality as healthy and constructive, and that value-free knowledge of the body may lead to immoral, unhealthy and harmful practices.
</span></p><p data-dcnode-id="7342"><span data-dcnode-id="7347" instrument_node="">A comprehensive review of 115 program evaluations published in November 2007 by the National Campaign to Prevent Teen and Unplanned Pregnancy found that two-thirds of sex education programs focusing on both abstinence and contraception had a positive effect on teen sexual behavior. The same study found no strong evidence that programs that stress abstinence as the only acceptable behavior for unmarried teens delayed the initiation of sex, hastened the return to abstinence, or reduced the number of sexual partners.</span><sup class="reference" data-dcnode-id="7344" id="cite_ref-emerging_answers_115-0"><a data-dcnode-id="7345" href="#cite_note-emerging_answers-115"><span data-dcnode-id="7346" instrument_node="">[114]</span></a></sup><span data-dcnode-id="7343" instrument_node="">  According to the study author:
</span></p><span data-dcnode-id="7341" instrument_node="">
</span><blockquote data-dcnode-id="7338"><p data-dcnode-id="7339"><span data-dcnode-id="7340" instrument_node="">Even though there does not exist strong evidence that any particular abstinence program is effective at delaying sex or reducing sexual behavior, one should not conclude that all abstinence programs are ineffective. After all, programs are diverse, fewer than 10 rigorous studies of these programs have been carried out, and studies of two programs have provided modestly encouraging results. In sum, studies of abstinence programs have not produced sufficient evidence to justify their widespread dissemination.</span></p></blockquote><span data-dcnode-id="7337" instrument_node="">
</span><h3 data-dcnode-id="7327"><span class="mw-headline" data-dcnode-id="7335" id="From_parents"><span data-dcnode-id="7336" instrument_node="">From parents</span></span><span class="mw-editsection" data-dcnode-id="7328"><span class="mw-editsection-bracket" data-dcnode-id="7333"><span data-dcnode-id="7334" instrument_node="">[</span></span><a data-dcnode-id="7331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D24" title="Edit section: From parents"><span data-dcnode-id="7332" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7329"><span data-dcnode-id="7330" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7326" instrument_node="">
</span><p data-dcnode-id="7316"><span data-dcnode-id="7325" instrument_node="">Most teens (70%) say they have gotten some or a lot of information about sex and sexual relationships from their parents.  Other sources of information include friends at 53%, school, also at 53%, TV and movies at 51% and magazines at 34%.  School and magazines were sources of information for more girls than boys, and teens "who were sexually active were much more likely to say they got information about sex from their friends and partners."</span><sup class="reference" data-dcnode-id="7322" id="cite_ref-Couric_116-0"><a data-dcnode-id="7323" href="#cite_note-Couric-116"><span data-dcnode-id="7324" instrument_node="">[115]</span></a></sup><span data-dcnode-id="7321" instrument_node=""> Less than half of parents with daughters under 18 talk to their girls about how to say no to boys, and about half talk to them about contraception.</span><sup class="reference" data-dcnode-id="7318" id="cite_ref-SA_3-1"><a data-dcnode-id="7319" href="#cite_note-SA-3"><span data-dcnode-id="7320" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7317" instrument_node="">
</span></p><p data-dcnode-id="7310"><span data-dcnode-id="7315" instrument_node="">Adolescents whose parents talked to them at a young age felt more comfortable as they grew and were more likely to make personal decisions about sexual behavior that reflects the parental values and morals.</span><sup class="reference" data-dcnode-id="7312" id="cite_ref-117"><a data-dcnode-id="7313" href="#cite_note-117"><span data-dcnode-id="7314" instrument_node="">[116]</span></a></sup><span data-dcnode-id="7311" instrument_node="">
</span></p><p data-dcnode-id="7280"><span data-dcnode-id="7309" instrument_node="">Some scholars argue that parents have a large influence on how teen sexuality is viewed in the United States, as well as how teens view their own sexuality.</span><sup class="reference" data-dcnode-id="7306" id="cite_ref-Schalet_118-0"><a data-dcnode-id="7307" href="#cite_note-Schalet-118"><span data-dcnode-id="7308" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7305" instrument_node=""> Parents' views of adolescent sexuality vary greatly between different countries. In the United States, teen sexuality is generally viewed under the framework of "adversarial individualism".</span><sup class="reference" data-dcnode-id="7302" id="cite_ref-Schalet_118-1"><a data-dcnode-id="7303" href="#cite_note-Schalet-118"><span data-dcnode-id="7304" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7301" instrument_node=""> This means that on a broader, societal level, there is little communication among individuals as compared to other countries such as the Netherlands where there is more emphasis on "interdependent individualism".</span><sup class="reference" data-dcnode-id="7298" id="cite_ref-Schalet_118-2"><a data-dcnode-id="7299" href="#cite_note-Schalet-118"><span data-dcnode-id="7300" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7297" instrument_node=""> Scholars argue that in the United States, there is greater emphasis on individual success rather than success of the majority.</span><sup class="reference" data-dcnode-id="7294" id="cite_ref-Schalet_118-3"><a data-dcnode-id="7295" href="#cite_note-Schalet-118"><span data-dcnode-id="7296" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7293" instrument_node=""> This paradigm plays into adolescent sexuality in the way that there is less communication about oftentimes sensitive topics such as adolescent sexuality.</span><sup class="reference" data-dcnode-id="7290" id="cite_ref-Schalet_118-4"><a data-dcnode-id="7291" href="#cite_note-Schalet-118"><span data-dcnode-id="7292" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7289" instrument_node=""> Scholars argue that this mentality has several consequences.</span><sup class="reference" data-dcnode-id="7286" id="cite_ref-Schalet_118-5"><a data-dcnode-id="7287" href="#cite_note-Schalet-118"><span data-dcnode-id="7288" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7285" instrument_node=""> The negative consequences of adversarial individualism can present themselves as impulse-driven teenagers that ultimately require more supervision than teenagers living in an interdependent individualistic society. In interdependent individualism, teenagers are ultimately more responsible because they are able to have open discussions with their guardians.</span><sup class="reference" data-dcnode-id="7282" id="cite_ref-Schalet_118-6"><a data-dcnode-id="7283" href="#cite_note-Schalet-118"><span data-dcnode-id="7284" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7281" instrument_node="">
</span></p><span data-dcnode-id="7279" instrument_node="">
</span><h4 data-dcnode-id="7269"><span class="mw-headline" data-dcnode-id="7277" id="Father-daughter_communication"><span data-dcnode-id="7278" instrument_node="">Father-daughter communication</span></span><span class="mw-editsection" data-dcnode-id="7270"><span class="mw-editsection-bracket" data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">[</span></span><a data-dcnode-id="7273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D25" title="Edit section: Father-daughter communication"><span data-dcnode-id="7274" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7271"><span data-dcnode-id="7272" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7268" instrument_node="">
</span><p data-dcnode-id="7254"><span data-dcnode-id="7267" instrument_node="">Studies have suggested that fathers generally tend to avoid sexual conversations with their children.</span><sup class="reference" data-dcnode-id="7264" id="cite_ref-119"><a data-dcnode-id="7265" href="#cite_note-119"><span data-dcnode-id="7266" instrument_node="">[118]</span></a></sup><span data-dcnode-id="7263" instrument_node=""> Many fathers have uncertainties on how to start to the conversation. Other times they simply put the initiative on their daughters to come to them with questions or issues.</span><sup class="reference" data-dcnode-id="7260" id="cite_ref-120"><a data-dcnode-id="7261" href="#cite_note-120"><span data-dcnode-id="7262" instrument_node="">[119]</span></a></sup><span data-dcnode-id="7259" instrument_node=""> Even when the conversation is launched fathers tend to be judgmental or only talk about abstinence. Fathers are more likely to forbid daughters from having sex when they are talking. Wilson et al. (2010) found that some fathers felt that talking about the potential consequences of sex was easier than talking about sex itself.</span><sup class="reference" data-dcnode-id="7256" id="cite_ref-121"><a data-dcnode-id="7257" href="#cite_note-121"><span data-dcnode-id="7258" instrument_node="">[120]</span></a></sup><span data-dcnode-id="7255" instrument_node=""> Fathers overall tend to apply more orders when talking to their daughters than giving them unbiased information or simply listening and trying to give them their best advice.
</span></p><p data-dcnode-id="7244"><span data-dcnode-id="7253" instrument_node="">Hutchinson and Cederbaum (2011) studied father-daughter communication and found that increased father-daughter communication delayed sexual debut and decreased the frequency of engagement in sexual intercourse.</span><sup class="reference" data-dcnode-id="7250" id="cite_ref-Hitchinson_K._M.,_Cederbaum_J._A._2011_550–572_122-0"><a data-dcnode-id="7251" href="#cite_note-Hitchinson_K._M.,_Cederbaum_J._A._2011_550%E2%80%93572-122"><span data-dcnode-id="7252" instrument_node="">[121]</span></a></sup><span data-dcnode-id="7249" instrument_node=""> They also found that responsible sexual behavior among adolescent females was associated with positive father-daughter communication regarding men, dating, sex, and marriage. On the other hand, fathers who were absent had been linked to higher rates of sexual activity and teen pregnancy among female adolescents.</span><sup class="reference" data-dcnode-id="7246" id="cite_ref-Hitchinson_K._M.,_Cederbaum_J._A._2011_550–572_122-1"><a data-dcnode-id="7247" href="#cite_note-Hitchinson_K._M.,_Cederbaum_J._A._2011_550%E2%80%93572-122"><span data-dcnode-id="7248" instrument_node="">[121]</span></a></sup><span data-dcnode-id="7245" instrument_node=""> Fathers have a greater impact on daughters than they think, but fail to recognize it because they don't believe they should be discussing sex with their daughters or simply leave it to the mothers.
</span></p><span data-dcnode-id="7243" instrument_node="">
</span><h2 data-dcnode-id="7233"><span class="mw-headline" data-dcnode-id="7241" id="Correlations"><span data-dcnode-id="7242" instrument_node="">Correlations</span></span><span class="mw-editsection" data-dcnode-id="7234"><span class="mw-editsection-bracket" data-dcnode-id="7239"><span data-dcnode-id="7240" instrument_node="">[</span></span><a data-dcnode-id="7237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D26" title="Edit section: Correlations"><span data-dcnode-id="7238" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7235"><span data-dcnode-id="7236" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7232" instrument_node="">
</span><link data-dcnode-id="7231" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7227" role="note"><span data-dcnode-id="7230" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="7228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religion_and_adolescent_sexuality" title="Religion and adolescent sexuality"><span data-dcnode-id="7229" instrument_node="">Religion and adolescent sexuality</span></a></div><span data-dcnode-id="7226" instrument_node="">
</span><p data-dcnode-id="7220"><span data-dcnode-id="7225" instrument_node="">Girls who participate in athletics, artistic, or academic extracurricular activities are less likely to be sexually active than girls who don't participate in any. Female athletes have "significantly fewer sex partners, engaged in less frequent intercourse ... and began having sex at a later age." For boys, those who participate in sports are slightly more likely to be sexually active, and those who are in artistic activities are considerably less likely.</span><sup class="reference" data-dcnode-id="7222" id="cite_ref-sports_123-0"><a data-dcnode-id="7223" href="#cite_note-sports-123"><span data-dcnode-id="7224" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7221" instrument_node="">
</span></p><p data-dcnode-id="7214"><span data-dcnode-id="7219" instrument_node="">Religious adolescents lose their virginity three years later than the average American. On average, those with strong religious backgrounds become sexually active at age 21.</span><sup class="reference" data-dcnode-id="7216" id="cite_ref-religion_124-0"><a data-dcnode-id="7217" href="#cite_note-religion-124"><span data-dcnode-id="7218" instrument_node="">[123]</span></a></sup><span data-dcnode-id="7215" instrument_node="">
</span></p><p data-dcnode-id="7205"><span data-dcnode-id="7213" instrument_node="">Studies have shown stressed teens and teens without sufficient familial involvement tend to have more sex.</span><sup class="reference" data-dcnode-id="7210" id="cite_ref-Sibling_125-0"><a data-dcnode-id="7211" href="#cite_note-Sibling-125"><span data-dcnode-id="7212" instrument_node="">[124]</span></a></sup><sup class="reference" data-dcnode-id="7207" id="cite_ref-dads_126-0"><a data-dcnode-id="7208" href="#cite_note-dads-126"><span data-dcnode-id="7209" instrument_node="">[125]</span></a></sup><span data-dcnode-id="7206" instrument_node="">
</span></p><span data-dcnode-id="7204" instrument_node="">
</span><h2 data-dcnode-id="7194"><span class="mw-headline" data-dcnode-id="7202" id="Sexual_minorities"><span data-dcnode-id="7203" instrument_node="">Sexual minorities</span></span><span class="mw-editsection" data-dcnode-id="7195"><span class="mw-editsection-bracket" data-dcnode-id="7200"><span data-dcnode-id="7201" instrument_node="">[</span></span><a data-dcnode-id="7198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D27" title="Edit section: Sexual minorities"><span data-dcnode-id="7199" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7196"><span data-dcnode-id="7197" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7193" instrument_node="">
</span><p data-dcnode-id="7177"><span data-dcnode-id="7192" instrument_node="">According to a study based on a sampling of teenagers in Massachusetts, sexual minority youth—that is, those who identify as gay, lesbian, or bisexual or had any same-sex sexual contact in their lifetimes—were significantly more likely than other students to report lifetime sexual intercourse (72% vs. 44%).</span><sup class="reference" data-dcnode-id="7189" id="cite_ref-myrbs_127-0"><a data-dcnode-id="7190" href="#cite_note-myrbs-127"><span data-dcnode-id="7191" instrument_node="">[126]</span></a></sup><span data-dcnode-id="7188" instrument_node=""> The same study found that sexual minority youth were more likely to report sexual intercourse before age 13 (18% vs. 4%), sexual intercourse with four or more partners in their lifetimes (32% vs. 11%), and recent sexual intercourse (55% vs. 33%). Among students in the Massachusetts study who ever had sexual intercourse in their lifetimes, sexual minority youth were significantly more likely than other students to report "having been or gotten someone pregnant (15% vs. 4%) and having been diagnosed with </span><a data-dcnode-id="7186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HIV" title="HIV"><span data-dcnode-id="7187" instrument_node="">HIV</span></a><span data-dcnode-id="7185" instrument_node=""> or another STI (10% vs. 5%)."</span><sup class="reference" data-dcnode-id="7182" id="cite_ref-myrbs_127-1"><a data-dcnode-id="7183" href="#cite_note-myrbs-127"><span data-dcnode-id="7184" instrument_node="">[126]</span></a></sup><sup class="reference" data-dcnode-id="7179" id="cite_ref-bay_windows_128-0"><a data-dcnode-id="7180" href="#cite_note-bay_windows-128"><span data-dcnode-id="7181" instrument_node="">[127]</span></a></sup><span data-dcnode-id="7178" instrument_node="">
</span></p><span data-dcnode-id="7176" instrument_node="">
