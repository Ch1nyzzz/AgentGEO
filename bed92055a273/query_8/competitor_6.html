</span></p><p data-dcnode-id="9203"><span data-dcnode-id="9216" instrument_node="">The </span><a data-dcnode-id="9214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_sexuality" title="Human sexuality"><span data-dcnode-id="9215" instrument_node="">sexuality</span></a><span data-dcnode-id="9213" instrument_node=""> of US </span><a data-dcnode-id="9211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolescence" title="Adolescence"><span data-dcnode-id="9212" instrument_node="">adolescents</span></a><span data-dcnode-id="9210" instrument_node=""> includes their feelings, </span><a class="mw-redirect" data-dcnode-id="9208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolescent_sexual_behavior" title="Adolescent sexual behavior"><span data-dcnode-id="9209" instrument_node="">behaviors</span></a><span data-dcnode-id="9207" instrument_node=""> and development,  and the place  adolescent sexuality has in American society, including the response of the </span><a data-dcnode-id="9205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_government_of_the_United_States" title="Federal government of the United States"><span data-dcnode-id="9206" instrument_node="">government</span></a><span data-dcnode-id="9204" instrument_node="">, educators, parents, and other interested groups.
</span></p><p data-dcnode-id="9164"><a data-dcnode-id="9201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teenage_pregnancy" title="Teenage pregnancy"><span data-dcnode-id="9202" instrument_node="">Teenage pregnancy</span></a><span data-dcnode-id="9200" instrument_node=""> is four times as prevalent in the US as in the European Union,</span><sup class="reference" data-dcnode-id="9197" id="cite_ref-oecd_1-0"><a data-dcnode-id="9198" href="#cite_note-oecd-1"><span data-dcnode-id="9199" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9196" instrument_node=""> but has been steadily declining since 1991, reaching a record low in 2012, according to the US </span><a data-dcnode-id="9194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centers_for_Disease_Control_and_Prevention" title="Centers for Disease Control and Prevention"><span data-dcnode-id="9195" instrument_node="">Centers for Disease Control and Prevention</span></a><span data-dcnode-id="9193" instrument_node=""> (CDC), and continuing to decline through 2017.</span><sup class="reference" data-dcnode-id="9190" id="cite_ref-CDC_2-0"><a data-dcnode-id="9191" href="#cite_note-CDC-2"><span data-dcnode-id="9192" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="9187" id="cite_ref-SA_3-0"><a data-dcnode-id="9188" href="#cite_note-SA-3"><span data-dcnode-id="9189" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="9184" id="cite_ref-MW_4-0"><a data-dcnode-id="9185" href="#cite_note-MW-4"><span data-dcnode-id="9186" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9183" instrument_node=""> The CDC said in 2007, 35% of US high school students were currently sexually active and 47.8% of US high school students reported having had </span><a data-dcnode-id="9181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_intercourse" title="Sexual intercourse"><span data-dcnode-id="9182" instrument_node="">sexual intercourse</span></a><span data-dcnode-id="9180" instrument_node="">.</span><sup class="reference" data-dcnode-id="9177" id="cite_ref-YRBS_5-0"><a data-dcnode-id="9178" href="#cite_note-YRBS-5"><span data-dcnode-id="9179" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9176" instrument_node=""> In 2017, the percentage sexually active was down to 28.7%, and the percentage who had ever had intercourse was 39.5%.</span><sup class="reference" data-dcnode-id="9173" id="cite_ref-MW_4-1"><a data-dcnode-id="9174" href="#cite_note-MW-4"><span data-dcnode-id="9175" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9172" instrument_node=""> According to a 1994 study, every year an estimated one in four sexually active teens contracts a </span><a data-dcnode-id="9170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexually_transmitted_infection" title="Sexually transmitted infection"><span data-dcnode-id="9171" instrument_node="">sexually transmitted infection</span></a><span data-dcnode-id="9169" instrument_node=""> (STI).</span><sup class="reference" data-dcnode-id="9166" id="cite_ref-kaiser_FS_6-0"><a data-dcnode-id="9167" href="#cite_note-kaiser_FS-6"><span data-dcnode-id="9168" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9165" instrument_node="">
</span></p><p data-dcnode-id="9118"><span data-dcnode-id="9163" instrument_node="">In 1999, a </span><a data-dcnode-id="9161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaiser_Family_Foundation" title="Kaiser Family Foundation"><span data-dcnode-id="9162" instrument_node="">Kaiser Family Foundation</span></a><span data-dcnode-id="9160" instrument_node=""> study found that 95% of public secondary schools offered </span><a data-dcnode-id="9158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_education" title="Sex education"><span data-dcnode-id="9159" instrument_node="">sex education</span></a><span data-dcnode-id="9157" instrument_node=""> programs. More than half of the schools in the study followed a comprehensive approach that included information about both abstinence and contraception, while approximately one third of schools provided students with </span><a data-dcnode-id="9155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstinence-only_sex_education" title="Abstinence-only sex education"><span data-dcnode-id="9156" instrument_node="">abstinence-only sex education</span></a><span data-dcnode-id="9154" instrument_node="">.</span><sup class="reference" data-dcnode-id="9151" id="cite_ref-Kaiser_2002_7-0"><a data-dcnode-id="9152" href="#cite_note-Kaiser_2002-7"><span data-dcnode-id="9153" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9150" instrument_node=""> In 2002, most Americans favored the </span><a data-dcnode-id="9148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comprehensive_sex_education" title="Comprehensive sex education"><span data-dcnode-id="9149" instrument_node="">comprehensive approach</span></a><span data-dcnode-id="9147" instrument_node="">.</span><sup class="reference" data-dcnode-id="9144" id="cite_ref-Kaiser_2002_7-1"><a data-dcnode-id="9145" href="#cite_note-Kaiser_2002-7"><span data-dcnode-id="9146" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9143" instrument_node=""> A 2000 study found that almost all schools included information about </span><a data-dcnode-id="9141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HIV" title="HIV"><span data-dcnode-id="9142" instrument_node="">HIV</span></a><span data-dcnode-id="9140" instrument_node="">, the virus that causes AIDS, in their curricula.</span><sup class="reference" data-dcnode-id="9137" id="cite_ref-Kaiser_2002_7-2"><a data-dcnode-id="9138" href="#cite_note-Kaiser_2002-7"><span data-dcnode-id="9139" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9136" instrument_node=""> There have been efforts among social conservatives in the US government to limit </span><a data-dcnode-id="9134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_education" title="Sex education"><span data-dcnode-id="9135" instrument_node="">sex education</span></a><span data-dcnode-id="9133" instrument_node=""> in public schools to </span><a data-dcnode-id="9131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstinence-only_sex_education" title="Abstinence-only sex education"><span data-dcnode-id="9132" instrument_node="">abstinence-only sex education</span></a><span data-dcnode-id="9130" instrument_node=""> curricula.</span><sup class="reference" data-dcnode-id="9127" id="cite_ref-Kaiser_2002_7-3"><a data-dcnode-id="9128" href="#cite_note-Kaiser_2002-7"><span data-dcnode-id="9129" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9126" instrument_node=""> The effectiveness of abstinence-only programs has been an issue of controversy.</span><sup class="reference" data-dcnode-id="9123" id="cite_ref-Obs07_8-0"><a data-dcnode-id="9124" href="#cite_note-Obs07-8"><span data-dcnode-id="9125" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="9120" id="cite_ref-Kirby2007_9-0"><a data-dcnode-id="9121" href="#cite_note-Kirby2007-9"><span data-dcnode-id="9122" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9119" instrument_node="">
</span></p><span data-dcnode-id="9117" instrument_node="">

</span><h2 data-dcnode-id="8803"><span class="mw-headline" data-dcnode-id="8811" id="Sexual_practices"><span data-dcnode-id="8812" instrument_node="">Sexual practices</span></span><span class="mw-editsection" data-dcnode-id="8804"><span class="mw-editsection-bracket" data-dcnode-id="8809"><span data-dcnode-id="8810" instrument_node="">[</span></span><a data-dcnode-id="8807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D1" title="Edit section: Sexual practices"><span data-dcnode-id="8808" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8805"><span data-dcnode-id="8806" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8802" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8793"><div class="thumbinner" data-dcnode-id="8794" style="width:222px;"><a class="image" data-dcnode-id="8800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACDC_Teenager_Sex_Stats_2015.png"><img alt="" class="thumbimage" data-dcnode-id="8801" data-file-height="317" data-file-width="502" decoding="async" height="139" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/93/CDC_Teenager_Sex_Stats_2015.png/220px-CDC_Teenager_Sex_Stats_2015.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/93/CDC_Teenager_Sex_Stats_2015.png/330px-CDC_Teenager_Sex_Stats_2015.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/93/CDC_Teenager_Sex_Stats_2015.png/440px-CDC_Teenager_Sex_Stats_2015.png 2x" width="220"></a><span data-dcnode-id="8799" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8795"><div class="magnify" data-dcnode-id="8797"><a class="internal" data-dcnode-id="8798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACDC_Teenager_Sex_Stats_2015.png" title="Enlarge"></a></div><span data-dcnode-id="8796" instrument_node="">U.S. sexual practices in April 2015</span></div></div></div><span data-dcnode-id="8792" instrument_node="">
</span><p data-dcnode-id="8763"><span data-dcnode-id="8791" instrument_node="">Self-report surveys suggest that half of all 15- to 19-year-olds have had </span><a data-dcnode-id="8789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oral_sex" title="Oral sex"><span data-dcnode-id="8790" instrument_node="">oral sex</span></a><span data-dcnode-id="8788" instrument_node="">. That percentage rises to 70% by the time they turn 19, and equal numbers of boys and girls participate.</span><sup class="reference" data-dcnode-id="8785" id="cite_ref-wapo_10-0"><a data-dcnode-id="8786" href="#cite_note-wapo-10"><span data-dcnode-id="8787" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8784" instrument_node=""> Research indicating that oral sex is less risky to teens' emotional and physical well-being than vaginal sex has been advanced;</span><sup class="reference" data-dcnode-id="8781" id="cite_ref-mednews_11-0"><a data-dcnode-id="8782" href="#cite_note-mednews-11"><span data-dcnode-id="8783" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8780" instrument_node=""> researchers at the University of California, San Francisco do not believe this conclusion is warranted.</span><sup class="reference" data-dcnode-id="8777" id="cite_ref-uc_12-0"><a data-dcnode-id="8778" href="#cite_note-uc-12"><span data-dcnode-id="8779" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8776" instrument_node=""> They found that oral sex, as well as vaginal sex, was associated with negative consequences.</span><sup class="reference" data-dcnode-id="8773" id="cite_ref-uc_12-1"><a data-dcnode-id="8774" href="#cite_note-uc-12"><span data-dcnode-id="8775" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8772" instrument_node=""> Of adolescents engaging in oral sex only, girls were twice as likely as boys to report feeling bad about themselves and nearly three times as likely to feel used.</span><sup class="reference" data-dcnode-id="8769" id="cite_ref-UCSF_13-0"><a data-dcnode-id="8770" href="#cite_note-UCSF-13"><span data-dcnode-id="8771" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8768" instrument_node=""> Despite their behaviors, 90% of adolescents "agree that most young people have sex before they are really ready."</span><sup class="reference" data-dcnode-id="8765" id="cite_ref-kaiser_gender_roles_14-0"><a data-dcnode-id="8766" href="#cite_note-kaiser_gender_roles-14"><span data-dcnode-id="8767" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8764" instrument_node="">
</span></p><p data-dcnode-id="8746"><span data-dcnode-id="8762" instrument_node="">The average age of first sexual intercourse in the United States is around 16.8 for males and around 17.2 for females,</span><sup class="reference" data-dcnode-id="8759" id="cite_ref-New_Age_15-0"><a data-dcnode-id="8760" href="#cite_note-New_Age-15"><span data-dcnode-id="8761" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="8756" id="cite_ref-Kins_Age_16-0"><a data-dcnode-id="8757" href="#cite_note-Kins_Age-16"><span data-dcnode-id="8758" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8755" instrument_node=""> and this has been rising in recent years.</span><sup class="reference" data-dcnode-id="8752" id="cite_ref-gutt_17-0"><a data-dcnode-id="8753" href="#cite_note-gutt-17"><span data-dcnode-id="8754" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8751" instrument_node=""> For those teens who have had sex, 70% of girls and 56% of boys said that their first sexual experience was with a steady partner, while 16% of girls and 28% of boys report losing their virginity to someone they had just met or who was just a friend.</span><sup class="reference" data-dcnode-id="8748" id="cite_ref-gutt_17-1"><a data-dcnode-id="8749" href="#cite_note-gutt-17"><span data-dcnode-id="8750" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8747" instrument_node="">
</span></p><p data-dcnode-id="8722"><span data-dcnode-id="8745" instrument_node="">Teens are using </span><a data-dcnode-id="8743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birth_control" title="Birth control"><span data-dcnode-id="8744" instrument_node="">birth control</span></a><span data-dcnode-id="8742" instrument_node=""> (contraceptives) more today when they lose their virginity than they did in the past, and this is in part due to the </span><a class="mw-redirect" data-dcnode-id="8740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AIDS_epidemic" title="AIDS epidemic"><span data-dcnode-id="8741" instrument_node="">AIDS epidemic</span></a><span data-dcnode-id="8739" instrument_node="">.</span><sup class="reference" data-dcnode-id="8736" id="cite_ref-gutt_17-2"><a data-dcnode-id="8737" href="#cite_note-gutt-17"><span data-dcnode-id="8738" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8735" instrument_node="">  Of sexually experienced adolescents, 78% of girls and 85% of males used at least one contraceptive when they lost their virginity.</span><sup class="reference" data-dcnode-id="8732" id="cite_ref-gutt_17-3"><a data-dcnode-id="8733" href="#cite_note-gutt-17"><span data-dcnode-id="8734" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8731" instrument_node=""> A detailed qualitative study of girls' loss of virginity found that their experiences "were almost all quite negative (and, in some cases, horrific)."</span><sup class="reference" data-dcnode-id="8728" id="cite_ref-review_18-0"><a data-dcnode-id="8729" href="#cite_note-review-18"><span data-dcnode-id="8730" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8727" instrument_node=""> Before age 15, "a majority of first intercourse experiences among females are reported to be non-voluntary." (See definition of rape). </span><sup class="reference" data-dcnode-id="8724" id="cite_ref-Beginning_19-0"><a data-dcnode-id="8725" href="#cite_note-Beginning-19"><span data-dcnode-id="8726" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8723" instrument_node="">
</span></p><p data-dcnode-id="8716"><span data-dcnode-id="8721" instrument_node="">Adolescents who are better students generally initiate sexual activity later than those who are poor students. In addition, among those seventh and eighth graders, those with personal and perceived peer norms that encourage adolescents to refrain from sex are less likely to engage in it.</span><sup class="reference" data-dcnode-id="8718" id="cite_ref-MacLean_20-0"><a data-dcnode-id="8719" href="#cite_note-MacLean-20"><span data-dcnode-id="8720" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8717" instrument_node="">
</span></p><p data-dcnode-id="8702"><span data-dcnode-id="8715" instrument_node="">The percentage of teenagers who report they are currently sexually active has been dropping since 1991.</span><sup class="reference" data-dcnode-id="8712" id="cite_ref-sieving_21-0"><a data-dcnode-id="8713" href="#cite_note-sieving-21"><span data-dcnode-id="8714" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8711" instrument_node=""> By 2005, the overall percentage of teenagers reporting that they were currently sexually active was down to 33.9%.</span><sup class="reference" data-dcnode-id="8708" id="cite_ref-YRBS_5-1"><a data-dcnode-id="8709" href="#cite_note-YRBS-5"><span data-dcnode-id="8710" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8707" instrument_node="">  A lower number of sexually active teens are "quite positive in terms of their health and their well-being."</span><sup class="reference" data-dcnode-id="8704" id="cite_ref-AP_birth_rate_22-0"><a data-dcnode-id="8705" href="#cite_note-AP_birth_rate-22"><span data-dcnode-id="8706" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8703" instrument_node="">
</span></p><p data-dcnode-id="8664"><span data-dcnode-id="8701" instrument_node="">The </span><a data-dcnode-id="8699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condom" title="Condom"><span data-dcnode-id="8700" instrument_node="">condom</span></a><span data-dcnode-id="8698" instrument_node=""> is the most popular form of </span><a class="mw-redirect" data-dcnode-id="8696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contraception" title="Contraception"><span data-dcnode-id="8697" instrument_node="">contraception</span></a><span data-dcnode-id="8695" instrument_node=""> used by teenagers.</span><sup class="reference" data-dcnode-id="8692" id="cite_ref-Pubmed_stats_23-0"><a data-dcnode-id="8693" href="#cite_note-Pubmed_stats-23"><span data-dcnode-id="8694" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8691" instrument_node=""> Among sexually active 15- to 19-year-olds, from 2002 to 2010 more than 80% of females and more than 90% of males reported using at least one method of birth control during their last intercourse.</span><sup class="reference" data-dcnode-id="8688" id="cite_ref-gutt_17-4"><a data-dcnode-id="8689" href="#cite_note-gutt-17"><span data-dcnode-id="8690" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="8685" id="cite_ref-KFF_factsheet_24-0"><a data-dcnode-id="8686" href="#cite_note-KFF_factsheet-24"><span data-dcnode-id="8687" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8684" instrument_node=""> In 1995, only 71% of girls and 82% of boys reported using contraception the last time they had sex.</span><sup class="reference" data-dcnode-id="8681" id="cite_ref-gutt_17-5"><a data-dcnode-id="8682" href="#cite_note-gutt-17"><span data-dcnode-id="8683" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8680" instrument_node=""> In 2006–2010, one in five sexually active female teens (20%) and one-third of sexually active male teens (34%) reported having used both the condom and a hormonal method the last time they had sex.</span><sup class="reference" data-dcnode-id="8677" id="cite_ref-gutt_17-6"><a data-dcnode-id="8678" href="#cite_note-gutt-17"><span data-dcnode-id="8679" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8676" instrument_node="">  Less than 20% of girls at risk for unintended pregnancy were not using any contraceptive method the last time they had sex.</span><sup class="reference" data-dcnode-id="8673" id="cite_ref-gutt_17-7"><a data-dcnode-id="8674" href="#cite_note-gutt-17"><span data-dcnode-id="8675" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8672" instrument_node=""> Calendar abstinence, or the </span><a class="mw-redirect" data-dcnode-id="8670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhythm_method" title="Rhythm method"><span data-dcnode-id="8671" instrument_node="">rhythm method</span></a><span data-dcnode-id="8669" instrument_node="">, was used by 17% of female teens in 2006–2008.</span><sup class="reference" data-dcnode-id="8666" id="cite_ref-Pubmed_stats_23-1"><a data-dcnode-id="8667" href="#cite_note-Pubmed_stats-23"><span data-dcnode-id="8668" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8665" instrument_node="">
</span></p><span data-dcnode-id="8663" instrument_node="">
</span><h3 data-dcnode-id="8653"><span class="mw-headline" data-dcnode-id="8661" id="Sexual_abstinence"><span data-dcnode-id="8662" instrument_node="">Sexual abstinence</span></span><span class="mw-editsection" data-dcnode-id="8654"><span class="mw-editsection-bracket" data-dcnode-id="8659"><span data-dcnode-id="8660" instrument_node="">[</span></span><a data-dcnode-id="8657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: Sexual abstinence"><span data-dcnode-id="8658" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8655"><span data-dcnode-id="8656" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8652" instrument_node="">
</span><link data-dcnode-id="8651" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8641" role="note"><span data-dcnode-id="8650" instrument_node="">Main articles: </span><a data-dcnode-id="8648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_abstinence" title="Sexual abstinence"><span data-dcnode-id="8649" instrument_node="">Sexual abstinence</span></a><span data-dcnode-id="8647" instrument_node="">, </span><a data-dcnode-id="8645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chastity" title="Chastity"><span data-dcnode-id="8646" instrument_node="">Chastity</span></a><span data-dcnode-id="8644" instrument_node="">, and </span><a data-dcnode-id="8642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstinence_pledge" title="Abstinence pledge"><span data-dcnode-id="8643" instrument_node="">Abstinence pledge</span></a></div><span data-dcnode-id="8640" instrument_node="">
</span><p data-dcnode-id="8622"><span data-dcnode-id="8639" instrument_node="">Sexual abstinence is the practice of refraining from some or all aspects of sexual activity for medical, psychological, legal, social, financial, philosophical, moral or religious reasons. For the last twenty years, abstinence rates among American adolescents have risen. The percentage of high school students in the US who reported that they have ever had sexual intercourse dropped from 54.1% in 1991 to 47.8% in 2007,</span><sup class="reference" data-dcnode-id="8636" id="cite_ref-YRBS_5-2"><a data-dcnode-id="8637" href="#cite_note-YRBS-5"><span data-dcnode-id="8638" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8635" instrument_node=""> 43% in 2011</span><sup class="reference" data-dcnode-id="8632" id="cite_ref-Minority_25-0"><a data-dcnode-id="8633" href="#cite_note-Minority-25"><span data-dcnode-id="8634" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8631" instrument_node=""> and 39.5% in 2017.</span><sup class="reference" data-dcnode-id="8628" id="cite_ref-MW_4-2"><a data-dcnode-id="8629" href="#cite_note-MW-4"><span data-dcnode-id="8630" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8627" instrument_node=""> A cross-sectional survey in 1998 found that fear of pregnancy was the most commonly cited reason for choosing abstinence, especially among girls, as well as boys who had caused a pregnancy in the past. Other reasons included a fear of sexually transmitted infections, a lack of desire, being afraid of getting caught, and the belief that sex was not appropriate for someone of their age.</span><sup class="reference" data-dcnode-id="8624" id="cite_ref-Tamkins_26-0"><a data-dcnode-id="8625" href="#cite_note-Tamkins-26"><span data-dcnode-id="8626" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8623" instrument_node="">
</span></p><p data-dcnode-id="8616"><span data-dcnode-id="8621" instrument_node="">Epidemiologists at the Center for Disease Control emphasize that for sex education to be effective, it should take place before teens become sexually active.</span><sup class="reference" data-dcnode-id="8618" id="cite_ref-tribune_27-0"><a data-dcnode-id="8619" href="#cite_note-tribune-27"><span data-dcnode-id="8620" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8617" instrument_node="">

</span><p data-dcnode-id="8487"><span data-dcnode-id="8500" instrument_node="">Both adolescents who have never had sex and those who have chosen to become abstinent after engaging in sexual behaviors cite the negative consequences of sex as reasons why they choose not to have sex.</span><sup class="reference" data-dcnode-id="8497" id="cite_ref-Tamkins_26-1"><a data-dcnode-id="8498" href="#cite_note-Tamkins-26"><span data-dcnode-id="8499" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8496" instrument_node="">  Girls of all ages and experience levels were more likely than boys to cite the fear of pregnancy and sexually transmitted diseases.</span><sup class="reference" data-dcnode-id="8493" id="cite_ref-Tamkins_26-2"><a data-dcnode-id="8494" href="#cite_note-Tamkins-26"><span data-dcnode-id="8495" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8492" instrument_node="">  Virgin boys were more likely than girls to say they believed most students did not have sex.</span><sup class="reference" data-dcnode-id="8489" id="cite_ref-Tamkins_26-3"><a data-dcnode-id="8490" href="#cite_note-Tamkins-26"><span data-dcnode-id="8491" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8488" instrument_node="">
</span></p><p data-dcnode-id="8473"><span data-dcnode-id="8486" instrument_node="">Boys who caused a pregnancy in the past were more than twice as likely to become abstinent after this episode than boys who had not. However, for girls, a past pregnancy had little correlation with secondary abstinence.</span><sup class="reference" data-dcnode-id="8483" id="cite_ref-Tamkins_26-4"><a data-dcnode-id="8484" href="#cite_note-Tamkins-26"><span data-dcnode-id="8485" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8482" instrument_node=""> Fear of pregnancy, wanting to wait until marriage, and not wanting to have sex were cited more often by virgins in the 12th grade than they were by 9th graders.</span><sup class="reference" data-dcnode-id="8479" id="cite_ref-Tamkins_26-5"><a data-dcnode-id="8480" href="#cite_note-Tamkins-26"><span data-dcnode-id="8481" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8478" instrument_node="">  Of the sexually experienced who are now practicing abstinence, girls were more likely than boys to say a lack of desire, fear of STDs, being afraid of getting caught, the belief that sex was not appropriate for someone their age, and that their parents had taught them the advantages of waiting as reasons why they made their decision.</span><sup class="reference" data-dcnode-id="8475" id="cite_ref-Tamkins_26-6"><a data-dcnode-id="8476" href="#cite_note-Tamkins-26"><span data-dcnode-id="8477" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8474" instrument_node="">
</span></p><span data-dcnode-id="8472" instrument_node="">
</span><h3 data-dcnode-id="8462"><span class="mw-headline" data-dcnode-id="8470" id="Definitions_of_virginity"><span data-dcnode-id="8471" instrument_node="">Definitions of virginity</span></span><span class="mw-editsection" data-dcnode-id="8463"><span class="mw-editsection-bracket" data-dcnode-id="8468"><span data-dcnode-id="8469" instrument_node="">[</span></span><a data-dcnode-id="8466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: Definitions of virginity"><span data-dcnode-id="8467" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8464"><span data-dcnode-id="8465" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8461" instrument_node="">
</span><p data-dcnode-id="8446"><span data-dcnode-id="8460" instrument_node="">Among young people engaging in some form of sexual activity, definitions of </span><a data-dcnode-id="8458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virginity" title="Virginity"><span data-dcnode-id="8459" instrument_node="">virginity</span></a><span data-dcnode-id="8457" instrument_node=""> differ. Virginity is usually defined as the state of a person who has never engaged in sexual intercourse, although there are some gray areas. For example, teenagers that engage in oral sex but not penile-vaginal sex may still identify themselves as virgins; this is sometimes termed </span><i data-dcnode-id="8455"><span data-dcnode-id="8456" instrument_node="">technical virginity.</span></i><span data-dcnode-id="8454" instrument_node=""> Of those polled, 70% of adolescents aged 11–16 believed oral sex did not disqualify someone from virginity, and 30% believed they were still abstinent.</span><sup class="reference" data-dcnode-id="8451" id="cite_ref-Defining_virginity_29-0"><a data-dcnode-id="8452" href="#cite_note-Defining_virginity-29"><span data-dcnode-id="8453" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="8448" id="cite_ref-Freitas_30-0"><a data-dcnode-id="8449" href="#cite_note-Freitas-30"><span data-dcnode-id="8450" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8447" instrument_node="">
</span></p><p data-dcnode-id="8444"><span data-dcnode-id="8445" instrument_node="">Of adolescents age 11–16, 83% believe a person is still a virgin after engaging in genital touching, and 70% said they believed one retained their virginity after having oral sex. Additionally, 16% considered themselves virgins after anal sex. However, 44% believed that one was abstinent after genital touching and 33% believed one could have oral sex and still remain abstinent. Of anal and vaginal sex, 14% believed one could engage in the former and 12% said one could participate in the latter while still remaining abstinent.
</span></p><p data-dcnode-id="8438"><span data-dcnode-id="8443" instrument_node="">Among those 15–19 years old, those who remain a "technical virgin" are motivated more by the fear of pregnancy or STIs and less by religion and morality.</span><sup class="reference" data-dcnode-id="8440" id="cite_ref-Freitas_30-1"><a data-dcnode-id="8441" href="#cite_note-Freitas-30"><span data-dcnode-id="8442" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8439" instrument_node="">
</span></p><span data-dcnode-id="8437" instrument_node="">
</span><h2 data-dcnode-id="8427"><span class="mw-headline" data-dcnode-id="8435" id="Physical_effects"><span data-dcnode-id="8436" instrument_node="">Physical effects</span></span><span class="mw-editsection" data-dcnode-id="8428"><span class="mw-editsection-bracket" data-dcnode-id="8433"><span data-dcnode-id="8434" instrument_node="">[</span></span><a data-dcnode-id="8431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: Physical effects"><span data-dcnode-id="8432" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8429"><span data-dcnode-id="8430" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8426" instrument_node="">
</span><p data-dcnode-id="8417"><span data-dcnode-id="8425" instrument_node="">The </span><a data-dcnode-id="8423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Academy_of_Pediatrics" title="American Academy of Pediatrics"><span data-dcnode-id="8424" instrument_node="">American Academy of Pediatrics</span></a><span data-dcnode-id="8422" instrument_node=""> has identified the sexual behaviors of American adolescents as a major public health problem.</span><sup class="reference" data-dcnode-id="8419" id="cite_ref-PED_media_31-0"><a data-dcnode-id="8420" href="#cite_note-PED_media-31"><span data-dcnode-id="8421" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8418" instrument_node="">  The Academy is concerned about the prevalence of sexually transmitted diseases in sexually active teenagers and about the very high rate of teenage pregnancy in the United States compared to other developed countries.
</span></p><p data-dcnode-id="8408"><span data-dcnode-id="8416" instrument_node="">Research into adolescents' sexual behavior in situations outside traditional dating situations, commonly referred to as "hooking up", shows that a large number of adolescents underestimate the risk involved in such situations.</span><sup class="reference" data-dcnode-id="8413" id="cite_ref-manning_32-0"><a data-dcnode-id="8414" href="#cite_note-manning-32"><span data-dcnode-id="8415" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="8410" id="cite_ref-Lescano_33-0"><a data-dcnode-id="8411" href="#cite_note-Lescano-33"><span data-dcnode-id="8412" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8409" instrument_node="">
</span></p><span data-dcnode-id="8407" instrument_node="">
</span><h3 data-dcnode-id="8397"><span class="mw-headline" data-dcnode-id="8405" id="Pregnancy"><span data-dcnode-id="8406" instrument_node="">Pregnancy</span></span><span class="mw-editsection" data-dcnode-id="8398"><span class="mw-editsection-bracket" data-dcnode-id="8403"><span data-dcnode-id="8404" instrument_node="">[</span></span><a data-dcnode-id="8401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D5" title="Edit section: Pregnancy"><span data-dcnode-id="8402" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8399"><span data-dcnode-id="8400" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8396" instrument_node="">
</span><link data-dcnode-id="8395" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8388" role="note"><span data-dcnode-id="8394" instrument_node="">Main articles: </span><a data-dcnode-id="8392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teenage_pregnancy_in_the_United_States" title="Teenage pregnancy in the United States"><span data-dcnode-id="8393" instrument_node="">Teenage pregnancy in the United States</span></a><span data-dcnode-id="8391" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teen_pregnancy" title="Teen pregnancy"><span data-dcnode-id="8390" instrument_node="">Teen pregnancy</span></a></div><span data-dcnode-id="8387" instrument_node="">
</span><p data-dcnode-id="8373"><span data-dcnode-id="8386" instrument_node="">Teen pregnancies—defined as pregnancies in females under the age of 20, regardless of marital status—in the United States decreased 28% between 1990 and 2000, from 117 pregnancies per every 1,000 teens to 84 per 1,000.</span><sup class="reference" data-dcnode-id="8383" id="cite_ref-kaiser_FS_6-1"><a data-dcnode-id="8384" href="#cite_note-kaiser_FS-6"><span data-dcnode-id="8385" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8382" instrument_node="">  The 2008 rate was a record low and represented a 42% decline from the peak rate of 117 per 1,000, which occurred in 1990.</span><sup class="reference" data-dcnode-id="8379" id="cite_ref-gutt_17-8"><a data-dcnode-id="8380" href="#cite_note-gutt-17"><span data-dcnode-id="8381" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8378" instrument_node=""> From 2009 to 2010, the teen pregnancy rate dropped 9%, the biggest one-year drop since the 1940s.</span><sup class="reference" data-dcnode-id="8375" id="cite_ref-birth_slide_34-0"><a data-dcnode-id="8376" href="#cite_note-birth_slide-34"><span data-dcnode-id="8377" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8374" instrument_node="">
</span></p><p data-dcnode-id="8351"><span data-dcnode-id="8372" instrument_node="">Each year, almost 750,000 girls aged 15–19 become pregnant. Two-thirds of all teen pregnancies occur among the oldest teens (18–19-year-olds).</span><sup class="reference" data-dcnode-id="8369" id="cite_ref-gutt_17-9"><a data-dcnode-id="8370" href="#cite_note-gutt-17"><span data-dcnode-id="8371" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8368" instrument_node="">  Of them, 82% are unplanned, accounting for about 20% of all unintended pregnancies annually.</span><sup class="reference" data-dcnode-id="8365" id="cite_ref-gutt_17-10"><a data-dcnode-id="8366" href="#cite_note-gutt-17"><span data-dcnode-id="8367" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8364" instrument_node="">  Of pregnancies among 15–19-year-olds girls in 2008, 59% ended in birth, 26% in abortion, and the rest in miscarriage.</span><sup class="reference" data-dcnode-id="8361" id="cite_ref-gutt_17-11"><a data-dcnode-id="8362" href="#cite_note-gutt-17"><span data-dcnode-id="8363" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8360" instrument_node=""> Overall, 68 pregnancies occurred per 1,000 girls aged 15–19 in 2008. Nearly 7% of 15–19-year-old girls become pregnant each year. Pregnancies are much less common among girls younger than 15. In 2008, 6.6 pregnancies occurred per 1,000 teens aged 14 or younger. In other words, fewer than 1% of teens younger than 15 become pregnant each year.</span><sup class="reference" data-dcnode-id="8357" id="cite_ref-gutt_17-12"><a data-dcnode-id="8358" href="#cite_note-gutt-17"><span data-dcnode-id="8359" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8356" instrument_node=""> Stillborn and newborn deaths are 50% higher for teen moms than women aged 20–29, and are more likely to have a low birth weight.</span><sup class="reference" data-dcnode-id="8353" id="cite_ref-WHO_pregnancy_2012_35-0"><a data-dcnode-id="8354" href="#cite_note-WHO_pregnancy_2012-35"><span data-dcnode-id="8355" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8352" instrument_node="">
</span></p><p data-dcnode-id="8330"><span data-dcnode-id="8350" instrument_node="">Teenage </span><a data-dcnode-id="8348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birth_rate" title="Birth rate"><span data-dcnode-id="8349" instrument_node="">birth rates</span></a><span data-dcnode-id="8347" instrument_node="">, as opposed to pregnancies, peaked in 1991, when there were 61.8 births per 1,000 teens, and the rate dropped in 17 of the 19 years that followed.</span><sup class="reference" data-dcnode-id="8344" id="cite_ref-birth_slide_34-1"><a data-dcnode-id="8345" href="#cite_note-birth_slide-34"><span data-dcnode-id="8346" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8343" instrument_node="">  One in four American women who had sex during their teenage years will have a baby before they are married, compared to only one in ten who wait until they are older.</span><sup class="reference" data-dcnode-id="8340" id="cite_ref-Paik_36-0"><a data-dcnode-id="8341" href="#cite_note-Paik-36"><span data-dcnode-id="8342" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8339" instrument_node="">  Even more will experience a pregnancy.  Of women who have sex in their teens, nearly 30% will conceive a child before they are married. Conversely, only 15% of women who do not have sex in their teens will become pregnant before they are married.</span><sup class="reference" data-dcnode-id="8336" id="cite_ref-Paik_36-1"><a data-dcnode-id="8337" href="#cite_note-Paik-36"><span data-dcnode-id="8338" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8335" instrument_node="">  Of all women, 16% will be teen mothers.</span><sup class="reference" data-dcnode-id="8332" id="cite_ref-pregEthnic_37-0"><a data-dcnode-id="8333" href="#cite_note-pregEthnic-37"><span data-dcnode-id="8334" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8331" instrument_node="">
</span></p><p data-dcnode-id="8316"><span data-dcnode-id="8329" instrument_node="">According to a study, girls who participate in girls-only activities are far less likely to experience a teenage pregnancy and less likely to be sexually active in general.</span><sup class="reference" data-dcnode-id="8326" id="cite_ref-whitbeck_38-0"><a data-dcnode-id="8327" href="#cite_note-whitbeck-38"><span data-dcnode-id="8328" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8325" instrument_node=""> Participating in competitive sports has also been shown to have an effect for girls. A study published in 1999 found that female adolescents who participated in sports were less likely than their non-athletic peers to engage in sexual activity and/or report a pregnancy.</span><sup class="reference" data-dcnode-id="8322" id="cite_ref-sabo_39-0"><a data-dcnode-id="8323" href="#cite_note-sabo-39"><span data-dcnode-id="8324" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8321" instrument_node=""> Males interested in arts are also less likely to be involved in a pregnancy situation. It is unclear whether these correlations are causal or the reflection of the underlying bias of the considered population. The study that reported these findings did not take into account the sexual orientation of the subjects.</span><sup class="reference" data-dcnode-id="8318" id="cite_ref-sabo_39-1"><a data-dcnode-id="8319" href="#cite_note-sabo-39"><span data-dcnode-id="8320" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8317" instrument_node="">
</span></p><p data-dcnode-id="8303"><span data-dcnode-id="8315" instrument_node="">A survey by the National Campaign to Prevent Teen Pregnancy found that "7% of youth used alcohol the first time they had sex, and 6% used alcohol the most recent time they had sex."</span><sup class="reference" data-dcnode-id="8312" id="cite_ref-NCPTP_40-0"><a data-dcnode-id="8313" href="#cite_note-NCPTP-40"><span data-dcnode-id="8314" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8311" instrument_node=""> In another study, teens aged 15–19 accounted for 15.5% of </span><a data-dcnode-id="8309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abortion" title="Abortion"><span data-dcnode-id="8310" instrument_node="">abortions</span></a><span data-dcnode-id="8308" instrument_node=""> in 2009, and patients aged 20–24 made up 32.7%. Together adolescents aged 15–24 made up just under half (48.2%) of the 784,000 abortions reported to the CDC that year.</span><sup class="reference" data-dcnode-id="8305" id="cite_ref-CDC_abortion_2009_41-0"><a data-dcnode-id="8306" href="#cite_note-CDC_abortion_2009-41"><span data-dcnode-id="8307" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8304" instrument_node="">
</span></p><p data-dcnode-id="8283"><span data-dcnode-id="8302" instrument_node="">According to one study, laws that require parental notification or consent before a minor can obtain an abortion "raise the cost of risky sex for teenagers."</span><sup class="reference" data-dcnode-id="8299" id="cite_ref-klick_42-0"><a data-dcnode-id="8300" href="#cite_note-klick-42"><span data-dcnode-id="8301" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8298" instrument_node=""> The study found that states which have enacted such laws have seen lower </span><a data-dcnode-id="8296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gonorrhea" title="Gonorrhea"><span data-dcnode-id="8297" instrument_node="">gonorrhea</span></a><span data-dcnode-id="8295" instrument_node=""> rates among teens than states that do not have such laws. The researchers of the study believe these laws lower the gonorrhea rate because teens reduce the amount of sexual activity they have and are more fastidious in their use of birth control.</span><sup class="reference" data-dcnode-id="8292" id="cite_ref-klick_42-1"><a data-dcnode-id="8293" href="#cite_note-klick-42"><span data-dcnode-id="8294" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8291" instrument_node=""> On the contrary, statistics released from the </span><a data-dcnode-id="8289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Health_Organization" title="World Health Organization"><span data-dcnode-id="8290" instrument_node="">World Health Organization</span></a><span data-dcnode-id="8288" instrument_node=""> (WHO) indicate that more restrictive laws on abortions do not necessarily mean fewer abortions; the abortion rate one year for Latin America (where, broadly speaking, abortions are generally made illegal) was 32 per 1,000 people, whereas the abortion rate for Western Europe (where overall the laws are more relaxed) was 12 in 1,000.</span><sup class="reference" data-dcnode-id="8285" id="cite_ref-WHO_abortion_2012_43-0"><a data-dcnode-id="8286" href="#cite_note-WHO_abortion_2012-43"><span data-dcnode-id="8287" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8284" instrument_node="">
</span></p><span data-dcnode-id="8282" instrument_node="">
</span><h3 data-dcnode-id="8272"><span class="mw-headline" data-dcnode-id="8280" id="Sexually_transmitted_infections"><span data-dcnode-id="8281" instrument_node="">Sexually transmitted infections</span></span><span class="mw-editsection" data-dcnode-id="8273"><span class="mw-editsection-bracket" data-dcnode-id="8278"><span data-dcnode-id="8279" instrument_node="">[</span></span><a data-dcnode-id="8276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: Sexually transmitted infections"><span data-dcnode-id="8277" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8274"><span data-dcnode-id="8275" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8271" instrument_node="">
</span><link data-dcnode-id="8270" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8263" role="note"><span data-dcnode-id="8269" instrument_node="">Main articles: </span><a class="mw-redirect" data-dcnode-id="8267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexually_transmitted_disease" title="Sexually transmitted disease"><span data-dcnode-id="8268" instrument_node="">Sexually transmitted disease</span></a><span data-dcnode-id="8266" instrument_node=""> and </span><a data-dcnode-id="8264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safe_sex" title="Safe sex"><span data-dcnode-id="8265" instrument_node="">Safe sex</span></a></div><span data-dcnode-id="8262" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8250"><div class="thumbinner" data-dcnode-id="8251" style="width:262px;"><a class="image" data-dcnode-id="8260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUnited_States_STD_rates_per_100%2C000_from_1941-2016.jpg"><img alt="" class="thumbimage" data-dcnode-id="8261" data-file-height="1150" data-file-width="1442" decoding="async" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/40/United_States_STD_rates_per_100%252C000_from_1941-2016.jpg/260px-United_States_STD_rates_per_100%252C000_from_1941-2016.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/40/United_States_STD_rates_per_100%2C000_from_1941-2016.jpg/390px-United_States_STD_rates_per_100%2C000_from_1941-2016.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/40/United_States_STD_rates_per_100%2C000_from_1941-2016.jpg/520px-United_States_STD_rates_per_100%2C000_from_1941-2016.jpg 2x" width="260"></a><span data-dcnode-id="8259" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8252"><div class="magnify" data-dcnode-id="8257"><a class="internal" data-dcnode-id="8258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUnited_States_STD_rates_per_100%2C000_from_1941-2016.jpg" title="Enlarge"></a></div><span data-dcnode-id="8256" instrument_node="">US Centers for Disease Control rates of reported syphilis, chlamydia, and gonorrhea per 100,000 people, from 1941 to 2016</span><sup class="reference" data-dcnode-id="8253" id="cite_ref-44"><a data-dcnode-id="8254" href="#cite_note-44"><span data-dcnode-id="8255" instrument_node="">[44]</span></a></sup></div></div></div><span data-dcnode-id="8249" instrument_node="">
</span><p data-dcnode-id="8236"><span data-dcnode-id="8248" instrument_node="">Each year, between 8 and 10 million American teens contract a sexually transmitted infection (STI/STD),</span><sup class="reference" data-dcnode-id="8245" id="cite_ref-45"><a data-dcnode-id="8246" href="#cite_note-45"><span data-dcnode-id="8247" instrument_node="">[note 1]</span></a></sup><span data-dcnode-id="8244" instrument_node=""> almost half of the 19 million STIs reported for all age groups in the United States.</span><sup class="reference" data-dcnode-id="8241" id="cite_ref-gutt_17-13"><a data-dcnode-id="8242" href="#cite_note-gutt-17"><span data-dcnode-id="8243" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="8238" id="cite_ref-CDC_2006_46-0"><a data-dcnode-id="8239" href="#cite_note-CDC_2006-46"><span data-dcnode-id="8240" instrument_node="">[45]</span></a></sup><span data-dcnode-id="8237" instrument_node="">
</span></p><p data-dcnode-id="8220"><span data-dcnode-id="8235" instrument_node="">Lloyd Kolbe, director of the </span><a class="mw-redirect" data-dcnode-id="8233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Center_for_Disease_Control" title="Center for Disease Control"><span data-dcnode-id="8234" instrument_node="">Center for Disease Control</span></a><span data-dcnode-id="8232" instrument_node="">'s Adolescent and School Health program, called the STI problem "a serious epidemic."</span><sup class="reference" data-dcnode-id="8229" id="cite_ref-risky_47-0"><a data-dcnode-id="8230" href="#cite_note-risky-47"><span data-dcnode-id="8231" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8228" instrument_node="">  The younger an adolescent is when they first have any type of sexual relations, including oral sex, the more likely they are to get an STI.</span><sup class="reference" data-dcnode-id="8225" id="cite_ref-Kaestle_48-0"><a data-dcnode-id="8226" href="#cite_note-Kaestle-48"><span data-dcnode-id="8227" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="8222" id="cite_ref-fox_49-0"><a data-dcnode-id="8223" href="#cite_note-fox-49"><span data-dcnode-id="8224" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8221" instrument_node="">
</span></p><p data-dcnode-id="8194"><span data-dcnode-id="8219" instrument_node="">HPV (</span><a class="mw-redirect" data-dcnode-id="8217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_papillomavirus" title="Human papillomavirus"><span data-dcnode-id="8218" instrument_node="">Human papillomavirus</span></a><span data-dcnode-id="8216" instrument_node="">) is the most common STI among teens (as well as adults).</span><sup class="reference" data-dcnode-id="8213" id="cite_ref-Dunne_2007_50-0"><a data-dcnode-id="8214" href="#cite_note-Dunne_2007-50"><span data-dcnode-id="8215" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8212" instrument_node=""> In a CDC study, 18% of teen girls were infected with HPV.</span><sup class="reference" data-dcnode-id="8209" id="cite_ref-girls_stds_51-0"><a data-dcnode-id="8210" href="#cite_note-girls_stds-51"><span data-dcnode-id="8211" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8208" instrument_node=""> Another study found that HPV infections account for about half of STIs detected among 15- to 24-year-olds each year.</span><sup class="reference" data-dcnode-id="8205" id="cite_ref-gutt_17-14"><a data-dcnode-id="8206" href="#cite_note-gutt-17"><span data-dcnode-id="8207" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="8202" id="cite_ref-Weinstock_52-0"><a data-dcnode-id="8203" href="#cite_note-Weinstock-52"><span data-dcnode-id="8204" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8201" instrument_node="">  While HPV infections may not cause any disease and is often </span><a data-dcnode-id="8199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asymptomatic" title="Asymptomatic"><span data-dcnode-id="8200" instrument_node="">asymptomatic</span></a><span data-dcnode-id="8198" instrument_node="">, it can cause </span><a class="mw-redirect" data-dcnode-id="8196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genital_warts" title="Genital warts"><span data-dcnode-id="8197" instrument_node="">genital warts</span></a><span data-dcnode-id="8195" instrument_node=""> and even cancer.
</span></p><p data-dcnode-id="8159"><span data-dcnode-id="8193" instrument_node="">After HPV, </span><a data-dcnode-id="8191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trichomoniasis" title="Trichomoniasis"><span data-dcnode-id="8192" instrument_node="">trichomoniasis</span></a><span data-dcnode-id="8190" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chlamydia_infection" title="Chlamydia infection"><span data-dcnode-id="8189" instrument_node="">chlamydia</span></a><span data-dcnode-id="8187" instrument_node=""> are the most common STI diagnoses among 15- to 24-year-olds; combined, they account for slightly more than one third of diagnoses each year.</span><sup class="reference" data-dcnode-id="8184" id="cite_ref-gutt_17-15"><a data-dcnode-id="8185" href="#cite_note-gutt-17"><span data-dcnode-id="8186" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8183" instrument_node=""> </span><a data-dcnode-id="8181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genital_herpes" title="Genital herpes"><span data-dcnode-id="8182" instrument_node="">Genital herpes</span></a><span data-dcnode-id="8180" instrument_node=""> and </span><a data-dcnode-id="8178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gonorrhea" title="Gonorrhea"><span data-dcnode-id="8179" instrument_node="">gonorrhea</span></a><span data-dcnode-id="8177" instrument_node=""> together account for about 12% of diagnoses. </span><a data-dcnode-id="8175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HIV" title="HIV"><span data-dcnode-id="8176" instrument_node="">HIV</span></a><span data-dcnode-id="8174" instrument_node="">, </span><a data-dcnode-id="8172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syphilis" title="Syphilis"><span data-dcnode-id="8173" instrument_node="">syphilis</span></a><span data-dcnode-id="8171" instrument_node=""> and </span><a data-dcnode-id="8169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hepatitis_B" title="Hepatitis B"><span data-dcnode-id="8170" instrument_node="">hepatitis B</span></a><span data-dcnode-id="8168" instrument_node=""> account for less than 1% of diagnoses,</span><sup class="reference" data-dcnode-id="8165" id="cite_ref-gutt_17-16"><a data-dcnode-id="8166" href="#cite_note-gutt-17"><span data-dcnode-id="8167" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8164" instrument_node=""> however young people aged 13–24 accounted for about 21% of all new HIV diagnoses in the United States in 2011.</span><sup class="reference" data-dcnode-id="8161" id="cite_ref-gutt_17-17"><a data-dcnode-id="8162" href="#cite_note-gutt-17"><span data-dcnode-id="8163" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8160" instrument_node="">
</span></p><p data-dcnode-id="8149"><span data-dcnode-id="8158" instrument_node="">Researchers from the CDC have stated that teenagers often do not understand the risks associated with sexual activity. "Research suggests that adolescents perceive fewer health-related risks for oral sex compared with vaginal intercourse. However, young people, particularly those who have oral sex before their first vaginal intercourse, may still be placing themselves at risk of STIs or HIV before they are ever at risk of pregnancy."</span><sup class="reference" data-dcnode-id="8155" id="cite_ref-fox_49-1"><a data-dcnode-id="8156" href="#cite_note-fox-49"><span data-dcnode-id="8157" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8154" instrument_node=""> "Several studies have documented that oral sex can transmit certain STIs, including chlamydia, genital herpes, gonorrhea and syphilis. Teenagers and young adults engaging in sexual activity are at increased risk of STIs or HIV."</span><sup class="reference" data-dcnode-id="8151" id="cite_ref-fox_49-2"><a data-dcnode-id="8152" href="#cite_note-fox-49"><span data-dcnode-id="8153" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8150" instrument_node="">
</span></p><p data-dcnode-id="8135"><span data-dcnode-id="8148" instrument_node="">A 2008 study by the CDC found that one in four teen girls, or an estimated 3 million girls, has an STI.</span><sup class="reference" data-dcnode-id="8145" id="cite_ref-girls_stds_51-1"><a data-dcnode-id="8146" href="#cite_note-girls_stds-51"><span data-dcnode-id="8147" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8144" instrument_node=""> The study of 838 girls who participated in a 2003–04 government health survey found the highest overall prevalence among black girls; nearly half in the study were infected.  This is compared with 20% among both white and Mexican-American teens.</span><sup class="reference" data-dcnode-id="8141" id="cite_ref-Nearly_1_in_4_Teen_Girls_Has_STD,_CDC_Says_53-0"><a data-dcnode-id="8142" href="#cite_note-Nearly_1_in_4_Teen_Girls_Has_STD,_CDC_Says-53"><span data-dcnode-id="8143" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8140" instrument_node=""> The same study found that, among those who were infected, 15% had more than one STI, and 20% of those who said they had only one sexual partner were infected.</span><sup class="reference" data-dcnode-id="8137" id="cite_ref-girls_stds_51-2"><a data-dcnode-id="8138" href="#cite_note-girls_stds-51"><span data-dcnode-id="8139" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8136" instrument_node="">
</span></p><p data-dcnode-id="8123"><span data-dcnode-id="8134" instrument_node="">In a 2011 study by the CDC, 7.1% of females and 2.1% of males aged 15–24 were infected with </span><a class="mw-redirect" data-dcnode-id="8132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chlamydia_infection" title="Chlamydia infection"><span data-dcnode-id="8133" instrument_node="">chlamydia</span></a><span data-dcnode-id="8131" instrument_node="">,</span><sup class="reference" data-dcnode-id="8128" id="cite_ref-CDC_2011_54-0"><a data-dcnode-id="8129" href="#cite_note-CDC_2011-54"><span data-dcnode-id="8130" instrument_node="">[53]</span></a></sup><sup class="reference nowrap" data-dcnode-id="8125"><span data-dcnode-id="8126" title="Page / location: 65"><span data-dcnode-id="8127" instrument_node="">: 65 </span></span></sup><span data-dcnode-id="8124" instrument_node=""> historically the most prevalent of all STIs in the general population (after HPV).
</span></p><p data-dcnode-id="8120"><br data-dcnode-id="8122"><span data-dcnode-id="8121" instrument_node="">
</span></p><span data-dcnode-id="8119" instrument_node="">
</span><h2 data-dcnode-id="8109"><span class="mw-headline" data-dcnode-id="8117" id="Psychological_effects"><span data-dcnode-id="8118" instrument_node="">Psychological effects</span></span><span class="mw-editsection" data-dcnode-id="8110"><span class="mw-editsection-bracket" data-dcnode-id="8115"><span data-dcnode-id="8116" instrument_node="">[</span></span><a data-dcnode-id="8113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: Psychological effects"><span data-dcnode-id="8114" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8111"><span data-dcnode-id="8112" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8108" instrument_node="">
</span><h3 data-dcnode-id="8098"><span class="mw-headline" data-dcnode-id="8106" id="Benefits_and_negative_effects"><span data-dcnode-id="8107" instrument_node="">Benefits and negative effects</span></span><span class="mw-editsection" data-dcnode-id="8099"><span class="mw-editsection-bracket" data-dcnode-id="8104"><span data-dcnode-id="8105" instrument_node="">[</span></span><a data-dcnode-id="8102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: Benefits and negative effects"><span data-dcnode-id="8103" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8100"><span data-dcnode-id="8101" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8097" instrument_node="">
</span><p data-dcnode-id="8072"><span data-dcnode-id="8096" instrument_node="">The </span><a data-dcnode-id="8094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Precocious_puberty" title="Precocious puberty"><span data-dcnode-id="8095" instrument_node="">earlier onset of puberty</span></a><span data-dcnode-id="8093" instrument_node=""> can produce sexual drives at a time when teens are not yet fully socialized to understand the potential social and emotional consequences of sexual activities.</span><sup class="reference" data-dcnode-id="8090" id="cite_ref-USATodayTeens_55-0"><a data-dcnode-id="8091" href="#cite_note-USATodayTeens-55"><span data-dcnode-id="8092" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="8087" id="cite_ref-sex_lives_56-0"><a data-dcnode-id="8088" href="#cite_note-sex_lives-56"><span data-dcnode-id="8089" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="8084" id="cite_ref-Garn_57-0"><a data-dcnode-id="8085" href="#cite_note-Garn-57"><span data-dcnode-id="8086" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="8081" id="cite_ref-Caspi_58-0"><a data-dcnode-id="8082" href="#cite_note-Caspi-58"><span data-dcnode-id="8083" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="8078" id="cite_ref-Stattin_59-0"><a data-dcnode-id="8079" href="#cite_note-Stattin-59"><span data-dcnode-id="8080" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8077" instrument_node="">  Some scholars claim that the risk for depression is "clearly elevated" for the sexually active of either gender.</span><sup class="reference" data-dcnode-id="8074" id="cite_ref-Hallfors_60-0"><a data-dcnode-id="8075" href="#cite_note-Hallfors-60"><span data-dcnode-id="8076" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8073" instrument_node="">
</span></p><p data-dcnode-id="8066"><span data-dcnode-id="8071" instrument_node="">"We tend to focus on the health consequences of having sex, like pregnancy and STIs, but we also need to talk to [teens] about all the emotional consequences," some experts say.</span><sup class="reference" data-dcnode-id="8068" id="cite_ref-UCSF_13-1"><a data-dcnode-id="8069" href="#cite_note-UCSF-13"><span data-dcnode-id="8070" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8067" instrument_node="">
</span></p><p data-dcnode-id="8056"><span data-dcnode-id="8065" instrument_node="">Some research suggests that two-thirds of sexually active girls wish they had waited longer before having sex.</span><sup class="reference" data-dcnode-id="8062" id="cite_ref-Lukas_61-0"><a data-dcnode-id="8063" href="#cite_note-Lukas-61"><span data-dcnode-id="8064" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8061" instrument_node=""> Of seniors in high school, 74% of girls regret sexual experiences they have had.</span><sup class="reference" data-dcnode-id="8058" id="cite_ref-The_Truth_about_Sex_by_High_School_Senior_Girls_62-0"><a data-dcnode-id="8059" href="#cite_note-The_Truth_about_Sex_by_High_School_Senior_Girls-62"><span data-dcnode-id="8060" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8057" instrument_node="">
</span></p><p data-dcnode-id="8046"><span data-dcnode-id="8055" instrument_node="">For girls, even modest involvement in sexual experimentation elevates depression risk.</span><sup class="reference" data-dcnode-id="8052" id="cite_ref-depress_63-0"><a data-dcnode-id="8053" href="#cite_note-depress-63"><span data-dcnode-id="8054" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8051" instrument_node="">  Sexually active teenage girls are more than twice as likely to suffer depression compared to those who are not sexually active.</span><sup class="reference" data-dcnode-id="8048" id="cite_ref-Sabia_64-0"><a data-dcnode-id="8049" href="#cite_note-Sabia-64"><span data-dcnode-id="8050" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8047" instrument_node="">
</span></p><p data-dcnode-id="8032"><span data-dcnode-id="8045" instrument_node="">Sex therapists have found that the roots of sexual issues facing adults often date back to regretful teenage experiences.</span><sup class="reference" data-dcnode-id="8042" id="cite_ref-UCSF_13-2"><a data-dcnode-id="8043" href="#cite_note-UCSF-13"><span data-dcnode-id="8044" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8041" instrument_node="">  Research has also found that being abstinent in the teen years was associated with better mental health at age 29.</span><sup class="reference" data-dcnode-id="8038" id="cite_ref-Bogart_65-0"><a data-dcnode-id="8039" href="#cite_note-Bogart-65"><span data-dcnode-id="8040" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8037" instrument_node="">  Girls who were virgins at age 18 were also less likely to have a mental illness at age 40.</span><sup class="reference" data-dcnode-id="8034" id="cite_ref-Finger_66-0"><a data-dcnode-id="8035" href="#cite_note-Finger-66"><span data-dcnode-id="8036" instrument_node="">[65]</span></a></sup><span data-dcnode-id="8033" instrument_node="">
</span></p><p data-dcnode-id="8015"><span data-dcnode-id="8031" instrument_node="">Girls are "at particular risk for experiencing negative social and emotional consequences of having any type of sex," including oral sex.</span><sup class="reference" data-dcnode-id="8028" id="cite_ref-uc_12-2"><a data-dcnode-id="8029" href="#cite_note-uc-12"><span data-dcnode-id="8030" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8027" instrument_node=""> Girls are more than twice as likely as boys to say they felt bad about themselves and more than three times as likely to say they felt used as a result of engaging in sex</span><sup class="reference" data-dcnode-id="8024" id="cite_ref-UCSF_13-3"><a data-dcnode-id="8025" href="#cite_note-UCSF-13"><span data-dcnode-id="8026" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8023" instrument_node=""> or hookups.</span><sup class="reference" data-dcnode-id="8020" id="cite_ref-UCSF_13-4"><a data-dcnode-id="8021" href="#cite_note-UCSF-13"><span data-dcnode-id="8022" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="8017" id="cite_ref-Sax_67-0"><a data-dcnode-id="8018" href="#cite_note-Sax-67"><span data-dcnode-id="8019" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8016" instrument_node="">
</span></p><p data-dcnode-id="8009"><span data-dcnode-id="8014" instrument_node="">In a study of casual sex among adolescents, many girls believed they could have a purely sexual experience with no emotional ties, and they believed it was sexist to assume otherwise.  However, the study found that both the girls and the boys who were hooking up often were depressed and did not feel very good about themselves.</span><sup class="reference" data-dcnode-id="8011" id="cite_ref-Denizet-Lewis_68-0"><a data-dcnode-id="8012" href="#cite_note-Denizet-Lewis-68"><span data-dcnode-id="8013" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8010" instrument_node="">
</span></p><span data-dcnode-id="8008" instrument_node="">
</span><h3 data-dcnode-id="7998"><span class="mw-headline" data-dcnode-id="8006" id="Effects_on_relationships"><span data-dcnode-id="8007" instrument_node="">Effects on relationships</span></span><span class="mw-editsection" data-dcnode-id="7999"><span class="mw-editsection-bracket" data-dcnode-id="8004"><span data-dcnode-id="8005" instrument_node="">[</span></span><a data-dcnode-id="8002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: Effects on relationships"><span data-dcnode-id="8003" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8000"><span data-dcnode-id="8001" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7997" instrument_node="">
</span><p data-dcnode-id="7992"><span data-dcnode-id="7996" instrument_node="">When engaging in sexual acts the body produces </span><a data-dcnode-id="7994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxytocin" title="Oxytocin"><span data-dcnode-id="7995" instrument_node="">oxytocin</span></a><span data-dcnode-id="7993" instrument_node="">, a chemical produced in the brain to promote feelings of connection and love.
</span></p><span data-dcnode-id="7991" instrument_node="">
</span><h2 data-dcnode-id="7981"><span class="mw-headline" data-dcnode-id="7989" id="Dating_violence_and_sexual_assault"><span data-dcnode-id="7990" instrument_node="">Dating violence and sexual assault</span></span><span class="mw-editsection" data-dcnode-id="7982"><span class="mw-editsection-bracket" data-dcnode-id="7987"><span data-dcnode-id="7988" instrument_node="">[</span></span><a data-dcnode-id="7985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAdolescent_sexuality_in_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Dating violence and sexual assault"><span data-dcnode-id="7986" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7983"><span data-dcnode-id="7984" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7980" instrument_node="">
</span><link data-dcnode-id="7979" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7966" role="note"><span data-dcnode-id="7978" instrument_node="">Main articles: </span><a data-dcnode-id="7976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teen_dating_violence" title="Teen dating violence"><span data-dcnode-id="7977" instrument_node="">Teen dating violence</span></a><span data-dcnode-id="7975" instrument_node="">, </span><a data-dcnode-id="7973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_assault" title="Sexual assault"><span data-dcnode-id="7974" instrument_node="">Sexual assault</span></a><span data-dcnode-id="7972" instrument_node="">, </span><a data-dcnode-id="7970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domestic_violence" title="Domestic violence"><span data-dcnode-id="7971" instrument_node="">Domestic violence</span></a><span data-dcnode-id="7969" instrument_node="">, and </span><a data-dcnode-id="7967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Date_rape" title="Date rape"><span data-dcnode-id="7968" instrument_node="">Date rape</span></a></div><span data-dcnode-id="7965" instrument_node="">
</span><p data-dcnode-id="7955"><span data-dcnode-id="7964" instrument_node="">Teen dating violence is defined as the physical, sexual, psychological or emotional violence within a dating relationship, as well as stalking.</span><sup class="reference" data-dcnode-id="7961" id="cite_ref-CDC_2009_dating_violence_69-0"><a data-dcnode-id="7962" href="#cite_note-CDC_2009_dating_violence-69"><span data-dcnode-id="7963" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7960" instrument_node=""> This includes electronic forms (e.g., threatening text messages, excessive yelling or cursing at someone in a phone message) as well as face-to-face forms.</span><sup class="reference" data-dcnode-id="7957" id="cite_ref-CDC_2009_dating_violence_69-1"><a data-dcnode-id="7958" href="#cite_note-CDC_2009_dating_violence-69"><span data-dcnode-id="7959" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7956" instrument_node="">
</span></p><p data-dcnode-id="7941"><span data-dcnode-id="7954" instrument_node="">Girls who have engaged in sexual intercourse are five times more likely than their virgin peers to be the victim of dating violence.</span><sup class="reference" data-dcnode-id="7951" id="cite_ref-violence_70-0"><a data-dcnode-id="7952" href="#cite_note-violence-70"><span data-dcnode-id="7953" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7950" instrument_node="">  Girls who were intentionally hurt by a date in the past 12 months are at a "significantly elevated risk for a broad range of sexual health concerns and for pregnancy."</span><sup class="reference" data-dcnode-id="7947" id="cite_ref-violence_70-1"><a data-dcnode-id="7948" href="#cite_note-violence-70"><span data-dcnode-id="7949" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7946" instrument_node="">  Girls who have been victims are also twice as likely to report high levels of multiple sexual partners.</span><sup class="reference" data-dcnode-id="7943" id="cite_ref-violence_70-2"><a data-dcnode-id="7944" href="#cite_note-violence-70"><span data-dcnode-id="7945" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7942" instrument_node="">
