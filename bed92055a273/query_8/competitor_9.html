0)</span></td><td class="align-left valign-top" data-dcnode-id="5623" id="en0709"><span data-dcnode-id="5624" instrument_node="">(0.1910)</span></td></tr><tr data-dcnode-id="5616"><th class="align-left valign-top" data-dcnode-id="5619" id="en0710" scope="row"><strong data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">noise</span></strong></th><td class="align-left valign-top" data-dcnode-id="5618" id="en0711"></td><td class="align-left valign-top" data-dcnode-id="5617" id="en0712"></td></tr><tr data-dcnode-id="5609"><th class="align-left valign-top" data-dcnode-id="5614" id="en0713" scope="row"><span data-dcnode-id="5615" instrument_node="">constant</span></th><td class="align-left valign-top" data-dcnode-id="5612" id="en0714"><span data-dcnode-id="5613" instrument_node="">2.1919***</span></td><td class="align-left valign-top" data-dcnode-id="5610" id="en0715"><span data-dcnode-id="5611" instrument_node="">2.0209***</span></td></tr><tr data-dcnode-id="5603"><th class="align-left valign-top" data-dcnode-id="5608" id="en0716" scope="row"></th><td class="align-left valign-top" data-dcnode-id="5606" id="en0717"><span data-dcnode-id="5607" instrument_node="">(0.3562)</span></td><td class="align-left valign-top" data-dcnode-id="5604" id="en0718"><span data-dcnode-id="5605" instrument_node="">(0.3381)</span></td></tr><tr data-dcnode-id="5596"><th class="align-left valign-top" data-dcnode-id="5601" id="en0719" scope="row"><span data-dcnode-id="5602" instrument_node="">N</span></th><td class="align-left valign-top" data-dcnode-id="5599" id="en0720"><span data-dcnode-id="5600" instrument_node="">17,520</span></td><td class="align-left valign-top" data-dcnode-id="5597" id="en0721"><span data-dcnode-id="5598" instrument_node="">8760</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="5574"></p><p data-dcnode-id="5589" id="spara011q"><a class="topic-link" data-dcnode-id="5591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/measure-of-dispersion" title="Learn more about Standard errors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5592" instrument_node="">Standard errors</span></a><span data-dcnode-id="5590" instrument_node=""> clustered on individual in parentheses</span></p><p data-dcnode-id="5575" id="spara011w"><span data-dcnode-id="5588" instrument_node="">+</span><em data-dcnode-id="5586"><span data-dcnode-id="5587" instrument_node="">p</span></em><span data-dcnode-id="5585" instrument_node="">&lt;0.1, *</span><em data-dcnode-id="5583"><span data-dcnode-id="5584" instrument_node="">p</span></em><span data-dcnode-id="5582" instrument_node="">&lt;0.05, **</span><em data-dcnode-id="5580"><span data-dcnode-id="5581" instrument_node="">p</span></em><span data-dcnode-id="5579" instrument_node="">&lt;0.01, ***</span><em data-dcnode-id="5577"><span data-dcnode-id="5578" instrument_node="">p</span></em><span data-dcnode-id="5576" instrument_node="">&lt;0.001</span></p><p></p></div></div><p data-dcnode-id="5566" id="para0045"><span data-dcnode-id="5571" instrument_node="">We find that results across the two methods are qualitatively consistent, however, of strikingly different magnitude. Participants who are observed take more risks in both gains and losses are more loss averse than participants who make their decisions in private.</span><a class="workspace-trigger" data-dcnode-id="5568" href="#cit_8" name="bcit_8"><sup data-dcnode-id="5569"><span data-dcnode-id="5570" instrument_node="">8</span></sup></a><span data-dcnode-id="5567" instrument_node=""> However, comparing the between- and within-subject approach, we discover that all the estimated coefficients are of the same sign, but generally the coefficients are bigger, and the results are significant at a stricter threshold in the between-subject analysis. This especially stark difference holds for the estimated effects of observation on risk tolerance in losses and loss aversion, which are respectively 2.6 and 3.3 times larger using the between-subject approach. The effect of observation on risk tolerance in gains is 11.4% higher in the between-subject analysis than in the within-subject analysis. This comparison highlights that, when extrapolating from the laboratory findings to real life, it is important to consider whether the problem studied more resembles a within- or between-subject design.</span></p><p data-dcnode-id="5564" id="para0047"><span data-dcnode-id="5565" instrument_node="">For the analysis that follows, we return to the within-subject approach.</span></p></section><section data-dcnode-id="5108" id="sec0014"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5559" id="cesectitle0018"><span data-dcnode-id="5562" instrument_node="">3.5</span><span data-dcnode-id="5561" instrument_node="">. </span><span data-dcnode-id="5560" instrument_node="">Individual-level analysis of the effect of observation</span></h3><p data-dcnode-id="5557" id="para0048"><span data-dcnode-id="5558" instrument_node="">As the aggregate approach to data can often hide interesting patterns at the individual level, we also analyzed our data at the individual level. We used a non-structural approach due to difficulties in estimating the structural model at the individual level. For this reason, this section does not discuss loss aversion.</span></p><div data-dcnode-id="5406"><p data-dcnode-id="5552" id="para0049"><span data-dcnode-id="5556" instrument_node="">As the first step in this analysis, for each individual in each trial type, we classified whether they became more risk-tolerant, less risk-tolerant, or did not change their risk tolerance under observation (see </span><a class="workspace-trigger" data-dcnode-id="5554" href="#tbl0004" name="btbl0004"><span data-dcnode-id="5555" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="5553" instrument_node="">). Consistent with our findings, the majority of 18–24-year-olds became more risk-tolerant in gain (80.65%), loss (64.52%), and mixed trials (96.77%). Among younger adolescents, the findings are much more mixed, but the most common pattern is a decrease in risk tolerance under observation in each of the trial types.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="5407" id="tbl0004"><span class="captions" data-dcnode-id="5545"><span data-dcnode-id="5546" id="cap0012"><p data-dcnode-id="5547" id="spara014"><span class="label" data-dcnode-id="5550"><span data-dcnode-id="5551" instrument_node="">Table 4</span></span><span data-dcnode-id="5549" instrument_node="">. </span><span data-dcnode-id="5548" instrument_node="">Number of Choice-Makers who under observation show an increase/decrease/no change in risk tolerance by trial types.</span></p></span></span><div class="groups" data-dcnode-id="5408"><table data-dcnode-id="5409"><tbody data-dcnode-id="5410"><tr class="rowsep-1" data-dcnode-id="5537"><th class="align-left valign-top" data-dcnode-id="5544" id="en0728" scope="row"></th><td class="align-left valign-top" data-dcnode-id="5542" id="en0729"><span data-dcnode-id="5543" instrument_node="">gains</span></td><td class="align-left valign-top" data-dcnode-id="5540" id="en0730"><span data-dcnode-id="5541" instrument_node="">losses</span></td><td class="align-left valign-top" data-dcnode-id="5538" id="en0731"><span data-dcnode-id="5539" instrument_node="">mixed</span></td></tr><tr data-dcnode-id="5531"><th class="align-left valign-top" data-dcnode-id="5535" id="en0732" scope="row"><span data-dcnode-id="5536" instrument_node="">A All Choice -Makers</span></th><td class="align-left valign-top" data-dcnode-id="5534" id="en0733"></td><td class="align-left valign-top" data-dcnode-id="5533" id="en0734"></td><td class="align-left valign-top" data-dcnode-id="5532" id="en0735"></td></tr><tr data-dcnode-id="5522"><th class="align-left valign-top" data-dcnode-id="5529" id="en0736" scope 468" instrument_node="">4</span></td><td class="align-left valign-top" data-dcnode-id="5465" id="en0766"><span data-dcnode-id="5466" instrument_node="">7</span></td><td class="align-left valign-top" data-dcnode-id="5463" id="en0767"><span data-dcnode-id="5464" instrument_node="">0</span></td></tr><tr data-dcnode-id="5453"><th class="align-left valign-top" data-dcnode-id="5460" id="en0768" scope="row"><span data-dcnode-id="5461" instrument_node="">Total</span></th><td class="align-left valign-top" data-dcnode-id="5458" id="en0769"><span data-dcnode-id="5459" instrument_node="">31</span></td><td class="align-left valign-top" data-dcnode-id="5456" id="en0770"><span data-dcnode-id="5457" instrument_node="">31</span></td><td class="align-left valign-top" data-dcnode-id="5454" id="en0771"><span data-dcnode-id="5455" instrument_node="">31</span></td></tr><tr data-dcnode-id="5447"><th class="align-left valign-top" data-dcnode-id="5451" id="en0772" scope="row"><span data-dcnode-id="5452" instrument_node="">C 12–17 year old Choice-Makers</span></th><td class="align-left valign-top" data-dcnode-id="5450" id="en0773"></td><td class="align-left valign-top" data-dcnode-id="5449" id="en0774"></td><td class="align-left valign-top" data-dcnode-id="5448" id="en0775"></td></tr><tr data-dcnode-id="5438"><th class="align-left valign-top" data-dcnode-id="5445" id="en0776" scope="row"><span data-dcnode-id="5446" instrument_node="">↑ risk tolerance</span></th><td class="align-left valign-top" data-dcnode-id="5443" id="en0777"><span data-dcnode-id="5444" instrument_node="">17</span></td><td class="align-left valign-top" data-dcnode-id="5441" id="en0778"><span data-dcnode-id="5442" instrument_node="">12</span></td><td class="align-left valign-top" data-dcnode-id="5439" id="en0779"><span data-dcnode-id="5440" instrument_node="">19</span></td></tr><tr data-dcnode-id="5429"><th class="align-left valign-top" data-dcnode-id="5436" id="en0780" scope="row"><span data-dcnode-id="5437" instrument_node="">↓ risk tolerance</span></th><td class="align-left valign-top" data-dcnode-id="5434" id="en0781"><span data-dcnode-id="5435" instrument_node="">24</span></td><td class="align-left valign-top" data-dcnode-id="5432" id="en0782"><span data-dcnode-id="5433" instrument_node="">22</span></td><td class="align-left valign-top" data-dcnode-id="5430" id="en0783"><span data-dcnode-id="5431" instrument_node="">22</span></td></tr><tr data-dcnode-id="5420"><th class="align-left valign-top" data-dcnode-id="5427" id="en0784" scope="row"><span data-dcnode-id="5428" instrument_node="">no change</span></th><td class="align-left valign-top" data-dcnode-id="5425" id="en0785"><span data-dcnode-id="5426" instrument_node="">1</span></td><td class="align-left valign-top" data-dcnode-id="5423" id="en0786"><span data-dcnode-id="5424" instrument_node="">8</span></td><td class="align-left valign-top" data-dcnode-id="5421" id="en0787"><span data-dcnode-id="5422" instrument_node="">1</span></td></tr><tr data-dcnode-id="5411"><th class="align-left valign-top" data-dcnode-id="5418" id="en0788" scope="row"><span data-dcnode-id="5419" instrument_node="">Total</span></th><td class="align-left valign-top" data-dcnode-id="5416" id="en0789"><span data-dcnode-id="5417" instrument_node="">42</span></td><td class="align-left valign-top" data-dcnode-id="5414" id="en0790"><span data-dcnode-id="5415" instrument_node="">42</span></td><td class="align-left valign-top" data-dcnode-id="5412" id="en0791"><span data-dcnode-id="5413" instrument_node="">42</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="5336"><p data-dcnode-id="5401" id="para0050"><span data-dcnode-id="5405" instrument_node="">To check whether individual participants consistently change their risk tolerance under observation in the same direction in both gain and loss trials, we classified participants into four types: those who in both types of trials increase their risk tolerance, those who decrease their risk tolerance, those who increase their risk tolerance in one type of trial but decrease in the other, and those who do not change their risk tolerance. We did not consider mixed trials because it is unclear whether the change in the frequency of risky lottery choices should be attributed to a change in risk tolerance or a change in loss aversion. As shown in </span><a class="workspace-trigger" data-dcnode-id="5403" href="#tbl0005" name="btbl0005"><span data-dcnode-id="5404" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="5402" instrument_node="">, 54.84% of the 18–24-year-olds are consistently more risk-tolerant when observed in both trial types and none of them are consistently less risk-tolerant. Again, among younger adolescents, the findings are mixed — 45.24% decrease and 23.81% increase their risk tolerance under observation. 38.71% of older and 30.95% of younger adolescents are mixed types, changing their preferences differently in gain and loss trials.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="5337" id="tbl0005"><span class="captions" data-dcnode-id="5394"><span data-dcnode-id="5395" id="cap0013"><p data-dcnode-id="5396" id="spara015"><span class="label" data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">Table 5</span></span><span data-dcnode-id="5398" instrument_node="">. </span><span data-dcnode-id="5397" instrument_node="">Classification of Choice-Makers’ types based on responses to observation in both gain and loss trials. Data from mixed trials is not included in this classification.</span></p></span></span><div class="groups" data-dcnode-id="5338"><table data-dcnode-id="5339"><tbody data-dcnode-id="5340"><tr class="rowsep-1" data-dcnode-id="5386"><th class="align-left valign-top" data-dcnode-id="5393" id="en0792" scope="row"></th><td class="align-left valign-top" data-dcnode-id="5391" id="en0793"><span data-dcnode-id="5392" instrument_node="">18–24 years old</span></td><td class="align-left valign-top" data-dcnode-id="5389" id="en0794"><span data-dcnode-id="5390" instrument_node="">12–17 years old</span></td><td class="align-left valign-top" data-dcnode-id="5387" id="en0795"><span data-dcnode-id="5388" instrument_node="">All subjects</span></td></tr><tr data-dcnode-id="5377"><th class="align-left valign-top" data-dcnode-id="5384" id="en0796" scope="row"><span data-dcnode-id="5385" instrument_node="">↑ risk tolerance</span></th><td class="align-left valign-top" data-dcnode-id="5382" id="en0797"><span data-dcnode-id="5383" instrument_node="">17</span></td><td class="align-left valign-top" data-dcnode-id="5380" id="en0798"><span data-dcnode-id="5381" instrument_node="">10</span></td><td class="align-left valign-top" data-dcnode-id="5378" id="en0799"><span data-dcnode-id="5379" instrument_node="">27</span></td></tr><tr data-dcnode-id="5368"><th class="align-left valign-top" data-dcnode-id="5375" id="en0800" scope="row"><span data-dcnode-id="5376" instrument_node="">↓ risk tolerance</span></th><td class="align-left valign-top" data-dcnode-id="5373" id="en0801"><span data-dcnode-id="5374" instrument_node="">0</span></td><td class="align-left valign-top" data-dcnode-id="5371" id="en0802"><span data-dcnode-id="5372" instrument_node="">19</span></td><td class="align-left valign-top" data-dcnode-id="5369" id="en0803"><span data-dcnode-id="5370" instrument_node="">19</span></td></tr><tr data-dcnode-id="5359"><th class="align-left valign-top" data-dcnode-id="5366" id="en0804" scope="row"><span data-dcnode-id="5367" instrument_node="">no change</span></th><td class="align-left valign-top" data-dcnode-id="5364" id="en0805"><span data-dcnode-id="5365" instrument_node="">2</span></td><td class="align-left valign-top" data-dcnode-id="5362" id="en0806"><span data-dcnode-id="5363" instrument_node="">0</span></td><td class="align-left valign-top" data-dcnode-id="5360" id="en0807"><span data-dcnode-id="5361" instrument_node="">2</span></td></tr><tr data-dcnode-id="5350"><th class="align-left valign-top" data-dcnode-id="5357" id="en0808" scope="row"><span data-dcnode-id="5358" instrument_node="">mixed response</span></th><td class="align-left valign-top" data-dcnode-id="5355" id="en0809"><span data-dcnode-id="5356" instrument_node="">12</span></td><td class="align-left valign-top" data-dcnode-id="5353" id="en0810"><span data-dcnode-id="5354" instrument_node="">13</span></td><td class="align-left valign-top" data-dcnode-id="5351" id="en0811"><span data-dcnode-id="5352" instrument_node="">25</span></td></tr><tr data-dcnode-id="5341"><th class="align-left valign-top" data-dcnode-id="5348" id="en0812" scope="row"><span data-dcnode-id="5349" instrument_node="">Total</span></th><td class="align-left valign-top" data-dcnode-id="5346" id="en0813"><span data-dcnode-id="5347" instrument_node="">31</span></td><td class="align-left valign-top" data-dcnode-id="5344" id="en0814"><span data-dcnode-id="5345" instrument_node="">42</span></td><td class="align-left valign-top" data-dcnode-id="5342" id="en0815"><span data-dcnode-id="5343" instrument_node="">73</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="5109"><p data-dcnode-id="5327" id="para0051"><span data-dcnode-id="5335" instrument_node="">Finally, we checked whether any individual-specific characteristics make participants more likely to be of a certain type. For this purpose, we created three indicator variables that capture an individual's behavioral pattern: always increases risk tolerance, always decreases risk tolerance, and has a different response in gains and losses. There are only two participants who do not change their risky lottery choices for both gain and loss domains and thus we ignore this type. We then used logistic regressions to determine whether certain socioeconomic and demographic characteristics increase the likelihood of being a certain type. </span><a class="workspace-trigger" data-dcnode-id="5333" href="#tbl0006" name="btbl0006"><span data-dcnode-id="5334" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="5332" instrument_node=""> shows that younger adolescents and those who expect to interact after the experiment are less likely to increase risk tolerance in response to the observation. Choice-makers who were paired with Observers of the same gender</span><a class="workspace-trigger" data-dcnode-id="5329" href="#cit_9" name="bcit_9"><sup data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">9</span></sup></a><span data-dcnode-id="5328" instrument_node=""> are less likely to decrease risk tolerance when being observed. Gender, wealth, partner's gender, familiarity with the Observer, popularity, and differences in these variables between the Choice-Maker and Observer did not contribute to explaining a participant's type. In the appendix, we additionally estimate whether the same variables mediate the effect of observation on preferences and choices. Our only result that is consistent between the structural analysis (Table D3.4) and logistic regressions (Table D3.5) is quite counterintuitive – Choice-Makers who subjectively felt they were observed more intensively were slightly less affected by observation. Being in a same gender pair did not mediate the effect of observation in this additional analysis.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="5110" id="tbl0006"><span class="captions" data-dcnode-id="5320"><span data-dcnode-id="5321" id="cap0014"><p data-dcnode-id="5322" id="spara016"><span class="label" data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">Table 6</span></span><span data-dcnode-id="5324" instrument_node="">. </span><span data-dcnode-id="5323" instrument_node="">Determinants of Choice-Maker's type. Logistic regression with dependent variable =1 if participants increase risk tolerance in both types of trials (=0 otherwise) in the second column; dependent variable =1 if participants decrease risk tolerance in both types of trials (=0 otherwise) in the third column; dependent variable =1 if participants increase risk tolerance in one type of trial but decrease in the other in the last column (=0 otherwise). 12–17 y. o. is an indicator variable for participants who are 12 to 17 years old; wealth is self-reported wealth on a scale from 1 (very poor) to 5 (very rich); male is an indicator for male participants; familiar is the familiarity score between Choice-Maker and Observer from the post-experiment questionnaire; interact after is how likely Choice-Makers expect to interact with their Observers after the experiment on a scale from 1 (very unlikely) to 5 (very likely); popularity is the popularity score calculated as the sum of self-reported strength and attractiveness, each on a scale from 1 (not strong/attractive) to 5 (very strong/attractive); age difference is the difference between the Choice-Makers’ and Observers’ age; popularity difference is the difference between own popularity score and the perception of partner's popularity score; partner male is an indicator variable equal to one if partner's gender is male; same gender is an indicator variable equal to one if the Choice-Maker and the Observer are in same gender. 12–17 y. o. is omitted in the second column because no older adolescents decrease risk tolerance in both gain and loss trials.</span></p></span></span><div class="groups" data-dcnode-id="5132"><table data-dcnode-id="5133"><tbody data-dcnode-id="5134"><tr class="rowsep-1" data-dcnode-id="5312"><th class="align-left valign-top" data-dcnode-id="5319" id="en0816" scope="row"></th><td class="align-left valign-top" data-dcnode-id="5317" id="en0817"><span data-dcnode-id="5318" instrument_node="">↑ risk tolerance</span></td><td class="align-left valign-top" data-dcnode-id="5315" id="en0818"><span data-dcnode-id="5316" instrument_node="">↓ risk tolerance</span></td><td class="align-left valign-top" data-dcnode-id="5313" id="en0819"><span data-dcnode-id="5314" instrument_node="">mixed response</span></td></tr><tr data-dcnode-id="5304"><th class="align-left valign-top" data-dcnode-id="5310" id="en0820" scope="row"><span data-dcnode-id="5311" instrument_node="">12–17 y. o.</span></th><td class="align-left valign-top" data-dcnode-id="5308" id="en0821"><span data-dcnode-id="5309" instrument_node="">−1.3167*</span></td><td class="align-left valign-top" data-dcnode-id="5307" id="en0822"></td><td class="align-left valign-top" data-dcnode-id="5305" id="en0823"><span data-dcnode-id="5306" instrument_node="">−0.2956</span></td></tr><tr data-dcnode-id="5297"><th class="align-left valign-top" data-dcnode-id="5303" id="en0824" scope="row"></th><td class="align-left valign-top" data-dcnode-id="5301" id="en0825"><span data-dcnode-id="5302" instrument_node="">(0.5988)</span></td><td class="align-left valign-top" data-dcnode-id="5300" id="en0826"></td><td class="align-left valign-top" data-dcnode-id="5298" id="en0827"><span data-dcnode-id="5299" instrument_node="">(0.5774)</span></td></tr><tr data-dcnode-id="5288"><th class="align-left valign-top" data-dcnode-id="5295" id="en0828" scope="row"><span data-dcnode-id="5296" instrument_node="">wealth</span></th><td class="align-left valign-top" data-dcnode-id="5293" id="en0829"><span data-dcnode-id="5294" instrument_node="">0.3028</span></td><td class="align-left valign-top" data-dcnode-id="5291" id="en0830"><span data-dcnode-id="5292" instrument_node="">−0.1045</span></td><td class="align-left valign-top" data-dcnode-id="5289" id="en0831"><span data-dcnode-id="5290" instrument_node="">−0.1298</span></td></tr><tr data-dcnode-id="5280"><th class="align-left valign-top" data-dcnode-id="5287" id="en0832" scope="row"></th><td class="align-left valign-top" data-dcnode-id="5285" id="en0833"><span data-dcnode-id="5286" instrument_node="">(0.4092)</span></td><td class="align-left valign-top" data-dcnode-id="5283" id="en0834"><span data-dcnode-id="5284" instrument_node="">(0.6036)</span></td><td class="align-left val nder</span></th><td class="align-left valign-top" data-dcnode-id="5157" id="en0893"><span data-dcnode-id="5158" instrument_node="">−0.0110</span></td><td class="align-left valign-top" data-dcnode-id="5155" id="en0894"><span data-dcnode-id="5156" instrument_node="">−1.9132*</span></td><td class="align-left valign-top" data-dcnode-id="5153" id="en0895"><span data-dcnode-id="5154" instrument_node="">0.9199</span></td></tr><tr data-dcnode-id="5144"><th class="align-left valign-top" data-dcnode-id="5151" id="en0896" scope="row"></th><td class="align-left valign-top" data-dcnode-id="5149" id="en0897"><span data-dcnode-id="5150" instrument_node="">(0.5903)</span></td><td class="align-left valign-top" data-dcnode-id="5147" id="en0898"><span data-dcnode-id="5148" instrument_node="">(0.8882)</span></td><td class="align-left valign-top" data-dcnode-id="5145" id="en0899"><span data-dcnode-id="5146" instrument_node="">(0.5917)</span></td></tr><tr data-dcnode-id="5135"><th class="align-left valign-top" data-dcnode-id="5142" id="en0900" scope="row"><span data-dcnode-id="5143" instrument_node="">N</span></th><td class="align-left valign-top" data-dcnode-id="5140" id="en0901"><span data-dcnode-id="5141" instrument_node="">73</span></td><td class="align-left valign-top" data-dcnode-id="5138" id="en0902"><span data-dcnode-id="5139" instrument_node="">42</span></td><td class="align-left valign-top" data-dcnode-id="5136" id="en0903"><span data-dcnode-id="5137" instrument_node="">73</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="5111"></p><p data-dcnode-id="5130" id="spara017"><span data-dcnode-id="5131" instrument_node="">Marginal effects.</span></p><p data-dcnode-id="5126" id="spara018"><a class="topic-link" data-dcnode-id="5128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/measure-of-dispersion" title="Learn more about Standard errors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5129" instrument_node="">Standard errors</span></a><span data-dcnode-id="5127" instrument_node=""> clustered on participant in parentheses.</span></p><p data-dcnode-id="5112" id="spara019"><span data-dcnode-id="5125" instrument_node="">+ </span><em data-dcnode-id="5123"><span data-dcnode-id="5124" instrument_node="">p</span></em><span data-dcnode-id="5122" instrument_node="">&lt;0.1, * </span><em data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">p</span></em><span data-dcnode-id="5119" instrument_node="">&lt;0.01, ** </span><em data-dcnode-id="5117"><span data-dcnode-id="5118" instrument_node="">p</span></em><span data-dcnode-id="5116" instrument_node="">&lt;0.05, *** </span><em data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">p</span></em><span data-dcnode-id="5113" instrument_node="">&lt;0.001.</span></p><p></p></div></div></section></section><section data-dcnode-id="4990" id="sec0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5103" id="cesectitle0019"><span data-dcnode-id="5106" instrument_node="">4</span><span data-dcnode-id="5105" instrument_node="">. </span><span data-dcnode-id="5104" instrument_node="">Discussion</span></h2><p data-dcnode-id="5036" id="para0053"><span data-dcnode-id="5102" instrument_node="">Children differ from adults. A better economic understanding of child and adolescent behavior is important for economic, scientific, and societal reasons (</span><a class="workspace-trigger" data-dcnode-id="5100" href="#bib0014" name="bbib0014"><span data-dcnode-id="5101" instrument_node="">Brocas&nbsp;and Carrillo,&nbsp;2020</span></a><span data-dcnode-id="5099" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5097" href="#bib0067" name="bbib0067"><span data-dcnode-id="5098" instrument_node="">Sutter&nbsp;et&nbsp;al., 2019</span></a><span data-dcnode-id="5096" instrument_node="">) and has an impact on how societies are organized. For example, recent discoveries in developmental psychology about the evolution of decision-making from childhood to adolescence have already had a substantial impact on jurisdiction in the US (</span><a class="workspace-trigger" data-dcnode-id="5094" href="#bib0064" name="bbib0064"><span data-dcnode-id="5095" instrument_node="">Steinberg,&nbsp;2017</span></a><span data-dcnode-id="5093" instrument_node="">). Moreover, the decisions that adolescents make on their own, independent of their parents, have important consequences for future economic outcomes. For instance, studies show that misbehavior during childhood and adolescence, which is related to the type of risk tolerance studied in this paper (</span><a class="workspace-trigger" data-dcnode-id="5091" href="#bib0013" name="bbib0013"><span data-dcnode-id="5092" instrument_node="">Breitkopf&nbsp;et&nbsp;al., 2020</span></a><span data-dcnode-id="5090" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5088" href="#bib0018" name="bbib0018"><span data-dcnode-id="5089" instrument_node="">Castillo&nbsp;et&nbsp;al., 2018</span></a><span data-dcnode-id="5087" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5085" href="#bib0066" name="bbib0066"><span data-dcnode-id="5086" instrument_node="">Sutter&nbsp;et&nbsp;al., 2013</span></a><span data-dcnode-id="5084" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5082" href="#bib0067" name="bbib0067"><span data-dcnode-id="5083" instrument_node="">2019</span></a><span data-dcnode-id="5081" instrument_node="">), has long term consequences on earnings (</span><a class="workspace-trigger" data-dcnode-id="5079" href="#bib0040" name="bbib0040"><span data-dcnode-id="5080" instrument_node="">Heckman&nbsp;et&nbsp;al., 2006</span></a><span data-dcnode-id="5078" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5076" href="#bib0057" name="bbib0057"><span data-dcnode-id="5077" instrument_node="">Segal,&nbsp;2013</span></a><span data-dcnode-id="5075" instrument_node="">). Economists only recently began to more frequently expand the study of economic preferences to include children. Sometimes, the findings of these studies turn out to contradict common wisdom and often uncover important differences between children's and adults’ behaviors (e.g. </span><a class="workspace-trigger" data-dcnode-id="5073" href="#bib0006" name="bbib0006"><span data-dcnode-id="5074" instrument_node="">Apesteguia&nbsp;et&nbsp;al., 2018</span></a><span data-dcnode-id="5072" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5070" href="#bib0011" name="bbib0011"><span data-dcnode-id="5071" instrument_node="">Barash&nbsp;et&nbsp;al., 2019</span></a><span data-dcnode-id="5069" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5067" href="#bib0025" name="bbib0025"><span data-dcnode-id="5068" instrument_node="">Deckers&nbsp;et&nbsp;al., 2015</span></a><span data-dcnode-id="5066" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5064" href="#bib0071" name="bbib0071"><span data-dcnode-id="5065" instrument_node="">Tymula,&nbsp;2019</span></a><span data-dcnode-id="5063" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5061" href="#bib0072" name="bbib0072"><span data-dcnode-id="5062" instrument_node="">Tymula&nbsp;et&nbsp;al., 2012</span></a><span data-dcnode-id="5060" instrument_node="">). This stresses the importance of conducting scientific research specific to different age groups. With the aid of the new descriptive studies of children's preferences, economists are beginning to understand how to encourage children to make better decisions. For example, the study by </span><a class="workspace-trigger" data-dcnode-id="5058" href="#bib0001" name="bbib0001"><span data-dcnode-id="5059" instrument_node="">Alan &amp; Ertac&nbsp;(2018)</span></a><span data-dcnode-id="5057" instrument_node=""> presented a successful behavioral intervention that promotes more patient decision-making in elementary school children and improves their behavior at school. </span><a class="workspace-trigger" data-dcnode-id="5055" href="#bib0065" name="bbib0065"><span data-dcnode-id="5056" instrument_node="">Sutter&nbsp;et&nbsp;al.&nbsp;(2016)</span></a><span data-dcnode-id="5054" instrument_node=""> demonstrated that interventions encourage girls to be more competitive. </span><a class="workspace-trigger" data-dcnode-id="5052" href="#bib0048" name="bbib0048"><span data-dcnode-id="5053" instrument_node="">List &amp; Samek&nbsp;(2015)</span></a><span data-dcnode-id="5043"><span data-dcnode-id="5047"><span data-dcnode-id="5051" instrument_node=""> found that incentives have a large influence on children's food choices and consumption, suggesting that incentives can be used to combat </span><a class="topic-link" data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/childhood-obesity" title="Learn more about childhood obesity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5050" instrument_node="">childhood obesity</span></a><span data-dcnode-id="5048" instrument_node="">. All of this new research is now beginning to impact how we view children and adolescents as economic agents who systematically make different decisions than adults and thus require a different policy approach. Behavioral interventions that target children and adolescents offer an especially good </span></span><a class="topic-link" data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/return-on-investment" title="Learn more about return on investment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5046" instrument_node="">return on investment</span></a><span data-dcnode-id="5044" instrument_node=""> as they have proven efficient and beneficial for lifetime outcomes (</span></span><a class="workspace-trigger" data-dcnode-id="5041" href="#bib0039" name="bbib0039"><span data-dcnode-id="5042" instrument_node="">Heckman,&nbsp;2006</span></a><span data-dcnode-id="5040" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5038" href="#bib0046" name="bbib0046"><span data-dcnode-id="5039" instrument_node="">Kautz&nbsp;et&nbsp;al., 2014</span></a><span data-dcnode-id="5037" instrument_node="">).</span></p><p data-dcnode-id="5034" id="para0054"><span data-dcnode-id="5035" instrument_node="">In this paper, using a laboratory experiment, we investigated how being observed by a peer affects adolescents’ risky decision making in the monetary gain and loss domains. We focused on adolescents aged from 12 to 24 years old. Over this long transition period from childhood to adolescence, we have more and more opportunities to make important and impactful decisions. Over this period, we also experience substantial biological changes that make us more aware of our social surroundings and more susceptible to changing our behavior in the presence of peers.</span></p><p data-dcnode-id="5029" id="para0055"><span data-dcnode-id="5033" instrument_node="">Participants in our study repeatedly chose between a fixed amount of money and a lottery either in private or in the presence of an adolescent observer. We find that older adolescents (18–24 years old) choose the risky option more often when they are observed by a peer, compared to when they are in private. Unlike previous studies that investigated the effects of peer observation on choice, we can distinguish whether the behavioral change is due to changes in risk tolerance or changes in attitudes towards losses (loss aversion). We find that the increase in risky lottery choices is driven by an increased risk tolerance in the gain and loss domains. In the gain domain, risk tolerance, estimated by the power utility curvature, increases by 0.5178 to 0.5229. In losses, under observation, risk tolerance increases by 0.2942 to 0.3118, an approximately two times smaller change in risk tolerance under losses than under gains. If one wanted to explain the increased real-life “risk-taking” in adolescence in the presence of peers, such as an increase in careless driving, by changes in loss aversion, it would have to be that adolescents become less loss averse when observed. However, our study participants did not become more loss tolerant when observed. On the contrary, once we accounted for differences in risk tolerance, loss aversion increased by 0.5152 to 0.6161 under observation. This suggests that desensitization towards losses relative to gains is unlikely to explain the adolescent real-life “risk-taking” behaviors in the presence of peers.</span><a class="workspace-trigger" data-dcnode-id="5030" href="#cit_10" name="bcit_10"><sup data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node="">10</span></sup></a></p><p data-dcnode-id="5024" id="para0057"><span data-dcnode-id="5028" instrument_node="">We emphasize that these changes in risk tolerance manifest themselves even though our treatment of observation is completely payoff irrelevant. Choice-Makers’ decisions did not influence the payoffs of Observers and Observers could not explicitly affect Choice-Makers’ payoffs with their actions (other than through mere observation). We decided to study this most basic type of observation as a starting point, since it is usually present in most environments where observation occurs and in environments where there are payoff interdependencies between observers and those being observed. Our approach allows us to identify the pure effect of observation that is unrelated to payoff interdependencies which could be added to our framework in future studies. </span><a class="workspace-trigger" data-dcnode-id="5026" href="#bib0069" name="bbib0069"><span data-dcnode-id="5027" instrument_node="">Trautmann&nbsp;and Vieider&nbsp;(2012)</span></a><span data-dcnode-id="5025" instrument_node=""> provided a review and classification of the different ways that observation may matter in an economic context. Their insights may be useful in thinking of the extensions of our approach and what our results mean for other types of observation.</span></p><p data-dcnode-id="5019" id="para0058"><span data-dcnode-id="5023" instrument_node="">We demonstrated that our results are qualitatively the same whether we use between-subject or within-subject analysis. We designed our experiment in a way that allows us to compare the same participants when they make decisions in private and under observation as well as compare two different groups of individuals: a group that is under observation with a group that is making decisions in private. With both approaches, our conclusions are qualitatively the same. However, the strength of the result is remarkably different, with the between-subject analysis yielding much stronger results. The fact that our results are qualitatively the same but their strength remarkably differs under the two design approaches indicates that the choice of the between-subject versus within-subject method is a very important element of study design. Both of the methods have their pros and cons (</span><a class="workspace-trigger" data-dcnode-id="5021" href="#bib0020" name="bbib0020"><span data-dcnode-id="5022" instrument_node="">Charness&nbsp;et&nbsp;al., 2012</span></a><span data-dcnode-id="5020" instrument_node="">), and our paper by providing an example of how to combine the within-subject and between-subject approach in one experiment illustrates that it is possible to access the advantages of both methods in one experiment.</span></p><p data-dcnode-id="4995" id="para0059"><span data-dcnode-id="5018" instrument_node="">Our finding that older adolescents become more risk-tolerant in gains under observation contrasts with the results in our previous studies that used the same experimental design to implement observation. In </span><a class="workspace-trigger" data-dcnode-id="5016" href="#bib0073" name="bbib0073"><span data-dcnode-id="5017" instrument_node="">Tymula&nbsp;and Whitehair&nbsp;(2018)</span></a><span data-dcnode-id="5011"><span data-dcnode-id="5015" instrument_node="">, we recruited 310 volunteers (mean age 22.28, </span><a class="topic-link" data-dcnode-id="5013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/measure-of-dispersion" title="Learn more about standard deviation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5014" instrument_node="">standard deviation</span></a><span data-dcnode-id="5012" instrument_node=""> 3.95) to test whether their attitudes towards known risks (risk tolerance) and unknown risks (ambiguity attitude) in the gain domain change under observation. We found that participants became more ambiguity averse when observed and their risk tolerance are not affected by observation. In </span></span><a class="workspace-trigger" data-dcnode-id="5009" href="#bib0071" name="bbib0071"><span data-dcnode-id="5010" instrument_node="">Tymula&nbsp;(2019)</span></a><span data-dcnode-id="5008" instrument_node="">, we recruited 186 adolescents (12–24 years old, mean age 18.59, standard deviation 3.26) and found that under observation they become more impatient and more inconsistent but their risk tolerance in the gain domain do not change. Even though the structure of the experiment, recruitment, and the implementation of observation were the same in all three studies, we did not find risk tolerance to be affected by observation. The one difference is that, in the current study, we have also included negative monetary outcomes, but it is not obvious how this could explain our result that risk tolerance in the gain domain increases under observation. Nevertheless, it is worthwhile to note that previous studies in developmental psychology which concluded that adolescents become more risk-tolerant under observation often included scenarios that can result both in gains and losses, such as in driving games where participants can either gain points or lose them (</span><a class="workspace-trigger" data-dcnode-id="5006" href="#bib0031" name="bbib0031"><span data-dcnode-id="5007" instrument_node="">Gardner&nbsp;and Steinberg,&nbsp;2005</span></a><span data-dcnode-id="5005" instrument_node="">), or hypothetical gain-loss gambles (</span><a class="workspace-trigger" data-dcnode-id="5003" href="#bib0059" name="bbib0059"><span data-dcnode-id="5004" instrument_node="">Smith&nbsp;et&nbsp;al., 2014</span></a><span data-dcnode-id="5002" instrument_node="">) making them more similar to the current study than to </span><a class="workspace-trigger" data-dcnode-id="5000" href="#bib0071" name="bbib0071"><span data-dcnode-id="5001" instrument_node="">Tymula&nbsp;(2019)</span></a><span data-dcnode-id="4999" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="4997" href="#bib0073" name="bbib0073"><span data-dcnode-id="4998" instrument_node="">Tymula &amp; Whitehair&nbsp;(2018)</span></a><span data-dcnode-id="4996" instrument_node="">.</span></p><p data-dcnode-id="4993" id="para0060"><span data-dcnode-id="4994" instrument_node="">Another notable finding in our data is the difference in results for older adolescents (18–24 years old and attending university) and younger adolescents (12–17 years old and attending high school). We considered some possible explanations unrelated to age for this phenomenon by investigating whether the control variables on which these two groups differ moderate the effect instead of age (Appendix D). None of these control variables account for this dichotomy in our results. There is a big difference between our younger and older adolescents in legal terms. In Australia, the legal age for drinking alcohol, smoking tobacco, and gambling is 18 years of age meaning that these activities are not (legally) accessible to younger adolescents but are accessible to older adolescents in our study. Ultimately, we cannot definitively conclude whether it is chronological age, graduating from high school to university, the recruitment method, or something else not captured by our study that renders older adolescents’ response to observation so different from their younger counterparts. Readers should also be careful when generalizing the results of our study to the whole population, as we do not know how representative the adolescents in our sample are of the general population of adolescents. Our sample is self-selected, which is often the case in experiments. First, recruitment would reach only adolescents who use social media. Second, conditional on adolescents seeing our recruitment ads, it is a certain type of adolescent that signs up and shows up to the study. Nevertheless, by recruiting 12–17-year-olds, our study contributes to what nevertheless remains a relatively small pool of laboratory studies that recruit participants from sources other than the usual convenience samples of university students.</span></p><p data-dcnode-id="4991" id="para0061"><span data-dcnode-id="4992" instrument_node="">Given how upsetting some of the statistics on adolescent decision-making are and the amount of the policy effort that specifically addresses behavior in adolescence, we still have relatively little economic understanding of why this group so often ends up in trouble. Among other things, to protect young people from their own choices, governments employ legal age limits for gambling, voting, driving, use of alcohol and tobacco. Many countries have restrictions for minors on transporting other teen passengers during the initial months of licensing and required hours of adult supervision. Billions of dollars are spent each year on informational and educational campaigns aimed at adolescents. There have been attempts to mix as well as to separate high-risk and low-risk students in schools. All these interventions are supposed to improve adolescents’ welfare but the findings on their effectiveness are mixed. Part of the reason for this is likely that these policies were designed without an in-depth understanding of the economic preferences of adolescents. For example, it would be tempting to think that, in the presence of peers, adolescents stop paying attention to the potential negative consequences of their actions. Our results show that this is not the case and that instead, in the presence of peers, adolescents’ relative weighting of losses to gains (loss aversion) increases. This is good news for policy, since it suggests that appeals to loss aversion should be especially effective at reducing harmful behaviors of adolescents committed in the presence of peers.</span></p></section></div><section data-dcnode-id="4984" id="coi0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4987" id="cesectitle0021"><span data-dcnode-id="4988" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="4985" id="para0064"><span data-dcnode-id="4986" instrument_node="">The authors have no conflict of interest to declare.</span></p></section><section data-dcnode-id="4973" id="ack0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4982" id="cesectitle0022"><span data-dcnode-id="4983" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="4974" id="para0065"><span data-dcnode-id="4981" instrument_node="">We are grateful for feedback from the anonymous referees, participants in the Sydney Experimental Brownbag Seminar, and the Economic Science Association World Meetings. Tymula acknowledges support from </span><span data-dcnode-id="4979" id="gs0001"><span data-dcnode-id="4980" instrument_node="">Australian Research Council</span></span><span data-dcnode-id="4978" instrument_node=""> to conduct this research, sity Press</span><span data-dcnode-id="377" instrument_node=""> (</span><span data-dcnode-id="375" instrument_node="">1998</span><span data-dcnode-id="373" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="368"><span data-dcnode-id="371" instrument_node=""></span><a aria-describedby="ref-id-sbref0075" class="link" data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DAmerican%2520Youth%2520Violence%26publication_year%3D1998%26author%3DF.E.%2520Zimring" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="370" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="357" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="358"><div class="PageDivider" data-dcnode-id="363"></div><header data-dcnode-id="360" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Cited by (0)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="359"></div></section></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="349"><dt class="footnote-label" data-dcnode-id="353"><sup data-dcnode-id="354"><a data-dcnode-id="355" href="#bcit_1"><span data-dcnode-id="356" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="350"><p data-dcnode-id="351" id="notep0001"><span data-dcnode-id="352" instrument_node="">We note that both studies estimated loss aversion from mixed gambles only thus potentially confounding it with utility curvature.</span></p></dd></dl><dl class="footnote" data-dcnode-id="332"><dt class="footnote-label" data-dcnode-id="345"><sup data-dcnode-id="346"><a data-dcnode-id="347" href="#bcit_2"><span data-dcnode-id="348" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="333"><p data-dcnode-id="334" id="notep0002"><span data-dcnode-id="344" instrument_node="">The original </span><a class="workspace-trigger" data-dcnode-id="342" href="#bib0060" name="bbib0060"><span data-dcnode-id="343" instrument_node="">Sokol-Hessner&nbsp;et&nbsp;al.&nbsp;(2013)</span></a><span data-dcnode-id="341" instrument_node=""> task has 150 choices: 30 in the domain of gains and 120 mixed gambles. The authors assume that the curvature of the utility function is the same in gains and in losses to estimate loss aversion. Since the curvature for gains and losses is often different (e.g. </span><a class="workspace-trigger" data-dcnode-id="339" href="#bib0023" name="bbib0023"><span data-dcnode-id="340" instrument_node="">Chung&nbsp;et&nbsp;al., 2019</span></a><span data-dcnode-id="338" instrument_node="">), we measure curvature in both gains and losses domain. This would result in 180 trials if we used the original set of questions. We reduced the number of trials by one-third. For all 30 gain trials, we calculated CRRA utility coefficients that imply indifference between the risky and safe option and eliminated 10 trials least informative of risk tolerance (for example, these included five trials where safe and risky option had the same expected value and additional five trials that “duplicated” the same CRRA as a different trial in the set). The loss trials are the mirror image of the remaining 20 gain trials. In </span><a class="workspace-trigger" data-dcnode-id="336" href="#bib0060" name="bbib0060"><span data-dcnode-id="337" instrument_node="">Sokol-Hessner&nbsp;et&nbsp;al.&nbsp;(2013)</span></a><span data-dcnode-id="335" instrument_node="">, mixed gambles are constructed from 8 different gain amounts, each multiplied by 15 scalars for a total of 120 gambles. We eliminated 40 mixed trials constructed with five, less relevant scalars used to identify loss-seeking (−15/8, −14/8, −13/8. −11/8, −9/8).</span></p></dd></dl><dl class="footnote" data-dcnode-id="303"><dt class="footnote-label" data-dcnode-id="328"><sup data-dcnode-id="329"><a data-dcnode-id="330" href="#bcit_3"><span data-dcnode-id="331" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="304"><p data-dcnode-id="305" id="notep0003"><span data-dcnode-id="327" instrument_node="">When studying loss domain, researchers face a dilemma between satisfying ethical concerns (that is not exploiting financially study volunteers) and potentially biasing behavior due to a house money effect (</span><a class="workspace-trigger" data-dcnode-id="325" href="#bib0068" name="bbib0068"><span data-dcnode-id="326" instrument_node="">Thaler&nbsp;and Johnson,&nbsp;1990</span></a><span data-dcnode-id="324" instrument_node="">). Due to these complexities, some studies elicited utility curvature only in gains and assumed that it is a mirror image for losses (</span><a class="workspace-trigger" data-dcnode-id="322" href="#bib0060" name="bbib0060"><span data-dcnode-id="323" instrument_node="">Sokol-Hessner&nbsp;et&nbsp;al., 2013</span></a><span data-dcnode-id="321" instrument_node="">). However, studies that elicited utility in both gains and losses found that the correlation between an individual's utility curvature in gains and losses is not strong or even opposite to what one would expect under Prospect Theory (</span><a class="workspace-trigger" data-dcnode-id="319" href="#bib0023" name="bbib0023"><span data-dcnode-id="320" instrument_node="">Chung&nbsp;et&nbsp;al., 2019</span></a><span data-dcnode-id="318" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="316" href="#bib0072" name="bbib0072"><span data-dcnode-id="317" instrument_node="">Tymula&nbsp;et&nbsp;al., 2012</span></a><span data-dcnode-id="315" instrument_node="">) advising against the use of such simplification. Other researchers decided to provide endowments only in loss trials but not in gain trials (</span><a class="workspace-trigger" data-dcnode-id="313" href="#bib0015" name="bbib0015"><span data-dcnode-id="314" instrument_node="">Bruhin&nbsp;et&nbsp;al., 2010</span></a><span data-dcnode-id="312" instrument_node="">), but this could lead to a systematic difference in house money effect between the gain and loss domains. We adopted losses from the initial endowment approach because </span><a class="workspace-trigger" data-dcnode-id="310" href="#bib0027" name="bbib0027"><span data-dcnode-id="311" instrument_node="">Etchart-Vincent&nbsp;and l'Haridon&nbsp;(2011)</span></a><span data-dcnode-id="309" instrument_node=""> found that behavior in the loss domain in “losses-from-an-initial-endowment” does not differ from “real-loss” conditions meaning that losses from endowment serve as a good approximation of real behavior. Their review of the literature also suggests that the findings on the house money effect in the literature are mixed. Another more recent study by </span><a class="workspace-trigger" data-dcnode-id="307" href="#bib0017" name="bbib0017"><span data-dcnode-id="308" instrument_node="">Cárdenas&nbsp;et&nbsp;al.&nbsp;(2014)</span></a><span data-dcnode-id="306" instrument_node=""> showed that the house money effect created by an endowment plays only a small role. Nevertheless, our design keeps the level of house money in both gain and loss trials constant, and importantly, even if a house money effect exists, this does not prevent us from identifying the effects of observation on behavior, which is the main objective of this study.</span></p></dd></dl><dl class="footnote" data-dcnode-id="295"><dt class="footnote-label" data-dcnode-id="299"><sup data-dcnode-id="300"><a data-dcnode-id="301" href="#bcit_4"><span data-dcnode-id="302" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="296"><p data-dcnode-id="297" id="notep0004"><span data-dcnode-id="298" instrument_node="">For example, older adolescents are familiar with the university where the study took place while for most younger adolescents, it will be a new environment.</span></p></dd></dl><dl class="footnote" data-dcnode-id="287"><dt class="footnote-label" data-dcnode-id="291"><sup data-dcnode-id="292"><a data-dcnode-id="293" href="#bcit_5"><span data-dcnode-id="294" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="288"><p data-dcnode-id="289" id="notep0005"><span data-dcnode-id="290" instrument_node="">The authors acknowledge that the structural estimation did not converge using Luce error specification.</span></p></dd></dl><dl class="footnote" data-dcnode-id="279"><dt class="footnote-label" data-dcnode-id="283"><sup data-dcnode-id="284"><a data-dcnode-id="285" href="#bcit_6"><span data-dcnode-id="286" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="280"><p data-dcnode-id="281" id="notep0006"><span data-dcnode-id="282" instrument_node="">Ordinal logit regressions presented in Table D1.1 (models 1-3) are consistent with these results. Note that the finding that participants choose lotteries more often in the mixed lotteries is not equivalent to saying that they are more loss tolerant when observed.</span></p></dd></dl><dl class="footnote" data-dcnode-id="271"><dt class="footnote-label" data-dcnode-id="275"><sup data-dcnode-id="276"><a data-dcnode-id="277" href="#bcit_7"><span data-dcnode-id="278" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="272"><p data-dcnode-id="273" id="notep0007"><span data-dcnode-id="274" instrument_node="">Ordinal logit regressions presented in Table D1.1 (models 4-6) are in line with these results.</span></p></dd></dl><dl class="footnote" data-dcnode-id="263"><dt class="footnote-label" data-dcnode-id="267"><sup data-dcnode-id="268"><a data-dcnode-id="269" href="#bcit_8"><span data-dcnode-id="270" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="264"><p data-dcnode-id="265" id="notep0008"><span data-dcnode-id="266" instrument_node="">We reach the same conclusion using ordinal logit regressions (see Tables C4 and C5).</span></p></dd></dl><dl class="footnote" data-dcnode-id="255"><dt class="footnote-label" data-dcnode-id="259"><sup data-dcnode-id="260"><a data-dcnode-id="261" href="#bcit_9"><span data-dcnode-id="262" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="256"><p data-dcnode-id="257" id="notep0009"><span data-dcnode-id="258" instrument_node="">There were 42 pairs in which the Choice-Maker and Observer have the same gender (18-24 years old: 15 pairs and 12-17 years old: 27 pairs).</span></p></dd></dl><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="251"><sup data-dcnode-id="252"><a data-dcnode-id="253" href="#bcit_10"><span data-dcnode-id="254" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246" id="notep0010"><span data-dcnode-id="250" instrument_node="">The average estimate of loss aversion across both treatments in our sample is low anyways (λ=1.282), in line with recent literature (</span><a class="workspace-trigger" data-dcnode-id="248" href="#bib0030" name="bbib0030"><span data-dcnode-id="249" instrument_node="">Gal&nbsp;and Rucker,&nbsp;2018</span></a><span data-dcnode-id="247" instrument_node="">).</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S016726812100216X"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2021 Elsevier B.V. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="
