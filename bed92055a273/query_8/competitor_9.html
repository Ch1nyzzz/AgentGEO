</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0002&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abss0002&quot;><p id=&quot;spara021&quot;>Relative to adults, adolescents make more welfare-decreasing decisions, especially in the presence of peers. The consequences of these decisions result in substantial individual and societal losses in terms of lives lost, injury, hospitalization costs, and foregone opportunities. In this paper, we use laboratory within-subject and between-subject experiments with younger (12–17 years old) and older (18–24 years old) adolescents to identify which economic preference is affected by peer observation in adolescence — risk tolerance in gains, risk tolerance in losses, and/or loss aversion. We find that in our study, while observed by peers, 18–24-year-old adolescents became more risk-tolerant both in gains and in losses but more loss averse. We discuss the potential mechanisms driving the result and its policy implications.</p></div></div></div>" data-dcnode-id="10342" lang="en" name="citation_abstract"><span data-dcnode-id="10341" instrument_node="">

></p><dl class="list" data-dcnode-id="9690"><dt class="list-label" data-dcnode-id="9709"><span data-dcnode-id="9710" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9706"><p data-dcnode-id="9707" id="para0001"><span data-dcnode-id="9708" instrument_node="">When observed by peers 18–24-year-olds take more financial risk in gains and losses.</span></p></dd><dt class="list-label" data-dcnode-id="9704"><span data-dcnode-id="9705" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9701"><p data-dcnode-id="9702" id="para0002"><span data-dcnode-id="9703" instrument_node="">When observed by peers 18–24-year-olds are more loss averse.</span></p></dd><dt class="list-label" data-dcnode-id="9699"><span data-dcnode-id="9700" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9696"><p data-dcnode-id="9697" id="para0003"><span data-dcnode-id="9698" instrument_node="">Results are much stronger using between- than within-subject analysis.</span></p></dd><dt class="list-label" data-dcnode-id="9694"><span data-dcnode-id="9695" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9691"><p data-dcnode-id="9692" id="para0004"><span data-dcnode-id="9693" instrument_node="">12–17-year-olds’ decisions were not affected by peer observation.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="9681" id="abs0002"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9685"><span data-dcnode-id="9686" instrument_node="">Abstract</span></h2><div data-dcnode-id="9682" id="abss0002"><p data-dcnode-id="9683" id="spara021"><span data-dcnode-id="9684" instrument_node="">Relative to adults, adolescents make more welfare-decreasing decisions, especially in the presence of peers. The consequences of these decisions result in substantial individual and societal losses in terms of lives lost, injury, hospitalization costs, and foregone opportunities. In this paper, we use laboratory within-subject and between-subject experiments with younger (12–17 years old) and older (18–24 years old) adolescents to identify which economic preference is affected by peer observation in adolescence — risk tolerance in gains, risk tolerance in losses, and/or loss aversion. We find that in our study, while observed by peers, 18–24-year-old adolescents became more risk-tolerant both in gains and in losses but more loss averse. We discuss the potential mechanisms driving the result and its policy implications.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="9657" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="9669"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="9670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0167268121001979"><svg class="icon icon-navigate-left" data-dcnode-id="9678" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="9679"></path></svg><span class="button-alternative-text" data-dcnode-id="9671"><strong data-dcnode-id="9676"><span data-dcnode-id="9677" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="9674"><span data-dcnode-id="9675" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="9672"><span data-dcnode-id="9673" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="9658"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="9659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0167268121001992"><span class="button-alternative-text" data-dcnode-id="9662"><strong data-dcnode-id="9667"><span data-dcnode-id="9668" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="9665"><span data-dcnode-id="9666" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="9663"><span data-dcnode-id="9664" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="9660" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="9661"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="9629"><div class="keywords-section" data-dcnode-id="9639" id="keys0001"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9655"><span data-dcnode-id="9656" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="9652" id="key0001"><span data-dcnode-id="9653" id="cetext0002"><span data-dcnode-id="9654" instrument_node="">Decision-making</span></span></div><div class="keyword" data-dcnode-id="9649" id="key0002"><span data-dcnode-id="9650" id="cetext0003"><span data-dcnode-id="9651" instrument_node="">Adolescence</span></span></div><div class="keyword" data-dcnode-id="9646" id="key0003"><span data-dcnode-id="9647" id="cetext0004"><span data-dcnode-id="9648" instrument_node="">Observation</span></span></div><div class="keyword" data-dcnode-id="9643" id="key0004"><span data-dcnode-id="9644" id="cetext0005"><span data-dcnode-id="9645" instrument_node="">Loss aversion</span></span></div><div class="keyword" data-dcnode-id="9640" id="key0005"><span data-dcnode-id="9641" id="cetext0006"><span data-dcnode-id="9642" instrument_node="">Risk tolerance</span></span></div></div><div class="keywords-section" data-dcnode-id="9630" id="keys0002"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9637"><span data-dcnode-id="9638" instrument_node="">JEL codes</span></h2><div class="keyword" data-dcnode-id="9634" id="key0006"><span data-dcnode-id="9635" id="cetext0007"><span data-dcnode-id="9636" instrument_node="">D80</span></span></div><div class="keyword" data-dcnode-id="9631" id="key0007"><span data-dcnode-id="9632" id="cetext0008"><span data-dcnode-id="9633" instrument_node="">D91</span></span></div></div></div><span data-dcnode-id="9628" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4954" id="body"><div data-dcnode-id="4989"><section data-dcnode-id="9459" id="sec0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9624" id="cesectitle0005"><span data-dcnode-id="9627" instrument_node="">1</span><span data-dcnode-id="9626" instrument_node="">. </span><span data-dcnode-id="9625" instrument_node="">Introduction</span></h2><p data-dcnode-id="9594" id="para0005"><span data-dcnode-id="9623" instrument_node="">Being observed by others has been shown to change people's behavior in a wide range of settings. We know that, when observed, people tend to give more to their opponents in standard economic games (e.g. </span><a class="workspace-trigger" data-dcnode-id="9621" href="#bib0021" name="bbib0021"><span data-dcnode-id="9622" instrument_node="">Charness&nbsp;et&nbsp;al., 2007</span></a><span data-dcnode-id="9616"><span data-dcnode-id="9620" instrument_node="">) and generally engage in more </span><a class="topic-link" data-dcnode-id="9618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/prosocial-behavior" title="Learn more about prosocial behavior from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9619" instrument_node="">prosocial behavior</span></a><span data-dcnode-id="9617" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="9614" href="#bib0042" name="bbib0042"><span data-dcnode-id="9615" instrument_node="">Hoffman&nbsp;et&nbsp;al., 1994</span></a><span data-dcnode-id="9613" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9611" href="#bib0047" name="bbib0047"><span data-dcnode-id="9612" instrument_node="">Kurzban&nbsp;et&nbsp;al., 2007</span></a><span data-dcnode-id="9610" instrument_node="">). People are also more likely to adhere to less articulated behavioral patterns such as ambiguity aversion when observed (</span><a class="workspace-trigger" data-dcnode-id="9608" href="#bib0010" name="bbib0010"><span data-dcnode-id="9609" instrument_node="">Baltussen&nbsp;et&nbsp;al., 2016</span></a><span data-dcnode-id="9607" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9605" href="#bib0024" name="bbib0024"><span data-dcnode-id="9606" instrument_node="">Curley&nbsp;et&nbsp;al., 1986</span></a><span data-dcnode-id="9604" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9602" href="#bib0070" name="bbib0070"><span data-dcnode-id="9603" instrument_node="">Trautmann&nbsp;et&nbsp;al., 2008</span></a><span data-dcnode-id="9601" instrument_node="">). In the workplace, people work harder and put in more effort when observed by others (</span><a class="workspace-trigger" data-dcnode-id="9599" href="#bib0035" name="bbib0035"><span data-dcnode-id="9600" instrument_node="">Guryan&nbsp;et&nbsp;al., 2009</span></a><span data-dcnode-id="9598" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9596" href="#bib0051" name="bbib0051"><span data-dcnode-id="9597" instrument_node="">Mas&nbsp;and Moretti,&nbsp;2009</span></a><span data-dcnode-id="9595" instrument_node="">). In all of these settings, observation is helpful. It either helps to enforce the norm, sustain cooperation, or make people more altruistic and productive. Unfortunately, at a certain age, observation by peers seems to have a dark side as well.</span></p><p data-dcnode-id="9556" id="para0006"><span data-dcnode-id="9593" instrument_node="">Statistics, research, and common wisdom all suggest that the presence of peers can have a detrimental effect on people at a specific time of our lives — adolescence. We know that adolescents engage in a range of activities that adults avoid, at an enormous cost to them and society as a whole (</span><a class="workspace-trigger" data-dcnode-id="9591" href="#bib0007" name="bbib0007"><span data-dcnode-id="9592" instrument_node="">Arnett,&nbsp;1992</span></a><span data-dcnode-id="9590" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9588" href="#bib0034" name="bbib0034"><span data-dcnode-id="9589" instrument_node="">Gullone&nbsp;and Moore,&nbsp;2000</span></a><span data-dcnode-id="9587" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9585" href="#bib0063" name="bbib0063"><span data-dcnode-id="9586" instrument_node="">Spear,&nbsp;2010</span></a><span data-dcnode-id="9584" instrument_node="">). Although they are healthier, stronger, and have better reasoning capabilities than younger children, adolescents’ morbidity and mortality rates are twice to three times higher (</span><a class="workspace-trigger" data-dcnode-id="9582" href="#bib0009" name="bbib0009"><span data-dcnode-id="9583" instrument_node="">Australian&nbsp;Bureau of Statistics,&nbsp;2018</span></a><span data-dcnode-id="9581" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9579" href="#bib0019" name="bbib0019"><span data-dcnode-id="9580" instrument_node="">Center&nbsp;for Disease Control and Prevention,&nbsp;2017</span></a><span data-dcnode-id="9578" instrument_node="">). Unintentional injury, mostly attributed to their own incorrect decision-making, is the biggest cause of death and hospitalization among adolescents in the developed countries (</span><a class="workspace-trigger" data-dcnode-id="9576" href="#bib0019" name="bbib0019"><span data-dcnode-id="9577" instrument_node="">Center&nbsp;for Disease Control and Prevention,&nbsp;2017</span></a><span data-dcnode-id="9575" instrument_node="">) resulting in tens of millions of dollars in medical costs each year (</span><a class="workspace-trigger" data-dcnode-id="9573" href="#bib0029" name="bbib0029"><span data-dcnode-id="9574" instrument_node="">Florence&nbsp;et&nbsp;al., 2015</span></a><span data-dcnode-id="9572" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9570" href="#bib0052" name="bbib0052"><span data-dcnode-id="9571" instrument_node="">Mitchell&nbsp;et&nbsp;al., 2018</span></a><span data-dcnode-id="9569" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9567" href="#bib0054" name="bbib0054"><span data-dcnode-id="9568" instrument_node="">Polinder&nbsp;et&nbsp;al., 2010</span></a><span data-dcnode-id="9566" instrument_node="">). Adolescents have the highest rates of sexually transmitted diseases (</span><a class="workspace-trigger" data-dcnode-id="9564" href="#bib0032" name="bbib0032"><span data-dcnode-id="9565" instrument_node="">Gittes&nbsp;and Irwin,&nbsp;1993</span></a><span data-dcnode-id="9563" instrument_node="">), the highest frequency of criminal behaviors (</span><a class="workspace-trigger" data-dcnode-id="9561" href="#bib0008" name="bbib0008"><span data-dcnode-id="9562" instrument_node="">Arnett,&nbsp;1996</span></a><span data-dcnode-id="9560" instrument_node="">), and are known to drive more recklessly than adults (</span><a class="workspace-trigger" data-dcnode-id="9558" href="#bib0045" name="bbib0045"><span data-dcnode-id="9559" instrument_node="">Jonah,&nbsp;1986</span></a><span data-dcnode-id="9557" instrument_node="">).</span></p><p data-dcnode-id="9507" id="para0007"><span data-dcnode-id="9551"><span data-dcnode-id="9555" instrument_node="">These welfare-decreasing behaviors seem to be exacerbated in the presence of peers. Adolescents typically exhibit more risky and </span><a class="topic-link" data-dcnode-id="9553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/delinquent-behavior" title="Learn more about delinquent behaviors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9554" instrument_node="">delinquent behaviors</span></a><span data-dcnode-id="9552" instrument_node=""> in peer groups, whereas adults more frequently do so alone (</span></span><a class="workspace-trigger" data-dcnode-id="9549" href="#bib0003" name="bbib0003"><span data-dcnode-id="9550" instrument_node="">Albert&nbsp;and Steinberg,&nbsp;2011</span></a><span data-dcnode-id="9548" instrument_node="">). Relative to older age groups, adolescents commit more crimes in groups (</span><a class="workspace-trigger" data-dcnode-id="9546" href="#bib0075" name="bbib0075"><span data-dcnode-id="9547" instrument_node="">Zimring,&nbsp;1998</span></a><span data-dcnode-id="9545" instrument_node="">), and have more car accidents when driving with passengers (</span><a class="workspace-trigger" data-dcnode-id="9543" href="#bib0022" name="bbib0022"><span data-dcnode-id="9544" instrument_node="">Chen&nbsp;et&nbsp;al., 2000</span></a><span data-dcnode-id="9538"><span data-dcnode-id="9542" instrument_node="">). In the past 15 years, these effects have been replicated in laboratory studies by developmental </span><a class="topic-link" data-dcnode-id="9540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/psychologists" title="Learn more about psychologists from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9541" instrument_node="">psychologists</span></a><span data-dcnode-id="9539" instrument_node="">. An influential paper by </span></span><a class="workspace-trigger" data-dcnode-id="9536" href="#bib0031" name="bbib0031"><span data-dcnode-id="9537" instrument_node="">Gardner &amp; Steinberg&nbsp;(2005)</span></a><span data-dcnode-id="9535" instrument_node=""> presented evidence that, in a driving simulator game, adolescents are more likely to crash when observed by peers. Other studies in psychology have shown that, when observed or merely led to believe that they are observed by peers, adolescents gamble more (</span><a class="workspace-trigger" data-dcnode-id="9533" href="#bib0059" name="bbib0059"><span data-dcnode-id="9534" instrument_node="">Smith&nbsp;et&nbsp;al., 2014</span></a><span data-dcnode-id="9532" instrument_node="">), are less likely to wait for larger rewards (</span><a class="workspace-trigger" data-dcnode-id="9530" href="#bib0058" name="bbib0058"><span data-dcnode-id="9531" instrument_node="">Silva&nbsp;et&nbsp;al., 2016</span></a><span data-dcnode-id="9529" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9527" href="#bib0074" name="bbib0074"><span data-dcnode-id="9528" instrument_node="">Weigard&nbsp;et&nbsp;al., 2014</span></a><span data-dcnode-id="9526" instrument_node="">), and have diminished cognitive control to positive social cues (</span><a class="workspace-trigger" data-dcnode-id="9524" href="#bib0012" name="bbib0012"><span data-dcnode-id="9525" instrument_node="">Breiner&nbsp;et&nbsp;al., 2018</span></a><span data-dcnode-id="9523" instrument_node="">). Animal studies revealed that this effect is not limited only to human adolescents. For example, adolescent rodents drink more alcohol when their peers are present (</span><a class="workspace-trigger" data-dcnode-id="9521" href="#bib0049" name="bbib0049"><span data-dcnode-id="9522" instrument_node="">Logue&nbsp;et&nbsp;al., 2014</span></a><span data-dcnode-id="9520" instrument_node="">). Research using functional magnetic resonance imaging (fMRI) revealed that in adolescence (but not in adulthood) the mere presence of a peer increases activity in the reward-processing areas such as the orbitofrontal cortex and ventral striatum (</span><a class="workspace-trigger" data-dcnode-id="9518" href="#bib0002" name="bbib0002"><span data-dcnode-id="9519" instrument_node="">Albert&nbsp;et&nbsp;al., 2013</span></a><span data-dcnode-id="9517" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9515" href="#bib0074" name="bbib0074"><span data-dcnode-id="9516" instrument_node="">Weigard&nbsp;et&nbsp;al., 2014</span></a><span data-dcnode-id="9514" instrument_node="">) and evokes strong physiological arousal (</span><a class="workspace-trigger" data-dcnode-id="9512" href="#bib0061" name="bbib0061"><span data-dcnode-id="9513" instrument_node="">Somerville,&nbsp;2013</span></a><span data-dcnode-id="9511" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9509" href="#bib0062" name="bbib0062"><span data-dcnode-id="9510" instrument_node="">Somerville&nbsp;et&nbsp;al., 2013</span></a><span data-dcnode-id="9508" instrument_node="">). Adolescence is a period in our lives when our behavior and biology change in the presence of peers in ways that do not happen later in life.</span></p><p data-dcnode-id="9473" id="para0008"><span data-dcnode-id="9506" instrument_node="">Existing studies in developmental psychology have also begun to shed light on how to minimize these unwanted behavioral effects caused by peer presence. For example, the presence of an adult mitigates the negative effect of peers’ presence on driving behavior (</span><a class="workspace-trigger" data-dcnode-id="9504" href="#bib0058" name="bbib0058"><span data-dcnode-id="9505" instrument_node="">Silva&nbsp;et&nbsp;al., 2016</span></a><span data-dcnode-id="9499"><span data-dcnode-id="9503" instrument_node="">), and </span><a class="topic-link" data-dcnode-id="9501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/working-memory-training" title="Learn more about working memory training from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9502" instrument_node="">working memory training</span></a><span data-dcnode-id="9500" instrument_node=""> decreases the laboratory risk-taking in the presence of peers (</span></span><a class="workspace-trigger" data-dcnode-id="9497" href="#bib0056" name="bbib0056"><span data-dcnode-id="9498" instrument_node="">Rosenbaum&nbsp;et&nbsp;al., 2017</span></a><span data-dcnode-id="9496" instrument_node="">). Behavioral economists can contribute to alleviating the burden of the welfare-decreasing behaviors in adolescence by providing a deeper understanding of these behaviors using the framework of the economic model of choice. Observational data and studies in developmental psychology often make this impossible because they do not allow for separate identification of different economic preferences. It is therefore impossible to tell whether the observed effects are driven by a change in risk tolerance, time preferences, loss aversion, subjective probability distortions, mistakes, and/or randomness in choice. Two recent laboratory studies began to fill in this knowledge gap. </span><a class="workspace-trigger" data-dcnode-id="9494" href="#bib0071" name="bbib0071"><span data-dcnode-id="9495" instrument_node="">Tymula&nbsp;(2019)</span></a><span data-dcnode-id="9493" instrument_node=""> used standard tasks from experimental economics to show that adolescents’ risk tolerance and ambiguity attitudes in the domain of gains are not affected under peer observation. Instead, adolescents become more impatient when observed by a peer. Another study by </span><a class="workspace-trigger" data-dcnode-id="9491" href="#bib0073" name="bbib0073"><span data-dcnode-id="9492" instrument_node="">Tymula&nbsp;and Whitehair&nbsp;(2018)</span></a><span data-dcnode-id="9490" instrument_node=""> found that, in the domain of gains, older adolescents (university students) are less likely to choose gambles with unknown odds of winning over a sure amount when observed by a peer, but observation does not affect the likelihood of choosing gambles with known odds of winning. Such findings are believed to be relevant because previous literature has established that people's real-life decisions are associated with their economic preferences measured in laboratory experiments (</span><a class="workspace-trigger" data-dcnode-id="9488" href="#bib0013" name="bbib0013"><span data-dcnode-id="9489" instrument_node="">Breitkopf&nbsp;et&nbsp;al., 2020</span></a><span data-dcnode-id="9487" instrument_node="">). For example, individuals with a higher tolerance for risks are more likely to misbehave in school and less likely to graduate (</span><a class="workspace-trigger" data-dcnode-id="9485" href="#bib0018" name="bbib0018"><span data-dcnode-id="9486" instrument_node="">Castillo&nbsp;et&nbsp;al., 2018</span></a><span data-dcnode-id="9484" instrument_node="">), more likely to invest in stocks, actively engage in sports, and smoke (</span><a class="workspace-trigger" data-dcnode-id="9482" href="#bib0026" name="bbib0026"><span data-dcnode-id="9483" instrument_node="">Dohmen&nbsp;et&nbsp;al., 2011</span></a><span data-dcnode-id="9481" instrument_node="">), are more likely to drink heavily, be overweight or obese, and not wear a seat belt (</span><a class="workspace-trigger" data-dcnode-id="9479" href="#bib0004" name="bbib0004"><span data-dcnode-id="9480" instrument_node="">Anderson&nbsp;and Mellor,&nbsp;2008</span></a><span data-dcnode-id="9478" instrument_node="">). Adolescents with higher loss aversion are less likely to attempt suicide (Hadlaczky et&nbsp;al., 2018) and pathological gamblers are less loss averse</span><a class="workspace-trigger" data-dcnode-id="9475" href="#cit_1" name="bcit_1"><sup data-dcnode-id="9476"><span data-dcnode-id="9477" instrument_node="">1</span></sup></a><span data-dcnode-id="9474" instrument_node=""> (Genauck et&nbsp;al., 2017).</span></p><p data-dcnode-id="9468" id="para0010"><span data-dcnode-id="9472" instrument_node="">The goal of this paper is to provide an economic understanding of the effect of peer observation on adolescents’ behavior, specifically in the much less explored domain of making risky decisions that involve losses. Even though the research on how the presence of peers affects adolescents’ decisions is motivated by the negative outcomes of these decisions, existing laboratory studies predominantly focused on the gain domain or used tasks that make it impossible to separately identify risk tolerance and loss aversion. In the most closely related study, </span><a class="workspace-trigger" data-dcnode-id="9470" href="#bib0059" name="bbib0059"><span data-dcnode-id="9471" instrument_node="">Smith&nbsp;et&nbsp;al.&nbsp;(2014)</span></a><span data-dcnode-id="9469" instrument_node=""> asked adolescent participants to make hypothetical choices between passing on or playing a gain-loss gamble with clearly stated probabilities. Participants who were led to believe that they were being watched by another adolescent were more likely to take the risk. Unfortunately, it is not clear whether this is because they become less loss averse or because they become more risk tolerant, since there were no lottery choices purely in the gain domain and purely in the loss domain that would allow us to separate risk tolerance from loss aversion. This is a crucial difference from theory, as well as from the policy intervention perspective.</span></p><p data-dcnode-id="9460" id="para0011"><span data-dcnode-id="9467" instrument_node="">To fill in this gap, we designed an experiment that allows us to separately estimate participants’ loss aversion and risk tolerance (utility curvature) in gains and losses in private and when observed by a peer sitting next to them. Our novel experimental design permits both within-subject and between-subject approaches to hypothesis testing, thus allowing us to access the advantages of both methods (</span><a class="workspace-trigger" data-dcnode-id="9465" href="#bib0020" name="bbib0020"><span data-dcnode-id="9466" instrument_node="">Charness&nbsp;et&nbsp;al., 2012</span></a><span data-dcnode-id="9464" instrument_node="">) within one experiment and the same sample. Consistent with </span><a class="workspace-trigger" data-dcnode-id="9462" href="#bib0059" name="bbib0059"><span data-dcnode-id="9463" instrument_node="">Smith&nbsp;et&nbsp;al.&nbsp;(2014)</span></a><span data-dcnode-id="9461" instrument_node="">, we find that older adolescents (18–24 years old) are more likely to accept gain-loss gambles when observed. This effect is driven by an increased risk tolerance in both gain and loss domains, rather than reduced loss aversion. For younger adolescents (12–17 years old), neither their risk tolerance nor their loss aversion is affected by peer observation. We discuss the potential reasons for this age dichotomy in susceptibility to observation in the results and discussion sections of the paper.</span></p></section><section data-dcnode-id="7853" id="sec0002"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9455" id="cesectitle0006"><span data-dcnode-id="9458" instrument_node="">2</span><span data-dcnode-id="9457" instrument_node="">. </span><span data-dcnode-id="9456" instrument_node="">Materials and methods</span></h2><div data-dcnode-id="9415"><p data-dcnode-id="9440" id="para0012"><span data-dcnode-id="9450"><span data-dcnode-id="9454" instrument_node="">146 (59 male) adolescents participated in two studies (mean age 18.175 with </span><a class="topic-link" data-dcnode-id="9452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/measure-of-dispersion" title="Learn more about standard deviation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9453" instrument_node="">standard deviation</span></a><span data-dcnode-id="9451" instrument_node=""> 3.208, see age histogram in </span></span><a class="workspace-trigger" data-dcnode-id="9448" href="#fig0001" name="bfig0001"><span data-dcnode-id="9449" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="9447" instrument_node="">). Sixty-two (28 male) 18 to 24 years old participants were recruited from the University of Sydney student database using ORSEE (</span><a class="workspace-trigger" data-dcnode-id="9445" href="#bib0033" name="bbib0033"><span data-dcnode-id="9446" instrument_node="">Greiner,&nbsp;2015</span></a><span data-dcnode-id="9444" instrument_node="">) and participated in sessions during March 2018. Since 2016, the majority of participants have been recruited to the University of Sydney ORSEE database through Facebook and Instagram ads targeting University of Sydney students, with a smaller fraction of participants recruited via announcements on large units of study sites and via traditional flyers left at the library. Eighty-four (31 male) 12 to 17 years old participants (all high school students) were recruited using announcements placed on Facebook and Instagram and participated in sessions that took place in May 2018. Younger (12–17 years old) and older (18–24 years old) participants, while recruited using similar methods, took part in separate sessions and were never mixed in one session. The experiment was programmed in z-Tree (</span><a class="workspace-trigger" data-dcnode-id="9442" href="#bib0028" name="bbib0028"><span data-dcnode-id="9443" instrument_node="">Fischbacher,&nbsp;2007</span></a><span data-dcnode-id="9441" instrument_node="">). Each session finished within 60&nbsp;min. All participants and, in the case of minors, also caregivers gave informed consent and the study was approved by the Human Research Ethics Committee at the University of Sydney. Before commencing the task, all participants read instructions (available in Appendix A).</span></p><figure class="figure text-xs" data-dcnode-id="9416" id="fig0001"><span data-dcnode-id="9424"><img alt="Fig. 1" aria-describedby="cap0001" data-dcnode-id="9439" height="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr1.jpg&amp;raw"><span data-dcnode-id="9438" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9425"><li data-dcnode-id="9432"><a class="anchor download-link u-font-sans" data-dcnode-id="9433" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr1_lrg.jpg" target="_blank" title="Download high-res image (98KB)"><span class="anchor-text" data-dcnode-id="9434"><span data-dcnode-id="9437" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9435"><span data-dcnode-id="9436" instrument_node="">Download high-res image (98KB)</span></span></span></a></li><li data-dcnode-id="9426"><a class="anchor download-link u-font-sans" data-dcnode-id="9427" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9428"><span data-dcnode-id="9431" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9429"><span data-dcnode-id="9430" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9417"><span data-dcnode-id="9418" id="cap0001"><p data-dcnode-id="9419" id="spara001"><span class="label" data-dcnode-id="9422"><span data-dcnode-id="9423" instrument_node="">Fig. 1</span></span><span data-dcnode-id="9421" instrument_node="">. </span><span data-dcnode-id="9420" instrument_node="">Distribution of age in the whole sample.</span></p></span></span></figure></div><section data-dcnode-id="9369" id="sec0003"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9411" id="cesectitle0007"><span data-dcnode-id="9414" instrument_node="">2.1</span><span data-dcnode-id="9413" instrument_node="">. </span><span data-dcnode-id="9412" instrument_node="">Experimental task</span></h3><div data-dcnode-id="9375"><p data-dcnode-id="9400" id="para0013"><span data-dcnode-id="9410" instrument_node="">We used the same experimental task with younger and older participants to address the need for new studies that use the same experimental tasks with participants from a wide age range (</span><a class="workspace-trigger" data-dcnode-id="9408" href="#bib0038" name="bbib0038"><span data-dcnode-id="9409" instrument_node="">Hartley&nbsp;and Somerville,&nbsp;2015</span></a><span data-dcnode-id="9407" instrument_node="">). To assess participants’ risk tolerance and loss aversion, we asked them 120 questions where they could choose between a guaranteed amount of money and a lottery that offered a larger or smaller amount, each with 50% probability. Participants could also indicate indifference between the options. If they chose indifferent, the program would randomly allocate them to either the fixed option or the lottery with equal chance. Adding indifferent option allows us to test whether the propensity to leave the choice to chance is affected by peer observation. After indicating their choice, participants moved to the next trial without receiving any feedback. Participants knew that one of their choices would be randomly selected for payment at the end of the experiment. They were not allowed to skip trials. All questions were presented on a computer screen. The questions were presented in an order independently randomized for each participant. </span><a class="workspace-trigger" data-dcnode-id="9405" href="#fig0002" name="bfig0002"><span data-dcnode-id="9406" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="9404" instrument_node=""> illustrates examples of how the questions were presented to participants.</span><a class="workspace-trigger" data-dcnode-id="9401" href="#cit_2" name="bcit_2"><sup data-dcnode-id="9402"><span data-dcnode-id="9403" instrument_node="">2</span></sup></a></p><figure class="figure text-xs" data-dcnode-id="9376" id="fig0002"><span data-dcnode-id="9384"><img alt="Fig. 2" aria-describedby="cap0002" data-dcnode-id="9399" height="568" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr2.jpg&amp;raw"><span data-dcnode-id="9398" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9385"><li data-dcnode-id="9392"><a class="anchor download-link u-font-sans" data-dcnode-id="9393" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr2_lrg.jpg" target="_blank" title="Download high-res image (135KB)"><span class="anchor-text" data-dcnode-id="9394"><span data-dcnode-id="9397" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9395"><span data-dcnode-id="9396" instrument_node="">Download high-res image (135KB)</span></span></span></a></li><li data-dcnode-id="9386"><a class="anchor download-link u-font-sans" data-dcnode-id="9387" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9388"><span data-dcnode-id="9391" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9389"><span data-dcnode-id="9390" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9377"><span data-dcnode-id="9378" id="cap0002"><p data-dcnode-id="9379" id="spara002"><span class="label" data-dcnode-id="9382"><span data-dcnode-id="9383" instrument_node="">Fig. 2</span></span><span data-dcnode-id="9381" instrument_node="">. </span><span data-dcnode-id="9380" instrument_node="">Examples of decision scenarios in A: gain trial, B: loss trial, C: mixed trial.</span></p></span></span></figure></div><p data-dcnode-id="9370" id="para0015"><span data-dcnode-id="9374" instrument_node="">The specific questions asked in the study were a subset of questions asked in </span><a class="workspace-trigger" data-dcnode-id="9372" href="#bib0060" name="bbib0060"><span data-dcnode-id="9373" instrument_node="">Sokol-Hessner&nbsp;et&nbsp;al.&nbsp;(2013)</span></a><span data-dcnode-id="9371" instrument_node="">. To assess risk tolerance in the gain domain, 20 of the 120 questions (gain trials) featured a choice between receiving a fixed amount (that varied between $1 and $13 from trial to trial) and a lottery that offered a greater sum (that varied between $3 and $28 from trial to trial) or nothing. To assess risk tolerance over the loss domain, 20 of the 120 questions (loss trials) featured a choice between losing a fixed amount and a lottery that offered a larger loss or nothing. In loss trials, the amounts were the same as in the gain trials but multiplied by −1. The remaining 80 questions (mixed trials) allowed us to assess the participant's loss aversion by presenting a choice between a guaranteed $0 and a mixed lottery offering a 50% chance of a gain (that varied between $2 and $12) and a 50% of a loss (that varied between -$0.5 and -$24). See Table C1 in Appendix C for all choice scenarios used in the experiment.</span></p></section><section data-dcnode-id="9322" id="sec0004"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9365" id="cesectitle0008"><span data-dcnode-id="9368" instrument_node="">2.2</span><span data-dcnode-id="9367" instrument_node="">. </span><span data-dcnode-id="9366" instrument_node="">Observation implementation</span></h3><p data-dcnode-id="9354" id="para0016"><span data-dcnode-id="9364" instrument_node="">Upon arrival, each participant was seated at a computer station and randomly allocated to be either a Choice-Maker or an Observer. Choice-Makers completed the experimental task twice, once in private (</span><em data-dcnode-id="9362"><span data-dcnode-id="9363" instrument_node="">private condition</span></em><span data-dcnode-id="9361" instrument_node="">) and once under observation by an Observer (</span><em data-dcnode-id="9359"><span data-dcnode-id="9360" instrument_node="">observed condition</span></em><span data-dcnode-id="9358" instrument_node="">). Observers completed the task only once in private. The order of the private and observed conditions was randomized for each session. The timeline of the experiment is summarized in </span><a class="workspace-trigger" data-dcnode-id="9356" href="#fig0003" name="bfig0003"><span data-dcnode-id="9357" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="9355" instrument_node="">A.</span></p><p data-dcnode-id="9352" id="para0017"><span data-dcnode-id="9353" instrument_node="">The experimental design allowed the use of a within-participant analysis of the effect of observation on decision-making by comparing the same Choice-Makers’ decisions in private and under observation. The same effect could also be investigated through a between-participant comparison of the choices made only in Stage 2 by Choice-Makers in Order 1 (observed) and a different set of Choice-Makers in Order 0 (private).</span></p><p data-dcnode-id="9347" id="para0018"><span data-dcnode-id="9351" instrument_node="">Sessions were conducted at the University of Sydney School of Economics experimental laboratory, which consists of 32 computer stations, separated by tall partition walls on the sides and front. </span><a class="workspace-trigger" data-dcnode-id="9349" href="#fig0003" name="bfig0003"><span data-dcnode-id="9350" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="9348" instrument_node="">B presents the seating map for the private and observed conditions. To enhance privacy for the private condition, participants were randomly allocated seats with unoccupied adjacent cubicle(s).</span></p><p data-dcnode-id="9339" id="para0019"><span data-dcnode-id="9346" instrument_node="">For the observed condition, each Observer moved to sit to the right of a Choice-Maker with whom they had been randomly partnered. Choice-Makers and Observers were not allowed to verbally communicate. The physical distance between the Observer and the Choice-Maker was controlled by strapping their chairs together. To incentivize Observers to pay attention to the Decision-Maker's choices, we told them that they would be asked to recall three randomly selected choices by the Choice-Maker and would receive $1 for each correct recollection (Stage 4 – Test in </span><a class="workspace-trigger" data-dcnode-id="9344" href="#fig0003" name="bfig0003"><span data-dcnode-id="9345" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="9343" instrument_node="">A). Observers could not write down notes whilst observing. Payment opportunities were equalized by asking Choice-Makers to guess three of the Observer's choices. Participants were told that decisions during the observed condition would only impact the Choice-Maker's payment and that the Observer would not be informed of the Choice-Maker's final payment. To ensure that all Choice-Makers in the observed condition would have the same number of people surrounding them while making decisions, we made sure that there was only one pair of participants in each row on each side of the aisle that runs through the middle of the laboratory. This resulted in there being one Choice-Maker – Observer pair per four seats (see </span><a class="workspace-trigger" data-dcnode-id="9341" href="#fig0003" name="bfig0003"><span data-dcnode-id="9342" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="9340" instrument_node="">B Observed condition).</span></p><p data-dcnode-id="9325" id="para0020"><span data-dcnode-id="9338" instrument_node="">Given previously documented associations between state anxiety and performing tasks in public (</span><a class="workspace-trigger" data-dcnode-id="9336" href="#bib0043" name="bbib0043"><span data-dcnode-id="9337" instrument_node="">Horwitz&nbsp;and McCaffrey,&nbsp;2008</span></a><span data-dcnode-id="9335" instrument_node="">) and associations between anxiety and risk tolerance (</span><a class="workspace-trigger" data-dcnode-id="9333" href="#bib0053" name="bbib0053"><span data-dcnode-id="9334" instrument_node="">Peng&nbsp;et&nbsp;al., 2014</span></a><span data-dcnode-id="9332" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9330" href="#bib0055" name="bbib0055"><span data-dcnode-id="9331" instrument_node="">Raghunathan&nbsp;and Pham,&nbsp;1999</span></a><span data-dcnode-id="9329" instrument_node="">), we investigated state anxiety as a potential mediator of the behavioral change. To measure whether a participant's emotional state mediated the influence of observation on their decision-making, participants completed a state anxiety measure (</span><a class="workspace-trigger" data-dcnode-id="9327" href="#bib0050" name="bbib0050"><span data-dcnode-id="9328" instrument_node="">Marteau&nbsp;and Bekker,&nbsp;1992</span></a><span data-dcnode-id="9326" instrument_node="">, available in Appendix B) twice during the session: before commencing the private condition, and before commencing the observed condition.</span></p><p data-dcnode-id="9323" id="para0021"><span data-dcnode-id="9324" instrument_node="">After the decision-making task was completed, all participants filled out a questionnaire about their demographics, perceptions of their partner and themselves, and the overall aims of the experiment (see full questionnaire in Appendix B).</span></p></section><section data-dcnode-id="9285" id="sec0005"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9318" id="cesectitle0009"><span data-dcnode-id="9321" instrument_node="">2.3</span><span data-dcnode-id="9320" instrument_node="">. </span><span data-dcnode-id="9319" instrument_node="">Payment</span></h3><div data-dcnode-id="9286"><p data-dcnode-id="9311" id="para0022"><span data-dcnode-id="9317" instrument_node="">Participants’ final compensation consisted of three parts: $35 which they received at the beginning of the </span><span data-dcnode-id="9316" instrument_node="">experiment,</span><a class="workspace-trigger" data-dcnode-id="9313" href="#cit_3" name="bcit_3"><sup data-dcnode-id="9314"><span data-dcnode-id="9315" instrument_node="">3</span></sup></a><span data-dcnode-id="9312" instrument_node=""> the outcome from one randomly selected decision that they had made during the experiment, and the outcome from the test stage where each participant was asked to recall or guess their partner's choice for three randomly selected decision scenarios. If they chose the fixed option for the randomly selected decision, they received (or lost, in the case of a negative sum) that amount. If they chose the lottery, they rolled a 6-sided die to determine the lottery's outcome. Participants rolled the die themselves to avoid potential distrust in the payment procedure. If the dice came up as a 1, 2, or 3, the participant received the payoff presented on top of the lottery. If the dice came up as a 4, 5, or 6, the participant received the payoff presented on the bottom of the lottery, meaning that they had a 50% chance of either outcome. All payments were made in cash.</span></p><figure class="figure text-xs" data-dcnode-id="9287" id="fig0003"><span data-dcnode-id="9295"><img alt="Fig. 3" aria-describedby="cap0003" data-dcnode-id="9310" height="565" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr3.jpg&amp;raw"><span data-dcnode-id="9309" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9296"><li data-dcnode-id="9303"><a class="anchor download-link u-font-sans" data-dcnode-id="9304" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr3_lrg.jpg" target="_blank" title="Download high-res image (472KB)"><span class="anchor-text" data-dcnode-id="9305"><span data-dcnode-id="9308" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9306"><span data-dcnode-id="9307" instrument_node="">Download high-res image (472KB)</span></span></span></a></li><li data-dcnode-id="9297"><a class="anchor download-link u-font-sans" data-dcnode-id="9298" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9299"><span data-dcnode-id="9302" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9300"><span data-dcnode-id="9301" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9288"><span data-dcnode-id="9289" id="cap0003"><p data-dcnode-id="9290" id="spara003"><span class="label" data-dcnode-id="9293"><span data-dcnode-id="9294" instrument_node="">Fig. 3</span></span><span data-dcnode-id="9292" instrument_node="">. </span><span data-dcnode-id="9291" instrument_node="">Experimental design. A: Timeline of the experiment. B: seating map in private and observed conditions. Each cell indicates a computer station. x indicates a student sitting at a computer station. xx indicates two students sitting at the same computer station.</span></p></span></span></figure></div></section><section data-dcnode-id="7854" id="sec0006"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9281" id="cesectitle0010"><span data-dcnode-id="9284" instrument_node="">2.4</span><span data-dcnode-id="9283" instrument_node="">. </span><span data-dcnode-id="9282" instrument_node="">Econometric approach</span></h3><p data-dcnode-id="9267" id="para0024"><span data-dcnode-id="9280" instrument_node="">We used structural model-based analysis (</span><a class="workspace-trigger" data-dcnode-id="9278" href="#bib0016" name="bbib0016"><span data-dcnode-id="9279" instrument_node="">Camerer&nbsp;and Ho,&nbsp;1994</span></a><span data-dcnode-id="9277" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9275" href="#bib0037" name="bbib0037"><span data-dcnode-id="9276" instrument_node="">Harrison&nbsp;and Rutström,&nbsp;2008</span></a><span data-dcnode-id="9274" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9272" href="#bib0041" name="bbib0041"><span data-dcnode-id="9273" instrument_node="">Hey&nbsp;and Orme,&nbsp;1994</span></a><span data-dcnode-id="9271" instrument_node="">) to estimate the participants’ preferences because this approach allows us to estimate loss aversion separately from risk tolerance in gains and losses. To check the validity of our results, given the concerns over the reliability of the estimates from such approach (</span><a class="workspace-trigger" data-dcnode-id="9269" href="#bib0005" name="bbib0005"><span data-dcnode-id="9270" instrument_node="">Apesteguia&nbsp;and Ballester,&nbsp;2018</span></a><span data-dcnode-id="9268" instrument_node="">), in parallel for risk tolerance we conducted the same analysis using ordinal logistic regressions and two sample z-tests with a simple, descriptive measure of risk tolerance. To calculate this simple descriptive index of risk tolerance, we calculated for each individual the proportion of risky choices in each trial type. We counted indifference as a half risky choice. Although we calculated this index for mixed trials as well, this is not a proper measure of loss aversion. We find the results of this analysis to be qualitatively in agreement with our structural estimation approach.</span></p><p data-dcnode-id="8826" id="para0025"><span data-dcnode-id="9266" instrument_node="">We modeled each option's utility using a power utility function, where the utility of a given outcome, </span><span class="math" data-dcnode-id="9252"><span class="MathJax_Preview" data-dcnode-id="9265" style=""></span><sp "">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7817"><span data-dcnode-id="7818" id="cap0004"><p data-dcnode-id="7819" id="spara004"><span class="label" data-dcnode-id="7822"><span data-dcnode-id="7823" instrument_node="">Fig. 4</span></span><span data-dcnode-id="7821" instrument_node="">. </span><span data-dcnode-id="7820" instrument_node="">Task comprehension. Histogram of the number of correctly answered comprehension questions in the whole sample (out of three).</span></p></span></span></figure></div><div data-dcnode-id="7549"><p data-dcnode-id="7577" id="para0029"><span data-dcnode-id="7814" instrument_node="">Choice-Makers subjectively felt observed, with 93.15% reporting that their partner had paid attention to at least half of their choices (see </span><a class="workspace-trigger" data-dcnode-id="7812" href="#fig0005" name="bfig0005"><span data-dcnode-id="7813" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="7811" instrument_node="">A). This perceived attention is not significantly different between older and younger adolescents (</span><span class="math" data-dcnode-id="7731"><span class="MathJax_Preview" data-dcnode-id="7810" style=""></span><span class="MathJax_SVG" data-dcnode-id="7734" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msup is=&quot;true&quot;><mi is=&quot;true&quot;>X</mi><mn is=&quot;true&quot;>2</mn></msup><mrow is=&quot;true&quot;><mo is=&quot;true&quot;>=</mo><mn is=&quot;true&quot;>1.6863</mn><mo is=&quot;true&quot;>,</mo><mspace width=&quot;0.28em&quot; is=&quot;true&quot; /><mi is=&quot;true&quot;>p</mi><mo linebreak=&quot;badbreak&quot; is=&quot;true&quot;>=</mo><mn is=&quot;true&quot;>0.640</mn><mo is=&quot;true&quot;>)</mo></mrow></mrow></math>" id="MathJax-Element-20-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dc 39" stroke-width="1"></path></use><use data-dcnode-id="7598" href="#MJMAIN-31" x="1279" y="0"><path d="M213 578L200 573Q186 568 160 563T102 556H83V602H102Q149 604 189 617T245 641T273 663Q275 666 285 666Q294 666 302 660V361L303 61Q310 54 315 52T339 48T401 46H427V0H416Q395 3 257 3Q121 3 100 0H88V46H114Q136 46 152 46T177 47T193 50T201 52T207 57T213 61V578Z" data-dcnode-id="7599" id="MJMAIN-31" stroke-width="1"></path></use><use data-dcnode-id="7596" href="#MJMAIN-39" x="1780" y="0"><path d="M352 287Q304 211 232 211Q154 211 104 270T44 396Q42 412 42 436V444Q42 537 111 606Q171 666 243 666Q245 666 249 666T257 665H261Q273 665 286 663T323 651T370 619T413 560Q456 472 456 334Q456 194 396 97Q361 41 312 10T208 -22Q147 -22 108 7T68 93T121 149Q143 149 158 135T173 96Q173 78 164 65T148 49T135 44L131 43Q131 41 138 37T164 27T206 22H212Q272 22 313 86Q352 142 352 280V287ZM244 248Q292 248 321 297T351 430Q351 508 343 542Q341 552 337 562T323 588T293 615T246 625Q208 625 181 598Q160 576 154 546T147 441Q147 358 152 329T172 282Q197 248 244 248Z" data-dcnode-id="7597" id="MJMAIN-39" stroke-width="1"></path></use></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="7583" role="presentation"><math data-dcnode-id="7584" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="7585" is="true"><mi data-dcnode-id="7590" is="true"><span data-dcnode-id="7591" instrument_node="">p</span></mi><mo data-dcnode-id="7588" is="true" linebreak="goodbreak"><span data-dcnode-id="7589" instrument_node="">=</span></mo><mn data-dcnode-id="7586" is="true"><span data-dcnode-id="7587" instrument_node="">0.919</span></mn></mrow></math></span></span></span><span data-dcnode-id="7578" instrument_node="">). Overall, the evidence is consistent with the Observers paying attention to the Choice-Makers’ decisions and Choice-Makers feeling observed.</span></p><figure class="figure text-xs" data-dcnode-id="7550" id="fig0005"><span data-dcnode-id="7561"><img alt="Fig. 5" aria-describedby="cap0005" data-dcnode-id="7576" height="531" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr5.jpg&amp;raw"><span data-dcnode-id="7575" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7562"><li data-dcnode-id="7569"><a class="anchor download-link u-font-sans" data-dcnode-id="7570" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr5_lrg.jpg" target="_blank" title="Download high-res image (356KB)"><span class="anchor-text" data-dcnode-id="7571"><span data-dcnode-id="7574" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7572"><span data-dcnode-id="7573" instrument_node="">Download high-res image (356KB)</span></span></span></a></li><li data-dcnode-id="7563"><a class="anchor download-link u-font-sans" data-dcnode-id="7564" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7565"><span data-dcnode-id="7568" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7566"><span data-dcnode-id="7567" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7551"><span data-dcnode-id="7552" id="cap0005"><p data-dcnode-id="7553" id="spara005"><span class="label" data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">Fig. 5</span></span><span data-dcnode-id="7558" instrument_node="">. </span><span data-dcnode-id="7557" instrument_node="">Observation intensity. A: Choice-Makers’ answers to “</span><em data-dcnode-id="7555"><span data-dcnode-id="7556" instrument_node="">What proportion of your choices did the person observing you pay attention to?</span></em><span data-dcnode-id="7554" instrument_node="">”. B: Observers’ recollection of their partner's choices is higher than Choice-Makers’, consistent with them paying attention to partner's choices. Error bars are 95% confidence intervals.</span></p></span></span></figure></div><p data-dcnode-id="7547" id="para0030"><span data-dcnode-id="7548" instrument_node="">Since our task involves making a total of 240 choices for Choice-Makers, we verified that participants do not become less attentive to the task as trials go by. As shown in Table C2, we find that the estimate of the noise parameter for older adolescents is not influenced by the trial number and that younger adolescents become less noisy as the trial number increases. This reassures us that participants paid attention to the task throughout its duration, despite a large number of trials.</span></p><p data-dcnode-id="7545" id="para0031"><span data-dcnode-id="7546" instrument_node="">We have checked for any order effects in our data (see Appendix D.1 for details) and found that younger adolescents (but not older adolescents) are less likely to choose lotteries, the more trials they have already completed (Table D1.1). Therefore, we control for the trial number in the analysis that follows.</span></p><div data-dcnode-id="7258"><p data-dcnode-id="7536" id="para0032"><span data-dcnode-id="7544" instrument_node="">In Appendix D.2, we compare preferences of all 146 participants who made decisions in private to samples studied previously. We also look more closely at the effect of age on all parameters of the model. Younger and older adolescents who participated in our study are generally very similar on all variables that we collected in the post-experimental questionnaire (see </span><a class="workspace-trigger" data-dcnode-id="7542" href="#tbl0001" name="btbl0001"><span data-dcnode-id="7543" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="7541" instrument_node="">). In Appendix D.3.2, we investigate whether the variables on which the two samples differ mediate the effect of observation. We also note that it is possible that the younger and older adolescent samples differ in ways not captured by the variables in our questionnaire.</span><a class="workspace-trigger" data-dcnode-id="7538" href="#cit_4" name="bcit_4"><sup data-dcnode-id="7539"><span data-dcnode-id="7540" instrument_node="">4</span></sup></a><span data-dcnode-id="7537" instrument_node=""> A reader interested in the effect of observation on Observers’ behavior should refer to Appendix D.1.4.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7259" id="tbl0001"><span class="captions" data-dcnode-id="7523"><span data-dcnode-id="7524" id="cap0009"><p data-dcnode-id="7525" id="spara009"><span class="label" data-dcnode-id="7534"><span data-dcnode-id="7535" instrument_node="">Table 1</span></span><span data-dcnode-id="7533" instrument_node="">. </span><span data-dcnode-id="7532" instrument_node="">Comparison of 18–24 year old and 12–17 year old Choice Makers on the questionnaire variables. </span><em data-dcnode-id="7530"><span data-dcnode-id="7531" instrument_node="">p</span></em><span data-dcnode-id="7529" instrument_node="">-values are based on two-sided, unpaired </span><em data-dcnode-id="7527"><span data-dcnode-id="7528" instrument_node="">t</span></em><span data-dcnode-id="7526" instrument_node="">-test of means and when indexed with ^ they are based on Pearson's chi-squared test. attractiveness is on a scale from 1 (very unattractive) to 5 (very attractive); Strength is on a scale from 1 (very weak) to 5 (very strong); wealth is on a scale from 1 (very poor) to 5 (very rich); practicality is on a scale from 1 (very impractical) to 5 (very practical); responsibility is from 1 (very irresponsible) to 5 (very responsible); familiar is on a scale from 0 (never met and never seen before) to 2 (met before and seen before); interact after is on a scale from 1 (very unlikely) to 5 (very likely); perceived attention is on a scale from 1 (none) to 5 (all); perceived care is 1 if participants think their session partner cared about what their choices were; consistency is 1 if participants are more consistent with their choices for observer's benefit; focus is 0 if there is no change, 1 if more distracted under observation, and 2 if more focused under observation; risk tolerance is 0 if there is no change, 1 if take less risk under observation, and 2 if take more risk under observation; attention is 0 if there is no change, 1 if pay less attention to task under observation, and 2 if pay more attention to task under observation.</span></p></span></span><div class="groups" data-dcnode-id="7260"><table data-dcnode-id="7261"><thead data-dcnode-id="7512"><tr class="rowsep-1" data-dcnode-id="7513"><th class="align-left valign-top" data-dcnode-id="7522" id="en0001" scope="row"></th><th class="align-left valign-top" data-dcnode-id="7520" id="en0002" scope="col"><span data-dcnode-id="7521" instrument_node="">18–24 y.o. mean</span></th><th class="align-left valign-top" data-dcnode-id="7518" id="en0003" scope="col"><span data-dcnode-id="7519" instrument_node="">12–17 y.o. mean</span></th><th class="align-left valign-top" data-dcnode-id="7514" id="en0004" scope="col"><em data-dcnode-id="7516"><span data-dcnode-id="7517" instrument_node="">p</span></em><span data-dcnode-id="7515" instrument_node="">-value</span></th></tr></thead><tbody data-dcnode-id="7262"><tr data-dcnode-id="7505"><th class="align-left valign-top" data-dcnode-id="7509" id="en0005" scope="row"><strong data-dcnode-id="7510"><span data-dcnode-id="7511" instrument_node="">Individual characteristics</span></strong></th><td class="align-left valign-top" data-dcnode-id="7508" id="en0006"></td><td class="align-left valign-top" data-dcnode-id="7507" id="en0007"></td><td class="align-left valign-top" data-dcnode-id="7506" id="en0008"></td></tr><tr data-dcnode-id="7496"><th class="align-left valign-top" da regate level analysis of the effect of observation</span></h3><section data-dcnode-id="6102" id="sec0010"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7249" id="cesectitle0014"><span data-dcnode-id="7252" instrument_node="">3.2.1</span><span data-dcnode-id="7251" instrument_node="">. </span><span data-dcnode-id="7250" instrument_node="">Within-subject analysis of the effect of observation in older adolescents (18–24 years old)</span></h4><div data-dcnode-id="6203"><p data-dcnode-id="7126" id="para0034"><span data-dcnode-id="7248" instrument_node="">To identify the impact of observation on risk tolerance and loss aversion, we structurally estimate preferences. As shown in </span><a class="workspace-trigger" data-dcnode-id="7246" href="#tbl0002" name="btbl0002"><span data-dcnode-id="7247" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="7245" instrument_node=""> (models 1–5)</span><a class="workspace-trigger" data-dcnode-id="7242" href="#cit_5" name="bcit_5"><sup data-dcnode-id="7243"><span data-dcnode-id="7244" instrument_node="">5</span></sup></a><span data-dcnode-id="7241" instrument_node=""> and illustrated in </span><a class="workspace-trigger" data-dcnode-id="7239" href="#fig0006" name="bfig0006"><span data-dcnode-id="7240" instrument_node="">Fig.&nbsp;6</span></a><span data-dcnode-id="7238" instrument_node="">A, we find that 18- to 24-year-olds are more risk-tolerant in gains and losses and more loss-averse under observation. The size of the effect is substantial. Under observation, for 18–24-year-olds, the power utility curvature parameter increases by 0.5137 in gains, by 0.1612 in losses, and loss aversion increases by 0.3542. The effects are present both with and without age, gender, wealth, and trial number controls. Using simple proportions of lottery choices, we confirm that, when observed, compared to in private, older adolescents select lotteries more often. This effect is significant in gain trials (0.567&nbsp;vs. 0.292, 2 119 546Q113 543 108 522T98 479L95 458V455H55V458Z" data-dcnode-id="6002" id="MJMAIN-37" stroke-width="1"></path></use><use data-dcnode-id="5999" href="#MJMAIN-34" x="1279" y="0"><path d="M462 0Q444 3 333 3Q217 3 199 0H190V46H221Q241 46 248 46T265 48T279 53T286 61Q287 63 287 115V165H28V211L179 442Q332 674 334 675Q336 677 355 677H373L379 671V211H471V165H379V114Q379 73 379 66T385 54Q393 47 442 46H471V0H462ZM293 211V545L74 212L183 211H293Z" data-dcnode-id="6000" id="MJMAIN-34" stroke-width="1"></path></use><use data-dcnode-id="5997" href="#MJMAIN-39" x="1780" y="0"><path d="M352 287Q304 211 232 211Q154 211 104 270T44 396Q42 412 42 436V444Q42 537 111 606Q171 666 243 666Q245 666 249 666T257 665H261Q273 665 286 663T323 651T370 619T413 560Q456 472 456 334Q456 194 396 97Q361 41 312 10T208 -22Q147 -22 108 7T68 93T121 149Q143 149 158 135T173 96Q173 78 164 65T148 49T135 44L131 43Q131 41 138 37T164 27T206 22H212Q272 22 313 86Q352 142 352 280V287ZM244 248Q292 248 321 297T351 430Q351 508 343 542Q341 552 337 562T323 588T293 615T246 625Q208 625 181 598Q160 576 154 546T147 441Q147 358 152 329T172 282Q197 248 244 248Z" data-dcnode-id="5998" id="MJMAIN-39" stroke-width="1"></path></use></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="5984" role="presentation"><math data-dcnode-id="5985" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="5986" is="true"><mi data-dcnode-id="5991" is="true"><span data-dcnode-id="5992" instrument_node="">p</span></mi><mo data-dcnode-id="5989" is="true" linebreak="goodbreak"><span data-dcnode-id="5990" instrument_node="">=</span></mo><mn data-dcnode-id="5987" is="true"><span data-dcnode-id="5988" instrument_node="">0.749</span></mn></mrow></math></span></span></span><span data-dcnode-id="5979" instrument_node="">) and in any of the trial types (</span><a class="workspace-trigger" data-dcnode-id="5977" href="#fig0007" name="bfig0007"><span data-dcnode-id="5978" instrument_node="">Fig.&nbsp;7</span></a><span data-dcnode-id="5976" instrument_node="">).</span></p><div data-dcnode-id="5945"><p data-dcnode-id="5970" id="para0040"><span data-dcnode-id="5974" instrument_node="">Our results point to a very different response to observation among older and younger participants. To assess whether the effect of observation gradually becomes stronger as adolescents age, or whether instead there is a sharp difference in how observation affects our younger and older adolescent participants, in </span><a class="workspace-trigger" data-dcnode-id="5972" href="#fig0008" name="bfig0008"><span data-dcnode-id="5973" instrument_node="">Fig.&nbsp;8</span></a><span data-dcnode-id="5971" instrument_node=""> we plotted the proportions of risky choices in observed (dark gray) and private (light gray) conditions by age. Our data suggest that the latter is true. An increasing effect of observation with age would manifest itself in a gradually increasing difference between the dark gray and light gray bars. We do not see such a pattern in our data. Instead, we find that older adolescents of all ages always make more risky choices (in gain, loss, and mixed trials) when observed, while we do not see such an effect for younger adolescents.</span></p><figure class="figure text-xs" data-dcnode-id="5946" id="fig0008"><span data-dcnode-id="5954"><img alt="Fig. 8" aria-describedby="cap0008" data-dcnode-id="5969" height="477" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr8.jpg&amp;raw"><span data-dcnode-id="5968" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5955"><li data-dcnode-id="5962"><a class="anchor download-link u-font-sans" data-dcnode-id="5963" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr8_lrg.jpg" target="_blank" title="Download high-res image (337KB)"><span class="anchor-text" data-dcnode-id="5964"><span data-dcnode-id="5967" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">Download high-res image (337KB)</span></span></span></a></li><li data-dcnode-id="5956"><a class="anchor download-link u-font-sans" data-dcnode-id="5957" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S016726812100216X-gr8.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5958"><span data-dcnode-id="5961" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5959"><span data-dcnode-id="5960" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5947"><span data-dcnode-id="5948" id="cap0008"><p data-dcnode-id="5949" id="spara008"><span class="label" data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">Fig. 8</span></span><span data-dcnode-id="5951" instrument_node="">. </span><span data-dcnode-id="5950" instrument_node="">Proportion of risky choices made by Choice-Makers by age and treatment. Bars are 95% confidence intervals. There is only one participant aged 23 years old and thus the confidence interval for each trial type is omitted.</span></p></span></span></figure></div><p data-dcnode-id="5940" id="para0041"><span data-dcnode-id="5944" instrument_node="">Exclusion of the trials in which participants selected indifferent does not change our key results (compare Table C3 and </span><a class="workspace-trigger" data-dcnode-id="5942" href="#tbl0002" name="btbl0002"><span data-dcnode-id="5943" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="5941" instrument_node="">) and the noise term is not affected by observation (Table D3.4).</span></p></section></section><section data-dcnode-id="5931" id="sec0012"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5934" id="cesectitle0016"><span data-dcnode-id="5937" instrument_node="">3.3</span><span data-dcnode-id="5936" instrument_node="">. </span><span data-dcnode-id="5935" instrument_node="">Mechanism</span></h3><p data-dcnode-id="5932" id="para0042"><span data-dcnode-id="5933" instrument_node="">We tested several candidate mechanisms that could explain the effect of observation on the behavior of our participants — state anxiety, familiarity with the observer, the likelihood of interacting with the observer in the future, perceived observation intensity captured by the degree to which the Choice-Makers believed that the observer is paying attention to their choices, self-assessed relative wealth, and gender. None of these appears to be a mechanism which fully explains the effect of observation in our study (see Appendix D.3).</span></p></section><section data-dcnode-id="5563" id="sec0013"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5927" id="cesectitle0017"><span data-dcnode-id="5930" instrument_node="">3.4</span><span data-dcnode-id="5929" instrument_node="">. </span><span data-dcnode-id="5928" instrument_node="">Between-subject analysis of the effect of observation</span></h3><p data-dcnode-id="5922" id="para0043"><span data-dcnode-id="5926" instrument_node="">So far, our analysis was based on within-subject comparisons of choices made by the same participants under observation and in private. Our design allows us to additionally investigate whether similar effects are observed using a between-subject approach. Half of the Choice-Makers completed the decision-making task first in the private condition and the other half under observation (</span><a class="workspace-trigger" data-dcnode-id="5924" href="#fig0003" name="bfig0003"><span data-dcnode-id="5925" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="5923" instrument_node="">, Stage 2). To investigate the effect of observation between-subjects, we focused only on this first set of decisions made in Stage 2 and compared the choices made by Choice-Makers in order 1 (36 participants in total, 17 18–24-year-olds and 19 12–17-year-olds), who made these decisions while observed, with those made by a different set of Choice-Makers in order 0 (37 participants in total, 14 18–24-year-olds and 23 12–17-year-olds) who made these decisions in private.</span></p><div data-dcnode-id="5572"><p data-dcnode-id="5911" id="para0044"><span data-dcnode-id="5921" instrument_node="">To make the results directly and easily comparable to within-subject analysis, we combined data from Choice-Makers in both studies and captured the age-related difference in their behavior using an indicator (12–17-year-olds) and interaction variables (12–17 y.o. X observed), as justified by earlier analysis (</span><a class="workspace-trigger" data-dcnode-id="5919" href="#fig0008" name="bfig0008"><span data-dcnode-id="5920" instrument_node="">Fig.&nbsp;8</span></a><span data-dcnode-id="5918" instrument_node="">). We then run our analysis under the within-subject approach by using all the data and comparing the same individuals’ behavior when they are in private and when they are observed (Model (1) in </span><a class="workspace-trigger" data-dcnode-id="5916" href="#tbl0003" name="btbl0003"><span data-dcnode-id="5917" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="5915" instrument_node="">). As a second step, we run the between-subject analysis by using only data from Stage 2 and comparing preferences and decisions of individuals who were in private to different individuals who were observed at that stage (Model (2) in </span><a class="workspace-trigger" data-dcnode-id="5913" href="#tbl0003" name="btbl0003"><span data-dcnode-id="5914" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="5912" instrument_node="">).</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="5573" id="tbl0003"><span class="captions" data-dcnode-id="5904"><span data-dcnode-id="5905" id="cap0011"><p data-dcnode-id="5906" id="spara013"><span class="label" data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">Table 3</span></span><span data-dcnode-id="5908" instrument_node="">. </span><span data-dcnode-id="5907" instrument_node="">Comparison of the within and between-subject estimation of the effect of observation on preferences for all Choice-Makers. Maximum likelihood estimates of risk tolerance and loss aversion for Choice-Makers. observed is 1 if made decisions under observation, and 0 if made decisions in private; 12–17 y. o. is an indicator variable for participants who are 12 to 17 years old; trial number is from 1 to 240.</span></p></span></span><div class="groups" data-dcnode-id="5593"><table data-dcnode-id="5594"><thead data-dcnode-id="5897"><tr class="rowsep-1" data-dcnode-id="5898"><th class="align-left valign-top" data-dcnode-id="5903" id="en0608" scope="row"></th><th class="align-left valign-top" data-dcnode-id="5901" id="en0609" scope="col"><span data-dcnode-id="5902" instrument_node="">(1) within</span></th><th class="align-left valign-top" data-dcnode-id="5899" id="en0610" scope="col"><span data-dcnode-id="5900" instrument_node="">(2) between</span></th></tr></thead><tbody data-dcnode-id="5595"><tr data-dcnode-id="5868"><th class="align-left valign-top" data-dcnode-id="5871" id="en0611" scope="row"><strong data-dcnode-id="5895"><span data-dcnode-id="5896" instrument_node="">Risk tolerance in gains (</span></strong><span class="math" data-dcnode-id="5874"><span class="MathJax_Preview" data-dcnode-id="5894" style=""></span><span class="MathJax_SVG" data-dcnode-id="5877" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msup is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B1;</mi><mi is=&quot;true&quot;>g</mi></msup></math>" id="MathJax-Element-36-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0
