-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1926" instrument_node="">Muslim nobility had no intention of acceding to Iltutmish's appointment of a woman as heir</span></span><span data-dcnode-id="1923" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1924" instrument_node="">, and after the sultan died on April 29, 1236, Razia's brother, </span></span><span class="q-inline" data-dcnode-id="1916" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Rukn_ud_din_Firuz" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1922" instrument_node="">Rukn ud din Firuz</span></a><span class="q-inlineBlock" data-dcnode-id="1917" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1918"><svg data-dcnode-id="1919" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1920" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1912" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1915" instrument_node="">, was elevated to the throne instead.</span><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node=""></span></span></li><li class="q-relative" data-dcnode-id="1908" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1909" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1910" instrument_node="">Ruknuddin's reign was short. With Iltutmish's widow Shah Turkaan for all practical purposes running the government, Ruknuddin abandoned himself to the pursuit of personal pleasure and debauchery, to the outrage of the citizenry. On November 9, 1236, both Ruknuddin and his mother Shah Turkaan were assassinated after only six months in power.</span></span></li><li class="q-relative" data-dcnode-id="1905" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1906" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1907" instrument_node="">With reluctance, the nobility agreed to allow Razia to reign as Sultan of Delhi. </span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1891" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1900" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1903" instrument_node=""></span><br data-dcnode-id="1902"><span data-dcnode-id="1901" instrument_node=""></span></span><span data-dcnode-id="1898" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1899" instrument_node="">Razia's Feminism </span></span><span data-dcnode-id="1892" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1897" instrument_node=""></span><br data-dcnode-id="1896"><span data-dcnode-id="1895" instrument_node="">(these actions were totally against the muslim society)</span><br data-dcnode-id="1894"><span data-dcnode-id="1893" instrument_node=""></span></span></p><ul class="q-box" data-dcnode-id="1872" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="1888" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1889" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1890" instrument_node="">She dressed like a man and sat in open durbar. She was an efficient ruler and possessed all the qualities of a Monarch.</span></span></li><li class="q-relative" data-dcnode-id="1876" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1886" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1887" instrument_node="">As a child and adolescent, Razia had little contact with the women of the </span></span><span class="q-inline" data-dcnode-id="1879" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Harem" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: bold; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1885" instrument_node="">harem</span></a><span class="q-inlineBlock" data-dcnode-id="1880" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1881"><svg data-dcnode-id="1882" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1883" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1877" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1878" instrument_node="">, so she had not learnt the customary behavior of women in the Muslim society that she was born into. </span></span></li><li class="q-relative" data-dcnode-id="1873" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1874" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1875" instrument_node="">As Sultan, Razia preferred a man's tunic and headdress; and contrary to custom, she would later show her face when she rode an elephant into battle at the head of her army</span></span></li></ul><div class="q-box qu-mx--n_medium" data-dcnode-id="1869" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1870" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1871" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-5e50f5ccf50fc8726c646943e80c873f-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1792" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1793" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q- ="">The Family Court Act, 1984</span></span></p><span data-dcnode-id="1475" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1472" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1473" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1474" instrument_node="">The Family Courts Act , 1984 was passed to provide for the establishment of family courts to promote conciliation in, and secure speedy settlement of, disputes relating to marriage and family affairs.</span></span></p><span data-dcnode-id="1471" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1466" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1469" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1470" instrument_node="">2. </span></span><span data-dcnode-id="1467" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1468" instrument_node="">Thd Hindu Succession Act 1956</span></span></p><span data-dcnode-id="1465" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1462" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1463" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1464" instrument_node="">( Amendment in 2005)</span></span></p><span data-dcnode-id="1461" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1458" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1459" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1460" instrument_node="">The object of the Act as contained in section 14 is to remove the disability of a female to acquire and hold property as an absolute owner and to convert any estate already held by a woman on the date of commencement of the Act as a limited owner into an absolute estate</span></span></p><span data-dcnode-id="1457" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1452" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1455" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1456" instrument_node="">3. </span></span><span data-dcnode-id="1453" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1454" instrument_node="">Dowry Prohibition Act, 1961</span></span></p><span data-dcnode-id="1451" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1448" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1449" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1450" instrument_node="">Dowry system is an insult to our society. It reduces the position the both man and women. Even educated men are demanding dowry. Even after marriage, some brides are tortured to bring money from their parents.</span></span></p><span data-dcnode-id="1447" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1444" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1445" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1446" instrument_node="">The Department of Women and child Development has prepared a National Policy for the Empowerment of Women in the year 2001. There are many Laws for women for their protection like Maternity Benefits</span></span></p><span data-dcnode-id="1443" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1440" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1441" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1442" instrument_node="">Go through link for books</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1363" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1364" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1365" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1379" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1406" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1407" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1417" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1418" style="box-sizing: border-box; position: relative;"><button aria-label="1 upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadi al; background: none;"><span data-dcnode-id="1236" instrument_node="">Roman conquest of peoples was highly tolerable. This toleration was passed to its citizenry long before their shift from Republic to Dictatorship (this a process and switch from the </span></span><span data-dcnode-id="1233" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1234" instrument_node="">principate </span></span><span data-dcnode-id="1231" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1232" instrument_node="">to the </span></span><span data-dcnode-id="1229" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1230" instrument_node="">dominate</span></span><span data-dcnode-id="1227" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1228" instrument_node="">).</span></span></p><span data-dcnode-id="1225" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1222" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1223" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1224" instrument_node="">Women could own property, hold certain office positions, start a business, and divorce their husbands. Unless the son was old enough, a lot of widows were also the heirs to their family’s fortune if the father were to pass away.</span></span></p><span data-dcnode-id="1221" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1214" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1219" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1220" instrument_node="">Even in less wealthy agrarian families women had </span></span><span data-dcnode-id="1217" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1218" instrument_node="">more</span></span><span data-dcnode-id="1215" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1216" instrument_node=""> equality than their wealthier counter parts. Although they might not have the opportunity to start a business or run for office, the rural life was physically demanding of all its constituents, and therefore a equitable and respectful relationship within those houses was highly likely.</span></span></p><span data-dcnode-id="1213" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1210" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1211" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1212" instrument_node="">We can see this progresssive field of view during Roman conquest as well. When subduing enemies, Roman military governors would often allow free practice of religion to all of their subjects. The only requirement was that you recognize the other gods as well. You didn’t have to worship them, but you had to acknowledge that the Romans did. (This is why the Romans hated the Jews and the Christians, because their god was the only god and none other existed.. or were demons).</span></span></p><span data-dcnode-id="1209" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1206" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1207" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1208" instrument_node="">Regards</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box gations of women, eleven of which easily passed. The resolution arguing for woman suffrage was a point of con</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="828" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="829" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="830" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="831" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="832" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="837" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="838" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="839" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="833" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="834"><svg data-dcnode-id="835" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="836" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="812" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="813" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="814"><span class="q-box qu-userSelect--text" data-dcnode-id="815" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="816" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="817" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="822" instrument_node="">The U.S. women’s movement had its beginnings in 1848 when Elizabeth Cady Stanton and Lucretia Mott called the Seneca Falls Convention in New York to “discuss the social, civil, and religious condition and rights of woman.”  Stanton and Mott had broad ranging goals for this first-ever women’s convention, as detailed in their “Declaration of Sentiments.” Modeled after the U.S. Declaration of Independence, the document included twelve resolutions concerning the rights, privileges, and obligations of women, eleven of which easily passed. The resolution arguing for woman suffrage was a point of contention among participants. After much debate, Frederick Douglass, the well-known orator, abolitionist, and vigorous supporter of women’s rights, stood up to speak in favor of women’s franchise. His passionate argument helped garner support from Seneca Falls participants, and over 100 of them signed the resolution, enabling it to pass.</span><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">Two years later, at the American Anti-Slavery Society meeting in Boston, members resolved to create a national convention for the formal consideration of women’s rights. For the next ten years (with the exception of 1857), delegates met annually at the National Women’s Rights Convention where a wide range of issues was discussed including equal wages, educational rights, women’s property rights, marriage reform, and women’s suffrage. The conventions, known for their hotly debated and frequently unconventional topics as well as standing room only crowds, saw the passage of several resolutions by attendees, who were encouraged to go home and bring pertinent issues before their own state legislative bodies.</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">The American Civil War brought an end to the National Women’s Rights Convention, and for the next several years, women’s rights activists focused their energies on the abolition of slavery, and on emancipation issues. But at the 1866 American Anti-Slavery Society meeting in Boston, abolitionist Lucy Stone and suffragist Susan B. Anthony proposed the idea of an organization where women and blacks could work together toward universal suffrage. Thus, the American Equal Rights Association (AERA) was formed, with Lucy Stone, Susan B. Anthony, Elizabeth Cady Stanton and Frederick Douglass as co-founders. Within a few years, news of an impending 15th Amendment—granting free men of color the right to vote—created a rift among members; while many in AERA considered the amendment a victory, and were satisfied that things were moving in the right direction, others, including Stanton and Anthony were not happy. The 15th Amendment did not extend voting rights to women—a “grave injustice” and even affront to these activists—and they could not and would not support it. AERA members were split in their support, and the organization did not survive the schism.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="744" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="745" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="746" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="760" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="782" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="783" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="793" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="794" style="box-sizing: border-box; position: relative;"><button aria-label="1 upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-align
