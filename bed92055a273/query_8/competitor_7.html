</span><h2 class="wsite-content-title" data-dcnode-id="1362"><font color="#24678d" data-dcnode-id="1365" size="6"><span data-dcnode-id="1366" instrument_node="">C3 Framework:&nbsp;</span></font><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.socialstudies.org/c3"><span data-dcnode-id="1364" instrument_node="">College, Career, and Civic Life (C3)</span></a></h2><span data-dcnode-id="1361" instrument_node="">
</span><div data-dcnode-id="1351" style="text-align:left;"><div data-dcnode-id="1360" style="height: 10px; overflow: hidden;"></div><span data-dcnode-id="1359" instrument_node="">
</span><a class="wsite-button wsite-button-small wsite-button-normal" data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.c3teachers.org/" target="_blank"><span data-dcnode-id="1358" instrument_node="">
</span><span class="wsite-button-inner" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Head to the C3 Teachers Page</span></span><span data-dcnode-id="1355" instrument_node="">
</span></a><span data-dcnode-id="1353" instrument_node="">
</span><div data-dcnode-id="1352" style="height: 10px; overflow: hidden;"></div></div><span data-dcnode-id="1350" instrument_node="">
</span><div class="paragraph" data-dcnode-id="1328"><span data-dcnode-id="1349" instrument_node="">The C3 Framework is a framework for Social Studies education that is inquiry based. C3 explains, "</span><span data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">The Inquiry Design Model (IDM) is a distinctive approach to creating curriculum and instructional materials that honors teachers’ knowledge and expertise, avoids overprescription, and focuses on the main elements of the instructional design process as envisioned in the Inquiry Arc of the&nbsp;</span></span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.socialstudies.org/c3"><span data-dcnode-id="1346" instrument_node="">College, Career, and Civic Life (C3) Framework for State Social Studies Standards</span></a><span data-dcnode-id="1340"><span data-dcnode-id="1344" instrument_node="">&nbsp;(2013). Unique to the IDM is the blueprint, a one-page representation of the questions, tasks, and sources that define a curricular inquiry." This framework has been adopted by NCSS and aligns with the Common Core.</span><br data-dcnode-id="1343"><br data-dcnode-id="1342"><span data-dcnode-id="1341" instrument_node="">NHCSS has taken the lead in posting creative teacher inquiries that align with the C3 Framework and address New Hampshire State standards. Check back frequently as more will continue to be posted. To have your content posted here, make sure it is in the C3 Framework's format. To do this, use the&nbsp;</span></span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//idm.c3teachers.org/"><span data-dcnode-id="1339" instrument_node="">IDM Generator</span></a><span data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">&nbsp;(online at&nbsp;</span></span><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//idm.c3teachers.org/"><span data-dcnode-id="1335" instrument_node="">http://idm.c3teachers.org</span></a><span data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node="">). The platform develops interactive inquiries for online use by students. C3 explains, "The easy to use, web-based interface enables students to inquire about compelling questions, access disciplinary sources, and complete formative and summative tasks and exercises in taking informed action. Teachers can create class accounts and produce a unique web address for students to complete an assignment online."</span><br data-dcnode-id="1332"><br data-dcnode-id="1331"><span data-dcnode-id="1330" instrument_node="">NCSS has posted an explanatory note on it's website about why they have adopted C3:</span></span></div><span data-dcnode-id="1327" instrument_node="">
</span><blockquote data-dcnode-id="1298"><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">​What is C3?</span></strong><br data-dcnode-id="1324"><span data-dcnode-id="1323" instrument_node="">The result of a three year state-led collaborative effort, the College, Career, and Civic Life (C3) Framework for Social Studies State Standards was developed to serve two audiences: for states to upgrade their state social studies standards and for practitioners — local school districts, schools, teachers and curriculum writers — to strengthen their social studies programs. Its objectives are to: a) enhance the rigor of the social studies disciplines; b) build critical thinking, problem solving, and participatory skills to become engaged citizens; and c) align academic programs to the Common Core State Standards for English Language Arts and Literacy in History/Social Studies.&nbsp;In June 2017, a Religious Studies Companion Document was added as a Supplement to the C3 Framework. It is included in the downloadable pdf file of the Framework.</span><br data-dcnode-id="1322"><br data-dcnode-id="1321"><strong data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Why do we need the C3 Framework?</span></strong><br data-dcnode-id="1318"><span data-dcnode-id="1317" instrument_node="">There are a number of motivating factors that inspired this work:</span><br data-dcnode-id="1316"><u data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Marginalization of the Social Studies</span></u><span data-dcnode-id="1313" instrument_node=""> – The loss of instructional time at the elementary level and the narrowing of instruction in response to multiple-choice, high-stakes testing has significantly impacted time, resources, and support for the social studies. The introduction of the Common Core provided an opportunity for social studies educators to re-frame instruction to promote disciplinary literacy in social studies in such a way as to allow social studies to regain a more balanced and elevated role in the K-12 curriculum.</span><br data-dcnode-id="1312"><u data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Motivation of Students</span></u><span data-dcnode-id="1309" instrument_node=""> – Children and adolescents are naturally curious about the complex and multifaceted world they inhabit. But they quickly become disengaged when instruction is limited to reading textbooks to answer end-of-chapter questions and taking multiple-choice tests that may measure content knowledge but do little to measure how knowledge is meaningful and applicable in the real world. The C3 Framework addresses this issue in fundamental ways.</span><br data-dcnode-id="1308"><u data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">The Future of Our Democracy</span></u><span data-dcnode-id="1305" instrument_node=""> – Abundant research bears out the sad reality that fewer and fewer young people, particularly students of color and students in poverty, are receiving a high quality social studies education, despite the central role of social studies in preparing students for the responsibilities of citizenship. Active and responsible citizens are able to identify and analyze public problems, deliberate with other people about how to define and address issues, take constructive action together, reflect on their actions, create and sustain groups, and influence institutions both large and small. They vote, serve on juries when called, follow the news and current events, and participate in voluntary groups and efforts. Implementing the C3 Framework to teach students to be able to act in these ways—as citizens—significantly enhances preparation for college and career.</span><br data-dcnode-id="1304"><br data-dcnode-id="1303"><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">​Collaboration is Key</span></strong><br data-dcnode-id="1300"><span data-dcnode-id="1299" instrument_node="">For these reasons and many more, thousands of social studies experts, curriculum specialists, teachers and scholars from across the nation... have been involved in the development of the C3 Framework.</span></blockquote><span data-dcnode-id="1297" instrument_node="">
