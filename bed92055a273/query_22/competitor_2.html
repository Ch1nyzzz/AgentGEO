</span><article class="article" data-dcnode-id="1279"><span data-dcnode-id="5234" instrument_node="">
</span><div class="hlFld-Abstract" data-dcnode-id="5226"><a data-dcnode-id="5233" name="abstract"></a><div class="sectionInfo abstractSectionHeading" data-dcnode-id="5230"><h2 class="sectionHeading" data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">Abstract</span></h2></div><div class="abstractSection abstractInFull" data-dcnode-id="5227"><p data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">Situation awareness (SA) refers to the conscious awareness of the current situation in relation to one’s environment. In nursing, loss or failure to achieve high levels of SA is linked with adverse patient outcomes. The purpose of this integrative review is to examine various instruments and techniques used to measure SA among nurses across academic and clinical settings. Computerized database and ancestry search strategies resulted in 40 empirical research reports. Of the reports included in the review, 24 measured SA among teams that included nurses and 16 measured SA solely in nurses. Methods used to evaluate SA included direct and indirect methods. Direct methods included the Situation Awareness Global Assessment Technique and questionnaires. Indirect methods included observer rating instruments and performance outcome measures. To have a better understanding of how nurses’ make decisions in complex work environments, reliable and valid measures of SA is crucial.</span></p></div></div><div class="abstractKeywords" data-dcnode-id="5206"><div class="hlFld-KeywordText" data-dcnode-id="5207"><b data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">Keywords </span></b><div data-dcnode-id="5208" lang=""><span class="kwd" data-dcnode-id="5220"><a class="attributes" data-dcnode-id="5222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/keyword/Situation%2BAwareness"><span data-dcnode-id="5223" instrument_node="">situation awareness</span></a><span data-dcnode-id="5221" instrument_node="">, </span></span><span class="kwd" data-dcnode-id="5216"><a class="attributes" data-dcnode-id="5218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/keyword/Nontechnical%2BSkills"><span data-dcnode-id="5219" instrument_node="">nontechnical skills</span></a><span data-dcnode-id="5217" instrument_node="">, </span></span><span class="kwd" data-dcnode-id="5212"><a class="attributes" data-dcnode-id="5214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/keyword/Nursing"><span data-dcnode-id="5215" instrument_node="">nursing</span></a><span data-dcnode-id="5213" instrument_node="">, </span></span><span class="kwd" data-dcnode-id="5209"><a class="attributes" data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/keyword/Patient%2BSafety"><span data-dcnode-id="5211" instrument_node="">patient safety</span></a></span></div></div></div><a data-dcnode-id="5205" name="_i18"></a><div class="sectionInfo" data-dcnode-id="5202"><h2 class="sectionHeading" data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">References</span></h2></div><a class="anchor" data-dcnode-id="5201" id="references"></a><table border="0" class="references" data-dcnode-id="2059"><tbody data-dcnode-id="2060"><tr data-dcnode-id="5183" id="bibr1-0193945917697230"><td class="refnumber" data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node=""> </span></td><td data-dcnode-id="5184" valign="top"><span data-dcnode-id="5198" instrument_node="">
