</span><strong data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">The empirical starting point for anyone who wants to
understand political cleavages in the democratic world, based on a
unique dataset covering fifty countries since WWII.</span></strong><span data-dcnode-id="3398" instrument_node=""> Who
votes for whom and why? Why has growing inequality in many parts of
the world not led to renewed class-based conflicts, seeming instead
to have come with the emergence of new divides over identity and
integration? News analysts, scholars, and citizens interested in
exploring those questions inevitably lack relevant data, in
particular the kinds of data that establish historical and
international context. </span><em data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Political Cleavages and Social
Inequalities</span></em><span data-dcnode-id="3395" instrument_node=""> provides the missing empirical background,
collecting and examining a treasure trove of information on the
dynamics of polarization in modern democracies. The chapters draw
on a unique set of surveys conducted between 1948 and 2020 in fifty
countries on five continents, analyzing the links between voters'
political preferences and socioeconomic characteristics, such as
income, education, wealth, occupation, religion, ethnicity, age,
and gender. This analysis sheds new light on how political
movements succeed in coalescing multiple interests and identities
in contemporary democracies. It also helps us understand the
conditions under which conflicts over inequality become politically
salient, as well as the similarities and constraints of voters
supporting ethnonationalist politicians like Narendra Modi, Jair
Bolsonaro, Marine Le Pen, and Donald Trump. Bringing together
cutting-edge data and historical analysis, editors Amory Gethin,
Clara Martínez-Toledano, and Thomas Piketty offer a vital resource
for understanding the voting patterns of the present and the likely
sources of future political conflict.
</span></p></div><span data-dcnode-id="3392" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2824"><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">This volume presents the results of a collective research program on the structure of political cleavages and social inequalities in fifty electoral democracies, located on the five continents, from 1948 to 2020. The purpose of this introduction is to succinctly describe the program’s objectives and methods, as well as to briefly outline the organization of the volume and its different chapters.</span></p><p data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">“Electoral democracies”: this notion must immediately be clarified so as to circumscribe our object of enquiry. None of the countries studied in this book are perfect democracies, far from it, and some of them notably depart from being so,...</span></p></div><span data-dcnode-id="2823" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2723"><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Income and wealth inequalities have increased substantially in many regions of the world since the 1980s. This evolution came after a relatively egalitarian period from 1950 to 1980, accompanied by inclusive growth and the expansion of welfare states. Yet, this reversal has not led to widespread demands for redistribution or the revival of class conflicts. The past decades have seen instead the rise of various forms of identity-based politics, embodied by the Brexit vote and the success of xenophobic parties in Europe, Donald Trump in the United States, Jair Bolsonaro in Brazil, and Narendra Modi in India. What explains this...</span></p></div><span data-dcnode-id="2722" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2620"><p data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">In this research I analyze the changing structure of political cleavages in France, Britain, and the United States. In order to do so, I exploit in a systematic manner the postelectoral surveys that were conducted after nearly every national election in these three countries over the 1948–2020 period. I construct homogenous long-run series on the changing structure of the electorate in these three countries—that is, who votes for which parties or coalitions depending on different dimensions of inequality (income, wealth, education, age, gender, religion, foreign or ethnic origins, and so on).</span></p><p data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">I document a striking long-run evolution. In...</span></p></div><span data-dcnode-id="2619" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2517"><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">This chapter draws on political attitudes surveys to study the changing relationships between party support, electoral cleavages, and socioeconomic inequality in Germany. The development of political cleavages in Germany is a particularly interesting case. On the one hand, the political system shows a high degree of stability and is strongly shaped by the interplay of two parties that have led all federal governments since 1949. On the other hand, the relation between left (social democratic and affiliated) voting and socioeconomic characteristics has changed by leaps and bounds, largely driven by the inception and establishment of new parties since 1980.</span></p><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Our...</span></p></div><span data-dcnode-id="2516" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2414"><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">This chapter studies the changing relationship between party support and electoral socioeconomic cleavages in Northern Europe. How have political cleavages developed in some of the world’s oldest and most egalitarian democracies? Have Nordic countries transitioned toward a multi-elite party system, like most Western democracies? How have deeply rooted, long-lasting nationalistic ideas changed the party system over the course of the century? We answer these questions using postelectoral surveys conducted in Norway, Denmark, Sweden, Finland, and Iceland from the mid-twentieth century until the present.</span></p><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">The Nordic countries have been described as having unusually stable and well-functioning multi-party systems.¹ The five countries...</span></p></div><span data-dcnode-id="2413" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2212"><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">This chapter studies the changing relationship between party choice and socioeconomic conflicts in Italy, Spain, Portugal, and Ireland over the last decades. The focus on these four countries is particularly useful to understand the sources of political change in advanced democracies, as they all share a common history of late industrialization and were deeply hit by the 2008 global recession. The postcrisis austerity policies imposed by international organizations gave the impression that national elections had no room to change domestic policy and led to the emergence of challenger parties, which have profoundly transformed their party systems. Despite these similarities, socioeconomic...</span></p></div><span data-dcnode-id="2211" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1721"><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">This chapter studies the evolution of the structure of political cleavages in Japan from 1953 to 2017. Party identifications in Japan are partly the legacy of its unique democratic transition, which took place under US occupation from 1945 to 1951. This transition, by imposing the renunciation of military buildup and the establishment of US military bases throughout the archipelago, gave to foreign policy and the question of remilitarization an exceptional importance.</span></p><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">The party system that emerged in the 1950s, with conservative parties opposing socialists and communists, therefore differed significantly from the class-based party systems visible during the same period in...</span></p></div><span data-dcnode-id="1720" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1431"><p data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">How have political cleavages developed over the course of redemocratization in Brazil, one of the world’s largest and most unequal countries? This is what we analyze in this chapter. The legacies of economic, educational, racial, and geographic inequalities in Brazil have left fertile ground for political polarization along social dimensions. Since the end of the military dictatorship in 1985 and the dawn of the New Republic in 1988, Brazilian party politics has been defined by the electoral strategies of the hegemonic party on the left, the Workers’ Party (Partido dos Trabalhadores, PT). The rise of </span><em data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">petismo</span></em><span data-dcnode-id="1433" instrument_node=""> in Brazil is interesting...</span></p></div><span data-dcnode-id="1430" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1334"><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">This chapter exploits existing electoral surveys to analyze the political representation of social inequalities since the mid-twentieth century in six Latin American countries: Argentina, Chile, Costa Rica, Colombia, Mexico, and Peru. With the end of Spanish rule, nearly all Latin American countries were divided by the same liberal-conservative cleavage.¹ The liberals’ ideological principles were anticlericalism, federalism, and free trade, while conservatives defended the church and favored centralization and protectionism. Despite this common point of departure in the nineteenth century, contemporary Latin American party systems are very diverse and no longer reflect this traditional cleavage.</span></p><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Among the six countries we have...</span></p></div><span data-dcnode-id="1333" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1045"><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">This chapter draws on pre- and postelection surveys to study the long-run evolution of voting patterns in Israel from 1949 to 2019. The heterogenous ethnic, cultural, educational, and religious backgrounds of Israelis created a range of political cleavages that evolved throughout Israel’s history and continue to shape its political climate and its society today. Studying these cleavages, their historical origins, and their evolution through the lens of the socioeconomic context is the goal of this chapter.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Within a broader, international context, studying Israel is motivated specifically by its uniqueness in several key issues, compared to other high-income economies:</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">1. The influence...</span></p></div><span data-dcnode-id="1044" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="855"><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">We would like to conclude this volume by insisting once more on the limitations of our project. We have attempted to develop an analytical framework to study the evolution of the socioeconomic structure of electorates in fifty countries from 1948 to 2020. While multiple lessons have emerged from the different chapters of this volume, it is quite clear that the sources, methods, and capacities brought together remain insufficient to satisfactorily answer the interrogations that have motivated our work. We hope first and foremost that this book will help to inspire further research on these questions among the social sciences research...</span></p></div><span data-dcnode-id="854" instrument_node="">
