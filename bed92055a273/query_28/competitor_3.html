plate"><span data-dcnode-id="1846" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="1839"><a class="external text" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AElectoral_systems%26action%3Dedit"><abbr data-dcnode-id="1841" title="Edit this template"><span data-dcnode-id="1842" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="1832" instrument_node="">
</span><link data-dcnode-id="1831" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1826" role="note"><span data-dcnode-id="1830" instrument_node="">This article is about the physical means of casting ballots. Not to be confused with details of voting theory, for which see </span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_system" title="Electoral system"><span data-dcnode-id="1829" instrument_node="">Electoral system</span></a><span data-dcnode-id="1827" instrument_node="">.</span></div><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1824" instrument_node="">A </span><b data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">voting method</span></b><span data-dcnode-id="1821" instrument_node=""> is the way in which people cast their votes in an </span><a data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election" title="Election"><span data-dcnode-id="1820" instrument_node="">election</span></a><span data-dcnode-id="1818" instrument_node=""> or </span><a data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendum" title="Referendum"><span data-dcnode-id="1817" instrument_node="">referendum</span></a><span data-dcnode-id="1815" instrument_node="">. There are several different methods in use around the world.
</span></p><span data-dcnode-id="1813" instrument_node="">
</span><h2 data-dcnode-id="1803"><span class="mw-headline" data-dcnode-id="1811" id="Voting_methods_in_deliberative_assemblies"><span data-dcnode-id="1812" instrument_node="">Voting methods in deliberative assemblies</span></span><span class="mw-editsection" data-dcnode-id="1804"><span class="mw-editsection-bracket" data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">[</span></span><a data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D13" title="Edit section: Voting methods in deliberative assemblies"><span data-dcnode-id="1808" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1802" instrument_node="">
</span><link data-dcnode-id="1801" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1797" role="note"><span data-dcnode-id="1800" instrument_node="">Main article: </span><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_methods_in_deliberative_assemblies" title="Voting methods in deliberative assemblies"><span data-dcnode-id="1799" instrument_node="">Voting methods in deliberative assemblies</span></a></div><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1783"><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deliberative_assembly" title="Deliberative assembly"><span data-dcnode-id="1795" instrument_node="">Deliberative assemblies</span></a><span data-dcnode-id="1793" instrument_node="">—bodies that use </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_procedure" title="Parliamentary procedure"><span data-dcnode-id="1792" instrument_node="">parliamentary procedure</span></a><span data-dcnode-id="1790" instrument_node=""> to arrive at </span><a class="mw-redirect" data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decision_making" title="Decision making"><span data-dcnode-id="1789" instrument_node="">decisions</span></a><span data-dcnode-id="1787" instrument_node="">—use several methods of voting on </span><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motion_%28parliamentary_procedure%29" title="Motion (parliamentary procedure)"><span data-dcnode-id="1786" instrument_node="">motions</span></a><span data-dcnode-id="1784" instrument_node=""> (formal proposal by a member or members of a deliberative assembly that the assembly takes certain action). The regular methods of voting in such bodies are a voice vote, a rising vote, and a show of hands. Additional forms of voting include a recorded vote and balloting. The assembly could decide on the voting method by adopting a motion on it. Different legislatures may have their voting methods.
</span></p><span data-dcnode-id="1782" instrument_node="">
</span><h2 data-dcnode-id="1772"><span class="mw-headline" data-dcnode-id="1780" id="Voting_methods"><span data-dcnode-id="1781" instrument_node="">Voting methods</span></span><span class="mw-editsection" data-dcnode-id="1773"><span class="mw-editsection-bracket" data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">[</span></span><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D14" title="Edit section: Voting methods"><span data-dcnode-id="1777" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1771" instrument_node="">
</span><link data-dcnode-id="1770" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1765" role="note"><span data-dcnode-id="1769" instrument_node="">"Voting method" redirects here. Not to be confused with </span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_system" title="Electoral system"><span data-dcnode-id="1768" instrument_node="">Electoral system</span></a><span data-dcnode-id="1766" instrument_node="">.</span></div><span data-dcnode-id="1764" instrument_node="">
</span><h3 data-dcnode-id="1754"><span class="mw-headline" data-dcnode-id="1762" id="Paper-based_methods"><span data-dcnode-id="1763" instrument_node="">Paper-based methods</span></span><span class="mw-editsection" data-dcnode-id="1755"><span class="mw-editsection-bracket" data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">[</span></span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D15" title="Edit section: Paper-based methods"><span data-dcnode-id="1759" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1753" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1741"><div class="thumbinner" data-dcnode-id="1742" style="width:222px;"><a class="image" data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYoung_woman%2527s_first_vote._Cooktown%2C_Australia.jpg"><img alt="" class="thumbimage" data-dcnode-id="1752" data-file-height="765" data-file-width="392" decoding="async" height="429" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Young_woman%2527s_first_vote._Cooktown%252C_Australia.jpg/220px-Young_woman%2527s_first_vote._Cooktown%252C_Australia.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Young_woman%27s_first_vote._Cooktown%2C_Australia.jpg/330px-Young_woman%27s_first_vote._Cooktown%2C_Australia.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/5/53/Young_woman%27s_first_vote._Cooktown%2C_Australia.jpg 2x" width="220"></a><span data-dcnode-id="1750" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1743"><div class="magnify" data-dcnode-id="1748"><a class="internal" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYoung_woman%2527s_first_vote._Cooktown%2C_Australia.jpg" title="Enlarge"></a></div><span data-dcnode-id="1747" instrument_node="">Young woman's first vote. </span><a class="mw-redirect" data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cooktown%2C_Australia" title="Cooktown, Australia"><span data-dcnode-id="1746" instrument_node="">Cooktown, Australia</span></a><span data-dcnode-id="1744" instrument_node="">.</span></div></div></div><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1739" instrument_node="">The most common voting method uses paper </span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot" title="Ballot"><span data-dcnode-id="1738" instrument_node="">ballots</span></a><span data-dcnode-id="1736" instrument_node=""> on which voters mark their preferences. This may involve marking their support for a candidate or party listed on the ballot, or a </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Write-in_candidate" title="Write-in candidate"><span data-dcnode-id="1735" instrument_node="">write-in</span></a><span data-dcnode-id="1733" instrument_node="">, where they write out the name of their preferred candidate if it is not listed.
</span></p><span data-dcnode-id="1731" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1722"><div class="thumbinner" data-dcnode-id="1723" style="width:152px;"><a class="image" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKalpi_israel_18.JPG"><img alt="" class="thumbimage" data-dcnode-id="1730" data-file-height="2048" data-file-width="1536" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Kalpi_israel_18.JPG/150px-Kalpi_israel_18.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Kalpi_israel_18.JPG/225px-Kalpi_israel_18.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Kalpi_israel_18.JPG/300px-Kalpi_israel_18.JPG 2x" width="150"></a><span data-dcnode-id="1728" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1724"><div class="magnify" data-dcnode-id="1726"><a class="internal" data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKalpi_israel_18.JPG" title="Enlarge"></a></div><span data-dcnode-id="1725" instrument_node="">Ballot letters in Israel</span></div></div></div><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1720" instrument_node="">An alternative paper-based system known as </span><a class="mw-redirect" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot_letters" title="Ballot letters"><span data-dcnode-id="1719" instrument_node="">ballot letters</span></a><span data-dcnode-id="1717" instrument_node=""> is used in </span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="1716" instrument_node="">Israel</span></a><span data-dcnode-id="1714" instrument_node="">, where polling booths contain a tray with ballots for each party contesting the elections; the ballots are marked with the letter(s) assigned to that party. Voters are given an envelope into which they put the ballot of the party they wish to vote for, before placing the envelope in the </span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot_box" title="Ballot box"><span data-dcnode-id="1713" instrument_node="">ballot box</span></a><span data-dcnode-id="1711" instrument_node="">. The same system is also implemented in </span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="1710" instrument_node="">Latvia</span></a><span data-dcnode-id="1708" instrument_node="">.
</span></p><span data-dcnode-id="1706" instrument_node="">
</span><h3 data-dcnode-id="1696"><span class="mw-headline" data-dcnode-id="1704" id="Machine_voting"><span data-dcnode-id="1705" instrument_node="">Machine voting</span></span><span class="mw-editsection" data-dcnode-id="1697"><span class="mw-editsection-bracket" data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">[</span></span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D16" title="Edit section: Machine voting"><span data-dcnode-id="1701" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1695" instrument_node="">
</span><link data-dcnode-id="1694" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1687" role="note"><span data-dcnode-id="1693" instrument_node="">Main articles: </span><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_machine" title="Voting machine"><span data-dcnode-id="1692" instrument_node="">Voting machine</span></a><span data-dcnode-id="1690" instrument_node=""> and </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting" title="Electronic voting"><span data-dcnode-id="1689" instrument_node="">Electronic voting</span></a></div><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1685" instrument_node="">Machine voting uses </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_machine" title="Voting machine"><span data-dcnode-id="1684" instrument_node="">voting machines</span></a><span data-dcnode-id="1682" instrument_node="">, which may be manual (e.g. </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_machine%23direct-recording_voting_system" title="Voting machine"><span data-dcnode-id="1681" instrument_node="">lever machines</span></a><span data-dcnode-id="1679" instrument_node="">) or </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting" title="Electronic voting"><span data-dcnode-id="1678" instrument_node="">electronic</span></a><span data-dcnode-id="1676" instrument_node="">.</span><sup class="reference" data-dcnode-id="1673" id="cite_ref-17"><a data-dcnode-id="1674" href="#cite_note-17"><span data-dcnode-id="1675" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1672" instrument_node="">
</span></p><span data-dcnode-id="1670" instrument_node="">
</span><h3 data-dcnode-id="1660"><span class="mw-headline" data-dcnode-id="1668" id="Online_voting"><span data-dcnode-id="1669" instrument_node="">Online voting</span></span><span class="mw-editsection" data-dcnode-id="1661"><span class="mw-editsection-bracket" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">[</span></span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D17" title="Edit section: Online voting"><span data-dcnode-id="1665" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1658" instrument_node="">In some countries, people are allowed to vote online. Estonia was one of the first countries to use </span><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Estonia" title="Electronic voting in Estonia"><span data-dcnode-id="1657" instrument_node="">online voting</span></a><span data-dcnode-id="1655" instrument_node="">: it was first used in the </span><a class="new" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstonian_municipal_elections%2C_2005%26action%3Dedit%26redlink%3D1" title="Estonian municipal elections, 2005 (page does not exist)"><span data-dcnode-id="1654" instrument_node="">2005 local elections</span></a><span data-dcnode-id="1652" instrument_node="">.</span><sup class="reference" data-dcnode-id="1649" id="cite_ref-18"><a data-dcnode-id="1650" href="#cite_note-18"><span data-dcnode-id="1651" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1648" instrument_node="">
</span></p><span data-dcnode-id="1646" instrument_node="">
</span><h3 data-dcnode-id="1636"><span class="mw-headline" data-dcnode-id="1644" id="Postal_voting"><span data-dcnode-id="1645" instrument_node="">Postal voting</span></span><span class="mw-editsection" data-dcnode-id="1637"><span class="mw-editsection-bracket" data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">[</span></span><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D18" title="Edit section: Postal voting"><span data-dcnode-id="1641" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node="">Many countries allow </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postal_voting" title="Postal voting"><span data-dcnode-id="1633" instrument_node="">postal voting</span></a><span data-dcnode-id="1631" instrument_node="">, where voters are sent a ballot and return it by post.
</span></p><span data-dcnode-id="1629" instrument_node="">
</span><h3 data-dcnode-id="1619"><span class="mw-headline" data-dcnode-id="1627" id="Open_ballot"><span data-dcnode-id="1628" instrument_node="">Open ballot</span></span><span class="mw-editsection" data-dcnode-id="1620"><span class="mw-editsection-bracket" data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">[</span></span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D19" title="Edit section: Open ballot"><span data-dcnode-id="1624" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1617" instrument_node="">In contrast to a </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secret_ballot" title="Secret ballot"><span data-dcnode-id="1616" instrument_node="">secret ballot</span></a><span data-dcnode-id="1614" instrument_node="">, an </span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_ballot_system" title="Open ballot system"><span data-dcnode-id="1613" instrument_node="">open ballot</span></a><span data-dcnode-id="1611" instrument_node=""> takes place in public and is commonly done by a show of hands. An example is the </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landsgemeinde" title="Landsgemeinde"><span data-dcnode-id="1610" instrument_node="">Landsgemeinde</span></a><span data-dcnode-id="1608" instrument_node=""> system in Switzerland, which is still in use in the </span><a class="mw-redirect" data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swiss_canton" title="Swiss canton"><span data-dcnode-id="1607" instrument_node="">cantons</span></a><span data-dcnode-id="1605" instrument_node=""> of </span><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Appenzell_Innerrhoden" title="Appenzell Innerrhoden"><span data-dcnode-id="1604" instrument_node="">Appenzell Innerrhoden</span></a><span data-dcnode-id="1602" instrument_node="">, </span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canton_of_Glarus" title="Canton of Glarus"><span data-dcnode-id="1601" instrument_node="">Glarus</span></a><span data-dcnode-id="1599" instrument_node="">, </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grisons" title="Grisons"><span data-dcnode-id="1598" instrument_node="">Grisons</span></a><span data-dcnode-id="1596" instrument_node="">, and </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canton_of_Schwyz" title="Canton of Schwyz"><span data-dcnode-id="1595" instrument_node="">Schwyz</span></a><span data-dcnode-id="1593" instrument_node="">.
</span></p><span data-dcnode-id="1591" instrument_node="">
</span><h3 data-dcnode-id="1581"><span class="mw-headline" data-dcnode-id="1589" id="Other_methods"><span data-dcnode-id="1590" instrument_node="">Other methods</span></span><span class="mw-editsection" data-dcnode-id="1582"><span class="mw-editsection-bracket" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">[</span></span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D20" title="Edit section: Other methods"><span data-dcnode-id="1586" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1579" instrument_node="">In </span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Gambia" title="The Gambia"><span data-dcnode-id="1578" instrument_node="">The Gambia</span></a><span data-dcnode-id="1576" instrument_node="">, voting is carried out using marbles, a method introduced in 1965 to deal with </span><a class="mw-redirect" data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illiteracy" title="Illiteracy"><span data-dcnode-id="1575" instrument_node="">illiteracy</span></a><span data-dcnode-id="1573" instrument_node="">.</span><sup class="reference" data-dcnode-id="1570" id="cite_ref-BBC_19-0"><a data-dcnode-id="1571" href="#cite_note-BBC-19"><span data-dcnode-id="1572" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1569" instrument_node=""> Polling stations contain metal drums painted in party colours and emblems with candidates' photos attached to them.</span><sup class="reference" data-dcnode-id="1566" id="cite_ref-20"><a data-dcnode-id="1567" href="#cite_note-20"><span data-dcnode-id="1568" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="1563" id="cite_ref-BBC_19-1"><a data-dcnode-id="1564" href="#cite_note-BBC-19"><span data-dcnode-id="1565" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1562" instrument_node=""> Voters are given a marble to place in the drum of their chosen candidate; when dropped into the drum, a bell sounds to register the vote. To avoid confusion, bicycles are banned near polling booths on election day.</span><sup class="reference" data-dcnode-id="1559" id="cite_ref-BBC_19-2"><a data-dcnode-id="1560" href="#cite_note-BBC-19"><span data-dcnode-id="1561" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1558" instrument_node=""> If the marble is left on top of the drum rather than placed in it, the vote is deemed invalid.</span><sup class="reference" data-dcnode-id="1555" id="cite_ref-21"><a data-dcnode-id="1556" href="#cite_note-21"><span data-dcnode-id="1557" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1554" instrument_node="">
</span></p><p data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node="">A similar system used in social clubs sees voters given a white ball to indicate support and a black ball to indicate opposition. This led to the coining of the term </span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blackballing" title="Blackballing"><span data-dcnode-id="1551" instrument_node="">blackballing</span></a><span data-dcnode-id="1549" instrument_node="">.
</span></p><span data-dcnode-id="1547" instrument_node="">

</span><link data-dcnode-id="1535" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1531" role="note"><span data-dcnode-id="1534" instrument_node="">See also: </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_methods_in_deliberative_assemblies" title="Voting methods in deliberative assemblies"><span data-dcnode-id="1533" instrument_node="">Voting methods in deliberative assemblies</span></a></div><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1529" instrument_node="">Some votes are carried in person if all the people eligible to vote are present. This could be by a show of hands or </span><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keypad_polling" title="Keypad polling"><span data-dcnode-id="1528" instrument_node="">keypad polling</span></a><span data-dcnode-id="1526" instrument_node="">.
