-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AVoting%26action%3Dedit"><abbr data-dcnode-id="3501" title="Edit this template"><span data-dcnode-id="3502" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="3492" instrument_node="">
</span><p data-dcnode-id="3473"><b data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">Voting</span></b><span data-dcnode-id="3489" instrument_node=""> is a method for a group, such as a meeting or an </span><a class="mw-redirect" data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constituency" title="Constituency"><span data-dcnode-id="3488" instrument_node="">electorate</span></a><span data-dcnode-id="3486" instrument_node="">, in order to make a collective </span><a class="mw-redirect" data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decision_making" title="Decision making"><span data-dcnode-id="3485" instrument_node="">decision</span></a><span data-dcnode-id="3483" instrument_node=""> or express an opinion usually following discussions, debates or </span><a class="mw-redirect" data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election_campaigns" title="Election campaigns"><span data-dcnode-id="3482" instrument_node="">election campaigns</span></a><span data-dcnode-id="3480" instrument_node="">. </span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3479" instrument_node="">Democracies</span></a><span data-dcnode-id="3477" instrument_node=""> elect holders of high office by voting.  Residents of a place represented by an elected official are called "constituents", and those constituents who cast a </span><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot" title="Ballot"><span data-dcnode-id="3476" instrument_node="">ballot</span></a><span data-dcnode-id="3474" instrument_node=""> for their chosen candidate are called "voters".  There are different systems for collecting votes, but while many of the systems used in decision-making can also be used as electoral systems, any which cater for proportional representation can only be used in elections.
</span></p><p data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">In smaller organizations, voting can occur in different ways. Formally via ballot to elect others for example within a workplace, to elect members of political associations or to choose roles for others. Informally voting could occur as a spoken agreement or as a verbal gesture like a raised hand or electronically.
</span></p><span data-dcnode-id="3470" instrument_node="">

</span><h2 data-dcnode-id="3244"><span class="mw-headline" data-dcnode-id="3252" id="In_politics"><span data-dcnode-id="3253" instrument_node="">In politics</span></span><span class="mw-editsection" data-dcnode-id="3245"><span class="mw-editsection-bracket" data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">[</span></span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D1" title="Edit section: In politics"><span data-dcnode-id="3249" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3222"><span data-dcnode-id="3242" instrument_node="">In a </span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3241" instrument_node="">democracy</span></a><span data-dcnode-id="3239" instrument_node="">, a </span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government" title="Government"><span data-dcnode-id="3238" instrument_node="">government</span></a><span data-dcnode-id="3236" instrument_node=""> is chosen by voting in an </span><a data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election" title="Election"><span data-dcnode-id="3235" instrument_node="">election</span></a><span data-dcnode-id="3233" instrument_node="">: a way for an electorate to elect, i.e., choose, among several candidates for rule.</span><sup class="reference" data-dcnode-id="3230" id="cite_ref-1"><a data-dcnode-id="3231" href="#cite_note-1"><span data-dcnode-id="3232" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3229" instrument_node=""> However, more than likely, elections will be between two opposing parties. These two will be the most established and the most popular. For example, in the US the competition is between the Republicans and the Democrats. In an indirect democracy </span><i data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">voting</span></i><span data-dcnode-id="3226" instrument_node=""> is the method by which the person elected (in charge) represents their policies and party, whilst making decisions, with regards to other authorities. For example, in the UK the prime minister has to make decisions with regards to the House Of Commons and House Of Lords. 
</span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Direct_democracy" title="Direct democracy"><span data-dcnode-id="3225" instrument_node="">Direct democracy</span></a><span data-dcnode-id="3223" instrument_node="">, is the complete opposite, the person elected, has more independent control and does not need to get policies passed throughout the government. 
</span></p><p data-dcnode-id="3214"><span data-dcnode-id="3221" instrument_node="">In retrospect, a majority vote is when the mass of individual's vote for the same person. However, whilst each individuals choice for or against, does count, a lot of countries use geographic measures to decide who wins. For example, in the UK the person with the most constituencies wins, but they may not always have the most individual votes. Other countries who have liberal democracies, may use a </span><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secret_ballot" title="Secret ballot"><span data-dcnode-id="3220" instrument_node="">secret ballot</span></a><span data-dcnode-id="3218" instrument_node="">, hoping to prevent individuals from becoming influenced by other people and to protect their </span><a class="mw-redirect" data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_privacy" title="Political privacy"><span data-dcnode-id="3217" instrument_node="">political privacy</span></a><span data-dcnode-id="3215" instrument_node="">. The objective for secret ballots, is to try and get the most authentic outcome. A reasoning behind why this way of voting may capture a better result, is mainly to do with social influence. People may be obligated to vote for certain parties due to feeling pressured, having a lack of knowledge, or siding with what they think may be the majority, purely to fit in. Therefore, not only will the people feel more protected, they may also be able to vote for who they actually think will be the best representative. 
</span></p><p data-dcnode-id="3206"><span data-dcnode-id="3213" instrument_node="">Voting often takes place at a </span><a class="mw-redirect" data-dcnode-id="3211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polling_station" title="Polling station"><span data-dcnode-id="3212" instrument_node="">polling station</span></a><span data-dcnode-id="3210" instrument_node="">; but can also be done by electronical voting systems, which has been used in India, Brazil and the Philippines. It is voluntary in some countries, like the UK, but it may be  </span><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compulsory_voting" title="Compulsory voting"><span data-dcnode-id="3209" instrument_node="">compulsory</span></a><span data-dcnode-id="3207" instrument_node=""> in others, such as Australia.
</span></p><p data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Due to countries having different rules about whether or not voting is compulsory, statistics showing how voting has changed will differ. 
</span></p><span data-dcnode-id="3203" instrument_node="">
</span><h3 data-dcnode-id="3193"><span class="mw-headline" data-dcnode-id="3201" id="Decision-making_systems"><span data-dcnode-id="3202" instrument_node="">Decision-making systems</span></span><span class="mw-editsection" data-dcnode-id="3194"><span class="mw-editsection-bracket" data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">[</span></span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D2" title="Edit section: Decision-making systems"><span data-dcnode-id="3198" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3187"><span data-dcnode-id="3191" instrument_node="">When making a decision, those concerned seek one outcome: a majority opinion for a single decision or a single prioritisation.  There are several ways in which voters and/or elected representatives may seek to identify that majority opinion. There is the simple, weighted or </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consociationalism" title="Consociationalism"><span data-dcnode-id="3190" instrument_node="">consociational</span></a><span data-dcnode-id="3188" instrument_node=""> majority vote.  There are other multi-option procedures as well; these include two-round voting, the alternative vote AV, (which is also known as instant run-off voting IRV, and the single transferable vote STV), approval voting, a Borda Count BC, the Modified Borda Count MBC, and the Condorcet rule, nearly all of which are also used as electoral systems. They are outlined below.
</span></p><span data-dcnode-id="3186" instrument_node="">
</span><h3 data-dcnode-id="3176"><span class="mw-headline" data-dcnode-id="3184" id="Electoral_systems"><span data-dcnode-id="3185" instrument_node="">Electoral systems</span></span><span class="mw-editsection" data-dcnode-id="3177"><span class="mw-editsection-bracket" data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">[</span></span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D3" title="Edit section: Electoral systems"><span data-dcnode-id="3181" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3175" instrument_node="">
</span><p data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">There are rather more electoral systems, because of proportional representation, PR.  Those concerned might want to select just one person, or maybe a committee, or maybe an entire parliament.  In electing a president, there is usually just one winner, although the original system in the United States also elected the runner-up as a vice-president.  In electing a parliament, either each of many small constituencies can elect a single representative, as in Britain; or each of quite a few multi-member constituencies may elect a few representatives, as in Ireland; or the entire country can be treated as the one constituency, as in The Netherlands.
</span></p><span data-dcnode-id="3172" instrument_node="">
</span><link data-dcnode-id="3171" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3164" role="note"><span data-dcnode-id="3170" instrument_node="">Main articles: </span><a class="mw-redirect" data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_system" title="Voting system"><span data-dcnode-id="3169" instrument_node="">Voting system</span></a><span data-dcnode-id="3167" instrument_node=""> and </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election" title="Election"><span data-dcnode-id="3166" instrument_node="">Election</span></a></div><span data-dcnode-id="3163" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3142"><div class="thumbinner" data-dcnode-id="3143" style="width:222px;"><a class="image" data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASwiss_voting_material.jpg"><img alt="" class="thumbimage" data-dcnode-id="3162" data-file-height="1832" data-file-width="2792" decoding="async" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Swiss_voting_material.jpg/220px-Swiss_voting_material.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Swiss_voting_material.jpg/330px-Swiss_voting_material.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Swiss_voting_material.jpg/440px-Swiss_voting_material.jpg 2x" width="220"></a><span data-dcnode-id="3160" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3144"><div class="magnify" data-dcnode-id="3158"><a class="internal" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASwiss_voting_material.jpg" title="Enlarge"></a></div><span data-dcnode-id="3157" instrument_node="">In </span><a data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_in_Switzerland" title="Voting in Switzerland"><span data-dcnode-id="3156" instrument_node="">Switzerland</span></a><span data-dcnode-id="3154" instrument_node="">, without the need to register, every citizen receives at home the </span><a class="mw-redirect" data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot_papers" title="Ballot papers"><span data-dcnode-id="3153" instrument_node="">ballot papers</span></a><span data-dcnode-id="3151" instrument_node=""> and information brochure for each voting (and can send it by post). Switzerland has a </span><a data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Direct_democracy" title="Direct democracy"><span data-dcnode-id="3150" instrument_node="">direct democracy</span></a><span data-dcnode-id="3148" instrument_node=""> system and votes (and elections) are organized about four times a year; here, to </span><a data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bern%23Politics" title="Bern"><span data-dcnode-id="3147" instrument_node="">Berne</span></a><span data-dcnode-id="3145" instrument_node="">'s citizen in November 2008 about 5 national, 2 cantonal, 4 municipal referendums, and 2 elections (government and parliament of the City of Berne) to take care of at the same time.</span></div></div></div><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3133"><span data-dcnode-id="3140" instrument_node="">Different </span><a class="mw-redirect" data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_system" title="Voting system"><span data-dcnode-id="3139" instrument_node="">voting systems</span></a><span data-dcnode-id="3137" instrument_node=""> use different types of votes. </span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_voting" title="Plurality voting"><span data-dcnode-id="3136" instrument_node="">Plurality voting</span></a><span data-dcnode-id="3134" instrument_node=""> does not require the winner to achieve a voting majority or more than fifty per cent of the total votes cast. In a voting system that uses a single vote per race, when more than two candidates run, the winner may commonly have less than fifty per cent of the vote.
</span></p><p data-dcnode-id="3119"><span data-dcnode-id="3132" instrument_node="">A side effect of a single vote per race is </span><a data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_splitting" title="Vote splitting"><span data-dcnode-id="3131" instrument_node="">vote splitting</span></a><span data-dcnode-id="3129" instrument_node="">, which tends to elect candidates that do not support </span><a data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centrism" title="Centrism"><span data-dcnode-id="3128" instrument_node="">centrism</span></a><span data-dcnode-id="3126" instrument_node="">, and tends to produce a </span><a data-dcnode-id="3124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-party_system" title="Two-party system"><span data-dcnode-id="3125" instrument_node="">two-party system</span></a><span data-dcnode-id="3123" instrument_node="">. One of many other procedures to a single-vote system is </span><a data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Approval_voting" title="Approval voting"><span data-dcnode-id="3122" instrument_node="">approval voting</span></a><span data-dcnode-id="3120" instrument_node="">.
</span></p><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">To understand why a single vote per race tends to favour less centric candidates, consider a simple lab experiment where students in a class vote for their favourite marble. If five marbles are assigned names and are placed "up for election", and if three of them are green, one is red, and one is blue, then a green marble will rarely win the election. The reason is that the three green marbles will split the votes of those who prefer green. In fact, in this analogy, the only way that a green marble is likely to win is if more than sixty per cent of the voters prefer green. If the same percentage of people prefer green as those who prefer red and blue, that is to say, if 33 per cent of the voters prefer green, 33 per cent prefer blue, and 33 per cent prefer red, then each green marble will only get eleven per cent of the vote, while the red and blue marbles will each get 33 per cent, putting the green marbles at a serious disadvantage. If the experiment is repeated with other colours, the colour that is in the majority will still rarely win. In other words, from a purely mathematical perspective, a single-vote system tends to favour a winner that is different from the majority.
</span></p><p data-dcnode-id="3112"><span data-dcnode-id="3116" instrument_node="">With </span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Approval_voting" title="Approval voting"><span data-dcnode-id="3115" instrument_node="">approval voting</span></a><span data-dcnode-id="3113" instrument_node="">, voters are encouraged to vote for as many candidates as they approve of, so the winner is much more likely to be any one of the five marbles because people who prefer green will be able to vote for every one of the green marbles.
</span></p><p data-dcnode-id="3100"><span data-dcnode-id="3111" instrument_node="">A development on the 'single vote' system is to have </span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-round_system" title="Two-round system"><span data-dcnode-id="3110" instrument_node="">two-round</span></a><span data-dcnode-id="3108" instrument_node=""> elections, or repeat </span><a data-dcnode-id="3106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post_voting" title="First-past-the-post voting"><span data-dcnode-id="3107" instrument_node="">first-past-the-post</span></a><span data-dcnode-id="3105" instrument_node="">. This system is most common around the world. In most cases, the winner must receive a majority, which is more than half.</span><sup class="reference" data-dcnode-id="3102" id="cite_ref-2"><a data-dcnode-id="3103" href="#cite_note-2"><span data-dcnode-id="3104" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3101" instrument_node=""> and if no candidate obtains a majority at the first round, then the two candidates with the largest plurality are selected for the second round. Variants exist on these two points: the requirement for being elected at the first round is sometimes less than 50%, and the rules for participation in the runoff may vary.
</span></p><p data-dcnode-id="3082"><span data-dcnode-id="3099" instrument_node="">A third procedure is a single round </span><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Instant-runoff_voting" title="Instant-runoff voting"><span data-dcnode-id="3098" instrument_node="">instant-runoff voting</span></a><span data-dcnode-id="3096" instrument_node=""> system (Also referred to as </span><i data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Alternative vote</span></i><span data-dcnode-id="3093" instrument_node=""> or </span><i data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Single Transferable Vote</span></i><span data-dcnode-id="3090" instrument_node=""> or </span><i data-dcnode-id="3087"><a class="mw-redirect" data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ranked_voting_systems" title="Ranked voting systems"><span data-dcnode-id="3089" instrument_node="">Preferential voting</span></a></i><span data-dcnode-id="3086" instrument_node="">) as used in some elections in Australia, the United States and, in its PR format, in Ireland. Voters rank each candidate in order of preference (1,2,3,4 etc.). Votes are distributed to each candidate according to the preferences allocated. If no single candidate has 50% of the vote, then the candidate with the fewest votes is excluded and their votes redistributed according to the voter's nominated order of preference. The process repeating itself until a candidate has 50% or more votes. The system is designed to produce the same result as an </span><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exhaustive_ballot" title="Exhaustive ballot"><span data-dcnode-id="3085" instrument_node="">exhaustive ballot</span></a><span data-dcnode-id="3083" instrument_node=""> but using only a single round of voting.
</span></p><p data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">In its PR format, PR-STV, in say a four-seater constituency, every candidate with a quota of 1st preferences will be elected. A quota in this instance is 20% + 1 of the valid vote. If a candidate has more than a quota, his/her surplus will be distributed to the other candidates, in proportion to all of that candidate's 2nd preferences. If there are still candidates to be elected, the least popular is eliminated, as above in AV or IRV, and the process continues until four candidates have reached a quota.
</span></p><p data-dcnode-id="3074"><span data-dcnode-id="3079" instrument_node="">In the Quota Borda System, QBS, Emerson P (2012)</span><sup class="reference" data-dcnode-id="3076" id="cite_ref-3"><a data-dcnode-id="3077" href="#cite_note-3"><span data-dcnode-id="3078" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3075" instrument_node=""> the voters also cast their preferences, 1,2,3,4... as they wish. In the analysis, all 1st preferences are counted; all 2nd preferences are counted; and after these preferences have been translated into points as per the rules of an MBC, the candidates' points are also counted. Seats are awarded to any candidates with a quota of 1st preferences; to any pair of candidates with two quotas of 1st/2nd preferences; and if seats are still to be filled, to those candidates with the highest MBC scores.
</span></p><p data-dcnode-id="3066"><span data-dcnode-id="3073" instrument_node="">In a voting system that uses </span><i data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">multiple votes</span></i><span data-dcnode-id="3070" instrument_node="">, the voter can vote for any subset of the alternatives. So, a voter might vote for Alice, Bob, and Charlie, rejecting Daniel and Emily. </span><a data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Approval_voting" title="Approval voting"><span data-dcnode-id="3069" instrument_node="">Approval voting</span></a><span data-dcnode-id="3067" instrument_node=""> uses such multiple votes.
</span></p><p data-dcnode-id="3058"><span data-dcnode-id="3065" instrument_node="">In a voting system that uses a </span><i data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">ranked vote</span></i><span data-dcnode-id="3062" instrument_node="">, the voter has to rank the alternatives in order of preference. For example, they might vote for Bob in the first place, then Emily, then Alice, then Daniel, and finally Charlie. </span><a class="mw-redirect" data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ranked_voting_systems" title="Ranked voting systems"><span data-dcnode-id="3061" instrument_node="">Ranked voting systems</span></a><span data-dcnode-id="3059" instrument_node="">, such as those used in Australia and Ireland, use a ranked vote.
</span></p><p data-dcnode-id="3047"><span data-dcnode-id="3057" instrument_node="">In a voting system that uses a </span><i data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">scored vote</span></i><span data-dcnode-id="3054" instrument_node=""> (or </span><i data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">range vote</span></i><span data-dcnode-id="3051" instrument_node="">), the voter gives each alternative a number between one and ten (the upper and lower bounds may vary). See </span><a class="mw-redirect" data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cardinal_voting_systems" title="Cardinal voting systems"><span data-dcnode-id="3050" instrument_node="">cardinal voting systems</span></a><span data-dcnode-id="3048" instrument_node="">.
</span></p><p data-dcnode-id="3039"><span data-dcnode-id="3046" instrument_node="">Some "multiple-winner" systems such as the Single Non-Transferable Vote, SNTV, used in Afghanistan may have a single vote or one vote per elector per available position. In such a case the elector could vote for Bob and Charlie on a ballot with two votes. These types of systems can use ranked or </span><a class="mw-redirect" data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality-at-large_voting" title="Plurality-at-large voting"><span data-dcnode-id="3045" instrument_node="">unranked</span></a><span data-dcnode-id="3043" instrument_node=""> voting and are often used for </span><a data-dcnode-id="3041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/At-large" title="At-large"><span data-dcnode-id="3042" instrument_node="">at-large</span></a><span data-dcnode-id="3040" instrument_node=""> positions such as on some city councils.
</span></p><p data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">Finally, the Condorcet rule, used (if at all) in decision-making. The voters or elected representatives cast their preferences on one, some or all options, 1,2,3,4... as in PR-STV or QBS. In the analysis, option A is compared to option B, and if A is more popular than B, then A wins this pairing. Next, A is compared with option C, then D, and so on. Likewise, B is compared with C, with D etc. The option which wins the most pairings, (if there is one), is the Condorcet winner.
</span></p><span data-dcnode-id="3036" instrument_node="">
</span><h3 data-dcnode-id="3026"><span class="mw-headline" data-dcnode-id="3034" id="Referendums"><span data-dcnode-id="3035" instrument_node="">Referendums</span></span><span class="mw-editsection" data-dcnode-id="3027"><span class="mw-editsection-bracket" data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">[</span></span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D4" title="Edit section: Referendums"><span data-dcnode-id="3031" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3004"><span data-dcnode-id="3024" instrument_node="">When the citizens of a country are invited to vote, it is for an </span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election" title="Election"><span data-dcnode-id="3023" instrument_node="">election</span></a><span data-dcnode-id="3021" instrument_node="">. However, people can also vote in </span><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendum" title="Referendum"><span data-dcnode-id="3020" instrument_node="">referendums</span></a><span data-dcnode-id="3018" instrument_node=""> and </span><a data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Initiative" title="Initiative"><span data-dcnode-id="3017" instrument_node="">initiatives</span></a><span data-dcnode-id="3015" instrument_node="">. Since the end of the eighteenth century, more than five hundred national referendums (including initiatives) were organized in the world; among them, more than three hundred were held in </span><a data-dcnode-id="3013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_in_Switzerland" title="Voting in Switzerland"><span data-dcnode-id="3014" instrument_node="">Switzerland</span></a><span data-dcnode-id="3012" instrument_node="">.</span><sup class="reference" data-dcnode-id="3009" id="cite_ref-4"><a data-dcnode-id="3010" href="#cite_note-4"><span data-dcnode-id="3011" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3008" instrument_node=""> </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australia" title="Australia"><span data-dcnode-id="3007" instrument_node="">Australia</span></a><span data-dcnode-id="3005" instrument_node=""> ranked second with dozens of referendums.
</span></p><p data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Most referendums are binary.  The first multi-option referendum was held in New Zealand in 1894, and most of them are conducted under a two-round system.  New Zealand had a five-option referendum in 1992, while Guam had a six-option plebiscite in 1982, which also offered a blank option, in case some voters wanted to (campaign and) vote for a seventh option.
</span></p><span data-dcnode-id="3001" instrument_node="">
</span><h3 data-dcnode-id="2991"><span class="mw-headline" data-dcnode-id="2999" id="Fair_voting"><span data-dcnode-id="3000" instrument_node="">Fair voting</span></span><span class="mw-editsection" data-dcnode-id="2992"><span class="mw-editsection-bracket" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">[</span></span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D5" title="Edit section: Fair voting"><span data-dcnode-id="2996" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2990" instrument_node="">
</span><table class="box-Confusing plainlinks metadata ambox ambox-style ambox-confusing" data-dcnode-id="2953" role="presentation"><tbody data-dcnode-id="2954"><tr data-dcnode-id="2955"><td class="mbox-image" data-dcnode-id="2987"><div data-dcnode-id="2988" style="width:52px"><img alt="" data-dcnode-id="2989" data-file-height="48" data-file-width="48" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/40px-Edit-clear.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/60px-Edit-clear.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/80px-Edit-clear.svg.png 2x" width="40"></div></td><td class="mbox-text" data-dcnode-id="2956"><div class="mbox-text-span" data-dcnode-id="2957"><span data-dcnode-id="2986" instrument_node="">This article </span><b data-dcnode-id="2981"><span data-dcnode-id="2985" instrument_node="">may be </span><a data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVagueness" title="Wikipedia:Vagueness"><span data-dcnode-id="2984" instrument_node="">confusing or unclear</span></a><span data-dcnode-id="2982" instrument_node=""> to readers</span></b><span data-dcnode-id="2980" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="2972"><span data-dcnode-id="2979" instrument_node=""> Please help </span><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="2978" instrument_node="">clarify the article</span></a><span data-dcnode-id="2976" instrument_node="">. There might be a discussion about this on </span><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AVoting" title="Talk:Voting"><span data-dcnode-id="2975" instrument_node="">the talk page</span></a><span data-dcnode-id="2973" instrument_node="">.</span></span><span data-dcnode-id="2971" instrument_node=""> </span><span class="date-container" data-dcnode-id="2965"><i data-dcnode-id="2966"><span data-dcnode-id="2970" instrument_node="">(</span><span class="date" data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">July 2011</span></span><span data-dcnode-id="2967" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="2958"><i data-dcnode-id="2959"><span data-dcnode-id="2964" instrument_node=""> (</span><small data-dcnode-id="2961"><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="2963" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="2960" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2951" instrument_node="">Results may lead at best to confusion, at worst to violence and even </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_war" title="Civil war"><span data-dcnode-id="2950" instrument_node="">civil war</span></a><span data-dcnode-id="2948" instrument_node="">, in the case of political rivals. Many alternatives may fall in the latitude of indifference—they are neither accepted nor rejected. Avoiding the choice that most people strongly reject may sometimes be as important as choosing the one they most favour.
</span></p><p data-dcnode-id="2927"><span data-dcnode-id="2946" instrument_node="">There are </span><a data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_choice_theory" title="Social choice theory"><span data-dcnode-id="2945" instrument_node="">social choice theory</span></a><span data-dcnode-id="2943" instrument_node=""> definitions of seemingly reasonable criteria that are a measure of the fairness of certain aspects of voting, including </span><a class="mw-redirect" data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-dictatorship" title="Non-dictatorship"><span data-dcnode-id="2942" instrument_node="">non-dictatorship</span></a><span data-dcnode-id="2940" instrument_node="">, </span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unrestricted_domain" title="Unrestricted domain"><span data-dcnode-id="2939" instrument_node="">unrestricted domain</span></a><span data-dcnode-id="2937" instrument_node="">, non-imposition, </span><a data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pareto_efficiency" title="Pareto efficiency"><span data-dcnode-id="2936" instrument_node="">Pareto efficiency</span></a><span data-dcnode-id="2934" instrument_node="">, and </span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Independence_of_irrelevant_alternatives" title="Independence of irrelevant alternatives"><span data-dcnode-id="2933" instrument_node="">independence of irrelevant alternatives</span></a><span data-dcnode-id="2931" instrument_node=""> but </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arrow%2527s_impossibility_theorem" title="Arrow's impossibility theorem"><span data-dcnode-id="2930" instrument_node="">Arrow's impossibility theorem</span></a><span data-dcnode-id="2928" instrument_node=""> states that no voting system can meet all these standards.
</span></p><p data-dcnode-id="2918"><span data-dcnode-id="2926" instrument_node="">To ensure fair voting and preventing the misuse of the microblogging platform, </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="2925" instrument_node="">Twitter</span></a><span data-dcnode-id="2923" instrument_node=""> announced adding a feature for users to report content that misleads voters. This announcement came when general elections are going to be held in India and some other countries.</span><sup class="reference" data-dcnode-id="2920" id="cite_ref-5"><a data-dcnode-id="2921" href="#cite_note-5"><span data-dcnode-id="2922" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2919" instrument_node="">
</span></p><span data-dcnode-id="2917" instrument_node="">
</span><h3 data-dcnode-id="2907"><span class="mw-headline" data-dcnode-id="2915" id="Negative_voting"><span data-dcnode-id="2916" instrument_node="">Negative voting</span></span><span class="mw-editsection" data-dcnode-id="2908"><span class="mw-editsection-bracket" data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">[</span></span><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D6" title="Edit section: Negative voting"><span data-dcnode-id="2912" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2906" instrument_node="">
</span><link data-dcnode-id="2905" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2901" role="note"><span data-dcnode-id="2904" instrument_node="">Main article: </span><a data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disapproval_voting" title="Disapproval voting"><span data-dcnode-id="2903" instrument_node="">Disapproval voting</span></a></div><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">Negative voting allows a vote that expresses disapproval of a candidate. For explanatory purposes, consider a hypothetical voting system that uses negative voting.  In this system, one vote is allowed, with the choice of either for a candidate or against a candidate. Each positive vote adds one to a candidate's overall total, while a negative vote subtracts one, arriving at a net favorability. The candidate with the highest net favorability is the winner. Note that not only is a negative total possible, but also, a candidate may even be elected with 0 votes if enough negative votes are cast against their opponents.
</span></p><p data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Under this implementation, negative voting is no different from a positive voting system, when only two candidates are on the ballot. However, in the case of three or more candidates, each negative vote for a candidate counts positively towards all of the other candidates.
</span></p><p data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Consider the following example:

</span></th><th data-dcnode-id="2725" scope="col"><span data-dcnode-id="2726" instrument_node="">Net total

</span><div data-dcnode-id="2667" style="clear:both;"></div><span data-dcnode-id="2666" instrument_node="">
</span><p data-dcnode-id="2662"><b data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Election results with positive voting:</span></b><span data-dcnode-id="2663" instrument_node="">
</span></p><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">A-voters, with the clear advantage of 40%, logically vote for Candidate A.  B-voters, unconfident of their candidate's chances, split their votes exactly in half, giving both Candidates A and C 15% each.  C-voters, also logically vote for their candidate.  A is the winner with 55%, C at 45%, and B 0%.
</span></p><p data-dcnode-id="2656"><b data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Election results with negative voting:</span></b><span data-dcnode-id="2657" instrument_node="">
</span></p><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">A-voters again, with the clear advantage of 40%, logically vote for Candidate A. B-voters, split exactly in half. Each B-voter decides to vote negatively against their least favourite candidate, with the reasoning that this negative vote allows them to express approval for the two other candidates.  C-voters also decide to vote negatively against Candidate A, reasoning along similar lines.  Candidate B is the winner with 0 votes.  Enough negative votes were cast against Candidate B's opponents, resulting in negative totals.  Candidate A, despite having polled at 40%, winds up with -5%, offset due to the aggregate 45% of negative votes cast by B and C voters. Candidate C ends up with -15%.
</span></p><span data-dcnode-id="2653" instrument_node="">
</span><h3 data-dcnode-id="2643"><span class="mw-headline" data-dcnode-id="2651" id="Proxy_voting"><span data-dcnode-id="2652" instrument_node="">Proxy voting</span></span><span class="mw-editsection" data-dcnode-id="2644"><span class="mw-editsection-bracket" data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">[</span></span><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D7" title="Edit section: Proxy voting"><span data-dcnode-id="2648" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2642" instrument_node="">
</span><link data-dcnode-id="2641" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2637" role="note"><span data-dcnode-id="2640" instrument_node="">Main article: </span><a data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proxy_voting" title="Proxy voting"><span data-dcnode-id="2639" instrument_node="">Proxy voting</span></a></div><span data-dcnode-id="2636" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Proxy voting is the type of voting where a registered citizen who can vote passes on his or her vote to a different voter or electorate legitimately.
</span></p><span data-dcnode-id="2633" instrument_node="">
</span><h3 data-dcnode-id="2623"><span class="mw-headline" data-dcnode-id="2631" id="Anti-voting"><span data-dcnode-id="2632" instrument_node="">Anti-voting</span></span><span class="mw-editsection" data-dcnode-id="2624"><span class="mw-editsection-bracket" data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">[</span></span><a data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D8" title="Edit section: Anti-voting"><span data-dcnode-id="2628" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2622" instrument_node="">
</span><link data-dcnode-id="2621" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2617" role="note"><span data-dcnode-id="2620" instrument_node="">Main article: </span><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstention" title="Abstention"><span data-dcnode-id="2619" instrument_node="">Abstention</span></a></div><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2615" instrument_node="">In </span><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Africa" title="South Africa"><span data-dcnode-id="2614" instrument_node="">South Africa</span></a><span data-dcnode-id="2612" instrument_node="">, there is a strong presence of anti-voting campaigns by poor citizens. They make the structural argument that no political party truly represents them. For instance, this resulted in the "</span><a data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/No_Land%21_No_House%21_No_Vote%21" title="No Land! No House! No Vote!"><span data-dcnode-id="2611" instrument_node="">No Land! No House! No Vote!</span></a><span data-dcnode-id="2609" instrument_node="">" A campaign that becomes very prominent each time the country holds elections.</span><sup class="reference" data-dcnode-id="2606" id="cite_ref-6"><a data-dcnode-id="2607" href="#cite_note-6"><span data-dcnode-id="2608" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="2603" id="cite_ref-7"><a data-dcnode-id="2604" href="#cite_note-7"><span data-dcnode-id="2605" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2602" instrument_node=""> The campaign is prominent among three of South Africa's largest social movements: the </span><a data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Cape_Anti-Eviction_Campaign" title="Western Cape Anti-Eviction Campaign"><span data-dcnode-id="2601" instrument_node="">Western Cape Anti-Eviction Campaign</span></a><span data-dcnode-id="2599" instrument_node="">, Abahlali baseMjondolo, and the </span><a class="mw-redirect" data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landless_Peoples_Movement" title="Landless Peoples Movement"><span data-dcnode-id="2598" instrument_node="">Landless Peoples Movement</span></a><span data-dcnode-id="2596" instrument_node="">.
</span></p><p data-dcnode-id="2587"><span data-dcnode-id="2594" instrument_node="">Other social movements in other parts of the world also have similar campaigns or non-voting preferences. These include the </span><a data-dcnode-id="2592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zapatista_Army_of_National_Liberation" title="Zapatista Army of National Liberation"><span data-dcnode-id="2593" instrument_node="">Zapatista Army of National Liberation</span></a><span data-dcnode-id="2591" instrument_node=""> and various </span><a class="mw-redirect" data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarchist" title="Anarchist"><span data-dcnode-id="2590" instrument_node="">anarchist</span></a><span data-dcnode-id="2588" instrument_node="">-oriented movements.
</span></p><p data-dcnode-id="2579"><span data-dcnode-id="2586" instrument_node="">It is possible to make a </span><a class="mw-redirect" data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blank_vote" title="Blank vote"><span data-dcnode-id="2585" instrument_node="">blank vote</span></a><span data-dcnode-id="2583" instrument_node="">, carrying out the act of voting, which may be compulsory, without selecting any candidate or option, often as an act of protest. In some jurisdictions, there is an official </span><a data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/None_of_the_above" title="None of the above"><span data-dcnode-id="2582" instrument_node="">none of the above</span></a><span data-dcnode-id="2580" instrument_node=""> option and it is counted as a valid vote. Usually, blank and null votes are counted (together or separately) but are not considered valid.
</span></p><span data-dcnode-id="2578" instrument_node="">
</span><h3 data-dcnode-id="2568"><span class="mw-headline" data-dcnode-id="2576" id="Voting_and_information"><span data-dcnode-id="2577" instrument_node="">Voting and information</span></span><span class="mw-editsection" data-dcnode-id="2569"><span class="mw-editsection-bracket" data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">[</span></span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D9" title="Edit section: Voting and information"><span data-dcnode-id="2573" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2566" instrument_node="">Modern political science has questioned whether </span><a data-dcnode-id="2564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Average" title="Average"><span data-dcnode-id="2565" instrument_node="">average</span></a><span data-dcnode-id="2563" instrument_node=""> citizens have sufficient political information to cast meaningful votes. A series of studies coming out of the </span><a data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Michigan" title="University of Michigan"><span data-dcnode-id="2562" instrument_node="">University of Michigan</span></a><span data-dcnode-id="2560" instrument_node=""> in the 1950s and 1960s argued that voters lack a basic understanding of current issues, the </span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberalism" title="Liberalism"><span data-dcnode-id="2559" instrument_node="">liberal</span></a><span data-dcnode-id="2557" instrument_node="">–</span><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservatism" title="Conservatism"><span data-dcnode-id="2556" instrument_node="">conservative</span></a><span data-dcnode-id="2554" instrument_node=""> </span><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ideology" title="Ideology"><span data-dcnode-id="2553" instrument_node="">ideological</span></a><span data-dcnode-id="2551" instrument_node=""> dimension, and the relative ideological dilemma.</span><sup class="reference" data-dcnode-id="2548" id="cite_ref-8"><a data-dcnode-id="2549" href="#cite_note-8"><span data-dcnode-id="2550" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2547" instrument_node="">
</span></p><p data-dcnode-id="2537"><span data-dcnode-id="2545" instrument_node="">Studies from other institutions have suggested that the physical appearance of candidates is a criterion upon which voters base their decision.</span><sup class="reference" data-dcnode-id="2542" id="cite_ref-9"><a data-dcnode-id="2543" href="#cite_note-9"><span data-dcnode-id="2544" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="2539" id="cite_ref-10"><a data-dcnode-id="2540" href="#cite_note-10"><span data-dcnode-id="2541" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2538" instrument_node="">
</span></p><span data-dcnode-id="2536" instrument_node="">
</span><h3 data-dcnode-id="2526"><span class="mw-headline" data-dcnode-id="2534" id="Religious_views"><span data-dcnode-id="2535" instrument_node="">Religious views</span></span><span class="mw-editsection" data-dcnode-id="2527"><span class="mw-editsection-bracket" data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">[</span></span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D10" title="Edit section: Religious views"><span data-dcnode-id="2531" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2492"><a data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christadelphians" title="Christadelphians"><span data-dcnode-id="2524" instrument_node="">Christadelphians</span></a><span data-dcnode-id="2522" instrument_node="">, </span><a data-dcnode-id="2520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses" title="Jehovah's Witnesses"><span data-dcnode-id="2521" instrument_node="">Jehovah's Witnesses</span></a><span data-dcnode-id="2519" instrument_node="">, </span><a data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amish" title="Amish"><span data-dcnode-id="2518" instrument_node="">Old Order Amish</span></a><span data-dcnode-id="2516" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rastafarians" title="Rastafarians"><span data-dcnode-id="2515" instrument_node="">Rastafarians</span></a><span data-dcnode-id="2513" instrument_node="">, the </span><a data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assemblies_of_Yahweh" title="Assemblies of Yahweh"><span data-dcnode-id="2512" instrument_node="">Assemblies of Yahweh</span></a><span data-dcnode-id="2510" instrument_node="">, and some other </span><a data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_denomination" title="Religious denomination"><span data-dcnode-id="2509" instrument_node="">religious groups</span></a><span data-dcnode-id="2507" instrument_node="">, have a policy of not participating in politics through voting.</span><sup class="reference" data-dcnode-id="2504" id="cite_ref-11"><a data-dcnode-id="2505" href="#cite_note-11"><span data-dcnode-id="2506" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="2501" id="cite_ref-12"><a data-dcnode-id="2502" href="#cite_note-12"><span data-dcnode-id="2503" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2500" instrument_node=""> Rabbis from all </span><a class="mw-redirect" data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish" title="Jewish"><span data-dcnode-id="2499" instrument_node="">Jewish</span></a><span data-dcnode-id="2497" instrument_node=""> denominations encourage voting; some even consider it a religious obligation.</span><sup class="reference" data-dcnode-id="2494" id="cite_ref-13"><a data-dcnode-id="2495" href="#cite_note-13"><span data-dcnode-id="2496" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2493" instrument_node="">
</span></p><span data-dcnode-id="2491" instrument_node="">
</span><h2 data-dcnode-id="2481"><span class="mw-headline" data-dcnode-id="2489" id="Meetings_and_gatherings"><span data-dcnode-id="2490" instrument_node="">Meetings and gatherings</span></span><span class="mw-editsection" data-dcnode-id="2482"><span class="mw-editsection-bracket" data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">[</span></span><a data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D11" title="Edit section: Meetings and gatherings"><span data-dcnode-id="2486" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2479" instrument_node="">Whenever several people who do not all agree need to make some decision, voting is a very common way of reaching a decision peacefully. The right to vote is usually restricted to certain people. Members of a society or club, or shareholders of a company, but not outsiders, may elect its officers, or adopt or change its rules, in a similar way to the election of people to official positions. A panel of judges, either formal judicial authorities or judges of the competition, may decide by voting. A group of friends or members of a family may decide which film to see by voting. The method of voting can range from formal submission of written votes, through </span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_methods_in_deliberative_assemblies%23Show_of_hands" title="Voting methods in deliberative assemblies"><span data-dcnode-id="2478" instrument_node="">show of hands</span></a><span data-dcnode-id="2476" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voice_voting" title="Voice voting"><span data-dcnode-id="2475" instrument_node="">voice voting</span></a><span data-dcnode-id="2473" instrument_node=""> or </span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Audience_response" title="Audience response"><span data-dcnode-id="2472" instrument_node="">audience response</span></a><span data-dcnode-id="2470" instrument_node=""> systems, to informally noting which outcome seems to be preferred by more people.
</span></p><span data-dcnode-id="2468" instrument_node="">
</span><h3 data-dcnode-id="2458"><span class="mw-headline" data-dcnode-id="2466" id="Voting_basis"><span data-dcnode-id="2467" instrument_node="">Voting basis</span></span><span class="mw-editsection" data-dcnode-id="2459"><span class="mw-editsection-bracket" data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">[</span></span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting%26action%3Dedit%26section%3D12" title="Edit section: Voting basis"><span data-dcnode-id="2463" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2457" instrument_node="">
</span><link data-dcnode-id="2456" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2446" role="note"><span data-dcnode-id="2455" instrument_node="">See also: </span><a data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Majority" title="Majority"><span data-dcnode-id="2454" instrument_node="">Majority</span></a><span data-dcnode-id="2452" instrument_node="">, </span><a data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supermajority" title="Supermajority"><span data-dcnode-id="2451" instrument_node="">Supermajority</span></a><span data-dcnode-id="2449" instrument_node="">, and </span><a data-dcnode-id="2447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unanimity" title="Unanimity"><span data-dcnode-id="2448" instrument_node="">Unanimity</span></a></div><p data-dcnode-id="2434"><span data-dcnode-id="2445" instrument_node="">According to </span><a data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert%2527s_Rules_of_Order" title="Robert's Rules of Order"><span data-dcnode-id="2444" instrument_node="">Robert's Rules of Order</span></a><span data-dcnode-id="2442" instrument_node="">, a widely used guide to </span><a data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_procedure" title="Parliamentary procedure"><span data-dcnode-id="2441" instrument_node="">parliamentary procedure</span></a><span data-dcnode-id="2439" instrument_node="">, the bases for determining the voting result consist of two elements: (1) the percentage of votes that are required for a proposal to be adopted or for a candidate to be elected (e.g. more than half, two-thirds, three-quarters, etc.); and (2) the set of members to which the proportion applies (e.g. the members present and voting, the members present, the entire membership of the organization, the entire electorate, etc.).</span><sup class="reference" data-dcnode-id="2436" id="cite_ref-14"><a data-dcnode-id="2437" href="#cite_note-14"><span data-dcnode-id="2438" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2435" instrument_node=""> An example is a majority vote of the members present and voting.
</span></p><p data-dcnode-id="2425"><span data-dcnode-id="2433" instrument_node="">The voting result could also be determined using a </span><a data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_%28voting%29" title="Plurality (voting)"><span data-dcnode-id="2432" instrument_node="">plurality</span></a><span data-dcnode-id="2430" instrument_node="">, or the most votes among the choices.</span><sup class="reference" data-dcnode-id="2427" id="cite_ref-15"><a data-dcnode-id="2428" href="#cite_note-15"><span data-dcnode-id="2429" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2426" instrument_node="">
</span></p><p data-dcnode-id="2416"><span data-dcnode-id="2424" instrument_node="">In addition, a decision could be made without a formal vote by using </span><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unanimous_consent" title="Unanimous consent"><span data-dcnode-id="2423" instrument_node="">unanimous consent</span></a><span data-dcnode-id="2421" instrument_node="">.</span><sup class="reference" data-dcnode-id="2418" id="cite_ref-16"><a data-dcnode-id="2419" href="#cite_note-16"><span data-dcnode-id="2420" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2417" instrument_node="">
</span></p><span data-dcnode-id="2415" instrument_node="">
