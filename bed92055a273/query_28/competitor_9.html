</span><h3 data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Comparison of JFK &amp; LBJ</span></h3><span data-dcnode-id="769" instrument_node="">
</span><div class="paperstyle" data-dcnode-id="744"><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node=""> Kennedy was far more liberal, and far more adventurous in accepting the presidency, which he won by a very slim whisker in Chicago, November, 1960.</span></p><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node=""> Johnson was the "old pro"- a Southerner, moderate, nearly conservative, who came onto the ticket as an expediency. The two men did not like one another.</span></p><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node=""> Due to the "hero" aspect, following JFK's assassination, Johnson was forced to continue the programs and policies which he endorsed only half-heartedly while JFK was alive.</span></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node=""> JFK's leadership style was that of an energetic young man, and his assistants were all far younger than in any previous administration. It was JFK's youth that brought previously alienated young people back into the voting booth, and stormed the gates to join the Peace Corps</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node=""> Johnson's leadership style was paternal, outwardly, and arm-twisting out of the view of the ordinary American.</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node=""> Both men influenced minorities- the New Frontier melded into the Great Society. Civil Rights Acts were passed.</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node=""> The shadow lingering over both was the Viet Nam conflict. JFK supposedly was trying to get out of Viet Nam, Johnson wanted to win at all costs.</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node=""> JFK will be long remembered and adored, while Johnson will be linked with Viet Nam and his decision not to run again.</span></p><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">      The Greater part of the 1960s was taken up with American Democratic leadership that was truly poles apart. John F. Kennedy, the first Catholic to become president was seen as a left-wing liberal (a somewhat over-generalized view) while his successor, who had the sad task of replacing a fallen "hero" was a far more political and conservative Southern breed, who was literally forced to continue the policies of JFK, even when privately he was truly half-hearted about it.</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">      It was a time where the Office of the President was changing. </span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node=""> In the sixties, the office of the Presidency, which John F. Kennedy held, was above all an intellectual exercisea.It would require greater courage and exertion... </span></p><span data-dcnode-id="745" instrument_node="">
