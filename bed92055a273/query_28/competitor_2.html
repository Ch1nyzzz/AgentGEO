node-id="6332"><a class="external text" data-dcnode-id="6333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AElectoral_systems%26action%3Dedit"><abbr data-dcnode-id="6334" title="Edit this template"><span data-dcnode-id="6335" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="6325" instrument_node="">
</span><p data-dcnode-id="6315"><b data-dcnode-id="6323"><span data-dcnode-id="6324" instrument_node="">Approval voting</span></b><span data-dcnode-id="6322" instrument_node=""> is a single-winner </span><a data-dcnode-id="6320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_system" title="Electoral system"><span data-dcnode-id="6321" instrument_node="">electoral system</span></a><span data-dcnode-id="6319" instrument_node=""> in which each voter may choose ("approve") any number of candidates, and the winner is the candidate approved by the largest number of voters. A ballot on which multiple candidates may be marked is called an </span><a data-dcnode-id="6317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Approval_ballot" title="Approval ballot"><span data-dcnode-id="6318" instrument_node="">approval ballot</span></a><span data-dcnode-id="6316" instrument_node="">. The use of this is what makes it different from other common single-winner systems:
</span></p><span data-dcnode-id="6314" instrument_node="">
</span><ul data-dcnode-id="6299"><li data-dcnode-id="6306"><span data-dcnode-id="6313" instrument_node="">In single-winner </span><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_voting" title="Plurality voting"><span data-dcnode-id="6312" instrument_node="">plurality voting</span></a><span data-dcnode-id="6310" instrument_node=""> (</span><a data-dcnode-id="6308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post_voting" title="First-past-the-post voting"><span data-dcnode-id="6309" instrument_node="">first-past-the-post</span></a><span data-dcnode-id="6307" instrument_node="">) the winner is the candidate with the largest number of votes (same as in approval voting), but a voter may choose only one candidate.</span></li><span data-dcnode-id="6305" instrument_node="">
</span><li data-dcnode-id="6300"><span data-dcnode-id="6304" instrument_node="">In </span><a data-dcnode-id="6302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Score_voting" title="Score voting"><span data-dcnode-id="6303" instrument_node="">score voting</span></a><span data-dcnode-id="6301" instrument_node="">, a voter may give each candidate a numeric score, and the winner is the candidate with the highest total score. Approval voting is the special case in which each score must be 0 or 1.</span></li></ul><span data-dcnode-id="6298" instrument_node="">
</span><p data-dcnode-id="6273"><span data-dcnode-id="6297" instrument_node="">Proposals to implement approval voting for municipal elections in the United States were approved in referendums in Fargo, North Dakota, in 2018, and St. Louis, Missouri, in 2020. Fargo used approval voting in June 2020 to elect two at-large seats on its city council,</span><sup class="reference" data-dcnode-id="6294" id="cite_ref-Ballotpedia_Fargo_1-0"><a data-dcnode-id="6295" href="#cite_note-Ballotpedia_Fargo-1"><span data-dcnode-id="6296" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="6291" id="cite_ref-Fargo_approves_2-0"><a data-dcnode-id="6292" href="#cite_note-Fargo_approves-2"><span data-dcnode-id="6293" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6288" id="cite_ref-Fargo_votes_3-0"><a data-dcnode-id="6289" href="#cite_note-Fargo_votes-3"><span data-dcnode-id="6290" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="6285" id="cite_ref-St._Louis_approves_4-0"><a data-dcnode-id="6286" href="#cite_note-St._Louis_approves-4"><span data-dcnode-id="6287" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6284" instrument_node=""> and St. Louis used it to advance two candidates in March 2021 </span><a data-dcnode-id="6282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021_St._Louis_mayoral_election" title="2021 St. Louis mayoral election"><span data-dcnode-id="6283" instrument_node="">nonpartian primaries for</span></a><span data-dcnode-id="6281" instrument_node=""> mayor and aldermen.</span><sup class="reference" data-dcnode-id="6278" id="cite_ref-5"><a data-dcnode-id="6279" href="#cite_note-5"><span data-dcnode-id="6280" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="6275" id="cite_ref-:0_6-0"><a data-dcnode-id="6276" href="#cite_note-:0-6"><span data-dcnode-id="6277" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6274" instrument_node="">
</span></p><p data-dcnode-id="6256"><span data-dcnode-id="6272" instrument_node="">There are several </span><a data-dcnode-id="6270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiwinner_approval_voting" title="Multiwinner approval voting"><span data-dcnode-id="6271" instrument_node="">multi-winner versions</span></a><span data-dcnode-id="6269" instrument_node=""> of approval voting, which can provide different types of representation: </span><a data-dcnode-id="6267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiwinner_approval_voting%23Majoritarian_approval_voting" title="Multiwinner approval voting"><span data-dcnode-id="6268" instrument_node="">block approval voting</span></a><span data-dcnode-id="6266" instrument_node=""> provides </span><a data-dcnode-id="6264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Majoritarian_representation" title="Majoritarian representation"><span data-dcnode-id="6265" instrument_node="">majoritarian representation</span></a><span data-dcnode-id="6263" instrument_node=""> (similarly to single-winner approval voting) and methods such as </span><a data-dcnode-id="6261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_approval_voting" title="Proportional approval voting"><span data-dcnode-id="6262" instrument_node="">proportional approval voting</span></a><span data-dcnode-id="6260" instrument_node=""> provide </span><a data-dcnode-id="6258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="6259" instrument_node="">proportional representation</span></a><span data-dcnode-id="6257" instrument_node="">.

</span><h2 data-dcnode-id="6021"><span class="mw-headline" data-dcnode-id="6029" id="Description"><span data-dcnode-id="6030" instrument_node="">Description</span></span><span class="mw-editsection" data-dcnode-id="6022"><span class="mw-editsection-bracket" data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">[</span></span><a data-dcnode-id="6025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D1" title="Edit section: Description"><span data-dcnode-id="6026" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6020" instrument_node="">
</span><p data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">Approval voting ballots show a list of the candidates running for that seat for each office being contested. Next to each name is a checkbox (or another similar way to mark "Yes" or "No" for that candidate).
</span></p><p data-dcnode-id="6016"><span data-dcnode-id="6017" instrument_node="">Each candidate may be treated as a separate question: "Do you approve of this person for the job?" Approval voting lets each voter indicate support for one, some, or all candidates. All votes count equally, and everyone gets the same number of votes: one vote per candidate, either for or against. Final tallies show how many voters support each candidate, and the winner is the candidate whom the most voters support.
</span></p><p data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">Ballots on which the voter marked every candidate the same (whether yes or no) usually have no effect on the outcome of the election. Each ballot separates candidates into two groups: those supported and those that are not. Each candidate approved is considered preferred to any candidate not approved, while the voter's preferences among approved candidates is unspecified, and likewise, the voter's preferences among unapproved candidates is also unspecified.
</span></p><span data-dcnode-id="6013" instrument_node="">
</span><h2 data-dcnode-id="6003"><span class="mw-headline" data-dcnode-id="6011" id="Usage"><span data-dcnode-id="6012" instrument_node="">Usage</span></span><span class="mw-editsection" data-dcnode-id="6004"><span class="mw-editsection-bracket" data-dcnode-id="6009"><span data-dcnode-id="6010" instrument_node="">[</span></span><a data-dcnode-id="6007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D2" title="Edit section: Usage"><span data-dcnode-id="6008" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6005"><span data-dcnode-id="6006" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6002" instrument_node="">
</span><h3 data-dcnode-id="5992"><span class="mw-headline" data-dcnode-id="6000" id="Current_use"><span data-dcnode-id="6001" instrument_node="">Current use</span></span><span class="mw-editsection" data-dcnode-id="5993"><span class="mw-editsection-bracket" data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">[</span></span><a data-dcnode-id="5996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D3" title="Edit section: Current use"><span data-dcnode-id="5997" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5994"><span data-dcnode-id="5995" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5991" instrument_node="">
</span><p data-dcnode-id="5976"><span data-dcnode-id="5990" instrument_node="">In 2018, </span><a data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fargo%2C_North_Dakota" title="Fargo, North Dakota"><span data-dcnode-id="5989" instrument_node="">Fargo, North Dakota</span></a><span data-dcnode-id="5987" instrument_node="">, passed a local ballot initiative adopting approval voting for the city's local elections, and it was used to elect officials in June 2020, becoming the first United States city and jurisdiction to adopt approval voting.</span><sup class="reference" data-dcnode-id="5984" id="cite_ref-Ballotpedia_Fargo_1-1"><a data-dcnode-id="5985" href="#cite_note-Ballotpedia_Fargo-1"><span data-dcnode-id="5986" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="5981" id="cite_ref-Fargo_approves_2-1"><a data-dcnode-id="5982" href="#cite_note-Fargo_approves-2"><span data-dcnode-id="5983" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="5978" id="cite_ref-Fargo_votes_3-1"><a data-dcnode-id="5979" href="#cite_note-Fargo_votes-3"><span data-dcnode-id="5980" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5977" instrument_node="">
</span></p><p data-dcnode-id="5958"><span data-dcnode-id="5975" instrument_node="">In November 2020, </span><a class="mw-redirect" data-dcnode-id="5973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Louis%2C_Missouri" title="St. Louis, Missouri"><span data-dcnode-id="5974" instrument_node="">St. Louis, Missouri</span></a><span data-dcnode-id="5972" instrument_node=""> passed Proposition D to authorize a variant of approval voting (as </span><a data-dcnode-id="5970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unified_primary" title="Unified primary"><span data-dcnode-id="5971" instrument_node="">unified primary</span></a><span data-dcnode-id="5969" instrument_node="">) for municipal offices.</span><sup class="reference" data-dcnode-id="5966" id="cite_ref-St._Louis_approves_4-1"><a data-dcnode-id="5967" href="#cite_note-St._Louis_approves-4"><span data-dcnode-id="5968" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="5963" id="cite_ref-St._Louis_Approval_1_7-0"><a data-dcnode-id="5964" href="#cite_note-St._Louis_Approval_1-7"><span data-dcnode-id="5965" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="5960" id="cite_ref-St._Louis_Approval_2_8-0"><a data-dcnode-id="5961" href="#cite_note-St._Louis_Approval_2-8"><span data-dcnode-id="5962" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5959" instrument_node="">
</span></p><span data-dcnode-id="5957" instrument_node="">
</span><h3 data-dcnode-id="5947"><span class="mw-headline" data-dcnode-id="5955" id="History"><span data-dcnode-id="5956" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="5948"><span class="mw-editsection-bracket" data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">[</span></span><a data-dcnode-id="5951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D4" title="Edit section: History"><span data-dcnode-id="5952" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5946" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5931"><div class="thumbinner" data-dcnode-id="5932" style="width:302px;"><a class="image" data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_story_of_the_greatest_nations%2C_from_the_dawn_of_history_to_the_twentieth_century_-_a_comprehensive_history%2C_founded_upon_the_leading_authorities%2C_including_a_complete_chronology_of_the_world%2C_and_%2814765071792%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5945" data-file-height="2038" data-file-width="3008" decoding="async" height="203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/The_story_of_the_greatest_nations%252C_from_the_dawn_of_history_to_the_twentieth_century_-_a_comprehensive_history%252C_founded_upon_the_leading_authorities%252C_including_a_complete_chronology_of_the_world%252C_and_%252814765071792%2529.jpg/300px-thumbnail.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/The_story_of_the_greatest_nations%2C_from_the_dawn_of_history_to_the_twentieth_century_-_a_comprehensive_history%2C_founded_upon_the_leading_authorities%2C_including_a_complete_chronology_of_the_world%2C_and_%2814765071792%29.jpg/450px-thumbnail.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8a/The_story_of_the_greatest_nations%2C_from_the_dawn_of_history_to_the_twentieth_century_-_a_comprehensive_history%2C_founded_upon_the_leading_authorities%2C_including_a_complete_chronology_of_the_world%2C_and_%2814765071792%29.jpg/600px-thumbnail.jpg 2x" width="300"></a><span data-dcnode-id="5943" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5933"><div class="magnify" data-dcnode-id="5941"><a class="internal" data-dcnode-id="5942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_story_of_the_greatest_nations%2C_from_the_dawn_of_history_to_the_twentieth_century_-_a_comprehensive_history%2C_founded_upon_the_leading_authorities%2C_including_a_complete_chronology_of_the_world%2C_and_%2814765071792%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="5940" instrument_node="">Rows of </span><a data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secret_ballot" title="Secret ballot"><span data-dcnode-id="5939" instrument_node="">secret</span></a><span data-dcnode-id="5937" instrument_node=""> approval vote boxes from early 1900s </span><a data-dcnode-id="5935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greece" title="Greece"><span data-dcnode-id="5936" instrument_node="">Greece</span></a><span data-dcnode-id="5934" instrument_node="">, where the voter drops a marble to the right or left of the box, through a tube, one for each candidate standing</span></div></div></div><span data-dcnode-id="5930" instrument_node="">
</span><p data-dcnode-id="5912"><a data-dcnode-id="5928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_J._Weber" title="Robert J. Weber"><span data-dcnode-id="5929" instrument_node="">Robert J. Weber</span></a><span data-dcnode-id="5927" instrument_node=""> coined the term "approval voting" in 1971.</span><sup class="reference" data-dcnode-id="5924" id="cite_ref-9"><a data-dcnode-id="5925" href="#cite_note-9"><span data-dcnode-id="5926" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5923" instrument_node=""> It was more fully published in 1978 by political scientist </span><a data-dcnode-id="5921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steven_Brams" title="Steven Brams"><span data-dcnode-id="5922" instrument_node="">Steven Brams</span></a><span data-dcnode-id="5920" instrument_node=""> and mathematician </span><a class="mw-redirect" data-dcnode-id="5918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Fishburn" title="Peter Fishburn"><span data-dcnode-id="5919" instrument_node="">Peter Fishburn</span></a><span data-dcnode-id="5917" instrument_node="">.</span><sup class="reference" data-dcnode-id="5914" id="cite_ref-10"><a data-dcnode-id="5915" href="#cite_note-10"><span data-dcnode-id="5916" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5913" instrument_node="">
</span></p><p data-dcnode-id="5908"><span data-dcnode-id="5910" id="Historical_use"><span data-dcnode-id="5911" instrument_node="">Historically, several voting methods that incorporate aspects of approval voting have been used:</span></span><span data-dcnode-id="5909" instrument_node="">
</span></p><span data-dcnode-id="5907" instrument_node="">
</span><ul data-dcnode-id="5843"><li data-dcnode-id="5896"><span data-dcnode-id="5906" instrument_node="">Approval voting was used for </span><a data-dcnode-id="5904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Papal_conclave" title="Papal conclave"><span data-dcnode-id="5905" instrument_node="">papal conclaves</span></a><span data-dcnode-id="5903" instrument_node=""> between 1294 and 1621, with an average of about forty cardinals engaging in repeated rounds of voting until one candidate was listed on at least two-thirds of ballots.  </span><a data-dcnode-id="5901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josep_Colomer" title="Josep Colomer"><span data-dcnode-id="5902" instrument_node="">Josep Colomer</span></a><span data-dcnode-id="5900" instrument_node=""> writes of the 1559 conclave when a cardinal nearly won when an ally met confidentially with cardinals and asked them for a "token" approval vote for his friend to avoid a shut out – and then the cardinal came close to winning with votes on 17 of 32 ballots.</span><sup class="reference" data-dcnode-id="5897" id="cite_ref-colomer_11-0"><a data-dcnode-id="5898" href="#cite_note-colomer-11"><span data-dcnode-id="5899" instrument_node="">[11]</span></a></sup></li><span data-dcnode-id="5895" instrument_node="">
</span><li data-dcnode-id="5881"><span data-dcnode-id="5894" instrument_node="">In the 13th through 18th centuries, the </span><a data-dcnode-id="5892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Venice" title="Republic of Venice"><span data-dcnode-id="5893" instrument_node="">Republic of Venice</span></a><span data-dcnode-id="5891" instrument_node=""> elected the </span><a data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doge_of_Venice" title="Doge of Venice"><span data-dcnode-id="5890" instrument_node="">Doge of Venice</span></a><span data-dcnode-id="5888" instrument_node=""> using a multi-stage process that featured random selection and voting that allowed approval of multiple candidates and required a supermajority.</span><sup class="reference" data-dcnode-id="5885" id="cite_ref-12"><a data-dcnode-id="5886" href="#cite_note-12"><span data-dcnode-id="5887" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="5882" id="cite_ref-13"><a data-dcnode-id="5883" href="#cite_note-13"><span data-dcnode-id="5884" instrument_node="">[13]</span></a></sup></li><span data-dcnode-id="5880" instrument_node="">
</span><li data-dcnode-id="5875"><span data-dcnode-id="5879" instrument_node="">According to Steven J. Brams, approval voting was used for unspecified elections in 19th century England.</span><sup class="reference" data-dcnode-id="5876" id="cite_ref-14"><a data-dcnode-id="5877" href="#cite_note-14"><span data-dcnode-id="5878" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="5874" instrument_node="">
</span><li data-dcnode-id="5853"><span data-dcnode-id="5873" instrument_node="">The selection of the </span><a class="mw-redirect" data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Secretary-General" title="United Nations Secretary-General"><span data-dcnode-id="5872" instrument_node="">Secretary-General</span></a><span data-dcnode-id="5870" instrument_node=""> of the </span><a data-dcnode-id="5868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="5869" instrument_node="">United Nations</span></a><span data-dcnode-id="5867" instrument_node=""> has involved "straw poll" rounds of approval polling to help discover and build a consensus before a formal vote is held in the Security Council.</span><sup class="reference" data-dcnode-id="5864" id="cite_ref-15"><a data-dcnode-id="5865" href="#cite_note-15"><span data-dcnode-id="5866" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5863" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="5861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Secretary-General_selection%2C_2006" title="United Nations Secretary-General selection, 2006"><span data-dcnode-id="5862" instrument_node="">United Nations Secretary-General selection, 2006</span></a><span data-dcnode-id="5860" instrument_node=""> indicated that South Korean Foreign Minister Ban Ki-moon was the only candidate to be acceptable to all five permanent members of the Security Council, which led to the withdrawal of India's </span><a data-dcnode-id="5858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shashi_Tharoor" title="Shashi Tharoor"><span data-dcnode-id="5859" instrument_node="">Shashi Tharoor</span></a><span data-dcnode-id="5857" instrument_node="">, who had the highest overall approval rate.</span><sup class="reference" data-dcnode-id="5854" id="cite_ref-16"><a data-dcnode-id="5855" href="#cite_note-16"><span data-dcnode-id="5856" instrument_node="">[16]</span></a></sup></li><span data-dcnode-id="5852" instrument_node="">
</span><li data-dcnode-id="5844"><span data-dcnode-id="5851" instrument_node="">Approval voting was used in </span><a data-dcnode-id="5849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greece" title="Greece"><span data-dcnode-id="5850" instrument_node="">Greek</span></a><span data-dcnode-id="5848" instrument_node=""> legislative elections from 1864 to 1923, when it was replaced with proportional representation.</span><sup class="reference" data-dcnode-id="5845" id="cite_ref-mavrogordatos_17-0"><a data-dcnode-id="5846" href="#cite_note-mavrogordatos-17"><span data-dcnode-id="5847" instrument_node="">[17]</span></a></sup></li></ul><span data-dcnode-id="5842" instrument_node="">
</span><h3 data-dcnode-id="5832"><span class="mw-headline" data-dcnode-id="5840" id="Political_organizations_and_jurisdictions"><span data-dcnode-id="5841" instrument_node="">Political organizations and jurisdictions</span></span><span class="mw-editsection" data-dcnode-id="5833"><span class="mw-editsection-bracket" data-dcnode-id="5838"><span data-dcnode-id="5839" instrument_node="">[</span></span><a data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D5" title="Edit section: Political organizations and jurisdictions"><span data-dcnode-id="5837" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5831" instrument_node="">
</span><p data-dcnode-id="5803"><span data-dcnode-id="5830" instrument_node="">Approval voting has been used in privately administered nomination contests by the </span><a data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Independent_Party_of_Oregon" title="Independent Party of Oregon"><span data-dcnode-id="5829" instrument_node="">Independent Party of Oregon</span></a><span data-dcnode-id="5827" instrument_node=""> in 2011, 2012, 2014, and 2016. Oregon is a </span><a class="mw-redirect" data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fusion_voting" title="Fusion voting"><span data-dcnode-id="5826" instrument_node="">fusion voting</span></a><span data-dcnode-id="5824" instrument_node=""> state, and the party has cross-nominated legislators and statewide officeholders using this method; its 2016 presidential preference primary did not identify a potential nominee due to no candidate earning more than 32% support.</span><sup class="reference" data-dcnode-id="5821" id="cite_ref-18"><a data-dcnode-id="5822" href="#cite_note-18"><span data-dcnode-id="5823" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="5818" id="cite_ref-19"><a data-dcnode-id="5819" href="#cite_note-19"><span data-dcnode-id="5820" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="5815" id="cite_ref-20"><a data-dcnode-id="5816" href="#cite_note-20"><span data-dcnode-id="5817" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5814" instrument_node=""> The party switched to using </span><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/STAR_voting" title="STAR voting"><span data-dcnode-id="5813" instrument_node="">STAR voting</span></a><span data-dcnode-id="5811" instrument_node=""> in 2020.</span><sup class="reference" data-dcnode-id="5808" id="cite_ref-21"><a data-dcnode-id="5809" href="#cite_note-21"><span data-dcnode-id="5810" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="5805" id="cite_ref-22"><a data-dcnode-id="5806" href="#cite_note-22"><span data-dcnode-id="5807" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5804" instrument_node="">
</span></p><p data-dcnode-id="5737"><span data-dcnode-id="5802" instrument_node="">It is also used in internal elections by the </span><a data-dcnode-id="5800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Solidarity_Party" title="American Solidarity Party"><span data-dcnode-id="5801" instrument_node="">American Solidarity Party</span></a><span data-dcnode-id="5799" instrument_node="">,</span><sup class="reference" data-dcnode-id="5796" id="cite_ref-23"><a data-dcnode-id="5797" href="#cite_note-23"><span data-dcnode-id="5798" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5795" instrument_node=""> the </span><a data-dcnode-id="5793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_party" title="Green party"><span data-dcnode-id="5794" instrument_node="">Green Parties</span></a><span data-dcnode-id="5792" instrument_node=""> of </span><a data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_Texas" title="Green Party of Texas"><span data-dcnode-id="5791" instrument_node="">Texas</span></a><sup class="reference" data-dcnode-id="5787" id="cite_ref-24"><a data-dcnode-id="5788" href="#cite_note-24"><span data-dcnode-id="5789" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="5784" id="cite_ref-25"><a data-dcnode-id="5785" href="#cite_note-25"><span data-dcnode-id="5786" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5783" instrument_node=""> and </span><a data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_Ohio" title="Green Party of Ohio"><span data-dcnode-id="5782" instrument_node="">Ohio</span></a><span data-dcnode-id="5780" instrument_node="">,</span><sup class="reference" data-dcnode-id="5777" id="cite_ref-26"><a data-dcnode-id="5778" href="#cite_note-26"><span data-dcnode-id="5779" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5776" instrument_node=""> the </span><a data-dcnode-id="5774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Libertarian_Party_%28United_States%29" title="Libertarian Party (United States)"><span data-dcnode-id="5775" instrument_node="">Libertarian parties</span></a><span data-dcnode-id="5773" instrument_node=""> of </span><a data-dcnode-id="5771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Libertarian_Party_of_Texas" title="Libertarian Party of Texas"><span data-dcnode-id="5772" instrument_node="">Texas</span></a><sup class="reference" data-dcnode-id="5768" id="cite_ref-27"><a data-dcnode-id="5769" href="#cite_note-27"><span data-dcnode-id="5770" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5767" instrument_node=""> and </span><a data-dcnode-id="5765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Libertarian_Party_of_Colorado" title="Libertarian Party of Colorado"><span data-dcnode-id="5766" instrument_node="">Colorado</span></a><span data-dcnode-id="5764" instrument_node="">,</span><sup class="reference" data-dcnode-id="5761" id="cite_ref-28"><a data-dcnode-id="5762" href="#cite_note-28"><span data-dcnode-id="5763" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5760" instrument_node=""> the US </span><a class="new" data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DModern_Whig_Party%26action%3Dedit%26redlink%3D1" title="Modern Whig Party (page does not exist)"><span data-dcnode-id="5759" instrument_node="">Modern Whig</span></a><sup class="reference" data-dcnode-id="5755" id="cite_ref-29"><a data-dcnode-id="5756" href="#cite_note-29"><span data-dcnode-id="5757" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5754" instrument_node=""> party, and the </span><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czech_Pirate_Party" title="Czech Pirate Party"><span data-dcnode-id="5753" instrument_node="">Czech</span></a><sup class="reference" data-dcnode-id="5749" id="cite_ref-30"><a data-dcnode-id="5750" href="#cite_note-30"><span data-dcnode-id="5751" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5748" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Pirate_Party" title="German Pirate Party"><span data-dcnode-id="5747" instrument_node="">German Pirate Party</span></a><span data-dcnode-id="5745" instrument_node="">.</span><sup class="reference" data-dcnode-id="5742" id="cite_ref-31"><a data-dcnode-id="5743" href="#cite_note-31"><span data-dcnode-id="5744" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="5739" id="cite_ref-32"><a data-dcnode-id="5740" href="#cite_note-32"><span data-dcnode-id="5741" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5738" instrument_node="">
</span></p><p data-dcnode-id="5693"><span data-dcnode-id="5736" instrument_node="">In 2018, </span><a data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fargo%2C_North_Dakota" title="Fargo, North Dakota"><span data-dcnode-id="5735" instrument_node="">Fargo, North Dakota</span></a><span data-dcnode-id="5733" instrument_node=""> passed a ballot initiative adopting approval voting for local elections, becoming the first US city and jurisdiction to adopt approval voting.</span><sup class="reference" data-dcnode-id="5730" id="cite_ref-33"><a data-dcnode-id="5731" href="#cite_note-33"><span data-dcnode-id="5732" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="5727" id="cite_ref-34"><a data-dcnode-id="5728" href="#cite_note-34"><span data-dcnode-id="5729" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5726" instrument_node="">  (A previous city commissioner election in 2015 suffered from six-way </span><a data-dcnode-id="5724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_splitting" title="Vote splitting"><span data-dcnode-id="5725" instrument_node="">vote-splitting</span></a><span data-dcnode-id="5723" instrument_node="">, resulting in a candidate winning with only a 22% </span><a data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_%28voting%29" title="Plurality (voting)"><span data-dcnode-id="5722" instrument_node="">plurality</span></a><span data-dcnode-id="5720" instrument_node=""> of the vote.</span><sup class="reference" data-dcnode-id="5717" id="cite_ref-:1_35-0"><a data-dcnode-id="5718" href="#cite_note-:1-35"><span data-dcnode-id="5719" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5716" instrument_node="">) The first election was held June 9, 2020, selecting two city commissioners.</span><sup class="reference" data-dcnode-id="5713" id="cite_ref-36"><a data-dcnode-id="5714" href="#cite_note-36"><span data-dcnode-id="5715" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5712" instrument_node="">  Both winners received over 50% approval, with an average 2.3 approvals per ballot, and 62% of voters supported the change to approval voting in a poll.</span><sup class="reference" data-dcnode-id="5709" id="cite_ref-37"><a data-dcnode-id="5710" href="#cite_note-37"><span data-dcnode-id="5711" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5708" instrument_node=""> A poll by opponents of approval voting was conducted to test whether voters had in fact voted strategically according to the Burr dilemma.</span><sup class="reference" data-dcnode-id="5705" id="cite_ref-38"><a data-dcnode-id="5706" href="#cite_note-38"><span data-dcnode-id="5707" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5704" instrument_node=""> They found that 30% of voters who </span><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullet_voting" title="Bullet voting"><span data-dcnode-id="5703" instrument_node="">bullet voted</span></a><span data-dcnode-id="5701" instrument_node=""> did so for strategic reasons, while 57% did so because it was their sincere opinion.</span><sup class="reference" data-dcnode-id="5698" id="cite_ref-39"><a data-dcnode-id="5699" href="#cite_note-39"><span data-dcnode-id="5700" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="5695" id="cite_ref-40"><a data-dcnode-id="5696" href="#cite_note-40"><span data-dcnode-id="5697" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5694" instrument_node="">
</span></p><p data-dcnode-id="5668"><span data-dcnode-id="5692" instrument_node="">In 2020, </span><a class="mw-redirect" data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Louis%2C_Missouri" title="St. Louis, Missouri"><span data-dcnode-id="5691" instrument_node="">St. Louis, Missouri</span></a><span data-dcnode-id="5689" instrument_node=""> passed an initiative to adopt approval voting followed by a </span><a data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-round_system" title="Two-round system"><span data-dcnode-id="5688" instrument_node="">top-two runoff</span></a><span data-dcnode-id="5686" instrument_node=""> (see </span><a data-dcnode-id="5684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unified_primary" title="Unified primary"><span data-dcnode-id="5685" instrument_node="">Unified primary</span></a><span data-dcnode-id="5683" instrument_node="">), thus becoming the second US city to adopt approval voting and the first to use a variant of it.</span><sup class="reference" data-dcnode-id="5680" id="cite_ref-St._Louis_Approval_1_7-1"><a data-dcnode-id="5681" href="#cite_note-St._Louis_Approval_1-7"><span data-dcnode-id="5682" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="5677" id="cite_ref-St._Louis_Approval_2_8-1"><a data-dcnode-id="5678" href="#cite_note-St._Louis_Approval_2-8"><span data-dcnode-id="5679" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5676" instrument_node="">  The first such primary was held in March 2021, and unofficial results showed voters expressed 1.1 to 1.6 approvals per ballot, in races with more than two candidates.</span><sup class="reference" data-dcnode-id="5673" id="cite_ref-:0_6-1"><a data-dcnode-id="5674" href="#cite_note-:0-6"><span data-dcnode-id="5675" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="5670" id="cite_ref-41"><a data-dcnode-id="5671" href="#cite_note-41"><span data-dcnode-id="5672" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5669" instrument_node="">
</span></p><span data-dcnode-id="5667" instrument_node="">
</span><h3 data-dcnode-id="5657"><span class="mw-headline" data-dcnode-id="5665" id="Other_organizations"><span data-dcnode-id="5666" instrument_node="">Other organizations</span></span><span class="mw-editsection" data-dcnode-id="5658"><span class="mw-editsection-bracket" data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">[</span></span><a data-dcnode-id="5661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D6" title="Edit section: Other organizations"><span data-dcnode-id="5662" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5656" instrument_node="">
</span><p data-dcnode-id="5644"><span data-dcnode-id="5655" instrument_node="">The idea of approval was adopted by X. Hu and </span><a data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lloyd_Shapley" title="Lloyd Shapley"><span data-dcnode-id="5654" instrument_node="">Lloyd Shapley</span></a><span data-dcnode-id="5652" instrument_node=""> in 2003</span><sup class="reference" data-dcnode-id="5649" id="cite_ref-42"><a data-dcnode-id="5650" href="#cite_note-42"><span data-dcnode-id="5651" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5648" instrument_node=""> in studying </span><a data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authority_distribution" title="Authority distribution"><span data-dcnode-id="5647" instrument_node="">authority distribution</span></a><span data-dcnode-id="5645" instrument_node=""> in organizations.
</span></p><p data-dcnode-id="5596"><span data-dcnode-id="5643" instrument_node="">Approval voting has been adopted by several learned societies: the Society for Social Choice and Welfare (1992),</span><sup class="reference" data-dcnode-id="5640" id="cite_ref-43"><a data-dcnode-id="5641" href="#cite_note-43"><span data-dcnode-id="5642" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5639" instrument_node=""> </span><a data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mathematical_Association_of_America" title="Mathematical Association of America"><span data-dcnode-id="5638" instrument_node="">Mathematical Association of America</span></a><span data-dcnode-id="5636" instrument_node=""> (1986),</span><sup class="reference" data-dcnode-id="5633" id="cite_ref-44"><a data-dcnode-id="5634" href="#cite_note-44"><span data-dcnode-id="5635" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5632" instrument_node=""> the </span><a data-dcnode-id="5630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Mathematical_Society" title="American Mathematical Society"><span data-dcnode-id="5631" instrument_node="">American Mathematical Society</span></a><span data-dcnode-id="5629" instrument_node="">,</span><sup class="reference" data-dcnode-id="5626" id="cite_ref-45"><a data-dcnode-id="5627" href="#cite_note-45"><span data-dcnode-id="5628" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5625" instrument_node=""> the Institute of Management Sciences (1987) (now the </span><a data-dcnode-id="5623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institute_for_Operations_Research_and_the_Management_Sciences" title="Institute for Operations Research and the Management Sciences"><span data-dcnode-id="5624" instrument_node="">Institute for Operations Research and the Management Sciences</span></a><span data-dcnode-id="5622" instrument_node="">),</span><sup class="reference" data-dcnode-id="5619" id="cite_ref-46"><a data-dcnode-id="5620" href="#cite_note-46"><span data-dcnode-id="5621" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5618" instrument_node=""> the </span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Statistical_Association" title="American Statistical Association"><span data-dcnode-id="5617" instrument_node="">American Statistical Association</span></a><span data-dcnode-id="5615" instrument_node=""> (1987),</span><sup class="reference" data-dcnode-id="5612" id="cite_ref-47"><a data-dcnode-id="5613" href="#cite_note-47"><span data-dcnode-id="5614" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5611" instrument_node=""> and the </span><a data-dcnode-id="5609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institute_of_Electrical_and_Electronics_Engineers" title="Institute of Electrical and Electronics Engineers"><span data-dcnode-id="5610" instrument_node="">Institute of Electrical and Electronics Engineers</span></a><span data-dcnode-id="5608" instrument_node=""> (1987). The IEEE board in 2002 rescinded its decision to use approval voting. IEEE Executive Director Daniel J. Senese stated that approval voting was abandoned because "few of our members were using it and it was felt that it was no longer needed."</span><sup class="reference" data-dcnode-id="5605" id="cite_ref-theory_to_practice_48-0"><a data-dcnode-id="5606" href="#cite_note-theory_to_practice-48"><span data-dcnode-id="5607" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5604" instrument_node=""> Because none of these associations report results to their members and the public, it is difficult to evaluate Senese's claim and whether it is also true of other associations; Steven Brams' analysis of the 5-candidate 1987 Mathematical Association of America presidential election shows that 79% of voters cast a ballot for one candidate, 16% for 2 candidates, 5% for 3, and 1% for 4, with the winner earning the approval of 1,267 (32%) of 3,924 voters.</span><sup class="reference" data-dcnode-id="5601" id="cite_ref-theory_to_practice_48-1"><a data-dcnode-id="5602" href="#cite_note-theory_to_practice-48"><span data-dcnode-id="5603" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="5598" id="cite_ref-49"><a data-dcnode-id="5599" href="#cite_note-49"><span data-dcnode-id="5600" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5597" instrument_node="">
</span></p><p data-dcnode-id="5554"><span data-dcnode-id="5595" instrument_node="">Approval voting was used for Dartmouth Alumni Association elections for seats on the College Board of Trustees, but after some controversy</span><sup class="reference" data-dcnode-id="5592" id="cite_ref-verbum_50-0"><a data-dcnode-id="5593" href="#cite_note-verbum-50"><span data-dcnode-id="5594" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5591" instrument_node=""> it was replaced with traditional runoff elections by an alumni vote of 82% to 18% in 2009.</span><sup class="reference" data-dcnode-id="5588" id="cite_ref-51"><a data-dcnode-id="5589" href="#cite_note-51"><span data-dcnode-id="5590" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5587" instrument_node=""> Dartmouth students started to use approval voting to elect their student body president in 2011. In the first election, the winner secured the support of 41% of voters against several write-in candidates.</span><sup class="reference" data-dcnode-id="5584" id="cite_ref-52"><a data-dcnode-id="5585" href="#cite_note-52"><span data-dcnode-id="5586" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5583" instrument_node=""> In 2012, Suril Kantaria won with the support of 32% of the voters.</span><sup class="reference" data-dcnode-id="5580" id="cite_ref-53"><a data-dcnode-id="5581" href="#cite_note-53"><span data-dcnode-id="5582" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5579" instrument_node=""> In 2013, 2014 and 2016, the winners also earned the support of under 40% of the voters.</span><sup class="reference" data-dcnode-id="5576" id="cite_ref-54"><a data-dcnode-id="5577" href="#cite_note-54"><span data-dcnode-id="5578" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="5573" id="cite_ref-Dennis,_Cunningham_to_lead_Assembly_55-0"><a data-dcnode-id="5574" href="#cite_note-Dennis,_Cunningham_to_lead_Assembly-55"><span data-dcnode-id="5575" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="5570" id="cite_ref-thedartmouth.com_56-0"><a data-dcnode-id="5571" href="#cite_note-thedartmouth.com-56"><span data-dcnode-id="5572" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5569" instrument_node=""> Results reported in </span><i data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">The Dartmouth</span></i><span data-dcnode-id="5566" instrument_node=""> show that in the 2014 and 2016 elections, more than 80 percent of voters approved of only one candidate.</span><sup class="reference" data-dcnode-id="5563" id="cite_ref-Dennis,_Cunningham_to_lead_Assembly_55-1"><a data-dcnode-id="5564" href="#cite_note-Dennis,_Cunningham_to_lead_Assembly-55"><span data-dcnode-id="5565" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="5560" id="cite_ref-thedartmouth.com_56-1"><a data-dcnode-id="5561" href="#cite_note-thedartmouth.com-56"><span data-dcnode-id="5562" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5559" instrument_node=""> Students replaced approval voting with plurality voting before the 2017 elections.</span><sup class="reference" data-dcnode-id="5556" id="cite_ref-57"><a data-dcnode-id="5557" href="#cite_note-57"><span data-dcnode-id="5558" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5555" instrument_node="">
</span></p><p data-dcnode-id="5546"><span data-dcnode-id="5553" instrument_node="">Approval voting also can be used in social scenarios as a fairer, but still quick system compared to a </span><a class="mw-redirect" data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-Past-The-Post" title="First-Past-The-Post"><span data-dcnode-id="5552" instrument_node="">First-Past-The-Post</span></a><span data-dcnode-id="5550" instrument_node=""> equivalent, being able to avoid a </span><a class="mw-redirect" data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spoiler_effect" title="Spoiler effect"><span data-dcnode-id="5549" instrument_node="">spoiler effect</span></a><span data-dcnode-id="5547" instrument_node=""> while being very quick to calculate.
</span></p><p data-dcnode-id="5541"><span data-dcnode-id="5545" instrument_node="">See also: </span><a data-dcnode-id="5543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiwinner_approval_voting%23Usage" title="Multiwinner approval voting"><span data-dcnode-id="5544" instrument_node="">Multiwinner approval voting</span></a><span data-dcnode-id="5542" instrument_node="">.
</span></p><span data-dcnode-id="5540" instrument_node="">
</span><h2 data-dcnode-id="5530"><span class="mw-headline" data-dcnode-id="5538" id="Effect_on_elections"><span data-dcnode-id="5539" instrument_node="">Effect on elections</span></span><span class="mw-editsection" data-dcnode-id="5531"><span class="mw-editsection-bracket" data-dcnode-id="5536"><span data-dcnode-id="5537" instrument_node="">[</span></span><a data-dcnode-id="5534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D7" title="Edit section: Effect on elections"><span data-dcnode-id="5535" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5532"><span data-dcnode-id="5533" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5529" instrument_node="">
</span><p data-dcnode-id="5483"><span data-dcnode-id="5528" instrument_node="">Approval voting advocates Steven Brams and </span><a data-dcnode-id="5526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dudley_R._Herschbach" title="Dudley R. Herschbach"><span data-dcnode-id="5527" instrument_node="">Dudley R. Herschbach</span></a><span data-dcnode-id="5525" instrument_node=""> predict that approval voting should increase voter participation, prevent minor-party candidates from being spoilers, and reduce negative campaigning.</span><sup class="reference" data-dcnode-id="5522" id="cite_ref-58"><a data-dcnode-id="5523" href="#cite_note-58"><span data-dcnode-id="5524" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5521" instrument_node=""> The effect of this system as an </span><a data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_reform" title="Electoral reform"><span data-dcnode-id="5520" instrument_node="">electoral reform</span></a><span data-dcnode-id="5518" instrument_node=""> measure is not without critics, however. </span><a data-dcnode-id="5516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FairVote" title="FairVote"><span data-dcnode-id="5517" instrument_node="">FairVote</span></a><span data-dcnode-id="5515" instrument_node=""> has a position paper arguing that approval voting has three flaws that undercut it as a method of voting and political vehicle.</span><sup class="reference" data-dcnode-id="5512" id="cite_ref-59"><a data-dcnode-id="5513" href="#cite_note-59"><span data-dcnode-id="5514" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5511" instrument_node=""> They argue that it can result in the defeat of a candidate </span><a data-dcnode-id="5509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Majority_criterion" title="Majority criterion"><span data-dcnode-id="5510" instrument_node="">who would win an absolute majority in a plurality election</span></a><span data-dcnode-id="5508" instrument_node="">, can allow a candidate to win who might not win </span><i data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">any</span></i><span data-dcnode-id="5505" instrument_node=""> support in a plurality election, and has incentives for </span><a data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting" title="Tactical voting"><span data-dcnode-id="5504" instrument_node="">tactical voting</span></a><span data-dcnode-id="5502" instrument_node="">.  The first two "flaws" are considered advantages by advocates of approval voting, as it chooses centrist candidates with broad appeal rather than polarizing candidates who appeal only to the majority.</span><sup class="reference" data-dcnode-id="5499" id="cite_ref-60"><a data-dcnode-id="5500" href="#cite_note-60"><span data-dcnode-id="5501" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="5496" id="cite_ref-61"><a data-dcnode-id="5497" href="#cite_note-61"><span data-dcnode-id="5498" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5495" instrument_node=""> Supporters</span><sup class="noprint Inline-Template" data-dcnode-id="5488" style="white-space:nowrap;"><span data-dcnode-id="5494" instrument_node="">[</span><i data-dcnode-id="5490"><a data-dcnode-id="5491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="5492" title="The material near this tag possibly uses too-vague attribution or weasel words. (January 2020)"><span data-dcnode-id="5493" instrument_node="">who?</span></span></a></i><span data-dcnode-id="5489" instrument_node="">]</span></sup><span data-dcnode-id="5487" instrument_node=""> also point out that any voting method is subject to tactical voting with more than two candidates, as pointed out in </span><a data-dcnode-id="5485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gibbard%2527s_theorem" title="Gibbard's theorem"><span data-dcnode-id="5486" instrument_node="">Gibbard's theorem</span></a><span data-dcnode-id="5484" instrument_node="">.
</span></p><p data-dcnode-id="5457"><span data-dcnode-id="5482" instrument_node="">One study showed that approval voting would not have chosen the same two winners as plurality voting (</span><a data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Chirac" title="Jacques Chirac"><span data-dcnode-id="5481" instrument_node="">Chirac</span></a><span data-dcnode-id="5479" instrument_node=""> and </span><a data-dcnode-id="5477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-Marie_Le_Pen" title="Jean-Marie Le Pen"><span data-dcnode-id="5478" instrument_node="">Le Pen</span></a><span data-dcnode-id="5476" instrument_node="">) in </span><a data-dcnode-id="5474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2002_French_presidential_election" title="2002 French presidential election"><span data-dcnode-id="5475" instrument_node="">France's presidential election of 2002</span></a><span data-dcnode-id="5473" instrument_node=""> (first round) – it instead would have chosen Chirac and Jospin as the top two to proceed to a runoff.</span><sup class="reference" data-dcnode-id="5470" id="cite_ref-62"><a data-dcnode-id="5471" href="#cite_note-62"><span data-dcnode-id="5472" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5469" instrument_node=""> Le Pen lost by a very high margin in the runoff, 82.2% to 17.8%, a sign that the true top two had not been found. Straight approval voting without a runoff, from the study, still would have selected Chirac, but with an approval percentage of only 36.7%, compared to Jospin at 32.9%. Le Pen, in that study, would have received 25.1%. In the real primary election, the top three were Chirac, 19.9%, Le Pen, 16.9%, and Jospin, 16.2%.</span><sup class="reference" data-dcnode-id="5466" id="cite_ref-63"><a data-dcnode-id="5467" href="#cite_note-63"><span data-dcnode-id="5468" instrument_node="">[63]</span></a></sup><span data-dcnode-id="5465" instrument_node=""> A study of various "evaluative voting" methods (approval voting and score voting) during </span><a data-dcnode-id="5463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2012_French_presidential_election" title="2012 French presidential election"><span data-dcnode-id="5464" instrument_node="">the French presidential election, 2012</span></a><span data-dcnode-id="5462" instrument_node=""> showed that "unifying" candidates tended to do better, and polarizing candidates did worse, via the evaluative voting methods than via the plurality system.</span><sup class="reference" data-dcnode-id="5459" id="cite_ref-64"><a data-dcnode-id="5460" href="#cite_note-64"><span data-dcnode-id="5461" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5458" instrument_node="">
</span></p><p data-dcnode-id="5445"><span data-dcnode-id="5456" instrument_node="">A generalized version of the </span><a class="mw-redirect" data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burr_dilemma" title="Burr dilemma"><span data-dcnode-id="5455" instrument_node="">Burr dilemma</span></a><span data-dcnode-id="5453" instrument_node=""> applies to approval voting when two candidates are appealing to the same subset of voters.  Although approval voting differs from the voting system used in the Burr dilemma, approval voting can still leave candidates and voters with the generalized dilemma of whether to compete or cooperate.</span><sup class="reference" data-dcnode-id="5450" id="cite_ref-65"><a data-dcnode-id="5451" href="#cite_note-65"><span data-dcnode-id="5452" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="5447" id="cite_ref-66"><a data-dcnode-id="5448" href="#cite_note-66"><span data-dcnode-id="5449" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5446" instrument_node="">
</span></p><p data-dcnode-id="5426"><span data-dcnode-id="5444" instrument_node="">While in the modern era there have been relatively few competitive approval voting elections where tactical voting is more likely, Brams argues that approval voting usually elects </span><a class="mw-redirect" data-dcnode-id="5442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condorcet_criterion" title="Condorcet criterion"><span data-dcnode-id="5443" instrument_node="">Condorcet winners</span></a><span data-dcnode-id="5441" instrument_node=""> in practice.</span><sup class="reference" data-dcnode-id="5438" id="cite_ref-67"><a data-dcnode-id="5439" href="#cite_note-67"><span data-dcnode-id="5440" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="5435" id="cite_ref-theory_to_practice_48-2"><a data-dcnode-id="5436" href="#cite_note-theory_to_practice-48"><span data-dcnode-id="5437" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5434" instrument_node=""> Critics of the use of approval voting in the alumni elections for the Dartmouth Board of Trustees in 2009 placed its ultimately successful repeal before alumni voters, arguing that the system has not been electing the most centrist candidates. </span><i data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">The Dartmouth</span></i><span data-dcnode-id="5431" instrument_node=""> editorialized that "When the alumni electorate fails to take advantage of the approval voting process, the three required Alumni Council candidates tend to split the majority vote, giving petition candidates an advantage. By reducing the number of Alumni Council candidates, and instituting a more traditional one-person, one-vote system, trustee elections will become more democratic and will more accurately reflect the desires of our alumni base."</span><sup class="reference" data-dcnode-id="5428" id="cite_ref-verbum_50-1"><a data-dcnode-id="5429" href="#cite_note-verbum-50"><span data-dcnode-id="5430" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5427" instrument_node="">
</span></p><span data-dcnode-id="5425" instrument_node="">
</span><h2 data-dcnode-id="5415"><span class="mw-headline" data-dcnode-id="5423" id="Strategic_voting"><span data-dcnode-id="5424" instrument_node="">Strategic voting</span></span><span class="mw-editsection" data-dcnode-id="5416"><span class="mw-editsection-bracket" data-dcnode-id="5421"><span data-dcnode-id="5422" instrument_node="">[</span></span><a data-dcnode-id="5419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D8" title="Edit section: Strategic voting"><span data-dcnode-id="5420" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5417"><span data-dcnode-id="5418" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5414" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5408" role="note"><span data-dcnode-id="5411" instrument_node="">See also: </span><a data-dcnode-id="5409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting%23Approval_voting" title="Tactical voting"><span data-dcnode-id="5410" instrument_node="">Tactical voting §&nbsp;Approval voting</span></a></div><span data-dcnode-id="5407" instrument_node="">
</span><h3 data-dcnode-id="5397"><span class="mw-headline" data-dcnode-id="5405" id="Overview"><span data-dcnode-id="5406" instrument_node="">Overview</span></span><span class="mw-editsection" data-dcnode-id="5398"><span class="mw-editsection-bracket" data-dcnode-id="5403"><span data-dcnode-id="5404" instrument_node="">[</span></span><a data-dcnode-id="5401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D9" title="Edit section: Overview"><span data-dcnode-id="5402" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5396" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="5359" role="presentation"><tbody data-dcnode-id="5360"><tr data-dcnode-id="5361"><td class="mbox-image" data-dcnode-id="5392"><div data-dcnode-id="5393" style="width:52px"><a class="image" data-dcnode-id="5394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="5395" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="5362"><div class="mbox-text-span" data-dcnode-id="5363"><span data-dcnode-id="5391" instrument_node="">This section </span><b data-dcnode-id="5387"><span data-dcnode-id="5390" instrument_node="">needs additional citations for </span><a data-dcnode-id="5388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="5389" instrument_node="">verification</span></a></b><span data-dcnode-id="5386" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="5378"><span data-dcnode-id="5385" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="5383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit"><span data-dcnode-id="5384" instrument_node="">improve this article</span></a><span data-dcnode-id="5382" instrument_node=""> by </span><a data-dcnode-id="5380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="5381" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="5379" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="5377" instrument_node=""> </span><span class="date-container" data-dcnode-id="5371"><i data-dcnode-id="5372"><span data-dcnode-id="5376" instrument_node="">(</span><span class="date" data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">June 2019</span></span><span data-dcnode-id="5373" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="5364"><i data-dcnode-id="5365"><span data-dcnode-id="5370" instrument_node=""> (</span><small data-dcnode-id="5367"><a data-dcnode-id="5368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="5369" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="5366" instrument_node="">)</span></i></span></div></td></tr></tbody></table><p data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">Approval voting allows voters to select all the candidates whom they consider to be reasonable choices.
</span></p><p data-dcnode-id="5347"><i data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">Strategic approval</span></i><span data-dcnode-id="5354" instrument_node=""> voting differs from ranked choice voting methods where voters might </span><i data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">reverse</span></i><span data-dcnode-id="5351" instrument_node=""> the preference order of two options, which if done on a larger scale can cause an unpopular candidate to win. Strategic Approval voting, with more than two options, involves the voter changing their approval threshold. The voter decides which options to give the </span><i data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">same</span></i><span data-dcnode-id="5348" instrument_node=""> rating, even if they were to have a preference order between them. This leaves a tactical concern any voter has for approving their second-favorite candidate, in the case that there are 3 or more candidates.  Approving their second-favorite means the voter harms their favorite candidate's chance to win.  Not approving their second-favorite means the voter helps the candidate they least desire to beat their second-favorite and perhaps win.
</span></p><p data-dcnode-id="5333"><span data-dcnode-id="5346" instrument_node="">Approval voting allows for </span><a data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting%23Bullet_voting" title="Tactical voting"><span data-dcnode-id="5345" instrument_node="">bullet voting</span></a><span data-dcnode-id="5343" instrument_node=""> and </span><a data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting%23Compromising" title="Tactical voting"><span data-dcnode-id="5342" instrument_node="">compromising</span></a><span data-dcnode-id="5340" instrument_node="">,  while it is immune to </span><a data-dcnode-id="5338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting%23Push-over" title="Tactical voting"><span data-dcnode-id="5339" instrument_node="">push-over</span></a><span data-dcnode-id="5337" instrument_node=""> and </span><a data-dcnode-id="5335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting%23Burying" title="Tactical voting"><span data-dcnode-id="5336" instrument_node="">burying</span></a><span data-dcnode-id="5334" instrument_node="">.
</span></p><p data-dcnode-id="5323"><a data-dcnode-id="5331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting%23Bullet_voting" title="Tactical voting"><span data-dcnode-id="5332" instrument_node="">Bullet Voting</span></a><span data-dcnode-id="5330" instrument_node=""> occurs when a voter approves </span><i data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">only</span></i><span data-dcnode-id="5327" instrument_node=""> candidate 'a' instead of </span><i data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">both</span></i><span data-dcnode-id="5324" instrument_node=""> 'a' and 'b' for the reason that voting for 'b' can cause 'a' to lose. The voter would be satisfied with either 'a' or 'b' but has a moderate preference for 'a'. Were 'b' to win, this hypothetical voter would still be satisfied.
</span></p><p data-dcnode-id="5316"><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting%23Compromising" title="Tactical voting"><span data-dcnode-id="5322" instrument_node="">Compromising</span></a><span data-dcnode-id="5320" instrument_node=""> occurs when a voter approves an </span><i data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">additional</span></i><span data-dcnode-id="5317" instrument_node=""> candidate who is otherwise considered unacceptable to the voter to prevent an even worse alternative from winning.
</span></p><span data-dcnode-id="5315" instrument_node="">
</span><h3 data-dcnode-id="5305"><span class="mw-headline" data-dcnode-id="5313" id="Sincere_voting"><span data-dcnode-id="5314" instrument_node="">Sincere voting</span></span><span class="mw-editsection" data-dcnode-id="5306"><span class="mw-editsection-bracket" data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">[</span></span><a data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D10" title="Edit section: Sincere voting"><span data-dcnode-id="5310" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5304" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="5267" role="presentation"><tbody data-dcnode-id="5268"><tr data-dcnode-id="5269"><td class="mbox-image" data-dcnode-id="5300"><div data-dcnode-id="5301" style="width:52px"><a class="image" data-dcnode-id="5302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="5303" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="5270"><div class="mbox-text-span" data-dcnode-id="5271"><span data-dcnode-id="5299" instrument_node="">This section </span><b data-dcnode-id="5295"><span data-dcnode-id="5298" instrument_node="">needs additional citations for </span><a data-dcnode-id="5296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="5297" instrument_node="">verification</span></a></b><span data-dcnode-id="5294" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="5286"><span data-dcnode-id="5293" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit"><span data-dcnode-id="5292" instrument_node="">improve this article</span></a><span data-dcnode-id="5290" instrument_node=""> by </span><a data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="5289" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="5287" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="5285" instrument_node=""> </span><span class="date-container" data-dcnode-id="5279"><i data-dcnode-id="5280"><span data-dcnode-id="5284" instrument_node="">(</span><span class="date" data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">June 2019</span></span><span data-dcnode-id="5281" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="5272"><i data-dcnode-id="5273"><span data-dcnode-id="5278" instrument_node=""> (</span><small data-dcnode-id="5275"><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="5277" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="5274" instrument_node="">)</span></i></span></div></td></tr></tbody></table><p data-dcnode-id="5258"><span data-dcnode-id="5266" instrument_node="">Approval voting experts describe sincere votes as those "... that directly reflect the true preferences of a voter, i.e., that do not report preferences 'falsely.'"</span><sup class="reference" data-dcnode-id="5263" id="cite_ref-FOOTNOTEBramsFishburn198329_68-0"><a data-dcnode-id="5264" href="#cite_note-FOOTNOTEBramsFishburn198329-68"><span data-dcnode-id="5265" instrument_node="">[68]</span></a></sup><span data-dcnode-id="5262" instrument_node="">  They also give a specific definition of a sincere approval vote in terms of the voter's </span><a data-dcnode-id="5260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Preference" title="Preference"><span data-dcnode-id="5261" instrument_node="">ordinal preferences</span></a><span data-dcnode-id="5259" instrument_node=""> as being any vote that, if it votes for one candidate, it also votes for any more preferred candidate.  This definition allows a sincere vote to treat strictly preferred candidates the same, ensuring that every voter has at least one sincere vote. The definition also allows a sincere vote to treat equally preferred candidates differently.  When there are two or more candidates, every voter has at least three sincere approval votes to choose from.  Two of those sincere approval votes do not distinguish between any of the candidates: vote for none of the candidates and vote for all of the candidates.  When there are three or more candidates, every voter has more than one sincere approval vote that distinguishes between the candidates.
</span></p><h4 data-dcnode-id="5248"><span class="mw-headline" data-dcnode-id="5256" id="Examples"><span data-dcnode-id="5257" instrument_node="">Examples</span></span><span class="mw-editsection" data-dcnode-id="5249"><span class="mw-editsection-bracket" data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">[</span></span><a data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D11" title="Edit section: Examples"><span data-dcnode-id="5253" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5247" instrument_node="">
</span><p data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">Based on the definition above, if there are four candidates, A, B, C, and D, and a voter has a strict preference order, preferring A to B to C to D, then the following are the voter's possible sincere approval votes:
</span></p><span data-dcnode-id="5244" instrument_node="">
