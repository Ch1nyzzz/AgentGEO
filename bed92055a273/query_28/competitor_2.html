</span><ul data-dcnode-id="5229"><li data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">vote for A, B, C, and D</span></li><span data-dcnode-id="5241" instrument_node="">
</span><li data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">vote for A, B, and C</span></li><span data-dcnode-id="5238" instrument_node="">
</span><li data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">vote for A and B</span></li><span data-dcnode-id="5235" instrument_node="">
</span><li data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">vote for A</span></li><span data-dcnode-id="5232" instrument_node="">
</span><li data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">vote for no candidates</span></li></ul><span data-dcnode-id="5228" instrument_node="">
</span><p data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">If the voter instead equally prefers B and C, while A is still the most preferred candidate and D is the least preferred candidate, then all of the above votes are sincere and the following combination is also a sincere vote:
</span></p><span data-dcnode-id="5225" instrument_node="">
</span><ul data-dcnode-id="5222"><li data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">vote for A and C</span></li></ul><span data-dcnode-id="5221" instrument_node="">
</span><p data-dcnode-id="5219"><span data-dcnode-id="5220" instrument_node="">The decision between the above ballots is equivalent to deciding an arbitrary "approval cutoff." All candidates preferred to the cutoff are approved, all candidates less preferred are not approved, and any candidates equal to the cutoff may be approved or not arbitrarily.
</span></p><span data-dcnode-id="5218" instrument_node="">
</span><h3 data-dcnode-id="5208"><span class="mw-headline" data-dcnode-id="5216" id="Sincere_strategy_with_ordinal_preferences"><span data-dcnode-id="5217" instrument_node="">Sincere strategy with ordinal preferences</span></span><span class="mw-editsection" data-dcnode-id="5209"><span class="mw-editsection-bracket" data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">[</span></span><a data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D12" title="Edit section: Sincere strategy with ordinal preferences"><span data-dcnode-id="5213" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5207" instrument_node="">
</span><p data-dcnode-id="5198"><span data-dcnode-id="5206" instrument_node="">A sincere voter with multiple options for voting sincerely still has to choose which sincere vote to use. </span><a data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting" title="Tactical voting"><span data-dcnode-id="5205" instrument_node="">Voting strategy</span></a><span data-dcnode-id="5203" instrument_node=""> is a way to make that choice, in which case strategic approval voting includes sincere voting, rather than being an alternative to it.</span><sup class="reference" data-dcnode-id="5200" id="cite_ref-probstrat_69-0"><a data-dcnode-id="5201" href="#cite_note-probstrat-69"><span data-dcnode-id="5202" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5199" instrument_node=""> This differs from other voting systems that typically have a unique sincere vote for a voter.
</span></p><p data-dcnode-id="5178"><span data-dcnode-id="5197" instrument_node="">When there are three or more candidates, the winner of an approval voting election can change, depending on which sincere votes are used. In some cases, approval voting can sincerely elect any one of the candidates, including a </span><a class="mw-redirect" data-dcnode-id="5195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condorcet_winner" title="Condorcet winner"><span data-dcnode-id="5196" instrument_node="">Condorcet winner</span></a><span data-dcnode-id="5194" instrument_node=""> and a </span><a class="mw-redirect" data-dcnode-id="5192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condorcet_loser" title="Condorcet loser"><span data-dcnode-id="5193" instrument_node="">Condorcet loser</span></a><span data-dcnode-id="5191" instrument_node="">, without the voter preferences changing.  To the extent that electing a Condorcet winner and not electing a Condorcet loser is considered desirable outcomes for a voting system, approval voting can be considered vulnerable to sincere, strategic voting.</span><sup class="reference" data-dcnode-id="5188" id="cite_ref-70"><a data-dcnode-id="5189" href="#cite_note-70"><span data-dcnode-id="5190" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5187" instrument_node="">  In one sense, conditions where this can happen are robust and are not isolated cases.</span><sup class="reference" data-dcnode-id="5184" id="cite_ref-71"><a data-dcnode-id="5185" href="#cite_note-71"><span data-dcnode-id="5186" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5183" instrument_node="">  On the other hand, the variety of possible outcomes has also been portrayed as a virtue of approval voting, representing the flexibility and responsiveness of approval voting, not just to voter ordinal preferences, but cardinal utilities as well.</span><sup class="reference" data-dcnode-id="5180" id="cite_ref-unmitigated_72-0"><a data-dcnode-id="5181" href="#cite_note-unmitigated-72"><span data-dcnode-id="5182" instrument_node="">[72]</span></a></sup><span data-dcnode-id="5179" instrument_node="">
</span></p><span data-dcnode-id="5177" instrument_node="">
</span><h4 data-dcnode-id="5167"><span class="mw-headline" data-dcnode-id="5175" id="Dichotomous_preferences"><span data-dcnode-id="5176" instrument_node="">Dichotomous preferences</span></span><span class="mw-editsection" data-dcnode-id="5168"><span class="mw-editsection-bracket" data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">[</span></span><a data-dcnode-id="5171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D13" title="Edit section: Dichotomous preferences"><span data-dcnode-id="5172" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5166" instrument_node="">
</span><p data-dcnode-id="5146"><span data-dcnode-id="5165" instrument_node="">Approval voting avoids the issue of multiple sincere votes in special cases when voters have </span><a data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dichotomous_preferences" title="Dichotomous preferences"><span data-dcnode-id="5164" instrument_node="">dichotomous preferences</span></a><span data-dcnode-id="5162" instrument_node="">. For a voter with dichotomous preferences, approval voting is </span><a class="mw-redirect" data-dcnode-id="5160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategy-proof" title="Strategy-proof"><span data-dcnode-id="5161" instrument_node="">strategy-proof</span></a><span data-dcnode-id="5159" instrument_node=""> (also known as strategy-free).</span><sup class="reference" data-dcnode-id="5156" id="cite_ref-FOOTNOTEBramsFishburn198331_73-0"><a data-dcnode-id="5157" href="#cite_note-FOOTNOTEBramsFishburn198331-73"><span data-dcnode-id="5158" instrument_node="">[73]</span></a></sup><span data-dcnode-id="5155" instrument_node="">  When all voters have dichotomous preferences and vote the sincere, strategy-proof vote, approval voting is guaranteed to elect the Condorcet winner, if one exists.</span><sup class="reference" data-dcnode-id="5152" id="cite_ref-FOOTNOTEBramsFishburn198338_74-0"><a data-dcnode-id="5153" href="#cite_note-FOOTNOTEBramsFishburn198338-74"><span data-dcnode-id="5154" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5151" instrument_node="">  However, having dichotomous preferences when there are three or more candidates is not typical.  It is an unlikely situation for all voters to have dichotomous preferences when there are more than a few voters.</span><sup class="reference" data-dcnode-id="5148" id="cite_ref-probstrat_69-1"><a data-dcnode-id="5149" href="#cite_note-probstrat-69"><span data-dcnode-id="5150" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5147" instrument_node="">
</span></p><p data-dcnode-id="5140"><span data-dcnode-id="5145" instrument_node="">Having dichotomous preferences means that a voter has bi-level preferences for the candidates.  All of the candidates are divided into two groups such that the voter is indifferent between any two candidates in the same group and any candidate in the top-level group is preferred to any candidate in the bottom-level group.</span><sup class="reference" data-dcnode-id="5142" id="cite_ref-FOOTNOTEBramsFishburn198316–17_75-0"><a data-dcnode-id="5143" href="#cite_note-FOOTNOTEBramsFishburn198316%E2%80%9317-75"><span data-dcnode-id="5144" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5141" instrument_node="">  A voter that has strict preferences between three candidates—prefers A to B and B to C—does not have dichotomous preferences.
</span></p><p data-dcnode-id="5134"><span data-dcnode-id="5139" instrument_node="">Being strategy-proof for a voter means that there is a unique way for the voter to vote that is a strategically best way to vote, regardless of how others vote. In approval voting, the strategy-proof vote, if it exists, is a sincere vote.</span><sup class="reference" data-dcnode-id="5136" id="cite_ref-FOOTNOTEBramsFishburn198329_68-1"><a data-dcnode-id="5137" href="#cite_note-FOOTNOTEBramsFishburn198329-68"><span data-dcnode-id="5138" instrument_node="">[68]</span></a></sup><span data-dcnode-id="5135" instrument_node="">
</span></p><span data-dcnode-id="5133" instrument_node="">
</span><h4 data-dcnode-id="5123"><span class="mw-headline" data-dcnode-id="5131" id="Approval_threshold"><span data-dcnode-id="5132" instrument_node="">Approval threshold</span></span><span class="mw-editsection" data-dcnode-id="5124"><span class="mw-editsection-bracket" data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">[</span></span><a data-dcnode-id="5127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D14" title="Edit section: Approval threshold"><span data-dcnode-id="5128" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5122" instrument_node="">
</span><p data-dcnode-id="5116"><span data-dcnode-id="5121" instrument_node="">Another way to deal with multiple sincere votes is to augment the ordinal preference model with an approval or acceptance threshold.  An approval threshold divides all of the candidates into two sets, those the voter approves of and those the voter does not approve of.  A voter can approve of more than one candidate and still prefer one approved candidate to another approved candidate.  Acceptance thresholds are similar.  With such a threshold, a voter simply votes for every candidate that meets or exceeds the threshold.</span><sup class="reference" data-dcnode-id="5118" id="cite_ref-probstrat_69-2"><a data-dcnode-id="5119" href="#cite_note-probstrat-69"><span data-dcnode-id="5120" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5117" instrument_node="">
</span></p><p data-dcnode-id="5107"><span data-dcnode-id="5115" instrument_node="">With threshold voting, it is still possible to not elect the Condorcet winner and instead elect the Condorcet loser when they both exist.  However, according to Steven Brams, this represents a strength rather than a weakness of approval voting.  Without providing specifics, he argues that the pragmatic judgements of voters about which candidates are acceptable should take precedence over the </span><a class="mw-redirect" data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condorcet_criterion" title="Condorcet criterion"><span data-dcnode-id="5114" instrument_node="">Condorcet criterion</span></a><span data-dcnode-id="5112" instrument_node=""> and other social choice criteria.</span><sup class="reference" data-dcnode-id="5109" id="cite_ref-critstrats_76-0"><a data-dcnode-id="5110" href="#cite_note-critstrats-76"><span data-dcnode-id="5111" instrument_node="">[76]</span></a></sup><span data-dcnode-id="5108" instrument_node="">
</span></p><span data-dcnode-id="5106" instrument_node="">
</span><h3 data-dcnode-id="5096"><span class="mw-headline" data-dcnode-id="5104" id="Strategy_with_cardinal_utilities"><span data-dcnode-id="5105" instrument_node="">Strategy with cardinal utilities</span></span><span class="mw-editsection" data-dcnode-id="5097"><span class="mw-editsection-bracket" data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">[</span></span><a data-dcnode-id="5100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D15" title="Edit section: Strategy with cardinal utilities"><span data-dcnode-id="5101" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5095" instrument_node="">
</span><p data-dcnode-id="5084"><span data-dcnode-id="5094" instrument_node="">Voting strategy under approval is guided by two competing features of approval voting.  On the one hand, approval voting fails the </span><a data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Later-no-harm_criterion" title="Later-no-harm criterion"><span data-dcnode-id="5093" instrument_node="">later-no-harm criterion</span></a><span data-dcnode-id="5091" instrument_node="">, so voting for a candidate can cause that candidate to win instead of a candidate more preferred by that voter.  On the other hand, approval voting satisfies the </span><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monotonicity_criterion" title="Monotonicity criterion"><span data-dcnode-id="5090" instrument_node="">monotonicity criterion</span></a><span data-dcnode-id="5088" instrument_node="">, so not voting for a candidate can never help that candidate win, but can cause that candidate to lose to a less preferred candidate.  Either way, the voter can risk getting a less preferred election winner.  A voter can balance the risk-benefit trade-offs by considering the voter's cardinal utilities, particularly via the </span><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Von_Neumann%25E2%2580%2593Morgenstern_utility_theorem" title="Von Neumann–Morgenstern utility theorem"><span data-dcnode-id="5087" instrument_node="">von Neumann–Morgenstern utility theorem</span></a><span data-dcnode-id="5085" instrument_node="">, and the probabilities of how others vote.
</span></p><p data-dcnode-id="5069"><span data-dcnode-id="5083" instrument_node="">A </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tactical_voting%23Myerson-Weber_strategy" title="Tactical voting"><span data-dcnode-id="5082" instrument_node="">rational voter model</span></a><span data-dcnode-id="5080" instrument_node=""> described by </span><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roger_Myerson" title="Roger Myerson"><span data-dcnode-id="5079" instrument_node="">Myerson</span></a><span data-dcnode-id="5077" instrument_node=""> and Weber specifies an approval voting strategy that votes for those candidates that have a positive prospective rating.</span><sup class="reference" data-dcnode-id="5074" id="cite_ref-77"><a data-dcnode-id="5075" href="#cite_note-77"><span data-dcnode-id="5076" instrument_node="">[77]</span></a></sup><span data-dcnode-id="5073" instrument_node="">  This strategy is optimal in the sense that it maximizes the voter's </span><a data-dcnode-id="5071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utility%23Expected_utility" title="Utility"><span data-dcnode-id="5072" instrument_node="">expected utility</span></a><span data-dcnode-id="5070" instrument_node="">, subject to the constraints of the model and provided the number of other voters is sufficiently large.
</span></p><p data-dcnode-id="5063"><span data-dcnode-id="5068" instrument_node="">An optimal approval vote always votes for the most preferred candidate and not for the least preferred candidate.  However, an optimal vote can require voting for a candidate and not voting for a more preferred candidate if there 4 candidates or more.</span><sup class="reference" data-dcnode-id="5065" id="cite_ref-78"><a data-dcnode-id="5066" href="#cite_note-78"><span data-dcnode-id="5067" instrument_node="">[78]</span></a></sup><span data-dcnode-id="5064" instrument_node="">
</span></p><p data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">Other strategies are also available and coincide with the optimal strategy in special situations.  For example:
</span></p><span data-dcnode-id="5060" instrument_node="">
</span><ul data-dcnode-id="5045"><li data-dcnode-id="5055"><span data-dcnode-id="5059" instrument_node="">Vote for the candidates that have above average utility.  This strategy coincides with the optimal strategy if the voter thinks that all pairwise ties are equally likely</span><sup class="reference" data-dcnode-id="5056" id="cite_ref-FOOTNOTEBramsFishburn198385_79-0"><a data-dcnode-id="5057" href="#cite_note-FOOTNOTEBramsFishburn198385-79"><span data-dcnode-id="5058" instrument_node="">[79]</span></a></sup></li><span data-dcnode-id="5054" instrument_node="">
</span><li data-dcnode-id="5049"><span data-dcnode-id="5053" instrument_node="">Vote for any candidate that is more preferred than the expected winner and also vote for the expected winner if the expected winner is more preferred than the expected runner-up.  This strategy coincides with the optimal strategy if there are three or fewer candidates or if the pivot probability for a tie between the expected winner and expected runner-up is sufficiently large compared to the other pivot probabilities. This strategy, if used by all voters implies at equilibrium the election of the Condorcet winner whenever it exists.</span><sup class="reference" data-dcnode-id="5050" id="cite_ref-80"><a data-dcnode-id="5051" href="#cite_note-80"><span data-dcnode-id="5052" instrument_node="">[80]</span></a></sup></li><span data-dcnode-id="5048" instrument_node="">
</span><li data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">Vote for the most preferred candidate only.  This strategy coincides with the optimal strategy when there is only one candidate with a positive prospective rating.</span></li></ul><span data-dcnode-id="5044" instrument_node="">
</span><p data-dcnode-id="5038"><span data-dcnode-id="5043" instrument_node="">Another strategy is to vote for the top half of the candidates, the candidates that have an above-median utility. When the voter thinks that others are balancing their votes randomly and evenly, the strategy maximizes the voter's power or efficacy, meaning that it maximizes the probability that the voter will make a difference in deciding which candidate wins.</span><sup class="reference" data-dcnode-id="5040" id="cite_ref-FOOTNOTEBramsFishburn198374,_81_81-0"><a data-dcnode-id="5041" href="#cite_note-FOOTNOTEBramsFishburn198374,_81-81"><span data-dcnode-id="5042" instrument_node="">[81]</span></a></sup><span data-dcnode-id="5039" instrument_node="">
</span></p><p data-dcnode-id="5029"><span data-dcnode-id="5037" instrument_node="">Optimal strategic approval voting fails to satisfy the Condorcet criterion and can elect a </span><a data-dcnode-id="5035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condorcet_loser_criterion" title="Condorcet loser criterion"><span data-dcnode-id="5036" instrument_node="">Condorcet loser</span></a><span data-dcnode-id="5034" instrument_node="">.  Strategic approval voting can guarantee electing the Condorcet winner in some special circumstances.  For example, if all voters are rational and cast a strategically optimal vote based on a common knowledge of how all the other voters vote except for small-probability, statistically independent errors in recording the votes, then the winner will be the Condorcet winner, if one exists.</span><sup class="reference" data-dcnode-id="5031" id="cite_ref-82"><a data-dcnode-id="5032" href="#cite_note-82"><span data-dcnode-id="5033" instrument_node="">[82]</span></a></sup><span data-dcnode-id="5030" instrument_node="">
</span></p><span data-dcnode-id="5028" instrument_node="">
</span><h3 data-dcnode-id="5018"><span class="mw-headline" data-dcnode-id="5026" id="Strategy_examples"><span data-dcnode-id="5027" instrument_node="">Strategy examples</span></span><span class="mw-editsection" data-dcnode-id="5019"><span class="mw-editsection-bracket" data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">[</span></span><a data-dcnode-id="5022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D16" title="Edit section: Strategy examples"><span data-dcnode-id="5023" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5017" instrument_node="">

</span><p data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">In the first scenario, voters all choose their votes based on the assumption that all pairwise ties are equally likely.  As a result, they vote for any candidate with an above-average utility.  Most voters vote for only their first choice.  Only the Knoxville faction also votes for its second choice, Chattanooga.  As a result, the winner is Memphis, the Condorcet loser, with Chattanooga coming in second place.  In this scenario, the winner has minority approval (more voters disapproved than approved) and all the others had even less support, reflecting the position that no choice gave an above-average utility to a majority of voters.
</span></p><p data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">In the second scenario, all of the voters expect that Memphis is the likely winner, that Chattanooga is the likely runner-up, and that the pivot probability for a Memphis-Chattanooga tie is much larger than the pivot probabilities of any other pair-wise ties.  As a result, each voter votes for any candidate they prefer more than the leading candidate, and also vote for the leading candidate if they prefer that candidate more than the expected runner-up. Each remaining scenario follows a similar pattern of expectations and voting strategies.
</span></p><p data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">In the second scenario, there is a three-way tie for first place.  This happens because the expected winner, Memphis, was the Condorcet loser and was also ranked last by any voter that did not rank it first.
</span></p><p data-dcnode-id="4689"><span data-dcnode-id="4693" instrument_node="">Only in the last scenario does the actual winner and runner-up match the expected winner and runner-up.  As a result, this can be considered a stable strategic voting scenario. In the language of </span><a data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Game_theory" title="Game theory"><span data-dcnode-id="4692" instrument_node="">game theory</span></a><span data-dcnode-id="4690" instrument_node="">, this is an "equilibrium."  In this scenario, the winner is also the Condorcet winner.
</span></p><span data-dcnode-id="4688" instrument_node="">
</span><h3 data-dcnode-id="4678"><span class="mw-headline" data-dcnode-id="4686" id="Dichotomous_cutoff"><span data-dcnode-id="4687" instrument_node="">Dichotomous cutoff</span></span><span class="mw-editsection" data-dcnode-id="4679"><span class="mw-editsection-bracket" data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node="">[</span></span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D17" title="Edit section: Dichotomous cutoff"><span data-dcnode-id="4683" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4677" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="4640" role="presentation"><tbody data-dcnode-id="4641"><tr data-dcnode-id="4642"><td class="mbox-image" data-dcnode-id="4673"><div data-dcnode-id="4674" style="width:52px"><a class="image" data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="4676" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="4643"><div class="mbox-text-span" data-dcnode-id="4644"><span data-dcnode-id="4672" instrument_node="">This section </span><b data-dcnode-id="4668"><span data-dcnode-id="4671" instrument_node="">needs additional citations for </span><a data-dcnode-id="4669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="4670" instrument_node="">verification</span></a></b><span data-dcnode-id="4667" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4659"><span data-dcnode-id="4666" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="4664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit"><span data-dcnode-id="4665" instrument_node="">improve this article</span></a><span data-dcnode-id="4663" instrument_node=""> by </span><a data-dcnode-id="4661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="4662" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="4660" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="4658" instrument_node=""> </span><span class="date-container" data-dcnode-id="4652"><i data-dcnode-id="4653"><span data-dcnode-id="4657" instrument_node="">(</span><span class="date" data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">June 2019</span></span><span data-dcnode-id="4654" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="4645"><i data-dcnode-id="4646"><span data-dcnode-id="4651" instrument_node=""> (</span><small data-dcnode-id="4648"><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="4650" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="4647" instrument_node="">)</span></i></span></div></td></tr></tbody></table><p data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">As this voting method is cardinal rather than ordinal, it is possible to model voters in a way that does not simplify to an ordinal method. Modelling voters with a 'dichotomous cutoff' assumes a voter has an immovable approval cutoff, while having meaningful cardinal preferences. This means that rather than voting for their top 3 candidates, or all candidates above the average approval (which may result in their vote changing if one candidate drops out, resulting in a system that does not satisfy IIA), they instead vote for all candidates above a certain approval 'cutoff' that they have decided. This cutoff does not change, regardless of which and how many candidates are running, so when all available alternatives are either above or below the cutoff, the voter votes for all or none of the candidates, despite preferring some over others.  This could be imagined to reflect a case where many voters become disenfranchised and apathetic if they see no candidates they approve of. In a case such as this, many voters may have an internal cutoff, and would not simply vote for their top 3, or the above average candidates, although that is not to say that it is necessarily entirely immovable.
</span></p><p data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">For example, in this scenario, voters are voting for candidates with approval above 50% (bold signifies that the voters voted for the candidate):

</span><h2 data-dcnode-id="4007"><span class="mw-headline" data-dcnode-id="4015" id="Compliance_with_voting_system_criteria"><span data-dcnode-id="4016" instrument_node="">Compliance with voting system criteria</span></span><span class="mw-editsection" data-dcnode-id="4008"><span class="mw-editsection-bracket" data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">[</span></span><a data-dcnode-id="4011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D18" title="Edit section: Compliance with voting system criteria"><span data-dcnode-id="4012" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4006" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="3969" role="presentation"><tbody data-dcnode-id="3970"><tr data-dcnode-id="3971"><td class="mbox-image" data-dcnode-id="4002"><div data-dcnode-id="4003" style="width:52px"><a class="image" data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="4005" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3972"><div class="mbox-text-span" data-dcnode-id="3973"><span data-dcnode-id="4001" instrument_node="">This section </span><b data-dcnode-id="3997"><span data-dcnode-id="4000" instrument_node="">needs additional citations for </span><a data-dcnode-id="3998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3999" instrument_node="">verification</span></a></b><span data-dcnode-id="3996" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3988"><span data-dcnode-id="3995" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="3993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit"><span data-dcnode-id="3994" instrument_node="">improve this article</span></a><span data-dcnode-id="3992" instrument_node=""> by </span><a data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3991" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3989" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="3987" instrument_node=""> </span><span class="date-container" data-dcnode-id="3981"><i data-dcnode-id="3982"><span data-dcnode-id="3986" instrument_node="">(</span><span class="date" data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">June 2019</span></span><span data-dcnode-id="3983" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3974"><i data-dcnode-id="3975"><span data-dcnode-id="3980" instrument_node=""> (</span><small data-dcnode-id="3977"><a data-dcnode-id="3978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3979" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3976" instrument_node="">)</span></i></span></div></td></tr></tbody></table><p data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Most of the mathematical criteria by which voting systems are compared were formulated for voters with ordinal preferences. In this case, approval voting requires voters to make an additional decision of where to put their approval cutoff (see examples above). Depending on how this decision is made, approval voting satisfies different sets of criteria.
</span></p><p data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">There is no ultimate authority on which criteria should be considered, but the following are criteria that many voting theorists accept and consider desirable:
</span></p><span data-dcnode-id="3964" instrument_node="">
</span><ul data-dcnode-id="3894"><li data-dcnode-id="3960"><a data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unrestricted_domain" title="Unrestricted domain"><span data-dcnode-id="3963" instrument_node="">Unrestricted domain</span></a><span data-dcnode-id="3961" instrument_node="">—A voter may have any preference ordering among the alternatives.</span></li><span data-dcnode-id="3959" instrument_node="">
</span><li data-dcnode-id="3955"><a class="mw-redirect" data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-dictatorship" title="Non-dictatorship"><span data-dcnode-id="3958" instrument_node="">Non-dictatorship</span></a><span data-dcnode-id="3956" instrument_node="">—There does not exist a single voter whose preference for the alternatives always determines the outcome regardless of other voters' preferences.</span></li><span data-dcnode-id="3954" instrument_node="">
</span><li data-dcnode-id="3947"><a data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pareto_efficiency" title="Pareto efficiency"><span data-dcnode-id="3953" instrument_node="">Pareto efficiency</span></a><span data-dcnode-id="3951" instrument_node="">—If every voter prefers candidate A to all other candidates, then A must be elected. (from </span><a data-dcnode-id="3949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arrow%2527s_impossibility_theorem" title="Arrow's impossibility theorem"><span data-dcnode-id="3950" instrument_node="">Arrow's impossibility theorem</span></a><span data-dcnode-id="3948" instrument_node="">)</span></li><span data-dcnode-id="3946" instrument_node="">
</span><li data-dcnode-id="3942"><a data-dcnode-id="3944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Majority_criterion" title="Majority criterion"><span data-dcnode-id="3945" instrument_node="">Majority criterion</span></a><span data-dcnode-id="3943" instrument_node="">—If there exists a majority that ranks (or rates) a single candidate higher than all other candidates, does that candidate always win?</span></li><span data-dcnode-id="3941" instrument_node="">

</span><p data-dcnode-id="3614"><span data-dcnode-id="3621" instrument_node="">Approval voting satisfies the </span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mutual_majority_criterion" title="Mutual majority criterion"><span data-dcnode-id="3620" instrument_node="">mutual majority criterion</span></a><span data-dcnode-id="3618" instrument_node=""> and </span><a data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smith_criterion" title="Smith criterion"><span data-dcnode-id="3617" instrument_node="">Smith criterion</span></a><span data-dcnode-id="3615" instrument_node=""> when voters' preferences are dichotomous; this is because the winner will be someone that the most voters prefer above all others, or that ties with other candidates but the group of tied candidates is preferred by more voters than any candidate not in the group.
</span></p><span data-dcnode-id="3613" instrument_node="">
</span><h2 data-dcnode-id="3603"><span class="mw-headline" data-dcnode-id="3611" id="Other_issues_and_comparisons"><span data-dcnode-id="3612" instrument_node="">Other issues and comparisons</span></span><span class="mw-editsection" data-dcnode-id="3604"><span class="mw-editsection-bracket" data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">[</span></span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D19" title="Edit section: Other issues and comparisons"><span data-dcnode-id="3608" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3602" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="3565" role="presentation"><tbody data-dcnode-id="3566"><tr data-dcnode-id="3567"><td class="mbox-image" data-dcnode-id="3598"><div data-dcnode-id="3599" style="width:52px"><a class="image" data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="3601" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3568"><div class="mbox-text-span" data-dcnode-id="3569"><span data-dcnode-id="3597" instrument_node="">This section </span><b data-dcnode-id="3593"><span data-dcnode-id="3596" instrument_node="">needs additional citations for </span><a data-dcnode-id="3594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3595" instrument_node="">verification</span></a></b><span data-dcnode-id="3592" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3584"><span data-dcnode-id="3591" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit"><span data-dcnode-id="3590" instrument_node="">improve this article</span></a><span data-dcnode-id="3588" instrument_node=""> by </span><a data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3587" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3585" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="3583" instrument_node=""> </span><span class="date-container" data-dcnode-id="3577"><i data-dcnode-id="3578"><span data-dcnode-id="3582" instrument_node="">(</span><span class="date" data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">June 2019</span></span><span data-dcnode-id="3579" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3570"><i data-dcnode-id="3571"><span data-dcnode-id="3576" instrument_node=""> (</span><small data-dcnode-id="3573"><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3575" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3572" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3564" instrument_node="">
</span><ul data-dcnode-id="3516"><li data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">Approval voting can allow voters to cast a compromise vote without abandoning their favorite candidate as long as voters accept the potential of that compromise vote resulting in the defeat of their favorite. Plurality voting can lead to voters abandoning their first choice in order to help a "lesser of evils" to win.</span></li><span data-dcnode-id="3561" instrument_node="">
</span><li data-dcnode-id="3556"><span data-dcnode-id="3560" instrument_node="">However, approval voting forces voters to face an initial voting tactical decision as to whether to vote for (or </span><i data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">approve of</span></i><span data-dcnode-id="3557" instrument_node="">) their second-choice candidate or not. The voter may want to retain expression of preference of their favorite candidate over their second choice.  But that does not allow the same voter to express preference of their second choice over any other.</span></li><span data-dcnode-id="3555" instrument_node="">
</span><li data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Approval ballots can be counted by existing machines designed for plurality elections, as ballots are cast, so that final tallies are immediately available after the election, without any upgrades to equipment. Approval counting can be completed at the local level and conveniently summed at the regional or national level.</span></li><span data-dcnode-id="3552" instrument_node="">
</span><li data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">If voters are sincere, approval voting would elect centrists at least as often as moderates of each extreme. If backers of relatively extreme candidates are insincere and "bullet vote" for that first choice, they can help that candidate defeat a compromise candidate who would have won if every voter had cast sincere preferences.</span></li><span data-dcnode-id="3549" instrument_node="">
</span><li data-dcnode-id="3544"><span data-dcnode-id="3548" instrument_node="">If voters are sincere, candidates trying to win an approval voting election might need as much as 100% approval to beat a strong competitor, and would have to find solutions that are fair to everyone to do so. However, a candidate may win a </span><a class="mw-redirect" data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_voting_system" title="Plurality voting system"><span data-dcnode-id="3547" instrument_node="">plurality</span></a><span data-dcnode-id="3545" instrument_node=""> race by promising many perks to a simple majority or even a plurality of voters at the expense of the smaller voting groups.</span></li><span data-dcnode-id="3543" instrument_node="">
</span><li data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Approval voting fails the majority criterion, because a candidate who is preferred by a majority of voters is not always elected. In some cases approval voting will elect a candidate that has greater overall utility than a candidate preferred by a mere majority, if the majority also approves a compromise candidate that includes representation of the minority. In other cases, with elections having three or more candidates, approval voting will fail to elect the candidate with greater overall utility also preferred by a majority, if a less moderate candidate within the majority view gains enough approvals from the majority to win, while core supporters of the less moderate candidate are more selective (i.e. vote only for the extreme candidate), leaving a third sizable minority unrepresented.  It can also fail a different majority criterion in that the winner can win with fewer than half the votes approving.</span></li><span data-dcnode-id="3540" instrument_node="">
</span><li data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">Suppose a candidate is eliminated (say, for medical reasons) between a primary election and the party convention. With plurality voting, voters who supported the eliminated candidate lose their franchise. Approval voting affords representation to voters by counting their approvals among remaining candidates.</span></li><span data-dcnode-id="3537" instrument_node="">
</span><li data-dcnode-id="3529"><span data-dcnode-id="3536" instrument_node="">Approval voting without write-ins is easily reversed as </span><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disapproval_voting" title="Disapproval voting"><span data-dcnode-id="3535" instrument_node="">disapproval voting</span></a><span data-dcnode-id="3533" instrument_node=""> where a choice is disavowed, as is already required in other measures in politics (e.g., representative </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recall_election" title="Recall election"><span data-dcnode-id="3532" instrument_node="">recall</span></a><span data-dcnode-id="3530" instrument_node="">).</span></li><span data-dcnode-id="3528" instrument_node="">
</span><li data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">Unlike plurality voting, approval voting allows voters to block a candidate by voting for several alternatives instead of just one, increasing the probability an alternative wins.</span></li><span data-dcnode-id="3525" instrument_node="">
</span><li data-dcnode-id="3517"><span data-dcnode-id="3524" instrument_node="">In contentious elections with large groups of organized voters who prefer their favorite candidate vastly over all others, approval voting may revert to </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_voting" title="Plurality voting"><span data-dcnode-id="3523" instrument_node="">plurality voting</span></a><span data-dcnode-id="3521" instrument_node="">. Some voters support only their single favored candidate when they perceive the other candidates more as competitors to their preferred candidate than as compromise choices. Score voting and </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Majority_judgment" title="Majority judgment"><span data-dcnode-id="3520" instrument_node="">majority judgment</span></a><span data-dcnode-id="3518" instrument_node=""> allow these voters to give intermediate approval ratings, but at the cost of added ballot complexity and longer ballot counts.</span></li></ul><span data-dcnode-id="3515" instrument_node="">
</span><h2 data-dcnode-id="3505"><span class="mw-headline" data-dcnode-id="3513" id="Variants_and_generalizations"><span data-dcnode-id="3514" instrument_node="">Variants and generalizations</span></span><span class="mw-editsection" data-dcnode-id="3506"><span class="mw-editsection-bracket" data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">[</span></span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D20" title="Edit section: Variants and generalizations"><span data-dcnode-id="3510" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3504" instrument_node="">
</span><div aria-label="Portals" class="noprint plainlist portalbox portalborder tright" data-dcnode-id="3491" role="navigation"><span data-dcnode-id="3501" instrument_node="">
</span><ul data-dcnode-id="3492"><span data-dcnode-id="3500" instrument_node="">
</span><li data-dcnode-id="3493"><span data-dcnode-id="3497"><a class="image" data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_coloured_voting_box.svg"><img alt="icon" class="noviewer thumbborder" data-dcnode-id="3499" data-file-height="160" data-file-width="160" decoding="async" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/28px-A_coloured_voting_box.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/42px-A_coloured_voting_box.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/56px-A_coloured_voting_box.svg.png 2x" width="28"></a></span><span data-dcnode-id="3494"><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portal%3APolitics" title="Portal:Politics"><span data-dcnode-id="3496" instrument_node="">Politics portal</span></a></span></li></ul></div><p data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Some variants and generalizations of approval voting are:
</span></p><ul data-dcnode-id="3464"><li data-dcnode-id="3485"><a data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiwinner_approval_voting" title="Multiwinner approval voting"><span data-dcnode-id="3488" instrument_node="">Multiwinner approval voting</span></a><span data-dcnode-id="3486" instrument_node=""> — multiple candidates may be elected, instead of just one.</span></li><span data-dcnode-id="3484" instrument_node="">
</span><li data-dcnode-id="3480"><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fractional_approval_voting" title="Fractional approval voting"><span data-dcnode-id="3483" instrument_node="">Fractional approval voting</span></a><span data-dcnode-id="3481" instrument_node=""> — the election outcome is a distribution - assigning a fraction to each candidate.</span></li><span data-dcnode-id="3479" instrument_node="">
</span><li data-dcnode-id="3475"><a class="mw-redirect" data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Party-approval_voting" title="Party-approval voting"><span data-dcnode-id="3478" instrument_node="">Party-approval voting</span></a><span data-dcnode-id="3476" instrument_node=""> — voters approve of parties, rather than individual candidates.</span></li><span data-dcnode-id="3474" instrument_node="">
</span><li data-dcnode-id="3470"><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Combined_approval_voting" title="Combined approval voting"><span data-dcnode-id="3473" instrument_node="">Combined approval voting</span></a><span data-dcnode-id="3471" instrument_node=""> — form of score voting with 3 levels that uses a scale of (-1, 0, +1) or (0, 1, 2).</span></li><span data-dcnode-id="3469" instrument_node="">
</span><li data-dcnode-id="3465"><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Score_voting" title="Score voting"><span data-dcnode-id="3468" instrument_node="">Score voting</span></a><span data-dcnode-id="3466" instrument_node=""> (also called range voting) — each voter can give any score to any candidate, rather than just 0 or 1.</span></li></ul><span data-dcnode-id="3463" instrument_node="">
</span><h2 data-dcnode-id="3453"><span class="mw-headline" data-dcnode-id="3461" id="Notes"><span data-dcnode-id="3462" instrument_node="">Notes</span></span><span class="mw-editsection" data-dcnode-id="3454"><span class="mw-editsection-bracket" data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">[</span></span><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApproval_voting%26action%3Dedit%26section%3D21" title="Edit section: Notes"><span data-dcnode-id="3458" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3452" instrument_node="">
</span><div class="reflist reflist-columns references-column-width reflist-lower-alpha" data-dcnode-id="3371" style="column-width: 30em;"><span data-dcnode-id="3449" instrument_node="">
</span><ol class="references" data-dcnode-id="3372"><span data-dcnode-id="3448" instrument_node="">
</span><li data-dcnode-id="3439" id="cite_note-83"><span class="mw-cite-backlink" data-dcnode-id="3444"><b data-dcnode-id="3445"><a aria-label="Jump up" data-dcnode-id="3446" href="#cite_ref-83" title="Jump up"><span data-dcnode-id="3447" instrument_node="">^</span></a></b></span><span data-dcnode-id="3443" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Consistency implies participation, but not vice versa. For example, Score Voting complies with participation and consistency, but median ratings satisfies participation and fails consistency.</span></span><span data-dcnode-id="3440" instrument_node="">
</span></li><span data-dcnode-id="3438" instrument_node="">
</span><li data-dcnode-id="3429" id="cite_note-84"><span class="mw-cite-backlink" data-dcnode-id="3434"><b data-dcnode-id="3435"><a aria-label="Jump up" data-dcnode-id="3436" href="#cite_ref-84" title="Jump up"><span data-dcnode-id="3437" instrument_node="">^</span></a></b></span><span data-dcnode-id="3433" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">When the criterion is failed, the result is always a tie between the alternative preferred by all voters and one or more other alternatives. The criterion can only be failed when the tied candidates are approved on every ballot cast in the election.</span></span><span data-dcnode-id="3430" instrument_node="">
</span></li><span data-dcnode-id="3428" instrument_node="">
</span><li data-dcnode-id="3419" id="cite_note-85"><span class="mw-cite-backlink" data-dcnode-id="3424"><b data-dcnode-id="3425"><a aria-label="Jump up" data-dcnode-id="3426" href="#cite_ref-85" title="Jump up"><span data-dcnode-id="3427" instrument_node="">^</span></a></b></span><span data-dcnode-id="3423" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">The probability of failing this criterion vanishes asymptotically as the number of voters grows.</span></span><span data-dcnode-id="3420" instrument_node="">
</span></li><span data-dcnode-id="3418" instrument_node="">
</span><li data-dcnode-id="3406" id="cite_note-86"><span class="mw-cite-backlink" data-dcnode-id="3414"><b data-dcnode-id="3415"><a aria-label="Jump up" data-dcnode-id="3416" href="#cite_ref-86" title="Jump up"><span data-dcnode-id="3417" instrument_node="">^</span></a></b></span><span data-dcnode-id="3413" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3408"><span data-dcnode-id="3412" instrument_node="">If voters are forced to determine their approval cutoff </span><i data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">without</span></i><span data-dcnode-id="3409" instrument_node=""> knowing the available alternatives prior to an election, there can exist two alternatives for which one voter’s preference determines the winner regardless of another voter’s preference. For example, consider a cardinal scale from 0 to 1, with 0.5 as the cutoff. The criterion is personal wealth for voter A and quality of drinking water for voter B. There can exist two candidates, such that voter A’s cardinal preferences are 0.49 and 0.51, while voter B’s preferences are 0 and 0.49. Voter A’s preferences, despite how trivial, determine the outcome of the election regardless of voter B’s preferences, because voter B is forced to abstain, even while having a stronger preference. </span></span><span data-dcnode-id="3407" instrument_node="">
</span></li><span data-dcnode-id="3405" instrument_node="">
</span><li data-dcnode-id="3394" id="cite_note-87"><span class="mw-cite-backlink" data-dcnode-id="3401"><b data-dcnode-id="3402"><a aria-label="Jump up" data-dcnode-id="3403" href="#cite_ref-87" title="Jump up"><span data-dcnode-id="3404" instrument_node="">^</span></a></b></span><span data-dcnode-id="3400" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3396"><span data-dcnode-id="3399" instrument_node="">Pareto efficiency is implied by, and is weaker than the combination of Monotonicity, IIA and Non-Imposition (that every possible societal preference order should be achievable by some set of individual preference orders, which is the case in all of these scenarios). These three conditions were in fact specified in the original statement of </span><a data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arrow%2527s_impossibility_theorem" title="Arrow's impossibility theorem"><span data-dcnode-id="3398" instrument_node="">Arrow's impossibility theorem</span></a></span><span data-dcnode-id="3395" instrument_node="">
</span></li><span data-dcnode-id="3393" instrument_node="">
</span><li data-dcnode-id="3384" id="cite_note-88"><span class="mw-cite-backlink" data-dcnode-id="3389"><b data-dcnode-id="3390"><a aria-label="Jump up" data-dcnode-id="3391" href="#cite_ref-88" title="Jump up"><span data-dcnode-id="3392" instrument_node="">^</span></a></b></span><span data-dcnode-id="3388" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">The model assumes a voter has an immovable approval cutoff while also having meaningful cardinal preferences. When all available alternatives are either above or below the cutoff, the voter votes for all or none of the candidates, despite preferring some over others.</span></span><span data-dcnode-id="3385" instrument_node="">
</span></li><span data-dcnode-id="3383" instrument_node="">
</span><li data-dcnode-id="3374" id="cite_note-89"><span class="mw-cite-backlink" data-dcnode-id="3379"><b data-dcnode-id="3380"><a aria-label="Jump up" data-dcnode-id="3381" href="#cite_ref-89" title="Jump up"><span data-dcnode-id="3382" instrument_node="">^</span></a></b></span><span data-dcnode-id="3378" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">In a dichotomous preference society, voters do not have a preferred ordering for the alternatives, such as A&gt;B&gt;C. Each voter has a binary "yes" or "no" rating for any alternative, while having no degree of preference among alternatives with either rating.</span></span><span data-dcnode-id="3375" instrument_node="">
</span></li><span data-dcnode-id="3373" instrument_node="">
