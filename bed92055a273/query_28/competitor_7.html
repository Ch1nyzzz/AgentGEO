</span><div data-dcnode-id="749"><p data-dcnode-id="1106"><em data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Revised and Updated July 26, 2016</span></em><span data-dcnode-id="1107" instrument_node=""> </span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1104" instrument_node="">Those who believe that “voting online is the future” or that it is “possible given current technology” to create a secure online voting system are dangerously mistaken.</span><a data-dcnode-id="1102" href="#_ftn1" id="_ftnref1" name="_ftnref1"><span data-dcnode-id="1103" instrument_node="">[1]</span></a><span data-dcnode-id="1101" instrument_node=""> According to computer experts, Internet voting is vulnerable to cyber-attack and fraud—vulnerabilities inherent in current hardware and software, as well as the basic manner in which the Internet is organized. It is unlikely that these vulnerabilities will be eliminated at any time in the near future.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1098" instrument_node="">State legislators and secretaries of state who are considering implementing Internet voting, or even the delivery by e-mail of voted ballots from registered voters, should reconsider such measures. These programs would be vulnerable to a variety of well-known cyber-attacks, any of which could be catastrophic. Such attacks could be “launched by anyone from a disaffected lone individual to a well-financed enemy agency outside the reach of U.S. law.”</span><a data-dcnode-id="1096" href="#_ftn2" id="_ftnref2" name="_ftnref2"><span data-dcnode-id="1097" instrument_node="">[2]</span></a><span data-dcnode-id="1095" instrument_node=""> They also “could result in large-scale, selective voter disenfranchisement,” privacy violations, vote buying and selling, and vote switching “even to the extent of reversing the outcome of many elections at once….”</span><a data-dcnode-id="1093" href="#_ftn3" id="_ftnref3" name="_ftnref3"><span data-dcnode-id="1094" instrument_node="">[3]</span></a><span data-dcnode-id="1092" instrument_node=""> The biggest danger, however, is that such attacks “could succeed and yet go completely undetected.”</span><a data-dcnode-id="1090" href="#_ftn4" id="_ftnref4" name="_ftnref4"><span data-dcnode-id="1091" instrument_node="">[4]</span></a><span data-dcnode-id="1089" instrument_node=""> </span></p><span data-dcnode-id="1087" instrument_node="">
</span><h3 data-dcnode-id="1084"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Expert Analyses of Internet Voting </span></strong></h3><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1079"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">California.</span></strong><span data-dcnode-id="1080" instrument_node=""> Convened by former California Secretary of State Bill Jones, the California Internet Voting Task Force performed the first serious evaluation of Internet voting. The task force used its proximity to Silicon Valley—the heart of the U.S. computer industry—to involve front-line computer experts in its evaluation of the feasibility of and security issues involved in Internet voting. Those experts came from a variety of software and hardware companies and institutions including Compaq Computers, Oracle, Cisco Systems, and the California Institute of Technology. </span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1077" instrument_node="">In its final report, issued on January 18, 2000, the task force defined Internet voting as “an election system that uses electronic ballots that would allow voters to transmit their voted ballot to election officials over the Internet.”</span><a data-dcnode-id="1075" href="#_ftn5" id="_ftnref5" name="_ftnref5"><span data-dcnode-id="1076" instrument_node="">[5]</span></a><span data-dcnode-id="1074" instrument_node=""> It concluded that “[p]otential criminal electronic attacks on computer software, such as destructive ‘viruses’ or ‘Trojan Horse’ software, create a serious threat to Internet voting.”</span><a data-dcnode-id="1072" href="#_ftn6" id="_ftnref6" name="_ftnref6"><span data-dcnode-id="1073" instrument_node="">[6]</span></a><span data-dcnode-id="1071" instrument_node=""> The group further believed that “additional technical innovations are necessary before remote Internet voting can be widely implemented….”</span><a data-dcnode-id="1069" href="#_ftn7" id="_ftnref7" name="_ftnref7"><span data-dcnode-id="1070" instrument_node="">[7]</span></a><span data-dcnode-id="1068" instrument_node=""> </span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1059"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">National Science Foundation.</span></strong><span data-dcnode-id="1063" instrument_node=""> In 2001, a report commissioned by the National Science Foundation (NSF) reached a similar conclusion. The experts convened by the NSF found that although remote Internet voting would maximize convenience, “it also poses substantial security risks” that “current and near-term technologies are inadequate to address.” In fact, “remote Internet voting systems pose significant risk to the integrity of the voting process, and should not be fielded for use in public elections until substantial technical and social science issues are addressed.”</span><a data-dcnode-id="1061" href="#_ftn8" id="_ftnref8" name="_ftnref8"><span data-dcnode-id="1062" instrument_node="">[8]</span></a><span data-dcnode-id="1060" instrument_node=""> </span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">The NSF report also noted that “Internet-based voter registration poses significant risk to the integrity of the voting process, and should not be implemented for the foreseeable future.” It argued that the “voter registration process is already one of the weakest links in our electoral process” and that “introduction of Internet-based registration without first addressing the considerable flaws in our current system would only serve to greatly exacerbate the risks to which we are already exposed.” The NSF report concluded that: </span></p><span data-dcnode-id="1055" instrument_node="">
</span><blockquote data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">While information already in the domain of election officials may be updated remotely, given appropriate authentication protocols, initial registration conducted online cannot establish the identity of the registrant without the transmission of unique biometric (fingerprint or retinal scan) data and an existing database with which to verify the data. Online registration without the appropriate security infrastructure would be at high risk for automated fraud (i.e., the potential undetected registration of large numbers of fraudulent voters).</span><a data-dcnode-id="1052" href="#_ftn9" id="_ftnref9" name="_ftnref9"><span data-dcnode-id="1053" instrument_node="">[9]</span></a><span data-dcnode-id="1051" instrument_node=""> </span></blockquote><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1037"><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Pentagon Internet Voting Project</span></strong><em data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">. </span></em><span data-dcnode-id="1044" instrument_node="">Because of the severe problems that overseas military and civilian personnel experience when voting, Congress directed the Federal Voting Assistance Program (FVAP) office at the U.S. Department of Defense to develop an Internet voting system pilot project for use in the 2004 federal election.</span><a data-dcnode-id="1042" href="#_ftn10" id="_ftnref10" name="_ftnref10"><span data-dcnode-id="1043" instrument_node="">[10]</span></a><span data-dcnode-id="1041" instrument_node=""> FVAP is responsible for administering the Uniformed and Overseas Citizens Absentee Voting Act, a federal law that requires all states to “permit absent uniformed services voters and overseas voters to use absentee registration procedures and to vote by absentee ballot in general, special, primary, and runoff elections for Federal office.”</span><a data-dcnode-id="1039" href="#_ftn11" id="_ftnref11" name="_ftnref11"><span data-dcnode-id="1040" instrument_node="">[11]</span></a><span data-dcnode-id="1038" instrument_node=""> </span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1035" instrument_node="">Military voters in particular have an unacceptably high disenfranchisement rate that is caused by the long delays associated with mailing absentee ballots to and from remote, overseas locations and war zones.</span><a data-dcnode-id="1033" href="#_ftn12" id="_ftnref12" name="_ftnref12"><span data-dcnode-id="1034" instrument_node="">[12]</span></a><span data-dcnode-id="1032" instrument_node=""> The proposed Secure Electronic Registration and Voting Experiment (SERVE) would have allowed remote Internet registration and voting by overseas military and civilian personnel in 50 counties in seven states (Arkansas, Florida, Hawaii, North Carolina, South Carolina, Utah, and Washington), starting with the 2004 South Carolina primary, potentially handling up to 100,000 votes.</span><a data-dcnode-id="1030" href="#_ftn13" id="_ftnref13" name="_ftnref13"><span data-dcnode-id="1031" instrument_node="">[13]</span></a><span data-dcnode-id="1029" instrument_node=""> </span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1026" instrument_node="">However, the SERVE project was canceled after four computer experts—invited by the Pentagon to review the Internet voting system—issued a devastating report.</span><a data-dcnode-id="1024" href="#_ftn14" id="_ftnref14" name="_ftnref14"><span data-dcnode-id="1025" instrument_node="">[14]</span></a><span data-dcnode-id="1023" instrument_node=""> Their analysis, which pointed out vulnerabilities that apply to Internet voting in general and not just to the specifics of the SERVE system, echoed the earlier findings of the California and NSF task forces. These experts concluded that SERVE, an Internet- and PC-based system, would be vulnerable to cyber-attacks including “insider attacks, denial of service attacks, spoofing, automated vote buying, viral attacks on voter PCs, etc.”</span><a data-dcnode-id="1021" href="#_ftn15" id="_ftnref15" name="_ftnref15"><span data-dcnode-id="1022" instrument_node="">[15]</span></a><span data-dcnode-id="1020" instrument_node=""> </span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1017" instrument_node="">While it was not possible to estimate the probability of a successful cyber-attack on any one election, the experts pointed out that the attacks they were “most concerned about are quite easy to perpetrate.” In fact, “there are kits readily available on the Internet that could be modified or used directly for attacking an election.” The experts pointed out “the obvious fact that a U.S. general election offers one of the most tempting targets for cyber-attack in the history of the Internet, whether the attacker’s motive is overtly political or simply self-aggrandizement.”</span><a data-dcnode-id="1015" href="#_ftn16" id="_ftnref16" name="_ftnref16"><span data-dcnode-id="1016" instrument_node="">[16]</span></a><span data-dcnode-id="1014" instrument_node=""> </span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">One of the most serious problems inherent in any remote Internet voting system was that the vulnerabilities found by the computer experts could not be fixed “by design changes or bug fixes to SERVE.” In fact, “these vulnerabilities are fundamental in the architecture of the Internet and of the PC hardware and software that is ubiquitous today.” The experts concluded that the vulnerabilities they found could not be “eliminated for the foreseeable future without some unforeseen radical breakthrough” and that “it is quite possible that they will not be eliminated without a wholesale redesign and replacement of much of the hardware and software security systems that are part of, or connected to, today’s Internet.”</span><a data-dcnode-id="1009" href="#_ftn17" id="_ftnref17" name="_ftnref17"><span data-dcnode-id="1010" instrument_node="">[17]</span></a><span data-dcnode-id="1008" instrument_node=""> No such “wholesale redesign” of the Internet or hardware/software has occurred since the SERVE analysis was issued. </span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">After the Pentagon cancelled the SERVE project, the National Defense Authorization Act of 2005 amended the 2002 provision that had authorized the establishment of SERVE. It directed the Defense Department to implement another Internet voting project if and when the U.S. Election Assistance Commission adopts standards developed by the National Institute of Standards and Technology (NIST) of the U.S. Department of Commerce that would ensure the safe, secure transmission of electronic ballots.</span><a data-dcnode-id="1003" href="#_ftn18" id="_ftnref18" name="_ftnref18"><span data-dcnode-id="1004" instrument_node="">[18]</span></a><span data-dcnode-id="1002" instrument_node=""> </span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="999" instrument_node="">NIST, however, has been unable to establish that secure Internet voting is feasible, because “remote electronic absentee voting from personally-owned devices face a variety of potential attacks on voters and voters’ personal computers” that are “commonplace on the Internet today” and “extremely difficult to protect against.”</span><a data-dcnode-id="997" href="#_ftn19" id="_ftnref19" name="_ftnref19"><span data-dcnode-id="998" instrument_node="">[19]</span></a><span data-dcnode-id="996" instrument_node=""> As a result, Congress repealed the directive for an Internet voting demonstration project in the 2015 National Defense Authorization Act.</span><a data-dcnode-id="994" href="#_ftn20" id="_ftnref20" name="_ftnref20"><span data-dcnode-id="995" instrument_node="">[20]</span></a><span data-dcnode-id="993" instrument_node=""> </span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="984"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Computer Technologists’ Statement on Internet Voting. </span></strong><span data-dcnode-id="988" instrument_node="">In 2008, 32 respected computer scientists from universities across the country, including Stanford University, Princeton University, John Hopkins University, Carnegie Mellon University, Indiana University, Rice University, Purdue University, and the University of Texas at Austin, issued a statement about the vulnerabilities of Internet voting, listing the technical challenges to implementing a safe and secure system.</span><a data-dcnode-id="986" href="#_ftn21" id="_ftnref21" name="_ftnref21"><span data-dcnode-id="987" instrument_node="">[21]</span></a><span data-dcnode-id="985" instrument_node=""> </span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">These scientists warned that there are “serious, potentially insurmountable, technical challenges” to transmitting votes over the Internet in a secure and verifiable manner. They recommended that Internet voting not be adopted until and unless “these technical challenges have been overcome.” The challenges listed included: </span></p><span data-dcnode-id="980" instrument_node="">
</span><ul data-dcnode-id="964"><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Preventing malicious software, firmware, or hardware that can change, fabricate, or delete votes, deceive the user in myriad ways including modifying the ballot presentation, leaking information about votes to enable voter coercion, preventing or discouraging voting, or performing online electioneering; </span></li><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Stopping denial of service attacks from networks of compromised computers (called “botnets”), causing messages to be misrouted, and many other kinds of attacks; </span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Finding a strong mechanism to prevent undetected changes to votes not only by outsiders, but also by insiders such as equipment manufacturers, technicians, system administrators, and election officials who have legitimate access to election software and data; </span></li><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Providing a reliable, unchangeable voter-verified record of votes that is at least as effective for auditing as paper ballots without compromising ballot secrecy; and </span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Designing a system that is reliable and verifiable even though Internet-based attacks can be mounted by anyone anywhere in the world. </span></li><span data-dcnode-id="965" instrument_node="">
</span></ul><p data-dcnode-id="960"><span data-dcnode-id="963" instrument_node="">The problem with all of these challenges, according to the experts, is that neither the software nor the hardware currently exists to overcome these challenges. This problem is exacerbated by the Internet’s existing architecture, which is vulnerable to all types of cyber-attacks that are “difficult or impossible to trace back to their sources.” Because of these problems, “there is ample reason to be skeptical of Internet voting proposals,” and Internet voting would present “an extraordinary and unnecessary risk to democracy.” The computer scientists even recommended against “pilot studies” because the “apparent ‘success’ of such a study absolutely cannot show the absence of problems that, by their nature, may go undetected.”</span><a data-dcnode-id="961" href="#_ftn22" id="_ftnref22" name="_ftnref22"><span data-dcnode-id="962" instrument_node="">[22]</span></a></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">In addition to problems with remote Internet voting, the Verified Voting Foundation (VVF), which includes experts who were involved in the California, NSF, and SERVE task forces and who helped to organize the Computer Technologists’ Statement on Internet Voting, points out problems with the security of an Internet-related measure that 30 states, including Alaska and Arizona, have adopted: the electronic delivery of voted ballots via e-mail attachments.</span><a data-dcnode-id="956" href="#_ftn23" id="_ftnref23" name="_ftnref23"><span data-dcnode-id="957" instrument_node="">[23]</span></a><span data-dcnode-id="955" instrument_node=""> </span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">The VVF states what should be obvious to every computer user from their everyday experiences: The personal computers used by voters to send e-mails are “easily and constantly attacked by viruses, worms, Trojan Horses and spyware.” Indeed, once a voted ballot is e-mailed by a voter to election officials: </span></p><span data-dcnode-id="950" instrument_node="">
</span><blockquote data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">[I]t moves between many different servers located all over the planet, and is subject to compromise by anyone with access to any of those machines. And the election official on the receiving end has no way to know if the voted ballot she received matches the one the voter originally sent, no matter how well secured their County computer services may be, and no matter how much has been spent licensing software and upgrading their systems.</span><a data-dcnode-id="947" href="#_ftn24" id="_ftnref24" name="_ftnref24"><span data-dcnode-id="948" instrument_node="">[24]</span></a><span data-dcnode-id="946" instrument_node=""> </span></blockquote><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">NIST agrees with that assessment. In a 2011 report, it warned that election officials considering the use of e-mail transmission of election materials such as ballots “should carefully consider the security limitations of e-mail” because e-mails can be “intercepted, read, and modified in transit.” They also can be “easily forged to make it look like [the e-mail] was sent from another individual.”</span><a data-dcnode-id="941" href="#_ftn25" id="_ftnref25" name="_ftnref25"><span data-dcnode-id="942" instrument_node="">[25]</span></a><span data-dcnode-id="940" instrument_node=""> </span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="937" instrument_node="">David Jefferson of the Lawrence Livermore National Laboratory, who chaired the Technology Committee of the California Internet Voting Task Force, calls e-mail and fax transmission “by far the most dangerous forms of voting ever implemented in the U.S.”</span><a data-dcnode-id="935" href="#_ftn26" id="_ftnref26" name="_ftnref26"><span data-dcnode-id="936" instrument_node="">[26]</span></a><span data-dcnode-id="934" instrument_node=""> Yet despite such warnings, officials in some states continue to experiment with Internet voting, such as Utah in the 2016 Republican primary election.</span><a data-dcnode-id="932" href="#_ftn27" id="_ftnref27" name="_ftnref27"><span data-dcnode-id="933" instrument_node="">[27]</span></a><span data-dcnode-id="931" instrument_node=""> </span></p><span data-dcnode-id="929" instrument_node="">
</span><h3 data-dcnode-id="926"><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Experiences with Internet Voting </span></strong></h3><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="913"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Washington, D.C.</span></strong><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node=""> </span></em><span data-dcnode-id="920" instrument_node="">In 2010, the District of Columbia was so confident in the security of its Internet voting pilot project, which would have allowed overseas absentee voters to cast their ballots using a website, that it set up a mock election and challenged hackers to test the system.</span><a data-dcnode-id="918" href="#_ftn28" id="_ftnref28" name="_ftnref28"><span data-dcnode-id="919" instrument_node="">[28]</span></a><span data-dcnode-id="917" instrument_node=""> Within 36 hours, a computer science professor at the University of Michigan in Ann Arbor and his students broke into the system, changed the results of the mock election, and “gained near-complete control” of the election server: “We successfully changed every vote and revealed almost every secret ballot. Election officials did not detect our intrusion for nearly two business days—and might have remained unaware for far longer had we not deliberately left a prominent clue.”</span><a data-dcnode-id="915" href="#_ftn29" id="_ftnref29" name="_ftnref29"><span data-dcnode-id="916" instrument_node="">[29]</span></a><span data-dcnode-id="914" instrument_node=""> </span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">The “prominent clue” that Professor Alex Halderman left was a modification of the “Thank You” page at the end of the voting process for a voter using the system that played the University of Michigan fight song. Despite that clue, officials became aware of the intrusion only because an e-mail on a mailing list that election officials monitored inquired, “does anyone know what tune they play for successful voters?”</span><a data-dcnode-id="909" href="#_ftn30" id="_ftnref30" name="_ftnref30"><span data-dcnode-id="910" instrument_node="">[30]</span></a><span data-dcnode-id="908" instrument_node=""> The issue was not just that Halderman and his students were able to take control of the Internet voting system; they were also able to hide their presence in the terminal server from the election officials who were supposedly monitoring the security of the system. </span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="905" instrument_node="">Halderman was also able to detect attempted intrusions by “several other attackers,” including IP addresses in Iran, New Jersey, India, and China. Thus, as the Washington project demonstrates, the danger of an organized attack by a “well-financed enemy agency” is not a matter of mere speculation, but a likely reality. For instance, the Chinese Communist government has a special hacking unit of “cyber warriors”—People’s Liberation Army Unit 61398—that American officials suspect is responsible for numerous cyber-attacks on government and commercial networks in the U.S.</span><a data-dcnode-id="903" href="#_ftn31" id="_ftnref31" name="_ftnref31"><span data-dcnode-id="904" instrument_node="">[31]</span></a><span data-dcnode-id="902" instrument_node=""> In recent years, this unit has increased its focus on “the critical infrastructure of the United States—its electrical power grid, gas lines and waterworks.”</span><a data-dcnode-id="900" href="#_ftn32" id="_ftnref32" name="_ftnref32"><span data-dcnode-id="901" instrument_node="">[32]</span></a><span data-dcnode-id="899" instrument_node=""> These hackers are focused “not just on stealing information, but [on] obtaining the ability to manipulate” that critical infrastructure.</span><a data-dcnode-id="897" href="#_ftn33" id="_ftnref33" name="_ftnref33"><span data-dcnode-id="898" instrument_node="">[33]</span></a><span data-dcnode-id="896" instrument_node=""> </span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="893" instrument_node="">Anyone who doubts that an Internet voting system would be targeted by organized, government-sponsored hackers like PLA Unit 61398 is not being realistic. The ability to change or manipulate the outcome of an American election through the Internet would just be too tempting a target—particularly because no legal process here could reach hackers ensconced abroad and under the protection of a hostile government. The power of these hackers was demonstrated recently by what some officials are calling “the largest known theft of government data in history” when they managed to steal the personal records of federal government employees, federal retirees, and former federal employees from the U.S. Office of Personnel Management.</span><a data-dcnode-id="891" href="#_ftn34" id="_ftnref34" name="_ftnref34"><span data-dcnode-id="892" instrument_node="">[34]</span></a><span data-dcnode-id="890" instrument_node=""> </span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="879"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Estonia.</span></strong><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node=""> </span></em><span data-dcnode-id="883" instrument_node="">In 2005, Estonia became the first country to offer Internet voting in a national election. It has been used seven times in local and national elections, according to a critical analysis published in 2014. University of Michigan Professor Alex Halderman and his students conducted a thorough review of the system and then prepared an analysis of the Estonian system’s vulnerabilities that identified major security risks and recommended its immediate termination. Halderman and his team “observed operations during the October 2013 local elections, conducted interviews with the system developers and election officials, assessed the software through source code inspection and reverse engineering, and performed tests on a reproduction of the complete system in our laboratory.”</span><a data-dcnode-id="881" href="#_ftn35" id="_ftnref35" name="_ftnref35"><span data-dcnode-id="882" instrument_node="">[35]</span></a><span data-dcnode-id="880" instrument_node=""> </span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">Their research showed that the system’s numerous security lapses created an “attractive target for state-level attackers, such as Russia.” These attackers, as well as dishonest election officials, “could change votes, compromise a secret ballot, disrupt voting, or cast doubt on the legitimacy of the election process.”</span><a data-dcnode-id="875" href="#_ftn36" id="_ftnref36" name="_ftnref36"><span data-dcnode-id="876" instrument_node="">[36]</span></a><span data-dcnode-id="874" instrument_node=""> The system had such “serious procedural and architectural weaknesses” that “attackers could undetectably alter the outcome of an election,” a shocking finding that the National Election Committee of Estonia refused to acknowledge. Unfortunately, Estonia continues to use this unsecure, dangerous Internet voting system. </span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">Unlike Estonia, neighboring Latvia does not have Internet voting. Arnis Cimdars, chairman of Latvia’s Central Electoral Commission, has said that “with current technology” it is “not possible to ensure the anonymity and security of this method of voting.”</span><a data-dcnode-id="869" href="#_ftn37" id="_ftnref37" name="_ftnref37"><span data-dcnode-id="870" instrument_node="">[37]</span></a><span data-dcnode-id="868" instrument_node=""> </span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="857"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">France.</span></strong><em data-dcnode-id="862"><span data-dcnode-id="863" instrument_node=""> </span></em><span data-dcnode-id="861" instrument_node="">In 2013, France used an Internet voting system for the first time in a Parisian mayoral primary. The backers of the system, just like election officials in Washington, D.C., claimed that it was “fraud-proof” and “ultra secure.” However, reporters from “the news site Metronews proved that it was easy to breach the allegedly strict security of the election and vote several times using different names.”</span><a data-dcnode-id="859" href="#_ftn38" id="_ftnref38" name="_ftnref38"><span data-dcnode-id="860" instrument_node="">[38]</span></a><span data-dcnode-id="858" instrument_node=""> One of the journalists voted five times, including once in the name of former French President Nicolas Sarkozy. </span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="844"><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Norway.</span></strong><em data-dcnode-id="852"><span data-dcnode-id="853" instrument_node=""> </span></em><span data-dcnode-id="851" instrument_node="">Norway implemented a limited Internet voting system for municipal elections in 2011 and 2013 but cancelled the project in 2014, citing security concerns and the government’s conclusion that, contrary to expectations, the new system had not improved turnout. Specifically, Norway’s Institute of Social Research said that there was “no evidence that the trial led to a rise in the overall number of people voting nor that it mobilized new groups, such as young people, to vote.”</span><a data-dcnode-id="849" href="#_ftn39" id="_ftnref39" name="_ftnref39"><span data-dcnode-id="850" instrument_node="">[39]</span></a><span data-dcnode-id="848" instrument_node=""> Even just a “low-effort” review of the system by computer experts from the Norwegian Computing Center and the Norwegian University of Science and Technology found “significant problems” with security, among other things, to the extent that the experts said the software did “not have acceptable quality for use in an e-voting system.”</span><a data-dcnode-id="846" href="#_ftn40" id="_ftnref40" name="_ftnref40"><span data-dcnode-id="847" instrument_node="">[40]</span></a><span data-dcnode-id="845" instrument_node=""> </span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="831"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Canada.</span></strong><em data-dcnode-id="839"><span data-dcnode-id="840" instrument_node=""> </span></em><span data-dcnode-id="838" instrument_node="">In 2014, an independent review panel in British Columbia issued a report opposing “universal Internet voting.” This report pointed out that while the Internet is used for “an increasing number of interactions (such as banking, shopping, dating, planning trips, and the like) with their own risks, voting over the Internet has a set of unique challenges that inevitably introduce a number of additional risks.”</span><a data-dcnode-id="836" href="#_ftn41" id="_ftnref41" name="_ftnref41"><span data-dcnode-id="837" instrument_node="">[41]</span></a><span data-dcnode-id="835" instrument_node=""> The report concluded that one of the biggest problems with Internet voting is the insecure nature of personal computers that “are already the target of malware, phishing attempts and other attacks.”</span><a data-dcnode-id="833" href="#_ftn42" id="_ftnref42" name="_ftnref42"><span data-dcnode-id="834" instrument_node="">[42]</span></a><span data-dcnode-id="832" instrument_node=""> </span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="829" instrument_node="">The malware that has been “developed for other purposes such as capturing credentials used for online banking and purchases can be used to record the voter’s authentication credentials or track who an individual has voted for.” It would also be possible to develop new malware “to target specific voting systems” in order to “alter how the ballot is marked” and to do so “without the voter’s knowledge.” Finally, as Norway experienced, the report concluded that “considerable research” shows that Internet voting would not increase turnout and “cause nonvoters to vote.” Instead, it would simply be “used as a tool of convenience for individuals who have already decided to vote.”</span><a data-dcnode-id="827" href="#_ftn43" id="_ftnref43" name="_ftnref43"><span data-dcnode-id="828" instrument_node="">[43]</span></a><span data-dcnode-id="826" instrument_node=""> </span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="823" instrument_node="">When Toronto was considering Internet voting, two experts commissioned by the city filed a report reviewing the various proposals that had been submitted by voting vendors. The experts recommended against proceeding because none of the proposals provided “adequate protection against the risks inherent in internet voting.”</span><a data-dcnode-id="821" href="#_ftn44" id="_ftnref44" name="_ftnref44"><span data-dcnode-id="822" instrument_node="">[44]</span></a><span data-dcnode-id="820" instrument_node=""> Regrettably, Toronto has gone forward with a contract to develop Internet voting for the disabled despite the security vulnerabilities that any such system would present. Other municipalities like Markham, Ontario, have proceeded with Internet voting, although Elections Canada, the federal government’s election agency, dropped plans for a 2015 Internet voting pilot project because of budget cuts.</span><a data-dcnode-id="818" href="#_ftn45" id="_ftnref45" name="_ftnref45"><span data-dcnode-id="819" instrument_node="">[45]</span></a><span data-dcnode-id="817" instrument_node=""> </span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="805"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Other Countries.</span></strong><span data-dcnode-id="812" instrument_node=""> As the Verified Voting Foundation points out, a number of other countries in Europe and elsewhere, such as Australia, have experimented with Internet voting, and many “have elected to discontinue its use” after significant security issues arose.</span><a data-dcnode-id="810" href="#_ftn46" id="_ftnref46" name="_ftnref46"><span data-dcnode-id="811" instrument_node="">[46]</span></a><span data-dcnode-id="809" instrument_node=""> This includes Spain, which held a referendum in Barcelona in 2010 using the Internet. It is highly unlikely that Spain will implement Internet voting given that the Barcelona referendum “encountered problems in relation to voter identification and identity theft, with a prominent voter finding that someone had already logged on with his authentication details and cast a ballot for him.”</span><a data-dcnode-id="807" href="#_ftn47" id="_ftnref47" name="_ftnref47"><span data-dcnode-id="808" instrument_node="">[47]</span></a><span data-dcnode-id="806" instrument_node=""> </span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="803" instrument_node="">Australia held the world’s largest-ever Internet voting deployment in the 2015 state election in New South Wales for the return of 280,000 ballots. Professor Alex Halderman and his team of computer experts analyzed the New South Wales system “and uncovered severe vulnerabilities that could be leveraged to manipulate votes, violate ballot privacy, and subvert the verification mechanism.” According to Halderman, none of these vulnerabilities in the security of the Internet voting system was “detected by the election authorities” before Halderman and his team disclosed them, “despite a pre-election security review and despite the system having run in a live state election for five days.”</span><a data-dcnode-id="801" href="#_ftn48" id="_ftnref48" name="_ftnref48"><span data-dcnode-id="802" instrument_node="">[48]</span></a><span data-dcnode-id="800" instrument_node=""> </span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">Halderman’s report pointed out that “[a]t least one parliamentary seat was decided by a margin much smaller than the number of votes taken while the system was vulnerable.” The Australian system was so flawed that an attacker could subvert the “voting session, expose the vote that voter intended to cast, substitute a different vote, and sidestep the verification mechanism so that last-minute manipulation was undetectable.” Even worse, while implementing such an attack “required some skill,” it would have required “no special knowledge that was not publicly available at the time.”</span><a data-dcnode-id="795" href="#_ftn49" id="_ftnref49" name="_ftnref49"><span data-dcnode-id="796" instrument_node="">[49]</span></a><span data-dcnode-id="794" instrument_node=""> </span></p><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="789"><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Comparison with E-Commerce </span></strong></h3><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">For those who point to the use of the Internet in the financial industry as proof that Internet voting would be secure, University of Maryland President C.D. Mote, Jr., who chaired the National Science Foundation committee on Internet voting, offers a compelling retort. Mote notes that voting “requires a much greater level of security then e-commerce—it’s not like buying a book over the Internet.” Moreover, “remote Internet voting technology will not be able to meet this standard for years to come.”</span><a data-dcnode-id="785" href="#_ftn50" id="_ftnref50" name="_ftnref50"><span data-dcnode-id="786" instrument_node="">[50]</span></a><span data-dcnode-id="784" instrument_node=""> </span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="781" instrument_node="">David Jefferson of the Lawrence Livermore National Laboratory says that people ask quite naturally, “If it is safe to do my banking and shopping online, why can’t I vote online?”</span><a data-dcnode-id="779" href="#_ftn51" id="_ftnref51" name="_ftnref51"><span data-dcnode-id="780" instrument_node="">[51]</span></a><span data-dcnode-id="778" instrument_node=""> The answer is that it is not actually safe “to conduct e-commerce transactions online.” In fact, it is very risky, and online ecommerce fraud is a growing problem: The financial industry, including banks, credit card companies, and retailers, “lose[s] billions of dollars a year in online transaction fraud despite huge investments in fraud prevention and recovery.” He adds that: </span></p><span data-dcnode-id="776" instrument_node="">
</span><blockquote data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">The technical security, privacy, and transparency requirements for voting are structurally different from, and actually much more stringent than, those for ecommerce transactions.… People have the illusion that ecommerce transactions are safe because merchants and banks don’t hold consumers financially responsible for fraudulent transactions that they are the innocent victims of. Instead the businesses absorb and redistribute the losses silently, passing them on in the invisible forms of higher prices, fees, and interest rates. Businesses know that if consumers had to accept those losses personally most online commerce would collapse. Instead, they routinely hide the losses, keeping the magnitude secret so the public is generally unaware. It’s a good business strategy.</span><a data-dcnode-id="773" href="#_ftn52" id="_ftnref52" name="_ftnref52"><span data-dcnode-id="774" instrument_node="">[52]</span></a><span data-dcnode-id="772" instrument_node=""> </span></blockquote><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">According to Jefferson, it is not just that the “security, secrecy, and transparency requirements for online voting transactions are structurally very different from, and generally stricter than, those for E-Commerce transactions.” The other major distinction is that “we can at least eventually detect E-Commerce errors and fraud, but we may never even know about online election fraud.”</span><a data-dcnode-id="767" href="#_ftn53" id="_ftnref53" name="_ftnref53"><span data-dcnode-id="768" instrument_node="">[53]</span></a><span data-dcnode-id="766" instrument_node=""> In other words, a consumer or banking customer will find out if unauthorized purchases are being made online with his or her credit card or if money is being drained out of a personal bank account. </span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">However, a voter would probably never know that his or her vote was intercepted, changed, or otherwise manipulated before being cast on an Internet voting website or portal, because the necessary anonymity of the voting process makes it almost impossible to set up a verification system that also preserves ballot secrecy. Because of the requirements of the secret ballot, you cannot get a voting statement, like a banking statement, at the end of the month that tells you how election officials registered your vote the way you receive bank statements that list all of the specific transactions in your account. </span></p><span data-dcnode-id="761" instrument_node="">
</span><h3 data-dcnode-id="758"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Conclusion </span></strong></h3><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">While there is no doubt that being able to cast a ballot from your home computer, like being able to order and buy products and services through online Internet transactions, might make voting more convenient, the extraordinary security problems of such a remote Internet voting system present an extraordinary, unacceptable risk to election integrity. The overwhelming conclusion of computer experts is that those security vulnerabilities are inherent in the architecture and organization of the Internet and the software and hardware in common use today. Without major technological changes, there is almost no possibility that a secure Internet voting system can be designed for the foreseeable future. When combined with other less technical questions like equal access by voters to the Internet, Internet voting is definitely a technology whose time has not come—and may never come. </span></p><span data-dcnode-id="754" instrument_node="">
</span><em data-dcnode-id="750"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">—Hans A. von Spakovsky </span></strong><span data-dcnode-id="751" instrument_node="">is Manager of the Election Law Reform Initiative and a Senior Legal Fellow in the Edwin Meese III Center for Legal and Judicial Studies at The Heritage Foundation. He is a former commissioner on the Federal Election Commission and counsel to the Assistant Attorney General for Civil Rights at the U.S. Department of Justice and the coauthor of Who’s Counting? How Fraudsters and Bureaucrats Put Your Vote at Risk (Encounter, 2012) and Obama’s Enforcer: Eric Holder’s Justice Department (HarperCollins/Broadside, 2014).</span></em></div><span data-dcnode-id="748" instrument_node="">
</span></div><span data-dcnode-id="746" instrument_node="">
