 of the book. This is offered AT NO CHARGE, as a thank you from us to all the men and women in uniform serving our country away from home. To receive a book to read, e-mail us at&nbsp;</span></font><font class="size10 Helvetica10" color="#000000" data-dcnode-id="1894" face="Helvetica, Arial, sans-serif"><a data-dcnode-id="1895" href="mailto:support@babysbrilliant.com" target="_self"><span data-dcnode-id="1896" instrument_node="">support@babysbrilliant.com</span></a></font><font class="size10 Helvetica10" color="#000000" data-dcnode-id="1892" face="Helvetica, Arial, sans-serif"><span data-dcnode-id="1893" instrument_node="">&nbsp;</span></font><font class="size10 Helvetica10" color="#406AB0" data-dcnode-id="1888" face="Helvetica, Arial, sans-serif"><b data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Free</span></b><br data-dcnode-id="1889"></font></div><div data-dcnode-id="1883" style="font-size: 1px; line-height: 1px;"><font class="size12 ArialNarrow12" color="#000000" data-dcnode-id="1884" face="'Arial Narrow', Arial, Helvetica, sans-serif"><b data-dcnode-id="1886"></b><br data-dcnode-id="1885"></font></div><div data-dcnode-id="1878" style="font-size: 1px; line-height: 1px;"><font class="size12 ArialNarrow12" color="#000000" data-dcnode-id="1879" face="'Arial Narrow', Arial, Helvetica, sans-serif"><b data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Readeo - See, hear and read with each other even when you're far away!</span></b><br data-dcnode-id="1880"></font></div><div data-dcnode-id="1871" style="font-size: 1px; line-height: 1px;"><font class="size10 Helvetica10" color="#000000" data-dcnode-id="1875" face="Helvetica, Arial, sans-serif"><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.readeo.com/" target="_self"><span data-dcnode-id="1877" instrument_node="">www.readeo.com</span></a></font><font class="size10 Helvetica10" color="#000000" data-dcnode-id="1872" face="Helv
