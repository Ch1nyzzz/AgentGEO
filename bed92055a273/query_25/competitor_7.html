events, and coordinates Constitution Day activities for judges across the state.</span></p><p class="WordSection31" data-dcnode-id="2172"><span data-dcnode-id="2178" instrument_node="">The Indiana Supreme Court webcasts all oral arguments live and archive them for later </span><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mycourts.in.gov/arguments/" target="_blank"><span data-dcnode-id="2177" instrument_node="">viewing here.</span></a><span data-dcnode-id="2175" instrument_node=""> An directory of judicial officers willing to speak to K-12 classrooms in their respective counties is also available online through the </span><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.in.gov/judiciary/iocs/files/judges-speakers-bureau.pdf" target="_blank"><span data-dcnode-id="2174" instrument_node="">Judges Speakers Bureau.</span></a></p><div class="WordSection32" data-dcnode-id="2171"></div><p class="WordSection34" data-dcnode-id="2170"></p></div><span data-dcnode-id="2168" instrument_node="">

</span><div class="card-body" data-dcnode-id="2094"><div class="WordSection32" data-dcnode-id="2112"><p data-dcnode-id="2113"><span data-dcnode-id="2118" instrument_node="">987 East Ivy Avenue</span><br data-dcnode-id="2117"><span data-dcnode-id="2116" instrument_node=""> St. Paul, Minnesota 55106</span><br data-dcnode-id="2115"><span data-dcnode-id="2114" instrument_node=""> Phone: 651-772-4274</span></p></div><div class="WordSection33" data-dcnode-id="2104"><p data-dcnode-id="2105"><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="2109" instrument_node="">The </span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.guidestar.org/profile/26-0077593" target="_blank"><span data-dcnode-id="2108" instrument_node="">Learning Law and Democracy Foundation</span></a><span data-dcnode-id="2106" instrument_node=""> is a non-profit nonpartisan organization dedicated to building strong communities of engaged citizens through education in the law, civics, government, and the rights and responsibilities of citizens.</span></p></div><p class="WordSection34" data-dcnode-id="2103"></p><p class="WordSection34" data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">For over 25 years, the Learning Law and Democracy Foundation has sponsored civics, government, and law-related education programs, including curriculum development, technical assistance, web-based resources, and programs designed for youth, their teachers, and other community members. Through these activities, participants are developing the knowledge, skills, and character traits needed to be effective and responsible citizens.</span></p><p class="WordSection34" data-dcnode-id="2100"></p><p class="WordSection34" data-dcnode-id="2098" style="line-height: normal; text-align: justify;"><span data-dcnode-id="2099" instrument_node="">The Learning Law and Democracy Foundation launched in 1981 as the Minnesota Center for Community Legal Education at Hamline University School of Law. Although its initial mission focused on promoting the development of legal competence through law-related education in schools and community organizations, it quickly broadened its vision to include instruction in civics and government.</span></p><p class="WordSection34" data-dcnode-id="2097"></p><p class="WordSection34" data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">After six years of programming at the University of Minnesota (1996-2002) and name change, the Learning Law and Democracy Foundation became an independent 501(c)(3) organization with offices in the Minnesota Humanities Education Center in St. Paul.</span></p></div><span data-dcnode-id="2093" instrument_node="">

</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="2022" data-target="#collapse-accordionPanelOne-62911" data-toggle="collapse" type="button"><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mdcourts.gov/sites/default/files/import/publications/pdfs/civicsacademytrifold.pdf" target="_blank"><span data-dcnode-id="2024" instrument_node="">Maryland Civics and Law Academy</span></a></button><span data-dcnode-id="2021" instrument_node="">

</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="1972" data-parent="#accordion62911" id="collapse-accordionPanelOne-62911"><span data-dcnode-id="2016" instrument_node="">
</span><div class="card-body" data-dcnode-id="1974"><div class="WordSection35" data-dcnode-id="1988"><p data-dcnode-id="2000"><span data-dcnode-id="2015" instrument_node="">Office of Communications and Public Affairs</span><br data-dcnode-id="2014"><span data-dcnode-id="2013" instrument_node=""> State of Maryland Judiciary</span><br data-dcnode-id="2012"><span data-dcnode-id="2011" instrument_node=""> Judicial Education Conference Center</span><br data-dcnode-id="2010"><span data-dcnode-id="2009" instrument_node=""> 2011-D Commerce Park Drive</span><br data-dcnode-id="2008"><span data-dcnode-id="2007" instrument_node=""> Annapolis, MD 21401</span><br data-dcnode-id="2006"><span data-dcnode-id="2005" instrument_node=""> Point of Contact: </span><a data-dcnode-id="2003" href="mailto:Pamila.Brown@mdcourts.gov"><span data-dcnode-id="2004" instrument_node="">Pamila J. Brown, Associate Judge</span></a><br data-dcnode-id="2002"><span data-dcnode-id="2001" instrument_node=""> Phone: (410) 480-7706</span></p><p data-dcnode-id="1993"><strong data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="1997" instrument_node="">The </span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mdcourts.gov/sites/default/files/import/publications/pdfs/civicsacademytrifold.pdf" target="_blank"><span data-dcnode-id="1996" instrument_node="">Maryland Civics and Law Academy</span></a><span data-dcnode-id="1994" instrument_node=""> engages young people of middle school and high school age in learning about law and civil society. The purpose of the academy is to prepare young people to be participants in our democratic society. In Maryland, dozens of civically active judges ad attorneys volunteer their time to share knowledge, experience, and enthusiasm for civic engagement with hundreds of young participants. The academy is a partnership of the Maryland Judiciary, Maryland State Bar Association, the Citizenship Law Related Education Program, and the Maryland Public School System. It is offered three times per school year to meet the needs of local school systems. The Civics and Law Academy is an important tool to promote public understanding of the courts and increase the public’s trust and confidence in the administration of justice.</span></p><p data-dcnode-id="1989"><strong data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="1990" instrument_node="">In its first program year, three Civics and Law Academies were held in Maryland during the 2011-12 school year in local schools or education centers in Baltimore, Prince George’s and Frederick Counties. Nearly 300 students and teachers attended the sessions, which received positive reviews from the participants. The Civics and Law Academy offers a minimum of four hours of focused instruction on topics such as Law and Justice; Rights and Responsibilities; Free Speech, School Speech and Protected Speech; and Power and Empowerment. The academies feature interactive lessons taught by judges and attorneys, which are designed to develop civic competency and a deeper understanding of the law and their legal rights.</span></p></div><div class="WordSection36" data-dcnode-id="1984"><p data-dcnode-id="1985"><strong data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Civics Programs are Tailored to: </span></strong></p></div><ul data-dcnode-id="1976"><li data-dcnode-id="1981"><div class="WordSection37" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Middle School</span></div></li><li data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">High School</span></li><li data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">College (can be modified)</span></li></ul><div class="WordSection38" data-dcnode-id="1975"></div></div><span data-dcnode-id="1973" instrument_node="">

</span><div class="card-body" data-dcnode-id="1908"><div class="WordSection38" data-dcnode-id="1929"><p data-dcnode-id="1941"><span data-dcnode-id="1953" instrument_node="">Office of Jury Commissioner</span><br data-dcnode-id="1952"><span data-dcnode-id="1951" instrument_node=""> 560 Harrison Avenue</span><br data-dcnode-id="1950"><span data-dcnode-id="1949" instrument_node=""> Boston, MA 02118</span><br data-dcnode-id="1948"><span data-dcnode-id="1947" instrument_node=""> Point of Contact: </span><a data-dcnode-id="1945" href="mailto:john.cavanaugh@jud.state.ma.us"><span data-dcnode-id="1946" instrument_node="">John W. Cavanaugh</span></a><span data-dcnode-id="1944" instrument_node="">, Deputy Jury Commissioner</span><br data-dcnode-id="1943"><span data-dcnode-id="1942" instrument_node=""> Phone: (617) 721-9125</span></p><p data-dcnode-id="1934"><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="1938" instrument_node="">Jury outreach strives to encourage full citizen participation to enhance diversity of all juries, while it discourages juror delinquency. Special attention has been devoted to promoting the program in urban areas to remind everyone that our juries should reflect the cultural diversity of our citizens and of our communities. The </span><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.majury.gov/" target="_blank"><span data-dcnode-id="1937" instrument_node="">Massachusetts Jury System</span></a><span data-dcnode-id="1935" instrument_node=""> informs prospective jurors that juror service should be a positive and rewarding experience.</span></p><p data-dcnode-id="1930"><strong data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="1931" instrument_node="">Our free multimedia school presentation discusses the history of jury, how people are affected by jury verdicts, juror fashion, juror delinquency, and the effects of countries with no jury trials. If time allows, a jury trial simulation is conducted with students portraying the participants. An adult presentation emphasizes the four major benefits of our jury system.</span></p></div><div class="WordSection39" data-dcnode-id="1925"><p data-dcnode-id="1926"><strong data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Civics Programs are Tailored to: </span></strong></p></div><ul data-dcnode-id="1909"><li data-dcnode-id="1922"><div class="WordSection40" data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Middle School</span></div></li><li data-dcnode-id="1919"><div class="WordSection40" data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">High School</span></div></li><li data-dcnode-id="1916"><div class="WordSection40" data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">College</span></div></li><li data-dcnode-id="1913"><div class="WordSection40" data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Adults</span></div></li><li data-dcnode-id="1910"><div class="WordSection40" data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Other - Civic Organizations</span></div></li></ul></div><span data-dcnode-id="1907" instrument_node="">

</span></h2><span data-dcnode-id="1891" instrument_node="">
</span></div><span data-dcnode-id="1889" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="1848" data-parent="#accordion62915" id="collapse-accordionPanelOne-62915"><span data-dcnode-id="1888" instrument_node="">
</span><div class="card-body" data-dcnode-id="1850"><p class="WordSection40" data-dcnode-id="1880"><span data-dcnode-id="1887" instrument_node="">332 South Michigan Avenue</span><br data-dcnode-id="1886"><span data-dcnode-id="1885" instrument_node=""> Suite 400</span><br data-dcnode-id="1884"><span data-dcnode-id="1883" instrument_node=""> Chicago, Illinois, 60604</span><br data-dcnode-id="1882"><span data-dcnode-id="1881" instrument_node=""> Phone: (312) 863-6340</span></p><p class="WordSection41" data-dcnode-id="1879"></p><p class="WordSection41" data-dcnode-id="1878"></p><p class="WordSection41" data-dcnode-id="1871"><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="1875" instrument_node=""> </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mikvachallenge.org/" target="_blank"><span data-dcnode-id="1874" instrument_node="">Mikva Challenge</span></a><span data-dcnode-id="1872" instrument_node=""> develops the next generation of civic leaders, activists and policy-makers. This is done by providing young people with opportunities to actively participate in the political process, because it is the belief that the best way to learn leadership and to learn democracy is to experience both.</span></p><p class="WordSection41" data-dcnode-id="1870"></p><p class="WordSection41" data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Mikva Challenge is a nonpartisan 501(c)3 organization that prioritizes the development of civic leadership in underserved Chicago high school youth. Mikva Challenge was founded in 1997 as a tribute to former White House Counsel, Judge and U.S. Congressman Abner Mikva and his wife Zoe, a lifelong education activist. Mikva Challenge helps low-income Chicago youth become meaningful actors in politics and, by doing so, honors the Mikvas’ decades of inspiring young adults to embark on careers in public service and politics.</span></p><p "="
    " class="WordSection41></p> <p class=" data-dcnode-id="1866" wordsection41=""><span data-dcnode-id="1867" instrument_node="">Mikva Challenge embraces ambitious youth workers and advocates; since 2000, Mikva Challenge has trained over 20,000 young people through elections, activism and policymaking programs. Through the Mikva process, young people connect with peers, adults and political issues, strategize about how to win their issue or campaign and take action to become real political participants. These youth tell that they feel they have a “voice” now and report having a greater desire to vote, campaign, organize, lobby, and even run for office. Perhaps most importantly, these Mikva youth now believe that Chicago is their city and that they have the power, knowledge and skills to make it a more just and equitable place – both now and in the future. Mikva Challenge’s work is focused on helping youth take political action now in order to develop the next generation of civic leaders.</span></p><p class="WordSection41" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">As a result, all programs aim to achieve four core goals:</span></p><ul data-dcnode-id="1851"><li data-dcnode-id="1861"><div class="WordSection41" data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Ignite teenagers’ passion for politics;</span></div></li><li data-dcnode-id="1858"><div class="WordSection41" data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Increase youth civic knowledge;</span></div></li><li data-dcnode-id="1855"><div class="WordSection42" data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Develop students’ democratic leadership skills; and</span></div></li><li data-dcnode-id="1852"><div class="WordSection42" data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Help young people become part of the solution to school, neighborhood and city problems.</span></div></li></ul></div><span data-dcnode-id="1849" instrument_node="">

</span><div class="card-body" data-dcnode-id="1714"><p class="WordSection42" data-dcnode-id="1754"><span data-dcnode-id="1764" instrument_node="">P.O. Box 150 </span><br data-dcnode-id="1763"><span data-dcnode-id="1762" instrument_node=""> Jefferson City, MO 65102</span><br data-dcnode-id="1761"><span data-dcnode-id="1760" instrument_node=""> Point of Contact: </span><a data-dcnode-id="1758" href="mailto:Breckenridge@courts.mo.gov"><span data-dcnode-id="1759" instrument_node="">Hon. Patricia Breckenridge</span></a><span data-dcnode-id="1757" instrument_node="">, Judge, Missouri Supreme Court</span><br data-dcnode-id="1756"><span data-dcnode-id="1755" instrument_node=""> Phone: (573) 751-9652</span></p><p class="WordSection42" data-dcnode-id="1747"><strong data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="1751" instrument_node=""> The </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.courts.mo.gov/CivicEducation/" target="_blank"><span data-dcnode-id="1750" instrument_node="">Civic Education Committee of the Missouri Supreme Court </span></a><span data-dcnode-id="1748" instrument_node="">was commissioned in 2011 to educate the people of Missouri on the role of the judiciary in protecting the rights of all people and the common good. The mission of the committee is to enhance the public’s understanding of Missouri’s court system and its function, thereby enhancing the public’s trust and confidence in the judicial branch of the government. The committee is actively developing initiatives to enhance interaction between the courts and their communities that will educate the public about the practices, procedures, and proper role of our state’s courts in our system of government.</span></p><p class="WordSection43" data-dcnode-id="1746"></p><p class="WordSection43" data-dcnode-id="1742"><strong data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="1743" instrument_node="">The committee has chosen to target the fourth graders touring the Missouri Supreme Court for education on the essential role the court plays in our system of government. Another key program is the Appellate Court Road Show, in which appellate court judges hear oral argument in front of an audience composed of high school students, college students, or members of the public. The Missouri Supreme Court Institute brings teachers to the high court for a week of instruction during the summer; lesson plans, materials, and presentations will be provided to teachers on the importance of the courts. The committee is also working to bring Justice Sandra Day O’Connor’s internet-based iCivics program to the attention of teachers. Finally, members of the Civic Education Committee are working with the state’s policymakers to ensure that they fully understand the importance of an independent judiciary.</span></p><p class="WordSection43" data-dcnode-id="1741"></p><p class="WordSection43" data-dcnode-id="1740"></p><p class="WordSection43" data-dcnode-id="1737"><strong data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Civics Programs are Tailored to: </span></strong></p><ul data-dcnode-id="1715"><li data-dcnode-id="1734"><div class="WordSection43" data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Elementary School</span></div></li><li data-dcnode-id="1731"><div class="WordSection44" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Middle School</span></div></li><li data-dcnode-id="1728"><div class="WordSection44" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">High School</span></div></li><li data-dcnode-id="1725"><div class="WordSection44" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">College</span></div></li><li data-dcnode-id="1722"><div class="WordSe </span><div class="card-body" data-dcnode-id="1606"><div class="WordSection45" data-dcnode-id="1617"><p data-dcnode-id="1624"><span data-dcnode-id="1634" instrument_node="">300 Newport Avenue</span><br data-dcnode-id="1633"><span data-dcnode-id="1632" instrument_node=""> Williamsburg, VA 23185</span><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node=""> Point of Contact: </span><a data-dcnode-id="1628" href="mailto:lmontgomery@ncsc.org"><span data-dcnode-id="1629" instrument_node="">Lorri Montgomery,</span></a><span data-dcnode-id="1627" instrument_node=""> Director of Communications &amp; Marketing</span><br data-dcnode-id="1626"><span data-dcnode-id="1625" instrument_node=""> Phone: (757) 259-1525</span></p><p data-dcnode-id="1620"><strong data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="1621" instrument_node=""> The National Center for State Courts is an independent, nonprofit court improvement organization founded at the urging of Chief Justice of the Supreme Court Warren E. Burger. He envisioned NCSC as a clearinghouse for research information and comparative data to support improvement in judicial administration in state courts.</span></p><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Over twenty years ago, the Institute for Court Management merged with NCSC, adding an educational curriculum especially designed for court managers. In the early 1990s, an international division was formed to offer a similar array of research, consulting, education, and information services to strengthen the rules of law in countries around the world.</span></p></div><div class="WordSection46" data-dcnode-id="1607"><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">All of NCSC's services — research, information services, education, consulting — are focused on helping courts plan, make decisions, and implement improvements that save time and money, while ensuring judicial administration that supports fair and impartial decision- making.</span></p><p data-dcnode-id="1608"><strong data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><em data-dcnode-id="1610"><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsc.org/education-and-careers/civics-education/justice-case-files" target="_blank"><span data-dcnode-id="1612" instrument_node="">Justice Case Files</span></a></em><span data-dcnode-id="1609" instrument_node=""> are graphic novels that engage readers while giving insight into how judges make decisions, how the courts protect the public and why courts are so important to a democratic society.</span></p></div></div><span data-dcnode-id="1605" instrument_node="">

</span><div class="card-body" data-dcnode-id="1498"><p data-dcnode-id="1580"><span data-dcnode-id="1585" instrument_node="">525 Arch Street </span><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node=""> Philadelphia, PA 19106</span><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node="">Phone: 215-409-6600</span></p><p data-dcnode-id="1577"><strong data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node=""> </span></strong></p><p data-dcnode-id="1570"><strong data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Mission and Goals:&nbsp;</span></strong><span data-dcnode-id="1574" instrument_node="">The </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/" target="_blank"><span data-dcnode-id="1573" instrument_node="">National Constitution Center</span></a><span data-dcnode-id="1571" instrument_node=""> in Philadelphia brings together people of all ages and perspectives, across America and around the world, to learn about, debate, and celebrate the greatest vision of human freedom in history, the U.S. Constitution. A private, nonprofit organization, the Center serves as America’s leading platform for constitutional education and debate, fulfilling its congressional charter “to disseminate information about the U.S. Constitution on a nonpartisan basis.”</span></p><p data-dcnode-id="1556"><span data-dcnode-id="1569" instrument_node="">As the </span><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Museum of We the People</span></strong><span data-dcnode-id="1566" instrument_node="">, the Center brings the Constitution to life for visitors of all ages through interactive programs and exhibits. As </span><strong data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">America’s Town Hall</span></strong><span data-dcnode-id="1563" instrument_node="">, the Center brings the leading conservative and liberal thought leaders together to debate the Constitution on all media platforms. As a </span><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Headquarters for Civic Education</span></strong><span data-dcnode-id="1560" instrument_node="">, the Center delivers the best educational programs and online resources that inspire citizens and engage all Americans in learning about the U.S. Constitution. For more information, call 215-409-6700 or visit </span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.constitutioncenter.org/" target="_blank "><span data-dcnode-id="1559" instrument_node="">their website</span></a><span data-dcnode-id="1557" instrument_node="">.</span></p><p data-dcnode-id="1553"><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong></p><ul data-dcnode-id="1519" type="disc "><li data-dcnode-id="1547"><span data-dcnode-id="1552" instrument_node="">The </span><em data-dcnode-id="1549"><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/interactive-constitution"><span data-dcnode-id="1551" instrument_node="">Interactive Constitution</span></a></em><span data-dcnode-id="1548" instrument_node=""> offering extensive primary and secondary sources and a content rich media library with videos, podcasts, blog posts, and lesson plans.</span></li><li data-dcnode-id="1542"><em data-dcnode-id="1544"><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/debate/upcoming-town-hall"><span data-dcnode-id="1546" instrument_node="">America’s Town Hall&nbsp;programs</span></a></em><span data-dcnode-id="1543" instrument_node=""> about constitutional issues in the news.</span></li><li data-dcnode-id="1536"><span data-dcnode-id="1541" instrument_node="">Weekly </span><em data-dcnode-id="1538"><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/interactive-constitution/media-library%3Flive_podcast%3Dno"><span data-dcnode-id="1540" instrument_node="">We the People podcast</span></a></em><span data-dcnode-id="1537" instrument_node=""> featuring the best arguments on all sides of current constitutional questions.</span></li><li data-dcnode-id="1531"><span data-dcnode-id="1535" instrument_node="">A </span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/interactive-constitution/classroom-exchanges/online-civic-learning-opportunities"><span data-dcnode-id="1534" instrument_node="">Constitutional Exchange program</span></a><span data-dcnode-id="1532" instrument_node=""> connecting students online to practice civil dialogue skills and learn how the Constitution impacts their lives.</span></li><li data-dcnode-id="1520"><span data-dcnode-id="1530" instrument_node="">Professional development opportunities for </span><a data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/interactive-constitution/professional-development"><span data-dcnode-id="1529" instrument_node="">educators</span></a><span data-dcnode-id="1527" instrument_node="">, </span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/cle-home"><span data-dcnode-id="1526" instrument_node="">legal professionals</span></a><span data-dcnode-id="1524" instrument_node="">, and </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//constitutioncenter.org/experience/programs-initiatives/daily-museum-programs/policing-democracy/policing-in-a-more-perfect-union"><span data-dcnode-id="1523" instrument_node="">law enforcement</span></a><span data-dcnode-id="1521" instrument_node="">.</span></li></ul><p data-dcnode-id="1516"><strong data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Civics Programs are Tailored to:</span></strong></p><ul data-dcnode-id="1499" type="disc "><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Middle School</span></li><li data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">High School</span></li><li data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">College</span></li><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Adults</span></li><li data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Teachers</span></li><li data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Legal professionals</span></li><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Law enforcement</span></li><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Others</span></li></ul></div><span data-dcnode-id="1497" instrument_node="">

</span><h2 class="mb-0" data-dcnode-id="1482"><span data-dcnode-id="1487" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="1484" data-target="#collapse-accordionPanelOne-62933" data-toggle="collapse" type="button"><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.socialstudies.org/" target="_blank"><span data-dcnode-id="1486" instrument_node="">National Council for the Social Studies</span></a></button><span data-dcnode-id="1483" instrument_node="">
</span></h2><span data-dcnode-id="1481" instrument_node="">
</span></div><span data-dcnode-id="1479" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="1399" data-parent="#accordion62933" id="collapse-accordionPanelOne-62933"><span data-dcnode-id="1478" instrument_node="">
</span><div class="card-body" data-dcnode-id="1401"><div class="WordSection46" data-dcnode-id="1455"><p data-dcnode-id="1465"><span data-dcnode-id="1477" instrument_node="">8555 Sixteenth Street</span><br data-dcnode-id="1476"><span data-dcnode-id="1475" instrument_node=""> Suite 500</span><br data-dcnode-id="1474"><span data-dcnode-id="1473" instrument_node=""> Silver Spring, Maryland 20910</span><br data-dcnode-id="1472"><span data-dcnode-id="1471" instrument_node=""> Point of Contact: </span><a data-dcnode-id="1469" href="mailto:sgriffin@ncss.org"><span data-dcnode-id="1470" instrument_node="">Susan Griffin</span></a><span data-dcnode-id="1468" instrument_node="">, Executive Director</span><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node=""> Telephone: (800) 296-7840</span></p><p data-dcnode-id="1458"><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="1462" instrument_node="">Social studies educators teach students the content knowledge, intellectual skills, and civic values necessary for fulfilling the duties of citizenship in a participatory democracy. The mission of </span><a data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.socialstudies.org/" target="_blank"><span data-dcnode-id="1461" instrument_node="">National Council for the Social Studies</span></a><span data-dcnode-id="1459" instrument_node=""> is to provide leadership, service, and support for all social studies educators.</span></p><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Founded in 1921, National Council for the Social Studies has grown to be the largest association in the country devoted solely to social studies education. NCSS engages and supports educators in strengthening and advocating social studies. With members in all the 50 states, the District of Columbia, and 69 foreign countries, NCSS serves as an umbrella organization for elementary, secondary, and college teachers of history, civics, geography, economics, political science, sociology, psychology, anthropology, and law-related education. Organized into a network of more than 110 affiliated state, local, and regional councils and associated groups, the NCSS membership represents K-12 classroom teachers, college and university faculty members, curriculum designers and specialists, social studies supervisors, and leaders in the various disciplines that constitute the social studies.</span></p></div><p class="WordSection47" data-dcnode-id="1454"></p><p class="WordSection47" data-dcnode-id="1453"></p><p class="WordSection47" data-dcnode-id="1446"><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Programs: </span></strong><span data-dcnode-id="1450" instrument_node="">In 2010, NCSS published </span><em data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">National Curriculum Standards for Social Studies: A Framework for Teaching, Learning, and Assessment</span></em><span data-dcnode-id="1447" instrument_node="">. The revised standards continue to be structured around the ten themes of social studies; however, they offer a sharper focus on Purposes; Questions for Exploration; Knowledge (what learners need to understand); Processes (what learners will be capable of doing); and Products (how learners demonstrate understanding). NCSS standards ensure an integrated social science, behavioral science, and humanities approach for achieving academic and civic competence that can be used by social studies decision makers in K-12 schools.</span></p><p class="WordSection47" data-dcnode-id="1445"></p><p class="WordSection47" data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">The NCSS framework consists of ten themes incorporating fields of study that correspond with one or more relevant disciplines. These are:</span></p><p class="WordSection47" data-dcnode-id="1442"></p><div class="WordSection47" data-dcnode-id="1418"><ul data-dcnode-id="1419"><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Culture</span></li><li data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Time, Continuity, and Change</span></li><li data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">People, Places, and Environments</span></li><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Individual Development and Identity</span></li><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Individuals, Groups, and Institutions</span></li><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Power, Authority, and Governance</span></li><li data-dcnode-id="1427"><div data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Production, Distribution, and Consumption</span></div></li><li data-dcnode-id="1424"><div data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Science, Technology, and Society</span></div></li><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Global Connections</span></li><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Civic Ideals and Practices</span></li></ul></div><p data-dcnode-id="1415"><strong data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Civics Programs are Tailored to: </span></strong></p><ul data-dcnode-id="1402"><li data-dcnode-id="1412"><div data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Elementary School</span></div></li><li data-dcnode-id="1409"><div class="WordSection48" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Middle School</span></div></li><li data-dcnode-id="1406"><div class="WordSection48" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">High School</span></div></li><li data-dcnode-id="1403"><div class="WordSection48" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Teachers</span></div></li></ul></div><span data-dcnode-id="1400" instrument_node="">

</span><div class="card-body" data-dcnode-id="1359"><div class="WordSection49" data-dcnode-id="1372"><p data-dcnode-id="1373"><span data-dcnode-id="1380" instrument_node="">635 South 14th Street, Suite 120</span><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node=""> PO Box 95103</span><br data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node=""> Lincoln, Nebraska 68509</span><br data-dcnode-id="1375"><span data-dcnode-id="1374" instrument_node="">Phone: 402-475-1042</span></p></div><div class="WordSection50" data-dcnode-id="1360"><p data-dcnode-id="1365"><strong data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="1369" instrument_node=""> The </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nebarfnd.org/civics-education" target="_blank"><span data-dcnode-id="1368" instrument_node="">Nebraska State Bar Foundation</span></a><span data-dcnode-id="1366" instrument_node=""> has been designated as the State Center for Law-Related Education in Nebraska by Youth for Justice, a cooperative program supported by the Office of Juvenile Justice and Delinquency Prevention of the United States Department of Justice. The Foundation sponsors the Nebraska High School Mock Trial Project, Reaching the Age of Majority booklet, and various Law Day celebration activities as wells as newly emerging LRE programs and projects.</span></p><p data-dcnode-id="1361"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="1362" instrument_node="">The Nebraska State Bar Foundation supports many civic education programs, several of which are cosponsored by the Nebraska Supreme Court. Jointly held programs are under the State Bar Foundation’s PEOPLE Committee (Public Education Outreach Promoting the Law &amp; Equity) and include: Statewide High School Law Day Essay Contest, 5th Grade Job Shadowing, Journalist Education Seminars, Voters’ guide to Judges’ Retention Elections, and other topic specific programming.</span></p></div></div><span data-dcnode-id="1358" instrument_node="">

</span><div class="card-body" data-dcnode-id="1302"><div class="WordSection50" data-dcnode-id="1318"><p data-dcnode-id="1326"><span data-dcnode-id="1338" instrument_node="">State Capitol Building </span><br data-dcnode-id="1337"><span data-dcnode-id="1336" instrument_node=""> 600 East Boulevard Avenue, Dept. 180</span><br data-dcnode-id="1335"><span data-dcnode-id="1334" instrument_node=""> Bismarck, ND 58505</span><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node=""> Point of Contact: </span><a data-dcnode-id="1330" href="mailto:lbarnhardt@ndcourts.gov"><span data-dcnode-id="1331" instrument_node="">Lee Ann Barnhardt,</span></a><span data-dcnode-id="1329" instrument_node=""> Director of Education &amp; Communication</span><br data-dcnode-id="1328"><span data-dcnode-id="1327" instrument_node=""> Phone: 701-328-4251</span></p><p data-dcnode-id="1319"><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="1323" instrument_node="">The mission of the </span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ndcourts.gov/supreme-court/justices-teaching-institute" target="_blank"><span data-dcnode-id="1322" instrument_node="">North Dakota Justices Teaching Institute</span></a><span data-dcnode-id="1320" instrument_node=""> is to foster a better understanding of the roles of the courts, how they work, how judges make decisions and to increase public access to the court system. The goal is to enable participants to teach others with confidence about the nature, history, structure, function and processes of the courts and the judiciary; to implement strategies for effectively teaching legal concepts; to utilize technology to teach law-related subjects; and to apply constitutional knowledge and principles to judicial decision-making.</span></p></div><p class="WordSection51" data-dcnode-id="1317"></p><p class="WordSection51" data-dcnode-id="1316"></p><p class="WordSection51" data-dcnode-id="1312"><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Program Developed/Implemented: </span></strong><span data-dcnode-id="1313" instrument_node="">North Dakota Justices Teaching Institute is offered bi-annually to secondary history and government teachers. Supreme Court justices develop the 1 ½ day course and guide participants through academic and clinical experiences preparing for the Institute’s final application – a mock oral argument. Experiential learning sessions progress through the function and structure of state and federal courts; the framework of judicial decision- making ; legal research; and civil and criminal court processes. To provide an understanding of the underlying legal concepts that the teachers apply to decide the constitutional question, the justices present sessions analyzing the respective constitutional amendment, statues, and case law. Lesson plans, PowerPoints, teaching notes and other materials are provided to assist the teachers in fulfilling their requirement to teach the legal concepts to their students.</span></p><p class="WordSection51" data-dcnode-id="1311"></p><p class="WordSection51" data-dcnode-id="1310"></p><p class="WordSection51" data-dcnode-id="1307"><strong data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Civics Programs are Tailored to:</span></strong></p><div class="WordSection51" data-dcnode-id="1303"><ul data-dcnode-id="1304"><li data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Teachers</span></li></ul></div></div><span data-dcnode-id="1301" instrument_node="">

or teachers and others in the civic community via institutions and training workshops. Classroom materials are created and distributed for programs administered by LRE. To fulfill its mission of educating citizens, LRE develops programs unique to Oklahoma such as INFORM — a methamphetamine awareness seminar program, and Law School for Legislators — a training workshop for new legislators.</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Programs include:</span></p></div><div class="WordSection57" data-dcnode-id="1227"><ul data-dcnode-id="1237"><li data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Hatton W. Sumners: Foundation of Democracy – LRE Basis 101 Summer Institute</span></li><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Peaceful Resolution for Oklahoma Students (PROS)</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Law School for Legislators</span></li><li data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Lawyers in the Classroom</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Representative Democracy in America</span></li><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Oklahoma Close Up</span></li><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">We the People: The Citizen and the Constitution</span></li><li data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">We the People: Project Citizen</span></li></ul><p class="WordSection51" data-dcnode-id="1234"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Civics Programs are Tailored to:</span></strong></p><div class="WordSection51" data-dcnode-id="1228"><ul data-dcnode-id="1229"><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">High school students</span></li><li data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">C </span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="980" data-target="#collapse-accordionPanelOne-62954" data-toggle="collapse" type="button"><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sandywilburmusic.com/" target="_blank"><span data-dcnode-id="982" instrument_node="">Sandy Wilbur Music</span></a></button><span data-dcnode-id="979" instrument_node="">
</span></h2><span data-dcnode-id="977" instrument_node="">

</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="967" data-parent="#accordion62954" id="collapse-accordionPanelOne-62954"><span data-dcnode-id="974" instrument_node="">
</span><div class="card-body" data-dcnode-id="969"><p data-dcnode-id="970"><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sandywilburmusic.com/"><span data-dcnode-id="973" instrument_node="">Sandy Wilbur Music</span></a><span data-dcnode-id="971" instrument_node=""> has produced three civics/music educational videos designed as teaching tools for teachers of music, history, social studies and civics and helping kids learn about important documents, concepts and values. "We The People " helps kids learn the Preamble to the Constitution and how the three branches of government work. "Four Score and Seven Years Ago " sings part of the Gettysburg Address and touches on the Civil War, Lincoln and equality. "She Still Carries A Torch " is about the Statue of Liberty and what it means to the millions of immigrants who have come to this country in search of freedom.</span></p></div><span data-dcnode-id="968" instrument_node="">

</span><div class="card" data-dcnode-id="888"><span data-dcnode-id="960" instrument_node="">
</span><div class="card-header" data-dcnode-id="951" id="heading-accordionPanelOne"><span data-dcnode-id="959" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="953"><span data-dcnode-id="958" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="955" data-target="#collapse-accordionPanelOne-62939" data-toggle="collapse" type="button"><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sconet.state.oh.us/VisitorInfo/CivicEd/default.asp" target="_blank"><span data-dcnode-id="957" instrument_node="">Supreme Court of Ohio Civic Education Program</span></a></button><span data-dcnode-id="954" instrument_node="">
</span></h2><span data-dcnode-id="952" instrument_node="">
</span></div><span data-dcnode-id="950" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="890" data-parent="#accordion62939" id="collapse-accordionPanelOne-62939"><span data-dcnode-id="949" instrument_node="">
</span><div class="card-body" data-dcnode-id="892"><p class="WordSection53" data-dcnode-id="940"><span data-dcnode-id="948" instrument_node="">65 South Front Street</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node=""> Columbus, OH 43215</span><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node=""> Point of Contact: </span><a data-dcnode-id="942" href="mailto:jay.wuebbold@sc.ohio.gov"><span data-dcnode-id="943" instrument_node="">Jay Wuebbold</span></a><span data-dcnode-id="941" instrument_node="">, Civic Education Section</span></p><p class="WordSection53" data-dcnode-id="939"></p><p class="WordSection53" data-dcnode-id="938"></p><p class="WordSection53" data-dcnode-id="931"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Mission and Goal: </span></strong><span data-dcnode-id="935" instrument_node="">The </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sconet.state.oh.us/VisitorInfo/CivicEd/default.asp" target="_blank"><span data-dcnode-id="934" instrument_node="">Supreme Court of Ohio Civic Education Program</span></a><span data-dcnode-id="932" instrument_node=""> is dedicated to informing citizens about the judiciary, with the aim of building trust through knowledge and understanding. The initiative employs many and varied approaches: off-site court, a visitor education center, guided tours, classroom lesson plans and a public lecture series.</span></p><p class="WordSection53" data-dcnode-id="930"></p><p class="WordSection53" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The program is built on a foundation of innovation and continues to move forward with new initiatives. Students are the primary, but not exclusive audience. The education center and online lesson plans offer dynamic learning opportunities that provide an inside look at Ohio courts. We effectively use case narratives that personalize and define the courts, making sometimes-complex concepts understandable on many levels, crossing age groups and cultures.</span></p><div class="WordSection54" data-dcnode-id="912"><p data-dcnode-id="917"><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="925" instrument_node="">In </span><strong data-dcnode-id="922"><em data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Ohio v Smith </span></em></strong><span data-dcnode-id="921" instrument_node="">the Supreme Court of Ohio ruled police are required to obtain a warrant before searching data in a cell phone seized during an arrest. It is the basis of a lesson plan for classroom discussion about the Fourth Amendment. Posted online, it includes a link to the video stream of the oral arguments, a summary of legal issues and the court’s decision. Now in its fourth year, the </span><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Forum on the Law </span></strong><span data-dcnode-id="918" instrument_node="">lecture program features speakers and topics that attract the general public and legal professionals.</span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">The Ohio Judicial Center Foundation provided $30,000 for grants to 100 financially strapped schools to help cover costs to visit the Supreme Court and its education center during the past school year.</span></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Civics Programs are Tailored to:</span></p></div><ul data-dcnode-id="893"><li data-dcnode-id="909"><div class="WordSection55" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Elementary School</span></div></li><li data-dcnode-id="906"><div class="WordSection55" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Middle School</span></div></li><li data-dcnode-id="903"><div class="WordSection55" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">High School</span></div></li><li data-dcnode-id="900"><div class="WordSection55" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">College</span></div></li><li data-dcnode-id="897"><div class="WordSection55" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Adults</span></div></li><li data-dcnode-id="894"><div class="WordSection55" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Teachers</span></div></li></ul></div><span data-dcnode-id="891" instrument_node="">

</span><h2 class="mb-0" data-dcnode-id="873"><span data-dcnode-id="878" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="875" data-target="#collapse-accordionPanelOne-62992" data-toggle="collapse" type="button"><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.streetlaw.org/en/home" target="_blank"><span data-dcnode-id="877" instrument_node="">Street Law, Inc.</span></a></button><span data-dcnode-id="874" instrument_node="">
</span></h2><span data-dcnode-id="872" instrument_node="">
</span></div><span data-dcnode-id="870" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="822" data-parent="#accordion62992" id="collapse-accordionPanelOne-62992"><span data-dcnode-id="869" instrument_node="">
</span><div class="card-body" data-dcnode-id="824"><p class="WordSection59" data-dcnode-id="861"><span data-dcnode-id="868" instrument_node="">1010 Wayne Avenue</span><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node=""> Suite 870</span><br data-dcnode-id="865"><span data-dcnode-id="864" instrument_node=""> Silver Spring, Maryland 20910</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node=""> Phone: (301) 589-1130</span></p><p class="WordSection60" data-dcnode-id="857"><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.streetlaw.org/en/home" target="_blank"><span data-dcnode-id="860" instrument_node="">Street Law, Inc.</span></a><span data-dcnode-id="858" instrument_node=""> creates classroom and community programs that teach people about law, democracy, and human rights worldwide. Street Law’s accessible, engaging, and interactive programs empower students and communities to become active, legally-savvy contributors to society.</span></p><p class="Basiccopysl" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Founded by a group of visionary Georgetown University law students in 1972, the organization’s work now spans 40 nations and reaches thousands of people every year.&nbsp;&nbsp;Although some initiatives bring staff directly into classrooms and neighborhoods, most efforts are focused on training individuals and organizations to become effective Street Law educators.</span></p><p class="Basiccopysl" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Street Law develops and implement interactive teaching methods that equip teachers, law students and lawyers, and other volunteers to educate students of all ages. They also provide top-flight professional development opportunities for educators and produce balanced, accurate curricular materials for use in classrooms and community settings. The approach is practical, relevant, and experiential, blending legal content with innovative hands-on teaching strategies that actively engage young people in the learning process. As a result, Street Law participants benefit from “real life” lessons and insights, which they can use to effect positive change for the rest of their lives.</span></p><p data-dcnode-id="842" style="line-height: normal; "><span data-dcnode-id="852" instrument_node="">Street Law has an extensive </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.streetlaw.org/en/resource_library"><span data-dcnode-id="851" instrument_node="">resource library</span></a><span data-dcnode-id="849" instrument_node=""> with free teaching materials. Along with the Supreme Court Historical Society, Street Law offers professional development to high school social studies teachers about the Supreme Court. This </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.streetlaw.org/en/programs/supreme_court_summer_institute_for_teachers"><span data-dcnode-id="848" instrument_node="">Institute</span></a><span data-dcnode-id="846" instrument_node=""> takes place each June. </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.streetlaw.org/en/Product.42.aspx"><span data-dcnode-id="845" instrument_node="">Street Law’s textbook</span></a><span data-dcnode-id="843" instrument_node="">, Street Law: A Course in Practical Law, now in its eighth edition, is used in classrooms across the U.S. Hundreds of lessons on law, democracy, human right, public policy, crime prevention, conflict resolution, and youth advocacy are contained within the book.</span></p><p class="WordSection61" data-dcnode-id="841"></p><p class="WordSection61" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Street Law caters to:</span></p><div class="WordSection61" data-dcnode-id="825"><ul data-dcnode-id="826"><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Teachers and Educators</span></li><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Lawyers, Law Students, and the Legal Community</span></li><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Non-governmental Organizations</span></li><li data-dcnode-id="830"><div data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Juvenile Justice Professionals</span></div></li><li data-dcnode-id="827"><div data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Law Enforcement Officers</span></div></li></ul></div></div><span data-dcnode-id="823" instrument_node="">

</span><h2 class="mb-0" data-dcnode-id="808"><span data-dcnode-id="813" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="810" data-target="#collapse-accordionPanelOne-62990" data-toggle="collapse" type="button"><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.courts.wa.gov/education" target="_blank"><span data-dcnode-id="812" instrument_node="">Washington State Administrative Office of the Courts</span></a></button><span data-dcnode-id="809" instrument_node="">

</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="759" data-parent="#accordion62990" id="collapse-accordionPanelOne-62990"><span data-dcnode-id="804" instrument_node="">
</span><div class="card-body" data-dcnode-id="761"><p data-dcnode-id="793"><span data-dcnode-id="803" instrument_node="">1112 Quince Street, SE</span><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node=""> P.O. Box 41170</span><br data-dcnode-id="800"><span data-dcnode-id="799" instrument_node=""> Olympia, Washington 98504-1170</span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node=""> Point of Contact: </span><a data-dcnode-id="795" href="mailto:margaret.fisher@courts.wa.gov"><span data-dcnode-id="796" instrument_node="">Margaret E. Fisher</span></a><span data-dcnode-id="794" instrument_node="">, Attorney</span></p><div class="WordSection62" data-dcnode-id="778"><p data-dcnode-id="786"><strong data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="790" instrument_node="">The </span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.courts.wa.gov/education" target="_blank"><span data-dcnode-id="789" instrument_node="">Washington State Administrative Office of the Courts</span></a><span data-dcnode-id="787" instrument_node=""> (AOC) has developed the Judges in the Classroom program, in which teachers may request a judge to present one of the interactive lessons that appear online. Lessons are provided for elementary, middle and high school levels.</span></p><p data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">The AOC participates in a unique Street Law program in which judges make the commitment to teach weekly in a local high school from the national textbook, </span><em data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Street Law: A Course in Practical Law</span></em><span data-dcnode-id="782" instrument_node="">. More than 25 pairings exist around the state of Washington. Some judges are in their seventh year of teaching Street Law, and two new sites are added annually. The judge/teacher pairs receive training, a classroom set of the textbooks and an onsite observation.</span></p><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Civics Programs are Tailored to:</span></p></div><ul data-dcnode-id="762"><li data-dcnode-id="775"><div class="WordSection63" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Elementary School</span></div></li><li data-dcnode-id="772"><div class="WordSection63" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Middle School</span></div></li><li data-dcnode-id="769"><div class="WordSection63" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">High School</span></div></li><li data-dcnode-id="766"><div class="WordSection63" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Adults</span></div></li><li data-dcnode-id="763"><div class="WordSection63" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Teachers</span></div></li></ul></div><span data-dcnode-id="760" instrument_node="">

</span><div class="card-header" data-dcnode-id="743" id="heading-accordionPanelOne"><span data-dcnode-id="751" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="745"><span data-dcnode-id="750" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="747" data-target="#collapse-accordionPanelOne-62988" data-toggle="collapse" type="button"><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wicourts.gov/courts/supreme/index.htm" target="_blank"><span data-dcnode-id="749" instrument_node="">Wisconsin Supreme Court</span></a></button><span data-dcnode-id="746" instrument_node="">
</span></h2><span data-dcnode-id="744" instrument_node="">
</span></div><span data-dcnode-id="742" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="664" data-parent="#accordion62988" id="collapse-accordionPanelOne-62988"><span data-dcnode-id="741" instrument_node="">
</span><div class="card-body" data-dcnode-id="666"><p class="WordSection63" data-dcnode-id="728"><span data-dcnode-id="740" instrument_node="">16 East State Capitol</span><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node=""> P.O. Box 1688</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node=""> Madison, WI 53701</span><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node=""> Point of Contact: </span><a data-dcnode-id="732" href="mailto:theresa.owens@wicourts.gov"><span data-dcnode-id="733" instrument_node="">Theresa Owens</span></a><span data-dcnode-id="731" instrument_node="">, Executive Assistant to Chief Justice Shirley S. Abrahamson</span><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node=""> Phone: (608) 261-8297</span></p><p class="WordSection64" data-dcnode-id="719"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="725" instrument_node=""> </span><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node=""> The </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wicourts.gov/courts/supreme/index.htm" target="_blank"><span data-dcnode-id="722" instrument_node="">Wisconsin Court System</span></a><span data-dcnode-id="720" instrument_node=""> has designed public education and outreach programs to promote public understanding of the role of the courts and enhance public confidence in the judicial system. The court system is committed to speaking with the people of the state about the judicial branch and listening to their concerns. The court system designs and provides programs that maintain a strong and vital connection between the courts and the communities we serve. The programs exist to strengthen this partnership, educate the public about the work of the courts, ensure access to justice for all, and provide outreach and educational tools for educators and local courts throughout the state.</span></p><div class="WordSection65" data-dcnode-id="684"><p data-dcnode-id="715"><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Programs Developed/Distributed/Implemented: Courts Connecting with Communities </span></strong><span data-dcnode-id="716" instrument_node="">is a new statewide outreach project initiated by Chief Justice Abrahamson. The project provides a “toolkit,” a step-by-step manual and materials for twenty outreach programs. It also promotes a coordinated county-by- county approach that establishes outreach planning as a continuing project in individual communities.</span></p><p data-dcnode-id="711"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Justice on Wheels </span></strong><span data-dcnode-id="712" instrument_node="">takes the Supreme Court on the road to hold oral arguments in a</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">county courthouse. This program will celebrate its twentieth year in 2013.</span></p><p data-dcnode-id="705"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Court with Class </span></strong><span data-dcnode-id="706" instrument_node="">brings high school students to the state Capitol to watch an oral argument and meet with a justice.</span></p><p data-dcnode-id="698"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Case of the Month </span></strong><span data-dcnode-id="702" instrument_node="">provides teachers with a case synopsis, briefs, and a roadmap showing how cases come to the court. </span><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">iCivics </span></strong><span data-dcnode-id="699" instrument_node="">uses video games to provide students with interactive civics education.</span></p><p data-dcnode-id="687"><span data-dcnode-id="697" instrument_node="">The </span><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Speakers’ Bureau </span></strong><span data-dcnode-id="694" instrument_node="">connects the public and judges; </span><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Media Relations Seminars </span></strong><span data-dcnode-id="691" instrument_node="">connect court information staff and news media; and </span><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Judicial Ride Along </span></strong><span data-dcnode-id="688" instrument_node="">connects judges and legislators.</span></p><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Civics Programs are Tailored to:</span></p></div><ul data-dcnode-id="667"><li data-dcnode-id="681"><div class="WordSection66" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Elementary School</span></div></li><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Middle School</span></li><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">High School</span></li><li data-dcnode-id="674"><div class="WordSection66" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Adults</span></div></li><li data-dcnode-id="671"><div class="WordSection66" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Teachers</span></div></li><li data-dcnode-id="668"><div class="WordSection66" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Other - Local courts and bar associations, Legislators and Executive Branch</span></div></li></ul></div><span data-dcnode-id="665" instrument_node="">
