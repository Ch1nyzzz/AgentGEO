</span><p class="WordSection1" data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">NCSC has gathered a list of national organizations whose mission it is to educate others about the government and law. Some organizations provide lesson plans or other materials, which teachers, court leaders, or even parents, may consider as useful educational learning tools.</span></p><p class="WordSection2" data-dcnode-id="3628" style="text-align: left;"><span data-dcnode-id="3635" instrument_node="">If you have a civics education program that is not listed and should be, please contact </span><a data-dcnode-id="3633" href="mailto:droesch@ncsc.org" target="_blank"><span data-dcnode-id="3634" instrument_node="">Deirdre Roesch</span></a><span data-dcnode-id="3632" instrument_node=""> or </span><a data-dcnode-id="3630" href="mailto:lmontgomery@ncsc.org" target="_blank"><span data-dcnode-id="3631" instrument_node="">Lorri Montgomery</span></a><span data-dcnode-id="3629" instrument_node="">.</span></p><span data-dcnode-id="3627" instrument_node="">

</span><h2 class="mb-0" data-dcnode-id="3609"><span data-dcnode-id="3614" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="3611" data-target="#collapse-accordionPanelOne-62854" data-toggle="collapse" type="button"><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aclce.org/" target="_blank"><span data-dcnode-id="3613" instrument_node="">Alabama Center for Law &amp; Civic Education</span></a></button><span data-dcnode-id="3610" instrument_node="">
</span></h2><span data-dcnode-id="3608" instrument_node="">
</span></div><span data-dcnode-id="3606" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="3565" data-parent="#accordion62854" id="collapse-accordionPanelOne-62854"><span data-dcnode-id="3605" instrument_node="">
</span><div class="card-body" data-dcnode-id="3567"><p class="WordSection2" data-dcnode-id="3595"><span data-dcnode-id="3604" instrument_node="">Cumberland School of Law</span><br data-dcnode-id="3603"><span data-dcnode-id="3602" instrument_node=""> 800 Lakeshore Drive</span><br data-dcnode-id="3601"><span data-dcnode-id="3600" instrument_node=""> Birmingham, Alabama 35229</span><br data-dcnode-id="3599"><span data-dcnode-id="3598" instrument_node=""> Phone: (205) 726-2433</span><br data-dcnode-id="3597"><span data-dcnode-id="3596" instrument_node=""> Toll Free: (800) 888-7301</span></p><p class="WordSection2" data-dcnode-id="3594"></p><p class="WordSection2" data-dcnode-id="3587"><strong data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="3591" instrument_node="">The </span><a data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aclce.org/" target="_blank"><span data-dcnode-id="3590" instrument_node="">Alabama Center for Law &amp; Civic Education (ACLCE)</span></a><span data-dcnode-id="3588" instrument_node=""> is dedicated to educating young citizens in civic knowledge, skills and responsibilities. ACLCE is a 501(c) (3) nonprofit civic education organization which was established in June of 1990. ACLCE is a nationally recognized resource and training center for teachers, school resource officers and community leaders.</span></p><p class="WordSection2" data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">The goal of ACLCE is to prepare youth to become active, engaged and informed participants in a democratic society. We offer innovative programs that are relevant to the diverse needs of Alabama’s students and teachers. Over the past 20 years, we have built an energetic and cost-effective non-profit organization that utilizes the power of an experienced staff and a large group of committed volunteers to reach educators, schools, and students throughout the state.</span></p><p class="WordSection2" data-dcnode-id="3582"><strong data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">Programs Developed/Distributed/Implemented:</span></strong></p><div class="WordSection2" data-dcnode-id="3568"><ul data-dcnode-id="3569"><li data-dcnode-id="3579"><div data-dcnode-id="3580" style="line-height: normal;"><span data-dcnode-id="3581" instrument_node="">We the People: The Citizen and the Constitution</span></div></li><li data-dcnode-id="3576"><div data-dcnode-id="3577" style="line-height: normal;"><span data-dcnode-id="3578" instrument_node="">Play by the Rules</span></div></li><li data-dcnode-id="3573"><div data-dcnode-id="3574" style="line-height: normal;"><span data-dcnode-id="3575" instrument_node="">Teen Court of Jefferson County</span></div></li><li data-dcnode-id="3570"><div data-dcnode-id="3571" style="line-height: normal;"><span data-dcnode-id="3572" instrument_node="">Street Law</span></div></li></ul></div></div><span data-dcnode-id="3566" instrument_node="">

</span><h2 class="mb-0" data-dcnode-id="3551"><span data-dcnode-id="3556" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="3553" data-target="#collapse-accordionPanelOne-62856" data-toggle="collapse" type="button"><a data-dcnode-id="3554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.courts.alaska.gov/media/outreach.htm" target="_blank"><span data-dcnode-id="3555" instrument_node="">Alaska Court System</span></a></button><span data-dcnode-id="3552" instrument_node="">
</span></h2><span data-dcnode-id="3550" instrument_node="">
</span></div><span data-dcnode-id="3548" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="3531" data-parent="#accordion62856" id="collapse-accordionPanelOne-62856"><span data-dcnode-id="3547" instrument_node="">
</span><div class="card-body" data-dcnode-id="3533"><p data-dcnode-id="3541"><span data-dcnode-id="3546" instrument_node="">303 K Street, 5th Floor</span><br data-dcnode-id="3545"><span data-dcnode-id="3544" instrument_node=""> Anchorage, Alaska 99501</span><br data-dcnode-id="3543"><span data-dcnode-id="3542" instrument_node=""> Phone: 907-264-0879</span></p><p data-dcnode-id="3534"><strong data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="3538" instrument_node="">Each year, the </span><a data-dcnode-id="3536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.courts.alaska.gov/media/outreach.htm"><span data-dcnode-id="3537" instrument_node="">Alaska Court System</span></a><span data-dcnode-id="3535" instrument_node=""> works with legal organizations and educational groups to foster law-related education in our state. The Alaska Bar Association, the American Bar Association, the Anchorage Bar Association and other groups offer excellent educational programs that help students better understand our legal system and the rights and responsibilities of citizenship. Whether you are an educator, parent or student, we hope you will explore these opportunities for civic engagement and learning, which include iCivics, Supreme Court LIVE, Color of Justice, Law Day, and the Alaska High School Mock Trial Championships.</span></p></div><span data-dcnode-id="3532" instrument_node="">
</span></div><span data-dcnode-id="3530" instrument_node="">

</span><div class="card" data-dcnode-id="3431"><span data-dcnode-id="3524" instrument_node="">
</span><div class="card-header" data-dcnode-id="3515" id="heading-accordionPanelOne"><span data-dcnode-id="3523" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="3517"><span data-dcnode-id="3522" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="3519" data-target="#collapse-accordionPanelOne-62858" data-toggle="collapse" type="button"><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanbar.org/publiced" target="_blank"><span data-dcnode-id="3521" instrument_node="">American Bar Association Division for Public Education</span></a></button><span data-dcnode-id="3518" instrument_node="">
</span></h2><span data-dcnode-id="3516" instrument_node="">
</span></div><span data-dcnode-id="3514" instrument_node="">

</span><div class="card-body" data-dcnode-id="3435"><p data-dcnode-id="3501"><span data-dcnode-id="3512" instrument_node="">321 N. Clark Street</span><br data-dcnode-id="3511"><span data-dcnode-id="3510" instrument_node=""> Chicago, Illinois 60654</span><br data-dcnode-id="3509"><span data-dcnode-id="3508" instrument_node=""> Phone: 312.988.5735</span><br data-dcnode-id="3507"><span data-dcnode-id="3506" instrument_node=""> Fax: 312.988.5494</span><br data-dcnode-id="3505"><span data-dcnode-id="3504" instrument_node=""> Email: </span><a data-dcnode-id="3502" href="mailto:publiceducation@americanbar.org"><span data-dcnode-id="3503" instrument_node="">publiceducation@americanbar.org</span></a></p><p class="WordSection3" data-dcnode-id="3494"><strong data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Mission and goals: </span></strong><span data-dcnode-id="3498" instrument_node="">The six goals that follow constitute the priorities of the </span><a data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanbar.org/publiced" target="_blank"><span data-dcnode-id="3497" instrument_node="">American Bar Association Division for Public Education</span></a><span data-dcnode-id="3495" instrument_node=""> and guide the programs and practices of the division for public education.</span></p><ul data-dcnode-id="3472"><li data-dcnode-id="3491"><div data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">To promote the highest-quality education about law in schools (kindergarten through adult classes)</span></div></li><li data-dcnode-id="3488"><div data-dcnode-id="3489" style="line-height: normal;"><span data-dcnode-id="3490" instrument_node="">and in community settings.</span></div></li><li data-dcnode-id="3485"><div data-dcnode-id="3486" style="line-height: normal;"><span data-dcnode-id="3487" instrument_node="">To stimulate public awareness of, and dialogue about, law and its role in society.</span></div></li><li data-dcnode-id="3482"><div data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">To mobilize the resources of the ABA to promote public understanding of law and the legal profession.</span></div></li><li data-dcnode-id="3479"><div data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">To establish mechanisms that encourage and recognize individuals and institutions for advancing public understanding of law.</span></div></li><li data-dcnode-id="3476"><div data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">To include diverse peoples, organizations, and perspectives in the planning and implementation of programs and in the audiences our programs serve.</span></div></li><li data-dcnode-id="3473"><div data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">To form partnerships to develop and implement public education programs about law.</span></div></li></ul><p data-dcnode-id="3468"><strong data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">Programs Developed/Distributes/Implemented: </span></strong><span data-dcnode-id="3469" instrument_node="">We offer law-related resources and programs to educators, students, journalists, legal professionals, opinion leaders, and the public to promote understanding of law and its vital role in our society. Programs and resources include:</span></p><ul data-dcnode-id="3436"><li data-dcnode-id="3463"><div data-dcnode-id="3464"><em data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Insights on Law and Society</span></em><span data-dcnode-id="3465" instrument_node="">, a magazine for civics, government, history and law high school teachers</span></div></li><li data-dcnode-id="3460"><div data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">Federal Trials and Great Debates Summer Institute for Teachers, co-sponsored with the Federal Judicial Center</span></div></li><li data-dcnode-id="3457"><div data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">Local and National Civics &amp; Law Academies</span></div></li><li data-dcnode-id="3446"><div data-dcnode-id="3447"><em data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">Pr</span></em><span data-dcnode-id="3454" instrument_node=""> </span><em data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">e</span></em><span data-dcnode-id="3451" instrument_node=""> </span><em data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">view of the United States Supreme Court Cases</span></em><span data-dcnode-id="3448" instrument_node="">, a publication with key background information on all current U.S. Supreme Court cases and briefs, written in easy to understand language</span></div></li><li data-dcnode-id="3443"><div data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Law Day and Constitution Day resources</span></div></li><li data-dcnode-id="3440"><div data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Programs including the Leon Jaworski Public Program, On the Docket and National Law-Related</span></div></li><li data-dcnode-id="3437"><div data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">Education Conference (bi-annual)</span></div></li></ul></div><span data-dcnode-id="3434" instrument_node="">

</span><div class="card-body" data-dcnode-id="3356"><p data-dcnode-id="3405"><span data-dcnode-id="3414" instrument_node="">2001 Bryan St., Suite 3000</span><br data-dcnode-id="3413"><span data-dcnode-id="3412" instrument_node=""> Dallas, Texas 75201</span><br data-dcnode-id="3411"><span data-dcnode-id="3410" instrument_node=""> Point of Contact: </span><a data-dcnode-id="3408" href="mailto:briant@abota.org"><span data-dcnode-id="3409" instrument_node="">Brian W. Tyson, Executive Director</span></a><br data-dcnode-id="3407"><span data-dcnode-id="3406" instrument_node="">Phone: (214) 871-7523</span></p><p class="WordSection4" data-dcnode-id="3398"><strong data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="3402" instrument_node="">The mission of the </span><a data-dcnode-id="3400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.abota.org/" target="_blank"><span data-dcnode-id="3401" instrument_node="">American Board of Trial Advocates</span></a><span data-dcnode-id="3399" instrument_node=""> (ABOTA) is to provide education concerning the history and value of the right to trial by jury.</span></p><p class="WordSection4" data-dcnode-id="3394"><strong data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="3395" instrument_node="">The ABOTA Academies consist of the following:</span></p><ul data-dcnode-id="3367"><li data-dcnode-id="3389"><div data-dcnode-id="3390"><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scholastic.com/americanjustice." target="_blank"><span data-dcnode-id="3393" instrument_node="">Justice By the People</span></a><span data-dcnode-id="3391" instrument_node=""> is used by middle and high school teachers to introduce the concepts and practice of jury trial.</span></div></li><li data-dcnode-id="3386"><div data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">James Otis Lecture Series – lectures held in historic government buildings by a noted historian to honor Otis, who played a crucial role in the Revolution of the Bill of Rights</span></div></li><li data-dcnode-id="3383"><div data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Teacher's Law School – a 3-4 day concentrated course on legal subjects relevant to civics education</span></div></li><li data-dcnode-id="3380"><div data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Constitutional Law Workshop –a full-day educator workshop in collaboration with The National Constitution Center. Two nationally renowned constitutional scholars lecture; curriculum development training and classroom materials are provided</span></div></li><li data-dcnode-id="3377"><div data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Journalist Law School – leading journalists receive a 3-day course on legal topics, principles and procedures</span></div></li><li data-dcnode-id="3374"><div data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">Civility Matters – this project provides a DVD and published materials, wherein nationally recognized attorneys and judges discuss civility and professionalism to law schools, courtrooms, and bar associations nationwide</span></div></li><li data-dcnode-id="3371"><div data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Masters in Trial – mock trials conducted in various cities 15 to 20 times per year</span></div></li><li data-dcnode-id="3368"><div data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">ABOTA Trial College – a rigorous school for aspiring trial attorneys. The program features intense instruction on trial presentation and technique with critiques by ABOTA members and judges.</span></div></li></ul><p data-dcnode-id="3364"><strong data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Civics Programs are Tailored to: </span></strong></p><ul data-dcnode-id="3357"><li data-dcnode-id="3361"><div data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Middle school</span></div></li><li data-dcnode-id="3358"><div data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Teachers</span></div></li></ul></div><span data-dcnode-id="3355" instrument_node="">

</span><h2 class="mb-0" data-dcnode-id="3340"><span data-dcnode-id="3345" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="3342" data-target="#collapse-accordionPanelOne-62865" data-toggle="collapse" type="button"><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanheritage.org/" target="_blank"><span data-dcnode-id="3344" instrument_node="">American Heritage Education Foundation</span></a></button><span data-dcnode-id="3341" instrument_node="">
</span></h2><span data-dcnode-id="3339" instrument_node="">
</span></div><span data-dcnode-id="3337" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="3300" data-parent="#accordion62865" id="collapse-accordionPanelOne-62865"><span data-dcnode-id="3336" instrument_node="">
</span><div class="card-body" data-dcnode-id="3302"><p data-dcnode-id="3330"><span data-dcnode-id="3335" instrument_node="">3501 W. Alabama, Suite 200</span><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node=""> Houston, Texas 77027</span><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node=""> Phone: (713) 627-2698</span></p><div class="WordSection6" data-dcnode-id="3303"><p data-dcnode-id="3323"><strong data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">Mission and goals: </span></strong><span data-dcnode-id="3327" instrument_node="">The </span><a data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanheritage.org/" target="_blank"><span data-dcnode-id="3326" instrument_node="">American Heritage Education Foundation</span></a><span data-dcnode-id="3324" instrument_node=""> (AHEF) is a non-profit, non-partisan educational foundation (501.c.3) dedicated to the understanding and teaching of America's factual and philosophical heritage to promote constructive citizenship and Freedom, Unity, Progress, and Responsibility among our students and citizens. AHEF accomplishes this patriotic mission by writing, producing, and distributing FREE K-12 lesson plans to teachers, students, and families in all 50 states and through additional initiatives, programs, and partnerships.</span></p><p data-dcnode-id="3304"><strong data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Programs Developed/Distributed/Implemented:</span></strong><span data-dcnode-id="3320" instrument_node=""> </span><strong data-dcnode-id="3317"><em data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">America's Heritage: An Adventure in Liberty </span></em></strong><span data-dcnode-id="3316" instrument_node="">is a tested lesson plan resource and supplement for Kindergarten-12th grade teachers of social studies, U. S. history, U. S. government, political science, economics, geography, speech, and/or related subjects. Written by fellow teachers, the resource consists of age-appropriate and modifiable lesson plans grouped into three separate books according to level: elementary, middle, and high school. Each elementary school lesson plan correlates practically with the nationally applicable Core Knowledge Skills (grades K-6) (national edition). The </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanheritage.org/elementary.html"><span data-dcnode-id="3315" instrument_node="">elementary school </span></a><a data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanheritage.org/elementary.html"><span data-dcnode-id="3313" instrument_node="">lesson plans </span></a><span data-dcnode-id="3311" instrument_node="">include lessons about the colonists' experience under monarchy; the context for the writing of the Declaration of Independence; the creation of important American symbols, songs, and holidays; and the character traits modeled by great national leaders and presidents. Each middle and high school lesson plan correlates with the National Council for the Social Studies (NCSS) standards (national edition). The </span><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanheritage.org/middle.html"><span data-dcnode-id="3310" instrument_node="">middle school lesson </span></a><span data-dcnode-id="3308" instrument_node="">plans include lessons focusing on concepts within the Declaration of Independence, the Gettysburg Address, and other important texts and American symbols as well as the ideals for which many fought and sacrificed their lives. The </span><a data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.americanheritage.org/high_.html"><span data-dcnode-id="3307" instrument_node="">high school lesson plans </span></a><span data-dcnode-id="3305" instrument_node="">include lessons for in-depth analysis and understanding of the ideas, intentions, arguments, rights, and meanings addressed in significant texts from the Mayflower Compact and the Declaration of Independence to Federalist 47, the First Amendment, and a government letter on religious expression in public schools.</span></p></div></div><span data-dcnode-id="3301" instrument_node="">

</span><div class="card-body" data-dcnode-id="3206"><p data-dcnode-id="3269"><span data-dcnode-id="3281" instrument_node="">4201 N. 24th Street</span><br data-dcnode-id="3280"><span data-dcnode-id="3279" instrument_node=""> Suite 210</span><br data-dcnode-id="3278"><span data-dcnode-id="3277" instrument_node=""> Phoenix, Arizona 85016-6288</span><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node=""> Point of Contact: </span><a data-dcnode-id="3273" href="mailto:Joannie.Collins@azflse.org"><span data-dcnode-id="3274" instrument_node="">Joannie D. Collins,</span></a><span data-dcnode-id="3272" instrument_node=""> Director of Quality Enhancement </span><br data-dcnode-id="3271"><span data-dcnode-id="3270" instrument_node=""> Phone: 602-340-7279</span></p><p data-dcnode-id="3262"><strong data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="3266" instrument_node=""> The </span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.azflse.org/" target="_blank"><span data-dcnode-id="3265" instrument_node="">Arizona Foundation for Legal Services &amp; Education</span></a><span data-dcnode-id="3263" instrument_node=""> unites community partners, educators, and youth to help all Arizonans be competent, responsible citizens throughout their lives:</span></p><ol data-dcnode-id="3253"><li data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">To be informed with an appreciation of history and the fundamental processes of American democracy; an understanding of public issues; an awareness of personal rights and responsibilities; and ability to obtain information and think critically.</span></li><li data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">To respectfully participate in communities while working with an array of cultural, social, political, and religious interests and beliefs.</span></li><li data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">To hold the skills enabling respectful civil discourse, knowledge of processes for petitioning and protesting, and awareness of the responsibility of voting.</span></li><li data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">To hold the civic virtues of concern for the rights of others, social responsibility, tolerance and respect, and belief in the capacity to make a difference.</span></li></ol><p data-dcnode-id="3249"><strong data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Programs Developed/Distributed/Implemented:</span></strong><span data-dcnode-id="3250" instrument_node=""> The Arizona Supreme Court and the Arizona Foundation for Legal Services and Education partner to develop and implement civic education programs that empower Arizona individuals, communities, and schools. The civic education programs include:</span></p><ul data-dcnode-id="3230"><li data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">I-Civic-It!</span></li><li data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Arizona Teen Association</span></li><li data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Behind the Laws &amp; Decisions</span></li><li data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Connecting with Classrooms</span></li><li data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Law Day</span></li><li data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">LawForKids.org</span></li><li data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">LawForSeniors.org</span></li><li data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">We the People: The Citizen &amp; the Constitution</span></li><li data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">We the People: Project Citizen.</span></li></ul><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">The unique aspects of the vast array include: crossing and intertwining generations, providing youth, adults, and senior citizens with increasing civic knowledge while engaging them; utilizing interactive technology for ease in access and efficiency in operations; recognizing accomplishments for al participants; encouraging partnerships with both private and public sectors; and, inviting all branches of government to participate in programs.</span></p><p data-dcnode-id="3225"><strong data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Civics Programs are Tailored to:</span></strong></p><ul data-dcnode-id="3207"><li data-dcnode-id="3222"><span class="WordSection8" data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">Elementary School</span></span></li><li data-dcnode-id="3219"><span class="WordSection8" data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">Middle School </span></span></li><li data-dcnode-id="3216"><span class="WordSection8" data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">High School </span></span></li><li data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Adults</span></li><li data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">Teachers</span></li><li data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">Others</span></li><li data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">SROs and JPOs</span></li></ul></div><span data-dcnode-id="3205" instrument_node="">

</span><div class="card-body" data-dcnode-id="3135"><p data-dcnode-id="3173"><span data-dcnode-id="3185" instrument_node="">Justice Building</span><br data-dcnode-id="3184"><span data-dcnode-id="3183" instrument_node=""> 625 Marshall Street</span><br data-dcnode-id="3182"><span data-dcnode-id="3181" instrument_node=""> Little Rock, AR 72201</span><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node=""> Point of Contact: </span><a data-dcnode-id="3177" href="mailto:nick.shumate@arcourts.gov"><span data-dcnode-id="3178" instrument_node="">Nick Shumate</span></a><span data-dcnode-id="3176" instrument_node="">,&nbsp;Public Education Coordinator</span><br data-dcnode-id="3175"><span data-dcnode-id="3174" instrument_node=""> Phone: 501-410-1935</span></p><p data-dcnode-id="3169"><strong data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Mission and Goals:&nbsp;</span></strong><span data-dcnode-id="3170" instrument_node="">The Judicial Branch Education Division of the Arkansas Administrative Office of the Courts recognizes the relationship between civics education and the effectiveness of the American justice system. It strives to develop programs that instill in students a sense of familiarity with the court system, respect for the rule of law, and ownership of their future.</span></p><p class="WordSection9" data-dcnode-id="3168"></p><p class="WordSection9" data-dcnode-id="3167"></p><p class="WordSection9" data-dcnode-id="3163"><strong data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="3164" instrument_node="">Students creating art projects, observing their Arkansas Supreme Court, and being inundated with trial and appellate judges in the classroom – all are part of the civics projects sponsored by the Judicial Branch Education Division of the Arkansas Administrative Office of the Courts.</span></p><p class="WordSection9" data-dcnode-id="3162"></p><p class="WordSection9" data-dcnode-id="3161"></p><p data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">Elementary and middle school students participate in art projects with themes based on love of country and the legal system. The winning artwork permanently hangs in the Justice Building.</span></p><p class="WordSection9" data-dcnode-id="3158"></p><p class="WordSection9" data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">The Supreme Court travels twice a year for “Appeals on Wheels” where local students of all ages attend the oral argument and Justices later visit in the classrooms.</span></p><p class="WordSection9" data-dcnode-id="3155"></p><p class="WordSection9" data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">Judicial Council, consisting of appellate and trial court judges, participate in a special project with over 100 judges streaming into classrooms for a civics outreach program.</span></p><p class="WordSection9" data-dcnode-id="3152"></p><p class="WordSection9" data-dcnode-id="3151"></p><p class="WordSection9" data-dcnode-id="3148"><strong data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Civics Programs are Tailored to: </span></strong></p><p data-dcnode-id="3146"><a data-dcnode-id="3147" name="B"></a></p><div class="WordSection9" data-dcnode-id="3136"><ul data-dcnode-id="3137"><li data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Elementary School</span></li><li data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Middle School</span></li><li data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">High School</span></li><li data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">College</span></li></ul></div></div><span data-dcnode-id="3134" instrument_node="">

</span><div class="card-body" data-dcnode-id="3102"><p data-dcnode-id="3111"><span data-dcnode-id="3114" instrument_node="">Baylor University</span><br data-dcnode-id="3113"><span data-dcnode-id="3112" instrument_node=""> Waco, Texas 76798</span></p><p data-dcnode-id="3105"><strong data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Programs Developed/Distributed/Implemented:&nbsp;</span></strong><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinegrad.baylor.edu/resources/teaching-civic-education-democracy/" target="_blank"><span data-dcnode-id="3108" instrument_node="">Baylor University’s online doctorate of education program</span></a><span data-dcnode-id="3106" instrument_node=""> has collected tips, resources, and ideas for teachers looking to incorporate action civics lessons into their curriculum.</span></p><p data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">The program provides lessons on the basic tenets of citizenship and democracy, as well as resources and training materials for the classroom including, "Generation Citizen," "Earth Force," "Generation Nation," and "The News Literacy Project."</span></p></div><span data-dcnode-id="3101" instrument_node="">

</span><h2 class="mb-0" data-dcnode-id="3086"><span data-dcnode-id="3091" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="3088" data-target="#collapse-accordionPanelOne-62875" data-toggle="collapse" type="button"><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//billofrightsinstitute.org/" target="_blank"><span data-dcnode-id="3090" instrument_node="">Bill of Rights Institute</span></a></button><span data-dcnode-id="3087" instrument_node="">
</span></h2><span data-dcnode-id="3085" instrument_node="">
</span></div><span data-dcnode-id="3083" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="3046" data-parent="#accordion62875" id="collapse-accordionPanelOne-62875"><span data-dcnode-id="3082" instrument_node="">
</span><div class="card-body" data-dcnode-id="3048"><p class="WordSection11" data-dcnode-id="3078"><span data-dcnode-id="3081" instrument_node="">200 N. Glebe Road, Suite 1050</span><br data-dcnode-id="3080"><span data-dcnode-id="3079" instrument_node=""> Arlington, Virginia 22203</span></p><p class="WordSection11" data-dcnode-id="3071"><strong data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="3075" instrument_node=""> </span><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//billofrightsinstitute.org/" target="_blank"><span data-dcnode-id="3074" instrument_node="">Bill of Rights Institute</span></a><span data-dcnode-id="3072" instrument_node="">, established in 1999, is a 501(c)(3) not for profit charity focused on providing educational resources on America’s Founding documents and principles for teachers and students of American History and Civics. The mission of the Bill of Rights Institute is to educate young people about the words and ideas of America’s Founders, the liberties guaranteed in our Founding documents, and how our Founding principles continue to affect and shape a free society. It is the goal of the Institute to help the next generation understand the freedom and opportunity the Constitution offers. The vision of the Institute is to create a citizenry that has the knowledge, values, dispositions, and skills to exercise the rights and responsibilities needed to maintain a free society.</span></p><p class="WordSection11" data-dcnode-id="3070"></p><p class="WordSection11" data-dcnode-id="3069"></p><p class="WordSection11" data-dcnode-id="3065"><strong data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="3066" instrument_node="">The Bill of Rights Institute offers programs and events for both educators and students.</span></p><ul data-dcnode-id="3051"><li data-dcnode-id="3060"><div class="WordSection11" data-dcnode-id="3061"><strong data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">For Educators: </span></strong><span data-dcnode-id="3062" instrument_node="">The Bill of Rights Institute offers a variety of educational programs and instructional materials for educators. These include constitutional seminars around the country, as well as printed and online teachers’ guides for use in history, government, civics, and social studies elementary, middle, and high school classes.</span></div></li><li data-dcnode-id="3052"><div class="WordSection11" data-dcnode-id="3053"><strong data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">For Students: </span></strong><span data-dcnode-id="3057" instrument_node="">Students can write an essay about the most important civic value in the </span><a data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//billofrightsinstitute.org/programs-events/students-programs-events/essay-contest/student-resources-2/"><span data-dcnode-id="3056" instrument_node="">Being an American Essay Contest</span></a><span data-dcnode-id="3054" instrument_node=""> for a chance to win $5,000 and a trip to Washington D.C. The Contest is designed to promote dialogue between students and teachers about American civic values and Founding principles. Students can also apply for the Constitutional Academy</span></div></li></ul><p class="WordSection11" data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">The Academy is the nation’s premier program for high-school students to study the Constitution, and is designed to encourage enthusiasm for learning, prepare students for the academic challenges of a college education, and provide the intellectual tools to create more effective, engaged citizens.</span></p></div><span data-dcnode-id="3047" instrument_node="">
</span></div><span data-dcnode-id="3045" instrument_node="">

</span><div class="card" data-dcnode-id="2985"><span data-dcnode-id="3039" instrument_node="">
</span><div class="card-header" data-dcnode-id="3030" id="heading-accordionPanelOne"><span data-dcnode-id="3038" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="3032"><span data-dcnode-id="3037" instrument_node="">
</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="3034" data-target="#collapse-accordionPanelOne-62877" data-toggle="collapse" type="button"><a data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//new.civiced.org/" target="_blank"><span data-dcnode-id="3036" instrument_node="">Center for Civic Education</span></a></button><span data-dcnode-id="3033" instrument_node="">
</span></h2><span data-dcnode-id="3031" instrument_node="">
</span></div><span data-dcnode-id="3029" instrument_node="">
</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="2987" data-parent="#accordion62877" id="collapse-accordionPanelOne-62877"><span data-dcnode-id="3028" instrument_node="">
</span><div class="card-body" data-dcnode-id="2989"><p class="WordSection11" data-dcnode-id="3020"><span data-dcnode-id="3027" instrument_node="">21600 Oxnard Street, Suite 500</span><br data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node=""> Woodland Hills, CA 91367</span><br data-dcnode-id="3024"><span data-dcnode-id="3023" instrument_node=""> Tel: 818-591-9321</span><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node=""> Toll Free: 800-350-4223</span></p><p class="WordSection11" data-dcnode-id="3019"></p><p class="WordSection11" data-dcnode-id="3018"></p><p class="WordSection11" data-dcnode-id="3017"></p><p class="WordSection11" data-dcnode-id="3010"><strong data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Mission and goals:</span></strong><span data-dcnode-id="3014" instrument_node=""> The </span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//new.civiced.org/" target="_blank"><span data-dcnode-id="3013" instrument_node="">Center for Civic Education</span></a><span data-dcnode-id="3011" instrument_node=""> is a nonprofit, nonpartisan organization based in California.</span></p><p data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">The Center’s programs are implemented with the assistance of a network of public- and private-sector organizations and educational leaders in every state and congressional district in the country and in more than eighty other countries, many of which are emerging and advanced democracies.</span></p><p data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">The Center has its roots in the interdisciplinary Committee on Civic Education formed at the University of California, Los Angeles, in 1964 to develop more effective curricular programs in elementary and secondary civic education. In 1969, the Center became affiliated with the State Bar of California. In 1981, the State Bar established the Center for Civic Education as an independent nonprofit organization that remains affiliated with the State Bar.</span></p><p data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">The principal goals of the Center's programs are to help students develop (1) an increased understanding of the institutions of constitutional democracy and the fundamental principles and values upon which they are founded, (2) the skills necessary to participate as competent and responsible citizens, and (3) the willingness to use democratic procedures for making decisions and managing conflict. Ultimately, the Center strives to develop an enlightened citizenry by working to increase understanding of the principles, values, institutions, and history of constitutional democracy among teachers, students, and the general public.</span></p><p data-dcnode-id="3000"><strong data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="3001" instrument_node="">The Center offers the most effective programs in the world in civic education for democracy. The main curricular programs of the Center are the following:</span></p><div class="WordSection12" data-dcnode-id="2990"><ul data-dcnode-id="2991"><li data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">We the People: The Citizen and the Constitution, which is used at upper elementary, middle, and high school levels and in colleges and universities.</span></li><li data-dcnode-id="2995"><div data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">We the People: Project Citizen, which is used at upper elementary, middle, and high school levels and in colleges and universities.</span></div></li><li data-dcnode-id="2992"><div data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">Foundations of Democracy, which is used in classrooms ranging from kindergarten through the twelfth grade.</span></div></li></ul></div></div><span data-dcnode-id="2988" instrument_node="">
</span></div><span data-dcnode-id="2986" instrument_node="">

</span><div class="card-header" data-dcnode-id="2971" id="heading-accordionPanelOne"><span data-dcnode-id="2979" instrument_node="">

</span><div class="card-body" data-dcnode-id="2957"><p data-dcnode-id="2963"><span data-dcnode-id="2968" instrument_node="">PO Box 2184 </span><br data-dcnode-id="2967"><span data-dcnode-id="2966" instrument_node=""> Albuquerque, New Mexico 87103-2184</span><br data-dcnode-id="2965"><span data-dcnode-id="2964" instrument_node=""> Phone: (505) 764-9417</span></p><p data-dcnode-id="2958"><span data-dcnode-id="2962" instrument_node="">The </span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.civicvalues.org/" target="_blank"><span data-dcnode-id="2961" instrument_node="">Center for Civic Values</span></a><span data-dcnode-id="2959" instrument_node=""> (CCV) was founded originally in 1962 as the New Mexico Bar Foundation and is organized as a 501(c)(3) nonprofit charitable and educational corporation. Offices are in Albuquerque, New Mexico; program activities have been conducted throughout the state; and, educational materials have been used in classrooms and mock trial programs across the country.</span></p></div><span data-dcnode-id="2956" instrument_node="">

</span><button aria-controls="collapse-accordionPanelOne" aria-expanded="false" class="btn collapsed" data-dcnode-id="2943" data-target="#collapse-accordionPanelOne-62881" data-toggle="collapse" type="button"><a data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//classroomlaw.org/" target="_blank"><span data-dcnode-id="2945" instrument_node="">Classroom Law Project</span></a></button><span data-dcnode-id="2942" instrument_node="">

</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="2884" data-parent="#accordion62881" id="collapse-accordionPanelOne-62881"><span data-dcnode-id="2937" instrument_node="">
</span><div class="card-body" data-dcnode-id="2886"><p data-dcnode-id="2931"><span data-dcnode-id="2936" instrument_node="">620 SW Main Street, Suite 102</span><br data-dcnode-id="2935"><span data-dcnode-id="2934" instrument_node=""> Portland, OR 97205</span><br data-dcnode-id="2933"><span data-dcnode-id="2932" instrument_node=""> Phone: 503-224-4424</span></p><p class="WordSection13" data-dcnode-id="2930"></p><p class="WordSection13" data-dcnode-id="2924"><strong data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">Mission and goals: </span></strong><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//classroomlaw.org/" target="_blank"><span data-dcnode-id="2927" instrument_node="">Classroom Law Project</span></a><span data-dcnode-id="2925" instrument_node=""> is a non-profit organization of individuals, educators, lawyers, and civic leaders building strong communities by teaching students to become active citizens.</span></p><p class="WordSection13" data-dcnode-id="2923"></p><p class="WordSection13" data-dcnode-id="2918"><span data-dcnode-id="2922" instrument_node="">Classroom Law Project began and still operates every day on a single core belief: </span><em data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">the way to preserve democracy is to teach democracy. </span></em><span data-dcnode-id="2919" instrument_node="">And the best way to teach democracy is to incorporate its many vital lessons and principles into the school curriculum. Students learn through mock trials, simulated hearings, discussing public issues and much more, gaining the knowledge and tools required for active, effective participation as citizens in our contemporary democratic society. Their teachers are supported with professional development and new strategies for increasing student knowledge and engagement.</span></p><p class="WordSection13" data-dcnode-id="2917"></p><p class="WordSection13" data-dcnode-id="2916"></p><p class="WordSection13" data-dcnode-id="2909"><strong data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="2913" instrument_node="">Classroom Law Project brings education, legal and business communities together by providing innovative, timely, practical, and </span><em data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">fun </span></em><span data-dcnode-id="2910" instrument_node="">civic education programs for students K-12. Some of the programs include:</span></p><div class="WordSection13" data-dcnode-id="2887"><ul data-dcnode-id="2888"><li data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Courthouse Experience Program</span></li><li data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">High School Mock Trial Competition</span></li><li data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">Law Day</span></li><li data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Oregon Civics Conference for Teachers</span></li><li data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">Private consultations</span></li><li data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Teacher professional development</span></li><li data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Project Citizen</span></li><li data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Street Law</span></li><li data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">We the People</span></li><li data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Youth Summits</span></li></ul></div></div><span data-dcnode-id="2885" instrument_node="">

webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ctbar.org/%3Fpage%3DAdultCivicsEdu"><span data-dcnode-id="2779" instrument_node="">Adult Civic Education </span></a><span data-dcnode-id="2777" instrument_node="">covers a wide range of areas, from wiretapping to eminent domain, so that students can better understand the intricacies of civics and American government;</span></div></li><li data-dcnode-id="2769"><div class="WordSection18" data-dcnode-id="2770"><span data-dcnode-id="2774" instrument_node="">The </span><a data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jud.ct.gov/Education/Community/visit.htm"><span data-dcnode-id="2773" instrument_node="">Connecticut Court Visitation Program</span></a><span data-dcnode-id="2771" instrument_node="">, where students witness real-life criminal court proceedings</span></div></li><li data-dcnode-id="2764"><div class="WordSection18" data-dcnode-id="2765"><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crf-usa.org/bill-of-rights-in-action/blog"><span data-dcnode-id="2768" instrument_node="">Bill of Rights in Action</span></a><span data-dcnode-id="2766" instrument_node="">, in which students gain a more solid understanding of how the U.S. Constitution affects their lives;</span></div></li><li data-dcnode-id="2759"><div class="WordSection19" data-dcnode-id="2760"><a data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//justiceforall.ca2.uscourts.gov/student_contests.html"><span data-dcnode-id="2763" instrument_node="">Mock Trial Competitions</span></a><span data-dcnode-id="2761" instrument_node="">, co-sponsored by CCLCE, for which volunteers serve as judges and coaches as middle and high school students compete against other Connecticut schools in a battle of courtroom wits, right in the classroom;</span></div></li><li data-dcnode-id="2754"><div class="WordSection19" data-dcnode-id="2755"><a data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.valorebooks.com/textbooks/street-law-a-course-in-practical-law-8-harpscth-edition/9780078799839"><span data-dcnode-id="2758" instrument_node="">Street Law: A Course in Practical Law </span></a><span data-dcnode-id="2756" instrument_node="">helps students develop necessary skills for survival in society.</span></div></li></ul></div></div><span data-dcnode-id="2750" instrument_node="">

</span><div class="card-body" data-dcnode-id="2680"><p class="WordSection20" data-dcnode-id="2723"><span data-dcnode-id="2730" instrument_node="">Post Office Box 44008</span><br data-dcnode-id="2729"><span data-dcnode-id="2728" instrument_node=""> Madison, WI 53744-4008</span><br data-dcnode-id="2727"><span data-dcnode-id="2726" instrument_node=""> Telephone: (608) 848-1950</span><br data-dcnode-id="2725"><span data-dcnode-id="2724" instrument_node=""> Facsimile: (608) 848- 9266</span></p><p class="WordSection20" data-dcnode-id="2716"><strong data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Mission and goals: </span></strong><span data-dcnode-id="2720" instrument_node="">The </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dcba.net/committees/law-public" target="_blank"><span data-dcnode-id="2719" instrument_node="">Dane County Bar Association's Law for the Public Committee</span></a><span data-dcnode-id="2717" instrument_node=""> conveys information about the law to the public; improves the availability and accessibility of legal information and resources; provides and promotes educational opportunities for members of the public interested in the law; and in carrying out these functions, generates goodwill toward the Association and the legal profession.</span></p><p data-dcnode-id="2713"><strong data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">Programs Developed/Distributed/Implemented:</span></strong></p><ul data-dcnode-id="2710"><li data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Your Life, Your Rights Program - the Committee partners with local high schools to bring teams of volunteer lawyers and judges into classrooms to help educate high school students about their legal rights and civic responsibilities.</span></li></ul><p class="WordSection20" data-dcnode-id="2702"><strong data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node=""> DENVER BAR ASSOCIATION </span></strong><span data-dcnode-id="2707" instrument_node="">1900 Grant Street, Suite 900</span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node=""> Denver, Colorado, 80203</span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node=""> Phone: (303) 860-1115, or (800) 332-6736</span></p><p class="WordSection20" data-dcnode-id="2701"></p><p class="WordSection20" data-dcnode-id="2700"></p><p class="WordSection20" data-dcnode-id="2696"><strong data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Mission and goals:</span></strong><span data-dcnode-id="2697" instrument_node=""> The Denver Bar Association was founded in 1891 with the commitment to promote justice, support and assist member attorneys in delivering legal service and uphold the honor and dignity of the bar. The association likewise works to foster respect for the legal profession, encourage ongoing legal education and offers resources for the media and the public on legal issues.</span></p><p class="WordSection20" data-dcnode-id="2695"></p><p class="WordSection20" data-dcnode-id="2694"></p><p class="WordSection20" data-dcnode-id="2691"><strong data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong></p><div class="WordSection20" data-dcnode-id="2681"><ul data-dcnode-id="2682"><li data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">Java &amp; Juice - Attorneys meet with youth aging out of foster care, to answer their legal questions</span></li><li data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Denver Bar Guest Teaching Program - Attorneys, paralegals, magistrates and judges substitute in Denver Public Schools on pre-planned days.</span></li><li data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Lawline 9 - Call-in program during 9 o’clock news, in which attorneys offer legal information and referrals to other community legal resources.</span></li><li data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Constitution Day - Attorneys teach students about the Constitution.</span></li></ul></div></div><span data-dcnode-id="2679" instrument_node="">

</span><div class="card-body" data-dcnode-id="2597"><p class="WordSection21" data-dcnode-id="2647"><span data-dcnode-id="2659" instrument_node="">Moakley U.S. Courthouse One Courthouse Way </span><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node=""> Suite 3120</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node=""> Boston, Massachusetts 02210</span><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node=""> Point of Contact: </span><a data-dcnode-id="2651" href="mailto:medvedow@discoveringjustice.org"><span data-dcnode-id="2652" instrument_node="">Lissy Medvedow</span></a><span data-dcnode-id="2650" instrument_node="">, Executive Director</span><br data-dcnode-id="2649"><span data-dcnode-id="2648" instrument_node=""> Phone: (617) 748-4186</span></p><p class="WordSection21" data-dcnode-id="2640"><strong data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="2644" instrument_node=""> Founded in 1998 and incorporated as an independent nonprofit in 2001, </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.discoveringjustice.org/" target="_blank"><span data-dcnode-id="2643" instrument_node="">Discovering Justice</span></a><span data-dcnode-id="2641" instrument_node=""> is a Boston-based civic and justice education nonprofit organization. Their mission is to prepare young people to value the justice system, realize the power of their own voices, and embrace civic responsibility by connecting classrooms and courtrooms.</span></p><p class="WordSection21" data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Discovering Justice’s programs teach children to use their voices to advocate for themselves and others through learning about democratic values, history, justice, and civic responsibility. They offer programs in school, afterschool, and in courthouses. Several programs have both a school-based and courthouse-based component.</span></p><p class="WordSection21" data-dcnode-id="2637"></p><p class="WordSection21" data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Students who participate in Discovering Justice develop a sense of personal responsibility and respect for others, learn that they can make a difference in their lives and their communities, and become cognizant of the value of their participation in society. Discovering Justice places a special emphasis on underserved communities.</span></p><p class="WordSection21" data-dcnode-id="2634"></p><p class="WordSection21" data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Discovering Justice’s interactive civic education programs. include:</span></p><ul data-dcnode-id="2616"><li data-dcnode-id="2629"><div class="WordSection21" data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">Children Discovering Justice – a literacy-based civics curriculum in elementary schools, grades 1-5 with Courthouse field trips</span></div></li><li data-dcnode-id="2626"><div class="WordSection21" data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Mock Trial Program – a 10-week afterschool program for middle school students</span></div></li><li data-dcnode-id="2623"><div class="WordSection21" data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Stand Up for Your Rights – an 8-week afterschool appellate program for middle school students</span></div></li><li data-dcnode-id="2620"><div ?p="pgms_fieldtrips_billofrights&quot;" class="WordSection21><a href=" data-dcnode-id="2621" http:="" www.discoveringjustice.org=""><span data-dcnode-id="2622" instrument_node="">Discovering the Bill of Rights – a 90-minute constitutional fieldtrip for middle school students</span></div></li><li data-dcnode-id="2617"><div class="WordSection21" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Courthouse Tours in Moakley U.S. Courthouse and John Adams Courthouse</span></div></li></ul><p class="WordSection21" data-dcnode-id="2613"><strong data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Civics Programs are Tailored to: </span></strong></p><p class="WordSection21" data-dcnode-id="2612"></p><div class="WordSection21" data-dcnode-id="2598"><ul data-dcnode-id="2599"><li data-dcnode-id="2609"><div data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Elementary School</span></div></li><li data-dcnode-id="2606"><div data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Middle School High School College</span></div></li><li data-dcnode-id="2603"><div data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Teachers</span></div></li><li data-dcnode-id="2600"><div data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Other - Volunteers (Attorneys, Judges, Professionals)</span></div></li></ul></div></div><span data-dcnode-id="2596" instrument_node="">

<li data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Is it Reasonable? Case Study</span></li><li data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Jardines v. Florida Case Study</span></li><li data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Amending the Florida Constitution</span></li><li data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">And more...</span></li></ul></div><p data-dcnode-id="2536"><span data-dcnode-id="2543" instrument_node="">THe NAWJ Informed Voters, Fair Judges Project provides a Fair Courts=Justice presentation available in a Florida version through </span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.floridabar.org/public/faircts/"><span data-dcnode-id="2542" instrument_node="">The Florida Bar website</span></a><span data-dcnode-id="2540" instrument_node="">. For additional information on how to adapt to your state, </span><a data-dcnode-id="2538" href="mailto:staff@flrea.org" target="_blank"><span data-dcnode-id="2539" instrument_node="">contact them here</span></a><span data-dcnode-id="2537" instrument_node="">.</span></p></div><div class="WordSection23" data-dcnode-id="2534"></div></div><span data-dcnode-id="2532" instrument_node="">

d="2489" instrument_node="">Development of mock trial cases for middle and high school classrooms</span></li><li data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Volunteers for judging law-related competitions</span></li><li data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Assist with Justice Teaching Awards</span></li><li data-dcnode-id="2481"><a data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.floridabar.org/cmdocs/cm470.nsf/WDOCS/41CAFC31F88A69BA852576B10077693A"><span data-dcnode-id="2483" instrument_node="">So You Want To Be A Lawyer</span></a></li></ul></div></div><span data-dcnode-id="2477" instrument_node="">

</span><div class="card-body" data-dcnode-id="2413"><p data-dcnode-id="2447"><span data-dcnode-id="2457" instrument_node="">500 S. Duval Street</span><br data-dcnode-id="2456"><span data-dcnode-id="2455" instrument_node=""> Tallahassee, FL 32399</span><br data-dcnode-id="2454"><span data-dcnode-id="2453" instrument_node=""> Point of Contact: </span><a data-dcnode-id="2451" href="mailto:Knoxt@flcourts.org" style="font-size: 13px;"><span data-dcnode-id="2452" instrument_node="">Tricia Knox,</span></a><span data-dcnode-id="2450" instrument_node=""> Education Coordinator </span><br data-dcnode-id="2449"><span data-dcnode-id="2448" instrument_node=""> Phone: (850) 921-9446</span></p><p data-dcnode-id="2440"><strong data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="2444" instrument_node="">The mission of the </span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.floridasupremecourt.org/" target="_blank"><span data-dcnode-id="2443" instrument_node="">Florida Supreme Court’s Educational Program</span></a><span data-dcnode-id="2441" instrument_node=""> is to provide opportunities for students, teachers and the general public to learn about the role of the judiciary and the levels and jurisdictions of Florida’s trial and appellate courts. This is done through a variety of programs that range from historical tours to well-developed educational programs.</span></p><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Programs generally begin with an overview lesson about the Florida Court System, the Florida Supreme Court and the importance of the judicial branch. Most end with a mock oral argument scenario that requires students to think critically and allows them to experience more deeply the role of the state Supreme Court.</span></p><p data-dcnode-id="2434"><strong data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Programs Developed/Distributed/Implemented:&nbsp;</span></strong><span data-dcnode-id="2435" instrument_node="">Two popular programs are the Journey through Justice and the Making My Vote Count programs. Journey through Justice works in cooperation with Teen Court staff from the local trial court. Students participate in both a mock trial and an oral argument to gain a complete understanding of the court system and Florida’s third branch of government.</span></p><p class="WordSection24" data-dcnode-id="2433"></p><p class="WordSection24" data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Making My Vote Count is a joint educational program between the Florida Supreme Court, the Historic Old Capital and the Museum of Florida History. It explores the importance and individual responsibility of voting. Each location provides its unique responsibility from their branch perspective. Students participate in activities at all three locations; exploring the history of elections in Florida and the importance of exercising their voting rights.</span></p><p class="WordSection24" data-dcnode-id="2430"></p><p class="WordSection24" data-dcnode-id="2429"></p><p class="WordSection24" data-dcnode-id="2426"><strong data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Civics Programs are Tailored to:</span></strong></p><div class="WordSection24" data-dcnode-id="2414"><ul data-dcnode-id="2415"><li data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Elementary School</span></li><li data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Middle School</span></li><li data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">High School</span></li><li data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">College</span></li><li data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Teachers</span></li></ul></div></div><span data-dcnode-id="2412" instrument_node="">

</span><div aria-labelledby="heading-accordionPanelOne" class="collapse" data-dcnode-id="2354" data-parent="#accordion62899" id="collapse-accordionPanelOne-62899"><span data-dcnode-id="2393" instrument_node="">
</span><div class="card-body" data-dcnode-id="2356"><div class="WordSection28" data-dcnode-id="2367"><p data-dcnode-id="2382"><span data-dcnode-id="2392" instrument_node="">1875 K Street NW Suite 500</span><br data-dcnode-id="2391"><span data-dcnode-id="2390" instrument_node=""> Washington, DC 20006</span><br data-dcnode-id="2389"><span data-dcnode-id="2388" instrument_node=""> Point of Contact: </span><a data-dcnode-id="2386" href="mailto:kelly.landis@icivics.org"><span data-dcnode-id="2387" instrument_node="">Kelly Landis</span></a><span data-dcnode-id="2385" instrument_node="">, Director of Communications &amp; Outreach </span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node=""> Phone: (202) 729-8132</span></p><p data-dcnode-id="2375"><strong data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Mission and Goals: </span></strong><span data-dcnode-id="2379" instrument_node="">Justice Sandra Day O’Connor founded </span><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icivics.org/%3Fgclid%3DCjwKCAjw9r-DBhBxEiwA9qYUpUZOKhUS6biRFOb_E9OZRr-yFQBjBMos1IymIg2JofLUTnFU1JZcHhoCf4gQAvD_BwE" target="_blank"><span data-dcnode-id="2378" instrument_node="">iCivics</span></a><span data-dcnode-id="2376" instrument_node=""> to reverse Americans’ declining civic knowledge and participation. iCivics prepares young Americans to become knowledgeable, engaged 21st century citizens by creating innovative educational materials and making civic education relevant to a new generation through video games, classroom materials, and other innovative teaching techniques. Our free materials are fun for students and practical for teachers in classrooms of all types.</span></p><p data-dcnode-id="2371"><strong data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="2372" instrument_node="">iCivics offers the nation’s most comprehensive, standards-aligned civics curriculum that is available freely on the Web. The iCivics program contains 16 educational video games, 13 curriculum units and 70 lesson plans about civics topics ranging from the Constitution to budgeting to civil rights. In Fall 2012, iCivics will offer the first-of-its-kind The Drafting Board, an interactive online tool that teaches persuasive writing through civics topics.</span></p><p data-dcnode-id="2368"><strong data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Civics Programs are Tailored to: </span></strong></p></div><ul data-dcnode-id="2357"><li data-dcnode-id="2364"><div class="WordSection29" data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Middle School</span></div></li><li data-dcnode-id="2361"><div class="WordSection29" data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">High School</span></div></li><li data-dcnode-id="2358"><div class="WordSection29" data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Teachers</span></div></li></ul></div><span data-dcnode-id="2355" instrument_node="">

</span><div class="card-body" data-dcnode-id="2295"><div class="WordSection58" data-dcnode-id="2311"><p data-dcnode-id="2328"><span data-dcnode-id="2335" instrument_node="">72 Rocky Cove Road</span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node=""> Lexington, SC 29072</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node=""> Point of Contact: Dr. Jane C. Brailsford, Master Trainer/Project Director</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node=""> Phone: (803) 530-3005</span></p><p data-dcnode-id="2321"><strong data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="2325" instrument_node=""> The mission of </span><a data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scbar.org/public/students-educators/icivics/" target="_blank"><span data-dcnode-id="2324" instrument_node="">iCivics South</span></a><span data-dcnode-id="2322" instrument_node=""> is to introduce the iCivics method of enhanced civics learning into the South Carolina education system, to coordinate its successful implementation, and to advocate and guide its sustained use as a major civics-education resource.</span></p><p data-dcnode-id="2317"><strong data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Programs Developed/Distributed/Implemented: </span></strong><span data-dcnode-id="2318" instrument_node="">Perhaps the most significant iCivics South project is it partnership with the SC GEAR UP Grant. Working with the schools, colleges, and communities, which benefit from the SC GEAR UP grant, iCivics South will provide training and support for civics education in fifteen school districts.</span></p><p data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Also noteworthy is the development of iCivics curricula that will become a sustainable part of instructional programs in South Carolina. iCivics South led the development of pilot programs for 6th, 7th, and 8th grade iCivics exploratory courses and a 10th grade elective course. As a result, seven middle schools and three high schools will offer daily instruction in iCivics beginning in Fall 2012. Other pilots developed for South Carolina students include an iCivics Summer Leadership Camp and iCivics End-of-Year Program.</span></p><p data-dcnode-id="2312"><strong data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Civics Programs are Tailored to: </span></strong></p></div><ul data-dcnode-id="2296"><li data-dcnode-id="2308"><div class="WordSection59" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Elementary School</span></div></li><li data-dcnode-id="2305"><div class="WordSection59" data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Middle School</span></div></li><li data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">High School</span></li><li data-dcnode-id="2300"><div class="WordSection59" data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Adults</span></div></li><li data-dcnode-id="2297"><div class="WordSection59" data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Teachers</span></div></li></ul></div><span data-dcnode-id="2294" instrument_node="">

</span><div class="card-body" data-dcnode-id="2224"><p data-dcnode-id="2267"><span data-dcnode-id="2274" instrument_node="">424 S. Second St. </span><br data-dcnode-id="2273"><span data-dcnode-id="2272" instrument_node="">Springfield IL 62701-1779 </span><br data-dcnode-id="2271"><span data-dcnode-id="2270" instrument_node="">217 525 1760 </span><br data-dcnode-id="2269"><span data-dcnode-id="2268" instrument_node="">800 252 8908</span></p><p data-dcnode-id="2260"><strong data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Mission and Goals:</span></strong><span data-dcnode-id="2264" instrument_node=""> The </span><a data-dcnode-id="2262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.isba.org/teachers" target="_blank"><span data-dcnode-id="2263" instrument_node="">Illinois State Bar Association</span></a><span data-dcnode-id="2261" instrument_node=""> is the premier legal association in the state. As a voluntary organization of more than 30,000 members, the Association's primary focus is to assist Illinois lawyers in the practice of law and to promote improvements in the administration of justice. The Association engages in many important activities on behalf of the profession — among them proposing and shaping legislation, educating the public, and supporting the courts and the rule of law.</span></p><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Part of our mission at the ISBA is to educate the public and students of all ages about the important role of lawyers and judges, the importance of an independent judiciary for the proper administration of justice, and to foster an interest in students to respect our justice system and consider pursuing careers in the law. The Law-Related Education committee of the ISBA is composed of volunteer lawyers and judges and educators, with assistance by ISBA staff.</span></p><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">The Law-Related Education Committee of the ISBA carries out that mission through a number of activities, including the following:</span></p><ol data-dcnode-id="2241"><li data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Quarterly newsletter about civics and law-related education programs and resources sent free by e-mail to any teacher who requests it.</span></li><li data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Website containing lesson plans and resources for civics and law-related education available to lawyers and educators.</span></li><li data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Lawyer in the Classroom program through which lawyers are available to speak in the classroom.</span></li><li data-dcnode-id="2242"><span data-dcnode-id="2249" instrument_node="">Booklets about the law for youth, including </span><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.isba.org/sites/default/files/teachers/publications/Becoming%2520an%2520Adult.pdf"><span data-dcnode-id="2248" instrument_node="">Becoming An Adult: Your Legal Rights and Responsibilities at Age 18,</span></a><span data-dcnode-id="2246" instrument_node=""> a booklet for young adults, and </span><span data-dcnode-id="2244" style="text-decoration: underline;"><span data-dcnode-id="2245" instrument_node="">Kids and the Law: An A-To-Z Guide for Parents</span></span><span data-dcnode-id="2243" instrument_node="">, a booklet for kids and parents about such legal topics as juvenile’s rights, driver’s regulations, work rules for youth. All are online and free.</span></li></ol><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Sponsorship of a statewide Mock Trial Competition each spring for high school students.</span></p><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Civics Programs are Tailored to:</span></p><ul data-dcnode-id="2226"><li data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">High school students</span></li><li data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Adults</span></li><li data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Teachers</span></li><li data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Law students</span></li><li data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Lawyers</span></li></ul><p class="WordSection29" data-dcnode-id="2225"></p></div><span data-dcnode-id="2223" instrument_node="">
