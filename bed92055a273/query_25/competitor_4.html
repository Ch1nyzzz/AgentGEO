</span><header class="td-post-title" data-dcnode-id="870"><span data-dcnode-id="887" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Getting At-Risk Teens to Graduation</span></h1><span data-dcnode-id="884" instrument_node="">
</span><p class="td-post-sub-title" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Blended learning offers a second chance</span></p><span data-dcnode-id="881" instrument_node="">
</span><div class="td-module-meta-info" data-dcnode-id="872"><span data-dcnode-id="880" instrument_node="">
</span><div class="td-post-author-name td-post-author-no-dot" data-dcnode-id="874"><div class="td-author-by" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">By</span></div><span data-dcnode-id="877" instrument_node=""> </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationnext.org/author/jkronholz/"><span data-dcnode-id="876" instrument_node="">June Kronholz</span></a></div><span data-dcnode-id="873" instrument_node=""> </span></div><span data-dcnode-id="871" instrument_node="">
</span></header><span data-dcnode-id="869" instrument_node="">
</span></div><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span></div><span data-dcnode-id="863" instrument_node=""> </span><span data-dcnode-id="861" instrument_node="">
</span><div class="td-pb-row" data-dcnode-id="459"><span data-dcnode-id="860" instrument_node="">
</span><div class="td-pb-span12 td-main-content" data-dcnode-id="462" role="main"><span data-dcnode-id="859" instrument_node="">
</span><div class="td-ss-main-content" data-dcnode-id="465"><span data-dcnode-id="858" instrument_node="">
</span><div class="top-authors" data-dcnode-id="852"><div class="top-author" data-dcnode-id="853"><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationnext.org/author/jkronholz"><img class="avatar pp-user-avatar avatar-60 photo td-animation-stack-type0-2" data-dcnode-id="857" data-del="avatar" height="60" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationnext.org/wp-content/uploads/2019/12/e-logo%403x-150x150.png&amp;raw" width="60"><h2 data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">June Kronholz</span></h2></a></div></div><span data-dcnode-id="851" instrument_node="">
</span><div class="td-post-content" data-dcnode-id="583"><span data-dcnode-id="850" instrument_node="">
</span><span data-dcnode-id="848" instrument_node="">
</span><div class="tdc-row" data-dcnode-id="614" id="tdi_1_a64"><div class="vc_row tdi_2_861 wpb_row td-pb-row" data-dcnode-id="615"><span data-dcnode-id="847" instrument_node="">
</span><div class="vc_column tdi_4_501 wpb_column vc_column_container tdc-column td-pb-span12" data-dcnode-id="616"><span data-dcnode-id="846" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="617"><span data-dcnode-id="845" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="619"><span data-dcnode-id="844" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="621"><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="837"><em data-dcnode-id="838"><span data-dcnode-id="842" instrument_node="">Photos: </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationnext.org/performance-learning-centers/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="841" instrument_node="">Additional images</span></a><span data-dcnode-id="839" instrument_node=""> of Performance Learning Centers (PLCs) in Hampton and Richmond, Virginia.</span></em></p><span data-dcnode-id="836" instrument_node="">
</span><hr data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Eighteen-year-old Tyriq Jones was fairly blunt about the mess he had gotten himself into before transferring to the Hampton, Virginia, online school where I approached him one chilly day this spring. “I got in trouble. I was playing around. I got backed up” in high school, he said. He had failed three classes in his junior year and, faced with the prospect of repeating a year, probably would have dropped out instead, he told me. “I didn’t want that kind of pressure.”</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">People who deal with at-risk teenagers say dropping out is not an event; it’s a process. Youngsters miss school and get “backed up” in class, so they miss more school because they’re bewildered or embarrassed, and fall further behind. Seeing few ways to recover, “they just silently drop out,” said Richard Firth, who showed me around the Hampton school and two others in Richmond that are using online learning to derail the cycle.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="825"><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_open.jpg"><img alt="" class="alignleft size-full wp-image-49643423 td-animation-stack-type0-2" data-dcnode-id="827" height="435" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_open.jpg&amp;raw" width="690"></a></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">In the three years the 75-seat Hampton Performance Learning Center has been open, it claims to have graduated 91 students. There’s a waiting list for admission, so the school opened a second shift, which also is near capacity. Sherri Pritchard, the school’s social-studies “learning facilitator”—there are no teachers and no principal here—said 95 percent of her online students pass Virginia’s end-of-course history test, which would put them well ahead of both the Hampton school district’s and state’s pass rates.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">And Tyriq: He has only a C average after a year at the Hampton PLC, he said, but he graduated in June—on time—and plans to enlist in the Army, his goal all along.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="815"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">The New Alternative</span></strong></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Online K–12 education made its appearance in the mid-1990s, largely as a resource for bright students who had no access to accelerated classes. It moved next into core high-school courses where districts found themselves with teacher shortages—math, science, foreign languages—and has been growing bumptiously, and in a dozen directions, ever since.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="810" instrument_node="">The International Association for K–12 Online Learning, which goes by the acronym iNACOL, estimates that 82 percent of school districts now offer at least one online course. Thirty-two states have virtual schools where online offerings range from one class to an entire high-school curriculum, according to an annual report on online learning published by the Evergreen Education Group, a Colorado consultancy. At the Florida Virtual School alone, students collectively took 220,000 classes online in 2009–10 (see “</span><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationnext.org/floridas-online-option/"><span data-dcnode-id="809" instrument_node="">Florida’s Online Option</span></a><span data-dcnode-id="807" instrument_node="">,” </span><em data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">features</span></em><span data-dcnode-id="804" instrument_node="">, Summer 2009). Twenty-six states have at least one full-time online school, and perhaps 225,000 youngsters were full-time online students this year, says John Watson, editor of the Evergreen report.</span></p><span data-dcnode-id="802" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643433" class="wp-caption alignright" data-dcnode-id="797" id="attachment_49643433" style="width: 345px"><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img1.jpg"><img alt="" class="size-full wp-image-49643433 td-animation-stack-type0-2" data-dcnode-id="801" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img1.jpg&amp;raw" width="345"></a><figcaption class="wp-caption-text" data-dcnode-id="798" id="caption-attachment-49643433"><span data-dcnode-id="799" instrument_node="">During a recent visit to the Richmond PLCs, Congressman Eric Cantor chats with Dr. Donna Scott.</span></figcaption></figure><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Two of the fastest-growing trends in online education converge in the Performance Learning Center project, which is why I called Communities in Schools, a nonprofit dropout-prevention program that devised the model in Georgia in 2002.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">The PLCs call themselves an alternative to traditional schools and distance themselves from the credit-recovery factories that many districts have opened to boost their graduation rates ahead of state and federal sanctions. (Indeed, a few PLC students enroll for the chance to accelerate.) But the schools do offer struggling kids like Tyriq a chance to make up courses they failed in traditional teacher-student classrooms, which puts them at the nexus of a national debate. States are raising their graduation standards, but returning kids to the classroom for a second attempt at algebra often is counterproductive—Why should we suppose they’ll understand equations any better the second time around?—and gobbles up teacher time.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="789" instrument_node="">The second trend is the “blended” approach, combining online learning with a teacher-led classroom (see “</span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educationnext.org/future-schools/"><span data-dcnode-id="788" instrument_node="">Future Schools</span></a><span data-dcnode-id="786" instrument_node="">,” </span><em data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">features</span></em><span data-dcnode-id="783" instrument_node="">, Summer 2011). Most instruction is online in the PLC model, but a teacher-coach is there to answer questions, direct projects, and keep kids on track.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Communities in Schools linked those two trends with the small-school idea and has expanded the project to seven states and 33 schools. PLCs have only four or five classrooms, four or five teachers, and fewer than 100 students. Teachers are district employees who are paid the district scale and apply for their jobs. Kids remain part of their home schools, which has raised graduation statistics for those schools and generated buy-in from their administrators.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">PLCs generally receive the same per-pupil funding as&nbsp; traditional schools. Their biggest expense, after salaries, goes to licensing fees for the online curriculum, which Richard Firth, the Virginia PLC director, put at about $35,000 a year per school. Start-up costs for computers, teacher training, and to carve new schools out of old facilities can be a showstopper for financially pressed school districts. Richmond, which is building its first new high school in 40 years, plans to include some multipurpose rooms that could be used for a future PLC.</span></p><span data-dcnode-id="775" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643432" class="wp-caption alignright" data-dcnode-id="770" id="attachment_49643432" style="width: 325px"><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img2.jpg"><img alt="" class="size-full wp-image-49643432 td-animation-stack-type0-2" data-dcnode-id="774" height="345" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img2.jpg&amp;raw" width="325"></a><figcaption class="wp-caption-text" data-dcnode-id="771" id="caption-attachment-49643432"><span data-dcnode-id="772" instrument_node="">Richard Firth, director of the Virginia PLCs, says dropping out of school for at-risk teenagers is not an “event” but a “process.”</span></figcaption></figure><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The only outside funding comes from Communities in Schools, which pays the salary of a services coordinator, who links youngsters with housing, day-care, medical, and other service providers and helps them plan what they do after graduation. The services coordinator at the Richmond career-center PLC keeps a closet of baby clothes in her office for students whose own children can attend Head Start or day care downstairs.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Almost disarmingly, the PLCs reach out to youngsters that schools typically find the most troublesome. Sherman Curl, the academic coordinator—i.e., principal—at the Adult Career Development Center PLC in Richmond, handed me a brochure describing the students for whom the PLC is a good fit. Kids with “poor attendance,” “excessive tardiness,” “academic failure,” “apathy,” “social issues,” low motivation, and such “challenges to success” as pregnancy and poverty, it read.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">In a summary of its 2009–10 academic year, Virginia’s Communities in Schools reported that one-third of the students at its four PLCs were at least two years behind in academic credits when they arrived. They were a year or two older than their conventional-school peers and, in the previous year, averaged six suspensions and 24 absences each at their former schools. Several youngsters told me they’d fallen in with the wrong crowd at their old schools, or they felt bullied and isolated. “I started messing up,” a chatty 18-year-old named Chelsie Saunders told me at the Hampton PLC, which is housed in a modern teen center, complete with pool tables, a basketball court, a coffee bar, and an airy television lounge with leather sofas.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">“These are kids who never made it in a comprehensive school,” said Wes Hamner, the academic coordinator at the Richmond Technical Center PLC, which occupies one floor of a sprawling trades-training campus in Richmond’s industrial district.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">For all that, the three PLCs I visited were remarkably quiet and orderly: There wasn’t much chatter about what kids were learning, but there wasn’t any catcalling, hallway scuffling, or acting out in class, either. Hamner pointed out that there’s no security at his school and that the lockers don’t even have locks. Teachers sat in the back or in a corner of the classrooms, while students sat at computers, wearing headsets.</span></p><span data-dcnode-id="754" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643429" class="wp-caption alignleft" data-dcnode-id="749" id="attachment_49643429" style="width: 690px"><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img5.jpg"><img alt="" class="size-full wp-image-49643429 td-animation-stack-type0-2" data-dcnode-id="753" height="497" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img5.jpg&amp;raw" width="690"></a><figcaption class="wp-caption-text" data-dcnode-id="750" id="caption-attachment-49643429"><span data-dcnode-id="751" instrument_node="">Teacher Pat Sessions monitors student work via a “dashboard” on her computer.</span></figcaption></figure><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Teaching to the Student</span></strong></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">At Hampton, I asked Pritchard, the social-studies facilitator, how she knew what her students were doing, so she opened a dashboard on her computer. It showed that on computer 3, a student was working on a U.S. history unit, or “module,” on civil rights. The teenager on computer 6 was working on a module on imperialism for the same course, and the student on computer 7 was doing a review and practice test on the executive branch of the U.S. government.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Most PLCs, including those in Virginia, use NovaNET, an online curriculum that is marketed by Pearson Education Inc. The program tests a student at the end of each lesson, module, and course, and lets those who pass their tests with at least an 80 percent move on. For those who don’t pass, the computer singles out the content they seemed not to understand, reteaches it, and retests.</span></p><span data-dcnode-id="738" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643431" class="wp-caption alignright" data-dcnode-id="733" id="attachment_49643431" style="width: 350px"><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img3.jpg"><img alt="" class="size-full wp-image-49643431 td-animation-stack-type0-2" data-dcnode-id="737" height="391" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img3.jpg&amp;raw" width="350"></a><figcaption class="wp-caption-text" data-dcnode-id="734" id="caption-attachment-49643431"><span data-dcnode-id="735" instrument_node="">Administrators and teachers at the Richmond Adult Career Development Center PLC: Sherman Curl (front right), Rani Gharseese (front left), Elizabeth Muse (center), Pat Sessions (back left), Ingrid Thomas (back center), Stephania Muterspaugh (back right)</span></figcaption></figure><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Kids like the immediate feedback, Katherine Fox, the academic coordinator at Hampton, told me: “It’s difficult for them to wait for success. Kids want to move on.” A mop-haired boy named Michael told me that he used to obsess over test questions at his conventional school and couldn’t force himself to move ahead. The NovaNET practice tests and make-up tests relieved him of that anxiety, he said, as he pulled certificates from his backpack to show that he had completed two business classes, oceanography, and biology. “No one gets left behind here,” he said.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Back on Pritchard’s dashboard, meanwhile, I could see that the student on computer 1 was using an open-source educational website called SAS Curriculum Pathways to research voting rights for the government class, while the student on computer 2 was researching Appomattox on SAS for history class. Most Hampton PLC computers can access only NovaNET; the few that can access SAS can’t go any further than research sites to which SAS provides a link.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">At the career center PLC in Richmond, which is housed on the top floor of a 1920s-era school built for the city’s elite black students, science facilitator Patricia Sessions showed me more. A “pacing sheet,” a sort of minimum speed limit set by the state education department, suggested that teachers should expect to devote three weeks to a unit on biochemical processes, part of the biology curriculum. But when Sessions opened the computer file of a student named Trish, it showed that Trish had finished the unit in a week. She’d spent 26 minutes on an online lesson about atoms and molecules, and got a 90 on the test. She’d spent an hour on the properties-of-water lesson and another hour on acids and bases, and got 80 on both.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Teachers told me that most NovaNET courses are comparable to textbook-based courses in length and content—a comeback to critics who talk of watered-down curricula at alternative schools—but that many students move through them more quickly, and often finish high school a semester early. “I’m constantly working rather than waiting,” explained a tattooed girl named Shaina at the Richmond Tech school.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Pritchard told me that she started the school year with students grouped largely by subject—say, geography in one period, government in another. But as the year went on, and students progressed at different speeds, classes became more diverse. In any class period now, she could have youngsters working on either semester of any of four subjects.</span></p><span data-dcnode-id="717" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643430" class="wp-caption alignright" data-dcnode-id="712" id="attachment_49643430" style="width: 340px"><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img4.jpg"><img alt="" class="size-full wp-image-49643430 td-animation-stack-type0-2" data-dcnode-id="716" height="462" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img4.jpg&amp;raw" width="340"></a><figcaption class="wp-caption-text" data-dcnode-id="713" id="caption-attachment-49643430"><span data-dcnode-id="714" instrument_node="">Wes Hamner is the academic coordinator at the Richmond Technical Center PLC.</span></figcaption></figure><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">As students finish courses, they can move to another classroom to work on courses they may find slower going. If they earn enough credits to graduate before the school year is over, the services coordinator steers them to mentorships, trade training, or jobs. Sessions, who was playing Mendelssohn in her otherwise-silent classroom as her students worked, said she started the year with 20 kids in her afternoon class and was down to 8 by late March.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">All that movement precludes lectures or class discussions. Teachers told me that anywhere from 60 to 90 percent of the work in their classrooms is done online, with work sheets, projects, one-on-one meetings, and, for seniors, a research report and presentation accounting for the rest. The walls of Pritchard’s classroom were ringed with poster-board projects on the Zhou Dynasty, the Battle of Fort Fisher, and the roles of the secretary of defense and the U.S. Department of Education, among others. It wasn’t AP material, perhaps, but it showed persistence and attention to detail that are not always common in city schools. Last year, the whole school read the same book, </span><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Facing the Lion</span></em><span data-dcnode-id="704" instrument_node="">, and used it as a springboard for cross-disciplinary studies.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">The students I talked with said they didn’t miss discussions or were self-aware enough to know that lectures didn’t fit their learning style. “I wouldn’t be listening anyway,” Tyriq told me; “I’m not a person to talk,” said another 18-year-old named Dashawn. Instead, kids said they liked the anonymity and independence of working online. “I like being in my own bubble,” Chelsie Saunders told me in Hampton: “I don’t like waiting on people” on some lessons and “I don’t worry about people getting frustrated with me” for working slowly on others.</span></p><span data-dcnode-id="699" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643428" class="wp-caption alignleft" data-dcnode-id="694" id="attachment_49643428" style="width: 690px"><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img6.jpg"><img alt="" class="size-full wp-image-49643428 td-animation-stack-type0-2" data-dcnode-id="698" height="415" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img6.jpg&amp;raw" width="690"></a><figcaption class="wp-caption-text" data-dcnode-id="695" id="caption-attachment-49643428"><span data-dcnode-id="696" instrument_node="">Teacher Stephenia Muterspaugh prepares Shakeva Seward, Thomas Griffis, and Brittany Goodman for their Standards of Learning tests at the Richmond Adult Career Development Center PLC .</span></figcaption></figure><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="690"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">A Promising Start</span></strong></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">The PLCs take youngsters who have at least attempted 9th grade, plus a few overage 8th graders. But most kids arrive in 10th or 11th grade when they realize they’re not on track to graduate. For admission, they must score at an 8th-grade level on standardized reading and math tests (the Richmond Tech PLC raised that to 9th grade because it had so many applicants), pass an interview, and sign an achievement contract that also commits them to attend a daily meeting called Morning Motivation. Each gets a learning plan that plots an individual path to graduation and then to a trade program, a job, or college.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Yvonne Brandon, superintendent of Richmond City Schools, expressed enthusiasm for online learning when we spoke. “We have to transform our ideas of what learning looks like,” she said. But PLC staffers told me that the districts sometimes struggle to understand them. Grade levels, quarterly grades, GPAs, and the academic calendar are fuzzy at a move-at-your-own-pace school: Youngsters told me how many credits they had, not whether they were juniors or seniors.</span></p><span data-dcnode-id="683" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643426" class="wp-caption alignright" data-dcnode-id="678" id="attachment_49643426" style="width: 244px"><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img8.jpg"><img alt="" class="size-full wp-image-49643426 td-animation-stack-type0-2" data-dcnode-id="682" height="215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img8.jpg&amp;raw" width="244"></a><figcaption class="wp-caption-text" data-dcnode-id="679" id="caption-attachment-49643426"><span data-dcnode-id="680" instrument_node="">Sherri Pritchard is Hampton PLC’s social studies “learning facilitator.”</span></figcaption></figure><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Students graduate when they earn the state-mandated 22 credits, but they can’t receive diplomas until spring. Firth, the Virginia PLC director, said he recently learned that some of those graduates-without-diplomas were being counted as absent by the district because, well, they weren’t in school. “We’re so outside the box and education is so inside the box,” Hamner sighed.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">The data on online education are still pretty equivocal. There are no data on what kind of student performs best in an online class, although everyone I talked with assumed it probably was the independent achiever, because that kind of student performs well in any setting. There are few quality measures, although Michael Horn, executive director for education at the Innosight Institute, a Mountain View, California, think tank, points out that we don’t know how to measure quality in face-to-face classes, either.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Barbara Means of SRI International, a research institute in Menlo Park, California, told me that much of the ambiguity is because state data systems aren’t set up to compare online learners to in-class learners. They don’t record which students taking the state’s standardized math tests completed them at the end of an online course, for example, and which took them after a face-to-face class. Most states don’t keep student-level data, so researchers also can’t compare similar students at a full-time virtual school and those in a full-time conventional one.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Means reviewed 12 years of literature on online learning and said that from the limited data they presented she concluded that “there wasn’t much difference” in the educational outcomes of kids who studied online and those who studied in a classroom. That suggests that schools should consider some other reason if they’re thinking of shifting curriculum or students online, she said: Perhaps it’s cheaper or there are social benefits, like making school more flexible for working students or for those with infants.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Means also surveyed the literature comparing outcomes at traditional schools to outcomes at schools that blended face-to-face and online teaching. Youngsters in the blended environments, with a teacher and technology, did “significantly better,” she said. But that may be because blended schools offered youngsters more learning time, more content, or perhaps both, rather than because of the different approach to teaching.</span></p><span data-dcnode-id="662" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643425" class="wp-caption alignright" data-dcnode-id="657" id="attachment_49643425" style="width: 474px"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img9.jpg"><img alt="" class="size-full wp-image-49643425 td-animation-stack-type0-2" data-dcnode-id="661" height="357" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img9.jpg&amp;raw" width="474"></a><figcaption class="wp-caption-text" data-dcnode-id="658" id="caption-attachment-49643425"><span data-dcnode-id="659" instrument_node="">Katherine Fox, academic coordinator at the Hampton PLC, hands Tyriq Jones his diploma.</span></figcaption></figure><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Credit-recovery and online programs have been accused of low standards and a weak-tea curriculum, anything to get kids into the graduation statistics, critics contend. But the PLCs insist on the rigor of their program because it’s based on a general-education curriculum, not a credit-recovery curriculum. PLC students take the same state tests as their traditional-school peers. And computer testing on NovaNET and other online curricula prevents social promotion or the intervention of soft-hearted administrators. “We legally graduate kids; I don’t do them any favors,” said Wes Hamner at Richmond Tech PLC.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">In a report on the 2009–10 school year, the project says that, nationally, its students improved their scores in all four core subjects compared to their performance in their home school the year before—by from 6 to 11 percentage points—and that 96 percent of the students classified as seniors at the beginning of the school year graduated. For a project that works with potential dropouts, that’s hugely impressive, but there has been little outside research on the PLCs that would confirm that.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The results at the Virginia PLCs are equally ambiguous. In 2009–10, the 432 youngsters who attended the four schools arrived with D averages in math, English, science, and social studies, and, except for math—which was still stuck in the basement—raised them to a C. But the averages include the 30 percent of kids who dropped out, switched to a GED program, or left for some other reason, probably lowering the grades.</span></p><span data-dcnode-id="647" instrument_node="">
</span><figure aria-describedby="caption-attachment-49643424" class="wp-caption alignright" data-dcnode-id="642" id="attachment_49643424" style="width: 225px"><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img10.jpg"><img alt="" class="size-full wp-image-49643424 td-animation-stack-type0-1" data-dcnode-id="646" height="307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.educationnext.org/wp-content/uploads/2020/03/ednext_20114_kronholz_img10.jpg&amp;raw" width="225"></a><figcaption class="wp-caption-text" data-dcnode-id="643" id="caption-attachment-49643424"><span data-dcnode-id="644" instrument_node="">After experiencing little success in a traditional high school, Tyriq Hasan Jones graduated in June 2011 from the Hampton PLC.</span></figcaption></figure><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">The PLCs also reported that 96 percent of their students passed Virginia’s end-of-course algebra exams, 97 percent passed reading, 90 percent passed biology, and 100 percent passed writing. That would put the PLCs ahead of state averages in all four subjects. (The results say a lot about Virginia’s learning standards: Is it really possible that only 6 percent of the state’s 400,000 high schoolers failed reading and 6 percent failed Algebra I last year?) The scores of PLC students are included in the results of their home schools, which makes them difficult to verify. The PLCs also don’t accept English-language learners, kids with discipline problems or most disabilities, or those with elementary-level reading and math abilities, as other public schools must, which muddies the comparison.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Still, more than one-third of the youngsters who started at the Virginia PLCs in fall 2009 graduated in 2010, including 68 students who headed to two- or four-year colleges, the Virginia project reported.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">When I spoke with Chelsie Saunders in Hampton in early spring, she laid out a career path that included community college, university, and then a career in teaching or nursing. “Honestly, if it wasn’t for here, I wouldn’t graduate,” she told me. When I checked back in June, she had.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="623"><em data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">June Kronholz is a former </span></em><span data-dcnode-id="629" instrument_node="">Wall Street Journal </span><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">foreign correspondent, bureau chief, and education reporter, and currently a contributing editor at </span></em><span data-dcnode-id="626" instrument_node="">Education Next</span><em data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">.</span></em></p><span data-dcnode-id="622" instrument_node="">
</span></div><span data-dcnode-id="620" instrument_node="">
</span></div><span data-dcnode-id="618" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="613" instrument_node="">
