</span><span data-dcnode-id="793" instrument_node="">

</span></div><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" style="color: rgb(28, 30, 41);background: transparent;"><b data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Persuasive speech topics for teens</span></b><span data-dcnode-id="778" instrument_node=""> need to address the issues relevant to young people and which they care! This connection to their lives will ensure the finished speech isn't just exciting for the student to write, but compelling to for the audience to hear.</span></span></p><p data-dcnode-id="773"><span data-dcnode-id="774" style="color: rgb(28, 30, 41);background: transparent;"><span data-dcnode-id="775" instrument_node="">I have a LOT of ideas on this site for creating speeches that are intended to convince others. I created this page for this age group as teenagers can be quite a demanding audience!</span></span></p><p data-dcnode-id="766"><span data-dcnode-id="771" style="color: rgb(28, 30, 41);background: transparent;"><span data-dcnode-id="772" instrument_node="">For that reason, it's essential to grab their attention immediately with a subject that's </span></span><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">relevant</span></em><span data-dcnode-id="767" style="color: rgb(28, 30, 41);background: transparent;"><span data-dcnode-id="768" instrument_node=""> to their lives.</span></span></p><span data-dcnode-id="765" instrument_node="">
</span><span data-dcnode-id="763" instrument_node="">
</span><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="752"><i data-dcnode-id="753"><span data-dcnode-id="760" instrument_node="">Please note that you can take an </span><b data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">opposing</span></b><span data-dcnode-id="757" instrument_node=""> position for any of the topics below - in other words, persuade your audience </span><b data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">against</span></b><span data-dcnode-id="754" instrument_node=""> the stated idea.</span></i></p><span data-dcnode-id="751" instrument_node="">

</span><ol data-dcnode-id="727"><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Too little is being done to deal with poverty in America</span></li><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Girls should be allowed to play on boys' sports teams</span></li><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Students should no longer be forced to read 'classic' literature</span></li><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Teenage girls suffer body image issues due to the way women are portrayed in the media</span></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Students should be permitted to use cellphones at school</span></li><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Between studies and hobbies, teens are WAY over-scheduled</span></li><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Sex education should not be a part of the curriculum in public schools</span></li><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">The voting age should be lowered to 16</span></li><li data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Children should be allowed to 'divorce' their parents</span></li><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Corporations should not be allowed to advertise in schools</span></li></ol><span data-dcnode-id="726" instrument_node="">
