</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Kids Plus provides assistance for children and their families experiencing homelessness. It provides support from a multi-disciplinary team of nursing, social work, chemical dependency, housing and eligibility specialists during times of transition.</span></p><span data-dcnode-id="379" instrument_node="">
