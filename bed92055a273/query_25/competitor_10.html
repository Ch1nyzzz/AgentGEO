rument_node="">Decent Essays</span></span></div><ul class="weight-700 padding-left-1 share-block" data-dcnode-id="579"><li data-dcnode-id="583"><span class="text-s" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">1105 Words</span></span></li><li data-dcnode-id="580"><span class="text-s" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">5 Pages</span></span></li></ul><div class="margin-top-auto" data-dcnode-id="576"><a class="button button--orange button--squarish text-m button--orange" data-dcnode-id="577" data-href="/writing/document/PKNUSCF6A5" href="javascript:void(0);" id="ShowMoreButtonExtra" rel="nofollow"><span data-dcnode-id="578" instrument_node="">Open Document</span></a></div></div></div></div><div class="columns small-12 medium-4 large-4 rhino-slot" data-dcnode-id="572" id="AdPreviewRowSidebar"></div></div><div class="row essay-preview-block" data-dcnode-id="523" id="divPreviewBlock"><div class="columns large-8 paper-container paper-container--with-sidebar position-relative border-box-shadow margin-4 padding-2" data-dcnode-id="538"><div class="" data-dcnode-id="540"><div class="position-relative margin-4 text-xl" data-dcnode-id="541"><div data-dcnode-id="570" id="essay-body-heading-details"></div><div class="document__body white-space--break-spaces text-ellipsis-after break-word" data-dcnode-id="546"><span class="document__preview text-l source-serif" data-dcnode-id="561"><span data-dcnode-id="569" instrument_node="">VOTING AT 16?</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node="">
</span><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">
Neglected for a generation, a troublesome political question is back : when should young people be able to vote for candidates in elections? Conservative peer Lord Lucas of Crudwell and Dingwall recently tabled a Private Members Bill in the Lords. It proposed a voting age of 16. And this week, for the first time, a national coalition has been launched at the Houses of Parliament. The Votes at 16 Campaign is backed by a wide range of groups – from the National Black Youth Forum and Plaid Cymru to the YMCA and Liberal Democrat Youth and Students. Meanwhile, the Electoral Commission’s Sam Younger (true to his surname) has backed an independent review of the current </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/voting" style="color:#3174a3"><span data-dcnode-id="564" instrument_node="">voting</span></a><span data-dcnode-id="562" instrument_node=""> age. The Minister for Young People, John Denham, has</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="558" data-href="/writing/document/PKNUSCF6A5" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="557"><span class="document__preview text-l source-serif" data-dcnode-id="547"><span data-dcnode-id="556" instrument_node="">Maturity has no history. Youth and politics will never mix. So it follows that teenagers, in their imprudence, will misuse the vote. At sixteen (says Ellie Levenson of the Fabian Society) ‘teenagers are at their most rebellious and negative stage, a time when they are more keen on making a statement than acting responsibly.’ Like hysterical suffragettes bent on dragging passions into politics, or ill-mannered nineteenth-century workers, young people are a danger unto themselves. ‘Let us not provide’, runs Levenson’s objection, ‘an extra means by which teenagers can rebel against authority, by either abusing their vote or not voting at all.’ </span><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">
</span><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">
Defenders of the present system are so far in the majority. Yet when judged in terms of arguments they are in trouble. Their sense of history is poor and they lack both a unified voice and intellectual authority. No Edmund Burke or Thomas Carlyle is to be found in their ranks. They have Tony Blair, it’s true. At this year’s Blackpool conference, when asked about granting sixteen years olds the vote, he said that citizenship should have a ‘legal’ starting point : eighteen. The Prime Minister no doubt knows that the current legal condition of young people is anomalous, but he is not alone in his beliefs. The conservatives have plenty of politicians on their side, but – given their rising unpopularity - that may prove to be their joint undoing. </span><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">
