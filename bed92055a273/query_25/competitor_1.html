a-event-click="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-include-experiments="true"><div class="ArticlePageChunks-lglntq dEYrZE" data-dcnode-id="228" data-testid="ArticlePageChunks"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="418"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="440"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="441" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="442"><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Who counts as a voter?</span></p><p data-dcnode-id="514"><span data-dcnode-id="518" instrument_node="">Answering that question has been a driving force for change throughout United States history. And in a few cities and towns, the rules have </span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/tag/voting-age"><span data-dcnode-id="517" instrument_node="">already</span></a><span data-dcnode-id="515" instrument_node=""> evolved to allow 16- and 17-year-olds to participate in some races.</span></p><p data-dcnode-id="497"><span data-dcnode-id="513" instrument_node="">In 2013, Takoma Park, Maryland, became </span><a class="external-link" data-dcnode-id="511" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.npr.org/2013/05/15/184243993/maryland-suburb-says-16-is-old-enough-to-vote&quot;}" data-offer-url="https://www.npr.org/2013/05/15/184243993/maryland-suburb-says-16-is-old-enough-to-vote" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2013/05/15/184243993/maryland-suburb-says-16-is-old-enough-to-vote" rel="nofollow noopener" target="_blank"><span data-dcnode-id="512" instrument_node="">the first city</span></a><span data-dcnode-id="510" instrument_node=""> in the U.S. to allow people age 16 and up to vote in municipal elections, with two other Maryland cities, </span><a class="external-link" data-dcnode-id="508" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.washingtonpost.com/local/md-politics/hyattsville-becomes-second-city-in-the-us-to-lower-voting-age-to-16/2015/01/07/24a7c8be-95c7-11e4-aabd-d0b93ff613d5_story.html&quot;}" data-offer-url="https://www.washingtonpost.com/local/md-politics/hyattsville-becomes-second-city-in-the-us-to-lower-voting-age-to-16/2015/01/07/24a7c8be-95c7-11e4-aabd-d0b93ff613d5_story.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/local/md-politics/hyattsville-becomes-second-city-in-the-us-to-lower-voting-age-to-16/2015/01/07/24a7c8be-95c7-11e4-aabd-d0b93ff613d5_story.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="509" instrument_node="">Hyattville</span></a><span data-dcnode-id="507" instrument_node=""> and </span><a class="external-link" data-dcnode-id="505" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://wtop.com/prince-georges-county/2018/01/greenbelt-lowers-voting-age-16/&quot;}" data-offer-url="https://wtop.com/prince-georges-county/2018/01/greenbelt-lowers-voting-age-16/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wtop.com/prince-georges-county/2018/01/greenbelt-lowers-voting-age-16/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="506" instrument_node="">Greenbelt</span></a><span data-dcnode-id="504" instrument_node="">, and the </span><a class="external-link" data-dcnode-id="502" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://wearecasa.org/casa-lauds-riverdale-parks-decision-to-expand-voting-rights/&quot;}" data-offer-url="https://wearecasa.org/casa-lauds-riverdale-parks-decision-to-expand-voting-rights/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wearecasa.org/casa-lauds-riverdale-parks-decision-to-expand-voting-rights/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="503" instrument_node="">town of Riverdale Park</span></a><span data-dcnode-id="501" instrument_node="">, following in years since. In 2016, Berkeley, California, voters </span><a class="external-link" data-dcnode-id="499" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.cityofberkeley.info/uploadedFiles/Clerk/Elections/2016/Summary%20Results%20Nov.%202016.pdf&quot;}" data-offer-url="https://www.cityofberkeley.info/uploadedFiles/Clerk/Elections/2016/Summary%20Results%20Nov.%202016.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cityofberkeley.info/uploadedFiles/Clerk/Elections/2016/Summary%2520Results%2520Nov.%25202016.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="500" instrument_node="">overwhelmingly approved</span></a><span data-dcnode-id="498" instrument_node=""> a measure that extended to 16-year-olds the right to vote in school board elections.</span></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="494" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="496"></div><div class="journey-unit" data-dcnode-id="495"></div></div><p data-dcnode-id="486"><span data-dcnode-id="493" instrument_node="">The legal voting age of 18 for state and federal elections is still a relatively new development in American political history, and was a largely unpopular idea with the majority of Americans </span><a class="external-link" data-dcnode-id="491" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://digital.library.unt.edu/ark:/67531/metacrs8805/m1/1/high_res_d/83-103GOV_1983May20.pdf&quot;}" data-offer-url="https://digital.library.unt.edu/ark:/67531/metacrs8805/m1/1/high_res_d/83-103GOV_1983May20.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digital.library.unt.edu/ark%3A/67531/metacrs8805/m1/1/high_res_d/83-103GOV_1983May20.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="492" instrument_node="">until</span></a><span data-dcnode-id="490" instrument_node=""> the mid-1950s. It wasn’t until 1971 that the passage of the 26th Amendment officially granted 18-year-olds the right to vote in federal elections, which was the culmination of a campaign that dated back to World War II, when President Franklin D. Roosevelt announced his support for </span><a class="external-link" data-dcnode-id="488" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.history.com/topics/united-states-constitution/the-26th-amendment&quot;}" data-offer-url="https://www.history.com/topics/united-states-constitution/the-26th-amendment" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/united-states-constitution/the-26th-amendment" rel="nofollow noopener" target="_blank"><span data-dcnode-id="489" instrument_node="">lowering the draft age</span></a><span data-dcnode-id="487" instrument_node=""> from 21 to 18.</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="485" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"></div><p data-dcnode-id="465"><span data-dcnode-id="484" instrument_node="">Today, teenagers are again on the front lines of social change, leading movements like </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/black-lives-matter-protests-teens"><span data-dcnode-id="483" instrument_node="">Black Lives Matter,</span></a><span data-dcnode-id="481" instrument_node=""> </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/search%3Fq%3DMarch%2BFor%2BOur%2BLives%26sort%3Dscore%2Bdesc"><span data-dcnode-id="480" instrument_node="">March for Our Lives</span></a><span data-dcnode-id="478" instrument_node="">, and the </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/sunrise-movement-teen-organizers-capitol-hill-protest-arrests-just-the-beginning"><span data-dcnode-id="477" instrument_node="">Sunrise Movement</span></a><span data-dcnode-id="475" instrument_node="">, which have impacted the political attitudes </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/how-will-gen-z-vote"><span data-dcnode-id="474" instrument_node="">of a generation</span></a><span data-dcnode-id="472" instrument_node=""> of young people and helped spur to action millions of their older counterparts. Teen girls, in particular, have helped champion these fights: “A lot of credit goes to young people who have...helped open a lot of minds to the idea that young people have a stake in our democracy and are very eager to participate in it...and actually care about public policy, understand how it affects them, and want to have a voice influencing it,” says Brandon Klugman, campaign manager for </span><a class="external-link" data-dcnode-id="470" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://vote16usa.org/about-us/&quot;}" data-offer-url="http://vote16usa.org/about-us/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vote16usa.org/about-us/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="471" instrument_node="">Vote16USA</span></a><span data-dcnode-id="469" instrument_node="">, a national campaign organized by the civics education organization </span><a class="external-link" data-dcnode-id="467" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://generationcitizen.org/about-us/mission-vision/&quot;}" data-offer-url="https://generationcitizen.org/about-us/mission-vision/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//generationcitizen.org/about-us/mission-vision/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="468" instrument_node="">Generation Citizen</span></a><span data-dcnode-id="466" instrument_node="">. “Obviously, youth-led political engagement existed long before [this moment], but maybe it didn't get the attention [it] always deserved.”</span></p><div class="AdWrapper-fFweuL dIvDeZ ad ad--in-content" data-dcnode-id="463"><div class="ad__slot ad__slot--in-content" data-dcnode-id="464" data-node-id="cupm8o"></div></div><p data-dcnode-id="443"><span data-dcnode-id="462" instrument_node="">During the 2018 midterm elections, young people ages 18-24 showed up to the polls </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/library/stories/2019/04/behind-2018-united-states-midterm-election-turnout.html"><span data-dcnode-id="461" instrument_node="">in record numbers</span></a><span data-dcnode-id="459" instrument_node="">, helping to elect the </span><a class="external-link" data-dcnode-id="457" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.pewresearch.org/fact-tank/2019/02/08/for-the-fifth-time-in-a-row-the-new-congress-is-the-most-racially-and-ethnically-diverse-ever/&quot;}" data-offer-url="https://www.pewresearch.org/fact-tank/2019/02/08/for-the-fifth-time-in-a-row-the-new-congress-is-the-most-racially-and-ethnically-diverse-ever/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/fact-tank/2019/02/08/for-the-fifth-time-in-a-row-the-new-congress-is-the-most-racially-and-ethnically-diverse-ever/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="458" instrument_node="">most racially and ethnically diverse</span></a><span data-dcnode-id="456" instrument_node=""> — and the </span><a class="external-link" data-dcnode-id="454" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.pewresearch.org/fact-tank/2018/12/18/record-number-women-in-congress/&quot;}" data-offer-url="https://www.pewresearch.org/fact-tank/2018/12/18/record-number-women-in-congress/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/fact-tank/2018/12/18/record-number-women-in-congress/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="455" instrument_node="">most female</span></a><span data-dcnode-id="453" instrument_node=""> — congressional class in history, according to the Pew Research Center. A report </span><a class="external-link" data-dcnode-id="451" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond&quot;}" data-offer-url="https://circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond" rel="nofollow noopener" target="_blank"><span data-dcnode-id="452" instrument_node="">released</span></a><span data-dcnode-id="450" instrument_node=""> in May from the Center for Information &amp; Research on Civic Learning and Engagement (CIRCLE) found that in those midterm elections, white, Black, and Latinx women between ages 18-24 registered and voted </span><a class="external-link" data-dcnode-id="448" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond&quot;}" data-offer-url="https://circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond" rel="nofollow noopener" target="_blank"><span data-dcnode-id="449" instrument_node="">at higher rates</span></a><span data-dcnode-id="447" instrument_node=""> than their male peers; and Black and Latinx women were the </span><a class="external-link" data-dcnode-id="445" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond&quot;}" data-offer-url="https://circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/young-womens-political-engagement-elections-and-beyond" rel="nofollow noopener" target="_blank"><span data-dcnode-id="446" instrument_node="">most likely</span></a><span data-dcnode-id="444" instrument_node=""> among all groups to say they were motivated to get involved in politics, or be active in a social movement, followed by white women. And it’s women — particularly young women of color — who stand to have their voices most amplified by the movement to expand voting rights to 16- and 17- year-olds.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="419"><div class="StickyBoxWrapper-euhCxU luKJG sticky-box" data-dcnode-id="420"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="422"><div class="Container-imGeBO ftlPuP" data-dcnode-id="428" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy cOXgPu" data-dcnode-id="429" data-testid="cne-interlude-container-right-rail"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU byjIhE kIoYMT" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">WATCH</span></p><figure class="CneVideoEmbedFigure-bJIZil dApMCp cne-video-embed" data-dcnode-id="433"><div data-dcnode-id="434" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="436" id="c0d7c8cf-de8-7d9c-e993-301c1f0e89fc" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="437" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU gRUVAY dhOqoy csoDwQ" data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/video/watch/riverdale-s-cole-sprouse-kj-apa-compete-in-a-compliment-battle" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeRightRailTitle-fiGQEr eTiIvU lhdBHp cWonjf" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Riverdale's Cole Sprouse &amp; KJ Apa Compete in a Compliment Battle</span></p></a></figure></div><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="426"><div class="ad__slot ad__slot--rail" data-dcnode-id="427" data-node-id="ra38h"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="423" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="425"></div><div class="journey-unit" data-dcnode-id="424"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="421"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="415"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="416"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="417" data-node-id="wjvoyq"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="350"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="361"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="362" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="363"><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Kei Kawashima-Ginsberg, director of CIRCLE, agrees: “Anytime a person sees injustice in the system or the community, those are the people that are going to be really most committed to voting.… In particular, with cases of racism or community violence, young women, especially young women of color, have been the most passionate advocates for those issues.”</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="412" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="407"><span data-dcnode-id="411" instrument_node="">Young people — again, particularly young women — see themselves as civic actors, but social constructs have limited the ideas about how much civic responsibility teenagers should take on. “I think we do have a blind spot on what young people are capable of,” Kawashima-Ginsberg tells </span><em data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Teen Vogue</span></em><span data-dcnode-id="408" instrument_node="">.</span></p><p data-dcnode-id="393"><span data-dcnode-id="406" instrument_node="">Last year, </span><a class="external-link" data-dcnode-id="404" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://thehill.com/hilltv/what-americas-thinking/441838-poll-most-americans-dont-want-to-lower-voting-age&quot;}" data-offer-url="https://thehill.com/hilltv/what-americas-thinking/441838-poll-most-americans-dont-want-to-lower-voting-age" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehill.com/hilltv/what-americas-thinking/441838-poll-most-americans-dont-want-to-lower-voting-age" rel="nofollow noopener" target="_blank"><span data-dcnode-id="405" instrument_node="">a poll</span></a><span data-dcnode-id="403" instrument_node=""> commissioned by The Hill and HarrisX found that 84% of registered voters opposed granting 16-year-olds the right to vote, while 75% opposed granting suffrage to 17-year- olds. Yet research indicates that 16-year-olds are just as capable of voting as adults. A 2011 study published in </span><em data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">The Annals of the</span></em><span data-dcnode-id="400" instrument_node=""> </span><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">American Academy of Political and Social Science</span></em><span data-dcnode-id="397" instrument_node=""> </span><a class="external-link" data-dcnode-id="395" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.jstor.org/stable/27895968?read-now=1&amp;seq=1&quot;}" data-offer-url="https://www.jstor.org/stable/27895968?read-now=1&amp;seq=1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/27895968%3Fread-now%3D1%26seq%3D1" rel="nofollow noopener" target="_blank"><span data-dcnode-id="396" instrument_node="">found</span></a><span data-dcnode-id="394" instrument_node=""> that 16-year-olds demonstrated understanding similar to that of adults between the ages of 19-30 on measures of civic knowledge, political skills, and political efficacy, but scored markedly higher than 14-year-olds, suggesting significant developments in young people’s understanding of these concepts before age 16, but little after.</span></p><p data-dcnode-id="382"><span data-dcnode-id="392" instrument_node="">In March 2019, 126 members of the House of Representatives </span><a class="external-link" data-dcnode-id="390" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://vote16usa.org/press-release-u-s-house-of-reps-vote-on-lowering-voting-age/&quot;}" data-offer-url="http://vote16usa.org/press-release-u-s-house-of-reps-vote-on-lowering-voting-age/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vote16usa.org/press-release-u-s-house-of-reps-vote-on-lowering-voting-age/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="391" instrument_node="">voted in favor</span></a><span data-dcnode-id="389" instrument_node=""> of lowering the federal voting age from 18 to 16 after the bill was introduced on the House floor by Representative </span><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/representative-ayanna-pressley-lower-federal-voting-age-16"><span data-dcnode-id="388" instrument_node="">Ayanna Pressley</span></a><span data-dcnode-id="386" instrument_node=""> (D-MA). The bill failed to pass, but it spoke to the movement’s growing strength. This November, San Francisco could become the first major U.S. city to extend the right to vote to 16- and 17-year-olds when voters decide on a </span><a class="external-link" data-dcnode-id="384" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://sanfrancisco.cbslocal.com/2020/05/17/san-francisco-oakland-consider-measure-to-lower-voting-age-to-16/&quot;}" data-offer-url="https://sanfrancisco.cbslocal.com/2020/05/17/san-francisco-oakland-consider-measure-to-lower-voting-age-to-16/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sanfrancisco.cbslocal.com/2020/05/17/san-francisco-oakland-consider-measure-to-lower-voting-age-to-16/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="385" instrument_node="">charter amendment</span></a><span data-dcnode-id="383" instrument_node=""> to allow people 16 and up to vote in municipal elections.</span></p><p data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">It's an initiative that’s come a long way in recent years, according to Arianna Nassiri, 17, a member of the San Francisco Youth Commission, who worked on this proposal and another that went before the city’s voters in 2016, but </span><a class="external-link" data-dcnode-id="379" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.sfelections.org/results/20161108/#a_english_42&quot;}" data-offer-url="https://www.sfelections.org/results/20161108/#a_english_42" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sfelections.org/results/20161108/%23a_english_42" rel="nofollow noopener" target="_blank"><span data-dcnode-id="380" instrument_node="">fell short</span></a><span data-dcnode-id="378" instrument_node=""> by just 4% of the vote. Arianna has pushed to shift the language of this latest effort to be “less of a campaign to lower the voting age, but more of a campaign to expand democratic rights.”</span></p><p data-dcnode-id="372"><span data-dcnode-id="376" instrument_node="">“[Like] most movements that try to expand suffrage...it’s bringing as many voices of people who can speak to their lived experiences as possible,” says Tyler Okeke, 18. Now a student at the University of Chicago, Tyler served as a student representative on the Los Angeles Unified School District board during his senior year of high school, when he authored a resolution directing the superintendent to report on the feasibility of a ballot measure to allow Los Angeles 16- and 17-year-olds </span><a class="external-link" data-dcnode-id="374" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.latimes.com/local/education/la-me-edu-lausd-teen-voting-20190423-story.html&quot;}" data-offer-url="https://www.latimes.com/local/education/la-me-edu-lausd-teen-voting-20190423-story.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/local/education/la-me-edu-lausd-teen-voting-20190423-story.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="375" instrument_node="">to vote</span></a><span data-dcnode-id="373" instrument_node=""> in school board elections.</span></p><p data-dcnode-id="364"><span data-dcnode-id="371" instrument_node="">That expansion is similar to the long process of incremental change that has historically led to other major legislative and cultural changes in the United States, including universal women’s suffrage and marriage equality. “We felt that it was a step to extend democracy for everyone. And we felt that this was a first step, because we are students, and schools impact us the most because we are there every day,” Malia Liao tells </span><em data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Teen Vogue</span></em><span data-dcnode-id="368" instrument_node="">. Malia, 17, a high school student and organizer with Oakland Kids First, was part of the Bay Area city’s recent successful effort to put a charter amendment on the November ballot that, if passed, will enable 16- and 17-year-olds to vote in school board elections. Oakland City Council members agreed </span><a class="external-link" data-dcnode-id="366" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.mercurynews.com/2020/05/19/oakland-voters-to-decide-if-youth-should-vote-in-school-elections/&quot;}" data-offer-url="https://www.mercurynews.com/2020/05/19/oakland-voters-to-decide-if-youth-should-vote-in-school-elections/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mercurynews.com/2020/05/19/oakland-voters-to-decide-if-youth-should-vote-in-school-elections/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="367" instrument_node="">unanimously</span></a><span data-dcnode-id="365" instrument_node=""> to put the idea before voters in November.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="351"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="352"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="354"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="359"><div class="ad__slot ad__slot--rail" data-dcnode-id="360" data-node-id="zp3mcm"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="356" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="358"></div><div class="journey-unit" data-dcnode-id="357"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="355" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="353"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="347"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="348"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="349" data-node-id="0j9k4g"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="292"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="303"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="304" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="305"><p data-dcnode-id="333"><span data-dcnode-id="346" instrument_node="">Research </span><a class="external-link" data-dcnode-id="344" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.jstor.org/stable/3117809?read-now=1&amp;refreqid=excelsior%3A952a67d46fdb32ebacb837832108137a&amp;seq=1&quot;}" data-offer-url="https://www.jstor.org/stable/3117809?read-now=1&amp;refreqid=excelsior%3A952a67d46fdb32ebacb837832108137a&amp;seq=1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/3117809%3Fread-now%3D1%26refreqid%3Dexcelsior%253A952a67d46fdb32ebacb837832108137a%26seq%3D1" rel="nofollow noopener" target="_blank"><span data-dcnode-id="345" instrument_node="">has shown</span></a><span data-dcnode-id="343" instrument_node=""> that voting is habit forming and it increases a voter’s likelihood to participate in future elections, which underscores the importance of having as stable an environment as possible for the youngest voters. But both Kawashima-Ginsberg and Klugman point to the transitions that often accompany turning 18, such as graduating from high school, reaching the age of majority, starting college, and possibly living away from home for the first time, as factors that can actually make it </span><em data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">more</span></em><span data-dcnode-id="340" instrument_node=""> </span><em data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">difficult</span></em><span data-dcnode-id="337" instrument_node=""> for young people to vote. “Everyone [would have] the opportunity to participate in one election before they reach that time of intense transition at 18,” says Klugman. He points out that a number of states </span><a class="external-link" data-dcnode-id="335" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.ncsl.org/research/elections-and-campaigns/preregistration-for-young-voters.aspx&quot;}" data-offer-url="https://www.ncsl.org/research/elections-and-campaigns/preregistration-for-young-voters.aspx" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsl.org/research/elections-and-campaigns/preregistration-for-young-voters.aspx" rel="nofollow noopener" target="_blank"><span data-dcnode-id="336" instrument_node="">currently allow 16-year-olds to preregister to vote</span></a><span data-dcnode-id="334" instrument_node="">, which could further ease the process of registering new voters.</span></p><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Moreover, expanding the vote to 16- and 17-year olds equips teenagers with a firmer network of resources and support, especially for those who may be the first in their family to vote or are from households where voting is not a regular occurrence. “Young people...need somewhere they can go to ask...really basic questions.… There's no better place than high school to be able to do that within a very educational context,” says Kawashma-Ginsberg. “[It’s] like driver's ed: ‘This is very basic, everybody should know that, and here are some of the pitfalls that young people sometimes miss….’ Everybody is put on the same starting line as a voter.”</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-2 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="330" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="325"><span data-dcnode-id="329" instrument_node="">Modeling habitual voting is particularly important for young girls to see and engage in as early as possible. “Girls get subtle and sometimes not-so-subtle messages from our society that they don’t know enough or don’t have enough right to have a strong opinion, or should just...accept things as they are,” Lara Kaufmann, director of public policy for Girls Inc., tells </span><em data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Teen Vogue</span></em><span data-dcnode-id="326" instrument_node="">. “We want to make sure girls...aren’t intimidated from exercising [their] right, and the best way to do that is, from a young age, make sure they see themselves as voters, potential leaders, and as civically engaged members of their communities.”</span></p><p data-dcnode-id="317"><span data-dcnode-id="324" instrument_node="">Others activists, like Ella Yitzhaki, from San Francisco, are taking a different route to engage and expand the youth vote. In June, Ella, 18, </span><a class="external-link" data-dcnode-id="322" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.mercurynews.com/2020/05/19/oakland-voters-to-decide-if-youth-should-vote-in-school-elections/&quot;}" data-offer-url="https://www.mercurynews.com/2020/05/19/oakland-voters-to-decide-if-youth-should-vote-in-school-elections/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mercurynews.com/2020/05/19/oakland-voters-to-decide-if-youth-should-vote-in-school-elections/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="323" instrument_node="">testified</span></a><span data-dcnode-id="321" instrument_node=""> in front of the California Assembly Committee in support of Assembly Constitutional Amendment (ACA)-4, which would have California join a number of states, and the District of Columbia, that </span><a class="external-link" data-dcnode-id="319" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.fairvote.org/primary_voting_at_age_17#state_by_state_map_presidential_primaries&quot;}" data-offer-url="https://www.fairvote.org/primary_voting_at_age_17#state_by_state_map_presidential_primaries" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairvote.org/primary_voting_at_age_17%23state_by_state_map_presidential_primaries" rel="nofollow noopener" target="_blank"><span data-dcnode-id="320" instrument_node="">allow</span></a><span data-dcnode-id="318" instrument_node=""> 17-year-olds who will be 18 on Election Day to vote in congressional elections, primary elections or caucuses. Her cause is about “extending the voting age to people who are already voting in the general [election],” Ella says. “[It] not only has legal and constitutional standing,” she points out, but “based on...all the encouragement that we've seen from folks who approve of the legislation, [they] realize that it's a rational and reasonable way to engage young people and give them the fair vote and the full vote.”&nbsp;</span></p><p data-dcnode-id="306"><span data-dcnode-id="316" instrument_node="">In February, a press release from Colorado’s secretary of state reported that </span><a class="external-link" data-dcnode-id="314" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.sos.state.co.us/pubs/newsRoom/pressReleases/2020/PR20200309YoungVoters.html&quot;}" data-offer-url="https://www.sos.state.co.us/pubs/newsRoom/pressReleases/2020/PR20200309YoungVoters.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sos.state.co.us/pubs/newsRoom/pressReleases/2020/PR20200309YoungVoters.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="315" instrument_node="">45.24% of eligible 17-year-olds turned out to vote</span></a><span data-dcnode-id="313" instrument_node=""> in Colorado’s presidential primary after the state </span><a class="external-link" data-dcnode-id="311" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.huffpost.com/entry/colorado-17-year-old-vote-primary_n_5e53f63ec5b6ad3de381fcc8&quot;}" data-offer-url="https://www.huffpost.com/entry/colorado-17-year-old-vote-primary_n_5e53f63ec5b6ad3de381fcc8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffpost.com/entry/colorado-17-year-old-vote-primary_n_5e53f63ec5b6ad3de381fcc8" rel="nofollow noopener" target="_blank"><span data-dcnode-id="312" instrument_node="">passed a similar law last year</span></a><span data-dcnode-id="310" instrument_node="">, nearly matching the overall voter turnout in the state and surpassing that among those ages 18-34 </span><a class="external-link" data-dcnode-id="308" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://vote16usa.org/data-from-colorado-primary-makes-case-for-lower-voting-age/&quot;}" data-offer-url="http://vote16usa.org/data-from-colorado-primary-makes-case-for-lower-voting-age/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vote16usa.org/data-from-colorado-primary-makes-case-for-lower-voting-age/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="309" instrument_node="">by 15%</span></a><span data-dcnode-id="307" instrument_node="">, according to data from Vote16USA.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="293"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="294"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="296"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="301"><div class="ad__slot ad__slot--rail" data-dcnode-id="302" data-node-id="bc9vd5"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="298" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="300"></div><div class="journey-unit" data-dcnode-id="299"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="297" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="295"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="289"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="290"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="291" data-node-id="c4zoi"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="229"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="239"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="240" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="241"><p data-dcnode-id="284"><span data-dcnode-id="288" instrument_node="">Younger voters </span><a class="external-link" data-dcnode-id="286" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.washingtonpost.com/politics/2019/01/17/next-generation-voters-are-more-liberal-more-inclusive-believe-government/&quot;}" data-offer-url="https://www.washingtonpost.com/politics/2019/01/17/next-generation-voters-are-more-liberal-more-inclusive-believe-government/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/politics/2019/01/17/next-generation-voters-are-more-liberal-more-inclusive-believe-government/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="287" instrument_node="">tend to be more liberal</span></a><span data-dcnode-id="285" instrument_node="">, but activists point out that their efforts have nothing to do with bringing in voters who are specifically blue, even if liberal states, like California, are currently seeing the most momentum build behind the issue. “The intention is to expand voter rights to more accurately reflect the needs of the populace,” Arianna says of her work in San Francisco, adding that she is a registered Independent. “If that happened to be a more progressive populous, so be it. If it happened to be more conservative, so be it as well. We're not trying to prevent either or.”</span></p><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Ella stresses a similar point: “We're just trying to make sure that we create a stable and a sustainable democracy.”</span></p><p data-dcnode-id="275"><strong data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Illustration credit:</span></strong><span data-dcnode-id="279" instrument_node=""> </span><a class="external-link" data-dcnode-id="276" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.instagram.com/ohrosewong/?hl=en&quot;}" data-offer-url="https://www.instagram.com/ohrosewong/?hl=en" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/ohrosewong/%3Fhl%3Den" rel="nofollow noopener" target="_blank"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Rose Wong</span></strong></a></p><p data-dcnode-id="262"><strong data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Want more from</span></strong><span data-dcnode-id="272" instrument_node=""> </span><em data-dcnode-id="269"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Teen Vogue</span></strong></em><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">? Check this out:</span></strong><span data-dcnode-id="266" instrument_node=""> </span><a data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/student-organizers-want-election-day-campus-holiday"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">These Student Organizers Want Election Day to Be a Campus Holiday</span></strong></a></p><p data-dcnode-id="248"><strong data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Stay up-to-date with the politics team.</span></strong><span data-dcnode-id="259" instrument_node=""> </span><a data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvo
