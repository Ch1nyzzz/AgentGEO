</span><h1 class="post-title" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">6 Pros and Cons of Lowering The Voting Age													
															</span></h1><span data-dcnode-id="1451" instrument_node="">
</span><article data-dcnode-id="690"><span data-dcnode-id="1450" instrument_node="">
</span><div class="st-format-standard-holder" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">
</span></div><span data-dcnode-id="1447" instrument_node="">
</span><div data-dcnode-id="693" id="article"><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">The 26th Amendment to the United States Constitution does not allow the federal government and the states to use age as a primary reason not to allow any American citizen aged 18. In 1971, the U.S. already lowered the voting age from 21 to 18 and the latter is also the age citizens in most countries vote. However, there are other countries in Europe where people as young as 16 are legal to vote. Today, the debate of lowering the voting age in the country from 18 to 16 has surfaced. As expected, this has become a divisive issue with supporters and critics being for and against it. Here are their views worth looking into:</span></p><span data-dcnode-id="1443" instrument_node="">
</span><h3 data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">List of Pros of Lowering the Voting Age</span></h3><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1435"><strong data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">1. Voice for the Younger Generation.</span></strong><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">
Supporters of this movement posit that students learn about politics and the government in schools and they are aware of the current events in the nation as well as government decisions. Letting young people vote at the age of 16 or 17 is a way to hear what the younger generation has to say. Moreover, giving these individuals an influential voice can lead to innovations in the government which can be in the best interest of the majority.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1429"><strong data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">2. Successful Elections.</span></strong><br data-dcnode-id="1431"><span data-dcnode-id="1430" instrument_node="">
Proponents of lowering the voting age claim that the expanded electorate coming from 16 and 17 year-old citizens will increase the number of voter turnout. Some adults are not interested to vote and there are those who do not practice this right. By allowing more people to vote, the lost votes from people who opt not to vote will be filled in by these younger voters. Moreover, the percentage gaps of results among nominated officials will widen and votes will be divided. In the end, this is beneficial to the people because choices will be filtered.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1423"><strong data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">3. Sense of Awareness.</span></strong><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">
Advocates for lowering the age to vote say that if people are given the right to vote at an early age such as 16, they will become more aware of what is happening in the country and will be more mature. This will also encourage them to participate more in politics and make wise decisions knowing that their votes matter.</span></p><span data-dcnode-id="1422" instrument_node="">

</span><h3 data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">List of Cons of Lowering the Voting Age</span></h3><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1067"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">1. Lack of Maturity.</span></strong><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
As opposed to what proponents say that lowering the voting age makes younger people mature, this move will not be good at all, according to critics, because 16-year olds might not be mature enough to vote and discern what is good and bad for the nation. Moreover, they are more interested in other activities such as growing up, socializing, video gaming and such. Additionally, if they are not allowed to consume alcohol in this age and parents are not confident in letting them drive or smoke, letting them vote is also not advisable.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1061"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">2. Lack of Information.</span></strong><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
Critics say that these are just teenagers who might not have enough experience in the world and lack the discernment to choose who the right leaders are. They may study a bit about the American history and the government but in general, they have not fully understood how politics work and might not be interested. Also, these students are just supposed to enjoy life and study without having to be dragged to issues about politics.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">3. Age Too Young.</span></strong><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">
People who oppose lowering the voting age say that major decisions like presidential elections should not burden the minds of young people aged 17 and below. This is because the proposed voting age is too low and these young minds might be easily convinced to vote for leaders based on the opinions of other people like their peers and the influential people in their lives.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Voting plays a significant role in a nation’s economy and the lives of the citizens of a country. Lowering the voting age might have its drawbacks but it also gives the younger generation a voice which makes weighing its pros and cons utterly important.</span></p><span data-dcnode-id="1051" instrument_node="">
