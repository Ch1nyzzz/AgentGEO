ma.org/CreativeWork"><div class="inside-article" data-dcnode-id="474"><p data-dcnode-id="672" style="font-size:13px"><span data-dcnode-id="673"><span data-dcnode-id="674"><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brandongaille.com/"><span data-dcnode-id="683" instrument_node="">Home</span></a><span data-dcnode-id="681" instrument_node=""> » </span><span data-dcnode-id="675"><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brandongaille.com/category/pros-and-cons/"><span data-dcnode-id="680" instrument_node="">Pros and Cons</span></a><span data-dcnode-id="678" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">15 Pros And Cons of Lowering The Voting Age</span></span></span></span></span></p><header class="entry-header" data-dcnode-id="654"><h1 class="entry-title" data-dcnode-id="670" itemprop="headline"><span data-dcnode-id="671" instrument_node="">15 Pros And Cons of Lowering The Voting Age</span></h1><div class="entry-meta" data-dcnode-id="655"><span data-dcnode-id="669" instrument_node=""> </span><span class="posted-on" data-dcnode-id="663"><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brandongaille.com/15-pros-and-cons-of-lowering-the-voting-age/" rel="bookmark" title="10:00 am"><time class="updated" data-dcnode-id="667" datetime="2018-05-15T17:57:51+00:00" itemprop="dateModified"><span data-dcnode-id="668" instrument_node="">May 15, 2018</span></time><time class="entry-date published" data-dcnode-id="665" datetime="2018-05-18T10:00:16+00:00" itemprop="datePublished"><span data-dcnode-id="666" instrument_node="">May 18, 2018</span></time></a></span><span data-dcnode-id="662" instrument_node=""> </span><span class="byline" data-dcnode-id="656"><span class="author vcard" data-dcnode-id="657" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="661" instrument_node="">by </span><a class="url fn n" data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brandongaille.com/author/webmaster/" itemprop="url" rel="author" title="View all posts by Brandon Gaille"><span class="author-name" data-dcnode-id="659" itemprop="name"><span data-dcnode-id="660" instrument_node="">Brandon Gaille</span></span></a></span></span></div></header><div class="entry-content" data-dcnode-id="494" itemprop="text"><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">In 1971, the 26th Amendment was officially ratified. The actions of the Amendment allowed the voting age to be reduced from 21 to 18. As certain municipalities and states debate the merits of having teens as young as 16 be able to vote, the pros and cons of lowering the voting age have become a nationwide debate in the United States.</span></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">The U.S. is not trying to set a precedent through the debate to lower the voting age. There are several countries which already allow voting at the age of 16, including Argentina, Austria, and Brazil.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Some communities in the United States already allow for younger teens to vote in local elections as well.</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">As we have seen in 2018 with the debates centered around gun laws and violence in U.S. schools, today’s teens are smart and savvy. To some, it makes sense to give them the right to vote. For others, the idea of teens as young as 16 voting is an idea that is potentially dangerous.</span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Here are the two sides of the debate to consider.</span></p><h3 data-dcnode-id="641"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">List of the Pros of Lowering the Voting Age</span></strong></h3><h4 data-dcnode-id="638"><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">1. Lowering the voting age would create more democracy.</span></strong></h4><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Democracy is defined by the ability of people to choose their representatives on their own. In a true democracy, each person would be given the opportunity to vote. In the U.S., that responsibility is delegated to the parents of a child without giving the parent an opportunity to vote on their behalf. Each qualifying adult receives just one vote. By shifting the voting age to 16 or 17, the results of each election would become a better representation of the majority of the population.</span></p><h4 data-dcnode-id="633"><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">2. It could improve voter turnout rates.</span></strong></h4><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Lowering the voting age could improve the voter turnout rates for U.S. elections as well. Young voter engagement has not been over 50% during an election since 1964 in the United States. In comparison, the voter engagement rates for adults 45-64 has rarely been below 70% since 1964. Historical trends have shown all voter engagement rates are decreasing. By lowering the voting age, the U.S. would be bringing in more people who would potentially be willing to cast a ballot.</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Parents also tend to vote more often when they want to set an example for their children. Spikes in parental voting involvement occur when their children reach a voting age. If the voting age is lowered, parents would still likely follow this trend.</span></p><h4 data-dcnode-id="626"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">3. The involvement of more people creates more innovation.</span></strong></h4><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">If you have 5 people in a room together, you have the potential for 5 different perspectives. Double that figure to 10 and you’ll double the number of perspectives that are available. That is the power of diversity. When people from different ages, socioeconomic backgrounds, cultures, and ethnicities come together, innovation happens. Ideas are merged together to create brand-new opportunities. Lowering the voting age would bring millions of new youthful perspectives into each election cycle.</span></p><h4 data-dcnode-id="621"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">4. Teens are already permitted to have some adult responsibilities.</span></strong></h4><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Teens are permitted to legally work in the United States at the age of 14, according to the Fair Labor Standards Act. In some jobs, such as farm work, delivering newspapers, umpiring, acting, or babysitting, kids under the age of 14 can have jobs too. If teens are permitted to hold a work permit so they can earn an income and pay taxes, then shouldn’t they also have the right to vote? In the U.S., the history of taxation without representation is a foundational component of the country.</span></p><h4 data-dcnode-id="616"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">5. Teens can be criminally charged as an adult already.</span></strong></h4><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">If a minor commits a serious offense in the United States, then the criminal justice system has the authority to charge a teen as an adult. That means, upon conviction, the teen would also be sentenced as an adult. Every state in the U.S. allows for some teens to be transferred to the adult courts. If a teen can spend life in prison if they commit enough serious offenses, the argument could be made that a teen should also have the right to vote and have a say in such a structure.</span></p><h4 data-dcnode-id="611"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">6. Teens make rational choices.</span></strong></h4><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Although teens tend to have trouble with elements of emotional regulation and impulse control, their ability to make logical, rational decisions is already developed. Their thinking process is similar to that of an adult during periods of calm. That means teens have the ability to weigh the pros and cons of each issue being discussed in an election and reason logically about what actions they should support.</span></p><h4 data-dcnode-id="606"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">7. It develops a habit of societal engagement.</span></strong></h4><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Many of the habits that people develop during the ages of 16 and 17 become a routine part of their adult life. Just 10% of a teen’s academic achievement can be directly associated with the quality of their home life. It is the experiences that teens choose that make it easier for them to develop healthy habits in the future. By encouraging voting at a younger age, the habit of being engaged with society forms earlier, creating a better chance that the teen voter will become a regular adult voter.</span></p><h3 data-dcnode-id="601"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">List of the Cons of Lowering the Voting Age</span></strong></h3><h4 data-dcnode-id="598"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">1. Lowering the voting age could lead to manipulated voting patterns.</span></strong></h4><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Children have a certain innocence about them when it comes to the world. Before the age of 8, most children believe that the information they see in an advertisement is an absolute fact. There is a complete trust in those around them. Even as children turn into teens and begin to explore who they are and want to be, there is a tendency to lean on the beliefs of their parents. By lowering the voting age, one would be duplicating many of the votes that parents are already casting.</span></p><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Youth are more likely to be swayed by populism than older voters. Because of the size of the voting bloc, a shift in the legal voting age would likely create a shift in the pitches that politicians make on the stump.</span></p><h4 data-dcnode-id="591"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">2. There are more risks taken by teens than older adults.</span></strong></h4><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">According to information compiled by the CDC from various sources, the smoking rate for high school students is as high as 24% when e-cigarettes are used. The adult smoking rate, in comparison, is just over 16%. From condom use to texting while driving, teens are much more likely to take risks than adults. That behavior could translate to the ballot box, which means a true majority vote may not be achieved.</span></p><h4 data-dcnode-id="586"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">3. Younger voters may not understand all the issues.</span></strong></h4><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Let’s take a look at the average school day for a high school student in the United States. They are going to be in school for about 7 hours, with the lunch hour included. They will spend 1-2 hours at an athletics practice. They’ll spend another 1-2 hours performing an extra-curricular activity, like studying a martial art. Then they’ll spend another 1-2 hours on their homework. On a busy day, that means 13 hours have already been used. That leaves many younger voters without enough time to fully understand critical issues in an election to form an informed opinion.</span></p><h4 data-dcnode-id="581"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">4. Voting is not required to be politically active.</span></strong></h4><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Teens are permitted to be politically active in several different ways in the United States already. Teens are permitted to form political action committees. They can organize political campaigns. Some can even work on political campaigns in certain jobs. Teens can be involved with a political club at their school. They can engage in civil politics through volunteer opportunities. Voting is just one way to have a voice heard. If teens aren’t politically engaged in these other opportunities, adding another one is not a guarantee that they will take advantage of it.</span></p><h4 data-dcnode-id="576"><strong data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">5. There are already laws in place that govern teen behavior.</span></strong></h4><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Voting isn’t the only action or behavior that specifically targets teens and youth. Unless a teen is legally emancipated, for example, they are generally not permitted to work a full-time job. Credit card lenders are not permitted to issue a line of credit to someone who is 16. Teens under the age of 18 are not allowed to participate on juries. In many instances, teens cannot even enter into a legal contract without their parents’ permission. That puts the voting restriction in-line with other areas that govern choices.</span></p><h4 data-dcnode-id="571"><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">6. It may be difficult for some teens to cast a ballot.</span></strong></h4><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">In the United States, there has been a push to raise the driving age to 18. If teens are allowed to vote, they would be required to walk to their polling center, take public transportation, or hitch a ride with friends or family. There are mail-in ballots, absentee ballots, and electronic ballots that could be cast in some jurisdictions to counter this issue somewhat, though the right to vote on election day would still need to be recognized. There would need to be infrastructure improvements made to accommodate the need to transport teens for voting purposes.</span></p><h4 data-dcnode-id="566"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">7. It would likely change elections.</span></strong></h4><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">As of 2016, Pew Research Center reports that 48% of voters identify or lean toward the Democratic party. 44% of voters identify or lean toward the Republican party. In the 18-35 age category, if forced to choose between the two parties, 57% say they identify or lean toward Democrats. It is only as people age that they begin to identify more with the Republican party. By allowing teens as young as 16 to vote, current data suggests that there would be 3 votes for Democrats for every 2 votes for Republicans, which could change the outcome of elections.</span></p><h4 data-dcnode-id="561"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">8. Lowering the voting age would likely change other areas of consent.</span></strong></h4><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">During the movement for ratification of the 26th Amendment, one of the slogans that was often repeated was, “Young enough to die, young enough to vote.” That is because 18-year-olds can be drafted into the U.S. military, so giving them the right to vote made sense to many at the time. If the voting age is lowered again, the age of consent would likely be lowered in other areas as well. That could mean the military draft age could be lowered, criminal responsibility ages would be lowered, and sexual contact consent could be lowered.</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The pros and cons of lowering the voting age offer several benefits and come with several risks. Could today’s teens take risks and vote in ways that are unpredictable or potentially dangerous? Sure, they could.</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Could today’s teens educate themselves about modern civil matters, current events, and social issues to cast meaningful votes in each election? Sure, they could.</span></p><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">The bottom line here is this: unless 16- or 17-year-olds are given the right to vote, the pros and cons debate, from a U.S. perspective, is only conjecture. It is a policy which has been successfully implemented in other areas of the world. That means it could be successfully implemented for Americans too.</span></p><div class="crp_related" data-dcnode-id="532"><h3 data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Related Posts:</span></h3><ul data-dcnode-id="534"><li data-dcnode-id="547"><a class="post-54737" data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brandongaille.com/21-pacific-trade-deal-pros-and-cons/"><span class="crp_title" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">21 Pacific Trade Deal Pros and Cons</span></span></a></li><li data-dcnode-id="543"><a class="post-56282" data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brandongaille.com/13-pros-and-cons-of-the-one-for-one-business-model/"><span class="crp_title" data-dcnode-id="545"><span data-
