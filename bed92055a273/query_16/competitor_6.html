7"><span data-dcnode-id="438" instrument_node="">Search</span></span></a></li></ul></div></div></nav><div class="hfeed site grid-container container grid-parent" data-dcnode-id="213" id="page"><div class="site-content" data-dcnode-id="214" id="content"><div class="content-area grid-parent mobile-grid-100 grid-70 tablet-grid-70" data-dcnode-id="261" id="primary"><main class="site-main" data-dcnode-id="262" id="main"><article class="post-1615 post type-post status-publish format-standard has-post-thumbnail hentry category-big-issues" data-dcnode-id="263" id="post-1615" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="264"><header class="entry-header" data-dcnode-id="413"><h1 class="entry-title" data-dcnode-id="429" itemprop="headline"><span data-dcnode-id="430" instrument_node="">14 Lowering The Voting Age to 16 Pros and Cons</span></h1><div class="entry-meta" data-dcnode-id="414"><span data-dcnode-id="428" instrument_node=""> </span><span class="posted-on" data-dcnode-id="422"><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/14-lowering-the-voting-age-to-16-pros-and-cons" rel="bookmark" title="10:00 am"><time class="updated" data-dcnode-id="426" datetime="2018-12-27T22:01:32+00:00" itemprop="dateModified"><span data-dcnode-id="427" instrument_node="">December 27, 2018</span></time><time class="entry-date published" data-dcnode-id="424" datetime="2018-12-29T10:00:37+00:00" itemprop="datePublished"><span data-dcnode-id="425" instrument_node="">December 29, 2018</span></time></a></span><span data-dcnode-id="421" instrument_node=""> </span><span class="byline" data-dcnode-id="415"><span class="author vcard" data-dcnode-id="416" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="420" instrument_node="">by </span><a class="url fn n" data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/author/vittanaadmin" itemprop="url" rel="author" title="View all posts by Louise Gaille"><span class="author-name" data-dcnode-id="418" itemprop="name"><span data-dcnode-id="419" instrument_node="">Louise Gaille</span></span></a></span></span></div></header><div class="entry-content" data-dcnode-id="284" itemprop="text"><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">The people permitted to vote in the United States (or in their own nation) are a population demographic continually evolving. Hardly more than a century ago, the primary voting block in many nations involved only white men who owned property. Now many countries allow everyone the right to vote when they reach a specific age.</span></p><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">The 26th Amendment was ratified by the states in the U.S. in 1971. This change to the Constitution shifted the legal voting age from 21 years old to just 18. Similar statutes are found in most countries which permit voting around the world.</span></p><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Now a new debate is gaining momentum: should the legal voting age be dropped to 16?</span></p><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">There are several pros and cons to lowering the voting age to 16. Do teens still in high school have the political savvy to vote intelligently? Would the votes of these teens be unduly influenced by their homes, teachers, or mentors?</span></p><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">These are the vital points to review.</span></p><h3 data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">List of the Pros of Lowering the Voting Age to 16</span></h3><p data-dcnode-id="396"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">1. It follows a pattern we already use in society.</span></strong><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node=""> If the voting age were lowered to 16, then most voters would be sophomores, juniors, or seniors in high school when voting in their first election. That isn’t much different than what happens when teens at 18 vote already, as most are either juniors or seniors in high school. Although the youth of any country may offer different priorities for the future than older voters, they will one day be in charge of the country. Voting helps them learn how the civic process works in society on a personal level.</span></p><p data-dcnode-id="391"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">2. It develops healthy civic habits in teens.</span></strong><br data-dcnode-id="393"><span data-dcnode-id="392" instrument_node=""> Younger children are influenced by their home environment when learning at school. For teens, it’s a different story. A majority of their academic achievements tie directly to the personal experiences they have in life. If we were to lower the voting age to 16, we would begin the creation of a healthy habit of civic responsibility at a time in life when they are most influenced by what happens to them.</span></p><p data-dcnode-id="386"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">3. It follows a pattern that the world has found to be successful already.</span></strong><br data-dcnode-id="388"><span data-dcnode-id="387" instrument_node=""> There are a cluster of suburbs around Washington, D.C. which have already lowered the voting age from 18 to 16, three of which are in Maryland: Greenbelt, Hyattsville, and Takoma Park. Teens at the age of 16 can vote in the school board elections in Berkeley, CA. Several states already allow 17-year-olds to vote in state and presidential primary elections if they will turn 18 before the general election.</span></p><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Several countries already allow voting at the age of 16 too. Austria, Argentina, Ecuador, Cuba, Brazil, Nicaragua, and three self-governing British Crown Dependencies all permit the lower voting age already. Teens at the age of 16 can vote in Bosnia, Serbia, and Montenegro if they have a job.</span></p><p data-dcnode-id="379"><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">4. It also follows a legal precedent set in the United States.</span></strong><br data-dcnode-id="381"><span data-dcnode-id="380" instrument_node=""> When a child commits certain crimes in the U.S., the law permits them to be charged as an adult. There are currently 13 states which do not have a minimum age at which a child can shift into adult court, allowing for the prosecution of eight-year-olds into the adult corrections system. We recognize in our child labor laws that kids under the age of 14 are impulsive and immature, without the same capability for moral judgment as older children.</span></p><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">States which have set a minimum age often have it somewhere between 10 to 13 years old. By lowering the voting age to 16, the U.S. would balance out its system of justice by offering those who could be charged as an adult the opportunity to have a say in how their social structures protect and help them.</span></p><p data-dcnode-id="372"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">5. It takes into account their contributions to society.</span></strong><br data-dcnode-id="374"><span data-dcnode-id="373" instrument_node=""> Teens can sometimes lack regulation of their emotional state as they continue developing. Impulse control is an issue for many youths. The same could be said for many adults too. There are plenty of 18-year-olds (and much older adults) who struggle with their decision-making skills also. That process doesn’t tend to regulate itself until around the age of 25 for many individuals. If turning 18 creates a “magic number” where these issues are no longer an issue, society can declare that 16 becomes that number in the future.</span></p><p data-dcnode-id="367"><strong data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">6. It allows teens to learn multiple layers of responsibility.</span></strong><br data-dcnode-id="369"><span data-dcnode-id="368" instrument_node=""> The standards for agricultural employment in the United States allow children under the age of 12 to work on farms outside of school hours with parental consent when the minimum wage requirements do not apply. Kids as young as 10 can hand-harvest crops outside of school hours between June-October each year if their employer holds a special waiver. Kids of any age can work on a farm owned or operated by their parents.</span></p><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">At the age of 16, teens may work in any farm job at any time. They can also work in most other employment venues outside of school hours (and sometimes even during school, depending on their situation). If they can hold a job and manage other life responsibilities as an adult, it makes sense to give them additional rights as an adult too.</span></p><p data-dcnode-id="360"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">7. It would offer new voices to the political debate.</span></strong><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node=""> Teens at the age of 16 have a unique experience to share with the rest of the world. Some hold jobs, most go to school full-time, and many have family responsibilities to share. They play sports, volunteer in their community, and contribute in many other ways. By adding their perspectives to the political debates, these young people could shift the structure of polarization that has crept into global politics. When you have more voices and ideas available to you as a society, then you have more access to innovation.</span></p><h3 data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">List of the Cons of Lowering the Voting Age to 16</span></h3><p data-dcnode-id="353"><strong data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">1. It might lower the voter turnout rates even further.</span></strong><br data-dcnode-id="355"><span data-dcnode-id="354" instrument_node=""> The last presidential election in the United States offered a voting population of over 120 million people. About 73 million votes were cast that year, creating a voter turnout rate of more than 60%. When the 1972 election came along, which was the first election that 18-year-olds could legally vote in, the participation rate fell by 5.6%. Although 4.6 million more votes were cast in that election, there were 20 million additional voters in the population which didn’t cast a ballot.</span></p><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">The same pattern could occur if 16-year-olds were given the right to vote. Younger voters typically turn out at much lower rates. In the 2012 election, for example, only 46% of Millennials voted, but 72% of the Greatest and Silent generations made it to the polls.</span></p><p data-dcnode-id="346"><strong data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">2. It could shift the patterns of voting in the country.</span></strong><br data-dcnode-id="348"><span data-dcnode-id="347" instrument_node=""> 10% of a teen’s decisions come from their home environment. Children at the age of 16 are still influenced by their parent’s behaviors, standards, and perspectives. Kids pattern their belief structures, from spirituality to politics, on the ideas they see and hear at home. That means the votes of these young teens would likely duplicate the ballots of their parents. Although that would be their right, it does cause one to question whether that would be an authentic vote or one that is manipulated.</span></p><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Imagine a liberal (or conservative) family learning that their teen voted for a different candidate. How would we as a society handle a parent potentially disciplining their dependent child because of a vote? Questions like these must be answered before approval of such a measure occurs.</span></p><p data-dcnode-id="339"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">3. It would encourage risky behavior.</span></strong><br data-dcnode-id="341"><span data-dcnode-id="340" instrument_node=""> Teens already take more risks than adults. They have higher smoking rates, higher texting while driving rates, and practice safe-sex less often. Teens at the age of 16 are going through physical changes, including brain development, which creates emotional instabilities that lead to rebellion. Giving them the right to vote in these circumstances could be helpful for some teens, but it may also be destructive for others. There will be teens who vote a specific way because they know it will spite their parents.</span></p><p data-dcnode-id="334"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">4. It may offer voting rights without a clear understanding.</span></strong><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node=""> Teens are more social today with online networks than ever before. They are exposed to more information with Internet access than any other generation before them. Having access to data is not the same as understanding it. With all the time pressures present on the average 16-year-old, from school to work to athletics and everything in-between, they may not have enough time to thoroughly study the critical issues up for debate in an election. Having them guess at who is a better candidate is not the same as understanding the issues through discussion.</span></p><p data-dcnode-id="329"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">5. It follows the same precedence as other age-related restrictions. </span></strong><br data-dcnode-id="331"><span data-dcnode-id="330" instrument_node=""> We do not ask 16-year-olds to sit on a jury in the United States. Some areas don’t permit kids below the age of 18 to drive. There are hour restrictions in place for many teens during the school year. Most teens cannot enter into legal agreements without parental permission. Most banks and lenders around the world do not issue financial products to teens until they reach 18 – and some wait until 21. Voting restrictions on 16-year-olds follow these same standards. We don’t permit specific responsibilities because we recognize that as a whole, the youth demographic is not ready to handle them.</span></p><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">There are always exceptions to the rule of maturity and age in teens, of course, which is why they’re already permitted to be politically active at 16. They can work on political campaigns, volunteer for candidates, and promote specific issues. Even without a vote, there are many 16-year-olds who influence elections.</span></p><p data-dcnode-id="322"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">6. It creates a logistics concern.</span></strong><br data-dcnode-id="324"><span data-dcnode-id="323" instrument_node=""> Giving teens the right to vote at 16 creates safety concerns for them and their parents. If it is their right to vote, then they must have access to a ballot box in some way. Rural families may not have a way to get their teen to their poll location. Urban families may struggle with the idea of sending their child on public transportation without supervision. Just because you receive a mail-in ballot doesn’t mean that’s how you must vote. The logistics of getting 16-year-olds to a voting station when their parents don’t have the means to make that happen creates a series of challenging questions which must be asked.</span></p><p data-dcnode-id="317"><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">7. It could change the outcome of elections.</span></strong><br data-dcnode-id="319"><span data-dcnode-id="318" instrument_node=""> The Supreme Court ruled in 1970 that Congress could lower the federal voting age, but it did not have the power to set the voting age for local or state elections. That’s why the 26th Amendment was proposed in the first place. The Amendment was ratified in just four months, which was the shortest period of any in history. By giving 18-year-olds the right to vote, it shifted the views of society and arguably changed many elections at the local level because of a shift in demographics. Lowering the voting age to 16 would do the same.</span></p><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">These lowering the voting age to 16 pros and cons must balance the rights of the individual with the needs of each nation. Those who have lowered the voting age have found much success with its results. The U.S. would likely experience the same outcome, despite the risks involved.</span></p><div class="dpsp-content-wrapper dpsp-shape-rounded dpsp-column-3 dpsp-has-spacing dpsp-show-on-mobile dpsp-button-style-1 dpsp-has-icon-background dpsp-has-button-background" data-dcnode-id="295" id="dpsp-content-bottom"><ul class="dpsp-networks-btns-wrapper dpsp-networks-btns-content dpsp-has-button-icon-animation" data-dcnode-id="296"><li data-dcnode-id="309"><a class="dpsp-network-btn dpsp-facebook dpsp-first" data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fvittana.org%252F14-lowering-the-voting-age-to-16-pros-and-cons%26t%3D14%2520Lowering%2520The%2520Voting%2520Age%2520to%252016%2520Pros%2520and%2520Cons" rel="nofollow" title="Share on Facebook"><span class="dpsp-network-icon" data-dcnode-id="314"></span><span
