</span><article class="topic-content content mt-20" data-dcnode-id="619"><figure class="md-assembly md-feature-assembly print-false" data-dcnode-id="825"><div class="md-assembly-wrapper card-media" data-dcnode-id="829" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link" data-dcnode-id="830" data-href="*" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/92/229892-050-EF76F573/Neon-sign-BAR-alcohol-consumption.jpg" style=""><img alt="Neon sign of the word BAR hanging in a bar that serves alcoholic drinks. Alcohol drinking" data-dcnode-id="831" data-height="1182" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/92/229892-050-EF76F573/Neon-sign-BAR-alcohol-consumption.jpg%3Fq%3D60&amp;raw"></a></div><figcaption class="" data-dcnode-id="826"><cite class="credit d-block mt-5" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">© VTT Studio/stock.adobe.com</span></cite></figcaption></figure><span data-dcnode-id="824" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="822"></p><span class="AM1 am-inline" data-dcnode-id="819"></span><span class="MOD1" data-dcnode-id="817"></span><span data-dcnode-id="816" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="808"><strong data-dcnode-id="809"><em data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">To access extended pro and con arguments, sources, and discussion questions about whether the drinking age should be lowered in the United States, go to </span><a class="external" data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/" rel="noopener" target="_blank"><span data-dcnode-id="813" instrument_node="">ProCon.org</span></a><span data-dcnode-id="811" instrument_node="">.</span></em></strong></p><span class="AM2 am-inline" data-dcnode-id="805"></span><span class="MOD2" data-dcnode-id="803"></span><span data-dcnode-id="802" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">All 50 US states have set their minimum&nbsp;drinking age&nbsp;to 21 although exceptions do exist on a state-by-state basis for consumption at home, under adult supervision, for medical necessity, and other reasons.</span></p><span class="AM3 am-inline" data-dcnode-id="796"></span><span class="MOD3" data-dcnode-id="794"></span><span data-dcnode-id="793" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">The repeal of alcohol&nbsp;prohibition&nbsp;by the&nbsp;21st Amendment&nbsp;on Dec. 5, 1933 allowed each state to set its own alcohol consumption laws.&nbsp;At that time, most states established the </span><a class="external" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/alcohol/fact-sheets/minimum-legal-drinking-age.htm%23%3A~%3Atext%3DMinimum%2520Legal%2520Drinking%2520Age%2520%28MLDA%29%2520laws%2520specify%2520the%2520legal%2520age%2Cvaried%2520from%2520state%2520to%2520state." rel="noopener" target="_blank"><span data-dcnode-id="790" instrument_node="">MLDA</span></a><span data-dcnode-id="788" instrument_node=""> for alcohol at 21 years of age, although two states set an MLDA of 21 for men and 18 for women: Illinois (1933-1961) and Oklahoma (1933-1976). The 1976 US Supreme Court case&nbsp;Craig v. Boren&nbsp;ruled 7-2 that this age difference violated the Equal Protection Clause of the&nbsp;14th Amendment. Following the July 1, 1971 passage of the&nbsp;26th Amendment, which lowered the legal voting age from 21 to 18 years of age, 30 US states lowered their MLDA to 18, 19, or 20; by 1982, only 14 states still had an MLDA of 21</span></p><span class="AM4 am-inline" data-dcnode-id="784"></span><span class="MOD4" data-dcnode-id="782"></span><span data-dcnode-id="781" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">Reports in the 1970’s showing that teenage car accidents increased in states where the MLDA had been lowered from 21 prompted </span><a class="external" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/content/pkg/USCODE-2011-title23/pdf/USCODE-2011-title23-chap1-toc.pdf" rel="noopener" target="_blank"><span data-dcnode-id="778" instrument_node="">Congress</span></a><span data-dcnode-id="776" instrument_node=""> to pass the National Minimum Drinking Age Act of 1984.</span></p><span class="AM5 am-inline" data-dcnode-id="772"></span><span class="MOD5" data-dcnode-id="770"></span><span data-dcnode-id="769" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Although the&nbsp;Act&nbsp;did not require a national MLDA of 21, it effectively mandated it by stipulating that some federal transportation funds would be withheld from states that failed to make 21 their minimum age for purchasing and publicly possessing alcohol.&nbsp;Since 1984, all states that had previously lowered their MLDA from 21 have all raised their MLDA back to 21. South Dakota and Wyoming were the last states to do so in 1988.</span></p><span class="AM6 am-inline" data-dcnode-id="763"></span><span class="MOD6" data-dcnode-id="761"></span><span data-dcnode-id="760" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">While the MLDA is 21 in all 50 states, in 47 of 50 states age 18 is the “age of majority,” which entails having the rights and responsibilities of adulthood.&nbsp;Every state sets its own age of majority that often corresponds with the age at which one can vote, join the military, serve in jury duty, sign contracts, marry, apply for loans, make decisions regarding medical treatments, and be prosecuted as an adult. Alabama (age 19), Mississippi (21), and Nebraska (age 19) are three states that have an “age of majority” above 18, although certain rights such as the right to vote remain at 18 in these states.</span></p><span class="AM7 am-inline" data-dcnode-id="754"></span><span class="MOD7" data-dcnode-id="752"></span><span data-dcnode-id="751" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">136 college and university presidents have signed a pledge stating that the drinking age of 21 is “not working,” citing binge drinking, fake IDs, and the fact that adults age 18-20 are able to vote, serve on juries, and enlist in the military.&nbsp;According to the&nbsp;World Health Organization&nbsp;(WHO), three million deaths annually (5.3% of all deaths) result from the harmful use of alcohol. WHO also reports that 13.5% of all deaths among people ages 20-39 are attributable to alcohol.</span></p><span class="AM8 am-inline" data-dcnode-id="745"></span><span class="MOD8" data-dcnode-id="743"></span><span data-dcnode-id="742" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">The discrepancy between the MLDA and the age of majority–and its many responsibilities and authorities–along with continued incidents of alcohol abuse reported on college campuses have fueled debate on whether or not setting the MLDA at 21 is fair, smart, and effective.</span></p><span class="AM9 am-inline" data-dcnode-id="736"></span><span class="MOD9" data-dcnode-id="734"></span><span data-dcnode-id="733" instrument_node=""> </span><h2 data-dcnode-id="730"><a class="external" data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/" rel="noopener" target="_blank"><span data-dcnode-id="732" instrument_node="">PRO</span></a></h2><span data-dcnode-id="729" instrument_node=""> </span><ul data-dcnode-id="688"><span data-dcnode-id="728" instrument_node=""> </span><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">18 is the age of adulthood in the United States, and adults should have the right to make their own decisions about alcohol consumption.</span></li><span data-dcnode-id="725" instrument_node=""> </span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Allowing 18- to 20-year-olds to drink alcohol in regulated environments with supervision would decrease unsafe drinking activity.</span></li><span data-dcnode-id="722" instrument_node=""> </span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">There are fewer drunk driving traffic accidents and fatalities in many countries with MLDA of 18.</span></li><span data-dcnode-id="719" instrument_node=""> </span><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The decrease in drunk driving fatalities as a percentage of total traffic fatalities in the United States does not correlate to the MLDA.</span></li><span data-dcnode-id="716" instrument_node=""> </span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Lowering MLDA from 21 to 18 would diminish the thrill of breaking the law to get a drink.</span></li><span data-dcnode-id="713" instrument_node=""> </span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">MLDA 21 is largely ineffective because teens consume regardless.</span></li><span data-dcnode-id="710" instrument_node=""> </span><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">High non-compliance with MLDA 21 promotes general disrespect and non-compliance with other areas of US law.</span></li><span data-dcnode-id="707" instrument_node=""> </span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">MLDA 21 enforcement is not a priority for many law enforcement agencies.</span></li><span data-dcnode-id="704" instrument_node=""> </span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">MLDA 21 is not statistically associated with lower rates of suicide, homicide, or vandalism.</span></li><span data-dcnode-id="701" instrument_node=""> </span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Drinking alcohol is an enjoyable activity.</span></li><span data-dcnode-id="698" instrument_node=""> </span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Lowering MLDA 21 would reduce the number of underage people who are hurt from alcohol-related injuries or accidents due to fear of legal consequences if they sought medical attention.</span></li><span data-dcnode-id="695" instrument_node=""> </span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">State governments should have the right to establish a lower legal drinking age that reflects their unique demographics, legal context, and history.</span></li><span data-dcnode-id="692" instrument_node=""> </span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Lowering MLDA 21 would be good for the economy.</span></li><span data-dcnode-id="689" instrument_node=""> </span></ul><span data-dcnode-id="687" instrument_node=""> </span><h2 data-dcnode-id="684"><a class="external" data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/" rel="noopener" target="_blank"><span data-dcnode-id="686" instrument_node="">CON</span></a></h2><span data-dcnode-id="683" instrument_node=""> </span><ul data-dcnode-id="642"><span data-dcnode-id="682" instrument_node=""> </span><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Lowering MLDA 21 would be medically irresponsible. </span></li><span data-dcnode-id="679" instrument_node=""> </span><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Lowering MLDA 21 to 18 will irresponsibly allow a greater segment of the population to drink alcohol in bars and nightclubs, which are not safe environments.</span></li><span data-dcnode-id="676" instrument_node=""> </span><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">The right to drink should have a higher age of initiation because of the dangers posed by drinking.</span></li><span data-dcnode-id="673" instrument_node=""> </span><li data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">MLDA 21 reduces traffic accidents and fatalities.</span></li><span data-dcnode-id="670" instrument_node=""> </span><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">MLDA 21 reduces alcohol consumption and the number of underage drinkers.</span></li><span data-dcnode-id="667" instrument_node=""> </span><li data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">MLDA 21 should not be lowered to mirror European drinking age limits because the rate of drinking among US teenagers is lower than most European countries.</span></li><span data-dcnode-id="664" instrument_node=""> </span><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">MLDA 18 is not a right.</span></li><span data-dcnode-id="661" instrument_node=""> </span><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">The American public overwhelmingly supports MLDA 21.</span></li><span data-dcnode-id="658" instrument_node=""> </span><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Lowering MLDA 21 would give high schoolers and even middle schoolers easier access to alcohol.</span></li><span data-dcnode-id="655" instrument_node=""> </span><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">MLDA 21 helps prevent underage binge drinking.</span></li><span data-dcnode-id="652" instrument_node=""> </span><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">MLDA 21 exerts valuable social pressure on potential underage drinkers and those who may serve them.</span></li><span data-dcnode-id="649" instrument_node=""> </span><li data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">The MLDA should stay at 21 because people tend to be more mature and responsible at 21 than 18.</span></li><span data-dcnode-id="646" instrument_node=""> </span><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Lowering the drinking age will invite more use of illicit drugs among 18-21 year olds.</span></li><span data-dcnode-id="643" instrument_node=""> </span></ul><span data-dcnode-id="641" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="639"></p><span class="AM10 am-inline" data-dcnode-id="636"></span><span class="MOD10" data-dcnode-id="634"></span><span data-dcnode-id="633" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="626"><em data-dcnode-id="627"><span data-dcnode-id="631" instrument_node="">This article was published on April 2, 2019, at Britannica’s </span><a class="external" data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.procon.org/" rel="noopener" target="_blank"><span data-dcnode-id="630" instrument_node="">ProCon.org</span></a><span data-dcnode-id="628" instrument_node="">, a nonpartisan issue-information source.</span></em></p><span class="AM11 am-inline" data-dcnode-id="623"></span><span class="MOD11" data-dcnode-id="621"></span><span data-dcnode-id="620" instrument_node=""> </span></article><span data-dcnode-id="618" instrument_node="">

</span><h1 data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Pro and Con: Churches and Taxes</span></h1><span data-dcnode-id="474" instrument_node="">
</span><div class="my-20 qa-action-buttons" data-dcnode-id="466"><span data-dcnode-id="473" instrument_node="">

</span><article class="topic-content content mt-20" data-dcnode-id="249"><figure class="md-assembly md-feature-assembly print-false" data-dcnode-id="458"><div class="md-assembly-wrapper card-media" data-dcnode-id="462" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link" data-dcnode-id="463" data-href="*" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/05/228405-131-07C0139F/pro-con-artwork.jpg" style=""><img alt="Artwork for themes for Pro-Con articles." data-dcnode-id="464" data-height="675" data-width="900" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/05/228405-131-07C0139F/pro-con-artwork.jpg%3Fq%3D60&amp;raw"></a></div><figcaption class="" data-dcnode-id="459"><cite class="credit d-block mt-5" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Encyclopædia Britannica, Inc.</span></cite></figcaption></figure><span data-dcnode-id="457" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="455"></p><span class="AM1 am-inline" data-dcnode-id="452"></span><span class="MOD1" data-dcnode-id="450"></span><span data-dcnode-id="449" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="441"><strong data-dcnode-id="442"><em data-dcnode-id="443"><span data-dcnode-id="447" instrument_node="">To access extended pro and con arguments, sources, and discussion questions about whether churches should remain tax-exempt, go to </span><a class="external" data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//churchesandtaxes.procon.org/" rel="noopener" target="_blank"><span data-dcnode-id="446" instrument_node="">ProCon.org</span></a><span data-dcnode-id="444" instrument_node="">.</span></em></strong></p><span class="AM2 am-inline" data-dcnode-id="438"></span><span class="MOD2" data-dcnode-id="436"></span><span data-dcnode-id="435" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="429"><span data-dcnode-id="433" instrument_node="">US&nbsp;churches received an official federal income tax exemption in 1894, and they have been unofficially tax-exempt since the country’s founding. All 50 US states and the District of Columbia exempt churches from paying property tax. </span><a class="external" data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2006/10/11/business/11religious.html" rel="noopener" target="_blank"><span data-dcnode-id="432" instrument_node="">Donations</span></a><span data-dcnode-id="430" instrument_node=""> to churches are tax-deductible. The debate continues over whether or not these tax benefits should be retained.</span></p><span class="AM3 am-inline" data-dcnode-id="426"></span><span class="MOD3" data-dcnode-id="424"></span><span data-dcnode-id="423" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="417"><span data-dcnode-id="421" instrument_node="">The </span><a class="external" data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/p1828.pdf" rel="noopener" target="_blank"><span data-dcnode-id="420" instrument_node="">IRS Tax Guide for Churches and Religious Organizations</span></a><span data-dcnode-id="418" instrument_node="">&nbsp;uses the term church “in its generic sense as a place of worship including, for example,&nbsp;mosques&nbsp;and&nbsp;synagogues.”&nbsp;</span></p><span class="AM4 am-inline" data-dcnode-id="414"></span><span class="MOD4" data-dcnode-id="412"></span><span data-dcnode-id="411" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="405"><span data-dcnode-id="409" instrument_node="">The tax exemption for churches can be traced back to the </span><a class="external" data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/history/ancient/romans/" rel="noopener" target="_blank"><span data-dcnode-id="408" instrument_node="">Roman Empire</span></a><span data-dcnode-id="406" instrument_node="">, when&nbsp;Constantine, Emperor of Rome from 306-337, granted the Christian church a complete exemption from all forms of taxation following his supposed conversion to Christianity circa 312.&nbsp;Church property used for religious purposes was also tax-exempt in medieval England, based on the rationale that the church relieved the state of some governmental functions, and therefore deserved a benefit in return.&nbsp;The English Statute of Charitable Uses of 1601, which included churches along with all other charitable institutions, formed the basis of America’s modern tax exemption for charities.</span></p><span class="AM5 am-inline" data-dcnode-id="402"></span><span class="MOD5" data-dcnode-id="400"></span><span data-dcnode-id="399" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">By the time of the&nbsp;American Revolution, nine of the 13 original colonies were giving some kind of tax relief to churches.</span></p><span class="AM6 am-inline" data-dcnode-id="393"></span><span class="MOD6" data-dcnode-id="391"></span><span data-dcnode-id="390" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="384"><span data-dcnode-id="388" instrument_node="">During the </span><a class="external" data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1894/03/12/archives/church-property-should-be-taxed-and-the-rev-madison-c-peters-would.html" rel="noopener" target="_blank"><span data-dcnode-id="387" instrument_node="">19th Century</span></a><span data-dcnode-id="385" instrument_node="">, opposition to churches retaining property tax exemptions was expressed by at least three US presidents:&nbsp;James Madison,&nbsp;James Garfield, and&nbsp;Ulysses S. Grant.</span></p><span class="AM7 am-inline" data-dcnode-id="381"></span><span class="MOD7" data-dcnode-id="379"></span><span data-dcnode-id="378" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="372"><span data-dcnode-id="376" instrument_node="">US churches’ federal income tax exemption was not formerly enacted as </span><a class="external" data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//paperzz.com/doc/9228652/a-bright-line-points-toward-legal-compromise" rel="noopener" target="_blank"><span data-dcnode-id="375" instrument_node="">legislation</span></a><span data-dcnode-id="373" instrument_node=""> until the Tariff Act was passed by Congress in 1894, providing tax exemptions to “corporations, companies, or associations organized and conducted solely for charitable, religious, or educational purposes.” This was the first time the federal government declared any group exempt from paying taxes, as opposed to its earlier practice of only listing entities subject to taxation.&nbsp;Although the Tariff Act was declared unconstitutional in 1896, the church tax exemption was reinstated by the Revenue Act of 1913, which defined the modern American income tax system. On Jan. 14, 1924, the&nbsp;US Supreme Court&nbsp;interpreted the reason for the exemption in&nbsp;Trinidad v. Sagrada Orden: “Evidently the exemption is made in recognition of the benefit which the public derives” from churches’ “corporate activities.”</span></p><span class="AM8 am-inline" data-dcnode-id="369"></span><span class="MOD8" data-dcnode-id="367"></span><span data-dcnode-id="366" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">The US&nbsp;Internal Revenue Service&nbsp;(IRS) classifies churches as 501(c)(3) nonprofit charitable organizations, which are exempt from federal income tax and are able to accept tax-deductible donations.&nbsp;Unlike secular charities, however, churches are automatically considered to be&nbsp;501(c)(3) organizations, and, while they may do so voluntarily, they are not required by law to submit an application for exemption or pay the application fee (up to $850 as of Oct. 24, 2011.&nbsp;</span></p><span class="AM9 am-inline" data-dcnode-id="360"></span><span class="MOD9" data-dcnode-id="358"></span><span data-dcnode-id="357" instrument_node=""> </span><h2 data-dcnode-id="354"><a class="external" data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//churchesandtaxes.procon.org/" rel="noopener" target="_blank"><span data-dcnode-id="356" instrument_node="">PRO</span></a></h2><span data-dcnode-id="353" instrument_node=""> </span><ul data-dcnode-id="315"><span data-dcnode-id="352" instrument_node=""> </span><li data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Exempting churches from taxation upholds the separation of church and state embodied by the Establishment Clause of the First Amendment of the US Constitution.</span></li><span data-dcnode-id="349" instrument_node=""> </span><li data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Requiring churches to pay taxes would endanger the free expression of religion and violate the Free Exercise Clause of the First Amendment of the US Constitution.</span></li><span data-dcnode-id="346" instrument_node=""> </span><li data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Churches earn their tax exemption by contributing to the public good.</span></li><span data-dcnode-id="343" instrument_node=""> </span><li data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Taxing churches would place government above religion.</span></li><span data-dcnode-id="340" instrument_node=""> </span><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">A tax exemption for churches is not a subsidy to religion, and is therefore constitutional.</span></li><span data-dcnode-id="337" instrument_node=""> </span><li data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Poor and disadvantaged people relying on assistance from their local churches would suffer if churches were to lose their tax-exempt status.</span></li><span data-dcnode-id="334" instrument_node=""> </span><li data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">US churches have been tax-exempt for over 200 years, yet there are no signs that America has become a theocracy.</span></li><span data-dcnode-id="331" instrument_node=""> </span><li data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Taxing churches when their members receive no monetary gain would amount to double taxation.</span></li><span data-dcnode-id="328" instrument_node=""> </span><li data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">The only constitutionally valid way of taxing churches would be to tax all nonprofits, which would place undue financial pressure on the 960,000 public charities that aid and enrich US society.</span></li><span data-dcnode-id="325" instrument_node=""> </span><li data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Small churches, already struggling to survive, would be further endangered by a new tax burden.</span></li><span data-dcnode-id="322" instrument_node=""> </span><li data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">The vast majority of churches refrain from political campaigning and should not be punished for the actions of the few that are political.</span></li><span data-dcnode-id="319" instrument_node=""> </span><li data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Withdrawing the “parsonage exemption” on ministers’ housing would cost American clergy members $2.3 billion over five years, which would be a major blow to modestly paid men and women who dedicate their lives to helping people in need.</span></li><span data-dcnode-id="316" instrument_node=""> </span></ul><span data-dcnode-id="314" instrument_node=""> </span><h2 data-dcnode-id="311"><a class="external" data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//churchesandtaxes.procon.org/" rel="noopener" target="_blank"><span data-dcnode-id="313" instrument_node="">CON</span></a></h2><span data-dcnode-id="310" instrument_node=""> </span><ul data-dcnode-id="272"><span data-dcnode-id="309" instrument_node=""> </span><li data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Tax exemptions for churches violate the separation of church and state enshrined in the Establishment Clause of the First Amendment of the US Constitution.</span></li><span data-dcnode-id="306" instrument_node=""> </span><li data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">A tax exemption is a privilege, not a right.</span></li><span data-dcnode-id="303" instrument_node=""> </span><li data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Churches receive special treatment from the IRS beyond what other nonprofits receive, and such favoritism is unconstitutional.</span></li><span data-dcnode-id="300" instrument_node=""> </span><li data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">A tax break for churches forces all American taxpayers to support religion, even if they oppose some or all religious doctrines.</span></li><span data-dcnode-id="297" instrument_node=""> </span><li data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">A tax exemption is a form of subsidy, and the Constitution bars government from subsidizing religion.</span></li><span data-dcnode-id="294" instrument_node=""> </span><li data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">The tax code makes no distinction between authentic religions and fraudulent startup “faiths,” which benefit at taxpayers’ expense.</span></li><span data-dcnode-id="291" instrument_node=""> </span><li data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Churches serve a religious purpose that does not aid the government, so their tax exemptions are not justified.</span></li><span data-dcnode-id="288" instrument_node=""> </span><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Exempting churches from taxation costs the government billions of dollars in lost revenue, which it cannot afford, especially in tough economic times.</span></li><span data-dcnode-id="285" instrument_node=""> </span><li data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Despite the 1954 law banning political campaigning by tax-exempt groups, many churches are clearly political and therefore should not be receiving tax exemptions.</span></li><span data-dcnode-id="282" instrument_node=""> </span><li data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">American taxpayers are supporting the extravagant lifestyles of wealthy pastors, whose lavish “megachurches” accumulate millions of tax-free dollars every year.</span></li><span data-dcnode-id="279" instrument_node=""> </span><li data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">The tax break given to churches restricts their freedom of speech because it deters pastors from speaking out for or against political candidates.</span></li><span data-dcnode-id="276" instrument_node=""> </span><li data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">The “parsonage exemption” on ministers’ homes makes already-wealthy pastors even richer at taxpayers’ expense.</span></li><span data-dcnode-id="273" instrument_node=""> </span></ul><span data-dcnode-id="271" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="269"></p><span class="AM10 am-inline" data-dcnode-id="266"></span><span class="MOD10" data-dcnode-id="264"></span><span data-dcnode-id="263" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="256"><em data-dcnode-id="257"><span data-dcnode-id="261" instrument_node="">This article was published on August 8, 2019, at Britannica’s </span><a class="external" data-dcnode-id="259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.procon.org/" rel="noopener" target="_blank"><span data-dcnode-id="260" instrument_node="">ProCon.org</span></a><span data-dcnode-id="258" instrument_node="">, a nonpartisan issue-information source.</span></em></p><span class="AM11 am-inline" data-dcnode-id="253"></span><span class="MOD11" data-dcnode-id="251"></span><span data-dcnode-id="250" instrument_node=""> </span></article><span data-dcnode-id="248" instrument_node="">
