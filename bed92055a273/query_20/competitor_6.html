</span><column1content data-dcnode-id="369"><span data-dcnode-id="497" instrument_node="">
</span><h2 data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">&nbsp;Meet the 2021 - 2022 Management Assistants</span></h2><span data-dcnode-id="494" instrument_node="">
</span><hr data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">
</span><h4 data-dcnode-id="489"><br data-dcnode-id="491"><span data-dcnode-id="490" instrument_node="">Aneyssa Romo</span></h4><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="484"><a data-dcnode-id="485" href="mailto:Aneyssa.Romo@longbeach.gov" title="Aneyssa.Romo@longbeach.gov"><span data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Aneyssa.Romo@longbeach.gov</span></span></a></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Aneyssa Romo is a current 2021-2022 Management Assistant rotating through Technology and Innovation, the Office of Equity, Health and Human Services, and Financial Management.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Aneyssa earned her Master of Public Administration (Urban Management) from Arizona State University (ASU). As an ASU Marvin Andrews fellow, Aneyssa worked with the City of Avondale, AZ to build nonprofit relationships in their newly built community resource center, assisted with the City’s first internal audit, and created recommendations for the City’s Public Art Masterplan with a focus on highlighting local artists and cultures. During graduate school, Aneyssa also served as a Management Assistant with the Alliance for Innovation, providing city and county governments with best practice research on innovative local government solutions.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Aneyssa’s passion for public service was sparked by her participation in the City of Tolleson Teen Council, a program that allows youth to create community solutions to issues they face in the City, such as access to higher education and availability of healthy food options. From this experience, Aneyssa was inspired to continue learning about public service and how to advocate for vulnerable communities though her roles as a Congressional Hispanic Caucus Institute Intern, ASU Educational Outreach Specialist, and an Arizona State Senate Democratic Caucus Intern. She earned her B.S. in Public Service and Public Policy from ASU.&nbsp;</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Aneyssa was born and raised in the West Valley of Phoenix, AZ, and currently lives in Long Beach, where she enjoys finding taco trucks, taking walks in her neighborhood, and the cooler weather.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="468"><span class="TextRun SCXW32708962 BCX0" data-contrast="auto" data-dcnode-id="469" lang="EN-US"><span data-dcnode-id="470" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="467" instrument_node="">
</span><hr data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">
</span><h4 data-dcnode-id="462"><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">DeMario Johnson</span></h4><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="458"><a data-dcnode-id="459" href="mailto:DeMario.Johnson@longbeach.gov"><span data-dcnode-id="460" instrument_node="">DeMario.Johnson@longbeach.gov</span></a></p><span data-dcnode-id="457" instrument_node="">
</span><div class="OutlineElement Ltr SCXW71267987 BCX0" data-dcnode-id="440"><span data-dcnode-id="456" instrument_node="">
</span><p class="xmsonormal" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">DeMario Johnson is a current 2021-2022 Management Assistant, rotating through the Department of Health and Human Services, Development Services, Financial Management, and the City Manager’s office.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p class="xmsonormal" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">DeMario graduated from Grand Valley State University, receiving his Master of Public Administration with a concentration on local government. During his graduate school tenure, he had the privilege of being a graduate assistant in the Office of Sustainability Practices. DeMario also served as the ICMA Graduate Student Chapter President. Prior to becoming a Management Assistant, he was the Assistant to the Manager in The Village of Spring Lake, Michigan, where he gained valuable experience in Community Development and Financial Management.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p class="xmsonormal" data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Public Service has always been entrenched in his heart. From a child, he’s always been a giver and into adulthood, he’s continued the course. Whether as a volunteer for a nonprofit or speaking to adolescents in the form of mentor, Public Servant, is a title that he holds dearly.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p class="xmsonormal" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">DeMario was raised in Michigan and enjoys all things fitness, food, and traveling.&nbsp;</span></p><span data-dcnode-id="444" instrument_node="">
</span><p class="Paragraph SCXW71267987 BCX0" data-dcnode-id="442" paraeid="{08b81458-3c75-48dc-a24b-0c5328e56c3e}{102}" paraid="663126221"><span data-dcnode-id="443" instrument_node="">&nbsp;</span></p><span data-dcnode-id="441" instrument_node="">
</span></div><span data-dcnode-id="439" instrument_node="">
</span><hr data-dcnode-id="438"><span data-dcnode-id="437" instrument_node="">
</span><h4 data-dcnode-id="433"><span data-dcnode-id="434"><br data-dcnode-id="436"><span data-dcnode-id="435" instrument_node="">Mary Daou</span></span></h4><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="428"><a data-dcnode-id="429" href="mailto:Mary.Daou@longbeach.gov" title="Mary.Daou@longbeach.gov"><span data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Mary.Daou@longbeach.gov</span></span></a></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="426" instrument_node="">Mary Daou is a current 2021-2022 Management Assistant, rotating through the Office of Cannabis Oversight and the Recovery Office, Business License and Budget, the Airport, and the Library.</span><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">Mary obtained her Master of Public Policy with an emphasis in management from the UCLA Luskin School of Public Affairs. As a generalist, she focused her studies on issue areas that plague large metropolitan cities, taking courses like Real Estate Transactions at UCLA Law and Today’s Los Angeles with Zev Yaroslavsky.</span><br data-dcnode-id="423"><br data-dcnode-id="422"><span data-dcnode-id="421" instrument_node="">Prior to attending graduate school, Mary worked for the Riverside City Manager’s Office, supporting policy initiatives ranging from the Arts and Culture Grant Program to Housing First. Her professional experience also includes a Fellowship with the US Conference of Mayors in Washington, D.C. where she assisted with the annual convening of hundreds of mayors from across the nation and specialized in developing cultural project proposals for the commemoration of the Centennial of Women’s Suffrage. While at UCLA, Mary project managed a study for the City and County of Honolulu, developing a housing policy that has been passed by the City Council and will potentially serve as a vacancy tax model for the State.</span><br data-dcnode-id="420"><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">Mary earned her B.A. in Political Science and in Studio Art with a minor in Arabic from the University of California, Riverside and a Certificate in Social Sciences and Humanities from Sciences Po, Paris. As a Los Angeles native, she balances her local government work with an art practice in which she enjoys giving lessons, painting residential murals, and fundraising for international humanitarian crises. In her free time, Mary loves reading, rock climbing, dancing, and spending time with family.</span><br data-dcnode-id="417"><br data-dcnode-id="416"></p><span data-dcnode-id="414" instrument_node="">
</span><hr data-dcnode-id="413"><span data-dcnode-id="412" instrument_node="">
</span><h4 data-dcnode-id="409"><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node="">Carline Hua</span></h4><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="404"><a data-dcnode-id="405" href="mailto:Carline.Hua@longbeach.gov"><span data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Carline.Hua@longbeach.gov</span></span></a></p><span data-dcnode-id="403" instrument_node="">
</span><p class="Paragraph SCXW247456630 BCX0" data-dcnode-id="394" paraeid="{08b81458-3c75-48dc-a24b-0c5328e56c3e}{213}" paraid="1060224261"><span class="TextRun SCXW247456630 BCX0" data-contrast="auto" data-dcnode-id="401" lang="EN-US"><span data-dcnode-id="402" instrument_node="">Carline Hua&nbsp;</span></span><span class="TextRun SCXW247456630 BCX0" data-contrast="auto" data-dcnode-id="399" lang="EN-US"><span data-dcnode-id="400" instrument_node="">is&nbsp;</span></span><span class="TextRun SCXW247456630 BCX0" data-contrast="auto" data-dcnode-id="397" lang="EN-US"><span data-dcnode-id="398" instrument_node="">a</span></span><span class="TextRun SCXW247456630 BCX0" data-contrast="auto" data-dcnode-id="395" lang="EN-US"><span data-dcnode-id="396" instrument_node="">&nbsp;current&nbsp;2021-2022 Management Assistant, rotating through the Budget Office, Development Services, Office of Sustainability, Public Works, and Recovery Office.</span></span></p><span data-dcnode-id="393" instrument_node="">
</span><div class="OutlineElement Ltr SCXW247456630 BCX0" data-dcnode-id="386"><span data-dcnode-id="392" instrument_node="">
</span><p class="Paragraph SCXW247456630 BCX0" data-dcnode-id="388" paraeid="{08b81458-3c75-48dc-a24b-0c5328e56c3e}{241}" paraid="1190641350"><span class="TextRun SCXW247456630 BCX0" data-contrast="auto" data-dcnode-id="389" lang="EN-US"><span data-dcnode-id="391" instrument_node="">While earning her Master of Urban and Regional Planning from the University of California Irvine’s School of Social Ecology, Carline had an emphasis on environmental planning and climate resiliency. She worked for the City of Dana Point as a Planning Intern to provide both current and advance planning services to residents. This included updating the City's Local Coastal Program to address sea level rise and supporting work on the Housing Element Update. Additionally, she interned for the United States Agency of International Development (USAID) and provided policy recommendations to increase climate resiliency in public health projects throughout the Global South. Carline was also President of her school's Association of Environmental Professionals Orange County Chapter.</span><br data-dcnode-id="390"></span></p><span data-dcnode-id="387" instrument_node="">
</span></div><span data-dcnode-id="385" instrument_node="">
</span><div class="OutlineElement Ltr SCXW247456630 BCX0" data-dcnode-id="379"><span data-dcnode-id="384" instrument_node="">
</span><p class="Paragraph SCXW247456630 BCX0" data-dcnode-id="381" paraeid="{43ec41c6-3fa0-4c9a-a481-e111b21c4099}{20}" paraid="1946596621"><span class="TextRun SCXW247456630 BCX0" data-contrast="auto" data-dcnode-id="382" lang="EN-US"><span data-dcnode-id="383" instrument_node="">Carline’s passion for environmental stewardship and urban planning drives her career ambitions to work in local government and transform the way cities operate for a more sustainable future.</span></span></p><span data-dcnode-id="380" instrument_node="">
</span></div><span data-dcnode-id="378" instrument_node="">
</span><div class="OutlineElement Ltr BCX0 SCXW247456630" data-dcnode-id="371"><span data-dcnode-id="377" instrument_node="">
</span><p class="Paragraph SCXW247456630 BCX0" data-dcnode-id="373" paraeid="{43ec41c6-3fa0-4c9a-a481-e111b21c4099}{24}" paraid="1780652358"><span class="TextRun SCXW247456630 BCX0" data-contrast="auto" data-dcnode-id="374" lang="EN-US"><span data-dcnode-id="376" instrument_node="">Carline earned her B.S. in Environmental Systems with an emphasis in Ecology, Behavior, and Evolution and minored in Law and Society. She began her planning career at the City of San Diego's Stormwater Planning Bureau where she supported watershed and water quality management. Carline grew up in Orange County and recently moved to Long Beach. In her free time, she loves going to the beach, hiking, reading, and trying new food.</span><br data-dcnode-id="375"></span></p><span data-dcnode-id="372" instrument_node="">
</span></div><span data-dcnode-id="370" instrument_node="">
