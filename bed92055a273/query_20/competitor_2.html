="">, discuss the issue on the </span><a data-dcnode-id="3557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AYouth_suffrage" title="Talk:Youth suffrage"><span data-dcnode-id="3558" instrument_node="">talk page</span></a><span data-dcnode-id="3556" instrument_node="">, or </span><a data-dcnode-id="3554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AArticle_wizard" title="Wikipedia:Article wizard"><span data-dcnode-id="3555" instrument_node="">create a new article</span></a><span data-dcnode-id="3553" instrument_node="">, as appropriate.</span></span><span data-dcnode-id="3551" instrument_node=""> </span><span class="date-container" data-dcnode-id="3545"><i data-dcnode-id="3546"><span data-dcnode-id="3550" instrument_node="">(</span><span class="date" data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">January 2017</span></span><span data-dcnode-id="3547" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3538"><i data-dcnode-id="3539"><span data-dcnode-id="3544" instrument_node=""> (</span><small data-dcnode-id="3541"><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3543" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3540" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3532" instrument_node="">
</span><p data-dcnode-id="3477"><b data-dcnode-id="3528"><span data-dcnode-id="3531" instrument_node="">Youth </span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffrage" title="Suffrage"><span data-dcnode-id="3530" instrument_node="">suffrage</span></a></b><span data-dcnode-id="3527" instrument_node="">, or </span><b data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">children's suffrage</span></b><span data-dcnode-id="3524" instrument_node="">, is the right of youth to vote and forms part of the broader </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_rights" title="Youth rights"><span data-dcnode-id="3523" instrument_node="">youth rights movement</span></a><span data-dcnode-id="3521" instrument_node="">. Until recently </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="3520" instrument_node="">Iran</span></a><span data-dcnode-id="3518" instrument_node=""> had a voting age of 15; </span><a data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Argentina" title="Argentina"><span data-dcnode-id="3517" instrument_node="">Argentina</span></a><span data-dcnode-id="3515" instrument_node="">, </span><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria" title="Austria"><span data-dcnode-id="3514" instrument_node="">Austria</span></a><span data-dcnode-id="3512" instrument_node="">, </span><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="3511" instrument_node="">Brazil</span></a><span data-dcnode-id="3509" instrument_node="">, </span><a data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="3508" instrument_node="">Cuba</span></a><span data-dcnode-id="3506" instrument_node="">, </span><a data-dcnode-id="3504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecuador" title="Ecuador"><span data-dcnode-id="3505" instrument_node="">Ecuador</span></a><span data-dcnode-id="3503" instrument_node=""> and </span><a data-dcnode-id="3501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicaragua" title="Nicaragua"><span data-dcnode-id="3502" instrument_node="">Nicaragua</span></a><span data-dcnode-id="3500" instrument_node=""> have a voting age of 16; and </span><a data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greece" title="Greece"><span data-dcnode-id="3499" instrument_node="">Greece</span></a><span data-dcnode-id="3497" instrument_node="">, </span><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indonesia" title="Indonesia"><span data-dcnode-id="3496" instrument_node="">Indonesia</span></a><span data-dcnode-id="3494" instrument_node="">, </span><a data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Timor" title="East Timor"><span data-dcnode-id="3493" instrument_node="">East Timor</span></a><span data-dcnode-id="3491" instrument_node="">, </span><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sudan" title="Sudan"><span data-dcnode-id="3490" instrument_node="">Sudan</span></a><span data-dcnode-id="3488" instrument_node="">, and </span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seychelles" title="Seychelles"><span data-dcnode-id="3487" instrument_node="">Seychelles</span></a><span data-dcnode-id="3485" instrument_node=""> have a </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" title="Voting age"><span data-dcnode-id="3484" instrument_node="">voting age</span></a><span data-dcnode-id="3482" instrument_node=""> of 17.</span><sup class="reference" data-dcnode-id="3479" id="cite_ref-1"><a data-dcnode-id="3480" href="#cite_note-1"><span data-dcnode-id="3481" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3478" instrument_node="">

</span><h2 data-dcnode-id="3362"><span class="mw-headline" data-dcnode-id="3370" id="United_States"><span data-dcnode-id="3371" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="3363"><span class="mw-editsection-bracket" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">[</span></span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_suffrage%26action%3Dedit%26section%3D1" title="Edit section: United States"><span data-dcnode-id="3367" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3328"><span data-dcnode-id="3360" instrument_node="">In the </span><a data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3359" instrument_node="">United States</span></a><span data-dcnode-id="3357" instrument_node="">, suffrage originally could not be denied on account of age only to those 21 years of age or older; this age is mentioned in the </span><a data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourteenth_Amendment_to_the_United_States_Constitution" title="Fourteenth Amendment to the United States Constitution"><span data-dcnode-id="3356" instrument_node="">Fourteenth Amendment to the United States Constitution</span></a><span data-dcnode-id="3354" instrument_node="">. The </span><a data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-sixth_Amendment_to_the_United_States_Constitution" title="Twenty-sixth Amendment to the United States Constitution"><span data-dcnode-id="3353" instrument_node="">Twenty-sixth Amendment to the United States Constitution</span></a><span data-dcnode-id="3351" instrument_node="">, ratified on July 1, 1971, lowered that age to 18. The primary impetus for this change was the fact that young men were being drafted to fight in the </span><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="3350" instrument_node="">Vietnam War</span></a><span data-dcnode-id="3348" instrument_node=""> before they were old enough to vote. There have been many proposals to lower the voting age even further. In 2004, </span><a class="mw-redirect" data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California_State_Senator" title="California State Senator"><span data-dcnode-id="3347" instrument_node="">California State Senator</span></a><span data-dcnode-id="3345" instrument_node=""> </span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Vasconcellos" title="John Vasconcellos"><span data-dcnode-id="3344" instrument_node="">John Vasconcellos</span></a><span data-dcnode-id="3342" instrument_node=""> (D-</span><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California%2527s_13th_State_Senate_district" title="California's 13th State Senate district"><span data-dcnode-id="3341" instrument_node="">Santa Clara</span></a><span data-dcnode-id="3339" instrument_node="">) proposed a youth suffrage </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitutional_amendment" title="Constitutional amendment"><span data-dcnode-id="3338" instrument_node="">constitutional amendment</span></a><span data-dcnode-id="3336" instrument_node=""> called </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Training_Wheels_for_Citizenship" title="Training Wheels for Citizenship"><span data-dcnode-id="3335" instrument_node="">Training Wheels for Citizenship</span></a><span data-dcnode-id="3333" instrument_node=""> that would give 14-year-olds a quarter vote, 16-year-olds a half vote, and 17-year-olds a full vote.</span><sup class="reference" data-dcnode-id="3330" id="cite_ref-2"><a data-dcnode-id="3331" href="#cite_note-2"><span data-dcnode-id="3332" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3329" instrument_node="">
</span></p><p data-dcnode-id="3305"><span data-dcnode-id="3327" instrument_node="">In 2013, </span><a data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Takoma_Park%2C_Maryland" title="Takoma Park, Maryland"><span data-dcnode-id="3326" instrument_node="">Takoma Park, Maryland</span></a><span data-dcnode-id="3324" instrument_node=""> became the first U.S. city to allow 16- and 17-year-olds the right to vote.</span><sup class="reference" data-dcnode-id="3321" id="cite_ref-3"><a data-dcnode-id="3322" href="#cite_note-3"><span data-dcnode-id="3323" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3318" id="cite_ref-4"><a data-dcnode-id="3319" href="#cite_note-4"><span data-dcnode-id="3320" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3317" instrument_node=""> On January 5, 2015, </span><a data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyattsville%2C_Maryland" title="Hyattsville, Maryland"><span data-dcnode-id="3316" instrument_node="">Hyattsville, Maryland</span></a><span data-dcnode-id="3314" instrument_node=""> joined Takoma Park in lowering the voting age to 16.</span><sup class="reference" data-dcnode-id="3311" id="cite_ref-5"><a data-dcnode-id="3312" href="#cite_note-5"><span data-dcnode-id="3313" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3310" instrument_node="">  On 8 January 2018, the Greenbelt, Maryland's city council voted unanimously to approve a measure lowering the voting age to 16, in local elections.</span><sup class="reference" data-dcnode-id="3307" id="cite_ref-6"><a data-dcnode-id="3308" href="#cite_note-6"><span data-dcnode-id="3309" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3306" instrument_node="">
</span></p><p data-dcnode-id="3265"><span data-dcnode-id="3304" instrument_node="">On 8 November 2016, voters in the City of </span><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berkeley%2C_California" title="Berkeley, California"><span data-dcnode-id="3303" instrument_node="">Berkeley, California</span></a><span data-dcnode-id="3301" instrument_node=""> approved Measure Y1 with 70.31% of the vote, giving the city council authority to lower the voting age to 16, for school board elections.</span><sup class="reference" data-dcnode-id="3298" id="cite_ref-7"><a data-dcnode-id="3299" href="#cite_note-7"><span data-dcnode-id="3300" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3297" instrument_node="">  In May of 2020, </span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oakland_City_Council" title="Oakland City Council"><span data-dcnode-id="3296" instrument_node="">Oakland City Council</span></a><span data-dcnode-id="3294" instrument_node=""> President </span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rebecca_Kaplan" title="Rebecca Kaplan"><span data-dcnode-id="3293" instrument_node="">Rebecca Kaplan</span></a><span data-dcnode-id="3291" instrument_node=""> authored Oakland Measure QQ, which proposed lowering the voting age to 16, for school board elections.</span><sup class="reference" data-dcnode-id="3288" id="cite_ref-8"><a data-dcnode-id="3289" href="#cite_note-8"><span data-dcnode-id="3290" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3287" instrument_node="">  The Oakland City Council voted unanimously to put this measure on the ballot.</span><sup class="reference" data-dcnode-id="3284" id="cite_ref-9"><a data-dcnode-id="3285" href="#cite_note-9"><span data-dcnode-id="3286" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3283" instrument_node="">  On 6 November 2020, the city of </span><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oakland%2C_California" title="Oakland, California"><span data-dcnode-id="3282" instrument_node="">Oakland, California</span></a><span data-dcnode-id="3280" instrument_node=""> voted to pass Oakland Measure QQ, making Oakland the largest United States city to partially enfranchise sixteen year old voters.</span><sup class="reference" data-dcnode-id="3277" id="cite_ref-10"><a data-dcnode-id="3278" href="#cite_note-10"><span data-dcnode-id="3279" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="3274" id="cite_ref-11"><a data-dcnode-id="3275" href="#cite_note-11"><span data-dcnode-id="3276" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3273" instrument_node="">  This </span><a class="mw-redirect" data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot_measure" title="Ballot measure"><span data-dcnode-id="3272" instrument_node="">ballot measure</span></a><span data-dcnode-id="3270" instrument_node=""> passed with 67.88% of the vote.</span><sup class="reference" data-dcnode-id="3267" id="cite_ref-12"><a data-dcnode-id="3268" href="#cite_note-12"><span data-dcnode-id="3269" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3266" instrument_node="">
</span></p><p data-dcnode-id="3252"><span data-dcnode-id="3264" instrument_node="">In 2016, </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco" title="San Francisco"><span data-dcnode-id="3263" instrument_node="">San Francisco, California</span></a><span data-dcnode-id="3261" instrument_node=""> voted against Proposition F, which would have lowered the voting age to 16 for local elections, by a 4.2% margin.</span><sup class="reference" data-dcnode-id="3258" id="cite_ref-13"><a data-dcnode-id="3259" href="#cite_note-13"><span data-dcnode-id="3260" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3257" instrument_node="">  During the 2020 elections, San Francisco voters rejected Proposition G, which lowered the voting age to 16 for local elections and ballot measures.</span><sup class="reference" data-dcnode-id="3254" id="cite_ref-14"><a data-dcnode-id="3255" href="#cite_note-14"><span data-dcnode-id="3256" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3253" instrument_node="">  Proposition G failed by a 1.6% margin.
</span></p><span data-dcnode-id="3251" instrument_node="">
</span><h2 data-dcnode-id="3241"><span class="mw-headline" data-dcnode-id="3249" id="Venezuela"><span data-dcnode-id="3250" instrument_node="">Venezuela</span></span><span class="mw-editsection" data-dcnode-id="3242"><span class="mw-editsection-bracket" data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">[</span></span><a data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_suffrage%26action%3Dedit%26section%3D2" title="Edit section: Venezuela"><span data-dcnode-id="3246" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3240" instrument_node="">
</span><p data-dcnode-id="3235"><span data-dcnode-id="3239" instrument_node="">A proposal to lower the voting age from 18 to 16 was defeated in the </span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_Venezuelan_constitutional_referendum" title="2007 Venezuelan constitutional referendum"><span data-dcnode-id="3238" instrument_node="">2007 Venezuelan constitutional referendum</span></a><span data-dcnode-id="3236" instrument_node="">.
</span></p><span data-dcnode-id="3234" instrument_node="">
</span><h2 data-dcnode-id="3224"><span class="mw-headline" data-dcnode-id="3232" id="Arguments_for_and_against_youth_suffrage"><span data-dcnode-id="3233" instrument_node="">Arguments for and against youth suffrage</span></span><span class="mw-editsection" data-dcnode-id="3225"><span class="mw-editsection-bracket" data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">[</span></span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_suffrage%26action%3Dedit%26section%3D3" title="Edit section: Arguments for and against youth suffrage"><span data-dcnode-id="3229" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3223" instrument_node="">
</span><table class="box-Prose plainlinks metadata ambox ambox-style ambox-Prose" data-dcnode-id="3191" role="presentation"><tbody data-dcnode-id="3192"><tr data-dcnode-id="3193"><td class="mbox-image" data-dcnode-id="3220"><div data-dcnode-id="3221" style="width:52px"><img alt="" data-dcnode-id="3222" data-file-height="48" data-file-width="48" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/40px-Edit-clear.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/60px-Edit-clear.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/80px-Edit-clear.svg.png 2x" width="40"></div></td><td class="mbox-text" data-dcnode-id="3194"><div class="mbox-text-span" data-dcnode-id="3195"><span data-dcnode-id="3219" instrument_node="">This pro-con section </span><b data-dcnode-id="3212"><span data-dcnode-id="3218" instrument_node="">is in </span><a class="mw-redirect" data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MOS%3ALIST" title="MOS:LIST"><span data-dcnode-id="3217" instrument_node="">list</span></a><span data-dcnode-id="3215" instrument_node=""> format but may read better as </span><a class="mw-redirect" data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MOS%3APROSE" title="MOS:PROSE"><span data-dcnode-id="3214" instrument_node="">prose</span></a></b><span data-dcnode-id="3211" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3203"><span data-dcnode-id="3210" instrument_node=""> You can help by </span><a class="external text" data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_suffrage%26action%3Dedit"><span data-dcnode-id="3209" instrument_node="">converting this pro-con section</span></a><span data-dcnode-id="3207" instrument_node="">, if appropriate. </span><a data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AEditing" title="Help:Editing"><span data-dcnode-id="3206" instrument_node="">Editing help</span></a><span data-dcnode-id="3204" instrument_node=""> is available.</span></span><span data-dcnode-id="3202" instrument_node=""> </span><span class="date-container" data-dcnode-id="3196"><i data-dcnode-id="3197"><span data-dcnode-id="3201" instrument_node="">(</span><span class="date" data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">October 2010</span></span><span data-dcnode-id="3198" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3190" instrument_node="">
</span><h3 data-dcnode-id="3180"><span class="mw-headline" data-dcnode-id="3188" id="Arguments_for"><span data-dcnode-id="3189" instrument_node="">Arguments for</span></span><span class="mw-editsection" data-dcnode-id="3181"><span class="mw-editsection-bracket" data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">[</span></span><a data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_suffrage%26action%3Dedit%26section%3D4" title="Edit section: Arguments for"><span data-dcnode-id="3185" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3179" instrument_node="">
</span><ul data-dcnode-id="3136"><li data-dcnode-id="3171"><span data-dcnode-id="3178" instrument_node="">People of all ages are required to pay income and sales taxes; therefore, denying them the right to vote is </span><a class="mw-redirect" data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taxation_without_representation" title="Taxation without representation"><span data-dcnode-id="3177" instrument_node="">taxation without representation</span></a><span data-dcnode-id="3175" instrument_node="">.</span><sup class="reference" data-dcnode-id="3172" id="cite_ref-Vote_at_16_15-0"><a data-dcnode-id="3173" href="#cite_note-Vote_at_16-15"><span data-dcnode-id="3174" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="3170" instrument_node="">
</span><li data-dcnode-id="3161"><span data-dcnode-id="3169" instrument_node="">Youths are legally permitted to have sex</span><sup class="reference" data-dcnode-id="3166" id="cite_ref-16"><a data-dcnode-id="3167" href="#cite_note-16"><span data-dcnode-id="3168" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3165" instrument_node=""> or drive a car in some countries, which may be more dangerous and difficult than voting.</span><sup class="reference" data-dcnode-id="3162" id="cite_ref-Vote_at_16_15-1"><a data-dcnode-id="3163" href="#cite_note-Vote_at_16-15"><span data-dcnode-id="3164" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="3160" instrument_node="">
</span><li data-dcnode-id="3155"><span data-dcnode-id="3159" instrument_node="">Voter turnout among youth will improve if young people get in the habit of voting before they reach 18 and go to colleges far away from their state of residency, like it did in Germany when some states lowered their voting age for municipal elections.</span><sup class="reference" data-dcnode-id="3156" id="cite_ref-17"><a data-dcnode-id="3157" href="#cite_note-17"><span data-dcnode-id="3158" instrument_node="">[17]</span></a></sup></li><span data-dcnode-id="3154" instrument_node="">
</span><li data-dcnode-id="3149"><span data-dcnode-id="3153" instrument_node="">Education for and about democracy would be better served if there were no voting age.</span><sup class="reference" data-dcnode-id="3150" id="cite_ref-18"><a data-dcnode-id="3151" href="#cite_note-18"><span data-dcnode-id="3152" instrument_node="">[18]</span></a></sup></li><span data-dcnode-id="3148" instrument_node="">
</span><li data-dcnode-id="3143"><span data-dcnode-id="3147" instrument_node="">Government entitlements suppress fertility, which means the youth demographic is systematically suppressed, with no political power to offset the effect.</span><sup class="reference" data-dcnode-id="3144" id="cite_ref-19"><a data-dcnode-id="3145" href="#cite_note-19"><span data-dcnode-id="3146" instrument_node="">[19]</span></a></sup></li><span data-dcnode-id="3142" instrument_node="">
</span><li data-dcnode-id="3137"><span data-dcnode-id="3141" instrument_node="">Governments derive their just authority from the </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consent_of_the_governed" title="Consent of the governed"><span data-dcnode-id="3140" instrument_node="">consent of the governed</span></a><span data-dcnode-id="3138" instrument_node="">.  To be legitimate, those who govern and those who legislate must be elected by the people, not a special subset of the people, such as those over the age of X years.</span></li></ul><span data-dcnode-id="3135" instrument_node="">
</span><h3 data-dcnode-id="3125"><span class="mw-headline" data-dcnode-id="3133" id="Arguments_against"><span data-dcnode-id="3134" instrument_node="">Arguments against</span></span><span class="mw-editsection" data-dcnode-id="3126"><span class="mw-editsection-bracket" data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">[</span></span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_suffrage%26action%3Dedit%26section%3D5" title="Edit section: Arguments against"><span data-dcnode-id="3130" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3124" instrument_node="">
</span><ul data-dcnode-id="3118"><li data-dcnode-id="3119"><span data-dcnode-id="3123" instrument_node="">Some youth are believed by some to not to have sufficient understanding of the realities of life to participate in voting.</span><sup class="reference" data-dcnode-id="3120" id="cite_ref-20"><a data-dcnode-id="3121" href="#cite_note-20"><span data-dcnode-id="3122" instrument_node="">[20]</span></a></sup></li></ul><span data-dcnode-id="3117" instrument_node="">
</span><h2 data-dcnode-id="3107"><span class="mw-headline" data-dcnode-id="3115" id="Impact"><span data-dcnode-id="3116" instrument_node="">Impact</span></span><span class="mw-editsection" data-dcnode-id="3108"><span class="mw-editsection-bracket" data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">[</span></span><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_suffrage%26action%3Dedit%26section%3D6" title="Edit section: Impact"><span data-dcnode-id="3112" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3106" instrument_node="">
</span><p data-dcnode-id="3097"><span data-dcnode-id="3105" instrument_node="">Studies have found no differences in the quality of young voters' voting choices relative to older voters.</span><sup class="reference" data-dcnode-id="3102" id="cite_ref-21"><a data-dcnode-id="3103" href="#cite_note-21"><span data-dcnode-id="3104" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="3099" id="cite_ref-22"><a data-dcnode-id="3100" href="#cite_note-22"><span data-dcnode-id="3101" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3098" instrument_node="">
</span></p><p data-dcnode-id="3084"><span data-dcnode-id="3096" instrument_node="">A study of preregistration (registering individuals before they are eligible to vote) found that it was linked to higher youth turnout, and that politicians became more responsive to issues that the young have strong preferences on, such as higher education spending.</span><sup class="reference" data-dcnode-id="3093" id="cite_ref-23"><a data-dcnode-id="3094" href="#cite_note-23"><span data-dcnode-id="3095" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3092" instrument_node=""> One study found that allowing 16-year-olds to vote led those voters to have "substantially higher levels of engagement with representative democracy (through voting) as well as other forms of political participation".</span><sup class="reference" data-dcnode-id="3089" id="cite_ref-24"><a data-dcnode-id="3090" href="#cite_note-24"><span data-dcnode-id="3091" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="3086" id="cite_ref-25"><a data-dcnode-id="3087" href="#cite_note-25"><span data-dcnode-id="3088" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3085" instrument_node="">
</span></p><span data-dcnode-id="3083" instrument_node="">
</span><h2 data-dcnode-id="3073"><span class="mw-headline" data-dcnode-id="3081" id="Demeny_voting"><span data-dcnode-id="3082" instrument_node="">Demeny voting</span></span><span class="mw-editsection" data-dcnode-id="3074"><span class="mw-editsection-bracket" data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">[</span></span><a data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_suffrage%26action%3Dedit%26section%3D7" title="Edit section: Demeny voting"><span data-dcnode-id="3078" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3072" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3066" role="note"><span data-dcnode-id="3069" instrument_node="">Main article: </span><a data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demeny_voting" title="Demeny voting"><span data-dcnode-id="3068" instrument_node="">Demeny voting</span></a></div><span data-dcnode-id="3065" instrument_node="">
</span><p data-dcnode-id="3051"><span data-dcnode-id="3064" instrument_node="">Demeny voting is the idea that parents would cast votes on behalf of their children thereby ensuring that the interests of children were properly accounted for in the voting system. Most young people do not support themselves financially and are reliant upon parents for support, thus parental voting power should be proportionate to the number of dependents, especially where government benefits are concerned, to appropriately counterbalance the interests of the childless.</span><sup class="reference" data-dcnode-id="3061" id="cite_ref-26"><a data-dcnode-id="3062" href="#cite_note-26"><span data-dcnode-id="3063" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3060" instrument_node=""> Essentially, a case for "no taxation without representation." However, as children and their parents often have differing political, social, and economic interests, it is doubtful demeny voting would result in any significant advances of youth interests in government.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3053" style="white-space:nowrap;"><span data-dcnode-id="3059" instrument_node="">[</span><i data-dcnode-id="3055"><a data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3057" title="This claim needs references to reliable sources. (October 2021)"><span data-dcnode-id="3058" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3054" instrument_node="">]</span></sup><span data-dcnode-id="3052" instrument_node="">
</span></p><span data-dcnode-id="3050" instrument_node="">
