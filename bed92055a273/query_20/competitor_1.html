</span><link data-dcnode-id="10515" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="10510" role="note"><span data-dcnode-id="10514" instrument_node="">"The Franchise" redirects here. For other uses, see </span><a class="mw-disambig" data-dcnode-id="10512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Franchise_%28disambiguation%29" title="The Franchise (disambiguation)"><span data-dcnode-id="10513" instrument_node="">The Franchise (disambiguation)</span></a><span data-dcnode-id="10511" instrument_node="">.</span></div><span data-dcnode-id="10509" instrument_node="">

</span><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="10500" style="display:none"><span data-dcnode-id="10501" instrument_node="">Right to vote in public and political elections</span></div><span data-dcnode-id="10499" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="10497"><span data-dcnode-id="10498" instrument_node="">
</span></p><span data-dcnode-id="10496" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="10480"><div class="thumbinner" data-dcnode-id="10481" style="width:302px;"><a class="image" data-dcnode-id="10494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASuffrage_universel_1848.jpg"><img alt="" class="thumbimage" data-dcnode-id="10495" data-file-height="2568" data-file-width="3476" decoding="async" height="222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/db/Suffrage_universel_1848.jpg/300px-Suffrage_universel_1848.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/db/Suffrage_universel_1848.jpg/450px-Suffrage_universel_1848.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/db/Suffrage_universel_1848.jpg/600px-Suffrage_universel_1848.jpg 2x" width="300"></a><span data-dcnode-id="10493" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="10482"><div class="magnify" data-dcnode-id="10491"><a class="internal" data-dcnode-id="10492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASuffrage_universel_1848.jpg" title="Enlarge"></a></div><i data-dcnode-id="10487"><span data-dcnode-id="10490" instrument_node="">Suffrage universel dédié à </span><a data-dcnode-id="10488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexandre_Auguste_Ledru-Rollin" title="Alexandre Auguste Ledru-Rollin"><span data-dcnode-id="10489" instrument_node="">Ledru-Rollin</span></a></i><span data-dcnode-id="10486" instrument_node="">, </span><a data-dcnode-id="10484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fr%25C3%25A9d%25C3%25A9ric_Sorrieu" title="Frédéric Sorrieu"><span data-dcnode-id="10485" instrument_node="">Frédéric Sorrieu</span></a><span data-dcnode-id="10483" instrument_node="">, 1850</span></div></div></div><span data-dcnode-id="10479" instrument_node="">
</span><p data-dcnode-id="10436"><b data-dcnode-id="10477"><span data-dcnode-id="10478" instrument_node="">Suffrage</span></b><span data-dcnode-id="10476" instrument_node="">, </span><b data-dcnode-id="10474"><span data-dcnode-id="10475" instrument_node="">political franchise</span></b><span data-dcnode-id="10473" instrument_node="">, or simply </span><b data-dcnode-id="10471"><span data-dcnode-id="10472" instrument_node="">franchise</span></b><span data-dcnode-id="10470" instrument_node="">, is the </span><b data-dcnode-id="10468"><span data-dcnode-id="10469" instrument_node="">right to vote</span></b><span data-dcnode-id="10467" instrument_node=""> in public, political elections (although the term is sometimes used for any right to </span><a class="mw-redirect" data-dcnode-id="10465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote" title="Vote"><span data-dcnode-id="10466" instrument_node="">vote</span></a><span data-dcnode-id="10464" instrument_node="">).</span><sup class="reference" data-dcnode-id="10461" id="cite_ref-1"><a data-dcnode-id="10462" href="#cite_note-1"><span data-dcnode-id="10463" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="10458" id="cite_ref-2"><a data-dcnode-id="10459" href="#cite_note-2"><span data-dcnode-id="10460" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="10455" id="cite_ref-3"><a data-dcnode-id="10456" href="#cite_note-3"><span data-dcnode-id="10457" instrument_node="">[3]</span></a></sup><span data-dcnode-id="10454" instrument_node=""> In some languages, and occasionally in English, the right to vote is called </span><b data-dcnode-id="10452"><span data-dcnode-id="10453" instrument_node="">active suffrage</span></b><span data-dcnode-id="10451" instrument_node="">, as distinct from </span><a class="mw-redirect" data-dcnode-id="10449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passive_suffrage" title="Passive suffrage"><span data-dcnode-id="10450" instrument_node="">passive suffrage</span></a><span data-dcnode-id="10448" instrument_node="">, which is the right to stand for election.</span><sup class="reference" data-dcnode-id="10445" id="cite_ref-4"><a data-dcnode-id="10446" href="#cite_note-4"><span data-dcnode-id="10447" instrument_node="">[4]</span></a></sup><span data-dcnode-id="10444" instrument_node=""> The combination of active and passive suffrage is sometimes called </span><i data-dcnode-id="10442"><span data-dcnode-id="10443" instrument_node="">full suffrage</span></i><span data-dcnode-id="10441" instrument_node="">.</span><sup class="reference" data-dcnode-id="10438" id="cite_ref-5"><a data-dcnode-id="10439" href="#cite_note-5"><span data-dcnode-id="10440" instrument_node="">[5]</span></a></sup><span data-dcnode-id="10437" instrument_node="">
</span></p><p data-dcnode-id="10428"><span data-dcnode-id="10435" instrument_node="">Suffrage is often conceived in terms of elections for </span><a data-dcnode-id="10433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representative_democracy" title="Representative democracy"><span data-dcnode-id="10434" instrument_node="">representatives</span></a><span data-dcnode-id="10432" instrument_node="">. However, suffrage applies equally to </span><a data-dcnode-id="10430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendum" title="Referendum"><span data-dcnode-id="10431" instrument_node="">referendums</span></a><span data-dcnode-id="10429" instrument_node="">.
</span></p><p data-dcnode-id="10414"><span data-dcnode-id="10427" instrument_node="">In most democracies, eligible voters can vote in elections of representatives. Voting on issues by referendum may also be available. For example, in Switzerland, this is permitted at all levels of government. In the United States, some </span><a data-dcnode-id="10425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._state" title="U.S. state"><span data-dcnode-id="10426" instrument_node="">states</span></a><span data-dcnode-id="10424" instrument_node=""> such as California, Washington, and Wisconsin have exercised their </span><a class="mw-redirect" data-dcnode-id="10422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shared_sovereignty" title="Shared sovereignty"><span data-dcnode-id="10423" instrument_node="">shared sovereignty</span></a><span data-dcnode-id="10421" instrument_node=""> to offer citizens the opportunity to write, propose, and vote on referendums; other states and the </span><a class="mw-redirect" data-dcnode-id="10419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_federal_government" title="United States federal government"><span data-dcnode-id="10420" instrument_node="">federal government</span></a><span data-dcnode-id="10418" instrument_node=""> have not. </span><a data-dcnode-id="10416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendums_in_the_United_Kingdom" title="Referendums in the United Kingdom"><span data-dcnode-id="10417" instrument_node="">Referendums in the United Kingdom</span></a><span data-dcnode-id="10415" instrument_node=""> are rare.
</span></p><p data-dcnode-id="10390"><span data-dcnode-id="10413" instrument_node="">Suffrage is granted to qualifying citizens once they have reached the </span><a data-dcnode-id="10411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" title="Voting age"><span data-dcnode-id="10412" instrument_node="">voting age</span></a><span data-dcnode-id="10410" instrument_node="">. What constitutes a qualifying citizen depends on the government's decision. Resident </span><a data-dcnode-id="10408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_of_foreigners_to_vote" title="Right of foreigners to vote"><span data-dcnode-id="10409" instrument_node="">non-citizens can vote</span></a><span data-dcnode-id="10407" instrument_node=""> in some countries, which may be restricted to citizens of closely linked countries (e.g., </span><a data-dcnode-id="10405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Nations%23Commonwealth_citizenship_and_high_commissioners" title="Commonwealth of Nations"><span data-dcnode-id="10406" instrument_node="">Commonwealth citizens</span></a><span data-dcnode-id="10404" instrument_node=""> and </span><a data-dcnode-id="10402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_to_the_European_Parliament%23Eligibility" title="Elections to the European Parliament"><span data-dcnode-id="10403" instrument_node="">European Union citizens</span></a><span data-dcnode-id="10401" instrument_node="">) or to certain offices or questions.</span><sup class="reference" data-dcnode-id="10398" id="cite_ref-6"><a data-dcnode-id="10399" href="#cite_note-6"><span data-dcnode-id="10400" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="10395" id="cite_ref-7"><a data-dcnode-id="10396" href="#cite_note-7"><span data-dcnode-id="10397" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="10392" id="cite_ref-8"><a data-dcnode-id="10393" href="#cite_note-8"><span data-dcnode-id="10394" instrument_node="">[8]</span></a></sup><span data-dcnode-id="10391" instrument_node="">

</span><h2 data-dcnode-id="9935"><span class="mw-headline" data-dcnode-id="9943" id="Etymology"><span data-dcnode-id="9944" instrument_node="">Etymology</span></span><span class="mw-editsection" data-dcnode-id="9936"><span class="mw-editsection-bracket" data-dcnode-id="9941"><span data-dcnode-id="9942" instrument_node="">[</span></span><a data-dcnode-id="9939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D1" title="Edit section: Etymology"><span data-dcnode-id="9940" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9937"><span data-dcnode-id="9938" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9934" instrument_node="">
</span><p data-dcnode-id="9884"><span data-dcnode-id="9933" instrument_node="">The word </span><i data-dcnode-id="9931"><span data-dcnode-id="9932" instrument_node="">suffrage</span></i><span data-dcnode-id="9930" instrument_node=""> comes from </span><a data-dcnode-id="9928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin" title="Latin"><span data-dcnode-id="9929" instrument_node="">Latin</span></a><span data-dcnode-id="9927" instrument_node=""> </span><i data-dcnode-id="9925"><span data-dcnode-id="9926" instrument_node="">suffragium</span></i><span data-dcnode-id="9924" instrument_node="">, which initially meant "a voting-tablet", "a ballot", "a vote", or "the right to vote". </span><i data-dcnode-id="9922"><span data-dcnode-id="9923" instrument_node="">Suffragium</span></i><span data-dcnode-id="9921" instrument_node=""> in the second century and later came to mean "political patronage, influence, interest, or support", and sometimes "popular acclaim" or "applause". By the fourth century the word was used for "an intercession", asking a patron for their influence with the Almighty. </span><i data-dcnode-id="9919"><span data-dcnode-id="9920" instrument_node="">Suffragium</span></i><span data-dcnode-id="9918" instrument_node=""> was used in the fifth and sixth centuries with connection to buying influence or profiteering from appointing to office, and eventually the word referred to the bribe itself.</span><sup class="reference" data-dcnode-id="9915" id="cite_ref-9"><a data-dcnode-id="9916" href="#cite_note-9"><span data-dcnode-id="9917" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9914" instrument_node=""> William Smith rejects the connection of </span><i data-dcnode-id="9912"><span data-dcnode-id="9913" instrument_node="">suffragium</span></i><span data-dcnode-id="9911" instrument_node=""> to </span><i data-dcnode-id="9909"><span data-dcnode-id="9910" instrument_node="">sub</span></i><span data-dcnode-id="9908" instrument_node=""> "under" + </span><i data-dcnode-id="9906"><span data-dcnode-id="9907" instrument_node="">fragor</span></i><span data-dcnode-id="9905" instrument_node=""> "crash, din, shouts (as of approval)", related to </span><i data-dcnode-id="9903"><span data-dcnode-id="9904" instrument_node="">frangere</span></i><span data-dcnode-id="9902" instrument_node=""> "to break"; Eduard Wunder writes that the word may be related to </span><i data-dcnode-id="9900"><span data-dcnode-id="9901" instrument_node="">suffrago</span></i><span data-dcnode-id="9899" instrument_node="">, signifying an ankle bone or knuckle bone.</span><sup class="reference" data-dcnode-id="9896" id="cite_ref-latin_10-0"><a data-dcnode-id="9897" href="#cite_note-latin-10"><span data-dcnode-id="9898" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9895" instrument_node=""> In the 17th century the English </span><i data-dcnode-id="9893"><span data-dcnode-id="9894" instrument_node="">suffrage</span></i><span data-dcnode-id="9892" instrument_node=""> regained the earlier meaning of the Latin </span><i data-dcnode-id="9890"><span data-dcnode-id="9891" instrument_node="">suffragium</span></i><span data-dcnode-id="9889" instrument_node="">, "a vote" or "the right to vote".</span><sup class="reference" data-dcnode-id="9886" id="cite_ref-11"><a data-dcnode-id="9887" href="#cite_note-11"><span data-dcnode-id="9888" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9885" instrument_node="">
</span></p><span data-dcnode-id="9883" instrument_node="">
</span><h2 data-dcnode-id="9873"><span class="mw-headline" data-dcnode-id="9881" id="Types"><span data-dcnode-id="9882" instrument_node="">Types</span></span><span class="mw-editsection" data-dcnode-id="9874"><span class="mw-editsection-bracket" data-dcnode-id="9879"><span data-dcnode-id="9880" instrument_node="">[</span></span><a data-dcnode-id="9877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D2" title="Edit section: Types"><span data-dcnode-id="9878" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9875"><span data-dcnode-id="9876" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9872" instrument_node="">
</span><h3 data-dcnode-id="9862"><span class="mw-headline" data-dcnode-id="9870" id="Universal_suffrage"><span data-dcnode-id="9871" instrument_node="">Universal suffrage</span></span><span class="mw-editsection" data-dcnode-id="9863"><span class="mw-editsection-bracket" data-dcnode-id="9868"><span data-dcnode-id="9869" instrument_node="">[</span></span><a data-dcnode-id="9866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D3" title="Edit section: Universal suffrage"><span data-dcnode-id="9867" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9864"><span data-dcnode-id="9865" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9861" instrument_node="">
</span><link data-dcnode-id="9860" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9856" role="note"><span data-dcnode-id="9859" instrument_node="">Main article: </span><a data-dcnode-id="9857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_suffrage" title="Universal suffrage"><span data-dcnode-id="9858" instrument_node="">Universal suffrage</span></a></div><span data-dcnode-id="9855" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9843"><div class="thumbinner" data-dcnode-id="9844" style="width:222px;"><a class="image" data-dcnode-id="9853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APeterloo_Massacre.png"><img alt="" class="thumbimage" data-dcnode-id="9854" data-file-height="853" data-file-width="1280" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/98/Peterloo_Massacre.png/220px-Peterloo_Massacre.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/98/Peterloo_Massacre.png/330px-Peterloo_Massacre.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/98/Peterloo_Massacre.png/440px-Peterloo_Massacre.png 2x" width="220"></a><span data-dcnode-id="9852" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9845"><div class="magnify" data-dcnode-id="9850"><a class="internal" data-dcnode-id="9851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APeterloo_Massacre.png" title="Enlarge"></a></div><span data-dcnode-id="9849" instrument_node="">The </span><a data-dcnode-id="9847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peterloo_Massacre" title="Peterloo Massacre"><span data-dcnode-id="9848" instrument_node="">Peterloo Massacre</span></a><span data-dcnode-id="9846" instrument_node=""> of 1819</span></div></div></div><span data-dcnode-id="9842" instrument_node="">
</span><p data-dcnode-id="9832"><a data-dcnode-id="9840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_suffrage" title="Universal suffrage"><span data-dcnode-id="9841" instrument_node="">Universal suffrage</span></a><span data-dcnode-id="9839" instrument_node=""> consists of the right to vote without restriction due to gender, race, religion, social status, education level, or wealth. It typically does not extend the right to vote to all </span><a class="mw-redirect" data-dcnode-id="9837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Residency_%28domicile%29" title="Residency (domicile)"><span data-dcnode-id="9838" instrument_node="">residents</span></a><span data-dcnode-id="9836" instrument_node=""> of a region as distinctions are still frequently made in regard to </span><a data-dcnode-id="9834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citizenship" title="Citizenship"><span data-dcnode-id="9835" instrument_node="">citizenship</span></a><span data-dcnode-id="9833" instrument_node="">, age, and occasionally mental capacity or criminal convictions.
</span></p><p data-dcnode-id="9827"><span data-dcnode-id="9831" instrument_node="">The short-lived </span><a data-dcnode-id="9829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corsican_Republic" title="Corsican Republic"><span data-dcnode-id="9830" instrument_node="">Corsican Republic</span></a><span data-dcnode-id="9828" instrument_node=""> (1755–1769) was the first country to grant limited universal suffrage to all citizens over the age of 25.
</span></p><p data-dcnode-id="9801"><span data-dcnode-id="9826" instrument_node="">In 1819 60–80,000 men and women from 30 miles around Manchester assembled in the city's </span><a data-dcnode-id="9824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Peter%2527s_Square%2C_Manchester" title="St Peter's Square, Manchester"><span data-dcnode-id="9825" instrument_node="">St. Peter's Square</span></a><span data-dcnode-id="9823" instrument_node=""> to protest their lack of any representation in the Houses of Parliament. Historian </span><a data-dcnode-id="9821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Poole_%28historian%29" title="Robert Poole (historian)"><span data-dcnode-id="9822" instrument_node="">Robert Poole</span></a><span data-dcnode-id="9820" instrument_node=""> has called the </span><a data-dcnode-id="9818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peterloo_Massacre" title="Peterloo Massacre"><span data-dcnode-id="9819" instrument_node="">Peterloo Massacre</span></a><span data-dcnode-id="9817" instrument_node=""> one of the defining moments of its age.</span><sup class="reference" data-dcnode-id="9814" id="cite_ref-12"><a data-dcnode-id="9815" href="#cite_note-12"><span data-dcnode-id="9816" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9813" instrument_node=""> (The eponymous </span><i data-dcnode-id="9810"><a data-dcnode-id="9811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peterloo_%28film%29" title="Peterloo (film)"><span data-dcnode-id="9812" instrument_node="">Peterloo</span></a></i><span data-dcnode-id="9809" instrument_node=""> film featured a scene of women suffragists planning their contribution to the protest.) At that time Manchester had a population of around 140,000 and the population totals of </span><a data-dcnode-id="9807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demography_of_Greater_Manchester" title="Demography of Greater Manchester"><span data-dcnode-id="9808" instrument_node="">Greater Manchester</span></a><span data-dcnode-id="9806" instrument_node=""> were around 490,000.</span><sup class="reference" data-dcnode-id="9803" id="cite_ref-13"><a data-dcnode-id="9804" href="#cite_note-13"><span data-dcnode-id="9805" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9802" instrument_node="">
</span></p><p data-dcnode-id="9774"><span data-dcnode-id="9800" instrument_node="">This was followed by other experiments in the </span><a data-dcnode-id="9798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Commune" title="Paris Commune"><span data-dcnode-id="9799" instrument_node="">Paris Commune</span></a><span data-dcnode-id="9797" instrument_node=""> of 1871 and the island republic of </span><a data-dcnode-id="9795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franceville%2C_New_Hebrides" title="Franceville, New Hebrides"><span data-dcnode-id="9796" instrument_node="">Franceville</span></a><span data-dcnode-id="9794" instrument_node=""> (1889). From 1840 to 1852, the </span><a class="mw-redirect" data-dcnode-id="9792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Hawai%2527i" title="Kingdom of Hawai'i"><span data-dcnode-id="9793" instrument_node="">Kingdom of Hawai'i</span></a><span data-dcnode-id="9791" instrument_node=""> granted universal suffrage without mention of sex. In 1893, when the Kingdom of Hawai'i was </span><a data-dcnode-id="9789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overthrow_of_the_Hawaiian_Kingdom" title="Overthrow of the Hawaiian Kingdom"><span data-dcnode-id="9790" instrument_node="">overthrown in a coup</span></a><span data-dcnode-id="9788" instrument_node="">, </span><a data-dcnode-id="9786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="9787" instrument_node="">New Zealand</span></a><span data-dcnode-id="9785" instrument_node=""> was the only independent country to practice universal (active) suffrage, and the </span><a data-dcnode-id="9783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_in_the_World" title="Freedom in the World"><span data-dcnode-id="9784" instrument_node="">Freedom in the World</span></a><span data-dcnode-id="9782" instrument_node=""> index lists New Zealand as the only free country in the world in 1893.</span><sup class="reference" data-dcnode-id="9779" id="cite_ref-14"><a data-dcnode-id="9780" href="#cite_note-14"><span data-dcnode-id="9781" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="9776" id="cite_ref-15"><a data-dcnode-id="9777" href="#cite_note-15"><span data-dcnode-id="9778" instrument_node="">[15]</span></a></sup><span data-dcnode-id="9775" instrument_node="">
</span></p><span data-dcnode-id="9773" instrument_node="">
</span><h3 data-dcnode-id="9762"><span data-dcnode-id="9772" id="Women.27s_suffrage"></span><span class="mw-headline" data-dcnode-id="9770" id="Women's_suffrage"><span data-dcnode-id="9771" instrument_node="">Women's suffrage</span></span><span class="mw-editsection" data-dcnode-id="9763"><span class="mw-editsection-bracket" data-dcnode-id="9768"><span data-dcnode-id="9769" instrument_node="">[</span></span><a data-dcnode-id="9766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D4" title="Edit section: Women's suffrage"><span data-dcnode-id="9767" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9764"><span data-dcnode-id="9765" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9761" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9750"><div class="thumbinner" data-dcnode-id="9751" style="width:222px;"><a class="image" data-dcnode-id="9759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASPD-Plakat_1919.jpg"><img alt="" class="thumbimage" data-dcnode-id="9760" data-file-height="1150" data-file-width="873" decoding="async" height="290" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/78/SPD-Plakat_1919.jpg/220px-SPD-Plakat_1919.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/78/SPD-Plakat_1919.jpg/330px-SPD-Plakat_1919.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/78/SPD-Plakat_1919.jpg/440px-SPD-Plakat_1919.jpg 2x" width="220"></a><span data-dcnode-id="9758" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9752"><div class="magnify" data-dcnode-id="9756"><a class="internal" data-dcnode-id="9757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASPD-Plakat_1919.jpg" title="Enlarge"></a></div><span data-dcnode-id="9755" instrument_node="">German election poster from 1919: </span><i data-dcnode-id="9753"><span data-dcnode-id="9754" instrument_node="">Equal rights – equal duties!</span></i></div></div></div><span data-dcnode-id="9749" instrument_node="">
</span><link data-dcnode-id="9748" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9744" role="note"><span data-dcnode-id="9747" instrument_node="">Main article: </span><a data-dcnode-id="9745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage" title="Women's suffrage"><span data-dcnode-id="9746" instrument_node="">Women's suffrage</span></a></div><span data-dcnode-id="9743" instrument_node="">
</span><p data-dcnode-id="9732"><a data-dcnode-id="9741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage" title="Women's suffrage"><span data-dcnode-id="9742" instrument_node="">Women's suffrage</span></a><span data-dcnode-id="9740" instrument_node=""> is, by definition, the right of women to vote.</span><sup class="reference" data-dcnode-id="9737" id="cite_ref-16"><a data-dcnode-id="9738" href="#cite_note-16"><span data-dcnode-id="9739" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9736" instrument_node=""> This was the goal of the suffragists, who believed in using legal means, as well as the </span><a data-dcnode-id="9734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffragette" title="Suffragette"><span data-dcnode-id="9735" instrument_node="">suffragettes</span></a><span data-dcnode-id="9733" instrument_node="">, who used extremist measures. Short-lived suffrage equity was drafted into provisions of the State of New Jersey's first, 1776 Constitution, which extended the Right to Vote to unwed female landholders and black land owners.
</span></p><span data-dcnode-id="9731" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="9721"><p data-dcnode-id="9722"><span data-dcnode-id="9728" instrument_node="">
"IV. That all inhabitants of this Colony, of full age, who are worth fifty pounds proclamation money, clear estate in the same, and have resided within the county in which they claim a vote for twelve months immediately preceding the election, shall be entitled to vote for Representatives in Council and Assembly; and also for all other public officers, that shall be elected by the people of the county at large." </span><a data-dcnode-id="9726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Jersey" title="New Jersey"><span data-dcnode-id="9727" instrument_node="">New Jersey</span></a><span data-dcnode-id="9725" instrument_node=""> </span><i data-dcnode-id="9723"><span data-dcnode-id="9724" instrument_node="">1776</span></i></p></blockquote><span data-dcnode-id="9720" instrument_node="">
</span><p data-dcnode-id="9711"><span data-dcnode-id="9719" instrument_node="">However, the document did not specify an Amendment procedure, and the provision was subsequently replaced in 1844 by the adoption of the </span><a data-dcnode-id="9717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1844_New_Jersey_Constitution" title="1844 New Jersey Constitution"><span data-dcnode-id="9718" instrument_node="">succeeding constitution</span></a><span data-dcnode-id="9716" instrument_node="">, which reverted to "all white male" suffrage restrictions.</span><sup class="reference" data-dcnode-id="9713" id="cite_ref-17"><a data-dcnode-id="9714" href="#cite_note-17"><span data-dcnode-id="9715" instrument_node="">[17]</span></a></sup><span data-dcnode-id="9712" instrument_node="">
</span></p><p data-dcnode-id="9690"><span data-dcnode-id="9710" instrument_node="">Although the Kingdom of Hawai'i granted female suffrage in 1840, the right was rescinded in 1852. Limited voting rights were gained by some women in Sweden, Britain, and some western U.S. states in the 1860s. In 1893, the British colony of </span><a data-dcnode-id="9708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="9709" instrument_node="">New Zealand</span></a><span data-dcnode-id="9707" instrument_node=""> became the first self-governing nation to extend the right to vote to all adult women.</span><sup class="reference" data-dcnode-id="9704" id="cite_ref-18"><a data-dcnode-id="9705" href="#cite_note-18"><span data-dcnode-id="9706" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9703" instrument_node=""> In 1894, the women of </span><a data-dcnode-id="9701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Australia" title="South Australia"><span data-dcnode-id="9702" instrument_node="">South Australia</span></a><span data-dcnode-id="9700" instrument_node=""> achieved the </span><a data-dcnode-id="9698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitutional_Amendment_%28Adult_Suffrage%29_Act_1894" title="Constitutional Amendment (Adult Suffrage) Act 1894"><span data-dcnode-id="9699" instrument_node="">right to both vote and stand for Parliament</span></a><span data-dcnode-id="9697" instrument_node="">. The autonomous </span><a data-dcnode-id="9695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Duchy_of_Finland" title="Grand Duchy of Finland"><span data-dcnode-id="9696" instrument_node="">Grand Duchy of Finland</span></a><span data-dcnode-id="9694" instrument_node=""> in the </span><a data-dcnode-id="9692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="9693" instrument_node="">Russian Empire</span></a><span data-dcnode-id="9691" instrument_node=""> was the first nation to allow all women to both vote and run for parliament.
</span></p><span data-dcnode-id="9689" instrument_node="">
</span><h4 data-dcnode-id="9678"><span data-dcnode-id="9688" id="Anti-women.27s_suffrage_propaganda"></span><span class="mw-headline" data-dcnode-id="9686" id="Anti-women's_suffrage_propaganda"><span data-dcnode-id="9687" instrument_node="">Anti-women's suffrage propaganda</span></span><span class="mw-editsection" data-dcnode-id="9679"><span class="mw-editsection-bracket" data-dcnode-id="9684"><span data-dcnode-id="9685" instrument_node="">[</span></span><a data-dcnode-id="9682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D5" title="Edit section: Anti-women's suffrage propaganda"><span data-dcnode-id="9683" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9680"><span data-dcnode-id="9681" instrument_node="">]</span></span></span></h4><span data-dcnode-id="9677" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9656"><div class="thumbinner" data-dcnode-id="9657" style="width:222px;"><a class="image" data-dcnode-id="9675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAnti_Suffrage_Postcard_c.1908_03.jpg"><img alt="" class="thumbimage" data-dcnode-id="9676" data-file-height="3915" data-file-width="2508" decoding="async" height="343" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Anti_Suffrage_Postcard_c.1908_03.jpg/220px-Anti_Suffrage_Postcard_c.1908_03.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Anti_Suffrage_Postcard_c.1908_03.jpg/330px-Anti_Suffrage_Postcard_c.1908_03.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Anti_Suffrage_Postcard_c.1908_03.jpg/440px-Anti_Suffrage_Postcard_c.1908_03.jpg 2x" width="220"></a><span data-dcnode-id="9674" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9658"><div class="magnify" data-dcnode-id="9672"><a class="internal" data-dcnode-id="9673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAnti_Suffrage_Postcard_c.1908_03.jpg" title="Enlarge"></a></div><span data-dcnode-id="9671" instrument_node="">A British postcard against women's suffrage postcard from c.1908. It shows unflattering </span><a data-dcnode-id="9669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caricature" title="Caricature"><span data-dcnode-id="9670" instrument_node="">caricatures</span></a><span data-dcnode-id="9668" instrument_node=""> of suffragettes in front of </span><a data-dcnode-id="9666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_the_United_Kingdom" title="Parliament of the United Kingdom"><span data-dcnode-id="9667" instrument_node="">parliament</span></a><span data-dcnode-id="9665" instrument_node=""> and the caption: 'This is the house that man built' with a poem. From the </span><a data-dcnode-id="9663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_History_Museum" title="People's History Museum"><span data-dcnode-id="9664" instrument_node="">People's History Museum</span></a><span data-dcnode-id="9662" instrument_node="">, </span><a data-dcnode-id="9660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manchester" title="Manchester"><span data-dcnode-id="9661" instrument_node="">Manchester</span></a><span data-dcnode-id="9659" instrument_node="">.</span></div></div></div><span data-dcnode-id="9655" instrument_node="">
</span><p data-dcnode-id="9649"><span data-dcnode-id="9654" instrument_node="">Those against the women's suffrage movement made public organizations to put down the political movement, with the main argument being that a woman's place was in the home, not polls. Political cartoons and public outrage over women's rights increased as the opposition to suffrage worked to organize legitimate groups campaigning against women's voting rights. The Massachusetts Association Opposed to the Further Extension of Suffrage to Women was one organization that came out of the 1880s to put down the voting efforts.</span><sup class="reference" data-dcnode-id="9651" id="cite_ref-19"><a data-dcnode-id="9652" href="#cite_note-19"><span data-dcnode-id="9653" instrument_node="">[19]</span></a></sup><span data-dcnode-id="9650" instrument_node="">
</span></p><p data-dcnode-id="9643"><span data-dcnode-id="9648" instrument_node="">Many anti-suffrage propaganda poked fun at the idea of women in politics. Political cartoons displayed the most sentiment by portraying the issue of women's suffrage to be swapped with men's lives. Some mocked the popular suffrage hairstyle of full-upward combed hair. Others depicted young girls turning into suffragettes after a failure in life, such as not being married.</span><sup class="reference" data-dcnode-id="9645" id="cite_ref-20"><a data-dcnode-id="9646" href="#cite_note-20"><span data-dcnode-id="9647" instrument_node="">[20]</span></a></sup><span data-dcnode-id="9644" instrument_node="">
</span></p><span data-dcnode-id="9642" instrument_node="">
</span><h3 data-dcnode-id="9632"><span class="mw-headline" data-dcnode-id="9640" id="Equal_suffrage"><span data-dcnode-id="9641" instrument_node="">Equal suffrage</span></span><span class="mw-editsection" data-dcnode-id="9633"><span class="mw-editsection-bracket" data-dcnode-id="9638"><span data-dcnode-id="9639" instrument_node="">[</span></span><a data-dcnode-id="9636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D6" title="Edit section: Equal suffrage"><span data-dcnode-id="9637" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9634"><span data-dcnode-id="9635" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9631" instrument_node="">
</span><link data-dcnode-id="9630" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9626" role="note"><span data-dcnode-id="9629" instrument_node="">See also: </span><a data-dcnode-id="9627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weighted_voting" title="Weighted voting"><span data-dcnode-id="9628" instrument_node="">Weighted voting</span></a></div><span data-dcnode-id="9625" instrument_node="">
</span><p data-dcnode-id="9616"><span data-dcnode-id="9624" instrument_node="">Equal suffrage is sometimes confused with </span><i data-dcnode-id="9622"><span data-dcnode-id="9623" instrument_node="">Universal suffrage</span></i><span data-dcnode-id="9621" instrument_node="">, although the meaning of the former is the removal of graded votes, wherein a voter could possess a number of votes in accordance with income, wealth or social status.</span><sup class="reference" data-dcnode-id="9618" id="cite_ref-21"><a data-dcnode-id="9619" href="#cite_note-21"><span data-dcnode-id="9620" instrument_node="">[21]</span></a></sup><span data-dcnode-id="9617" instrument_node="">
</span></p><span data-dcnode-id="9615" instrument_node="">
</span><h3 data-dcnode-id="9605"><span class="mw-headline" data-dcnode-id="9613" id="Census_suffrage"><span data-dcnode-id="9614" instrument_node="">Census suffrage</span></span><span class="mw-editsection" data-dcnode-id="9606"><span class="mw-editsection-bracket" data-dcnode-id="9611"><span data-dcnode-id="9612" instrument_node="">[</span></span><a data-dcnode-id="9609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D7" title="Edit section: Census suffrage"><span data-dcnode-id="9610" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9607"><span data-dcnode-id="9608" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9604" instrument_node="">
</span><p data-dcnode-id="9588"><span data-dcnode-id="9603" instrument_node="">Also known as "censitary suffrage", it is the opposite of </span><i data-dcnode-id="9601"><span data-dcnode-id="9602" instrument_node="">equal suffrage,</span></i><span data-dcnode-id="9600" instrument_node=""> meaning that the votes cast by those eligible to vote are not equal, but weighed differently according to the person's income or rank in society (e.g., people who don't own property or whose income is lower than a given amount are barred from voting; or people with higher education have more votes than those with lower education; stockholders who have more shares in a given company have more votes than those with fewer shares). In many countries, census suffrage restricted who could vote and be elected: in the United States, until the </span><a data-dcnode-id="9598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacksonian_democracy" title="Jacksonian democracy"><span data-dcnode-id="9599" instrument_node="">Jacksonian reforms</span></a><span data-dcnode-id="9597" instrument_node=""> of the 1830's, only men who owned land of a specified acreage or monetary value could vote or participate in elections.</span><sup class="reference" data-dcnode-id="9594" id="cite_ref-22"><a data-dcnode-id="9595" href="#cite_note-22"><span data-dcnode-id="9596" instrument_node="">[22]</span></a></sup><span data-dcnode-id="9593" instrument_node=""> Similarly, in Brazil, the Constitution of 1824 established that, in order to vote, citizens would need to have an annual income of 200,000 Milreis and, to be voted, their minimum annual income would need to be 400,000 Milreis.</span><sup class="reference" data-dcnode-id="9590" id="cite_ref-23"><a data-dcnode-id="9591" href="#cite_note-23"><span data-dcnode-id="9592" instrument_node="">[23]</span></a></sup><span data-dcnode-id="9589" instrument_node="">
</span></p><span data-dcnode-id="9587" instrument_node="">
</span><h3 data-dcnode-id="9577"><span class="mw-headline" data-dcnode-id="9585" id="Compulsory_suffrage"><span data-dcnode-id="9586" instrument_node="">Compulsory suffrage</span></span><span class="mw-editsection" data-dcnode-id="9578"><span class="mw-editsection-bracket" data-dcnode-id="9583"><span data-dcnode-id="9584" instrument_node="">[</span></span><a data-dcnode-id="9581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D8" title="Edit section: Compulsory suffrage"><span data-dcnode-id="9582" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9579"><span data-dcnode-id="9580" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9576" instrument_node="">
</span><link data-dcnode-id="9575" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9571" role="note"><span data-dcnode-id="9574" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="9572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compulsory_suffrage" title="Compulsory suffrage"><span data-dcnode-id="9573" instrument_node="">Compulsory suffrage</span></a></div><span data-dcnode-id="9570" instrument_node="">
</span><p data-dcnode-id="9561"><span data-dcnode-id="9569" instrument_node="">Where </span><a class="mw-redirect" data-dcnode-id="9567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compulsory_suffrage" title="Compulsory suffrage"><span data-dcnode-id="9568" instrument_node="">compulsory suffrage</span></a><span data-dcnode-id="9566" instrument_node=""> exists, those who are eligible to vote are required by law to do so. Thirty-two countries currently practise this form of suffrage.</span><sup class="reference" data-dcnode-id="9563" id="cite_ref-24"><a data-dcnode-id="9564" href="#cite_note-24"><span data-dcnode-id="9565" instrument_node="">[24]</span></a></sup><span data-dcnode-id="9562" instrument_node="">
</span></p><span data-dcnode-id="9560" instrument_node="">
</span><h3 data-dcnode-id="9550"><span class="mw-headline" data-dcnode-id="9558" id="Business_vote"><span data-dcnode-id="9559" instrument_node="">Business vote</span></span><span class="mw-editsection" data-dcnode-id="9551"><span class="mw-editsection-bracket" data-dcnode-id="9556"><span data-dcnode-id="9557" instrument_node="">[</span></span><a data-dcnode-id="9554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D9" title="Edit section: Business vote"><span data-dcnode-id="9555" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9552"><span data-dcnode-id="9553" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9549" instrument_node="">
</span><p data-dcnode-id="9546"><span class="anchor" data-dcnode-id="9548" id="Business_vote"></span><span data-dcnode-id="9547" instrument_node="">
</span></p><span data-dcnode-id="9545" instrument_node="">
</span><link data-dcnode-id="9544" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9537" role="note"><span data-dcnode-id="9543" instrument_node="">See also: </span><a data-dcnode-id="9541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plural_voting" title="Plural voting"><span data-dcnode-id="9542" instrument_node="">Plural voting</span></a><span data-dcnode-id="9540" instrument_node=""> and </span><a data-dcnode-id="9538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Functional_constituency_%28Hong_Kong%29" title="Functional constituency (Hong Kong)"><span data-dcnode-id="9539" instrument_node="">Functional constituency (Hong Kong)</span></a></div><span data-dcnode-id="9536" instrument_node="">
</span><p data-dcnode-id="9522"><span data-dcnode-id="9535" instrument_node="">In </span><a data-dcnode-id="9533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_government_in_England" title="Local government in England"><span data-dcnode-id="9534" instrument_node="">local government in England</span></a><span data-dcnode-id="9532" instrument_node=""> and some of its ex-colonies, businesses formerly had, and in some places still have, a vote in the urban area in which they paid </span><a data-dcnode-id="9530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rates_%28tax%29" title="Rates (tax)"><span data-dcnode-id="9531" instrument_node="">rates</span></a><span data-dcnode-id="9529" instrument_node="">. This is an extension of the historical property-based franchise from </span><a data-dcnode-id="9527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_person" title="Natural person"><span data-dcnode-id="9528" instrument_node="">natural persons</span></a><span data-dcnode-id="9526" instrument_node=""> to other </span><a data-dcnode-id="9524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legal_person" title="Legal person"><span data-dcnode-id="9525" instrument_node="">legal persons</span></a><span data-dcnode-id="9523" instrument_node="">.
</span></p><p data-dcnode-id="9475"><span data-dcnode-id="9521" instrument_node="">In the United Kingdom, the </span><a class="mw-redirect" data-dcnode-id="9519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporation_of_the_City_of_London" title="Corporation of the City of London"><span data-dcnode-id="9520" instrument_node="">Corporation of the City of London</span></a><span data-dcnode-id="9518" instrument_node=""> has retained and even expanded business vote, following the passing of the </span><a data-dcnode-id="9516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/City_of_London_%28Ward_Elections%29_Act_2002" title="City of London (Ward Elections) Act 2002"><span data-dcnode-id="9517" instrument_node="">City of London (Ward Elections) Act 2002</span></a><span data-dcnode-id="9515" instrument_node="">. This has given business interests within the </span><a data-dcnode-id="9513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/City_of_London" title="City of London"><span data-dcnode-id="9514" instrument_node="">City of London</span></a><span data-dcnode-id="9512" instrument_node="">, which is a major </span><a data-dcnode-id="9510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_centre" title="Financial centre"><span data-dcnode-id="9511" instrument_node="">financial centre</span></a><span data-dcnode-id="9509" instrument_node=""> with few residents, the opportunity to apply the accumulated wealth of the corporation to the development of an effective </span><a data-dcnode-id="9507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lobbying" title="Lobbying"><span data-dcnode-id="9508" instrument_node="">lobby</span></a><span data-dcnode-id="9506" instrument_node=""> for UK policies.</span><sup class="reference" data-dcnode-id="9503" id="cite_ref-Johal2012_25-0"><a data-dcnode-id="9504" href="#cite_note-Johal2012-25"><span data-dcnode-id="9505" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="9500" id="cite_ref-groundhog_26-0"><a data-dcnode-id="9501" href="#cite_note-groundhog-26"><span data-dcnode-id="9502" instrument_node="">[26]</span></a></sup><span data-dcnode-id="9499" instrument_node=""> This includes having the </span><a data-dcnode-id="9497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/City_Remembrancer" title="City Remembrancer"><span data-dcnode-id="9498" instrument_node="">City Remembrancer</span></a><span data-dcnode-id="9496" instrument_node="">, financed by the </span><a data-dcnode-id="9494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/City%2527s_Cash" title="City's Cash"><span data-dcnode-id="9495" instrument_node="">City's Cash</span></a><span data-dcnode-id="9493" instrument_node="">, as a </span><a data-dcnode-id="9491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_agent" title="Parliamentary agent"><span data-dcnode-id="9492" instrument_node="">parliamentary agent</span></a><span data-dcnode-id="9490" instrument_node="">, provided with a special seat in the </span><a data-dcnode-id="9488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Commons_of_the_United_Kingdom" title="House of Commons of the United Kingdom"><span data-dcnode-id="9489" instrument_node="">House of Commons</span></a><span data-dcnode-id="9487" instrument_node=""> located in the under-gallery facing the </span><a data-dcnode-id="9485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speaker_of_the_House_of_Commons_%28United_Kingdom%29" title="Speaker of the House of Commons (United Kingdom)"><span data-dcnode-id="9486" instrument_node="">Speaker</span></a><span data-dcnode-id="9484" instrument_node="">'s chair.</span><sup class="reference" data-dcnode-id="9481" id="cite_ref-hansard-20140303_27-0"><a data-dcnode-id="9482" href="#cite_note-hansard-20140303-27"><span data-dcnode-id="9483" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9480" instrument_node=""> In a leaked document from 2012, an official report concerning the City's Cash revealed that the aim of major occasions such as set-piece sumptious banquets featuring national politicians was "to increase the emphasis on complementing hospitality with business meetings consistent with the City corporation's role in supporting the City as a financial centre".</span><sup class="reference" data-dcnode-id="9477" id="cite_ref-a_lesson_in_lobbying_28-0"><a data-dcnode-id="9478" href="#cite_note-a_lesson_in_lobbying-28"><span data-dcnode-id="9479" instrument_node="">[28]</span></a></sup><span data-dcnode-id="9476" instrument_node="">
</span></p><p data-dcnode-id="9466"><span data-dcnode-id="9474" instrument_node="">The first issue taken up by the </span><a data-dcnode-id="9472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Ireland_civil_rights_movement" title="Northern Ireland civil rights movement"><span data-dcnode-id="9473" instrument_node="">Northern Ireland civil rights movement</span></a><span data-dcnode-id="9471" instrument_node=""> was the business vote, abolished in 1968 (a year before it was abolished in Great Britain outside the City of London).</span><sup class="reference" data-dcnode-id="9468" id="cite_ref-AugheyMorrow2014_29-0"><a data-dcnode-id="9469" href="#cite_note-AugheyMorrow2014-29"><span data-dcnode-id="9470" instrument_node="">[29]</span></a></sup><span data-dcnode-id="9467" instrument_node="">
</span></p><p data-dcnode-id="9430"><span data-dcnode-id="9465" instrument_node="">In the </span><a data-dcnode-id="9463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Ireland" title="Republic of Ireland"><span data-dcnode-id="9464" instrument_node="">Republic of Ireland</span></a><span data-dcnode-id="9462" instrument_node="">, commercial ratepayers</span><sup class="reference" data-dcnode-id="9459" id="cite_ref-33"><a data-dcnode-id="9460" href="#cite_note-33"><span data-dcnode-id="9461" instrument_node="">[nb 1]</span></a></sup><span data-dcnode-id="9458" instrument_node=""> can vote in local </span><a class="mw-redirect" data-dcnode-id="9456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plebiscite" title="Plebiscite"><span data-dcnode-id="9457" instrument_node="">plebiscites</span></a><span data-dcnode-id="9455" instrument_node="">, for changing the </span><a data-dcnode-id="9453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_names_in_Ireland" title="Place names in Ireland"><span data-dcnode-id="9454" instrument_node="">name of the locality or street</span></a><span data-dcnode-id="9452" instrument_node="">,</span><sup class="reference" data-dcnode-id="9449" id="cite_ref-34"><a data-dcnode-id="9450" href="#cite_note-34"><span data-dcnode-id="9451" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="9446" id="cite_ref-37"><a data-dcnode-id="9447" href="#cite_note-37"><span data-dcnode-id="9448" instrument_node="">[nb 2]</span></a></sup><span data-dcnode-id="9445" instrument_node=""> or delimiting a </span><a data-dcnode-id="9443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_improvement_district" title="Business improvement district"><span data-dcnode-id="9444" instrument_node="">business improvement district</span></a><span data-dcnode-id="9442" instrument_node="">.</span><sup class="reference" data-dcnode-id="9439" id="cite_ref-38"><a data-dcnode-id="9440" href="#cite_note-38"><span data-dcnode-id="9441" instrument_node="">[36]</span></a></sup><span data-dcnode-id="9438" instrument_node=""> From 1930 to 1935, 5 of 35 members of </span><a data-dcnode-id="9436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dublin_City_Council" title="Dublin City Council"><span data-dcnode-id="9437" instrument_node="">Dublin City Council</span></a><span data-dcnode-id="9435" instrument_node=""> were "commercial members".</span><sup class="reference" data-dcnode-id="9432" id="cite_ref-39"><a data-dcnode-id="9433" href="#cite_note-39"><span data-dcnode-id="9434" instrument_node="">[37]</span></a></sup><span data-dcnode-id="9431" instrument_node="">
</span></p><p data-dcnode-id="9421"><span data-dcnode-id="9429" instrument_node="">In cities in most Australian states, voting is optional for businesses but compulsory for individuals.</span><sup class="reference" data-dcnode-id="9426" id="cite_ref-40"><a data-dcnode-id="9427" href="#cite_note-40"><span data-dcnode-id="9428" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="9423" id="cite_ref-41"><a data-dcnode-id="9424" href="#cite_note-41"><span data-dcnode-id="9425" instrument_node="">[39]</span></a></sup><span data-dcnode-id="9422" instrument_node="">
</span></p><span data-dcnode-id="9420" instrument_node="">
</span><h2 data-dcnode-id="9409"><span class="mw-headline" data-dcnode-id="9417" id="Basis_of_exclusion_from_suffrage"><span data-dcnode-id="9419" instrument_node="">Basis of exclusion from suffrage</span><span class="anchor" data-dcnode-id="9418" id="Forms_of_exclusion_from_suffrage"></span></span><span class="mw-editsection" data-dcnode-id="9410"><span class="mw-editsection-bracket" data-dcnode-id="9415"><span data-dcnode-id="9416" instrument_node="">[</span></span><a data-dcnode-id="9413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D10" title="Edit section: Basis of exclusion from suffrage"><span data-dcnode-id="9414" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9411"><span data-dcnode-id="9412" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9408" instrument_node="">
</span><h3 data-dcnode-id="9398"><span class="mw-headline" data-dcnode-id="9406" id="Gender"><span data-dcnode-id="9407" instrument_node="">Gender</span></span><span class="mw-editsection" data-dcnode-id="9399"><span class="mw-editsection-bracket" data-dcnode-id="9404"><span data-dcnode-id="9405" instrument_node="">[</span></span><a data-dcnode-id="9402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D11" title="Edit section: Gender"><span data-dcnode-id="9403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9400"><span data-dcnode-id="9401" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9397" instrument_node="">
</span><link data-dcnode-id="9396" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9392" role="note"><span data-dcnode-id="9395" instrument_node="">Main article: </span><a data-dcnode-id="9393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage" title="Women's suffrage"><span data-dcnode-id="9394" instrument_node="">Women's suffrage</span></a></div><span data-dcnode-id="9391" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9376"><div class="thumbinner" data-dcnode-id="9377" style="width:222px;"><a class="image" data-dcnode-id="9389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1912_Ohio_women_Headquarters.jpg"><img alt="" class="thumbimage" data-dcnode-id="9390" data-file-height="597" data-file-width="605" decoding="async" height="217" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/19/1912_Ohio_women_Headquarters.jpg/220px-1912_Ohio_women_Headquarters.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/19/1912_Ohio_women_Headquarters.jpg/330px-1912_Ohio_women_Headquarters.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/19/1912_Ohio_women_Headquarters.jpg/440px-1912_Ohio_women_Headquarters.jpg 2x" width="220"></a><span data-dcnode-id="9388" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9378"><div class="magnify" data-dcnode-id="9386"><a class="internal" data-dcnode-id="9387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1912_Ohio_women_Headquarters.jpg" title="Enlarge"></a></div><span data-dcnode-id="9385" instrument_node="">Women's Suffrage Headquarters on Euclid Avenue in </span><a data-dcnode-id="9383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cleveland" title="Cleveland"><span data-dcnode-id="9384" instrument_node="">Cleveland</span></a><span data-dcnode-id="9382" instrument_node="">, </span><a data-dcnode-id="9380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ohio" title="Ohio"><span data-dcnode-id="9381" instrument_node="">Ohio</span></a><span data-dcnode-id="9379" instrument_node=""> in 1912</span></div></div></div><span data-dcnode-id="9375" instrument_node="">
</span><p data-dcnode-id="9360"><span data-dcnode-id="9374" instrument_node="">In ancient </span><a data-dcnode-id="9372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athenian_democracy" title="Athenian democracy"><span data-dcnode-id="9373" instrument_node="">Athens</span></a><span data-dcnode-id="9371" instrument_node="">, often cited as the birthplace of democracy, only adult, male citizens who owned land were permitted to vote. Through subsequent centuries, Europe was generally ruled by monarchs, though various forms of parliament arose at different times. The high rank ascribed to </span><a data-dcnode-id="9369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbess" title="Abbess"><span data-dcnode-id="9370" instrument_node="">abbesses</span></a><span data-dcnode-id="9368" instrument_node=""> within the </span><a data-dcnode-id="9366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church" title="Catholic Church"><span data-dcnode-id="9367" instrument_node="">Catholic Church</span></a><span data-dcnode-id="9365" instrument_node=""> permitted some women the right to sit and vote at national assemblies – as with various high-ranking abbesses in Medieval Germany, who were ranked among the independent princes of the empire. Their Protestant successors enjoyed the same privilege almost into modern times.</span><sup class="reference" data-dcnode-id="9362" id="cite_ref-42"><a data-dcnode-id="9363" href="#cite_note-42"><span data-dcnode-id="9364" instrument_node="">[40]</span></a></sup><span data-dcnode-id="9361" instrument_node="">
</span></p><p data-dcnode-id="9342"><span data-dcnode-id="9359" instrument_node="">Marie Guyart, a French nun who worked with the </span><a data-dcnode-id="9357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Nations_in_Canada" title="First Nations in Canada"><span data-dcnode-id="9358" instrument_node="">First Nations</span></a><span data-dcnode-id="9356" instrument_node=""> peoples of Canada during the seventeenth century, wrote in 1654 regarding the suffrage practices of </span><a data-dcnode-id="9354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iroquois" title="Iroquois"><span data-dcnode-id="9355" instrument_node="">Iroquois</span></a><span data-dcnode-id="9353" instrument_node=""> women, "These female chieftains are women of standing amongst the savages, and they have a deciding vote in the councils. They make decisions there like the men, and it is they who even delegated the first ambassadors to discuss peace."</span><sup class="reference" data-dcnode-id="9350" id="cite_ref-43"><a data-dcnode-id="9351" href="#cite_note-43"><span data-dcnode-id="9352" instrument_node="">[41]</span></a></sup><span data-dcnode-id="9349" instrument_node=""> The Iroquois, like many First Nations peoples in North America, had a </span><a class="mw-redirect" data-dcnode-id="9347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matrilineal" title="Matrilineal"><span data-dcnode-id="9348" instrument_node="">matrilineal</span></a><span data-dcnode-id="9346" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="9344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kinship_system" title="Kinship system"><span data-dcnode-id="9345" instrument_node="">kinship system</span></a><span data-dcnode-id="9343" instrument_node="">. Property and descent were passed through the female line. Women elders voted on hereditary male chiefs and could depose them.
</span></p><p data-dcnode-id="9337"><span data-dcnode-id="9341" instrument_node="">The emergence of modern democracy generally began with male citizens obtaining the right to vote in advance of female citizens, except in the </span><a class="mw-redirect" data-dcnode-id="9339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Hawai%2527i" title="Kingdom of Hawai'i"><span data-dcnode-id="9340" instrument_node="">Kingdom of Hawai'i</span></a><span data-dcnode-id="9338" instrument_node="">, where universal suffrage without mention of age or sex was introduced in 1840; however, a constitutional amendment in 1852 rescinded female voting and put property qualifications on male voting.
</span></p><p data-dcnode-id="9323"><span data-dcnode-id="9336" instrument_node="">Voting rights for women were introduced into </span><a data-dcnode-id="9334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_law" title="International law"><span data-dcnode-id="9335" instrument_node="">international law</span></a><span data-dcnode-id="9333" instrument_node=""> by the United Nations' Human Rights Commission, whose elected chair was </span><a data-dcnode-id="9331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eleanor_Roosevelt" title="Eleanor Roosevelt"><span data-dcnode-id="9332" instrument_node="">Eleanor Roosevelt</span></a><span data-dcnode-id="9330" instrument_node="">. In&nbsp;1948 the </span><a data-dcnode-id="9328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="9329" instrument_node="">United Nations</span></a><span data-dcnode-id="9327" instrument_node=""> adopted the </span><a data-dcnode-id="9325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Declaration_of_Human_Rights" title="Universal Declaration of Human Rights"><span data-dcnode-id="9326" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="9324" instrument_node="">; Article&nbsp;21 stated: "(1) Everyone has the right to take part in the government of his country, directly or through freely chosen representatives. (3) The will of the people shall be the basis of the authority of government; this will shall be expressed in periodic and genuine elections which shall be by universal and equal suffrage and shall be held by secret vote or by equivalent free voting procedures."
</span></p><p data-dcnode-id="9296"><span data-dcnode-id="9322" instrument_node="">The </span><a data-dcnode-id="9320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_General_Assembly" title="United Nations General Assembly"><span data-dcnode-id="9321" instrument_node="">United Nations General Assembly</span></a><span data-dcnode-id="9319" instrument_node=""> adopted the </span><a data-dcnode-id="9317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Political_Rights_of_Women" title="Convention on the Political Rights of Women"><span data-dcnode-id="9318" instrument_node="">Convention on the Political Rights of Women</span></a><span data-dcnode-id="9316" instrument_node="">, which went into force in&nbsp;1954, enshrining the equal rights of women to vote, hold office, and access public services as set out by national laws. One of the most recent jurisdictions to acknowledge women's full right to vote was </span><a data-dcnode-id="9314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhutan" title="Bhutan"><span data-dcnode-id="9315" instrument_node="">Bhutan</span></a><span data-dcnode-id="9313" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="9311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_Bhutanese_general_election" title="2008 Bhutanese general election"><span data-dcnode-id="9312" instrument_node="">2008</span></a><span data-dcnode-id="9310" instrument_node=""> (its first national elections).</span><sup class="reference" data-dcnode-id="9307" id="cite_ref-44"><a data-dcnode-id="9308" href="#cite_note-44"><span data-dcnode-id="9309" instrument_node="">[42]</span></a></sup><span data-dcnode-id="9306" instrument_node=""> Most recently, in 2011 </span><a data-dcnode-id="9304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abdullah_of_Saudi_Arabia" title="Abdullah of Saudi Arabia"><span data-dcnode-id="9305" instrument_node="">King Abdullah</span></a><span data-dcnode-id="9303" instrument_node=""> of Saudi Arabia let women vote in the </span><a data-dcnode-id="9301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2015_Saudi_Arabian_municipal_elections" title="2015 Saudi Arabian municipal elections"><span data-dcnode-id="9302" instrument_node="">2015 local elections</span></a><span data-dcnode-id="9300" instrument_node=""> (and from then on) and be appointed to the </span><a data-dcnode-id="9298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consultative_Assembly_of_Saudi_Arabia" title="Consultative Assembly of Saudi Arabia"><span data-dcnode-id="9299" instrument_node="">Consultative Assembly</span></a><span data-dcnode-id="9297" instrument_node="">.
</span></p><span data-dcnode-id="9295" instrument_node="">
</span><h3 data-dcnode-id="9285"><span class="mw-headline" data-dcnode-id="9293" id="Religion"><span data-dcnode-id="9294" instrument_node="">Religion</span></span><span class="mw-editsection" data-dcnode-id="9286"><span class="mw-editsection-bracket" data-dcnode-id="9291"><span data-dcnode-id="9292" instrument_node="">[</span></span><a data-dcnode-id="9289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D12" title="Edit section: Religion"><span data-dcnode-id="9290" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9287"><span data-dcnode-id="9288" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9284" instrument_node="">
</span><p data-dcnode-id="9267"><span data-dcnode-id="9283" instrument_node="">In the aftermath of the </span><a class="mw-redirect" data-dcnode-id="9281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestant_Reformation" title="Protestant Reformation"><span data-dcnode-id="9282" instrument_node="">Reformation</span></a><span data-dcnode-id="9280" instrument_node=""> it was common in European countries for people of disfavored </span><a class="mw-redirect" data-dcnode-id="9278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_denominations" title="Religious denominations"><span data-dcnode-id="9279" instrument_node="">religious denominations</span></a><span data-dcnode-id="9277" instrument_node=""> to be denied civil and political rights, often including the right to vote, to stand for election or to sit in parliament. In </span><a data-dcnode-id="9275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Great_Britain" title="Kingdom of Great Britain"><span data-dcnode-id="9276" instrument_node="">Great Britain</span></a><span data-dcnode-id="9274" instrument_node=""> and </span><a data-dcnode-id="9272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Ireland" title="Kingdom of Ireland"><span data-dcnode-id="9273" instrument_node="">Ireland</span></a><span data-dcnode-id="9271" instrument_node="">, Roman Catholics were denied the right to vote from 1728 to 1793, and the right to sit in parliament until 1829. The anti-Catholic policy was justified on the grounds that the loyalty of Catholics supposedly lay with the </span><a data-dcnode-id="9269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pope" title="Pope"><span data-dcnode-id="9270" instrument_node="">Pope</span></a><span data-dcnode-id="9268" instrument_node=""> rather than the national monarch.
</span></p><p data-dcnode-id="9232"><span data-dcnode-id="9266" instrument_node="">In England and Ireland, several Acts practically disenfranchised non-Anglicans or non-Protestants by imposing an oath before admission to vote or to stand for office. The 1672 and 1678 </span><a data-dcnode-id="9264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Test_Act" title="Test Act"><span data-dcnode-id="9265" instrument_node="">Test Acts</span></a><span data-dcnode-id="9263" instrument_node=""> forbade non-Anglicans to hold public offices, and the 1727 </span><a class="mw-redirect" data-dcnode-id="9261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disenfranchising_Act" title="Disenfranchising Act"><span data-dcnode-id="9262" instrument_node="">Disenfranchising Act</span></a><span data-dcnode-id="9260" instrument_node=""> took away Catholics' voting rights in Ireland, which were restored only in 1788. Jews could not even be naturalized. An attempt was made to change this situation, but the </span><a class="mw-redirect" data-dcnode-id="9258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_Naturalization_Act_1753" title="Jewish Naturalization Act 1753"><span data-dcnode-id="9259" instrument_node="">Jewish Naturalization Act 1753</span></a><span data-dcnode-id="9257" instrument_node=""> provoked such reactions that it was repealed the following year. </span><a data-dcnode-id="9255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonconformist_%28Protestantism%29" title="Nonconformist (Protestantism)"><span data-dcnode-id="9256" instrument_node="">Nonconformists</span></a><span data-dcnode-id="9254" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="9252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Methodi
