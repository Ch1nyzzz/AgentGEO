</span><li data-dcnode-id="6889"><span data-dcnode-id="6896" instrument_node="">1981 – The first election of the </span><a data-dcnode-id="6894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_African_Indian_Council" title="South African Indian Council"><span data-dcnode-id="6895" instrument_node="">South African Indian Council</span></a><span data-dcnode-id="6893" instrument_node=""> (SAIC), which has limited legislative powers, is held. Every </span><a class="mw-redirect" data-dcnode-id="6891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_South_African" title="Indian South African"><span data-dcnode-id="6892" instrument_node="">Indian South African</span></a><span data-dcnode-id="6890" instrument_node=""> citizen over the age of 18 can vote for its members, in first-past-the-post elections in single-member constituencies.</span></li><span data-dcnode-id="6888" instrument_node="">
</span><li data-dcnode-id="6874"><span data-dcnode-id="6887" instrument_node="">1984 – The </span><a data-dcnode-id="6885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_African_Constitution_of_1983" title="South African Constitution of 1983"><span data-dcnode-id="6886" instrument_node="">Constitution of 1983</span></a><span data-dcnode-id="6884" instrument_node=""> establishes the </span><a data-dcnode-id="6882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tricameral_Parliament" title="Tricameral Parliament"><span data-dcnode-id="6883" instrument_node="">Tricameral Parliament</span></a><span data-dcnode-id="6881" instrument_node="">. Two new Houses of Parliament are created, the </span><a data-dcnode-id="6879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Representatives_%28South_Africa%29" title="House of Representatives (South Africa)"><span data-dcnode-id="6880" instrument_node="">House of Representatives</span></a><span data-dcnode-id="6878" instrument_node=""> to represent coloured citizens and the </span><a data-dcnode-id="6876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Delegates_%28South_Africa%29" title="House of Delegates (South Africa)"><span data-dcnode-id="6877" instrument_node="">House of Delegates</span></a><span data-dcnode-id="6875" instrument_node=""> to represent Indian citizens. Every coloured and Indian citizen over the age of 18 can vote in elections for the relevant house. As with the House of Assembly, the members are elected by first-past-the-post voting in single-member constituencies. The CPRC and SAIC are abolished.</span></li><span data-dcnode-id="6873" instrument_node="">
</span><li data-dcnode-id="6853"><span data-dcnode-id="6872" instrument_node="">1994 – With the end of </span><a data-dcnode-id="6870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apartheid" title="Apartheid"><span data-dcnode-id="6871" instrument_node="">apartheid</span></a><span data-dcnode-id="6869" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="6867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_African_Constitution_of_1993" title="South African Constitution of 1993"><span data-dcnode-id="6868" instrument_node="">Interim Constitution of 1993</span></a><span data-dcnode-id="6866" instrument_node=""> abolishes the Tricameral Parliament and all racial discrimination in voting rights. A new </span><a data-dcnode-id="6864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Assembly_of_South_Africa" title="National Assembly of South Africa"><span data-dcnode-id="6865" instrument_node="">National Assembly</span></a><span data-dcnode-id="6863" instrument_node=""> is created, and every South African citizen over the age of 18 has the right to vote for the assembly. The right to vote is also extended to long term residents. It is estimated the 500 000 foreign nationals voted in the 1994 national and provincial elections. Elections of the assembly are based on </span><a data-dcnode-id="6861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Party-list_proportional_representation" title="Party-list proportional representation"><span data-dcnode-id="6862" instrument_node="">party-list proportional representation</span></a><span data-dcnode-id="6860" instrument_node="">. The </span><a class="mw-redirect" data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_vote" title="Right to vote"><span data-dcnode-id="6859" instrument_node="">right to vote</span></a><span data-dcnode-id="6857" instrument_node=""> is enshrined in the </span><a class="mw-redirect" data-dcnode-id="6855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_of_Rights_%28South_Africa%29" title="Bill of Rights (South Africa)"><span data-dcnode-id="6856" instrument_node="">Bill of Rights</span></a><span data-dcnode-id="6854" instrument_node="">.</span></li><span data-dcnode-id="6852" instrument_node="">
</span><li data-dcnode-id="6843"><span data-dcnode-id="6851" instrument_node="">1999 – In </span><i data-dcnode-id="6848"><a class="new" data-dcnode-id="6849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAugust_and_Another_v_Electoral_Commission_and_Others%26action%3Dedit%26redlink%3D1" title="August and Another v Electoral Commission and Others (page does not exist)"><span data-dcnode-id="6850" instrument_node="">August and Another v Electoral Commission and Others</span></a></i><span data-dcnode-id="6847" instrument_node=""> the </span><a data-dcnode-id="6845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitutional_Court_of_South_Africa" title="Constitutional Court of South Africa"><span data-dcnode-id="6846" instrument_node="">Constitutional Court</span></a><span data-dcnode-id="6844" instrument_node=""> rules that prisoners cannot be denied the right to vote without a law that explicitly does so.</span></li><span data-dcnode-id="6842" instrument_node="">
</span><li data-dcnode-id="6837"><span data-dcnode-id="6841" instrument_node="">2003 – The </span><a class="new" data-dcnode-id="6839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_Laws_Amendment_Act%2C_2003%26action%3Dedit%26redlink%3D1" title="Electoral Laws Amendment Act, 2003 (page does not exist)"><span data-dcnode-id="6840" instrument_node="">Electoral Laws Amendment Act, 2003</span></a><span data-dcnode-id="6838" instrument_node=""> purports to prohibit convicted prisoners from voting.</span></li><span data-dcnode-id="6836" instrument_node="">
</span><li data-dcnode-id="6830"><span data-dcnode-id="6835" instrument_node="">2004 – In </span><i data-dcnode-id="6832"><a class="new" data-dcnode-id="6833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMinister_of_Home_Affairs_v_NICRO_and_Others%26action%3Dedit%26redlink%3D1" title="Minister of Home Affairs v NICRO and Others (page does not exist)"><span data-dcnode-id="6834" instrument_node="">Minister of Home Affairs v NICRO and Others</span></a></i><span data-dcnode-id="6831" instrument_node=""> the Constitutional Court rules that prisoners cannot be denied the right to vote, and invalidates the laws that do so.</span></li><span data-dcnode-id="6829" instrument_node="">
</span><li data-dcnode-id="6823"><span data-dcnode-id="6828" instrument_node="">2009 – In </span><i data-dcnode-id="6825"><a class="new" data-dcnode-id="6826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRichter_v_Minister_for_Home_Affairs_and_Others%26action%3Dedit%26redlink%3D1" title="Richter v Minister for Home Affairs and Others (page does not exist)"><span data-dcnode-id="6827" instrument_node="">Richter v Minister for Home Affairs and Others</span></a></i><span data-dcnode-id="6824" instrument_node=""> the Constitutional Court rules that South African citizens outside the country cannot be denied the right to vote.</span></li></ul><span data-dcnode-id="6821" instrument_node="">
</span><h3 data-dcnode-id="6811"><span class="mw-headline" data-dcnode-id="6819" id="Sweden"><span data-dcnode-id="6820" instrument_node="">Sweden</span></span><span class="mw-editsection" data-dcnode-id="6812"><span class="mw-editsection-bracket" data-dcnode-id="6817"><span data-dcnode-id="6818" instrument_node="">[</span></span><a data-dcnode-id="6815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D43" title="Edit section: Sweden"><span data-dcnode-id="6816" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6810" instrument_node="">
</span><ul data-dcnode-id="6654"><li data-dcnode-id="6799"><span data-dcnode-id="6809" instrument_node="">1809 – New </span><a data-dcnode-id="6807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution" title="Constitution"><span data-dcnode-id="6808" instrument_node="">constitution</span></a><span data-dcnode-id="6806" instrument_node=""> adopted and </span><a class="mw-redirect" data-dcnode-id="6804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Separation_of_power" title="Separation of power"><span data-dcnode-id="6805" instrument_node="">separation of powers</span></a><span data-dcnode-id="6803" instrument_node=""> outlined in the </span><a data-dcnode-id="6801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Instrument_of_Government_%281809%29" title="Instrument of Government (1809)"><span data-dcnode-id="6802" instrument_node="">Instrument of Government</span></a><span data-dcnode-id="6800" instrument_node="">.</span></li><span data-dcnode-id="6798" instrument_node="">
</span><li data-dcnode-id="6790"><span data-dcnode-id="6797" instrument_node="">1810 – The </span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swedish_Parliament_Act_of_1810" title="Swedish Parliament Act of 1810"><span data-dcnode-id="6796" instrument_node="">Riksdag Act</span></a><span data-dcnode-id="6794" instrument_node="">, setting out the procedures of functioning of the </span><a data-dcnode-id="6792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Riksdag" title="Riksdag"><span data-dcnode-id="6793" instrument_node="">Riksdag</span></a><span data-dcnode-id="6791" instrument_node="">, is introduced.</span></li><span data-dcnode-id="6789" instrument_node="">
</span><li data-dcnode-id="6781"><span data-dcnode-id="6788" instrument_node="">1862 – Under the </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swedish_municipal_reforms_of_1862" title="Swedish municipal reforms of 1862"><span data-dcnode-id="6787" instrument_node="">municipal laws of 1862</span></a><span data-dcnode-id="6785" instrument_node="">, some women were entitled to vote in </span><a class="mw-redirect" data-dcnode-id="6783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_elections" title="Local elections"><span data-dcnode-id="6784" instrument_node="">local elections</span></a><span data-dcnode-id="6782" instrument_node="">.</span></li><span data-dcnode-id="6780" instrument_node="">
</span><li data-dcnode-id="6769"><span data-dcnode-id="6779" instrument_node="">1865 – </span><a class="new" data-dcnode-id="6777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParliament_of_Four_Estates%26action%3Dedit%26redlink%3D1" title="Parliament of Four Estates (page does not exist)"><span data-dcnode-id="6778" instrument_node="">Parliament of Four Estates</span></a><span data-dcnode-id="6776" instrument_node=""> abolished and replaced by a </span><a class="mw-redirect" data-dcnode-id="6774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bicameral" title="Bicameral"><span data-dcnode-id="6775" instrument_node="">bicameral</span></a><span data-dcnode-id="6773" instrument_node=""> </span><a data-dcnode-id="6771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legislature" title="Legislature"><span data-dcnode-id="6772" instrument_node="">legislature</span></a><span data-dcnode-id="6770" instrument_node="">. The members of the First Chamber were elected indirectly by the county councils and the municipal assemblies in the larger towns and cities.</span></li><span data-dcnode-id="6768" instrument_node="">
</span><li data-dcnode-id="6760"><span data-dcnode-id="6767" instrument_node="">1909 – All men who had done their </span><a data-dcnode-id="6765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_service" title="Military service"><span data-dcnode-id="6766" instrument_node="">military service</span></a><span data-dcnode-id="6764" instrument_node=""> and who paid </span><a data-dcnode-id="6762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax" title="Tax"><span data-dcnode-id="6763" instrument_node="">tax</span></a><span data-dcnode-id="6761" instrument_node=""> were granted suffrage.</span></li><span data-dcnode-id="6759" instrument_node="">
</span><li data-dcnode-id="6748"><span data-dcnode-id="6758" instrument_node="">1918 – </span><a class="mw-redirect" data-dcnode-id="6756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Suffrage" title="Universal Suffrage"><span data-dcnode-id="6757" instrument_node="">Universal</span></a><span data-dcnode-id="6755" instrument_node="">, and </span><a data-dcnode-id="6753" href="#Equal_suffrage"><span data-dcnode-id="6754" instrument_node="">equal</span></a><span data-dcnode-id="6752" instrument_node=""> suffrage were introduced for </span><a class="mw-redirect" data-dcnode-id="6750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_elections" title="Local elections"><span data-dcnode-id="6751" instrument_node="">local elections</span></a><span data-dcnode-id="6749" instrument_node="">.</span></li><span data-dcnode-id="6747" instrument_node="">
</span><li data-dcnode-id="6736"><span data-dcnode-id="6746" instrument_node="">1919 – </span><a class="mw-redirect" data-dcnode-id="6744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Suffrage" title="Universal Suffrage"><span data-dcnode-id="6745" instrument_node="">Universal</span></a><span data-dcnode-id="6743" instrument_node="">, </span><a data-dcnode-id="6741" href="#Equal_suffrage"><span data-dcnode-id="6742" instrument_node="">equal</span></a><span data-dcnode-id="6740" instrument_node="">, and </span><a data-dcnode-id="6738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage" title="Women's suffrage"><span data-dcnode-id="6739" instrument_node="">women's suffrage</span></a><span data-dcnode-id="6737" instrument_node=""> granted for general elections.</span></li><span data-dcnode-id="6735" instrument_node="">
</span><li data-dcnode-id="6721"><span data-dcnode-id="6734" instrument_node="">1921 – First </span><a data-dcnode-id="6732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1921_Swedish_general_election" title="1921 Swedish general election"><span data-dcnode-id="6733" instrument_node="">general election</span></a><span data-dcnode-id="6731" instrument_node=""> with </span><a class="mw-redirect" data-dcnode-id="6729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Suffrage" title="Universal Suffrage"><span data-dcnode-id="6730" instrument_node="">universal</span></a><span data-dcnode-id="6728" instrument_node="">, </span><a data-dcnode-id="6726" href="#Equal_suffrage"><span data-dcnode-id="6727" instrument_node="">equal</span></a><span data-dcnode-id="6725" instrument_node="">, and </span><a data-dcnode-id="6723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage" title="Women's suffrage"><span data-dcnode-id="6724" instrument_node="">women's suffrage</span></a><span data-dcnode-id="6722" instrument_node=""> enacted, although some groups were still unable to vote.</span></li><span data-dcnode-id="6720" instrument_node="">
</span><li data-dcnode-id="6715"><span data-dcnode-id="6719" instrument_node="">1922 – Requirement that men had to have completed national </span><a data-dcnode-id="6717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_service" title="Military service"><span data-dcnode-id="6718" instrument_node="">military service</span></a><span data-dcnode-id="6716" instrument_node=""> to be able to vote abolished.</span></li><span data-dcnode-id="6714" instrument_node="">
</span><li data-dcnode-id="6703"><span data-dcnode-id="6713" instrument_node="">1937 – </span><a class="mw-redirect" data-dcnode-id="6711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intern" title="Intern"><span data-dcnode-id="6712" instrument_node="">Interns</span></a><span data-dcnode-id="6710" instrument_node=""> in </span><a data-dcnode-id="6708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prison" title="Prison"><span data-dcnode-id="6709" instrument_node="">prisons</span></a><span data-dcnode-id="6707" instrument_node=""> and </span><a data-dcnode-id="6705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychiatric_hospital" title="Psychiatric hospital"><span data-dcnode-id="6706" instrument_node="">institutions</span></a><span data-dcnode-id="6704" instrument_node=""> granted suffrage.</span></li><span data-dcnode-id="6702" instrument_node="">
</span><li data-dcnode-id="6694"><span data-dcnode-id="6701" instrument_node="">1945 – Individuals who had gone into </span><a data-dcnode-id="6699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bankruptcy" title="Bankruptcy"><span data-dcnode-id="6700" instrument_node="">bankruptcy</span></a><span data-dcnode-id="6698" instrument_node=""> or were dependent on </span><a data-dcnode-id="6696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare" title="Welfare"><span data-dcnode-id="6697" instrument_node="">welfare</span></a><span data-dcnode-id="6695" instrument_node=""> granted suffrage.</span></li><span data-dcnode-id="6693" instrument_node="">
</span><li data-dcnode-id="6678"><span data-dcnode-id="6692" instrument_node="">1970 – Indirectly elected </span><a class="mw-redirect" data-dcnode-id="6690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Upper_chamber" title="Upper chamber"><span data-dcnode-id="6691" instrument_node="">upper chamber</span></a><span data-dcnode-id="6689" instrument_node=""> dismantled.</span><sup class="reference" data-dcnode-id="6686" id="cite_ref-109"><a data-dcnode-id="6687" href="#cite_note-109"><span data-dcnode-id="6688" instrument_node="">[107]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="6679" style="white-space:nowrap;"><span data-dcnode-id="6685" instrument_node="">[</span><i data-dcnode-id="6681"><a data-dcnode-id="6682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWriting_better_articles%23Stay_on_topic" title="Wikipedia:Writing better articles"><span data-dcnode-id="6683" title="The material near this tag may contain information that is not relevant to the article's main topic. (May 2018)"><span data-dcnode-id="6684" instrument_node="">relevance questioned</span></span></a></i><span data-dcnode-id="6680" instrument_node="">]</span></sup></li><span data-dcnode-id="6677" instrument_node="">
</span><li data-dcnode-id="6664"><span data-dcnode-id="6676" instrument_node="">1974 – </span><a data-dcnode-id="6674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Instrument_of_Government_%281809%29" title="Instrument of Government (1809)"><span data-dcnode-id="6675" instrument_node="">Instrument of Government</span></a><span data-dcnode-id="6673" instrument_node=""> stopped being enforced.</span><sup class="noprint Inline-Template" data-dcnode-id="6666" style="white-space:nowrap;"><span data-dcnode-id="6672" instrument_node="">[</span><i data-dcnode-id="6668"><a class="mw-redirect" data-dcnode-id="6669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APCR" title="Wikipedia:PCR"><span data-dcnode-id="6670" title="The material near this tag may lack sufficient context (May 2018)"><span data-dcnode-id="6671" instrument_node="">needs context</span></span></a></i><span data-dcnode-id="6667" instrument_node="">]</span></sup><span data-dcnode-id="6665" instrument_node="">.</span></li><span data-dcnode-id="6663" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="6564"><div class="thumbinner" data-dcnode-id="6565" style="width:222px;"><a class="image" data-dcnode-id="6574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_national_convention._As_it_met_on_Monday_the_4th_of_February%2C_1839%2C_at_the_British_Coffee_House_ca._1839_LCCN2004669356.jpg"><img alt="" class="thumbimage" data-dcnode-id="6575" data-file-height="5662" data-file-width="7590" decoding="async" height="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/55/The_national_convention._As_it_met_on_Monday_the_4th_of_February%252C_1839%252C_at_the_British_Coffee_House_ca._1839_LCCN2004669356.jpg/220px-The_national_convention._As_it_met_on_Monday_the_4th_of_February%252C_1839%252C_at_the_British_Coffee_House_ca._1839_LCCN2004669356.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/55/The_national_convention._As_it_met_on_Monday_the_4th_of_February%2C_1839%2C_at_the_British_Coffee_House_ca._1839_LCCN2004669356.jpg/330px-The_national_convention._As_it_met_on_Monday_the_4th_of_February%2C_1839%2C_at_the_British_Coffee_House_ca._1839_LCCN2004669356.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/55/The_national_convention._As_it_met_on_Monday_the_4th_of_February%2C_1839%2C_at_the_British_Coffee_House_ca._1839_LCCN2004669356.jpg/440px-The_national_convention._As_it_met_on_Monday_the_4th_of_February%2C_1839%2C_at_the_British_Coffee_House_ca._1839_LCCN2004669356.jpg 2x" width="220"></a><span data-dcnode-id="6573" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6566"><div class="magnify" data-dcnode-id="6571"><a class="internal" data-dcnode-id="6572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_national_convention._As_it_met_on_Monday_the_4th_of_February%2C_1839%2C_at_the_British_Coffee_House_ca._1839_LCCN2004669356.jpg" title="Enlarge"></a></div><span data-dcnode-id="6570" instrument_node="">The </span><a data-dcnode-id="6568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chartism" title="Chartism"><span data-dcnode-id="6569" instrument_node="">Chartists'</span></a><span data-dcnode-id="6567" instrument_node=""> National Convention at the British Coffee House in February 1839</span></div></div></div><span data-dcnode-id="6563" instrument_node="">
</span><p data-dcnode-id="6509"><span data-dcnode-id="6562" instrument_node="">From 1265, a few percent of the adult male population in the </span><a data-dcnode-id="6560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_England" title="Kingdom of England"><span data-dcnode-id="6561" instrument_node="">Kingdom of England</span></a><span data-dcnode-id="6559" instrument_node=""> (of which Wales was a </span><a data-dcnode-id="6557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laws_in_Wales_Acts_1535_and_1542" title="Laws in Wales Acts 1535 and 1542"><span data-dcnode-id="6558" instrument_node="">full and equal member from 1542</span></a><span data-dcnode-id="6556" instrument_node="">) were able to vote in </span><a class="mw-redirect" data-dcnode-id="6554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Parliaments_of_England" title="List of Parliaments of England"><span data-dcnode-id="6555" instrument_node="">parliamentary elections</span></a><span data-dcnode-id="6553" instrument_node=""> that occurred at irregular intervals to the </span><a data-dcnode-id="6551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_England" title="Parliament of England"><span data-dcnode-id="6552" instrument_node="">Parliament of England</span></a><span data-dcnode-id="6550" instrument_node="">.</span><sup class="reference" data-dcnode-id="6547" id="cite_ref-Origins_111-0"><a data-dcnode-id="6548" href="#cite_note-Origins-111"><span data-dcnode-id="6549" instrument_node="">[109]</span></a></sup><sup class="reference" data-dcnode-id="6544" id="cite_ref-112"><a data-dcnode-id="6545" href="#cite_note-112"><span data-dcnode-id="6546" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6543" instrument_node=""> The franchise for the </span><a data-dcnode-id="6541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_Scotland" title="Parliament of Scotland"><span data-dcnode-id="6542" instrument_node="">Parliament of Scotland</span></a><span data-dcnode-id="6540" instrument_node=""> developed separately. King </span><a data-dcnode-id="6538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_VI_of_England" title="Henry VI of England"><span data-dcnode-id="6539" instrument_node="">Henry VI of England</span></a><span data-dcnode-id="6537" instrument_node=""> established in 1432 that only </span><a class="mw-redirect" data-dcnode-id="6535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forty_shilling_freeholders" title="Forty shilling freeholders"><span data-dcnode-id="6536" instrument_node="">owners of property worth at least forty shillings</span></a><span data-dcnode-id="6534" instrument_node="">, a significant sum, were entitled to vote in an English </span><a class="mw-redirect" data-dcnode-id="6532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/County_constituency" title="County constituency"><span data-dcnode-id="6533" instrument_node="">county constituency</span></a><span data-dcnode-id="6531" instrument_node="">. The franchise was restricted to males by custom rather than statute.</span><sup class="reference" data-dcnode-id="6528" id="cite_ref-113"><a data-dcnode-id="6529" href="#cite_note-113"><span data-dcnode-id="6530" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6527" instrument_node=""> Changes were made to the details of the system, but there was no major reform until the </span><a data-dcnode-id="6525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Act_1832%23The_franchise" title="Reform Act 1832"><span data-dcnode-id="6526" instrument_node="">Reform Act 1832</span></a><span data-dcnode-id="6524" instrument_node="">.</span><sup class="reference" data-dcnode-id="6521" id="cite_ref-115"><a data-dcnode-id="6522" href="#cite_note-115"><span data-dcnode-id="6523" instrument_node="">[nb 3]</span></a></sup><span data-dcnode-id="6520" instrument_node=""> A series of </span><a data-dcnode-id="6518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Act" title="Reform Act"><span data-dcnode-id="6519" instrument_node="">Reform Acts</span></a><span data-dcnode-id="6517" instrument_node=""> and </span><a data-dcnode-id="6515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act" title="Representation of the People Act"><span data-dcnode-id="6516" instrument_node="">Representation of the People Acts</span></a><span data-dcnode-id="6514" instrument_node=""> followed. In 1918, all men over 21 and some women over 30 won the right to vote, and in 1928 all women over 21 won the right to vote resulting in universal suffrage.</span><sup class="reference" data-dcnode-id="6511" id="cite_ref-116"><a data-dcnode-id="6512" href="#cite_note-116"><span data-dcnode-id="6513" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6510" instrument_node="">
</span></p><span data-dcnode-id="6508" instrument_node="">
</span><ul data-dcnode-id="6431"><li data-dcnode-id="6501"><a data-dcnode-id="6506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laws_in_Wales_Acts_1535_and_1542" title="Laws in Wales Acts 1535 and 1542"><span data-dcnode-id="6507" instrument_node="">The Laws in Wales Acts 1535</span></a><span data-dcnode-id="6505" instrument_node=""> – Legislation provides for Welsh representatives in the House of Commons</span><sup class="reference" data-dcnode-id="6502" id="cite_ref-:3_117-0"><a data-dcnode-id="6503" href="#cite_note-:3-117"><span data-dcnode-id="6504" instrument_node="">[114]</span></a></sup></li><span data-dcnode-id="6500" instrument_node="">
</span><li data-dcnode-id="6493"><a data-dcnode-id="6498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acts_of_Union_1707" title="Acts of Union 1707"><span data-dcnode-id="6499" instrument_node="">The Acts of Union 1707</span></a><span data-dcnode-id="6497" instrument_node=""> – Scotland allocated 45 seats in the House of Commons</span><sup class="reference" data-dcnode-id="6494" id="cite_ref-:3_117-1"><a data-dcnode-id="6495" href="#cite_note-:3-117"><span data-dcnode-id="6496" instrument_node="">[114]</span></a></sup></li><span data-dcnode-id="6492" instrument_node="">
</span><li data-dcnode-id="6487"><span data-dcnode-id="6491" instrument_node="">1729 – Bribery Act passed to address corruption in elections</span><sup class="reference" data-dcnode-id="6488" id="cite_ref-:3_117-2"><a data-dcnode-id="6489" href="#cite_note-:3-117"><span data-dcnode-id="6490" instrument_node="">[114]</span></a></sup></li><span data-dcnode-id="6486" instrument_node="">
</span><li data-dcnode-id="6479"><a data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acts_of_Union_1800" title="Acts of Union 1800"><span data-dcnode-id="6485" instrument_node="">Acts of Union 1800</span></a><span data-dcnode-id="6483" instrument_node=""> – Ireland allocated 100 seats in the House of Commons</span><sup class="reference" data-dcnode-id="6480" id="cite_ref-:3_117-3"><a data-dcnode-id="6481" href="#cite_note-:3-117"><span data-dcnode-id="6482" instrument_node="">[114]</span></a></sup></li><span data-dcnode-id="6478" instrument_node="">
</span><li data-dcnode-id="6474"><a data-dcnode-id="6476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Act_1832" title="Reform Act 1832"><span data-dcnode-id="6477" instrument_node="">Reform Act 1832</span></a><span data-dcnode-id="6475" instrument_node=""> – extended voting rights to adult males who rented propertied land of a certain value, so allowing 1 in 7 males in the UK voting rights.</span></li><span data-dcnode-id="6473" instrument_node="">
</span><li data-dcnode-id="6469"><a data-dcnode-id="6471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Act_1867" title="Reform Act 1867"><span data-dcnode-id="6472" instrument_node="">Reform Act 1867</span></a><span data-dcnode-id="6470" instrument_node=""> – extended the franchise to men in urban areas who met a property qualification, so increasing male suffrage.</span></li><span data-dcnode-id="6468" instrument_node="">
</span><li data-dcnode-id="6464"><a data-dcnode-id="6466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act_1884" title="Representation of the People Act 1884"><span data-dcnode-id="6467" instrument_node="">Reform Act 1884</span></a><span data-dcnode-id="6465" instrument_node=""> – addressed imbalances between the boroughs and the countryside; this brought the voting population to 5,500,000, although 40% of males were still disenfranchised because of the property qualification.</span></li><span data-dcnode-id="6463" instrument_node="">
</span><li data-dcnode-id="6458"><span data-dcnode-id="6462" instrument_node="">Between 1885 and 1918 moves were made by the </span><a data-dcnode-id="6460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage_in_the_United_Kingdom%23Formation_of_a_national_movement" title="Women's suffrage in the United Kingdom"><span data-dcnode-id="6461" instrument_node="">women's suffrage</span></a><span data-dcnode-id="6459" instrument_node=""> movement to ensure votes for women. However, the duration of the First World War stopped this reform movement.</span></li><span data-dcnode-id="6457" instrument_node="">
</span><li data-dcnode-id="6450"><a data-dcnode-id="6455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act_1918" title="Representation of the People Act 1918"><span data-dcnode-id="6456" instrument_node="">Representation of the People Act 1918</span></a><span data-dcnode-id="6454" instrument_node=""> – the consequences of World War I persuaded the government to expand the right to vote, not only for the many men who fought in the war who were disenfranchised, but also for the women who worked in factories, agriculture and elsewhere as part of the war effort, often substituting for enlisted men and including dangerous work such as in munitions factories. All men aged 21 and over were given the right to vote. Property restrictions for voting were lifted for men. The local government franchise was extended to include all women over 21, on the same terms as men. Parliamentary Votes were given to 40% of women, with property restrictions and limited to those over 30 years old. This increased the electorate from 7.7&nbsp;million to 21.4&nbsp;million with women making up 8.5&nbsp;million of the electorate. Seven percent of the electorate had more than one vote, either because they owned business property or because they were university graduates. The first election with this system was the </span><a data-dcnode-id="6452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1918_United_Kingdom_general_election" title="1918 United Kingdom general election"><span data-dcnode-id="6453" instrument_node="">1918 general election</span></a><span data-dcnode-id="6451" instrument_node="">.</span></li><span data-dcnode-id="6449" instrument_node="">
</span><li data-dcnode-id="6445"><a class="mw-redirect" data-dcnode-id="6447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act_1928" title="Representation of the People Act 1928"><span data-dcnode-id="6448" instrument_node="">Representation of the People Act 1928</span></a><span data-dcnode-id="6446" instrument_node=""> – equal suffrage for women and men, with voting possible at 21 with no property restrictions.</span></li><span data-dcnode-id="6444" instrument_node="">
</span><li data-dcnode-id="6437"><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act_1948" title="Representation of the People Act 1948"><span data-dcnode-id="6443" instrument_node="">Representation of the People Act 1948</span></a><span data-dcnode-id="6441" instrument_node=""> – removed </span><a data-dcnode-id="6439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plural_voting" title="Plural voting"><span data-dcnode-id="6440" instrument_node="">plural voting</span></a><span data-dcnode-id="6438" instrument_node=""> in parliamentary elections for university graduates and business owners.</span></li><span data-dcnode-id="6436" instrument_node="">
</span><li data-dcnode-id="6432"><a data-dcnode-id="6434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act_1969" title="Representation of the People Act 1969"><span data-dcnode-id="6435" instrument_node="">Representation of the People Act 1969</span></a><span data-dcnode-id="6433" instrument_node=""> – extension of suffrage to those 18 and older, and abolition of plural voting in local government elections.</span></li></ul><span data-dcnode-id="6430" instrument_node="">
</span><h3 data-dcnode-id="6420"><span class="mw-headline" data-dcnode-id="6428" id="United_States"><span data-dcnode-id="6429" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="6421"><span class="mw-editsection-bracket" data-dcnode-id="6426"><span data-dcnode-id="6427" instrument_node="">[</span></span><a data-dcnode-id="6424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D46" title="Edit section: United States"><span data-dcnode-id="6425" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6422"><span data-dcnode-id="6423" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6419" instrument_node="">
</span><link data-dcnode-id="6418" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6414" role="note"><span data-dcnode-id="6417" instrument_node="">Main article: </span><a data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_rights_in_the_United_States" title="Voting rights in the United States"><span data-dcnode-id="6416" instrument_node="">Voting rights in the United States</span></a></div><span data-dcnode-id="6413" instrument_node="">
</span><p data-dcnode-id="6391"><span data-dcnode-id="6412" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="6410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Constitution" title="United States Constitution"><span data-dcnode-id="6411" instrument_node="">Constitution</span></a><span data-dcnode-id="6409" instrument_node=""> did not originally define who was eligible to vote, allowing each state to decide this status. In the early history of the U.S., most states allowed only </span><a class="mw-redirect" data-dcnode-id="6407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_American" title="White American"><span data-dcnode-id="6408" instrument_node="">white</span></a><span data-dcnode-id="6406" instrument_node=""> male adult property owners to vote (about 6% of the population).</span><sup class="reference" data-dcnode-id="6403" id="cite_ref-118"><a data-dcnode-id="6404" href="#cite_note-118"><span data-dcnode-id="6405" instrument_node="">[115]</span></a></sup><sup class="reference" data-dcnode-id="6400" id="cite_ref-119"><a data-dcnode-id="6401" href="#cite_note-119"><span data-dcnode-id="6402" instrument_node="">[116]</span></a></sup><span data-dcnode-id="6399" instrument_node=""> By 1856 property ownership requirements were eliminated in all states, giving suffrage to most white men. However, tax-paying requirements remained in five states until 1860 and in two states until the 20th century.</span><sup class="reference" data-dcnode-id="6396" id="cite_ref-NBER_120-0"><a data-dcnode-id="6397" href="#cite_note-NBER-120"><span data-dcnode-id="6398" instrument_node="">[117]</span></a></sup><sup class="reference" data-dcnode-id="6393" id="cite_ref-121"><a data-dcnode-id="6394" href="#cite_note-121"><span data-dcnode-id="6395" instrument_node="">[118]</span></a></sup><span data-dcnode-id="6392" instrument_node="">
</span></p><p data-dcnode-id="6382"><span data-dcnode-id="6390" instrument_node="">After the </span><a data-dcnode-id="6388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="6389" instrument_node="">Civil War</span></a><span data-dcnode-id="6387" instrument_node="">, five amendments to the Constitution were expressly addressed to the "right to vote"; these amendments limit the basis upon which the right to vote in any U.S. state or other jurisdiction may be abridged or denied.</span><sup class="reference" data-dcnode-id="6384" id="cite_ref-122"><a data-dcnode-id="6385" href="#cite_note-122"><span data-dcnode-id="6386" instrument_node="">[nb 4]</span></a></sup><span data-dcnode-id="6383" instrument_node="">
</span></p><span data-dcnode-id="6381" instrument_node="">
</span><ul data-dcnode-id="6353"><li data-dcnode-id="6377"><a data-dcnode-id="6379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifteenth_Amendment_to_the_United_States_Constitution" title="Fifteenth Amendment to the United States Constitution"><span data-dcnode-id="6380" instrument_node="">15th Amendment</span></a><span data-dcnode-id="6378" instrument_node=""> (1870): "The right of citizens of the United States to vote shall not be denied or abridged by the United States or by any State on account of race, color, or previous condition of servitude."</span></li><span data-dcnode-id="6376" instrument_node="">
</span><li data-dcnode-id="6372"><a data-dcnode-id="6374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nineteenth_Amendment_to_the_United_States_Constitution" title="Nineteenth Amendment to the United States Constitution"><span data-dcnode-id="6375" instrument_node="">19th Amendment</span></a><span data-dcnode-id="6373" instrument_node=""> (1920): "The right of citizens of the United States to vote shall not be denied or abridged by the United States or by any State on account of sex."</span></li><span data-dcnode-id="6371" instrument_node="">
</span><li data-dcnode-id="6364"><a data-dcnode-id="6369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-third_Amendment_to_the_United_States_Constitution" title="Twenty-third Amendment to the United States Constitution"><span data-dcnode-id="6370" instrument_node="">23rd Amendment</span></a><span data-dcnode-id="6368" instrument_node=""> (1961): provides that residents of the </span><a class="mw-redirect" data-dcnode-id="6366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/District_of_Columbia" title="District of Columbia"><span data-dcnode-id="6367" instrument_node="">District of Columbia</span></a><span data-dcnode-id="6365" instrument_node=""> can vote for the President and Vice President.</span></li><span data-dcnode-id="6363" instrument_node="">
</span><li data-dcnode-id="6359"><a data-dcnode-id="6361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-fourth_Amendment_to_the_United_States_Constitution" title="Twenty-fourth Amendment to the United States Constitution"><span data-dcnode-id="6362" instrument_node="">24th Amendment</span></a><span data-dcnode-id="6360" instrument_node=""> (1964): "The right of citizens of the United States to vote in any primary or other election for President or Vice President, for electors for President or Vice President, or for Senator or Representative in Congress, shall not be denied or abridged by the United States or any State by reason of failure to pay any poll tax or other tax."</span></li><span data-dcnode-id="6358" instrument_node="">
</span><li data-dcnode-id="6354"><a data-dcnode-id="6356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-sixth_Amendment_to_the_United_States_Constitution" title="Twenty-sixth Amendment to the United States Constitution"><span data-dcnode-id="6357" instrument_node="">26th Amendment</span></a><span data-dcnode-id="6355" instrument_node=""> (1971): "The right of citizens of the United States, who are eighteen years of age or older, to vote shall not be denied or abridged by the United States or by any State on account of age."</span></li></ul><span data-dcnode-id="6352" instrument_node="">
</span><p data-dcnode-id="6327"><span data-dcnode-id="6351" instrument_node="">Full removal of racial disenfranchisement of citizens was not secured until the </span><a data-dcnode-id="6349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="6350" instrument_node="">Voting Rights Act of 1965</span></a><span data-dcnode-id="6348" instrument_node=""> gained passage through </span><a data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="6347" instrument_node="">Congress</span></a><span data-dcnode-id="6345" instrument_node=""> following the </span><a class="mw-redirect" data-dcnode-id="6343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Movement" title="Civil Rights Movement"><span data-dcnode-id="6344" instrument_node="">Civil Rights Movement</span></a><span data-dcnode-id="6342" instrument_node="">. For state elections, it was not until the U.S. Supreme Court ruled 6–3 in </span><i data-dcnode-id="6339"><a class="mw-redirect" data-dcnode-id="6340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harper_v._Virginia_Board_of_Elections" title="Harper v. Virginia Board of Elections"><span data-dcnode-id="6341" instrument_node="">Harper v. Virginia Board of Elections</span></a></i><span data-dcnode-id="6338" instrument_node=""> (1966) that all state poll taxes were declared unconstitutional as violating the </span><a data-dcnode-id="6336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Protection_Clause" title="Equal Protection Clause"><span data-dcnode-id="6337" instrument_node="">Equal Protection Clause</span></a><span data-dcnode-id="6335" instrument_node=""> of the Fourteenth Amendment. This removed a burden on the poor, including some poor whites who had been disenfranchised.</span><sup class="reference" data-dcnode-id="6332" id="cite_ref-Scher2015_123-0"><a data-dcnode-id="6333" href="#cite_note-Scher2015-123"><span data-dcnode-id="6334" instrument_node="">[119]</span></a></sup><sup class="reference" data-dcnode-id="6329" id="cite_ref-NHLTS2009_124-0"><a data-dcnode-id="6330" href="#cite_note-NHLTS2009-124"><span data-dcnode-id="6331" instrument_node="">[120]</span></a></sup><span data-dcnode-id="6328" instrument_node="">
</span></p><span data-dcnode-id="6326" instrument_node="">
</span><h3 data-dcnode-id="6316"><span class="mw-headline" data-dcnode-id="6324" id="Majority-Muslim_countries"><span data-dcnode-id="6325" instrument_node="">Majority-Muslim countries</span></span><span class="mw-editsection" data-dcnode-id="6317"><span class="mw-editsection-bracket" data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">[</span></span><a data-dcnode-id="6320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D47" title="Edit section: Majority-Muslim countries"><span data-dcnode-id="6321" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6315" instrument_node="">
