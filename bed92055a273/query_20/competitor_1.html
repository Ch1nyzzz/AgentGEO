sts" title="Methodists"><span data-dcnode-id="9253" instrument_node="">Methodists</span></a><span data-dcnode-id="9251" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presbyterians" title="Presbyterians"><span data-dcnode-id="9250" instrument_node="">Presbyterians</span></a><span data-dcnode-id="9248" instrument_node="">) were only allowed to run for election to the </span><a class="mw-redirect" data-dcnode-id="9246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_House_of_Commons" title="British House of Commons"><span data-dcnode-id="9247" instrument_node="">British House of Commons</span></a><span data-dcnode-id="9245" instrument_node=""> starting in 1828, Catholics in 1829 (following the </span><a class="mw-redirect" data-dcnode-id="9243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Relief_Act_1829" title="Catholic Relief Act 1829"><span data-dcnode-id="9244" instrument_node="">Catholic Relief Act 1829</span></a><span data-dcnode-id="9242" instrument_node="">, which extended the </span><a data-dcnode-id="9240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholic_Relief_Act_1791" title="Roman Catholic Relief Act 1791"><span data-dcnode-id="9241" instrument_node="">Roman Catholic Relief Act 1791</span></a><span data-dcnode-id="9239" instrument_node="">), and Jews in 1858 (with the </span><a class="mw-redirect" data-dcnode-id="9237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emancipation_of_the_Jews_in_England" title="Emancipation of the Jews in England"><span data-dcnode-id="9238" instrument_node="">Emancipation of the Jews in England</span></a><span data-dcnode-id="9236" instrument_node="">). </span><a data-dcnode-id="9234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Disraeli" title="Benjamin Disraeli"><span data-dcnode-id="9235" instrument_node="">Benjamin Disraeli</span></a><span data-dcnode-id="9233" instrument_node=""> could only begin his political career in 1837 because he had been converted to Anglicanism at the age of 12.
</span></p><p data-dcnode-id="9179"><span data-dcnode-id="9231" instrument_node="">In several states in the U.S. after the </span><a data-dcnode-id="9229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Declaration_of_Independence" title="United States Declaration of Independence"><span data-dcnode-id="9230" instrument_node="">Declaration of Independence</span></a><span data-dcnode-id="9228" instrument_node="">, Jews, </span><a data-dcnode-id="9226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quakers" title="Quakers"><span data-dcnode-id="9227" instrument_node="">Quakers</span></a><span data-dcnode-id="9225" instrument_node=""> or Catholics were denied voting rights and/or forbidden to run for office.</span><sup class="reference" data-dcnode-id="9222" id="cite_ref-williamson1960_45-0"><a data-dcnode-id="9223" href="#cite_note-williamson1960-45"><span data-dcnode-id="9224" instrument_node="">[43]</span></a></sup><span data-dcnode-id="9221" instrument_node=""> The </span><a data-dcnode-id="9219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delaware_Constitution_of_1776" title="Delaware Constitution of 1776"><span data-dcnode-id="9220" instrument_node="">Delaware Constitution of 1776</span></a><span data-dcnode-id="9218" instrument_node=""> stated that "Every person who shall be chosen a member of either house, or appointed to any office or place of trust, before taking his seat, or entering upon the execution of his office, shall (…) also make and subscribe the following declaration, to wit: </span><i data-dcnode-id="9216"><span data-dcnode-id="9217" instrument_node="">I, A B. do profess faith in God the Father, and in Jesus Christ His only Son, and in the Holy Ghost, one God, blessed for evermore; and I do acknowledge the holy scriptures of the Old and New Testament to be given by divine inspiration.</span></i><span data-dcnode-id="9215" instrument_node="">"</span><sup class="reference" data-dcnode-id="9212" id="cite_ref-46"><a data-dcnode-id="9213" href="#cite_note-46"><span data-dcnode-id="9214" instrument_node="">[44]</span></a></sup><span data-dcnode-id="9211" instrument_node=""> This was repealed by article I, section 2 of the </span><a data-dcnode-id="9209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delaware_Constitution_of_1792" title="Delaware Constitution of 1792"><span data-dcnode-id="9210" instrument_node="">1792 Constitution</span></a><span data-dcnode-id="9208" instrument_node="">: "No religious test shall be required as a qualification to any office, or public trust, under this State".</span><sup class="reference" data-dcnode-id="9205" id="cite_ref-47"><a data-dcnode-id="9206" href="#cite_note-47"><span data-dcnode-id="9207" instrument_node="">[45]</span></a></sup><span data-dcnode-id="9204" instrument_node=""> The 1778 </span><a class="mw-redirect" data-dcnode-id="9202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Carolina_Constitution" title="South Carolina Constitution"><span data-dcnode-id="9203" instrument_node="">Constitution of the State of South Carolina</span></a><span data-dcnode-id="9201" instrument_node=""> stated that "No person shall be eligible to sit in the house of representatives unless he be of the Protestant religion",</span><sup class="reference" data-dcnode-id="9198" id="cite_ref-48"><a data-dcnode-id="9199" href="#cite_note-48"><span data-dcnode-id="9200" instrument_node="">[46]</span></a></sup><span data-dcnode-id="9197" instrument_node=""> the 1777 </span><a class="mw-redirect" data-dcnode-id="9195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_%28U.S._state%29_Constitution" title="Georgia (U.S. state) Constitution"><span data-dcnode-id="9196" instrument_node="">Constitution of the State of Georgia</span></a><span data-dcnode-id="9194" instrument_node=""> (art. VI) that "The representatives shall be chosen out of the residents in each county (…) and they shall be of the Protestent </span><i data-dcnode-id="9192"><span data-dcnode-id="9193" instrument_node="">(sic)</span></i><span data-dcnode-id="9191" instrument_node=""> religion".</span><sup class="reference" data-dcnode-id="9188" id="cite_ref-49"><a data-dcnode-id="9189" href="#cite_note-49"><span data-dcnode-id="9190" instrument_node="">[47]</span></a></sup><span data-dcnode-id="9187" instrument_node=""> In </span><a data-dcnode-id="9185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maryland" title="Maryland"><span data-dcnode-id="9186" instrument_node="">Maryland</span></a><span data-dcnode-id="9184" instrument_node="">, voting rights and eligibility were extended to Jews in 1828.</span><sup class="reference" data-dcnode-id="9181" id="cite_ref-50"><a data-dcnode-id="9182" href="#cite_note-50"><span data-dcnode-id="9183" instrument_node="">[48]</span></a></sup><span data-dcnode-id="9180" instrument_node="">
</span></p><p data-dcnode-id="9158"><span data-dcnode-id="9178" instrument_node="">In </span><a data-dcnode-id="9176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="9177" instrument_node="">Canada</span></a><span data-dcnode-id="9175" instrument_node="">, several religious groups (</span><a data-dcnode-id="9173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mennonites" title="Mennonites"><span data-dcnode-id="9174" instrument_node="">Mennonites</span></a><span data-dcnode-id="9172" instrument_node="">, </span><a data-dcnode-id="9170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hutterites" title="Hutterites"><span data-dcnode-id="9171" instrument_node="">Hutterites</span></a><span data-dcnode-id="9169" instrument_node="">, </span><a data-dcnode-id="9167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doukhobors" title="Doukhobors"><span data-dcnode-id="9168" instrument_node="">Doukhobors</span></a><span data-dcnode-id="9166" instrument_node="">) were disenfranchised by the wartime Elections Act of 1917, mainly because they opposed military service. This disenfranchisement ended with the closure of the First World War, but was renewed for Doukhobors from 1934 (via the </span><i data-dcnode-id="9164"><span data-dcnode-id="9165" instrument_node="">Dominion Elections Act</span></i><span data-dcnode-id="9163" instrument_node="">) to 1955.</span><sup class="reference" data-dcnode-id="9160" id="cite_ref-51"><a data-dcnode-id="9161" href="#cite_note-51"><span data-dcnode-id="9162" instrument_node="">[49]</span></a></sup><span data-dcnode-id="9159" instrument_node="">
</span></p><p data-dcnode-id="9143"><span data-dcnode-id="9157" instrument_node="">The first Constitution of modern </span><a data-dcnode-id="9155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romania" title="Romania"><span data-dcnode-id="9156" instrument_node="">Romania</span></a><span data-dcnode-id="9154" instrument_node=""> in 1866 provided in article 7 that only Christians could become Romanian citizens. </span><a data-dcnode-id="9152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Jews_in_Romania" title="History of the Jews in Romania"><span data-dcnode-id="9153" instrument_node="">Jews native to Romania</span></a><span data-dcnode-id="9151" instrument_node=""> were declared stateless persons. In 1879, under pressure from the </span><a data-dcnode-id="9149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Berlin_%281878%29" title="Treaty of Berlin (1878)"><span data-dcnode-id="9150" instrument_node="">Berlin Peace Conference</span></a><span data-dcnode-id="9148" instrument_node="">, this article was amended, granting non-Christians the right to become Romanian citizens, but naturalization was granted on a case-by-case basis and was subject to Parliamentary approval. An application took over ten years to process. Only in 1923 was a new constitution adopted, whose article 133 extended Romanian citizenship to all Jewish residents and equality of rights to all Romanian citizens.</span><sup class="reference" data-dcnode-id="9145" id="cite_ref-52"><a data-dcnode-id="9146" href="#cite_note-52"><span data-dcnode-id="9147" instrument_node="">[50]</span></a></sup><span data-dcnode-id="9144" instrument_node="">
</span></p><span data-dcnode-id="9142" instrument_node="">
</span><h3 data-dcnode-id="9131"><span data-dcnode-id="9141" id="Wealth.2C_tax_class.2C_social_class"></span><span class="mw-headline" data-dcnode-id="9139" id="Wealth,_tax_class,_social_class"><span data-dcnode-id="9140" instrument_node="">Wealth, tax class, social class</span></span><span class="mw-editsection" data-dcnode-id="9132"><span class="mw-editsection-bracket" data-dcnode-id="9137"><span data-dcnode-id="9138" instrument_node="">[</span></span><a data-dcnode-id="9135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D13" title="Edit section: Wealth, tax class, social class"><span data-dcnode-id="9136" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9133"><span data-dcnode-id="9134" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9130" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9118"><div class="thumbinner" data-dcnode-id="9119" style="width:222px;"><a class="image" data-dcnode-id="9128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AManifestace_za_hlasovac%25C3%25AD_pr%25C3%25A1vo_1905.jpg"><img alt="" class="thumbimage" data-dcnode-id="9129" data-file-height="436" data-file-width="600" decoding="async" height="160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/30/Manifestace_za_hlasovac%25C3%25AD_pr%25C3%25A1vo_1905.jpg/220px-Manifestace_za_hlasovac%25C3%25AD_pr%25C3%25A1vo_1905.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/30/Manifestace_za_hlasovac%C3%AD_pr%C3%A1vo_1905.jpg/330px-Manifestace_za_hlasovac%C3%AD_pr%C3%A1vo_1905.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/30/Manifestace_za_hlasovac%C3%AD_pr%C3%A1vo_1905.jpg/440px-Manifestace_za_hlasovac%C3%AD_pr%C3%A1vo_1905.jpg 2x" width="220"></a><span data-dcnode-id="9127" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9120"><div class="magnify" data-dcnode-id="9125"><a class="internal" data-dcnode-id="9126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AManifestace_za_hlasovac%25C3%25AD_pr%25C3%25A1vo_1905.jpg" title="Enlarge"></a></div><span data-dcnode-id="9124" instrument_node="">Demonstration for universal right to vote, Prague, </span><a data-dcnode-id="9122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria-Hungary" title="Austria-Hungary"><span data-dcnode-id="9123" instrument_node="">Austria-Hungary</span></a><span data-dcnode-id="9121" instrument_node="">, 1905</span></div></div></div><span data-dcnode-id="9117" instrument_node="">
</span><p data-dcnode-id="9106"><span data-dcnode-id="9116" instrument_node="">Until the nineteenth century, many Western proto-democracies had </span><a data-dcnode-id="9114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property_qualification" title="Property qualification"><span data-dcnode-id="9115" instrument_node="">property qualifications</span></a><span data-dcnode-id="9113" instrument_node=""> in their electoral laws; e.g. only landowners could vote (because the only tax for such countries was the property tax), or the voting rights were weighted according to the amount of taxes paid (as in the </span><a data-dcnode-id="9111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prussian_three-class_franchise" title="Prussian three-class franchise"><span data-dcnode-id="9112" instrument_node="">Prussian three-class franchise</span></a><span data-dcnode-id="9110" instrument_node="">). Most countries abolished the property qualification for national elections in the late nineteenth century, but retained it for local government elections for several decades. Today these laws have largely been abolished, although the </span><a data-dcnode-id="9108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homelessness" title="Homelessness"><span data-dcnode-id="9109" instrument_node="">homeless</span></a><span data-dcnode-id="9107" instrument_node=""> may not be able to register because they lack regular addresses.
</span></p><p data-dcnode-id="9085"><span data-dcnode-id="9105" instrument_node="">In the </span><a data-dcnode-id="9103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="9104" instrument_node="">United Kingdom</span></a><span data-dcnode-id="9102" instrument_node="">, until the </span><a data-dcnode-id="9100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Lords_Act_1999" title="House of Lords Act 1999"><span data-dcnode-id="9101" instrument_node="">House of Lords Act 1999</span></a><span data-dcnode-id="9099" instrument_node="">, </span><a data-dcnode-id="9097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peerage" title="Peerage"><span data-dcnode-id="9098" instrument_node="">peers</span></a><span data-dcnode-id="9096" instrument_node=""> who were members of the </span><a data-dcnode-id="9094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Lords" title="House of Lords"><span data-dcnode-id="9095" instrument_node="">House of Lords</span></a><span data-dcnode-id="9093" instrument_node=""> were excluded from voting for the </span><a class="mw-redirect" data-dcnode-id="9091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_House_of_Commons" title="British House of Commons"><span data-dcnode-id="9092" instrument_node="">House of Commons</span></a><span data-dcnode-id="9090" instrument_node=""> as they were not commoners. Although there is nothing to prevent the monarch from voting, it is considered improper for the monarch to do so.</span><sup class="reference" data-dcnode-id="9087" id="cite_ref-53"><a data-dcnode-id="9088" href="#cite_note-53"><span data-dcnode-id="9089" instrument_node="">[51]</span></a></sup><span data-dcnode-id="9086" instrument_node="">
</span></p><p data-dcnode-id="9079"><span data-dcnode-id="9084" instrument_node="">Throughout the 19th and 20th centuries, many nations made voters pay to elect officials, keeping impoverished people from being fully enfranchised. These laws were in effect in Argentina, Brazil, Canada, Chile, Costa Rica, Ecuador, Mexico, Peru, Uruguay, and Venezuela.</span><sup class="reference" data-dcnode-id="9081" id="cite_ref-:0_54-0"><a data-dcnode-id="9082" href="#cite_note-:0-54"><span data-dcnode-id="9083" instrument_node="">[52]</span></a></sup><span data-dcnode-id="9080" instrument_node="">
</span></p><span data-dcnode-id="9078" instrument_node="">
</span><h3 data-dcnode-id="9068"><span class="mw-headline" data-dcnode-id="9076" id="Knowledge"><span data-dcnode-id="9077" instrument_node="">Knowledge</span></span><span class="mw-editsection" data-dcnode-id="9069"><span class="mw-editsection-bracket" data-dcnode-id="9074"><span data-dcnode-id="9075" instrument_node="">[</span></span><a data-dcnode-id="9072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D14" title="Edit section: Knowledge"><span data-dcnode-id="9073" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9070"><span data-dcnode-id="9071" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9067" instrument_node="">
</span><p data-dcnode-id="9040"><span data-dcnode-id="9066" instrument_node="">Sometimes the right to vote has been limited to people who had achieved a certain level of education or passed a certain test. In some US states, "</span><a data-dcnode-id="9064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy_test" title="Literacy test"><span data-dcnode-id="9065" instrument_node="">literacy tests</span></a><span data-dcnode-id="9063" instrument_node="">" were previously implemented to exclude those who were illiterate.</span><sup class="reference" data-dcnode-id="9060" id="cite_ref-ourdocuments.gov_55-0"><a data-dcnode-id="9061" href="#cite_note-ourdocuments.gov-55"><span data-dcnode-id="9062" instrument_node="">[53]</span></a></sup><span data-dcnode-id="9059" instrument_node=""> Black voters in the South were often deemed by election officials to have failed the test even when they did not.</span><sup class="reference" data-dcnode-id="9056" id="cite_ref-56"><a data-dcnode-id="9057" href="#cite_note-56"><span data-dcnode-id="9058" instrument_node="">[54]</span></a></sup><span data-dcnode-id="9055" instrument_node=""> Under the 1961 constitution of </span><a data-dcnode-id="9053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhodesia" title="Rhodesia"><span data-dcnode-id="9054" instrument_node="">Rhodesia</span></a><span data-dcnode-id="9052" instrument_node="">, voting on the "A" roll, which elected up to 50 of the 65 members of parliament, was restricted based on education requirements, which in practice led to an overwhelming white vote. Voting on the "B" roll had universal suffrage, but only appointed 15 members of parliament.</span><sup class="reference" data-dcnode-id="9049" id="cite_ref-57"><a data-dcnode-id="9050" href="#cite_note-57"><span data-dcnode-id="9051" instrument_node="">[55]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="9042" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="9048" instrument_node="">[</span><i data-dcnode-id="9044"><a data-dcnode-id="9045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="9046" title="Clarification needed: What is &quot;A roll&quot; and &quot;B roll&quot;? (December 2018)"><span data-dcnode-id="9047" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="9043" instrument_node="">]</span></sup><span data-dcnode-id="9041" instrument_node="">
</span></p><p data-dcnode-id="9016"><span data-dcnode-id="9039" instrument_node="">In the 20th century, many countries other than the US placed voting restrictions on illiterate people, including: </span><a data-dcnode-id="9037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolivia" title="Bolivia"><span data-dcnode-id="9038" instrument_node="">Bolivia</span></a><span data-dcnode-id="9036" instrument_node="">, </span><a data-dcnode-id="9034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="9035" instrument_node="">Brazil</span></a><span data-dcnode-id="9033" instrument_node="">, </span><a data-dcnode-id="9031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="9032" instrument_node="">Canada</span></a><span data-dcnode-id="9030" instrument_node="">, </span><a data-dcnode-id="9028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chile" title="Chile"><span data-dcnode-id="9029" instrument_node="">Chile</span></a><span data-dcnode-id="9027" instrument_node="">, </span><a data-dcnode-id="9025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecuador" title="Ecuador"><span data-dcnode-id="9026" instrument_node="">Ecuador</span></a><span data-dcnode-id="9024" instrument_node="">, and </span><a data-dcnode-id="9022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peru" title="Peru"><span data-dcnode-id="9023" instrument_node="">Peru</span></a><span data-dcnode-id="9021" instrument_node="">.</span><sup class="reference" data-dcnode-id="9018" id="cite_ref-:0_54-1"><a data-dcnode-id="9019" href="#cite_note-:0-54"><span data-dcnode-id="9020" instrument_node="">[52]</span></a></sup><span data-dcnode-id="9017" instrument_node="">
</span></p><span data-dcnode-id="9015" instrument_node="">
</span><h3 data-dcnode-id="9005"><span class="mw-headline" data-dcnode-id="9013" id="Race"><span data-dcnode-id="9014" instrument_node="">Race</span></span><span class="mw-editsection" data-dcnode-id="9006"><span class="mw-editsection-bracket" data-dcnode-id="9011"><span data-dcnode-id="9012" instrument_node="">[</span></span><a data-dcnode-id="9009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D15" title="Edit section: Race"><span data-dcnode-id="9010" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9007"><span data-dcnode-id="9008" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9004" instrument_node="">
</span><p data-dcnode-id="9002"><span data-dcnode-id="9003" instrument_node="">Various countries, usually countries with a dominant race within a wider population, have historically denied the vote to people of particular races, or to all but the dominant race. This has been achieved in a number of ways:
</span></p><span data-dcnode-id="9001" instrument_node="">
</span><ul data-dcnode-id="8926"><li data-dcnode-id="8990"><span data-dcnode-id="9000" instrument_node="">Official – laws and regulations passed specifically disenfranchising people of particular races (for example, the </span><a class="mw-redirect" data-dcnode-id="8998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antebellum_United_States" title="Antebellum United States"><span data-dcnode-id="8999" instrument_node="">Antebellum United States</span></a><span data-dcnode-id="8997" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boer_republic" title="Boer republic"><span data-dcnode-id="8996" instrument_node="">Boer republics</span></a><span data-dcnode-id="8994" instrument_node="">, pre-apartheid and </span><a data-dcnode-id="8992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apartheid" title="Apartheid"><span data-dcnode-id="8993" instrument_node="">apartheid</span></a><span data-dcnode-id="8991" instrument_node=""> South Africa, or many colonial political systems, who provided suffrage only for white settlers and some privileged non-white groups). Canada and Australia denied suffrage for their indigenous populations until the 1960s.</span></li><span data-dcnode-id="8989" instrument_node="">
</span><li data-dcnode-id="8960"><span data-dcnode-id="8988" instrument_node="">Indirect – nothing in law specifically prevents anyone from voting on account of their race, but other laws or regulations are used to exclude people of a particular race. In southern states of the United States of America before the passage of the </span><a data-dcnode-id="8986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Act_of_1964" title="Civil Rights Act of 1964"><span data-dcnode-id="8987" instrument_node="">Civil Rights Act of 1964</span></a><span data-dcnode-id="8985" instrument_node=""> and the </span><a data-dcnode-id="8983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="8984" instrument_node="">Voting Rights Act of 1965</span></a><span data-dcnode-id="8982" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poll_tax_%28United_States%29" title="Poll tax (United States)"><span data-dcnode-id="8981" instrument_node="">poll taxes</span></a><span data-dcnode-id="8979" instrument_node="">, </span><a data-dcnode-id="8977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy_test" title="Literacy test"><span data-dcnode-id="8978" instrument_node="">literacy</span></a><span data-dcnode-id="8976" instrument_node=""> and other tests were used to disenfranchise African-Americans.</span><sup class="reference" data-dcnode-id="8973" id="cite_ref-ourdocuments.gov_55-1"><a data-dcnode-id="8974" href="#cite_note-ourdocuments.gov-55"><span data-dcnode-id="8975" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="8970" id="cite_ref-58"><a data-dcnode-id="8971" href="#cite_note-58"><span data-dcnode-id="8972" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8969" instrument_node=""> Property qualifications have tended to disenfranchise a minority race, particularly if tribally owned land is not allowed to be taken into consideration. In some cases this was an unintended (but usually welcome) consequence.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8962" style="white-space:nowrap;"><span data-dcnode-id="8968" instrument_node="">[</span><i data-dcnode-id="8964"><a data-dcnode-id="8965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8966" title="This claim needs references to reliable sources. (December 2014)"><span data-dcnode-id="8967" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8963" instrument_node="">]</span></sup><span data-dcnode-id="8961" instrument_node=""> Many African colonies after World War II until decolonization had tough education and property qualifications which practically gave meaningful representation only for rich European minorities.</span></li><span data-dcnode-id="8959" instrument_node="">
</span><li data-dcnode-id="8927"><span data-dcnode-id="8958" instrument_node="">Unofficial – nothing in law prevents anyone from voting on account of their race, but people of particular races are intimidated or otherwise prevented from exercising this right. This was a common tactic employed by white Southerners against </span><a class="mw-redirect" data-dcnode-id="8956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedmen" title="Freedmen"><span data-dcnode-id="8957" instrument_node="">Freedmen</span></a><span data-dcnode-id="8955" instrument_node=""> during the </span><a class="mw-redirect" data-dcnode-id="8953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconstruction_Era" title="Reconstruction Era"><span data-dcnode-id="8954" instrument_node="">Reconstruction Era</span></a><span data-dcnode-id="8952" instrument_node=""> and the following period before more formal methods of disenfranchisement became entrenched. Unofficial discrimination could even manifest in ways which, while allowing the act of voting itself, effectively deprive it of any value – for example, in </span><a data-dcnode-id="8950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="8951" instrument_node="">Israel</span></a><span data-dcnode-id="8949" instrument_node="">, the country's </span><a data-dcnode-id="8947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_citizens_of_Israel" title="Arab citizens of Israel"><span data-dcnode-id="8948" instrument_node="">Arab minority</span></a><span data-dcnode-id="8946" instrument_node=""> has maintained a party-system separate from that of the Jewish majority. in the run-up for the country's </span><a class="new" data-dcnode-id="8944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2015_Israeli_legsialtive_election%26action%3Dedit%26redlink%3D1" title="2015 Israeli legsialtive election (page does not exist)"><span data-dcnode-id="8945" instrument_node="">2015 elections</span></a><span data-dcnode-id="8943" instrument_node="">, the electoral threshold was raised from 2% to 3.25%, thus forcing the dominant Arab parties – </span><a data-dcnode-id="8941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hadash" title="Hadash"><span data-dcnode-id="8942" instrument_node="">Hadash</span></a><span data-dcnode-id="8940" instrument_node="">, the </span><a data-dcnode-id="8938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Arab_List" title="United Arab List"><span data-dcnode-id="8939" instrument_node="">United Arab List</span></a><span data-dcnode-id="8937" instrument_node="">, </span><a data-dcnode-id="8935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balad_%28political_party%29" title="Balad (political party)"><span data-dcnode-id="8936" instrument_node="">Balad</span></a><span data-dcnode-id="8934" instrument_node=""> and </span><a data-dcnode-id="8932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ta%2527al" title="Ta'al"><span data-dcnode-id="8933" instrument_node="">Ta'al</span></a><span data-dcnode-id="8931" instrument_node=""> – either to run under </span><a data-dcnode-id="8929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_List" title="Joint List"><span data-dcnode-id="8930" instrument_node="">one list</span></a><span data-dcnode-id="8928" instrument_node=""> or risk losing their parliamentary representation.</span></li></ul><span data-dcnode-id="8925" instrument_node="">
</span><h3 data-dcnode-id="8915"><span class="mw-headline" data-dcnode-id="8923" id="Age"><span data-dcnode-id="8924" instrument_node="">Age</span></span><span class="mw-editsection" data-dcnode-id="8916"><span class="mw-editsection-bracket" data-dcnode-id="8921"><span data-dcnode-id="8922" instrument_node="">[</span></span><a data-dcnode-id="8919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D16" title="Edit section: Age"><span data-dcnode-id="8920" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8917"><span data-dcnode-id="8918" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8914" instrument_node="">
</span><span data-dcnode-id="8844" instrument_node="">
</span><span data-dcnode-id="8743" instrument_node="">
</span><span data-dcnode-id="8558" instrument_node="">
</span><span data-dcnode-id="8434" instrument_node="">

</span><link data-dcnode-id="8259" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8252" role="note"><span data-dcnode-id="8258" instrument_node="">Main articles: </span><a data-dcnode-id="8256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" title="Voting age"><span data-dcnode-id="8257" instrument_node="">Voting age</span></a><span data-dcnode-id="8255" instrument_node=""> and </span><a data-dcnode-id="8253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_candidacy" title="Age of candidacy"><span data-dcnode-id="8254" instrument_node="">Age of candidacy</span></a></div><span data-dcnode-id="8251" instrument_node="">
</span><p data-dcnode-id="8243"><span data-dcnode-id="8250" instrument_node="">All modern democracies require voters to meet age qualifications to vote. Worldwide voting ages are not consistent, differing between countries and even within countries, though the range usually varies between 16 and 21 years. </span><a data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demeny_voting" title="Demeny voting"><span data-dcnode-id="8249" instrument_node="">Demeny voting</span></a><span data-dcnode-id="8247" instrument_node=""> has been proposed as a form of proxy voting by parents on behalf of their children who are below the age of suffrage. The movement to lower the voting age is one aspect of the </span><a data-dcnode-id="8245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_rights" title="Youth rights"><span data-dcnode-id="8246" instrument_node="">Youth rights</span></a><span data-dcnode-id="8244" instrument_node=""> movement.
</span></p><span data-dcnode-id="8242" instrument_node="">
</span><h3 data-dcnode-id="8232"><span class="mw-headline" data-dcnode-id="8240" id="Criminality"><span data-dcnode-id="8241" instrument_node="">Criminality</span></span><span class="mw-editsection" data-dcnode-id="8233"><span class="mw-editsection-bracket" data-dcnode-id="8238"><span data-dcnode-id="8239" instrument_node="">[</span></span><a data-dcnode-id="8236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D17" title="Edit section: Criminality"><span data-dcnode-id="8237" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8234"><span data-dcnode-id="8235" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8231" instrument_node="">
</span><link data-dcnode-id="8230" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8226" role="note"><span data-dcnode-id="8229" instrument_node="">Main article: </span><a data-dcnode-id="8227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disfranchisement%23Resulting_from_criminal_conviction" title="Disfranchisement"><span data-dcnode-id="8228" instrument_node="">Disfranchisement §&nbsp;Resulting from criminal conviction</span></a></div><span data-dcnode-id="8225" instrument_node="">
</span><p data-dcnode-id="8195"><span data-dcnode-id="8224" instrument_node="">Some countries restrict the voting rights of convicted criminals. Some countries, and </span><a data-dcnode-id="8222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony_disenfranchisement_in_the_United_States" title="Felony disenfranchisement in the United States"><span data-dcnode-id="8223" instrument_node="">some U.S. states</span></a><span data-dcnode-id="8221" instrument_node="">, also deny the right to vote to those convicted of serious crimes even after they are released from prison. In some cases (e.g. in </span><a data-dcnode-id="8219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony_disenfranchisement_in_the_United_States" title="Felony disenfranchisement in the United States"><span data-dcnode-id="8220" instrument_node="">many U.S. states</span></a><span data-dcnode-id="8218" instrument_node="">) the denial of the right to vote is automatic upon a felony conviction; in other cases (e.g. France and Germany) deprivation of the vote is meted out separately, and often limited to perpetrators of specific crimes such as those against the electoral system or corruption of public officials. In the </span><a data-dcnode-id="8216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Ireland" title="Republic of Ireland"><span data-dcnode-id="8217" instrument_node="">Republic of Ireland</span></a><span data-dcnode-id="8215" instrument_node="">, prisoners are allowed the right to vote, following </span><a data-dcnode-id="8210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hirst_v_United_Kingdom_%28No_2%29" title="Hirst v United Kingdom (No 2)"><span data-dcnode-id="8214" instrument_node="">the </span><i data-dcnode-id="8212"><span data-dcnode-id="8213" instrument_node="">Hirst v UK (No2)</span></i><span data-dcnode-id="8211" instrument_node=""> ruling</span></a><span data-dcnode-id="8209" instrument_node="">, which was granted in 2006. </span><a data-dcnode-id="8207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="8208" instrument_node="">Canada</span></a><span data-dcnode-id="8206" instrument_node=""> allowed only prisoners serving a term of less than 2 years the right to vote, but this was found to be unconstitutional in 2002 by the </span><a data-dcnode-id="8204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_Canada" title="Supreme Court of Canada"><span data-dcnode-id="8205" instrument_node="">Supreme Court of Canada</span></a><span data-dcnode-id="8203" instrument_node=""> in </span><i data-dcnode-id="8200"><a class="mw-redirect" data-dcnode-id="8201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sauv%25C3%25A9_v._Canada_%28Chief_Electoral_Officer%29" title="Sauvé v. Canada (Chief Electoral Officer)"><span data-dcnode-id="8202" instrument_node="">Sauvé v. Canada (Chief Electoral Officer)</span></a></i><span data-dcnode-id="8199" instrument_node="">, and all prisoners have been allowed to vote as of the </span><a data-dcnode-id="8197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2004_Canadian_federal_election" title="2004 Canadian federal election"><span data-dcnode-id="8198" instrument_node="">2004 Canadian federal election</span></a><span data-dcnode-id="8196" instrument_node="">.
</span></p><span data-dcnode-id="8194" instrument_node="">
</span><h3 data-dcnode-id="8184"><span class="mw-headline" data-dcnode-id="8192" id="Residency"><span data-dcnode-id="8193" instrument_node="">Residency</span></span><span class="mw-editsection" data-dcnode-id="8185"><span class="mw-editsection-bracket" data-dcnode-id="8190"><span data-dcnode-id="8191" instrument_node="">[</span></span><a data-dcnode-id="8188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D18" title="Edit section: Residency"><span data-dcnode-id="8189" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8186"><span data-dcnode-id="8187" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8183" instrument_node="">
</span><p data-dcnode-id="8172"><span data-dcnode-id="8182" instrument_node="">Under certain electoral systems elections are held within subnational jurisdictions, thus preventing persons from voting who would otherwise be eligible on the basis that they do not reside within such a jurisdiction, or because they live in an area that cannot participate. In the United States, license plates in Washington, D.C. read "TAXATION WITHOUT REPRESENTATION," in reference to the district not holding a seat in either the </span><a data-dcnode-id="8180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="8181" instrument_node="">House of Representatives</span></a><span data-dcnode-id="8179" instrument_node=""> or </span><a data-dcnode-id="8177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate" title="United States Senate"><span data-dcnode-id="8178" instrument_node="">Senate</span></a><span data-dcnode-id="8176" instrument_node="">, however residents can vote in presidential elections based on the Twenty-third Amendment to the United States Constitution adopted in 1961. Residents of </span><a data-dcnode-id="8174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puerto_Rico" title="Puerto Rico"><span data-dcnode-id="8175" instrument_node="">Puerto Rico</span></a><span data-dcnode-id="8173" instrument_node=""> enjoy neither.
</span></p><p data-dcnode-id="8159"><span data-dcnode-id="8171" instrument_node="">Sometimes citizens become ineligible to vote because they are no longer resident in their country of citizenship. For example, Australian citizens who have been outside Australia for more than one and fewer than six years may excuse themselves from the requirement to vote in </span><a class="mw-redirect" data-dcnode-id="8169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_electoral_system" title="Australian electoral system"><span data-dcnode-id="8170" instrument_node="">Australian elections</span></a><span data-dcnode-id="8168" instrument_node=""> while they remain outside Australia (voting in Australia is compulsory for resident citizens).</span><sup class="reference" data-dcnode-id="8165" id="cite_ref-59"><a data-dcnode-id="8166" href="#cite_note-59"><span data-dcnode-id="8167" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8164" instrument_node="">
Danish citizens that reside permanently outside Denmark lose their right to vote.</span><sup class="reference" data-dcnode-id="8161" id="cite_ref-60"><a data-dcnode-id="8162" href="#cite_note-60"><span data-dcnode-id="8163" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8160" instrument_node="">
</span></p><p data-dcnode-id="8157"><span data-dcnode-id="8158" instrument_node="">In some cases, a certain period of residence in a locality may required for the right to vote in that location. For example, in the United Kingdom up to 2001, each 15 February a new electoral register came into effect, based on registration as of the previous 10 October, with the effect of limiting voting to those resident five to seventeen months earlier depending on the timing of the election.
</span></p><span data-dcnode-id="8156" instrument_node="">
</span><h3 data-dcnode-id="8146"><span class="mw-headline" data-dcnode-id="8154" id="Nationality"><span data-dcnode-id="8155" instrument_node="">Nationality</span></span><span class="mw-editsection" data-dcnode-id="8147"><span class="mw-editsection-bracket" data-dcnode-id="8152"><span data-dcnode-id="8153" instrument_node="">[</span></span><a data-dcnode-id="8150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D19" title="Edit section: Nationality"><span data-dcnode-id="8151" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8148"><span data-dcnode-id="8149" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8145" instrument_node="">
</span><link data-dcnode-id="8144" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8140" role="note"><span data-dcnode-id="8143" instrument_node="">Main article: </span><a data-dcnode-id="8141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_of_foreigners_to_vote" title="Right of foreigners to vote"><span data-dcnode-id="8142" instrument_node="">Right of foreigners to vote</span></a></div><span data-dcnode-id="8139" instrument_node="">
</span><p data-dcnode-id="8131"><span data-dcnode-id="8138" instrument_node="">In most countries, suffrage is limited to citizens and, in many cases, permanent residents of that country. However, some members of supra-national organisations such as the </span><a data-dcnode-id="8136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Nations" title="Commonwealth of Nations"><span data-dcnode-id="8137" instrument_node="">Commonwealth of Nations</span></a><span data-dcnode-id="8135" instrument_node=""> and the European Union have granted voting rights to citizens of all countries within that organisation. Until the mid-twentieth century, many Commonwealth countries gave the vote to all British citizens within the country, regardless of whether they were normally resident there. In most cases this was because there was no distinction between </span><a data-dcnode-id="8133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_subject" title="British subject"><span data-dcnode-id="8134" instrument_node="">British and local citizenship</span></a><span data-dcnode-id="8132" instrument_node="">. Several countries qualified this with restrictions preventing non-white British citizens such as Indians and British Africans from voting. Under European Union law, citizens of European Union countries can vote in each other's local and European Parliament elections on the same basis as citizens of the country in question, but usually not in national elections.
</span></p><span data-dcnode-id="8130" instrument_node="">
</span><h3 data-dcnode-id="8120"><span class="mw-headline" data-dcnode-id="8128" id="Naturalization"><span data-dcnode-id="8129" instrument_node="">Naturalization</span></span><span class="mw-editsection" data-dcnode-id="8121"><span class="mw-editsection-bracket" data-dcnode-id="8126"><span data-dcnode-id="8127" instrument_node="">[</span></span><a data-dcnode-id="8124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D20" title="Edit section: Naturalization"><span data-dcnode-id="8125" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8122"><span data-dcnode-id="8123" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8119" instrument_node="">
</span><p data-dcnode-id="8117"><span data-dcnode-id="8118" instrument_node="">In some countries, naturalized citizens do not have the right to vote or to be a candidate, either permanently or for a determined period.
</span></p><p data-dcnode-id="8098"><span data-dcnode-id="8116" instrument_node="">Article 5 of the 1831 </span><a data-dcnode-id="8114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Belgium" title="Constitution of Belgium"><span data-dcnode-id="8115" instrument_node="">Belgian Constitution</span></a><span data-dcnode-id="8113" instrument_node=""> made a difference between ordinary naturalization, and </span><i data-dcnode-id="8111"><span data-dcnode-id="8112" instrument_node="">grande naturalisation</span></i><span data-dcnode-id="8110" instrument_node="">. Only (former) foreigners who had been granted </span><i data-dcnode-id="8108"><span data-dcnode-id="8109" instrument_node="">grande naturalisation</span></i><span data-dcnode-id="8107" instrument_node=""> were entitled to vote, be a candidate for parliamentary elections, or be appointed minister. However, ordinary naturalized citizens could vote for municipal elections.</span><sup class="reference" data-dcnode-id="8104" id="cite_ref-61"><a data-dcnode-id="8105" href="#cite_note-61"><span data-dcnode-id="8106" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8103" instrument_node=""> Ordinary naturalized citizens and citizens who had acquired Belgian nationality through marriage could vote, but not run as candidates for parliamentary elections in 1976. The concepts of ordinary and grande naturalization were suppressed from the Constitution in 1991.</span><sup class="reference" data-dcnode-id="8100" id="cite_ref-62"><a data-dcnode-id="8101" href="#cite_note-62"><span data-dcnode-id="8102" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8099" instrument_node="">
</span></p><p data-dcnode-id="8089"><span data-dcnode-id="8097" instrument_node="">In </span><a data-dcnode-id="8095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="8096" instrument_node="">France</span></a><span data-dcnode-id="8094" instrument_node="">, the 1889 Nationality Law barred those who had acquired the French nationality by naturalization or marriage from voting, and from eligibility and access to several public jobs. In 1938 the delay was reduced to five years.</span><sup class="reference" data-dcnode-id="8091" id="cite_ref-63"><a data-dcnode-id="8092" href="#cite_note-63"><span data-dcnode-id="8093" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8090" instrument_node=""> These instances of discrimination, as well as others against naturalized citizens, were gradually abolished in 1973 (9 January 1973 law) and 1983.
</span></p><p data-dcnode-id="8074"><span data-dcnode-id="8088" instrument_node="">In </span><a data-dcnode-id="8086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morocco" title="Morocco"><span data-dcnode-id="8087" instrument_node="">Morocco</span></a><span data-dcnode-id="8085" instrument_node="">, a former French </span><a data-dcnode-id="8083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protectorate" title="Protectorate"><span data-dcnode-id="8084" instrument_node="">protectorate</span></a><span data-dcnode-id="8082" instrument_node="">, and in Guinea, a former French colony, naturalized citizens are prohibited from voting for five years following their naturalization.</span><sup class="reference" data-dcnode-id="8079" id="cite_ref-64"><a data-dcnode-id="8080" href="#cite_note-64"><span data-dcnode-id="8081" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="8076" id="cite_ref-65"><a data-dcnode-id="8077" href="#cite_note-65"><span data-dcnode-id="8078" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8075" instrument_node="">
</span></p><p data-dcnode-id="8065"><span data-dcnode-id="8073" instrument_node="">In the </span><a data-dcnode-id="8071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federated_States_of_Micronesia" title="Federated States of Micronesia"><span data-dcnode-id="8072" instrument_node="">Federated States of Micronesia</span></a><span data-dcnode-id="8070" instrument_node="">, one must be a Micronesian citizen for at least 15 years to run for parliament.</span><sup class="reference" data-dcnode-id="8067" id="cite_ref-66"><a data-dcnode-id="8068" href="#cite_note-66"><span data-dcnode-id="8069" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8066" instrument_node="">
</span></p><p data-dcnode-id="8044"><span data-dcnode-id="8064" instrument_node="">In </span><a data-dcnode-id="8062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicaragua" title="Nicaragua"><span data-dcnode-id="8063" instrument_node="">Nicaragua</span></a><span data-dcnode-id="8061" instrument_node="">, </span><a data-dcnode-id="8059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peru" title="Peru"><span data-dcnode-id="8060" instrument_node="">Peru</span></a><span data-dcnode-id="8058" instrument_node=""> and the </span><a data-dcnode-id="8056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippines" title="Philippines"><span data-dcnode-id="8057" instrument_node="">Philippines</span></a><span data-dcnode-id="8055" instrument_node="">, only citizens by birth are eligible for being elected to the national legislature; naturalized citizens enjoy only voting rights.</span><sup class="reference" data-dcnode-id="8052" id="cite_ref-67"><a data-dcnode-id="8053" href="#cite_note-67"><span data-dcnode-id="8054" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="8049" id="cite_ref-68"><a data-dcnode-id="8050" href="#cite_note-68"><span data-dcnode-id="8051" instrument_node="">[66]</span></a></sup><sup class="reference" data-dcnode-id="8046" id="cite_ref-69"><a data-dcnode-id="8047" href="#cite_note-69"><span data-dcnode-id="8048" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8045" instrument_node="">
</span></p><p data-dcnode-id="8035"><span data-dcnode-id="8043" instrument_node="">In </span><a data-dcnode-id="8041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uruguay" title="Uruguay"><span data-dcnode-id="8042" instrument_node="">Uruguay</span></a><span data-dcnode-id="8040" instrument_node="">, naturalized citizens have the right of eligibility to the parliament after five years.</span><sup class="reference" data-dcnode-id="8037" id="cite_ref-70"><a data-dcnode-id="8038" href="#cite_note-70"><span data-dcnode-id="8039" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8036" instrument_node="">
</span></p><p data-dcnode-id="8030"><span data-dcnode-id="8034" instrument_node="">In the United States, the President and </span><a data-dcnode-id="8032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vice_President_of_the_United_States" title="Vice President of the United States"><span data-dcnode-id="8033" instrument_node="">Vice President</span></a><span data-dcnode-id="8031" instrument_node=""> must be natural-born citizens. All other governmental offices may be held by any citizen, although citizens may only run for Congress after an extended period of citizenship (seven years for the House of Representatives and nine for the Senate).
</span></p><span data-dcnode-id="8029" instrument_node="">
</span><h3 data-dcnode-id="8019"><span class="mw-headline" data-dcnode-id="8027" id="Function"><span data-dcnode-id="8028" instrument_node="">Function</span></span><span class="mw-editsection" data-dcnode-id="8020"><span class="mw-editsection-bracket" data-dcnode-id="8025"><span data-dcnode-id="8026" instrument_node="">[</span></span><a data-dcnode-id="8023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D21" title="Edit section: Function"><span data-dcnode-id="8024" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8021"><span data-dcnode-id="8022" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8018" instrument_node="">
</span><p data-dcnode-id="8012"><span data-dcnode-id="8017" instrument_node="">In France, an 1872 law, rescinded by a 1945 decree, prohibited all army personnel from voting.</span><sup class="reference" data-dcnode-id="8014" id="cite_ref-71"><a data-dcnode-id="8015" href="#cite_note-71"><span data-dcnode-id="8016" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8013" instrument_node="">
</span></p><p data-dcnode-id="7988"><span data-dcnode-id="8011" instrument_node="">In Ireland, police (the </span><a data-dcnode-id="8009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Garda_S%25C3%25ADoch%25C3%25A1na" title="Garda Síochána"><span data-dcnode-id="8010" instrument_node="">Garda Síochána</span></a><span data-dcnode-id="8008" instrument_node=""> and, before 1925, the </span><a data-dcnode-id="8006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dublin_Metropolitan_Police" title="Dublin Metropolitan Police"><span data-dcnode-id="8007" instrument_node="">Dublin Metropolitan Police</span></a><span data-dcnode-id="8005" instrument_node="">) were barred from voting in national elections, though not </span><a data-dcnode-id="8003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_government_in_the_Republic_of_Ireland" title="Local government in the Republic of Ireland"><span data-dcnode-id="8004" instrument_node="">local elections</span></a><span data-dcnode-id="8002" instrument_node="">, from 1923 to 1960.</span><sup class="reference" data-dcnode-id="7999" id="cite_ref-72"><a data-dcnode-id="8000" href="#cite_note-72"><span data-dcnode-id="8001" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="7996" id="cite_ref-73"><a data-dcnode-id="7997" href="#cite_note-73"><span data-dcnode-id="7998" instrument_node="">[71]</span></a></sup><sup class="reference" data-dcnode-id="7993" id="cite_ref-74"><a data-dcnode-id="7994" href="#cite_note-74"><span data-dcnode-id="7995" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="7990" id="cite_ref-75"><a data-dcnode-id="7991" href="#cite_note-75"><span data-dcnode-id="7992" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7989" instrument_node="">
</span></p><p data-dcnode-id="7979"><span data-dcnode-id="7987" instrument_node="">The 1876 </span><a data-dcnode-id="7985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Texas" title="Constitution of Texas"><span data-dcnode-id="7986" instrument_node="">Constitution of Texas</span></a><span data-dcnode-id="7984" instrument_node=""> (article VI, section 1) stated that "The following classes of persons shall not be allowed to vote in this State, to wit: (…) Fifth—All soldiers, marines and seamen, employed in the service of the army or navy of the United States."</span><sup class="reference" data-dcnode-id="7981" id="cite_ref-76"><a data-dcnode-id="7982" href="#cite_note-76"><span data-dcnode-id="7983" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7980" instrument_node="">
</span></p><p data-dcnode-id="7974"><span data-dcnode-id="7978" instrument_node="">In many countries with a </span><a data-dcnode-id="7976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidential_system" title="Presidential system"><span data-dcnode-id="7977" instrument_node="">presidential system</span></a><span data-dcnode-id="7975" instrument_node=""> of government a person is forbidden to be a legislator and an official of the executive branch at the same time. Such provisions are found, for example, in Article I of the U.S. Constitution.
</span></p><span data-dcnode-id="7973" instrument_node="">
</span><h2 data-dcnode-id="7963"><span class="mw-headline" data-dcnode-id="7971" id="History_around_the_world"><span data-dcnode-id="7972" instrument_node="">History around the world</span></span><span class="mw-editsection" data-dcnode-id="7964"><span class="mw-editsection-bracket" data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">[</span></span><a data-dcnode-id="7967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D22" title="Edit section: History around the world"><span data-dcnode-id="7968" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7965"><span data-dcnode-id="7966" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7962" instrument_node="">
</span><link data-dcnode-id="7961" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7948" role="note"><span data-dcnode-id="7960" instrument_node="">See also: </span><a data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_suffrage%23Dates_by_country" title="Universal suffrage"><span data-dcnode-id="7959" instrument_node="">Universal suffrage §&nbsp;Dates by country</span></a><span data-dcnode-id="7957" instrument_node="">, </span><a data-dcnode-id="7955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_women%2527s_suffrage" title="Timeline of women's suffrage"><span data-dcnode-id="7956" instrument_node="">Timeline of women's suffrage</span></a><span data-dcnode-id="7954" instrument_node="">, </span><a data-dcnode-id="7952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_women%2527s_suffrage_in_the_United_States" title="Timeline of women's suffrage in the United States"><span data-dcnode-id="7953" instrument_node="">Timeline of women's suffrage in the United States</span></a><span data-dcnode-id="7951" instrument_node="">, and </span><a data-dcnode-id="7949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" title="Voting age"><span data-dcnode-id="7950" instrument_node="">Voting age</span></a></div><span data-dcnode-id="7947" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7935"><div class="thumbinner" data-dcnode-id="7936" style="width:352px;"><a class="image" data-dcnode-id="7945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUniversal_suffrage_granted_to_women%2C_OWID.svg"><img alt="" class="thumbimage" data-dcnode-id="7946" data-file-height="600" data-file-width="850" decoding="async" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/78/Universal_suffrage_granted_to_women%252C_OWID.svg/350px-Universal_suffrage_granted_to_women%252C_OWID.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/78/Universal_suffrage_granted_to_women%2C_OWID.svg/525px-Universal_suffrage_granted_to_women%2C_OWID.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/78/Universal_suffrage_granted_to_women%2C_OWID.svg/700px-Universal_suffrage_granted_to_women%2C_OWID.svg.png 2x" width="350"></a><span data-dcnode-id="7944" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7937"><div class="magnify" data-dcnode-id="7942"><a class="internal" data-dcnode-id="7943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUniversal_suffrage_granted_to_women%2C_OWID.svg" title="Enlarge"></a></div><span data-dcnode-id="7941" instrument_node="">Countries with universal suffrage granted to women, 2017</span><sup class="reference" data-dcnode-id="7938" id="cite_ref-77"><a data-dcnode-id="7939" href="#cite_note-77"><span data-dcnode-id="7940" instrument_node="">[75]</span></a></sup></div></div></div><span data-dcnode-id="7934" instrument_node="">
</span><p data-dcnode-id="7926"><span data-dcnode-id="7933" instrument_node="">In 1840, the Kingdom of Hawai'i adopted full suffrage for all subjects without mention of sex, but the constitution of 1852 specified voting by male subjects over the age of 20. In 1902 the </span><a data-dcnode-id="7931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_Franchise_Act_1902" title="Commonwealth Franchise Act 1902"><span data-dcnode-id="7932" instrument_node="">Commonwealth Franchise Act</span></a><span data-dcnode-id="7930" instrument_node=""> enabled women to vote federally in Australia and in the state of New South Wales. This legislation also allowed women to run for government, making Australia the first in the world to allow this. In 1906 Finland became the next nation in the world to give all adult citizens full suffrage, in other words the right to vote and to run for office. New Zealand granted all adult citizens the right to vote (in 1893), but women did not get the right to run for the </span><a data-dcnode-id="7928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_House_of_Representatives" title="New Zealand House of Representatives"><span data-dcnode-id="7929" instrument_node="">New Zealand legislature</span></a><span data-dcnode-id="7927" instrument_node=""> until 1919.
</span></p><span data-dcnode-id="7925" instrument_node="">
</span><h3 data-dcnode-id="7915"><span class="mw-headline" data-dcnode-id="7923" id="Australia"><span data-dcnode-id="7924" instrument_node="">Australia</span></span><span class="mw-editsection" data-dcnode-id="7916"><span class="mw-editsection-bracket" data-dcnode-id="7921"><span data-dcnode-id="7922" instrument_node="">[</span></span><a data-dcnode-id="7919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D23" title="Edit section: Australia"><span data-dcnode-id="7920" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7917"><span data-dcnode-id="7918" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7914" instrument_node="">
</span><link data-dcnode-id="7913" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7906" role="note"><span data-dcnode-id="7912" instrument_node="">See also: </span><a data-dcnode-id="7910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffrage_in_Australia" title="Suffrage in Australia"><span data-dcnode-id="7911" instrument_node="">Suffrage in Australia</span></a><span data-dcnode-id="7909" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_rights_of_Australian_Aboriginals" title="Voting rights of Australian Aboriginals"><span data-dcnode-id="7908" instrument_node="">Voting rights of Australian Aboriginals</span></a></div><span data-dcnode-id="7905" instrument_node="">
</span><ul data-dcnode-id="7854"><li data-dcnode-id="7900"><span data-dcnode-id="7904" instrument_node="">1855 – South Australia is the first colony to allow all male suffrage to British subjects (later extended to </span><a data-dcnode-id="7902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aboriginal_Australians" title="Aboriginal Australians"><span data-dcnode-id="7903" instrument_node="">Aboriginal Australians</span></a><span data-dcnode-id="7901" instrument_node=""> over the age of 21.</span></li><span data-dcnode-id="7899" instrument_node="">
</span><li data-dcnode-id="7894"><span data-dcnode-id="7898" instrument_node="">1894 – South Australian women eligible to vote.</span><sup class="reference" data-dcnode-id="7895" id="cite_ref-aec_78-0"><a data-dcnode-id="7896" href="#cite_note-aec-78"><span data-dcnode-id="7897" instrument_node="">[76]</span></a></sup></li><span data-dcnode-id="7893" instrument_node="">
</span><li data-dcnode-id="7891"><span data-dcnode-id="7892" instrument_node="">1896 – Tasmania becomes last colony to allow all male suffrage.</span></li><span data-dcnode-id="7890" instrument_node="">
</span><li data-dcnode-id="7885"><span data-dcnode-id="7889" instrument_node="">1899 – Western Australian women eligible to vote.</span><sup class="reference" data-dcnode-id="7886" id="cite_ref-aec_78-1"><a data-dcnode-id="7887" href="#cite_note-aec-78"><span data-dcnode-id="7888" instrument_node="">[76]</span></a></sup></li><span data-dcnode-id="7884" instrument_node="">
</span><li data-dcnode-id="7879"><span data-dcnode-id="7883" instrument_node="">1902 – The </span><a data-dcnode-id="7881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_Franchise_Act_1902" title="Commonwealth Franchise Act 1902"><span data-dcnode-id="7882" instrument_node="">Commonwealth Franchise Act</span></a><span data-dcnode-id="7880" instrument_node=""> enables women to vote federally and in the state of New South Wales. This legislation also allows women to run for government, making Australia the first democratic state in the world to allow this.</span></li><span data-dcnode-id="7878" instrument_node="">
</span><li data-dcnode-id="7870"><span data-dcnode-id="7877" instrument_node="">1921 – </span><a data-dcnode-id="7875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edith_Cowan" title="Edith Cowan"><span data-dcnode-id="7876" instrument_node="">Edith Cowan</span></a><span data-dcnode-id="7874" instrument_node=""> is elected to the West Australian Legislative Assembly as member for West Perth, the first woman elected to any Australian Parliament.</span><sup class="reference" data-dcnode-id="7871" id="cite_ref-79"><a data-dcnode-id="7872" href="#cite_note-79"><span data-dcnode-id="7873" instrument_node="">[77]</span></a></sup></li><span data-dcnode-id="7869" instrument_node="">
</span><li data-dcnode-id="7864"><span data-dcnode-id="7868" instrument_node="">1962 – </span><a class="mw-redirect" data-dcnode-id="7866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Aborigines" title="Australian Aborigines"><span data-dcnode-id="7867" instrument_node="">Australian Aborigines</span></a><span data-dcnode-id="7865" instrument_node=""> guaranteed the right to vote in Commonwealth elections, however, in practice this right was dependent on Aboriginal voting rights having been granted by the individual's respective state.</span></li><span data-dcnode-id="7863" instrument_node="">
</span><li data-dcnode-id="7861"><span data-dcnode-id="7862" instrument_node="">1965 – Queensland is the last state to grant voting rights to Aboriginal Australians.</span></li><span data-dcnode-id="7860" instrument_node="">
</span><li data-dcnode-id="7855"><span data-dcnode-id="7859" instrument_node="">1973 - After South Australian Premier </span><a data-dcnode-id="7857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Don_Dunstan" title="Don Dunstan"><span data-dcnode-id="7858" instrument_node="">Don Dunstan</span></a><span data-dcnode-id="7856" instrument_node=""> introduced the Age of Majority (Reduction) Bill in October 1970, the voting age in South Australia was lowered to 18 years old in 1973. Consequently, the voting age for all federal elections was lowered from 21 to 18. The states had lowered the voting age to 18 by 1973, the first being Western Australia in 1970.</span></li></ul><span data-dcnode-id="7853" instrument_node="">
</span><h3 data-dcnode-id="7843"><span class="mw-headline" data-dcnode-id="7851" id="Brazil"><span data-dcnode-id="7852" instrument_node="">Brazil</span></span><span class="mw-editsection" data-dcnode-id="7844"><span class="mw-editsection-bracket" data-dcnode-id="7849"><span data-dcnode-id="7850" instrument_node="">[</span></span><a data-dcnode-id="7847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D24" title="Edit section: Brazil"><span data-dcnode-id="7848" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7845"><span data-dcnode-id="7846" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7842" instrument_node="">
</span><ul data-dcnode-id="7821"><li data-dcnode-id="7840"><span data-dcnode-id="7841" instrument_node="">1824 – The first Brazilian constitution allows free men over the age of 25 to vote, even former slaves, but there are income restrictions. The House of Deputies' representatives are chosen via electoral colleges.</span></li><span data-dcnode-id="7839" instrument_node="">
</span><li data-dcnode-id="7837"><span data-dcnode-id="7838" instrument_node="">1881 – The Saraiva Law implements direct voting, but there are literacy restriction. Women and slaves do not have the right to vote.</span></li><span data-dcnode-id="7836" instrument_node="">
</span><li data-dcnode-id="7834"><span data-dcnode-id="7835" instrument_node="">1932 – Voting becomes obligatory for all adults over 21 years of age, unlimited by gender or income.</span></li><span data-dcnode-id="7833" instrument_node="">
</span><li data-dcnode-id="7831"><span data-dcnode-id="7832" instrument_node="">1955 – Adoption of standardized voting ballots and identification requirements to mitigate frauds.</span></li><span data-dcnode-id="7830" instrument_node="">
</span><li data-dcnode-id="7828"><span data-dcnode-id="7829" instrument_node="">1964 – Military regime established. From then on, presidents were elected by members of the congress, chosen by regular vote.</span></li><span data-dcnode-id="7827" instrument_node="">
</span><li data-dcnode-id="7825"><span data-dcnode-id="7826" instrument_node="">1989 – Reestablishment of universal suffrage for all citizens over 16 years of age. People considered illiterate are not obliged to vote, nor are people younger than 18 and older than 70 years of age. People under the obligation rule shall file a document to justify their absence should they not vote.</span></li><span data-dcnode-id="7824" instrument_node="">
</span><li data-dcnode-id="7822"><span data-dcnode-id="7823" instrument_node="">2000 – Brazil becomes the first country to fully adopt electronic ballots in their voting process.</span></li></ul><span data-dcnode-id="7820" instrument_node="">
</span><h3 data-dcnode-id="7810"><span class="mw-headline" data-dcnode-id="7818" id="Canada"><span data-dcnode-id="7819" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="7811"><span class="mw-editsection-bracket" data-dcnode-id="7816"><span data-dcnode-id="7817" instrument_node="">[</span></span><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D25" title="Edit section: Canada"><span data-dcnode-id="7815" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7812"><span data-dcnode-id="7813" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7809" instrument_node="">
</span><link data-dcnode-id="7808" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7804" role="note"><span data-dcnode-id="7807" instrument_node="">See also: </span><a data-dcnode-id="7805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Famous_Five_%28Canada%29" title="The Famous Five (Canada)"><span data-dcnode-id="7806" instrument_node="">The Famous Five (Canada)</span></a></div><span data-dcnode-id="7803" instrument_node="">
</span><ul data-dcnode-id="7606"><li data-dcnode-id="7798"><span data-dcnode-id="7802" instrument_node="">1871 – One of the first acts of the new Province of </span><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Columbia" title="British Columbia"><span data-dcnode-id="7801" instrument_node="">British Columbia</span></a><span data-dcnode-id="7799" instrument_node=""> strips the franchise from First Nations, and ensures Chinese and Japanese people are prevented from voting.</span></li><span data-dcnode-id="7797" instrument_node="">
