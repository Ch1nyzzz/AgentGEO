</span><li data-dcnode-id="7779"><span data-dcnode-id="7796" instrument_node="">1916 – </span><a data-dcnode-id="7794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manitoba" title="Manitoba"><span data-dcnode-id="7795" instrument_node="">Manitoba</span></a><span data-dcnode-id="7793" instrument_node=""> becomes the first province in which women have the right to vote in provincial elections.</span><sup class="reference" data-dcnode-id="7790" id="cite_ref-80"><a data-dcnode-id="7791" href="#cite_note-80"><span data-dcnode-id="7792" instrument_node="">[78]</span></a></sup><sup class="reference" data-dcnode-id="7787" id="cite_ref-81"><a data-dcnode-id="7788" href="#cite_note-81"><span data-dcnode-id="7789" instrument_node="">[79]</span></a></sup><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7780" style="white-space:nowrap;"><span data-dcnode-id="7786" instrument_node="">[</span><i data-dcnode-id="7782"><a data-dcnode-id="7783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7784" title="This claim needs references to reliable sources. (March 2009)"><span data-dcnode-id="7785" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7781" instrument_node="">]</span></sup></li><span data-dcnode-id="7778" instrument_node="">
</span><li data-dcnode-id="7756"><span data-dcnode-id="7777" instrument_node="">1917 – </span><a data-dcnode-id="7775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wartime_Elections_Act" title="Wartime Elections Act"><span data-dcnode-id="7776" instrument_node="">Wartime Elections Act</span></a><span data-dcnode-id="7774" instrument_node=""> gives voting rights to women with relatives fighting overseas. Voting rights are stripped from all "</span><a class="mw-redirect" data-dcnode-id="7772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enemy_aliens" title="Enemy aliens"><span data-dcnode-id="7773" instrument_node="">enemy aliens</span></a><span data-dcnode-id="7771" instrument_node="">" (those born in enemy countries who arrived in Canada after 1902; see also </span><a data-dcnode-id="7769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Canadian_internment" title="Ukrainian Canadian internment"><span data-dcnode-id="7770" instrument_node="">Ukrainian Canadian internment</span></a><span data-dcnode-id="7768" instrument_node="">).</span><sup class="reference" data-dcnode-id="7765" id="cite_ref-82"><a data-dcnode-id="7766" href="#cite_note-82"><span data-dcnode-id="7767" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7764" instrument_node=""> </span><a data-dcnode-id="7762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_Voters_Act" title="Military Voters Act"><span data-dcnode-id="7763" instrument_node="">Military Voters Act</span></a><span data-dcnode-id="7761" instrument_node=""> gives the vote to all soldiers, even non-citizens, (with the exception of Indian and Metis veterans)</span><sup class="reference" data-dcnode-id="7758" id="cite_ref-83"><a data-dcnode-id="7759" href="#cite_note-83"><span data-dcnode-id="7760" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7757" instrument_node=""> and to women serving as nurses or clerks for the armed forces, but the votes are not for specific candidates but simply for or against the government.</span></li><span data-dcnode-id="7755" instrument_node="">
</span><li data-dcnode-id="7750"><span data-dcnode-id="7754" instrument_node="">1918 – Women gain full voting rights in federal elections.</span><sup class="reference" data-dcnode-id="7751" id="cite_ref-faculty.marianopolis.edu_84-0"><a data-dcnode-id="7752" href="#cite_note-faculty.marianopolis.edu-84"><span data-dcnode-id="7753" instrument_node="">[82]</span></a></sup></li><span data-dcnode-id="7749" instrument_node="">
</span><li data-dcnode-id="7744"><span data-dcnode-id="7748" instrument_node="">1919 – Women gain the right to run for federal office.</span><sup class="reference" data-dcnode-id="7745" id="cite_ref-faculty.marianopolis.edu_84-1"><a data-dcnode-id="7746" href="#cite_note-faculty.marianopolis.edu-84"><span data-dcnode-id="7747" instrument_node="">[82]</span></a></sup></li><span data-dcnode-id="7743" instrument_node="">
</span><li data-dcnode-id="7738"><span data-dcnode-id="7742" instrument_node="">1940 – Quebec becomes the last province where women's right to vote is recognized. (see </span><a class="mw-redirect" data-dcnode-id="7740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_women_during_the_world_wars" title="Canadian women during the world wars"><span data-dcnode-id="7741" instrument_node="">Canadian women during the world wars</span></a><span data-dcnode-id="7739" instrument_node=""> for more information on Canadian suffrage)</span></li><span data-dcnode-id="7737" instrument_node="">
</span><li data-dcnode-id="7735"><span data-dcnode-id="7736" instrument_node="">1947 – Racial exclusions against Chinese and Indo-Canadians lifted.</span></li><span data-dcnode-id="7734" instrument_node="">
</span><li data-dcnode-id="7729"><span data-dcnode-id="7733" instrument_node="">1948 – Racial exclusions against Japanese Canadians lifted.</span><sup class="reference" data-dcnode-id="7730" id="cite_ref-85"><a data-dcnode-id="7731" href="#cite_note-85"><span data-dcnode-id="7732" instrument_node="">[83]</span></a></sup></li><span data-dcnode-id="7728" instrument_node="">
</span><li data-dcnode-id="7723"><span data-dcnode-id="7727" instrument_node="">1955 – Religious exclusions are removed from election laws.</span><sup class="reference" data-dcnode-id="7724" id="cite_ref-Canada_86-0"><a data-dcnode-id="7725" href="#cite_note-Canada-86"><span data-dcnode-id="7726" instrument_node="">[84]</span></a></sup></li><span data-dcnode-id="7722" instrument_node="">
</span><li data-dcnode-id="7714"><span data-dcnode-id="7721" instrument_node="">1960 – Right to vote is extended unconditionally to </span><a data-dcnode-id="7719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Nations_in_Canada" title="First Nations in Canada"><span data-dcnode-id="7720" instrument_node="">First Nations</span></a><span data-dcnode-id="7718" instrument_node=""> peoples. (Previously they could vote only by giving up their status as First Nations people.)</span><sup class="reference" data-dcnode-id="7715" id="cite_ref-FN_87-0"><a data-dcnode-id="7716" href="#cite_note-FN-87"><span data-dcnode-id="7717" instrument_node="">[85]</span></a></sup></li><span data-dcnode-id="7713" instrument_node="">
</span><li data-dcnode-id="7701"><span data-dcnode-id="7712" instrument_node="">1960 – Right to vote in advance is extended to all electors willing to swear they would be absent on election day.</span><sup class="reference" data-dcnode-id="7709" id="cite_ref-88"><a data-dcnode-id="7710" href="#cite_note-88"><span data-dcnode-id="7711" instrument_node="">[86]</span></a></sup><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7702" style="white-space:nowrap;"><span data-dcnode-id="7708" instrument_node="">[</span><i data-dcnode-id="7704"><a data-dcnode-id="7705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7706" title="This claim needs references to reliable sources. (March 2009)"><span data-dcnode-id="7707" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7703" instrument_node="">]</span></sup></li><span data-dcnode-id="7700" instrument_node="">
</span><li data-dcnode-id="7686"><span data-dcnode-id="7699" instrument_node="">1965 – </span><a data-dcnode-id="7697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Nations_in_Canada" title="First Nations in Canada"><span data-dcnode-id="7698" instrument_node="">First Nations</span></a><span data-dcnode-id="7696" instrument_node=""> people granted the right to vote in </span><a data-dcnode-id="7694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alberta" title="Alberta"><span data-dcnode-id="7695" instrument_node="">Alberta</span></a><span data-dcnode-id="7693" instrument_node=""> provincial elections, starting with the </span><a data-dcnode-id="7691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1967_Alberta_general_election" title="1967 Alberta general election"><span data-dcnode-id="7692" instrument_node="">1967 Alberta general election</span></a><span data-dcnode-id="7690" instrument_node="">.</span><sup class="reference" data-dcnode-id="7687" id="cite_ref-FN_87-1"><a data-dcnode-id="7688" href="#cite_note-FN-87"><span data-dcnode-id="7689" instrument_node="">[85]</span></a></sup></li><span data-dcnode-id="7685" instrument_node="">
</span><li data-dcnode-id="7671"><span data-dcnode-id="7684" instrument_node="">1969 – </span><a data-dcnode-id="7682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Nations_in_Canada" title="First Nations in Canada"><span data-dcnode-id="7683" instrument_node="">First Nations</span></a><span data-dcnode-id="7681" instrument_node=""> people granted the right to vote in </span><a data-dcnode-id="7679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quebec" title="Quebec"><span data-dcnode-id="7680" instrument_node="">Quebec</span></a><span data-dcnode-id="7678" instrument_node=""> provincial elections, starting with the </span><a data-dcnode-id="7676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1970_Quebec_general_election" title="1970 Quebec general election"><span data-dcnode-id="7677" instrument_node="">1970 Quebec general election</span></a><span data-dcnode-id="7675" instrument_node="">.</span><sup class="reference" data-dcnode-id="7672" id="cite_ref-FN_87-2"><a data-dcnode-id="7673" href="#cite_note-FN-87"><span data-dcnode-id="7674" instrument_node="">[85]</span></a></sup></li><span data-dcnode-id="7670" instrument_node="">
</span><li data-dcnode-id="7665"><span data-dcnode-id="7669" instrument_node="">1970 – Voting age lowered from 21 to 18.</span><sup class="reference" data-dcnode-id="7666" id="cite_ref-89"><a data-dcnode-id="7667" href="#cite_note-89"><span data-dcnode-id="7668" instrument_node="">[87]</span></a></sup></li><span data-dcnode-id="7664" instrument_node="">
</span><li data-dcnode-id="7658"><span data-dcnode-id="7663" instrument_node="">1982 – </span><i data-dcnode-id="7660"><a data-dcnode-id="7661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_Charter_of_Rights_and_Freedoms" title="Canadian Charter of Rights and Freedoms"><span data-dcnode-id="7662" instrument_node="">Canadian Charter of Rights and Freedoms</span></a></i><span data-dcnode-id="7659" instrument_node=""> guarantees all adult citizens the right to vote.</span></li><span data-dcnode-id="7657" instrument_node="">
</span><li data-dcnode-id="7652"><span data-dcnode-id="7656" instrument_node="">1988 – Supreme Court of Canada rules mentally ill patients have the right to vote.</span><sup class="reference" data-dcnode-id="7653" id="cite_ref-90"><a data-dcnode-id="7654" href="#cite_note-90"><span data-dcnode-id="7655" instrument_node="">[88]</span></a></sup></li><span data-dcnode-id="7651" instrument_node="">
</span><li data-dcnode-id="7638"><span data-dcnode-id="7650" instrument_node="">1993</span><sup class="reference" data-dcnode-id="7647" id="cite_ref-Canada_86-1"><a data-dcnode-id="7648" href="#cite_note-Canada-86"><span data-dcnode-id="7649" instrument_node="">[84]</span></a></sup><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7640" style="white-space:nowrap;"><span data-dcnode-id="7646" instrument_node="">[</span><i data-dcnode-id="7642"><a data-dcnode-id="7643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7644" title="This claim needs references to reliable sources. (March 2009)"><span data-dcnode-id="7645" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7641" instrument_node="">]</span></sup><span data-dcnode-id="7639" instrument_node=""> – Any elector can vote in advance.</span></li><span data-dcnode-id="7637" instrument_node="">
</span><li data-dcnode-id="7632"><span data-dcnode-id="7636" instrument_node="">2000 – Legislation is introduced making it easier for people of </span><a data-dcnode-id="7634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/No_fixed_abode" title="No fixed abode"><span data-dcnode-id="7635" instrument_node="">no fixed address</span></a><span data-dcnode-id="7633" instrument_node=""> to vote.</span></li><span data-dcnode-id="7631" instrument_node="">
</span><li data-dcnode-id="7623"><span data-dcnode-id="7630" instrument_node="">2002 – Prisoners given the right to vote in the riding (voting district) where they were convicted. All adult Canadians except the Chief and Deputy </span><a class="new" data-dcnode-id="7628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_Officer%26action%3Dedit%26redlink%3D1" title="Electoral Officer (page does not exist)"><span data-dcnode-id="7629" instrument_node="">Electoral Officers</span></a><span data-dcnode-id="7627" instrument_node=""> can now vote in Canada.</span><sup class="reference" data-dcnode-id="7624" id="cite_ref-91"><a data-dcnode-id="7625" href="#cite_note-91"><span data-dcnode-id="7626" instrument_node="">[89]</span></a></sup></li><span data-dcnode-id="7622" instrument_node="">
</span><li data-dcnode-id="7607"><span data-dcnode-id="7621" instrument_node="">2019 – The </span><a data-dcnode-id="7619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_Canada" title="Supreme Court of Canada"><span data-dcnode-id="7620" instrument_node="">Supreme Court of Canada</span></a><span data-dcnode-id="7618" instrument_node=""> rules that portions of the </span><i data-dcnode-id="7615"><a data-dcnode-id="7616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada_Elections_Act" title="Canada Elections Act"><span data-dcnode-id="7617" instrument_node="">Canada Elections Act</span></a></i><span data-dcnode-id="7614" instrument_node=""> which prevent citizens who have been living abroad for more than five years from voting by mail are in violation of </span><a data-dcnode-id="7612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Section_3_of_the_Canadian_Charter_of_Rights_and_Freedoms" title="Section 3 of the Canadian Charter of Rights and Freedoms"><span data-dcnode-id="7613" instrument_node="">Section 3 of the Canadian Charter of Rights and Freedoms</span></a><span data-dcnode-id="7611" instrument_node=""> and thus unconstitutional.</span><sup class="reference" data-dcnode-id="7608" id="cite_ref-92"><a data-dcnode-id="7609" href="#cite_note-92"><span data-dcnode-id="7610" instrument_node="">[90]</span></a></sup></li></ul><span data-dcnode-id="7605" instrument_node="">
</span><h3 data-dcnode-id="7595"><span class="mw-headline" data-dcnode-id="7603" id="European_Union"><span data-dcnode-id="7604" instrument_node="">European Union</span></span><span class="mw-editsection" data-dcnode-id="7596"><span class="mw-editsection-bracket" data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">[</span></span><a data-dcnode-id="7599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D26" title="Edit section: European Union"><span data-dcnode-id="7600" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7597"><span data-dcnode-id="7598" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7594" instrument_node="">
</span><p data-dcnode-id="7588"><span data-dcnode-id="7593" instrument_node="">The European Union has given the right to vote in municipal elections to the citizen of another EU country by the Council Directive 94/80/EG from 19 December 1994.</span><sup class="reference" data-dcnode-id="7590" id="cite_ref-93"><a data-dcnode-id="7591" href="#cite_note-93"><span data-dcnode-id="7592" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7589" instrument_node="">
</span></p><span data-dcnode-id="7587" instrument_node="">
</span><h3 data-dcnode-id="7577"><span class="mw-headline" data-dcnode-id="7585" id="Finland"><span data-dcnode-id="7586" instrument_node="">Finland</span></span><span class="mw-editsection" data-dcnode-id="7578"><span class="mw-editsection-bracket" data-dcnode-id="7583"><span data-dcnode-id="7584" instrument_node="">[</span></span><a data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D27" title="Edit section: Finland"><span data-dcnode-id="7582" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7579"><span data-dcnode-id="7580" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7576" instrument_node="">
</span><ul data-dcnode-id="7525"><li data-dcnode-id="7574"><span data-dcnode-id="7575" instrument_node="">1906 – Full suffrage for all citizens adults aged 24 or older at beginning of voting year.</span></li><span data-dcnode-id="7573" instrument_node="">
</span><li data-dcnode-id="7568"><span data-dcnode-id="7572" instrument_node="">1921 – Suppression of </span><a data-dcnode-id="7570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plural_voting" title="Plural voting"><span data-dcnode-id="7571" instrument_node="">property-based number of votes</span></a><span data-dcnode-id="7569" instrument_node=""> on municipal level; equal vote for everybody.</span></li><span data-dcnode-id="7567" instrument_node="">
</span><li data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">1944 – Voting age lowered to 21 years.</span></li><span data-dcnode-id="7564" instrument_node="">
</span><li data-dcnode-id="7562"><span data-dcnode-id="7563" instrument_node="">1969 – Voting age lowered to 20 years.</span></li><span data-dcnode-id="7561" instrument_node="">
</span><li data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">1972 – Voting age lowered to 18 years.</span></li><span data-dcnode-id="7558" instrument_node="">
</span><li data-dcnode-id="7550"><span data-dcnode-id="7557" instrument_node="">1981 – Voting and eligibility rights were granted to </span><a data-dcnode-id="7555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nordic_Passport_Union" title="Nordic Passport Union"><span data-dcnode-id="7556" instrument_node="">Nordic Passport Union</span></a><span data-dcnode-id="7554" instrument_node=""> country citizens without residency condition for </span><a data-dcnode-id="7552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Municipalities_of_Finland" title="Municipalities of Finland"><span data-dcnode-id="7553" instrument_node="">municipal</span></a><span data-dcnode-id="7551" instrument_node=""> elections.</span></li><span data-dcnode-id="7549" instrument_node="">
</span><li data-dcnode-id="7544"><span data-dcnode-id="7548" instrument_node="">1991 – Voting and eligibility rights were extended to all foreign residents in 1991 with a two-year residency condition for </span><a data-dcnode-id="7546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Municipalities_of_Finland" title="Municipalities of Finland"><span data-dcnode-id="7547" instrument_node="">municipal</span></a><span data-dcnode-id="7545" instrument_node=""> elections.</span></li><span data-dcnode-id="7543" instrument_node="">
</span><li data-dcnode-id="7541"><span data-dcnode-id="7542" instrument_node="">1995 – Residency requirement abolished for EU residents, in conformity with European legislation (Law 365/95, confirmed by Electoral Law 714/1998).</span></li><span data-dcnode-id="7540" instrument_node="">
</span><li data-dcnode-id="7538"><span data-dcnode-id="7539" instrument_node="">1996 – Voting age lowered to 18 years at date of voting.</span></li><span data-dcnode-id="7537" instrument_node="">
</span><li data-dcnode-id="7526"><span data-dcnode-id="7536" instrument_node="">2000 – Section 14, al. 2 of the 2000 </span><a data-dcnode-id="7534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Finland" title="Constitution of Finland"><span data-dcnode-id="7535" instrument_node="">Constitution of Finland</span></a><span data-dcnode-id="7533" instrument_node=""> states that "</span><i data-dcnode-id="7531"><span data-dcnode-id="7532" instrument_node="">Every Finnish citizen and every foreigner permanently resident in Finland, having attained eighteen years of age, has the right to vote in municipal elections and municipal referendums, as provided by an Act. Provisions on the right to otherwise participate in municipal government are laid down by an Act.</span></i><span data-dcnode-id="7530" instrument_node="">"</span><sup class="reference" data-dcnode-id="7527" id="cite_ref-94"><a data-dcnode-id="7528" href="#cite_note-94"><span data-dcnode-id="7529" instrument_node="">[92]</span></a></sup></li></ul><span data-dcnode-id="7524" instrument_node="">
</span><h3 data-dcnode-id="7514"><span class="mw-headline" data-dcnode-id="7522" id="France"><span data-dcnode-id="7523" instrument_node="">France</span></span><span class="mw-editsection" data-dcnode-id="7515"><span class="mw-editsection-bracket" data-dcnode-id="7520"><span data-dcnode-id="7521" instrument_node="">[</span></span><a data-dcnode-id="7518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D28" title="Edit section: France"><span data-dcnode-id="7519" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7516"><span data-dcnode-id="7517" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7513" instrument_node="">
</span><ul data-dcnode-id="7485"><li data-dcnode-id="7511"><span data-dcnode-id="7512" instrument_node="">11 August 1792&nbsp;: Introduction of universal suffrage (men only)</span></li><span data-dcnode-id="7510" instrument_node="">
</span><li data-dcnode-id="7506"><span data-dcnode-id="7509" instrument_node="">1795&nbsp;: Universal suffrage for men is replaced with indirect </span><a class="mw-redirect" data-dcnode-id="7507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Census_suffrage" title="Census suffrage"><span data-dcnode-id="7508" instrument_node="">Census suffrage</span></a></li><span data-dcnode-id="7505" instrument_node="">
</span><li data-dcnode-id="7500"><span data-dcnode-id="7504" instrument_node="">13 December 1799: The </span><a class="mw-redirect" data-dcnode-id="7502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consulat" title="Consulat"><span data-dcnode-id="7503" instrument_node="">French Consulate</span></a><span data-dcnode-id="7501" instrument_node=""> re-establishes male universal suffrage increased from 246,000 to over 9&nbsp;million.</span></li><span data-dcnode-id="7499" instrument_node="">
</span><li data-dcnode-id="7497"><span data-dcnode-id="7498" instrument_node="">In 1850 (31 May): The number of people eligible to vote is reduced by 30% by excluding criminals and the homeless.</span></li><span data-dcnode-id="7496" instrument_node="">
</span><li data-dcnode-id="7492"><a data-dcnode-id="7494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon_III" title="Napoleon III"><span data-dcnode-id="7495" instrument_node="">Napoleon III</span></a><span data-dcnode-id="7493" instrument_node=""> calls a referendum in 1851 (21 December), all men aged 21 and over are allowed to vote. Male universal suffrage is established thereafter.</span></li><span data-dcnode-id="7491" instrument_node="">
</span><li data-dcnode-id="7489"><span data-dcnode-id="7490" instrument_node="">As of 21 April 1944 the franchise is extended to women over 21.</span></li><span data-dcnode-id="7488" instrument_node="">
</span><li data-dcnode-id="7486"><span data-dcnode-id="7487" instrument_node="">On 5 July 1974 the minimum age to vote is reduced to 18 years old.</span></li></ul><span data-dcnode-id="7484" instrument_node="">
</span><h3 data-dcnode-id="7474"><span class="mw-headline" data-dcnode-id="7482" id="Germany"><span data-dcnode-id="7483" instrument_node="">Germany</span></span><span class="mw-editsection" data-dcnode-id="7475"><span class="mw-editsection-bracket" data-dcnode-id="7480"><span data-dcnode-id="7481" instrument_node="">[</span></span><a data-dcnode-id="7478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D29" title="Edit section: Germany"><span data-dcnode-id="7479" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7476"><span data-dcnode-id="7477" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7473" instrument_node="">
</span><ul data-dcnode-id="7432"><li data-dcnode-id="7463"><a data-dcnode-id="7471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frankfurt_Parliament" title="Frankfurt Parliament"><span data-dcnode-id="7472" instrument_node="">1848</span></a><span data-dcnode-id="7470" instrument_node=""> – male citizens (citizens of state in German Confederation), adult and "independent" got voting rights, male voting population - 85%,</span><sup class="reference" data-dcnode-id="7467" id="cite_ref-95"><a data-dcnode-id="7468" href="#cite_note-95"><span data-dcnode-id="7469" instrument_node="">[93]</span></a></sup><sup class="reference" data-dcnode-id="7464" id="cite_ref-96"><a data-dcnode-id="7465" href="#cite_note-96"><span data-dcnode-id="7466" instrument_node="">[94]</span></a></sup></li><span data-dcnode-id="7462" instrument_node="">
</span><li data-dcnode-id="7457"><span data-dcnode-id="7461" instrument_node="">1849 – male citizens above 25, not disfranchised, not declared legally incapable, didn't claim pauper relief a year before the election, not a bankrupt nor in bankruptcy proceedings, not convicted of electoral fraud,</span><sup class="reference" data-dcnode-id="7458" id="cite_ref-97"><a data-dcnode-id="7459" href="#cite_note-97"><span data-dcnode-id="7460" instrument_node="">[95]</span></a></sup></li><span data-dcnode-id="7456" instrument_node="">
</span><li data-dcnode-id="7451"><span data-dcnode-id="7455" instrument_node="">1866 – male citizens above 25 (citizen for at least 3 years), not disfranchised, not declared legally incapable, didn't claim pauper relief a year before the election, enrolled on the electoral roll, inhabitant of the electoral district,</span><sup class="reference" data-dcnode-id="7452" id="cite_ref-98"><a data-dcnode-id="7453" href="#cite_note-98"><span data-dcnode-id="7454" instrument_node="">[96]</span></a></sup></li><span data-dcnode-id="7450" instrument_node="">
</span><li data-dcnode-id="7445"><span data-dcnode-id="7449" instrument_node="">1869 – male citizens above 25 (citizens of state in North German Confederation), not disfranchised, not a bankrupt nor in bankruptcy proceedings, not serving soldier, didn't claim pauper relief a year before the election, inhabitant of the electoral district, not in prison, not declared legally incapable,</span><sup class="reference" data-dcnode-id="7446" id="cite_ref-99"><a data-dcnode-id="7447" href="#cite_note-99"><span data-dcnode-id="7448" instrument_node="">[97]</span></a></sup></li><span data-dcnode-id="7444" instrument_node="">
</span><li data-dcnode-id="7439"><span data-dcnode-id="7443" instrument_node="">1918 - full suffrage for all citizens above 20</span><sup class="reference" data-dcnode-id="7440" id="cite_ref-100"><a data-dcnode-id="7441" href="#cite_note-100"><span data-dcnode-id="7442" instrument_node="">[98]</span></a></sup></li><span data-dcnode-id="7438" instrument_node="">
</span><li data-dcnode-id="7433"><span data-dcnode-id="7437" instrument_node="">1970 - full suffrage for all citizens above 18</span><sup class="reference" data-dcnode-id="7434" id="cite_ref-101"><a data-dcnode-id="7435" href="#cite_note-101"><span data-dcnode-id="7436" instrument_node="">[99]</span></a></sup></li></ul><span data-dcnode-id="7431" instrument_node="">
</span><h3 data-dcnode-id="7420"><span data-dcnode-id="7430" id="Kingdom_of_Hawai.27i"></span><span class="mw-headline" data-dcnode-id="7428" id="Kingdom_of_Hawai'i"><span data-dcnode-id="7429" instrument_node="">Kingdom of Hawai'i</span></span><span class="mw-editsection" data-dcnode-id="7421"><span class="mw-editsection-bracket" data-dcnode-id="7426"><span data-dcnode-id="7427" instrument_node="">[</span></span><a data-dcnode-id="7424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D30" title="Edit section: Kingdom of Hawai'i"><span data-dcnode-id="7425" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7422"><span data-dcnode-id="7423" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7419" instrument_node="">
</span><p data-dcnode-id="7417"><span data-dcnode-id="7418" instrument_node="">In 1840, the king of Hawai'i issued a constitution that granted universal suffrage without mention of sex or age, but later amendments added restrictions, as the influence of Caucasian settlers increased:
</span></p><span data-dcnode-id="7416" instrument_node="">
</span><ul data-dcnode-id="7407"><li data-dcnode-id="7414"><span data-dcnode-id="7415" instrument_node="">1852 – Women lost the right to vote, and the minimum voting age was specified as 20.</span></li><span data-dcnode-id="7413" instrument_node="">
</span><li data-dcnode-id="7411"><span data-dcnode-id="7412" instrument_node="">1864 – Voting was restricted on the basis of new qualifications—literacy and either a certain level of income or property ownership.</span></li><span data-dcnode-id="7410" instrument_node="">
</span><li data-dcnode-id="7408"><span data-dcnode-id="7409" instrument_node="">1887 – Citizens of Hawai'i with Asian descent were disqualified. There was an increase in the minimum value of income or owned property.</span></li></ul><span data-dcnode-id="7406" instrument_node="">
</span><p data-dcnode-id="7404"><span data-dcnode-id="7405" instrument_node="">Hawai'i lost its independence in 1893.
</span></p><span data-dcnode-id="7403" instrument_node="">
</span><h3 data-dcnode-id="7393"><span class="mw-headline" data-dcnode-id="7401" id="Hong_Kong"><span data-dcnode-id="7402" instrument_node="">Hong Kong</span></span><span class="mw-editsection" data-dcnode-id="7394"><span class="mw-editsection-bracket" data-dcnode-id="7399"><span data-dcnode-id="7400" instrument_node="">[</span></span><a data-dcnode-id="7397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D31" title="Edit section: Hong Kong"><span data-dcnode-id="7398" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7395"><span data-dcnode-id="7396" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7392" instrument_node="">
</span><p data-dcnode-id="7384"><span data-dcnode-id="7391" instrument_node="">Minimum age to vote was reduced from 21 to 18 years in </span><a data-dcnode-id="7389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1995_Hong_Kong_legislative_election" title="1995 Hong Kong legislative election"><span data-dcnode-id="7390" instrument_node="">1995</span></a><span data-dcnode-id="7388" instrument_node="">. The Basic Law, the constitution of the territory since 1997, stipulates that all permanent residents (a status conferred by birth or by seven years of residence) have the right to vote. The right of permanent residents who have right of abode in other countries to stand in election is, however, restricted to 12 </span><a data-dcnode-id="7386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Functional_constituency_%28Hong_Kong%29" title="Functional constituency (Hong Kong)"><span data-dcnode-id="7387" instrument_node="">functional constituencies</span></a><span data-dcnode-id="7385" instrument_node=""> by the Legislative Council Ordinance of 1997.
</span></p><p data-dcnode-id="7382"><span data-dcnode-id="7383" instrument_node="">The right to vote and the right to stand in elections are not equal. Fewer than 250,000 of the electorate are eligible to run in the 30 functional constituencies, of which 23 are elected by fewer than 80,000 of the electorate, and in the 2008 Legislative Council election 14 members were elected unopposed from these functional constituencies. The size of the electorates of some constituencies is fewer than 200. Only persons who can demonstrate a connection to the sector are eligible to run in a functional constituency.
</span></p><p data-dcnode-id="7374"><span data-dcnode-id="7381" instrument_node="">The Legislative Council (Amendment) Bill 2012, if passed, amends the Legislative Council Ordinance to restrict the right to stand in Legislative Council by-elections in </span><a class="mw-redirect" data-dcnode-id="7379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geographical_constituencies" title="Geographical constituencies"><span data-dcnode-id="7380" instrument_node="">geographical constituencies</span></a><span data-dcnode-id="7378" instrument_node=""> and the District Council (Second) functional constituency. In addition to those persons who are mentally disabled, bankrupt, or imprisoned, members who resign their seats will not have the right to stand for six months' time from their resignation. The bill is currently passing through the </span><a class="mw-redirect" data-dcnode-id="7376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Committee_of_the_Whole" title="Committee of the Whole"><span data-dcnode-id="7377" instrument_node="">committee stage</span></a><span data-dcnode-id="7375" instrument_node="">.
</span></p><span data-dcnode-id="7373" instrument_node="">
</span><h3 data-dcnode-id="7363"><span class="mw-headline" data-dcnode-id="7371" id="Hungary"><span data-dcnode-id="7372" instrument_node="">Hungary</span></span><span class="mw-editsection" data-dcnode-id="7364"><span class="mw-editsection-bracket" data-dcnode-id="7369"><span data-dcnode-id="7370" instrument_node="">[</span></span><a data-dcnode-id="7367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D32" title="Edit section: Hungary"><span data-dcnode-id="7368" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7362" instrument_node="">
</span><ul data-dcnode-id="7341"><li data-dcnode-id="7354"><span data-dcnode-id="7361" instrument_node="">1848 - The parliament of the </span><a data-dcnode-id="7359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Revolution_of_1848" title="Hungarian Revolution of 1848"><span data-dcnode-id="7360" instrument_node="">Hungarian Revolution of 1848</span></a><span data-dcnode-id="7358" instrument_node=""> introduced voting rights to men over 20 who met certain criteria as part of the legislative package known as the </span><a data-dcnode-id="7356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/April_Laws" title="April Laws"><span data-dcnode-id="7357" instrument_node="">April Laws</span></a><span data-dcnode-id="7355" instrument_node="">.</span></li><span data-dcnode-id="7353" instrument_node="">
</span><li data-dcnode-id="7348"><span data-dcnode-id="7352" instrument_node="">1874 - The reintroduction of suffrage following the </span><a data-dcnode-id="7350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austro-Hungarian_Compromise_of_1867" title="Austro-Hungarian Compromise of 1867"><span data-dcnode-id="7351" instrument_node="">Compromise of 1867</span></a><span data-dcnode-id="7349" instrument_node=""> changed some of the criteria, for instance moving from a wealth based threshold of eligibility to a tax based threshold.</span></li><span data-dcnode-id="7347" instrument_node="">
</span><li data-dcnode-id="7342"><span data-dcnode-id="7346" instrument_node="">1918 - Universal suffrage for those over 24 who can read and write. While this law introduced voting rights for women they could not exercise this right for some years due to the </span><a data-dcnode-id="7344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Soviet_Republic" title="Hungarian Soviet Republic"><span data-dcnode-id="7345" instrument_node="">revolution of 1919</span></a><span data-dcnode-id="7343" instrument_node="">.</span></li></ul><span data-dcnode-id="7340" instrument_node="">
</span><h3 data-dcnode-id="7330"><span class="mw-headline" data-dcnode-id="7338" id="India"><span data-dcnode-id="7339" instrument_node="">India</span></span><span class="mw-editsection" data-dcnode-id="7331"><span class="mw-editsection-bracket" data-dcnode-id="7336"><span data-dcnode-id="7337" instrument_node="">[</span></span><a data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D33" title="Edit section: India"><span data-dcnode-id="7335" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7329" instrument_node="">
</span><p data-dcnode-id="7318"><span data-dcnode-id="7328" instrument_node="">Since the very first </span><a class="mw-redirect" data-dcnode-id="7326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_general_election%2C_1951%25E2%2580%259352" title="Indian general election, 1951–52"><span data-dcnode-id="7327" instrument_node="">Indian general election held in 1951–52</span></a><span data-dcnode-id="7325" instrument_node="">, universal suffrage for all adult citizens aged 21 or older was established under Article 326 of the </span><a data-dcnode-id="7323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_India" title="Constitution of India"><span data-dcnode-id="7324" instrument_node="">Constitution of India</span></a><span data-dcnode-id="7322" instrument_node="">. The minimum voting age was reduced to 18 years by the </span><a data-dcnode-id="7320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sixty-first_Amendment_of_the_Constitution_of_India" title="Sixty-first Amendment of the Constitution of India"><span data-dcnode-id="7321" instrument_node="">61st Amendment</span></a><span data-dcnode-id="7319" instrument_node="">, effective 28 March 1989.
</span></p><span data-dcnode-id="7317" instrument_node="">
</span><h3 data-dcnode-id="7307"><span class="mw-headline" data-dcnode-id="7315" id="Ireland"><span data-dcnode-id="7316" instrument_node="">Ireland</span></span><span class="mw-editsection" data-dcnode-id="7308"><span class="mw-editsection-bracket" data-dcnode-id="7313"><span data-dcnode-id="7314" instrument_node="">[</span></span><a data-dcnode-id="7311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D34" title="Edit section: Ireland"><span data-dcnode-id="7312" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7309"><span data-dcnode-id="7310" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7306" instrument_node="">
</span><link data-dcnode-id="7305" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7301" role="note"><span data-dcnode-id="7304" instrument_node="">Main article: </span><a data-dcnode-id="7302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_franchise_in_Ireland" title="History of the franchise in Ireland"><span data-dcnode-id="7303" instrument_node="">History of the franchise in Ireland</span></a></div><span data-dcnode-id="7300" instrument_node="">
</span><h3 data-dcnode-id="7290"><span class="mw-headline" data-dcnode-id="7298" id="Isle_of_Man"><span data-dcnode-id="7299" instrument_node="">Isle of Man</span></span><span class="mw-editsection" data-dcnode-id="7291"><span class="mw-editsection-bracket" data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node="">[</span></span><a data-dcnode-id="7294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D35" title="Edit section: Isle of Man"><span data-dcnode-id="7295" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7292"><span data-dcnode-id="7293" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7289" instrument_node="">
</span><ul data-dcnode-id="7265"><li data-dcnode-id="7284"><span data-dcnode-id="7288" instrument_node="">1866 – The House of Keys Election Act makes the </span><a data-dcnode-id="7286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Keys" title="House of Keys"><span data-dcnode-id="7287" instrument_node="">House of Keys</span></a><span data-dcnode-id="7285" instrument_node=""> an elected body. The vote is given to men over the age of 21 who own property worth at least £8 a year or rent property worth at least £12 a year. Candidates must be male, with real estate of an annual value of £100, or of £50 along with a personal estate producing an annual income of £100.</span></li><span data-dcnode-id="7283" instrument_node="">
</span><li data-dcnode-id="7281"><span data-dcnode-id="7282" instrument_node="">1881 – The House of Keys Election Act is amended so that the property qualification is reduced to a net annual value of not less than £4.  Most significantly, the Act is also amended to extend the franchise to unmarried women and widows over the age of 21 who own property, making the Isle of Man the first place to give some women the vote in a national election. The property qualification for candidates is modified to allow the alternative of personal property producing a year income of £150.</span></li><span data-dcnode-id="7280" instrument_node="">
</span><li data-dcnode-id="7278"><span data-dcnode-id="7279" instrument_node="">1892 – The franchise is extended to unmarried women and widows over the age of 21 who rent property worth a net annual value of at least £4, as well as to male lodgers. The property qualification for candidates is removed.</span></li><span data-dcnode-id="7277" instrument_node="">
</span><li data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">1903 – A residency qualification is introduced in addition to the property qualification for voters. The time between elections is reduced from 7 to 5 years.</span></li><span data-dcnode-id="7274" instrument_node="">
</span><li data-dcnode-id="7272"><span data-dcnode-id="7273" instrument_node="">1919 – Universal adult suffrage based on residency is introduced: all male and female residents over the age of 21 may vote. The entire electorate (with the exception of clergy and holders of office of profit) becomes eligible to stand for election.</span></li><span data-dcnode-id="7271" instrument_node="">
</span><li data-dcnode-id="7269"><span data-dcnode-id="7270" instrument_node="">1970 – Voting age lowered to 18.</span></li><span data-dcnode-id="7268" instrument_node="">
</span><li data-dcnode-id="7266"><span data-dcnode-id="7267" instrument_node="">2006 – Voting age lowered to 16. The age of eligibility for candidates remains at 18.</span></li></ul><span data-dcnode-id="7264" instrument_node="">
</span><h3 data-dcnode-id="7254"><span class="mw-headline" data-dcnode-id="7262" id="Italy"><span data-dcnode-id="7263" instrument_node="">Italy</span></span><span class="mw-editsection" data-dcnode-id="7255"><span class="mw-editsection-bracket" data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node="">[</span></span><a data-dcnode-id="7258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D36" title="Edit section: Italy"><span data-dcnode-id="7259" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7256"><span data-dcnode-id="7257" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7253" instrument_node="">
</span><p data-dcnode-id="7247"><span data-dcnode-id="7252" instrument_node="">The Supreme Court states that "the rules derogating from the passive electoral law must be strictly interpreted".</span><sup class="reference" data-dcnode-id="7249" id="cite_ref-102"><a data-dcnode-id="7250" href="#cite_note-102"><span data-dcnode-id="7251" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7248" instrument_node="">
</span></p><span data-dcnode-id="7246" instrument_node="">
</span><h3 data-dcnode-id="7236"><span class="mw-headline" data-dcnode-id="7244" id="Japan"><span data-dcnode-id="7245" instrument_node="">Japan</span></span><span class="mw-editsection" data-dcnode-id="7237"><span class="mw-editsection-bracket" data-dcnode-id="7242"><span data-dcnode-id="7243" instrument_node="">[</span></span><a data-dcnode-id="7240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D37" title="Edit section: Japan"><span data-dcnode-id="7241" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7238"><span data-dcnode-id="7239" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7235" instrument_node="">
</span><link data-dcnode-id="7234" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7230" role="note"><span data-dcnode-id="7233" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="7231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffrage_in_Japan" title="Suffrage in Japan"><span data-dcnode-id="7232" instrument_node="">Suffrage in Japan</span></a></div><p data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">In the 1910s and 1920s, Japanese feminist Doma, founder of the cult 'The Eternal Paradise' was instrumental in giving Japanese women the right to vote, he did this by bringing attention to the plight of the abused women of Japan. Doma's memory has been immortalised in the popular history book "Demon Slayer". 
</span></p><ul data-dcnode-id="7188"><li data-dcnode-id="7219"><span data-dcnode-id="7227" instrument_node="">1889 – Male taxpayers above 25 that paid at least 15 JPY of tax got voting rights,</span><sup class="reference" data-dcnode-id="7224" id="cite_ref-103"><a data-dcnode-id="7225" href="#cite_note-103"><span data-dcnode-id="7226" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7223" instrument_node=""> the voting population were 450,000 (1,1% of Japan population),</span><sup class="reference" data-dcnode-id="7220" id="cite_ref-:1_104-0"><a data-dcnode-id="7221" href="#cite_note-:1-104"><span data-dcnode-id="7222" instrument_node="">[102]</span></a></sup></li><span data-dcnode-id="7218" instrument_node="">
</span><li data-dcnode-id="7213"><span data-dcnode-id="7217" instrument_node="">1900 – Male taxpayers above 25 that paid at least 10 JPY of tax got voting rights, the voting population were 980,000 (2,2% of Japan population),</span><sup class="reference" data-dcnode-id="7214" id="cite_ref-:1_104-1"><a data-dcnode-id="7215" href="#cite_note-:1-104"><span data-dcnode-id="7216" instrument_node="">[102]</span></a></sup></li><span data-dcnode-id="7212" instrument_node="">
</span><li data-dcnode-id="7207"><span data-dcnode-id="7211" instrument_node="">1919 – Male taxpayers above 25 that paid at least 3 JPY of tax got voting rights, the voting population were 3,070,000 (5,5% of Japan population)</span><sup class="reference" data-dcnode-id="7208" id="cite_ref-:2_105-0"><a data-dcnode-id="7209" href="#cite_note-:2-105"><span data-dcnode-id="7210" instrument_node="">[103]</span></a></sup></li><span data-dcnode-id="7206" instrument_node="">
</span><li data-dcnode-id="7201"><span data-dcnode-id="7205" instrument_node="">1925 – Male above 25 got voting rights, the voting population were 12,410,000 (20% of Japan population),</span><sup class="reference" data-dcnode-id="7202" id="cite_ref-:1_104-2"><a data-dcnode-id="7203" href="#cite_note-:1-104"><span data-dcnode-id="7204" instrument_node="">[102]</span></a></sup></li><span data-dcnode-id="7200" instrument_node="">
</span><li data-dcnode-id="7195"><span data-dcnode-id="7199" instrument_node="">1945 – Japan citizens above 20 got voting rights, the voting population were 36,880,000 (48,7% of Japan population),</span><sup class="reference" data-dcnode-id="7196" id="cite_ref-:2_105-1"><a data-dcnode-id="7197" href="#cite_note-:2-105"><span data-dcnode-id="7198" instrument_node="">[103]</span></a></sup></li><span data-dcnode-id="7194" instrument_node="">
</span><li data-dcnode-id="7189"><span data-dcnode-id="7193" instrument_node="">2015 – Japan citizens above 18 got voting rights, voting population - 83,3% of Japan population.</span><sup class="reference" data-dcnode-id="7190" id="cite_ref-106"><a data-dcnode-id="7191" href="#cite_note-106"><span data-dcnode-id="7192" instrument_node="">[104]</span></a></sup></li></ul><span data-dcnode-id="7187" instrument_node="">
</span><h3 data-dcnode-id="7177"><span class="mw-headline" data-dcnode-id="7185" id="New_Zealand"><span data-dcnode-id="7186" instrument_node="">New Zealand</span></span><span class="mw-editsection" data-dcnode-id="7178"><span class="mw-editsection-bracket" data-dcnode-id="7183"><span data-dcnode-id="7184" instrument_node="">[</span></span><a data-dcnode-id="7181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D38" title="Edit section: New Zealand"><span data-dcnode-id="7182" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7179"><span data-dcnode-id="7180" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7176" instrument_node="">
</span><link data-dcnode-id="7175" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7171" role="note"><span data-dcnode-id="7174" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="7172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_voting_in_New_Zealand" title="History of voting in New Zealand"><span data-dcnode-id="7173" instrument_node="">History of voting in New Zealand</span></a></div><span data-dcnode-id="7170" instrument_node="">
</span><ul data-dcnode-id="7119"><li data-dcnode-id="7159"><span data-dcnode-id="7169" instrument_node="">1853 – British government passes the </span><a data-dcnode-id="7167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Constitution_Act_1852" title="New Zealand Constitution Act 1852"><span data-dcnode-id="7168" instrument_node="">New Zealand Constitution Act 1852</span></a><span data-dcnode-id="7166" instrument_node="">, granting limited self-rule, including a </span><a class="mw-redirect" data-dcnode-id="7164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bicameral_parliament" title="Bicameral parliament"><span data-dcnode-id="7165" instrument_node="">bicameral parliament</span></a><span data-dcnode-id="7163" instrument_node="">, to the colony. The vote was limited to male British subjects aged 21 or over who owned or rented sufficient property and were not imprisoned for a serious offence. Communally owned land was excluded from the property qualification, thus disenfranchising most </span><a data-dcnode-id="7161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C4%2581ori_people" title="Māori people"><span data-dcnode-id="7162" instrument_node="">Māori</span></a><span data-dcnode-id="7160" instrument_node=""> (indigenous) men.</span></li><span data-dcnode-id="7158" instrument_node="">
</span><li data-dcnode-id="7156"><span data-dcnode-id="7157" instrument_node="">1860 – Franchise extended to holders of miner's licenses who met all voting qualifications except that of property.</span></li><span data-dcnode-id="7155" instrument_node="">
</span><li data-dcnode-id="7144"><span data-dcnode-id="7154" instrument_node="">1867 – </span><a class="mw-redirect" data-dcnode-id="7152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C4%2581ori_seats" title="Māori seats"><span data-dcnode-id="7153" instrument_node="">Māori seats</span></a><span data-dcnode-id="7151" instrument_node=""> established, giving Māori four </span><a class="mw-redirect" data-dcnode-id="7149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reserved_seats" title="Reserved seats"><span data-dcnode-id="7150" instrument_node="">reserved seats</span></a><span data-dcnode-id="7148" instrument_node=""> in the </span><a data-dcnode-id="7146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lower_house" title="Lower house"><span data-dcnode-id="7147" instrument_node="">lower house</span></a><span data-dcnode-id="7145" instrument_node="">. There was no property qualification; thus Māori men gained universal suffrage before other New Zealanders. The number of seats did not reflect the size of the Māori population, but Māori men who met the property requirement for general electorates were able to vote in them or in the Māori electorates but not both.</span></li><span data-dcnode-id="7143" instrument_node="">
</span><li data-dcnode-id="7141"><span data-dcnode-id="7142" instrument_node="">1879 – Property requirement abolished.</span></li><span data-dcnode-id="7140" instrument_node="">
</span><li data-dcnode-id="7135"><span data-dcnode-id="7139" instrument_node="">1893 – </span><a data-dcnode-id="7137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage_in_New_Zealand" title="Women's suffrage in New Zealand"><span data-dcnode-id="7138" instrument_node="">Women won equal voting rights</span></a><span data-dcnode-id="7136" instrument_node=""> with men, making New Zealand the first nation in the world to allow women to vote.</span></li><span data-dcnode-id="7134" instrument_node="">
</span><li data-dcnode-id="7132"><span data-dcnode-id="7133" instrument_node="">1969 – Voting age lowered to 20.</span></li><span data-dcnode-id="7131" instrument_node="">
</span><li data-dcnode-id="7129"><span data-dcnode-id="7130" instrument_node="">1974 – Voting age lowered to 18.</span></li><span data-dcnode-id="7128" instrument_node="">
</span><li data-dcnode-id="7126"><span data-dcnode-id="7127" instrument_node="">1975 – Franchise extended to permanent residents of New Zealand, regardless of whether they have citizenship.</span></li><span data-dcnode-id="7125" instrument_node="">
</span><li data-dcnode-id="7123"><span data-dcnode-id="7124" instrument_node="">1996 – Number of Māori seats increased to reflect Māori population.</span></li><span data-dcnode-id="7122" instrument_node="">
</span><li data-dcnode-id="7120"><span data-dcnode-id="7121" instrument_node="">2010 – Prisoners imprisoned for one year or more denied voting rights while serving the sentence.</span></li></ul><span data-dcnode-id="7118" instrument_node="">
</span><h3 data-dcnode-id="7108"><span class="mw-headline" data-dcnode-id="7116" id="Norway"><span data-dcnode-id="7117" instrument_node="">Norway</span></span><span class="mw-editsection" data-dcnode-id="7109"><span class="mw-editsection-bracket" data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">[</span></span><a data-dcnode-id="7112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D39" title="Edit section: Norway"><span data-dcnode-id="7113" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7110"><span data-dcnode-id="7111" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7107" instrument_node="">
</span><ul data-dcnode-id="7065"><li data-dcnode-id="7099"><span data-dcnode-id="7106" instrument_node="">1814 – The </span><a data-dcnode-id="7104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Norway" title="Constitution of Norway"><span data-dcnode-id="7105" instrument_node="">Norwegian constitution</span></a><span data-dcnode-id="7103" instrument_node=""> gave male landowners or officials above the age of 25 full voting rights.</span><sup class="reference" data-dcnode-id="7100" id="cite_ref-107"><a data-dcnode-id="7101" href="#cite_note-107"><span data-dcnode-id="7102" instrument_node="">[105]</span></a></sup></li><span data-dcnode-id="7098" instrument_node="">
</span><li data-dcnode-id="7093"><span data-dcnode-id="7097" instrument_node="">1885 – Male taxpayers that paid at least 500 </span><a data-dcnode-id="7095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norwegian_krone" title="Norwegian krone"><span data-dcnode-id="7096" instrument_node="">NOK</span></a><span data-dcnode-id="7094" instrument_node=""> of tax (800 NOK in towns) got voting rights.</span></li><span data-dcnode-id="7092" instrument_node="">
</span><li data-dcnode-id="7090"><span data-dcnode-id="7091" instrument_node="">1900 – Universal suffrage for men over 25.</span></li><span data-dcnode-id="7089" instrument_node="">
</span><li data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">1901 – Women, over 25, paying tax or having common household with a man paying tax, got the right to vote in local elections.</span></li><span data-dcnode-id="7086" instrument_node="">
</span><li data-dcnode-id="7084"><span data-dcnode-id="7085" instrument_node="">1909 – Women, over 25, paying tax or having common household with a man paying tax, got full voting rights.</span></li><span data-dcnode-id="7083" instrument_node="">
</span><li data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">1913 – Universal suffrage for all over 25, applying from the election in 1915.</span></li><span data-dcnode-id="7080" instrument_node="">
</span><li data-dcnode-id="7075"><span data-dcnode-id="7079" instrument_node="">1920 – Voting age lowered to 23.</span><sup class="reference" data-dcnode-id="7076" id="cite_ref-108"><a data-dcnode-id="7077" href="#cite_note-108"><span data-dcnode-id="7078" instrument_node="">[106]</span></a></sup></li><span data-dcnode-id="7074" instrument_node="">
</span><li data-dcnode-id="7072"><span data-dcnode-id="7073" instrument_node="">1946 – Voting age lowered to 21.</span></li><span data-dcnode-id="7071" instrument_node="">
</span><li data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">1967 – Voting age lowered to 20.</span></li><span data-dcnode-id="7068" instrument_node="">
</span><li data-dcnode-id="7066"><span data-dcnode-id="7067" instrument_node="">1978 – Voting age lowered to 18.</span></li></ul><span data-dcnode-id="7064" instrument_node="">
</span><h3 data-dcnode-id="7054"><span class="mw-headline" data-dcnode-id="7062" id="Poland"><span data-dcnode-id="7063" instrument_node="">Poland</span></span><span class="mw-editsection" data-dcnode-id="7055"><span class="mw-editsection-bracket" data-dcnode-id="7060"><span data-dcnode-id="7061" instrument_node="">[</span></span><a data-dcnode-id="7058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D40" title="Edit section: Poland"><span data-dcnode-id="7059" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7056"><span data-dcnode-id="7057" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7053" instrument_node="">
</span><ul data-dcnode-id="7044"><li data-dcnode-id="7048"><span data-dcnode-id="7052" instrument_node="">1918 – In its first days of independence in 1918, after 123 years of partition, voting rights were granted to both men and women. Eight women were elected to the </span><a data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sejm" title="Sejm"><span data-dcnode-id="7051" instrument_node="">Sejm</span></a><span data-dcnode-id="7049" instrument_node=""> in 1919.</span></li><span data-dcnode-id="7047" instrument_node="">
</span><li data-dcnode-id="7045"><span data-dcnode-id="7046" instrument_node="">1952 – Voting age lowered to 18.</span></li></ul><span data-dcnode-id="7043" instrument_node="">
</span><h3 data-dcnode-id="7033"><span class="mw-headline" data-dcnode-id="7041" id="Singapore"><span data-dcnode-id="7042" instrument_node="">Singapore</span></span><span class="mw-editsection" data-dcnode-id="7034"><span class="mw-editsection-bracket" data-dcnode-id="7039"><span data-dcnode-id="7040" instrument_node="">[</span></span><a data-dcnode-id="7037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D41" title="Edit section: Singapore"><span data-dcnode-id="7038" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7035"><span data-dcnode-id="7036" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7032" instrument_node="">
</span><link data-dcnode-id="7031" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7027" role="note"><span data-dcnode-id="7030" instrument_node="">See also: </span><a data-dcnode-id="7028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_rights_in_Singapore" title="Voting rights in Singapore"><span data-dcnode-id="7029" instrument_node="">Voting rights in Singapore</span></a></div><span data-dcnode-id="7026" instrument_node="">
</span><h3 data-dcnode-id="7016"><span class="mw-headline" data-dcnode-id="7024" id="South_Africa"><span data-dcnode-id="7025" instrument_node="">South Africa</span></span><span class="mw-editsection" data-dcnode-id="7017"><span class="mw-editsection-bracket" data-dcnode-id="7022"><span data-dcnode-id="7023" instrument_node="">[</span></span><a data-dcnode-id="7020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSuffrage%26action%3Dedit%26section%3D42" title="Edit section: South Africa"><span data-dcnode-id="7021" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7018"><span data-dcnode-id="7019" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7015" instrument_node="">
</span><ul data-dcnode-id="6822"><li data-dcnode-id="6980"><span data-dcnode-id="7014" instrument_node="">1910 – The </span><a data-dcnode-id="7012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_of_South_Africa" title="Union of South Africa"><span data-dcnode-id="7013" instrument_node="">Union of South Africa</span></a><span data-dcnode-id="7011" instrument_node=""> is established by the </span><a data-dcnode-id="7009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Africa_Act_1909" title="South Africa Act 1909"><span data-dcnode-id="7010" instrument_node="">South Africa Act 1909</span></a><span data-dcnode-id="7008" instrument_node="">. The </span><a data-dcnode-id="7006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Assembly_%28South_Africa%29" title="House of Assembly (South Africa)"><span data-dcnode-id="7007" instrument_node="">House of Assembly</span></a><span data-dcnode-id="7005" instrument_node=""> is elected by </span><a data-dcnode-id="7003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post_voting" title="First-past-the-post voting"><span data-dcnode-id="7004" instrument_node="">first-past-the-post</span></a><span data-dcnode-id="7002" instrument_node=""> voting in single-member constituencies. The franchise qualifications are the same as those previously existing for elections of the legislatures of the colonies that comprised the Union. In the </span><a class="mw-redirect" data-dcnode-id="7000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transvaal_Province" title="Transvaal Province"><span data-dcnode-id="7001" instrument_node="">Transvaal</span></a><span data-dcnode-id="6999" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="6997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orange_Free_State_Province" title="Orange Free State Province"><span data-dcnode-id="6998" instrument_node="">Orange Free State</span></a><span data-dcnode-id="6996" instrument_node=""> the franchise is limited to </span><a class="mw-redirect" data-dcnode-id="6994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_South_African" title="White South African"><span data-dcnode-id="6995" instrument_node="">white</span></a><span data-dcnode-id="6993" instrument_node=""> men. In </span><a class="mw-redirect" data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natal_Province" title="Natal Province"><span data-dcnode-id="6992" instrument_node="">Natal</span></a><span data-dcnode-id="6990" instrument_node=""> the franchise is limited to men meeting property and literacy qualifications; it was theoretically colour-blind but in practise nearly all non-white men were excluded. The traditional "</span><a data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cape_Qualified_Franchise" title="Cape Qualified Franchise"><span data-dcnode-id="6989" instrument_node="">Cape Qualified Franchise</span></a><span data-dcnode-id="6987" instrument_node="">" of the </span><a data-dcnode-id="6985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cape_Province" title="Cape Province"><span data-dcnode-id="6986" instrument_node="">Cape Province</span></a><span data-dcnode-id="6984" instrument_node=""> is limited to men meeting property and literacy qualifications and is colour-blind; nonetheless 85% of voters are white. The rights of non-white voters in the Cape Province are protected by an </span><a data-dcnode-id="6982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Entrenched_clause" title="Entrenched clause"><span data-dcnode-id="6983" instrument_node="">entrenched clause</span></a><span data-dcnode-id="6981" instrument_node=""> in the South Africa Act requiring a two-thirds vote in a joint sitting of both Houses of Parliament.</span></li><span data-dcnode-id="6979" instrument_node="">
</span><li data-dcnode-id="6974"><span data-dcnode-id="6978" instrument_node="">1930 – The </span><a data-dcnode-id="6976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_Enfranchisement_Act%2C_1930" title="Women's Enfranchisement Act, 1930"><span data-dcnode-id="6977" instrument_node="">Women's Enfranchisement Act, 1930</span></a><span data-dcnode-id="6975" instrument_node=""> extends the right to vote to all white women over the age of 21.</span></li><span data-dcnode-id="6973" instrument_node="">
</span><li data-dcnode-id="6968"><span data-dcnode-id="6972" instrument_node="">1931 – The </span><a data-dcnode-id="6970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franchise_Laws_Amendment_Act%2C_1931" title="Franchise Laws Amendment Act, 1931"><span data-dcnode-id="6971" instrument_node="">Franchise Laws Amendment Act, 1931</span></a><span data-dcnode-id="6969" instrument_node=""> removes the property and literacy qualifications for all white men over the age of 21, but they are retained for non-white voters.</span></li><span data-dcnode-id="6967" instrument_node="">
</span><li data-dcnode-id="6956"><span data-dcnode-id="6966" instrument_node="">1936 – The </span><a data-dcnode-id="6964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_Natives_Act%2C_1936" title="Representation of Natives Act, 1936"><span data-dcnode-id="6965" instrument_node="">Representation of Natives Act, 1936</span></a><span data-dcnode-id="6963" instrument_node=""> removes </span><a class="mw-redirect" data-dcnode-id="6961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_African" title="Black African"><span data-dcnode-id="6962" instrument_node="">black</span></a><span data-dcnode-id="6960" instrument_node=""> voters in the Cape Province from the common voters' roll and instead allows them to elect three "Native Representative Members" to the House of Assembly. Four </span><a data-dcnode-id="6958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senate_of_South_Africa" title="Senate of South Africa"><span data-dcnode-id="6959" instrument_node="">Senators</span></a><span data-dcnode-id="6957" instrument_node=""> are to be indirectly elected by chiefs and local authorities to represent black South Africans throughout the country. The act is passed with the necessary two-thirds majority in a joint sitting.</span></li><span data-dcnode-id="6955" instrument_node="">
</span><li data-dcnode-id="6947"><span data-dcnode-id="6954" instrument_node="">1951 – The </span><a data-dcnode-id="6952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Separate_Representation_of_Voters_Act%2C_1951" title="Separate Representation of Voters Act, 1951"><span data-dcnode-id="6953" instrument_node="">Separate Representation of Voters Act, 1951</span></a><span data-dcnode-id="6951" instrument_node=""> is passed by Parliament by an ordinary majority in separate sittings. It purports to remove </span><a class="mw-redirect" data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coloured" title="Coloured"><span data-dcnode-id="6950" instrument_node="">coloured</span></a><span data-dcnode-id="6948" instrument_node=""> voters in the Cape Province from the common voters' roll and instead allow them to elect four "Coloured Representative Members" to the House of Assembly.</span></li><span data-dcnode-id="6946" instrument_node="">
</span><li data-dcnode-id="6934"><span data-dcnode-id="6945" instrument_node="">1952 – In </span><i data-dcnode-id="6942"><a class="mw-redirect" data-dcnode-id="6943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harris_v_Minister_of_the_Interior" title="Harris v Minister of the Interior"><span data-dcnode-id="6944" instrument_node="">Harris v Minister of the Interior</span></a></i><span data-dcnode-id="6941" instrument_node=""> the Separate Representation of Voters Act is annulled by the Appellate Division of the </span><a data-dcnode-id="6939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_South_Africa" title="Supreme Court of South Africa"><span data-dcnode-id="6940" instrument_node="">Supreme Court</span></a><span data-dcnode-id="6938" instrument_node=""> because it was not passed with the necessary two-thirds majority in a joint sitting. Parliament passes the </span><a class="mw-redirect" data-dcnode-id="6936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High_Court_of_Parliament_Act%2C_1952" title="High Court of Parliament Act, 1952"><span data-dcnode-id="6937" instrument_node="">High Court of Parliament Act, 1952</span></a><span data-dcnode-id="6935" instrument_node="">, purporting to allow it to reverse this decision, but the Appellate Division annuls it as well.</span></li><span data-dcnode-id="6933" instrument_node="">
</span><li data-dcnode-id="6928"><span data-dcnode-id="6932" instrument_node="">1956 – By packing the Senate and the Appellate Division, the government passes the </span><a class="mw-redirect" data-dcnode-id="6930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Africa_Act_Amendment_Act%2C_1956" title="South Africa Act Amendment Act, 1956"><span data-dcnode-id="6931" instrument_node="">South Africa Act Amendment Act, 1956</span></a><span data-dcnode-id="6929" instrument_node="">, reversing the annulment of the Separate Representation of Voters Act and giving it the force of law.</span></li><span data-dcnode-id="6927" instrument_node="">
</span><li data-dcnode-id="6919"><span data-dcnode-id="6926" instrument_node="">1958 – The </span><a data-dcnode-id="6924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_Law_Amendment_Act%2C_1958" title="Electoral Law Amendment Act, 1958"><span data-dcnode-id="6925" instrument_node="">Electoral Law Amendment Act, 1958</span></a><span data-dcnode-id="6923" instrument_node=""> reduces the </span><a data-dcnode-id="6921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" title="Voting age"><span data-dcnode-id="6922" instrument_node="">voting age</span></a><span data-dcnode-id="6920" instrument_node=""> for white voters from 21 to 18.</span></li><span data-dcnode-id="6918" instrument_node="">
</span><li data-dcnode-id="6913"><span data-dcnode-id="6917" instrument_node="">1959 – The </span><a data-dcnode-id="6915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Promotion_of_Bantu_Self-government_Act%2C_1959" title="Promotion of Bantu Self-government Act, 1959"><span data-dcnode-id="6916" instrument_node="">Promotion of Bantu Self-government Act, 1959</span></a><span data-dcnode-id="6914" instrument_node=""> repeals the Representation of Natives Act, removing all representation of black people in Parliament.</span></li><span data-dcnode-id="6912" instrument_node="">
</span><li data-dcnode-id="6907"><span data-dcnode-id="6911" instrument_node="">1968 – The </span><a data-dcnode-id="6909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Separate_Representation_of_Voters_Amendment_Act%2C_1968" title="Separate Representation of Voters Amendment Act, 1968"><span data-dcnode-id="6910" instrument_node="">Separate Representation of Voters Amendment Act, 1968</span></a><span data-dcnode-id="6908" instrument_node=""> repeals the Separate Representation of Voters Act, removing all representation of coloured people in Parliament.</span></li><span data-dcnode-id="6906" instrument_node="">
</span><li data-dcnode-id="6901"><span data-dcnode-id="6905" instrument_node="">1969 – The first election of the </span><a data-dcnode-id="6903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coloured_Persons_Representative_Council" title="Coloured Persons Representative Council"><span data-dcnode-id="6904" instrument_node="">Coloured Persons Representative Council</span></a><span data-dcnode-id="6902" instrument_node=""> (CPRC), which has limited legislative powers, is held. Every Coloured citizen over the age of 21 can vote for its members, in first-past-the-post elections in single-member constituencies.</span></li><span data-dcnode-id="6900" instrument_node="">
</span><li data-dcnode-id="6898"><span data-dcnode-id="6899" instrument_node="">1978 – The voting age for the CPRC is reduced from 21 to 18.</span></li><span data-dcnode-id="6897" instrument_node="">
