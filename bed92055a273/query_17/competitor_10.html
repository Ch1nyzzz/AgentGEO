strument_node="">pa</span><strong data-dcnode-id="9289"><span data-dcnode-id="9290" instrument_node="">n</span></strong><span data-dcnode-id="9288" instrument_node="">ova in Hi</span><strong data-dcnode-id="9286"><span data-dcnode-id="9287" instrument_node="">g</span></strong><span data-dcnode-id="9285" instrument_node="">h CV Risk Patien</span><strong data-dcnode-id="9283"><span data-dcnode-id="9284" instrument_node="">t</span></strong><span data-dcnode-id="9282" instrument_node="">s With </span><strong data-dcnode-id="9280"><span data-dcnode-id="9281" instrument_node="">H</span></strong><span data-dcnode-id="9279" instrument_node="">ypertriglyceridemia (STRENGTH) trial aimed to evaluate a pharmaceutical carboxylic acid formulation of EPA and DHA (referred to as omega-3 CA) to prevent MACE in 13,078 patients with hypertriglyceridemia (2.0-5.6 mmol/L), low HDL-C (&lt; 1.2 mmol/L for women and &lt; 1.1 mmol/L for men) who were receiving statin therapy, and were at increased risk of CVD.</span><a class="workspace-trigger" data-dcnode-id="9276" href="#bib0128" name="bbib0128"><sup data-dcnode-id="9277"><span data-dcnode-id="9278" instrument_node="">128</span></sup></a><span data-dcnode-id="9275" instrument_node=""> Patients were randomized to receive 4 g/d of omega-3 CA or corn oil placebo. The trial was discontinued prematurely after a median follow-up of 3.5 years for futility. The primary end point of CV death, nonfatal MI, nonfatal stroke, unstable angina requiring hospitalization, and coronary revascularization was not significantly different between groups (12.0% vs 12.2%; HR, 0.99; 95% CI, 0.90-1.09). Patient-reported gastrointestinal disorders were more common in patients in the omega-3 CA group (24.7% vs 14.7%).</span></p></section><section data-dcnode-id="9265" id="sec0023"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9271" id="cesectitle0031"><span data-dcnode-id="9272" instrument_node="">Other therapies</span></h4><p data-dcnode-id="9266" id="para0077"><span data-dcnode-id="9270" instrument_node="">There are no new recommendations regarding the use of fibrates, niacin, and bile acid sequestrants since the 2016 guidelines.</span><a class="workspace-trigger" data-dcnode-id="9267" href="#bib0001" name="bbib0001"><sup data-dcnode-id="9268"><span data-dcnode-id="9269" instrument_node="">1</span></sup></a></p></section></section><section data-dcnode-id="9146" id="sec0024"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9262" id="cesectitle0032"><span data-dcnode-id="9263" instrument_node="">Ongoing trials</span></h3><p data-dcnode-id="9190" id="para0078"><span data-dcnode-id="9261" instrument_node="">There are a number of ongoing trials of nonstatin therapy. Effect of Evolocumab in Patients at High Cardiovascular Risk Without Prior Myocardial Infarction or Stroke (VESALIUS-CV) is designed to examine the effect of evolocumab at reducing MACE in patients without a previous MI or stroke but who are at high risk of CVD.</span><a class="workspace-trigger" data-dcnode-id="9258" href="#bib0129" name="bbib0129"><sup data-dcnode-id="9259"><span data-dcnode-id="9260" instrument_node="">127</span></sup></a><span data-dcnode-id="9257" instrument_node=""> Inclisiran is an experimental small interfering RNA molecule that inhibits the translation of PCSK9. In the phase III Trial to Evaluate the Effect of Inclisiran Treatment on Low Density Lipoprotein Cholesterol in Subjects With Heterozygous Familial Hypercholesterolemia (ORION-9), Inclisiran for Participants With Atherosclerotic Cardiovascular Disease and Elevated Low-density Lipoprotein Cholesterol (ORION-10), and Inclisiran for Subjects With ASCVD or ASCVD-Risk Equivalents and Elevated Low-density Lipoprotein Cholesterol (ORION-11) trials, inclisiran showed LDL-C lowering in patients with heterozygous FH or with, or at high risk of, atherosclerotic CVD.</span><a class="workspace-trigger" data-dcnode-id="9254" href="#bib0130" name="bbib0130"><sup data-dcnode-id="9255"><span data-dcnode-id="9256" instrument_node="">128</span></sup></a><sup data-dcnode-id="9252"><span data-dcnode-id="9253" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9249" href="#bib0131" name="bbib0131"><sup data-dcnode-id="9250"><span data-dcnode-id="9251" instrument_node="">129</span></sup></a><span data-dcnode-id="9248" instrument_node=""> The ongoing phase III A Randomized Trial Assessing the Effects of Inclisiran on Clinical Outcomes Among People With Cardiovascular Disease (ORION-4) is evaluating whether this LDL-C reduction with inclisiran translates to a reduction in MACE among patients with CVD.</span><a class="workspace-trigger" data-dcnode-id="9245" href="#bib0132" name="bbib0132"><sup data-dcnode-id="9246"><span data-dcnode-id="9247" instrument_node="">130</span></sup></a><span data-dcnode-id="9244" instrument_node=""> The Effect of </span><strong data-dcnode-id="9242"><span data-dcnode-id="9243" instrument_node="">Dal</span></strong><span data-dcnode-id="9241" instrument_node="">cetrapib vs Placebo on CV Risk in a </span><strong data-dcnode-id="9239"><span data-dcnode-id="9240" instrument_node="">Gene</span></strong><span data-dcnode-id="9238" instrument_node="">tically Defined Population With a Recent ACS (dal-GenE) study aims to assess the effect of dalcetrapib, a cholesteryl ester transfer protein inhibitor (not approved by Health Canada), in patients with a recent ACS and specific genotype.</span><a class="workspace-trigger" data-dcnode-id="9235" href="#bib0133" name="bbib0133"><sup data-dcnode-id="9236"><span data-dcnode-id="9237" instrument_node="">131</span></sup></a><span data-dcnode-id="9234" instrument_node=""> The </span><strong data-dcnode-id="9232"><span data-dcnode-id="9233" instrument_node="">C</span></strong><span data-dcnode-id="9231" instrument_node="">holesterol </span><strong data-dcnode-id="9229"><span data-dcnode-id="9230" instrument_node="">L</span></strong><span data-dcnode-id="9228" instrument_node="">owering via B</span><strong data-dcnode-id="9226"><span data-dcnode-id="9227" instrument_node="">e</span></strong><span data-dcnode-id="9225" instrument_node="">mpedoic Acid, an </span><strong data-dcnode-id="9223"><span data-dcnode-id="9224" instrument_node="">A</span></strong><span data-dcnode-id="9222" instrument_node="">CL-Inhibiting </span><strong data-dcnode-id="9220"><span data-dcnode-id="9221" instrument_node="">R</span></strong><span data-dcnode-id="9219" instrument_node="">egimen (CLEAR) Outcomes trial is evaluating the effect of bempedoic acid, a novel adenosine triphosphate (ATP) citrate lyase inhibitor not approved in Canada, in patients with, or at high risk for, ASCVD who are statin-intolerant.</span><a class="workspace-trigger" data-dcnode-id="9216" href="#bib0134" name="bbib0134"><sup data-dcnode-id="9217"><span data-dcnode-id="9218" instrument_node="">132</span></sup></a><span data-dcnode-id="9215" instrument_node=""> Finally, the </span><strong data-dcnode-id="9213"><span data-dcnode-id="9214" instrument_node="">P</span></strong><span data-dcnode-id="9212" instrument_node="">emafibrate to </span><strong data-dcnode-id="9210"><span data-dcnode-id="9211" instrument_node="">R</span></strong><span data-dcnode-id="9209" instrument_node="">educe Cardiovascular </span><strong data-dcnode-id="9207"><span data-dcnode-id="9208" instrument_node="">O</span></strong><span data-dcnode-id="9206" instrument_node="">utco</span><strong data-dcnode-id="9204"><span data-dcnode-id="9205" instrument_node="">m</span></strong><span data-dcnode-id="9203" instrument_node="">es by Reducing Triglycerides </span><strong data-dcnode-id="9201"><span data-dcnode-id="9202" instrument_node="">in</span></strong><span data-dcnode-id="9200" instrument_node=""> Pati</span><strong data-dcnode-id="9198"><span data-dcnode-id="9199" instrument_node="">en</span></strong><span data-dcnode-id="9197" instrument_node="">ts With Diabe</span><strong data-dcnode-id="9195"><span data-dcnode-id="9196" instrument_node="">t</span></strong><span data-dcnode-id="9194" instrument_node="">es (PROMINENT) trial is determining whether pemafibrate, a peroxisome proliferator-activated receptor alpha agonist (which is not approved for use in Canada) reduces MACE in patients with type 2 diabetes mellitus, elevated triglycerides, and low HDL-C.</span><a class="workspace-trigger" data-dcnode-id="9191" href="#bib0135" name="bbib0135"><sup data-dcnode-id="9192"><span data-dcnode-id="9193" instrument_node="">133</span></sup></a></p><p data-dcnode-id="9151" id="para9010"><span class="display" data-dcnode-id="9152"></span></p><div aria-label="Unlabelled box" class="article-textbox" data-dcnode-id="9153" id="tbox0007" role="region"><span data-dcnode-id="9187" id="tbcap6"><p data-dcnode-id="9188" id="spara027"><span data-dcnode-id="9189" instrument_node="">RECOMMENDATION</span></p></span><div data-dcnode-id="9154"><p data-dcnode-id="9167" id="para9011"></p><dl class="list" data-dcnode-id="9168"><dt class="list-label" data-dcnode-id="9185"><span data-dcnode-id="9186" instrument_node="">13.</span></dt><dd class="list-description" data-dcnode-id="9179"><p data-dcnode-id="9180" id="para0079"><span data-dcnode-id="9184" instrument_node="">We recommend the use of IPE to decrease the risk of CV events in patients with ASCVD, or with diabetes and ≥ 1 CVD risk factors, who have an elevated fasting triglyceride level of 1.5-5.6 mmol/L despite treatment with maximally tolerated statin therapy (Strong Recommendation; High-Quality Evidence). Refer to </span><a class="workspace-trigger" data-dcnode-id="9182" href="#fig0003" name="bfig0003"><span data-dcnode-id="9183" instrument_node="">Figure 3</span></a><span data-dcnode-id="9181" instrument_node="">.</span></p></dd><dt class="list-label" data-dcnode-id="9177"><span data-dcnode-id="9178" instrument_node="">14.</span></dt><dd class="list-description" data-dcnode-id="9174"><p data-dcnode-id="9175" id="para0080"><span data-dcnode-id="9176" instrument_node="">We recommend the use of a PCSK9 inhibitor (alirocumab or evolocumab) to lower LDL-C level in patients with heterozygous FH without clinical ASCVD whose LDL-C remains above the target (ie, LDL-C ≥ 2.5 mmol/L or &lt; 50% reduction from baseline; or ApoB ≥ 0.85 mg/dL or non-HDL-C ≥ 3.2 mmol/L) despite maximally tolerated statin therapy with or without ezetimibe therapy (Strong Recommendation; High-Quality Evidence).</span></p></dd><dt class="list-label" data-dcnode-id="9172"><span data-dcnode-id="9173" instrument_node="">15.</span></dt><dd class="list-description" data-dcnode-id="9169"><p data-dcnode-id="9170" id="para0081"><span data-dcnode-id="9171" instrument_node="">We recommend the use of a PCSK9 inhibitor (alirocumab or evolocumab) for patients with heterozygous FH and ASCVD whose LDL-C remains above the threshold ≥ 1.8 mmol/L (or ApoB ≥ 0.7 mg/dL or non-HDL-C ≥ 2.4 mmol/L) despite maximally tolerated statin therapy, with or without ezetimibe (Strong Recommendation; High-Quality Evidence).</span></p></dd></dl><p></p><p data-dcnode-id="9165" id="para0082"><span data-dcnode-id="9166" instrument_node="">It should be noted that 2 recommendations on the basis of the evidence review of PICO question 5 were overlapping with recommendations made for PICO question 4 and appear as part of that earlier section (Recommendations 1 and 2).</span></p><p data-dcnode-id="9161" id="para0083"><strong data-dcnode-id="9163"><span data-dcnode-id="9164" instrument_node="">Values and preferences.</span></strong><span data-dcnode-id="9162" instrument_node=""> None of these agents have been evaluated in RCTs against each other. Therefore, it is difficult to assess the relative benefit of each therapy. Also, to date these agents have primarily been evaluated in patients with preexisting ASCVD (ie, secondary prevention). The choice of agent should be on the basis of individual patient factors, their values and preferences, and practical considerations, such as access, cost, and adherence. Because ezetimibe lowers LDL-C level by approximately 20% when used in addition to a statin, if a patient's LDL-C is well above the threshold for therapy intensification (ie, &gt; 2.2 mmol/L or &gt; 20% above threshold), it might be preferable to consider a PCSK9 inhibitor as second-line therapy. However, because of cost considerations, some insurance providers might require a trial of ezetimibe before approving the use of a PCSK9 inhibitor. IPE should be preferentially reserved for patients aged ≥ 45 years of age (or ≥ 50 years of age with ≥ 1 CVD risk factor) who are receiving maximally tolerated statin therapy but have a residual elevated triglyceride level (1.5-5.6 mmol/L). Because IPE is a purified form of ethyl EPA, it should not be inferred that the same CV benefits could be derived from the consumption of omega-3 polyunsaturated fatty acid (PUFA) formulations that include EPA alone, EPA and DHA mixtures, or fish oils from supplements or dietary sources.</span></p><p data-dcnode-id="9155" id="para0084"><span data-dcnode-id="9160" instrument_node="">The recommendation for treatment of patients with FH is on the basis of the 2018 update to the CCS position statement on FH.</span><a class="workspace-trigger" data-dcnode-id="9157" href="#bib0136" name="bbib0136"><sup data-dcnode-id="9158"><span data-dcnode-id="9159" instrument_node="">134</span></sup></a><span data-dcnode-id="9156" instrument_node=""> The recommendation for PCSK9 inhibitors to lower LDL-C level is on the basis of high-quality evidence; however, there is a relative paucity of RCT evidence to support any agent to reduce the risk of CV events in FH patients.</span></p></div></div><p></p><p data-dcnode-id="9147"><strong data-dcnode-id="9149"><span data-dcnode-id="9150" instrument_node="">Practical tip.</span></strong><span data-dcnode-id="9148" instrument_node=""> Unlike the use of PCSK9 inhibitors in patients with ASCVD, access to these medications is covered by most provincial drug plans for patients with heterozygous FH (with or without ASCVD) with LDL-C level above the threshold. Although the evidence for IPE to decrease the risk of CV events in patients with ASCVD, or with diabetes and ≥ 1 CVD risk factors is good, it is relatively new and most provincial drug plans do not yet cover this expensive medication. Private plans might cover this drug for patients on the basis of specific criteria and there is a manufacturer patient assistance program that might facilitate access. As part of shared decision-making, clinicians should discuss the indication and potential benefits of IPE, as well as the coverage issues and the potential patient costs.</span></p></section><section data-dcnode-id="9069" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9144" id="cesectitle0034"><span data-dcnode-id="9145" instrument_node="">PICO 6: In primary and secondary prevention, what is the evidence for CV benefit of omega-3 from (1) dietary sources; and/or (2) over-the-counter formulations/supplements?</span></h3><p data-dcnode-id="9088" id="para0086"><span data-dcnode-id="9143" instrument_node="">Despite the success of the REDUCE-IT trial in showing a purified prescription IPE at 4 g/d reduces major CVD events in statin-treated patients with elevated triglyceride levels who have established CVD or diabetes and at least 1 CVD risk factor,</span><a class="workspace-trigger" data-dcnode-id="9140" href="#bib0116" name="bbib0116"><sup data-dcnode-id="9141"><span data-dcnode-id="9142" instrument_node="">114</span></sup></a><span data-dcnode-id="9139" instrument_node=""> supplementation with over-the-counter long-chain omega-3 PUFAs marketed as natural health products in Canada that include EPA alone, EPA and DHA mixtures, or fish oils from supplements or dietary sources does not offer any clear advantages for CVD event risk reduction. We updated a systematic review and meta-analysis of RCTs with data from 2 subsequently completed RCTs, </span><strong data-dcnode-id="9137"><span data-dcnode-id="9138" instrument_node="">A S</span></strong><span data-dcnode-id="9136" instrument_node="">tudy of </span><strong data-dcnode-id="9134"><span data-dcnode-id="9135" instrument_node="">C</span></strong><span data-dcnode-id="9133" instrument_node="">ardiovascular </span><strong data-dcnode-id="9131"><span data-dcnode-id="9132" instrument_node="">E</span></strong><span data-dcnode-id="9130" instrument_node="">vents i</span><strong data-dcnode-id="9128"><span data-dcnode-id="9129" instrument_node="">n D</span></strong><span data-dcnode-id="9127" instrument_node="">iabetes (ASCEND)</span><a class="workspace-trigger" data-dcnode-id="9124" href="#bib0137" name="bbib0137"><sup data-dcnode-id="9125"><span data-dcnode-id="9126" instrument_node="">135</span></sup></a><span data-dcnode-id="9123" instrument_node=""> and </span><strong data-dcnode-id="9121"><span data-dcnode-id="9122" instrument_node="">Vit</span></strong><span data-dcnode-id="9120" instrument_node="">amin D and Omeg</span><strong data-dcnode-id="9118"><span data-dcnode-id="9119" instrument_node="">a</span></strong><span data-dcnode-id="9117" instrument_node="">-3 Tria</span><strong data-dcnode-id="9115"><span data-dcnode-id="9116" instrument_node="">l</span></strong><span data-dcnode-id="9114" instrument_node=""> (VITAL),</span><a class="workspace-trigger" data-dcnode-id="9111" href="#bib0138" name="bbib0138"><sup data-dcnode-id="9112"><span data-dcnode-id="9113" instrument_node="">136</span></sup></a><span data-dcnode-id="9110" instrument_node=""> which failed to show a clear CV benefit of supplementation with long chain omega-3 PUFAs in more than 130,000 randomized participants.</span><a class="workspace-trigger" data-dcnode-id="9107" href="#bib0139" name="bbib0139"><sup data-dcnode-id="9108"><span data-dcnode-id="9109" instrument_node="">137</span></sup></a><span data-dcnode-id="9106" instrument_node=""> Another large CVD outcomes trial of a pharmaceutical drug of mixed long-chain omega-3 (largely EPA and DHA) carboxylic acids (omega-3 CA) at 4 g/d with similar entry criteria to the REDUCE-IT trial was also discontinued early by the data safety monitoring board for futility with the drug unlikely to show a benefit to patients.</span><a class="workspace-trigger" data-dcnode-id="9103" href="#bib0128" name="bbib0128"><sup data-dcnode-id="9104"><span data-dcnode-id="9105" instrument_node="">126</span></sup></a><span data-dcnode-id="9102" instrument_node=""> Pooled evidence from RCTs</span><a class="workspace-trigger" data-dcnode-id="9100" href="#bib0140" name="bbib0140"><span data-dcnode-id="9101" instrument_node="">138</span></a><span data-dcnode-id="9099" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9097" href="#bib0141" name="bbib0141"><span data-dcnode-id="9098" instrument_node="">139</span></a><span data-dcnode-id="9096" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9094" href="#bib0142" name="bbib0142"><span data-dcnode-id="9095" instrument_node="">140</span></a><span data-dcnode-id="9093" instrument_node=""> and individual large RCTs,</span><a class="workspace-trigger" data-dcnode-id="9090" href="#bib0143" name="bbib0143"><sup data-dcnode-id="9091"><span data-dcnode-id="9092" instrument_node="">141</span></sup></a><span data-dcnode-id="9089" instrument_node=""> however, have shown consistent triglyceride-lowering effects at high doses (2-4 g/d) of omega-3 PUFAs, independent of CVD event risk reduction.</span></p><p data-dcnode-id="9070" id="para9012"><span class="display" data-dcnode-id="9071"></span></p><div aria-label="Unlabelled box" class="article-textbox" data-dcnode-id="9072" id="tbox0008" role="region"><span data-dcnode-id="9085" id="tbcap7"><p data-dcnode-id="9086" id="spara028"><span data-dcnode-id="9087" instrument_node="">RECOMMENDATION</span></p></span><div data-dcnode-id="9073"><p data-dcnode-id="9078" id="para9013"></p><dl class="list" data-dcnode-id="9079"><dt class="list-label" data-dcnode-id="9083"><span data-dcnode-id="9084" instrument_node="">16.</span></dt><dd class="list-description" data-dcnode-id="9080"><p data-dcnode-id="9081" id="para0087"><span data-dcnode-id="9082" instrument_node="">We do not recommend the use of over-the-counter omega-3 polyunsaturated fatty acid supplements (marketed as natural health products in Canada) to reduce CVD risk (Strong Recommendation; High-Quality Evidence).</span></p></dd></dl><p></p><p data-dcnode-id="9074" id="para0088"><strong data-dcnode-id="9076"><span data-dcnode-id="9077" instrument_node="">Values and preferences.</span></strong><span data-dcnode-id="9075" instrument_node=""> Although there is no apparent overall CVD event risk benefit, patients might choose to use these supplements for other indications including the management of high triglycerides, for which very high doses are required (4 g/d), and for which fibrates are generally more effective. Individuals should be aware that, in addition to marine sources, there are different preparations of long-chain omega-3 PUFAs high in DHA and EPA from algal and yeast sources, both of which are suitable for vegans. There is also alpha-linolenic acid from plant sources that do not contain DHA or EPA including flax seeds, chia seeds, and some oils such as canola and soybean oil, which have little or no effect on triglycerides.</span></p></div></div><p></p></section></section><section data-dcnode-id="9058" id="sec0026"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9066" id="cesectitle0036"><span data-dcnode-id="9067" instrument_node="">Conclusions</span></h2><p data-dcnode-id="9061" id="para0089"><span data-dcnode-id="9065" instrument_node="">In this focused revision of the CCS guidelines for the management of dyslipidemia, the committee has distilled several years of new research in CV risk assessment (especially as it pertains to women), lipoprotein biomarkers, and coronary artery calcium scanning. The committee also reviewed several major landmark RCTs of novel therapies to treat dyslipidemia. On the basis of the best available evidence to date, we have developed several new recommendations for clinicians to more accurately assess their patients’ CV risk and optimally manage their lipid disorders. We acknowledge that the science surrounding CV risk and dyslipidemia management is evolving and therefore these recommendations can only be viewed as the best practices on the basis of the currently available evidence. Nonetheless, the objective of any guideline is to provide clinicians with the most up-to-date knowledge and tools to help them make informed decisions with their patients. </span><a class="workspace-trigger" data-dcnode-id="9063" href="#sec0028" name="bsec0028"><span data-dcnode-id="9064" instrument_node="">Appendix 1</span></a><span data-dcnode-id="9062" instrument_node=""> provides an at-a-glance, step-wise summary of the management of adult patients with dyslipidemia for the prevention of cardiovascular disease, based on the 2021 CCS dyslipidemia guidelines.</span></p><p data-dcnode-id="9059" id="para0090"><span data-dcnode-id="9060" instrument_node="">The past few years has realized significant progress in the management of dyslipidemia, with several new therapies currently available and more in development. With continued efforts to prioritize healthy lifestyles and the use of new pharmacotherapeutic options available to treat eligible patients, we hope to realize further reductions in morbidity and mortality from ASCVD in Canada.</span></p></section></div><section data-dcnode-id="9050" id="ack0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9055" id="cesectitle0038"><span data-dcnode-id="9056" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="9053" id="para0093"><span data-dcnode-id="9054" instrument_node="">We are grateful to Andrea Quattini (Assistant Librarian, Schulich Library of Physical Sciences, Life Sciences, and Engineering McGill University, Montreal, Quebec) for her assistance in searching the medical literature for evidence to be reviewed and inform the recommendations for PICO question 1. We also thank Andre Mattman, MD, St Paul's Hospital Medical Biochemistry Laboratory, Vancouver, British Columbia, Pierre Douville, MD, President of the Canadian Association of Medical Biochemists (CAMB) and Ted Dunn, PhD, President-Elect of the Canadian Society of Clinical Chemists (CSCC) for their survey on the availability of lipid/lipoprotein tests and nonfasting lipid testing across jurisdictions in Canada.</span></p><p data-dcnode-id="9051" id="para0094"><span data-dcnode-id="9052" instrument_node="">We are very grateful for the thoughtful feedback and comments provided by the members of the 2021 Lipids Secondary Review Panel members: Ranjani Aiyar, MD, Canadian Society of Internal Medicine, Ottawa, Ontario, Canada; Alexis Baass, MD, Royal Victoria Hospital, Montreal, Quebec, Canada; N. John Bosomworth, MD, College of Family Physicians of Canada, Mississauga, Ontario, Canada; Liam Brunham, MD, PhD, Centre for Heart Lung Innovation, Providence Health Care Research Institute, University of British Columbia, Vancouver, British Columbia, Canada; Alice Cheng, MD, University of Toronto, Toronto, Ontario, Canada; Dan Dattani, MBBS, College of Family Physicians of Canada, Mississauga, and St Michael's Hospital, University of Toronto, Toronto, Ontario, Canada; Ross Feldman, MD, Memorial University, St John's, Newfoundland, Canada; Geoff Lewis, MSc, RPh, Canadian Pharmacists Association, Ottawa, Ontario, Canada; Karen Then, CCN(C), ACNP, PhD, University of Calgary and Alberta Health Services, Calgary, Alberta, Canada; and Sheldon Tobe, MD, Sunnybrook Health Sciences Centre, University of Toronto, Toronto, Ontario, Canada.</span></p></section><div class="Appendices" data-dcnode-id="9030"><section data-dcnode-id="9031" id="sec0029"><h2 class ta-dcnode-id="472" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="265" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="266"><div class="PageDivider" data-dcnode-id="465"></div><header data-dcnode-id="462" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Cited by (35)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="267"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="268"><ul data-dcnode-id="274"><li class="ListArticleItem" data-dcnode-id="442"><div class="sub-heading" data-dcnode-id="456"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2589790X21003541" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="460" id="citing-articles-article0-title"><span data-dcnode-id="461" instrument_node="">Is Deprescription of Ezetimibe Safe in Familial Hypercholesterolemia Patients Taking Evolocumab?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">2022, CJC Open</span></div></div><div class="buttons" data-dcnode-id="450"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="451" type="button"><span class="button-link-text" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="452" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="453"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="443"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="444" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="445"><p data-dcnode-id="448" id="abspara0010"><span data-dcnode-id="449" instrument_node="">We evaluated whether low-density lipoprotein cholesterol (LDL-C) levels in familial hypercholesterolemia patients on triple lipid-lowering therapy would remain below intensification threshold values after withdrawal of ezetimibe. We included 13 heterozygous familial hypercholesterolemia patients with vascular disease who were treated with statin&nbsp;+ ezetimibe&nbsp;+ evolocumab; ezetimibe was discontinued at the patients’ request. After 3 months, LDL-C levels increased from 0.96 ± 0.51 to 1.54 ± 1.07 mmol/L. In 12 of 13 patients, the LDL-C level remained below 1.8 mmol/L. No adverse cardiovascular events were observed. Deprescribing ezetimibe reduced pill burden but increased LDL-C level, although usually not above the treatment intensification threshold for high-risk patients.</span></p><p data-dcnode-id="446" id="abspara0015"><span data-dcnode-id="447" instrument_node="">Nous avons évalué si les concentrations de cholestérol à lipoprotéines de faible densité (C-LDL) des patients atteints d’hypercholestérolémie familiale sur le traitement hypolipidémiant demeureraient en deçà des valeurs seuils d’intensification après le retrait de l’ézétimibe. Nous avons retenu 13 patients atteints d’une maladie vasculaire qui ont la forme hétérozygote d’hypercholestérolémie familiale et qui ont été traités par statine&nbsp;+ ézétimibe&nbsp;+ évolocumab; l’ézétimibe a été interrompu à la demande des patients. Après 3 mois, les concentrations de C-LDL sont passées de 0,96 ± 0,51 à 1,54 ± 1,07 mmol/l. Chez 12 des 13 patients, les concentrations de C-LDL sont demeurées en deçà de 1,8 mmol/l. Nous n’avons observé aucun événement cardiovasculaire indésirable. La déprescription de l’ézétimibe a permis de réduire le fardeau posologique, mais a entraîné l’augmentation des concentrations de C-LDL, bien qu’elles ne fussent généralement pas au-dessus du seuil d’intensification du traitement des patients exposés à un risque élevé.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="424"><div class="sub-heading" data-dcnode-id="436"><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0735109721084448" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="440" id="citing-articles-article1-title"><span data-dcnode-id="441" instrument_node="">Managing Atherosclerotic Cardiovascular Risk in Young Adults: JACC State-of-the-Art Review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">2022, Journal of the American College of Cardiology</span></div></div><div class="buttons" data-dcnode-id="430"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="431" type="button"><span class="button-link-text" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="432" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="433"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="425"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="426" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="427"><p data-dcnode-id="428" id="abspara0010"><span data-dcnode-id="429" instrument_node="">There is a need to identify high-risk features that predict early-onset atherosclerotic cardiovascular disease (ASCVD). The authors provide insights to help clinicians identify and address high-risk conditions in the 20- to 39-year age range (young adults). These include tobacco use, elevated blood pressure/hypertension, family history of premature ASCVD, primary severe hypercholesterolemia such as familial hypercholesterolemia, diabetes with diabetes-specific risk-enhancing factors, or the presence of multiple other risk-enhancing factors, including in females, a history of pre-eclampsia or menopause under age 40. The authors update current thinking on lipid risk factors such as triglycerides, non–high-density lipoprotein cholesterol, apolipoprotein B, or lipoprotein (a) that are useful in understanding an individual’s long-term ASCVD risk. The authors review emerging strategies, such as coronary artery calcium and polygenic risk scores in this age group, that have potential clinical utility, but whose best use remains uncertain. Finally, the authors discuss both the obstacles and opportunities for addressing prevention in early adulthood.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="339"><div class="sub-heading" data-dcnode-id="418"><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0828282X21008229" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="422" id="citing-articles-article2-title"><span data-dcnode-id="423" instrument_node="">Influence of the LDL-Receptor Genotype on Statin Response in Heterozygous Familial Hypercholesterolemia: Insights From the Canadian FH Registry</span></h3></a><div class="article-source ellipsis" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">2022, Canadian Journal of Cardiology</span></div></div><div class="buttons" data-dcnode-id="412"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="413" type="button"><span class="button-link-text" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="414" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="415"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="340"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="341" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="342"><p data-dcnode-id="407" id="abspara0010"><span data-dcnode-id="411" instrument_node="">Whether low-density lipoprotein (LDL) receptor (LDLR) residual activity influences the LDL-lowering effect of statins in heterozygous familial hypercholesterolemia (HeFH) remains unclear. The objective of this study was to investigate the relationship between the </span><em data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">LDLR</span></em><span data-dcnode-id="408" instrument_node=""> genotype and statin-induced LDL cholesterol (LDL-C) reductions in HeFH.</span></p><p data-dcnode-id="405" id="abspara0015"><span data-dcnode-id="406" instrument_node="">A total of 615 individuals with HeFH (receptor-defective [RD] genotype: n&nbsp;= 226; receptor-negative [RN] genotype: n&nbsp;= 389) from 7 lipid clinics across Canada who initiated statin monotherapy were included in this retrospective longitudinal study. Statin-induced reductions in LDL-C among individuals with RD and RN genotypes were compared with the use of linear models.</span></p><p data-dcnode-id="383" id="abspara0020"><span data-dcnode-id="404" instrument_node="">There were 334 women and 281 men with a mean untreated LDL-C concentrations of 6.97 ± 1.65 mmol/L. Untreated and on-statin LDL-C levels where higher among patients with an RN genotype: untreated: RN 7.24 (95% confidence interval [CI] 6.98-7.50) mmol/L vs RD 6.70 (95% CI 6.41-6.98) mmol/L (</span><em data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">P</span></em><span data-dcnode-id="401" instrument_node="">&nbsp;= 0.0002); on-statin: RN 4.50 (95% CI 4.31-4.70) vs RD 4.05 (95% CI 3.84-4.26) mmol/L (</span><em data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">P</span></em><span data-dcnode-id="398" instrument_node="">&nbsp;= 0.0004). After adjustments for age, sex, smoking status, untreated LDL-C concentrations, statin type and dose, as well as the clinic where the patients were treated, the LDL-C–lowering effect of statins was significantly weaker for individuals with an RN mutation than for individuals with an RD mutation: RN:&nbsp;−31.1% (95% CI&nbsp;−34.7% to&nbsp;−27.4) vs RD&nbsp;−36.5% (95% CI&nbsp;−40.4% to&nbsp;−32.6%); </span><em data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">P</span></em><span data-dcnode-id="395" instrument_node=""> &lt; 0.0001. The </span><em data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">LDLR</span></em><span data-dcnode-id="392" instrument_node=""> genotype was the strongest nonmodifiable independent correlate of statin-induced LDL-C reductions (</span><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">R</span></em><sup data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">2</span></sup><span data-dcnode-id="387" instrument_node="">&nbsp;= 2.3%; </span><em data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">P</span></em><span data-dcnode-id="384" instrument_node="">&nbsp;= 0.0001).</span></p><p data-dcnode-id="378" id="abspara0025"><span data-dcnode-id="382" instrument_node="">The </span><em data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">LDLR</span></em><span data-dcnode-id="379" instrument_node=""> genotype is significantly associated with statin-induced reductions in LDL-C concentrations in HeFH.</span></p><p data-dcnode-id="373" id="abspara0030"><span data-dcnode-id="377" instrument_node="">On ne sait toujours pas si l'activité résiduelle du récepteur (R-LDL) des lipoprotéines de basse densité (LDL) influence l'effet hypolipidémiant des statines dans l'hypercholestérolémie familiale hétérozygote (HFHe). L'objectif de cette étude était d'examiner la relation entre le génotype </span><em data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">R-LDL</span></em><span data-dcnode-id="374" instrument_node=""> et les réductions du LDL-cholestérol (LDL-C) induites par les statines dans l'HFHe.</span></p><p data-dcnode-id="371" id="abspara0035"><span data-dcnode-id="372" instrument_node="">Un total de 615 personnes atteintes d'HFHe (génotype récepteur-déficient [RD] : n&nbsp;= 226; génotype récepteur-négatif [RN] : n&nbsp;= 389) provenant de sept cliniques de maladies lipidiques à travers le Canada et ayant commencé une monothérapie par statine ont été incluses dans cette étude longitudinale rétrospective. Les réductions du LDL-C induites par les statines chez les personnes de génotype RD et RN ont été comparées à l'aide de modèles linéaires.</span></p><p data-dcnode-id="348" id="abspara0040"><span data-dcnode-id="370" instrument_node="">Étaient inclus 334 femmes et 281 hommes avec une concentration moyenne de LDL-C non traité de 6,97 ± 1,65 mmol/l. Les taux de LDL-C pré-statine et sous traitement par statines étaient plus élevés chez les patients présentant un génotype RN : pré-statine : RN 7,24 (intervalle de confiance [IC] à 95 % 6,98-7,50) mmol/l vs RD 6,70 (IC à 95 % 6,41-6,98) mmol/l (</span><em data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">P</span></em><span data-dcnode-id="367" instrument_node="">&nbsp;= 0,0002); sous statine : RN 4,50 (IC à 95 % 4,31-4,70) vs RD 4,05 (IC à 95 % 3,84-4,26) mmol/l (</span><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">P</span></em><span data-dcnode-id="364" instrument_node="">&nbsp;= 0,0004). Après ajustement pour tenir compte de l'âge, du sexe, du tabagisme, des concentrations de LDL-C non traité, du type et de la dose de statine, ainsi que de la clinique où les patients étaient traités, l'effet des statines sur la réduction du LDL-C était significativement plus faible chez les personnes présentant une mutation RN que chez celles présentant une mutation RD : pour le groupe RN : 31,1 % (IC à 95 % –34,7 % à –27,4 %) vs RD 36,5 % (IC à 95 % –40,4 % à –32,6 %); </span><em data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">P</span></em><span data-dcnode-id="361" instrument_node=""> &lt; 0,0001. Le génotype </span><em data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">R-LDL</span></em><span data-dcnode-id="358" instrument_node=""> représentait le facteur non modifiable le plus fortement corrélé avec les réductions du LDL-C induites par les statines (</span><em data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">R</span></em><sup data-dcnode-id="353"><em data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">2</span></em></sup><span data-dcnode-id="352" instrument_node="">&nbsp;= 2,3 %; </span><em data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">P</span></em><span data-dcnode-id="349" instrument_node="">&nbsp;= 0,0001).</span></p><p data-dcnode-id="343" id="abspara0045"><span data-dcnode-id="347" instrument_node="">Le génotype R-</span><em data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">LDL</span></em><span data-dcnode-id="344" instrument_node=""> est associé de manière significative aux réductions des concentrations de LDL-C induites par les statines dans l'HFHe.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="328"><div class="sub-heading" data-dcnode-id="333"><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0735109721083911" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="337" id="citing-articles-article3-title"><span data-dcnode-id="338" instrument_node="">Measurement of Lipoprotein(a): A Once in a Lifetime Opportunity</span></h3></a><div class="article-source ellipsis" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">2022, Journal of the American College of Cardiology</span></div></div><div class="buttons" data-dcnode-id="332"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="329"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="330" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="331"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="310"><div class="sub-heading" data-dcnode-id="322"><a data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2213858721002849" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="326" id="citing-articles-article4-title"><span data-dcnode-id="327" instrument_node="">Effective, disease-modifying, clinical approaches to patients with mild-to-moderate hypertriglyceridaemia</span></h3></a><div class="article-source ellipsis" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">2022, The Lancet Diabetes and Endocrinology</span></div></div><div class="buttons" data-dcnode-id="316"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="317" type="button"><span class="button-link-text" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="318" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="319"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="311"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="312" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="313"><p data-dcnode-id="314" id="spara30"><span data-dcnode-id="315" instrument_node="">Plasma triglyceride concentration is easily, inexpensively, and accurately measured, and when elevated is a highly informative disease marker that identifies individuals who frequently have a host of underlying metabolic, inflammatory, and atherogenic risk factors. Although this concept aligns with much that has been discussed regarding the metabolic syndrome, individuals identified with mild-to-moderate hypertriglyceridaemia on a screening lipid profile are not necessarily recognised as having features of the metabolic syndrome and frequently do not receive definitive, meaningful, disease-modifying therapy. This treatment would include (1) lifestyle modification; (2) LDL-lowering therapies to aggressively treat elevated apolipoprotein B-containing particles; (3) antihypertensive therapies that have optimal therapeutic profiles for those individuals with metabolic syndrome; (4) icosapent ethyl for those individuals at high risk, particularly patients with established atherosclerotic cardiovascular disease who have residual hypertriglyceridaemia despite treatment with appropriate LDL-lowering therapies; (5) preferential use of cardiovascular protective diabetes therapies, in individuals with diabetes; and (6) antithrombotic therapies for secondary prevention of atherosclerotic cardiovascular disease in the context of high vascular disease risk and diabetes. Several emerging therapies, such as novel weight reducing, anti-inflammatory, lipid-modifying therapies, and therapies targeting the progression of non-alcoholic fatty liver disease, could also soon enter the clinical arena for patients with mild-to-moderate hypertriglyceridaemia and associated metabolic syndrome.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="275"><div class="sub-heading" data-dcnode-id="304"><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2589790X21002729" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="308" id="citing-articles-article5-title"><span data-dcnode-id="309" instrument_node="">Increasing Prevalence and Incidence of Atherosclerotic Cardiovascular Disease in Adult Patients in Ontario, Canada From 2002 to 2018</span></h3></a><div class="article-source ellipsis" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">2022, CJC Open</span></div></div><div class="buttons" data-dcnode-id="298"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="299" type="button"><span class="button-link-text" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="300" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="301"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="276"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="277" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="278"><p data-dcnode-id="296" id="abspara0010"><span data-dcnode-id="297" instrument_node="">Cardiovascular disease is the second-leading cause of death in Canada. However, limited data are available on the prevalence of atherosclerotic cardiovascular disease (ASCVD) in Canada. The study objective was to describe the incidence and prevalence of ASCVD in adult patients in Ontario, Canada, and to evaluate temporal trends for subsequent ASCVD events among those with new-onset ASCVD.</span></p><p data-dcnode-id="294" id="abspara0015"><span data-dcnode-id="295" instrument_node="">This retrospective, observational study identified ASCVD incidence and prevalence data from the Institute for Clinical Evaluative Sciences Data Repository for adults from Ontario. Overall prevalence was established for the period from 2002 to 2018. Incident cases from April 1, 2005 to March 2016 were then identified, and followed up to 2018. Primary outcomes were date and type of index event/procedure, patient characteristics/baseline demographics, and comorbidities. Secondary outcomes assessed were time from first to second ASCVD event, subsequent event(s) and/or mortality, and type of subsequent event(s) relative to the type of index/primary event.</span></p><p data-dcnode-id="292" id="abspara0020"><span data-dcnode-id="293" instrument_node="">A total of 1,042,621 eligible prevalent ASCVD cases were identified; of these, 743,309 patients (69%) were newly diagnosed with incident ASCVD. The 10-year prevalence rates for all ASCVD subtypes increased over the study period. Overall event incidence rates per 1000 person-years were mostly stable or increased. Among incident cases, 50% experienced subsequent events over the study period.</span></p><p data-dcnode-id="290" id="abspara0025"><span data-dcnode-id="291" instrument_node="">This observational study demonstrated increasing prevalence and high incidence of new ASCVD diagnoses in adults from Ontario, over the study period. These data, together with the substantial number of subsequent events in ASCVD patients, demonstrate significant clinical burden of this disease in Ontario.</span></p><p data-dcnode-id="288" id="abspara0030"><span data-dcnode-id="289" instrument_node="">Les maladies cardiovasculaires constituent la deuxième cause de décès au Canada. Toutefois, on dispose de peu de données sur la prévalence de la maladie cardiovasculaire athéroscléreuse (MCVAS) au Canada. L’étude avait pour objectifs de décrire l’incidence et la prévalence de la MCVAS chez les patients adultes en Ontario (Canada) et d’évaluer les tendances temporelles des manifestations subséquentes de MCVAS chez les personnes ayant une MCVAS d’apparition récente.</span></p><p data-dcnode-id="283" id="abspara0035"><span data-dcnode-id="287" instrument_node="">Cette étude observationnelle rétrospective a permis de colliger les données sur l’incidence et la prévalence de la MCVAS chez les adultes ontariens consignées dans le référentiel de l’Institut des sciences cliniques évaluatives. La prévalence globale a été établie pour la période allant de 2002 à 2018. Les cas incidents survenus du 1</span><sup data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">er</span></sup><span data-dcnode-id="284" instrument_node=""> avril 2005 à mars 2016 ont ensuite été recensés et suivis jusqu’en 2018. Les paramètres d’évaluation principaux étaient : date et nature de la manifestation index et de l’intervention; caractéristiques des patients et données démographiques initiales; comorbidités. Les éléments suivants constituaient les paramètres d’évaluation secon-daires : temps écoulé entre la première et la deuxième manifestation de MCVAS, la ou les manifestations subséquentes et/ou le décès; nature de la ou des manifestations subséquentes par rapport à celle de la manifestation index ou primaire.</span></p><p data-dcnode-id="281" id="abspara0040"><span data-dcnode-id="282" instrument_node="">En tout, 1 042 621 cas de MCVAS prévalents admissibles ont été dénombrés; parmi ceux-ci, il y avait 743 309 (69 %) cas incidents de MCVAS nouvellement diagnostiqués. Les taux de prévalence à 10 ans de tous les sous-types de MCVAS ont augmenté au cours de la période étudiée. Les taux globaux d’incidence des manifestations par 1000 années-personnes étaient généralement stables ou accrus. Cinquante pour cent des cas incidents ont été associés à des manifestations subséquentes au cours de la période étudiée.</span></p><p data-dcnode-id="279" id="abspara0045"><span data-dcnode-id="280" instrument_node="">Cette étude observationnelle a démontré une prévalence croissante et une incidence élevée de nouveaux diagnostics de MCVAS chez les adultes en Ontario au cours de la période étudiée. Les données à cet égard, ainsi que le grand nombre de manifestations subséquentes de la maladie, démontrent que la MCVAS constitue un fardeau clinique considérable en Ontario.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85111244150%26md5%3Db6ea359b9e81dc118eaca8105471a1ac" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="272" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="273"></path></svg><span class="button-alternative-text" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="257"><dt class="footnote-label" data-dcnode-id="264"></dt><dd class="u-margin-xxl-left" data-dcnode-id="258"><p data-dcnode-id="259" id="notep0002"><span data-dcnode-id="263" instrument_node="">The disclosure information of the authors and reviewers is available from the CCS on their guidelines library at </span><a data-dcnode-id="261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ccs.ca/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="262" instrument_node="">www.ccs.ca</span></a><span data-dcnode-id="260" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="252"><dt class="footnote-label" data-dcnode-id="256"></dt><dd class="u-margin-xxl-left" data-dcnode-id="253"><p data-dcnode-id="254" id="notep0003"><span data-dcnode-id="255" instrument_node="">This statement was developed following a thorough consideration of medical literature and the best available evidence and clinical experience. It represents the consensus of a Canadian panel comprised of multidisciplinary experts on this topic with a mandate to formulate disease-specific recommendations. These recommendations are aimed to provide a reasonable and practical approach to care for specialists and allied health professionals obliged with the duty of bestowing optimal care to patients and families, and can be subject to change as scientific knowledge and technology advance and as practice patterns evolve. The statement is not intended to be a substitute for physicians using their individual judgement in managing clinical care in consultation with the patient, with appropriate regard to all the individual circumstances of the patient, diagnostic and treatment options available and available resources. Adherence to these recommendations will not necessarily produce successful outcomes in every case.</span></p></dd></dl><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="248"><sup data-dcnode-id="249"><a data-dcnode-id="250" href="#bfn1"><span data-dcnode-id="251" instrument_node="">‡</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246" id="notep0001"><span data-dcnode-id="247" instrument_node="">These authors were co-chairs of this guideline update and contributed equally to this work.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0828282X21001653"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2021 Canadian Cardiovascular Society. Published by Elsevier Inc. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="141"><div data-dcnode-id="155" id="recommended-articles"><ul data-dcnode-id="156"><li class="SidePanelItem" data-dcnode-id="205"><div class="su
