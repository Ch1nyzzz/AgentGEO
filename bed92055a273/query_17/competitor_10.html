</span><meta content="The 2021 guidelines primary panel selected clinically relevant questions and produced updated recommendations, on the basis of important new findings …" data-dcnode-id="11796" property="og:description"><span data-dcnode-id="11795" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0001&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abss0001&quot;><p id=&quot;spara020&quot;>The 2021 guidelines primary panel selected clinically relevant questions and produced updated recommendations, on the basis of important new findings that have emerged since the 2016 guidelines. In patients with clinical atherosclerosis, abdominal aortic aneurysm, most patients with diabetes or chronic kidney disease, and those with low-density lipoprotein cholesterol ≥ 5 mmol/L, statin therapy continues to be recommended. We have introduced the concept of lipid/lipoprotein treatment thresholds for intensifying lipid-lowering therapy with nonstatin agents, and have identified the secondary prevention patients who have been shown to derive the largest benefit from intensification of therapy with these agents. For all other patients, we emphasize risk assessment linked to lipid/lipoprotein evaluation to optimize clinical decision-making. Lipoprotein(a) measurement is now recommended once in a patient&amp;#x27;s lifetime, as part of initial lipid screening to assess cardiovascular risk. For any patient with triglycerides ˃ 1.5 mmol/L, either non-high-density lipoprotein cholesterol or apolipoprotein B are the preferred lipid parameter for screening, rather than low-density lipoprotein cholesterol. We provide updated recommendations regarding the role of coronary artery calcium scoring as a clinical decision tool to aid the decision to initiate statin therapy. There are new recommendations on the preventative care of women with hypertensive disorders of pregnancy. Health behaviour modification, including regular exercise and a heart-healthy diet, remain the cornerstone of cardiovascular disease prevention. These guidelines are intended to provide a platform for meaningful conversation and shared-decision making between patient and care provider, so that individual decisions can be made for risk screening, assessment, and treatment.</p></div></div></div>" data-dcnode-id="11794" lang="en" name="citation_abstract"><span data-dcnode-id="11793" instrument_node="">
</span><meta content="Le panel principal responsable des lignes directrices 2021 a sélectionné des éléments cliniquement pertinents et a soumis des recommandations actualis…" data-dcnode-id="11792" property="og:description"><span data-dcnode-id="11791" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0015&quot; lang=&quot;fr&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Résumé</h2><div id=&quot;abss0002&quot;><p id=&quot;spara021&quot;>Le panel principal responsable des lignes directrices 2021 a sélectionné des éléments cliniquement pertinents et a soumis des recommandations actualisées, basées sur de nouvelles découvertes d&amp;#x27;importance apparues depuis les lignes directrices de 2016. Ainsi, le traitement par statine reste recommandé pour les patients atteints d&amp;#x27;athérosclérose clinique, d&amp;#x27;anévrisme de l&amp;#x27;aorte abdominale, pour la plupart des patients diabétiques ou atteints d&amp;#x27;insuffisance rénale chronique, et chez ceux dont le cholestérol à lipoprotéines de basse densité est ≥ 5 mmol/l. Nous avons introduit la notion de seuils pour le traitement des lipides/lipoprotéines afin d&amp;#x27;intensifier le traitement hypolipidémiant avec des agents non-statiniques, et nous avons identifié les patients en prévention secondaire distingués comme ayant tirer le plus grand bénéfice de l&amp;#x27;intensification du traitement avec ces agents. Pour tous les autres patients, nous mettons l&amp;#x27;accent sur l&amp;#x27;appréciation du risque par le biais de l&amp;#x27;évaluation des lipides/lipoprotéines afin d&amp;#x27;optimiser la prise de décision clinique. Le dosage de la lipoprotéine (a) est maintenant recommandé une fois dans la vie d&amp;#x27;un patient, dans le cadre du dépistage initial des lipides pour évaluer le risque cardiovasculaire. Pour tout patient présentant des taux de triglycérides ˃ 1,5 mmol/l, l&amp;#x27;apolipoprotéine B ou le cholestérol lié aux lipoprotéines autres que celles de haute densité sont les indices lipidiques à privilégier pour le dépistage, plutôt que le cholestérol à lipoprotéines de basse densité. Nous proposons des recommandations actualisées concernant le rôle du score calcique des artères coronaires en tant qu&amp;#x27;outil de décision clinique pour aider à la décision d&amp;#x27;administrer un traitement par statine. Il existe de nouvelles recommandations concernant les soins préventifs des femmes souffrant de troubles hypertensifs de la grossesse. Le changement de comportement en matière de santé, incluant l&amp;#x27;exercice physique régulier et une alimentation saine pour le coeur, reste la pierre angulaire de la prévention des maladies cardiovasculaires. Ces lignes directrices visent à fournir une plateforme pour une discussion constructive et une prise de décision partagée entre le patient et le prestataire de soins, afin que des décisions individuelles puissent être prises pour le dépistage, l&amp;#x27;évaluation et le traitement des risques.</p></div></div></div>" data-dcnode-id="11790" lang="fr" name="citation_abstract"><span data-dcnode-id="11789" instrument_node="">

7" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="10834"></section><section class="ReferencedArticles" data-dcnode-id="10833"></section><div class="PageDivider" data-dcnode-id="10832"></div><div class="Abstracts u-font-serif" data-dcnode-id="10819" id="abstracts"><div class="abstract author" data-dcnode-id="10826" id="abs0001"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10830"><span data-dcnode-id="10831" instrument_node="">Abstract</span></h2><div data-dcnode-id="10827" id="abss0001"><p data-dcnode-id="10828" id="spara020"><span data-dcnode-id="10829" instrument_node="">The 2021 guidelines primary panel selected clinically relevant questions and produced updated recommendations, on the basis of important new findings that have emerged since the 2016 guidelines. In patients with clinical atherosclerosis, abdominal aortic aneurysm, most patients with diabetes or chronic kidney disease, and those with low-density lipoprotein cholesterol ≥ 5 mmol/L, statin therapy continues to be recommended. We have introduced the concept of lipid/lipoprotein treatment thresholds for intensifying lipid-lowering therapy with nonstatin agents, and have identified the secondary prevention patients who have been shown to derive the largest benefit from intensification of therapy with these agents. For all other patients, we emphasize risk assessment linked to lipid/lipoprotein evaluation to optimize clinical decision-making. Lipoprotein(a) measurement is now recommended once in a patient's lifetime, as part of initial lipid screening to assess cardiovascular risk. For any patient with triglycerides ˃ 1.5 mmol/L, either non-high-density lipoprotein cholesterol or apolipoprotein B are the preferred lipid parameter for screening, rather than low-density lipoprotein cholesterol. We provide updated recommendations regarding the role of coronary artery calcium scoring as a clinical decision tool to aid the decision to initiate statin therapy. There are new recommendations on the preventative care of women with hypertensive disorders of pregnancy. Health behaviour modification, including regular exercise and a heart-healthy diet, remain the cornerstone of cardiovascular disease prevention. These guidelines are intended to provide a platform for meaningful conversation and shared-decision making between patient and care provider, so that individual decisions can be made for risk screening, assessment, and treatment.</span></p></div></div><div class="abstract author" data-dcnode-id="10820" id="abs0015" lang="fr"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10824"><span data-dcnode-id="10825" instrument_node="">Résumé</span></h2><div data-dcnode-id="10821" id="abss0002"><p data-dcnode-id="10822" id="spara021"><span data-dcnode-id="10823" instrument_node="">Le panel principal responsable des lignes directrices 2021 a sélectionné des éléments cliniquement pertinents et a soumis des recommandations actualisées, basées sur de nouvelles découvertes d'importance apparues depuis les lignes directrices de 2016. Ainsi, le traitement par statine reste recommandé pour les patients atteints d'athérosclérose clinique, d'anévrisme de l'aorte abdominale, pour la plupart des patients diabétiques ou atteints d'insuffisance rénale chronique, et chez ceux dont le cholestérol à lipoprotéines de basse densité est ≥ 5 mmol/l. Nous avons introduit la notion de seuils pour le traitement des lipides/lipoprotéines afin d'intensifier le traitement hypolipidémiant avec des agents non-statiniques, et nous avons identifié les patients en prévention secondaire distingués comme ayant tirer le plus grand bénéfice de l'intensification du traitement avec ces agents. Pour tous les autres patients, nous mettons l'accent sur l'appréciation du risque par le biais de l'évaluation des lipides/lipoprotéines afin d'optimiser la prise de décision clinique. Le dosage de la lipoprotéine (a) est maintenant recommandé une fois dans la vie d'un patient, dans le cadre du dépistage initial des lipides pour évaluer le risque cardiovasculaire. Pour tout patient présentant des taux de triglycérides ˃ 1,5 mmol/l, l'apolipoprotéine B ou le cholestérol lié aux lipoprotéines autres que celles de haute densité sont les indices lipidiques à privilégier pour le dépistage, plutôt que le cholestérol à lipoprotéines de basse densité. Nous proposons des recommandations actualisées concernant le rôle du score calcique des artères coronaires en tant qu'outil de décision clinique pour aider à la décision d'administrer un traitement par statine. Il existe de nouvelles recommandations concernant les soins préventifs des femmes souffrant de troubles hypertensifs de la grossesse. Le changement de comportement en matière de santé, incluant l'exercice physique régulier et une alimentation saine pour le coeur, reste la pierre angulaire de la prévention des maladies cardiovasculaires. Ces lignes directrices visent à fournir une plateforme pour une discussion constructive et une prise de décision partagée entre le patient et le prestataire de soins, afin que des décisions individuelles puissent être prises pour le dépistage, l'évaluation et le traitement des risques.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="10796" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="10808"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0828282X21003573"><svg class="icon icon-navigate-left" data-dcnode-id="10817" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="10818"></path></svg><span class="button-alternative-text" data-dcnode-id="10810"><strong data-dcnode-id="10815"><span data-dcnode-id="10816" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="10813"><span data-dcnode-id="10814" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="10811"><span data-dcnode-id="10812" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="10797"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0828282X21002191"><span class="button-alternative-text" data-dcnode-id="10801"><strong data-dcnode-id="10806"><span data-dcnode-id="10807" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="10804"><span data-dcnode-id="10805" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="10802"><span data-dcnode-id="10803" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="10799" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="10800"></path></svg></a></li></ul><span data-dcnode-id="10795" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="9029" id="body"><div data-dcnode-id="9057"><p data-dcnode-id="10780" id="para0005"><span data-dcnode-id="10794" instrument_node="">The 2021 Canadian Cardiovascular Society (CCS) dyslipidemia guidelines have been updated to reflect new clinical trial and epidemiologic evidence published since the previous guidelines in 2016.</span><a class="workspace-trigger" data-dcnode-id="10791" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10792"><span data-dcnode-id="10793" instrument_node="">1</span></sup></a><span data-dcnode-id="10790" instrument_node=""> The primary panel posed a number of population, intervention, comparator, and outcomes (PICO) questions to develop recommendations and inform clinical practice on the basis of a detailed literature review. The PICO format is a common standard used for guidelines development, to aid clinicians in determining whether the recommendations apply to their own patients with outcomes relevant to their practice. Initially, 13 different PICO questions were posed and then rated on the basis of the availability and significance of new evidence and importance to be included in the updated guidelines. The primary panel members voted on the initial 13 PICO questions formulated (see </span><a class="workspace-trigger" data-dcnode-id="10788" href="#sec0028" name="bsec0028"><span data-dcnode-id="10789" instrument_node="">Supplemental Appendix S1</span></a><span data-dcnode-id="10787" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="10785" href="#sec0028" name="bsec0028"><span data-dcnode-id="10786" instrument_node="">Supplemental Appendix S1, S2, S3</span></a><span data-dcnode-id="10784" instrument_node=""> etc. Please check throughout.?&gt;), resulting in the identification of 6 key PICO questions, which are included in this update. Using the Grading of Recommendations, Assessment, Development, and Evaluation (GRADE) standards, individual studies and composite literature were reviewed for each PICO question with regard to the quality of the available evidence and the presence of publication or interpretive bias. We have included the updated recommendations within this update, and the results of voting on each recommendation are shown in </span><a class="workspace-trigger" data-dcnode-id="10782" href="#sec0028" name="bsec0028"><span data-dcnode-id="10783" instrument_node="">Supplemental Appendix S2</span></a><span data-dcnode-id="10781" instrument_node="">. For recommendations to go forward a two-thirds voting majority was required. Individuals with conflicts of interest were recused from voting on relevant recommendations.</span></p><p data-dcnode-id="10775" id="para0006"><span data-dcnode-id="10779" instrument_node="">We have introduced the concept of “treatment thresholds” for intensifying lipid-lowering therapy with nonstatin lipid-lowering agents on the basis of new evidence with proprotein convertase subtilisin/kexin type 9 (PCSK9) inhibitors and icosapent ethyl (IPE). Because of the increased focus on apolipoprotein B (ApoB) and non-high-density lipoprotein cholesterol (HDL-C) in this update, values for ApoB and non-HDL-C have been modified (from previous versions of these guidelines) to accurately represent the same percentile equivalents as low-density lipoprotein (LDL) cholesterol (LDL-C) for all recommended thresholds (see </span><a class="workspace-trigger" data-dcnode-id="10777" href="#sec0028" name="bsec0028"><span data-dcnode-id="10778" instrument_node="">Supplemental Appendix S3</span></a><span data-dcnode-id="10776" instrument_node="">). The goal of the process was to produce an objective, nonbiased document on the basis of the best available evidence to allow clinicians and patients to make collaborative treatment decisions. These guidelines are not absolute, but are to be used in the context of one-on-one discussion between practitioner and patient and consideration of the patient's values and preferences. Dyslipidemia is an important risk factor for atherosclerotic cardiovascular (CV) disease (ASCVD), and these guidelines inform risk assessment, treatment, and surveillance options for at-risk populations. These guidelines were undertaken under the auspices of the Guideline Committee of the CCS without any support or involvement from outside groups, including industry.</span></p><section data-dcnode-id="10764" id="sec0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10773" id="cesectitle0004"><span data-dcnode-id="10774" instrument_node="">Definitions</span></h2><p data-dcnode-id="10771" id="para0007"><span data-dcnode-id="10772" instrument_node="">ASCVD refers to all clinical conditions of atherosclerotic origin, including acute coronary syndrome (ACS), myocardial infarction (MI), stable or unstable angina, coronary artery disease documented using angiography, coronary or other arterial revascularization (coronary artery bypass graft surgery, femoral popliteal bypass graft surgery, etc), stroke, transient ischemic attack, documented carotid disease, peripheral artery disease, and abdominal aortic aneurysm.</span></p><p data-dcnode-id="10769" id="para0008"><span data-dcnode-id="10770" instrument_node="">Statin-indicated condition refers to any condition for which pharmacotherapy with statins is indicated, and consists of all documented ASCVD conditions, as well as other high-risk primary prevention conditions in the absence of ASCVD, such as most patients with diabetes, those with chronic kidney disease (CKD), and those with an LDL-C ≥ 5.0 mmol/L or a diagnosis of familial hypercholesterolemia (FH). This concept was first introduced in the 2016 guidelines and continues to be used in this update.</span></p><p data-dcnode-id="10767" id="para0009"><span data-dcnode-id="10768" instrument_node="">Primary prevention refers to all efforts aimed at either populations or individuals to prevent or delay the onset of ASCVD.</span></p><p data-dcnode-id="10765" id="para0010"><span data-dcnode-id="10766" instrument_node="">Secondary prevention refers to the efforts to treat known, clinically significant ASCVD, and to prevent or delay the onset of disease manifestations.</span></p></section><section data-dcnode-id="10375" id="sec0002"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10762" id="cesectitle0005"><span data-dcnode-id="10763" instrument_node="">Overview of the Management of Dyslipidemia in Primary Prevention</span></h2><section data-dcnode-id="10585" id="sec0003"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10760" id="cesectitle0006"><span data-dcnode-id="10761" instrument_node="">Screening</span></h3><div data-dcnode-id="10586"><p data-dcnode-id="10724" id="para0011"><span data-dcnode-id="10759" instrument_node="">We determined that there was insufficient new evidence to recommend major changes to the approach of risk assessment in primary prevention. We continue to recommend lipid/lipoprotein screening (in either fasting or nonfasting state) for men and women older than 40 years of age or at any age with one of the specific conditions listed in </span><a class="workspace-trigger" data-dcnode-id="10757" href="#tbl0001" name="btbl0001"><span data-dcnode-id="10758" instrument_node="">Table 1</span></a><span data-dcnode-id="10756" instrument_node="">. The nonfasting state is recommended (except for individuals with known triglycerides &gt; 4.5 mmol/L) because it leads to minimal changes in relevant lipid levels and has no effect on apolipoprotein levels compared with the fasting state.</span><a class="workspace-trigger" data-dcnode-id="10753" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10754"><span data-dcnode-id="10755" instrument_node="">1</span></sup></a><span data-dcnode-id="10752" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="10750" href="#tbl0002" name="btbl0002"><span data-dcnode-id="10751" instrument_node="">Table 2</span></a><span data-dcnode-id="10749" instrument_node=""> provides a summary of the recommendations for how to screen patients. We maintain the recommendation for regular CV risk assessments using a validated risk model in Canada (either the </span><strong data-dcnode-id="10747"><span data-dcnode-id="10748" instrument_node="">F</span></strong><span data-dcnode-id="10746" instrument_node="">ramingham </span><strong data-dcnode-id="10744"><span data-dcnode-id="10745" instrument_node="">R</span></strong><span data-dcnode-id="10743" instrument_node="">isk </span><strong data-dcnode-id="10741"><span data-dcnode-id="10742" instrument_node="">S</span></strong><span data-dcnode-id="10740" instrument_node="">core [FRS] or the </span><strong data-dcnode-id="10738"><span data-dcnode-id="10739" instrument_node="">C</span></strong><span data-dcnode-id="10737" instrument_node="">ardiovascular </span><strong data-dcnode-id="10735"><span data-dcnode-id="10736" instrument_node="">L</span></strong><span data-dcnode-id="10734" instrument_node="">ife </span><strong data-dcnode-id="10732"><span data-dcnode-id="10733" instrument_node="">E</span></strong><span data-dcnode-id="10731" instrument_node="">xpectancy </span><strong data-dcnode-id="10729"><span data-dcnode-id="10730" instrument_node="">M</span></strong><span data-dcnode-id="10728" instrument_node="">odel [CLEM]) every 5 years for men and women aged 40-75 years to guide preventive care through shared decision-making with the patient. Among individuals 30-59 years of age without diabetes, the presence of a history of premature CV disease (CVD) in a first-degree relative (ie, 55 years or younger in male relatives and 65 years or younger in female relatives) increases an individual's calculated FRS percent risk by approximately twofold.</span><a class="workspace-trigger" data-dcnode-id="10725" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10726"><span data-dcnode-id="10727" instrument_node="">1</span></sup></a></p><div class="tables rowsep-0 colsep-0 frame-topbot" data-dcnode-id="10650" id="tbl0001"><span class="captions" data-dcnode-id="10716"><span data-dcnode-id="10717" id="cap0001"><p data-dcnode-id="10718" id="spara014"><span class="label" data-dcnode-id="10722"><span data-dcnode-id="10723" instrument_node="">Table 1</span></span><span data-dcnode-id="10721" instrument_node="">. </span><span data-dcnode-id="10719" instrument_node="">Who to screen for dyslipidemia in adults at risk</span></p></span></span><div class="groups" data-dcnode-id="10665"><table data-dcnode-id="10666"><thead data-dcnode-id="10712"><tr class="rowsep-1" data-dcnode-id="10713"><th class="align-left valign-top" data-dcnode-id="10714" id="en0001" scope="col"><span data-dcnode-id="10715" instrument_node="">Who to screen</span></th></tr></thead><tbody data-dcnode-id="10667"><tr data-dcnode-id="10668"><td class="align-left valign-top" data-dcnode-id="10669" id="en0002"><strong data-dcnode-id="10710"><span data-dcnode-id="10711" instrument_node="">Men 40 years of age or older; women 40 years of age or older (or postmenopausal)</span></strong><br data-dcnode-id="10709"><span data-dcnode-id="10708" instrument_node="">• Consider earlier in ethnic groups at increased risk such as South Asian or indigenous individuals</span><br data-dcnode-id="10707"><strong data-dcnode-id="10705"><span data-dcnode-id="10706" instrument_node="">All patients with any of the following conditions, regardless of age</span></strong><br data-dcnode-id="10704"><span data-dcnode-id="10703" instrument_node="">• Clinical evidence of atherosclerosis</span><br data-dcnode-id="10702"><span data-dcnode-id="10701" instrument_node="">• Abdominal aortic aneurysm</span><br data-dcnode-id="10700"><span data-dcnode-id="10699" instrument_node="">• Diabetes mellitus</span><br data-dcnode-id="10698"><span data-dcnode-id="10697" instrument_node="">• Arterial hypertension</span><br data-dcnode-id="10696"><span data-dcnode-id="10695" instrument_node="">• Current cigarette smoking</span><br data-dcnode-id="10694"><span data-dcnode-id="10693" instrument_node="">• Stigmata of dyslipidemia (corneal arcus, xanthelasma, xanthoma)</span><br data-dcnode-id="10692"><span data-dcnode-id="10691" instrument_node="">• Family history of premature CVD</span><a class="workspace-trigger" data-dcnode-id="10689" href="#tb1fn1" name="btb1fn1"><span data-dcnode-id="10690" instrument_node="">*</span></a><br data-dcnode-id="10688"><span data-dcnode-id="10687" instrument_node="">• Family history of dyslipidemia</span><br data-dcnode-id="10686"><span data-dcnode-id="10685" instrument_node="">• CKD (eGFR ≤ 60 mL/min/1.73 m</span><sup data-dcnode-id="10683"><span data-dcnode-id="10684" instrument_node="">2</span></sup><span data-dcnode-id="10682" instrument_node=""> or ACR ≥ 3 mg/mmol)</span><br data-dcnode-id="10681"><span data-dcnode-id="10680" instrument_node="">• Obesity (BMI ≥ 30)</span><br data-dcnode-id="10679"><span data-dcnode-id="10678" instrument_node="">• Inflammatory diseases (RA, SLE, PsA, AS, IBD)</span><br data-dcnode-id="10677"><span data-dcnode-id="10676" instrument_node="">• HIV infection</span><br data-dcnode-id="10675"><span data-dcnode-id="10674" instrument_node="">• Erectile dysfunction</span><br data-dcnode-id="10673"><span data-dcnode-id="10672" instrument_node="">• COPD</span><br data-dcnode-id="10671"><span data-dcnode-id="10670" instrument_node="">• History of hypertensive disorder of pregnancy</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="10662"></p><p data-dcnode-id="10663" id="spara015"><span data-dcnode-id="10664" instrument_node="">ACR, albumin-to-creatinine ratio; AS, ankylosing spondylitis; BMI, body mass index; CKD, chronic kidney disease; COPD, chronic obstructive pulmonary disease; CVD, cardiovascular disease; eGFR, estimated glomerular filtration rate; IBD, inflammatory bowel disease; PsA, psoriatic arthritis; RA, rheumatoid arthritis; SLE, systemic lupus erythematous.</span></p><p></p><dl class="footnotes" data-dcnode-id="10651"><dt data-dcnode-id="10660" id="tb1fn1"><span data-dcnode-id="10661" instrument_node="">⁎</span></dt><dd data-dcnode-id="10652"><p data-dcnode-id="10658" id="notep0006"><span data-dcnode-id="10659" instrument_node="">Men younger than 55 years of age and women younger than 65 years of age in first-degree relatives.</span></p><p data-dcnode-id="10653" id="notep0007"><span data-dcnode-id="10657" instrument_node="">Data from Anderson et al.</span><a class="workspace-trigger" data-dcnode-id="10654" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10655"><span data-dcnode-id="10656" instrument_node="">1</span></sup></a></p></dd></dl></div><div class="tables rowsep-0 colsep-0 frame-topbot" data-dcnode-id="10587" id="tbl0002"><span class="captions" data-dcnode-id="10642"><span data-dcnode-id="10643" id="cap0002"><p data-dcnode-id="10644" id="spara016"><span class="label" data-dcnode-id="10648"><span data-dcnode-id="10649" instrument_node="">Table 2</span></span><span data-dcnode-id="10647" instrument_node="">. </span><span data-dcnode-id="10645" instrument_node="">How to screen for dyslipidemia in adults at risk</span></p></span></span><div class="groups" data-dcnode-id="10602"><table data-dcnode-id="10603"><thead data-dcnode-id="10638"><tr class="rowsep-1" data-dcnode-id="10639"><th class="align-left valign-top" data-dcnode-id="10640" id="en0003" scope="col"><span data-dcnode-id="10641" instrument_node="">How to screen</span></th></tr></thead><tbody data-dcnode-id="10604"><tr data-dcnode-id="10605"><td class="align-left valign-top" data-dcnode-id="10606" id="en0004"><strong data-dcnode-id="10636"><span data-dcnode-id="10637" instrument_node="">For all</span></strong><br data-dcnode-id="10635"><span data-dcnode-id="10634" instrument_node=""> • History and physical examination</span><br data-dcnode-id="10633"><span data-dcnode-id="10632" instrument_node=""> • Standard lipid profile</span><a class="workspace-trigger" data-dcnode-id="10630" href="#tb2fn1" name="btb2fn1"><span data-dcnode-id="10631" instrument_node="">*</span></a><span data-dcnode-id="10629" instrument_node="">: TC, LDL-C, HDL-C, non-HDL-C,</span><a class="workspace-trigger" data-dcnode-id="10626" href="#tb2fn2" name="btb2fn2"><sup data-dcnode-id="10627"><span data-dcnode-id="10628" instrument_node="">†</span></sup></a><span data-dcnode-id="10625" instrument_node=""> TG</span><br data-dcnode-id="10624"><span data-dcnode-id="10623" instrument_node=""> • FPG or A1c</span><br data-dcnode-id="10622"><span data-dcnode-id="10621" instrument_node=""> • eGFR</span><br data-dcnode-id="10620"><span data-dcnode-id="10619" instrument_node=""> • Lipoprotein(a)—once in patient's lifetime, with initial screening</span><br data-dcnode-id="10618"><strong data-dcnode-id="10616"><span data-dcnode-id="10617" instrument_node="">Optional</span></strong><br data-dcnode-id="10615"><span data-dcnode-id="10614" instrument_node=""> • ApoB</span><br data-dcnode-id="10613"><span data-dcnode-id="10612" instrument_node=""> • Urine ACR (if eGFR &lt;60 mL/min/1.73 m</span><sup data-dcnode-id="10610"><span data-dcnode-id="10611" instrument_node="">2</span></sup><span data-dcnode-id="10609" instrument_node="">, hypertension, or diabetes</span><strong data-dcnode-id="10607"><span data-dcnode-id="10608" instrument_node="">)</span></strong></td></tr></tbody></table></div><p class="legend" data-dcnode-id="10599"></p><p data-dcnode-id="10600" id="spara017"><span data-dcnode-id="10601" instrument_node="">A1c, glycated hemoglobin; ACR, albumin-to-creatinine ratio; ApoB, Apolipoprotein B; eGFR, estimated glomerular filtration rate; FPG, fasting plasma glucose; HDL-C, high-density lipoprotein cholesterol; LDL-C, low-density lipoprotein cholesterol; TC, total cholesterol; TG, triglycerides.</span></p><p></p><dl class="footnotes" data-dcnode-id="10588"><dt data-dcnode-id="10597" id="tb2fn1"><span data-dcnode-id="10598" instrument_node="">⁎</span></dt><dd data-dcnode-id="10594"><p data-dcnode-id="10595" id="notep0009"><span data-dcnode-id="10596" instrument_node="">Nonfasting lipid testing is recommended in most adults for screening; however, for individuals with a history of triglyceride levels &gt; 4.5 mmol/L, measurement of fasting lipid levels are recommended.</span></p></dd><dt data-dcnode-id="10592" id="tb2fn2"><span data-dcnode-id="10593" instrument_node="">†</span></dt><dd data-dcnode-id="10589"><p data-dcnode-id="10590" id="notep0010"><span data-dcnode-id="10591" instrument_node="">It is now generally preferable to follow non-HDL-C or ApoB levels over LDL-C when interpreting lipid results, particularly when TG are ≥ 1.5 mmol/L.</span></p></dd></dl></div></div></section><section data-dcnode-id="10511" id="sec0004"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10583" id="cesectitle0007"><span data-dcnode-id="10584" instrument_node="">Health behaviour interventions</span></h3><p data-dcnode-id="10569" id="para0012"><span data-dcnode-id="10582" instrument_node="">Health behaviour modifications remain the cornerstone of chronic disease prevention, including CVD. Data from the INTERHEART study indicate that, in addition to the traditional risk factors (abnormal lipid levels, hypertension, smoking, and diabetes), abdominal obesity, dietary patterns, alcohol consumption, physical inactivity, and psychosocial factors are modifiable risk factors for MI worldwide in both sexes and at all ages.</span><a class="workspace-trigger" data-dcnode-id="10579" href="#bib0002" name="bbib0002"><sup data-dcnode-id="10580"><span data-dcnode-id="10581" instrument_node="">2</span></sup></a><span data-dcnode-id="10578" instrument_node=""> Evidence from other large prospective cohort studies have also shown that combining low-risk health behaviours that include achieving and maintaining a healthy body weight, consuming a healthy diet, engaging in regular physical activity, smoking cessation, limiting alcohol consumption to no more than moderate, and ensuring a sufficient duration of sleep are associated with benefit for the primary prevention of CVD.</span><a class="workspace-trigger" data-dcnode-id="10575" href="#bib0003" name="bbib0003"><sup data-dcnode-id="10576"><span data-dcnode-id="10577" instrument_node="">3</span></sup></a><sup data-dcnode-id="10573"><span data-dcnode-id="10574" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10570" href="#bib0004" name="bbib0004"><sup data-dcnode-id="10571"><span data-dcnode-id="10572" instrument_node="">4</span></sup></a></p><p data-dcnode-id="10522" id="para0013"><span data-dcnode-id="10568" instrument_node="">We continue to recommend a Mediterranean dietary pattern, which has evidence of CV outcome benefit in systematic reviews and meta-analyses. Additionally, other dietary patterns that share important features such as the Portfolio dietary pattern,</span><a class="workspace-trigger" data-dcnode-id="10565" href="#bib0005" name="bbib0005"><sup data-dcnode-id="10566"><span data-dcnode-id="10567" instrument_node="">5</span></sup></a><span data-dcnode-id="10564" instrument_node=""> Dietary Approaches to Stop Hypertension (DASH) dietary pattern,</span><a class="workspace-trigger" data-dcnode-id="10561" href="#bib0006" name="bbib0006"><sup data-dcnode-id="10562"><span data-dcnode-id="10563" instrument_node="">6</span></sup></a><span data-dcnode-id="10560" instrument_node=""> low-glycemic index/glycemic load dietary pattern,</span><a class="workspace-trigger" data-dcnode-id="10557" href="#bib0007" name="bbib0007"><sup data-dcnode-id="10558"><span data-dcnode-id="10559" instrument_node="">7</span></sup></a><span data-dcnode-id="10556" instrument_node=""> and plant-based dietary pattern,</span><a class="workspace-trigger" data-dcnode-id="10553" href="#bib0008" name="bbib0008"><sup data-dcnode-id="10554"><span data-dcnode-id="10555" instrument_node="">8</span></sup></a><span data-dcnode-id="10552" instrument_node=""> as well as dietary patterns high in nuts,</span><a class="workspace-trigger" data-dcnode-id="10549" href="#bib0009" name="bbib0009"><sup data-dcnode-id="10550"><span data-dcnode-id="10551" instrument_node="">9</span></sup></a><sup data-dcnode-id="10547"><span data-dcnode-id="10548" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10544" href="#bib0010" name="bbib0010"><sup data-dcnode-id="10545"><span data-dcnode-id="10546" instrument_node="">10</span></sup></a><span data-dcnode-id="10543" instrument_node=""> legumes,</span><a class="workspace-trigger" data-dcnode-id="10540" href="#bib0010" name="bbib0010"><sup data-dcnode-id="10541"><span data-dcnode-id="10542" instrument_node="">10</span></sup></a><span data-dcnode-id="10539" instrument_node=""> olive oil,</span><a class="workspace-trigger" data-dcnode-id="10536" href="#bib0009" name="bbib0009"><sup data-dcnode-id="10537"><span data-dcnode-id="10538" instrument_node="">9</span></sup></a><span data-dcnode-id="10535" instrument_node=""> fruits and vegetables,</span><a class="workspace-trigger" data-dcnode-id="10532" href="#bib0011" name="bbib0011"><sup data-dcnode-id="10533"><span data-dcnode-id="10534" instrument_node="">11</span></sup></a><span data-dcnode-id="10531" instrument_node=""> total fibre,</span><a class="workspace-trigger" data-dcnode-id="10528" href="#bib0012" name="bbib0012"><sup data-dcnode-id="10529"><span data-dcnode-id="10530" instrument_node="">12</span></sup></a><span data-dcnode-id="10527" instrument_node=""> and whole grains.</span><a class="workspace-trigger" data-dcnode-id="10524" href="#bib0013" name="bbib0013"><sup data-dcnode-id="10525"><span data-dcnode-id="10526" instrument_node="">13</span></sup></a><span data-dcnode-id="10523" instrument_node=""> Dietary therapy using these means can be considered to augment drug therapy with statins; however, their benefits have been shown in terms of surrogate CV measures such as blood pressure and lipoproteins.</span></p><p data-dcnode-id="10517" id="para0014"><span data-dcnode-id="10521" instrument_node="">We also continue to recommend that all adults should accumulate at least 150 minutes of moderate to vigorous aerobic activity per week. It might also be beneficial to add muscle- and bone-strengthening activities at least 2 days per week. Regular exercise has beneficial effects on diabetes risk, hypertension, and hypertriglyceridemia, and improves plasma levels of HDL-C.</span><a class="workspace-trigger" data-dcnode-id="10518" href="#bib0014" name="bbib0014"><sup data-dcnode-id="10519"><span data-dcnode-id="10520" instrument_node="">14</span></sup></a></p><p data-dcnode-id="10512" id="para0015"><span data-dcnode-id="10516" instrument_node="">A summary table of the expected CV outcomes and/or lipid benefits from various health behaviour changes is presented in </span><a class="workspace-trigger" data-dcnode-id="10514" href="#sec0028" name="bsec0028"><span data-dcnode-id="10515" instrument_node="">Supplemental Appendix S4</span></a><span data-dcnode-id="10513" instrument_node="">.</span></p></section><section data-dcnode-id="10427" id="sec0005"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10509" id="cesectitle0008"><span data-dcnode-id="10510" instrument_node="">Pharmacologic treatment</span></h3><p data-dcnode-id="10487" id="para0016"><span data-dcnode-id="10508" instrument_node="">Studies consistently show a 20%-22% relative risk reduction for each 1 mmol/L reduction in LDL-C.</span><a class="workspace-trigger" data-dcnode-id="10505" href="#bib0015" name="bbib0015"><sup data-dcnode-id="10506"><span data-dcnode-id="10507" instrument_node="">15</span></sup></a><span data-dcnode-id="10504" instrument_node=""> The absolute risk reduction is thus dependent on the baseline risk and the baseline LDL-C, because statin treatment will provide a greater absolute LDL-C lowering in those with higher baseline values. Therefore, we continue to recommend initiation of statin therapy for: (1) all high-risk patients (≥ 20% 10-year risk); or (2) intermediate-risk patients (10%-19.9%) when LDL-C is ≥ 3.5 mmol/L (or ApoB ≥ 1.05 g/L or non-HDL-C ≥ 4.2 mmol/L). In addition, among intermediate-risk individuals with several additional risk factors as evaluated in </span><strong data-dcnode-id="10502"><span data-dcnode-id="10503" instrument_node="">H</span></strong><span data-dcnode-id="10501" instrument_node="">eart </span><strong data-dcnode-id="10499"><span data-dcnode-id="10500" instrument_node="">O</span></strong><span data-dcnode-id="10498" instrument_node="">utcomes </span><strong data-dcnode-id="10496"><span data-dcnode-id="10497" instrument_node="">P</span></strong><span data-dcnode-id="10495" instrument_node="">revention </span><strong data-dcnode-id="10493"><span data-dcnode-id="10494" instrument_node="">E</span></strong><span data-dcnode-id="10492" instrument_node="">valuation (HOPE) 3</span><a class="workspace-trigger" data-dcnode-id="10489" href="#bib0016" name="bbib0016"><sup data-dcnode-id="10490"><span data-dcnode-id="10491" instrument_node="">16</span></sup></a><span data-dcnode-id="10488" instrument_node=""> (men 50 years of age or older or women 60 years of age or older with 1 additional risk factor including low HDL-C, impaired fasting glucose, increased waist circumference, cigarette smoking, hypertension) the evidence remains in favour of statin initiation to reduce the risk of CV events. The presence of other risk modifiers in intermediate-risk individuals also favours the use of statins (eg, high-sensitivity C-reactive protein ≥ 2.0 mmol/L, family history of premature coronary artery disease, high lipoprotein(a) [Lp(a)] ≥ 50 mg/dL [≥100 nmol/L] or coronary artery calcium score [CAC] &gt; 0 Agatston units [AU]).</span></p><div data-dcnode-id="10428"><p data-dcnode-id="10475" id="para0017"><span data-dcnode-id="10486" instrument_node="">For most low-risk subjects (FRS &lt; 10%), health behaviour modification without pharmacotherapy is still recommended; however, the exceptions would be: (1) low-risk individuals with an LDL-C ≥ 5.0 mmol/L (or ApoB ≥ 1.45 g/L or non-HDL-C ≥ 5.8 mmol/L) who have a statin-indicated condition (likely a genetic dyslipidemia such as FH); or (2) individuals with an FRS of 5%-9% with an LDL-C ≥ 3.5 mmol/L (or ApoB ≥ 1.05 g/L or non-HDL-C ≥ 4.2 mmol/L), especially with other CV risk modifiers (eg, family history of premature coronary artery disease, Lp(a) ≥ 50 mg/dL [or ≥ 100 nmol/L] or CAC &gt; 0 AU) because the proportional benefit from statin therapy will be similar to that in other treatment groups. Treatment of this group would follow the intermediate risk approach. The treatment approach recommended for primary prevention patients is outlined in </span><a class="workspace-trigger" data-dcnode-id="10484" href="#fig0001" name="bfig0001"><span data-dcnode-id="10485" instrument_node="">Figure 1</span></a><span data-dcnode-id="10483" instrument_node="">. Finally, evidence continues to show the benefits of maintaining low levels of atherogenic lipoproteins throughout life and at any age and any level of risk. Even among primary prevention individuals at low 10-year risk, the benefit of lipid-lowering can be substantial, especially when LDL-C ≥ 3.5 mmol/L.</span><a class="workspace-trigger" data-dcnode-id="10480" href="#bib0017" name="bbib0017"><sup data-dcnode-id="10481"><span data-dcnode-id="10482" instrument_node="">17</span></sup></a><span data-dcnode-id="10479" instrument_node=""> In addition, accumulating evidence suggests continued benefits of lipid-lowering for primary prevention in older adults (older than 75 years).</span><a class="workspace-trigger" data-dcnode-id="10476" href="#bib0018" name="bbib0018"><sup data-dcnode-id="10477"><span data-dcnode-id="10478" instrument_node="">18</span></sup></a></p><figure class="figure text-xs" data-dcnode-id="10429" id="fig0001"><span data-dcnode-id="10459"><img alt="Figure 1" aria-describedby="cap0004" data-dcnode-id="10474" height="847" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr1.jpg&amp;raw"><span data-dcnode-id="10473" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10460"><li data-dcnode-id="10467"><a class="anchor download-link u-font-sans" data-dcnode-id="10468" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr1_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="10469"><span data-dcnode-id="10472" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10470"><span data-dcnode-id="10471" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="10461"><a class="anchor download-link u-font-sans" data-dcnode-id="10462" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10463"><span data-dcnode-id="10466" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10464"><span data-dcnode-id="10465" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10430"><span data-dcnode-id="10431" id="cap0004"><p data-dcnode-id="10432" id="spara001"><span class="label" data-dcnode-id="10457"><span data-dcnode-id="10458" instrument_node="">Figure 1</span></span><span data-dcnode-id="10456" instrument_node="">. </span><span data-dcnode-id="10454" instrument_node="">Treatment approach for primary prevention patients (without a statin-indicated condition*). Statin-indicated conditions consist of all documented ASCVD conditions, as well as other high-risk primary prevention conditions in the absence of ASCVD, such as most patients with diabetes, those with chronic kidney disease, and those with an LDL-C ≥ 5.0 mmol/L. Screening should be repeated every 5 years for men and women aged 40-75 years using the modified FRS or </span><strong data-dcnode-id="10452"><span data-dcnode-id="10453" instrument_node="">C</span></strong><span data-dcnode-id="10451" instrument_node="">ardiovascular </span><strong data-dcnode-id="10449"><span data-dcnode-id="10450" instrument_node="">L</span></strong><span data-dcnode-id="10448" instrument_node="">ife </span><strong data-dcnode-id="10446"><span data-dcnode-id="10447" instrument_node="">E</span></strong><span data-dcnode-id="10445" instrument_node="">xpectancy </span><strong data-dcnode-id="10443"><span data-dcnode-id="10444" instrument_node="">M</span></strong><span data-dcnode-id="10442" instrument_node="">odel (CLEM) to guide therapy to reduce major CV events. A risk assessment might also be completed whenever a patient's expected risk status changes. ApoB, apolipoprotein B; ASCVD, atherosclerotic cardiovascular disease; AU, Agatston units; BAS, bile acid sequestrant; CAC, coronary artery calcium; CAD, coronary artery disease; CV, cardiovascular; FHx, family history; HDL-C, high-density lipoprotein cholesterol; hsCRP, high-sensitivity C-reactive protein; HTN, hypertension; FRS, </span><strong data-dcnode-id="10440"><span data-dcnode-id="10441" instrument_node="">F</span></strong><span data-dcnode-id="10439" instrument_node="">ramingham </span><strong data-dcnode-id="10437"><span data-dcnode-id="10438" instrument_node="">R</span></strong><span data-dcnode-id="10436" instrument_node="">isk </span><strong data-dcnode-id="10434"><span data-dcnode-id="10435" instrument_node="">S</span></strong><span data-dcnode-id="10433" instrument_node="">core; IFG, impaired fasting glucose; LDL-C, low-density lipoprotein cholesterol; Lp(a), lipoprotein(a); mins, minutes; Rx, treatment; yrs, years. * Calculate risk using the FRS—refer to the iCCS available on the App Store or on Google Play.</span></p></span></span></figure></div></section><section data-dcnode-id="10381" id="sec0006"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10425" id="cesectitle0009"><span data-dcnode-id="10426" instrument_node="">Other statin-indicated conditions</span></h3><div data-dcnode-id="10387"><p data-dcnode-id="10413" id="para0018"><span data-dcnode-id="10424" instrument_node="">We continue to recommend statin initiation for the following high-risk conditions (ie, “statin-indicated” conditions, even in the absence of a previous CV event: (1) CKD (except for patients receiving chronic dialysis) defined as patients with an estimated glomerular filtration rate &lt; 60 mL/min/1.73 m</span><sup data-dcnode-id="10422"><span data-dcnode-id="10423" instrument_node="">2</span></sup><span data-dcnode-id="10421" instrument_node=""> and those with preserved estimated glomerular filtration rate in whom CKD is on the basis of an increased urinary albumin to creatinine ratio (≥ 3 mg/mmol) for at least 3 months’ duration; (2) diabetes mellitus in patients 40 years of age or older or 30 years of age or older with 15 or more years’ duration of diabetes, or the presence of microvascular complications; (3) abdominal aortic aneurysm &gt; 3.0 cm or previous aortic aneurysm surgery.</span><a class="workspace-trigger" data-dcnode-id="10418" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10419"><span data-dcnode-id="10420" instrument_node="">1</span></sup></a><span data-dcnode-id="10417" instrument_node=""> Established ASCVD is also a statin-indicated condition, which is discussed in more detail later in these guidelines. The treatment approach for patients with a statin-indicated condition is summarized in </span><a class="workspace-trigger" data-dcnode-id="10415" href="#fig0002" name="bfig0002"><span data-dcnode-id="10416" instrument_node="">Figure 2</span></a><span data-dcnode-id="10414" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="10388" id="fig0002"><span data-dcnode-id="10397"><img alt="Figure 2" aria-describedby="cap0005" data-dcnode-id="10412" height="847" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr2.jpg&amp;raw"><span data-dcnode-id="10411" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10398"><li data-dcnode-id="10405"><a class="anchor download-link u-font-sans" data-dcnode-id="10406" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr2_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="10407"><span data-dcnode-id="10410" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10408"><span data-dcnode-id="10409" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="10399"><a class="anchor download-link u-font-sans" data-dcnode-id="10400" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10401"><span data-dcnode-id="10404" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10402"><span data-dcnode-id="10403" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10389"><span data-dcnode-id="10390" id="cap0005"><p data-dcnode-id="10391" id="spara002"><span class="label" data-dcnode-id="10395"><span data-dcnode-id="10396" instrument_node="">Figure 2</span></span><span data-dcnode-id="10394" instrument_node="">. </span><span data-dcnode-id="10392" instrument_node="">Treatment approach for patients with a statin-indicated condition. ABI, ankle-brachial index; ACR, albumin to creatinine; ApoB, apolipoprotein B; ASCVD, atherosclerotic cardiovascular disease; CVD, cardiovascular disease; HDL-C, high-density lipoprotein cholesterol; LDL-C, low-density lipoprotein cholesterol; PCSK9, proprotein convertase subtilisin/kexin type 9; Rx, treatment; TIA, transient ischemic attack.</span></p></span></span></figure></div><p data-dcnode-id="10382" id="para0019"><span data-dcnode-id="10386" instrument_node="">All of the recommendations from the previous dyslipidemia guidelines that remain unchanged are provided in </span><a class="workspace-trigger" data-dcnode-id="10384" href="#sec0028" name="bsec0028"><span data-dcnode-id="10385" instrument_node="">Supplemental Appendix S5</span></a><span data-dcnode-id="10383" instrument_node="">.</span></p></section><section data-dcnode-id="10376" id="sec0007"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10379" id="cesectitle0010"><span data-dcnode-id="10380" instrument_node="">New areas of focus</span></h3><p data-dcnode-id="10377" id="para0020"><span data-dcnode-id="10378" instrument_node="">The review of literature and evidence assessment identified several areas for new and/or updated recommendations for primary prevention, specifically in: (1) the preventive care of women with hypertensive disorders of pregnancy; (2) the importance of lipoprotein measurement including non-HDL-C, ApoB, and Lp(a) in assessing CV risk; (3) the role of CAC as a clinical decision-making tool for determining the need to initiate statin treatment; (4) the CV benefit of IPE in patients with triglycerides ≥ 1.5-5.6 mmol/L and a previous CV event or with diabetes and additional risk factors; and (5) the lack of CV benefit of omega-3 fatty acids from dietary sources or other formulations/supplements.</span></p></section></section><section data-dcnode-id="10348" id="sec0008"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10373" id="cesectitle0011"><span data-dcnode-id="10374" instrument_node="">Overview of the Management of Dyslipidemia in Secondary Prevention</span></h2><section data-dcnode-id="10354" id="sec0009"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10371" id="cesectitle0012"><span data-dcnode-id="10372" instrument_node="">Health behaviour interventions</span></h3><p data-dcnode-id="10360" id="para0021"><span data-dcnode-id="10370" instrument_node="">We continue to recommend health behaviour interventions to optimize CV health in all patients with a previous ASCVD event (refer to the </span><em data-dcnode-id="10368"><span data-dcnode-id="10369" instrument_node="">Health behaviour interventions</span></em><span data-dcnode-id="10367" instrument_node=""> in the section on </span><em data-dcnode-id="10365"><span data-dcnode-id="10366" instrument_node="">Overview of the Management of Dyslipidemia in Primary Prevention</span></em><span data-dcnode-id="10364" instrument_node="">). In secondary prevention, limiting sedentary behaviour can be additive to regular physical activity with respect to the reduction of ASCVD events. A certified exercise physiologist might be of value to provide advice and follow-up. Cardiac rehabilitation has been clearly shown to be of benefit in this patient population and remains a cornerstone of management.</span><a class="workspace-trigger" data-dcnode-id="10361" href="#bib0019" name="bbib0019"><sup data-dcnode-id="10362"><span data-dcnode-id="10363" instrument_node="">19</span></sup></a></p><p data-dcnode-id="10355" id="para0022"><span data-dcnode-id="10359" instrument_node="">Relevant recommendations from the previous dyslipidemia guidelines that remain unchanged are provided in </span><a class="workspace-trigger" data-dcnode-id="10357" href="#sec0028" name="bsec0028"><span data-dcnode-id="10358" instrument_node="">Supplemental Appendix S5</span></a><span data-dcnode-id="10356" instrument_node="">.</span></p></section><section data-dcnode-id="10349" id="sec0010"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10352" id="cesectitle0013"><span data-dcnode-id="10353" instrument_node="">New areas of focus</span></h3><p data-dcnode-id="10350" id="para0023"><span data-dcnode-id="10351" instrument_node="">Several areas were reviewed by our group that directly affect the care and management of patients with previous ASCVD events and have led to new or updated recommendations, specifically: (1) the role of nonstatin therapies to reduce ASCVD events; (2) the most appropriate lipid/lipoprotein threshold for the intensification of therapy in the management of dyslipidemia; and (3) the lack of CV benefit of omega-3 fatty acids from dietary sources or other formulations/supplements.</span></p></section></section><section data-dcnode-id="9068" id="sec0011"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10346" id="cesectitle0014"><span data-dcnode-id="10347" instrument_node="">PICO Questions, Evidence Review, and New Recommendations</span></h2><section data-dcnode-id="10232" id="sec0012"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10344" id="cesectitle0015"><span data-dcnode-id="10345" instrument_node="">PICO 1: Do pregnancy-related conditions (hypertensive disorders of pregnancy and other related complications) identify women at increased risk of premature CVD warranting lipid screening?</span></h3><p data-dcnode-id="10309" id="para0024"><span data-dcnode-id="10343" instrument_node="">Pregnancy complications such as preeclampsia and related hypertensive disorders of pregnancy, gestational diabetes, placental abruption, preterm delivery, stillbirth, and delivery of a low birth weight infant are associated with a higher lifetime risk of developing CV risk factors (hypertension; type 2 diabetes mellitus; dyslipidemia, especially hypertriglyceridemia and low HDL-C; metabolic syndrome; and subclinical atherosclerosis) and overt ASCVD.</span><a class="workspace-trigger" data-dcnode-id="10340" href="#bib0020" name="bbib0020"><sup data-dcnode-id="10341"><span data-dcnode-id="10342" instrument_node="">20</span></sup></a><sup data-dcnode-id="10338"><span data-dcnode-id="10339" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10335" href="#bib0021" name="bbib0021"><sup data-dcnode-id="10336"><span data-dcnode-id="10337" instrument_node="">21</span></sup></a><span data-dcnode-id="10334" instrument_node=""> The strongest and most abundant evidence linking pregnancy events and ASCVD is for preeclampsia, in which there is a twofold relative risk of developing premenopausal ASCVD, with onset at 10-15 years after delivery</span><a class="workspace-trigger" data-dcnode-id="10331" href="#bib0020" name="bbib0020"><sup data-dcnode-id="10332"><span data-dcnode-id="10333" instrument_node="">20</span></sup></a><span data-dcnode-id="10330" instrument_node=""> compared with women who had uncomplicated pregnancies. This risk is highest if preeclampsia is recurrent (ie, 28% lifetime risk of ASCVD, or within 25 years after delivery</span><a class="workspace-trigger" data-dcnode-id="10327" href="#bib0022" name="bbib0022"><sup data-dcnode-id="10328"><span data-dcnode-id="10329" instrument_node="">22</span></sup></a><span data-dcnode-id="10326" instrument_node="">), or if associated with preterm delivery (before 37 weeks’ gestation) and other adverse conditions (chest pain, dyspnea, low platelet count, elevated liver enzymes, intrauterine growth restriction) or severe complications (eclampsia, stroke, myocardial ischemia, hepatic rupture, acute kidney injury with need for hemodialysis).</span><a class="workspace-trigger" data-dcnode-id="10323" href="#bib0023" name="bbib0023"><sup data-dcnode-id="10324"><span data-dcnode-id="10325" instrument_node="">23</span></sup></a><span data-dcnode-id="10322" instrument_node=""> ASCVD risk is partly mediated by the development of chronic hypertension and metabolic syndrome.</span><a class="workspace-trigger" data-dcnode-id="10319" href="#bib0024" name="bbib0024"><sup data-dcnode-id="10320"><span data-dcnode-id="10321" instrument_node="">24</span></sup></a><span data-dcnode-id="10318" instrument_node=""> There is often silent and subclinical endothelial dysfunction after hypertensive disorders of pregnancy suggesting accelerated vascular aging.</span><a class="workspace-trigger" data-dcnode-id="10315" href="#bib0025" name="bbib0025"><sup data-dcnode-id="10316"><span data-dcnode-id="10317" instrument_node="">25</span></sup></a><sup data-dcnode-id="10313"><span data-dcnode-id="10314" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10310" href="#bib0026" name="bbib0026"><sup data-dcnode-id="10311"><span data-dcnode-id="10312" instrument_node="">26</span></sup></a></p><p data-dcnode-id="10291" id="para0025"><span data-dcnode-id="10308" instrument_node="">National CV societies,</span><a class="workspace-trigger" data-dcnode-id="10305" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10306"><span data-dcnode-id="10307" instrument_node="">1</span></sup></a><sup data-dcnode-id="10303"><span data-dcnode-id="10304" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10300" href="#bib0027" name="bbib0027"><sup data-dcnode-id="10301"><span data-dcnode-id="10302" instrument_node="">27</span></sup></a><span data-dcnode-id="10299" instrument_node=""> including the CCS,</span><a class="workspace-trigger" data-dcnode-id="10296" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10297"><span data-dcnode-id="10298" instrument_node="">1</span></sup></a><span data-dcnode-id="10295" instrument_node=""> have recommended performing lipid and metabolic screening in postpartum women who have had these complications, although whether specific thresholds warranting pharmacotherapy differ from those typically used in the general population is not known. Although it is true that these women have a low absolute risk of ASCVD over the short term, the postpartum period might represent “a teachable moment” to engage young women in CV prevention and might result in long-term benefits through health behaviour interventions with or without pharmacological intervention. Treatment decisions should be guided on the basis of lifetime risk in conjunction with patient values and preferences.</span><a class="workspace-trigger" data-dcnode-id="10292" href="#bib0029" name="bbib0029"><sup data-dcnode-id="10293"><span data-dcnode-id="10294" instrument_node="">28</span></sup></a></p><p data-dcnode-id="10233" id="para9001"><span class="display" data-dcnode-id="10234"></span></p><div aria-label="Unlabelled box" class="article-textbox" data-dcnode-id="10235" id="tbox0002" role="region"><span data-dcnode-id="10288" id="tbcap1"><p data-dcnode-id="10289" id="spara022"><span data-dcnode-id="10290" instrument_node="">RECOMMENDATION</span></p></span><div data-dcnode-id="10236"><p data-dcnode-id="10271" id="para9002"></p><dl class="list" data-dcnode-id="10272"><dt class="list-label" data-dcnode-id="10286"><span data-dcnode-id="10287" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="10283"><p data-dcnode-id="10284" id="para0026"><span data-dcnode-id="10285" instrument_node="">Among women who have had a pregnancy complication such as hypertensive disorders of pregnancy, gestational diabetes, preterm birth, stillbirth, low birth weight infant, or placental abruption, we recommend screening with a complete lipid panel in the late postpartum period, because these women have a higher risk of premature CVD and stroke with onset 10-15 years after index delivery (Strong Recommendation; Moderate-Quality Evidence).</span></p></dd><dt class="list-label" data-dcnode-id="10281"><span data-dcnode-id="10282" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="10278"><p data-dcnode-id="10279" id="para0027"><span data-dcnode-id="10280" instrument_node="">We recommend counselling women who have any of these pregnancy-related complications of the increased lifetime risk of ASCVD, and reinforcing the importance of healthy behaviours (ie, maintaining a healthy body weight, 150 weekly minutes of moderate intensity aerobic physical activity, avoiding tobacco consumption, no more than moderate alcohol consumption, stress management, and adopting a healthy dietary pattern, such as the Mediterranean diet (Strong Recommendation; Low-Quality Evidence).</span></p></dd><dt class="list-label" data-dcnode-id="10276"><span data-dcnode-id="10277" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="10273"><p data-dcnode-id="10274" id="para0028"><span data-dcnode-id="10275" instrument_node="">To assist with decisions about lipid-lowering pharmacotherapy in this patient population, we recommend favouring CV age, over 10-year risk calculators (Strong Recommendation; Low-Quality Evidence).</span></p></dd></dl><p></p><p data-dcnode-id="10267" id="para0029"><strong data-dcnode-id="10269"><span data-dcnode-id="10270" instrument_node="">Values and preferences.</span></strong><span data-dcnode-id="10268" instrument_node=""> Although much of this observed risk among women who have had a pregnancy-related complication might be due to conventional ASCVD risk factors, complications such as preeclampsia might lead to ASCVD through accelerated vascular aging or other pathways warranting additional future research.</span></p><p data-dcnode-id="10261" id="para0030"><span data-dcnode-id="10266" instrument_node="">There is insufficient evidence to guide decisions about use of lipid-lowering therapy in women on the basis of pregnancy factors alone. The American Heart Association 2019 CV prevention guidelines</span><a class="workspace-trigger" data-dcnode-id="10263" href="#bib0027" name="bbib0027"><sup data-dcnode-id="10264"><span data-dcnode-id="10265" instrument_node="">27</span></sup></a><span data-dcnode-id="10262" instrument_node=""> consider preeclampsia a risk enhancer warranting early screening, healthy behaviour interventions, and possibly shifting of risk category from borderline to intermediate risk (ie, eligible for statin or other lipid-lowering therapy).</span></p><p data-dcnode-id="10237" id="para0031"><span data-dcnode-id="10260" instrument_node="">We suggest individual discussions about statin or other lipid-lowering pharmacotherapy, considering each patient's lifetime risk/individual risk factors along with severity and recurrence of pregnancy complications (in particular preterm preeclampsia with adverse conditions), balanced against the potential side effects and harms of long-term therapy. Although statins were previously considered teratogenic on the basis of earlier animal studies, this has not been consistently shown in recent human studies.</span><a class="workspace-trigger" data-dcnode-id="10257" href="#bib0030" name="bbib0030"><sup data-dcnode-id="10258"><span data-dcnode-id="10259" instrument_node="">29</span></sup></a><sup data-dcnode-id="10255"><span data-dcnode-id="10256" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10252" href="#bib0031" name="bbib0031"><sup data-dcnode-id="10253"><span data-dcnode-id="10254" instrument_node="">30</span></sup></a><span data-dcnode-id="10251" instrument_node=""> A part of the observed increase in risk of congenital malformations might be due to underlying medical conditions rather than treatment with statin therapy itself.</span><a class="workspace-trigger" data-dcnode-id="10248" href="#bib0030" name="bbib0030"><sup data-dcnode-id="10249"><span data-dcnode-id="10250" instrument_node="">29</span></sup></a><span data-dcnode-id="10247" instrument_node=""> Furthermore, there appears to be a differential effect on the basis of the type of compound, with most cases of congenital malformations being seen among infants whose mothers took lipophilic compounds (eg, atorvastatin, lovastatin, simvastatin) as opposed to hydrophilic compounds (eg, pravastatin, rosuvastatin).</span><a class="workspace-trigger" data-dcnode-id="10244" href="#bib0032" name="bbib0032"><sup data-dcnode-id="10245"><span data-dcnode-id="10246" instrument_node="">31</span></sup></a><sup data-dcnode-id="10242"><span data-dcnode-id="10243" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10239" href="#bib0033" name="bbib0033"><sup data-dcnode-id="10240"><span data-dcnode-id="10241" instrument_node="">32</span></sup></a><span data-dcnode-id="10238" instrument_node=""> Therefore, in women who are reproductive age and who are eligible and considering statin therapy for ASCVD risk reduction on the basis of CV age or lifetime risk of ASCVD, we suggest the use of hydrophilic compounds over lipophilic compounds because of easier passage through the placenta with the latter molecules. It should be noted that for most reproductive women who take statin therapy for primary prevention of ASCVD, an effective birth control method is recommended with interruption of therapy before a planned pregnancy or at the time of an unplanned positive pregnancy test. These treatments can be resumed after delivery, when breastfeeding is completed. Referral to a specialist in obstetrical medicine or in fetal-maternal medicine should also be considered in the management of statin and nonstatin therapies in pregnant women or in women planning pregnancy.</span></p></div></div><p></p></section><section data-dcnode-id="10188" id="sec0013"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10230" id="cesectitle0017"><span data-dcnode-id="10231" instrument_node="">PICO 2a: Is there evidence to promote non-HDL-C over ApoB or ApoB over non-HDL-C for screening and treatment purposes?</span></h3><p data-dcnode-id="10189" id="para0032"><span data-dcnode-id="10229" instrument_node="">Previous versions of these guidelines have used LDL-C as the primary laboratory measurement for considering initiation of statin treatment and as a treatment target in low-, intermediate-, and high-risk individuals. Beginning with the 2012 guidelines, it has been recommended that non-HDL-C and ApoB could be used as alternate targets to LDL-C in any individual with triglyceride level &gt; 1.5 mmol/L.</span><a class="workspace-trigger" data-dcnode-id="10226" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10227"><span data-dcnode-id="10228" instrument_node="">1</span></sup></a><sup data-dcnode-id="10224"><span data-dcnode-id="10225" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10221" href="#bib0034" name="bbib0034"><sup data-dcnode-id="10222"><span data-dcnode-id="10223" instrument_node="">33</span></sup></a><span data-dcnode-id="10220" instrument_node=""> The rationale for this is that above this level of triglyceride, some cholesterol in LDL particles is replaced by triglyceride, which promotes production of more atherogenic small dense LDL particles,</span><a class="workspace-trigger" data-dcnode-id="10217" href="#bib0035" name="bbib0035"><sup data-dcnode-id="10218"><span data-dcnode-id="10219" instrument_node="">34</span></sup></a><span data-dcnode-id="10216" instrument_node=""> and makes the amount of cholesterol in LDL-C an unreliable reflection of LDL particle number.</span><a class="workspace-trigger" data-dcnode-id="10213" href="#bib0036" name="bbib0036"><sup data-dcnode-id="10214"><span data-dcnode-id="10215" instrument_node="">35</span></sup></a><span data-dcnode-id="10212" instrument_node=""> In addition, other particles, such as remnants of chylomicrons and very LDL-C, as well as Lp(a), all accumulate in the artery wall and contribute to atherogenesis, whereas HDL-C does not. Therefore, estimation of the concentration of all atherogenic particles requires a broader focus than a measurement of LDL-C. Non-HDL-C (indirectly) and ApoB (directly) provide a more accurate assessment of the total concentration of atherogenic particles than LDL-C. Non-HDL-C and ApoB are, for this reason, both better predictors of CV event risk and benefit of lipid-lowering therapy compared with LDL-C.</span><a class="workspace-trigger" data-dcnode-id="10209" href="#bib0037" name="bbib0037"><sup data-dcnode-id="10210"><span data-dcnode-id="10211" instrument_node="">36</span></sup></a><sup data-dcnode-id="10207"><span data-dcnode-id="10208" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10204" href="#bib0038" name="bbib0038"><sup data-dcnode-id="10205"><span data-dcnode-id="10206" instrument_node="">37</span></sup></a><span data-dcnode-id="10203" instrument_node=""> On the basis of these previous recommendations, non-HDL-C is now routinely reported across Canada at no additional cost, on the basis of the simple calculation of total cholesterol minus HDL-C. ApoB is also available as an insured laboratory test in all provinces except Ontario. Levels of non-HDL-C and ApoB are not significantly changed in the postprandial state in individuals with triglycerides &lt; 4.5 mmol/L, whereas LDL-C can be lowered by up to 10% because of triglyceride enrichment of LDL-C.</span><a class="workspace-trigger" data-dcnode-id="10200" href="#bib0039" name="bbib0039"><sup data-dcnode-id="10201"><span data-dcnode-id="10202" instrument_node="">38</span></sup></a><sup data-dcnode-id="10198"><span data-dcnode-id="10199" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10195" href="#bib0040" name="bbib0040"><sup data-dcnode-id="10196"><span data-dcnode-id="10197" instrument_node="">39</span></sup></a><span data-dcnode-id="10194" instrument_node=""> After the guideline recommendation that was introduced in 2016 allowing for nonfasting collections for screening and follow-up lipid testing,</span><a class="workspace-trigger" data-dcnode-id="10191" href="#bib0001" name="bbib0001"><sup data-dcnode-id="10192"><span data-dcnode-id="10193" instrument_node="">1</span></sup></a><span data-dcnode-id="10190" instrument_node=""> it is now generally preferable to follow non-HDL-C or ApoB levels over LDL-C when interpreting lipid results, particularly when triglyceride levels are ≥ 1.5 mmol/L. A recent survey conducted by the Canadian Association of Medical Biochemists and the Canadian Society of Clinical Chemistry indicates that patients across Canada can now present to laboratories nonfasting and receive a complete lipid profile.</span></p></section><section data-dcnode-id="10140" id="sec0014"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10186" id="cesectitle0018"><span data-dcnode-id="10187" instrument_node="">Non-HDL-C or ApoB for predicting CVD risk</span></h3><p data-dcnode-id="10155" id="para0033"><span data-dcnode-id="10185" instrument_node="">In population studies, non-HDL-C and ApoB can be considered as equivalent markers of total atherogenic lipoproteins and lipid-related CV risk and this applies to most individuals.</span><a class="workspace-trigger" data-dcnode-id="10182" href="#bib0041" name="bbib0041"><sup data-dcnode-id="10183"><span data-dcnode-id="10184" instrument_node="">40</span></sup></a><span data-dcnode-id="10181" instrument_node=""> Publications since the 2016 update of these guidelines indicate a subgroup of individuals, estimated at between 8% and 23%, have discordance between ApoB and non-HDL-C levels in whom ApoB might be the better predictor of risk for coronary calcification</span><a class="workspace-trigger" data-dcnode-id="10178" href="#bib0041" name="bbib0041"><sup data-dcnode-id="10179"><span data-dcnode-id="10180" instrument_node="">40</span></sup></a><span data-dcnode-id="10177" instrument_node=""> and ASCVD events.</span><a class="workspace-trigger" data-dcnode-id="10174" href="#bib0042" name="bbib0042"><sup data-dcnode-id="10175"><span data-dcnode-id="10176" instrument_node="">41</span></sup></a><span data-dcnode-id="10173" instrument_node=""> Analysis of CV events in the large United Kingdom Biobank,</span><a class="workspace-trigger" data-dcnode-id="10170" href="#bib0042" name="bbib0042"><sup data-dcnode-id="10171"><span data-dcnode-id="10172" instrument_node="">41</span></sup></a><span data-dcnode-id="10169" instrument_node=""> and meta-analysis of 110 prospective cohort registries of patients with or at risk for ASCVD,</span><a class="workspace-trigger" data-dcnode-id="10166" href="#bib0043" name="bbib0043"><sup data-dcnode-id="10167"><span data-dcnode-id="10168" instrument_node="">42</span></sup></a><span data-dcnode-id="10165" instrument_node=""> however, showed an overall similar ability of non-HDL-C and ApoB to predict risk, but confirmed both of these measures to be superior to LDL-C. Recent consensus statements have concluded that non-HDL-C is currently a more practical choice because it incurs no additional expense to the patient or health care system.</span><a class="workspace-trigger" data-dcnode-id="10162" href="#bib0044" name="bbib0044"><sup data-dcnode-id="10163"><span data-dcnode-id="10164" instrument_node="">43</span></sup></a><sup data-dcnode-id="10160"><span data-dcnode-id="10161" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10157" href="#bib0045" name="bbib0045"><sup data-dcnode-id="10158"><span data-dcnode-id="10159" instrument_node="">44</span></sup></a><span data-dcnode-id="10156" instrument_node=""> In Canada, the approach has been to allow clinicians to use either non-HDL-C or ApoB as their preferred parameter for assessment of risk and achievement of treatment targets, depending on their comfort level with the two measurements, availability of ApoB testing in their region, and when there might be a concern about discordance between the two measurements, as indicated previously. In the current guidelines, we are continuing this recommendation, while strongly urging the routine use of either non-HDL-C or ApoB instead of LDL-C as the lipid level of interest in initial lipid screening and as a treatment target in all patients with triglyceride level &gt; 1.5 mmol/L.</span></p><p data-dcnode-id="10141" id="para9003"><span class="display" data-dcnode-id="10142"></span></p><div aria-label="Unlabelled box" class="article-textbox" data-dcnode-id="10143" id="tbox0003" role="region"><span data-dcnode-id="10152" id="tbcap2"><p data-dcnode-id="10153" id="spara023"><span data-dcnode-id="10154" instrument_node="">RECOMMENDATION</span></p></span><div data-dcnode-id="10144"><p data-dcnode-id="10145" id="para0034"></p><dl class="list" data-dcnode-id="10146"><dt class="list-label" data-dcnode-id="10150"><span data-dcnode-id="10151" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="10147"><p data-dcnode-id="10148" id="para0035"><span data-dcnode-id="10149" instrument_node="">We recommend that for any patient with triglycerides &gt; 1.5 mmol/L, non-HDL-C or ApoB be used instead of LDL-C as the preferred lipid parameter for screening (Strong Recommendation, High-Quality Evidence).</span></p></dd></dl><p></p></div></div><p></p></section><section data-dcnode-id="9975" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10138" id="cesectitle0020"><span data-dcnode-id="10139" instrument_node="">PICO 2b: Is there evidence to support measurement of Lp(a) to improve risk stratification and dyslipidemia management in patients with and without previous CV events?</span></h3><p data-dcnode-id="10125" id="para0036"><span data-dcnode-id="10137" instrument_node="">Lp(a) is an LDL-like particle in which ApoB is covalently bound to a plasminogen-like molecule called apolipoprotein(a).</span><a class="workspace-trigger" data-dcnode-id="10134" href="#bib0046" name="bbib0046"><sup data-dcnode-id="10135"><span data-dcnode-id="10136" instrument_node="">45</span></sup></a><span data-dcnode-id="10133" instrument_node=""> Plasma concentrations of Lp(a) are not influenced by age, sex, fasting state, inflammation, or lifestyle factors, but are largely controlled by a single gene locus, </span><em data-dcnode-id="10131"><span data-dcnode-id="10132" instrument_node="">LPA</span></em><span data-dcnode-id="10130" instrument_node=""> on chromosome 6, and are highly (&gt; 90%) heritable.</span><a class="workspace-trigger" data-dcnode-id="10127" href="#bib0047" name="bbib0047"><sup data-dcnode-id="10128"><span data-dcnode-id="10129" instrument_node="">46</span></sup></a><span data-dcnode-id="10126" instrument_node=""> Individual values are generally stable throughout life, thus, repeat measures are not required for risk assessment.</span></p><p data-dcnode-id="10112" id="para0037"><span data-dcnode-id="10124"
