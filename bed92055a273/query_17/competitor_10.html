instrument_node="">Mendelian randomization studies have clearly shown that genetic variants in the </span><em data-dcnode-id="10122"><span data-dcnode-id="10123" instrument_node="">LPA</span></em><span data-dcnode-id="10121" instrument_node=""> locus uniquely regulating Lp(a) levels are robustly associated with coronary heart disease risk, thereby strongly suggesting a causal association between Lp(a) and CVD.</span><a class="workspace-trigger" data-dcnode-id="10118" href="#bib0048" name="bbib0048"><sup data-dcnode-id="10119"><span data-dcnode-id="10120" instrument_node="">47</span></sup></a><sup data-dcnode-id="10116"><span data-dcnode-id="10117" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10113" href="#bib0049" name="bbib0049"><sup data-dcnode-id="10114"><span data-dcnode-id="10115" instrument_node="">48</span></sup></a></p><p data-dcnode-id="10080" id="para0038"><span data-dcnode-id="10111" instrument_node="">The risk of ASCVD increases with increasing Lp(a) levels &gt; 30 mg/dL in a dose-dependent fashion.</span><a class="workspace-trigger" data-dcnode-id="10109" href="#bib0049" name="bbib0049"><span data-dcnode-id="10110" instrument_node="">48</span></a><span data-dcnode-id="10108" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10106" href="#bib0050" name="bbib0050"><span data-dcnode-id="10107" instrument_node="">49</span></a><span data-dcnode-id="10105" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10103" href="#bib0051" name="bbib0051"><span data-dcnode-id="10104" instrument_node="">50</span></a><span data-dcnode-id="10102" instrument_node=""> Among 7524 subjects in the Copenhagen Heart Study followed for 17 years, subjects with an Lp(a) concentration between 30 and 76 mg/dL had a 1.7-fold hazard ratio (HR) for MI and those with an Lp(a) level &gt; 117 mg/dL had an adjusted HR of 2.7.</span><a class="workspace-trigger" data-dcnode-id="10099" href="#bib0049" name="bbib0049"><sup data-dcnode-id="10100"><span data-dcnode-id="10101" instrument_node="">48</span></sup></a><span data-dcnode-id="10098" instrument_node=""> Among 6086 patients with a first MI and 6857 control participants from the INTERHEART study who were stratified according to ethnicity and adjusted for age and sex, Lp(a) concentrations &gt; 50 mg/dL were associated with an increased risk of MI (odds ratio, 1.48; 95% confidence interval [CI], 1.43-1.67), independent of established CVD risk factors including diabetes mellitus, smoking, and high blood pressure.</span><a class="workspace-trigger" data-dcnode-id="10095" href="#bib0052" name="bbib0052"><sup data-dcnode-id="10096"><span data-dcnode-id="10097" instrument_node="">51</span></sup></a><span data-dcnode-id="10094" instrument_node=""> Higher Lp(a) concentrations carried a particularly high population burden in South Asian and Latin American individuals.</span><a class="workspace-trigger" data-dcnode-id="10091" href="#bib0052" name="bbib0052"><sup data-dcnode-id="10092"><span data-dcnode-id="10093" instrument_node="">51</span></sup></a><span data-dcnode-id="10090" instrument_node=""> An Lp(a) level &gt; 50 mg/dL (&gt; 100 nmol/L) is found in approximately 20% of individuals of European and South Asian descent, 40% of African American individuals, and fewer than 10% of East Asian individuals.</span><a class="workspace-trigger" data-dcnode-id="10087" href="#bib0052" name="bbib0052"><sup data-dcnode-id="10088"><span data-dcnode-id="10089" instrument_node="">51</span></sup></a><sup data-dcnode-id="10085"><span data-dcnode-id="10086" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10082" href="#bib0053" name="bbib0053"><sup data-dcnode-id="10083"><span data-dcnode-id="10084" instrument_node="">52</span></sup></a><span data-dcnode-id="10081" instrument_node=""> Individuals with extreme elevations in Lp(a) have been shown to be at markedly high risk, with an event rate similar to that for other genetic dyslipidemias for which family screening is recommended (ie, heterozygous FH). As such, Lp(a) is a common but as yet not routinely measured ASCVD risk marker.</span></p><p data-dcnode-id="10031" id="para0039"><span data-dcnode-id="10079" instrument_node="">Elevated Lp(a) level also increases the risk of recurrent ASCVD in a dose-dependent manner.</span><a class="workspace-trigger" data-dcnode-id="10076" href="#bib0051" name="bbib0051"><sup data-dcnode-id="10077"><span data-dcnode-id="10078" instrument_node="">50</span></sup></a><sup data-dcnode-id="10074"><span data-dcnode-id="10075" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10071" href="#bib0054" name="bbib0054"><sup data-dcnode-id="10072"><span data-dcnode-id="10073" instrument_node="">53</span></sup></a><span data-dcnode-id="10070" instrument_node=""> Among 58,527 subjects from the Copenhagen General Population Study, 2527 subjects aged 20-79 years with a history of ASCVD and elevated Lp(a) were followed over a median of 5 years.</span><a class="workspace-trigger" data-dcnode-id="10067" href="#bib0056" name="bbib0056"><sup data-dcnode-id="10068"><span data-dcnode-id="10069" instrument_node="">54</span></sup></a><span data-dcnode-id="10066" instrument_node=""> The adjusted major adverse CV events (MACE) incidence rate ratios were 1.28 (95% CI, 1.03-1.58) for subjects with an Lp(a) level of 10-49 mg/dL (18-104 nmol/L), 1.44 (95% CI, 1.12-1.85) for 50-99 mg/dL (105-213 nmol/L), and 2.14 (95% CI, 1.57-2.92) for those with Lp(a) ≥ 100 mg/dL (≥ 214 nmol/L).</span><a class="workspace-trigger" data-dcnode-id="10063" href="#bib0056" name="bbib0056"><sup data-dcnode-id="10064"><span data-dcnode-id="10065" instrument_node="">54</span></sup></a><span data-dcnode-id="10062" instrument_node=""> In the randomized, controlled </span><strong data-dcnode-id="10060"><span data-dcnode-id="10061" instrument_node="">F</span></strong><span data-dcnode-id="10059" instrument_node="">urther Cardiovascular </span><strong data-dcnode-id="10057"><span data-dcnode-id="10058" instrument_node="">Ou</span></strong><span data-dcnode-id="10056" instrument_node="">tcomes </span><strong data-dcnode-id="10054"><span data-dcnode-id="10055" instrument_node="">R</span></strong><span data-dcnode-id="10053" instrument_node="">esearch With PCSK9 </span><strong data-dcnode-id="10051"><span data-dcnode-id="10052" instrument_node="">I</span></strong><span data-dcnode-id="10050" instrument_node="">nhibition in Subjects With </span><strong data-dcnode-id="10048"><span data-dcnode-id="10049" instrument_node="">E</span></strong><span data-dcnode-id="10047" instrument_node="">levated </span><strong data-dcnode-id="10045"><span data-dcnode-id="10046" instrument_node="">R</span></strong><span data-dcnode-id="10044" instrument_node="">isk (FOURIER) and Study to Evaluate the Effect of Alirocumab on the Occurrence of Cardiovascular Events in Patients Who Have Experienced an Acute Coronary Syndrome (ODYSSEY OUTCOMES) trials, high levels of Lp(a) were associated with an increased risk of recurrent CVD events in patients with established CVD irrespective of LDL cholesterol.</span><a class="workspace-trigger" data-dcnode-id="10041" href="#bib0054" name="bbib0054"><sup data-dcnode-id="10042"><span data-dcnode-id="10043" instrument_node="">53</span></sup></a><sup data-dcnode-id="10039"><span data-dcnode-id="10040" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10036" href="#bib0056" name="bbib0056"><sup data-dcnode-id="10037"><span data-dcnode-id="10038" instrument_node="">54</span></sup></a><span data-dcnode-id="10035" instrument_node=""> Furthermore, alirocumab-associated reductions in Lp(a) reduced MACE in patients with a recent ACS independent of LDL-C.</span><a class="workspace-trigger" data-dcnode-id="10032" href="#bib0056" name="bbib0056"><sup data-dcnode-id="10033"><span data-dcnode-id="10034" instrument_node="">54</span></sup></a></p><p data-dcnode-id="10029" id="para0040a"><span data-dcnode-id="10030" instrument_node="">Although these new data support the potential role of Lp(a) as a target of treatment in the future, there remains no evidence from RCTs that specifically lowering Lp(a) level leads to reductions in CV outcomes. It should also be noted that commonly used lipid-lowering therapies (ie, statins and ezetimibe) do not appreciably lower Lp(a) levels. The only available lipid-lowering therapies that lead to substantial lowering of Lp(a) include PCSK9 inhibitors, niacin, and apheresis, but relatively limited evidence exists for their use in patients with a high Lp(a) level. Newer investigational agents, such as antisense oligonucleotides and small interfering RNAs are currently being evaluated for CVD risk reduction in this patient population. Accordingly, Lp(a) is not currently considered a treatment target and repeat measures are therefore not indicated.</span></p><p data-dcnode-id="10027" id="para0041"><span data-dcnode-id="10028" instrument_node="">Lp(a) testing is available across Canada, and is currently an insured laboratory test in most provinces, with the exception of Ontario and Manitoba.</span></p><p data-dcnode-id="9976" id="para9004"><span class="display" data-dcnode-id="9977"></span></p><div aria-label="Unlabelled box" class="article-textbox" data-dcnode-id="9978" id="tbox0004" role="region"><span data-dcnode-id="10024" id="tbcap3"><p data-dcnode-id="10025" id="spara024"><span data-dcnode-id="10026" instrument_node="">RECOMMENDATION</span></p></span><div data-dcnode-id="9979"><p data-dcnode-id="10012" id="para9005"></p><dl class="list" data-dcnode-id="10013"><dt class="list-label" data-dcnode-id="10022"><span data-dcnode-id="10023" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="10019"><p data-dcnode-id="10020" id="para0042"><span data-dcnode-id="10021" instrument_node="">We recommend measuring Lp(a) level once in a person's lifetime as a part of the initial lipid screening (Strong Recommendation; High-Quality Evidence).</span></p></dd><dt class="list-label" data-dcnode-id="10017"><span data-dcnode-id="10018" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="10014"><p data-dcnode-id="10015" id="para0043"><span data-dcnode-id="10016" instrument_node="">For all patients in the setting of primary prevention with a Lp(a) ≥ 50 mg/dL (or ≥ 100 nmol/L), we recommend earlier and more intensive health behaviour modification counselling and management of other ASCVD risk factors (Strong Recommendation; Expert Consensus).</span></p></dd></dl><p></p><p data-dcnode-id="9986" id="para0044"><strong data-dcnode-id="10010"><span data-dcnode-id="10011" instrument_node="">Values and preferences.</span></strong><span data-dcnode-id="10009" instrument_node=""> There is a large body of evidence supporting the potential causal association between Lp(a) and future ASCVD.</span><a class="workspace-trigger" data-dcnode-id="10006" href="#bib0051" name="bbib0051"><sup data-dcnode-id="10007"><span data-dcnode-id="10008" instrument_node="">50</span></sup></a><sup data-dcnode-id="10004"><span data-dcnode-id="10005" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="10001" href="#bib0052" name="bbib0052"><sup data-dcnode-id="10002"><span data-dcnode-id="10003" instrument_node="">51</span></sup></a><sup data-dcnode-id="9999"><span data-dcnode-id="10000" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9997" href="#bib0057" name="bbib0057"><span data-dcnode-id="9998" instrument_node="">55</span></a><span data-dcnode-id="9996" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9994" href="#bib0058" name="bbib0058"><span data-dcnode-id="9995" instrument_node="">56</span></a><span data-dcnode-id="9993" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9991" href="#bib0059" name="bbib0059"><span data-dcnode-id="9992" instrument_node="">57</span></a><span data-dcnode-id="9990" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9988" href="#bib0060" name="bbib0060"><span data-dcnode-id="9989" instrument_node="">58</span></a><span data-dcnode-id="9987" instrument_node=""> The high prevalence of elevated Lp(a) level, the strength of association with incident and recurrent ASCVD events, and the potential to improve CV risk stratification, strongly justify universal screening to identify individuals with very high levels. Identification of high levels of Lp(a) is a useful consideration for shared decision-making in subjects across all ASCVD risk categories, but especially in younger patients, particularly those who have a very strong family history of premature ASCVD. Although further evidence that directly lowering Lp(a) level reduces ASCVD risk is pending, the finding of high Lp(a) should alert primary care practitioners to more actively pursue an overall ASCVD event risk assessment, including careful discussion of current health behaviours, consideration of age-appropriate vascular imaging studies for detecting early evidence of subclinical atherosclerosis in select individuals (eg, CAC score), and earlier introduction of statin or other lipid-lowering therapy, especially in intermediate-risk individuals and/or low-risk individuals with moderate elevations of LDL-C between 3.5 and 5 mmol/L.</span></p><p data-dcnode-id="9980" id="para0045"><span data-dcnode-id="9985" instrument_node="">In the setting of secondary prevention, the presence of a high Lp(a) level is strongly predictive of recurrent events, and suggests the need for intensification of LDL-lowering therapy, including use of PCSK9 inhibitors. Furthermore, preliminary evidence suggests that treatment with PCSK9 inhibitors post ACS in patients with high Lp(a) reduces MACE independent of LDL-C lowering.</span><a class="workspace-trigger" data-dcnode-id="9982" href="#bib0056" name="bbib0056"><sup data-dcnode-id="9983"><span data-dcnode-id="9984" instrument_node="">54</span></sup></a><span data-dcnode-id="9981" instrument_node=""> When clinicians are uncertain of the implications of elevated Lp(a), consultation with a lipid specialist might be considered.</span></p></div></div><p></p></section><section data-dcnode-id="9794" id="sec0016"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9973" id="cesectitle0022"><span data-dcnode-id="9974" instrument_node="">PICO 3: In primary prevention, what is the evidence for CAC score to improve risk assessment? Specifically, should low CAC (or CAC = 0) score be used to avoid statin therapy in select individuals?</span></h3><p data-dcnode-id="9953" id="para0046"><span data-dcnode-id="9972" instrument_node="">For primary prevention, most guidelines are on the basis of the concept of ASCVD risk assessment to help determine appropriateness and intensity of ASCVD risk factor modification. The primary prevention RCTs on which the recommendations are based, however, use clinical descriptors to identify patients eligible for study and, as a result, the patients eligible for the proven therapy. None of the algorithms available, including the FRS used in Canada, have been used to determine eligibility for any of the successful, primary prevention lipid-lowering trials. Even so, there is evidence to suggest that use of such algorithms is effective on a population level, more so than identification of patients on the basis of trial eligibility criteria.</span><a class="workspace-trigger" data-dcnode-id="9969" href="#bib0061" name="bbib0061"><sup data-dcnode-id="9970"><span data-dcnode-id="9971" instrument_node="">59</span></sup></a><sup data-dcnode-id="9967"><span data-dcnode-id="9968" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9964" href="#bib0062" name="bbib0062"><sup data-dcnode-id="9965"><span data-dcnode-id="9966" instrument_node="">60</span></sup></a><span data-dcnode-id="9963" instrument_node=""> Despite this clinical utility, it has been repeatedly shown that typical ASCVD event risk algorithms can lead to substantial over- or underestimation of ASCVD event risk,</span><a class="workspace-trigger" data-dcnode-id="9960" href="#bib0063" name="bbib0063"><sup data-dcnode-id="9961"><span data-dcnode-id="9962" instrument_node="">61</span></sup></a><span data-dcnode-id="9959" instrument_node=""> and consequently, inappropriate risk factor management. Additionally, the value of these algorithms for predicting the presence and burden of atheroma is poor.</span><a class="workspace-trigger" data-dcnode-id="9957" href="#bib0064" name="bbib0064"><span data-dcnode-id="9958" instrument_node="">62</span></a><span data-dcnode-id="9956" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9954" href="#bib0065" name="bbib0065"><span data-dcnode-id="9955" instrument_node="">63</span></a></p><p data-dcnode-id="9939" id="para0047"><span data-dcnode-id="9952" instrument_node="">Atheroma burden, the substrate that portends CV events, directly predicts ASCVD event risk in a graded fashion. This has been shown over decades with invasive angiography and more recently with coronary computed tomography, including noncontrast CAC scoring, the latter being highly applicable for assessment of patients who are asymptomatic, and possible candidates for primary prevention.</span><a class="workspace-trigger" data-dcnode-id="9949" href="#bib0066" name="bbib0066"><sup data-dcnode-id="9950"><span data-dcnode-id="9951" instrument_node="">64</span></sup></a><sup data-dcnode-id="9947"><span data-dcnode-id="9948" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9944" href="#bib0067" name="bbib0067"><sup data-dcnode-id="9945"><span data-dcnode-id="9946" instrument_node="">65</span></sup></a><span data-dcnode-id="9943" instrument_node=""> Accordingly, the literature is replete with clinical studies reinforcing the concept that directly assessing the presence of atheroma, through CAC scoring, significantly improves the appropriate selection of patients who are likely to benefit from lipid modifying therapy.</span><a class="workspace-trigger" data-dcnode-id="9940" href="#bib0068" name="bbib0068"><sup data-dcnode-id="9941"><span data-dcnode-id="9942" instrument_node="">66</span></sup></a></p><p data-dcnode-id="9860" id="para0048"><span data-dcnode-id="9938" instrument_node="">Noncontrast CAC measurements are sensitive, reproducible, and can be performed rapidly with an average radiation dose of 0.89 mSv (compared with background annual radiation exposure of approximately 3.0 mSv). Evidence for improved C-statistic/net reclassification index after adjustment for standard risk factors (FRS) has been shown in multiple studies.</span><a class="workspace-trigger" data-dcnode-id="9935" href="#bib0069" name="bbib0069"><sup data-dcnode-id="9936"><span data-dcnode-id="9937" instrument_node="">67</span></sup></a><sup data-dcnode-id="9933"><span data-dcnode-id="9934" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9930" href="#bib0070" name="bbib0070"><sup data-dcnode-id="9931"><span data-dcnode-id="9932" instrument_node="">69</span></sup></a><span data-dcnode-id="9929" instrument_node=""> The clinical decision-making utility of CAC measurements is best shown in middle-aged, intermediate-risk populations in whom the presence or absence of coronary artery calcification results in reclassification into higher or lower risk populations. A CAC measurement &gt; 0 AU confirms the presence of atherosclerotic plaque. Increasing scores are directly proportional to increased ASCVD event risk.</span><a class="workspace-trigger" data-dcnode-id="9927" href="#bib0071" name="bbib0071"><span data-dcnode-id="9928" instrument_node="">69</span></a><span data-dcnode-id="9926" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9924" href="#bib0072" name="bbib0072"><span data-dcnode-id="9925" instrument_node="">70</span></a><span data-dcnode-id="9923" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9921" href="#bib0073" name="bbib0073"><span data-dcnode-id="9922" instrument_node="">71</span></a><span data-dcnode-id="9920" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9918" href="#bib0074" name="bbib0074"><span data-dcnode-id="9919" instrument_node="">72</span></a><span data-dcnode-id="9917" instrument_node=""> A CAC measurement &gt; 100 AU is associated with a high risk (&gt; 2% annual risk) of an ASCVD event within 2-5 years and is generally an indication for intensive CV risk factor modification, including treatment of LDL-C. CAC &gt; 300 AU places the patient in a very high risk category with a 10-year risk of MI/CV death of approximately 28%.</span><a class="workspace-trigger" data-dcnode-id="9914" href="#bib0075" name="bbib0075"><sup data-dcnode-id="9915"><span data-dcnode-id="9916" instrument_node="">73</span></sup></a><span data-dcnode-id="9913" instrument_node=""> A CAC measurement of 0 AU, however, has a very high negative predictive value for ASCVD events in asymptomatic, low-risk adults within 2-5 years (negative predictive value, 95%-99%).</span><a class="workspace-trigger" data-dcnode-id="9910" href="#bib0076" name="bbib0076"><sup data-dcnode-id="9911"><span data-dcnode-id="9912" instrument_node="">74</span></sup></a><span data-dcnode-id="9909" instrument_node=""> Importantly, although a CAC of 0 AU is indicative of a low event rate (1.5% per 10 years; 0.32-0.43 per 1000 person-years; 1.3-5.6 per 11.1 years),</span><a class="workspace-trigger" data-dcnode-id="9906" href="#bib0072" name="bbib0072"><sup data-dcnode-id="9907"><span data-dcnode-id="9908" instrument_node="">70</span></sup></a><sup data-dcnode-id="9904"><span data-dcnode-id="9905" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9902" href="#bib0077" name="bbib0077"><span data-dcnode-id="9903" instrument_node="">75</span></a><span data-dcnode-id="9901" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9899" href="#bib0078" name="bbib0078"><span data-dcnode-id="9900" instrument_node="">76</span></a><span data-dcnode-id="9898" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9896" href="#bib0079" name="bbib0079"><span data-dcnode-id="9897" instrument_node="">77</span></a><span data-dcnode-id="9895" instrument_node=""> it is not indicative of a 0 event rate. This is likely because noncalcified soft plaque might be present; not all ASCVD events are mediated by vascular atheroma and atheromas might also progress in an unpredictable fashion. The variability in the development of clinical ASCVD with a CAC score of 0 AU is particularly evident in persons younger than 50 years of age, those with a strong family history of premature CVD events, or in the setting of severe CVD risk factors such as smoking, diabetes, poorly controlled hypertension, and in those with lifelong, genetic dyslipidemias (FH or elevated Lp[a]).</span><a class="workspace-trigger" data-dcnode-id="9893" href="#bib0080" name="bbib0080"><span data-dcnode-id="9894" instrument_node="">78</span></a><span data-dcnode-id="9892" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9890" href="#bib0081" name="bbib0081"><span data-dcnode-id="9891" instrument_node="">79</span></a><span data-dcnode-id="9889" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9887" href="#bib0082" name="bbib0082"><span data-dcnode-id="9888" instrument_node="">80</span></a><span data-dcnode-id="9886" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9884" href="#bib0083" name="bbib0083"><span data-dcnode-id="9885" instrument_node="">81</span></a><span data-dcnode-id="9883" instrument_node=""> These are patient categories that in general would warrant aggressive ASCVD risk factor modification, even if CAC = 0 AU, to enhance the likelihood of maintaining as low an atheroma burden as possible over a lifetime. Conversely, if such high-risk patients do have CAC &gt; 0 AU, this might provide a strong rationale for adherence to aggressive CVD risk factor modification,</span><a class="workspace-trigger" data-dcnode-id="9880" href="#bib0084" name="bbib0084"><sup data-dcnode-id="9881"><span data-dcnode-id="9882" instrument_node="">82</span></sup></a><sup data-dcnode-id="9878"><span data-dcnode-id="9879" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9875" href="#bib0085" name="bbib0085"><sup data-dcnode-id="9876"><span data-dcnode-id="9877" instrument_node="">83</span></sup></a><span data-dcnode-id="9874" instrument_node=""> including lipid-lowering therapy or treatment intensification.</span><a class="workspace-trigger" data-dcnode-id="9871" href="#bib0086" name="bbib0086"><sup data-dcnode-id="9872"><span data-dcnode-id="9873" instrument_node="">84</span></sup></a><sup data-dcnode-id="9869"><span data-dcnode-id="9870" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9866" href="#bib0087" name="bbib0087"><sup data-dcnode-id="9867"><span data-dcnode-id="9868" instrument_node="">85</span></sup></a><span data-dcnode-id="9865" instrument_node=""> The effects of statins on the progression of atherosclerosis cannot be assessed through serial CAC scores alone because it does not assess the status of noncalcific plaque. Therapy does not reduce and might even increase CAC scores despite regression of noncalcific plaque components.</span><a class="workspace-trigger" data-dcnode-id="9862" href="#bib0088" name="bbib0088"><sup data-dcnode-id="9863"><span data-dcnode-id="9864" instrument_node="">86</span></sup></a><span data-dcnode-id="9861" instrument_node=""> Accordingly, repeat CAC scanning is not recommended unless risk factor modification has been deferred through patient-physician shared decision-making.</span></p><p data-dcnode-id="9852" id="para0049"><span data-dcnode-id="9859" instrument_node="">Although CAC provides direct evidence of atherosclerotic plaque and a quantitative assessment of risk of attendant ASCVD events, controversy exists because of a paucity of large placebo-controlled RCTs and its cost-effectiveness for identification of patients suitable for statin therapy is uncertain,</span><a class="workspace-trigger" data-dcnode-id="9856" href="#bib0089" name="bbib0089"><sup data-dcnode-id="9857"><span data-dcnode-id="9858" instrument_node="">87</span></sup></a><span data-dcnode-id="9855" instrument_node=""> even when applied only to the intermediate-risk group identified using risk algorithms. Importantly, at present, CAC scoring is not uniformly available or uniformly funded in Canada, and there are no cost-effectiveness analyses that represent the Canadian context.</span><span data-dcnode-id="9853" instrument_node="">&nbsp;</span></p><p data-dcnode-id="9795" id="para9006"><span class="display" data-dcnode-id="9796"></span></p><div aria-label="Unlabelled box" class="article-textbox" data-dcnode-id="9797" id="tbox0005" role="region"><span data-dcnode-id="9849" id="tbcap4"><p data-dcnode-id="9850" id="spara025"><span data-dcnode-id="9851" instrument_node="">RECOMMENDATION</span></p></span><div data-dcnode-id="9798"><p data-dcnode-id="9832" id="para9007"></p><dl class="list" data-dcnode-id="9833"><dt class="list-label" data-dcnode-id="9847"><span data-dcnode-id="9848" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="9844"><p data-dcnode-id="9845" id="para0050"><span data-dcnode-id="9846" instrument_node="">We suggest that CAC screening using computed tomography imaging might be considered for asymptomatic adults 40 years of age or older and at intermediate risk (FRS 10%-20%) for whom treatment decisions are uncertain (Strong Recommendation; Moderate-Quality Evidence).</span></p></dd><dt class="list-label" data-dcnode-id="9842"><span data-dcnode-id="9843" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="9839"><p data-dcnode-id="9840" id="para0051"><span data-dcnode-id="9841" instrument_node="">We recommend that CAC screening using computed tomography imaging not be undertaken for: (1) high-risk individuals; (2) patients receiving statin treatment; or (3) most asymptomatic, low-risk adults (Strong Recommendation; Moderate-Quality Evidence).</span></p></dd><dt class="list-label" data-dcnode-id="9837"><span data-dcnode-id="9838" instrument_node="">9.</span></dt><dd class="list-description" data-dcnode-id="9834"><p data-dcnode-id="9835" id="para0052"><span data-dcnode-id="9836" instrument_node="">We suggest that CAC screening might be considered for a subset of low-risk individuals 40 years of age or older with a family history of premature ASCVD (men 55 years or younger; women 65 years or younger) in addition to identifying known genetic causes of ASCVD such as elevated Lp(a) level or FH (Weak Recommendation; Low-Quality Evidence).</span></p></dd></dl><p></p><p data-dcnode-id="9799" id="para0053"><strong data-dcnode-id="9830"><span data-dcnode-id="9831" instrument_node="">Values and preferences.</span></strong><span data-dcnode-id="9829" instrument_node=""> Patients with modifiable ASCVD risk factors should be counselled with respect to the potential merit of preventing atherosclerosis itself, the substrate for clinical ASCVD events in the long term, through comprehensive ASCVD risk factor management. As outlined elsewhere, RCTs show the ASCVD risk reduction value of statin therapy in patients with intermediate risk and additional ASCVD risk factors (eg, HOPE 3,</span><a class="workspace-trigger" data-dcnode-id="9826" href="#bib0016" name="bbib0016"><sup data-dcnode-id="9827"><span data-dcnode-id="9828" instrument_node="">16</span></sup></a><span data-dcnode-id="9825" instrument_node=""> </span><strong data-dcnode-id="9823"><span data-dcnode-id="9824" instrument_node="">J</span></strong><span data-dcnode-id="9822" instrument_node="">ustification for the </span><strong data-dcnode-id="9820"><span data-dcnode-id="9821" instrument_node="">U</span></strong><span data-dcnode-id="9819" instrument_node="">se of Statins in </span><strong data-dcnode-id="9817"><span data-dcnode-id="9818" instrument_node="">P</span></strong><span data-dcnode-id="9816" instrument_node="">revention: An </span><strong data-dcnode-id="9814"><span data-dcnode-id="9815" instrument_node="">I</span></strong><span data-dcnode-id="9813" instrument_node="">ntervention </span><strong data-dcnode-id="9811"><span data-dcnode-id="9812" instrument_node="">T</span></strong><span data-dcnode-id="9810" instrument_node="">rial </span><strong data-dcnode-id="9808"><span data-dcnode-id="9809" instrument_node="">E</span></strong><span data-dcnode-id="9807" instrument_node="">valuating </span><strong data-dcnode-id="9805"><span data-dcnode-id="9806" instrument_node="">R</span></strong><span data-dcnode-id="9804" instrument_node="">osuvastatin [JUPITER]</span><a class="workspace-trigger" data-dcnode-id="9801" href="#bib0090" name="bbib0090"><sup data-dcnode-id="9802"><span data-dcnode-id="9803" instrument_node="">88</span></sup></a><span data-dcnode-id="9800" instrument_node="">) in the absence of CAC testing or any testing to identify preclinical atherosclerosis. Accordingly, the patient-physician decision often does not require CAC scoring but might be strongly influenced by these other factors, including family history of premature ASCVD, other features suggesting genetic causes of dyslipidemia, or side effects of statin therapy. In some low- to intermediate-risk subjects, it might be reasonable to withhold statin therapy for CAC = 0 AU because of a favourable intermediate-term outcome. Exceptions would include cigarette smokers, patients with diabetes, those with poorly controlled hypertension, genetic dyslipidemias such as FH or elevated Lp(a) level, and patients with strong family history of premature ASCVD events. If available, a CAC &gt; 100 AU is an indication for statin therapy regardless of FRS. For those with a CAC of 1-99 AU, individual decision-making is required because risk will not be reclassified and would remain intermediate. If a decision is made to withhold statin or lipid-modifying therapy on the basis of CAC = 0, this decision should be reevaluated during follow-up or if clinical circumstances change. CAC scoring should rarely be performed sooner than within 5 years to aid in this reevaluation. Finally, this section is restricted to application in patients who are at least 40 years of age for whom the traditional FRS assessment applies. Prevalence of calcification is a sequential aspect of the atherosclerotic process and might be absent in the early phases. Although CAC has been studied extensively for ASCVD risk prediction, the prevalence of CAC is lower in young patients compared with middle-aged and older patients and also in women vs men younger than 50 years of age.</span></p></div></div><p></p></section><section data-dcnode-id="9457" id="sec0017"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9792" id="cesectitle0024"><span data-dcnode-id="9793" instrument_node="">PICO 4: In secondary prevention, what is the most appropriate lipid/lipoprotein threshold for the intensification of therapy?</span></h3><p data-dcnode-id="9761" id="para0054"><span data-dcnode-id="9791" instrument_node="">The totality of evidence from observational, pathophysiological, epidemiological, and Mendelian randomization studies and RCTs of lipid-lowering therapies indicate a causal relationship between LDL-C (as well as non-HDL-C and ApoB) and ASCVD and show that lower concentrations of plasma LDL-C levels are associated with a lower risk of ASCVD events extending to very low LDL-C concentrations (&lt; 0.5 mmol/L).</span><a class="workspace-trigger" data-dcnode-id="9788" href="#bib0015" name="bbib0015"><sup data-dcnode-id="9789"><span data-dcnode-id="9790" instrument_node="">15</span></sup></a><sup data-dcnode-id="9786"><span data-dcnode-id="9787" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9784" href="#bib0091" name="bbib0091"><span data-dcnode-id="9785" instrument_node="">89</span></a><span data-dcnode-id="9783" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9781" href="#bib0092" name="bbib0092"><span data-dcnode-id="9782" instrument_node="">90</span></a><span data-dcnode-id="9780" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9778" href="#bib0093" name="bbib0093"><span data-dcnode-id="9779" instrument_node="">91</span></a><span data-dcnode-id="9777" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9775" href="#bib0094" name="bbib0094"><span data-dcnode-id="9776" instrument_node="">92</span></a><span data-dcnode-id="9774" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9772" href="#bib0095" name="bbib0095"><span data-dcnode-id="9773" instrument_node="">93</span></a><span data-dcnode-id="9771" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9769" href="#bib0096" name="bbib0096"><span data-dcnode-id="9770" instrument_node="">94</span></a><span data-dcnode-id="9768" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9766" href="#bib0097" name="bbib0097"><span data-dcnode-id="9767" instrument_node="">95</span></a><span data-dcnode-id="9765" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9763" href="#bib0098" name="bbib0098"><span data-dcnode-id="9764" instrument_node="">96</span></a><span data-dcnode-id="9762" instrument_node=""> In RCTs, however, the absolute benefits of therapy were higher in subsets of patients with higher pretreatment LDL-C and/or additional ASCVD event risk enhancers who were at higher absolute risk.</span></p><p data-dcnode-id="9684" id="para0055"><span data-dcnode-id="9760" instrument_node="">To date, no clear target to which LDL-C or non HDL-C or ApoB levels should be lowered is clearly identified in RCTs, because such trials have generally used thresholds of LDL-C (or non-HDL-C or ApoB) levels for initiation or intensification of lipid-lowering therapies and fixed-dose lipid-lowering drugs (this pertains to statin RCTs and to RCTs that have used the additional use of nonstatin lipid-lowering agents, such as ezetimibe and PCSK9 inhibitors). Exceptions are the </span><strong data-dcnode-id="9758"><span data-dcnode-id="9759" instrument_node="">S</span></strong><span data-dcnode-id="9757" instrument_node="">candinavian </span><strong data-dcnode-id="9755"><span data-dcnode-id="9756" instrument_node="">S</span></strong><span data-dcnode-id="9754" instrument_node="">imvastatin </span><strong data-dcnode-id="9752"><span data-dcnode-id="9753" instrument_node="">S</span></strong><span data-dcnode-id="9751" instrument_node="">urvival </span><strong data-dcnode-id="9749"><span data-dcnode-id="9750" instrument_node="">S</span></strong><span data-dcnode-id="9748" instrument_node="">tudy (4S) trial in which the statin dose was up- or down-titrated aiming for within-trial total cholesterol levels of 3.0-5.2 mmol/L,</span><a class="workspace-trigger" data-dcnode-id="9745" href="#bib0099" name="bbib0099"><sup data-dcnode-id="9746"><span data-dcnode-id="9747" instrument_node="">97</span></sup></a><span data-dcnode-id="9744" instrument_node=""> the </span><strong data-dcnode-id="9742"><span data-dcnode-id="9743" instrument_node="">Imp</span></strong><span data-dcnode-id="9741" instrument_node="">roved </span><strong data-dcnode-id="9739"><span data-dcnode-id="9740" instrument_node="">R</span></strong><span data-dcnode-id="9738" instrument_node="">eduction of </span><strong data-dcnode-id="9736"><span data-dcnode-id="9737" instrument_node="">O</span></strong><span data-dcnode-id="9735" instrument_node="">utcomes: </span><strong data-dcnode-id="9733"><span data-dcnode-id="9734" instrument_node="">V</span></strong><span data-dcnode-id="9732" instrument_node="">ytorin </span><strong data-dcnode-id="9730"><span data-dcnode-id="9731" instrument_node="">E</span></strong><span data-dcnode-id="9729" instrument_node="">fficacy </span><strong data-dcnode-id="9727"><span data-dcnode-id="9728" instrument_node="">I</span></strong><span data-dcnode-id="9726" instrument_node="">nternational </span><strong data-dcnode-id="9724"><span data-dcnode-id="9725" instrument_node="">T</span></strong><span data-dcnode-id="9723" instrument_node="">rial (IMPROVE-IT), which allowed for up-titration of simvastatin to 80 mg daily for in-trial LDL-C levels &gt; 2.0 mmol/L,</span><a class="workspace-trigger" data-dcnode-id="9720" href="#bib0100" name="bbib0100"><sup data-dcnode-id="9721"><span data-dcnode-id="9722" instrument_node="">98</span></sup></a><span data-dcnode-id="9719" instrument_node=""> and the ODYSSEY OUTCOMES trial in patients with a recent ACS, which allowed up-and down-titration of alirocumab aiming for an LDL-C target of 0.65-1.3 mmol/L; however, in these trials no randomized comparison with alternate lipid targets was performed.</span><a class="workspace-trigger" data-dcnode-id="9716" href="#bib0092" name="bbib0092"><sup data-dcnode-id="9717"><span data-dcnode-id="9718" instrument_node="">90</span></sup></a><span data-dcnode-id="9715" instrument_node=""> Additionally, a number of trials comparing different intensities of statin treatment (lower vs higher statin dose) in secondary ASCVD prevention showed benefits for more intensive statin therapy; however, these trials did not explore targets of LDL-C lowering.</span><a class="workspace-trigger" data-dcnode-id="9712" href="#bib0101" name="bbib0101"><sup data-dcnode-id="9713"><span data-dcnode-id="9714" instrument_node="">99</span></sup></a><sup data-dcnode-id="9710"><span data-dcnode-id="9711" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9707" href="#bib0102" name="bbib0102"><sup data-dcnode-id="9708"><span data-dcnode-id="9709" instrument_node="">100</span></sup></a><span data-dcnode-id="9706" instrument_node=""> One RCT conducted in patients with a recent ischemic stroke showed reductions in major ASCVD events in patients allocated to a strategy of lower LDL-C (&lt; 1.8 mmol/L) vs higher targets (2.3-2.8 mmol/L).</span><a class="workspace-trigger" data-dcnode-id="9703" href="#bib0103" name="bbib0103"><sup data-dcnode-id="9704"><span data-dcnode-id="9705" instrument_node="">101</span></sup></a><span data-dcnode-id="9702" instrument_node=""> Nevertheless, the lower LDL-C target in this trial is similar to the threshold for intensification of lipid-lowering therapy used in other recent trials and recommended in this guideline document.</span><a class="workspace-trigger" data-dcnode-id="9699" href="#bib0091" name="bbib0091"><sup data-dcnode-id="9700"><span data-dcnode-id="9701" instrument_node="">89</span></sup></a><sup data-dcnode-id="9697"><span data-dcnode-id="9698" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9694" href="#bib0104" name="bbib0104"><sup data-dcnode-id="9695"><span data-dcnode-id="9696" instrument_node="">102</span></sup></a><span data-dcnode-id="9693" instrument_node=""> A number of studies have shown improved ASCVD outcomes in secondary prevention patients reaching lower in-trial LDL-C levels, but these trials are observational and did not test targets of therapy.</span><a class="workspace-trigger" data-dcnode-id="9690" href="#bib0105" name="bbib0105"><sup data-dcnode-id="9691"><span data-dcnode-id="9692" instrument_node="">103</span></sup></a><sup data-dcnode-id="9688"><span data-dcnode-id="9689" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9685" href="#bib0106" name="bbib0106"><sup data-dcnode-id="9686"><span data-dcnode-id="9687" instrument_node="">104</span></sup></a></p><p data-dcnode-id="9674" id="para0056"><span data-dcnode-id="9683" instrument_node="">Therefore, we recommend the use of thresholds for intensification of lipid therapy in secondary prevention. Most recent large RCTs have used an LDL-C threshold of 1.8 mmol/L for intensification of lipid-lowering therapy with nonstatin drugs in secondary ASCVD prevention patients receiving a maximally tolerated statin dose. Using this threshold, it is expected that most patients will achieve low and very low LDL-C levels, similar to those reached in clinical trials.</span><a class="workspace-trigger" data-dcnode-id="9680" href="#bib0092" name="bbib0092"><sup data-dcnode-id="9681"><span data-dcnode-id="9682" instrument_node="">90</span></sup></a><sup data-dcnode-id="9678"><span data-dcnode-id="9679" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9675" href="#bib0093" name="bbib0093"><sup data-dcnode-id="9676"><span data-dcnode-id="9677" instrument_node="">91</span></sup></a></p><p data-dcnode-id="9668" id="para0057"><span data-dcnode-id="9673" instrument_node="">The IMPROVE-IT trial showed benefit of ezetimibe when used in addition to statin therapy in patients with a recent ACS.</span><a class="workspace-trigger" data-dcnode-id="9670" href="#bib0100" name="bbib0100"><sup data-dcnode-id="9671"><span data-dcnode-id="9672" instrument_node="">98</span></sup></a><span data-dcnode-id="9669" instrument_node=""> The threshold for the additional use of ezetimibe was an LDL-C of 1.3 mmol/L, although in IMPROVE-IT most patients had a higher baseline LDL-C (average 2.45 mmol/L), statin therapy was restricted to only simvastatin (more potent statins were not used) and the modest 6% relative risk reduction was attained only after a long period of treatment (median 6 years). Therefore, we recommend the more robust LDL-C threshold of ≥ 1.8 mmol/L (or percentile equivalent non-HDL-C of ≥ 2.4 mmol/L or ApoB of ≥&nbsp;0.7 g/L).</span></p><div data-dcnode-id="9581"><p data-dcnode-id="9623" id="para0058"><span data-dcnode-id="9667" instrument_node="">Recent analyses of the large PCSK9 inhibitor trials (FOURIER</span><a class="workspace-trigger" data-dcnode-id="9664" href="#bib0089" name="bbib0089"><sup data-dcnode-id="9665"><span data-dcnode-id="9666" instrument_node="">89</span></sup></a><span data-dcnode-id="9663" instrument_node=""> and ODYSSEY OUTCOMES</span><a class="workspace-trigger" data-dcnode-id="9660" href="#bib0092" name="bbib0092"><sup data-dcnode-id="9661"><span data-dcnode-id="9662" instrument_node="">90</span></sup></a><span data-dcnode-id="9659" instrument_node="">) have identified subsets of patients with established CVD who are at very high risk and who derived the largest absolute benefit for intensification of lipid-lowering therapy with evolocumab and alirocumab, respectively. This includes patients with recent ACS and those with ASCVD and additional CV risk enhancers including diabetes mellitus, metabolic syndrome, polyvascular disease (vascular disease in ≥ 2 arterial beds), symptomatic peripheral artery disease, history of MI, MI in the past 2 years, previous coronary artery bypass graft surgery, LDL ≥ 2.6 mmol/L, heterozygous FH and Lp(a) ≥&nbsp;60 mg/dL.</span><a class="workspace-trigger" data-dcnode-id="9656" href="#bib0090" name="bbib0090"><sup data-dcnode-id="9657"><span data-dcnode-id="9658" instrument_node="">90</span></sup></a><sup data-dcnode-id="9654"><span data-dcnode-id="9655" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9652" href="#bib0107" name="bbib0107"><span data-dcnode-id="9653" instrument_node="">105</span></a><span data-dcnode-id="9651" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9649" href="#bib0108" name="bbib0108"><span data-dcnode-id="9650" instrument_node="">106</span></a><span data-dcnode-id="9648" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9646" href="#bib0109" name="bbib0109"><span data-dcnode-id="9647" instrument_node="">107</span></a><span data-dcnode-id="9645" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9643" href="#bib0110" name="bbib0110"><span data-dcnode-id="9644" instrument_node="">108</span></a><span data-dcnode-id="9642" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9640" href="#bib0111" name="bbib0111"><span data-dcnode-id="9641" instrument_node="">109</span></a><span data-dcnode-id="9639" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9637" href="#bib0112" name="bbib0112"><span data-dcnode-id="9638" instrument_node="">110</span></a><span data-dcnode-id="9636" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9634" href="#bib0113" name="bbib0113"><span data-dcnode-id="9635" instrument_node="">111</span></a><span data-dcnode-id="9633" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9631" href="#bib0114" name="bbib0114"><span data-dcnode-id="9632" instrument_node="">112</span></a><span data-dcnode-id="9630" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9628" href="#bib0115" name="bbib0115"><span data-dcnode-id="9629" instrument_node="">113</span></a><span data-dcnode-id="9627" instrument_node=""> Intensification of lipid-lowering therapy with PCSK9 inhibitors is especially recommended in these subsets of very high risk patients (see </span><a class="workspace-trigger" data-dcnode-id="9625" href="#tbl0003" name="btbl0003"><span data-dcnode-id="9626" instrument_node="">Table 3</span></a><span data-dcnode-id="9624" instrument_node="">), with or without the additional use of ezetimibe, which was used in only a small number of patients in these trials. Use of PCSK9 inhibitor therapy in these subsets of patients was shown to result in rapid and large reductions in LDL-C and in significant CVD event reduction. In most other secondary prevention patients, the use of ezetimibe followed by PCSK9 inhibitor therapy is recommended when the LDL-C ≥&nbsp;1.8 mmol/L.</span></p><div class="tables rowsep-0 colsep-0 frame-topbot" data-dcnode-id="9582" id="tbl0003"><span class="captions" data-dcnode-id="9615"><span data-dcnode-id="9616" id="cap0003"><p data-dcnode-id="9617" id="spara018"><span class="label" data-dcnode-id="9621"><span data-dcnode-id="9622" instrument_node="">Table 3</span></span><span data-dcnode-id="9620" instrument_node="">. </span><span data-dcnode-id="9618" instrument_node="">Secondary prevention patients shown to derive the largest benefit from intensification of statin therapy with the additional use of a PCSK9 inhibitor</span></p></span></span><div class="groups" data-dcnode-id="9586"><table data-dcnode-id="9587"><tbody data-dcnode-id="9588"><tr data-dcnode-id="9609"><th class="align-left valign-top" data-dcnode-id="9610" id="en0005" scope="row"><strong data-dcnode-id="9613"><span data-dcnode-id="9614" instrument_node="">Recent acute coronary event (ACS)</span></strong><br data-dcnode-id="9612"><span data-dcnode-id="9611" instrument_node=""> • Hospitalized index ACS to 52 weeks post index ACS</span></th></tr><tr data-dcnode-id="9589"><th class="align-left valign-top" data-dcnode-id="9590" id="en0006" scope="row"><strong data-dcnode-id="9607"><span data-dcnode-id="9608" instrument_node="">Clinically evident ASCVD and any of the following</span></strong><br data-dcnode-id="9606"><span data-dcnode-id="9605" instrument_node=""> • Diabetes mellitus or metabolic syndrome</span><br data-dcnode-id="9604"><span data-dcnode-id="9603" instrument_node=""> • Polyvascular disease (vascular disease in ≥ 2 arterial beds)</span><br data-dcnode-id="9602"><span data-dcnode-id="9601" instrument_node=""> • Symptomatic PAD</span><br data-dcnode-id="9600"><span data-dcnode-id="9599" instrument_node=""> • Recurrent MI</span><br data-dcnode-id="9598"><span data-dcnode-id="9597" instrument_node=""> • MI in the past 2 years</span><br data-dcnode-id="9596"><span data-dcnode-id="9595" instrument_node=""> • Previous CABG surgery</span><br data-dcnode-id="9594"><span data-dcnode-id="9593" instrument_node=""> • LDL-C ≥ 2.6 mmol/L or heterozygous FH</span><br data-dcnode-id="9592"><span data-dcnode-id="9591" instrument_node=""> • Lipoprotein(a) ≥ 60 mg/dL (120 nmol/L)</span></th></tr></tbody></table></div><p class="legend" data-dcnode-id="9583"></p><p data-dcnode-id="9584" id="spara019"><span data-dcnode-id="9585" instrument_node="">ACS, acute coronary syndrome; ASCVD, atherosclerotic cardiovascular disease; CABG, coronary artery bypass graft; FH, familial hypercholesterolemia; LDL-C, low density lipoprotein cholesterol; MI, myocardial infarction; PAD, peripheral arterial disease; PCSK9, proprotein convertase subtilisin/kexin type 9.</span></p><p></p></div></div><p data-dcnode-id="9557" id="para0059"><span data-dcnode-id="9580" instrument_node="">The previous 2016 CCS dyslipidemia guidelines did not emphasize the role of plasma triglyceride levels as a threshold or target for lipid-lowering therapy aimed at reducing CVD risk.</span><a class="workspace-trigger" data-dcnode-id="9577" href="#bib0001" name="bbib0001"><sup data-dcnode-id="9578"><span data-dcnode-id="9579" instrument_node="">1</span></sup></a><span data-dcnode-id="9576" instrument_node=""> However, the recent </span><strong data-dcnode-id="9574"><span data-dcnode-id="9575" instrument_node="">Redu</span></strong><span data-dcnode-id="9573" instrument_node="">ction of </span><strong data-dcnode-id="9571"><span data-dcnode-id="9572" instrument_node="">C</span></strong><span data-dcnode-id="9570" instrument_node="">ardiovascular </span><strong data-dcnode-id="9568"><span data-dcnode-id="9569" instrument_node="">E</span></strong><span data-dcnode-id="9567" instrument_node="">vents With Icosapent Ethyl-</span><strong data-dcnode-id="9565"><span data-dcnode-id="9566" instrument_node="">I</span></strong><span data-dcnode-id="9564" instrument_node="">ntervention </span><strong data-dcnode-id="9562"><span data-dcnode-id="9563" instrument_node="">T</span></strong><span data-dcnode-id="9561" instrument_node="">rial (REDUCE-IT) showed a CV risk reduction (including reduction in CV death) in patients with ASCVD (as well as in those 50 years old or older with type 2 diabetes requiring medication treatment and at least 1 additional CVD risk factor) receiving moderate and high-intensity statin therapy with triglyceride levels of 1.5-5.6 mmol/L and LDL-C levels of 1.1-2.6 mmol/L.</span><a class="workspace-trigger" data-dcnode-id="9558" href="#bib0116" name="bbib0116"><sup data-dcnode-id="9559"><span data-dcnode-id="9560" instrument_node="">114</span></sup></a></p><p data-dcnode-id="9505" id="para9008"><span class="display" data-dcnode-id="9506"></span></p><div aria-label="Unlabelled box" class="article-textbox" data-dcnode-id="9507" id="tbox0006" role="region"><span data-dcnode-id="9554" id="tbcap5"><p data-dcnode-id="9555" id="spara026"><span data-dcnode-id="9556" instrument_node="">RECOMMENDATION</span></p></span><div data-dcnode-id="9508"><p data-dcnode-id="9531" id="para9009"></p><dl class="list" data-dcnode-id="9532"><dt class="list-label" data-dcnode-id="9552"><span data-dcnode-id="9553" instrument_node="">10.</span></dt><dd class="list-description" data-dcnode-id="9549"><p data-dcnode-id="9550" id="para0060"><span data-dcnode-id="9551" instrument_node="">We recommend use of high-intensity statin therapy in addition to appropriate health behaviour modifications for all secondary prevention CVD patients. For patients who do not tolerate a high-intensity statins, we recommend the maximally tolerated statin dose (Strong Recommendation; High-Quality Evidence).</span></p></dd><dt class="list-label" data-dcnode-id="9547"><span data-dcnode-id="9548" instrument_node="">11.</span></dt><dd class="list-description" data-dcnode-id="9538"><p data-dcnode-id="9539" id="para0061"><span data-dcnode-id="9546" instrument_node="">We recommend intensification of lipid-lowering therapy with a PCSK9 inhibitor (evolocumab or alirocumab)—with or without the additional use of ezetimibe—for secondary CV prevention patients shown to derive the largest benefit from PCSK9 inhibitor therapy in whom LDL-C remains ≥ 1.8 mmol/L (or non-HDL-C ≥ 2.4 mmol/L or ApoB ≥ 0.7 g/L) while receiving the maximally tolerated statin dose (</span><a class="workspace-trigger" data-dcnode-id="9544" href="#fig0003" name="bfig0003"><span data-dcnode-id="9545" instrument_node="">Fig. 3</span></a><span data-dcnode-id="9543" instrument_node="">; Strong Recommendation; Moderate-Quality Evidence). Secondary prevention patients shown to derive the largest benefit from intensification of statin therapy with PCSK9 inhibitor therapy are defined in </span><a class="workspace-trigger" data-dcnode-id="9541" href="#tbl0003" name="btbl0003"><span data-dcnode-id="9542" instrument_node="">Table 3</span></a><span data-dcnode-id="9540" instrument_node="">.</span></p></dd><dt class="list-label" data-dcnode-id="9536"><span data-dcnode-id="9537" instrument_node="">12.</span></dt><dd class="list-description" data-dcnode-id="9533"><p data-dcnode-id="9534" id="para0062"><span data-dcnode-id="9535" instrument_node="">We recommend intensification of lipid-lowering therapy with ezetimibe and/or PCSK9 inhibitor therapy for all secondary prevention CVD patients in whom LDL-C remains ≥ 1.8 mmol/L (or non-HDL-C ≥ 2.4 mmol/L or ApoB ≥ 0.7 g/L) while receiving the maximally tolerated statin dose. (Strong Recommendation; High-Quality Evidence). If ezetimibe is used initially and LDL-C remains ≥ 1.8 mmol/L (or non-HDL-C ≥ 2.4 mmol/L or ApoB ≥ 0.7 g/L) PCSK9 inhibitor therapy is recommended (Strong Recommendation; High-Quality Evidence).</span></p></dd></dl><p></p><p data-dcnode-id="9529" id="para0063"><span data-dcnode-id="9530" instrument_node="">It should be noted that one recommendation on the basis of the evidence review of PICO question 4 were overlapping with a recommendation for PICO question 5 and appear as part of that later section (Recommendation 15).</span></p><p data-dcnode-id="9525" id="para0064"><strong data-dcnode-id="9527"><span data-dcnode-id="9528" instrument_node="">Values and preferences.</span></strong><span data-dcnode-id="9526" instrument_node=""> On the basis of strong evidence for the benefit of intensive LDL-C lowering in secondary prevention, additional lipid-lowering therapy with ezetimibe and PCSK9 inhibitors might also be considered for ASCVD patients with an LDL-C &lt; 1.8 mmol/L, especially for patients considered to be at high risk for recurrent ASCVD events. When initiating intensified lipid-lowering therapy with nonstatin drugs, cost, and access to such therapies should be considered.</span></p><p data-dcnode-id="9509" id="para0065"><span data-dcnode-id="9524" instrument_node="">There is no evidence to suggest any CV or other risks associated with low and very low LDL-C levels in trials with moderate duration of follow-up.</span><a class="workspace-trigger" data-dcnode-id="9521" href="#bib0106" name="bbib0106"><sup data-dcnode-id="9522"><span data-dcnode-id="9523" instrument_node="">104</span></sup></a><sup data-dcnode-id="9519"><span data-dcnode-id="9520" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9516" href="#bib0117" name="bbib0117"><sup data-dcnode-id="9517"><span data-dcnode-id="9518" instrument_node="">115</span></sup></a><sup data-dcnode-id="9514"><span data-dcnode-id="9515" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9511" href="#bib0118" name="bbib0118"><sup data-dcnode-id="9512"><span data-dcnode-id="9513" instrument_node="">116</span></sup></a><span data-dcnode-id="9510" instrument_node=""> Therefore, if intensified lipid-lowering therapy initiated for the previously listed thresholds result in low and very low LDL-C levels, lipid-lowering therapy does generally not require down-titration dose adjustment.</span></p></div></div><p></p><div aria-label="Unlabelled box" class="article-textbox" data-dcnode-id="9458" id="tbox0006" role="region"><p data-dcnode-id="9498" id="para0066"><strong data-dcnode-id="9503"><span data-dcnode-id="9504" instrument_node="">Practical tip.</span></strong><span data-dcnode-id="9502" instrument_node=""> Although there is very good evidence supporting the use of PCSK9 inhibitors in patients with ASCVD (especially those listed in </span><a class="workspace-trigger" data-dcnode-id="9500" href="#tbl0003" name="btbl0003"><span data-dcnode-id="9501" instrument_node="">Table 3</span></a><span data-dcnode-id="9499" instrument_node="">), access might be limited by provincial drug plan coverage in many jurisdictions. Patients with or without private drug plan coverage might need to pay some portion of the cost of these expensive medications. Patient support programs for these medications could be investigated to assist. Clinicians should discuss the indication and potential benefits of a PCSK9 inhibitor with the patient, along with the coverage issues and the potential costs to them. Shared decision-making remains key.</span></p><figure class="figure text-xs" data-dcnode-id="9459" id="fig0003"><span data-dcnode-id="9482"><img alt="Figure 3" aria-describedby="cap0006" data-dcnode-id="9497" height="424" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr3.jpg&amp;raw"><span data-dcnode-id="9496" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9483"><li data-dcnode-id="9490"><a class="anchor download-link u-font-sans" data-dcnode-id="9491" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr3_lrg.jpg" target="_blank" title="Download high-res image (724KB)"><span class="anchor-text" data-dcnode-id="9492"><span data-dcnode-id="9495" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9493"><span data-dcnode-id="9494" instrument_node="">Download high-res image (724KB)</span></span></span></a></li><li data-dcnode-id="9484"><a class="anchor download-link u-font-sans" data-dcnode-id="9485" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0828282X21001653-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9486"><span data-dcnode-id="9489" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9487"><span data-dcnode-id="9488" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9460"><span data-dcnode-id="9461" id="cap0006"><p data-dcnode-id="9462" id="spara003"><span class="label" data-dcnode-id="9480"><span data-dcnode-id="9481" instrument_node="">Figure 3</span></span><span data-dcnode-id="9479" instrument_node="">. </span><span data-dcnode-id="9478" instrument_node="">Treatment intensification approach for patients with atherosclerotic cardiovascular disease (ASCVD). ABI, ankle-brachial index; ApoB, apolipoprotein B; BP, blood pressure; CV, cardiovascular; DM, diabetes mellitus; eGFR, estimated glomerular filtration rate; HDL-C, high-density lipoprotein cholesterol; hsCRP, high-sensitivity C-reactive protein; LDL-C, low-density lipoprotein cholesterol; PCSK9i, proprotein convertase subtilisin/kexin type 9 inhibitor; REDUCE-IT, </span><strong data-dcnode-id="9476"><span data-dcnode-id="9477" instrument_node="">Redu</span></strong><span data-dcnode-id="9475" instrument_node="">ction of Cardiovascular </span><strong data-dcnode-id="9473"><span data-dcnode-id="9474" instrument_node="">E</span></strong><span data-dcnode-id="9472" instrument_node="">vents With </span><strong data-dcnode-id="9470"><span data-dcnode-id="9471" instrument_node="">I</span></strong><span data-dcnode-id="9469" instrument_node="">cosapent Ethyl-</span><strong data-dcnode-id="9467"><span data-dcnode-id="9468" instrument_node="">I</span></strong><span data-dcnode-id="9466" instrument_node="">ntervention </span><strong data-dcnode-id="9464"><span data-dcnode-id="9465" instrument_node="">T</span></strong><span data-dcnode-id="9463" instrument_node="">rial.</span></p></span></span></figure></div></section><section data-dcnode-id="9341" id="sec0018"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9455" id="cesectitle0026"><span data-dcnode-id="9456" instrument_node="">PICO 5: In adults already receiving (or intolerant to) statins, what is the role of nonstatin drugs to reduce CVD risk?</span></h3><section data-dcnode-id="9418" id="sec0019"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9453" id="cesectitle0027"><span data-dcnode-id="9454" instrument_node="">Ezetimibe</span></h4><p data-dcnode-id="9419" id="para0067"><span data-dcnode-id="9452" instrument_node="">Ezetimibe is a cholesterol absorption inhibitor that lowers LDL-C by approximately 20% in addition to a statin regimen or up to 15% as monotherapy. Only in 1 double-blind, RCT has the efficacy of ezetimibe been assessed in reducing CV risk. The IMPROVE-IT showed that ezetimibe 10 mg daily, compared with placebo and used in addition to statin therapy, showed a modest reduction in CV events in 18,144 patients with an ACS within the preceding 10 days.</span><a class="workspace-trigger" data-dcnode-id="9449" href="#bib0100" name="bbib0100"><sup data-dcnode-id="9450"><span data-dcnode-id="9451" instrument_node="">98</span></sup></a><span data-dcnode-id="9448" instrument_node=""> The primary composite outcome of death from CV causes, major coronary events, and nonfatal stroke was 2% lower with ezetimibe (32.7 vs 34.7%; HR, 0.94; 95% CI, 0.89-0.99) for a number need to treat of 50 over 7 years. There were no significant differences between groups in the prespecified safety end points. This evidence informed the 2016 guideline recommendation for ezetimibe as second-line therapy to reduce CV risk in patients with ASCVD if their LDL-C targets were not reached with maximally tolerated statin therapy.</span><a class="workspace-trigger" data-dcnode-id="9445" href="#bib0001" name="bbib0001"><sup data-dcnode-id="9446"><span data-dcnode-id="9447" instrument_node="">1</span></sup></a><span data-dcnode-id="9444" instrument_node=""> Subsequently, in the </span><strong data-dcnode-id="9442"><span data-dcnode-id="9443" instrument_node="">H</span></strong><span data-dcnode-id="9441" instrument_node="">eart </span><strong data-dcnode-id="9439"><span data-dcnode-id="9440" instrument_node="">I</span></strong><span data-dcnode-id="9438" instrument_node="">nstitute&nbsp;of&nbsp;</span><strong data-dcnode-id="9436"><span data-dcnode-id="9437" instrument_node="">J</span></strong><span data-dcnode-id="9435" instrument_node="">apan-</span><strong data-dcnode-id="9433"><span data-dcnode-id="9434" instrument_node="">Pr</span></strong><span data-dcnode-id="9432" instrument_node="">oper Level&nbsp;of&nbsp;Lipid Lowering With </span><strong data-dcnode-id="9430"><span data-dcnode-id="9431" instrument_node="">P</span></strong><span data-dcnode-id="9429" instrument_node="">itavastatin and </span><strong data-dcnode-id="9427"><span data-dcnode-id="9428" instrument_node="">E</span></strong><span data-dcnode-id="9426" instrument_node="">zetimibe in Acute Co</span><strong data-dcnode-id="9424"><span data-dcnode-id="9425" instrument_node="">r</span></strong><span data-dcnode-id="9423" instrument_node="">onary Syndrome (HIJ-PROPER) trial open-label pitavastatin with ezetimibe (target LDL-C &lt; 1.8 mmol/L) was compared with pitavastatin monotherapy (target LDL-C 2.3-2.6 mmol/L) in 1734 Japanese patients with an ACS. Over 3.9 years, the primary composite outcome of all-cause death, nonfatal MI, nonfatal stroke, unstable angina, and ischemia-driven revascularization was not significantly different between groups (32.8 vs 36.9%; HR 0.89; 95% CI, 0.76-1.04).</span><a class="workspace-trigger" data-dcnode-id="9420" href="#bib0119" name="bbib0119"><sup data-dcnode-id="9421"><span data-dcnode-id="9422" instrument_node="">117</span></sup></a></p></section><section data-dcnode-id="9342" id="sec0020"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9416" id="cesectitle0028"><span data-dcnode-id="9417" instrument_node="">PCSK9 inhibitors</span></h4><p data-dcnode-id="9410" id="para0068"><span data-dcnode-id="9415" instrument_node="">Inhibitors of PCSK9 are recently available monoclonal antibodies that lower LDL-C between 50% and 70% when used in addition to statin therapy or as monotherapy.</span><a class="workspace-trigger" data-dcnode-id="9412" href="#bib0120" name="bbib0120"><sup data-dcnode-id="9413"><span data-dcnode-id="9414" instrument_node="">118</span></sup></a><span data-dcnode-id="9411" instrument_node=""> Currently, two PCSK9 inhibitors are approved for use in Canada: alirocumab and evolocumab. Both are approved for the treatment of FH or ASCVD in patients as an adjunct to diet and maximally tolerated statin therapy (with or without ezetimibe) who require additional lowering of LDL-C.</span></p><p data-dcnode-id="9401" id="para0069"><span data-dcnode-id="9409" instrument_node="">The FOURIER trial enrolled 27,564 patients with clinical ASCVD and additional CVD risk factors whose LDL-C remained ≥ 1.8 mmol/L despite maximally tolerated statin therapy. Patients were randomized to receive evolocumab (140 mg subcutaneously (SC) every 2 weeks or 420 mg SC monthly) or placebo.</span><a class="workspace-trigger" data-dcnode-id="9406" href="#bib0091" name="bbib0091"><sup data-dcnode-id="9407"><span data-dcnode-id="9408" instrument_node="">89</span></sup></a><span data-dcnode-id="9405" instrument_node=""> Baseline LDL-C was 2.4 mmol/L, which after 48 weeks was reduced to a median of 0.8 mmol/L (interquartile range, 0.5-1.2 mmol/L) in the evolocumab group. After 2.2 years of follow-up, the primary outcome of CV death, nonfatal MI, nonfatal stroke, hospitalization for unstable angina, and coronary revascularization was lower with evolocumab (9.8% vs 11.3%; HR, 0.85; 95% CI, 0.79-0.92) for a number needed to treat of 67. Evolocumab also reduced the secondary end point of CV death, nonfatal MI, and nonfatal stroke (5.9% vs 7.4%; HR, 0.80; 95% CI, 0.73-0.88). There was no significant difference in CV or all-cause death. Serious adverse events were similar between groups, although injection site reactions were higher with evolocumab (2.1% vs 1.6%; </span><em data-dcnode-id="9403"><span data-dcnode-id="9404" instrument_node="">P</span></em><span data-dcnode-id="9402" instrument_node=""> &lt; 0.001).</span></p><p data-dcnode-id="9392" id="para0070"><span data-dcnode-id="9400" instrument_node="">In the ODYSSEY OUTCOMES trial alirocumab was evaluated in 18,924 patients with a recent (1-12 months) ACS whose LDL-C was ≥ 1.8 mmol/L despite maximally tolerated statin therapy.</span><a class="workspace-trigger" data-dcnode-id="9397" href="#bib0092" name="bbib0092"><sup data-dcnode-id="9398"><span data-dcnode-id="9399" instrument_node="">90</span></sup></a><span data-dcnode-id="9396" instrument_node=""> Participants were randomized to alirocumab (75 mg SC every 2 weeks to achieve an LDL-C of 0.6-1.3 mmol/L) or placebo. The dose of alirocumab was increased to 150 mg SC every 2 weeks if a participant's LDL-C level remained &gt; 1.3 mmol/L or decreased or discontinued if their LDL-C level was &lt; 0.6 mmol/L. The primary outcome of death from coronary heart disease, nonfatal MI, fatal or nonfatal ischemic stroke, or unstable angina requiring hospitalization was lower with alirocumab (9.5% vs 11.1%; HR 0.85; 95% CI, 0.78-0.93) for a number needed to treat of 63 over 2 years. All-cause mortality was numerically lower with alirocumab (3.5% vs 4.1%), but on the basis of the authors’ prespecified hierarchical testing, it is debatable whether this can be considered statistically significant. There was no significant difference in CV death between groups. There was no significant difference in serious adverse events, but injection site reactions were more common with alirocumab (3.8% vs 2.1%; </span><em data-dcnode-id="9394"><span data-dcnode-id="9395" instrument_node="">P</span></em><span data-dcnode-id="9393" instrument_node=""> &lt; 0.001).</span></p><p data-dcnode-id="9386" id="para0071"><span data-dcnode-id="9391" instrument_node="">A recent meta-analysis of 23 trials (including FOURIER and ODYSSEY OUTCOMES) compared PCSK9 inhibitors with control in 60,723 patients.</span><a class="workspace-trigger" data-dcnode-id="9388" href="#bib0121" name="bbib0121"><sup data-dcnode-id="9389"><span data-dcnode-id="9390" instrument_node="">119</span></sup></a><span data-dcnode-id="9387" instrument_node=""> There was a significant reduction in MACE (6.2% vs 8.2%; risk ratio, 0.83; 95% CI, 0.78-0.88) with no significant difference in all-cause mortality (risk ratio 0.93; 95% CI, 0.85-1.02) or safety outcomes. Of note, these trials had short follow-up (median of 2.8 years) and therefore might not have been of sufficient duration to observe a mortality benefit.</span></p><p data-dcnode-id="9358" id="para0072"><span data-dcnode-id="9385" instrument_node="">Although ezetimibe or a PCSK9 inhibitor are reasonable options as monotherapy in patients with complete statin intolerance for LDL-C lowering, there is limited evidence to support either class as an alternative to statin therapy for ASCVD risk reduction. The Study of Alirocumab (REGN727/SAR236553) in Patients With Primary Hypercholesterolemia and Moderate, High, or Very High Cardiovascular (CV) Risk, Who Are Intolerant to Statins (ODYSSEY ALTERNATIVE) trial enrolled 314 patients with statin intolerance who were randomized to alirocumab 75 mg SC every 2 weeks, ezetimibe 10 mg daily, or atorvastatin 20 mg daily.</span><a class="workspace-trigger" data-dcnode-id="9382" href="#bib0122" name="bbib0122"><sup data-dcnode-id="9383"><span data-dcnode-id="9384" instrument_node="">120</span></sup></a><span data-dcnode-id="9381" instrument_node=""> At 24 weeks, alirocumab reduced LDL-C by a mean difference of 30% compared with ezetimibe. Skeletal muscle-related adverse effects were high overall, but significantly lower with alirocumab (33%) vs atorvastatin (46%) and similar to ezetimibe (41%). The </span><strong data-dcnode-id="9379"><span data-dcnode-id="9380" instrument_node="">G</span></strong><span data-dcnode-id="9378" instrument_node="">oal </span><strong data-dcnode-id="9376"><span data-dcnode-id="9377" instrument_node="">A</span></strong><span data-dcnode-id="9375" instrument_node="">chievement After </span><strong data-dcnode-id="9373"><span data-dcnode-id="9374" instrument_node="">U</span></strong><span data-dcnode-id="9372" instrument_node="">tilizing an Anti-PCSK9 Antibody in </span><strong data-dcnode-id="9370"><span data-dcnode-id="9371" instrument_node="">S</span></strong><span data-dcnode-id="9369" instrument_node="">tatin Intolerant </span><strong data-dcnode-id="9367"><span data-dcnode-id="9368" instrument_node="">S</span></strong><span data-dcnode-id="9366" instrument_node="">ubjects-3 (GAUSS-3) trial included 218 patients considered to have previous statin intolerance who were randomized to evolocumab 420 mg SC monthly or ezetimibe 10 mg orally daily.</span><a class="workspace-trigger" data-dcnode-id="9363" href="#bib0123" name="bbib0123"><sup data-dcnode-id="9364"><span data-dcnode-id="9365" instrument_node="">121</span></sup></a><span data-dcnode-id="9362" instrument_node=""> Evolocumab showed a significantly greater reduction in LDL-C compared with ezetimibe (mean difference, 36%) at 24 weeks. The incidence of muscle symptoms was relatively high in both groups, but the difference was not statistically significant (21% vs 29%; </span><em data-dcnode-id="9360"><span data-dcnode-id="9361" instrument_node="">P</span></em><span data-dcnode-id="9359" instrument_node=""> = 0.17).</span></p><p data-dcnode-id="9343" id="para0073"><span data-dcnode-id="9357" instrument_node="">Clinical trials have shown that PCSK9 inhibitors are effective at lowering LDL-C in patients with heterozygous FH</span><a class="workspace-trigger" data-dcnode-id="9354" href="#bib0104" name="bbib0104"><sup data-dcnode-id="9355"><span data-dcnode-id="9356" instrument_node="">102</span></sup></a><sup data-dcnode-id="9352"><span data-dcnode-id="9353" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9349" href="#bib0124" name="bbib0124"><sup data-dcnode-id="9350"><span data-dcnode-id="9351" instrument_node="">120</span></sup></a><span data-dcnode-id="9348" instrument_node=""> and in certain patients with homozygous FH,</span><a class="workspace-trigger" data-dcnode-id="9345" href="#bib0093" name="bbib0093"><sup data-dcnode-id="9346"><span data-dcnode-id="9347" instrument_node="">91</span></sup></a><span data-dcnode-id="9344" instrument_node=""> but there is currently a paucity of ASCVD outcome data in these populations.</span></p></section></section><section data-dcnode-id="9264" id="sec0021"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9339" id="cesectitle0029"><span data-dcnode-id="9340" instrument_node="">Primary prevention</span></h3><p data-dcnode-id="9337" id="para0074"><span data-dcnode-id="9338" instrument_node="">There are currently no RCT data supporting the use of PCSK9 inhibitors to reduce CV events in patients who do not have established ASCVD (ie, primary CV prevention) or FH.</span></p><section data-dcnode-id="9273" id="sec0022"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9335" id="cesectitle0030"><span data-dcnode-id="9336" instrument_node="">IPE</span></h4><p data-dcnode-id="9301" id="para0075"><span data-dcnode-id="9334" instrument_node="">Until recently, contemporary trials of omega-3 fatty acid supplements have not shown a CV benefit in patients with or without CVD.</span><a class="workspace-trigger" data-dcnode-id="9331" href="#bib0125" name="bbib0125"><sup data-dcnode-id="9332"><span data-dcnode-id="9333" instrument_node="">123</span></sup></a><sup data-dcnode-id="9329"><span data-dcnode-id="9330" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9326" href="#bib0126" name="bbib0126"><sup data-dcnode-id="9327"><span data-dcnode-id="9328" instrument_node="">124</span></sup></a><span data-dcnode-id="9325" instrument_node=""> Previously, the </span><strong data-dcnode-id="9323"><span data-dcnode-id="9324" instrument_node="">J</span></strong><span data-dcnode-id="9322" instrument_node="">apan </span><strong data-dcnode-id="9320"><span data-dcnode-id="9321" instrument_node="">E</span></strong><span data-dcnode-id="9319" instrument_node="">PA </span><strong data-dcnode-id="9317"><span data-dcnode-id="9318" instrument_node="">L</span></strong><span data-dcnode-id="9316" instrument_node="">ipid </span><strong data-dcnode-id="9314"><span data-dcnode-id="9315" instrument_node="">I</span></strong><span data-dcnode-id="9313" instrument_node="">ntervention </span><strong data-dcnode-id="9311"><span data-dcnode-id="9312" instrument_node="">S</span></strong><span data-dcnode-id="9310" instrument_node="">tudy (JELIS) showed a reduction in CV events with 1800 mg daily of eicosapentaenoic acid (EPA) combined with a statin, compared with statin monotherapy, in Japanese patients with a total cholesterol ≥ 6.5 mmol/L; however, it was an open-label trial and the primary outcome was driven by a minor reduction in unstable angina.</span><a class="workspace-trigger" data-dcnode-id="9307" href="#bib0127" name="bbib0127"><sup data-dcnode-id="9308"><span data-dcnode-id="9309" instrument_node="">125</span></sup></a><span data-dcnode-id="9306" instrument_node=""> The REDUCE-IT assessed the effect of a pharmaceutical formulation of purified ethyl EPA (IPE), which was recently approved by Health Canada.</span><a class="workspace-trigger" data-dcnode-id="9303" href="#bib0116" name="bbib0116"><sup data-dcnode-id="9304"><span data-dcnode-id="9305" instrument_node="">114</span></sup></a><span data-dcnode-id="9302" instrument_node=""> In total, 8179 patients were included with established ASCVD (or diabetes and ≥ 1 ASCVD risk factor) who were receiving statin therapy but had an elevated fasting triglyceride level of 1.5-5.6 mmol/L (baseline 2.4 mmol/L). Most patients (71%) were in the secondary prevention cohort. Participants were randomized to 2000 mg of IPE orally twice daily (4 g total per day) or mineral oil as placebo. At 1 year, participants’ triglyceride level in the IPE group was modestly reduced by 0.4 mmol/L (approximately 18%) from baseline. IPE reduced the primary outcome of CV death, nonfatal MI, nonfatal stroke, unstable angina, or CV revascularization (17.2% vs 22.0%; HR, 0.75; 95% CI, 0.68-0.83) for a number needed to treat of 21 over 4.9 years. IPE also significantly reduced the composite of CV death, nonfatal MI, and nonfatal stroke (11.2% vs 14.8%; HR, 0.74; 95% CI, 0.65-0.83), as well as CV death (4.3% vs 5.2%; HR, 0.80; 95% CI, 0.66-0.98), but not all-cause death. Atrial fibrillation and peripheral edema were significantly higher with IPE. Because IPE is a purified form of ethyl EPA, the results of REDUCE-IT cannot be extrapolated to other nonprescription omega-3 fatty acids, which typically contain a mixture of EPA and docosahexaenoic acid (DHA).</span></p><p data-dcnode-id="9274" id="para0076"><span data-dcnode-id="9300" instrument_node="">The Outcomes Study to Assess </span><strong data-dcnode-id="9298"><span data-dcnode-id="9299" instrument_node="">St</span></strong><span data-dcnode-id="9297" instrument_node="">atin </span><strong data-dcnode-id="9295"><span data-dcnode-id="9296" instrument_node="">R</span></strong><span data-dcnode-id="9294" instrument_node="">esidual Risk Reduction With </span><strong data-dcnode-id="9292"><span data-dcnode-id="9293" instrument_node="">E</span></strong><span data-dcnode-id="9291" in
