</span><meta content="Second generation web-based technologies (Web 2.0) such as social media and networking sites are increasingly being used by governments for activities…" data-dcnode-id="9506" property="og:description"><span data-dcnode-id="9505" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0005&quot;>Second generation web-based technologies (Web 2.0) such as social media and networking sites are increasingly being used by governments for activities ranging from open policy making to communication campaigns and customer service. However, this in turn has brought about additional challenges. By its very nature, Web 2.0 technologies are more interactive than the traditional models of information provision or creation of digital services. Such technologies open up a new set of benefits, costs and risks to those government authorities who make use of these social and digital media to enhance their work. This study draws on the extant literature together with an in-depth qualitative case enquiry to propose an emergent framework for evaluating the intra-organisational use of Web 2.0 technologies and its impact on local government. The study findings identified additional four factors (i.e. benefits: <em>intra-marketing</em>, <em>informal engagement</em>, costs: <em>workload constraints</em> and risk: <em>integration with other systems</em>) as part of the evaluation criteria which have not previously been discussed in the existing literature surrounding the context of Web 2.0 use in local government. The study concludes that a combined analysis of the evaluation and impact assessment factors, rather than one particular approach would better assist decision makers when implementing Web 2.0 technologies for use by public administration employees.</p></div></div></div>" data-dcnode-id="9504" lang="en" name="citation_abstract"><span data-dcnode-id="9503" instrument_node="">

gital object identifier" class="doi" data-dcnode-id="8910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.giq.2015.06.004" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="8911" instrument_node="">https://doi.org/10.1016/j.giq.2015.06.004</span></a><a class="rights-and-content" data-dcnode-id="8908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0740624X15000763%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8909" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="8898"><div class="License" data-dcnode-id="8902"><span data-dcnode-id="8905"><span data-dcnode-id="8906" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="8903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8904" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="8899"><span class="access-indicator" data-dcnode-id="8901"></span><span data-dcnode-id="8900" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="8897"></section><section class="ReferencedArticles" data-dcnode-id="8896"></section><div class="PageDivider" data-dcnode-id="8895"></div><div class="Abstracts u-font-serif" data-dcnode-id="8876" id="abstracts"><div class="abstract author" data-dcnode-id="8877" id="ab0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8893"><span data-dcnode-id="8894" instrument_node="">Abstract</span></h2><div data-dcnode-id="8878" id="as0005"><p data-dcnode-id="8879" id="sp0005"><span data-dcnode-id="8892" instrument_node="">Second generation web-based technologies (Web 2.0) such as social media and networking sites are increasingly being used by governments for activities ranging from open policy making to communication campaigns and customer service. However, this in turn has brought about additional challenges. By its very nature, Web 2.0 technologies are more interactive than the traditional models of information provision or creation of digital services. Such technologies open up a new set of benefits, costs and risks to those government authorities who make use of these social and digital media to enhance their work. This study draws on the extant literature together with an in-depth qualitative case enquiry to propose an emergent framework for evaluating the intra-organisational use of Web 2.0 technologies and its impact on local government. The study findings identified additional four factors (i.e. benefits: </span><em data-dcnode-id="8890"><span data-dcnode-id="8891" instrument_node="">intra-marketing</span></em><span data-dcnode-id="8889" instrument_node="">, </span><em data-dcnode-id="8887"><span data-dcnode-id="8888" instrument_node="">informal engagement</span></em><span data-dcnode-id="8886" instrument_node="">, costs: </span><em data-dcnode-id="8884"><span data-dcnode-id="8885" instrument_node="">workload constraints</span></em><span data-dcnode-id="8883" instrument_node=""> and risk: </span><em data-dcnode-id="8881"><span data-dcnode-id="8882" instrument_node="">integration with other systems</span></em><span data-dcnode-id="8880" instrument_node="">) as part of the evaluation criteria which have not previously been discussed in the existing literature surrounding the context of Web 2.0 use in local government. The study concludes that a combined analysis of the evaluation and impact assessment factors, rather than one particular approach would better assist decision makers when implementing Web 2.0 technologies for use by public administration employees.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8853" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8865"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0740624X15300095"><svg class="icon icon-navigate-left" data-dcnode-id="8874" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8875"></path></svg><span class="button-alternative-text" data-dcnode-id="8867"><strong data-dcnode-id="8872"><span data-dcnode-id="8873" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8870"><span data-dcnode-id="8871" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8868"><span data-dcnode-id="8869" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8854"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0740624X15300083"><span class="button-alternative-text" data-dcnode-id="8858"><strong data-dcnode-id="8863"><span data-dcnode-id="8864" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8861"><span data-dcnode-id="8862" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8859"><span data-dcnode-id="8860" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8856" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8857"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8828"><div class="keywords-section" data-dcnode-id="8829" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8851"><span data-dcnode-id="8852" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8848" id="kw0040"><span data-dcnode-id="8849" id="tx0010"><span data-dcnode-id="8850" instrument_node="">Web 2.0</span></span></div><div class="keyword" data-dcnode-id="8845" id="kw0045"><span data-dcnode-id="8846" id="tx0015"><span data-dcnode-id="8847" instrument_node="">Evaluation</span></span></div><div class="keyword" data-dcnode-id="8842" id="kw0050"><span data-dcnode-id="8843" id="tx0020"><span data-dcnode-id="8844" instrument_node="">Impact</span></span></div><div class="keyword" data-dcnode-id="8839" id="kw0055"><span data-dcnode-id="8840" id="tx0025"><span data-dcnode-id="8841" instrument_node="">Local Government Authorities (LGAs)</span></span></div><div class="keyword" data-dcnode-id="8836" id="kw0060"><span data-dcnode-id="8837" id="tx0030"><span data-dcnode-id="8838" instrument_node="">e-Government</span></span></div><div class="keyword" data-dcnode-id="8833" id="kw0065"><span data-dcnode-id="8834" id="tx0035"><span data-dcnode-id="8835" instrument_node="">Case study</span></span></div><div class="keyword" data-dcnode-id="8830" id="kw0070"><span data-dcnode-id="8831" id="tx0040"><span data-dcnode-id="8832" instrument_node="">Qualitative research</span></span></div></div></div><span data-dcnode-id="8827" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="6017" id="body"><div data-dcnode-id="6018"><section data-dcnode-id="8713" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8821" id="st0015"><span data-dcnode-id="8826" instrument_node="">1</span><span data-dcnode-id="8824" instrument_node="">. </span><span data-dcnode-id="8822" instrument_node="">Introduction</span></h2><p data-dcnode-id="8795" id="p0005"><span data-dcnode-id="8820" instrument_node="">In the past, electronic communication systems such as discussion forums were examples of early forms of digital democracy which now reflect the ideas behind second generation Web (Web 2.0) technologies such as social media (e.g. Wikis, Blogs) and networking sites (e.g. Facebook, Twitter) (</span><a class="workspace-trigger" data-dcnode-id="8818" href="#bb0025" name="bbb0025"><span data-dcnode-id="8819" instrument_node="">Anttiroiko, 2010</span></a><span data-dcnode-id="8817" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8815" href="#bb0200" name="bbb0200"><span data-dcnode-id="8816" instrument_node="">Grimmelikhuijsen and Meijer, 2015</span></a><span data-dcnode-id="8814" instrument_node="">). According to </span><a class="workspace-trigger" data-dcnode-id="8812" href="#bb0340" name="bbb0340"><span data-dcnode-id="8813" instrument_node="">O'Reilly (2007)</span></a><span data-dcnode-id="8811" instrument_node="">, Web 2.0 technologies are a simple and effective second generation of web services that provide a social and participatory virtual platform for organisations to collaborate, network and interact with stakeholders. With the widespread acceptance of electronic government (e-Government) in the public sector, government authorities have followed the private sector in implementing and exploring the use of Web 2.0 technologies (</span><a class="workspace-trigger" data-dcnode-id="8809" href="#bb0065" name="bbb0065"><span data-dcnode-id="8810" instrument_node="">Bonsón et al., 2015</span></a><span data-dcnode-id="8808" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8806" href="#bb0125" name="bbb0125"><span data-dcnode-id="8807" instrument_node="">Dadashzadeh, 2010</span></a><span data-dcnode-id="8805" instrument_node="">). However, government organisations cannot afford to use the same trial and error approach adopted by commercial organisations and have an obligation to implement new technologies responsibly and in a way that does not compromise privacy and security. At the same time, there is also added stakeholder pressure on government officials to be accountable for public finances spent on information and communications technology (ICT) projects (</span><a class="workspace-trigger" data-dcnode-id="8803" href="#bb0270" name="bbb0270"><span data-dcnode-id="8804" instrument_node="">Kinder, 2010</span></a><span data-dcnode-id="8802" instrument_node="">). With the increasing demands and expectations of their stakeholders, government agencies now need to deliver more efficient and effective public services while overcoming the burden of reduced public budgets and resources. It is in this context that government leaders have recognised the opportunities that Web 2.0 technologies offer, not just for engaging with citizens, but also in helping them do a better job (</span><a class="workspace-trigger" data-dcnode-id="8800" href="#bb0190" name="bbb0190"><span data-dcnode-id="8801" instrument_node="">Gov.uk, 2014</span></a><span data-dcnode-id="8799" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8797" href="#bb0290" name="bbb0290"><span data-dcnode-id="8798" instrument_node="">Lathrop and Ruma, 2010</span></a><span data-dcnode-id="8796" instrument_node="">).</span></p><p data-dcnode-id="8748" id="p0010"><span data-dcnode-id="8794" instrument_node="">There is an increasing number of studies emerging on the use of Web 2.0 on various public sector domains ranging from politics to health (</span><a class="workspace-trigger" data-dcnode-id="8792" href="#bb9015" name="bbb9015"><span data-dcnode-id="8793" instrument_node="">Anfinnsen et al., 2011</span></a><span data-dcnode-id="8791" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8789" href="#bb0470" name="bbb0470"><span data-dcnode-id="8790" instrument_node="">Wattal et al., 2010</span></a><span data-dcnode-id="8788" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8786" href="#bb9005" name="bbb9005"><span data-dcnode-id="8787" instrument_node="">Hughes et al., 2009</span></a><span data-dcnode-id="8785" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8783" href="#bb9020" name="bbb9020"><span data-dcnode-id="8784" instrument_node="">Ajjan and Hartshorne, 2008</span></a><span data-dcnode-id="8782" instrument_node="">). From an e-Government context, existing studies have illustrated the benefits of social media by the government in terms of openness, transparency and accountability (</span><a class="workspace-trigger" data-dcnode-id="8780" href="#bb0050" name="bbb0050"><span data-dcnode-id="8781" instrument_node="">Bertot et al., 2012</span></a><span data-dcnode-id="8779" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8777" href="#bb0440" name="bbb0440"><span data-dcnode-id="8778" instrument_node="">Stamati et al., 2015</span></a><span data-dcnode-id="8776" instrument_node="">), citizen-empowerment (</span><a class="workspace-trigger" data-dcnode-id="8774" href="#bb0295" name="bbb0295"><span data-dcnode-id="8775" instrument_node="">Linders, 2012</span></a><span data-dcnode-id="8773" instrument_node="">) and engaging with public authorities (</span><a class="workspace-trigger" data-dcnode-id="8771" href="#bb0200" name="bbb0200"><span data-dcnode-id="8772" instrument_node="">Grimmelikhuijsen &amp; Meijer, 2015</span></a><span data-dcnode-id="8770" instrument_node="">), in crisis situations (</span><a class="workspace-trigger" data-dcnode-id="8768" href="#bb0365" name="bbb0365"><span data-dcnode-id="8769" instrument_node="">Panagiotopoulos, Bigdeli, &amp; Sams, 2014</span></a><span data-dcnode-id="8767" instrument_node="">), as well as their use in political campaigns and presidential elections (</span><a class="workspace-trigger" data-dcnode-id="8765" href="#bb0225" name="bbb0225"><span data-dcnode-id="8766" instrument_node="">Hong and Nadler, 2012</span></a><span data-dcnode-id="8764" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8762" href="#bb0250" name="bbb0250"><span data-dcnode-id="8763" instrument_node="">Jaeger et al., 2010</span></a><span data-dcnode-id="8761" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8759" href="#bb0470" name="bbb0470"><span data-dcnode-id="8760" instrument_node="">Wattal et al., 2010</span></a><span data-dcnode-id="8758" instrument_node="">). However, the challenge for government organisations is in evaluating the use of existing Web 2.0 applications for intra-organisational operations and exploring the extent of their impact. Although most local governments have used Web 2.0 applications for engaging with citizens (i.e. for external service contexts), the embryonic nature of Web 2.0 use for internal operations in local government means that its potential impact has not yet been fully explored empirically. Research into Web 2.0 use and its impact at local government level is still tentative and remains a developing area as highlighted by </span><a class="workspace-trigger" data-dcnode-id="8756" href="#bb0015" name="bbb0015"><span data-dcnode-id="8757" instrument_node="">Ala-Mutka et al. (2013)</span></a><span data-dcnode-id="8755" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8753" href="#bb0050" name="bbb0050"><span data-dcnode-id="8754" instrument_node="">Bertot et al. (2012)</span></a><span data-dcnode-id="8752" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="8750" href="#bb0010" name="bbb0010"><span data-dcnode-id="8751" instrument_node="">Adams and Smith, (2010)</span></a><span data-dcnode-id="8749" instrument_node="">. Also, the very few studies that exist in this domain lack theoretical underpinning and the backing of empirical research.</span></p><p data-dcnode-id="8724" id="p0015"><span data-dcnode-id="8747" instrument_node="">The aim of this study is to identify the criteria which influence the use of Web 2.0 applications for intra-organisational operations in local government. To do so, an emergent framework is formulated that draws on the extant literature together with an in-depth qualitative case enquiry and classifies Web 2.0 evaluation criteria based upon benefits, costs and risks. In addition, this framework also encapsulates the impact factors associated with the use of Web 2.0 applications according to organisational, technological and social themes. In this study, intra-organisational and internal organisational use refers to employees' making use of Web 2.0 applications for work related activities in an e-Government context, rather than for external engagement with citizens. The study seeks to contribute to the emerging field of Web 2.0 use in local government, specifically by focusing on the following research questions:</span></p><dl class="list" data-dcnode-id="8725"><dt class="list-label" data-dcnode-id="8745"><span data-dcnode-id="8746" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="8742"><p data-dcnode-id="8743" id="p0365"><span data-dcnode-id="8744" instrument_node="">How should local government authorities approach the effective intra-organisational use of Web 2.0 technologies in the context of e-Government?</span></p></dd><dt class="list-label" data-dcnode-id="8740"><span data-dcnode-id="8741" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="8734"><p data-dcnode-id="8735" id="p0370"><span data-dcnode-id="8739" instrument_node="">What are the </span><em data-dcnode-id="8737"><span data-dcnode-id="8738" instrument_node="">evaluation criteria</span></em><span data-dcnode-id="8736" instrument_node=""> that a local government authority can use to assess Web 2.0 technologies for internal work?</span></p></dd><dt class="list-label" data-dcnode-id="8732"><span data-dcnode-id="8733" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="8726"><p data-dcnode-id="8727" id="p0375"><span data-dcnode-id="8731" instrument_node="">What is the </span><em data-dcnode-id="8729"><span data-dcnode-id="8730" instrument_node="">impact</span></em><span data-dcnode-id="8728" instrument_node=""> of using Web 2.0 technologies by a local government authority for internal work?</span></p></dd></dl><p></p><p data-dcnode-id="8716"><span data-dcnode-id="8723" instrument_node="">The focus of the study is not to offer prescriptive guidelines on Web 2.0 use, but rather allows others to draw parallels and relate their experiences to those reported. As a result, the outcome of the study is to offer a broader understanding of the emerging phenomenon of Web 2.0 use for internal administration and operational purposes in local government from an employees' perspective. Given the evolving nature of Web 2.0 technologies and their use in an e-Government context, establishing the evaluation criteria and impact can help government officials to understand the real value of these applications and how they can be leveraged to better engage with their stakeholders. Moreover, recognising the real value of Web 2.0 technologies may also help change government officials' existing negative perceptions associated with applications such as social networking sites being a distraction for employees (</span><a class="workspace-trigger" data-dcnode-id="8721" href="#bb0415" name="bbb0415"><span data-dcnode-id="8722" instrument_node="">Sander, 2008</span></a><span data-dcnode-id="8720" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8718" href="#bb0435" name="bbb0435"><span data-dcnode-id="8719" instrument_node="">Sivarajah et al., 2014</span></a><span data-dcnode-id="8717" instrument_node="">).</span></p><p data-dcnode-id="8714" id="p0020"><span data-dcnode-id="8715" instrument_node="">In order to realise the study aim and answer the research questions, this paper first reviews the extant literature surrounding the use of Web 2.0 technologies in the context of e-Government. Following which, the research methodology and the case study findings are reported. This study then proposes the emergent framework for Web 2.0 use in local government and provides a research synthesis. The paper concludes by highlighting the key findings, theoretical and practical contributions, limitations and future research directions. This study will be of significant relevance to the public sector and ICT research community, policy makers, local government authorities and practitioners.</span></p></section><section data-dcnode-id="7866" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8707" id="st0020"><span data-dcnode-id="8712" instrument_node="">2</span><span data-dcnode-id="8710" instrument_node="">. </span><span data-dcnode-id="8708" instrument_node="">Web 2.0 use in the context of e-Government</span></h2><p data-dcnode-id="8678" id="p0030"><span data-dcnode-id="8706" instrument_node="">There have been many discussions emerging in the existing literature on the potential of Web 2.0 technologies for transforming governments (</span><a class="workspace-trigger" data-dcnode-id="8704" href="#bb0310" name="bbb0310"><span data-dcnode-id="8705" instrument_node="">Meijer and Thaens, 2010</span></a><span data-dcnode-id="8703" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8701" href="#bb0440" name="bbb0440"><span data-dcnode-id="8702" instrument_node="">Stamati et al., 2015</span></a><span data-dcnode-id="8700" instrument_node="">). Terms such as “e-Government 2.0”, “Government 2.0” and “eGov. 2.0” have been used to describe a new government paradigm which challenges traditional government and governance by incorporating Web 2.0 fundamentals in digital government environments (</span><a class="workspace-trigger" data-dcnode-id="8698" href="#bb0155" name="bbb0155"><span data-dcnode-id="8699" instrument_node="">Drogkaris et al., 2010</span></a><span data-dcnode-id="8697" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8695" href="#bb0260" name="bbb0260"><span data-dcnode-id="8696" instrument_node="">Johannessen and Rohde, 2010</span></a><span data-dcnode-id="8694" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="8692" href="#bb0315" name="bbb0315"><span data-dcnode-id="8693" instrument_node="">Mergel, Schweik, and Fountain (2009)</span></a><span data-dcnode-id="8691" instrument_node=""> highlighted that the use of these Web 2.0 technologies has the potential for public institutions to create transformative opportunities in relation to their key issues of transparency, accountability, communication and collaboration and to promote user engagement. Although the literature explores how governments may leverage Web 2.0 mainly for communication (</span><a class="workspace-trigger" data-dcnode-id="8689" href="#bb0315" name="bbb0315"><span data-dcnode-id="8690" instrument_node="">Mergel et al., 2009</span></a><span data-dcnode-id="8688" instrument_node="">), collaboration (</span><a class="workspace-trigger" data-dcnode-id="8686" href="#bb0115" name="bbb0115"><span data-dcnode-id="8687" instrument_node="">Cole, 2009</span></a><span data-dcnode-id="8685" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8683" href="#bb0130" name="bbb0130"><span data-dcnode-id="8684" instrument_node="">Danis et al., 2009</span></a><span data-dcnode-id="8682" instrument_node="">) and information dissemination (</span><a class="workspace-trigger" data-dcnode-id="8680" href="#bb0090" name="bbb0090"><span data-dcnode-id="8681" instrument_node="">Chadwick, 2009</span></a><span data-dcnode-id="8679" instrument_node="">), the literature is sparse regarding the evaluation and impact of Web 2.0 use in the digital government context.</span></p><section data-dcnode-id="8095" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8672" id="st0025"><span data-dcnode-id="8677" instrument_node="">2.1</span><span data-dcnode-id="8675" instrument_node="">. </span><span data-dcnode-id="8673" instrument_node="">Evaluating the use of Web 2.0 in e-Government</span></h3><p data-dcnode-id="8652" id="p0035"><span data-dcnode-id="8671" instrument_node="">Digital government environments have seen significant transformation over the last decade and currently, they continue to evolve by embracing technologies such as Web 2.0 that will not only enhance participation, transparency and integration, but also speed up the pace of innovation (</span><a class="workspace-trigger" data-dcnode-id="8669" href="#bb0155" name="bbb0155"><span data-dcnode-id="8670" instrument_node="">Drogkaris et al., 2010</span></a><span data-dcnode-id="8668" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8666" href="#bb0435" name="bbb0435"><span data-dcnode-id="8667" instrument_node="">Sivarajah et al., 2014</span></a><span data-dcnode-id="8665" instrument_node="">). Web 2.0 technologies and associated applications facilitate collaboration and enable the shift from service-oriented architectures (SOAs) to Web-oriented architectures (WOAs), which has a substantial impact on the ability to transform internal government operations and services (</span><a class="workspace-trigger" data-dcnode-id="8663" href="#bb0460" name="bbb0460"><span data-dcnode-id="8664" instrument_node="">Tsui, Lee, &amp; Yao, 2010</span></a><span data-dcnode-id="8662" instrument_node="">). This means that unlike the traditional e-Government portal systems which government institutions expect users to visit and engage in their own systems, the integration of Web 2.0 applications drives the government towards genuine engagement with the public in their own environment (</span><a class="workspace-trigger" data-dcnode-id="8660" href="#bb0005" name="bbb0005"><span data-dcnode-id="8661" instrument_node="">Accenture, 2009</span></a><span data-dcnode-id="8659" instrument_node="">). As </span><a class="workspace-trigger" data-dcnode-id="8657" href="#bb0480" name="bbb0480"><span data-dcnode-id="8658" instrument_node="">West (2008)</span></a><span data-dcnode-id="8656" instrument_node=""> points out, the integration of interactive features such as innovative online consultation mechanisms (e.g. live chat) and web comment forms has enabled governments to gather the views of the public on policy options and to gather feedback on proposals by setting up simple forms that can be completed online improving the capacity to gather feedback. As both technology and expectations change, it is likely that the demand for interaction in digital government provision will increase. The use of Web 2.0 is still embryonic within government organisations and there is still much debate about whether it is a technology, a philosophy or concept (</span><a class="workspace-trigger" data-dcnode-id="8654" href="#bb0275" name="bbb0275"><span data-dcnode-id="8655" instrument_node="">Klievink &amp; Janssen, 2010</span></a><span data-dcnode-id="8653" instrument_node="">). In this study, the authors consider Web 2.0 as a technology which encompasses the use of applications such as Facebook and Twitter in an e-Government context.</span></p><p data-dcnode-id="8635" id="p0040"><span data-dcnode-id="8651" instrument_node="">Much government activity is now focused on Web 2.0, and social media has become a central component of digital government strategies in a very short period of time (</span><a class="workspace-trigger" data-dcnode-id="8649" href="#bb0045" name="bbb0045"><span data-dcnode-id="8650" instrument_node="">Bertot et al., 2010</span></a><span data-dcnode-id="8648" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8646" href="#bb0065" name="bbb0065"><span data-dcnode-id="8647" instrument_node="">Bonsón et al., 2015</span></a><span data-dcnode-id="8645" instrument_node="">). There are various innovative examples of the use of Web 2.0 technologies for facilitating digital government. For example, Web 2.0 initiatives such as NASA's internal social networks and virtual worlds, the U.S. intelligence community's “intellipedia”, etc. (</span><a class="workspace-trigger" data-dcnode-id="8643" href="#bb0025" name="bbb0025"><span data-dcnode-id="8644" instrument_node="">Anttiroiko, 2010</span></a><span data-dcnode-id="8642" instrument_node="">). Some local government authorities (LGAs) are also leveraging cloud computing services (e.g. Google Apps for business) in an effort to provide public services while using fewer resources, reducing carbon emissions, and thus producing financial savings for the organisations (</span><a class="workspace-trigger" data-dcnode-id="8640" href="#bb0205" name="bbb0205"><span data-dcnode-id="8641" instrument_node="">Guardian, 2011</span></a><span data-dcnode-id="8639" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8637" href="#bb0510" name="bbb0510"><span data-dcnode-id="8638" instrument_node="">Zissis and Lekkas, 2011</span></a><span data-dcnode-id="8636" instrument_node="">). Yet, in all aforementioned cases, the use of Web 2.0 technologies is still a novel and challenging idea that it is not an integral part of the official governance policy of any government.</span></p><p data-dcnode-id="8618" id="p0045"><span data-dcnode-id="8634" instrument_node="">Although the examples highlighted above provide a clear idea of the significant role of Web 2.0 in digital government, it is too early to deduce the importance of these technologies by simply reviewing Web 2.0 experiences in government organisations. Therefore, to fully understand the real value of these technologies for government organisations, it is necessary to evaluate and articulate the impacts of Web 2.0 in the digital government domain, including its associated benefits, costs and risks. According to </span><a class="workspace-trigger" data-dcnode-id="8632" href="#bb0180" name="bbb0180"><span data-dcnode-id="8633" instrument_node="">Freeman and Loo (2009)</span></a><span data-dcnode-id="8631" instrument_node="">, in any consideration of using new technology, attention must be paid to the benefits, costs and risks of its use. Revolutionary digital communications comes filled with both potential opportunities and risks and within the context of e-Government evaluating these prospects and threats are the due responsibility of government when using such ICT tools (</span><a class="workspace-trigger" data-dcnode-id="8629" href="#bb0280" name="bbb0280"><span data-dcnode-id="8630" instrument_node="">Klischewski, 2010</span></a><span data-dcnode-id="8628" instrument_node="">). Furthermore, when implementing ICT-related projects (such as e-Government), it is important for managers to better understand the impact of IS on organisational performance and their influence in realising the financial and social implications (</span><a class="workspace-trigger" data-dcnode-id="8626" href="#bb0245" name="bbb0245"><span data-dcnode-id="8627" instrument_node="">Irani and Love, 2008</span></a><span data-dcnode-id="8625" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8623" href="#bb0475" name="bbb0475"><span data-dcnode-id="8624" instrument_node="">Weerakkody et al., 2011</span></a><span data-dcnode-id="8622" instrument_node="">). Failure of such understanding can lead to disastrous consequences such as inappropriate resource allocation (</span><a class="workspace-trigger" data-dcnode-id="8620" href="#bb0175" name="bbb0175"><span data-dcnode-id="8621" instrument_node="">Farbey, Land, &amp; Targett, 1993</span></a><span data-dcnode-id="8619" instrument_node="">). However, if managers' can better understand this, it can then help an organisation to better utilise its resources and improve its overall efficiency.</span></p><p data-dcnode-id="8580" id="p0050"><span data-dcnode-id="8617" instrument_node="">Like any other IT investment, Web 2.0 investments in government organisations also need to be planned as they require organisational change to culture, people, structure and processes to be managed in order to obtain effective results (</span><a class="workspace-trigger" data-dcnode-id="8615" href="#bb0125" name="bbb0125"><span data-dcnode-id="8616" instrument_node="">Dadashzadeh, 2010</span></a><span data-dcnode-id="8614" instrument_node="">).Therefore, a systematic evaluative approach is necessary prior to placing government information and providing services online using Web 2.0 technologies as the integration of these technologies in digital government should not be done arbitrarily. This approach will help to deliver more objective and robust arguments about the impacts of Web 2.0 use in e-Government and also enable organisations to build a strong business case for the deployment of these applications. Additionally, the factor(s) may provide a deeper understanding of Web 2.0 applications which then, in turn, may have an influence on the decision-making process for Web 2.0 use in e-Government. In this context, the analysis of various IS evaluation taxonomies such as benefits (</span><a class="workspace-trigger" data-dcnode-id="8612" href="#bb0020" name="bbb0020"><span data-dcnode-id="8613" instrument_node="">Andresen et al., 2000</span></a><span data-dcnode-id="8611" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8609" href="#bb0430" name="bbb0430"><span data-dcnode-id="8610" instrument_node="">Shang and Seddon, 2002</span></a><span data-dcnode-id="8608" instrument_node="">), costs (</span><a class="workspace-trigger" data-dcnode-id="8606" href="#bb9010" name="bbb9010"><span data-dcnode-id="8607" instrument_node="">David et al., 2002</span></a><span data-dcnode-id="8605" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8603" href="#bb0240" name="bbb0240"><span data-dcnode-id="8604" instrument_node="">Irani and Love, 2002</span></a><span data-dcnode-id="8602" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8600" href="#bb0285" name="bbb0285"><span data-dcnode-id="8601" instrument_node="">Kusters and Renkema, 1996</span></a><span data-dcnode-id="8599" instrument_node="">) and risks (</span><a class="workspace-trigger" data-dcnode-id="8597" href="#bb0040" name="bbb0040"><span data-dcnode-id="8598" instrument_node="">Benaroch, 2002</span></a><span data-dcnode-id="8596" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8594" href="#bb0450" name="bbb0450"><span data-dcnode-id="8595" instrument_node="">Sumner, 2000</span></a><span data-dcnode-id="8593" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8591" href="#bb0500" name="bbb0500"><span data-dcnode-id="8592" instrument_node="">Wu and Ong, 2008</span></a><span data-dcnode-id="8590" instrument_node="">) was undertaken to establish an understanding of existing IS evaluation models. A review of these taxonomies resulted in the extrapolation of appropriate dimensions to systematically categorise the identified Web 2.0 factors. Consequently, the three chosen IS evaluation approaches compromised of the benefits, costs and risks factors proposed by </span><a class="workspace-trigger" data-dcnode-id="8588" href="#bb0430" name="bbb0430"><span data-dcnode-id="8589" instrument_node="">Shang and Seddon (2002)</span></a><span data-dcnode-id="8587" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8585" href="#bb0235" name="bbb0235"><span data-dcnode-id="8586" instrument_node="">Irani and Love (2001)</span></a><span data-dcnode-id="8584" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="8582" href="#bb0040" name="bbb0040"><span data-dcnode-id="8583" instrument_node="">Benaroch (2002)</span></a><span data-dcnode-id="8581" instrument_node="">, respectively. These taxonomies helped form the IS evaluation criteria and were used as a frame of reference to assess Web 2.0 applications prior to their implementation by government organisations.</span></p><section data-dcnode-id="8381" id="s0020"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8574" id="st0030"><span data-dcnode-id="8579" instrument_node="">2.1.1</span><span data-dcnode-id="8577" instrument_node="">. </span><span data-dcnode-id="8575" instrument_node="">Classification of the benefits of Web 2.0 technologies</span></h4><p data-dcnode-id="8554" id="p0055"><span data-dcnode-id="8573" instrument_node="">There are several different models such as those proposed by </span><a class="workspace-trigger" data-dcnode-id="8571" href="#bb0410" name="bbb0410"><span data-dcnode-id="8572" instrument_node="">Ross and Vitale (2000)</span></a><span data-dcnode-id="8570" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8568" href="#bb0495" name="bbb0495"><span data-dcnode-id="8569" instrument_node="">Wilderman (1999)</span></a><span data-dcnode-id="8567" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="8565" href="#bb0465" name="bbb0465"><span data-dcnode-id="8566" instrument_node="">Ward, Taylor, and Bond (1996)</span></a><span data-dcnode-id="8564" instrument_node=""> that exist in the academic literature to classify the evaluation of the benefits of information systems. Most of these studies concentrate on the organisational benefits ranging from operational improvements through to decision-making enhancements for organisations to support their strategic goals. However, building on the existing research into IT benefits, </span><a class="workspace-trigger" data-dcnode-id="8562" href="#bb0430" name="bbb0430"><span data-dcnode-id="8563" instrument_node="">Shang and Seddon (2002)</span></a><span data-dcnode-id="8561" instrument_node=""> propose a five dimension benefit framework for assessing enterprise systems in a more broad and objective manner. In addition to identifying dimensions such as operational, managerial and strategic efficiency, the value of IT infrastructure and organisational benefits were identified as important factors that could contribute to an organisation. This framework was used as it offers a comprehensive and broad perspective for analysing the benefits of IT systems due to its continuous validation made in many studies (e.g. </span><a class="workspace-trigger" data-dcnode-id="8559" href="#bb0165" name="bbb0165"><span data-dcnode-id="8560" instrument_node="">Eckartz et al., 2009</span></a><span data-dcnode-id="8558" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8556" href="#bb0390" name="bbb0390"><span data-dcnode-id="8557" instrument_node="">Poba-Nzaou et al., 2014</span></a><span data-dcnode-id="8555" instrument_node="">), thus making it reliable.</span></p><div data-dcnode-id="8382"><p data-dcnode-id="8528" id="p0060"><span data-dcnode-id="8553" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="8551" href="#bb0430" name="bbb0430"><span data-dcnode-id="8552" instrument_node="">Shang and Seddon (2002)</span></a><span data-dcnode-id="8550" instrument_node="">, five major classifications of benefits have been identified and each is subdivided into two or more ‘factors’ that set out ways in which Web 2.0 can benefit an organisation. The first dimension; </span><em data-dcnode-id="8548"><span data-dcnode-id="8549" instrument_node="">operational benefits</span></em><span data-dcnode-id="8547" instrument_node=""> reflects the positive impact that a technology has on organisational operational activities that are usually repeated periodically. These benefits could consist of streamlining and automation of processes that could result in cost reduction, improved productivity and better customer service. The second dimension — </span><em data-dcnode-id="8545"><span data-dcnode-id="8546" instrument_node="">managerial benefits</span></em><span data-dcnode-id="8544" instrument_node=""> explores the benefits of IS on activities involving allocation and control of an organisation's resources and facilitating strategic decisions. For example, benefits such as the ability of an IS to provide real time information may help an organisation to achieve better resource management and improved decision-making and planning. Third, s</span><em data-dcnode-id="8542"><span data-dcnode-id="8543" instrument_node="">trategic benefits</span></em><span data-dcnode-id="8541" instrument_node=""> deal with the potential of IS to achieve strategic benefits such as business growth, alliances, innovation, differentiation etc. Fourth, the </span><em data-dcnode-id="8539"><span data-dcnode-id="8540" instrument_node="">IT infrastructure</span></em><span data-dcnode-id="8538" instrument_node=""> dimension presents the use of technology to allow for sharable and reusable IT resources that provide a foundation for present and future business applications. Finally, the </span><em data-dcnode-id="8536"><span data-dcnode-id="8537" instrument_node="">organisational</span></em><span data-dcnode-id="8535" instrument_node=""> dimension entails benefits such as focus, cohesion, learning and execution of strategies for an organisation by the use of an information system. Through a review of the existing literature, the benefits of Web 2.0 have been classified against the five dimensions of </span><a class="workspace-trigger" data-dcnode-id="8533" href="#bb0430" name="bbb0430"><span data-dcnode-id="8534" instrument_node="">Shang and Seddon (2002)</span></a><span data-dcnode-id="8532" instrument_node=""> into a taxonomy given in </span><a class="workspace-trigger" data-dcnode-id="8530" href="#t0005" name="bt0005"><span data-dcnode-id="8531" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="8529" instrument_node=""> below.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8383" id="t0005"><span class="captions" data-dcnode-id="8520"><span data-dcnode-id="8521" id="ca0010"><p data-dcnode-id="8522" id="sp0030"><span class="label" data-dcnode-id="8526"><span data-dcnode-id="8527" instrument_node="">Table&nbsp;1</span></span><span data-dcnode-id="8525" instrument_node="">. </span><span data-dcnode-id="8523" instrument_node="">Classification of the benefits of Web 2.0 in the context of e-Government.</span></p></span></span><div class="groups" data-dcnode-id="8384"><table data-dcnode-id="8385"><thead data-dcnode-id="8510"><tr class="valign-top rowsep-1" data-dcnode-id="8511"><th class="align-left" data-dcnode-id="8518" scope="col"><span data-dcnode-id="8519" instrument_node="">Classification</span></th><th class="align-left" data-dcnode-id="8516" scope="col"><span data-dcnode-id="8517" instrument_node="">Factors</span></th><th class="align-left" data-dcnode-id="8514" scope="col"><span data-dcnode-id="8515" instrument_node="">Description</span></th><th class="align-left" data-dcnode-id="8512" scope="col"><span data-dcnode-id="8513" instrument_node="">References</span></th></tr></thead><tbody data-dcnode-id="8386"><tr class="valign-top" data-dcnode-id="8497"><td class="align-left" data-dcnode-id="8508" rowspan="2"><span data-dcnode-id="8509" instrument_node="">Operational</span></td><td class="align-left" data-dcnode-id="8506"><span data-dcnode-id="8507" instrument_node="">▪Streamline internal operations</span></td><td class="align-left" data-dcnode-id="8504"><span data-dcnode-id="8505" instrument_node="">▪Collaboration applications such as wikis can streamline internal operations within government agencies especially among disparate teams and across agencies enabling individuals to engage in open discussions leading to a potential build-up of knowledge base.</span></td><td class="align-left" data-dcnode-id="8498"><a class="workspace-trigger" data-dcnode-id="8502" href="#bb0085" name="bbb0085"><span data-dcnode-id="8503" instrument_node="">Bughin &amp; Chui (2010)</span></a><span data-dcnode-id="8501" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8499" href="#bb0005" name="bbb0005"><span data-dcnode-id="8500" instrument_node="">Accenture (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8489"><td class="align-left" data-dcnode-id="8495"><span data-dcnode-id="8496" instrument_node="">▪Lower IT costs</span></td><td class="align-left" data-dcnode-id="8493"><span data-dcnode-id="8494" instrument_node="">▪As the model of Web 2.0 at times requires the use of intermediaries especially mashup applications, these intermediaries can enable governments to provide enhanced, customised services to their users at much lower costs than the e-government's centralised provision of services.</span></td><td class="align-left" data-dcnode-id="8490"><a class="workspace-trigger" data-dcnode-id="8491" href="#bb0095" name="bbb0095"><span data-dcnode-id="8492" instrument_node="">Chang &amp; Kanna (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8475"><td class="align-left" data-dcnode-id="8487" rowspan="2"><span data-dcnode-id="8488" instrument_node="">Managerial</span></td><td class="align-left" data-dcnode-id="8485"><span data-dcnode-id="8486" instrument_node="">▪Improvement of policy making</span></td><td class="align-left" data-dcnode-id="8483"><span data-dcnode-id="8484" instrument_node="">▪The tools and practices of Web 2.0 can help improve policy making by integrating online collaboration applications and interactive maps into e-government websites. This can enable governments to become more inclusive and responsive to individual users throughout the policy life cycle resulting in improved policy outcomes.</span></td><td class="align-left" data-dcnode-id="8476"><a class="workspace-trigger" data-dcnode-id="8481" href="#bb0070" name="bbb0070"><span data-dcnode-id="8482" instrument_node="">Bonsón et al. (2012)</span></a><span data-dcnode-id="8480" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8478" href="#bb0150" name="bbb0150"><span data-dcnode-id="8479" instrument_node="">Dixon (2010)</span></a><span data-dcnode-id="8477" instrument_node="">;</span></td></tr><tr class="valign-top" data-dcnode-id="8467"><td class="align-left" data-dcnode-id="8473"><span data-dcnode-id="8474" instrument_node="">▪Rapid dissemination of information</span></td><td class="align-left" data-dcnode-id="8471"><span data-dcnode-id="8472" instrument_node="">▪The viral nature of Web 2.0 applications such as Microblogging and social networking sites can help disseminate information over the internet much faster than traditional methods (e.g. postal letters, pamphlets, static websites etc.) of information delivery.</span></td><td class="align-left" data-dcnode-id="8468"><a class="workspace-trigger" data-dcnode-id="8469" href="#bb0080" name="bbb0080"><span data-dcnode-id="8470" instrument_node="">Buchanan &amp; Luck (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8454"><td class="align-left" data-dcnode-id="8465" rowspan="2"><span data-dcnode-id="8466" instrument_node="">Strategic</span></td><td class="align-left" data-dcnode-id="8463"><span data-dcnode-id="8464" instrument_node="">▪Enhance external transparency</span></td><td class="align-left" data-dcnode-id="8461"><span data-dcnode-id="8462" instrument_node="">▪Web 2.0 applications can help improve external transparency for government organisations by enriching government interactions with external stakeholders and enhancing internal knowledge management.</span></td><td class="align-left" data-dcnode-id="8455"><a class="workspace-trigger" data-dcnode-id="8459" href="#bb0070" name="bbb0070"><span data-dcnode-id="8460" instrument_node="">Bonsón et al. (2012)</span></a><span data-dcnode-id="8458" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8456" href="#bb0310" name="bbb0310"><span data-dcnode-id="8457" instrument_node="">Meijer &amp; Thaens (2010)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8443"><td class="align-left" data-dcnode-id="8452"><span data-dcnode-id="8453" instrument_node="">▪Revive user engagement</span></td><td class="align-left" data-dcnode-id="8450"><span data-dcnode-id="8451" instrument_node="">▪Social networking sites can be powerful applications that governments can deploy to help revive user engagement and harness the wisdom of crowds. Governments can especially enlist important niche audiences, leverage their insights for policy-making and improve the user relationship.</span></td><td class="align-left" data-dcnode-id="8444"><a class="workspace-trigger" data-dcnode-id="8448" href="#bb0050" name="bbb0050"><span data-dcnode-id="8449" instrument_node="">Bertot et al. (2012)</span></a><span data-dcnode-id="8447" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8445" href="#bb0230" name="bbb0230"><span data-dcnode-id="8446" instrument_node="">Huijboom et al. (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8430"><td class="align-left" data-dcnode-id="8441" rowspan="3"><span data-dcnode-id="8442" instrument_node="">IT infrastructure</span></td><td class="align-left" data-dcnode-id="8439"><span data-dcnode-id="8440" instrument_node="">▪Scalability of the system</span></td><td class="align-left" data-dcnode-id="8437"><span data-dcnode-id="8438" instrument_node="">▪Web 2.0 applications are mostly scalable allowing them to handle a growing amount of work in a capable manner</span></td><td class="align-left" data-dcnode-id="8431"><a class="workspace-trigger" data-dcnode-id="8435" href="#bb0380" name="bbb0380"><span data-dcnode-id="8436" instrument_node="">Picazo-Vela, Gutiérrez-Martínez, &amp; Luna-Reyes (2012)</span></a><span data-dcnode-id="8434" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8432" href="#bb0345" name="bbb0345"><span data-dcnode-id="8433" instrument_node="">O'Reilly (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8422"><td class="align-left" data-dcnode-id="8428"><span data-dcnode-id="8429" instrument_node="">▪Exploit free applications</span></td><td class="align-left" data-dcnode-id="8426"><span data-dcnode-id="8427" instrument_node="">▪As most major Web 2.0 applications such as Facebook and Twitter are free to use, the government organisations can exploit these applications to benefit their own services.</span></td><td class="align-left" data-dcnode-id="8423"><a class="workspace-trigger" data-dcnode-id="8424" href="#bb0380" name="bbb0380"><span data-dcnode-id="8425" instrument_node="">Picazo-Vela et al. (2012)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8414"><td class="align-left" data-dcnode-id="8420"><span data-dcnode-id="8421" instrument_node="">▪Ease of use and greater access</span></td><td class="align-left" data-dcnode-id="8418"><span data-dcnode-id="8419" instrument_node="">▪Web 2.0 technologies are usually quick and easy to learn and use. They can also be accessed from multiple devices as long they are connected to the internet allowing for greater access to these technologies.</span></td><td class="align-left" data-dcnode-id="8415"><a class="workspace-trigger" data-dcnode-id="8416" href="#bb0345" name="bbb0345"><span data-dcnode-id="8417" instrument_node="">O'Reilly (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8401"><td class="align-left" data-dcnode-id="8412" rowspan="2"><span data-dcnode-id="8413" instrument_node="">Organisational</span></td><td class="align-left" data-dcnode-id="8410"><span data-dcnode-id="8411" instrument_node="">▪Efficient gathering of collective intelligence</span></td><td class="align-left" data-dcnode-id="8408"><span data-dcnode-id="8409" instrument_node="">▪Gathering wisdom from users for crowd-sourcing has revolutionised with the use of some Web 2.0 technologies such as internal Wikis. It has enabled government organisations to efficiently and effectively collect geographically dispersed collective intelligence from users with less effort in comparison to traditional crowd-sourcing methods such as public forums and workshops.</span></td><td class="align-left" data-dcnode-id="8402"><a class="workspace-trigger" data-dcnode-id="8406" href="#bb0335" name="bbb0335"><span data-dcnode-id="8407" instrument_node="">Nam (2012)</span></a><span data-dcnode-id="8405" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8403" href="#bb0050" name="bbb0050"><span data-dcnode-id="8404" instrument_node="">Bertot et al. (2012)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8387"><td class="align-left" data-dcnode-id="8399"><span data-dcnode-id="8400" instrument_node="">▪Co-production and collaboration</span></td><td class="align-left" data-dcnode-id="8397"><span data-dcnode-id="8398" instrument_node="">▪Governments and the public jointly develop, design, and deliver government services to improve service quality, delivery, and responsiveness.</span></td><td class="align-left" data-dcnode-id="8388"><a class="workspace-trigger" data-dcnode-id="8395" href="#bb0295" name="bbb0295"><span data-dcnode-id="8396" instrument_node="">Linders (2012)</span></a><span data-dcnode-id="8394" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8392" href="#bb0045" name="bbb0045"><span data-dcnode-id="8393" instrument_node="">Bertot et al. (2010)</span></a><span data-dcnode-id="8391" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8389" href="#bb0275" name="bbb0275"><span data-dcnode-id="8390" instrument_node="">Klievink &amp; Janssen (2010)</span></a></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8257" id="s0025"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8375" id="st0035"><span data-dcnode-id="8380" instrument_node="">2.1.2</span><span data-dcnode-id="8378" instrument_node="">. </span><span data-dcnode-id="8376" instrument_node="">Classification of the costs of Web 2.0 technologies</span></h4><div data-dcnode-id="8258"><p data-dcnode-id="8346" id="p0065"><span data-dcnode-id="8374" instrument_node="">The identification of the full range of costs of an information system is essential in order to complete a robust IS evaluation (</span><a class="workspace-trigger" data-dcnode-id="8372" href="#bb0220" name="bbb0220"><span data-dcnode-id="8373" instrument_node="">Hochstrasser, 1992</span></a><span data-dcnode-id="8371" instrument_node="">). According to </span><a class="workspace-trigger" data-dcnode-id="8369" href="#bb0220" name="bbb0220"><span data-dcnode-id="8370" instrument_node="">Hochstrasser (1992)</span></a><span data-dcnode-id="8368" instrument_node="">, the true costs of an IS deployment can often be divided into direct and indirect cost factors. Although many cost taxonomies include directly quantifiable costs associated with IS investments, the majority fails to identify the indirect costs (</span><a class="workspace-trigger" data-dcnode-id="8366" href="#bb0235" name="bbb0235"><span data-dcnode-id="8367" instrument_node="">Irani and Love, 2001</span></a><span data-dcnode-id="8365" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8363" href="#bb0300" name="bbb0300"><span data-dcnode-id="8364" instrument_node="">Love et al., 2006</span></a><span data-dcnode-id="8362" instrument_node="">). This is often due to the fact that indirect costs are difficult to quantify in monetary terms, possibly explaining their limited presence in the various cost taxonomies. However, </span><a class="workspace-trigger" data-dcnode-id="8360" href="#bb0240" name="bbb0240"><span data-dcnode-id="8361" instrument_node="">Irani and Love (2002)</span></a><span data-dcnode-id="8359" instrument_node=""> explain that indirect costs cannot be avoided as their effect would appear once the implementation of the project is initiated. Hence, managers who choose to ignore indirect costs by not including them in the overall cost portfolio are only delaying the effect of those costs and are not eliminating them. Accounting for both direct and indirect costs, the taxonomy presented by </span><a class="workspace-trigger" data-dcnode-id="8357" href="#bb0235" name="bbb0235"><span data-dcnode-id="8358" instrument_node="">Irani and Love (2001)</span></a><span data-dcnode-id="8356" instrument_node=""> makes it the most appropriate for this research. The authors highlight the point that the costs associated with the use of IS can be classified as having direct and indirect (human and organisational) characteristics. The </span><em data-dcnode-id="8354"><span data-dcnode-id="8355" instrument_node="">direct cost</span></em><span data-dcnode-id="8353" instrument_node=""> components are those which can be attributed to the implementation and operation of new technology, and as a result are those most considered by decision-makers during the use of traditional appraisal techniques (e.g. hardware and software costs, installation and configuration etc.). </span><em data-dcnode-id="8351"><span data-dcnode-id="8352" instrument_node="">Indirect costs</span></em><span data-dcnode-id="8350" instrument_node="">, however, are those that cannot be readily identified, managed and controlled (e.g. management time, productivity loss etc.). </span><a class="workspace-trigger" data-dcnode-id="8348" href="#t0010" name="bt0010"><span data-dcnode-id="8349" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="8347" instrument_node=""> presents a set of costs of using Web 2.0 applications in an e-Government context.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8259" id="t0010"><span class="captions" data-dcnode-id="8338"><span data-dcnode-id="8339" id="ca0015"><p data-dcnode-id="8340" id="sp0035"><span class="label" data-dcnode-id="8344"><span data-dcnode-id="8345" instrument_node="">Table&nbsp;2</span></span><span data-dcnode-id="8343" instrument_node="">. </span><span data-dcnode-id="8341" instrument_node="">Classification of the Costs of Web 2.0 in the context of e-Government.</span></p></span></span><div class="groups" data-dcnode-id="8260"><table data-dcnode-id="8261"><thead data-dcnode-id="8328"><tr class="valign-top rowsep-1" data-dcnode-id="8329"><th class="align-left" data-dcnode-id="8336" scope="col"><span data-dcnode-id="8337" instrument_node="">Classification</span></th><th class="align-left" data-dcnode-id="8334" scope="col"><span data-dcnode-id="8335" instrument_node="">Factors</span></th><th class="align-left" data-dcnode-id="8332" scope="col"><span data-dcnode-id="8333" instrument_node="">Description</span></th><th class="align-left" data-dcnode-id="8330" scope="col"><span data-dcnode-id="8331" instrument_node="">References</span></th></tr></thead><tbody data-dcnode-id="8262"><tr class="valign-top" data-dcnode-id="8318"><td class="align-left" data-dcnode-id="8326" rowspan="3"><span data-dcnode-id="8327" instrument_node="">Direct costs</span></td><td class="align-left" data-dcnode-id="8324"><span data-dcnode-id="8325" instrument_node="">▪Development of new service model</span></td><td class="align-left" data-dcnode-id="8322"><span data-dcnode-id="8323" instrument_node="">▪As the Web 2.0 model requires the use of external applications (e.g. Facebook, YouTube and Twitter), it can prove challenging to develop a new service model that integrates these Web 2.0 applications with existing e-Government systems in a manner that is secure and improves the quality of services.</span></td><td class="align-left" data-dcnode-id="8319"><a class="workspace-trigger" data-dcnode-id="8320" href="#bb0180" name="bbb0180"><span data-dcnode-id="8321" instrument_node="">Freeman &amp; Loo (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8310"><td class="align-left" data-dcnode-id="8316"><span data-dcnode-id="8317" instrument_node="">▪Additional Staff</span></td><td class="align-left" data-dcnode-id="8314"><span data-dcnode-id="8315" instrument_node="">▪The need for additional staff to develop, manage and act as moderators of Web 2.0 applications</span></td><td class="align-left" data-dcnode-id="8311"><a class="workspace-trigger" data-dcnode-id="8312" href="#bb0180" name="bbb0180"><span data-dcnode-id="8313" instrument_node="">Freeman &amp; Loo (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8302"><td class="align-left" data-dcnode-id="8308"><span data-dcnode-id="8309" instrument_node="">▪Data maintenance</span></td><td class="align-left" data-dcnode-id="8306"><span data-dcnode-id="8307" instrument_node="">▪Costs related to the maintenance of content generated in Web 2.0 applications as the amount of information created will be high in Web 2.0 applications</span></td><td class="align-left" data-dcnode-id="8303"><a class="workspace-trigger" data-dcnode-id="8304" href="#bb0265" name="bbb0265"><span data-dcnode-id="8305" instrument_node="">Kavanaugh et al. (2012)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8289"><td class="align-left" data-dcnode-id="8300"><span data-dcnode-id="8301" instrument_node="">Indirect human costs</span></td><td class="align-left" data-dcnode-id="8298"><span data-dcnode-id="8299" instrument_node="">▪Restricted user participation</span></td><td class="align-left" data-dcnode-id="8296"><span data-dcnode-id="8297" instrument_node="">▪The investment in Web 2.0 applications on the e-Government front can potentially result in restrictions to exclusive user participation.</span></td><td class="align-left" data-dcnode-id="8290"><a class="workspace-trigger" data-dcnode-id="8294" href="#bb0060" name="bbb0060"><span data-dcnode-id="8295" instrument_node="">Blank &amp; Reisdorf (2012)</span></a><span data-dcnode-id="8293" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8291" href="#bb0135" name="bbb0135"><span data-dcnode-id="8292" instrument_node="">de Kool &amp; van Wamelen (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8279"><td class="align-left" data-dcnode-id="8287" rowspan="3"><span data-dcnode-id="8288" instrument_node="">Indirect organisational costs</span></td><td class="align-left" data-dcnode-id="8285"><span data-dcnode-id="8286" instrument_node="">▪Loss of control</span></td><td class="align-left" data-dcnode-id="8283"><span data-dcnode-id="8284" instrument_node="">▪Government organisations can face loss of control due to excessive transparency using Web 2.0 applications such as blogs. For instance, blogging by ministers and civil servants has led to release of sensitive information in an incorrect and sometimes illegal manner.</span></td><td class="align-left" data-dcnode-id="8280"><a class="workspace-trigger" data-dcnode-id="8281" href="#bb0355" name="bbb0355"><span data-dcnode-id="8282" instrument_node="">Osimo, Campbell, Kerr-Stevens, Bishop, &amp; Bryant (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8271"><td class="align-left" data-dcnode-id="8277"><span data-dcnode-id="8278" instrument_node="">▪Staff learning and training</span></td><td class="align-left" data-dcnode-id="8275"><span data-dcnode-id="8276" instrument_node="">▪Existing staff will require education and training to use and moderate Web 2.0 applications to be in line with the organisations policy. This often requires lot of management time and can prove to be a significant indirect cost.</span></td><td class="align-left" data-dcnode-id="8272"><a class="workspace-trigger" data-dcnode-id="8273" href="#bb0265" name="bbb0265"><span data-dcnode-id="8274" instrument_node="">Kavanaugh et al. (2012)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8263"><td class="align-left" data-dcnode-id="8269"><span data-dcnode-id="8270" instrument_node="">▪Introducing new organisational policies</span></td><td class="align-left" data-dcnode-id="8267"><span data-dcnode-id="8268" instrument_node="">▪Many social media services are hosted outside government websites (e.g., Facebook, Twitter, YouTube). Therefore it is important for government agencies to establish and enforce explicit agency-wide linking policies. This can be time-consuming and costly for organisations.</span></td><td class="align-left" data-dcnode-id="8264"><a class="workspace-trigger" data-dcnode-id="8265" href="#bb0050" name="bbb0050"><span data-dcnode-id="8266" instrument_node="">Bertot et al. (2012)</span></a></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8096" id="s0030"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8251" id="st0040"><span data-dcnode-id="8256" instrument_node="">2.1.3</span><span data-dcnode-id="8254" instrument_node="">. </span><span data-dcnode-id="8252" instrument_node="">Classification of the risks of Web 2.0 technologies</span></h4><p data-dcnode-id="8240" id="p0070"><span data-dcnode-id="8250" instrument_node="">Although there is some overlap with the concept of cost, risk captures a range of non-financial factors that could either undermine the particular project or harm the overall organisation. Thus failure of a system to operate as planned can be a cost (possibly requiring more investment or to abandon existing investment) but also has a reputational risk in terms of the perceived ability to manage public funds. IS projects are renowned for their high failure rate and, it is important for organisations to improve their ability to manage their IS risks so that projects can be delivered against the objectives with which they were justified (</span><a class="workspace-trigger" data-dcnode-id="8248" href="#bb0490" name="bbb0490"><span data-dcnode-id="8249" instrument_node="">Wilbanks, Kuhn, &amp; Chou, 2014</span></a><span data-dcnode-id="8247" instrument_node="">). Risk factors in IS projects range from issues that relate to specific internal organisational risks to external factors. Factors such as organisational fit, skill mix, management structure and strategy, software systems design, user involvement and training and technology planning have been highlighted by </span><a class="workspace-trigger" data-dcnode-id="8245" href="#bb0450" name="bbb0450"><span data-dcnode-id="8246" instrument_node="">Sumner (2000)</span></a><span data-dcnode-id="8244" instrument_node="">. On the other hand, </span><a class="workspace-trigger" data-dcnode-id="8242" href="#bb0500" name="bbb0500"><span data-dcnode-id="8243" instrument_node="">Wu and Ong (2008)</span></a><span data-dcnode-id="8241" instrument_node=""> present two kinds of uncertainty factors that address risks in the dynamic environment of information technology investment. While “external uncertainty” comes from outside the organisation and could include market extinction, “internal uncertainties” occur within an establishment (e.g. uncertainty about budget overspends). Essentially, the IS investment risks identified are present in two streams of IS research. The first includes risks arising in software development and the second stream focuses on IT investment risks arising outside the scope of software development.</span></p><div data-dcnode-id="8097"><p data-dcnode-id="8226" id="p0075"><span data-dcnode-id="8239" instrument_node="">Although Web 2.0 provides a lot of opportunities, it may also pose risks that organisations should be aware of in order to attain its full potential in a responsible and sustainable manner (</span><a class="workspace-trigger" data-dcnode-id="8237" href="#bb0025" name="bbb0025"><span data-dcnode-id="8238" instrument_node="">Anttiroiko, 2010</span></a><span data-dcnode-id="8236" instrument_node="">). Some have pointed to the potential undemocratic features of Web 2.0 and the regressive nature of the wisdom of crowds captured by Web 2.0 (</span><a class="workspace-trigger" data-dcnode-id="8234" href="#bb9000" name="bbb9000"><span data-dcnode-id="8235" instrument_node="">Wilson, 2008</span></a><span data-dcnode-id="8233" instrument_node="">). Additionally, there have been uncertainties and concerns among experts, public sector managers and politicians about the risks of too deep an involvement in the Web 2.0 trend in the public sector due to privacy and security risks and capacity problems in public administration (</span><a class="workspace-trigger" data-dcnode-id="8231" href="#bb0445" name="bbb0445"><span data-dcnode-id="8232" instrument_node="">Sternstein, 2006</span></a><span data-dcnode-id="8230" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="8228" href="#t0015" name="bt0015"><span data-dcnode-id="8229" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="8227" instrument_node=""> reports a set of potential risks that managers may need to be aware of when using Web 2.0 applications in an e-Government context.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8098" id="t0015"><span class="captions" data-dcnode-id="8218"><span data-dcnode-id="8219" id="ca0020"><p data-dcnode-id="8220" id="sp0040"><span class="label" data-dcnode-id="8224"><span data-dcnode-id="8225" instrument_node="">Table&nbsp;3</span></span><span data-dcnode-id="8223" instrument_node="">. </span><span data-dcnode-id="8221" instrument_node="">Classification of the risks of Web 2.0 in the context of e-Government.</span></p></span></span><div class="groups" data-dcnode-id="8099"><table data-dcnode-id="8100"><thead data-dcnode-id="8208"><tr class="valign-top rowsep-1" data-dcnode-id="8209"><th class="align-left" data-dcnode-id="8216" scope="col"><span data-dcnode-id="8217" instrument_node="">Classification</span></th><th class="align-left" data-dcnode-id="8214" scope="col"><span data-dcnode-id="8215" instrument_node="">Factors</span></th><th class="align-left" data-dcnode-id="8212" scope="col"><span data-dcnode-id="8213" instrument_node="">Description</span></th><th class="align-left" data-dcnode-id="8210" scope="col"><span data-dcnode-id="8211" instrument_node="">References</span></th></tr></thead><tbody data-dcnode-id="8101"><tr class="valign-top" data-dcnode-id="8198"><td class="align-left" data-dcnode-id="8206" rowspan="4"><span data-dcnode-id="8207" instrument_node="">Political and legal</span></td><td class="align-left" data-dcnode-id="8204"><span data-dcnode-id="8205" instrument_node="">▪Weak social media policies</span></td><td class="align-left" data-dcnode-id="8202"><span data-dcnode-id="8203" instrument_node="">▪As Web 2.0 is an emerging phenomenon in government organisations some of the organisational policies governing the use of social media applications may still be in their infancy. Immature policies might prove to be a risk for government organisations.</span></td><td class="align-left" data-dcnode-id="8199"><a class="workspace-trigger" data-dcnode-id="8200" href="#bb0050" name="bbb0050"><span data-dcnode-id="8201" instrument_node="">Bertot et al. (2012)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8190"><td class="align-left" data-dcnode-id="8196"><span data-dcnode-id="8197" instrument_node="">▪Data ownership</span></td><td class="align-left" data-dcnode-id="8194"><span data-dcnode-id="8195" instrument_node="">▪The technique of application mashups and content syndication on to existing e-Government platforms can also be an issue leading to loss of ownership control and authenticity of the final products.</span></td><td class="align-left" data-dcnode-id="8191"><a class="workspace-trigger" data-dcnode-id="8192" href="#bb0355" name="bbb0355"><span data-dcnode-id="8193" instrument_node="">Osimo et al. (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8182"><td class="align-left" data-dcnode-id="8188"><span data-dcnode-id="8189" instrument_node="">▪Data protection</span></td><td class="align-left" data-dcnode-id="8186"><span data-dcnode-id="8187" instrument_node="">▪Rise in responsibility for government organisations to handle personal information about individuals sensitively as most Web 2.0 technologies require this information to use the applications.</span></td><td class="align-left" data-dcnode-id="8183"><a class="workspace-trigger" data-dcnode-id="8184" href="#bb0350" name="bbb0350"><span data-dcnode-id="8185" instrument_node="">Osimo (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8174"><td class="align-left" data-dcnode-id="8180"><span data-dcnode-id="8181" instrument_node="">▪Freedom of information</span></td><td class="align-left" data-dcnode-id="8178"><span data-dcnode-id="8179" instrument_node="">▪The use of Web 2.0 technologies can present challenges in appropriately responding to Freedom of Information legalities. It can raise significant issues for an organisation with regards to open access and the publishing of information.</span></td><td class="align-left" data-dcnode-id="8175"><a class="workspace-trigger" data-dcnode-id="8176" href="#bb0230" name="bbb0230"><span data-dcnode-id="8177" instrument_node="">Huijboom et al. (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8164"><td class="align-left" data-dcnode-id="8172" rowspan="2"><span data-dcnode-id="8173" instrument_node="">Reputational</span></td><td class="align-left" data-dcnode-id="8170"><span data-dcnode-id="8171" instrument_node="">▪Critical reviews</span></td><td class="align-left" data-dcnode-id="8168"><span data-dcnode-id="8169" instrument_node="">▪While the advent of Web 2.0 technologies has played an important role in providing people with useful assessments of products and services, it has also meant that there is now a greater risk of these assessments damaging the image of people and organisations without good reason. This is because it is difficult to ascertain if assessments are fair or the result of personal resentment</span></td><td class="align-left" data-dcnode-id="8165"><a class="workspace-trigger" data-dcnode-id="8166" href="#bb0135" name="bbb0135"><span data-dcnode-id="8167" instrument_node="">de Kool &amp; van Wamelen (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8156"><td class="align-left" data-dcnode-id="8162"><span data-dcnode-id="8163" instrument_node="">▪Risk of information overload and reliability</span></td><td class="align-left" data-dcnode-id="8160"><span data-dcnode-id="8161" instrument_node="">▪There is a risk of information overload and poor quality content shared with public users when using some Web 2.0 applications such as blogs and wikis, as concerns can be raised about their reliability, accuracy and authority</span></td><td class="align-left" data-dcnode-id="8157"><a class="workspace-trigger" data-dcnode-id="8158" href="#bb0230" name="bbb0230"><span data-dcnode-id="8159" instrument_node="">Huijboom et al. (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8146"><td class="align-left" data-dcnode-id="8154" rowspan="2"><span data-dcnode-id="8155" instrument_node="">Security</span></td><td class="align-left" data-dcnode-id="8152"><span data-dcnode-id="8153" instrument_node="">▪Security and privacy</span></td><td class="align-left" data-dcnode-id="8150"><span data-dcnode-id="8151" instrument_node="">▪The open nature of Web 2.0 presents significant challenges to the traditional enterprise approach to controlling intellectual property over information shared and security of these applications.</span></td><td class="align-left" data-dcnode-id="8147"><a class="workspace-trigger" data-dcnode-id="8148" href="#bb0055" name="bbb0055"><span data-dcnode-id="8149" instrument_node="">Bin Al-Tameem, Chittikala, &amp; Pichappan (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8138"><td class="align-left" data-dcnode-id="8144"><span data-dcnode-id="8145" instrument_node="">▪Threat of cyber extremisms</span></td><td class="align-left" data-dcnode-id="8142"><span data-dcnode-id="8143" instrument_node="">▪These new, interactive, multimedia-rich forms of communication provide effective means for extremists to promote their ideas, share resources, and communicate with each other</span></td><td class="align-left" data-dcnode-id="8139"><a class="workspace-trigger" data-dcnode-id="8140" href="#bb0
