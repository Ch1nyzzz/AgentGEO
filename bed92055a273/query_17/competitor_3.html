><span data-dcnode-id="439" instrument_node="">239</span><span data-dcnode-id="437" instrument_node="">-</span><span data-dcnode-id="435" instrument_node="">251</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="430"><span data-dcnode-id="433" instrument_node=""></span><a aria-describedby="ref-id-rf0510" class="link" data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DSecuring%2520e-Government%2520and%2520e-Voting%2520with%2520an%2520open%2520cloud%2520computing%2520architecture%26publication_year%3D2011%26author%3DD.%2520Zissis%26author%3DD.%2520Lekkas" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="432" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="312" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="313"><div class="PageDivider" data-dcnode-id="425"></div><header data-dcnode-id="422" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Cited by (89)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="314"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="315"><ul data-dcnode-id="321"><li class="ListArticleItem" data-dcnode-id="404"><div class="sub-heading" data-dcnode-id="416"><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0740624X2100099X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="420" id="citing-articles-article0-title"><span data-dcnode-id="421" instrument_node="">Effects of Predictors of Citizens' Attitudes and Intention to Use Open Government Data and Government 2.0</span></h3></a><div class="article-source ellipsis" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">2022, Government Information Quarterly</span></div></div><div class="buttons" data-dcnode-id="410"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="411" type="button"><span class="button-link-text" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="412" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="413"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="405"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="406" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="407"><p data-dcnode-id="408" id="sp0080"><span data-dcnode-id="409" instrument_node="">This research proposes a holistic and integrative theoretical model to discuss the effects of eight predictors of citizens' attitudes towards open government and Government 2.0, and whether these attitudes influence their intention to use open government data in Brazil, one of the founding countries of the Open Government Partnership (OGP). Findings show the effects of six predictors of citizens' attitudes towards open government and government 2.0. In essence, these predictors are ease of use, usefulness, intrinsic motivation, political satisfaction, government trust, and intensity of internet use. This study also indicates that education, income, and region influence the ease of use and usefulness of open data. These findings also mean that public managers and political parties still have “homework’ to do to stimulate citizens' behavior towards open government and government 2.0. These initiatives encompass the government portals quality and data transparency improvement through less restrictive laws. Also, improve politicians' job performance.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="386"><div class="sub-heading" data-dcnode-id="398"><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0038012119301296" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="402" id="citing-articles-article1-title"><span data-dcnode-id="403" instrument_node="">A study of government 2.0 implementation in Indonesia</span></h3></a><div class="article-source ellipsis" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">2020, Socio-Economic Planning Sciences</span></div></div><div class="buttons" data-dcnode-id="392"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="393" type="button"><span class="button-link-text" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="394" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="395"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="387"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="388" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="389"><p data-dcnode-id="390" id="abspara0010"><span data-dcnode-id="391" instrument_node="">Web 2.0 has brought innovations in digital government, namely, government 2.0. Social media, as one part of Web 2.0, could potentially support fuller participation and public interaction. Social media enjoys a very high level of acceptance by individual users and government agencies around the world. Web 2.0 and social media usage in the public sector still needs to be tested from the perspective of not only the government but also the community as the recipient of services. Therefore, this study aims to answer the following research questions: How effective has government 2.0 implementation been in Indonesia? Is there a correlation between e-government management and government 2.0 implementation? We adopted the sophistication index (SI) by Bonson et al. (2012) [1] to answer the first research questions. The SI examined the presence of Web 2.0 features and social media applications on these government institutions’ websites. As to answer the second research question, we conducted parametric statistical tests to assess how e-government implementation, based on the Indonesian E-Government Rating (PEGI) score, has influenced the effectiveness of government 2.0 use by government institutions in Indonesia. We observed the websites and social media accounts of 116 Indonesian government institutions. According to the evaluation of Web 2.0 and social media use, the average SI score is 42%. These results indicate that, in general, government institutions in Indonesia have used Web 2.0 and social media features, although the adoption rate has not been equal. The correlations between the PEGI scores and SI values also suggest a positive relationship between the effectiveness of e-government implementation and the effectiveness of government institutions. Therefore, government institutions that have been effective in implementing e-government have also been effective in implementing government 2.0.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="368"><div class="sub-heading" data-dcnode-id="380"><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0019850118305236" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="384" id="citing-articles-article2-title"><span data-dcnode-id="385" instrument_node="">Role of big data and social media analytics for business to business sustainability: A participatory web context</span></h3></a><div class="article-source ellipsis" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">2020, Industrial Marketing Management</span></div></div><div class="buttons" data-dcnode-id="374"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="375" type="button"><span class="button-link-text" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="376" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="377"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="369"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="370" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="371"><p data-dcnode-id="372" id="sp0045"><span data-dcnode-id="373" instrument_node="">The digital transformation is an accumulation of various digital advancements, such as the transformation of the web phenomenon. The participatory web that allows for active user engagement and gather intelligence has been widely recognised as a value add tool by organisations of all shapes and sizes to improve business productivity and efficiency. However, its ability to facilitate sustainable business-to-business (B2B) activities has lacked focus in the business and management literature to date. This qualitative research is exploratory in nature and fills this gap through findings arising from interviews of managers and by developing taxonomies that highlight the capability of participatory web over passive web to enable different firms to engage in business operations. For this purpose, two important interrelated functions of business i.e. operations and marketing have been mapped against three dimensions of sustainability. Consequently, this research demonstrates the ability of big data and social media analytics within a participatory web environment to enable B2B organisations to become profitable and remain sustainable through strategic operations and marketing related business activities. The research findings will be useful for both academics and managers who are interested in understanding and further developing the business use of participatory web tools to achieve business sustainability. Hence, this may be considered as a distinct way of attaining sustainability.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="344"><div class="sub-heading" data-dcnode-id="356"><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0268401219305067" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="366" id="citing-articles-article3-title"><span data-dcnode-id="367" instrument_node="">A framework for analysing blockchain technology adoption: Integrating institutional, market and technical factors</span></h3></a><div class="article-source ellipsis" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">2020, International Journal of Information Management</span></div><div class="CitedSection" data-dcnode-id="357"><div class="snippet" data-dcnode-id="358"><div class="cite-header" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">American Express recently deployed Hyperledger’s (Androulaki et al., 2018; Cachin, 2016) Blockchain technology to improve the versatility of their rewards programme for greatly improved product-target offers (Sweet, 2018), whereas IBM has launched Blockchain as a Service (BaaS) on the Hyperledger Fabric open source blockchain architecture, to enable the setup of scalable, high throughput (Vukolić, 2015) trusted networks across private, public and government actors (Miller, 2017). The introduction of disruptive technologies to any sector brings with it multiple challenges and complexities across technical, regulatory, social, and adoption-related areas (Sivarajah, Irani, &amp; Weerakkody, 2015; Sivarajah, Kamal, Irani, &amp; Weerakkody, 2017). Yet, most of the work in blockchain has a technology focus and takes a simplistic view on organisations and institutional issues (Hughes et al., 2019; Ølnes, Ubacht, &amp; Janssen, 2017).</span></p></div></div></div><div class="buttons" data-dcnode-id="350"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="351" type="button"><span class="button-link-text" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="352" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="353"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="345"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="346" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="347"><p data-dcnode-id="348" id="spar0020"><span data-dcnode-id="349" instrument_node="">The adoption of blockchain technologies require the consideration of a broad range of factors, over and above the predominantly technology focus of most current work. Whilst scholarly literature on blockchain technology is only beginning to emerge, majority are focused on the technicalities of the technology and tend to ignore the organizational complexities of adopting the technology. Drawing from a focused review of literature, this paper proposed a conceptual framework for adoption of blockchain technology capturing the complex relationships between institutional, market and technical factors. The framework highlights that varying outcomes are possible, and the change process is focal as this shapes the form blockchain applications take. Factors presented in the framework (institutional, market and technical) interact and mutually influence each other. The proposed framework can be used by organisations as a reference point for adopting blockchain applications and by scholars to expand, refine and evaluate research into blockchain technology.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="333"><div class="sub-heading" data-dcnode-id="338"><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/faam.12301" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="342" id="citing-articles-article4-title"><span data-dcnode-id="343" instrument_node="">Digitalization, accounting and accountability: A literature review and reflections on future research in public services</span></h3></a><div class="article-source ellipsis" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">2022, Financial Accountability and Management</span></div></div><div class="buttons" data-dcnode-id="337"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="334"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="335" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="336"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="322"><div class="sub-heading" data-dcnode-id="327"><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/978-3-030-92945-9_8" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="331" id="citing-articles-article5-title"><span data-dcnode-id="332" instrument_node="">A Public Value Impact Assessment Framework for Digital Governance</span></h3></a><div class="article-source ellipsis" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">2022, Public Administration and Information Technology</span></div></div><div class="buttons" data-dcnode-id="326"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="323"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="324" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="325"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84937485540%26md5%3Dcd632aeab3b21a749a2623d6927f5117" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="319" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="320"></path></svg><span class="button-alternative-text" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="article-biography" data-dcnode-id="288" id="bg0005"><p data-dcnode-id="308" id="sp0075"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Uthayasankar Sivarajah</span></strong><span data-dcnode-id="309" instrument_node=""> is a Post-Doctoral Research Fellow at Brunel Business School, Brunel University London. He is currently involved in multiple research and innovation projects focusing on themes such as smart city technology and cloud computing use in the public sector. His primary research and teaching interests are cross-disciplinary and are in the areas of Web 2.0 technologies use in Public and Private sector, Information Systems Evaluation, Operations Management and Innovation. He is a member of the Editorial Board of Journal of Enterprise Information Management and Transforming Government: People, Process and Policy.</span></p><p data-dcnode-id="306" id="sp0080"><span data-dcnode-id="307" instrument_node="">Contact information</span></p><p data-dcnode-id="304" id="sp0085"><span data-dcnode-id="305" instrument_node="">Position: Post-Doctoral Research Fellow.</span></p><p data-dcnode-id="302" id="sp0090"><span data-dcnode-id="303" instrument_node="">Affiliation: Brunel Business School, Brunel University London.</span></p><p data-dcnode-id="300" id="sp0095"><span data-dcnode-id="301" instrument_node="">Mail Address: Brunel Business School, Brunel University London, Uxbridge, Middlesex, UB8 3PH, UK.</span></p><p data-dcnode-id="294" id="sp0100"><span data-dcnode-id="299" instrument_node="">Phone: +</span><span data-dcnode-id="297" instrument_node="">&nbsp;</span><span data-dcnode-id="295" instrument_node="">44 (0)1895 266935.</span></p><p data-dcnode-id="289" id="sp0105"><span data-dcnode-id="293" instrument_node="">Email: </span><a data-dcnode-id="291" href="mailto:Sankar.sivarajah@brunel.ac.uk" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="292" instrument_node="">Sankar.sivarajah@brunel.ac.uk</span></a><span data-dcnode-id="290" instrument_node="">.</span></p></div><div class="article-biography" data-dcnode-id="264" id="bg0010"><p data-dcnode-id="284" id="sp0110"><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Zahir Irani</span></strong><span data-dcnode-id="285" instrument_node=""> is the Dean of the College of Business, Arts and Social Sciences at Brunel University London. He is Professor of Operations and Information Management in the Brunel Business School, which he joined in August 2006 as the Head of School. He remains research active and has published in: Journal of Management Information Systems, European Journal of Information Systems, and Information &amp; Management to mention a few. He has received significant grant income from UK research councils and the EU. He completed his significant leadership development at Harvard Business School.</span></p><p data-dcnode-id="282" id="sp0115"><span data-dcnode-id="283" instrument_node="">Contact information</span></p><p data-dcnode-id="280" id="sp0120"><span data-dcnode-id="281" instrument_node="">Position: College of Business, Arts and Social Sciences.</span></p><p data-dcnode-id="278" id="sp0125"><span data-dcnode-id="279" instrument_node="">Affiliation: Brunel University London.</span></p><p data-dcnode-id="276" id="sp0130"><span data-dcnode-id="277" instrument_node="">Mail Address: Brunel Business School, Brunel University, Uxbridge, Middlesex, UB8 3PH, UK.</span></p><p data-dcnode-id="270" id="sp0135"><span data-dcnode-id="275" instrument_node="">Phone: +</span><span data-dcnode-id="273" instrument_node="">&nbsp;</span><span data-dcnode-id="271" instrument_node="">44 (0)1895 265275.</span></p><p data-dcnode-id="265" id="sp0140"><span data-dcnode-id="269" instrument_node="">Email: </span><a data-dcnode-id="267" href="mailto:Zahir.Irani@brunel.ac.uk" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="268" instrument_node="">Zahir.Irani@brunel.ac.uk</span></a><span data-dcnode-id="266" instrument_node="">.</span></p></div><div class="article-biography" data-dcnode-id="240" id="bg0015"><p data-dcnode-id="260" id="sp0145"><strong data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Vishanth Weerakkody</span></strong><span data-dcnode-id="261" instrument_node=""> is a Professor of Digital Governance at Brunel University Business School. Prior to his academic career, he worked in a number of Multinational organisations, including IBM UK, in the area of software engineering, business systems design and process analysis. He is currently involved in several research and innovation projects on themes such as ICT enabled process transformation, social innovation and digital inclusion in the public sector. He has published over 100 peer reviewed articles, guest-edited special issues of leading journals and edited several books on these themes. He is currently the Editor-in-Chief of the International Journal of Electronic Government Research.</span></p><p data-dcnode-id="258" id="sp0150"><span data-dcnode-id="259" instrument_node="">Contact information</span></p><p data-dcnode-id="256" id="sp0155"><span data-dcnode-id="257" instrument_node="">Position: Professor of Digital Governance.</span></p><p data-dcnode-id="254" id="sp0160"><span data-dcnode-id="255" instrument_node="">Affiliation: Brunel Business School, Brunel University London.</span></p><p data-dcnode-id="252" id="sp0165"><span data-dcnode-id="253" instrument_node="">Mail Address: Brunel Business School, Brunel University, Uxbridge, Middlesex, UB8 3PH, UK.</span></p><p data-dcnode-id="246" id="sp0170"><span data-dcnode-id="251" instrument_node="">Phone: +</span><span data-dcnode-id="249" instrument_node="">&nbsp;</span><span data-dcnode-id="247" instrument_node="">44 (0)1895 266020.</span></p><p data-dcnode-id="241" id="sp0175"><span data-dcnode-id="245" instrument_node="">Email: </span><a data-dcnode-id="243" href="mailto:vishanth.weerakkody@brunel.ac.uk" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="244" instrument_node="">vishanth.weer
