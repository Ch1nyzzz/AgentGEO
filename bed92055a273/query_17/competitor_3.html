" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="7107"><td class="align-left" data-dcnode-id="7120"><span data-dcnode-id="7121" instrument_node="">▪Other: Workload constraints</span></td><td class="align-left" data-dcnode-id="7118"><span data-dcnode-id="7119" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7116"><span data-dcnode-id="7117" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7112"><span data-dcnode-id="7113" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7110"><span data-dcnode-id="7111" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7108"><span data-dcnode-id="7109" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="7090"><td class="align-left" data-dcnode-id="7105" rowspan="3"><span data-dcnode-id="7106" instrument_node="">Indirect Organisational</span></td><td class="align-left" data-dcnode-id="7103"><span data-dcnode-id="7104" instrument_node="">▪Loss of control</span></td><td class="align-left" data-dcnode-id="7101"><span data-dcnode-id="7102" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7097"><span data-dcnode-id="7098" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7095"><span data-dcnode-id="7096" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7091"><span data-dcnode-id="7092" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="7075"><td class="align-left" data-dcnode-id="7088"><span data-dcnode-id="7089" instrument_node="">▪Staff learning and training</span></td><td class="align-left" data-dcnode-id="7086"><span data-dcnode-id="7087" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7084"><span data-dcnode-id="7085" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7082"><span data-dcnode-id="7083" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7078"><span data-dcnode-id="7079" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7076"><span data-dcnode-id="7077" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="7060"><td class="align-left" data-dcnode-id="7073"><span data-dcnode-id="7074" instrument_node="">▪Introducing new organisational policies</span></td><td class="align-left" data-dcnode-id="7071"><span data-dcnode-id="7072" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7067"><span data-dcnode-id="7068" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7065"><span data-dcnode-id="7066" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7061"><span data-dcnode-id="7062" instrument_node="">◉</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="7044" id="p0150"><span data-dcnode-id="7054" instrument_node="">As the above table illustrates, cost factors such as data maintenance, restricted user participation and introducing new organisational policies are some of the factors that the senior management team believed to be important considerations to have prior to the use of Web 2.0 applications. One of the key direct </span><em data-dcnode-id="7052"><span data-dcnode-id="7053" instrument_node="">costs</span></em><span data-dcnode-id="7051" instrument_node=""> of Web 2.0 technologies that the interviewees highlighted was </span><em data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">data maintenance</span></em><span data-dcnode-id="7048" instrument_node="">. The e-Government manager indicated that they were “</span><em data-dcnode-id="7046"><span data-dcnode-id="7047" instrument_node="">generally good at putting information out but not as good when it comes to tidying up the data once it becomes outdated</span></em><span data-dcnode-id="7045" instrument_node="">” (SD). This can have a detrimental impact on the image of the organisation and indicates an inability to maintain accurate and reliable information for the users of these channels. High-quality information is vital when it comes to Web 2.0 applications as users expect up-to-date data through mediums such as Twitter which sends information out in real-time. However, using such applications can also mean employing new staff to implement and manage them and often the public sector is reluctant to invest in additional human resources particularly in times of budget restrictions. This always means that existing staff are put under pressure to manage these applications and have a disruptive effect on their daily jobs.</span></p><p data-dcnode-id="7024" id="p0155"><span data-dcnode-id="7043" instrument_node="">There were also several indirect costs that were identified by managers. For instance, UKLGA policies on restricted user participation were seen as an important </span><em data-dcnode-id="7041"><span data-dcnode-id="7042" instrument_node="">indirect human cost</span></em><span data-dcnode-id="7040" instrument_node=""> factor that managers had to take into consideration when implementing Web 2.0 technologies. In addition, the Website Manager highlighted that use of personal time for monitoring and brokering Web 2.0 applications was a highly significant </span><em data-dcnode-id="7038"><span data-dcnode-id="7039" instrument_node="">indirect human cost</span></em><span data-dcnode-id="7037" instrument_node=""> for the LGA which resulted in </span><em data-dcnode-id="7035"><span data-dcnode-id="7036" instrument_node="">workload constraints</span></em><span data-dcnode-id="7034" instrument_node=""> for employees. The manager stated “</span><em data-dcnode-id="7032"><span data-dcnode-id="7033" instrument_node="">…the fact is that I have to keep checking my work related social media accounts several times a day means that I have to stop doing some of my routine duties for certain periods of time during the day</span></em><span data-dcnode-id="7031" instrument_node="">” (RSJ). This statement clearly highlights that there was no dedicated role (e.g. social media officer) in the council to manage these channels. As such, the indirect organisational costs relating to the </span><em data-dcnode-id="7029"><span data-dcnode-id="7030" instrument_node="">introduction of new organisational policies</span></em><span data-dcnode-id="7028" instrument_node=""> relating to social media have to be considered when introducing Web 2.0. Furthermore, the management team also felt that </span><em data-dcnode-id="7026"><span data-dcnode-id="7027" instrument_node="">loss of control</span></em><span data-dcnode-id="7025" instrument_node=""> when using social media was another significant consideration when using Web 2.0 applications as they could potentially have an impact on indirect organisational costs to manage and moderate external comments. However, the Web Manager stated that though this drawback might not stop the use of applications such as Facebook, it does raise concerns regarding trust as UKLGA has limited control over third party information that can be posted on social media.</span></p></section><section data-dcnode-id="6656" id="s0080"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7017" id="st0090"><span data-dcnode-id="7022" instrument_node="">4.1.3</span><span data-dcnode-id="7020" instrument_node="">. </span><span data-dcnode-id="7018" instrument_node="">Risks evaluation of Web 2.0 technologies</span></h4><div data-dcnode-id="6737"><p data-dcnode-id="6988" id="p0160"><span data-dcnode-id="7016" instrument_node="">The risk dimensions that were evident in the literature were broadly political and legal, reputational, security, societal and technical themes in </span><a class="workspace-trigger" data-dcnode-id="7014" href="#s0030" name="bs0030"><span data-dcnode-id="7015" instrument_node="">Section&nbsp;2.1.3</span></a><span data-dcnode-id="7013" instrument_node="">. As Web 2.0 technologies are a social platform, they allow users to discuss any matters openly, which could potentially have a direct impact on the reputation of the organisation. The e-Government Manager asserted that a risk evaluation was extremely significant and considered reputational issues as something that they needed to be more aware of than any other factors when dealing with social media. </span><a class="workspace-trigger" data-dcnode-id="7011" href="#t0040" name="bt0040"><span data-dcnode-id="7012" instrument_node="">Table&nbsp;8</span></a><span data-dcnode-id="7010" instrument_node=""> provides the analysis of the importance of Web 2.0 risk factors for its effective use in the UKLGA based on the views of the interviewees. It uses the same 7-point Likert scale of </span><em data-dcnode-id="7008"><span data-dcnode-id="7009" instrument_node="">less important</span></em><span data-dcnode-id="7007" instrument_node=""> to </span><em data-dcnode-id="7005"><span data-dcnode-id="7006" instrument_node="">fairly important</span></em><span data-dcnode-id="7004" instrument_node=""> (○), </span><em data-dcnode-id="7002"><span data-dcnode-id="7003" instrument_node="">moderately important</span></em><span data-dcnode-id="7001" instrument_node=""> to </span><em data-dcnode-id="6999"><span data-dcnode-id="7000" instrument_node="">important</span></em><span data-dcnode-id="6998" instrument_node=""> (◉) and </span><em data-dcnode-id="6996"><span data-dcnode-id="6997" instrument_node="">highly important</span></em><span data-dcnode-id="6995" instrument_node=""> to </span><em data-dcnode-id="6993"><span data-dcnode-id="6994" instrument_node="">extremely important</span></em><span data-dcnode-id="6992" instrument_node=""> (●) and where the interviewees said </span><em data-dcnode-id="6990"><span data-dcnode-id="6991" instrument_node="">not important</span></em><span data-dcnode-id="6989" instrument_node="">, the “x” symbol is used.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6738" id="t0040"><span class="captions" data-dcnode-id="6980"><span data-dcnode-id="6981" id="ca0045"><p data-dcnode-id="6982" id="sp0065"><span class="label" data-dcnode-id="6986"><span data-dcnode-id="6987" instrument_node="">Table&nbsp;8</span></span><span data-dcnode-id="6985" instrument_node="">. </span><span data-dcnode-id="6983" instrument_node="">Importance of Web 2.0 technology risks.</span></p></span></span><div class="groups" data-dcnode-id="6739"><table data-dcnode-id="6740"><thead data-dcnode-id="6962"><tr class="valign-top rowsep-1" data-dcnode-id="6963"><th class="align-left" data-dcnode-id="6978" scope="col"><span data-dcnode-id="6979" instrument_node="">Classification</span></th><th class="align-left" data-dcnode-id="6976" scope="col"><span data-dcnode-id="6977" instrument_node="">Risks of Web 2.0 technologies</span></th><th class="align-left" data-dcnode-id="6974" scope="col"><span data-dcnode-id="6975" instrument_node="">Head of ICT</span></th><th class="align-left" data-dcnode-id="6972" scope="col"><span data-dcnode-id="6973" instrument_node="">Corporate e-Government Manager</span></th><th class="align-left" data-dcnode-id="6970" scope="col"><span data-dcnode-id="6971" instrument_node="">Website Manager</span></th><th class="align-left" data-dcnode-id="6968" scope="col"><span data-dcnode-id="6969" instrument_node="">IT Systems Manager</span></th><th clas ="align-left" data-dcnode-id="6819" rowspan="2"><span data-dcnode-id="6820" instrument_node="">Societal</span></td><td class="align-left" data-dcnode-id="6817"><span data-dcnode-id="6818" instrument_node="">▪Social isolation</span></td><td class="align-left" data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6807"><span data-dcnode-id="6808" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6805"><span data-dcnode-id="6806" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="6789"><td class="align-left" data-dcnode-id="6802"><span data-dcnode-id="6803" instrument_node="">▪Digital divide</span></td><td class="align-left" data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6798"><span data-dcnode-id="6799" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6794"><span data-dcnode-id="6795" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6790"><span data-dcnode-id="6791" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="6772"><td class="align-left" data-dcnode-id="6787" rowspan="3"><span data-dcnode-id="6788" instrument_node="">Technical</span></td><td class="align-left" data-dcnode-id="6785"><span data-dcnode-id="6786" instrument_node="">▪Access to the technologies</span></td><td class="align-left" data-dcnode-id="6783"><span data-dcnode-id="6784" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6781"><span data-dcnode-id="6782" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6779"><span data-dcnode-id="6780" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6777"><span data-dcnode-id="6778" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="6757"><td class="align-left" data-dcnode-id="6770"><span data-dcnode-id="6771" instrument_node="">▪Discontinuation of technology</span></td><td class="align-left" data-dcnode-id="6768"><span data-dcnode-id="6769" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6764"><span data-dcnode-id="6765" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6760"><span data-dcnode-id="6761" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6758"><span data-dcnode-id="6759" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="6742"><td class="align-left" data-dcnode-id="6755"><span data-dcnode-id="6756" instrument_node="">▪Other: integration with other systems</span></td><td class="align-left" data-dcnode-id="6753"><span data-dcnode-id="6754" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6749"><span data-dcnode-id="6750" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6747"><span data-dcnode-id="6748" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6743"><span data-dcnode-id="6744" instrument_node="">●</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6702" id="p0165"><span data-dcnode-id="6736" instrument_node="">As the above table illustrates, risk factors such as </span><em data-dcnode-id="6734"><span data-dcnode-id="6735" instrument_node="">data ownership</span></em><span data-dcnode-id="6733" instrument_node="">, </span><em data-dcnode-id="6731"><span data-dcnode-id="6732" instrument_node="">risk of information overload and reliability</span></em><span data-dcnode-id="6730" instrument_node=""> and </span><em data-dcnode-id="6728"><span data-dcnode-id="6729" instrument_node="">security and privacy</span></em><span data-dcnode-id="6727" instrument_node=""> were some of the factors that the senior management team believed to be important in the use of Web 2.0 applications. In particular, weak social media policies, data ownership and protection and freedom of information were all considered to be significant risks that needed to be considered within the </span><em data-dcnode-id="6725"><span data-dcnode-id="6726" instrument_node="">political and legal</span></em><span data-dcnode-id="6724" instrument_node=""> context. For instance, the Website Manager asserted that </span><em data-dcnode-id="6722"><span data-dcnode-id="6723" instrument_node="">data protection</span></em><span data-dcnode-id="6721" instrument_node=""> is significant due to the social nature of Web 2.0 tools and usually users have their personal details stored on these applications. Similarly, with regard to </span><em data-dcnode-id="6719"><span data-dcnode-id="6720" instrument_node="">data ownership</span></em><span data-dcnode-id="6718" instrument_node="">, some managers raised concerns about information being placed in social media applications by third party organisations whose views may not always be in line with UKLGA's own policies. On the other hand, </span><em data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">reputational risks</span></em><span data-dcnode-id="6715" instrument_node="">, </span><em data-dcnode-id="6713"><span data-dcnode-id="6714" instrument_node="">information overload and reliability</span></em><span data-dcnode-id="6712" instrument_node=""> were highlighted as significant risks that had to be taken into account before implementing these applications. The IT Support Manager also agreed that there is certainly a risk of keeping the data presented on the social media applications accurate. The manager claimed that “</span><em data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">internally UKLGA's intranet sites were not maintained as well as they should have been, so the more information there is, the more difficult it is to maintain accurate information</span></em><span data-dcnode-id="6709" instrument_node="">” (NP). Furthermore, c</span><em data-dcnode-id="6707"><span data-dcnode-id="6708" instrument_node="">ritical review comments</span></em><span data-dcnode-id="6706" instrument_node=""> by employees were another key factor that the management had referred to as an important reputational risk that UKLGA had to be aware of as it was another case of managing its public image. However, on the other hand, the IT Systems Manager stated that although there may be instances when negative reviews are posted by users, “</span><em data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">this could also mean the council isn't providing a good service</span></em><span data-dcnode-id="6703" instrument_node="">” (NP). So it is up to UKLGA to investigate these types of reviews and embrace any valuable feedback to improve their services.</span></p><p data-dcnode-id="6679" id="p0170"><span data-dcnode-id="6701" instrument_node="">The statements made by the UKLGA management unsurprisingly highlight </span><em data-dcnode-id="6699"><span data-dcnode-id="6700" instrument_node="">security and privacy</span></em><span data-dcnode-id="6698" instrument_node=""> as the most significant </span><em data-dcnode-id="6696"><span data-dcnode-id="6697" instrument_node="">security</span></em><span data-dcnode-id="6695" instrument_node=""> risk factors of Web 2.0 applications that needed consideration before using these technologies. The manager commented that there were two key reasons for this tight control:</span></p><dl class="list" data-dcnode-id="6680"><dt class="list-label" data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="6688"><p data-dcnode-id="6689" id="p0380"><em data-dcnode-id="6691"><span data-dcnode-id="6692" instrument_node="">Moderation and security</span></em><span data-dcnode-id="6690" instrument_node=""> — to take control of a social media account immediately in case of an unauthorised security breach. This would avoid having to waste crucial time getting in touch with multiple users to shut down a social media channel.</span></p></dd><dt class="list-label" data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="6681"><p data-dcnode-id="6682" id="p0385"><em data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">Operational continuity</span></em><span data-dcnode-id="6683" instrument_node=""> — to be able to continue to use and transfer social media applications in cases where existing staff managing a social media account leave the UKLGA.</span></p></dd></dl><p></p><p data-dcnode-id="6665"><span data-dcnode-id="6678" instrument_node="">In addition, social isolation and digital divide were both regarded as highly significant </span><em data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">societal</span></em><span data-dcnode-id="6675" instrument_node=""> risk factors for the UKLGA by a majority of the management. For instance, the IT Support Manager believed that digital divide was certainly an issue as some of the younger workforce had questioned the lack of use and access to some of the systems in the organisation which had somewhat restricted their ability to perform their job. Similarly, the e-Government Manager reported: “</span><em data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">When you talk about traditional web services, you have to think about somebody having a PC at home, access to broadband and all of that</span></em><span data-dcnode-id="6672" instrument_node="">. </span><em data-dcnode-id="6670"><span data-dcnode-id="6671" instrument_node="">With mobile phones and mobile devices that whole area or debate is just opened right up and we knew that the people that we are engaging with on social media are on mobile devices and that made it affordable</span></em><span data-dcnode-id="6669" instrument_node="">. </span><em data-dcnode-id="6667"><span data-dcnode-id="6668" instrument_node="">So if we weren't in that market we were going to miss those people so it's extremely significant.</span></em><span data-dcnode-id="6666" instrument_node="">” (SD).</span></p><p data-dcnode-id="6657" id="p0175"><span data-dcnode-id="6664" instrument_node="">Similarly, in relation to </span><em data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">social isolation</span></em><span data-dcnode-id="6661" instrument_node="">, the Web Manager stated that although they consider this risk as significant, it was never the intention that social media applications would be a full replacement for the traditional means of communication such as using the phone or face-to-face meetings. However, this manager thought it was important for the UKLGA to consider these risks as the employees become more drawn into these technologies, especially the younger workforce. According to the e-Government Manager, Web 2.0 applications are a supplement to the other methods they use traditionally, so it would not be an issue for the LGA if they were to discontinue. Apart from the Web 2.0 risks derived from the existing literature, the IT Support Manager noted that </span><em data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">integration with other systems</span></em><span data-dcnode-id="6658" instrument_node=""> was an additional technical risk of the use of Web 2.0 applications. This manager believes that integrating some Web 2.0 applications with the existing systems in the organisation could prove challenging at times as well as time-consuming.</span></p></section></section><section data-dcnode-id="6289" id="s0085"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6649" id="st0095"><span data-dcnode-id="6654" instrument_node="">4.2</span><span data-dcnode-id="6652" instrument_node="">. </span><span data-dcnode-id="6650" instrument_node="">Organisational, technological and social impact of Web 2.0</span></h3><p data-dcnode-id="6638" id="p0185"><span data-dcnode-id="6648" instrument_node="">Since the key focus within this study is the use of Web 2.0 for local government authorities to facilitate their internal operations, as outlined in Section 2.2, the three classifications that articulate the impact of such technology were </span><em data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">organisational</span></em><span data-dcnode-id="6645" instrument_node="">, </span><em data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">technological</span></em><span data-dcnode-id="6642" instrument_node=""> and </span><em data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">social</span></em><span data-dcnode-id="6639" instrument_node="">. When the interviewees were questioned regarding the impact of Web 2.0 technologies on UKLGA, most anticipated an impact in each of these areas. The e-Government Manager stated that the social and organisational impact was one of the key drivers for implementing Web 2.0 technologies and an assessment on whether this could be achieved would affect the decision-making process.</span></p><div data-dcnode-id="6336"><p data-dcnode-id="6613" id="p0190"><a class="workspace-trigger" data-dcnode-id="6636" href="#t0045" name="bt0045"><span data-dcnode-id="6637" instrument_node="">Table&nbsp;9</span></a><span data-dcnode-id="6635" instrument_node=""> provides an analysis of the Web 2.0 impact factors based on the views of the interviewees. It uses the 7-point Likert scale of </span><em data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">less important</span></em><span data-dcnode-id="6632" instrument_node=""> to </span><em data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">fairly important</span></em><span data-dcnode-id="6629" instrument_node=""> (○), </span><em data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">moderately important</span></em><span data-dcnode-id="6626" instrument_node=""> to </span><em data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">important</span></em><span data-dcnode-id="6623" instrument_node=""> (◉) and </span><em data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">highly important</span></em><span data-dcnode-id="6620" instrument_node=""> to </span><em data-dcnode-id="6618"><span data-dcnode-id="6619" instrument_node="">extremely important</span></em><span data-dcnode-id="6617" instrument_node=""> (●) and where the interviewees said </span><em data-dcnode-id="6615"><span data-dcnode-id="6616" instrument_node="">not important</span></em><span data-dcnode-id="6614" instrument_node="">, the “x” symbol is used.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6337" id="t0045"><span class="captions" data-dcnode-id="6605"><span data-dcnode-id="6606" id="ca0050"><p data-dcnode-id="6607" id="sp0070 strument_node="">▪Scalability</span></td><td class="align-left" data-dcnode-id="6429"><span data-dcnode-id="6430" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6425"><span data-dcnode-id="6426" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6423"><span data-dcnode-id="6424" instrument_node="">x</span></td><td class="align-left" data-dcnode-id="6421"><span data-dcnode-id="6422" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6419"><span data-dcnode-id="6420" instrument_node="">○</span></td></tr><tr class="valign-top" data-dcnode-id="6403"><td class="align-left" data-dcnode-id="6416"><span data-dcnode-id="6417" instrument_node="">▪Data presentation</span></td><td class="align-left" data-dcnode-id="6414"><span data-dcnode-id="6415" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6412"><span data-dcnode-id="6413" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6410"><span data-dcnode-id="6411" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6408"><span data-dcnode-id="6409" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6406"><span data-dcnode-id="6407" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6404"><span data-dcnode-id="6405" instrument_node="">○</span></td></tr><tr class="valign-top" data-dcnode-id="6386"><td class="align-left" data-dcnode-id="6401" rowspan="4"><span data-dcnode-id="6402" instrument_node="">Social</span></td><td class="align-left" data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node="">▪Democratic participation and engagement</span></td><td class="align-left" data-dcnode-id="6397"><span data-dcnode-id="6398" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6393"><span data-dcnode-id="6394" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6391"><span data-dcnode-id="6392" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6389"><span data-dcnode-id="6390" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6387"><span data-dcnode-id="6388" instrument_node="">○</span></td></tr><tr class="valign-top" data-dcnode-id="6371"><td class="align-left" data-dcnode-id="6384"><span data-dcnode-id="6385" instrument_node="">▪Co-production</span></td><td class="align-left" data-dcnode-id="6382"><span data-dcnode-id="6383" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6380"><span data-dcnode-id="6381" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6378"><span data-dcnode-id="6379" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6376"><span data-dcnode-id="6377" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="6356"><td class="align-left" data-dcnode-id="6369"><span data-dcnode-id="6370" instrument_node="">▪Crowdsourcing solutions and innovations</span></td><td class="align-left" data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">x</span></td><td class="align-left" data-dcnode-id="6365"><span data-dcnode-id="6366" instrument_node="">x</span></td><td class="align-left" data-dcnode-id="6363"><span data-dcnode-id="6364" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6357"><span data-dcnode-id="6358" instrument_node="">○</span></td></tr><tr class="valign-top" data-dcnode-id="6341"><td class="align-left" data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">▪Building and maintaining trust</span></td><td class="align-left" data-dcnode-id="6352"><span data-dcnode-id="6353" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6348"><span data-dcnode-id="6349" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6346"><span data-dcnode-id="6347" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="6342"><span data-dcnode-id="6343" instrument_node="">●</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6316" id="p0195"><span data-dcnode-id="6335" instrument_node="">The table highlights the fact that Web 2.0 technologies have had the most significant impact on </span><em data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">collaboration and communication</span></em><span data-dcnode-id="6332" instrument_node="">, </span><em data-dcnode-id="6330"><span data-dcnode-id="6331" instrument_node="">security and privacy</span></em><span data-dcnode-id="6329" instrument_node=""> and </span><em data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">building and maintaining trust</span></em><span data-dcnode-id="6326" instrument_node=""> elements of the UKLGA. From an organisational dimension, the impact of Web 2.0 on </span><em data-dcnode-id="6324"><span data-dcnode-id="6325" instrument_node="">collaboration and communication</span></em><span data-dcnode-id="6323" instrument_node=""> was considered as the most significant implication. For instance, the head of ICT emphasised the importance of communication within different departments by stating “</span><em data-dcnode-id="6321"><span data-dcnode-id="6322" instrument_node="">I think communication and collaboration is highly significant within departments</span></em><span data-dcnode-id="6320" instrument_node="">. </span><em data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">Because departments know what they are doing and we have got separate departments knowing a bit more than others and they have been able to talk to each other via this media is a lot better, so it's important</span></em><span data-dcnode-id="6317" instrument_node="">” (SJ). Managers also highlighted that collaborative editing applications such as Wikis made the process of collection and sharing of information more efficient. The interviewees stated that communication and collaboration within departments have been more efficient using collaborative applications such as Google's ‘Apps for Business’ and Yammer. The management asserted that it helped improve communication by breaking down the traditional organisational hierarchy.</span></p><p data-dcnode-id="6290" id="p0200"><span data-dcnode-id="6315" instrument_node="">Surprisingly, the implication of Web 2.0 technologies on </span><em data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">culture and change</span></em><span data-dcnode-id="6312" instrument_node=""> was considered to have a less significant impact on UKLGA by a majority of the interview participants. The Head of ICT and the IT Support Manager both believed that Web 2.0 technologies had not had a substantial effect on UKLGA within this context, as the staff were open to the change. The senior managers believed that this was because UKLGA operates an ‘open culture’ policy for embracing change. This view was also echoed across senior managers from non-IT departments such as Highways and Finance departments when these managers were interviewed on an informal basis to crosscheck the results and avoid any bias. For instance, the Information Manager stated: “</span><em data-dcnode-id="6310"><span data-dcnode-id="6311" instrument_node="">In general, I think it's an open culture, I don't think it is particularly autocratic, I think it also has a culture of allowing people to develop and try things</span></em><span data-dcnode-id="6309" instrument_node="">. </span><em data-dcnode-id="6307"><span data-dcnode-id="6308" instrument_node="">They want results at the end of the day but to get those results, certainly in the department that I work in, we are not afraid to try something that doesn't work because sometimes it doesn't always work and then you go back and say well ok what didn't work</span></em><span data-dcnode-id="6306" instrument_node="">? </span><em data-dcnode-id="6304"><span data-dcnode-id="6305" instrument_node="">Why didn't it work? And you try something else</span></em><span data-dcnode-id="6303" instrument_node="">. </span><em data-dcnode-id="6301"><span data-dcnode-id="6302" instrument_node="">So I think it's a fair assessment.</span></em><span data-dcnode-id="6300" instrument_node="">” (SSIM). Such an open culture was seen to be significant in the light of the level of risks posed by new ICT. The Head of ICT stated that some Web 2.0 technologies were more risky than others. For instance, according to SJ, using Wikis was not high risk as they were mainly used for information research but if they were to send “tweets” using Twitter, then there is a high risk of damage to reputation. The interviewees considered the potential of Web 2.0 applications to allow </span><em data-dcnode-id="6298"><span data-dcnode-id="6299" instrument_node="">data presentation</span></em><span data-dcnode-id="6297" instrument_node=""> in various methods as not posing any significant implications for UKLGA. In fact, interviewees echoed the point that regular interaction with users via social media technologies helped build and maintain trust. For instance, the IT Systems Manager mentioned “</span><em data-dcnode-id="6295"><span data-dcnode-id="6296" instrument_node="">… I think trust is significant just because even if we are not delivering at full capacity, you know the experience, the full interactive one where someone's always there online helping</span></em><span data-dcnode-id="6294" instrument_node="">. </span><em data-dcnode-id="6292"><span data-dcnode-id="6293" instrument_node="">If people can't trust or even look at it, obviously the channel is going to die</span></em><span data-dcnode-id="6291" instrument_node="">” (RJB). Although the above views suggest that there are some positive effects of Web 2.0 on UKLGA, as indicative in table X, the overall conclusions are of a mixed nature. This can be attributed to the fact that UKLGA have only recently adopted Web 2.0 technologies and thus interviewees felt that it was too early to assess its real value and impact.</span></p></section></section><section data-dcnode-id="6067" id="s0090"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6282" id="st0100"><span data-dcnode-id="6287" instrument_node="">5</span><span data-dcnode-id="6285" instrument_node="">. </span><span data-dcnode-id="6283" instrument_node="">Research synthesis: an emergent framework for evaluating the use and impact of Web 2.0 in the context of e-Government</span></h2><div data-dcnode-id="6242"><p data-dcnode-id="6262" id="p0205"><span data-dcnode-id="6281" instrument_node="">The literature review conducted in this study identified several important factors which need to be considered when using new ICT such as Web 2.0 which we categorised under three main themes for the purpose of evaluation and a further three for impact based on seminal literature including (</span><a class="workspace-trigger" data-dcnode-id="6279" href="#bb0040" name="bbb0040"><span data-dcnode-id="6280" instrument_node="">Benaroch, 2002</span></a><span data-dcnode-id="6278" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6276" href="#bb0145" name="bbb0145"><span data-dcnode-id="6277" instrument_node="">DiMaggio et al., 2001</span></a><span data-dcnode-id="6275" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6273" href="#bb0240" name="bbb0240"><span data-dcnode-id="6274" instrument_node="">Irani and Love, 2002</span></a><span data-dcnode-id="6272" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6270" href="#bb0430" name="bbb0430"><span data-dcnode-id="6271" instrument_node="">Shang and Seddon, 2002</span></a><span data-dcnode-id="6269" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6267" href="#bb0500" name="bbb0500"><span data-dcnode-id="6268" instrument_node="">Wu and Ong, 2008</span></a><span data-dcnode-id="6266" instrument_node="">). This section draws together the existing literature as well as the empirical data from the case study conducted and moulds them into a framework based around these themes (benefits, costs and risks for evaluation and organisational, technological and social for impact assessment). The framework is presented in </span><a class="workspace-trigger" data-dcnode-id="6264" href="#f0005" name="bf0005"><span data-dcnode-id="6265" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="6263" instrument_node=""> and discussed in the section that follows.</span></p><figure class="figure text-xs" data-dcnode-id="6243" id="f0005"><span data-dcnode-id="6252"><img alt="" aria-describedby="ca0005" data-dcnode-id="6261" height="557" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0740624X15000763-gr1.jpg&amp;raw"><span data-dcnode-id="6260" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6253"><li data-dcnode-id="6254"><a class="anchor download-link u-font-sans" data-dcnode-id="6255" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0740624X15000763-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6256"><span data-dcnode-id="6259" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6244"><span data-dcnode-id="6245" id="ca0005"><p data-dcnode-id="6246" id="sp0025"><span class="label" data-dcnode-id="6250"><span data-dcnode-id="6251" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="6249" instrument_node="">. </span><span data-dcnode-id="6247" instrument_node="">An emergent framework for evaluating the use and impact of Web 2.0 in e-Government.</span></p></span></span></figure></div><p data-dcnode-id="6213" id="p0210"><span data-dcnode-id="6241" instrument_node="">The case study findings suggest that a majority of the factors that were identified as important in the literature, both for evaluation and impact assessment, were relevant in practice. From an evaluation criteria perspective, this study identified four additional factors (i.e. benefits: </span><em data-dcnode-id="6239"><span data-dcnode-id="6240" instrument_node="">intra-marketing</span></em><span data-dcnode-id="6238" instrument_node="">, </span><em data-dcnode-id="6236"><span data-dcnode-id="6237" instrument_node="">informal engagement</span></em><span data-dcnode-id="6235" instrument_node="">, costs: </span><em data-dcnode-id="6233"><span data-dcnode-id="6234" instrument_node="">workload constraints</span></em><span data-dcnode-id="6232" instrument_node=""> and risks: </span><em data-dcnode-id="6230"><span data-dcnode-id="6231" instrument_node="">integration with other systems</span></em><span data-dcnode-id="6229" instrument_node="">) as part of the evaluation criteria which were not previously discussed in the extant literature surrounding the context of Web 2.0 use in a local government context. Moreover, one benefit evaluation factor was found irrelevant (i.e. </span><em data-dcnode-id="6227"><span data-dcnode-id="6228" instrument_node="">improvement of policy making</span></em><span data-dcnode-id="6226" instrument_node="">) from the UKLGA perspective. Within the impact assessment, four factors (i.e. organisational: </span><em data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">culture and change</span></em><span data-dcnode-id="6223" instrument_node="">, </span><em data-dcnode-id="6221"><span data-dcnode-id="6222" instrument_node="">policy alignment and governance</span></em><span data-dcnode-id="6220" instrument_node="">, technological: </span><em data-dcnode-id="6218"><span data-dcnode-id="6219" instrument_node="">scalability</span></em><span data-dcnode-id="6217" instrument_node=""> and social: </span><em data-dcnode-id="6215"><span data-dcnode-id="6216" instrument_node="">crowdsourcing solutions and innovations</span></em><span data-dcnode-id="6214" instrument_node="">) that were reported in the existing literature as important were found irrelevant in the UKLGA context.</span></p><section data-dcnode-id="6186" id="s0095"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6207" id="st0105"><span data-dcnode-id="6212" instrument_node="">5.1</span><span data-dcnode-id="6210" instrument_node="">. </span><span data-dcnode-id="6208" instrument_node="">Benefits evaluation of Web 2.0 technologies</span></h3><p data-dcnode-id="6187" id="p0215"><span data-dcnode-id="6206" instrument_node="">This study confirms that a comprehensive and systematic evaluation of the benefits of Web 2.0 is essential before using or launching any such initiative. In addition to the benefits of Web 2.0 derived from the literature, marketing of services to employees was highlighted as an important strategic benefit of Web 2.0 that the UKLGA believed was of significance for the decision-making process for its use. This activity in this study is referred to as </span><em data-dcnode-id="6204"><span data-dcnode-id="6205" instrument_node="">Intra-marketing</span></em><span data-dcnode-id="6203" instrument_node="">. Though marketing is quite clearly the primary purpose of using these applications in the private sector, it is interesting to note that the promotion of UKLGA's existing services with the internal employees was a prominent and an effective use of these applications in the case organisation. </span><em data-dcnode-id="6201"><span data-dcnode-id="6202" instrument_node="">Informal engagement</span></em><span data-dcnode-id="6200" instrument_node=""> was also considered to be another important factor that was not indicated in the existing literature. UKLGA noted that Web 2.0 applications such as blogs were also very useful for disseminating information to staff quickly and in a more collegiate manner compared to formal communications. The Head of ICT noted that this helped improve the communication style of senior staff into something less stentorian. Interestingly, </span><em data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">i</span></em><span data-dcnode-id="6197" instrument_node="">n the existing literature, </span><a class="workspace-trigger" data-dcnode-id="6195" href="#bb0150" name="bbb0150"><span data-dcnode-id="6196" instrument_node="">Dixon (2010)</span></a><span data-dcnode-id="6194" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="6192" href="#bb0070" name="bbb0070"><span data-dcnode-id="6193" instrument_node="">Bonsón et al. (2012)</span></a><span data-dcnode-id="6191" instrument_node=""> note that </span><em data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">improvement of policy making</span></em><span data-dcnode-id="6188" instrument_node=""> can be achieved through the use of Web 2.0 technologies, notably through things such as online collaboration and mapping applications. This allows a greater level of inclusion and responsiveness throughout the policy process. However, the practical experience of managers in the case study organisation went against this, noting that it looked fine on paper, but would actually just come down to a small group of self-selectors.</span></p></section><section data-dcnode-id="6174" id="s0100"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6180" id="st0110"><span data-dcnode-id="6185" instrument_node="">5.2</span><span data-dcnode-id="6183" instrument_node="">. </span><span data-dcnode-id="6181" instrument_node="">Costs evaluation of Web 2.0 technologies</span></h3><p data-dcnode-id="6175" id="p0220"><span data-dcnode-id="6179" instrument_node="">Understanding the benefits of Web 2.0 has to be married to an understanding of the costs associated with it. As with the benefits, the majority of cost-related factors identified in the literature were seen to be important in UKLGA. Apart from the existing costs derived from the literature, the senior management in the case study organisation indicated that a significant indirect cost associated with Web 2.0 was monitoring and brokering these applications in the organisation. This was currently done in a highly inefficient manner by employees who should have been doing the normal work routine related activities. This indirect cost factor is defined in this study as </span><em data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">workload constraints</span></em><span data-dcnode-id="6176" instrument_node=""> which refereed to employees voluntarily using their normal work routine time to manage and engage in Web 2.0 technologies for work related activities. The time spent by an employee who was not mainly responsible for moderating Web 2.0 applications was seen as an additional indirect cost for UKLGA which was not reported in the extant literature. This was mentioned in parallel with the cost base of new staff required for investing in new technology cited in the literature.</span></p></section><section data-dcnode-id="6159" id="s0105"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6168" id="st0115"><span data-dcnode-id="6173" instrument_node="">5.3</span><span data-dcnode-id="6171" instrument_node="">. </span><span data-dcnode-id="6169" instrument_node="">Risks evaluation of Web 2.0 technologies</span></h3><p data-dcnode-id="6160" id="p0225"><span data-dcnode-id="6167" instrument_node="">The findings of the case study and literature support the importance of conducting a systematic risk evaluation of Web 2.0 as part of a comprehensive IS evaluation for the organisation. The empirical evidence confirmed that all risk factors identified in the literature were relevant in practice, and also identified the risk of </span><em data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">integrating Web 2.0 with other existing systems</span></em><span data-dcnode-id="6164" instrument_node=""> as an important consideration. </span><em data-dcnode-id="6162"><span data-dcnode-id="6163" instrument_node="">Integration and interface with other systems</span></em><span data-dcnode-id="6161" instrument_node=""> was a clear technical risk identified in the case study organisation, in that any Web 2.0 applications would need to integrate and interface with existing systems. The senior management of the UKLGA believed that this was not only technically difficult, but immensely time-consuming. Not only that, but there may be a need to bring in external consultants if they lack the technical skills for all or part of such an integration.</span></p></section><section data-dcnode-id="6068" id="s0110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6153" id="st0120"><span data-dcnode-id="6158" instrument_node="">5.4</span><span data-dcnode-id="6156" instrument_node="">. </span><span data-dcnode-id="6154" instrument_node="">Impact analysis of Web 2.0 on the UKLGA</span></h3><p data-dcnode-id="6136" id="p0230"><span data-dcnode-id="6152" instrument_node="">A majority of the factors identified in the literature as important when analysing the impact of Web 2.0 were seen as relevant in practice as illustrated in </span><a class="workspace-trigger" data-dcnode-id="6150" href="#f0005" name="bf0005"><span data-dcnode-id="6151" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="6149" instrument_node="">. However, in an organisational context, </span><em data-dcnode-id="6147"><span data-dcnode-id="6148" instrument_node="">culture and change</span></em><span data-dcnode-id="6146" instrument_node="">, </span><em data-dcnode-id="6144"><span data-dcnode-id="6145" instrument_node="">policy alignment and governance</span></em><span data-dcnode-id="6143" instrument_node=""> were not considered to be relevant by UKLGA. Similarly, from a technological perspective, </span><em data-dcnode-id="6141"><span data-dcnode-id="6142" instrument_node="">scalability</span></em><span data-dcnode-id="6140" instrument_node=""> and from a social perspective, </span><em data-dcnode-id="6138"><span data-dcnode-id="6139" instrument_node="">crowdsourcing solutions and innovations</span></em><span data-dcnode-id="6137" instrument_node=""> were seen as irrelevant for UKLGA at the time of the study.</span></p><p data-dcnode-id="6110" id="p0235"><span data-dcnode-id="6135" instrument_node="">The implications of Web 2.0 technologies on </span><em data-dcnode-id="6133"><span data-dcnode-id="6134" instrument_node="">culture and change</span></em><span data-dcnode-id="6132" instrument_node=""> were considered to be of least consequence in the case study organisation. From the literature, </span><a class="workspace-trigger" data-dcnode-id="6130" href="#bb0375" name="bbb0375"><span data-dcnode-id="6131" instrument_node="">Parycek and Sachs (2010)</span></a><span data-dcnode-id="6129" instrument_node=""> note that successful use of Web 2.0 strategies requires a culture of innovation, collaboration, user-generated content and transparency. The case study managers felt that this had not changed their organisation much, as they had already adopted many of these characteristics, which was endorsed both within and beyond the ICT department. In terms of p</span><em data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">olicy alignment and governance</span></em><span data-dcnode-id="6126" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6124" href="#bb0310" name="bbb0310"><span data-dcnode-id="6125" instrument_node="">Meijer &amp; Thaens (2010)</span></a><span data-dcnode-id="6123" instrument_node=""> argues that Web 2.0 strategies make it essential for LGAs to make sure their internal policies are tightly aligned against practices to minimise risk from issues such as confidentiality, propriety etc. However, the IT managers in UKLGA did not support this, arguing that they already had highly robust systems in place and also had a social media policy for employees to follow, so Web 2.0 did not represent a major task. In the existing literature, </span><a class="workspace-trigger" data-dcnode-id="6121" href="#bb0340" name="bbb0340"><span data-dcnode-id="6122" instrument_node="">O'Reilly (2007)</span></a><span data-dcnode-id="6120" instrument_node=""> argues that some variants of Web 2.0, notably cloud computing technologies, offer fast and efficient </span><em data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">scalability</span></em><span data-dcnode-id="6117" instrument_node="">. The case study managers noted that while there was theoretical support for this, many of the applications that are specifically scalable – file sharing for example – are not particularly relevant to or prevalent in local government yet, so these had little impact. With regards to </span><em data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">crowdsourcing solutions and innovations</span></em><span data-dcnode-id="6114" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6112" href="#bb0050" name="bbb0050"><span data-dcnode-id="6113" instrument_node="">Bertot et al. (2012)</span></a><span data-dcnode-id="6111" instrument_node=""> note that one of the key features of Web 2.0 approaches is knowledge sharing (particularly crowdsourcing), both internally and externally, potentially allowing for new forms of innovation. However the case study managers felt that, as yet, innovation and crowdsourcing had very little impact. This is perhaps best explained by noting that the existing use of Web 2.0 is more in terms of public administration rather than policy formulation. It may be that the more interactive aspects of Web 2.0 are better suited to wider, more open-ended, consultations rather than the use so far made by the UKLGA.</span></p><p data-dcnode-id="6089" id="p0240"><span data-dcnode-id="6109" instrument_node="">Overall, it is evident that the UKLGA's proposed approach to Web 2.0 evaluation is a close match to the framework. In particular, there is evidence that identifying factors such as benefits, costs and risks and for these to be appraised through consideration of organisational, technological and social impact factors is an effective approach. In addition to corroborating the literature findings, the interviews supported the majority of the more specific factors that were identified in </span><a class="workspace-trigger" data-dcnode-id="6107" href="#f0005" name="bf0005"><span data-dcnode-id="6108" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="6106" instrument_node="">. In effect, the data gathered from the UKLGA contributes to the normative literature by:</span></p><dl class="list" data-dcnode-id="6090"><dt class="list-label" data-dcnode-id="6104"><span data-dcnode-id="6105" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="6101"><p data-dcnode-id="6102" id="p0390"><span data-dcnode-id="6103" instrument_node="">Combining and extending existing research in Web 2.0 in e-Government.</span></p></dd><dt class="list-label" data-dcnode-id="6099"><span data-dcnode-id="6100" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="6096"><p data-dcnode-id="6097" id="p0395"><span data-dcnode-id="6098" instrument_node="">Improving the quality of Web 2.0 assessment and evaluation.</span></p></dd><dt class="list-label" data-dcnode-id="6094"><span data-dcnode-id="6095" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="6091"><p data-dcnode-id="6092" id="p0400"><span data-dcnode-id="6093" instrument_node="">Providing increased insight for decision makers and senior managers surrounding Web 2.0 applications.</span></p></dd></dl><p></p><p data-dcnode-id="6071"><span data-dcnode-id="6088" instrument_node="">Additionally, the proposed framework makes an important contribution to the emerging literature of e-Government and Web 2.0 by presenting a synthesis of factors from the existing literature which is now grounded in empirical data. Importantly, this study supports the validity of the existing research and issues identified as important for Web 2.0 in other settings are valid in the context of local governments. This means the framework has been developed by:</span></p><dl class="list" data-dcnode-id="6072"><dt class="list-label" data-dcnode-id="6086"><span data-dcnode-id="6087" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="6083"><p data-dcnode-id="6084" id="p0405"><span data-dcnode-id="6085" instrument_node="">Synthesising a wide variety of research studies and factors of Web 2.0 evaluation into a single holistic framework.</span></p></dd><dt class="list-label" data-dcnode-id="6081"><span data-dcnode-id="6082" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="6078"><p data-dcnode-id="6079" id="p0410"><span data-dcnode-id="6080" instrument_node="">Providing a comparative evaluation of a wide range of Web 2.0 impacts with management experience producing a more robust result.</span></p></dd><dt class="list-label" data-dcnode-id="6076"><span data-dcnode-id="6077" instrument_node="">▪</span></dt><dd class="list-description" data-dcnode-id="6073"><p data-dcnode-id="6074" id="p0415"><span data-dcnode-id="6075" instrument_node="">Developing a new set of potential research trajectories for exploration in the future.</span></p></dd></dl><p></p><p data-dcnode-id="6069" id="p0245"><span data-dcnode-id="6070" instrument_node="">The proposed framework, therefore, has clear and specific theoretical and practical implications for e-Government projects in local government as well as the research community. These are further discussed as part of the conclusions of this study.</span></p></section></section><section data-dcnode-id="6019" id="s0115"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6061" id="st0125"><span data-dcnode-id="6066" instrument_node="">6</span><span data-dcnode-id="6064" instrument_node="">. </span><span data-dcnode-id="6062" instrument_node="">Conclusions, limitations and future research</span></h2><p data-dcnode-id="6059" id="p0255"><span data-dcnode-id="6060" instrument_node="">The findings drawn from the literature on the benefits, cost, and risks of Web 2.0 and its impact on LGAs illustrate how Web 2.0 applications can have a significant effect (i.e. both positive and negative) on such organisations. Therefore, a systematic assessment of these applications would be useful and strengthen the ex-ante evaluation process prior to Web 2.0 use, thus justifying the need for the proposed emergent framework in this study. An important conclusion from the support of the framework is that traditional ICT evaluation criterion and techniques do apply to Web 2.0 innovations in e-Government. The use of Web 2.0 technologies is clearly a major transformation in how governments can operate and enhance their existing intra-organisational work practices but should be treated in the same way as any other major ICT development. The findings from this study offer several insights to both the theoretical and practice context of e-Government and Web 2.0 use in this domain.</span></p><p data-dcnode-id="6030" id="p0260"><span data-dcnode-id="6058" instrument_node="">In terms of </span><em data-dcnode-id="6056"><span data-dcnode-id="6057" instrument_node="">theoretical contribution</span></em><span data-dcnode-id="6055" instrument_node="">, this research has allowed for the development of an emergent framework for Web 2.0 evaluation and this contributes to the existing body of knowledge on e-Government and ICT. The framework articulates a descriptive account of ICT evaluation through the classification of benefits, costs and risks as well as impact factors that may be considered useful for evaluating intra-organisational use of Web 2.0 in local government authorities. The empirical results in the study revealed several criteria (i.e. benefits: </span><em data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">intra-marketing</span></em><span data-dcnode-id="6052" instrument_node="">, </span><em data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">informal engagement</span></em><span data-dcnode-id="6049" instrument_node="">, costs: </span><em data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">workload constraints</span></em><span data-dcnode-id="6046" instrument_node=""> and risks: </span><em data-dcnode-id="6044"><span data-dcnode-id="6045" instrument_node="">integration with other systems</span></em><span data-dcnode-id="6043" instrument_node="">) which were not previously discussed in the extant literature relating to the use of Web 2.0 in a local government context. Conversely, within impact assessment, four factors (i.e. </span><em data-dcnode-id="6041"><span data-dcnode-id="6042" instrument_node="">culture and change</span></em><span data-dcnode-id="6040" instrument_node="">, </span><em data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">policy and governance</span></em><span data-dcnode-id="6037" instrument_node="">, </span><em data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">scalability</span></em><span data-dcnode-id="6034" instrument_node=""> and </span><em data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">crowdsourcing solutions and innovations</span></em><span data-dcnode-id="6031" instrument_node="">) that were previously reported in the existing literature as important were found to be irrelevant in the empirical study. The case findings also indicate that Web 2.0 applications were not being fully exploited within local government contexts. Although, it should be noted that Web 2.0 use for intra-organisational work purposes within LGAs in the UK is still at its early stages. As a result, Web 2.0 does not appear to have had a big impact on the intra-organisational activities of local governments yet. Overall, this study leads to two main contributions at a conceptual level. First, linking both the literature and empirical findings allowed the creation of a useful framework for evaluating new Web 2.0 use strategies in a local government context. The need for appropriate frameworks when evaluating new ICTs is widely recognised in existing literature. Second, the framework offers a reference point for public sector and ICT researchers to build upon and further investigate the criterion that influence Web 2.0 applications within the evolving field of e-Government.</span></p><p data-dcnode-id="6025" id="p0265"><span data-dcnode-id="6029" instrument_node="">With regard to </span><em data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">contributions to practice and management</span></em><span data-dcnode-id="6026" instrument_node="">, this study is of significant relevance to public sector policy makers, local government authorities and ICT practitioners as it provides them with a deeper understanding of knowledge factors that encourage or hinder use of Web 2.0 applications. In doing so, the framework can be used as a frame of reference to support management when taking decisions regarding the use of Web 2.0 applications in government organisations for internal work purposes. The empirical findings of this study indicated that Web 2.0 applications were being mainly used for public administration purposes and citizen engagement (i.e. marketing and dissemination related activities) in the UKLGA rather than for improving the intra-organisational processes and work activities. Finally, the study findings highlight that a combined approach using ICT evaluation criteria (i.e. benefits, costs and risks) and impact factors (i.e. organisational, technological and social) would better assist the decision-making process and lead to the effective use of Web 2.0 applications by local governments. The framework offers practitioners a holistic view of the nature and context of Web 2.0 use allowing them to assess it from multiple perspectives. Therefore, this study supports the development of a more robust ex-ante evaluation process for practitioners and decision makers in local government when decisions are made to use Web 2.0 applications for intra-organisational purposes.</span></p><p data-dcnode-id="6020" id="p0270"><span data-dcnode-id="6024" instrument_node="">This study has some </span><em data-dcnode-id="6022"><span data-dcnode-id="6023" instrument_node="">research limitations</span></em><span data-dcnode-id="6021" instrument_node=""> which should be taken into account when interpreting the results. The study relied on a single, in-depth case study to extrapolate its findings. As a result this creates issues in terms of generalising from the findings; but this could not be avoided due to the lack of structured Web 2.0 use in LGAs for internal organisational purposes at the time of conducting this study. However, the relatively close fit of the empirical findings to the themes which emerged from the literature review suggests that this study has classified the core criteria in its proposed framework that need to be considered when using Web 2.0 technologies for intra-organisational work purposes. Yet, like any research, there are several angles in which this research can be further developed. In particular, the framework can be validated by applying it in different LGA contexts within the UK as well as in other national contexts where Web 2.0 is being used or planned to be used as part of Local e-Government strategy. In addition, quantitative studies can be conducted to further validate and rank the different criteria identified in the proposed framework as Web 2.0 applications become more widely used within a local government context. Finally, the research process used in the study can be applied to identify and apply criteria for the inter-organisational use of Web 2.0 applications in local government within an e-Government context.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="6013"><button class="button button-anchor" data-dcnode-id="6014" type="button"><span class="button-text" data-dcnode-id="6015"><span data-dcnode-id="6016" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="6012"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="426" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="427" id="bs0005"><dl class="references" data-dcnode-id="428" id="reference-links-bs0005"><dt class="label" data-dcnode-id="6007"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="6008" href="#bbb0005" id="ref-id-bb0005"><span data-dcnode-id="6009" instrument_node=
