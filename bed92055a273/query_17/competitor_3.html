105" name="bbb0105"><span data-dcnode-id="8141" instrument_node="">Chen, Thoms, &amp; Fu (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8128"><td class="align-left" data-dcnode-id="8136" rowspan="2"><span data-dcnode-id="8137" instrument_node="">Societal risks</span></td><td class="align-left" data-dcnode-id="8134"><span data-dcnode-id="8135" instrument_node="">▪Social isolation</span></td><td class="align-left" data-dcnode-id="8132"><span data-dcnode-id="8133" instrument_node="">▪Though Web 2.0 can stimulate social interactions and communication between different individuals, there is also the risk of people isolating themselves from the real world as they become too addicted to the use of the internet</span></td><td class="align-left" data-dcnode-id="8129"><a class="workspace-trigger" data-dcnode-id="8130" href="#bb0135" name="bbb0135"><span data-dcnode-id="8131" instrument_node="">de Kool &amp; van Wamelen (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8120"><td class="align-left" data-dcnode-id="8126"><span data-dcnode-id="8127" instrument_node="">▪Digital divide</span></td><td class="align-left" data-dcnode-id="8124"><span data-dcnode-id="8125" instrument_node="">▪There could be a risk of inequality between different groups of users in terms of access to, use of or knowledge of Web 2.0 applications. Some users may be hesitant of using Web 2.0 technologies and may not be interested in using the applications at all. This could indirectly result in the exclusion of these users and not allowing for equity of access.</span></td><td class="align-left" data-dcnode-id="8121"><a class="workspace-trigger" data-dcnode-id="8122" href="#bb0355" name="bbb0355"><span data-dcnode-id="8123" instrument_node="">Osimo et al. (2009)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8110"><td class="align-left" data-dcnode-id="8118" rowspan="2"><span data-dcnode-id="8119" instrument_node="">Technical</span></td><td class="align-left" data-dcnode-id="8116"><span data-dcnode-id="8117" instrument_node="">▪Access to the technologies</span></td><td class="align-left" data-dcnode-id="8114"><span data-dcnode-id="8115" instrument_node="">▪The need for minimum requirements such as a device and internet access at a speed sufficient to support social media content</span></td><td class="align-left" data-dcnode-id="8111"><a class="workspace-trigger" data-dcnode-id="8112" href="#bb0050" name="bbb0050"><span data-dcnode-id="8113" instrument_node="">Bertot et al. (2012)</span></a></td></tr><tr class="valign-top" data-dcnode-id="8102"><td class="align-left" data-dcnode-id="8108"><span data-dcnode-id="8109" instrument_node="">▪Discontinuation of technology</span></td><td class="align-left" data-dcnode-id="8106"><span data-dcnode-id="8107" instrument_node="">▪The risk of the continuity of existing Web 2.0 applications. For example Yahoo announced the discontinuation of its Delicious tagging service.</span></td><td class="align-left" data-dcnode-id="8103"><a class="workspace-trigger" data-dcnode-id="8104" href="#bb0050" name="bbb0050"><span data-dcnode-id="8105" instrument_node="">Bertot et al. (2012)</span></a></td></tr></tbody></table></div></div></div></section></section><section data-dcnode-id="7867" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8089" id="st0045"><span data-dcnode-id="8094" instrument_node="">2.2</span><span data-dcnode-id="8092" instrument_node="">. </span><span data-dcnode-id="8090" instrument_node="">Classification of the impacts of Web 2.0 use in e-Government</span></h3><p data-dcnode-id="8078" id="p0080"><span data-dcnode-id="8088" instrument_node="">The influence of Web 2.0 is potentially disruptive as well as providing the means to alter the nature of digital government (</span><a class="workspace-trigger" data-dcnode-id="8086" href="#bb0320" name="bbb0320"><span data-dcnode-id="8087" instrument_node="">Mintz, 2008</span></a><span data-dcnode-id="8085" instrument_node="">). However, since the development of this kind of technology is very recent, research about the impact of Web 2.0 on the public sector is still highly tentative and exploratory (</span><a class="workspace-trigger" data-dcnode-id="8083" href="#bb0230" name="bbb0230"><span data-dcnode-id="8084" instrument_node="">Huijboom et al., 2009</span></a><span data-dcnode-id="8082" instrument_node="">). Hence, studies such as this research will be helpful to government organisations as they aim to determine the level of use of these technologies by municipalities and assess if they are relevant and necessary to their digital strategy. This will help identify areas for improvement and future action plans (</span><a class="workspace-trigger" data-dcnode-id="8080" href="#bb0070" name="bbb0070"><span data-dcnode-id="8081" instrument_node="">Bonsón, Torres, Royo, &amp; Flores, 2012</span></a><span data-dcnode-id="8079" instrument_node="">).</span></p><div data-dcnode-id="7868"><p data-dcnode-id="8037" id="p0085"><span data-dcnode-id="8077" instrument_node="">One important issue in this respect is to argue that the lessons for Local Government Authorities (LGAs), in terms of Web 2.0 use, are no different to any other organisation. The identified impact factors are a combination of common factors derived from previous studies on the impact of Web 2.0 technologies on organisations (</span><a class="workspace-trigger" data-dcnode-id="8075" href="#bb0350" name="bbb0350"><span data-dcnode-id="8076" instrument_node="">Osimo, 2008</span></a><span data-dcnode-id="8074" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8072" href="#bb0470" name="bbb0470"><span data-dcnode-id="8073" instrument_node="">Wattal et al., 2010</span></a><span data-dcnode-id="8071" instrument_node="">) and with other specific factors from the public sector domain (</span><a class="workspace-trigger" data-dcnode-id="8069" href="#bb0310" name="bbb0310"><span data-dcnode-id="8070" instrument_node="">Meijer &amp; Thaens, 2010</span></a><span data-dcnode-id="8068" instrument_node="">). These works have been extended and adapted to the use of Web 2.0 in the area of LGAs, thus, resulting in the concept of three main categories (i.e. organisational, technological and social) with factors within these categories influencing Web 2.0 use in e-Government. Organisational, technological and social factors are argued to be important antecedents of IS success (</span><a class="workspace-trigger" data-dcnode-id="8066" href="#bb0140" name="bbb0140"><span data-dcnode-id="8067" instrument_node="">Delone and McLean, 2003</span></a><span data-dcnode-id="8065" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8063" href="#bb0145" name="bbb0145"><span data-dcnode-id="8064" instrument_node="">DiMaggio et al., 2001</span></a><span data-dcnode-id="8062" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8060" href="#bb0425" name="bbb0425"><span data-dcnode-id="8061" instrument_node="">Seddon, 1997</span></a><span data-dcnode-id="8059" instrument_node="">). Other research has identified additional factors such as consumer impact (</span><a class="workspace-trigger" data-dcnode-id="8057" href="#bb0075" name="bbb0075"><span data-dcnode-id="8058" instrument_node="">Brynjolfsson, 1996</span></a><span data-dcnode-id="8056" instrument_node="">), environmental impact (</span><a class="workspace-trigger" data-dcnode-id="8054" href="#bb0385" name="bbb0385"><span data-dcnode-id="8055" instrument_node="">Plepys, 2002</span></a><span data-dcnode-id="8053" instrument_node="">), work group impact (</span><a class="workspace-trigger" data-dcnode-id="8051" href="#bb0330" name="bbb0330"><span data-dcnode-id="8052" instrument_node="">Myers, Kappelman, &amp; Prybutok, 1997</span></a><span data-dcnode-id="8050" instrument_node="">) and inter-organisational impact (</span><a class="workspace-trigger" data-dcnode-id="8048" href="#bb0110" name="bbb0110"><span data-dcnode-id="8049" instrument_node="">Clemons &amp; Row, 1993</span></a><span data-dcnode-id="8047" instrument_node="">). There is, however, a risk in simply producing a long list of potential factors and not addressing the question of which, probably in combination, are most important in a particular instance. Since this study has been undertaken at a stage when there is lack of theoretical research surrounding Web 2.0, it is argued that the three common classifications (i.e. organisational, technological and social) are the most relevant to articulate the impact of such technology. These classifications are based on seminal literature including </span><a class="workspace-trigger" data-dcnode-id="8045" href="#bb0500" name="bbb0500"><span data-dcnode-id="8046" instrument_node="">Wu &amp; Ong, 2008</span></a><span data-dcnode-id="8044" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="8042" href="#bb0145" name="bbb0145"><span data-dcnode-id="8043" instrument_node="">DiMaggio et al., 2001</span></a><span data-dcnode-id="8041" instrument_node="">. This taxonomy was used to construct </span><a class="workspace-trigger" data-dcnode-id="8039" href="#t0020" name="bt0020"><span data-dcnode-id="8040" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="8038" instrument_node=""> with specific issues captured as organisational, technological or social Web 2.0 impact factors which have been extrapolated from the existing literature.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7869" id="t0020"><span class="captions" data-dcnode-id="8029"><span data-dcnode-id="8030" id="ca0025"><p data-dcnode-id="8031" id="sp0045"><span class="label" data-dcnode-id="8035"><span data-dcnode-id="8036" instrument_node="">Table&nbsp;4</span></span><span data-dcnode-id="8034" instrument_node="">. </span><span data-dcnode-id="8032" instrument_node="">Classification of the Impacts of Web 2.0 use in e-Government.</span></p></span></span><div class="groups" data-dcnode-id="7870"><table data-dcnode-id="7871"><thead data-dcnode-id="8019"><tr class="valign-top rowsep-1" data-dcnode-id="8020"><th class="align-left" data-dcnode-id="8027" scope="col"><span data-dcnode-id="8028" instrument_node="">Classification</span></th><th class="align-left" data-dcnode-id="8025" scope="col"><span data-dcnode-id="8026" instrument_node="">Factors</span></th><th class="align-left" data-dcnode-id="8023" scope="col"><span data-dcnode-id="8024" instrument_node="">Description</span></th><th class="align-left" data-dcnode-id="8021" scope="col"><span data-dcnode-id="8022" instrument_node="">References</span></th></tr></thead><tbody data-dcnode-id="7872"><tr class="valign-top" data-dcnode-id="8009"><td class="align-left" data-dcnode-id="8017" rowspan="8"><span data-dcnode-id="8018" instrument_node="">Organisational</span></td><td class="align-left" data-dcnode-id="8015"><span data-dcnode-id="8016" instrument_node="">▪Culture and change</span></td><td class="align-left" data-dcnode-id="8013"><span data-dcnode-id="8014" instrument_node="">▪The use and implementation of Web 2.0 technologies requires government organisations to embrace innovation, transparency, collaboration, open communication and user-generated content. They need to be open to the changes this brings and adapt to a Web 2.0 friendly working culture thus leading to an open government culture.</span></td><td class="align-left" data-dcnode-id="8010"><a class="workspace-trigger" data-dcnode-id="8011" href="#bb0375" name="bbb0375"><span data-dcnode-id="8012" instrument_node="">Parycek &amp; Sachs (2010)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7998"><td class="align-left" data-dcnode-id="8007"><span data-dcnode-id="8008" instrument_node="">▪Transparency and accountability</span></td><td class="align-left" data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">▪Web 2.0 applications can make user demands and government products and processes more transparent thus increasing accountability</span></td><td class="align-left" data-dcnode-id="7999"><a class="workspace-trigger" data-dcnode-id="8003" href="#bb0070" name="bbb0070"><span data-dcnode-id="8004" instrument_node="">Bonsón et al. (2012)</span></a><span data-dcnode-id="8002" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8000" href="#bb0045" name="bbb0045"><span data-dcnode-id="8001" instrument_node="">Bertot et al. (2010)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7990"><td class="align-left" data-dcnode-id="7996"><span data-dcnode-id="7997" instrument_node="">▪Policy alignment and governance</span></td><td class="align-left" data-dcnode-id="7994"><span data-dcnode-id="7995" instrument_node="">▪As authorities move towards more democratic and open government practices with the use of Web 2.0 technologies, there is a need for organisations to tightly align policies against practice to minimise risk from issues such as confidentiality, propriety etc.</span></td><td class="align-left" data-dcnode-id="7991"><a class="workspace-trigger" data-dcnode-id="7992" href="#bb0310" name="bbb0310"><span data-dcnode-id="7993" instrument_node="">Meijer &amp; Thaens (2010)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7979"><td class="align-left" data-dcnode-id="7988"><span data-dcnode-id="7989" instrument_node="">▪Knowledge management</span></td><td class="align-left" data-dcnode-id="7986"><span data-dcnode-id="7987" instrument_node="">▪Web 2.0 technologies allow for effective knowledge management. They facilitate collection of both implicit and explicit knowledge in order to create a knowledge base which can then be used by organisations.</span></td><td class="align-left" data-dcnode-id="7980"><a class="workspace-trigger" data-dcnode-id="7984" href="#bb0455" name="bbb0455"><span data-dcnode-id="7985" instrument_node="">Traunmuller (2010)</span></a><span data-dcnode-id="7983" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7981" href="#bb0350" name="bbb0350"><span data-dcnode-id="7982" instrument_node="">Osimo (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7971"><td class="align-left" data-dcnode-id="7977"><span data-dcnode-id="7978" instrument_node="">▪Collaboration and communication</span></td><td class="align-left" data-dcnode-id="7975"><span data-dcnode-id="7976" instrument_node="">▪The internal and external collaboration and communication within an organisation is better facilitated by Web 2.0 applications. Collaborative editing applications such as Wikis make the process of collection and sharing of information more efficient. It also improves communication by breaking down traditional organisational hierarchies.</span></td><td class="align-left" data-dcnode-id="7972"><a class="workspace-trigger" data-dcnode-id="7973" href="#bb0420" name="bbb0420"><span data-dcnode-id="7974" instrument_node="">Schweik, Mergel, Sandfort, &amp; Zhao (2011)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7963"><td class="align-left" data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">▪Organisational learning</span></td><td class="align-left" data-dcnode-id="7967"><span data-dcnode-id="7968" instrument_node="">▪Web 2.0 applications such as blogs and wikis facilitate information sharing thus assisting social learning within organisations.</span></td><td class="align-left" data-dcnode-id="7964"><a class="workspace-trigger" data-dcnode-id="7965" href="#bb0035" name="bbb0035"><span data-dcnode-id="7966" instrument_node="">Baxter, Connolly, &amp; Stansfield (2010)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7955"><td class="align-left" data-dcnode-id="7961"><span data-dcnode-id="7962" instrument_node="">▪Human capital</span></td><td class="align-left" data-dcnode-id="7959"><span data-dcnode-id="7960" instrument_node="">▪Organisations will need to train existing staff or hire new personnel (e.g. social media managers) who have the skills and capabilities to operate and manage Web 2.0 applications. This will require a necessary investment in human capital.</span></td><td class="align-left" data-dcnode-id="7956"><a class="workspace-trigger" data-dcnode-id="7957" href="#bb0320" name="bbb0320"><span data-dcnode-id="7958" instrument_node="">Mintz (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7944"><td class="align-left" data-dcnode-id="7953"><span data-dcnode-id="7954" instrument_node="">▪Financial resources</span></td><td class="align-left" data-dcnode-id="7951"><span data-dcnode-id="7952" instrument_node="">▪Cloud computing and Web 2.0 technologies such as SaaS platforms can bring about financial savings to organisations as the need for specific software and infrastructure is reduced.</span></td><td class="align-left" data-dcnode-id="7945"><a class="workspace-trigger" data-dcnode-id="7949" href="#bb0370" name="bbb0370"><span data-dcnode-id="7950" instrument_node="">Paquette, Jaeger, &amp; Wilson (2010)</span></a><span data-dcnode-id="7948" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7946" href="#bb0305" name="bbb0305"><span data-dcnode-id="7947" instrument_node="">Marston, Li, Bandyopadhyay, Zhang, &amp; Ghalsasi (2011)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7931"><td class="align-left" data-dcnode-id="7942" rowspan="4"><span data-dcnode-id="7943" instrument_node="">Technological</span></td><td class="align-left" data-dcnode-id="7940"><span data-dcnode-id="7941" instrument_node="">▪Security and privacy</span></td><td class="align-left" data-dcnode-id="7938"><span data-dcnode-id="7939" instrument_node="">▪Government organisations will need to be aware of security and privacy concerns as Web 2.0 technologies leave organisations more vulnerable to issues such as loss of information, hacking and cyber extremism etc. A balance between tight security without stifling creativity and communication needs to be achieved.</span></td><td class="align-left" data-dcnode-id="7932"><a class="workspace-trigger" data-dcnode-id="7936" href="#bb0350" name="bbb0350"><span data-dcnode-id="7937" instrument_node="">Osimo (2008)</span></a><span data-dcnode-id="7935" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7933" href="#bb0105" name="bbb0105"><span data-dcnode-id="7934" instrument_node="">Chen et al. (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7923"><td class="align-left" data-dcnode-id="7929"><span data-dcnode-id="7930" instrument_node="">▪Interoperability</span></td><td class="align-left" data-dcnode-id="7927"><span data-dcnode-id="7928" instrument_node="">▪Web 2.0 applications (e.g. RSS) allow for interoperability wherein the government can publish information and services over different platforms including mobile phones thus giving them a wider reach.</span></td><td class="align-left" data-dcnode-id="7924"><a class="workspace-trigger" data-dcnode-id="7925" href="#bb0350" name="bbb0350"><span data-dcnode-id="7926" instrument_node="">Osimo (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7915"><td class="align-left" data-dcnode-id="7921"><span data-dcnode-id="7922" instrument_node="">▪Scalability</span></td><td class="align-left" data-dcnode-id="7919"><span data-dcnode-id="7920" instrument_node="">▪Web 2.0 technologies, particularly in the form of SaaS platforms, provide a scalable system such that it can cope with and accommodate growth of the organisations.</span></td><td class="align-left" data-dcnode-id="7916"><a class="workspace-trigger" data-dcnode-id="7917" href="#bb0345" name="bbb0345"><span data-dcnode-id="7918" instrument_node="">O'Reilly (2008)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7907"><td class="align-left" data-dcnode-id="7913"><span data-dcnode-id="7914" instrument_node="">▪Data presentation</span></td><td class="align-left" data-dcnode-id="7911"><span data-dcnode-id="7912" instrument_node="">▪Information can be shared and presented in a variety of new ways beyond traditional methods with the aid of Web 2.0 applications. For example, mashups allow the presentation of Google maps, knowledge maps and presentation of videos on YouTube on a single platform.</span></td><td class="align-left" data-dcnode-id="7908"><a class="workspace-trigger" data-dcnode-id="7909" href="#bb0310" name="bbb0310"><span data-dcnode-id="7910" instrument_node="">Meijer &amp; Thaens (2010)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7897"><td class="align-left" data-dcnode-id="7905" rowspan="4"><span data-dcnode-id="7906" instrument_node="">Social</span></td><td class="align-left" data-dcnode-id="7903"><span data-dcnode-id="7904" instrument_node="">▪Participation and engagement</span></td><td class="align-left" data-dcnode-id="7901"><span data-dcnode-id="7902" instrument_node="">▪Social media technologies within Web 2.0 allow the government organisations to interact with the public by engaging them in dialogue over issues such as policy development and implementation.</span></td><td class="align-left" data-dcnode-id="7898"><a class="workspace-trigger" data-dcnode-id="7899" href="#bb0050" name="bbb0050"><span data-dcnode-id="7900" instrument_node="">Bertot et al. (2012)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7889"><td class="align-left" data-dcnode-id="7895"><span data-dcnode-id="7896" instrument_node="">▪Co-production</span></td><td class="align-left" data-dcnode-id="7893"><span data-dcnode-id="7894" instrument_node="">▪Government organisations can use Web 2.0 applications work with the public to get their involvement in design, development and delivery of their services thus building a two way relationship.</span></td><td class="align-left" data-dcnode-id="7890"><a class="workspace-trigger" data-dcnode-id="7891" href="#bb0045" name="bbb0045"><span data-dcnode-id="7892" instrument_node="">Bertot et al. (2010)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7881"><td class="align-left" data-dcnode-id="7887"><span data-dcnode-id="7888" instrument_node="">▪Innovations and Crowdsourcing solutions</span></td><td class="align-left" data-dcnode-id="7885"><span data-dcnode-id="7886" instrument_node="">▪Web 2.0 technologies pave the way for innovation through sharing of knowledge. It facilitates crowdsourcing, thus allowing the government to share information internally as well as with the public thus providing a platform from which innovation can occur.</span></td><td class="align-left" data-dcnode-id="7882"><a class="workspace-trigger" data-dcnode-id="7883" href="#bb0045" name="bbb0045"><span data-dcnode-id="7884" instrument_node="">Bertot et al. (2010)</span></a></td></tr><tr class="valign-top" data-dcnode-id="7873"><td class="align-left" data-dcnode-id="7879"><span data-dcnode-id="7880" instrument_node="">▪Building and maintaining trust</span></td><td class="align-left" data-dcnode-id="7877"><span data-dcnode-id="7878" instrument_node="">▪The role of trust in Web 2.0 suggests that continuous interactions and positive experience in social networking sites will enhance the initial trust of the user. This factor highlights the impact that Web 2.0 technologies such as social networking sites can have on trust among its users in government organisations.</span></td><td class="align-left" data-dcnode-id="7874"><a class="workspace-trigger" data-dcnode-id="7875" href="#bb0195" name="bbb0195"><span data-dcnode-id="7876" instrument_node="">Grabner-Krauter (2009)</span></a></td></tr></tbody></table></div></div></div></section></section><section data-dcnode-id="7652" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7860" id="st0050"><span data-dcnode-id="7865" instrument_node="">3</span><span data-dcnode-id="7863" instrument_node="">. </span><span data-dcnode-id="7861" instrument_node="">Research methodology</span></h2><p data-dcnode-id="7828" id="p0090"><span data-dcnode-id="7859" instrument_node="">A case study strategy that uses qualitative research methods for theory testing was chosen for this research on account of its originality and exploratory nature; see for example, </span><a class="workspace-trigger" data-dcnode-id="7857" href="#bb0210" name="bbb0210"><span data-dcnode-id="7858" instrument_node="">Hakim (1987)</span></a><span data-dcnode-id="7856" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="7854" href="#bb0505" name="bbb0505"><span data-dcnode-id="7855" instrument_node="">Yin (2009)</span></a><span data-dcnode-id="7853" instrument_node="">. There are a multitude of reasons behind the use of such a strategy, for example it is considered suitable to describe a phenomenon, build theory or test theoretical concepts or relationships, or a combination of all three (</span><a class="workspace-trigger" data-dcnode-id="7851" href="#bb0505" name="bbb0505"><span data-dcnode-id="7852" instrument_node="">Yin, 2009</span></a><span data-dcnode-id="7850" instrument_node="">). In this instance, it was used with the objective of describing a phenomenon of the use of Web 2.0 applications in a local government context. </span><a class="workspace-trigger" data-dcnode-id="7848" href="#bb0160" name="bbb0160"><span data-dcnode-id="7849" instrument_node="">Dyer and Wilkins (1991)</span></a><span data-dcnode-id="7847" instrument_node=""> argues that findings from a single study can be more useful than an approach in which multiple studies are used for data collection as proposed by </span><a class="workspace-trigger" data-dcnode-id="7845" href="#bb0170" name="bbb0170"><span data-dcnode-id="7846" instrument_node="">Eisenhardt (1989)</span></a><span data-dcnode-id="7844" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="7842" href="#bb0185" name="bbb0185"><span data-dcnode-id="7843" instrument_node="">Gable (1994)</span></a><span data-dcnode-id="7841" instrument_node="">. A single case study prioritises richness of data over the ability to compare multiple instances and wide explanatory power. This research follows the work of </span><a class="workspace-trigger" data-dcnode-id="7839" href="#bb0160" name="bbb0160"><span data-dcnode-id="7840" instrument_node="">Dyer and Wilkins (1991)</span></a><span data-dcnode-id="7838" instrument_node=""> in the way that it selects the research approach and case study. Moreover, the use of Web 2.0 applications by LGAs for internal operational purposes is still not extensive among local government authorities in the UK. These applications are mainly used by local authorities to engage with citizens as highlighted in the introduction and such interaction is not the focus of this study. Therefore access to organisations using these applications for the same purpose was very limited. As a result, a single in-depth case approach was pursued similar to the works of </span><a class="workspace-trigger" data-dcnode-id="7836" href="#bb0160" name="bbb0160"><span data-dcnode-id="7837" instrument_node="">Dyer and Wilkins (1991)</span></a><span data-dcnode-id="7835" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7833" href="#bb0400" name="bbb0400"><span data-dcnode-id="7834" instrument_node="">Reinwald and Kraemmergaard (2012)</span></a><span data-dcnode-id="7832" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="7830" href="#bb0485" name="bbb0485"><span data-dcnode-id="7831" instrument_node="">Whitmore (2014)</span></a><span data-dcnode-id="7829" instrument_node="">. The case organisation used for this research was selected on the basis that employees of this UKLGA had been using Web 2.0 applications for intra-organisational work purposes for several years.</span></p><section data-dcnode-id="7810" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7822" id="st0055"><span data-dcnode-id="7827" instrument_node="">3.1</span><span data-dcnode-id="7825" instrument_node="">. </span><span data-dcnode-id="7823" instrument_node="">Data collection</span></h3><p data-dcnode-id="7811" id="p0095"><span data-dcnode-id="7821" instrument_node="">The primary method used for data gathering at UKLGA was semi-structured interviews. This was complemented with observations of the work environment during several visits to the UKLGA premises (</span><a class="workspace-trigger" data-dcnode-id="7819" href="#bb0030" name="bbb0030"><span data-dcnode-id="7820" instrument_node="">Atkinson and Hammersley, 1994</span></a><span data-dcnode-id="7818" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7816" href="#bb0330" name="bbb0330"><span data-dcnode-id="7817" instrument_node="">Myers et al., 1997</span></a><span data-dcnode-id="7815" instrument_node="">). The interview agenda and questions were influenced by the normative literature and classification of Web 2.0 factors. A pilot case study involving a trial interview was initially conducted with a senior manager from another local government authority in the UK. The main purpose of this pilot was to help eliminate any ambiguity and vagueness in the interview questions that were to be used for the main case study. The improved interview agenda was then used with the chosen UKLGA to facilitate the collection of rich, relevant case study data. The agenda allowed the researchers to maintain focus during the interview process from selected interviewees who were identified prior to the research based on their roles in UKLGA. Additionally, informal conversations, policy documents, corporate strategy reports, minutes from meetings and consultancy reports etc., allowed one to gather multiple supporting evidences. This allowed the triangulation of data, thus contributing towards the reliability and validity of the findings (</span><a class="workspace-trigger" data-dcnode-id="7813" href="#bb0505" name="bbb0505"><span data-dcnode-id="7814" instrument_node="">Yin, 2009</span></a><span data-dcnode-id="7812" instrument_node="">). The field notes taken during the interviews were later transcribed into MS word format and passed on to the interviewees to approval thus helping with further validation of the results. The interview protocol underwent the standard university process to obtain ethical approval for data collection methods and mode of collection.</span></p></section><section data-dcnode-id="7674" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7804" id="st0060"><span data-dcnode-id="7809" instrument_node="">3.2</span><span data-dcnode-id="7807" instrument_node="">. </span><span data-dcnode-id="7805" instrument_node="">Interview process</span></h3><div data-dcnode-id="7719"><p data-dcnode-id="7799" id="p0100"><span data-dcnode-id="7803" instrument_node="">Interviews were conducted with those who were considered to be independent and most knowledgeable when it came to the human, organisational and technical factors associated with the use of Web 2.0 technologies within the case environment. Only senior and experienced users of Web 2.0 technologies were interviewed. </span><a class="workspace-trigger" data-dcnode-id="7801" href="#t0025" name="bt0025"><span data-dcnode-id="7802" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="7800" instrument_node=""> summarises the list of both formal and informal interview participants from the case study (UKLGA). Due to confidentiality reasons, the case organisation in this study is referred to as “UKLGA”.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7720" id="t0025"><span class="captions" data-dcnode-id="7791"><span data-dcnode-id="7792" id="ca0030"><p data-dcnode-id="7793" id="sp0050"><span class="label" data-dcnode-id="7797"><span data-dcnode-id="7798" instrument_node="">Table&nbsp;5</span></span><span data-dcnode-id="7796" instrument_node="">. </span><span data-dcnode-id="7794" instrument_node="">List of interview participants in the case study (UKLGA).</span></p></span></span><div class="groups" data-dcnode-id="7721"><table data-dcnode-id="7722"><thead data-dcnode-id="7783"><tr class="valign-top rowsep-1" data-dcnode-id="7784"><th class="align-left" data-dcnode-id="7789" scope="col"><span data-dcnode-id="7790" instrument_node="">Who</span></th><th class="align-left" data-dcnode-id="7787" scope="col"><span data-dcnode-id="7788" instrument_node="">Where</span></th><th class="align-left" data-dcnode-id="7785" scope="col"><span data-dcnode-id="7786" instrument_node="">How</span></th></tr></thead><tbody data-dcnode-id="7723"><tr class="valign-top" data-dcnode-id="7766"><td class="align-left" data-dcnode-id="7781"><span data-dcnode-id="7782" instrument_node="">Head of ICT (SJ)</span></td><td class="align-left" data-dcnode-id="7779" rowspan="6"><span data-dcnode-id="7780" instrument_node="">UKLGA IT Department</span></td><td class="align-left" data-dcnode-id="7767" rowspan="6"><span data-dcnode-id="7778" instrument_node="">Formal interview</span><br data-dcnode-id="7777"><span data-dcnode-id="7776" instrument_node="">–Semi-structured Interview Agenda</span><br data-dcnode-id="7775"><span data-dcnode-id="7774" instrument_node="">–90</span><span data-dcnode-id="7772" instrument_node="">&nbsp;</span><span data-dcnode-id="7770" instrument_node="">minutes (approximately) each participant</span><br data-dcnode-id="7769"><span data-dcnode-id="7768" instrument_node="">–One-to-one basis</span></td></tr><tr class="valign-top" data-dcnode-id="7763"><td class="align-left" data-dcnode-id="7764"><span data-dcnode-id="7765" instrument_node="">Corporate e-Government Manager (SD)</span></td></tr><tr class="valign-top" data-dcnode-id="7760"><td class="align-left" data-dcnode-id="7761"><span data-dcnode-id="7762" instrument_node="">Website Manager (RSJ)</span></td></tr><tr class="valign-top" data-dcnode-id="7757"><td class="align-left" data-dcnode-id="7758"><span data-dcnode-id="7759" instrument_node="">IT Systems Manager (RJB)</span></td></tr><tr class="valign-top" data-dcnode-id="7754"><td class="align-left" data-dcnode-id="7755"><span data-dcnode-id="7756" instrument_node="">IT Services Manager (PU)</span></td></tr><tr class="valign-top" data-dcnode-id="7751"><td class="align-left" data-dcnode-id="7752"><span data-dcnode-id="7753" instrument_node="">IT Support Manager (NP)</span></td></tr><tr class="valign-top" data-dcnode-id="7734"><td class="align-left" data-dcnode-id="7749"><span data-dcnode-id="7750" instrument_node="">Finance Manager (FM)</span></td><td class="align-left" data-dcnode-id="7747"><span data-dcnode-id="7748" instrument_node="">UKLGA Finance Department</span></td><td class="align-left" data-dcnode-id="7735" rowspan="3"><span data-dcnode-id="7746" instrument_node="">Informal interview</span><br data-dcnode-id="7745"><span data-dcnode-id="7744" instrument_node="">–Open-ended questions</span><br data-dcnode-id="7743"><span data-dcnode-id="7742" instrument_node="">–30</span><span data-dcnode-id="7740" instrument_node="">&nbsp;</span><span data-dcnode-id="7738" instrument_node="">minutes (approximately) each participant</span><br data-dcnode-id="7737"><span data-dcnode-id="7736" instrument_node="">–One-to-one basis</span></td></tr><tr class="valign-top" data-dcnode-id="7729"><td class="align-left" data-dcnode-id="7732"><span data-dcnode-id="7733" instrument_node="">Social Services Information Manager (SSIM)</span></td><td class="align-left" data-dcnode-id="7730"><span data-dcnode-id="7731" instrument_node="">UKLGA Social Services Department</span></td></tr><tr class="valign-top" data-dcnode-id="7724"><td class="align-left" data-dcnode-id="7727"><span data-dcnode-id="7728" instrument_node="">Service Improvement Manager (SIM)</span></td><td class="align-left" data-dcnode-id="7725"><span data-dcnode-id="7726" instrument_node="">UKLGA Community Services Department</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="7675" id="p0105"><span data-dcnode-id="7718" instrument_node="">Furthermore, all interviews took place away from the normal office environment and possible disruption (interviews were conducted in a bookable meeting room). The authors acted as a neutral medium through which questions and answers were transmitted in an endeavour to eliminate bias. As part of the interview agenda, interviewees were asked to also indicate the level of significance of the factors (for benefits, costs, risks and impacts) using a 7 point Likert scale represented by (1) </span><em data-dcnode-id="7716"><span data-dcnode-id="7717" instrument_node="">less important</span></em><span data-dcnode-id="7715" instrument_node="">, (2) </span><em data-dcnode-id="7713"><span data-dcnode-id="7714" instrument_node="">fairly important</span></em><span data-dcnode-id="7712" instrument_node="">, (3) </span><em data-dcnode-id="7710"><span data-dcnode-id="7711" instrument_node="">moderately important</span></em><span data-dcnode-id="7709" instrument_node="">, (4) </span><em data-dcnode-id="7707"><span data-dcnode-id="7708" instrument_node="">important</span></em><span data-dcnode-id="7706" instrument_node="">, (5) </span><em data-dcnode-id="7704"><span data-dcnode-id="7705" instrument_node="">highly important</span></em><span data-dcnode-id="7703" instrument_node="">, (6) </span><em data-dcnode-id="7701"><span data-dcnode-id="7702" instrument_node="">extremely important</span></em><span data-dcnode-id="7700" instrument_node=""> and (7) </span><em data-dcnode-id="7698"><span data-dcnode-id="7699" instrument_node="">not important</span></em><span data-dcnode-id="7697" instrument_node="">. The responses were then grouped into three categories to graphically represent </span><em data-dcnode-id="7695"><span data-dcnode-id="7696" instrument_node="">less important</span></em><span data-dcnode-id="7694" instrument_node=""> to </span><em data-dcnode-id="7692"><span data-dcnode-id="7693" instrument_node="">fairly important</span></em><span data-dcnode-id="7691" instrument_node=""> as (○), </span><em data-dcnode-id="7689"><span data-dcnode-id="7690" instrument_node="">moderately important</span></em><span data-dcnode-id="7688" instrument_node=""> to </span><em data-dcnode-id="7686"><span data-dcnode-id="7687" instrument_node="">important</span></em><span data-dcnode-id="7685" instrument_node=""> as (◉) and </span><em data-dcnode-id="7683"><span data-dcnode-id="7684" instrument_node="">highly important</span></em><span data-dcnode-id="7682" instrument_node=""> to </span><em data-dcnode-id="7680"><span data-dcnode-id="7681" instrument_node="">extremely important</span></em><span data-dcnode-id="7679" instrument_node=""> as (●) and where the interviewees said </span><em data-dcnode-id="7677"><span data-dcnode-id="7678" instrument_node="">not important</span></em><span data-dcnode-id="7676" instrument_node="">, the “x” symbol is used. Grouping the 7 point Likert scale into these 3 categories allowed for a broader representation and discussion of the findings.</span></p></section><section data-dcnode-id="7653" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7668" id="st0065"><span data-dcnode-id="7673" instrument_node="">3.3</span><span data-dcnode-id="7671" instrument_node="">. </span><span data-dcnode-id="7669" instrument_node="">Case study validity and data analysis</span></h3><p data-dcnode-id="7654" id="p0110"><span data-dcnode-id="7667" instrument_node="">The authors believe that the procedures followed in conducting the study and use of triangulation for data collection (see, for example, </span><a class="workspace-trigger" data-dcnode-id="7665" href="#bb0255" name="bbb0255"><span data-dcnode-id="7666" instrument_node="">Jick, 1979</span></a><span data-dcnode-id="7664" instrument_node="">) contributed to the reliability and validity of the study, while conforming to the prescriptions of </span><a class="workspace-trigger" data-dcnode-id="7662" href="#bb0360" name="bbb0360"><span data-dcnode-id="7663" instrument_node="">Pan and Tan, (2011)</span></a><span data-dcnode-id="7661" instrument_node="">. Therefore, the researchers have full confidence in the veracity of the research process and findings. The data derived from the case study was triangulated and then analysed to draw empirical conclusions. This study adopted a qualitative data analysis technique and used NVivo software (Qualitative analytical tool) to support the development of the coding system used for data analysis. The process of data analysis involved examining the meaning of people's words and actions (e.g. </span><a class="workspace-trigger" data-dcnode-id="7659" href="#bb0395" name="bbb0395"><span data-dcnode-id="7660" instrument_node="">Ramanathan, 2009</span></a><span data-dcnode-id="7658" instrument_node="">). In effect, data analysis and synthesis was an iterative process as concepts emerged and common themes were identified and formed into a coherent analysis (</span><a class="workspace-trigger" data-dcnode-id="7656" href="#bb0120" name="bbb0120"><span data-dcnode-id="7657" instrument_node="">Corbin &amp; Strauss, 2008</span></a><span data-dcnode-id="7655" instrument_node="">). These findings were used to develop the empirical evidence reports that support the framework for the use of Web 2.0 technologies in e-Government.</span></p></section></section><section data-dcnode-id="6288" id="s0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7646" id="st0070"><span data-dcnode-id="7651" instrument_node="">4</span><span data-dcnode-id="7649" instrument_node="">. </span><span data-dcnode-id="7647" instrument_node="">Use of Web 2.0 in e-Government: evidence from a local government authority in the UK</span></h2><p data-dcnode-id="7632" id="p0115"><span data-dcnode-id="7645" instrument_node="">The case study conducted was in a Local Government Authority (hereafter referred to as UKLGA) which has been established since 1995 to provide a range of public services, including Education, Social Services and Highways. The UKLGA has a Corporate IT strategy which outlines the improvement and Service Innovations Plans. The decision to implement Web 2.0 technologies was a natural choice as the IT department and the wider organisation wanted to keep up with technological changes and maintain their reputation. In particular, the customer-facing services carried out by several business units in the UKLGA (e.g. Leisure Centre, Web team) benefitted from the use of these applications. In addition, it was evident that the IT department was keen to implement Web 2.0 as part of their ICT innovation strategy, to maintain its knowledge of ICT developments and to keep up with developments in central government as well as the wider business (industry) community. This resonates with the view of </span><a class="workspace-trigger" data-dcnode-id="7643" href="#bb0100" name="bbb0100"><span data-dcnode-id="7644" instrument_node="">Charlton (2011)</span></a><span data-dcnode-id="7642" instrument_node=""> who highlights the fact that some public sector organisations are jumping on the ‘bandwagon’ to keep up with technological changes and maintain reputation. Interestingly, though there was still some resistance in the UKLGA to exploit these applications to improve respective service areas as illustrated by the lack of take-up by important departments such as Highways and Finance. One reason for such poor take-up can be attributed to issues such as the level of priority given to such Web 2.0 applications among other day-to-day responsibilities that needed to be administered and the UKLGA's policies related to access restrictions for social media. The Service Improvement manager, who was not from the IT department, reported: “</span><em data-dcnode-id="7640"><span data-dcnode-id="7641" instrument_node="">For the majority of UKLGA staff (apart from around 300) social media was blocked</span></em><span data-dcnode-id="7639" instrument_node="">. </span><em data-dcnode-id="7637"><span data-dcnode-id="7638" instrument_node="">It is often used by us to disseminate information, which we cannot access except by special arrangement…</span></em><span data-dcnode-id="7636" instrument_node="">” (</span><em data-dcnode-id="7634"><span data-dcnode-id="7635" instrument_node="">SIM</span></em><span data-dcnode-id="7633" instrument_node="">). This clearly highlighted the fact that ultimately, the use of Web 2.0 applications was under the jurisdiction of the Head of ICT and the IT management in the UKLGA and also that its implementation was initiated and constrained by the opinions of senior staff. Although there were clearly access restrictions to these applications for some staff, the informal interviews and conversations with most of the non-IT departments indicated that in this case the organisation was far more liberal than other local authorities in the UK. Some of the employees reported that this was one of the few LGA's in the UK that allowed employees to use Web 2.0 applications for intra-organisational business-related activities as majority of the LGAs in the UK only allowed their employees to use it for citizen engagement.</span></p><section data-dcnode-id="6655" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7626" id="st0075"><span data-dcnode-id="7631" instrument_node="">4.1</span><span data-dcnode-id="7629" instrument_node="">. </span><span data-dcnode-id="7627" instrument_node="">Evaluation of the benefits, costs and risks of Web 2.0 in the UK LGA</span></h3><p data-dcnode-id="7600" id="p0120"><span data-dcnode-id="7625" instrument_node="">Interviews with UKLGA staff reiterated the significance given to IS evaluation in the literature (e.g. by </span><a class="workspace-trigger" data-dcnode-id="7623" href="#bb0405" name="bbb0405"><span data-dcnode-id="7624" instrument_node="">Remenyi, 1999</span></a><span data-dcnode-id="7622" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7620" href="#bb0175" name="bbb0175"><span data-dcnode-id="7621" instrument_node="">Farbey et al., 1993</span></a><span data-dcnode-id="7619" instrument_node="">). However, it was interesting to note that while they signify IS evaluation as an important procedure to follow, there was no formal evaluation that was conducted prior to the use of Web 2.0 technologies. One of the key reasons for this neglect was reported as due to the belief that these technologies came with no initial direct costs and therefore did not require a formal evaluation. The head of ICT said: “</span><em data-dcnode-id="7617"><span data-dcnode-id="7618" instrument_node="">…We haven't done it, probably because it was an obvious thing to do and as it is mainly used as a communication tool</span></em><span data-dcnode-id="7616" instrument_node="">. </span><em data-dcnode-id="7614"><span data-dcnode-id="7615" instrument_node="">It's difficult to calculate things like efficiencies and cost savings on a tool</span></em><span data-dcnode-id="7613" instrument_node="">. </span><em data-dcnode-id="7611"><span data-dcnode-id="7612" instrument_node="">Although normally we will do it on a system, we haven't done it on Web 2.0…</span></em><span data-dcnode-id="7610" instrument_node="">” (SJ). The above statement made by the Head of ICT in the UKLGA clearly highlighted the point that as the majority of Web 2.0 technologies were free, only an informal discussion about the benefits, costs and risks was conducted prior to its implementation. The importance of evaluation was stressed further by the e-Government manager when suggesting that, “</span><em data-dcnode-id="7608"><span data-dcnode-id="7609" instrument_node="">Yes, I think this is the area where you got to look at risk management and we did largely ignore costs because the biggest cost would have been the technology and that was free, the fact that we are now diverting staff resource at this even though it is only a small percentage of your day job</span></em><span data-dcnode-id="7607" instrument_node="">. </span><em data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">We are spending some time on this and time is money</span></em><span data-dcnode-id="7604" instrument_node="">. (</span><em data-dcnode-id="7602"><span data-dcnode-id="7603" instrument_node="">SD</span></em><span data-dcnode-id="7601" instrument_node="">)” These views clearly show that the UKLGA was aware of the need for evaluation, but did not apply any criteria for evaluating the use of Web 2.0 applications.</span></p><section data-dcnode-id="7247" id="s0070"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7594" id="st0080"><span data-dcnode-id="7599" instrument_node="">4.1.1</span><span data-dcnode-id="7597" instrument_node="">. </span><span data-dcnode-id="7595" instrument_node="">Benefits evaluation of Web 2.0 technologies</span></h4><div data-dcnode-id="7326"><p data-dcnode-id="7562" id="p0125"><span data-dcnode-id="7593" instrument_node="">The dimensions proposed by </span><a class="workspace-trigger" data-dcnode-id="7591" href="#bb0430" name="bbb0430"><span data-dcnode-id="7592" instrument_node="">Shang and Seddon, (2002)</span></a><span data-dcnode-id="7590" instrument_node=""> and mapped in </span><a class="workspace-trigger" data-dcnode-id="7588" href="#s0020" name="bs0020"><span data-dcnode-id="7589" instrument_node="">Section&nbsp;2.1.1</span></a><span data-dcnode-id="7587" instrument_node=""> earlier were used to evaluate the benefits of Web 2.0 as the classifications covered a broad spectrum of functions surrounding an organisation. </span><a class="workspace-trigger" data-dcnode-id="7585" href="#t0030" name="bt0030"><span data-dcnode-id="7586" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="7584" instrument_node=""> provides an analysis of the importance of Web 2.0 benefit factors for its effective use in the UKLGA based on the views from the interviewees using a 7-point Likert scale of </span><em data-dcnode-id="7582"><span data-dcnode-id="7583" instrument_node="">less important</span></em><span data-dcnode-id="7581" instrument_node=""> to </span><em data-dcnode-id="7579"><span data-dcnode-id="7580" instrument_node="">fairly important</span></em><span data-dcnode-id="7578" instrument_node=""> (○), </span><em data-dcnode-id="7576"><span data-dcnode-id="7577" instrument_node="">moderately important</span></em><span data-dcnode-id="7575" instrument_node=""> to </span><em data-dcnode-id="7573"><span data-dcnode-id="7574" instrument_node="">important</span></em><span data-dcnode-id="7572" instrument_node=""> (◉) and </span><em data-dcnode-id="7570"><span data-dcnode-id="7571" instrument_node="">highly important</span></em><span data-dcnode-id="7569" instrument_node=""> to </span><em data-dcnode-id="7567"><span data-dcnode-id="7568" instrument_node="">extremely important</span></em><span data-dcnode-id="7566" instrument_node=""> (●) and where the interviewees said </span><em data-dcnode-id="7564"><span data-dcnode-id="7565" instrument_node="">not important</span></em><span data-dcnode-id="7563" instrument_node="">, the “x” symbol is used.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7327" id="t0030"><span class="captions" data-dcnode-id="7554"><span data-dcnode-id="7555" id="ca0035"><p data-dcnode-id="7556" id="sp0055"><span class="label" data-dcnode-id="7560"><span data-dcnode-id="7561" instrument_node="">Table&nbsp;6</span></span><span data-dcnode-id="7559" instrument_node="">. </span><span data-dcnode-id="7557" instrument_node="">Importance of Web 2.0 technology benefits.</span></p></span></span><div class="groups" data-dcnode-id="7328"><table data-dcnode-id="7329"><thead data-dcnode-id="7536"><tr class="valign-top rowsep-1" data-dcnode-id="7537"><th class="align-left" data-dcnode-id="7552" scope="col"><span data-dcnode-id="7553" instrument_node="">Classification</span></th><th class="align-left" data-dcnode-id="7550" scope="col"><span data-dcnode-id="7551" instrument_node="">Benefits of Web 2.0 technologies</span></th><th class="align-left" data-dcnode-id="7548" scope="col"><span data-dcnode-id="7549" instrument_node="">Head of ICT</span></th><th class="align-left" data-dcnode-id="7546" scope="col"><span data-dcnode-id="7547" instrument_node="">Corporate e-government manager</span></th><th class="align-left" data-dcnode-id="7544" scope="col"><span data-dcnode-id="7545" instrument_node="">Website manager</span></th><th class="align-left" data-dcnode-id="7542" scope="col"><span data-dcnode-id="7543" instrument_node="">IT systems manager</span></th><th class="align-left" data-dcnode-id="7540" scope="col"><span data-dcnode-id="7541" instrument_node="">IT support manager</span></th><th class="align-left" data-dcnode-id="7538" scope="col"><span data-dcnode-id="7539" instrument_node="">IT services manager</span></th></tr></thead><tbody data-dcnode-id="7330"><tr class="valign-top" data-dcnode-id="7519"><td class="align-left" data-dcnode-id="7534" rowspan="2"><span data-dcnode-id="7535" instrument_node="">Operational</span></td><td class="align-left" data-dcnode-id="7532"><span data-dcnode-id="7533" instrument_node="">▪Streamline internal operations</span></td><td class="align-left" data-dcnode-id="7530"><span data-dcnode-id="7531" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7528"><span data-dcnode-id="7529" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7526"><span data-dcnode-id="7527" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7524"><span data-dcnode-id="7525" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7522"><span data-dcnode-id="7523" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7520"><span data-dcnode-id="7521" instrument_node="">x</span></td></tr><tr class="valign-top" data-dcnode-id="7504"><td class="align-left" data-dcnode-id="7517"><span data-dcnode-id="7518" instrument_node="">▪Lower IT costs</span></td><td class="align-left" data-dcnode-id="7515"><span data-dcnode-id="7516" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7513"><span data-dcnode-id="7514" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7511"><span data-dcnode-id="7512" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7509"><span data-dcnode-id="7510" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7507"><span data-dcnode-id="7508" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7505"><span data-dcnode-id="7506" instrument_node="">x</span></td></tr><tr class="valign-top" data-dcnode-id="7487"><td class="align-left" data-dcnode-id="7502" rowspan="2"><span data-dcnode-id="7503" instrument_node="">Managerial</span></td><td class="align-left" data-dcnode-id="7500"><span data-dcnode-id="7501" instrument_node="">▪Improvement of policy making</span></td><td class="align-left" data-dcnode-id="7498"><span data-dcnode-id="7499" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="7496"><span data-dcnode-id="7497" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="7494"><span data-dcnode-id="7495" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="7492"><span data-dcnode-id="7493" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="7490"><span data-dcnode-id="7491" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7488"><span data-dcnode-id="7489" instrument_node="">x</span></td></tr><tr class="valign-top" data-dcnode-id="7472"><td class="align-left" data-dcnode-id="7485"><span data-dcnode-id="7486" instrument_node="">▪Rapid dissemination of information</span></td><td class="align-left" data-dcnode-id="7483"><span data-dcnode-id="7484" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7481">  infrastructure</span></td><td class="align-left" data-dcnode-id="7406"><span data-dcnode-id="7407" instrument_node="">▪Scalability of the system</span></td><td class="align-left" data-dcnode-id="7404"><span data-dcnode-id="7405" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7402"><span data-dcnode-id="7403" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7400"><span data-dcnode-id="7401" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7398"><span data-dcnode-id="7399" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7396"><span data-dcnode-id="7397" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="7378"><td class="align-left" data-dcnode-id="7391"><span data-dcnode-id="7392" instrument_node="">▪Exploit free applications</span></td><td class="align-left" data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7387"><span data-dcnode-id="7388" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7383"><span data-dcnode-id="7384" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7381"><span data-dcnode-id="7382" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7379"><span data-dcnode-id="7380" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="7363"><td class="align-left" data-dcnode-id="7376"><span data-dcnode-id="7377" instrument_node="">▪Ease of use and greater access</span></td><td class="align-left" data-dcnode-id="7374"><span data-dcnode-id="7375" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7372"><span data-dcnode-id="7373" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7370"><span data-dcnode-id="7371" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7366"><span data-dcnode-id="7367" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7364"><span data-dcnode-id="7365" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="7346"><td class="align-left" data-dcnode-id="7361" rowspan="2"><span data-dcnode-id="7362" instrument_node="">Organisational</span></td><td class="align-left" data-dcnode-id="7359"><span data-dcnode-id="7360" instrument_node="">▪Efficient gathering of collective intelligence</span></td><td class="align-left" data-dcnode-id="7357"><span data-dcnode-id="7358" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7355"><span data-dcnode-id="7356" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7353"><span data-dcnode-id="7354" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7351"><span data-dcnode-id="7352" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">◉</span></td></tr><tr class="valign-top" data-dcnode-id="7331"><td class="align-left" data-dcnode-id="7344"><span data-dcnode-id="7345" instrument_node="">▪Co-production and collaboration</span></td><td class="align-left" data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7338"><span data-dcnode-id="7339" instrument_node="">◉</span></td><td class="align-left" data-dcnode-id="7336"><span data-dcnode-id="7337" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">○</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="7309" id="p0130"><span data-dcnode-id="7325" instrument_node="">The findings from the empirical data as depicted in the table above highlight the benefits of Web 2.0 such as </span><em data-dcnode-id="7323"><span data-dcnode-id="7324" instrument_node="">rapid dissemination of information</span></em><span data-dcnode-id="7322" instrument_node="">, </span><em data-dcnode-id="7320"><span data-dcnode-id="7321" instrument_node="">enhancing external transparency</span></em><span data-dcnode-id="7319" instrument_node="">, </span><em data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">reviving user engagement</span></em><span data-dcnode-id="7316" instrument_node="">, </span><em data-dcnode-id="7314"><span data-dcnode-id="7315" instrument_node="">exploiting free applications</span></em><span data-dcnode-id="7313" instrument_node=""> and </span><em data-dcnode-id="7311"><span data-dcnode-id="7312" instrument_node="">ease of use and greater access</span></em><span data-dcnode-id="7310" instrument_node=""> were considered by the interviewees to be highly important factors for the effective use of Web 2.0 applications in the case organisation.</span></p><p data-dcnode-id="7280" id="p0135"><span data-dcnode-id="7308" instrument_node="">Within the </span><em data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">operational benefits</span></em><span data-dcnode-id="7305" instrument_node=""> dimension, </span><em data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">lowering IT costs</span></em><span data-dcnode-id="7302" instrument_node=""> and </span><em data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">streamlining internal operations</span></em><span data-dcnode-id="7299" instrument_node=""> were both regarded as important factors by the UKLGA senior management team. The Website Manager highlighted the point that the use of Web 2.0 applications (where one-stop collaboration platforms such as Yammer) helped streamline processes by making it easier to access and share information and facilitate project management within departments. The manager believed that this would help reduce the traditional chain emails which are sent to update the progress of or any amendments to a project to all related employees. Most managers also believed that one of the main benefits of Web 2.0 was cost-saving in terms of implementation and take-up (compared to a traditional IT system such as a payroll or logistics system). In addition, for UKLGA, </span><em data-dcnode-id="7297"><span data-dcnode-id="7298" instrument_node="">rapid dissemination of information</span></em><span data-dcnode-id="7296" instrument_node=""> was extremely important. In this respect, the use of applications such as Twitter was useful for them as it was far more efficient in getting out information to a vast number of users at a greater speed compared to other methods of communication such as a static website or a printed newsletter. However, on the other hand, the benefit of using Web 2.0 applications to </span><em data-dcnode-id="7294"><span data-dcnode-id="7295" instrument_node="">improve policymaking</span></em><span data-dcnode-id="7293" instrument_node=""> was not believed to be of great importance by most of the managers. The e-Government manager stated that it was not important at all and the Website Manager said: “</span><em data-dcnode-id="7291"><span data-dcnode-id="7292" instrument_node="">In principle it makes perfect sense but in reality I think it tends to be rather a self-selecting group, so people that are affected by the policy aren't actually part of the consultation group</span></em><span data-dcnode-id="7290" instrument_node="">” (RSJ). In addition, enhancing external transparency and reviving user engagement were deemed highly important </span><em data-dcnode-id="7288"><span data-dcnode-id="7289" instrument_node="">strategic benefits</span></em><span data-dcnode-id="7287" instrument_node=""> of using Web 2.0 applications by the senior management team; The Web Manager reported: “</span><em data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">I know this will be extremely important because you are not giving the pre-chewed data</span></em><span data-dcnode-id="7284" instrument_node="">” (</span><em data-dcnode-id="7282"><span data-dcnode-id="7283" instrument_node="">RSJ</span></em><span data-dcnode-id="7281" instrument_node="">).</span></p><p data-dcnode-id="7248" id="p0140"><span data-dcnode-id="7279" instrument_node="">Among the other benefits cited, the Head of ICT and the IT Systems Manager both added that </span><em data-dcnode-id="7277"><span data-dcnode-id="7278" instrument_node="">intra-marketing</span></em><span data-dcnode-id="7276" instrument_node=""> and </span><em data-dcnode-id="7274"><span data-dcnode-id="7275" instrument_node="">informal engagement</span></em><span data-dcnode-id="7273" instrument_node=""> were two other important </span><em data-dcnode-id="7271"><span data-dcnode-id="7272" instrument_node="">strategic</span></em><span data-dcnode-id="7270" instrument_node=""> areas that could benefit from the use of Web 2.0. The IT Systems Manager highlight that the use of Facebook for </span><em data-dcnode-id="7268"><span data-dcnode-id="7269" instrument_node="">intra-marketing</span></em><span data-dcnode-id="7267" instrument_node=""> of UKLGA's existing services among the internal employees seemed quite a prominent and an effective use of these applications in the case organisation. Thus indicating the ability to use Web 2.0 applications such as social media sites for </span><em data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">intra-marketing</span></em><span data-dcnode-id="7264" instrument_node=""> opportunities was a key strategic benefit for UKLGA. In terms of </span><em data-dcnode-id="7262"><span data-dcnode-id="7263" instrument_node="">informal engagement</span></em><span data-dcnode-id="7261" instrument_node="">, this was considered to be an important factor, mainly by the Head of ICT, as it was believed that the use of Web 2.0 applications such as blogs would help disseminate strategic messages to the council's employees quickly and in a conversational tone rather than sending formal newsletters or emails. The Head of ICT also highlighted the fact that some employees such as the Chief Executive and other senior managers already employed such methods and were regular ‘bloggers’. The key benefits of this method was that the employees had the freedom to visit the blogs in their own time and also allowed for interaction by allowing them to comment on blog posts. Moreover, the zero take-up cost associated with Web 2.0 meant that it was an easy decision for senior management to implement these applications in the UKLGA. Finally, the ability of Web 2.0 applications to facilitate </span><em data-dcnode-id="7259"><span data-dcnode-id="7260" instrument_node="">collaboration</span></em><span data-dcnode-id="7258" instrument_node=""> and </span><em data-dcnode-id="7256"><span data-dcnode-id="7257" instrument_node="">co-production</span></em><span data-dcnode-id="7255" instrument_node=""> and </span><em data-dcnode-id="7253"><span data-dcnode-id="7254" instrument_node="">efficient gathering of collective intelligence</span></em><span data-dcnode-id="7252" instrument_node=""> were regarded as significant factors by the managers for use. The IT Systems Manager asserted that efficient gathering of collective intelligence often occurred in the UKLGA when using interactive Web 2.0 survey applications. He added, “…</span><em data-dcnode-id="7250"><span data-dcnode-id="7251" instrument_node="">when using such applications there wasn't an issue of scalability when compared to traditional means of collecting data</span></em><span data-dcnode-id="7249" instrument_node="">” (RJB). Furthermore, according to the IT Services Manager, digital platforms that facilitate collaboration enabled the UKLGA to carry our formal consultations with different departments regarding local development plans without the need for physical meetings.</span></p></section><section data-dcnode-id="7023" id="s0075"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7241" id="st0085"><span data-dcnode-id="7246" instrument_node="">4.1.2</span><span data-dcnode-id="7244" instrument_node="">. </span><span data-dcnode-id="7242" instrument_node="">Costs evaluation of Web 2.0 technologies</span></h4><div data-dcnode-id="7055"><p data-dcnode-id="7212" id="p0145"><span data-dcnode-id="7240" instrument_node="">In line with the mapping of literature in </span><a class="workspace-trigger" data-dcnode-id="7238" href="#s0025" name="bs0025"><span data-dcnode-id="7239" instrument_node="">Section&nbsp;2.1.2</span></a><span data-dcnode-id="7237" instrument_node="">, the management at the UKLGA were asked to indicate their initial views on the important costs when using Web 2.0 applications. </span><a class="workspace-trigger" data-dcnode-id="7235" href="#t0035" name="bt0035"><span data-dcnode-id="7236" instrument_node="">Table&nbsp;7</span></a><span data-dcnode-id="7234" instrument_node=""> depicts the analysis of the important costs of Web 2.0 for its effective use in the UKLGA based on the views of the interviewees. It uses a 7-point Likert scale of </span><em data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">less important</span></em><span data-dcnode-id="7231" instrument_node=""> to </span><em data-dcnode-id="7229"><span data-dcnode-id="7230" instrument_node="">fairly important</span></em><span data-dcnode-id="7228" instrument_node=""> (○), </span><em data-dcnode-id="7226"><span data-dcnode-id="7227" instrument_node="">moderately important</span></em><span data-dcnode-id="7225" instrument_node=""> to </span><em data-dcnode-id="7223"><span data-dcnode-id="7224" instrument_node="">important</span></em><span data-dcnode-id="7222" instrument_node=""> (◉) and </span><em data-dcnode-id="7220"><span data-dcnode-id="7221" instrument_node="">highly important</span></em><span data-dcnode-id="7219" instrument_node=""> to </span><em data-dcnode-id="7217"><span data-dcnode-id="7218" instrument_node="">extremely important</span></em><span data-dcnode-id="7216" instrument_node=""> (●) and where the interviewees said </span><em data-dcnode-id="7214"><span data-dcnode-id="7215" instrument_node="">not important</span></em><span data-dcnode-id="7213" instrument_node="">, the “x” symbol is used.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7056" id="t0035"><span class="captions" data-dcnode-id="7204"><span data-dcnode-id="7205" id="ca0040"><p data-dcnode-id="7206" id="sp0060"><span class="label" data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">Table&nbsp;7</span></span><span data-dcnode-id="7209" instrument_node="">. </span><span data-dcnode-id="7207" instrument_node="">Importance of Web 2.0 technology costs.</span></p></span></span><div class="groups" data-dcnode-id="7057"><table data-dcnode-id="7058"><thead data-dcnode-id="7186"><tr class="valign-top rowsep-1" data-dcnode-id="7187"><th class="align-left" data-dcnode-id="7202" scope="col"><span data-dcnode-id="7203" instrument_node="">Classification</span></th><th class="align-left" data-dcnode-id="7200" scope="col"><span data-dcnode-id="7201" instrument_node="">Cost of Web 2.0 technologies</span></th><th class="align-left" data-dcnode-id="7198" scope="col"><span data-dcnode-id="7199" instrument_node="">Head of ICT</span></th><th class="align-left" data-dcnode-id="7196" scope="col"><span data-dcnode-id="7197" instrument_node="">Corporate e-government manager</span></th><th class="align-left"
