</span></a></div></figure></div><p data-dcnode-id="1683"><a data-dcnode-id="1685" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="1686" instrument_node="">Table 5</span></a><span data-dcnode-id="1684" instrument_node=""> presents the averages of output quantities, output prices, and revenues. The average quantity and price of losses incurred (intermediation) are 623 million baht (2,619 million baht), and 1.30 (5.23 per cent), respectively. The average revenue of losses incurred (intermediation) is 548.96 million baht (162.78 million baht).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1668" data-test="inline-table" id="table-5"><figure data-dcnode-id="1669"><figcaption class="c-article-table__figcaption" data-dcnode-id="1680"><b data-dcnode-id="1681" data-test="table-caption" id="Tab5"><span data-dcnode-id="1682" instrument_node="">Table 5 Outputs and revenues</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1670"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="1671" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/gpp.2010.30/tables/5" rel="nofollow"><span data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1672" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1673" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1674" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1677" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1676" fill-rule="evenodd"></path><span data-dcnode-id="1675" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1640"><a data-dcnode-id="1666" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab6"><span data-dcnode-id="1667" instrument_node="">Table 6</span></a><span data-dcnode-id="1665" instrument_node=""> presents the summary statistics of efficiency scores, the corporate governance variables, and other control variables. On average, the technical efficiency score is 94.1 per cent, suggesting that firms could have produced the same outputs by using 94.1 per cent of the inputs. This result is much higher than that found in Cummins and Nini</span><sup data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">8</span></sup><span data-dcnode-id="1662" instrument_node=""> (57.6 per cent), which used U.S.A.’s non-life insurer samples, but closer to Wang </span><i data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">et al.</span></i><sup data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">34</span></sup><span data-dcnode-id="1657" instrument_node=""> (93.9 per cent), which used Taiwan’s non-life insurer samples. The allocative efficiency score is on average 62.6 per cent, suggesting that firms could have produced the same outputs by using 62.6 per cent of the inputs, if inputs were optimally allocated. This result is lower than Cummins and Nini</span><sup data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">8</span></sup><span data-dcnode-id="1654" instrument_node=""> (79.8 per cent) and Wang </span><i data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">et al.</span></i><sup data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">34</span></sup><span data-dcnode-id="1649" instrument_node=""> (75.7 per cent). The average cost efficiency score is approximately 59.3 per cent, which is higher than Cummins and Nini</span><sup data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">8</span></sup><span data-dcnode-id="1646" instrument_node=""> (40.6 per cent), but lower than Wang </span><i data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">et al.</span></i><sup data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">34</span></sup><span data-dcnode-id="1641" instrument_node=""> (71.9 per cent). Finally, the revenue efficiency score is on average 85.2 per cent, suggesting that these firms could have increased revenue by 14.8 per cent when obtaining optimal outputs.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1625" data-test="inline-table" id="table-6"><figure data-dcnode-id="1626"><figcaption class="c-article-table__figcaption" data-dcnode-id="1637"><b data-dcnode-id="1638" data-test="table-caption" id="Tab6"><span data-dcnode-id="1639" instrument_node="">Table 6 Descriptive statistics</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1627"><a aria-label="Full size table 6" class="c-article__pill-button" data-dcnode-id="1628" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/gpp.2010.30/tables/6" rel="nofollow"><span data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1629" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1630" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1631" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1634" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1633" fill-rule="evenodd"></path><span data-dcnode-id="1632" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">The average board size is 12.3 members, which is much higher than that required by the Public Limited Company Act (five members) and OIC (seven members) in Thailand. In our sample, 5.1 per cent of the board is dominated by independent directors. The board meeting frequency ranges from 4 to 17 times per year and its average is 6.2 times per year. With regard to audit committee variables, the size of the audit committee is approximately 3.1 members, with 39.5 per cent of its members possessing financial or accounting expertise. The meeting frequency of the audit committee ranges from 4 to 14 times per year and averages 5.2 times per year. In addition, the average divergence between voting rights and cash flow rights is 0.215, the average board tenure is 9.122 years, and the average age of the directors is 59 years of age. The average ownership of board members is 10.9 per cent. The board of directors receives 0.2 per cent of total assets as compensation. Finally, the average firm size is 7.658.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1621" id="Sec22"><span data-dcnode-id="1622" instrument_node="">The regression results</span></h3><p data-dcnode-id="1617"><a data-dcnode-id="1619" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab7"><span data-dcnode-id="1620" instrument_node="">Table 7</span></a><span data-dcnode-id="1618" instrument_node=""> reports the regression results estimated by the truncated bootstrapped regression model. The dependent variables consist of four efficiency scores and the independent variables consist of corporate governance variables, control variables, and year dummy variables. To save space, the coefficients of year dummy variables are omitted. We tested for correlation among the independent variables and the results of variance inflation factors revealed that there are no problems with multicollinearity.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1602" data-test="inline-table" id="table-7"><figure data-dcnode-id="1603"><figcaption class="c-article-table__figcaption" data-dcnode-id="1614"><b data-dcnode-id="1615" data-test="table-caption" id="Tab7"><span data-dcnode-id="1616" instrument_node="">Table 7 Truncated bootstrapped regression models with efficiency scores as dependent variable</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1604"><a aria-label="Full size table 7" class="c-article__pill-button" data-dcnode-id="1605" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/gpp.2010.30/tables/7" rel="nofollow"><span data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1606" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1607" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1608" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1611" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1610" fill-rule="evenodd"></path><span data-dcnode-id="1609" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1581"><span data-dcnode-id="1601" instrument_node="">Consistent with Hardwick </span><i data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">et al.</span></i><sup data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">17</span></sup><span data-dcnode-id="1596" instrument_node=""> and Huang </span><i data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">et al.</span></i><span data-dcnode-id="1593" instrument_node="">,</span><sup data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">20</span></sup><span data-dcnode-id="1590" instrument_node=""> board size is positively and significantly correlated with technical, allocative, and cost efficiency, suggesting that more knowledge backgrounds and more varied opinions provided by a larger board increase a firm's efficiency. However, board size is negatively and significantly correlated with revenue efficiency, indicating that a small number of directors on the board enables firms to obtain better efficiency performance via reducing coordination problems that exist in large boards.</span><sup data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">12</span></sup><span data-dcnode-id="1587" instrument_node=""> Regarding the relation between board independence and the efficiency performance of insurers, the results show that board independence is positively related to allocative and cost efficiency, and are consistent with Wang </span><i data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">et al.</span></i><sup data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">33</span></sup><span data-dcnode-id="1582" instrument_node=""> In addition, we also find that board independence is positively related to revenue efficiency. Collectively, the results suggest that a board dominated by independent directors is associated with effective monitoring that enhances a firm's efficiency.</span></p><p data-dcnode-id="1573"><span data-dcnode-id="1580" instrument_node="">Consistent with Huang </span><i data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">et al.</span></i><span data-dcnode-id="1577" instrument_node="">,</span><sup data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">10</span></sup><span data-dcnode-id="1574" instrument_node=""> board meeting frequency is positively correlated to its allocative and cost efficiency. The result indicates that board diligence can improve the efficiency performance of a firm because the board has more opportunities to monitor management performance.</span></p><p data-dcnode-id="1566"><span data-dcnode-id="1572" instrument_node="">With respect to the audit committee characteristics, the committee size is negatively related to technical, cost, as well as revenue efficiency, suggesting that increasing committee size decreases a firm's efficiency. In the same direction, we also find that audit committee meeting frequency is negatively related to technical and cost efficiency. The results suggest that the effectiveness of an audit committee decreases with overloaded agendas and activities on compliance. The proportion of financial expertise on an audit committee is positively associated with allocative and cost efficiency, indicating that the more financial experts on an audit committee help the board in preventing financial reporting and irregularity problems. However, on the contrary, financial expertise on an audit committee is negatively associated with technical and revenue efficiency. This result is consistent with Huang </span><i data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">et al.</span></i><sup data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">10</span></sup><span data-dcnode-id="1567" instrument_node=""> that more financial experts on an audit committee would be harmful to a firm's efficiency performance, provided they do not have sufficient experience, which would lead to ineffective monitoring.</span></p><p data-dcnode-id="1549"><span data-dcnode-id="1565" instrument_node="">Apart from the above results, divergence is negatively related to a firm's efficiency performance, suggesting that increasing divergence between voting rights and cash flow rights decreases a firm's efficiency.</span><sup data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">34,</span></sup><sup data-dcnode-id="1558"><a data-dcnode-id="1559" href="#Fn41"><span class="u-visually-hidden" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Footnote </span></span><span data-dcnode-id="1560" instrument_node="">41</span></a></sup><sup data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">,</span></sup><sup data-dcnode-id="1551"><a data-dcnode-id="1552" href="#Fn42"><span class="u-visually-hidden" data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Footnote </span></span><span data-dcnode-id="1553" instrument_node="">42</span></a></sup><span data-dcnode-id="1550" instrument_node=""> On the contrary, we find a negative relation between a board's tenure and technical, allocative, and cost efficiency, suggesting that longer board tenure harms the efficiency performance of a firm, because the familiarity between board members and managers may prevent them from effectively monitoring said managers. We also find a negative relation between board age and efficiency, indicating that increasing the average age of the directors on the board would be harmful to the efficiency performance of a firm, because senior directors may respond to their duties slower than younger directors, conceivably due to poor health problems or higher age.</span></p><p data-dcnode-id="1539"><span data-dcnode-id="1548" instrument_node="">Board ownership is negatively related to technical and revenue efficiency, implying that increasing board ownership would harm the efficiency of a firm. Board compensation is significantly and positively related to technical efficiency. This result indicates that higher board compensation could induce directors to do their duty more efficiently, in order to keep their positions and thus, to increase the efficiency of a firm. However, board compensation is significantly and negatively related to allocative efficiency. The result confirms Core </span><i data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">et al.</span></i><sup data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">37</span></sup><span data-dcnode-id="1543" instrument_node=""> which state that firms compensating their directors more will have higher agency costs, and thus, exhibit poor performance. Finally, consistent with prior literature,</span><sup data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">5,9,14,36</span></sup><span data-dcnode-id="1540" instrument_node=""> firm size is positively and statistically significant to all the efficiency measures of a firm.</span></p></div></div></section><section data-dcnode-id="1512" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="1513" id="Sec23-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1534" id="Sec23"><span data-dcnode-id="1535" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="1514" id="Sec23-content"><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">The purpose of this paper is to investigate the relationship between various aspects of corporate governance characteristics and the efficiency performance of the non-life insurance companies in Thailand. We use public Thai non-life insurance companies from the years 2000 to 2007 as samples. To examine our hypotheses, we first employ the DEA to calculate the efficiency scores and then use truncated bootstrapped regression to test the relationship between efficiency scores and corporate governance variables.</span></p><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Our paper adds to the literature in three aspects. First, this paper is the first of its kind to investigate the impact of corporate governance on the efficiency performance of Thai non-life insurance companies, given that the Thai government has enacted so many regulations for corporate governance after the Asian Financial Crisis. Second, we investigate the impact of a more complete set of board/audit committee characteristics on the insurer's efficiency performance. Third, unlike prior literature, we also investigate the relation between revenue efficiency and corporate governance, allowing us to examine whether good corporate governance is rewarded by the market.</span></p><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">The empirical results reveal that the characteristics of corporate governance do influence the efficiency performance of non-life insurers. Specifically, board independence is positively correlated with allocative, cost, and revenue efficiency, suggesting that board independence enhances a firm's efficiency. Moreover, we find evidence that board meeting frequency is positively correlated to allocative and cost efficiency. The result indicates that board diligence can improve the efficiency performance of firm because the board has more opportunities to monitor the performance of management.</span></p><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">For audit committee characteristics, the results show that an audit committee size is negatively related to technical, cost, as well as revenue efficiency, suggesting that increasing committee size decreases a firm's efficiency. In the same direction, we also find that audit committee meeting frequency is negatively related to technical and cost efficiency. The results suggest that the effectiveness of an audit committee decreases with overloaded agendas and activities on compliance, lowering a firm's efficiency. Finally, divergence between voting rights and cash flow rights also has a negative impact on efficiency.</span></p><p data-dcnode-id="1515"><span data-dcnode-id="1525" instrument_node="">Our empirical results may encourage more studies to examine further the links between any other aspects of corporate governance characteristics and performance of the Thai insurance industry. Although this study uses only the data from the public Thai non-life insurance companies, its findings could have further implications for regulators in Thailand to set up corporate governance requirements. Specifically, our results show that a board dominated by independent directors significantly improves its efficiency, while the proportion of independent directors generates mixed results, suggesting that the requirement for a minimum proportion of independent directors to be on a board may not enhance a firm’s performance, due to majority rule. Instead, a board dominated by its independent directors contributes to a firm’s performance. Another implication derived from our results is that the characteristics that make up an audit committee may generate negative results. As mentioned earlier, a possible explanation is the requirement by the Thai government that audit committee members cannot hold more than five per cent shares of the firm. This is in contrast with the findings by Klein</span><sup data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">24</span></sup><span data-dcnode-id="1522" instrument_node=""> and Ahmed and Duellman</span><sup data-dcnode-id="1517"><a data-dcnode-id="1518" href="#Fn43"><span class="u-visually-hidden" data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Footnote </span></span><span data-dcnode-id="1519" instrument_node="">43</span></a></sup><span data-dcnode-id="1516" instrument_node=""> which state that stock ownership increases monitoring incentives, and such a requirement decreases this monitoring incentive, undermining the effectiveness of an audit committee.</span></p></div></div></section><span data-dcnode-id="1511" instrument_node="">
</span><section data-dcnode-id="1238" data-title="Notes"><div class="c-article-section" data-dcnode-id="1239" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1509" id="notes"><span data-dcnode-id="1510" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1240" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1241"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1493" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1494"><p data-dcnode-id="1495"><span data-dcnode-id="1508" instrument_node="">For more examples of corporate governance failure in Thai companies, see </span><a aria-label="Reference Viverito (1998)" data-dcnode-id="1506" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d262067598e326" title="Viverito, J. (1998) ‘Corporate governance in the Kingdom of Thailand’, Malaysian Journal of Economic Studies 35 (1–2): 231–245."><span data-dcnode-id="1507" instrument_node="">Viverito (1998)</span></a><span data-dcnode-id="1505" instrument_node="">, </span><a aria-label="Reference Nikomborirak and Tangkitvanich (1999)" data-dcnode-id="1503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d262067598e329" title="Nikomborirak, D. and Tangkitvanich, S. (1999) Corporate governance: The challenge facing the Thai economy, paper presented at the conference on Corporate Governance in Asia: A Comparative Perspective, Seoul, Korea."><span data-dcnode-id="1504" instrument_node="">Nikomborirak and Tangkitvanich (1999)</span></a><span data-dcnode-id="1502" instrument_node="">, and </span><a aria-label="Reference Leightner (2007)" data-dcnode-id="1500" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d262067598e332" title="Leightner, J.E. (2007) ‘Thailand's financial crisis: Its causes, consequences, and implications’, Journal of Economic Issue 41: 61–74."><span data-dcnode-id="1501" instrument_node="">Leightner (2007)</span></a><span data-dcnode-id="1499" instrument_node="">. In addition, </span><a aria-label="Reference Johnson et al. (2000)" data-dcnode-id="1497" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d262067598e335" title="Johnson, S., Boone, P., Breach, A. and Friedman, E. (2000) ‘Corporate governance in the Asian financial crisis’, Journal of Financial Economics 58 (1–2): 141–186."><span data-dcnode-id="1498" instrument_node="">Johnson et al. (2000)</span></a><span data-dcnode-id="1496" instrument_node=""> find that, in the case of the Asian Crisis in 1997–98, the worse economy effects to more expropriation by manager and thus a larger fall in asset prices in the countries with weakness of corporate governance. They suggest that, in crisis situations, corporate governance should be used first in determining the extent of macroeconomic problems.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1489" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1490"><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">In some countries, there exists a distinction between good corporate governance and corporate governance, but in this paper, the two terms are equal.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="1485" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="1486"><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">B.E. stands for Buddhist Era, Thailand year.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="1478" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="1479"><p data-dcnode-id="1480"><span data-dcnode-id="1484" instrument_node="">For example, </span><a aria-label="Reference Connelly and Limpaphayom (2004)" data-dcnode-id="1482" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d262067598e362" title="Connelly, J.T. and Limpaphayom, P. (2004) ‘Board characteristics and firm performance: Evidence from the life insurance industry in Thailand’, Chulalongkorn Journal of Economics 16 (2): 101–124."><span data-dcnode-id="1483" instrument_node="">Connelly and Limpaphayom (2004)</span></a><span data-dcnode-id="1481" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="1472" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="1473"><p data-dcnode-id="1474"><a aria-label="Reference Pathan et al. (2007)" data-dcnode-id="1476" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d262067598e372" title="Pathan, S., Skully, M.T. and Wickramanayake, J. (2007) ‘Board size, independence and performance: An analysis of Thai banks’, Asia-Pacific Financial Markets 14 (3): 211–227."><span data-dcnode-id="1477" instrument_node="">Pathan et al. (2007)</span></a><span data-dcnode-id="1475" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="1466" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="1467"><p data-dcnode-id="1468"><a aria-label="Reference Viverito (1998)" data-dcnode-id="1470" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d262067598e388" title="Viverito, J. (1998) ‘Corporate governance in the Kingdom of Thailand’, Malaysian Journal of Economic Studies 35 (1–2): 231–245."><span data-dcnode-id="1471" instrument_node="">Viverito (1998)</span></a><span data-dcnode-id="1469" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="1460" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="1461"><p data-dcnode-id="1462"><a aria-label="Reference Johnson et al. (2000)" data-dcnode-id="1464" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d262067598e396" title="Johnson, S., Boone, P., Breach, A. and Friedman, E. (2000) ‘Corporate governance in the Asian financial crisis’, Journal of Financial Economics 58 (1–2): 141–186."><span data-dcnode-id="1465" instrument_node="">Johnson et al. (2000)</span></a><span data-dcnode-id="1463" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="1453" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="1454"><p data-dcnode-id="1455"><span data-dcnode-id="1459" instrument_node="">For example, </span><a aria-label="Reference Cummins and Nini (2002)" data-dcnode-id="1457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d262067598e424" title="Cummins, J.D. and Nini, G.P. (2002) ‘Optimal capital utilization by financial firms: Evidence from the property-liability insurance industry’, Journal of Financial Services Research 21 (1): 15–53."><span data-dcnode-id="1458" instrument_node="">Cummins and Nini (2002)</span></a><span data-dcnode-id="1456" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="1447" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="1448"><p data-dcnode-id="1449"><a aria-label="Reference Agrawal and Knoeber (1996)" data-dcnode-id="1451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d262067598e432" title="Agrawal, A. and Knoeber, C.R. (1996) ‘Firm performance and mechanisms to control agency problems between managers and shareholders’, Journal of Financial and Quantitative Analysis 31: 377–397."><span data-dcnode-id="1452" instrument_node="">Agrawal and Knoeber (1996)</span></a><span data-dcnode-id="1450" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="1441" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="1442"><p data-dcnode-id="1443"><a aria-label="Reference Huang et al. (2008a)" data-dcnode-id="1445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d262067598e447" title="Huang, L.Y., Lai, G.C. and Wang, J.L. (2008a) The effects of corporate governance and auditor independence on the efficiency performance of the U.S. property liability insurance industry, paper presented at Asia-Pacific Risk and Insurance Association, 12th Annual Conference, Sydney, Australia."><span data-dcnode-id="1446" instrument_node="">Huang et al. (2008a)</span></a><span data-dcnode-id="1444" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="11." data-dcnode-id="1435" id="Fn11"><div class="c-article-footnote--listed__content" data-dcnode-id="1436"><p data-dcnode-id="1437"><a aria-label="Reference Beasley (1996)" data-dcnode-id="1439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d262067598e455" title="Beasley, M.S. (1996) ‘An empir
