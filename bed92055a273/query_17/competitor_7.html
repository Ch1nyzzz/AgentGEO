</span><meta content="This paper examines the relation between corporate governance and efficiency performance of public non-life insurance companies in Thailand over the period 2000–2007. Data envelopment analysis is used to compute an insurer's efficiency performance including technical, allocative, cost, and revenue efficiency. We then employ truncated bootstrapped regression to test the relation between efficiency performance and corporate governance. The results show that the characteristics of corporate governance influence the efficiency performance of non-life insurers. In particular, board independence, diligence, and firm size have a positive impact on the efficiency performance of the Thai non-life insurance companies. However, audit committee size, diligence, divergence between voting rights and cash flow rights, board tenure, board age, as well as board ownership have a negative impact on the efficiency performance. Finally, our empirical evidence also indicates that there is an unclear relation between an insurer's efficiency performance and the board size, the proportion of financial expertise on an audit committee, and the board compensation." data-dcnode-id="2914" name="dc.description"><span data-dcnode-id="2913" instrument_node="">

</span><meta content="The Impact of Corporate Governance on the Efficiency Performance of the Thai Non-Life Insurance Industry - The Geneva Papers on Risk and Insurance - Issues and Practice" data-dcnode-id="2730" property="og:title"><span data-dcnode-id="2729" instrument_node="">
</span><meta content="This paper examines the relation between corporate governance and efficiency performance of public non-life insurance companies in Thailand over the period 2000–2007. Data envelopment analysis is used to compute an insurer's efficiency performance including technical, allocative, cost, and revenue efficiency. We then employ truncated bootstrapped regression to test the relation between efficiency performance and corporate governance. The results show that the characteristics of corporate governance influence the efficiency performance of non-life insurers. In particular, board independence, diligence, and firm size have a positive impact on the efficiency performance of the Thai non-life insurance companies. However, audit committee size, diligence, divergence between voting rights and cash flow rights, board tenure, board age, as well as board ownership have a negative impact on the efficiency performance. Finally, our empirical evidence also indicates that there is an unclear relation between an insurer's efficiency performance and the board size, the proportion of financial expertise on an audit committee, and the board compensation." data-dcnode-id="2728" property="og:description"><span data-dcnode-id="2727" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="2309" data-gtm-vis-first-on-screen-50443292_562="1767" data-gtm-vis-first-on-screen-50443292_563="1768" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1767" data-gtm-vis-recent-on-screen-50443292_563="1768" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2310" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2314" id="Abs1"><span data-dcnode-id="2315" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2311" id="Abs1-content"><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">This paper examines the relation between corporate governance and efficiency performance of public non-life insurance companies in Thailand over the period 2000–2007. Data envelopment analysis is used to compute an insurer's efficiency performance including technical, allocative, cost, and revenue efficiency. We then employ truncated bootstrapped regression to test the relation between efficiency performance and corporate governance. The results show that the characteristics of corporate governance influence the efficiency performance of non-life insurers. In particular, board independence, diligence, and firm size have a positive impact on the efficiency performance of the Thai non-life insurance companies. However, audit committee size, diligence, divergence between voting rights and cash flow rights, board tenure, board age, as well as board ownership have a negative impact on the efficiency performance. Finally, our empirical evidence also indicates that there is an unclear relation between an insurer's efficiency performance and the board size, the proportion of financial expertise on an audit committee, and the board compensation.</span></p></div></div></section><span data-dcnode-id="2308" instrument_node="">
</span><section data-dcnode-id="2233" data-gtm-vis-first-on-screen-50443292_562="1768" data-gtm-vis-first-on-screen-50443292_563="1771" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1768" data-gtm-vis-recent-on-screen-50443292_563="1771" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2234" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2306" id="Sec1"><span data-dcnode-id="2307" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2235" id="Sec1-content"><p data-dcnode-id="2292"><span data-dcnode-id="2305" instrument_node="">More than a decade ago, the Asian Financial Crisis erupted in Thailand, devaluing the baht under massive speculative pressure, dropping the Thai economy into a financial gulf, and bankrupting many financial institutions.</span><sup data-dcnode-id="2300"><a data-dcnode-id="2301" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Footnote </span></span><span data-dcnode-id="2302" instrument_node="">1</span></a></sup><span data-dcnode-id="2299" instrument_node=""> The Thai government wanted to know the causes of this crisis and find ways to prevent it for the future. This search led to the creation of a new structure for good corporate governance and oversight of management. Then, the government initiated and promoted the concept of good corporate governance</span><sup data-dcnode-id="2294"><a data-dcnode-id="2295" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Footnote </span></span><span data-dcnode-id="2296" instrument_node="">2</span></a></sup><span data-dcnode-id="2293" instrument_node=""> to deepen and broaden this concept among the listed companies, financial intermediaries, and regulators.</span></p><p data-dcnode-id="2284"><span data-dcnode-id="2291" instrument_node="">Specifically, all listed companies in Thailand have to follow the Public Limited Company Act B.E. 2535</span><sup data-dcnode-id="2286"><a data-dcnode-id="2287" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Footnote </span></span><span data-dcnode-id="2288" instrument_node="">3</span></a></sup><span data-dcnode-id="2285" instrument_node=""> as well as the Securities and Exchange Commission (SEC) regulations in order to implement good corporate governance. Some essential characteristics of the board of directors and audit committees are required. First, the board of directors shall comprise at least five members, of which no fewer than three members will be independent. For larger boards, at least one third must be independent. All directors shall have a variety of expertise and experience suitable for the company's business and monitoring. Second, the board shall meet at least four times a year, depending on the issues at hand. Third, although the audit committee size depends on the volume, scope of responsibilities, and efficiency in the performance of work, an audit committee shall have at least three members. In addition, all members have to be independent and at least one member shall have experience or knowledge of accounting or finance. Something worth noting is the requirement that audit committee members cannot hold shares of over five per cent of the paid-up capital of a company, nor can they be affiliated, associated, or related to anyone within said company, including shares held by such persons. Finally, regarding the frequency of the audit committee meetings: they shall be held at least four times a year, depending on the size of the business and the delegated duties.</span></p><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Along with adhering to the Public Limited Company Act and SEC regulations, insurance companies must also adhere to the Office of Insurance Commission (OIC) regulations, which have its own rules for corporate governance. For example, the board of directors shall have at least seven members, of which at least one fourth shall be independent. All board members shall have an educational background and work experience applicable to the company's business and monitoring needs. Also, each audit committee shall be composed of at least three non-executive members and not less than two independent directors.</span></p><p data-dcnode-id="2266"><span data-dcnode-id="2281" instrument_node="">Although the Thai government has spent a lot of effort on improving corporate governance, only a few studies examine the impact of this new corporate governance structure. Connelly and Limpaphayom</span><sup data-dcnode-id="2276"><a data-dcnode-id="2277" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Footnote </span></span><span data-dcnode-id="2278" instrument_node="">4</span></a></sup><span data-dcnode-id="2275" instrument_node=""> study the relation between a board's characteristics and performance on the life insurance companies in Thailand. They find that the board's composition effectively reduces acquisition costs and has a significantly positive relation to profitability. However, board size has no relation to performance for life insurers. In a study of local commercial banks in Thailand, Pathan </span><i data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">et al.</span></i><sup data-dcnode-id="2268"><a data-dcnode-id="2269" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Footnote </span></span><span data-dcnode-id="2270" instrument_node="">5</span></a></sup><span data-dcnode-id="2267" instrument_node=""> provide similar results that board independence is positively related to performance, but conversely, board size is negatively related to performance. These two papers consider only a few characteristics of a board, that is, board size and independence, ignoring the fact that board meeting frequency and the characteristics of the audit committee could also affect a firm’s performance. On the other hand, since the Thai government has spent a lot of effort in promoting good corporate governance and set regulations for board/audit committee characteristics, using only a few of those characteristics of the board is not adequate in examining the impact of good corporate governance enacted by the Thai government on a firm’s performance.</span></p><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">The purpose of this paper is to investigate the relation between a more complete set of corporate governance variables and efficiency performance of non-life insurance companies in Thailand via the panel data covering the period 2000–07. We employ data envelopment analysis (DEA) to compute the efficiency performance of insurers (technical, allocative, cost, and revenue efficiency) and then use truncated bootstrapped regression to test the relation between efficiency performance and corporate governance.</span></p><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">The empirical results show that the characteristics of corporate governance influence the efficiency performance of Thai non-life insurers. In particular, board independence, board meeting frequency, and firm size have a positive impact on efficiency performance. On the contrary, audit committee size, audit committee meeting frequency, divergence between voting rights and cash flow rights, board tenure, board age, and board ownership have a negative impact. Our results also show an unclear relation between an insurer's efficiency performance and the board size, the proportion of financial experts on an audit committee, and the board compensation.</span></p><p data-dcnode-id="2238"><span data-dcnode-id="2261" instrument_node="">This study adds to the literature in three aspects. First, this paper is only one of a few studies on this subject that specifically utilises the Thai non-life insurance companies’ data in order to investigate the relation between corporate governance and efficiency performance. This investigation is important since poor corporate governance caused the financial crisis in Thailand.</span><sup data-dcnode-id="2256"><a data-dcnode-id="2257" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Footnote </span></span><span data-dcnode-id="2258" instrument_node="">6</span></a></sup><sup data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">,</span></sup><sup data-dcnode-id="2249"><a data-dcnode-id="2250" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Footnote </span></span><span data-dcnode-id="2251" instrument_node="">7</span></a></sup><span data-dcnode-id="2248" instrument_node=""> Further, it is necessary to examine whether a firm’s governance structure improves its efficiency, after the effort the Thailand government has spent in promoting good corporate governance. Second, instead of examining the impact of board size and board independence on performance, as Connelly and Limpaphayom</span><sup data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">4</span></sup><span data-dcnode-id="2245" instrument_node=""> and Pathan </span><i data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">et al.</span></i><span data-dcnode-id="2242" instrument_node="">,</span><sup data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">5</span></sup><span data-dcnode-id="2239" instrument_node=""> we investigate the impact of a more complete set of board/audit committee characteristics on an insurer's efficiency performance. Since the lack of good monitoring on management was one of the pitfalls of the financial crisis, investigating the relation between efficiency and the characteristics of board/audit committees allows us to examine the overall effectiveness of its monitoring. Third, in addition to the use of technical, allocative, and cost efficiency scores to measure the efficiency performance of a company, this paper adds the revenue efficiency score. The revenue efficiency is important because firms with poor corporate governance may have a higher agency cost and, consequently, could be penalised by the market in terms of lower revenue. If the introduction of good corporate governance means a reduction of an agency cost, and represents a legitimate response to the insurance market, then insurers with good corporate governance could potentially be rewarded with higher revenue. If, on the contrary, the introduction of good corporate governance by an insurer is simply an attempt to meet the regulatory requirements, then it will not be appreciated by the market and there will be no benefit.</span></p><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">This paper is organised as follows: The next section develops the hypotheses. The following section describes the data and methodology. The penultimate section presents and discusses empirical results. The final section concludes.</span></p></div></div></section><section data-dcnode-id="1939" data-gtm-vis-first-on-screen-50443292_562="1768" data-gtm-vis-first-on-screen-50443292_563="1771" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1768" data-gtm-vis-recent-on-screen-50443292_563="1771" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Hypothesis development"><div class="c-article-section" data-dcnode-id="1940" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2231" id="Sec2"><span data-dcnode-id="2232" instrument_node="">Hypothesis development</span></h2><div class="c-article-section__content" data-dcnode-id="1941" id="Sec2-content"><p data-dcnode-id="2214"><span data-dcnode-id="2230" instrument_node="">Corporate governance mechanism is an important method for companies to minimise agency cost and help improve performance. Papers use various proxies to measure performance, such as return on assets,</span><sup data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">4</span></sup><span data-dcnode-id="2227" instrument_node=""> return on equity,</span><sup data-dcnode-id="2222"><a data-dcnode-id="2223" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Footnote </span></span><span data-dcnode-id="2224" instrument_node="">8</span></a></sup><span data-dcnode-id="2221" instrument_node=""> and Tobin's Q,</span><sup data-dcnode-id="2216"><a data-dcnode-id="2217" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Footnote </span></span><span data-dcnode-id="2218" instrument_node="">9</span></a></sup><span data-dcnode-id="2215" instrument_node=""> and study the relation between corporate governance and a firm's performance. In this paper we employ efficiency scores, calculated by the DEA, to measure a firm's performance. We use technical, allocative, cost, and revenue efficiency scores, and expect that good corporate governance will improve its efficiency performance. We review relevant literature and develop our hypotheses in this section.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2212" id="Sec3"><span data-dcnode-id="2213" instrument_node="">Board size</span></h3><p data-dcnode-id="2199"><span data-dcnode-id="2211" instrument_node="">The board of directors, as shareholders’ representative, plays an important role in deciding the policy and strategy of a company. It must review the performance of all management teams in order to ensure that management follows company policies and strategies to maximise the benefits of its shareholders. To ensure that the board can properly fulfil its duties, the board members need to commit considerable resources and provide a variety of skills. It follows that a larger board size should be beneficial to the efficiency performance of a firm, because more members on the board would mean more knowledge backgrounds and varied opinions available to a firm,</span><sup data-dcnode-id="2206"><a data-dcnode-id="2207" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Footnote </span></span><span data-dcnode-id="2208" instrument_node="">10</span></a></sup><span data-dcnode-id="2205" instrument_node=""> as well as having stricter monitoring to ensure the reduction of financial fraud.</span><sup data-dcnode-id="2200"><a data-dcnode-id="2201" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Footnote </span></span><span data-dcnode-id="2202" instrument_node="">11</span></a></sup></p><p data-dcnode-id="2179"><span data-dcnode-id="2198" instrument_node="">However, the benefits of having a larger board size might be outweighed by its costs, since an oversized board may make it more difficult to reach a consensus, suggesting that a smaller number of directors on the board could reduce coordination problems and improve its efficiency performance.</span><sup data-dcnode-id="2193"><a data-dcnode-id="2194" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Footnote </span></span><span data-dcnode-id="2195" instrument_node="">12</span></a></sup><span data-dcnode-id="2192" instrument_node=""> In addition, having a larger board size may inadvertently create a free-rider problem or lead to low motivation among board members.</span><sup data-dcnode-id="2187"><a data-dcnode-id="2188" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Footnote </span></span><span data-dcnode-id="2189" instrument_node="">13</span></a></sup><sup data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">,</span></sup><sup data-dcnode-id="2180"><a data-dcnode-id="2181" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Footnote </span></span><span data-dcnode-id="2182" instrument_node="">14</span></a></sup></p><p data-dcnode-id="2145"><span data-dcnode-id="2178" instrument_node="">Many studies have examined the relation between board size and the performance of a firm, and have found inconsistent results. For example, board size is positively related to profitability,</span><sup data-dcnode-id="2173"><a data-dcnode-id="2174" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Footnote </span></span><span data-dcnode-id="2175" instrument_node="">15</span></a></sup><sup data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">,</span></sup><sup data-dcnode-id="2166"><a data-dcnode-id="2167" href="#Fn16"><span class="u-visually-hidden" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Footnote </span></span><span data-dcnode-id="2168" instrument_node="">16</span></a></sup><span data-dcnode-id="2165" instrument_node=""> and firm efficiency.</span><sup data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">10,</span></sup><sup data-dcnode-id="2158"><a data-dcnode-id="2159" href="#Fn17"><span class="u-visually-hidden" data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Footnote </span></span><span data-dcnode-id="2160" instrument_node="">17</span></a></sup><span data-dcnode-id="2157" instrument_node=""> On the other hand, Conyon and Peck,</span><sup data-dcnode-id="2152"><a data-dcnode-id="2153" href="#Fn18"><span class="u-visually-hidden" data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Footnote </span></span><span data-dcnode-id="2154" instrument_node="">18</span></a></sup><span data-dcnode-id="2151" instrument_node=""> as well as Pathan </span><i data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">et al.</span></i><sup data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">5</span></sup><span data-dcnode-id="2146" instrument_node=""> have found evidence suggesting that a board size is negatively related to return on equity. On the basis of these inconsistent results, increasing board size may not necessarily improve efficiency performance. Therefore, we propose the following hypothesis:</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">H1:</span></h3><ul class="u-list-style-none" data-dcnode-id="2135"><span data-dcnode-id="2142" instrument_node="">
</span><li data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">There is no relation between board size and a firm's efficiency performance.</span></p><span data-dcnode-id="2138" instrument_node="">
</span></li><span data-dcnode-id="2136" instrument_node="">
</span></ul><h3 class="c-article__sub-heading" data-dcnode-id="2133" id="Sec4"><span data-dcnode-id="2134" instrument_node="">Board independence</span></h3><p data-dcnode-id="2123"><span data-dcnode-id="2132" instrument_node="">A corporate board is generally composed of both inside and outside (independent) directors. The independent directors are used as a proxy of board independence and are an important factor in measuring the effectiveness of board monitoring for two reasons. First, the independent directors on the board are able to work freely and are not subject to control or influence from major shareholders, management, or other relevant parties. Therefore, they are more likely to question and monitor management to prevent fraud, because they have no economic or psychological connection with management. Second, Fama and Jensen</span><sup data-dcnode-id="2127"><a data-dcnode-id="2128" href="#Fn19"><span class="u-visually-hidden" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Footnote </span></span><span data-dcnode-id="2129" instrument_node="">19</span></a></sup><span data-dcnode-id="2126" instrument_node=""> suggest that independent directors have more motivation to build-up and improve their reputations by providing effective monitoring. It follows that independent directors are associated with better performance, and more independent directors on a board should mean more efficiency in monitoring management, and thus reduce the opportunity for fraud in accounting and financial statements.</span><sup data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">11</span></sup></p><p data-dcnode-id="2113"><span data-dcnode-id="2122" instrument_node="">In a study of the Thai life insurance industry, Connelly and Limpaphayom</span><sup data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">4</span></sup><span data-dcnode-id="2119" instrument_node=""> find that board independence is positively correlated with an insurer's profitability and negatively correlated with an insurer's commission expenditure. Pathan </span><i data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">et al.</span></i><sup data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">5</span></sup><span data-dcnode-id="2114" instrument_node=""> use the Thai banks as sample and find that board independence is associated with higher profitability.</span></p><p data-dcnode-id="2097"><span data-dcnode-id="2112" instrument_node="">On the contrary, other studies have also found that board independence is negatively correlated with Tobin’s Q</span><sup data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">9</span></sup><span data-dcnode-id="2109" instrument_node=""> and efficiency.</span><sup data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">17</span></sup><span data-dcnode-id="2106" instrument_node=""> Huang </span><i data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">et al.</span></i><sup data-dcnode-id="2099"><a data-dcnode-id="2100" href="#Fn20"><span class="u-visually-hidden" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Footnote </span></span><span data-dcnode-id="2101" instrument_node="">20</span></a></sup><span data-dcnode-id="2098" instrument_node=""> provide a possible explanation for the results, in that those independent directors who are excessively prudent and risk-averse may monitor management excessively, resulting in an inefficient business decision-making process. Collectively, we formulate the hypothesis as follows:</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">H2:</span></h3><ul class="u-list-style-none" data-dcnode-id="2087"><span data-dcnode-id="2094" instrument_node="">
</span><li data-dcnode-id="2089"><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">There is no relation between board independence and a firm's efficiency performance.</span></p><span data-dcnode-id="2090" instrument_node="">
</span></li><span data-dcnode-id="2088" instrument_node="">
</span></ul><h3 class="c-article__sub-heading" data-dcnode-id="2085" id="Sec5"><span data-dcnode-id="2086" instrument_node="">Board diligence</span></h3><p data-dcnode-id="2063"><span data-dcnode-id="2084" instrument_node="">The effectiveness of a board also depends on its diligence. However, since board diligence is not directly observable, board meeting frequency is often used as a proxy for board diligence. Board meeting frequency can improve efficiency performance of a firm, since the board has more opportunities to monitor and review management’s performance. Vafeas</span><sup data-dcnode-id="2079"><a data-dcnode-id="2080" href="#Fn21"><span class="u-visually-hidden" data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Footnote </span></span><span data-dcnode-id="2081" instrument_node="">21</span></a></sup><span data-dcnode-id="2078" instrument_node=""> suggests that board meeting frequency is an important activity, because increasing the level of a board meeting frequency can help the firm to improve poor operating performance, indicating a positive correlation between a firm's performance and board diligence. Evans </span><i data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">et al.</span></i><sup data-dcnode-id="2071"><a data-dcnode-id="2072" href="#Fn22"><span class="u-visually-hidden" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Footnote </span></span><span data-dcnode-id="2073" instrument_node="">22</span></a></sup><span data-dcnode-id="2070" instrument_node=""> find that when a firm’s performance declines, the board of directors increases its meeting frequency to try to solve the problems of declining performance. However, Rebeiz and Salameh</span><sup data-dcnode-id="2065"><a data-dcnode-id="2066" href="#Fn23"><span class="u-visually-hidden" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Footnote </span></span><span data-dcnode-id="2067" instrument_node="">23</span></a></sup><span data-dcnode-id="2064" instrument_node=""> argue that the frequency of a board meeting is less important to its quality. Specifically, a large number of meetings in a year suggests that the board is inappropriately playing an operating role instead of an oversight role, given that the function of the board is not to manage the firm, but rather to govern its management. Their empirical evidence suggests that there is no relation between the board meeting frequency and a firm's performance. Thus, we suggest the following hypothesis:</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">H3:</span></h3><ul class="u-list-style-none" data-dcnode-id="2053"><span data-dcnode-id="2060" instrument_node="">
</span><li data-dcnode-id="2055"><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">There is no relation between board meeting frequency and a firm's efficiency performance.</span></p><span data-dcnode-id="2056" instrument_node="">
</span></li><span data-dcnode-id="2054" instrument_node="">
</span></ul><h3 class="c-article__sub-heading" data-dcnode-id="2051" id="Sec6"><span data-dcnode-id="2052" instrument_node="">Audit committee size</span></h3><p data-dcnode-id="2028"><span data-dcnode-id="2050" instrument_node="">Like the argument posited on board size, a larger audit committee size provides stricter monitoring, but also makes it more difficult to reach conclusions. The empirical evidence regarding the relation between an audit committee size and a firm's performance is mixed. For example, Klein</span><sup data-dcnode-id="2045"><a data-dcnode-id="2046" href="#Fn24"><span class="u-visually-hidden" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Footnote </span></span><span data-dcnode-id="2047" instrument_node="">24</span></a></sup><span data-dcnode-id="2044" instrument_node=""> finds that an audit committee size is positively correlated with more extensive monitoring. However, other studies find no relation between an audit committee size and efficiency,</span><sup data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">17</span></sup><span data-dcnode-id="2041" instrument_node=""> profitability,</span><sup data-dcnode-id="2036"><a data-dcnode-id="2037" href="#Fn25"><span class="u-visually-hidden" data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Footnote </span></span><span data-dcnode-id="2038" instrument_node="">25</span></a></sup><span data-dcnode-id="2035" instrument_node=""> and incidences of restatement of financial reports.</span><sup data-dcnode-id="2030"><a data-dcnode-id="2031" href="#Fn26"><span class="u-visually-hidden" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Footnote </span></span><span data-dcnode-id="2032" instrument_node="">26</span></a></sup><span data-dcnode-id="2029" instrument_node=""> The mixed empirical evidence leads to the following hypothesis:</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">H4:</span></h3><ul class="u-list-style-none" data-dcnode-id="2018"><span data-dcnode-id="2025" instrument_node="">
</span><li data-dcnode-id="2020"><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">There is no relation between audit committee size and a firm's efficiency performance.</span></p><span data-dcnode-id="2021" instrument_node="">
</span></li><span data-dcnode-id="2019" instrument_node="">
</span></ul><h3 class="c-article__sub-heading" data-dcnode-id="2016" id="Sec7"><span data-dcnode-id="2017" instrument_node="">Audit committee diligence</span></h3><p data-dcnode-id="1982"><span data-dcnode-id="2015" instrument_node="">Kalbers and Fogarty</span><sup data-dcnode-id="2010"><a data-dcnode-id="2011" href="#Fn27"><span class="u-visually-hidden" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Footnote </span></span><span data-dcnode-id="2012" instrument_node="">27</span></a></sup><span data-dcnode-id="2009" instrument_node=""> suggest that audit committee diligence is associated with its effectiveness. However, audit committee diligence is not directly observable. Menon and Williams</span><sup data-dcnode-id="2004"><a data-dcnode-id="2005" href="#Fn28"><span class="u-visually-hidden" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Footnote </span></span><span data-dcnode-id="2006" instrument_node="">28</span></a></sup><span data-dcnode-id="2003" instrument_node=""> argue that meeting frequency is a signal of diligence, and therefore, we use an audit committee meeting frequency as a proxy for diligence. Prior research</span><sup data-dcnode-id="1998"><a data-dcnode-id="1999" href="#Fn29"><span class="u-visually-hidden" data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Footnote </span></span><span data-dcnode-id="2000" instrument_node="">29</span></a></sup><span data-dcnode-id="1997" instrument_node=""> suggests that an audit committee that meets frequently can improve the financial accounting processes and lead to better performance. Yet, on the contrary, Rebeiz and Salameh</span><sup data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">23</span></sup><span data-dcnode-id="1994" instrument_node=""> argue that the quality of meetings is also important and that increasing the number of meetings doesn’t necessarily enhance a firm’s performance. A survey conducted by KPMG</span><sup data-dcnode-id="1989"><a data-dcnode-id="1990" href="#Fn30"><span class="u-visually-hidden" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Footnote </span></span><span data-dcnode-id="1991" instrument_node="">30</span></a></sup><span data-dcnode-id="1988" instrument_node=""> suggested that audit committees feel that their effectiveness may be hampered, or negatively impacted, by overloaded agendas and activities on compliance. Empirical evidence from Huang </span><i data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">et al.</span></i><sup data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">20</span></sup><span data-dcnode-id="1983" instrument_node=""> suggests that there exists no relation between an audit committee meeting frequency and the efficiency performance of a firm. Collectively, we suggest the following hypothesis:</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">H5:</span></h3><ul class="u-list-style-none" data-dcnode-id="1972"><span data-dcnode-id="1979" instrument_node="">
</span><li data-dcnode-id="1974"><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">There is no relation between audit committee meeting frequency and a firm's efficiency performance.</span></p><span data-dcnode-id="1975" instrument_node="">
</span></li><span data-dcnode-id="1973" instrument_node="">
</span></ul><h3 class="c-article__sub-heading" data-dcnode-id="1970" id="Sec8"><span data-dcnode-id="1971" instrument_node="">Financial expertise on an audit committee</span></h3><p data-dcnode-id="1957"><span data-dcnode-id="1969" instrument_node="">Financial experts are to place at least one member on an audit committee, as ordered by the Public Limited Company Act in Thailand. Financial expertise helps the board by preventing financial reporting problems and clarifying accounting irregularities. The results in Anderson </span><i data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">et al.</span></i><sup data-dcnode-id="1962"><a data-dcnode-id="1963" href="#Fn31"><span class="u-visually-hidden" data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Footnote </span></span><span data-dcnode-id="1964" instrument_node="">31</span></a></sup><span data-dcnode-id="1961" instrument_node=""> suggest that the financial accounting process can be improved by having some financial expertise on the audit committee. In addition, financial expertise enables the audit committee to rely less on management, thereby becoming more independent, when evaluating management’s performance. Kalbers and Fogarty</span><sup data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">27</span></sup><span data-dcnode-id="1958" instrument_node=""> find that having financial expertise improves the effectiveness of an audit committee.</span></p><p data-dcnode-id="1952"><span data-dcnode-id="1956" instrument_node="">Yet Agrawal and Chadha</span><sup data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">26</span></sup><span data-dcnode-id="1953" instrument_node=""> point out, on the contrary, that it is not clear whether having members with expertise on audit committee increases the effectiveness of monitoring capabilities. In addition, the inclusion of members with financial expertise on an audit committee may lead other members to be less watchful. Collectively, the hypothesis is stated as follows:</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">H6:</span></h3><ul class="u-list-style-none" data-dcnode-id="1942"><span data-dcnode-id="1949" instrument_node="">
</span><li data-dcnode-id="1944"><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">There is no relation between the proportion of financial experts on an audit committee and a firm’s efficiency performance.</span></p><span data-dcnode-id="1945" instrument_node="">
</span></li><span data-dcnode-id="1943" instrument_node="">
</span></ul></div></div></section><section data-dcnode-id="1731" data-title="Data and methodology"><div class="c-article-section" data-dcnode-id="1732" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1937" id="Sec9"><span data-dcnode-id="1938" instrument_node="">Data and methodology</span></h2><div class="c-article-section__content" data-dcnode-id="1733" id="Sec9-content"><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">In this section we discuss the corporate governance data of the listed non-life insurance companies in Thailand. We then define the variables used in the DEA methodology to estimate their efficiency scores. These variables include quantities and prices for inputs and outputs. Finally, we discuss the methodology used in analysing the relation between efficiency scores and corporate governance variables.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1933" id="Sec10"><span data-dcnode-id="1934" instrument_node="">Data</span></h3><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Since corporate governance variables are only available to public firms, we utilise the public Thai non-life insurance companies as our sample and obtained our data from the Annual Registration Statement (Form 56-1) from the 2000 to 2007 period. We collect all 18 public insurer data and exclude one professional reinsurer. Also, two companies were removed due to merger and acquisition, reducing our sample size to 138 firm-years.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1929" id="Sec11"><span data-dcnode-id="1930" instrument_node="">DEA variables</span></h3><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">DEA is a non-parametric programming approach to calculate efficiency scores on the condition of the best-practice production function. Production function gives us efficiency score of one on production frontier. A less than one to zero score is not on the production frontier and suggests inefficiency. To calculate efficiency scores, we define input and output quantities and prices as follows.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1925" id="Sec12"><span data-dcnode-id="1926" instrument_node="">Input quantities and prices</span></h3><p data-dcnode-id="1920"><span data-dcnode-id="1924" instrument_node="">We follow the Cummins and Nini</span><sup data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">8</span></sup><span data-dcnode-id="1921" instrument_node=""> methodology in identifying three input variables: labour, equity capital, and materials and business services. The quantity of labour is the sum of the quantity of administrative and agent labours. The price of labour is a weighted average of the price of administrative and agent labours, with weights equal to expenditures on each category of labour divided by total expenditures of labour. The price of administrative labour is expenditures (salary and welfare) divided by the quantity of administrative labour. The quantity of agent labour is expenditures divided by the price of agent labour. The price of agent labour is total expenditures (commissions and brokerages) divided by total quantity of agent labour. We received the quantity of administrative labour of an insurer, total quantity of agent labour, and total commissions and brokerages in each year from the OIC, Thailand. The price of administrative labour (salary and welfare) and agent labour (commissions and brokerages) of an insurer are obtained from the Annual Registration Statements (Form 56-1).</span></p><p data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">The amount of equity capital is obtained from the Annual Registration Statements (Form 56-1). Following Cummins and Nini,</span><sup data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">8</span></sup><span data-dcnode-id="1916" instrument_node=""> we assume that the cost of equity capital is the sum of risk-free rate and the product of beta and market risk premium, and is constant for all insurers for a given year. Risk-free rate is defined as three months Thailand Treasury bill rate of return at the end of the preceding year. The beta is derived from a simple regression between the rate of return on the insurance industry price index and the market rate of return. The expense of equity capital is the product of a firm’s capital and cost of capital. Finally, the quantity of materials and business services is equal to total expenditures minus labour costs, and then divided by its price. The price of materials and business services is the rate of change on the consumer price index (CPI).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1913" id="Sec13"><span data-dcnode-id="1914" instrument_node="">Output quantities and prices</span></h3><p data-dcnode-id="1902"><span data-dcnode-id="1912" instrument_node="">Following Cummins and Weiss,</span><sup data-dcnode-id="1907"><a data-dcnode-id="1908" href="#Fn32"><span class="u-visually-hidden" data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Footnote </span></span><span data-dcnode-id="1909" instrument_node="">32</span></a></sup><span data-dcnode-id="1906" instrument_node=""> we use a value-added approach in identifying insurer outputs. The principal outputs for non-life insurers are risk-pooling and risk-bearing, real financial services relating to insured losses, and financial intermediation. However, Cummins and Nini</span><sup data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">8</span></sup><span data-dcnode-id="1903" instrument_node=""> argue that because total losses are highly correlated with the amount of claims settlement and risk management services, the value of real losses incurred, that is losses incurred divided by CPI, should be a good proxy of risk-pooling and risk-bearing, as well as real financial services. Therefore, the output variables of insurance compose of two variables: losses incurred and intermediation.</span></p><p data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">The price of losses incurred is defined as earned premiums, minus losses incurred, and then divided by losses incurred. We then define the quantity of intermediation output as invested assets, divided by CPI, and the price of intermediation is assumed to be the rate of return on the invested assets of each insurer. Revenues of losses incurred and intermediation are the products of associated quantity and price. The DEA variables are summarised in </span><a data-dcnode-id="1899" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1900" instrument_node="">Table 1</span></a><span data-dcnode-id="1898" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1882" data-test="inline-table" id="table-1"><figure data-dcnode-id="1883"><figcaption class="c-article-table__figcaption" data-dcnode-id="1894"><b data-dcnode-id="1895" data-test="table-caption" id="Tab1"><span data-dcnode-id="1896" instrument_node="">Table 1 DEA variables calculation</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1884"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1885" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/gpp.2010.30/tables/1" rel="nofollow"><span data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1886" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1887" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1888" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1891" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1890" fill-rule="evenodd"></path><span data-dcnode-id="1889" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1880" id="Sec14"><span data-dcnode-id="1881" instrument_node="">Variable definitions</span></h3><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">The corporate governance variables employed to investigate the relation with efficiency scores are defined as follows.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1876" id="Sec15"><span data-dcnode-id="1877" instrument_node="">Dependent variables</span></h3><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Efficiency scores are calculated from the DEA as a proxy for efficiency performance of firms. These efficiency scores include technical, allocative, cost, and revenue efficiency.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1872" id="Sec16"><span data-dcnode-id="1873" instrument_node="">Board of director variables</span></h3><p data-dcnode-id="1864"><span data-dcnode-id="1871" instrument_node="">We use three measures: board size, board independence, and board diligence to proxy for a board of director's effectiveness. We follow Klein</span><sup data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">23</span></sup><span data-dcnode-id="1868" instrument_node=""> and define board size (lnBDsize) as the natural logarithm of the number of directors on the board. A preliminary regression model using the proportion of independent directors on the board generates mixed results. Since the board's decisions depend on a majority of directors’ opinions, independent directors may not facilitate their function if they do not dominate on the board. Therefore, we follow Klein</span><sup data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">23</span></sup><span data-dcnode-id="1865" instrument_node=""> and define board independence (dBDind) as one, if the board is dominated (50 per cent or more) by its independent directors, and zero otherwise. Finally, board meeting frequency (lnBDmeet) is used to proxy for board diligence, and is defined as the natural logarithm of the number of board meetings.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1862" id="Sec17"><span data-dcnode-id="1863" instrument_node="">Audit committee variables</span></h3><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">We use audit committee size, audit committee diligence, and financial expertise on the audit committee in order to proxy for audit committee effectiveness. Audit committee size (lnADsize) is defined as the natural logarithm of the number of audit committee members. Audit committee meeting frequency (lnADmeet) is used to proxy for audit committee diligence and is defined as the natural logarithm of the number of audit committee meetings. The proportion of financial experts on the audit committee (PADexpert) is also included in the model. Following Thai SEC regulations, we define a financial expert as an audit committee member who received a degree of, or had working experience in, accounting or finance.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1858" id="Sec18"><span data-dcnode-id="1859" instrument_node="">Firm-specific control variables</span></h3><p data-dcnode-id="1834"><span data-dcnode-id="1857" instrument_node="">We also incorporate a number of control variables in the regression model, including the divergence between voting rights and cash flow rights, board tenure, board age, board ownership, board compensation, and firm size. Large divergence generally increases controlling shareholders’ incentive as well as ability to expropriate wealth from the firm, representing a major corporate governance risk. Claessens </span><i data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">et al.</span></i><sup data-dcnode-id="1850"><a data-dcnode-id="1851" href="#Fn33"><span class="u-visually-hidden" data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Footnote </span></span><span data-dcnode-id="1852" instrument_node="">33</span></a></sup><span data-dcnode-id="1849" instrument_node=""> find that a large divergence between voting rights and cash flow rights reduces a firm's value. Wang </span><i data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">et al.</span></i><sup data-dcnode-id="1842"><a data-dcnode-id="1843" href="#Fn34"><span class="u-visually-hidden" data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Footnote </span></span><span data-dcnode-id="1844" instrument_node="">34</span></a></sup><span data-dcnode-id="1841" instrument_node=""> find that the divergence negatively impacts a firm’s efficiency. Therefore, following Wang </span><i data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">et al.</span></i><span data-dcnode-id="1838" instrument_node="">,</span><sup data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">33</span></sup><span data-dcnode-id="1835" instrument_node=""> we define divergence as the difference between voting rights (per cent) and cash flow rights (per cent) of the controlling shareholder of the firm, and expect divergence is negatively related to a firm's efficiency.</span></p><p data-dcnode-id="1821"><span data-dcnode-id="1833" instrument_node="">Board tenure (lnTenure) is defined as the natural logarithm of the average number of years the director has served on the board. Board tenure is not limited; however, Huang </span><i data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">et al.</span></i><sup data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">10</span></sup><span data-dcnode-id="1828" instrument_node=""> suggest that directors should receive more knowledge and experience in the business area if they serve longer time within the same company. To its detriment, the higher the average tenure of directors on the board might be, the more harmful it would be to the efficiency performance of a firm, because familiarity between the board members and the managers may prevent them from effectively monitoring those managers. Bacon and Brown</span><sup data-dcnode-id="1823"><a data-dcnode-id="1824" href="#Fn35"><span class="u-visually-hidden" data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Footnote </span></span><span data-dcnode-id="1825" instrument_node="">35</span></a></sup><span data-dcnode-id="1822" instrument_node=""> argue that a director's long standing on the board, or having a relationship with its managers, may be familiar with or trust in those managers. The disadvantages from too much familiarity between these two parties will happen when the directors are too lax about a manager's operations, resulting from too much reliance on the managers’ judgement. Therefore, we conclude that there is no relation between board tenure and a firm's efficiency performance.</span></p><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">We include board age (lnBDage), defined as the natural logarithm of the average age of directors on the board, as a control variable. The higher average age of directors should be beneficial to a firm's performance, because they would have more knowledge and experience in doing business. However, the contrary could be just as true; senior directors may respond to their duties slower than younger directors, possibly because of declining health associated with a higher age, leading to poor performance. Collectively, we hypothesise that there is no relation between board age and a firm's efficiency.</span></p><p data-dcnode-id="1778"><span data-dcnode-id="1818" instrument_node="">The proportion of shares held by the board membership is included in the model and is used to control the directors’ monitoring incentives. Agency theory suggests that board ownership (PBDown) encourages directors to protect their equity in the firm. It follows that a board with higher ownership will engage in more extensive monitoring and thus enhance a firm's performance. Previous research finds that board ownership positively relates to Tobin’s Q,</span><sup data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">14</span></sup><span data-dcnode-id="1815" instrument_node=""> and profitability.</span><sup data-dcnode-id="1810"><a data-dcnode-id="1811" href="#Fn36"><span class="u-visually-hidden" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Footnote </span></span><span data-dcnode-id="1812" instrument_node="">36</span></a></sup><span data-dcnode-id="1809" instrument_node=""> Therefore, we expect board ownership to be positively related to a firm's efficiency. Board compensation could also affect a firm’s performance. Higher board compensation could induce the directors to conduct their duties more efficiently in order to keep their positions, and thus increase the efficiency of a firm. On the other hand, Core </span><i data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">et al.</span></i><sup data-dcnode-id="1802"><a data-dcnode-id="1803" href="#Fn37"><span class="u-visually-hidden" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Footnote </span></span><span data-dcnode-id="1804" instrument_node="">37</span></a></sup><span data-dcnode-id="1801" instrument_node=""> suggest, to the contrary, that a firm compensating its directors more may have greater agency cost and exhibits poor performance. Therefore, we hypothesise that there is no relation between board compensation and a firm's efficiency performance. Note that none of our sampled insurers rewarded their board members with the non-cash compensation. Therefore, we define board compensation (ComB) as the total cash compensation of its directors on the board, divided by total assets. Finally, a firm's size (lnSize) is included in the model, to control the size effect on efficiency. Firm size is defined as the natural logarithm of total assets divided by 1 million. Studies find that firm size positively relates to Tobin’s Q,</span><sup data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">8,14</span></sup><span data-dcnode-id="1798" instrument_node=""> and profitability.</span><sup data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">36</span></sup><span data-dcnode-id="1795" instrument_node=""> However, to the contrary, Cummins </span><i data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">et al.</span></i><sup data-dcnode-id="1788"><a data-dcnode-id="1789" href="#Fn38"><span class="u-visually-hidden" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Footnote </span></span><span data-dcnode-id="1790" instrument_node="">38</span></a></sup><span data-dcnode-id="1787" instrument_node=""> and Hardwick </span><i data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">et al.</span></i><sup data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">17</span></sup><span data-dcnode-id="1782" instrument_node=""> point out that the larger insurers may experience decreasing returns to scale. Therefore, we hypothesise that there is no relation between a firm’s size and its efficiency performance. The definitions and predicted signs of corporate governance variables are summarised in </span><a data-dcnode-id="1780" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1781" instrument_node="">Table 2</span></a><span data-dcnode-id="1779" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1763" data-test="inline-table" id="table-2"><figure data-dcnode-id="1764"><figcaption class="c-article-table__figcaption" data-dcnode-id="1775"><b data-dcnode-id="1776" data-test="table-caption" id="Tab2"><span data-dcnode-id="1777" instrument_node="">Table 2 Corporate governance variable definitions</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1765"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="1766" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/gpp.2010.30/tables/2" rel="nofollow"><span data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1767" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1768" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1769" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1772" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1771" fill-rule="evenodd"></path><span data-dcnode-id="1770" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1761" id="Sec19"><span data-dcnode-id="1762" instrument_node="">Methodology</span></h3><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">To test our hypotheses, we first calculate the efficiency scores on technical, allocative, cost, and revenue efficiency via DEA methodology in the DEAP and DEA SOLVER programmes. Cost efficiency is the product of technical efficiency and allocative efficiency. Technical efficiency measures the ability of each firm's use of optimal proportions, in a given set of inputs, to obtain the maximal outputs. Allocative efficiency measures the ability of each firm's use of its inputs, in optimal proportions, from the given input prices. Revenue efficiency measures the ability of each firm's use of optimal outputs to obtain the maximal revenue. All four efficiency scores vary between zero and one, and full efficiency is a score of one.</span></p><p data-dcnode-id="1745"><span data-dcnode-id="1758" instrument_node="">We next use the efficiency scores as dependent variables and examine the relation between the efficiency scores and corporate governance. Because the values of these efficiency scores are generated from a DEA procedure, they could suffer from serial correlation such that the estimates will be inconsistent and biased. Efron and Tibshirani</span><sup data-dcnode-id="1753"><a data-dcnode-id="1754" href="#Fn39"><span class="u-visually-hidden" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Footnote </span></span><span data-dcnode-id="1755" instrument_node="">39</span></a></sup><span data-dcnode-id="1752" instrument_node=""> and Simar and Wilson</span><sup data-dcnode-id="1747"><a data-dcnode-id="1748" href="#Fn40"><span class="u-visually-hidden" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Footnote </span></span><span data-dcnode-id="1749" instrument_node="">40</span></a></sup><span data-dcnode-id="1746" instrument_node=""> propose to use a bootstrap procedure to overcome this problem and improve statistical efficiency. We therefore employ a STATA programme and conduct truncated bootstrapped regression models in the second stage. The regression is specified as follows. Significantly positive (negative) coefficient estimates for corporate governance variables suggest that a board with certain characteristics increases (decreases) efficiency. </span></p><div class="c-article-equation" data-dcnode-id="1742" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="1743"><img alt="" class="u-display-block" data-dcnode-id="1744" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/full/springer-static/image/art%253A10.1057/gpp.2010.30/MediaObjects/41288_2010_Article_BFgpp201030_Equ1_HTML.gif&amp;raw"></div></div><p data-dcnode-id="1734"><span data-dcnode-id="1741" instrument_node=""> where </span><i data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">i</span></i><span data-dcnode-id="1738" instrument_node="">=company index, </span><i data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">t</span></i><span data-dcnode-id="1735" instrument_node="">=year index, and EFS includes technical, allocative, cost, and revenue efficiency scores.</span></p></div></div></section><section data-dcnode-id="1536" data-title="Empirical results"><div class="c-article-section" data-dcnode-id="1537" id="Sec20-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1729" id="Sec20"><span data-dcnode-id="1730" instrument_node="">Empirical results</span></h2><div class="c-article-section__content" data-dcnode-id="1538" id="Sec20-content"><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">In this section we first present the summary statistics on DEA variables and then discuss the results of the efficiency analysis. We then show the regression results for technical, allocative, cost, and revenue efficiency.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1725" id="Sec21"><span data-dcnode-id="1726" instrument_node="">Summary statistics</span></h3><p data-dcnode-id="1717"><span data-dcnode-id="1724" instrument_node="">We report Pearson Correlations among DEA variables in </span><a data-dcnode-id="1722" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="1723" instrument_node="">Table 3</span></a><span data-dcnode-id="1721" instrument_node="">. The averages of input quantities, input prices, and expenses of the non-life insurance industry from periods 2000 to 2007 are reported in </span><a data-dcnode-id="1719" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="1720" instrument_node="">Table 4</span></a><span data-dcnode-id="1718" instrument_node="">. The average quantity and price of administrative and agent labours (equity capital, and material and business services) are 1,638 persons (1,788, and 827 million baht), and 0.25 million baht (3.79, and 2.46 per cent), respectively. The average expenses of administrative and agent labours (equity capital, and material and business services) is 348.42 million baht (68.87, and 21.85 million baht).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1702" data-test="inline-table" id="table-3"><figure data-dcnode-id="1703"><figcaption class="c-article-table__figcaption" data-dcnode-id="1714"><b data-dcnode-id="1715" data-test="table-caption" id="Tab3"><span data-dcnode-id="1716" instrument_node="">Table 3 Pearson correlation coefficients (p-value) for input and output variables</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1704"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="1705" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1057/gpp.2010.30/tables/3" rel="nofollow"><span data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1706" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1707" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1708" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1711" instrument_node="">
