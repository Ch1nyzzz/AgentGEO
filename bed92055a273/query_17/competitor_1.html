</span></div></div></section><section data-dcnode-id="3831" data-title="Discussion"><div class="c-article-section" data-dcnode-id="3832" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4237" id="Sec14"><span data-dcnode-id="4238" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3833" id="Sec14-content"><h3 class="c-article__sub-heading" data-dcnode-id="4235" id="Sec15"><span data-dcnode-id="4236" instrument_node="">Main findings and contributions</span></h3><p data-dcnode-id="4224"><span data-dcnode-id="4234" instrument_node="">The main findings are summarized in Table </span><a data-dcnode-id="4232" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab6"><span data-dcnode-id="4233" instrument_node="">6</span></a><span data-dcnode-id="4231" instrument_node="">. The analysis revealed a zero overall effect of celebrity endorsements on consumers’ responses. Yet there were strong effects on some dependent measures and under some conditions. The main contribution of our study, therefore, lies in understanding the possible causes of this variability rather than focusing on a summary effect (Thompson and Sharp </span><a aria-label="Reference 1999" data-dcnode-id="4229" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d192725775e4164" title=""><span data-dcnode-id="4230" instrument_node="">1999</span></a><span data-dcnode-id="4228" instrument_node="">). This fits nicely with the notion of Lipsey and Wilson (</span><a aria-label="Reference 2001" data-dcnode-id="4226" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d192725775e4167" title=""><span data-dcnode-id="4227" instrument_node="">2001</span></a><span data-dcnode-id="4225" instrument_node="">) saying that “contemporary meta-analysis is increasingly attending to the variance of effect size distributions rather than the means of those distributions. That is, the primary question of interest often has to do with identifying the sources of differences in study findings” (p. 8f).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4209" data-test="inline-table" id="table-6"><figure data-dcnode-id="4210"><figcaption class="c-article-table__figcaption" data-dcnode-id="4221"><b data-dcnode-id="4222" data-test="table-caption" id="Tab6"><span data-dcnode-id="4223" instrument_node="">Table 6 Key findings from the analysis</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4211"><a aria-label="Full size table 6" class="c-article__pill-button" data-dcnode-id="4212" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/tables/6" rel="nofollow"><span data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4213" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4214" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4215" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4218" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4217" fill-rule="evenodd"></path><span data-dcnode-id="4216" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4208" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4206" id="FPar17"><span data-dcnode-id="4207" instrument_node="">Different dependent measures</span></h3><span data-dcnode-id="4205" instrument_node="">
</span><p data-dcnode-id="4197"><span data-dcnode-id="4204" instrument_node="">Surprisingly, almost no average effects were observed for standard measures, such as awareness, attitude toward the ad, or purchase intention. A significant and positive average effect size emerged only for attitude toward the endorsed object. Furthermore, this was the case only when the respective comparison group was not endorsed. This is consistent with the meta-regression results assessing the influence of comparison group’s endorsement type on attitude toward the advertised object (Table </span><a data-dcnode-id="4202" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="4203" instrument_node="">3</span></a><span data-dcnode-id="4201" instrument_node="">). Celebrity endorsements positively affected consumers’ attitudes compared to no endorsement, and this effect was significantly lower and negative when celebrity endorsements were compared to an unknown model or athlete, a quality seal or award, a government employee, or an endorser brand. Hence, several low or zero average effect sizes were at least partially due to being based on comparison groups producing negative effect sizes and on comparison groups producing positive effect sizes. As a result, there were small or no effects on average. Interestingly, although effect sizes lowered significantly in the aforementioned cases (unknown model or athlete, quality seal or award, government employee, endorser brand), celebrity endorsements performed worse only when compared to a quality seal or award, or an endorser brand. In these cases, the effect sizes were negative and significant themselves rather than just significantly lower (Viechtbauer </span><a aria-label="Reference 2010" data-dcnode-id="4199" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d192725775e4412" title=""><span data-dcnode-id="4200" instrument_node="">2010</span></a><span data-dcnode-id="4198" instrument_node="">).</span></p><span data-dcnode-id="4196" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4194" id="FPar18"><span data-dcnode-id="4195" instrument_node="">Moderators</span></h3><span data-dcnode-id="4193" instrument_node="">
</span><p data-dcnode-id="4170"><span data-dcnode-id="4192" instrument_node="">We integrated several endorser variables and the properties of the endorsed object. Overall, the moderators appeared very effective in explaining the between-study heterogeneity accounting for 95–100% of the variability with respect to three key dependent variables (attitude toward the endorsed object, attitude toward the ad, behavioral intention). Moreover, all moderated effects came into existence when controlling for the other moderators (Field </span><a aria-label="Reference 2013" data-dcnode-id="4190" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d192725775e4423" title=""><span data-dcnode-id="4191" instrument_node="">2013</span></a><span data-dcnode-id="4189" instrument_node="">). For the endorser variables, the impact of the endorsement frequency on effect size was investigated. Contrary to our assumption, there was no effect. This result contradicts conventional thinking that endorsements’ effectiveness is enhanced with increasing repetitions (*Till et al. </span><a aria-label="Reference 2008" data-dcnode-id="4187" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d192725775e4426" title=""><span data-dcnode-id="4188" instrument_node="">2008</span></a><span data-dcnode-id="4186" instrument_node="">). Although endorsement effects have been found at single exposures (Ambroise et al. </span><a aria-label="Reference 2014" data-dcnode-id="4184" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d192725775e4429" title=""><span data-dcnode-id="4185" instrument_node="">2014</span></a><span data-dcnode-id="4183" instrument_node="">), advertisements are assumed to be learned more thoroughly when exposed multiple times (wearin), as long as consumers are not bored or annoyed by too much repetition (wearout; Campbell and Keller </span><a aria-label="Reference 2003" data-dcnode-id="4181" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d192725775e4432" title=""><span data-dcnode-id="4182" instrument_node="">2003</span></a><span data-dcnode-id="4180" instrument_node="">). Wearout seems rather unlikely in this study, as the maximum number of exposures included in the specific analysis was five, and as “five pairings is not so many as to cause subject boredom but is likely to lead to conditioning effects” (*Till et al. </span><a aria-label="Reference 2008" data-dcnode-id="4178" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d192725775e4435" title=""><span data-dcnode-id="4179" instrument_node="">2008</span></a><span data-dcnode-id="4177" instrument_node="">). With the maximum number of five repetitions, the amount of variance needed to produce an effect of repetition was most likely too small. For instance, Stuart et al. (</span><a aria-label="Reference 1987" data-dcnode-id="4175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d192725775e4439" title=""><span data-dcnode-id="4176" instrument_node="">1987</span></a><span data-dcnode-id="4174" instrument_node="">) included up to 20 repetitions in their conditioning study to test for frequency effects. In addition, it was impossible to control for exposure time since most studies failed to report it. Hence, some studies might have exposed their participants once but for a rather long time, while others may have exposed their participants multiple times in short durations. Both manipulations, repetition and duration, may have resulted in similar effects. Given these limitations, it seems premature to reject the frequency hypothesis. Instead, future studies should account for exposure time, too. These studies should also look for a possible suppression effect (Koch and Zerback </span><a aria-label="Reference 2013" data-dcnode-id="4172" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d192725775e4442" title=""><span data-dcnode-id="4173" instrument_node="">2013</span></a><span data-dcnode-id="4171" instrument_node="">). Specifically, repeated celebrity endorsements may lead to enhanced advertising outcomes while at the same increasing the likelihood of evoking reactance due to too much (forced) exposure. As result, increased reactance may reflect negatively on advertising outcomes and suppress the positive effect of endorsement repetition. That is, the effect of repetition on advertising outcomes may be positive and negative (mediated through reactance) at the same time leading to a zero total effect.</span></p><span data-dcnode-id="4169" instrument_node="">
</span><p data-dcnode-id="4161"><span data-dcnode-id="4168" instrument_node="">For endorser type, actors performed best followed by athletes and TV hosts, which were followed by models and musicians. The results were quite similar across the three dependent variables. As initially outlined, the enhanced effects of actors may best be explained by consumers being exposed to them audiovisually as well as multiple times over the years. As a result, consumers are likely to develop stronger consumer–celebrity relationships (Klimmt et al. </span><a aria-label="Reference 2006" data-dcnode-id="4166" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d192725775e4448" title=""><span data-dcnode-id="4167" instrument_node="">2006</span></a><span data-dcnode-id="4165" instrument_node="">). This is particularly true with a TV series (Hoffner and Buchanan </span><a aria-label="Reference 2005" data-dcnode-id="4163" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d192725775e4451" title=""><span data-dcnode-id="4164" instrument_node="">2005</span></a><span data-dcnode-id="4162" instrument_node="">). In addition, actors may generally be more famous, at least compared to models, which explains the comparatively weak effects of the latter.</span></p><span data-dcnode-id="4160" instrument_node="">
</span><p data-dcnode-id="4140"><span data-dcnode-id="4159" instrument_node="">Relatively strong effects appeared regarding the endorser’s sex. Male celebrities evoked substantially stronger effects compared to female celebrities. We attribute the stronger effects to the male spokespersons’ greater prestige and expertise resulting in stronger credibility (Kenton </span><a aria-label="Reference 1989" data-dcnode-id="4157" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d192725775e4457" title=""><span data-dcnode-id="4158" instrument_node="">1989</span></a><span data-dcnode-id="4156" instrument_node="">; Whittaker </span><a aria-label="Reference 1965" data-dcnode-id="4154" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d192725775e4460" title=""><span data-dcnode-id="4155" instrument_node="">1965</span></a><span data-dcnode-id="4153" instrument_node="">). Compared to all previous research (see Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="4151" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e4463" title=""><span data-dcnode-id="4152" instrument_node="">1999</span></a><span data-dcnode-id="4150" instrument_node="">), we are now able to provide practitioners with a clear effect direction. In addition to the sex differences, this study is the first to confirm the product match-up hypothesis on a meta-analytic level. Congruent endorsers produce significantly greater effect sizes compared to incongruent ones. Interestingly, the hypothesis could only be confirmed with regard to attitude toward the endorsed object and behavioral intention. Both refer to evaluations or behavior directly related to the endorsed object. In contrast, no effect was found for attitude toward the ad. Hence, celebrity–object match matters when it comes to attitudes toward the advertised object and purchasing the object. However, celebrity–object match does not necessarily matter when it comes to attitudes toward the ad. This is due to the fact that an object does not necessarily equal the style or imagery of its ad. Both may be completely different. Just think about a company intending to change the image of its brand. Employed ads will likely be quite different from the existing brand image in order to change the image. Hence, a match with an endorsed object is evidently of less importance when evaluating the ad because object and ad do not necessarily equal. In addition, marketers and researchers usually test the match with an endorsed object and not the match with the advertisement itself (e.g., *Chen et al. </span><a aria-label="Reference 2012" data-dcnode-id="4148" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d192725775e4466" title=""><span data-dcnode-id="4149" instrument_node="">2012</span></a><span data-dcnode-id="4147" instrument_node="">; Kamins </span><a aria-label="Reference 1990" data-dcnode-id="4145" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d192725775e4469" title=""><span data-dcnode-id="4146" instrument_node="">1990</span></a><span data-dcnode-id="4144" instrument_node="">; *Kamins and Gupta </span><a aria-label="Reference 1994" data-dcnode-id="4142" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d192725775e4473" title=""><span data-dcnode-id="4143" instrument_node="">1994</span></a><span data-dcnode-id="4141" instrument_node="">). Effects may arise when explicitly manipulating the match with an ad.</span></p><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4125"><span data-dcnode-id="4138" instrument_node="">For endorsement explicitness, strong effects appeared, yet opposite the direction we expected. Celebrities implicitly endorsing an object enhanced consumers’ attitudes and behavioral intentions substantially more compared to explicit endorsements. The Persuasion Knowledge Model presents a possible explanation (Friestad and Wright </span><a aria-label="Reference 1994" data-dcnode-id="4136" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d192725775e4479" title=""><span data-dcnode-id="4137" instrument_node="">1994</span></a><span data-dcnode-id="4135" instrument_node="">). According to this model, consumers develop persuasion knowledge throughout a lifetime of being exposed to persuasive communication. This knowledge is likely to be activated when consumers recognize a persuasive attempt. For instance, consumers tend to recognize persuasive attempts when messages “create the perception that the source was trying ‘too hard’ to sell his case” (Smith </span><a aria-label="Reference 1977" data-dcnode-id="4133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d192725775e4482" title=""><span data-dcnode-id="4134" instrument_node="">1977</span></a><span data-dcnode-id="4132" instrument_node="">, p. 198). Explicit endorsements then act as some kind of forewarning of the persuasive intent of the endorser. Consumers are more motivated to counterargue the endorsement in order to reassert their freedom (Petty and Cacioppo </span><a aria-label="Reference 1979" data-dcnode-id="4130" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d192725775e4485" title=""><span data-dcnode-id="4131" instrument_node="">1979</span></a><span data-dcnode-id="4129" instrument_node="">). This is particularly likely if the endorsed object is of high relevance (Petty and Cacioppo </span><a aria-label="Reference 1979" data-dcnode-id="4127" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d192725775e4488" title=""><span data-dcnode-id="4128" instrument_node="">1979</span></a><span data-dcnode-id="4126" instrument_node="">).</span></p><span data-dcnode-id="4124" instrument_node="">
</span><p data-dcnode-id="4116"><span data-dcnode-id="4123" instrument_node="">Another explanation for this counterintuitive finding may be the fact that implicit endorsement are mostly perceived as merely conveying a celebrity’s personal object experience (e.g., by using a brand), whereas explicit endorsements are perceived as conveying a clear recommendation to buy or use an object. As a result, implicit endorsements try to persuade their audience to a lesser extent compared to explicit ones. According to Pornpitakpan (</span><a aria-label="Reference 2004" data-dcnode-id="4121" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d192725775e4495" title=""><span data-dcnode-id="4122" instrument_node="">2004</span></a><span data-dcnode-id="4120" instrument_node="">), this should enhance endorsers’ trustworthiness, leading to stronger effects (see Pornpitakpan </span><a aria-label="Reference 2004" data-dcnode-id="4118" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d192725775e4498" title=""><span data-dcnode-id="4119" instrument_node="">2004</span></a><span data-dcnode-id="4117" instrument_node="">). Future studies should test whether implicit endorsers are perceived as more trustworthy and less likely to activate persuasion knowledge.</span></p><span data-dcnode-id="4115" instrument_node="">
</span><p data-dcnode-id="4110"><span data-dcnode-id="4114" instrument_node="">In terms of familiarity, celebrity endorsements appeared more effective in the case of unfamiliar objects when compared to familiar ones. This result was expected and is in line with past research. Given that consumers already possess a rich network of associations representing an object, attitudes and behavior appear more difficult to change (Cacioppo et al. </span><a aria-label="Reference 1992" data-dcnode-id="4112" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d192725775e4504" title=""><span data-dcnode-id="4113" instrument_node="">1992</span></a><span data-dcnode-id="4111" instrument_node="">). That is not to say that outcomes related to familiar objects cannot be influenced at all. The influence is just weaker or more difficult to accomplish.</span></p><span data-dcnode-id="4109" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4107" id="Sec16"><span data-dcnode-id="4108" instrument_node="">Theoretical and managerial implications</span></h3><p data-dcnode-id="4096"><span data-dcnode-id="4106" instrument_node="">The hierarchy of advertising effects model by Lavidge and Steiner (</span><a aria-label="Reference 1961" data-dcnode-id="4104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d192725775e4516" title=""><span data-dcnode-id="4105" instrument_node="">1961</span></a><span data-dcnode-id="4103" instrument_node="">), which was adapted from Grewal et al. (</span><a aria-label="Reference 1997" data-dcnode-id="4101" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d192725775e4519" title=""><span data-dcnode-id="4102" instrument_node="">1997</span></a><span data-dcnode-id="4100" instrument_node="">), provided a fruitful theoretical framework. It enabled a systematic organization of all relevant advertising outcomes as well as the integration of relevant moderators (Lipsey and Wilson </span><a aria-label="Reference 2001" data-dcnode-id="4098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d192725775e4522" title=""><span data-dcnode-id="4099" instrument_node="">2001</span></a><span data-dcnode-id="4097" instrument_node="">). In addition, readers can grasp at a glance which relationships have been tested and which relationships have been impossible to test, although they might be theoretically relevant. Future studies can precisely look at these relationships. Furthermore, the model—being a broad overarching framework—enabled the integration of various sub-theories to explain specific effects.</span></p><p data-dcnode-id="4091"><span data-dcnode-id="4095" instrument_node="">The match-up hypothesis could be supported on a meta-analytic level. The proposed congruency effect can be regarded as quite robust. However, it was not possible to test which of the theoretical explanations is more accurate. In fact, both may be accurate: a matching celebrity being an information source of adaptive significance (Social Adaptation Theory) is also more likely to be easily integrated with existing brand schemas (Schema Theory). Instead of continuing to prove the effect, future research should rather look for its underlying psychological mechanism as well as boundary conditions. It still remains difficult to know which dimensions should be matched between an endorsed object and a celebrity (Amos et al. </span><a aria-label="Reference 2008" data-dcnode-id="4093" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d192725775e4528" title=""><span data-dcnode-id="4094" instrument_node="">2008</span></a><span data-dcnode-id="4092" instrument_node="">).</span></p><p data-dcnode-id="4077"><span data-dcnode-id="4090" instrument_node="">The meta-analysis was also able to support the familiarity proposition. It suggests that attitudes toward unfamiliar objects are easier to change when compared to familiar objects (Cacioppo et al. </span><a aria-label="Reference 1992" data-dcnode-id="4088" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d192725775e4534" title=""><span data-dcnode-id="4089" instrument_node="">1992</span></a><span data-dcnode-id="4087" instrument_node="">). That is due to the fact that attitudes are based on attitude-relevant information. If relatively little attitude-relevant information is available in memory, attitudes are primarily based on the information provided by the celebrity endorsement, leading to stronger effects. By contrast, if consumers have access to a relatively large body of attitude-relevant information in memory, attitudes are based on the endorsement </span><i data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">and</span></i><span data-dcnode-id="4084" instrument_node=""> information in memory. As a result, endorsement effects are comparably smaller (Cacioppo et al. </span><a aria-label="Reference 1992" data-dcnode-id="4082" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d192725775e4540" title=""><span data-dcnode-id="4083" instrument_node="">1992</span></a><span data-dcnode-id="4081" instrument_node="">). Since ads typically feature familiar objects, future research is advised to look for factors boosting celebrity endorsement effects in the case of high familiarity (Kent and Allen </span><a aria-label="Reference 1994" data-dcnode-id="4079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d192725775e4543" title=""><span data-dcnode-id="4080" instrument_node="">1994</span></a><span data-dcnode-id="4078" instrument_node="">). Endorsement repetition or a particular strong consumer–celebrity relationship may present such factors.</span></p><p data-dcnode-id="4072"><span data-dcnode-id="4076" instrument_node="">In terms of managerial implications, marketers should consider the following findings when choosing their endorser. The findings are accompanied by an assessment of their impact magnitude. Magnitude was assessed according to an effect size investigation from 300 meta-analyses (d&nbsp;&lt;&nbsp;.30: small: d&nbsp;=&nbsp;.50: medium; d&nbsp;&gt;&nbsp;.67: large; Lipsey and Wilson </span><a aria-label="Reference 2001" data-dcnode-id="4074" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d192725775e4549" title=""><span data-dcnode-id="4075" instrument_node="">2001</span></a><span data-dcnode-id="4073" instrument_node="">), providing marketers with guidance when deciding on which of the findings to focus more.</span></p><ol class="u-list-style-none" data-dcnode-id="4016"><span data-dcnode-id="4071" instrument_node="">
</span><li data-dcnode-id="4063"><span data-dcnode-id="4070" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">1.</span></span><span data-dcnode-id="4067" instrument_node="">
</span><p data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">Matching endorsers elicit more favorable attitudes and stronger behavioral intentions when compared to non-matching ones (impact magnitude: medium).</span></p><span data-dcnode-id="4064" instrument_node="">
</span></li><span data-dcnode-id="4062" instrument_node="">
</span><li data-dcnode-id="4054"><span data-dcnode-id="4061" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">2.</span></span><span data-dcnode-id="4058" instrument_node="">
</span><p data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">Male endorsers elicit more favorable attitudes and stronger behavioral intentions when compared to female ones (impact magnitude: medium to large).</span></p><span data-dcnode-id="4055" instrument_node="">
</span></li><span data-dcnode-id="4053" instrument_node="">
</span><li data-dcnode-id="4045"><span data-dcnode-id="4052" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">3.</span></span><span data-dcnode-id="4049" instrument_node="">
</span><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Implicit endorsements elicit more favorable attitudes and stronger behavioral intentions when compared to explicit ones (impact magnitude: medium to large).</span></p><span data-dcnode-id="4046" instrument_node="">
</span></li><span data-dcnode-id="4044" instrument_node="">
</span><li data-dcnode-id="4036"><span data-dcnode-id="4043" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">4.</span></span><span data-dcnode-id="4040" instrument_node="">
</span><p data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">Actors elicit more favorable attitudes when compared to models, musicians, and TV hosts (impact magnitude: small to medium).</span></p><span data-dcnode-id="4037" instrument_node="">
</span></li><span data-dcnode-id="4035" instrument_node="">
</span><li data-dcnode-id="4027"><span data-dcnode-id="4034" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">5.</span></span><span data-dcnode-id="4031" instrument_node="">
</span><p data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Endorsements of unfamiliar objects elicit more favorable attitudes when compared to endorsements of familiar objects (impact magnitude: small).</span></p><span data-dcnode-id="4028" instrument_node="">
</span></li><span data-dcnode-id="4026" instrument_node="">
</span><li data-dcnode-id="4018"><span data-dcnode-id="4025" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">6.</span></span><span data-dcnode-id="4022" instrument_node="">
</span><p data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">Celebrity endorsements elicit less favorable attitudes when compared to endorsements by quality seals, awards, and endorser brands (impact magnitude: medium).</span></p><span data-dcnode-id="4019" instrument_node="">
</span></li><span data-dcnode-id="4017" instrument_node="">
</span></ol><span data-dcnode-id="4015" instrument_node="">
</span><p data-dcnode-id="4010"><span data-dcnode-id="4014" instrument_node="">In general, celebrity endorsements are undoubtedly an effective way of marketing communication. They enhance attitudes and reinforce behavioral intentions, provided marketers choose the right endorser. Marketers have to make these choices carefully, as celebrity endorsements can evoke strong negative outcomes, too. Incongruent male or female celebrities may very likely result in negative effects when endorsing an object explicitly. Marketers are, therefore, advised to back these decisions with market research (Agrawal and Kamakura </span><a aria-label="Reference 1995" data-dcnode-id="4012" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d192725775e4626" title=""><span data-dcnode-id="4013" instrument_node="">1995</span></a><span data-dcnode-id="4011" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4008" id="Sec17"><span data-dcnode-id="4009" instrument_node="">Limitations and agenda for future research</span></h3><p data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">A great advantage of meta-analysis lies in identifying significant gaps in the literature. Such gaps become visible when the meta-analysis cannot report findings on a particular dependent variable or topic. In addition, a meta-analysis may leave blind spots because theoretically relevant moderators cannot be analyzed, as too few studies have investigated these. We discuss these gaps in the following sections.</span></p><span data-dcnode-id="4005" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4003" id="FPar19"><span data-dcnode-id="4004" instrument_node="">Understudied dependent variables</span></h3><span data-dcnode-id="4002" instrument_node="">
</span><p data-dcnode-id="3988"><span data-dcnode-id="4001" instrument_node="">The most important understudied variables pertain to recognition and recall, meaning transfer, and behavioral measures in general. Beginning with recognition and recall, only about ten effect sizes could be obtained from the literature regarding each measure. This deficit is particularly relevant as marketers are frequently interested in favorable object recognition and recall employing celebrity endorsements (Erfgen et al. </span><a aria-label="Reference 2015" data-dcnode-id="3999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d192725775e4644" title=""><span data-dcnode-id="4000" instrument_node="">2015</span></a><span data-dcnode-id="3998" instrument_node="">). Moreover, the revealed average effect was close to zero (cf. awareness Table </span><a data-dcnode-id="3996" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3997" instrument_node="">2</span></a><span data-dcnode-id="3995" instrument_node="">). This suggests no impact or a moderated impact of celebrity endorsements. Having robust knowledge of one or the other is vital to marketers. “A common concern is that consumers will focus their attention on the celebrity and fail to notice the brand being promoted” (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="3993" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e4650" title=""><span data-dcnode-id="3994" instrument_node="">1999</span></a><span data-dcnode-id="3992" instrument_node="">, p. 296). Researchers have recently started to investigate this concern, concluding that celebrities might indeed overshadow an endorsed object (Erfgen et al. </span><a aria-label="Reference 2015" data-dcnode-id="3990" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d192725775e4653" title=""><span data-dcnode-id="3991" instrument_node="">2015</span></a><span data-dcnode-id="3989" instrument_node="">).</span></p><span data-dcnode-id="3987" instrument_node="">
</span><p data-dcnode-id="3970"><span data-dcnode-id="3986" instrument_node="">A similar pattern appears when looking at meaning transfer. Marketers frequently seek to transfer celebrity meaning to a brand to build or reposition its image (Keller </span><a aria-label="Reference 2012" data-dcnode-id="3984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d192725775e4659" title=""><span data-dcnode-id="3985" instrument_node="">2012</span></a><span data-dcnode-id="3983" instrument_node="">). However, research investigating celebrity meaning transfer is relatively scarce. It only started a few years ago, resulting in a limited number of effect sizes that could be obtained (k&nbsp;=&nbsp;9; Galli and Gorn </span><a aria-label="Reference 2011" data-dcnode-id="3981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d192725775e4662" title=""><span data-dcnode-id="3982" instrument_node="">2011</span></a><span data-dcnode-id="3980" instrument_node="">). Though the existing studies suggest strong transfer effects, further research is needed, also specifying boundary conditions (e.g., brand familiarity, *Miller and Allen </span><a aria-label="Reference 2012" data-dcnode-id="3978" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d192725775e4665" title=""><span data-dcnode-id="3979" instrument_node="">2012</span></a><span data-dcnode-id="3977" instrument_node="">). Finally, researchers should dedicate more resources to measuring behavior. As seen in Table </span><a data-dcnode-id="3975" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3976" instrument_node="">2</span></a><span data-dcnode-id="3974" instrument_node="">, scholars only measured behavioral intentions. While closely related, behavioral intentions do not fully explain true behavior (Kim and Hunter </span><a aria-label="Reference 1993" data-dcnode-id="3972" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d192725775e4671" title=""><span data-dcnode-id="3973" instrument_node="">1993</span></a><span data-dcnode-id="3971" instrument_node="">).</span></p><span data-dcnode-id="3969" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3967" id="FPar20"><span data-dcnode-id="3968" instrument_node="">Understudied moderators</span></h3><span data-dcnode-id="3966" instrument_node="">
</span><p data-dcnode-id="3946"><span data-dcnode-id="3965" instrument_node="">For the theoretically relevant moderators, our study could not integrate several moderators due to missing coding information, no variability within the moderators, or simply a lack of studies. The advertising vehicles in which the celebrity endorsements were integrated present such a factor (cf. Table </span><a data-dcnode-id="3963" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3964" instrument_node="">1</span></a><span data-dcnode-id="3962" instrument_node="">). Almost all the studies employed print advertisements or similar stimuli. In contrast, very few studies looked at radio, television, or online advertising, rendering moderator analysis impossible (e.g., *Myrick and Evans </span><a aria-label="Reference 2014" data-dcnode-id="3960" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d192725775e4685" title=""><span data-dcnode-id="3961" instrument_node="">2014</span></a><span data-dcnode-id="3959" instrument_node="">; *Toncar et al. </span><a aria-label="Reference 2007" data-dcnode-id="3957" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d192725775e4688" title=""><span data-dcnode-id="3958" instrument_node="">2007</span></a><span data-dcnode-id="3956" instrument_node="">; *Wei and Lu </span><a aria-label="Reference 2013" data-dcnode-id="3954" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d192725775e4691" title=""><span data-dcnode-id="3955" instrument_node="">2013</span></a><span data-dcnode-id="3953" instrument_node="">). This seems even more serious considering that more than 60% of global advertising can be attributed to television and the Internet (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="3951" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e4694" title=""><span data-dcnode-id="3952" instrument_node="">2016</span></a><span data-dcnode-id="3950" instrument_node="">). Also, exposure time could not be included. Increasing exposure time enhances processing capacity, which may lead to stronger and more durable effects (Petty and Cacioppo </span><a aria-label="Reference 1986" data-dcnode-id="3948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d192725775e4698" title=""><span data-dcnode-id="3949" instrument_node="">1986</span></a><span data-dcnode-id="3947" instrument_node="">). Similarly, few studies provided information about the endorser’s valence (positive vs. negative), trustworthiness, attractiveness, or expertise.</span></p><span data-dcnode-id="3945" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3943" id="FPar21"><span data-dcnode-id="3944" instrument_node="">Longer-term effects</span></h3><span data-dcnode-id="3942" instrument_node="">
</span><p data-dcnode-id="3928"><span data-dcnode-id="3941" instrument_node="">Thus far, almost all studies measured effects immediately after exposure. This is particularly problematic as advertisers are mostly interested in longer-term effects (Eisend and Langner </span><a aria-label="Reference 2010" data-dcnode-id="3939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d192725775e4709" title=""><span data-dcnode-id="3940" instrument_node="">2010</span></a><span data-dcnode-id="3938" instrument_node="">). In addition, various advertising studies have shown that the effectiveness of advertisements varies across time (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="3936" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e4712" title=""><span data-dcnode-id="3937" instrument_node="">2016</span></a><span data-dcnode-id="3935" instrument_node="">). For instance, Eisend and Langner (</span><a aria-label="Reference 2010" data-dcnode-id="3933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d192725775e4715" title=""><span data-dcnode-id="3934" instrument_node="">2010</span></a><span data-dcnode-id="3932" instrument_node="">) were able to show that a celebrity’s attractiveness exerts its main impact right after exposure while expertise exhibits its main influence in a delayed situation. They conclude that “effects on attitude toward the brand can considerably differ depending on whether the measurement occurs immediately after ad exposure or with a delay” and that studies would strongly “benefit from including delayed measures in ad testing, particularly when they deal with celebrity endorsers in the advertisements” (Eisend and Langner </span><a aria-label="Reference 2010" data-dcnode-id="3930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d192725775e4718" title=""><span data-dcnode-id="3931" instrument_node="">2010</span></a><span data-dcnode-id="3929" instrument_node="">, p. 543).</span></p><span data-dcnode-id="3927" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3925" id="FPar22"><span data-dcnode-id="3926" instrument_node="">Underlying psychological processes</span></h3><span data-dcnode-id="3924" instrument_node="">
</span><p data-dcnode-id="3895"><span data-dcnode-id="3923" instrument_node="">In addition, hardly any study looked at the underlying psychological mechanisms of celebrity persuasion (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="3921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e4730" title=""><span data-dcnode-id="3922" instrument_node="">2016</span></a><span data-dcnode-id="3920" instrument_node="">). Instead, research was mostly focused on showing main effects or on looking for possible moderators. As a result, theoretical depth is rather low (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="3918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e4733" title=""><span data-dcnode-id="3919" instrument_node="">2016</span></a><span data-dcnode-id="3917" instrument_node="">). For instance, there is no clear knowledge about whether endorsement effects vary depending on high or low effort processing (Petty and Cacioppo </span><a aria-label="Reference 1986" data-dcnode-id="3915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d192725775e4736" title=""><span data-dcnode-id="3916" instrument_node="">1986</span></a><span data-dcnode-id="3914" instrument_node="">). The few studies that integrated processing style suggested stronger effects in low effort processing (*Dong </span><a aria-label="Reference 2015" data-dcnode-id="3912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d192725775e4739" title=""><span data-dcnode-id="3913" instrument_node="">2015</span></a><span data-dcnode-id="3911" instrument_node="">; *Petty et al. </span><a aria-label="Reference 1983" data-dcnode-id="3909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d192725775e4742" title=""><span data-dcnode-id="3910" instrument_node="">1983</span></a><span data-dcnode-id="3908" instrument_node="">; *Sengupta et al. </span><a aria-label="Reference 1997" data-dcnode-id="3906" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d192725775e4746" title=""><span data-dcnode-id="3907" instrument_node="">1997</span></a><span data-dcnode-id="3905" instrument_node="">). However, several studies investigating other issues in celebrity endorsements found strong effects when participants fully concentrated on the endorsements (e.g., *Friedman and Friedman </span><a aria-label="Reference 1979" data-dcnode-id="3903" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d192725775e4749" title=""><span data-dcnode-id="3904" instrument_node="">1979</span></a><span data-dcnode-id="3902" instrument_node="">; *Kamins and Gupta </span><a aria-label="Reference 1994" data-dcnode-id="3900" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d192725775e4752" title=""><span data-dcnode-id="3901" instrument_node="">1994</span></a><span data-dcnode-id="3899" instrument_node="">; *La Ferle and Choi </span><a aria-label="Reference 2005" data-dcnode-id="3897" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d192725775e4755" title=""><span data-dcnode-id="3898" instrument_node="">2005</span></a><span data-dcnode-id="3896" instrument_node="">). Further research is needed that clarifies this matter and looks for other possible mechanisms besides message elaboration.</span></p><span data-dcnode-id="3894" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3892" id="FPar23"><span data-dcnode-id="3893" instrument_node="">Non-profit advertising</span></h3><span data-dcnode-id="3891" instrument_node="">
</span><p data-dcnode-id="3871"><span data-dcnode-id="3890" instrument_node="">Non-profit advertising certainly deserves more attention because it has been steadily growing over the past years including politics, the health sector, or any kind of NGO communication (*Wheeler </span><a aria-label="Reference 2009" data-dcnode-id="3888" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d192725775e4766" title=""><span data-dcnode-id="3889" instrument_node="">2009</span></a><span data-dcnode-id="3887" instrument_node="">). Yet research is still very limited. For instance, whether celebrity endorsements can change voting behavior is still understudied (*Pease and Brewer </span><a aria-label="Reference 2008" data-dcnode-id="3885" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d192725775e4769" title=""><span data-dcnode-id="3886" instrument_node="">2008</span></a><span data-dcnode-id="3884" instrument_node="">). Accordingly, van Steenburg (</span><a aria-label="Reference 2015" data-dcnode-id="3882" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d192725775e4772" title=""><span data-dcnode-id="3883" instrument_node="">2015</span></a><span data-dcnode-id="3881" instrument_node="">) recently concluded a review by asking: “Are voters consumers? Can the two be treated similarly when it comes to marketing strategy and the marketing mix? Is selling a candidate the same as selling a car? Do theoretical foundations of consumer behaviour hold in voter behaviour? […] As of yet, all of these represent untapped discoveries” (p. 216). The same applies to the effectiveness of celebrity endorsements in any kind of health or health-related communication as well as environmental communication (Boyland et al. </span><a aria-label="Reference 2013" data-dcnode-id="3879" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d192725775e4775" title=""><span data-dcnode-id="3880" instrument_node="">2013</span></a><span data-dcnode-id="3878" instrument_node="">; *Myrick and Evans </span><a aria-label="Reference 2014" data-dcnode-id="3876" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d192725775e4778" title=""><span data-dcnode-id="3877" instrument_node="">2014</span></a><span data-dcnode-id="3875" instrument_node="">; *Wu et al. </span><a aria-label="Reference 2012" data-dcnode-id="3873" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d192725775e4782" title=""><span data-dcnode-id="3874" instrument_node="">2012</span></a><span data-dcnode-id="3872" instrument_node="">).</span></p><span data-dcnode-id="3870" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3868" id="FPar24"><span data-dcnode-id="3869" instrument_node="">Cross-cultural differences</span></h3><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3866" instrument_node="">So far, the majority of studies has been conducted in the U.S. However, there is undoubtedly a strong interest in celebrity endorsements in such emerging countries as India or China (Chou </span><a aria-label="Reference 2014" data-dcnode-id="3864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d192725775e4793" title=""><span data-dcnode-id="3865" instrument_node="">2014</span></a><span data-dcnode-id="3863" instrument_node="">; Mishra and Mishra </span><a aria-label="Reference 2014" data-dcnode-id="3861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d192725775e4796" title=""><span data-dcnode-id="3862" instrument_node="">2014</span></a><span data-dcnode-id="3860" instrument_node="">). And even though more and more studies are conducted in Asia, it has yet to be tested whether the same mechanisms that apply to Western celebrity endorsements apply to Asian cultures as well. Because a lot of aspects of consumer behavior are culture-bound, culture-adequate methods are urgently needed (de Mooij and Hofstede </span><a aria-label="Reference 2011" data-dcnode-id="3858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d192725775e4799" title=""><span data-dcnode-id="3859" instrument_node="">2011</span></a><span data-dcnode-id="3857" instrument_node="">).</span></p><span data-dcnode-id="3855" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3853" id="FPar25"><span data-dcnode-id="3854" instrument_node="">Side effects</span></h3><span data-dcnode-id="3852" instrument_node="">
</span><p data-dcnode-id="3835"><span data-dcnode-id="3851" instrument_node="">Finally, future research may also dedicate itself more strongly to side effects or unintended effects. This pertains particularly to vulnerable audiences like, for instance, children or adolescents. It is widely accepted that childhood and adolescence is </span><i data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">the</span></i><span data-dcnode-id="3848" instrument_node=""> developmental period during which human beings complete the process of identity formation (Lloyd </span><a aria-label="Reference 2002" data-dcnode-id="3846" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d192725775e4813" title=""><span data-dcnode-id="3847" instrument_node="">2002</span></a><span data-dcnode-id="3845" instrument_node="">). Next to their family and friends, they frequently refer to mass media when looking for role models (Hoffner and Buchanan </span><a aria-label="Reference 2005" data-dcnode-id="3843" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d192725775e4816" title=""><span data-dcnode-id="3844" instrument_node="">2005</span></a><span data-dcnode-id="3842" instrument_node="">). Celebrities depicted in the media and advertising can serve as such models given that they are considered relevant by consumers (Lockwood and Kunda </span><a aria-label="Reference 1997" data-dcnode-id="3840" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d192725775e4819" title=""><span data-dcnode-id="3841" instrument_node="">1997</span></a><span data-dcnode-id="3839" instrument_node="">). This may pose a problem because children’s and adolescents’ understanding of advertising may not be as advanced when compared to adults. Specifically, past research has revealed that children do not necessarily comprehend the persuasive intent of advertising and constitute a vulnerable audience, deserving of special protection (Kunkel </span><a aria-label="Reference 2001" data-dcnode-id="3837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d192725775e4822" title=""><span data-dcnode-id="3838" instrument_node="">2001</span></a><span data-dcnode-id="3836" instrument_node="">).</span></p><span data-dcnode-id="3834" instrument_node="">
</span></div></div></section><section data-dcnode-id="3824" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="3825" id="Sec18-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3829" id="Sec18"><span data-dcnode-id="3830" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="3826" id="Sec18-content"><p data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">The study sought to quantify the effectiveness of celebrity endorsements on a meta-analytic level across a variety of measures. The results showed a zero effect when averaging across all studies. However, we found strong attitudinal and behavioral effects when including theoretically relevant moderator variables. In particular, effects on attitudes and behavior were found to be strongest when choosing a male actor that matches the endorsed object and expresses his endorsement implicitly. Given the continuing growth of celebrity endorsements in product marketing, politics, and health communication, the study provides essential knowledge to researchers and marketers.</span></p></div></div></section><section data-dcnode-id="3798" data-title="Appendix"><div class="c-article-section" data-dcnode-id="3799" id="Sec19-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3822" id="Sec19"><span data-dcnode-id="3823" instrument_node="">Appendix</span></h2><div class="c-article-section__content" data-dcnode-id="3800" id="Sec19-content"><h3 class="c-article__sub-heading" data-dcnode-id="3817" id="Sec20"><span data-dcnode-id="3821" instrument_node="">Summary of the meta-analysis by Amos et al. (</span><a aria-label="Reference 2008" data-dcnode-id="3819" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d192725775e4846" title=""><span data-dcnode-id="3820" instrument_node="">2008</span></a><span data-dcnode-id="3818" instrument_node="">)</span></h3><p data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">This meta-analysis focused on source effects of celebrity endorsers on advertising effectiveness. Analyzed source variables were negative information, expertise, attractiveness, credibility, trustworthiness, likeability, familiarity, and performance. Advertising effectiveness was understood rather broadly, combining various measures of effectiveness into one effect size variable (purchase intention, brand attitude, attitude toward advertisement, believability, recall, and recognition). The actual analysis focused on the comparison of effect sizes according to the source variables. In addition, it was tested whether effect sizes significantly differ according to four methodological dimensions: surveys vs. experiments; student vs. non-student samples; U.S. vs. non-U.S. studies; main vs. interaction effects. Thirty two studies published through 2004 were part of the analysis. It included surveys and experiments whereby the majority of effect sizes were obtained from surveys.</span></p><p data-dcnode-id="3801"><span data-dcnode-id="3814" instrument_node="">Compared to the present analysis, Amos et al. (</span><a aria-label="Reference 2008" data-dcnode-id="3812" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d192725775e4855" title=""><span data-dcnode-id="3813" instrument_node="">2008</span></a><span data-dcnode-id="3811" instrument_node="">) did not test whether the obtained effect sizes were significant, but solely whether they were significant </span><i data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">different</span></i><span data-dcnode-id="3808" instrument_node=""> from each other (according to various source variables). Hence, no results were provided that enable the assertion that celebrity endorsements exert a significant influence as well as an assertion about its size. In addition, there were no results for individual measures of advertising effectiveness (e.g., cognitive, affective, conative) because all measures were combined into one variable. Furthermore, Amos et al. (</span><a aria-label="Reference 2008" data-dcnode-id="3806" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d192725775e4861" title=""><span data-dcnode-id="3807" instrument_node="">2008</span></a><span data-dcnode-id="3805" instrument_node="">) neither accounted for dependency among the obtained effect sizes nor provided results in terms of the performance of celebrity endorsements when compared to other kinds of endorsements. Last but not least, results are less clear in terms of a causal interpretation since surveys were included predominantly. We want to point out that we do not perceive our analysis as more valuable, but rather as focusing on completely different aspects as Amos et al. (</span><a aria-label="Reference 2008" data-dcnode-id="3803" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d192725775e4864" title=""><span data-dcnode-id="3804" instrument_node="">2008</span></a><span data-dcnode-id="3802" instrument_node="">).</span></p></div></div></section><span data-dcnode-id="3797" instrument_node="">
</span><section data-dcnode-id="3780" data-title="Notes"><div class="c-article-section" data-dcnode-id="3781" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3795" id="notes"><span data-dcnode-id="3796" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="3782" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="3783"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="3788" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="3789"><p data-dcnode-id="3790"><span data-dcnode-id="3794" instrument_node="">Endorsement by a government employee refers to a study by Frizzell (</span><a aria-label="Reference 2011" data-dcnode-id="3792" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d192725775e1580" title=""><span data-dcnode-id="3793" instrument_node="">2011</span></a><span data-dcnode-id="3791" instrument_node="">) in which the effectiveness of a celebrity endorsement was compared against the endorsement of a State Department representative (political issue).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="3784" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="3785"><p data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">Meta-analytic results for less frequently investigated dependent variables (k &lt; 10) can be obtained from the authors upon request.</span></p></div></li></ol></div></div></section><div data-dcnode-id="2173" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="2174" data-title="References"><div class="c-article-section" data-dcnode-id="2175" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion
