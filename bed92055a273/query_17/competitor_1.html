</span><meta content="Celebrities frequently endorse products, brands, political candidates, or health campaigns. We investigated the effectiveness of such endorsements by meta-analyzing 46 studies published until April 2016 involving 10,357 participants. Applying multilevel meta-analysis, we analyzed celebrity endorsements in the context of for-profit and non-profit marketing. Findings revealed strong positive and negative effects when theoretically relevant moderators were included in the analysis. The most positive attitudinal effect appeared for male actors who match well with an implicitly endorsed object (d&amp;nbsp;=&amp;nbsp;.90). The most negative effect was found for female models not matching well with an explicitly endorsed object (d&amp;nbsp;=&amp;nbsp;−.96). Furthermore, celebrity endorsements performed worse compared to endorsements of quality seals, awards, or endorser brands. No publication bias was detected. The study has theoretical and practical implications, and provides an agenda for future research." data-dcnode-id="5957" name="dc.description"><span data-dcnode-id="5956" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1991" data-track-component="article body"><span data-dcnode-id="5408" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="5401" data-gtm-vis-first-on-screen-50443292_562="606" data-gtm-vis-first-on-screen-50443292_563="606" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="606" data-gtm-vis-recent-on-screen-50443292_563="606" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5402" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5406" id="Abs1"><span data-dcnode-id="5407" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5403" id="Abs1-content"><p data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">Celebrities frequently endorse products, brands, political candidates, or health campaigns. We investigated the effectiveness of such endorsements by meta-analyzing 46 studies published until April 2016 involving 10,357 participants. Applying multilevel meta-analysis, we analyzed celebrity endorsements in the context of for-profit and non-profit marketing. Findings revealed strong positive and negative effects when theoretically relevant moderators were included in the analysis. The most positive attitudinal effect appeared for male actors who match well with an implicitly endorsed object (d&nbsp;=&nbsp;.90). The most negative effect was found for female models not matching well with an explicitly endorsed object (d&nbsp;=&nbsp;−.96). Furthermore, celebrity endorsements performed worse compared to endorsements of quality seals, awards, or endorser brands. No publication bias was detected. The study has theoretical and practical implications, and provides an agenda for future research.</span></p></div></div></section><span data-dcnode-id="5400" instrument_node="">
</span><div class="c-article-section__content c-article-section__content--separator" data-dcnode-id="5352"><p data-dcnode-id="5353"><span data-dcnode-id="5399" instrument_node="">Celebrity endorsements are a well-established marketing strategy used since the late nineteenth century (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e317" title=""><span data-dcnode-id="5398" instrument_node="">1999</span></a><span data-dcnode-id="5396" instrument_node="">). While the strategy was first applied in traditional brand or product marketing (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e320" title=""><span data-dcnode-id="5395" instrument_node="">1999</span></a><span data-dcnode-id="5393" instrument_node="">), it has spread to any form of marketing communication, including political marketing (Chou </span><a aria-label="Reference 2014" data-dcnode-id="5391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d192725775e323" title=""><span data-dcnode-id="5392" instrument_node="">2014</span></a><span data-dcnode-id="5390" instrument_node="">, </span><a aria-label="Reference 2015" data-dcnode-id="5388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d192725775e326" title=""><span data-dcnode-id="5389" instrument_node="">2015</span></a><span data-dcnode-id="5387" instrument_node="">), health communication, and the marketing of non-government organizations (NGOs; *Jackson </span><a aria-label="Reference 2008" data-dcnode-id="5385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d192725775e329" title=""><span data-dcnode-id="5386" instrument_node="">2008</span></a><span data-dcnode-id="5384" instrument_node="">; *Wheeler </span><a aria-label="Reference 2009" data-dcnode-id="5382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d192725775e333" title=""><span data-dcnode-id="5383" instrument_node="">2009</span></a><span data-dcnode-id="5381" instrument_node="">; *Young and Miller </span><a aria-label="Reference 2015" data-dcnode-id="5379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d192725775e336" title=""><span data-dcnode-id="5380" instrument_node="">2015</span></a><span data-dcnode-id="5378" instrument_node="">). Current estimates indicate every fourth to fifth advertisement incorporates this strategy, though this varies across countries (USA: 19–25%, Elberse and Verleun </span><a aria-label="Reference 2012" data-dcnode-id="5376" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d192725775e339" title=""><span data-dcnode-id="5377" instrument_node="">2012</span></a><span data-dcnode-id="5375" instrument_node="">; Stephens and Rice </span><a aria-label="Reference 1998" data-dcnode-id="5373" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d192725775e342" title=""><span data-dcnode-id="5374" instrument_node="">1998</span></a><span data-dcnode-id="5372" instrument_node="">; UK: 21%, Pringle and Binet </span><a aria-label="Reference 2005" data-dcnode-id="5370" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d192725775e345" title=""><span data-dcnode-id="5371" instrument_node="">2005</span></a><span data-dcnode-id="5369" instrument_node="">; India: 24%, Crutchfield </span><a aria-label="Reference 2010" data-dcnode-id="5367" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d192725775e348" title=""><span data-dcnode-id="5368" instrument_node="">2010</span></a><span data-dcnode-id="5366" instrument_node="">; Japan: 70%, Kilburn </span><a aria-label="Reference 1998" data-dcnode-id="5364" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d192725775e352" title=""><span data-dcnode-id="5365" instrument_node="">1998</span></a><span data-dcnode-id="5363" instrument_node="">; Taiwan: 45%, Crutchfield </span><a aria-label="Reference 2010" data-dcnode-id="5361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d192725775e355" title=""><span data-dcnode-id="5362" instrument_node="">2010</span></a><span data-dcnode-id="5360" instrument_node="">). In addition, longitudinal analyses show a steady increase over the past years (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5358" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e358" title=""><span data-dcnode-id="5359" instrument_node="">1999</span></a><span data-dcnode-id="5357" instrument_node="">; Pringle and Binet </span><a aria-label="Reference 2005" data-dcnode-id="5355" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d192725775e361" title=""><span data-dcnode-id="5356" instrument_node="">2005</span></a><span data-dcnode-id="5354" instrument_node="">).</span></p></div><div class="c-article-section__content" data-dcnode-id="5319"><p data-dcnode-id="5320"><span data-dcnode-id="5351" instrument_node="">Hence, many studies have been conducted to test whether consumer attitudes and behavior are changed by celebrity endorsements. So far, results have been summarized in three narrative (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="5349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e367" title=""><span data-dcnode-id="5350" instrument_node="">2016</span></a><span data-dcnode-id="5348" instrument_node="">; Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e370" title=""><span data-dcnode-id="5347" instrument_node="">1999</span></a><span data-dcnode-id="5345" instrument_node="">; Kaikati </span><a aria-label="Reference 1987" data-dcnode-id="5343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d192725775e373" title=""><span data-dcnode-id="5344" instrument_node="">1987</span></a><span data-dcnode-id="5342" instrument_node="">) and one quantitative review (Amos et al. </span><a aria-label="Reference 2008" data-dcnode-id="5340" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d192725775e376" title=""><span data-dcnode-id="5341" instrument_node="">2008</span></a><span data-dcnode-id="5339" instrument_node="">; see the </span><a data-dcnode-id="5337" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec19"><span data-dcnode-id="5338" instrument_node="">Appendix</span></a><span data-dcnode-id="5336" instrument_node=""> for a summary of the review). The quantitative review of Amos and colleagues focused on source effects of celebrity endorsers. In short, it asked which source variables (e.g., expertise, attractiveness) exert which influence on advertising effectiveness. However, it did not test whether the obtained effect sizes were significant, but solely tested whether they were significantly different from each other. Hence, up until now, there is no meta-analytic knowledge about whether celebrity endorsements actually influence consumers’ responses, including the size of their influence. In addition, there is no knowledge about whether effects differ in terms of specific outcomes (e.g., cognitive, affective, behavioral). The reason is that Amos et al. (</span><a aria-label="Reference 2008" data-dcnode-id="5334" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d192725775e383" title=""><span data-dcnode-id="5335" instrument_node="">2008</span></a><span data-dcnode-id="5333" instrument_node="">) applied only a combined measure of advertising effectiveness. Furthermore, frequently claimed propositions like the match-up hypothesis or the proposition of stronger effects in the case of unfamiliar brands have never been tested on a meta-analytic level. This seems particularly pressing considering the fact that practitioners frequently refer to such claims (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5331" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e386" title=""><span data-dcnode-id="5332" instrument_node="">1999</span></a><span data-dcnode-id="5330" instrument_node="">). Besides, there are conflicting results of individual studies, for instance, when it comes to the endorser’s sex or endorsement repetition (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="5328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e389" title=""><span data-dcnode-id="5329" instrument_node="">2016</span></a><span data-dcnode-id="5327" instrument_node="">; Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e392" title=""><span data-dcnode-id="5326" instrument_node="">1999</span></a><span data-dcnode-id="5324" instrument_node="">). Last but not least, numerous studies have been conducted since the last quantitative review in 2004 (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="5322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e395" title=""><span data-dcnode-id="5323" instrument_node="">2016</span></a><span data-dcnode-id="5321" instrument_node="">).</span></p></div><div class="c-article-section__content" data-dcnode-id="5313"><p data-dcnode-id="5314"><span data-dcnode-id="5318" instrument_node="">The present meta-analysis seeks to address these shortcomings by integrating research published through April 2016, by reporting average effect sizes according to various advertising outcomes including respective confidence intervals, and by performing moderator analyses testing the impact of various endorser and endorsed object variables. In terms of methodological advancement, we apply multilevel modeling accounting for the dependence of multiple effect sizes and we estimate publication bias, both important issues in meta-analysis (Borenstein et al. </span><a aria-label="Reference 2009" data-dcnode-id="5316" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d192725775e401" title=""><span data-dcnode-id="5317" instrument_node="">2009</span></a><span data-dcnode-id="5315" instrument_node="">). Finally, we provide practitioners with empirically derived implications for how to choose the right celebrity and offer researchers an agenda for future research.</span></p></div><section data-dcnode-id="5248" data-gtm-vis-first-on-screen-50443292_562="606" data-gtm-vis-first-on-screen-50443292_563="606" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="606" data-gtm-vis-recent-on-screen-50443292_563="606" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Conceptual framework"><div class="c-article-section" data-dcnode-id="5249" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5311" id="Sec1"><span data-dcnode-id="5312" instrument_node="">Conceptual framework</span></h2><div class="c-article-section__content" data-dcnode-id="5250" id="Sec1-content"><p data-dcnode-id="5279"><span data-dcnode-id="5310" instrument_node="">Following McCracken (</span><a aria-label="Reference 1989" data-dcnode-id="5308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d192725775e411" title=""><span data-dcnode-id="5309" instrument_node="">1989</span></a><span data-dcnode-id="5307" instrument_node="">), celebrity endorsements are understood as a marketing technique in which an individual enjoying public recognition “uses this recognition on behalf of a consumer good by appearing with it in an advertisement” (p. 310). The effects of endorsements can well be explained within the advertising effectiveness model provided by Ladvidge and Steiner (Lavidge and Steiner </span><a aria-label="Reference 1961" data-dcnode-id="5305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d192725775e414" title=""><span data-dcnode-id="5306" instrument_node="">1961</span></a><span data-dcnode-id="5304" instrument_node="">). Studies have mostly investigated celebrity endorsements according to one or more of the model’s advertising functions (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="5302" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e417" title=""><span data-dcnode-id="5303" instrument_node="">2016</span></a><span data-dcnode-id="5301" instrument_node="">; Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5299" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e420" title=""><span data-dcnode-id="5300" instrument_node="">1999</span></a><span data-dcnode-id="5298" instrument_node="">; Kaikati </span><a aria-label="Reference 1987" data-dcnode-id="5296" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d192725775e423" title=""><span data-dcnode-id="5297" instrument_node="">1987</span></a><span data-dcnode-id="5295" instrument_node="">). Furthermore, the model has revealed itself as fruitful in a similar meta-analysis (Grewal et al. </span><a aria-label="Reference 1997" data-dcnode-id="5293" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d192725775e427" title=""><span data-dcnode-id="5294" instrument_node="">1997</span></a><span data-dcnode-id="5292" instrument_node="">). It enables a systematic organization of the analyzed dependent variables and moderators, and specifies their relationships (see Fig. </span><a data-dcnode-id="5290" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5291" instrument_node="">1</span></a><span data-dcnode-id="5289" instrument_node="">). According to the model, advertising serves to influence three basic psychological dimensions: the cognitive, the affective, and the conative. “Advertising’s cognitive function provides information and facts for the purpose of making consumers aware and knowledgeable about the sponsored brand. Advertising’s affective function creates liking and preference for the sponsored brand – preference presumably refers to more favorable attitudes. Advertising’s affective function, therefore, is to persuade. Finally, advertising’s conative function is to stimulate desire and cause consumers to buy the sponsored brand” (Grewal et al. </span><a aria-label="Reference 1997" data-dcnode-id="5287" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d192725775e433" title=""><span data-dcnode-id="5288" instrument_node="">1997</span></a><span data-dcnode-id="5286" instrument_node="">, p. 2). Important to note, we do not suggest that these outcomes necessarily take place in a particular sequence (i.e., cognition =&nbsp;&gt;&nbsp;affect =&nbsp;&gt;&nbsp;behavior). Following more recent advancements in the conceptualization of advertising effects, we propose that each of the outcomes may be independently influenced by celebrity endorsements. In addition, all outcomes are assumed to be interrelated. They possibly influence or interact with each other (Vakratsas and Ambler </span><a aria-label="Reference 1999" data-dcnode-id="5284" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d192725775e436" title=""><span data-dcnode-id="5285" instrument_node="">1999</span></a><span data-dcnode-id="5283" instrument_node="">). This is indicated by the double-headed arrows in Fig. </span><a data-dcnode-id="5281" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5282" instrument_node="">1</span></a><span data-dcnode-id="5280" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5252" data-gtm-vis-first-on-screen-50443292_561="589" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="589" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="5253"><figcaption data-dcnode-id="5276"><b class="c-article-section__figure-caption" data-dcnode-id="5277" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="5278" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5264"><div class="c-article-section__figure-item" data-dcnode-id="5271"><a class="c-article-section__figure-link" data-dcnode-id="5272" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/figures/1" rel="nofollow"><picture data-dcnode-id="5273"><source data-dcnode-id="5275" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11747-016-0503-8/MediaObjects/11747_2016_503_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="5274" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11747-016-0503-8/MediaObjects/11747_2016_503_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5265" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="5266"><span data-dcnode-id="5270" instrument_node="">Celebrity endorsement effectiveness model adapted from Grewal et al. (</span><a aria-label="Reference 1997" data-dcnode-id="5268" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d192725775e452" title=""><span data-dcnode-id="5269" instrument_node="">1997</span></a><span data-dcnode-id="5267" instrument_node="">)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5254"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="5255" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/figures/1" rel="nofollow"><span data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5256" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5257" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5258" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5261" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5260" fill-rule="evenodd"></path><span data-dcnode-id="5259" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="5251" instrument_node="">
</span></div></div></section><section data-dcnode-id="5173" data-gtm-vis-first-on-screen-50443292_562="606" data-gtm-vis-first-on-screen-50443292_563="606" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="606" data-gtm-vis-recent-on-screen-50443292_563="606" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Cognitive effects"><div class="c-article-section" data-dcnode-id="5174" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5246" id="Sec2"><span data-dcnode-id="5247" instrument_node="">Cognitive effects</span></h2><div class="c-article-section__content" data-dcnode-id="5175" id="Sec2-content"><p data-dcnode-id="5226"><span data-dcnode-id="5245" instrument_node="">Cognitive effects include awareness and knowledge about an endorsed object. Establishing awareness starts from creating attention and interest (Lavidge and Steiner </span><a aria-label="Reference 1961" data-dcnode-id="5243" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d192725775e472" title=""><span data-dcnode-id="5244" instrument_node="">1961</span></a><span data-dcnode-id="5242" instrument_node="">). Directing one’s attention involves controlled as well as automatic processes (Kahneman </span><a aria-label="Reference 1973" data-dcnode-id="5240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d192725775e475" title=""><span data-dcnode-id="5241" instrument_node="">1973</span></a><span data-dcnode-id="5239" instrument_node="">). Both processes can be influenced by celebrity endorsements. First, people who are interested in a particular celebrity are assumed to purposefully direct their attention to this celebrity’s ad (*Wei and Lu </span><a aria-label="Reference 2013" data-dcnode-id="5237" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d192725775e478" title=""><span data-dcnode-id="5238" instrument_node="">2013</span></a><span data-dcnode-id="5236" instrument_node="">). Second, people’s attention is automatically directed. Humans tend to give preferential treatment to stimuli that are related to their goals (Lang </span><a aria-label="Reference 2000" data-dcnode-id="5234" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d192725775e481" title=""><span data-dcnode-id="5235" instrument_node="">2000</span></a><span data-dcnode-id="5233" instrument_node="">). In addition, celebrities are well-known, resulting in more accessible representations in memory (Erfgen et al. </span><a aria-label="Reference 2015" data-dcnode-id="5231" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d192725775e484" title=""><span data-dcnode-id="5232" instrument_node="">2015</span></a><span data-dcnode-id="5230" instrument_node="">). This should foster automatic attention, too (Bargh and Pratto </span><a aria-label="Reference 1986" data-dcnode-id="5228" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d192725775e488" title=""><span data-dcnode-id="5229" instrument_node="">1986</span></a><span data-dcnode-id="5227" instrument_node="">).</span></p><p data-dcnode-id="5218"><span data-dcnode-id="5225" instrument_node="">Once a celebrity endorsement grabs their attention, consumers are assumed to become more interested in the advertised object as compared with a non-endorsed or other-endorsed object. This due to the fact that celebrities possess inherent news value caused by their celebrity status (Corbett and Mori </span><a aria-label="Reference 1999" data-dcnode-id="5223" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d192725775e494" title=""><span data-dcnode-id="5224" instrument_node="">1999</span></a><span data-dcnode-id="5222" instrument_node="">). Since celebrities are generally liked, consumers also tend to be more motivated to assess what kind of object a celebrity is endorsing. As a result, object recall and recognition is assumed to be enhanced due to greater message elaboration (*Petty et al. </span><a aria-label="Reference 1983" data-dcnode-id="5220" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d192725775e497" title=""><span data-dcnode-id="5221" instrument_node="">1983</span></a><span data-dcnode-id="5219" instrument_node="">).</span></p><p data-dcnode-id="5183"><span data-dcnode-id="5217" instrument_node="">In terms of knowledge, celebrity endorsements are assumed to influence the meaning of the endorsed object (*Miller and Allen </span><a aria-label="Reference 2012" data-dcnode-id="5215" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d192725775e503" title=""><span data-dcnode-id="5216" instrument_node="">2012</span></a><span data-dcnode-id="5214" instrument_node="">) as well as perceptions about its price, its taste level, the risk of buying it, or the perceived information value of the endorsement (*Biswas et al. </span><a aria-label="Reference 2006" data-dcnode-id="5212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d192725775e506" title=""><span data-dcnode-id="5213" instrument_node="">2006</span></a><span data-dcnode-id="5211" instrument_node="">; *Dean and Biswas </span><a aria-label="Reference 2001" data-dcnode-id="5209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d192725775e509" title=""><span data-dcnode-id="5210" instrument_node="">2001</span></a><span data-dcnode-id="5208" instrument_node="">; *Freiden </span><a aria-label="Reference 1982" data-dcnode-id="5206" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d192725775e512" title=""><span data-dcnode-id="5207" instrument_node="">1982</span></a><span data-dcnode-id="5205" instrument_node="">; *Friedman et al. </span><a aria-label="Reference 1976" data-dcnode-id="5203" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d192725775e515" title=""><span data-dcnode-id="5204" instrument_node="">1976</span></a><span data-dcnode-id="5202" instrument_node="">; *Young and Miller </span><a aria-label="Reference 2015" data-dcnode-id="5200" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d192725775e519" title=""><span data-dcnode-id="5201" instrument_node="">2015</span></a><span data-dcnode-id="5199" instrument_node="">). Based on the mechanism behind these effects, consumers are assumed to conclude that an object has a specific attribute when they perceive this object as paired with a celebrity known for this attribute (e.g., premium price with a high-class celebrity; *Miller and Allen </span><a aria-label="Reference 2012" data-dcnode-id="5197" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d192725775e522" title=""><span data-dcnode-id="5198" instrument_node="">2012</span></a><span data-dcnode-id="5196" instrument_node="">). The process can be conceptualized as propositional learning (De Houwer </span><a aria-label="Reference 2009" data-dcnode-id="5194" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d192725775e525" title=""><span data-dcnode-id="5195" instrument_node="">2009</span></a><span data-dcnode-id="5193" instrument_node="">). Consumers have experienced in their past that people frequently present themselves with objects they share similarities with (Elliot and Wattanasuwan </span><a aria-label="Reference 1998" data-dcnode-id="5191" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d192725775e528" title=""><span data-dcnode-id="5192" instrument_node="">1998</span></a><span data-dcnode-id="5190" instrument_node="">). “Once a relation between two events has been discovered in the past, it is likely that this knowledge is used to generate propositions about similar events in the present” (De Houwer </span><a aria-label="Reference 2009" data-dcnode-id="5188" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d192725775e531" title=""><span data-dcnode-id="5189" instrument_node="">2009</span></a><span data-dcnode-id="5187" instrument_node="">, p. 8). As a result, celebrity attributes created through celebrities’ role in society transfer to associated objects (McCracken </span><a aria-label="Reference 1989" data-dcnode-id="5185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d192725775e534" title=""><span data-dcnode-id="5186" instrument_node="">1989</span></a><span data-dcnode-id="5184" instrument_node="">). In conclusion, it is proposed that celebrity endorsements influence consumers’ cognitions including attention and interest, awareness, as well as perceptions.</span></p><blockquote class="c-blockquote" data-dcnode-id="5177"><div class="c-blockquote__body" data-dcnode-id="5178"><span data-dcnode-id="5182" instrument_node="">
</span><p data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">H1: As compared with non-celebrity endorsements or no endorsements, celebrity endorsements evoke greater attention, interest, and awareness as well as perceptions more in line with the respective endorser.</span></p><span data-dcnode-id="5179" instrument_node="">
</span></div></blockquote><span data-dcnode-id="5176" instrument_node="">
</span></div></div></section><section data-dcnode-id="5138" data-gtm-vis-first-on-screen-50443292_562="606" data-gtm-vis-first-on-screen-50443292_563="606" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="606" data-gtm-vis-recent-on-screen-50443292_563="606" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Affective effects"><div class="c-article-section" data-dcnode-id="5139" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5171" id="Sec3"><span data-dcnode-id="5172" instrument_node="">Affective effects</span></h2><div class="c-article-section__content" data-dcnode-id="5140" id="Sec3-content"><p data-dcnode-id="5148"><span data-dcnode-id="5170" instrument_node="">Affective effects pertain to attitudes toward the ad and attitudes toward the advertised object. This influence may best be explained with regard to balance theory (Heider </span><a aria-label="Reference 1946" data-dcnode-id="5168" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d192725775e553" title=""><span data-dcnode-id="5169" instrument_node="">1946</span></a><span data-dcnode-id="5167" instrument_node="">, </span><a aria-label="Reference 1958" data-dcnode-id="5165" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d192725775e556" title=""><span data-dcnode-id="5166" instrument_node="">1958</span></a><span data-dcnode-id="5164" instrument_node="">; see also Mowen and Brown </span><a aria-label="Reference 1981" data-dcnode-id="5162" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d192725775e559" title=""><span data-dcnode-id="5163" instrument_node="">1981</span></a><span data-dcnode-id="5161" instrument_node="">). The theory explains a person’s desire to maintain consistency among a triad of linked cognitions. It follows that people generally strive for a consistent organization of their cognitive structures, experiencing this state as most tension-free. In the case of celebrity endorsements, the cognitive triad consists of the consumer, the celebrity, and the endorsed object or the endorsed ad, respectively. A consistent state is achieved if the consumer perceives the celebrity and the endorsed object/ad as equally valenced (i.e., as both positive or both negative) because celebrities endorsing an object are usually seen as positively related to that object or the respective ad (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5159" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e562" title=""><span data-dcnode-id="5160" instrument_node="">1999</span></a><span data-dcnode-id="5158" instrument_node="">). Starting from the premise that researchers and practitioners usually employ likeable celebrities, it can be hypothesized that celebrity endorsements positively impact consumers’ attitudes toward the ad and attitudes toward the endorsed object. Only then are consumers’ attitudes and their liking for the respective celebrity of the same valence (i.e., both positive; Heider </span><a aria-label="Reference 1946" data-dcnode-id="5156" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d192725775e565" title=""><span data-dcnode-id="5157" instrument_node="">1946</span></a><span data-dcnode-id="5155" instrument_node="">, </span><a aria-label="Reference 1958" data-dcnode-id="5153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d192725775e569" title=""><span data-dcnode-id="5154" instrument_node="">1958</span></a><span data-dcnode-id="5152" instrument_node="">). Although there may be similar effects for likeable non-celebrity endorsers, these are assumed to be notably weaker. This is due to the fact that consumers are familiar with celebrities by definition. As a result, relationships with celebrities are more affectional as compared with unknown non-celebrity endorsers (Dibble et al. </span><a aria-label="Reference 2016" data-dcnode-id="5150" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d192725775e572" title=""><span data-dcnode-id="5151" instrument_node="">2016</span></a><span data-dcnode-id="5149" instrument_node="">).</span></p><blockquote class="c-blockquote" data-dcnode-id="5142"><div class="c-blockquote__body" data-dcnode-id="5143"><span data-dcnode-id="5147" instrument_node="">
</span><p data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">H2: As compared with non-celebrity endorsements or no endorsements, celebrity endorsements evoke more positive attitudes toward the ad and the endorsed object.</span></p><span data-dcnode-id="5144" instrument_node="">
</span></div></blockquote><span data-dcnode-id="5141" instrument_node="">
</span></div></div></section><section data-dcnode-id="5082" data-title="Behavioral effects"><div class="c-article-section" data-dcnode-id="5083" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5136" id="Sec4"><span data-dcnode-id="5137" instrument_node="">Behavioral effects</span></h2><div class="c-article-section__content" data-dcnode-id="5084" id="Sec4-content"><p data-dcnode-id="5092"><span data-dcnode-id="5135" instrument_node="">Behavioral effects include purchasing or using an object (e.g., *Freiden </span><a aria-label="Reference 1982" data-dcnode-id="5133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d192725775e589" title=""><span data-dcnode-id="5134" instrument_node="">1982</span></a><span data-dcnode-id="5132" instrument_node="">; *Kamins </span><a aria-label="Reference 1989" data-dcnode-id="5130" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d192725775e592" title=""><span data-dcnode-id="5131" instrument_node="">1989</span></a><span data-dcnode-id="5129" instrument_node="">; *Kamins and Gupta </span><a aria-label="Reference 1994" data-dcnode-id="5127" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d192725775e595" title=""><span data-dcnode-id="5128" instrument_node="">1994</span></a><span data-dcnode-id="5126" instrument_node="">; *Roozen and Claeys </span><a aria-label="Reference 2010" data-dcnode-id="5124" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d192725775e598" title=""><span data-dcnode-id="5125" instrument_node="">2010</span></a><span data-dcnode-id="5123" instrument_node="">; *Siemens et al. </span><a aria-label="Reference 2008" data-dcnode-id="5121" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d192725775e601" title=""><span data-dcnode-id="5122" instrument_node="">2008</span></a><span data-dcnode-id="5120" instrument_node="">), sharing object information, volunteering, supporting a charitable cause, or voting for a political candidate (Myrick and Evans </span><a aria-label="Reference 2014" data-dcnode-id="5118" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d192725775e605" title=""><span data-dcnode-id="5119" instrument_node="">2014</span></a><span data-dcnode-id="5117" instrument_node="">; *Pease and Brewer </span><a aria-label="Reference 2008" data-dcnode-id="5115" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d192725775e608" title=""><span data-dcnode-id="5116" instrument_node="">2008</span></a><span data-dcnode-id="5114" instrument_node="">; *Wei and Lu </span><a aria-label="Reference 2013" data-dcnode-id="5112" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d192725775e611" title=""><span data-dcnode-id="5113" instrument_node="">2013</span></a><span data-dcnode-id="5111" instrument_node="">; *Wheeler </span><a aria-label="Reference 2009" data-dcnode-id="5109" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d192725775e614" title=""><span data-dcnode-id="5110" instrument_node="">2009</span></a><span data-dcnode-id="5108" instrument_node="">). Such effects are frequently explained with regard to the theory of planned behavior (Ajzen </span><a aria-label="Reference 1991" data-dcnode-id="5106" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d192725775e617" title=""><span data-dcnode-id="5107" instrument_node="">1991</span></a><span data-dcnode-id="5105" instrument_node="">). According to the theory, behavior is strongly determined by behavioral intentions. These are, in turn, influenced by consumers’ attitudes, the perceived subjective norm, and the perceived behavioral control. As long as consumers are able to exert the respective behavior (behavioral control), and as long as consumers do not feel social pressure to avoid the behavior (subjective norm), attitudes largely predict behavioral intentions. The assumptions have been supported by various meta-analyses (Armitage and Conner </span><a aria-label="Reference 2001" data-dcnode-id="5103" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d192725775e620" title=""><span data-dcnode-id="5104" instrument_node="">2001</span></a><span data-dcnode-id="5102" instrument_node="">; Kim and Hunter </span><a aria-label="Reference 1993" data-dcnode-id="5100" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d192725775e624" title=""><span data-dcnode-id="5101" instrument_node="">1993</span></a><span data-dcnode-id="5099" instrument_node="">). Accordingly, the more positive attitudes assumed in H2 should lead to stronger behavioral intentions and respective behavior. Corresponding effects were, for instance, found by Fleck et al. (</span><a aria-label="Reference 2012" data-dcnode-id="5097" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d192725775e627" title=""><span data-dcnode-id="5098" instrument_node="">2012</span></a><span data-dcnode-id="5096" instrument_node="">) and Mishra and Mishra (</span><a aria-label="Reference 2014" data-dcnode-id="5094" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d192725775e630" title=""><span data-dcnode-id="5095" instrument_node="">2014</span></a><span data-dcnode-id="5093" instrument_node="">). We consequently hypothesize:</span></p><blockquote class="c-blockquote" data-dcnode-id="5086"><div class="c-blockquote__body" data-dcnode-id="5087"><span data-dcnode-id="5091" instrument_node="">
</span><p data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">H3: As compared with non-celebrity endorsements or no endorsements, celebrity endorsements evoke stronger behavioral intentions and behavior.</span></p><span data-dcnode-id="5088" instrument_node="">
</span></div></blockquote><span data-dcnode-id="5085" instrument_node="">
</span></div></div></section><section data-dcnode-id="4783" data-title="Moderators"><div class="c-article-section" data-dcnode-id="4784" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5080" id="Sec5"><span data-dcnode-id="5081" instrument_node="">Moderators</span></h2><div class="c-article-section__content" data-dcnode-id="4785" id="Sec5-content"><p data-dcnode-id="5060"><span data-dcnode-id="5079" instrument_node="">Studies investigating the applied advertising effectiveness framework have consistently found that people respond differently to advertisements depending on characteristics of the ad, the advertised object, and individual characteristics (Vakratsas and Ambler </span><a aria-label="Reference 1999" data-dcnode-id="5077" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d192725775e647" title=""><span data-dcnode-id="5078" instrument_node="">1999</span></a><span data-dcnode-id="5076" instrument_node="">). This is frequently intended by the advertiser, tailoring advertisements to specific consumers and their needs (Lavidge and Steiner </span><a aria-label="Reference 1961" data-dcnode-id="5074" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d192725775e650" title=""><span data-dcnode-id="5075" instrument_node="">1961</span></a><span data-dcnode-id="5073" instrument_node="">). In line with this reasoning, we included various moderators within our framework accounting for the fact that consumers do not respond uniformly to advertising (cf. Figure </span><a data-dcnode-id="5071" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5072" instrument_node="">1</span></a><span data-dcnode-id="5070" instrument_node="">; Lavidge and Steiner </span><a aria-label="Reference 1961" data-dcnode-id="5068" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d192725775e656" title=""><span data-dcnode-id="5069" instrument_node="">1961</span></a><span data-dcnode-id="5067" instrument_node="">). Following Grewal et al. (</span><a aria-label="Reference 1997" data-dcnode-id="5065" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d192725775e659" title=""><span data-dcnode-id="5066" instrument_node="">1997</span></a><span data-dcnode-id="5064" instrument_node="">), our analysis of moderators is limited to those that (1) are theoretically relevant, (2) provide a sufficient number of effect sizes, (3) show sufficient variance to test the moderation, and (4) are important to advertisers. In terms of number of effect sizes, Higgins and Green (</span><a aria-label="Reference 2011" data-dcnode-id="5062" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d192725775e663" title=""><span data-dcnode-id="5063" instrument_node="">2011</span></a><span data-dcnode-id="5061" instrument_node="">) suggest considering moderator analysis only if there are ten or more studies incorporating the moderators. Seven moderators met the criteria: endorser sex, endorser type, endorser match, endorsement explicitness, endorsement frequency, familiarity of the endorsed object, and endorsement type of the comparison group.</span></p><span data-dcnode-id="5059" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="5057" id="FPar2"><span data-dcnode-id="5058" instrument_node="">Endorser sex</span></h3><span data-dcnode-id="5056" instrument_node="">
</span><p data-dcnode-id="5024"><span data-dcnode-id="5055" instrument_node="">Though endorser sex has generally been viewed as influential (e.g., Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="5053" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e673" title=""><span data-dcnode-id="5054" instrument_node="">1999</span></a><span data-dcnode-id="5052" instrument_node="">; McCracken </span><a aria-label="Reference 1989" data-dcnode-id="5050" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d192725775e676" title=""><span data-dcnode-id="5051" instrument_node="">1989</span></a><span data-dcnode-id="5049" instrument_node="">), hardly any study explicitly addressed this variable in empirical research. Most studies have investigated either female or male endorsers (for the only exception, see Freiden </span><a aria-label="Reference 1984" data-dcnode-id="5047" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d192725775e679" title=""><span data-dcnode-id="5048" instrument_node="">1984</span></a><span data-dcnode-id="5046" instrument_node="">). “The dearth of research on endorser gender effects is somewhat surprising as persuasion research shows that men and women respond differently to male and female communicators” (Bergkvist and Zhou </span><a aria-label="Reference 2016" data-dcnode-id="5044" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d192725775e682" title=""><span data-dcnode-id="5045" instrument_node="">2016</span></a><span data-dcnode-id="5043" instrument_node="">, p. 11). Hence, meta-analysis seems especially valuable (Lipsey and Wilson </span><a aria-label="Reference 2001" data-dcnode-id="5041" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d192725775e685" title=""><span data-dcnode-id="5042" instrument_node="">2001</span></a><span data-dcnode-id="5040" instrument_node="">). Assumptions about possible effects may be derived from studies on non-celebrity spokespersons. According to Kenton (</span><a aria-label="Reference 1989" data-dcnode-id="5038" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d192725775e689" title=""><span data-dcnode-id="5039" instrument_node="">1989</span></a><span data-dcnode-id="5037" instrument_node="">), the credibility and persuasiveness of a spokesperson depends on four dimensions: goodwill and fairness (e.g., unselfishness), prestige (e.g., power, status), expertise (e.g., competence), and self-presentation (e.g., confidence). Research has revealed women to be higher ranking on goodwill and fairness, whereas men outperform women on the remaining dimensions (Kenton </span><a aria-label="Reference 1989" data-dcnode-id="5035" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d192725775e692" title=""><span data-dcnode-id="5036" instrument_node="">1989</span></a><span data-dcnode-id="5034" instrument_node="">). As a result, male spokespersons were frequently more persuasive than female ones (e.g., Cabalero et al. </span><a aria-label="Reference 1989" data-dcnode-id="5032" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d192725775e695" title=""><span data-dcnode-id="5033" instrument_node="">1989</span></a><span data-dcnode-id="5031" instrument_node="">; Whittaker </span><a aria-label="Reference 1965" data-dcnode-id="5029" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d192725775e698" title=""><span data-dcnode-id="5030" instrument_node="">1965</span></a><span data-dcnode-id="5028" instrument_node="">). Transferring this to the present context, consumers may perceive male celebrity endorsers as more credible due to higher levels of expertise and prestige (Cabalero et al. </span><a aria-label="Reference 1989" data-dcnode-id="5026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d192725775e701" title=""><span data-dcnode-id="5027" instrument_node="">1989</span></a><span data-dcnode-id="5025" instrument_node="">). As a result, male celebrities are assumed to evoke stronger endorsements effects when compared to female ones.</span></p><blockquote class="c-blockquote" data-dcnode-id="5018"><div class="c-blockquote__body" data-dcnode-id="5019"><span data-dcnode-id="5023" instrument_node="">
</span><p data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">H4: Male celebrity endorsers evoke stronger endorsement effects when compared to female ones.</span></p><span data-dcnode-id="5020" instrument_node="">
</span></div></blockquote><span data-dcnode-id="5017" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="5015" id="FPar3"><span data-dcnode-id="5016" instrument_node="">Endorser type</span></h3><span data-dcnode-id="5014" instrument_node="">
</span><p data-dcnode-id="4994"><span data-dcnode-id="5013" instrument_node="">No study has explicitly investigated different types of celebrity endorsers. Instead, studies have typically focused on only one type. For instance, studies have explored actors, models, musicians, athletes, or TV hosts (e.g., *Dean and Biswas </span><a aria-label="Reference 2001" data-dcnode-id="5011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d192725775e718" title=""><span data-dcnode-id="5012" instrument_node="">2001</span></a><span data-dcnode-id="5010" instrument_node="">; *Frizzell </span><a aria-label="Reference 2011" data-dcnode-id="5008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d192725775e721" title=""><span data-dcnode-id="5009" instrument_node="">2011</span></a><span data-dcnode-id="5007" instrument_node="">; *Pease and Brewer </span><a aria-label="Reference 2008" data-dcnode-id="5005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d192725775e724" title=""><span data-dcnode-id="5006" instrument_node="">2008</span></a><span data-dcnode-id="5004" instrument_node="">; *Wheeler </span><a aria-label="Reference 2009" data-dcnode-id="5002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d192725775e727" title=""><span data-dcnode-id="5003" instrument_node="">2009</span></a><span data-dcnode-id="5001" instrument_node="">; *Wei and Lu </span><a aria-label="Reference 2013" data-dcnode-id="4999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d192725775e730" title=""><span data-dcnode-id="5000" instrument_node="">2013</span></a><span data-dcnode-id="4998" instrument_node="">). By joining the results of several studies, meta-analysis can provide information whether certain endorser types perform better than others do (Lipsey and Wilson </span><a aria-label="Reference 2001" data-dcnode-id="4996" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d192725775e734" title=""><span data-dcnode-id="4997" instrument_node="">2001</span></a><span data-dcnode-id="4995" instrument_node="">).</span></p><span data-dcnode-id="4993" instrument_node="">
</span><p data-dcnode-id="4976"><span data-dcnode-id="4992" instrument_node="">Starting from the premise that endorsement effects depend on the strength of the relationship a consumer shares with a celebrity (McCracken </span><a aria-label="Reference 1989" data-dcnode-id="4990" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d192725775e740" title=""><span data-dcnode-id="4991" instrument_node="">1989</span></a><span data-dcnode-id="4989" instrument_node="">), research on parasocial interaction can provide insights. Specifically, studies have revealed that people tend to develop relationships with celebrities, merely known from the media, just as they would do with real life persons (Dibble et al. </span><a aria-label="Reference 2016" data-dcnode-id="4987" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d192725775e743" title=""><span data-dcnode-id="4988" instrument_node="">2016</span></a><span data-dcnode-id="4986" instrument_node="">): Upon encountering a celebrity on television, radio, or the Internet, consumers may parasocially interact with the celebrity, storing this experience in a relationship schema (Klimmt et al. </span><a aria-label="Reference 2006" data-dcnode-id="4984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d192725775e746" title=""><span data-dcnode-id="4985" instrument_node="">2006</span></a><span data-dcnode-id="4983" instrument_node="">). The more frequently a celebrity is encountered and the more intense each interaction experience is, the more likely a strong consumer–celebrity relationship is formed (Klimmt et al. </span><a aria-label="Reference 2006" data-dcnode-id="4981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d192725775e749" title=""><span data-dcnode-id="4982" instrument_node="">2006</span></a><span data-dcnode-id="4980" instrument_node="">). Looking at different kinds of celebrities, consumers are particularly likely to form a strong relationship with actors. First, consumers are audiovisually exposed to actors, creating a particularly rich experience, and second, experience is usually based upon multiple encounters over a longer period: “Over time, viewers become familiar with characters and performers on continuing series and often feel as though they know these individuals as well as they know their friends and neighbors. The importance of characters to viewers frequently extends beyond the viewing situation to include the sense of having personal relationships with the characters, deep concern about what happens in their ‘lives,’ and/or a desire to become like them in significant ways” (Hoffner and Buchanan </span><a aria-label="Reference 2005" data-dcnode-id="4978" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d192725775e752" title=""><span data-dcnode-id="4979" instrument_node="">2005</span></a><span data-dcnode-id="4977" instrument_node="">, p. 326).</span></p><span data-dcnode-id="4975" instrument_node="">
</span><p data-dcnode-id="4970"><span data-dcnode-id="4974" instrument_node="">According to McCracken (</span><a aria-label="Reference 1989" data-dcnode-id="4972" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d192725775e758" title=""><span data-dcnode-id="4973" instrument_node="">1989</span></a><span data-dcnode-id="4971" instrument_node="">), this exact type of relationship causes consumers to accept celebrities’ influence more readily. The following hypothesis is proposed:</span></p><blockquote class="c-blockquote" data-dcnode-id="4964"><div class="c-blockquote__body" data-dcnode-id="4965"><span data-dcnode-id="4969" instrument_node="">
</span><p data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">H5: Actors elicit stronger celebrity endorsement effects when compared to other types of celebrities such as models, musicians, athletes, or TV hosts.</span></p><span data-dcnode-id="4966" instrument_node="">
</span></div></blockquote><span data-dcnode-id="4963" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4961" id="FPar4"><span data-dcnode-id="4962" instrument_node="">Endorser match</span></h3><span data-dcnode-id="4960" instrument_node="">
</span><p data-dcnode-id="4937"><span data-dcnode-id="4959" instrument_node="">Several studies have investigated the so-called product match-up hypothesis that assumes the effectiveness of celebrity endorsements is partially dependent on the degree of perceived fit between an endorsed object and the respective celebrity (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="4957" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e775" title=""><span data-dcnode-id="4958" instrument_node="">1999</span></a><span data-dcnode-id="4956" instrument_node="">). A good match may be an attractive model presenting cosmetics, whereas a bad match may be an athlete trying to sell a guitar. The process underlying the product match-up hypothesis can be explained with regard to Social Adaptation Theory (Kahle and Homer </span><a aria-label="Reference 1985" data-dcnode-id="4954" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d192725775e778" title=""><span data-dcnode-id="4955" instrument_node="">1985</span></a><span data-dcnode-id="4953" instrument_node="">; Kamins </span><a aria-label="Reference 1990" data-dcnode-id="4951" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d192725775e781" title=""><span data-dcnode-id="4952" instrument_node="">1990</span></a><span data-dcnode-id="4950" instrument_node="">) or Schema Theory (Lynch and Schuler </span><a aria-label="Reference 1994" data-dcnode-id="4948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d192725775e784" title=""><span data-dcnode-id="4949" instrument_node="">1994</span></a><span data-dcnode-id="4947" instrument_node="">). Social Adaptation Theory assumes that people use information sources as long as they facilitate adaptation to their environment. If a match exists between a spokesperson and a product on some relevant attribute, the spokesperson becomes an information source of adaptive significance on which people may rely (Kamins </span><a aria-label="Reference 1990" data-dcnode-id="4945" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d192725775e787" title=""><span data-dcnode-id="4946" instrument_node="">1990</span></a><span data-dcnode-id="4944" instrument_node="">). Schema Theory posits that attributes of celebrities can be integrated more easily with existing product schemas if the celebrity schemas match the product schemas (Lynch and Schuler </span><a aria-label="Reference 1994" data-dcnode-id="4942" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d192725775e791" title=""><span data-dcnode-id="4943" instrument_node="">1994</span></a><span data-dcnode-id="4941" instrument_node="">). Both theories assume enhanced effects in the case of congruence. Accordingly, several studies have supported the product match-up hypothesis (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="4939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e794" title=""><span data-dcnode-id="4940" instrument_node="">1999</span></a><span data-dcnode-id="4938" instrument_node="">). We thus hypothesize larger effects for object–endorser congruence compared to incongruence.</span></p><blockquote class="c-blockquote" data-dcnode-id="4931"><div class="c-blockquote__body" data-dcnode-id="4932"><span data-dcnode-id="4936" instrument_node="">
</span><p data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">H6: Congruent celebrity endorsers evoke stronger endorsements effects when compared to incongruent ones.</span></p><span data-dcnode-id="4933" instrument_node="">
</span></div></blockquote><span data-dcnode-id="4930" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4928" id="FPar5"><span data-dcnode-id="4929" instrument_node="">Endorsement explicitness</span></h3><span data-dcnode-id="4927" instrument_node="">
</span><p data-dcnode-id="4907"><span data-dcnode-id="4926" instrument_node="">Explicitness can broadly be categorized into two modes: implicit and explicit endorsements. Whereas implicit endorsements refer to situations where celebrities simply use an object or merely appear jointly without overtly announcing their support (“I use this object”; *Miller and Allen </span><a aria-label="Reference 2012" data-dcnode-id="4924" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d192725775e812" title=""><span data-dcnode-id="4925" instrument_node="">2012</span></a><span data-dcnode-id="4923" instrument_node="">), explicit endorsements refer to situations where celebrities overtly express their support for an object (“I endorse this object”; *Miller and Allen </span><a aria-label="Reference 2012" data-dcnode-id="4921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d192725775e815" title=""><span data-dcnode-id="4922" instrument_node="">2012</span></a><span data-dcnode-id="4920" instrument_node="">). To the best of our knowledge, no study has ever compared both modes; instead, they have researched either implicit or explicit endorsements. Though effects have been found with both modes, one mode may be more effective than the other (implicit: e.g., *Miller and Allen </span><a aria-label="Reference 2012" data-dcnode-id="4918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d192725775e818" title=""><span data-dcnode-id="4919" instrument_node="">2012</span></a><span data-dcnode-id="4917" instrument_node="">; explicit: *Dean and Biswas </span><a aria-label="Reference 2001" data-dcnode-id="4915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d192725775e821" title=""><span data-dcnode-id="4916" instrument_node="">2001</span></a><span data-dcnode-id="4914" instrument_node="">; *Friedman and Friedman </span><a aria-label="Reference 1979" data-dcnode-id="4912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d192725775e824" title=""><span data-dcnode-id="4913" instrument_node="">1979</span></a><span data-dcnode-id="4911" instrument_node="">). According to Russell and Stern (</span><a aria-label="Reference 2006" data-dcnode-id="4909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d192725775e828" title=""><span data-dcnode-id="4910" instrument_node="">2006</span></a><span data-dcnode-id="4908" instrument_node="">), consumers infer the celebrity–object association to be of greater strength if celebrities explicitly express their support, signaling commitment and reliability. In addition, consumers may not even realize that an object is endorsed if the endorsement is too subtle. We consequently propose that explicit endorsements are more effective that implicit ones.</span></p><blockquote class="c-blockquote" data-dcnode-id="4901"><div class="c-blockquote__body" data-dcnode-id="4902"><span data-dcnode-id="4906" instrument_node="">
</span><p data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">H7: Explicit endorsements evoke stronger effects than implicit ones.</span></p><span data-dcnode-id="4903" instrument_node="">
</span></div></blockquote><span data-dcnode-id="4900" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4898" id="FPar6"><span data-dcnode-id="4899" instrument_node="">Endorsement frequency</span></h3><span data-dcnode-id="4897" instrument_node="">
</span><p data-dcnode-id="4883"><span data-dcnode-id="4896" instrument_node="">Celebrities may also vary in their endorsement frequency. Consumers are highly likely to encounter celebrity endorsements multiple times via various media channels, including TV, billboards, print advertising, radio, and the Internet. Research on classical conditioning suggests that effects may occur as early as a single pairing of a celebrity with an endorsed object (e.g., Ambroise et al. </span><a aria-label="Reference 2014" data-dcnode-id="4894" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d192725775e845" title=""><span data-dcnode-id="4895" instrument_node="">2014</span></a><span data-dcnode-id="4893" instrument_node="">; Gorn </span><a aria-label="Reference 1982" data-dcnode-id="4891" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d192725775e848" title=""><span data-dcnode-id="4892" instrument_node="">1982</span></a><span data-dcnode-id="4890" instrument_node="">). However, other research suggests that effects tend to be greater the greater the number of pairings. For instance, Stuart et al. (</span><a aria-label="Reference 1987" data-dcnode-id="4888" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d192725775e851" title=""><span data-dcnode-id="4889" instrument_node="">1987</span></a><span data-dcnode-id="4887" instrument_node="">) increased the number of pairings from one to three, to ten, and eventually to twenty, revealing a steady increase in effectiveness. Although these results do not directly refer to celebrity endorsements, similar effects can be assumed because celebrity endorsements are often seen as a certain type of classical conditioning (e.g., *Chen et al. </span><a aria-label="Reference 2012" data-dcnode-id="4885" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d192725775e854" title=""><span data-dcnode-id="4886" instrument_node="">2012</span></a><span data-dcnode-id="4884" instrument_node="">). The following hypothesis is proposed:</span></p><blockquote class="c-blockquote" data-dcnode-id="4877"><div class="c-blockquote__body" data-dcnode-id="4878"><span data-dcnode-id="4882" instrument_node="">
</span><p data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">H8: Celebrity endorsement effects increase with increased endorsement exposure.</span></p><span data-dcnode-id="4879" instrument_node="">
</span></div></blockquote><span data-dcnode-id="4876" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4874" id="FPar7"><span data-dcnode-id="4875" instrument_node="">Familiarity of the endorsed object</span></h3><span data-dcnode-id="4873" instrument_node="">
</span><p data-dcnode-id="4847"><span data-dcnode-id="4872" instrument_node="">Next to the celebrity, the endorsed object itself may impact endorsement effectiveness (*Friedman and Friedman </span><a aria-label="Reference 1979" data-dcnode-id="4870" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d192725775e871" title=""><span data-dcnode-id="4871" instrument_node="">1979</span></a><span data-dcnode-id="4869" instrument_node="">). For instance, researchers assume stronger effects, with decreasing familiarity with an endorsed object (*Miller and Allen </span><a aria-label="Reference 2012" data-dcnode-id="4867" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d192725775e874" title=""><span data-dcnode-id="4868" instrument_node="">2012</span></a><span data-dcnode-id="4866" instrument_node="">). Object familiarity can be understood as the number of object-related experiences accumulated by a consumer (Alba and Hutchinson </span><a aria-label="Reference 1987" data-dcnode-id="4864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d192725775e877" title=""><span data-dcnode-id="4865" instrument_node="">1987</span></a><span data-dcnode-id="4863" instrument_node="">). These experiences can be obtained directly and indirectly, such as through celebrity endorsements (Kent and Allen </span><a aria-label="Reference 1994" data-dcnode-id="4861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d192725775e880" title=""><span data-dcnode-id="4862" instrument_node="">1994</span></a><span data-dcnode-id="4860" instrument_node="">). The more familiar a person is with an object, the more comprehensive his or her knowled
