ge structures can become (Keller </span><a aria-label="Reference 2012" data-dcnode-id="4858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d192725775e883" title=""><span data-dcnode-id="4859" instrument_node="">2012</span></a><span data-dcnode-id="4857" instrument_node="">). Given that consumers already possess a rich network of associations representing an object, attitudes, and behavior appear more difficult to change (Cacioppo et al. </span><a aria-label="Reference 1992" data-dcnode-id="4855" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d192725775e887" title=""><span data-dcnode-id="4856" instrument_node="">1992</span></a><span data-dcnode-id="4854" instrument_node="">). Accordingly, Ambroise et al. (</span><a aria-label="Reference 2014" data-dcnode-id="4852" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d192725775e890" title=""><span data-dcnode-id="4853" instrument_node="">2014</span></a><span data-dcnode-id="4851" instrument_node="">) reported stronger celebrity endorsement effects with unfamiliar compared to familiar brands. Similarly, Shimp et al. (</span><a aria-label="Reference 1991" data-dcnode-id="4849" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d192725775e893" title=""><span data-dcnode-id="4850" instrument_node="">1991</span></a><span data-dcnode-id="4848" instrument_node="">) showed the likelihood of conditioning effects for unknown or moderately known objects, but not for well-known ones. We consequently propose stronger celebrity endorsement effects for unfamiliar objects when compared to familiar ones.</span></p><blockquote class="c-blockquote" data-dcnode-id="4841"><div class="c-blockquote__body" data-dcnode-id="4842"><span data-dcnode-id="4846" instrument_node="">
</span><p data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">H9: Celebrity endorsement effects are stronger for unfamiliar objects when compared to familiar ones.</span></p><span data-dcnode-id="4843" instrument_node="">
</span></div></blockquote><span data-dcnode-id="4840" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4838" id="FPar8"><span data-dcnode-id="4839" instrument_node="">Endorsement type of the comparison group</span></h3><span data-dcnode-id="4837" instrument_node="">
</span><p data-dcnode-id="4814"><span data-dcnode-id="4836" instrument_node="">Investigating the effectiveness of celebrity endorsements through experiments, researchers have chosen various control groups. Frequently, celebrities are compared with a non-endorsed condition (e.g., *Martín-Santana and Beerli-Palacio </span><a aria-label="Reference 2013" data-dcnode-id="4834" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d192725775e910" title=""><span data-dcnode-id="4835" instrument_node="">2013</span></a><span data-dcnode-id="4833" instrument_node="">), an expert (e.g., Biswas et al. </span><a aria-label="Reference 2006" data-dcnode-id="4831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d192725775e913" title=""><span data-dcnode-id="4832" instrument_node="">2006</span></a><span data-dcnode-id="4830" instrument_node="">), or an ordinary consumer (e.g., *Dong </span><a aria-label="Reference 2015" data-dcnode-id="4828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d192725775e916" title=""><span data-dcnode-id="4829" instrument_node="">2015</span></a><span data-dcnode-id="4827" instrument_node="">). Less frequently, celebrities are compared with an unknown model or athlete (e.g., *Roozen and Claeys </span><a aria-label="Reference 2010" data-dcnode-id="4825" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d192725775e919" title=""><span data-dcnode-id="4826" instrument_node="">2010</span></a><span data-dcnode-id="4824" instrument_node="">), an employee of the selling company (*Maronick </span><a aria-label="Reference 2005" data-dcnode-id="4822" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d192725775e922" title=""><span data-dcnode-id="4823" instrument_node="">2005</span></a><span data-dcnode-id="4821" instrument_node="">), a quality seal or an award (*Dean and Biswas </span><a aria-label="Reference 2001" data-dcnode-id="4819" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d192725775e926" title=""><span data-dcnode-id="4820" instrument_node="">2001</span></a><span data-dcnode-id="4818" instrument_node="">), or an endorser brand from the same product category (*Sengupta et al. </span><a aria-label="Reference 1997" data-dcnode-id="4816" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d192725775e929" title=""><span data-dcnode-id="4817" instrument_node="">1997</span></a><span data-dcnode-id="4815" instrument_node="">). Studies typically apply one or two of these comparison groups. Thus, they enable assertions about whether celebrity endorsements outperform a single kind of endorsement or no endorsement. By contrast, meta-analysis enables comparisons across all types of endorsements simultaneously. Therefore, we can see whether celebrity endorsements outperform any other kind of endorsement. We can also test whether specific differences in performance (e.g., celebrity vs. expert) are significantly different from other performance differences (e.g., celebrity vs. ordinary consumer). Marketing managers can thus gain valuable knowledge when deciding on celebrity endorsers, any other kind of endorsement, or no endorsement at all. We consequently ask:</span></p><blockquote class="c-blockquote" data-dcnode-id="4808"><div class="c-blockquote__body" data-dcnode-id="4809"><span data-dcnode-id="4813" instrument_node="">
</span><p data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">RQ1: Do celebrity endorsements differ in their effectiveness depending on the control group applied?</span></p><span data-dcnode-id="4810" instrument_node="">
</span></div></blockquote><span data-dcnode-id="4807" instrument_node="">
</span><p data-dcnode-id="4802"><span data-dcnode-id="4806" instrument_node="">A concise summary of the existing knowledge on celebrity endorsement effects can be found in Table </span><a data-dcnode-id="4804" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4805" instrument_node="">1</span></a><span data-dcnode-id="4803" instrument_node="">. Looking at the main results, celebrity endorsements are shown to affect cognitive, affective, and conative outcomes. Furthermore, most studies have looked at endorsements of for-profit causes. Results frequently appear to be mixed. In addition, some studies show no effects at all. This meta-analysis will shed light on these mixed results by calculating an overall effect. In addition, mixed results can be clarified by adding potential moderators to the analysis. Furthermore, the meta-analysis will close gaps in the literature by investigating between-study differences that cannot be explored with single studies (e.g., endorser sex, endorser type, endorsement explicitness). Looking at the investigated outcomes, most studies have investigated affective reactions followed by cognitive and conative ones. Meta-analysis will provide insights about whether there are any differences in terms of effectiveness per outcome type.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4787" data-test="inline-table" id="table-1"><figure data-dcnode-id="4788"><figcaption class="c-article-table__figcaption" data-dcnode-id="4799"><b data-dcnode-id="4800" data-test="table-caption" id="Tab1"><span data-dcnode-id="4801" instrument_node="">Table 1 Summary of research on the effectiveness of celebrity endorsements</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4789"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="4790" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/tables/1" rel="nofollow"><span data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4791" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4792" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4793" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4796" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4795" fill-rule="evenodd"></path><span data-dcnode-id="4794" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4786" instrument_node="">
</span></div></div></section><section data-dcnode-id="4484" data-title="Methods"><div class="c-article-section" data-dcnode-id="4485" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4781" id="Sec6"><span data-dcnode-id="4782" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="4486" id="Sec6-content"><h3 class="c-article__sub-heading" data-dcnode-id="4779" id="Sec7"><span data-dcnode-id="4780" instrument_node="">Study retrieval</span></h3><span data-dcnode-id="4778" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4776" id="FPar9"><span data-dcnode-id="4777" instrument_node="">Literature search</span></h3><span data-dcnode-id="4775" instrument_node="">
</span><p data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">Studies were collected from three major databases (Business Source Premier, PsychINFO, Communication and Mass Media Complete). The search included all peer-reviewed articles written in English and published through April 2016. The databases were examined using the term celebrit* in combination with endors*, spokes*, or advert* in any available search field. The search resulted in 1025 articles. About 300 of them were quantitative studies, including content analyses, surveys, and experimental studies.</span></p><span data-dcnode-id="4772" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4770" id="FPar10"><span data-dcnode-id="4771" instrument_node="">Inclusion criteria</span></h3><span data-dcnode-id="4769" instrument_node="">
</span><p data-dcnode-id="4749"><span data-dcnode-id="4768" instrument_node="">These quantitative studies were narrowed down based on the impact of celebrity endorsements on endorsed objects. Three criteria had to be met. First, only experimental studies were included because only they enable causal assertions (Shaughnessy and Zechmeister </span><a aria-label="Reference 1997" data-dcnode-id="4766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d192725775e1140" title=""><span data-dcnode-id="4767" instrument_node="">1997</span></a><span data-dcnode-id="4765" instrument_node="">). The studies had to compare an experimental group to a control group. While the experimental group had to feature a celebrity endorsing an object, the control group had to include the same object, either non-endorsed or endorsed by a non-celebrity spokesperson. Studies that compared various types of celebrity endorsements but did not feature a non-celebrity control group were excluded (e.g., Ambroise et al. </span><a aria-label="Reference 2014" data-dcnode-id="4763" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d192725775e1143" title=""><span data-dcnode-id="4764" instrument_node="">2014</span></a><span data-dcnode-id="4762" instrument_node="">; Kamins </span><a aria-label="Reference 1990" data-dcnode-id="4760" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d192725775e1146" title=""><span data-dcnode-id="4761" instrument_node="">1990</span></a><span data-dcnode-id="4759" instrument_node="">). Second, the celebrities had to be actually existing celebrities, thus excluding studies that investigated the impact of fictitious and imagined celebrities, as their validity is arguably limited. Third, the studies also had to report effect measures related to the endorsed object, excluding studies that solely reported measures related to the endorser (e.g., Cho </span><a aria-label="Reference 2010" data-dcnode-id="4757" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d192725775e1149" title=""><span data-dcnode-id="4758" instrument_node="">2010</span></a><span data-dcnode-id="4756" instrument_node="">) or the general acceptance of celebrity endorsements (e.g., Becker </span><a aria-label="Reference 2013" data-dcnode-id="4754" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d192725775e1152" title=""><span data-dcnode-id="4755" instrument_node="">2013</span></a><span data-dcnode-id="4753" instrument_node="">). In addition, a measure was considered only if it was possible to obtain at least two effect sizes. Otherwise, the meta-analyzed effect size would equal the sole obtained effect size, rendering meta-analysis useless. This resulted in 15 eligible measures: attention to and interest in an ad, awareness of an endorsed object (recognition and recall), attitude toward an ad, attitude toward the endorsed object, perceived credibility of the ad and advertiser, meaning transfer (in the sense of transferring a celebrity’s meaning to a brand), evoked feelings, estimated price of a product, taste of a product, estimated information value of an ad, planning to inform oneself more about an endorsed object, perceived increase of knowledge, perceived risk when buying or using a product, brand choice, and behavioral intentions (intention to purchase or use an object, intention to volunteer, intention to support a charitable cause by spending time or money, and intention to share an endorsed object online; cf. Motyka et al. </span><a aria-label="Reference 2014" data-dcnode-id="4751" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d192725775e1156" title=""><span data-dcnode-id="4752" instrument_node="">2014</span></a><span data-dcnode-id="4750" instrument_node="">). No limitations were placed regarding the endorsed object encompassing any kind of object, such as product, brand, organization, behavior, or charitable cause.</span></p><span data-dcnode-id="4748" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4746" id="FPar11"><span data-dcnode-id="4747" instrument_node="">Results</span></h3><span data-dcnode-id="4745" instrument_node="">
</span><p data-dcnode-id="4707"><span data-dcnode-id="4744" instrument_node="">Based on these criteria, 44 manuscripts remained (the majority of the 300 quantitative studies were content analyses, surveys, or experimental studies comparing celebrities with celebrities). Eight of these (Chou </span><a aria-label="Reference 2014" data-dcnode-id="4742" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d192725775e1167" title=""><span data-dcnode-id="4743" instrument_node="">2014</span></a><span data-dcnode-id="4741" instrument_node="">; Fireworker and Friedman </span><a aria-label="Reference 1977" data-dcnode-id="4739" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d192725775e1170" title=""><span data-dcnode-id="4740" instrument_node="">1977</span></a><span data-dcnode-id="4738" instrument_node="">; Freiden </span><a aria-label="Reference 1984" data-dcnode-id="4736" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d192725775e1173" title=""><span data-dcnode-id="4737" instrument_node="">1984</span></a><span data-dcnode-id="4735" instrument_node="">; Jain et al. </span><a aria-label="Reference 2011" data-dcnode-id="4733" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d192725775e1176" title=""><span data-dcnode-id="4734" instrument_node="">2011</span></a><span data-dcnode-id="4732" instrument_node="">; Ross et al. </span><a aria-label="Reference 1984" data-dcnode-id="4730" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d192725775e1179" title=""><span data-dcnode-id="4731" instrument_node="">1984</span></a><span data-dcnode-id="4729" instrument_node="">; Sanbonmatsu and Kardes </span><a aria-label="Reference 1988" data-dcnode-id="4727" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d192725775e1183" title=""><span data-dcnode-id="4728" instrument_node="">1988</span></a><span data-dcnode-id="4726" instrument_node="">; Veer et al. </span><a aria-label="Reference 2010" data-dcnode-id="4724" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d192725775e1186" title=""><span data-dcnode-id="4725" instrument_node="">2010</span></a><span data-dcnode-id="4723" instrument_node="">) had to be excluded, as they lacked appropriate statistical information to calculate effect sizes with the formulas suggested by Lipsey and Wilson (</span><a aria-label="Reference 2001" data-dcnode-id="4721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d192725775e1189" title=""><span data-dcnode-id="4722" instrument_node="">2001</span></a><span data-dcnode-id="4720" instrument_node="">). Beforehand, all authors had been contacted and asked to provide missing statistical information if possible. According to Eisend (</span><a aria-label="Reference 2009" data-dcnode-id="4718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d192725775e1192" title=""><span data-dcnode-id="4719" instrument_node="">2009</span></a><span data-dcnode-id="4717" instrument_node="">), about 18% exclusion is not uncommon in meta-analysis, and it matches other meta-analyses in marketing (Brown and Stayman </span><a aria-label="Reference 1992" data-dcnode-id="4715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d192725775e1195" title=""><span data-dcnode-id="4716" instrument_node="">1992</span></a><span data-dcnode-id="4714" instrument_node="">; Szymanski et al. </span><a aria-label="Reference 1995" data-dcnode-id="4712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d192725775e1198" title=""><span data-dcnode-id="4713" instrument_node="">1995</span></a><span data-dcnode-id="4711" instrument_node="">; Tellis </span><a aria-label="Reference 1988" data-dcnode-id="4709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d192725775e1202" title=""><span data-dcnode-id="4710" instrument_node="">1988</span></a><span data-dcnode-id="4708" instrument_node="">). The remaining 36 manuscripts yielded 46 independent studies, coming to 10,357 participants.</span></p><span data-dcnode-id="4706" instrument_node="">
</span><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="4704" id="Sec8"><span data-dcnode-id="4705" instrument_node="">Meta-analytic procedures</span></h3><span data-dcnode-id="4703" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4701" id="FPar12"><span data-dcnode-id="4702" instrument_node="">Effect size calculation</span></h3><span data-dcnode-id="4700" instrument_node="">
</span><p data-dcnode-id="4674"><span data-dcnode-id="4699" instrument_node="">The standardized mean difference (d) was used as the effect size estimate according to the formulas provided by Lipsey and Wilson (</span><a aria-label="Reference 2001" data-dcnode-id="4697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d192725775e1218" title=""><span data-dcnode-id="4698" instrument_node="">2001</span></a><span data-dcnode-id="4696" instrument_node="">). All available statistical information was incorporated (e.g., means, standard deviations, t- and F-statistics, and frequencies). Since this effect size estimate has been shown to be upwardly biased when calculated from small sample sizes (Lipsey and Wilson </span><a aria-label="Reference 2001" data-dcnode-id="4694" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d192725775e1221" title=""><span data-dcnode-id="4695" instrument_node="">2001</span></a><span data-dcnode-id="4693" instrument_node="">), all estimates were corrected for sample size bias (Hedges </span><a aria-label="Reference 1981" data-dcnode-id="4691" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d192725775e1224" title=""><span data-dcnode-id="4692" instrument_node="">1981</span></a><span data-dcnode-id="4690" instrument_node="">). Positive d</span><i data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">-</span></i><span data-dcnode-id="4687" instrument_node="">values indicated a stronger effect of a celebrity endorsement compared to a non-endorsed or non-celebrity endorsed message, whereas negative d</span><i data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">-</span></i><span data-dcnode-id="4684" instrument_node="">values indicated a stronger effect of the non-endorsed or non-celebrity endorsed message. In total, 367 effect sizes were obtained. The ratio of effect sizes (367) to the number of studies (46) is the rule rather than the exception when analyzing various dependent variables (Eisend </span><a aria-label="Reference 2006" data-dcnode-id="4682" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d192725775e1234" title=""><span data-dcnode-id="4683" instrument_node="">2006</span></a><span data-dcnode-id="4681" instrument_node="">, </span><a aria-label="Reference 2009" data-dcnode-id="4679" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d192725775e1237" title=""><span data-dcnode-id="4680" instrument_node="">2009</span></a><span data-dcnode-id="4678" instrument_node="">; Szymanski et al. </span><a aria-label="Reference 1995" data-dcnode-id="4676" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d192725775e1240" title=""><span data-dcnode-id="4677" instrument_node="">1995</span></a><span data-dcnode-id="4675" instrument_node="">).</span></p><span data-dcnode-id="4673" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4671" id="FPar13"><span data-dcnode-id="4672" instrument_node="">Effect size integration and meta-analysis</span></h3><span data-dcnode-id="4670" instrument_node="">
</span><p data-dcnode-id="4659"><span data-dcnode-id="4669" instrument_node="">Estimates were based on random-effects models. Fixed-effects models assume that all studies included in the meta-analysis are practically identical, having the same true effect size. In contrast, random-effects models assume differing true effect sizes varying, for instance, because of different participants or treatments. Specifically, true effect sizes are assumed to be distributed around some mean whereby the studies included in the analysis are assumed to represent a random sample (Borenstein et al. </span><a aria-label="Reference 2009" data-dcnode-id="4667" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d192725775e1251" title=""><span data-dcnode-id="4668" instrument_node="">2009</span></a><span data-dcnode-id="4666" instrument_node="">). This model was much more realistic, as participants and study settings certainly differed across studies. In addition, results may be generalized because the investigated studies are treated as a random subset of a larger study population (Hedges and Vevea </span><a aria-label="Reference 1998" data-dcnode-id="4664" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d192725775e1254" title=""><span data-dcnode-id="4665" instrument_node="">1998</span></a><span data-dcnode-id="4663" instrument_node="">). Several studies reported results that enabled obtaining more than one effect size per dependent variable. Performing a meta-analysis on these studies would violate the assumption of independence of effect sizes and assign more weight to the studies producing more than one effect size. Previous studies mostly ignored these problems, aggregated effect sizes into a single effect size (or chose only one effect size per study), or performed the so-called shifting the unit of analysis approach (Cheung </span><a aria-label="Reference 2014" data-dcnode-id="4661" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d192725775e1257" title=""><span data-dcnode-id="4662" instrument_node="">2014</span></a><span data-dcnode-id="4660" instrument_node="">). This approach averages effect sizes within differing units depending on the current research question (e.g., study as a unit or study characteristics, such as gender of participants as a unit).</span></p><span data-dcnode-id="4658" instrument_node="">
</span><p data-dcnode-id="4629"><span data-dcnode-id="4657" instrument_node="">While ignoring these problems is clearly not satisfactory, the latter two approaches are rather broadly accepted (Borenstein et al. </span><a aria-label="Reference 2009" data-dcnode-id="4655" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d192725775e1263" title=""><span data-dcnode-id="4656" instrument_node="">2009</span></a><span data-dcnode-id="4654" instrument_node="">; Cooper </span><a aria-label="Reference 2010" data-dcnode-id="4652" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d192725775e1266" title=""><span data-dcnode-id="4653" instrument_node="">2010</span></a><span data-dcnode-id="4651" instrument_node="">). However, aggregating effect sizes or choosing only one effect size per study may strongly reduce the number of effect sizes, thus lowering the power of statistical tests. In addition, statistical information is lost, resulting in less precise estimates. The same deficits apply to shifting the unit of analysis (Cheung </span><a aria-label="Reference 2014" data-dcnode-id="4649" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d192725775e1269" title=""><span data-dcnode-id="4650" instrument_node="">2014</span></a><span data-dcnode-id="4648" instrument_node="">). Researchers recently suggested treating meta-analysis as a multilevel model to address these drawbacks (e.g., Cheung </span><a aria-label="Reference 2014" data-dcnode-id="4646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d192725775e1272" title=""><span data-dcnode-id="4647" instrument_node="">2014</span></a><span data-dcnode-id="4645" instrument_node="">; Field </span><a aria-label="Reference 2015" data-dcnode-id="4643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d192725775e1275" title=""><span data-dcnode-id="4644" instrument_node="">2015</span></a><span data-dcnode-id="4642" instrument_node="">; Konstantopoulos </span><a aria-label="Reference 2011" data-dcnode-id="4640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d192725775e1279" title=""><span data-dcnode-id="4641" instrument_node="">2011</span></a><span data-dcnode-id="4639" instrument_node="">). The basic idea nests the effect sizes (first level) within the studies (second level; Konstantopoulos </span><a aria-label="Reference 2011" data-dcnode-id="4637" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d192725775e1282" title=""><span data-dcnode-id="4638" instrument_node="">2011</span></a><span data-dcnode-id="4636" instrument_node="">). The resulting model then looks like Eqs. (</span><a data-dcnode-id="4634" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="4635" instrument_node="">1</span></a><span data-dcnode-id="4633" instrument_node="">) and (</span><a data-dcnode-id="4631" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ2"><span data-dcnode-id="4632" instrument_node="">2</span></a><span data-dcnode-id="4630" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="4620" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="4623"><span class="mathjax-tex" data-dcnode-id="4624"><span class="MathJax_Preview" data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node=""> {\gamma}_i={\lambda}_i+{e}_i\left( first\  level\  or\  within- study\  model\right) </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">
                    (1)
                </span></div></div><span data-dcnode-id="4619" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4610" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="4613"><span class="mathjax-tex" data-dcnode-id="4614"><span class="MathJax_Preview" data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node=""> {\lambda}_i={\beta}_0+{u}_i\left( second\  level\  or\  between- study\  model\right). </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">
                    (2)
                </span></div></div><span data-dcnode-id="4609" instrument_node="">
</span><p data-dcnode-id="4586"><span data-dcnode-id="4608" instrument_node="">“Effect sizes (γ) in the ith study are predicted from the ‘true’ effect size for that study (λ</span><sub data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">i</span></sub><span data-dcnode-id="4605" instrument_node="">) and some error (e</span><sub data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">i</span></sub><span data-dcnode-id="4602" instrument_node="">) (note that the variance of e</span><sub data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">i</span></sub><span data-dcnode-id="4599" instrument_node=""> is the sampling variance of that study). The true effect size for a study is made up of the average population effect (β</span><sub data-dcnode-id="4597"><span data-dcnode-id="4598" instrument_node="">0</span></sub><span data-dcnode-id="4596" instrument_node="">) – which is the thing we usually want to estimate in meta-analysis – and some between-study error (u</span><sub data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">i</span></sub><span data-dcnode-id="4593" instrument_node="">) (note that the variance of this between-study error is the heterogeneity of effect sizes across studies, which in traditional meta-analysis is denoted as τ</span><sup data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">2</span></sup><span data-dcnode-id="4590" instrument_node="">)” (Field </span><a aria-label="Reference 2015" data-dcnode-id="4588" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d192725775e1427" title=""><span data-dcnode-id="4589" instrument_node="">2015</span></a><span data-dcnode-id="4587" instrument_node="">, p. 18).</span></p><span data-dcnode-id="4585" instrument_node="">
</span><p data-dcnode-id="4580"><span data-dcnode-id="4584" instrument_node="">Writing the model in a single-level notation results in Eq. (</span><a data-dcnode-id="4582" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ3"><span data-dcnode-id="4583" instrument_node="">3</span></a><span data-dcnode-id="4581" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="4571" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="4574"><span class="mathjax-tex" data-dcnode-id="4575"><span class="MathJax_Preview" data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node=""> {\gamma}_i={\beta}_0+{u}_i+{e}_i. </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">
                    (3)
                </span></div></div><span data-dcnode-id="4570" instrument_node="">
</span><p data-dcnode-id="4547"><span data-dcnode-id="4569" instrument_node="">In this equation, it becomes evident that the variance of an observed effect size (γ</span><sub data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">i</span></sub><span data-dcnode-id="4566" instrument_node="">) is decomposed into a sampling variance component (e</span><sub data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">i</span></sub><span data-dcnode-id="4563" instrument_node="">) and the between-study error or random effect (u</span><sub data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">i</span></sub><span data-dcnode-id="4560" instrument_node="">), as in traditional meta-analysis. However, since u</span><sub data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">i</span></sub><span data-dcnode-id="4557" instrument_node=""> denotes a study-specific random effect of an ith study, the same random effect can be assigned to effect sizes stemming from the same study while effect sizes stemming from different studies receive different random effects (Konstantopoulos </span><a aria-label="Reference 2011" data-dcnode-id="4555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d192725775e1504" title=""><span data-dcnode-id="4556" instrument_node="">2011</span></a><span data-dcnode-id="4554" instrument_node="">; Viechtbauer </span><a aria-label="Reference 2015" data-dcnode-id="4552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d192725775e1508" title=""><span data-dcnode-id="4553" instrument_node="">2015</span></a><span data-dcnode-id="4551" instrument_node="">). Consequently, all effect sizes can be taken into account without aggregation and loss of information. The dependence or independence of the effect sizes is explicitly modeled by assigning the correct random effect. Furthermore, a third level may be introduced when estimating an overall effect size composed of effect sizes (first level) nested within different types of effect sizes, that is, dependent variables (second level), which are, in turn, nested within different studies (third level). The variance would then be decomposed into sampling variance, between-type of effect size variability, and between-study variability. This analysis is necessary for testing whether it makes sense to analyze different types of effect sizes separately (between-type of effect size variability) and whether it makes sense to analyze our moderators at all (between-study variability; Konstantopoulos </span><a aria-label="Reference 2011" data-dcnode-id="4549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d192725775e1511" title=""><span data-dcnode-id="4550" instrument_node="">2011</span></a><span data-dcnode-id="4548" instrument_node="">).</span></p><span data-dcnode-id="4546" instrument_node="">
</span><p data-dcnode-id="4532"><span data-dcnode-id="4545" instrument_node="">Following these recommendations, all analyses were carried out using the rma.mv() function of the R metafor package (Viechtbauer </span><a aria-label="Reference 2010" data-dcnode-id="4543" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d192725775e1517" title=""><span data-dcnode-id="4544" instrument_node="">2010</span></a><span data-dcnode-id="4542" instrument_node="">). A maximum likelihood estimator, the typical method to estimate multilevel models, was applied (see Konstantopoulos </span><a aria-label="Reference 2011" data-dcnode-id="4540" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d192725775e1520" title=""><span data-dcnode-id="4541" instrument_node="">2011</span></a><span data-dcnode-id="4539" instrument_node="">; van den Noortgate et al. </span><a aria-label="Reference 2014" data-dcnode-id="4537" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d192725775e1523" title=""><span data-dcnode-id="4538" instrument_node="">2014</span></a><span data-dcnode-id="4536" instrument_node="">). Average effect sizes were estimated taking the random-effects perspective, and moderator analyses were performed applying the mixed-effects models (meta-regression). As the studies showed considerable variance in sample size and some studies produced multiple effect size estimates, effect sizes were weighted by sample size and the number of effect sizes per study. Specifically, effects sizes were weighted by the ratio of their study’s sample size to the number of effect sizes measuring the same dependent variable within the study (Eisend </span><a aria-label="Reference 2009" data-dcnode-id="4534" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d192725775e1526" title=""><span data-dcnode-id="4535" instrument_node="">2009</span></a><span data-dcnode-id="4533" instrument_node="">). As a result, studies reporting only one effect size received the same weight as studies reporting multiple effect sizes if their sample size was equal.</span></p><span data-dcnode-id="4531" instrument_node="">
</span><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="4529" id="Sec9"><span data-dcnode-id="4530" instrument_node="">Moderators</span></h3><p data-dcnode-id="4524"><span data-dcnode-id="4528" instrument_node="">The moderators can be grouped as endorser variables, endorsed object variables, and endorsement type of the comparison group. The variables were coded by two independent coders based on the information available in the manuscripts and complemented by the English Wikipedia pages of celebrities where necessary. Agreement was perfect except for endorser match, which yielded an acceptable Krippendorff’s alpha of .74 (Krippendorff </span><a aria-label="Reference 2004" data-dcnode-id="4526" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d192725775e1538" title=""><span data-dcnode-id="4527" instrument_node="">2004</span></a><span data-dcnode-id="4525" instrument_node="">). Discrepancies were resolved by discussion after a review of the article.</span></p><span data-dcnode-id="4523" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4521" id="FPar14"><span data-dcnode-id="4522" instrument_node="">Endorser variables</span></h3><span data-dcnode-id="4520" instrument_node="">
</span><p data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">The endorser’s sex was coded as female (0) or male (1), according to the description of the study authors. Typical descriptions were male/female, Mr./Mrs., or he/she. If the manuscript provided no gender information, the endorser’s English Wikipedia page was consulted. The endorser type was coded as actor (0), model (1), athlete (2), musician (3), or TV host (4), according to the description of the authors. The authors typically described their celebrities by using one of the aforementioned professions. If the manuscript provided no related information, the endorser’s English Wikipedia page was consulted. If the Wikipedia page presented various professions, the first was chosen.</span></p><span data-dcnode-id="4517" instrument_node="">
</span><p data-dcnode-id="4509"><span data-dcnode-id="4516" instrument_node="">The endorser match was coded as incongruent (0) or congruent (1), according to the description of the authors. Frequently used descriptions were not matching/matching, not fitting/fitting, or being incongruent/congruent to an endorsed object. Furthermore, some studies reported pretests explicitly testing the congruence of the endorser and endorsed object. The moderator was then coded accordingly. If the authors used existing advertising, the endorser was coded as congruent because advertisers usually put considerable time and effort into finding a matching endorser (Erdogan </span><a aria-label="Reference 1999" data-dcnode-id="4514" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d192725775e1551" title=""><span data-dcnode-id="4515" instrument_node="">1999</span></a><span data-dcnode-id="4513" instrument_node="">). The endorsement explicitness was coded as implicit (0) or explicit (1) according to the description of the authors. Following *Miller and Allen (</span><a aria-label="Reference 2012" data-dcnode-id="4511" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d192725775e1554" title=""><span data-dcnode-id="4512" instrument_node="">2012</span></a><span data-dcnode-id="4510" instrument_node="">), the endorsement was coded as implicit when the endorser and the endorsed object appeared merely as paired without the endorser explicitly announcing his or her endorsement (e.g., classical conditioning procedure or ad merely displaying object and celebrity). An explicit endorsement was coded if the endorser’s support for an object could be explicitly read or heard by the study participants (e.g., “I think XY is …” or “I love XY”). In addition, signatures were coded as explicit endorsements.</span></p><span data-dcnode-id="4508" instrument_node="">
</span><p data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">The endorsement frequency was coded continuously starting from one (1) and stretching—theoretically—infinitely, though the maximum number of endorsements was 10.</span></p><span data-dcnode-id="4505" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4503" id="FPar15"><span data-dcnode-id="4504" instrument_node="">Endorsed object variables</span></h3><span data-dcnode-id="4502" instrument_node="">
</span><p data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">The familiarity of the endorsed object was coded as unfamiliar (0) or familiar (1) according to the description of the authors. Familiarity refers to whether the endorsed object was known by the participants. Typical descriptions in the articles were unknown/known, fictitious, or having a strong reputation. Furthermore, some studies reported pretests assessing object familiarity. The moderator was then coded accordingly.</span></p><span data-dcnode-id="4499" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4497" id="FPar16"><span data-dcnode-id="4498" instrument_node="">Endorsement type of the comparison group</span></h3><span data-dcnode-id="4496" instrument_node="">
</span><p data-dcnode-id="4488"><span data-dcnode-id="4495" instrument_node="">We coded whether the comparison group perceived the object as non-endorsed (0; appearing without any support) or as endorsed by a non-celebrity spokesperson or organization. The endorsed categories were expert (1), an employee of the selling company (2), an ordinary consumer (3), an unknown model or athlete (4), a quality seal or award (5), a government employee</span><sup data-dcnode-id="4490"><a data-dcnode-id="4491" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">Footnote </span></span><span data-dcnode-id="4492" instrument_node="">1</span></a></sup><span data-dcnode-id="4489" instrument_node=""> (6), or an endorser brand from the same product category (7). The authors typically described the comparison groups by using one of the aforementioned category names.</span></p><span data-dcnode-id="4487" instrument_node="">
</span></div></div></section><section data-dcnode-id="4239" data-title="Results"><div class="c-article-section" data-dcnode-id="4240" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4482" id="Sec10"><span data-dcnode-id="4483" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="4241" id="Sec10-content"><h3 class="c-article__sub-heading" data-dcnode-id="4480" id="Sec11"><span data-dcnode-id="4481" instrument_node="">Overall analysis</span></h3><p data-dcnode-id="4460"><span data-dcnode-id="4479" instrument_node="">Testing first whether it makes sense to analyze different types of effect sizes separately and whether it makes sense to analyze the moderators at all, we calculated the three-level model (Konstantopoulos </span><a aria-label="Reference 2011" data-dcnode-id="4477" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d192725775e1599" title=""><span data-dcnode-id="4478" instrument_node="">2011</span></a><span data-dcnode-id="4476" instrument_node="">). Effect sizes (first level) were nested within different types of effect sizes (second level), which were, in turn, nested within different studies (third level). We observed no significant overall effect of the celebrity endorsements on participants’ responses (d&nbsp;=&nbsp;.04, 95% CI (−.09, .17), ns). However, highly significant heterogeneity was found among effect sizes (Q (366)&nbsp;=&nbsp;1095.77, </span><i data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">p</span></i><span data-dcnode-id="4473" instrument_node="">&nbsp;&lt;&nbsp;.001). This suggests that effect sizes vary considerably due to the type of effect size differences (second level) and/or study differences (third level). The I</span><sup data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">2</span></sup><span data-dcnode-id="4470" instrument_node=""> statistic—the amount of total variability (sampling variance + heterogeneity) that can be attributed to the heterogeneity among the true effects (Higgins and Thompson </span><a aria-label="Reference 2002" data-dcnode-id="4468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d192725775e1607" title=""><span data-dcnode-id="4469" instrument_node="">2002</span></a><span data-dcnode-id="4467" instrument_node="">)—provided more details. About half the total variability could be attributed to the between-study heterogeneity (I</span><sup data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">2</span></sup><span data-dcnode-id="4464" instrument_node="">&nbsp;=&nbsp;51.53%, third level) and about 11% could be attributed to the between-type of effect size within study heterogeneity (I</span><sup data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">2</span></sup><span data-dcnode-id="4461" instrument_node="">&nbsp;=&nbsp;11.45%, second level). Hence, it seemed reasonable to explain the between-study heterogeneity by moderator analysis and to examine the different types of effect sizes separately, given their heterogeneity.</span></p><p data-dcnode-id="4446"><span data-dcnode-id="4459" instrument_node="">Table </span><a data-dcnode-id="4457" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4458" instrument_node="">2</span></a><span data-dcnode-id="4456" instrument_node=""> shows the meta-analytic results for the most frequently investigated dependent variables.</span><sup data-dcnode-id="4451"><a data-dcnode-id="4452" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">Footnote </span></span><span data-dcnode-id="4453" instrument_node="">2</span></a></sup><span data-dcnode-id="4450" instrument_node=""> The first column presents the average effect size for a specific dependent variable. The second and third column display subgroup results of this average effect size. They differentiate studies that featured a comparison group receiving no endorsement (second column) from studies that featured a comparison group receiving an object endorsed by a non-celebrity spokesperson (third column). In addition, the third column specifies the particular types of endorsements received by the comparison groups. There were almost no average effects for any of the dependent variables. Only one significant effect size emerged. Celebrity endorsements positively affected consumers attitudes toward the endorsed object when celebrity endorsements were compared to a non-endorsed condition (d&nbsp;=&nbsp;.24; 95% CI (.04, .43), </span><i data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">p</span></i><span data-dcnode-id="4447" instrument_node="">&nbsp;&lt;&nbsp;.05). As opposed to this affective effect, there were neither cognitive nor conative effects on average.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4431" data-test="inline-table" id="table-2"><figure data-dcnode-id="4432"><figcaption class="c-article-table__figcaption" data-dcnode-id="4443"><b data-dcnode-id="4444" data-test="table-caption" id="Tab2"><span data-dcnode-id="4445" instrument_node="">Table 2 Meta-analytic results (Random-Effects Model) for dependent variables arranged according to average effect size, effect size based on comparisons with no endorsement, and effect size based on comparisons with other endorsements</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4433"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="4434" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/tables/2" rel="nofollow"><span data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4435" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4436" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4437" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4440" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4439" fill-rule="evenodd"></path><span data-dcnode-id="4438" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4430" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4428" id="Sec12"><span data-dcnode-id="4429" instrument_node="">Moderator analysis</span></h3><p data-dcnode-id="4399"><span data-dcnode-id="4427" instrument_node="">Moderator analyses were conducted for the dependent variables of attitude toward the endorsed object, attitude toward the ad, and behavioral intention, all featuring a sufficient number of effect sizes to conduct the analyses (Higgins and Green </span><a aria-label="Reference 2011" data-dcnode-id="4425" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d192725775e2091" title=""><span data-dcnode-id="4426" instrument_node="">2011</span></a><span data-dcnode-id="4424" instrument_node="">). Tests for heterogeneity revealed significant heterogeneity among all three types of effect sizes (attitude toward the endorsed object: Q (116)&nbsp;=&nbsp;372.67, I</span><sup data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">2</span></sup><span data-dcnode-id="4421" instrument_node="">&nbsp;=&nbsp;68.87%, </span><i data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">p</span></i><span data-dcnode-id="4418" instrument_node="">&nbsp;&lt;&nbsp;.001; attitude toward the ad: Q (44)&nbsp;=&nbsp;200.81, I</span><sup data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">2</span></sup><span data-dcnode-id="4415" instrument_node="">&nbsp;=&nbsp;78.11%, </span><i data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">p</span></i><span data-dcnode-id="4412" instrument_node="">&nbsp;&lt;&nbsp;.001; behavioral intention: Q (92)&nbsp;=&nbsp;188.33, I</span><sup data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">2</span></sup><span data-dcnode-id="4409" instrument_node="">&nbsp;=&nbsp;51.15%, </span><i data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">p</span></i><span data-dcnode-id="4406" instrument_node="">&nbsp;&lt;&nbsp;.001). As indicated by the I</span><sup data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">2</span></sup><span data-dcnode-id="4403" instrument_node=""> statistic, the level of heterogeneity was medium to high, suggesting great between-study variability that may be explained by the moderators (Huedo-Medina et al. </span><a aria-label="Reference 2006" data-dcnode-id="4401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d192725775e2112" title=""><span data-dcnode-id="4402" instrument_node="">2006</span></a><span data-dcnode-id="4400" instrument_node="">).</span></p><p data-dcnode-id="4376"><span data-dcnode-id="4398" instrument_node="">Table </span><a data-dcnode-id="4396" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="4397" instrument_node="">3</span></a><span data-dcnode-id="4395" instrument_node=""> presents the results of the first meta-regression testing the influence of the comparison group’s endorsement on the effect size for attitude toward the object. The analysis was conducted only for this dependent variable. Only this measure allowed for the simultaneous analysis of almost all the moderator categories. The category of employee of the selling company was missing because no study included both attitude toward the endorsed object and employee of the selling company. The comparison group’s endorsement is a categorical variable, so the moderator was dummy coded with no endorsement (0) representing the reference category (Field </span><a aria-label="Reference 2013" data-dcnode-id="4393" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d192725775e2121" title=""><span data-dcnode-id="4394" instrument_node="">2013</span></a><span data-dcnode-id="4392" instrument_node="">). As a result, the intercept’s coefficient (Table </span><a data-dcnode-id="4390" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="4391" instrument_node="">3</span></a><span data-dcnode-id="4389" instrument_node="">), being significant and positive, represents the average effect size of celebrity endorsements compared to a non-endorsed group. The remaining regression coefficients represent the change in this effect size when the comparison group features some kind of endorsement instead of no endorsement. As seen in Table </span><a data-dcnode-id="4387" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="4388" instrument_node="">3</span></a><span data-dcnode-id="4386" instrument_node="">, the effect size decreased when the comparison group featured some other kind of endorsement, as indicated by all the regression coefficients being negative. However, the decrease appeared to be significant only when celebrity endorsements were compared to endorsements of an unknown model or athlete, quality seal or award, government employee, or endorser brand. Subtracting these decreases from the intercept (.24), it became evident that the respective effect size was then negative in all cases. A separate test for significance revealed these negative effect sizes to be (marginally) significant for a quality seal or award endorsement, and a endorser brand (unknown model: d&nbsp;=&nbsp;−.32, 95% CI (−.73, .08), </span><i data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">ns</span></i><span data-dcnode-id="4383" instrument_node="">; quality seal: d&nbsp;=&nbsp;−.44, 95% CI (−.81, −.07), </span><i data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">p</span></i><span data-dcnode-id="4380" instrument_node="">&nbsp;&lt;&nbsp;.05; government employee: d&nbsp;=&nbsp;−.45, 95% CI (−1.01, .12), ns; endorser brand: d&nbsp;=&nbsp;−.58, 95% CI (−1.16, .01), </span><i data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">p</span></i><span data-dcnode-id="4377" instrument_node="">&nbsp;=&nbsp;.05). In terms of the research question, it can thus be concluded that celebrity endorsements perform worse compared to quality seals, award endorsements, or endorser brands, but they perform better when compared to no endorsement.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4361" data-test="inline-table" id="table-3"><figure data-dcnode-id="4362"><figcaption class="c-article-table__figcaption" data-dcnode-id="4373"><b data-dcnode-id="4374" data-test="table-caption" id="Tab3"><span data-dcnode-id="4375" instrument_node="">Table 3 Meta-regression results for testing the influence of comparison group’s endorsement type on effect size (attitude toward the endorsed object; k&nbsp;=&nbsp;117)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4363"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="4364" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/tables/3" rel="nofollow"><span data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4365" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4366" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4367" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4370" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4369" fill-rule="evenodd"></path><span data-dcnode-id="4368" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4360" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4359" instrument_node="">Further meta-regressions were conducted to integrate all assumed moderators (Table </span><a data-dcnode-id="4357" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="4358" instrument_node="">4</span></a><span data-dcnode-id="4356" instrument_node="">). The moderators were entered hierarchically starting with comparison group’s endorsement (Model 1), followed by endorser variables (Model 2), and eventually complemented by an endorsed object variable (Model 3). For the moderator comparison group’s endorsement, the categories were merged into two groups (no endorsement (0) vs. non-celebrity endorsement (1), as in Table </span><a data-dcnode-id="4354" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4355" instrument_node="">2</span></a><span data-dcnode-id="4353" instrument_node="">. The remaining moderators were coded as displayed in the methods section. The endorser type was dummy coded with actor (0) representing the reference category. The results can be seen in Table </span><a data-dcnode-id="4351" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="4352" instrument_node="">4</span></a><span data-dcnode-id="4350" instrument_node="">. As can be seen, the impact of celebrity endorsements decreased when compared to an endorsed comparison group instead of a non-endorsed one (Model 1, first column). Looking at the endorser variables (Model 2, first column), we see that male endorsers performed substantially better than female endorsers, supporting H4. Looking at endorser type, effect size decreased when an object was endorsed by a model, athlete, musician, or TV host instead of an actor (the reference category). However, only a model, musician, or TV host performed significantly less well. Hypothesis 5 was thus partially confirmed. The product match-up hypothesis (H6) was supported, indicated by enhanced effects for congruent endorsers when compared to incongruent ones. By contrast, the seventh hypothesis was rejected, as implicit endorsements performed substantially better that explicit ones. This is the opposite of what we predicted. Likewise, the eighth hypothesis was rejected as no impact was seen for endorsement frequency.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4334" data-test="inline-table" id="table-4"><figure data-dcnode-id="4335"><figcaption class="c-article-table__figcaption" data-dcnode-id="4346"><b data-dcnode-id="4347" data-test="table-caption" id="Tab4"><span data-dcnode-id="4348" instrument_node="">Table 4 Meta-regression results for testing the impact of moderators on effect size of various dependent variables</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4336"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="4337" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/tables/4" rel="nofollow"><span data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4338" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4339" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4340" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4343" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4342" fill-rule="evenodd"></path><span data-dcnode-id="4341" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4333" instrument_node="">
</span><p data-dcnode-id="4316"><span data-dcnode-id="4332" instrument_node="">As seen at the bottom of Table </span><a data-dcnode-id="4330" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="4331" instrument_node="">4</span></a><span data-dcnode-id="4329" instrument_node="">, R</span><sup data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">2</span></sup><span data-dcnode-id="4326" instrument_node=""> indicates that more than 91% of the heterogeneity could be explained by both blocks of moderators. This explanation was significant, as indicated by the test of moderators (Q</span><sub data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">M</span></sub><span data-dcnode-id="4323" instrument_node="">&nbsp;=&nbsp;82.11, </span><i data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">p</span></i><span data-dcnode-id="4320" instrument_node="">&nbsp;&lt;&nbsp;.001). The test for residual heterogeneity indicated a significant amount of heterogeneity remaining, possibly explained by the last moderator (Q&nbsp;=&nbsp;119.08, </span><i data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">p</span></i><span data-dcnode-id="4317" instrument_node="">&nbsp;&lt;&nbsp;.001). Indeed, familiarity affected effect size as assumed in H9 (Model 3 first column). Celebrity endorsement effects were stronger for unfamiliar objects when compared to familiar ones. For attitude toward the ad and behavioral intention, the results appeared quite similar. The only differences were that endorser match had no influence on attitude toward the ad and that the influence of endorser type did partially differ in both cases. The moderators were able to explain 100&nbsp;% of the heterogeneity. The tests for residual heterogeneity were accordingly insignificant. The impact of familiarity and endorsement frequency could not be tested as all effect sizes pertained to unknown objects endorsed once.</span></p><p data-dcnode-id="4305"><span data-dcnode-id="4315" instrument_node="">The combined impact of all moderators can be seen in Table </span><a data-dcnode-id="4313" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="4314" instrument_node="">5</span></a><span data-dcnode-id="4312" instrument_node="">. It displays the predicted d values and confidence intervals for an actor endorsing an unfamiliar object a single time compared to no endorsement of the same object at varying levels of the endorser’s sex, endorser match, and endorsement mode. Values were calculated with the predict() function (Viechtbauer </span><a aria-label="Reference 2010" data-dcnode-id="4310" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d192725775e3261" title=""><span data-dcnode-id="4311" instrument_node="">2010</span></a><span data-dcnode-id="4309" instrument_node="">). The d values for other endorser or object types (e.g., model or familiar object) may be obtained by adding or subtracting the respective regression coefficient from Table </span><a data-dcnode-id="4307" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="4308" instrument_node="">4</span></a><span data-dcnode-id="4306" instrument_node="">. Based on the results for attitude toward the endorsed object, the highest effect size can be expected for male actors, matching the object, and endorsing it implicitly (d&nbsp;=&nbsp;.90; 95% CI (.54, 1.25)). In contrast, the lowest effect size appears for female actors not matching an explicitly endorsed object (d&nbsp;=&nbsp;−.58; 95% CI (−1.02, −.13). It is important to note that female celebrities can likewise have a positive impact, for instance, endorsing a congruent object implicitly (d&nbsp;=&nbsp;.44; 95% CI (.20, .68)). Again, effect size patterns were similar for attitude toward the ad and behavioral intention.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4290" data-test="inline-table" id="table-5"><figure data-dcnode-id="4291"><figcaption class="c-article-table__figcaption" data-dcnode-id="4302"><b data-dcnode-id="4303" data-test="table-caption" id="Tab5"><span data-dcnode-id="4304" instrument_node="">Table 5 Predicted d values for actors endorsing an unfamiliar object once compared to no endorsement for various dependent variables at levels of the moderators sex, match, and endorsement explicitness</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4292"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="4293" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/tables/5" rel="nofollow"><span data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4294" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4295" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4296" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4299" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4298" fill-rule="evenodd"></path><span data-dcnode-id="4297" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4289" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="4287" id="Sec13"><span data-dcnode-id="4288" instrument_node="">Publication bias</span></h3><p data-dcnode-id="4267"><span data-dcnode-id="4286" instrument_node="">Before starting the bias analysis, the effect sizes were aggregated within the studies. Publication bias analysis checks whether certain studies are more likely to be published than others. Publication bias was assessed applying funnel plots and Egger’s regression test for funnel plot asymmetry (Egger et al. </span><a aria-label="Reference 1997" data-dcnode-id="4284" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d192725775e4111" title=""><span data-dcnode-id="4285" instrument_node="">1997</span></a><span data-dcnode-id="4283" instrument_node="">). Figure </span><a data-dcnode-id="4281" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4282" instrument_node="">2</span></a><span data-dcnode-id="4280" instrument_node=""> displays the funnel plots for attitude toward the endorsed object, attitude toward the ad, and behavioral intention. The x-axis indicates the observed effect size whereas the y-axis displays the standard error as an indicator of sample size (Borenstein et al. </span><a aria-label="Reference 2009" data-dcnode-id="4278" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d192725775e4117" title=""><span data-dcnode-id="4279" instrument_node="">2009</span></a><span data-dcnode-id="4277" instrument_node="">). The funnel plots showed no evidence of publication bias in terms of smaller studies missing at the bottom left corner (i.e., no evidence that smaller studies with minor effect sizes failed to be published). This is further confirmed by Egger’s regression tests being insignificant in all cases (attitude toward endorsed object: t(28)&nbsp;=&nbsp;1.86, </span><i data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">p</span></i><span data-dcnode-id="4274" instrument_node="">&nbsp;=&nbsp;.07; attitude toward ad: t(8)&nbsp;=&nbsp;.01, </span><i data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">p</span></i><span data-dcnode-id="4271" instrument_node="">&nbsp;=&nbsp;.99; behavioral intentions: t(15)&nbsp;=&nbsp;1.45, </span><i data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">p</span></i><span data-dcnode-id="4268" instrument_node="">&nbsp;=&nbsp;.17).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4243" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="4244"><figcaption data-dcnode-id="4264"><b class="c-article-section__figure-caption" data-dcnode-id="4265" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="4266" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4255"><div class="c-article-section__figure-item" data-dcnode-id="4259"><a class="c-article-section__figure-link" data-dcnode-id="4260" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/figures/2" rel="nofollow"><picture data-dcnode-id="4261"><source data-dcnode-id="4263" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11747-016-0503-8/MediaObjects/11747_2016_503_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="4262" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11747-016-0503-8/MediaObjects/11747_2016_503_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4256" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">Funnel plots of the studies in the meta-analysis for various dependent variables</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4245"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="4246" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11747-016-0503-8/figures/2" rel="nofollow"><span data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4247" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4248" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4249" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4252" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4251" fill-rule="evenodd"></path><span data-dcnode-id="4250" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4242" instrument_node="">
