1600x900_q85_crop_subsampling-2.jpg" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.globalcitizen.org/thumbnails/8a/b8/8ab8ac07-95ba-40dc-bad0-755b1e9d195a/voting-around-the-world-india-largest-democracy.jpg__1600x900_q85_crop_subsampling-2.jpg&amp;raw" width="100%"></div><div class="article-hero__ArticleHeroImageCredits-sc-1s4zzj-2 dwWjRj mb-double mt-2" data-dcnode-id="1036"><span data-dcnode-id="1042" instrument_node="">Indians stand in queues to cast their votes in the seventh and final phase of national elections, on the outskirts of Varanasi, India, May 19, 2019. | Indians stand in queues to cast their votes in the seventh and final phase of national elections, on the outskirts of Varanasi, India, May 19, 2019.</span><span data-dcnode-id="1037"><span data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node=""> | </span></span><span data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Rajesh Kumar Singh/AP</span></span></span></div></div></div><div data-dcnode-id="1016" id="article-meta-data"><div class="article-meta-data__MetaData-dhea9q-0 eEEAPY bst-row my-double" data-dcnode-id="1017"><div class="col-lg-10 offset-lg-1 d-flex flex-column flex-lg-row align-items-lg-center" data-dcnode-id="1018"><span class="article-meta-data__Avatar-dhea9q-1 hCDsXN" data-dcnode-id="1031"><a class="d-block" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/authors/kristine-liao/" title="Kristine Liao"><img alt="Kristine Liao" class="image__Img-sc-1mjwusy-2 jaTDY" data-dcnode-id="1033" data-src="https://media.globalcitizen.org/thumbnails/19/52/19523f7e-cae6-4a1a-9a9e-530230c09e58/screen_shot_2020-08-05_at_34937_pm.png__100x100_crop_subsampling-2.png" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.globalcitizen.org/thumbnails/19/52/19523f7e-cae6-4a1a-9a9e-530230c09e58/screen_shot_2020-08-05_at_34937_pm.png__100x100_crop_subsampling-2.png&amp;raw" width="auto"></a></span><div data-dcnode-id="1019"><div class="d-flex flex-column flex-lg-row align-items-lg-center" data-dcnode-id="1023"><span class="content-utils__ContentAuthors-lebkk-0 kXta-Dr" data-dcnode-id="1024"><span data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">By</span></span><span data-dcnode-id="1028" instrument_node=""> </span><span class="content-item__meta" data-dcnode-id="1025"><a class="content-item__meta__link" data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/authors/kristine-liao/"><span data-dcnode-id="1027" instrument_node="">Kristine Liao</span></a></span></span></div><div class="mt-2" data-dcnode-id="1020"><span class="content-utils__ContentDate-lebkk-4 bFHJxN content-item__publication-date-wrapper" data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">August 21, 2020</span></span></div></div></div></div></div><div class="bst-row" data-dcnode-id="662"><div class="col-lg-10 offset-lg-1 cms-placeholder-wrapper" data-dcnode-id="663"><div data-dcnode-id="1013" style="background-color: rgb(238, 238, 238); border: 1px solid rgb(204, 204, 204); padding: 5px 10px; text-align: center; background-position: initial initial; background-repeat: initial initial;"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Why Global Citizens Should Care</span></strong></div><div data-dcnode-id="1007" style="background-color: rgb(238, 238, 238); border: 1px solid rgb(204, 204, 204); padding: 5px 10px; text-align: center; background-position: initial initial; background-repeat: initial initial;"><em data-dcnode-id="1008"><span data-dcnode-id="1012" instrument_node="">The right to vote is crucial to maintaining a fair democracy, and allows citizens to voice support for policies that can help end extreme poverty and its causes. The United Nations calls on countries to safeguard this right in order to create effective, accountable, and inclusive institutions at all levels. Join Global Citizen and take action </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/justvote/"><span data-dcnode-id="1011" instrument_node="">here</span></a><span data-dcnode-id="1009" instrument_node="">.&nbsp;</span></em></div><hr data-dcnode-id="1006"><p data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">Last year, more people around the world were expected to vote than </span><a aria-label="ever before (open in new tab)" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//interactive.aljazeera.com/aje/2019/how-the-world-votes-2019/index.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1004" instrument_node="">ever before</span></a><span data-dcnode-id="1002" instrument_node="">, with nearly 2 billion voters in 50 countries&nbsp;able to head to the polls to elect their leaders. Exercising the right to vote is a way for people to keep their governments accountable, and to take a stand on certain policies.</span></p><p data-dcnode-id="996"><span data-dcnode-id="1000" instrument_node="">Since the end of World War II, this right has expanded to people all over the world. In 1946, democracies made up less than 30% of the world’s countries. Today, </span><a aria-label="more than half (open in new tab)" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/fact-tank/2019/05/14/more-than-half-of-countries-are-democratic/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="999" instrument_node="">more than half</span></a><span data-dcnode-id="997" instrument_node=""> of governments are democratic.&nbsp;</span></p><p data-dcnode-id="990"><strong data-dcnode-id="991"><span data-dcnode-id="994" style="color:#c0392b;"><span data-dcnode-id="995" instrument_node="">Take Action:&nbsp;</span></span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/justvote/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="993" instrument_node="">Check Your Voter Registration Status With 'Just Vote' Here</span></a></strong></p><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">But the category of “democracies” is broad, and encompasses many different governments, each with their own rules and restrictions for who, exactly, has the right to vote.</span></p><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">So here’s a glimpse at what voting rights and policies look like around the world.</span></p><h4 data-dcnode-id="983"><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">India: The World’s Largest Vote, But Still Not for All</span></strong></h4><p data-dcnode-id="970"><span class="filer_image_wrapper" data-dcnode-id="971"><span class="filer_image_wrapper__inner" data-dcnode-id="972"><img alt="" class="filer_image" data-dcnode-id="982" data-src="https://media.globalcitizen.org/thumbnails/46/e0/46e094fd-6bb1-43fa-838d-32a0b1a7fc87/voting-around-the-world-india.jpg__2100.0x1369.0_q85_crop_subject_location-1050%2C685_subsampling-2_upscale.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.globalcitizen.org/static/img/festival-banner.8c92dc451610.png&amp;raw" title="An Indian Muslim woman displays indelible ink mark on her finger after her casting at a polling station, Bengali Tola Inter college in Varanasi, India, May 19, 2019."><span class="filer_image_info" data-dcnode-id="973"><span class="title" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">An Indian Muslim woman displays indelible ink mark on her finger after her casting at a polling station, Bengali Tola Inter college in Varanasi, India, May 19, 2019.</span></span><br data-dcnode-id="979"><span class="desc" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">An Indian Muslim woman displays indelible ink mark on her finger after her casting at a polling station, Bengali Tola Inter college in Varanasi, India, May 19, 2019.</span></span><br data-dcnode-id="976"><span class="author" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Image: Rajesh Kumar Singh/AP</span></span></span></span></span></p><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">With 800 million eligible voters, India ranks as the world’s largest democracy. However, for the country’s Muslim minority, it doesn’t always feel that way.&nbsp;</span></p><p data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">In December 2019, Indian lawmakers </span><a aria-label="passed (open in new tab)" data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-asia-india-50670393" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="966" instrument_node="">passed</span></a><span data-dcnode-id="964" instrument_node=""> the Citizenship Amendment Bill to amend the country’s citizenship law that prohibited migrants who entered the country without documentation&nbsp;from becoming Indian citizens. The new bill allowed many citizens of Afghanistan, Pakistan, and Bangladesh the opportunity to apply for Indian citizenship — but only if they are Hindu, Christian, Sikh, Jian, Parsi, or Buddhist.</span></p><p data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">The bill leaves out Muslims, India’s largest minority group, and a religious minority that has been persecuted in nearby countries, perhaps most notably in Myanmar, where Rohingya&nbsp;Muslims are facing a “</span><a aria-label="textbook example of ethnic cleansing (open in new tab)" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.un.org/en/story/2017/09/564622-un-human-rights-chief-points-textbook-example-ethnic-cleansing-myanmar" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="961" instrument_node="">textbook example of ethnic cleansing</span></a><span data-dcnode-id="959" instrument_node="">,” according to the United Nations.</span></p><p data-dcnode-id="947"><span data-dcnode-id="957" instrument_node="">Muslims who are Indian citizens have also been </span><a aria-label="denied (open in new tab)" data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2019/10/22/missing-voters-india-elections-muslims-dalits/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="956" instrument_node="">denied</span></a><span data-dcnode-id="954" instrument_node=""> their voting rights. </span><a aria-label="Missing Voters (open in new tab)" data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.missingvoters.in/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="953" instrument_node="">Missing Voters</span></a><span data-dcnode-id="951" instrument_node=""> estimated that nearly 120 million citizens were missing from voter lists in the 2019 national election, more than half of whom were </span><a aria-label="Muslims or lower-caste Dalits (open in new tab)" data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2019/04/09/millions-of-voters-are-missing-in-india/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="950" instrument_node="">Muslims or lower-caste Dalits</span></a><span data-dcnode-id="948" instrument_node="">. Women were also disproportionately affected.</span></p><p data-dcnode-id="946"></p><h4 data-dcnode-id="943"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Austria: The First European Union Nation to Allow Voting at 16</span></strong></h4><p data-dcnode-id="930"><span class="filer_image_wrapper" data-dcnode-id="931"><span class="filer_image_wrapper__inner" data-dcnode-id="932"><img alt="" class="filer_image" data-dcnode-id="942" data-src="https://media.globalcitizen.org/thumbnails/c9/96/c996245a-2176-4a3d-83c7-8343b03c4a78/voting-around-the-world-austria.jpg__2100.0x1400.0_q85_crop_subject_location-1050%2C700_subsampling-2_upscale.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.globalcitizen.org/static/img/festival-banner.8c92dc451610.png&amp;raw" title="17 year-old Philippa Baminger casts her vote for the national elections in Austria at a polling station in Vienna, on Sept. 28, 2008."><span class="filer_image_info" data-dcnode-id="933"><span class="title" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">17 year-old Philippa Baminger casts her vote for the national elections in Austria at a polling station in Vienna, on Sept. 28, 2008.</span></span><br data-dcnode-id="939"><span class="desc" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">17 year-old Philippa Baminger casts her vote for the national elections in Austria at a polling station in Vienna, on Sept. 28, 2008.</span></span><br data-dcnode-id="936"><span class="author" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Image: Lilli Strauss/AP</span></span></span></span></span></p><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">Brazil and Nicaragua lowered their legal voting ages to 16 back in the 1980s, but more recently, Austria became the first country in the European Union&nbsp;to follow suit. In 2007, Austrians gained the right to vote at the age of 16, a decision that increased the country’s voter base by </span><a aria-label="200,000 (open in new tab)" data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/world/europe/austria-opens-the-polls-to-16-year-olds-943706.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="928" instrument_node="">200,000</span></a><span data-dcnode-id="926" instrument_node="">, according to the Independent.</span></p><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">The move was designed to offset the country’s rapidly aging population, and also to encourage Austrians to engage in politics at an earlier stage of life. Critics, however, warned that 16- to 17-year olds are not mature enough to make politically informed and well-considered decisions.&nbsp;</span></p><p data-dcnode-id="915"><span data-dcnode-id="922" instrument_node="">Despite the controversy, Austria’s decision has led many other countries to consider making the change as well. </span><a aria-label="Malta (open in new tab)" data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dw.com/en/malta-lowers-voting-age-to-16-with-unanimous-backing-from-parliament/a-42838643" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="921" instrument_node="">Malta</span></a><span data-dcnode-id="919" instrument_node=""> became the second EU state to grant 16-year-olds the right to vote in 2018. And in the UK, the voting age has been lowered to 16 in </span><a aria-label="Scotland and Wales (open in new tab)" data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electoral-reform.org.uk/campaigns/votes-at-16/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="918" instrument_node="">Scotland and Wales</span></a><span data-dcnode-id="916" instrument_node="">.</span></p><p data-dcnode-id="889"><span class="bst related-stories-plugin" data-dcnode-id="892"><span class="py-3 d-block" data-dcnode-id="893"><span data-dcnode-id="912" id="related-stories-plugin-headline--491090"></span></span></span></p><h5 aria-hidden="false" class="page-headlines__H5Container-sc-1i7zk4d-4 lcvdbr pt-0 pb-3 my-0 header--h5" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Related Stories</span></h5><span data-dcnode-id="894" id="related-stories-content-list--491090"><div class="content-list__ContentListContainer-xglc8g-0 hLuRjJ bst" data-dcnode-id="895"><ul class="content-list__UnOrderedList-xglc8g-2 hrIyMN" data-dcnode-id="896"><div class="list-item-with-image__ListItemContainer-lqhovs-0 cXjXdO bst-container-fluid" color="rgb(242, 242, 242)" data-dcnode-id="897"><li class="list-item-with-image__ListItem-lqhovs-1 kCtQQS bst-row py-3 undefined" data-dcnode-id="898"><span class="list-item-with-image__ThumbnailContainer-lqhovs-3 jfajTN col-12 col-lg-6 d-block mb-4 mb-lg-0" data-dcnode-id="908"><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/just-vote-artist-rewards/" tabindex="-1" title="10 Once-in-a-Lifetime Artist Experiences You Can Earn by Checking Your Voter Registration Status"><div class="image__Container-sc-1mjwusy-1 fvbqBj bst" data-dcnode-id="910"><div class="image__Background-sc-1mjwusy-0 gRYLiD list-item-with-image__ItemImage-lqhovs-2 bwvjxw responsive-bg-image text-hide" data-bg="https://media.globalcitizen.org/thumbnails/98/70/987087ed-de65-4b93-bd99-68cccec1f7d0/just-vote-rewards-artists-social-share_1.jpg__800x450_q85_crop_subsampling-2.jpg" data-dcnode-id="911" height="auto" src="/static/img/festival-banner-lqip.png" width="100%"></div></div></a></span><span class="list-item-with-image__ContentCol-lqhovs-4 dzLuUM col-12 col-lg-6" data-dcnode-id="899"><span class="bst-row" data-dcnode-id="906"><span class="col-12" data-dcnode-id="907"></span></span><span class="list-item-with-image__ItemCopyRow-lqhovs-5 bEJCOD bst-row" data-dcnode-id="900"><span class="list-item-with-image__ItemCopyCol-lqhovs-17 kffaPW col-12" data-dcnode-id="901"><span class="list-item-with-image__ItemCopy-lqhovs-20 dyUaWG" data-dcnode-id="902"><h4 class="list-item-with-image__Title-lqhovs-13 egHIKv" data-dcnode-id="903"><a class="break-word" data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/just-vote-artist-rewards/" title="10 Once-in-a-Lifetime Artist Experiences You Can Earn by Checking Your Voter Registration Status"><span data-dcnode-id="905" instrument_node="">10 Once-in-a-Lifetime Artist Experiences You Can Earn by Checking Your Voter Registration Status</span></a></h4></span></span></span></span></li></div></ul></div></span><p></p><p data-dcnode-id="888"></p><h4 data-dcnode-id="885"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Saudi Arabia: The Most Recent Country to Grant Women’s Suffrage</span></strong></h4><p data-dcnode-id="872"><span class="filer_image_wrapper" data-dcnode-id="873"><span class="filer_image_wrapper__inner" data-dcnode-id="874"><img alt="" class="filer_image" data-dcnode-id="884" data-src="https://media.globalcitizen.org/thumbnails/9d/10/9d10fde9-3456-4d1a-94a2-076f5acd6b0e/voting-around-the-world-saudi-arabia.jpg__2100.0x1542.0_q85_crop_subject_location-1050%2C770_subsampling-2_upscale.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.globalcitizen.org/static/img/festival-banner.8c92dc451610.png&amp;raw" title="A Saudi woman casts her ballot at a polling center during municipal elections in Riyadh, Saudi Arabia, Dec. 12, 2015."><span class="filer_image_info" data-dcnode-id="875"><span class="title" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">A Saudi woman casts her ballot at a polling center during municipal elections in Riyadh, Saudi Arabia, Dec. 12, 2015.</span></span><br data-dcnode-id="881"><span class="desc" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">A Saudi woman casts her ballot at a polling center during municipal elections in Riyadh, Saudi Arabia, Dec. 12, 2015.</span></span><br data-dcnode-id="878"><span class="author" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Image: Aya Batrawy/AP</span></span></span></span></span></p><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">In 2015, Saudi women were granted the right to vote and run for office. In their first election, about 130,000 women registered to vote, and a total of 978 women registered as candidates, according to </span><a aria-label="BBC News (open in new tab)" data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-middle-east-35075702" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="870" instrument_node="">BBC News</span></a><span data-dcnode-id="868" instrument_node="">. Although this still stands in stark contrast to the 1.35 million registered male voters and the 5,938 men registered as candidates that year, the 2015 election was a monumental event that marked progress for women’s rights in the country.</span></p><p data-dcnode-id="859"><span data-dcnode-id="866" instrument_node="">Since then, women in Saudi Arabia have slowly been accumulating successes and expanding their rights. In 2016, nearly 15,000 women signed a </span><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/saudi-arabia-women-petition-male-guardianship/"><span data-dcnode-id="865" instrument_node="">petition</span></a><span data-dcnode-id="863" instrument_node=""> demanding an end to the country’s male guardianship system. Two years later, women gained the right to drive, and a year after that, they were allowed to </span><a aria-label="obtain a passport (open in new tab)" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/world/2019/8/3/20752864/saudi-arabia-guardianship-laws-women-travel-employment-mbs" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="862" instrument_node="">obtain a passport</span></a><span data-dcnode-id="860" instrument_node=""> and travel abroad without a male relative’s permission.</span></p><p data-dcnode-id="854"><span data-dcnode-id="858" instrument_node="">However, guardianship rules continue to govern many other aspects of a woman’s life, creating barriers for marriage, leaving prison, and even </span><a aria-label="exiting (open in new tab)" data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/saudi-arabia-to-allow-women-to-travel-abroad-without-permission-11564693852" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="857" instrument_node="">exiting</span></a><span data-dcnode-id="855" instrument_node=""> a shelter for abuse victims.</span></p><p data-dcnode-id="853"></p><h4 data-dcnode-id="850"><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Bolivia: Where Not Voting Can Result in a Salary Freeze</span></strong></h4><p data-dcnode-id="837"><span class="filer_image_wrapper" data-dcnode-id="838"><span class="filer_image_wrapper__inner" data-dcnode-id="839"><img alt="" class="filer_image" data-dcnode-id="849" data-src="https://media.globalcitizen.org/thumbnails/b3/ca/b3ca1808-4852-4f4b-a136-b8f20b12c666/voting-around-the-world-bolivia.jpg__2100.0x1400.0_q85_crop_subject_location-1050%2C700_subsampling-2_upscale.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.globalcitizen.org/static/img/festival-banner.8c92dc451610.png&amp;raw" title="A woman signs on a voters record after voting at a polling station during general elections in La Paz outskirts, Bolivia, Oct. 20, 2019."><span class="filer_image_info" data-dcnode-id="840"><span class="title" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">A woman signs on a voters record after voting at a polling station during general elections in La Paz outskirts, Bolivia, Oct. 20, 2019.</span></span><br data-dcnode-id="846"><span class="desc" data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">A woman signs on a voters record after voting at a polling station during general elections in La Paz outskirts, Bolivia, Oct. 20, 2019.</span></span><br data-dcnode-id="843"><span class="author" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Image: Jorge Saenz/AP</span></span></span></span></span></p><p data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">Like </span><a aria-label="many other (open in new tab)" data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/international/archive/2014/10/why-is-it-illegal-not-to-vote-in-most-of-latin-america/381936/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="835" instrument_node="">many other</span></a><span data-dcnode-id="833" instrument_node=""> Latin American countries, Bolivia has a policy of compulsory voting. The country introduced this law in 1952, which requires all citizens to cast a ballot.&nbsp;</span></p><p data-dcnode-id="824"><span data-dcnode-id="831" instrument_node="">Although compulsory voting is present in </span><a aria-label="27 countries (open in new tab)" data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idea.int/data-tools/data/voter-turnout/compulsory-voting" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="830" instrument_node="">27 countries</span></a><span data-dcnode-id="828" instrument_node=""> around the world, it isn’t always enforced. In Bolivia, however, non-voters can be fined, and even </span><a aria-label="denied their salary (open in new tab)" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2005/jul/04/voterapathy.uk" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="827" instrument_node="">denied their salary</span></a><span data-dcnode-id="825" instrument_node=""> if they cannot show proof of voting within three months after the election. The government is able to monitor this because voters are given a card after casting their ballot as proof of their participation.</span></p><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">Advocates of compulsory voting </span><a aria-label="argue (open in new tab)" data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idea.int/data-tools/data/voter-turnout/compulsory-voting" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="822" instrument_node="">argue</span></a><span data-dcnode-id="820" instrument_node=""> that democratic governments become more legitimate when higher proportions of the population participate, and that voting, whether voluntary or not, helps create a more educated citizenry. The main argument against compulsory voting is that it contradicts the idea of freedom associated with democracy.</span></p><p data-dcnode-id="818"></p><h4 data-dcnode-id="815"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Burkina Faso: The World’s Newest Democracy</span></strong></h4><p data-dcnode-id="802"><span class="filer_image_wrapper" data-dcnode-id="803"><span class="filer_image_wrapper__inner" data-dcnode-id="804"><img alt="" class="filer_image" data-dcnode-id="814" data-src="https://media.globalcitizen.org/thumbnails/73/8b/738bf4e8-878b-4885-a1a5-5402e079848d/voting-around-the-world-burkina-faso.jpg__2100.0x1369.0_q85_crop_subject_location-1050%2C685_subsampling-2_upscale.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.globalcitizen.org/static/img/festival-banner.8c92dc451610.png&amp;raw" title="Voters queue before casting their ballots, during elections in Ouagadougou, Burkina Faso, Nov. 29, 2015."><span class="filer_image_info" data-dcnode-id="805"><span class="title" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Voters queue before casting their ballots, during elections in Ouagadougou, Burkina Faso, Nov. 29, 2015.</span></span><br data-dcnode-id="811"><span class="desc" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Voters queue before casting their ballots, during elections in Ouagadougou, Burkina Faso, Nov. 29, 2015.</span></span><br data-dcnode-id="808"><span class="author" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Image: Theo Renaut/AP</span></span></span></span></span></p><p data-dcnode-id="794"><span data-dcnode-id="801" instrument_node="">After nearly three uninterrupted decades of semi-authoritarian&nbsp;rule by former President </span><a aria-label="Blaise Compaore (open in new tab)" data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Blaise-Compaore" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="800" instrument_node="">Blaise Compaore</span></a><span data-dcnode-id="798" instrument_node="">, Burkina Faso began its democratic transition with its </span><a aria-label="first free and fair election (open in new tab)" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-burkina-election-idUSKBN0TJ0QT20151201" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="797" instrument_node="">first free and fair election</span></a><span data-dcnode-id="795" instrument_node=""> in November 2015. This makes the country one of the youngest democracies in our world today.</span></p><p data-dcnode-id="786"><span data-dcnode-id="793" instrument_node="">However, the nation has not had an easy start. Immediately after the first election, the nation suffered from an unprecedented </span><a aria-label="terrorist assault (open in new tab)" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crisisgroup.org/crisiswatch/january-2016" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="792" instrument_node="">terrorist assault</span></a><span data-dcnode-id="790" instrument_node="">. After overcoming the initial devastation, the government focused on </span><a aria-label="strengthening national security (open in new tab)" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/africarenewal/magazine/april-2016/new-burkina-faso-making" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="789" instrument_node="">strengthening national security</span></a><span data-dcnode-id="787" instrument_node="">, and has not fully addressed the issues of poverty and hunger within the nation.</span></p><p data-dcnode-id="775"><span data-dcnode-id="785" instrument_node="">Women’s rights is another key issue. Although gender equality is legally protected, in practice, female genital mutilation, forced and early marriage, and domestic violence are </span><a aria-label="widespread (open in new tab)" data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/latest/campaigns/2015/07/my-body-my-rights-burkina-faso/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="784" instrument_node="">widespread</span></a><span data-dcnode-id="782" instrument_node="">, according to Amnesty International. There is currently a lack of female representation in the country’s </span><a aria-label="parliament (open in new tab)" data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.worldbank.org/indicator/SG.GEN.PARL.ZS%3Flocations%3DBF" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="781" instrument_node="">parliament</span></a><span data-dcnode-id="779" instrument_node=""> and political parties, but there is hope that </span><a aria-label="young women (open in new tab)" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ndi.org/Women_Youth_Competitive_Candidates_Burkina_Faso_story" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="778" instrument_node="">young women</span></a><span data-dcnode-id="776" instrument_node=""> are becoming more politically engaged.</span></p><p data-dcnode-id="774"></p><h4 data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">United States: The Democracy With a Flawed System</span></strong></h4><p data-dcnode-id="758"><span class="filer_image_wrapper" data-dcnode-id="759"><span class="filer_image_wrapper__inner" data-dcnode-id="760"><img alt="" class="filer_image" data-dcnode-id="770" data-src="https://media.globalcitizen.org/thumbnails/a3/b7/a3b71a8b-38fc-4620-b1cf-255c69d56e7e/voting-around-the-world-united-states.jpg__2100.0x1420.0_q85_crop_subject_location-1050%2C710_subsampling-2_upscale.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.globalcitizen.org/static/img/festival-banner.8c92dc451610.png&amp;raw" title="A voter marks a ballot for the New Hampshire primary inside a voting booth at a polling place, Feb. 9, 2016, in Manchester, N.H."><span class="filer_image_info" data-dcnode-id="761"><span class="title" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">A voter marks a ballot for the New Hampshire primary inside a voting booth at a polling place, Feb. 9, 2016, in Manchester, N.H.</span></span><br data-dcnode-id="767"><span class="desc" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">A voter marks a ballot for the New Hampshire primary inside a voting booth at a polling place, Feb. 9, 2016, in Manchester, N.H.</span></span><br data-dcnode-id="764"><span class="author" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Image: David Goldman/AP</span></span></span></span></span></p><p data-dcnode-id="753"><span data-dcnode-id="757" instrument_node="">Although internationally known for its democratic ideals, the US continues to struggle with equality when it comes to the right to vote. Black Americans, Native Americans, and other historically&nbsp;marginalized groups </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/voting-rights-act-history-and-consequences/"><span data-dcnode-id="756" instrument_node="">continue to face voter suppression</span></a><span data-dcnode-id="754" instrument_node=""> despite decades of activism and many steps forward.</span></p><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">The Voting Rights Act of 1965 was a landmark decision that expanded the voting rights of people of color&nbsp;and women, but states continued to suppress the votes of Black Americans through poll taxes, literacy tests, and outright violence. </span><a aria-label="Similar tactics (open in new tab)" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/2020/8/18/21358913/19th-amendment-ratified-anniversary-women-suffrage-vote" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="751" instrument_node="">Similar tactics</span></a><span data-dcnode-id="749" instrument_node=""> were used to suppress votes of other underrepresented communities.</span></p><p data-dcnode-id="734"><span data-dcnode-id="747" instrument_node="">In 2013, voter suppression came to a head as a result of the&nbsp;Supreme Court decision of&nbsp;</span><a aria-label="Shelby County v. Holder (open in new tab)" data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brennancenter.org/issues/ensure-every-american-can-vote/voting-reform/voting-rights-act" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="746" instrument_node="">Shelby County v. Holder</span></a><span data-dcnode-id="744" instrument_node="">, which </span><a aria-label="struck down (open in new tab)" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.headcount.org/politics-and-elections/supreme-court-strikes-down-key-anti-discrimination-law/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="743" instrument_node="">struck down</span></a><span data-dcnode-id="741" instrument_node=""> the preclearance provision of the Voting Rights Act, which required federal approval for changes to local election laws. Since then, </span><a aria-label="more than 25 states (open in new tab)" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brennancenter.org/our-work/research-reports/new-voting-restrictions-america" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="740" instrument_node="">more than 25 states</span></a><span data-dcnode-id="738" instrument_node=""> have enacted voting restrictions, including new voter ID laws, registration restrictions, and voter purges that have made it </span><a aria-label="more difficult (open in new tab)" data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.headcount.org/politics-and-elections/voting-in-the-post-preclearance-era/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="737" instrument_node="">more difficult</span></a><span data-dcnode-id="735" instrument_node=""> for marginalized populations to exercise their basic right to vote.</span></p><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">Congress is now considering the passage of the </span><a aria-label="Voting Rights Advancement Act (open in new tab)" data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/115th-congress/senate-bill/1419/text" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="732" instrument_node="">Voting Rights Advancement Act</span></a><span data-dcnode-id="730" instrument_node="">, a bill with bipartisan support that&nbsp;would restore the original amendment and that supporters say would advance the US toward a more inclusive democracy.</span></p><hr data-dcnode-id="728"><p data-dcnode-id="711"><i data-dcnode-id="724" data-stringify-type="italic"><span data-dcnode-id="727" instrument_node="">Global Citizen and HeadCount have teamed up to launch&nbsp;</span><a data-dcnode-id="725" data-sk="tooltip_parent" data-stringify-link="https://www.globalcitizen.org/justvote/" delay="150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/justvote/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="726" instrument_node="">Just Vote</span></a></i><i data-dcnode-id="722" data-stringify-type="italic"><span data-dcnode-id="723" instrument_node="">, a campaign mobilizing young Americans to register to vote ahead of the&nbsp;2020&nbsp;election and beyond. As part of the campaign, your favorite artists and entertainers are offering exclusive experiences, performances, and memorabilia&nbsp;— and they can only be unlocked once eligible voters&nbsp;</span></i><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/justvote/"><i data-dcnode-id="720" data-stringify-type="italic"><span data-dcnode-id="721" instrument_node="">check their voter registration status</span></i></a><i data-dcnode-id="717" data-stringify-type="italic"><span data-dcnode-id="718" instrument_node="">. Learn more about Just Vote and how you can take action&nbsp;</span></i><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/justvote/"><i data-dcnode-id="715" data-stringify-type="italic"><span data-dcnode-id="716" instrument_node="">here</span></i></a><i data-dcnode-id="712" data-stringify-type="italic"><span data-dcnode-id="713" instrument_node="">.</span></i></p><p data-dcnode-id="710" dir="ltr"></p><div class="civicactioncenter-widget" data-dcnode-id="709" data-domain="justvote.globalcitizen.org" data-responsive="true" data-shorturl="jUlZaN1" style=""></div><p data-dcnode-id="706"></p><div class="tags__container" data-dcnode-id="664"><span class="topic__container" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Topics</span></span><span class="tag__container" data-dcnode-id="665"><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/voting/"><span data-dcnode-id="703" instrument_node="">voting</span></a><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/india/"><span data-dcnode-id="701" instrument_node="">India</span></a><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/saudi-arabia/"><span data-dcnode-id="699" instrument_node="">Saudi Arabia</span></a><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/burkina-faso/"><span data-dcnode-id="697" instrument_node="">Burkina Faso</span></a><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/united-states/"><span data-dcnode-id="695" instrument_node="">United States</span></a><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/vote_1/"><span data-dcnode-id="693" instrument_node="">Vote</span></a><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/austria/"><span data-dcnode-id="691" instrument_node="">Austria</span></a><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/bolivia/"><span data-dcnode-id="689" instrument_node="">Bolivia</span></a><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/democracy/"><span data-dcnode-id="687" instrument_node="">democracy</span></a><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/inde/"><span data-dcnode-id="685" instrument_node="">Inde</span></a><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/etats-unis/"><span data-dcnode-id="683" instrument_node="">Etats-Unis</span></a><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/just-vote/"><span data-dcnode-id="681" instrument_node="">Just Vote</span></a><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/voting-rights_2/"><span data-dcnode-id="679" instrument_node="">voting rights</span></a><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/autriche/"><span data-dcnode-id="677" instrument_node="">Autriche</span></a><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/democratie/"><span data-dcnode-id="675" instrument_node="">Démocratie</span></a><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/arabie-saoudite/"><span data-dcnode-id="673" instrument_node="">Arabie Saoudite</span></a><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/droit-de-vote/"><span data-dcnode-id="671" instrument_node="">Droit de vote</span></a><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/elecciones-2020/"><span data-dcnode-id="669" instrument_node="">elecciones 2020</span></a><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globalcitizen.org/en/content/topics/elecciones-en-estados-unidos/"><span data-dcnode-id="667" instrument_node="">elecciones en estados unidos</span></a></span></div></div></div></div><div class="article-content-v3__actions position-relative col-12" data-dcnode-id="659"><span data-dcnode-id="660" id="article-actions-cta-anchor"></span></div></div></div><div class="article-v3__email-capture-block bst-container-fluid px-0 bg-white" data-dcnode-id="265"><div class="position-relative" data-dcnode-id="608"><span data-dcnode-id="655" id="email-capture-take-action-block-anchor"></span><div data-dcnode-id="609" id="email-capture-take-action-block"><div class="" data-dcnode-id="610"><div class="" data-dcnode-id="611"><div class="email-capture-block__EmailCaptureContainer-sc-1mp32s0-0 ixkTFW bst-container-fluid-cushion" data-dcnode-id="612"><div class="bst-row align-items-center" data-dcnode-id="613"><div class="col-12 col-lg-8" data-dcnode-id="652"><h3 data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Join the movement</span></h3></div><div class="col-12 col-lg-4" data-dcnode-id="614"><div class="subscription-plugin__SubscriptionPluginWrapper-ix4ppy-0 liThYO subscription-plugin action-tile action-tile--newsletter email-capture-block__SubscriptionFormContainer-sc-1mp32s0-1 jGtzFD" data-dcnode-id="615"><div class="email-sign-up" data-dcnode-id="616"><div class="newsletter-signup" data-dcnode-id="617"><i class="action-icon icon-newsletter" data-d
