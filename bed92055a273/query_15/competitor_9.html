</span><h1 class="entry-title" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">The voting age should be lowered to 16</span></h1><span data-dcnode-id="844" instrument_node=""> </span><div class="post-cats-list" data-dcnode-id="838"><span data-dcnode-id="843" instrument_node="">
</span><span class="category-button np-cat-352" data-dcnode-id="840"><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thekonews.org/category/opinion/"><span data-dcnode-id="842" instrument_node="">Opinion</span></a></span><span data-dcnode-id="839" instrument_node="">
</span></div><span data-dcnode-id="837" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="824"><span data-dcnode-id="836" instrument_node="">
</span><span class="posted-on" data-dcnode-id="830"><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thekonews.org/2021/03/the-voting-age-should-be-lowered-to-16/" rel="bookmark"><time class="entry-date published" data-dcnode-id="834" datetime="2021-03-04T09:00:00-05:00"><span data-dcnode-id="835" instrument_node="">March 4, 2021</span></time><time class="updated" data-dcnode-id="832" datetime="2021-03-02T19:26:21-05:00"><span data-dcnode-id="833" instrument_node="">March 2, 2021</span></time></a></span><span class="byline" data-dcnode-id="826"><span class="author vcard" data-dcnode-id="827"><a class="url fn n" data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thekonews.org/author/samuelmerkatz/"><span data-dcnode-id="829" instrument_node="">Samuel Merkatz</span></a></span></span><span data-dcnode-id="825" instrument_node=""> </span></div><span data-dcnode-id="822" instrument_node="">
</span></header><span data-dcnode-id="819" instrument_node="">
</span><div class="entry-content" data-dcnode-id="683"><span data-dcnode-id="818" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="814"><img alt="" class="wp-image-6886" data-attachment-id="6886" data-comments-opened="0" data-dcnode-id="817" data-image-caption="<p>Sam Merkatz ’22. Photo by EBTaylor Photography. </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Merkatz_Samuel" data-large-file="https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?fit=640%2C800&amp;ssl=1" data-medium-file="https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?fit=240%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?fit=2400%2C3000&amp;ssl=1" data-orig-size="2400,3000" data-permalink="https://thekonews.org/merkatz_samuel/" data-recalc-dims="1" height="800" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg%3Fresize%3D640%252C800%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?resize=819%2C1024&amp;ssl=1 819w, https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?resize=240%2C300&amp;ssl=1 240w, https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?resize=768%2C960&amp;ssl=1 768w, https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?resize=1229%2C1536&amp;ssl=1 1229w, https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?resize=1638%2C2048&amp;ssl=1 1638w, https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?resize=600%2C750&amp;ssl=1 600w, https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?w=1280&amp;ssl=1 1280w, https://i0.wp.com/thekonews.org/wp-content/uploads/2020/05/Merkatz_Samuel.jpg?w=1920&amp;ssl=1 1920w" width="640"><figcaption data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Sam Merkatz ’22. Photo by EBTaylor Photography. </span></figcaption></figure><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">As of late, our country has been struck by a pandemic. However, the pandemic in question is not a physical ailment like that caused by COVID-19 which has affected our lives so greatly. Rather, it is a pandemic that attacks our very democratic practices—political apathy. In recent years, an alarming trend has been observed: Decreasing rates of voter turnout, especially among younger generations. While the causes for this phenomenon are numerous, there is a potential solution. Lowering the voting age to 16 not only encourages greater political action, but it is the morally just choice to make.&nbsp;</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">Lowering the voting age firstly stimulates political action. Voter turnout from the ages of 18-29 has historically been lower than other age denominations, </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.electproject.org/home/voter-turnout/demographics"><span data-dcnode-id="808" instrument_node="">fluctuating between 20% and 40% each election</span></a><span data-dcnode-id="806" instrument_node="">. Even though an influx of young voters helped elect Joe Biden in the 2020 primaries, this data shows we cannot consistently rely on youth voter turnout. Such a pattern of behavior can prove damaging; the future rests in the hands of Generation Z, and therefore we must champion consistent action. Among the greatest privileges of democratic society is the right to vote, and to therefore hold influence over policy and practice. It is vital that voting be encouraged, as to maintain these central democratic values of our society and ensure power lies within the hands of the people.&nbsp;</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Beyond preserving democratic processes, lowering the voting age encourages civic education. Before being saddled with the pressures of adult life, students should be given the opportunity to form their political beliefs and inclinations. Having a politically aware Gen Z means that in the future, we can have more confidence in the judgement of voters.&nbsp;</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Lowering the voting age to 16 is also the morally and ethically correct thing to do. Taxation operates on the principle of no taxation without representation—so why should it be any different for voting? The majority of 16-year-olds attend school, and many also hold jobs. As students, they should have the ability to dictate what education policy is implemented. As workers, they should have a say as to how their taxed income is spent.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Opponents may voice concerns over the maturity of 16-year-olds, doubting their ability to make rational decisions. To this, I say that maturity is already expected from 16-year-olds in many aspects. Laws dictate that by the age of 16, one is expected to be mature enough to drive vehicles, or even get married. If society trusts 16-year-olds in these respects, I do not see why they suddenly cannot trust 16 year olds to vote rationally.&nbsp;</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">In fact, 16 year olds have already been granted the ability to vote in local elections in several locations, including Takoma Park, Maryland, and Oakland, California. While these local elections are a far cry from the nationwide presidential election, </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vote16usa.org/current-campaigns/"><span data-dcnode-id="793" instrument_node="">as of yet no negative consequences of this policy change have been observed</span></a><span data-dcnode-id="791" instrument_node="">.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">While I’ve observed some political apathy among my peers, I have also observed a growing sentiment of discontent and disillusionment with current affairs, whether it be judicial, environmental, or legislative policy. So beyond encouraging the apathetic, lowering the voting age grants a voice to those who </span><em data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">do</span></em><span data-dcnode-id="785" instrument_node=""> care, for those who want change, for those who want their ideas made reality.&nbsp;</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Legislators are growing older; soon, the torch will be passed. Gen Z will take on the responsibility of enacting policies to guide our nation forward. The best way to guarantee the competency of the next generation of politicians is to ensure they are politically educated and active, and the best way to achieve these goals is to lower the voting age to 16. So I implore you—make the right choice. If you are not eligible to vote, fight for your rights. If you are eligible to vote, fight for those who cannot. We do not know what the future holds, so we must prepare ourselves the best we can.</span></p><span data-dcnode-id="780" instrument_node="">
