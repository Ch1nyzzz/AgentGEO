4 text-xl" data-dcnode-id="400"><div data-dcnode-id="423" id="essay-body-heading-details"></div><div class="document__body white-space--break-spaces text-ellipsis-after break-word" data-dcnode-id="408"><span class="document__preview text-l source-serif" data-dcnode-id="415"><span data-dcnode-id="419" instrument_node="">Should the voting age be lowered to thirteen? I think that the voting age should stay at eighteen.  The reasons I think this is because, younger kids are immature, they don’t pay taxes, and they don’t know how government really works. One of the reasons I think the voting age should not be lowered is because younger kids or teenagers are immature.  Some claims you can state that may conclude they are immature are because they would vote for fun and not take the voting seriously.  They also would probably vote because of a funny post on some </span><a class="brand-secondary" data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/topics/social-media"><span data-dcnode-id="418" instrument_node="">social media</span></a><span data-dcnode-id="416" instrument_node="">.  In my opinion I think they would go off and hear things from their friends that are untrue and base their vote off of that rumor.  It is even worse when they go off and tell their friends</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="412" data-href="/document/PK8WWFMU5PV" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="411"><span class="document__preview text-l source-serif" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Not everyone knows how the government works.  Even adults sometimes get confused or stay out of conversations with the government because they don’t know where they stand.  That is one of the reasons I think the voting should stay.  They might think they know what they are voting for but that’s not always the case.  Many children of the ages of thirteen through fifteen don’t know much about how government really works.  They might be hoping for something that one of the candidates promised to happen and get their hopes up.  I think they would possibly hear something from a peer and think that it is true and vote for the candidate because it sounds interesting.  I also think that someone might see a commercial or an ad that says something about a candidate and vote because of that claim.  They really don’t know politics well so they might just pick off of anything they have heard about the candidate In conclusion, there are many more reasons I think the voting age should stick eighteen, but these are some okay ones.  There is actually an amendment that will tell you exactly why the voting age is eighteen.  It states that it is at eighteen because at the time, if you were eighteen, you would have to be drafted into the military therefor giving you the right to</span></span></div><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="407"></div><div class="center paper__cta" data-dcnode-id="401"><a class="button text-m" data-dcnode-id="405" data-href="/document/PK8WWFMU5PV" id="ShowMoreButton" rel="nofollow"><span data-dcnode-id="406" instrument_node="">Get Access</span></a><br data-dcnode-id="404"><a class="button text-m dark-green-bg" data-dcnode-id="402" href="javascript:void(0);" id="btnWtng" rel="nofollow"><span data-dcnode-id="403" instrument_node="">Check Writing Quality</span></a></div></div></div><div class="rhino-slot center" data-dcnode-id="398" id="AdCenterMiddle"></div><div class="paper--related-separator" data-dcnode-id="395"><span class="paper--related-separator-word" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Related</span></span></div><section class="" data-dcnode-id="198"><ul class="unstyled" data-dcnode-id="199" id="RelatedDocumentCenter"><li data-dcnode-id="382"><div class="paper paper--related" data-dcnode-id="383"><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Pros-And-Cons-Of-Congressional-Gridlocks-PCYP66NRYT"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">The Pros And Cons Of Congressional Gridlocks</span></h2></a><span class="paper--related__details" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">1098 Words &nbsp;|&nbsp;5 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Congressional gridlock is not an uncommon thing in congress. Congressional gridlock happens when there is difficulty passing a law that is trying to satisfy the needs of the people. Gridlock often makes us feel stuck. Neither political party can reach an agreement to enforce a law on an issue, therefore they continue to meet and discuss until a conclusion is made. Gridlock is also referred to as “deadlock” or “political stalemate” because it is almost as if there is nothing either party can do.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="387"></div><div class="center paper__cta" data-dcnode-id="384"><a class="button text-m" data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Pros-And-Cons-Of-Congressional-Gridlocks-PCYP66NRYT"><span data-dcnode-id="386" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="369"><div class="paper paper--related" data-dcnode-id="370"><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Persuasive-Essay-On-Lowering-The-Drinking-Age-F3DCQSFMG5PV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Persuasive Essay On Lowering The Drinking Age To 18</span></h2></a><span class="paper--related__details" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">1834 Words &nbsp;|&nbsp;8 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">and adults should have the right to make their own decisions about alcohol consumption. I feel that this is a good argument but, this is what I say, while eighteen year olds have the right to vote, in many others respects they have not reached adulthood. Biologically, their brains are still developing, few support themselves economically, and most importantly many lack the emotional maturity and judgement to use alcohol safely (Drinking Age). Even though they are old enough to fight for our country is doesn’t mean they are mature enough to handle alcohol correctly. Especially when he or she is put in stressful environments.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="374"></div><div class="center paper__cta" data-dcnode-id="371"><a class="button text-m" data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Persuasive-Essay-On-Lowering-The-Drinking-Age-F3DCQSFMG5PV"><span data-dcnode-id="373" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="356"><div class="paper paper--related" data-dcnode-id="357"><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Argumentative-Essay-On-Why-The-Voting-Age-FCJMJMQAQG"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Argumentative Essay On Why The Voting Age Should Be Lowered To Sixteen</span></h2></a><span class="paper--related__details" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">2519 Words &nbsp;|&nbsp;11 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">If some citizens who are qualified to vote are denied the right to cast votes, it is considered as a severe abuse of political equality. The debate about the age of electoral majority has taken place for a long period; however, there has been moderately slight attention in the debate given to the exclusion of young people from the vote (Tremmel, 2015). Some of the critics of lowering the voting age to sixteen claim that the young people do not possess the capability and motivation of appropriately taking part in the elections. Some studies have shown that the turnout of the voters ages 18 years is relatively low, however, this cannot specifically attribute to the motivation to take part in the election (Wagner, Johann, &amp; Kritzinger, 2012). This shows that this the issue of the age to the electoral majority is of significance and should be discussed.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="361"></div><div class="center paper__cta" data-dcnode-id="358"><a class="button text-m" data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Argumentative-Essay-On-Why-The-Voting-Age-FCJMJMQAQG"><span data-dcnode-id="360" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="343"><div class="paper paper--related" data-dcnode-id="344"><a data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Why-Do-You-Think-Teens-Should-Have-F38YR2QMGXPT"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Why Do You Think Teens Should Have Curfew</span></h2></a><span class="paper--related__details" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">509 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">
	One way we could stop them from enforcing that law is that they are not our parents. They should not be the ones telling us when to come back home and how long we can stay out, our parents should. As Kimberly Ellis states “The law does not help rebuild residents, trust in the police, and ‘gives the impression that we don’t know how to raise our kids.’” Also they think all teens are bad, and are criminals. Which they can’t prove that because a lot of kids are not, and don’t do anything wrong.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="348"></div><div class="center paper__cta" data-dcnode-id="345"><a class="button text-m" data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Why-Do-You-Think-Teens-Should-Have-F38YR2QMGXPT"><span data-dcnode-id="347" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="330"><div class="paper paper--related" data-dcnode-id="331"><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Conspiracy-Theory-The-Sandy-Hook-Elementary-PKS5M536J4D6"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">The Conspiracy Theory: The Sandy Hook Elementary Shootings</span></h2></a><span class="paper--related__details" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">1258 Words &nbsp;|&nbsp;6 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">As stated prior, during the time of the Sandy Hook Elementary shooting, President Barack Obama was also fighting to make more strict gun control in America. President Obama wanted it to be more difficult to possess such lethal weapons, in hopes that it would lower the risk of crimes such as the Sandy Hook Elementary shooting. Because of these two events happening at the same time, many people believed that the Sandy Hook shooting was an inside job. People believed that President Obama set up the shooting in order to demonstrate why we needed more strict gun control. Society believed that the Sandy Hook shooting gave Obama evidence as to why we needed gun control.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="335"></div><div class="center paper__cta" data-dcnode-id="332"><a class="button text-m" data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Conspiracy-Theory-The-Sandy-Hook-Elementary-PKS5M536J4D6"><span data-dcnode-id="334" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="317"><div class="paper paper--related" data-dcnode-id="318"><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Argumentative-Essay-About-Curfews-FCNUAE2SG"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Against Teen Curfew</span></h2></a><span class="paper--related__details" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">913 Words &nbsp;|&nbsp;4 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Curfews are ineffective, and do not fulfil their purpose. 
	Curfews are often put in place to keep someone under the age of 18 from leaving their homes in the periods curfews are made effective (“Teen Curfews Should…”). This would ideally, deter teenage crime. The thing curfews are trying to prove is that restricting youths, forcing them to stay in their houses will decrease crime (Harrington).</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="322"></div><div class="center paper__cta" data-dcnode-id="319"><a class="button text-m" data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Argumentative-Essay-About-Curfews-FCNUAE2SG"><span data-dcnode-id="321" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="304"><div class="paper paper--related" data-dcnode-id="305"><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Success-In-George-Gladwells-The-Outliers-PCXYRVFKUZT"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Success In George Gladwell's The Outliers</span></h2></a><span class="paper--related__details" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">595 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Lower-class families frequently do not have the educational background to equip their children with the needed social skills to pursue success. He states, “his mother permits that casual incivility because she wants him to learn to assert himself with people in positions of authority… this kind of interaction simply doesn’t happen with lower class children (106-107)”.  Wealthy and middle class parents are more often able to introduce social and analytical skills into their child’s life, which cannot be learned in a classroom. This enables the skill to interact with authority figure capable of making unintended opportunities occur.  In the school environment social classes are irrelevant because they are all presented with the same education that allows them to learn at the same pace.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="309"></div><div class="center paper__cta" data-dcnode-id="306"><a class="button text-m" data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Success-In-George-Gladwells-The-Outliers-PCXYRVFKUZT"><span data-dcnode-id="308" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="291"><div class="paper paper--related" data-dcnode-id="292"><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Importance-Of-Censorship-In-Literature-PCZ9KR2EPU"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">The Importance Of Censorship In Literature</span></h2></a><span class="paper--related__details" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">2367 Words &nbsp;|&nbsp;10 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Children and teens should be able to access literature “free of restrictions” (70). Censors of young adult literature “fail to see” the similarities between their “desires to suppress information” about sexuality, violence, and religion and the “successful attempts by dictators to control their countries’ population” (70). Countries who have tried to implement censorship are practicing control over their citizens, which is why Canada should not suppress the population from any literature. If children are told they are not able to read books they are interested in or curious about they will be deterred from pursuing leisurely reading which limits their intellectual</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="296"></div><div class="center paper__cta" data-dcnode-id="293"><a class="button text-m" data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Importance-Of-Censorship-In-Literature-PCZ9KR2EPU"><span data-dcnode-id="295" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="278"><div class="paper paper--related" data-dcnode-id="279"><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Persuasive-Essay-On-Preschool-Education-PK365C33RCEDR"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Persuasive Essay On Preschool Education</span></h2></a><span class="paper--related__details" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">873 Words &nbsp;|&nbsp;4 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">This is not just an educational but an economic issue and as such, every segment of society should support. The government did not pay a lot attention on the preschool education and that make the preschool education confused, so the preschool education need more government support. 

Parents did not have an awareness to let their children to preschool education. 
 Some parents strongly believe that it is not necessary to let their children attend the preschool education.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="283"></div><div class="center paper__cta" data-dcnode-id="280"><a class="button text-m" data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Persuasive-Essay-On-Preschool-Education-PK365C33RCEDR"><span data-dcnode-id="282" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="265"><div class="paper paper--related" data-dcnode-id="266"><a data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Essay-On-Alternative-School-System-FJNCCKB5Z2R"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Traditional School System Vs Grading System Essay</span></h2></a><span class="paper--related__details" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">731 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Having you ever had to take a class in high school but never really learned anything from it? Most students have been introduced to this problem, but the few who have not been in this situation due to the difference in their schooling system. In my opinion, I think that the alternative grading system where testing is not the center of attention is much more effective. On the other hand, many people may argue that the traditional system that focuses on test, homework and quizzes is more beneficial, rather than a long term assignment. But, my reasoning states otherwise.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="270"></div><div class="center paper__cta" data-dcnode-id="267"><a class="button text-m" data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Essay-On-Alternative-School-System-FJNCCKB5Z2R"><span data-dcnode-id="269" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="252"><div class="paper paper--related" data-dcnode-id="253"><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/16-Year-Old-Reveal-Americas-Real-Dress-FKL5R7ME28TV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">16 Year Old Reveal America's Real Dress Code Analysis</span></h2></a><span class="paper--related__details" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">205 Words &nbsp;|&nbsp;1 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">After I read this article, 16-Year-Old Reveals America 's Real Dress-Code Problem, I do agree and disagree in some points. First, I disagree with the high school principle’s phrase that is “Modest is hottest.” I think he has a problem with the word choices. Why did he use the word “hottest”? For me, I think he tried to prevent his students from the “gangs,” but he should have to change his word to another.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="257"></div><div class="center paper__cta" data-dcnode-id="254"><a class="button text-m" data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/16-Year-Old-Reveal-Americas-Real-Dress-FKL5R7ME28TV"><span data-dcnode-id="256" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="239"><div class="paper paper--related" data-dcnode-id="240"><a data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Echo-Of-War-F37GAA7E28TV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Echo Of War</span></h2></a><span class="paper--related__details" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">778 Words &nbsp;|&nbsp;4 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">As for long as war has been going on in the world the it’s the intuitive for leaders to tell their men to attack and think later, but that has gotten a lot of innocent men and women killed. Therefore, that can be changed by the new leaders of today. As who person who wants to be a leader and go into the potential field of civil affairs I must be able to understand what I am getting into, plus what I can do to make the a change in the way the military works and it’s tactics. I believe that it is truly important that now as evolving leaders that we pay attention to what how the military functions and the wrong decisions that they made as leaders that are leading the military. As before we should be absorbing and preparing ourselves to not make the same mistakes that leaders before us has made.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="244"></div><div class="center paper__cta" data-dcnode-id="241"><a class="button text-m" data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Echo-Of-War-F37GAA7E28TV"><span data-dcnode-id="243" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="226"><div class="paper paper--related" data-dcnode-id="227"><a data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Voter-Turnout-Percentages-PK45GHBE28VV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Voter Turnout Percentages</span></h2></a><span class="paper--related__details" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">152 Words &nbsp;|&nbsp;1 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">There are various explanations as to why young adults have one of the lowest voter turnout percentages. Young voters feel as though that they don’t have much at stake in America than older people. Older people need to know how their children’s school’s are going to run, health insurance, hospitals, their homes, and, of course, their careers. 

 An alternative explanation is that young voters feel that there is no one worth voting for or that they are not well informed about the campaign.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="231"></div><div class="center paper__cta" data-dcnode-id="228"><a class="button text-m" data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Voter-Turnout-Percentages-PK45GHBE28VV"><span data-dcnode-id="230" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="213"><div class="paper paper--related" data-dcnode-id="214"><a data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Atheists-And-Agnostics-Negotiate-Religion-P3MDPP7E2DTT"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Atheists And Agnostics Negotiate Religion</span></h2></a><span class="paper--related__details" data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">641 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">As young adults leave the home, their rate of participation tends to drop, with it rising again when they start their own family. Some people even adopt a religion for the first time because they want to “transmit specific beliefs and morals to children.” Robin Le Poidevin (2010) in Agnosticism: A very Short Introduction, he states that Agnostics can have two very different portrayals of what could be considered moral agnostics and the thing they share in common is: “it is hard to count on their behavior as moral behavior,” however their behavior may not be immoral either. Le Poidevin (2010) challenges the notion that Agnostics can be moral, however the objective of this study is to prove otherwise. This subject needs more exposure because the notion that atheism is a negative thing in the eyes of many people should be stamped out.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="218"></div><div class="center paper__cta" data-dcnode-id="215"><a class="button text-m" data-dcnode-id="216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Atheists-And-Agnostics-Negotiate-Religion-P3MDPP7E2DTT"><span data-dcnode-id="217" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="200"><div class="paper paper--related" data-dcnode-id="201"><a data-dcnode-id="210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Anthem-Analysis-F3H7X4M4N8TV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Anthem Analysis</span></h2></a><span class="paper--related__details" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">841 Words &nbsp;|&nbsp;4 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">It is not good to be different from our brothers, but it is evil to be superior to them. The teachers told us so, and they frowned when they looked upon us”(21).
