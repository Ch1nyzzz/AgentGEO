ernment class, I would say they are knowledgeable in the field of politics. According to surveys, voting age adults between the ages of 30-45 have less of an understanding of our political system than an immigrant taking the naturalization test. Allowing teens to vote allows them to have say in their future. Also, doesn't the charter of freedom and rights state that no one should be judged because of their age. Teens have better access to media, internet and television than most elders which can help them make the right choice. Teens have the civic duties as older voters. They pay taxes, and they have to abide by the laws.Being a teenager doesn't mean you are less intelligent than an old person. In fact, the human brain actually starts to shrink in old age</span></p><span data-dcnode-id="1770" instrument_node=""> </span><div class="qt" data-dcnode-id="1765"><cite data-dcnode-id="1769"></cite><div class="report" data-dcnode-id="1766" id="365C697C-2E0E-4AF3-A241-71220ADD8681" r_type="argument"><a data-dcnode-id="1767" href="javascript:void(0)" id="report-content" onclick="

r recent Independence vote, 16 year-olds were allowed to vote; they had one of the higher voter turnouts for the whole country. As to the assertion by many that teens would only vote for whomever their friends were voting for, and thus turn the presidency into a popularity contest, what do you think it is now? You can't sidestep the fact that society will always influence everyone involved in it. I personally believe that due to their stubbornness and drive for independence, teens would be even more likely to decide for themselves than many 40 year-olds.</span></p><span data-dcnode-id="1453" instrument_node=""> </span><div class="qt" data-dcnode-id="1445"><cite data-dcnode-id="1449"><span data-dcnode-id="1452" instrument_node="">Posted by: </span><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/IthinkbeforeIspeak_Doyou/"><span data-dcnode-id="1451" instrument_node="">IthinkbeforeIspeak_Doyou</span></a></cite><div class="report" data-dcnode-id="1446" id="17F99232-4B69-4C49-8115-07B60A01EAAA" r_type="argument"><a data-dcnode-id="1447" href="javascript:void(0)" id="report-content" onclick="

            "><span data-dcnode-id="819" instrument_node="">
            Report Post</span></a></div></div><div class="q-comment-body" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">According to recent findings, human brains aren't fully mature until sometime in their twenties. I would say this might indicate people shouldn't be allowed to vote until they're around 30.</span></div></div><div cid="4F891187-FDFD-4F94-A47C-93922AAC6C31" class="q-comment" data-dcnode-id="800"><div class="q-comment-hdr" data-dcnode-id="803"><a class="user-name" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/TheInterlang"><span data-dcnode-id="812" instrument_node="">TheInterlang</span></a><span data-dcnode-id="809"><span data-dcnode-id="810" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">2013-10-05T01:00:25.497</span></span><div class="report" data-dcnode-id="804" id="4F891187-FDFD-4F94-A47C-93922AAC6C31" r_type="comment"><a data-dcnode-id="805" id="report-content" onclick="
              _gaq.push(['_trackEvent', 'UI', 'Report Post', 'https://www.debate.org/opinions/should-the-voting-age-be-lowered-to-16'])
            "><span data-dcnode-id="806" instrument_node="">
            Report Post</span></a></div></div><div class="q-comment-body" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">If brain scanning technology was around in the 1800's, they would have found a way to use it against blacks, women, etc.</span></div></div><div cid="960EC0D9-EDF6-4AA5-9A9C-BC7F84F4D9E6" class="q-comment" data-dcnode-id="787"><div class="q-comment-hdr" data-dcnode-id="790"><a class="user-name" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/grantmatthew036"><span data-dcnode-id="799" instrument_node="">grantmatthew036</span></a><span data-dcnode-id="796"><span data-dcnode-id="797" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">2020-04-18T00:32:50.587</span></span><div class="report" data-dcnode-id="791" id="960EC0D9-EDF6-4AA5-9A9C-BC7F84F4D9E6" r_type="comment"><a data-dcnode-id="792" id="report-content" onclick="
              _gaq.push(['_trackEvent', 'UI', 'Report Post', 'https://www.debate.org/opinions/should-the-voting-age-be-lowered-to-16'])
            "><span data-dcnode-id="793" instrument_node="">
            Report Post</span></a></div></div><div class="q-comment-body" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">@TheInterlang, That's a stupid argument. We don't allow 16-year-olds to do a number of activities. We don't permit them to purchase a firearm, Sign binding contracts, Enlist in the army, Get married, Drink alcohol, Smoke, Gamble, Drive without restrictions, Or sit on a jury. We are not denying 16-year-olds the right to vote, We are asking them to wait just like any other age based rights. Would you approve of 8 year olds being allowed to vote? We reasonably set our voting age for when you become a legal adult, It's not racism, Sexism, Or voter suppression.</span></div></div><div cid="DBCF3193-72AE-41D0-B233-9829DFEB1D04" class="q-comment" data-dcnode-id="774"><div class="q-comment-hdr" data-dcnode-id="777"><a class="user-name" data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/grantmatthew036"><span data-dcnode-id="786" instrument_node="">grantmatthew036</span></a><span data-dcnode-id="783"><span data-dcnode-id="784" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">2020-04-18T00:33:01.350</span></span><div class="report" data-dcnode-id="778" id="DBCF3193-72AE-41D0-B233-9829DFEB1D04" r_type="comment"><a data-dcnode-id="779" id="report-content" onclick="
