</span><h2 data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">About the Series</span></h2><span data-dcnode-id="1296" instrument_node="">
</span><div class="seriesDescription" data-dcnode-id="1279"><p data-dcnode-id="1295"></p><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Each book in the Seminar Studies series provides a concise and reliable introduction to a wide range of complex historical events and debates, covering topics in British, European, US and world history from the early modern period to the present day. Written by acknowledged experts and including supporting material such as extracts from historical documents, chronologies, glossaries, guides to key figures and further reading suggestions, Seminar Studies titles are essential reading for students of history.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Almost half a century after its launch, the series continues to introduce students to the problems involved in explaining the past, giving them the opportunity to grapple with historical documents and encouraging them to reach their own conclusions. To submit proposals for new books in the Seminar Studies series, please contact the series editors:</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1288" instrument_node="">Mark Stoyle: </span><span data-dcnode-id="1287" instrument_node="">mjs@soton.ac.uk</span></p><span data-dcnode-id="1285" instrument_node="">
