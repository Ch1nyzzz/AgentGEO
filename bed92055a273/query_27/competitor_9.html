</span><section class="text" data-dcnode-id="2793" role="tablist"><span data-dcnode-id="2810" instrument_node="">
</span><div class="text__body text__item" data-dcnode-id="2795"><h2 data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Overview</span></h2><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Voting is a fundamental act of civic participation through which young people contribute to democracy. While it’s just one of many ways forms that youth engagement can take, it is a powerful way for young people to make their voices heard and&nbsp;to have an impact on issues that affect them and their communities; it can also serve as an entry point&nbsp;to other forms of participation.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2803" instrument_node="">Historically, young people have voted at lower rates than older adults. That may be starting to change: as you can read below, </span><strong data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">2018 and 2020 saw major increases in youth voter turnout</span></strong><span data-dcnode-id="2800" instrument_node="">.&nbsp;However, there's still much work to do.&nbsp;Our research consistently indicates that the preparation many young people receive (or fail to receive) to become informed voters is inadequate, leading to significant variations in voting rates by race/ethnicity, educational attainment, and other socioeconomic and demographic factors.</span></p><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">When certain groups have more say in what happens in their communities and the nation, we fall short of the premise of our democracy. At the same time, we miss an opportunity to improve our communities and the systems that develop informed and passionate civic actors by not actively addressing structural barriers to civic learning and opportunities. Thus, broadening youth voting is one of the vital tasks in strengthening democracy.</span></p></div><span data-dcnode-id="2794" instrument_node="">

</span><div class="accordion__description" data-dcnode-id="2288"><h3 data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Voter Turnout</span></h3><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2574"><span data-dcnode-id="2578" instrument_node="">While youth continue to vote at lower rates than older Americans, recent election cycles have provided reasons for optimism—and shown that candidates and campaigns ignore young people at their peril. In 2018, a record-high 28% of young people voted in the midterms, more than doubling the record-low 13% youth turnout in 2014. In 2020, we estimate that 50% of young people cast a ballot, one of the highest youth turnout rates in decades.&nbsp;</span><strong data-dcnode-id="2575"><a data-dcnode-id="2576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/2020-election-center"><span data-dcnode-id="2577" instrument_node="">Read more</span></a></strong></p><span data-dcnode-id="2573" instrument_node="">

</span><h3 data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Vote Choice</span></h3><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2332" instrument_node="">There has been a consequential shift in youth vote choice. In decades past, young people split their votes somewhat evenly between Democrats and Republicans: as recently as 1988, Republican George H.W. Bush won the youth vote on his way to winning the presidency, and as recently as 2002 the national youth vote choice for House candidates was roughly 50-50. In 2018, youth supported House Democrats by an extraordinary 35-point margin, and in 2020 by 26 points.&nbsp;The last two Democratic presidential candidates (Clinton and Biden) won the youth vote by 18 and 25&nbsp;percentage points, respectively.&nbsp;</span><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/election-week-2020"><strong data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Read more</span></strong></a></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2323"><iframe aria-label="Interactive line chart" data-dcnode-id="2326" frameborder="0" height="494" id="datawrapper-chart-rr82W" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/rr82W/3/&amp;raw" style="width: 0px; border: none; min-width: 100% !important; height: 494px;" title="Historical Youth Vote Choice in National Elections"></iframe></p><span data-dcnode-id="2322" instrument_node="">
</span><h3 data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Voting by Generations</span></h3><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">While it's true that young people generally vote at lower levels than older adults, those from older generations voted at similar rates than today's Millennial and Gen Z youth when they were at the same age. Our analysis has found that, for the first presidential election in which a generation's entire 18-24 age cohort was eligible to vote (1972 for Boomers, 1992 for Gen X, 2008 for Millennials), each participated at about a 50% rate. This highlights that lower youth voting rates are not a sign of generational apathy, but of systemic barriers and issues with the culture of political engagement that have plagued young people of various generations for decades.</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2312"><iframe aria-label="Interactive line chart" data-dcnode-id="2315" frameborder="0" height="532" id="datawrapper-chart-d8FpJ" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/d8FpJ/2/&amp;raw" style="width: 0px; border: none; min-width: 100% !important; height: 497.333px;" title="Millennials, Gen Xers, and Boomers Have Voted at Similar Rates When They Were The Same Age"></iframe></p><span data-dcnode-id="2311" instrument_node="">

</span><div class="accordion__description" data-dcnode-id="1142"><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">It's well-understood that the identities, background, and experiences (such as race/ethnicity, gender, and educational attainment) of young people often correlate&nbsp;with their vote choice, a pattern that is common across all age groups. What often receives less attention is that they also influence whether youth register and vote. In particular, some communities of color and youth from other historically oppressed groups are more likely to face barriers to voting and other forms of civic participation.</span></p><span data-dcnode-id="2272" instrument_node="">
</span><h3 data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Differences by Race and Gender</span></h3><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2268" instrument_node="">Young women have voted at a higher rate than young men in recent election cycles; part of a broader trend of higher civic engagement among young women. Historically, white youth have voted at a higher rate than young people of color—though Black youth voter participation matched or exceeded that of white youth in several presidential elections. More recently, Asian and Latino youth have increased their voter turnout. But stubborn voting gaps by race/ethnicity remain an impediment to the pursuit of an equitable multiracial democracy.&nbsp;</span><a data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/2020-youth-voter-turnout-raceethnicity-and-gender"><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Read more</span></strong></a></p><span data-dcnode-id="2263" instrument_node="">

</span><h3 data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Differences by Education</span></h3><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1944" instrument_node="">Youth without college experience also tend to vote at lower rates than young people in college: for example, in 2020, we estimate that 50% of youth (ages 18-29) voted, while our colleagues at the Institute for Democracy &amp; Higher Education </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tufts.app.box.com/v/democracy-counts-2020"><span data-dcnode-id="1943" instrument_node="">estimate that 66% of college students</span></a><span data-dcnode-id="1941" instrument_node=""> (albeit of all ages) cast a ballot. Our research has found that young people without college experience can be disproportionately impacted by barriers to voting, while youth who are in college are more likely to be contacted by political organizations and campaigns. </span><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/why-youth-dont-vote-differences-race-and-education"><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Read more</span></strong></a></p><span data-dcnode-id="1936" instrument_node="">

</span><h3 data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Differences by Age, State, Urban/Rural, etc.</span></h3><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Many other factors correlate with youth voting and can lead to or manifest inequities in civic and political engagement.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><ul data-dcnode-id="1682"><span data-dcnode-id="1707" instrument_node="">
</span><li data-dcnode-id="1700"><strong data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Age:&nbsp;</span></strong><span data-dcnode-id="1704" instrument_node="">The youngest potential voters, who are newly eligible members of the electorate, have historically voted at lower rates.&nbsp;In 2020, turnout of youth ages 18-19 nationally was 46%, compared to 50% for all under-30 voters. Many campaigns and organizations focus on individuals with a history of voting or others they consider "likely" voters, thereby leaving out those new to the electorate.&nbsp;</span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/youth-turnout-among-teens-shows-need-growing-voters"><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Read more</span></strong></a></li><span data-dcnode-id="1699" instrument_node="">
</span><li data-dcnode-id="1692"><strong data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">State:&nbsp;</span></strong><span data-dcnode-id="1696" instrument_node="">Youth electoral participation can also vary widely by state: in 2020, youth voter turnout ranged from 32% in South Dakota, to 67% in New Jersey. Myriad aspects of a state's civic and political environment can influence youth participation, including whether election laws and policies make it easier to register and vote.&nbsp;</span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/half-youth-voted-2020-11-point-increase-2016"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Read more</span></strong></a></li><span data-dcnode-id="1691" instrument_node="">
</span><li data-dcnode-id="1684"><b data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Urban/Rural:&nbsp;</span></b><span data-dcnode-id="1688" instrument_node="">Our research has found that a majority of rural youth believe they live in Civic Deserts—parts of the country where they see few opportunities for political learning and engagement. In 2020, four out of the five states with the lowest youth voter turnout (SD, OK, AR, WV) are also among the most rural states in the country.&nbsp;</span><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/civic-deserts-60-rural-millennials-lack-access-political-life"><strong data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Read more</span></strong></a></li><span data-dcnode-id="1683" instrument_node="">
</span></ul><span data-dcnode-id="1681" instrument_node="">

</span><div class="accordion__description" data-dcnode-id="617"><p data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">Many believe that young people are apathetic about politics; research, including ours, </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/poll-young-people-believe-they-can-lead-change-unprecedented-election-cycle"><span data-dcnode-id="1127" instrument_node="">shows this is not the case</span></a><span data-dcnode-id="1125" instrument_node="">. Young people are passionate about issues and often want to engage in the political process, but they frequently face barriers to participation. As we explore throughout our research, many of these barriers are even more consequential for youth of color and other marginalized young people, which impacts their ability to vote individually, but also their communities’ ability to be well-represented and served by our policies and institutions.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><h3 data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Voting Laws, Policies, and Processes</span></h3><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node="">Voting in America is not a straightforward process. Registration deadlines and requirements are different in every state, voting may conflict with work and/or class schedule, absentee voting rules are confusing, voters may lack transportation to the polls, etc. Some of these barriers are especially acute for the youngest voters, who may struggle to update their voter registration when they move dorms each year in college, or who are less likely to have a driver's license to use as a voter ID. </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/why-youth-dont-vote-differences-race-and-education"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Learn more</span></strong></a></p><span data-dcnode-id="1114" instrument_node="">

</span><h3 data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Lack of Civic Education, Engagement, and Outreach</span></h3><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="863" instrument_node="">Other barriers run deeper: many young people have not been taught about elections and voting;&nbsp;both the practicalities of registering and&nbsp;casting a ballot and the reasons why their voices and votes matter in democracy. For example,&nbsp;in 2020, we saw how </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/young-people-and-vote-mail-lessons-2020"><span data-dcnode-id="862" instrument_node="">a lack of familiarity with processes like voting by mail</span></a><span data-dcnode-id="860" instrument_node=""> became a potential hindrance to youth participation. Moreover, young people are often ignored by political campaigns—which tend to rely on records of previous voting—creating a vicious circle in which candidates do not value youth as voters and youth, who don't see themselves valued, don't vote.&nbsp;</span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/youth-who-learned-about-voting-high-school-more-likely-become-informed-and-engaged"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Read more</span></strong></a></p><span data-dcnode-id="855" instrument_node="">

</span><li data-dcnode-id="625"><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/opaque-landscape-felony-disenfranchisement-laws-poses-challenge-young-voters"><span data-dcnode-id="627" instrument_node="">How a lack of information about felon disenfranchisement laws can hinder youth voting</span></a></li><span data-dcnode-id="624" instrument_node="">

</span><div class="accordion__item" data-dcnode-id="359"><span data-dcnode-id="611" instrument_node="">
</span><div class="accordion__title" data-dcnode-id="606" id="how-to-increase-and-broaden-youth-voting"><span data-dcnode-id="610" instrument_node="">
</span><div class="field field--name-field-title field--type-string field--label-hidden field__item" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">How to Increase and Broaden Youth Voting</span></div><span data-dcnode-id="607" instrument_node="">
</span></div><span data-dcnode-id="605" instrument_node="">
</span><div class="accordion__container" data-dcnode-id="361" data-height="970px"><span data-dcnode-id="604" instrument_node="">
</span><div class="accordion__description" data-dcnode-id="363"><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The barriers and disparities that prevent all young people from participating equitably in democracy are not immutable. Much of CIRCLE's work has been dedicated to identifying the specific interventions, initiatives, and reforms that will increase and broaden youth voting and civic engagement:</span></p><span data-dcnode-id="601" instrument_node="">
</span><ul data-dcnode-id="573"><span data-dcnode-id="600" instrument_node="">
</span><li data-dcnode-id="591"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">CIRCLE Growing Voters:&nbsp;</span></strong><span data-dcnode-id="597" instrument_node="">Our research has shown that we must start preparing young people to participate in democracy before they turn 18.&nbsp;That includes a strong, comprehensive civic education that explicitly teaches about elections and voting; election administration that centers youth; media that includes young voices; local youth organizations that incorporate voter education and engagement into their work; etc.</span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">
</span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/growing-voters-engaging-youth-they-reach-voting-age-strengthen-democracy"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Read more</span></strong></a></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="583"><strong data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Facilitative election laws:</span></strong><span data-dcnode-id="587" instrument_node="">&nbsp;Laws that make it easier for young people to register to vote, such as automatic registration, same-day registration, and pre-registration for 16- and 17-year-olds, can improve youth voting rates. Our research also supports the idea of lowering the voting age in local elections.&nbsp;</span><strong data-dcnode-id="584"><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/facilitative-election-laws"><span data-dcnode-id="586" instrument_node="">Read more</span></a></strong></li><span data-dcnode-id="582" instrument_node="">
</span><li data-dcnode-id="575"><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Campaign outreach and direct engagement:</span></strong><span data-dcnode-id="579" instrument_node="">&nbsp;Young people are much more likely to vote when they're directly asked and encouraged to do so, both by campaigns and by relatives and peers. Broadening outreach and intentionally focusing on young people from underserved or marginalized communities can expand the electorate.&nbsp;</span><strong data-dcnode-id="576"><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//circle.tufts.edu/latest-research/political-outreach-youth-was-effective-2018-midterms"><span data-dcnode-id="578" instrument_node="">Read more</span></a></strong></li><span data-dcnode-id="574" instrument_node="">
</span></ul><span data-dcnode-id="572" instrument_node="">
