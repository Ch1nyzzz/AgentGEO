</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="5099" width="100%"><tbody data-dcnode-id="5101"><tr data-dcnode-id="5103"><td class="Cl-Level1-NoBorder" data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">3. Statistical presentation</span></td><td align="right" data-dcnode-id="5105"><a class="DocCommon" data-dcnode-id="5106" href="#"><span data-dcnode-id="5107" instrument_node="">Top</span></a></td></tr></tbody></table><span data-dcnode-id="5098" instrument_node=""> </span></td></tr><tr data-dcnode-id="5088"><td class="Cl-Level2" data-dcnode-id="5090"><a data-dcnode-id="5092" name="data_descr"></a><span data-dcnode-id="5091" instrument_node="">3.1. Data description</span></td></tr><tr data-dcnode-id="5054"><td class="Cl-Content" data-dcnode-id="5056"><p data-dcnode-id="5084" style="text-align: justify;"><span data-dcnode-id="5085" instrument_node="">These summary metadata refer to the first results on the main demographic developments in the year of reference.</span></p><span data-dcnode-id="5083" instrument_node=""> </span><p data-dcnode-id="5078" style="text-align: justify;"><span data-dcnode-id="5082" instrument_node="">Member States send to Eurostat the first results on the main demographic developments in the year of reference (T), containing the total population figure on 31 December of year T (further published by Eurostat as Population on 1 January of year T+1), total births and total deaths during year T. This data collection is defined&nbsp; under&nbsp;</span><a data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/legal-content/EN/TXT/HTML/%3Furi%3DCELEX%3A32013R1260%26from%3DEN" target="_blank" title="Regulation EU 1260/2013"><span data-dcnode-id="5081" instrument_node="">Regulation 1260/2013 </span></a><span data-dcnode-id="5079" instrument_node="">on European demographic statistics. Countries may also transmit to Eurostat, on voluntary basis,&nbsp; provisional data on total immigration, emigration and net migration during the year (T).</span></p><span data-dcnode-id="5077" instrument_node=""> </span><p data-dcnode-id="5072" style="text-align: justify;"><span data-dcnode-id="5076" instrument_node="">Eurostat's data collection on the above figures is called DEMOBAL and it is carried out in June of each year. Eurostat publishes these first demographic estimates in July of each year in the online database, in the table </span><a data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//appsso.eurostat.ec.europa.eu/nui/show.do%3Fquery%3DBOOKMARK_DS-054722_QID_5358273_UID_-3F171EB0%26layout%3DINDIC_DE%2CC%2CX%2C0%3BGEO%2CC%2CY%2C0%3BTIME%2CC%2CZ%2C0%3BINDICATORS%2CC%2CZ%2C1%3B%26zSelection%3DDS-054722TIME%2C2019%3BDS-054722INDICATORS%2COBS_FLAG%3B%26rankName1%3DINDICATORS_1_2_-1_2%26rankName2%3DTIME_1_0_0_0%26rankName3%3DINDIC-DE_1_2_0_0%26rankName4%3DGEO_1_2_0_1%26rStp%3D%26cStp%3D%26rDCh%3D%26cDCh%3D%26rDM%3Dtrue%26cDM%3Dtrue%26footnes%3Dfalse%26empty%3Dfalse%26wai%3Dfalse%26time_mode%3DNONE%26time_most_recent%3Dfalse%26lang%3DEN%26cfo%3D%2523%2523%2523%252C%2523%2523%2523.%2523%2523%2523" target="_blank"><span data-dcnode-id="5075" instrument_node="">Population change - Demographic balance and crude rates (demo_gind)</span></a><span data-dcnode-id="5073" instrument_node="">.</span></p><span data-dcnode-id="5071" instrument_node=""> </span><p data-dcnode-id="5066" style="text-align: justify;"><span data-dcnode-id="5070" instrument_node="">These first demographic estimates may either be confirmed or updated by Eurostat's demographic data collection taking place in December each year (called Unidemo), whereby countries submit detailed breakdowns (e.g. by age and sex) of their yearly population data, including data on migration, both at national and at regional level. The online table </span><a data-dcnode-id="5068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//appsso.eurostat.ec.europa.eu/nui/show.do%3Fquery%3DBOOKMARK_DS-054722_QID_5358273_UID_-3F171EB0%26layout%3DINDIC_DE%2CC%2CX%2C0%3BGEO%2CC%2CY%2C0%3BTIME%2CC%2CZ%2C0%3BINDICATORS%2CC%2CZ%2C1%3B%26zSelection%3DDS-054722TIME%2C2019%3BDS-054722INDICATORS%2COBS_FLAG%3B%26rankName1%3DINDICATORS_1_2_-1_2%26rankName2%3DTIME_1_0_0_0%26rankName3%3DINDIC-DE_1_2_0_0%26rankName4%3DGEO_1_2_0_1%26rStp%3D%26cStp%3D%26rDCh%3D%26cDCh%3D%26rDM%3Dtrue%26cDM%3Dtrue%26footnes%3Dfalse%26empty%3Dfalse%26wai%3Dfalse%26time_mode%3DNONE%26time_most_recent%3Dfalse%26lang%3DEN%26cfo%3D%2523%2523%2523%252C%2523%2523%2523.%2523%2523%2523" target="_blank"><span data-dcnode-id="5069" instrument_node="">Population change - Demographic balance and crude rates (demo-gind)</span></a><span data-dcnode-id="5067" instrument_node=""> will be accordingly updated. This table includes the latest updates on total population, births and deaths reported by the countries, while the detailed breakdowns by various characteristics included in the rest of the tables of the Eurostat database (Demography domain and Migration,&nbsp;for&nbsp;example&nbsp;the Population by citizenship and by country of birth&nbsp;table) may be transmitted to Eurostat at a subsequent date.</span></p><span data-dcnode-id="5065" instrument_node=""> </span><p data-dcnode-id="5060" style="text-align: justify;"><span data-dcnode-id="5064" instrument_node="">The online table </span><a data-dcnode-id="5062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//appsso.eurostat.ec.europa.eu/nui/show.do%3Fquery%3DBOOKMARK_DS-054722_QID_5358273_UID_-3F171EB0%26layout%3DINDIC_DE%2CC%2CX%2C0%3BGEO%2CC%2CY%2C0%3BTIME%2CC%2CZ%2C0%3BINDICATORS%2CC%2CZ%2C1%3B%26zSelection%3DDS-054722TIME%2C2019%3BDS-054722INDICATORS%2COBS_FLAG%3B%26rankName1%3DINDICATORS_1_2_-1_2%26rankName2%3DTIME_1_0_0_0%26rankName3%3DINDIC-DE_1_2_0_0%26rankName4%3DGEO_1_2_0_1%26rStp%3D%26cStp%3D%26rDCh%3D%26cDCh%3D%26rDM%3Dtrue%26cDM%3Dtrue%26footnes%3Dfalse%26empty%3Dfalse%26wai%3Dfalse%26time_mode%3DNONE%26time_most_recent%3Dfalse%26lang%3DEN%26cfo%3D%2523%2523%2523%252C%2523%2523%2523.%2523%2523%2523" target="_blank"><span data-dcnode-id="5063" instrument_node="">Population change - Demographic balance and crude rates (demo-gind)</span></a><span data-dcnode-id="5061" instrument_node=""> contains time series going back to 1960; data before 2013 were collected by Eurostat from the national statistical offices on voluntary basis.</span></p><span data-dcnode-id="5059" instrument_node=""> </span><p data-dcnode-id="5057" style="text-align: justify;"><span data-dcnode-id="5058" instrument_node="">The individual metadata files reported by the countries are attached to this metadata file.</span></p></td></tr><tr data-dcnode-id="5047"><td class="Cl-Level2" data-dcnode-id="5049"><a data-dcnode-id="5051" name="class_system"></a><span data-dcnode-id="5050" instrument_node="">3.2. Classification system</span></td></tr><tr data-dcnode-id="5040"><td class="Cl-Content" data-dcnode-id="5042"><p data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">Not applicable.</span></p></td></tr><tr data-dcnode-id="5033"><td class="Cl-Level2" data-dcnode-id="5035"><a data-dcnode-id="5037" name="coverage_sector"></a><span data-dcnode-id="5036" instrument_node="">3.3. Coverage - sector</span></td></tr><tr data-dcnode-id="5026"><td class="Cl-Content" data-dcnode-id="5028"><p data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">Not applicable.</span></p></td></tr><tr data-dcnode-id="5019"><td class="Cl-Level2" data-dcnode-id="5021"><a data-dcnode-id="5023" name="stat_conc_def"></a><span data-dcnode-id="5022" instrument_node="">3.4. Statistical concepts and definitions</span></td></tr><tr data-dcnode-id="4724"><td class="Cl-Content" data-dcnode-id="4726"><p data-dcnode-id="5014" style="text-align: justify;"><strong data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Population on 1 January</span></strong></p><span data-dcnode-id="5013" instrument_node=""> </span><p data-dcnode-id="5011" style="text-align: justify;"><span data-dcnode-id="5012" instrument_node="">Eurostat aims at collecting from the EU Member States data on population on 1 January. The recommended definition is the 'usually resident population' and represents the number of inhabitants of a given area on 1 January of the year in question (or, in some cases, on 31st December of the previous year). The population transmitted by the countries can also be either based on data from the most recent census adjusted by the components of population change produced since the last census, either based on population registers. (More detailed information is available in the national metadata files.)</span></p><span data-dcnode-id="5010" instrument_node=""> </span><p align="left" data-dcnode-id="5006" style="text-align: justify;"><strong data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">Usual residence</span></strong><span data-dcnode-id="5007" instrument_node=""> means the place where a person normally spends the daily period of rest, regardless of temporary absences for purposes of recreation, holidays, visits to friends and relatives, business, medical treatment or religious pilgrimage. The following persons alone are considered to be usually residents of the geographical area in question:</span></p><span data-dcnode-id="5005" instrument_node="">
</span><ul data-dcnode-id="4997" style="text-align: justify;"><span data-dcnode-id="5004" instrument_node="">
</span><li data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">those who have lived in their place of usual residence for a continuous period of at least 12 months before the reference time; or</span></li><span data-dcnode-id="5001" instrument_node="">
</span><li data-dcnode-id="4999"><span data-dcnode-id="5000" instrument_node="">those who arrived in their place of usual residence during the 12 months before the reference time with the intention of staying there for at least one year.</span></li><span data-dcnode-id="4998" instrument_node="">
</span></ul><span data-dcnode-id="4996" instrument_node=""> </span><p data-dcnode-id="4993" style="margin: 0cm 0cm 0pt; text-align: justify;"><strong data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">Average population</span></strong></p><span data-dcnode-id="4992" instrument_node=""> </span><p data-dcnode-id="4990" style="text-align: justify; margin: 0cm 0cm 0pt;"><span data-dcnode-id="4991" instrument_node="">The average population is calculated as the arithmetic mean of the population on 1st January of two consecutive years. The average population is further used in the calculation of demographic indicators, like the crude rates per 1000 persons.</span></p><span data-dcnode-id="4989" instrument_node=""> </span><p data-dcnode-id="4986" style="text-align: justify; margin: 0cm 0cm 0pt;"><strong data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">Population change</span></strong></p><span data-dcnode-id="4985" instrument_node=""> </span><p data-dcnode-id="4983" style="text-align: justify; margin: 0cm 0cm 0pt;"><span data-dcnode-id="4984" instrument_node="">The difference between the size of the population at the end and the beginning of the period Specifically, it is the difference in population size on 1 January of two consecutive years. A positive population change is also referred to as population growth. A negative population change is also referred to as population decline.</span></p><span data-dcnode-id="4982" instrument_node=""> </span><p data-dcnode-id="4980" style="text-align: justify; margin: 0cm 0cm 0pt;"><span data-dcnode-id="4981" instrument_node="">The population change consists of two components: natural change and net migration.</span></p><span data-dcnode-id="4979" instrument_node=""> </span><p data-dcnode-id="4976" style="text-align: justify; margin: 0cm 0cm 0pt;"><strong data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">Natural change of population</span></strong></p><span data-dcnode-id="4975" instrument_node=""> </span><p data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">The difference between the number of live births and the number of deaths during the year. A positive natural change, also known as natural increase, occurs when live births outnumber deaths. A negative natural change, also named as natural decrease, occurs when live births are less numerous than deaths.</span></p><span data-dcnode-id="4972" instrument_node=""> </span><p data-dcnode-id="4969"><strong data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">Net migration plus statistical adjustment</span></strong></p><span data-dcnode-id="4968" instrument_node=""> </span><p data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">Net migration is the difference between the number of immigrants and the number of emigrants. In the context of the annual demographic balance however, Eurostat produces net migration figures by taking the difference between total population change and natural change; this concept is referred to as net migration plus statistical adjustment. The statistics on 'net migration plus statistical adjustment' are therefore affected by all the statistical inaccuracies in the two components of this equation, especially population change. From one country to another 'net migration p statistical adjustment' may cover, besides the difference between inward and outward migration, other changes observed in the population figures between 1 January in two consecutive years which cannot be attributed to births, deaths, immigration and emigration.</span></p><span data-dcnode-id="4965" instrument_node=""> </span><p data-dcnode-id="4962"><strong data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">Population turnover</span></strong></p><span data-dcnode-id="4961" instrument_node=""> </span><p data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">The total magnitude of changes in membership experienced by a population. It shows the 'gross' effect of the population components, by adding up gains (births and immigration) and losses (deaths and emigration) in a population, as compare to the population change which shows their 'net' effect. The population turnover consists of two components: natural turnover and migration turnover plus statistical adjustment.</span></p><span data-dcnode-id="4958" instrument_node=""> </span><p data-dcnode-id="4955"><strong data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">Natural turnover</span></strong></p><span data-dcnode-id="4954" instrument_node=""> </span><p data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">The sum of births and deaths numbers.</span></p><span data-dcnode-id="4951" instrument_node=""> </span><p data-dcnode-id="4948"><strong data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">Migration turnover plus statistical adjustment</span></strong></p><span data-dcnode-id="4947" instrument_node=""> </span><p data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">The sum of immigration, emigration numbers and the statistical adjustment reported in the population.</span></p><span data-dcnode-id="4944" instrument_node=""> </span><p data-dcnode-id="4941"><strong data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">Crude rates</span></strong></p><span data-dcnode-id="4940" instrument_node=""> </span><p data-dcnode-id="4938" style="text-align: justify; margin: 0cm 0cm 0pt;"><span data-dcnode-id="4939" instrument_node="">A crude rate is calculated as the ratio of the number of events to the average population of the respective area in a given year. For easier presentation, it is multiplied by 1000; the result is therefore expressed per 1000 persons (of the average population).</span></p><span data-dcnode-id="4937" instrument_node=""> </span><p class="Text2" data-dcnode-id="4932" style="text-align: justify;"><span data-dcnode-id="4936" instrument_node="">The table below presents a </span><strong data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">summary with the reported reference populations</span></strong><span data-dcnode-id="4933" instrument_node=""> based on which statistics on population, births and deaths are tranmsitted by the national statistical institutes to Eurostat. Several countries place themselves in two categories, with justification in the national metadata files.</span></p><span data-dcnode-id="4931" instrument_node="">

nt_node=""> </span></td><td data-dcnode-id="4780"><span data-dcnode-id="4784" instrument_node=""> </span><p align="left" data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">AT, BE, CZ, DE, DK, ES, IS, NL, SE</span></p><span data-dcnode-id="4781" instrument_node=""> </span></td><td data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">&nbsp;-</span></td></tr></tbody></table><span data-dcnode-id="4770" instrument_node=""> </span><p data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4767" instrument_node="">
</span><hr align="left" data-dcnode-id="4766" size="1" width="33%"><span data-dcnode-id="4765" instrument_node=""> </span><p data-dcnode-id="4761"><span class="sdfootnotesym" data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">1</span></span><span data-dcnode-id="4762" instrument_node="">'Usually Resident Population' as stated in Article 2 of Regulation 1260/2013.</span></p><span data-dcnode-id="4760" instrument_node=""> </span><p data-dcnode-id="4756"><sup data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">2 </span></sup><span data-dcnode-id="4757" instrument_node="">'Legal Residence Population' is composed of those persons who are entitled to be settled in the country at the reference date, either by holding the national citizenship or by other authorization issued by national authorities.</span></p><span data-dcnode-id="4755" instrument_node=""> </span><p data-dcnode-id="4751"><span class="sdfootnotesym" data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">3</span></span><span data-dcnode-id="4752" instrument_node="">'Registered Residence Population' is composed of those persons who are listed on one or more registers owned by national authorities at the reference date. Each registered person shall be counted only once.</span></p><span data-dcnode-id="4750" instrument_node=""> </span><p data-dcnode-id="4745"><sup data-dcnode-id="4747"><sup data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">[4]</span></sup></sup><span data-dcnode-id="4746" instrument_node="">for non-nationals.</span></p><span data-dcnode-id="4744" instrument_node=""> </span><p data-dcnode-id="4739"><sup data-dcnode-id="4741"><sup data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">[5]</span></sup></sup><span data-dcnode-id="4740" instrument_node="">permanent residence.</span></p><span data-dcnode-id="4738" instrument_node=""> </span><p data-dcnode-id="4733"><sup data-dcnode-id="4735"><sup data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">[6]</span></sup></sup><span data-dcnode-id="4734" instrument_node="">only events occurring in the country.</span></p><span data-dcnode-id="4732" instrument_node=""> </span><p data-dcnode-id="4727" style="text-align: justify;"><sup data-dcnode-id="4729"><sup data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">[7]</span></sup></sup><span data-dcnode-id="4728" instrument_node="">only events occurring in the country.</span></p></td></tr><tr data-dcnode-id="4717"><td class="Cl-Level2" data-dcnode-id="4719"><a data-dcnode-id="4721" name="stat_unit"></a><span data-dcnode-id="4720" instrument_node="">3.5. Statistical unit</span></td></tr><tr data-dcnode-id="4710"><td class="Cl-Content" data-dcnode-id="4712"><p data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">Th statistical unit used is ''person'' as indicated in the online database or deductible from the title of tables or of the indicator.</span></p></td></tr><tr data-dcnode-id="4703"><td class="Cl-Level2" data-dcnode-id="4705"><a data-dcnode-id="4707" name="stat_pop"></a><span data-dcnode-id="4706" instrument_node="">3.6. Statistical population</span></td></tr><tr data-dcnode-id="4693"><td class="Cl-Content" data-dcnode-id="4695"><p data-dcnode-id="4696"><span data-dcnode-id="4700" instrument_node="">Statistical population is total population as defined in </span><strong data-dcnode-id="4697"><em data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">3.4. Statistical concepts and definitions.</span></em></strong></p></td></tr><tr data-dcnode-id="4686"><td class="Cl-Level2" data-dcnode-id="4688"><a data-dcnode-id="4690" name="ref_area"></a><span data-dcnode-id="4689" instrument_node="">3.7. Reference area</span></td></tr><tr data-dcnode-id="4617"><td class="Cl-Content" data-dcnode-id="4619"><p align="left" data-dcnode-id="4682" style="text-align: justify;"><span data-dcnode-id="4683" instrument_node="">The population statistics are disseminated by single country, by region and by aggregates of countries, as follows:</span></p><span data-dcnode-id="4681" instrument_node=""> </span><p align="left" data-dcnode-id="4675" style="text-align: justify;"><strong data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">a)</span></strong><span data-dcnode-id="4678" instrument_node=""> The Member States of the European Union and their regional structure as defined in the </span><a data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/eurostat/web/nuts/overview" target="_blank"><span data-dcnode-id="4677" instrument_node="">Nomenclature of territorial units for statistics</span></a></p><span data-dcnode-id="4674" instrument_node=""> </span><p align="left" data-dcnode-id="4668" style="text-align: justify;"><strong data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">b)</span></strong><span data-dcnode-id="4671" instrument_node=""> The EU candidate countries and their agreed Statistical Regions following the same rules as the </span><a data-dcnode-id="4669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/eurostat/web/nuts/overview" target="_blank"><span data-dcnode-id="4670" instrument_node="">Nomenclature of territorial units for statistics</span></a></p><span data-dcnode-id="4667" instrument_node=""> </span><p align="left" data-dcnode-id="4661" style="text-align: justify;"><strong data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">c)</span></strong><span data-dcnode-id="4664" instrument_node=""> The EFTA countries and their agreed Statistical Regions following the same rules as the </span><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/eurostat/web/nuts/overview" target="_blank"><span data-dcnode-id="4663" instrument_node="">Nomenclature of territorial units for statistics</span></a></p><span data-dcnode-id="4660" instrument_node=""> </span><p align="left" data-dcnode-id="4656" style="text-align: justify;"><strong data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">d)</span></strong><span data-dcnode-id="4657" instrument_node=""> Other countries: Andorra, Armenia, Azerbaijan, Belarus, Bosnia and Herzegovina, Georgia, Moldova, Russian Federation, San Marino, Kosovo (under UNSCR 1244), United Kingdom and Ukraine.</span></p><span data-dcnode-id="4655" instrument_node=""> </span><p align="left" data-dcnode-id="4651" style="text-align: justify;"><strong data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">e)</span></strong><span data-dcnode-id="4652" instrument_node=""> The geographical aggregates European Union and Euro Area, on which the dissemination covers at least the current and the previous version of their composition, the European Economic Area (EEA) and the European Free Trade Association (EFTA).</span></p><span data-dcnode-id="4650" instrument_node=""> </span><p align="left" data-dcnode-id="4645" style="text-align: justify;"><span data-dcnode-id="4649" instrument_node="">For details on geographical changes over time see the notes by country under </span><strong data-dcnode-id="4646"><em data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">15.2 Comparability over time.</span></em></strong></p><span data-dcnode-id="4644" instrument_node=""> </span><p align="left" data-dcnode-id="4637" style="text-align: justify;"><strong data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">National </span></strong><span data-dcnode-id="4641" instrument_node="">refers to the territory of a Member State within the meaning of </span><a data-dcnode-id="4639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/legal-content/EN/TXT/HTML/%3Furi%3DCELEX%3A32003R1059%26qid%3D1448964741009%26from%3DEN" target="_blank"><span data-dcnode-id="4640" instrument_node="">Regulation (EC) No 1059/2003</span></a><span data-dcnode-id="4638" instrument_node=""> applicable at the reference time.</span></p><span data-dcnode-id="4636" instrument_node=""> </span><p align="left" data-dcnode-id="4620" style="text-align: justify;"><strong data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">Regional</span></strong><span data-dcnode-id="4633" instrument_node=""> refers to </span><strong data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node="">NUTS level 1</span></strong><span data-dcnode-id="4630" instrument_node="">, </span><strong data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">NUTS level 2</span></strong><span data-dcnode-id="4627" instrument_node=""> or </span><strong data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">NUTS level 3</span></strong><span data-dcnode-id="4624" instrument_node=""> as defined in the </span><a data-dcnode-id="4622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/legal-content/EN/TXT/HTML/%3Furi%3DCELEX%3A32003R1059%26qid%3D1448964741009%26from%3DEN" target="_blank"><span data-dcnode-id="4623" instrument_node="">Regulation (EC) No 1059/2003</span></a><span data-dcnode-id="4621" instrument_node=""> and available according to the classification in force at the reference time; where this term is used in connection with countries that are not members of the European Union, "regional" means the Statistical Regions at level 1, 2 or 3, as agreed between those countries and the Commission (Eurostat), at the reference time.</span></p></td></tr><tr data-dcnode-id="4610"><td class="Cl-Level2" data-dcnode-id="4612"><a data-dcnode-id="4614" name="coverage_time"></a><span data-dcnode-id="4613" instrument_node="">3.8. Coverage - Time</span></td></tr><tr data-dcnode-id="4588"><td class="Cl-Content" data-dcnode-id="4590"><p align="left" data-dcnode-id="4600" style="text-align: justify;"><span data-dcnode-id="4607" instrument_node="">The available time series collected and published in Eurostat database varies with the population breakdowns, with the longest time series starting in </span><strong data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">1960</span></strong><span data-dcnode-id="4604" instrument_node=""> for national data and </span><strong data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">1990</span></strong><span data-dcnode-id="4601" instrument_node=""> for regional data, and continuing to the latest available reference year.</span></p><span data-dcnode-id="4599" instrument_node=""> </span><p align="left" data-dcnode-id="4591" style="text-align: justify;"><span data-dcnode-id="4598" instrument_node="">The completeness of the time series of the demography and migration statistics collected on voluntary basis before the entering into force of the regulations listed in </span><strong data-dcnode-id="4593"><span data-dcnode-id="4597" instrument_node="">"</span><em data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">6.1 Institutional mandate – legal acts and other agreements"</span></em><span data-dcnode-id="4594" instrument_node=""> </span></strong><span data-dcnode-id="4592" instrument_node="">and of the statistics which continue to be supplied to Eurostat on voluntary basis today depends on the availability of data transmitted by the national statistical institutes.</span></p></td></tr><tr data-dcnode-id="4581"><td class="Cl-Level2" data-dcnode-id="4583"><a data-dcnode-id="4585" name="base_per"></a><span data-dcnode-id="4584" instrument_node="">3.9. Base period</span></td></tr><tr data-dcnode-id="4574"><td class="Cl-Content" data-dcnode-id="4576"><p data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">Not applicable.</span></p></td></tr></tbody></table><span data-dcnode-id="4569" instrument_node="">

</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="4304" width="100%"><tbody data-dcnode-id="4306"><tr data-dcnode-id="4308"><td class="Cl-Level1-NoBorder" data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">8. Release policy</span></td><td align="right" data-dcnode-id="4310"><a class="DocCommon" data-dcnode-id="4311" href="#"><span data-dcnode-id="4312" instrument_node="">Top</span></a></td></tr></tbody></table><span data-dcnode-id="4303" instrument_node=""> </span></td></tr><tr data-dcnode-id="4293"><td class="Cl-Level2" data-dcnode-id="4295"><a data-dcnode-id="4297" name="rel_cal_policy"></a><span data-dcnode-id="4296" instrument_node="">8.1. Release calendar</span></td></tr><tr data-dcnode-id="4259"><td class="Cl-Content" data-dcnode-id="4261"><p data-dcnode-id="4289" style="text-align: justify;"><span data-dcnode-id="4290" instrument_node="">First demographic estimates (of year T) are released in July of the following year (T+1).</span></p><span data-dcnode-id="4288" instrument_node=""> </span><p data-dcnode-id="4286" style="text-align: justify;"><span data-dcnode-id="4287" instrument_node="">Regular updates of the Eurostat database are done in-between releases, as National Statistical Institutes transmit revisions of their data.</span></p><span data-dcnode-id="4285" instrument_node=""> </span><p align="left" data-dcnode-id="4282" style="text-align: justify;"><strong data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">Note:</span></strong></p><span data-dcnode-id="4281" instrument_node=""> </span><p data-dcnode-id="4277" style="text-align: justify;"><strong data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">The most updated data on total population on 1 January</span></strong><span data-dcnode-id="4278" instrument_node=""> may be found in the table ''Demographic balance and crude rates (demo_gind)'' of the online database. This table includes the latest updates (or revised data) on total population, births and deaths reported by the countries, while the detailed breakdowns by various characteristics included in the rest of the tables of the domain may be transmitted to Eurostat at a subsequent date.</span></p><span data-dcnode-id="4276" instrument_node=""> </span><p data-dcnode-id="4274" style="text-align: justify;"><span data-dcnode-id="4275" instrument_node="">A few situations may lead to different figures on population on 1January displayed in different population tables at a given moment in time:</span></p><span data-dcnode-id="4273" instrument_node="">
</span><ul data-dcnode-id="4262" style="text-align: justify;"><span data-dcnode-id="4272" instrument_node="">
</span><li data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">The timing of the transmission / retransmission in case of revision to Eurostat of the population data for various breakdown.</span></li><span data-dcnode-id="4269" instrument_node="">
</span><li data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">The succession of the annual demography data collections described above, which collect and update the total population and the breakdowns of population figures by various characteristics at different moment during the calendar year.</span></li><span data-dcnode-id="4266" instrument_node="">
</span><li data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">The calendar of the national statistical offices for producing and releasing population broken down by characteristics which fall under the voluntary data collection, respectively the timings when data are transmitted to Eurostat.</span></li><span data-dcnode-id="4263" instrument_node="">
</span></ul></td></tr><tr data-dcnode-id="4252"><td class="Cl-Level2" data-dcnode-id="4254"><a data-dcnode-id="4256" name="rel_cal_access"></a><span data-dcnode-id="4255" instrument_node="">8.2. Release calendar access</span></td></tr><tr data-dcnode-id="4245"><td class="Cl-Content" data-dcnode-id="4247"><p data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">Not available.</span></p></td></tr><tr data-dcnode-id="4238"><td class="Cl-Level2" data-dcnode-id="4240"><a data-dcnode-id="4242" name="rel_pol_us_ac"></a><span data-dcnode-id="4241" instrument_node="">8.3. Release policy - user access</span></td></tr><tr data-dcnode-id="4225"><td class="Cl-Content" data-dcnode-id="4227"><p data-dcnode-id="4228" style="text-align: justify;"><span data-dcnode-id="4235" instrument_node="">In line with the Community legal framework and the </span><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/eurostat/documents/4031688/8971242/KS-02-18-142-EN-N.pdf/e7f85f07-91db-4312-8118-f729c75878c7" target="_blank"><span data-dcnode-id="4234" instrument_node="">European Statistics Code of Practice</span></a><span data-dcnode-id="4232" instrument_node=""> Eurostat disseminates European statistics on Eurostat's website (see item 10 - 'Accessibility and clarity') respecting professional independence and in an objective, professional and transparent manner in which all users are treated equitably. The detailed arrangements are governed by the </span><a data-dcnode-id="4230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/eurostat/documents/10186/9268011/IMPARTIAL_ACCESS_2014_JAN-EN.PDF.pdf" target="_blank"><span data-dcnode-id="4231" instrument_node="">Eurostat protocol on impartial access to Eurostat data for users</span></a><span data-dcnode-id="4229" instrument_node="">.</span></p></td></tr></tbody></table><span data-dcnode-id="4220" instrument_node="">
