</span><table border="1" cellpadding="3" cellspacing="1" data-dcnode-id="141" style="width: 100%;"><tbody data-dcnode-id="143"><tr data-dcnode-id="778"><td data-dcnode-id="786" width="37"><span data-dcnode-id="791" instrument_node=""> </span><p align="left" data-dcnode-id="788"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">BE</span></strong></p><span data-dcnode-id="787" instrument_node=""> </span></td><td data-dcnode-id="780" width="94%"><span data-dcnode-id="784" instrument_node=""> </span><p align="left" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">The Belgian population register 'suffers' from a limited number of shortcoming&nbsp;mainly late registrations. This results in a statistical adjustment of several of thousand persons - however on a population totalling&nbsp;more than 11000000 persons.&nbsp;There is scientifically agreement in Belgium that this is an acceptable bias. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="781" instrument_node=""> </span></td></tr><tr data-dcnode-id="759"><td data-dcnode-id="770" width="37"><span data-dcnode-id="775" instrument_node=""> </span><p align="left" data-dcnode-id="772"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">BG</span></strong></p><span data-dcnode-id="771" instrument_node=""> </span></td><td data-dcnode-id="761" width="94%"><span data-dcnode-id="768" instrument_node=""> </span><p align="left" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Еstimates (based on NSI sample survey on trips of Bulgarians abroad and visitors to Bulgaria) are done in production of breakdowns of emigrants by destination countries.</span></p><span data-dcnode-id="765" instrument_node=""> </span><p align="left" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Since 2015, estimates and assumptions on volume of emigrants are done to improve figures produced both for emigration and population number.</span></p><span data-dcnode-id="762" instrument_node=""> </span></td></tr><tr data-dcnode-id="743"><td data-dcnode-id="751" width="37"><span data-dcnode-id="756" instrument_node=""> </span><p align="left" data-dcnode-id="753"><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">CZ</span></strong></p><span data-dcnode-id="752" instrument_node=""> </span></td><td data-dcnode-id="745" width="94%"><span data-dcnode-id="749" instrument_node=""> </span><p align="left" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Only population figures from a year in which a population census was held are recalculated following census results.</span></p><span data-dcnode-id="746" instrument_node=""> </span></td></tr><tr data-dcnode-id="727"><td data-dcnode-id="735" width="37"><span data-dcnode-id="740" instrument_node=""> </span><p align="left" data-dcnode-id="737"><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">DK</span></strong></p><span data-dcnode-id="736" instrument_node=""> </span></td><td data-dcnode-id="729" width="94%"><span data-dcnode-id="733" instrument_node=""> </span><p align="left" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">There is a statistical adjustment of the population due to two things; first,&nbsp;annulments of&nbsp;deaths, immigrations and&nbsp;emigrations, and second,&nbsp;missing and recovered people.</span></p><span data-dcnode-id="730" instrument_node=""> </span></td></tr><tr data-dcnode-id="711"><td data-dcnode-id="719" width="37"><span data-dcnode-id="724" instrument_node=""> </span><p align="left" data-dcnode-id="721"><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">DE</span></strong></p><span data-dcnode-id="720" instrument_node=""> </span></td><td data-dcnode-id="713" width="94%"><span data-dcnode-id="717" instrument_node=""> </span><p align="left" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">The population numbers take into account corrections sent by the data providers. Corrections to events registered in the previous year are not included in the statistics on vital events and migrations. They are processed as statistical adjustment in the intercensal population updates.</span></p><span data-dcnode-id="714" instrument_node=""> </span></td></tr><tr data-dcnode-id="695"><td data-dcnode-id="703" width="37"><span data-dcnode-id="708" instrument_node=""> </span><p align="left" data-dcnode-id="705"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">EE</span></strong></p><span data-dcnode-id="704" instrument_node=""> </span></td><td data-dcnode-id="697" width="94%"><span data-dcnode-id="701" instrument_node=""> </span><p align="left" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">By using new methodology - residency index. See 3.4.2. Population in the Estonian metadata file.</span></p><span data-dcnode-id="698" instrument_node=""> </span></td></tr><tr data-dcnode-id="679"><td data-dcnode-id="687" width="37"><span data-dcnode-id="692" instrument_node=""> </span><p align="left" data-dcnode-id="689"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">IE</span></strong></p><span data-dcnode-id="688" instrument_node=""> </span></td><td data-dcnode-id="681" width="94%"><span data-dcnode-id="685" instrument_node=""> </span><p align="left" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Population and Migration Estimates are subject to revisions once the definitive results from the census is available.&nbsp;</span></p><span data-dcnode-id="682" instrument_node=""> </span></td></tr><tr data-dcnode-id="663"><td data-dcnode-id="671" width="37"><span data-dcnode-id="676" instrument_node=""> </span><p align="left" data-dcnode-id="673"><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">EL</span></strong></p><span data-dcnode-id="672" instrument_node=""> </span></td><td data-dcnode-id="665" width="94%"><span data-dcnode-id="669" instrument_node=""> </span><p align="left" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">No adjustments.</span></p><span data-dcnode-id="666" instrument_node=""> </span></td></tr><tr data-dcnode-id="647"><td data-dcnode-id="655" width="37"><span data-dcnode-id="660" instrument_node=""> </span><p align="left" data-dcnode-id="657"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">ES</span></strong></p><span data-dcnode-id="656" instrument_node=""> </span></td><td data-dcnode-id="649" width="94%"><span data-dcnode-id="653" instrument_node=""> </span><p align="left" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Because of a correction in the amount of people aged 100 years or more, a statistical adjustment factor has been included in the latest Demobal questionnaire, 2019.</span></p><span data-dcnode-id="650" instrument_node=""> </span></td></tr><tr data-dcnode-id="619"><td data-dcnode-id="639" width="37"><span data-dcnode-id="644" instrument_node=""> </span><p align="left" data-dcnode-id="641"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">FR</span></strong></p><span data-dcnode-id="640" instrument_node=""> </span></td><td data-dcnode-id="621" width="94%"><span data-dcnode-id="637" instrument_node=""> </span><p align="left" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Due to an improvment in the questionnary, population data in 2016 (and after) are not comparable to previous population data. An adjustment has been introduced to allow time comparison.</span></p><span data-dcnode-id="634" instrument_node=""> </span><p align="left" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Adjustment is provisionally estimated at national level to :&nbsp; -65330 in 2015 ;&nbsp; -82982 in 2016 ; -100000 in 2017 ; -101000 in 2018 ; -101000 in 2019. Adjustment is provisionally estimated at national level to :&nbsp; -65330 in 2015 ;&nbsp; -82982 in 2016 ; -100000 in 2017 ; -101000 in 2018 ; -101000 in 2019.</span></p><span data-dcnode-id="631" instrument_node=""> </span><p align="left" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Differences in the field for France : Data published by INSEE do not take into account data of Saint-Martin and Saint-Barthelemy islands, which are not included in Guadeloupe any more since 2007.</span></p><span data-dcnode-id="628" instrument_node=""> </span><p align="left" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">All data after 2012 (2013 and after) submitted to Eurostat contains France metropolitan, four French overseas departments (Martinique, Guadeloupe, French Guiana and Reunion) including Saint Martin in Guadeloupe.</span></p><span data-dcnode-id="625" instrument_node=""> </span><p align="left" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Statistics of population include&nbsp;Mayotte&nbsp;since 31 December 2013. As the population on 31 December 2012 does not include this island,&nbsp;an other adjustment is therefore needed. The adjustment in 2013 is equal to the population on Mayotte estimated on 31 December 2012.</span></p><span data-dcnode-id="622" instrument_node=""> </span></td></tr><tr data-dcnode-id="597"><td data-dcnode-id="611" width="37"><span data-dcnode-id="616" instrument_node=""> </span><p align="left" data-dcnode-id="613"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">HR</span></strong></p><span data-dcnode-id="612" instrument_node=""> </span></td><td data-dcnode-id="599" width="94%"><span data-dcnode-id="609" instrument_node=""> </span><p align="left" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Census data are collected and processed in line with the Conference of European Statisticians Recommendations for the 2010 Censuses of Population and Housing as well as with the regulations (EC) No 763/2008 and 1201/2009 of the European Parliament and the Council.</span></p><span data-dcnode-id="606" instrument_node=""> </span><p align="left" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">&nbsp;Data on live births and deaths are collected and processed in line with the Regulation (EU) No 1260/2013 of the European Parliament and of the Council on European demographic statistics.</span></p><span data-dcnode-id="603" instrument_node=""> </span><p align="left" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">&nbsp;Data on&nbsp;migration are collected and processed in line with the UN Recommendations on Statistics of International Migration and the Regulation (EC) No 862/2007 of the European Parliament and of the Council of 11 July 2007 on Community statistics on migration and international protection.</span></p><span data-dcnode-id="600" instrument_node=""> </span></td></tr><tr data-dcnode-id="578"><td data-dcnode-id="589" width="37"><span data-dcnode-id="594" instrument_node=""> </span><p align="left" data-dcnode-id="591"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">IT</span></strong></p><span data-dcnode-id="590" instrument_node=""> </span></td><td data-dcnode-id="580" width="94%"><span data-dcnode-id="587" instrument_node=""> </span><p align="left" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">In 2019 the statistical adjustments amount to a net value of -52290 units.</span></p><span data-dcnode-id="584" instrument_node=""> </span><p align="left" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">These adjustments are due to administrative procedures referred to registrations and deregistrations different from births, deaths, immigrations and emigrations.</span></p><span data-dcnode-id="581" instrument_node=""> </span></td></tr><tr data-dcnode-id="562"><td data-dcnode-id="570" width="37"><span data-dcnode-id="575" instrument_node=""> </span><p align="left" data-dcnode-id="572"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">CY</span></strong></p><span data-dcnode-id="571" instrument_node=""> </span></td><td data-dcnode-id="564" width="94%"><span data-dcnode-id="568" instrument_node=""> </span><p align="left" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Not applicable</span></p><span data-dcnode-id="565" instrument_node=""> </span></td></tr><tr data-dcnode-id="543"><td data-dcnode-id="554" width="37"><span data-dcnode-id="559" instrument_node=""> </span><p align="left" data-dcnode-id="556"><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">LV</span></strong></p><span data-dcnode-id="555" instrument_node=""> </span></td><td data-dcnode-id="545" width="94%"><span data-dcnode-id="552" instrument_node=""> </span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">In the Population Register there are data also on short time immigrants - those migrants are excluded from the population database.</span></p><span data-dcnode-id="549" instrument_node=""> </span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">International definitions are used also at national level.</span></p><span data-dcnode-id="546" instrument_node=""> </span></td></tr><tr data-dcnode-id="527"><td data-dcnode-id="535" width="37"><span data-dcnode-id="540" instrument_node=""> </span><p align="left" data-dcnode-id="537"><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">LT</span></strong></p><span data-dcnode-id="536" instrument_node=""> </span></td><td data-dcnode-id="529" width="94%"><span data-dcnode-id="533" instrument_node=""> </span><p align="left" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Not applicable.</span></p><span data-dcnode-id="530" instrument_node=""> </span></td></tr><tr data-dcnode-id="511"><td data-dcnode-id="519" width="37"><span data-dcnode-id="524" instrument_node=""> </span><p align="left" data-dcnode-id="521"><strong data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">LU</span></strong></p><span data-dcnode-id="520" instrument_node=""> </span></td><td data-dcnode-id="513" width="94%"><span data-dcnode-id="517" instrument_node=""> </span><p align="left" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Other reasons statistical adjustments (registration and deregistration due to reasons different from births, deaths, immigrations and emigrations).</span></p><span data-dcnode-id="514" instrument_node=""> </span></td></tr><tr data-dcnode-id="495"><td data-dcnode-id="503" width="37"><span data-dcnode-id="508" instrument_node=""> </span><p align="left" data-dcnode-id="505"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">HU</span></strong></p><span data-dcnode-id="504" instrument_node=""> </span></td><td data-dcnode-id="497" width="94%"><span data-dcnode-id="501" instrument_node=""> </span><p align="left" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">The reason for the statistical adjustment is that population and vital statistics data are compiled from several separate data sources (i.e. civil registrars, health institutions, HCSO statistical data collection on vital events, Population register, National Directorate-General for Aliens Policing, National Health Insurance Fund), which are not fully harmonized.</span></p><span data-dcnode-id="498" instrument_node=""> </span></td></tr><tr data-dcnode-id="479"><td data-dcnode-id="487" width="37"><span data-dcnode-id="492" instrument_node=""> </span><p align="left" data-dcnode-id="489"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">MT</span></strong></p><span data-dcnode-id="488" instrument_node=""> </span></td><td data-dcnode-id="481" width="94%"><span data-dcnode-id="485" instrument_node=""> </span><p align="left" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Not applicable.</span></p><span data-dcnode-id="482" instrument_node=""> </span></td></tr><tr data-dcnode-id="463"><td data-dcnode-id="471" width="37"><span data-dcnode-id="476" instrument_node=""> </span><p align="left" data-dcnode-id="473"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">NL</span></strong></p><span data-dcnode-id="472" instrument_node=""> </span></td><td data-dcnode-id="465" width="94%"><span data-dcnode-id="469" instrument_node=""> </span><p align="left" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Not available.</span></p><span data-dcnode-id="466" instrument_node=""> </span></td></tr><tr data-dcnode-id="435"><td data-dcnode-id="455" width="37"><span data-dcnode-id="460" instrument_node=""> </span><p align="left" data-dcnode-id="457"><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">AT</span></strong></p><span data-dcnode-id="456" instrument_node=""> </span></td><td data-dcnode-id="437" width="94%"><span data-dcnode-id="453" instrument_node=""> </span><p align="left" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Details provided in national documentation.</span></p><span data-dcnode-id="450" instrument_node=""> </span><p align="left" data-dcnode-id="447"><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/029355.pdf%23pagemode%3Dbookmarks"><span data-dcnode-id="449" instrument_node="">http://www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/029355.pdf#pagemode=bookmarks</span></a></p><span data-dcnode-id="446" instrument_node=""> </span><p align="left" data-dcnode-id="443"><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/003724.pdf"><span data-dcnode-id="445" instrument_node="">http://www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/003724.pdf</span></a></p><span data-dcnode-id="442" instrument_node=""> </span><p align="left" data-dcnode-id="439"><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/029352.pdf"><span data-dcnode-id="441" instrument_node="">http://www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/029352.pdf</span></a></p><span data-dcnode-id="438" instrument_node=""> </span></td></tr><tr data-dcnode-id="419"><td data-dcnode-id="427" width="37"><span data-dcnode-id="432" instrument_node=""> </span><p align="left" data-dcnode-id="429"><strong data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">PL</span></strong></p><span data-dcnode-id="428" instrument_node=""> </span></td><td data-dcnode-id="421" width="94%"><span data-dcnode-id="425" instrument_node=""> </span><p align="left" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Not applicable.</span></p><span data-dcnode-id="422" instrument_node=""> </span></td></tr><tr data-dcnode-id="403"><td data-dcnode-id="411" width="37"><span data-dcnode-id="416" instrument_node=""> </span><p align="left" data-dcnode-id="413"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">PT</span></strong></p><span data-dcnode-id="412" instrument_node=""> </span></td><td data-dcnode-id="405" width="94%"><span data-dcnode-id="409" instrument_node=""> </span><p align="left" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Not applicable.</span></p><span data-dcnode-id="406" instrument_node=""> </span></td></tr><tr data-dcnode-id="381"><td data-dcnode-id="395" width="37"><span data-dcnode-id="400" instrument_node=""> </span><p align="left" data-dcnode-id="397"><strong data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">RO</span></strong></p><span data-dcnode-id="396" instrument_node=""> </span></td><td data-dcnode-id="383" width="94%"><span data-dcnode-id="393" instrument_node=""> </span><p align="left" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Live births and deaths are reviewed in December of the year following the reference year and they are released as definitive (final) data.</span></p><span data-dcnode-id="390" instrument_node=""> </span><p align="left" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">The resident population data for 2019 is statistically adjusted with tardive declared and registered live births and deaths.</span></p><span data-dcnode-id="387" instrument_node=""> </span><p align="left" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Emigration and immigration are estimated based on "mirror statistics" and adjusted based on the trends of LFS.</span></p><span data-dcnode-id="384" instrument_node=""> </span></td></tr><tr data-dcnode-id="365"><td data-dcnode-id="373" width="37"><span data-dcnode-id="378" instrument_node=""> </span><p align="left" data-dcnode-id="375"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">SI</span></strong></p><span data-dcnode-id="374" instrument_node=""> </span></td><td data-dcnode-id="367" width="94%"><span data-dcnode-id="371" instrument_node=""> </span><p align="left" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Not applicable.</span></p><span data-dcnode-id="368" instrument_node=""> </span></td></tr><tr data-dcnode-id="349"><td data-dcnode-id="357" width="37"><span data-dcnode-id="362" instrument_node=""> </span><p align="left" data-dcnode-id="359"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">SK</span></strong></p><span data-dcnode-id="358" instrument_node=""> </span></td><td data-dcnode-id="351" width="94%"><span data-dcnode-id="355" instrument_node=""> </span><p align="left" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">The methodology and content of demographic statistics are internationally comparable, in compliance with&nbsp;EU Regulations. The processing by classification point of view is done according to valid, internationally comparable statistical code lists according to EU statistical standards. Demographic outputs of data processing from the monthly population survey covering the total SR population provide reliable population data, therefore, it is not necessary to calculate population estimates or estimates of individual demographic characteristics for the Slovak Republic.</span></p><span data-dcnode-id="352" instrument_node=""> </span></td></tr><tr data-dcnode-id="321"><td data-dcnode-id="341" width="37"><span data-dcnode-id="346" instrument_node=""> </span><p align="left" data-dcnode-id="343"><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">FI</span></strong></p><span data-dcnode-id="342" instrument_node=""> </span></td><td data-dcnode-id="323" width="94%"><span data-dcnode-id="339" instrument_node=""> </span><p align="left" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Population correction (immigration/emigration):</span></p><span data-dcnode-id="336" instrument_node=""> </span><p align="left" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Population correction is the difference of total change and population increase. Corrections are mainly adjustments made later to errors occurring in handling of notices of removal.</span></p><span data-dcnode-id="333" instrument_node=""> </span><p align="left" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Statistical adjustments are mainly missing notifications on emigration. We would like to enhance that population structure system and population change system are independent and separate systems.</span></p><span data-dcnode-id="330" instrument_node=""> </span><p align="left" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">In general, the move has taken place a very long time ago, in which case changing the information by a notice of removal would not make sense, or the person is known to have moved at some point but no information has been obtained on the target domicile.</span></p><span data-dcnode-id="327" instrument_node=""> </span><p align="left" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">In material sent to Eurostat age is modified to mean age at the end of the year.</span></p><span data-dcnode-id="324" instrument_node=""> </span></td></tr><tr data-dcnode-id="305"><td data-dcnode-id="313" width="37"><span data-dcnode-id="318" instrument_node=""> </span><p align="left" data-dcnode-id="315"><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">SE</span></strong></p><span data-dcnode-id="314" instrument_node=""> </span></td><td data-dcnode-id="307" width="94%"><span data-dcnode-id="311" instrument_node=""> </span><p align="left" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">The statistical adjustment refers to vital events that happened during previous years. The events were not registered in time to be included in the annual population figure for the previous year. However, no previous figures are adjusted. &nbsp;&nbsp;</span></p><span data-dcnode-id="308" instrument_node=""> </span></td></tr><tr data-dcnode-id="289"><td data-dcnode-id="297" width="37"><span data-dcnode-id="302" instrument_node=""> </span><p align="left" data-dcnode-id="299"><strong data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">UK</span></strong></p><span data-dcnode-id="298" instrument_node=""> </span></td><td data-dcnode-id="291" width="94%"><span data-dcnode-id="295" instrument_node=""> </span><p align="left" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">No statistical adjustment is carried out to adjust population definitions to standard definitions. However, the method of calculating 1 January populations from the mid-year populations calculated as standard means that components of change (migration and natural change), which are supplied on a true calendar year basis, do not correspond precisely with the change in population estimates.</span></p><span data-dcnode-id="292" instrument_node=""> </span></td></tr><tr data-dcnode-id="273"><td data-dcnode-id="281" width="37"><span data-dcnode-id="286" instrument_node=""> </span><p align="left" data-dcnode-id="283"><strong data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">IS</span></strong></p><span data-dcnode-id="282" instrument_node=""> </span></td><td data-dcnode-id="275" width="94%"><span data-dcnode-id="279" instrument_node=""> </span><p align="left" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">No adjustments are made. Deviations between natural increase and net immigration and the population growth are not adjusted in the statistics.</span></p><span data-dcnode-id="276" instrument_node=""> </span></td></tr><tr data-dcnode-id="257"><td data-dcnode-id="265" width="37"><span data-dcnode-id="270" instrument_node=""> </span><p align="left" data-dcnode-id="267"><strong data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">LI</span></strong></p><span data-dcnode-id="266" instrument_node=""> </span></td><td data-dcnode-id="259" width="94%"><span data-dcnode-id="263" instrument_node=""> </span><p align="left" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">No adjustments necessary.</span></p><span data-dcnode-id="260" instrument_node=""> </span></td></tr><tr data-dcnode-id="241"><td data-dcnode-id="249" width="37"><span data-dcnode-id="254" instrument_node=""> </span><p align="left" data-dcnode-id="251"><strong data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">NO</span></strong></p><span data-dcnode-id="250" instrument_node=""> </span></td><td data-dcnode-id="243" width="94%"><span data-dcnode-id="247" instrument_node=""> </span><p align="left" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Deviations between natural increase and net immigration and the population growth are not adjusted in the statistics. Deviations are due to lack of incoming messages on births, deaths and migrations. The deviation in the population accounts is due to belated reports, annulments, corrections etc.]</span></p><span data-dcnode-id="244" instrument_node=""> </span></td></tr><tr data-dcnode-id="225"><td data-dcnode-id="233" width="37"><span data-dcnode-id="238" instrument_node=""> </span><p align="left" data-dcnode-id="235"><strong data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">CH</span></strong></p><span data-dcnode-id="234" instrument_node=""> </span></td><td data-dcnode-id="227" width="94%"><span data-dcnode-id="231" instrument_node=""> </span><p align="left" data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Difference between populations in two consecutive years.</span></p><span data-dcnode-id="228" instrument_node=""> </span></td></tr><tr data-dcnode-id="209"><td data-dcnode-id="217" width="4%"><span data-dcnode-id="222" instrument_node=""> </span><p align="left" data-dcnode-id="219"><strong data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">ME</span></strong></p><span data-dcnode-id="218" instrument_node=""> </span></td><td data-dcnode-id="211" width="94%"><span data-dcnode-id="215" instrument_node=""> </span><p align="left" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Not applicable.</span></p><span data-dcnode-id="212" instrument_node=""> </span></td></tr><tr data-dcnode-id="193"><td data-dcnode-id="201" width="4%"><span data-dcnode-id="206" instrument_node=""> </span><p align="left" data-dcnode-id="203"><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">MK</span></strong></p><span data-dcnode-id="202" instrument_node=""> </span></td><td data-dcnode-id="195" width="94%"><span data-dcnode-id="199" instrument_node=""> </span><p align="left" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">No data adjustment is performed.</span></p><span data-dcnode-id="196" instrument_node=""> </span></td></tr><tr data-dcnode-id="177"><td data-dcnode-id="185" width="4%"><span data-dcnode-id="190" instrument_node=""> </span><p align="left" data-dcnode-id="187"><strong data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">AL</span></strong></p><span data-dcnode-id="186" instrument_node=""> </span></td><td data-dcnode-id="179" width="94%"><span data-dcnode-id="183" instrument_node=""> </span><p align="left" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Adjustments are done for the number of emigration and immigration data collected through LFS survey for which the age structure was corrected considering the last population projection data.</span></p><span data-dcnode-id="180" instrument_node=""> </span></td></tr><tr data-dcnode-id="161"><td data-dcnode-id="169" width="37"><span data-dcnode-id="174" instrument_node=""> </span><p align="left" data-dcnode-id="171"><strong data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">RS</span></strong></p><span data-dcnode-id="170" instrument_node=""> </span></td><td data-dcnode-id="163" width="94%"><span data-dcnode-id="167" instrument_node=""> </span><p align="left" data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Not applicable.</span></p><span data-dcnode-id="164" instrument_node=""> </span></td></tr><tr data-dcnode-id="145"><td data-dcnode-id="153" width="37"><span data-dcnode-id="158" instrument_node=""> </span><p align="left" data-dcnode-id="155"><strong data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">TR</span></strong></p><span data-dcnode-id="154" instrument_node=""> </span></td><td data-dcnode-id="147" width="94%"><span data-dcnode-id="151" instrument_node=""> </span><p align="left" data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Not applicable.</span></p><span data-dcnode-id="148" instrument_node=""> </span></td></tr></tbody></table></td></tr></tbody></table><span data-dcnode-id="133" instrument_node="">
