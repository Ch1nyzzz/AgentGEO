</span><table border="1" cellpadding="3" cellspacing="0" data-dcnode-id="3261" style="width: 100%;"><tbody data-dcnode-id="3263"><tr data-dcnode-id="3957"><td data-dcnode-id="3965" width="5%"><span data-dcnode-id="3970" instrument_node=""> </span><p align="left" data-dcnode-id="3967"><strong data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">BE</span></strong></p><span data-dcnode-id="3966" instrument_node=""> </span></td><td data-dcnode-id="3959" width="94%"><span data-dcnode-id="3963" instrument_node=""> </span><p data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">All&nbsp;the statistical validation process is oriented towards the assurance of quality (internal coherence controls, cross-checks when available...)</span></p><span data-dcnode-id="3960" instrument_node=""> </span></td></tr><tr data-dcnode-id="3941"><td data-dcnode-id="3949" width="5%"><span data-dcnode-id="3954" instrument_node=""> </span><p align="left" data-dcnode-id="3951"><strong data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">BG</span></strong></p><span data-dcnode-id="3950" instrument_node=""> </span></td><td data-dcnode-id="3943" width="94%"><span data-dcnode-id="3947" instrument_node=""> </span><p data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Quality of data is assured through procedures for data&nbsp;validation, editing, coding and verifying. The procedures are performed following clearly prescribed rules.</span></p><span data-dcnode-id="3944" instrument_node=""> </span></td></tr><tr data-dcnode-id="3925"><td data-dcnode-id="3933" width="5%"><span data-dcnode-id="3938" instrument_node=""> </span><p align="left" data-dcnode-id="3935"><strong data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">CZ</span></strong></p><span data-dcnode-id="3934" instrument_node=""> </span></td><td data-dcnode-id="3927" width="94%"><span data-dcnode-id="3931" instrument_node=""> </span><p align="left" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">The system of checks for inconsistent data was developed. The coverage of sent statistical notifications is monitored.</span></p><span data-dcnode-id="3928" instrument_node=""> </span></td></tr><tr data-dcnode-id="3909"><td data-dcnode-id="3917" width="5%"><span data-dcnode-id="3922" instrument_node=""> </span><p align="left" data-dcnode-id="3919"><strong data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">DK</span></strong></p><span data-dcnode-id="3918" instrument_node=""> </span></td><td data-dcnode-id="3911" width="94%"><span data-dcnode-id="3915" instrument_node=""> </span><p data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">The register on population statistics is based on daily updates from the Danish Population Register. All occurrences on the resident population such as internal and external migration, births, deaths, marriages and divorces are registered in the Population Register. Statistics Denmark waits 30 days after a reference date before producing the population data, in order to ensure the updates from delayed registrations.</span></p><span data-dcnode-id="3912" instrument_node=""> </span></td></tr><tr data-dcnode-id="3893"><td data-dcnode-id="3901" width="5%"><span data-dcnode-id="3906" instrument_node=""> </span><p align="left" data-dcnode-id="3903"><strong data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">DE</span></strong></p><span data-dcnode-id="3902" instrument_node=""> </span></td><td data-dcnode-id="3895" valign="bottom" width="94%"><span data-dcnode-id="3899" instrument_node=""> </span><p align="left" data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">All data included in intercensal population updates were previously subject to a variety of measures to assure the quality of the data in the statistical production process. Data received are subject to continuous plausibility checks. The data included in intercensal population updates are administrative data. If a data provider detects errors in its data, it corrects them and sends the corrected data to the responsible statistical office, so that the intercensal population update can be corrected.</span></p><span data-dcnode-id="3896" instrument_node=""> </span></td></tr><tr data-dcnode-id="3877"><td data-dcnode-id="3885" width="5%"><span data-dcnode-id="3890" instrument_node=""> </span><p align="left" data-dcnode-id="3887"><strong data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">EE</span></strong></p><span data-dcnode-id="3886" instrument_node=""> </span></td><td data-dcnode-id="3879" width="94%"><span data-dcnode-id="3883" instrument_node=""> </span><p data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">To assure the quality of processes and products, Statistics Estonia applies the EFQM Excellence Model, EU Statistics Code of Practice and the ESS Quality Assurance Framework (QAF). Statistics Estonia is also guided by the requirements provided for in § 7. „Principles and quality criteria of producing official statistics” of the Official Statistics Act.</span></p><span data-dcnode-id="3880" instrument_node=""> </span></td></tr><tr data-dcnode-id="3861"><td data-dcnode-id="3869" width="5%"><span data-dcnode-id="3874" instrument_node=""> </span><p align="left" data-dcnode-id="3871"><strong data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">IE</span></strong></p><span data-dcnode-id="3870" instrument_node=""> </span></td><td data-dcnode-id="3863" valign="bottom" width="94%"><span data-dcnode-id="3867" instrument_node=""> </span><p align="left" data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">The principle source of the migration estimates (which in turn feed into progress population quarterly estimates, using the most recent census as a base year, is the Labour Force Survey (LFS). The survey interviewers receive continuous training and the data returns undergo quality and validation checks. The inter Census population estimates are subject to revision following the publication of the Census of population, the Census of Population is conducted every 5 years.&nbsp; The next Census of population is scheduled for April 2021.</span></p><span data-dcnode-id="3864" instrument_node=""> </span></td></tr><tr data-dcnode-id="3845"><td data-dcnode-id="3853" width="5%"><span data-dcnode-id="3858" instrument_node=""> </span><p align="left" data-dcnode-id="3855"><strong data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">EL</span></strong></p><span data-dcnode-id="3854" instrument_node=""> </span></td><td data-dcnode-id="3847" width="94%"><span data-dcnode-id="3851" instrument_node=""> </span><p data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">The Vital statistics data come from administrative sources (Registry Offices of the Municipalities) and the error rate is very low. Comparative checks are being performed.&nbsp; Migration data are estimated and potentials errors cannot be counted.</span></p><span data-dcnode-id="3848" instrument_node=""> </span></td></tr><tr data-dcnode-id="3829"><td data-dcnode-id="3837" width="5%"><span data-dcnode-id="3842" instrument_node=""> </span><p align="left" data-dcnode-id="3839"><strong data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">ES</span></strong></p><span data-dcnode-id="3838" instrument_node=""> </span></td><td data-dcnode-id="3831" valign="bottom" width="94%"><span data-dcnode-id="3835" instrument_node=""> </span><p align="left" data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Quality assurance framework for the INE statistics is based on the ESSCoP, the European Statistics Code of Practice, made by EUROSTAT. The ESSCoP is made up of 15 principles, gathered in three areas: Institutional Environment, Processes and Products. Each principle is associated with some indicators which make possible to measure it. In order to evaluate quality, EUROSTAT provides different tools: the indicators mentioned above, self-assessment based on the DESAP model, peer review, user satisfaction surveys and other proceedings for evaluation.</span></p><span data-dcnode-id="3832" instrument_node=""> </span></td></tr><tr data-dcnode-id="3807"><td data-dcnode-id="3821" width="5%"><span data-dcnode-id="3826" instrument_node=""> </span><p align="left" data-dcnode-id="3823"><strong data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">FR</span></strong></p><span data-dcnode-id="3822" instrument_node=""> </span></td><td data-dcnode-id="3809" width="94%"><span data-dcnode-id="3819" instrument_node=""> </span><p align="left" data-dcnode-id="3811"><span data-dcnode-id="3818" instrument_node="">Population: see in English: </span><a data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insee.fr/en/metadonnees/source/serie/s1169/presentation" target="_blank"><span data-dcnode-id="3817" instrument_node="">https://www.insee.fr/en/metadonnees/source/serie/s1169/presentation</span></a><br data-dcnode-id="3815"><span data-dcnode-id="3814" instrument_node=""> Births: Quality checks are done about double counts, exhaustivity (for instance by comparing with social security data), consistency...</span><br data-dcnode-id="3813"><span data-dcnode-id="3812" instrument_node=""> Deaths: Quality checks are done about double counts, exhaustivity, inconsistencies, errors... INSEE compares the death certificates with bulletins in order to check the exhaustiveness of the bulletins received. INSEE tries then to recover missing bulletins 7 bis from municipalities.</span></p><span data-dcnode-id="3810" instrument_node=""> </span></td></tr><tr data-dcnode-id="3789"><td data-dcnode-id="3799" width="5%"><span data-dcnode-id="3804" instrument_node=""> </span><p align="left" data-dcnode-id="3801"><strong data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">HR</span></strong></p><span data-dcnode-id="3800" instrument_node=""> </span></td><td data-dcnode-id="3791" width="94%"><span data-dcnode-id="3797" instrument_node=""> </span><p align="left" data-dcnode-id="3793"><span data-dcnode-id="3796" instrument_node="">”Implementation of Total Quality Management in Croatian Bureau of Statistics″, CBS, Zagreb, 2014</span><br data-dcnode-id="3795"><span data-dcnode-id="3794" instrument_node=""> ″Handbook for Calculation of Quality Indicators″, CBS, Zagreb, 2014</span></p><span data-dcnode-id="3792" instrument_node=""> </span></td></tr><tr data-dcnode-id="3773"><td data-dcnode-id="3781" width="5%"><span data-dcnode-id="3786" instrument_node=""> </span><p align="left" data-dcnode-id="3783"><strong data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">IT</span></strong></p><span data-dcnode-id="3782" instrument_node=""> </span></td><td data-dcnode-id="3775" width="94%"><span data-dcnode-id="3779" instrument_node=""> </span><p data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Population change and stock data are&nbsp;checked before being&nbsp;uploaded into the database and disseminated to the public. The validation rules are established to&nbsp;ensure the data consistency&nbsp;and the comparability along times of indicators.</span></p><span data-dcnode-id="3776" instrument_node=""> </span></td></tr><tr data-dcnode-id="3757"><td data-dcnode-id="3765" width="5%"><span data-dcnode-id="3770" instrument_node=""> </span><p align="left" data-dcnode-id="3767"><strong data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">CY</span></strong></p><span data-dcnode-id="3766" instrument_node=""> </span></td><td data-dcnode-id="3759" width="94%"><span data-dcnode-id="3763" instrument_node=""> </span><p data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">The quality of statistics in CYSTAT is managed in the framework of the European Statistics Code of Practice which sets the standards for developing, producing and disseminating European Statistics as well as the ESS Quality Assurance Framework (QAF). CYSTAT endorses the Quality Declaration of the European Statistical System. In addition, CYSTAT is guided by the requirements provided for in Article 12 of the Statistics Law No. 15(I) of 2000 as well as Article 12 of Regulation (EC) No 223/2009 on European statistics, which sets out the quality criteria to be applied in the development, production and dissemination of European statistics.</span></p><span data-dcnode-id="3760" instrument_node=""> </span></td></tr><tr data-dcnode-id="3727"><td data-dcnode-id="3749" width="5%"><span data-dcnode-id="3754" instrument_node=""> </span><p align="left" data-dcnode-id="3751"><strong data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">LV</span></strong></p><span data-dcnode-id="3750" instrument_node=""> </span></td><td data-dcnode-id="3729" width="94%"><span data-dcnode-id="3747" instrument_node=""> </span><p align="left" data-dcnode-id="3731"><span data-dcnode-id="3746" instrument_node="">CSB of Latvia had developed a methodology to evaluate usual resident population. Reason - Latvia has Population Register, however, according to the 2011 Census results the difference between number of population in the Population Register and according to the Census results was 155 thsd. or 7 % - the level of non-registered migration is very high.</span><br data-dcnode-id="3745"><span data-dcnode-id="3744" instrument_node=""> </span><br data-dcnode-id="3743"><span data-dcnode-id="3742" instrument_node=""> New method is based on Population Register and data from other administrative data sources (all data sources include personal ID codes; codes are used to merge data). The aim of the method is to estimate the status of actual place of residence at the beginning of the year for each individual registered in the Population Register. Logistic regression model has been developed.</span><br data-dcnode-id="3741"><span data-dcnode-id="3740" instrument_node=""> </span><br data-dcnode-id="3739"><span data-dcnode-id="3738" instrument_node=""> To evaluate quality of estimation, individual data from household surveys, Microcensus and External Migration Survey are used.</span><br data-dcnode-id="3737"><span data-dcnode-id="3736" instrument_node=""> </span><br data-dcnode-id="3735"><span data-dcnode-id="3734" instrument_node=""> </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.csb.gov.lv/lv/statistika/statistikas-temas/iedzivotaji/iedzivotaju-skaits/metode" target="_blank"><span data-dcnode-id="3733" instrument_node="">https://www.csb.gov.lv/lv/statistika/statistikas-temas/iedzivotaji/iedzivotaju-skaits/metode</span></a></p><span data-dcnode-id="3730" instrument_node=""> </span></td></tr><tr data-dcnode-id="3709"><td data-dcnode-id="3719" width="5%"><span data-dcnode-id="3724" instrument_node=""> </span><p align="left" data-dcnode-id="3721"><strong data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">LT</span></strong></p><span data-dcnode-id="3720" instrument_node=""> </span></td><td data-dcnode-id="3711" valign="bottom" width="94%"><span data-dcnode-id="3717" instrument_node=""> </span><p align="left" data-dcnode-id="3713"><span data-dcnode-id="3716" instrument_node="">The quality of statistical information and its production process is ensured by the provisions of the European Statistics Code of Practice&nbsp;and&nbsp;ESS Quality Assurance Framework.&nbsp;</span><br data-dcnode-id="3715"><span data-dcnode-id="3714" instrument_node=""> In 2007,&nbsp;a quality management system, conforming to the requirements of the international quality management system standard ISO 9001, was introduced at Statistics Lithuania. The main trends in activity of Statistics Lithuania aimed at quality management and continuous development in the institution are established in the Quality Policy. Monitoring of the quality indicators of statistical processes and their results and self-evaluation of statistical survey managers is regularly carried out in order to identify the areas which need improvement and to promptly eliminate the shortcomings.</span></p><span data-dcnode-id="3712" instrument_node=""> </span></td></tr><tr data-dcnode-id="3693"><td data-dcnode-id="3701" width="5%"><span data-dcnode-id="3706" instrument_node=""> </span><p align="left" data-dcnode-id="3703"><strong data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">LU</span></strong></p><span data-dcnode-id="3702" instrument_node=""> </span></td><td data-dcnode-id="3695" width="94%"><span data-dcnode-id="3699" instrument_node=""> </span><p data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">As STATEC receives individual forms for birth and death directly from the different municipalities where the events occur great quality can be assured. We also compare our figures with those of the Ministry of Health (for deaths) and the Inspection of Social Security (births).</span></p><span data-dcnode-id="3696" instrument_node=""> </span></td></tr><tr data-dcnode-id="3677"><td data-dcnode-id="3685" width="5%"><span data-dcnode-id="3690" instrument_node=""> </span><p align="left" data-dcnode-id="3687"><strong data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">HU</span></strong></p><span data-dcnode-id="3686" instrument_node=""> </span></td><td data-dcnode-id="3679" width="94%"><span data-dcnode-id="3683" instrument_node=""> </span><p data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">Statistics are prepared in line with the principles of the European Statistical Code of Practice.&nbsp;The Statistical Office has a publicly available Quality policy. For the statistical production process Quality principles were prepared with major requirements and recommendations. As for product quality Eurostat Quality reports are filled in for certain statistics as well as the calculation of quality indicators. A documentation sheet is filled in annually for all subject-matter statistics covering main methodological information.</span></p><span data-dcnode-id="3680" instrument_node=""> </span></td></tr><tr data-dcnode-id="3651"><td data-dcnode-id="3669" width="5%"><span data-dcnode-id="3674" instrument_node=""> </span><p align="left" data-dcnode-id="3671"><strong data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">MT</span></strong></p><span data-dcnode-id="3670" instrument_node=""> </span></td><td data-dcnode-id="3653" width="94%"><span data-dcnode-id="3667" instrument_node=""> </span><p align="left" data-dcnode-id="3655"><span data-dcnode-id="3666" instrument_node="">Many efforts are made by NSO in order to ensure the production of demographic statistics at high quality standards. Measures that are implemented during the analysis stage include:</span><br data-dcnode-id="3665"><span data-dcnode-id="3664" instrument_node=""> </span><br data-dcnode-id="3663"><span data-dcnode-id="3662" instrument_node=""> - thorough checks on the administrative registers used for the compilation of vital events;</span><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node=""> - thorough checks on the administrative data used for the compilation of migration flows;</span><br data-dcnode-id="3659"><span data-dcnode-id="3658" instrument_node=""> - checks for double counting;</span><br data-dcnode-id="3657"><span data-dcnode-id="3656" instrument_node=""> - validation and cross-checking of results with auxiliary sources and past year's data, including census results.</span></p><span data-dcnode-id="3654" instrument_node=""> </span></td></tr><tr data-dcnode-id="3635"><td data-dcnode-id="3643" width="5%"><span data-dcnode-id="3648" instrument_node=""> </span><p align="left" data-dcnode-id="3645"><strong data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">NL</span></strong></p><span data-dcnode-id="3644" instrument_node=""> </span></td><td data-dcnode-id="3637" valign="bottom" width="94%"><span data-dcnode-id="3641" instrument_node=""> </span><p align="left" data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Not available.</span></p><span data-dcnode-id="3638" instrument_node=""> </span></td></tr><tr data-dcnode-id="3607"><td data-dcnode-id="3627" width="5%"><span data-dcnode-id="3632" instrument_node=""> </span><p align="left" data-dcnode-id="3629"><strong data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">AT</span></strong></p><span data-dcnode-id="3628" instrument_node=""> </span></td><td data-dcnode-id="3609" valign="bottom" width="94%"><span data-dcnode-id="3625" instrument_node=""> </span><p align="left" data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">Documentation on quality:</span></p><span data-dcnode-id="3622" instrument_node=""> </span><p align="left" data-dcnode-id="3619"><a data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/029355.pdf%23pagemode%3Dbookmarks"><span data-dcnode-id="3621" instrument_node="">http://www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/029355.pdf#pagemode=bookmarks</span></a></p><span data-dcnode-id="3618" instrument_node=""> </span><p align="left" data-dcnode-id="3615"><a data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/003724.pdf"><span data-dcnode-id="3617" instrument_node="">http://www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/003724.pdf</span></a></p><span data-dcnode-id="3614" instrument_node=""> </span><p align="left" data-dcnode-id="3611"><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/029352.pdf"><span data-dcnode-id="3613" instrument_node="">http://www.statistik.at/web_de/wcmsprod/groups/gd/documents/stddok/029352.pdf</span></a></p><span data-dcnode-id="3610" instrument_node=""> </span></td></tr><tr data-dcnode-id="3591"><td data-dcnode-id="3599" width="5%"><span data-dcnode-id="3604" instrument_node=""> </span><p align="left" data-dcnode-id="3601"><strong data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">PL</span></strong></p><span data-dcnode-id="3600" instrument_node=""> </span></td><td data-dcnode-id="3593" width="94%"><span data-dcnode-id="3597" instrument_node=""> </span><p data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Sets of data on population do not include duplicated and inconsistent records.&nbsp; Correctness of data on births, deaths, and migration is guaranteed by Civil Status Offices and registration offices. Additionally, it is controlled by Statistics Poland.</span></p><span data-dcnode-id="3594" instrument_node=""> </span></td></tr><tr data-dcnode-id="3575"><td data-dcnode-id="3583" width="5%"><span data-dcnode-id="3588" instrument_node=""> </span><p align="left" data-dcnode-id="3585"><strong data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">PT</span></strong></p><span data-dcnode-id="3584" instrument_node=""> </span></td><td data-dcnode-id="3577" valign="bottom" width="94%"><span data-dcnode-id="3581" instrument_node=""> </span><p align="left" data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">Not available.</span></p><span data-dcnode-id="3578" instrument_node=""> </span></td></tr><tr data-dcnode-id="3555"><td data-dcnode-id="3567" width="5%"><span data-dcnode-id="3572" instrument_node=""> </span><p align="left" data-dcnode-id="3569"><strong data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">RO</span></strong></p><span data-dcnode-id="3568" instrument_node=""> </span></td><td data-dcnode-id="3557" width="94%"><span data-dcnode-id="3565" instrument_node=""> </span><p data-dcnode-id="3559"><span data-dcnode-id="3564" instrument_node="">Live-births and deaths were produced according to the Article 2 (e) of Regulation (EU) 1260/2013.</span><br data-dcnode-id="3563"><span data-dcnode-id="3562" instrument_node=""> </span><br data-dcnode-id="3561"><span data-dcnode-id="3560" instrument_node=""> The indicators on the resident population were produced using processed data from administrative sources, data received from the national statistical institutes of Spain and Italy, the Eurostat database on the population and international migration as well as the results of an econometric model based on small-area estimation techniques with a view to assessing the size of international migration.</span></p><span data-dcnode-id="3558" instrument_node=""> </span></td></tr><tr data-dcnode-id="3537"><td data-dcnode-id="3547" width="5%"><span data-dcnode-id="3552" instrument_node=""> </span><p align="left" data-dcnode-id="3549"><strong data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">SI</span></strong></p><span data-dcnode-id="3548" instrument_node=""> </span></td><td data-dcnode-id="3539" valign="bottom" width="94%"><span data-dcnode-id="3545" instrument_node=""> </span><p align="left" data-dcnode-id="3541"><span data-dcnode-id="3544" instrument_node="">Data prepared in accordance with European Statistics Code of Practise. More: </span><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stat.si/StatWeb/en/FundamentalPrinciples/CodeOfPract" target="_blank"><span data-dcnode-id="3543" instrument_node="">http://www.stat.si/StatWeb/en/FundamentalPrinciples/CodeOfPract</span></a></p><span data-dcnode-id="3540" instrument_node=""> </span></td></tr><tr data-dcnode-id="3521"><td data-dcnode-id="3529" width="5%"><span data-dcnode-id="3534" instrument_node=""> </span><p align="left" data-dcnode-id="3531"><strong data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">SK</span></strong></p><span data-dcnode-id="3530" instrument_node=""> </span></td><td data-dcnode-id="3523" width="94%"><span data-dcnode-id="3527" instrument_node=""> </span><p data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Data (indicators) are defined in accordance with EU legislation.</span></p><span data-dcnode-id="3524" instrument_node=""> </span></td></tr><tr data-dcnode-id="3503"><td data-dcnode-id="3513" width="5%"><span data-dcnode-id="3518" instrument_node=""> </span><p align="left" data-dcnode-id="3515"><strong data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">FI</span></strong></p><span data-dcnode-id="3514" instrument_node=""> </span></td><td data-dcnode-id="3505" width="94%"><span data-dcnode-id="3511" instrument_node=""> </span><p align="left" data-dcnode-id="3507"><span data-dcnode-id="3510" instrument_node="">The Digital and Data Service Agency has charged Statistics Finland with the task of conducting a sample survey on correctness of address information. Around 11000 people are asked whether their address in the Population Information System is correct. In the most recent survey in 2012, the address was correct for 98.9% of the respondents. </span><br data-dcnode-id="3509"><span data-dcnode-id="3508" instrument_node=""> Population development is produced from two statistical systems: population structure and population change systems. These two systems are governed by two different organisations namely the Digital and Data Service Agency and National Statistical Office.&nbsp;Difference between population number at the beginning and at the end of the year must be the same as the population increase from the population change system. The police investigates the number of persons who leave the country illegally and the number has been observed to be small, couple of thousands.</span></p><span data-dcnode-id="3506" instrument_node=""> </span></td></tr><tr data-dcnode-id="3487"><td data-dcnode-id="3495" width="5%"><span data-dcnode-id="3500" instrument_node=""> </span><p align="left" data-dcnode-id="3497"><strong data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">SE</span></strong></p><span data-dcnode-id="3496" instrument_node=""> </span></td><td data-dcnode-id="3489" width="94%"><span data-dcnode-id="3493" instrument_node=""> </span><p align="left" data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">An annual quality assessment is carried out together with external quality experts. The results from&nbsp;the&nbsp;assessment&nbsp;provide input to quality improvements.</span></p><span data-dcnode-id="3490" instrument_node=""> </span></td></tr><tr data-dcnode-id="3449"><td data-dcnode-id="3479" width="5%"><span data-dcnode-id="3484" instrument_node=""> </span><p align="left" data-dcnode-id="3481"><strong data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">UK</span></strong></p><span data-dcnode-id="3480" instrument_node=""> </span></td><td data-dcnode-id="3451" width="94%"><span data-dcnode-id="3477" instrument_node=""> </span><p align="left" data-dcnode-id="3453"><span data-dcnode-id="3476" instrument_node="">Quality and Methodology Information report for population estimates published at:　</span><a data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates" target="_blank"><span data-dcnode-id="3475" instrument_node="">https://www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates </span></a><span data-dcnode-id="3473" instrument_node="">　</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">Quality and Methodology Information report for births in England and Wales published at:　</span><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/livebirths/qmis/birthsqmi" target="_blank"><span data-dcnode-id="3470" instrument_node="">http://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/livebirths/qmis/birthsqmi</span></a><span data-dcnode-id="3468" instrument_node="">　</span><br data-dcnode-id="3467"><span data-dcnode-id="3466" instrument_node="">Quality and Methodology Information report for deaths in England and Wales published at:　</span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/qmis/mortalitystatisticsinenglandandwalesqmi" target="_blank"><span data-dcnode-id="3465" instrument_node="">http://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/qmis/mortalitystatisticsinenglandandwalesqmi</span></a><span data-dcnode-id="3463" instrument_node="">　</span><br data-dcnode-id="3462"><span data-dcnode-id="3461" instrument_node="">Quality documentation for births, deaths, marriages and divorces in Scotland published at:　</span><a data-dcnode-id="3459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nrscotland.gov.uk/statistics-and-data/statistics/statistics-by-theme/vital-events/general-background-information/quality-of-national-records-of-scotland-nrs-data-on-vital-events%2520" target="_blank"><span data-dcnode-id="3460" instrument_node="">http://www.nrscotland.gov.uk/statistics-and-data/statistics/statistics-by-theme/vital-events/general-background-information/quality-of-national-records-of-scotland-nrs-data-on-vital-events </span></a><span data-dcnode-id="3458" instrument_node=""> </span><br data-dcnode-id="3457"><span data-dcnode-id="3456" instrument_node=""> Quality and Methodology document for international migration:　</span><a data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates/methodologies/longterminternationalmigrationqmi" target="_blank"><span data-dcnode-id="3455" instrument_node="">https://www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates/methodologies/longterminternationalmigrationqmi</span></a></p><span data-dcnode-id="3452" instrument_node=""> </span></td></tr><tr data-dcnode-id="3433"><td data-dcnode-id="3441" width="5%"><span data-dcnode-id="3446" instrument_node=""> </span><p align="left" data-dcnode-id="3443"><strong data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">IS</span></strong></p><span data-dcnode-id="3442" instrument_node=""> </span></td><td data-dcnode-id="3435" valign="bottom" width="94%"><span data-dcnode-id="3439" instrument_node=""> </span><p align="left" data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">Not available.</span></p><span data-dcnode-id="3436" instrument_node=""> </span></td></tr><tr data-dcnode-id="3417"><td data-dcnode-id="3425" width="5%"><span data-dcnode-id="3430" instrument_node=""> </span><p align="left" data-dcnode-id="3427"><strong data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">LI</span></strong></p><span data-dcnode-id="3426" instrument_node=""> </span></td><td data-dcnode-id="3419" valign="bottom" width="94%"><span data-dcnode-id="3423" instrument_node=""> </span><p align="left" data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">The publications are always controlled by a second person of the Office of Statistics.</span></p><span data-dcnode-id="3420" instrument_node=""> </span></td></tr><tr data-dcnode-id="3383"><td data-dcnode-id="3409" width="5%"><span data-dcnode-id="3414" instrument_node=""> </span><p align="left" data-dcnode-id="3411"><strong data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">NO</span></strong></p><span data-dcnode-id="3410" instrument_node=""> </span></td><td data-dcnode-id="3385" valign="bottom" width="94%"><span data-dcnode-id="3407" instrument_node=""> </span><p align="left" data-dcnode-id="3387" style="text-align: justify;"><span data-dcnode-id="3406" instrument_node="">In addition to the controls done by the DSF, Statistics Norway performs checks for statistical purposes. </span><br data-dcnode-id="3405"><span data-dcnode-id="3404" instrument_node=""> Some errors made during the collecting and processing of the data are unavoidable and include coding, revision and data processing errors etc. Extensive efforts have been made to minimize these errors, and we regard these types of errors to be relatively insignificant.</span><br data-dcnode-id="3403"><span data-dcnode-id="3402" instrument_node=""> </span><br data-dcnode-id="3401"><span data-dcnode-id="3400" instrument_node=""> Unauthorized foreigners are not included in the statistics. The expected total irregular residents population with non-EU origins is estimated to be 18 200 by 1.1.2006. The estimate has been given with an insecurity, read more in Developing methods for determining the number of unauthorized foreigners in Norway</span><br data-dcnode-id="3399"><span data-dcnode-id="3398" instrument_node=""> </span><br data-dcnode-id="3397"><span data-dcnode-id="3396" instrument_node=""> None because total figures rather than sample material is used.</span><br data-dcnode-id="3395"><span data-dcnode-id="3394" instrument_node=""> </span><br data-dcnode-id="3393"><span data-dcnode-id="3392" instrument_node=""> The quality of the basic data from the Central Population Register is generally very good for statistical purposes. Two drawbacks are nevertheless late or missing notifications and registration of residence.</span><br data-dcnode-id="3391"><span data-dcnode-id="3390" instrument_node=""> </span><br data-dcnode-id="3389"><span data-dcnode-id="3388" instrument_node=""> Some persons neglect to register emigration and it results in missing notifications. Late notifications cause events to be recorded and counted during the wrong calendar year. This is less problematic when the numbers are added up for several years.</span></p><span data-dcnode-id="3386" instrument_node=""> </span></td></tr><tr data-dcnode-id="3355"><td data-dcnode-id="3375" width="5%"><span data-dcnode-id="3380" instrument_node=""> </span><p align="left" data-dcnode-id="3377"><strong data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">CH</span></strong></p><span data-dcnode-id="3376" instrument_node=""> </span></td><td data-dcnode-id="3357" width="94%"><span data-dcnode-id="3373" instrument_node=""> </span><p align="left" data-dcnode-id="3359"><span data-dcnode-id="3372" instrument_node="">The quality assurance measures are documented in the detailed concepts of the different statistics.</span><br data-dcnode-id="3371"><span data-dcnode-id="3370" instrument_node=""> </span><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bfs.admin.ch/bfs/en/home/statistics/catalogues-databases/surveys.html%3Fdyn_pageIndex%3D0" target="_blank"><span data-dcnode-id="3369" instrument_node="">https://www.bfs.admin.ch/bfs/en/home/statistics/catalogues-databases/surveys.html?dyn_pageIndex=0</span></a><br data-dcnode-id="3367"><span data-dcnode-id="3366" instrument_node=""> </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bfs.admin.ch/bfs/en/home/statistics/catalogues-databases/definitions.html%3Fdyn_pageIndex%3D0" target="_blank"><span data-dcnode-id="3365" instrument_node="">https://www.bfs.admin.ch/bfs/en/home/statistics/catalogues-databases/definitions.html?dyn_pageIndex=0</span></a><br data-dcnode-id="3363"><span data-dcnode-id="3362" instrument_node=""> </span><a data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bfs.admin.ch/bfs/en/home/basics/methodological-reports.html" target="_blank"><span data-dcnode-id="3361" instrument_node="">https://www.bfs.admin.ch/bfs/en/home/basics/methodological-reports.html</span></a></p><span data-dcnode-id="3358" instrument_node=""> </span></td></tr><tr data-dcnode-id="3339"><td data-dcnode-id="3347" width="5%"><span data-dcnode-id="3352" instrument_node=""> </span><p align="left" data-dcnode-id="3349"><strong data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">ME</span></strong></p><span data-dcnode-id="3348" instrument_node=""> </span></td><td data-dcnode-id="3341" valign="bottom" width="94%"><span data-dcnode-id="3345" instrument_node=""> </span><p align="left" data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Bearing in mind that as a data source using data from administrative register, the basic issue in ensuring quality compliance is the definition and coverage. Statistical office during preparation of Agreement with Ministry of Interior addressed the special attention to these issues.</span></p><span data-dcnode-id="3342" instrument_node=""> </span></td></tr><tr data-dcnode-id="3317"><td data-dcnode-id="3331" width="5%"><span data-dcnode-id="3336" instrument_node=""> </span><p align="left" data-dcnode-id="3333"><strong data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">MK</span></strong></p><span data-dcnode-id="3332" instrument_node=""> </span></td><td data-dcnode-id="3319" valign="bottom" width="94%"><span data-dcnode-id="3329" instrument_node=""> </span><p align="left" data-dcnode-id="3321" style="text-align: justify;"><span data-dcnode-id="3328" instrument_node="">The commitment of the SSO to ensuring quality of products and services is described in the Law on State Statistics, the Strategy of the State Statistical Office (</span><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stat.gov.mk/ZaNas_en.aspx%3Fid%3D6" target="_blank"><span data-dcnode-id="3327" instrument_node="">http://www.stat.gov.mk/ZaNas_en.aspx?id=6</span></a><span data-dcnode-id="3325" instrument_node="">) and the Quality Policy of the State Statistical Office (</span><a data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stat.gov.mk/pdf/Politika_za_kvalitet_en.pdf" target="_blank"><span data-dcnode-id="3324" instrument_node="">http://www.stat.gov.mk/pdf/Politika_za_kvalitet_en.pdf</span></a><span data-dcnode-id="3322" instrument_node="">), as well as in the continuous efforts for harmonisation with the European Statistics Code of Practice. The main aspects and procedures for quality management in the phases and sub-phases of the Statistical Business Process Model, as well as the good practices for ensuring quality are documented in the internal document called “Guide for ensuring quality of statistical processes”. Input and output metadata, as well as relevant quality indicators for certain sub-processes are described in the document “Guide for survey managers”.</span></p><span data-dcnode-id="3320" instrument_node=""> </span></td></tr><tr data-dcnode-id="3301"><td data-dcnode-id="3309" width="5%"><span data-dcnode-id="3314" instrument_node=""> </span><p align="left" data-dcnode-id="3311"><strong data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">AL</span></strong></p><span data-dcnode-id="3310" instrument_node=""> </span></td><td data-dcnode-id="3303" width="94%"><span data-dcnode-id="3307" instrument_node=""> </span><p data-dcnode-id="3305" style="text-align: justify;"><span data-dcnode-id="3306" instrument_node="">INSTAT is committed to ensure the highest quality with respect to the compilation of statistical information. In accordance with the Statistics Law, INSTAT use statistical methods and processes in compliance with internationally recognized scientific principles and standards conduct ongoing analyses of the statistics with a view to quality improvements and ensure that statistics are as up to-date. In performing its tasks it follows the general principles of quality management from the European Statistics Code of Practice. INSTAT declares that it takes into account the following principles: impartiality, quality of processes and products, user orientation, employee orientation, effectiveness of statistical processes, reducing the workload for respondents. Quality controls and validation of data are actions carried out throughout the process. The staff is involved in different stages of index calculation, such as the data collection, data control, data input and other necessary control are all well trained. This helps the staff to know the enterprises and their responsibilities and keep an updated collaboration.</span></p><span data-dcnode-id="3304" instrument_node=""> </span></td></tr><tr data-dcnode-id="3285"><td data-dcnode-id="3293" width="5%"><span data-dcnode-id="3298" instrument_node=""> </span><p align="left" data-dcnode-id="3295"><strong data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">RS</span></strong></p><span data-dcnode-id="3294" instrument_node=""> </span></td><td data-dcnode-id="3287" width="94%"><span data-dcnode-id="3291" instrument_node=""> </span><p align="left" data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Data is validated before publishing in SORS.</span></p><span data-dcnode-id="3288" instrument_node=""> </span></td></tr><tr data-dcnode-id="3265"><td data-dcnode-id="3277" width="5%"><span data-dcnode-id="3282" instrument_node=""> </span><p align="left" data-dcnode-id="3279"><strong data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">TR</span></strong></p><span data-dcnode-id="3278" instrument_node=""> </span></td><td data-dcnode-id="3267" width="94%"><span data-dcnode-id="3275" instrument_node=""> </span><p align="left" data-dcnode-id="3269"><span data-dcnode-id="3274" instrument_node="">All documents regarding quality assurance are available at website of the TurkStat.</span><br data-dcnode-id="3273"><span data-dcnode-id="3272" instrument_node=""> </span><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.turkstat.gov.tr/jsp/duyuru/upload/qualityreports/qualityreports.html" target="_blank"><span data-dcnode-id="3271" instrument_node="">http://www.turkstat.gov.tr/jsp/duyuru/upload/qualityreports/qualityreports.html</span></a></p><span data-dcnode-id="3268" instrument_node=""> </span></td></tr></tbody></table></td></tr><tr data-dcnode-id="3251"><td class="Cl-Level2" data-dcnode-id="3253"><a data-dcnode-id="3255" name="quality_assmnt"></a><span data-dcnode-id="3254" instrument_node="">11.2. Quality management - assessment</span></td></tr><tr data-dcnode-id="3230"><td class="Cl-Content" data-dcnode-id="3232"><p data-dcnode-id="3244" style="margin: 0cm 0cm 0pt; text-align: justify;"><span data-dcnode-id="3248" instrument_node="">Art. 11 of </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/legal-content/EN/TXT/HTML/%3Furi%3DCELEX%3A32013R1260%26qid%3D1448963912215%26from%3DEN"><span data-dcnode-id="3247" instrument_node="">Regulation (EU) No 1260/2013</span></a><span data-dcnode-id="3245" instrument_node=""> states that the Commission shall&nbsp; submit reports on its implementation, to the European Parliament and the Council as follows:</span></p><span data-dcnode-id="3243" instrument_node=""> </span><p align="left" data-dcnode-id="3239" style="text-align: justify;"><span data-dcnode-id="3242" instrument_node="">- first report by 31 December 2018, see </span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eur-lex.europa.eu/legal-content/EN/TXT/PDF/%3Furi%3DCELEX%3A52018DC0843%26from%3DEN" target="_blank"><span data-dcnode-id="3241" instrument_node="">Report on the implementation of Regulation (EU) No 1260/2013 on European demographic statistics</span></a></p><span data-dcnode-id="3238" instrument_node=""> </span><p align="left" data-dcnode-id="3236" style="text- </span><li data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Analysis of population ageing and its effects on sustainability and welfare;</span></li><span data-dcnode-id="3178" instrument_node="">
</span><li data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Evaluation of fertility as a background for family policies;</span></li><span data-dcnode-id="3175" instrument_node="">

e.</span></p><span data-dcnode-id="2342" instrument_node=""> </span></td><td data-dcnode-id="2335"><span data-dcnode-id="2339" instrument_node=""> </span><p align="left" data-dcnode-id="2337" style="text-align: justify;"><span data-dcnode-id="2338" instrument_node="">Data related to deaths in Hungary are fully comprehensive and accurate. Deaths of persons with address in Hungary occured abroad are also registered, but in a less detailed manner.</span></p><span data-dcnode-id="2336" instrument_node=""> </span></td><td data-dcnode-id="2329"><span data-dcnode-id="2333" instrument_node=""> </span><p align="left" data-dcnode-id="2331" style="text-align: justify;"><span data-dcnode-id="2332" instrument_node="">Immigration data of foreign citizens is comprehensive and reliable. Returning migration of nationals might be underestimated due to the lack of deregistration.</span></p><span data-dcnode-id="2330" instrument_node=""> </span></td><td data-dcnode-id="2323"><span data-dcnode-id="2327" instrument_node=""> </span><p align="left" data-dcnode-id="2325" style="text-align: justify;"><span data-dcnode-id="2326" instrument_node="">Data of national emigrants might be underestimated due to the lack of deregistration.</span></p><span data-dcnode-id="2324" instrument_node=""> </span></td></tr><tr data-dcnode-id="2227"><td data-dcnode-id="2313"><span data-dcnode-id="2318" instrument_node=""> </span><p align="left" data-dcnode-id="2315"><strong data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">MT</span></strong></p><span data-dcnode-id="2314" instrument_node=""> </span></td><td data-dcnode-id="2295"><span data-dcnode-id="2311" instrument_node=""> </span><p data-dcnode-id="2309" style="text-align: justify;"><span data-dcnode-id="2310" instrument_node="">Possible sources of errors:</span></p><span data-dcnode-id="2308" instrument_node=""> </span><p data-dcnode-id="2306" style="text-align: justify;"><span data-dcnode-id="2307" instrument_node="">- under-reporting in
