e=""> </span></td><td data-dcnode-id="1958"><span data-dcnode-id="1962" instrument_node=""> </span><p align="left" data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">No reason</span></p><span data-dcnode-id="1959" instrument_node=""> </span></td><td data-dcnode-id="1952"><span data-dcnode-id="1956" instrument_node=""> </span><p align="left" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">No reason</span></p><span data-dcnode-id="1953" instrument_node=""> </span></td><td data-dcnode-id="1946" valign="bottom"><span data-dcnode-id="1950" instrument_node=""> </span><p data-dcnode-id="1948" style="text-align: justify;"><span data-dcnode-id="1949" instrument_node="">Some persons fail to register upon their arrival to the country (mainly EU citizens, because of the freedom of movement).</span></p><span data-dcnode-id="1947" instrument_node=""> </span></td><td data-dcnode-id="1940" valign="bottom"><span data-dcnode-id="1944" instrument_node=""> </span><p data-dcnode-id="1942" style="text-align: justify;"><span data-dcnode-id="1943" instrument_node="">Some persons fail to deregister when leaving for abroad, because the majority of them has an intention to return back.</span></p><span data-dcnode-id="1941" instrument_node=""> </span></td></tr><tr data-dcnode-id="1898"><td data-dcnode-id="1930"><span data-dcnode-id="1935" instrument_node=""> </span><p align="left" data-dcnode-id="1932"><strong data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">FI</span></strong></p><span data-dcnode-id="1931" instrument_node=""> </span></td><td data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node=""> </span><p align="left" data-dcnode-id="1926" style="text-align: justify;"><span data-dcnode-id="1927" instrument_node="">According to&nbsp;residence act of municipality 1994, persons moving abroad for&nbsp;at least 12 months should inform local register office of their move but they do not always do this.</span></p><span data-dcnode-id="1925" instrument_node=""> </span></td><td data-dcnode-id="1918"><span data-dcnode-id="1922" instrument_node=""> </span><p align="left" data-dcnode-id="1920" style="text-align: justify;"><span data-dcnode-id="1921" instrument_node="">Asylum seekers are excluded, refugees are included.</span></p><span data-dcnode-id="1919" instrument_node=""> </span></td><td data-dcnode-id="1912"><span data-dcnode-id="1916" instrument_node=""> </span><p align="left" data-dcnode-id="1914" style="text-align: justify;"><span data-dcnode-id="1915" instrument_node="">Asylum seekers are excluded, refugees are included.</span></p><span data-dcnode-id="1913" instrument_node=""> </span></td><td data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node=""> </span><p align="left" data-dcnode-id="1908" style="text-align: justify;"><span data-dcnode-id="1909" instrument_node="">Persons staying illegally in the country. Asylum seekers are excluded, refugees are included.</span></p><span data-dcnode-id="1907" instrument_node=""> </span></td><td data-dcnode-id="1900"><span data-dcnode-id="1904" instrument_node=""> </span><p align="left" data-dcnode-id="1902" style="text-align: justify;"><span data-dcnode-id="1903" instrument_node="">According to&nbsp;residence act of municipality 1994, persons moving abroad for&nbsp;at least 12 months should inform register office of their move but they do not always do this. Asylum seekers are excluded, refugees are included.</span></p><span data-dcnode-id="1901" instrument_node=""> </span></td></tr><tr data-dcnode-id="1858"><td data-dcnode-id="1890"><span data-dcnode-id="1895" instrument_node=""> </span><p align="left" data-dcnode-id="1892"><strong data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">SE</span></strong></p><span data-dcnode-id="1891" instrument_node=""> </span></td><td data-dcnode-id="1884"><span data-dcnode-id="1888" instrument_node=""> </span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">There are no particular reasons for unreliability of the data on population.</span></p><span data-dcnode-id="1885" instrument_node=""> </span></td><td data-dcnode-id="1878"><span data-dcnode-id="1882" instrument_node=""> </span><p data-dcnode-id="1880" style="text-align: justify;"><span data-dcnode-id="1881" instrument_node="">There are no particular reasons for unreliability of the data on live births.</span></p><span data-dcnode-id="1879" instrument_node=""> </span></td><td data-dcnode-id="1872" valign="bottom"><span data-dcnode-id="1876" instrument_node=""> </span><p data-dcnode-id="1874" style="text-align: justify;"><span data-dcnode-id="1875" instrument_node="">There are no particular reasons for unreliability of the data on deaths.</span></p><span data-dcnode-id="1873" instrument_node=""> </span></td><td data-dcnode-id="1866" valign="bottom"><span data-dcnode-id="1870" instrument_node=""> </span><p data-dcnode-id="1868" style="text-align: justify;"><span data-dcnode-id="1869" instrument_node="">There are no particular reasons for unreliability of the data on immigrants.</span></p><span data-dcnode-id="1867" instrument_node=""> </span></td><td data-dcnode-id="1860" valign="bottom"><span data-dcnode-id="1864" instrument_node=""> </span><p data-dcnode-id="1862" style="text-align: justify;"><span data-dcnode-id="1863" instrument_node="">There are no particular reasons for unreliability of the data on emigrants.</span></p><span data-dcnode-id="1861" instrument_node=""> </span></td></tr><tr data-dcnode-id="1771"><td data-dcnode-id="1850"><span data-dcnode-id="1855" instrument_node=""> </span><p align="left" data-dcnode-id="1852"><strong data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">UK</span></strong></p><span data-dcnode-id="1851" instrument_node=""> </span></td><td data-dcnode-id="1832"><span data-dcnode-id="1848" instrument_node=""> </span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Quality and Methodology Information is published on the ONS website at:　</span></p><span data-dcnode-id="1845" instrument_node=""> </span><p data-dcnode-id="1841"><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates"><span data-dcnode-id="1844" instrument_node="">Population estimates</span></a><span data-dcnode-id="1842" instrument_node="">　</span></p><span data-dcnode-id="1840" instrument_node=""> </span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Uncertainty estimates provide users with further information about the quality of the mid-2002 to mid-2015 population estimates:　</span></p><span data-dcnode-id="1837" instrument_node=""> </span><p data-dcnode-id="1834"><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates/methodologies/measuresofstatisticaluncertaintysummary"><span data-dcnode-id="1836" instrument_node="">Measures of statistical uncertainty summary</span></a></p><span data-dcnode-id="1833" instrument_node=""> </span></td><td data-dcnode-id="1814"><span data-dcnode-id="1830" instrument_node=""> </span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Quality and Methodology Information for England and Wales published at:</span></p><span data-dcnode-id="1827" instrument_node=""> </span><p data-dcnode-id="1823"><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/livebirths/qmis/birthsqmi"><span data-dcnode-id="1826" instrument_node="">Births QMI</span></a><span data-dcnode-id="1824" instrument_node="">　</span></p><span data-dcnode-id="1822" instrument_node=""> </span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Quality documentation for Scotland published at:　</span></p><span data-dcnode-id="1819" instrument_node=""> </span><p data-dcnode-id="1816"><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nrscotland.gov.uk/statistics-and-data/statistics/statistics-by-theme/vital-events/general-background-information/quality-of-national-records-of-scotland-nrs-data-on-vital-events"><span data-dcnode-id="1818" instrument_node="">Quality of National Records of Scotland (NRS) Data on Vital Events</span></a></p><span data-dcnode-id="1815" instrument_node=""> </span></td><td data-dcnode-id="1796"><span data-dcnode-id="1812" instrument_node=""> </span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Quality and Methodology document for England and Wales published at:</span></p><span data-dcnode-id="1809" instrument_node=""> </span><p data-dcnode-id="1805"><a data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/qmis/mortalitystatisticsinenglandandwalesqmi"><span data-dcnode-id="1808" instrument_node="">Mortality statistics in England and Wales QMI</span></a><span data-dcnode-id="1806" instrument_node="">　　</span></p><span data-dcnode-id="1804" instrument_node=""> </span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Quality documentation for Scotland published at:</span></p><span data-dcnode-id="1801" instrument_node=""> </span><p data-dcnode-id="1798"><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nrscotland.gov.uk/statistics-and-data/statistics/statistics-by-theme/vital-events/general-background-information/quality-of-national-records-of-scotland-nrs-data-on-vital-events"><span data-dcnode-id="1800" instrument_node="">Quality of National Records of Scotland (NRS) Data on Vital Events</span></a></p><span data-dcnode-id="1797" instrument_node=""> </span></td><td data-dcnode-id="1783"><span data-dcnode-id="1794" instrument_node=""> </span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1791" instrument_node=""> </span><p data-dcnode-id="1789" style="text-align: justify;"><span data-dcnode-id="1790" instrument_node="">Quality and Methodology Information report for long-term international migration estimates published at:</span></p><span data-dcnode-id="1788" instrument_node=""> </span><p data-dcnode-id="1785"><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates/qmis/longtermmigrationindicatorssuiteqmi"><span data-dcnode-id="1787" instrument_node="">Long term international migration QMI</span></a></p><span data-dcnode-id="1784" instrument_node=""> </span></td><td data-dcnode-id="1773"><span data-dcnode-id="1781" instrument_node=""> </span><p data-dcnode-id="1779" style="text-align: justify;"><span data-dcnode-id="1780" instrument_node="">Quality and Methodology Information report for long-term international migration estimates published at:</span></p><span data-dcnode-id="1778" instrument_node=""> </span><p data-dcnode-id="1775"><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/populationestimates/qmis/longtermmigrationindicatorssuiteqmi"><span data-dcnode-id="1777" instrument_node="">Long term international migration QMI</span></a></p><span data-dcnode-id="1774" instrument_node=""> </span></td></tr><tr data-dcnode-id="1713"><td data-dcnode-id="1763"><span data-dcnode-id="1768" instrument_node=""> </span><p align="left" data-dcnode-id="1765"><strong data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">IS</span></strong></p><span data-dcnode-id="1764" instrument_node=""> </span></td><td data-dcnode-id="1757"><span data-dcnode-id="1761" instrument_node=""> </span><p align="left" data-dcnode-id="1759" style="text-align: justify;"><span data-dcnode-id="1760" instrument_node="">There are three sources of errors to figures in the National Register of Persons on 31 December: late notifications of change of residence, late death certificates, and late birth reports. In a survey of delayed reports over the past five years it emerged that the greatest uncertainty was caused by late notifications of change of residence, due to which an average of 80 persons are under- or overestimated in the National Register of Persons on 31 December. Late death certificates cause the number of persons to be overestimated by around 10 persons in the National Register of Persons on 31 December, while late birth reports cause the number of persons to be underestimated by one individual about every two years.</span></p><span data-dcnode-id="1758" instrument_node=""> </span></td><td data-dcnode-id="1751"><span data-dcnode-id="1755" instrument_node=""> </span><p align="left" data-dcnode-id="1753" style="text-align: justify;"><span data-dcnode-id="1754" instrument_node="">Delayed birth reports were for a short period the main cause of errors in birth figures. In a review of delays to birth reports over the last five years it emerged that no birth report was missing.</span></p><span data-dcnode-id="1752" instrument_node=""> </span></td><td data-dcnode-id="1745"><span data-dcnode-id="1749" instrument_node=""> </span><p align="left" data-dcnode-id="1747" style="text-align: justify;"><span data-dcnode-id="1748" instrument_node="">Information on the number of deaths published in the tables of Statistics Iceland is accurate; it can be considered certain that information on all deaths reaches Statistics Iceland.</span></p><span data-dcnode-id="1746" instrument_node=""> </span></td><td data-dcnode-id="1730"><span data-dcnode-id="1743" instrument_node=""> </span><p align="left" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Late registration of change of residence is the main cause of errors in migration figures.</span></p><span data-dcnode-id="1740" instrument_node=""> </span><p align="left" data-dcnode-id="1738" style="text-align: justify;"><span data-dcnode-id="1739" instrument_node="">Migration is calculated for each month and thus a final figure is available for each month on its own; the figures for that month are not changed at any point after that. If a change of residence is registered a month or more late it is added to the month during which it was received.</span></p><span data-dcnode-id="1737" instrument_node=""> </span><p align="left" data-dcnode-id="1735" style="text-align: justify;"><span data-dcnode-id="1736" instrument_node="">When considering all moves over the past five years (from 1996-2000) only around 55% of registrations were received within a month of moving. After two months 96% of all registrations had been received by Statistics Iceland and within six months 98% had been received.</span></p><span data-dcnode-id="1734" instrument_node=""> </span><p align="left" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Errors in published migration data appear due to delays in registration of change of residence.</span></p><span data-dcnode-id="1731" instrument_node=""> </span></td><td data-dcnode-id="1715"><span data-dcnode-id="1728" instrument_node=""> </span><p align="left" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Late registration of change of residence is the main cause of errors in migration figures.</span></p><span data-dcnode-id="1725" instrument_node=""> </span><p align="left" data-dcnode-id="1723" style="text-align: justify;"><span data-dcnode-id="1724" instrument_node="">Migration is calculated for each month and thus a final figure is available for each month on its own; the figures for that month are not changed at any point after that. If a change of residence is registered a month or more late it is added to the month during which it was received.</span></p><span data-dcnode-id="1722" instrument_node=""> </span><p align="left" data-dcnode-id="1720" style="text-align: justify;"><span data-dcnode-id="1721" instrument_node="">When considering all moves over the past five years (from 1996-2000) only around 55% of registrations were received within a month of moving. After two months 96% of all registrations had been received by Statistics Iceland and within six months 98% had been received.</span></p><span data-dcnode-id="1719" instrument_node=""> </span><p align="left" data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Errors in published migration data appear due to delays in registration of change of residence.</span></p><span data-dcnode-id="1716" instrument_node=""> </span></td></tr><tr data-dcnode-id="1673"><td data-dcnode-id="1705"><span data-dcnode-id="1710" instrument_node=""> </span><p align="left" data-dcnode-id="1707"><strong data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">IT</span></strong></p><span data-dcnode-id="1706" instrument_node=""> </span></td><td data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node=""> </span><p align="left" data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">none</span></p><span data-dcnode-id="1700" instrument_node=""> </span></td><td data-dcnode-id="1693"><span data-dcnode-id="1697" instrument_node=""> </span><p align="left" data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">none</span></p><span data-dcnode-id="1694" instrument_node=""> </span></td><td data-dcnode-id="1687"><span data-dcnode-id="1691" instrument_node=""> </span><p align="left" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">none</span></p><span data-dcnode-id="1688" instrument_node=""> </span></td><td data-dcnode-id="1681"><span data-dcnode-id="1685" instrument_node=""> </span><p align="left" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">none</span></p><span data-dcnode-id="1682" instrument_node=""> </span></td><td data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node=""> </span><p align="left" data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">none</span></p><span data-dcnode-id="1676" instrument_node=""> </span></td></tr><tr data-dcnode-id="1564"><td data-dcnode-id="1665"><span data-dcnode-id="1670" instrument_node=""> </span><p align="left" data-dcnode-id="1667"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">NO</span></strong></p><span data-dcnode-id="1666" instrument_node=""> </span></td><td data-dcnode-id="1635"><span data-dcnode-id="1663" instrument_node=""> </span><p data-dcnode-id="1661" style="text-align: justify;"><span data-dcnode-id="1662" instrument_node="">Some errors made during the collecting and processing of the data are unavoidable and include coding, revision and data processing errors etc. Extensive efforts have been made to minimize these errors, and we regard these types of errors to be relatively insignificant.</span></p><span data-dcnode-id="1660" instrument_node=""> </span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Dropout errors will be found to the extent there are persons staying in Norway not being registered as residents according to the regulations, laid down in the law on population registration of 16 January 1970. We refer to point 4.1. Definitions of the main concepts and variables.</span></p><span data-dcnode-id="1657" instrument_node=""> </span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">None because all the material rather than samples is used.</span></p><span data-dcnode-id="1654" instrument_node=""> </span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">The quality of the basic data from the Central Population Register is generally very good for statistical purposes. One minus is nevertheless residence registration - in part because too many are registered as residents, but also because certain groups are registered as having another domicile than where they actually live. This is particularly true because according to the rules unmarried students are listed as residing with their parent(s).</span></p><span data-dcnode-id="1651" instrument_node=""> </span><p data-dcnode-id="1649" style="text-align: justify;"><span data-dcnode-id="1650" instrument_node="">Registration of residence From a statistical viewpoint, registration of residence can seem to be prone to error. This is particularly true in relation to the ideal situation in which everyone is registered according to the day's-rest principle. Failure to report a change of residence or delay the reporting of it also contributes to such deviations. For many analysis and planning purposes the actual residence is of interest.</span></p><span data-dcnode-id="1648" instrument_node=""> </span><p data-dcnode-id="1646" style="text-align: justify;"><span data-dcnode-id="1647" instrument_node="">A survey undertaken following the Population and Housing census in 1990 concluded that the registered residence was incorrect for 5.5 per cent of the population. Much of the deviation is due to the legal definition of residence used in the Central Population Register, which requires that students and residents of joint households to be registered somewhere else than the place they actually live. Using the place of residence definition, between 1.8 and 3.0 per cent of the people were incorrectly placed. Schjalm: "Kvalitetsundersøkelsen for Folke- og boligtelling 1990" (Quality survey for the Population and Housing Census 1990), Reports 96/10, Statistics Norway.</span></p><span data-dcnode-id="1645" instrument_node=""> </span><p data-dcnode-id="1643" style="text-align: justify;"><span data-dcnode-id="1644" instrument_node="">Out-registrations People who move abroad without reporting their departure have also been a major source of error in recent years. As a result of surveys conducted in 1993, nearly 3 000 foreign citizens who had left Norway earlier without reporting the move were registered as living abroad. Oslo was the most affected by these out-registrations (1 600 persons). Some of this out-migration should have been distributed over several years. Out-registration was also done in 1994, 1995, 1997 and 1998. Oslo registered almost 2 000 foreign citizens as having left the country in 1997 and 1998.</span></p><span data-dcnode-id="1642" instrument_node=""> </span><p data-dcnode-id="1640" style="text-align: justify;"><span data-dcnode-id="1641" instrument_node="">Despite the actions taken to remove from the rolls immigrants who have left the country without reporting their move to the population registries, there will always be a number of persons registered as residents of Norway even though they no longer live here.</span></p><span data-dcnode-id="1639" instrument_node=""> </span><p data-dcnode-id="1637" style="text-align: justify;"><span data-dcnode-id="1638" instrument_node="">Conversely, a number of people are living illegally in Norway at any one time and are therefore not included in the population count. Most of them live in Oslo. Because these two factors pull in opposite directions, they largely cancel each other out</span></p><span data-dcnode-id="1636" instrument_node=""> </span></td><td data-dcnode-id="1608"><span data-dcnode-id="1633" instrument_node=""> </span><h3 data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Measurement and processing errors</span></h3><span data-dcnode-id="1630" instrument_node=""> </span><p data-dcnode-id="1628" style="text-align: justify;"><span data-dcnode-id="1629" instrument_node="">Some errors made during the collecting and processing of the data are unavoidable and include coding, revision and data processing errors etc. Extensive efforts have been made to minimize these errors, and we regard these types of errors to be relatively insignificant.</span></p><span data-dcnode-id="1627" instrument_node=""> </span><h3 data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Non-response errors</span></h3><span data-dcnode-id="1624" instrument_node=""> </span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Not relevant.</span></p><span data-dcnode-id="1621" instrument_node=""> </span><h3 data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Sampling errors</span></h3><span data-dcnode-id="1618" instrument_node=""> </span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Not relevant.</span></p><span data-dcnode-id="1615" instrument_node=""> </span><h3 data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Other sources of error</span></h3><span data-dcnode-id="1612" instrument_node=""> </span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Register errors: The quality of the birth reports is generally very good and there is very little delay in the reporting process.</span></p><span data-dcnode-id="1609" instrument_node=""> </span></td><td data-dcnode-id="1596"><span data-dcnode-id="1606" instrument_node=""> </span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1603" instrument_node=""> </span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Sources of error and uncertainty</span></p><span data-dcnode-id="1600" instrument_node=""> </span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Not relevant.</span></p><span data-dcnode-id="1597" instrument_node=""> </span></td><td data-dcnode-id="1581"><span data-dcnode-id="1594" instrument_node=""> </span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">&nbsp;uncertainty</span></p><span data-dcnode-id="1591" instrument_node=""> </span><p data-dcnode-id="1589" style="text-align: justify;"><span data-dcnode-id="1590" instrument_node="">The migration figures for the first years the reporting routines were in use are the most uncertain. The figures for 1960 and 1970 cover a number of moves across municipal borders that took place during the preceding 10-year period, but were not discovered and registered before the population registers were checked against the 1960 and 1970 censuses. Moreover, it turned out that a number of persons registered as residing in Norway at the time of the censuses had actually moved abroad. This explains the pronounced increase in migration these two years. A somewhat similar but smaller surge in internal migration seems to apply to 1980. The higher figure this year is probably ascribable to the fact that moves that took place earlier were reported/registered in 1980 even though the population was the control source.</span></p><span data-dcnode-id="1588" instrument_node=""> </span><p data-dcnode-id="1586" style="text-align: justify;"><span data-dcnode-id="1587" instrument_node="">From March 1987 to January 1994 asylum seekers as a rule were counted as immigrants - and therefore also as residents of Norway - even though their application for a residence permit had not been completely processed. Before and after this period only asylum seekers with a residence permit were registered. Persons who leave the country without reporting that they have moved have also been a major source of error in recent years. As a result of surveys conducted in 1993, the population registries registered as having migrated abroad nearly 3 000 foreigners who had previously left Norway without reporting the move. Oslo was the most affected by the out-registration (1 600 persons). Some of this out-migration should have been spread over several years. Out-registrations were also done in 1994, 1995, 1997 and 1998. In 1998 nearly 1 100 persons who had left Norway before 1997 were registered as having migrated abroad. They are included in the emigration figures for 1998. Also in 2012 and 2013 there has been out-registrations of persons who migrated ealiere years without reporting the move.</span></p><span data-dcnode-id="1585" instrument_node=""> </span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Register errors: The quality of the reports is generally very good, although the emigration figures have been somewhat low due to reporting failures.</span></p><span data-dcnode-id="1582" instrument_node=""> </span></td><td data-dcnode-id="1566"><span data-dcnode-id="1579" instrument_node=""> </span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">&nbsp;uncertainty</span></p><span data-dcnode-id="1576" instrument_node=""> </span><p data-dcnode-id="1574" style="text-align: justify;"><span data-dcnode-id="1575" instrument_node="">The migration figures for the first years the reporting routines were in use are the most uncertain. The figures for 1960 and 1970 cover a number of moves across municipal borders that took place during the preceding 10-year period, but were not discovered and registered before the population registers were checked against the 1960 and 1970 censuses. Moreover, it turned out that a number of persons registered as residing in Norway at the time of the censuses had actually moved abroad. This explains the pronounced increase in migration these two years. A somewhat similar but smaller surge in internal migration seems to apply to 1980. The higher figure this year is probably ascribable to the fact that moves that took place earlier were reported/registered in 1980 even though the population was the control source.</span></p><span data-dcnode-id="1573" instrument_node=""> </span><p data-dcnode-id="1571" style="text-align: justify;"><span data-dcnode-id="1572" instrument_node="">From March 1987 to January 1994 asylum seekers as a rule were counted as immigrants - and therefore also as residents of Norway - even though their application for a residence permit had not been completely processed. Before and after this period only asylum seekers with a residence permit were registered. Persons who leave the country without reporting that they have moved have also been a major source of error in recent years. As a result of surveys conducted in 1993, the population registries registered as having migrated abroad nearly 3 000 foreigners who had previously left Norway without reporting the move. Oslo was the most affected by the out-registration (1 600 persons). Some of this out-migration should have been spread over several years. Out-registrations were also done in 1994, 1995, 1997 and 1998. In 1998 nearly 1 100 persons who had left Norway before 1997 were registered as having migrated abroad. They are included in the emigration figures for 1998. Also in 2012 and 2013 there has been out-registrations of persons who migrated ealiere years without reporting the move.</span></p><span data-dcnode-id="1570" instrument_node=""> </span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Register errors: The quality of the reports is generally very good, although the emigration figures have been somewhat low due to reporting failures.</span></p><span data-dcnode-id="1567" instrument_node=""> </span></td></tr><tr data-dcnode-id="1524"><td data-dcnode-id="1556"><span data-dcnode-id="1561" instrument_node=""> </span><p align="left" data-dcnode-id="1558"><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">CH</span></strong></p><span data-dcnode-id="1557" instrument_node=""> </span></td><td data-dcnode-id="1550"><span data-dcnode-id="1554" instrument_node=""> </span><p align="left" data-dcnode-id="1552" style="text-align: justify;"><span data-dcnode-id="1553" instrument_node="">The source for data on vital events, migration and&nbsp;population stock data are population registers and civil status registers. They cover the whole population, with the possible exception of parts of the roofless,&nbsp;vagrant and nomad population.</span></p><span data-dcnode-id="1551" instrument_node=""> </span></td><td data-dcnode-id="1544"><span data-dcnode-id="1548" instrument_node=""> </span><p align="left" data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">&nbsp;Not available.</span></p><span data-dcnode-id="1545" instrument_node=""> </span></td><td data-dcnode-id="1538"><span data-dcnode-id="1542" instrument_node=""> </span><p align="left" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">&nbsp;Not available.</span></p><span data-dcnode-id="1539" instrument_node=""> </span></td><td data-dcnode-id="1532"><span data-dcnode-id="1536" instrument_node=""> </span><p align="left" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">&nbsp;Not available.</span></p><span data-dcnode-id="1533" instrument_node=""> </span></td><td data-dcnode-id="1526"><span data-dcnode-id="1530" instrument_node=""> </span><p align="left" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">&nbsp;Not available.</span></p><span data-dcnode-id="1527" instrument_node=""> </span></td></tr><tr data-dcnode-id="1484"><td data-dcnode-id="1516"><span data-dcnode-id="1521" instrument_node=""> </span><p align="left" data-dcnode-id="1518"><strong data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">ME</span></strong></p><span data-dcnode-id="1517" instrument_node=""> </span></td><td data-dcnode-id="1510"><span data-dcnode-id="1514" instrument_node=""> </span><p align="left" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Not applicable</span></p><span data-dcnode-id="1511" instrument_node=""> </span></td><td data-dcnode-id="1504"><span data-dcnode-id="1508" instrument_node=""> </span><p align="left" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Not applicable</span></p><span data-dcnode-id="1505" instrument_node=""> </span></td><td data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node=""> </span><p align="left" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Not applicable</span></p><span data-dcnode-id="1499" instrument_node=""> </span></td><td data-dcnode-id="1492"><span data-dcnode-id="1496" instrument_node=""> </span><p align="left" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Not applicable</span></p><span data-dcnode-id="1493" instrument_node=""> </span></td><td data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node=""> </span><p align="left" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Not applicable</span></p><span data-dcnode-id="1487" instrument_node=""> </span></td></tr><tr data-dcnode-id="1444"><td data-dcnode-id="1476"><span data-dcnode-id="1481" instrument_node=""> </span><p align="left" data-dcnode-id="1478"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">MK</span></strong></p><span data-dcnode-id="1477" instrument_node=""> </span></td><td data-dcnode-id="1470"><span data-dcnode-id="1474" instrument_node=""> </span><p align="left" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Data accuracy is ensured by working on decreasing sampling and/or non-sampling errors, as well as with additional data comparisons and analysis before dissemination.</span></p><span data-dcnode-id="1471" instrument_node=""> </span></td><td data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node=""> </span><p align="left" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">See population.</span></p><span data-dcnode-id="1465" instrument_node=""> </span></td><td data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node=""> </span><p align="left" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">See population.</span></p><span data-dcnode-id="1459" instrument_node=""> </span></td><td data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node=""> </span><p align="left" data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">See population.</span></p><span data-dcnode-id="1453" instrument_node=""> </span></td><td data-dcnode-id="1446"><span data-dcnode-id="1450" instrument_node=""> </span><p align="left" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">See population.</span></p><span data-dcnode-id="1447" instrument_node=""> </span></td></tr><tr data-dcnode-id="1404"><td data-dcnode-id="1436"><span data-dcnode-id="1441" instrument_node=""> </span><p align="left" data-dcnode-id="1438"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">AL</span></strong></p><span data-dcnode-id="1437" instrument_node=""> </span></td><td data-dcnode-id="1430"><span data-dcnode-id="1434" instrument_node=""> </span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Measuring migration &nbsp;</span></p><span data-dcnode-id="1431" instrument_node=""> </span></td><td data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node=""> </span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Births taking place abroad, but not usual resident abroad.</span></p><span data-dcnode-id="1425" instrument_node=""> </span></td><td data-dcnode-id="1418" valign="top"><span data-dcnode-id="1422" instrument_node=""> </span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Deaths taking place abroad&nbsp;but not usual resident abroad.</span></p><span data-dcnode-id="1419" instrument_node=""> </span></td><td data-dcnode-id="1412" valign="top"><span data-dcnode-id="1416" instrument_node=""> </span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Based on LFS and last population projection data.</span></p><span data-dcnode-id="1413" instrument_node=""> </span></td><td data-dcnode-id="1406" valign="top"><span data-dcnode-id="1410" instrument_node=""> </span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Based on LFS and last population projection&nbsp;data.</span></p><span data-dcnode-id="1407" instrument_node=""> </span></td></tr><tr data-dcnode-id="1364"><td data-dcnode-id="1396"><span data-dcnode-id="1401" instrument_node=""> </span><p align="left" data-dcnode-id="1398"><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">RS</span></strong></p><span data-dcnode-id="1397" instrument_node=""> </span></td><td data-dcnode-id="1390"><span data-dcnode-id="1394" instrument_node=""> </span><p align="left" data-dcnode-id="1392" style="text-align: justify;"><span data-dcnode-id="1393" instrument_node="">Due to lack of data on international migration, which should certainly be included in calculation of annual population estimates, it may be supposed that population estimates are not completely reliable data. But, the experience shows that population estimates from the intercensus period follows the trend of population.</span></p><span data-dcnode-id="1391" instrument_node=""> </span></td><td data-dcnode-id="1384"><span data-dcnode-id="1388" instrument_node=""> </span><p align="left" data-dcnode-id="1386" style="text-align: justify;"><span data-dcnode-id="1387" instrument_node="">Since the data on birth&nbsp;expressed in two surveys SORS (first results and data on birth), which means that each case is recorded in the survey First results and then processed in the framework of survey on birth, it is considered that the information on the final number of live births&nbsp;for the reference year is reliable and accurate.&nbsp;</span></p><span data-dcnode-id="1385" instrument_node=""> </span></td><td data-dcnode-id="1378"><span data-dcnode-id="1382" instrument_node=""> </span><p align="left" data-dcnode-id="1380" style="text-align: justify;"><span data-dcnode-id="1381" instrument_node="">Since the data on death&nbsp;expressed in two surveys SORS (first results and data on death), which means that each case is recorded in the survey First results and then processed in the framework of survey on death, it is considered that the information on the final number of&nbsp;deaths&nbsp;for the reference year is reliable and accurate.&nbsp;</span></p><span data-dcnode-id="1379" instrument_node=""> </span></td><td data-dcnode-id="1372" valign="bottom"><span data-dcnode-id="1376" instrument_node=""> </span><p align="left" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">&nbsp;Not available.</span></p><span data-dcnode-id="1373" instrument_node=""> </span></td><td data-dcnode-id="1366" valign="bottom"><span data-dcnode-id="1370" instrument_node=""> </span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">&nbsp;Not available.</span></p><span data-dcnode-id="1367" instrument_node=""> </span></td></tr><tr data-dcnode-id="1324"><td data-dcnode-id="1356"><span data-dcnode-id="1361" instrument_node=""> </span><p align="left" data-dcnode-id="1358"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">TR</span></strong></p><span data-dcnode-id="1357" instrument_node=""> </span></td><td data-dcnode-id="1350"><span data-dcnode-id="1354" instrument_node=""> </span><p align="left" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Not applicable</span></p><span data-dcnode-id="1351" instrument_node=""> </span></td><td data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node=""> </span><p align="left" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Not applicable</span></p><span data-dcnode-id="1345" instrument_node=""> </span></td><td data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node=""> </span><p align="left" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Not applicable</span></p><span data-dcnode-id="1339" instrument_node=""> </span></td><td data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node=""> </span><p align="left" data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Not applicable</span></p><span data-dcnode-id="1333" instrument_node=""> </span></td><td data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node=""> </span><p align="left" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Not applicable</span></p><span data-dcnode-id="1327" instrument_node=""> </span></td></tr></tbody></table></td></tr><tr data-dcnode-id="1310"><td class="Cl-Level2" data-dcnode-id="1312"><a data-dcnode-id="1314" name="sampling_err"></a><span data-dcnode-id="1313" instrument_node="">13.2. Sampling error</span></td></tr><tr data-dcnode-id="1303"><td class="Cl-Content" data-dcnode-id="1305"><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Not applicable.</span></p></td></tr><tr data-dcnode-id="1296"><td class="Cl-Level2" data-dcnode-id="1298"><a data-dcnode-id="1300" name="nonsampling_err"></a><span data-dcnode-id="1299" instrument_node="">13.3. Non-sampling error</span></td></tr><tr data-dcnode-id="1289"><td class="Cl-Content" data-dcnode-id="1291"><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Not applicable.</span></p></td></tr></tbody></table><span data-dcnode-id="1284" instrument_node="">

</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="1184" width="100%"><tbody data-dcnode-id="1186"><tr data-dcnode-id="1188"><td class="Cl-Level1-NoBorder" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">15. Coherence and comparability</span></td><td align="right" data-dcnode-id="1190"><a class="DocCommon" data-dcnode-id="1191" href="#"><span data-dcnode-id="1192" instrument_node="">Top</span></a></td></tr></tbody></table><span data-dcnode-id="1183" instrument_node=""> </span></td></tr><tr data-dcnode-id="1173"><td class="Cl-Level2" data-dcnode-id="1175"><a data-dcnode-id="1177" name="compar_geo"></a><span data-dcnode-id="1176" instrument_node="">15.1. Comparability - geographical</span></td></tr><tr data-dcnode-id="1166"><td class="Cl-Content" data-dcnode-id="1168"><p data-dcnode-id="1169" style="text-align: justify;"><span data-dcnode-id="1170" instrument_node="">The recommended definition of the 'population' for the statistics on population reported under Article 3 of the Regulation 1260/2013 and under Article 3 of the Regulation 862/2007 is the 'usually resident population' meaning all the persons having their usual residence in a Member State at the reference time. Where the circumstances described above cannot be established, 'usual residence' can be taken to mean the place of legal or registered residence.</span></p></td></tr><tr data-dcnode-id="1159"><td class="Cl-Level2" data-dcnode-id="1161"><a data-dcnode-id="1163" name="compar_time"></a><span data-dcnode-id="1162" instrument_node="">15.2. Comparability - over time</span></td></tr><tr data-dcnode-id="1094"><td class="Cl-Content" data-dcnode-id="1096"><p data-dcnode-id="1152" style="text-align: justify;"><span data-dcnode-id="1156" instrument_node="">Comparability over time could be disturbed by breaks in data series. The breaks in population series due to methodological, data processing changes or revisions in population counts reported by the countries are documented in Eurostat’s database with the flag </span><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">b</span></strong><span data-dcnode-id="1153" instrument_node=""> (break in series).</span></p><span data-dcnode-id="1151" instrument_node=""> </span><p data-dcnode-id="1145" style="text-align: justify;"><span data-dcnode-id="1150" instrument_node="">The population data for the year 2011 and after take into account the results of the latest population census (held in 2011). The time series of populations between the previous census and 2011 was revised by end 2013 by some of the countries, taking into account Eurostat’s recommendation (for more information about data revision per country, see also </span><strong data-dcnode-id="1147"><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">17. Data revision</span></em></strong><span data-dcnode-id="1146" instrument_node="">).</span></p><span data-dcnode-id="1144" instrument_node=""> </span><p align="left" data-dcnode-id="1139" style="text-align: justify;"><span data-dcnode-id="1143" instrument_node="">Over time there have been methodological and geographical changes for certain countries, see the </span><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">notes </span></strong><span data-dcnode-id="1140" instrument_node="">below:</span></p><span data-dcnode-id="1138" instrument_node="">
</span><ul data-dcnode-id="1097"><span data-dcnode-id="1137" instrument_node="">
</span><li data-dcnode-id="1135" style="text-align: justify;"><span data-dcnode-id="1136" instrument_node="">FX stands for Metropolitan France, including Corsica, excluding the overseas departments (DOM).</span></li><span data-dcnode-id="1134" instrument_node="">
</span><li data-dcnode-id="1132" style="text-align: justify;"><span data-dcnode-id="1133" instrument_node="">FR stands for the whole France, including the overseas departments (DOM). Data on Saint Barthelemey are excluded starting with 1.1.2012. Data on Mayotte are included starting with the statistics on vital events for the reference year 2014 and with the statistics on population on 1.1.2014.</span></li><span data-dcnode-id="1131" instrument_node="">
</span><li data-dcnode-id="1129" style="text-align: justify;"><span data-dcnode-id="1130" instrument_node="">The European geographical aggregates (EU, EA and EEA) include FX until 1997 and FR from 1998 on. This change is indicated by a flag b (break in series) in the EU statistics for 1998.</span></li><span data-dcnode-id="1128" instrument_node="">
</span><li data-dcnode-id="1126" style="text-align: justify;"><span data-dcnode-id="1127" instrument_node="">The time series for Germany (DE_TOT) refer to the Federal Republic within its frontiers after 3 October 1990.</span></li><span data-dcnode-id="1125" instrument_node="">
</span><li data-dcnode-id="1123" style="text-align: justify;"><span data-dcnode-id="1124" instrument_node="">Starting with 1.1.1975, data for Cyprus (CY) refer to the government-controlled area.</span></li><span data-dcnode-id="1122" instrument_node="">
</span><li data-dcnode-id="1120" style="text-align: justify;"><span data-dcnode-id="1121" instrument_node="">Up to 1.1.2000, population data for Malta (MT) refer to the Maltese population only while, starting with 2001, figures include also foreign residents. This is indicated by a flag b (break in series) in the figures for 2001.</span></li><span data-dcnode-id="1119" instrument_node="">
</span><li data-dcnode-id="1117" style="text-align: justify;"><span data-dcnode-id="1118" instrument_node="">Starting with 1.1.2010, the statistics on the permanent resident population of Switzerland (CH) includes all persons in the asylum process who have been residing in Switzerland since 12 months or more. The change appears in Eurostat population figures starting with population reported for 1.1.2011.</span></li><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1114" style="text-align: justify;"><span data-dcnode-id="1115" instrument_node="">Starting with 1.1.2010, Poland (PL) revised the methodology used&nbsp;to estimate the usually resident population. This is indicated by a flag b (break in series) in the figures for 2010.</span></li><span data-dcnode-id="1113" instrument_node="">
</span><li data-dcnode-id="1111" style="text-align: justify;"><span data-dcnode-id="1112" instrument_node="">Starting with 1.1.2011, Belgium (BE) population figures at national level refer to all registered persons including asylum seekers.</span></li><span data-dcnode-id="1110" instrument_node="">
</span><li data-dcnode-id="1108" style="text-align: justify;"><span data-dcnode-id="1109" instrument_node="">Starting with 1.1.2012, the reported Estonian (EE) population includes the migration component, whereas this was not included before.</span></li><span data-dcnode-id="1107" instrument_node="">
</span><li data-dcnode-id="1105" style="text-align: justify;"><span data-dcnode-id="1106" instrument_node="">Data for Georgia refer to the government-controlled area.</span></li><span data-dcnode-id="1104" instrument_node="">
</span><li data-dcnode-id="1102" style="text-align: justify;"><span data-dcnode-id="1103" instrument_node="">Data for Moldova refer to the government-controlled area.</span></li><span data-dcnode-id="1101" instrument_node="">
</span><li data-dcnode-id="1099" style="text-align: justify;"><span data-dcnode-id="1100" instrument_node="">Data for Ukraine exclude the illegally annexed Autonomous Republic of Crimea and the City of Sevastopol.</span></li><span data-dcnode-id="1098" instrument_node="">
</span></ul></td></tr><tr data-dcnode-id="1087"><td class="Cl-Level2" data-dcnode-id="1089"><a data-dcnode-id="1091" name="coher_x_dom"></a><span data-dcnode-id="1090" instrument_node="">15.3. Coherence - cross domain</span></td></tr><tr data-dcnode-id="1080"><td class="Cl-Content" data-dcnode-id="1082"><p data-dcnode-id="1083" style="text-align: justify;"><span data-dcnode-id="1084" instrument_node="">The population figures transmitted by the national statistical offices to Eurostat in the framework of Demography domain may differ from those available in other domains such us National Accounts, Labour Force Survey or in the survey on Income and Living Conditions. The difference is given by the population coverage (see metadata specific to each domain).</span></p></td></tr><tr data-dcnode-id="1073"><td class="Cl-Level2" data-dcnode-id="1075"><a data-dcnode-id="1077" name="coher_internal"></a><span data-dcnode-id="1076" instrument_node="">15.4. Coherence - internal</span></td></tr><tr data-dcnode-id="1063"><td class="Cl-Content" data-dcnode-id="1065"><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">See </span><strong data-dcnode-id="1067"><em data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">8.1. Release calendar.</span></em></strong></p></td></tr></tbody></table><span data-dcnode-id="1058" instrument_node="">

</span><ul data-dcnode-id="963"><span data-dcnode-id="973" instrument_node="">
</span><li data-dcnode-id="971" style="text-align: justify;"><span data-dcnode-id="972" instrument_node="">The policy of ESTAT is to make updates as soon as data is received and at any time during the year.</span></li><span data-dcnode-id="970" instrument_node="">
</span><li data-dcnode-id="965" style="text-align: justify;"><span data-dcnode-id="969" instrument_node="">In conformity with </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eur-lex.europa.eu/legal-content/EN/TXT/HTML/%3Furi%3DCELEX%3A32014R0205%26qid%3D1449066734185%26from%3DEN" target="_blank"><span data-dcnode-id="968" instrument_node="">Regulation (EC)&nbsp;No 205/2014</span></a><span data-dcnode-id="966" instrument_node="">&nbsp;Member States shall inform the Commission (Eurostat) of any planned revision of the data supplied no later than one week before the release of the revised data in the Member State concerned.</span></li><span data-dcnode-id="964" instrument_node="">
</span></ul></td></tr><tr data-dcnode-id="953"><td class="Cl-Level2" data-dcnode-id="955"><a data-dcnode-id="957" name="rev_practice"></a><span data-dcnode-id="956" instrument_node="">17.2. Data revision - practice</span></td></tr><tr data-dcnode-id="931"><td class="Cl-Content" data-dcnode-id="933"><p data-dcnode-id="949" style="text-align: justify;"><span data-dcnode-id="950" instrument_node="">Population statistics are revised on a continuous base according to the most recent data released and transmitted to Eurostat by the National Statistical Institutes. The geographical aggregates and the demographic indicators are accordingly revised.</span></p><span data-dcnode-id="948" instrument_node=""> </span><p data-dcnode-id="934" style="text-align: justify;"><span data-dcnode-id="947" instrument_node="">The status of the data is indicated by using flags (flag </span><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">p</span></strong><span data-dcnode-id="944" instrument_node=""> = provisional data; flag </span><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">e</span></strong><span data-dcnode-id="941" instrument_node=""> = estimated; flag </span><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">b</span></strong><span data-dcnode-id="938" instrument_node=""> = break in time series; flag </span><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">f</span></strong><span data-dcnode-id="935" instrument_node=""> = forecast).</span></p></td></tr></tbody></table><span data-dcnode-id="926" instrument_node="">

</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="899" width="100%"><tbody data-dcnode-id="901"><tr data-dcnode-id="903"><td class="Cl-Level1-NoBorder" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">18. Statistical processing</span></td><td align="right" data-dcnode-id="905"><a class="DocCommon" data-dcnode-id="906" href="#"><span data-dcnode-id="907" instrument_node="">Top</span></a></td></tr></tbody></table><span data-dcnode-id="898" instrument_node=""> </span></td></tr><tr data-dcnode-id="888"><td class="Cl-Level2" data-dcnode-id="890"><a data-dcnode-id="892" name="source_type"></a><span data-dcnode-id="891" instrument_node="">18.1. Source data</span></td></tr><tr data-dcnode-id="878"><td class="Cl-Content" data-dcnode-id="880"><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Demographic data are collected by Eurostat from the National Statistical Institutes.</span></p><span data-dcnode-id="883" instrument_node=""> </span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">For a summary of the national sources of data please see the countries' individual metadata files or the summary table in annex.</span></p></td></tr><tr data-dcnode-id="871"><td class="Cl-Level2" data-dcnode-id="873"><a data-dcnode-id="875" name="freq_coll"></a><span data-dcnode-id="874" instrument_node="">18.2. Frequency of data collection</span></td></tr><tr data-dcnode-id="864"><td class="Cl-Content" data-dcnode-id="866"><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Data are collected annualy.</span></p></td></tr><tr data-dcnode-id="857"><td class="Cl-Level2" data-dcnode-id="859"><a data-dcnode-id="861" name="coll_method"></a><span data-dcnode-id="860" instrument_node="">18.3. Data collection</span></td></tr><tr data-dcnode-id="850"><td class="Cl-Content" data-dcnode-id="852"><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">The annual demography data collections are carried out by Eurostat from the National Statistical Institutes in order to collect detailed updated data.</span></p></td></tr><tr data-dcnode-id="843"><td class="Cl-Level2" data-dcnode-id="845"><a data-dcnode-id="847" name="data_validation"></a><span data-dcnode-id="846" instrument_node="">18.4. Data validation</span></td></tr><tr data-dcnode-id="828"><td class="Cl-Content" data-dcnode-id="830"><p align="left" data-dcnode-id="839" style="text-align: justify;"><span data-dcnode-id="840" instrument_node="">Controls are carried out on raw data transmitted by the NSIs to check if the total of a variable is consistent with the breakdown by different variables. Consistencies between different breakdowns of the same variable are verified by cross validations.</span></p><span data-dcnode-id="838" instrument_node=""> </span><p align="left" data-dcnode-id="836" style="text-align: justify;"><span data-dcnode-id="837" instrument_node="">Based on the detailed collected data, Eurostat is computing a series of demographic statistics. The regular calculated demographic indicators are further submitted to several validations concerning the most updated annual value but also the available time series. These validations include checking on the plausibility of the most updated annual value and on two consecutive annual values. Mathematical verifications using standard deviation and weighted average are applied, for example for breakdowns of the life expectancy by educational attainment.</span></p><span data-dcnode-id="835" instrument_node=""> </span><p data-dcnode-id="831" style="text-align: justify;"><span data-dcnode-id="834" instrument_node="">For more information on data validation see: </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/eurostat/data/data-validation"><span data-dcnode-id="833" instrument_node="">http://ec.europa.eu/eurostat/data/data-validation</span></a></p></td></tr><tr data-dcnode-id="821"><td class="Cl-Level2" data-dcnode-id="823"><a data-dcnode-id="825" name="data_comp"></a><span data-dcnode-id="824" instrument_node="">18.5. Data compilation</span></td></tr><tr data-dcnode-id="807"><td class="Cl-Content" data-dcnode-id="809"><p data-dcnode-id="817" style="text-align: justify;"><span data-dcnode-id="818" instrument_node="">Based on the national detailed figures on population and other demographic events transmitted by the National Statistical Institutes, Eurostat derives/calculates demographic variables and geographical aggregates by applying common calculation method.</span></p><span data-dcnode-id="816" instrument_node=""> </span><p data-dcnode-id="813" style="text-align: justify;"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Geographical aggregation</span></strong></p><span data-dcnode-id="812" instrument_node=""> </span><p data-dcnode-id="810" style="text-align: justify;"><span data-dcnode-id="811" instrument_node="">For population data expressed in number, the geographical aggregation is done by arithmetical sum, when there are no missing values among the components of the respective geographical aggregate. Otherwise, they are not calculated.</span></p></td></tr><tr data-dcnode-id="800"><td class="Cl-Level2" data-dcnode-id="802"><a data-dcnode-id="804" name="adjustment"></a><span data-dcnode-id="803" instrument_node="">18.6. Adjustment</span></td></tr><tr data-dcnode-id="138"><td class="Cl-Content" data-dcnode-id="140"><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Eurostat collects its data from the National Statistical Institutes. The following adjustments are used by each country. For more information information&nbsp;please see the countries' individual metadata files.</span></p><span data-dcnode-id="795" instrument_node="">
