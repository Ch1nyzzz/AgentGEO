</span><h1 data-dcnode-id="4442" id="percent_width_70"><span data-dcnode-id="4445" instrument_node="">Berkeley Engineering’s </span><em data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></em></h1><span data-dcnode-id="4441" instrument_node="">
</span><div class="wp-block-media-text alignwide is-stacked-on-mobile is-vertically-aligned-center has-subtle-background-background-color has-background" data-dcnode-id="4426" style="grid-template-columns:29% auto"><figure class="wp-block-media-text__media" data-dcnode-id="4439"><img alt="" class="wp-image-346 size-medium" data-attachment-id="346" data-comments-opened="0" data-dcnode-id="4440" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="255485_CLS_21_Pantheon_Winner-1200×628-FB5-CROPPED" data-large-file="http://bayareateenscience.org/wp-content/uploads/2021/11/255485_CLS_21_Pantheon_Winner-1200x628-FB5-CROPPED.jpg" data-medium-file="http://bayareateenscience.org/wp-content/uploads/2021/11/255485_CLS_21_Pantheon_Winner-1200x628-FB5-CROPPED-300x241.jpg" data-orig-file="http://bayareateenscience.org/wp-content/uploads/2021/11/255485_CLS_21_Pantheon_Winner-1200x628-FB5-CROPPED.jpg" data-orig-size="781,627" data-permalink="http://bayareateenscience.org/home/255485_cls_21_pantheon_winner-1200x628-fb5-cropped/" height="241" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bayareateenscience.org/wp-content/uploads/2021/11/255485_CLS_21_Pantheon_Winner-1200x628-FB5-CROPPED-300x241.jpg&amp;raw" srcset="http://bayareateenscience.org/wp-content/uploads/2021/11/255485_CLS_21_Pantheon_Winner-1200x628-FB5-CROPPED-300x241.jpg 300w, http://bayareateenscience.org/wp-content/uploads/2021/11/255485_CLS_21_Pantheon_Winner-1200x628-FB5-CROPPED-768x617.jpg 768w, http://bayareateenscience.org/wp-content/uploads/2021/11/255485_CLS_21_Pantheon_Winner-1200x628-FB5-CROPPED.jpg 781w" width="300"></figure><div class="wp-block-media-text__content" data-dcnode-id="4427"><span data-dcnode-id="4438" instrument_node="">
</span><h2 data-dcnode-id="4435"><meta charset="utf-8" data-dcnode-id="4437"><span data-dcnode-id="4436" instrument_node="">B.A.T.S. is a Pantheon Award Winner!</span></h2><span data-dcnode-id="4434" instrument_node="">
</span><p data-dcnode-id="4429" style="font-size:1.25em"><span data-dcnode-id="4433" instrument_node="">We are honored that Bay Area Teen Science (B.A.T.S.) won California Life Sciences’ Pantheon 2021&nbsp;</span><a data-dcnode-id="4431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.califesciences.org/pantheon/" rel="noreferrer noopener"><span data-dcnode-id="4432" instrument_node="">Elizabeth Schar Inspiring Future Leaders Award</span></a><span data-dcnode-id="4430" instrument_node="">!</span></p><span data-dcnode-id="4428" instrument_node="">
</span></div></div><span data-dcnode-id="4425" instrument_node="">
</span><h2 data-dcnode-id="4423" id="percent_width_70"><span data-dcnode-id="4424" instrument_node="">Here’s What’s New!</span></h2><span data-dcnode-id="4422" instrument_node="">
</span><p data-dcnode-id="4411" id="percent_width_70"><span data-dcnode-id="4421" instrument_node="">Here are just some of the latest STEM opportunities awaiting Bay Area teens. Check out our&nbsp;</span><a data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bayareateenscience.org/for-teens-overview/"><span data-dcnode-id="4420" instrument_node="">For Teens</span></a><span data-dcnode-id="4418" instrument_node="">&nbsp;page for even more info, including upcoming STEM events held exclusively for Bay Area teens. Professionals who provide STEM opportunities for Bay Area teenage youth in afterschool or other out-of-school time settings should proceed to our&nbsp;</span><a data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bayareateenscience.org/for-providers-overview/"><span data-dcnode-id="4417" instrument_node="">For Providers</span></a><span data-dcnode-id="4415" instrument_node="">&nbsp;page. If you want to share your STEM activities and opportunities with us, send us a note via our&nbsp;</span><a data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bayareateenscience.org/contact/"><span data-dcnode-id="4414" instrument_node="">contact page</span></a><span data-dcnode-id="4412" instrument_node="">. We’d love to hear from you!</span></p><span data-dcnode-id="4410" instrument_node="">
</span><span data-dcnode-id="4408" instrument_node="">
</span><link data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.juicer.io/embed.css&amp;raw" media="all" rel="stylesheet" type="text/css"><span data-dcnode-id="4406" instrument_node="">

ed!</span></p></div><div class="j-meta" data-dcnode-id="4351"><ul data-dcnode-id="4354"><li data-dcnode-id="4358"><a aria-label="Comments" class="comments" data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5349938531703247" target="_blank"><span data-dcnode-id="4360" instrument_node="">1</span></a></li><li data-dcnode-id="4355"><a aria-label="Likes" class="likes" data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5349938531703247" target="_blank"><span data-dcnode-id="4357" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="4352"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="4353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5349938531703247" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="4302" data-id="455426248" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="4347" data-external-id="5339153282781772" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278661107_5339137962783304_614497190848531078_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=B0s7lC0IFjsAX_TAzJQ&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT975WyAePnypU2R8HNGnbul6z9olPcgtpQHaWshplBRVg&amp;oe=6267D184" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5339153282781772" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 4/15/22 at 4:26PM" class="" data-dcnode-id="4348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278661107_5339137962783304_614497190848531078_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D107%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DB0s7lC0IFjsAX_TAzJQ%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT975WyAePnypU2R8HNGnbul6z9olPcgtpQHaWshplBRVg%26oe%3D6267D184&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="4303"><div class="j-poster" data-dcnode-id="4340"><a data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="4346" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="4342" datetime="2022-04-15T16:26:13.000-07:00"><span data-dcnode-id="4343" instrument_node="">8d</span></time></a></div><div class="j-message" data-dcnode-id="4311"><p data-dcnode-id="4312"><img alt="📣" class="emoji" data-dcnode-id="4339" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f4e3.svg&amp;raw"><span data-dcnode-id="4338" instrument_node="">    Announcing the Lawrence Hall of Science's Science-Palooza on April 30!</span><br data-dcnode-id="4337"><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node="">Science at Cal - UC Berkeley and The Lawrence are hosting a full-blown SCIENCE-PALOOZA on the beautiful and spacious outdoor plaza of The Lawrence overlooking the Bay. This event will showcase 18 interactive and engaging STEM activities from UC Berkeley departments, student groups, scientists, artists, designers, and other partners. Come enjoy science demos, experiments, hands-on activities, meet-the-scientists booths, and more! Stay up to date as details arise on the event website: </span><a class="auto" data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scienceatcal.berkeley.edu/science-palooza-2022/" target="_blank"><span data-dcnode-id="4334" instrument_node="">https://scienceatcal.berkeley.edu/science-palooza-2022/</span></a><span data-dcnode-id="4332" instrument_node="">. Science-Palooza’s outdoor activities on the plaza are completely FREE and take place between 11 AM–2 PM.</span><br data-dcnode-id="4331"><br data-dcnode-id="4330"><span data-dcnode-id="4329" instrument_node="">Entry to Lawrence Hall of Science </span><br data-dcnode-id="4328"><span data-dcnode-id="4327" instrument_node="">Entrance to the museum will be offered between 10 AM–5 PM at a reduced $5 rate. The Lawrence Hall of Science offers free admission to anyone with a state-issued EBT card with valid photo ID, as well as up to five additional individuals. Indoor museum activities are subject to capacity limits, so reservations are required and can be made at </span><a class="auto" data-dcnode-id="4325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.lawrencehallofscience.org/overview/17586" target="_blank"><span data-dcnode-id="4326" instrument_node="">https://my.lawrencehallofscience.org/overview/17586</span></a><span data-dcnode-id="4324" instrument_node="">. If your group is larger than 24 individuals, please contact The Lawrence Registration Office by email at </span><a class="auto" data-dcnode-id="4322" href="mailto:lhsreg@berkeley.edu" target="_blank"><span data-dcnode-id="4323" instrument_node="">lhsreg@berkeley.edu</span></a><span data-dcnode-id="4321" instrument_node="">.</span><br data-dcnode-id="4320"><br data-dcnode-id="4319"><span data-dcnode-id="4318" instrument_node="">Transportation </span><br data-dcnode-id="4317"><span data-dcnode-id="4316" instrument_node="">The Lawrence will also be offering a free shuttle service all day with help from Yoots from Shattuck Avenue at Addison Street near the Downtown Berkeley BART directly up to The Lawrence starting at 9:30 AM every hour on the half hour and departing the Lawrence every hour on the hour starting at 10:00 AM. Paid parking is also available.</span><br data-dcnode-id="4315"><br data-dcnode-id="4314"><span data-dcnode-id="4313" instrument_node="">Science at Cal and The Lawrence will follow any and all county, city, and institutional COVID guidelines in place on event day, including masking, social distancing, and limiting consumption of food to outdoor areas.</span></p></div><div class="j-meta" data-dcnode-id="4304"><ul data-dcnode-id="4307"><li data-dcnode-id="4308"><a aria-label="Likes" class="likes" data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5339153282781772" target="_blank"><span data-dcnode-id="4310" instrument_node="">3</span></a></li></ul><nav data-dcnode-id="4305"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5339153282781772" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="4261" data-id="454580680" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="4300" data-external-id="5280865285277239" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277174070_5280153975348370_6784778642973959792_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=THTbAbBO1Y4AX-W8JPZ&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9LYwSZh_yWoQ2F85DEd3ismfDbT59szpGpbVS8qSXbrw&amp;oe=62673621" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280865285277239" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/24/22 at 8:00PM" class="" data-dcnode-id="4301" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277174070_5280153975348370_6784778642973959792_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DTHTbAbBO1Y4AX-W8JPZ%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9LYwSZh_yWoQ2F85DEd3ismfDbT59szpGpbVS8qSXbrw%26oe%3D62673621&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="4262"><div class="j-poster" data-dcnode-id="4293"><a data-dcnode-id="4294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="4299" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="4295" datetime="2022-03-24T20:00:04.000-07:00"><span data-dcnode-id="4296" instrument_node="">30d</span></time></a></div><div class="j-message" data-dcnode-id="4270"><p data-dcnode-id="4271"><span data-dcnode-id="4292" instrument_node="">Apply to be a 2022 GLOBE Youth Geoscientists Summer Intern! The Globe Youth Geoscientist (GYG) Program is a two-week paid summer internship that provides immersive environmental science research experiences and an opportunity to explore college and career pathways in STEM fields. Learn more and apply at </span><a class="auto" data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forms.gle/LHv7fzYL4HfihPur7" target="_blank"><span data-dcnode-id="4291" instrument_node="">https://forms.gle/LHv7fzYL4HfihPur7</span></a><br data-dcnode-id="4289"><br data-dcnode-id="4288"><span data-dcnode-id="4287" instrument_node="">**Interns will receive a $500 stipend at the conclusion of the program for their participation.**</span><br data-dcnode-id="4286"><br data-dcnode-id="4285"><span data-dcnode-id="4284" instrument_node="">Who should apply?</span><br data-dcnode-id="4283"><span data-dcnode-id="4282" instrument_node="">Current Juniors (11th graders) attending East Bay Public High Schools interested in experiencing field science investigations, preparing for the college application process, and who want to get a jump start on their senior/capstone project.</span><br data-dcnode-id="4281"><br data-dcnode-id="4280"><span data-dcnode-id="4279" instrument_node="">Application Procedures</span><br data-dcnode-id="4278"><span data-dcnode-id="4277" instrument_node="">Applications will be accepted on a rolling basis. Priority will be given to early applicants. Promising students will be invited to an online interview via Zoom. Successful applicants will have 7 days to commit to the program after being notified of acceptance.</span><br data-dcnode-id="4276"><br data-dcnode-id="4275"><span data-dcnode-id="4274" instrument_node="">Questions? Email Tracy Ostrom at </span><a class="auto" data-dcnode-id="4272" href="mailto:tostrom@berkeley.edu" target="_blank"><span data-dcnode-id="4273" instrument_node="">tostrom@berkeley.edu</span></a></p></div><div class="j-meta" data-dcnode-id="4263"><ul data-dcnode-id="4266"><li data-dcnode-id="4267"><a aria-label="Likes" class="likes" data-dcnode-id="4268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280865285277239" target="_blank"><span data-dcnode-id="4269" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="4264"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280865285277239" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="4243" data-id="454580682" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="4259" data-external-id="5280654768631624" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277176134_5280141855349582_4769361972572074797_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=b5cahNLyTIYAX9212IV&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-2KdNXwUIG2ZhOmobgHYK74XuS3oXn9wMYPlrzZXQhSg&amp;oe=6268C712" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280654768631624" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/24/22 at 6:00PM" class="" data-dcnode-id="4260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277176134_5280141855349582_4769361972572074797_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Db5cahNLyTIYAX9212IV%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-2KdNXwUIG2ZhOmobgHYK74XuS3oXn9wMYPlrzZXQhSg%26oe%3D6268C712&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="4244"><div class="j-poster" data-dcnode-id="4252"><a data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="4258" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="4254" datetime="2022-03-24T18:00:06.000-07:00"><span data-dcnode-id="4255" instrument_node="">30d</span></time></a></div><div class="j-message" data-dcnode-id="4249"><p data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">Wherever you are this summer, Kode With Klossy will be there, too. Applications for Kode With Klossy’s 2022 FREE two-week virtual &amp; in-person summer coding camps are now officially open! Programs are open to girls, gender nonconforming &amp; trans students ages 13-18, and involve intensive, comprehensive computer science curricula, designed to inspire the next generation of tech. Final application deadline is April 10th — head to kodewithklossy.com/apply for more information!</span></p></div><div class="j-meta" data-dcnode-id="4245"><ul data-dcnode-id="4248"></ul><nav data-dcnode-id="4246"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="4247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280654768631624" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="4186" data-id="454447788" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="4241" data-external-id="5273057339391367" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276321832_5272395692790865_1371734283398653896_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=104&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=VM1cKos5DFkAX8voXKm&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_hPWjzGSXe5leMFAo28gCzRZO9ml5VnceGy0GcGZl_Ig&amp;oe=6267290F" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5273057339391367" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/21/22 at 8:25PM" class="" data-dcnode-id="4242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276321832_5272395692790865_1371734283398653896_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DVM1cKos5DFkAX8voXKm%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_hPWjzGSXe5leMFAo28gCzRZO9ml5VnceGy0GcGZl_Ig%26oe%3D6267290F&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="4187"><div class="j-poster" data-dcnode-id="4234"><a data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="4240" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="4236" datetime="2022-03-21T20:25:02.000-07:00"><span data-dcnode-id="4237" instrument_node="">33d</span></time></a></div><div class="j-message" data-dcnode-id="4195"><p data-dcnode-id="4196"><span data-dcnode-id="4233" instrument_node="">Announcing an exciting in-person (!) opportunity for high school students to monitor harbor seals with The Marine Mammal Center  this Saturday! Register for this event today at </span><a class="auto" data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/stewardship-saturday" target="_blank"><span data-dcnode-id="4232" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/stewardship-saturday</span></a><br data-dcnode-id="4230"><br data-dcnode-id="4229"><span data-dcnode-id="4228" instrument_node="">*Must be fully vaccinated which is defined as both doses plus booster shot, against COVID-19. The Center is not able to accommodate any form of exemptions to this policy. Masks must be worn at all times during the program.*</span><br data-dcnode-id="4227"><br data-dcnode-id="4226"><span data-dcnode-id="4225" instrument_node="">Introduction to Harbor Seal Monitoring in Marin </span><br data-dcnode-id="4224"><br data-dcnode-id="4223"><span data-dcnode-id="4222" instrument_node="">Harbor seals occupy a special niche in the Bay Area as the most numerous and widespread marine mammal and the only marine mammal species that is considered a year-round resident. In fact, right here in our own backyard in Marin, we boast the highest concentration of harbor seals in mainland California so it comes as no surprise that they are also one of the most common patients cared for at The Marine Mammal Center.</span><br data-dcnode-id="4221"><br data-dcnode-id="4220"><span data-dcnode-id="4219" instrument_node="">Team up with The Marine Mammal Center and the National Park Service to learn about these amazing animals and contribute to long-term community science monitoring data. As you observe wild harbor seals at Point Bonita, you’ll learn and practice valuable survey skills and add to data sets that provide important insights into how factors like El Niño events, sea level rise, storm surges, changes in prey availability, and human activities can all affect these key coastal predators and influence the health of the larger marine ecosystem.</span><br data-dcnode-id="4218"><br data-dcnode-id="4217"><span data-dcnode-id="4216" instrument_node="">The Marine Mammal Center will also be providing a light lunch for participants.</span><br data-dcnode-id="4215"><br data-dcnode-id="4214"><span data-dcnode-id="4213" instrument_node="">When: March 26 from 11am-1pm or 1:30-3:30pm PST (choose one)</span><br data-dcnode-id="4212"><span data-dcnode-id="4211" instrument_node="">Where: Point Bonita (in Mill Valley, CA)</span><br data-dcnode-id="4210"><span data-dcnode-id="4209" instrument_node="">Cost: FREE</span><br data-dcnode-id="4208"><span data-dcnode-id="4207" instrument_node="">Please make sure to register before the event! (Registration link: </span><a class="auto" data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/stewardship-saturday" target="_blank"><span data-dcnode-id="4206" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/stewardship-saturday</span></a><span data-dcnode-id="4204" instrument_node="">)</span><br data-dcnode-id="4203"><br data-dcnode-id="4202"><span data-dcnode-id="4201" instrument_node="">~~</span><br data-dcnode-id="4200"><span data-dcnode-id="4199" instrument_node="">Looking for an opportunity to become more involved with the Center's work and make a real difference for the ocean and marine mammals you love? You're invited to join them for Stewardship Saturday, a program for high school students in grades 9-12. Learn more at </span><a class="auto" data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/stewardship-saturday" target="_blank"><span data-dcnode-id="4198" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/stewardship-saturday</span></a></p></div><div class="j-meta" data-dcnode-id="4188"><ul data-dcnode-id="4191"><li data-dcnode-id="4192"><a aria-label="Likes" class="likes" data-dcnode-id="4193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5273057339391367" target="_blank"><span data-dcnode-id="4194" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="4189"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5273057339391367" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="4124" data-id="454447791" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="4184" data-external-id="5272369399460161" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276993785_5272345256129242_3867261270871117396_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=103&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=5oX_ueym2c8AX_l0Abk&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_HWIoInmUOAxcSwYB8NZV3m1ksVabPhEdLBe1JqJzT8A&amp;oe=62679F41" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5272369399460161" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/21/22 at 1:21PM" class="" data-dcnode-id="4185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276993785_5272345256129242_3867261270871117396_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D103%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D5oX_ueym2c8AX_l0Abk%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_HWIoInmUOAxcSwYB8NZV3m1ksVabPhEdLBe1JqJzT8A%26oe%3D62679F41&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="4125"><div class="j-poster" data-dcnode-id="4177"><a data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="4183" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="4179" datetime="2022-03-21T13:21:31.000-07:00"><span data-dcnode-id="4180" instrument_node="">33d</span></time></a></div><div class="j-message" data-dcnode-id="4133"><p data-dcnode-id="4134"><span data-dcnode-id="4176" instrument_node="">Join the Kavli Institute for Particle Astrophysics and Cosmology for their upcoming lecture, "Switching on Stars at the Dawn of Time"! RSVP today at </span><a class="auto" data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/astronomy-lecture-switching-on-stars-registration-265746483887" target="_blank"><span data-dcnode-id="4175" instrument_node="">https://www.eventbrite.com/e/astronomy-lecture-switching-on-stars-registration-265746483887</span></a><span data-dcnode-id="4173" instrument_node="">. The lecture is open to all but recommended for high-school students, advanced middle-school students, and adults. In-person attendance may be available and will be communicated closer to the event date.</span><br data-dcnode-id="4172"><br data-dcnode-id="4171"><span data-dcnode-id="4170" instrument_node="">Public Astronomy Lecture - April 5 (Tuesday) at 7pm PDT</span><br data-dcnode-id="4169"><span data-dcnode-id="4168" instrument_node="">Title: Switching on Stars at the Dawn of Time</span><br data-dcnode-id="4167"><span data-dcnode-id="4166" instrument_node="">Speaker: Dr. Emma Chapman (University of Nottingham)</span><br data-dcnode-id="4165"><br data-dcnode-id="4164"><span data-dcnode-id="4163" instrument_node="">Let there be light - but where did that first light come from? Join this lecture to learn about the cosmic dawn and first stars!</span><br data-dcnode-id="4162"><br data-dcnode-id="4161"><span data-dcnode-id="4160" instrument_node="">Date: Tuesday, Apr. 5, 2022</span><br data-dcnode-id="4159"><span data-dcnode-id="4158" instrument_node="">Time:  7:00-8:00 PM PDT</span><br data-dcnode-id="4157"><span data-dcnode-id="4156" instrument_node="">Format: Virtual/Hybrid. The event URL can be found at the bottom of the EventBrite registration confirmation email. In-person attendance may be available and will be communicated closer to the event date.</span><br data-dcnode-id="4155"><br data-dcnode-id="4154"><span data-dcnode-id="4153" instrument_node="">In understanding how the Universe began and grew up, we find ourselves in the dark ages, both literally and figuratively. Empty of life and structure, space suddenly illuminated with the light of the first stars, as they roared to life 200 million years after the Big Bang. This time represents the start of the diverse and crowded cosmos we experience today… but there is a missing billion years in our understanding. What did these first stars look like? How are they different from our Sun, and are they now an extinct species? Dr. Emma Chapman has taken on the challenge of exploring the Era of the First Stars using radio telescopes and stellar archaeology. In this lecture, she will tell the story of these first, lonely, and gigantic stars. We will together find out how first stars enabled the creation of galaxies, planets, and even us.</span><br data-dcnode-id="4152"><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node="">Tickets: Free but RSVP is required: </span><a class="auto" data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/astronomy-lecture-switching-on-stars-registration-265746483887" target="_blank"><span data-dcnode-id="4149" instrument_node="">https://www.eventbrite.com/e/astronomy-lecture-switching-on-stars-registration-265746483887</span></a><span data-dcnode-id="4147" instrument_node=""> </span><br data-dcnode-id="4146"><span data-dcnode-id="4145" instrument_node="">(Note: school-district email addresses and other work emails with firewalls may block the EventBrite messages)</span><br data-dcnode-id="4144"><br data-dcnode-id="4143"><span data-dcnode-id="4142" instrument_node="">Questions? Email Dr. Xinnan Du at </span><a class="auto" data-dcnode-id="4140" href="mailto:xinnandu@stanford.edu" target="_blank"><span data-dcnode-id="4141" instrument_node="">xinnandu@stanford.edu</span></a><br data-dcnode-id="4139"><br data-dcnode-id="4138"><span data-dcnode-id="4137" instrument_node="">KIPAC website: </span><a class="auto" data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kipac.stanford.edu/discover" target="_blank"><span data-dcnode-id="4136" instrument_node="">https://kipac.stanford.edu/discover</span></a></p></div><div class="j-meta" data-dcnode-id="4126"><ul data-dcnode-id="4129"><li data-dcnode-id="4130"><a aria-label="Likes" class="likes" data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5272369399460161" target="_blank"><span data-dcnode-id="4132" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="4127"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5272369399460161" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="4058" data-id="454294106" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="4122" data-external-id="5262179117145856" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276134451_5262152273815207_3952335260957989481_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=77My1HKn8IoAX_S4TKO&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8zK355EZuMUtj6Ei4DtMG9wMxhPqUXUl4MMGMPFz4bLA&amp;oe=6267FF51" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5262179117145856" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/17/22 at 4:32PM" class="" data-dcnode-id="4123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276134451_5262152273815207_3952335260957989481_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D107%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D77My1HKn8IoAX_S4TKO%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8zK355EZuMUtj6Ei4DtMG9wMxhPqUXUl4MMGMPFz4bLA%26oe%3D6267FF51&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="4059"><div class="j-poster" data-dcnode-id="4115"><a data-dcnode-id="4116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="4121" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="4117" datetime="2022-03-17T16:32:05.000-07:00"><span data-dcnode-id="4118" instrument_node="">37d</span></time></a></div><div class="j-message" data-dcnode-id="4067"><p data-dcnode-id="4068"><span data-dcnode-id="4114" instrument_node="">Lakeshore Alternative Elementary School's 33rd Annual Science Fair needs your help! They are looking for organizations to host a demonstration/informational table on site for their community event on Tue. 3.22.22 from 5-7 PM to educate 500 children and their families! They also need about 15 volunteers to help with existing hands-on demonstrations. Interested? Email Lisa DeMattei at </span><a class="auto" data-dcnode-id="4112" href="mailto:lisad@lakeshoreelementary.org" target="_blank"><span data-dcnode-id="4113" instrument_node="">lisad@lakeshoreelementary.org</span></a><br data-dcnode-id="4111"><br data-dcnode-id="4110"><span data-dcnode-id="4109" instrument_node="">Event Details:</span><br data-dcnode-id="4108"><span data-dcnode-id="4107" instrument_node="">Tuesday, March 22nd 2022</span><br data-dcnode-id="4106"><br data-dcnode-id="4105"><span data-dcnode-id="4104" instrument_node="">School exhibits will be open from 9:30-4:00 PM</span><br data-dcnode-id="4103"><span data-dcnode-id="4102" instrument_node="">Community night will be held from 5:00-7:00 PM*</span><br data-dcnode-id="4101"><br data-dcnode-id="4100"><span data-dcnode-id="4099" instrument_node="">*Exhibitors are asked to present at this time, but you are welcome to table during the school day too.</span><br data-dcnode-id="4098"><br data-dcnode-id="4097"><span data-dcnode-id="4096" instrument_node="">Lakeshore Elementary School, San Francisco, CA 94132</span><br data-dcnode-id="4095"><br data-dcnode-id="4094"><span data-dcnode-id="4093" instrument_node="">This year’s science fair is in collaboration with the National PTA Bayer STEM + families initiative. This initiative is providing vital interpretation costs so our exhibits and activities can be accessible to all the diverse families of Lakeshore.</span><br data-dcnode-id="4092"><br data-dcnode-id="4091"><span data-dcnode-id="4090" instrument_node="">Benefits of Participating in our Science Fair Community Event:</span><br data-dcnode-id="4089"><span data-dcnode-id="4088" instrument_node="">Inclusion in our promotional materials to the school community</span><br data-dcnode-id="4087"><span data-dcnode-id="4086" instrument_node="">Mention in our school newsletter</span><br data-dcnode-id="4085"><span data-dcnode-id="4084" instrument_node="">Future opportunities to collaborate on STEM learning at our school</span><br data-dcnode-id="4083"><span data-dcnode-id="4082" instrument_node="">Opportunity to engage with families face to face (which has been challenging to do during this pandemic).</span><br data-dcnode-id="4081"><span data-dcnode-id="4080" instrument_node="">Engage multigenerational families who are looking for local programming, summer camps and enrichment</span><br data-dcnode-id="4079"><span data-dcnode-id="4078" instrument_node=""> </span><br data-dcnode-id="4077"><span data-dcnode-id="4076" instrument_node="">Why Support Lakeshore’s Science Fair?</span><br data-dcnode-id="4075"><span data-dcnode-id="4074" instrument_node="">Lakeshore Elementary is SFUSD’s most diverse elementary school and our families represent the socio-economic, regional and cultural diversity of San Francisco. Over 50% of our children are high need and families do not always have time to explore enrichment options outside of school networks. Your participation furthers our collective mission to foster and cultivate a love of STEM in a crucial time when young children either form strong affinities or disengage in science and math learning. FUN FACT:  Lakeshore Elementary has the longest running Science Fair tradition of any SF elementary school (that we know of) - this is their 33rd Annual Science Fair!</span><br data-dcnode-id="4073"><br data-dcnode-id="4072"><span data-dcnode-id="4071" instrument_node="">Interested? Email Lisa DeMattei at </span><a class="auto" data-dcnode-id="4069" href="mailto:lisad@lakeshoreelementary.org" target="_blank"><span data-dcnode-id="4070" instrument_node="">lisad@lakeshoreelementary.org</span></a></p></div><div class="j-meta" data-dcnode-id="4060"><ul data-dcnode-id="4063"><li data-dcnode-id="4064"><a aria-label="Likes" class="likes" data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5262179117145856" target="_blank"><span data-dcnode-id="4066" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="4061"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5262179117145856" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="4017" data-id="454249793" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="4056" data-external-id="5258712664159168" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276064836_5258708020826299_4768654924237837553_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=106&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=Md63sfM3P4MAX_feQ9i&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_DEyUZQn6SJ-Ri3XAXBWqQ9OOpXp5K-Ywkw09gfzlwvg&amp;oe=62674FE2" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5258712664159168" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/16/22 at 10:47AM" class="" data-dcnode-id="4057" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276064836_5258708020826299_4768654924237837553_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D106%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DMd63sfM3P4MAX_feQ9i%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_DEyUZQn6SJ-Ri3XAXBWqQ9OOpXp5K-Ywkw09gfzlwvg%26oe%3D62674FE2&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="4018"><div class="j-poster" data-dcnode-id="4049"><a data-dcnode-id="4050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="4055" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="4051" datetime="2022-03-16T10:47:35.000-07:00"><span data-dcnode-id="4052" instrument_node="">38d</span></time></a></div><div class="j-message" data-dcnode-id="4026"><p data-dcnode-id="4027"><span data-dcnode-id="4048" instrument_node="">Announcing the 2022 Teen Tech SF spring workshops! Starting March 27, TeenTechSF is offering (FREE!) weekly workshops on topics such as using tech to predict heart disease and creating your own portfolio website! Like all TeenTechSF events, the workshop series is FREE! Don't wait, register today at 2022-ttsf-springworkshops.eventbrite.com.</span><br data-dcnode-id="4047"><span data-dcnode-id="4046" instrument_node="">All workshops in this series are beginner-friendly, and accessibility features such as breakout rooms for assistance are provided to ensure everyone is able to master our tech concepts and further their own creations.</span><br data-dcnode-id="4045"><br data-dcnode-id="4044"><span data-dcnode-id="4043" instrument_node="">Workshops include the following topics and will take place on Sundays from 2 pm - 3 pm (PDT):</span><br data-dcnode-id="4042"><span data-dcnode-id="4041" instrument_node="">March 27: Intro to Web Development</span><br data-dcnode-id="4040"><span data-dcnode-id="4039" instrument_node="">April 3: Create a Multi-Page Portfolio Website</span><br data-dcnode-id="4038"><span data-dcnode-id="4037" instrument_node="">April 10th: Predicting Heart Disease with Machine Learning</span><br data-dcnode-id="4036"><span data-dcnode-id="4035" instrument_node="">April 17th: Java for Beginners</span><br data-dcnode-id="4034"><span data-dcnode-id="4033" instrument_node="">May 1st: Build a Calculator with Java</span><br data-dcnode-id="4032"><br data-dcnode-id="4031"><span data-dcnode-id="4030" instrument_node="">~~</span><br data-dcnode-id="4029"><span data-dcnode-id="4028" instrument_node="">TeenTechSF is run by and for teens – Find out more about Who We Are and What We Do at TeenTechSF.org and fill out tinyurl.com/TTSFLeadershipInterest if you’d like to join the TeenTechSF student leadership team!</span></p></div><div class="j-meta" data-dcnode-id="4019"><ul data-dcnode-id="4022"><li data-dcnode-id="4023"><a aria-label="Likes" class="likes" data-dcnode-id="4024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5258712664159168" target="_blank"><span data-dcnode-id="4025" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="4020"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="4021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5258712664159168" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3975" data-id="454042735" data-source="facebook" style="margin-bot d</span></time></a></div><div class="j-message" data-dcnode-id="3984"><p data-dcnode-id="3985"><span data-dcnode-id="4007" instrument_node="">The Exploratorium is accepting applications for its High School Explainer program! The application is available here: </span><a class="auto" data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exploratorium.applytojob.com/apply/wkdoI5kzjl/High-School-Explainer%3Freferrer%3D20220309160454SNKGDSXFFA9SKWEO" target="_blank"><span data-dcnode-id="4006" instrument_node="">https://exploratorium.applytojob.com/apply/wkdoI5kzjl/High-School-Explainer?referrer=20220309160454SNKGDSXFFA9SKWEO</span></a><br data-dcnode-id="4004"><span data-dcnode-id="4003" instrument_node="">Learn more about the program here: </span><a class="auto" data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//explainers.exploratorium.edu/highschool/" target="_blank"><span data-dcnode-id="4002" instrument_node="">https://explainers.exploratorium.edu/highschool/</span></a><br data-dcnode-id="4000"><br data-dcnode-id="3999"><span data-dcnode-id="3998" instrument_node="">The Summer session will run from June 18th-September 10th, 2022. Youth must be able to attend all mandatory trainings on May 28, May 29, June 4th, and June 5th to be considered. (An exception can be made if there is a valid reason why a student cannot make one of the trainings.) </span><br data-dcnode-id="3997"><br data-dcnode-id="3996"><span data-dcnode-id="3995" instrument_node="">This is a paid position ($17.34/hr). </span><br data-dcnode-id="3994"><br data-dcnode-id="3993"><span data-dcnode-id="3992" instrument_node="">To be eligible:</span><br data-dcnode-id="3991"><span data-dcnode-id="3990" instrument_node="">Candidates must be high school aged students (including students in traditional and alternate post-high school programs – between the ages of 15 and 18 for first time Explainers, and up to the age of 20 for returning Explainers.)</span><br data-dcnode-id="3989"><span data-dcnode-id="3988" instrument_node="">Must be able to obtain a valid work permit.</span><br data-dcnode-id="3987"><span data-dcnode-id="3986" instrument_node="">Must be able to attend all basic training dates</span></p></div><div class="j-meta" data-dcnode-id="3977"><ul data-dcnode-id="3980"><li data-dcnode-id="3981"><a aria-label="Likes" class="likes" data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5245904302106671" target="_blank"><span data-dcnode-id="3983" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3978"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5245904302106671" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="3961" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3973" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-08.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="3974" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-about-08.svg&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3962"><div class="j-poster" data-dcnode-id="3968"><a data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Profile image for Juicer" data-dcnode-id="3972" data-poster-id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/logo-without-text.svg&amp;raw"><h3 data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">Juicer</span></h3></a></div><div class="j-message" data-dcnode-id="3963"><span data-dcnode-id="3967" instrument_node="">Engage your users on social media with a </span><a data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science"><span data-dcnode-id="3966" instrument_node="">Juicer.io</span></a><span data-dcnode-id="3964" instrument_node=""> feed on your website or blog for free.</span></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3918" data-id="453866186" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3959" data-external-id="5234876703209431" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275382435_5234869119876856_7524821086187098025_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=Odmod_BLCuAAX9KlLws&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_hCwyGx0oh3RDkw6odwq27sSlpq-7qVi8_ZJdc7XCSNQ&amp;oe=62676A49" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5234876703209431" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/7/22 at 3:06PM" class="" data-dcnode-id="3960" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275382435_5234869119876856_7524821086187098025_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DOdmod_BLCuAAX9KlLws%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_hCwyGx0oh3RDkw6odwq27sSlpq-7qVi8_ZJdc7XCSNQ%26oe%3D62676A49&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3919"><div class="j-poster" data-dcnode-id="3952"><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3958" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3954" datetime="2022-03-07T15:06:46.000-08:00"><span data-dcnode-id="3955" instrument_node="">47d</span></time></a></div><div class="j-message" data-dcnode-id="3927"><p data-dcnode-id="3928"><span data-dcnode-id="3951" instrument_node="">Announcing an exciting event from The Tech Interactive and the Geena Davis Institute on Gender in Media ! </span><br data-dcnode-id="3950"><br data-dcnode-id="3949"><span data-dcnode-id="3948" instrument_node="">Inspiration and Exploration: STEM Career Expo for Grades 8-12</span><br data-dcnode-id="3947"><span data-dcnode-id="3946" instrument_node="">Saturday, March 12 at noon</span><br data-dcnode-id="3945"><span data-dcnode-id="3944" instrument_node="">Register Here: </span><a class="auto" data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.surveymonkey.com/r/STEM-Expo" target="_blank"><span data-dcnode-id="3943" instrument_node="">https://www.surveymonkey.com/r/STEM-Expo</span></a><span data-dcnode-id="3941" instrument_node=""> </span><br data-dcnode-id="3940"><br data-dcnode-id="3939"><span data-dcnode-id="3938" instrument_node="">During this virtual event, you’ll hear from accomplished, inspiring women in environmental science, computer science, health care and medicine. They’ll share tips on how to get into these fields, tell you a little about what their jobs are really like and provide advice for navigating the college and early career years. </span><br data-dcnode-id="3937"><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">Then, you’ll join a breakout room of your choice, featuring organizations that have opportunities open to students right now! </span><br data-dcnode-id="3934"><br data-dcnode-id="3933"><span data-dcnode-id="3932" instrument_node="">Oscar-winner Geena Davis will also be sharing the fascinating research her organization has done to highlight the importance of female role models in the media — and how those may have affected your perceptions of STEM.</span><br data-dcnode-id="3931"><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">This event is designed for young women and non-binary students in high school, but all teens interested in STEM inclusivity are welcome.</span></p></div><div class="j-meta" data-dcnode-id="3920"><ul data-dcnode-id="3923"><li data-dcnode-id="3924"><a aria-label="Likes" class="likes" data-dcnode-id="3925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5234876703209431" target="_blank"><span data-dcnode-id="3926" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3921"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5234876703209431" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3869" data-id="453679351" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3916" data-external-id="5221724137858021" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275059801_5220854984611603_2119468425150576535_n.png?stp=dst-png_p720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=Q4qV09q3zPkAX8FwWEl&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-hsMcvFjhQg-sTnGbWlyO52nU8DH_dNkK6jjZkqw-Chg&amp;oe=626859EB" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5221724137858021" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/2/22 at 9:00PM" class="" data-dcnode-id="3917" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275059801_5220854984611603_2119468425150576535_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DQ4qV09q3zPkAX8FwWEl%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-hsMcvFjhQg-sTnGbWlyO52nU8DH_dNkK6jjZkqw-Chg%26oe%3D626859EB&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3870"><div class="j-poster" data-dcnode-id="3909"><a data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3915" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3911" datetime="2022-03-02T21:00:02.000-08:00"><span data-dcnode-id="3912" instrument_node="">52d</span></time></a></div><div class="j-message" data-dcnode-id="3875"><p data-dcnode-id="3876"><span data-dcnode-id="3908" instrument_node="">Join Science at Cal - UC Berkeley for their next lecture, Language Development Across Communities and Cultures! Register at </span><a class="auto" data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/language-development-across-communities-and-cultures-registration-272431418707" target="_blank"><span data-dcnode-id="3907" instrument_node="">https://www.eventbrite.com/e/language-development-across-communities-and-cultures-registration-272431418707</span></a><span data-dcnode-id="3905" instrument_node="">. Like all of Science at Cal's events, this event is free and open to all ages.</span><br data-dcnode-id="3904"><br data-dcnode-id="3903"><span data-dcnode-id="3902" instrument_node="">*Registration is required!*</span><br data-dcnode-id="3901"><span data-dcnode-id="3900" instrument_node="">This is an in-person event. In order to maintain capacity limits, registration will be required. Please bring a copy of your Eventbrite ticket to the event.</span><br data-dcnode-id="3899"><br data-dcnode-id="3898"><span data-dcnode-id="3897" instrument_node="">Sat, March 12, 2022 | 11:00 AM–12:15 PM (PT)</span><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node=""> Doors open at 10:45 AM</span><br data-dcnode-id="3894"><img alt="📍" class="emoji" data-dcnode-id="3893" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f4cd.svg&amp;raw"><span data-dcnode-id="3892" instrument_node="">   Genetics &amp; Plant Biology Bldg, Room 100 | UC Berkeley Campus</span><br data-dcnode-id="3891"><br data-dcnode-id="3890"><span data-dcnode-id="3889" instrument_node="">In this talk, Dr. Mahesh Srinivasan will present recent work from his lab that challenges two broad claims within the field of developmental science: First, that there are “optimal” methods for speaking to one’s child; and second, that parents from lower socioeconomic-status backgrounds sometimes lack knowledge of these methods, thus warranting parenting training. He will begin by presenting studies that address whether the experience of poverty itself—above and beyond factors like parenting knowledge—may suppress parents’ speech to their children. His findings suggest that financial scarcity may impact how anybody would speak to their child, motivating the need for policies that address systemic inequities. Then, he will discuss research which assesses children’s ability to learn from overheard speech (ambient speech that is not directed to a child), which is a main form of children’s early experience with language in many communities around the world. His findings suggest that children can learn from overheard speech, and may not need to be spoken to often in order to learn words on a “normal” timeline. </span><br data-dcnode-id="3888"><br data-dcnode-id="3887"><span data-dcnode-id="3886" instrument_node="">Visit </span><a class="auto" data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//events.berkeley.edu/index.php/calendar/sn/SciatCal.html%3Fevent_ID%3D143956%26date%3D2022-03-12" target="_blank"><span data-dcnode-id="3885" instrument_node="">https://events.berkeley.edu/index.php/calendar/sn/SciatCal.html?event_ID=143956&amp;date=2022-03-12</span></a><span data-dcnode-id="3883" instrument_node=""> for more information.</span><br data-dcnode-id="3882"><br data-dcnode-id="3881"><span data-dcnode-id="3880" instrument_node="">Science at Cal will follow any and all University and City of Berkeley COVID-19 guidelines at the time of the event. Masks and social distancing will be required. Please review UC Berkeley's guide to acceptable face coverings (</span><a class="auto" data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//coronavirus.berkeley.edu/face-coverings/" target="_blank"><span data-dcnode-id="3879" instrument_node="">https://coronavirus.berkeley.edu/face-coverings/</span></a><span data-dcnode-id="3877" instrument_node="">).</span></p></div><div class="j-meta" data-dcnode-id="3871"><ul data-dcnode-id="3874"></ul><nav data-dcnode-id="3872"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5221724137858021" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3833" data-id="453679354" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3867" data-external-id="5220869024610199" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275067790_5220807447949690_6577524082067511097_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=111&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=prZO_HfSF6wAX_MvRKO&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9KblV1yrI3iAEXOJ4KpW3CNM9mYoipfYnjgsFAkLtKow&amp;oe=62687AAD" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220869024610199" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/2/22 at 1:45PM" class="" data-dcnode-id="3868" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275067790_5220807447949690_6577524082067511097_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D111%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DprZO_HfSF6wAX_MvRKO%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9KblV1yrI3iAEXOJ4KpW3CNM9mYoipfYnjgsFAkLtKow%26oe%3D62687AAD&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3834"><div class="j-poster" data-dcnode-id="3860"><a data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3866" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3862" datetime="2022-03-02T13:45:01.000-08:00"><span data-dcnode-id="3863" instrument_node="">52d</span></time></a></div><div class="j-message" data-dcnode-id="3842"><p data-dcnode-id="3843"><span data-dcnode-id="3859" instrument_node="">Applications are OPEN for Berkeley Lab K-12 STEM's high school summer programs! Learn more at </span><a class="auto" data-dcnode-id="3857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k12education.lbl.gov/programs/high-school" target="_blank"><span data-dcnode-id="3858" instrument_node="">https://k12education.lbl.gov/programs/high-school</span></a><span data-dcnode-id="3856" instrument_node=""> and register for their information session on March 12 at </span><a class="auto" data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lbnl.zoom.us/meeting/register/tJ0oc-CvrDktGta_-LUfBcFU5BLpDGd52Wfw" target="_blank"><span data-dcnode-id="3855" instrument_node="">https://lbnl.zoom.us/meeting/register/tJ0oc-CvrDktGta_-LUfBcFU5BLpDGd52Wfw</span></a><span data-dcnode-id="3853" instrument_node="">.</span><br data-dcnode-id="3852"><br data-dcnode-id="3851"><span data-dcnode-id="3850" instrument_node="">BLDAP (in-person/ 35 hours per week) - The Berkeley Lab Director’s Apprenticeship Program (BLDAP) is a project-based high school STEM (Science Technology Engineering Mathematics) program designed to help participants develop 21st century skills, learn about Berkeley Lab’s research activities, receive college and career guidance, and develop a STEM network in a real-life work environment. BLDAP is a paid opportunity from mid June - July. </span><br data-dcnode-id="3849"><br data-dcnode-id="3848"><span data-dcnode-id="3847" instrument_node="">EinR (virtual) - Experiences in Research (EinR) is a virtual internship program for high school students to gain hands-on experience with professionals at Berkeley Lab. Students spend six weeks over summer remotely working directly on cutting edge projects alongside experts in STEM and STEM adjacent careers. Projects are focused around different aspects of STEM professions such as administration, science communication, data science, experimental research, and more. EinR is a paid opportunity from mid June - July. </span><br data-dcnode-id="3846"><br data-dcnode-id="3845"><span data-dcnode-id="3844" instrument_node="">SAGE (in-person) - Science Accelerating Girls' Engagement in STEM (SAGE) is a one-week summer camp for public high school students (age 14-17) hosted by National Laboratory scientists and engineers to share what life is like in STEM professions. Throughout the week, students will participate in job shadowing, hands-on projects, professional development, and more! This is a FREE program during the first week of August. All meals and equipment will be provided.</span></p></div><div class="j-meta" data-dcnode-id="3835"><ul data-dcnode-id="3838"><li data-dcnode-id="3839"><a aria-label="Likes" class="likes" data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220869024610199" target="_blank"><span data-dcnode-id="3841" instrument_node="">3</span></a></li></ul><nav data-dcnode-id="3836"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220869024610199" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3810" data-id="453679356" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3831" data-external-id="5220784394618662" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275100809_5218210448209390_4951301884225423934_n.png?stp=dst-png_s720x720&amp;_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=2gFO98I6nywAX9FV-c1&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9Er32QRGkK61fy8PHxxpZI3f78Vaids_nmDGIYonGBDA&amp;oe=6268EBA4" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220784394618662" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/2/22 at 1:08PM" class="" data-dcnode-id="3832" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275100809_5218210448209390_4951301884225423934_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D107%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D2gFO98I6nywAX9FV-c1%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9Er32QRGkK61fy8PHxxpZI3f78Vaids_nmDGIYonGBDA%26oe%3D6268EBA4&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3811"><div class="j-poster" data-dcnode-id="3824"><a data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3830" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3826" datetime="2022-03-02T13:08:37.000-08:00"><span data-dcnode-id="3827" instrument_node="">52d</span></time></a></div><div class="j-message" data-dcnode-id="3819"><p data-dcnode-id="3820"><span data-dcnode-id="3823" instrument_node="">Have you heard? The Bay Area Science Festival will be taking place April 21st-30th. Join — in person(!) — for Discovery Days, maker events, live panels, explorer tours, games, and so much more for all ages! Mark your calendars: this year’s festival is one that you won’t want to miss. Learn more at </span><a class="auto" data-dcnode-id="3821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bayareasciencefestival.org/" target="_blank"><span data-dcnode-id="3822" instrument_node="">https://www.bayareasciencefestival.org/</span></a></p></div><div class="j-meta" data-dcnode-id="3812"><ul data-dcnode-id="3815"><li data-dcnode-id="3816"><a aria-label="Likes" class="likes" data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220784394618662" target="_blank"><span data-dcnode-id="3818" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3813"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220784394618662" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3760" data-id="453394491" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3808" data-external-id="5200959469934488" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274603174_5200464276650674_6614926335928680651_n.jpg?_nc_cat=105&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=5GCME2Qgj3MAX_CyGBO&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-pviDGX-QyMTiGVcSXl_EjlVq_f0dYwI5hzLX-HG5Tpg&amp;oe=62678E5D" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5200959469934488" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/23/22 at 3:05PM" class="" data-dcnode-id="3809" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274603174_5200464276650674_6614926335928680651_n.jpg%3F_nc_cat%3D105%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D5GCME2Qgj3MAX_CyGBO%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-pviDGX-QyMTiGVcSXl_EjlVq_f0dYwI5hzLX-HG5Tpg%26oe%3D62678E5D&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3761"><div class="j-poster" data-dcnode-id="3801"><a data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3807" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3803" datetime="2022-02-23T15:05:16.000-08:00"><span data-dcnode-id="3804" instrument_node="">59d</span></time></a></div><div class="j-message" data-dcnode-id="3769"><p data-dcnode-id="3770"><span data-dcnode-id="3800" instrument_node="">Attention high school students! Want to spend your summer break making a positive impact on the ocean? Now is the time to start thinking about and applying for summer opportunities at The Marine Mammal Center. Join them this Saturday to learn about upcoming programs at the Center, hear from other youth about their volunteer experiences and explore new resources to help you pursue the right opportunity for you. Learn more and register at </span><a class="auto" data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/stewardship-saturday" target="_blank"><span data-dcnode-id="3799" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/stewardship-saturday</span></a><span data-dcnode-id="3797" instrument_node=""> </span><br data-dcnode-id="3796"><br data-dcnode-id="3795"><span data-dcnode-id="3794" instrument_node="">Upcoming Stewardship Saturday event</span><br data-dcnode-id="3793"><span data-dcnode-id="3792" instrument_node="">Theme: Summer Volunteer Opportunities</span><br data-dcnode-id="3791"><span data-dcnode-id="3790" instrument_node="">When: February 26 from 10:30-noon PST (please plan to attend for the full event)</span><br data-dcnode-id="3789"><span data-dcnode-id="3788" instrument_node="">Where: Online via Zoom (register to get your Zoom link)</span><br data-dcnode-id="3787"><span data-dcnode-id="3786" instrument_node="">Cost: FREE</span><br data-dcnode-id="3785"><span data-dcnode-id="3784" instrument_node="">Please make sure to register before the event!</span><br data-dcnode-id="3783"><br data-dcnode-id="3782"><span data-dcnode-id="3781" instrument_node="">~~~</span><br data-dcnode-id="3780"><span data-dcnode-id="3779" instrument_node="">More information about Stewardship Saturday:</span><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node="">Looking for an opportunity to become more involved with the Center's work and make a real difference for the ocean and marine mammals you love? You're invited to join the Center for Stewardship Saturday, a program for high school students in grades 9-12.</span><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node="">Sign up now for these FREE learning opportunities held on the last Saturday of every month with rotating themes exploring the science of the Center, shadowing researchers and veterinarians, creating action projects and more.</span><br data-dcnode-id="3774"><span data-dcnode-id="3773" instrument_node="">You can join for one event or attend monthly, at no cost and with no commitment. All events will include the opportunity to learn more about ocean conservation and how to start taking action now. Learn more at </span><a class="auto" data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/stewardship-saturday" target="_blank"><span data-dcnode-id="3772" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/stewardship-saturday</span></a></p></div><div class="j-meta" data-dcnode-id="3762"><ul data-dcnode-id="3765"><li data-dcnode-id="3766"><a aria-label="Likes" class="likes" data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5200959469934488" target="_blank"><span data-dcnode-id="3768" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3763"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5200959469934488" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3702" data-id="453129452" data-source="facebook" style="margin-bottom: 0px; zoom:
