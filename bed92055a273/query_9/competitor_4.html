S.) at 1/13/22 at 2:53PM" class="" data-dcnode-id="716" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271850910_5049023105128126_5946559201096392730_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dy9-IjdpNNLMAX_EWIIe%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9rSbFTwtQVDZ9a0jQFjHXQ_YlMjEVo6a5WbNmkzgr03g%26oe%3D6267DE47&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="694"><div class="j-poster" data-dcnode-id="708"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="714" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="710" datetime="2022-01-13T14:53:23.000-08:00"><span data-dcnode-id="711" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="702"><p data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">Attention high school students -- are you looking for volunteer opportunities? Oakland Strokes Rowing Club is looking for volunteers to lead middle school STEM activities on Wednesday afternoons for their STEM to Stern program. Interested? Sign up at </span><a class="auto" data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/spreadsheets/d/1now-rcOm9CJifIIgKbAURgTOf291tTj57awzvTAXBo8/edit%3Fusp%3Dsharing" target="_blank"><span data-dcnode-id="706" instrument_node="">https://docs.google.com/spreadsheets/d/1now-rcOm9CJifIIgKbAURgTOf291tTj57awzvTAXBo8/edit?usp=sharing</span></a><span data-dcnode-id="704" instrument_node="">   Questions? See attached flyer for contact details.</span></p></div><div class="j-meta" data-dcnode-id="695"><ul data-dcnode-id="698"><li data-dcnode-id="699"><a aria-label="Likes" class="likes" data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5049333555097081" target="_blank"><span data-dcnode-id="701" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="696"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5049333555097081" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="664" data-id="451000907" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="691" data-external-id="4954653054565132" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/269451516_4954637401233364_4265622373607381744_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=106&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=DAOem_LoP6wAX-bUdvO&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_qxfqlPWD7dRiSbM__iszHuIuf67Zm5b3VyRhDuYuDIQ&amp;oe=62674B7E" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4954653054565132" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/18/21 at 11:16AM" class="" data-dcnode-id="692" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/269451516_4954637401233364_4265622373607381744_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D106%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DDAOem_LoP6wAX-bUdvO%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_qxfqlPWD7dRiSbM__iszHuIuf67Zm5b3VyRhDuYuDIQ%26oe%3D62674B7E&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="665"><div class="j-poster" data-dcnode-id="684"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="690" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="686" datetime="2021-12-18T11:16:28.000-08:00"><span data-dcnode-id="687" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="670"><p data-dcnode-id="671"><span data-dcnode-id="683" instrument_node="">Announcing a fantastic new (FREE!) program! Berkeley Lab K-12 STEM is launching a Spanish-English Bilingual STEM camp (April 7-9, 2022) called SeA @ Berkeley Lab! This camp is for English learning/Spanish-English bilingual students who are interested in learning more about STEM and career opportunities at Berkeley Lab. Learn more at </span><a class="auto" data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bit.ly/sea-stem" target="_blank"><span data-dcnode-id="682" instrument_node="">http://bit.ly/sea-stem</span></a><br data-dcnode-id="680"><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">Applications open January 5 and are due by February 5. You can fill out the interest form the program website to receive updates about the camp and the application. </span><br data-dcnode-id="677"><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">This program is FREE and open to students in grades 9-12. 10th and 11th graders are especially encouraged to apply. Currently SeA is expected to be a hybrid program, starting online on April 7, then moving on-site at Berkeley Lab and UC Berkeley on the 8th and 9th, respectively. </span><br data-dcnode-id="674"><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">Activities include tours of  Berkeley Lab facilities, career talks with scientists, and workshops both at Berkeley Lab and UC Berkeley. These events will be in English and Spanish. Participating in SEA can also move a step closer toward a summer internship at Berkeley Lab.</span></p></div><div class="j-meta" data-dcnode-id="666"><ul data-dcnode-id="669"></ul><nav data-dcnode-id="667"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4954653054565132" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="637" data-id="450683407" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="662" data-external-id="4916403748390063" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/265595810_4913205418709896_2602336370929939934_n.jpg?_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=pH3nkTa7KugAX8kpqgb&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8aNzcVa6R0DLmgowq-KO2sb6FPCZfF0HAP-jwEoFJsfw&amp;oe=6268358A" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4916403748390063" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/8/21 at 11:35AM" class="" data-dcnode-id="663" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/265595810_4913205418709896_2602336370929939934_n.jpg%3F_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DpH3nkTa7KugAX8kpqgb%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8aNzcVa6R0DLmgowq-KO2sb6FPCZfF0HAP-jwEoFJsfw%26oe%3D6268358A&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="638"><div class="j-poster" data-dcnode-id="655"><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="661" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="657" datetime="2021-12-08T11:35:12.000-08:00"><span data-dcnode-id="658" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="643"><p data-dcnode-id="644"><span data-dcnode-id="654" instrument_node="">Did you know that it's Computer Science Education Week? There are so many ways to celebrate! You can learn about tech careers through @itsbeyondgames's interactive chat experience at </span><a class="auto" data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learnbeyond.io/" target="_blank"><span data-dcnode-id="653" instrument_node="">https://www.learnbeyond.io/</span></a><span data-dcnode-id="651" instrument_node="">. Or, try out Code.org's activities for teens at </span><a class="auto" data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//code.org/student/middle-high" target="_blank"><span data-dcnode-id="650" instrument_node="">https://code.org/student/middle-high</span></a><span data-dcnode-id="648" instrument_node="">. Or, explore the dozens of activities that NASA - National Aeronautics and Space Administration  offers at </span><a class="auto" data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/audience/foreducators/computer-science-educational-resources.html" target="_blank"><span data-dcnode-id="647" instrument_node="">https://www.nasa.gov/audience/foreducators/computer-science-educational-resources.html</span></a><span data-dcnode-id="645" instrument_node="">.</span></p></div><div class="j-meta" data-dcnode-id="639"><ul data-dcnode-id="642"></ul><nav data-dcnode-id="640"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4916403748390063" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="596" data-id="450610743" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="635" data-external-id="4910049212358850" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/264772000_4909781629052275_6923051662705451847_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=109&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=7l6v-LirixMAX9sCSco&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-6SCp44nexmqEIc-h2cxFG_ehH2eLV2T8lWlayLo8XbA&amp;oe=62687D37" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4910049212358850" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/6/21 at 4:36PM" class="" data-dcnode-id="636" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/264772000_4909781629052275_6923051662705451847_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D109%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D7l6v-LirixMAX9sCSco%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-6SCp44nexmqEIc-h2cxFG_ehH2eLV2T8lWlayLo8XbA%26oe%3D62687D37&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="597"><div class="j-poster" data-dcnode-id="628"><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="634" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="630" datetime="2021-12-06T16:36:32.000-08:00"><span data-dcnode-id="631" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="605"><p data-dcnode-id="606"><span data-dcnode-id="627" instrument_node="">Calling all teens to the Teen Tech SF Global Youth Summit! Join TeenTechSF this Saturday, December 11th, to hear from youth climate activists, public policy experts, and the CEO of the world’s largest environmental nonprofit, on how you can amplify your voice to leverage tech for climate action!</span><br data-dcnode-id="626"><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">At this year’s TeenTechSF Global Youth Summit: “Tech for the Environment: A Closer Look at Planet Earth”, you can explore the work of a teen representative invited to the recent UN Climate Conference, the newest San Francisco Climate Action Plan unveiled this month, the global perspective of teens working on the ground in India and Indonesia, and global NGOs who are making bold investments for a more sustainable and equitable feature. TeenTechSF is proud to be partnering with the worldwide #HourofCode to offer hands-on coding workshops so that you can turn your big ideas into tech solutions for the environment!</span><br data-dcnode-id="623"><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">REGISTER NOW at </span><a class="auto" data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/2021-teentechsf-global-youth-summit-registration-218186400397" target="_blank"><span data-dcnode-id="620" instrument_node="">https://www.eventbrite.com/e/2021-teentechsf-global-youth-summit-registration-218186400397</span></a><br data-dcnode-id="618"><br data-dcnode-id="617"><span data-dcnode-id="616" instrument_node="">Global Youth Summit participants will also have the opportunity to learn how youth can make a difference with the 2021 TeenTechSF Civic Hackathon winners and finalists presenting tech solutions to problems including social justice, sustainability, and distance-learning. </span><br data-dcnode-id="615"><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node="">This is a gateway tech experience for many and TeenTechSF is proud to welcome students who are new to tech and coding! As part of the event, you'll also be able to participate in interactive, beginner-friendly STEM workshops including Python Turtle Graphics, Prototyping and UI Design, Video Game Design with PyGame, 3D Computer-Aided Design with Onshape, and Image Detection with Machine Learning.</span><br data-dcnode-id="612"><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">Like all TeenTechSF events, this event is completely FREE, but advance registration is required! Open to all students 13-18 years old -- no previous coding experience necessary.</span><br data-dcnode-id="609"><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">REGISTER TODAY: 2021-ttsf-global-youth-summit.eventbrite.com</span></p></div><div class="j-meta" data-dcnode-id="598"><ul data-dcnode-id="601"><li data-dcnode-id="602"><a aria-label="Likes" class="likes" data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4910049212358850" target="_blank"><span data-dcnode-id="604" instrument_node="">3</span></a></li></ul><nav data-dcnode-id="599"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4910049212358850" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="557" data-id="449897715" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="594" data-external-id="4842413779122394" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/257939387_4841465549217217_1936938784588857622_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=vOckwy3xZv4AX9LbrvA&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT__zmKPrkjuzmGXkOa1-H4uOcqxay7Nmp4SkMcn3vDVUg&amp;oe=62678DEF" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4842413779122394" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/16/21 at 7:01PM" class="" data-dcnode-id="595" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/257939387_4841465549217217_1936938784588857622_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DvOckwy3xZv4AX9LbrvA%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT__zmKPrkjuzmGXkOa1-H4uOcqxay7Nmp4SkMcn3vDVUg%26oe%3D62678DEF&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="558"><div class="j-poster" data-dcnode-id="587"><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="593" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="589" datetime="2021-11-16T19:01:04.000-08:00"><span data-dcnode-id="590" instrument_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="563"><p data-dcnode-id="564"><span data-dcnode-id="586" instrument_node="">Teen Tech SF is hosting a fantastic series of fall workshops! Join them for their next workshop, App Development with Dart, on Sunday (Nov. 21). These workshops are an amazing opportunity for teens to explore the world of STEM! All of TeenTechSF's events are free and their award-winning workshops are peer-led.</span><br data-dcnode-id="585"><br data-dcnode-id="584"><span data-dcnode-id="583" instrument_node="">Learn more and register at</span><br data-dcnode-id="582"><a class="auto" data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2021-ttsf-fall-workshop-series.eventbrite.com/" target="_blank"><span data-dcnode-id="581" instrument_node="">https://2021-ttsf-fall-workshop-series.eventbrite.com</span></a><br data-dcnode-id="579"><br data-dcnode-id="578"><span data-dcnode-id="577" instrument_node="">Upcoming workshops include the following topics and will be hosted on Sundays at 2 pm:</span><br data-dcnode-id="576"><span data-dcnode-id="575" instrument_node="">— November 21 - App Development with Dart</span><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node="">— November 28 - Programming a Personal Website</span><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">— December 5 - Programming a Discord Bot</span><br data-dcnode-id="570"><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">This event is free and run by and for teens, but space is limited. Sign up today!</span><br data-dcnode-id="567"><a class="auto" data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2021-ttsf-fall-workshop-series.eventbrite.com/" target="_blank"><span data-dcnode-id="566" instrument_node="">https://2021-ttsf-fall-workshop-series.eventbrite.com</span></a></p></div><div class="j-meta" data-dcnode-id="559"><ul data-dcnode-id="562"></ul><nav data-dcnode-id="560"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4842413779122394" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="522" data-id="449817748" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="555" data-external-id="4838158146214624" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/257433891_4838063059557466_806839176782994688_n.jpg?stp=dst-jpg_p640x640&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=NdTM1tPxeGcAX-V4Qw_&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_55ouh-vxepQnCAid2F_uqvbarHG8f8yxBIbnDgE2hKQ&amp;oe=6267  1;"><a class="j-image" data-dcnode-id="520" data-external-id="4828565590507213" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/256811754_4828543897176049_9042017201112000164_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=109&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=PvBkWAtgeRwAX8jYMDb&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_aSavL3GtVAVrYoZhlvBPGZ_B5iI61lyAnzC5jklEtvg&amp;oe=6267DB4D" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4828565590507213" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/12/21 at 10:03AM" class="" data-dcnode-id="521" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/256811754_4828543897176049_9042017201112000164_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D109%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DPvBkWAtgeRwAX8jYMDb%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_aSavL3GtVAVrYoZhlvBPGZ_B5iI61lyAnzC5jklEtvg%26oe%3D6267DB4D&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="476"><div class="j-poster" data-dcnode-id="513"><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="519" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="515" datetime="2021-11-12T10:03:17.000-08:00"><span data-dcnode-id="516" instrument_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="481"><p data-dcnode-id="482"><span data-dcnode-id="512" instrument_node="">Teen Tech SF is hosting a fantastic series of fall workshops! Join them for their next workshop, COVID Data Analysis, on Sunday (Nov. 14). These workshops are an amazing opportunity for teens to explore the world of STEM! All of TeenTechSF's events are free and their award-winning workshops are peer-led.</span><br data-dcnode-id="511"><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">Learn more and register at</span><br data-dcnode-id="508"><a class="auto" data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2021-ttsf-fall-workshop-series.eventbrite.com/" target="_blank"><span data-dcnode-id="507" instrument_node="">https://2021-ttsf-fall-workshop-series.eventbrite.com</span></a><br data-dcnode-id="505"><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">Build your digital portfolio through peer-led STEM workshops on how to build a website, program an image detection application with Machine Learning, how to create your own Discord bot online, and more! TeenTechSF is continuing to use breakout rooms to uphold their mission of providing equal access to tech for all teens, and dedicating multiple workshops to each topic to give an in-depth look at each of these tech tools.</span><br data-dcnode-id="502"><br data-dcnode-id="501"><span data-dcnode-id="500" instrument_node="">Workshops include the following topics and will be hosted on Sundays at 2 pm:</span><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">— November 14 - COVID Data Analysis</span><br data-dcnode-id="497"><span data-dcnode-id="496" instrument_node="">— November 21 - App Development with Dart</span><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node="">— November 28 - Programming a Personal Website</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">— December 5 - Programming a Discord Bot</span><br data-dcnode-id="491"><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">Like all of their workshops, the workshops for the TeenTechSF Fall Workshop series will provide a fun and easy introduction to educational opportunities in coding, and various parts of computer engineering for students to explore. Learn how to build a website, app, how to create your own 3D printed designs online, and more!</span><br data-dcnode-id="488"><br data-dcnode-id="487"><span data-dcnode-id="486" instrument_node="">This event is free and run by and for teens, but space is limited. Sign up today!</span><br data-dcnode-id="485"><a class="auto" data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2021-ttsf-fall-workshop-series.eventbrite.com/" target="_blank"><span data-dcnode-id="484" instrument_node="">https://2021-ttsf-fall-workshop-series.eventbrite.com</span></a></p></div><div class="j-meta" data-dcnode-id="477"><ul data-dcnode-id="480"></ul><nav data-dcnode-id="478"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4828565590507213" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="409" data-id="449612209" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="473" data-external-id="4818773881486384" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/256004195_4818741851489587_7234219571229190292_n.png?_nc_cat=104&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=6eSehHJ8KEEAX-iYOHX&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_jRVJ8e-N1dZ08UsiMWmqIknRi1OB0R1aXs--YZxmP5A&amp;oe=62688F92" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4818773881486384" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/9/21 at 12:11PM" class="" data-dcnode-id="474" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/256004195_4818741851489587_7234219571229190292_n.png%3F_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D6eSehHJ8KEEAX-iYOHX%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_jRVJ8e-N1dZ08UsiMWmqIknRi1OB0R1aXs--YZxmP5A%26oe%3D62688F92&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="410"><div class="j-poster" data-dcnode-id="466"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="472" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="468" datetime="2021-11-09T12:11:12.000-08:00"><span data-dcnode-id="469" instrument_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="415"><p data-dcnode-id="416"><span data-dcnode-id="465" instrument_node="">Announcing an exciting (and free!) upcoming event from the Silicon Valley Astronomy Lecture Series!</span><br data-dcnode-id="464"><br data-dcnode-id="463"><span data-dcnode-id="462" instrument_node="">On Wednesday, Nov. 17th, 2021 at 7 pm (PST), Dr. Jim Bell of Arizona State University will give a free, illustrated, non-technical lecture on “Postcards from Mars: The Latest from the International Armada of Robot Explorers"</span><br data-dcnode-id="461"><span data-dcnode-id="460" instrument_node=""> </span><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">This talk will be a live event on YouTube: </span><a class="auto" data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/SVAstronomyLectures" target="_blank"><span data-dcnode-id="457" instrument_node="">http://www.youtube.com/SVAstronomyLectures</span></a><span data-dcnode-id="455" instrument_node=""> </span><br data-dcnode-id="454"><span data-dcnode-id="453" instrument_node="">(If you go to the YouTube address the evening of the talk you will see and be able to participate in the live event; the talk will also be recorded.)</span><br data-dcnode-id="452"><br data-dcnode-id="451"><span data-dcnode-id="450" instrument_node="">For more event details, visit </span><a class="auto" data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foothill.edu/events/%3Fsr%3D2%26rec_id%3D7702" target="_blank"><span data-dcnode-id="449" instrument_node="">https://foothill.edu/events/?sr=2&amp;rec_id=7702</span></a><span data-dcnode-id="447" instrument_node=""> </span><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">To learn more about the Silicon Valley Astronomy Lectures, visit </span><a class="auto" data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foothill.edu/astronomy/" target="_blank"><span data-dcnode-id="444" instrument_node="">https://foothill.edu/astronomy/</span></a><br data-dcnode-id="442"><br data-dcnode-id="441"><span data-dcnode-id="440" instrument_node="">“Postcards from Mars: The Latest from the International Armada of Robot Explorers"</span><br data-dcnode-id="439"><span data-dcnode-id="438" instrument_node="">Ten missions have been successfully landed on Mars since 1976, including six rovers that have traversed across a total of nearly 50 km of terrain on the Red Planet.  Professor Jim Bell from Arizona State University has been the lead or deputy scientist in charge of the science cameras on the NASA Spirit, Opportunity, Curiosity, and Perseverance rovers, and has had an amazing front row seat for their photographic and geologic adventures.   In this presentation, Prof. Bell will share his favorite images and stories from "inside" mission operations and describe the major scientific findings made by these roving and landed missions over the past 45 years, focusing especially on the latest results streaming in from the still-active Curiosity and Perseverance rovers.  He will also talk about plans for the next exciting Martian rover and lander adventure -- sample return! </span><br data-dcnode-id="437"><span data-dcnode-id="436" instrument_node=""> </span><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">The lecture is co-sponsored by: </span><br data-dcnode-id="433"><span data-dcnode-id="432" instrument_node="">* The Foothill College Science, Tech, Engineering &amp; Math Division </span><br data-dcnode-id="431"><span data-dcnode-id="430" instrument_node="">* The SETI Institute </span><br data-dcnode-id="429"><span data-dcnode-id="428" instrument_node="">* The Astronomical Society of the Pacific </span><br data-dcnode-id="427"><span data-dcnode-id="426" instrument_node="">* The University of California Observatories (including Lick Observatory). </span><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node=""> </span><br data-dcnode-id="423"><span data-dcnode-id="422" instrument_node="">Past lectures in the series can also be found on YouTube at: </span><a class="auto" data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youtube.com/svastronomylectures" target="_blank"><span data-dcnode-id="421" instrument_node="">http://youtube.com/svastronomylectures</span></a><span data-dcnode-id="419" instrument_node=""> and as audio podcasts at: </span><a class="auto" data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1805595" target="_blank"><span data-dcnode-id="418" instrument_node="">https://www.buzzsprout.com/1805595</span></a></p></div><div class="j-meta" data-dcnode-id="411"><ul data-dcnode-id="414"></ul><nav data-dcnode-id="412"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4818773881486384" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="389" data-id="449350687" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="407" data-external-id="4796497127047393" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/252019547_4796489363714836_6434204609417761179_n.png?_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=cG46NrFX9CsAX8qFJni&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8go6Dma4qanQD3-y5j4Vsh3E7wjhY_ony3t5zBWMgYbw&amp;oe=6267529A" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4796497127047393" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/2/21 at 1:24PM" class="" data-dcnode-id="408" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/252019547_4796489363714836_6434204609417761179_n.png%3F_nc_cat%3D107%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DcG46NrFX9CsAX8qFJni%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8go6Dma4qanQD3-y5j4Vsh3E7wjhY_ony3t5zBWMgYbw%26oe%3D6267529A&amp;raw" style="width: 100%; height: auto; display: block; margi
