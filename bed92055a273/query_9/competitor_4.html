nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2472" data-id="453866187" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2509" data-external-id="5234422266588208" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275357788_5234397776590657_62653319513080136_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=Hex7nZw_Vp4AX_mgE45&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8NXfdijkEhiWUrpaOU43K4yUDoFxtJbMfPvCmxa6-NtQ&amp;oe=62682B6A" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5234422266588208" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/7/22 at 10:34AM" class="" data-dcnode-id="2510" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275357788_5234397776590657_62653319513080136_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DHex7nZw_Vp4AX_mgE45%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8NXfdijkEhiWUrpaOU43K4yUDoFxtJbMfPvCmxa6-NtQ%26oe%3D62682B6A&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2473"><div class="j-poster" data-dcnode-id="2502"><a data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2508" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2504" datetime="2022-03-07T10:34:36.000-08:00"><span data-dcnode-id="2505" instrument_node="">47d</span></time></a></div><div class="j-message" data-dcnode-id="2481"><p data-dcnode-id="2482"><span data-dcnode-id="2501" instrument_node="">The headlines read “There’s a pilot shortage” and “It’s the best time to become a pilot” but is it really that easy? How does one become a pilot? Or maybe you are interested in all the other career fields in aviation? Join the Hiller Aviation Museum this Saturday, March 12, for an Aviation Exploration Day. This (FREE!) event has been organized by a student to reach other students that have the same questions and interest in pursuing a career in aviation.</span><br data-dcnode-id="2500"><br data-dcnode-id="2499"><span data-dcnode-id="2498" instrument_node="">Aviation Exploration Day</span><br data-dcnode-id="2497"><span data-dcnode-id="2496" instrument_node="">Saturday, March 12, 11:00 am – 3:00 pm</span><br data-dcnode-id="2495"><span data-dcnode-id="2494" instrument_node="">Event page: </span><a class="auto" data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hiller.org/event/aviation-exploration-day/" target="_blank"><span data-dcnode-id="2493" instrument_node="">https://www.hiller.org/event/aviation-exploration-day/</span></a><br data-dcnode-id="2491"><br data-dcnode-id="2490"><span data-dcnode-id="2489" instrument_node="">Aviation Exploration Day, hosted at Hiller Aviation Museum in San Carlos on March 12th, 2022, is an event for teens and adults to explore different avenues in aviation, from pilots to air traffic control to aircraft maintenance, and more. There will be something for everyone to discover about the aviation industry. This free drop-in event is between 11 am - 3 pm and is structured similar to a job fair with vendors and airplanes for everyone to interact with! There will even be food trucks!</span><br data-dcnode-id="2488"><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">This is an outdoor event, unless it rains, then it will be an indoor event!</span><br data-dcnode-id="2485"><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">The event is free to attend.</span></p></div><div class="j-meta" data-dcnode-id="2474"><ul data-dcnode-id="2477"><li data-dcnode-id="2478"><a aria-label="Likes" class="likes" data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5234422266588208" target="_blank"><span data-dcnode-id="2480" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="2475"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5234422266588208" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2435" data-id="453679352" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2470" data-external-id="5221614424535659" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275060509_5220848154612286_6480889046408531619_n.png?stp=dst-png_p720x720&amp;_nc_cat=103&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=y0PZupUeaasAX-LG1wf&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-8_cJ5d5n_cXdyE8CQ8rskKamOg-l-UnwYFVFVvGYzjA&amp;oe=6267F74F" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5221614424535659" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/2/22 at 8:00PM" class="" data-dcnode-id="2471" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275060509_5220848154612286_6480889046408531619_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D103%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dy0PZupUeaasAX-LG1wf%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-8_cJ5d5n_cXdyE8CQ8rskKamOg-l-UnwYFVFVvGYzjA%26oe%3D6267F74F&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2436"><div class="j-poster" data-dcnode-id="2463"><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2469" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2465" datetime="2022-03-02T20:00:04.000-08:00"><span data-dcnode-id="2466" instrument_node="">52d</span></time></a></div><div class="j-message" data-dcnode-id="2444"><p data-dcnode-id="2445"><span data-dcnode-id="2462" instrument_node="">Visit Science at Cal - UC Berkeley and Lawrence Hall of Science's booths at the upcoming Tri-Valley Innovation Fair, featuring up and coming tech and engineering science from around the Bay Area!</span><br data-dcnode-id="2461"><br data-dcnode-id="2460"><span data-dcnode-id="2459" instrument_node="">March 19 | 10 a.m.-5 p.m. |  Alameda County Fairgrounds Pleasanton, CA</span><br data-dcnode-id="2458"><br data-dcnode-id="2457"><span data-dcnode-id="2456" instrument_node="">Learn more about the fair here: </span><a class="auto" data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quest-science.org/innovation-fair/" target="_blank"><span data-dcnode-id="2455" instrument_node="">https://quest-science.org/innovation-fair/</span></a><br data-dcnode-id="2453"><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node="">Featuring:</span><br data-dcnode-id="2450"><span data-dcnode-id="2449" instrument_node="">UC Berkeley Scientists and Engineers. Meet the experts at the cutting edge of Berkeley's next science discovery and get the chance to ask questions and engage with their science in real time! Learn the building blocks of their research by experiencing demos and experiments that relate to their everyday work in the lab.</span><br data-dcnode-id="2448"><br data-dcnode-id="2447"><span data-dcnode-id="2446" instrument_node="">Lawrence Hall of Science Hands-On Activity. Tap into your inner engineer by exploring mechanical linkages to build and prototype mechanisms, explore movement, and design animated characters and moving toys. By approaching challenges in creative ways with your own talents and skills, you can discover solutions that are uniquely you.</span></p></div><div class="j-meta" data-dcnode-id="2437"><ul data-dcnode-id="2440"><li data-dcnode-id="2441"><a aria-label="Likes" class="likes" data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5221614424535659" target="_blank"><span data-dcnode-id="2443" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="2438"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5221614424535659" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="2422" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2433" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-06.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="2434" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-about-06.svg&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2423"><div class="j-poster" data-dcnode-id="2428"><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Profile image for Juicer" data-dcnode-id="2432" data-poster-id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/logo-without-text.svg&amp;raw"><h3 data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Juicer</span></h3></a></div><div class="j-message" data-dcnode-id="2424"><a data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science"><span data-dcnode-id="2427" instrument_node="">Juicer.io</span></a><span data-dcnode-id="2425" instrument_node=""> lets you easily create and embed social media feeds like this one on to your site for free!</span></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2385" data-id="453435859" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2420" data-external-id="5204065186290583" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274620571_5197779410252494_2812265860278518290_n.jpg?stp=dst-jpg_p480x480&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=MdsgItak8nwAX_tRHGY&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8w9qJ7Yrt1i6xldQaXQ93KYNIDcITOYY7KBuzcEO8qbQ&amp;oe=6267D965" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5204065186290583" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/24/22 at 4:00PM" class="" data-dcnode-id="2421" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274620571_5197779410252494_2812265860278518290_n.jpg%3Fstp%3Ddst-jpg_p480x480%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DMdsgItak8nwAX_tRHGY%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8w9qJ7Yrt1i6xldQaXQ93KYNIDcITOYY7KBuzcEO8qbQ%26oe%3D6267D965&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2386"><div class="j-poster" data-dcnode-id="2413"><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2419" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2415" datetime="2022-02-24T16:00:04.000-08:00"><span data-dcnode-id="2416" instrument_node="">58d</span></time></a></div><div class="j-message" data-dcnode-id="2394"><p data-dcnode-id="2395"><span data-dcnode-id="2412" instrument_node="">Have you heard about the California Academy of Sciences' Careers In Science program? If you share a curiosity for the natural world—from plants to planets, worms to snakes, and everything in between—apply for a Careers in Science internship with the California Academy of Sciences. Learn more at  </span><a class="auto" data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calacademy.org/careers-in-science-cis-intern-program" target="_blank"><span data-dcnode-id="2411" instrument_node="">https://www.calacademy.org/careers-in-science-cis-intern-program</span></a><br data-dcnode-id="2409"><br data-dcnode-id="2408"><span data-dcnode-id="2407" instrument_node="">The Careers in Science (CiS) Intern Program is a multi-year, year-round paid internship and youth development program for young people from groups typically underrepresented in the sciences. Applicants must be currently enrolled in grades 9 or 10 and reside and/or attend school in San Francisco. </span><br data-dcnode-id="2406"><span data-dcnode-id="2405" instrument_node="">Join other San Francisco teens to:</span><br data-dcnode-id="2404"><span data-dcnode-id="2403" instrument_node="">-- Learn about science through interactive trainings, workshops, and project groups</span><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node="">-- Teach science to diverse audiences</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node="">-- Conduct scientific field research and data analysis with Academy experts</span><br data-dcnode-id="2398"><br data-dcnode-id="2397"><span data-dcnode-id="2396" instrument_node="">Applications are now open. The deadline to apply is April 3, 2022 at 11:59 PM. Applicants will be required to attend a group interview to ensure a good fit and commitment to the program.</span></p></div><div class="j-meta" data-dcnode-id="2387"><ul data-dcnode-id="2390"><li data-dcnode-id="2391"><a aria-label="Likes" class="likes" data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5204065186290583" target="_blank"><span data-dcnode-id="2393" instrument_node="">3</span></a></li></ul><nav data-dcnode-id="2388"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5204065186290583" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2352" data-id="453347900" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2383" data-external-id="5197965730233862" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274531567_5197956546901447_284134872375799138_n.png?stp=dst-png_s720x720&amp;_nc_cat=109&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=CiEYweZzQpoAX9u10aP&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9o1mdLfyto5pgpSnM2ultTOSbUBaHsFFWHEUGjFfwKKA&amp;oe=62671E23" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5197965730233862" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/22/22 at 4:40PM" class="" data-dcnode-id="2384" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274531567_5197956546901447_284134872375799138_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D109%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DCiEYweZzQpoAX9u10aP%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9o1mdLfyto5pgpSnM2ultTOSbUBaHsFFWHEUGjFfwKKA%26oe%3D62671E23&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2353"><div class="j-poster" data-dcnode-id="2376"><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2382" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2378" datetime="2022-02-22T16:40:28.000-08:00"><span data-dcnode-id="2379" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="2358"><p data-dcnode-id="2359"><span data-dcnode-id="2375" instrument_node="">Want to learn more about UC Santa Cruz's Science Internship Program (SIP)? Join SIP for an information session tomorrow, Wednesday Feb. 23, 3-4 PM PST. Zoom link: </span><a class="auto" data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucsc.us20.list-manage.com/track/click%3Fu%3D53edd08fba9a940e360b888d8%26id%3D15a6c868eb%26e%3Df1033624d0" target="_blank"><span data-dcnode-id="2374" instrument_node="">https://ucsc.us20.list-manage.com/track/click?u=53edd08fba9a940e360b888d8&amp;id=15a6c868eb&amp;e=f1033624d0</span></a><br data-dcnode-id="2372"><br data-dcnode-id="2371"><span data-dcnode-id="2370" instrument_node="">Prospective SIP applicants are invited to virtual information sessions to learn about the Science Internship Program (SIP) and to ask questions. Virtual information sessions will be held every Wednesday until the end of the application filing period (the SIP Application Portal will be open from March 1–31, 2022), and the information sessions during the application filing period will be specifically about how to complete the application.</span><br data-dcnode-id="2369"><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">UC Santa Cruz's Science Internship Program (SIP) is a summer-long research internship program for high school students in STEM fields. UCSC faculty, graduate students, and post-doctoral researchers provide one-on-one mentoring and students are inserted into existing research projects. Learn more at </span><a class="auto" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sip.ucsc.edu/" target="_blank"><span data-dcnode-id="2366" instrument_node="">https://sip.ucsc.edu/</span></a><br data-dcnode-id="2364"><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">** Scholarships are available! ** SIP encourages students to apply even if they are worried that they might not be able to afford the program. You can also learn about SIP's commitment to diversity, equity and inclusion at </span><a class="auto" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sip.ucsc.edu/about/creating-equity-in-stem/" target="_blank"><span data-dcnode-id="2361" instrument_node="">https://sip.ucsc.edu/about/creating-equity-in-stem/</span></a></p></div><div class="j-meta" data-dcnode-id="2354"><ul data-dcnode-id="2357"></ul><nav data-dcnode-id="2355"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5197965730233862" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2303" data-id="453055225" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2350" data-external-id="5171726049524497" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273678820_5156770441020058_4754823260928479996_n.png?stp=dst-png_s720x720&amp;_nc_cat=104&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=BCKvT0SZ4doAX9ekTgH&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT93qC3RSaZQirOG2rIxr4L0Kb8YhL1ZMRk593HwTvPuuA&amp;oe=6267C51D" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5171726049524497" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/14/22 at 11:18AM" class="" data-dcnode-id="2351" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273678820_5156770441020058_4754823260928479996_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DBCKvT0SZ4doAX9ekTgH%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT93qC3RSaZQirOG2rIxr4L0Kb8YhL1ZMRk593HwTvPuuA%26oe%3D6267C51D&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2304"><div class="j-poster" data-dcnode-id="2343"><a data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2349" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2345" datetime="2022-02-14T11:18:01.000-08:00"><span data-dcnode-id="2346" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="2309"><p data-dcnode-id="2310"><span data-dcnode-id="2342" instrument_node="">Student Makers is offering two workshop series that will teach students in grades 7-11 about 3D printing and Arduino programming!  The registration deadline is February 23 but you're encouraged to register soon for this (FREE!) program as there are limited spots. Learn more and sign up at </span><a class="auto" data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studentmakers.org/workshops" target="_blank"><span data-dcnode-id="2341" instrument_node="">https://www.studentmakers.org/workshops</span></a><br data-dcnode-id="2339"><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">~~</span><br data-dcnode-id="2336"><br data-dcnode-id="2335"><span data-dcnode-id="2334" instrument_node="">Spring 2022 3D Printing Workshop Series</span><br data-dcnode-id="2333"><span data-dcnode-id="2332" instrument_node="">Learn step-by-step how to go from a project idea to a physical 3D print! We'll also explore real-world applications in 3D printing.</span><br data-dcnode-id="2331"><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">Who: 7th - 11th grade students attending school in the U.S. are eligible!</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">When: 8 workshops total; once a week every Sunday 1:30-3:30PM PST from March 6th to April 24th.</span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">Where: Workshop series will be taught via Google Meet.</span><br data-dcnode-id="2324"><br data-dcnode-id="2323"><span data-dcnode-id="2322" instrument_node="">~~</span><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node="">Spring 2022 Arduino Workshop Series</span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">We'll teach you how to design circuit projects and write Arduino code to see them come to life! </span><br data-dcnode-id="2317"><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">Who: 7th - 11th grade students attending school in the U.S. are eligible!</span><br data-dcnode-id="2314"><span data-dcnode-id="2313" instrument_node="">When: 8 workshops total; once a week every Sunday 1-3 PM PST from March 6th to April 24th.</span><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node="">Where: Workshop series will be taught via Google Meet.</span></p></div><div class="j-meta" data-dcnode-id="2305"><ul data-dcnode-id="2308"></ul><nav data-dcnode-id="2306"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5171726049524497" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2261" data-id="452886342" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2301" data-external-id="5156807727682996" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273687167_5156793184351117_5919446077010479360_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=104&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=uFBzAmi3s5sAX81Nddl&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_G_2jBkpMbv0RLUNTGIQtEgkDpQ1fAp5ONIld9MQLp1g&amp;oe=62676402" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5156807727682996" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/9/22 at 5:04PM" class="" data-dcnode-id="2302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273687167_5156793184351117_5919446077010479360_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DuFBzAmi3s5sAX81Nddl%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_G_2jBkpMbv0RLUNTGIQtEgkDpQ1fAp5ONIld9MQLp1g%26oe%3D62676402&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2262"><div class="j-poster" data-dcnode-id="2294"><a data-dcnode-id="2295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2300" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2296" datetime="2022-02-09T17:04:33.000-08:00"><span data-dcnode-id="2297" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="2270"><p data-dcnode-id="2271"><span data-dcnode-id="2293" instrument_node="">Have you made a plan for college and beyond? There’s no road map for that. But The Tech Interactive  and Miss CEO are here to help with a mentoring event that will connect high school students with extraordinary women at Intuitive, a medical technology company that builds robots to assist with surgeries. The women of Intuitive are excited to help students answer the big questions about their next stage of life!</span><br data-dcnode-id="2292"><br data-dcnode-id="2291"><span data-dcnode-id="2290" instrument_node="">Date: Thursday, Feb. 17, 2022</span><br data-dcnode-id="2289"><span data-dcnode-id="2288" instrument_node="">Time: 4 p.m. Pacific</span><br data-dcnode-id="2287"><span data-dcnode-id="2286" instrument_node="">Register Here: </span><a class="auto" data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/3APmIBT" target="_blank"><span data-dcnode-id="2285" instrument_node="">https://bit.ly/3APmIBT</span></a><br data-dcnode-id="2283"><br data-dcnode-id="2282"><span data-dcnode-id="2281" instrument_node="">During this one-hour virtual event, students will:</span><br data-dcnode-id="2280"><span data-dcnode-id="2279" instrument_node="">-- Learn what engineers and STEM professionals at Intuitive actually do all day, plus the skills required to do their jobs.</span><br data-dcnode-id="2278"><span data-dcnode-id="2277" instrument_node="">-- Engage in small-group community mentoring sessions.</span><br data-dcnode-id="2276"><span data-dcnode-id="2275" instrument_node="">-- Get practical guidance from adult mentors on how to think about their own goals and define their path forward.</span><br data-dcnode-id="2274"><br data-dcnode-id="2273"><span data-dcnode-id="2272" instrument_node="">This mentoring experience is designed for young women and non-binary students in high school.</span></p></div><div class="j-meta" data-dcnode-id="2263"><ul data-dcnode-id="2266"><li data-dcnode-id="2267"><a aria-label="Likes" class="likes" data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5156807727682996" target="_blank"><span data-dcnode-id="2269" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="2264"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5156807727682996" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2226" data-id="452844089" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2259" data-external-id="5153600068003762" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273585024_5153570828006686_6184336746110693268_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=109&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=yu0Pp_nfuecAX-f3Lae&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT82sbJBCSGOBAwEKUwUJtbOf8bEbksaGAy_mH5zKs38lg&amp;oe=6268ED98" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5153600068003762" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/8/22 at 4:30PM" class="" data-dcnode-id="2260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273585024_5153570828006686_6184336746110693268_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D109%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dyu0Pp_nfuecAX-f3Lae%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT82sbJBCSGOBAwEKUwUJtbOf8bEbksaGAy_mH5zKs38lg%26oe%3D6268ED98&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2227"><div class="j-poster" data-dcnode-id="2252"><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2258" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2254" datetime="2022-02-08T16:30:09.000-08:00"><span data-dcnode-id="2255" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="2235"><p data-dcnode-id="2236"><span data-dcnode-id="2251" instrument_node="">NASA’s Neurodiversity Network (N3) is looking for summer interns to work on projects with NASA scientists. The goal of the N3 program is to provide experiences for neurodiverse students, specifically those on the autism spectrum, that will spark their interest in careers in STEM (Science, Technology, Engineering and Mathematics). Learn more at n3.sonoma.edu/internships</span><br data-dcnode-id="2250"><br data-dcnode-id="2249"><span data-dcnode-id="2248" instrument_node="">Details:</span><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node="">All interns will be paired with a Subject Matter Expert (SME) from NASA’s network. Individual SMEs will have expertise in at least one of the following areas: Astrobiology, Astrophysics, Earth and Environmental Science, Heliophysics and Planetary science and exploration. The work schedule will be mutually agreed upon by the intern and the SME.</span><br data-dcnode-id="2245"><span data-dcnode-id="2244" instrument_node="">Internships will be completed remotely during Summer 2022 and N3 interns will receive a $1,000 stipend upon completion of their internship.</span><br data-dcnode-id="2243"><br data-dcnode-id="2242"><span data-dcnode-id="2241" instrument_node="">Eligibility:</span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node="">Students must submit an online application and a teacher recommendation letter is required for full consideration.</span><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node="">Current high school students 16 years of age or older who identify as autistic and have completed algebra and at least one year of a physical science course are eligible to apply for this internship program</span></p></div><div class="j-meta" data-dcnode-id="2228"><ul data-dcnode-id="2231"><li data-dcnode-id="2232"><a aria-label="Likes" class="likes" data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5153600068003762" target="_blank"><span data-dcnode-id="2234" instrument_node="">3</span></a></li></ul><nav data-dcnode-id="2229"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5153600068003762" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2188" data-id="452685413" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2224" data-external-id="5137774319586337" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273326632_5137504296280006_4186960176338595978_n.jpg?stp=dst-jpg_p480x480&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=bIvyTOr5Z5UAX9wAQkX&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-I2hlvK4rMjRUZ1rI6MmcMzC6BVAAsF1Zzg3g1vQM6uw&amp;oe=6267D232" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5137774319586337" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/3/22 at 3:47PM" class="" data-dcnode-id="2225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273326632_5137504296280006_4186960176338595978_n.jpg%3Fstp%3Ddst-jpg_p480x480%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DbIvyTOr5Z5UAX9wAQkX%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-I2hlvK4rMjRUZ1rI6MmcMzC6BVAAsF1Zzg3g1vQM6uw%26oe%3D6267D232&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2189"><div class="j-poster" data-dcnode-id="2217"><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2223" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2219" datetime="2022-02-03T15:47:13.000-08:00"><span data-dcnode-id="2220" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="2197"><p data-dcnode-id="2198"><span data-dcnode-id="2216" instrument_node="">Careers In Science Applications are Now Open! If you share a curiosity for the natural world—from plants to planets, worms to snakes, and everything in between—apply for a Careers in Science internship with the California Academy of Sciences. Learn more at  </span><a class="auto" data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calacademy.org/careers-in-science-cis-intern-program" target="_blank"><span data-dcnode-id="2215" instrument_node="">https://www.calacademy.org/careers-in-science-cis-intern-program</span></a><br data-dcnode-id="2213"><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">The Careers in Science (CiS) Intern Program is a multi-year, year-round paid internship and youth development program for young people from groups typically underrepresented in the sciences. Applicants must be currently enrolled in grades 9 or 10 and reside and/or attend school in San Francisco. </span><br data-dcnode-id="2210"><br data-dcnode-id="2209"><span data-dcnode-id="2208" instrument_node="">Join other San Francisco teens to:</span><br data-dcnode-id="2207"><span data-dcnode-id="2206" instrument_node="">-- Learn about science through interactive trainings, workshops, and project groups</span><br data-dcnode-id="2205"><span data-dcnode-id="2204" instrument_node="">-- Teach science to diverse audiences</span><br data-dcnode-id="2203"><span data-dcnode-id="2202" instrument_node="">-- Conduct scientific field research and data analysis with Academy experts</span><br data-dcnode-id="2201"><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">Applications are now open. The deadline to apply is April 3, 2022 at 11:59 PM. Applicants will be required to attend a group interview to ensure a good fit and commitment to the program.</span></p></div><div class="j-meta" data-dcnode-id="2190"><ul data-dcnode-id="2193"><li data-dcnode-id="2194"><a aria-label="Likes" class="likes" data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5137774319586337" target="_blank"><span data-dcnode-id="2196" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="2191"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5137774319586337" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2162" data-id="452607295" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2186" data-external-id="5131059766924459" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273116687_5131050773592025_7491597280838924904_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=111&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=OFv6zy5gdYkAX9Deioe&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_kU_0lwX_SbtSSgpzRIpMY_iH4XFwjKC7AGEBDZjKq_A&amp;oe=626866DE" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5131059766924459" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/1/22 at 4:29PM" class="" data-dcnode-id="2187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273116687_5131050773592025_7491597280838924904_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D111%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DOFv6zy5gdYkAX9Deioe%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_kU_0lwX_SbtSSgpzRIpMY_iH4XFwjKC7AGEBDZjKq_A%26oe%3D626866DE&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2163"><div class="j-poster" data-dcnode-id="2179"><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2185" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2181" datetime="2022-02-01T16:29:05.000-08:00"><span data-dcnode-id="2182" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="2171"><p data-dcnode-id="2172"><span data-dcnode-id="2178" instrument_node="">The Lawrence Hall of Science at the University of California, Berkeley is seeking teenagers entering grades 10, 11, and 12 who are interested in science and education for its Teen Internship Program, February through August 2022. Apply online by February 11. More details: </span><a class="auto" data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lawrencehallofscience.org/teen-internship-programs/teen-internship-program/" target="_blank"><span data-dcnode-id="2177" instrument_node="">https://www.lawrencehallofscience.org/teen-internship-programs/teen-internship-program/</span></a><br data-dcnode-id="2175"><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">This six-month internship program offers training and real-world experience in teaching and facilitating science learning experiences. The program begins with professional workshops in the spring on topics such as science learning and teaching, leadership, and conflict resolution. After completion of this training, interns will work closely with their expert educators to lead summer camp programs for youth at The Lawrence. Interns who participate for the full six-month period will receive a $3,500 stipend.</span></p></div><div class="j-meta" data-dcnode-id="2164"><ul data-dcnode-id="2167"><li data-dcnode-id="2168"><a aria-label="Likes" class="likes" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5131059766924459" target="_blank"><span data-dcnode-id="2170" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="2165"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5131059766924459" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2118" data-id="452395850" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2160" data-external-id="5109145905782512" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272815249_5109043872459382_3401593058683331814_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=100&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=O_no0rUdkTMAX_zVLUY&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8ttjyP5JQX--8lmpaTuvAe2APBMcwzory1G65QGcZ9rw&amp;oe=6268DA95" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5109145905782512" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/26/22 at 5:24PM" class="" data-dcnode-id="2161" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272815249_5109043872459382_3401593058683331814_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D100%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DO_no0rUdkTMAX_zVLUY%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8ttjyP5JQX--8lmpaTuvAe2APBMcwzory1G65QGcZ9rw%26oe%3D6268DA95&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2119"><div class="j-poster" data-dcnode-id="2153"><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2159" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2155" datetime="2022-01-26T17:24:02.000-08:00"><span data-dcnode-id="2156" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="2124"><p data-dcnode-id="2125"><img alt="⚡" class="emoji" data-dcnode-id="2152" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/26a1.svg&amp;raw"><span data-dcnode-id="2151" instrument_node=""> Do you want to get an edge to succeed — for free?! Join Girls Who Code and learn to code and change the world! </span><img alt="🌎" class="emoji" data-dcnode-id="2150" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f30e.svg&amp;raw"><span data-dcnode-id="2149" instrument_node=""> </span><img alt="🌟" class="emoji" data-dcnode-id="2148" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f31f.svg&amp;raw"><br data-dcnode-id="2147"><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">Girls Who Code's free, 2-week Summer Immersion Program (SIP) hosts current 9th-11th grade students who identify as girls or non binary in live virtual classrooms led by industry-leading companies like EA, Bank of America, and Accenture. Students learn to make an impact with HTML, CSS, and JavaScript while getting an inside look into the tech industry. Plus, all SIP students can apply for grants up to $500 for financial support.</span><br data-dcnode-id="2144"><br data-dcnode-id="2143"><span data-dcnode-id="2142" instrument_node="">Girls Who Code's free Self-Paced Program lets current 9th-12th grade students who identify as girls or non binary earn beginner-level badges in HTML, CSS, and JavaScript for web development or an intermediate-level badge in Python for cybersecurity through independent study and real-world projects.</span><br data-dcnode-id="2141"><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">Both programs introduce you to inspiring role models in the tech industry. You’ll also get access to exclusive alumni benefits and career support for life, including our Hiring Summit, pre-internship programs, virtual mentoring, and GWC Talks webinars for career tips and strategies. </span><img alt="👩‍🎓" class="emoji" data-dcnode-id="2138" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f469-200d-1f393.svg&amp;raw"><img alt="👩‍💻" class="emoji" data-dcnode-id="2137" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f469-200d-1f4bb.svg&amp;raw"><br data-dcnode-id="2136"><br data-dcnode-id="2135"><span data-dcnode-id="2134" instrument_node="">Act now to join a sisterhood that supports you for life!</span><br data-dcnode-id="2133"><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">Programs are open June 17 - August 12. Just head to </span><a class="auto" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//girlswhocodesm.smapply.io/" target="_blank"><span data-dcnode-id="2130" instrument_node="">https://girlswhocodesm.smapply.io/</span></a><span data-dcnode-id="2128" instrument_node=""> to get started today. </span><img alt="‼" class="emoji" data-dcnode-id="2127" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/203c.svg&amp;raw"><span data-dcnode-id="2126" instrument_node=""> And make sure to list Bay Area Teen Science as your Community Partner on the application to receive priority consideration!</span></p></div><div class="j-meta" data-dcnode-id="2120"><ul data-dcnode-id="2123"></ul><nav data-dcnode-id="2121"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5109145905782512" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2073" data-id="452170491" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2116" data-external-id="5098960986801004" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272671598_5098939166803186_3238309490367340366_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=106&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=DdqPX-VVZDsAX-MTeKl&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_tO7QXgCYgoAa6CVzRpSaDNe62kIfSAoCiNED2jz55vA&amp;oe=62679B5E" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5098960986801004" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/24/22 at 11:43AM" class="" data-dcnode-id="2117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272671598_5098939166803186_3238309490367340366_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D106%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DDdqPX-VVZDsAX-MTeKl%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_tO7QXgCYgoAa6CVzRpSaDNe62kIfSAoCiNED2jz55vA%26oe%3D62679B5E&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2074"><div class="j-poster" data-dcnode-id="2109"><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2115" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2111" datetime="2022-01-24T11:43:01.000-08:00"><span data-dcnode-id="2112" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="2082"><p data-dcnode-id="2083"><span data-dcnode-id="2108" instrument_node="">The Kavli Institute for Particle Astrophysics and Cosmology at Stanford is proud to announce its 2022 public lecture series! They're kicking off the year with a presentation on the invisible yet fascinating cosmic magnetism (see details below). The lecture is free and open to all but recommended for 9th graders and above.</span><br data-dcnode-id="2107"><br data-dcnode-id="2106"><span data-dcnode-id="2105" instrument_node="">Learn more and register at </span><a class="auto" data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kipac.stanford.edu/discover" target="_blank"><span data-dcnode-id="2104" instrument_node="">https://kipac.stanford.edu/discover</span></a><span data-dcnode-id="2102" instrument_node=""> </span><br data-dcnode-id="2101"><span data-dcnode-id="2100" instrument_node="">(Note: school-district email addresses and other work emails with firewalls may block the EventBrite messages)</span><br data-dcnode-id="2099"><br data-dcnode-id="2098"><span data-dcnode-id="2097" instrument_node="">(Virtual) Public Lecture - February 1 (Tuesday) at 7pm PST</span><br data-dcnode-id="2096"><br data-dcnode-id="2095"><span data-dcnode-id="2094" instrument_node="">Is our Universe a gigantic magnet? How do magnetic fields in the interstellar space affect us and our own galaxy? Join the lecture to learn about the invisible and mysterious cosmic magnetism!</span><br data-dcnode-id="2093"><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">Date: Tuesday, Feb. 1, 2022</span><br data-dcnode-id="2090"><span data-dcnode-id="2089" instrument_node="">Time:  7:00-8:00 PM PST</span><br data-dcnode-id="2088"><span data-dcnode-id="2087" instrument_node="">Location: Virtual. The event URL can be found at the bottom of the EventBrite registration confirmation email</span><br data-dcnode-id="2086"><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">Our Earth is magnetic, and so is our Universe. From stars to galaxies to intergalactic space, magnetic fields in fact thread the cosmos. Our home galaxy, the Milky Way, hosts a magnetic field that helps shape the interstellar medium -- the gas between stars and out of which new stars are born. Join Prof. Susan Clark on a tour of magnetism in the Milky Way galaxy and beyond, and learn how we measure the invisible magnetic fields in interstellar space.</span></p></div><div class="j-meta" data-dcnode-id="2075"><ul data-dcnode-id="2078"><li data-dcnode-id="2079"><a aria-label="Likes" class="likes" data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5098960986801004" target="_blank"><span data-dcnode-id="2081" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="2076"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5098960986801004" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="2059" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2071" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-07.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="2072" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-about-07.svg&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2060"><div class="j-poster" data-dcnode-id="2066"><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Profile image for Juicer" data-dcnode-id="2070" data-poster-id="" src="https://chatnoir-webconte
