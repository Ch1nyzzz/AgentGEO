 1; opacity: 1;"><a class="j-image" data-dcnode-id="3758" data-external-id="5178539352176500" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274112399_5175132359183866_1217343405628770832_n.png?stp=dst-png_s720x720&amp;_nc_cat=103&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=TZ8-cfxO0JwAX_kpPp6&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8Gj-XCOaO_rRUPK5P43LvcByjj5SgePh12NLtxIc0d-Q&amp;oe=62685F25" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5178539352176500" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/16/22 at 2:53PM" class="" data-dcnode-id="3759" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274112399_5175132359183866_1217343405628770832_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D103%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DTZ8-cfxO0JwAX_kpPp6%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8Gj-XCOaO_rRUPK5P43LvcByjj5SgePh12NLtxIc0d-Q%26oe%3D62685F25&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3703"><div class="j-poster" data-dcnode-id="3751"><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3757" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3753" datetime="2022-02-16T14:53:32.000-08:00"><span data-dcnode-id="3754" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="3711"><p data-dcnode-id="3712"><span data-dcnode-id="3750" instrument_node="">Join the Kavli Institute for Particle Astrophysics and Cosmology (KIPAC) for their next public lecture on alien life and UFOs! The lecture is open to all but recommended for 9th graders and above. The event will most likely to be hosted in a hybrid mode (YouTube and in person), and the Kavli Institute is excited to finally welcome some of the audience back on the Stanford campus! </span><br data-dcnode-id="3749"><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">Public Astronomy Lecture - March 1 (Tuesday) at 7pm PST</span><br data-dcnode-id="3746"><span data-dcnode-id="3745" instrument_node="">Is alien life out there and have they visited Earth? Join this lecture to learn about the current understanding of extraterrestrial life!</span><br data-dcnode-id="3744"><br data-dcnode-id="3743"><span data-dcnode-id="3742" instrument_node="">Tickets are free but RSVP is required: </span><a class="auto" data-dcnode-id="3740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/astronomy-lecture-alien-life-ufos-registration-264821156207" target="_blank"><span data-dcnode-id="3741" instrument_node="">https://www.eventbrite.com/e/astronomy-lecture-alien-life-ufos-registration-264821156207</span></a><span data-dcnode-id="3739" instrument_node=""> </span><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">(Note: school-district email addresses and other work emails with firewalls may block the EventBrite messages)</span><br data-dcnode-id="3736"><br data-dcnode-id="3735"><span data-dcnode-id="3734" instrument_node="">Date: Tuesday, Mar. 1, 2022</span><br data-dcnode-id="3733"><span data-dcnode-id="3732" instrument_node="">Time:  7:00-8:00 PM PST</span><br data-dcnode-id="3731"><span data-dcnode-id="3730" instrument_node="">Format: Virtual/Hybrid. The event URL can be found at the bottom of the EventBrite registration confirmation email. Location information will be communicated to those who are interested in attending the lecture in person.</span><br data-dcnode-id="3729"><br data-dcnode-id="3728"><span data-dcnode-id="3727" instrument_node="">Title: Alien Life and UFOs - The Scientific View</span><br data-dcnode-id="3726"><span data-dcnode-id="3725" instrument_node="">Speaker: Prof. Jack Singal (University of Richmond, Virginia)</span><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">Video clips recently released from the military and the observation of an object with a potentially strange trajectory around the Sun have reignited interest in the question of UFOs and the existence of intelligent alien life. In this lecture, Prof. Singal will discuss the current state of knowledge about the probability of life and technological civilizations existing elsewhere in the Galaxy, which has advanced greatly in the past decade due to the discovery and characterization of thousands of planets around other stars. He will also review the recent UFO claims from a scientific perspective of 'open-minded skepticism,' where one should take into account considerations such as our current media landscape, our knowledge of atmospheric phenomena, and whether we should expect visits from other civilizations.</span><br data-dcnode-id="3722"><br data-dcnode-id="3721"><span data-dcnode-id="3720" instrument_node="">Questions? Email Dr. Xinnan Du at </span><a class="auto" data-dcnode-id="3718" href="mailto:xinnandu@stanford.edu" target="_blank"><span data-dcnode-id="3719" instrument_node="">xinnandu@stanford.edu</span></a><br data-dcnode-id="3717"><br data-dcnode-id="3716"><span data-dcnode-id="3715" instrument_node="">KIPAC lecture website: </span><a class="auto" data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kipac.stanford.edu/discover" target="_blank"><span data-dcnode-id="3714" instrument_node="">https://kipac.stanford.edu/discover</span></a></p></div><div class="j-meta" data-dcnode-id="3704"><ul data-dcnode-id="3707"><li data-dcnode-id="3708"><a aria-label="Likes" class="likes" data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5178539352176500" target="_blank"><span data-dcnode-id="3710" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3705"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5178539352176500" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3654" data-id="452960665" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3700" data-external-id="5162514630445639" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273756278_5162328397130929_1500790527449852187_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=108&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=PU4ilT9ZjJoAX-nW4SG&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_3yETtSovU3kvsfzH6fxcXCMWUxBv6188zXQ59mOVXBw&amp;oe=6268E687" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5162514630445639" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/11/22 at 11:25AM" class="" data-dcnode-id="3701" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273756278_5162328397130929_1500790527449852187_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D108%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DPU4ilT9ZjJoAX-nW4SG%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_3yETtSovU3kvsfzH6fxcXCMWUxBv6188zXQ59mOVXBw%26oe%3D6268E687&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3655"><div class="j-poster" data-dcnode-id="3693"><a data-dcnode-id="3694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3699" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3695" datetime="2022-02-11T11:25:36.000-08:00"><span data-dcnode-id="3696" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="3663"><p data-dcnode-id="3664"><span data-dcnode-id="3692" instrument_node="">Join Girls Who Code and learn to code and change the world! As a Girls Who Code Community Partner, Bay Area Teen Science is thrilled to let you know that your application will receive priority consideration when you apply! The early application deadline is February 16, 202, so apply soon at </span><a class="auto" data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//girlswhocodesm.smapply.io/" target="_blank"><span data-dcnode-id="3691" instrument_node="">https://girlswhocodesm.smapply.io/</span></a><span data-dcnode-id="3689" instrument_node="">!</span><br data-dcnode-id="3688"><br data-dcnode-id="3687"><span data-dcnode-id="3686" instrument_node="">The 2-week, introductory Summer Immersion Program (SIP) hosts current 9th-11th grade students who identify as girls or non-binary in live virtual classrooms led by industry-leading companies like EA, Pfizer, and ViacomCBS. Students learn to make an impact with HTML, CSS, and JavaScript while getting an inside look into the tech industry. Plus, all SIP students can apply for grants up to $500 for financial support.</span><br data-dcnode-id="3685"><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">The Self-Paced Program offers independent study and real-world projects for current 9th-12th graders to earn beginner-level badges in HTML, CSS, and JavaScript for web development or an intermediate-level badge in Python for cybersecurity.</span><br data-dcnode-id="3682"><br data-dcnode-id="3681"><span data-dcnode-id="3680" instrument_node="">Both programs introduce you to inspiring role models in the tech industry. You’ll also get access to exclusive alumni benefits and career support for life, including our Hiring Summit, pre-internship programs, virtual mentoring, and GWC Talks webinars for career tips and strategies.</span><br data-dcnode-id="3679"><br data-dcnode-id="3678"><span data-dcnode-id="3677" instrument_node="">Programs are available June 17 - August 12. Learn more at </span><a class="auto" data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//girlswhocode.com/programs/summer-immersion-program" target="_blank"><span data-dcnode-id="3676" instrument_node="">https://girlswhocode.com/programs/summer-immersion-program</span></a><span data-dcnode-id="3674" instrument_node=""> or by joining a webinar (</span><a class="auto" data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mailchi.mp/c1d968b8992a/sipwebinar" target="_blank"><span data-dcnode-id="3673" instrument_node="">https://mailchi.mp/c1d968b8992a/sipwebinar</span></a><span data-dcnode-id="3671" instrument_node="">).   </span><br data-dcnode-id="3670"><br data-dcnode-id="3669"><span data-dcnode-id="3668" instrument_node="">The early application deadline is February 16, 2022. Regular-decision applications are due by March 18, 2022.</span><br data-dcnode-id="3667"><br data-dcnode-id="3666"><span data-dcnode-id="3665" instrument_node="">Act now to join a sisterhood that supports you for life! Remember to select Bay Area Teen Science from the dropdown menu when asked about your Community Partner affiliation on the application. That's how your application will receive priority consideration!</span></p></div><div class="j-meta" data-dcnode-id="3656"><ul data-dcnode-id="3659"><li data-dcnode-id="3660"><a aria-label="Likes" class="likes" data-dcnode-id="3661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5162514630445639" target="_blank"><span data-dcnode-id="3662" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3657"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5162514630445639" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3622" data-id="452844088" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3652" data-external-id="5153609254669510" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273605262_5153560581341044_7725536124970397405_n.png?stp=dst-png_p720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=cnSno9MJOS4AX_oRM9D&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8FvctZPkNV1sxuIvotEBmxd3IZSQ9Yay8mHSRHOQUM7A&amp;oe=62671E4F" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5153609254669510" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/8/22 at 4:33PM" class="" data-dcnode-id="3653" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273605262_5153560581341044_7725536124970397405_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DcnSno9MJOS4AX_oRM9D%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8FvctZPkNV1sxuIvotEBmxd3IZSQ9Yay8mHSRHOQUM7A%26oe%3D62671E4F&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3623"><div class="j-poster" data-dcnode-id="3645"><a data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3651" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3647" datetime="2022-02-08T16:33:06.000-08:00"><span data-dcnode-id="3648" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="3631"><p data-dcnode-id="3632"><span data-dcnode-id="3644" instrument_node="">Join Science at Cal - UC Berkeley and Berkeley Lab for their upcoming event, "Into the Blue Again: Water flowing underground," a virtual event Thur, Feb. 17 at noon! Like all of Science at Cal's events, this event is free and open to the public. Register today at </span><a class="auto" data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lbnl.zoom.us/webinar/register/WN_jUD6dK4rTBShT5tCkgcC1A" target="_blank"><span data-dcnode-id="3643" instrument_node="">https://lbnl.zoom.us/webinar/register/WN_jUD6dK4rTBShT5tCkgcC1A</span></a><span data-dcnode-id="3641" instrument_node=""> </span><br data-dcnode-id="3640"><br data-dcnode-id="3639"><span data-dcnode-id="3638" instrument_node="">Into the Blue Again: Water flowing underground</span><br data-dcnode-id="3637"><span data-dcnode-id="3636" instrument_node="">Thur, February 17, 2022 | 12:00–1:30 PM (PT)</span><br data-dcnode-id="3635"><br data-dcnode-id="3634"><span data-dcnode-id="3633" instrument_node="">Join Science at Cal and Berkeley Lab for their first Midday Science Cafe of 2022 as we take a look at Earth’s most valuable resource, water, stored beneath the Earth’s surface. First, we’ll hear from Dr. Federico Munch, who will take us on a journey deep beneath the surface to learn about the “deep water cycle.” That is, how plate tectonics redistribute water over large distances and timescales via the Earth's crust and mantle. This phenomenon has implications for seismic activity and volcanism. Next, we’ll hear from Dr. Bhavna Arora, who focuses on agricultural managed aquifer recharge, a strategy where farmers intentionally flood croplands to refill underlying pools of water. By studying the effects of varying flood frequency, duration between floods, amount of water, and different soil textures, Dr. Arora is looking into ways to reduce groundwater pollution.</span></p></div><div class="j-meta" data-dcnode-id="3624"><ul data-dcnode-id="3627"><li data-dcnode-id="3628"><a aria-label="Likes" class="likes" data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5153609254669510" target="_blank"><span data-dcnode-id="3630" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="3625"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5153609254669510" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3563" data-id="452685412" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3620" data-external-id="5137981999565569" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273398129_5137512872945815_5306853416713669484_n.png?stp=dst-png_s720x720&amp;_nc_cat=111&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=Zkeuqu0ulaoAX8h3-gk&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-bJ2YBv9WpgD7hbXoSS3mIElPcTJjKmK42m-BUGGlicA&amp;oe=6268AB5A" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5137981999565569" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/3/22 at 5:13PM" class="" data-dcnode-id="3621" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273398129_5137512872945815_5306853416713669484_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D111%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DZkeuqu0ulaoAX8h3-gk%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-bJ2YBv9WpgD7hbXoSS3mIElPcTJjKmK42m-BUGGlicA%26oe%3D6268AB5A&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3564"><div class="j-poster" data-dcnode-id="3613"><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3619" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3615" datetime="2022-02-03T17:13:02.000-08:00"><span data-dcnode-id="3616" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="3569"><p data-dcnode-id="3570"><span data-dcnode-id="3612" instrument_node="">Announcing an (free!) upcoming event from the Silicon Valley Astronomy Lecture Series! On Wednesday, Feb. 9th, 2022 at 7 pm (PST), Dr. Michelle Thaller (of NASA’s Goddard Space Flight Center) will give a free, illustrated, non-technical lecture on “Living with a Star: Creating and Maintaining a Life-Friendly Planet, in Our Solar System and Others" </span><br data-dcnode-id="3611"><br data-dcnode-id="3610"><span data-dcnode-id="3609" instrument_node="">This talk will be a live event on YouTube: </span><a class="auto" data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/SVAstronomyLectures" target="_blank"><span data-dcnode-id="3608" instrument_node="">http://www.youtube.com/SVAstronomyLectures</span></a><span data-dcnode-id="3606" instrument_node=""> </span><br data-dcnode-id="3605"><span data-dcnode-id="3604" instrument_node="">(If you go to the YouTube address the evening of the talk you will see and be able to participate in the live event; the talk will also be recorded.)</span><br data-dcnode-id="3603"><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">For more event details, visit </span><a class="auto" data-dcnode-id="3599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foothill.edu/events/%3Fsr%3D2%26rec_id%3D7831" target="_blank"><span data-dcnode-id="3600" instrument_node="">https://foothill.edu/events/?sr=2&amp;rec_id=7831</span></a><br data-dcnode-id="3598"><span data-dcnode-id="3597" instrument_node="">To learn more about the Silicon Valley Astronomy Lectures, visit </span><a class="auto" data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foothill.edu/astronomy/" target="_blank"><span data-dcnode-id="3596" instrument_node="">https://foothill.edu/astronomy/</span></a><br data-dcnode-id="3594"><br data-dcnode-id="3593"><span data-dcnode-id="3592" instrument_node="">“Living with a Star: Creating and Maintaining a Life-Friendly Planet, in Our Solar System and Others"</span><br data-dcnode-id="3591"><span data-dcnode-id="3590" instrument_node="">The more we learn about other worlds, the better we understand our own. Astronomers today ask: what makes a world habitable?  What creates and sustains an environment friendly to life?  NASA has several new missions ready to address this topic, from the Parker Solar Probe, studying our Sun’s wind; to new exploration of cloud-shrouded Venus; to the samples of asteroid now on their way back to Earth as we speak. And NASA’s climate supercomputers stand ready to interpret data on planets orbiting other stars that come back from the Webb Telescope. Dr. Thaller will guide us through the new instruments and new research. </span><br data-dcnode-id="3589"><br data-dcnode-id="3588"><span data-dcnode-id="3587" instrument_node="">The lecture is co-sponsored by: </span><br data-dcnode-id="3586"><span data-dcnode-id="3585" instrument_node="">* The Foothill College Science, Tech, Engineering &amp; Math Division </span><br data-dcnode-id="3584"><span data-dcnode-id="3583" instrument_node="">* The SETI Institute </span><br data-dcnode-id="3582"><span data-dcnode-id="3581" instrument_node="">* The Astronomical Society of the Pacific </span><br data-dcnode-id="3580"><span data-dcnode-id="3579" instrument_node="">* The University of California Observatories (including Lick Observatory). </span><br data-dcnode-id="3578"><br data-dcnode-id="3577"><span data-dcnode-id="3576" instrument_node="">Past lectures in the series can also be found on YouTube at: </span><a class="auto" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youtube.com/svastronomylectures" target="_blank"><span data-dcnode-id="3575" instrument_node="">http://youtube.com/svastronomylectures</span></a><span data-dcnode-id="3573" instrument_node=""> and as audio podcasts at: </span><a class="auto" data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1805595" target="_blank"><span data-dcnode-id="3572" instrument_node="">https://www.buzzsprout.com/1805595</span></a></p></div><div class="j-meta" data-dcnode-id="3565"><ul data-dcnode-id="3568"></ul><nav data-dcnode-id="3566"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5137981999565569" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="3550" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3561" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-12.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="3562" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-about-12.svg&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3551"><div class="j-poster" data-dcnode-id="3556"><a data-dcnode-id="3557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Profile image for Juicer" data-dcnode-id="3560" data-poster-id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/logo-without-text.svg&amp;raw"><h3 data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">Juicer</span></h3></a></div><div class="j-message" data-dcnode-id="3552"><span data-dcnode-id="3555" instrument_node="">This feed is Powered by </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science"><span data-dcnode-id="3554" instrument_node="">Juicer.io</span></a></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3505" data-id="452395846" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3548" data-external-id="5109805359049900" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272841204_5109069842456785_287983506795790819_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=7GjWGHnrcFoAX9dnHoB&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9N8B-i_qDlL0Igo0TLfM1c8fQ1wfiaGqB2GwWW_2AKaQ&amp;oe=6268215C" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5109805359049900" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/26/22 at 9:00PM" class="" data-dcnode-id="3549" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272841204_5109069842456785_287983506795790819_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D7GjWGHnrcFoAX9dnHoB%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9N8B-i_qDlL0Igo0TLfM1c8fQ1wfiaGqB2GwWW_2AKaQ%26oe%3D6268215C&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3506"><div class="j-poster" data-dcnode-id="3541"><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3547" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3543" datetime="2022-01-26T21:00:03.000-08:00"><span data-dcnode-id="3544" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="3511"><p data-dcnode-id="3512"><span data-dcnode-id="3540" instrument_node="">Looking for an opportunity to become more involved with the The Marine Mammal Center's work and make a real difference for the ocean and marine mammals you love? You're invited to join them for Stewardship Saturday, a program for high school students in grades 9-12. Learn more at </span><a class="auto" data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/stewardship-saturday" target="_blank"><span data-dcnode-id="3539" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/stewardship-saturday</span></a><br data-dcnode-id="3537"><br data-dcnode-id="3536"><span data-dcnode-id="3535" instrument_node="">Their next Stewardship Saturday event is this Saturday (Jan. 29)!</span><br data-dcnode-id="3534"><span data-dcnode-id="3533" instrument_node="">Theme: A New Year for Stewardship</span><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node="">Kick off your new year with a renewed commitment to conservation. Join us to learn, discuss and share new and exciting ideas for how you can make a truly meaningful new year’s resolution by being a steward of our shared ocean environment. From setting goals to taking action, we’ll workshop together how to make your conservation aspirations a reality.</span><br data-dcnode-id="3530"><span data-dcnode-id="3529" instrument_node="">When: January 29 from 10:30-noon PST (please plan to attend for the full event)</span><br data-dcnode-id="3528"><span data-dcnode-id="3527" instrument_node="">Where: Online via Zoom (register to get your Zoom link)</span><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node="">Cost: FREE</span><br data-dcnode-id="3524"><span data-dcnode-id="3523" instrument_node="">Please make sure to register before the event! </span><br data-dcnode-id="3522"><span data-dcnode-id="3521" instrument_node="">Registration link: </span><a class="auto" data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/stewardship-saturday" target="_blank"><span data-dcnode-id="3520" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/stewardship-saturday</span></a><br data-dcnode-id="3518"><br data-dcnode-id="3517"><span data-dcnode-id="3516" instrument_node="">Sign up now for these FREE learning opportunities with rotating themes exploring the science of the Center, shadowing researchers and veterinarians, creating action projects and more.</span><br data-dcnode-id="3515"><br data-dcnode-id="3514"><span data-dcnode-id="3513" instrument_node="">You can join the Center for one event or attend monthly, at no cost and with no commitment. All events will include the opportunity to learn more about ocean conservation and how to start taking action now.</span></p></div><div class="j-meta" data-dcnode-id="3507"><ul data-dcnode-id="3510"></ul><nav data-dcnode-id="3508"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5109805359049900" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3445" data-id="452170490" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3503" data-external-id="5099013300129106" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272591864_5098977093466060_9054042139173797159_n.png?stp=dst-png_p720x720&amp;_nc_cat=109&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=oQc2oW9mey8AX-aK2i6&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8ROmNfm6LvT7V8ftVHkOhhDbZByByQklmgxX5jairYOQ&amp;oe=62671C6D" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5099013300129106" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/24/22 at 11:56AM" class="" data-dcnode-id="3504" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272591864_5098977093466060_9054042139173797159_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D109%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DoQc2oW9mey8AX-aK2i6%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8ROmNfm6LvT7V8ftVHkOhhDbZByByQklmgxX5jairYOQ%26oe%3D62671C6D&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3446"><div class="j-poster" data-dcnode-id="3496"><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3502" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3498" datetime="2022-01-24T11:56:59.000-08:00"><span data-dcnode-id="3499" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="3457"><p data-dcnode-id="3458"><span data-dcnode-id="3495" instrument_node="">Registration is now open for Science at Cal - UC Berkeley's upcoming event, "The Renaissance of Astrophysics." This is Science at Cal's first event of the year and their first in-person event since February 2020! Like all of Science at Cal's events, this event is free and open to all ages. Registration is required -- register at </span><a class="auto" data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/234431128817" target="_blank"><span data-dcnode-id="3494" instrument_node="">https://www.eventbrite.com/e/234431128817</span></a><br data-dcnode-id="3492"><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node="">The Renaissance of Astrophysics: </span><br data-dcnode-id="3489"><span data-dcnode-id="3488" instrument_node="">A landscape of opportunities in the era of new observations</span><br data-dcnode-id="3487"><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">Sat, February 12, 2022 | 11:00 AM–12:15 PM (PT)</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">Doors open at 10:45 AM</span><br data-dcnode-id="3482"><br data-dcnode-id="3481"><span data-dcnode-id="3480" instrument_node="">Valley Life Sciences Building, Room 2050 </span><br data-dcnode-id="3479"><span data-dcnode-id="3478" instrument_node="">UC Berkeley Campus</span><br data-dcnode-id="3477"><br data-dcnode-id="3476"><span data-dcnode-id="3475" instrument_node="">In this talk, Dr. Raffaella Margutti, Professor in the Departments of Astronomy and Physics, will share how new capabilities to study the night sky have led to recent discoveries and new ways to think about the universe around us. Astronomical transients are events that appear and disappear in the sky and are signs of catastrophic events in space, including the most extreme stellar (star) deaths and interactions between stars and supermassive black holes. Thanks to new and improved observational facilities, which use measurements of gravitational waves and light, we can now sample the night sky for astronomical transients with unprecedented resolution across the electromagnetic spectrum and beyond. This effort has led to the discovery of new types of stellar explosions, revolutionized our understanding of phenomena that we thought we already knew, and enabled the first insights into the physics of how black holes and stars interact.</span><br data-dcnode-id="3474"><br data-dcnode-id="3473"><span data-dcnode-id="3472" instrument_node="">Event details: </span><a class="auto" data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//events.berkeley.edu/index.php/calendar/sn/SciatCal.html%3Fevent_ID%3D143955%26date%3D2022-02-12" target="_blank"><span data-dcnode-id="3471" instrument_node="">https://events.berkeley.edu/index.php/calendar/sn/SciatCal.html?event_ID=143955&amp;date=2022-02-12</span></a><br data-dcnode-id="3469"><br data-dcnode-id="3468"><span data-dcnode-id="3467" instrument_node="">REGISTRATION REQUIRED</span><br data-dcnode-id="3466"><span data-dcnode-id="3465" instrument_node="">This is an in-person event. In order to maintain capacity limits, registration will be required using the Eventbrite link above. Please bring a copy of your Eventbrite ticket to the event, either on your mobile device or printed out.</span><br data-dcnode-id="3464"><br data-dcnode-id="3463"><span data-dcnode-id="3462" instrument_node="">Science at Cal will follow any and all University and City of Berkeley COVID-19 guidelines at the time of the event. Masks and social distancing will be required. Please review UC Berkeley's guide to acceptable face coverings (</span><a class="auto" data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//coronavirus.berkeley.edu/face-coverings/" target="_blank"><span data-dcnode-id="3461" instrument_node="">https://coronavirus.berkeley.edu/face-coverings/</span></a><span data-dcnode-id="3459" instrument_node="">).</span></p></div><div class="j-meta" data-dcnode-id="3447"><ul data-dcnode-id="3450"><li data-dcnode-id="3454"><a aria-label="Comments" class="comments" data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5099013300129106" target="_blank"><span data-dcnode-id="3456" instrument_node="">1</span></a></li><li data-dcnode-id="3451"><a aria-label="Likes" class="likes" data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5099013300129106" target="_blank"><span data-dcnode-id="3453" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3448"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5099013300129106" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3413" data-id="451851886" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3443" data-external-id="5081928175170952" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272139640_5076716925692077_151047709783311006_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=111&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=SWNo2yo1CeMAX8GNWvx&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_ol-SOHaXHcAZ8eEaC-vFmCiRSUWEKLwxc3R2stAT8cg&amp;oe=62689442" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081928175170952" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/20/22 at 7:02PM" class="" data-dcnode-id="3444" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272139640_5076716925692077_151047709783311006_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D111%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DSWNo2yo1CeMAX8GNWvx%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_ol-SOHaXHcAZ8eEaC-vFmCiRSUWEKLwxc3R2stAT8cg%26oe%3D62689442&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3414"><div class="j-poster" data-dcnode-id="3436"><a data-dcnode-id="3437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3442" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3438" datetime="2022-01-20T19:02:02.000-08:00"><span data-dcnode-id="3439" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="3419"><p data-dcnode-id="3420"><span data-dcnode-id="3435" instrument_node="">Looking for a summer job? The East Bay Regional Park District will be hosting a (virtual) Youth Job Fair on January 29th that will feature  seasonal jobs that will be open during the summer. Whether you like spending time outdoors, working with kids, or lifeguarding on the beach, EBRPD has a wide variety of opportunities for youth. The job fair is a great opportunity to ask questions about the positions, wages, application, and interview process! </span><br data-dcnode-id="3434"><br data-dcnode-id="3433"><span data-dcnode-id="3432" instrument_node="">Participants must register via Zoom at </span><a class="auto" data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ebparks.zoom.us/meeting/register/tZUlf-msqDgpG9UILDIA-icELf0zypVxj6Bp" target="_blank"><span data-dcnode-id="3431" instrument_node="">https://ebparks.zoom.us/meeting/register/tZUlf-msqDgpG9UILDIA-icELf0zypVxj6Bp</span></a><span data-dcnode-id="3429" instrument_node=""> </span><br data-dcnode-id="3428"><br data-dcnode-id="3427"><span data-dcnode-id="3426" instrument_node="">The youth job fair is for is designed for applicants who are ages 15-24, although the minimum age requirement for most jobs is 16 years old. </span><br data-dcnode-id="3425"><br data-dcnode-id="3424"><span data-dcnode-id="3423" instrument_node="">EBRPD's parks have been busier than ever as many people have been coming out to enjoy nature during the pandemic. They anticipate another busy summer, and they're excited to offer youth the opportunity to build up those soft skills needed in the larger workforce and a chance to serve their community. Learn more about EBRPD's jobs for youth at </span><a class="auto" data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ebparks.org/jobs/youth" target="_blank"><span data-dcnode-id="3422" instrument_node="">https://www.ebparks.org/jobs/youth</span></a></p></div><div class="j-meta" data-dcnode-id="3415"><ul data-dcnode-id="3418"></ul><nav data-dcnode-id="3416"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081928175170952" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3381" data-id="451851888" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3411" data-external-id="5081231288573974" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272265753_5076639449033158_8682884112542041123_n.jpg?_nc_cat=110&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=Jj9RqlxNnw8AX-PgzUc&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8YYWzABG-m9oArxqOqJtGdsXRC92-zfwL8RiL0elQp2g&amp;oe=62684EE2" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081231288573974" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/20/22 at 2:54PM" class="" data-dcnode-id="3412" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272265753_5076639449033158_8682884112542041123_n.jpg%3F_nc_cat%3D110%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DJj9RqlxNnw8AX-PgzUc%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8YYWzABG-m9oArxqOqJtGdsXRC92-zfwL8RiL0elQp2g%26oe%3D62684EE2&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3382"><div class="j-poster" data-dcnode-id="3404"><a data-dcnode-id="3405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3410" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3406" datetime="2022-01-20T14:54:02.000-08:00"><span data-dcnode-id="3407" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="3390"><p data-dcnode-id="3391"><span data-dcnode-id="3403" instrument_node="">Announcing another volunteer opportunity! Harbor House is  looking for volunteers to share their gifts and talents in the fields of STEM with younger students at their weekly enrichment clubs.  These clubs allow for students to learn and engage in subjects and activities that they don't often have at school. </span><br data-dcnode-id="3402"><br data-dcnode-id="3401"><span data-dcnode-id="3400" instrument_node="">If you have an interest in sharing your hobby, talent or passions for STEM with 2nd-5th graders for 1 hour, once per week, please email Nicole at </span><a class="auto" data-dcnode-id="3398" href="mailto:nicole@hhministries.org" target="_blank"><span data-dcnode-id="3399" instrument_node="">nicole@hhministries.org</span></a><span data-dcnode-id="3397" instrument_node="">. </span><br data-dcnode-id="3396"><br data-dcnode-id="3395"><span data-dcnode-id="3394" instrument_node="">More about Harbor House: Harbor House is a Christian, community development organization in Oakland's San Antonio district and has been serving our community for the last 5 decades. Their after school program provides a healthy meal, homework help, play time and enrichment clubs to students from the local elementary school. Learn more at </span><a class="auto" data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hhministries.org/" target="_blank"><span data-dcnode-id="3393" instrument_node="">https://hhministries.org/</span></a></p></div><div class="j-meta" data-dcnode-id="3383"><ul data-dcnode-id="3386"><li data-dcnode-id="3387"><a aria-label="Likes" class="likes" data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081231288573974" target="_blank"><span data-dcnode-id="3389" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3384"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081231288573974" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3348" data-id="451851891" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3379" data-external-id="5080443938652709" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272249456_5076615285702241_8435818334696376771_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=103&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=fTwjBU6VKdwAX_lvItL&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-oMq1mzN6ZsnoAhOhEPe7-7-PkOjTz6maqV3C8oT3J0w&amp;oe=62679DB9" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5080443938652709" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/20/22 at 10:18AM" class="" data-dcnode-id="3380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272249456_5076615285702241_8435818334696376771_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D103%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DfTwjBU6VKdwAX_lvItL%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-oMq1mzN6ZsnoAhOhEPe7-7-PkOjTz6maqV3C8oT3J0w%26oe%3D62679DB9&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3349"><div class="j-poster" data-dcnode-id="3372"><a data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3378" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3374" datetime="2022-01-20T10:18:01.000-08:00"><span data-dcnode-id="3375" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="3357"><p data-dcnode-id="3358"><span data-dcnode-id="3371" instrument_node="">Did you know that trees talk? And they know family ties, and care for their young? Too fantastic to be true? Well, join Headwaters Science Institute  for a screening of the movie "Intelligent Trees" and a live Q-and-A with the filmmaker to explore those very questions.</span><br data-dcnode-id="3370"><br data-dcnode-id="3369"><span data-dcnode-id="3368" instrument_node="">The movie can be viewed anytime from Jan. 28 to Feb. 2. Sign up at </span><a class="auto" data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/intelligent-trees-documentary-screening-live-q-and-a-tickets-243251049437%3Fkeep_tld%3D1" target="_blank"><span data-dcnode-id="3367" instrument_node="">https://www.eventbrite.com/e/intelligent-trees-documentary-screening-live-q-and-a-tickets-243251049437?keep_tld=1</span></a><span data-dcnode-id="3365" instrument_node=""> and you'll receive a link via email.</span><br data-dcnode-id="3364"><br data-dcnode-id="3363"><span data-dcnode-id="3362" instrument_node="">After watching the film, Headwaters welcomes you to join the Headwaters community for a virtual discussion session with filmmaker Julia Dordel. This will be live on the Headwaters Facebook page and Youtube page at 8:30 am PST on Feb. 4. Email your questions to </span><a class="auto" data-dcnode-id="3360" href="mailto:dan@headwatersscienceinstitute.org" target="_blank"><span data-dcnode-id="3361" instrument_node="">dan@headwatersscienceinstitute.org</span></a><span data-dcnode-id="3359" instrument_node=""> before Feb. 4 or ask your question live so Julia to ensure a lively discussion.</span></p></div><div class="j-meta" data-dcnode-id="3350"><ul data-dcnode-id="3353"><li data-dcnode-id="3354"><a aria-label="Likes" class="likes" data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5080443938652709" target="_blank"><span data-dcnode-id="3356" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3351"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5080443938652709" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3319" data-id="451722708" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3346" data-external-id="5057461930950910" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271882563_5049273605103076_2026024714561781603_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=p97Jqs8ijTYAX_oIPom&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-Fnkrvfx9nuScvzEDI7DZp6ZXizc22S7KmwGiH0IkJAQ&amp;oe=62687514" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5057461930950910" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/15/22 at 9:26AM" class="" data-dcnode-id="3347" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271882563_5049273605103076_2026024714561781603_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dp97Jqs8ijTYAX_oIPom%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-Fnkrvfx9nuScvzEDI7DZp6ZXizc22S7KmwGiH0IkJAQ%26oe%3D62687514&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3320"><div class="j-poster" data-dcnode-id="3339"><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3345" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3341" datetime="2022-01-15T09:26:01.000-08:00"><span data-dcnode-id="3342" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="3328"><p data-dcnode-id="3329"><span data-dcnode-id="3338" instrument_node="">The deadline to start an application for Inspiring Girls Expeditions is coming up soon! Inspiring Girls offers tuition-FREE expeditions that aim to empower 16-18 year-old girls and gender-expansive youth through science, art, and wilderness exploration. </span><br data-dcnode-id="3337"><br data-dcnode-id="3336"><span data-dcnode-id="3335" instrument_node="">The deadline to start an application is Monday, January 24, 2022, so apply soon at </span><a class="auto" data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inspiringgirls.org/about-applying" target="_blank"><span data-dcnode-id="3334" instrument_node="">https://www.inspiringgirls.org/about-applying</span></a><br data-dcnode-id="3332"><br data-dcnode-id="3331"><span data-dcnode-id="3330" instrument_node="">No experience is necessary and grades are not a factor. Their expeditions are not awards for academic achievement, but are inspiration for future leadership, curiosity, courage, and success. All are invited to apply, but they particularly welcome students who feel they wouldn't be suited to our program or haven't had many similar opportunities.</span></p></div><div class="j-meta" data-dcnode-id="3321"><ul data-dcnode-id="3324"><li data-dcnode-id="3325"><a aria-label="Likes" class="likes" data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5057461930950910" target="_blank"><span data-dcnode-id="3327" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="3322"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5057461930950910" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3289" data-id="451684437" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3317" data-external-id="5050102438353526" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271922349_5049259428437827_1315932612327323036_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=111&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=vBkMSatfQNwAX8WoluK&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9lgOegL1Df0kkJa1qruaejMnDS7cxykpD23J_OgvlRxA&amp;oe=62677685" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5050102438353526" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/13/22 at 7:23PM" class="" data-dcnode-id="3318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271922349_5049259428437827_1315932612327323036_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D111%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DvBkMSatfQNwAX8WoluK%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9lgOegL1Df0kkJa1qruaejMnDS7cxykpD23J_OgvlRxA%26oe%3D62677685&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3290"><div class="j-poster" data-dcnode-id="3310"><a data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3316" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3312" datetime="2022-01-13T19:23:06.000-08:00"><span data-dcnode-id="3313" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="3298"><p data-dcnode-id="3299"><span data-dcnode-id="3309" instrument_node="">Announcing UC Berkeley's ROAR Academy! ROAR Academy is a rigorous, intensive two-week online summer program for advanced high school students interested in learning about Python programming and introductory autonomous driving algorithms. This summer program is in partnership with the FHL Vive Center, an AR/VR research center at UC Berkeley.</span><br data-dcnode-id="3308"><br data-dcnode-id="3307"><span data-dcnode-id="3306" instrument_node="">Applications are open, and ROAR offers need-based financial aid. To learn more about ROAR Academy visit roar.berkeley.edu/roar-academy. </span><br data-dcnode-id="3305"><br data-dcnode-id="3304"><span data-dcnode-id="3303" instrument_node="">Early Application Deadline: March 18, 2022. Applications are reviewed on a rolling basis, so you're encouraged to submit your completed application as soon as possible.</span><br data-dcnode-id="3302"><br data-dcnode-id="3301"><span data-dcnode-id="3300" instrument_node="">The goal of the academy is to support high school students in their exploration of science, technology, engineering and mathematics (STEM) subjects as a career path and provide an in-depth, interactive overview of undergraduate engineering majors, programming, hardware and software design. Students will be primarily learning about python programming and machine learning. Students will then be invited to race their autonomous driving agents and compete in the 2022 Summer ROAR Competition. After completing the program, students will have the opportunity to become ROAR Ambassadors, participate in all future ROAR competitions and seminars, and will receive a certificate of completion.</span></p></div><div class="j-meta" data-dcnode-id="3291"><ul data-dcnode-id="3294"><li data-dcnode-id="3295"><a aria-label="Likes" class="likes" data-dcnode-id="3296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5050102438353526" target="_blank"><span data-dcnode-id="3297" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3292"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5050102438353526" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3256" data-id="451115389" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3287" data-external-id="4972400419457062" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/269765046_4972366542793783_5995520473785636161_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=J3P1KYoCrSMAX-Gk2R0&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT91u5seoz6z7wKFjJvxrX0N1yHcNSByi6txVPt-2-Bk-A&amp;oe=6267A0EE" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4972400419457062" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/22/21 at 6:50AM" class="" data-dcnode-id="3288" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/269765046_4972366542793783_5995520473785636161_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DJ3P1KYoCrSMAX-Gk2R0%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT91u5seoz6z7wKFjJvxrX0N1yHcNSByi6txVPt-2-Bk-A%26oe%3D6267A0EE&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3257"><div class="j-poster" data-dcnode-id="3280"><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3286" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3282" datetime="2021-12-22T06:50:51.000-08:00"><span data-dcnode-id="3283" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="3262"><p data-dcnode-id="3263"><span data-dcnode-id="3279" instrument_node="">Ever wonder about the birds that call your backyard home? Looking for an activity that’s fun, free and easy to fill some downtime over the winter break?</span><br data-dcnode-id="3278"><br data-dcnode-id="3277"><span data-dcnode-id="3276" instrument_node="">Headwaters Science Institute is excited to announce a free, five-day research project challenging students to study something we see outside our windows every day -- backyard birds. This is a great way for students to participate in outdoor science during the winter break doldrums with an easy and interactive research project, and all they need is a simple backyard bird feeder. </span><br data-dcnode-id="3275"><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">Learn more and register here: </span><a class="auto" data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//headwatersscienceinstitute.org/announcing-winter-break-backyard/" target="_blank"><span data-dcnode-id="3272" instrument_node="">https://headwatersscienceinstitute.org/announcing-winter-break-backyard/</span></a><span data-dcnode-id="3270" instrument_node="">  (There's even a video that shows an easy way to build a backyard bird feeder!)</span><br data-dcnode-id="3269"><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">Student scientists will need to build or purchase a bird feeder, and it's recommended that the feeder is placed outside at least five days before the start of the challenge so the birds are able to find it. </span><br data-dcnode-id="3266"><br data-dcnode-id="3265"><span data-dcnode-id="3264" instrument_node="">The challenge will take place December 27-31, 2021. Headwaters will host a series of interactive sessions to guide students through the research process. Students will leave the challenge with a greater understanding of question asking and how to work as a scientist in the field.</span></p></div><div class="j-meta" data-dcnode-id="3258"><ul data-dcnode-id="3261"></ul><nav data-dcnode-id="3259"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4972400419457062" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3206" data-id="450910792" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3254" data-external-id="4940430085987429" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/268578449_4940426319321139_9079254264466656573_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=cLtastCXxPYAX9kp9O4&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8_iWgAlLqvKqnqo2NY7rtHEsamgKoy3-JE9jp2CZ583w&amp;oe=62683015" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4940430085987429" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/15/21 at 12:52PM" class="" data-dcnode-id="3255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/268578449_4940426319321139_9079254264466656573_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DcLtastCXxPYAX9kp9O4%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8_iWgAlLqvKqnqo2NY7rtHEsamgKoy3-JE9jp2CZ583w%26oe%3D62683015&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3207"><div class="j-poster" data-dcnode-id="3247"><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3253" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3249" datetime="2021-12-15T12:52:15.000-08:00"><span data-dcnode-id="3250" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="3215"><p data-dcnode-id="3216"><span data-dcnode-id="3246" instrument_node="">Calling middle school students -- join Berkeley Lab K-12 STEM for a program TODAY at 3pm! Register at </span><a class="auto" data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lbnl.zoom.us/meeting/register/tJwrd-Guqz0rHNQPlSrJldi0RtNKEZ2pealo" target="_blank"><span data-dcnode-id="3245" instrument_node="">https://lbnl.zoom.us/meeting/register/tJwrd-Guqz0rHNQPlSrJldi0RtNKEZ2pealo</span></a><br data-dcnode-id="3243"><br data-dcnode-id="3242"><span data-dcnode-id="3241" instrument_node="">The Inner Life of Light</span><br data-dcnode-id="3240"><span data-dcnode-id="3239" instrument_node="">From holiday string lights to the bright sun in the sky, light is everywhere around us - but what really is light? Get all your questions about light answered by Berkeley Lab scientists Baishakhi Bose, Mayank Sabharwal, and Yu Gao during December's After School Science Hour about the inner life of light. You'll also get to make your own sky simulator and learn the reasons behind the sky's changing colors.</span><br data-dcnode-id="3238"><br data-dcnode-id="3237"><span data-dcnode-id="3236" instrument_node="">(The After School Science Hour series is geared to elementary and middle school students.)</span><br data-dcnode-id="3235"><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node="">What you will need:</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">-- Transparent plastic container, or a clear glass pitcher, tall jar</span><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">-- Water</span><br data-dcnode-id="3228"><span data-dcnode-id="3227" instrument_node="">-- About a 1/4 cup of milk for a transparent plastic container. Less can be used for a smaller glass jar. Powdered milk can be used instead.</span><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">-- Flashlight (phone flashlight works too!)</span><br data-dcnode-id="3224"><br data-dcnode-id="3223"><span data-dcnode-id="3222" instrument_node="">One of the scientists will walk through the steps for the demo. Once participants register, they will receive a link to the Zoom room. Please also note that this session is being recorded. </span><br data-dcnode-id="3221"><br data-dcnode-id="3220"><span data-dcnode-id="3219" instrument_node="">Missed this event? A recording will be available at </span><a class="auto" data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k12education.lbl.gov/programs/elementary-school" target="_blank"><span data-dcnode-id="3218" instrument_node="">https://k12education.lbl.gov/programs/elementary-school</span></a></p></div><div class="j-meta" data-dcnode-id="3208"><ul data-dcnode-id="3211"><li data-dcnode-id="3212"><a aria-label="Likes" class="likes" data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4940430085987429" target="_blank"><span data-dcnode-id="3214" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3209"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4940430085987429" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="3193" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3204" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-12.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="3205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-about-12.svg&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3194"><div class="j-poster" data-dcnode-id="3199"><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Profile image for Juicer" data-dcnode-id="3203" data-poster-id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/logo-without-text.svg&amp;raw"><h3 data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Juicer</span></h3></a></div><div class="j-message" data-dcnode-id="3195"><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science"><span data-dcnode-id="3198" instrument_node="">Juicer.io</span></a><span data-dcnode-id="3196" instrument_node=""> lets you easily create and embed social media feeds like this one on to your site for free!</span></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3170" data-id="450482126" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3191" data-external-id="4896007780429660" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/263285405_4895749843788787_1755192710856661567_n.png?stp=dst-png_s720x720&amp;_nc_cat=106&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=9WsFsmDPv5oAX_jTKcO&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_Vu-Vbq8DXzLQp_GNqaCAiFLWp2ugplcuWbmS__oW3hg&amp;oe=6267CBEA" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4896007780429660" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/2/21 at 4:16PM" class="" data-dcnode-id="3192" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/263285405_4895749843788787_1755192710856661567_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D106%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D9WsFsmDPv5oAX_jTKcO%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_Vu-Vbq8DXzLQp_GNqaCAiFLWp2ugplcuWbmS__oW3hg%26oe%3D6267CBEA&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3171"><div class="j-poster" data-dcnode-id="3184"><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3190" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3186" datetime="2021-12-02T16:16:58.000-08:00"><span data-dcnode-id="3187" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="3176"><p data-dcnode-id="3177"><span data-dcnode-id="3183" instrument_node="">Are you interested in participating in a FREE STEM program or volunteering to teach younger students? Local high school students have partnered with Stemettes, a nonprofit organization that aims to inspire and support the next generation of women and non-binary people in STEM fields, to offer a program for 4-14 year olds. The program will include weekly or biweekly cohort sessions (each cohort with 10-13 students of similar age), professional guest panels, STEM events and more! The program is open to all elementary through middle school girls (4-14 years old) in California and is completely free and online with flexible times. </span><br data-dcnode-id="3182"><span data-dcnode-id="3181" instrument_node="">Visit </span><a class="auto" data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taplink.cc/stemillions.california" target="_blank"><span data-dcnode-id="3180" instrument_node="">https://taplink.cc/stemillions.california</span></a><span data-dcnode-id="3178" instrument_node=""> to learn more about the program and sign up.</span></p></div><div class="j-meta" data-dcnode-id="3172"><ul data-dcnode-id="3175"></ul><nav data-dcnode-id="3173"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4896007780429660" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3135" data-id="449817746" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3168" data-external-id="4838867326143706" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/257634751_4838185879545184_2482835822805725112_n.jpg?stp=dst-jpg_p480x480&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=SdIruFmbug0AX_6kTEu&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-EeVdclzbYSw2IFnQNLbXt5kaV0hglysUNGwv31DV8FA&amp;oe=6267C34F" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4838867326143706" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/15/21 at 3:45PM" class="" data-dcnode-id="3169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/257634751_4838185879545184_2482835822805725112_n.jpg%3Fstp%3Ddst-jpg_p480x480%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DSdIruFmbug0AX_6kTEu%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-EeVdclzbYSw2IFnQNLbXt5kaV0hglysUNGwv31DV8FA%26oe%3D6267C34F&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3136"><div class="j-poster" data-dcnode-id="3161"><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3167" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3163" datetime="2021-11-15T15:45:07.000-08:00"><span data-dcnode-id="3164" instrument
