raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2030"><div class="j-poster" data-dcnode-id="2050"><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2056" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2052" datetime="2022-01-20T13:50:03.000-08:00"><span data-dcnode-id="2053" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="2041"><p data-dcnode-id="2042"><span data-dcnode-id="2049" instrument_node="">Announcing Science at Cal - UC Berkeley's spring lineup! Plus more exciting news -- the Science at Cal Lecture Series will return to Saturday mornings on UC Berkeley's campus. The Midday Science Cafe, a collaboration between Science at Cal and Berkeley Lab, is also planning a great series of presentations starting in February. Like all of Science at Cal's events, these series are free and open to all ages.</span><br data-dcnode-id="2048"><br data-dcnode-id="2047"><span data-dcnode-id="2046" instrument_node="">Find out more about these upcoming events at </span><a class="auto" data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scienceatcal.berkeley.edu/all-programs/" target="_blank"><span data-dcnode-id="2045" instrument_node="">https://scienceatcal.berkeley.edu/all-programs/</span></a><span data-dcnode-id="2043" instrument_node="">.</span></p></div><div class="j-meta" data-dcnode-id="2031"><ul data-dcnode-id="2034"><li data-dcnode-id="2038"><a aria-label="Comments" class="comments" data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081067521923684" target="_blank"><span data-dcnode-id="2040" instrument_node="">1</span></a></li><li data-dcnode-id="2035"><a aria-label="Likes" class="likes" data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081067521923684" target="_blank"><span data-dcnode-id="2037" instrument_node="">3</span></a></li></ul><nav data-dcnode-id="2032"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081067521923684" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1996" data-id="451821219" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2027" data-external-id="5076561475707622" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271896860_5049210141776089_7865964972807712049_n.jpg?stp=dst-jpg_p480x480&amp;_nc_cat=106&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=y80yGGBiYx8AX-RUaQ9&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8OOjveylIdoDeNaN53pKIPqWVGDaOJs9h5M9m3xMwwzw&amp;oe=6268796E" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5076561475707622" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/19/22 at 3:12PM" class="" data-dcnode-id="2028" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271896860_5049210141776089_7865964972807712049_n.jpg%3Fstp%3Ddst-jpg_p480x480%26_nc_cat%3D106%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dy80yGGBiYx8AX-RUaQ9%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8OOjveylIdoDeNaN53pKIPqWVGDaOJs9h5M9m3xMwwzw%26oe%3D6268796E&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1997"><div class="j-poster" data-dcnode-id="2020"><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2026" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2022" datetime="2022-01-19T15:12:52.000-08:00"><span data-dcnode-id="2023" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="2005"><p data-dcnode-id="2006"><span data-dcnode-id="2019" instrument_node="">Applications for the Careers in Science Internship Program at the California Academy of Sciences open on February 1, 2022! The Careers in Science (CiS) program is a multi-year, year-round science internship and youth development program for high school students who come from groups typically underrepresented in the sciences.</span><br data-dcnode-id="2018"><br data-dcnode-id="2017"><span data-dcnode-id="2016" instrument_node="">Applicants must be currently enrolled in grades 9 or 10 and live and attend school in San Francisco. This is a paid, year-round, multi-year internship beginning June 2022 through high school graduation. </span><br data-dcnode-id="2015"><br data-dcnode-id="2014"><span data-dcnode-id="2013" instrument_node="">For more information, visit </span><a class="auto" data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calacademy.org/youth-programs" target="_blank"><span data-dcnode-id="2012" instrument_node="">https://www.calacademy.org/youth-programs</span></a><span data-dcnode-id="2010" instrument_node="">. Please contact </span><a class="auto" data-dcnode-id="2008" href="mailto:youthprograms@calacademy.org" target="_blank"><span data-dcnode-id="2009" instrument_node="">youthprograms@calacademy.org</span></a><span data-dcnode-id="2007" instrument_node=""> with any questions.</span></p></div><div class="j-meta" data-dcnode-id="1998"><ul data-dcnode-id="2001"><li data-dcnode-id="2002"><a aria-label="Likes" class="likes" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5076561475707622" target="_blank"><span data-dcnode-id="2004" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="1999"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5076561475707622" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1970" data-id="451707328" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1994" data-external-id="5053992804631156" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271881033_5049299355100501_6034062573779585610_n.png?stp=dst-png_s720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=HWkpOkv0qzIAX8ut5Ng&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-mao2i0Z_A0z5rPfX4rJNURAeKIspQxllOrqYSUECDig&amp;oe=62676795" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5053992804631156" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/14/22 at 3:20PM" class="" data-dcnode-id="1995" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271881033_5049299355100501_6034062573779585610_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DHWkpOkv0qzIAX8ut5Ng%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-mao2i0Z_A0z5rPfX4rJNURAeKIspQxllOrqYSUECDig%26oe%3D62676795&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1971"><div class="j-poster" data-dcnode-id="1987"><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1993" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1989" datetime="2022-01-14T15:20:01.000-08:00"><span data-dcnode-id="1990" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="1976"><p data-dcnode-id="1977"><span data-dcnode-id="1986" instrument_node="">Attention 8th grade girls! Argonne’s Introduce a Girl to Engineering Day gives young female students a unique opportunity to discover Engineering careers alongside world class scientists and engineers. Come to Introduce a Girl to Engineering Day, and find out why beautiful minds engineer.</span><br data-dcnode-id="1985"><br data-dcnode-id="1984"><span data-dcnode-id="1983" instrument_node="">Learn more and apply at </span><a class="auto" data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.anl.gov/wist/activities/introduce-a-girl-to-engineering-day-iged/" target="_blank"><span data-dcnode-id="1982" instrument_node="">https://blogs.anl.gov/wist/activities/introduce-a-girl-to-engineering-day-iged/</span></a><br data-dcnode-id="1980"><br data-dcnode-id="1979"><span data-dcnode-id="1978" instrument_node="">The 2022 Introduce a Girl to Engineering Day is Friday, February 18, 2022 and will be held VIRTUALLY. Applications close January 19, 2022. All applicants must be in eighth grade and need to complete the online application. Space for the event is limited and participants will be selected by a lottery system.</span></p></div><div class="j-meta" data-dcnode-id="1972"><ul data-dcnode-id="1975"></ul><nav data-dcnode-id="1973"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5053992804631156" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1936" data-id="451684438" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1968" data-external-id="5049402108423559" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271858337_5049246851772418_4420232162490255759_n.png?_nc_cat=100&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=DT-KaokX4jMAX8D2Et0&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9KCtRrKCJNKP7yMdQiDH_AG_AzCw9b35jVHLMt2YNopg&amp;oe=626896DC" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5049402108423559" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/13/22 at 3:18PM" class="" data-dcnode-id="1969" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271858337_5049246851772418_4420232162490255759_n.png%3F_nc_cat%3D100%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DDT-KaokX4jMAX8D2Et0%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9KCtRrKCJNKP7yMdQiDH_AG_AzCw9b35jVHLMt2YNopg%26oe%3D626896DC&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1937"><div class="j-poster" data-dcnode-id="1961"><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1967" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1963" datetime="2022-01-13T15:18:01.000-08:00"><span data-dcnode-id="1964" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="1945"><p data-dcnode-id="1946"><span data-dcnode-id="1960" instrument_node="">High school students are invited to join HealthEquityPlus! HealthEquityPlus is a non-profit organization led by a youth group that advocates and educates the community about health equity. Their mission is to teach the community about the disparities in healthcare among different groups and how to make a difference by pushing for equity in healthcare for all. </span><br data-dcnode-id="1959"><br data-dcnode-id="1958"><span data-dcnode-id="1957" instrument_node="">Apply to join them at </span><a class="auto" data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthequityplus.net/join-as-a-member/" target="_blank"><span data-dcnode-id="1956" instrument_node="">https://healthequityplus.net/join-as-a-member/</span></a><span data-dcnode-id="1954" instrument_node=""> </span><br data-dcnode-id="1953"><span data-dcnode-id="1952" instrument_node="">They have multiple positions open in the director role or you can join as a member!</span><br data-dcnode-id="1951"><br data-dcnode-id="1950"><span data-dcnode-id="1949" instrument_node="">Learn more at </span><a class="auto" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthequityplus.net/" target="_blank"><span data-dcnode-id="1948" instrument_node="">https://healthequityplus.net/</span></a></p></div><div class="j-meta" data-dcnode-id="1938"><ul data-dcnode-id="1941"><li data-dcnode-id="1942"><a aria-label="Likes" class="likes" data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5049402108423559" target="_blank"><span data-dcnode-id="1944" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="1939"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5049402108423559" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1884" data-id="451000906" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1934" data-external-id="4954703357893435" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/269244387_4954678454562592_682321106098220060_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=p3RAZnHVwLIAX_6GkO6&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_54QS6hy0Gu8VFmCGkCbWUJ7WB5UhrFP82nbUe7olWrw&amp;oe=6268F4B9" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4954703357893435" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/18/21 at 11:30AM" class="" data-dcnode-id="1935" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/269244387_4954678454562592_682321106098220060_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D107%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dp3RAZnHVwLIAX_6GkO6%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_54QS6hy0Gu8VFmCGkCbWUJ7WB5UhrFP82nbUe7olWrw%26oe%3D6268F4B9&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1885"><div class="j-poster" data-dcnode-id="1927"><a data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1933" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1929" datetime="2021-12-18T11:30:21.000-08:00"><span data-dcnode-id="1930" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="1890"><p data-dcnode-id="1891"><span data-dcnode-id="1926" instrument_node="">The SMASH application is now open for 9th graders! SMASH is a 3 year, intensive and holistic STEM focused college prep program that empowers students to deepen their talents and pursue STEM careers. Each summer, scholars are immersed in tuition-free studies in partnership with leading universities throughout the country. Learn more about SMASH at </span><a class="auto" data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smash.org/" target="_blank"><span data-dcnode-id="1925" instrument_node="">https://www.smash.org/</span></a><br data-dcnode-id="1923"><br data-dcnode-id="1922"><span data-dcnode-id="1921" instrument_node="">Apply at </span><a class="auto" data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.smash.org/apply" target="_blank"><span data-dcnode-id="1920" instrument_node="">www.smash.org/apply</span></a><span data-dcnode-id="1918" instrument_node="">. The deadline to apply will be March 1st, 2022. </span><br data-dcnode-id="1917"><br data-dcnode-id="1916"><span data-dcnode-id="1915" instrument_node="">SMASH prepares students for college and careers in STEM by:</span><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node="">-- Hosting students to live and study at a university campus for 3 summers at no cost to students.</span><br data-dcnode-id="1912"><span data-dcnode-id="1911" instrument_node="">-- Exposing students to the many careers in STEM and computer science that they can pursue and ways they can use STEM and technology to advance their communities.</span><br data-dcnode-id="1910"><span data-dcnode-id="1909" instrument_node="">-- Expanding students’ peer and adult networks by immersing them in weekly networking nights, speaker series, field trips and a tight-knit community of peers.</span><br data-dcnode-id="1908"><span data-dcnode-id="1907" instrument_node="">-- Supporting students through high school, college applications, college and career preparation.</span><br data-dcnode-id="1906"><span data-dcnode-id="1905" instrument_node=""> </span><br data-dcnode-id="1904"><span data-dcnode-id="1903" instrument_node="">SMASH's mission is to diversify the field of STEM so they focus on students who are underrepresented in the field. They are looking for 9th graders who meet the following criteria:</span><br data-dcnode-id="1902"><span data-dcnode-id="1901" instrument_node="">-- High-achieving (minimum 3.0 GPA, with an interest in math and science)</span><br data-dcnode-id="1900"><span data-dcnode-id="1899" instrument_node="">-- Low-income (preferably eligible for Free/Reduced Lunch)</span><br data-dcnode-id="1898"><span data-dcnode-id="1897" instrument_node="">-- Underrepresented student of color in STEM</span><br data-dcnode-id="1896"><br data-dcnode-id="1895"><span data-dcnode-id="1894" instrument_node="">Don't wait, apply today! </span><a class="auto" data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.smash.org/apply" target="_blank"><span data-dcnode-id="1893" instrument_node="">www.smash.org/apply</span></a></p></div><div class="j-meta" data-dcnode-id="1886"><ul data-dcnode-id="1889"></ul><nav data-dcnode-id="1887"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4954703357893435" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1860" data-id="450683406" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1882" data-external-id="4916492278381210" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/265092990_4913159775381127_7290706710931960260_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=104&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=f3cjEmgjM8YAX9vQ4dO&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_TqszISMp8CarLVCiujtNQhEVQe92iWITSf6d09DgSkg&amp;oe=6268CBDC" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4916492278381210" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/8/21 at 12:15PM" class="" data-dcnode-id="1883" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/265092990_4913159775381127_7290706710931960260_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Df3cjEmgjM8YAX9vQ4dO%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_TqszISMp8CarLVCiujtNQhEVQe92iWITSf6d09DgSkg%26oe%3D6268CBDC&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1861"><div class="j-poster" data-dcnode-id="1875"><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1881" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1877" datetime="2021-12-08T12:15:03.000-08:00"><span data-dcnode-id="1878" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="1869"><p data-dcnode-id="1870"><span data-dcnode-id="1874" instrument_node="">Girls Who Code teamed up with Grammy-nominated global superstar Doja Cat to launch the world’s first-ever codable music video for her hit song, Woman. You can control the story using code -- try it now at </span><a class="auto" data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dojacode.com/" target="_blank"><span data-dcnode-id="1873" instrument_node="">http://dojacode.com</span></a><span data-dcnode-id="1871" instrument_node="">!</span></p></div><div class="j-meta" data-dcnode-id="1862"><ul data-dcnode-id="1865"><li data-dcnode-id="1866"><a aria-label="Likes" class="likes" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4916492278381210" target="_blank"><span data-dcnode-id="1868" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="1863"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4916492278381210" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1832" data-id="450610742" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1858" data-external-id="4910173985679706" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/264973290_4909629399067498_7205914899124187220_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=108&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=ZPy_odvVEHsAX929c9q&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-SFd3A7k4drohlW8EWq25er1km4zrXGTIHl8VA_Xjj8g&amp;oe=62671BC9" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4910173985679706" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/6/21 at 5:30PM" class="" data-dcnode-id="1859" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/264973290_4909629399067498_7205914899124187220_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D108%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DZPy_odvVEHsAX929c9q%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-SFd3A7k4drohlW8EWq25er1km4zrXGTIHl8VA_Xjj8g%26oe%3D62671BC9&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1833"><div class="j-poster" data-dcnode-id="1851"><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1857" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1853" datetime="2021-12-06T17:30:02.000-08:00"><span data-dcnode-id="1854" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="1838"><p data-dcnode-id="1839"><span data-dcnode-id="1850" instrument_node="">How can you create beats? You might think of beatboxing, drumming, or even just tapping pens on a desk, but did you know you can code beats? Join Berkeley Lab K-12 STEM for their next Live Science on December 10th at 2pm PT to explore the intersection of beat-making and coding, with a focus on the beat machine and the origins of Boom Bap shared by their friends at Microphone Mechanics. There will also be an interactive session using EarSketch, a platform developed by Georgia Tech that uses Python and block coding to create beats and music.</span><br data-dcnode-id="1849"><br data-dcnode-id="1848"><span data-dcnode-id="1847" instrument_node="">Register at </span><a class="auto" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k12education.lbl.gov/programs/virtual/live-science" target="_blank"><span data-dcnode-id="1846" instrument_node="">https://k12education.lbl.gov/programs/virtual/live-science</span></a><br data-dcnode-id="1844"><br data-dcnode-id="1843"><span data-dcnode-id="1842" instrument_node="">Everyone is encouraged to create a free EarSketch account ahead of time. Follow the instructions here: </span><a class="auto" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drive.google.com/file/d/1ex6TtTzL8Ax94z0y5xVfVYGZQbCc_P0y/view" target="_blank"><span data-dcnode-id="1841" instrument_node="">https://drive.google.com/file/d/1ex6TtTzL8Ax94z0y5xVfVYGZQbCc_P0y/view</span></a></p></div><div class="j-meta" data-dcnode-id="1834"><ul data-dcnode-id="1837"></ul><nav data-dcnode-id="1835"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4910173985679706" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1809" data-id="450482128" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1830" data-external-id="4895747060455732" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/263563010_4895726550457783_1461174719071644037_n.png?stp=dst-png_p720x720&amp;_nc_cat=111&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=5BO9B4hBHgcAX-S5ovp&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_CJjhRaahB8OORXEoGNMe0y-4BEeyOpMxrFakF6QsI_A&amp;oe=6268447A" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4895747060455732" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 12/2/21 at 2:30PM" class="" data-dcnode-id="1831" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/263563010_4895726550457783_1461174719071644037_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D111%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D5BO9B4hBHgcAX-S5ovp%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_CJjhRaahB8OORXEoGNMe0y-4BEeyOpMxrFakF6QsI_A%26oe%3D6268447A&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1810"><div class="j-poster" data-dcnode-id="1823"><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1829" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1825" datetime="2021-12-02T14:30:05.000-08:00"><span data-dcnode-id="1826" instrument_node="">4mo</span></time></a></div><div class="j-message" data-dcnode-id="1815"><p data-dcnode-id="1816"><span data-dcnode-id="1822" instrument_node="">Young Women In Bio SF is hosting a virtual career panel + Q&amp;A session on Tuesday, December 7th, from 4:00-5:30 pm PST. The event features 3 wonderful PhD students from UC Davis who will share their journeys to science, their experiences as graduate students, and their research on plants and microbes.</span><br data-dcnode-id="1821"><br data-dcnode-id="1820"><span data-dcnode-id="1819" instrument_node="">This event is FREE and open to all students. Register and learn more about the speakers here: </span><a class="auto" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninbio.org/events/EventDetails.aspx%3Fid%3D1573566%26group%3D" target="_blank"><span data-dcnode-id="1818" instrument_node="">ht ebcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4793751823988590" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/1/21 at 4:24PM" class="" data-dcnode-id="1719" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/251613944_4793736910656748_3544337677676970985_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D108%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DxbC3y3OqlsgAX8D7Nto%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9AYikfL4Ajt4JefI9slLq0Y8TM6gv7QJ0-J_cPOTcRlQ%26oe%3D62671627&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1672"><div class="j-poster" data-dcnode-id="1711"><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1717" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1713" datetime="2021-11-01T16:24:21.000-07:00"><span data-dcnode-id="1714" instrument_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="1677"><p data-dcnode-id="1678"><span data-dcnode-id="1710" instrument_node="">Join Teen Tech SF for the 2021 TeenTechSF Fall Workshops Series starting November 7th, an amazing opportunity for teens to explore the world of STEM! All of TeenTechSF's events are free and their award-winning workshops are peer-led.</span><br data-dcnode-id="1709"><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node="">Learn more and register at</span><br data-dcnode-id="1706"><a class="auto" data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2021-ttsf-fall-workshop-series.eventbrite.com/" target="_blank"><span data-dcnode-id="1705" instrument_node="">https://2021-ttsf-fall-workshop-series.eventbrite.com</span></a><br data-dcnode-id="1703"><br data-dcnode-id="1702"><span data-dcnode-id="1701" instrument_node="">Build your digital portfolio through peer-led STEM workshops on how to build a website, program an image detection application with Machine Learning, how to create your own Discord bot online, and more! TeenTechSF is continuing to use breakout rooms to uphold their mission of providing equal access to tech for all teens, and dedicating multiple workshops to each topic to give an in-depth look at each of these tech tools.</span><br data-dcnode-id="1700"><br data-dcnode-id="1699"><span data-dcnode-id="1698" instrument_node="">Workshops include the following topics and will be hosted on Sundays at 2 pm:</span><br data-dcnode-id="1697"><span data-dcnode-id="1696" instrument_node="">1. November 7 - Image Detection with Machine Learning</span><br data-dcnode-id="1695"><span data-dcnode-id="1694" instrument_node="">2. November 14 - COVID Data Analysis</span><br data-dcnode-id="1693"><span data-dcnode-id="1692" instrument_node="">3. November 21 - App Development with Dart</span><br data-dcnode-id="1691"><span data-dcnode-id="1690" instrument_node="">4. November 28 - Programming a Personal Website</span><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">5. December 5 - Programming a Discord Bot</span><br data-dcnode-id="1687"><br data-dcnode-id="1686"><span data-dcnode-id="1685" instrument_node="">Like all of their workshops, the workshops for the TeenTechSF Fall Workshop series will provide a fun and easy introduction to educational opportunities in coding, and various parts of computer engineering for students to explore. Learn how to build a website, app, how to create your own 3D printed designs online, and more!</span><br data-dcnode-id="1684"><br data-dcnode-id="1683"><span data-dcnode-id="1682" instrument_node="">This event is free and run by and for teens, but space is limited. Sign up today!</span><br data-dcnode-id="1681"><a class="auto" data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2021-ttsf-fall-workshop-series.eventbrite.com/" target="_blank"><span data-dcnode-id="1680" instrument_node="">https://2021-ttsf-fall-workshop-series.eventbrite.com</span></a></p></div><div class="j-meta" data-dcnode-id="1673"><ul data-dcnode-id="1676"></ul><nav data-dcnode-id="1674"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4793751823988590" target="_blank"></a></nav></div></div></li></div><div class="j-stack galcolumn column-2-KEpdM" data-dcnode-id="388" id="j-column-2" style="width: 33.3333%; padding-left: 0px; padding-right: 0px;"><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1630" data-id="455541214" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1668" data-external-id="5349975191699581" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278863449_5349016361795464_6848000478611949428_n.png?stp=dst-png_s720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=M36bVb6DemcAX96z_kI&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9MtNryV2ov-LovRyIYv5qdw4TI-ZFzWAMQRLxOdq4TcQ&amp;oe=6268AF10" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5349975191699581" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 4/19/22 at 8:07PM" class="" data-dcnode-id="1669" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278863449_5349016361795464_6848000478611949428_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DM36bVb6DemcAX96z_kI%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9MtNryV2ov-LovRyIYv5qdw4TI-ZFzWAMQRLxOdq4TcQ%26oe%3D6268AF10&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1631"><div class="j-poster" data-dcnode-id="1661"><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1667" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1663" datetime="2022-04-19T20:07:05.000-07:00"><span data-dcnode-id="1664" instrument_node="">4d</span></time></a></div><div class="j-message" data-dcnode-id="1636"><p data-dcnode-id="1637"><span data-dcnode-id="1660" instrument_node="">Amplify your voice, create your vision! The Tech Interactive  Student Board wants to hear about your interests, future dreams, and how The Tech might be able to provide support in exploring both. Here are some ways you can contribute to their project:</span><br data-dcnode-id="1659"><br data-dcnode-id="1658"><span data-dcnode-id="1657" instrument_node="">Complete a 10-15 minute survey and enter to win a $10 gift card! Fill out this anonymous survey on your interests, career aspirations, and feelings about STEM: </span><a class="auto" data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forms.gle/mXybVMeTuKXFHeJ87" target="_blank"><span data-dcnode-id="1656" instrument_node="">https://forms.gle/mXybVMeTuKXFHeJ87</span></a><br data-dcnode-id="1654"><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node="">Want to tell The Tech more? They are also offering $20 gift cards to those who are willing to participate in a 1 hour interview about your interests and future dreams. Interview sign ups can be found here: </span><a class="auto" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//calendly.com/studentboard/60min%3Fmonth%3D2022-04" target="_blank"><span data-dcnode-id="1651" instrument_node="">https://calendly.com/studentboard/60min?month=2022-04</span></a><br data-dcnode-id="1649"><br data-dcnode-id="1648"><span data-dcnode-id="1647" instrument_node="">Speak through your art! Enter to win a $25 gift card by submitting a photo that shares what community and identity means to you through this Google form: </span><a class="auto" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/forms/d/e/1FAIpQLSdZrJUk6hnMcCJrsoOnWuU8-tIklIyHCrFSvmZr8dLjg6QnqQ/viewform" target="_blank"><span data-dcnode-id="1646" instrument_node="">https://docs.google.com/forms/d/e/1FAIpQLSdZrJUk6hnMcCJrsoOnWuU8-tIklIyHCrFSvmZr8dLjg6QnqQ/viewform</span></a><span data-dcnode-id="1644" instrument_node="">  With your permission, your art may be also showcased publicly at the Tech Interactive!</span><br data-dcnode-id="1643"><br data-dcnode-id="1642"><span data-dcnode-id="1641" instrument_node="">The Tech appreciates you taking some of your time to help with this project, which will shape the way The Tech builds programming to support Bay Area youth. Please contact them if you have any questions at </span><a class="auto" data-dcnode-id="1639" href="mailto:studentboard@thetech.org" target="_blank"><span data-dcnode-id="1640" instrument_node="">studentboard@thetech.org</span></a><span data-dcnode-id="1638" instrument_node="">.</span></p></div><div class="j-meta" data-dcnode-id="1632"><ul data-dcnode-id="1635"></ul><nav data-dcnode-id="1633"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5349975191699581" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1593" data-id="455426247" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1628" data-external-id="5339528592744241" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278563230_5339119989451768_3945079453878598310_n.png?stp=dst-png_p720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=ixsHJJGr-6EAX-jeia1&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9Izv5GTBu1-5OHGxNjqsu8WZo9jlf_F5L1yjGiNgxW9A&amp;oe=6267A882" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5339528592744241" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 4/15/22 at 8:00PM" class="" data-dcnode-id="1629" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278563230_5339119989451768_3945079453878598310_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DixsHJJGr-6EAX-jeia1%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9Izv5GTBu1-5OHGxNjqsu8WZo9jlf_F5L1yjGiNgxW9A%26oe%3D6267A882&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1594"><div class="j-poster" data-dcnode-id="1621"><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1627" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1623" datetime="2022-04-15T20:00:03.000-07:00"><span data-dcnode-id="1624" instrument_node="">8d</span></time></a></div><div class="j-message" data-dcnode-id="1602"><p data-dcnode-id="1603"><span data-dcnode-id="1620" instrument_node="">Join Science at Cal - UC Berkeley and Berkeley Lab for their upcoming event, "A Great (New) Future in Plastics," on Thursday, April 21 at noon! Like all of Science at Cal's events, this event is free and open to the public. Register today at </span><a class="auto" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lbnl.zoom.us/webinar/register/WN_v43joYM-RZyVME9bBCO6gw" target="_blank"><span data-dcnode-id="1619" instrument_node="">https://lbnl.zoom.us/webinar/register/WN_v43joYM-RZyVME9bBCO6gw</span></a><br data-dcnode-id="1617"><br data-dcnode-id="1616"><span data-dcnode-id="1615" instrument_node="">A Great (New) Future in Plastics</span><br data-dcnode-id="1614"><span data-dcnode-id="1613" instrument_node="">Thursday, April 21, 2022 | 12:00–1:30 PM (PT)</span><br data-dcnode-id="1612"><span data-dcnode-id="1611" instrument_node="">Virtual - Registration Required</span><br data-dcnode-id="1610"><span data-dcnode-id="1609" instrument_node="">Event website: </span><a class="auto" data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//events.berkeley.edu/index.php/calendar/sn/SciatCal.html%3Fevent_ID%3D143556%26date%3D2022-04-21" target="_blank"><span data-dcnode-id="1608" instrument_node="">https://events.berkeley.edu/index.php/calendar/sn/SciatCal.html?event_ID=143556&amp;date=2022-04-21</span></a><br data-dcnode-id="1606"><br data-dcnode-id="1605"><span data-dcnode-id="1604" instrument_node="">Plastic is inexpensive, easy to manufacture, and almost impossible to recycle or biodegrade effectively. As a result, roughly 8.3 billion tons of plastic have been produced globally to date—three quarters of which exist as waste. What if, instead of persisting for eons, plastics could degrade away as easily as fallen leaves? Or, what if plastic could be recycled without losing the properties that make it so useful? In recognition of Earth Day, we’re presenting two researchers who are attempting to make these what-ifs a reality. Dr. Aaron Hall will explain how plastic-degrading enzymes may help break up plastic in soil as easily as food scraps. Berkeley Lab scientist Dr. Jeremy Demarteau is taking a different approach to the same monstrous problem. He and his colleagues are developing a new class of plastics which are infinitely recyclable. Both approaches could reshape the future of plastics.</span></p></div><div class="j-meta" data-dcnode-id="1595"><ul data-dcnode-id="1598"><li data-dcnode-id="1599"><a aria-label="Likes" class="likes" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5339528592744241" target="_blank"><span data-dcnode-id="1601" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="1596"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5339528592744241" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1564" data-id="454617710" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1591" data-external-id="5282832695080498" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277296970_5280066868690414_6915528628182751450_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=101&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=tP49OC0QzmAAX_r5ZL3&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_xRx8UxPDox4r1KhMqKmXRMsDUn1zuT-5mdgFrR5qyow&amp;oe=626726AC" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5282832695080498" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/25/22 at 12:18PM" class="" data-dcnode-id="1592" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277296970_5280066868690414_6915528628182751450_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D101%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DtP49OC0QzmAAX_r5ZL3%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_xRx8UxPDox4r1KhMqKmXRMsDUn1zuT-5mdgFrR5qyow%26oe%3D626726AC&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1565"><div class="j-poster" data-dcnode-id="1584"><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1590" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1586" datetime="2022-03-25T12:18:01.000-07:00"><span data-dcnode-id="1587" instrument_node="">29d</span></time></a></div><div class="j-message" data-dcnode-id="1573"><p data-dcnode-id="1574"><span data-dcnode-id="1583" instrument_node="">Reminder -- camper applications for the Berkeley Girls in Engineering program close on March 31!</span><br data-dcnode-id="1582"><br data-dcnode-id="1581"><span data-dcnode-id="1580" instrument_node="">GiE is a hands-on summer camp for middle school students interested in learning more about engineering, STEM/STE(A)M, and design thinking. Taught by Cal researchers and students, campers gain exposure to engineering, design thinking, and real-world problem solving through hands-on activities and team projects. </span><br data-dcnode-id="1579"><br data-dcnode-id="1578"><span data-dcnode-id="1577" instrument_node="">Learn more about GiE: </span><a class="auto" data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//girlsinengineering.berkeley.edu/" target="_blank"><span data-dcnode-id="1576" instrument_node="">http://girlsinengineering.berkeley.edu/</span></a></p></div><div class="j-meta" data-dcnode-id="1566"><ul data-dcnode-id="1569"><li data-dcnode-id="1570"><a aria-label="Likes" class="likes" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5282832695080498" target="_blank"><span data-dcnode-id="1572" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="1567"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5282832695080498" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1535" data-id="454580681" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1562" data-external-id="5280804185283349" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277245685_5280172032013231_160922615417331484_n.png?_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=MDvYN2a1Qj8AX_KM6jH&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_VrjGsOSZ2nOf-yW8tTAnnXfFxBqdi7jZGumEjvx0loA&amp;oe=62677BAB" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280804185283349" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/24/22 at 7:24PM" class="" data-dcnode-id="1563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277245685_5280172032013231_160922615417331484_n.png%3F_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DMDvYN2a1Qj8AX_KM6jH%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_VrjGsOSZ2nOf-yW8tTAnnXfFxBqdi7jZGumEjvx0loA%26oe%3D62677BAB&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1536"><div class="j-poster" data-dcnode-id="1555"><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1561" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1557" datetime="2022-03-24T19:24:03.000-07:00"><span data-dcnode-id="1558" instrument_node="">30d</span></time></a></div><div class="j-message" data-dcnode-id="1541"><p data-dcnode-id="1542"><span data-dcnode-id="1554" instrument_node="">Announcing this summer's "Physics in and Through Cosmology" workshop for students &amp; teachers! This summer's program will be held remotely through the Lawrence Berkeley Lab on weekdays from June 21 through July 1. (This year’s workshop will be entirely online.) There is no cost for students and a small stipend for teachers. **Students &amp; teachers should contact </span><a class="auto" data-dcnode-id="1552" href="mailto:lkerrigan@lwhs.org" target="_blank"><span data-dcnode-id="1553" instrument_node="">lkerrigan@lwhs.org</span></a><span data-dcnode-id="1551" instrument_node=""> for an application.** </span><br data-dcnode-id="1550"><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node="">The ideal student applicant will have completed at least 3 years of college-prep math and chemistry and have taken or will be taking upper-division Physics next year. Underrepresented students in STEM (including African Americans, American Indians/Alaska Natives, Latinos, LGBTQ+, students from low-income households, and first-generation college attendees) are strongly encouraged to apply. </span><br data-dcnode-id="1547"><br data-dcnode-id="1546"><span data-dcnode-id="1545" instrument_node="">This workshop gives students and teachers the opportunity to learn from the scientists themselves about the latest theories &amp; research describing the universe.  Last year’s program included talks on the ATLAS experiment, Higgs &amp; Particle Physics, CMB, Dark Matter, Dark Energy, Neutrinos &amp; Cosmic Rays, &amp; Cosmology, as well as a drop-in visit from a Nobel Prize winner. Small groups will interview one researcher and we will also analyze data from particle research. Agendas from prior years can be found at </span><a class="auto" data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/lbl.gov/quarknet-workshop/home" target="_blank"><span data-dcnode-id="1544" instrument_node="">https://sites.google.com/lbl.gov/quarknet-workshop/home</span></a></p></div><div class="j-meta" data-dcnode-id="1537"><ul data-dcnode-id="1540"></ul><nav data-dcnode-id="1538"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280804185283349" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1488" data-id="454447787" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1533" data-external-id="5273111396052628" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276320790_5272423079454793_5818459457329799522_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=106&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=QEyy_R2GOJUAX8pnlrX&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8NUSW0DRoAcYm-tOfa4s0oEp_rE7ZYaEqVDVRAqo3VYw&amp;oe=626836E3" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5273111396052628" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/21/22 at 9:00PM" class="" data-dcnode-id="1534" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276320790_5272423079454793_5818459457329799522_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D106%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DQEyy_R2GOJUAX8pnlrX%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8NUSW0DRoAcYm-tOfa4s0oEp_rE7ZYaEqVDVRAqo3VYw%26oe%3D626836E3&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1489"><div class="j-poster" data-dcnode-id="1526"><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1532" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1528" datetime="2022-03-21T21:00:02.000-07:00"><span data-dcnode-id="1529" instrument_node="">33d</span></time></a></div><div class="j-message" data-dcnode-id="1497"><p data-dcnode-id="1498"><span data-dcnode-id="1525" instrument_node="">Are you passionate about our oceans? Apply now for The Marine Mammal Center's Ocean Advocacy Collective! The Ocean Advocacy Collective is a virtual leadership program for high school students to gather and build a community around their passion for marine science. Learn more and apply at </span><a class="auto" data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/ocean-advocacy-collective" target="_blank"><span data-dcnode-id="1524" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/ocean-advocacy-collective</span></a><br data-dcnode-id="1522"><br data-dcnode-id="1521"><span data-dcnode-id="1520" instrument_node="">Applications are accepted on a rolling basis and close April 27 for the summer session which runs from June 7-August 23. It is free to apply for the program. There is a membership fee of $75, due upon acceptance into the program. Scholarships are available.</span><br data-dcnode-id="1519"><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node="">Participants will meet weekly on Tuesdays from 4-5:30pm PT to connect on issues. Participants will be required to spend additional time on resource readings, forums, feedback or surveys. Through participation, youth will build a community and national network of ocean enthusiasts and conservationists and get career development and resume building opportunities.</span><br data-dcnode-id="1516"><br data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">Program Requirements:</span><br data-dcnode-id="1513"><span data-dcnode-id="1512" instrument_node="">Be a high school student, including home school, in grades 9-12</span><br data-dcnode-id="1511"><span data-dcnode-id="1510" instrument_node="">Have reliable access to a computer or tablet, internet and Zoom</span><br data-dcnode-id="1509"><span data-dcnode-id="1508" instrument_node="">Be excited to connect with other ocean enthusiasts and passionate about learning marine science</span><br data-dcnode-id="1507"><span data-dcnode-id="1506" instrument_node="">Do your best to be present for all meetings, as this leadership program aims to build a strong community</span><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">Acknowledge and value the varied experiences we all bring to the program, and therefore hold space and listen to others with differing opinions as we navigate discussions</span><br data-dcnode-id="1503"><br data-dcnode-id="1502"><span data-dcnode-id="1501" instrument_node="">Learn more and apply at </span><a class="auto" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemammalcenter.org/education/adults-families/ocean-advocacy-collective" target="_blank"><span data-dcnode-id="1500" instrument_node="">https://www.marinemammalcenter.org/education/adults-families/ocean-advocacy-collective</span></a></p></div><div class="j-meta" data-dcnode-id="1490"><ul data-dcnode-id="1493"><li data-dcnode-id="1494"><a aria-label="Likes" class="likes" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5273111396052628" target="_blank"><span data-dcnode-id="1496" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="1491"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5273111396052628" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1435" data-id="454447790" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1486" data-external-id="5272605442769890" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277165445_5272371532793281_305042083343401378_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=105&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=nZFaEE_L8QMAX_QRFd9&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9AL_UTZv9IwvdkW7q1gu192jS_64yszZqyyVc2b1h2TQ&amp;oe=6268E0D1" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5272605442769890" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/21/22 at 3:43PM" class="" data-dcnode-id="1487" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277165445_5272371532793281_305042083343401378_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D105%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DnZFaEE_L8QMAX_QRFd9%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9AL_UTZv9IwvdkW7q1gu192jS_64yszZqyyVc2b1h2TQ%26oe%3D6268E0D1&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1436"><div class="j-poster" data-dcnode-id="1479"><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1485" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1481" datetime="2022-03-21T15:43:02.000-07:00"><span data-dcnode-id="1482" instrument_node="">33d</span></time></a></div><div class="j-message" data-dcnode-id="1441"><p data-dcnode-id="1442"><span data-dcnode-id="1478" instrument_node="">Are you a high-school student interested in exploring different topics in Physics? If so, this program may be for you! The Stanford Program for Inspiring the Next Generation of Women in Physics (SPINWIP) is a summer learning program designed to get high-school girls excited about physics. This 3-week program is completely free to participants and will be held through video chat. Learn more and apply today at </span><a class="auto" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stanford.io/3scK8hO" target="_blank"><span data-dcnode-id="1477" instrument_node="">https://stanford.io/3scK8hO</span></a><span data-dcnode-id="1475" instrument_node="">.</span><br data-dcnode-id="1474"><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">Students will learn about cutting-edge research in physics in fields such as quantum physics, quantum computing, astrophysics, and cosmology. They will also learn how to code in Python, and then apply their coding skills to physics-based projects. Students will attend lectures by Stanford professors and researchers and work in small groups led by Stanford undergraduates, as well as attend college planning and career development workshops. First-generation students and students from underrepresented backgrounds in physics are particularly encouraged to apply. No prior knowledge of physics or coding is needed.</span><br data-dcnode-id="1471"><br data-dcnode-id="1470"><span data-dcnode-id="1469" instrument_node="">· Dates: July 11 - 29, Monday through Friday</span><br data-dcnode-id="1468"><span data-dcnode-id="1467" instrument_node="">· Time: 9am - 1pm PDT. Exact schedule will vary day-to-day</span><br data-dcnode-id="1466"><span data-dcnode-id="1465" instrument_node="">· Eligibility: High-school students</span><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">    -- Preference will be given to first-generation students, students from underrepresented backgrounds in physics, and rising juniors</span><br data-dcnode-id="1462"><span data-dcnode-id="1461" instrument_node="">    -- While this program is geared towards women in physics, students of all genders and gender identities are welcome to apply</span><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node="">    -- Students from countries outside the US are welcome to apply</span><br data-dcnode-id="1458"><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">·  Application: </span><a class="auto" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/SPINWIP_2022" target="_blank"><span data-dcnode-id="1455" instrument_node="">https://bit.ly/SPINWIP_2022</span></a><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">    -- Deadline: May 9, 11:59pm PDT</span><br data-dcnode-id="1451"><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">·  Information: </span><a class="auto" data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//physics.stanford.edu/about/equity-and-inclusion/spinwip" target="_blank"><span data-dcnode-id="1448" instrument_node="">https://physics.stanford.edu/about/equity-and-inclusion/spinwip</span></a><br data-dcnode-id="1446"><span data-dcnode-id="1445" instrument_node="">·  Contact: </span><a class="auto" data-dcnode-id="1443" href="mailto:spinwip_info@stanford.edu" target="_blank"><span data-dcnode-id="1444" instrument_node="">spinwip_info@stanford.edu</span></a></p></div><div class="j-meta" data-dcnode-id="1437"><ul data-dcnode-id="1440"></ul><nav data-dcnode-id="1438"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5272605442769890" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="1421" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1433" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-10.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="1434" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-about-10.svg&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1422"><div class="j-poster" data-dcnode-id="1428"><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Profile image for Juicer" data-dcnode-id="1432" data-poster-id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/logo-without-text.svg&amp;raw"><h3 data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Juicer</span></h3></a></div><div class="j-message" data-dcnode-id="1423"><span data-dcnode-id="1427" instrument_node="">Engage your users on social media with a </span><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science"><span data-dcnode-id="1426" instrument_node="">Juicer.io</span></a><span data-dcnode-id="1424" instrument_node=""> feed on your website or blog for free.</span></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1361" data-id="454249792" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1419" data-external-id="5259620120735089" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276024677_5259208634109571_2388901459297331088_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=110&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=OpcrNCJlXJIAX8JWPo0&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_odLTkaSud0RSt70UF1MFgCjW4cx3HPuzNwzsuayWABw&amp;oe=6267AEAE" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5259620120735089" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/16/22 at 7:08PM" class="" data-dcnode-id="1420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276024677_5259208634109571_2388901459297331088_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D110%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DOpcrNCJlXJIAX8JWPo0%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_odLTkaSud0RSt70UF1MFgCjW4cx3HPuzNwzsuayWABw%26oe%3D6267AEAE&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1362"><div class="j-poster" data-dcnode-id="1412"><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1418" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1414" datetime="2022-03-16T19:08:03.000-07:00"><span data-dcnode-id="1415" instrument_node="">38d</span></time></a></div><div class="j-message" data-dcnode-id="1370"><p data-dcnode-id="1371"><span data-dcnode-id="1411" instrument_node="">Important announcement! California Life Sciences - CLS' NexGeneGirls program has extended the deadline to apply for their summer internships! Applications close on Thursday, March 31. Apply today at </span><a class="auto" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//formstack.io/4BACC" target="_blank"><span data-dcnode-id="1410" instrument_node="">https://formstack.io/4BACC</span></a><span data-dcnode-id="1408" instrument_node="">.</span><br data-dcnode-id="1407"><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node="">NexGeneGirls delivers a comprehensive program of hands-on research internships at local life science organizations, leadership development, and career exploration for high school females of color from historically excluded communities in the San Francisco Bay Area. The program serves rising sophomores, juniors, and seniors in high school. Learn more at </span><a class="auto" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.califesciences.org/nexgenegirls/" target="_blank"><span data-dcnode-id="1404" instrument_node="">https://www.califesciences.org/nexgenegirls/</span></a><span data-dcnode-id="1402" instrument_node=""> </span><br data-dcnode-id="1401"><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">The core program takes place over 8 weeks in the summer (June 13 – August 5, 2022) for 30-35 hours per week, preceded by two mandatory Saturday workshops in April. The core program takes place in San Francisco, with internships located throughout the Bay Area.</span><br data-dcnode-id="1398"><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">Details:</span><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node="">Applicants who are accepted into the 2022 program will receive a $4000 stipend for completing the full program and includes:</span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">NexGeneGirls Spring Bootcamp: 2 Saturdays in April 2022 (TBD)</span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">NexGeneGirls Summer Science Academy: June 13 – August 5, 2022</span><br data-dcnode-id="1389"><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">Eligibility:</span><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">Students must submit an online application and include a letter of recommendation from a teacher or mentor.</span><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">Applicants must be a resident of the San Francisco Bay Area, identify as female and be currently enrolled in 9th, 10th, or 11th grade.</span><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">Selected participants will be required to participate in the full program.</span><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">Selected participants will be required to provide proof of up-to-date COVID vaccination status.</span><br data-dcnode-id="1378"><br data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node="">Application link: </span><a class="auto" data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//formstack.io/4BACC" target="_blank"><span data-dcnode-id="1375" instrument_node="">https://formstack.io/4BACC</span></a><br data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">Applications close on Thursday, March 31.</span></p></div><div class="j-meta" data-dcnode-id="1363"><ul data-dcnode-id="1366"><li data-dcnode-id="1367"><a aria-label="Likes" class="likes" data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5259620120735089" target="_blank"><span data-dcnode-id="1369" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="1364"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5259620120735089" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1317" data-id="454042734" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1359" data-external-id="5246328675397567" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275518745_5242949319068836_2738572130277620259_n.png?_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=QzCUNbx3DzIAX_ktwwi&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-NHFDczGvbEN2jdRiO4rgakFiICq-L01zodwtUQta5fw&amp;oe=62676CA2" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5246328675397567" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/11/22 at 8:00PM" class="" data-dcnode-id="1360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275518745_5242949319068836_2738572130277620259_n.png%3F_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DQzCUNbx3DzIAX_ktwwi%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-NHFDczGvbEN2jdRiO4rgakFiICq-L01zodwtUQta5fw%26oe%3D62676CA2&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1318"><div class="j-poster" data-dcnode-id="1352"><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1358" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1354" datetime="2022-03-11T20:00:05.000-08:00"><span data-dcnode-id="1355" instrument_node="">43d</span></time></a></div><div class="j-message" data-dcnode-id="1326"><p data-dcnode-id="1327"><span data-dcnode-id="1351" instrument_node="">Have you heard about iCLEM? The Introductory College Level Experience in Microbiology (iCLEM) is a paid five week summer science intensive hosted by the Joint BioEnergy Institute (JBEI). Learn more here: </span><a class="auto" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbei.org/education/research-experiences/iclem-program/" target="_blank"><span data-dcnode-id="1350" instrument_node="">https://www.jbei.org/education/research-experiences/iclem-program/</span></a><br data-dcnode-id="1348"><br data-dcnode-id="1347"><span
