_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="3144"><p data-dcnode-id="3145"><span data-dcnode-id="3160" instrument_node="">NASA - National Aeronautics and Space Administration and Future Engineers are challenging young innovators to help design a new robot concept for an excavation mission on the Moon! The Lunabotics Junior Contest is open to K-12 students in U.S. public and private schools, as well as homeschoolers. </span><br data-dcnode-id="3159"><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">Learn more and register at </span><a class="auto" data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futureengineers.org/lunaboticsjunior" target="_blank"><span data-dcnode-id="3156" instrument_node="">https://www.futureengineers.org/lunaboticsjunior</span></a><br data-dcnode-id="3154"><br data-dcnode-id="3153"><span data-dcnode-id="3152" instrument_node="">To enter the contest, students must submit entries, which must include an image of the robot design and a written summary explaining how the design is intended to operate on the Moon, by Jan. 25, 2022.</span><br data-dcnode-id="3151"><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node="">Remember to check out the EDUCATION SECTION and BRAINSTORMING resources (at </span><a class="auto" data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futureengineers.org/lunaboticsjunior" target="_blank"><span data-dcnode-id="3148" instrument_node="">https://www.futureengineers.org/lunaboticsjunior</span></a><span data-dcnode-id="3146" instrument_node="">) to learn more about the Moon, NASA’s Artemis program, and the unique design considerations related to lunar robotics!</span></p></div><div class="j-meta" data-dcnode-id="3137"><ul data-dcnode-id="3140"><li data-dcnode-id="3141"><a aria-label="Comments" class="comments" data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4838867326143706" target="_blank"><span data-dcnode-id="3143" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3138"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4838867326143706" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3100" data-id="449733579" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3133" data-external-id="4828645393832566" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/247826997_4828644040499368_8948412730112505323_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=100&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=smCY1VWoZ5QAX9qFN_A&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8aUlEwsQ71uQsF9-zexYWLcMB1gNefRJ25sej_Y2Kg-A&amp;oe=62672ABD" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4828645393832566" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/12/21 at 10:34AM" class="" data-dcnode-id="3134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/247826997_4828644040499368_8948412730112505323_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D100%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DsmCY1VWoZ5QAX9qFN_A%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8aUlEwsQ71uQsF9-zexYWLcMB1gNefRJ25sej_Y2Kg-A%26oe%3D62672ABD&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3101"><div class="j-poster" data-dcnode-id="3126"><a data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3132" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3128" datetime="2021-11-12T10:34:46.000-08:00"><span data-dcnode-id="3129" instrument_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="3109"><p data-dcnode-id="3110"><span data-dcnode-id="3125" instrument_node="">Ever wonder how a career in tech can help you pursue your passions? Join Girls Who Code’s free virtual Summer Immersion Program (SIP) or Self-Paced Program (SPP) to find out!</span><br data-dcnode-id="3124"><br data-dcnode-id="3123"><span data-dcnode-id="3122" instrument_node="">Stay in the know by completing the interest form: </span><a class="auto" data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//survey.alchemer.com/s3/6481035/outreach" target="_blank"><span data-dcnode-id="3121" instrument_node="">https://survey.alchemer.com/s3/6481035/outreach</span></a><br data-dcnode-id="3119"><br data-dcnode-id="3118"><span data-dcnode-id="3117" instrument_node="">During the FREE 2-week virtual Summer Immersion Program (SIP) for 9-11th graders, you’ll learn an introduction to HTML, Javascript, and CSS as you build impactful projects that you care about. Oh, and did we mention SIP virtual classrooms are hosted by major companies like YumBrands and Bank of America, just to name two? Plus, in addition to SIP being 100% free, stipends of up to $300 and tech support are available for those who qualify. </span><br data-dcnode-id="3116"><br data-dcnode-id="3115"><span data-dcnode-id="3114" instrument_node="">Looking for a more flexible schedule? Apply to the FREE virtual Self-Paced Program (SPP) for 9-12th graders where you can complete 10+ hour certification courses at whatever schedule works best for you! You can choose beginner-level certifications in HTML, Javascript, and CSS or our brand new advanced-level certification in cybersecurity.</span><br data-dcnode-id="3113"><br data-dcnode-id="3112"><span data-dcnode-id="3111" instrument_node="">So what are you waiting for?!   Fill out the interest form today to be the first to know when the application goes live mid-January 2022!</span></p></div><div class="j-meta" data-dcnode-id="3102"><ul data-dcnode-id="3105"><li data-dcnode-id="3106"><a aria-label="Likes" class="likes" data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4828645393832566" target="_blank"><span data-dcnode-id="3108" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3103"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4828645393832566" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3061" data-id="449651582" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3098" data-external-id="4822442291119543" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/256418964_4822320904465015_9180018717711175925_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=100&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=mY1sY1GSXxwAX_cUmyl&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-ZY8wjjQBPQk883WLGcUEBFw3RdjOZyw6tcQbB9sGhpQ&amp;oe=62672D35" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4822442291119543" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/10/21 at 3:38PM" class="" data-dcnode-id="3099" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/256418964_4822320904465015_9180018717711175925_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D100%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DmY1sY1GSXxwAX_cUmyl%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-ZY8wjjQBPQk883WLGcUEBFw3RdjOZyw6tcQbB9sGhpQ%26oe%3D62672D35&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3062"><div class="j-poster" data-dcnode-id="3091"><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3097" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3093" datetime="2021-11-10T15:38:58.000-08:00"><span data-dcnode-id="3094" instrument_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="3070"><p data-dcnode-id="3071"><span data-dcnode-id="3090" instrument_node="">Have you made a plan for college and beyond? The Tech Interactive and Miss CEO are hosting a mentoring event that will connect mentees with extraordinary women at Ford on Monday, Nov. 15 at 4 p.m. Pacific! </span><br data-dcnode-id="3089"><br data-dcnode-id="3088"><span data-dcnode-id="3087" instrument_node="">Register Here: </span><a class="auto" data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/3nEY1SI" target="_blank"><span data-dcnode-id="3086" instrument_node="">https://bit.ly/3nEY1SI</span></a><span data-dcnode-id="3084" instrument_node=""> </span><br data-dcnode-id="3083"><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">During this one-hour event, students will:</span><br data-dcnode-id="3080"><span data-dcnode-id="3079" instrument_node="">-- Learn what engineers, designers and manufacturers at Ford actually do all day, plus the skills required to do their jobs.</span><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">-- Engage in small-group community mentoring sessions.</span><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node="">-- Get practical guidance from mentors on how to think about their own goal and define their path forward.</span><br data-dcnode-id="3074"><br data-dcnode-id="3073"><span data-dcnode-id="3072" instrument_node="">This mentoring experience is for high school girls.</span></p></div><div class="j-meta" data-dcnode-id="3063"><ul data-dcnode-id="3066"><li data-dcnode-id="3067"><a aria-label="Likes" class="likes" data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4822442291119543" target="_blank"><span data-dcnode-id="3069" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="3064"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4822442291119543" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="3026" data-id="449612210" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3059" data-external-id="4818737231490049" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/255773731_4818733618157077_1426983103921955915_n.png?stp=dst-png_s720x720&amp;_nc_cat=104&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=WtN-hO8jgSMAX_XH0Jk&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT80l3EDrmyTASBiw46r1ki0Q47e4XNjzZYgtKm9ayzlIA&amp;oe=62685009" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4818737231490049" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/9/21 at 11:57AM" class="" data-dcnode-id="3060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/255773731_4818733618157077_1426983103921955915_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DWtN-hO8jgSMAX_XH0Jk%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT80l3EDrmyTASBiw46r1ki0Q47e4XNjzZYgtKm9ayzlIA%26oe%3D62685009&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="3027"><div class="j-poster" data-dcnode-id="3052"><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3058" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3054" datetime="2021-11-09T11:57:28.000-08:00"><span data-dcnode-id="3055" instrument_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="3035"><p data-dcnode-id="3036"><span data-dcnode-id="3051" instrument_node="">Join Science at Cal - UC Berkeley and Berkeley Lab on Nov. 18 for their upcoming (free!) event, "Microbiomes: From under the seas to the leaves of trees"!</span><br data-dcnode-id="3050"><br data-dcnode-id="3049"><span data-dcnode-id="3048" instrument_node="">Register and learn more at </span><a class="auto" data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lbnl.zoom.us/webinar/register/WN_LlY-Wi-CRRuxwYDT_ZAt3Q" target="_blank"><span data-dcnode-id="3047" instrument_node="">https://lbnl.zoom.us/webinar/register/WN_LlY-Wi-CRRuxwYDT_ZAt3Q</span></a><span data-dcnode-id="3045" instrument_node=""> </span><br data-dcnode-id="3044"><br data-dcnode-id="3043"><span data-dcnode-id="3042" instrument_node="">Thur, November 18, 2021, 12:00–1:30 pm (PT)</span><br data-dcnode-id="3041"><span data-dcnode-id="3040" instrument_node="">Microbiomes: From fields of leaves to under the seas</span><br data-dcnode-id="3039"><br data-dcnode-id="3038"><span data-dcnode-id="3037" instrument_node="">At this month’s Midday Science Cafe, you're invited to go on a journey through the wonderful world of the microbiome. You'll zoom in on the communities of tiny organisms that live everywhere, from the leaves of plants to the guts of tropical reef fish, and do everything, from connecting neighborhoods of plants to creating renewable energy. You’ll hear from two scientists who study the bacteria, fungi, and viruses that make up a microbiome. First, Dr. Kyle Meyer, a postdoctoral researcher in the Department of Integrative Biology at UC Berkeley, will discuss how the ecosystems neighboring an individual plant impact its microbiome, and may influence plant health by creating nutrients or protecting against disease. Next, Dr. Lydia Rachbauer, a postdoctoral researcher at the Joint BioEnergy Institute at Berkeley Lab, will take us on a deep dive to explore the power of microbes found in a fish’s gut to digest complex sugars found in seaweed and how they might help us transform seaweed into a renewable energy source. These two scientists will show us just two examples of the many ways microbes shape the world around us.</span></p></div><div class="j-meta" data-dcnode-id="3028"><ul data-dcnode-id="3031"><li data-dcnode-id="3032"><a aria-label="Likes" class="likes" data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4818737231490049" target="_blank"><span data-dcnode-id="3034" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="3029"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4818737231490049" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2984" data-id="449350688" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="3024" data-external-id="4793775987319507" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/251761941_4793760830654356_3773797081713459988_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=103&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=mhLmvYG4fBgAX8EV73W&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8Yf7uSshJo_7fxUSBDQ7zjx6Ty7TVrs3SxiDhjvJYg7A&amp;oe=6267F304" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4793775987319507" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 11/1/21 at 4:34PM" class="" data-dcnode-id="3025" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/251761941_4793760830654356_3773797081713459988_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D103%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DmhLmvYG4fBgAX8EV73W%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8Yf7uSshJo_7fxUSBDQ7zjx6Ty7TVrs3SxiDhjvJYg7A%26oe%3D6267F304&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2985"><div class="j-poster" data-dcnode-id="3017"><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="3023" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="3019" datetime="2021-11-01T16:34:02.000-07:00"><span data-dcnode-id="3020" instrument_node="">5mo</span></time></a></div><div class="j-message" data-dcnode-id="2990"><p data-dcnode-id="2991"><span data-dcnode-id="3016" instrument_node="">The California Academy of Sciences is hosting a free Marine Mammal Identification Masterclass beginning tomorrow, November 2 on YouTube!</span><br data-dcnode-id="3015"><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">Learn more at </span><a class="auto" data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calacademy.org/events/lectures-workshops/marine-mammal-identification-masterclass" target="_blank"><span data-dcnode-id="3012" instrument_node="">https://www.calacademy.org/events/lectures-workshops/marine-mammal-identification-masterclass</span></a><br data-dcnode-id="3010"><br data-dcnode-id="3009"><span data-dcnode-id="3008" instrument_node="">This class is a three-part deep dive into marine-mammal identification, taught by collections manager Moe Flannery, community science co-directors Rebecca Johnson and Alison Young, and curatorial associate II Sue Pemberton. </span><br data-dcnode-id="3007"><span data-dcnode-id="3006" instrument_node="">-- Tuesday November 2 at 10am: Introduction to Marine Mammal Identification </span><br data-dcnode-id="3005"><span data-dcnode-id="3004" instrument_node="">-- Thursday November 4 at 10am: Using iNaturalist to Document Marine Mammals</span><br data-dcnode-id="3003"><span data-dcnode-id="3002" instrument_node="">-- Tuesday November 9 at 10am: Sleuthing with Sue: Marine Mammal Identification Case Studies</span><br data-dcnode-id="3001"><br data-dcnode-id="3000"><span data-dcnode-id="2999" instrument_node="">Recordings of the classes will also be shared on the California Academy of Sciences' YouTube channel. </span><br data-dcnode-id="2998"><br data-dcnode-id="2997"><span data-dcnode-id="2996" instrument_node="">~~</span><br data-dcnode-id="2995"><span data-dcnode-id="2994" instrument_node="">Funding for this training was provided by a 2020 NOAA John H. Prescott Marine Mammal Rescue Assistance Program Grant awarded to the California Academy of Sciences (NA20NMF4390125).</span><br data-dcnode-id="2993"><span data-dcnode-id="2992" instrument_node="">All marine mammal stranding activities are conducted under authorization by the National Marine Fisheries Service through a Stranding Agreement issued to the California Academy of Sciences and MMPA/ESA Permit No. 18786.</span></p></div><div class="j-meta" data-dcnode-id="2986"><ul data-dcnode-id="2989"></ul><nav data-dcnode-id="2987"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/4793775987319507" target="_blank"></a></nav></div></div></li></div><div class="j-stack galcolumn column-1-KEpdM" data-dcnode-id="1670" id="j-column-1" style="width: 33.3333%; padding-left: 0px; padding-right: 0px;"><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2940" data-id="455541213" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2981" data-external-id="5349990345031399" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278908007_5349524201744680_8933044063493917100_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=8S7v1pwnKncAX9lDZc9&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT87LJuc-em9TKwccj_No48yzgTiyeOYwA6HGwrDJnt0bw&amp;oe=626829B9" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5349990345031399" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 4/19/22 at 8:16PM" class="" data-dcnode-id="2982" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278908007_5349524201744680_8933044063493917100_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D8S7v1pwnKncAX9lDZc9%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT87LJuc-em9TKwccj_No48yzgTiyeOYwA6HGwrDJnt0bw%26oe%3D626829B9&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2941"><div class="j-poster" data-dcnode-id="2974"><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2980" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2976" datetime="2022-04-19T20:16:02.000-07:00"><span data-dcnode-id="2977" instrument_node="">4d</span></time></a></div><div class="j-message" data-dcnode-id="2946"><p data-dcnode-id="2947"><img alt="📣" class="emoji" data-dcnode-id="2973" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f4e3.svg&amp;raw"><span data-dcnode-id="2972" instrument_node="">  Please help share this event w/ your Latinx communities! Science at Cal - UC Berkeley &amp; Consulado General de México en San Francisco will be showcasing 6 UC Berkeley &amp; Berkeley Lab scientists during Spanish-language lab tours on 4/28, 11AM (PT).  Learn more: </span><a class="auto" data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scienceatcal.berkeley.edu/un-vistazo-2022/" target="_blank"><span data-dcnode-id="2971" instrument_node="">https://scienceatcal.berkeley.edu/un-vistazo-2022/</span></a><span data-dcnode-id="2969" instrument_node=""> #BASF2022 #LatinXinSTEM</span><br data-dcnode-id="2968"><br data-dcnode-id="2967"><span data-dcnode-id="2966" instrument_node="">Day of Science: A Look in the Lab</span><br data-dcnode-id="2965"><span data-dcnode-id="2964" instrument_node="">Thursday, April 28 | 11:00 AM–12:30 PM</span><br data-dcnode-id="2963"><span data-dcnode-id="2962" instrument_node="">Virtual - Facebook</span><br data-dcnode-id="2961"><a class="auto" data-dcnode-id="2959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/events/352135070299785" target="_blank"><span data-dcnode-id="2960" instrument_node="">https://www.facebook.com/events/352135070299785</span></a><br data-dcnode-id="2958"><br data-dcnode-id="2957"><span data-dcnode-id="2956" instrument_node="">For the third year in a row, the Consulate General of Mexico in San Francisco is partnering with Science at Cal to host "Dia de la Ciencia,” an event that gives the Spanish-speaking public an opportunity to interact with scientists from different fields and have a closer experience with science.</span><br data-dcnode-id="2955"><br data-dcnode-id="2954"><span data-dcnode-id="2953" instrument_node="">This year, "A Look in the Lab" will consist of prerecorded tours of each scientist’s lab or field site, followed by a live roundtable panel and Q&amp;A discussion about the day-to-day life of a scientist and their career path in science. We hope to both demystify scientific careers, while also inspiring youth to follow a scientific career. </span><br data-dcnode-id="2952"><br data-dcnode-id="2951"><span data-dcnode-id="2950" instrument_node="">This event will be delivered in Spanish. Information in Spanish is available at </span><a class="auto" data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scienceatcal.berkeley.edu/un-vistazo-2022/" target="_blank"><span data-dcnode-id="2949" instrument_node="">https://scienceatcal.berkeley.edu/un-vistazo-2022/</span></a></p></div><div class="j-meta" data-dcnode-id="2942"><ul data-dcnode-id="2945"></ul><nav data-dcnode-id="2943"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5349990345031399" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2902" data-id="455504252" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2938" data-external-id="5347227301974370" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278900051_5346964965333937_4534727291199117086_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=110&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=dFg-0gi-mdMAX-sDj1s&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT97goFkb1uiMfBlWkZWOIeAhYxL206aCCOmPhjjskQtcA&amp;oe=6268F623" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5347227301974370" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 4/18/22 at 7:00PM" class="" data-dcnode-id="2939" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278900051_5346964965333937_4534727291199117086_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D110%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DdFg-0gi-mdMAX-sDj1s%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT97goFkb1uiMfBlWkZWOIeAhYxL206aCCOmPhjjskQtcA%26oe%3D6268F623&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2903"><div class="j-poster" data-dcnode-id="2931"><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2937" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2933" datetime="2022-04-18T19:00:02.000-07:00"><span data-dcnode-id="2934" instrument_node="">5d</span></time></a></div><div class="j-message" data-dcnode-id="2908"><p data-dcnode-id="2909"><span data-dcnode-id="2930" instrument_node="">Check out the attached flier for the Oakland Zoo's summer opportunities! Learn more on the zoo's Teen Programs page: </span><a class="auto" data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oaklandzoo.org/teen-programs" target="_blank"><span data-dcnode-id="2929" instrument_node="">https://www.oaklandzoo.org/teen-programs</span></a><br data-dcnode-id="2927"><br data-dcnode-id="2926"><span data-dcnode-id="2925" instrument_node="">Teen Wild Guides- Year-round volunteer opportunity. Teens are educators at the zoo. Learn more at </span><a class="auto" data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oaklandzoo.org/programs-and-events/teen-wild-guides" target="_blank"><span data-dcnode-id="2924" instrument_node="">https://www.oaklandzoo.org/programs-and-events/teen-wild-guides</span></a><br data-dcnode-id="2922"><br data-dcnode-id="2921"><span data-dcnode-id="2920" instrument_node="">Teen Assistants- Volunteers with ZooCamp. Assist teachers with camper supervision, arts and crafts, games, etc. Learn more at </span><a class="auto" data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oaklandzoo.org/programs-and-events/teen-assistants-t-a" target="_blank"><span data-dcnode-id="2919" instrument_node="">https://www.oaklandzoo.org/programs-and-events/teen-assistants-t-a</span></a><br data-dcnode-id="2917"><br data-dcnode-id="2916"><span data-dcnode-id="2915" instrument_node="">Conservation Internship- Climate solutions class with capstone project. Teens receive a $1000 stipend at the end. Food and transportation provided on fieldtrip days. This internship is designed for teens from demographics that are underrepresented in STEAM fields. Learn more at </span><a class="auto" data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oaklandzoo.org/programs-and-events/intro-to-conservation-internship" target="_blank"><span data-dcnode-id="2914" instrument_node="">https://www.oaklandzoo.org/programs-and-events/intro-to-conservation-internship</span></a><br data-dcnode-id="2912"><br data-dcnode-id="2911"><span data-dcnode-id="2910" instrument_node="">Deadlines are coming up soon, so get started on your application today!</span></p></div><div class="j-meta" data-dcnode-id="2904"><ul data-dcnode-id="2907"></ul><nav data-dcnode-id="2905"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5347227301974370" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2861" data-id="455398854" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2900" data-external-id="5336445399719227" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278567968_5336443736386060_6734499382778177022_n.png?stp=dst-png_s720x720&amp;_nc_cat=110&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=2BEYemc3phEAX8vtDdF&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-4u8MrGYohEE9iMDNduhWn-p-YeAwGGWiPSYiJ9k-RGA&amp;oe=626832BF" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5336445399719227" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 4/14/22 at 4:45PM" class="" data-dcnode-id="2901" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/278567968_5336443736386060_6734499382778177022_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D110%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D2BEYemc3phEAX8vtDdF%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-4u8MrGYohEE9iMDNduhWn-p-YeAwGGWiPSYiJ9k-RGA%26oe%3D626832BF&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2862"><div class="j-poster" data-dcnode-id="2893"><a data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2899" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2895" datetime="2022-04-14T16:45:54.000-07:00"><span data-dcnode-id="2896" instrument_node="">9d</span></time></a></div><div class="j-message" data-dcnode-id="2867"><p data-dcnode-id="2868"><span data-dcnode-id="2892" instrument_node="">The Osher Lifelong Learning Program at San Francisco State University presents: </span><br data-dcnode-id="2891"><span data-dcnode-id="2890" instrument_node="">How Did Pluto Get Kicked out of the Planet Club and What are we Discovering There Now? </span><br data-dcnode-id="2889"><span data-dcnode-id="2888" instrument_node="">with Astronomer Andrew Fraknoi</span><br data-dcnode-id="2887"><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">Tuesday, April 19, 11 am (Pacific) on Zoom </span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">Registration link: </span><a class="auto" data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.campusce.net/sfsu/course/course.aspx%3FC%3D851%26pc%3D120%26mc%3D0%26sc%3D0" target="_blank"><span data-dcnode-id="2882" instrument_node="">https://www.campusce.net/sfsu/course/course.aspx?C=851&amp;pc=120&amp;mc=0&amp;sc=0</span></a><span data-dcnode-id="2880" instrument_node=""> </span><br data-dcnode-id="2879"><br data-dcnode-id="2878"><span data-dcnode-id="2877" instrument_node="">In this nontechnical talk (illustrated with color images), you will hear the behind-the-scenes story of how Pluto got “demoted,” and why its story nevertheless turned out OK.  We’ll discuss other demotions in astronomy history, and show the latest results from the New Horizons spacecraft, which flew by the “double planet” Pluto-Charon, and gave us a new understanding of both worlds. We’ll also hear a bit about Pluto’s “cousins” – the other intriguing dwarf planets at the edge of the solar system. </span><br data-dcnode-id="2876"><br data-dcnode-id="2875"><span data-dcnode-id="2874" instrument_node="">Open to the public at no charge. </span><br data-dcnode-id="2873"><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node="">But you must register at: </span><a class="auto" data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.campusce.net/sfsu/course/course.aspx%3FC%3D851%26pc%3D120%26mc%3D0%26sc%3D0" target="_blank"><span data-dcnode-id="2870" instrument_node="">https://www.campusce.net/sfsu/course/course.aspx?C=851&amp;pc=120&amp;mc=0&amp;sc=0</span></a></p></div><div class="j-meta" data-dcnode-id="2863"><ul data-dcnode-id="2866"></ul><nav data-dcnode-id="2864"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5336445399719227" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="2848" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2859" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-10.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="2860" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-about-10.svg&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2849"><div class="j-poster" data-dcnode-id="2854"><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Profile image for Juicer" data-dcnode-id="2858" data-poster-id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/logo-without-text.svg&amp;raw"><h3 data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Juicer</span></h3></a></div><div class="j-message" data-dcnode-id="2850"><a data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science"><span data-dcnode-id="2853" instrument_node="">Juicer.io</span></a><span data-dcnode-id="2851" instrument_node=""> lets you easily create and embed social media feeds like this one on to your site for free!</span></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2792" data-id="454580683" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2846" data-external-id="5280515431978891" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277790045_5299152173448550_8243841586335411737_n.png?stp=dst-png_p720x720&amp;_nc_cat=106&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=rXrAyaRcWtsAX-3kHX8&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9ykB4kjf5RRR3_9Sc8ywZLELz3O610ryyjRHFUOXWt_Q&amp;oe=6268A0EE" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280515431978891" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/24/22 at 4:46PM" class="" data-dcnode-id="2847" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/277790045_5299152173448550_8243841586335411737_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D106%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DrXrAyaRcWtsAX-3kHX8%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9ykB4kjf5RRR3_9Sc8ywZLELz3O610ryyjRHFUOXWt_Q%26oe%3D6268A0EE&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2793"><div class="j-poster" data-dcnode-id="2839"><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2845" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2841" datetime="2022-03-24T16:46:51.000-07:00"><span data-dcnode-id="2842" instrument_node="">30d</span></time></a></div><div class="j-message" data-dcnode-id="2801"><p data-dcnode-id="2802"><span data-dcnode-id="2838" instrument_node="">Join Science at Cal - UC Berkeley for their upcoming lecture, "A Life in Chemistry Shaped by Diseases and Medicine in Sub-Saharan Africa." Registration is required -- register at </span><a class="auto" data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alifeinchemistry.eventbrite.com/%3Faff%3DBATS" target="_blank"><span data-dcnode-id="2837" instrument_node="">https://alifeinchemistry.eventbrite.com/?aff=BATS</span></a><span data-dcnode-id="2835" instrument_node="">. Like all of Science at Cal's events, this event is free and open to all ages. </span><br data-dcnode-id="2834"><br data-dcnode-id="2833"><span data-dcnode-id="2832" instrument_node="">A Life in Chemistry Shaped by Diseases and Medicine in Sub-Saharan Africa</span><br data-dcnode-id="2831"><br data-dcnode-id="2830"><span data-dcnode-id="2829" instrument_node="">Sat, April 9, 2022 | 11:00 AM–12:15 PM (PT)</span><br data-dcnode-id="2828"><span data-dcnode-id="2827" instrument_node="">Doors open at 10:45 AM</span><br data-dcnode-id="2826"><br data-dcnode-id="2825"><span data-dcnode-id="2824" instrument_node="">Valley Life Sciences Building, Room 2050</span><br data-dcnode-id="2823"><span data-dcnode-id="2822" instrument_node="">UC Berkeley Campus</span><br data-dcnode-id="2821"><br data-dcnode-id="2820"><span data-dcnode-id="2819" instrument_node="">Did you know that natural products serve as the basis of many new medicines? What are natural products and why are they important in chemistry? How has studying natural products provided an opportunity to understand limitations of chemical synthesis in medicinal drug production? Dr. Richmond Sarpong will address these questions as well as how his experiences growing up in Sub-Saharan Africa led to his career in synthetic organic chemistry. He will discuss his early influences, along with how he became interested in natural products and medicine.</span><br data-dcnode-id="2818"><br data-dcnode-id="2817"><span data-dcnode-id="2816" instrument_node="">Event details: </span><a class="auto" data-dcnode-id="2814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//events.berkeley.edu/index.php/calendar/sn/SciatCal.html%3Fevent_ID%3D143957%26date%3D2022-04-09" target="_blank"><span data-dcnode-id="2815" instrument_node="">https://events.berkeley.edu/index.php/calendar/sn/SciatCal.html?event_ID=143957&amp;date=2022-04-09</span></a><br data-dcnode-id="2813"><br data-dcnode-id="2812"><span data-dcnode-id="2811" instrument_node="">REGISTRATION IS REQUIRED</span><br data-dcnode-id="2810"><span data-dcnode-id="2809" instrument_node="">This is an in-person event. In order to maintain capacity limits, registration will be required using the Eventbrite link above. Please bring a copy of your Eventbrite ticket to the event, either on your mobile device or printed out.</span><br data-dcnode-id="2808"><br data-dcnode-id="2807"><span data-dcnode-id="2806" instrument_node="">Science at Cal will follow any and all University and City of Berkeley COVID-19 guidelines at the time of the event. They remind you that wearing a mask indoors is strongly recommended by the campus and the city public health officer. Please see UC Berkeley's current mask guidance here:  </span><a class="auto" data-dcnode-id="2804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//coronavirus.berkeley.edu/face-coverings/" target="_blank"><span data-dcnode-id="2805" instrument_node="">https://coronavirus.berkeley.edu/face-coverings/</span></a><span data-dcnode-id="2803" instrument_node="">.</span></p></div><div class="j-meta" data-dcnode-id="2794"><ul data-dcnode-id="2797"><li data-dcnode-id="2798"><a aria-label="Likes" class="likes" data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280515431978891" target="_blank"><span data-dcnode-id="2800" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="2795"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5280515431978891" target="_blank"></a></nav></div></div></li><li class="feed-it  (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2785" datetime="2022-03-21T17:02:06.000-07:00"><span data-dcnode-id="2786" instrument_node="">33d</span></time></a></div><div class="j-message" data-dcnode-id="2750"><p data-dcnode-id="2751"><span data-dcnode-id="2782" instrument_node="">Did you know that STEM careers are the highest in demand? To find out more about careers in STEM, join Selfestem this Saturday (March 26) for their 5th annual 2022 Conversations in STEM event! Register now for this FREE event at </span><a class="auto" data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfestem.brushfire.com/conversationsinstem/526318" target="_blank"><span data-dcnode-id="2781" instrument_node="">https://selfestem.brushfire.com/conversationsinstem/526318</span></a><br data-dcnode-id="2779"><br data-dcnode-id="2778"><span data-dcnode-id="2777" instrument_node="">With the many career path options to consider in our current world, Self-eSTEM wants to expand women's choices and help them to see how exciting and rewarding a career in STEM can be during this event. Join them for a FREE entertaining, educational, and interactive hybrid STEM career experience. During this event attendees will hear from women in STEM who aim to inspire early in their careers and the next generation of innovators about life-changing careers in the STEM industry. #representationmatters </span><br data-dcnode-id="2776"><br data-dcnode-id="2775"><span data-dcnode-id="2774" instrument_node="">The target audiences for this event are university and early career talent (ages 18-25+) interested in STEM careers. However, this event will provide role models and career exposure for younger attendees as well, and families are encouraged to attend. Learn more about this exciting event at </span><a class="auto" data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//selfestem.org/events/" target="_blank"><span data-dcnode-id="2773" instrument_node="">https://selfestem.org/events/</span></a><span data-dcnode-id="2771" instrument_node=""> (Scroll down past the event calendar)</span><br data-dcnode-id="2770"><br data-dcnode-id="2769"><span data-dcnode-id="2768" instrument_node="">~~More about the event~~</span><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node="">Free, interactive discussions aiming to inspire current &amp; future innovators to navigate traditional &amp; unconventional career pathways in STEM! </span><br data-dcnode-id="2765"><span data-dcnode-id="2764" instrument_node="">Open to all age groups.</span><br data-dcnode-id="2763"><span data-dcnode-id="2762" instrument_node="">Food &amp; refreshments provided.</span><br data-dcnode-id="2761"><span data-dcnode-id="2760" instrument_node="">Opportunities to network.</span><br data-dcnode-id="2759"><span data-dcnode-id="2758" instrument_node="">Giveaways - Gift cards and prizes!</span><br data-dcnode-id="2757"><span data-dcnode-id="2756" instrument_node=""> </span><br data-dcnode-id="2755"><span data-dcnode-id="2754" instrument_node="">Register for the event today! </span><a class="auto" data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brushfire.com/selfestem/conversationsinstem/526318" target="_blank"><span data-dcnode-id="2753" instrument_node="">https://brushfire.com/selfestem/conversationsinstem/526318</span></a></p></div><div class="j-meta" data-dcnode-id="2743"><ul data-dcnode-id="2746"><li data-dcnode-id="2747"><a aria-label="Likes" class="likes" data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5272725229424578" target="_blank"><span data-dcnode-id="2749" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="2744"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2745" href="https://chatnoir-webcontent.cha amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2734" datetime="2022-03-18T13:24:40.000-07:00"><span data-dcnode-id="2735" instrument_node="">36d</span></time></a></div><div class="j-message" data-dcnode-id="2724"><p data-dcnode-id="2725"><img alt="📣" class="emoji" data-dcnode-id="2731" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f4e3.svg&amp;raw"><span data-dcnode-id="2730" instrument_node=""> Have you heard?! Santa Clara County Parks is hiring a cohort of summer interns! They're looking for curious, enthusiastic, and nature-loving students to intern at for the County Parks this summer.  Learn more and apply today at </span><a class="auto" data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parks.sccgov.org/get-involved/career-opportunities/internships-temporary-job-postings/student-internships" target="_blank"><span data-dcnode-id="2729" instrument_node="">https://parks.sccgov.org/get-involved/career-opportunities/internships-temporary-job-postings/student-internships</span></a><br data-dcnode-id="2727"><span data-dcnode-id="2726" instrument_node="">SCC Parks stewards over 52,000 acres of public lands for all to enjoy.  Interning with them through work in the field or in an office will allow you to gain invaluable professional experience while supporting SCC Parks’ mission: To provide, protect, and preserve regional parklands for the enjoyment, education and inspiration of this and future generations.</span></p></div><div class="j-meta" data-dcnode-id="2717"><ul data-dcnode-id="2720"><li data-dcnode-id="2721"><a aria-label="Likes" class="likes" data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5264793756884392" target="_blank"><span data-dcnode-id="2723" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="2718"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5264793756884392" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2651" data-id="454249791" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2713" data-external-id="5259828224047612" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275946631_5259190080778093_906045774189379070_n.png?stp=dst-png_s720x720&amp;_nc_cat=100&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=2SdXleSW8YUAX-chUPA&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_UKFyMJfYnSKTMeN6jTivLsvMtqOKGFZG5QZQNVtzRgQ&amp;oe=6267356F" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5259828224047612" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/16/22 at 9:00PM" class="" data-dcnode-id="2714" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275946631_5259190080778093_906045774189379070_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D100%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D2SdXleSW8YUAX-chUPA%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_UKFyMJfYnSKTMeN6jTivLsvMtqOKGFZG5QZQNVtzRgQ%26oe%3D6267356F&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="2652"><div class="j-poster" data-dcnode-id="2706"><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="2712" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="2708" datetime="2022-03-16T21:00:04.000-07:00"><span data-dcnode-id="2709" instrument_node="">38d</span></time></a></div><div class="j-message" data-dcnode-id="2660"><p data-dcnode-id="2661"><span data-dcnode-id="2705" instrument_node="">Announcing this year's Teen Tech SF STEM Inclusivity Forum: "Diversity in Tech: Closing the Gap"! REGISTER NOW: 2022-ttsf-stem-inclusivity-forum.eventbrite.com. This event is free, but space is limited and advance registration is required.</span><br data-dcnode-id="2704"><br data-dcnode-id="2703"><span data-dcnode-id="2702" instrument_node="">2022 TeenTechSF STEM Inclusivity Forum</span><br data-dcnode-id="2701"><span data-dcnode-id="2700" instrument_node="">"Diversity in Tech: Closing the Gap"</span><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">Online via Zoom: Saturday, April 9th, 9:30am-12:30pm (PST)</span><br data-dcnode-id="2697"><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">This year, TeenTechSF is focusing on diversity, equity, and inclusion and learning about life in the tech industry from engineers like Jasmine Talavera, a UC Davis computer science and engineering graduate working in IT at Google, and Justin Friend, the Head of Customer Onboarding at Adobe!</span><br data-dcnode-id="2694"><br data-dcnode-id="2693"><span data-dcnode-id="2692" instrument_node="">We’ll also be exploring various STEM opportunities offered by organizations including internships, summer programs, and other resources for youth during a panel and networking session where you can meet people from Technovation, MissionBit, Code Tenderloin, and OpenBrackets to learn more about their organization and how to take part in it!</span><br data-dcnode-id="2691"><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">This is a gateway tech experience for many and TeenTechSF is proud to welcome students who are new to tech and coding! As part of the event, you'll also be able to participate in interactive, beginner-friendly STEM workshops including:</span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">Introduction to PyGame</span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">How to Create a LinkedIn Profile</span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">Prototyping with Figma</span><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node="">How To Make a Discord Bot</span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node="">How to Start a Personal Project for Your Coding Portfolio</span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">Image Detection with Machine Learning</span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">[EXCLUSIVE] OpenBrackets Workshop</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">[EXCLUSIVE] Technovation App Inventor Workshop</span><br data-dcnode-id="2672"><br data-dcnode-id="2671"><span data-dcnode-id="2670" instrument_node="">Like all TeenTechSF events, this event is completely FREE, but advance registration is required! Open to all students 13-18 years old -- no previous coding experience necessary.</span><br data-dcnode-id="2669"><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">REGISTER TODAY for the 2022 STEM Inclusivity Forum: 2022-ttsf-stem-inclusivity-forum.eventbrite.com!</span><br data-dcnode-id="2666"><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node="">~~</span><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">TeenTechSF is run by and for teens – Find out more about Who We Are and What We Do at TeenTechSF.org and fill out tinyurl.com/TTSFLeadershipInterest if you’d like to join the TeenTechSF student leadership team!</span></p></div><div class="j-meta" data-dcnode-id="2653"><ul data-dcnode-id="2656"><li data-dcnode-id="2657"><a aria-label="Likes" class="likes" data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5259828224047612" target="_blank"><span data-dcnode-id="2659" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="2654"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5259828224047612" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2615" data-id="454204483" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2649" data-external-id="5256542544376180" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/276035619_5256373767726391_4465218352260797151_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=105&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=tdAfROXZoLgAX974I-8&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_RCX45khkWn1fs3RHe8vyrJIXptVq0XZopEFo1jqOPVg&amp;oe=62681CFB" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5256542544376180" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/15/22 at 3:53PM" class="" data-dcnode-id="2650" src="https://chat  data-dcnode-id="2634" instrument_node="">Time: 6pm-7pm</span><br data-dcnode-id="2633"><span data-dcnode-id="2632" instrument_node="">Where: </span><a class="auto" data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stanford.zoom.us/j/92669657457%3Fpwd%3DbzdEcjdaQ1FWRWVSbUlMTzE2Nzk4Zz09" target="_blank"><span data-dcnode-id="2631" instrument_node="">https://stanford.zoom.us/j/92669657457?pwd=bzdEcjdaQ1FWRWVSbUlMTzE2Nzk4Zz09</span></a><br data-dcnode-id="2629"><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node="">What is SAGE?</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">SAGE (Science Accelerating Girls' Engagement) is a one-week summer camp for public high school students (age 14-17) hosted by scientists and engineers to share what life is like in STEM (Science, Technology, Engineering, and Mathematics) professions.</span><br data-dcnode-id="2624"><span data-dcnode-id="2623" instrument_node="">This program aims to foster innovation, grow the STEM community, and engage intelligent, creative, and passionate young women in the everyday life of scientists and engineers. Throughout the week, students will participate in job shadowing, hands-on projects, professional development, networking activities and more!</span></p></div><div class="j-meta" data-dcnode-id="2617"><ul data-dcnode-id="2620"></ul><nav data-dcnode-id="2618"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5256542544376180" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="2566" data-id="454042736" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="2613" data-external-id="5245821962114905" dat s="emoji" data-dcnode-id="2605" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f6a8.svg&amp;raw"><span data-dcnode-id="2604" instrument_node="">  Last chance to apply to Girlswhocode’s life-changing summer programs before the March 18th final deadline! </span><img alt="🚨" class="emoji" data-dcnode-id="2603" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f6a8.svg&amp;raw"><span data-dcnode-id="2602" instrument_node=""> </span><br data-dcnode-id="2601"><span data-dcnode-id="2600" instrument_node="">On March 14, GWC team members will answer questions about their free 2022 summer programs and offer live application help so students have everything they need to find new friends, new passions, and new opportunities. Register here: </span><a class="auto" data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//girlswhocode.zoom.us/webinar/register/9416426064509/WN_Z9nB-YGQRre56Sq4fvCKuQ" target="_blank"><span data-dcnode-id="2599" instrument_node="">https://girlswhocode.zoom.us/webinar/register/9416426064509/WN_Z9nB-YGQRre56Sq4fvCKuQ</span></a><br data-dcnode-id="2597"><br data-dcnode-id="2596"><img alt="‼" class="emoji" data-dcnode-id="2595" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/203c.svg&amp;raw"><span data-dcnode-id="2594" instrument_node=""> Important application reminder! For priority consideration, remember to select Bay Area Teen Science from the dropdown menu when asked about your Community Partner affiliation on the application.</span><br data-dcnode-id="2593"><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node="">The 2-week introductory Summer Immersion Program (SIP) welcomes current 9th-11th graders to join live virtual classrooms. You’ll make lifelong friendships as you learn web design together – creating real-world projects in HTML, CSS, and JavaScript. You’ll even get an exclusive behind-the-scenes look at industry-leading companies like EA, Pfizer, and ViacomCBS. </span><br data-dcnode-id="2590"><br data-dcnode-id="2589"><span data-dcnode-id="2588" instrument_node="">Both the Summer Immersion Program and the additional Self-Paced Program option are 100% free with options to join between June 17 - August 12.  Plus, both offer incredible college and career benefits that support you for life! </span><br data-dcnode-id="2587"><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node="">*Please note that the Self-Paced Program is reaching capacity and any future applicants who select that option will be put on the waitlist. The Summer Immersion Program (SIP) is still actively accepting new applications and students can also apply to receive a $500 SIP Student Grant!*</span><br data-dcnode-id="2584"><br data-dcnode-id="2583"><span data-dcnode-id="2582" instrument_node="">Learn more by visiting the FAQ page: </span><a class="auto" data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//girlswhocode.zendesk.com/hc/en-us/categories/202681357-GWC-Summer-Programs" target="_blank"><span data-dcnode-id="2581" instrument_node="">https://girlswhocode.zendesk.com/hc/en-us/categories/202681357-GWC-Summer-Programs</span></a><br data-dcnode-id="2579"><br data-dcnode-id="2578"><img alt="📣" class="emoji" data-dcnode-id="2577" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f4e3.svg&amp;raw"><span data-dcnode-id="2576" instrument_node=""> </span><img alt="📣" class="emoji" data-dcnode-id="2575" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f4e3.svg&amp;raw"
