data-dcnode-id="1346" instrument_node="">The program seeks to broaden students’ understanding of biotechnology and microbiology through a research project, as well as expose students to career exploration and preparation for college. This program is open to economically disadvantaged high school sophomores and juniors from schools in Contra Costa, Alameda, and San Francisco counties. Visit the program website for full eligibility details.</span><br data-dcnode-id="1345"><br data-dcnode-id="1344"><span data-dcnode-id="1343" instrument_node="">Applications are due March 31.</span><br data-dcnode-id="1342"><br data-dcnode-id="1341"><span data-dcnode-id="1340" instrument_node="">Program Highlights for Summer 2022:</span><br data-dcnode-id="1339"><span data-dcnode-id="1338" instrument_node="">• Receive a stipend of $1,500 for the program from June 22, 2022 to July 29, 2022</span><br data-dcnode-id="1337"><span data-dcnode-id="1336" instrument_node="">• Complete a hands-on, real-world research project in a state-of-the-art laboratory mentored by JBEI researchers and UC undergrads. The 2022 program will be remote, however, if regulations allow, we hope to have a few onsite activities in our state-of-the-art laboratories.</span><br data-dcnode-id="1335"><span data-dcnode-id="1334" instrument_node="">• Learn fundamental concepts in microbiology, molecular biology, biochemistry, biofuels, and synthetic biology.</span><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node="">• Prepare for the college admission process – write and revise a personal statement and learn about admissions requirements and financial aid.</span><br data-dcnode-id="1331"><span data-dcnode-id="1330" instrument_node="">• Explore careers through discussions with STEM professionals and visits to local biotechnology and pharmaceutical companies.</span><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">• Gain skills and confidence in communicating scientific research.</span></p></div><div class="j-meta" data-dcnode-id="1319"><ul data-dcnode-id="1322"><li data-dcnode-id="1323"><a aria-label="Likes" class="likes" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5246328675397567" target="_blank"><span data-dcnode-id="1325" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="1320"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5246328675397567" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1283" data-id="454042737" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1315" data-external-id="5245713442125757" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275529990_5242931012404000_6581892724753590310_n.png?stp=dst-png_p720x720&amp;_nc_cat=106&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=eqoLNwvGqxEAX8yhDuK&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-GNKD9TBRrJ6Rc7MT0MqVJ1iFWEsxtEVKrQb8RIdqZxA&amp;oe=6267255D" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5245713442125757" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/11/22 at 2:00PM" class="" data-dcnode-id="1316" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275529990_5242931012404000_6581892724753590310_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D106%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DeqoLNwvGqxEAX8yhDuK%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-GNKD9TBRrJ6Rc7MT0MqVJ1iFWEsxtEVKrQb8RIdqZxA%26oe%3D6267255D&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1284"><div class="j-poster" data-dcnode-id="1308"><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1314" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1310" datetime="2022-03-11T14:00:02.000-08:00"><span data-dcnode-id="1311" instrument_node="">43d</span></time></a></div><div class="j-message" data-dcnode-id="1289"><p data-dcnode-id="1290"><span data-dcnode-id="1307" instrument_node="">Join Science at Cal - UC Berkeley and Berkeley Lab for their upcoming event, "Fungi and Seaweed: Changing the way we think about meat"! Like all of Science at Cal's events, this event is free and open to the public. Register today at </span><a class="auto" data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lbnl.zoom.us/webinar/register/WN_395PwyA-QQud7zTQzWNPdQ" target="_blank"><span data-dcnode-id="1306" instrument_node="">https://lbnl.zoom.us/webinar/register/WN_395PwyA-QQud7zTQzWNPdQ</span></a><br data-dcnode-id="1304"><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">Fungi and Seaweed: Changing the way we think about meat</span><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">Thur, March 17, 2022 | 12:00–1:30 PM (PT)</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">Zoom - Registration Required</span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">Event website: </span><a class="auto" data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//events.berkeley.edu/index.php/calendar/sn/SciatCal.html%3Fevent_ID%3D143555%26view%3Dpreview" target="_blank"><span data-dcnode-id="1295" instrument_node="">https://events.berkeley.edu/index.php/calendar/sn/SciatCal.html?event_ID=143555&amp;view=preview</span></a><br data-dcnode-id="1293"><br data-dcnode-id="1292"><span data-dcnode-id="1291" instrument_node="">At this month's Midday Science Cafe, we’ll learn about two new meat alternatives made from foods we already know and love: seaweed and mushrooms! First course: seaweed. Dr. Amanda Stiles from Berkeley Lab is researching ways to extract the protein from seaweeds and incorporate it into delicious new foods. The highly-digestible, amino-acid rich protein concentrate UMARO Foods has developed enhances the color, texture, and flavor of plant-based foods. Second course: filamentous fungi! These organisms include mushrooms, which have formed part of the human diet for thousands of years. UC Berkeley’s Dr. Vayu Maini Rekdal, scientist and chef, will talk about his work between laboratories and Michelin-star restaurants studying and engineering these fungi for sustainably produced foods. Both scientists are working toward the common goal of solving sustainability issues and producing a new generation of meat alternatives. Let’s eat!</span></p></div><div class="j-meta" data-dcnode-id="1285"><ul data-dcnode-id="1288"></ul><nav data-dcnode-id="1286"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5245713442125757" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1249" data-id="453866185" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1281" data-external-id="5235463899817378" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275357448_5234880509875717_7097319554963153242_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=ihq-2cJduFUAX-T6YsO&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-yKZhICsTyAi-g4mScxv-L8oWZbc-r8RJ5ZVQBlFvt7A&amp;oe=6267F5E6" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5235463899817378" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/7/22 at 8:45PM" class="" data-dcnode-id="1282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275357448_5234880509875717_7097319554963153242_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dihq-2cJduFUAX-T6YsO%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-yKZhICsTyAi-g4mScxv-L8oWZbc-r8RJ5ZVQBlFvt7A%26oe%3D6267F5E6&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1250"><div class="j-poster" data-dcnode-id="1274"><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1280" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1276" datetime="2022-03-07T20:45:02.000-08:00"><span data-dcnode-id="1277" instrument_node="">47d</span></time></a></div><div class="j-message" data-dcnode-id="1258"><p data-dcnode-id="1259"><span data-dcnode-id="1273" instrument_node="">Are you looking for a summer program? Headwaters Science Institute offers two great programs - the Research Experience and the Girls Summer Research Camp - and financial assistance is available! But don't hesitate: The deadline to apply for financial assistance for both programs, April 1, 2022, is less than a month away.</span><br data-dcnode-id="1272"><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">If you haven't heard, the Research Experience introduces students to scientific research and connects students to professional science mentors. This program, which teaches life skills that prepare students for any career, is great for boosting a college application. Learn more here: </span><a class="auto" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//headwatersscienceinstitute.org/science-camp/digital-research-program/" target="_blank"><span data-dcnode-id="1269" instrument_node="">https://headwatersscienceinstitute.org/science-camp/digital-research-program/</span></a><br data-dcnode-id="1267"><br data-dcnode-id="1266"><span data-dcnode-id="1265" instrument_node="">The Girls Summer Research Camp is a week of girls-only science and camping at the Truckee Donner Land Trust’s Webber Lake Campground. Students work with an all-female cohort of peers and with professional female scientist mentors to create a research project around their topic of interest. Girls can also use this camp as part of a full Research Experience. Learn more here: </span><a class="auto" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//headwatersscienceinstitute.org/science-camp/girls-summer-science-camp/" target="_blank"><span data-dcnode-id="1264" instrument_node="">https://headwatersscienceinstitute.org/science-camp/girls-summer-science-camp/</span></a><br data-dcnode-id="1262"><br data-dcnode-id="1261"><span data-dcnode-id="1260" instrument_node="">Each program's website includes a link to the financial assistance application.</span></p></div><div class="j-meta" data-dcnode-id="1251"><ul data-dcnode-id="1254"><li data-dcnode-id="1255"><a aria-label="Likes" class="likes" data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5235463899817378" target="_blank"><span data-dcnode-id="1257" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="1252"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5235463899817378" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1198" data-id="453721242" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1247" data-external-id="5224371484259953" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275114589_5223897470974021_8763185732380644294_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=m9P2mIx61CAAX_gY61j&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9kFFUE2486IBjszq4-dHNXpOHiHLtnovA2lsx0TN13ng&amp;oe=6267EDED" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5224371484259953" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/3/22 at 8:00PM" class="" data-dcnode-id="1248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275114589_5223897470974021_8763185732380644294_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dm9P2mIx61CAAX_gY61j%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9kFFUE2486IBjszq4-dHNXpOHiHLtnovA2lsx0TN13ng%26oe%3D6267EDED&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1199"><div class="j-poster" data-dcnode-id="1240"><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1246" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1242" datetime="2022-03-03T20:00:03.000-08:00"><span data-dcnode-id="1243" instrument_node="">51d</span></time></a></div><div class="j-message" data-dcnode-id="1204"><p data-dcnode-id="1205"><span data-dcnode-id="1239" instrument_node="">Like maps? Who doesn't?! The UC Berkeley Library is hosting their third annual "Map the Bay" Student Mapmaking Contest for Bay Area students. Submissions are due at 12pm (noon) on April 1, 2022. Maps can be real or imaginary, hand drawn or created on a computer, as long as they have some Bay Area connection. </span><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node=""> </span><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">Finalists will be featured in the virtual exhibit, Mapping the Bay. Four winning entries, selected through public voting, will receive a $50 gift card!</span><br data-dcnode-id="1234"><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">To enter the contest fill out the entry form and upload your map at: </span><br data-dcnode-id="1231"><a class="auto" data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ucblib.link/map-contest-form" target="_blank"><span data-dcnode-id="1230" instrument_node="">http://ucblib.link/map-contest-form</span></a><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node=""> </span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node="">Check out the contest video: </span><a class="auto" data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/Ds-Z7lnfuH4" target="_blank"><span data-dcnode-id="1224" instrument_node="">https://youtu.be/Ds-Z7lnfuH4</span></a><br data-dcnode-id="1222"><br data-dcnode-id="1221"><span data-dcnode-id="1220" instrument_node="">Find more contest details here: </span><a class="auto" data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ucblib.link/mapcontest" target="_blank"><span data-dcnode-id="1219" instrument_node="">http://ucblib.link/mapcontest</span></a><br data-dcnode-id="1217"><br data-dcnode-id="1216"><span data-dcnode-id="1215" instrument_node="">View the online exhibit and past entries here: </span><a class="auto" data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exhibits.lib.berkeley.edu/spotlight/mapthebay" target="_blank"><span data-dcnode-id="1214" instrument_node="">https://exhibits.lib.berkeley.edu/spotlight/mapthebay</span></a><br data-dcnode-id="1212"><br data-dcnode-id="1211"><span data-dcnode-id="1210" instrument_node="">Questions? Email </span><a class="auto" data-dcnode-id="1208" href="mailto:map-contest@berkeley.edu" target="_blank"><span data-dcnode-id="1209" instrument_node="">map-contest@berkeley.edu</span></a><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">or tweet @geolibraryucb</span></p></div><div class="j-meta" data-dcnode-id="1200"><ul data-dcnode-id="1203"></ul><nav data-dcnode-id="1201"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5224371484259953" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1154" data-id="453679353" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1196" data-external-id="5221134844583617" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275154205_5220834144613687_4173128110319104845_n.png?stp=dst-png_p720x720&amp;_nc_cat=104&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=EbHRZKBPAOUAX955CNn&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-uFTnkRvREmcbcV3gH_L0Iux_6FzyRVLGnewVvyxGu4g&amp;oe=6267FDBF" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5221134844583617" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/2/22 at 4:05PM" class="" data-dcnode-id="1197" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/275154205_5220834144613687_4173128110319104845_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DEbHRZKBPAOUAX955CNn%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-uFTnkRvREmcbcV3gH_L0Iux_6FzyRVLGnewVvyxGu4g%26oe%3D6267FDBF&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1155"><div class="j-poster" data-dcnode-id="1189"><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1195" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1191" datetime="2022-03-02T16:05:02.000-08:00"><span data-dcnode-id="1192" instrument_node="">52d</span></time></a></div><div class="j-message" data-dcnode-id="1163"><p data-dcnode-id="1164"><span data-dcnode-id="1188" instrument_node="">Looking for something fun to do on Friday? Join Science at Cal - UC Berkeley and The Lawrence Hall of Science as they put the "A" in "STEAM" at the next First Fridays, a popular art and street fair in downtown Oakland! They'll be exploring the space where science meets art through a Cal student's gallery of Black physicists and a hands-on activity led by the Lawrence Hall of Science. Learn more at </span><a class="auto" data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//events.berkeley.edu/index.php/calendar/sn/SciatCal.html%3Fevent_ID%3D145145%26date%3D2022-03-04" target="_blank"><span data-dcnode-id="1187" instrument_node="">https://events.berkeley.edu/index.php/calendar/sn/SciatCal.html?event_ID=145145&amp;date=2022-03-04</span></a><br data-dcnode-id="1185"><br data-dcnode-id="1184"><img alt="🗓" class="emoji" data-dcnode-id="1183" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f5d3.svg&amp;raw"><span data-dcnode-id="1182" instrument_node="">   Friday, March 4 | 5–9PM</span><br data-dcnode-id="1181"><img alt="📍" class="emoji" data-dcnode-id="1180" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f4cd.svg&amp;raw"><span data-dcnode-id="1179" instrument_node="">   Telegraph Ave. between West Grand &amp; 27th St.</span><br data-dcnode-id="1178"><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">Featuring:</span><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">Lawrence Hall of Science's Hands-On Activity. Experiment with engineering and motion as you design and test Artbots. Observe and compare how your motorized contraptions perform as you create surprising and unexpected patterns.</span><br data-dcnode-id="1173"><br data-dcnode-id="1172"><span data-dcnode-id="1171" instrument_node="">UC Berkeley Scientist</span><br data-dcnode-id="1170"><span data-dcnode-id="1169" instrument_node="">Anasuya Lyons</span><br data-dcnode-id="1168"><span data-dcnode-id="1167" instrument_node="">Student, Depts of Physics &amp; Mathematics</span><br data-dcnode-id="1166"><span data-dcnode-id="1165" instrument_node="">Artist and creator, Honoring Influential Black Physicists</span></p></div><div class="j-meta" data-dcnode-id="1156"><ul data-dcnode-id="1159"><li data-dcnode-id="1160"><a aria-label="Likes" class="likes" data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5221134844583617" target="_blank"><span data-dcnode-id="1162" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="1157"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5221134844583617" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1131" data-id="453679355" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1152" data-external-id="5220833554613746" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273642853_5153554004675035_4096739766220322314_n.png?_nc_cat=104&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=aEY1ELFB_r4AX_L4FO7&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9nAjTk-2XCQgCsZMz11JMp0aSPp-p3nfN3BkwUeAJmkw&amp;oe=62675149" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220833554613746" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 3/2/22 at 1:32PM" class="" data-dcnode-id="1153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273642853_5153554004675035_4096739766220322314_n.png%3F_nc_cat%3D104%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DaEY1ELFB_r4AX_L4FO7%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9nAjTk-2XCQgCsZMz11JMp0aSPp-p3nfN3BkwUeAJmkw%26oe%3D62675149&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1132"><div class="j-poster" data-dcnode-id="1145"><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1151" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1147" datetime="2022-03-02T13:32:01.000-08:00"><span data-dcnode-id="1148" instrument_node="">52d</span></time></a></div><div class="j-message" data-dcnode-id="1140"><p data-dcnode-id="1141"><span data-dcnode-id="1144" instrument_node="">Mark your calendars! Berkeley Lab K-12 STEM will be hosting an info session about all of their summer programs on March 12, 2022 from 10-11:30am PST. Join LBL's K-12 team to learn about the details of their fantastic programs and how to apply before applications are due in early April. Register here: </span><a class="auto" data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lbnl.zoom.us/meeting/register/tJ0oc-CvrDktGta_-LUfBcFU5BLpDGd52Wfw" target="_blank"><span data-dcnode-id="1143" instrument_node="">https://lbnl.zoom.us/meeting/register/tJ0oc-CvrDktGta_-LUfBcFU5BLpDGd52Wfw</span></a></p></div><div class="j-meta" data-dcnode-id="1133"><ul data-dcnode-id="1136"><li data-dcnode-id="1137"><a aria-label="Likes" class="likes" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220833554613746" target="_blank"><span data-dcnode-id="1139" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="1134"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5220833554613746" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1079" data-id="453394490" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1129" data-external-id="5200973043266464" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274604439_5200867416610360_4060759579440343171_n.png?stp=dst-png_s720x720&amp;_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=ciwtiRGjXO0AX8398Xz&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-18HsrLMribXZLibGjraByjD-cPGIJfo58K6Gw2QwhKw&amp;oe=62675180" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5200973043266464" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/23/22 at 3:12PM" class="" data-dcnode-id="1130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274604439_5200867416610360_4060759579440343171_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D107%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DciwtiRGjXO0AX8398Xz%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-18HsrLMribXZLibGjraByjD-cPGIJfo58K6Gw2QwhKw%26oe%3D62675180&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1080"><div class="j-poster" data-dcnode-id="1122"><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1128" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1124" datetime="2022-02-23T15:12:13.000-08:00"><span data-dcnode-id="1125" instrument_node="">59d</span></time></a></div><div class="j-message" data-dcnode-id="1085"><p data-dcnode-id="1086"><span data-dcnode-id="1121" instrument_node="">Applications for California Life Sciences - CLS'  NexGeneGirls 2022 Summer Science Program are open! NexGeneGirls delivers a unique program incorporating rigorous hands-on research, leadership development and career exploration for high school females of color from historically excluded communities in the San Francisco Bay Area. The program serves rising sophomores, juniors and seniors. Learn more at </span><a class="auto" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.califesciences.org/nexgenegirls/" target="_blank"><span data-dcnode-id="1120" instrument_node="">https://www.califesciences.org/nexgenegirls/</span></a><span data-dcnode-id="1118" instrument_node=""> </span><br data-dcnode-id="1117"><br data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">The core program takes place over 8 weeks in the summer (June 13 – August 5, 2022) for 30-35 hours per week, preceded by two mandatory Saturday workshops in April. The core program takes place in San Francisco, with internships located throughout the Bay Area.</span><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node=""> </span><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">Details:</span><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">Applicants who are accepted into the 2022 program will receive a $4000 stipend for completing the full program and includes:</span><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">NexGeneGirls Spring Bootcamp: 2 Saturdays in April 2022 (TBD)</span><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">NexGeneGirls Summer Science Academy: June 13 – August 5, 2022</span><br data-dcnode-id="1104"><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">Eligibility:</span><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">Students must submit an online application and include a letter of recommendation from a teacher or mentor.</span><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">Applicants must be a resident of the San Francisco Bay Area, identify as female and be currently enrolled in 9th, 10th, or 11th grade.</span><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">Selected participants will be required to participate in the full program.</span><br data-dcnode-id="1095"><span data-dcnode-id="1094" instrument_node="">Selected participants will be required to provide proof of up-to-date COVID vaccination status.</span><br data-dcnode-id="1093"><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">Application link: </span><a class="auto" data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//formstack.io/4BACC" target="_blank"><span data-dcnode-id="1090" instrument_node="">https://formstack.io/4BACC</span></a><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">Applications close on Monday, March 14.</span></p></div><div class="j-meta" data-dcnode-id="1081"><ul data-dcnode-id="1084"></ul><nav data-dcnode-id="1082"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5200973043266464" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="1047" data-id="453129451" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1077" data-external-id="5178575708839531" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274134057_5178561362174299_5535375843161083309_n.png?stp=dst-png_s720x720&amp;_nc_cat=100&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=2KVJyXrnVzYAX-qKBup&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8W_-Yz_e0cvxAaSJ0U4WkSS2hXa-oEJLs6AawpOZB_ZA&amp;oe=62673B9C" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5178575708839531" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/16/22 at 3:07PM" class="" data-dcnode-id="1078" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/274134057_5178561362174299_5535375843161083309_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D100%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D2KVJyXrnVzYAX-qKBup%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8W_-Yz_e0cvxAaSJ0U4WkSS2hXa-oEJLs6AawpOZB_ZA%26oe%3D62673B9C&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1048"><div class="j-poster" data-dcnode-id="1070"><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1076" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1072" datetime="2022-02-16T15:07:05.000-08:00"><span data-dcnode-id="1073" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="1053"><p data-dcnode-id="1054"><span data-dcnode-id="1069" instrument_node="">Are you part of a student-run organization focused on Sustainability and Environmental Science, Computer Science and Coding, or Healthcare and Medical Technology? The Tech Interactive is looking for community organizations with high school/youth programming interested in giving a brief presentation during their virtual STEM Opportunity Fair on March 12, 2022.  </span><br data-dcnode-id="1068"><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">If you think your organization would be a good fit for this event, please reach out to Clarissa Buettner at </span><a class="auto" data-dcnode-id="1064" href="mailto:cbuettner@thetech.org" target="_blank"><span data-dcnode-id="1065" instrument_node="">cbuettner@thetech.org</span></a><span data-dcnode-id="1063" instrument_node=""> by February 25.</span><br data-dcnode-id="1062"><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">~~</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">About the event</span><br data-dcnode-id="1057"><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">This virtual event will include a panel discussion and Q&amp;A on STEM careers from a group of amazing role models followed by a “job fair” style STEM Opportunity Fair. During the STEM fair attendees will have a chance to hear from community organizations and partners about programs that they could join as high school students, such as summer camps, youth organizations or general learning opportunities. This event was designed with young women and non-binary students in mind but all are welcome. The Tech's hope is to create an experience where pursuing STEM careers and exploring STEM interests is possible for anyone.</span></p></div><div class="j-meta" data-dcnode-id="1049"><ul data-dcnode-id="1052"></ul><nav data-dcnode-id="1050"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5178575708839531" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="1033" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1045" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-05.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="1046" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-about-05.svg&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1034"><div class="j-poster" data-dcnode-id="1040"><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Profile image for Juicer" data-dcnode-id="1044" data-poster-id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/logo-without-text.svg&amp;raw"><h3 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Juicer</span></h3></a></div><div class="j-message" data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node="">Like this feed? Want one of your own? Visit </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science"><span data-dcnode-id="1038" instrument_node="">Juicer.io</span></a><span data-dcnode-id="1036" instrument_node=""> to get your own free social media feed!</span></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="999" data-id="452886343" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="1031" data-external-id="5156764557687313" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273676854_5153580621339040_7244251231872962653_n.png?stp=dst-png_s720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=d9exxXL1wh4AX-vkt7D&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT-btVRmjV-6OUakgz7i78sbRA827rxGiXyzlAoIVMO7eg&amp;oe=626809F3" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5156764557687313" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/9/22 at 4:46PM" class="" data-dcnode-id="1032" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273676854_5153580621339040_7244251231872962653_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dd9exxXL1wh4AX-vkt7D%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT-btVRmjV-6OUakgz7i78sbRA827rxGiXyzlAoIVMO7eg%26oe%3D626809F3&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="1000"><div class="j-poster" data-dcnode-id="1024"><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="1030" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="1026" datetime="2022-02-09T16:46:12.000-08:00"><span data-dcnode-id="1027" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="1008"><p data-dcnode-id="1009"><span data-dcnode-id="1023" instrument_node="">Student Makers, a soon-to-be registered student organization at UC Berkeley, announces a design contest for high school students! Learn more and submit an application at </span><a class="auto" data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studentmakers.org/designchallenge" target="_blank"><span data-dcnode-id="1022" instrument_node="">https://www.studentmakers.org/designchallenge</span></a><br data-dcnode-id="1020"><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">The Student Makers Design Challenge aims to help high-school students who are passionate in solving real-world issues to research, develop, and make their solutions come true. Through mentorship from college students who are specialized in the field, students will learn the process of iterative design to strengthen their creativity, collaboration, and even prototyping skills. To encourage ideas to be further developed and implemented, they will be funding selected finalist teams from this challenge!</span><br data-dcnode-id="1017"><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">Eligibility: Any high school student in teams of 2-5 members. (Please contact Student Markers via email if you want to work independently, cannot find a team, or your team consists of more than 5 members.) </span><br data-dcnode-id="1014"><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">For more information, including the timeline for the challenge, visit </span><a class="auto" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studentmakers.org/designchallenge" target="_blank"><span data-dcnode-id="1011" instrument_node="">https://www.studentmakers.org/designchallenge</span></a></p></div><div class="j-meta" data-dcnode-id="1001"><ul data-dcnode-id="1004"><li data-dcnode-id="1005"><a aria-label="Likes" class="likes" data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5156764557687313" target="_blank"><span data-dcnode-id="1007" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="1002"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5156764557687313" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="943" data-id="452720109" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="997" data-external-id="5140461665984269" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273320746_5137528146277621_5098234569535311868_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=103&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=49aO0vQPLNAAX_N0o01&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9nYpOJpCWQ6a4V2FvD0A33MjOjli7jzhwcfAlkC4TivA&amp;oe=626896D6" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5140461665984269" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/4/22 at 10:05AM" class="" data-dcnode-id="998" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273320746_5137528146277621_5098234569535311868_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D103%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3D49aO0vQPLNAAX_N0o01%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9nYpOJpCWQ6a4V2FvD0A33MjOjli7jzhwcfAlkC4TivA%26oe%3D626896D6&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="944"><div class="j-poster" data-dcnode-id="990"><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="996" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="992" datetime="2022-02-04T10:05:28.000-08:00"><span data-dcnode-id="993" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="952"><p data-dcnode-id="953"><span data-dcnode-id="989" instrument_node="">Berkeley Girls in Engineering is now accepting applications for Summer 2022! Don't miss out—apply today! Visit </span><a class="auto" data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//girlsinengineering.berkeley.edu/programs/" target="_blank"><span data-dcnode-id="988" instrument_node="">http://girlsinengineering.berkeley.edu/programs/</span></a><span data-dcnode-id="986" instrument_node=""> for more details. </span><br data-dcnode-id="985"><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node="">Girls in Engineering is a hands-on summer camp for middle school students interested in learning more about engineering, STEM/STE(A)M, and design thinking. Taught by Cal researchers and students, campers gain exposure to engineering, design thinking, and real-world problem solving through hands-on activities and team projects. </span><br data-dcnode-id="982"><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">What: UC Berkeley’s Girls in Engineering Summer Camp</span><br data-dcnode-id="979"><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">Who: Students entering 6th, 7th, or 8th grade and living in the Bay Area</span><br data-dcnode-id="976"><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">When: </span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node="">•  Session 1:  June 27 - July 1,   9am – 4:30pm</span><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">•  Session 2:  July 11 - 15,   9am – 4:30pm</span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">•  Session 3:  July 18 - 22,   9am – 4:30pm</span><br data-dcnode-id="967"><br data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">Where: UC Berkeley Campus</span><br data-dcnode-id="964"><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node="">Don't let the cost of camp prevent you from applying. GiE awards full and partial scholarships based on financial need and actively recruits students from low socio-economic means and underrepresented minority groups. </span><br data-dcnode-id="961"><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">Applications Deadline: March 31, 2022 (or once 250 applications have been submitted). Apply today!</span><br data-dcnode-id="958"><br data-dcnode-id="957"><span data-dcnode-id="956" instrument_node="">Questions?: email </span><a class="auto" data-dcnode-id="954" href="mailto:gie@berkeley.edu" target="_blank"><span data-dcnode-id="955" instrument_node="">gie@berkeley.edu</span></a></p></div><div class="j-meta" data-dcnode-id="945"><ul data-dcnode-id="948"><li data-dcnode-id="949"><a aria-label="Likes" class="likes" data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5140461665984269" target="_blank"><span data-dcnode-id="951" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="946"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5140461665984269" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="898" data-id="452685414" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="941" data-external-id="5137765416253894" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273399765_5137496092947493_2602343959249383735_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=110&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=nH1_221-vgAAX9IMwzw&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8i36SRNb7pWKGmviXFEB5T35lzm5EdGn_6taYOHK-HQw&amp;oe=62671427" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5137765416253894" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 2/3/22 at 3:43PM" class="" data-dcnode-id="942" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273399765_5137496092947493_2602343959249383735_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D110%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DnH1_221-vgAAX9IMwzw%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8i36SRNb7pWKGmviXFEB5T35lzm5EdGn_6taYOHK-HQw%26oe%3D62671427&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="899"><div class="j-poster" data-dcnode-id="934"><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="940" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="936" datetime="2022-02-03T15:43:15.000-08:00"><span data-dcnode-id="937" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="907"><p data-dcnode-id="908"><span data-dcnode-id="933" instrument_node="">Attention 3rd-6th graders! From March to May 2022, STEMpower will host virtual Saturday workshops for students in grades 3-6! If you are interested, please register at tinyurl.com/stempowerspring2022</span><br data-dcnode-id="932"><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">For the month of March, STEMpower is offering two series: Intro to Physics (grades 3-4) or Intro to Computer Science (grades 5-6). The workshop topics for April and May are TBD, but will be announced as soon as they are finalized.</span><br data-dcnode-id="929"><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">Introducing STEMpower!</span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">STEMpower is a volunteer organization based in the Bay Area whose mission is to inspire the next generation of creative thinkers to be interested in STEM fields through hands-on, engaging workshops and content.</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">STEMpower provides opportunities to learn and collaborate for students of all ages. </span><br data-dcnode-id="922"><br data-dcnode-id="921"><span data-dcnode-id="920" instrument_node="">How can I get more involved with STEMpower? </span><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">Although STEMpower is not actively seeking volunteers at the moment, all high schoolers are free to apply at any time to join the STEMpower team. Positions include social media managers, workshop facilitators, curriculum designers, website designers, blog writers, newsletter editors, and outreach team members! To learn more about how to be a part of our volunteer committee, please visit our website at </span><a class="auto" data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stempowerus.org/join-our-team" target="_blank"><span data-dcnode-id="917" instrument_node="">https://www.stempowerus.org/join-our-team</span></a><span data-dcnode-id="915" instrument_node="">.</span><br data-dcnode-id="914"><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">Questions? Email STEMpower at </span><a class="auto" data-dcnode-id="910" href="mailto:stempower.ca@gmail.com" target="_blank"><span data-dcnode-id="911" instrument_node="">stempower.ca@gmail.com</span></a><span data-dcnode-id="909" instrument_node=""> or visit their website at stempowerus.org.</span></p></div><div class="j-meta" data-dcnode-id="900"><ul data-dcnode-id="903"><li data-dcnode-id="904"><a aria-label="Likes" class="likes" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5137765416253894" target="_blank"><span data-dcnode-id="906" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="901"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5137765416253894" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="866" data-id="452607296" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="896" data-external-id="5130971066933329" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/273186155_5130956723601430_258888797066879559_n.png?stp=dst-png_s720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=G8zb18Brnt4AX-vDL5V&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_ar76x8V0k3Pg85pL5Bv-JT_5ConQugfHHefBFaL7E0w&amp;oe=6267C8ED" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5130971066933329" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area T an data-dcnode-id="884" instrument_node="">A Girls Who Code team member will go over everything you need to know about this year's summer opportunities so you can confidently submit an application for priority consideration before the February 16 early-decision deadline. </span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">Learn more about GWC's summer programs at </span><a class="auto" data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//girlswhocode.com/programs/summer-immersion-program" target="_blank"><span data-dcnode-id="881" instrument_node="">https://girlswhocode.com/programs/summer-immersion-program</span></a><span data-dcnode-id="879" instrument_node=""> </span><br data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">Important reminder -- Make sure to list Bay Area Teen Science as your Community Partner on the application to receive priority consideration!</span></p></div><div class="j-meta" data-dcnode-id="868"><ul data-dcnode-id="871"><li data-dcnode-id="872"><a aria-label="Likes" class="likes" data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5130971066933329" target="_blank"><span data-dcnode-id="874" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="869"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5130971066933329" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="836" data-id="452395852" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="864" data-external-id="5109030449127391" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272824393_5109023195794783_9058607379783998147_n.png?stp=dst-png_s720x720&amp;_nc_cat=102&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=n2Z0GL8bI_cAX8_JvZr&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT85KKH76DpfrZapXer4IredxEwWH-qtQrkwlAxf3e_06Q&amp;oe=62672380" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5109030449127391" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/26/22 at 4:48PM" class="" data-dcnode-id="865" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272824393_5109023195794783_9058607379783998147_n.png%3Fstp%3Ddst-png_s720x720%26_nc_cat%3D102%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3Dn2Z0GL8bI_cAX8_JvZr%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT85KKH76DpfrZapXer4IredxEwWH-qtQrkwlAxf3e_06Q%26oe%3D62672380&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="837"><div class="j-poster" data-dcnode-id="857"><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="863" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="859" datetime="2022-01-26T16:48:40.000-08:00"><span data-dcnode-id="860" instrument_node="">2mo</span></time></a></div><div class="j-message" data-dcnode-id="842"><p data-dcnode-id="843"><span data-dcnode-id="856" instrument_node="">Did you know that UC Santa Cruz runs a summer research program? The Science Internship Program (SIP) is a summer-long research internship program for high school students in STEM fields. UCSC faculty, graduate students, and post-doctoral researchers provide one-on-one mentoring and students are inserted into existing research projects. Learn more at </span><a class="auto" data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sip.ucsc.edu/" target="_blank"><span data-dcnode-id="855" instrument_node="">https://sip.ucsc.edu/</span></a><br data-dcnode-id="853"><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">*Info session today at 6pm!* </span><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">Prospective SIP applicants can tune in to a virtual information session to learn about the program and to ask questions. Virtual information sessions will be held every Wednesday until the end of the application filing period (the SIP Application Portal will be open from March 1–31, 2022), and the information sessions during the application filing period will be specifically about how to complete the application. The first info session is today at 6pm!  </span><br data-dcnode-id="848"><br data-dcnode-id="847"><span data-dcnode-id="846" instrument_node="">** Scholarships are available! ** SIP encourages students to apply even if they are worried that they might not be able to afford the program. You can also learn about SIP's commitment to diversity, equity and inclusion at </span><a class="auto" data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sip.ucsc.edu/about/creating-equity-in-stem/" target="_blank"><span data-dcnode-id="845" instrument_node="">https://sip.ucsc.edu/about/creating-equity-in-stem/</span></a></p></div><div class="j-meta" data-dcnode-id="838"><ul data-dcnode-id="841"></ul><nav data-dcnode-id="839"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5109030449127391" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="815" data-id="452170492" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="834" data-external-id="5098935083470261" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272680210_5098930486804054_5251774422475801668_n.jpg?stp=dst-jpg_p720x720&amp;_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=EmV6VUeJNb0AX8nHnRU&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT_Zv6ZWX51xYbFXlO-zBvqFCKTRghjDF3kZYeiEpBguyQ&amp;oe=626736FE" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5098935083470261" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/24/22 at 11:36AM" class="" data-dcnode-id="835" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272680210_5098930486804054_5251774422475801668_n.jpg%3Fstp%3Ddst-jpg_p720x720%26_nc_cat%3D107%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DEmV6VUeJNb0AX8nHnRU%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT_Zv6ZWX51xYbFXlO-zBvqFCKTRghjDF3kZYeiEpBguyQ%26oe%3D626736FE&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="816"><div class="j-poster" data-dcnode-id="827"><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="833" data-poster-id="268542719842879" src="https://chatnoir-w dent looking for volunteer opportunities this summer? If you will be a rising 10th, 11th, or 12th grader this summer, you can apply to be a volunteer for the Girls in Engineering summer camp.</span><br data-dcnode-id="804"><br data-dcnode-id="803"><span data-dcnode-id="802" instrument_node="">Learn more about volunteering for GiE at </span><a class="auto" data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//girlsinengineering.berkeley.edu/volunteer/" target="_blank"><span data-dcnode-id="801" instrument_node="">http://girlsinengineering.berkeley.edu/volunteer/</span></a><br data-dcnode-id="799"><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">The application deadline is April 1, but applications may close earlier if GiE fills all available spots.</span><br data-dcnode-id="796"><br data-dcnode-id="795"><span data-dcnode-id="794" instrument_node="">Interested in applying to GiE as a camper? Mark your calendars -- GiE's camper application opens January 31.</span></p></div><div class="j-meta" data-dcnode-id="785"><ul data-dcnode-id="788"><li data-dcnode-id="789"><a aria-label="Likes" class="likes" data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081553251875111" target="_blank"><span data-dcnode-id="791" instrument_node="">1</span></a></li></ul><nav data-dcnode-id="786"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5081553251875111" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="757" data-id="451851890" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="781" data-external-id="5080524851977951" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272200058_5076630605700709_6512860600679150097_n.png?stp=dst-png_p720x720&amp;_nc_cat=109&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=nXWPFMhl-IkAX8o-26v&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT8N--zXLEOJU8feWKfDusCBKJYGyKacPnS6YAL6lZv-lw&amp;oe=6268161C" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5080524851977951" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/20/22 at 10:40AM" class="" data-dcnode-id="782" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/272200058_5076630605700709_6512860600679150097_n.png%3Fstp%3Ddst-png_p720x720%26_nc_cat%3D109%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DnXWPFMhl-IkAX8o-26v%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT8N--zXLEOJU8feWKfDusCBKJYGyKacPnS6YAL6lZv-lw%26oe%3D6268161C&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="758"><div class="j-poster" data-dcnode-id="774"><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="780" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="776" datetime="2022-01-20T10:40:02.000-08:00"><span data-dcnode-id="777" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="766"><p data-dcnode-id="767"><span data-dcnode-id="773" instrument_node="">Did you know that clouds can both warm and cool the planet? Keeping an eye on clouds helps NASA - National Aeronautics and Space Administration study our climate. The GLOBE Program is inviting citizen scientists to contribute their local cloud data to this effort during the NASA GLOBE Cloud Challenge 2022: Clouds in a Changing Climate.</span><br data-dcnode-id="772"><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">Cloud observers of all ages around the world are invited to join the challenge, Jan. 15 - Feb. 15. Learn more at </span><a class="auto" data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//observer.globe.gov/do-globe-observer/challenges/cloud-challenge-2022" target="_blank"><span data-dcnode-id="769" instrument_node="">https://observer.globe.gov/do-globe-observer/challenges/cloud-challenge-2022</span></a></p></div><div class="j-meta" data-dcnode-id="759"><ul data-dcnode-id="762"><li data-dcnode-id="763"><a aria-label="Likes" class="likes" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5080524851977951" target="_blank"><span data-dcnode-id="765" instrument_node="">2</span></a></li></ul><nav data-dcnode-id="760"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5080524851977951" target="_blank"></a></nav></div></div></li><li class="feed-item j-facebook j-facebook-bg image-post BayAreaTeenScience is-not-youTube" data-dcnode-id="731" data-id="451722707" data-source="facebook" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="755" data-external-id="5058513230845780" data-image="https://scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271834793_5049286181768485_7860663018905286898_n.jpg?stp=dst-jpg_s720x720&amp;_nc_cat=111&amp;ccb=1-5&amp;_nc_sid=8024bb&amp;_nc_ohc=OIFKSTtJKwIAX9nXk61&amp;_nc_ht=scontent-lga3-1.xx&amp;edm=AJfPMC4EAAAA&amp;oh=00_AT9VjHBdRsliI2OjtFrAkCKPvrSIf5jcZRQXJVQXTUIjRw&amp;oe=6267E6ED" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5058513230845780" target="_blank"><img alt="Photo from @BayAreaTeenScience on Facebook on Bay Area Teen Science (B.A.T.S.) at 1/15/22 at 3:32PM" class="" data-dcnode-id="756" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scontent-lga3-1.xx.fbcdn.net/v/t39.30808-6/271834793_5049286181768485_7860663018905286898_n.jpg%3Fstp%3Ddst-jpg_s720x720%26_nc_cat%3D111%26ccb%3D1-5%26_nc_sid%3D8024bb%26_nc_ohc%3DOIFKSTtJKwIAX9nXk61%26_nc_ht%3Dscontent-lga3-1.xx%26edm%3DAJfPMC4EAAAA%26oh%3D00_AT9VjHBdRsliI2OjtFrAkCKPvrSIf5jcZRQXJVQXTUIjRw%26oe%3D6267E6ED&amp;raw" style="width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;"></a><div class="j-text" data-dcnode-id="732"><div class="j-poster" data-dcnode-id="748"><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/profile.php%3Fid%3D268542719842879" target="_blank"><img alt="Profile image for Bay Area Teen Science (B.A.T.S.)" data-dcnode-id="754" data-poster-id="268542719842879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/silhouette-avatar.jpg&amp;raw"><h3 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Bay Area Teen Science (B.A.T.S.)</span></h3><time class="j-date" data-dcnode-id="750" datetime="2022-01-15T15:32:02.000-08:00"><span data-dcnode-id="751" instrument_node="">3mo</span></time></a></div><div class="j-message" data-dcnode-id="737"><p data-dcnode-id="738"><span data-dcnode-id="747" instrument_node="">How do scientists know what they know about climate change and the behavior of carbon on earth? Understanding these intricate systems requires knowing where carbon comes from and how it moves, which drives scientists to explore the Amazon, simulate with super-computers, and heed the long-suppressed knowledge of indigenous communities.</span><br data-dcnode-id="746"><br data-dcnode-id="745"><span data-dcnode-id="744" instrument_node="">Join Berkeley Lab K-12 STEM for their next Live Science on January 21st at 3pm PT to hear from researchers at Berkeley Lab and UC Berkeley who study these phenomena, and gain a better understanding of one of earth's most important cycles. </span><br data-dcnode-id="743"><br data-dcnode-id="742"><span data-dcnode-id="741" instrument_node="">Register at </span><a class="auto" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k12education.lbl.gov/programs/virtual/live-science" target="_blank"><span data-dcnode-id="740" instrument_node="">https://k12education.lbl.gov/programs/virtual/live-science</span></a></p></div><div class="j-meta" data-dcnode-id="733"><ul data-dcnode-id="736"></ul><nav data-dcnode-id="734"><a aria-label="facebook" class="j-social j-facebook j-facebook-text-hover" data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/268542719842879/posts/5058513230845780" target="_blank"></a></nav></div></div></li><li class="feed-item juicer image-post juicer-about" data-dcnode-id="717" data-id="" data-source="juicer" style="margin-bottom: 0px; zoom: 1; opacity: 1;"><a class="j-image" data-dcnode-id="729" data-external-id="" data-image="https://static.juicer.io/about/juicer-about-09.svg" data-video-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juicer.io/%3Freferrer%3Dbay-area-teen-science" target="_blank"><img alt="Embed Social Media Feeds on your website with Juicer!" class="" data-dcnode-id="730" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.juicer.io/about/juicer-abo
