</span><h2 data-dcnode-id="2212"><span class="mw-headline" data-dcnode-id="2220" id="Origins"><span data-dcnode-id="2221" instrument_node="">Origins</span></span><span class="mw-editsection" data-dcnode-id="2213"><span class="mw-editsection-bracket" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">[</span></span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNational_Board_of_Review%26action%3Dedit%26section%3D1" title="Edit section: Origins"><span data-dcnode-id="2217" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2210" instrument_node="">The organization which is now a private organization of film enthusiasts has its roots in 1909 when </span><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Sprague_Smith" title="Charles Sprague Smith"><span data-dcnode-id="2209" instrument_node="">Charles Sprague Smith</span></a><span data-dcnode-id="2207" instrument_node=""> and others formed the New York Board of Motion Picture Censorship to make recommendations to the Mayor's office concerning controversial films.</span><sup class="reference" data-dcnode-id="2204" id="cite_ref-nypl_2-0"><a data-dcnode-id="2205" href="#cite_note-nypl-2"><span data-dcnode-id="2206" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2203" instrument_node=""> It quickly became known as the National Board of Motion Picture Censorship. In an effort to avoid government censorship of films, the National Board became the unofficial clearinghouse for new movies.</span><sup class="reference" data-dcnode-id="2200" id="cite_ref-Sklar_3-0"><a data-dcnode-id="2201" href="#cite_note-Sklar-3"><span data-dcnode-id="2202" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2199" instrument_node=""> The Board's stated purpose was to endorse films of merit and champion the new "art of the people", which was transforming America's cultural life. In March 1916 the Board changed its name to the National Board of Review of Motion Pictures to avoid the controversial word "censorship".</span><sup class="reference" data-dcnode-id="2196" id="cite_ref-Chris_4-0"><a data-dcnode-id="2197" href="#cite_note-Chris-4"><span data-dcnode-id="2198" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2195" instrument_node="">
</span></p><p data-dcnode-id="2181"><span data-dcnode-id="2193" instrument_node="">Producers submitted their films to the board before making release prints; they agreed to cut any footage that the board found objectionable, up to and including destroying the entire film.</span><sup class="reference" data-dcnode-id="2190" id="cite_ref-Sklar_3-1"><a data-dcnode-id="2191" href="#cite_note-Sklar-3"><span data-dcnode-id="2192" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2189" instrument_node=""> Thousands of films carried the legend "Passed by the National Board of Review" in their main titles from 1916 into the 1950s, when the board began to lose financial support, partly due to the NBR being overpowered by the </span><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motion_Picture_Association" title="Motion Picture Association"><span data-dcnode-id="2188" instrument_node="">MPAA</span></a><span data-dcnode-id="2186" instrument_node=""> in regards to film censorship.</span><sup class="reference" data-dcnode-id="2183" id="cite_ref-5"><a data-dcnode-id="2184" href="#cite_note-5"><span data-dcnode-id="2185" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2182" instrument_node="">
</span></p><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">
In 1930, the NBR was the first group to choose the 10 best English-language movies of the year and the best foreign films, and is still the first critical body to announce its annual awards. In 1936 executive secretary Wilton A. Barrett explained the Board's workings:</span></p><blockquote data-dcnode-id="2173"><p data-dcnode-id="2174"><span data-dcnode-id="2178" instrument_node="">The National Board is opposed to legal censorship regarding all forms of the motion picture...It believes that far more constructive ...is the method of selecting the better pictures, publishing descriptive, classified lists of them and building up audiences and support for them through the work of community groups...</span><sup class="reference" data-dcnode-id="2175" id="cite_ref-6"><a data-dcnode-id="2176" href="#cite_note-6"><span data-dcnode-id="2177" instrument_node="">[6]</span></a></sup></p></blockquote><span data-dcnode-id="2172" instrument_node="">
</span><h2 data-dcnode-id="2162"><span class="mw-headline" data-dcnode-id="2170" id="Membership"><span data-dcnode-id="2171" instrument_node="">Membership</span></span><span class="mw-editsection" data-dcnode-id="2163"><span class="mw-editsection-bracket" data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">[</span></span><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNational_Board_of_Review%26action%3Dedit%26section%3D2" title="Edit section: Membership"><span data-dcnode-id="2167" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2160" instrument_node="">According to a 2022 press release from the National Board of Review, the organization's membership is composed of "film enthusiasts, filmmakers, professionals and academics of varying ages and backgrounds."</span><sup class="reference" data-dcnode-id="2157" id="cite_ref-7"><a data-dcnode-id="2158" href="#cite_note-7"><span data-dcnode-id="2159" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2156" instrument_node="">
</span></p><p data-dcnode-id="2146"><span data-dcnode-id="2154" instrument_node="">Membership and voting are secret which is similar to the </span><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_of_Motion_Picture_Arts_and_Sciences" title="Academy of Motion Picture Arts and Sciences"><span data-dcnode-id="2153" instrument_node="">Academy of Motion Picture Arts and Sciences</span></a><span data-dcnode-id="2151" instrument_node=""> which administers the Oscars.  In 2016 the membership was 130 members, 85 of whom were “young professionals.”  There is no requirement for members to have any formal film qualifications. </span><sup class="reference" data-dcnode-id="2148" id="cite_ref-autogenerated1_1-1"><a data-dcnode-id="2149" href="#cite_note-autogenerated1-1"><span data-dcnode-id="2150" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2147" instrument_node="">
</span></p><p data-dcnode-id="2136"><span data-dcnode-id="2145" instrument_node="">Because of the secretive nature of the membership and voting process, the organization has been accused of favoring filmmakers with whom they have personal relationships. 
</span><sup class="reference" data-dcnode-id="2142" id="cite_ref-autogenerated1_1-2"><a data-dcnode-id="2143" href="#cite_note-autogenerated1-1"><span data-dcnode-id="2144" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2141" instrument_node=""> In 2021 it was noted that none of the members of the board of directors has been black.</span><sup class="reference" data-dcnode-id="2138" id="cite_ref-8"><a data-dcnode-id="2139" href="#cite_note-8"><span data-dcnode-id="2140" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2137" instrument_node="">
</span></p><p data-dcnode-id="2127"><span data-dcnode-id="2135" instrument_node="">Formerly, members were invited to attend private screenings where talent discusses the films.</span><sup class="reference" data-dcnode-id="2132" id="cite_ref-autogenerated1_1-3"><a data-dcnode-id="2133" href="#cite_note-autogenerated1-1"><span data-dcnode-id="2134" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2131" instrument_node=""> During the </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="2130" instrument_node="">COVID-19 pandemic</span></a><span data-dcnode-id="2128" instrument_node="">, the National Board of Review has adopted a hybrid approach to its screenings, offering digital screeners to its members in addition to in-person screenings, followed by in-person or online discussions with filmmakers and talent.
</span></p><p data-dcnode-id="2121"><span data-dcnode-id="2126" instrument_node="">Votes are tabulated by accounting firm Lutz and Carr, Certified Public Accountants LLP.</span><sup class="reference" data-dcnode-id="2123" id="cite_ref-autogenerated1_1-4"><a data-dcnode-id="2124" href="#cite_note-autogenerated1-1"><span data-dcnode-id="2125" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2122" instrument_node="">
</span></p><p data-dcnode-id="2115"><span data-dcnode-id="2120" instrument_node="">Their annual gala is held in early January.</span><sup class="reference" data-dcnode-id="2117" id="cite_ref-9"><a data-dcnode-id="2118" href="#cite_note-9"><span data-dcnode-id="2119" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2116" instrument_node="">
</span></p><span data-dcnode-id="2114" instrument_node="">
</span><h2 data-dcnode-id="2104"><span class="mw-headline" data-dcnode-id="2112" id="Publications"><span data-dcnode-id="2113" instrument_node="">Publications</span></span><span class="mw-editsection" data-dcnode-id="2105"><span class="mw-editsection-bracket" data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">[</span></span><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNational_Board_of_Review%26action%3Dedit%26section%3D3" title="Edit section: Publications"><span data-dcnode-id="2109" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2102" instrument_node="">The NBR has also gained international acclaim for its publications: </span><i data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Film Program</span></i><span data-dcnode-id="2099" instrument_node=""> (1917–1926); </span><i data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Exceptional Photoplays</span></i><span data-dcnode-id="2096" instrument_node=""> (1920–1925); </span><i data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Photoplay Guide to Better Movies</span></i><span data-dcnode-id="2093" instrument_node=""> (1924–1926); </span><i data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">National Board of Review Magazine</span></i><span data-dcnode-id="2090" instrument_node=""> (1926–1942); </span><i data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">New Movies</span></i><span data-dcnode-id="2087" instrument_node=""> (1942–1949); and </span><i data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Films in Review</span></i><span data-dcnode-id="2084" instrument_node="">, which published its first issue in 1950.
</span></p><span data-dcnode-id="2082" instrument_node="">
</span><h3 data-dcnode-id="2071"><span class="mw-headline" data-dcnode-id="2079" id="Films_in_Review"><i data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Films in Review</span></i></span><span class="mw-editsection" data-dcnode-id="2072"><span class="mw-editsection-bracket" data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">[</span></span><a data-dcnode-id="2075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNational_Board_of_Review%26action%3Dedit%26section%3D4" title="Edit section: Films in Review"><span data-dcnode-id="2076" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2069" instrument_node="">The board's official magazine had existed in several forms and different names since its inception. In 1950, the magazine changed its name from </span><i data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Screen Magazine</span></i><span data-dcnode-id="2066" instrument_node=""> and launched the first issue as </span><i data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Films in Review</span></i><span data-dcnode-id="2063" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ISSN_%28identifier%29" title="ISSN (identifier)"><span data-dcnode-id="2060" instrument_node="">ISSN</span></a><span data-dcnode-id="2058" instrument_node="">&nbsp;</span><a class="external text" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldcat.org/search%3Ffq%3Dx0%3Ajrnl%26q%3Dn2%3A0015-1688" rel="nofollow"><span data-dcnode-id="2057" instrument_node="">0015-1688</span></a><span data-dcnode-id="2055" instrument_node="">) on February 1, 1950.</span><sup class="reference" data-dcnode-id="2052" id="cite_ref-10"><a data-dcnode-id="2053" href="#cite_note-10"><span data-dcnode-id="2054" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2051" instrument_node=""> </span><i data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Films in Review</span></i><span data-dcnode-id="2048" instrument_node=""> ceased print publishing in 1997 and became an online publication only at Filmsinreview.com. It is the oldest film review and commentary publication in the United States.
</span></p><span data-dcnode-id="2046" instrument_node="">

</span><p data-dcnode-id="1903"><span data-dcnode-id="1907" instrument_node="">To determine the NBR's annual awards, ballots are sent in by over 100 members of group of film enthusiasts, academics and filmmakers in the </span><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_metropolitan_area" title="New York metropolitan area"><span data-dcnode-id="1906" instrument_node="">New York metropolitan area</span></a><span data-dcnode-id="1904" instrument_node="">, and subsequently tabulated by a certified public accountancy firm in order to decide the winners. In addition, the Awards Committee determines the special achievement awards presented at the annual gala in January.
</span></p><p data-dcnode-id="1898"><span data-dcnode-id="1902" instrument_node="">The organization also works to foster commentary on all aspects of film production by underwriting educational film programs and seminars for film students. In 2017, the NBR provided grants to Reel Works Teen Filmmaking, Ghetto Film School, and </span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Educational_Video_Center" title="Educational Video Center"><span data-dcnode-id="1901" instrument_node="">Educational Video Center</span></a><span data-dcnode-id="1899" instrument_node="">. The organization also awarded grants to 13 student filmmakers as part of its annual student grant program.
</span></p><span data-dcnode-id="1897" instrument_node="">
