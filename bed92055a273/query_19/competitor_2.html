</span><h1 data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">College Students' Voting Guide for 2020</span></h1><span data-dcnode-id="1494" instrument_node="">
</span><p class="description" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Voting is one of the most important duties of any citizen. Young people, including college students, have the power to greatly affect the results of elections at the local, state, and national levels. This guide provides information on how college students can get involved, an overview of important election issues, and data on the value of participation in the political process</span></p><span data-dcnode-id="1491" instrument_node="">
</span><div data-cname="research-hub__content" data-dcnode-id="266" id="hub-content" itemprop="articleBody"><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">How many times have you heard, "well my vote doesn't matter"? This statement is incredibly inaccurate! In 2016, more than 100 million people did not vote in the U.S. general election. Although the election was determined by an electoral college, those votes represent close to half of the people who could vote across the country. This means that those votes could have led to a different candidate entirely, outside of the two who led the race! </span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">While many different age groups are missing a significant number of voters participating in the elections, young voters are especially underrepresented. In fact, less than half of the people between 18 and 29 voted in the 2016 election. Less of the younger population have voted in recent years compared to older populations. </span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">By not voting, young people are missing opportunities to elect people that they want. The selected president, for example, will be the country's leader for 4 years, yet more than half of younger voters demonstrate indifference by not voting. In 2020, some of the key issues that the country is facing are gun control, racial discrimination, unemployment, income inequality, and COVID-19. When more young people vote, their voices have a larger impact and can strongly influence the results. </span></p><span data-dcnode-id="1481" instrument_node="">
</span><br data-dcnode-id="1480"><span data-dcnode-id="1479" instrument_node="">
</span><div class="shaded-border" data-dcnode-id="1410"><span data-dcnode-id="1478" instrument_node="">
</span><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1473"><i data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">The section below is based on the outcomes of the recent 2020 general election. For more information on the general election and a comprehensive guide to voting, please keep reading.</span></i></p><span data-dcnode-id="1472" instrument_node="">
</span><h2 data-dcnode-id="1470" data-link-label="JAN 2021 GEORGIA RUNOFF ELECTIONS" id="section---GeorgiaRunoffs"><span data-dcnode-id="1471" instrument_node="">January 2021 Georgia Runoff Elections</span></h2><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1468" instrument_node=""> A runoff election occurs when none of the candidates fulfill the criteria for winning. Georgia’s law requires winning candidates to receive majority vote in the general election. In the case that no candidate breaks 50%, </span><b data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">the two candidates that received the most votes face each other again in a runoff election to determine the winner.</span></b></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">According to Georgia’s law, the runoffs should take place on the Tuesday nine weeks after the general election. That means the upcoming runoff election will take place on January 5, 2021. In order to partake in this runoff election, voters must be registered by December 7, 2020. Georgia will hold three weeks of early voting and registered voters can request an absentee ballot to vote by mail.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><div class="shaded" data-dcnode-id="1450"><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1457"><b data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Georgia's runoff election will take place on January 5, 2021.</span></b></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1455" instrument_node=""> To participate, you must </span><i data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">register by December 7, 2020.</span></i></p><span data-dcnode-id="1451" instrument_node="">
</span></div><span data-dcnode-id="1449" instrument_node="">
</span><br data-dcnode-id="1448"><span data-dcnode-id="1447" instrument_node="">
</span><h3 data-dcnode-id="1445" id="section---WhyTwoElections"><span data-dcnode-id="1446" instrument_node="">Why Are There Two Runoff Elections?</span></h3><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">It is very unusual that Georgia is holding two runoff elections since senate elections are staggered to prevent both seats of a state from being up for re-election simultaneously. This year’s general elections resulted in two runoff elections because Senator Perdue, a Republican who won the seat in 2014, was up for normal re-election and Senator Kelly Loeffler, a Republican appointed to succeed Senator Johnny Isakson after he retired last year due to health issues, was up for a special election to serve out the remainder of his term until 2022.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><h3 data-dcnode-id="1439" id="section---WhyRunoffImportant"><span data-dcnode-id="1440" instrument_node="">Why Are the Georgia Runoff Elections Important?</span></h3><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1437" instrument_node="">The outcomes of these runoff elections, which will be held two weeks prior to President-elect Joseph R. Biden Jr.’s inauguration, will </span><b data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">determine which party has control of the Senate. </span></b><span data-dcnode-id="1434" instrument_node="">In the case that the Democrats are able to win the majority, Biden will have more power to carry out policies and push through nominations. In the case that the Republicans are able to maintain majority, the party will be able to continue to influence Biden’s plans.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1431" instrument_node="">According to the most recent election projections, Democrats are holding 48 seats and Republicans are holding 50 seats. In order </span><b data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">for the Democrats to gain control of the majority, they would need to win both of the seats in Georgia</span></b><span data-dcnode-id="1428" instrument_node=""> in order to secure a 50-50 tie in the Senate. Then, Vice President-elect Kamala Harris could cast tiebreaking votes to carry out the Democratic agenda. In order </span><b data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">for the Republican party to maintain control, they would need to win one of the seats</span></b><span data-dcnode-id="1425" instrument_node=""> during the runoff elections.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Historically, voter turnout has been much lower for elections that do not involve the presidential contest. The runoff election on January 5, 2020 will also be held shortly after New Year’s with the country still in the midst of the pandemic, making it likely much harder to convince voters to turn out.</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1419" instrument_node="">Regardless of your political affiliations, this </span><b data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">upcoming runoff election is extremely important</span></b><span data-dcnode-id="1416" instrument_node=""> in shaping the next few years of our country’s history. Between the general elections and the runoff elections, </span><b data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">23,000 young people in Georgia will become eligible to vote</span></b><span data-dcnode-id="1413" instrument_node="">. We urge everyone to register and cast their ballot. </span></p><span data-dcnode-id="1411" instrument_node="">
</span></div><span data-dcnode-id="1409" instrument_node="">
</span><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">
</span><h3 data-dcnode-id="1405" id="section---TheImpactOfYoungVoters"><span data-dcnode-id="1406" instrument_node="">The Impact of Young Voters</span></h3><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">In 2016, there were more than 44 million people in the United States between the ages of 18 and 29, accounting for 21.6% of the total population. Only 27.4 million of those people were registered to vote, or 62%. Of the 44 million young adults, only around 46% actually voted in the 2016 election. That is more than 22 million voices that weren't heard! </span></p><span data-dcnode-id="1401" instrument_node="">
</span><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
</span><h2 data-dcnode-id="1397" id="section---WhyShouldYoungPeopleVoteIn2020"><span data-dcnode-id="1398" instrument_node="">Why Should Young People Vote in 2020?</span></h2><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Based on the primary elections of 2020, young voters are less active in the polls than older voters. In some states, only around 10% of younger voters cast a vote while 24% voted in other states. Young voters may have more to gain or lose based on the results of the elections, as political activities affect many aspects of their lives. Votes of all people can affect things like gun regulations, climate change, and much more. </span></p><span data-dcnode-id="1393" instrument_node="">
</span><br data-dcnode-id="1392"><span data-dcnode-id="1391" instrument_node="">
</span><div class="shaded-border" data-dcnode-id="1383"><span data-dcnode-id="1390" instrument_node="">
</span><h3 data-dcnode-id="1388" id="section---Do you plan on voting in the 2020 election?"><span data-dcnode-id="1389" instrument_node="">Do you plan on voting in the 2020 election?</span></h3><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node=""> According a recent survey conducted by Study.com, 90% of college and graduate students said that they were registered to vote and 92% answered that they were planning on voting in the 2020 election.</span></p><span data-dcnode-id="1384" instrument_node="">
</span></div><span data-dcnode-id="1382" instrument_node="">
</span><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">The University of Virginia reports that 8 out of every 10 young voters intend on voting, but 4 or less actually follow through and cast their votes. It wasn't until 1972 that people ages 18 to 20 could even vote. When it first became legal, 43% of that age bracket actually voted. Fast forward to 2014 and a mere 16% of that age group cast votes. Duke University reports that turnout of younger voters is typically 20 to 30 percentage points lower than that of older voters. </span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">According to John Carroll University, there are more eligible voters between the ages of 18 and 29 than there are senior citizens. To be precise, young people account for 46 million votes while seniors account for 39 million. The university also reports that 80 electoral votes or more depend on the votes of younger voters. To win the presidency, a candidate needs 270 of 538 possible electoral votes. Each state counts for a predetermined number of electoral votes. After people cast votes, the candidate with the most votes from that state wins the electoral points for their race. California counts for 55 electoral votes and Texas accounts for 38 (of 538 total). This means that 80 of the necessary 270 votes a candidate needs to win a presidential election rely on the behavior of voters 29 and under </span></p><span data-dcnode-id="1374" instrument_node="">
</span><h3 data-dcnode-id="1372" id="section---CloseCallsHowAFewVotesCanAddUp"><span data-dcnode-id="1373" instrument_node="">Close Calls - How a Few Votes Can Add Up!</span></h3><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">In the 2000 presidential election, President George W. Bush won by a small margin that warranted a recount in Florida. The difference between the votes for the president and his opponent, Al Gore, was less than 1% of the total votes in Florida that were cast. In other words, if another 600 people had shown up and voted for Mr. Gore, he might have been president for four or even eight years. </span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">In 2016, candidate Hillary Clinton won the popular vote by around three million votes. However, many of those votes were clustered into certain areas or states and President Donald Trump secured the electoral vote. In other words, the states that went to President Trump had more votes cast for him than for his opponent. With only around half of all eligible voters turning up to vote, the election could have gone very differently if more people had participated. </span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">These voters are spread across the United States and could have had an impact on every single one of the states. To put this into perspective, let's consider two of the largest states: Texas and California. In 2016, around 47.7% of the voting-aged people of Texas voted in the election. The Census Bureau reports that 23.8% of the Texas population fell into the 18 to 29-year age group that year. 23.8% of California's population fell into that age group as well, and the state saw only 48% of its adult population vote in 2016. </span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">If more people from all age groups voted, elections could have very different results. As of 2019, there were more than 45 million people in the 18 to 29-year age group. People from this age group have an opportunity to change the results of an election by casting their vote for the candidates that they feel are better suited for office. The 2020 election is just as important as any other, and it's vital that the younger generations participate in the voting process. </span></p><span data-dcnode-id="1359" instrument_node="">
</span><h3 data-dcnode-id="1357" id="section---YoungerVotersAreGettingMoreInvolved"><span data-dcnode-id="1358" instrument_node="">Younger Voters are Getting More Involved</span></h3><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">A recent poll conducted by the Circle found that many young people are more interested in the election process as a result of the coronavirus pandemic, more than there were previously. In fact, 84% of younger voters believe that they have the ability to make change, in comparison to 73% who believed they did in 2018. Around half of young people don't know whether they can register to vote online, or how to do so. However, 38 states as well as Washington, D.C. offer online voter registration. The Circle's poll found that a significantly higher number of young voters have become attentive toward the election and more involved in community and other political activities. </span></p><span data-dcnode-id="1353" instrument_node="">
</span><h2 data-dcnode-id="1351" data-link-label="PROMINENT ELECTION ISSUES" id="section---ProminentIssuesIn2020"><span data-dcnode-id="1352" instrument_node="">Prominent Issues in 2020</span></h2><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">When people vote, they contribute to the results of elections. Based on the winning candidate, different issues are handled different ways (and sometimes not at all). As mentioned above, only around half of all eligible voters in the United States actually vote. If more people cast votes, the results of elections could be astronomically different. Each and every person should vote and consider the issues that most concern them, as these issues could be addressed by their preferred candidates. Some of the most prominent issues of 2020 are described below. </span></p><span data-dcnode-id="1347" instrument_node="">
</span><div class="accordionTwo accordion" data-dcnode-id="268" id="prominent_issues"><span data-dcnode-id="1346" instrument_node="">
</span><div class="panel" data-dcnode-id="1326"><span data-dcnode-id="1345" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1340" data-target="#gun_control" data-toggle="collapse"><span data-dcnode-id="1344" instrument_node="">
</span><h5 data-dcnode-id="1342" id="section---GunControl"><span data-dcnode-id="1343" instrument_node="">Gun Control</span></h5><span data-dcnode-id="1341" instrument_node="">
</span></div><span data-dcnode-id="1339" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1328" data-parent="#prominent_issues" id="gun_control"><span data-dcnode-id="1338" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1330"><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The United States is one of the most controversial countries when it comes to gun control. In the U.S., there are more guns in comparison to the number of people, and the U.S. has less strict gun control laws than many other industrialized countries. The Second Amendment gives U.S. citizens the right to bear arms and defend themselves. While plenty of citizens are law abiding, there is a concerning number of gun-related crimes and deaths. As a result, many people feel that there should be more regulation on gun ownership. </span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">For example, some countries have more regulations on the storage of guns. Stanford University reports that nearly 20 states have tried to implement a policy regarding the safe storage of firearms when they aren't in use. Other gun regulations that have been considered include more extensive screening before ownership and more. Some countries require citizens to take gun safety courses, pass psychiatric evaluations, have valid reasons for ownership, or don't allow private gun ownership at all. </span></p><span data-dcnode-id="1331" instrument_node="">
</span></div><span data-dcnode-id="1329" instrument_node="">
</span></div><span data-dcnode-id="1327" instrument_node="">
</span></div><span data-dcnode-id="1325" instrument_node="">
</span><div class="panel" data-dcnode-id="1305"><span data-dcnode-id="1324" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1319" data-target="#college_affordability" data-toggle="collapse"><span data-dcnode-id="1323" instrument_node="">
</span><h5 data-dcnode-id="1321" id="section---EducationAndCollegeAffordability"><span data-dcnode-id="1322" instrument_node="">Education and College Affordability</span></h5><span data-dcnode-id="1320" instrument_node="">
</span></div><span data-dcnode-id="1318" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1307" data-parent="#prominent_issues" id="college_affordability"><span data-dcnode-id="1317" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1309"><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Some people have argued that the education systems in the United States are in desperate need of revisions, including the public-school system and higher education system. Stanford University points out that many citizens focus on the need for higher quality police, fire protection, and other services but fail to have the same concern for public education. Public schools are expected to provide quality education to large numbers of students on strict budgets, often resulting in more students per teacher and limited resources to support both educators and students. Forbes highlights the fact that the characteristics that make great teachers are not supported, emphasized, or rewarded in public schools. Instead, public school teachers are subject to a significant amount of standardization and regulation. </span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Another prominent issue regarding education is college affordability. It's no secret that the average cost of a college education has risen. As a result, more students are graduating with debt without a guarantee that they will earn enough to pay their debts off. There are federal programs for students who are unable to find scholarships and other aid, such as student loan forgiveness and work-study programs, but many feel as though there is much more work to be done. </span></p><span data-dcnode-id="1310" instrument_node="">
</span></div><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span></div><span data-dcnode-id="1304" instrument_node="">
</span><div class="panel" data-dcnode-id="1281"><span data-dcnode-id="1303" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1298" data-target="#financial_inequality" data-toggle="collapse"><span data-dcnode-id="1302" instrument_node="">
</span><h5 data-dcnode-id="1300" id="section---FinancialInequality"><span data-dcnode-id="1301" instrument_node="">Financial Inequality</span></h5><span data-dcnode-id="1299" instrument_node="">
</span></div><span data-dcnode-id="1297" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1283" data-parent="#prominent_issues" id="financial_inequality"><span data-dcnode-id="1296" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1285"><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">The highest 1% of American earners make more than 39 times the number of earners in the bottom 90%. Around 40% of the total American population is estimated to be low-income. This means that these households have more trouble paying their expenses. While 40% of the population have trouble making regular ends meet, the top 1% of the population makes around $1.5 million a year on average. Stanford University points out that the income gap has increased over the years. </span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">There are a variety of factors that cause the income gap. It's undeniable that some higher-earning citizens have established companies or products that changed the way many people live. The highest-earning 0.1% make an average of around $7 million each year. Stanford University reports that in 1965, CEOs of production companies made around 25 times as much as the average worker, and in 2009 that multiple had grown to 186! </span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Another shocking number is that of homeless people in the United States. It is estimated that around 750,000 people in America are without a home. The U.S. has a vast number of welfare programs that are meant to assist people from low-income households, but many programs remain ineffective at reducing persistent causes of homelessness. It's estimated that around $25 trillion has been spent on these programs, yet a striking number of Americans are still considered to be poor or low-income. </span></p><span data-dcnode-id="1286" instrument_node="">
</span></div><span data-dcnode-id="1284" instrument_node="">
</span></div><span data-dcnode-id="1282" instrument_node="">
</span></div><span data-dcnode-id="1280" instrument_node="">
</span><div class="panel" data-dcnode-id="1260"><span data-dcnode-id="1279" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1274" data-target="#jobs" data-toggle="collapse"><span data-dcnode-id="1278" instrument_node="">
</span><h5 data-dcnode-id="1276" id="section---JobsAndUnemployment"><span data-dcnode-id="1277" instrument_node="">Jobs and Unemployment</span></h5><span data-dcnode-id="1275" instrument_node="">
</span></div><span data-dcnode-id="1273" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1262" data-parent="#prominent_issues" id="jobs"><span data-dcnode-id="1272" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1264"><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Jobs and unemployment are always a huge issue when it comes to deciding on who to vote for. Unemployment skyrocketed to 14.7% in April 2020 as a result of the pandemic. This has been the highest rate of unemployment in the United States since 1948. Although that number has dropped to 10.2% as of July 2020, it's still much higher than it has been in a decade. 2020 is a year of unprecedented uncertainty, as many jobs have been terminated or switched to online. </span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">The U.S. Bureau of Labor Statistics (BLS) reported that 61.4% of the labor force (people who could work) were participating in employment as of July. BLS provides the majority of employment data for the United States, and reports that there have been significant improvements in employment since the beginning of the pandemic. However, as many schools have switched to virtual learning for K-12, many parents are finding themselves struggling to accomplish remote work and facilitate online learning for their children. </span></p><span data-dcnode-id="1265" instrument_node="">
</span></div><span data-dcnode-id="1263" instrument_node="">
</span></div><span data-dcnode-id="1261" instrument_node="">
</span></div><span data-dcnode-id="1259" instrument_node="">
</span><div class="panel" data-dcnode-id="1239"><span data-dcnode-id="1258" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1253" data-target="#racial_discrimination" data-toggle="collapse"><span data-dcnode-id="1257" instrument_node="">
</span><h5 data-dcnode-id="1255" id="section---RacialDiscrimination"><span data-dcnode-id="1256" instrument_node="">Racial Discrimination</span></h5><span data-dcnode-id="1254" instrument_node="">
</span></div><span data-dcnode-id="1252" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1241" data-parent="#prominent_issues" id="racial_discrimination"><span data-dcnode-id="1251" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1243"><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Racial discrimination is found in different areas, including job opportunities, housing, and more. Systemic racism is at the forefront of racial discrimination issues, as it affects people of minorities in so many areas of their lives. Black, Latin American, Asian American, and Indigenous Americans have lower income than their White counterparts and are more likely to be turned down for a job opportunity if they have a name that doesn't 'sound White'. </span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Although racial discrimination has seen progress over the decades, it's still apparent in education and housing opportunities. For example, underrepresented groups living in low-income areas are more likely to end up receiving a lower-quality education, drop out of school and/or end up in prison. Do Something, a movement to end discrimination, reports that Black citizens are more likely to be arrested and receive substantially longer prison sentences. While progress has been and is being made, this summary only scratches the surface of inequalities in the United States for underrepresented groups. </span></p><span data-dcnode-id="1244" instrument_node="">
</span></div><span data-dcnode-id="1242" instrument_node="">
</span></div><span data-dcnode-id="1240" instrument_node="">
</span></div><span data-dcnode-id="1238" instrument_node="">
</span><div class="panel" data-dcnode-id="1218"><span data-dcnode-id="1237" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1232" data-target="#gender_equality" data-toggle="collapse"><span data-dcnode-id="1236" instrument_node="">
</span><h5 data-dcnode-id="1234" id="section---WomensIssuesGenderEquality"><span data-dcnode-id="1235" instrument_node="">Women's Issues &amp; Gender Equality</span></h5><span data-dcnode-id="1233" instrument_node="">
</span></div><span data-dcnode-id="1231" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1220" data-parent="#prominent_issues" id="gender_equality"><span data-dcnode-id="1230" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1222"><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">There are several prominent issues in the United States that affect women more than men, including pregnancy discrimination, violence against women, and pay inequality. While it is illegal for women to be fired for being pregnant, some employers still terminate pregnant employees by providing justification. Employed pregnant women are at risk for homelessness, and about 25% of homeless women state that violence against them is a cause of their homelessness. </span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">A recent study found that, while significant progress was made in the 1980s, gender inequality progress has been slower since 1990. In 2000, women between the ages of 25 and 54 were 75% employed, but that number was down to 73% in 2018. Even though women now hold more bachelor's and doctoral degrees than their male counterparts, they only make around 83 cents for every dollar that men make (as of 2018). Differences in gender treatment, pay, and policies have improved since the 1970s but there is still room for improvement. </span></p><span data-dcnode-id="1223" instrument_node="">
</span></div><span data-dcnode-id="1221" instrument_node="">
</span></div><span data-dcnode-id="1219" instrument_node="">
</span></div><span data-dcnode-id="1217" instrument_node="">
</span><div class="panel" data-dcnode-id="1162"><span data-dcnode-id="1216" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1211" data-target="#other_issues" data-toggle="collapse"><span data-dcnode-id="1215" instrument_node="">
</span><h5 data-dcnode-id="1213" id="section---OtherIssues"><span data-dcnode-id="1214" instrument_node="">Other Issues</span></h5><span data-dcnode-id="1212" instrument_node="">
</span></div><span data-dcnode-id="1210" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1164" data-parent="#prominent_issues" id="other_issues"><span data-dcnode-id="1209" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1166"><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">In addition to the key issues discussed above, here are some additional major issues for the United States in 2020. </span></p><span data-dcnode-id="1205" instrument_node="">
</span><ul class="golden-bullets" data-dcnode-id="1168"><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1200"><b data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Immigration</span></b><span data-dcnode-id="1201" instrument_node=""> Most Americans are the product of immigration, and the topic continues to be of regular debate. Immigration issues include those regarding policies for citizenship, documentation, immigrant rights, and border security.</span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1195"><b data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Net Neutrality</span></b><span data-dcnode-id="1196" instrument_node=""> - Net neutrality refers to the idea that internet service providers (ISPs) should provide equal access to sites and content. In other words, specific sites shouldn't have higher speeds or favored access practices over other sites.</span></li><span data-dcnode-id="1194" instrument_node="">
</span><li data-dcnode-id="1190"><b data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Healthcare</span></b><span data-dcnode-id="1191" instrument_node=""> - The healthcare system of the United States is a hot topic for debate as many Americans struggle to afford healthcare coverage and services. There is regular disagreement over how to approach and resolve these issues.</span></li><span data-dcnode-id="1189" instrument_node="">
</span><li data-dcnode-id="1185"><b data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Religious Freedom</span></b><span data-dcnode-id="1186" instrument_node=""> - U.S. citizens are promised freedom of religion in the First Amendment, and the government is prohibited from supporting any specific religion. In other words, public schools cannot have prayers or other religious activities, and public officials shouldn't show religious preference.</span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1180"><b data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Climate Change</span></b><span data-dcnode-id="1181" instrument_node=""> - Climate change is not a new issue, as it is a prominent concern for the entire globe. As temperatures continue to increase, things like water, ecosystems and human health could be detrimentally affected.</span></li><span data-dcnode-id="1179" instrument_node="">
</span><li data-dcnode-id="1175"><b data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Economy</span></b><span data-dcnode-id="1176" instrument_node=""> - The United States has a deficit of $104.2 billion as of the first quarter of 2020, and the country owes more than $12 trillion across the world. The country's leaders have tried to improve these numbers, but much improvement is still needed.</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1170"><b data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Election Accuracy</span></b><span data-dcnode-id="1171" instrument_node=""> - Many are concerned about the security of mail-in-ballots; however, this has been shown to be baseless. Also, of concern, particularly in recent presidential elections are reports of attempted foreign interference. Americans need to know that elections are honest, and current policies are sometimes considered insufficient for preventing voting fraud.</span></li><span data-dcnode-id="1169" instrument_node="">
</span></ul><span data-dcnode-id="1167" instrument_node="">
</span></div><span data-dcnode-id="1165" instrument_node="">
</span></div><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span><h2 data-dcnode-id="1159" id="section---HowPresidentialVotingWorksInTheUnitedStates"><span data-dcnode-id="1160" instrument_node="">How Presidential Voting Works in the United States</span></h2><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">There are a few key events in the election process that lead to the eventual selection of the next U.S. president. Usually during the spring before election year, individuals who wish to run for president announce their campaign. During the following summer, there are often debates between the candidates. By the following spring (of election year) there is likely a handful of candidates that are frontrunners in the race. </span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Primary elections are held across the country. A primary election may be open, meaning that voters do not have to declare a party affiliation in order to cast votes, or closed, meaning that voters may only vote in their party's primary. The primary voting can include presidential candidates, nominees for Congress, and state and local positions. The primary votes can be used by party leaders to determine which candidate is most appropriate to lead the presidential race. </span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">In the summer of the election year, each party chooses its candidate. Candidates typically then participate in debates and work on campaigns. For example, the candidates might tour the United States and talk with citizens across the country about issues that matter to them. Also, candidates from the main parties have one or more debates with one another on key issues and other topics. These are extremely important, as they enable citizens across the country to watch the contenders explain their stances and proposed policies on things that matter to them. </span></p><span data-dcnode-id="1149" instrument_node="">
</span><h3 data-dcnode-id="1147" id="section---ElectionDay"><span data-dcnode-id="1148" instrument_node="">Election Day</span></h3><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Although citizens can often vote early, election day itself is set by law as "the Tuesday after the first Monday in the month of November." If they have opted to vote in person, citizens go to their local polling place and cast their votes on ballots. As polling places close on voting day, totals are counted in each state. Many Americans turn their televisions to new stations during these hours, as reporters announce state results as they are provided. </span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">As mentioned above, there are a total of 538 electoral votes available and a candidate needs to win at least 270 to become president. Totals often come in based on time zone, as polling centers in that area shut down. For example, reporters may first announce the results for Georgia, North Carolina, and nearby states. If Georgia has had more votes for the Democratic candidate than any other candidate, then that candidate would take the 16 electoral votes that are available for Georgia. Nebraska and Maine are the only two states that separate their electoral votes; all other states provide the winning candidate will all of their electoral votes. News stations often provide a running total of the votes throughout their broadcast, so that viewers can see who is currently winning at any given time. This process continues until a candidate has won the required 270 electoral votes. </span></p><span data-dcnode-id="1140" instrument_node="">
</span><h2 data-dcnode-id="1138" id="section---TypesOfElections"><span data-dcnode-id="1139" instrument_node="">Types of Elections</span></h2><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Although a few of these are discussed above, the sections below provide more information about the different types of elections. </span></p><span data-dcnode-id="1134" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="270" id="types_of_elections"><span data-dcnode-id="1133" instrument_node="">
</span><div class="panel" data-dcnode-id="1116"><span data-dcnode-id="1132" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1127" data-target="#caucus" data-toggle="collapse"><span data-dcnode-id="1131" instrument_node="">
</span><h5 data-dcnode-id="1129" id="section---Caucus"><span data-dcnode-id="1130" instrument_node="">Caucus</span></h5><span data-dcnode-id="1128" instrument_node="">
</span></div><span data-dcnode-id="1126" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1118" data-parent="#types_of_elections" id="caucus"><span data-dcnode-id="1125" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Caucuses are local meetings of political parties or entities during which participants discuss candidates. There are usually multiple caucuses in the process of determining the specific nominee. For example, the democratic party holds multiple caucuses to discuss the nominees and their suitability for the position. </span></p><span data-dcnode-id="1121" instrument_node="">
</span></div><span data-dcnode-id="1119" instrument_node="">
</span></div><span data-dcnode-id="1117" instrument_node="">
</span></div><span data-dcnode-id="1115" instrument_node="">
</span><div class="panel" data-dcnode-id="1098"><span data-dcnode-id="1114" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1109" data-target="#primary" data-toggle="collapse"><span data-dcnode-id="1113" instrument_node="">
</span><h5 data-dcnode-id="1111" id="section---PrimaryElection"><span data-dcnode-id="1112" instrument_node="">Primary Election</span></h5><span data-dcnode-id="1110" instrument_node="">
</span></div><span data-dcnode-id="1108" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1100" data-parent="#types_of_elections" id="primary"><span data-dcnode-id="1107" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1102"><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">The primary election is used to determine nominees for the general election. In a closed primary, individuals have access to the primary ballots for their parties, while an open primary allows voters to vote on individuals for any party. </span></p><span data-dcnode-id="1103" instrument_node="">
</span></div><span data-dcnode-id="1101" instrument_node="">
</span></div><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span><div class="panel" data-dcnode-id="1080"><span data-dcnode-id="1096" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1091" data-target="#general" data-toggle="collapse"><span data-dcnode-id="1095" instrument_node="">
</span><h5 data-dcnode-id="1093" id="section---GeneralElection"><span data-dcnode-id="1094" instrument_node="">General Election</span></h5><span data-dcnode-id="1092" instrument_node="">
</span></div><span data-dcnode-id="1090" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1082" data-parent="#types_of_elections" id="general"><span data-dcnode-id="1089" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">The general election is the main election that people discuss and participate in every four years. In the general election, voters select their chosen candidate from their party or another party for various positions. The final votes for president discussed above are done in the general election. </span></p><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
</span></div><span data-dcnode-id="1081" instrument_node="">
</span></div><span data-dcnode-id="1079" instrument_node="">
</span><div class="panel" data-dcnode-id="1062"><span data-dcnode-id="1078" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1073" data-target="#midterm" data-toggle="collapse"><span data-dcnode-id="1077" instrument_node="">
</span><h5 data-dcnode-id="1075" id="section---MidtermElection"><span data-dcnode-id="1076" instrument_node="">Midterm Election</span></h5><span data-dcnode-id="1074" instrument_node="">
</span></div><span data-dcnode-id="1072" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1064" data-parent="#types_of_elections" id="midterm"><span data-dcnode-id="1071" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">A midterm election is an election held between general elections; 2 years after and 2 years before. The midterm election gives Americans the opportunity to vote on congressional candidates to determine the members of the House of Representatives, who are appointed for 2-year terms, as well as senators, who serve 6-year terms. </span></p><span data-dcnode-id="1067" instrument_node="">
</span></div><span data-dcnode-id="1065" instrument_node="">
</span></div><span data-dcnode-id="1063" instrument_node="">
</span></div><span data-dcnode-id="1061" instrument_node="">
</span><div class="panel" data-dcnode-id="1044"><span data-dcnode-id="1060" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1055" data-target="#referendum" data-toggle="collapse"><span data-dcnode-id="1059" instrument_node="">
</span><h5 data-dcnode-id="1057" id="section---Referendum"><span data-dcnode-id="1058" instrument_node="">Referendum</span></h5><span data-dcnode-id="1056" instrument_node="">
</span></div><span data-dcnode-id="1054" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1046" data-parent="#types_of_elections" id="referendum"><span data-dcnode-id="1053" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1048"><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Referendums are legislations that are added to ballots after petition. These give Americans an opportunity to vote on them during an election and potentially have a specific piece of legislature passed. </span></p><span data-dcnode-id="1049" instrument_node="">
</span></div><span data-dcnode-id="1047" instrument_node="">
</span></div><span data-dcnode-id="1045" instrument_node="">
</span></div><span data-dcnode-id="1043" instrument_node="">
</span><div class="panel" data-dcnode-id="1026"><span data-dcnode-id="1042" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1037" data-target="#special" data-toggle="collapse"><span data-dcnode-id="1041" instrument_node="">
</span><h5 data-dcnode-id="1039" id="section---SpecialOrByElection"><span data-dcnode-id="1040" instrument_node="">Special or By-Election</span></h5><span data-dcnode-id="1038" instrument_node="">
</span></div><span data-dcnode-id="1036" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1028" data-parent="#types_of_elections" id="special"><span data-dcnode-id="1035" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Special elections or by-elections are irregular elections held for specific reasons. These types of elections may occur when an elected official passes away, is terminated, or resigns. Depending on the position, these may be held at the state or another level. </span></p><span data-dcnode-id="1031" instrument_node="">
</span></div><span data-dcnode-id="1029" instrument_node="">
</span></div><span data-dcnode-id="1027" instrument_node="">
</span></div><span data-dcnode-id="1025" instrument_node="">
</span><div class="panel" data-dcnode-id="1008"><span data-dcnode-id="1024" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="1019" data-target="#convention" data-toggle="collapse"><span data-dcnode-id="1023" instrument_node="">
</span><h5 data-dcnode-id="1021" id="section---Convention"><span data-dcnode-id="1022" instrument_node="">Convention</span></h5><span data-dcnode-id="1020" instrument_node="">
</span></div><span data-dcnode-id="1018" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="1010" data-parent="#types_of_elections" id="convention"><span data-dcnode-id="1017" instrument_node="">
</span><div class="padded-content" data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Conventions are the meetings that parties hold in order to discuss things like campaign strategies, key issues and more. Conventions can last for several days and are held before and even after the elections. Major conventions that people often watch via broadcast are the Democratic National Convention (DNC) and the Republican National Convention (RNC). </span></p><span data-dcnode-id="1013" instrument_node="">
</span></div><span data-dcnode-id="1011" instrument_node="">
</span></div><span data-dcnode-id="1009" instrument_node="">
</span></div><span data-dcnode-id="1007" instrument_node="">
</span><h2 data-dcnode-id="1005" data-link-label="VOTING RIGHTS &amp; RULES" id="section---VotingRightsAndRules"><span data-dcnode-id="1006" instrument_node="">Voting Rights and Rules</span></h2><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Citizens of the United States who are 18 or older can vote in elections. Individuals must meet the residency requirements of their states. North Dakota doesn't require voters to register for voting, but all other states set a registration deadline for voters. Individuals should check their state's registration information, as some states allow voters to register online and/or at the polls. Some citizens are ineligible for voting if they meet specific criteria relating to mental status, criminal convictions, residence in the U.S. territories, or citizenship. </span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Several laws have been passed to protect the rights of voters over the years. For example, the Voting Rights Act of 1965 made it illegal for voters to be discriminated against. The Voting Accessibility for the Elderly and Handicapped Act, passed in 1984, made it a requirement for polling locations to offer accessibility for all people, specifically those with disabilities. Facilities that do not offer disability access are required to have a nearby, secondary location at which disabled persons can cast their votes. In addition, people who have other disabilities (such as the inability to read) are permitted to bring someone with them to help with voting. </span></p><span data-dcnode-id="998" instrument_node="">
</span><ul class="golden-bullets" data-dcnode-id="986"><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="993"><b data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">First Time Voters</span></b><span data-dcnode-id="994" instrument_node=""> - First-time voters can find helpful resources through a variety of sources, including their states' voting websites and polling places and federal sources (such as usa.gov). In addition, the Election Assistance Commission offers a tremendous amount of resources about U.S. elections.</span></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="988"><b data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">ID Requirements</span></b><span data-dcnode-id="989" instrument_node=""> - Two out of every three states require voters to supply some form of identification in order to cast their votes. Half of those states require that voters show photo identification, such as an ID card, driver's license, or passport. Some of these states do offer photo voter ID cards.</span></li><span data-dcnode-id="987" instrument_node="">
</span></ul><span data-dcnode-id="985" instrument_node="">
</span><h3 data-dcnode-id="983" id="section---HowToVoteInCollege"><span data-dcnode-id="984" instrument_node="">How to Vote in College</span></h3><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Out-of-state college students living on campus are considered dual residents of both the state that they are from as well as the state that their school is in. These students can legally vote in either state, but not both. Students who register in their home state that cannot go home to vote may use an absentee ballot to cast their votes. </span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Like any other potential voter, college students should register to vote (not required in North Dakota, which does not register voters). This can be done online in some states, through mail, or at a facility such as the library, government assistance offices, or the Department of Motor Vehicles. Once registered, students can vote when their polling places allow. </span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="972"><b data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Note:</span></b><span data-dcnode-id="973" instrument_node=""> Students who register in their home state may lose some of their financial aid benefits. Students should consult with their financial aid office prior to registering to vote in their home state, as it may affect their in-state status and financial aid and tuition rates. </span></p><span data-dcnode-id="971" instrument_node="">
</span><ul class="golden-bullets" data-dcnode-id="272"><span data-dcnode-id="970" instrument_node="">
</span><li data-dcnode-id="966"><b data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Absentee Voting</span></b><span data-dcnode-id="967" instrument_node=""> - Absentee voting allows students and other voters to mail in their ballots. This is especially applicable to students who are studying abroad. Students living abroad should submit a form to their local elections office, which will then send them an absentee ballot.</span></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="961"><b data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Early Voting</span></b><span data-dcnode-id="962" instrument_node=""> - Many states allow early voting. Early voting gives individuals a longer period of time to go and cast their votes in person. Waiting until election day might mean a missed vote for those who have an unforeseen conflict arise. Early voting varies by state but can allow voters to cast votes for several weeks. For example, the state of Georgia offers around three weeks of early voting while Hawaii offers just under two weeks.</span></li><span data-dcnode-id="960" instrument_node="">
</span><h2 data-dcnode-id="958" id="section---HowToChooseAPoliticalPartyOrAffiliation"><span data-dcnode-id="959" instrument_node="">How to Choose a Political Party or Affiliation</span></h2><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">There are several different political parties that voters can choose to be associated with, or they can choose to not be affiliated with any party. However, voters who choose to be unaffiliated on their voter registration may have fewer options to choose from in primary elections. The main political parties of the United States are discussed below along with some of their key values. Potential members can find more information about political parties through various sources online, and even take a self-assessment quiz through </span><a class="external" data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.isidewith.com/political-quiz"><span data-dcnode-id="955" instrument_node="">I Side With</span></a><span data-dcnode-id="953" instrument_node="">. </span></p><span data-dcnode-id="951" instrument_node="">
</span><ul data-dcnode-id="919"><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="946"><b data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Democratic</span></b><span data-dcnode-id="947" instrument_node=""> - The largest party in the U.S. is the Democratic party. This party places a higher value on affordable healthcare, women's right to choose, and ending wars. </span></li><span data-dcnode-id="945" instrument_node="">
</span><li data-dcnode-id="941"><b data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Green</span></b><span data-dcnode-id="942" instrument_node=""> - This party emphasizes economic and social justice, diversity and inclusion and environmental protection as well as equal education, healthcare, and wages. </span></li><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="936"><b data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Libertarian</span></b><span data-dcnode-id="937" instrument_node=""> - The Libertarian party values individual accountability and liberty, freedom for business and education, and smaller government and taxes. </span></li><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="931"><b data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">American Independent</span></b><span data-dcnode-id="932" instrument_node=""> - Independents place a higher value on the Constitution, independence, family strength and values, border securities and government budgets. </span></li><span data-dcnode-id="930" instrument_node="">
</span><li data-dcnode-id="926"><b data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Republican</span></b><span data-dcnode-id="927" instrument_node=""> - The republican party promotes education and pension reform, job creation, safety of citizens, healthcare improvement and environmental protection. </span></li><span data-dcnode-id="925" instrument_node="">
</span><li data-dcnode-id="921"><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Peace and Freedom</span></b><span data-dcnode-id="922" instrument_node=""> - This party values higher wages, good jobs, higher taxes for the wealthy in order to fund housing and healthcare, cooperation and ending overseas military involvement.</span></li><span data-dcnode-id="920" instrument_node="">
</span></ul><span data-dcnode-id="918" instrument_node="">
</span><h2 data-dcnode-id="916" id="section---SpecialVotingCircumstances"><span data-dcnode-id="917" instrument_node="">Special Voting Circumstances</span></h2><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Traditional registration and voting activities may not apply to some voters. Although not a comprehensive list, some of the special voting circumstance and their characteristics are discussed below. </span></p><span data-dcnode-id="912" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="274" id="special_circumstances"><span data-dcnode-id="911" instrument_node="">
</span><div class="panel" data-dcnode-id="891"><span data-dcnode-id="910" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="905" data-target="#disability" data-toggle="collapse"><span data-dcnode-id="909" instrument_node="">
</span><h5 data-dcnode-id="907" id="section---VotingWithADisability"><span data-dcnode-id="908" instrument_node="">Voting with a Disability</span></h5><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="893" data-parent="#special_circumstances" id="disability"><span data-dcnode-id="903" instrument_node="">
</span><div class="padded-content" data-dcnode-id="895"><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="901" instrument_node=""> Students with disabilities can find several college resources </span><a class="external" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/resources/college-resource-for-students-with-disabilities"><span data-dcnode-id="900" instrument_node="">here</span></a><span data-dcnode-id="898" instrument_node="">. As noted earlier, polling places are required to offer access to disabled voters or offer a nearby alternative polling place. Disabled voters can get information about accommodations by calling their local polling place or asking in person. </span></p><span data-dcnode-id="896" instrument_node="">
</span></div><span data-dcnode-id="894" instrument_node="">
</span></div><span data-dcnode-id="892" instrument_node="">
</span></div><span data-dcnode-id="890" instrument_node="">
</span><div class="panel" data-dcnode-id="873"><span data-dcnode-id="889" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="884" data-target="#dvsa" data-toggle="collapse"><span data-dcnode-id="888" instrument_node="">
</span><h5 data-dcnode-id="886" id="section---VotingForDomesticViolenceAndSexualAssaultVictims"><span data-dcnode-id="887" instrument_node="">Voting for Domestic Violence and Sexual Assault Victims</span></h5><span data-dcnode-id="885" instrument_node="">
</span></div><span data-dcnode-id="883" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="875" data-parent="#special_circumstances" id="dvsa"><span data-dcnode-id="882" instrument_node="">
</span><div class="padded-content" data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node=""> Victims of domestic violence and sexual assault may experience varying impacts on their voting activities, including fear of seeing their assailant and intimidation. These voters can access election information online, by phone, and in person, and can ask a polling site attendant to make sure no one is watching their ballot selections. </span></p><span data-dcnode-id="878" instrument_node="">
</span></div><span data-dcnode-id="876" instrument_node="">
</span></div><span data-dcnode-id="874" instrument_node="">
</span></div><span data-dcnode-id="872" instrument_node="">
</span><div class="panel" data-dcnode-id="855"><span data-dcnode-id="871" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="866" data-target="#guardian" data-toggle="collapse"><span data-dcnode-id="870" instrument_node="">
</span><h5 data-dcnode-id="868" id="section---VotingWithAGuardian"><span data-dcnode-id="869" instrument_node="">Voting with a Guardian</span></h5><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="857" data-parent="#special_circumstances" id="guardian"><span data-dcnode-id="864" instrument_node="">
</span><div class="padded-content" data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node=""> Some voters require a guardian or assistant when casting their vote, such as those with visual impairments. It is illegal for these voters to be denied assistance, although they cannot bring an employer or other prohibited person as their guardian. For some voters, such as those who are declared mentally incompetent, voting is not allowed even with a guardian. </span></p><span data-dcnode-id="860" instrument_node="">
</span></div><span data-dcnode-id="858" instrument_node="">
</span></div><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">
</span><div class="panel" data-dcnode-id="837"><span data-dcnode-id="853" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="848" data-target="#military" data-toggle="collapse"><span data-dcnode-id="852" instrument_node="">
</span><h5 data-dcnode-id="850" id="section---VotingWhileInTheMilitary"><span data-dcnode-id="851" instrument_node="">Voting While in the Military</span></h5><span data-dcnode-id="849" instrument_node="">
</span></div><span data-dcnode-id="847" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="839" data-parent="#special_circumstances" id="military"><span data-dcnode-id="846" instrument_node="">
</span><div class="padded-content" data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node=""> Members of the military can vote using absentee ballots if overseas, or at their local polling place if stationed at home. Military personnel can acquire documents and other resources through their Installation Voter Assistance Office or Service Voting Action Officer. More resources for military personnel considering a college program can be found here. </span></p><span data-dcnode-id="842" instrument_node="">
</span></div><span data-dcnode-id="840" instrument_node="">
</span></div><span data-dcnode-id="838" instrument_node="">
</span></div><span data-dcnode-id="836" instrument_node="">
</span><div class="panel" data-dcnode-id="819"><span data-dcnode-id="835" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="830" data-target="#criminal_offenders" data-toggle="collapse"><span data-dcnode-id="834" instrument_node="">
</span><h5 data-dcnode-id="832" id="section---VotingForCriminalOffenders"><span data-dcnode-id="833" instrument_node="">Voting for Criminal Offenders</span></h5><span data-dcnode-id="831" instrument_node="">
</span></div><span data-dcnode-id="829" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="821" data-parent="#special_circumstances" id="criminal_offenders"><span data-dcnode-id="828" instrument_node="">
</span><div class="padded-content" data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node=""> Americans who have been convicted of felonies don't typically regain voting rights automatically. Each state sets its own voting rights policies for ex-offenders. In 11 states, individuals convicted of certain crimes never regain their voting rights while in other states (including Vermont and Maine) felons never even lose their right to vote. Each individual should check their state's policies. </span></p><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span></div><span data-dcnode-id="820" instrument_node="">
</span></div><span data-dcnode-id="818" instrument_node="">
</span><div class="panel" data-dcnode-id="798"><span data-dcnode-id="817" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="812" data-target="#homeless" data-toggle="collapse"><span data-dcnode-id="816" instrument_node="">
</span><h5 data-dcnode-id="814" id="section---VotingForHomelessAmericans"><span data-dcnode-id="815" instrument_node="">Voting for Homeless Americans</span></h5><span data-dcnode-id="813" instrument_node="">
</span></div><span data-dcnode-id="811" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="800" data-parent="#special_circumstances" id="homeless"><span data-dcnode-id="810" instrument_node="">
</span><div class="padded-content" data-dcnode-id="802"><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="808" instrument_node=""> Homeless Americans can still register and vote in all states. Many use a shelter address, park, or street corner as their residence on their registration documentation. More information and resources for the homeless can be found at this </span><a class="external" data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nationalhomeless.org/campaigns/voting/"><span data-dcnode-id="807" instrument_node="">site</span></a><span data-dcnode-id="805" instrument_node="">, provided by the National Coalition for the Homeless. </span></p><span data-dcnode-id="803" instrument_node="">
</span></div><span data-dcnode-id="801" instrument_node="">
</span></div><span data-dcnode-id="799" instrument_node="">
</span></div><span data-dcnode-id="797" instrument_node="">
</span><h2 data-dcnode-id="795" data-link-label="VOTING DURING COVID-19" id="section---HowToVoteDuringCOVID19"><span data-dcnode-id="796" instrument_node="">How to Vote During COVID-19</span></h2><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="793" instrument_node="">Due to the pandemic, voting options have been broadened to enable people to cast their votes without worry of catching COVID-19. </span><a class="external" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vote.org/covid-19"><span data-dcnode-id="792" instrument_node="">Vote.org</span></a><span data-dcnode-id="790" instrument_node=""> provides key resources for each state relating to voting options and information in the pandemic. In addition, the site also offers </span><a class="external" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vote.org/register-to-vote/"><span data-dcnode-id="789" instrument_node="">online voter registration</span></a><span data-dcnode-id="787" instrument_node="">. Registering to vote through Vote.org does include subscribing to the organization's emails. Voters can in turn check their state's' voter information websites for online registration that bypasses the third party. </span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="778"><a class="external" data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aclu.org/issues/voting-rights/promoting-access-ballot/states-online-voter-registration"><span data-dcnode-id="784" instrument_node="">This page</span></a><span data-dcnode-id="782" instrument_node="">, provided by the American Civil Liberties Union (ACLU) provides a list of the states that offer online voter registration (most of them do). The National Conference of State Legislators (NCSL) offers </span><a class="external" data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsl.org/research/elections-and-campaigns/voter-registration-deadlines.aspx"><span data-dcnode-id="781" instrument_node="">this page</span></a><span data-dcnode-id="779" instrument_node="">, which provides the voting registration deadlines for each state. Some states do require voters to register in person, so individuals should check with their registration boards. </span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="776" instrument_node="">Once registered, many Americans can vote via absentee ballot or in person. The CDC recommends that Americans practice safe voting, which can include using mail-in absentee ballots, practicing social distancing, and casting votes early to avoid the crowds on election day. In fact, a survey of college and graduate students conducted by Study.com found that 66% of students plan on absentee voting for the 2020 elections. The first link for vote.org above provides individual state resource links, as does </span><a class="external" data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rockthevote.org/how-to-vote/nationwide-voting-info/covid-19-voting-information/"><span data-dcnode-id="775" instrument_node="">this page</span></a><span data-dcnode-id="773" instrument_node=""> from Rock the Vote. Rock the Vote's page provides more information about each state's absentee and COVID-19 voting policies and procedures. </span></p><span data-dcnode-id="771" instrument_node="">
</span><h2 data-dcnode-id="769" id="section---VotingResearchResources"><span data-dcnode-id="770" instrument_node="">Voting Research Resources</span></h2><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Some people might say that the stakes have never been higher in an election year than this one, and a slew of organizations estimate that 2020 will have record numbers of votes. With so many prominent issues facing the country, it's vital that voters become informed. Simply being told by a friend or reading a headline on social media typically only provides individuals with part of a story. </span></p><span data-dcnode-id="765" instrument_node="">
</span><br data-dcnode-id="764"><span data-dcnode-id="763" instrument_node="">
</span><div class="shaded-border" data-dcnode-id="669"><span data-dcnode-id="762" instrument_node="">
</span><h3 data-dcnode-id="760" id="section---How are students staying informed on politics?"><span data-dcnode-id="761" instrument_node="">How are students staying informed on politics?</span></h3><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node=""> According to Study.com's recent survey of college and graduate students:</span></p><span data-dcnode-id="756" instrument_node="">
</span><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="751"><b data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Who has taught you the most about the election process in the United States?</span></b></p><span data-dcnode-id="750" instrument_node="">
</span><ul class="teal-bullets" data-dcnode-id="730"><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Teachers - 55%</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Myself - 20%</span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Media - 9%</span></li><span data-dcnode-id="740" instrument_node="">
</span><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Social Media - 7%</span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Family - 6%</span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Friends - 3%</span></li><span data-dcnode-id="731" instrument_node="">
</span></ul><span data-dcnode-id="729" instrument_node="">
</span><br data-dcnode-id="728"><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="724"><b data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Who do you think has had the most influence on your political point of view?</span></b></p><span data-dcnode-id="723" instrument_node="">
</span><ul class="teal-bullets" data-dcnode-id="703"><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Myself - 32%</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Family - 21%</span></li><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Friends - 16%</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Media - 12%</span></li><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Social Media - 10%</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Teachers - 4%</span></li><span data-dcnode-id="704" instrument_node="">
</span></ul><span data-dcnode-id="702" instrument_node="">
</span><br data-dcnode-id="701"><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="697"><b data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">What social media platform specifically had the most influence on your political point of view?</span></b></p><span data-dcnode-id="696" instrument_node="">
</span><ul class="teal-bullets" data-dcnode-id="673"><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Facebook - 33%</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Instagram - 25%</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Twitter - 17%</span></li><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">YouTube - 12%</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">TikTok - 10%</span></li><span data-dcnode-id="680" instrument_node="">
