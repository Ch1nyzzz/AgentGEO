</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">LinkedIn - 1%</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Snapchat - 1%</span></li><span data-dcnode-id="674" instrument_node="">
</span></ul><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="671"></p><span data-dcnode-id="670" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">In order to make an informed decision or opinion, each person should fact check, or seek out the information from a reputable resource. For example, an individual could read a news article from multiple sources (some from each perspective) and then search Google to see if there are indisputable facts that they can use to confirm the information. Once a person has analyzed as much information that is available, they'll have a better sense of the topic and can make an informed choice rather than an uninformed opinion. </span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">The websites linked below provide various resources for voters. </span></p><span data-dcnode-id="660" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="276" id="voting_research"><span data-dcnode-id="659" instrument_node="">
</span><div class="panel" data-dcnode-id="639"><span data-dcnode-id="658" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="653" data-target="#rockthevote" data-toggle="collapse"><span data-dcnode-id="657" instrument_node="">
</span><h5 data-dcnode-id="655" id="section---RockTheVote"><span data-dcnode-id="656" instrument_node="">Rock the Vote</span></h5><span data-dcnode-id="654" instrument_node="">
</span></div><span data-dcnode-id="652" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="641" data-parent="#voting_research" id="rockthevote"><span data-dcnode-id="651" instrument_node="">
</span><div class="padded-content" data-dcnode-id="643"><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="645"><b data-dcnode-id="647"><a class="external" data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rockthevote.org/programs-and-partner-resources/"><span data-dcnode-id="649" instrument_node="">Rock the Vote</span></a></b><span data-dcnode-id="646" instrument_node=""> offers online educational resources to help voters learn more about the different types of elections, registration information and offers creative collaboration and voter advocacy opportunities. </span></p><span data-dcnode-id="644" instrument_node="">
</span></div><span data-dcnode-id="642" instrument_node="">
</span></div><span data-dcnode-id="640" instrument_node="">
</span></div><span data-dcnode-id="638" instrument_node="">
</span><div class="panel" data-dcnode-id="618"><span data-dcnode-id="637" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="632" data-target="#usagov" data-toggle="collapse"><span data-dcnode-id="636" instrument_node="">
</span><h5 data-dcnode-id="634" id="section---USAgov"><span data-dcnode-id="635" instrument_node="">USA.gov</span></h5><span data-dcnode-id="633" instrument_node="">
</span></div><span data-dcnode-id="631" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="620" data-parent="#voting_research" id="usagov"><span data-dcnode-id="630" instrument_node="">
</span><div class="padded-content" data-dcnode-id="622"><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="624"><b data-dcnode-id="626"><a class="external" data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/voting"><span data-dcnode-id="628" instrument_node="">USA.gov</span></a></b><span data-dcnode-id="625" instrument_node=""> is a federally funded website that offers official resources for voters. The site provides pages on the election process, finding polling places and dates, voter education, state-specific processes, and voting laws. </span></p><span data-dcnode-id="623" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">
</span></div><span data-dcnode-id="619" instrument_node="">
</span></div><span data-dcnode-id="617" instrument_node="">
</span><div class="panel" data-dcnode-id="596"><span data-dcnode-id="616" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="611" data-target="#ncsl" data-toggle="collapse"><span data-dcnode-id="615" instrument_node="">
</span><h5 data-dcnode-id="613" id="section---NationalConferenceOfStateLegislatures"><span data-dcnode-id="614" instrument_node="">National Conference of State Legislatures</span></h5><span data-dcnode-id="612" instrument_node="">
</span></div><span data-dcnode-id="610" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="598" data-parent="#voting_research" id="ncsl"><span data-dcnode-id="609" instrument_node="">
</span><div class="padded-content" data-dcnode-id="600"><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="607" instrument_node="">The </span><b data-dcnode-id="604"><a class="external" data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsl.org/research/elections-and-campaigns/elections-resources-from-outside-ncsl.aspx"><span data-dcnode-id="606" instrument_node="">National Conference of State Legislatures</span></a></b><span data-dcnode-id="603" instrument_node=""> (NCSL) provides a slew of resources from both outside and inside of the organization, such as newsletters, election law publications, and links to voting information organizations. </span></p><span data-dcnode-id="601" instrument_node="">
</span></div><span data-dcnode-id="599" instrument_node="">
</span></div><span data-dcnode-id="597" instrument_node="">
</span></div><span data-dcnode-id="595" instrument_node="">
</span><div class="panel" data-dcnode-id="575"><span data-dcnode-id="594" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="589" data-target="#usep" data-toggle="collapse"><span data-dcnode-id="593" instrument_node="">
</span><h5 data-dcnode-id="591" id="section---UnitedStatesElectionsProject"><span data-dcnode-id="592" instrument_node="">United States Elections Project</span></h5><span data-dcnode-id="590" instrument_node="">
</span></div><span data-dcnode-id="588" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="577" data-parent="#voting_research" id="usep"><span data-dcnode-id="587" instrument_node="">
</span><div class="padded-content" data-dcnode-id="579"><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="581"><b data-dcnode-id="583"><a class="external" data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.electproject.org/"><span data-dcnode-id="585" instrument_node="">This site</span></a></b><span data-dcnode-id="582" instrument_node=""> offers information about voting and election laws, statistics and other electoral information. Some of the resources available include information about election precincts, mail-in voting policies, and election turnouts. </span></p><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
</span></div><span data-dcnode-id="574" instrument_node="">
</span><div class="panel" data-dcnode-id="554"><span data-dcnode-id="573" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="568" data-target="#projectvote" data-toggle="collapse"><span data-dcnode-id="572" instrument_node="">
</span><h5 data-dcnode-id="570" id="section---ProjectVote"><span data-dcnode-id="571" instrument_node="">Project Vote</span></h5><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="556" data-parent="#voting_research" id="projectvote"><span data-dcnode-id="566" instrument_node="">
</span><div class="padded-content" data-dcnode-id="558"><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="560"><b data-dcnode-id="562"><a class="external" data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.projectvote.org/"><span data-dcnode-id="564" instrument_node="">Project Vote</span></a></b><span data-dcnode-id="561" instrument_node=""> seeks to create an accurately representative electoral college by ensuring that all Americans have access to election information and voting. The nonpartisan organization offers resources on current topics and issues, engagement, and policies. </span></p><span data-dcnode-id="559" instrument_node="">
</span></div><span data-dcnode-id="557" instrument_node="">
</span></div><span data-dcnode-id="555" instrument_node="">
</span></div><span data-dcnode-id="553" instrument_node="">
</span><div class="panel" data-dcnode-id="532"><span data-dcnode-id="552" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="547" data-target="#eac" data-toggle="collapse"><span data-dcnode-id="551" instrument_node="">
</span><h5 data-dcnode-id="549" id="section---USElectionAssistanceCommission"><span data-dcnode-id="550" instrument_node="">U.S. Election Assistance Commission</span></h5><span data-dcnode-id="548" instrument_node="">
</span></div><span data-dcnode-id="546" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="534" data-parent="#voting_research" id="eac"><span data-dcnode-id="545" instrument_node="">
</span><div class="padded-content" data-dcnode-id="536"><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="543" instrument_node="">The </span><b data-dcnode-id="540"><a class="external" data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eac.gov/voters/resourcesforvoters"><span data-dcnode-id="542" instrument_node="">U.S. Election Assistance Commission</span></a></b><span data-dcnode-id="539" instrument_node=""> (EAC) provides several resources for voters, including a step-by-step voting guide. The federal organization also offers resources for disabled and military voters, election day information, and answers to frequently asked questions. </span></p><span data-dcnode-id="537" instrument_node="">
</span></div><span data-dcnode-id="535" instrument_node="">
</span></div><span data-dcnode-id="533" instrument_node="">
</span></div><span data-dcnode-id="531" instrument_node="">
</span><div class="panel" data-dcnode-id="511"><span data-dcnode-id="530" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="525" data-target="#slcc" data-toggle="collapse"><span data-dcnode-id="529" instrument_node="">
</span><h5 data-dcnode-id="527" id="section---StLouisCommunityCollege"><span data-dcnode-id="528" instrument_node="">St. Louis Community College</span></h5><span data-dcnode-id="526" instrument_node="">
</span></div><span data-dcnode-id="524" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="513" data-parent="#voting_research" id="slcc"><span data-dcnode-id="523" instrument_node="">
</span><div class="padded-content" data-dcnode-id="515"><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="517"><b data-dcnode-id="519"><a class="external" data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guides.stlcc.edu/c.php%3Fg%3D648834%26p%3D4550409"><span data-dcnode-id="521" instrument_node="">St. Louis Community College</span></a></b><span data-dcnode-id="518" instrument_node=""> (SLCC) provides a collection of links and resources for the public than can assist with information verification (also called fact checking). Individuals can review informative summaries about how to spot false information and use one of several links to analyze the trustworthiness of news and other information. </span></p><span data-dcnode-id="516" instrument_node="">
</span></div><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span></div><span data-dcnode-id="510" instrument_node="">
</span><h3 data-dcnode-id="508" id="section---VotingGroupsAndOrganizations"><span data-dcnode-id="509" instrument_node="">Voting Groups and Organizations</span></h3><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="506" instrument_node="">There are countless voter organizations available to students and other Americans, including </span><a class="external" data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rockthevote.org/programs-and-partner-resources/"><span data-dcnode-id="505" instrument_node="">Rock the Vote</span></a><span data-dcnode-id="503" instrument_node=""> and </span><a class="external" data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.projectvote.org/"><span data-dcnode-id="502" instrument_node="">Project Vote</span></a><span data-dcnode-id="500" instrument_node=""> from above. Some of the other organizations available are listed below. </span></p><span data-dcnode-id="498" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="278" id="voting_groups_orgs"><span data-dcnode-id="497" instrument_node="">
</span><div class="panel" data-dcnode-id="476"><span data-dcnode-id="496" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="491" data-target="#close_up" data-toggle="collapse"><span data-dcnode-id="495" instrument_node="">
</span><h5 data-dcnode-id="493" id="section---CloseUpFoundation"><span data-dcnode-id="494" instrument_node="">Close Up Foundation</span></h5><span data-dcnode-id="492" instrument_node="">
</span></div><span data-dcnode-id="490" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="478" data-parent="#voting_groups_orgs" id="close_up"><span data-dcnode-id="489" instrument_node="">
</span><div class="padded-content" data-dcnode-id="480"><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="487" instrument_node="">The </span><b data-dcnode-id="484"><a class="external" data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.closeup.org/about/mission-and-vision/"><span data-dcnode-id="486" instrument_node="">Close Up Foundation</span></a></b><span data-dcnode-id="483" instrument_node="">, started in 1971, is a nonpartisan and non-profit organization that promotes civic engagement. The organization conducts programs around Washington, D.C., that encourage young people to become involved in advocacy, voting, and legislature. </span></p><span data-dcnode-id="481" instrument_node="">
</span></div><span data-dcnode-id="479" instrument_node="">
</span></div><span data-dcnode-id="477" instrument_node="">
</span></div><span data-dcnode-id="475" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="280" id="voting_groups_orgs"><span data-dcnode-id="474" instrument_node="">
</span><div class="panel" data-dcnode-id="454"><span data-dcnode-id="473" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="468" data-target="#np_vote" data-toggle="collapse"><span data-dcnode-id="472" instrument_node="">
</span><h5 data-dcnode-id="470" id="section---NonprofitVOTE"><span data-dcnode-id="471" instrument_node="">Nonprofit VOTE</span></h5><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="456" data-parent="#voting_groups_orgs" id="np_vote"><span data-dcnode-id="466" instrument_node="">
</span><div class="padded-content" data-dcnode-id="458"><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><b data-dcnode-id="462"><a class="external" data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nonprofitvote.org/our-mission/"><span data-dcnode-id="464" instrument_node="">Nonprofit VOTE</span></a></b><span data-dcnode-id="461" instrument_node=""> works with various nonprofits throughout the U.S. to promote voting participation. The group is nonpartisan and offers resources on advocating, voting information, and candidate engagement. </span></p><span data-dcnode-id="459" instrument_node="">
</span></div><span data-dcnode-id="457" instrument_node="">
</span></div><span data-dcnode-id="455" instrument_node="">
</span></div><span data-dcnode-id="453" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="282" id="voting_groups_orgs"><span data-dcnode-id="452" instrument_node="">
</span><div class="panel" data-dcnode-id="431"><span data-dcnode-id="451" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="446" data-target="#lwv" data-toggle="collapse"><span data-dcnode-id="450" instrument_node="">
</span><h5 data-dcnode-id="448" id="section---LeagueOfWomenVoters"><span data-dcnode-id="449" instrument_node="">League of Women Voters</span></h5><span data-dcnode-id="447" instrument_node="">
</span></div><span data-dcnode-id="445" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="433" data-parent="#voting_groups_orgs" id="lwv"><span data-dcnode-id="444" instrument_node="">
</span><div class="padded-content" data-dcnode-id="435"><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="442" instrument_node="">The </span><b data-dcnode-id="439"><a class="external" data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lwv.org/"><span data-dcnode-id="441" instrument_node="">League of Women Voters</span></a></b><span data-dcnode-id="438" instrument_node=""> (LWV) seeks to promote the participation of all voters in elections to create a better democracy. LWV is nonpartisan and provides resources for voting information, political issues, and voters' rights. </span></p><span data-dcnode-id="436" instrument_node="">
</span></div><span data-dcnode-id="434" instrument_node="">
</span></div><span data-dcnode-id="432" instrument_node="">
</span></div><span data-dcnode-id="430" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="284" id="voting_groups_orgs"><span data-dcnode-id="429" instrument_node="">
</span><div class="panel" data-dcnode-id="409"><span data-dcnode-id="428" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="423" data-target="#headcount" data-toggle="collapse"><span data-dcnode-id="427" instrument_node="">
</span><h5 data-dcnode-id="425" id="section---HeadCount"><span data-dcnode-id="426" instrument_node="">HeadCount</span></h5><span data-dcnode-id="424" instrument_node="">
</span></div><span data-dcnode-id="422" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="411" data-parent="#voting_groups_orgs" id="headcount"><span data-dcnode-id="421" instrument_node="">
</span><div class="padded-content" data-dcnode-id="413"><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="415"><b data-dcnode-id="417"><a class="external" data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.headcount.org/"><span data-dcnode-id="419" instrument_node="">HeadCount</span></a></b><span data-dcnode-id="416" instrument_node=""> - This nonpartisan organization utilizes music to promote voting awareness and participation by reaching out to people online and at concerts. Their website provides resources for voter registration, absentee ballots, and social promotion. </span></p><span data-dcnode-id="414" instrument_node="">
</span></div><span data-dcnode-id="412" instrument_node="">
</span></div><span data-dcnode-id="410" instrument_node="">
</span></div><span data-dcnode-id="408" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="286" id="voting_groups_orgs"><span data-dcnode-id="407" instrument_node="">
</span><div class="panel" data-dcnode-id="387"><span data-dcnode-id="406" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="401" data-target="#electionprotection" data-toggle="collapse"><span data-dcnode-id="405" instrument_node="">
</span><h5 data-dcnode-id="403" id="section---ElectionProtection"><span data-dcnode-id="404" instrument_node="">Election Protection</span></h5><span data-dcnode-id="402" instrument_node="">
</span></div><span data-dcnode-id="400" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="389" data-parent="#voting_groups_orgs" id="electionprotection"><span data-dcnode-id="399" instrument_node="">
</span><div class="padded-content" data-dcnode-id="391"><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="393"><b data-dcnode-id="395"><a class="external" data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//866ourvote.org/"><span data-dcnode-id="397" instrument_node="">Election Protection</span></a></b><span data-dcnode-id="394" instrument_node=""> - The website for this organization provides a collection of resources and information, including voter registration and state voting rules. In addition, the site offers information on mail-in voting, voting rights, and how to report voting incidents. </span></p><span data-dcnode-id="392" instrument_node="">
</span></div><span data-dcnode-id="390" instrument_node="">
</span></div><span data-dcnode-id="388" instrument_node="">
</span></div><span data-dcnode-id="386" instrument_node="">
</span><h3 data-dcnode-id="384" data-link-label="ADVICE FOR STUDENT VOTERS" id="section---AdviceForStudentVoters"><span data-dcnode-id="385" instrument_node="">Advice for Student Voters</span></h3><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">It could be argued that this election matters more than others because there are so many key issues in the United States, including the COVID-19 pandemic. Students and other voters should give just a few minutes of their time to cast their votes and let their voices be heard! Some tips for student voters are listed below. </span></p><span data-dcnode-id="380" instrument_node="">
</span><div class="accordionTwo" data-dcnode-id="288" id="voter_advice"><span data-dcnode-id="379" instrument_node="">
</span><div class="panel" data-dcnode-id="362"><span data-dcnode-id="378" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="373" data-target="#review" data-toggle="collapse"><span data-dcnode-id="377" instrument_node="">
</span><h5 data-dcnode-id="375" id="section---1ReviewYourStatesVoterRegistrationPoliciesResearchTheCandidates"><span data-dcnode-id="376" instrument_node="">1. Review your state's voter registration policies &amp; research the candidates</span></h5><span data-dcnode-id="374" instrument_node="">
</span></div><span data-dcnode-id="372" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="364" data-parent="#voter_advice" id="review"><span data-dcnode-id="371" instrument_node="">
</span><div class="padded-content" data-dcnode-id="366"><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">You could do both of these, right now, in just a few minutes. Investigate what candidates have done and what values they focus on to see who you might prefer.</span></p><span data-dcnode-id="367" instrument_node="">
</span></div><span data-dcnode-id="365" instrument_node="">
</span></div><span data-dcnode-id="363" instrument_node="">
</span></div><span data-dcnode-id="361" instrument_node="">
</span><div class="panel" data-dcnode-id="344"><span data-dcnode-id="360" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="355" data-target="#registration" data-toggle="collapse"><span data-dcnode-id="359" instrument_node="">
</span><h5 data-dcnode-id="357" id="section---2GetRegistered"><span data-dcnode-id="358" instrument_node="">2. Get registered!</span></h5><span data-dcnode-id="356" instrument_node="">
</span></div><span data-dcnode-id="354" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="346" data-parent="#voter_advice" id="registration"><span data-dcnode-id="353" instrument_node="">
</span><div class="padded-content" data-dcnode-id="348"><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">If you haven't already, select a political party (or none) and complete your voter registration. Remember to consult with your financial aid office if you are living out-of-state for tuition and aid reasons. Complete the registration now so that you won't need to again (unless you move or switch parties).</span></p><span data-dcnode-id="349" instrument_node="">
</span></div><span data-dcnode-id="347" instrument_node="">
</span></div><span data-dcnode-id="345" instrument_node="">
</span></div><span data-dcnode-id="343" instrument_node="">
</span><div class="panel" data-dcnode-id="326"><span data-dcnode-id="342" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="337" data-target="#keepup" data-toggle="collapse"><span data-dcnode-id="341" instrument_node="">
</span><h5 data-dcnode-id="339" id="section---3KeepUpWithCurrentIssues"><span data-dcnode-id="340" instrument_node="">3. Keep up with current issues</span></h5><span data-dcnode-id="338" instrument_node="">
</span></div><span data-dcnode-id="336" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="328" data-parent="#voter_advice" id="keepup"><span data-dcnode-id="335" instrument_node="">
</span><div class="padded-content" data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">This doesn't mean read only the headlines of news and events. You should find the information associated with headlines to maintain an awareness of the country's events and situation. See what the candidates have to say about these issues.</span></p><span data-dcnode-id="331" instrument_node="">
</span></div><span data-dcnode-id="329" instrument_node="">
</span></div><span data-dcnode-id="327" instrument_node="">
</span></div><span data-dcnode-id="325" instrument_node="">
</span><div class="panel" data-dcnode-id="308"><span data-dcnode-id="324" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="319" data-target="#vote_early" data-toggle="collapse"><span data-dcnode-id="323" instrument_node="">
</span><h5 data-dcnode-id="321" id="section---4VoteEarly"><span data-dcnode-id="322" instrument_node="">4. Vote early!</span></h5><span data-dcnode-id="320" instrument_node="">
</span></div><span data-dcnode-id="318" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="310" data-parent="#voter_advice" id="vote_early"><span data-dcnode-id="317" instrument_node="">
</span><div class="padded-content" data-dcnode-id="312"><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">While voting on election day might be your plan, voting early ensures that you don't have to worry about whether your vote will be counted. In addition, voting early enables you to go to the polling center when there are fewer people, meaning it will be at least somewhat easier to practice social distancing. Don't forget that you can use an absentee mail-in ballot if you prefer.</span></p><span data-dcnode-id="313" instrument_node="">
</span></div><span data-dcnode-id="311" instrument_node="">
</span></div><span data-dcnode-id="309" instrument_node="">
</span></div><span data-dcnode-id="307" instrument_node="">
</span><div class="panel" data-dcnode-id="290"><span data-dcnode-id="306" instrument_node="">
</span><div class="accordionTwoHeader" data-dcnode-id="301" data-target="#friends" data-toggle="collapse"><span data-dcnode-id="305" instrument_node="">
</span><h5 data-dcnode-id="303" id="section---5TellYourFriendsToVote"><span data-dcnode-id="304" instrument_node="">5. Tell your friends to vote</span></h5><span data-dcnode-id="302" instrument_node="">
</span></div><span data-dcnode-id="300" instrument_node="">
</span><div class="accordionTwoContent collapse collapsed" data-dcnode-id="292" data-parent="#voter_advice" id="friends"><span data-dcnode-id="299" instrument_node="">
</span><div class="padded-content" data-dcnode-id="294"><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">As mentioned at the beginning of this discussion, only around half of voting-aged Americans actually vote. Participate in respectful and critical discussions of the candidates and issues. You can advocate for your candidate but emphasize the importance of voting even if your friends prefer a different candidate.</span></p><span data-dcnode-id="295" instrument_node="">
</span></div><span data-dcnode-id="293" instrument_node="">
