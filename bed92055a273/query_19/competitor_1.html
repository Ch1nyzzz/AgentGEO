</span><meta content="The number of resources available to medical students studying a degree in medicine is growing exponentially. In addition to traditional learning resources such as lectures and textbooks, students are increasingly using e-learning tools like commercially available question banks to supplement their learning. Student preference for learning resources has not been described in detail, and a better understanding of the tools perceived to be useful could provide essential information to medical educators when designing and implementing medical curricula. We invited 1083 undergraduate and postgraduate medical students from two major Australian universities to complete an online survey. Questions asked students to indicate the frequency with which they use various types of resources when learning new material or when revising previous content. Approximately one third (32.3%, N&nbsp;= 350) of invited participants completed the survey, and of those who responded, the gender distribution was even with a median age of 25 years. Making written notes and reading textbooks were the most frequently utilized resources for learning new material. Online or downloaded question banks were the most frequently used resource for revision. In addition to the use of traditional learning tools, the majority of students report using a variety of e-learning tools including online teaching videos (92%, n&nbsp;= 322) and question banks (90.6%, n&nbsp;= 317). Despite the trend towards e-learning, traditional resources like attendance at face-to-face lectures remain the most popular for learning new material. The increasing use of question banks raises potential issues of poor alignment to medical school curricula. With the advantages of exam technique practice, time efficiency and multiplatform availability, their popularity is likely to continue. Evaluation of existing question banks is required to facilitate appropriate integration into the curricula, with equitable access for all students." data-dcnode-id="2710" name="citation_abstract"><span data-dcnode-id="2709" instrument_node="">

</span><meta content="Medical students: what educational resources are they using? - BMC Medical Education" data-dcnode-id="2443" property="og:title"><span data-dcnode-id="2442" instrument_node="">
</span><meta content="Background The number of resources available to medical students studying a degree in medicine is growing exponentially. In addition to traditional learning resources such as lectures and textbooks, students are increasingly using e-learning tools like commercially available question banks to supplement their learning. Student preference for learning resources has not been described in detail, and a better understanding of the tools perceived to be useful could provide essential information to medical educators when designing and implementing medical curricula. Methods We invited 1083 undergraduate and postgraduate medical students from two major Australian universities to complete an online survey. Questions asked students to indicate the frequency with which they use various types of resources when learning new material or when revising previous content. Results Approximately one third (32.3%, N = 350) of invited participants completed the survey, and of those who responded, the gender distribution was even with a median age of 25 years. Making written notes and reading textbooks were the most frequently utilized resources for learning new material. Online or downloaded question banks were the most frequently used resource for revision. In addition to the use of traditional learning tools, the majority of students report using a variety of e-learning tools including online teaching videos (92%, n = 322) and question banks (90.6%, n = 317). Conclusion Despite the trend towards e-learning, traditional resources like attendance at face-to-face lectures remain the most popular for learning new material. The increasing use of question banks raises potential issues of poor alignment to medical school curricula. With the advantages of exam technique practice, time efficiency and multiplatform availability, their popularity is likely to continue. Evaluation of existing question banks is required to facilitate appropriate integration into the curricula, with equitable access for all students." data-dcnode-id="2441" property="og:description"><span data-dcnode-id="2440" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="1785" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1786" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1813" id="Abs1"><span data-dcnode-id="1814" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1787" id="Abs1-content"><h3 class="c-article__sub-heading" data-dcnode-id="1811" data-test="abstract-sub-heading"><span data-dcnode-id="1812" instrument_node="">Background</span></h3><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">The number of resources available to medical students studying a degree in medicine is growing exponentially. In addition to traditional learning resources such as lectures and textbooks, students are increasingly using e-learning tools like commercially available question banks to supplement their learning. Student preference for learning resources has not been described in detail, and a better understanding of the tools perceived to be useful could provide essential information to medical educators when designing and implementing medical curricula.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1807" data-test="abstract-sub-heading"><span data-dcnode-id="1808" instrument_node="">Methods</span></h3><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">We invited 1083 undergraduate and postgraduate medical students from two major Australian universities to complete an online survey. Questions asked students to indicate the frequency with which they use various types of resources when learning new material or when revising previous content.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1803" data-test="abstract-sub-heading"><span data-dcnode-id="1804" instrument_node="">Results</span></h3><p data-dcnode-id="1792"><span data-dcnode-id="1802" instrument_node="">Approximately one third (32.3%, </span><i data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">N</span></i><span data-dcnode-id="1799" instrument_node="">&nbsp;= 350) of invited participants completed the survey, and of those who responded, the gender distribution was even with a median age of 25 years. Making written notes and reading textbooks were the most frequently utilized resources for learning new material. Online or downloaded question banks were the most frequently used resource for revision. In addition to the use of traditional learning tools, the majority of students report using a variety of e-learning tools including online teaching videos (92%, </span><i data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">n</span></i><span data-dcnode-id="1796" instrument_node="">&nbsp;= 322) and question banks (90.6%, </span><i data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">n</span></i><span data-dcnode-id="1793" instrument_node="">&nbsp;= 317).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1790" data-test="abstract-sub-heading"><span data-dcnode-id="1791" instrument_node="">Conclusion</span></h3><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Despite the trend towards e-learning, traditional resources like attendance at face-to-face lectures remain the most popular for learning new material. The increasing use of question banks raises potential issues of poor alignment to medical school curricula. With the advantages of exam technique practice, time efficiency and multiplatform availability, their popularity is likely to continue. Evaluation of existing question banks is required to facilitate appropriate integration into the curricula, with equitable access for all students.</span></p></div></div></section><span data-dcnode-id="1784" instrument_node="">

</span><section data-dcnode-id="1666" data-title="Background"><div class="c-article-section" data-dcnode-id="1667" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1771" id="Sec1"><span data-dcnode-id="1772" instrument_node="">Background</span></h2><div class="c-article-section__content" data-dcnode-id="1668" id="Sec1-content"><p data-dcnode-id="1760"><span data-dcnode-id="1770" instrument_node="">In the last decade, there has been a rapid expansion of educational resources available for medical students. As well as traditional resources such as lectures, textbooks and tutorials, students are increasingly accessing mobile technology and online tools for learning [</span><a aria-label="Reference 1" data-dcnode-id="1768" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d140816640e455" title="Davies BS, Rafique J, Vincent TR, Fairclough J, Packer MH, Vincent R, Haq I. Mobile medical education (MoMEd)-how mobile information resources contribute to learning for undergraduate clinical students-a mixed methods study. BMC Med Educ 2012 12;12(1):1."><span data-dcnode-id="1769" instrument_node="">1</span></a><span data-dcnode-id="1767" instrument_node="">, </span><a aria-label="Reference 2" data-dcnode-id="1765" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d140816640e458" title="Grasso MA, Yen MJ, Mintz ML. Survey of handheld computing among medical students. Comput Methods Prog Biomed. 2006;82(3):196–202."><span data-dcnode-id="1766" instrument_node="">2</span></a><span data-dcnode-id="1764" instrument_node="">], collectively referred to as e-learning tools. The concept of blended learning, incorporating both e-learning and traditional learning tools, is well established [</span><a aria-label="Reference 3" data-dcnode-id="1762" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d140816640e461" title="Ruiz JG, Mintzer MJ, Leipzig RM. The impact of e-learning in medical education. Acad Med. 2006;81(3):207–12."><span data-dcnode-id="1763" instrument_node="">3</span></a><span data-dcnode-id="1761" instrument_node="">]. Currently there is little evidence available to indicate which educational resources medical students prefer to use while completing their degrees.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1758" id="Sec2"><span data-dcnode-id="1759" instrument_node="">Smartphones</span></h3><p data-dcnode-id="1726"><span data-dcnode-id="1757" instrument_node="">Reports of the proportion of students who use smartphones for learning medicine are variable. Between 64 and 98% of students have been reported to own a smartphone [</span><a aria-label="Reference 1" data-dcnode-id="1755" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d140816640e471" title="Davies BS, Rafique J, Vincent TR, Fairclough J, Packer MH, Vincent R, Haq I. Mobile medical education (MoMEd)-how mobile information resources contribute to learning for undergraduate clinical students-a mixed methods study. BMC Med Educ 2012 12;12(1):1."><span data-dcnode-id="1756" instrument_node="">1</span></a><span data-dcnode-id="1754" instrument_node="">, </span><a data-dcnode-id="1752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d140816640e474" title="Sandholzer M, Rurik I, Deutsch T, Frese T. Medical students’ expectations towards an implementation of a family medicine textbook as a comprehensive app in Germany. J Med Syst. 2014;38(10):1–9."><span data-dcnode-id="1753" instrument_node="">4</span></a><span data-dcnode-id="1751" instrument_node="">,</span><a data-dcnode-id="1749" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d140816640e474_1" title="Sandholzer M, Deutsch T, Frese T, Winter A. Predictors of students’ self-reported adoption of a smartphone application for medical education in general practice. BMC Med Educ. 2015;15(1):1."><span data-dcnode-id="1750" instrument_node="">5</span></a><span data-dcnode-id="1748" instrument_node="">,</span><a data-dcnode-id="1746" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d140816640e474_2" title="Tran K, Morra D, Lo V, Quan SD, Abrams H, Wu RC. Medical students and personal smartphones in the clinical environment: the impact on confidentiality of personal health information and professionalism. J Med Internet Res. 2014;16(5):e132."><span data-dcnode-id="1747" instrument_node="">6</span></a><span data-dcnode-id="1745" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="1743" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d140816640e477" title="Payne KF, Wharrad H, Watts K. Smartphone and medical related app use among medical students and junior doctors in the United Kingdom (UK): a regional survey. BMC Med Inform Decis Mak. 2012;12(1):1."><span data-dcnode-id="1744" instrument_node="">7</span></a><span data-dcnode-id="1742" instrument_node="">] and the numbers are increasing. In a 2013 cross-sectional study in Birmingham, 87% of students reported using smartphones but only 70% found them useful in aiding their medical education [</span><a aria-label="Reference 8" data-dcnode-id="1740" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d140816640e480" title="Kassamali RH, Ladak B. Smartphones make smarter students. Med Teach. 2013;35(5):425."><span data-dcnode-id="1741" instrument_node="">8</span></a><span data-dcnode-id="1739" instrument_node="">]. Another study in Leipzig found that only 32.4% of students were using medical apps on their smartphone [</span><a aria-label="Reference 4" data-dcnode-id="1737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d140816640e483" title="Sandholzer M, Rurik I, Deutsch T, Frese T. Medical students’ expectations towards an implementation of a family medicine textbook as a comprehensive app in Germany. J Med Syst. 2014;38(10):1–9."><span data-dcnode-id="1738" instrument_node="">4</span></a><span data-dcnode-id="1736" instrument_node="">]. A systematic review of survey articles discussing smartphone apps found only 11 were aimed at medical students, possibly explaining the low uptake of apps for study purposes [</span><a aria-label="Reference 9" data-dcnode-id="1734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d140816640e487" title="Mosa AS, Yoo I. Sheets L. a systematic review of healthcare applications for smartphones. BMC Med Inform Decis Mak. 2012;12(1):1."><span data-dcnode-id="1735" instrument_node="">9</span></a><span data-dcnode-id="1733" instrument_node="">]. Only four years later, a simple search for “medical student app” in the iPhone App store yields a staggering 726 results [</span><a aria-label="Reference 10" data-dcnode-id="1731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d140816640e490" title="App Store icon on Iphone. In ‘Search’ bar type: “medical student app”. Result as of 30th August 2016."><span data-dcnode-id="1732" instrument_node="">10</span></a><span data-dcnode-id="1730" instrument_node="">], including diagnostic tools, anatomy handbooks, surgical simulators, lab values, drug references and multiple choice questions covering a range of topics</span><sup data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">.</span></sup><span data-dcnode-id="1727" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1724" id="Sec3"><span data-dcnode-id="1725" instrument_node="">Online resources</span></h3><p data-dcnode-id="1716"><span data-dcnode-id="1723" instrument_node="">Students are also utilizing a multitude of other online resources. A recent survey in Illinois of students in their final two years of medical school found students using online tools including Google docs, Youtube, Twitter, Facebook and Wikipedia for study purposes [</span><a aria-label="Reference 11" data-dcnode-id="1721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d140816640e503" title="Han H, Nelson E, Wetter N. Medical students’ online learning technology needs. Clin Teach. 2014;11(1):15–9."><span data-dcnode-id="1722" instrument_node="">11</span></a><span data-dcnode-id="1720" instrument_node="">]. In a survey of Welsh medical students, 70% report using ‘Meducation’, an online learning tool consisting of videos, problem based learning cases, tutorials and quizzes [</span><a aria-label="Reference 12" data-dcnode-id="1718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d140816640e506" title="Lemon TI, Yarrow-Jenkins A. E-learning still increasing—the proportion of welsh medical students using external web sites to learn. Telemed E-Health. 2013;19(11):891."><span data-dcnode-id="1719" instrument_node="">12</span></a><span data-dcnode-id="1717" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1714" id="Sec4"><span data-dcnode-id="1715" instrument_node="">Question banks</span></h3><p data-dcnode-id="1703"><span data-dcnode-id="1713" instrument_node="">Question banks have also emerged as a popular online learning tool. There are several commercially available question banks for medical students and doctors in training, including: ‘Passmedicine’, ‘PasTest’, ‘OnExamination’, ‘Examdoctor’ and ‘NEJM knowledge +’. Each has between 1500 and 6500 practice questions in the form of single best answer or extended matching questions, accompanied by practice exams, quizzes, images and feedback. Students are able to track their own progress over time and often compare their results with other students. They are used by students studying for the United States Medical Licensing Examination [</span><a aria-label="Reference 13" data-dcnode-id="1711" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d140816640e517" title="Ripp K, Braun L. Race/ethnicity in medical education: an analysis of a question bank for Step1 of the unites states medical licensing examination. Teach Learn Med. 2017;29(2):115–22."><span data-dcnode-id="1712" instrument_node="">13</span></a><span data-dcnode-id="1710" instrument_node="">], and associated with improved rates of passing the Emergency Medicine certification examinations in the United States [</span><a aria-label="Reference 14" data-dcnode-id="1708" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d140816640e520" title="Clemency B, Martin-Gill C, Rall N, May P, Lubin J, Cooley C, Van Dillen C, Silvestri S, Portela R, Cooney D, Knutsen C, March J. Association between EMS question Bank completion and passing rates on the EMS certification examination. Prehosp Emerg Care. 2017;21(4):498–502."><span data-dcnode-id="1709" instrument_node="">14</span></a><span data-dcnode-id="1707" instrument_node="">]. In these contexts, students are using the question banks to revise and practice exam technique for specific examinations. It is also possible that students are using question banks more broadly than this, for example, to learn new information for the first time. Harris and colleagues, generated a question bank of student-written multiple choice questions and made them available online to medical students at Cardiff University [</span><a aria-label="Reference 15" data-dcnode-id="1705" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d140816640e523" title="Harris BH, Walsh JL, Tayyaba S, Harris DA, Wilson DJ, Smith PEA. Novel student-led approach to multiple-choice question generation and online database creation, With Targeted Clinician Input. Teach Learn Med. 2015;27(2):182–8."><span data-dcnode-id="1706" instrument_node="">15</span></a><span data-dcnode-id="1704" instrument_node="">]. They found a significant uptake, with 600 students using the resource within a three month trial period. It is not currently known, however, what proportion of students use commercial online question banks and for what purpose: revision or learning new information.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1701" id="Sec5"><span data-dcnode-id="1702" instrument_node="">Gender differences</span></h3><p data-dcnode-id="1690"><span data-dcnode-id="1700" instrument_node="">Gender differences in the acceptance and use of e-learning have previously been explored. In comparison to females, males have been reported to be more likely to consider e-learning easy to use, useful and efficient [</span><a aria-label="Reference 16" data-dcnode-id="1698" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d140816640e535" title="Ong CS, Lai JY. Gender differences in perceptions and relationships among dominants of e-learning acceptance. Comput Hum Behav. 2006;22(5):816–29."><span data-dcnode-id="1699" instrument_node="">16</span></a><span data-dcnode-id="1697" instrument_node="">]. However, a study of first year medical students in Austria found no significant gender difference in attitudes towards e-learning [</span><a aria-label="Reference 17" data-dcnode-id="1695" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d140816640e538" title="Link TM, Marz R. Computer literacy and attitudes towards e-learning among first year medical students. BMC Med Educ. 2006;6(1):1."><span data-dcnode-id="1696" instrument_node="">17</span></a><span data-dcnode-id="1694" instrument_node="">]. A systematic review of gender and learning in surgery found no significant difference in the uptake of e-learning resources [</span><a aria-label="Reference 18" data-dcnode-id="1692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d140816640e541" title="Burgos CM, Josephson A. Gender differences in the learning and teaching of surgery: a literature review. Int J Med Educ. 2014;5:110."><span data-dcnode-id="1693" instrument_node="">18</span></a><span data-dcnode-id="1691" instrument_node="">]. It is important to clarify if there is a gender difference in the uptake of new medical education resources to avoid inadvertent gender bias in medical education.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1688" id="Sec6"><span data-dcnode-id="1689" instrument_node="">Lecture attendance</span></h3><p data-dcnode-id="1671"><span data-dcnode-id="1687" instrument_node="">Reported in-person lecture attendance by medical students is also inconsistent. Some argue that lecture attendance is in decline [</span><a aria-label="Reference 19" data-dcnode-id="1685" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d140816640e552" title="Cardall S, Krupat E, Ulrich M. Live lecture versus video-recorded lecture: are students voting with their feet? Acad Med. 2008;83(12):1174–8."><span data-dcnode-id="1686" instrument_node="">19</span></a><span data-dcnode-id="1684" instrument_node="">, </span><a aria-label="Reference 20" data-dcnode-id="1682" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d140816640e555" title="Franklin DS, Gibson JW, Samuel JC, Teeter WA, Clarkson CW. Use of lecture recordings in medical education. Med Sci Educ. 2011;21(1):21–8."><span data-dcnode-id="1683" instrument_node="">20</span></a><span data-dcnode-id="1681" instrument_node="">], with many students opting to watch recorded lectures online in their own time. One survey of medical students studying molecular biology found 97.9% wanted to be able to access recorded lectures [</span><a aria-label="Reference 21" data-dcnode-id="1679" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d140816640e558" title="Pilarski PP, Alan Johnstone D, Pettepher CC, Osheroff N. From music to macromolecules: using rich media/podcast lecture recordings to enhance the preclinical educational experience. Med Teach. 2008;30(6):630–2."><span data-dcnode-id="1680" instrument_node="">21</span></a><span data-dcnode-id="1678" instrument_node="">]. At Harvard Medical School, a survey of first and second year students reported that 57.2% of students attend lectures, whilst 29.9% watch them online [</span><a aria-label="Reference 19" data-dcnode-id="1676" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d140816640e561" title="Cardall S, Krupat E, Ulrich M. Live lecture versus video-recorded lecture: are students voting with their feet? Acad Med. 2008;83(12):1174–8."><span data-dcnode-id="1677" instrument_node="">19</span></a><span data-dcnode-id="1675" instrument_node="">]. Another survey of 190 medical students from New York University reported that 80% of students attend lectures and 20% use mainly online or computer based learning [</span><a aria-label="Reference 22" data-dcnode-id="1673" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d140816640e564" title="Paul S, Pusic M, Gillespie C. Medical student lecture attendance versus iTunes U. Med Educ. 2015;49(5):530–1."><span data-dcnode-id="1674" instrument_node="">22</span></a><span data-dcnode-id="1672" instrument_node="">]. Lecture attendance may vary between institutions, depending on their importance and frequency within the curriculum, quality of lecturers and the content, whether they are available online or if attendance is compulsory. If students are no longer routinely attending lectures, medical educators may need to shift their focus to newer technologies.</span></p><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Further clarity in how today’s medical students learn is necessary for three key reasons. Firstly, without knowing which of the multitude of resources are being utilised, medical schools are at risk of falling out of touch with their students’ educational needs. Secondly, to ensure consistent delivery of quality education, the most popular resources need to be identified so that their quality and relevance to university curricula can be evaluated. Finally, so that universities can more effectively allocate resources to develop education tools that students are likely to use. This study sought to assess today’s medical students’ preference for educational resources; to investigate, if this preference shifts when learning new materials, or when revising; and if students’ preference for educational resources are related to their age, previous educational exposure or future career aspirations.</span></p></div></div></section><section data-dcnode-id="1572" data-title="Methods"><div class="c-article-section" data-dcnode-id="1573" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1664" id="Sec7"><span data-dcnode-id="1665" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="1574" id="Sec7-content"><h3 class="c-article__sub-heading" data-dcnode-id="1662" id="Sec8"><span data-dcnode-id="1663" instrument_node="">Study context</span></h3><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">The study was conducted in June 2015 at the University of Sydney and the University of New South Wales (UNSW). Both universities are located in Sydney, New South Wales, Australia. The University of Sydney offers a four-year graduate entry medical program. The University of New South Wales offers a six-year undergraduate medical program. At the time of the study, participants from both universities were in their final two years of study. Most of their teaching occurred at hospital-based clinical schools, within the clinical environment. Assessment methods at both universities included a combination of clinical and written examinations.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1658" id="Sec9"><span data-dcnode-id="1659" instrument_node="">Participants</span></h3><p data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node="">All (</span><i data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">n</span></i><span data-dcnode-id="1654" instrument_node="">&nbsp;= 1083) penultimate and final year medical students from The University of Sydney and the University of New South Wales, Australia, were invited to participate in an anonymous online questionnaire hosted on SurveyMonkey.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1651" id="Sec10"><span data-dcnode-id="1652" instrument_node="">Data collection and analysis</span></h3><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Students were invited to participate in the study via an email sent from their respective university administrators in June 2015. Two reminder emails were then sent at two week intervals and the survey was closed after a total of six weeks. No remittance or reward was offered to students for participating in the study.</span></p><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">The survey was designed by the authors. Students were asked to identify, on a seven point Likert scale (never, rarely, occasionally, sometimes, often, mostly or always), to what extent resources were used for learning new skills and knowledge, and revising old skills and knowledge, with a list of ten options, ranging from traditional methods of learning to e-learning platforms and apps. The ten options included:</span></p><ul class="u-list-style-bullet" data-dcnode-id="1585"><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">making written notes</span></p><span data-dcnode-id="1642" instrument_node="">
</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1635"><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">attending lectures in person</span></p><span data-dcnode-id="1636" instrument_node="">
</span></li><span data-dcnode-id="1634" instrument_node="">
</span><li data-dcnode-id="1629"><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">reading medical textbooks</span></p><span data-dcnode-id="1630" instrument_node="">
</span></li><span data-dcnode-id="1628" instrument_node="">
</span><li data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">using online or downloaded question banks (single best answers and extended questions)</span></p><span data-dcnode-id="1624" instrument_node="">
</span></li><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1617"><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">attending small group tutorials</span></p><span data-dcnode-id="1618" instrument_node="">
</span></li><span data-dcnode-id="1616" instrument_node="">
</span><li data-dcnode-id="1611"><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">watching online teaching videos</span></p><span data-dcnode-id="1612" instrument_node="">
</span></li><span data-dcnode-id="1610" instrument_node="">
</span><li data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">watching lectures online</span></p><span data-dcnode-id="1606" instrument_node="">
</span></li><span data-dcnode-id="1604" instrument_node="">
</span><li data-dcnode-id="1599"><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">consulting medical literature</span></p><span data-dcnode-id="1600" instrument_node="">
</span></li><span data-dcnode-id="1598" instrument_node="">
</span><li data-dcnode-id="1593"><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">using interactive online materials (not question banks)</span></p><span data-dcnode-id="1594" instrument_node="">
</span></li><span data-dcnode-id="1592" instrument_node="">
</span><li data-dcnode-id="1587"><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">using medical apps (other than question banks)</span></p><span data-dcnode-id="1588" instrument_node="">
</span></li><span data-dcnode-id="1586" instrument_node="">
</span></ul><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Demographic information was collected including age, gender, level of previous degree undertaken and future career aspirations.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1581" id="Sec11"><span data-dcnode-id="1582" instrument_node="">Statistical analysis</span></h3><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Survey scales employed ordinal measures of self-reported use of resources (Never = 1, Rarely = 2, Occasionally = 3, Sometimes = 4, Often = 5, Mostly = 6, Always = 7). A Wilcoxon Signed Ranked Test was employed to assess if a difference in preference for a particular resource was indicated between learning new content and revision. A Principal Components Analysis was undertaken to investigate whether clusters exist within students’ preference for resources.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1577" id="Sec12"><span data-dcnode-id="1578" instrument_node="">Ethics approval</span></h3><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">The University of Sydney Human Research Ethics Committee approved the study (Project No.: 2015/179).</span></p></div></div></section><section data-dcnode-id="1400" data-title="Results"><div class="c-article-section" data-dcnode-id="1401" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1570" id="Sec13"><span data-dcnode-id="1571" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="1402" id="Sec13-content"><h3 class="c-article__sub-heading" data-dcnode-id="1568" id="Sec14"><span data-dcnode-id="1569" instrument_node="">Demographics</span></h3><p data-dcnode-id="1554"><span data-dcnode-id="1567" instrument_node="">In total, 350/1083 (32%) of students completed the survey, with a mean respondent age of 25.6 (Range 18 to 30+ years). The gender distribution was even, with male (</span><i data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">n</span></i><span data-dcnode-id="1564" instrument_node="">&nbsp;= 173, 50%) and female (</span><i data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">n</span></i><span data-dcnode-id="1561" instrument_node="">&nbsp;= 174, 50%) students responding to the survey. Of the respondents, 46.3% of students were in their penultimate year (</span><i data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">n</span></i><span data-dcnode-id="1558" instrument_node="">&nbsp;= 162), 53.7% were in their final year (</span><i data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">n</span></i><span data-dcnode-id="1555" instrument_node="">&nbsp;= 188), 65.2% reported to have completed a previous degree while 34.7% were completing their first degree. Around 1% of respondents reported not owning a smart phone (Yes 98.9%, No 1.1%).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1552" id="Sec15"><span data-dcnode-id="1553" instrument_node="">General uptake of resources</span></h4><p data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">Students’ uptake of resources ranged between individuals reporting low use on most items to those reporting high use on most items. The uptake of resources was calculated by converting items of the Likert scale to 0–7 point, where 0 represented “never” and 7 represented “always”. The distribution of responses are summarized in Fig.&nbsp;</span><a data-dcnode-id="1549" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1550" instrument_node="">1</span></a><span data-dcnode-id="1548" instrument_node="">. Frequency was calculated from a conversion of the Likert scale to numerical values. The distribution of the frequency of self-reported resources uptake appears to be similar when learning new content and revising old materials.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1523" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="1524"><figcaption data-dcnode-id="1544"><b class="c-article-section__figure-caption" data-dcnode-id="1545" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="1546" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1535"><div class="c-article-section__figure-item" data-dcnode-id="1539"><a class="c-article-section__figure-link" data-dcnode-id="1540" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcmededuc.biomedcentral.com/articles/10.1186/s12909-019-1462-9/figures/1" rel="nofollow"><picture data-dcnode-id="1541"><source data-dcnode-id="1543" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs12909-019-1462-9/MediaObjects/12909_2019_1462_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="1542" height="446" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s12909-019-1462-9/MediaObjects/12909_2019_1462_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1536" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">The frequency with which students indicate the use of resources used when learning new materials or revising</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1525"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1526" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcmededuc.biomedcentral.com/articles/10.1186/s12909-019-1462-9/figures/1" rel="nofollow"><span data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1527" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1528" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1529" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1532" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="1518"><span data-dcnode-id="1522" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="1520" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1521" instrument_node="">2</span></a><span data-dcnode-id="1519" instrument_node=""> shows the distribution of terms used by students to indicate the rates of uptake of the common learning resources and tools, when learning new material.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1494" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="1495"><figcaption data-dcnode-id="1515"><b class="c-article-section__figure-caption" data-dcnode-id="1516" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="1517" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1506"><div class="c-article-section__figure-item" data-dcnode-id="1510"><a class="c-article-section__figure-link" data-dcnode-id="1511" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcmededuc.biomedcentral.com/articles/10.1186/s12909-019-1462-9/figures/2" rel="nofollow"><picture data-dcnode-id="1512"><source data-dcnode-id="1514" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs12909-019-1462-9/MediaObjects/12909_2019_1462_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="1513" height="325" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s12909-019-1462-9/MediaObjects/12909_2019_1462_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1507" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Distribution of terms used by students to indicate the rates of uptake of the common learning resources and tools, when learning new material</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1496"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="1497" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcmededuc.biomedcentral.com/articles/10.1186/s12909-019-1462-9/figures/2" rel="nofollow"><span data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1498" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1499" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1500" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1503" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1502" fill-rule="evenodd"></path><span data-dcnode-id="1501" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">The learning resources where high-use responses were the most common choice (Always or Mostly) included “Attending lectures in Person” (Mostly 24.5%, Always 21.4%), “Using downloaded online question banks” (Mostly 24%, Always 16.9%) and “Using medical apps” (Mostly 24.6%, Always 22.9%). The most common response did not include any of the low-use (Never or rarely) options. The most common rate of use for the remaining resources were: “watching lectures online” - sometimes (24%); “reading text books” – often (27.7%); consulting medical literature – sometimes (30.2%); watching online teaching videos – sometimes (25.4%); “using interactive online materials” sometimes (26%) and “attending group tutorials” often (22%).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1490" id="Sec16"><span data-dcnode-id="1491" instrument_node="">Resources used when revising old material</span></h3><p data-dcnode-id="1485"><span data-dcnode-id="1489" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="1487" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1488" instrument_node="">3</span></a><span data-dcnode-id="1486" instrument_node=""> shows the distribution of terms used by students to indicate the rates of uptake of the common resources and tools, when revising old material. The learning resources where high-use responses were the most common choice (Always or Mostly) included “Use of downloadable online question banks” (Mostly 22%, Always 29.4%), “using medical apps” (Mostly 18.3%, Always 5.1%) and “revising written notes” (Mostly 21.4%, Always 28%). The most common response for the low-use (Never or rarely) options was reported only for “attending lectures in person” (Never 18%, Rarely 19.4%). The most common rate of use for the remaining resources were: “watching lectures online” - sometimes (15.7%); “reading text books” – often (26.3%); consulting medical literature – sometimes (22.6%); watching online teaching videos – sometimes (23.4%); “using interactive online materials” sometimes (23%) and “attending group tutorials” sometimes (20.9%).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1461" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="1462"><figcaption data-dcnode-id="1482"><b class="c-article-section__figure-caption" data-dcnode-id="1483" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1484" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1473"><div class="c-article-section__figure-item" data-dcnode-id="1477"><a class="c-article-section__figure-link" data-dcnode-id="1478" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcmededuc.biomedcentral.com/articles/10.1186/s12909-019-1462-9/figures/3" rel="nofollow"><picture data-dcnode-id="1479"><source data-dcnode-id="1481" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs12909-019-1462-9/MediaObjects/12909_2019_1462_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1480" height="330" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s12909-019-1462-9/MediaObjects/12909_2019_1462_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1474" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Distribution of terms used by students to indicate the rates of uptake of the common resources and tools, when revising old material</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1463"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1464" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcmededuc.biomedcentral.com/articles/10.1186/s12909-019-1462-9/figures/3" rel="nofollow"><span data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1465" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1466" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1467" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1470" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1459" id="Sec17"><span data-dcnode-id="1460" instrument_node="">Change in preferred resource when learning new and when revising old material</span></h3><p data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">A Wilcoxon Signed rank test revealed a statistically significant difference between the frequencies with which students indicate using the following resources: (i) attending lectures;(ii) watching lectures online; (iii) consulting medical literature; (iv) watching online videos; (v) using online or downloaded question banks; (vi) using interactive online materials and (vii) attending small group tutorials. The effect size and direction of use preference is summarized in Table&nbsp;</span><a data-dcnode-id="1456" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1457" instrument_node="">1</span></a><span data-dcnode-id="1455" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1439" data-test="inline-table" id="table-1"><figure data-dcnode-id="1440"><figcaption class="c-article-table__figcaption" data-dcnode-id="1451"><b data-dcnode-id="1452" data-test="table-caption" id="Tab1"><span data-dcnode-id="1453" instrument_node="">Table 1 Wilcoxon Signed Rank Test, Comparison of the frequency of use of each educational resource, for either learning new skills and knowledge or revision</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1441"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1442" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcmededuc.biomedcentral.com/articles/10.1186/s12909-019-1462-9/tables/1" rel="nofollow"><span data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1443" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1444" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1445" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1448" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1447" fill-rule="evenodd"></path><span data-dcnode-id="1446" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1431"><span data-dcnode-id="1438" instrument_node="">As students use all resources for both revision and learning, a comparison of the frequency of use of each educational resource was undertaken, demonstrating that students attend lectures in person, watch lectures online, attend small group tutorials and consult medical literature significantly more frequently for the purpose of learning new material than they do for revision (see Table&nbsp;</span><a data-dcnode-id="1436" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1437" instrument_node="">2</span></a><span data-dcnode-id="1435" instrument_node="">). Students use question banks and other online interactive materials significantly more frequently for the purpose of revision than they do when learning new material (see Table </span><a data-dcnode-id="1433" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1434" instrument_node="">2</span></a><span data-dcnode-id="1432" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1416" data-test="inline-table" id="table-2"><figure data-dcnode-id="1417"><figcaption class="c-article-table__figcaption" data-dcnode-id="1428"><b data-dcnode-id="1429" data-test="table-caption" id="Tab2"><span data-dcnode-id="1430" instrument_node="">Table 2 Principal Components Analysis, Oblimin rotation method with Kaiser Normalization</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1418"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="1419" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcmededuc.biomedcentral.com/articles/10.1186/s12909-019-1462-9/tables/2" rel="nofollow"><span data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1420" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1421" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1422" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1425" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1424" fill-rule="evenodd"></path><span data-dcnode-id="1423" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1414" id="Sec18"><span data-dcnode-id="1415" instrument_node="">Clusters in preference for resource types</span></h3><p data-dcnode-id="1403"><span data-dcnode-id="1413" instrument_node="">A principal components analysis (PCA) was undertaken to assess whether particular preferences for resources showed clustering. Twenty six items were included in the analysis, suitability of the data was confirmed with Kaiser-Meyer-Olkin test (0.664) and Bartlett’s Test of Sphericity (</span><i data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">p</span></i><span data-dcnode-id="1410" instrument_node="">&nbsp;&lt; 0.001). PCA revealed the presence of four components with Eigen Values above the recommended cut off point of 1, however the inspection of the scree plot revealed only two of the factors to be above the clear break point (Catell, 1966). The two retained components account for 30.5% of the variance in the data; component 1 contributing to 17.9% and component 2 to 12.5% of the variance. Oblim rotation technique produced a solution with strong loading by most of the items loading to only one of the components and a correlation effect between the two components (r = 0.57). The clustering into the components indicate that age, gender, career aspirations and completion of a previous degree was not related to the preferred use of learning materials. As illustrated in Table </span><a data-dcnode-id="1408" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1409" instrument_node="">2</span></a><span data-dcnode-id="1407" instrument_node="">, PCA also revealed clustering occurred along the on-line and off-line differentiation of resources with component one containing online resources and component 2 containing off-line resource, please refer Table </span><a data-dcnode-id="1405" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1406" instrument_node="">2</span></a><span data-dcnode-id="1404" instrument_node=""> for detail.</span></p></div></div></section><section data-dcnode-id="1342" data-title="Discussion"><div class="c-article-section" data-dcnode-id="1343" id="Sec19-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1398" id="Sec19"><span data-dcnode-id="1399" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="1344" id="Sec19-content"><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">This study sought to explore today’s medical students’ use of educational resources for learning new materials and for revision. The majority of students reported using medical apps, question banks, online interactive resources and online lectures, as well as traditional learning resources. However, their preference for use was dependent upon whether students were seeking to revise or learn new information. Results indicate that the use of question banks is the most popular resource. However, traditional educational formats, including attendance at lectures and tutorials remain the most popular resource for learning new knowledge.</span></p><p data-dcnode-id="1382"><span data-dcnode-id="1395" instrument_node="">The results indicate that student reporting of the use of resources cluster around whether the resource is online or not. Our results indicate that students likely use online resources similarly, independent of whether it is for revision or leaning of new content. New media and mobile technology has fundamentally changed the way medical students learn new material and consolidate this knowledge. Mobile technology in medical education is now mainstream [</span><a aria-label="Reference 23" data-dcnode-id="1393" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d140816640e1467" title="Masters K, Ellaway RH, Topps D, Archibald D, Hogue RJ. Mobile technologies in medical education: AMEE guide no. 105 Med Teach. 2016:1–3."><span data-dcnode-id="1394" instrument_node="">23</span></a><span data-dcnode-id="1392" instrument_node="">]. This is almost certainly a reflection of the depths to which these new technologies have been incorporated in to our everyday social, emotional and professional lives. Masters et al. explain the uptake of mobile technologies in the context of “learner-centred” educational theory. Learners now engage teaching tools for the specific outcome of becoming a doctor rather than a more teacher-centred approach of previous generations [</span><a aria-label="Reference 23" data-dcnode-id="1390" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d140816640e1470" title="Masters K, Ellaway RH, Topps D, Archibald D, Hogue RJ. Mobile technologies in medical education: AMEE guide no. 105 Med Teach. 2016:1–3."><span data-dcnode-id="1391" instrument_node="">23</span></a><span data-dcnode-id="1389" instrument_node="">]. As a result, students are more self-directed and have greater independence in their learning. Patel et al., reported that resident medical officers perceive mobile learning as an efficient use of their time [</span><a aria-label="Reference 24" data-dcnode-id="1387" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d140816640e1473" title="Patel BK, Chapman CG, Luo N, Woodruff JN, Arora VM. Impact of mobile tablet computers on internal medicine resident efficiency. Arch Intern Med. 2012;172(5):436–8."><span data-dcnode-id="1388" instrument_node="">24</span></a><span data-dcnode-id="1386" instrument_node="">], a result which can likely be extrapolated to medical students. Online resources that can be accessed on multiple platforms are also convenient and provide instant access to information in any setting. For example, using mobile technology, students can look up reference material on a ward round or test their knowledge on the bus on the way home. This facilitates opportunistic learning, which may be of particular importance to those juggling work, family life and study commitments. Recent developments in education technology have seen increasingly more “serious games” being developed for teaching medicine, successfully employing the concept of fun in learning [</span><a aria-label="Reference 25" data-dcnode-id="1384" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d140816640e1476" title="Graafland M, Schraagen JM, Schijven MP. Systematic review of serious games for medical education and surgical skills training. Br J Surg. 2012;99(10):1322–30."><span data-dcnode-id="1385" instrument_node="">25</span></a><span data-dcnode-id="1383" instrument_node="">]. Online interactive and mobile learning tools may be popular as they are more engaging than traditional teaching tools, with cross-over entertainment appeal to the gaming generation. Online, interactive and mobile learning technologies are easily accessible and convenient for on-the-go, learner-centred medical students and their widespread use is likely to continue to grow.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1380" id="Sec20"><span data-dcnode-id="1381" instrument_node="">Question banks</span></h3><p data-dcnode-id="1369"><span data-dcnode-id="1379" instrument_node="">Our results indicate that question banks have emerged as the most popular revision tool and the most widely used overall e-learning resource. They are used most frequently for revision but also for learning new material. The only other published data on the topic of online questions banks identified a similarly high prevalence of use (82%), an almost universally positive attitude towards online question banks, and a high adoption of a student-developed and university-sponsored online question bank [</span><a aria-label="Reference 15" data-dcnode-id="1377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d140816640e1486" title="Harris BH, Walsh JL, Tayyaba S, Harris DA, Wilson DJ, Smith PEA. Novel student-led approach to multiple-choice question generation and online database creation, With Targeted Clinician Input. Teach Learn Med. 2015;27(2):182–8."><span data-dcnode-id="1378" instrument_node="">15</span></a><span data-dcnode-id="1376" instrument_node="">]. We hypothesise a number of factors contribute to their popularity, that could be incorporated into novel educational tools. The popularity of question banks for revision may be as a result of the ‘testing effect’. Repeat testing has been shown to improve retention of information as it engages the student in active learning and recall as well as providing a platform for feedback, which improves learning [</span><a aria-label="Reference 26" data-dcnode-id="1374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d140816640e1489" title="Augustin M. How to learn effectively in medical school: test yourself, learn actively, and repeat in intervals. Yale J Biol Med. 2014;87(2):207."><span data-dcnode-id="1375" instrument_node="">26</span></a><span data-dcnode-id="1373" instrument_node="">, </span><a aria-label="Reference 27" data-dcnode-id="1371" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d140816640e1492" title="Larsen DP, Butler AC, Roediger HL III. Test-enhanced learning in medical education. Med Educ. 2008;42(10):959–66."><span data-dcnode-id="1372" instrument_node="">27</span></a><span data-dcnode-id="1370" instrument_node="">]. The immediate feedback also allows students to identify knowledge gaps. Many questions banks also provide high-quality, referenced content explaining why a particular answer is right or wrong. The commercially available question banks provide a score for each section of questions answered, compared with the learner’s previous attempts and with the average scores of their colleagues. This makes answering the questions more like a game with a top score that needs to be beaten. The exposure to high volumes of single best answer questions also allows students to practice exam technique.</span></p><p data-dcnode-id="1364"><span data-dcnode-id="1368" instrument_node="">The widespread use of question banks by medical students raises two main questions: are they effective and if so, are they available to all students? The majority of question banks are made available on a subscription basis. They have presumably been designed to match students’ perceived needs and to maximise commercial viability. Commercially available question banks have not been thoroughly evaluated in terms of efficacy or quality, and may not align with university curricula or current best practice. Their widespread use suggests that universities should consider formally evaluating popular question banks or develop their own curriculum-focused banks. The possibility of contracting private sector providers with this task is also available. Harris et al. have published their experience developing a framework for a student-authored, clinician reviewed question bank [</span><a aria-label="Reference 15" data-dcnode-id="1366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d140816640e1498" title="Harris BH, Walsh JL, Tayyaba S, Harris DA, Wilson DJ, Smith PEA. Novel student-led approach to multiple-choice question generation and online database creation, With Targeted Clinician Input. Teach Learn Med. 2015;27(2):182–8."><span data-dcnode-id="1367" instrument_node="">15</span></a><span data-dcnode-id="1365" instrument_node="">]. They achieved a high degree of participation and utilisation in a population of students with a high pre-intervention prevalence of question bank use. With a shift towards commercial resources universities need to take seriously the task of ensuring equitable access to the highest quality and most relevant resources across age, gender, and discipline.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1362" id="Sec21"><span data-dcnode-id="1363" instrument_node="">Lecture attendance</span></h3><p data-dcnode-id="1357"><span data-dcnode-id="1361" instrument_node="">Traditional resources such as attending lectures in person, making written notes and reading textbooks remain, the most utilized resources for learning new material. Although attending lectures or watching them online were identified as the least utilised resource for revision, medical schools should continue to focus on delivering high quality lectures for the purpose of students learning new material. While our results did not identify gender as a determinant of online or off-line resources, others have reported a gender bias in student preference for learning styles. Mehmood et al. studied the personality traits and gender of medical students and found that men were significantly more ‘impulsive sensation seeking’, [</span><a aria-label="Reference 28" data-dcnode-id="1359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d140816640e1509" title="Mehmood SI, Khan MA, Walsh KM, Borleffs JC. Personality types and specialist choices in medical students. Med Teach. 2013;35(1):63–8."><span data-dcnode-id="1360" instrument_node="">28</span></a><span data-dcnode-id="1358" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1355" id="Sec22"><span data-dcnode-id="1356" instrument_node="">Student age and career aspirations</span></h3><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Students' self-reported age clustered with responses describing the use of off-line resources. This finding may be confounded by the inclusion of a combination of undergraduate and graduate entry medical programs in our study. Unfortunately, our ethics committee approval for this study did not allow for direct comparison between participating medical schools. Students aspiring to a career in ‘general practice’ or ‘other’ were also less likely to attend small group tutorials, which may be a reflection of age, as they tended to be older than their peers.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1351" id="Sec23"><span data-dcnode-id="1352" instrument_node="">Limitations</span></h4><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">The response rate for the study was 32%. It is possible that students who respond to an online survey are more likely to use online learning materials than those who do not. However, both medical schools use online learning management systems and online assignment submission, so it is likely that most students are comfortable with using online platforms.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Inclusion of participants from two different universities potentially weakens this study, as the lecture programs, online resources and assessments will differ between universities which may influence the learning resource preferences of students. Furthermore, the ethics committee approval for this study did not allow for direct comparison between universities and we were therefore not able to draw comparisons between the graduate entry program at the University of Sydney and the undergraduate program at the University of New South Wales.</span></p><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">This was a quantitative study, and use of qualitative data collection and analysis may have provided a deeper understanding of students’ responses.</span></p></div></div></section><section data-dcnode-id="1335" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1336" id="Sec24-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1340" id="Sec24"><span data-dcnode-id="1341" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1337" id="Sec24-content"><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">This study sought to gain a better understanding of medical students’ preferences for use of existing resources when learning new material, and undertaking revision. Question banks have emerged as a popular learning and revision resource, which are as yet unevaluated by educational institutions. Factor analysis revealed that students describe the use of online resources and the uptake of off-line learning tools in two separate clusters, indicating that the online/offline nature of the material plays an important role in determining their preference for use in both revision and the learning of new materials. An increased understanding of students’ preferences may assist medical educators in design and implementation of medical curricula that is aligned with student needs.</span></p></div></div></section><span data-dcnode-id="1334" instrument_node="">
