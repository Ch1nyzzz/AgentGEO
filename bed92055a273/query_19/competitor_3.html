</span><div class="entry-meta" data-dcnode-id="1548"><span class="screen-reader-text" data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Posted on</span></span><span data-dcnode-id="1554" instrument_node=""> </span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/the-original-founders-of-america/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1552" datetime="2019-10-14T20:41:07+00:00"><span data-dcnode-id="1553" instrument_node="">October 14, 2019</span></time><time class="updated" data-dcnode-id="1550" datetime="2020-03-26T17:34:36+00:00"><span data-dcnode-id="1551" instrument_node="">March 26, 2020</span></time></a></div><h3 class="entry-title" data-dcnode-id="1544"><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/the-original-founders-of-america/" rel="bookmark"><span data-dcnode-id="1546" instrument_node="">The Original Founders of America</span></a></h3><span data-dcnode-id="1543" instrument_node=""> </span></header><span data-dcnode-id="1540" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1320"><span data-dcnode-id="1539" instrument_node="">
</span><div class="at-above-post-homepage addthis_tool" data-dcnode-id="1538" data-url="https://blog.bookrags.com/news/the-original-founders-of-america/"></div><span data-dcnode-id="1537" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1535"><img alt="" class="wp-image-227" data-dcnode-id="1536" height="481" loading="lazy" sizes="(max-width: 638px) 100vw, 638px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Mayan-Pyramid-BookRags.jpg&amp;raw" srcset="https://blog.bookrags.com/wp-content/uploads/2019/10/Mayan-Pyramid-BookRags.jpg 600w, https://blog.bookrags.com/wp-content/uploads/2019/10/Mayan-Pyramid-BookRags-300x227.jpg 300w" width="638"></figure><span data-dcnode-id="1534" instrument_node="">
</span><h3 data-dcnode-id="1529"><span data-dcnode-id="1533" instrument_node="">Have you ever wondered who the earliest people were to discover America and where they originated from? Because </span><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-a-peoples-history-of-the-united-states/chapanal001.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1532" instrument_node="">Christopher Columbus</span></a><span data-dcnode-id="1530" instrument_node=""> arrived on the Caribbean Islands in the fifteenth century, many history books focus on him as the first European founder. However, recent archaeological evidence reveals other stories seldom told. </span></h3><span data-dcnode-id="1528" instrument_node="">
</span><h3 data-dcnode-id="1523"><span data-dcnode-id="1527" instrument_node="">In fact, the first explorers to inhabit North and South America were from Asia, not Europe.  </span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-1491-new-revelations-of-the-americas-before-columbus/chapanal005.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1526" instrument_node="">Scientific tests</span></a><span data-dcnode-id="1524" instrument_node=""> show that Asians and Native Americans share a large percentage of the same mitochondrial DNA. Therefore, most anthropologists believe that ancient people migrated from Asia and settled in the Americas thousands of years ago; these are the ancestors of today’s indigenous people. These first pioneers likely crossed over the frozen Bering Land Bridge—which connected modern-day Siberia to Alaska—during the last Ice Age. </span></h3><span data-dcnode-id="1522" instrument_node="">
</span><h3 data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">As the Paleoamericans journeyed south throughout these vast continents, they adapted their survival skills and then opened up communication channels and established trade routes. Their innovative hunting and agricultural practices enabled a multitude of new societies to form and prosper. Advancements in science and architecture followed.   </span></h3><span data-dcnode-id="1519" instrument_node="">
</span><h3 data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Here are just a few of these indigenous cultures and their significant accomplishments—long before the arrival of Europeans to the “New World” who would eventually change their way of life forever.</span></h3><span data-dcnode-id="1516" instrument_node="">
</span><h3 data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">The Inuvialuit</span></h3><span data-dcnode-id="1513" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1511"><img alt="Inuvialuit" class="wp-image-228" data-dcnode-id="1512" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Inuit-Family-BookRags.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1509" instrument_node="">The </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-native-roots/chapanal002.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1508" instrument_node="">Inuvialuit</span></a><span data-dcnode-id="1506" instrument_node="">  are the Inuit indigenous people of Western Canada, who currently live in the Arctic region. They are the descendants of the Thule culture who migrated eastward from the Bering Strait around 200 B.C.—then eventually settled in Alaska, Northern Canada, and as far away as  </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-collapse/chapanal006.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1505" instrument_node="">Greenland</span></a><span data-dcnode-id="1503" instrument_node=""> by the thirteenth century. Archaeologists have found specialized tools for harvesting whales and other artifacts at early Inuvialuit villages near the Mackenzie River. The modern-day Inuvialuit still practice the same </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-native-roots/chapanal002.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1502" instrument_node="">hunting and fishing techniques</span></a><span data-dcnode-id="1500" instrument_node=""> as their ancestors. They are considered the world’s best fishermen and big game hunters, and remain closely connected to animal migrations in one of the world’s most extreme environments.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><h3 data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">The People of Cahokia</span></h3><span data-dcnode-id="1495" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1493"><img alt="" class="wp-image-229" data-dcnode-id="1494" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Cahokia-Mounds-BookRags.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1491" instrument_node="">The great Native American city of  </span><a aria-label="Cahokia (opens in a new tab)" data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-native-roots/chapanal001.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1490" instrument_node="">Cahokia</span></a><span data-dcnode-id="1488" instrument_node="">  is considered one of the most advanced civilizations ever discovered in the United States. The founders—who were accomplished hunters, farmers, and builders—settled Cahokia close to the modern-day city of St. Louis. Like most Native Americans, they were  </span><a aria-label="expert hunters (opens in a new tab)" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-native-roots/chapanal002.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1487" instrument_node="">expert hunters</span></a><span data-dcnode-id="1485" instrument_node=""> who employed sophisticated techniques such as wearing camouflage, setting traps, and utilizing bird calls to capture prey. They started growing beans, corn, and squash near the shores of the Mississippi River around the eighth century. They constructed elaborate pyramids that are still standing today. These mound builders created approximately 120 large pyramids—surrounded by fortified plazas—which housed temples, mortuaries, workshops, and elaborate works of art. At its height, the city supported 20,000 people. Eventually, the Cahokia ceremonial center was slowly abandoned in the fourteenth century. Most likely, the people of Cahokia exhausted a variety of natural resources and were no longer able to sustain their large population.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><h3 data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">The Pueblos</span></h3><span data-dcnode-id="1480" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1478"><img alt="" class="wp-image-230" data-dcnode-id="1479" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Anasazi-Mesa-Verdi-BookRags.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1476" instrument_node="">The Puebloan culture began to thrive at the Four Corners region of the United States around 1,500 B.C. At Mesa Verde, in southwest Colorado, they built elaborate structures carved from stone as early as the seventh century. There are hundreds of cliff dwellings containing long houses, storage units, and family spaces. The Pueblo farmed squash, beans, and corn using reservoirs and irrigation systems in a fragile environment that was susceptible to soil erosion and low rainfall. The Pueblo people of this region also raised turkeys and hunted rabbits to subsist. The </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-collapse/chapanal004.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1475" instrument_node="">Mesa Verdeans</span></a><span data-dcnode-id="1473" instrument_node=""> abandoned their homes around the thirteenth century most likely due to drought, then assimilated into other Native American cultures which included the </span><a aria-label="Zuni and Hopi (opens in a new tab)" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-collapse/chapanal004.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1472" instrument_node="">Zuni and Hopi</span></a><span data-dcnode-id="1470" instrument_node=""> tribes. The Puebloan settlements still exist as a reminder of their advanced culture. Eventually, the Navajo tribe migrated into the Four Corners region around the fifteenth century and remain in the southwest today.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><h3 data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">The Aztecs</span></h3><span data-dcnode-id="1465" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1463"><img alt="" class="wp-image-231" data-dcnode-id="1464" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Aztec-Calendar-BookRags.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1455"><a aria-label="The Aztecs (opens in a new tab)" data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-broken-spears-2007-revised-edition/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1461" instrument_node="">The Aztecs</span></a><span data-dcnode-id="1459" instrument_node=""> were an advanced civilization who ruled several ethnic groups in central Mexico, between the fourteenth and sixteenth centuries.  These Nahuatl-speaking peoples were well educated and at its pinnacle the civilization was over one million strong. They constructed vast architectural complexes with plazas, pyramids, temples, markets, and irrigation canals. This Mesoamerican culture developed a complex writing system conveyed in artwork, such as calendars, which guided their cyclical rituals and government-controlled agriculture. To further consolidate power, the Aztecs conquered additional tribes and </span><a aria-label="sacrificed prisoners of war (opens in a new tab)" data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-broken-spears-2007-revised-edition/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1458" instrument_node="">sacrificed prisoners of war</span></a><span data-dcnode-id="1456" instrument_node=""> to their god Huitzilopochtli. </span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1453" instrument_node="">The Aztecs continued their economic and territorial expansion until </span><a aria-label="the Spaniards (opens in a new tab)" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-a-peoples-history-of-the-united-states/chapanal001.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1452" instrument_node="">the Spaniards</span></a><span data-dcnode-id="1450" instrument_node=""> arrived, in 1519. The natives’ weapons were no match for the Europeans’ steel arms. Eventually, the Aztec ruler Motecuhzoma surrendered to the Conquistadors after he gifted them a substantial amount of </span><a aria-label="gold treasure (opens in a new tab)" data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-broken-spears-2007-revised-edition/chapanal002.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1449" instrument_node="">gold treasure</span></a><span data-dcnode-id="1447" instrument_node=""> to go away. However, the tribute only encouraged the foreign invaders to continue their expedition. The king was imprisoned in the capital city of Tenochtitlán where he died soon after. By 1521, the conquest of the Aztecs and their great cities was nearly complete.  Tenochtitlán was then rebuilt as Mexico City under Spanish rule.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><h3 data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">The Maya</span></h3><span data-dcnode-id="1442" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1440"><img alt="Chichen Itza spring equinox" class="wp-image-237" data-dcnode-id="1441" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Mayan-Chichen-Itza-BookRags2-1.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1438" instrument_node="">As early as 2,000 B.C. the </span><a aria-label="Maya civilization (opens in a new tab)" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-1491-new-revelations-of-the-americas-before-columbus/chapanal008.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1437" instrument_node="">Maya civilization</span></a><span data-dcnode-id="1435" instrument_node=""> started to form permanent villages. Their complex society relied on agriculture, trade, and science. Through the ages they evolved into a highly sophisticated society, which at its peak spanned from southeastern Mexico to Central America. The Maya were accomplished artists, engineers, and astronomers who created great cities that served as religious and cultural centers throughout the region. Many of the Maya sites aligned with the astronomical constellations. This Mesoamerican culture is best known for its massive </span><a aria-label="pyramids (opens in a new tab)" data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/research/the-impact-of-mayan-architecture-scit-011234/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1434" instrument_node="">pyramids</span></a><span data-dcnode-id="1432" instrument_node=""> which functioned as observatories, religious edifices, royal tombs, and </span><a aria-label="calendars (opens in a new tab)" data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-chariots-of-the-gods/chapanal008.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1431" instrument_node="">calendars</span></a><span data-dcnode-id="1429" instrument_node="">. </span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1426" instrument_node="">At Chichén Itzá, in the Yucatán Peninsula, the 91 steps on each of the four sides of the pyramid are thought to represent the days of the four seasons. All sides total 364 steps, with the top platform representing the 365th step to complete the giant calendar. The steps are so accurately positioned that the shadow of what appears to be a serpent aligns with a stone sculpture exhibiting a reptile’s face at its base. This shadow snake rises from the ground then slithers back into the Earth during the spring and fall equinoxes. Despite the Maya’s superior abilities to master the Earth and sky, their culture started to </span><a aria-label="collapse (opens in a new tab)" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-collapse/chapanal005.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1425" instrument_node="">collapse</span></a><span data-dcnode-id="1423" instrument_node=""> by the tenth century. Over the next several centuries they</span><a aria-label=" abandoned their cities (opens in a new tab)" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-1491-new-revelations-of-the-americas-before-columbus/chapanal008.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1422" instrument_node=""> abandoned their cities</span></a><span data-dcnode-id="1420" instrument_node=""> due to overpopulation, drought, and depletion of natural resources. </span></p><span data-dcnode-id="1418" instrument_node="">
</span><h3 data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">The Incas</span></h3><span data-dcnode-id="1415" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1413"><img alt="" class="wp-image-233" data-dcnode-id="1414" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Machu-Picchu-BookRags.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1411" instrument_node="">The </span><a aria-label="Inca Empire (opens in a new tab)" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-1491-new-revelations-of-the-americas-before-columbus/chapanal003.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1410" instrument_node="">Inca Empire</span></a><span data-dcnode-id="1408" instrument_node=""> inhabited a large swathe of the South American west coast between the fifteenth and sixteenth centuries. The Incas were the largest civilization in that region during this time. They operated a highly organized central government that relocated diverse groups of people in order to unite the empire. The Incas were highly adaptable to the extreme elevations and landscapes of the Andean Mountain range and deserts. They established a vast trading network throughout these regions where they grew potatoes, corn, legumes, and grains on steep inclines. </span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1405" instrument_node="">Machu Picchu was an important agricultural center located on a 7,970-foot mountain ridge in Peru. It is where the Incas expertly engineered elaborate buildings, stone walls, and terraces. The Incas were able to successfully grow crops in the rugged terrain by optimizing their environment to avoid the threats of soil erosion, poor drainage, and landslides. Abandoned in the sixteenth century, after the Incas were defeated by </span><a aria-label="European diseases (opens in a new tab)" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-1491-new-revelations-of-the-americas-before-columbus/chapanal003.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1404" instrument_node="">European diseases</span></a><span data-dcnode-id="1402" instrument_node=""> and superior weaponry, it still stands as a testament to their exceptional civic and agricultural capabilities. </span></p><span data-dcnode-id="1400" instrument_node="">
</span><h3 data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">The Vikings</span></h3><span data-dcnode-id="1397" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1395"><img alt="" class="wp-image-234" data-dcnode-id="1396" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Lanse-aux-meadows-BookRags.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1393" instrument_node="">The Norse explorer </span><a aria-label="Leif Erikson (opens in a new tab)" data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/chapanal002.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1392" instrument_node="">Leif Erikson</span></a><span data-dcnode-id="1390" instrument_node=""> sailed to Canada from </span><a aria-label="Greenland (opens in a new tab)" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-collapse/chapanal008.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1389" instrument_node="">Greenland</span></a><span data-dcnode-id="1387" instrument_node=""> five centuries before Columbus arrived in America. His seafaring father, </span><a aria-label="Erik the Red (opens in a new tab)" data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/chapanal001.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1386" instrument_node="">Erik the Red</span></a><span data-dcnode-id="1384" instrument_node="">, previously founded an original Norse settlement in Greenland where Leif spent most of his youth. With the same pioneering spirit as his father, Leif embarked on a voyage to discover new lands in the late tenth century. His adventurous curiosity led him to become the first known European to make landfall and erect temporary shelters west of Greenland, on the mainland of North America. The land he discovered in northeastern Canada was referred to as “Vinland” by the Vikings because of the wild grapes they found there. </span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1381" instrument_node="">According to </span><a aria-label="The Vineland Sagas (opens in a new tab)" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1380" instrument_node="">The Vineland Sagas</span></a><span data-dcnode-id="1378" instrument_node="">, </span><a aria-label="Thorfinn Karlsefni (opens in a new tab)" data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/chapanal004.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1377" instrument_node="">Thorfinn Karlsefni</span></a><span data-dcnode-id="1375" instrument_node=""> was inspired by Leif’s tales of new lands. With his permission,  </span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/chapanal004.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1374" instrument_node="">Thorfinn</span></a><span data-dcnode-id="1372" instrument_node=""> repurposed those same shelters Leif had established years earlier to build the </span><a aria-label="first European settlement in America (opens in a new tab)" data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/research/thorfinn-karlsefni-thordarson-scit-021/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1371" instrument_node="">first European settlement in America</span></a><span data-dcnode-id="1369" instrument_node="">.  </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/chapanal004.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1368" instrument_node="">Thorfinn</span></a><span data-dcnode-id="1366" instrument_node=""> constructed the small encampment made of timber and sod, which anthropologists strongly suggest might be the Norse settlement identified as L’Anse aux Meadows, at the tip of Newfoundland. The Viking settlers huddled into their completed longhouse for the winter, then had a violent encounter with indigenous people by spring. The Norse referred to them as </span><a aria-label="Skrælingjar (opens in a new tab)" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/chapanal004.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1365" instrument_node="">Skrælingjar</span></a><span data-dcnode-id="1363" instrument_node="">, who were most likely native Algonquian-speaking people. After skirmishes with them over trade negotiations gone wrong, the Viking settlers were attacked and driven out. Isolated and without reinforcements, the Norse abandoned their North American settlement then returned to Greenland.  </span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/chapanal004.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1362" instrument_node="">Thorfinn</span></a><span data-dcnode-id="1360" instrument_node=""> eventually moved back to his homeland of </span><a aria-label="Iceland (opens in a new tab)" data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-vinland-sagas/chapanal010.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1359" instrument_node="">Iceland</span></a><span data-dcnode-id="1357" instrument_node="">.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><h3 data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Christopher Columbus </span></h3><span data-dcnode-id="1352" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1350"><img alt="" class="wp-image-235" data-dcnode-id="1351" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/10/Columbus-and-Arawak-IndiansBookRags.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1342"><a aria-label="Christopher Columbus (opens in a new tab)" data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-four-voyages-to-the-new-world-lette/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1348" instrument_node="">Christopher Columbus</span></a><span data-dcnode-id="1346" instrument_node=""> made four voyages to the New World from Spain, between 1492 and 1502. While he explored the Caribbean Islands extensively—and portions of Central and South America—he never ventured further afield to the U.S. mainland. Initially, Columbus believed he had found Asia, hence why he called the indigenous people he discovered “Indians.” </span><a aria-label="Columbus’ second trip to the New World (opens in a new tab)" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-four-voyages-to-the-new-world-lette/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1345" instrument_node="">Columbus’ second trip to the New World</span></a><span data-dcnode-id="1343" instrument_node=""> was more dangerous. Some of his men were killed and by his third voyage they had mutinied against him. This led to a formal inquiry by the monarchy that sent him back to Spain in chains. Columbus was freed eventually to make his fourth and final trip back to the New World. He died after his return to Europe, in 1506.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1340" instrument_node="">Long before Columbus sailed to America, the </span><a aria-label="Arawaks (opens in a new tab)" data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-a-peoples-history-of-the-united-states/chapanal001.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1339" instrument_node="">Arawaks</span></a><span data-dcnode-id="1337" instrument_node=""> were well established throughout South America and the Caribbean. This culture was among the first the mariner encountered after he landed in the Bahamas on October 12. Columbus’ ambitious pursuit of gold, spices, and other natural resources emboldened him to take advantage of the Arawak people, who he noted were gentle and bright, but ignorant in nature. He forcefully enslaved 500, but only 300 survived the trip to Spain. </span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">On subsequent voyages back to the New World, Columbus and his men plundered their way through previously unexplored islands. When some of the Arawak tried to defend themselves, the Spaniards overwhelmed them, burning some and hanging others. Those who remained took their own lives rather than be enslaved. As more Europeans immigrated over the next several centuries, this same model of conquest played out time and again. The indigenous people who were not enslaved by the Europeans, or ravaged by their diseases, were permanently displaced throughout most of the Americas.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Indigenous Peoples’ Day is a celebration of their rich culture and legacy.  Agricultural, hunting, warfare, and survival techniques have been passed on for generations. Today’s citizens are the beneficiaries of their diverse cultural heritage, including the cultivation of these exotic New World crops which all originated from America: corn, sunflowers, avocados, blueberries, cranberries, papayas, peppers, pineapples, tomatoes, pumpkins, beans, chestnuts, black walnuts, cashews, pecans, peanuts, potatoes, cotton, maple syrup, tobacco, chocolate, and vanilla.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><div class="at-below-post-homepage addthis_tool" data-dcnode-id="1323" data-url="https://blog.bookrags.com/news/the-original-founders-of-america/"></div><span data-dcnode-id="1321" instrument_node=""> </span></div><span data-dcnode-id="1318" instrument_node="">
</span></article><span data-dcnode-id="1315" instrument_node="">
</span><article class="post-212 post type-post status-publish format-standard hentry category-news tag-a-separate-peace tag-angie-thomas tag-becky-albertalli tag-bunny tag-donna-tartt tag-educated tag-jerry-spinelli tag-john-knowles tag-karen-m-mcmanus tag-mona-awad tag-one-of-us-is-lying tag-simon-vs-the-homo-sapiens-agenda tag-stargirl tag-tara-westover tag-the-hate-u-give tag-the-secret-history" data-dcnode-id="1163" id="post-212"><span data-dcnode-id="1314" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1298"><span data-dcnode-id="1313" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1304"><span class="screen-reader-text" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Posted on</span></span><span data-dcnode-id="1310" instrument_node=""> </span><a data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/the-drama-of-back-to-school/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1308" datetime="2019-09-19T17:10:05+00:00"><span data-dcnode-id="1309" instrument_node="">September 19, 2019</span></time><time class="updated" data-dcnode-id="1306" datetime="2021-02-25T23:32:06+00:00"><span data-dcnode-id="1307" instrument_node="">February 25, 2021</span></time></a></div><h3 class="entry-title" data-dcnode-id="1300"><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/the-drama-of-back-to-school/" rel="bookmark"><span data-dcnode-id="1302" instrument_node="">The Drama of Back-to-School</span></a></h3><span data-dcnode-id="1299" instrument_node=""> </span></header><span data-dcnode-id="1296" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1166"><span data-dcnode-id="1295" instrument_node="">
</span><div class="at-above-post-homepage addthis_tool" data-dcnode-id="1294" data-url="https://blog.bookrags.com/news/the-drama-of-back-to-school/"></div><span data-dcnode-id="1293" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1290"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-educated-a-memoir/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="Educated" class="wp-image-213" data-dcnode-id="1292" height="364" loading="lazy" sizes="(max-width: 627px) 100vw, 627px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/back-to-school-header-Book-Rags-Blog.jpg&amp;raw" srcset="https://blog.bookrags.com/wp-content/uploads/2019/09/back-to-school-header-Book-Rags-Blog.jpg 600w, https://blog.bookrags.com/wp-content/uploads/2019/09/back-to-school-header-Book-Rags-Blog-300x174.jpg 300w" width="627"></a></figure><span data-dcnode-id="1289" instrument_node="">
</span><h3 data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">The leaves are turning and the crisp air announces the arrival of fall. Wherever you are, the start of school brings new experiences. On high school and college campuses, students are assessing their coursework, breaking open  new books, and making friends. The novels and memoirs below feature the ups and downs of campus life. From the pressures of academics to the excitement of new relationships, they present the challenges we all face navigating the social life of school. </span></h3><span data-dcnode-id="1286" instrument_node="">
</span><h3 data-dcnode-id="1283"><em data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Educated </span></em></h3><span data-dcnode-id="1282" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1279"><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-educated-a-memoir/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="Educated" class="wp-image-216" data-dcnode-id="1281" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/educated-Book-Rags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1273"><em data-dcnode-id="1275"><a aria-label=" (opens in a new tab)" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-educated-a-memoir/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1277" instrument_node="">Educated</span></a></em><span data-dcnode-id="1274" instrument_node="">  is Tara Westover’s inspiring memoir that shares her struggles to break free from unhealthy familial bonds in pursuit of her full potential. Bright, but uneducated, Tara is determined to learn more about the world despite her survivalist parents’ choice to live in relative isolation from society, in the mountains of Idaho. Their distrust of the government instills fear and distrust in Tara and her siblings, and prevents them from attending school. Throughout her childhood, the family struggles to survive in the face of limited job opportunities. However, after suffering severe emotional and physical abuse from an older brother, Tara gains the strength to forge her own path in the pursuit of knowledge. She finds the courage to strike out on her own and manages to attend college despite unsupportive parents—eventually attending Harvard and Cambridge Universities, earning both bachelor’s and doctoral degrees.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><h3 data-dcnode-id="1269"><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">The Hate U Give</span></em></h3><span data-dcnode-id="1268" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1265"><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-hate-u-give/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="Thee Hate U Give" class="wp-image-215" data-dcnode-id="1267" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/the-hate-u-give-Book-Rags-Blog-1.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1259"><em data-dcnode-id="1261"><a aria-label=" (opens in a new tab)" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-hate-u-give/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1263" instrument_node="">The Hate U Give</span></a></em><span data-dcnode-id="1260" instrument_node="">, by Angie Thomas, tells the story of sixteen-year-old Starr Carter who witnesses the shooting of a childhood friend, Khalil Harris, by a police officer.  Starr lives in an impoverished inner-city neighborhood but attends a privileged prep school where most students don’t understand the dangers of growing up black in America. It doesn’t take long for the shooting to make national headlines and for protesters to erupt in her community demanding justice. The publicity threatens to plunge Star into an unwanted spotlight. As she navigates between her neighborhood and school, she must decide whether to risk the safety of her family and future by speaking up against the murder of her friend or remain silent about the brutal killing.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><h3 data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">A Separate Peace </span></h3><span data-dcnode-id="1255" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1252"><a data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-separatepeace/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="A Separate Peace" class="wp-image-217" data-dcnode-id="1254" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/a-separate-peace-Book-Rags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1246"><em data-dcnode-id="1248"><a aria-label=" (opens in a new tab)" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-separatepeace/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1250" instrument_node="">A Separate Peace</span></a></em><span data-dcnode-id="1247" instrument_node="">, by John Knowles, is a coming-of-age story about the tumultuous relationship between best friends, Gene Forrester and Phineas. Set at an exclusive prep school in New Hampshire during the early 1940s and World War II, the roommates, who have opposite personalities, become unlikely friends. Although the war is not being fought in their country, the boys feel its threat since they are close to the age of enlistment. Overtime, Gene feels increasingly threatened by Phineas’ athleticism. Eventually, the boys’ close bond devolves into a destructive rivalry that drives Gene to commit a brutal act of betrayal against Phineas. Both boys are forced to confront their motivations, fears, and the grim consequences of Gene’s selfish actions which change their lives forever. </span></p><span data-dcnode-id="1245" instrument_node="">
</span><h3 data-dcnode-id="1242"><em data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Stargirl</span></em></h3><span data-dcnode-id="1241" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1238"><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-stargirl/chapanal024.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-218" data-dcnode-id="1240" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/stargirl-Book-Rags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1232"><em data-dcnode-id="1234"><a aria-label=" (opens in a new tab)" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-stargirl/chapanal024.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1236" instrument_node="">Stargirl</span></a></em><span data-dcnode-id="1233" instrument_node="">, by Jerry Spinelli, is a novel about an odd high-school student who calls herself “Stargirl.” At first, she is embraced by other classmates despite her unusual behavior of carrying a pet rat and breaking out in celebratory song and dance. Stargirl’s enchanting presence entertains and inspires other students, including Leo Borlock, who begins to fall in love with her. However, after she commits a series of selfless, but misunderstood acts of kindness, her new-found popularity begins to diminish. Leo encourages Stargirl to act more “normal” so they can continue their relationship. When she complies, she still can’t shed the negative label of being different; the dramatic change threatens to destroy her magical persona. Stargirl and Leo are forced to question the value of abandoning uniqueness for the sake of conformity.</span></p><span data-dcnode-id="1231" instrument_node="">
</span><h3 data-dcnode-id="1228"><em data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Simon vs. the Homo Sapiens Agenda</span></em></h3><span data-dcnode-id="1227" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1224"><a data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-simon-vs-the-homo-sapiens-agenda/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="Simon vs. the Homo Sapiens Agenda" class="wp-image-219" data-dcnode-id="1226" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/Simon-vs-the-Homo-Sapiens-Agenda-books-Book-Rags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1218"><em data-dcnode-id="1220"><a aria-label=" (opens in a new tab)" data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-simon-vs-the-homo-sapiens-agenda/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1222" instrument_node="">Simon vs. the Homo Sapiens Agenda</span></a></em><span data-dcnode-id="1219" instrument_node="">, by Becky Albertalli, is a novel about a gay sixteen-year-old, Simon Spier, who struggles with keeping his sexual identity a secret. He is excited to cultivate a hidden relationship by email with an unknown admirer named “Blue,” until his classmate Martin threatens to “out” him after inadvertently seeing their heart-felt correspondence. Meanwhile, Simon’s involvement in the school musical and interactions with other students keeps him guessing who “Blue” might be. Eventually, as social pressures to disclose his secret mounts, Simon is forced to confront his worst fears and find the courage to reveal who he truly is to classmates, friends, and family.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><h3 data-dcnode-id="1214"><em data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">One of Us is Lying</span></em></h3><span data-dcnode-id="1213" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1210"><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-one-of-us-is-lying" rel="noreferrer noopener" target="_blank"><img alt="One of Us is Lying" class="wp-image-220" data-dcnode-id="1212" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/one-of-us-is-lying-books-Book-Rags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1204"><em data-dcnode-id="1206"><a aria-label=" (opens in a new tab)" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-one-of-us-is-lying" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1208" instrument_node="">One of Us is Lying</span></a></em><span data-dcnode-id="1205" instrument_node="">, by Karen M. McManus, is no ordinary depiction of high school drama. It’s an unsettling murder mystery that keeps the reader guessing. As rumors swirl around four classmates in different cliques, one student outcast, Simon Kelleger, is determined to destroy their reputation through a scandalous gossip app he created called About That. When Simon dies suddenly while serving in detention with Addy, Bronwyn, Nate, and Cooper, all four students become prime suspects. An investigation into the app by police reveals unpublished exposés of each, which leads the authorities to surmise one of them could have committed an act of murderous revenge. As the four classmates conduct their own investigation into the mysterious circumstances surrounding Simon’s death, they soon learn to question the unfounded assumptions they hold about each other.  </span></p><span data-dcnode-id="1203" instrument_node="">
</span><h3 data-dcnode-id="1200"><em data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">The Secret History</span></em></h3><span data-dcnode-id="1199" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1196"><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-secret-history/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="The Secret History" class="wp-image-221" data-dcnode-id="1198" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/the-secret-history-Book-Rags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1190"><em data-dcnode-id="1192"><a aria-label=" (opens in a new tab)" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-secret-history/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1194" instrument_node="">The Secret History</span></a></em><span data-dcnode-id="1191" instrument_node="">, by Donna Tartt, is a novel following six privileged but disturbed students who attend an exclusive college. Each has their own demons to grapple with as they descend into a spiral of debauchery that eventually leads to murder. They are encouraged by their amoral professor, who teaches Ancient Greek studies, to immerse themselves in their research. The group of intellectual deviants push the boundaries of their studies by trying to replicate a Dionysian ritual practiced by the ancient Greeks. Tragedy occurs when their debauchery leads to the accidental, but savage death of a man. Their relationships slowly unravel as drug addiction and blackmail cause them to spiral into further emotional instability and acts of violence and murder.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h3 data-dcnode-id="1186"><em data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Bunny</span></em></h3><span data-dcnode-id="1185" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1182"><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-bunny/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="Bunny" class="wp-image-222" data-dcnode-id="1184" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/09/bunny-books-Book-Rags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1176"><em data-dcnode-id="1178"><a aria-label=" (opens in a new tab)" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-bunny/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1180" instrument_node="">Bunny</span></a></em><span data-dcnode-id="1177" instrument_node="">, by Mona Awad, is a fantastical novel about a lonely MFA student, Samantha Heather Mackey, who finds friendship with a clique of wealthy classmates. These unscrupulous but imaginative women, who call each other “Bunny,” seduce Samantha with erotic tales, drugs, and magic. When they invite her to collaborate on their collective literary project, she is coerced into the bizarre ritual of turning rabbits into handsome young men that are killed by the “Bunnies” once an inadequacy is discovered. Samantha, desperate for companionship, delves deeper into drugs with the shameless encouragement of her friends. Soon, she must choose between an authentic and healthy relationship with a poetry student or the “Bunnies” guiding her on an uncertain path to self-destruction.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><div class="at-below-post-homepage addthis_tool" data-dcnode-id="1169" data-url="https://blog.bookrags.com/news/the-drama-of-back-to-school/"></div><span data-dcnode-id="1167" instrument_node=""> </span></div><span data-dcnode-id="1164" instrument_node="">
</span></article><span data-dcnode-id="1161" instrument_node="">
</span><article class="post-196 post type-post status-publish format-standard hentry category-news tag-cadillac-desert tag-climate-change tag-collapse-how-societies-choose-to-fail-or-succeed tag-cradle-to-cradle tag-david-wallace-wells tag-earth-day tag-elizabeth-kolbert tag-global-warming tag-jared-diamond tag-john-mcphee tag-march-reisner tag-mckenzie-funk tag-naomi-klein tag-natural-capitalism tag-paul-hawken tag-the-control-of-nature tag-the-ecology-of-commerce tag-the-sixth-extinction tag-the-uninhabitable-earth tag-this-changes-everything tag-william-a-mcdonough tag-windfall-the-booming-business-of-global-warming" data-dcnode-id="961" id="post-196"><span data-dcnode-id="1160" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1144"><span data-dcnode-id="1159" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1150"><span class="screen-reader-text" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Posted on</span></span><span data-dcnode-id="1156" instrument_node=""> </span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/climate-change-is-here-and-what-we-can-do-about-it/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1154" datetime="2019-04-22T20:38:51+00:00"><span data-dcnode-id="1155" instrument_node="">April 22, 2019</span></time><time class="updated" data-dcnode-id="1152" datetime="2022-04-22T18:17:25+00:00"><span data-dcnode-id="1153" instrument_node="">April 22, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="1146"><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/climate-change-is-here-and-what-we-can-do-about-it/" rel="bookmark"><span data-dcnode-id="1148" instrument_node="">Climate Change Is Here and  What We Can Do About It</span></a></h3><span data-dcnode-id="1145" instrument_node=""> </span></header><span data-dcnode-id="1142" instrument_node="">
</span><div class="entry-content" data-dcnode-id="964"><span data-dcnode-id="1141" instrument_node="">
</span><div class="at-above-post-homepage addthis_tool" data-dcnode-id="1140" data-url="https://blog.bookrags.com/news/climate-change-is-here-and-what-we-can-do-about-it/"></div><span data-dcnode-id="1139" instrument_node="">
</span><figure class="wp-block-gallery has-nested-images columns-default is-cropped" data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1136"><img alt="" class="wp-image-197" data-dcnode-id="1137" data-id="197" height="346" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/header-earth-day-image-FINAL.jpg&amp;raw" srcset="https://blog.bookrags.com/wp-content/uploads/2019/04/header-earth-day-image-FINAL.jpg 600w, https://blog.bookrags.com/wp-content/uploads/2019/04/header-earth-day-image-FINAL-300x173.jpg 300w" width="600"></figure><span data-dcnode-id="1135" instrument_node="">
</span></figure><span data-dcnode-id="1133" instrument_node="">
</span><h3 data-dcnode-id="1128"><span data-dcnode-id="1132" instrument_node="">Climate change is perhaps </span><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">the</span></em><span data-dcnode-id="1129" instrument_node=""> worldwide challenge of our time. As we celebrate Earth Day on April 22, global temperatures and sea levels are rising in unprecedented ways, and we are losing more and more animal and plant species to extinction. Human life as we know it is at stake. How can we face the facts of global warming? We know that radical change is necessary, but it is too easy to feel hopeless. How do we open our eyes to our rapidly evolving world and empower ourselves at the same time?</span></h3><span data-dcnode-id="1127" instrument_node="">
</span><h3 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Our study guides below offer not only the history and facts of climate change, but also provide models for how we narrate this crisis. The problem is dire and the politics frustrating, but we still have time to act. As so many of the books below remind us, don’t give up—not yet.</span></h3><span data-dcnode-id="1124" instrument_node="">
</span><h3 data-dcnode-id="1121"><em data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">The Uninhabitable Earth, Life After Warming</span></em></h3><span data-dcnode-id="1120" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1117"><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-uninhabitable-earth-life-after-warming/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="The Uninhabitable Earth" class="wp-image-206" data-dcnode-id="1119" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/theh-uninhabitable-earth-book-rags-sm-1.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1111"><em data-dcnode-id="1113"><a aria-label="The Uninhabitable Earth: Life After Warming (opens in a new tab)" data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-uninhabitable-earth-life-after-warming/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1115" instrument_node="">The Uninhabitable Earth: Life After Warming</span></a></em><span data-dcnode-id="1112" instrument_node="">, by David Wallace-Wells, explores the horrors of climate change on an unprecedented scale. He reveals how global warming has already started to affect us and why it is much worse than most of us are aware. Wallace-Wells explains how the intricate ecological and geopolitical systems behind these disasters are only beginning to unravel throughout the world. Many scientists believe there is still time to save the planet even though most of humanity has done little to tackle the problem of climate change over the last two centuries. Even if we could gain worldwide consensus and action to cut carbon emissions, we would still experience the negative consequences of global warming for centuries to come. Furthermore, if this generation continues to do nothing in the interest of reaping short-term profits, then the consequences will be catastrophic—making the earth uninhabitable in the near future.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1109"></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1107" instrument_node=""> </span><em data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Collapse: How Societies Choose to Fail or Succeed</span></em></p><span data-dcnode-id="1103" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1100"><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-collapse/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="Collapse" class="wp-image-202" data-dcnode-id="1102" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/collapse-book-rags-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1098" instrument_node="">In the book </span><a aria-label="Collapse, How Societies Choose to Fail or Succeed (opens in a new tab)" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-collapse/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Collapse, How Societies Choose to Fail or Succeed</span></em></a><span data-dcnode-id="1094" instrument_node="">, author Jared Diamond examines the environmental factors that influence the rise and decline of civilizations throughout history. Societies often fail due to the depletion of natural resources and a lack of political will to recognize the problem adequately and mitigate impending disaster. Diamond uses global case studies from ancient to modern-day civilizations—including the United States—revealing how each society failed to implement conservation solutions that contributed to their demise. History shows us repeatedly that damage to our fragile ecosystem has long-term consequences for the survival of the human race and our planet.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1091"></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1089" instrument_node="">T</span><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">he Sixth Extinction: An Unnatural History</span></em></p><span data-dcnode-id="1085" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1082"><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-sixth-extinction/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="The Sixth Extinction" class="wp-image-207" data-dcnode-id="1084" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/the-sixth-extinction-book-rags-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1076"><a aria-label="The Sixth Extinction: An Unnatural History (opens in a new tab)" data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-sixth-extinction/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">The Sixth Extinction: An Unnatural History</span></em></a><span data-dcnode-id="1077" instrument_node="">, by Elizabeth Kolbert, documents the author’s journey around the world to gather evidence of mass extinction on earth. Consulting with scientists and naturalists about loss prevention, she explores the theories behind the natural extinction process versus swift, mass extinction events. As Kolbert investigates the historical data further, she begins to understand the causes of the current mass extinction underway. It’s due to man-made global warming. As humankind advances rapidly, species in the natural world will inevitably be disturbed—such as the death of coral reefs and other marine life. Since we are closely connected to nature, these abrupt changes have powerful impacts on humans—putting us at serious risk for survival.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1074"></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1070"><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Cadillac Desert: The American West and Its Disappearing Water</span></em></p><span data-dcnode-id="1069" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1066"><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-cadillacdesertwest/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="Cadillac Desert" class="wp-image-201" data-dcnode-id="1068" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/cadillac-desert-book-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1060"><a aria-label="Cadillac Desert: The American West and Its Disappearing Water (opens in a new tab)" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-cadillacdesertwest/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Cadillac Desert: The American West and Its Disappearing Water</span></em></a><span data-dcnode-id="1061" instrument_node="">, by Marc Reisner, exposes the creation of a subsidized and expensive “hydraulic society” in the Southwestern United States. This harmful dependence on irrigation canals and dams was built on and maintained by greed in pursuit of the American Dream. These ambitious infrastructure goals have disrupted the fragile ecosystems of the desert and damaged the environment. Driven by corruption and profits, corporations and government powers have mismanaged our national resources in their attempts to get rich from taming the American West.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><h3 data-dcnode-id="1056"><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">This Changes Everything</span></em></h3><span data-dcnode-id="1055" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1052"><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-this-changes-everything/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="This Changes Everything" class="wp-image-208" data-dcnode-id="1054" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/this-changes-everything-book-rags-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1046"><a aria-label="This Changes Everything (opens in a new tab)" data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-this-changes-everything/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">This Changes Everything</span></em></a><span data-dcnode-id="1047" instrument_node="">, by Naomi Klein, tackles the complexities of the climate change debate from different perspectives. Conservative think tanks and lobbyists employ experts to craft misinformation campaigns about fossil fuels to influence legislation. These efforts favor Big Oil players and other polluters who contribute to the majority of greenhouse gas emissions. Meanwhile, approximately 97% of climate scientists continue to present overwhelming evidence that human-made carbon emissions threaten all life on Earth. As governments remain deadlocked and hinder solutions to the highly politicized issue of global warming, catastrophes escalate globally along with the soaring profits of major polluters. Most environmentalists believe the answer begins with replacing capitalism—which focuses on profits at the expense of our environment—and developing an alternate economy that effectively combats climate change. </span></p><span data-dcnode-id="1045" instrument_node="">
</span><h3 data-dcnode-id="1042"><em data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">The Control of Nature</span></em></h3><span data-dcnode-id="1041" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1038"><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-control-of-nature/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="The Control of Nature" class="wp-image-204" data-dcnode-id="1040" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/the-control-of-nature-book-rags-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1032"><a aria-label="The Control of Nature (opens in a new tab)" data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-control-of-nature/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">The Control of Nature</span></em></a><span data-dcnode-id="1033" instrument_node="">, by John McPhee, examines the price humans pay by radically altering their environment instead of respecting the unpredictable forces of nature. The author investigates how societies have created disorder and suffered tragic consequences. Geopolitics and corruption influence destructive policies that disrupt the natural order of things. The author visits the people who chose to live near beautiful but fragile habitats susceptible to earthquakes, floods, lava flows, droughts, and other natural disasters globally. Working with nature to successfully protect societies is vital, instead of subduing it at all costs.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><h3 data-dcnode-id="1028"><em data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">The Ecology of Commerce</span></em></h3><span data-dcnode-id="1027" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1024"><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-ecology-of-commerce/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="The Ecology of Commerce" class="wp-image-205" data-dcnode-id="1026" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/the-ecology-of-commerce-book-images-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1018"><a aria-label="The Ecology of Commerce (opens in a new tab)" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-ecology-of-commerce/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">The Ecology of Commerce</span></em></a><span data-dcnode-id="1019" instrument_node="">, by Paul Hawken, examines the ways industrialization has negatively impacted the environment. Our economic system and the processes of industrialization do not support nature, where most waste is not recycled or utilized in ways that are conducive to maintaining the character of the natural world. Hawken argues that society must transition to a restorative economy to save the planet from destruction. However, the author acknowledges this will be a challenge since corporations are driven solely by profits. The costs of not transitioning will be far greater than the dividends and lead to the destruction of the earth if we don’t convert to a sustainable ecologic economic system yielding minimal waste.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><h3 data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node="">Cradl</span><em data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">e to Cradle: Remaking the Way We Make Things</span></em></h3><span data-dcnode-id="1012" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1009"><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-cradle-to-cradle/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="Cradle to Cradle" class="wp-image-203" data-dcnode-id="1011" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/cradle-to-cradle-book-rags-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><a aria-label="Cradle to Cradle: Remaking the Way We Make Things (opens in a new tab)" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-cradle-to-cradle/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Cradle to Cradle: Remaking the Way We Make Things</span></em></a><span data-dcnode-id="1004" instrument_node="">, by William A. McDonough, explores alternatives to current methods in favor of environmentally friendly building and manufacturing practices. The author focuses on utilizing environments with designs that best take advantage of the surrounding landscape’s natural ability to heat and cool. Designers and manufacturers are encouraged to consider various ways of planning buildings and industrial complexes using nontoxic and biodegradable materials. McDonough challenges them to employ uncomplicated, healthy design options using recycled materials as optimal ways to build durable and eco-friendly structures.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><h3 data-dcnode-id="999"><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Natural Capitalism: Creating the Next Industrial Revolution</span></em></h3><span data-dcnode-id="998" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="995"><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-natural-capitalism/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="Natural Capitalism" class="wp-image-211" data-dcnode-id="997" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/natural-capitalism-book-rags-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="989"><a aria-label="Natural Capitalism: Creating the Next Industrial Revolution (opens in a new tab)" data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-natural-capitalism/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Natural Capitalism: Creating the Next Industrial Revolution</span></em></a><span data-dcnode-id="990" instrument_node="">, by Paul Hawken, evaluates the cost of our current industry on the natural world. The author argues that the United States should be responsible for leading the world into an alternative industrial revolution that will restore a healthier environment. Communities and cities should organize around pedestrian accessibility rather than reliance on cars. Businesses must form a new model of industry practices that avoids waste and recycles everything they take from nature. The simplicity of systems and their efficiency in using less energy are more cost-effective in the long run. Since humans cannot manufacture anything better than what nature has already provided, we must find better ways to protect the environment from industrial waste and destruction.</span></p><span data-dcnode-id="988" instrument_node="">
</span><h3 data-dcnode-id="985"><em data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Windfall: The Booming Business of Global Warming </span></em></h3><span data-dcnode-id="984" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="981"><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-windfall-the-booming-business-of-global-warming/%23gsc.tab%3D0" rel="noopener noreferrer" target="new"><img alt="Windfall" class="wp-image-209" data-dcnode-id="983" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2019/04/wind-fall-book-rags-sm.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="980" instrument_node="">
