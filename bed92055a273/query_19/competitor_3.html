</span><header class="entry-header" data-dcnode-id="2716"><span data-dcnode-id="2731" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2722"><span class="screen-reader-text" data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Posted on</span></span><span data-dcnode-id="2728" instrument_node=""> </span><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/celebrate-irish-authors-this-st-patricks-day/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2726" datetime="2021-03-17T23:36:15+00:00"><span data-dcnode-id="2727" instrument_node="">March 17, 2021</span></time><time class="updated" data-dcnode-id="2724" datetime="2021-03-18T00:15:47+00:00"><span data-dcnode-id="2725" instrument_node="">March 18, 2021</span></time></a></div><h3 class="entry-title" data-dcnode-id="2718"><a data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/celebrate-irish-authors-this-st-patricks-day/" rel="bookmark"><span data-dcnode-id="2720" instrument_node="">Celebrate Irish Authors this St. Patrick’s Day</span></a></h3><span data-dcnode-id="2717" instrument_node=""> </span></header><span data-dcnode-id="2714" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2475"><span data-dcnode-id="2713" instrument_node="">
</span><div class="at-above-post-homepage addthis_tool" data-dcnode-id="2712" data-url="https://blog.bookrags.com/news/celebrate-irish-authors-this-st-patricks-day/"></div><span data-dcnode-id="2711" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2705"><figure class="aligncenter size-large" data-dcnode-id="2706"><a data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-dubliners/%23gsc.tab%3D0" rel="noopener" target="_blank"><img alt="" class="wp-image-270" data-dcnode-id="2710" height="682" sizes="(max-width: 767px) 89vw, (max-width: 1000px) 54vw, (max-width: 1071px) 543px, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2021/02/dublin-2344423_1920-1024x682.jpg&amp;raw" srcset="https://blog.bookrags.com/wp-content/uploads/2021/02/dublin-2344423_1920-1024x682.jpg 1024w, https://blog.bookrags.com/wp-content/uploads/2021/02/dublin-2344423_1920-300x200.jpg 300w, https://blog.bookrags.com/wp-content/uploads/2021/02/dublin-2344423_1920-768x511.jpg 768w, https://blog.bookrags.com/wp-content/uploads/2021/02/dublin-2344423_1920-1536x1022.jpg 1536w, https://blog.bookrags.com/wp-content/uploads/2021/02/dublin-2344423_1920.jpg 1920w" width="1024"></a><figcaption data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Trinity College Old Library, Dublin, Ireland</span></figcaption></figure></div><span data-dcnode-id="2704" instrument_node="">
</span><h3 data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Looking for an interesting subject for your mid-term paper? Why not honor Irish culture by writing about an Irish author? We are featuring classic and contemporary books from writers who have left an indelible mark on the literary world. These award-winning novelists, poets, playwrights, and screenwriters—all of whom hail from the Emerald Isle—each have their unique storytelling and writing styles. Here are the outstanding writers and their most popular works.</span></h3><span data-dcnode-id="2701" instrument_node="">
</span><h3 data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Sally Rooney</span></h3><span data-dcnode-id="2698" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2693"><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/lessonplan/normal-people/%23gsc.tab%3D0" rel="noopener noreferrer" target="_blank"><img alt="Sally Rooney" class="wp-image-277" data-dcnode-id="2697" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2021/02/Sally-Rooney-BookRags-Blog.jpg&amp;raw" width="195"></a><figcaption data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Sally Rooney, born 1991</span></figcaption></figure><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2691" instrument_node="">Well known for her bestselling novels, </span><em data-dcnode-id="2687"><a data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-conversations-with-friends/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2690" instrument_node="">Conversations with Friends</span></a><span data-dcnode-id="2688" instrument_node=""> </span></em><span data-dcnode-id="2686" instrument_node="">and </span><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/lessonplan/normal-people/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Normal People</span></em></a><span data-dcnode-id="2682" instrument_node="">, Sally Rooney is also a poet and screenwriter. She adapted </span><em data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Normal People</span></em><span data-dcnode-id="2679" instrument_node=""> for a 12-part television series. The story follows characters Marianne and Connell through their secret high school affair. The three-year saga explores the entrapping conventions of intimacy, gender normative roles, and the individual’s capability to grow over time. Rooney has won awards for her books that focus on young-adult relationships often complicated by romance and friendship. When asked which literary medium she prefers most, the Irish writer said, “As a reader I try to love all the literary forms equally, but I probably read novels most often.” Rooney’s third novel, </span><em data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">Beautiful World, Where Are You, </span></em><span data-dcnode-id="2676" instrument_node="">a coming-of-age story about two young lovers, will be published in 2021.</span></p><span data-dcnode-id="2674" instrument_node="">
</span><h3 data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Emma Donoghue</span></h3><span data-dcnode-id="2671" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2666"><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-pull-of-the-stars/%23gsc.tab%3D0" rel="noopener noreferrer" target="_blank"><img alt="" class="wp-image-278" data-dcnode-id="2670" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2021/02/Emma-Donoghue-BookRags-Blog-1.jpg&amp;raw" width="195"></a><figcaption data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Emma Donoghue, born 1969</span></figcaption></figure><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2642"><a data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/emma-donoghue-dlb/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2664" instrument_node="">Emma Donoghue</span></a><span data-dcnode-id="2662" instrument_node=""> is a prolific Irish-Canadian writer best known for her books on female sexuality and Irish nationality. One of her bestselling novels, </span><a data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-pull-of-the-stars/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">The Pull of the Stars</span></em></a><span data-dcnode-id="2658" instrument_node="">, is about three women—a nurse midwife, volunteer, and doctor—in a quarantined maternity ward during the Great Flu pandemic of 1918. Donoghue reveals how gender roles and expectations placed on women in war-ravaged Dublin cause and exacerbate their suffering. Her other bestselling novel, </span><a data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-room-donoghue/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Room</span></em></a><span data-dcnode-id="2654" instrument_node="">, focuses instead on the complex relationship between a mother and her son and their unshakable bond while in captivity. The novel was a finalist for the “Man Booker Prize” and Donoghue wrote the screenplay for the adapted film. The versatile author commented on the challenge of adapting a book to the screen saying that “…the paradox is, in film, that sometimes a line can be most powerful if it’s the only one spoken in a scene.” Her other international bestselling works include </span><a data-dcnode-id="2651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-wonder/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">The Wonder</span></em></a><span data-dcnode-id="2650" instrument_node="">, </span><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-akin/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Akin</span></em></a><span data-dcnode-id="2646" instrument_node="">, and </span><em data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">The Lotterys Plus One</span></em><span data-dcnode-id="2643" instrument_node="">.</span></p><span data-dcnode-id="2641" instrument_node="">
</span><h3 data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">Colm Tóibín</span></h3><span data-dcnode-id="2638" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2633"><a data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-master/%23gsc.tab%3D0" rel="noopener noreferrer" target="_blank"><img alt="Colm Tóibín" class="wp-image-271" data-dcnode-id="2637" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2021/02/Colin-Toibin-BookRags-Blog.jpg&amp;raw" width="195"></a><figcaption data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Colm Tóibín, born 1955</span></figcaption></figure><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2607"><a data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/colm-toibin-dlb/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2631" instrument_node="">Colm Tóibín</span></a><span data-dcnode-id="2629" instrument_node=""> is an award-winning novelist best known for books focused on his Irish roots. In his novel </span><a data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-brooklyn-novel/styles.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Brooklyn</span></em></a><span data-dcnode-id="2625" instrument_node="">, the author tells the coming-of-age tale about a young immigrant woman  living in the 1950’s, torn between her new life in America and her small, ancestral hometown of Enniscorthy, Ireland. The book was adapted to film and nominated for an Academy Award. Another of Toibin’s books, </span><em data-dcnode-id="2622"><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-nora-webster/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2624" instrument_node="">Nora Webster</span></a></em><span data-dcnode-id="2621" instrument_node="">, takes place in Ireland and tells of a widow struggling to support her four children financially while still reeling from the death of her husband. Toibin’s others include  </span><em data-dcnode-id="2618"><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-master/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2620" instrument_node="">The Master</span></a></em><span data-dcnode-id="2617" instrument_node="">, </span><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-testament-of-mary/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">The Testament of Mar</span></em><span data-dcnode-id="2614" instrument_node="">y</span></a><span data-dcnode-id="2612" instrument_node="">, and </span><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-house-of-names-a-novel/chapanal001.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">House of Names</span></em></a><span data-dcnode-id="2608" instrument_node="">. When asked about his inspiration, he explained that an unexpected idea or image forms into a sentence in his mind that “…moves into rhythm when you least expect it. …In other words, it’s like a melody.” The author is also a playwright, journalist, essayist, poet, and professor.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><h3 data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Maeve Binchy</span></h3><span data-dcnode-id="2603" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2598"><a data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-circle-of-friends/%23gsc.tab%3D0" rel="noopener noreferrer" target="_blank"><img alt="Maeve Binchy" class="wp-image-274" data-dcnode-id="2602" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2021/02/Maeve-Binchy-BookRags-Blog.jpg&amp;raw" width="195"></a><figcaption data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Maeve Binchy, born 1939</span></figcaption></figure><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2596" instrument_node="">Maeve Binchy was an accomplished Irish author of numerous best-selling books. One of her most popular, </span><em data-dcnode-id="2593"><a data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-circle-of-friends/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2595" instrument_node="">Circle of Friends</span></a></em><span data-dcnode-id="2592" instrument_node="">, focuses on two close friends, Benny Hogan and Eve Malone, who face many challenges growing up in a small Irish village. The best-selling novel was also adapted to film. </span><em data-dcnode-id="2589"><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-tara-road/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2591" instrument_node="">Tara Road</span></a></em><span data-dcnode-id="2588" instrument_node=""> is another popular read and movie adaptation. The story follows two women—one American and one Irish— who both embark on journeys of self-discovery after swapping houses. When asked how she felt about her books being adapted to screen, Binchy replied, “One little sentence in a film script says and shows it all. And I am literally in awe of the detail they go to in order to get the places looking just right, and the detail accurate.” The author was also an accomplished playwright and columnist and former schoolteacher.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><h3 data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">Samuel Beckett</span></h3><span data-dcnode-id="2583" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2578"><a data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-waitinggodot/%23gsc.tab%3D0" rel="noopener noreferrer" target="_blank"><img alt="Samuel Becket" class="wp-image-275" data-dcnode-id="2582" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2021/02/Samuel-Becket-BookRags-Blog.jpg&amp;raw" width="195"></a><figcaption data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Samuel Beckett,  born 1906</span></figcaption></figure><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2540"><a data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-endgame/bio.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2576" instrument_node="">Samuel Becket</span></a><span data-dcnode-id="2574" instrument_node="">t was an Irish novelist, poet, literary translator, playwright, and theater director who wrote tragically absurd dark-comedy in the modernist genre. He studied Italian and French at Trinity College in Dublin and then spent the rest of his adult life in France, where he wrote in French and English. Legendary writer James Joyce worked with and influenced Beckett in his early career. </span><em data-dcnode-id="2571"><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-waitinggodot/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2573" instrument_node="">Waiting for Godot</span></a></em><span data-dcnode-id="2570" instrument_node=""> is one of Beckett’s most important plays. Coined as “Absurdist Theatre,” its unconventional style with meaningless dialogue disoriented audiences. This new genre had a monumental impact on the theater world for subsequent generations. Beckett’s other most enduring works include: </span><em data-dcnode-id="2567"><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-endgame/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2569" instrument_node="">Endgame</span></a></em><span data-dcnode-id="2566" instrument_node="">, </span><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-dantelobster/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Dante and the Lobster</span></em></a><span data-dcnode-id="2562" instrument_node="">, </span><em data-dcnode-id="2559"><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-krappslasttape/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2561" instrument_node="">Krapp’s Last Tape</span></a></em><span data-dcnode-id="2558" instrument_node="">,</span><em data-dcnode-id="2555"><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-molloy-novel/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2557" instrument_node=""> Molloy</span></a></em><span data-dcnode-id="2554" instrument_node="">, </span><em data-dcnode-id="2551"><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-nohow-on/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2553" instrument_node="">Nohow</span></a></em><span data-dcnode-id="2550" instrument_node="">, </span><em data-dcnode-id="2547"><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-malone-dies/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2549" instrument_node="">Malone Dies</span></a></em><span data-dcnode-id="2546" instrument_node="">, and </span><em data-dcnode-id="2542"><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-unnamable/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2545" instrument_node="">The Unnamable</span></a><span data-dcnode-id="2543" instrument_node="">.</span></em><span data-dcnode-id="2541" instrument_node=""> He won a Nobel Prize in Literature in 1969.</span></p><span data-dcnode-id="2539" instrument_node="">
</span><h3 data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">James Joyce</span></h3><span data-dcnode-id="2536" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2531"><a data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-thedead/bio.html%23gsc.tab%3D0" rel="noopener noreferrer" target="_blank"><img alt="James Joyce" class="wp-image-273" data-dcnode-id="2535" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2021/02/James-Joyce-BookRags-Blog.jpg&amp;raw" width="195"></a><figcaption data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">James Joyce, born 1882</span></figcaption></figure><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2507"><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-thedead/bio.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2529" instrument_node="">James Joyce</span></a><span data-dcnode-id="2527" instrument_node=""> is one Ireland’s most beloved writers. The world-renowned author is celebrated for his life’s work every year on Bloomsday, June 16, in Dublin. The Irish novelist, teacher, and poet was an influential force in the modernist avant-garde movement. His most important novel, </span><em data-dcnode-id="2524"><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/ebooks/4300/429.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2526" instrument_node="">Ulysses</span></a></em><span data-dcnode-id="2523" instrument_node="">, chronicles the experience of three main characters through the course of one day (June 16, 1904), in Dublin, and is loosely based on Homer’s </span><em data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">The Odyssey</span></em><span data-dcnode-id="2520" instrument_node="">. His other monumental works include: </span><a data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-dubliners/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Dubliners</span></em></a><span data-dcnode-id="2516" instrument_node="">, </span><em data-dcnode-id="2513"><a data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-finnegans-wake/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2515" instrument_node="">Finnegans Wake</span></a></em><span data-dcnode-id="2512" instrument_node="">, and </span><em data-dcnode-id="2509"><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/ebooks/4217/109.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2511" instrument_node="">A Portrait of the Artist as a Young Man</span></a></em><span data-dcnode-id="2508" instrument_node="">.</span></p><span data-dcnode-id="2506" instrument_node="">
</span><h3 data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">William Butler Yeats</span></h3><span data-dcnode-id="2503" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2498"><a data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-collected-poems-of-wb-yeats/%23gsc.tab%3D0" rel="noopener noreferrer" target="_blank"><img alt="William Butler Yeats" class="wp-image-276" data-dcnode-id="2502" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2021/02/William-Butler-Yeats-BookRags-Blog.jpg&amp;raw" width="195"></a><figcaption data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">William Butler Yeats, born 1865</span></figcaption></figure><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2485"><a data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-autobiographies/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2496" instrument_node="">William Butler Yeats</span></a><span data-dcnode-id="2494" instrument_node=""> was a poet and dramatist who helped found the Abbey Theatre. A staunch supporter of Irish independence from England, he often created Irish heroes and heroines in his writings and served as a Senator for the Irish Free State. Yeats’ most important poems include </span><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-collected-poems-of-wb-yeats/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2493" instrument_node="">“The Second Coming,”</span></a><a data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-lakeisleinnisfree/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2491" instrument_node=""> “The Lake Isle of Innisfree,”</span></a><span data-dcnode-id="2489" instrument_node=""> and </span><a data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-ledaswan/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2488" instrument_node="">“Leda and the Swan.”</span></a><span data-dcnode-id="2486" instrument_node=""> Yeats was awarded the Nobel Prize in Literature in 1923.</span></p><span data-dcnode-id="2484" instrument_node="">
</span><div class="at-below-post-homepage addthis_tool" data-dcnode-id="2478" data-url="https://blog.bookrags.com/news/celebrate-irish-authors-this-st-patricks-day/"></div><span data-dcnode-id="2476" instrument_node=""> </span></div><span data-dcnode-id="2473" instrument_node="">
</span></article><span data-dcnode-id="2470" instrument_node="">

</span><header class="entry-header" data-dcnode-id="2453"><span data-dcnode-id="2468" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2459"><span class="screen-reader-text" data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Posted on</span></span><span data-dcnode-id="2465" instrument_node=""> </span><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/homeschooling-curriculum-for-parents-and-teachers/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2463" datetime="2020-08-13T22:38:03+00:00"><span data-dcnode-id="2464" instrument_node="">August 13, 2020</span></time><time class="updated" data-dcnode-id="2461" datetime="2020-08-25T00:33:06+00:00"><span data-dcnode-id="2462" instrument_node="">August 25, 2020</span></time></a></div><h3 class="entry-title" data-dcnode-id="2455"><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/homeschooling-curriculum-for-parents-and-teachers/" rel="bookmark"><span data-dcnode-id="2457" instrument_node="">Homeschooling Curriculum for Parents and Teachers</span></a></h3><span data-dcnode-id="2454" instrument_node=""> </span></header><span data-dcnode-id="2451" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2028"><span data-dcnode-id="2450" instrument_node="">
</span><div class="at-above-post-homepage addthis_tool" data-dcnode-id="2449" data-url="https://blog.bookrags.com/news/homeschooling-curriculum-for-parents-and-teachers/"></div><span data-dcnode-id="2448" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="2446"><img alt="Homeschooling Curriculum for Parents and Teachers" class="wp-image-268" data-dcnode-id="2447" height="346" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/08/back-to-school-2020-header.jpg&amp;raw" srcset="https://blog.bookrags.com/wp-content/uploads/2020/08/back-to-school-2020-header.jpg 600w, https://blog.bookrags.com/wp-content/uploads/2020/08/back-to-school-2020-header-300x173.jpg 300w" width="600"></figure><span data-dcnode-id="2445" instrument_node="">
</span><h3 data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Are you scrambling to find online curriculum for your children or students? We’ve done the work for you. Our bundled lesson plans and complementary study guides take the pressure off of planning, offering comprehensive course instruction for the academic year. </span></h3><span data-dcnode-id="2442" instrument_node="">
</span><h3 data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Our curated online resources organize your semester for you and appeal to a variety of student interests. Choose from units on civil rights, immigrant experiences, the history of math and science, global communities, and many more. All include fun activities, short essay questions to encourage critical thinking, and extensive testing materials. Whether you’re learning at home or on campus, our materials are ready to download whenever and wherever you choose. </span></h3><span data-dcnode-id="2439" instrument_node="">

</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1997"><img alt="" class="wp-image-254" data-dcnode-id="2000" height="516" loading="lazy" sizes="(max-width: 671px) 100vw, 671px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/California.jpg&amp;raw" srcset="https://blog.bookrags.com/wp-content/uploads/2020/07/California.jpg 600w, https://blog.bookrags.com/wp-content/uploads/2020/07/California-300x231.jpg 300w" width="671"><figcaption data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Masked families and a masked pet during the Great Influenza pandemic, in California, c. 1918-1920.</span></figcaption></figure><span data-dcnode-id="1996" instrument_node="">
</span><h3 data-dcnode-id="1988"><span data-dcnode-id="1995" instrument_node="">Did you know that dogs and cats donned masks during the </span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-coming-plague/chapanal006.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1994" instrument_node="">Great Influenza</span></a><span data-dcnode-id="1992" instrument_node="">? Or that Alexander Hamilton fled Philadelphia in 1793 to escape </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-an-american-plague/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1991" instrument_node="">Yellow Fever</span></a><span data-dcnode-id="1989" instrument_node="">? Or that scientists have found smallpox pustules on the mummy of an ancient Egyptian Pharaoh? As the world confronts the devastating spread of Covid-19, we look back to previous epidemics to understand their grave impacts and the lessons we’ve learned. We also examine the way everyday people learned to adapt, coexist, and persevere among these severely frightening historical moments.</span></h3><span data-dcnode-id="1987" instrument_node="">
</span><h3 data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">How much do you know about historical pandemics? Here are the most significant facts and surprising trivia of the deadliest outbreaks in U.S. history:</span></h3><span data-dcnode-id="1984" instrument_node="">
</span><h3 data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">COVID-19</span></h3><span data-dcnode-id="1981" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1979"><img alt="COVID-19" class="wp-image-257" data-dcnode-id="1980" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/Covid19-BookRags-Blog.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1978" instrument_node="">
</span><ul data-dcnode-id="1951"><li data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">COVID-19 is a new and emerging infectious disease with ongoing outbreaks that continue to threaten the health of people in the United States and worldwide.</span></li><li data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Although the disease can infect and kill anyone, the majority of infected young people tend to remain asymptomatic and never develop the illness. Whereas, older infected adults often develop either a mild case or serious illness, which requires hospitalization and can quickly lead to death.</span></li><li data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Spread of this new strain of the novel coronavirus occurs when a person is exposed to an infected person’s respiratory droplets through close contact.</span></li><li data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Infected people often appear healthy in the asymptomatic phase of the disease for 2-14 days after exposure to COVID-19, during which time they could be unknowingly spreading the disease.</span></li><li data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">The most common symptoms of this highly contagious virus includes fever, cough, fatigue, and shortness of breath which typically presents 2-14 days after being exposed.</span></li><li data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">The first confirmed case of COVID-19 was identified in Wuhan, Hubei Province, China, in November 2019.</span></li><li data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">In January 2020, the first documented case in the U.S. was confirmed in Washington state. The man had just returned from a trip to Wuhan.</span></li><li data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node="">The </span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/coronavirus/2019-ncov/prevent-getting-sick/diy-cloth-face-coverings.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1962" instrument_node="">CDC recommends wearing a mask</span></a><span data-dcnode-id="1960" instrument_node="">, social distancing, and washing hands frequently to lower the risk of contracting the disease.</span></li><li data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">There is no known cure to date.</span></li><li data-dcnode-id="1952"><span data-dcnode-id="1956" instrument_node="">Click here for </span><a data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//coronavirus.jhu.edu/us-map" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1955" instrument_node="">up-to-date case totals in the U.S.</span></a><span data-dcnode-id="1953" instrument_node=""> and worldwide.</span></li></ul><span data-dcnode-id="1950" instrument_node="">
</span><h3 data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">HIV/AIDS</span></h3><span data-dcnode-id="1947" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1945"><img alt="AIDS/HIV" class="wp-image-255" data-dcnode-id="1946" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/Chimp-BookRags-Blog.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1944" instrument_node="">
</span><ul data-dcnode-id="1907"><li data-dcnode-id="1940"><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-how-to-survive-a-plague-the-inside-story-of-how-citizens-and-science-tamed-aids/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1943" instrument_node="">HIV</span></a><span data-dcnode-id="1941" instrument_node=""> stands for human immunodeficiency virus which can lead to AIDS, or acquired immunodeficiency syndrome.</span></li><li data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">HIV is caused by a retrovirus, which attacks the body’s immune system leaving its victim more susceptible to potentially fatal infections.</span></li><li data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">A type of chimpanzee from Central Africa has been identified as the source of HIV. The virus may have mutated and infected humans as a result of hunting practices as far back as the late 1800s.</span></li><li data-dcnode-id="1931"><span data-dcnode-id="1935" instrument_node="">In 1981, the virus was first officially identified in the U.S. after it started spreading through the </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-coming-plague/chapanal009.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1934" instrument_node="">gay community</span></a><span data-dcnode-id="1932" instrument_node="">.</span></li><li data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">HIV is typically spread through body fluids during sex or needle sharing with other people.</span></li><li data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node="">The chances of an</span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-on-immunity/chapanal005.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1927" instrument_node=""> HIV-positive person</span></a><span data-dcnode-id="1925" instrument_node=""> infecting another person increases the higher their viral load.</span></li><li data-dcnode-id="1919"><span data-dcnode-id="1923" instrument_node="">One of the first drugs, AZT, that was developed to </span><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-my-own-country/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1922" instrument_node="">treat AIDS</span></a><span data-dcnode-id="1920" instrument_node=""> caused side effects that half the patients could not tolerate.</span></li><li data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">There is no cure for the disease, but more infected people are living longer due to educational outreach and advances in modern medicine.</span></li><li data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Preventative measures include abstinence, using condoms, and avoiding the sharing of needles. Prevention medicines include prophylaxis (PrEP) and post-exposure prophylaxis (PEP).</span></li><li data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Approximately 32 million people have died of AIDS worldwide since the HIV virus was first identified.</span></li><li data-dcnode-id="1908"><span data-dcnode-id="1912" instrument_node="">Although </span><a data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-missing/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1911" instrument_node="">AIDS</span></a><span data-dcnode-id="1909" instrument_node=""> was first identified in 1981, President Reagan failed to address the epidemic in a constructive way. His first notable mention of the crisis was in a 1985 press conference when he shared his doubts in allowing children with AIDS to continue to attend school. It was not until 1987, after thousands had already died of the disease, did his chilling silence end by recommending equal doses of medicine and morality to tackle the illness.</span></li></ul><span data-dcnode-id="1906" instrument_node="">
</span><h3 data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Polio</span></h3><span data-dcnode-id="1903" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1901"><img alt="Polio" class="wp-image-259" data-dcnode-id="1902" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/Polio-BookRags-Blog.jpg&amp;raw" width="195"></figure><span data-dcnode-id="1900" instrument_node="">
</span><ul data-dcnode-id="1882"><li data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Polio, or poliomyelitis, is a crippling viral infection that affects the spinal cord which can lead to chronic shortness of breath, permanent paralysis, and death in humans.</span></li><li data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">The virus, which can be traced back to ancient Egypt, spreads through fecal matter and contaminated food and water that is ingested.</span></li><li data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Milder symptoms of the disease can plague a person years later—causing joint pain, chronic fatigue, and muscle weakness.</span></li><li data-dcnode-id="1890"><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usnews.com/news/healthiest-communities/articles/2018-06-11/dallas-attorney-72-who-survived-polio-lives-in-iron-lung%23%3A~%3Atext%3DAlexander%252C%252072%252C%2520is%2520among%2520the%2Cmuscles%2520ravaged%2520by%2520paralytic%2520polio." rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1893" instrument_node="">Young people</span></a><span data-dcnode-id="1891" instrument_node=""> under five years old are most vulnerable to catching the disease. After exposure, some caught a severe form of the disease while most had mild symptoms and fully recovered.</span></li><li data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">In the U.S. alone, polio outbreaks caused approximately 15,000 cases of paralysis every year prior to the mid-20th century.</span></li><li data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node="">Polio was eventually eradicated in the U.S. after the introduction of the poliovirus vaccine (IPV), developed by </span><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/jonas-salk-wmi/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1886" instrument_node="">Jonas Salk</span></a><span data-dcnode-id="1884" instrument_node=""> in the early 1950s. By the 1970s, there were fewer than 10 cases recorded.</span></li></ul><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1880"></p><span data-dcnode-id="1879" instrument_node="">
</span><h3 data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">The Great Influenza</span></h3><span data-dcnode-id="1876" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1874"><img alt="The Spanish Flu" class="wp-image-261" data-dcnode-id="1875" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/Spanish-Flu-BookRags-Blog.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1873" instrument_node="">
</span><ul data-dcnode-id="1847"><li data-dcnode-id="1868"><span data-dcnode-id="1872" instrument_node="">The </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-coming-plague/chapanal006.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1871" instrument_node="">1918 influenza pandemic</span></a><span data-dcnode-id="1869" instrument_node=""> was the most lethal disease in recent U.S. history.</span></li><li data-dcnode-id="1863"><span data-dcnode-id="1867" instrument_node="">Since most people did not have</span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-on-immunity/chapanal005.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1866" instrument_node=""> immunity to this H1N1 virus</span></a><span data-dcnode-id="1864" instrument_node="">, as many as 20,000 Americans died each week.</span></li><li data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">In the United States, this strain of flu first infiltrated military personnel in Kansas, then spread east with the troops during World War I.</span></li><li data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">The mortality rate was high in young, healthy people; including the 20-40 years old, which are unusual casualties during common flu epidemics that typically kills the older population.</span></li><li data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">By the time the disease ran its course in 1920, it killed approximately 675,000 U.S. citizens and a staggering 50-100 million people worldwide.</span></li><li data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">Although commonly referred to as the </span><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-eating-animals/chapanal003.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1855" instrument_node="">Spanish Flu</span></a><span data-dcnode-id="1853" instrument_node="">, there is no consensus on where it originated. The name stuck because Spain devoted so much coverage to the outbreaks.</span></li><li data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">While in pursuit of a cure, scientists incorrectly assumed the flu was caused by bacteria instead of a virus during the time.</span></li><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">At the height of the pandemic, U.S. officials encouraged citizens to wear face masks to prevent spread of infection. Many were distributed by the Red Cross or made at home using gauze or handkerchiefs.</span></li></ul><span data-dcnode-id="1846" instrument_node="">
</span><h3 data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Cholera</span></h3><span data-dcnode-id="1843" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1841"><img alt="Cholera" class="wp-image-256" data-dcnode-id="1842" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/Cholera-BookRags-Blog.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1840" instrument_node="">
</span><ul data-dcnode-id="1817"><li data-dcnode-id="1836"><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/research/cholera-epidemics-five-pandemics-in-scit-051234/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1839" instrument_node="">Cholera</span></a><span data-dcnode-id="1837" instrument_node=""> is an illness caused by the bacteria V. cholerae that attaches to the intestines causing severe  diarrhea, dehydration, and death.</span></li><li data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">The bacterium can be transmitted from person to person.</span></li><li data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">This disease is most often contracted from infected human skin, untreated sewage, and through contaminated food and drinking water.</span></li><li data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Cholera was documented as early as 2,500 years ago.</span></li><li data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">In 1832, a new wave of immigrants crossing the Atlantic brought cholera to North America.</span></li><li data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Up until the late 1800s, many doctors did not believe the disease was contagious.</span></li><li data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">The bacterium was not discovered until the last half of the 19th century by Italian anatomist Filippo Pacini, and then by German bacteriologist Robert Koch who made subsequent advancements in Pacini’s discovery.</span></li><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">After the link between sanitation and cholera was established, New York City created a board of health to manage the disease in 1870.</span></li><li data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Public health improved when the city alleviated poor sanitation and quarantined those exposed to cholera.</span></li><li data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">The last major outbreak in the U.S. occurred in New York City after infected people from Italy arrived by steamship in 1910.</span></li></ul><span data-dcnode-id="1816" instrument_node="">
</span><h3 data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Typhoid Fever</span></h3><span data-dcnode-id="1813" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1811"><img alt="Mary Mallon" class="wp-image-258" data-dcnode-id="1812" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/Mary-Mallon-BookRags-Blog.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1810" instrument_node="">
</span><ul data-dcnode-id="1788"><li data-dcnode-id="1806"><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-medical-detectives/chapanal003.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1809" instrument_node="">Typhoid fever</span></a><span data-dcnode-id="1807" instrument_node=""> is caused by Salmonella serotype Typhi and Salmonella serotype Paratyphi.</span></li><li data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">The bacteria is treated with antibiotics.</span></li><li data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">The disease spreads through impure water, tainted food, and human waste.</span></li><li data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Symptoms of the disease include red marks on the skin, upset stomach, headache, and high fever.</span></li><li data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">In the early 1900s, the disease sickened approximately 3,467 people and killed 639 in New York City. The bacteria was lethal because antibiotics to treat it were not discovered until decades later.</span></li><li data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Although typhoid fever is rare today, approximately 350 people are diagnosed with the illness in the United States each year.</span></li><li data-dcnode-id="1789"><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/mary-mallon/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1795" instrument_node="">Mary Mallon</span></a><span data-dcnode-id="1793" instrument_node=""> was nicknamed “Typhoid Mary” after infecting several New York households with the illness, in 1906. A total of 53 people were infected and 3 died due to her poor </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-the-medical-detectives/chapanal003.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1792" instrument_node="">food-handling practices</span></a><span data-dcnode-id="1790" instrument_node="">. When authorities finally tracked down the cook, she reluctantly tested for the disease with positive results. However, she refused to stop working as a cook and continued to knowingly expose other unsuspecting victims. Finally, Mallon was arrested and forced to quarantine for several years by court order—only to resurface again years later and sicken more people after her release.</span></li></ul><span data-dcnode-id="1787" instrument_node="">
</span><h3 data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Yellow Fever</span></h3><span data-dcnode-id="1784" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1782"><img alt="Yellow Fever" class="wp-image-262" data-dcnode-id="1783" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/Yellow-Fever-BookRags-Blog.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1781" instrument_node="">
</span><ul data-dcnode-id="1756"><li data-dcnode-id="1776"><span data-dcnode-id="1780" instrument_node="">A </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-an-american-plague/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1779" instrument_node="">yellow fever</span></a><span data-dcnode-id="1777" instrument_node=""> epidemic devasted Philadelphia, in August 1793.</span></li><li data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">The invisible plague was brought to the New England town by war refugees from the Caribbean.</span></li><li data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Because doctors were unaware of the existence of viruses and bacteria at the time, fatalities surged as officials argued about how to best treat and eradicate the disease.</span></li><li data-dcnode-id="1767"><span data-dcnode-id="1771" instrument_node="">Many health care workers and politicians, including infected </span><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-alexander-hamilton-revolutionary/chapanal013.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1770" instrument_node="">Alexander Hamilton and his wife</span></a><span data-dcnode-id="1768" instrument_node="">, fled the City of Brotherly Love to escape the epidemic.</span></li><li data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">By the time yellow fever finally started to slow with the arrival of cold weather the following October, the virus had claimed the lives of approximately 6,000 men, women, and children.</span></li><li data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Sporadic outbreaks continued over the next 100 years in the Eastern United States, killing thousands more until 1905 when the last major outbreak of the scourge concluded in the U.S.</span></li><li data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Tree-living monkeys in Africa and South America were the most likely source of the virus.</span></li><li data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Mosquitoes are carriers of yellow fever.</span></li><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Although there is now a vaccine against yellow fever, there is no cure.</span></li></ul><span data-dcnode-id="1755" instrument_node="">
</span><h3 data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Smallpox</span></h3><span data-dcnode-id="1752" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1750"><img alt="Smallpox" class="wp-image-260" data-dcnode-id="1751" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/07/Smallpox-BookRags-Blog.jpg&amp;raw" width="300"></figure><span data-dcnode-id="1749" instrument_node="">
</span><ul data-dcnode-id="1723"><li data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Smallpox, or the variola virus, has plagued humans with random outbreaks for thousands of years. It was commonly spread on trade routes throughout Asia, Europe, and Africa.</span></li><li data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Smallpox is one of the most feared diseases because of its disfiguring rash which can leave permanent scars and cause blindness. Highly contagious, it has a 3 percent death rate.</span></li><li data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Europeans first brought the disease to the New World via the slave trade in the 16th century, killing many indigenous peoples in America.</span></li><li data-dcnode-id="1738"><span data-dcnode-id="1742" instrument_node="">In colonial America, </span><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-benjamin-franklin2/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1741" instrument_node="">Benjamin Franklin’s son</span></a><span data-dcnode-id="1739" instrument_node=""> died of the virus when he was only 4 years old, in 1736. This founding father advocated for the distribution of pamphlets to the colonists instructing them on how to inoculate their children at home.</span></li><li data-dcnode-id="1733"><span data-dcnode-id="1737" instrument_node="">Dating back to China as early as the 15th century, this</span><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-on-immunity/chapanal005.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1736" instrument_node=""> inoculation</span></a><span data-dcnode-id="1734" instrument_node=""> method called “Variolation” exposed healthy people to the mild form of the virus before they acquired it naturally. They would either rub their arm or inhale ground smallpox scabs from a smallpox patient. This treatment protected people from dying of a more severe form of the disease.</span></li><li data-dcnode-id="1728"><span data-dcnode-id="1732" instrument_node="">Scientific advancements perfected a </span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/louis-tompkins-wright-woh/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1731" instrument_node="">smallpox vaccine</span></a><span data-dcnode-id="1729" instrument_node="">, resulting in the eradication of natural outbreaks in the U.S. since 1949 and worldwide since 1977.</span></li><li data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Scientists found traces of smallpox pustules on the head of a mummy thought to be Pharaoh Ramses V, who reigned in Egypt, during the 3rd century BCE.</span></li><li data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Other early cases of the disease described as smallpox were documented in China during the 4th century and in India during the 7th century.</span></li></ul><span data-dcnode-id="1722" instrument_node="">
</span><h3 data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">All of these examples show that diseases have flourished as long as human beings have congregated for survival. Often insidious, highly contagious viruses and bacteria can easily spread silently and swiftly through human populations. These deadly epidemics usually hit cities first and often claim the most vulnerable among us; generally, the socio-economically disadvantaged and immune compromised are impacted the most. Eventually, many of these infectious diseases disappear as mysteriously as they arrived, but not before wreaking immeasurable havoc—indiscriminately leaving destroyed economies and lives in their wake.</span></h3><span data-dcnode-id="1719" instrument_node="">
</span><div class="at-below-post-homepage addthis_tool" data-dcnode-id="1713" data-url="https://blog.bookrags.com/news/the-deadliest-epidemics-in-united-states-history/"></div><span data-dcnode-id="1711" instrument_node=""> </span></div><span data-dcnode-id="1708" instrument_node="">
</span></article><span data-dcnode-id="1705" instrument_node="">
</span><article class="post-240 post type-post status-publish format-standard hentry category-news tag-clara-barton tag-jane-austen tag-mary-curie tag-maya-angelou tag-mother-teresa tag-rosalind-franklin tag-wangari-maathai tag-women-history-month" data-dcnode-id="1561" id="post-240"><span data-dcnode-id="1704" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1688"><span data-dcnode-id="1703" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1694"><span class="screen-reader-text" data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Posted on</span></span><span data-dcnode-id="1700" instrument_node=""> </span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/notable-women-in-history/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1698" datetime="2020-03-26T19:04:46+00:00"><span data-dcnode-id="1699" instrument_node="">March 26, 2020</span></time><time class="updated" data-dcnode-id="1696" datetime="2020-03-27T18:15:05+00:00"><span data-dcnode-id="1697" instrument_node="">March 27, 2020</span></time></a></div><h3 class="entry-title" data-dcnode-id="1690"><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/news/notable-women-in-history/" rel="bookmark"><span data-dcnode-id="1692" instrument_node="">Notable Women in History</span></a></h3><span data-dcnode-id="1689" instrument_node=""> </span></header><span data-dcnode-id="1686" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1564"><span data-dcnode-id="1685" instrument_node="">
</span><div class="at-above-post-homepage addthis_tool" data-dcnode-id="1684" data-url="https://blog.bookrags.com/news/notable-women-in-history/"></div><span data-dcnode-id="1683" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1676"><img alt="" class="wp-image-252" data-dcnode-id="1682" height="351" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/03/Harvard-Computers-BookRags-Blog-1.jpg&amp;raw" srcset="https://blog.bookrags.com/wp-content/uploads/2020/03/Harvard-Computers-BookRags-Blog-1.jpg 600w, https://blog.bookrags.com/wp-content/uploads/2020/03/Harvard-Computers-BookRags-Blog-1-300x176.jpg 300w" width="600"><figcaption data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node=""> </span><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">“Harvard Computers.” Photo taken on May 13, 1913. Image courtesy of the Harvard-Smithsonian Center for Astrophysics.</span></em><span data-dcnode-id="1678" instrument_node=""> </span></figcaption></figure><span data-dcnode-id="1675" instrument_node="">
</span><h3 data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">The month of March celebrates the momentous accomplishments women have achieved and the boundaries they’ve broken throughout history. In politics, science, art, service, journalism, academics, civil rights, and countless other areas, women continue to demonstrate an incredible impact on the world.</span></h3><span data-dcnode-id="1672" instrument_node="">
</span><h3 data-dcnode-id="1667"><span data-dcnode-id="1671" instrument_node="">Here are a few of the women who have made significant marks on history and paved the way for those who followed. If you’re really inspired by these figures, you can see them and others in a </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solitaired.com/solitaire/notable-women-in-history" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1670" instrument_node="">solitaire game</span></a><span data-dcnode-id="1668" instrument_node=""> about notable women in history.&nbsp;</span></h3><span data-dcnode-id="1666" instrument_node="">
</span><h3 data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Maya Angelou </span></h3><span data-dcnode-id="1663" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1660"><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/notes/ikwc/bio.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-242" data-dcnode-id="1662" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/03/women-history-maya-angelou-BookRags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1658" instrument_node="">Renowned African American author, poet, playwright, and political activist, </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/notes/ikwc/bio.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1657" instrument_node="">Maya Angelou</span></a><span data-dcnode-id="1655" instrument_node=""> was born in 1928 in St. Louis, Missouri. Over her lifetime, she authored 36 critically acclaimed books, the first, “I Know Why the Caged Bird Sings,” detailing her childhood in the Jim Crow South. This was one of the most widely read autobiographies by a 20th-century Black woman. Angelou gained mainstream exposure for her poetry when she read during President Bill Clinton’s swearing-in ceremony in 1993.  </span></p><span data-dcnode-id="1653" instrument_node="">
</span><h3 data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Jane Austen</span></h3><span data-dcnode-id="1650" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1647"><a data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/jane-austen/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-243" data-dcnode-id="1649" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/03/women-history-jane-austen-BookRags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1645" instrument_node=""> Overlooked as a significant novelist during her brief life, </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/jane-austen/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1644" instrument_node="">Jane Austen</span></a><span data-dcnode-id="1642" instrument_node=""> later became one of the most celebrated writers of the 19th century. Born in southern England in 1775, Austen penned just six novels, including “Pride and Prejudice” and “Sense and Sensibility.” Her ability to craft everyday characters faced with dramatic situations continues to enthrall readers. Austen’s timeless works have inspired movies, shows, and miniseries.  </span></p><span data-dcnode-id="1640" instrument_node="">
</span><h3 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Clara Barton</span></h3><span data-dcnode-id="1637" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1634"><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/research/clara-clarissa-harlowe-barton-scit-051234/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-245" data-dcnode-id="1636" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/03/women-history-clara-barton-BookRags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1632" instrument_node="">Called to serve, </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/research/clara-clarissa-harlowe-barton-scit-051234/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1631" instrument_node="">Clarissa “Clara” Harlowe Barton</span></a><span data-dcnode-id="1629" instrument_node=""> was compelled to care for soldiers of the Civil War on the battlefields. Known as the “Angel of the Battlefield,” she treated and comforted the sick. After the war, Barton traveled to Europe and learned about the Switzerland-based Red Cross. Inspired, she returned home and worked with influential friends to develop the American Red Cross, which protected and provided for the sick and wounded in crisis in the United States. Barton served as president of the organization for 23 years.  </span></p><span data-dcnode-id="1627" instrument_node="">
</span><h3 data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Rosalind Franklin</span></h3><span data-dcnode-id="1624" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1621"><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/rosalind-elsie-franklin/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-246" data-dcnode-id="1623" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/03/women-history-rosland-franklin-BookRags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1619" instrument_node="">At just 15 years old, </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/rosalind-elsie-franklin/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1618" instrument_node="">Rosalind Franklin</span></a><span data-dcnode-id="1616" instrument_node=""> determined that science was her vocation. Born in London in 1920, Franklin only lived to 37. But in that short time, she made groundbreaking discoveries. While studying chemistry at Cambridge University, she learned crystallography and X-ray diffraction. She applied those techniques to DNA fibers, coming up with a photo that became the foundation of the DNA structure. </span></p><span data-dcnode-id="1614" instrument_node="">
</span><h3 data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Wangari Maathai</span></h3><span data-dcnode-id="1611" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1608"><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/wangari-muta-maathai/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-247" data-dcnode-id="1610" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/03/women-history-wangari-maathai-BookRags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">Founder of the Green Belt Movement, </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/biography/wangari-muta-maathai/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1605" instrument_node="">Wangari Maathai</span></a><span data-dcnode-id="1603" instrument_node=""> was born in Kenya in 1940 and became the first woman to earn a doctorate in East or Central Africa. She was a professor, author, and visionary environmentalist who developed a successful reforestation program that launched in Africa and was adopted across the globe. Maathai was named the 2004 Nobel Peace Prize Laureate for her contributions to sustainability and peace.&nbsp;</span></p><span data-dcnode-id="1601" instrument_node="">
</span><h3 data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Mother Teresa</span></h3><span data-dcnode-id="1598" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1595"><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-mother-teresa-in-my-own-words/characters.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-248" data-dcnode-id="1597" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/03/women-history-mother-teresa-BookRags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1593" instrument_node="">Called to serve the poor through the Church, </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-mother-teresa-in-my-own-words/characters.html%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1592" instrument_node="">Mother Teresa</span></a><span data-dcnode-id="1590" instrument_node="">, born Agenese Gonxhe Bojaxhiu of Albania, chose to enter the religious life as a missionary at the age of 12. When she was 18, she joined the Sisters of Loreto and was eventually sent to India to teach young children English. She took her vows in 1931. Mother Teresa was known around the world for her humanitarianism, and she received the Nobel Peace Prize in 1979. She was canonized Saint Teresa of Calcutta in 2016.  </span></p><span data-dcnode-id="1588" instrument_node="">
</span><h2 data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Mary Curie</span></h2><span data-dcnode-id="1585" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1582"><a data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-madamecurie/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-249" data-dcnode-id="1584" height="293" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.bookrags.com/wp-content/uploads/2020/03/women-history-marie-curie-BookRags-Blog.jpg&amp;raw" width="195"></a></figure><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1577"><a aria-label="Madame Curie (opens in a new tab)" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookrags.com/studyguide-madamecurie/%23gsc.tab%3D0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1580" instrument_node="">Madame Curie</span></a><span data-dcnode-id="1578" instrument_node=""> was the first woman to win the nobel peace prize for her work discovering radioactive substances. Beyond science, she helped develop ambulances which saved countless lives during WWII. She also put her life on the line. Her long term exposure to radiation eventually killed her. </span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Needless to say, countless women have made an impact on our world with accomplishments large and small. They’re not only worth recognizing, but celebrating. Women’s History Month not only helps us remember the milestones women have made, but also reminds us to continue to drive towards a just and equal society.  </span></p><span data-dcnode-id="1573" instrument_node="">
</span><div class="at-below-post-homepage addthis_tool" data-dcnode-id="1567" data-url="https://blog.bookrags.com/news/notable-women-in-history/"></div><span data-dcnode-id="1565" instrument_node=""> </span></div><span data-dcnode-id="1562" instrument_node="">
</span></article><span data-dcnode-id="1559" instrument_node="">
