</span></div><span data-dcnode-id="2930" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2029"><span data-dcnode-id="2929" instrument_node="">
</span><p data-dcnode-id="2924"><span data-dcnode-id="2928" instrument_node="">All 50 US states have set their minimum </span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/alcohol-consumption" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2927" instrument_node="">drinking age</span></a><span data-dcnode-id="2925" instrument_node=""> to 21 although exceptions do exist on a state-by-state basis for consumption at home, under adult supervision, for medical necessity, and other reasons.</span></p><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2918"><span data-dcnode-id="2922" instrument_node="">Proponents of lowering the minimum legal drinking age (MLDA) from 21 argue that it has not stopped teen drinking, and has instead pushed underage </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/alcohol-consumption/Alcohol-and-society%23ref876744" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2921" instrument_node="">binge drinking</span></a><span data-dcnode-id="2919" instrument_node=""> into private and less controlled environments, leading to more health and life-endangering behavior by teens.</span></p><span data-dcnode-id="2917" instrument_node="">
</span><p data-dcnode-id="2911"><span data-dcnode-id="2916" instrument_node="">Opponents of lowering the MLDA argue that teens have not yet reached an age where they can handle alcohol responsibly, and thus are more likely to harm or even kill themselves and others by drinking prior to 21. They contend that traffic fatalities decreased when the MLDA increased. </span><a data-dcnode-id="2915" name="arguments"></a><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/history-of-the-minimum-legal-drinking-age/"><span data-dcnode-id="2913" style="font-weight: bold"><span data-dcnode-id="2914" instrument_node="">Read more background…</span></span></a></p><span data-dcnode-id="2910" instrument_node="">
</span><p data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2907" instrument_node="">
</span><h3 class="top-pca" data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Pro &amp; Con Arguments</span></h3><span data-dcnode-id="2904" instrument_node="">
</span><div class="row no-gutters arguments-container" data-dcnode-id="2200"><span data-dcnode-id="2903" instrument_node="">
</span><div class="col-6 arguments-column arguments-column-pro" data-dcnode-id="2596"><span data-dcnode-id="2902" instrument_node="">
</span><div class="argument-container" data-dcnode-id="2878"><span data-dcnode-id="2901" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2880" id="argument-21" style=""><h3 data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">Pro 1</span></h3><span data-dcnode-id="2898" instrument_node="">
</span><h4 data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">18 is the age of adulthood in the United States, and adults should have the right to make their own decisions about alcohol consumption.</span></h4><p data-dcnode-id="2883"><span data-dcnode-id="2895" instrument_node="">Turning 18 entails receiving the rights and responsibilities of adulthood to vote, serve on juries, get married, sign contracts, be prosecuted as adults, and join the military – which includes risking one’s life. </span><span class="footnotes-link" data-dcnode-id="2890"><span data-dcnode-id="2894" instrument_node="">[</span><a data-dcnode-id="2892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%235"><span data-dcnode-id="2893" instrument_node="">5</span></a><span data-dcnode-id="2891" instrument_node="">]</span></span><span data-dcnode-id="2889" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2884"><span data-dcnode-id="2888" instrument_node="">[</span><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%236"><span data-dcnode-id="2887" instrument_node="">6</span></a><span data-dcnode-id="2885" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2881" href="#argument-21-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-01-pro-read-more')"><span data-dcnode-id="2882" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2879" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2860"><span data-dcnode-id="2877" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2862" id="argument-22" style=""><h3 data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Pro 2</span></h3><span data-dcnode-id="2874" instrument_node="">
</span><h4 data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Allowing 18- to 20-year-olds to drink alcohol in regulated environments with supervision would decrease unsafe drinking activity.</span></h4><p data-dcnode-id="2865"><span data-dcnode-id="2871" instrument_node="">Prohibiting this age group from drinking in bars, restaurants, and other licensed locations causes them to drink in unsupervised places such as fraternity houses or house parties where they may be more prone to binge drinking and other unsafe behavior. </span><span class="footnotes-link" data-dcnode-id="2866"><span data-dcnode-id="2870" instrument_node="">[</span><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%237"><span data-dcnode-id="2869" instrument_node="">7</span></a><span data-dcnode-id="2867" instrument_node="">] </span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2863" href="#argument-22-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-02-pro-read-more')"><span data-dcnode-id="2864" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2861" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2806"><span data-dcnode-id="2859" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2808" id="argument-23" style=""><h3 data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Pro 3</span></h3><span data-dcnode-id="2856" instrument_node="">
</span><h4 data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">There are fewer drunk driving traffic accidents and fatalities in many countries with MLDA of 18.</span></h4><p data-dcnode-id="2811"><span data-dcnode-id="2853" instrument_node="">In the United States, 31% of road traffic deaths involve alcohol. </span><span class="footnotes-link" data-dcnode-id="2848"><span data-dcnode-id="2852" instrument_node="">[</span><a data-dcnode-id="2850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2348"><span data-dcnode-id="2851" instrument_node="">48</span></a><span data-dcnode-id="2849" instrument_node="">]</span></span><span data-dcnode-id="2847" instrument_node=""> This percentage is higher than many countries with a drinking age lower than 21 such as France (29%), Great Britain (16%), Germany (9%), China (4%), and Israel (3%). </span><span class="footnotes-link" data-dcnode-id="2842"><span data-dcnode-id="2846" instrument_node="">[</span><a data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2348"><span data-dcnode-id="2845" instrument_node="">48</span></a><span data-dcnode-id="2843" instrument_node="">]</span></span><span data-dcnode-id="2841" instrument_node=""> Although the United States increased the MLDA to 21 in 1984, its rate of traffic accidents and fatalities in the 1980s decreased less than that of European countries whose legal drinking ages are lower than 21. </span><span class="footnotes-link" data-dcnode-id="2836"><span data-dcnode-id="2840" instrument_node="">[</span><a data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%238"><span data-dcnode-id="2839" instrument_node="">8</span></a><span data-dcnode-id="2837" instrument_node="">]</span></span><span data-dcnode-id="2835" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2830"><span data-dcnode-id="2834" instrument_node="">[</span><a data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%239"><span data-dcnode-id="2833" instrument_node="">9</span></a><span data-dcnode-id="2831" instrument_node="">]</span></span><span data-dcnode-id="2829" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2824"><span data-dcnode-id="2828" instrument_node="">[</span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2310"><span data-dcnode-id="2827" instrument_node="">10</span></a><span data-dcnode-id="2825" instrument_node="">]</span></span><span data-dcnode-id="2823" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2818"><span data-dcnode-id="2822" instrument_node="">[</span><a data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2311"><span data-dcnode-id="2821" instrument_node="">11</span></a><span data-dcnode-id="2819" instrument_node="">]</span></span><span data-dcnode-id="2817" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2812"><span data-dcnode-id="2816" instrument_node="">[</span><a data-dcnode-id="2814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2312"><span data-dcnode-id="2815" instrument_node="">12</span></a><span data-dcnode-id="2813" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2809" href="#argument-23-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-03-pro-read-more')"><span data-dcnode-id="2810" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2807" instrument_node="">
</span></div><div class="widget-after-argument-quote-pro-1 widget widget_html_snippet_ad_widget" data-dcnode-id="2798" id="html_snippet_ad_widget-61"><div class="dfp-responsive" data-dcnode-id="2799"><span data-dcnode-id="2805" instrument_node="">
</span><div class="vp-all" data-dcnode-id="2801"><span data-dcnode-id="2804" instrument_node="">
</span><div data-dcnode-id="2803" id="div-gpt-ad-1588882530621-0" style="width: 300px; height: 250px;"></div><span data-dcnode-id="2802" instrument_node="">
</span></div><span data-dcnode-id="2800" instrument_node="">
</span></div></div><span data-dcnode-id="2797" instrument_node="">
</span><div class="argument-container" data-dcnode-id="2779"><span data-dcnode-id="2796" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2781" id="argument-24" style=""><h3 data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Pro 4</span></h3><span data-dcnode-id="2793" instrument_node="">
</span><h4 data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">The decrease in drunk driving fatalities as a percentage of total traffic fatalities in the United States does not correlate to the MLDA.</span></h4><p data-dcnode-id="2784"><span data-dcnode-id="2790" instrument_node="">Since 1982, two years prior to the Uniform Drinking Age Act establishing an MLDA of 21, a decline of drunk driving fatalities occurred across all age groups and demographic categories, and therefore cannot be reliably attributed to MLDA 21. </span><span class="footnotes-link" data-dcnode-id="2785"><span data-dcnode-id="2789" instrument_node="">[</span><a data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2313"><span data-dcnode-id="2788" instrument_node="">13</span></a><span data-dcnode-id="2786" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2782" href="#argument-24-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-04-pro-read-more')"><span data-dcnode-id="2783" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2780" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2755"><span data-dcnode-id="2778" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2757" id="argument-25" style=""><h3 data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Pro 5</span></h3><span data-dcnode-id="2775" instrument_node="">
</span><h4 data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Lowering MLDA from 21 to 18 would diminish the thrill of breaking the law to get a drink.</span></h4><p data-dcnode-id="2760"><span data-dcnode-id="2772" instrument_node="">Normalizing alcohol consumption as something done responsibly in moderation will make drinking alcohol less of a taboo for young adults entering college and the workforce. </span><span class="footnotes-link" data-dcnode-id="2767"><span data-dcnode-id="2771" instrument_node="">[</span><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2314"><span data-dcnode-id="2770" instrument_node="">14</span></a><span data-dcnode-id="2768" instrument_node="">]</span></span><span data-dcnode-id="2766" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2761"><span data-dcnode-id="2765" instrument_node="">[</span><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2315"><span data-dcnode-id="2764" instrument_node="">15</span></a><span data-dcnode-id="2762" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2758" href="#argument-25-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-05-pro-read-more')"><span data-dcnode-id="2759" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2756" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2731"><span data-dcnode-id="2754" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2733" id="argument-26" style=""><h3 data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Pro 6</span></h3><span data-dcnode-id="2751" instrument_node="">
</span><h4 data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">MLDA 21 is largely ineffective because teens consume regardless.</span></h4><p data-dcnode-id="2736"><span data-dcnode-id="2748" instrument_node="">According to the National Center on Addiction and Substance Abuse, underage drinking accounts for 17.5% ($22.5 billion) of consumer spending for alcohol in the United States. </span><span class="footnotes-link" data-dcnode-id="2743"><span data-dcnode-id="2747" instrument_node="">[</span><a data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2316"><span data-dcnode-id="2746" instrument_node="">16</span></a><span data-dcnode-id="2744" instrument_node="">]</span></span><span data-dcnode-id="2742" instrument_node=""> The 2016 National Survey on Drug Use and Health reports that 24.8% of youth aged 14 or 15, 46.7% aged 16 or 17, and 68.3% aged 18 to 20, drink alcohol. </span><span class="footnotes-link" data-dcnode-id="2737"><span data-dcnode-id="2741" instrument_node="">[</span><a data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="2740" instrument_node="">49</span></a><span data-dcnode-id="2738" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2734" href="#argument-26-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-06-pro-read-more')"><span data-dcnode-id="2735" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2732" instrument_node="">
</span></div><div class="widget-after-argument-quote-pro-2 widget widget_html_snippet_ad_widget" data-dcnode-id="2723" id="html_snippet_ad_widget-63"><div class="dfp-responsive" data-dcnode-id="2724"><span data-dcnode-id="2730" instrument_node="">
</span><div class="vp-all" data-dcnode-id="2726"><span data-dcnode-id="2729" instrument_node="">
</span><div data-dcnode-id="2728" id="div-gpt-ad-1588882716051-0" style="width: 300px; height: 250px;"></div><span data-dcnode-id="2727" instrument_node="">
</span></div><span data-dcnode-id="2725" instrument_node="">
</span></div></div><span data-dcnode-id="2722" instrument_node="">
</span><div class="argument-container" data-dcnode-id="2704"><span data-dcnode-id="2721" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2706" id="argument-27" style=""><h3 data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Pro 7</span></h3><span data-dcnode-id="2718" instrument_node="">
</span><h4 data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">High non-compliance with MLDA 21 promotes general disrespect and non-compliance with other areas of US law.</span></h4><p data-dcnode-id="2709"><span data-dcnode-id="2715" instrument_node="">MLDA 21 encourages young adults to acquire and use false identification documents to procure alcohol. In this era of national security concerns, including terrorism, illegal immigration, and other threats, it would be better to have fewer fake IDs in circulation and more respect for the law. </span><span class="footnotes-link" data-dcnode-id="2710"><span data-dcnode-id="2714" instrument_node="">[</span><a data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2317"><span data-dcnode-id="2713" instrument_node="">17</span></a><span data-dcnode-id="2711" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2707" href="#argument-27-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-07-pro-read-more')"><span data-dcnode-id="2708" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2705" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2686"><span data-dcnode-id="2703" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2688" id="argument-28" style=""><h3 data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Pro 8</span></h3><span data-dcnode-id="2700" instrument_node="">
</span><h4 data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">MLDA 21 enforcement is not a priority for many law enforcement agencies.</span></h4><p data-dcnode-id="2691"><span data-dcnode-id="2697" instrument_node="">Police are inclined to ignore or under-enforce MLDA 21 because of resource limitations, statutory obstacles, perceptions that punishments are inadequate, and the time and effort required for processing and paperwork. An estimated two of every 1,000 occasions of illegal drinking by youth under 21 results in an arrest. </span><span class="footnotes-link" data-dcnode-id="2692"><span data-dcnode-id="2696" instrument_node="">[</span><a data-dcnode-id="2694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2318"><span data-dcnode-id="2695" instrument_node="">18</span></a><span data-dcnode-id="2693" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2689" href="#argument-28-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-08-pro-read-more')"><span data-dcnode-id="2690" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2687" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2668"><span data-dcnode-id="2685" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2670" id="argument-29" style=""><h3 data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Pro 9</span></h3><span data-dcnode-id="2682" instrument_node="">
</span><h4 data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">MLDA 21 is not statistically associated with lower rates of suicide, homicide, or vandalism.</span></h4><p data-dcnode-id="2673"><span data-dcnode-id="2679" instrument_node="">In a 2002 meta-study of the legal drinking age and health and social problems, 72% of the studies found no statistically significant relationship despite claims that lowering the MLDA to 18 would increase suicide and criminal activities by adolescents. </span><span class="footnotes-link" data-dcnode-id="2674"><span data-dcnode-id="2678" instrument_node="">[</span><a data-dcnode-id="2676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="2677" instrument_node="">19</span></a><span data-dcnode-id="2675" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2671" href="#argument-29-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-09-pro-read-more')"><span data-dcnode-id="2672" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2669" instrument_node="">

</span></div><span data-dcnode-id="2662" instrument_node="">
</span></div></div><span data-dcnode-id="2659" instrument_node="">

</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2648" id="argument-30" style=""><h3 data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Pro 10</span></h3><span data-dcnode-id="2655" instrument_node="">
</span><h4 data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Drinking alcohol is an enjoyable activity.</span></h4><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">18- to 20-year-old adults should not be denied that enjoyment when other pleasurable activities are legal at age 18.</span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2649" href="#argument-30-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-10-pro-read-more')"><span data-dcnode-id="2650" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2647" instrument_node="">

</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2631" id="argument-31" style=""><h3 data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Pro 11</span></h3><span data-dcnode-id="2642" instrument_node="">
</span><h4 data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Lowering MLDA 21 would reduce the number of underage people who are hurt from alcohol-related injuries or accidents due to fear of legal consequences if they sought medical attention.</span></h4><p data-dcnode-id="2634"><span class="footnotes-link" data-dcnode-id="2635"><span data-dcnode-id="2639" instrument_node="">[</span><a data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2317"><span data-dcnode-id="2638" instrument_node="">7</span></a><span data-dcnode-id="2636" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2632" href="#argument-31-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-11-pro-read-more')"><span data-dcnode-id="2633" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2630" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2611"><span data-dcnode-id="2628" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2613" id="argument-32" style=""><h3 data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Pro 12</span></h3><span data-dcnode-id="2625" instrument_node="">
</span><h4 data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">State governments should have the right to establish a lower legal drinking age that reflects their unique demographics, legal context, and history.</span></h4><p data-dcnode-id="2616"><span data-dcnode-id="2622" instrument_node="">The Uniform Drinking Act, which compelled states to set the legal drinking age at 21 by withholding ten percent of highway funding from states that kept the minimum legal drinking age at 18, is an example of federal government overreach into state affairs. Many states that were happy with their MLDA 18 bowed to federal pressure rather than lose millions in annual highway funds. </span><span class="footnotes-link" data-dcnode-id="2617"><span data-dcnode-id="2621" instrument_node="">[</span><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2315"><span data-dcnode-id="2620" instrument_node="">15</span></a><span data-dcnode-id="2618" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2614" href="#argument-32-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-12-pro-read-more')"><span data-dcnode-id="2615" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2612" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2598"><span data-dcnode-id="2610" instrument_node="">
</span><blockquote class="argument-box argument-type-pro dotdotdot" data-dcnode-id="2600" id="argument-33" style=""><h3 data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Pro 13</span></h3><span data-dcnode-id="2607" instrument_node="">
</span><h4 data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Lowering MLDA 21 would be good for the economy.</span></h4><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">More people would legally be able to drink in bars, restaurants, and other licensed establishments. Revenue would increase for private business owners, and greater amounts of tax revenue would be collected by the government.</span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2601" href="#argument-33-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-13-pro-read-more')"><span data-dcnode-id="2602" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2599" instrument_node="">
</span></div><span data-dcnode-id="2597" instrument_node=""> </span></div><span data-dcnode-id="2595" instrument_node="">
</span><div class="col-6 arguments-column arguments-column-con" data-dcnode-id="2202"><span data-dcnode-id="2594" instrument_node="">
</span><div class="argument-container" data-dcnode-id="2558"><span data-dcnode-id="2593" instrument_node="">
</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2560" id="argument-34" style=""><h3 data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Con 1</span></h3><span data-dcnode-id="2590" instrument_node="">
</span><h4 data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">Lowering MLDA 21 would be medically irresponsible.</span></h4><p data-dcnode-id="2563"><span data-dcnode-id="2587" instrument_node="">Alcohol consumption can interfere with development of the young adult brain’s frontal lobes, essential for functions such as emotional regulation, planning, and organization. When alcohol consumption interferes with this early adult brain development, the potential for chronic problems such as greater vulnerability to addiction, dangerous risk-taking behavior, reduced decision-making ability, memory loss, depression, violence, and suicide is greater. </span><span class="footnotes-link" data-dcnode-id="2582"><span data-dcnode-id="2586" instrument_node="">[</span><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2320"><span data-dcnode-id="2585" instrument_node="">20</span></a><span data-dcnode-id="2583" instrument_node="">]</span></span><span data-dcnode-id="2581" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2576"><span data-dcnode-id="2580" instrument_node="">[</span><a data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2321"><span data-dcnode-id="2579" instrument_node="">21</span></a><span data-dcnode-id="2577" instrument_node="">]</span></span><span data-dcnode-id="2575" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2570"><span data-dcnode-id="2574" instrument_node="">[</span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2322"><span data-dcnode-id="2573" instrument_node="">22</span></a><span data-dcnode-id="2571" instrument_node="">]</span></span><span data-dcnode-id="2569" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node="">[</span><a data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2323"><span data-dcnode-id="2567" instrument_node="">23</span></a><span data-dcnode-id="2565" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2561" href="#argument-34-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-01-con-read-more')"><span data-dcnode-id="2562" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2559" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2510"><span data-dcnode-id="2557" instrument_node="">
</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2512" id="argument-35" style=""><h3 data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Con 2</span></h3><span data-dcnode-id="2554" instrument_node="">
</span><h4 data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Lowering MLDA 21 to 18 will irresponsibly allow a greater segment of the population to drink alcohol in bars and nightclubs, which are not safe environments.</span></h4><p data-dcnode-id="2515"><span data-dcnode-id="2551" instrument_node="">76% of bars have sold alcohol to obviously intoxicated patrons </span><span class="footnotes-link" data-dcnode-id="2546"><span data-dcnode-id="2550" instrument_node="">[</span><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2343"><span data-dcnode-id="2549" instrument_node="">43</span></a><span data-dcnode-id="2547" instrument_node="">]</span></span><span data-dcnode-id="2545" instrument_node="">, and about half of drivers arrested for driving while intoxicated (DWI) or killed as alcohol-involved drivers in traffic crashes did their drinking at licensed establishments </span><span class="footnotes-link" data-dcnode-id="2540"><span data-dcnode-id="2544" instrument_node="">[</span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2344"><span data-dcnode-id="2543" instrument_node="">44</span></a><span data-dcnode-id="2541" instrument_node="">]</span></span><span data-dcnode-id="2539" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2534"><span data-dcnode-id="2538" instrument_node="">[</span><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2345"><span data-dcnode-id="2537" instrument_node="">45</span></a><span data-dcnode-id="2535" instrument_node="">]</span></span><span data-dcnode-id="2533" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2528"><span data-dcnode-id="2532" instrument_node="">[</span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2346"><span data-dcnode-id="2531" instrument_node="">46</span></a><span data-dcnode-id="2529" instrument_node="">]</span></span><span data-dcnode-id="2527" instrument_node="">. Neighborhoods with higher densities of bars, nightclubs, and other alcohol-selling locations suffer more frequent assaults and other violent crimes. </span><span class="footnotes-link" data-dcnode-id="2522"><span data-dcnode-id="2526" instrument_node="">[</span><a data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2324"><span data-dcnode-id="2525" instrument_node="">24</span></a><span data-dcnode-id="2523" instrument_node="">]</span></span><span data-dcnode-id="2521" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2516"><span data-dcnode-id="2520" instrument_node="">[</span><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2325"><span data-dcnode-id="2519" instrument_node="">25</span></a><span data-dcnode-id="2517" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2513" href="#argument-35-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-02-con-read-more')"><span data-dcnode-id="2514" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2511" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2492"><span data-dcnode-id="2509" instrument_node="">
</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2494" id="argument-36" style=""><h3 data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Con 3</span></h3><span data-dcnode-id="2506" instrument_node="">
</span><h4 data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">The right to drink should have a higher age of initiation because of the dangers posed by drinking.</span></h4><p data-dcnode-id="2497"><span data-dcnode-id="2503" instrument_node="">Many rights in the United States are conferred on citizens at age 21 or older. A person cannot legally purchase a handgun, gamble in a casino (in most states), or adopt a child until age 21, rent a car (for most companies) at age 25, or run for President until age 35. Drinking should be similarly restricted due to the responsibility required to self and others. </span><span class="footnotes-link" data-dcnode-id="2498"><span data-dcnode-id="2502" instrument_node="">[</span><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2324"><span data-dcnode-id="2501" instrument_node="">24</span></a><span data-dcnode-id="2499" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2495" href="#argument-36-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-03-con-read-more')"><span data-dcnode-id="2496" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2493" instrument_node="">
</span></div><div class="widget-after-argument-quote-con-1 widget widget_html_snippet_ad_widget" data-dcnode-id="2484" id="html_snippet_ad_widget-62"><div class="dfp-responsive" data-dcnode-id="2485"><span data-dcnode-id="2491" instrument_node="">
</span><div class="vp-all" data-dcnode-id="2487"><span data-dcnode-id="2490" instrument_node="">
</span><div data-dcnode-id="2489" id="div-gpt-ad-1588882698436-0" style="width: 300px; height: 250px;"></div><span data-dcnode-id="2488" instrument_node="">
</span></div><span data-dcnode-id="2486" instrument_node="">
</span></div></div><span data-dcnode-id="2483" instrument_node="">
</span><div class="argument-container" data-dcnode-id="2453"><span data-dcnode-id="2482" instrument_node="">
</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2455" id="argument-37" style=""><h3 data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Con 4</span></h3><span data-dcnode-id="2479" instrument_node="">
</span><h4 data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">MLDA 21 reduces traffic accidents and fatalities.</span></h4><p data-dcnode-id="2458"><span data-dcnode-id="2476" instrument_node="">100 of the 102 analyses (98%) in a meta-study of the legal drinking age and traffic accidents found higher legal drinking ages associated with lower rates of traffic accidents. </span><span class="footnotes-link" data-dcnode-id="2471"><span data-dcnode-id="2475" instrument_node="">[</span><a data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="2474" instrument_node="">19</span></a><span data-dcnode-id="2472" instrument_node="">]</span></span><span data-dcnode-id="2470" instrument_node=""> In the 30 years since MLDA 21 was introduced, drunk driving fatalities decreased by a third. </span><span class="footnotes-link" data-dcnode-id="2465"><span data-dcnode-id="2469" instrument_node="">[</span><a data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2350"><span data-dcnode-id="2468" instrument_node="">50</span></a><span data-dcnode-id="2466" instrument_node="">]</span></span><span data-dcnode-id="2464" instrument_node=""> The National Highway Traffic Safety Administration (NHTSA) estimates that MLDA 21 has saved 31,417 lives from 1975-2016. </span><span class="footnotes-link" data-dcnode-id="2459"><span data-dcnode-id="2463" instrument_node="">[</span><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2350"><span data-dcnode-id="2462" instrument_node="">50</span></a><span data-dcnode-id="2460" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2456" href="#argument-37-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-04-con-read-more')"><span data-dcnode-id="2457" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2454" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2414"><span data-dcnode-id="2452" instrument_node="">
</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2416" id="argument-38" style=""><h3 data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Con 5</span></h3><span data-dcnode-id="2449" instrument_node="">
</span><h4 data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">MLDA 21 reduces alcohol consumption and the number of underage drinkers.</span></h4><p data-dcnode-id="2419"><span data-dcnode-id="2446" instrument_node="">87% of studies, according to a meta study on MLDA, found higher legal drinking ages associated with lower alcohol consumption. </span><span class="footnotes-link" data-dcnode-id="2441"><span data-dcnode-id="2445" instrument_node="">[</span><a data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="2444" instrument_node="">19</span></a><span data-dcnode-id="2442" instrument_node="">]</span></span><span data-dcnode-id="2440" instrument_node=""> Studies indicate that when the drinking age is 21, those younger than 21 drink less and continue to drink less through their early 20s, and that youth who do not drink until they are 21 tend to drink less as adults. </span><span class="footnotes-link" data-dcnode-id="2435"><span data-dcnode-id="2439" instrument_node="">[</span><a data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2342"><span data-dcnode-id="2438" instrument_node="">42</span></a><span data-dcnode-id="2436" instrument_node="">]</span></span><span data-dcnode-id="2434" instrument_node=""> The number of 18-to-20 year-olds who report drinking alcohol in the past month has decreased from 59% in 1985 – one year after Congress passed the </span><span data-dcnode-id="2432" style="font-style: italic;"><span data-dcnode-id="2433" instrument_node="">National Minimum Drinking Age Act</span></span><span data-dcnode-id="2431" instrument_node=""> – to 39% in 2016. </span><span class="footnotes-link" data-dcnode-id="2426"><span data-dcnode-id="2430" instrument_node="">[</span><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="2429" instrument_node="">49</span></a><span data-dcnode-id="2427" instrument_node="">]</span></span><span data-dcnode-id="2425" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2420"><span data-dcnode-id="2424" instrument_node="">[</span><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2351"><span data-dcnode-id="2423" instrument_node="">51</span></a><span data-dcnode-id="2421" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2417" href="#argument-38-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-05-con-read-more')"><span data-dcnode-id="2418" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2415" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2379"><span data-dcnode-id="2413" instrument_node="">
</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2381" id="argument-39" style=""><h3 data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Con 6</span></h3><span data-dcnode-id="2410" instrument_node="">
</span><h4 data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">MLDA 21 should not be lowered to mirror European drinking age limits because the rate of drinking among US teenagers is lower than most European countries.</span></h4><p data-dcnode-id="2384"><span data-dcnode-id="2407" instrument_node="">20% of American youth aged 16-to-17 and 7.4% aged 14-to-15 report drinking alcohol in the past month compared to an average 38% of European youth aged 15-to-16 years. </span><span class="footnotes-link" data-dcnode-id="2402"><span data-dcnode-id="2406" instrument_node="">[</span><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="2405" instrument_node="">49</span></a><span data-dcnode-id="2403" instrument_node="">]</span></span><span data-dcnode-id="2401" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2396"><span data-dcnode-id="2400" instrument_node="">[</span><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2352"><span data-dcnode-id="2399" instrument_node="">52</span></a><span data-dcnode-id="2397" instrument_node="">]</span></span><span data-dcnode-id="2395" instrument_node=""> US teenagers aged 16-to-17 also show lower rates of binge drinking (12.6%) than do 15-to-16 year-olds from Europe (35%). </span><span class="footnotes-link" data-dcnode-id="2390"><span data-dcnode-id="2394" instrument_node="">[</span><a data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="2393" instrument_node="">49</span></a><span data-dcnode-id="2391" instrument_node="">]</span></span><span class="footnotes-link" data-dcnode-id="2385"><span data-dcnode-id="2389" instrument_node="">[</span><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2352"><span data-dcnode-id="2388" instrument_node="">52</span></a><span data-dcnode-id="2386" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2382" href="#argument-39-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-06-con-read-more')"><span data-dcnode-id="2383" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2380" instrument_node="">

</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2354" id="argument-40" style=""><h3 data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Con 7</span></h3><span data-dcnode-id="2366" instrument_node="">
</span><h4 data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">MLDA 18 is not a right.</span></h4><p data-dcnode-id="2357"><span data-dcnode-id="2363" instrument_node="">A US district court ruled on Dec. 22, 1978 that MLDA 21 is “reasonably related to a state objective of reducing highway crashes,” and that MLDA 21 withstands a constitutional challenge on three key legal issues: (1) drinking alcohol is not a “fundamental” right guaranteed by the Constitution, (2) age is not inherently a “suspect” criteria for discrimination (in contrast to race or ethnicity, for example) and (3) using the drinking age to prevent highway crashes has a “rational basis” in available scientific evidence. </span><span class="footnotes-link" data-dcnode-id="2358"><span data-dcnode-id="2362" instrument_node="">[</span><a data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2329"><span data-dcnode-id="2361" instrument_node="">29</span></a><span data-dcnode-id="2359" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2355" href="#argument-40-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-07-con-read-more')"><span data-dcnode-id="2356" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2353" instrument_node="">
</span></div><div class="argument-container" data-dcnode-id="2316"><span data-dcnode-id="2351" instrument_node="">
</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2318" id="argument-41" style=""><h3 data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Con 8</span></h3><span data-dcnode-id="2348" instrument_node="">
</span><h4 data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">The American public overwhelmingly supports MLDA 21.</span></h4><p data-dcnode-id="2321"><span data-dcnode-id="2345" instrument_node="">A survey for the Center for Alcohol Policy found that 86% of Americans support the legal drinking age being set at 21. </span><span class="footnotes-link" data-dcnode-id="2340"><span data-dcnode-id="2344" instrument_node="">[</span><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2354"><span data-dcnode-id="2343" instrument_node="">54</span></a><span data-dcnode-id="2341" instrument_node="">]</span></span><span data-dcnode-id="2339" instrument_node=""> Numerous state and national surveys dating from the 1970s (when states were raising the legal drinking age) through the present have shown overwhelming public support for MLDA 21. </span><span class="footnotes-link" data-dcnode-id="2334"><span data-dcnode-id="2338" instrument_node="">[</span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2330"><span data-dcnode-id="2337" instrument_node="">30</span></a><span data-dcnode-id="2335" instrument_node="">]</span></span><span data-dcnode-id="2333" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2328"><span data-dcnode-id="2332" instrument_node="">[</span><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2331"><span data-dcnode-id="2331" instrument_node="">31</span></a><span data-dcnode-id="2329" instrument_node="">]</span></span><span data-dcnode-id="2327" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2322"><span data-dcnode-id="2326" instrument_node="">[</span><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2332"><span data-dcnode-id="2325" instrument_node="">32</span></a><span data-dcnode-id="2323" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2319" href="#argument-41-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-08-con-read-more')"><span data-dcnode-id="2320" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2317" instrument_node="">

</span><blockquote class="argument-box argument-type-con dotdotdot" data-dcnode-id="2294" id="argument-42" style=""><h3 data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Con 9</span></h3><span data-dcnode-id="2312" instrument_node="">
</span><h4 data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Lowering MLDA 21 would give high schoolers and even middle schoolers easier access to alcohol.</span></h4><p data-dcnode-id="2297"><span data-dcnode-id="2309" instrument_node="">Newly-legal drinkers often purchase alcohol for their underage peers, creating a “trickle-down” effect. </span><span class="footnotes-link" data-dcnode-id="2304"><span data-dcnode-id="2308" instrument_node="">[</span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2334"><span data-dcnode-id="2307" instrument_node="">34</span></a><span data-dcnode-id="2305" instrument_node="">]</span></span><span data-dcnode-id="2303" instrument_node=""> Surveys show that the most common source of alcohol among 18- to 20-year olds is their 21- to 24-year-old peers. </span><span class="footnotes-link" data-dcnode-id="2298"><span data-dcnode-id="2302" instrument_node="">[</span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2335"><span data-dcnode-id="2301" instrument_node="">35</span></a><span data-dcnode-id="2299" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2295" href="#argument-42-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-09-con-read-more')"><span data-dcnode-id="2296" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2293" instrument_node="">

</span><h4 data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">MLDA 21 helps prevent underage binge drinking.</span></h4><p data-dcnode-id="2270"><span data-dcnode-id="2276" instrument_node="">Binge drinking peaks among 21- to 25-year-olds at 45.4%, while the binge drinking rates of those aged 12-13, 14-15, 16-17, and 18-20 are 0.3%, 3.7%, 10.2%, and 26.2% respectively. </span><span class="footnotes-link" data-dcnode-id="2271"><span data-dcnode-id="2275" instrument_node="">[</span><a data-dcnode-id="2273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="2274" instrument_node="">49</span></a><span data-dcnode-id="2272" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2268" href="#argument-43-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-10-con-read-more')"><span data-dcnode-id="2269" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2266" instrument_node="">

</span><h4 data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">MLDA 21 exerts valuable social pressure on potential underage drinkers and those who may serve them.</span></h4><p data-dcnode-id="2252"><span data-dcnode-id="2258" instrument_node="">Youth may choose not to drink, or to drink less often, because of decreased social acceptability or increased risks from parental or legal authorities. Older youth and adults may furnish alcoholic beverages to minors less frequently, and licensed alcohol outlets may sell to minors less frequently, because of their perceptions that it is illegal, morally wrong, or because they might be caught. </span><span class="footnotes-link" data-dcnode-id="2253"><span data-dcnode-id="2257" instrument_node="">[</span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2318"><span data-dcnode-id="2256" instrument_node="">18</span></a><span data-dcnode-id="2254" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2250" href="#argument-44-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-11-con-read-more')"><span data-dcnode-id="2251" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2248" instrument_node="">

</span><h4 data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">The MLDA should stay at 21 because people tend to be more mature and responsible at 21 than 18.</span></h4><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">18-year-olds are typically entering a new phase of independence from their parents through college or the workforce, and are more susceptible to binge drinking, risky sexual activity, and other irresponsible behavior due to lack of maturity.</span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2237" href="#argument-45-popup" onclick="__gaTracker('send','event','tiles-arguments','-click','tile-12-con-read-more')"><span data-dcnode-id="2238" instrument_node="">Read More</span></a></blockquote><span data-dcnode-id="2235" instrument_node="">

</span><h4 data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Lowering the drinking age will invite more use of illicit drugs among 18-21 year olds.</span></h4><p data-dcnode-id="2209"><span data-dcnode-id="2227" instrument_node="">A peer-reviewed study from the Journal of Studies of Alcohol and Drugs found that the younger a person begins to drink alcohol the more likely it is that they will use other illicit drugs. </span><span class="footnotes-link" data-dcnode-id="2222"><span data-dcnode-id="2226" instrument_node="">[</span><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2338"><span data-dcnode-id="2225" instrument_node="">38</span></a><span data-dcnode-id="2223" instrument_node="">]</span></span><span data-dcnode-id="2221" instrument_node=""> Lowering MLDA 21 would increase the number of teens who drink and therefore the number of teens who use other drugs. </span><span class="footnotes-link" data-dcnode-id="2216"><span data-dcnode-id="2220" instrument_node="">[</span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2337"><span data-dcnode-id="2219" instrument_node="">37</span></a><span data-dcnode-id="2217" instrument_node="">]</span></span><span data-dcnode-id="2215" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="2210"><span data-dcnode-id="2214" instrument_node="">[</span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2339"><span data-dcnode-id="2213" instrument_node="">39</span></a><span data-dcnode-id="2211" instrument_node="">]</span></span></p><a class="open-popup-link dotdotdot-exempt ddd-keep" data-dcnode-id="2207" href="#argument-46-popup" onclick="__gaTracker('send', </span><table class="tablepress tablepress-id-2 did-you-know" data-dcnode-id="2126" id="tablepress-2"><thead data-dcnode-id="2188"><tr class="row-1" data-dcnode-id="2190"><th class="column-1" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Did You Know?</span></th></tr></thead><tbody class="row-hover" data-dcnode-id="2128"><tr class="row-2" data-dcnode-id="2167"><td class="column-1" data-dcnode-id="2169"><span data-dcnode-id="2184" instrument_node="">1. Although many believe that anyone under the age of 21 is prohibited from consuming alcohol in the United States, underage drinking is </span><a data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/45-states-that-allow-underage-under-21-alcohol-consumption/"><span data-dcnode-id="2183" instrument_node="">allowed in 29 states if done on private premises with parental consent, 25 states if for religious purposes, and 11 states if for educational purposes</span></a><span data-dcnode-id="2181" instrument_node="">. </span><span class="newblue-arguments-footnotes-link" data-dcnode-id="2176"><span data-dcnode-id="2180" instrument_node="">[</span><a data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%231"><span data-dcnode-id="2179" instrument_node="">1</span></a><span data-dcnode-id="2177" instrument_node="">]</span></span><span data-dcnode-id="2175" instrument_node=""> </span><span class="newblue-arguments-footnotes-link" data-dcnode-id="2170"><span data-dcnode-id="2174" instrument_node="">[</span><a data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%232"><span data-dcnode-id="2173" instrument_node="">2</span></a><span data-dcnode-id="2171" instrument_node="">]</span></span></td></tr><tr class="row-3" data-dcnode-id="2156"><td class="column-1" data-dcnode-id="2158"><span data-dcnode-id="2164" instrument_node="">2. Between 1970 and 1976, 30 states lowered their Minimum Legal Drinking Age (MLDA) from 21 to 18, 19, or 20. </span><span class="newblue-arguments-footnotes-link" data-dcnode-id="2159"><span data-dcnode-id="2163" instrument_node="">[</span><a data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%233"><span data-dcnode-id="2162" instrument_node="">3</span></a><span data-dcnode-id="2160" instrument_node="">]</span></span></td></tr><tr class="row-4" data-dcnode-id="2144"><td class="column-1" data-dcnode-id="2146"><span data-dcnode-id="2153" instrument_node="">3. The enactment of the National Minimum Drinking Age Act of 1984 </span><span class="newblue-arguments-footnotes-link" data-dcnode-id="2148"><span data-dcnode-id="2152" instrument_node="">[</span><a data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%234"><span data-dcnode-id="2151" instrument_node="">4</span></a><span data-dcnode-id="2149" instrument_node="">]</span></span><span data-dcnode-id="2147" instrument_node=""> prompted states to raise their legal age for purchase or public possession of alcohol to 21 or risk losing millions in federal highway funds. </span></td></tr><tr class="row-5" data-dcnode-id="2130"><td class="column-1" data-dcnode-id="2132"><span data-dcnode-id="2141" instrument_node="">4. After the repeal of alcohol prohibition by the 21st Amendment on Dec. 5, 1933, Illinois (1933-1961) and Oklahoma (1933-1976) set their state drinking age at 21 for men and 18 for women. The 1976 US Supreme Court case </span><em data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Craig v. Boren</span></em><span data-dcnode-id="2138" instrument_node=""> ruled 7-2 that this age difference violated the Equal Protection Clause of the 14th Amendment. </span><span class="newblue-arguments-footnotes-link" data-dcnode-id="2133"><span data-dcnode-id="2137" instrument_node="">[</span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinkingage.procon.org/additional-resources/footnotes-sources/%2347"><span data-dcnode-id="2136" instrument_node="">47</span></a><span data-dcnode-id="2134" instrument_node="">]</span></span></td></tr></tbody></table><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2124"></p><span data-dcnode-id="2123" instrument_node="">

de-id="1259"><meta charset="utf-8"><title data-dcnode-id="1262">A2A</title></meta></head><body data-dcnode-id="1258" style="background-color:transparent"></body></html></iframe></div></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1230" id="argument-21-popup"><span data-dcnode-id="1252" instrument_node="">
</span><h3 data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Pro 1</span></h3><span data-dcnode-id="1249" instrument_node="">
</span><h4 data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">18 is the age of adulthood in the United States, and adults should have the right to make their own decisions about alcohol consumption.</span></h4><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1245" instrument_node="">Turning 18 entails receiving the rights and responsibilities of adulthood to vote, serve on juries, get married, sign contracts, be prosecuted as adults, and join the military – which includes risking one’s life. </span><span class="footnotes-link" data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">[</span><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%235"><span data-dcnode-id="1243" instrument_node="">5</span></a><span data-dcnode-id="1241" instrument_node="">]</span></span><span data-dcnode-id="1239" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node="">[</span><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%236"><span data-dcnode-id="1237" instrument_node="">6</span></a><span data-dcnode-id="1235" instrument_node="">]</span></span></p><span data-dcnode-id="1232" instrument_node="">
</span><span data-dcnode-id="1231" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1213" id="argument-22-popup"><span data-dcnode-id="1229" instrument_node="">
</span><h3 data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Pro 2</span></h3><span data-dcnode-id="1226" instrument_node="">
</span><h4 data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Allowing 18- to 20-year-olds to drink alcohol in regulated environments with supervision would decrease unsafe drinking activity.</span></h4><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1222" instrument_node="">Prohibiting this age group from drinking in bars, restaurants, and other licensed locations causes them to drink in unsupervised places such as fraternity houses or house parties where they may be more prone to binge drinking and other unsafe behavior. </span><span class="footnotes-link" data-dcnode-id="1217"><span data-dcnode-id="1221" instrument_node="">[</span><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%237"><span data-dcnode-id="1220" instrument_node="">7</span></a><span data-dcnode-id="1218" instrument_node="">] </span></span></p><span data-dcnode-id="1215" instrument_node="">
</span><span data-dcnode-id="1214" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1160" id="argument-23-popup"><span data-dcnode-id="1212" instrument_node="">
</span><h3 data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Pro 3</span></h3><span data-dcnode-id="1209" instrument_node="">
</span><h4 data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">There are fewer drunk driving traffic accidents and fatalities in many countries with MLDA of 18.</span></h4><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1205" instrument_node="">In the United States, 31% of road traffic deaths involve alcohol. </span><span class="footnotes-link" data-dcnode-id="1200"><span data-dcnode-id="1204" instrument_node="">[</span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2348"><span data-dcnode-id="1203" instrument_node="">48</span></a><span data-dcnode-id="1201" instrument_node="">]</span></span><span data-dcnode-id="1199" instrument_node=""> This percentage is higher than many countries with a drinking age lower than 21 such as France (29%), Great Britain (16%), Germany (9%), China (4%), and Israel (3%). </span><span class="footnotes-link" data-dcnode-id="1194"><span data-dcnode-id="1198" instrument_node="">[</span><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2348"><span data-dcnode-id="1197" instrument_node="">48</span></a><span data-dcnode-id="1195" instrument_node="">]</span></span><span data-dcnode-id="1193" instrument_node=""> Although the United States increased the MLDA to 21 in 1984, its rate of traffic accidents and fatalities in the 1980s decreased less than that of European countries whose legal drinking ages are lower than 21. </span><span class="footnotes-link" data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">[</span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%238"><span data-dcnode-id="1191" instrument_node="">8</span></a><span data-dcnode-id="1189" instrument_node="">]</span></span><span data-dcnode-id="1187" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">[</span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%239"><span data-dcnode-id="1185" instrument_node="">9</span></a><span data-dcnode-id="1183" instrument_node="">]</span></span><span data-dcnode-id="1181" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="1176"><span data-dcnode-id="1180" instrument_node="">[</span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2310"><span data-dcnode-id="1179" instrument_node="">10</span></a><span data-dcnode-id="1177" instrument_node="">]</span></span><span data-dcnode-id="1175" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">[</span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2311"><span data-dcnode-id="1173" instrument_node="">11</span></a><span data-dcnode-id="1171" instrument_node="">]</span></span><span data-dcnode-id="1169" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">[</span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2312"><span data-dcnode-id="1167" instrument_node="">12</span></a><span data-dcnode-id="1165" instrument_node="">]</span></span></p><span data-dcnode-id="1162" instrument_node="">
</span><span data-dcnode-id="1161" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1143" id="argument-24-popup"><span data-dcnode-id="1159" instrument_node="">
</span><h3 data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Pro 4</span></h3><span data-dcnode-id="1156" instrument_node="">
</span><h4 data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">The decrease in drunk driving fatalities as a percentage of total traffic fatalities in the United States does not correlate to the MLDA.</span></h4><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1152" instrument_node="">Since 1982, two years prior to the Uniform Drinking Age Act establishing an MLDA of 21, a decline of drunk driving fatalities occurred across all age groups and demographic categories, and therefore cannot be reliably attributed to MLDA 21. </span><span class="footnotes-link" data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">[</span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2313"><span data-dcnode-id="1150" instrument_node="">13</span></a><span data-dcnode-id="1148" instrument_node="">]</span></span></p><span data-dcnode-id="1145" instrument_node="">
</span><span data-dcnode-id="1144" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1120" id="argument-25-popup"><span data-dcnode-id="1142" instrument_node="">
</span><h3 data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Pro 5</span></h3><span data-dcnode-id="1139" instrument_node="">
</span><h4 data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Lowering MLDA from 21 to 18 would diminish the thrill of breaking the law to get a drink.</span></h4><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1135" instrument_node="">Normalizing alcohol consumption as something done responsibly in moderation will make drinking alcohol less of a taboo for young adults entering college and the workforce. </span><span class="footnotes-link" data-dcnode-id="1130"><span data-dcnode-id="1134" instrument_node="">[</span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2314"><span data-dcnode-id="1133" instrument_node="">14</span></a><span data-dcnode-id="1131" instrument_node="">]</span></span><span data-dcnode-id="1129" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">[</span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2315"><span data-dcnode-id="1127" instrument_node="">15</span></a><span data-dcnode-id="1125" instrument_node="">]</span></span></p><span data-dcnode-id="1122" instrument_node="">
</span><span data-dcnode-id="1121" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1097" id="argument-26-popup"><span data-dcnode-id="1119" instrument_node="">
</span><h3 data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Pro 6</span></h3><span data-dcnode-id="1116" instrument_node="">
</span><h4 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">MLDA 21 is largely ineffective because teens consume regardless.</span></h4><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1112" instrument_node="">According to the National Center on Addiction and Substance Abuse, underage drinking accounts for 17.5% ($22.5 billion) of consumer spending for alcohol in the United States. </span><span class="footnotes-link" data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">[</span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2316"><span data-dcnode-id="1110" instrument_node="">16</span></a><span data-dcnode-id="1108" instrument_node="">]</span></span><span data-dcnode-id="1106" instrument_node=""> The 2016 National Survey on Drug Use and Health reports that 24.8% of youth aged 14 or 15, 46.7% aged 16 or 17, and 68.3% aged 18 to 20, drink alcohol. </span><span class="footnotes-link" data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">[</span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="1104" instrument_node="">49</span></a><span data-dcnode-id="1102" instrument_node="">]</span></span></p><span data-dcnode-id="1099" instrument_node="">
</span><span data-dcnode-id="1098" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1080" id="argument-27-popup"><span data-dcnode-id="1096" instrument_node="">
</span><h3 data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Pro 7</span></h3><span data-dcnode-id="1093" instrument_node="">
</span><h4 data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">High non-compliance with MLDA 21 promotes general disrespect and non-compliance with other areas of US law.</span></h4><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1089" instrument_node="">MLDA 21 encourages young adults to acquire and use false identification documents to procure alcohol. In this era of national security concerns, including terrorism, illegal immigration, and other threats, it would be better to have fewer fake IDs in circulation and more respect for the law. </span><span class="footnotes-link" data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">[</span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2317"><span data-dcnode-id="1087" instrument_node="">17</span></a><span data-dcnode-id="1085" instrument_node="">]</span></span></p><span data-dcnode-id="1082" instrument_node="">
</span><span data-dcnode-id="1081" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1063" id="argument-28-popup"><span data-dcnode-id="1079" instrument_node="">
</span><h3 data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Pro 8</span></h3><span data-dcnode-id="1076" instrument_node="">
</span><h4 data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">MLDA 21 enforcement is not a priority for many law enforcement agencies.</span></h4><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1072" instrument_node="">Police are inclined to ignore or under-enforce MLDA 21 because of resource limitations, statutory obstacles, perceptions that punishments are inadequate, and the time and effort required for processing and paperwork. An estimated two of every 1,000 occasions of illegal drinking by youth under 21 results in an arrest. </span><span class="footnotes-link" data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node="">[</span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2318"><span data-dcnode-id="1070" instrument_node="">18</span></a><span data-dcnode-id="1068" instrument_node="">]</span></span></p><span data-dcnode-id="1065" instrument_node="">
</span><span data-dcnode-id="1064" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1046" id="argument-29-popup"><span data-dcnode-id="1062" instrument_node="">
</span><h3 data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Pro 9</span></h3><span data-dcnode-id="1059" instrument_node="">
</span><h4 data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">MLDA 21 is not statistically associated with lower rates of suicide, homicide, or vandalism.</span></h4><span data-dcnode-id="1056" instrument_node="">
