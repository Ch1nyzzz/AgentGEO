</span><p data-dcnode-id="1049"><span data-dcnode-id="1055" instrument_node="">In a 2002 meta-study of the legal drinking age and health and social problems, 72% of the studies found no statistically significant relationship despite claims that lowering the MLDA to 18 would increase suicide and criminal activities by adolescents. </span><span class="footnotes-link" data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">[</span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="1053" instrument_node="">19</span></a><span data-dcnode-id="1051" instrument_node="">]</span></span></p><span data-dcnode-id="1048" instrument_node="">
</span><span data-dcnode-id="1047" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1034" id="argument-30-popup"><span data-dcnode-id="1045" instrument_node="">
</span><h3 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Pro 10</span></h3><span data-dcnode-id="1042" instrument_node="">
</span><h4 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Drinking alcohol is an enjoyable activity.</span></h4><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">18- to 20-year-old adults should not be denied that enjoyment when other pleasurable activities are legal at age 18.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><span data-dcnode-id="1035" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1018" id="argument-31-popup"><span data-dcnode-id="1033" instrument_node="">
</span><h3 data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Pro 11</span></h3><span data-dcnode-id="1030" instrument_node="">
</span><h4 data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Lowering MLDA 21 would reduce the number of underage people who are hurt from alcohol-related injuries or accidents due to fear of legal consequences if they sought medical attention.</span></h4><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1021"><span class="footnotes-link" data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">[</span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2317"><span data-dcnode-id="1025" instrument_node="">7</span></a><span data-dcnode-id="1023" instrument_node="">]</span></span></p><span data-dcnode-id="1020" instrument_node="">
</span><span data-dcnode-id="1019" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="1001" id="argument-32-popup"><span data-dcnode-id="1017" instrument_node="">
</span><h3 data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Pro 12</span></h3><span data-dcnode-id="1014" instrument_node="">
</span><h4 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">State governments should have the right to establish a lower legal drinking age that reflects their unique demographics, legal context, and history.</span></h4><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1010" instrument_node="">The Uniform Drinking Act, which compelled states to set the legal drinking age at 21 by withholding ten percent of highway funding from states that kept the minimum legal drinking age at 18, is an example of federal government overreach into state affairs. Many states that were happy with their MLDA 18 bowed to federal pressure rather than lose millions in annual highway funds. </span><span class="footnotes-link" data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">[</span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2315"><span data-dcnode-id="1008" instrument_node="">15</span></a><span data-dcnode-id="1006" instrument_node="">]</span></span></p><span data-dcnode-id="1003" instrument_node="">
</span><span data-dcnode-id="1002" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="989" id="argument-33-popup"><span data-dcnode-id="1000" instrument_node="">
</span><h3 data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Pro 13</span></h3><span data-dcnode-id="997" instrument_node="">
</span><h4 data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Lowering MLDA 21 would be good for the economy.</span></h4><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">More people would legally be able to drink in bars, restaurants, and other licensed establishments. Revenue would increase for private business owners, and greater amounts of tax revenue would be collected by the government.</span></p><span data-dcnode-id="991" instrument_node="">
</span><span data-dcnode-id="990" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="954" id="argument-34-popup"><span data-dcnode-id="988" instrument_node="">
</span><h3 data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Con 1</span></h3><span data-dcnode-id="985" instrument_node="">
</span><h4 data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Lowering MLDA 21 would be medically irresponsible.</span></h4><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="981" instrument_node="">Alcohol consumption can interfere with development of the young adult brain’s frontal lobes, essential for functions such as emotional regulation, planning, and organization. When alcohol consumption interferes with this early adult brain development, the potential for chronic problems such as greater vulnerability to addiction, dangerous risk-taking behavior, reduced decision-making ability, memory loss, depression, violence, and suicide is greater. </span><span class="footnotes-link" data-dcnode-id="976"><span data-dcnode-id="980" instrument_node="">[</span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2320"><span data-dcnode-id="979" instrument_node="">20</span></a><span data-dcnode-id="977" instrument_node="">]</span></span><span data-dcnode-id="975" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">[</span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2321"><span data-dcnode-id="973" instrument_node="">21</span></a><span data-dcnode-id="971" instrument_node="">]</span></span><span data-dcnode-id="969" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">[</span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2322"><span data-dcnode-id="967" instrument_node="">22</span></a><span data-dcnode-id="965" instrument_node="">]</span></span><span data-dcnode-id="963" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">[</span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2323"><span data-dcnode-id="961" instrument_node="">23</span></a><span data-dcnode-id="959" instrument_node="">]</span></span></p><span data-dcnode-id="956" instrument_node="">
</span><span data-dcnode-id="955" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="907" id="argument-35-popup"><span data-dcnode-id="953" instrument_node="">
</span><h3 data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Con 2</span></h3><span data-dcnode-id="950" instrument_node="">
</span><h4 data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Lowering MLDA 21 to 18 will irresponsibly allow a greater segment of the population to drink alcohol in bars and nightclubs, which are not safe environments.</span></h4><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="946" instrument_node="">76% of bars have sold alcohol to obviously intoxicated patrons </span><span class="footnotes-link" data-dcnode-id="941"><span data-dcnode-id="945" instrument_node="">[</span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2343"><span data-dcnode-id="944" instrument_node="">43</span></a><span data-dcnode-id="942" instrument_node="">]</span></span><span data-dcnode-id="940" instrument_node="">, and about half of drivers arrested for driving while intoxicated (DWI) or killed as alcohol-involved drivers in traffic crashes did their drinking at licensed establishments </span><span class="footnotes-link" data-dcnode-id="935"><span data-dcnode-id="939" instrument_node="">[</span><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2344"><span data-dcnode-id="938" instrument_node="">44</span></a><span data-dcnode-id="936" instrument_node="">]</span></span><span data-dcnode-id="934" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">[</span><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2345"><span data-dcnode-id="932" instrument_node="">45</span></a><span data-dcnode-id="930" instrument_node="">]</span></span><span data-dcnode-id="928" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">[</span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2346"><span data-dcnode-id="926" instrument_node="">46</span></a><span data-dcnode-id="924" instrument_node="">]</span></span><span data-dcnode-id="922" instrument_node="">. Neighborhoods with higher densities of bars, nightclubs, and other alcohol-selling locations suffer more frequent assaults and other violent crimes. </span><span class="footnotes-link" data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">[</span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2324"><span data-dcnode-id="920" instrument_node="">24</span></a><span data-dcnode-id="918" instrument_node="">]</span></span><span data-dcnode-id="916" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">[</span><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2325"><span data-dcnode-id="914" instrument_node="">25</span></a><span data-dcnode-id="912" instrument_node="">]</span></span></p><span data-dcnode-id="909" instrument_node="">
</span><span data-dcnode-id="908" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="890" id="argument-36-popup"><span data-dcnode-id="906" instrument_node="">
</span><h3 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Con 3</span></h3><span data-dcnode-id="903" instrument_node="">
</span><h4 data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">The right to drink should have a higher age of initiation because of the dangers posed by drinking.</span></h4><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="899" instrument_node="">Many rights in the United States are conferred on citizens at age 21 or older. A person cannot legally purchase a handgun, gamble in a casino (in most states), or adopt a child until age 21, rent a car (for most companies) at age 25, or run for President until age 35. Drinking should be similarly restricted due to the responsibility required to self and others. </span><span class="footnotes-link" data-dcnode-id="894"><span data-dcnode-id="898" instrument_node="">[</span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2324"><span data-dcnode-id="897" instrument_node="">24</span></a><span data-dcnode-id="895" instrument_node="">]</span></span></p><span data-dcnode-id="892" instrument_node="">
</span><span data-dcnode-id="891" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="861" id="argument-37-popup"><span data-dcnode-id="889" instrument_node="">
</span><h3 data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Con 4</span></h3><span data-dcnode-id="886" instrument_node="">
</span><h4 data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">MLDA 21 reduces traffic accidents and fatalities.</span></h4><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="882" instrument_node="">100 of the 102 analyses (98%) in a meta-study of the legal drinking age and traffic accidents found higher legal drinking ages associated with lower rates of traffic accidents. </span><span class="footnotes-link" data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">[</span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="880" instrument_node="">19</span></a><span data-dcnode-id="878" instrument_node="">]</span></span><span data-dcnode-id="876" instrument_node=""> In the 30 years since MLDA 21 was introduced, drunk driving fatalities decreased by a third. </span><span class="footnotes-link" data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">[</span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2350"><span data-dcnode-id="874" instrument_node="">50</span></a><span data-dcnode-id="872" instrument_node="">]</span></span><span data-dcnode-id="870" instrument_node=""> The National Highway Traffic Safety Administration (NHTSA) estimates that MLDA 21 has saved 31,417 lives from 1975-2016. </span><span class="footnotes-link" data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">[</span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2350"><span data-dcnode-id="868" instrument_node="">50</span></a><span data-dcnode-id="866" instrument_node="">]</span></span></p><span data-dcnode-id="863" instrument_node="">
</span><span data-dcnode-id="862" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="823" id="argument-38-popup"><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Con 5</span></h3><span data-dcnode-id="857" instrument_node="">
</span><h4 data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">MLDA 21 reduces alcohol consumption and the number of underage drinkers.</span></h4><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="853" instrument_node="">87% of studies, according to a meta study on MLDA, found higher legal drinking ages associated with lower alcohol consumption. </span><span class="footnotes-link" data-dcnode-id="848"><span data-dcnode-id="852" instrument_node="">[</span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="851" instrument_node="">19</span></a><span data-dcnode-id="849" instrument_node="">]</span></span><span data-dcnode-id="847" instrument_node=""> Studies indicate that when the drinking age is 21, those younger than 21 drink less and continue to drink less through their early 20s, and that youth who do not drink until they are 21 tend to drink less as adults. </span><span class="footnotes-link" data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">[</span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2342"><span data-dcnode-id="845" instrument_node="">42</span></a><span data-dcnode-id="843" instrument_node="">]</span></span><span data-dcnode-id="841" instrument_node=""> The number of 18-to-20 year-olds who report drinking alcohol in the past month has decreased from 59% in 1985 – one year after Congress passed the </span><span data-dcnode-id="839" style="font-style: italic;"><span data-dcnode-id="840" instrument_node="">National Minimum Drinking Age Act</span></span><span data-dcnode-id="838" instrument_node=""> – to 39% in 2016. </span><span class="footnotes-link" data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">[</span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="836" instrument_node="">49</span></a><span data-dcnode-id="834" instrument_node="">]</span></span><span data-dcnode-id="832" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="827"><span data-dcnode-id="831" instrument_node="">[</span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2351"><span data-dcnode-id="830" instrument_node="">51</span></a><span data-dcnode-id="828" instrument_node="">]</span></span></p><span data-dcnode-id="825" instrument_node="">
</span><span data-dcnode-id="824" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="789" id="argument-39-popup"><span data-dcnode-id="822" instrument_node="">
</span><h3 data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Con 6</span></h3><span data-dcnode-id="819" instrument_node="">
</span><h4 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">MLDA 21 should not be lowered to mirror European drinking age limits because the rate of drinking among US teenagers is lower than most European countries.</span></h4><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="815" instrument_node="">20% of American youth aged 16-to-17 and 7.4% aged 14-to-15 report drinking alcohol in the past month compared to an average 38% of European youth aged 15-to-16 years. </span><span class="footnotes-link" data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">[</span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="813" instrument_node="">49</span></a><span data-dcnode-id="811" instrument_node="">]</span></span><span data-dcnode-id="809" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">[</span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2352"><span data-dcnode-id="807" instrument_node="">52</span></a><span data-dcnode-id="805" instrument_node="">]</span></span><span data-dcnode-id="803" instrument_node=""> US teenagers aged 16-to-17 also show lower rates of binge drinking (12.6%) than do 15-to-16 year-olds from Europe (35%). </span><span class="footnotes-link" data-dcnode-id="798"><span data-dcnode-id="802" instrument_node="">[</span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="801" instrument_node="">49</span></a><span data-dcnode-id="799" instrument_node="">]</span></span><span class="footnotes-link" data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">[</span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2352"><span data-dcnode-id="796" instrument_node="">52</span></a><span data-dcnode-id="794" instrument_node="">]</span></span></p><span data-dcnode-id="791" instrument_node="">
</span><span data-dcnode-id="790" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="772" id="argument-40-popup"><span data-dcnode-id="788" instrument_node="">
</span><h3 data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Con 7</span></h3><span data-dcnode-id="785" instrument_node="">
</span><h4 data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">MLDA 18 is not a right.</span></h4><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="781" instrument_node="">A US district court ruled on Dec. 22, 1978 that MLDA 21 is “reasonably related to a state objective of reducing highway crashes,” and that MLDA 21 withstands a constitutional challenge on three key legal issues: (1) drinking alcohol is not a “fundamental” right guaranteed by the Constitution, (2) age is not inherently a “suspect” criteria for discrimination (in contrast to race or ethnicity, for example) and (3) using the drinking age to prevent highway crashes has a “rational basis” in available scientific evidence. </span><span class="footnotes-link" data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">[</span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2329"><span data-dcnode-id="779" instrument_node="">29</span></a><span data-dcnode-id="777" instrument_node="">]</span></span></p><span data-dcnode-id="774" instrument_node="">
</span><span data-dcnode-id="773" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="737" id="argument-41-popup"><span data-dcnode-id="771" instrument_node="">
</span><h3 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Con 8</span></h3><span data-dcnode-id="768" instrument_node="">
</span><h4 data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">The American public overwhelmingly supports MLDA 21.</span></h4><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="764" instrument_node="">A survey for the Center for Alcohol Policy found that 86% of Americans support the legal drinking age being set at 21. </span><span class="footnotes-link" data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">[</span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2354"><span data-dcnode-id="762" instrument_node="">54</span></a><span data-dcnode-id="760" instrument_node="">]</span></span><span data-dcnode-id="758" instrument_node=""> Numerous state and national surveys dating from the 1970s (when states were raising the legal drinking age) through the present have shown overwhelming public support for MLDA 21. </span><span class="footnotes-link" data-dcnode-id="753"><span data-dcnode-id="757" instrument_node="">[</span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2330"><span data-dcnode-id="756" instrument_node="">30</span></a><span data-dcnode-id="754" instrument_node="">]</span></span><span data-dcnode-id="752" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">[</span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2331"><span data-dcnode-id="750" instrument_node="">31</span></a><span data-dcnode-id="748" instrument_node="">]</span></span><span data-dcnode-id="746" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">[</span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2332"><span data-dcnode-id="744" instrument_node="">32</span></a><span data-dcnode-id="742" instrument_node="">]</span></span></p><span data-dcnode-id="739" instrument_node="">
</span><span data-dcnode-id="738" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="714" id="argument-42-popup"><span data-dcnode-id="736" instrument_node="">
</span><h3 data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Con 9</span></h3><span data-dcnode-id="733" instrument_node="">
</span><h4 data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Lowering MLDA 21 would give high schoolers and even middle schoolers easier access to alcohol.</span></h4><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="729" instrument_node="">Newly-legal drinkers often purchase alcohol for their underage peers, creating a “trickle-down” effect. </span><span class="footnotes-link" data-dcnode-id="724"><span data-dcnode-id="728" instrument_node="">[</span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2334"><span data-dcnode-id="727" instrument_node="">34</span></a><span data-dcnode-id="725" instrument_node="">]</span></span><span data-dcnode-id="723" instrument_node=""> Surveys show that the most common source of alcohol among 18- to 20-year olds is their 21- to 24-year-old peers. </span><span class="footnotes-link" data-dcnode-id="718"><span data-dcnode-id="722" instrument_node="">[</span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2335"><span data-dcnode-id="721" instrument_node="">35</span></a><span data-dcnode-id="719" instrument_node="">]</span></span></p><span data-dcnode-id="716" instrument_node="">
</span><span data-dcnode-id="715" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="697" id="argument-43-popup"><span data-dcnode-id="713" instrument_node="">
</span><h3 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Con 10</span></h3><span data-dcnode-id="710" instrument_node="">
</span><h4 data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">MLDA 21 helps prevent underage binge drinking.</span></h4><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="706" instrument_node="">Binge drinking peaks among 21- to 25-year-olds at 45.4%, while the binge drinking rates of those aged 12-13, 14-15, 16-17, and 18-20 are 0.3%, 3.7%, 10.2%, and 26.2% respectively. </span><span class="footnotes-link" data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">[</span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="704" instrument_node="">49</span></a><span data-dcnode-id="702" instrument_node="">]</span></span></p><span data-dcnode-id="699" instrument_node="">
</span><span data-dcnode-id="698" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="680" id="argument-44-popup"><span data-dcnode-id="696" instrument_node="">
</span><h3 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Con 11</span></h3><span data-dcnode-id="693" instrument_node="">
</span><h4 data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">MLDA 21 exerts valuable social pressure on potential underage drinkers and those who may serve them.</span></h4><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="689" instrument_node="">Youth may choose not to drink, or to drink less often, because of decreased social acceptability or increased risks from parental or legal authorities. Older youth and adults may furnish alcoholic beverages to minors less frequently, and licensed alcohol outlets may sell to minors less frequently, because of their perceptions that it is illegal, morally wrong, or because they might be caught. </span><span class="footnotes-link" data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">[</span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2318"><span data-dcnode-id="687" instrument_node="">18</span></a><span data-dcnode-id="685" instrument_node="">]</span></span></p><span data-dcnode-id="682" instrument_node="">
</span><span data-dcnode-id="681" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="668" id="argument-45-popup"><span data-dcnode-id="679" instrument_node="">
</span><h3 data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Con 12</span></h3><span data-dcnode-id="676" instrument_node="">
</span><h4 data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">The MLDA should stay at 21 because people tend to be more mature and responsible at 21 than 18.</span></h4><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">18-year-olds are typically entering a new phase of independence from their parents through college or the workforce, and are more susceptible to binge drinking, risky sexual activity, and other irresponsible behavior due to lack of maturity.</span></p><span data-dcnode-id="670" instrument_node="">
</span><span data-dcnode-id="669" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="639" id="argument-46-popup"><span data-dcnode-id="667" instrument_node="">
</span><h3 data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Con 13</span></h3><span data-dcnode-id="664" instrument_node="">
</span><h4 data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Lowering the drinking age will invite more use of illicit drugs among 18-21 year olds.</span></h4><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="660" instrument_node="">A peer-reviewed study from the Journal of Studies of Alcohol and Drugs found that the younger a person begins to drink alcohol the more likely it is that they will use other illicit drugs. </span><span class="footnotes-link" data-dcnode-id="655"><span data-dcnode-id="659" instrument_node="">[</span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2338"><span data-dcnode-id="658" instrument_node="">38</span></a><span data-dcnode-id="656" instrument_node="">]</span></span><span data-dcnode-id="654" instrument_node=""> Lowering MLDA 21 would increase the number of teens who drink and therefore the number of teens who use other drugs. </span><span class="footnotes-link" data-dcnode-id="649"><span data-dcnode-id="653" instrument_node="">[</span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2337"><span data-dcnode-id="652" instrument_node="">37</span></a><span data-dcnode-id="650" instrument_node="">]</span></span><span data-dcnode-id="648" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="643"><span data-dcnode-id="647" instrument_node="">[</span><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2339"><span data-dcnode-id="646" instrument_node="">39</span></a><span data-dcnode-id="644" instrument_node="">]</span></span></p><span data-dcnode-id="641" instrument_node="">
</span><span data-dcnode-id="640" instrument_node="">
</span></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="620" id="argument-21-popup"><h3 data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Pro 1</span></h3><span data-dcnode-id="636" instrument_node="">
</span><h4 data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">18 is the age of adulthood in the United States, and adults should have the right to make their own decisions about alcohol consumption.</span></h4><p data-dcnode-id="621"><span data-dcnode-id="633" instrument_node="">Turning 18 entails receiving the rights and responsibilities of adulthood to vote, serve on juries, get married, sign contracts, be prosecuted as adults, and join the military – which includes risking one’s life. </span><span class="footnotes-link" data-dcnode-id="628"><span data-dcnode-id="632" instrument_node="">[</span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%235"><span data-dcnode-id="631" instrument_node="">5</span></a><span data-dcnode-id="629" instrument_node="">]</span></span><span data-dcnode-id="627" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">[</span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%236"><span data-dcnode-id="625" instrument_node="">6</span></a><span data-dcnode-id="623" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="607" id="argument-22-popup"><h3 data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Pro 2</span></h3><span data-dcnode-id="617" instrument_node="">
</span><h4 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Allowing 18- to 20-year-olds to drink alcohol in regulated environments with supervision would decrease unsafe drinking activity.</span></h4><p data-dcnode-id="608"><span data-dcnode-id="614" instrument_node="">Prohibiting this age group from drinking in bars, restaurants, and other licensed locations causes them to drink in unsupervised places such as fraternity houses or house parties where they may be more prone to binge drinking and other unsafe behavior. </span><span class="footnotes-link" data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">[</span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%237"><span data-dcnode-id="612" instrument_node="">7</span></a><span data-dcnode-id="610" instrument_node="">] </span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="558" id="argument-23-popup"><h3 data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Pro 3</span></h3><span data-dcnode-id="604" instrument_node="">
</span><h4 data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">There are fewer drunk driving traffic accidents and fatalities in many countries with MLDA of 18.</span></h4><p data-dcnode-id="559"><span data-dcnode-id="601" instrument_node="">In the United States, 31% of road traffic deaths involve alcohol. </span><span class="footnotes-link" data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">[</span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2348"><span data-dcnode-id="599" instrument_node="">48</span></a><span data-dcnode-id="597" instrument_node="">]</span></span><span data-dcnode-id="595" instrument_node=""> This percentage is higher than many countries with a drinking age lower than 21 such as France (29%), Great Britain (16%), Germany (9%), China (4%), and Israel (3%). </span><span class="footnotes-link" data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">[</span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2348"><span data-dcnode-id="593" instrument_node="">48</span></a><span data-dcnode-id="591" instrument_node="">]</span></span><span data-dcnode-id="589" instrument_node=""> Although the United States increased the MLDA to 21 in 1984, its rate of traffic accidents and fatalities in the 1980s decreased less than that of European countries whose legal drinking ages are lower than 21. </span><span class="footnotes-link" data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">[</span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%238"><span data-dcnode-id="587" instrument_node="">8</span></a><span data-dcnode-id="585" instrument_node="">]</span></span><span data-dcnode-id="583" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">[</span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%239"><span data-dcnode-id="581" instrument_node="">9</span></a><span data-dcnode-id="579" instrument_node="">]</span></span><span data-dcnode-id="577" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">[</span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2310"><span data-dcnode-id="575" instrument_node="">10</span></a><span data-dcnode-id="573" instrument_node="">]</span></span><span data-dcnode-id="571" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">[</span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2311"><span data-dcnode-id="569" instrument_node="">11</span></a><span data-dcnode-id="567" instrument_node="">]</span></span><span data-dcnode-id="565" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">[</span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2312"><span data-dcnode-id="563" instrument_node="">12</span></a><span data-dcnode-id="561" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="545" id="argument-24-popup"><h3 data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Pro 4</span></h3><span data-dcnode-id="555" instrument_node="">
</span><h4 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">The decrease in drunk driving fatalities as a percentage of total traffic fatalities in the United States does not correlate to the MLDA.</span></h4><p data-dcnode-id="546"><span data-dcnode-id="552" instrument_node="">Since 1982, two years prior to the Uniform Drinking Age Act establishing an MLDA of 21, a decline of drunk driving fatalities occurred across all age groups and demographic categories, and therefore cannot be reliably attributed to MLDA 21. </span><span class="footnotes-link" data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">[</span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2313"><span data-dcnode-id="550" instrument_node="">13</span></a><span data-dcnode-id="548" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="526" id="argument-25-popup"><h3 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Pro 5</span></h3><span data-dcnode-id="542" instrument_node="">
</span><h4 data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Lowering MLDA from 21 to 18 would diminish the thrill of breaking the law to get a drink.</span></h4><p data-dcnode-id="527"><span data-dcnode-id="539" instrument_node="">Normalizing alcohol consumption as something done responsibly in moderation will make drinking alcohol less of a taboo for young adults entering college and the workforce. </span><span class="footnotes-link" data-dcnode-id="534"><span data-dcnode-id="538" instrument_node="">[</span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2314"><span data-dcnode-id="537" instrument_node="">14</span></a><span data-dcnode-id="535" instrument_node="">]</span></span><span data-dcnode-id="533" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="528"><span data-dcnode-id="532" instrument_node="">[</span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2315"><span data-dcnode-id="531" instrument_node="">15</span></a><span data-dcnode-id="529" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="507" id="argument-26-popup"><h3 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Pro 6</span></h3><span data-dcnode-id="523" instrument_node="">
</span><h4 data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">MLDA 21 is largely ineffective because teens consume regardless.</span></h4><p data-dcnode-id="508"><span data-dcnode-id="520" instrument_node="">According to the National Center on Addiction and Substance Abuse, underage drinking accounts for 17.5% ($22.5 billion) of consumer spending for alcohol in the United States. </span><span class="footnotes-link" data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">[</span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2316"><span data-dcnode-id="518" instrument_node="">16</span></a><span data-dcnode-id="516" instrument_node="">]</span></span><span data-dcnode-id="514" instrument_node=""> The 2016 National Survey on Drug Use and Health reports that 24.8% of youth aged 14 or 15, 46.7% aged 16 or 17, and 68.3% aged 18 to 20, drink alcohol. </span><span class="footnotes-link" data-dcnode-id="509"><span data-dcnode-id="513" instrument_node="">[</span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="512" instrument_node="">49</span></a><span data-dcnode-id="510" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="494" id="argument-27-popup"><h3 data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Pro 7</span></h3><span data-dcnode-id="504" instrument_node="">
</span><h4 data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">High non-compliance with MLDA 21 promotes general disrespect and non-compliance with other areas of US law.</span></h4><p data-dcnode-id="495"><span data-dcnode-id="501" instrument_node="">MLDA 21 encourages young adults to acquire and use false identification documents to procure alcohol. In this era of national security concerns, including terrorism, illegal immigration, and other threats, it would be better to have fewer fake IDs in circulation and more respect for the law. </span><span class="footnotes-link" data-dcnode-id="496"><span data-dcnode-id="500" instrument_node="">[</span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2317"><span data-dcnode-id="499" instrument_node="">17</span></a><span data-dcnode-id="497" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="481" id="argument-28-popup"><h3 data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Pro 8</span></h3><span data-dcnode-id="491" instrument_node="">
</span><h4 data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">MLDA 21 enforcement is not a priority for many law enforcement agencies.</span></h4><p data-dcnode-id="482"><span data-dcnode-id="488" instrument_node="">Police are inclined to ignore or under-enforce MLDA 21 because of resource limitations, statutory obstacles, perceptions that punishments are inadequate, and the time and effort required for processing and paperwork. An estimated two of every 1,000 occasions of illegal drinking by youth under 21 results in an arrest. </span><span class="footnotes-link" data-dcnode-id="483"><span data-dcnode-id="487" instrument_node="">[</span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2318"><span data-dcnode-id="486" instrument_node="">18</span></a><span data-dcnode-id="484" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="468" id="argument-29-popup"><h3 data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Pro 9</span></h3><span data-dcnode-id="478" instrument_node="">
</span><h4 data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">MLDA 21 is not statistically associated with lower rates of suicide, homicide, or vandalism.</span></h4><p data-dcnode-id="469"><span data-dcnode-id="475" instrument_node="">In a 2002 meta-study of the legal drinking age and health and social problems, 72% of the studies found no statistically significant relationship despite claims that lowering the MLDA to 18 would increase suicide and criminal activities by adolescents. </span><span class="footnotes-link" data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">[</span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="473" instrument_node="">19</span></a><span data-dcnode-id="471" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="460" id="argument-30-popup"><h3 data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Pro 10</span></h3><span data-dcnode-id="465" instrument_node="">
</span><h4 data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Drinking alcohol is an enjoyable activity.</span></h4><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">18- to 20-year-old adults should not be denied that enjoyment when other pleasurable activities are legal at age 18.</span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="448" id="argument-31-popup"><h3 data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Pro 11</span></h3><span data-dcnode-id="457" instrument_node="">
</span><h4 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Lowering MLDA 21 would reduce the number of underage people who are hurt from alcohol-related injuries or accidents due to fear of legal consequences if they sought medical attention.</span></h4><p data-dcnode-id="449"><span class="footnotes-link" data-dcnode-id="450"><span data-dcnode-id="454" instrument_node="">[</span><a data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2317"><span data-dcnode-id="453" instrument_node="">7</span></a><span data-dcnode-id="451" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="435" id="argument-32-popup"><h3 data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Pro 12</span></h3><span data-dcnode-id="445" instrument_node="">
</span><h4 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">State governments should have the right to establish a lower legal drinking age that reflects their unique demographics, legal context, and history.</span></h4><p data-dcnode-id="436"><span data-dcnode-id="442" instrument_node="">The Uniform Drinking Act, which compelled states to set the legal drinking age at 21 by withholding ten percent of highway funding from states that kept the minimum legal drinking age at 18, is an example of federal government overreach into state affairs. Many states that were happy with their MLDA 18 bowed to federal pressure rather than lose millions in annual highway funds. </span><span class="footnotes-link" data-dcnode-id="437"><span data-dcnode-id="441" instrument_node="">[</span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2315"><span data-dcnode-id="440" instrument_node="">15</span></a><span data-dcnode-id="438" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="427" id="argument-33-popup"><h3 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Pro 13</span></h3><span data-dcnode-id="432" instrument_node="">
</span><h4 data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Lowering MLDA 21 would be good for the economy.</span></h4><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">More people would legally be able to drink in bars, restaurants, and other licensed establishments. Revenue would increase for private business owners, and greater amounts of tax revenue would be collected by the government.</span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="396" id="argument-34-popup"><h3 data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Con 1</span></h3><span data-dcnode-id="424" instrument_node="">
</span><h4 data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Lowering MLDA 21 would be medically irresponsible.</span></h4><p data-dcnode-id="397"><span data-dcnode-id="421" instrument_node="">Alcohol consumption can interfere with development of the young adult brain’s frontal lobes, essential for functions such as emotional regulation, planning, and organization. When alcohol consumption interferes with this early adult brain development, the potential for chronic problems such as greater vulnerability to addiction, dangerous risk-taking behavior, reduced decision-making ability, memory loss, depression, violence, and suicide is greater. </span><span class="footnotes-link" data-dcnode-id="416"><span data-dcnode-id="420" instrument_node="">[</span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2320"><span data-dcnode-id="419" instrument_node="">20</span></a><span data-dcnode-id="417" instrument_node="">]</span></span><span data-dcnode-id="415" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="410"><span data-dcnode-id="414" instrument_node="">[</span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2321"><span data-dcnode-id="413" instrument_node="">21</span></a><span data-dcnode-id="411" instrument_node="">]</span></span><span data-dcnode-id="409" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="404"><span data-dcnode-id="408" instrument_node="">[</span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2322"><span data-dcnode-id="407" instrument_node="">22</span></a><span data-dcnode-id="405" instrument_node="">]</span></span><span data-dcnode-id="403" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">[</span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2323"><span data-dcnode-id="401" instrument_node="">23</span></a><span data-dcnode-id="399" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="353" id="argument-35-popup"><h3 data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Con 2</span></h3><span data-dcnode-id="393" instrument_node="">
</span><h4 data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Lowering MLDA 21 to 18 will irresponsibly allow a greater segment of the population to drink alcohol in bars and nightclubs, which are not safe environments.</span></h4><p data-dcnode-id="354"><span data-dcnode-id="390" instrument_node="">76% of bars have sold alcohol to obviously intoxicated patrons </span><span class="footnotes-link" data-dcnode-id="385"><span data-dcnode-id="389" instrument_node="">[</span><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2343"><span data-dcnode-id="388" instrument_node="">43</span></a><span data-dcnode-id="386" instrument_node="">]</span></span><span data-dcnode-id="384" instrument_node="">, and about half of drivers arrested for driving while intoxicated (DWI) or killed as alcohol-involved drivers in traffic crashes did their drinking at licensed establishments </span><span class="footnotes-link" data-dcnode-id="379"><span data-dcnode-id="383" instrument_node="">[</span><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2344"><span data-dcnode-id="382" instrument_node="">44</span></a><span data-dcnode-id="380" instrument_node="">]</span></span><span data-dcnode-id="378" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="373"><span data-dcnode-id="377" instrument_node="">[</span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2345"><span data-dcnode-id="376" instrument_node="">45</span></a><span data-dcnode-id="374" instrument_node="">]</span></span><span data-dcnode-id="372" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="367"><span data-dcnode-id="371" instrument_node="">[</span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2346"><span data-dcnode-id="370" instrument_node="">46</span></a><span data-dcnode-id="368" instrument_node="">]</span></span><span data-dcnode-id="366" instrument_node="">. Neighborhoods with higher densities of bars, nightclubs, and other alcohol-selling locations suffer more frequent assaults and other violent crimes. </span><span class="footnotes-link" data-dcnode-id="361"><span data-dcnode-id="365" instrument_node="">[</span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2324"><span data-dcnode-id="364" instrument_node="">24</span></a><span data-dcnode-id="362" instrument_node="">]</span></span><span data-dcnode-id="360" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="355"><span data-dcnode-id="359" instrument_node="">[</span><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2325"><span data-dcnode-id="358" instrument_node="">25</span></a><span data-dcnode-id="356" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="340" id="argument-36-popup"><h3 data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Con 3</span></h3><span data-dcnode-id="350" instrument_node="">
</span><h4 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">The right to drink should have a higher age of initiation because of the dangers posed by drinking.</span></h4><p data-dcnode-id="341"><span data-dcnode-id="347" instrument_node="">Many rights in the United States are conferred on citizens at age 21 or older. A person cannot legally purchase a handgun, gamble in a casino (in most states), or adopt a child until age 21, rent a car (for most companies) at age 25, or run for President until age 35. Drinking should be similarly restricted due to the responsibility required to self and others. </span><span class="footnotes-link" data-dcnode-id="342"><span data-dcnode-id="346" instrument_node="">[</span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2324"><span data-dcnode-id="345" instrument_node="">24</span></a><span data-dcnode-id="343" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="315" id="argument-37-popup"><h3 data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Con 4</span></h3><span data-dcnode-id="337" instrument_node="">
</span><h4 data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">MLDA 21 reduces traffic accidents and fatalities.</span></h4><p data-dcnode-id="316"><span data-dcnode-id="334" instrument_node="">100 of the 102 analyses (98%) in a meta-study of the legal drinking age and traffic accidents found higher legal drinking ages associated with lower rates of traffic accidents. </span><span class="footnotes-link" data-dcnode-id="329"><span data-dcnode-id="333" instrument_node="">[</span><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="332" instrument_node="">19</span></a><span data-dcnode-id="330" instrument_node="">]</span></span><span data-dcnode-id="328" instrument_node=""> In the 30 years since MLDA 21 was introduced, drunk driving fatalities decreased by a third. </span><span class="footnotes-link" data-dcnode-id="323"><span data-dcnode-id="327" instrument_node="">[</span><a data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2350"><span data-dcnode-id="326" instrument_node="">50</span></a><span data-dcnode-id="324" instrument_node="">]</span></span><span data-dcnode-id="322" instrument_node=""> The National Highway Traffic Safety Administration (NHTSA) estimates that MLDA 21 has saved 31,417 lives from 1975-2016. </span><span class="footnotes-link" data-dcnode-id="317"><span data-dcnode-id="321" instrument_node="">[</span><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2350"><span data-dcnode-id="320" instrument_node="">50</span></a><span data-dcnode-id="318" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="281" id="argument-38-popup"><h3 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Con 5</span></h3><span data-dcnode-id="312" instrument_node="">
</span><h4 data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">MLDA 21 reduces alcohol consumption and the number of underage drinkers.</span></h4><p data-dcnode-id="282"><span data-dcnode-id="309" instrument_node="">87% of studies, according to a meta study on MLDA, found higher legal drinking ages associated with lower alcohol consumption. </span><span class="footnotes-link" data-dcnode-id="304"><span data-dcnode-id="308" instrument_node="">[</span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2319"><span data-dcnode-id="307" instrument_node="">19</span></a><span data-dcnode-id="305" instrument_node="">]</span></span><span data-dcnode-id="303" instrument_node=""> Studies indicate that when the drinking age is 21, those younger than 21 drink less and continue to drink less through their early 20s, and that youth who do not drink until they are 21 tend to drink less as adults. </span><span class="footnotes-link" data-dcnode-id="298"><span data-dcnode-id="302" instrument_node="">[</span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2342"><span data-dcnode-id="301" instrument_node="">42</span></a><span data-dcnode-id="299" instrument_node="">]</span></span><span data-dcnode-id="297" instrument_node=""> The number of 18-to-20 year-olds who report drinking alcohol in the past month has decreased from 59% in 1985 – one year after Congress passed the </span><span data-dcnode-id="295" style="font-style: italic;"><span data-dcnode-id="296" instrument_node="">National Minimum Drinking Age Act</span></span><span data-dcnode-id="294" instrument_node=""> – to 39% in 2016. </span><span class="footnotes-link" data-dcnode-id="289"><span data-dcnode-id="293" instrument_node="">[</span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="292" instrument_node="">49</span></a><span data-dcnode-id="290" instrument_node="">]</span></span><span data-dcnode-id="288" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="283"><span data-dcnode-id="287" instrument_node="">[</span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2351"><span data-dcnode-id="286" instrument_node="">51</span></a><span data-dcnode-id="284" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="251" id="argument-39-popup"><h3 data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Con 6</span></h3><span data-dcnode-id="278" instrument_node="">
</span><h4 data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">MLDA 21 should not be lowered to mirror European drinking age limits because the rate of drinking among US teenagers is lower than most European countries.</span></h4><p data-dcnode-id="252"><span data-dcnode-id="275" instrument_node="">20% of American youth aged 16-to-17 and 7.4% aged 14-to-15 report drinking alcohol in the past month compared to an average 38% of European youth aged 15-to-16 years. </span><span class="footnotes-link" data-dcnode-id="270"><span data-dcnode-id="274" instrument_node="">[</span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="273" instrument_node="">49</span></a><span data-dcnode-id="271" instrument_node="">]</span></span><span data-dcnode-id="269" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="264"><span data-dcnode-id="268" instrument_node="">[</span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2352"><span data-dcnode-id="267" instrument_node="">52</span></a><span data-dcnode-id="265" instrument_node="">]</span></span><span data-dcnode-id="263" instrument_node=""> US teenagers aged 16-to-17 also show lower rates of binge drinking (12.6%) than do 15-to-16 year-olds from Europe (35%). </span><span class="footnotes-link" data-dcnode-id="258"><span data-dcnode-id="262" instrument_node="">[</span><a data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="261" instrument_node="">49</span></a><span data-dcnode-id="259" instrument_node="">]</span></span><span class="footnotes-link" data-dcnode-id="253"><span data-dcnode-id="257" instrument_node="">[</span><a data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2352"><span data-dcnode-id="256" instrument_node="">52</span></a><span data-dcnode-id="254" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="238" id="argument-40-popup"><h3 data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Con 7</span></h3><span data-dcnode-id="248" instrument_node="">
</span><h4 data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">MLDA 18 is not a right.</span></h4><p data-dcnode-id="239"><span data-dcnode-id="245" instrument_node="">A US district court ruled on Dec. 22, 1978 that MLDA 21 is “reasonably related to a state objective of reducing highway crashes,” and that MLDA 21 withstands a constitutional challenge on three key legal issues: (1) drinking alcohol is not a “fundamental” right guaranteed by the Constitution, (2) age is not inherently a “suspect” criteria for discrimination (in contrast to race or ethnicity, for example) and (3) using the drinking age to prevent highway crashes has a “rational basis” in available scientific evidence. </span><span class="footnotes-link" data-dcnode-id="240"><span data-dcnode-id="244" instrument_node="">[</span><a data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2329"><span data-dcnode-id="243" instrument_node="">29</span></a><span data-dcnode-id="241" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="207" id="argument-41-popup"><h3 data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Con 8</span></h3><span data-dcnode-id="235" instrument_node="">
</span><h4 data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">The American public overwhelmingly supports MLDA 21.</span></h4><p data-dcnode-id="208"><span data-dcnode-id="232" instrument_node="">A survey for the Center for Alcohol Policy found that 86% of Americans support the legal drinking age being set at 21. </span><span class="footnotes-link" data-dcnode-id="227"><span data-dcnode-id="231" instrument_node="">[</span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2354"><span data-dcnode-id="230" instrument_node="">54</span></a><span data-dcnode-id="228" instrument_node="">]</span></span><span data-dcnode-id="226" instrument_node=""> Numerous state and national surveys dating from the 1970s (when states were raising the legal drinking age) through the present have shown overwhelming public support for MLDA 21. </span><span class="footnotes-link" data-dcnode-id="221"><span data-dcnode-id="225" instrument_node="">[</span><a data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2330"><span data-dcnode-id="224" instrument_node="">30</span></a><span data-dcnode-id="222" instrument_node="">]</span></span><span data-dcnode-id="220" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="215"><span data-dcnode-id="219" instrument_node="">[</span><a data-dcnode-id="217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2331"><span data-dcnode-id="218" instrument_node="">31</span></a><span data-dcnode-id="216" instrument_node="">]</span></span><span data-dcnode-id="214" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="209"><span data-dcnode-id="213" instrument_node="">[</span><a data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2332"><span data-dcnode-id="212" instrument_node="">32</span></a><span data-dcnode-id="210" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="188" id="argument-42-popup"><h3 data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Con 9</span></h3><span data-dcnode-id="204" instrument_node="">
</span><h4 data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Lowering MLDA 21 would give high schoolers and even middle schoolers easier access to alcohol.</span></h4><p data-dcnode-id="189"><span data-dcnode-id="201" instrument_node="">Newly-legal drinkers often purchase alcohol for their underage peers, creating a “trickle-down” effect. </span><span class="footnotes-link" data-dcnode-id="196"><span data-dcnode-id="200" instrument_node="">[</span><a data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2334"><span data-dcnode-id="199" instrument_node="">34</span></a><span data-dcnode-id="197" instrument_node="">]</span></span><span data-dcnode-id="195" instrument_node=""> Surveys show that the most common source of alcohol among 18- to 20-year olds is their 21- to 24-year-old peers. </span><span class="footnotes-link" data-dcnode-id="190"><span data-dcnode-id="194" instrument_node="">[</span><a data-dcnode-id="192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2335"><span data-dcnode-id="193" instrument_node="">35</span></a><span data-dcnode-id="191" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="175" id="argument-43-popup"><h3 data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Con 10</span></h3><span data-dcnode-id="185" instrument_node="">
</span><h4 data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">MLDA 21 helps prevent underage binge drinking.</span></h4><p data-dcnode-id="176"><span data-dcnode-id="182" instrument_node="">Binge drinking peaks among 21- to 25-year-olds at 45.4%, while the binge drinking rates of those aged 12-13, 14-15, 16-17, and 18-20 are 0.3%, 3.7%, 10.2%, and 26.2% respectively. </span><span class="footnotes-link" data-dcnode-id="177"><span data-dcnode-id="181" instrument_node="">[</span><a data-dcnode-id="179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2349"><span data-dcnode-id="180" instrument_node="">49</span></a><span data-dcnode-id="178" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="162" id="argument-44-popup"><h3 data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Con 11</span></h3><span data-dcnode-id="172" instrument_node="">
</span><h4 data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">MLDA 21 exerts valuable social pressure on potential underage drinkers and those who may serve them.</span></h4><p data-dcnode-id="163"><span data-dcnode-id="169" instrument_node="">Youth may choose not to drink, or to drink less often, because of decreased social acceptability or increased risks from parental or legal authorities. Older youth and adults may furnish alcoholic beverages to minors less frequently, and licensed alcohol outlets may sell to minors less frequently, because of their perceptions that it is illegal, morally wrong, or because they might be caught. </span><span class="footnotes-link" data-dcnode-id="164"><span data-dcnode-id="168" instrument_node="">[</span><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2318"><span data-dcnode-id="167" instrument_node="">18</span></a><span data-dcnode-id="165" instrument_node="">]</span></span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="154" id="argument-45-popup"><h3 data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Con 12</span></h3><span data-dcnode-id="159" instrument_node="">
</span><h4 data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">The MLDA should stay at 21 because people tend to be more mature and responsible at 21 than 18.</span></h4><p data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">18-year-olds are typically entering a new phase of independence from their parents through college or the workforce, and are more susceptible to binge drinking, risky sexual activity, and other irresponsible behavior due to lack of maturity.</span></p></div><div class="mfp-white-popup mfp-hide" data-dcnode-id="129" id="argument-46-popup"><h3 data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Con 13</span></h3><span data-dcnode-id="151" instrument_node="">
</span><h4 data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Lowering the drinking age will invite more use of illicit drugs among 18-21 year olds.</span></h4><p data-dcnode-id="130"><span data-dcnode-id="148" instrument_node="">A peer-reviewed study from the Journal of Studies of Alcohol and Drugs found that the younger a person begins to drink alcohol the more likely it is that they will use other illicit drugs. </span><span class="footnotes-link" data-dcnode-id="143"><span data-dcnode-id="147" instrument_node="">[</span><a data-dcnode-id="145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2338"><span data-dcnode-id="146" instrument_node="">38</span></a><span data-dcnode-id="144" instrument_node="">]</span></span><span data-dcnode-id="142" instrument_node=""> Lowering MLDA 21 would increase the number of teens who drink and therefore the number of teens who use other drugs. </span><span class="footnotes-link" data-dcnode-id="137"><span data-dcnode-id="141" instrument_node="">[</span><a data-dcnode-id="139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2337"><span data-dcnode-id="140" instrument_node="">37</span></a><span data-dcnode-id="138" instrument_node="">]</span></span><span data-dcnode-id="136" instrument_node=""> </span><span class="footnotes-link" data-dcnode-id="131"><span data-dcnode-id="135" instrument_node="">[</span><a data-dcnode-id="133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/additional-resources/footnotes-sources/%2339"><span data-dcnode-id="134" instrument_node="">39</span></a><span data-dcnode-id="132" instrument_node="">]</span></span></p></div><img alt="" data-dcnode-id="128" height="5" id="wpstats" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixel.wp.com/g.gif%3F
