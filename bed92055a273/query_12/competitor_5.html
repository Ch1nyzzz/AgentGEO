<span data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Good Essays</span></span></div><ul class="weight-700 padding-left-1 share-block" data-dcnode-id="577"><li data-dcnode-id="581"><span class="text-s" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">2147 Words</span></span></li><li data-dcnode-id="578"><span class="text-s" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">9 Pages</span></span></li></ul><div class="margin-top-auto" data-dcnode-id="574"><a class="button button--orange button--squarish text-m button--orange" data-dcnode-id="575" data-href="/writing/document/FJS99HWYMV" href="javascript:void(0);" id="ShowMoreButtonExtra" rel="nofollow"><span data-dcnode-id="576" instrument_node="">Open Document</span></a></div></div></div></div><div class="columns small-12 medium-4 large-4 rhino-slot" data-dcnode-id="570" id="AdPreviewRowSidebar"></div></div><div class="row essay-preview-block" data-dcnode-id="519" id="divPreviewBlock"><div class="columns large-8 paper-container paper-container--with-sidebar position-relative border-box-shadow margin-4 padding-2" data-dcnode-id="534"><div class="" data-dcnode-id="536"><div class="position-relative margin-4 text-xl" data-dcnode-id="537"><div data-dcnode-id="568" id="essay-body-heading-details"></div><div class="document__body white-space--break-spaces text-ellipsis-after break-word" data-dcnode-id="542"><span class="document__preview text-l source-serif" data-dcnode-id="558"><span data-dcnode-id="567" instrument_node="">In the United States, the bastion of democracy, all is not right with its voting system. Election after election voters are left dissatisfied. Voters feel like they are stuck choosing between the lesser of two evils, instead of who they want to govern. This is not because of some giant collusion between the rich or the illuminati to put who they want in power. It is the result of our </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/voting" style="color:#3174a3"><span data-dcnode-id="566" instrument_node="">voting</span></a><span data-dcnode-id="564" instrument_node=""> methods that create a two-party system. Elections in America are marked by polarization, gerrymandering, unfair representation, negative campaigns, and limited choice. There has to be a way to make American elections better. Some believe that this way is ranked-choice voting.</span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">
The process of ranked choice voting is simple. On </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/election" style="color:#3174a3"><span data-dcnode-id="561" instrument_node="">election</span></a><span data-dcnode-id="559" instrument_node=""> day, voters put the</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="555" data-href="/writing/document/FJS99HWYMV" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="554"><span class="document__preview text-l source-serif" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Our current Republican-Democrat system has been around since Abraham Lincoln. Old parties won by assembling coalitions and nominating candidates who appealed to the whole of the party. This meant that it was hard for fringe elements to break through (Portland Press). The opposite is true today. Parties nominate more and more extreme candidates because elections are in the hands of primary voters more than ever. Primary voters tend to be the most extreme of either party (FairVote). The reason that parties are not being punished for nominating extreme candidates is that an increase in partisan rigidity has led to less competitive state and national elections and more predictable results based on which party is in the majority (FairVote). In a safe republican district like NW Iowa, republican primary voters can nominate an extremist who will not compromise, like some would say Steve King is, and voters will vote for him in November simply because he has an (R) next to his name. There are less and less politicians representative of the majority, instead it is a vocal minority that are winning elections across America. Parties used to play the role of consolidating opinion and building big coalitions that could win elections, but it’s unrealistic to believe that they can reclaim that role (Portland</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="549" data-href="/writing/document/FJS99HWYMV" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="548"><span class="document__preview text-l source-serif" data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">Simply put, gerrymandering is the act of politicians meddling in the redrawing of legislative districts to help their party and friends, and hurt the other party and their enemies (FairVote). Our current, winner take all, </span><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/voting-system" style="color:#3174a3"><span data-dcnode-id="546" instrument_node="">voting system</span></a><span data-dcnode-id="544" instrument_node=""> allows the gerrymandering we see today. In 2013, Republican candidates for the New Jersey assembly won 51% of the vote, but only 32 (40%) of 80 seats. In 2014, Democratic U.S. House candidates won 57% of votes in California’s 53 U.S. House races, but 74% of seats (FairVote). The two most common methods used to gerrymander districts are cracking and packing. Cracking is reducing the chance of an opponent winning by splitting up their voters into several districts, ensuring that they never reach a plurality in any district. Packing buts all of the opposing party’s voters into one district, ensuring that they will win a maximum of one district (Portland Press). Ranked choice voting has two ways it attacks</span></span></div><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="541"></div><div class="center paper__cta" data-dcnode-id="538"><a class="button text-m button--orange" data-dcnode-id="539" data-href="/writing/document/FJS99HWYMV" href="javascript:void(0)" id="ShowMoreButton" rel="nofollow"><span data-dcnode-id="540" instrument_node="">Get Access</span></a></div></div></div><div class="rhino-slot center" data-dcnode-id="535" id="AdCenterMiddle"></div></div><div class="columns large-4 hide-for-medium-only hide-for-small-only" data-dcnode-id="520"><div class="rhino-slot center" data-dcnode-id="533" id="AdSidebarTop"></div><ul class="card--sidebar-nav__list" data-dcnode-id="522"><li class="rhino-slot side-items" data-dcnode-id="532" id="sidebar-nav1"></li><li class="rhino-slot side-items" data-dcnode-id="531" id="sidebar-nav2"></li><li class="rhino-slot side-items" data-dcnode-id="530" id="sidebar-nav3"></li><li class="rhino-slot side-items" data-dcnode-id="529" id="sidebar-nav4"></li><li class="rhino-slot side-items" data-dcnode-id="528" id="sidebar-nav5"></li><li class="rhino-slot side-items" data-dcnode-id="527" id="sidebar-nav6"></li><li class="rhino-slot side-items" data-dcnode-id="526" id="sidebar-nav7"></li><li class="rhino-slot side-items" data-dcnode-id="525" id="sidebar-nav8"></li><li class="rhino-slot side-items" data-dcnode-id="524" id="sidebar-nav9"></li><li class="rhino-slot side-items" data-dcnode-id="523" id="sidebar-nav10"></li></ul><div class="rhino-slot center" data-dcnode-id="521" id="AdSidebarBottom"></div></div></div><div class="row essay-preview-block essay-related-block" data-dcnode-id="162"><div class="columns large-12 padding-1 no-padding-large" data-dcnode-id="163"><div class="columns large-12 paper--related-separator-new" data-dcnode-id="516"><span class="paper--related-separator-word" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Related</span></span></div><section class="" data-dcnode-id="164"><ul class="unstyled" data-dcnode-id="165" id="RelatedDocumentCenter"><li data-dcnode-id="481" id="related-essay1"><div class="columns small-12 medium-12 large-12 card box-shadow card-grade-essay paper no-padding" data-dcnode-id="482"><div class="columns small-12 medium-12 hide-
