</span><h1 data-dcnode-id="6316"><img alt="therapy" class="wp-image-2933 aligncenter lazyloaded" data-dcnode-id="6320" data-src="https://empowerhealthinsuranceusa.com/wp-content/uploads/2018/06/mindy-jacobs-589308-unsplash-300x198.jpg" height="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//empowerhealthinsuranceusa.com/wp-content/uploads/2018/06/mindy-jacobs-589308-unsplash-300x198.jpg&amp;raw" width="470"><noscript data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">&lt;img class=" wp-image-2933 aligncenter" src="https://empowerhealthinsuranceusa.com/wp-content/uploads/2018/06/mindy-jacobs-589308-unsplash-300x198.jpg" alt="therapy" width="470" height="310" /&gt;</span></noscript><span data-dcnode-id="6317" instrument_node="">The Pros and Cons of Therapy</span></h1><span data-dcnode-id="6315" instrument_node="">
</span><p data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">Approximately 40% of Americans have received counselling or some form of psychotherapy. Another 36% of Americans say they are open to counselling. Counselling is something that no one should feel ashamed of, as many people need it. It’s important to seek the right help.</span></p><span data-dcnode-id="6312" instrument_node="">
</span><p data-dcnode-id="6310"><span data-dcnode-id="6311" instrument_node="">One of the main ways people seek help in this part of their life is consulting a relative or loved one. But some people aren’t able to relay their feelings to a loved one. As a result, they seek someone who won’t be biased and will truly help them instead of judging. This is where a therapist comes into play. Therapy is a method that many people are moving towards. With high&nbsp;success rates, therapists get to the root of our problems and help us better understand ourselves. Today, I would like to discuss the pros and cons of therapy, in case anyone has been on the edge about it.</span></p><span data-dcnode-id="6309" instrument_node="">
</span><h2 data-dcnode-id="6307"><span data-dcnode-id="6308" instrument_node="">Pros of Therapy</span></h2><span data-dcnode-id="6306" instrument_node="">
</span><p data-dcnode-id="6304"><span data-dcnode-id="6305" instrument_node="">Going to therapy is more than sitting down with someone who listens to you talk. The most common type of therapy is psychotherapy, which is based on personal interaction with a person to change behavior and overcome problems in desired ways. There are many pros to having a therapist work through your situation with you. For one, most therapists can possibly diagnosis your situation and help find the root of your problem. This will help you understand why you feel the way you do. Another thing a therapist offers is coping mechanisms to manage your problems when they begin to weigh heavy on your shoulders. Therapy also gives you someone to talk to, which can be hard due to the fact that some people get anxiety and don’t&nbsp;feel comfortable talking about their shame with friends or family.</span></p><span data-dcnode-id="6303" instrument_node="">
</span><h2 data-dcnode-id="6301"><span data-dcnode-id="6302" instrument_node="">Cons of Therapy</span></h2><span data-dcnode-id="6300" instrument_node="">
</span><p data-dcnode-id="6298"><span data-dcnode-id="6299" instrument_node="">Even though there are plenty of benefits to therapy, it can sometimes have its downsides. Being in therapy can give you the feeling of vulnerability, which no one likes especially with someone they just met. This vulnerability can also lead to transference – a psychotherapeutic term, meaning to transfer certain feelings or emotions to a therapist. There are several different forms of transference – some good and some bad. In some cases, the client may develop romantic feelings for the therapist, which can negatively affect the client-therapist relationship. Sometimes the negative transference merely means there’s conflict or blockage preventing a healthy working relationship. If that is the case, the client should simply seek out a different therapist. Just because one therapist doesn’t work for you does not mean that a different one won’t.</span></p><span data-dcnode-id="6297" instrument_node="">
</span><p data-dcnode-id="6295"><span data-dcnode-id="6296" instrument_node="">Additionally, going to a therapist may create a disconnect between you and your friends and family; if you only share your feelings with a therapist, then you’ll never truly have deeper, more meaningful relationships. You also might feel like the therapy doesn’t&nbsp;help or you are not making any progress. These are all common feelings, but it’s important to know that your therapist is trained to help you. And before you disregard it, it might be a good idea to try it.</span></p><span data-dcnode-id="6294" instrument_node="">
