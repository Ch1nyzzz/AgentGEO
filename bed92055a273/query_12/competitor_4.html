><span data-dcnode-id="639" instrument_node="">Decent Essays</span></span></div><ul class="weight-700 padding-left-1 share-block" data-dcnode-id="627"><li data-dcnode-id="634"><span class="text-s" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">705 Words</span></span></li><li data-dcnode-id="631"><span class="text-s" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">3 Pages</span></span></li><li data-dcnode-id="628"><span class="text-s" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">2 Works Cited</span></span></li></ul><div class="margin-top-auto" data-dcnode-id="624"><a class="button button--orange button--squarish text-m button--orange" data-dcnode-id="625" data-href="/writing/document/PKCJVNRSVC" href="javascript:void(0);" id="ShowMoreButtonExtra" rel="nofollow"><span data-dcnode-id="626" instrument_node="">Open Document</span></a></div></div></div></div><div class="columns small-12 medium-4 large-4 rhino-slot" data-dcnode-id="620" id="AdPreviewRowSidebar"></div></div><div class="row essay-preview-block" data-dcnode-id="564" id="divPreviewBlock"><div class="columns large-8 paper-container paper-container--with-sidebar position-relative border-box-shadow margin-4 padding-2" data-dcnode-id="579"><div class="" data-dcnode-id="581"><div class="position-relative margin-4 text-xl" data-dcnode-id="582"><div data-dcnode-id="618" id="essay-body-heading-details"></div><div class="document__body white-space--break-spaces text-ellipsis-after break-word" data-dcnode-id="587"><span class="document__preview text-l source-serif" data-dcnode-id="605"><span data-dcnode-id="617" instrument_node="">The legal voting age should be reduced to 16 instead of 18. We can work, we can join the army, we can even get married at the age of 16, but we can't vote at 16? We can leave school, we can move out of the family house and live on our own independently if we wanted to at the age of 16, but yet we are considered immature and not responsible enough to vote at 16, why?</span><br data-dcnode-id="616"><span data-dcnode-id="615" instrument_node="">
</span><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node="">
Why is electing a political representative much more important than authorising a 16 year old to go fight and potentially die for their country. </span><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">
</span><br data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">
The </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/voting" style="color:#3174a3"><span data-dcnode-id="608" instrument_node="">voting</span></a><span data-dcnode-id="606" instrument_node=""> age was lowered from 21 to 18 in 1969 during the Vietnam war, because it was only fair to those aged 18 - 20 dying for their country have a say in how the country is run. Therefore if 16 year olds are now capable of</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="602" data-href="/writing/document/PKCJVNRSVC" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="601"><span class="document__preview text-l source-serif" data-dcnode-id="588"><span data-dcnode-id="600" instrument_node="">If maturity is the issue, it important to take into account that 16 year olds are just as informed as 18 year olds (in some cases more so). In fact there could be many 20, 30, or even 40 year olds who are irresponsible, do not make informed decisions and are clueless; this does not mean we deny them the right vote. Just because they are older necessarily does not mean they know everything in detail about </span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/politics" style="color:#3174a3"><span data-dcnode-id="599" instrument_node="">politics</span></a><span data-dcnode-id="597" instrument_node=""> because they have more life experience and can make better informed judgements than a 16 year old. </span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">
</span><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">
What is it about electing a political representative that is seen to be much more important than choosing a life partner or becoming a soldier, why don't we have the rights of an adult? If we work for the government, and pay tax to the government, why can’t we have our say in it?</span><br data-dcnode-id="592"><span data-dcnode-id="591" instrument_node="">
</span><br data-dcnode-id="590"><span data-dcnode-id="589" instrument_node="">
