</span><h1 class="SingleTitle" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">The Drinking Age Debate: Pros and Cons of Lowering the Legal Drinking Age</span></h1><span data-dcnode-id="558" instrument_node="">
</span><div class="SingleText" data-dcnode-id="322"><span data-dcnode-id="557" instrument_node="">
</span><span class="date" data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">Posted on
				</span><time data-dcnode-id="554" datetime="2016-02-24 20:04"><span data-dcnode-id="555" instrument_node="">
					February 24, 2016				</span></time><span data-dcnode-id="553" instrument_node="">
</span></span><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">For decades, ever since the days of Prohibition, in fact, many politicians, academics, and parents alike have engaged in the drinking age debate – the question being whether or not the legal drinking age of 21 should be lowered to 18?</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="547" instrument_node="">The topic never seems to fully disappear, and New Hampshire and California are two of the latest states to reignite the drinking age debate with political proposals hoping to gain support from voters. The California proposal</span><a data-dcnode-id="544" href="#_ftn1" name="_ftnref1"><sup data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">[1]</span></sup></a><span data-dcnode-id="543" instrument_node=""> aims to make the purchase and consumption of alcohol legal for those 18 and up, while the New Hampshire bill</span><a data-dcnode-id="540" href="#_ftn2" name="_ftnref2"><sup data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">[2]</span></sup></a><span data-dcnode-id="539" instrument_node=""> would make it legal for those aged 18-20 to drink beer and wine, as long as they are in the presence of 21-and-over adults.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">The legal drinking age in our nation, which is dictated on a state-by-state basis, has a varied history. At the repeal of Prohibition, the legal drinking age was accepted nationwide as 21, but when the voting age dropped from 21 to 18 in the early 1970s, many states followed suit by lowering the drinking age as well. However, not long after, the National Minimum Drinking Age Act of 1984 was passed, punishing states that allowed persons under 21 to purchase and publicly possess alcoholic beverages.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Since then, all 50 states have again adopted the age of 21 (with some allowing special permissions, such as Wisconsin’s stipulation that persons under 21 may be served or consume alcohol if they are with a parent, legal guardian, or spouse who is of legal drinking age).</span></p><span data-dcnode-id="531" instrument_node="">
</span><h2 class="SingleTitle" data-dcnode-id="528"><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Should We Lower The Legal Drinking Age Again?</span></strong></h2><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="526" instrument_node="">A multitude of academic and politically-backed research has been conducted in order to answer the question, “Which age is best for the safety of young people?” No matter which side of the drinking age debate you agree with, it must be recognized that young adults will drink alcohol, no matter what the legal drinking age. According to the 2013 National Survey on Drug Use and Health</span><a data-dcnode-id="523" href="#_ftn3" name="_ftnref3"><sup data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">[3]</span></sup></a><span data-dcnode-id="522" instrument_node="">, approximately 35 percent of 15-year-olds state that they have had at least one alcoholic beverage in their lives, and about four out of five college students drink alcohol regularly.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Not sure if you believe the legal drinking age should be lowered to 18? Here are some of the most widely-recognized pros and cons of the drinking age debate.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="514" style="text-align: center;"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Pros to Reducing the Drinking Age:</span></strong></p><span data-dcnode-id="513" instrument_node="">
</span><ul data-dcnode-id="482"><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="503"><strong data-dcnode-id="509"><em data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">• &nbsp;It would decrease binge drinking:</span></em></strong><span data-dcnode-id="508" instrument_node=""> Many believe</span><a data-dcnode-id="505" href="#_ftn4" name="_ftnref4"><sup data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">[4]</span></sup></a><span data-dcnode-id="504" instrument_node=""> that if young adults had easier access to alcohol (without the need to obtain fake IDs, etc.), they would not feel the need to drink so excessively when given the opportunity.</span></li><span data-dcnode-id="502" instrument_node="">
</span><li data-dcnode-id="494"><strong data-dcnode-id="499"><em data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">• &nbsp; It would create a safer drinking environment:</span></em></strong><a data-dcnode-id="496" href="#_ftn5" name="_ftnref5"><sup data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">[5]</span></sup></a><span data-dcnode-id="495" instrument_node=""> A reduced drinking age would increase the likelihood of young adults calling the police or other authority figures when in need of help, such as when a friend is showing signs of alcohol poisoning or when they need a safe ride home.</span></li><span data-dcnode-id="493" instrument_node="">
</span><li data-dcnode-id="484"><strong data-dcnode-id="490"><em data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">• &nbsp; It’s simply unjust:</span></em></strong><span data-dcnode-id="489" instrument_node=""> Eighteen is the age we become an adult in the eyes of the law, and also when we are able to vote and serve in the military. The argument</span><a data-dcnode-id="486" href="#_ftn6" name="_ftnref6"><sup data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">[6]</span></sup></a><span data-dcnode-id="485" instrument_node="">, “I can serve my country, but I can’t be served a drink?” often comes up.</span></li><span data-dcnode-id="483" instrument_node="">
</span></ul><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">&nbsp;</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="475" style="text-align: center;"><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Cons to Lowering the Drinking Age:</span></strong></p><span data-dcnode-id="474" instrument_node="">
</span><ul data-dcnode-id="438"><span data-dcnode-id="473" instrument_node="">
</span><li data-dcnode-id="464"><strong data-dcnode-id="470"><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">• It would increase reckless driving behavior:</span></em></strong><span data-dcnode-id="469" instrument_node=""> Eighteen-year-olds are already inexperienced drivers – with the decreased inhibitions and poor judgment associated with just a few drinks, the roads could become even more dangerous. A 2002 meta-study by of the legal drinking age and traffic accidents found that higher legal drinking ages were associated with lower rates of traffic accidents</span><a data-dcnode-id="466" href="#_ftn7" name="_ftnref7"><sup data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">[7]</span></sup></a><span data-dcnode-id="465" instrument_node="">.</span></li><span data-dcnode-id="463" instrument_node="">
</span><li data-dcnode-id="450"><strong data-dcnode-id="460"><em data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">• &nbsp; Our brains aren’t fully developed at 18:</span></em></strong><span data-dcnode-id="459" instrument_node=""> In fact, many experts believe</span><a data-dcnode-id="456" href="#_ftn8" name="_ftnref8"><sup data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">[8]</span></sup></a><span data-dcnode-id="455" instrument_node=""> our brains aren’t fully mature until our mid-20s. That means “legal” adults can make serious decisions without a fully-developed brain, often leading to risky behavior. Plus, alcohol consumption in teens can lead to altered brain development</span><a data-dcnode-id="452" href="#_ftn9" name="_ftnref9"><sup data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">[9]</span></sup></a><span data-dcnode-id="451" instrument_node="">.</span></li><span data-dcnode-id="449" instrument_node="">
</span><li data-dcnode-id="440"><strong data-dcnode-id="446"><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">• &nbsp; It could lead to increased high school dropouts:</span></em></strong><span data-dcnode-id="445" instrument_node=""> The reduced drinking age of 18 in the 1970s and 80s led to an increased high school dropout rate – specifically, the rate shot up from 4 percent to 13 percent. Many fear that the same will happen again if we decide to reduce the legal drinking age</span><a data-dcnode-id="442" href="#_ftn10" name="_ftnref10"><sup data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">[10]</span></sup></a><span data-dcnode-id="441" instrument_node="">.</span></li><span data-dcnode-id="439" instrument_node="">
</span></ul><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">&nbsp;</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Whether the legal drinking age is 18 or 21, we must recognize that many young adults and teens will drink alcohol and even engage in binge drinking. And even more importantly, we must recognize that proper education is important for young adults to make safe, smart decisions regarding their own behaviors. While the drinking age debate rages on, we must continue to work hard to monitor and educate young adults about the dangers of alcohol abuse.</span></p><span data-dcnode-id="431" instrument_node="">
