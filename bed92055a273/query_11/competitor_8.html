</span><div class="vc_row wpb_row vc_inner vc_row-fluid" data-dcnode-id="2519"><div class="wpb_column vc_column_container vc_col-sm-3/5" data-dcnode-id="2558"><div class="vc_column-inner" data-dcnode-id="2559"><div class="wpb_wrapper" data-dcnode-id="2560"><h2 class="vc_custom_heading" data-dcnode-id="2617" style="font-size: 30px;text-align: left;font-family:Roboto;font-weight:500;font-style:normal;text-transform: none"><span data-dcnode-id="2618" instrument_node="">CARCERAL STUDIES CONSORTIUM</span></h2><span data-dcnode-id="2616" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="2562"><span data-dcnode-id="2615" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="2564"><span data-dcnode-id="2614" instrument_node="">
</span><p data-dcnode-id="2611" style="text-align: left;"><em data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">The Carceral Studies Consortium brings together faculty, staff and students from across the University of Oklahoma and beyond to cultivate and support rigorous research, pedagogy, and community engagement toward social transformation.</span></em></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2609" style="text-align: left;"></p><div class="yrm-content yrm-content-1 yrm-hide" data-after-action="" data-dcnode-id="2570" data-id="1" data-show-status="false" id="yrm-dahlu"><span data-dcnode-id="2608" instrument_node="">
</span><div class="yrm-inner-content-wrapper yrm-cntent-1" data-dcnode-id="2572" id="yrm-inner-content-yrm-dahlu"><p data-dcnode-id="2607"></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2603" style="text-align: left;"><span data-dcnode-id="2604" style="font-weight: 400;"><span data-dcnode-id="2605" instrument_node="">Our purpose is to provide one another with a structured context within which to:</span></span></p><span data-dcnode-id="2602" instrument_node="">
</span><ul data-dcnode-id="2584" style="text-align: left;"><span data-dcnode-id="2601" instrument_node="">
</span><li data-dcnode-id="2598" style="font-weight: 400;"><span data-dcnode-id="2599" style="font-weight: 400;"><span data-dcnode-id="2600" instrument_node="">support and share substantive, multi-disciplinary scholarship</span></span></li><span data-dcnode-id="2597" instrument_node="">
</span><li data-dcnode-id="2594" style="font-weight: 400;"><span data-dcnode-id="2595" style="font-weight: 400;"><span data-dcnode-id="2596" instrument_node="">collaborate on pedagogical praxes</span></span></li><span data-dcnode-id="2593" instrument_node="">
</span><li data-dcnode-id="2590" style="font-weight: 400;"><span data-dcnode-id="2591" style="font-weight: 400;"><span data-dcnode-id="2592" instrument_node="">mentor students, pre-tenure faculty, and activists</span></span></li><span data-dcnode-id="2589" instrument_node="">
</span><li data-dcnode-id="2586" style="font-weight: 400;"><span data-dcnode-id="2587" style="font-weight: 400;"><span data-dcnode-id="2588" instrument_node="">and, foster scholarship-driven community partnerships and projects&nbsp;</span></span></li><span data-dcnode-id="2585" instrument_node="">
</span></ul><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2575" style="text-align: left;"><span data-dcnode-id="2581" style="font-weight: 400;"><span data-dcnode-id="2582" instrument_node="">Through the exchange and enrichment of ideas among colleagues, the </span></span><i data-dcnode-id="2578"><span data-dcnode-id="2579" style="font-weight: 400;"><span data-dcnode-id="2580" instrument_node="">Carceral Studies In</span></span></i><span data-dcnode-id="2576" style="font-weight: 400;"><span data-dcnode-id="2577" instrument_node=""> consortium at OU creates connections across disciplines, fields, and colleges, and encourages curricular, scholarly, and community/political collaboration.</span></span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2573" style="text-align: left;"></p></div><span data-dcnode-id="2571" instrument_node="">
</span></div><div class="yrm-btn-wrapper yrm-inline-wrapper yrm-btn-wrapper-1 yrm-more-button-wrapper" data-dcnode-id="2566"><span class="yrm-toggle-expand yrm-toggle-expand-1" data-dcnode-id="2567" data-less="Close" data-less-title="" data-more="Learn more" data-more-title="" data-rel="yrm-dahlu" style="border: none; width: 100%;" title=""><span class="yrm-button-text-1 yrm-button-text-span" data-dcnode-id="2568" style="font-size: 14px; font-weight: 300;"><span data-dcnode-id="2569" instrument_node="">Learn more</span></span></span></div><span data-dcnode-id="2565" instrument_node="">

</span></div></div></div><div class="wpb_column vc_column_container vc_col-sm-2/5" data-dcnode-id="2520"><div class="vc_column-inner" data-dcnode-id="2521"><div class="wpb_wrapper" data-dcnode-id="2522"><h3 class="vc_custom_heading" data-dcnode-id="2556" style="font-size: 25px;text-align: left;font-family:Roboto;font-weight:500;font-style:normal;text-transform: none"><span data-dcnode-id="2557" instrument_node="">About Carceral Studies</span></h3><span data-dcnode-id="2555" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="2524"><span data-dcnode-id="2554" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="2526"><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" style="font-weight: 400;"><span data-dcnode-id="2552" instrument_node="">Carceral Studies takes as its primary subject of inquiry the contemporary problem of states and societies organized by punishment and incarceration.&nbsp;</span></span></p><span data-dcnode-id="2549" instrument_node="">
</span><div class="yrm-content yrm-content-1 yrm-hide" data-after-action="" data-dcnode-id="2532" data-id="1" data-show-status="false" id="yrm-OD4JI"><span data-dcnode-id="2548" instrument_node="">
</span><div class="yrm-inner-content-wrapper yrm-cntent-1" data-dcnode-id="2534" id="yrm-inner-content-yrm-OD4JI"><span data-dcnode-id="2546" style="font-weight: 400;"><span data-dcnode-id="2547" instrument_node="">This cutting-edge, robust area of scholarship extends this inquiry into the wide range of conditions that organize social and political systems—from cultural thought to the built environment to apparatuses of state governance—that shape, sustain, and entrench practices and commonsense notions of punishment and incarceration.</span></span><p data-dcnode-id="2545"></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2541"><span data-dcnode-id="2542" style="font-weight: 400;"><span data-dcnode-id="2543" instrument_node="">Carceral Studies is concerned with both the independent function and nexus of these systems.For instance, a political science theorist might ask: How is contemporary nationalism framed to privilege patriotism in its punitive forms? A population health scholar might inquire: How does the commonsense punishing of poverty as a personal failure lead to pockets of drug addiction, or other patterns of human behavior linked to higher rates of incarceration? A literary scholar might ask: How do troubling norms of the memoir genre entrench punishment as a productive prompt for learning, growth, and independence? And, a legal theorist might inquire: How do anti-immigration litigation and legal constructions of citizenship naturalize detention and incarceration as legitimate punishments over and above human rights?</span></span></p><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2538" style="font-weight: 400;"><span data-dcnode-id="2539" instrument_node="">Carceral Studies convenes scholars asking related questions across a range of disciplines and fields and brings them into analytical conversation. Specifically, it forms a scholarly nexus of these lines of inquiry, building capacity for more rigorous, far-reaching observation. For instance, a collective comprised of Education, Architecture, Human Geography, Economics, and Political Science scholars might offer a dexterous, fertile analysis of the ways in which schools and prisons interact to cement mass incarceration. In so doing, they also offer the greatest possibility for intervention and transformation. This multi-disciplinary observation promises to address some of our most pressing social issues of our time and context. In fact, it is the premise of Carceral Studies that the problem of carcerality can only be addressed by the sophisticated coming-together of different disciplines and fields, a rich array of theoretical traditions, and a diverse set of methodological interventions. It does not privilege one above the other, but rather presumes the necessity of the whole. In this way Carceral Studies not only promises to move us toward a more just society, it also offers a model of necessarily collaborative scholarly endeavor.</span></span></p><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2535"></p></div><span data-dcnode-id="2533" instrument_node="">

The University of Oklahoma is on the traditional lands of the Caddo Nation and the Wichita and Affiliated Tribes. This land was also once part of the Muscogee Creek and Seminole nations. It also served as a hunting ground, trade exchange point, and migration route for the Apache, Cheyenne, Comanche, Kiowa, and Osage nations. Today, 39 federally recognized Tribal nations dwell in what is now the State of Oklahoma as a result of settler colonial policies designed to confine and forcefully assimilate Indigenous peoples.
