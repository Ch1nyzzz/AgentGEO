tions, invariably applied a gendered framework whereby ideas about femininity, masculinity and gendered sexual behaviours were predominant. These ideas pathologised behaviours that did not fit the model. For instance, Dr Margaret Christie Brown from the London centre applied what she called ‘the Freudian theory of psychosexual development’ to help clients enjoy their sexuality. She considered that past events and childhood relationships could act as an unconscious blockage in the sexual life. For instance, she explained that a proportion of girls were sexually unresponsive because they partially rejected their female role and ‘had identified with their father instead of their mother’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3152" href="#ref-23" id="xref-ref-23-2"><span data-dcnode-id="3153" instrument_node="">Christie Brown 1974</span></a><span data-dcnode-id="3151" instrument_node="">). She explained that these girls had a history of ‘tomboyishness and were ambivalent in appearance and frequently wore boys’ clothes’. They had a dominant personality and were usually ambitious. Helping them to identify these elements by themselves was thought to be a first step towards sexual adjustment and would offer a way out of pathologised behaviours. Similarly, clinic doctor Ruth MacGillivray had a gendered understanding of young people’s sexual behaviours where ‘boys have tremendous sexual drive’ and girls ‘are more interested in attracting the opposite sex for reasons of prestige and companionship. While enjoying mutual caresses, most do not have the same urge for coitus’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3149" href="#ref-48" id="xref-ref-48-2"><span data-dcnode-id="3150" instrument_node="">MacGillivray 1975</span></a><span data-dcnode-id="3148" instrument_node="">). This gendered view on sexuality presented male sexuality as inherently animal, uncontrolled and driven by impulse. This implies that girls should be responsible for marshalling young boys’ sexual drive. MacGillivray also encouraged girls to consider orgasm as ‘the excitement felt of seeing a pop idol in concert’ and as an ‘unexpected bonus’. She however enjoined them to find a sexual position where their clitoris could be stimulated since it is the locus of pleasure. She nevertheless reaffirmed that penetration was essential in that it allowed for a more satisfactory coit.</span></p><p data-dcnode-id="3142" id="p-39"><span data-dcnode-id="3146" instrument_node="">The counsellor Joan Woodward from Birmingham used the method of ‘combining an intellectual understanding of the problem, with where necessary, an increased awareness of the emotional and fantasy aspects through the use of dream material, plus a chance to gain practical experiences free of anxiety through the sensate focus techniques’. For instance, she counselled Jane, who needed help because she had lost ‘her libido’. She presented the case by first emphasising the strict upbringing of Jane, daughter of a vicar, where sex was never mentioned. Jane unconsciously blocked her sexual desire in order to ‘remain the non-sexual child her parents have unwittingly made her’. She talked with Jane about her childhood experience and guided her to recognise ‘conflicted emotions’. At that point, Joan Woodward recommended the programme of ‘sensate focus’, used by the sexologists Masters and Johnson, a series of touching without intercourse in order to arouse pleasurable feelings that lead gradually to genital stimulation and eventually sexual intercourse (</span><a class="xref-bibr alt-style" data-dcnode-id="3144" href="#ref-63" id="xref-ref-63-1"><span data-dcnode-id="3145" instrument_node="">Woodward 1977</span></a><span data-dcnode-id="3143" instrument_node="">). This diversity of techniques points to the fragmented and volatile nature of sexual counselling, where gendered understandings of sexuality cohabited with more feminist notions of female sexual pleasure. This emphasis on teenagers and young women’s sexual pleasure was new in the context of British society in the 1970s, and constituted a continuity with the work done in FPA clinic to encourage sexual pleasure.</span></p></div></div><div class="section conclusions" data-dcnode-id="3131" id="sec-5"><h2 class="" data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">Conclusion</span></h2><p data-dcnode-id="3136" id="p-40"><span data-dcnode-id="3137" instrument_node="">In the early 1960s, young people’s sexual behaviours created anxieties triggered by an increase in premarital sexuality. In spite of growing debates about the need to tackle this trend, the main sexual health charities, such as the FPA, limited their scope to married individuals. BAC was therefore the first service provider to openly focus on young people. The counselling offered by BAC was meant to educate young people towards sexual maturity and encourage them to take responsibility for their sexual lives. In so doing, BAC did not represent a departure from the values favoured by the interwar tradition of contraceptive advice as exemplified by the FPA, but instead readapted these values for young people. The counselling practices provided by BAC were required to follow the ideal of a non-judgmental listening approach to young people’s sexual needs. However, this ideal was undermined by a moral conservatism that favoured heteronormative sexual behaviours based on the white middle-class model of protected intercourse in a steady, loving heterosexual relationship. Indeed, race and class had a powerful impact on the classification of people into vulnerable categories in need of counselling. Indeed, prejudices were not always conscious, and though attention paid to one particular group might have emerged from empathetic considerations for the reproductive outcomes of individuals from that group, it nevertheless remained the case that stereotypes and generalisations underpinned these considerations. Counselling might therefore have been used as a way of teaching the white middle-class value of commitment through the ideas of love and sexual responsibility.</span></p><p data-dcnode-id="3134" id="p-41"><span data-dcnode-id="3135" instrument_node="">This paper also shows that counsellors encouraged young people to express their emotions, contributing to the stabilisation of a new form of sexual subjectivity where talking about feelings and sexual behaviours became normalised for young people. This emotional labour also helped to manage the tensions created by BAC’s antagonist aims. Finally, the paper looks at psychosexual counselling in detail and shows again that tensions were present. Young people were recognised as sexual agents who could enjoy their sexuality. This was radical. Indeed, until this point, the idea of helping married couples to achieve sexual pleasure had been gaining momentum in FPA clinics, but the idea had never been applied to young people due to fears that it would encourage promiscuity. However, while sexual pleasure was addressed, providing a novel element, the idea of promiscuity limited the sexual freedom allowed to young girls. In addition, sexual counselling drew on a gendered understanding of sexual behaviours, where young men were thought of having greater sexual drive and young women were in search of emotional attachment; this framework, to a certain extent, pathologised young people’s sexual behaviours when they deviated from these gendered sexual roles.</span></p><p data-dcnode-id="3132" id="p-42"><span data-dcnode-id="3133" instrument_node="">BAC members helped to establish a new vision of the teenage sexual self, where responsibility, commitment and protection functioned together. This emphasis on emotionally committed relationships was part of a broader trend in counselling work, where emotional maturity was perceived as the cornerstone of British society.</span></p></div><div class="section data-availability" data-dcnode-id="3126" id="sec-6"><h2 class="" data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Data availability statement</span></h2><p data-dcnode-id="3127" id="p-50"><span data-dcnode-id="3128" instrument_node="">Data sharing not applicable as no datasets generated and/or analysed for this study. All the archival materials are freely available from the Wellcome Library, SA/BRO, in London. The four oral history interviews conducted by the author with former counsellors are not available to consult. Former counsellors have only granted the author authorisation to use their interview.</span></p></div><div class="section ethics-statement" data-dcnode-id="3113" id="sec-7"><h2 class="" data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Ethics statements</span></h2><div class="section ethics-consent-to-publish" data-dcnode-id="3119" id="sec-8"><h3 data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">Patient consent for publication</span></h3><p data-dcnode-id="3120" id="p-51"><span data-dcnode-id="3121" instrument_node="">Not required.</span></p></div><div class="section ethics-approval" data-dcnode-id="3114" id="sec-9"><h3 data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Ethics approval</span></h3><p data-dcnode-id="3115" id="p-52"><span data-dcnode-id="3116" instrument_node="">Ethical approval for this research was obtained through the Faculty of History, Cambridge University in May 2018.</span></p></div></div><div class="section ack" data-dcnode-id="3108" id="ack-1"><h2 data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="3109" id="p-43"><span data-dcnode-id="3110" instrument_node="">I am grateful to the four counsellors who agreed to share their experience with me. I would like to thank all the participants of the international conference ‘Let’s talk about sex (and reproduction). Counselling for reproductive health in postwar Europe’ that was held at the Centre for Research in the Arts, Social Sciences and Humanities (CRASSH), University of Cambridge, in December 2019, and supported by CRASSH and Wellcome. Special thanks go to my co-organisers Jenny Bangham and Yuliya Hilevych for their helpful feedback on the first draft of this article. I thank the two anonymous reviewers who provided thoughtful and constructive suggestions.</span></p></div><div class="section ref-list" data-dcnode-id="730" id="ref-list-1"><h2 class="" data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">Bibliography</span></h2><ol class="cit-list ref-use-labels" data-dcnode-id="731"><li data-dcnode-id="3074"><span class="ref-label ref-label-empty" data-dcnode-id="3105"></span><a class="rev-xref-ref" data-dcnode-id="3103" href="#xref-ref-1-1" id="ref-1" title="View reference  in text"><span data-dcnode-id="3104" instrument_node="">↵</span></a><div class="cit ref-cit ref-book google_scholar_link-processed custom-js-processed" data-dcnode-id="3075" id="cit-medhum-2021-012206v1.1"><div class="cit-metadata" data-dcnode-id="3080"><ol class="cit-auth-list" data-dcnode-id="3095"><li data-dcnode-id="3096"><span class="cit-auth" data-dcnode-id="3097"><span class="cit-name-surname" data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Audrey</span></span><span data-dcnode-id="3100" instrument_node=""> </span><span class="cit-name-given-names" data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">L</span></span></span></li></ol><cite data-dcnode-id="3081"><span data-dcnode-id="3094" instrument_node="">. </span><span class="cit-pub-date" data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">1980</span></span><span data-dcnode-id="3091" instrument_node="">. </span><span class="cit-source" data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">Fight for Family Planning</span></span><span data-dcnode-id="3088" instrument_node="">. </span><span class="cit-publ-loc" data-dcnode-id="3086"><span data-dcnode-i
