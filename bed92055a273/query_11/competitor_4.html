</span><meta content="First opened in 1964 in London, the Brook Advisory Centres (BAC) were the first centres to provide contraceptive advice and sexual counselling to unmarried people in postwar Britain. Drawing on archival materials, medical articles published by BAC members and oral history interviews with former counsellors, this paper looks at tensions present in sexual health counselling work between progressive views on young people’s sexuality and moral conservatism. In so doing, this paper makes two inter-related arguments. First, I argue that BAC doctors, counsellors and social workers simultaneously tried to adopt a non-judgmental listening approach to young people’s sexual needs and encouraged a model of heteronormative sexual behaviours that was class-based and racialised. Second, I argue that emotional labour was central in BAC staff’s attempt to navigate and smooth these tensions. This emotional labour and the tensions within it is best illustrated by BAC’s pyschosexual counselling services, which on the one hand tried to encourage youth sexual pleasure and on the other taught distinctive gendered sexual roles that contributed to pathologising teenage sexual behaviours and desire.

In all, I contend that, in resorting to an emotionally orientated counselling, BAC members reconfigured for the young the new form of sexual subjectivity that had been in the making since the interwar years, that is, the fact that individuals regarded themselves as sexual beings and expressed feelings and anxieties about sex. BAC’s counselling work was as much a rupture with the interwar contraceptive counselling tradition—since it operated in a new climate, stressed a non-judgmental listening approach and catered for the young—as it was a continuity of some of the values of the earlier movement.

Data sharing not applicable as no datasets generated and/or analysed for this study. All the archival materials are freely available from the Wellcome Library, SA/BRO, in London. The four oral history interviews conducted by the author with former counsellors are not available to consult. Former counsellors have only granted the author authorisation to use their interview." data-dcnode-id="5325" name="DC.Description"><span data-dcnode-id="5324" instrument_node="">

</span><meta content="First opened in 1964 in London, the Brook Advisory Centres (BAC) were the first centres to provide contraceptive advice and sexual counselling to unmarried people in postwar Britain. Drawing on archival materials, medical articles published by BAC members and oral history interviews with former counsellors, this paper looks at tensions present in sexual health counselling work between progressive views on young people’s sexuality and moral conservatism. In so doing, this paper makes two inter-related arguments. First, I argue that BAC doctors, counsellors and social workers simultaneously tried to adopt a non-judgmental listening approach to young people’s sexual needs and encouraged a model of heteronormative sexual behaviours that was class-based and racialised. Second, I argue that emotional labour was central in BAC staff’s attempt to navigate and smooth these tensions. This emotional labour and the tensions within it is best illustrated by BAC’s pyschosexual counselling services, which on the one hand tried to encourage youth sexual pleasure and on the other taught distinctive gendered sexual roles that contributed to pathologising teenage sexual behaviours and desire.

In all, I contend that, in resorting to an emotionally orientated counselling, BAC members reconfigured for the young the new form of sexual subjectivity that had been in the making since the interwar years, that is, the fact that individuals regarded themselves as sexual beings and expressed feelings and anxieties about sex. BAC’s counselling work was as much a rupture with the interwar contraceptive counselling tradition—since it operated in a new climate, stressed a non-judgmental listening approach and catered for the young—as it was a continuity of some of the values of the earlier movement.

Data sharing not applicable as no datasets generated and/or analysed for this study. All the archival materials are freely available from the Wellcome Library, SA/BRO, in London. The four oral history interviews conducted by the author with former counsellors are not available to consult. Former counsellors have only granted the author authorisation to use their interview." data-dcnode-id="5137" name="twitter:description"><span data-dcnode-id="5136" instrument_node="">

History, University of Cambridge, Cambridge CB3 9EF, UK; </span><span class="em-link" data-dcnode-id="3665"><span class="em-addr" data-dcnode-id="3666"><a data-dcnode-id="3667" href="mailto:cr523@cam.ac.uk"><span data-dcnode-id="3668" instrument_node="">cr523@cam.ac.uk</span></a></span></span></li></ol></div></div></div><span data-dcnode-id="3659" instrument_node=""> </span></div><span data-dcnode-id="3657" instrument_node="">

</span><div class="panel-separator" data-dcnode-id="3654"></div><div class="panel-pane pane-highwire-markup abstract-with-bc" data-dcnode-id="3614"><span data-dcnode-id="3653" instrument_node="">
</span><div class="pane-content" data-dcnode-id="3616"><span data-dcnode-id="3652" instrument_node="">
</span><div class="highwire-markup" data-dcnode-id="3618"><div data-dcnode-id="3619" id="content-block" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article abstract-view" data-dcnode-id="3621"><span class="highwire-journal-article-marker-start" data-dcnode-id="3651"></span><div class="section abstract" data-dcnode-id="3644" id="abstract-1"><h2 data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Abstract</span></h2><p data-dcnode-id="3647" id="p-2"><span data-dcnode-id="3648" instrument_node="">First opened in 1964 in London, the Brook Advisory Centres (BAC) were the first centres to provide contraceptive advice and sexual counselling to unmarried people in postwar Britain. Drawing on archival materials, medical articles published by BAC members and oral history interviews with former counsellors, this paper looks at tensions present in sexual health counselling work between progressive views on young people’s sexuality and moral conservatism. In so doing, this paper makes two inter-related arguments. First, I argue that BAC doctors, counsellors and social workers simultaneously tried to adopt a non-judgmental listening approach to young people’s sexual needs and encouraged a model of heteronormative sexual behaviours that was class-based and racialised. Second, I argue that emotional labour was central in BAC staff’s attempt to navigate and smooth these tensions. This emotional labour and the tensions within it is best illustrated by BAC’s pyschosexual counselling services, which on the one hand tried to encourage youth sexual pleasure and on the other taught distinctive gendered sexual roles that contributed to pathologising teenage sexual behaviours and desire.</span></p><p data-dcnode-id="3645" id="p-3"><span data-dcnode-id="3646" instrument_node="">In all, I contend that, in resorting to an emotionally orientated counselling, BAC members reconfigured for the young the new form of sexual subjectivity that had been in the making since the interwar years, that is, the fact that individuals regarded themselves as sexual beings and expressed feelings and anxieties about sex. BAC’s counselling work was as much a rupture with the interwar contraceptive counselling tradition—since it operated in a new climate, stressed a non-judgmental listening approach and catered for the young—as it was a continuity of some of the values of the earlier movement.</span></p></div><ul class="kwd-group" data-dcnode-id="3637"><li class="kwd" data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">history</span></li><li class="kwd" data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">medical humanities</span></li><li class="kwd" data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">sexual medicine</span></li></ul><div class="section data-availability" data-dcnode-id="3632" id="sec-6"><h2 class="" data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">Data availability statement</span></h2><p data-dcnode-id="3633" id="p-50"><span data-dcnode-id="3634" instrument_node="">Data sharing not applicable as no datasets generated and/or analysed for this study. All the archival materials are freely available from the Wellcome Library, SA/BRO, in London. The four oral history interviews conducted by the author with former counsellors are not available to consult. Former counsellors have only granted the author authorisation to use their interview.</span></p></div><div class="license" data-dcnode-id="3623" id="license-1"><span class="ali-license-ref" data-dcnode-id="3629"><a data-dcnode-id="3630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0/" rel="license"><span data-dcnode-id="3631" instrument_node="">https://creativecommons.org/licenses/by/4.0/</span></a></span><p data-dcnode-id="3624" id="p-1"><span data-dcnode-id="3628" instrument_node="">This is an open access article d </span><div class="highwire-list-wrapper" data-dcnode-id="3521"><div class="highwire-list" data-dcnode-id="3522"><ul data-dcnode-id="3523"><li data-dcnode-id="3524"><a class="button rp_jump" data-dcnode-id="3525" data-hide-link-title="0" data-icon-position="" href="#request-permissions"><span data-dcnode-id="3526" instrument_node="">Request Permissions</span></a></li></ul></div></div><span data-dcnode-id="3520" instrument_node=""> </span></div><span data-dcnode-id="3518" instrument_node="">

</span><div class="pane-content" data-dcnode-id="723"><span data-dcnode-id="3513" instrument_node="">
</span><div class="highwire-markup" data-dcnode-id="725"><div class="content-block-markup" data-dcnode-id="726" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="728"><span class="highwire-journal-article-marker-start" data-dcnode-id="3512"></span><ul class="kwd-group" data-dcnode-id="3502"><li class="kwd" data-dcnode-id="3509"><a class="hw-term hw-article-keyword hw-article-keyword-history" data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mh.bmj.com/keyword/history" rel="nofollow"><span data-dcnode-id="3511" instrument_node="">history</span></a></li><li class="kwd" data-dcnode-id="3506"><a class="hw-term hw-article-keyword hw-article-keyword-medical-humanities" data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mh.bmj.com/keyword/medical-humanities" rel="nofollow"><span data-dcnode-id="3508" instrument_node="">medical humanities</span></a></li><li class="kwd" data-dcnode-id="3503"><a class="hw-term hw-article-keyword hw-article-keyword-sexual-medicine" data-dcnode-id="3504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mh.bmj.com/keyword/sexual-medicine" rel="nofollow"><span data-dcnode-id="3505" instrument_node="">sexual medicine</span></a></li></ul><p data-dcnode-id="3497" id="p-4"><span data-dcnode-id="3501" instrument_node="">In 1965, in the London neighbourhood of Fitzrovia, close to many universities, an unmarried ‘girl’ aged 21 years walked through the door of the Brook Advisory Centre (BAC), the first institution to officially provide contraceptive advice to young unmarried people in postwar Britain, which had opened in 1964. After a counselling session with a doctor, she walked out with contraceptives. The young woman told the doctor that she was not a virgin but had already had three ‘backstreet’ abortions. For the first time, the girl explained, she had fallen in love and this new relationship was meaningful to her. For this reason, she wanted to wait until she was married to have a family and sought birth control in the meantime, as ‘she could not afford to have a baby and would never be able to kill a baby of a man she loves’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3499" href="#ref-14" id="xref-ref-14-1"><span data-dcnode-id="3500" instrument_node="">Brook 1966</span></a><span data-dcnode-id="3498" instrument_node="">). Providing contraception to an unmarried girl in Britain was not entirely new in 1965; some family planning clinics unofficially advised young women provided that they showed proof of engagement, usually a (fake) ring. However, what made BAC distinctive was that, for the first time, a charity was providing contraception to young people openly and without subterfuge.</span></p><p data-dcnode-id="3438" id="p-5"><span data-dcnode-id="3496" instrument_node="">The history of BAC counselling is part of the longer British history of sexual counselling, and more specifically of contraceptive counselling. This history started back with the birth control movement. In the 1920s, the first birth control clinic opened in London, quickly followed by others across Britain. At first, such clinics were mainly concerned with providing information and prescribing birth control methods for married women. As they had to fight to be considered respectable and to dissociate contraception from its earlier association with free love, the leaders of the birth control movement underlined that their main goal was to encourage stable and loving marriages and babies that were wanted. This movement was aimed at helping married working-class mothers, overburdened by too many pregnancies, to limit and space births. Eugenic ideas about differential fertility were also part of the narrative supporting the birth control movement. In 1942, due to increasing demand from patients, some family planning centres expanded their remits to encompass psychosexual counselling and infertility counselling, which was the provision of advice on sexual disorders and therapies, and advice and treatments for infertility, respectively (</span><a class="xref-bibr alt-style" data-dcnode-id="3494" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="3495" instrument_node="">Audrey 1980</span></a><span data-dcnode-id="3493" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3491" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="3492" instrument_node="">Cohen 1993</span></a><span data-dcnode-id="3490" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3488" href="#ref-27" id="xref-ref-27-1"><span data-dcnode-id="3489" instrument_node="">Cook 2004</span></a><span data-dcnode-id="3487" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3485" href="#ref-32" id="xref-ref-32-1"><span data-dcnode-id="3486" instrument_node="">Davey 1988</span></a><span data-dcnode-id="3484" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3482" href="#ref-33" id="xref-ref-33-1"><span data-dcnode-id="3483" instrument_node="">Debenham 2014</span></a><span data-dcnode-id="3481" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3479" href="#ref-37" id="xref-ref-37-1"><span data-dcnode-id="3480" instrument_node="">Hall 1997</span></a><span data-dcnode-id="3478" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3476" href="#ref-55" id="xref-ref-55-1"><span data-dcnode-id="3477" instrument_node="">Rusterholz 2020</span></a><span data-dcnode-id="3475" instrument_node="">). Infertility counselling was, however, already provided in Marie Stopes birth control clinics, a concurrent institution. This new orientation of the work done in Family Planning Association (FPA) centres was, however, slow to develop, facing opposition from many FPA medical professionals who did not see psychosexual work as being their responsibility and who considered those interested in this topic as a ‘lunatic fringe’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3473" href="#ref-55" id="xref-ref-55-2"><span data-dcnode-id="3474" instrument_node="">Rusterholz 2020</span></a><span data-dcnode-id="3472" instrument_node="">). Other organisations, such as the Marie Stopes Clinic, the Marriage Guidance Council and the Catholic Marriage Advisory Council to name a few, also started to provide sexual counselling for married couples in the early 1950s (</span><a class="xref-bibr alt-style" data-dcnode-id="3470" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="3471" instrument_node="">Chettiar 2015</span></a><span data-dcnode-id="3469" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3467" href="#ref-38" id="xref-ref-38-1"><span data-dcnode-id="3468" instrument_node="">Harris 2015</span></a><span data-dcnode-id="3466" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3464" href="#ref-46" id="xref-ref-46-1"><span data-dcnode-id="3465" instrument_node="">Lewis, Clark, and Morgan 1992</span></a><span data-dcnode-id="3463" instrument_node="">). However, it was only the opening of BAC that provided unmarried young people with a place to obtain contraception and advice on their sex lives. BAC opened as a preventive service to mitigate the risks engendered by the increase in premarital sex. In the postwar years, a new obsession with young people’s behaviour emerged. This was partly because young people were more numerous, which made them more visible due to the postwar baby boom (</span><a class="xref-bibr alt-style" data-dcnode-id="3461" href="#ref-43" id="xref-ref-43-1"><span data-dcnode-id="3462" instrument_node="">Jackson and Bartie 2014</span></a><span data-dcnode-id="3460" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3458" href="#ref-60" id="xref-ref-60-1"><span data-dcnode-id="3459" instrument_node="">Tebbutt 2016</span></a><span data-dcnode-id="3457" instrument_node="">). Furthermore, in the late 1950s, young people’s sexual behaviour was starting to create growing anxieties among mass media and contemporary commentators (</span><a class="xref-bibr alt-style" data-dcnode-id="3455" href="#ref-27" id="xref-ref-27-2"><span data-dcnode-id="3456" instrument_node="">Cook 2004</span></a><span data-dcnode-id="3454" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3452" href="#ref-39" id="xref-ref-39-1"><span data-dcnode-id="3453" instrument_node="">Haste 1992</span></a><span data-dcnode-id="3451" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3449" href="#ref-56" id="xref-ref-56-1"><span data-dcnode-id="3450" instrument_node="">Rusterholz 2021a</span></a><span data-dcnode-id="3448" instrument_node="">,</span><a class="xref-bibr alt-style" data-dcnode-id="3446" href="#ref-57" id="xref-ref-57-1"><span data-dcnode-id="3447" instrument_node="">Rusterholz 2021b</span></a><span data-dcnode-id="3445" instrument_node="">). These anxieties were triggered by data showing an increase in the number of brides who were pregnant at marriage, the illegitimacy rate and the incidence of venereal diseases and backstreet abortions. Furthermore, it was felt that these illegitimacy rates were now also occurring in young women of a more privileged and better-educated social class (</span><a class="xref-bibr alt-style" data-dcnode-id="3443" href="#ref-34" id="xref-ref-34-1"><span data-dcnode-id="3444" instrument_node="">Dyhouse 2014</span></a><span data-dcnode-id="3442" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3440" href="#ref-36" id="xref-ref-36-1"><span data-dcnode-id="3441" instrument_node="">Hall 2013</span></a><span data-dcnode-id="3439" instrument_node="">).</span></p><p data-dcnode-id="3409" id="p-6"><span data-dcnode-id="3437" instrument_node="">It was in this context that Helen Brook opened the BAC, the first charity helping unmarried people aged 16 (the age of consent) to 25 years. Born in 1907, Helen Brook was a mother of three, an artist and the wife of the economist Robin Brook; she had joined the FPA in the late 1940s, first working as a volunteer interviewer at the Islington clinic (</span><a class="xref-bibr alt-style" data-dcnode-id="3435" href="#ref-18" id="xref-ref-18-1"><span data-dcnode-id="3436" instrument_node="">Brook 1990</span></a><span data-dcnode-id="3434" instrument_node="">). She then became chairman of the Islington clinic for 12 years. When the birth control activist Marie Stopes died in 1958, Brook was asked to reorganise and direct the Marie Stopes clinic in Whitfield Street, London. She took the opportunity to try a new experiment in one of the Stopes offices, hence avoiding the self-imposed limitation of the FPA service to married women and about-to-marry women. In 1962, she started to advise unmarried women (who were not even engaged) brought to her by social workers, and later set up ‘secret sessions’ for ‘girls and young men, often still at school or university’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3432" href="#ref-51" id="xref-ref-51-1"><span data-dcnode-id="3433" instrument_node="">Marie Stopes Memorial Foundation 1963</span></a><span data-dcnode-id="3431" instrument_node="">). Her motivation for holding such sessions, as she reflected 4 years after their creation in 1966, was to tackle the issue of rising rates of illegitimate births. She attributed this increase to several factors, namely the larger population of young people, earlier puberty, the greater freedom and mobility of the young and immigration from Ireland and what she called ‘backwards countries’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3429" href="#ref-14" id="xref-ref-14-2"><span data-dcnode-id="3430" instrument_node="">Brook 1966</span></a><span data-dcnode-id="3428" instrument_node="">). As these elements suggest, race and class were central in the creation of BAC, showing a continuity with the FPA’s emphasis on working-class women. Their main target clientele was young white women brought in by social workers, usually from deprived working-class backgrounds, who were deemed in need of monitoring, as well as white middle-class and upper-class young couples at university who were said to be in committed relationships ‘but unable to marry due to financial reasons’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3426" href="#ref-49" id="xref-ref-49-1"><span data-dcnode-id="3427" instrument_node="">Marie Stopes Memorial Foundation 1964</span></a><span data-dcnode-id="3425" instrument_node="">). These young couples were presented as in need of advice, rather than control, in order to avoid unwanted pregnancies that would jeopardise their future. Irish immigrants and those from ‘backwards countries’, most likely immigrants from the West Indies, South Asia and Africa based on postwar migration trends, were also potential clients. As many studies have shown, young black boys from the West Indies were usually presented by the mass media and social scientists and experts as sexual predators, allegedly bringing venereal diseases to Britain, while white working-class girls were always thought to be more promiscuous than white middle-class girls (</span><a class="xref-bibr alt-style" data-dcnode-id="3423" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="3424" instrument_node="">Bingham 2009</span></a><span data-dcnode-id="3422" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3420" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="3421" instrument_node="">Bivins 2015</span></a><span data-dcnode-id="3419" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3417" href="#ref-34" id="xref-ref-34-2"><span data-dcnode-id="3418" instrument_node="">Dyhouse 2014</span></a><span data-dcnode-id="3416" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3414" href="#ref-43" id="xref-ref-43-2"><span data-dcnode-id="3415" instrument_node="">Jackson and Bartie 2014</span></a><span data-dcnode-id="3413" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3411" href="#ref-61" id="xref-ref-61-1"><span data-dcnode-id="3412" instrument_node="">Webster 1998</span></a><span data-dcnode-id="3410" instrument_node="">). Both groups were therefore perceived as vulnerable populations that needed to be educated in order to behave responsibly. This meant that, from the start, the white/middle-class norm of committed young people in steady relationships functioned as the model of ‘good’ sexual behaviour.</span></p><p data-dcnode-id="3407" id="p-7"><span data-dcnode-id="3408" instrument_node="">Following the opening of these sessions, the Marie Stopes board suggested that it would be advisable for Helen Brook to find a separate organisation. She received an anonymous donation of £5000 per year over 3 years to expand this work, and, as a result, the BAC officially opened in July 1964. Its opening officially condoned young people’s sexuality and recognised, for the first time, that young people needed to be protected from unwanted pregnancy. The provision of contraception to young, unmarried people took place before the 1967 Family Planning Act, which allowed but did not require local authorities to provide birth control to all women regardless of their marital status. Following the opening of the London branch, other BAC clinics were set up in locations such as Cambridge (1966), Birmingham (1966), Bristol (1968) and Edinburgh (1968). During the late 1960s and 1970s, the use of the service offered by BAC grew drastically and the demand quickly exceeded the capacity of the centres, resulting in long waiting lists. From 1056 clients in 1965, the number seen in BAC centres increased to 60 000 by 1979.</span></p><p data-dcnode-id="3405" id="p-8"><span data-dcnode-id="3406" instrument_node="">BAC played a pioneering role in counselling young people about their sexual reproductive health, and this is the first study that specifically examines the practical aspects of sexual health counselling. This article draws on archival materials from BAC available at the Wellcome Library; medical articles published by BAC members and four oral history interviews with former counsellors of BAC. These oral history interviews were conducted over the phone between March and May 2020. Oral and written consents were obtained and recorded prior to the interview for each participant. Participants agreed for their interview to be quoted and for their name to appear in this article.</span></p><p data-dcnode-id="3400" id="p-9"><span data-dcnode-id="3404" instrument_node="">By closely examining the content of sexual health counselling and medical guidance offered by BAC from its creation in 1964 to the setting up of a counselling Advisory Committee in 1988, which harmonised counselling practices across the centres (</span><a class="xref-bibr alt-style" data-dcnode-id="3402" href="#ref-11" id="xref-ref-11-1"><span data-dcnode-id="3403" instrument_node="">Brook Advisory Centre 1988</span></a><span data-dcnode-id="3401" instrument_node="">), this article explores the tensions in BAC’s counselling work. First, I scrutinise what BAC members defined as the key components and values underpinning counselling. I argue that tensions were inherent in BAC’s counselling services; BAC doctors, counsellors and social workers tried to encourage a model of heteronormative sexual behaviours that was class-based and racialised—this model was based on the same type of principles that informed the family planning movement—while at the same time displaying a non-judgmental acceptance of young people’s sexuality.</span></p><p data-dcnode-id="3398" id="p-10"><span data-dcnode-id="3399" instrument_node="">Second, I focus on the emotional labour that BAC staff performed in their counselling work. Staff had to present themselves as empathetic, caring and reassuring, but they paradoxically also sought to provide heteronormative advice. I argue that this emotional labour was central in BAC staff’s attempt at navigating and smoothing the tensions created by the contradiction between their non-judgmental listening approach to counselling and BAC’s moral conservatism in spreading a vision of committed heterosexual relationships. This emotional labour and the tensions within in it is best illustrated in BAC’s pyschosexual counselling services, which tried to encourage youth sexual pleasure but also taught distinctive gendered sexual roles and heteronormative advice that contributed to pathologising teenage sexual behaviours and desire. This emphasis on sexual pleasure and gendered roles constituted a rupture with the interwar tradition that had only ever addressed the sexual and emotional difficulties of married people, but it could also be viewed as a reshaping of this idea. I contend that, in resorting to an emotionally orientated counselling, BAC members reconfigured for the young the new form of sexual subjectivity that had been in the making since the interwar years, that is, the fact that individuals regarded themselves as sexual beings, which normalised the practice of talking and expressing feelings and anxieties about sex. Indeed, BAC was part of a broader movement that sought to understand fragility in relationship and sexual dysfunctions and also adapted their model to include unmarried and young people. In all, this paper demonstrates that BAC’s counselling work was as much a rupture with the interwar contraceptive counselling tradition—since it operated in a new climate, stressed a non-judgmental listening approach and catered for the young—as it was a continuity of some of the values of the earlier movement in terms of moral conservatism and heteronormative sexual behaviours.</span></p><div class="section" data-dcnode-id="3273" id="sec-1"><h2 class="" data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Counselling young people towards sexual maturity (1964–1988)</span></h2><p data-dcnode-id="3391" id="p-11"><span data-dcnode-id="3395" instrument_node="">The early, stated aims of BAC were ‘the prevention and the mitigation of the suffering caused by unwanted pregnancy and illegal abortion by educating young persons in matter[s] of sex and contraception and developing among them a sense of responsibility in regard to sexual behaviours’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3393" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="3394" instrument_node="">Brook Advisory Centre 1964</span></a><span data-dcnode-id="3392" instrument_node="">). From the start, the centre put to the fore education through counselling by doctors, nurses and counsellors and the idea that young people should become responsible for the choices they made vis-à-vis their sex lives. Consequently, by foregrounding the work of the centre within the framework of counselling and responsibility, BAC members anticipated criticisms of promiscuity and therefore presented a model where responsible behaviours, namely steady relationships that could potentially lead to marriage, appeared as the cornerstone of their work. To a certain extent, this model was a rhetorical device to counter potential criticism. While never affirming it explicitly, this norm was based on the white/middle-class value of committed intimacy. The model did not fundamentally transfigure the principles that informed the FPA. Indeed, by emphasising commitment and heteronormative relationships, the provision of advice to the unmarried was not a departure from the FPA practice but rather should be considered a reconfiguration, with a continuation of the FPA’s general principles and prejudices around class and race.</span></p><p data-dcnode-id="3373" id="p-12"><span data-dcnode-id="3390" instrument_node="">In a similar vein, Dr Faith Spicer, the first doctor working in BAC in London, defined her work as follows: “If we can show, and I believe we can, that we are helping adolescents to understand themselves, their feelings and their needs, then we are doing [a] valuable job (…) by setting up advice centres of this sort we can help more people towards maturity, (…)” (</span><a class="xref-bibr alt-style" data-dcnode-id="3386" href="#ref-58" id="xref-ref-58-1"><span data-dcnode-id="3389" instrument_node="">Spicer 1964, </span><span class="named-content page-number" data-dcnode-id="3387" id="named-content-1"><span data-dcnode-id="3388" instrument_node="">31</span></span></a><span data-dcnode-id="3385" instrument_node="">). This idea of helping individuals to understand themselves and to reach maturity resonates with Nikolas Rose’s argument that in the second half of the 20th century, experts played a pivotal role in creating a choosing, willing and self-governing self (</span><a class="xref-bibr alt-style" data-dcnode-id="3383" href="#ref-52" id="xref-ref-52-1"><span data-dcnode-id="3384" instrument_node="">Rose 1990</span></a><span data-dcnode-id="3382" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3380" href="#ref-53" id="xref-ref-53-1"><span data-dcnode-id="3381" instrument_node="">Rose 1998</span></a><span data-dcnode-id="3379" instrument_node="">). Indeed, BAC recognised the ability of teenagers and young people to make informed decisions, subject to them receiving the ‘right’ type of support and ‘correct’ information. Counselling was therefore perceived by BAC workers as a way of enabling young people to take responsibility for their action and decide for themselves what would be the best sexual behaviours. And clients seemed to have absorbed BAC’s message: as one put it in a survey study carried out in Birmingham in 1968, ‘it was so nice to be treated as a responsible adult’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3375" href="#ref-62" id="xref-ref-62-1"><span data-dcnode-id="3378" instrument_node="">Woodward 1970, </span><span class="named-content page-number" data-dcnode-id="3376" id="named-content-2"><span data-dcnode-id="3377" instrument_node="">88</span></span></a><span data-dcnode-id="3374" instrument_node="">). In the centre, there existed three types of counselling: counselling for contraception; counselling for pregnancy and its outcome and counselling for psychosexual problems. The majority of clients came for birth control advice and supplies, with about 10%–15% attending for pregnancy and sexual counselling. To guide young people towards sexual maturity, BAC counsellors, social workers and doctors defined three essential components of what they perceived as ‘good’ counselling practice: the ability to listen to the client; a non-judgmental attitude and a guarantee of the confidentiality of the services.</span></p><div class="subsection" data-dcnode-id="3274" id="sec-2"><h3 data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">Non-judgmental listening approach</span></h3><p data-dcnode-id="3354" id="p-13"><span data-dcnode-id="3370" instrument_node="">In many reports and committee minutes, listening to the client in a confidential setting retained a central place: Liz Elking, who joined the London Walworth centre as a counsellor in 1974, said that the Brook method was to ‘listen hard, put all the alternatives and try to help the youngsters to reach their own decisions’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3368" href="#ref-35" id="xref-ref-35-1"><span data-dcnode-id="3369" instrument_node="">Elking 1974</span></a><span data-dcnode-id="3367" instrument_node="">). The roles of staff, in terms of whose responsibility it was to listen to clients and take notes about their needs, differed between regional centres. In Birmingham, from the start, social workers worked alongside doctors and nurses. Indeed, at his or her first appointment, every client in Birmingham was interviewed by a social worker trained in interviewing techniques, whereas in London this interview was conducted by the nurse, who ascertained the reason for the client’s visit and completed the particulars of registration. The interview provided an opportunity for BAC staff to listen to the client’s needs and anxieties and assess the potential need for referral to further counselling services and therapy. A consultation with the doctor followed this first in-depth interview (</span><a class="xref-bibr alt-style" data-dcnode-id="3365" href="#ref-6" id="xref-ref-6-1"><span data-dcnode-id="3366" instrument_node="">Birmingham Brook Advisory Centre 1967</span></a><span data-dcnode-id="3364" instrument_node="">). In London, at first, social workers had limited power in the centre, since doctors were in charge of the counselling and listened to the clients. But before long, Helen Brook realised that social workers would help give the clinic an unclinical atmosphere, moving away from the ‘doctor-patient relationship’(</span><a class="xref-bibr alt-style" data-dcnode-id="3362" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="3363" instrument_node="">Brook 1987</span></a><span data-dcnode-id="3361" instrument_node="">). She was convinced that social workers were essential for developing a trusted relationship with the clients and allowing the latter to feel listened to. From that point on, social workers had extended responsibility in London clinics. In 1975, Dr Ruth MacGillivray, who was the doctor in charge of the London BAC, announced in the magazine </span><em data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">GP</span></em><span data-dcnode-id="3358" instrument_node=""> that counselling was not the exclusive territory of doctors. In her view, nurses and social workers could also be good counsellors provided that they met the essential criteria, namely ‘emphatic listening and the ability to talk simply about anatomy, physiology, sociology and to draw analogies which can be easily understood’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3356" href="#ref-48" id="xref-ref-48-1"><span data-dcnode-id="3357" instrument_node="">MacGillivray 1975</span></a><span data-dcnode-id="3355" instrument_node="">).</span></p><p data-dcnode-id="3352" id="p-14"><span data-dcnode-id="3353" instrument_node="">Another paramount element of the way BAC members understood their work was the perceived absence of moral judgement. There was a tension inherent in this, since BAC members were navigating between adopting a pioneering approach to the unmarried via a non-judgmental acceptance of young people’s sexuality and spreading a vision of heterosexual monogamy and sexual responsibility via their heteronormative advice.</span></p><p data-dcnode-id="3344" id="p-15"><span data-dcnode-id="3351" instrument_node="">In 1969, the task of Brook was defined in terms of education and responsibility and referred to the attitude that individuals working in the centre should adopt: ‘to help young people between the ages of 16 (age of consent) [and] 25 to accept responsibility for their emotional lives without attempting to impose external moral standards’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3349" href="#ref-40" id="xref-ref-40-1"><span data-dcnode-id="3350" instrument_node="">Hunter 1969</span></a><span data-dcnode-id="3348" instrument_node="">). BAC were first staffed by doctors and nurses trained in family planning practice; their attitude and personality to the young needed to be ‘satisfactory’, meaning tolerant and non-judgmental (</span><a class="xref-bibr alt-style" data-dcnode-id="3346" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="3347" instrument_node="">Brook Medical Advisory Committee 1964</span></a><span data-dcnode-id="3345" instrument_node="">). The doctors usually had added experience in child development and/or psychiatry.</span></p><p data-dcnode-id="3333" id="p-16"><span data-dcnode-id="3343" instrument_node="">The founder Helen Brook would compare the doctors’ work in Brook centres with that of ‘non-moralising mother-figure doctors’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3341" href="#ref-15" id="xref-ref-15-1"><span data-dcnode-id="3342" instrument_node="">Brook 1967</span></a><span data-dcnode-id="3340" instrument_node="">). This alleged non-judgmental attitude was particularly well perceived and valued by clients. In a 1967 article published in the </span><em data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Birmingham Post</span></em><span data-dcnode-id="3337" instrument_node="">, the local newspaper that extensively covered the heated debate preceding the opening of Birmingham BAC, a young white couple shared their experience at BAC. The ‘girl’, aged 21 years, engaged, explained that she had been sleeping with her fiancé since she was 16. She mentioned that she had had ‘a major scare’ and phoned a FPA clinic for help. She was told they could see her, provided that she was getting married in the coming 3 months. Since she was not, they directed her to BAC. The girl explained that she was ‘apprehensive’ before phoning BAC but was amazed by the reaction on the other side of line; the receptionist asked her about the urgency of her needs. The client thought “that was marvellous: they were concerned with your needs, your real needs, and not to sit in judgement on your morals” (</span><a class="xref-bibr alt-style" data-dcnode-id="3335" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="3336" instrument_node="">Cases and Circumstances 1967</span></a><span data-dcnode-id="3334" instrument_node="">).</span></p><p data-dcnode-id="3323" id="p-17"><span data-dcnode-id="3332" instrument_node="">The ‘motherly figure’ mentioned above by Helen Brook was a recurrent trope deployed by BAC workers when they described their role towards their clients. Time and again, Brook referred to the mother figure: ‘for a young woman the security of a mother figure with the expertise of highly qualified doctors is of untold value when things go wrong, as they so often do, when one is young and experimenting and exploring’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3330" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="3331" instrument_node="">Brook Advisory Centre</span></a><span data-dcnode-id="3329" instrument_node="">). Dr Fay Hutchinson, the clinic doctor in London, in a paper presenting her work at a conference on psychosexual medicine in 1982, would also make this analogy. Referring to a case of a 16-year-old client she said: “When she undressed for examination, you could see the frightened little girl she was, who needed mothering and tenderness. Studying the doctor-patient relationship I realise that “mothering” is not the only role I have, though it is one I feel comfortable with” (</span><a class="xref-bibr alt-style" data-dcnode-id="3325" href="#ref-42" id="xref-ref-42-1"><span data-dcnode-id="3328" instrument_node="">Hutchinson 1983, </span><span class="named-content page-number" data-dcnode-id="3326" id="named-content-3"><span data-dcnode-id="3327" instrument_node="">172</span></span></a><span data-dcnode-id="3324" instrument_node="">).</span></p><p data-dcnode-id="3312" id="p-18"><span data-dcnode-id="3322" instrument_node="">Nevertheless, this emphasis on the mother figure also had the potential to undermine the autonomy of young people: doctors and counsellors should be understood as another form of authority. Indeed, despite a focus on the non-judgmental attitude, young people were still deemed as a vulnerable category of the population that were in need of advice. BAC doctors and counsellors acted as guides and gatekeepers through young people’s journey towards sexual maturity. Brook doctors and counsellors saw white young middle-class women as responsible young adults who attended the clinic because they were in steady relationships and wanted to protect themselves against unwanted pregnancy. They were perceived as mature enough to make their own decisions. Their behaviour was construed as the ‘norm’ from which other groups deviated. In the first annual report of BAC published in the </span><em data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">Family Planning Journal</span></em><span data-dcnode-id="3319" instrument_node="">, Faith Spicer explained that ‘the greatest proportion of people coming to the centre are young women, quite sure at the time that they have a steady relationship who wish to discuss, often in great detail and sometimes together with their young men, methods of birth control’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3317" href="#ref-59" id="xref-ref-59-1"><span data-dcnode-id="3318" instrument_node="">Spicer 1966</span></a><span data-dcnode-id="3316" instrument_node="">). These young people were depicted as ‘responsible’. However, any deviation from this model was deemed problematic, and race and class appeared as key elements to define vulnerability. This definition ran against the idea of a non-judgmental approach to teenage sexual needs. Promiscuity, in particular, was pathologised as illustrated by the following quote from the founder of the centre, Helen Brook: “If a girl is promiscuous, you have got to ask why. Promiscuity is a sign of some sort of disturbance. They are the ones who need the most love and the most help” (Brook quoted in </span><a class="xref-bibr alt-style" data-dcnode-id="3314" href="#ref-7" id="xref-ref-7-1"><span data-dcnode-id="3315" instrument_node="">Birmingham Sunday Mercury 1966</span></a><span data-dcnode-id="3313" instrument_node="">). Promiscuity was usually associated with sexual knowingness on the part of white working-class girls and perceived to be the result of the emotional instability produced by socially deprived backgrounds. Contraceptive counselling therefore functioned as a way of teaching the middle-class values of protected intercourse in a committed relationship and maintaining emotional safety.</span></p><p data-dcnode-id="3307" id="p-19"><span data-dcnode-id="3311" instrument_node="">For white working-class young women, contraception was described as a means of control; their lack of control over their reproductive bodies condemned them to unwanted pregnancies and abortions. White young working-class women were usually described as having more sexual experience than white young middle-class women, and as such needed more counselling in order to avoid the risks of unprotected intercourse. Indeed, those of lower socioeconomic status, who belonged to classes 4 and 5, were deemed to be at higher risk of unprotected sex since they were ‘socially and emotionally deprived’. These white girls were said to be used by boys as ‘sexual conveniences’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3309" href="#ref-28" id="xref-ref-28-1"><span data-dcnode-id="3310" instrument_node="">Crabbe 1978</span></a><span data-dcnode-id="3308" instrument_node="">).</span></p><p data-dcnode-id="3290" id="p-20"><span data-dcnode-id="3306" instrument_node="">Besides class, race was also a key element in defining the vulnerable category that deviated from the white middle-class norm and again partly challenged the vison of a non-judgmental service. Speaking at a conference on ‘Accepting adolescent sexuality’, the first black BAC counsellor Pauline Crabbe, the former Welfare Secretary for the National Council for the Unmarried Mother and Her Child, first black woman magistrate, explained that young black boys, usually from African-Caribbean backgrounds, shared many common problems with socially deprived white teenagers: ‘lack of incentive, lack of opportunity, poor housing, an educational system that failed them, limited job prospects and poor communication within the home’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3302" href="#ref-29" id="xref-ref-29-1"><span data-dcnode-id="3305" instrument_node="">Crabbe 1978, </span><span class="named-content page-number" data-dcnode-id="3303" id="named-content-4"><span data-dcnode-id="3304" instrument_node="">172</span></span></a><span data-dcnode-id="3301" instrument_node="">). This led them to place more importance on sexuality. However, black boys were presented as opposing contraception and encouraging parenthood, while at the same time deemed ‘unprepared to accept the continuing responsibility of fatherhood’. In this sense, they failed to conform to the norm of protected intercourse in a steady relationship. Similarly, assumptions about the apathy of young black women who ‘got themselves pregnant’ also permeated Crabbe’s work. Writing in a 1978 special issue on fertility in adolescence, she flagged up the difficulties faced by young black girls who became pregnant: ‘black girls who have babies in their early teens are especially vulnerable. They are less likely than white girls to fight their way back into education or training for a job and they tend to sink into apathy more quickly and accept a second child because they feel already permanently enslaved by the first birth’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3297" href="#ref-30" id="xref-ref-30-1"><span data-dcnode-id="3300" instrument_node="">Crabbe 1987, </span><span class="named-content page-number" data-dcnode-id="3298" id="named-content-5"><span data-dcnode-id="3299" instrument_node="">173</span></span></a><span data-dcnode-id="3296" instrument_node="">). In drawing on this vocabulary, Crabbe referred to black girls as slaves of their men’s desire. This was a strong wording that distanced their attitudes by sending them back to the time of slavery, and in so doing stressed their differences, therefore othering their behaviours from those of white girls. Crabbe suggested that one of the means to tackle this issue was contraceptive education, in which black adolescent girls would be taught to ‘value their freedom and to show their men the benefits of partnership before they accept responsibility for parenthood’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3292" href="#ref-29" id="xref-ref-29-2"><span data-dcnode-id="3295" instrument_node="">Crabbe 1978, </span><span class="named-content page-number" data-dcnode-id="3293" id="named-content-6"><span data-dcnode-id="3294" instrument_node="">173</span></span></a><span data-dcnode-id="3291" instrument_node="">). While recognising the specific needs of young black girls, these remarks draw on some negative stereotypes about the alleged ‘apathy’ of black girls who became pregnant and the reluctance of black boys to form committed relationships. However, Crabbe also considered black girls to be the ones that made the decisions within the relationship, since they were said to be influenced by the ‘old matriarchal tradition of the West Indies’. Counselling was therefore perceived as a way of teaching white middle-class ‘British’ values around ‘sexual responsibility’ and committed relationships to these young women, so that they could ‘rebel against the prison sentence of early maternity’.</span></p><p data-dcnode-id="3288" id="p-21"><span data-dcnode-id="3289" instrument_node="">To some extent, BAC members tried to address what they perceived as socio-structural inequalities, since they recognised the additional social challenge that black girls, black boys and white working-class girls faced and devoted energy to finding ways of reaching out to these ‘vulnerable’ young people. Nevertheless, in so doing, they eased the process of assimilation into British norms by conveying standards of good sexual behaviour based on middle-class values, namely protected intercourse in a steady relationship. They thus acted as potential levellers of culturally perceived different sexual behaviours, and this attitude contradicted the alleged non-judgmental approach of their counselling services. For Brook members, maturity and responsibility in sexuality equated committed and loving intimacy.</span></p><p data-dcnode-id="3283" id="p-22"><span data-dcnode-id="3287" instrument_node="">This tension between non-judgmental counselling and the vision of ‘good’ sexual behaviour was also perceptible in the contraceptive counselling provided by BAC. Since the main goal of the centre was to avoid unwanted pregnancy through the provision of contraception, clients were presented with varied methods of birth control, and the doctors talked the clients through the pros and cons of each method. Some methods were deemed more suitable than others based again on clients’ adherence to the white middle-class norms of committed relationships. The majority of clients came to the centre to ask for the pill. The pill became available on the British market in 1961 on prescription for medical reasons, and at first mainly for married women through private agencies such as FPA clinics. At BAC, at first, doctors seemed to be very reluctant to prescribe the pill for those who did not conform to their moral standard of ‘good sexual behaviour’, namely intercourse occurring in a committed relationship. For instance, at a conference in 1966 aimed at social workers, founder Helen Brook presented several examples of young clients attending the centre; one was refused the pill. The white ‘girl of nearly 18’ came to the centre to ask for the pill. The doctor undertook a long counselling session to find out the reasons why the ‘girl’ wanted the pill. The latter was having an affair with a married man and wanted to be protected against unwanted pregnancy. The doctor refused to prescribe her the pill on the basis that her immaturity was ‘appalling’. The doctor acted as a gatekeeper of morality and judged the girl ‘unsuitable to have the pill’ since she was not in a committed, stable relationship (</span><a class="xref-bibr alt-style" data-dcnode-id="3285" href="#ref-14" id="xref-ref-14-3"><span data-dcnode-id="3286" instrument_node="">Brook 1966</span></a><span data-dcnode-id="3284" instrument_node="">). After the Family Planning Act of 1967, the pill became available for all women regardless of their marital status, on prescription in FPA clinics and BAC and through general practitioners.</span></p><p data-dcnode-id="3275" id="p-23"><span data-dcnode-id="3282" instrument_node="">At other times, BAC counsellors seemed to privilege the notion of safety of intercourse over moral considerations about the status of the relationship. Counsellors and doctors qualified unprotected sexual intercourse as risky behaviour. They explained that its prevalence was due to several factors: young people lived ‘in the present and did not plan ahead’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3280" href="#ref-17" id="xref-ref-17-1"><span data-dcnode-id="3281" instrument_node="">Brien 2020</span></a><span data-dcnode-id="3279" instrument_node="">); they favoured ‘spontaneous behaviour’; there was a lack of acceptance of their sexuality on their own part and on the part of others, especially their parents; their sex education was lacking and they encountered practical difficulties with contraceptive methods (</span><a class="xref-bibr alt-style" data-dcnode-id="3277" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="3278" instrument_node="">Coles 1978</span></a><span data-dcnode-id="3276" instrument_node="">). BAC counsellors and doctors’ role was therefore to mitigate these different aspects by recognising young people as sexual beings when they visited the clinics; they tried to instil in these clients a sense of sexual responsibility through the idea that safe sex was paramount, and explained the practicalities of contraceptive methods. Dr Hutchinson made it clear in a talk in 1978 at a national conference on ‘Accepting adolescent sexuality’ that, for young girls, the pill was not necessarily the better choice since it offered no protection against sexually transmitted diseases. In this regard, condoms were presented as the safest method. No mention was made of whether the young people were in steady relationships or not.</span></p></div></div><div class="section" data-dcnode-id="3140" id="sec-3"><h2 class="" data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Emotional labour, navigating values and the model of good sexuality</span></h2><p data-dcnode-id="3248" id="p-24"><span data-dcnode-id="3270" instrument_node="">In the counselling services BAC offered, emotional labour was central in managing the tensions between accepting young people’s sexuality and trying to instil in them a sense of sexual responsibility via the model of committed heterosexual relationships. BAC staff resorted to an emotion-based counselling where clients were encouraged to express their feelings and needs. This emphasis on emotions was not new. From the interwar years onwards, in the field of sexual counselling and marriage relationships, the expression of emotions held a significant role in the understanding of the fragility of relationships, sexual development and sexual dysfunctions. The idea that emotions and authenticity were key to successful relationships were spread by marriage and sexual reformers, the Marriage Guidance Movement, church organisations, the FPA and agony aunts and advice columns in magazines and newspapers, among others (</span><a class="xref-bibr alt-style" data-dcnode-id="3268" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="3269" instrument_node="">Chettiar 2013</span></a><span data-dcnode-id="3267" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3265" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="3266" instrument_node="">Collins 2006</span></a><span data-dcnode-id="3264" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3262" href="#ref-38" id="xref-ref-38-2"><span data-dcnode-id="3263" instrument_node="">Harris 2015</span></a><span data-dcnode-id="3261" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3259" href="#ref-45" id="xref-ref-45-1"><span data-dcnode-id="3260" instrument_node="">Langhamer 2015</span></a><span data-dcnode-id="3258" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3256" href="#ref-44" id="xref-ref-44-1"><span data-dcnode-id="3257" instrument_node="">Langhamer 2013</span></a><span data-dcnode-id="3255" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3253" href="#ref-46" id="xref-ref-46-2"><span data-dcnode-id="3254" instrument_node="">Lewis, Clark, and Morgan 1992</span></a><span data-dcnode-id="3252" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3250" href="#ref-54" id="xref-ref-54-1"><span data-dcnode-id="3251" instrument_node="">Rusterholz 2019</span></a><span data-dcnode-id="3249" instrument_node="">). BAC’s work did draw on this tradition and represented a departure from it, since BAC applied it to advising young people, a clear break from the interwar focus on married people. In addition, resorting to emotional counselling was also used as a rhetorical device in BAC’s public discourse. Indeed, BAC based its respectability on providing counselling for emotional problems and relationships, alongside contraception. This emphasis was meant to counter potential criticisms of BAC acting as a ‘contraceptive shop’. In using emotions in this way, BAC staff were trying to find a balance between the progressive radicalism of the clinic in advising young and unmarried women and a form of racial and moral conservatism via the teaching of ‘good’ sexual behaviours.</span></p><p data-dcnode-id="3240" id="p-25"><span data-dcnode-id="3247" instrument_node="">This balance was first found when counsellors ascertained the right mix and degree of emotions that should be shown; they needed to be adequately empathetic and caring while also maintaining a certain emotional distance and refraining from using emotive language to discuss the client’s situation and needs. This testifies to the ways that the value of non-judgmental counselling was performed through emotional labour. For instance, reflecting on her role in a private phone interview in 2020, the counsellor Joanna Brien, who joined London BAC as a counsellor in the early 1980s, stressed that she was ‘an ally’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3245" href="#ref-17" id="xref-ref-17-2"><span data-dcnode-id="3246" instrument_node="">Brien 2020</span></a><span data-dcnode-id="3244" instrument_node="">, March 29), and explained that she joined BAC ‘to provide a level of understanding that young people did not have’ since the majority could not talk with their parents or their friends about their sexual life: “Brook wasn’t moralistic, it was sort of saying, yes, this is really enjoyable activity, but you need to do it as safely as you can”. Strikingly, counsellors avoided emotive language in order to let the client reach her own decision without influencing it. Pauline Crabbe explained in an interview in 1987, “I used to school myself by, for instance, not using emotive terms, talking about a pregnancy and not a baby, because that keeps the sort of distance from it. (…) If you press somebody to make a decision by either using emotive terms or anything else it’s not a valid decision” (</span><a class="xref-bibr alt-style" data-dcnode-id="3242" href="#ref-30" id="xref-ref-30-2"><span data-dcnode-id="3243" instrument_node="">Crabbe 1987</span></a><span data-dcnode-id="3241" instrument_node="">). Indeed, a potential unwanted pregnancy was (and is still) a source of many contradictory emotions, and doctors and counsellors were very concerned with helping the client to disentangle them and identify what would be the best outcome for her, given her own particular circumstances.</span></p><p data-dcnode-id="3238" id="p-26"><span data-dcnode-id="3239" instrument_node="">Giving the opportunity to young people to express their feelings and to identify and discuss their emotions was central to BAC’s work. In 1982, Dr Fay Hutchinson wrote:</span></p><blockquote class="disp-quote" data-dcnode-id="3230" id="disp-quote-1"><p data-dcnode-id="3231" id="p-27"><span data-dcnode-id="3237" instrument_node="">I realise I don’t actually talk to young people very much; most of my effort is directed to trying to get them [to] talk, about themselves, why they’ve come to see me, what they want to do, what’s causing them concern and what they can do to cope with it. Though I may not [be] talking much I am busy observing the patients, trying to assess them, responding to their needs, asking appropriate open-ended questions and giving them time to try and express themselves. (</span><a class="xref-bibr alt-style" data-dcnode-id="3233" href="#ref-42" id="xref-ref-42-2"><span data-dcnode-id="3236" instrument_node="">Hutchinson 1983, </span><span class="named-content page-number" data-dcnode-id="3234" id="named-content-7"><span data-dcnode-id="3235" instrument_node="">172</span></span></a><span data-dcnode-id="3232" instrument_node="">)</span></p></blockquote><p data-dcnode-id="3222" id="p-28"><span data-dcnode-id="3229" instrument_node="">Similarly, in an oral history interview I carried out in 2020 with Joan Woodward, a social worker who worked at Brook Birmingham from 1967 to the mid-1980s, she recalled what made Brook so distinctive: “they wanted to offer contraception to young people who would have a chance to come and have a chat, to talk very informally and in a very friendly way with a social worker” (</span><a class="xref-bibr alt-style" data-dcnode-id="3227" href="#ref-64" id="xref-ref-64-1"><span data-dcnode-id="3228" instrument_node="">Woodward 2020</span></a><span data-dcnode-id="3226" instrument_node="">). BAC workers, then, encouraged informal and friendly discussions and expressing one’s own emotions, a practice that contributed to the stabilisation of sexual subjectivity for young people. For instance, contraceptive counselling was a way to determine whether girls felt pressured to use the pill and to identify the girl’s feelings. As Joan Woodward remembered : when she joined Birmingham BAC in 1967, the pill had become available for all women regardless of marital status. Woodward explained that young girls felt more and more pressurised into having sex with their partner because the partner would say, “get on the pill and we can have sex and you won’t become pregnant” (</span><a class="xref-bibr alt-style" data-dcnode-id="3224" href="#ref-64" id="xref-ref-64-2"><span data-dcnode-id="3225" instrument_node="">Woodward 2020</span></a><span data-dcnode-id="3223" instrument_node="">). Woodward stressed the difference in attitude between young men and women, since the girls ‘wanted a relationship with somebody, [not just] safe sex with them’. Woodward argued that this situation created tensions and anxieties for young women, revealing the need for counselling. This quotation illustrates the tensions brought about by the availability of safer contraception; this new freedom also functioned as a new form of control for men.</span></p><p data-dcnode-id="3220" id="p-29"><span data-dcnode-id="3221" instrument_node="">Regarding pregnancy counselling, BAC advisors recommended that time was needed to think about the best decision for the client. However, time was also a sensitive issue, especially for young women, who would sometimes present themselves for help at BAC in an advanced stage of pregnancy. They needed to make a fast decision. As a result, BAC members established a list of sympathetic doctors who would perform an abortion when the waiting time at the National Health Service (NHS) was too long. Dr Ruth Coles, in 1971, explained that she had learnt “how long the NHS pipeline took and the psychological trauma this caused the patient (and me because they were constantly on the phone expecting me to know when this would be done)”. As shown by this quotation, the long process of state-supported abortion created additional anxieties for the client, who had to deal with uncertainty, and the doctor, who was trying to reassure the client while at the same time dealing with the bureaucracy of the NHS.</span></p><p data-dcnode-id="3215" id="p-30"><span data-dcnode-id="3219" instrument_node="">In addition, BAC counselling also entailed seeking a way to persuade and help under-16 clients to overcome their fears and inform their parents in order to gain abortion approval. Following the 1967 Abortion Act, termination was a possibility, but required the approval of two doctors and, for a minor, a parent. BAC members acted as facilitators for communication between young girls and their parents. The case of ‘Rosie’ (cited in the </span><a class="xref-bibr alt-style" data-dcnode-id="3217" href="#ref-47" id="xref-ref-47-1"><span data-dcnode-id="3218" instrument_node="">London Brook Advisory Centre 1980</span></a><span data-dcnode-id="3216" instrument_node="">) illustrates this point. Rosie, aged 15 years, came to the centre because she feared she was pregnant, and had a pregnancy test that turned out to be positive. The counsellor first needed to identify Rosie’s feelings about the baby. Doctors and counsellors had a common understanding that if a girl had delayed her visit to the centre, this might point to the ‘woman’s instinctive wish to have a child’. She might not be in the right circumstances to welcome a child, but her emotions told her otherwise, and a delay in seeking help was used as a way to keep the child. However, in the case of Rosie, her main emotion was fear that the responsibility that having a child entailed. Since she was under the age of consent and legally a minor in medical terms, the main issue was the necessity of parental permission to have an abortion; as such, she was paralysed by the idea of announcing her pregnancy. The counsellor had to explain carefully to Rosie that it would soon be too late for an abortion. With the help of the counsellor, Rosie found the courage to tell her mother. In this scenario, then, the role of the counsellor was therefore to provide emotional support for the client as the latter made her decision and faced its consequences, that is, informing her parents. This example is testimony to the emotional struggles clients faced and the essential work of BAC counsellors in helping them navigate their emotions.</span></p><p data-dcnode-id="3213" id="p-31"><span data-dcnode-id="3214" instrument_node="">In encouraging young people to express their needs and emotions, BAC helped to reshape the new form of sexual subjectivity, advocated since the interwar years where emotions and self-reflection were paramount.</span></p><div class="subsection" data-dcnode-id="3141" id="sec-4"><h3 data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Psychosexual counselling, pleasure and gendered sexual roles</span></h3><p data-dcnode-id="3197" id="p-32"><span data-dcnode-id="3210" instrument_node="">However, the key area where emotional labour played a central role and where tensions between non-judgmental attitudes and conservative views on sexual relationship were explicit was psychosexual counselling. Sexual counselling had been a focus since the interwar years, but gained in popularity after the World War II, when the emotional stability that depended on the sexual harmony of British citizens was deemed fundamental to the rebuilding of society (</span><a class="xref-bibr alt-style" data-dcnode-id="3208" href="#ref-20" id="xref-ref-20-2"><span data-dcnode-id="3209" instrument_node="">Chettiar 2013</span></a><span data-dcnode-id="3207" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3205" href="#ref-21" id="xref-ref-21-2"><span data-dcnode-id="3206" instrument_node="">Chettiar 2015</span></a><span data-dcnode-id="3204" instrument_node="">). Moreover, the development of sexology, with the success of the Kinsey report and its ‘Little Kinsey’ British counterpart (</span><a class="xref-bibr alt-style" data-dcnode-id="3202" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="3203" instrument_node="">Bingham 2012</span></a><span data-dcnode-id="3201" instrument_node="">), put the search for sexual pleasure at the centre of postwar Britain and the stability of relationships. In order to help couples reach sexual satisfaction, many family planning clinics members turned to psychosexual training, which was heavily influenced by psychoanalysis; FPA members were trained by Michael Balint and later the Institute for Psychosexual Medicine (</span><a class="xref-bibr alt-style" data-dcnode-id="3199" href="#ref-55" id="xref-ref-55-3"><span data-dcnode-id="3200" instrument_node="">Rusterholz 2020</span></a><span data-dcnode-id="3198" instrument_node="">).</span></p><p data-dcnode-id="3192" id="p-33"><span data-dcnode-id="3196" instrument_node="">Balint was a Hungarian psychoanalyst who worked at the Tavistock Institute of Human Relations in London, one of the key British institutes in psychoanalysis. He devised a method to help general practitioners answer the needs of their patients via training in psychotherapy, as also shown by Robert Irwin in this special issue. Balint was interested in the way that a patient presents his/her illness to the doctor and the latter listens, reassures and suggests treatment. Balint highlighted the dynamic of the relationship between the patient and the doctor, since the way in which the doctor answers the patient in turn shapes the patient’s expectations and manner of articulating his or her needs. As such, the doctor should also be an object of study. Balint believed that a doctor should therefore undergo training to free himself or herself from prejudices (</span><a class="xref-bibr alt-style" data-dcnode-id="3194" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="3195" instrument_node="">Balint 1957</span></a><span data-dcnode-id="3193" instrument_node="">). The training devised by Balint saw doctors exchanging experiences of ongoing cases in small groups and describing their difficulties as frankly as possible, under the supervision of a leader. The dynamic of the group enabled doctors to identify mistakes, blind spots and limitations, allowing a better understanding of their problems and prejudices.</span></p><p data-dcnode-id="3187" id="p-34"><span data-dcnode-id="3191" instrument_node="">BAC staff underwent this same training, and therefore shared similar views and values. At the London BAC, a consultant psychotherapist attached to the centre held a seminar fortnightly with the doctors. In this seminar, doctors discussed their cases and shared their experiences and difficulties, based, again, on Balint’s technique. The aim of this supervision seminar, explained counsellor Joanna Brien was to work on the assumptions that one held regarding young people’s sexuality and to know what they were, so as to ‘be able to stand back from them’ (</span><a class="xref-bibr alt-style" data-dcnode-id="3189" href="#ref-17" id="xref-ref-17-3"><span data-dcnode-id="3190" instrument_node="">Brien 2020</span></a><span data-dcnode-id="3188" instrument_node="">). Joanna Brien started working at BAC in the early 1980s after spending a couple of years working for the British Pregnancy Advisory Service—a charity created after the passing of the Abortion Act in 1967 to provide safe, affordable abortions—where she undertook a short period of training in counselling. In Brien’s view, one of the key elements of a successful counselling session was the counsellor’s ‘ability to not impose her own views’. This was perfectly in line with Balint’s training.</span></p><p data-dcnode-id="3182" id="p-35"><span data-dcnode-id="3186" instrument_node="">While psychosexual counselling did help young people in some ways, with its emphasis on past events and trauma, it nevertheless also contributed to pathologising young people’s sexual behaviours. Psychosexual counselling dealt mainly with anxiety, and as clinic doctor Fay Hutchinson noted, “the younger the client the more areas of anxiety she is likely to have” (</span><a class="xref-bibr alt-style" data-dcnode-id="3184" href="#ref-41" id="xref-ref-41-1"><span data-dcnode-id="3185" instrument_node="">Hutchinson 1978</span></a><span data-dcnode-id="3183" instrument_node="">). According to Hutchinson, the clients presented with a wide range of psychosexual problems, including lack of orgasm, fear of intercourse, impotence, anxieties related to the body, sexual abuse, same-sex attraction and difficulty with parental relations. Counselling for under-16s was presented by clinic authorities as a way of ‘buying time’ for the girls ‘to continue developing and maturing so that she may make [a] good relationship in the future’.</span></p><p data-dcnode-id="3180" id="p-36"><span data-dcnode-id="3181" instrument_node="">Over the years, some young men, although still a tiny minority, visited the centres on their own to talk about their fears relating to sexual performance and inadequacy. Orgasmic impairment and premature ejaculation remained the two most common causes for requesting counselling.</span></p><p data-dcnode-id="3155" id="p-37"><span data-dcnode-id="3179" instrument_node="">In 1967 London, </span><a class="xref-bibr alt-style" data-dcnode-id="3177" href="#ref-22" id="xref-ref-22-1"><span data-dcnode-id="3178" instrument_node="">Christie Brown (1967)</span></a><span data-dcnode-id="3176" instrument_node=""> was hired as a clinical doctor; she started a weekly session for what the clinic called ‘girls with special problems’. The sessions lasted 50 min in order to allow the clients to discuss their anxieties at length. Clients were seen as many times as was necessary to make a diagnosis, or were referred to other bodies for help (</span><a class="xref-bibr alt-style" data-dcnode-id="3172" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="3175" instrument_node="">Brook Advisory Centre 1968, </span><span class="named-content page-number" data-dcnode-id="3173" id="named-content-8"><span data-dcnode-id="3174" instrument_node="">40</span></span></a><span data-dcnode-id="3171" instrument_node="">). Christie Brown explained that many unmarried girls needed help with emotional difficulties because they had not fully come to terms with the lives they were living. She stressed again that contradictory attitudes made for a difficult decision for these young people: ‘In a society where parents are likely to regard this action as sinful, conflict is inevitable. These young people have usually seriously thought out the terms of their relationship’ (Christie Brown quoted in </span><a class="xref-bibr alt-style" data-dcnode-id="3169" href="#ref-31" id="xref-ref-31-1"><span data-dcnode-id="3170" instrument_node="">Daily Telegraph 1967</span></a><span data-dcnode-id="3168" instrument_node="">). From 1970, this openness towards youth sexuality extended beyond the notion of safe sex. She underlined the fact that BAC’s focus was on safe sex and avoiding the negative consequences of unprotected intercourse and sought to ‘help some of them enjoy their sexuality’. Thus, for the first time, the notion of enjoyment and pleasure was finally connected to that of young people. Indeed, while sexual pleasure became increasingly discussed and central to the sexual life of married couples from the interwar years onwards (</span><a class="xref-bibr alt-style" data-dcnode-id="3166" href="#ref-54" id="xref-ref-54-2"><span data-dcnode-id="3167" instrument_node="">Rusterholz 2019</span></a><span data-dcnode-id="3165" instrument_node="">), and thus became a new field of practice in FPA clinics, associating sexual pleasure with young people was still highly controversial since it was feared it would encourage promiscuity. Sex education in school, when not simply absent, focused mainly on combatting venereal diseases; sexual pleasure was never addressed. While the mass media started to address the issue of sexual pleasure for women in the late 1960s and early 1970s, teenage magazines at that time remained fairly conventional, and did not venture into sexual pleasure (</span><a class="xref-bibr alt-style" data-dcnode-id="3163" href="#ref-5" id="xref-ref-5-1"><span data-dcnode-id="3164" instrument_node="">Bingham 2012</span></a><span data-dcnode-id="3162" instrument_node="">; </span><a class="xref-bibr alt-style" data-dcnode-id="3160" href="#ref-50" id="xref-ref-50-1"><span data-dcnode-id="3161" instrument_node="">McRobbie 1991</span></a><span data-dcnode-id="3159" instrument_node="">). BAC was the first charity to take on the challenge of offering practical help with the issue of sexual pleasure for young people. This work might have been potentially influenced by the second-wave feminist focus on women’s sexual pleasure, but this influence was never explicitly acknowledged. However, here again, this progressive idea was undermined by conservative views on the ‘right’ type of relationship and gendered sexual roles. Clients were expected to display maturity, and this was assessed based on their adherence to the white-middle class idea of monogamous, heterosexual, committed relationships. Girls who had multiple partners were described as having troubled personalities, either needing attention or rebelling against their parents (</span><a class="xref-bibr alt-style" data-dcnode-id="3157" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="3158" instrument_node="">Christie Brown 1974</span></a><span data-dcnode-id="3156" instrument_node="">). Boys, as a rule, were never described as being promiscuous. This was largely due to a gendered understanding of sexual development where boys were thought of as having a sexual urge difficult to harness, whereas girls were looking for emotional attachment.</span></p><p data-dcnode-id="3147" id="p-38"><span data-dcnode-id="3154" instrument_node="">Doctors and social workers, when presenting study cases in diverse publica
