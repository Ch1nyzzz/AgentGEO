</span><p data-dcnode-id="8926"><span data-dcnode-id="8952" instrument_node="">The </span><b data-dcnode-id="8950"><span data-dcnode-id="8951" instrument_node="">University of Wyoming</span></b><span data-dcnode-id="8949" instrument_node=""> (</span><b data-dcnode-id="8947"><span data-dcnode-id="8948" instrument_node="">UW</span></b><span data-dcnode-id="8946" instrument_node="">) is a </span><a data-dcnode-id="8944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_university" title="Public university"><span data-dcnode-id="8945" instrument_node="">public</span></a><span data-dcnode-id="8943" instrument_node=""> </span><a data-dcnode-id="8941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land-grant_university" title="Land-grant university"><span data-dcnode-id="8942" instrument_node="">land-grant</span></a><span data-dcnode-id="8940" instrument_node=""> </span><a data-dcnode-id="8938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Research_university" title="Research university"><span data-dcnode-id="8939" instrument_node="">research university</span></a><span data-dcnode-id="8937" instrument_node=""> in </span><a data-dcnode-id="8935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laramie%2C_Wyoming" title="Laramie, Wyoming"><span data-dcnode-id="8936" instrument_node="">Laramie, Wyoming</span></a><span data-dcnode-id="8934" instrument_node="">. It was founded in March 1886, four years before the territory was admitted as the 44th state, and opened in September 1887. The University of Wyoming is unusual in that its location within the state is written into the state's constitution.</span><sup class="reference" data-dcnode-id="8931" id="cite_ref-8"><a data-dcnode-id="8932" href="#cite_note-8"><span data-dcnode-id="8933" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8930" instrument_node=""> The university also offers </span><a data-dcnode-id="8928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outreach" title="Outreach"><span data-dcnode-id="8929" instrument_node="">outreach</span></a><span data-dcnode-id="8927" instrument_node=""> education in communities throughout Wyoming and online.
</span></p><p data-dcnode-id="8910"><span data-dcnode-id="8925" instrument_node="">The University of Wyoming consists of seven colleges: agriculture and natural resources, arts and sciences, business, education, engineering and applied sciences, health sciences, and </span><a data-dcnode-id="8923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Wyoming_College_of_Law" title="University of Wyoming College of Law"><span data-dcnode-id="8924" instrument_node="">law</span></a><span data-dcnode-id="8922" instrument_node="">. The university offers over 120 undergraduate, graduate and certificate programs including Doctor of Pharmacy and Juris Doctor.</span><sup class="reference" data-dcnode-id="8919" id="cite_ref-9"><a data-dcnode-id="8920" href="#cite_note-9"><span data-dcnode-id="8921" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8918" instrument_node=""> It is </span><a data-dcnode-id="8916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carnegie_Classification_of_Institutions_of_Higher_Education" title="Carnegie Classification of Institutions of Higher Education"><span data-dcnode-id="8917" instrument_node="">classified</span></a><span data-dcnode-id="8915" instrument_node=""> among "R2: Doctoral Universities – High research activity".</span><sup class="reference" data-dcnode-id="8912" id="cite_ref-10"><a data-dcnode-id="8913" href="#cite_note-10"><span data-dcnode-id="8914" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8911" instrument_node="">
</span></p><p data-dcnode-id="8896"><span data-dcnode-id="8909" instrument_node="">In addition to on-campus classes in Laramie, the university's Outreach School offers more than 41</span><sup class="reference" data-dcnode-id="8906" id="cite_ref-11"><a data-dcnode-id="8907" href="#cite_note-11"><span data-dcnode-id="8908" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8905" instrument_node="">&nbsp;degree, certificate and endorsement programs to distance learners across the state and beyond.</span><sup class="reference" data-dcnode-id="8902" id="cite_ref-distance_12-0"><a data-dcnode-id="8903" href="#cite_note-distance-12"><span data-dcnode-id="8904" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8901" instrument_node=""> These programs are delivered through the use of technology, such as online and video conferencing classes. The Outreach School has nine regional centers in the state, with several on community college campuses, to give Wyoming residents access to a university education without relocating to Laramie.</span><sup class="reference" data-dcnode-id="8898" id="cite_ref-13"><a data-dcnode-id="8899" href="#cite_note-13"><span data-dcnode-id="8900" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8897" instrument_node="">
