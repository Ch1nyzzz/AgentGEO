</span><h2 data-dcnode-id="8509"><span class="mw-headline" data-dcnode-id="8517" id="Campus"><span data-dcnode-id="8518" instrument_node="">Campus</span></span><span class="mw-editsection" data-dcnode-id="8510"><span class="mw-editsection-bracket" data-dcnode-id="8515"><span data-dcnode-id="8516" instrument_node="">[</span></span><a data-dcnode-id="8513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D1" title="Edit section: Campus"><span data-dcnode-id="8514" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8511"><span data-dcnode-id="8512" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8508" instrument_node="">
</span><h3 data-dcnode-id="8498"><span class="mw-headline" data-dcnode-id="8506" id="Old_Main"><span data-dcnode-id="8507" instrument_node="">Old Main</span></span><span class="mw-editsection" data-dcnode-id="8499"><span class="mw-editsection-bracket" data-dcnode-id="8504"><span data-dcnode-id="8505" instrument_node="">[</span></span><a data-dcnode-id="8502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D2" title="Edit section: Old Main"><span data-dcnode-id="8503" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8500"><span data-dcnode-id="8501" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8497" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8488"><div class="thumbinner" data-dcnode-id="8489" style="width:222px;"><a class="image" data-dcnode-id="8495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUniversity_of_wyoming_1908_crop.jpg"><img alt="" class="thumbimage" data-dcnode-id="8496" data-file-height="540" data-file-width="824" decoding="async" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/81/University_of_wyoming_1908_crop.jpg/220px-University_of_wyoming_1908_crop.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/81/University_of_wyoming_1908_crop.jpg/330px-University_of_wyoming_1908_crop.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/81/University_of_wyoming_1908_crop.jpg/440px-University_of_wyoming_1908_crop.jpg 2x" width="220"></a><span data-dcnode-id="8494" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8490"><div class="magnify" data-dcnode-id="8492"><a class="internal" data-dcnode-id="8493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUniversity_of_wyoming_1908_crop.jpg" title="Enlarge"></a></div><span data-dcnode-id="8491" instrument_node="">Old Main pictured in 1908</span></div></div></div><span data-dcnode-id="8487" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="8481" role="note"><span data-dcnode-id="8484" instrument_node="">Main article: </span><a data-dcnode-id="8482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_Main_%28University_of_Wyoming%29" title="Old Main (University of Wyoming)"><span data-dcnode-id="8483" instrument_node="">Old Main (University of Wyoming)</span></a></div><span data-dcnode-id="8480" instrument_node="">
</span><p data-dcnode-id="8471"><span data-dcnode-id="8479" instrument_node="">On September 27, 1886, the cornerstone of Old Main was laid, marking the beginning of the University of Wyoming. The stone is inscribed </span><i data-dcnode-id="8477"><span data-dcnode-id="8478" instrument_node="">Domi Habuit Unde Disceret</span></i><span data-dcnode-id="8476" instrument_node="">, which is often translated, "He need not go away from home for instruction." The following year, the first class of 42 men and women began their college education. For the next decade, the building housed classrooms, a library, and administration offices.</span><sup class="reference" data-dcnode-id="8473" id="cite_ref-14"><a data-dcnode-id="8474" href="#cite_note-14"><span data-dcnode-id="8475" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8472" instrument_node="">
</span></p><p data-dcnode-id="8465"><span data-dcnode-id="8470" instrument_node="">The style of Old Main set a precedent for all future University buildings. The main stone is rough-cut sandstone from a quarry east of Laramie, and the trim stone is smooth Potsdam Sandstone from a quarry near Rawlins. Old Main was supposed to be a monumental structure, and it was designed to be symmetrical, with a prominent central spire as the focal point. The building was also meant to reflect the character of Wyoming, and the rough stone and smooth trim represented the progressing frontier. The design of Old Main had a lasting effect on university structures, most visible in the use of a sandstone façade on nearly every building.</span><sup class="reference" data-dcnode-id="8467" id="cite_ref-15"><a data-dcnode-id="8468" href="#cite_note-15"><span data-dcnode-id="8469" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8466" instrument_node="">
</span></p><p data-dcnode-id="8463"><span data-dcnode-id="8464" instrument_node="">In 1916, the university removed the central spire because of structural concerns. The size of auditorium was reduced during a 1936 renovation. In 1949, the university thoroughly remodeled the building and completely removed the auditorium and exterior stairs. At that time, it officially became known as Old Main, and the name was carved above the east entrance. Currently, Old Main houses university administration, including the president's office and the boardroom where the trustees often meet.
</span></p><span data-dcnode-id="8462" instrument_node="">
</span><h3 data-dcnode-id="8451"><span data-dcnode-id="8461" id="Prexy.27s_Pasture"></span><span class="mw-headline" data-dcnode-id="8459" id="Prexy's_Pasture"><span data-dcnode-id="8460" instrument_node="">Prexy's Pasture</span></span><span class="mw-editsection" data-dcnode-id="8452"><span class="mw-editsection-bracket" data-dcnode-id="8457"><span data-dcnode-id="8458" instrument_node="">[</span></span><a data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D3" title="Edit section: Prexy's Pasture"><span data-dcnode-id="8456" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8453"><span data-dcnode-id="8454" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8450" instrument_node="">
</span><div class="quotebox pullquote floatright" data-dcnode-id="8435" style=";"><span data-dcnode-id="8447" instrument_node="">
</span><blockquote class="quotebox-quote left-aligned" data-dcnode-id="8442" style=""><span data-dcnode-id="8446" instrument_node="">
</span><p data-dcnode-id="8444"><span data-dcnode-id="8445" instrument_node="">In order to preserve the natural and open beauty of that portion of the University of Wyoming campus commonly known and referred to as "Prexy's Pasture", no structures, other than ornamental improvements, or buildings of any kind or type shall be located or constructed upon [that] portion of the campus ...
</span></p><span data-dcnode-id="8443" instrument_node="">
</span></blockquote><span data-dcnode-id="8441" instrument_node="">
</span><p data-dcnode-id="8437"><cite class="left-aligned" data-dcnode-id="8439" style=""><span data-dcnode-id="8440" instrument_node="">Wyoming Legislature Statute
</span></cite><span data-dcnode-id="8438" instrument_node="">
</span></p><span data-dcnode-id="8436" instrument_node="">
</span></div><span data-dcnode-id="8434" instrument_node="">
</span><p data-dcnode-id="8425"><span data-dcnode-id="8433" instrument_node="">Prexy's Pasture is a large grassy area located within a ring of classroom and administrative buildings and serves as the center mall of the campus. The name is attributed to an obscure rule that the university president, or "prexy", is given exclusive use of the area for livestock grazing. During the administration of </span><a data-dcnode-id="8431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_G._Crane" title="Arthur G. Crane"><span data-dcnode-id="8432" instrument_node="">Arthur G. Crane</span></a><span data-dcnode-id="8430" instrument_node="">, the name "Prexy's Pasture" was formally declared. Prexy's, as it is often called today, is also known for the unique pattern formed by concrete pathways that students and faculty use to cross it.</span><sup class="reference" data-dcnode-id="8427" id="cite_ref-16"><a data-dcnode-id="8428" href="#cite_note-16"><span data-dcnode-id="8429" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8426" instrument_node="">
</span></p><p data-dcnode-id="8396"><span data-dcnode-id="8424" instrument_node="">When the University of Wyoming first opened its doors in 1887, Prexy's Pasture was nothing more than an actual pasture covered in native grasses. The </span><a data-dcnode-id="8422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wyoming_Cowboys_football" title="Wyoming Cowboys football"><span data-dcnode-id="8423" instrument_node="">football team</span></a><span data-dcnode-id="8421" instrument_node=""> played their games there until 1922, when </span><a data-dcnode-id="8419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corbett_Field_%28Wyoming%29" title="Corbett Field (Wyoming)"><span data-dcnode-id="8420" instrument_node="">Corbett Field</span></a><span data-dcnode-id="8418" instrument_node=""> opened at the southeast corner of campus. Over time, as the needs of the university has changed, the area has been altered and redesigned. The original design was established in 1924, and in 1949, the area was landscaped with </span><a class="mw-redirect" data-dcnode-id="8416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_Spruce" title="Blue Spruce"><span data-dcnode-id="8417" instrument_node="">Blue Spruce</span></a><span data-dcnode-id="8415" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mugo_Pine" title="Mugo Pine"><span data-dcnode-id="8414" instrument_node="">Mugo Pine</span></a><span data-dcnode-id="8412" instrument_node="">.</span><sup class="reference" data-dcnode-id="8409" id="cite_ref-17"><a data-dcnode-id="8410" href="#cite_note-17"><span data-dcnode-id="8411" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8408" instrument_node=""> In February 1965, the board of trustees decided to construct the new science center on the west side of Prexy's Pasture. The board president, Harold F. Newton, who was concerned about the location, leaked the decision to the local press. The uproar that followed caused the board to decide on a new location for the science center and resulted in a new state statute making it necessary for any new structure built on the pasture to receive legislative approval.</span><sup class="reference" data-dcnode-id="8405" id="cite_ref-18"><a data-dcnode-id="8406" href="#cite_note-18"><span data-dcnode-id="8407" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8404" instrument_node=""> The statue known as "University of Wyoming Family" was installed in 1983 by UW Professor </span><a data-dcnode-id="8402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Russin" title="Robert Russin"><span data-dcnode-id="8403" instrument_node="">Robert Russin</span></a><span data-dcnode-id="8401" instrument_node=""> in anticipation of the centennial celebration.</span><sup class="reference" data-dcnode-id="8398" id="cite_ref-19"><a data-dcnode-id="8399" href="#cite_note-19"><span data-dcnode-id="8400" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8397" instrument_node="">
</span></p><span data-dcnode-id="8395" instrument_node="">
</span><div class="thumb tnone" data-dcnode-id="8385" style="margin-left:auto;margin-right:auto;overflow:hidden;width:auto;max-width:1408px"><div class="thumbinner" data-dcnode-id="8386"><div class="noresize" data-dcnode-id="8392" style="overflow:auto"><a class="image" data-dcnode-id="8393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUwyo_panorama_02.jpg" title="Panorama of Prexy's Pasture at the University of Wyoming"><img alt="" data-dcnode-id="8394" data-file-height="1483" data-file-width="13232" decoding="async" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Uwyo_panorama_02.jpg/1400px-Uwyo_panorama_02.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Uwyo_panorama_02.jpg/2100px-Uwyo_panorama_02.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Uwyo_panorama_02.jpg/2800px-Uwyo_panorama_02.jpg 2x" width="1400"></a></div><div class="thumbcaption" data-dcnode-id="8387" style="text-align:center"><div class="magnify" data-dcnode-id="8389"><a data-dcnode-id="8390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUwyo_panorama_02.jpg" title="File:Uwyo panorama 02.jpg"><span data-dcnode-id="8391" instrument_node=""> </span></a></div><span data-dcnode-id="8388" instrument_node="">Panorama of Prexy's Pasture at the University of Wyoming</span></div></div></div><span data-dcnode-id="8384" instrument_node="">
</span><p data-dcnode-id="8378"><span data-dcnode-id="8383" instrument_node="">In the summer of 2004, Prexy's Pasture was remodeled as the first step in a two-part redesign project. The first step involved removing the asphalt roadway that circled the pasture and replacing it with concrete walkways to make the area a walking campus, as recommended by the 1966 and 1991 Campus Master Plans. The grassy area was also increased, and new lampposts were installed for better lighting. The second phase of the project involved the construction of a plaza at each corner, featuring trees and rocks styled after the rocky outcrops of nearby Vedauwoo.</span><sup class="reference" data-dcnode-id="8380" id="cite_ref-20"><a data-dcnode-id="8381" href="#cite_note-20"><span data-dcnode-id="8382" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8379" instrument_node=""> Two of the plazas, Simpson Plaza and Cheney Plaza, have been completed.
</span></p><p data-dcnode-id="8362"><span data-dcnode-id="8377" instrument_node="">In 2015, several exhibits from the exhibition </span><i data-dcnode-id="8375"><span data-dcnode-id="8376" instrument_node="">Sculpture: A Wyoming Invitational</span></i><span data-dcnode-id="8374" instrument_node=""> were featured along the exterior walkway.</span><sup class="reference" data-dcnode-id="8371" id="cite_ref-21"><a data-dcnode-id="8372" href="#cite_note-21"><span data-dcnode-id="8373" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8370" instrument_node=""> In addition to its primary use by students travelling to and from classes or socializing, the area is host to campus </span><a data-dcnode-id="8368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barbecue" title="Barbecue"><span data-dcnode-id="8369" instrument_node="">barbecues</span></a><span data-dcnode-id="8367" instrument_node=""> and fall welcome events.</span><sup class="reference" data-dcnode-id="8364" id="cite_ref-22"><a data-dcnode-id="8365" href="#cite_note-22"><span data-dcnode-id="8366" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8363" instrument_node="">
</span></p><span data-dcnode-id="8361" instrument_node="">
</span><h3 data-dcnode-id="8351"><span class="mw-headline" data-dcnode-id="8359" id="Wyoming_Union"><span data-dcnode-id="8360" instrument_node="">Wyoming Union</span></span><span class="mw-editsection" data-dcnode-id="8352"><span class="mw-editsection-bracket" data-dcnode-id="8357"><span data-dcnode-id="8358" instrument_node="">[</span></span><a data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D4" title="Edit section: Wyoming Union"><span data-dcnode-id="8356" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8353"><span data-dcnode-id="8354" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8350" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8341"><div class="thumbinner" data-dcnode-id="8342" style="width:172px;"><a class="image" data-dcnode-id="8348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWyoming_Union_2009.jpg"><img alt="" class="thumbimage" data-dcnode-id="8349" data-file-height="3437" data-file-width="2301" decoding="async" height="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Wyoming_Union_2009.jpg/170px-Wyoming_Union_2009.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Wyoming_Union_2009.jpg/255px-Wyoming_Union_2009.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Wyoming_Union_2009.jpg/340px-Wyoming_Union_2009.jpg 2x" width="170"></a><span data-dcnode-id="8347" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8343"><div class="magnify" data-dcnode-id="8345"><a class="internal" data-dcnode-id="8346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWyoming_Union_2009.jpg" title="Enlarge"></a></div><span data-dcnode-id="8344" instrument_node="">The west entrance of Wyoming Union</span></div></div></div><span data-dcnode-id="8340" instrument_node="">
</span><p data-dcnode-id="8332"><span data-dcnode-id="8339" instrument_node="">In September 1937, the university obtained a </span><a data-dcnode-id="8337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_Works_Administration" title="Public Works Administration"><span data-dcnode-id="8338" instrument_node="">Public Works Administration</span></a><span data-dcnode-id="8336" instrument_node=""> loan during the </span><a data-dcnode-id="8334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="8335" instrument_node="">Great Depression</span></a><span data-dcnode-id="8333" instrument_node=""> for $149,250 for construction of a student union. On March 3, 1938, ground was broken and construction began on what would become the Wyoming Union. Many students were involved in the construction, and twenty-five students were trained to be stone-cutters.
</span></p><p data-dcnode-id="8321"><span data-dcnode-id="8331" instrument_node="">From the beginning, the union housed an assortment of student needs and activities. The formal and informal social needs were met by including a </span><a data-dcnode-id="8329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballroom" title="Ballroom"><span data-dcnode-id="8330" instrument_node="">ballroom</span></a><span data-dcnode-id="8328" instrument_node="">, banquet room, lounges, and game rooms. It also contained offices for </span><a class="mw-redirect" data-dcnode-id="8326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Student_government" title="Student government"><span data-dcnode-id="8327" instrument_node="">student government</span></a><span data-dcnode-id="8325" instrument_node="">, committees, organizations, and publications, to help meet the political and organizational needs of the student population. Lastly, a student store, post office, and </span><a class="mw-redirect" data-dcnode-id="8323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bookstore" title="Bookstore"><span data-dcnode-id="8324" instrument_node="">bookstore</span></a><span data-dcnode-id="8322" instrument_node=""> completed the design.
</span></p><p data-dcnode-id="8306"><span data-dcnode-id="8320" instrument_node="">The original design has been modified several times to accommodate changing needs and a growing student population. The first addition was completed in January 1960. This section, added to the northeast of the original structure, expanded the ballroom, made a lounge area and senate chambers adjacent to the ballroom, created the main lobby and </span><a data-dcnode-id="8318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Breezeway" title="Breezeway"><span data-dcnode-id="8319" instrument_node="">breezeway</span></a><span data-dcnode-id="8317" instrument_node="">, and provided a larger food area called The Gardens. In 1973, an addition to the north was completed to make a </span><a data-dcnode-id="8315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_court" title="Food court"><span data-dcnode-id="8316" instrument_node="">food court</span></a><span data-dcnode-id="8314" instrument_node="">, add more space for the bookstore, and create additional offices. Also, parts of the original building were remodeled to create the Campus Activities Center, an art gallery, and a ticket outlet. In 2000, the Wyoming Union underwent extensive renovation. The $12&nbsp;million project moved the food court to the main level, expanded the bookstore to the lower level, and revitalized the look and feel of the interior.</span><sup class="reference" data-dcnode-id="8311" id="cite_ref-23"><a data-dcnode-id="8312" href="#cite_note-23"><span data-dcnode-id="8313" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="8308" id="cite_ref-24"><a data-dcnode-id="8309" href="#cite_note-24"><span data-dcnode-id="8310" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8307" instrument_node="">
</span></p><span data-dcnode-id="8305" instrument_node="">
</span><h3 data-dcnode-id="8295"><span class="mw-headline" data-dcnode-id="8303" id="Ross_Hall"><span data-dcnode-id="8304" instrument_node="">Ross Hall</span></span><span class="mw-editsection" data-dcnode-id="8296"><span class="mw-editsection-bracket" data-dcnode-id="8301"><span data-dcnode-id="8302" instrument_node="">[</span></span><a data-dcnode-id="8299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D5" title="Edit section: Ross Hall"><span data-dcnode-id="8300" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8297"><span data-dcnode-id="8298" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8294" instrument_node="">
</span><p data-dcnode-id="8255"><span data-dcnode-id="8293" instrument_node="">Ross Hall was built in 1959 and first used as a women's dormitory. In 1975, Ross Hall was converted to academic offices. It is located on the south side of Prexy's Pasture and is named after </span><a data-dcnode-id="8291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nellie_Tayloe_Ross" title="Nellie Tayloe Ross"><span data-dcnode-id="8292" instrument_node="">Nellie Tayloe Ross</span></a><span data-dcnode-id="8290" instrument_node="">, Wyoming's and the nation's first woman governor, elected in 1924. There is a brass plaque relief of Nellie Ross in Ross Hall. She was married to </span><a data-dcnode-id="8288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_B._Ross" title="William B. Ross"><span data-dcnode-id="8289" instrument_node="">William B. Ross</span></a><span data-dcnode-id="8287" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="8285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Governors_of_Wyoming" title="List of Governors of Wyoming"><span data-dcnode-id="8286" instrument_node="">12th governor of Wyoming</span></a><span data-dcnode-id="8284" instrument_node="">, who died in office. In 2000, on Ross Hall's fourth floor, the university installed the </span><i data-dcnode-id="8282"><span data-dcnode-id="8283" instrument_node="">Wyoming Press Association’s Newspaper Hall of Fame</span></i><span data-dcnode-id="8281" instrument_node=""> wall photos. In 2014, the Rendezvous Cafe open in the lobby.</span><sup class="reference" data-dcnode-id="8278" id="cite_ref-25"><a data-dcnode-id="8279" href="#cite_note-25"><span data-dcnode-id="8280" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="8275" id="cite_ref-26"><a data-dcnode-id="8276" href="#cite_note-26"><span data-dcnode-id="8277" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="8272" id="cite_ref-27"><a data-dcnode-id="8273" href="#cite_note-27"><span data-dcnode-id="8274" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="8269" id="cite_ref-28"><a data-dcnode-id="8270" href="#cite_note-28"><span data-dcnode-id="8271" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="8266" id="cite_ref-29"><a data-dcnode-id="8267" href="#cite_note-29"><span data-dcnode-id="8268" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="8263" id="cite_ref-loc_30-0"><a data-dcnode-id="8264" href="#cite_note-loc-30"><span data-dcnode-id="8265" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="8260" id="cite_ref-NTRB_31-0"><a data-dcnode-id="8261" href="#cite_note-NTRB-31"><span data-dcnode-id="8262" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="8257" id="cite_ref-32"><a data-dcnode-id="8258" href="#cite_note-32"><span data-dcnode-id="8259" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8256" instrument_node="">
</span></p><span data-dcnode-id="8254" instrument_node="">
</span><h3 data-dcnode-id="8244"><span class="mw-headline" data-dcnode-id="8252" id="Half_Acre_Gym"><span data-dcnode-id="8253" instrument_node="">Half Acre Gym</span></span><span class="mw-editsection" data-dcnode-id="8245"><span class="mw-editsection-bracket" data-dcnode-id="8250"><span data-dcnode-id="8251" instrument_node="">[</span></span><a data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D6" title="Edit section: Half Acre Gym"><span data-dcnode-id="8249" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8246"><span data-dcnode-id="8247" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8243" instrument_node="">
</span><p data-dcnode-id="8224"><span data-dcnode-id="8242" instrument_node="">The </span><a data-dcnode-id="8240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Half_Acre_Gym" title="Half Acre Gym"><span data-dcnode-id="8241" instrument_node="">Half Acre Gym</span></a><span data-dcnode-id="8239" instrument_node=""> facility was constructed in 1925 to house the </span><a class="mw-redirect" data-dcnode-id="8237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Guard_of_the_United_States" title="National Guard of the United States"><span data-dcnode-id="8238" instrument_node="">National Guard</span></a><span data-dcnode-id="8236" instrument_node=""> Armory of </span><a data-dcnode-id="8234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laramie%2C_Wyoming" title="Laramie, Wyoming"><span data-dcnode-id="8235" instrument_node="">Laramie</span></a><span data-dcnode-id="8233" instrument_node="">, as well as the athletic programs, until the field house opened in 1951.</span><sup class="reference" data-dcnode-id="8230" id="cite_ref-33"><a data-dcnode-id="8231" href="#cite_note-33"><span data-dcnode-id="8232" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8229" instrument_node=""> In order to fund this project, the university received a $100,000 gift from the Wyoming State Legislature, designated to be used for new buildings, such as a library, the gymnasium and armory, a power plant, an engineering building, and an expansion of the Hoyt Hall dormitory.</span><sup class="reference" data-dcnode-id="8226" id="cite_ref-34"><a data-dcnode-id="8227" href="#cite_note-34"><span data-dcnode-id="8228" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8225" instrument_node=""> The original structure occupied half an acre (0.20&nbsp;ha), hence the name "Half Acre Gym." It was one of the largest facilities of its type at the time.
</span></p><p data-dcnode-id="8214"><span data-dcnode-id="8223" instrument_node="">The building has undergone several renovations to increase its size and structural safety. In 2012, the university announced a $27 million renovation to begin in the Spring of 2013 and be completed by the Fall of 2014.</span><sup class="reference" data-dcnode-id="8220" id="cite_ref-35"><a data-dcnode-id="8221" href="#cite_note-35"><span data-dcnode-id="8222" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8219" instrument_node=""> Groathouse Construction, a local construction management firm, carried out the project in two phases to allow maximum use of the facility while it was under construction. Phase One would consist of the demolition and recreation of the east portion of the building. Phase Two would include the reopening of the east portion and the closure and construction of the west portion, which is the historical section of the building. Throughout the renovation, the university hoped to keep and incorporate as much of the historical structure and facade as possible.</span><sup class="reference" data-dcnode-id="8216" id="cite_ref-:0_36-0"><a data-dcnode-id="8217" href="#cite_note-:0-36"><span data-dcnode-id="8218" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8215" instrument_node="">
</span></p><p data-dcnode-id="8202"><span data-dcnode-id="8213" instrument_node="">The improvements included elevators, added classrooms, a space for athletic training, new racquetball courts, a climbing wall for </span><a data-dcnode-id="8211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bouldering" title="Bouldering"><span data-dcnode-id="8212" instrument_node="">Bouldering</span></a><span data-dcnode-id="8210" instrument_node="">, a dance studio, a jogging/walking track, and new locker rooms with access to the pool.</span><sup class="reference" data-dcnode-id="8207" id="cite_ref-:0_36-1"><a data-dcnode-id="8208" href="#cite_note-:0-36"><span data-dcnode-id="8209" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="8204" id="cite_ref-37"><a data-dcnode-id="8205" href="#cite_note-37"><span data-dcnode-id="8206" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8203" instrument_node="">
</span></p><span data-dcnode-id="8201" instrument_node="">
</span><h3 data-dcnode-id="8191"><span class="mw-headline" data-dcnode-id="8199" id="Coe_Library"><span data-dcnode-id="8200" instrument_node="">Coe Library</span></span><span class="mw-editsection" data-dcnode-id="8192"><span class="mw-editsection-bracket" data-dcnode-id="8197"><span data-dcnode-id="8198" instrument_node="">[</span></span><a data-dcnode-id="8195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D7" title="Edit section: Coe Library"><span data-dcnode-id="8196" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8193"><span data-dcnode-id="8194" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8190" instrument_node="">
</span><p data-dcnode-id="8188"><span data-dcnode-id="8189" instrument_node="">The original library at the University of Wyoming consisted of 300 books and was located in Old Main. In 1923, the library was moved to the new Aven Nelson Memorial Building. With the 1950s came a larger student population and a greater push for America to excel academically. These factors contributed to the decision by the board of trustees that it was necessary to construct a new library. However, in 1951, the state legislature rejected the funding request.
</span></p><span data-dcnode-id="8187" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8178"><div class="thumbinner" data-dcnode-id="8179" style="width:222px;"><a class="image" data-dcnode-id="8185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_Robertson_Coe_Library_Entrance_2010-2.jpg"><img alt="" class="thumbimage" data-dcnode-id="8186" data-file-height="2381" data-file-width="3558" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/4/45/William_Robertson_Coe_Library_Entrance_2010-2.jpg/220px-William_Robertson_Coe_Library_Entrance_2010-2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/4/45/William_Robertson_Coe_Library_Entrance_2010-2.jpg/330px-William_Robertson_Coe_Library_Entrance_2010-2.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/4/45/William_Robertson_Coe_Library_Entrance_2010-2.jpg/440px-William_Robertson_Coe_Library_Entrance_2010-2.jpg 2x" width="220"></a><span data-dcnode-id="8184" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8180"><div class="magnify" data-dcnode-id="8182"><a class="internal" data-dcnode-id="8183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_Robertson_Coe_Library_Entrance_2010-2.jpg" title="Enlarge"></a></div><span data-dcnode-id="8181" instrument_node="">The main entrance to Coe Library</span></div></div></div><span data-dcnode-id="8177" instrument_node="">
</span><p data-dcnode-id="8169"><a data-dcnode-id="8175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Robertson_Coe" title="William Robertson Coe"><span data-dcnode-id="8176" instrument_node="">William Robertson Coe</span></a><span data-dcnode-id="8174" instrument_node="">, a financier and philanthropist, came to the aid of president Humphrey in 1954 by contributing $750,000 in securities to the university. The trustees called the grant "one of the most outstanding contributions that has ever been made to the perpetuation of the American heritage" and assured Coe that the building would be "appropriately named".</span><sup class="reference" data-dcnode-id="8171" id="cite_ref-38"><a data-dcnode-id="8172" href="#cite_note-38"><span data-dcnode-id="8173" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8170" instrument_node=""> In 1955, the state legislature matched the Coe grant for an overall amount of $1.5&nbsp;million.
</span></p><p data-dcnode-id="8160"><span data-dcnode-id="8168" instrument_node="">Laramie architects Eliot and Clinton Hitchcock, whose father had designed the Aven Nelson Memorial Building, teamed up with the Porter and Porter firm in </span><a data-dcnode-id="8166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cheyenne%2C_Wyoming" title="Cheyenne, Wyoming"><span data-dcnode-id="8167" instrument_node="">Cheyenne</span></a><span data-dcnode-id="8165" instrument_node=""> to design the new library. Their modular design was popular at the time and they intended to make the space very functional. The layout provided room for over 500,000 books and seating for at least 900 students. In May 1956, one year after the death of Coe, ground was broken and construction began on the building. The William Robertson Coe Library was finished in time for the Fall 1958 semester.</span><sup class="reference" data-dcnode-id="8162" id="cite_ref-39"><a data-dcnode-id="8163" href="#cite_note-39"><span data-dcnode-id="8164" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8161" instrument_node=""> In 1979, the stack tower was completed. This structure, designed by Kellogg and Kellogg of Cheyenne and Rock Springs, Wyoming, almost doubled the shelf space of the original Coe Library.
</span></p><p data-dcnode-id="8141"><span data-dcnode-id="8159" instrument_node="">The most recent renovation of the library was completed in the fall of 2009 and officially dedicated on November 19, 2009. Hinthorne Mott Architects designed the new wing, referred to as Coe East, which added 94,500 square feet (8,780&nbsp;m</span><sup data-dcnode-id="8157"><span data-dcnode-id="8158" instrument_node="">2</span></sup><span data-dcnode-id="8156" instrument_node="">) to the library.</span><sup class="reference" data-dcnode-id="8153" id="cite_ref-40"><a data-dcnode-id="8154" href="#cite_note-40"><span data-dcnode-id="8155" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8152" instrument_node=""> The addition was part of a larger, $50&nbsp;million project to modernize the library by integrating technology and information. The renovation created an additional 20 group study rooms, space for 180 computer terminals, and features art by </span><a data-dcnode-id="8150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Surls" title="James Surls"><span data-dcnode-id="8151" instrument_node="">James Surls</span></a><span data-dcnode-id="8149" instrument_node="">.</span><sup class="reference" data-dcnode-id="8146" id="cite_ref-41"><a data-dcnode-id="8147" href="#cite_note-41"><span data-dcnode-id="8148" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="8143" id="cite_ref-42"><a data-dcnode-id="8144" href="#cite_note-42"><span data-dcnode-id="8145" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8142" instrument_node="">
</span></p><span data-dcnode-id="8140" instrument_node="">
</span><h3 data-dcnode-id="8130"><span class="mw-headline" data-dcnode-id="8138" id="Classroom_Building"><span data-dcnode-id="8139" instrument_node="">Classroom Building</span></span><span class="mw-editsection" data-dcnode-id="8131"><span class="mw-editsection-bracket" data-dcnode-id="8136"><span data-dcnode-id="8137" instrument_node="">[</span></span><a data-dcnode-id="8134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D8" title="Edit section: Classroom Building"><span data-dcnode-id="8135" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8132"><span data-dcnode-id="8133" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8129" instrument_node="">
</span><p data-dcnode-id="8124"><span data-dcnode-id="8128" instrument_node="">The Classroom Building, dedicated in 1971 at a cost of $1.75&nbsp;million, was designed to be a general purpose building for the university. The placement and unique design by the local architects W. Eliot and Clinton A. Hitchcock makes it the focal point of the George Duke Humphrey Science Center. The building also contains four interior mosaics, designed by University of Wyoming art professors James Boyle, Joseph Deaderick, Richard Evans, and Victor Flach, that represent the quadrant of Wyoming they face. Each mosaic is over 2,200 square feet (200&nbsp;m</span><sup data-dcnode-id="8126"><span data-dcnode-id="8127" instrument_node="">2</span></sup><span data-dcnode-id="8125" instrument_node="">)
</span></p><span data-dcnode-id="8123" instrument_node="">
</span><div class="thumb tnone" data-dcnode-id="8113" style="margin-left:auto;margin-right:auto;overflow:hidden;width:auto;max-width:908px"><div class="thumbinner" data-dcnode-id="8114"><div class="noresize" data-dcnode-id="8120" style="overflow:auto"><a class="image" data-dcnode-id="8121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUwyo_panorama_03.jpg" title="Panorama of George Duke Humphrey Science Center"><img alt="" data-dcnode-id="8122" data-file-height="2296" data-file-width="13296" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Uwyo_panorama_03.jpg/900px-Uwyo_panorama_03.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Uwyo_panorama_03.jpg/1350px-Uwyo_panorama_03.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Uwyo_panorama_03.jpg/1800px-Uwyo_panorama_03.jpg 2x" width="900"></a></div><div class="thumbcaption" data-dcnode-id="8115" style="text-align:center"><div class="magnify" data-dcnode-id="8117"><a data-dcnode-id="8118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUwyo_panorama_03.jpg" title="File:Uwyo panorama 03.jpg"><span data-dcnode-id="8119" instrument_node=""> </span></a></div><span data-dcnode-id="8116" instrument_node="">Panorama of George Duke Humphrey Science Center</span></div></div></div><span data-dcnode-id="8112" instrument_node="">
</span><p data-dcnode-id="8106"><span data-dcnode-id="8111" instrument_node="">In 2007, after a two-year, $14.7&nbsp;million renovation project, the Classroom Building reopened. The goal of the renovation was to incorporate new technology and redesign the seating better to meet the needs of students who carry laptops and backpacks. The building was also retrofitted with air conditioning. The unique characteristics of the original building, such as the circular design and mosaics, were maintained.</span><sup class="reference" data-dcnode-id="8108" id="cite_ref-43"><a data-dcnode-id="8109" href="#cite_note-43"><span data-dcnode-id="8110" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8107" instrument_node="">
</span></p><span data-dcnode-id="8105" instrument_node="">
</span><h3 data-dcnode-id="8095"><span class="mw-headline" data-dcnode-id="8103" id="Housing"><span data-dcnode-id="8104" instrument_node="">Housing</span></span><span class="mw-editsection" data-dcnode-id="8096"><span class="mw-editsection-bracket" data-dcnode-id="8101"><span data-dcnode-id="8102" instrument_node="">[</span></span><a data-dcnode-id="8099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D9" title="Edit section: Housing"><span data-dcnode-id="8100" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8097"><span data-dcnode-id="8098" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8094" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8085"><div class="thumbinner" data-dcnode-id="8086" style="width:222px;"><a class="image" data-dcnode-id="8092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWashakie_Dining_Center_and_McIntyre_Hall_2010-2.jpg"><img alt="" class="thumbimage" data-dcnode-id="8093" data-file-height="2356" data-file-width="3520" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/82/Washakie_Dining_Center_and_McIntyre_Hall_2010-2.jpg/220px-Washakie_Dining_Center_and_McIntyre_Hall_2010-2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/82/Washakie_Dining_Center_and_McIntyre_Hall_2010-2.jpg/330px-Washakie_Dining_Center_and_McIntyre_Hall_2010-2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/82/Washakie_Dining_Center_and_McIntyre_Hall_2010-2.jpg/440px-Washakie_Dining_Center_and_McIntyre_Hall_2010-2.jpg 2x" width="220"></a><span data-dcnode-id="8091" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8087"><div class="magnify" data-dcnode-id="8089"><a class="internal" data-dcnode-id="8090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWashakie_Dining_Center_and_McIntyre_Hall_2010-2.jpg" title="Enlarge"></a></div><span data-dcnode-id="8088" instrument_node="">Washakie Dining Center and McIntyre Hall</span></div></div></div><span data-dcnode-id="8084" instrument_node="">
</span><p data-dcnode-id="8075"><span data-dcnode-id="8083" instrument_node="">The university has four residence halls and four apartment complexes. The four residence halls, Orr, White, Downey, and McIntyre, are connected together via the </span><a data-dcnode-id="8081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washakie" title="Washakie"><span data-dcnode-id="8082" instrument_node="">Washakie</span></a><span data-dcnode-id="8080" instrument_node=""> Dining Center, which contains the main dining hall and other student services. These residence halls house primarily freshmen. All incoming freshmen are expected to live in the residence halls during their first year, with some exceptions.</span><sup class="reference" data-dcnode-id="8077" id="cite_ref-44"><a data-dcnode-id="8078" href="#cite_note-44"><span data-dcnode-id="8079" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8076" instrument_node="">
</span></p><p data-dcnode-id="8043"><span data-dcnode-id="8074" instrument_node="">Each of the residence halls is named after an influential administrator or faculty member. Downey Hall is an eight-story dormitory located southwest of the Washakie Dining Center and is named after Dr. </span><a class="mw-redirect" data-dcnode-id="8072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/June_Etta_Downey" title="June Etta Downey"><span data-dcnode-id="8073" instrument_node="">June Etta Downey</span></a><span data-dcnode-id="8071" instrument_node="">.</span><sup class="reference" data-dcnode-id="8068" id="cite_ref-45"><a data-dcnode-id="8069" href="#cite_note-45"><span data-dcnode-id="8070" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="8065" id="cite_ref-46"><a data-dcnode-id="8066" href="#cite_note-46"><span data-dcnode-id="8067" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8064" instrument_node=""> Located west of the Washakie Dining Center is White Hall, a dormitory named after Dr. Laura Amanda White.</span><sup class="reference" data-dcnode-id="8061" id="cite_ref-47"><a data-dcnode-id="8062" href="#cite_note-47"><span data-dcnode-id="8063" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8060" instrument_node=""> At twelve stories and 146&nbsp;feet, White Hall is the second tallest building in the state of Wyoming, two feet shorter than the Wyoming Financial Center in Cheyenne.</span><sup class="reference" data-dcnode-id="8057" id="cite_ref-runstairs_48-0"><a data-dcnode-id="8058" href="#cite_note-runstairs-48"><span data-dcnode-id="8059" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8056" instrument_node=""> McIntyre Hall, named after Dr. Clara Frances McIntyre, is located east of the Washakie Dining Center. This twelve-story building underwent extensive renovations in 2004 and 2005.</span><sup class="reference" data-dcnode-id="8053" id="cite_ref-49"><a data-dcnode-id="8054" href="#cite_note-49"><span data-dcnode-id="8055" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8052" instrument_node=""> Just northeast of McIntyre Hall is the eight-story Orr Hall, named after Dr. Harriet Knight Orr.</span><sup class="reference" data-dcnode-id="8049" id="cite_ref-50"><a data-dcnode-id="8050" href="#cite_note-50"><span data-dcnode-id="8051" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8048" instrument_node=""> From 2005 to 2006, Orr Hall also underwent extensive renovations to modernize its living space.</span><sup class="reference" data-dcnode-id="8045" id="cite_ref-51"><a data-dcnode-id="8046" href="#cite_note-51"><span data-dcnode-id="8047" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8044" instrument_node="">
</span></p><p data-dcnode-id="8037"><span data-dcnode-id="8042" instrument_node="">The University Apartments are located east of War Memorial Stadium. They are available on a first-come, first-serve basis to all University of Wyoming students above freshman standing. Currently there are apartment units in a variety of layouts in the River Village, Bison Run, Landmark, and Spanish Walk apartment complexes.</span><sup class="reference" data-dcnode-id="8039" id="cite_ref-52"><a data-dcnode-id="8040" href="#cite_note-52"><span data-dcnode-id="8041" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8038" instrument_node="">
</span></p><span data-dcnode-id="8036" instrument_node="">
</span><h3 data-dcnode-id="8026"><span class="mw-headline" data-dcnode-id="8034" id="Museums"><span data-dcnode-id="8035" instrument_node="">Museums</span></span><span class="mw-editsection" data-dcnode-id="8027"><span class="mw-editsection-bracket" data-dcnode-id="8032"><span data-dcnode-id="8033" instrument_node="">[</span></span><a data-dcnode-id="8030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D10" title="Edit section: Museums"><span data-dcnode-id="8031" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8028"><span data-dcnode-id="8029" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8025" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8016"><div class="thumbinner" data-dcnode-id="8017" style="width:222px;"><a class="image" data-dcnode-id="8023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAmerican_Heritage_Center.JPG"><img alt="" class="thumbimage" data-dcnode-id="8024" data-file-height="4000" data-file-width="6016" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/American_Heritage_Center.JPG/220px-American_Heritage_Center.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/American_Heritage_Center.JPG/330px-American_Heritage_Center.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3c/American_Heritage_Center.JPG/440px-American_Heritage_Center.JPG 2x" width="220"></a><span data-dcnode-id="8022" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8018"><div class="magnify" data-dcnode-id="8020"><a class="internal" data-dcnode-id="8021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAmerican_Heritage_Center.JPG" title="Enlarge"></a></div><span data-dcnode-id="8019" instrument_node="">Centennial Complex, houses the American Heritage Center and the University of Wyoming Art Museum</span></div></div></div><span data-dcnode-id="8015" instrument_node="">
</span><p data-dcnode-id="8013"><span data-dcnode-id="8014" instrument_node="">The University of Wyoming is home to several facilities that allow the public to view their unique collections.
</span></p><span data-dcnode-id="8012" instrument_node="">
</span><h4 data-dcnode-id="8002"><span class="mw-headline" data-dcnode-id="8010" id="American_Heritage_Center"><span data-dcnode-id="8011" instrument_node="">American Heritage Center</span></span><span class="mw-editsection" data-dcnode-id="8003"><span class="mw-editsection-bracket" data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">[</span></span><a data-dcnode-id="8006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D11" title="Edit section: American Heritage Center"><span data-dcnode-id="8007" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8004"><span data-dcnode-id="8005" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8001" instrument_node="">
</span><p data-dcnode-id="7986"><span data-dcnode-id="8000" instrument_node="">The </span><a data-dcnode-id="7998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Heritage_Center" title="American Heritage Center"><span data-dcnode-id="7999" instrument_node="">American Heritage Center</span></a><span data-dcnode-id="7997" instrument_node="">, located in the Centennial Complex, is an extensive repository of manuscripts, photographs, artworks, movies, audio recordings, and other items. It is one of the largest non-governmental archives west of the </span><a data-dcnode-id="7995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mississippi_River" title="Mississippi River"><span data-dcnode-id="7996" instrument_node="">Mississippi River</span></a><span data-dcnode-id="7994" instrument_node="">. Officially established in 1945, it now contains over 90,000 cubic feet (2,500&nbsp;m</span><sup data-dcnode-id="7992"><span data-dcnode-id="7993" instrument_node="">3</span></sup><span data-dcnode-id="7991" instrument_node="">) of historic documents and materials. It is also home to the Toppan Library, which contains over 50,000 rare books.</span><sup class="reference" data-dcnode-id="7988" id="cite_ref-53"><a data-dcnode-id="7989" href="#cite_note-53"><span data-dcnode-id="7990" instrument_node="">[53]</span></a></sup><span data-dcnode-id="7987" instrument_node=""> Because of its size, the AHC has many collecting areas. It features Wyoming and Western history from the early nineteenth to the twenty-first century; women's suffrage; transportation history, including railroad history (especially the transcontinental railroad) as well as aviation; and mineral, coal, and oil extraction. It has extensive entertainment collections in: theater; radio and television; film; music; Hollywood (from Jack Benny and Barbara Stanwyck to Stan Lee); politics and journalism; authors; composers; and artists.
</span></p><span data-dcnode-id="7985" instrument_node="">
</span><h4 data-dcnode-id="7975"><span class="mw-headline" data-dcnode-id="7983" id="University_of_Wyoming_Art_Museum"><span data-dcnode-id="7984" instrument_node="">University of Wyoming Art Museum</span></span><span class="mw-editsection" data-dcnode-id="7976"><span class="mw-editsection-bracket" data-dcnode-id="7981"><span data-dcnode-id="7982" instrument_node="">[</span></span><a data-dcnode-id="7979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D12" title="Edit section: University of Wyoming Art Museum"><span data-dcnode-id="7980" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7977"><span data-dcnode-id="7978" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7974" instrument_node="">
</span><p data-dcnode-id="7908"><span data-dcnode-id="7973" instrument_node="">The University of Wyoming Art Museum is also located in the Centennial Complex on East Willet Drive.</span><sup class="reference" data-dcnode-id="7970" id="cite_ref-54"><a data-dcnode-id="7971" href="#cite_note-54"><span data-dcnode-id="7972" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7969" instrument_node=""> The museum's collections include art in many media from around the world, including: European and American paintings, prints, sculpture and drawings; 18th and 19th century Japanese </span><a data-dcnode-id="7967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukiyo-e" title="Ukiyo-e"><span data-dcnode-id="7968" instrument_node="">Ukiyo-e</span></a><span data-dcnode-id="7966" instrument_node=""> prints; 15th through 19th century </span><a data-dcnode-id="7964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_miniature" title="Persian miniature"><span data-dcnode-id="7965" instrument_node="">Persian</span></a><span data-dcnode-id="7963" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_miniature_painting" title="Indian miniature painting"><span data-dcnode-id="7962" instrument_node="">Indian miniature paintings</span></a><span data-dcnode-id="7960" instrument_node="">; 20th century </span><a data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haitian_art" title="Haitian art"><span data-dcnode-id="7959" instrument_node="">Haitian art</span></a><span data-dcnode-id="7957" instrument_node="">; 20th century Japanese </span><a data-dcnode-id="7955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netsuke" title="Netsuke"><span data-dcnode-id="7956" instrument_node="">netsuke</span></a><span data-dcnode-id="7954" instrument_node="">; 20th century and contemporary photography; and </span><a class="mw-redirect" data-dcnode-id="7952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rapa_Nui" title="Rapa Nui"><span data-dcnode-id="7953" instrument_node="">Rapa Nui</span></a><span data-dcnode-id="7951" instrument_node="">, African, and Native American artifacts. Artists in the collection include </span><a data-dcnode-id="7949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Hart_Benton_%28painter%29" title="Thomas Hart Benton (painter)"><span data-dcnode-id="7950" instrument_node="">Thomas Hart Benton</span></a><span data-dcnode-id="7948" instrument_node="">, </span><a data-dcnode-id="7946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralston_Crawford" title="Ralston Crawford"><span data-dcnode-id="7947" instrument_node="">Ralston Crawford</span></a><span data-dcnode-id="7945" instrument_node="">, </span><a data-dcnode-id="7943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jun_Kaneko" title="Jun Kaneko"><span data-dcnode-id="7944" instrument_node="">Jun Kaneko</span></a><span data-dcnode-id="7942" instrument_node="">, </span><a data-dcnode-id="7940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hung_Liu" title="Hung Liu"><span data-dcnode-id="7941" instrument_node="">Hung Liu</span></a><span data-dcnode-id="7939" instrument_node="">, </span><a data-dcnode-id="7937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristide_Maillol" title="Aristide Maillol"><span data-dcnode-id="7938" instrument_node="">Aristide Maillol</span></a><span data-dcnode-id="7936" instrument_node="">, </span><a data-dcnode-id="7934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joan_Mir%25C3%25B3" title="Joan Miró"><span data-dcnode-id="7935" instrument_node="">Joan Miró</span></a><span data-dcnode-id="7933" instrument_node="">, </span><a data-dcnode-id="7931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Misrach" title="Richard Misrach"><span data-dcnode-id="7932" instrument_node="">Richard Misrach</span></a><span data-dcnode-id="7930" instrument_node="">, </span><a data-dcnode-id="7928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Rauschenberg" title="Robert Rauschenberg"><span data-dcnode-id="7929" instrument_node="">Robert Rauschenberg</span></a><span data-dcnode-id="7927" instrument_node=""> and </span><a data-dcnode-id="7925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Signac" title="Paul Signac"><span data-dcnode-id="7926" instrument_node="">Paul Signac</span></a><span data-dcnode-id="7924" instrument_node="">.</span><sup class="reference" data-dcnode-id="7921" id="cite_ref-55"><a data-dcnode-id="7922" href="#cite_note-55"><span data-dcnode-id="7923" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7920" instrument_node=""> The museum also hosts changing exhibits of art from around the world.</span><sup class="reference" data-dcnode-id="7917" id="cite_ref-56"><a data-dcnode-id="7918" href="#cite_note-56"><span data-dcnode-id="7919" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7916" instrument_node=""> The Centennial Complex was designed by </span><a data-dcnode-id="7914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antoine_Predock" title="Antoine Predock"><span data-dcnode-id="7915" instrument_node="">Antoine Predock</span></a><span data-dcnode-id="7913" instrument_node=""> and opened in 1993.</span><sup class="reference" data-dcnode-id="7910" id="cite_ref-57"><a data-dcnode-id="7911" href="#cite_note-57"><span data-dcnode-id="7912" instrument_node="">[57]</span></a></sup><span data-dcnode-id="7909" instrument_node="">
</span></p><p data-dcnode-id="7896"><span data-dcnode-id="7907" instrument_node="">In collaboration with the </span><a data-dcnode-id="7905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Wyoming_College_of_Law" title="University of Wyoming College of Law"><span data-dcnode-id="7906" instrument_node="">College of Law</span></a><span data-dcnode-id="7904" instrument_node="">, the museum conducts research and instruction on the </span><a data-dcnode-id="7902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_American_Graves_Protection_and_Repatriation_Act" title="Native American Graves Protection and Repatriation Act"><span data-dcnode-id="7903" instrument_node="">Native American Graves Protections and Repatriation Act (NAGPRA)</span></a><span data-dcnode-id="7901" instrument_node=""> and legal issues surrounding the repatriation of human remains.</span><sup class="reference" data-dcnode-id="7898" id="cite_ref-58"><a data-dcnode-id="7899" href="#cite_note-58"><span data-dcnode-id="7900" instrument_node="">[58]</span></a></sup><span data-dcnode-id="7897" instrument_node="">
</span></p><span data-dcnode-id="7895" instrument_node="">
</span><h4 data-dcnode-id="7885"><span class="mw-headline" data-dcnode-id="7893" id="University_of_Wyoming_Geological_Museum"><span data-dcnode-id="7894" instrument_node="">University of Wyoming Geological Museum</span></span><span class="mw-editsection" data-dcnode-id="7886"><span class="mw-editsection-bracket" data-dcnode-id="7891"><span data-dcnode-id="7892" instrument_node="">[</span></span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D13" title="Edit section: University of Wyoming Geological Museum"><span data-dcnode-id="7890" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7887"><span data-dcnode-id="7888" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7884" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7875"><div class="thumbinner" data-dcnode-id="7876" style="width:172px;"><a class="image" data-dcnode-id="7882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUniversity_of_Wyoming_Geological_Museum_1.jpg"><img alt="" class="thumbimage" data-dcnode-id="7883" data-file-height="3872" data-file-width="2592" decoding="async" height="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d5/University_of_Wyoming_Geological_Museum_1.jpg/170px-University_of_Wyoming_Geological_Museum_1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d5/University_of_Wyoming_Geological_Museum_1.jpg/255px-University_of_Wyoming_Geological_Museum_1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d5/University_of_Wyoming_Geological_Museum_1.jpg/340px-University_of_Wyoming_Geological_Museum_1.jpg 2x" width="170"></a><span data-dcnode-id="7881" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7877"><div class="magnify" data-dcnode-id="7879"><a class="internal" data-dcnode-id="7880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUniversity_of_Wyoming_Geological_Museum_1.jpg" title="Enlarge"></a></div><span data-dcnode-id="7878" instrument_node="">The University of Wyoming Geological Museum</span></div></div></div><span data-dcnode-id="7874" instrument_node="">
</span><p data-dcnode-id="7849"><span data-dcnode-id="7873" instrument_node="">The University of Wyoming's Geological Museum houses a collection of fossils and minerals with special focus on the history of Wyoming.</span><sup class="reference" data-dcnode-id="7870" id="cite_ref-59"><a data-dcnode-id="7871" href="#cite_note-59"><span data-dcnode-id="7872" instrument_node="">[59]</span></a></sup><span data-dcnode-id="7869" instrument_node=""> When the University of Wyoming was founded, the museum was essentially the small personal collection of Professor J.D. Conley. In 1893, Wilbur Knight, who was hired as a professor of mining and geology, took over as the museum curator. The museum moved to the Hall of Science in 1902 and continued to expand. By the time the collection was moved to its current location in 1956, Knight's son Samuel Howell Knight had made the university's Geology Department well-known around the country. Samuel Howell Knight acquired many of the exhibits and paintings that are still on display, including the copper </span><a data-dcnode-id="7867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tyrannosaurus" title="Tyrannosaurus"><span data-dcnode-id="7868" instrument_node="">Tyrannosaurus</span></a><span data-dcnode-id="7866" instrument_node=""> at the entrance, the initial mounting of the </span><a data-dcnode-id="7864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apatosaurus" title="Apatosaurus"><span data-dcnode-id="7865" instrument_node="">Apatosaurus</span></a><span data-dcnode-id="7863" instrument_node=""> skeleton centerpiece, and the </span><a data-dcnode-id="7861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terracotta" title="Terracotta"><span data-dcnode-id="7862" instrument_node="">terracotta</span></a><span data-dcnode-id="7860" instrument_node=""> </span><a data-dcnode-id="7858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stegosaurus" title="Stegosaurus"><span data-dcnode-id="7859" instrument_node="">Stegosaurus</span></a><span data-dcnode-id="7857" instrument_node=""> and </span><a data-dcnode-id="7855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Triceratops" title="Triceratops"><span data-dcnode-id="7856" instrument_node="">Triceratops</span></a><span data-dcnode-id="7854" instrument_node=""> panels.</span><sup class="reference" data-dcnode-id="7851" id="cite_ref-60"><a data-dcnode-id="7852" href="#cite_note-60"><span data-dcnode-id="7853" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7850" instrument_node="">
</span></p><p data-dcnode-id="7790"><span data-dcnode-id="7848" instrument_node="">One of the most famous exhibits at the museum is the </span><a data-dcnode-id="7846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allosaurus" title="Allosaurus"><span data-dcnode-id="7847" instrument_node="">Allosaurus</span></a><span data-dcnode-id="7845" instrument_node=""> known as "</span><a data-dcnode-id="7843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allosaurus%23%2522Big_Al%2522_and_%2522Big_Al_II%2522" title="Allosaurus"><span data-dcnode-id="7844" instrument_node="">Big Al</span></a><span data-dcnode-id="7842" instrument_node="">." It was featured in the BBC documentary </span><i data-dcnode-id="7838"><a data-dcnode-id="7840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Ballad_of_Big_Al" title="The Ballad of Big Al"><span data-dcnode-id="7841" instrument_node="">The Ballad of Big Al</span></a><span data-dcnode-id="7839" instrument_node="">.</span></i><sup class="reference" data-dcnode-id="7835" id="cite_ref-61"><a data-dcnode-id="7836" href="#cite_note-61"><span data-dcnode-id="7837" instrument_node="">[61]</span></a></sup><span data-dcnode-id="7834" instrument_node=""> The University of Wyoming Geological Museum has also received coverage from </span><i data-dcnode-id="7831"><a class="mw-redirect" data-dcnode-id="7832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Geographic_%28magazine%29" title="National Geographic (magazine)"><span data-dcnode-id="7833" instrument_node="">National Geographic</span></a></i><span data-dcnode-id="7830" instrument_node="">, </span><a data-dcnode-id="7828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CNN" title="CNN"><span data-dcnode-id="7829" instrument_node="">CNN</span></a><span data-dcnode-id="7827" instrument_node="">, </span><i data-dcnode-id="7824"><a class="mw-redirect" data-dcnode-id="7825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earth_Magazine" title="Earth Magazine"><span data-dcnode-id="7826" instrument_node="">Earth Magazine</span></a></i><span data-dcnode-id="7823" instrument_node="">, </span><a data-dcnode-id="7821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Cronkite" title="Walter Cronkite"><span data-dcnode-id="7822" instrument_node="">Walter Cronkite</span></a><span data-dcnode-id="7820" instrument_node="">, and </span><i data-dcnode-id="7817"><a data-dcnode-id="7818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NBC_Nightly_News" title="NBC Nightly News"><span data-dcnode-id="7819" instrument_node="">NBC Nightly News</span></a></i><span data-dcnode-id="7816" instrument_node=""> with </span><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_Brokaw" title="Tom Brokaw"><span data-dcnode-id="7815" instrument_node="">Tom Brokaw</span></a><span data-dcnode-id="7813" instrument_node="">, and it has been shown on many dinosaur programs.</span><sup class="reference" data-dcnode-id="7810" id="cite_ref-62"><a data-dcnode-id="7811" href="#cite_note-62"><span data-dcnode-id="7812" instrument_node="">[62]</span></a></sup><span data-dcnode-id="7809" instrument_node=""> On June 30, 2009, the museum was closed to meet state budget cuts. Following this controversial decision, an endowment fund was set up to support the museum.</span><sup class="reference" data-dcnode-id="7806" id="cite_ref-63"><a data-dcnode-id="7807" href="#cite_note-63"><span data-dcnode-id="7808" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="7803" id="cite_ref-64"><a data-dcnode-id="7804" href="#cite_note-64"><span data-dcnode-id="7805" instrument_node="">[64]</span></a></sup><sup class="reference" data-dcnode-id="7800" id="cite_ref-65"><a data-dcnode-id="7801" href="#cite_note-65"><span data-dcnode-id="7802" instrument_node="">[65]</span></a></sup><span data-dcnode-id="7799" instrument_node=""> After substantial infrastructure upgrades, the museum reopened to the public on January 12, 2013</span><sup class="reference" data-dcnode-id="7796" id="cite_ref-66"><a data-dcnode-id="7797" href="#cite_note-66"><span data-dcnode-id="7798" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7795" instrument_node=""> and resumed its regular hours with free admission.</span><sup class="reference" data-dcnode-id="7792" id="cite_ref-67"><a data-dcnode-id="7793" href="#cite_note-67"><span data-dcnode-id="7794" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7791" instrument_node=""> Some exhibits, like the Late Cretaceous display, have been completed, while others are still under renovation.
</span></p><span data-dcnode-id="7789" instrument_node="">
</span><h4 data-dcnode-id="7779"><span class="mw-headline" data-dcnode-id="7787" id="University_of_Wyoming_Anthropology_Museum"><span data-dcnode-id="7788" instrument_node="">University of Wyoming Anthropology Museum</span></span><span class="mw-editsection" data-dcnode-id="7780"><span class="mw-editsection-bracket" data-dcnode-id="7785"><span data-dcnode-id="7786" instrument_node="">[</span></span><a data-dcnode-id="7783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D14" title="Edit section: University of Wyoming Anthropology Museum"><span data-dcnode-id="7784" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7781"><span data-dcnode-id="7782" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7778" instrument_node="">
</span><p data-dcnode-id="7766"><span data-dcnode-id="7777" instrument_node="">The University of Wyoming Anthropology Museum is operated by the Anthropology Department and is located in the Anthropology Building at 12th and Lewis Streets.</span><sup class="reference" data-dcnode-id="7774" id="cite_ref-68"><a data-dcnode-id="7775" href="#cite_note-68"><span data-dcnode-id="7776" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7773" instrument_node=""> Exhibits are spread throughout three floors of the building. Displays include early humans, the </span><a class="new" data-dcnode-id="7771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DColby_Mammoth_Site%26action%3Dedit%26redlink%3D1" title="Colby Mammoth Site (page does not exist)"><span data-dcnode-id="7772" instrument_node="">Colby Mammoth Site</span></a><span data-dcnode-id="7770" instrument_node="">, </span><a data-dcnode-id="7768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vore_Buffalo_Jump" title="Vore Buffalo Jump"><span data-dcnode-id="7769" instrument_node="">Vore Buffalo Jump</span></a><span data-dcnode-id="7767" instrument_node="">, and other Wyoming archaeology sites.
</span></p><span data-dcnode-id="7765" instrument_node="">
</span><h4 data-dcnode-id="7755"><span class="mw-headline" data-dcnode-id="7763" id="University_of_Wyoming_Insect_Museum"><span data-dcnode-id="7764" instrument_node="">University of Wyoming Insect Museum</span></span><span class="mw-editsection" data-dcnode-id="7756"><span class="mw-editsection-bracket" data-dcnode-id="7761"><span data-dcnode-id="7762" instrument_node="">[</span></span><a data-dcnode-id="7759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D15" title="Edit section: University of Wyoming Insect Museum"><span data-dcnode-id="7760" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7757"><span data-dcnode-id="7758" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7754" instrument_node="">
</span><p data-dcnode-id="7744"><span data-dcnode-id="7753" instrument_node="">The University of Wyoming Insect Museum is a research museum located in the Agriculture Building.</span><sup class="reference" data-dcnode-id="7750" id="cite_ref-69"><a data-dcnode-id="7751" href="#cite_note-69"><span data-dcnode-id="7752" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7749" instrument_node=""> Displays include mounted insects, a small zoo with living insects, and an interactive discovery cabinet.</span><sup class="reference" data-dcnode-id="7746" id="cite_ref-70"><a data-dcnode-id="7747" href="#cite_note-70"><span data-dcnode-id="7748" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7745" instrument_node="">
