</span><p data-dcnode-id="7414"><span data-dcnode-id="7415" instrument_node="">The College of Agriculture and Natural Resources offers teaching, research labs and field environments, and an indoor livestock teaching arena.
</span></p><span data-dcnode-id="7413" instrument_node="">
</span><h3 data-dcnode-id="7403"><span class="mw-headline" data-dcnode-id="7411" id="Arts_and_Sciences"><span data-dcnode-id="7412" instrument_node="">Arts and Sciences</span></span><span class="mw-editsection" data-dcnode-id="7404"><span class="mw-editsection-bracket" data-dcnode-id="7409"><span data-dcnode-id="7410" instrument_node="">[</span></span><a data-dcnode-id="7407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D18" title="Edit section: Arts and Sciences"><span data-dcnode-id="7408" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7405"><span data-dcnode-id="7406" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7402" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7390"><div class="thumbinner" data-dcnode-id="7391" style="width:222px;"><a class="image" data-dcnode-id="7400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWyomingInfraRedObservatory.jpg"><img alt="" class="thumbimage" data-dcnode-id="7401" data-file-height="768" data-file-width="1024" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fc/WyomingInfraRedObservatory.jpg/220px-WyomingInfraRedObservatory.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fc/WyomingInfraRedObservatory.jpg/330px-WyomingInfraRedObservatory.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fc/WyomingInfraRedObservatory.jpg/440px-WyomingInfraRedObservatory.jpg 2x" width="220"></a><span data-dcnode-id="7399" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7392"><div class="magnify" data-dcnode-id="7397"><a class="internal" data-dcnode-id="7398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWyomingInfraRedObservatory.jpg" title="Enlarge"></a></div><span data-dcnode-id="7396" instrument_node="">The </span><a data-dcnode-id="7394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wyoming_Infrared_Observatory" title="Wyoming Infrared Observatory"><span data-dcnode-id="7395" instrument_node="">University of Wyoming Infrared Observatory</span></a><span data-dcnode-id="7393" instrument_node=""> (WIRO)</span></div></div></div><span data-dcnode-id="7389" instrument_node="">
</span><p data-dcnode-id="7379"><span data-dcnode-id="7388" instrument_node="">The College of Arts and Sciences offers more than 50 majors, 60 minors, and seven interdisciplinary programs. Geology, Archaeology, Botany, and Geography programs take advantage of Wyoming's unique environment, while International Studies, Sociology, and Political Science provide global context. A&amp;S emphasizes field study, internships, and individual research projects, and has exchange programs and study abroad.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7381" style="white-space:nowrap;"><span data-dcnode-id="7387" instrument_node="">[</span><i data-dcnode-id="7383"><a data-dcnode-id="7384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7385" title="This claim needs references to reliable sources. (June 2016)"><span data-dcnode-id="7386" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7382" instrument_node="">]</span></sup><span data-dcnode-id="7380" instrument_node="">
</span></p><p data-dcnode-id="7370"><span data-dcnode-id="7378" instrument_node="">In 2010, the university announced that it had received its largest estate gift ever, from the artist </span><a data-dcnode-id="7376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neltje_Doubleday_Kings" title="Neltje Doubleday Kings"><span data-dcnode-id="7377" instrument_node="">Neltje Doubleday Kings</span></a><span data-dcnode-id="7375" instrument_node="">, known as Neltje, consisting of her ranches, art collection, and other holdings. When realized, the gift will create the UW Neltje Center for the Visual and Literary Arts, combining programs of three of the university's departments: creative writing, arts, and the art museum.</span><sup class="reference" data-dcnode-id="7372" id="cite_ref-UWyo_81-0"><a data-dcnode-id="7373" href="#cite_note-UWyo-81"><span data-dcnode-id="7374" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7371" instrument_node="">
</span></p><span data-dcnode-id="7369" instrument_node="">
</span><h3 data-dcnode-id="7359"><span class="mw-headline" data-dcnode-id="7367" id="Business"><span data-dcnode-id="7368" instrument_node="">Business</span></span><span class="mw-editsection" data-dcnode-id="7360"><span class="mw-editsection-bracket" data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">[</span></span><a data-dcnode-id="7363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D19" title="Edit section: Business"><span data-dcnode-id="7364" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7358" instrument_node="">
</span><p data-dcnode-id="7345"><span data-dcnode-id="7357" instrument_node="">The College of Business is accredited at the undergraduate and graduate levels by </span><a class="mw-redirect" data-dcnode-id="7355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AACSB" title="AACSB"><span data-dcnode-id="7356" instrument_node="">AACSB</span></a><span data-dcnode-id="7354" instrument_node="">.</span><sup class="reference" data-dcnode-id="7351" id="cite_ref-82"><a data-dcnode-id="7352" href="#cite_note-82"><span data-dcnode-id="7353" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7350" instrument_node=""> More than 100 business scholarships are awarded annually.</span><sup class="reference" data-dcnode-id="7347" id="cite_ref-83"><a data-dcnode-id="7348" href="#cite_note-83"><span data-dcnode-id="7349" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7346" instrument_node="">
</span></p><span data-dcnode-id="7344" instrument_node="">
</span><h3 data-dcnode-id="7334"><span class="mw-headline" data-dcnode-id="7342" id="Education"><span data-dcnode-id="7343" instrument_node="">Education</span></span><span class="mw-editsection" data-dcnode-id="7335"><span class="mw-editsection-bracket" data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">[</span></span><a data-dcnode-id="7338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D20" title="Edit section: Education"><span data-dcnode-id="7339" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7336"><span data-dcnode-id="7337" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7333" instrument_node="">
</span><p data-dcnode-id="7319"><span data-dcnode-id="7332" instrument_node="">The College of Education comprises two schools: the School of Counseling, Leadership, Advocacy, and Design; and the School of Teacher Education.</span><sup class="reference" data-dcnode-id="7329" id="cite_ref-84"><a data-dcnode-id="7330" href="#cite_note-84"><span data-dcnode-id="7331" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7328" instrument_node=""> Both certificates and programs that lead to initial certification or endorsements by Wyoming's Professional Teaching Standards Board (PTSB)</span><sup class="reference" data-dcnode-id="7325" id="cite_ref-85"><a data-dcnode-id="7326" href="#cite_note-85"><span data-dcnode-id="7327" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7324" instrument_node=""> are offered for pre-service teachers. Partnerships with Wyoming public schools provide for hands-on experience in real classrooms, and the on-campus, K-9 lab school provides a model of teaching and learning. The Counselor Education Training Clinic within the college offers free services for individuals, couples, families, adults, adolescents, and children. Services are provided by advanced graduate students under qualified clinical supervision.</span><sup class="reference" data-dcnode-id="7321" id="cite_ref-86"><a data-dcnode-id="7322" href="#cite_note-86"><span data-dcnode-id="7323" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7320" instrument_node="">
</span></p><span data-dcnode-id="7318" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="7298"><div class="thumbinner" data-dcnode-id="7299" style="width:172px;"><a class="image" data-dcnode-id="7305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEngineeringHallWyomingU1940.jpg"><img alt="" class="thumbimage" data-dcnode-id="7306" data-file-height="930" data-file-width="700" decoding="async" height="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b2/EngineeringHallWyomingU1940.jpg/170px-EngineeringHallWyomingU1940.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b2/EngineeringHallWyomingU1940.jpg/255px-EngineeringHallWyomingU1940.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b2/EngineeringHallWyomingU1940.jpg/340px-EngineeringHallWyomingU1940.jpg 2x" width="170"></a><span data-dcnode-id="7304" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7300"><div class="magnify" data-dcnode-id="7302"><a class="internal" data-dcnode-id="7303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEngineeringHallWyomingU1940.jpg" title="Enlarge"></a></div><span data-dcnode-id="7301" instrument_node="">Engineering Hall, 1940</span></div></div></div><span data-dcnode-id="7297" instrument_node="">

</span><p data-dcnode-id="7273"><span data-dcnode-id="7278" instrument_node="">The College of Health Science offers programs in pharmacy, nursing, social work, kinesiology, communication disorders, and dental hygiene, and students have the opportunity to receive pre-professional advising.</span><sup class="reference" data-dcnode-id="7275" id="cite_ref-88"><a data-dcnode-id="7276" href="#cite_note-88"><span data-dcnode-id="7277" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7274" instrument_node="">

</span><p data-dcnode-id="7255"><span data-dcnode-id="7260" instrument_node="">In May 2017, the university began working to change the Honors Program to the Honors College and search for an Honors College Dean from within the current university faculty.</span><sup class="reference" data-dcnode-id="7257" id="cite_ref-89"><a data-dcnode-id="7258" href="#cite_note-89"><span data-dcnode-id="7259" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7256" instrument_node="">

</span><h3 data-dcnode-id="7244"><span class="mw-headline" data-dcnode-id="7252" id="The_Helga_Otto_Haub_School_of_Environment_and_Natural_Resources"><span data-dcnode-id="7253" instrument_node="">The Helga Otto Haub School of Environment and Natural Resources</span></span><span class="mw-editsection" data-dcnode-id="7245"><span class="mw-editsection-bracket" data-dcnode-id="7250"><span data-dcnode-id="7251" instrument_node="">[</span></span><a data-dcnode-id="7248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D24" title="Edit section: The Helga Otto Haub School of Environment and Natural Resources"><span data-dcnode-id="7249" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7246"><span data-dcnode-id="7247" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7243" instrument_node="">
</span><p data-dcnode-id="7237"><span data-dcnode-id="7242" instrument_node="">The University of Wyoming's Haub School of Environment and Natural Resources (ENR) advances the understanding and resolution of environment and natural resource challenges through education, dissemination of information, and collaborative decision making support. Its academic programs emphasize interdisciplinary learning, providing students with applied learning experiences that prepare them to consider multiple perspectives to address natural resource issues. The Ruckelshaus Institute produces reports and convenes events on natural resource issues. The school School offers courses in negotiation, facilitation, and media relations for natural resource professionals. The Biodiversity Institute provides research, education, and outreach to support biodiversity conservation and management. In 2016, the university announced that the Haub School would become a full academic college beginning in the 2017 academic year.</span><sup class="reference" data-dcnode-id="7239" id="cite_ref-90"><a data-dcnode-id="7240" href="#cite_note-90"><span data-dcnode-id="7241" instrument_node="">[90]</span></a></sup><span data-dcnode-id="7238" instrument_node="">
</span></p><span data-dcnode-id="7236" instrument_node="">
</span><h3 data-dcnode-id="7226"><span class="mw-headline" data-dcnode-id="7234" id="Law"><span data-dcnode-id="7235" instrument_node="">Law</span></span><span class="mw-editsection" data-dcnode-id="7227"><span class="mw-editsection-bracket" data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">[</span></span><a data-dcnode-id="7230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D25" title="Edit section: Law"><span data-dcnode-id="7231" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7225" instrument_node="">
</span><p data-dcnode-id="7210"><span data-dcnode-id="7224" instrument_node="">The </span><a data-dcnode-id="7222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Wyoming_College_of_Law" title="University of Wyoming College of Law"><span data-dcnode-id="7223" instrument_node="">College of Law</span></a><span data-dcnode-id="7221" instrument_node=""> was founded in 1920, and has been accredited by the </span><a data-dcnode-id="7219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Bar_Association" title="American Bar Association"><span data-dcnode-id="7220" instrument_node="">American Bar Association</span></a><span data-dcnode-id="7218" instrument_node=""> since 1923. Its location in the Rocky Mountain West has provided a direct connection to regional and global issues in environmental, natural resources, and energy law. The alumni includes many state and federal judges, governors, senators and a former </span><a class="mw-redirect" data-dcnode-id="7216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Ambassador_to_Ireland" title="United States Ambassador to Ireland"><span data-dcnode-id="7217" instrument_node="">United States Ambassador to Ireland</span></a><span data-dcnode-id="7215" instrument_node="">, and offers five clinical programs providing students with hands-on experience in the Brimmer Legal Education Center.</span><sup class="reference" data-dcnode-id="7212" id="cite_ref-91"><a data-dcnode-id="7213" href="#cite_note-91"><span data-dcnode-id="7214" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7211" instrument_node="">
</span></p><span data-dcnode-id="7209" instrument_node="">
</span><h3 data-dcnode-id="7199"><span class="mw-headline" data-dcnode-id="7207" id="Outreach_School"><span data-dcnode-id="7208" instrument_node="">Outreach School</span></span><span class="mw-editsection" data-dcnode-id="7200"><span class="mw-editsection-bracket" data-dcnode-id="7205"><span data-dcnode-id="7206" instrument_node="">[</span></span><a data-dcnode-id="7203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D26" title="Edit section: Outreach School"><span data-dcnode-id="7204" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7201"><span data-dcnode-id="7202" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7198" instrument_node="">
</span><p data-dcnode-id="7153"><span data-dcnode-id="7197" instrument_node="">The mission of the University of Wyoming's Outreach School is to extend the University of Wyoming to the state and the world, and bring the world to Wyoming.</span><sup class="reference" data-dcnode-id="7194" id="cite_ref-92"><a data-dcnode-id="7195" href="#cite_note-92"><span data-dcnode-id="7196" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7193" instrument_node=""> It has several divisions. Outreach Credit Programs, in partnership with the university's colleges and departments, delivers both in and outside the state more than 41 degrees, programs, and certificates, both online or through "blended" learning technologies such as audio conferencing, video conferencing, and correspondence study.</span><sup class="reference" data-dcnode-id="7190" id="cite_ref-distance_12-1"><a data-dcnode-id="7191" href="#cite_note-distance-12"><span data-dcnode-id="7192" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7189" instrument_node=""> As of Spring 2014, Outreach School students accounted for 23.6% of enrollments at the University of Wyoming.</span><sup class="reference" data-dcnode-id="7186" id="cite_ref-93"><a data-dcnode-id="7187" href="#cite_note-93"><span data-dcnode-id="7188" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7185" instrument_node=""> There are nine Outreach Regional Centers in Wyoming, each with an Academic Coordinator and staff provide student support services.</span><sup class="reference" data-dcnode-id="7182" id="cite_ref-94"><a data-dcnode-id="7183" href="#cite_note-94"><span data-dcnode-id="7184" instrument_node="">[94]</span></a></sup><span data-dcnode-id="7181" instrument_node=""> The University of Wyoming at Casper is a partnership between the University of Wyoming and Casper College and offers a small, residential campus experience. Students at UW-Casper can pursue bachelor's, master's, and doctorate degrees, as well as certificates and endorsements.</span><sup class="reference" data-dcnode-id="7178" id="cite_ref-95"><a data-dcnode-id="7179" href="#cite_note-95"><span data-dcnode-id="7180" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7177" instrument_node=""> The International Programs Office supports both international students and faculty and provides a number of different international study opportunities.</span><sup class="reference" data-dcnode-id="7174" id="cite_ref-96"><a data-dcnode-id="7175" href="#cite_note-96"><span data-dcnode-id="7176" instrument_node="">[96]</span></a></sup><span data-dcnode-id="7173" instrument_node=""> </span><a data-dcnode-id="7171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wyoming_Public_Media" title="Wyoming Public Media"><span data-dcnode-id="7172" instrument_node="">Wyoming Public Media</span></a><span data-dcnode-id="7170" instrument_node=""> operates three radio services that cover 90% of Wyoming, as well as an online service and NPR news service.</span><sup class="reference" data-dcnode-id="7167" id="cite_ref-97"><a data-dcnode-id="7168" href="#cite_note-97"><span data-dcnode-id="7169" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7166" instrument_node=""> Outreach Technology Services, including UWTV, provides technological access to students enrolled in distance courses, as well as those at UW-Casper.</span><sup class="reference" data-dcnode-id="7163" id="cite_ref-98"><a data-dcnode-id="7164" href="#cite_note-98"><span data-dcnode-id="7165" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7162" instrument_node=""> Additionally, the Outreach School administers Summer Session, J-Term, and Saturday University.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7155" style="white-space:nowrap;"><span data-dcnode-id="7161" instrument_node="">[</span><i data-dcnode-id="7157"><a data-dcnode-id="7158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7159" title="This claim needs references to reliable sources. (June 2016)"><span data-dcnode-id="7160" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7156" instrument_node="">]</span></sup><span data-dcnode-id="7154" instrument_node="">
</span></p><span data-dcnode-id="7152" instrument_node="">
</span><h2 data-dcnode-id="7142"><span class="mw-headline" data-dcnode-id="7150" id="Schools_and_Institutes"><span data-dcnode-id="7151" instrument_node="">Schools and Institutes</span></span><span class="mw-editsection" data-dcnode-id="7143"><span class="mw-editsection-bracket" data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">[</span></span><a data-dcnode-id="7146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D27" title="Edit section: Schools and Institutes"><span data-dcnode-id="7147" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7144"><span data-dcnode-id="7145" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7141" instrument_node="">
</span><h3 data-dcnode-id="7131"><span class="mw-headline" data-dcnode-id="7139" id="Enhanced_Oil_Recovery_Institute_and_School_of_Energy_Resources"><span data-dcnode-id="7140" instrument_node="">Enhanced Oil Recovery Institute and School of Energy Resources</span></span><span class="mw-editsection" data-dcnode-id="7132"><span class="mw-editsection-bracket" data-dcnode-id="7137"><span data-dcnode-id="7138" instrument_node="">[</span></span><a data-dcnode-id="7135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D28" title="Edit section: Enhanced Oil Recovery Institute and School of Energy Resources"><span data-dcnode-id="7136" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7133"><span data-dcnode-id="7134" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7130" instrument_node="">
</span><link data-dcnode-id="7129" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7125" role="note"><span data-dcnode-id="7128" instrument_node="">Main article: </span><a data-dcnode-id="7126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_energy_law" title="United States energy law"><span data-dcnode-id="7127" instrument_node="">United States energy law</span></a></div><span data-dcnode-id="7124" instrument_node="">
</span><p data-dcnode-id="7110"><span data-dcnode-id="7123" instrument_node="">The Enhanced Oil Recovery Institute (EORI) was formed regarding the implementation of Enhanced Oil Recovery (EOR) techniques in Wyoming. The mission of EORI is "to promote the recovery of Wyoming's 'stranded'</span><sup class="noprint Inline-Template" data-dcnode-id="7116" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="7122" instrument_node="">[</span><i data-dcnode-id="7118"><a data-dcnode-id="7119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="7120" title="The text near this tag may need clarification or removal of jargon. (July 2016)"><span data-dcnode-id="7121" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="7117" instrument_node="">]</span></sup><span data-dcnode-id="7115" instrument_node=""> oil." The Institute assists Wyoming operators with EOR projects by applying existing technologies and creating new knowledge when necessary, maximize the economic potential, minimize the risk of EOR projects, facilitate the testing, evaluation, and documentation of EOR recommendations in the real world settings, and transfer the information to Wyoming producers by forming partnerships and conducting workshops and conferences.</span><sup class="reference" data-dcnode-id="7112" id="cite_ref-99"><a data-dcnode-id="7113" href="#cite_note-99"><span data-dcnode-id="7114" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7111" instrument_node="">
</span></p><p data-dcnode-id="7104"><span data-dcnode-id="7109" instrument_node="">The School of Energy Resources (SER) at the University of Wyoming was created in 2006 to enhance the university's energy-related education, research, and outreach. SER showcases the many energy research projects at UW and bridges academics and industry.</span><sup class="reference" data-dcnode-id="7106" id="cite_ref-100"><a data-dcnode-id="7107" href="#cite_note-100"><span data-dcnode-id="7108" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7105" instrument_node="">
</span></p><span data-dcnode-id="7103" instrument_node="">
</span><h2 data-dcnode-id="7093"><span class="mw-headline" data-dcnode-id="7101" id="Campus_organizations"><span data-dcnode-id="7102" instrument_node="">Campus organizations</span></span><span class="mw-editsection" data-dcnode-id="7094"><span class="mw-editsection-bracket" data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">[</span></span><a data-dcnode-id="7097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D29" title="Edit section: Campus organizations"><span data-dcnode-id="7098" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7095"><span data-dcnode-id="7096" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7092" instrument_node="">
</span><h3 data-dcnode-id="7081"><span data-dcnode-id="7091" id="Associated_Students_of_the_University_of_Wyoming_.28ASUW.29"></span><span class="mw-headline" data-dcnode-id="7089" id="Associated_Students_of_the_University_of_Wyoming_(ASUW)"><span data-dcnode-id="7090" instrument_node="">Associated Students of the University of Wyoming (ASUW)</span></span><span class="mw-editsection" data-dcnode-id="7082"><span class="mw-editsection-bracket" data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">[</span></span><a data-dcnode-id="7085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D30" title="Edit section: Associated Students of the University of Wyoming (ASUW)"><span data-dcnode-id="7086" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7083"><span data-dcnode-id="7084" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7080" instrument_node="">
</span><p data-dcnode-id="7078"><span data-dcnode-id="7079" instrument_node="">The Associated Students of the University of Wyoming (ASUW) is the title of the student body at the University of Wyoming. Every full-time student is a member of the ASUW and can vote in the elections of the ASUW Student Government. ASUW consists of three branches: the legislative, executive, and judicial branches. ASUW Also hosts several programs including the First-Year Senate, Associated Students Technical Services (ASTEC), Non-Traditional Student Council, Student Legal Services, United Multicultural Council, and the UW Food Share Pantry.
</span></p><span data-dcnode-id="7077" instrument_node="">
</span><h3 data-dcnode-id="7067"><span class="mw-headline" data-dcnode-id="7075" id="Campus_Sustainability_Committee"><span data-dcnode-id="7076" instrument_node="">Campus Sustainability Committee</span></span><span class="mw-editsection" data-dcnode-id="7068"><span class="mw-editsection-bracket" data-dcnode-id="7073"><span data-dcnode-id="7074" instrument_node="">[</span></span><a data-dcnode-id="7071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D31" title="Edit section: Campus Sustainability Committee"><span data-dcnode-id="7072" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7066" instrument_node="">
</span><p data-dcnode-id="7043"><span data-dcnode-id="7065" instrument_node="">The university's Campus Sustainability Committee (CSC) advises all departments and program on sustainability matters and oversees the university's efforts and progress towards reducing its carbon footprint.</span><sup class="reference" data-dcnode-id="7062" id="cite_ref-sustainability_101-0"><a data-dcnode-id="7063" href="#cite_note-sustainability-101"><span data-dcnode-id="7064" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7061" instrument_node=""> All new campus buildings are required to meet LEED (</span><a class="mw-redirect" data-dcnode-id="7059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leadership_in_Energy_and_Environmental_Design" title="Leadership in Energy and Environmental Design"><span data-dcnode-id="7060" instrument_node="">Leadership in Energy and Environmental Design</span></a><span data-dcnode-id="7058" instrument_node="">) Silver certification of the </span><a data-dcnode-id="7056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Green_Building_Council" title="U.S. Green Building Council"><span data-dcnode-id="7057" instrument_node="">U.S. Green Building Council</span></a><span data-dcnode-id="7055" instrument_node=""> (USGBC). UW President Tom Buchanan signed the American College &amp; University Presidents Climate Commitment (ACUPCC) in 2007.</span><sup class="reference" data-dcnode-id="7052" id="cite_ref-sustainability_101-1"><a data-dcnode-id="7053" href="#cite_note-sustainability-101"><span data-dcnode-id="7054" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7051" instrument_node=""> For their advances on university sustainability, UW scored a "C" on the College Sustainability Report Card of the </span><a data-dcnode-id="7049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_Endowments_Institute" title="Sustainable Endowments Institute"><span data-dcnode-id="7050" instrument_node="">Sustainable Endowments Institute</span></a><span data-dcnode-id="7048" instrument_node="">.</span><sup class="reference" data-dcnode-id="7045" id="cite_ref-102"><a data-dcnode-id="7046" href="#cite_note-102"><span data-dcnode-id="7047" instrument_node="">[102]</span></a></sup><span data-dcnode-id="7044" instrument_node="">
</span></p><span data-dcnode-id="7042" instrument_node="">
</span><h3 data-dcnode-id="7032"><span class="mw-headline" data-dcnode-id="7040" id="Friday_Night_Fever"><span data-dcnode-id="7041" instrument_node="">Friday Night Fever</span></span><span class="mw-editsection" data-dcnode-id="7033"><span class="mw-editsection-bracket" data-dcnode-id="7038"><span data-dcnode-id="7039" instrument_node="">[</span></span><a data-dcnode-id="7036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D32" title="Edit section: Friday Night Fever"><span data-dcnode-id="7037" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7034"><span data-dcnode-id="7035" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7031" instrument_node="">
</span><p data-dcnode-id="7015"><span data-dcnode-id="7030" instrument_node="">The goal of </span><a class="mw-redirect" data-dcnode-id="7028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friday_Night_Fever" title="Friday Night Fever"><span data-dcnode-id="7029" instrument_node="">Friday Night Fever</span></a><span data-dcnode-id="7027" instrument_node=""> (FNF) is to offer alcohol-free late-night entertainment for University of Wyoming students. The events vary by the week and are diverse to include all students.</span><sup class="reference" data-dcnode-id="7024" id="cite_ref-103"><a data-dcnode-id="7025" href="#cite_note-103"><span data-dcnode-id="7026" instrument_node="">[103]</span></a></sup><span data-dcnode-id="7023" instrument_node=""> Past events sponsored by FNF include comedians, magicians, hypnotists, the UW Idol Competition, Salsa Dancing, Casino Night, and </span><a class="mw-redirect" data-dcnode-id="7021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inflatable_games" title="Inflatable games"><span data-dcnode-id="7022" instrument_node="">inflatable games</span></a><span data-dcnode-id="7020" instrument_node="">. The organization also regularly shows first-run movies in the Wyoming Union every Friday night at 6:30&nbsp;pm, 9:00&nbsp;pm, and 11:30&nbsp;pm</span><sup class="reference" data-dcnode-id="7017" id="cite_ref-104"><a data-dcnode-id="7018" href="#cite_note-104"><span data-dcnode-id="7019" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7016" instrument_node="">
</span></p><span data-dcnode-id="7014" instrument_node="">
</span><h3 data-dcnode-id="7004"><span class="mw-headline" data-dcnode-id="7012" id="Greek_letter_organizations"><span data-dcnode-id="7013" instrument_node="">Greek letter organizations</span></span><span class="mw-editsection" data-dcnode-id="7005"><span class="mw-editsection-bracket" data-dcnode-id="7010"><span data-dcnode-id="7011" instrument_node="">[</span></span><a data-dcnode-id="7008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D33" title="Edit section: Greek letter organizations"><span data-dcnode-id="7009" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7006"><span data-dcnode-id="7007" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7003" instrument_node="">
</span><p data-dcnode-id="6984"><span data-dcnode-id="7002" instrument_node="">Nearly all fraternities and sororities are located on campus in private or university owned houses. Houses are located on Fraternity and Sorority Row. Most of the Fraternities and the Honors House line the northern (Fraternity) road and Sororities and two fraternities line the southern (Sorority) road.</span><sup class="reference" data-dcnode-id="6999" id="cite_ref-105"><a data-dcnode-id="7000" href="#cite_note-105"><span data-dcnode-id="7001" instrument_node="">[105]</span></a></sup><span data-dcnode-id="6998" instrument_node=""> In 2016 and 2017 the University bought the 3 vacant houses (previously occupied by </span><a data-dcnode-id="6996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pi_Kappa_Alpha" title="Pi Kappa Alpha"><span data-dcnode-id="6997" instrument_node="">Pi Kappa Alpha</span></a><span data-dcnode-id="6995" instrument_node="">, </span><a data-dcnode-id="6993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alpha_Tau_Omega" title="Alpha Tau Omega"><span data-dcnode-id="6994" instrument_node="">Alpha Tau Omega</span></a><span data-dcnode-id="6992" instrument_node="">, and </span><a data-dcnode-id="6990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pi_Beta_Phi" title="Pi Beta Phi"><span data-dcnode-id="6991" instrument_node="">Pi Beta Phi</span></a><span data-dcnode-id="6989" instrument_node="">) with the intention of demolishing the Pi Kappa Alpha house (as it had been condemned during its vacancy), and renovating and renting the Alpha Tau Omega and Pi Beta Phi houses.</span><sup class="reference" data-dcnode-id="6986" id="cite_ref-106"><a data-dcnode-id="6987" href="#cite_note-106"><span data-dcnode-id="6988" instrument_node="">[106]</span></a></sup><span data-dcnode-id="6985" instrument_node="">

</span><p data-dcnode-id="6723"><span data-dcnode-id="6765" instrument_node="">The Outdoor Program (OP), located in the south lobby of Half Acre, offers many activities for the outdoor enthusiasts. The program was established in 1997 to provide a wide variety of educational training and to equip students to pursue adventures on their own.</span><sup class="reference" data-dcnode-id="6762" id="cite_ref-About_the_Outdoor_Program_107-0"><a data-dcnode-id="6763" href="#cite_note-About_the_Outdoor_Program-107"><span data-dcnode-id="6764" instrument_node="">[107]</span></a></sup><span data-dcnode-id="6761" instrument_node=""> Through the OP, students can go on a variety of single, multiday, and week-long excursions. A few examples of the trips offered are </span><a data-dcnode-id="6759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_climbing" title="Rock climbing"><span data-dcnode-id="6760" instrument_node="">rock climbing</span></a><span data-dcnode-id="6758" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_water_rafting" title="White water rafting"><span data-dcnode-id="6757" instrument_node="">white water rafting</span></a><span data-dcnode-id="6755" instrument_node="">, </span><a data-dcnode-id="6753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ice_climbing" title="Ice climbing"><span data-dcnode-id="6754" instrument_node="">ice climbing</span></a><span data-dcnode-id="6752" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Snowshoeing" title="Snowshoeing"><span data-dcnode-id="6751" instrument_node="">snowshoeing</span></a><span data-dcnode-id="6749" instrument_node="">, </span><a data-dcnode-id="6747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Backcountry_skiing" title="Backcountry skiing"><span data-dcnode-id="6748" instrument_node="">backcountry skiing</span></a><span data-dcnode-id="6746" instrument_node="">, and </span><a data-dcnode-id="6744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mountain_biking" title="Mountain biking"><span data-dcnode-id="6745" instrument_node="">mountain biking</span></a><span data-dcnode-id="6743" instrument_node="">. Some of the educational programs offered are avalanche training, ski/snowboard maintenance, bike maintenance, and </span><a data-dcnode-id="6741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lead_climbing" title="Lead climbing"><span data-dcnode-id="6742" instrument_node="">lead climbing</span></a><span data-dcnode-id="6740" instrument_node=""> courses.</span><sup class="reference" data-dcnode-id="6737" id="cite_ref-Spring_Schedule_108-0"><a data-dcnode-id="6738" href="#cite_note-Spring_Schedule-108"><span data-dcnode-id="6739" instrument_node="">[108]</span></a></sup><span data-dcnode-id="6736" instrument_node=""> The Outdoor Program is subsidized by student fees and participants only pay for the trip expenditures.</span><sup class="reference" data-dcnode-id="6733" id="cite_ref-About_the_Outdoor_Program_107-1"><a data-dcnode-id="6734" href="#cite_note-About_the_Outdoor_Program-107"><span data-dcnode-id="6735" instrument_node="">[107]</span></a></sup><span data-dcnode-id="6732" instrument_node=""> Equipment such as snowshoes, mountain bikes, camping supplies, and backpacking gear are available for rent.</span><sup class="reference" data-dcnode-id="6729" id="cite_ref-109"><a data-dcnode-id="6730" href="#cite_note-109"><span data-dcnode-id="6731" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6728" instrument_node=""> The OP also offers several events throughout the year such as bouldering competitions at the Half Acre gym and the Banff Film Festival "World Tour".</span><sup class="reference" data-dcnode-id="6725" id="cite_ref-Spring_Schedule_108-1"><a data-dcnode-id="6726" href="#cite_note-Spring_Schedule-108"><span data-dcnode-id="6727" instrument_node="">[108]</span></a></sup><span data-dcnode-id="6724" instrument_node="">
</span></p><span data-dcnode-id="6722" instrument_node="">
</span><h3 data-dcnode-id="6712"><span class="mw-headline" data-dcnode-id="6720" id="SafeRide"><span data-dcnode-id="6721" instrument_node="">SafeRide</span></span><span class="mw-editsection" data-dcnode-id="6713"><span class="mw-editsection-bracket" data-dcnode-id="6718"><span data-dcnode-id="6719" instrument_node="">[</span></span><a data-dcnode-id="6716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D35" title="Edit section: SafeRide"><span data-dcnode-id="6717" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6711" instrument_node="">
</span><p data-dcnode-id="6701"><span data-dcnode-id="6710" instrument_node="">Founded in the fall of 2000, the goal of SafeRide is to prevent drinking and driving by offering on call service Thursday, Friday, and Saturday nights. Since then, it has transported over 160,000 passengers.</span><sup class="reference" data-dcnode-id="6707" id="cite_ref-110"><a data-dcnode-id="6708" href="#cite_note-110"><span data-dcnode-id="6709" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6706" instrument_node=""> Each SafeRide vehicle is clearly marked by an illuminated sign. On January 23, 2009 the 150,000th rider was presented with a US$1000 scholarship.</span><sup class="reference" data-dcnode-id="6703" id="cite_ref-111"><a data-dcnode-id="6704" href="#cite_note-111"><span data-dcnode-id="6705" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6702" instrument_node="">
</span></p><span data-dcnode-id="6700" instrument_node="">
</span><h3 data-dcnode-id="6689"><span data-dcnode-id="6699" id="Transit_.26_Parking_Services"></span><span class="mw-headline" data-dcnode-id="6697" id="Transit_&amp;_Parking_Services"><span data-dcnode-id="6698" instrument_node="">Transit &amp; Parking Services</span></span><span class="mw-editsection" data-dcnode-id="6690"><span class="mw-editsection-bracket" data-dcnode-id="6695"><span data-dcnode-id="6696" instrument_node="">[</span></span><a data-dcnode-id="6693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D36" title="Edit section: Transit &amp; Parking Services"><span data-dcnode-id="6694" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6691"><span data-dcnode-id="6692" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6688" instrument_node="">
</span><p data-dcnode-id="6682"><span data-dcnode-id="6687" instrument_node="">Transit &amp; Parking Services monitors parking lots and provides transportation to the University of Wyoming campus. The transit service consists of different systems that operate independently. Transit &amp; Parking Services offers a variety of parking options, including various permitting options and metered parking.</span><sup class="reference" data-dcnode-id="6684" id="cite_ref-112"><a data-dcnode-id="6685" href="#cite_note-112"><span data-dcnode-id="6686" instrument_node="">[112]</span></a></sup><span data-dcnode-id="6683" instrument_node="">
</span></p><p data-dcnode-id="6672"><span data-dcnode-id="6681" instrument_node="">The University of Wyoming offers a separate transit service for passengers unable to ride the fixed routes due to a disability. Eligibility is determined through the Transit and Parking office.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6674" style="white-space:nowrap;"><span data-dcnode-id="6680" instrument_node="">[</span><i data-dcnode-id="6676"><a data-dcnode-id="6677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6678" title="This claim needs references to reliable sources. (June 2016)"><span data-dcnode-id="6679" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6675" instrument_node="">]</span></sup><span data-dcnode-id="6673" instrument_node="">
</span></p><p data-dcnode-id="6666"><span data-dcnode-id="6671" instrument_node="">Transit &amp; Parking Services also operates the Night Owl Express, which provides on-call service from 1:00&nbsp;pm to 6:00&nbsp;am on weekdays and 24&nbsp;hours a day on the weekends. The service can be requested by pressing the black buttons at one of the shelters on campus.</span><sup class="reference" data-dcnode-id="6668" id="cite_ref-113"><a data-dcnode-id="6669" href="#cite_note-113"><span data-dcnode-id="6670" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6667" instrument_node="">
</span></p><span data-dcnode-id="6665" instrument_node="">
</span><h2 data-dcnode-id="6655"><span class="mw-headline" data-dcnode-id="6663" id="Athletics"><span data-dcnode-id="6664" instrument_node="">Athletics</span></span><span class="mw-editsection" data-dcnode-id="6656"><span class="mw-editsection-bracket" data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">[</span></span><a data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D37" title="Edit section: Athletics"><span data-dcnode-id="6660" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6657"><span data-dcnode-id="6658" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6654" instrument_node="">
</span><link data-dcnode-id="6653" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6649" role="note"><span data-dcnode-id="6652" instrument_node="">Main article: </span><a data-dcnode-id="6650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wyoming_Cowboys_and_Cowgirls" title="Wyoming Cowboys and Cowgirls"><span data-dcnode-id="6651" instrument_node="">Wyoming Cowboys and Cowgirls</span></a></div><span data-dcnode-id="6648" instrument_node="">
</span><p data-dcnode-id="6591"><span data-dcnode-id="6647" instrument_node="">University of Wyoming athletics teams are named the Cowboys and Cowgirls. Their official song is "</span><a data-dcnode-id="6645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ragtime_Cowboy_Joe" title="Ragtime Cowboy Joe"><span data-dcnode-id="6646" instrument_node="">Ragtime Cowboy Joe</span></a><span data-dcnode-id="6644" instrument_node="">". Wyoming competes at the </span><a data-dcnode-id="6642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NCAA_Division_I" title="NCAA Division I"><span data-dcnode-id="6643" instrument_node="">NCAA Division I</span></a><span data-dcnode-id="6641" instrument_node=""> level (FBS-</span><a class="mw-redirect" data-dcnode-id="6639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Football_Bowl_Subdivision" title="Football Bowl Subdivision"><span data-dcnode-id="6640" instrument_node="">Football Bowl Subdivision</span></a><span data-dcnode-id="6638" instrument_node=""> for football) as a member of the </span><a data-dcnode-id="6636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mountain_West_Conference" title="Mountain West Conference"><span data-dcnode-id="6637" instrument_node="">Mountain West Conference</span></a><span data-dcnode-id="6635" instrument_node="">. UW offers 17 NCAA-sanctioned sports – nine women's sports and eight men's sports. Wyoming's nine NCAA sports for women are: basketball; cross country; golf; soccer; swimming and diving; tennis; indoor track &amp; field; outdoor track and field; and volleyball. UW's eight NCAA sports for men are: basketball; cross country; football; golf; swimming and diving; indoor track and field; outdoor track and field; and </span><a data-dcnode-id="6633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collegiate_wrestling" title="Collegiate wrestling"><span data-dcnode-id="6634" instrument_node="">wrestling</span></a><span data-dcnode-id="6632" instrument_node="">.</span><sup class="reference" data-dcnode-id="6629" id="cite_ref-114"><a data-dcnode-id="6630" href="#cite_note-114"><span data-dcnode-id="6631" instrument_node="">[114]</span></a></sup><sup class="reference" data-dcnode-id="6626" id="cite_ref-115"><a data-dcnode-id="6627" href="#cite_note-115"><span data-dcnode-id="6628" instrument_node="">[115]</span></a></sup><sup class="reference" data-dcnode-id="6623" id="cite_ref-116"><a data-dcnode-id="6624" href="#cite_note-116"><span data-dcnode-id="6625" instrument_node="">[116]</span></a></sup><sup class="reference" data-dcnode-id="6620" id="cite_ref-117"><a data-dcnode-id="6621" href="#cite_note-117"><span data-dcnode-id="6622" instrument_node="">[117]</span></a></sup><sup class="reference" data-dcnode-id="6617" id="cite_ref-118"><a data-dcnode-id="6618" href="#cite_note-118"><span data-dcnode-id="6619" instrument_node="">[118]</span></a></sup><sup class="reference" data-dcnode-id="6614" id="cite_ref-Cowobys_119-0"><a data-dcnode-id="6615" href="#cite_note-Cowobys-119"><span data-dcnode-id="6616" instrument_node="">[119]</span></a></sup><sup class="reference" data-dcnode-id="6611" id="cite_ref-WarMemorialStadium_120-0"><a data-dcnode-id="6612" href="#cite_note-WarMemorialStadium-120"><span data-dcnode-id="6613" instrument_node="">[120]</span></a></sup><sup class="reference" data-dcnode-id="6608" id="cite_ref-Top10CollegeLogoHelmets_121-0"><a data-dcnode-id="6609" href="#cite_note-Top10CollegeLogoHelmets-121"><span data-dcnode-id="6610" instrument_node="">[121]</span></a></sup><sup class="reference" data-dcnode-id="6605" id="cite_ref-ScottUsherProfile_122-0"><a data-dcnode-id="6606" href="#cite_note-ScottUsherProfile-122"><span data-dcnode-id="6607" instrument_node="">[122]</span></a></sup><sup class="reference" data-dcnode-id="6602" id="cite_ref-ScottUsherTyr_123-0"><a data-dcnode-id="6603" href="#cite_note-ScottUsherTyr-123"><span data-dcnode-id="6604" instrument_node="">[123]</span></a></sup><sup class="reference" data-dcnode-id="6599" id="cite_ref-124"><a data-dcnode-id="6600" href="#cite_note-124"><span data-dcnode-id="6601" instrument_node="">[124]</span></a></sup><sup class="reference" data-dcnode-id="6596" id="cite_ref-125"><a data-dcnode-id="6597" href="#cite_note-125"><span data-dcnode-id="6598" instrument_node="">[125]</span></a></sup><sup class="reference" data-dcnode-id="6593" id="cite_ref-126"><a data-dcnode-id="6594" href="#cite_note-126"><span data-dcnode-id="6595" instrument_node="">[126]</span></a></sup><span data-dcnode-id="6592" instrument_node="">
</span></p><span data-dcnode-id="6590" instrument_node="">
</span><h2 data-dcnode-id="6579"><span data-dcnode-id="6589" id="The_.22Black_14.22"></span><span class="mw-headline" data-dcnode-id="6587" id="The_&quot;Black_14&quot;"><span data-dcnode-id="6588" instrument_node="">The "Black 14"</span></span><span class="mw-editsection" data-dcnode-id="6580"><span class="mw-editsection-bracket" data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">[</span></span><a data-dcnode-id="6583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversity_of_Wyoming%26action%3Dedit%26section%3D38" title="Edit section: The &quot;Black 14&quot;"><span data-dcnode-id="6584" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6578" instrument_node="">
</span><p data-dcnode-id="6559"><span data-dcnode-id="6577" instrument_node="">In 1969 football coach </span><a data-dcnode-id="6575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lloyd_Eaton" title="Lloyd Eaton"><span data-dcnode-id="6576" instrument_node="">Lloyd Eaton</span></a><span data-dcnode-id="6574" instrument_node=""> kicked 14 Black players off the team for wanting to protest what they considered the racist policies within </span><a data-dcnode-id="6572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brigham_Young_University" title="Brigham Young University"><span data-dcnode-id="6573" instrument_node="">Brigham Young University (BYU)</span></a><span data-dcnode-id="6571" instrument_node=""> and the </span><a data-dcnode-id="6569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Church_of_Jesus_Christ_of_Latter-day_Saints" title="The Church of Jesus Christ of Latter-day Saints"><span data-dcnode-id="6570" instrument_node="">LDS Church</span></a><span data-dcnode-id="6568" instrument_node=""> before a game with BYU. After the team went 1-9 the following year, the school decided to remove him.</span><sup class="reference" data-dcnode-id="6565" id="cite_ref-auto_127-0"><a data-dcnode-id="6566" href="#cite_note-auto-127"><span data-dcnode-id="6567" instrument_node="">[127]</span></a></sup><span data-dcnode-id="6564" instrument_node=""> In 2019, the school publicly apologized for this incident, and invited all living players back to campus to be honored.</span><sup class="reference" data-dcnode-id="6561" id="cite_ref-128"><a data-dcnode-id="6562" href="#cite_note-128"><span data-dcnode-id="6563" instrument_node="">[128]</span></a></sup><span data-dcnode-id="6560" instrument_node="">
</span></p><span data-dcnode-id="6558" instrument_node="">
