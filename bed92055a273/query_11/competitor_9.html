mparisons</span></span></a></li><li class="" data-dcnode-id="3249"><a class="" data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academicguides.waldenu.edu/writingcenter/grammar/verbtenses" title=""><span data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Verb Tenses</span></span></a></li><li class="" data-dcnode-id="3245"><a class="" data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academicguides.waldenu.edu/writingcenter/grammar/verbforms" title=""><span data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Verb Forms: "-ing," Infinitives, and Past Participles</span></span></a></li><li class="" data-dcnode-id="3241"><a class="" data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academicguides.waldenu.edu/writingcenter/grammar/subjectverbagreement" title=""><span data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Subject-Verb Agreement</span></span></a></li><li class="" data-dcnode-id="3237"><a class="" data-dcnode-id="3238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academicguides.waldenu.edu/writingcenter/grammar/verbs" title=""><span data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Transitive and Intransitive Verbs</span></span></a></li><li class="" data-dcnode-id="3233"><a class="" data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academicguides.waldenu.edu/writingcenter/grammar/nounpronounagreement" title=""><span data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Noun–Pronoun Agreement</span></span></a></li><li class="" data-dcnode-id="3229"><a class="" data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academicguides.waldenu.edu/writingcenter/grammar/articles" title=""><span data-dcnode-id="3231"><span d </span><h2 class="s-lib-box-title" data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Definitions and Examples
                                </span></h2><span data-dcnode-id="3190" instrument_node="">
</span><div data-dcnode-id="2641" id="s-lg-box-collapse-9131415"><span data-dcnode-id="3189" instrument_node="">
</span><div class="s-lib-box-content" data-dcnode-id="2643"><span data-dcnode-id="3188" instrument_node="">
</span><div class="clearfix" data-dcnode-id="2645" id="s-lg-content-18488299"><span data-dcnode-id="3187" instrument_node="">
</span><h3 data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Noun</span></h3><span data-dcnode-id="3184" instrument_node="">
</span><p data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">The name of something, like a person, animal, place, thing, or concept. Nouns are typically used as subjects, objects, objects of prepositions, and modifiers of other nouns.</span></p><span data-dcnode-id="3181" instrument_node="">
</span><ul data-dcnode-id="3164" style="list-style-type:circle;"><span data-dcnode-id="3180" instrument_node="">
</span><li data-dcnode-id="3166"><strong data-dcnode-id="3177"><u data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">I</span></u></strong><span data-dcnode-id="3176" instrument_node=""> finished the study.

	</span><ul data-dcnode-id="3168"><span data-dcnode-id="3175" instrument_node="">
</span><li data-dcnode-id="3170"><strong data-dcnode-id="3172"><u data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">I</span></u></strong><span data-dcnode-id="3171" instrument_node=""> = subject</span></li><span data-dcnode-id="3169" instrument_node="">
</span></ul><span data-dcnode-id="3167" instrument_node="">
</span></li><span data-dcnode-id="3165" instrument_node="">
</span></ul><span data-dcnode-id="3163" instrument_node="">
</span><ul data-dcnode-id="3145" style="list-style-type:circle;"><span data-dcnode-id="3162" instrument_node="">
</span><li data-dcnode-id="3147"><span data-dcnode-id="3161" instrument_node="">Maggie wrote </span><strong data-dcnode-id="3158"><u data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">the dissertation</span></u></strong><span data-dcnode-id="3157" instrument_node="">.

	</span><ul data-dcnode-id="3149"><span data-dcnode-id="3156" instrument_node="">
</span><li data-dcnode-id="3151"><strong data-dcnode-id="3153"><u data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">the dissertation</span></u></strong><span data-dcnode-id="3152" instrument_node=""> = object</span></li><span data-dcnode-id="3150" instrument_node="">
</span></ul><span data-dcnode-id="3148" instrument_node="">
</span></li><span data-dcnode-id="3146" instrument_node="">
</span></ul><span data-dcnode-id="3144" instrument_node="">
</span><ul data-dcnode-id="3126" style="list-style-type:circle;"><span data-dcnode-id="3143" instrument_node="">
</span><li data-dcnode-id="3128"><span data-dcnode-id="3142" instrument_node="">The author presented the results </span><strong data-dcnode-id="3139"><u data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">in Chapter 4</span></u></strong><span data-dcnode-id="3138" instrument_node="">.

	</span><ul data-dcnode-id="3130"><span data-dcnode-id="3137" instrument_node="">
</span><li data-dcnode-id="3132"><strong data-dcnode-id="3134"><u data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">in Chapter 4</span></u></strong><span data-dcnode-id="3133" instrument_node=""> = object of a preposition</span></li><span data-dcnode-id="3131" instrument_node="">
</span></ul><span data-dcnode-id="3129" instrument_node="">
</span></li><span data-dcnode-id="3127" instrument_node="">
</span></ul><span data-dcnode-id="3125" instrument_node="">
</span><ul data-dcnode-id="3107" style="list-style-type:circle;"><span data-dcnode-id="3124" instrument_node="">
</span><li data-dcnode-id="3109"><span data-dcnode-id="3123" instrument_node="">His </span><strong data-dcnode-id="3120"><u data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">research</span></u></strong><span data-dcnode-id="3119" instrument_node=""> findings can contribute to social change.

	</span><ul data-dcnode-id="3111"><span data-dcnode-id="3118" instrument_node="">
</span><li data-dcnode-id="3113"><strong data-dcnode-id="3115"><u data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">research</span></u></strong><span data-dcnode-id="3114" instrument_node=""> = modifier</span></li><span data-dcnode-id="3112" instrument_node="">
</span></ul><span data-dcnode-id="3110" instrument_node="">
</span></li><span data-dcnode-id="3108" instrument_node="">
</span></ul><span data-dcnode-id="3106" instrument_node="">
</span><hr data-dcnode-id="3105"><span data-dcnode-id="3104" instrument_node="">
</span><h3 data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Verb</span></h3><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">This expresses what the person, animal, place, thing, or concept does. In English, verbs follow the noun.</span></p><span data-dcnode-id="3098" instrument_node="">
</span><ul data-dcnode-id="3074" style="list-style-type:circle;"><span data-dcnode-id="3097" instrument_node="">
</span><li data-dcnode-id="3090"><span data-dcnode-id="3096" instrument_node="">It</span><u data-dcnode-id="3092"><span data-dcnode-id="3095" instrument_node=""> </span><strong data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">takes</span></strong></u><span data-dcnode-id="3091" instrument_node=""> a good deal of dedication to complete a doctoral degree.</span></li><span data-dcnode-id="3089" instrument_node="">
</span><li data-dcnode-id="3083"><span data-dcnode-id="3088" instrument_node="">She </span><strong data-dcnode-id="3085"><u data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">studied</span></u></strong><span data-dcnode-id="3084" instrument_node=""> hard for the test.</span></li><span data-dcnode-id="3082" instrument_node="">
</span><li data-dcnode-id="3076"><span data-dcnode-id="3081" instrument_node="">Writing a dissertation </span><strong data-dcnode-id="3078"><u data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">is</span></u></strong><span data-dcnode-id="3077" instrument_node=""> difficult. (The "be" verb is also sometimes referred to as a copula or a linking verb. It links the subject, in this case "writing a dissertation," to the complement or the predicate of the sentence, in this case, "hard.")</span></li><span data-dcnode-id="3075" instrument_node="">
</span></ul><span data-dcnode-id="3073" instrument_node="">
</span><hr data-dcnode-id="3072"><span data-dcnode-id="3071" instrument_node="">
</span><h3 data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Adjective</span></h3><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">This describes a noun or pronoun. Adjectives typically come before a noun or after a stative verb, like the verb "to be."</span></p><span data-dcnode-id="3065" instrument_node="">
</span><ul data-dcnode-id="3044" style="list-style-type:circle;"><span data-dcnode-id="3064" instrument_node="">
</span><li data-dcnode-id="3046"><span data-dcnode-id="3063" instrument_node="">The </span><strong data-dcnode-id="3060"><u data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">diligent</span></u></strong><span data-dcnode-id="3059" instrument_node=""> student completed her assignment early.

	</span><ul data-dcnode-id="3048"><span data-dcnode-id="3058" instrument_node="">
</span><li data-dcnode-id="3050"><strong data-dcnode-id="3055"><u data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Diligent</span></u></strong><span data-dcnode-id="3054" instrument_node=""> describes the student and appears before the noun </span><em data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">student</span></em><span data-dcnode-id="3051" instrument_node="">.</span></li><span data-dcnode-id="3049" instrument_node="">
</span></ul><span data-dcnode-id="3047" instrument_node="">
</span></li><span data-dcnode-id="3045" instrument_node="">
</span></ul><span data-dcnode-id="3043" instrument_node="">
</span><ul data-dcnode-id="3022" style="list-style-type:circle;"><span data-dcnode-id="3042" instrument_node="">
</span><li data-dcnode-id="3024"><span data-dcnode-id="3041" instrument_node="">It can be </span><strong data-dcnode-id="3038"><u data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">difficult</span></u></strong><span data-dcnode-id="3037" instrument_node=""> to balance time to study and work responsibilities.

	</span><ul data-dcnode-id="3026"><span data-dcnode-id="3036" instrument_node="">
</span><li data-dcnode-id="3028"><strong data-dcnode-id="3033"><u data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">Difficult</span></u></strong><span data-dcnode-id="3032" instrument_node=""> is placed after the </span><em data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">to be</span></em><span data-dcnode-id="3029" instrument_node=""> verb and describes what it is like to balance time.</span></li><span data-dcnode-id="3027" instrument_node="">
</span></ul><span data-dcnode-id="3025" instrument_node="">
</span></li><span data-dcnode-id="3023" instrument_node="">
</span></ul><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Remember that adjectives in English have no plural form. The same form of the adjective is used for both singular and plural nouns.</span></p><span data-dcnode-id="3018" instrument_node="">
</span><ul data-dcnode-id="2995" style="list-style-type:circle;"><span data-dcnode-id="3017" instrument_node="">
</span><li data-dcnode-id="3010"><span data-dcnode-id="3016" instrument_node="">A </span><strong data-dcnode-id="3012"><u data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">different</span></u><span data-dcnode-id="3013" instrument_node=""> </span></strong><span data-dcnode-id="3011" instrument_node="">idea</span></li><span data-dcnode-id="3009" instrument_node="">
</span><li data-dcnode-id="3003"><span data-dcnode-id="3008" instrument_node="">Some </span><strong data-dcnode-id="3005"><u data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">different</span></u></strong><span data-dcnode-id="3004" instrument_node=""> ideas</span></li><span data-dcnode-id="3002" instrument_node="">
</span><li data-dcnode-id="2997"><span data-dcnode-id="3001" instrument_node="">INCORRECT: some </span><s data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">differents</span></s><span data-dcnode-id="2998" instrument_node=""> ideas</span></li><span data-dcnode-id="2996" instrument_node="">
</span></ul><span data-dcnode-id="2994" instrument_node="">
</span><hr data-dcnode-id="2993"><span data-dcnode-id="2992" instrument_node="">
</span><h3 data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Adverb</span></h3><span data-dcnode-id="2989" instrument_node="">
</span><p data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">This gives more information about the verb and about how the action was done. Adverbs tells how, where, when, why, etc. Depending on the context, the adverb can come before or after the verb or at the beginning or end of a sentence.</span></p><span data-dcnode-id="2986" instrument_node="">
</span><ul data-dcnode-id="2965" style="list-style-type:circle;"><span data-dcnode-id="2985" instrument_node="">
</span><li data-dcnode-id="2967"><span data-dcnode-id="2984" instrument_node="">He completed the course </span><strong data-dcnode-id="2981"><u data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">enthusiastically</span></u></strong><span data-dcnode-id="2980" instrument_node="">.

	</span><ul data-dcnode-id="2969"><span data-dcnode-id="2979" instrument_node="">
</span><li data-dcnode-id="2971"><strong data-dcnode-id="2976"><u data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">Enthusiastically</span></u></strong><span data-dcnode-id="2975" instrument_node=""> describes how he completed the course and answers the </span><em data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">how</span></em><span data-dcnode-id="2972" instrument_node=""> question.</span></li><span data-dcnode-id="2970" instrument_node="">
</span></ul><span data-dcnode-id="2968" instrument_node="">
</span></li><span data-dcnode-id="2966" instrument_node="">
</span></ul><span data-dcnode-id="2964" instrument_node="">
</span><ul data-dcnode-id="2943" style="list-style-type:circle;"><span data-dcnode-id="2963" instrument_node="">
</span><li data-dcnode-id="2945"><span data-dcnode-id="2962" instrument_node="">Steven </span><strong data-dcnode-id="2959"><u data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">recently</span></u></strong><span data-dcnode-id="2958" instrument_node=""> enrolled in the Graduate Certificate in Communication program at Walden.

	</span><ul data-dcnode-id="2947"><span data-dcnode-id="2957" instrument_node="">
</span><li data-dcnode-id="2949"><strong data-dcnode-id="2954"><u data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Recently</span></u></strong><span data-dcnode-id="2953" instrument_node=""> modifies the verb enroll and answers the </span><em data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">when</span></em><span data-dcnode-id="2950" instrument_node=""> question.</span></li><span data-dcnode-id="2948" instrument_node="">
</span></ul><span data-dcnode-id="2946" instrument_node="">
</span></li><span data-dcnode-id="2944" instrument_node="">

</span><ul data-dcnode-id="2922" style="list-style-type:circle;"><span data-dcnode-id="2941" instrument_node="">
</span><li data-dcnode-id="2924"><strong data-dcnode-id="2938"><u data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Then,</span></u></strong><span data-dcnode-id="2937" instrument_node=""> I verified that most of my sources were peer-reviewed.

	</span><ul data-dcnode-id="2926"><span data-dcnode-id="2936" instrument_node="">
</span><li data-dcnode-id="2928"><strong data-dcnode-id="2933"><u data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Then</span></u></strong><span data-dcnode-id="2932" instrument_node=""> describes and modifies the entire sentence. See this link on </span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academicguides.waldenu.edu/writingcenter/paragraphs/transitions"><span data-dcnode-id="2931" instrument_node="">transitions</span></a><span data-dcnode-id="2929" instrument_node=""> for more examples of conjunctive adverbs (adverbs that join one idea to another to improve the cohesion of the writing).</span></li><span data-dcnode-id="2927" instrument_node="">
</span></ul><span data-dcnode-id="2925" instrument_node="">
</span></li><span data-dcnode-id="2923" instrument_node="">

</span><hr data-dcnode-id="2920"><span data-dcnode-id="2919" instrument_node="">
</span><h3 data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Pronoun</span></h3><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">This word substitutes for a noun or a noun phrase (e.g. it, she, he, they, that, those,…).</span></p><span data-dcnode-id="2913" instrument_node="">
</span><ul data-dcnode-id="2895" style="list-style-type:circle;"><span data-dcnode-id="2912" instrument_node="">
</span><li data-dcnode-id="2897"><span data-dcnode-id="2911" instrument_node="">Smith (2014) interviewed the applicants as </span><strong data-dcnode-id="2908"><u data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">they</span></u></strong><span data-dcnode-id="2907" instrument_node=""> arrived.

	</span><ul data-dcnode-id="2899"><span data-dcnode-id="2906" instrument_node="">
</span><li data-dcnode-id="2901"><strong data-dcnode-id="2903"><u data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">they</span></u></strong><span data-dcnode-id="2902" instrument_node=""> = applicants</span></li><span data-dcnode-id="2900" instrument_node="">
</span></ul><span data-dcnode-id="2898" instrument_node="">
</span></li><span data-dcnode-id="2896" instrument_node="">
</span></ul><span data-dcnode-id="2894" instrument_node="">
</span><ul data-dcnode-id="2859" style="list-style-type:circle;"><span data-dcnode-id="2893" instrument_node="">
</span><li data-dcnode-id="2861"><strong data-dcnode-id="2890"><u data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">He</span></u></strong><span data-dcnode-id="2889" instrument_node=""> was interested in ideas </span><strong data-dcnode-id="2886"><u data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">that</span></u></strong><span data-dcnode-id="2885" instrument_node=""> were never previously recorded, not </span><strong data-dcnode-id="2881"><u data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">those</span></u><span data-dcnode-id="2882" instrument_node=""> </span></strong><span data-dcnode-id="2880" instrument_node="">that have already been published.

	</span><ul data-dcnode-id="2863"><span data-dcnode-id="2879" instrument_node="">
</span><li data-dcnode-id="2865"><strong data-dcnode-id="2876"><u data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">He</span></u></strong><span data-dcnode-id="2875" instrument_node=""> = Smith; </span><strong data-dcnode-id="2872"><u data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">that</span></u></strong><span data-dcnode-id="2871" instrument_node=""> = ideas; </span><strong data-dcnode-id="2867"><u data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">those</span></u><span data-dcnode-id="2868" instrument_node=""> </span></strong><span data-dcnode-id="2866" instrument_node="">= those ideas</span></li><span data-dcnode-id="2864" instrument_node="">
</span></ul><span data-dcnode-id="2862" instrument_node="">
</span></li><span data-dcnode-id="2860" instrument_node="">
</span></ul><span data-dcnode-id="2858" instrument_node="">
</span><hr data-dcnode-id="2857"><span data-dcnode-id="2856" instrument_node="">
</span><h3 data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Determiner</span></h3><span data-dcnode-id="2853" instrument_node="">
</span><p data-dcnode-id="2848"><span data-dcnode-id="2852" instrument_node="">This word makes the reference of the noun more specific (e.g. his, her, my, their, the, a, an, this, these,</span><em data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">…</span></em><span data-dcnode-id="2849" instrument_node="">).</span></p><span data-dcnode-id="2847" instrument_node="">
</span><ul data-dcnode-id="2832" style="list-style-type:circle;"><span data-dcnode-id="2846" instrument_node="">
</span><li data-dcnode-id="2840"><span data-dcnode-id="2845" instrument_node="">Jones published </span><strong data-dcnode-id="2842"><u data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">her</span></u></strong><span data-dcnode-id="2841" instrument_node=""> book in 2015.</span></li><span data-dcnode-id="2839" instrument_node="">
</span><li data-dcnode-id="2834"><strong data-dcnode-id="2836"><u data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">The</span></u></strong><span data-dcnode-id="2835" instrument_node=""> book was very popular.</span></li><span data-dcnode-id="2833" instrument_node="">
</span></ul><span data-dcnode-id="2831" instrument_node="">
</span><hr data-dcnode-id="2830"><span data-dcnode-id="2829" instrument_node="">
</span><h3 data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Preposition</span></h3><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2821"><span data-dcnode-id="2825" instrument_node="">This comes before a noun or a noun phrase and links it to other parts of the sentence. These are usually single words (e.g., on, at, by</span><em data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">,…</span></em><span data-dcnode-id="2822" instrument_node="">) but can be up to four words (e.g., as far as, in addition to, as a result of, …).</span></p><span data-dcnode-id="2820" instrument_node="">
</span><ul data-dcnode-id="2796" style="list-style-type:circle;"><span data-dcnode-id="2819" instrument_node="">
</span><li data-dcnode-id="2812"><span data-dcnode-id="2818" instrument_node="">I chose to interview teachers</span><u data-dcnode-id="2814"><span data-dcnode-id="2817" instrument_node=""> </span><strong data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">in</span></strong></u><span data-dcnode-id="2813" instrument_node=""> the district closest to me.</span></li><span data-dcnode-id="2811" instrument_node="">
</span><li data-dcnode-id="2805"><span data-dcnode-id="2810" instrument_node="">The recorder was placed </span><strong data-dcnode-id="2807"><u data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">next to</span></u></strong><span data-dcnode-id="2806" instrument_node=""> the interviewee.</span></li><span data-dcnode-id="2804" instrument_node="">
</span><li data-dcnode-id="2798"><span data-dcnode-id="2803" instrument_node="">I stopped the recording </span><strong data-dcnode-id="2800"><u data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">in the middle of</span></u></strong><span data-dcnode-id="2799" instrument_node=""> the interview due to a low battery.</span></li><span data-dcnode-id="2797" instrument_node="">
</span></ul><span data-dcnode-id="2795" instrument_node="">
</span><hr data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">
</span><h3 data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Conjunction</span></h3><span data-dcnode-id="2790" instrument_node="">
</span><p data-dcnode-id="2785"><span data-dcnode-id="2789" instrument_node="">A word that joins two clauses. These can be coordinating (an easy way to remember this is memorizing FANBOYS</span><em data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node=""> </span></em><span data-dcnode-id="2786" instrument_node="">= for, and, nor, but, or, yet, so) or subordinating (e.g., because, although, when, …).</span></p><span data-dcnode-id="2784" instrument_node="">
</span><ul data-dcnode-id="2768" style="list-style-type:circle;"><span data-dcnode-id="2783" instrument_node="">
</span><li data-dcnode-id="2776"><span data-dcnode-id="2782" instrument_node="">The results were not significant, </span><strong data-dcnode-id="2778"><u data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">so</span></u><span data-dcnode-id="2779" instrument_node=""> </span></strong><span data-dcnode-id="2777" instrument_node="">the alternative hypothesis was accepted.</span></li><span data-dcnode-id="2775" instrument_node="">
</span><li data-dcnode-id="2770"><strong data-dcnode-id="2772"><u data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Although</span></u></strong><span data-dcnode-id="2771" instrument_node=""> the results seem promising, more research must be conducted in this area.</span></li><span data-dcnode-id="2769" instrument_node="">
</span></ul><span data-dcnode-id="2767" instrument_node="">
</span><hr data-dcnode-id="2766"><span data-dcnode-id="2765" instrument_node="">
</span><h3 data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Auxiliary Verbs</span></h3><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Helping verbs. They are used to build up complete verbs.</span></p><span data-dcnode-id="2759" instrument_node="">
</span><ul data-dcnode-id="2745" type="square"><span data-dcnode-id="2758" instrument_node="">
</span><li data-dcnode-id="2753"><span data-dcnode-id="2757" instrument_node="">Primary auxiliary verbs (be, have, do) show the progressive, passive, perfect, and negative </span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academicguides.waldenu.edu/writingcenter/grammar/verbtenses"><span data-dcnode-id="2756" instrument_node="">verb tenses</span></a><span data-dcnode-id="2754" instrument_node="">.</span></li><span data-dcnode-id="2752" instrument_node="">
</span><li data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Modal auxiliary verbs (can, could, may, might, must, shall, should, will, would) show a variety of meanings. They represent ability, permission, necessity, and degree of certainty. These are always followed by the simple form of the verb.</span></li><span data-dcnode-id="2749" instrument_node="">
</span><li data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Semimodal auxiliary verbs (e.g., be going to, ought to, have to, had better, used to, be able to,…). These are always followed by the simple form of the verb.</span></li><span data-dcnode-id="2746" instrument_node="">
</span></ul><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2741" instrument_node="">
</span><ul data-dcnode-id="2712" style="list-style-type:circle;"><span data-dcnode-id="2740" instrument_node="">
</span><li data-dcnode-id="2714"><span data-dcnode-id="2739" instrument_node="">Researchers </span><strong data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">have</span></strong><span data-dcnode-id="2736" instrument_node=""> </span><u data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">investigated</span></u><span data-dcnode-id="2733" instrument_node=""> this issue for some time. However, the cause of the problem </span><strong data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">has not been</span></strong><span data-dcnode-id="2730" instrument_node=""> </span><u data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">determined</span></u><span data-dcnode-id="2727" instrument_node="">.

	</span><ul data-dcnode-id="2716"><span data-dcnode-id="2726" instrument_node="">
</span><li data-dcnode-id="2718"><span data-dcnode-id="2725" instrument_node="">primary: </span><strong data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">have investigated</span></strong><span data-dcnode-id="2722" instrument_node=""> = present perfect tense; </span><strong data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">has not been determined</span></strong><span data-dcnode-id="2719" instrument_node=""> = passive, perfect, negative form</span></li><span data-dcnode-id="2717" instrument_node="">
</span></ul><span data-dcnode-id="2715" instrument_node="">
</span></li><span data-dcnode-id="2713" instrument_node="">
</span></ul><span data-dcnode-id="2711" instrument_node="">
</span><ul data-dcnode-id="2676" style="list-style-type:circle;"><span data-dcnode-id="2710" instrument_node="">
</span><li data-dcnode-id="2678"><span data-dcnode-id="2709" instrument_node="">He </span><strong data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">could</span></strong><span data-dcnode-id="2706" instrument_node=""> </span><u data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">conduct</span></u><span data-dcnode-id="2703" instrument_node=""> more research, which </span><strong data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">may</span></strong><span data-dcnode-id="2700" instrument_node=""> </span><u data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">lead</span></u><span data-dcnode-id="2697" instrument_node=""> to the answer.

	</span><ul data-dcnode-id="2680"><span data-dcnode-id="2696" instrument_node="">
</span><li data-dcnode-id="2682"><span data-dcnode-id="2695" instrument_node="">The modal </span><strong data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">could</span></strong><span data-dcnode-id="2692" instrument_node=""> shows ability, and the verb </span><u data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">conduct</span></u><span data-dcnode-id="2689" instrument_node=""> stays in its simple form; the modal </span><strong data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">may</span></strong><span data-dcnode-id="2686" instrument_node=""> shows degree of certainty, and the verb</span><u data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node=""> lead</span></u><span data-dcnode-id="2683" instrument_node=""> stays in its simple form.</span></li><span data-dcnode-id="2681" instrument_node="">
</span></ul><span data-dcnode-id="2679" instrument_node="">
</span></li><span data-dcnode-id="2677" instrument_node="">
</span></ul><span data-dcnode-id="2675" instrument_node="">
</span><ul data-dcnode-id="2652" style="list-style-type:circle;"><span data-dcnode-id="2674" instrument_node="">
</span><li data-dcnode-id="2654"><span data-dcnode-id="2673" instrument_node="">Future researchers </span><strong data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">are going to</span></strong><span data-dcnode-id="2670" instrument_node=""> </span><u data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">delve</span></u><span data-dcnode-id="2667" instrument_node=""> more into this topic. They </span><strong data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">are about to</span></strong><span data-dcnode-id="2664" instrument_node=""> </span><u data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">make</span></u><span data-dcnode-id="2661" instrument_node=""> a breakthrough discovery.

	</span><ul data-dcnode-id="2656"><span data-dcnode-id="2660" instrument_node="">
</span><li data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">These semimodals are followed by the simple form of the verb.</span></li><span data-dcnode-id="2657" instrument_node="">
</span></ul><span data-dcnode-id="2655" instrument_node="">
</span></li><span data-dcnode-id="2653" instrument_node="">
</span></ul><span data-dcnode-id="2651" instrument_node="">

</span><h2 class="s-lib-box-title" data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Common Endings
                                </span></h2><span data-dcnode-id="2630" instrument_node="">
</span><div data-dcnode-id="2342" id="s-lg-box-collapse-9131416"><span data-dcnode-id="2629" instrument_node="">
</span><div class="s-lib-box-content" data-dcnode-id="2344"><span data-dcnode-id="2628" instrument_node="">
</span><div class="clearfix" data-dcnode-id="2346" id="s-lg-content-18488300"><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2626" instrument_node="">Nouns, verbs, adjectives, and adverbs often have unique word endings, called </span><em data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">suffixes</span></em><span data-dcnode-id="2623" instrument_node="">. Looking at the suffix can help to distinguish the word from other parts of speech and help identify the function of the word in the sentence. It is important to use the correct word form in written sentences so that readers can clearly follow the intended meaning.</span></p><span data-dcnode-id="2621" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">Here are some common endings for the basic parts of speech. If ever in doubt, consult the dictionary for the correct word form.</span></p><span data-dcnode-id="2618" instrument_node="">
</span><hr data-dcnode-id="2617"><span data-dcnode-id="2616" instrument_node="">
</span><h3 data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Common Noun Endings</span></h3><span data-dcnode-id="2613" instrument_node="">
</span><span data-dcnode-id="2612" instrument_node="">
</span><span data-dcnode-id="2611" instrument_node="">
</span><span data-dcnode-id="2610" instrument_node="">
</span><span data-dcnode-id="2517" instrument_node="">
</span><span data-dcnode-id="2515" instrument_node="">
</span><span data-dcnode-id="2513" instrument_node="">
</span><table border="1" cellpadding="10" data-dcnode-id="2512" width="500px"><tbody data-dcnode-id="2514"><tr data-dcnode-id="2516"><td data-dcnode-id="2518"><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2605"><strong data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">-age:</span></strong><span data-dcnode-id="2606" instrument_node=""> suffrage, image, postage</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2600"><strong data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">-al:</span></strong><span data-dcnode-id="2601" instrument_node=""> arrival, survival, deferral</span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2595"><strong data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">-dom</span></strong><span data-dcnode-id="2596" instrument_node="">: kingdom, freedom, boredom</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2590"><strong data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">-ee</span></strong><span data-dcnode-id="2591" instrument_node="">: interviewee, employee, trainee</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2585"><strong data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">-ence/ance</span></strong><span data-dcnode-id="2586" instrument_node="">: experience, convenience, finance</span></p><span data-dcnode-id="2584" instrument_node="">
</span><p data-dcnode-id="2580"><strong data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">-er/or:</span></strong><span data-dcnode-id="2581" instrument_node=""> teacher, singer, director</span></p><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2575"><strong data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">-ery:</span></strong><span data-dcnode-id="2576" instrument_node=""> archery, cutlery, mystery</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2570"><strong data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">-hood:</span></strong><span data-dcnode-id="2571" instrument_node=""> neighborhood, childhood, brotherhood</span></p><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2565"><strong data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">-ics</span></strong><span data-dcnode-id="2566" instrument_node="">: economics, gymnastics, aquatics</span></p><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2560"><strong data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">-ing:</span></strong><span data-dcnode-id="2561" instrument_node=""> reading, succeeding, believing</span></p><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2555"><strong data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">-ism:</span></strong><span data-dcnode-id="2556" instrument_node=""> racism, constructivism, capitalism</span></p><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2550"><strong data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">-ity/ty:</span></strong><span data-dcnode-id="2551" instrument_node=""> community, probability, equality</span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2545"><strong data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">-ment</span></strong><span data-dcnode-id="2546" instrument_node="">: accomplishment, acknowledgement, environment</span></p><span data-dcnode-id="2544" instrument_node="">

</span><h2 class="s-lib-box-title" data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Placement and Position of Adjectives and Adverbs
                                </span></h2><span data-dcnode-id="2331" instrument_node="">
</span><div data-dcnode-id="2009" id="s-lg-box-collapse-9131417"><span data-dcnode-id="2330" instrument_node="">
</span><div class="s-lib-box-content" data-dcnode-id="2011"><span data-dcnode-id="2329" instrument_node="">
</span><div class="clearfix" data-dcnode-id="2013" id="s-lg-content-18488301"><span data-dcnode-id="2328" instrument_node="">
</span><h3 data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Order of Adjectives</span></h3><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">If more than one adjective is used in a sentence, they tend to occur in a certain order. In English, two or three adjectives modifying a noun tend to be the limit. However, when writing in APA, not many adjectives should be used (since APA is objective, scientific writing). If adjectives are used, the framework below can be used as guidance in adjective placement.</span></p><span data-dcnode-id="2322" instrument_node="">
</span><ol data-dcnode-id="2311"><span data-dcnode-id="2321" instrument_node="">
</span><li data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Determiner (e.g., this, that, these, those, my, mine, your, yours, him, his, hers they, their, some, our, several,…) or article (a, an, the)</span></li><span data-dcnode-id="2318" instrument_node="">
</span><li data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Opinion, quality, or observation adjective (e.g., lovely, useful, cute, difficult, comfortable)</span></li><span data-dcnode-id="2315" instrument_node="">
</span><li data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Physical description</span></li><span data-dcnode-id="2312" instrument_node="">
</span></ol><span data-dcnode-id="2310" instrument_node="">
</span><ul data-dcnode-id="2296"><span data-dcnode-id="2309" instrument_node="">
</span><li data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">(a) size (big, little, tall, short)</span></li><span data-dcnode-id="2306" instrument_node="">
</span><li data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">(b) shape (circular,&nbsp; irregular, triangular)</span></li><span data-dcnode-id="2303" instrument_node="">
</span><li data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">(c) age (old, new, young, adolescent)</span></li><span data-dcnode-id="2300" instrument_node="">
</span><li data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">(d) color (red, green, yellow)</span></li><span data-dcnode-id="2297" instrument_node="">
</span></ul><span data-dcnode-id="2295" instrument_node="">
</span><ol data-dcnode-id="2281"><span data-dcnode-id="2294" instrument_node="">
</span><li data-dcnode-id="2292" value="4"><span data-dcnode-id="2293" instrument_node="">Origin (e.g., English, Mexican, Japanese)</span></li><span data-dcnode-id="2291" instrument_node="">
</span><li data-dcnode-id="2289" value="5"><span data-dcnode-id="2290" instrument_node="">Material (e.g., cotton, metal, plastic)</span></li><span data-dcnode-id="2288" instrument_node="">
</span><li data-dcnode-id="2286" value="6"><span data-dcnode-id="2287" instrument_node="">Qualifier (noun used as an adjective to modify the noun that follows; i.e., campus activities, rocking chair, business suit)</span></li><span data-dcnode-id="2285" instrument_node="">
</span><li data-dcnode-id="2283" value="7"><span data-dcnode-id="2284" instrument_node="">Head noun that the adjectives are describing (e.g., activities, chair, suit)</span></li><span data-dcnode-id="2282" instrument_node="">
</span></ol><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">For example:</span></p><span data-dcnode-id="2277" instrument_node="">
</span><ul data-dcnode-id="2215" style="list-style-type:circle;"><span data-dcnode-id="2276" instrument_node="">
</span><li data-dcnode-id="2247"><strong data-dcnode-id="2273"><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">This</span></em></strong><span data-dcnode-id="2272" instrument_node=""> (1)</span><strong data-dcnode-id="2269"><em data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node=""> lovely</span></em></strong><span data-dcnode-id="2268" instrument_node=""> (2)</span><strong data-dcnode-id="2265"><em data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node=""> new</span></em></strong><span data-dcnode-id="2264" instrument_node=""> (3)</span><strong data-dcnode-id="2261"><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node=""> wooden</span></em></strong><span data-dcnode-id="2260" instrument_node=""> (4) </span><strong data-dcnode-id="2257"><em data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Italian</span></em></strong><span data-dcnode-id="2256" instrument_node=""> (5)</span><strong data-dcnode-id="2253"><em data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node=""> rocking</span></em></strong><span data-dcnode-id="2252" instrument_node=""> (6)</span><strong data-dcnode-id="2249"><em data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node=""> chair</span></em></strong><span data-dcnode-id="2248" instrument_node=""> (7) is in my office.</span></li><span data-dcnode-id="2246" instrument_node="">
</span><li data-dcnode-id="2217"><strong data-dcnode-id="2243"><em data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Your </span></em></strong><span data-dcnode-id="2242" instrument_node="">(1) </span><strong data-dcnode-id="2239"><em data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">beautiful</span></em></strong><span data-dcnode-id="2238" instrument_node=""> (2) </span><strong data-dcnode-id="2235"><em data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">green</span></em></strong><span data-dcnode-id="2234" instrument_node=""> (3) </span><strong data-dcnode-id="2231"><em data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">French</span></em></strong><span data-dcnode-id="2230" instrument_node=""> (4) </span><strong data-dcnode-id="2227"><em data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">silk </span></em></strong><span data-dcnode-id="2226" instrument_node="">(5) </span><strong data-dcnode-id="2223"><em data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">business</span></em></strong><span data-dcnode-id="2222" instrument_node=""> (6) </span><strong data-dcnode-id="2219"><em data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">suit</span></em></strong><span data-dcnode-id="2218" instrument_node=""> (7) has a hole in it.</span></li><span data-dcnode-id="2216" instrument_node="">
</span></ul><span data-dcnode-id="2214" instrument_node="">
</span><hr data-dcnode-id="2213"><span data-dcnode-id="2212" instrument_node="">
</span><h3 data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Commas With Multiple Adjectives</span></h3><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">A comma is used between two adjectives only if the adjectives belong to the same category (for example, if there are two adjectives describing color or two adjectives describing material). To test this, ask these two questions:</span></p><span data-dcnode-id="2206" instrument_node="">
</span><ol data-dcnode-id="2198"><span data-dcnode-id="2205" instrument_node="">
</span><li data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Does the sentence make sense if the adjectives are written in reverse order?</span></li><span data-dcnode-id="2202" instrument_node="">
</span><li data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Does the sentence make sense if the word “and” is written between them?</span></li><span data-dcnode-id="2199" instrument_node="">
</span></ol><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">If the answer is yes to the above questions, the adjectives are separated with a comma. Also keep in mind a comma is never used before the noun that it modifies.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><ul data-dcnode-id="2168" style="list-style-type:circle;"><span data-dcnode-id="2193" instrument_node="">
</span><li data-dcnode-id="2180"><strong data-dcnode-id="2185"><span data-dcnode-id="2192" instrument_node="">This</span><em data-dcnode-id="2187"><span data-dcnode-id="2191" instrument_node=""> </span><u data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">useful big round old green English leather</span></u><span data-dcnode-id="2188" instrument_node=""> </span></em><span data-dcnode-id="2186" instrument_node="">rocking chair</span></strong><span data-dcnode-id="2184" instrument_node=""> </span><strong data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">is comfortable</span></strong><span data-dcnode-id="2181" instrument_node="">. (Note that there are no commas here because there is only one adjective from each category.)</span></li><span data-dcnode-id="2179" instrument_node="">
</span><li data-dcnode-id="2170"><strong data-dcnode-id="2172"><span data-dcnode-id="2178" instrument_node="">A </span><em data-dcnode-id="2174"><u data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">lovely large yellow, red, and green</span></u><span data-dcnode-id="2175" instrument_node=""> </span></em><span data-dcnode-id="2173" instrument_node="">oil painting was hung on the wall.</span></strong><span data-dcnode-id="2171" instrument_node=""> (Note the commas between yellow, red, and green since these are all in the same category of color.)</span></li><span data-dcnode-id="2169" instrument_node="">
</span></ul><span data-dcnode-id="2167" instrument_node="">
</span><hr data-dcnode-id="2166"><span data-dcnode-id="2165" instrument_node="">
</span><h3 data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Position of Adverbs</span></h3><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Adverbs can appear in different positions in a sentence.</span></p><span data-dcnode-id="2159" instrument_node="">
</span><ul data-dcnode-id="2128" style="list-style-type:circle;"><span data-dcnode-id="2158" instrument_node="">
</span><li data-dcnode-id="2152"><span data-dcnode-id="2157" instrument_node="">At the beginning of a sentence: </span><strong data-dcnode-id="2154"><u data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Generally</span></u></strong><span data-dcnode-id="2153" instrument_node="">, teachers work more than 40 hours a week.</span></li><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2145"><span data-dcnode-id="2150" instrument_node="">After the subject, before the verb: Teachers </span><strong data-dcnode-id="2147"><u data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">generally</span></u></strong><span data-dcnode-id="2146" instrument_node=""> work more than 40 hours a week.</span></li><span data-dcnode-id="2144" instrument_node="">
</span><li data-dcnode-id="2138"><span data-dcnode-id="2143" instrument_node="">At the end of a sentence: Teachers work more than 40 hours a week, </span><strong data-dcnode-id="2140"><u data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">generally</span></u></strong><span data-dcnode-id="2139" instrument_node="">.</span></li><span data-dcnode-id="2137" instrument_node="">
</span><li data-dcnode-id="2130"><span data-dcnode-id="2136" instrument_node="">However, an adverb is not placed between a verb and a direct object. INCORRECT: Teachers work</span><strong data-dcnode-id="2132"><span data-dcnode-id="2135" instrument_node=""> </span><s data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">generally</span></s></strong><span data-dcnode-id="2131" instrument_node=""> more than 40 hours a week.</span></li><span data-dcnode-id="2129" instrument_node="">
</span></ul><span data-dcnode-id="2127" instrument_node="">
</span><hr data-dcnode-id="2126"><span data-dcnode-id="2125" instrument_node="">
</span><h3 data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">More Detailed Rules for the Position of Adverbs</span></h3><span data-dcnode-id="2122" instrument_node="">
</span><ol data-dcnode-id="2117"><span data-dcnode-id="2121" instrument_node="">
</span><li data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Adverbs that modify the whole sentence can move to different positions, such as certainly, recently, fortunately, actually, and obviously.</span></li><span data-dcnode-id="2118" instrument_node="">
</span></ol><span data-dcnode-id="2116" instrument_node="">
</span><ul data-dcnode-id="2094" style="list-style-type:circle;"><span data-dcnode-id="2115" instrument_node="">
</span><li data-dcnode-id="2110"><strong data-dcnode-id="2112"><u data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Recently</span></u></strong><span data-dcnode-id="2111" instrument_node="">, I started a new job.</span></li><span data-dcnode-id="2109" instrument_node="">
</span><li data-dcnode-id="2103"><span data-dcnode-id="2108" instrument_node="">I </span><strong data-dcnode-id="2105"><u data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">recently</span></u></strong><span data-dcnode-id="2104" instrument_node=""> started a new job.</span></li><span data-dcnode-id="2102" instrument_node="">
</span><li data-dcnode-id="2096"><span data-dcnode-id="2101" instrument_node="">I started a new job </span><strong data-dcnode-id="2098"><u data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">recently</span></u></strong><span data-dcnode-id="2097" instrument_node="">.</span></li><span data-dcnode-id="2095" instrument_node="">
</span></ul><span data-dcnode-id="2093" instrument_node="">
</span><ol data-dcnode-id="2082"><span data-dcnode-id="2092" instrument_node="">
</span><li data-dcnode-id="2084" value="2"><span data-dcnode-id="2091" instrument_node="">Many adverbs of frequency modify the entire sentence and not just the verb, such as </span><em data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">frequently, usually, always, sometimes, often</span></em><span data-dcnode-id="2088" instrument_node="">, and </span><em data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">seldom</span></em><span data-dcnode-id="2085" instrument_node="">. These adverbs appear in the middle of the sentence, after the subject.</span></li><span data-dcnode-id="2083" instrument_node="">
</span></ol><span data-dcnode-id="2081" instrument_node="">
</span><ul data-dcnode-id="2038" style="list-style-type:circle;"><span data-dcnode-id="2080" instrument_node="">
</span><li data-dcnode-id="2057"><span data-dcnode-id="2079" instrument_node="">She </span><strong data-dcnode-id="2076"><u data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">frequently</span></u></strong><span data-dcnode-id="2075" instrument_node=""> gets time to herself. (The adverb appears before the main verb.)

	</span><ul data-dcnode-id="2059"><span data-dcnode-id="2074" instrument_node="">
</span><li data-dcnode-id="2068"><span data-dcnode-id="2073" instrument_node="">INCORRECT: </span><strong data-dcnode-id="2070"><s data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Frequently</span></s></strong><span data-dcnode-id="2069" instrument_node=""> she gets time to herself.</span></li><span data-dcnode-id="2067" instrument_node="">
</span><li data-dcnode-id="2061"><span data-dcnode-id="2066" instrument_node="">INCORRECT: She gets time to herself </span><strong data-dcnode-id="2063"><s data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">frequently</span></s></strong><span data-dcnode-id="2062" instrument_node="">.</span></li><span data-dcnode-id="2060" instrument_node="">
</span></ul><span data-dcnode-id="2058" instrument_node="">
</span></li><span data-dcnode-id="2056" instrument_node="">
</span><li data-dcnode-id="2050"><span data-dcnode-id="2055" instrument_node="">She has </span><strong data-dcnode-id="2052"><u data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">frequently</span></u></strong><span data-dcnode-id="2051" instrument_node=""> exercised during her lunch hour. (The adverb appears after the first auxiliary verb.)</span></li><span data-dcnode-id="2049" instrument_node="">
</span><li data-dcnode-id="2040"><span data-dcnode-id="2048" instrument_node="">She is </span><strong data-dcnode-id="2045"><u data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">frequently</span></u></strong><span data-dcnode-id="2044" instrument_node=""> hanging out with old friends. (The adverb appears after the </span><em data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">to be</span></em><span data-dcnode-id="2041" instrument_node=""> verb.)</span></li><span data-dcnode-id="2039" instrument_node="">
</span></ul><span data-dcnode-id="2037" instrument_node="">
</span><ol data-dcnode-id="2032"><span data-dcnode-id="2036" instrument_node="">
</span><li data-dcnode-id="2034" value="3"><span data-dcnode-id="2035" instrument_node="">Adverbial phrases work best at the end of a sentence.</span></li><span data-dcnode-id="2033" instrument_node="">
</span></ol><span data-dcnode-id="2031" instrument_node="">
