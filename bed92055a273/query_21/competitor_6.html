</span><h2 class="ct-slideshow__slide__text-container__caption" data-dcnode-id="1964"><span data-dcnode-id="1968" instrument_node="">
</span><div data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Countries that have mandatory voting</span></div><span data-dcnode-id="1965" instrument_node="">
</span></h2><span data-dcnode-id="1963" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1919"><span data-dcnode-id="1962" instrument_node="">
</span><div data-dcnode-id="1921"><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Mandatory voting, also referred to as compulsory voting, is a concept born&nbsp;from a fundamental belief that political participation is an essential, non-negotiable aspect of democracy—a civic duty, and not just a right. In countries around the world, compulsory voting has been written into laws and constitutions, into the bedrock of societies where it becomes an expectation rather than an option.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">This idea is not new. The first country to implement compulsory voting was Belgium in 1893. Since then, countries have been adapting and iterating this system in myriad ways—particularly in the area of enforcement. In some, nonvoters are fined. In others, the sanctions are more severe like holds on salary or voter disenfranchisement. Stricter yet are the countries who employ both. Then there are democracies where mandatory voting is legal but not enforced, or where sanctions are not delivered consistently. Though the concept is not new, it is far from perfect and far from agreed upon.</span></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1955" instrument_node="">In a democracy, the government is meant to represent the will of its constituents. Proponents say that compulsory voting, which mandates that each eligible person cast a vote, is the </span><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idea.int/data-tools/data/voter-turnout/compulsory-voting"><span data-dcnode-id="1954" instrument_node="">best way to derive a truly representative government</span></a><span data-dcnode-id="1952" instrument_node="">. With mandatory voting, more time and energy can be spent focusing on issues that matter most to the electorate while fewer resources are spent convincing people to exercise their right to vote. Advocates also hope that if everyone is required to vote, people will educate themselves on candidates and their policies.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1949" instrument_node="">There is a reason—several, in fact—that not every democratic government (including the United States) has adopted compulsory voting. One of the biggest arguments against mandatory voting is the inherent contradiction to democracy in forcing people to vote. Abstention, for some, is an important right. Another major consideration is the increased risk of </span><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polyas.com/election-glossary/donkey-vote"><span data-dcnode-id="1948" instrument_node="">donkey votes</span></a><span data-dcnode-id="1946" instrument_node="">, when the voter ranks each candidate in the order that they have appeared on the ballot paper or apathetic votes from people who are uninformed and are only there to fulfill a civic duty.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">An illustration of that point is in Rio de Janeiro, where&nbsp;</span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pri.org/stories/2016-11-08/imagine-if-you-had-vote-law-your-future-really-depended-it"><span data-dcnode-id="1942" instrument_node="">41.5% of people who voted in the 2016 mayoral elections</span></a><span data-dcnode-id="1940" instrument_node="">&nbsp;submitted a blank or annulled ballot. This trend was observed throughout Brazil, the largest country that implements a compulsory voting system.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1931"><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stacker.com/"><span data-dcnode-id="1937" instrument_node="">Stacker</span></a><span data-dcnode-id="1935" instrument_node=""> used the CIA World Factbook to compile a list of the 22 countries which require eligible citizens to vote. The populations (as of 2019) of each country are also included, via the </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//population.un.org/wpp/Download/Standard/Population/"><span data-dcnode-id="1934" instrument_node="">United Nations World Population Prospects</span></a><span data-dcnode-id="1932" instrument_node="">. Although it is a relatively small number of countries who have endeavored to systematize compulsory voting, each one takes a different approach in doing so. The nuances of each system—fines vs. no fines, manual vs. automatic voter registration, varying degrees of additional civil sanctions—serve as notes for other democratic nations mulling over the idea of mandatory voting.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Keep reading to learn which countries practice compulsory voting, which actively enforce it, and how.</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1922"><strong data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">You may also like: </span></strong><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/2728/elections-around-world-watch-2019"><span data-dcnode-id="1924" instrument_node="">Elections around the world to watch in 2019</span></a></p></div><span data-dcnode-id="1920" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1863"><span data-dcnode-id="1873" instrument_node="">

</span><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Voting is compulsory for all Argentine citizens, but sanctions for nonvoters are rarely and inconsistently enforced. Argentina has one of the oldest mandatory voting systems, with compulsory voting laws introduced in 1912.</span></p></div><span data-dcnode-id="1864" instrument_node="">

- Population: 25.2 million</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1814" instrument_node="">Compulsory voting was introduced in Australia in 1924 in response to low voter turnout in the 1922 federal elections. Anyone who fails to vote in a federal election without a valid reason is required to pay a $20 fine. More than&nbsp;</span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/10/22/world/australia/compulsory-voting.html"><span data-dcnode-id="1813" instrument_node="">96% of eligible voters in Australia</span></a><span data-dcnode-id="1811" instrument_node="">&nbsp;are registered and voter turnout has never dropped below 90%.</span></p></div><span data-dcnode-id="1808" instrument_node="">

- Population: 11.5 million</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node="">Belgium’s compulsory voting system, introduced in 1893 for men and 1948 for women, is the oldest in the world. Voters who do not present themselves on election day may be subject to fines. Failure to vote four times over the course of 15 years results in a </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecpr.eu/Filestore/PaperProposal/53cb7c8c-38e0-4a02-8cdc-47d70494182f.pdf"><span data-dcnode-id="1751" instrument_node="">10-year voter disenfranchisement</span></a><span data-dcnode-id="1749" instrument_node=""> and employment restrictions.</span></p></div><span data-dcnode-id="1746" instrument_node="">

- Population: 11.5 million</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1691" instrument_node="">Bolivia adopted a compulsory voting system in 1952 along with strict enforcement methods. Voters are given cards as proof of participation. Inability to produce this card during the three months following an election </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idea.int/data-tools/data/voter-turnout/compulsory-voting"><span data-dcnode-id="1690" instrument_node="">prevents voters from receiving their salaries</span></a><span data-dcnode-id="1688" instrument_node=""> from the bank.</span></p></div><span data-dcnode-id="1685" instrument_node="">

- Population: 211.1 million</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">In Brazil, the largest country with a compulsory voting system, voting is mandatory for all literate adults between the ages of 18 and 70&nbsp;and optional for those over 70. While voters are required to show up to the polls, </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pri.org/stories/2016-11-08/imagine-if-you-had-vote-law-your-future-really-depended-it"><span data-dcnode-id="1628" instrument_node="">they may annul their votes</span></a><span data-dcnode-id="1626" instrument_node=""> by submitting blank ballots or by writing names of people who are not officially on the ballot. Brazil’s fines for nonvoters are relatively small ($1.50), but the additional sanctions are more severe: Nonvoters may face difficulties obtaining passports, loans, jobs, and even salaries from current employers.</span></p></div><span data-dcnode-id="1623" instrument_node="">

</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">In the Dominican Republic’s constitution, voting is outlined as a right. Nevertheless, that right does not apply to everyone equally. Military members and national police officers are not permitted to vote, while all married persons—even if they are younger than the mandatory voting age—can exercise this right. Although voting is compulsory, there are no penalties for nonvoters.</span></p></div><span data-dcnode-id="1450" instrument_node="">

- Population: 17.4 million</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1394" instrument_node="">Mandatory voting, written into Ecuador’s constitution and electoral laws, was instituted in 1936. Voting is compulsory for literate Ecuadorians between the ages of 18 and 65. Fines for nonvoters are calculated as </span><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//latinamericacurrentevents.com/ecuador-fines-for-those-who-fail-to-vote/37691/"><span data-dcnode-id="1393" instrument_node="">10% of the basic salary</span></a><span data-dcnode-id="1391" instrument_node="">, similar to a monthly minimum wage. In 2017, for instance, nonvoters were fined $37.50.</span></p></div><span data-dcnode-id="1388" instrument_node="">

</span><p data-dcnode-id="1320"><span data-dcnode-id="1327" instrument_node="">Mandatory voting in Egypt is enforced for all eligible voters through fines. But fines aren’t the biggest problem voters face. Egypt’s 2018 presidential election drew </span><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hrw.org/news/2018/02/13/egypt-planned-presidential-vote-neither-free-nor-fair"><span data-dcnode-id="1326" instrument_node="">harsh criticism from groups like Human Rights Watch</span></a><span data-dcnode-id="1324" instrument_node=""> for distorting the democratic process into something that more closely resembles a dictatorship. Incumbent President </span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pri.org/stories/2018-04-02/egypts-sisi-wins-97-percent-election-no-real-opposition"><span data-dcnode-id="1323" instrument_node="">Abdel Fattah el-Sisi won with 97%</span></a><span data-dcnode-id="1321" instrument_node=""> of the vote.</span></p></div><span data-dcnode-id="1318" instrument_node="">

- Population: 9.7 million</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1209" instrument_node="">Voting in Honduras is compulsory by law but not enforced. </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.electionguide.org/countries/id/97/"><span data-dcnode-id="1208" instrument_node="">Voter turnout in the 2017 presidential election</span></a><span data-dcnode-id="1206" instrument_node=""> was 57%, keeping in line with the country’s historical voter turnout average of 55% spanning 17 years.</span></p></div><span data-dcnode-id="1203" instrument_node="">

- Population: 6.9 million</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node="">In Lebanon, gender and education disparities are a defining characteristic of the country’s compulsory voting system. Voting is mandatory for all men over the age of 21 while </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stand.ie/spotlight-womens-suffrage-in-lebanon/"><span data-dcnode-id="1141" instrument_node="">voting is authorized, but not required, for women 21 and older</span></a><span data-dcnode-id="1139" instrument_node=""> only if they have obtained at least an elementary education.</span></p></div><span data-dcnode-id="1136" instrument_node="">

- Population: 5.8 million</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">Compulsory voting is strictly enforced in Singapore. Citizens who miss voting in a single election will subsequently have their </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eld.gov.sg/voters_compulsory.html"><span data-dcnode-id="732" instrument_node="">names removed from the official list of registered voters</span></a><span data-dcnode-id="730" instrument_node="">, making them ineligible to vote in future presidential or parliamentary elections. Names can be restored to the register by submitting an application with an official reason for missing the election. Acceptable reasons include giving birth, illness, and being overseas. A fee of $50 is charged to anyone with invalid reasons for their abstention.</span></p></div><span data-dcnode-id="727" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="670"><span data-dcnode-id="683" instrument_node="">
</span><div data-dcnode-id="672"><p data-dcnode-id="679"><span data-dcnode-id="682" instrument_node="">- Mandatory voting age: 18</span><br data-dcnode-id="681"><span data-dcnode-id="680" instrument_node="">
- Population: 69.6 million</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">Compulsory voting in Thailand is not enforced. But how far does a person’s vote go in Thailand? Since a coup d'etat in 2014, Thailand has been ruled by a military junta called the National Council for Peace and Order. A March 2019 House of Representatives election organized by NCPO drew </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hrw.org/news/2019/03/19/thailand-structural-flaws-subvert-election"><span data-dcnode-id="676" instrument_node="">criticism from Human Rights Watch</span></a><span data-dcnode-id="674" instrument_node=""> for failing to give voters the right to freely and fairly choose their new government leaders.</span></p></div><span data-dcnode-id="671" instrument_node="">

- Population: 3.5 million</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="610" instrument_node="">Compulsory voting—introduced in Uruguay in 1934 but </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idea.int/data-tools/data/voter-turnout/compulsory-voting"><span data-dcnode-id="609" instrument_node="">not put into effect until 1970</span></a><span data-dcnode-id="607" instrument_node="">—is enforced through sanctions such as fines. </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.electionguide.org/countries/id/228/"><span data-dcnode-id="606" instrument_node="">Average voter turnout</span></a><span data-dcnode-id="604" instrument_node=""> in elections spanning nearly 20 years is 90%. More than 2.7 million people are eligible to vote in the upcoming </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.as-coa.org/articles/explainer-uruguays-2019-presidential-election"><span data-dcnode-id="603" instrument_node="">Uruguayan general election on Oct. 27</span></a><span data-dcnode-id="601" instrument_node="">.</span></p><span data-dcnode-id="599" instrument_node="">

</span><textarea data-dcnode-id="153" id="html-source-code">&lt;span data-dcnode-id="154" instrument_node=""&gt;&lt;section&gt;
  &lt;header&gt;
    &lt;ul&gt;
      &lt;li&gt;Story name: Countries that have mandatory voting&lt;/li&gt;
      &lt;li&gt;Canonical URL: https://stacker.com/stories/3485/countries-have-mandatory-voting&lt;/li&gt;
      &lt;li&gt;Written by: Lauren Liebhaber&lt;/li&gt;
      &lt;li&gt;Description: &lt;a href="https://stacker.com/"&gt;Stacker&lt;/a&gt; used the CIA World Factbook to compile a list of the 22 countries which require eligible citizens to vote. The populations (as of 2019) of each country are also included, via the United Nations World Population Prospects. Although it is a relatively small number of countries who have endeavored to systematize compulsory voting, each one takes a different approach in doing so. The nuances of each system—fines vs. no fines, manual vs. automatic voter registration, varying degrees of additional civil sanctions—serve as notes for other democratic nations moving toward mandatory voting.
&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/header&gt;

  &lt;article&gt;
    &lt;h2&gt;Countries that have mandatory voting&lt;/h2&gt;
&lt;p&gt;Mandatory voting, also referred to as compulsory voting, is a concept born&nbsp;from a fundamental belief that political participation is an essential, non-negotiable aspect of democracy—a civic duty, and not just a right. In countries around the world, compulsory voting has been written into laws and constitutions, into the bedrock of societies where it becomes an expectation rather than an option.&lt;/p&gt;

&lt;p&gt;This idea is not new. The first country to implement compulsory voting was Belgium in 1893. Since then, countries have been adapting and iterating this system in myriad ways—particularly in the area of enforcement. In some, nonvoters are fined. In others, the sanctions are more severe like holds on salary or voter disenfranchisement. Stricter yet are the countries who employ both. Then there are democracies where mandatory voting is legal but not enforced, or where sanctions are not delivered consistently. Though the concept is not new, it is far from perfect and far from agreed upon.&lt;/p&gt;

&lt;p&gt;In a democracy, the government is meant to represent the will of its constituents. Proponents say that compulsory voting, which mandates that each eligible person cast a vote, is the &lt;a href="https://www.idea.int/data-tools/data/voter-turnout/compulsory-voting"&gt;best way to derive a truly representative government&lt;/a&gt;. With mandatory voting, more time and energy can be spent focusing on issues that matter most to the electorate while fewer resources are spent convincing people to exercise their right to vote. Advocates also hope that if everyone is required to vote, people will educate themselves on candidates and their policies.&lt;/p&gt;

&lt;p&gt;There is a reason—several, in fact—that not every democratic government (including the United States) has adopted compulsory voting. One of the biggest arguments against mandatory voting is the inherent contradiction to democracy in forcing people to vote. Abstention, for some, is an important right. Another major consideration is the increased risk of &lt;a href="https://www.polyas.com/election-glossary/donkey-vote"&gt;donkey votes&lt;/a&gt;, when the voter ranks each candidate in the order that they have appeared on the ballot paper or apathetic votes from people who are uninformed and are only there to fulfill a civic duty.&lt;/p&gt;

&lt;p&gt;An illustration of that point is in Rio de Janeiro, where&nbsp;&lt;a href="https://www.pri.org/stories/2016-11-08/imagine-if-you-had-vote-law-your-future-really-depended-it"&gt;41.5% of people who voted in the 2016 mayoral elections&lt;/a&gt;&nbsp;submitted a blank or annulled ballot. This trend was observed throughout Brazil, the largest country that implements a compulsory voting system.&lt;/p&gt;

&lt;p&gt;&lt;a href="https://stacker.com/"&gt;Stacker&lt;/a&gt; used the CIA World Factbook to compile a list of the 22 countries which require eligible citizens to vote. The populations (as of 2019) of each country are also included, via the &lt;a href="https://population.un.org/wpp/Download/Standard/Population/"&gt;United Nations World Population Prospects&lt;/a&gt;. Although it is a relatively small number of countries who have endeavored to systematize compulsory voting, each one takes a different approach in doing so. The nuances of each system—fines vs. no fines, manual vs. automatic voter registration, varying degrees of additional civil sanctions—serve as notes for other democratic nations mulling over the idea of mandatory voting.&lt;/p&gt;

&lt;p&gt;Keep reading to learn which countries practice compulsory voting, which actively enforce it, and how.&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;You may also like: &lt;/strong&gt;&lt;a href="https://thestacker.com/stories/2728/elections-around-world-watch-2019"&gt;Elections around the world to watch in 2019&lt;/a&gt;&lt;/p&gt;
&lt;h2&gt;Argentina&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 44.8 million&lt;/p&gt;

&lt;p&gt;Voting is compulsory for all Argentine citizens, but sanctions for nonvoters are rarely and inconsistently enforced. Argentina has one of the oldest mandatory voting systems, with compulsory voting laws introduced in 1912.&lt;/p&gt;
&lt;h2&gt;Australia&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 25.2 million&lt;/p&gt;

&lt;p&gt;Compulsory voting was introduced in Australia in 1924 in response to low voter turnout in the 1922 federal elections. Anyone who fails to vote in a federal election without a valid reason is required to pay a $20 fine. More than&nbsp;&lt;a href="https://www.nytimes.com/2018/10/22/world/australia/compulsory-voting.html"&gt;96% of eligible voters in Australia&lt;/a&gt;&nbsp;are registered and voter turnout has never dropped below 90%.&lt;/p&gt;
&lt;h2&gt;Belgium&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 11.5 million&lt;/p&gt;

&lt;p&gt;Belgium’s compulsory voting system, introduced in 1893 for men and 1948 for women, is the oldest in the world. Voters who do not present themselves on election day may be subject to fines. Failure to vote four times over the course of 15 years results in a &lt;a href="https://ecpr.eu/Filestore/PaperProposal/53cb7c8c-38e0-4a02-8cdc-47d70494182f.pdf"&gt;10-year voter disenfranchisement&lt;/a&gt; and employment restrictions.&lt;/p&gt;
&lt;h2&gt;Bolivia&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 11.5 million&lt;/p&gt;

&lt;p&gt;Bolivia adopted a compulsory voting system in 1952 along with strict enforcement methods. Voters are given cards as proof of participation. Inability to produce this card during the three months following an election &lt;a href="https://www.idea.int/data-tools/data/voter-turnout/compulsory-voting"&gt;prevents voters from receiving their salaries&lt;/a&gt; from the bank.&lt;/p&gt;
&lt;h2&gt;Brazil&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 211.1 million&lt;/p&gt;

&lt;p&gt;In Brazil, the largest country with a compulsory voting system, voting is mandatory for all literate adults between the ages of 18 and 70&nbsp;and optional for those over 70. While voters are required to show up to the polls, &lt;a href="https://www.pri.org/stories/2016-11-08/imagine-if-you-had-vote-law-your-future-really-depended-it"&gt;they may annul their votes&lt;/a&gt; by submitting blank ballots or by writing names of people who are not officially on the ballot. Brazil’s fines for nonvoters are relatively small ($1.50), but the additional sanctions are more severe: Nonvoters may face difficulties obtaining passports, loans, jobs, and even salaries from current employers.&lt;/p&gt;
&lt;h2&gt;Democratic Republic of the Congo&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 86.8 million&lt;/p&gt;

&lt;p&gt;Voting in the Democratic Republic of the Congo can be a challenging, dangerous, and opaque process. Rebel violence, faulty voting machines, and a lack of transparency about voter registration made voting in the 2018 elections extremely difficult for DRC citizens. Perhaps for these reasons, compulsory voting in the Democratic Republic of the Congo is not enforced.&lt;/p&gt;
&lt;h2&gt;Costa Rica&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 5.0 million&lt;/p&gt;

&lt;p&gt;While voting is legally required in Costa Rica, there are no fines or penalties in place for nonvoters. Voter turnout in the &lt;a href="https://www.electionguide.org/elections/id/3049/"&gt;2018 presidential election &lt;/a&gt;was 66%.&lt;/p&gt;
&lt;h2&gt;Dominican Republic&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 10.7 million&lt;/p&gt;

&lt;p&gt;In the Dominican Republic’s constitution, voting is outlined as a right. Nevertheless, that right does not apply to everyone equally. Military members and national police officers are not permitted to vote, while all married persons—even if they are younger than the mandatory voting age—can exercise this right. Although voting is compulsory, there are no penalties for nonvoters.&lt;/p&gt;
&lt;h2&gt;Ecuador&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 17.4 million&lt;/p&gt;

&lt;p&gt;Mandatory voting, written into Ecuador’s constitution and electoral laws, was instituted in 1936. Voting is compulsory for literate Ecuadorians between the ages of 18 and 65. Fines for nonvoters are calculated as &lt;a href="https://latinamericacurrentevents.com/ecuador-fines-for-those-who-fail-to-vote/37691/"&gt;10% of the basic salary&lt;/a&gt;, similar to a monthly minimum wage. In 2017, for instance, nonvoters were fined $37.50.&lt;/p&gt;
&lt;h2&gt;Egypt&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 100.4 million&lt;/p&gt;

&lt;p&gt;Mandatory voting in Egypt is enforced for all eligible voters through fines. But fines aren’t the biggest problem voters face. Egypt’s 2018 presidential election drew &lt;a href="https://www.hrw.org/news/2018/02/13/egypt-planned-presidential-vote-neither-free-nor-fair"&gt;harsh criticism from groups like Human Rights Watch&lt;/a&gt; for distorting the democratic process into something that more closely resembles a dictatorship. Incumbent President &lt;a href="https://www.pri.org/stories/2018-04-02/egypts-sisi-wins-97-percent-election-no-real-opposition"&gt;Abdel Fattah el-Sisi won with 97%&lt;/a&gt; of the vote.&lt;/p&gt;
&lt;h2&gt;Greece&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 10.5 million&lt;/p&gt;

&lt;p&gt;Greece’s compulsory voting system was instituted in 1926. Until 2000, failure to vote resulted in the inability to obtain a passport, license, or occupational license. No sanctions are currently enforced for nonvoters.&lt;/p&gt;
&lt;h2&gt;Honduras&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 9.7 million&lt;/p&gt;

&lt;p&gt;Voting in Honduras is compulsory by law but not enforced. &lt;a href="https://www.electionguide.org/countries/id/97/"&gt;Voter turnout in the 2017 presidential election&lt;/a&gt; was 57%, keeping in line with the country’s historical voter turnout average of 55% spanning 17 years.&lt;/p&gt;
&lt;h2&gt;Lebanon&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 21&lt;br&gt;
- Population: 6.9 million&lt;/p&gt;

&lt;p&gt;In Lebanon, gender and education disparities are a defining characteristic of the country’s compulsory voting system. Voting is mandatory for all men over the age of 21 while &lt;a href="https://www.stand.ie/spotlight-womens-suffrage-in-lebanon/"&gt;voting is authorized, but not required, for women 21 and older&lt;/a&gt; only if they have obtained at least an elementary education.&lt;/p&gt;
&lt;h2&gt;Luxembourg&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 616,000&lt;/p&gt;

&lt;p&gt;&lt;a href="https://guichet.public.lu/en/citoyens/citoyennete/elections/elections-legislatives/vote-elections-legislatives.html"&gt;Voting in legislative elections&lt;/a&gt; is mandatory for all Luxembourg nationals under the age of 75, including those who live abroad. Roughly half of Luxembourg’s total population is eligible to vote. Nonvoters are subject to fines.&lt;/p&gt;
&lt;h2&gt;Mexico&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 127.6 million&lt;/p&gt;

&lt;p&gt;Voting in Mexico is compulsory by law but not enforced. All eligible Mexican citizens are required to obtain a voter identification card to be able to vote. Voter turnout in the 2018 presidential election was 63%.&lt;/p&gt;
&lt;h2&gt;Nauru&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 20&lt;br&gt;
- Population: 11,000&lt;/p&gt;

&lt;p&gt;Compulsory voting began in Nauru in 1965. Nauru citizens are automatically &lt;a href="https://thecommonwealth.org/sites/default/files/inline/P14877_POL_NauruReport.pdf"&gt;registered in the electoral roll&lt;/a&gt; upon turning 20. Nonvoters must explain their absence and may be subject to additional sanctions such as fines.&lt;/p&gt;
&lt;h2&gt;Panama&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 4.2 million&lt;/p&gt;

&lt;p&gt;While voting in Panama is legally compulsory, it is not enforced. Despite the absence of sanctions, &lt;a href="https://en.wikipedia.org/wiki/2019_Panamanian_general_election"&gt;voter turnout in the presidential election in May 2019 was 73%&lt;/a&gt;.&lt;/p&gt;
&lt;h2&gt;Paraguay&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 7.0 million&lt;/p&gt;

&lt;p&gt;Paraguay transitioned to a democratic government and made voting compulsory in 1992. Voting is mandatory for all Paraguayan citizens ages 18-75. All citizens are automatically registered to vote upon turning 18. Paraguay’s peak year for voter participation was 1998 with &lt;a href="https://www.as-coa.org/articles/explainer-paraguays-2018-elections"&gt;80.5% voter turnout. &lt;/a&gt;&lt;/p&gt;
&lt;h2&gt;Peru&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 32.5 million&lt;/p&gt;

&lt;p&gt;Voting is mandatory for all citizens between the ages of 18 and 70. Fines imposed on nonvoters can range between $6 and $25. &lt;a href="https://www.electionguide.org/countries/id/170/"&gt;Average voter turnout&lt;/a&gt; in elections spanning nearly 20 years is 83%.&lt;/p&gt;
&lt;h2&gt;Singapore&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 21&lt;br&gt;
- Population: 5.8 million&lt;/p&gt;

&lt;p&gt;Compulsory voting is strictly enforced in Singapore. Citizens who miss voting in a single election will subsequently have their &lt;a href="https://www.eld.gov.sg/voters_compulsory.html"&gt;names removed from the official list of registered voters&lt;/a&gt;, making them ineligible to vote in future presidential or parliamentary elections. Names can be restored to the register by submitting an application with an official reason for missing the election. Acceptable reasons include giving birth, illness, and being overseas. A fee of $50 is charged to anyone with invalid reasons for their abstention.&lt;/p&gt;
&lt;h2&gt;Thailand&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 69.6 million&lt;/p&gt;

&lt;p&gt;Compulsory voting in Thailand is not enforced. But how far does a person’s vote go in Thailand? Since a coup d'etat in 2014, Thailand has been ruled by a military junta called the National Council for Peace and Order. A March 2019 House of Representatives election organized by NCPO drew &lt;a href="https://www.hrw.org/news/2019/03/19/thailand-structural-flaws-subvert-election"&gt;criticism from Human Rights Watch&lt;/a&gt; for failing to give voters the right to freely and fairly choose their new government leaders.&lt;/p&gt;
&lt;h2&gt;Uruguay&lt;/h2&gt;
&lt;p&gt;- Mandatory voting age: 18&lt;br&gt;
- Population: 3.5 million&lt;/p&gt;

&lt;p&gt;Compulsory voting—introduced in Uruguay in 1934 but &lt;a href="https://www.idea.int/data-tools/data/voter-turnout/compulsory-voting"&gt;not put into effect until 1970&lt;/a&gt;—is enforced through sanctions such as fines. &lt;a href="https://www.electionguide.org/countries/id/228/"&gt;Average voter turnout&lt;/a&gt; in elections spanning nearly 20 years is 90%. More than 2.7 million people are eligible to vote in the upcoming &lt;a href="https://www.as-coa.org/articles/explainer-uruguays-2019-presidential-election"&gt;Uruguayan general election on Oct. 27&lt;/a&gt;.&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;You may also like: &lt;/strong&gt;&lt;a href="https://thestacker.com/stories/2728/elections-around-world-watch-2019"&gt;Elections around the world to watch in 2019&lt;/a&gt;&lt;/p&gt;

  &lt;/article&gt;

Written by: Lauren Liebhaber
Description: Stacker used the CIA World Factbook to compile a list of the 22 countries which require eligible citizens to vote. The populations (as of 2019) of each country are also included, via the United Nations World Population Prospects. Although it is a relatively small number of countries who have endeavored to systematize compulsory voting, each one takes a different approach in doing so. The nuances of each system—fines vs. no fines, manual vs. automatic voter registration, varying degrees of additional civil sanctions—serve as notes for other democratic nations moving toward mandatory voting.





Countries that have mandatory voting
Mandatory voting, also referred to as compulsory voting, is a concept born&nbsp;from a fundamental belief that political participation is an essential, non-negotiable aspect of democracy—a civic duty, and not just a right. In countries around the world, compulsory voting has been written into laws and constitutions, into the bedrock of societies where it becomes an expectation rather than an option.

This idea is not new. The first country to implement compulsory voting was Belgium in 1893. Since then, countries have been adapting and iterating this system in myriad ways—particularly in the area of enforcement. In some, nonvoters are fined. In others, the sanctions are more severe like holds on salary or voter disenfranchisement. Stricter yet are the countries who employ both. Then there are democracies where mandatory voting is legal but not enforced, or where sanctions are not delivered consistently. Though the concept is not new, it is far from perfect and far from agreed upon.

In a democracy, the government is meant to represent the will of its constituents. Proponents say that compulsory voting, which mandates that each eligible person cast a vote, is the best way to derive a truly representative government. With mandatory voting, more time and energy can be spent focusing on issues that matter most to the electorate while fewer resources are spent convincing people to exercise their right to vote. Advocates also hope that if everyone is required to vote, people will educate themselves on candidates and their policies.

There is a reason—several, in fact—that not every democratic government (including the United States) has adopted compulsory voting. One of the biggest arguments against mandatory voting is the inherent contradiction to democracy in forcing people to vote. Abstention, for some, is an important right. Another major consideration is the increased risk of donkey votes, when the voter ranks each candidate in the order that they have appeared on the ballot paper or apathetic votes from people who are uninformed and are only there to fulfill a civic duty.

An illustration of that point is in Rio de Janeiro, where&nbsp;41.5% of people who voted in the 2016 mayoral elections&nbsp;submitted a blank or annulled ballot. This trend was observed throughout Brazil, the largest country that implements a compulsory voting system.

Stacker used the CIA World Factbook to compile a list of the 22 countries which require eligible citizens to vote. The populations (as of 2019) of each country are also included, via the United Nations World Population Prospects. Although it is a relatively small number of countries who have endeavored to systematize compulsory voting, each one takes a different approach in doing so. The nuances of each system—fines vs. no fines, manual vs. automatic voter registration, varying degrees of additional civil sanctions—serve as notes for other democratic nations mulling over the idea of mandatory voting.

Keep reading to learn which countries practice compulsory voting, which actively enforce it, and how.

Argentina
- Mandatory voting age: 18
- Population: 44.8 million

Voting is compulsory for all Argentine citizens, but sanctions for nonvoters are rarely and inconsistently enforced. Argentina has one of the oldest mandatory voting systems, with compulsory voting laws introduced in 1912.
Australia
- Mandatory voting age: 18
- Population: 25.2 million

Compulsory voting was introduced in Australia in 1924 in response to low voter turnout in the 1922 federal elections. Anyone who fails to vote in a federal election without a valid reason is required to pay a $20 fine. More than&nbsp;96% of eligible voters in Australia&nbsp;are registered and voter turnout has never dropped below 90%.
Belgium
- Mandatory voting age: 18
- Population: 11.5 million

Belgium’s compulsory voting system, introduced in 1893 for men and 1948 for women, is the oldest in the world. Voters who do not present themselves on election day may be subject to fines. Failure to vote four times over the course of 15 years results in a 10-year voter disenfranchisement and employment restrictions.
Bolivia
- Mandatory voting age: 18
- Population: 11.5 million

Bolivia adopted a compulsory voting system in 1952 along with strict enforcement methods. Voters are given cards as proof of participation. Inability to produce this card during the three months following an election prevents voters from receiving their salaries from the bank.
Brazil
- Mandatory voting age: 18
- Population: 211.1 million

In Brazil, the largest country with a compulsory voting system, voting is mandatory for all literate adults between the ages of 18 and 70&nbsp;and optional for those over 70. While voters are required to show up to the polls, they may annul their votes by submitting blank ballots or by writing names of people who are not officially on the ballot. Brazil’s fines for nonvoters are relatively small ($1.50), but the additional sanctions are more severe: Nonvoters may face difficulties obtaining passports, loans, jobs, and even salaries from current employers.
Democratic Republic of the Congo
- Mandatory voting age: 18
- Population: 86.8 million

Voting in the Democratic Republic of the Congo can be a challenging, dangerous, and opaque process. Rebel violence, faulty voting machines, and a lack of transparency about voter registration made voting in the 2018 elections extremely difficult for DRC citizens. Perhaps for these reasons, compulsory voting in the Democratic Republic of the Congo is not enforced.
Costa Rica
- Mandatory voting age: 18
- Population: 5.0 million

While voting is legally required in Costa Rica, there are no fines or penalties in place for nonvoters. Voter turnout in the 2018 presidential election was 66%.
Dominican Republic
- Mandatory voting age: 18
- Population: 10.7 million

In the Dominican Republic’s constitution, voting is outlined as a right. Nevertheless, that right does not apply to everyone equally. Military members and national police officers are not permitted to vote, while all married persons—even if they are younger than the mandatory voting age—can exercise this right. Although voting is compulsory, there are no penalties for nonvoters.
Ecuador
- Mandatory voting age: 18
- Population: 17.4 million

Mandatory voting, written into Ecuador’s constitution and electoral laws, was instituted in 1936. Voting is compulsory for literate Ecuadorians between the ages of 18 and 65. Fines for nonvoters are calculated as 10% of the basic salary, similar to a monthly minimum wage. In 2017, for instance, nonvoters were fined $37.50.
Egypt
- Mandatory voting age: 18
- Population: 100.4 million

Mandatory voting in Egypt is enforced for all eligible voters through fines. But fines aren’t the biggest problem voters face. Egypt’s 2018 presidential election drew harsh criticism from groups like Human Rights Watch for distorting the democratic process into something that more closely resembles a dictatorship. Incumbent President Abdel Fattah el-Sisi won with 97% of the vote.
Greece
- Mandatory voting age: 18
- Population: 10.5 million

Greece’s compulsory voting system was instituted in 1926. Until 2000, failure to vote resulted in the inability to obtain a passport, license, or occupational license. No sanctions are currently enforced for nonvoters.
Honduras
- Mandatory voting age: 18
- Population: 9.7 million

Voting in Honduras is compulsory by law but not enforced. Voter turnout in the 2017 presidential election was 57%, keeping in line with the country’s historical voter turnout average of 55% spanning 17 years.
Lebanon
- Mandatory voting age: 21
- Population: 6.9 million

In Lebanon, gender and education disparities are a defining characteristic of the country’s compulsory voting system. Voting is mandatory for all men over the age of 21 while voting is authorized, but not required, for women 21 and older only if they have obtained at least an elementary education.
Luxembourg
- Mandatory voting age: 18
- Population: 616,000

Voting in legislative elections is mandatory for all Luxembourg nationals under the age of 75, including those who live abroad. Roughly half of Luxembourg’s total population is eligible to vote. Nonvoters are subject to fines.
Mexico
- Mandatory voting age: 18
- Population: 127.6 million

Voting in Mexico is compulsory by law but not enforced. All eligible Mexican citizens are required to obtain a voter identification card to be able to vote. Voter turnout in the 2018 presidential election was 63%.
Nauru
- Mandatory voting age: 20
- Population: 11,000

Compulsory voting began in Nauru in 1965. Nauru citizens are automatically registered in the electoral roll upon turning 20. Nonvoters must explain their absence and may be subject to additional sanctions such as fines.
Panama
- Mandatory voting age: 18
- Population: 4.2 million

While voting in Panama is legally compulsory, it is not enforced. Despite the absence of sanctions, voter turnout in the presidential election in May 2019 was 73%.
Paraguay
- Mandatory voting age: 18
- Population: 7.0 million

Paraguay transitioned to a democratic government and made voting compulsory in 1992. Voting is mandatory for all Paraguayan citizens ages 18-75. All citizens are automatically registered to vote upon turning 18. Paraguay’s peak year for voter participation was 1998 with 80.5% voter turnout.
Peru
- Mandatory voting age: 18
- Population: 32.5 million

Voting is mandatory for all citizens between the ages of 18 and 70. Fines imposed on nonvoters can range between $6 and $25. Average voter turnout in elections spanning nearly 20 years is 83%.
Singapore
- Mandatory voting age: 21
- Population: 5.8 million

Compulsory voting is strictly enforced in Singapore. Citizens who miss voting in a single election will subsequently have their names removed from the official list of registered voters, making them ineligible to vote in future presidential or parliamentary elections. Names can be restored to the register by submitting an application with an official reason for missing the election. Acceptable reasons include giving birth, illness, and being overseas. A fee of $50 is charged to anyone with invalid reasons for their abstention.
Thailand
- Mandatory voting age: 18
- Population: 69.6 million

Compulsory voting in Thailand is not enforced. But how far does a person’s vote go in Thailand? Since a coup d'etat in 2014, Thailand has been ruled by a military junta called the National Council for Peace and Order. A March 2019 House of Representatives election organized by NCPO drew criticism from Human Rights Watch for failing to give voters the right to freely and fairly choose their new government leaders.
Uruguay
- Mandatory voting age: 18
- Population: 3.5 million

Compulsory voting—introduced in Uruguay in 1934 but not put into effect until 1970—is enforced through sanctions such as fines. Average voter turnout in elections spanning nearly 20 years is 90%. More than 2.7 million people are eligible to vote in the upcoming Uruguayan general election on Oct. 27.
