</span><div data-dcnode-id="953"><span data-dcnode-id="954"><span data-dcnode-id="955"><span data-dcnode-id="965" instrument_node="">On June 22, 1970, President Richard Nixon signed an extension of the </span><b data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Voting</span></b><span data-dcnode-id="962" instrument_node=""> Rights Act of 1965 that required the </span><b data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">voting age</span></b><span data-dcnode-id="959" instrument_node=""> to be </span><b data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">18</span></b><span data-dcnode-id="956" instrument_node=""> in all federal, state, and local elections.</span></span></span></div><br data-dcnode-id="952"><p data-dcnode-id="945"><a class="lc" data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/213004" rel="nofollow" target="_blank"><span data-dcnode-id="951" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="949" instrument_node=""> </span><br data-dcnode-id="948"><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node=""> Keeping this in view,  when was the voting age reduced from 21 to 18?</span></p><p data-dcnode-id="932"><span data-dcnode-id="933"><span data-dcnode-id="934"><span data-dcnode-id="944" instrument_node="">The Sixty-first Amendment of the Constitution of India, officially known as The Constitution (Sixty-first Amendment) Act, 1988, lowered the </span><b data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">voting age</span></b><span data-dcnode-id="941" instrument_node=""> of elections to the Lok Sabha and to the Legislative Assemblies of States from </span><b data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">21 years</span></b><span data-dcnode-id="938" instrument_node=""> to </span><b data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">18 years</span></b><span data-dcnode-id="935" instrument_node="">.</span></span></span></p><p data-dcnode-id="921"><span data-dcnode-id="931" instrument_node="">Also Know,  why was the 26 amendment passed? </span><span data-dcnode-id="922"><span data-dcnode-id="923"><span data-dcnode-id="930" instrument_node="">On this date, the 26th </span><b data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Amendment</span></b><span data-dcnode-id="927" instrument_node=""> to the Constitution was </span><b data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">ratified</span></b><span data-dcnode-id="924" instrument_node="">. In the turmoil surrounding the unpopular Vietnam War, lowering the national voting age became a controversial topic. The Supreme Court upheld the legislation in a 5 to 4 vote in applying the lowered voting age to federal elections only.</span></span></span></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node=""> Also,  when was the voting age lowered to 18 in the US?</span></p><p data-dcnode-id="911"><span data-dcnode-id="918" instrument_node=""> </span><span data-dcnode-id="912"><span data-dcnode-id="913"><span data-dcnode-id="917" instrument_node="">The Twenty-sixth Amendment to the United States Constitution (Amendment XXVI) lowered the minimum voting age in the United States from 21 to 18. The United States Congress approved the amendment on March 23, </span><b data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">1971,</span></b><span data-dcnode-id="914" instrument_node=""> and sent it to the states to be ratified.</span></span></span></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Can you register to vote before you're 18?</span></p><p data-dcnode-id="890"><span data-dcnode-id="891"><span data-dcnode-id="892"><span data-dcnode-id="908" instrument_node="">Everyone eligible over the age of </span><b data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">18 can vote</span></b><span data-dcnode-id="905" instrument_node=""> and must </span><b data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">register</span></b><span data-dcnode-id="902" instrument_node="">. People aged 16 or 17 </span><b data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">can register</span></b><span data-dcnode-id="899" instrument_node=""> so </span><b data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">they can vote</span></b><span data-dcnode-id="896" instrument_node=""> immediately after their </span><b data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">18th</span></b><span data-dcnode-id="893" instrument_node=""> birthday.</span></span></span></p><span data-dcnode-id="889" instrument_node=""> </span></div><span data-dcnode-id="887" instrument_node="">

</span><p data-dcnode-id="561" style="display:inline;"></p><div data-dcnode-id="540"><span data-dcnode-id="541"><span data-dcnode-id="542"><b data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Why is 18</span></b><span data-dcnode-id="558" instrument_node=""> considered the </span><b data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">age of adulthood</span></b><span data-dcnode-id="555" instrument_node="">? Before the passage of the 26th Amendment in 1971, 21 was the minimum voting </span><b data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">age</span></b><span data-dcnode-id="552" instrument_node=""> in most states—and thus served as the </span><b data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">age of adulthood</span></b><span data-dcnode-id="549" instrument_node=""> in most areas of law. Congress lowered the nationwide voting </span><b data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">age</span></b><span data-dcnode-id="546" instrument_node=""> to </span><b data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">18</span></b><span data-dcnode-id="543" instrument_node=""> as a response to unrest and passionate debate about the Vietnam War.</span></span></span></div><p data-dcnode-id="539"></p><span data-dcnode-id="538" instrument_node="">
