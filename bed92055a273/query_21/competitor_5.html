</span><h2 data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Places that have lowered their voting age to 16</span></h2><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2071" instrument_node="">Berkeley, California – school board elections</span><br data-dcnode-id="2070"><span data-dcnode-id="2069" instrument_node="">
Greenbelt, Maryland – all local elections</span><br data-dcnode-id="2068"><span data-dcnode-id="2067" instrument_node="">
Hyattsville, Maryland – all local elections</span><br data-dcnode-id="2066"><span data-dcnode-id="2065" instrument_node="">
Oakland, California – school board elections</span><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node="">
Riverdale Park, Maryland – all local elections</span><br data-dcnode-id="2062"><span data-dcnode-id="2061" instrument_node="">
Takoma Park, Maryland – all local elections</span><br data-dcnode-id="2060"><span data-dcnode-id="2059" instrument_node="">
(Glenarden, Maryland lowered their voting age to 16 in 2016, but raised it again to 18 just over a year later.)</span></p><span data-dcnode-id="2057" instrument_node="">
</span><h2 data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Current campaigns to lower the voting age</span></h2><span data-dcnode-id="2054" instrument_node="">
</span><h3 data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Federal Level</span></h3><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2046"><span data-dcnode-id="2050" instrument_node="">Currently there is&nbsp; </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/blog/meng-house-resolution-lower-voting-age/"><span data-dcnode-id="2049" instrument_node="">a bill in the U.S. House of Representatives</span></a><span data-dcnode-id="2047" instrument_node=""> to lower the voting age to 16 for all elections.</span></p><span data-dcnode-id="2045" instrument_node="">

</span><h2 data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">States that allow 17-year-olds to vote in primaries</span></h2><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1789" instrument_node="">Some states allow 17-year-olds to vote in the </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fairvote.org/primary_voting_at_age_17%23state_by_state_map_presidential_primaries"><span data-dcnode-id="1788" instrument_node="">presidential</span></a><span data-dcnode-id="1786" instrument_node=""> or </span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fairvote.org/primary_voting_at_age_17%23state_by_state_map_congressional_elections"><span data-dcnode-id="1785" instrument_node="">congressional</span></a><span data-dcnode-id="1783" instrument_node=""> primaries or party caucuses, if turning 18 before the general election. Primaries are state elections and voter eligibility is determined by state legislation, while caucus eligibility is determined by party policy in each state. Some caucuses may allow participation to party members that are not eligible to vote and you should ask the party in your state, even if not listed here.</span></p><span data-dcnode-id="1781" instrument_node="">
