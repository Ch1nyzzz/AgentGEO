</span></p><p data-dcnode-id="4956"><span data-dcnode-id="4978" instrument_node="">Electronic Voting Machines ("EVM") are being used in Indian general and state elections to implement electronic voting in part from </span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1999_Indian_general_election" title="1999 Indian general election"><span data-dcnode-id="4977" instrument_node="">1999 general election</span></a><span data-dcnode-id="4975" instrument_node=""> and recently in </span><a data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2018_elections_in_India" title="2018 elections in India"><span data-dcnode-id="4974" instrument_node="">2018 state elections</span></a><span data-dcnode-id="4972" instrument_node=""> held in five states across India. EVMs have replaced paper ballots in the state and general (parliamentary) elections in India. There were earlier claims regarding EVMs' tamperability and security which have not been proved. After rulings of </span><a data-dcnode-id="4970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delhi_High_Court" title="Delhi High Court"><span data-dcnode-id="4971" instrument_node="">Delhi High Court</span></a><span data-dcnode-id="4969" instrument_node="">, </span><a data-dcnode-id="4967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_India" title="Supreme Court of India"><span data-dcnode-id="4968" instrument_node="">Supreme Court</span></a><span data-dcnode-id="4966" instrument_node=""> and demands from various political parties, </span><a data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election_Commission_of_India" title="Election Commission of India"><span data-dcnode-id="4965" instrument_node="">Election Commission of India</span></a><span data-dcnode-id="4963" instrument_node=""> decided to introduce EVMs with voter-verified paper audit trail (VVPAT) system. The VVPAT system was introduced in 8 of 543 parliamentary constituencies as a pilot project in </span><a data-dcnode-id="4961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Indian_general_election" title="2014 Indian general election"><span data-dcnode-id="4962" instrument_node="">2014 general election</span></a><span data-dcnode-id="4960" instrument_node="">. Voter-verified paper audit trail (VVPAT) system which enables electronic voting machines to record each vote cast by generating the EVM slip, was introduced in all 543 Lok sabha constituencies in </span><a data-dcnode-id="4958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2019_Indian_general_election" title="2019 Indian general election"><span data-dcnode-id="4959" instrument_node="">2019 Indian general election</span></a><span data-dcnode-id="4957" instrument_node="">.
</span></p><p data-dcnode-id="4928"><span data-dcnode-id="4955" instrument_node="">There are three kinds of electronic voting machines M1, M2 and M3.</span><sup class="reference" data-dcnode-id="4952" id="cite_ref-84"><a data-dcnode-id="4953" href="#cite_note-84"><span data-dcnode-id="4954" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4951" instrument_node=""> The most modern M3 EVMs, which are in current use since its introduction in 2013, allow  writing of machine code into the chips at PSU premises itself- </span><a class="mw-redirect" data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bharat_Electronics_Limited" title="Bharat Electronics Limited"><span data-dcnode-id="4950" instrument_node="">Bharat Electronics Limited</span></a><span data-dcnode-id="4948" instrument_node="">, </span><a data-dcnode-id="4946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangalore" title="Bangalore"><span data-dcnode-id="4947" instrument_node="">Bangalore</span></a><span data-dcnode-id="4945" instrument_node=""> and </span><a data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronics_Corporation_of_India_Limited" title="Electronics Corporation of India Limited"><span data-dcnode-id="4944" instrument_node="">Electronics Corporation of India Limited</span></a><span data-dcnode-id="4942" instrument_node="">, </span><a data-dcnode-id="4940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyderabad" title="Hyderabad"><span data-dcnode-id="4941" instrument_node="">Hyderabad</span></a><span data-dcnode-id="4939" instrument_node="">. Election Commission of India introduced EVM Tracking Software (ETS) as a modern inventory management system where the identity and physical presence of all EVMS/ </span><a data-dcnode-id="4937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter-verified_paper_audit_trail" title="Voter-verified paper audit trail"><span data-dcnode-id="4938" instrument_node="">VVPATs</span></a><span data-dcnode-id="4936" instrument_node=""> is tracked on real time basis. M3 EVMs has digital verification system coded into each machine which is necessary to establish contact between its two component units. There are several layers of seals to ensure it is tamper-proof. Indian EVMs are stand-alone non-networked machines.</span><sup class="reference" data-dcnode-id="4933" id="cite_ref-85"><a data-dcnode-id="4934" href="#cite_note-85"><span data-dcnode-id="4935" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="4930" id="cite_ref-86"><a data-dcnode-id="4931" href="#cite_note-86"><span data-dcnode-id="4932" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4929" instrument_node="">
</span></p><span data-dcnode-id="4927" instrument_node="">
</span><h3 data-dcnode-id="4916"><span data-dcnode-id="4926" id="India.2C_issues"></span><span class="mw-headline" data-dcnode-id="4924" id="India,_issues"><span data-dcnode-id="4925" instrument_node="">India, issues</span></span><span class="mw-editsection" data-dcnode-id="4917"><span class="mw-editsection-bracket" data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">[</span></span><a data-dcnode-id="4920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D17" title="Edit section: India, issues"><span data-dcnode-id="4921" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4915" instrument_node="">
</span><p data-dcnode-id="4903"><span data-dcnode-id="4914" instrument_node="">Omesh Saigal, an </span><a data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Institutes_of_Technology" title="Indian Institutes of Technology"><span data-dcnode-id="4913" instrument_node="">IIT</span></a><span data-dcnode-id="4911" instrument_node=""> alumnus and </span><a data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Administrative_Service" title="Indian Administrative Service"><span data-dcnode-id="4910" instrument_node="">IAS</span></a><span data-dcnode-id="4908" instrument_node=""> officer, demonstrated that the 2009 elections in India when Congress Party of India came back to power might be rigged. This forced the election commission to review the current EVMs.</span><sup class="reference" data-dcnode-id="4905" id="cite_ref-87"><a data-dcnode-id="4906" href="#cite_note-87"><span data-dcnode-id="4907" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4904" instrument_node="">
</span></p><span data-dcnode-id="4902" instrument_node="">
</span><h3 data-dcnode-id="4892"><span class="mw-headline" data-dcnode-id="4900" id="Background"><span data-dcnode-id="4901" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="4893"><span class="mw-editsection-bracket" data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">[</span></span><a data-dcnode-id="4896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D18" title="Edit section: Background"><span data-dcnode-id="4897" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4891" instrument_node="">
</span><p data-dcnode-id="4869"><span data-dcnode-id="4890" instrument_node="">From the initial introduction in 1982, to the country-wide use of EVM in 2004, the </span><a data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election_Commission_of_India" title="Election Commission of India"><span data-dcnode-id="4889" instrument_node="">Election Commission of India</span></a><span data-dcnode-id="4887" instrument_node=""> took long and measured steps spanning over a period of nearly two decades, in the matter of electronic voting. In the meanwhile, general elections to various </span><a class="mw-redirect" data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vidhan_Sabha" title="Vidhan Sabha"><span data-dcnode-id="4886" instrument_node="">legislative assemblies</span></a><span data-dcnode-id="4884" instrument_node="">, and numerous by-elections and two general elections to the </span><a data-dcnode-id="4882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lok_Sabha" title="Lok Sabha"><span data-dcnode-id="4883" instrument_node="">Lok Sabha</span></a><span data-dcnode-id="4881" instrument_node=""> have been conducted using EVMs at all polling stations. The tamper-proof technological soundness of the EVM has been endorsed by a technical experts subcommittee appointed at the initiative of the Parliamentary Committee on Electoral Reforms in 1990. This experts committee (1990) was headed by Prof. S. Sampath, then Chairman RAC, Defence Research and Development Organisation, with Prof. P. V. Indiresan, then with </span><a data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IIT_Delhi" title="IIT Delhi"><span data-dcnode-id="4880" instrument_node="">IIT Delhi</span></a><span data-dcnode-id="4878" instrument_node="">, and Dr C. Rao Kasarabada, then Director Electronic Research and Development Center, Trivandrum as members. Subsequently, the Commission has also been consulting a group of technical experts comprising Prof. P. V. Indiresan (who was also part of the earlier committee referred to above) and Prof. D. T. Sahani and Prof A. K. Agarwal both of IIT Delhi, regularly, on all EVM related technical issues.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4871" style="white-space:nowrap;"><span data-dcnode-id="4877" instrument_node="">[</span><i data-dcnode-id="4873"><a data-dcnode-id="4874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4875" title="This claim needs references to reliable sources. (March 2011)"><span data-dcnode-id="4876" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4872" instrument_node="">]</span></sup><span data-dcnode-id="4870" instrument_node="">
</span></p><p data-dcnode-id="4856"><span data-dcnode-id="4868" instrument_node="">The Commission has in place elaborate administrative measures and procedural </span><a class="mw-redirect" data-dcnode-id="4866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Checks_and_balances" title="Checks and balances"><span data-dcnode-id="4867" instrument_node="">checks and balances</span></a><span data-dcnode-id="4865" instrument_node=""> aimed at total transparency and prevention of any possible misuse or procedural lapses. These measures include rigorous pre-election checking of each EVM by the technicians, two level randomization with the involvement of political parties, candidates, their agents, for the random allotment of the EVMs to various constituencies and subsequently to various polling stations, preparation of the EVMs for elections in the presence of the candidates/their agents, and the Election Observers, provision for various thread seal and paper seal protection against any unauthorized access to the EVMs after preparation, mock poll in the presence of polling agents and mock poll certification system before the commencement of poll, post poll sealing  and strong room protection, randomization of counting staff, micro observers at the counting tables, and so on.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4858" style="white-space:nowrap;"><span data-dcnode-id="4864" instrument_node="">[</span><i data-dcnode-id="4860"><a data-dcnode-id="4861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4862" title="This claim needs references to reliable sources. (March 2011)"><span data-dcnode-id="4863" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4859" instrument_node="">]</span></sup><span data-dcnode-id="4857" instrument_node="">
</span></p><p data-dcnode-id="4815"><span data-dcnode-id="4855" instrument_node="">The Election Commission of India is amply satisfied about the non-tamperability and the fool-proof working of the EVMs. The Commission's confidence in the efficacy of the EVMs has been fortified by the judgments of various courts and the views of technical experts. The </span><a data-dcnode-id="4853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka_High_Court" title="Karnataka High Court"><span data-dcnode-id="4854" instrument_node="">Karnataka High Court</span></a><span data-dcnode-id="4852" instrument_node=""> has hailed the EVM as ‘a national pride’ (judgment dated 5.2.2004 in Michael B. Fernandes v. C. K. Jaffer Sharrief and others in E.P. No 29 of 1999). The Election commission issued a press brief after the 2009 Indian general election, clarifying the same</span><sup class="reference" data-dcnode-id="4849" id="cite_ref-88"><a data-dcnode-id="4850" href="#cite_note-88"><span data-dcnode-id="4851" instrument_node="">[88]</span></a></sup><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4842" style="white-space:nowrap;"><span data-dcnode-id="4848" instrument_node="">[</span><i data-dcnode-id="4844"><a data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4846" title="This claim needs references to reliable sources. (March 2011)"><span data-dcnode-id="4847" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4843" instrument_node="">]</span></sup><span data-dcnode-id="4841" instrument_node=""> On 8 October 2013, Supreme Court of India delivered its verdict on Dr. </span><a data-dcnode-id="4839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subramanian_Swamy" title="Subramanian Swamy"><span data-dcnode-id="4840" instrument_node="">Subramanian Swamy</span></a><span data-dcnode-id="4838" instrument_node="">'s </span><a class="mw-redirect" data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_interest_litigation" title="Public interest litigation"><span data-dcnode-id="4837" instrument_node="">PIL</span></a><span data-dcnode-id="4835" instrument_node="">, that the Election Commission of India will use VVPATs along with EVMs in a phased manner and the full completion should be achieved by </span><a data-dcnode-id="4833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2019_Indian_general_election" title="2019 Indian general election"><span data-dcnode-id="4834" instrument_node="">2019 Indian general election</span></a><span data-dcnode-id="4832" instrument_node="">.</span><sup class="reference" data-dcnode-id="4829" id="cite_ref-89"><a data-dcnode-id="4830" href="#cite_note-89"><span data-dcnode-id="4831" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="4826" id="cite_ref-90"><a data-dcnode-id="4827" href="#cite_note-90"><span data-dcnode-id="4828" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="4823" id="cite_ref-91"><a data-dcnode-id="4824" href="#cite_note-91"><span data-dcnode-id="4825" instrument_node="">[91]</span></a></sup><sup class="reference" data-dcnode-id="4820" id="cite_ref-92"><a data-dcnode-id="4821" href="#cite_note-92"><span data-dcnode-id="4822" instrument_node="">[92]</span></a></sup><sup class="reference" data-dcnode-id="4817" id="cite_ref-93"><a data-dcnode-id="4818" href="#cite_note-93"><span data-dcnode-id="4819" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4816" instrument_node="">
</span></p><span data-dcnode-id="4814" instrument_node="">
</span><h3 data-dcnode-id="4804"><span class="mw-headline" data-dcnode-id="4812" id="Internet_voting_2"><span data-dcnode-id="4813" instrument_node="">Internet voting</span></span><span class="mw-editsection" data-dcnode-id="4805"><span class="mw-editsection-bracket" data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">[</span></span><a data-dcnode-id="4808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D19" title="Edit section: Internet voting"><span data-dcnode-id="4809" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4791"><span data-dcnode-id="4802" instrument_node="">In April 2011 </span><a data-dcnode-id="4800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gujarat" title="Gujarat"><span data-dcnode-id="4801" instrument_node="">Gujarat</span></a><span data-dcnode-id="4799" instrument_node=""> became the first Indian state to experiment with Internet voting.</span><sup class="reference" data-dcnode-id="4796" id="cite_ref-94"><a data-dcnode-id="4797" href="#cite_note-94"><span data-dcnode-id="4798" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="4793" id="cite_ref-95"><a data-dcnode-id="4794" href="#cite_note-95"><span data-dcnode-id="4795" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4792" instrument_node="">
</span></p><span data-dcnode-id="4790" instrument_node="">
</span><h2 data-dcnode-id="4780"><span class="mw-headline" data-dcnode-id="4788" id="Ireland"><span data-dcnode-id="4789" instrument_node="">Ireland</span></span><span class="mw-editsection" data-dcnode-id="4781"><span class="mw-editsection-bracket" data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">[</span></span><a data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D20" title="Edit section: Ireland"><span data-dcnode-id="4785" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4779" instrument_node="">
</span><link data-dcnode-id="4778" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4774" role="note"><span data-dcnode-id="4777" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Ireland" title="Electronic voting in Ireland"><span data-dcnode-id="4776" instrument_node="">Electronic voting in Ireland</span></a></div><span data-dcnode-id="4773" instrument_node="">
</span><p data-dcnode-id="4752"><span data-dcnode-id="4772" instrument_node="">Ireland bought voting machines from the Dutch company </span><a data-dcnode-id="4770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nedap" title="Nedap"><span data-dcnode-id="4771" instrument_node="">Nedap</span></a><span data-dcnode-id="4769" instrument_node=""> for about €40 million. The machines were used on a 'pilot' basis in 3 constituencies for the </span><a data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2002_Irish_general_election" title="2002 Irish general election"><span data-dcnode-id="4768" instrument_node="">2002 Irish general election</span></a><span data-dcnode-id="4766" instrument_node=""> and a referendum on the </span><a data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Nice" title="Treaty of Nice"><span data-dcnode-id="4765" instrument_node="">Treaty of Nice</span></a><span data-dcnode-id="4763" instrument_node="">. Following a public report by the </span><a class="external text" data-dcnode-id="4761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cev.ie/" rel="nofollow"><span data-dcnode-id="4762" instrument_node="">Commission on Electronic Voting</span></a><span data-dcnode-id="4760" instrument_node="">, then Minister for the Environment and Local Government, </span><a data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Cullen" title="Martin Cullen"><span data-dcnode-id="4759" instrument_node="">Martin Cullen</span></a><span data-dcnode-id="4757" instrument_node=""> again delayed the use of the machines </span><sup class="reference" data-dcnode-id="4754" id="cite_ref-Ref_w_96-0"><a data-dcnode-id="4755" href="#cite_note-Ref_w-96"><span data-dcnode-id="4756" instrument_node="">[96]</span></a></sup><span data-dcnode-id="4753" instrument_node="">
</span></p><p data-dcnode-id="4735"><span data-dcnode-id="4751" instrument_node="">On 23 April 2009, the Minister for the Environment </span><a data-dcnode-id="4749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Gormley" title="John Gormley"><span data-dcnode-id="4750" instrument_node="">John Gormley</span></a><span data-dcnode-id="4748" instrument_node=""> announced that the electronic voting system was to be scrapped by an as yet undetermined method</span><sup class="noprint Inline-Template" data-dcnode-id="4741" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="4747" instrument_node="">[</span><i data-dcnode-id="4743"><a data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="4745" title="The text near this tag may need clarification or removal of jargon. (February 2017)"><span data-dcnode-id="4746" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="4742" instrument_node="">]</span></sup><span data-dcnode-id="4740" instrument_node="">, due to cost and the public's dissatisfaction with the current system.</span><sup class="reference" data-dcnode-id="4737" id="cite_ref-Ref_x_97-0"><a data-dcnode-id="4738" href="#cite_note-Ref_x-97"><span data-dcnode-id="4739" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4736" instrument_node="">
</span></p><p data-dcnode-id="4719"><span data-dcnode-id="4734" instrument_node="">On 6 October 2010, the </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taoiseach" title="Taoiseach"><span data-dcnode-id="4733" instrument_node="">Taoiseach</span></a><span data-dcnode-id="4731" instrument_node=""> </span><a data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brian_Cowen" title="Brian Cowen"><span data-dcnode-id="4730" instrument_node="">Brian Cowen</span></a><span data-dcnode-id="4728" instrument_node=""> said that the 7,000 machines would not be used for voting and would be disposed of.</span><sup class="reference" data-dcnode-id="4725" id="cite_ref-IT_06102010_98-0"><a data-dcnode-id="4726" href="#cite_note-IT_06102010-98"><span data-dcnode-id="4727" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4724" instrument_node=""> As of October 2010, the total cost of the electronic voting project has reached €54.6 million, including €3 million spent on storing the machines over the previous five years.</span><sup class="reference" data-dcnode-id="4721" id="cite_ref-IT_06102010_98-1"><a data-dcnode-id="4722" href="#cite_note-IT_06102010-98"><span data-dcnode-id="4723" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4720" instrument_node="">
</span></p><span data-dcnode-id="4718" instrument_node="">
</span><h2 data-dcnode-id="4708"><span class="mw-headline" data-dcnode-id="4716" id="Italy"><span data-dcnode-id="4717" instrument_node="">Italy</span></span><span class="mw-editsection" data-dcnode-id="4709"><span class="mw-editsection-bracket" data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">[</span></span><a data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D21" title="Edit section: Italy"><span data-dcnode-id="4713" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4707" instrument_node="">
</span><p data-dcnode-id="4701"><span data-dcnode-id="4706" instrument_node="">On 9 and 10 April 2006 the Italian municipality of Cremona used Nedap Voting machines in the national elections. The pilot involved 3000 electors and 4 polling stations were equipped with Nedap systems. The electoral participation was very high and the pilot was successful.</span><sup class="reference" data-dcnode-id="4703" id="cite_ref-Ref_y_99-0"><a data-dcnode-id="4704" href="#cite_note-Ref_y-99"><span data-dcnode-id="4705" instrument_node="">[99]</span></a></sup><span data-dcnode-id="4702" instrument_node="">
</span></p><p data-dcnode-id="4691"><span data-dcnode-id="4700" instrument_node="">In the same elections (April 2006) the Ministry of New Technologies in cooperation with two big American companies organized a pilot only concerning e-counting. The experiment involved four regions and it cost 34 million euro.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4693" style="white-space:nowrap;"><span data-dcnode-id="4699" instrument_node="">[</span><i data-dcnode-id="4695"><a data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4697" title="This claim needs references to reliable sources. (September 2007)"><span data-dcnode-id="4698" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4694" instrument_node="">]</span></sup><span data-dcnode-id="4692" instrument_node="">
</span></p><span data-dcnode-id="4690" instrument_node="">
</span><h2 data-dcnode-id="4680"><span class="mw-headline" data-dcnode-id="4688" id="Kazakhstan"><span data-dcnode-id="4689" instrument_node="">Kazakhstan</span></span><span class="mw-editsection" data-dcnode-id="4681"><span class="mw-editsection-bracket" data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">[</span></span><a data-dcnode-id="4684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D22" title="Edit section: Kazakhstan"><span data-dcnode-id="4685" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4679" instrument_node="">
</span><link data-dcnode-id="4678" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4674" role="note"><span data-dcnode-id="4677" instrument_node="">Main article: </span><a data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_in_Kazakhstan" title="Elections in Kazakhstan"><span data-dcnode-id="4676" instrument_node="">Elections in Kazakhstan</span></a></div><span data-dcnode-id="4673" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4672" instrument_node="">In 2003, the </span><a data-dcnode-id="4670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kazakhstan" title="Kazakhstan"><span data-dcnode-id="4671" instrument_node="">Kazakh</span></a><span data-dcnode-id="4669" instrument_node=""> Central Election Commission entered into a partnership with the United Institute of Informatics Problems of the National Academy of Sciences of </span><a data-dcnode-id="4667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="4668" instrument_node="">Belarus</span></a><span data-dcnode-id="4666" instrument_node=""> to develop an electronic voting system.  This system, known as the Sailau Electronic Voting System (АИС «Сайлау»), saw its first use in Kazakhstan's 2004 Parliamentary elections.  The final form of the system, as used in the presidential election of 2005 and the parliamentary election of 2007, has been described as using "indirect recording electronic voting." In this case, voters signing into use the Sailau system were issued </span><a class="mw-redirect" data-dcnode-id="4664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smart_cards" title="Smart cards"><span data-dcnode-id="4665" instrument_node="">smart cards</span></a><span data-dcnode-id="4663" instrument_node=""> holding the ballot to be voted.  Voters then carried these cards to a voting booth, where they used the Sailau touch-screen ballot marking device to record their votes on the card.  Finally, the voters returned the ballot cards to the sign-in table where the ballot was read from the card into the electronic "ballot box" before the card was erased for reuse by another voter.</span><sup class="reference" data-dcnode-id="4660" id="cite_ref-100"><a data-dcnode-id="4661" href="#cite_note-100"><span data-dcnode-id="4662" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4659" instrument_node="">
</span></p><p data-dcnode-id="4652"><span data-dcnode-id="4657" instrument_node="">On Nov. 16, 2011, Kuandyk Turgankulov, head of the Kazakh Central Election Commission, said that use of the Sailau system would be discontinued because voters prefer paper, the political parties do not trust it, and the lack of funds required to update the system.</span><sup class="reference" data-dcnode-id="4654" id="cite_ref-101"><a data-dcnode-id="4655" href="#cite_note-101"><span data-dcnode-id="4656" instrument_node="">[101]</span></a></sup><span data-dcnode-id="4653" instrument_node="">
</span></p><span data-dcnode-id="4651" instrument_node="">
</span><h2 data-dcnode-id="4641"><span class="mw-headline" data-dcnode-id="4649" id="Lithuania"><span data-dcnode-id="4650" instrument_node="">Lithuania</span></span><span class="mw-editsection" data-dcnode-id="4642"><span class="mw-editsection-bracket" data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">[</span></span><a data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D23" title="Edit section: Lithuania"><span data-dcnode-id="4646" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4640" instrument_node="">
</span><p data-dcnode-id="4634"><span data-dcnode-id="4639" instrument_node="">Lithuania is planning national online voting, with a target of 20% of votes cast online by 2020.</span><sup class="reference" data-dcnode-id="4636" id="cite_ref-102"><a data-dcnode-id="4637" href="#cite_note-102"><span data-dcnode-id="4638" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4635" instrument_node="">
</span></p><p data-dcnode-id="4625"><span data-dcnode-id="4633" instrument_node="">The Lithuanian President </span><a data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dalia_Grybauskait%25C4%2597" title="Dalia Grybauskaitė"><span data-dcnode-id="4632" instrument_node="">Dalia Grybauskaitė</span></a><span data-dcnode-id="4630" instrument_node=""> is quoted however as stating concerns that online voting would not ensure confidentiality and security.</span><sup class="reference" data-dcnode-id="4627" id="cite_ref-103"><a data-dcnode-id="4628" href="#cite_note-103"><span data-dcnode-id="4629" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4626" instrument_node="">
</span></p><span data-dcnode-id="4624" instrument_node="">
</span><h2 data-dcnode-id="4614"><span class="mw-headline" data-dcnode-id="4622" id="Malaysia"><span data-dcnode-id="4623" instrument_node="">Malaysia</span></span><span class="mw-editsection" data-dcnode-id="4615"><span class="mw-editsection-bracket" data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">[</span></span><a data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D24" title="Edit section: Malaysia"><span data-dcnode-id="4619" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4613" instrument_node="">
</span><p data-dcnode-id="4601"><span data-dcnode-id="4612" instrument_node="">Electronic voting had been used in </span><a data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2018_People%2527s_Justice_Party_leadership_election" title="2018 People's Justice Party leadership election"><span data-dcnode-id="4611" instrument_node="">2018 People's Justice Party leadership election</span></a><span data-dcnode-id="4609" instrument_node="">, which is the party election for the country's largest party. It had suffer many technical problems and many polls had been postponed due to the poor system.</span><sup class="reference" data-dcnode-id="4606" id="cite_ref-104"><a data-dcnode-id="4607" href="#cite_note-104"><span data-dcnode-id="4608" instrument_node="">[104]</span></a></sup><sup class="reference" data-dcnode-id="4603" id="cite_ref-105"><a data-dcnode-id="4604" href="#cite_note-105"><span data-dcnode-id="4605" instrument_node="">[105]</span></a></sup><span data-dcnode-id="4602" instrument_node="">
</span></p><span data-dcnode-id="4600" instrument_node="">
</span><h2 data-dcnode-id="4590"><span class="mw-headline" data-dcnode-id="4598" id="Namibia"><span data-dcnode-id="4599" instrument_node="">Namibia</span></span><span class="mw-editsection" data-dcnode-id="4591"><span class="mw-editsection-bracket" data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">[</span></span><a data-dcnode-id="4594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D25" title="Edit section: Namibia"><span data-dcnode-id="4595" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4589" instrument_node="">
</span><p data-dcnode-id="4580"><span data-dcnode-id="4588" instrument_node="">In 2014, Namibia became the first African nation to use electronic voting machines.</span><sup class="reference" data-dcnode-id="4585" id="cite_ref-106"><a data-dcnode-id="4586" href="#cite_note-106"><span data-dcnode-id="4587" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4584" instrument_node=""> Electronic voting machines (EVMs) used in the election were provided by </span><a class="mw-redirect" data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bharat_Electronics_Limited" title="Bharat Electronics Limited"><span data-dcnode-id="4583" instrument_node="">Bharat Electronics Limited</span></a><span data-dcnode-id="4581" instrument_node="">, an Indian state owned company.
</span></p><span data-dcnode-id="4579" instrument_node="">
</span><h2 data-dcnode-id="4569"><span class="mw-headline" data-dcnode-id="4577" id="Netherlands"><span data-dcnode-id="4578" instrument_node="">Netherlands</span></span><span class="mw-editsection" data-dcnode-id="4570"><span class="mw-editsection-bracket" data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">[</span></span><a data-dcnode-id="4573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D26" title="Edit section: Netherlands"><span data-dcnode-id="4574" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4568" instrument_node="">
</span><link data-dcnode-id="4567" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4563" role="note"><span data-dcnode-id="4566" instrument_node="">See also: </span><a data-dcnode-id="4564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2006_Dutch_general_election%23Voting_machine_controversy" title="2006 Dutch general election"><span data-dcnode-id="4565" instrument_node="">2006 Dutch general election: Voting machine controversy</span></a></div><span data-dcnode-id="4562" instrument_node="">
</span><p data-dcnode-id="4557"><span data-dcnode-id="4561" instrument_node="">From the late 1990s until 2007, voting machines were used extensively in elections. Most areas in the </span><a data-dcnode-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="4560" instrument_node="">Netherlands</span></a><span data-dcnode-id="4558" instrument_node=""> used electronic voting in polling places. After security problems with the machines were widely publicized, they were banned in 2007.
</span></p><p data-dcnode-id="4545"><span data-dcnode-id="4556" instrument_node="">The most widely used voting machines were produced by the company </span><a data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nedap" title="Nedap"><span data-dcnode-id="4555" instrument_node="">Nedap</span></a><span data-dcnode-id="4553" instrument_node="">.</span><sup class="reference" data-dcnode-id="4550" id="cite_ref-Ref_z_107-0"><a data-dcnode-id="4551" href="#cite_note-Ref_z-107"><span data-dcnode-id="4552" instrument_node="">[107]</span></a></sup><span data-dcnode-id="4549" instrument_node=""> In the 2006 parliamentary elections, 21,000 persons used the </span><a data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rijnland_Internet_Election_System" title="Rijnland Internet Election System"><span data-dcnode-id="4548" instrument_node="">Rijnland Internet Election System</span></a><span data-dcnode-id="4546" instrument_node=""> to cast their vote.
</span></p><p data-dcnode-id="4535"><span data-dcnode-id="4544" instrument_node="">On 5 October 2006 the group "Wij vertrouwen stemcomputers niet" ("We do not trust voting machines") demonstrated on Dutch television how the Nedap ES3B machines could be manipulated in five minutes. The tampering of the software would not be recognisable by voters or election officials.</span><sup class="reference" data-dcnode-id="4541" id="cite_ref-wijvertrouwenstemcomputersniet.nl_62-1"><a data-dcnode-id="4542" href="#cite_note-wijvertrouwenstemcomputersniet.nl-62"><span data-dcnode-id="4543" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4540" instrument_node="">
</span><sup class="reference" data-dcnode-id="4537" id="cite_ref-Ref_ab_108-0"><a data-dcnode-id="4538" href="#cite_note-Ref_ab-108"><span data-dcnode-id="4539" instrument_node="">[108]</span></a></sup><span data-dcnode-id="4536" instrument_node="">
</span></p><p data-dcnode-id="4501"><span data-dcnode-id="4534" instrument_node="">On October 30, 2006, the </span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_the_Interior_and_Kingdom_Relations" title="Ministry of the Interior and Kingdom Relations"><span data-dcnode-id="4533" instrument_node="">Dutch Minister of the Interior</span></a><span data-dcnode-id="4531" instrument_node=""> withdrew the license of 1187 voting machines from manufacturer Sdu NV, about 10% of the total number to be used, because it was proven by the </span><a data-dcnode-id="4529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Intelligence_and_Security_Service" title="General Intelligence and Security Service"><span data-dcnode-id="4530" instrument_node="">General Intelligence and Security Service</span></a><span data-dcnode-id="4528" instrument_node=""> that one could eavesdrop on voting from up to 40 meters using </span><a data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Van_Eck_phreaking" title="Van Eck phreaking"><span data-dcnode-id="4527" instrument_node="">Van Eck phreaking</span></a><span data-dcnode-id="4525" instrument_node="">.</span><sup class="reference" data-dcnode-id="4522" id="cite_ref-109"><a data-dcnode-id="4523" href="#cite_note-109"><span data-dcnode-id="4524" instrument_node="">[109]</span></a></sup><sup class="reference" data-dcnode-id="4519" id="cite_ref-Ref_ae_110-0"><a data-dcnode-id="4520" href="#cite_note-Ref_ae-110"><span data-dcnode-id="4521" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4518" instrument_node=""> National elections are to be held 24 days after this decision. The decision was forced by the Dutch </span><a class="mw-redirect" data-dcnode-id="4516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grass_roots" title="Grass roots"><span data-dcnode-id="4517" instrument_node="">grass roots</span></a><span data-dcnode-id="4515" instrument_node=""> organisation </span><i data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">Wij vertrouwen stemcomputers niet</span></i><sup class="reference" data-dcnode-id="4510" id="cite_ref-111"><a data-dcnode-id="4511" href="#cite_note-111"><span data-dcnode-id="4512" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4509" instrument_node=""> ("We do not trust voting computers").</span><sup class="reference" data-dcnode-id="4506" id="cite_ref-112"><a data-dcnode-id="4507" href="#cite_note-112"><span data-dcnode-id="4508" instrument_node="">[112]</span></a></sup><sup class="reference" data-dcnode-id="4503" id="cite_ref-113"><a data-dcnode-id="4504" href="#cite_note-113"><span data-dcnode-id="4505" instrument_node="">[113]</span></a></sup><span data-dcnode-id="4502" instrument_node="">
</span></p><p data-dcnode-id="4474"><span data-dcnode-id="4500" instrument_node="">Apparently there was a case of an election official misinforming voters of when their vote is recorded and later recording it himself in municipality elections in </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landerd" title="Landerd"><span data-dcnode-id="4499" instrument_node="">Landerd</span></a><span data-dcnode-id="4497" instrument_node="">, Netherlands in 2006. A candidate was also an election official and received the unusual number of 181 votes in the polling place where he was working. In the other three polling places combined he received only 11 votes.</span><sup class="reference" data-dcnode-id="4494" id="cite_ref-Ref_ac_114-0"><a data-dcnode-id="4495" href="#cite_note-Ref_ac-114"><span data-dcnode-id="4496" instrument_node="">[114]</span></a></sup><span data-dcnode-id="4493" instrument_node=""> Only </span><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Circumstantial_evidence" title="Circumstantial evidence"><span data-dcnode-id="4492" instrument_node="">circumstantial evidence</span></a><span data-dcnode-id="4490" instrument_node=""> could be found, because the voting machine was a </span><a data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DRE_voting_machine" title="DRE voting machine"><span data-dcnode-id="4489" instrument_node="">direct-recording electronic voting machine</span></a><span data-dcnode-id="4487" instrument_node="">; in a poll by a local newspaper the results were totally different. The case is still</span><sup class="noprint Inline-Template" data-dcnode-id="4480" style="white-space:nowrap;"><span data-dcnode-id="4486" instrument_node="">[</span><i data-dcnode-id="4482"><a data-dcnode-id="4483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="4484" title="The time period mentioned near this tag is ambiguous. (February 2017)"><span data-dcnode-id="4485" instrument_node="">when?</span></span></a></i><span data-dcnode-id="4481" instrument_node="">]</span></sup><span data-dcnode-id="4479" instrument_node=""> under prosecution.</span><sup class="reference" data-dcnode-id="4476" id="cite_ref-Ref_ad_115-0"><a data-dcnode-id="4477" href="#cite_note-Ref_ad-115"><span data-dcnode-id="4478" instrument_node="">[115]</span></a></sup><span data-dcnode-id="4475" instrument_node="">
</span></p><p data-dcnode-id="4450"><span data-dcnode-id="4473" instrument_node="">In September 2007 a committee chaired by </span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frits_Korthals_Altes" title="Frits Korthals Altes"><span data-dcnode-id="4472" instrument_node="">Korthals Altes</span></a><span data-dcnode-id="4470" instrument_node=""> reported to the government that it would be better to return to paper voting. The deputy minister for the interior </span><a class="mw-redirect" data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ank_Bijleveld-Schouten" title="Ank Bijleveld-Schouten"><span data-dcnode-id="4469" instrument_node="">Ank Bijleveld</span></a><span data-dcnode-id="4467" instrument_node=""> said in a first response she would accept the committee's advice, and ban electronic voting. The committee also concluded that the time wasn't ready for voting over the Internet.</span><sup class="reference" data-dcnode-id="4464" id="cite_ref-Ref_af_116-0"><a data-dcnode-id="4465" href="#cite_note-Ref_af-116"><span data-dcnode-id="4466" instrument_node="">[116]</span></a></sup><span data-dcnode-id="4463" instrument_node=""> State secretary Ank Bijleveld responded by announcing a return to paper voting.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4456" style="white-space:nowrap;"><span data-dcnode-id="4462" instrument_node="">[</span><i data-dcnode-id="4458"><a data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4460" title="This claim needs references to reliable sources. (September 2007)"><span data-dcnode-id="4461" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4457" instrument_node="">]</span></sup><span data-dcnode-id="4455" instrument_node="">. It was reported in September 2007 that "a Dutch judge has declared the use of Nedap e-voting machines in recent Dutch elections unlawful."</span><sup class="reference" data-dcnode-id="4452" id="cite_ref-Ref_ag_117-0"><a data-dcnode-id="4453" href="#cite_note-Ref_ag-117"><span data-dcnode-id="4454" instrument_node="">[117]</span></a></sup><span data-dcnode-id="4451" instrument_node="">
</span></p><p data-dcnode-id="4438"><span data-dcnode-id="4449" instrument_node="">On February 1, 2017 the Dutch government announced that all ballots in the </span><a data-dcnode-id="4447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2017_Dutch_general_election" title="2017 Dutch general election"><span data-dcnode-id="4448" instrument_node="">2017 general election</span></a><span data-dcnode-id="4446" instrument_node=""> would be counted by hand.</span><sup class="reference" data-dcnode-id="4443" id="cite_ref-118"><a data-dcnode-id="4444" href="#cite_note-118"><span data-dcnode-id="4445" instrument_node="">[118]</span></a></sup><sup class="reference" data-dcnode-id="4440" id="cite_ref-119"><a data-dcnode-id="4441" href="#cite_note-119"><span data-dcnode-id="4442" instrument_node="">[119]</span></a></sup><span data-dcnode-id="4439" instrument_node="">
</span></p><span data-dcnode-id="4437" instrument_node="">
</span><h2 data-dcnode-id="4427"><span class="mw-headline" data-dcnode-id="4435" id="Norway"><span data-dcnode-id="4436" instrument_node="">Norway</span></span><span class="mw-editsection" data-dcnode-id="4428"><span class="mw-editsection-bracket" data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">[</span></span><a data-dcnode-id="4431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D27" title="Edit section: Norway"><span data-dcnode-id="4432" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4426" instrument_node="">
</span><p data-dcnode-id="4414"><span data-dcnode-id="4425" instrument_node="">The </span><a class="external text" data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//odin.dep.no/krd/" rel="nofollow"><span data-dcnode-id="4424" instrument_node="">Ministry of Local Government and Regional Development</span></a><span data-dcnode-id="4422" instrument_node=""> of </span><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norway" title="Norway"><span data-dcnode-id="4421" instrument_node="">Norway</span></a><span data-dcnode-id="4419" instrument_node=""> carried out pilots in three municipalities at local elections in 2011 on voting machines in the polling stations using touch screens.</span><sup class="reference" data-dcnode-id="4416" id="cite_ref-ace_17-4"><a data-dcnode-id="4417" href="#cite_note-ace-17"><span data-dcnode-id="4418" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4415" instrument_node="">
</span></p><p data-dcnode-id="4408"><span data-dcnode-id="4413" instrument_node="">Norway tried to conduct voting by using the online voting method and it “did not increase voter turnout, not even among younger demographics.” </span><sup class="reference" data-dcnode-id="4410" id="cite_ref-120"><a data-dcnode-id="4411" href="#cite_note-120"><span data-dcnode-id="4412" instrument_node="">[120]</span></a></sup><span data-dcnode-id="4409" instrument_node=""> People in Norway wanted to ensure that there was high voter confidence and believed that online voting would bring along with it security and political controversy. There are firsthand accounts given of some of the worries that are present with the introduction of a technology such as online voting.
</span></p><p data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">The use of the Internet in elections is a fairly recent concept and as with any new technology it will undergo a certain amount of scrutiny until people can fully trust it and implement it into worldwide elections. Critics of online voting argued that online voting isn't secure enough and thus creates a large number of skeptics who oppose the use of online voting, which in turn will result in a challenge to implement online voting as the primary method of casting votes. Another area that people are worried about is the process of authentication of votes. In other words, what process will voters have to go through to ensure that they are who they say they are?
</span></p><p data-dcnode-id="4400"><span data-dcnode-id="4405" instrument_node="">The Institute of Social Research in Norway conducted a study in which we can see signs that voters are afraid that their votes will become public, which they will see as a compromise of their democratic rights. In addition, voters’ fears are embedded in the encryption system that guards the privacy of their votes. How can voters be sure that their votes are safe from hackers? This led them to believe that in order to make this a viable voting system, governments have to ensure that the encryption system used to protect votes is as safe as possible. Until governments can ensure a certain level of safety for people's votes, the outcomes in Norway are unlikely to change - the voter turnout will still be low even if the convenience of voting is made easier.</span><sup class="reference" data-dcnode-id="4402" id="cite_ref-121"><a data-dcnode-id="4403" href="#cite_note-121"><span data-dcnode-id="4404" instrument_node="">[121]</span></a></sup><span data-dcnode-id="4401" instrument_node="">
</span></p><p data-dcnode-id="4397"><br data-dcnode-id="4399"><span data-dcnode-id="4398" instrument_node="">
</span></p><span data-dcnode-id="4396" instrument_node="">
</span><h2 data-dcnode-id="4386"><span class="mw-headline" data-dcnode-id="4394" id="Pakistan"><span data-dcnode-id="4395" instrument_node="">Pakistan</span></span><span class="mw-editsection" data-dcnode-id="4387"><span class="mw-editsection-bracket" data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">[</span></span><a data-dcnode-id="4390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D28" title="Edit section: Pakistan"><span data-dcnode-id="4391" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4385" instrument_node="">
</span><p data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">On  17 November 2021 National Assembly has passed EVM voting bill by majority of 221
</span></p><p data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">Members and Prime Minister Imran Khan presented this bill in the National Assembly.
</span></p><span data-dcnode-id="4380" instrument_node="">
</span><h2 data-dcnode-id="4370"><span class="mw-headline" data-dcnode-id="4378" id="Philippines"><span data-dcnode-id="4379" instrument_node="">Philippines</span></span><span class="mw-editsection" data-dcnode-id="4371"><span class="mw-editsection-bracket" data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">[</span></span><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D29" title="Edit section: Philippines"><span data-dcnode-id="4375" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4369" instrument_node="">
</span><p data-dcnode-id="4350"><span data-dcnode-id="4368" instrument_node="">In May 2010, the government of the </span><a data-dcnode-id="4366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippines" title="Philippines"><span data-dcnode-id="4367" instrument_node="">Philippines</span></a><span data-dcnode-id="4365" instrument_node=""> planned to carry out its first ever entirely electronically tabulated election, using and </span><a data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_scan_voting_system" title="Optical scan voting system"><span data-dcnode-id="4364" instrument_node="">optical scan voting system</span></a><span data-dcnode-id="4362" instrument_node="">. The government invested $160 million into the new system.</span><sup class="reference" data-dcnode-id="4359" id="cite_ref-Ref_ah_122-0"><a data-dcnode-id="4360" href="#cite_note-Ref_ah-122"><span data-dcnode-id="4361" instrument_node="">[122]</span></a></sup><span data-dcnode-id="4358" instrument_node=""> This included the electronic voting machines, printers, servers, power generators, memory cards, batteries, and broadband and satellite transmission equipment. This national implementation of electronic voting was intended to increase the accuracy and speed of vote tallying.</span><sup class="reference" data-dcnode-id="4355" id="cite_ref-123"><a data-dcnode-id="4356" href="#cite_note-123"><span data-dcnode-id="4357" instrument_node="">[123]</span></a></sup><span data-dcnode-id="4354" instrument_node=""> In addition, it was expected to decrease the fraud and corruption found in past </span><a data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_in_the_Philippines" title="Elections in the Philippines"><span data-dcnode-id="4353" instrument_node="">Philippine elections</span></a><span data-dcnode-id="4351" instrument_node="">.
</span></p><p data-dcnode-id="4330"><span data-dcnode-id="4349" instrument_node="">On May 3, 2010, the Philippines pre-tested the electronic voting systems. The </span><a data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commission_on_Elections_%28Philippines%29" title="Commission on Elections (Philippines)"><span data-dcnode-id="4348" instrument_node="">Commission on Elections (Comelec)</span></a><span data-dcnode-id="4346" instrument_node=""> found 76,000 of the total 82,000 Precinct Count Optical Scan Machines to have faulty memory cards.</span><sup class="reference" data-dcnode-id="4343" id="cite_ref-124"><a data-dcnode-id="4344" href="#cite_note-124"><span data-dcnode-id="4345" instrument_node="">[124]</span></a></sup><sup class="reference" data-dcnode-id="4340" id="cite_ref-125"><a data-dcnode-id="4341" href="#cite_note-125"><span data-dcnode-id="4342" instrument_node="">[125]</span></a></sup><span data-dcnode-id="4339" instrument_node=""> The machines had miscounted votes and had given some votes to the rival candidate. After discovering discrepancies between manual and automated voting tallies, the memory cards were changed throughout the country. Many Filipino voters became skeptical of the e-voting system after the national recall. Because of past violent elections, 250,000 troops were placed on high alert around the country.</span><sup class="reference" data-dcnode-id="4336" id="cite_ref-126"><a data-dcnode-id="4337" href="#cite_note-126"><span data-dcnode-id="4338" instrument_node="">[126]</span></a></sup><span data-dcnode-id="4335" instrument_node=""> These forces were instructed to guard the machines and voting stations in order to preempt any violent protests against the system. Some election officials attempted to postpone the May 10 election day but elections proceeded as scheduled.</span><sup class="reference" data-dcnode-id="4332" id="cite_ref-Ref_127-0"><a data-dcnode-id="4333" href="#cite_note-Ref_-127"><span data-dcnode-id="4334" instrument_node="">[127]</span></a></sup><span data-dcnode-id="4331" instrument_node="">
</span></p><p data-dcnode-id="4325"><span data-dcnode-id="4329" instrument_node="">On </span><a data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Philippine_general_election" title="2010 Philippine general election"><span data-dcnode-id="4328" instrument_node="">May 10, 2010</span></a><span data-dcnode-id="4326" instrument_node="">, the Philippines had its first presidential election using electronic voting. Comelec reported that only 400 of the 82,000 machines malfunctioned. Most voter complaints were related to waiting in long lines and learning the new technology.
</span></p><span data-dcnode-id="4324" instrument_node="">
</span><h2 data-dcnode-id="4314"><span class="mw-headline" data-dcnode-id="4322" id="Romania"><span data-dcnode-id="4323" instrument_node="">Romania</span></span><span class="mw-editsection" data-dcnode-id="4315"><span class="mw-editsection-bracket" data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">[</span></span><a data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D30" title="Edit section: Romania"><span data-dcnode-id="4319" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4313" instrument_node="">
</span><p data-dcnode-id="4301"><a data-dcnode-id="4311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romania" title="Romania"><span data-dcnode-id="4312" instrument_node="">Romania</span></a><span data-dcnode-id="4310" instrument_node=""> first implemented electronic voting systems in 2003,</span><sup class="reference" data-dcnode-id="4307" id="cite_ref-Ref_ak_128-0"><a data-dcnode-id="4308" href="#cite_note-Ref_ak-128"><span data-dcnode-id="4309" instrument_node="">[128]</span></a></sup><span data-dcnode-id="4306" instrument_node=""> on a limited basis, to extend voting capabilities to soldiers and others serving in Iraq, and other theaters of war.  Despite the publicly stated goal of fighting corruption, the equipment was procured and deployed in less than 30 days</span><sup class="reference" data-dcnode-id="4303" id="cite_ref-Ref_al_129-0"><a data-dcnode-id="4304" href="#cite_note-Ref_al-129"><span data-dcnode-id="4305" instrument_node="">[129]</span></a></sup><span data-dcnode-id="4302" instrument_node=""> after the government edict passed.
</span></p><span data-dcnode-id="4300" instrument_node="">
</span><h2 data-dcnode-id="4290"><span class="mw-headline" data-dcnode-id="4298" id="South_Korea"><span data-dcnode-id="4299" instrument_node="">South Korea</span></span><span class="mw-editsection" data-dcnode-id="4291"><span class="mw-editsection-bracket" data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">[</span></span><a data-dcnode-id="4294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D31" title="Edit section: South Korea"><span data-dcnode-id="4295" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4289" instrument_node="">
</span><p data-dcnode-id="4260"><a data-dcnode-id="4287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_in_South_Korea" title="Elections in South Korea"><span data-dcnode-id="4288" instrument_node="">Elections in South Korea</span></a><span data-dcnode-id="4286" instrument_node=""> use a </span><a data-dcnode-id="4284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_machine%23Central-count_voting_system" title="Voting machine"><span data-dcnode-id="4285" instrument_node="">central-count</span></a><span data-dcnode-id="4283" instrument_node=""> system with </span><a data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_scan_voting_system" title="Optical scan voting system"><span data-dcnode-id="4282" instrument_node="">optical scanners</span></a><span data-dcnode-id="4280" instrument_node=""> at each regional election office.  A separate </span><a class="mw-redirect" data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot_paper" title="Ballot paper"><span data-dcnode-id="4279" instrument_node="">ballot paper</span></a><span data-dcnode-id="4277" instrument_node=""> is used for each office being contested, and votes are cast using red ink and a </span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rubber_stamp" title="Rubber stamp"><span data-dcnode-id="4276" instrument_node="">rubber stamp</span></a><span data-dcnode-id="4274" instrument_node="">.  Ballots are similar in size to paper currency, and the optical scanners resemble </span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cash_sorter_machine" title="Cash sorter machine"><span data-dcnode-id="4273" instrument_node="">cash sorter machines</span></a><span data-dcnode-id="4271" instrument_node="">.  After the ballots are sorted, stacks of ballots are counted using machines resembling </span><a class="mw-redirect" data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Currency_counting_machine" title="Currency counting machine"><span data-dcnode-id="4270" instrument_node="">currency counting machines</span></a><span data-dcnode-id="4268" instrument_node="">.  The Korean system has been praised as a model of best practice, but it has also been the subject of controversy, including questions about its legality and allegations of rigged counting in 2012.</span><sup class="reference" data-dcnode-id="4265" id="cite_ref-130"><a data-dcnode-id="4266" href="#cite_note-130"><span data-dcnode-id="4267" instrument_node="">[130]</span></a></sup><sup class="reference" data-dcnode-id="4262" id="cite_ref-131"><a data-dcnode-id="4263" href="#cite_note-131"><span data-dcnode-id="4264" instrument_node="">[131]</span></a></sup><span data-dcnode-id="4261" instrument_node="">
</span></p><span data-dcnode-id="4259" instrument_node="">
</span><h2 data-dcnode-id="4249"><span class="mw-headline" data-dcnode-id="4257" id="Spain"><span data-dcnode-id="4258" instrument_node="">Spain</span></span><span class="mw-editsection" data-dcnode-id="4250"><span class="mw-editsection-bracket" data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">[</span></span><a data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D32" title="Edit section: Spain"><span data-dcnode-id="4254" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4248" instrument_node="">
</span><p data-dcnode-id="4233"><span data-dcnode-id="4247" instrument_node="">In 2014, during its first party congress, the political party </span><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Podemos_%28Spanish_political_party%29" title="Podemos (Spanish political party)"><span data-dcnode-id="4246" instrument_node="">Podemos</span></a><span data-dcnode-id="4244" instrument_node="">, conducted 3 elections using </span><a class="new" data-dcnode-id="4242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAgora_Voting%26action%3Dedit%26redlink%3D1" title="Agora Voting (page does not exist)"><span data-dcnode-id="4243" instrument_node="">Agora Voting</span></a><span data-dcnode-id="4241" instrument_node=""> open source software to vote via the Internet on a series of documents which would determine the political and organizational principles of the party (112070 voters),  the resolutions the party will adopt (38279 voters), and the people that would fill the positions defined by this structure (107488 voters).</span><sup class="reference" data-dcnode-id="4238" id="cite_ref-Ref_podemos_132-0"><a data-dcnode-id="4239" href="#cite_note-Ref_podemos-132"><span data-dcnode-id="4240" instrument_node="">[132]</span></a></sup><span data-dcnode-id="4237" instrument_node=""> After the </span><a class="mw-redirect" data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2015_Spanish_municipal_elections" title="2015 Spanish municipal elections"><span data-dcnode-id="4236" instrument_node="">municipal elections carried out in May 2015</span></a><span data-dcnode-id="4234" instrument_node=""> several city mayors have announced their plans to carry out public consultation processes using electronic voting.
</span></p><span data-dcnode-id="4232" instrument_node="">
</span><h2 data-dcnode-id="4222"><span class="mw-headline" data-dcnode-id="4230" id="Switzerland"><span data-dcnode-id="4231" instrument_node="">Switzerland</span></span><span class="mw-editsection" data-dcnode-id="4223"><span class="mw-editsection-bracket" data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">[</span></span><a data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D33" title="Edit section: Switzerland"><span data-dcnode-id="4227" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4221" instrument_node="">
</span><p data-dcnode-id="4203"><span data-dcnode-id="4220" instrument_node="">Several cantons (</span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canton_of_Geneva" title="Canton of Geneva"><span data-dcnode-id="4219" instrument_node="">Geneva</span></a><span data-dcnode-id="4217" instrument_node="">, </span><a data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canton_of_Neuch%25C3%25A2tel" title="Canton of Neuchâtel"><span data-dcnode-id="4216" instrument_node="">Neuchâtel</span></a><span data-dcnode-id="4214" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canton_of_Zurich" title="Canton of Zurich"><span data-dcnode-id="4213" instrument_node="">Zürich</span></a><span data-dcnode-id="4211" instrument_node="">) have developed </span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_in_Switzerland%23Internet_voting" title="Voting in Switzerland"><span data-dcnode-id="4210" instrument_node="">Internet voting</span></a><span data-dcnode-id="4208" instrument_node=""> test projects to allow citizens to vote via the Internet.</span><sup class="reference" data-dcnode-id="4205" id="cite_ref-Ref_am_133-0"><a data-dcnode-id="4206" href="#cite_note-Ref_am-133"><span data-dcnode-id="4207" instrument_node="">[133]</span></a></sup><span data-dcnode-id="4204" instrument_node="">
</span></p><p data-dcnode-id="4197"><span data-dcnode-id="4202" instrument_node="">In 2009 and 2011, the 110,000 Swiss voters living abroad will have the option of voting using the Internet through a new pilot project introduced in September 2008.</span><sup class="reference" data-dcnode-id="4199" id="cite_ref-Ref_an_134-0"><a data-dcnode-id="4200" href="#cite_note-Ref_an-134"><span data-dcnode-id="4201" instrument_node="">[134]</span></a></sup><span data-dcnode-id="4198" instrument_node="">
</span></p><p data-dcnode-id="4188"><span data-dcnode-id="4196" instrument_node="">Up until the vote on February 9, 2014, internet voting was only open to expatriates who lived in the countries in the </span><a data-dcnode-id="4194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wassenaar_Arrangement" title="Wassenaar Arrangement"><span data-dcnode-id="4195" instrument_node="">Wassenaar Arrangement</span></a><span data-dcnode-id="4193" instrument_node=""> because of their communication standards.  After this vote in 2014, internet voting has opened to all expatriates of Switzerland.  Although this will cause more risk with voting from abroad, it will allow more people to participate in voting, and there no longer has to be a separation of expatriates during voting and registration.
</span><sup class="reference" data-dcnode-id="4190" id="cite_ref-Maurer_135-0"><a data-dcnode-id="4191" href="#cite_note-Maurer-135"><span data-dcnode-id="4192" instrument_node="">[135]</span></a></sup><span data-dcnode-id="4189" instrument_node="">
</span></p><p data-dcnode-id="4179"><span data-dcnode-id="4187" instrument_node="">On February 27, 2017 </span><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swiss_Post" title="Swiss Post"><span data-dcnode-id="4186" instrument_node="">Swiss Post</span></a><span data-dcnode-id="4184" instrument_node=""> announced that it was offering a public demonstration version of its e-voting system.</span><sup class="reference" data-dcnode-id="4181" id="cite_ref-136"><a data-dcnode-id="4182" href="#cite_note-136"><span data-dcnode-id="4183" instrument_node="">[136]</span></a></sup><span data-dcnode-id="4180" instrument_node="">  The Swiss Post solution has been used in Fribourg and will be used in Neuchâtel.
</span></p><p data-dcnode-id="4163"><span data-dcnode-id="4178" instrument_node="">On November 2, 2018, it was reported that Swiss Post has invited hackers from around the world to participate in a four-week public intrusion test of online voting software provided by the Spanish company, </span><a data-dcnode-id="4176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scytl" title="Scytl"><span data-dcnode-id="4177" instrument_node="">Scytl</span></a><span data-dcnode-id="4175" instrument_node=""> to take place in Spring 2019.</span><sup class="reference" data-dcnode-id="4172" id="cite_ref-137"><a data-dcnode-id="4173" href="#cite_note-137"><span data-dcnode-id="4174" instrument_node="">[137]</span></a></sup><span data-dcnode-id="4171" instrument_node="">
Sign-ups were accepted until 31 December 2018: </span><a class="external text" data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pit.post.ch/en" rel="nofollow"><span data-dcnode-id="4170" instrument_node="">pit.post.ch</span></a><span data-dcnode-id="4168" instrument_node="">
Researchers found flaws in the software.</span><sup class="reference" data-dcnode-id="4165" id="cite_ref-swiss-scytl_138-0"><a data-dcnode-id="4166" href="#cite_note-swiss-scytl-138"><span data-dcnode-id="4167" instrument_node="">[138]</span></a></sup><span data-dcnode-id="4164" instrument_node="">
</span></p><p data-dcnode-id="4157"><span data-dcnode-id="4162" instrument_node="">On December 19, 2018, the Swiss Federal Council completed the legislation to approve electronic voting and submitted it for consultation (Vernehmlassung).</span><sup class="reference" data-dcnode-id="4159" id="cite_ref-139"><a data-dcnode-id="4160" href="#cite_note-139"><span data-dcnode-id="4161" instrument_node="">[139]</span></a></sup><span data-dcnode-id="4158" instrument_node="">
</span></p><p data-dcnode-id="4151"><span data-dcnode-id="4156" instrument_node="">A 2020 study found that online voting reduced the number of errors that voters made when casting ballots, thus reducing the number of ballots that were ineligible by 0.3 percent.</span><sup class="reference" data-dcnode-id="4153" id="cite_ref-140"><a data-dcnode-id="4154" href="#cite_note-140"><span data-dcnode-id="4155" instrument_node="">[140]</span></a></sup><span data-dcnode-id="4152" instrument_node="">
</span></p><span data-dcnode-id="4150" instrument_node="">
