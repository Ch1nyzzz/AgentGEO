</span><h2 data-dcnode-id="4140"><span class="mw-headline" data-dcnode-id="4148" id="Thailand"><span data-dcnode-id="4149" instrument_node="">Thailand</span></span><span class="mw-editsection" data-dcnode-id="4141"><span class="mw-editsection-bracket" data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">[</span></span><a data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D34" title="Edit section: Thailand"><span data-dcnode-id="4145" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4118"><span data-dcnode-id="4138" instrument_node="">In November 2018, </span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democrat_Party_%28Thailand%29" title="Democrat Party (Thailand)"><span data-dcnode-id="4137" instrument_node="">Thailand Democrat Party</span></a><span data-dcnode-id="4135" instrument_node=""> conducted electronic voting using blockchain where more than 120,000 votes were cast.  The voting data were stored on IPFS (</span><a data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/InterPlanetary_File_System" title="InterPlanetary File System"><span data-dcnode-id="4134" instrument_node="">InterPlanetary File System</span></a><span data-dcnode-id="4132" instrument_node="">) and the IPFS hashes were then stored on </span><a data-dcnode-id="4130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firo_%28cryptocurrency%29" title="Firo (cryptocurrency)"><span data-dcnode-id="4131" instrument_node="">Zcoin</span></a><span data-dcnode-id="4129" instrument_node=""> blockchain. Former premier of Thailand, </span><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abhisit_Vejjajiva" title="Abhisit Vejjajiva"><span data-dcnode-id="4128" instrument_node="">Abhisit Vejjajiva</span></a><span data-dcnode-id="4126" instrument_node=""> won the popular vote by winning  67,505 votes against his opponent Warong Dechgitvigrom who went close behind with 57,689 votes.</span><sup class="reference" data-dcnode-id="4123" id="cite_ref-141"><a data-dcnode-id="4124" href="#cite_note-141"><span data-dcnode-id="4125" instrument_node="">[141]</span></a></sup><sup class="reference" data-dcnode-id="4120" id="cite_ref-142"><a data-dcnode-id="4121" href="#cite_note-142"><span data-dcnode-id="4122" instrument_node="">[142]</span></a></sup><span data-dcnode-id="4119" instrument_node="">
</span></p><span data-dcnode-id="4117" instrument_node="">
</span><h2 data-dcnode-id="4107"><span class="mw-headline" data-dcnode-id="4115" id="United_Arab_Emirates"><span data-dcnode-id="4116" instrument_node="">United Arab Emirates</span></span><span class="mw-editsection" data-dcnode-id="4108"><span class="mw-editsection-bracket" data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">[</span></span><a data-dcnode-id="4111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D35" title="Edit section: United Arab Emirates"><span data-dcnode-id="4112" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4106" instrument_node="">
</span><h3 data-dcnode-id="4096"><span class="mw-headline" data-dcnode-id="4104" id="UAE_Federal_National_Council_and_2005_Elections"><span data-dcnode-id="4105" instrument_node="">UAE Federal National Council and 2005 Elections</span></span><span class="mw-editsection" data-dcnode-id="4097"><span class="mw-editsection-bracket" data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">[</span></span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D36" title="Edit section: UAE Federal National Council and 2005 Elections"><span data-dcnode-id="4101" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4095" instrument_node="">
</span><p data-dcnode-id="4083"><span data-dcnode-id="4094" instrument_node="">On December 2, 1971,</span><sup class="reference" data-dcnode-id="4091" id="cite_ref-143"><a data-dcnode-id="4092" href="#cite_note-143"><span data-dcnode-id="4093" instrument_node="">[143]</span></a></sup><span data-dcnode-id="4090" instrument_node=""> with the adoption of the constitution, the federation of the </span><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Arab_Emirates" title="United Arab Emirates"><span data-dcnode-id="4089" instrument_node="">United Arab Emirates (UAE)</span></a><span data-dcnode-id="4087" instrument_node=""> was officially established. A few months later, in February 1972, the country's first ever </span><a data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_National_Council" title="Federal National Council"><span data-dcnode-id="4086" instrument_node="">federal national council (FNC)</span></a><span data-dcnode-id="4084" instrument_node=""> was set up as the country's legislative and constitutional body. In 2005, the UAE held its first national elections. This was recognized as a step forward to enhance a well-structured political participation in line with citizens’ aspirations, and as a major milestone towards modernization and development of the federation.
</span></p><span data-dcnode-id="4082" instrument_node="">
</span><h3 data-dcnode-id="4072"><span class="mw-headline" data-dcnode-id="4080" id="2011_Federal_National_Council_Elections"><span data-dcnode-id="4081" instrument_node="">2011 Federal National Council Elections</span></span><span class="mw-editsection" data-dcnode-id="4073"><span class="mw-editsection-bracket" data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">[</span></span><a data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D37" title="Edit section: 2011 Federal National Council Elections"><span data-dcnode-id="4077" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4071" instrument_node="">
</span><p data-dcnode-id="4065"><span data-dcnode-id="4070" instrument_node="">After the first electoral experience in the UAE in 2005, the National Election Committee (NEC) approved electronic voting</span><sup class="reference" data-dcnode-id="4067" id="cite_ref-144"><a data-dcnode-id="4068" href="#cite_note-144"><span data-dcnode-id="4069" instrument_node="">[144]</span></a></sup><span data-dcnode-id="4066" instrument_node=""> instead of traditional voting procedures as it had been attracting the attention of governments around the world. The same election model was used for the 2011 FNC elections, except for the electoral college, where the number of voters increased from around 6,000 to almost 130,000.
</span></p><p data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">The 2011 FNC elections were considered to be more challenging due to the short time frame and the size of the electoral college, as well as the fact that the majority of voters were first-time voters and had never seen a ballot box. The government decided to take innovative steps to encourage participation and introduced technology-driven systems to facilitate the overall program. Hence a process was designed which required detailed planning in the areas of site preparation and capacity computation, technical infrastructure development, communication planning, 
addressing logistical and staff requirements, and the overall specifications of the electronic voting system.
</span></p><span data-dcnode-id="4062" instrument_node="">
</span><h2 data-dcnode-id="4052"><span class="mw-headline" data-dcnode-id="4060" id="United_Kingdom"><span data-dcnode-id="4061" instrument_node="">United Kingdom</span></span><span class="mw-editsection" data-dcnode-id="4053"><span class="mw-editsection-bracket" data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">[</span></span><a data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D38" title="Edit section: United Kingdom"><span data-dcnode-id="4057" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4051" instrument_node="">
</span><h3 data-dcnode-id="4041"><span class="mw-headline" data-dcnode-id="4049" id="England"><span data-dcnode-id="4050" instrument_node="">England</span></span><span class="mw-editsection" data-dcnode-id="4042"><span class="mw-editsection-bracket" data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">[</span></span><a data-dcnode-id="4045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D39" title="Edit section: England"><span data-dcnode-id="4046" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4040" instrument_node="">
</span><p data-dcnode-id="4026"><span data-dcnode-id="4039" instrument_node="">Voting pilots have taken place in May 2006,</span><sup class="reference" data-dcnode-id="4036" id="cite_ref-Ref_ao_145-0"><a data-dcnode-id="4037" href="#cite_note-Ref_ao-145"><span data-dcnode-id="4038" instrument_node="">[145]</span></a></sup><span data-dcnode-id="4035" instrument_node=""> June 2004,</span><sup class="reference" data-dcnode-id="4032" id="cite_ref-Ref_ap_146-0"><a data-dcnode-id="4033" href="#cite_note-Ref_ap-146"><span data-dcnode-id="4034" instrument_node="">[146]</span></a></sup><span data-dcnode-id="4031" instrument_node=""> May 2003,</span><sup class="reference" data-dcnode-id="4028" id="cite_ref-Ref_aq_147-0"><a data-dcnode-id="4029" href="#cite_note-Ref_aq-147"><span data-dcnode-id="4030" instrument_node="">[147]</span></a></sup><span data-dcnode-id="4027" instrument_node=""> May 2002, and May 2000.
</span></p><p data-dcnode-id="4010"><span data-dcnode-id="4025" instrument_node="">In 2000, the London Mayoral and Assembly elections were counted using an </span><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_scan_voting_system" title="Optical scan voting system"><span data-dcnode-id="4024" instrument_node="">optical scan voting system</span></a><span data-dcnode-id="4022" instrument_node=""> with software provided by DRS plc of Milton Keynes. In 2004, the London Mayoral, Assembly and European Parliamentary elections were scanned and processed using </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_character_recognition" title="Optical character recognition"><span data-dcnode-id="4021" instrument_node="">optical character recognition</span></a><span data-dcnode-id="4019" instrument_node=""> from the same company. Both elections required some editing of the ballot design to facilitate electronic tabulation, though they differed only slightly from the previous 'mark with an X' style ballots.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4012" style="white-space:nowrap;"><span data-dcnode-id="4018" instrument_node="">[</span><i data-dcnode-id="4014"><a data-dcnode-id="4015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4016" title="This claim needs references to reliable sources. (September 2007)"><span data-dcnode-id="4017" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4013" instrument_node="">]</span></sup><span data-dcnode-id="4011" instrument_node="">
</span></p><p data-dcnode-id="4004"><span data-dcnode-id="4009" instrument_node="">As of January 2016, the UK Parliament has no plans to introduce electronic voting for statutory elections, either using electronic voting in polling booths or remotely via the internet.</span><sup class="reference" data-dcnode-id="4006" id="cite_ref-148"><a data-dcnode-id="4007" href="#cite_note-148"><span data-dcnode-id="4008" instrument_node="">[148]</span></a></sup><span data-dcnode-id="4005" instrument_node="">
</span></p><span data-dcnode-id="4003" instrument_node="">
</span><h3 data-dcnode-id="3993"><span class="mw-headline" data-dcnode-id="4001" id="Scotland"><span data-dcnode-id="4002" instrument_node="">Scotland</span></span><span class="mw-editsection" data-dcnode-id="3994"><span class="mw-editsection-bracket" data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">[</span></span><a data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D40" title="Edit section: Scotland"><span data-dcnode-id="3998" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3992" instrument_node="">
</span><p data-dcnode-id="3951"><span data-dcnode-id="3991" instrument_node="">An </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_scan_voting_system" title="Optical scan voting system"><span data-dcnode-id="3990" instrument_node="">optical scan voting system</span></a><span data-dcnode-id="3988" instrument_node=""> was used to electronically count paper ballots in the </span><a data-dcnode-id="3986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_Scottish_Parliament_election" title="2007 Scottish Parliament election"><span data-dcnode-id="3987" instrument_node="">Scottish Parliament general election</span></a><span data-dcnode-id="3985" instrument_node=""> and </span><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_Scottish_local_elections" title="2007 Scottish local elections"><span data-dcnode-id="3984" instrument_node="">Scottish council elections</span></a><span data-dcnode-id="3982" instrument_node=""> in 2007.</span><sup class="reference" data-dcnode-id="3979" id="cite_ref-Ref_ar_149-0"><a data-dcnode-id="3980" href="#cite_note-Ref_ar-149"><span data-dcnode-id="3981" instrument_node="">[149]</span></a></sup><sup class="reference" data-dcnode-id="3976" id="cite_ref-Ref_as_150-0"><a data-dcnode-id="3977" href="#cite_note-Ref_as-150"><span data-dcnode-id="3978" instrument_node="">[150]</span></a></sup><span data-dcnode-id="3975" instrument_node=""> A report commissioned by the </span><a data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_Commission_%28United_Kingdom%29" title="Electoral Commission (United Kingdom)"><span data-dcnode-id="3974" instrument_node="">UK Electoral Commission</span></a><span data-dcnode-id="3972" instrument_node=""> found significant errors in ballot design produced more than 150,000 </span><a data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spoilt_vote" title="Spoilt vote"><span data-dcnode-id="3971" instrument_node="">spoilt votes</span></a><span data-dcnode-id="3969" instrument_node="">.</span><sup class="reference" data-dcnode-id="3966" id="cite_ref-Ref_at_151-0"><a data-dcnode-id="3967" href="#cite_note-Ref_at-151"><span data-dcnode-id="3968" instrument_node="">[151]</span></a></sup><span data-dcnode-id="3965" instrument_node=""> The BBC reported that 86,000 constituency ballots and 56,000 list ballots were rejected, with suggestions that it was caused by voters being asked to vote for both sections of the election on the same ballot paper, rather than on separate ballots as had been the case in the previous elections.</span><sup class="reference" data-dcnode-id="3962" id="cite_ref-152"><a data-dcnode-id="3963" href="#cite_note-152"><span data-dcnode-id="3964" instrument_node="">[152]</span></a></sup><span data-dcnode-id="3961" instrument_node=""> In addition to this, Scottish Parliamentary elections and Scottish council elections use different electoral systems. The council elections uses </span><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single_transferable_vote" title="Single transferable vote"><span data-dcnode-id="3960" instrument_node="">single transferable vote</span></a><span data-dcnode-id="3958" instrument_node="">, a </span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ranked_voting" title="Ranked voting"><span data-dcnode-id="3957" instrument_node="">preferential voting system</span></a><span data-dcnode-id="3955" instrument_node="">, while the Parliament elections uses the </span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Additional_member_system" title="Additional member system"><span data-dcnode-id="3954" instrument_node="">additional member system</span></a><span data-dcnode-id="3952" instrument_node="">; the former requires the voter to place numbers in order of their preference, while the latter requires a cross to indicate their single preference.
</span></p><p data-dcnode-id="3943"><span data-dcnode-id="3950" instrument_node="">The electronic counting was used again in the </span><a data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2012_Scottish_local_elections" title="2012 Scottish local elections"><span data-dcnode-id="3949" instrument_node="">2012</span></a><span data-dcnode-id="3947" instrument_node=""> and </span><a data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2017_Scottish_local_elections" title="2017 Scottish local elections"><span data-dcnode-id="3946" instrument_node="">2017</span></a><span data-dcnode-id="3944" instrument_node=""> council elections without any problems being detected.
</span></p><span data-dcnode-id="3942" instrument_node="">
</span><h2 data-dcnode-id="3932"><span class="mw-headline" data-dcnode-id="3940" id="United_States"><span data-dcnode-id="3941" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="3933"><span class="mw-editsection-bracket" data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">[</span></span><a data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D41" title="Edit section: United States"><span data-dcnode-id="3937" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3931" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3920"><div class="thumbinner" data-dcnode-id="3921" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="3927"><video class="thumbimage" data-dcnode-id="3930" data-durationhint="28" data-mwprovider="wikimediacommons" data-mwtitle="2018_Ballots_being_counted_in_Santa_Clara_County.webm" disabled="disabled" height="124" id="mwe_player_0_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/5/5e/2018_Ballots_being_counted_in_Santa_Clara_County.webm/220px--2018_Ballots_being_counted_in_Santa_Clara_County.webm.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="3928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2018_Ballots_being_counted_in_Santa_Clara_County.webm" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="3929"></span></a></span><span data-dcnode-id="3926" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3922"><div class="magnify" data-dcnode-id="3924"><a class="internal" data-dcnode-id="3925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2018_Ballots_being_counted_in_Santa_Clara_County.webm" title="Enlarge"></a></div><span data-dcnode-id="3923" instrument_node="">Counting ballots by an optical scanner, San Jose, California, 2018</span></div></div></div><span data-dcnode-id="3919" instrument_node="">
</span><link data-dcnode-id="3918" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3911" role="note"><span data-dcnode-id="3917" instrument_node="">Further information: </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_the_United_States" title="Electronic voting in the United States"><span data-dcnode-id="3916" instrument_node="">Electronic voting in the United States</span></a><span data-dcnode-id="3914" instrument_node=""> and </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_machine" title="Voting machine"><span data-dcnode-id="3913" instrument_node="">Voting machine</span></a></div><span data-dcnode-id="3910" instrument_node="">
</span><p data-dcnode-id="3902"><span data-dcnode-id="3909" instrument_node="">Electronic voting in the United States involves several types of machines: touch screens for voters to mark choices, scanners to read paper ballots, scanners to verify signatures on envelopes of absentee ballots, and web servers to display tallies to the public. Aside from voting, there are also computer systems to maintain </span><a data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_registration_in_the_United_States" title="Voter registration in the United States"><span data-dcnode-id="3908" instrument_node="">voter registrations</span></a><span data-dcnode-id="3906" instrument_node=""> and display these </span><a data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_roll" title="Electoral roll"><span data-dcnode-id="3905" instrument_node="">electoral rolls</span></a><span data-dcnode-id="3903" instrument_node=""> to polling place staff.
</span></p><p data-dcnode-id="3896"><span data-dcnode-id="3901" instrument_node="">To audit computer tallies in a small percent of locations, five states check all contests by hand, two states check by machines independent of the election machines, seventeen states check one or a few contests by hand, four states reuse the same machines or ballot images as the election, so errors can persist, and 23 states do not require audits.</span><sup class="reference" data-dcnode-id="3898" id="cite_ref-vv-states_153-0"><a data-dcnode-id="3899" href="#cite_note-vv-states-153"><span data-dcnode-id="3900" instrument_node="">[153]</span></a></sup><span data-dcnode-id="3897" instrument_node="">
</span></p><p data-dcnode-id="3863"><span data-dcnode-id="3895" instrument_node="">Three vendors sell most of the machines used for voting and for counting votes. As of September 2016, the American </span><a data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election_Systems_%2526_Software" title="Election Systems &amp; Software"><span data-dcnode-id="3894" instrument_node="">Election Systems &amp; Software</span></a><span data-dcnode-id="3892" instrument_node=""> (ES&amp;S) served 80 million registered voters, Canadian </span><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dominion_Voting_Systems" title="Dominion Voting Systems"><span data-dcnode-id="3891" instrument_node="">Dominion Voting Systems</span></a><span data-dcnode-id="3889" instrument_node=""> 70 million, American </span><a data-dcnode-id="3887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hart_InterCivic" title="Hart InterCivic"><span data-dcnode-id="3888" instrument_node="">Hart InterCivic</span></a><span data-dcnode-id="3886" instrument_node=""> 20 million, and smaller companies less than 4 million each.</span><sup class="reference" data-dcnode-id="3883" id="cite_ref-wharton_154-0"><a data-dcnode-id="3884" href="#cite_note-wharton-154"><span data-dcnode-id="3885" instrument_node="">[154]</span></a></sup><span data-dcnode-id="3882" instrument_node=""> 
More companies sell signature verification machines: ES&amp;S, Olympus, Vantage, Pitney Bowes, Runbeck, and Bell &amp; Howell.</span><sup class="reference" data-dcnode-id="3879" id="cite_ref-stan_155-0"><a data-dcnode-id="3880" href="#cite_note-stan-155"><span data-dcnode-id="3881" instrument_node="">[155]</span></a></sup><span data-dcnode-id="3878" instrument_node="">
A Spanish company, </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scytl" title="Scytl"><span data-dcnode-id="3877" instrument_node="">Scytl</span></a><span data-dcnode-id="3875" instrument_node="">, manages election-reporting websites statewide in 12 U.S. states.</span><sup class="reference" data-dcnode-id="3872" id="cite_ref-Forbes_2_December_2017_156-0"><a data-dcnode-id="3873" href="#cite_note-Forbes_2_December_2017-156"><span data-dcnode-id="3874" instrument_node="">[156]</span></a></sup><span data-dcnode-id="3871" instrument_node="">
Another website management company is </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/VR_Systems" title="VR Systems"><span data-dcnode-id="3870" instrument_node="">VR Systems</span></a><span data-dcnode-id="3868" instrument_node="">, active in 8 states.</span><sup class="reference" data-dcnode-id="3865" id="cite_ref-157"><a data-dcnode-id="3866" href="#cite_note-157"><span data-dcnode-id="3867" instrument_node="">[157]</span></a></sup><span data-dcnode-id="3864" instrument_node="">
</span></p><p data-dcnode-id="3843"><span data-dcnode-id="3862" instrument_node="">Election machines are computers, often 10–20 years old, since certification and purchase processes take at least two years, and offices lack money to replace them until they wear out.</span><sup class="reference" data-dcnode-id="3859" id="cite_ref-wharton_154-1"><a data-dcnode-id="3860" href="#cite_note-wharton-154"><span data-dcnode-id="3861" instrument_node="">[154]</span></a></sup><span data-dcnode-id="3858" instrument_node="">
Like all computers they are subject to errors, which have been widely documented,</span><sup class="reference" data-dcnode-id="3855" id="cite_ref-bren10_158-0"><a data-dcnode-id="3856" href="#cite_note-bren10-158"><span data-dcnode-id="3857" instrument_node="">[158]</span></a></sup><span data-dcnode-id="3854" instrument_node="">
and hacks, which have not been documented, though security flaws which would permit undetectable hacks have been documented.</span><sup class="reference" data-dcnode-id="3851" id="cite_ref-defcon_159-0"><a data-dcnode-id="3852" href="#cite_note-defcon-159"><span data-dcnode-id="3853" instrument_node="">[159]</span></a></sup><sup class="reference" data-dcnode-id="3848" id="cite_ref-everest_160-0"><a data-dcnode-id="3849" href="#cite_note-everest-160"><span data-dcnode-id="3850" instrument_node="">[160]</span></a></sup><sup class="reference" data-dcnode-id="3845" id="cite_ref-topbottom_161-0"><a data-dcnode-id="3846" href="#cite_note-topbottom-161"><span data-dcnode-id="3847" instrument_node="">[161]</span></a></sup><span data-dcnode-id="3844" instrument_node="">
</span></p><p data-dcnode-id="3829"><span data-dcnode-id="3842" instrument_node="">In large election offices, computers check signatures on postal ballot envelopes to prevent fraudulent votes. Error rates of computerized signature reviews are not published.</span><sup class="reference" data-dcnode-id="3839" id="cite_ref-stan_155-1"><a data-dcnode-id="3840" href="#cite_note-stan-155"><span data-dcnode-id="3841" instrument_node="">[155]</span></a></sup><span data-dcnode-id="3838" instrument_node=""> 
Error rates in signature verification are higher for computers than for experts,</span><sup class="reference" data-dcnode-id="3835" id="cite_ref-comp-methods_162-0"><a data-dcnode-id="3836" href="#cite_note-comp-methods-162"><span data-dcnode-id="3837" instrument_node="">[162]</span></a></sup><span data-dcnode-id="3834" instrument_node="">
and at best experts wrongly reject 5% of true signatures and wrongly accept 29% of forgeries. Lay people make more mistakes.</span><sup class="reference" data-dcnode-id="3831" id="cite_ref-sita_163-0"><a data-dcnode-id="3832" href="#cite_note-sita-163"><span data-dcnode-id="3833" instrument_node="">[163]</span></a></sup><span data-dcnode-id="3830" instrument_node="">
</span></p><span data-dcnode-id="3828" instrument_node="">
</span><h2 data-dcnode-id="3818"><span class="mw-headline" data-dcnode-id="3826" id="Venezuela"><span data-dcnode-id="3827" instrument_node="">Venezuela</span></span><span class="mw-editsection" data-dcnode-id="3819"><span class="mw-editsection-bracket" data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">[</span></span><a data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D42" title="Edit section: Venezuela"><span data-dcnode-id="3823" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3817" instrument_node="">
</span><p data-dcnode-id="3804"><a data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_in_Venezuela" title="Elections in Venezuela"><span data-dcnode-id="3816" instrument_node="">Elections in Venezuela</span></a><span data-dcnode-id="3814" instrument_node=""> first introduced electronic voting in the </span><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1998_Venezuelan_presidential_election" title="1998 Venezuelan presidential election"><span data-dcnode-id="3813" instrument_node="">1998 presidential election</span></a><span data-dcnode-id="3811" instrument_node="">. The </span><a data-dcnode-id="3809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2004_Venezuelan_recall_referendum" title="2004 Venezuelan recall referendum"><span data-dcnode-id="3810" instrument_node="">2004 Venezuelan recall referendum</span></a><span data-dcnode-id="3808" instrument_node=""> was the first national election to feature a </span><a data-dcnode-id="3806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter-verified_paper_audit_trail" title="Voter-verified paper audit trail"><span data-dcnode-id="3807" instrument_node="">voter-verified paper audit trail</span></a><span data-dcnode-id="3805" instrument_node=""> (VVPAT). This allow the voter to verify that the machine has properly recorded their vote. It also permits audits and recounts.
</span></p><span data-dcnode-id="3803" instrument_node="">
