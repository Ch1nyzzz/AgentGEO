</span><p data-dcnode-id="6885"><b data-dcnode-id="6887"><span data-dcnode-id="6888" instrument_node="">Electronic voting by country</span></b><span data-dcnode-id="6886" instrument_node=""> varies and may include voting machines in polling places, centralized tallying of paper ballots, and internet voting. Many countries use centralized tallying. Some also use electronic voting machines in polling places. Very few use internet voting. Several countries have tried electronic approaches and stopped, because of difficulties or concerns about security and reliability.
</span></p><p data-dcnode-id="6883"><span data-dcnode-id="6884" instrument_node="">Electronic voting requires capital spending every few years to update equipment, as well as annual spending for maintenance, security and supplies. If it works well, its speed can be an advantage where there are many contests on each ballot. Hand-counting is more feasible in parliamentary systems where each level of government is elected at different times, and only one contest is on each ballot, for the national or regional member of parliament, or for a local council member.
</span></p><p data-dcnode-id="6840"><span data-dcnode-id="6882" instrument_node="">Polling place electronic voting or Internet voting examples have taken place in Australia,</span><sup class="reference" data-dcnode-id="6879" id="cite_ref-1"><a data-dcnode-id="6880" href="#cite_note-1"><span data-dcnode-id="6881" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6878" instrument_node=""> Belgium,</span><sup class="reference" data-dcnode-id="6875" id="cite_ref-2"><a data-dcnode-id="6876" href="#cite_note-2"><span data-dcnode-id="6877" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6872" id="cite_ref-3"><a data-dcnode-id="6873" href="#cite_note-3"><span data-dcnode-id="6874" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6871" instrument_node=""> Brazil,</span><sup class="reference" data-dcnode-id="6868" id="cite_ref-4"><a data-dcnode-id="6869" href="#cite_note-4"><span data-dcnode-id="6870" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6867" instrument_node=""> Estonia,</span><sup class="reference" data-dcnode-id="6864" id="cite_ref-5"><a data-dcnode-id="6865" href="#cite_note-5"><span data-dcnode-id="6866" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="6861" id="cite_ref-6"><a data-dcnode-id="6862" href="#cite_note-6"><span data-dcnode-id="6863" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6860" instrument_node=""> France, Germany, India,</span><sup class="reference" data-dcnode-id="6857" id="cite_ref-pib.nic.in_7-0"><a data-dcnode-id="6858" href="#cite_note-pib.nic.in-7"><span data-dcnode-id="6859" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6856" instrument_node=""> Italy, Namibia, the Netherlands (   </span><a data-dcnode-id="6854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rijnland_Internet_Election_System" title="Rijnland Internet Election System"><span data-dcnode-id="6855" </span><h2 data-dcnode-id="5783"><span class="mw-headline" data-dcnode-id="5791" id="Argentina"><span data-dcnode-id="5792" instrument_node="">Argentina</span></span><span class="mw-editsection" data-dcnode-id="5784"><span class="mw-editsection-bracket" data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">[</span></span><a data-dcnode-id="5787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D2" title="Edit section: Argentina"><span data-dcnode-id="5788" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5782" instrument_node="">
</span><p data-dcnode-id="5774"><span data-dcnode-id="5781" instrument_node="">Used in provincial elections in </span><a data-dcnode-id="5779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salta_Province" title="Salta Province"><span data-dcnode-id="5780" instrument_node="">Salta</span></a><span data-dcnode-id="5778" instrument_node=""> since 2009 and in local elections in </span><a class="mw-redirect" data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buenos_Aires_City" title="Buenos Aires City"><span data-dcnode-id="5777" instrument_node="">Buenos Aires City</span></a><span data-dcnode-id="5775" instrument_node=""> in 2015.
</span></p><span data-dcnode-id="5773" instrument_node="">
</span><h2 data-dcnode-id="5763"><span class="mw-headline" data-dcnode-id="5771" id="Australia"><span data-dcnode-id="5772" instrument_node="">Australia</span></span><span class="mw-editsection" data-dcnode-id="5764"><span class="mw-editsection-bracket" data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">[</span></span><a data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D3" title="Edit section: Australia"><span data-dcnode-id="5768" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5762" instrument_node="">
</span><h3 data-dcnode-id="5752"><span class="mw-headline" data-dcnode-id="5760" id="Origin"><span data-dcnode-id="5761" instrument_node="">Origin</span></span><span class="mw-editsection" data-dcnode-id="5753"><span class="mw-editsection-bracket" data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">[</span></span><a data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D4" title="Edit section: Origin"><span data-dcnode-id="5757" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5751" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5742"><div class="thumbinner" data-dcnode-id="5743" style="width:222px;"><a class="image" data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMidac_CyberVote_Home_Page.png"><img alt="" class="thumbimage" data-dcnode-id="5750" data-file-height="1559" data-file-width="962" decoding="async" height="357" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/be/Midac_CyberVote_Home_Page.png/220px-Midac_CyberVote_Home_Page.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/be/Midac_CyberVote_Home_Page.png/330px-Midac_CyberVote_Home_Page.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/be/Midac_CyberVote_Home_Page.png/440px-Midac_CyberVote_Home_Page.png 2x" width="220"></a><span data-dcnode-id="5748" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5744"><div class="magnify" data-dcnode-id="5746"><a class="internal" data-dcnode-id="5747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMidac_CyberVote_Home_Page.png" title="Enlarge"></a></div><span data-dcnode-id="5745" instrument_node="">1995 CyberVote Home Page with cartoon by Seppo Leinonen</span></div></div></div><p data-dcnode-id="5733"><span data-dcnode-id="5741" instrument_node=""> The first known use of the term CyberVote was by </span><a class="new" data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMidac_Technologies%26action%3Dedit%26redlink%3D1" title="Midac Technologies (page does not exist)"><span data-dcnode-id="5740" instrument_node="">Midac Technologies</span></a><span data-dcnode-id="5738" instrument_node=""> in 1995 when they ran a web based vote regarding the French nuclear testing in the Pacific region. The resulting petition was delivered to the French government on a Syquest removable hard disk.</span><sup class="reference" data-dcnode-id="5735" id="cite_ref-Ref_a_16-0"><a data-dcnode-id="5736" href="#cite_note-Ref_a-16"><span data-dcnode-id="5737" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5734" instrument_node="">
</span></p><p data-dcnode-id="5723"><span data-dcnode-id="5732" instrument_node="">In October 2001 electronic voting was used for the first time in an Australian parliamentary election. In that election, 16,559 voters (8.3% of all votes counted) cast their votes electronically at polling stations in four places.</span><sup class="reference" data-dcnode-id="5729" id="cite_ref-ace_17-0"><a data-dcnode-id="5730" href="#cite_note-ace-17"><span data-dcnode-id="5731" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5728" instrument_node="">  The Victorian State Government introduced electronic voting on a trial basis for the 2006 State election.</span><sup class="reference" data-dcnode-id="5725" id="cite_ref-vec_18-0"><a data-dcnode-id="5726" href="#cite_note-vec-18"><span data-dcnode-id="5727" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5724" instrument_node="">
</span></p><span data-dcnode-id="5722" instrument_node="">
</span><h3 data-dcnode-id="5712"><span class="mw-headline" data-dcnode-id="5720" id="Accessibility"><span data-dcnode-id="5721" instrument_node="">Accessibility</span></span><span class="mw-editsection" data-dcnode-id="5713"><span class="mw-editsection-bracket" data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">[</span></span><a data-dcnode-id="5716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D5" title="Edit section: Accessibility"><span data-dcnode-id="5717" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5711" instrument_node="">
</span><p data-dcnode-id="5702"><span data-dcnode-id="5710" instrument_node="">Approximately 300,000 impaired Australians voted independently for the first time in the 2007 elections. The Australian Electoral Commission has decided to implement </span><a data-dcnode-id="5708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_machine" title="Voting machine"><span data-dcnode-id="5709" instrument_node="">voting machines</span></a><span data-dcnode-id="5707" instrument_node=""> in 29 locations.</span><sup class="reference" data-dcnode-id="5704" id="cite_ref-Ref_b_19-0"><a data-dcnode-id="5705" href="#cite_note-Ref_b-19"><span data-dcnode-id="5706" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5703" instrument_node="">
</span></p><span data-dcnode-id="5701" instrument_node="">
</span><h3 data-dcnode-id="5691"><span class="mw-headline" data-dcnode-id="5699" id="Internet_voting"><span data-dcnode-id="5700" instrument_node="">Internet voting</span></span><span class="mw-editsection" data-dcnode-id="5692"><span class="mw-editsection-bracket" data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node="">[</span></span><a data-dcnode-id="5695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D6" title="Edit section: Internet voting"><span data-dcnode-id="5696" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5693"><span data-dcnode-id="5694" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5690" instrument_node="">
</span><p data-dcnode-id="5684"><span data-dcnode-id="5689" instrument_node="">iVote is a remote electronic voting system in New South Wales that allows eligible voters a chance to vote over the Internet. However, during the New South Wales state election in 2015, there were several reports that over 66,000 electronic votes could have been compromised. Although the iVote website is secure, security specialist believe that a third party website was able to attack the system. This was the first time a major vulnerability was discovered in the middle of an ongoing poll.</span><sup class="reference" data-dcnode-id="5686" id="cite_ref-20"><a data-dcnode-id="5687" href="#cite_note-20"><span data-dcnode-id="5688" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5685" instrument_node="">
</span></p><p data-dcnode-id="5663"><span data-dcnode-id="5683" instrument_node="">In 2007 Australian Defence Force and Defence civilian personnel deployed on operations in Iraq, Afghanistan, Timor Leste and the Solomon Islands had the opportunity to vote via the Defence Restricted Network with an Australian Electoral Commission and Defence Department joint pilot project.</span><sup class="reference" data-dcnode-id="5680" id="cite_ref-Ref_c_21-0"><a data-dcnode-id="5681" href="#cite_note-Ref_c-21"><span data-dcnode-id="5682" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5679" instrument_node=""> After votes were recorded, they were encrypted and transmitted from a </span><a class="mw-redirect" data-dcnode-id="5677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citrix" title="Citrix"><span data-dcnode-id="5678" instrument_node="">Citrix</span></a><span data-dcnode-id="5676" instrument_node=""> server to the REV database A total of 2012 personnel registered for and 1511 votes were successfully cast in the pilot,</span><sup class="reference" data-dcnode-id="5673" id="cite_ref-Ref_d_22-0"><a data-dcnode-id="5674" href="#cite_note-Ref_d-22"><span data-dcnode-id="5675" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5672" instrument_node=""> costing an estimated $521 per vote.</span><sup class="reference" data-dcnode-id="5669" id="cite_ref-aecjoint_23-0"><a data-dcnode-id="5670" href="#cite_note-aecjoint-23"><span data-dcnode-id="5671" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5668" instrument_node=""> Electronically submitted votes were printed following polling day, and dispatched to the relevant Divisions for counting.</span><sup class="reference" data-dcnode-id="5665" id="cite_ref-aecjoint_23-1"><a data-dcnode-id="5666" href="#cite_note-aecjoint-23"><span data-dcnode-id="5667" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5664" instrument_node="">
</span></p><span data-dcnode-id="5662" instrument_node="">
</span><h2 data-dcnode-id="5652"><span class="mw-headline" data-dcnode-id="5660" id="Bangladesh"><span data-dcnode-id="5661" instrument_node="">Bangladesh</span></span><span class="mw-editsection" data-dcnode-id="5653"><span class="mw-editsection-bracket" data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">[</span></span><a data-dcnode-id="5656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D7" title="Edit section: Bangladesh"><span data-dcnode-id="5657" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5654"><span data-dcnode-id="5655" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5651" instrument_node="">
</span><link data-dcnode-id="5650" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5646" role="note"><span data-dcnode-id="5649" instrument_node="">Main article: </span><a data-dcnode-id="5647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Bangladesh" title="Electronic voting in Bangladesh"><span data-dcnode-id="5648" instrument_node="">Electronic voting in Bangladesh</span></a></div><span data-dcnode-id="5645" instrument_node="">
</span><h2 data-dcnode-id="5635"><span class="mw-headline" data-dcnode-id="5643" id="Belgium"><span data-dcnode-id="5644" instrument_node="">Belgium</span></span><span class="mw-editsection" data-dcnode-id="5636"><span class="mw-editsection-bracket" data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">[</span></span><a data-dcnode-id="5639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D8" title="Edit section: Belgium"><span data-dcnode-id="5640" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5634" instrument_node="">
</span><link data-dcnode-id="5633" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5629" role="note"><span data-dcnode-id="5632" instrument_node="">Main article: </span><a data-dcnode-id="5630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Belgium" title="Electronic voting in Belgium"><span data-dcnode-id="5631" instrument_node="">Electronic voting in Belgium</span></a></div><span data-dcnode-id="5628" instrument_node="">
</span><p data-dcnode-id="5612"><span data-dcnode-id="5627" instrument_node="">Electronic voting in Belgium started in 1991. It is widely used in Belgium for general and municipal elections and has been since 1999.  Electronic voting in Belgium has been based on two systems known as Jites and Digivote.  Both of these have been characterized as "indirect recording electronic voting systems" because the voting machine does not directly record and tabulate the vote, but instead, serves as a ballot marking device.</span><sup class="reference" data-dcnode-id="5624" id="cite_ref-24"><a data-dcnode-id="5625" href="#cite_note-24"><span data-dcnode-id="5626" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5623" instrument_node="">  Both the Jites and Digivote systems record ballots on cardboard </span><a class="mw-redirect" data-dcnode-id="5621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnetic_stripe_cards" title="Magnetic stripe cards"><span data-dcnode-id="5622" instrument_node="">magnetic stripe cards</span></a><span data-dcnode-id="5620" instrument_node="">.  Voters deposit their voted ballots into a ballot box that incorporates a magnetic stripe reader to tabulate the vote.  In the event of a controversy, the cards can be </span><a data-dcnode-id="5618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election_recount" title="Election recount"><span data-dcnode-id="5619" instrument_node="">recounted</span></a><span data-dcnode-id="5617" instrument_node=""> by machine.</span><sup class="reference" data-dcnode-id="5614" id="cite_ref-25"><a data-dcnode-id="5615" href="#cite_note-25"><span data-dcnode-id="5616" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5613" instrument_node="">
</span></p><p data-dcnode-id="5597"><span data-dcnode-id="5611" instrument_node="">In the elections on 18. May 2003 there was an electronic voting problem reported where one candidate got 4096 extra votes. The error was only detected because she had more preferential votes than her own list which is impossible in the </span><a class="mw-redirect" data-dcnode-id="5609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_system" title="Voting system"><span data-dcnode-id="5610" instrument_node="">voting system</span></a><span data-dcnode-id="5608" instrument_node="">. The official explanation was </span><i data-dcnode-id="5606"><span data-dcnode-id="5607" instrument_node="">The spontaneous inversion of a bit at the position 13 in the memory of the computer</span></i><span data-dcnode-id="5605" instrument_node=""> (i.e. a </span><a data-dcnode-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soft_error" title="Soft error"><span data-dcnode-id="5604" instrument_node="">soft error</span></a><span data-dcnode-id="5602" instrument_node="">).</span><sup class="reference" data-dcnode-id="5599" id="cite_ref-26"><a data-dcnode-id="5600" href="#cite_note-26"><span data-dcnode-id="5601" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5598" instrument_node="">
</span></p><span data-dcnode-id="5596" instrument_node="">
</span><h2 data-dcnode-id="5586"><span class="mw-headline" data-dcnode-id="5594" id="Brazil"><span data-dcnode-id="5595" instrument_node="">Brazil</span></span><span class="mw-editsection" data-dcnode-id="5587"><span class="mw-editsection-bracket" data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">[</span></span><a data-dcnode-id="5590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D9" title="Edit section: Brazil"><span data-dcnode-id="5591" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5585" instrument_node="">
</span><link data-dcnode-id="5584" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5580" role="note"><span data-dcnode-id="5583" instrument_node="">Main article: </span><a data-dcnode-id="5581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Brazil" title="Electronic voting in Brazil"><span data-dcnode-id="5582" instrument_node="">Electronic voting in Brazil</span></a></div><span data-dcnode-id="5579" instrument_node="">
</span><p data-dcnode-id="5573"><span data-dcnode-id="5578" instrument_node="">Electronic voting in Brazil was introduced in 1996, when the first tests were carried in the state of Santa Catarina. Since 2000, all Brazilian elections have been fully electronic. By the 2000 and 2002 elections more than 400,000 electronic voting machines were used nationwide in Brazil and the results were tallied electronically within minutes after the polls closed.</span><sup class="reference" data-dcnode-id="5575" id="cite_ref-ace_17-1"><a data-dcnode-id="5576" href="#cite_note-ace-17"><span data-dcnode-id="5577" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5574" instrument_node="">
</span></p><p data-dcnode-id="5564"><span data-dcnode-id="5572" instrument_node="">In 1996, after tests conducted by more than 50 municipalities, the Brazilian Electoral Justice launched their "voting machine". Since 2000, all Brazilian voters are able to use the electronic ballot boxes to choose their candidates. In </span><a class="mw-redirect" data-dcnode-id="5570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Brazilian_presidential_election" title="2010 Brazilian presidential election"><span data-dcnode-id="5571" instrument_node="">2010 presidential election</span></a><span data-dcnode-id="5569" instrument_node=""> which had more than 135 million voters, the result was announced 75 minutes after the end of voting. The electronic ballot box is made up of two micro-terminals (one located in the voting cabin and the other with the voting board representative) which are connected by a 5-meter cable. Externally, the micro-terminals have only a numerical keyboard, which does not accept any command executed by the simultaneous pressure of more than one key. In case of power failure, the internal battery provides the energy or it can be connected to an automotive battery.</span><sup class="reference" data-dcnode-id="5566" id="cite_ref-27"><a data-dcnode-id="5567" href="#cite_note-27"><span data-dcnode-id="5568" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5565" instrument_node="">
</span></p><p data-dcnode-id="5558"><span data-dcnode-id="5563" instrument_node="">A 2017 study of Brazil found no systematic difference in vote choices between online and offline electorates.</span><sup class="reference" data-dcnode-id="5560" id="cite_ref-28"><a data-dcnode-id="5561" href="#cite_note-28"><span data-dcnode-id="5562" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5559" instrument_node="">
</span></p><span data-dcnode-id="5557" instrument_node="">
</span><h2 data-dcnode-id="5547"><span class="mw-headline" data-dcnode-id="5555" id="Canada"><span data-dcnode-id="5556" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="5548"><span class="mw-editsection-bracket" data-dcnode-id="5553"><span data-dcnode-id="5554" instrument_node="">[</span></span><a data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D10" title="Edit section: Canada"><span data-dcnode-id="5552" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5549"><span data-dcnode-id="5550" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5546" instrument_node="">
</span><link data-dcnode-id="5545" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5541" role="note"><span data-dcnode-id="5544" instrument_node="">Main article: </span><a data-dcnode-id="5542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Canada" title="Electronic voting in Canada"><span data-dcnode-id="5543" instrument_node="">Electronic voting in Canada</span></a></div><span data-dcnode-id="5540" instrument_node="">
</span><p data-dcnode-id="5535"><span data-dcnode-id="5539" instrument_node="">Federal and provincial elections use paper ballots, but electronic voting has been used since at least the 1990s in some municipalities. Today </span><a data-dcnode-id="5537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_scan_voting_system" title="Optical scan voting system"><span data-dcnode-id="5538" instrument_node="">optical scan voting systems</span></a><span data-dcnode-id="5536" instrument_node=""> are common in municipal elections.
</span></p><p data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">There are no Canadian electronic voting standards.
</span></p><p data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">Committee reports and analysis from Nova Scotia, New Brunswick, Quebec, Ontario and British Columbia have all recommended against provincial Internet voting.  A federal committee has recommended against national Internet voting.
</span></p><p data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">Some municipalities in Ontario and Nova Scotia provide Internet voting.
</span></p><p data-dcnode-id="5517"><span data-dcnode-id="5528" instrument_node="">The </span><a data-dcnode-id="5526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2012_New_Democratic_Party_leadership_election" title="2012 New Democratic Party leadership election"><span data-dcnode-id="5527" instrument_node="">2012 New Democratic Party leadership election</span></a><span data-dcnode-id="5525" instrument_node=""> was conducted partially online, with party members who were not in attendance at the convention hall able to cast their leadership vote online. However, for part of the day the online voting server was affected by a </span><a data-dcnode-id="5523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denial-of-service_attack" title="Denial-of-service attack"><span data-dcnode-id="5524" instrument_node="">denial-of-service attack</span></a><span data-dcnode-id="5522" instrument_node="">, delaying the completion and tabulation of results.</span><sup class="reference" data-dcnode-id="5519" id="cite_ref-29"><a data-dcnode-id="5520" href="#cite_note-29"><span data-dcnode-id="5521" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5518" instrument_node="">
</span></p><p data-dcnode-id="5479"><span data-dcnode-id="5516" instrument_node="">In the </span><a data-dcnode-id="5514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2018_Ontario_municipal_elections" title="2018 Ontario municipal elections"><span data-dcnode-id="5515" instrument_node="">2018 Ontario municipal elections</span></a><span data-dcnode-id="5513" instrument_node="">, over 150 municipalities in the Canadian province of </span><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario" title="Ontario"><span data-dcnode-id="5512" instrument_node="">Ontario</span></a><span data-dcnode-id="5510" instrument_node=""> conducted their elections primarily online, with physical polling stations either abandoned entirely or limited to only a few central polling stations for voters who could not or did not want to vote online.</span><sup class="reference" data-dcnode-id="5507" id="cite_ref-30"><a data-dcnode-id="5508" href="#cite_note-30"><span data-dcnode-id="5509" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5506" instrument_node=""> On election day, however, 51 of those municipalities, all of which had selected Dominion Voting Systems as their online voting contractor, were affected by a technical failure. According to Dominion, the company's </span><a data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colocation_centre" title="Colocation centre"><span data-dcnode-id="5505" instrument_node="">colocation centre</span></a><span data-dcnode-id="5503" instrument_node=""> provider imposed a </span><a data-dcnode-id="5501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bandwidth_%28computing%29" title="Bandwidth (computing)"><span data-dcnode-id="5502" instrument_node="">bandwidth</span></a><span data-dcnode-id="5500" instrument_node=""> cap, without authorization from or consultation with Dominion, due to the massive increase in voting traffic in the early evening, thus making it impossible for many voters to get through to the server between 5:00 and 7:30&nbsp;p.m.</span><sup class="reference" data-dcnode-id="5497" id="cite_ref-31"><a data-dcnode-id="5498" href="#cite_note-31"><span data-dcnode-id="5499" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5496" instrument_node=""> All of the affected municipalities extended voting for at least a few hours to compensate for the outage; several, including </span><a data-dcnode-id="5494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pembroke%2C_Ontario" title="Pembroke, Ontario"><span data-dcnode-id="5495" instrument_node="">Pembroke</span></a><span data-dcnode-id="5493" instrument_node="">, </span><a data-dcnode-id="5491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waterloo%2C_Ontario" title="Waterloo, Ontario"><span data-dcnode-id="5492" instrument_node="">Waterloo</span></a><span data-dcnode-id="5490" instrument_node="">, </span><a data-dcnode-id="5488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_Edward_County%2C_Ontario" title="Prince Edward County, Ontario"><span data-dcnode-id="5489" instrument_node="">Prince Edward County</span></a><span data-dcnode-id="5487" instrument_node=""> and </span><a data-dcnode-id="5485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Sudbury" title="Greater Sudbury"><span data-dcnode-id="5486" instrument_node="">Greater Sudbury</span></a><span data-dcnode-id="5484" instrument_node="">, opted to extend voting for a full 24 hours into the evening of October 23.</span><sup class="reference" data-dcnode-id="5481" id="cite_ref-32"><a data-dcnode-id="5482" href="#cite_note-32"><span data-dcnode-id="5483" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5480" instrument_node="">
</span></p><span data-dcnode-id="5478" instrument_node="">
</span><h2 data-dcnode-id="5468"><span class="mw-headline" data-dcnode-id="5476" id="Estonia"><span data-dcnode-id="5477" instrument_node="">Estonia</span></span><span class="mw-editsection" data-dcnode-id="5469"><span class="mw-editsection-bracket" data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">[</span></span><a data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D11" title="Edit section: Estonia"><span data-dcnode-id="5473" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5470"><span data-dcnode-id="5471" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5467" instrument_node="">
</span><link data-dcnode-id="5466" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5462" role="note"><span data-dcnode-id="5465" instrument_node="">Main article: </span><a data-dcnode-id="5463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Estonia" title="Electronic voting in Estonia"><span data-dcnode-id="5464" instrument_node="">Electronic voting in Estonia</span></a></div><span data-dcnode-id="5461" instrument_node="">
</span><p data-dcnode-id="5452"><span data-dcnode-id="5460" instrument_node="">Electronic voting was first used in </span><a data-dcnode-id="5458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="5459" instrument_node="">Estonia</span></a><span data-dcnode-id="5457" instrument_node=""> during the October 2005 local elections. Estonia became the first country to have legally binding general elections using the Internet as a means of casting the vote. The option of voting via the Internet in the local election was available nationally.  It was declared a success by the Estonian election officials,</span><sup class="reference" data-dcnode-id="5454" id="cite_ref-33"><a data-dcnode-id="5455" href="#cite_note-33"><span data-dcnode-id="5456" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5453" instrument_node=""> with 9,317 people voting online.
</span></p><p data-dcnode-id="5442"><span data-dcnode-id="5451" instrument_node="">In 2007 Estonia held its and the world's first national Internet election. Voting was available from February 26 to 28.</span><sup class="reference" data-dcnode-id="5448" id="cite_ref-Ref_e_34-0"><a data-dcnode-id="5449" href="#cite_note-Ref_e-34"><span data-dcnode-id="5450" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5447" instrument_node=""> A total of 30,275 citizens used Internet voting.</span><sup class="reference" data-dcnode-id="5444" id="cite_ref-Ref_f_35-0"><a data-dcnode-id="5445" href="#cite_note-Ref_f-35"><span data-dcnode-id="5446" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5443" instrument_node="">
</span></p><p data-dcnode-id="5425"><span data-dcnode-id="5441" instrument_node="">In the 2009 local municipal elections, 104,415 people voted over the Internet.</span><sup class="reference" data-dcnode-id="5438" id="cite_ref-36"><a data-dcnode-id="5439" href="#cite_note-36"><span data-dcnode-id="5440" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5437" instrument_node=""> This means that roughly 9,5% of the persons with the right to vote gave their vote over the Internet.</span><sup class="reference" data-dcnode-id="5434" id="cite_ref-37"><a data-dcnode-id="5435" href="#cite_note-37"><span data-dcnode-id="5436" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5433" instrument_node=""> 
By 2009, </span><a data-dcnode-id="5431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Estonia" title="Electronic voting in Estonia"><span data-dcnode-id="5432" instrument_node="">Estonia</span></a><span data-dcnode-id="5430" instrument_node=""> had advanced the farthest in utilizing Internet voting technology.</span><sup class="reference" data-dcnode-id="5427" id="cite_ref-38"><a data-dcnode-id="5428" href="#cite_note-38"><span data-dcnode-id="5429" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5426" instrument_node="">
</span></p><p data-dcnode-id="5419"><span data-dcnode-id="5424" instrument_node="">In the 2011 parliamentary elections between 24 February and March 2, 140,846 people cast their votes online. 96% of the electronic votes were cast in Estonia and 4% by Estonian citizens residing in 106 foreign countries.</span><sup class="reference" data-dcnode-id="5421" id="cite_ref-39"><a data-dcnode-id="5422" href="#cite_note-39"><span data-dcnode-id="5423" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5420" instrument_node="">
</span></p><p data-dcnode-id="5410"><span data-dcnode-id="5418" instrument_node="">In the </span><a data-dcnode-id="5416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_European_Parliament_election_in_Estonia" title="2014 European Parliament election in Estonia"><span data-dcnode-id="5417" instrument_node="">2014 European Parliament elections</span></a><span data-dcnode-id="5415" instrument_node=""> 31.3% of all participating voters gave their vote over the Internet.</span><sup class="reference" data-dcnode-id="5412" id="cite_ref-40"><a data-dcnode-id="5413" href="#cite_note-40"><span data-dcnode-id="5414" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5411" instrument_node="">
</span></p><p data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">In the 2019 parliamentary elections 43.75% of all participating voters gave their vote over the Internet.
</span></p><p data-dcnode-id="5396"><span data-dcnode-id="5407" instrument_node="">Each Estonian citizen possesses an electronic chip-enabled ID card, which allows the user to vote over the internet. The ID card is inserted into a card reader, which is connected to a computer. Once the user's identity is verified (using the digital certificate on the electronic ID card), a vote can be cast via the internet. Votes are not considered final until the end of election day, so Estonian citizens can go back and re-cast their votes until election day is officially over. The popularity of </span><a data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_Estonia" title="Electronic voting in Estonia"><span data-dcnode-id="5406" instrument_node="">online voting in Estonia</span></a><span data-dcnode-id="5404" instrument_node=""> has increased widely throughout the nation, as in the elections of 2014 and 2015, nearly one third of Estonian votes were cast online.</span><sup class="reference" data-dcnode-id="5401" id="cite_ref-41"><a data-dcnode-id="5402" href="#cite_note-41"><span data-dcnode-id="5403" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="5398" id="cite_ref-42"><a data-dcnode-id="5399" href="#cite_note-42"><span data-dcnode-id="5400" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5397" instrument_node="">
</span></p><p data-dcnode-id="5387"><span data-dcnode-id="5395" instrument_node="">Research in Estonia showed that internet voting is less expensive than other voting channels.</span><sup class="reference" data-dcnode-id="5392" id="cite_ref-43"><a data-dcnode-id="5393" href="#cite_note-43"><span data-dcnode-id="5394" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="5389" id="cite_ref-44"><a data-dcnode-id="5390" href="#cite_note-44"><span data-dcnode-id="5391" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5388" instrument_node="">
</span></p><p data-dcnode-id="5373"><span data-dcnode-id="5386" instrument_node="">Security officials said that they have not detected any unusual activity or tampering of the votes.</span><sup class="reference" data-dcnode-id="5383" id="cite_ref-45"><a data-dcnode-id="5384" href="#cite_note-45"><span data-dcnode-id="5385" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5382" instrument_node="">
However researchers have found weaknesses in the security design of Estonia's online voting systems,</span><sup class="reference" data-dcnode-id="5379" id="cite_ref-osce-est_46-0"><a data-dcnode-id="5380" href="#cite_note-osce-est-46"><span data-dcnode-id="5381" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5378" instrument_node="">
as well as massive operational lapses in security from transferring election results on personal thumb drives to posting network credentials on the wall in view of the public. The researchers concluded that these systems are insecure in their current implementation, and due to the rise of nation state interest in influencing elections, should be "discontinue[d]."</span><sup class="reference" data-dcnode-id="5375" id="cite_ref-estan_47-0"><a data-dcnode-id="5376" href="#cite_note-estan-47"><span data-dcnode-id="5377" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5374" instrument_node="">
</span></p><span data-dcnode-id="5372" instrument_node="">
</span><h2 data-dcnode-id="5362"><span class="mw-headline" data-dcnode-id="5370" id="European_Union"><span data-dcnode-id="5371" instrument_node="">European Union</span></span><span class="mw-editsection" data-dcnode-id="5363"><span class="mw-editsection-bracket" data-dcnode-id="5368"><span data-dcnode-id="5369" instrument_node="">[</span></span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D12" title="Edit section: European Union"><span data-dcnode-id="5367" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5361" instrument_node="">
</span><p data-dcnode-id="5351"><span data-dcnode-id="5360" instrument_node="">In September 2000, the European Commission launched the CyberVote project with the aim of demonstrating "fully verifiable on-line elections guaranteeing absolute privacy of the votes and using fixed and mobile Internet terminals".</span><sup class="reference" data-dcnode-id="5357" id="cite_ref-ace_17-2"><a data-dcnode-id="5358" href="#cite_note-ace-17"><span data-dcnode-id="5359" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5356" instrument_node=""> Trials were performed in Sweden, France, and Germany.</span><sup class="reference" data-dcnode-id="5353" id="cite_ref-Ref_g_48-0"><a data-dcnode-id="5354" href="#cite_note-Ref_g-48"><span data-dcnode-id="5355" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5352" instrument_node="">
</span></p><span data-dcnode-id="5350" instrument_node="">
</span><h2 data-dcnode-id="5340"><span class="mw-headline" data-dcnode-id="5348" id="Finland"><span data-dcnode-id="5349" instrument_node="">Finland</span></span><span class="mw-editsection" data-dcnode-id="5341"><span class="mw-editsection-bracket" data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">[</span></span><a data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D13" title="Edit section: Finland"><span data-dcnode-id="5345" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5339" instrument_node="">
</span><p data-dcnode-id="5325"><span data-dcnode-id="5338" instrument_node="">On October 24, 2016 the Finnish government announced it would study the introduction of national online voting.</span><sup class="reference" data-dcnode-id="5335" id="cite_ref-49"><a data-dcnode-id="5336" href="#cite_note-49"><span data-dcnode-id="5337" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5334" instrument_node="">  On February 21, 2017 the working group studying Internet voting for Finland launched, with a target date for completion of its work of November 30, 2017.</span><sup class="reference" data-dcnode-id="5331" id="cite_ref-50"><a data-dcnode-id="5332" href="#cite_note-50"><span data-dcnode-id="5333" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5330" instrument_node="">  The working group recommended against Internet voting, concluding that the risks outweighed the benefits.</span><sup class="reference" data-dcnode-id="5327" id="cite_ref-51"><a data-dcnode-id="5328" href="#cite_note-51"><span data-dcnode-id="5329" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5326" instrument_node="">
</span></p><p data-dcnode-id="5286"><span data-dcnode-id="5324" instrument_node="">In </span><a data-dcnode-id="5322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finland" title="Finland"><span data-dcnode-id="5323" instrument_node="">Finland</span></a><span data-dcnode-id="5321" instrument_node="">, electronic voting has never been used in large scale; all voting is conducted by pen and paper and the ballots are always counted by hand. In 2008, the Finnish government wanted to test electronic voting, and organized a pilot electronic vote for the </span><a data-dcnode-id="5319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_Finnish_municipal_elections" title="2008 Finnish municipal elections"><span data-dcnode-id="5320" instrument_node="">2008 Finnish municipal elections</span></a><span data-dcnode-id="5318" instrument_node="">. Internet-enabled DRE machines, supplied by the company </span><a data-dcnode-id="5316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scytl" title="Scytl"><span data-dcnode-id="5317" instrument_node="">Scytl</span></a><span data-dcnode-id="5315" instrument_node="">,</span><sup class="reference" data-dcnode-id="5312" id="cite_ref-Ref_h_52-0"><a data-dcnode-id="5313" href="#cite_note-Ref_h-52"><span data-dcnode-id="5314" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5311" instrument_node=""> were piloted in the October 2008 municipal elections in three municipalities (</span><a data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karkkila" title="Karkkila"><span data-dcnode-id="5310" instrument_node="">Karkkila</span></a><span data-dcnode-id="5308" instrument_node="">, </span><a data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kauniainen" title="Kauniainen"><span data-dcnode-id="5307" instrument_node="">Kauniainen</span></a><span data-dcnode-id="5305" instrument_node=""> and </span><a data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vihti" title="Vihti"><span data-dcnode-id="5304" instrument_node="">Vihti</span></a><span data-dcnode-id="5302" instrument_node="">). The government considered the pilot program a success.</span><sup class="reference" data-dcnode-id="5299" id="cite_ref-fins_53-0"><a data-dcnode-id="5300" href="#cite_note-fins-53"><span data-dcnode-id="5301" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5298" instrument_node=""> However, following complaints, the </span><a data-dcnode-id="5296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Administrative_Court_of_Finland" title="Supreme Administrative Court of Finland"><span data-dcnode-id="5297" instrument_node="">Supreme Administrative Court</span></a><span data-dcnode-id="5295" instrument_node=""> declared the results invalid, and ordered a rerun of the elections with the regular pen-and-paper method in the affected municipalities. The system had a usability problem where the messages were ambiguous on whether the vote had been cast. In a total of 232 cases (2% of votes), voters had logged in, selected their vote but not confirmed it, and left the booth; the votes were not recorded.</span><sup class="reference" data-dcnode-id="5292" id="cite_ref-54"><a data-dcnode-id="5293" href="#cite_note-54"><span data-dcnode-id="5294" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5291" instrument_node=""> Following the failure of the pilot election, the Finnish government has abandoned plans to continue electronic voting based on voting machines. In the memo</span><sup class="reference" data-dcnode-id="5288" id="cite_ref-55"><a data-dcnode-id="5289" href="#cite_note-55"><span data-dcnode-id="5290" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5287" instrument_node=""> it was concluded that the voting machine will not developed any more, but the Finnish government will nevertheless follow the development of different electronic voting systems worldwide.
</span></p><span data-dcnode-id="5285" instrument_node="">
</span><h2 data-dcnode-id="5275"><span class="mw-headline" data-dcnode-id="5283" id="France"><span data-dcnode-id="5284" instrument_node="">France</span></span><span class="mw-editsection" data-dcnode-id="5276"><span class="mw-editsection-bracket" data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">[</span></span><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D14" title="Edit section: France"><span data-dcnode-id="5280" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5274" instrument_node="">
</span><p data-dcnode-id="5265"><span data-dcnode-id="5273" instrument_node="">In January 2007 France's </span><a data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_for_a_Popular_Movement" title="Union for a Popular Movement"><span data-dcnode-id="5272" instrument_node="">UMP</span></a><span data-dcnode-id="5270" instrument_node=""> party held a national presidential primary using both remote electronic voting and with 750 polling stations using touch screen electronic voting over the Internet. The election resulted in over 230,000 votes representing a near 70% turnout.</span><sup class="reference" data-dcnode-id="5267" id="cite_ref-Ref_j_56-0"><a data-dcnode-id="5268" href="#cite_note-Ref_j-56"><span data-dcnode-id="5269" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5266" instrument_node="">
</span></p><p data-dcnode-id="5247"><a data-dcnode-id="5263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_in_France" title="Elections in France"><span data-dcnode-id="5264" instrument_node="">Elections in France</span></a><span data-dcnode-id="5262" instrument_node=""> utilized remote Internet voting for the first time in 2003 when French citizens living in the United States elected their representatives to the </span><a data-dcnode-id="5260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assembly_of_French_Citizens_Abroad" title="Assembly of French Citizens Abroad"><span data-dcnode-id="5261" instrument_node="">Assembly of French Citizens Abroad</span></a><span data-dcnode-id="5259" instrument_node="">. Over 60% of voters chose to vote using the Internet rather than paper. The </span><a class="external text" data-dcnode-id="5257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20071108222754/http%3A//www.foruminternet.org/" rel="nofollow"><span data-dcnode-id="5258" instrument_node="">Forum des droits sur l'Internet</span></a><span data-dcnode-id="5256" instrument_node=""> (Internet rights forum), published a recommendation on the future of electronic voting in France, stating that French citizens abroad should be able to use Internet voting for Assembly of the French Citizens Abroad elections.</span><sup class="reference" data-dcnode-id="5253" id="cite_ref-Ref_k_57-0"><a data-dcnode-id="5254" href="#cite_note-Ref_k-57"><span data-dcnode-id="5255" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5252" instrument_node=""> This recommendation became reality in 2009, with 6000 French citizens choosing to make use of the system.</span><sup class="reference" data-dcnode-id="5249" id="cite_ref-Ref_l_58-0"><a data-dcnode-id="5250" href="#cite_note-Ref_l-58"><span data-dcnode-id="5251" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5248" instrument_node="">
</span></p><p data-dcnode-id="5238"><span data-dcnode-id="5246" instrument_node="">On March 6, 2017 France announced that Internet voting (which had previously been offered to citizens abroad) would not be permitted in the 2017 legislative elections due to cybersecurity concerns.</span><sup class="reference" data-dcnode-id="5243" id="cite_ref-59"><a data-dcnode-id="5244" href="#cite_note-59"><span data-dcnode-id="5245" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="5240" id="cite_ref-60"><a data-dcnode-id="5241" href="#cite_note-60"><span data-dcnode-id="5242" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5239" instrument_node="">
</span></p><p data-dcnode-id="5232"><span data-dcnode-id="5237" instrument_node="">As of 2020 citizens abroad vote by internet in legislative and consular elections, not for President or EU.</span><sup class="reference" data-dcnode-id="5234" id="cite_ref-france_11-1"><a data-dcnode-id="5235" href="#cite_note-france-11"><span data-dcnode-id="5236" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5233" instrument_node="">
</span></p><span data-dcnode-id="5231" instrument_node="">
</span><h2 data-dcnode-id="5221"><span class="mw-headline" data-dcnode-id="5229" id="Germany"><span data-dcnode-id="5230" instrument_node="">Germany</span></span><span class="mw-editsection" data-dcnode-id="5222"><span class="mw-editsection-bracket" data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">[</span></span><a data-dcnode-id="5225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D15" title="Edit section: Germany"><span data-dcnode-id="5226" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5220" instrument_node="">
</span><p data-dcnode-id="5178"><span data-dcnode-id="5219" instrument_node="">In Germany the only accredited voting machines after testing by the PTB </span><a class="external text" data-dcnode-id="5217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20071113160418/http%3A//www.berlin.ptb.de/8/85/851/votingmachines.htm" rel="nofollow"><span data-dcnode-id="5218" instrument_node="">for national</span></a><span data-dcnode-id="5216" instrument_node=""> and local elections are the ESD1 and ESD2 from the Dutch company </span><a data-dcnode-id="5214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nedap" title="Nedap"><span data-dcnode-id="5215" instrument_node="">Nedap</span></a><span data-dcnode-id="5213" instrument_node="">. About 2000 of them have been used in the 2005 </span><a data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bundestag" title="Bundestag"><span data-dcnode-id="5212" instrument_node="">Bundestag</span></a><span data-dcnode-id="5210" instrument_node=""> elections covering approximately 2 million voters.</span><sup class="reference" data-dcnode-id="5207" id="cite_ref-Ref_m_61-0"><a data-dcnode-id="5208" href="#cite_note-Ref_m-61"><span data-dcnode-id="5209" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5206" instrument_node=""> These machines differ only in certain details due to different voting systems from the ES3B hacked by a Dutch citizen group and the </span><a data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaos_Computer_Club" title="Chaos Computer Club"><span data-dcnode-id="5205" instrument_node="">Chaos Computer Club</span></a><span data-dcnode-id="5203" instrument_node=""> on October 5, 2006.</span><sup class="reference" data-dcnode-id="5200" id="cite_ref-wijvertrouwenstemcomputersniet.nl_62-0"><a data-dcnode-id="5201" href="#cite_note-wijvertrouwenstemcomputersniet.nl-62"><span data-dcnode-id="5202" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="5197" id="cite_ref-Ref_n_63-0"><a data-dcnode-id="5198" href="#cite_note-Ref_n-63"><span data-dcnode-id="5199" instrument_node="">[63]</span></a></sup><span data-dcnode-id="5196" instrument_node=""> Because of this, additional security measures have been applied in the municipality elections on 22. October 2006 in </span><a data-dcnode-id="5194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cottbus" title="Cottbus"><span data-dcnode-id="5195" instrument_node="">Cottbus</span></a><span data-dcnode-id="5193" instrument_node="">, including reading the software from the </span><a data-dcnode-id="5191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/EPROM" title="EPROM"><span data-dcnode-id="5192" instrument_node="">EPROM</span></a><span data-dcnode-id="5190" instrument_node=""> to compare it with the source and </span><a class="mw-redirect" data-dcnode-id="5188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tamper-evident%23Seals_and_signatures" title="Tamper-evident"><span data-dcnode-id="5189" instrument_node="">sealing</span></a><span data-dcnode-id="5187" instrument_node=""> the machines afterwards.</span><sup class="reference" data-dcnode-id="5184" id="cite_ref-Ref_o_64-0"><a data-dcnode-id="5185" href="#cite_note-Ref_o-64"><span data-dcnode-id="5186" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5183" instrument_node=""> The city of Cottbus ultimately decided not to purchase the Nedap voting system it had previously been leasing.</span><sup class="reference" data-dcnode-id="5180" id="cite_ref-Ref_p_65-0"><a data-dcnode-id="5181" href="#cite_note-Ref_p-65"><span data-dcnode-id="5182" instrument_node="">[65]</span></a></sup><span data-dcnode-id="5179" instrument_node="">
</span></p><p data-dcnode-id="5150"><span data-dcnode-id="5177" instrument_node="">At the moment there are several lawsuits in court against the use of electronic voting machines in </span><a data-dcnode-id="5175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="5176" instrument_node="">Germany</span></a><span data-dcnode-id="5174" instrument_node="">.</span><sup class="reference" data-dcnode-id="5171" id="cite_ref-Ref_q_66-0"><a data-dcnode-id="5172" href="#cite_note-Ref_q-66"><span data-dcnode-id="5173" instrument_node="">[66]</span></a></sup><sup class="reference" data-dcnode-id="5168" id="cite_ref-Ref_r_67-0"><a data-dcnode-id="5169" href="#cite_note-Ref_r-67"><span data-dcnode-id="5170" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5167" instrument_node=""> One of these reached the </span><a class="mw-redirect" data-dcnode-id="5165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Constitutional_Court_of_Germany" title="Federal Constitutional Court of Germany"><span data-dcnode-id="5166" instrument_node="">Federal Constitutional Court of Germany</span></a><span data-dcnode-id="5164" instrument_node=""> in February 2007.</span><sup class="reference" data-dcnode-id="5161" id="cite_ref-Ref_s_68-0"><a data-dcnode-id="5162" href="#cite_note-Ref_s-68"><span data-dcnode-id="5163" instrument_node="">[68]</span></a></sup><span data-dcnode-id="5160" instrument_node=""> Critics cite a lack transparency when recording the votes as intended by the voter and concerns relating to recounts. The certified </span><a data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nedap" title="Nedap"><span data-dcnode-id="5159" instrument_node="">Nedap</span></a><span data-dcnode-id="5157" instrument_node=""> machines are </span><a data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DRE_voting_machine" title="DRE voting machine"><span data-dcnode-id="5156" instrument_node="">DRE</span></a><span data-dcnode-id="5154" instrument_node=""> systems which do not produce any </span><a class="mw-redirect" data-dcnode-id="5152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/VVPAT" title="VVPAT"><span data-dcnode-id="5153" instrument_node="">paper records</span></a><span data-dcnode-id="5151" instrument_node="">.
</span></p><p data-dcnode-id="5121"><span data-dcnode-id="5149" instrument_node="">Following a 2005 pilot study during the national elections, wide public support and a unanimous decision by the Senate launched a plan for the implementation of an </span><a data-dcnode-id="5147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_scan_voting_system" title="Optical scan voting system"><span data-dcnode-id="5148" instrument_node="">optical scan voting system</span></a><span data-dcnode-id="5146" instrument_node=""> based on </span><a data-dcnode-id="5144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_paper" title="Digital paper"><span data-dcnode-id="5145" instrument_node="">digital paper</span></a><span data-dcnode-id="5143" instrument_node=""> in the 2008 state elections of </span><a data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamburg" title="Hamburg"><span data-dcnode-id="5142" instrument_node="">Hamburg</span></a><span data-dcnode-id="5140" instrument_node="">.</span><sup class="reference" data-dcnode-id="5137" id="cite_ref-Ref_t_69-0"><a data-dcnode-id="5138" href="#cite_note-Ref_t-69"><span data-dcnode-id="5139" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="5134" id="cite_ref-Ref_u_70-0"><a data-dcnode-id="5135" href="#cite_note-Ref_u-70"><span data-dcnode-id="5136" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5133" instrument_node=""> After public claims in September 2007 by the Fraktion der Grünen/GAL and the </span><a data-dcnode-id="5131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaos_Computer_Club" title="Chaos Computer Club"><span data-dcnode-id="5132" instrument_node="">Chaos Computer Club</span></a><span data-dcnode-id="5130" instrument_node=""> that the system was vulnerable, the Federal Election Office (Bundeswahlamt) found in public surveys that public distrust of the system was evident. Due to concerns over public confidence, plans for use of the new voting system were canceled.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5123" style="white-space:nowrap;"><span data-dcnode-id="5129" instrument_node="">[</span><i data-dcnode-id="5125"><a data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5127" title="This claim needs references to reliable sources. (February 2017)"><span data-dcnode-id="5128" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5124" instrument_node="">]</span></sup><span data-dcnode-id="5122" instrument_node="">
</span></p><p data-dcnode-id="5115"><span data-dcnode-id="5120" instrument_node="">Germany ended electronic voting in 2009, with the German Federal Constitutional Court finding that the inability to have meaningful public scrutiny meant that electronic voting was unconstitutional.</span><sup class="reference" data-dcnode-id="5117" id="cite_ref-71"><a data-dcnode-id="5118" href="#cite_note-71"><span data-dcnode-id="5119" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5116" instrument_node="">
</span></p><span data-dcnode-id="5114" instrument_node="">
</span><h2 data-dcnode-id="5104"><span class="mw-headline" data-dcnode-id="5112" id="India"><span data-dcnode-id="5113" instrument_node="">India</span></span><span class="mw-editsection" data-dcnode-id="5105"><span class="mw-editsection-bracket" data-dcnode-id="5110"><span data-dcnode-id="5111" instrument_node="">[</span></span><a data-dcnode-id="5108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectronic_voting_by_country%26action%3Dedit%26section%3D16" title="Edit section: India"><span data-dcnode-id="5109" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5103" instrument_node="">
</span><link data-dcnode-id="5102" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5098" role="note"><span data-dcnode-id="5101" instrument_node="">Main article: </span><a data-dcnode-id="5099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_voting_in_India" title="Electronic voting in India"><span data-dcnode-id="5100" instrument_node="">Electronic voting in India</span></a></div><span data-dcnode-id="5097" instrument_node="">
</span><p data-dcnode-id="5070"><span data-dcnode-id="5096" instrument_node="">Electronic voting was first introduced in 1982 and was used on an experimental basis in the </span><a data-dcnode-id="5094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Paravur" title="North Paravur"><span data-dcnode-id="5095" instrument_node="">North Paravur</span></a><span data-dcnode-id="5093" instrument_node=""> assembly constituency in the State of </span><a data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerala" title="Kerala"><span data-dcnode-id="5092" instrument_node="">Kerala</span></a><span data-dcnode-id="5090" instrument_node="">. However the </span><a data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_India" title="Supreme Court of India"><span data-dcnode-id="5089" instrument_node="">Supreme Court of India</span></a><span data-dcnode-id="5087" instrument_node=""> struck down this election as against the law in A. C. Jose v. Sivan Pillai case. Amendments were made to the </span><a data-dcnode-id="5085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act%2C_1951" title="Representation of the People Act, 1951"><span data-dcnode-id="5086" instrument_node="">Representation of the People Act, 1951</span></a><span data-dcnode-id="5084" instrument_node=""> to legalise elections using </span><a class="mw-redirect" data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_Voting_Machines" title="Electronic Voting Machines"><span data-dcnode-id="5083" instrument_node="">Electronic Voting Machines</span></a><span data-dcnode-id="5081" instrument_node="">. In 2003, all </span><a data-dcnode-id="5079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_in_India" title="Elections in India"><span data-dcnode-id="5080" instrument_node="">state elections</span></a><span data-dcnode-id="5078" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/By-elections" title="By-elections"><span data-dcnode-id="5077" instrument_node="">by-elections</span></a><span data-dcnode-id="5075" instrument_node=""> were held using EVMs.</span><sup class="reference" data-dcnode-id="5072" id="cite_ref-ace_17-3"><a data-dcnode-id="5073" href="#cite_note-ace-17"><span data-dcnode-id="5074" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5071" instrument_node="">
</span></p><p data-dcnode-id="5056"><span data-dcnode-id="5069" instrument_node="">The EVMs were also used during the </span><a data-dcnode-id="5067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lok_Sabha" title="Lok Sabha"><span data-dcnode-id="5068" instrument_node="">national elections</span></a><span data-dcnode-id="5066" instrument_node=""> held for the </span><a data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_India" title="Parliament of India"><span data-dcnode-id="5065" instrument_node="">Parliament of India</span></a><span data-dcnode-id="5063" instrument_node=""> in </span><a data-dcnode-id="5061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2004_Indian_general_election" title="2004 Indian general election"><span data-dcnode-id="5062" instrument_node="">2004</span></a><span data-dcnode-id="5060" instrument_node=""> and </span><a data-dcnode-id="5058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2009_Indian_general_election" title="2009 Indian general election"><span data-dcnode-id="5059" instrument_node="">2009</span></a><span data-dcnode-id="5057" instrument_node="">. According to the statistics available through the mainstream media, more than 400 million voters (about 60% of India's eligible voters) exercised their franchise through EVMs in 2009 elections. Tallying such a large number of votes took just a few hours.
</span></p><p data-dcnode-id="4979"><span data-dcnode-id="5055" instrument_node="">In India, </span><a data-dcnode-id="5053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter-verified_paper_audit_trail" title="Voter-verified paper audit trail"><span data-dcnode-id="5054" instrument_node="">Voter-verified paper audit trail</span></a><span data-dcnode-id="5052" instrument_node=""> (VVPAT) system was introduced in 8 of 543 parliamentary constituencies as a pilot project in </span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Indian_general_election" title="2014 Indian general election"><span data-dcnode-id="5051" instrument_node="">2014 Indian general election</span></a><span data-dcnode-id="5049" instrument_node="">.</span><sup class="reference" data-dcnode-id="5046" id="cite_ref-72"><a data-dcnode-id="5047" href="#cite_note-72"><span data-dcnode-id="5048" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="5043" id="cite_ref-73"><a data-dcnode-id="5044" href="#cite_note-73"><span data-dcnode-id="5045" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="5040" id="cite_ref-74"><a data-dcnode-id="5041" href="#cite_note-74"><span data-dcnode-id="5042" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="5037" id="cite_ref-75"><a data-dcnode-id="5038" href="#cite_note-75"><span data-dcnode-id="5039" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5036" instrument_node=""> VVPAT was implemented in </span><a data-dcnode-id="5034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucknow_%28Lok_Sabha_constituency%29" title="Lucknow (Lok Sabha constituency)"><span data-dcnode-id="5035" instrument_node="">Lucknow</span></a><span data-dcnode-id="5033" instrument_node="">, </span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gandhinagar_%28Lok_Sabha_constituency%29" title="Gandhinagar (Lok Sabha constituency)"><span data-dcnode-id="5032" instrument_node="">Gandhinagar</span></a><span data-dcnode-id="5030" instrument_node="">, </span><a data-dcnode-id="5028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangalore_South_%28Lok_Sabha_constituency%29" title="Bangalore South (Lok Sabha constituency)"><span data-dcnode-id="5029" instrument_node="">Bangalore South</span></a><span data-dcnode-id="5027" instrument_node="">, </span><a data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chennai_Central_%28Lok_Sabha_constituency%29" title="Chennai Central (Lok Sabha constituency)"><span data-dcnode-id="5026" instrument_node="">Chennai Central</span></a><span data-dcnode-id="5024" instrument_node="">, </span><a data-dcnode-id="5022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jadavpur_%28Lok_Sabha_constituency%29" title="Jadavpur (Lok Sabha constituency)"><span data-dcnode-id="5023" instrument_node="">Jadavpur</span></a><span data-dcnode-id="5021" instrument_node="">, </span><a data-dcnode-id="5019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raipur_%28Lok_Sabha_constituency%29" title="Raipur (Lok Sabha constituency)"><span data-dcnode-id="5020" instrument_node="">Raipur</span></a><span data-dcnode-id="5018" instrument_node="">, </span><a data-dcnode-id="5016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patna_Sahib_%28Lok_Sabha_constituency%29" title="Patna Sahib (Lok Sabha constituency)"><span data-dcnode-id="5017" instrument_node="">Patna Sahib</span></a><span data-dcnode-id="5015" instrument_node=""> and </span><a data-dcnode-id="5013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mizoram_%28Lok_Sabha_constituency%29" title="Mizoram (Lok Sabha constituency)"><span data-dcnode-id="5014" instrument_node="">Mizoram</span></a><span data-dcnode-id="5012" instrument_node=""> constituencies.</span><sup class="reference" data-dcnode-id="5009" id="cite_ref-76"><a data-dcnode-id="5010" href="#cite_note-76"><span data-dcnode-id="5011" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="5006" id="cite_ref-VVPATIndiaElections2014_77-0"><a data-dcnode-id="5007" href="#cite_note-VVPATIndiaElections2014-77"><span data-dcnode-id="5008" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="5003" id="cite_ref-78"><a data-dcnode-id="5004" href="#cite_note-78"><span data-dcnode-id="5005" instrument_node="">[78]</span></a></sup><sup class="reference" data-dcnode-id="5000" id="cite_ref-79"><a data-dcnode-id="5001" href="#cite_note-79"><span data-dcnode-id="5002" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="4997" id="cite_ref-80"><a data-dcnode-id="4998" href="#cite_note-80"><span data-dcnode-id="4999" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="4994" id="cite_ref-81"><a data-dcnode-id="4995" href="#cite_note-81"><span data-dcnode-id="4996" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4993" instrument_node=""> Voter-verified paper audit trail was first used in an election in India in September 2013 in </span><a class="mw-redirect" data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noksen_%28Assembly_Constituency%29" title="Noksen (Assembly Constituency)"><span data-dcnode-id="4992" instrument_node="">Noksen</span></a><span data-dcnode-id="4990" instrument_node=""> in </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nagaland" title="Nagaland"><span data-dcnode-id="4989" instrument_node="">Nagaland</span></a><span data-dcnode-id="4987" instrument_node="">.</span><sup class="reference" data-dcnode-id="4984" id="cite_ref-82"><a data-dcnode-id="4985" href="#cite_note-82"><span data-dcnode-id="4986" instrument_node="">[82]</span></a></sup><sup class="reference" data-dcnode-id="4981" id="cite_ref-83"><a data-dcnode-id="4982" href="#cite_note-83"><span data-dcnode-id="4983" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4980" instrument_node="">
