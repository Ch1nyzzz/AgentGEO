and has a bachelor's degree from Wesleyan University and a law degree from American University Washington College of Law.&quot;}"><span data-dcnode-id="4031" instrument_node="">Arli is a Campaign Strategist with the National Political Advocacy Department of the ACLU and advocates for legislative and administrative policy changes to further transgender rights. Prior to joining the ACLU Arli was the State Policy Director at the National Center for Transgender Equality, and holds a particular expertise on identity document gender change policies. Arli speaks English and Spanish and has a bachelor's degree from Wesleyan University and a law degree from American University Washington College of Law.</span></span><span data-dcnode-id="4029" instrument_node=""> </span><br data-dcnode-id="4028"><br data-dcnode-id="4027"><div data-dcnode-id="4019"><strong data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4024"><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/alternatives-to-litigation-tools-to-advocate-for-trans-and-nonbinary-rights/" target="_blank"><span data-dcnode-id="4023" instrument_node="">Alternatives to Litigation: Tools to Advocate for Trans and Nonbinary Rights</span></a><br data-dcnode-id="4021"><br data-dcnode-id="4020"></div><div data-dcnode-id="4011"><strong data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4016"><a data-dcnode-id="4014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/id-ready-or-not-the-new-frontier-of-transgender-non-binary-and-intersex-identification-document-change-laws-in-2020-and-beyond/" target="_blank"><span data-dcnode-id="4015" instrument_node="">ID Ready or Not?: The New Frontier of Transgender, Non-Binary, and Intersex Identification Document Change Laws in 2020 and Beyond</span></a><br data-dcnode-id="4013"><br data-dcnode-id="4012"></div><hr data-dcnode-id="4010"><strong data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">Susan Cirilli</span></strong><span data-dcnode-id="4007" instrument_node=""> - Susan M. Cirilli is an attorney with Offit Kurman. Her&nbsp;practice focuses on employment matters involving the ADA, FMLA, and Title VII claims. Ms. Cirilli litigates cases involving hostile work environment and discrimination. She assess issues surrounding discrimination and harassment, and represents employers in fact finding conferences and mediations before the PHRC and the EEOC. Ms. Cirilli is admitted in the Middle District and Eastern District of Pennsylvania, as well as the Federal Court for the District of New Jersey.&nbsp;She earned her B.S. degree, summa cum laude, from University of Vermont and her J.D. degree from The Catholic University of America, Columbus School of Law. </span><br data-dcnode-id="4006"><br data-dcnode-id="4005"><div data-dcnode-id="3997"><strong data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4002"><a data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/navigating-client-expectations-an-experiential-journey-for-diverse-practitioners/" target="_blank"><span data-dcnode-id="4001" instrument_node="">Navigating Client Expectations: An Experiential Journey for Diverse Practitioners</span></a><br data-dcnode-id="3999"><br data-dcnode-id="3998"></div><hr data-dcnode-id="3996"><strong data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">Currey Cook</span></strong><span data-dcnode-id="3993" instrument_node=""> - </span><span data-dcnode-id="3991" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;M. Currey Cook is the Director of the Youth in Out-of-Home Care Project and Counsel with Lambda Legal, the oldest and largest national legal organization committed to achieving full recognition of the civil rights of lesbians, gay men, bisexuals, transgender people and everyone living with HIV. Cook advocates across the country for LGBTQ youth and youth living with HIV in child welfare and juvenile justice settings and youth experiencing homelessness via impact litigation, law and policy reform and education. Before joining Lambda Legal in 2013, Cook was the Co-Director of the Bronx office of The Children's Law Center New York, served as a consultant to The National Juvenile Defender Center in Washington, D.C , worked in Burundi on an American Bar Association's Rule of Law Initiative to assist with reintegrate former child soldiers into the community, and was a visiting professor for the Child Advocacy Clinic at Rutgers Law School Newark. Prior to moving to New York in 2008, Cook lived in Anchorage, Alaska and was an attorney with the Office of Public Advocacy (OPA) for twelve years. Cook worked as a juvenile defense attorney and guardian ad litem and later as supervising attorney of OPA's Child Advocacy Section. Cook was the recipient of the Alaska Bar Association Pro Bono Service Award for a Public Sector Attorney in 2006 and a Light of Hope Award for his advocacy on behalf of abused and neglected children in Alaska. Cook has served as chair of the New York City Bar Association'ss Family Court and Family Law Committee and is currently a board member of the National Association of Counsel for Children. He graduated from the University of Georgia with a B.A. in Journalism (Broadcast News) and received his law degree from Mercer University in Macon, Georgia in 1994.&quot;}"><span data-dcnode-id="3992" instrument_node="">M. Currey Cook is the Director of the Youth in Out-of-Home Care Project and Counsel with Lambda Legal, the oldest and largest national legal organization committed to achieving full recognition of the civil rights of lesbians, gay men, bisexuals, transgender people and everyone living with HIV. Cook advocates across the country for LGBTQ youth and youth living with HIV in child welfare and juvenile justice settings and youth experiencing homelessness via impact litigation, law and policy reform and education. Before joining Lambda Legal in 2013, Cook was the Co-Director of the Bronx office of The Children's Law Center New York, served as a consultant to The National Juvenile Defender Center in Washington, D.C , worked in Burundi on an American Bar Association's Rule of Law Initiative to assist with reintegrate former child soldiers into the community, and was a visiting professor for the Child Advocacy Clinic at Rutgers Law School Newark. Prior to moving to New York in 2008, Cook lived in Anchorage, Alaska and was an attorney with the Office of Public Advocacy (OPA) for twelve years. Cook worked as a juvenile defense attorney and guardian ad litem and later as supervising attorney of OPA's Child Advocacy Section. Cook was the recipient of the Alaska Bar Association Pro Bono Service Award for a Public Sector Attorney in 2006 and a Light of Hope Award for his advocacy on behalf of abused and neglected children in Alaska. Cook has served as chair of the New York City Bar Association's Family Court and Family Law Committee and is currently a board member of the National Association of Counsel for Children. He graduated from the University of Georgia with a B.A. in Journalism (Broadcast News) and received his law degree from Mercer University in Macon, Georgia in 1994.</span></span><span data-dcnode-id="3990" instrument_node=""> </span><br data-dcnode-id="3989"><br data-dcnode-id="3988"><div data-dcnode-id="3980"><strong data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3985"><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/multi-system-approaches-to-ending-lgbtq-youth-homelessness-through-law-and-policy/" target="_blank"><span data-dcnode-id="3984" instrument_node="">Multi-system Approaches to Ending LGBTQ+ Youth Homelessness Through Law and Policy</span></a><br data-dcnode-id="3982"><br data-dcnode-id="3981"></div><hr data-dcnode-id="3979"><strong data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Alex Cooper</span></strong><span data-dcnode-id="3976" instrument_node=""> - </span><span data-dcnode-id="3974" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Alex Cooper is a survivor of conversion therapy. She is the co-author, with Joanna Brooks, of the the memoir, Saving Alex: When I was 15 I Told My Mormon Parents I Was Gay And That's When My Nightmare Began. Cooper's story was made into the Lifetime movie Trapped: The Alex Cooper Story, which premiered in September 2019.&quot;}"><span data-dcnode-id="3975" instrument_node="">Alex Cooper is a survivor of conversion therapy. She is the co-author, with Joanna Brooks, of the the memoir, Saving Alex: When I was 15 I Told My Mormon Parents I Was Gay And That's When My Nightmare Began. Cooper's story was made into the Lifetime movie Trapped: The Alex Cooper Story, which premiered in September 2019.</span></span><span data-dcnode-id="3973" instrument_node=""> </span><br data-dcnode-id="3972"><br data-dcnode-id="3971"><div data-dcnode-id="3963"><strong data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3968"><a data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/born-perfect-the-journey-from-saving-alex-to-ban-conversion-therapy-in-utah/" target="_blank"><span data-dcnode-id="3967" instrument_node="">Born Perfect: The Journey from Saving Alex to Ban Conversion Therapy in Utah</span></a><br data-dcnode-id="3965"><br data-dcnode-id="3964"></div><hr data-dcnode-id="3962"><strong data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">Amy Crawford</span></strong><span data-dcnode-id="3959" instrument_node=""> - Amy Crawford is the Deputy Chief of the Civil Actions Bureau of the Cook County (IL) State's Attorney's Office.&nbsp; Before that, she was a litigation partner at Kirkland &amp; Ellis, LLP, where her pro bono focus was on LGBTQ rights.&nbsp; Between two stints at Kirkland, she clerked for Judge Philip Simon of the Northern District of Indiana and spent six months working on the 2008 Obama campaign.&nbsp; In 2015, she ran for Alderman on the North Side of Chicago.&nbsp; Before law school, she worked in corporate finance and nonprofit fundraising.&nbsp; She is a graduate of the University of Notre Dame and the University of Chicago Law School. </span><br data-dcnode-id="3958"><br data-dcnode-id="3957"><div data-dcnode-id="3948"><strong data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Law Student Career Planning Program</span></strong><span data-dcnode-id="3954" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="3953"><a data-dcnode-id="3951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/career-planning-program/" target="_blank"><span data-dcnode-id="3952" instrument_node="">Career Services and Job Search Strategies for LGBTQ+ Law Students</span></a><br data-dcnode-id="3950"><br data-dcnode-id="3949"></div><hr data-dcnode-id="3947"><strong data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">William Crosby</span></strong><span data-dcnode-id="3944" instrument_node=""> - </span><span data-dcnode-id="3942" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;William (Bill) Crosby, Jr. is Vice President, Associate General Counsel and Managing Attorney at Interpublic Group, a New York based advertising and marketing company with over 50,000 employees worldwide. At Interpublic, where he has been since 2002, Bill oversees global litigation and manages the Latin American practice. He was an associate at Davis Polk &amp; Wardwell from 1993 until 1995 and at Kay, Collyer &amp; Boose (now defunct) from 1995 until 2002. Bill also serves as a member of the commercial panel of arbitrators for the American Arbitration Association. He has served as arbitrator in nearly 200 matters, involving such areas as franchising, intellectual property, hotel and restaurant management, and general commercial disputes, both domestic and international. Bill is a frequent speaker on arbitration related issues, as well as litigation and compliance issues. He organized and moderated a presentation at last year's Lavender Law Conference focused on increasing the numbers of LGBT-identified arbitrators and mediators. He is an active member of the LGBT Bar Association of Greater New York (LeGaL), where he has served for several years as a board member and as a member of its Judiciary Committee, which interviews and evaluates judicial candidates in New York. Bill is a 1990 graduate of Yale College and a 1993 graduate of Stanford Law School.&quot;}"><span data-dcnode-id="3943" instrument_node="">William (Bill) Crosby, Jr. is Vice President, Associate General Counsel and Managing Attorney at Interpublic Group, a New York based advertising and marketing company with over 50,000 employees worldwide. At Interpublic, where he has been since 2002, Bill oversees global litigation and manages the Latin American practice. He was an associate at Davis Polk &amp; Wardwell from 1993 until 1995 and at Kay, Collyer &amp; Boose (now defunct) from 1995 until 2002. Bill also serves as a member of the commercial panel of arbitrators for the American Arbitration Association. He has served as arbitrator in nearly 200 matters, involving such areas as franchising, intellectual property, hotel and restaurant management, and general commercial disputes, both domestic and international. Bill is a frequent speaker on arbitration related issues, as well as litigation and compliance issues. He organized and moderated a presentation at last year's Lavender Law Conference focused on increasing the numbers of LGBT-identified arbitrators and mediators. He is an active member of the LGBT Bar Association of Greater New York (LeGaL), where he has served for several years as a board member and as a member of its Judiciary Committee, which interviews and evaluates judicial candidates in New York. Bill is a 1990 graduate of Yale College and a 1993 graduate of Stanford Law School.</span></span><span data-dcnode-id="3941" instrument_node=""> </span><br data-dcnode-id="3940"><br data-dcnode-id="3939"><div data-dcnode-id="3931"><strong data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3936"><a data-dcnode-id="3934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/visibilizing-bisexuals-in-lgbtqia-rights-discourse-and-communities/" target="_blank"><span data-dcnode-id="3935" instrument_node="">Visibilizing Bisexuals in LGBTQIA+ Rights Discourse and Communities</span></a><br data-dcnode-id="3933"><br data-dcnode-id="3932"></div><hr data-dcnode-id="3930"><strong data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Cynthia Cubbage</span></strong><span data-dcnode-id="3927" instrument_node=""> - </span><span data-dcnode-id="3925" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Cynthia Cubbage has 20 years of experience dedicated to serving children and families through non-profit work and county government agencies. She has provided mental health services to children and families. She has held leadership and management positions that involve child advocacy efforts, analyzing public local policies, and developing innovative programming for youth/children. Her passion and interest focus on working with multi-racial/cultural adoptive families, birth parents, children and &amp; teens, LGBTQ youth, and aging-out youth in the foster care system. She has provided trainings nationally and internationally on adoption issues and has worked as a team developing adoption competent publications and therapeutic materials. Cynthia and her wife are parents by adoption of two beautiful children.&quot;}"><span data-dcnode-id="3926" instrument_node="">Cynthia Cubbage has 20 years of experience dedicated to serving children and families through non-profit work and county government agencies. She has provided mental health services to children and families. She has held leadership and management positions that involve child advocacy efforts, analyzing public local policies, and developing innovative programming for youth/children. Her passion and interest focus on working with multi-racial/cultural adoptive families, birth parents, children and &amp; teens, LGBTQ youth, and aging-out youth in the foster care system. She has provided trainings nationally and internationally on adoption issues and has worked as a team developing adoption competent publications and therapeutic materials. Cynthia and her wife are parents by adoption of two beautiful children.</span></span><span data-dcnode-id="3924" instrument_node=""> </span><br data-dcnode-id="3923"><br data-dcnode-id="3922"><div data-dcnode-id="3914"><strong data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3919"><a data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/quashing-hope-a-review-of-recent-efforts-to-disrupt-the-participation-of-lgbtq-individuals-in-the-u-s-foster-care-system-and-their-forming-of-families-through-adoption/" target="_blank"><span data-dcnode-id="3918" instrument_node="">Quashing Hope: A Review of Recent Efforts to Disrupt the Participation of LGBTQ+ Individuals in the U.S. Foster Care System and their Forming of Families Through Adoption</span></a><br data-dcnode-id="3916"><br data-dcnode-id="3915"></div><hr data-dcnode-id="3913"><strong data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">Dean Larry Cunningham</span></strong><span data-dcnode-id="3910" instrument_node=""> - Larry Cunningham became the Dean of Charleston School of Law in June 2020, bringing a national reputation in legal education, assessment, and student learning to the position. As Dean, he serves as the chief academic and executive officer of the school, leading the academic, student support, and operational units of the Law School with the singular goal of promoting student success.&nbsp; Dean Cunningham joined Charleston School of Law from St. John’s University School of Law, where he was a professor from 2008 to 2020 and served in several administrative posts.&nbsp; Dean Cunningham received his J.D. magna cum laude from Georgetown University Law Center and graduated summa cum laude and valedictorian of John Jay College of Criminal Justice.&nbsp; Prior to entering academia, he was a prosecutor and a law clerk to a federal judge.&nbsp; His husband and their puggle live in downtown Charleston. </span><br data-dcnode-id="3909"><br data-dcnode-id="3908"><div data-dcnode-id="3900"><strong data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3905"><a data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/law-school-panel/" target="_blank"><span data-dcnode-id="3904" instrument_node="">Out in Leadership: Reflections from LGBTQ+ Law School Deans</span></a><br data-dcnode-id="3902"><br data-dcnode-id="3901"></div><hr data-dcnode-id="3899"><strong data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">Alphonso David</span></strong><span data-dcnode-id="3896" instrument_node=""> - Alphonso B. David, an accomplished and nationally recognized LGBTQ civil rights lawyer and advocate, is the president of the Human Rights Campaign. Mr. David is the first civil rights lawyer and the first person of color to serve as president of HRC in the organization’s nearly 40-year history. Mr. David has significant litigation and management experience in the public, private and not-for-profit sectors. He has been at the forefront of the movement for LGBTQ equality for more than a decade and worked at both the state and national level. In 2015, Mr. David was appointed by New York Governor Andrew Cuomo to serve as Counsel to the Governor. In this role, he has functioned as the Governor’s chief counsel and principal legal advisor, and managed all significant legal and policy deliberations affecting New York State, including evaluating proposed legislation; implementing laws and policies and formulating the State’s posture in both affirmative and defensive litigation. Prior to his appointment as the Governor’s Chief Counsel, Mr. David served for four years in the Governor’s cabinet as the Deputy Secretary and Counsel for Civil Rights, the first position of its kind in New York State. In this capacity, he was responsible for a full range of legal, policy, legislative and operational matters affecting civil rights and labor throughout the State. Mr. David also previously served as Special Deputy Attorney General for Civil Rights for the Office of the New York State Attorney General, where he managed Assistant Attorneys General on a variety of civil rights investigations and affirmative litigation, including employment and housing discrimination, fair lending, immigration, reproductive rights and anti-bias claims. Further, he previously served as Deputy Commissioner and Special Counselor at the New York State Division of Human Rights. Prior to working in the public sector, Mr. David served as a staff attorney at the Lambda Legal Defense and Educational Fund. At Lambda Legal, Mr. David litigated precedent-setting civil rights cases across the nation affecting lesbian, gay, bisexual, transgender and queer individuals
as well as those living with HIV and AIDS. He handled both affirmative and defensive matters relating to marriage, parenting rights, discrimination in schools and access to health care. In addition, Mr. David served as a litigation associate at the law firm Blank Rome LLP. He began his legal career as a judicial clerk to the Honorable Clifford Scott Green in the United States
District Court for the Eastern District of Pennsylvania. For the past decade, Mr. David has served as an Adjunct Professor of Law. He began his work in academia with Fordham University Law School and continued at Benjamin N. Cardozo School of Law. He is a graduate of the University of Maryland and Temple University School of Law. </span><br data-dcnode-id="3895"><br data-dcnode-id="3894"><div data-dcnode-id="3886"><strong data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3891"><a data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-fifth-anniversary-of-obergefell-how-we-won-and-what-we-lost/" target="_blank"><span data-dcnode-id="3890" instrument_node="">The Fifth Anniversary of Obergefell: How We Won and What We Lost</span></a><br data-dcnode-id="3888"><br data-dcnode-id="3887"></div><hr data-dcnode-id="3885"><strong data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">Jon W. Davidson</span></strong><span data-dcnode-id="3882" instrument_node=""> - Jon W. Davidson has been one of the nation’s leading lawyers fighting for LGBTQ civil rights for more than 30 years. He currently is Chief Counsel at Freedom for All Americans and Freedom for All Americans Education Fund, the national bipartisan campaign to secure full nondiscrimination protections for LGBTQ people nationwide. In that capacity, he assists LGBTQ impact litigation attorneys with strategic thinking, development of arguments and litigation strategies, editing of briefs and pleadings, and preparation for oral arguments. He also assists LGBTQ movement groups with legislative lawyering. He previously was the national Legal Director of Lambda Legal, the largest and oldest national legal organization committed to achieving full recognition of the civil rights of LGBTQ people and those living with HIV, a position he held for 12 years, and he worked there from 1995-2017. As the organization’s Legal Director, he was the architect of the organization’s national legal strategy and supervised its 31 attorneys and 16 policy advocates, trainers, Help Desk analysts, and legal assistants, in all six of its offices across the country. Davidson has worked on a broad range of LGBT and HIV-related legal and policy matters throughout his career, including being co-counsel in the cases that brought marriage equality to California, Nevada, Virginia and then the entire nation and that increased legal protections for employees, students, consumers, families, prisoners, and immigrants. He was honored with the National LGBT Bar Association’s highest award in 2010. A graduate of Stanford University and Yale Law School, Davidson previously was a partner in the Los Angeles law firm of Irell &amp; Manella and a senior staff attorney at the ACLU Foundation of Southern California. He also has taught courses on LGBT rights, constitutional law, youth law, and pretrial civil litigation at UCLA Law School, the USC Law Center, Loyola Law School, and the former Whittier Law School. </span><br data-dcnode-id="3881"><br data-dcnode-id="3880"><div data-dcnode-id="3872"><strong data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3877"><a data-dcnode-id="3875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/supreme-court-review-2019-2020-term/" target="_blank"><span data-dcnode-id="3876" instrument_node="">Supreme Court Review: The Blockbuster 2019-2020 Term</span></a><br data-dcnode-id="3874"><br data-dcnode-id="3873"></div><hr data-dcnode-id="3871"><strong data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">Leonor Davila</span></strong><span data-dcnode-id="3868" instrument_node=""> - Leonor V. Davila is an Associate Director in the Ethics and Legal Compliance Team at Intel Corporation.&nbsp; Leonor is also a member of Intel’s GAT Diversity and Inclusion program, and she Co-Chairs Intel’s Santa Clara Pro Bono Program.&nbsp; Prior to joining Intel, Leonor was an attorney at the U.S.A. Federal Trade Commission.&nbsp; In 2019, the Women Competition Professionals recognized Leonor as a top 40 competition professional in the Americas.&nbsp; Leonor earned a JD/MA in International Affairs from the George Washington University and a B.A. from UC San Diego. </span><br data-dcnode-id="3867"><br data-dcnode-id="3866"><div data-dcnode-id="3857"><strong data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">How to Go In-House</span></strong><span data-dcnode-id="3863" instrument_node="">: August 14, 2020 | 12:30 pm - 2:00 pm</span><br data-dcnode-id="3862"><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/career-advice-for-law-students-and-laterals-from-seasoned-in-house-counsel/" target="_blank"><span data-dcnode-id="3861" instrument_node="">Career Advice for Law Students and Laterals from Seasoned In-House Counsel</span></a><br data-dcnode-id="3859"><br data-dcnode-id="3858"></div><hr data-dcnode-id="3856"><strong data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">Rachana Desai Martin</span></strong><span data-dcnode-id="3853" instrument_node=""> -  </span><br data-dcnode-id="3852"><br data-dcnode-id="3851"><div data-dcnode-id="3843"><strong data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3848"><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/protecting-lgbtq-voters-in-2020/" target="_blank"><span data-dcnode-id="3847" instrument_node="">Protecting LGBTQ+ Voters in 2020</span></a><br data-dcnode-id="3845"><br data-dcnode-id="3844"></div><hr data-dcnode-id="3842"><strong data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">Ceyenne Doroshow</span></strong><span data-dcnode-id="3839" instrument_node=""> - Ceyenne Doroshow (pronounced Kai-Ann) is a compassionate powerhouse performer, activist, organizer, community-based researcher and public figure in the trans and sex worker rights’ movements. As the Founder and Executive Director of G.L.I.T.S., she works to provide holistic care to LGBTQ sex workers while serving on 10 international boards including SWOP Behind Bars, Lysistrata, SOAR Institute, Caribbean Equality Project, NYU Law, NYTAG, Transgender Justice of San Francisco, the Leslie-Lohman Museum, and many more.&nbsp;&nbsp;As an international public speaker, her presentations include The Desiree Alliance, Creating Change, SisterSong, Harm Reduction Coalition and the International AIDS Conferences. She was a featured emcee for Toronto Pride and MOMA/PS1’s Sex Workers’ Festival of Resistance, lifting her voice as a trans woman of color.&nbsp;Ceyenne has been heavily featured in the media, has performed on television in Showtime’s </span><em data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">OZ</span></em><span data-dcnode-id="3836" instrument_node="">, for the documentaries </span><em data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">Red Umbrella Diaries</span></em><span data-dcnode-id="3833" instrument_node=""> and </span><em data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Miss Major</span></em><span data-dcnode-id="3830" instrument_node="">. She is also featured in PRIDE: a Netflix documentary that will premiere this fall.&nbsp;Known for her skills in the kitchen, Ceyenne co-authored the Caribbean cookbook </span><em data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Cooking in Heels</span></em><span data-dcnode-id="3827" instrument_node="">, while incarcerated on prostitution charges. She is currently working on her second memoir, titled </span><em data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">Out of the Fire and into the Pen. </span></em><span data-dcnode-id="3824" instrument_node="">She is additionally about to start her own podcast titled </span><em data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Tea &amp; Crumpets </span></em><span data-dcnode-id="3821" instrument_node="">with co-host Shear Avory along with others including you, global village. Ceyenne’s belief in life is to inspire yourself to inspire others. </span><br data-dcnode-id="3820"><br data-dcnode-id="3819"><div data-dcnode-id="3811"><strong data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3816"><a data-dcnode-id="3814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-struggles-faced-by-incarcerated-transgender-gender-non-conforming-intersex-and-non-binary-people-effective-reforms-for-jails-and-prisons/" target="_blank"><span data-dcnode-id="3815" instrument_node="">The Struggles Faced by Incarcerated Transgender, Gender Non-conforming, Intersex and Non-binary People: Effective Reforms for Jails and Prisons</span></a><br data-dcnode-id="3813"><br data-dcnode-id="3812"></div><hr data-dcnode-id="3810"><strong data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">Douglas Dreier</span></strong><span data-dcnode-id="3807" instrument_node=""> - </span><span data-dcnode-id="3805" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Doug Dreier is a litigator who represents and advises a range of corporate clients on both sides of the \&quot;v.\&quot; Doug helps companies navigate commercial litigation, arbitration, and federal and state regulatory proceedings. Through his pro bono work, he has been involved in a range of legal matters relating to LGBTQ rights, including filing amicus briefs before the U.S. Supreme Court, U.S. Courts of Appeal, and U.S. District Courts and preparing comments to oppose the U.S. Department of Health &amp; Human Services' proposed rule that would allow discrimination against LGBTQ prospective parents.&quot;}"><span data-dcnode-id="3806" instrument_node="">Doug Dreier is a litigator who represents and advises a range of corporate clients on both sides of the "v." Doug helps companies navigate commercial litigation, arbitration, and federal and state regulatory proceedings. Through his pro bono work, he has been involved in a range of legal matters relating to LGBTQ rights, including filing amicus briefs before the U.S. Supreme Court, U.S. Courts of Appeal, and U.S. District Courts and preparing comments to oppose the U.S. Department of Health &amp; Human Services' proposed rule that would allow discrimination against LGBTQ prospective parents.</span></span><span data-dcnode-id="3804" instrument_node=""> </span><br data-dcnode-id="3803"><br data-dcnode-id="3802"><div data-dcnode-id="3794"><strong data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3799"><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/quashing-hope-a-review-of-recent-efforts-to-disrupt-the-participation-of-lgbtq-individuals-in-the-u-s-foster-care-system-and-their-forming-of-families-through-adoption/" target="_blank"><span data-dcnode-id="3798" instrument_node="">Quashing Hope: A Review of Recent Efforts to Disrupt the Participation of LGBTQ+ Individuals in the U.S. Foster Care System and their Forming of Families Through Adoption</span></a><br data-dcnode-id="3796"><br data-dcnode-id="3795"></div><hr data-dcnode-id="3793"><strong data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">AC Dumlao</span></strong><span data-dcnode-id="3790" instrument_node=""> - </span><span data-dcnode-id="3788" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;AC Dumlao uses they/them pronouns. They are a queer transgender non-binary first-generation American and child of Filipino immigrants. As an activist and educator, their focus is on centering and uplifting underrepresented and multiply marginalized people and their communities. AC is the Program Manager at the Transgender Legal Defense and Education Fund (TLDEF) where they manage TLDEF's Name Change Project, which connects low-income TGNCNB (transgender, gender non-conforming, and non-binary) people with volunteer lawyers providing pro bono representation during the legal name change process in civil court. Additionally, AC leads TLDEF's Education department and is the lead trainer for trans cultural competency presentations and workshops. AC was recently seen at The Wing for an advance screening and talkback with Lisa Ling for the CNN Original Series' episode \&quot;This is Life with Lisa Ling: Gender Fluidity.\&quot; In 2017, AC was profiled by NBC Asian America for the inaugural 'Redefine A to Z' list of Asian-American &amp; Pacific Islander \&quot;emerging voices and breakout stars.\&quot; For their expertise on LGBTQIA+, trans, and non-binary issues, AC has been featured by Allure Magazine and The Daily Beast, been published by The Huffington Post and Vice Media, and been quoted by INTO, Business Insider, Mic.com, The Advocate, NYU's ScienceLine, and more. For their activism, they have received honors from Parity and the New York State Comptroller. They were named a 2019 NYC Pride Community Hero, and were seen on the lead float in the NYC/WorldPride March on June 30, 2019. AC is an alum of Vassar College and resides in Brooklyn, NY&quot;}"><span data-dcnode-id="3789" instrument_node="">AC Dumlao uses they/them pronouns. They are a queer transgender non-binary first-generation American and child of Filipino immigrants. As an activist and educator, their focus is on centering and uplifting underrepresented and multiply marginalized people and their communities. AC is the Program Manager at the Transgender Legal Defense and Education Fund (TLDEF) where they manage TLDEF's Name Change Project, which connects low-income TGNCNB (transgender, gender non-conforming, and non-binary) people with volunteer lawyers providing pro bono representation during the legal name change process in civil court. Additionally, AC leads TLDEF's Education department and is the lead trainer for trans cultural competency presentations and workshops. AC was recently seen at The Wing for an advance screening and talkback with Lisa Ling for the CNN Original Series' episode "This is Life with Lisa Ling: Gender Fluidity." In 2017, AC was profiled by NBC Asian America for the inaugural 'Redefine A to Z' list of Asian-American &amp; Pacific Islander "emerging voices and breakout stars." For their expertise on LGBTQIA+, trans, and non-binary issues, AC has been featured by Allure Magazine and The Daily Beast, been published by The Huffington Post and Vice Media, and been quoted by INTO, Business Insider, Mic.com, The Advocate, NYU's ScienceLine, and more. For their activism, they have received honors from Parity and the New York State Comptroller. They were named a 2019 NYC Pride Community Hero, and were seen on the lead float in the NYC/WorldPride March on June 30, 2019. AC is an alum of Vassar College and resides in Brooklyn, NY.</span></span><span data-dcnode-id="3787" instrument_node=""> </span><br data-dcnode-id="3786"><br data-dcnode-id="3785"><div data-dcnode-id="3777"><strong data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3782"><a data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/changing-names-and-changing-lives-partnering-with-corporate-legal-departments-law-firms-and-legal-service-providers-to-help-transgender-clients-petition-for-legal-name-and-gender-marker-changes/" target="_blank"><span data-dcnode-id="3781" instrument_node="">Changing Names and Changing Lives: Partnering with Corporate Legal Departments, Law Firms, and Legal Service Providers to Help Transgender Clients Petition for Legal Name and Gender Marker Changes</span></a><br data-dcnode-id="3779"><br data-dcnode-id="3778"></div><div data-dcnode-id="3769"><strong data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3774"><a data-dcnode-id="3772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/id-ready-or-not-the-new-frontier-of-transgender-non-binary-and-intersex-identification-document-change-laws-in-2020-and-beyond/" target="_blank"><span data-dcnode-id="3773" instrument_node="">ID Ready or Not?: The New Frontier of Transgender, Non-Binary, and Intersex Identification Document Change Laws in 2020 and Beyond</span></a><br data-dcnode-id="3771"><br data-dcnode-id="3770"></div><hr data-dcnode-id="3768"><strong data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">Maddy Dwertman</span></strong><span data-dcnode-id="3765" instrument_node=""> - </span><p data-dcnode-id="3763" style="font-weight: 400"><span data-dcnode-id="3764" instrument_node="">Maddy Dwertman is a litigation associate at Baker Botts LLP where they represent clients at the trial and appellate level in a broad range of complex litigation matters.&nbsp; They also maintain a pro bono practice focused primarily on the representation of transgender asylum seekers in immigration court proceedings.&nbsp; Maddy is an active member of their firm’s LGBTQ affinity group, the former vice-chair of the Austin LGBT Bar Association, and a current board member of the National Transgender Bar Association, Texas Pride Impact Fund, and the LGBT Law Section of the Texas State Bar Association. Maddy holds a B.A. in Africana Studies and American Civilization from Brown University and graduated from the University of Texas School of Law in 2014.&nbsp; Prior to law school, they worked with queer communities as an educator and organizer at various nonprofits in Baltimore City.</span></p><span data-dcnode-id="3762" instrument_node=""> </span><br data-dcnode-id="3761"><br data-dcnode-id="3760"><hr data-dcnode-id="3759"><strong data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">Lynly S. Egyes</span></strong><span data-dcnode-id="3756" instrument_node=""> - Lynly S. Egyes is the Legal Director at Transgender Law Center. Prior to joining TLC, Lynly was the Legal Director at the Sex Workers Project (SWP) at the Urban Justice Center. During her eight years at SWP, Lynly provided legal services to sex workers and survivors of trafficking. Lynly launched SWP’s LGBT anti-trafficking program and created SWP’s Rapid Court Response Program in response to the police profiling of Translatina women in Queens.&nbsp; In 2014, Lynly began volunteering in Family Detention Centers representing sex workers, trafficking victims and LGBTQ community members.&nbsp; Prior to her work at the Sex Workers Project, Lynly managed the student leadership program at the Gay Lesbian Straight Education Network (GLSEN).&nbsp; At GLSEN, Lynly worked with high school and middle school students throughout the United States who were organizing to create safe schools for LGBTQ youth.&nbsp; Lynly is a trained facilitator with over 15 years of experience facilitating trainings through out the Untied States and Mexico.&nbsp; She authored chapters in, Broadening the Scope of Human Trafficking and Social Work Practice and co-authored the report, Immigration on ICE: A Report on Immigration Home Raids Operations. </span><br data-dcnode-id="3755"><br data-dcnode-id="3754"><div data-dcnode-id="3746"><strong data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3751"><a data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-struggles-faced-by-incarcerated-transgender-gender-non-conforming-intersex-and-non-binary-people-effective-reforms-for-jails-and-prisons/" target="_blank"><span data-dcnode-id="3750" instrument_node="">The Struggles Faced by Incarcerated Transgender, Gender Non-conforming, Intersex and Non-binary People: Effective Reforms for Jails and Prisons</span></a><br data-dcnode-id="3748"><br data-dcnode-id="3747"></div><hr data-dcnode-id="3745"><strong data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">William Eskridge</span></strong><span data-dcnode-id="3742" instrument_node=""> - </span><span data-dcnode-id="3740" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;William Eskridge is the John A. Garver Professor of Jurisprudence at the Yale Law School. On the marriage issue, he authored \&quot;The Case for Same-Sex Marriage\&quot; (Free Press 1996) and is the coauthor (with Christopher Riano) of \&quot;Marriage Equality: From Outlaws to In-Laws\&quot; (Yale Press July/August 2020).&quot;}"><span data-dcnode-id="3741" instrument_node="">William Eskridge is the John A. Garver Professor of Jurisprudence at the Yale Law School. On the marriage issue, he authored "The Case for Same-Sex Marriage" (Free Press 1996) and is the coauthor (with Christopher Riano) of "Marriage Equality: From Outlaws to In-Laws" (Yale Press July/August 2020).</span></span><span data-dcnode-id="3739" instrument_node=""> </span><br data-dcnode-id="3738"><br data-dcnode-id="3737"><div data-dcnode-id="3729"><strong data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3734"><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-fifth-anniversary-of-obergefell-how-we-won-and-what-we-lost/" target="_blank"><span data-dcnode-id="3733" instrument_node="">The Fifth Anniversary of Obergefell: How We Won and What We Lost</span></a><br data-dcnode-id="3731"><br data-dcnode-id="3730"></div><hr data-dcnode-id="3728"><strong data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">James Esseks</span></strong><span data-dcnode-id="3725" instrument_node=""> - James D. Esseks is Director of the ACLU Lesbian Gay Bisexual Transgender &amp; HIV Project. The ACLU works to ensure equal treatment of LGBT people and people living with HIV through litigation, legislative lobbying, policy advocacy, organizing, and public education. James is counsel in&nbsp;</span><i data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">R.G. &amp; G.R. Harris Funeral Homes, Inc. v. EEOC and Aimee Stephens</span></i><span data-dcnode-id="3722" instrument_node="">, and&nbsp;</span><i data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">Altitude Express, Inc. v. Zarda</span></i><span data-dcnode-id="3719" instrument_node="">, in which the United States Supreme Court will address whether anti-LGBT discrimination is a form of sex discrimination that violates Title VII.&nbsp; Previously, James was counsel in&nbsp;</span><i data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">Obergefell v. Hodges</span></i><span data-dcnode-id="3716" instrument_node="">, the case that won the freedom to marry nationwide; in&nbsp;</span><i data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">United States v. Windsor</span></i><span data-dcnode-id="3713" instrument_node="">, the challenge to the federal Defense of Marriage Act; in&nbsp;</span><i data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Gavin Grimm v. Gloucester County School Board</span></i><span data-dcnode-id="3710" instrument_node="">, about whether a Virginia school board can bar a boy from the common restrooms because he is transgender; and in&nbsp;</span><i data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">Masterpiece Cakeshop, Ltd. v. Colorado Civil Rights Commission</span></i><span data-dcnode-id="3707" instrument_node="">, about whether a business open to the public can turn away LGBT customers based on its religious or artistic objections. James and the ACLU have also worked extensively to fight the recent spate of anti-LGBT and specifically anti-transgender bills in the states and to fight the use of religion as an excuse to harm LGBT people. </span><br data-dcnode-id="3706"><br data-dcnode-id="3705"><div data-dcnode-id="3694"><strong data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="3702" instrument_node="">: August 12, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3699"><a data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/title-vii-and-beyond-the-scope-of-lgbtq-employment-law-in-the-aftermath-of-bostock-stephens-zarda/" target="_blank"><span data-dcnode-id="3698" instrument_node="">Title VII and Beyond: The Scope of Civil Rights Protections in the Aftermath of Bostock/Stephens/Zarda</span></a><br data-dcnode-id="3696"><br data-dcnode-id="3695"></div><hr data-dcnode-id="3693"><strong data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">Stacy Ettinger</span></strong><span data-dcnode-id="3690" instrument_node=""> - </span><span data-dcnode-id="3688" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Stacy J. Ettinger is a partner in K&amp;L Gates‚Äô Washington, D.C. office and focuses her practice on public policy. She has over 20 years of experience working in Congress and the executive branch. Prior to joining K&amp;L Gates, Ms. Ettinger served as a senior legal and policy advisor to Senator Charles Schumer, including as Chief Counsel of the United States Senate Committee on Rules and Administration, and as Deputy Staff Director of the Joint Economic Committee. Prior to joining the Senator's legislative team, she served as a senior legal advisor at the U.S. Department of Commerce. Ms. Ettinger advised agency officials on the interpretation and application of U.S. and foreign trade rules, supervised dispute settlement proceedings before the World Trade Organization, and represented the United States in international trade negotiations.&quot;}"><span data-dcnode-id="3689" instrument_node="">Stacy J. Ettinger is a partner in K&amp;L Gates' Washington, D.C. office and focuses her practice on public policy. She has over 20 years of experience working in Congress and the executive branch. Prior to joining K&amp;L Gates, Ms. Ettinger served as a senior legal and policy advisor to Senator Charles Schumer, including as Chief Counsel of the United States Senate Committee on Rules and Administration, and as Deputy Staff Director of the Joint Economic Committee. Prior to joining the Senator's legislative team, she served as a senior legal advisor at the U.S. Department of Commerce. Ms. Ettinger advised agency officials on the interpretation and application of U.S. and foreign trade rules, supervised dispute settlement proceedings before the World Trade Organization, and represented the United States in international trade negotiations.</span></span><span data-dcnode-id="3687" instrument_node=""> </span><br data-dcnode-id="3686"><br data-dcnode-id="3685"><div data-dcnode-id="3677"><strong data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3682"><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/breaking-down-more-than-just-trade-barriers-the-inclusion-of-human-rights-provisions-in-free-trade-agreements/" target="_blank"><span data-dcnode-id="3681" instrument_node="">Breaking Down More Than Just Trade Barriers: The Inclusion of Human Rights Provisions in Free Trade Agreements</span></a><br data-dcnode-id="3679"><br data-dcnode-id="3678"></div><hr data-dcnode-id="3676"><strong data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Randi Ettner</span></strong><span data-dcnode-id="3673" instrument_node=""> - Randi Ettner PhD is a clinical and forensic psychologist. She is the Secretary of the World Professional Association of Transgender Health (WPATH), an author of the Standards of Care, Chair of the Committee for Institutionalized Persons, and recipient of the WPATH Distinguished Education and Advocacy Award. Dr. Ettner has written four books on transgender issues, including a medical and surgical text, numerous peer-reviewed articles and research, and was an internationally syndicated columnist. She was the lead expert in the lawsuit that overturned Medicare’s exclusion of surgery, has been instrumental in the passage of anti-discrimination laws, provided testimony that helped establish legal precedent for the rights of transgender individuals in the workplace and appropriate treatment for prisoners, including the first case that mandated surgery for an incarcerated transwoman. She is a member of the Screen Actors Guild, and has appeared on hundreds of television and radio shows, including Oprah, regarding transgender issues. Dr. Ettner has served as a consultant to corporations, including Walgreen’s and Tawani Enterprises. She was chief psychologist at the Chicago Gender Center, and is the president of New Health Foundation Worldwide. She is the honoree of Randi and Fred Ettner Transgender Health Fellowship at The University of Minnesota Program in Human Sexuality, and is a member of the University of Minnesota’s Leadership Program. Dr. Ettner was invited to present evidence based care of transgender people to the Director of the Office of Civil Rights at the Department of Health and Human Services, and has received a commendation from the United States House of Representatives for her work in gender related issues. </span><br data-dcnode-id="3672"><br data-dcnode-id="3671"><hr data-dcnode-id="3670"><strong data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Chinyere Ezie</span></strong><span data-dcnode-id="3667" instrument_node=""> - </span><span data-dcnode-id="3665" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Chinyere Ezie is a Staff Attorney at the Center for Constitutional Rights, where she advocates for racial justice, gender justice, Lesbian, Gay, Bisexual, Transgender, Queer, and Intersex (LGBTQI) rights, and challenges governmental abuses of power. She is also the originator of #BoycottPrada, a viral campaign challenging racism in the fashion industry that led to a landmark settlement. Prior to joining the Center for Constitutional Rights, Chinyere worked at the Southern Poverty Law Center where she brought cases defending the rights of LGBTQI Southerners. She also served as a Trial Attorney at the U.S. Equal Employment Opportunity Commission, where she litigated employment discrimination cases and secured a $5.1 million jury verdict and historic injunction on behalf of workers who were subjected to religious harassment. Chinyere is a William J. Fulbright Scholar and a graduate of Yale University and Columbia Law School, where she was an Alexander Hamilton Scholar and served as Editor in Chief of the Journal of Gender and Law. She was also named one of the nation's Best LGBT Lawyers Under 40. Chinyere is a frequent speaker at law conferences and her advocacy has been reported on by the New York Times, Washington Post, CNN, NBC, and NPR, among others.&quot;}"><span data-dcnode-id="3666" instrument_node="">Chinyere Ezie is a Staff Attorney at the Center for Constitutional Rights, where she advocates for racial justice, gender justice, Lesbian, Gay, Bisexual, Transgender, Queer, and Intersex (LGBTQI) rights, and challenges governmental abuses of power. She is also the originator of #BoycottPrada, a viral campaign challenging racism in the fashion industry that led to a landmark settlement. Prior to joining the Center for Constitutional Rights, Chinyere worked at the Southern Poverty Law Center where she brought cases defending the rights of LGBTQI Southerners. She also served as a Trial Attorney at the U.S. Equal Employment Opportunity Commission, where she litigated employment discrimination cases and secured a $5.1 million jury verdict and historic injunction on behalf of workers who were subjected to religious harassment. Chinyere is a William J. Fulbright Scholar and a graduate of Yale University and Columbia Law School, where she was an Alexander Hamilton Scholar and served as Editor in Chief of the Journal of Gender and Law. She was also named one of the nation's Best LGBT Lawyers Under 40. Chinyere is a frequent speaker at law conferences and her advocacy has been reported on by the New York Times, Washington Post, CNN, NBC, and NPR, among others.</span></span><span data-dcnode-id="3664" instrument_node=""> </span><br data-dcnode-id="3663"><br data-dcnode-id="3662"><div data-dcnode-id="3654"><strong data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3659"><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/strolling-the-halls-of-power-interjurisdictional-lessons-from-the-legislative-efforts-to-decriminalize-sex-work/" target="_blank"><span data-dcnode-id="3658" instrument_node="">Strolling the Halls of Power: Interjurisdictional Lessons from the Legislative Efforts to Decriminalize Sex Work</span></a><br data-dcnode-id="3656"><br data-dcnode-id="3655"></div><hr data-dcnode-id="3653"><strong data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Cameron Faber</span></strong><span data-dcnode-id="3650" instrument_node=""> - </span><span data-dcnode-id="3648" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Cameron Faber is an accomplished General Counsel with over thirty-five years' experience in litigation and corporate work, both in-house and in law firms. His experience includes leading the law department of a major nonprofit corporation, managing claims and litigation, corporate governance, privacy and HIPAA law, risk management, compliance in highly-regulated industries, and corporate and real estate transactions.&quot;}"><span data-dcnode-id="3649" instrument_node="">Cameron Faber is an accomplished General Counsel with over thirty-five years' experience in litigation and corporate work, both in-house and in law firms. His experience includes leading the law department of a major nonprofit corporation, managing claims and litigation, corporate governance, privacy and HIPAA law, risk management, compliance in highly-regulated industries, and corporate and real estate transactions.</span></span><span data-dcnode-id="3647" instrument_node=""> </span><br data-dcnode-id="3646"><br data-dcnode-id="3645"><div data-dcnode-id="3637"><strong data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3642"><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/swipe-right-health-care-privacy-in-the-era-of-smart-devices-and-digital-health/" target="_blank"><span data-dcnode-id="3641" instrument_node="">Swipe Right: Health Care Privacy in the Era of Smart Devices and Digital Health</span></a><br data-dcnode-id="3639"><br data-dcnode-id="3638"></div><hr data-dcnode-id="3636"><strong data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">Mieko Failey</span></strong><span data-dcnode-id="3633" instrument_node=""> - Mieko Failey, Esq. (she/her) is the Director of Legal Services at the LGBTQ Center Long Beach where she oversees LBGTQ-specific legal services for the greater Long Beach area, including comprehensive direct legal services to LGBTQ survivors of violence. Mieko began working in anti-violence in 2007 and has a concentration in LGBTQ anti-violence legal issues. From 2011 to 2018, Mieko served in various legal advocacy roles at the Los Angeles LGBT Center, including as Supervising Attorney for the Legal Services Department where she oversaw domestic and sexual violence legal service provision. In her role as Supervising Attorney, Mieko supervised a wide range of legal issues, including domestic and sexual violence, hate violence, stalking, human trafficking, and other forms of violence. She has served hundreds of LGBTQ survivors and trained thousands of service providers locally, across the state, and nationally, including judges, court personnel, law enforcement, attorneys, mental health providers, and physicians. Mieko’s legal advocacy is focused on overcoming barriers in access to resources for LGBTQ survivors, who are disproportionally impacted by violence. During law school, Mieko interned with the American Civil Liberties Union (ACLU) of Southern California’s LGBT Student Rights Project and The Center for Juvenile Law and Policy, advocating for those who were wrongfully convicted or unfairly sentenced as juveniles. Mieko was a recipient of the Post-Graduate Loyola Law School Public Interest Legal Fellowship, which enabled her to provide legal advocacy on behalf of LGBTQ youth survivors of violence at the Los Angeles LGBT Center. Mieko currently serves on the Executive Board of the Los Angeles County Domestic Violence Council where she is Co-Chair of the LGBT Domestic Violence Issues Committee. She serves on the Advisory Board of the Family Violence Appellate Project, is a Board Member of the California Conference for Equality and Justice (CCEJ), and serves as regular training faculty for the American Bar Association’s Commission on Domestic and Sexual Violence. Mieko has received local and national recognition for her advocacy on behalf of LGBTQ communities, including The Donald L. Snow Award from The LGBT Bar Association of Los Angeles; The Student Leadership Award from The National LGBT Bar Association; The Dean’s Service Award from Loyola Law School, Los Angeles; and the Women of Distinction Award from California State Assmeblymember Patrick O’Donnell. In 2019, Mieko was named a “Best LGBTQ+ Lawyers Under 40” by the National LGBT Bar Association. Mieko received her Bachelors in Sociology with highest distinction from UC Berkeley and received her Juris Doctor from Loyola Law School with a Public Interest Concentration. </span><br data-dcnode-id="3632"><br data-dcnode-id="3631"><div data-dcnode-id="3622"><strong data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">Law Student Career Planning Program</span></strong><span data-dcnode-id="3628" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="3627"><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/career-planning-program/" target="_blank"><span data-dcnode-id="3626" instrument_node="">Career Services and Job Search Strategies for LGBTQ+ Law Students</span></a><br data-dcnode-id="3624"><br data-dcnode-id="3623"></div><hr data-dcnode-id="3621"><strong data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Praveen Fernandes</span></strong><span data-dcnode-id="3618" instrument_node=""> - Praveen is Vice President for Public Engagement at Constitutional Accountability Center (CAC). He comes to CAC from The Raben Group, where he was a Principal, advising non-profit clients on issues including LGBTQ equality, criminal justice, wealth inequality, digital equity, and judicial nominations. Before the Raben Group, Praveen was a political appointee in the Obama Administration, serving as Senior Counsel and Advisor to the General Counsel at the Office of Personnel Management (OPM). At OPM, he focused on LGBTQ issues, particularly the federal government’s policies relating to transgender employees and the federal government’s implementation of&nbsp;</span><em data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">U.S. v. Windsor</span></em><span data-dcnode-id="3615" instrument_node="">, the Supreme Court decision that struck down Section 3 of the Defense of Marriage Act. Additionally, he worked on issues relating to workforce diversity, parental leave, contracting, national security, and workplace discrimination. Praveen has also worked at the American Constitution Society for Law and Policy, Justice at Stake, the Human Rights Campaign, Patton Boggs, Ropes &amp; Gray, and the President’s Commission on Human Radiation Experiments (a bioethics advisory committee tasked with preparing and presenting a report to President Clinton). He began his career on Capitol Hill, where he served on Senator Edward M. Kennedy’s Labor Committee staff. Praveen earned his J.D. from the University of North Carolina School of Law, and his M.P.H. from the University of North Carolina Gillings School of Public Health. While in law school, he was a Note and Comment Editor on the</span><em data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">&nbsp;North Carolina Journal of International Law and Commercial Regulation</span></em><span data-dcnode-id="3612" instrument_node="">. He graduated with honors from Brown University, where his undergraduate concentration was in Biomedical Ethics. In 2010, Praveen was named on the National LGBT Bar Association’s “Top 40 Under 40” list. </span><br data-dcnode-id="3611"><br data-dcnode-id="3610"><div data-dcnode-id="3602"><strong data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3607"><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/discrimination-on-the-governmental-dime/" target="_blank"><span data-dcnode-id="3606" instrument_node="">Discrimination on the Governmental Dime</span></a><br data-dcnode-id="3604"><br data-dcnode-id="3603"></div><hr data-dcnode-id="3601"><strong data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Brett Figlewski</span></strong><span data-dcnode-id="3598" instrument_node=""> - </span><span data-dcnode-id="3596" data-sheets-userformat="{&quot;2&quot;:14977,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;The Rev. Brett M. Figlewski, Esq., joined the LGBT Bar Association of New York (LeGaL) as its first Legal Director in 2015. A graduate of Vanderbilt Law School and Middlebury College, Brett worked for a decade as a family law litigator for LGBT victims of domestic violence and sex trafficking, including advocacy for Fair Access to Family Court and co-authorship of the article, “Trafficking and the Commercial Sexual Exploitation of Young Men and Boys”. Brett oversees LeGaL’s vital Helpline and network of drop-in clinics, which assist thousands of members of the community each year; an attorney referral system and placement of pro bono cases; and education and outreach for the organization’s members and the wider community. Brett was part of the legal team which represented Brooke B. in her landmark 2016 N.Y. Court of Appeals case recognizing the rights of LGBT parents, and he continues to focus on litigation and advocacy for the full legal protection of LGBT families. Brett was ordained a priest in the Episcopal Church in 2018. &quot;}"><span data-dcnode-id="3597" instrument_node="">The Rev. Brett M. Figlewski, Esq., joined the LGBT Bar Association of New York (LeGaL) as its first Legal Director in 2015. A graduate of Vanderbilt Law School and Middlebury College, Brett worked for a decade as a family law litigator for LGBT victims of domestic violence and sex trafficking, including advocacy for Fair Access to Family Court and co-authorship of the article, “Trafficking and the Commercial Sexual Exploitation of Young Men and Boys”. Brett oversees LeGaL’s vital Helpline and network of drop-in clinics, which assist thousands of members of the community each year; an attorney referral system and placement of pro bono cases; and education and outreach for the organization’s members and the wider community. Brett was part of the legal team which represented Brooke B. in her landmark 2016 N.Y. Court of Appeals case recognizing the rights of LGBT parents, and he continues to focus on litigation and advocacy for the full legal protection of LGBT families. Brett was ordained a priest in the Episcopal Church in 2018. </span></span><span data-dcnode-id="3595" instrument_node=""> </span><br data-dcnode-id="3594"><br data-dcnode-id="3593"><hr data-dcnode-id="3592"><strong data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Judge Tara Flanagan</span></strong><span data-dcnode-id="3589" instrument_node=""> - Judge Tara Flanagan joined the Alameda County Superior Court in January of 2013 after winning election in June 2012, and is now in her seventh (7th) year of service to Alameda County, California. After serving her first two years as a judge in Family Law and four years in the Criminal Law Division, she now hears Juvenile Dependency matters. Her extra-judicial duties include prior service on the board of the Alameda County Bar Association’s ‘Legal Access Alameda’, where underserved members of the community get help accessing the justice system, and also as a board member of the International Association of LGBTQ Judges. Previously, as an attorney, Judge Flanagan was a civil litigator, a Los Angeles County prosecutor and later a legal aid attorney helping families that suffered from domestic violence. As an attorney, she was a sought-out speaker about LGBTQ domestic violence. She also served on the board of directors of many D.V., LGBTQ, and women lawyers’ organizations. Prior to the practice of law, Judge Flanagan was a competitive athlete. She completed her undergraduate degree while on an athletic scholarship (basketball) and later took up the sport of rugby, where she was selected to the USA Women’s National Rugby Team, and played in two World Cups for the USA. Now retired from athletic competitions, Judge Flanagan enjoys long-distance bicycling, her dog, and traveling with her partner, a television director. </span><br data-dcnode-id="3588"><br data-dcnode-id="3587"><div data-dcnode-id="3579"><strong data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3584"><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/judicial-nuts-bolts-academy/" target="_blank"><span data-dcnode-id="3583" instrument_node="">Nuts &amp; Bolts Academy for Judicial Candidates</span></a><br data-dcnode-id="3581"><br data-dcnode-id="3580"></div><hr data-dcnode-id="3578"><strong data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Diana Flynn</span></strong><span data-dcnode-id="3575" instrument_node=""> - Diana Flynn is the Litigation Director of Lambda Legal, the country’s largest and oldest legal organization committed to achieving full recognition of the civil rights of lesbians, gay men, bisexuals, transgender people and individuals living with HIV. Ms. Flynn is a long-time director of highly-regarded national litigation and legal counsel programs and has achieved great success in both the federal and non-profit sectors. An experienced lawyer and federally-qualified Senior Executive, Ms. Flynn has led the litigation efforts on cases that have helped lay the legal foundation for some of the most important principles of constitutional and civil rights law. Ms. Flynn was appointed Litigation Director at Lambda Legal in the Spring of 2018. In that role, she directs and manages all the organization’s litigation efforts across the nation and leads the attorneys and support staff responsible for those activities. In addition to her leadership of the program, Ms. Flynn serves personally as counsel on the litigation teams of some of Lambda’s most significant cases, including the challenge to the Trump Administration’s military trans ban, and the efforts to secure fair and equal treatment for trans students in the&nbsp;</span><i data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Drew Adams</span></i><span data-dcnode-id="3572" instrument_node="">&nbsp;case. Prior to her arrival at Lambda in the Spring of 2018, Ms. Flynn served for many years as the Chief of the Appellate Section of the U.S. Department of Justice’s Civil Rights Division. Under her leadership, the Section established the Division records for appellate success and productivity. She led the Section in its filing of more than 2,500 briefs, and its litigation success rate of well over eighty percent. While at DOJ, Flynn personally led the legal counsel project that laid the groundwork for the Holder Justice Department’s application of sex discrimination laws to prohibit discrimination based on transgender status. She also managed the Civil Rights Division’s efforts in connection with the&nbsp;</span><i data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">Defense of Marriage Act</span></i><span data-dcnode-id="3569" instrument_node="">&nbsp;litigation and worked with the Office of the Solicitor General and the Civil Division on the&nbsp;</span><i data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Windsor</span></i><span data-dcnode-id="3566" instrument_node="">,&nbsp;</span><i data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Proposition 8</span></i><span data-dcnode-id="3563" instrument_node="">&nbsp;and&nbsp;</span><i data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Obergefell&nbsp;</span></i><span data-dcnode-id="3560" instrument_node="">cases in the Supreme Court. Ms. Flynn is currently serving a second term as Commissioner of the American Bar Association’s Commission on Sexual Orientation and Gender Identity, an appointment made by the ABA’s President. Flynn is a graduate of the Yale Law School and a summa cum laude graduate of the University of Rochester. </span><br data-dcnode-id="3559"><br data-dcnode-id="3558"><div data-dcnode-id="3550"><strong data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3555"><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/discrimination-on-the-governmental-dime/" target="_blank"><span data-dcnode-id="3554" instrument_node="">Discrimination on the Governmental Dime</span></a><br data-dcnode-id="3552"><br data-dcnode-id="3551"></div><div data-dcnode-id="3542"><strong data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3547"><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/whats-left-for-transgender-rights-after-harris-funeral-homes-v-eeoc/" target="_blank"><span data-dcnode-id="3546" instrument_node="">What's Left for Transgender Rights After Harris Funeral Homes v EEOC</span></a><br data-dcnode-id="3544"><br data-dcnode-id="3543"></div><hr data-dcnode-id="3541"><strong data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Christian Fuscarino</span></strong><span data-dcnode-id="3538" instrument_node=""> - </span><span data-dcnode-id="3536" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Christian Fuscarino has deep roots in New Jersey, growing up in Belmar and spending much of his youth in and around Asbury Park. Fuscarino has been an activist and organizer in the LGBTQ community for over a decade. He credits his positive experiences in Asbury Park as helping influence him to become an activist. In 2016, PolitickerNJ named Christian the 2nd most influential advocate in New Jersey politics and later that year The Observer listed him on the Power List 100. At GLSEN, Christian worked with high school Gay Straight Alliances (GSA) for several years. In 2007, Christian joined the Pride Connections Center of New Jersey as a program developer serving gay inner-city youth. That same year, he won a student Emmy award from the National Academy of Television Arts and Sciences for his End the Silence public service announcement. In 2008, Christian founded The Pride Network, a national leadership development non-profit. In 2013, Christian joined Alan van Capelle, former Executive Director of Empire State Pride Agenda, by serving as his digital strategist at Bend the Arc: A Jewish Partnership for Justice. They focused on mobilizing Jews to advance social issues by speaking out against injustice and inequality. One of the organization‚Äôs greatest accomplishments was a campaign that resulted in California Governor Jerry Brown signing The Domestic Workers Bill of Rights. Christian served as the Communications Director for the Educational Alliance until 2016. The Alliance is a non-profit organization that aims to break the cycle of poverty for low-income children and families through preschool, after school and college prep programs. Fuscarino's volunteer work has received numerous accolades, including recognition from the New Jersey State Senate and Assembly, Congressmen Bill Pascrell and Donald Payne, U.S. Senators Robert Menendez and Frank Lautenberg, and Governor Jon Corzine. Media outlets such as CBS News, Sirius XM and Genre Magazine have featured Christian in groundbreaking stories. Hofstra University honored Christian, an alum, as their 2012 Man of the Year for his work developing a safe-campus space for LGBTQ students while earning his BA in digital media and LGBTQ stu
