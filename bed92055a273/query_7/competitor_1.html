nders in affordable housing and other community development projects throughout Ohio and neighboring states. Randy received JD (cum laude) and MBA degrees from Case Western Reserve University, where he served as an Articles Editor of the Case Western Reserve Law Review. He was admitted to the Ohio bar in 1986, and established his solo practice in 1994. He has served on the Cleveland Landmarks Commission and on the boards of various nonprofit organizations. Randy has been a frequent speaker at affordable housing conferences and seminars, and currently serves as the liaison between the ABA Forum on Affordable Housing and Community Development Law and Diversity Commission on Sexual Orientation and Gender Identity.</span></span><span data-dcnode-id="1340" instrument_node=""> </span><br data-dcnode-id="1339"><br data-dcnode-id="1338"><div data-dcnode-id="1330"><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1335"><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-state-of-housing-law-affordable-housing-policy-and-development-for-lgbtq-communities/" target="_blank"><span data-dcnode-id="1334" instrument_node="">The State of Housing Law: Affordable Housing Policy and Development for LGBTQ Communities</span></a><br data-dcnode-id="1332"><br data-dcnode-id="1331"></div><hr data-dcnode-id="1329"><strong data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Katherine Silver</span></strong><span data-dcnode-id="1326" instrument_node=""> - Tough, fearless, prepared, passionate about winning – these are just a few of the adjectives clients and colleagues use to describe Kathy Silver. A litigation attorney who focuses primarily on commercial litigation and oil and gaslitigation, Kathy has distinguished herself as a skilled trial lawyer who is absolutely dedicated to her clients’ success. As one colleague said, “Kathy Silver’s clients know that she tries very hard on the front end of a case to resolve it without going to trial in order to save them time and money. However, when clients do go to trial, she is one tough litigator, and her clients appreciate it.” Kathy has represented numerous large and small companies in complex commercial and contract disputes, both as plaintiffs and defendants. Kathy has defended a chemical company in high‐profile commercial disputes, including defending a significant matter brought by the Mexican national oil company against several U.S. energy and chemical companies related to claims of conversion of millions of dollars of alleged stolen hydrocarbons. She has handled lawsuits involving contractual and fiduciary duties between joint venturers in a natural gas field; duties owed by operators and working interest owners under joint operating agreements; express and implied covenants in oil and gas leases; royalty disputes; disputes regarding the purchase and sale of hydrocarbons, drainage claims; failed production tubing in a gas well; claims of lease termination, trespass, fraud, fraudulent inducement, and slander of title; and an arbitration involving post‐ closing accounting and title issues related to the purchase of oil and gas properties. In addition, Kathy has developed experience in health care litigation, representing a managed care company in benefit disputes and in disputes with health care providers related to allegations of underpayment of provider claims and breach of in‐ network contracts. Kathy also has developed experience in employment litigation and recently tried an employee theft case and two federal lawsuits involving claims brought under the Fair Labor Standards Act. </span><br data-dcnode-id="1325"><br data-dcnode-id="1324"><div data-dcnode-id="1316"><strong data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1321"><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/navigating-client-expectations-an-experiential-journey-for-diverse-practitioners/" target="_blank"><span data-dcnode-id="1320" instrument_node="">Navigating Client Expectations: An Experiential Journey for Diverse Practitioners</span></a><br data-dcnode-id="1318"><br data-dcnode-id="1317"></div><hr data-dcnode-id="1315"><strong data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Ames Simmons</span></strong><span data-dcnode-id="1312" instrument_node=""> - </span><span data-dcnode-id="1310" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Ames Simmons is a queer white trans man serving as Equality NC's Policy Director. He is a Senior Lecturing Fellow at Duke Law School and a member of the national advisory council for the SAGE/HRC Long-Term Care Equality Index. He provides vision and strategic direction for Equality NC's policy and advocacy agenda with the North Carolina General Assembly and the state's executive branch and administrative agencies. He also works with local governments and federal policymakers to achieve Equality NC's mission of health, equity and safety for all LGBTQ North Carolinians. His work is rooted in community-based efforts prioritizing anti-violence, anti-oppression and transgender justice. Ames attended Agnes Scott College in Decatur, GA, graduating with a B.A. in Political Science and Spanish, and Emory University Law School, where he earned a juris doctor degree. He previously served for almost two decades as in-house counsel at a healthcare consulting company based in Atlanta. Ames is licensed to practice law in North Carolina and Georgia.&quot;}"><span data-dcnode-id="1311" instrument_node="">Ames Simmons is a queer white trans man serving as Equality NC's Policy Director. He is a Senior Lecturing Fellow at Duke Law School and a member of the national advisory council for the SAGE/HRC Long-Term Care Equality Index. He provides vision and strategic direction for Equality NC's policy and advocacy agenda with the North Carolina General Assembly and the state's executive branch and administrative agencies. He also works with local governments and federal policymakers to achieve Equality NC's mission of health, equity and safety for all LGBTQ North Carolinians. His work is rooted in community-based efforts prioritizing anti-violence, anti-oppression and transgender justice. Ames attended Agnes Scott College in Decatur, GA, graduating with a B.A. in Political Science and Spanish, and Emory University Law School, where he earned a juris doctor degree. He previously served for almost two decades as in-house counsel at a healthcare consulting company based in Atlanta. Ames is licensed to practice law in North Carolina and Georgia.</span></span><span data-dcnode-id="1309" instrument_node=""> </span><br data-dcnode-id="1308"><br data-dcnode-id="1307"><div data-dcnode-id="1299"><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1304"><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/aging-end-of-life-legal-issues-in-the-transgender-community/" target="_blank"><span data-dcnode-id="1303" instrument_node="">Aging and End-of-Life Legal Issues in the Transgender Community</span></a><br data-dcnode-id="1301"><br data-dcnode-id="1300"></div><hr data-dcnode-id="1298"><strong data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Libby Skarin</span></strong><span data-dcnode-id="1295" instrument_node=""> - </span><span data-dcnode-id="1293" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Libby Skarin is the policy director of the ACLU of South Dakota and has served in this role since 2014. As policy director, Libby develops and implements strategies to advance civil rights and civil liberties throughout the state. Libby helped organize opposition to HB1057 and other anti-trans bills in South Dakota.&quot;}"><span data-dcnode-id="1294" instrument_node="">Libby Skarin is the policy director of the ACLU of South Dakota and has served in this role since 2014. As policy director, Libby develops and implements strategies to advance civil rights and civil liberties throughout the state. Libby helped organize opposition to HB1057 and other anti-trans bills in South Dakota.</span></span><span data-dcnode-id="1292" instrument_node=""> </span><br data-dcnode-id="1291"><br data-dcnode-id="1290"><div data-dcnode-id="1279"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="1287" instrument_node="">: August 13, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1284"><a data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/why-trans-kids-why-now-the-reactionary-attack-on-transgender-rights/" target="_blank"><span data-dcnode-id="1283" instrument_node="">Why Trans Kids, Why Now: The Reactionary Attack on Transgender Rights</span></a><br data-dcnode-id="1281"><br data-dcnode-id="1280"></div><hr data-dcnode-id="1278"><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Shelly Skeen</span></strong><span data-dcnode-id="1275" instrument_node=""> - Shelly has practiced law in state and federal courts, including the Texas and United States Supreme Courts, for 20 years. Shelly is a mediator and arbitrator as well earning &nbsp;a Diploma in International Arbitration from the Chartered Institute of Arbitrators in London.&nbsp; She is a frequent speaker and author on LGBT law and online free speech. Shelly recently earned an LL.M. in Constitutional Law and Law &amp; Sexuality from UCLA School of Law and is now a Senior Staff Attorney for Lambda Legal, whose mission is to achieve full recognition of the civil rights of LGBTQ+ people and those with HIV through impact litigation, education, and policy work.&nbsp; Shelly also teaches LGBT law as an adjunct professor in Texas. </span><br data-dcnode-id="1274"><br data-dcnode-id="1273"><div data-dcnode-id="1265"><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1270"><a data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/silver-pride-aunt-samantha-wants-you-to-advocate-for-lgbt-elders/" target="_blank"><span data-dcnode-id="1269" instrument_node="">Silver Pride: Aunt Samantha Wants YOU to Advocate for LGBTQ+ Elders</span></a><br data-dcnode-id="1267"><br data-dcnode-id="1266"></div><div data-dcnode-id="1257"><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1262"><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/beyond-the-litigation-mindset-how-to-effectuate-lasting-change-inside-and-outside-the-courtroom-in-hostile-jurisdictions/" target="_blank"><span data-dcnode-id="1261" instrument_node="">Beyond the “Litigation” Mindset: How to Effectuate Lasting Change Inside and Outside the Courtroom in Hostile Jurisdictions</span></a><br data-dcnode-id="1259"><br data-dcnode-id="1258"></div><hr data-dcnode-id="1256"><strong data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Paul Smith</span></strong><span data-dcnode-id="1253" instrument_node=""> - Paul M. Smith is also the Vice President for Litigation and Strategy at the Campaign Legal Center. Until 2017 he was in private practice at the firm of Jenner &amp; Block LLP. He had an active appellate practice for several decades, including oral arguments in 21 Supreme Court cases in a wide range of cases but emphasizing civil rights and civil liberties issues. Among his important victories have been&nbsp;</span><i data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Lawrence v. Texas</span></i><span data-dcnode-id="1250" instrument_node="">, the landmark gay rights case, and Brown v. Entertainment Merchants Ass’n, establishing the First Amendment rights of those who produce and sell video games. Professor Smith also argued a long list of voting rights cases in the Supreme Court. Chambers USA has repeatedly named Professor Smith one of the country’s leading lawyers in appellate litigation, media and entertainment law, and First Amendment litigation for multiple years. In 2010, The National Law Journal named him one of the “Decade’s Most Influential Lawyers,” and the ABA Section of Civil Rights and Social Justice gave him its prestigious Thurgood Marshall Award for his work promoting civil rights and civil liberties. He has won similar awards from the American Constitution Society, the DC Bar, the Legal Aid Society of DC, the Electronic Privacy Information Center, and the Human Rights Campaign. In 2015 Professor Smith received an honorary degree from his alma mater, Amherst College. He is a board member and former President of the D.C. Bar Foundation, a Trustee of Amherst College, and a board member of EPIC, the Folger Shakespeare Library, and the Castleton Festival. Professor Smith attended Yale Law School, where he was Editor-in-Chief of the Yale Law Journal, and then clerked for Judge James Oakes on the Second Circuit and Supreme Court Justice Lewis F. Powell Jr. </span><br data-dcnode-id="1249"><br data-dcnode-id="1248"><div data-dcnode-id="1240"><strong data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1245"><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/discrimination-on-the-governmental-dime/" target="_blank"><span data-dcnode-id="1244" instrument_node="">Discrimination on the Governmental Dime</span></a><br data-dcnode-id="1242"><br data-dcnode-id="1241"></div><div data-dcnode-id="1232"><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1237"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/supreme-court-review-2019-2020-term/" target="_blank"><span data-dcnode-id="1236" instrument_node="">Supreme Court Review: The Blockbuster 2019-2020 Term</span></a><br data-dcnode-id="1234"><br data-dcnode-id="1233"></div><hr data-dcnode-id="1231"><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Fred Smith Jr.</span></strong><span data-dcnode-id="1228" instrument_node=""> - Fred Smith Jr. is associate professor at Emory University School of Law. He is a scholar of the federal judiciary and constitutional law. In 2019, he was named the law school’s Outstanding Professor of the Year. Smith clerked for Judge Myron Thompson of the Middle District of Alabama; Judge Barrington D. Parker, Jr. of the United States Court of Appeals for the Second Circuit; and Justice Sonia Sotomayor of the United States Supreme Court. Prior to teaching, he also worked as a fellow for a litigation boutique, Bondurant, Mixson &amp; Elmore LLP in Atlanta. Smith's research focuses on accountability, federal jurisdiction, and state sovereignty. His work has appeared in&nbsp;</span><em data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Harvard Law Review</span></em><span data-dcnode-id="1225" instrument_node="">,&nbsp;</span><em data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Stanford Law Review</span></em><span data-dcnode-id="1222" instrument_node="">,&nbsp;</span><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Columbia Law Review, New York University Law Review, Vanderbilt Law Review,</span></em><span data-dcnode-id="1219" instrument_node="">&nbsp;</span><em data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Notre Dame Law Review&nbsp;</span></em><span data-dcnode-id="1216" instrument_node="">and</span><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">&nbsp;Fordham Law Review</span></em><span data-dcnode-id="1213" instrument_node="">. Notable articles include: “The Constitution After Death,” 121&nbsp;</span><i data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Colum. L. Rev.&nbsp;</span></i><span data-dcnode-id="1210" instrument_node="">(forthcoming); “Abstention in the Time of Ferguson,” 131&nbsp;</span><i data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Harv. L. Rev.</span></i><span data-dcnode-id="1207" instrument_node="">&nbsp;2283 (2018); "Undemocratic Restraint," 69&nbsp;</span><i data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Vand. L. Rev.</span></i><span data-dcnode-id="1204" instrument_node="">&nbsp;845 (2017); "Local Sovereign Immunity," 116&nbsp;</span><i data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Colum. L. Rev.</span></i><span data-dcnode-id="1201" instrument_node="">&nbsp;409 (2016), and "Due Process, Republicanism, and Direct Democracy," 89</span><i data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">&nbsp;N.Y.U.</span></i><span data-dcnode-id="1198" instrument_node="">&nbsp;</span><em data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">L. Rev.</span></em><span data-dcnode-id="1195" instrument_node="">&nbsp;582 (2014). He has given lectures on related topics across the United States and internationally, including in Istanbul, Shanghai, and Warsaw. He also has been interviewed as an expert by major media outlets, including the&nbsp;</span><i data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">New York Times,&nbsp;</span></i><span data-dcnode-id="1192" instrument_node="">the&nbsp;</span><i data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Washington Post</span></i><span data-dcnode-id="1189" instrument_node="">, the&nbsp;</span><i data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Atlanta Journal-Constitution</span></i><span data-dcnode-id="1186" instrument_node="">, and various affiliates of National Public Radio. Smith earned his JD from Stanford Law School in 2007. At Stanford, he was a member of the Supreme Court Litigation Clinic; was a finalist in the annual Kirkwood Moot Court Competition; was a finalist in the American Constitution Society's national Moot Court Competition; served as president of the Black Law Students Association; and served as articles editor for the&nbsp;</span><em data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Stanford Law and Policy Review</span></em><span data-dcnode-id="1183" instrument_node="">. In 2004, he received his BA with Honors from Harvard College; his thesis was awarded&nbsp;magna cum laude. </span><br data-dcnode-id="1182"><br data-dcnode-id="1181"><div data-dcnode-id="1173"><strong data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1178"><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/demands-for-religious-accommodation-from-non-discrimination-laws-a-comparative-approach-among-the-united-states-and-other-western-democracies/" target="_blank"><span data-dcnode-id="1177" instrument_node="">Demands for Religious Accommodation from Non-Discrimination Laws: A Comparative Approach Among the United States and Other Western Democracies</span></a><br data-dcnode-id="1175"><br data-dcnode-id="1174"></div><hr data-dcnode-id="1172"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Emily Smith-Reid</span></strong><span data-dcnode-id="1169" instrument_node=""> - Emily Smith-Reid&nbsp;is a Deputy General Counsel at HSBC. She splits her time between two roles: general counsel support for the Global Retail Banking business; and Global Head of competition law for all HSBC business lines and regions. She sits on the Group Legal Risk Executive Committee, which oversees legal risk management across the whole organization. She is also chair of the legal Diversity &amp; Inclusion ambassadors network. Emily joined HSBC in 2001 and prior to that spent c. 7 years at British Telecom in London as senior competition and regulatory counsel. Whilst at BT she also spent 3 years outside of legal, working in purely business roles in new product development and corporate strategy. Emily qualified into the Antitrust, Competition &amp; Trade team at Freshfields in 2000. During this time she worked in their London, Washington, DC and Singapore offices and gained broad experience working for blue-chip clients in a diverse range of industry sectors sectors. Outside HSBC, Emily is a trustee of the international charity Consortium for Street Children. She is married to her wife, Rosalind, and has two children. </span><br data-dcnode-id="1168"><br data-dcnode-id="1167"><hr data-dcnode-id="1166"><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Jorge Soto</span></strong><span data-dcnode-id="1163" instrument_node=""> - </span><span data-dcnode-id="1161" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;As Director of Public Policy, Jorge Andres Soto is responsible for advancing NFHA's public policy priorities and directing the organization federal and congressional advocacy. Through local and national coalition-building, Mr. Soto designs strategies to advocate for policies that help protect individuals from housing discrimination, strengthen access to justice for victims of housing discrimination, and remove obstacles to housing opportunity. He leads NFHA's efforts on issues concerning the federal budget and appropriations, housing and housing-related legislation, and executive nominations. Mr. Soto also staffs the Fair Housing &amp; Lending Task Force of the Leadership Conference on Civil and Human Rights, which NFHA co-chairs with NAACP LDF. He also serves on the Congressional Progressive Caucus Center's Policy and Research Council. Mr. Soto is a graduate of Wesleyan University with a double major in History and American Studies.&quot;}"><span data-dcnode-id="1162" instrument_node="">As Director of Public Policy, Jorge Andres Soto is responsible for advancing NFHA's public policy priorities and directing the organization federal and congressional advocacy. Through local and national coalition-building, Mr. Soto designs strategies to advocate for policies that help protect individuals from housing discrimination, strengthen access to justice for victims of housing discrimination, and remove obstacles to housing opportunity. He leads NFHA's efforts on issues concerning the federal budget and appropriations, housing and housing-related legislation, and executive nominations. Mr. Soto also staffs the Fair Housing &amp; Lending Task Force of the Leadership Conference on Civil and Human Rights, which NFHA co-chairs with NAACP LDF. He also serves on the Congressional Progressive Caucus Center's Policy and Research Council. Mr. Soto is a graduate of Wesleyan University with a double major in History and American Studies.</span></span><span data-dcnode-id="1160" instrument_node=""> </span><br data-dcnode-id="1159"><br data-dcnode-id="1158"><div data-dcnode-id="1150"><strong data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1155"><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-state-of-housing-law-affordable-housing-policy-and-development-for-lgbtq-communities/" target="_blank"><span data-dcnode-id="1154" instrument_node="">The State of Housing Law: Affordable Housing Policy and Development for LGBTQ Communities</span></a><br data-dcnode-id="1152"><br data-dcnode-id="1151"></div><hr data-dcnode-id="1149"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Tamika Spellman</span></strong><span data-dcnode-id="1146" instrument_node=""> - Tamika Spellman began working with HIPS in June 2017. She started volunteering with mobile services, then as a peer educator and then with the secondary syringe exchange program. She is dedicated to helping and working to create positive policies and laws to help those engaging in sex work and drug use. She’s testified on behalf of HIPS at DC city council hearings, spoken on several harm reduction panels, and is managing SWAC (DECRIMNOW). She also serves as an advisor to the Sex Worker Giving Circle, the Chosen Few, No Justice No Pride, is a member of the Urban Survivors Union, and a board member for the Church Of Safe Injection-Bangor Maine. She also has featured op eds in The Root and Medium, appears in several articles and is the recipient of an award from the Legal Society of Washington D.C. for work on the fare evasion bill. Also advised congressional members Ro Khanna and Ayanna Pressely on proposed legislation. HIPS is extremely honored to have Tamika as our Policy and Advocacy Associate. </span><br data-dcnode-id="1145"><br data-dcnode-id="1144"><hr data-dcnode-id="1143"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">John Francis Stephens</span></strong><span data-dcnode-id="1140" instrument_node=""> - </span><p data-dcnode-id="1138" style="font-weight: 400"><span data-dcnode-id="1139" instrument_node="">As lead counsel for data privacy, cyber and live entertainment at Hendricks Law, P.C., John Stephens stands at the forefront of information privacy, digital marketing, new media and entertainment-related legal issues. He is known for his wide-ranging practice covering data security, intellectual property licensing, specialty insurance coverage and litigation, and media and entertainment transactions and litigation, plus numerous and varied matters involving live music festivals. Mr. Stephens represents media entities, national and worldwide entertainment and sports companies, magazines, television and radio stations, production companies, entertainment technology companies, computer technology companies, and online content and software providers. He also has served clients in manufacturing and the financial and insurance industries. Prior to joining Hendricks Law, Mr. Stephens spent nearly 20 years as a media and entertainment litigator and trial attorney at Sedgwick LLP, chairing the Cybersecurity &amp; Privacy Group, as well as the Live Entertainment Group.&nbsp; Mr. Stephens obtained his CIPP(US) in 2016 and since that time has represented a wide myriad of clients regarding various cyber and data privacy issues. Mr. Stephens was elected to the board of directors of the National LGBT Bar Association, in 2016, and he served as co-chair and treasurer on the national board of directors for the Gay &amp; Lesbian Alliance Against Defamation (GLAAD) from 2010–2013. He also was the chair of the diversity committee of the San Fernando Valley Bar Association, as well as a chair of the diversity committee of the American Bar Association Tort Trial and Insurance Practice Section.</span></p><span data-dcnode-id="1137" instrument_node=""> </span><br data-dcnode-id="1136"><br data-dcnode-id="1135"><hr data-dcnode-id="1134"><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Michael Stevens</span></strong><span data-dcnode-id="1131" instrument_node=""> - As an employee benefits litigator, Michael is keenly aware that every case he litigates for a client not only impacts the individual plaintiff, but can also become precedent for other employees and potential claimants. Thus, Michael views every case as an opportunity to be a business partner for his clients, and his goal is to always best protect their interests over the long term. Michael's practice focuses on ERISA, and he has litigated extensively on behalf of welfare, pension, and severance plans. He is experienced in defending both single-plaintiff and class actions. His practice emphasizes protecting health and welfare plans from medical fraud, and he has both defended health care claims against lawsuits from malfeasant health care providers, and also prosecuted claims on behalf of payors. Michael has more than a decade of experience navigating complex litigation, from pre-complaint negotiations to try to resolve disputes without litigation, through all phases of the litigation life cycle. Michael is experienced in bet-the-company litigation, where millions of dollars can be at stake. While Michael's practice is mostly defense-side, he is also experienced in plaintiff-side work, where existing clients have unique needs requiring counsel who are already familiar with their business operations. In addition, prior to joining Seyfarth, Michael practiced antitrust and competition litigation at another large firm. Michael brings extensive experience in case valuation and measuring damages. He understands that litigation is often a business decision, and he is skilled at preparing case assessments that measure the risk of liability, and the magnitude of damages, weighed against the prospects of future litigation. Michael has successfully resolved large cases where his clients faced eight or nine figures of damages for just pennies on the dollar. Michael has also succeeded in plaintiff-side work for health care plans, recovering large sums of money misspent by the plans' vendors. Michael is committed to pro bono advocacy, especially in the immigration context. He has successfully achieved asylum and lawful permanent residency for LGBT and HIV-positive immigrants from Central America. Michael believes in taking advantage of 21st century technology to ensure that clients are always up-to-date on case developments, and makes extensive use of data visualization technology to illustrate the strengths and weaknesses of cases. </span><br data-dcnode-id="1130"><br data-dcnode-id="1129"><hr data-dcnode-id="1128"><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Zaylore Stout</span></strong><span data-dcnode-id="1125" instrument_node=""> - </span><span data-dcnode-id="1123" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Zaylore Stout, Esq. received his B.A. from Cal State Fullerton in International Business Management and J.D. from the University of St. Thomas School of Law. He served as an outsourced human-resource consultant for 12-years prior to attending law school. Upon graduation he founded, Zaylore Stout &amp; Associates, LLC (ZSA), which handles employment law matters which include sexual harassment, discrimination, wrongful termination, and wage &amp; hour disputes. ZSA is a MBE, LGBTBE, and DOBE. Zaylore's a former candidate for city council in St. Louis Park and member of the city's Human Rights Commission. Zaylore is both domestically and internationally published, with his most recent book Our Gay History in 50 States selling thousands since its publication in October 2019. The book highlights the significant people, places, and \&quot;queer facts\&quot; relating to LGBTQIA history on a state-by-state basis. Zaylore has received many honors during the course of his career including but not limited to the Business of Pride Award through the Minneapolis/St. Paul Business Journal, the Lavender Magazine Community Award, and serving as the co-emcee for the Minnesota Association of Black Lawyers annual gala.&quot;}"><span data-dcnode-id="1124" instrument_node="">Zaylore Stout, Esq. received his B.A. from Cal State Fullerton in International Business Management and J.D. from the University of St. Thomas School of Law. He served as an outsourced human-resource consultant for 12-years prior to attending law school. Upon graduation he founded, Zaylore Stout &amp; Associates, LLC (ZSA), which handles employment law matters which include sexual harassment, discrimination, wrongful termination, and wage &amp; hour disputes. ZSA is a MBE, LGBTBE, and DOBE. Zaylore's a former candidate for city council in St. Louis Park and member of the city's Human Rights Commission. Zaylore is both domestically and internationally published, with his most recent book Our Gay History in 50 States selling thousands since its publication in October 2019. The book highlights the significant people, places, and "queer facts" relating to LGBTQIA history on a state-by-state basis. Zaylore has received many honors during the course of his career including but not limited to the Business of Pride Award through the Minneapolis/St. Paul Business Journal, the Lavender Magazine Community Award, and serving as the co-emcee for the Minnesota Association of Black Lawyers annual gala.</span></span><span data-dcnode-id="1122" instrument_node=""> </span><br data-dcnode-id="1121"><br data-dcnode-id="1120"><div data-dcnode-id="1112"><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1117"><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/extreme-or-essential-understanding-the-shifting-legal-landscape-of-lgbt-specific-community-inclusion-in-u-s-school-curricula/" target="_blank"><span data-dcnode-id="1116" instrument_node="">Extreme or Essential: Understanding the Shifting Legal Landscape of LGBTQ-specific Community Inclusion in U.S. School Curricula</span></a><br data-dcnode-id="1114"><br data-dcnode-id="1113"></div><hr data-dcnode-id="1111"><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Brennan Suen</span></strong><span data-dcnode-id="1108" instrument_node=""> - Brennan Suen is the LGBTQ program director at Media Matters, where he has worked since July 2015. Brennan and his team monitor and research media coverage of LGBTQ issues and related narratives with a focus on dismantling conservative misinformation harmful to the LGBTQ community. He produces and edits in-depth analysis, rapid response, and data-based studies on media coverage and conducts extensive research into anti-LGBTQ groups and media figures. He has a bachelor’s degree from Northwestern University. </span><br data-dcnode-id="1107"><br data-dcnode-id="1106"><div data-dcnode-id="1095"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">General Attendance Session Two</span></strong><span data-dcnode-id="1103" instrument_node="">: August 13, 2020 | 12:30 pm - 2:00 pm</span><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1100"><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/fighting-the-rise-of-anti-lgbtq-legal-groups/" target="_blank"><span data-dcnode-id="1099" instrument_node="">Fighting The Rise of Anti-LGBTQ+ Legal Groups</span></a><br data-dcnode-id="1097"><br data-dcnode-id="1096"></div><hr data-dcnode-id="1094"><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Kasey Suffredini</span></strong><span data-dcnode-id="1091" instrument_node=""> - Kasey Suffredini (he/him) is a nationally recognized campaign strategist and expert on LGBTQ issues and advocacy with 20 years of experience in campaign management, policy development, strategic communications, and grassroots mobilization. With a track record of designing campaigns that change narratives, pass legislation, win ballot measures, and drive momentum on seemingly intractable issues, Kasey’s campaign leadership has resulted in over 100 policy reforms at the state and federal levels. As CEO and National Campaign Director at Freedom for All Americans, Kasey has been the chief architect of bipartisan campaigns to successfully secure a number of national firsts. These wins include passing the country’s first standalone statewide transgender public accommodations law, passing comprehensive statewide transgender nondiscrimination protections for the first time in a Republican-controlled state, and passing comprehensive statewide LGBTQ nondiscrimination protections for the first time in the South. From 2016-2018, Kasey co-chaired the historic, award-winning Freedom for All Massachusetts / Yes on 3 ballot campaign, winning the first statewide popular vote on transgender rights in U.S. history by a landslide two-thirds margin (68-32%). Kasey is a sought-after speaker on issue campaign strategy and LGBTQ advocacy and has been honored by the New Leaders Council, the American Civil Liberties Union, and Harvard Law School. A transgender attorney, Kasey served as President of the National LGBT Bar Association from 2004-2005 and was a member of its inaugural class of Best LGBT Lawyers Under 40 in 2010. Kasey received a B.A. from the University of California, Berkeley and a J.D. from Boston College Law School. He resides in Long Beach, California with his wife, Kristina Bigdeli. </span><br data-dcnode-id="1090"><br data-dcnode-id="1089"><div data-dcnode-id="1078"><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">General Attendance Session Two</span></strong><span data-dcnode-id="1086" instrument_node="">: August 13, 2020 | 12:30 pm - 2:00 pm</span><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1083"><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/fighting-the-rise-of-anti-lgbtq-legal-groups/" target="_blank"><span data-dcnode-id="1082" instrument_node="">Fighting The Rise of Anti-LGBTQ+ Legal Groups</span></a><br data-dcnode-id="1080"><br data-dcnode-id="1079"></div><hr data-dcnode-id="1077"><strong data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Krisztina Szabo</span></strong><span data-dcnode-id="1074" instrument_node=""> - </span><span data-dcnode-id="1072" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Krisztina Szabo (she/her/hers) is a Staff Attorney at Whitman-Walker Health, a Federally Qualified Health Center that specializes in HIV and LGBTQ care and offers wrap-around legal services to achieve optimal health outcomes. Krisztina represents clients on a variety of legal issues, including access to healthcare and public benefits, such as SSI/SSDI, Medicaid, Medicare, and other public assistance programs. Krisztina also facilitates transgender clients‚Äô access to gender-affirming care through appealing insurance coverage denials, filing administrative complaints, and challenging discriminatory employee health benefits. In addition, Krisztina helps transgender clients with name and gender on their ID documents, and also offers representation in employment or public accommodation discrimination cases. Prior to joining WWH, Krisztina worked at Ayuda and at the National Immigrant Women‚Äôs Advocacy Project, where she assisted and advocated for immigrant survivors of violence. Krisztina received her law degree from Charleston School of Law and graduated with distinction from the American University Washington College of Law‚Äôs Law and Government LLM Program. She is a member of the Virginia and District of Columbia Bars.&quot;}"><span data-dcnode-id="1073" instrument_node="">Krisztina Szabo (she/her/hers) is a Staff Attorney at Whitman-Walker Health, a Federally Qualified Health Center that specializes in HIV and LGBTQ care and offers wrap-around legal services to achieve optimal health outcomes. Krisztina represents clients on a variety of legal issues, including access to healthcare and public benefits, such as SSI/SSDI, Medicaid, Medicare, and other public assistance programs. Krisztina also facilitates transgender clients' access to gender-affirming care through appealing insurance coverage denials, filing administrative complaints, and challenging discriminatory employee health benefits. In addition, Krisztina helps transgender clients with name and gender on their ID documents, and also offers representation in employment or public accommodation discrimination cases. Prior to joining WWH, Krisztina worked at Ayuda and at the National Immigrant Women's Advocacy Project, where she assisted and advocated for immigrant survivors of violence. Krisztina received her law degree from Charleston School of Law and graduated with distinction from the American University Washington College of Law's Law and Government LLM Program. She is a member of the Virginia and District of Columbia Bars.</span></span><span data-dcnode-id="1071" instrument_node=""> </span><br data-dcnode-id="1070"><br data-dcnode-id="1069"><div data-dcnode-id="1061"><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1066"><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/federal-benefits-for-lgbt-people-and-their-families/" target="_blank"><span data-dcnode-id="1065" instrument_node="">Federal Benefits for LGBTQ+ People and Their Families</span></a><br data-dcnode-id="1063"><br data-dcnode-id="1062"></div><div data-dcnode-id="1053"><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1058"><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/alternatives-to-litigation-tools-to-advocate-for-trans-and-nonbinary-rights/" target="_blank"><span data-dcnode-id="1057" instrument_node="">Alternatives to Litigation: Tools to Advocate for Trans and Nonbinary Rights</span></a><br data-dcnode-id="1055"><br data-dcnode-id="1054"></div><hr data-dcnode-id="1052"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Emmelia Talarico</span></strong><span data-dcnode-id="1049" instrument_node=""> - Emmelia Augusta Smith Ruiz Talarico, started organizing at 19 and is now the director of NoJusticeNoPride.org, a collective of organizers and activists fighting to liberate queer and trans people, Talarico and their staff work endless hours to ensure its success — all without a dime of government dollars. The organization also runs a safe house in D.C. for young trans women of color and sex workers, offering food, housing, counseling, and emotional support that includes a leadership development program for those eager to learn. After the 2016 election, it became clear to Talarico and other non-binary trans folks like them that they would have to fend for themselves. Recently, Talarico helped to raise $40,000 for the organization. All of that money goes directly to the needs of Black and Brown trans sex workers struggling with housing security. </span><br data-dcnode-id="1048"><br data-dcnode-id="1047"><hr data-dcnode-id="1046"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Dr. Suegee Tamar-Mattis</span></strong><span data-dcnode-id="1043" instrument_node=""> -  </span><br data-dcnode-id="1042"><br data-dcnode-id="1041"><div data-dcnode-id="1033"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1038"><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/intersex-rights-reproductive-health-care-and-bodily-essentialism-legislative-considerations/" target="_blank"><span data-dcnode-id="1037" instrument_node="">Intersex Rights, Reproductive Health Care, and Bodily Essentialism: Legislative Considerations</span></a><br data-dcnode-id="1035"><br data-dcnode-id="1034"></div><hr data-dcnode-id="1032"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Aaron Tax</span></strong><span data-dcnode-id="1029" instrument_node=""> - </span><span data-dcnode-id="1027" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Aaron Tax is the Director of Advocacy for SAGE. He advocates for LGBT-inclusive federal aging policies that account for the unique needs of LGBT older adults. Until June 2011, Aaron served as the Legal Director at Servicemembers Legal Defense Network (SLDN), the leading organization challenging \&quot;Don't Ask, Don't Tell\&quot; (DADT) in Congress and in the courts. He started there as a staff attorney in 2006, and for nearly five years at SLDN, he took part in a multifaceted approach to advancing the civil rights of LGBT servicemembers through law, policy, outreach, and education. As the Legal Director, Aaron was responsible for running the legal services program at SLDN, the only organization providing free legal services to service members impacted by DADT and related forms of discrimination, including those who are HIV positive and/or transgender. Prior to joining SLDN, Aaron spent three years working for the Department of the Army in the Office of EEO and Civil Rights, the first two years as a Presidential Management Fellow (PMF). As a PMF, he worked for the Office of the Staff Judge Advocate, V Corps, Heidelberg, Germany, and served as a Special Assistant United States Attorney in the US Attorney's Office for the District of Columbia, where he tried more than two dozen cases. A graduate of Cornell University with honors and distinction and the George Washington University Law School with honors, he currently resides in Washington, DC.&quot;}"><span data-dcnode-id="1028" instrument_node="">Aaron Tax is the Director of Advocacy for SAGE. He advocates for LGBT-inclusive federal aging policies that account for the unique needs of LGBT older adults. Until June 2011, Aaron served as the Legal Director at Servicemembers Legal Defense Network (SLDN), the leading organization challenging "Don't Ask, Don't Tell" (DADT) in Congress and in the courts. He started there as a staff attorney in 2006, and for nearly five years at SLDN, he took part in a multifaceted approach to advancing the civil rights of LGBT servicemembers through law, policy, outreach, and education. As the Legal Director, Aaron was responsible for running the legal services program at SLDN, the only organization providing free legal services to service members impacted by DADT and related forms of discrimination, including those who are HIV positive and/or transgender. Prior to joining SLDN, Aaron spent three years working for the Department of the Army in the Office of EEO and Civil Rights, the first two years as a Presidential Management Fellow (PMF). As a PMF, he worked for the Office of the Staff Judge Advocate, V Corps, Heidelberg, Germany, and served as a Special Assistant United States Attorney in the US Attorney's Office for the District of Columbia, where he tried more than two dozen cases. A graduate of Cornell University with honors and distinction and the George Washington University Law School with honors, he currently resides in Washington, DC.</span></span><span data-dcnode-id="1026" instrument_node=""> </span><br data-dcnode-id="1025"><br data-dcnode-id="1024"><div data-dcnode-id="1016"><strong data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1021"><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/silver-pride-aunt-samantha-wants-you-to-advocate-for-lgbt-elders/" target="_blank"><span data-dcnode-id="1020" instrument_node="">Silver Pride: Aunt Samantha Wants YOU to Advocate for LGBTQ+ Elders</span></a><br data-dcnode-id="1018"><br data-dcnode-id="1017"></div><hr data-dcnode-id="1015"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Marcel Taylor</span></strong><span data-dcnode-id="1012" instrument_node=""> -  </span><br data-dcnode-id="1011"><br data-dcnode-id="1010"><div data-dcnode-id="1002"><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1007"><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/prosecutor-caucus/" target="_blank"><span data-dcnode-id="1006" instrument_node="">Prosecutor Caucus</span></a><br data-dcnode-id="1004"><br data-dcnode-id="1003"></div><hr data-dcnode-id="1001"><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Jorge Tenreiro</span></strong><span data-dcnode-id="998" instrument_node=""> - Jorge G. Tenreiro is a Senior Trial Counsel in the Division of Enforcement of the SEC, New York Regional Office. Mr. Tenreiro has significant experience litigating various matters brought by the agency, including fraudulent offerings, pump and dump schemes, and matters in the digital asset space, including by filing and leading the litigation in the SEC’s first two ICO scam cases.&nbsp; Prior to joining the SEC in December 2013, Mr. Tenreiro was a law clerk for the Honorable Julio M. Fuentes for the U.S. Court of Appeals for the Third Circuit and a law clerk to the Honorable Allyne R. Ross of the Eastern District of New York.&nbsp; From October 2006 to August 2007 and from September 2008 to August 2012, Mr. Tenreiro was an associate in the litigation department of Cleary, Gottlieb, Steen &amp; Hamilton LLP.&nbsp; Mr. Tenreiro is a 2006 graduate of Yale Law School where he was awarded the William K.S. Wang Prize for best performance in contracts and Harlan Stone Prize for Moot Court competition semi-finalists</span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">.&nbsp;&nbsp;</span></em><span data-dcnode-id="995" instrument_node="">In May 2003, Mr. Tenreiro obtained his B.A.,&nbsp;</span><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">magna cum laude</span></em><span data-dcnode-id="992" instrument_node="">&nbsp;with distinction in Economics and Mathematics from Yale University.&nbsp; He was Phi Beta Kappa and also received the Henry M. Nodelman Scholarship for Excellence in Sciences. Throughout his career, Mr. Tenreiro has devoted significant time to matters of interest to the LGBTQ community.&nbsp; As a law student, Mr. Tenreiro joined a suit in the District of Connecticut against the Department of Defense’s enforcement of the Solomon Amendment, requiring law schools to permit military recruiters on campus despite the military’s anti-gay “Don’t Ask, Don’t Tell” policy.&nbsp; In 2009, Mr. Tenreiro was co-counsel in lawsuit securing a victory at summary judgment under the ADA on behalf of an HIV+ teenager denied admission to a basketball summer camp on the basis of his HIV-status.&nbsp; In 2011, Mr. Tenreiro authored an&nbsp;</span><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">amicus&nbsp;</span></em><span data-dcnode-id="989" instrument_node="">brief in support of the law school in the Supreme Court case&nbsp;</span><em data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Christian Legal Society v. Martinez</span></em><span data-dcnode-id="986" instrument_node="">, which recognized the school’s ability to impose rules barring discrimination against LGBTQ individuals on law school student groups.&nbsp; In 2012, Mr. Tenreiro co-authored a brief in support of a disabled veteran’s request for same-sex spousal benefits before the United States Court of Appeals for Veterans Claims.&nbsp; From 2015 to 2018, Mr. Tenreiro served as a member of the LGBT Committee of the New York City Bar. </span><br data-dcnode-id="985"><br data-dcnode-id="984"><hr data-dcnode-id="983"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Dean Kellye Testy</span></strong><span data-dcnode-id="980" instrument_node=""> - Kellye Y. Testy&nbsp;is the president and chief executive officer of the Law School Admission Council, where she leads the organization in its committed efforts to build a more just and prosperous world. Testy joined LSAC after leading the University of Washington School of Law for eight years as the school’s first female dean. She is a nationally sought-after speaker and consultant on legal and higher education, leadership, diversity and access, and corporate law and governance, and has received numerous honors and awards for her teaching, leadership, and service. Testy earned her undergraduate degree in journalism from Indiana University in Bloomington, and her law degree from Indiana University Maurer School of Law—Bloomington. She currently serves on the boards of the Washington Law Institute and LSSSE. </span><br data-dcnode-id="979"><br data-dcnode-id="978"><div data-dcnode-id="970"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="975"><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/law-school-panel/" target="_blank"><span data-dcnode-id="974" instrument_node="">Out in Leadership: Reflections from LGBTQ+ Law School Deans</span></a><br data-dcnode-id="972"><br data-dcnode-id="971"></div><hr data-dcnode-id="969"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Paul Thaler</span></strong><span data-dcnode-id="966" instrument_node=""> - </span><div data-dcnode-id="963" dir="ltr"><span data-dcnode-id="964" style="color: #000000"><span data-dcnode-id="965" instrument_node="">Paul is the Director of Development at Reaching Out MBA, Inc., a 501(c)(3) nonprofit that educates, inspires, and connects the LGBTQ+ MBA community. Paul has substantial experience in fundraising, LGBTQ+ non-profit leadership, and law. Prior to Reaching Out, Paul served as the Director of External Affairs for the National LGBT Bar Association and Foundation. He was responsible for maintaining relationships with the organization’s internal and external constituents, which included corporations and law firms, as well as overseeing the Bar’s membership efforts. Paul has experience speaking on a number of issues related to LGBTQ+ rights and the law. Paul previously worked with students in higher education, having served as the Assistant Director of the Law Career Development Office at the University of Baltimore School of Law. Prior to that, Paul worked as an attorney for two litigation firms in the Baltimore area. Paul received his J.D. from the University of Baltimore School of Law and an undergraduate degree from Muhlenberg College.</span></span></div><span data-dcnode-id="962" instrument_node=""> </span><br data-dcnode-id="961"><br data-dcnode-id="960"><div data-dcnode-id="951"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Lateral Program</span></strong><span data-dcnode-id="957" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="956"><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/making-the-move-best-practices-for-lateral-candidates/" target="_blank"><span data-dcnode-id="955" instrument_node="">Making The Move: Best Practices for Lateral Candidates</span></a><br data-dcnode-id="953"><br data-dcnode-id="952"></div><hr data-dcnode-id="950"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Fred Thrasher</span></strong><span data-dcnode-id="947" instrument_node=""> -  </span><br data-dcnode-id="946"><br data-dcnode-id="945"><div data-dcnode-id="936"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Law Student Career Planning Program</span></strong><span data-dcnode-id="942" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="941"><a data-dcnode-id="939" href= ovements for nearly a decade - with both grassroots and grasstops stakeholders - primarily around issues that affect women, young people, communities of color, and the LGTBQ community. Prior to Advocates, Diana worked for the Center for Women Policy Studies, working directly with women state legislators and Members of Parliament, facilitating strategic planning sessions and providing policy technical assistance on women's human rights. Her passions lie in facilitating and creating intentional spaces for not only social justice, but also for creativity and radical self-expression. She holds an M.A. from George Washington University in Public Policy with a concentration in Women's Studies, as well as a B.A. from the University of Nevada, Las Vegas in Sociology and Women's Studies.</span></span><span data-dcnode-id="929" instrument_node=""> </span><br data-dcnode-id="928"><br data-dcnode-id="927"><div data-dcnode-id="919"><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="924"><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/extreme-or-essential-understanding-the-shifting-legal-landscape-of-lgbt-specific-community-inclusion-in-u-s-school-curricula/" target="_blank"><span data-dcnode-id="923" instrument_node="">Extreme or Essential: Understanding the Shifting Legal Landscape of LGBTQ-specific Community Inclusion in U.S. School Curricula</span></a><br data-dcnode-id="921"><br data-dcnode-id="920"></div><hr data-dcnode-id="918"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Karla Torres</span></strong><span data-dcnode-id="915" instrument_node=""> - </span><span data-dcnode-id="913" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;: litics from American's School of International Service.</span></span><span data-dcnode-id="912" instrument_node=""> </span><br data-dcnode-id="911"><br data-dcnode-id="910"><div data-dcnode-id="902"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="907"><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/family-rights-for-lgbtqia-folks-u-s-surrogacy-parentage-laws/" target="_blank"><span data-dcnode-id="906" instrument_node="">Family Rights for LGBTQIA+ Folks: U.S. Surrogacy and Parentage Laws</span></a><br data-dcnode-id="904"><br data-dcnode-id="903"></div><hr data-dcnode-id="901"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Alex Touma</span></strong><span data-dcnode-id="898" instrument_node=""> - Alex is a partner in the Technology Transactions Practice within the Firm's Intellectual Property Group. Alex specializes in transactions and counseling involving intellectual property and technology. Alex represents companies of all sizes and in a variety of industries including software, semiconductor and mobile technology companies. He also advises companies on technology related matters including development and licensing agreements, manufacturing and supply agreements, distribution agreements, hosting agreements and sourcing transactions. Prior to working at the Firm, Alex served as Senior Counsel for a Bay Area technology startup where he focused on commercial and intellectual property law matters including drafting and negotiating a variety of technology agreements, managing patent and trademark portfolios, and providing general legal advice on intellectual property matters such as open source, trade secret, copyright, patent, and privacy issues. Alex's prior experience also includes working at a leading global law firm as an intellectual property litigation associate representing technology companies. Before starting his law career, Alex obtained a Bachelor's and Master's in Computer Science and briefly worked as an automation engineer. This prior experience gives Alex a unique viewpoint, which he is able to leverage in his transactional practice. </span><br data-dcnode-id="897"><br data-dcnode-id="896"><hr data-dcnode-id="895"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Jared Trujillo</span></strong><span data-dcnode-id="892" instrument_node=""> - </span><span data-dcnode-id="890" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Jared serves as the President of the Association of Legal Aid Attorneys, a union of 10 non-profits in New York that represents lawyers, paralegals, and social workers that focus on criminal defense, immigration, juvenile rights, parent defense, and employment. In this role he negotiates collective bargaining agreements, drafts legislation, and he leads the organization’s legislative and advocacy efforts. Additionally, he is a Steering Committee member of Decrim NY, an organization that advocates for the decriminalization of sex work and the empowerment of sex workers. &quot;}"><span data-dcnode-id="891" instrument_node="">Jared serves as the President of the Association of Legal Aid Attorneys, a union of 10 non-profits in New York that represents lawyers, paralegals, and social workers that focus on criminal defense, immigration, juvenile rights, parent defense, and employment. In this role he negotiates collective bargaining agreements, drafts legislation, and he leads the organization’s legislative and advocacy efforts. Additionally, he is a Steering Committee member of Decrim NY, an organization that advocates for the decriminalization of sex work and the empowerment of sex workers. </span></span><span data-dcnode-id="889" instrument_node=""> </span><br data-dcnode-id="888"><br data-dcnode-id="887"><div data-dcnode-id="879"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="884"><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/strolling-the-halls-of-power-interjurisdictional-lessons-from-the-legislative-efforts-to-decriminalize-sex-work/" target="_blank"><span data-dcnode-id="883" instrument_node="">Strolling the Halls of Power: Interjurisdictional Lessons from the Legislative Efforts to Decriminalize Sex Work</span></a><br data-dcnode-id="881"><br data-dcnode-id="880"></div><hr data-dcnode-id="878"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Sara Tucker</span></strong><span data-dcnode-id="875" instrument_node=""> - </span><span data-dcnode-id="873" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Sara Deskins Tucker is a Partner in the Atlanta office of Womble Bond Dickinson. She focuses her practice on helping life sciences companies defend product liability lawsuits across the country. She also provides consulting advice related to product liability risk and mitigation strategies.&quot;}"><span data-dcnode-id="874" instrument_node="">Sara Deskins Tucker is a Partner in the Atlanta office of Womble Bond Dickinson. She focuses her practice on helping life sciences companies defend product liability lawsuits across the country. She also provides consulting advice related to product liability risk and mitigation strategies.</span></span><s
