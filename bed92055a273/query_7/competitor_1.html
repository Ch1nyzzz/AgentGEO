</span></header><div class="entry-content" data-dcnode-id="469"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="4678" id="speaker_menu"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="4682"><div class="vc_column-inner" data-dcnode-id="4683"><div class="wpb_wrapper" data-dcnode-id="4684"><span data-dcnode-id="4700" instrument_node="">

</span><p data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">Experts including corporate counsel, members of the judiciary, academics, law firm partners and individuals representing the non-profit sector were featured at the virtual 2020 Lavender Law® Conference and Career Fair. The diversity of speakers is reflected in the topics discussed during the workshops and general attendance sessions.</span></p><span data-dcnode-id="4695" instrument_node="">

</span></div></div></div></div><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="4679"><div class="vc_column-inner" data-dcnode-id="4680"><div class="wpb_wrapper" data-dcnode-id="4681"></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="471"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="472"><div class="vc_column-inner" data-dcnode-id="473"><div class="wpb_wrapper" data-dcnode-id="474"><span data-dcnode-id="4677" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="476"><span data-dcnode-id="4676" instrument_node="">

</span><strong data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">Nancy Abudu</span></strong><span data-dcnode-id="4672" instrument_node=""> - Nancy G. Abudu is the Deputy Legal Director for the Southern Poverty Law Center’s Voting Rights Practice Group. In that role, she leads a team of lawyers, community organizers, and technical experts in protecting and strengthening the voting rights of minority communities and other politically vulnerable populations. Prior to joining SPLC, Nancy was the Legal Director for the ACLU of Florida and a senior staff attorney with the ACLU’s Voting Rights Project. She has litigated a variety of civil rights and civil liberties issues in federal and state courts, including legal challenges to state felon disfranchisement, proof of citizenship, and voter photo ID laws; and has pushed for greater enforcement of the Voting Rights Act, the National Voter Registration Act, Help America Vote Act, and other federal laws. Her practice areas also have included prison conditions, free speech, reproductive rights, immigrants’ rights, LGBT rights, privacy and government surveillance, and education issues. In addition, Nancy has worked as a staff attorney with the Eleventh Circuit Court of Appeals in Atlanta, and an associate with the law firm Skadden, Arps, Slate, Meagher &amp; Flom LLP in New York. She served as an international election observer in Albania, is a member of the ABA’s Standing Committee on Election Law, and is a Senior Fellow with the Environmental Leadership Program based in Washington, D.C. She also has published numerous articles and two book chapters, including in the most recent fourth edition of the ABA’s America Votes. She received her B.A. from Columbia University, her J.D. from Tulane Law School, and has won several awards and honors of recognition for her civil rights work. She is admitted to practice in Florida, Georgia, New York, the U.S. Supreme Court, and several other federal and state courts. </span><br data-dcnode-id="4671"><br data-dcnode-id="4670"><div data-dcnode-id="4662"><strong data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4667"><a data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/beyond-the-litigation-mindset-how-to-effectuate-lasting-change-inside-and-outside-the-courtroom-in-hostile-jurisdictions/" target="_blank"><span data-dcnode-id="4666" instrument_node="">Beyond the “Litigation” Mindset: How to Effectuate Lasting Change Inside and Outside the Courtroom in Hostile Jurisdictions</span></a><br data-dcnode-id="4664"><br data-dcnode-id="4663"></div><hr data-dcnode-id="4661"><strong data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">Diana Adams</span></strong><span data-dcnode-id="4658" instrument_node=""> - </span><span data-dcnode-id="4656" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Diana Adams is Executive Director of Chosen Family Law Center, Inc, a nonprofit serving LGBTQ, polyamorous, platonic and non-nuclear families and offering professional training on cultural competency &amp; legal skills for serving these communities. Diana is also Owner of Diana Adams Law &amp; Mediation, PLLC, a boutique LGBTQ family law and mediation firm based in New York City and Frankfurt, Germany, serving primarily same-sex couples, platonic co- parents, polyamorous families, and non-nuclear families. Diana is Director of the Euro LGBT Family Law Institute, sponsored by the National LGBT Bar and National Center for Lesbian Rights, connecting top lawyers in LGBTQ family law in Europe with leaders in the US and worldwide, in an effort to create a worldwide legal support movement for LGBTQ families. www.ChosenFamilyLawCenter.org www.DianaAdamsLaw.net Find her on Twitter &amp; Facebook @DianaAdamsEsq.&quot;}"><span data-dcnode-id="4657" instrument_node="">Diana Adams is Executive Director of Chosen Family Law Center, Inc, a nonprofit serving LGBTQ, polyamorous, platonic and non-nuclear families and offering professional training on cultural competency &amp; legal skills for serving these communities. Diana is also Owner of Diana Adams Law &amp; Mediation, PLLC, a boutique LGBTQ family law and mediation firm based in New York City and Frankfurt, Germany, serving primarily same-sex couples, platonic co- parents, polyamorous families, and non-nuclear families. Diana is Director of the Euro LGBT Family Law Institute, sponsored by the National LGBT Bar and National Center for Lesbian Rights, connecting top lawyers in LGBTQ family law in Europe with leaders in the US and worldwide, in an effort to create a worldwide legal support movement for LGBTQ families. www.ChosenFamilyLawCenter.org www.DianaAdamsLaw.net Find her on Twitter &amp; Facebook @DianaAdamsEsq.</span></span><span data-dcnode-id="4655" instrument_node=""> </span><br data-dcnode-id="4654"><br data-dcnode-id="4653"><div data-dcnode-id="4645"><strong data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4650"><a data-dcnode-id="4648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/visibilizing-bisexuals-in-lgbtqia-rights-discourse-and-communities/" target="_blank"><span data-dcnode-id="4649" instrument_node="">Visibilizing Bisexuals in LGBTQIA+ Rights Discourse and Communities</span></a><br data-dcnode-id="4647"><br data-dcnode-id="4646"></div><hr data-dcnode-id="4644"><strong data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">Yemi Adegbonmire</span></strong><span data-dcnode-id="4641" instrument_node=""> - Yemi Adegbonmire is a Los Angeles based intellectual property and entertainment attorney and a member of 2019 The National Black Lawyers Top 100. Described by her peers as jetsetting, vivacious, fresh faced and an advocate for the arts, Yemi Adegbonmire navigates the City of Angels with the wit and intellect of a lawyer and the heart and creativity of an artist. As a former legal executive at The Walt Disney Company, Yemi advised clients on regulatory issues arising from digital marketing, privacy policies and global content distribution. She also provided counsel on intellectual property licensing, and best practices related to social networking websites and user-generated content. A citizen of the world, Yemi is native of Baltimore, Maryland, Yemi spends her summers in Lagos and her winters visiting various wonders of the world. Yemi is a graduate of The Bryn Mawr School for Girls and of Johns Hopkins and Wake Forest Universities. Yemi hired the first Executive Director of the Los Angeles Gay and Lesbian Chamber of Commerce, is a former member of GLAAD's Los Angeles Leadership Council, and currently sits on Lambda Legal's National Board of Directors. Yemi is currently the General Counsel and Corporate Secretary of the Bail Project. The Bail Project (TBP) is a nation nonprofit with 20 locations across the nation. The Bail Project National Revolving Bail Fund provides free bail assistance to low-income individuals who are legally presumed innocent, and whom a judge has deemed eligible for release before trial contingent on paying bail. TBP enables its clients to return home to their families and communities while awaiting their court dates. TBP is on year 2 of a five-year plan to scale The Bail Project's Community Release with Support model across America and turn the tide on mass incarceration. It is our mission to restore the presumption of innocence in America and ensure that freedom truly is free again. </span><br data-dcnode-id="4640"><br data-dcnode-id="4639"><div data-dcnode-id="4631"><strong data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4636"><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/dodging-bullets-and-jumping-hurdles-womxn-of-color-lawyers-succeeding-through-adversity/" target="_blank"><span data-dcnode-id="4635" instrument_node="">Dodging Bullets and Jumping Hurdles: Womxn of Color Lawyers, Succeeding through Adversity</span></a><br data-dcnode-id="4633"><br data-dcnode-id="4632"></div><hr data-dcnode-id="4630"><strong data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">Arielle Adler</span></strong><span data-dcnode-id="4627" instrument_node=""> - </span><span data-dcnode-id="4625" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Arielle's practice focuses on corporate bankruptcy and creditors' rights matters, including bankruptcy-related litigation. She brings unique, multidisciplinary experience to her bankruptcy practice. She previously represented management clients in a wide range of labor and employment matters before federal and state courts and administrative agencies. Her ability to analyze complex issues and business operations and strategies benefit her clients both inside and outside of the insolvency environment. Arielle served as senior law clerk to the Hon. Stacey L. Meisel and as a term law clerk to the Hon. Rosemary Gambardella, both of the U.S. Bankruptcy Court for the District of New Jersey. She is Chair Elect of the LGBT Rights Section of the New Jersey State Bar Association. She is an active member of the International Women's Insolvency &amp; Restructuring Confederation (IWIRC) and the National LGBT Bar Association. Her pro bono experience includes serving as a court-appointed attorney for clients in guardianship proceedings and drafting an employee handbook for a nonprofit organization focused on empowering students to attend and succeed in college.&quot;}"><span data-dcnode-id="4626" instrument_node="">Arielle's practice focuses on corporate bankruptcy and creditors' rights matters, including bankruptcy-related litigation. She brings unique, multidisciplinary experience to her bankruptcy practice. She previously represented management clients in a wide range of labor and employment matters before federal and state courts and administrative agencies. Her ability to analyze complex issues and business operations and strategies benefit her clients both inside and outside of the insolvency environment. Arielle served as senior law clerk to the Hon. Stacey L. Meisel and as a term law clerk to the Hon. Rosemary Gambardella, both of the U.S. Bankruptcy Court for the District of New Jersey. She is Chair Elect of the LGBT Rights Section of the New Jersey State Bar Association. She is an active member of the International Women's Insolvency &amp; Restructuring Confederation (IWIRC) and the National LGBT Bar Association. Her pro bono experience includes serving as a court-appointed attorney for clients in guardianship proceedings and drafting an employee handbook for a nonprofit organization focused on empowering students to attend and succeed in college.</span></span><span data-dcnode-id="4624" instrument_node=""> </span><br data-dcnode-id="4623"><br data-dcnode-id="4622"><div data-dcnode-id="4614"><strong data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4619"><a data-dcnode-id="4617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/training-trainings-a ent_node=""> -  </span><br data-dcnode-id="4587"><br data-dcnode-id="4586"><div data-dcnode-id="4578"><strong data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4583"><a data-dcnode-id="4581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/extreme-or-essential-understanding-the-shifting-legal-landscape-of-lgbt-specific-community-inclusion-in-u-s-school-curricula/" target="_blank"><span data-dcnode-id="4582" instrument_node="">Extreme or Essential: Understanding the Shifting Legal Landscape of LGBTQ-specific Community Inclusion in U.S. School Curricula</span></a><br data-dcnode-id="4580"><br data-dcnode-id="4579"></div><hr data-dcnode-id="4577"><strong data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Charlie Arrowood</span></strong><span data-dcnode-id="4574" instrument_node=""> - </span><span data-dcnode-id="4572" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Charlie Arrowood (they/them) is an attorney licensed in New York state. They primarily provide transition-related legal services to transgender clients, including name and gender marker change assistance and guidance regarding health insurance coverage and employment matters. Charlie is the Vice Chair of the LGBTQ Committee of the Nassau County Bar Association, a member of the National Trans Bar Association, and previously served as the Director of Name &amp; Gender Recognition at Transcend Legal. They are a parent of two and graduate of Tulane University (B.A. History, 2009) and New York Law School (2013).&quot;}"><span data-dcnode-id="4573" instrument_node="">Charlie Arrowood (they/them) is an attorney licensed in New York state. They primarily provide transition-related legal services to transgender clients, including name and gender marker change assistance and guidance regarding health insurance coverage and employment matters. Charlie is the Vice Chair of the LGBTQ Committee of the Nassau County Bar Association, a member of the National Trans Bar Association, and previously served as the Director of Name &amp; Gender Recognition at Transcend Legal. They are a parent of two and graduate of Tulane University (B.A. History, 2009) and New York Law School (2013).</span></span><span data-dcnode-id="4571" instrument_node=""> </span><br data-dcnode-id="4570"><br data-dcnode-id="4569"><div data-dcnode-id="4561"><strong data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4566"><a data-dcnode-id="4564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/id-ready-or-not-the-new-frontier-of-transgender-non-binary-and-intersex-identification-document-change-laws-in-2020-and-beyond/" target="_blank"><span data-dcnode-id="4565" instrument_node="">ID Ready or Not?: The New Frontier of Transgender, Non-Binary, and Intersex Identification Document Change Laws in 2020 and Beyond</span></a><br data-dcnode-id="4563"><br data-dcnode-id="4562"></div><hr data-dcnode-id="4560"><strong data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">Susan Baker Manning</span></strong><span data-dcnode-id="4557" instrument_node=""> - </span><span data-dcnode-id="4555" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Susan Baker Manning is a highly experienced litigator, and Morgan, Lewis &amp; Bockius LLP's first Senior Pro Bono Trial Lawyer. In this role, Susan leads large impact litigation matters in support of at-risk individuals and underrepresented groups, such as those seeking access to housing, healthcare, education, and other public benefits, as well as those fleeing persecution in their home countries. She also focuses on expanding the firm's long-standing commitment to civil liberties work across numerous issues, deepening relationships with clients and current partner organizations, and forming alliances with new ones. Susan has dedicated thousands of hours to pro bono service throughout her career. She has made a meaningful impact on the protection of First Amendment, human, and civil rights. Susan's work in recent years has included representing some of the largest businesses in the country in an amicus brief to the US Supreme Court in Obergefell v. Hodges showing how discrimination against same-sex marriage is bad for business, representing several U.S. Senators in a case involving access to the asylum system, and presenting expert analysis by several former surgeons general regarding the fitness of transgender people for military service. Her other pro bono victories include successfully representing a domestic violence shelter in an action to protect its clients following public disclosure of its confidential shelter location; a Guantanamo Bay-related case that received international attention; obtaining asylum for individuals fleeing persecution; and numerous civil rights cases. Susan's pro bono work builds upon her two decades of practice as an intellectual property litigator specializing in patent, trademark, and copyright cases. She has considerable experience at the trial court level (including matters heard by government agencies such as the International Trade Commission), and has argued numerous cases before U.S. Courts of Appeal. Susan has represented name-brand technology companies in matters involving a variety of technology areas including in the software, Internet, hardware, telecommunications, pharmaceutical, and architecture spaces. Prior to joining Morgan Lewis, Susan was a partner in the litigation practice of another international law firm.&quot;}"><span data-dcnode-id="4556" instrument_node="">Susan Baker Manning is a highly experienced litigator, and Morgan, Lewis &amp; Bockius LLP's first Senior Pro Bono Trial Lawyer. In this role, Susan leads large impact litigation matters in support of at-risk individuals and underrepresented groups, such as those seeking access to housing, healthcare, education, and other public benefits, as well as those fleeing persecution in their home countries. She also focuses on expanding the firm's long-standing commitment to civil liberties work across numerous issues, deepening relationships with clients and current partner organizations, and forming alliances with new ones. Susan has dedicated thousands of hours to pro bono service throughout her career. She has made a meaningful impact on the protection of First Amendment, human, and civil rights. Susan's work in recent years has included representing some of the largest businesses in the country in an amicus brief to the US Supreme Court in Obergefell v. Hodges showing how discrimination against same-sex marriage is bad for business, representing several U.S. Senators in a case involving access to the asylum system, and presenting expert analysis by several former surgeons general regarding the fitness of transgender people for military service. Her other pro bono victories include successfully representing a domestic violence shelter in an action to protect its clients following public disclosure of its confidential shelter location; a Guantanamo Bay-related case that received international attention; obtaining asylum for individuals fleeing persecution; and numerous civil rights cases. Susan's pro bono work builds upon her two decades of practice as an intellectual property litigator specializing in patent, trademark, and copyright cases. She has considerable experience at the trial court level (including matters heard by government agencies such as the International Trade Commission), and has argued numerous cases before U.S. Courts of Appeal. Susan has represented name-brand technology companies in matters involving a variety of technology areas including in the software, Internet, hardware, telecommunications, pharmaceutical, and architecture spaces. Prior to joining Morgan Lewis, Susan was a partner in the litigation practice of another international law firm.</span></span><span data-dcnode-id="4554" instrument_node=""> </span><br data-dcnode-id="4553"><br data-dcnode-id="4552"><div data-dcnode-id="4544"><strong data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4549"><a data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/same-sex-couples-marital-children-and-birthright-citizenship/" target="_blank"><span data-dcnode-id="4548" instrument_node="">Same-Sex Couples, Marital Children, and Birthright Citizenship</span></a><br data-dcnode-id="4546"><br data-dcnode-id="4545"></div><hr data-dcnode-id="4543"><strong data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">Cynthia L. Barrett</span></strong><span data-dcnode-id="4540" instrument_node=""> - </span><span data-dcnode-id="4538" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Cynthia L. Barrett, Esq., practices law in Portland, Oregon, focusing on special needs and LGBT estate/life planning. Ms. Barrett served as president of the National Academy of Elder Law Attorneys and the Multnomah County Bar Association, and has made many CLE presentations over the past twenty years on estate, special needs, and LGBT planning issues. She and her partner Karen L. Johnson were married in 2014.&quot;}"><span data-dcnode-id="4539" instrument_node="">Cynthia L. Barrett, Esq., practices law in Portland, Oregon, focusing on special needs and LGBT estate/life planning. Ms. Barrett served as president of the National Academy of Elder Law Attorneys and the Multnomah County Bar Association, and has made many CLE presentations over the past twenty years on estate, special needs, and LGBT planning issues. She and her partner Karen L. Johnson were married in 2014.</span></span><span data-dcnode-id="4537" instrument_node=""> </span><br data-dcnode-id="4536"><br data-dcnode-id="4535"><div data-dcnode-id="4527"><strong data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4532"><a data-dcnode-id="4530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/federal-benefits-for-lgbt-people-and-their-families/" target="_blank"><span data-dcnode-id="4531" instrument_node="">Federal Benefits for LGBTQ+ People and Their Families</span></a><br data-dcnode-id="4529"><br data-dcnode-id="4528"></div><hr data-dcnode-id="4526"><strong data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">Brian M. Basinger</span></strong><span data-dcnode-id="4523" instrument_node=""> - </span><div data-dcnode-id="4518" dir="ltr"><span data-dcnode-id="4522" instrument_node="">
</span><div data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">

Brian M. Basinger&nbsp;is Senior Counsel in the Division of Enforcement for the SEC’s Atlanta Regional Office.&nbsp; He joined the SEC in 2013 after five years at the law firm of King &amp; Spalding LLP in Atlanta where he served on the firm’s Special Matters &amp; Government Investigations practice group.&nbsp; At the SEC, Brian has led investigations and appeared on behalf of the Commission in enforcement actions in the Northern, Middle and Southern Districts of Georgia.&nbsp; His cases have included offering frauds, financial adviser fraud and Ponzi schemes.&nbsp; Brian is co-chair of the SEC’s Lesbian, Gay, Bisexual and Transgender (LGBT) Employee Affinity Group, and he leads the Atlanta Regional Office’s outreach to Spanish-speaking investors, rural investors and the agribusiness community.&nbsp; Brian received his law degree from Georgia State University and received undergraduate degrees in Public Relations and Romance Languages from the University of Georgia.

</span></div><span data-dcnode-id="4517" instrument_node=""> </span><br data-dcnode-id="4516"><br data-dcnode-id="4515"><hr data-dcnode-id="4514"><strong data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">Justin Becker</span></strong><span data-dcnode-id="4511" instrument_node=""> - </span><span data-dcnode-id="4509" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Justin Becker has experience in a variety of international trade legal issues, including anti-dumping and countervailing duty proceedings, national security reviews, and trade policy work. His experience includes major investigations and reviews before the Department of Commerce (DOC) and investigations before the International Trade Commission (ITC). He has appeared before the Court of International Trade and the U.S. Court of Appeals for the Federal Circuit and has argued before a Chapter 19 NAFTA panel. Justin also counsels U.S. and foreign clients on national security and international legal issues, including transactions reviewed by the Committee on Foreign Investment in the United States (CFIUS). Prior to joining Sidley, Justin worked for the DOC in the Office of the Chief Counsel for Trade Enforcement and Compliance. In this role, he provided legal advice to the Office of Enforcement and Compliance in the International Trade Administration concerning the administration of both U.S. and international anti-dumping and countervailing duty laws. He gained experience working on matters before the U.S. Court of International Trade, the U.S. Court of Appeals for the Federal Circuit and the World Trade Organization‚Äôs dispute settlement panels. He also clerked for the Honorable Robert Hinkle of the U.S. District Court for the Northern District of Florida He currently serves as a co-chair of Sidley's DC diversity committee and dedicates a portion of his practice to pro bono matters, and in particular LGBT-related matters.&quot;}"><span data-dcnode-id="4510" instrument_node="">Justin Becker has experience in a variety of international trade legal issues, including anti-dumping and countervailing duty proceedings, national security reviews, and trade policy work. His experience includes major investigations and reviews before the Department of Commerce (DOC) and investigations before the International Trade Commission (ITC). He has appeared before the Court of International Trade and the U.S. Court of Appeals for the Federal Circuit and has argued before a Chapter 19 NAFTA panel. Justin also counsels U.S. and foreign clients on national security and international legal issues, including transactions reviewed by the Committee on Foreign Investment in the United States (CFIUS). Prior to joining Sidley, Justin worked for the DOC in the Office of the Chief Counsel for Trade Enforcement and Compliance. In this role, he provided legal advice to the Office of Enforcement and Compliance in the International Trade Administration concerning the administration of both U.S. and international anti-dumping and countervailing duty laws. He gained experience working on matters before the U.S. Court of International Trade, the U.S. Court of Appeals for the Federal Circuit and the World Trade Organization's dispute settlement panels. He also clerked for the Honorable Robert Hinkle of the U.S. District Court for the Northern District of Florida He currently serves as a co-chair of Sidley's DC diversity committee and dedicates a portion of his practice to pro bono matters, and in particular LGBT-related matters.</span></span><span data-dcnode-id="4508" instrument_node=""> </span><br data-dcnode-id="4507"><br data-dcnode-id="4506"><div data-dcnode-id="4498"><strong data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4503"><a data-dcnode-id="4501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/breaking-down-more-than-just-trade-barriers-the-inclusion-of-human-rights-provisions-in-free-trade-agreements/" target="_blank"><span data-dcnode-id="4502" instrument_node="">Breaking Down More Than Just Trade Barriers: The Inclusion of Human Rights Provisions in Free Trade Agreements</span></a><br data-dcnode-id="4500"><br data-dcnode-id="4499"></div><hr data-dcnode-id="4497"><strong data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Laura Bennett</span></strong><span data-dcnode-id="4494" instrument_node=""> - Laura Bennett is counsel in the Securities and Exchange Commission’s Division of Enforcement in Washington D.C. Prior to joining the SEC, Laura was counsel in the Washington D.C. office of King &amp; Spalding LLP, where she served as chair of the firm’s LGBT Affinity Group. She previously served on the board of directors of Rainbow Families, a non-profit organization that provides social and educational programming for LGBT families in the Washington D.C. area, from 2015-2017 and served as the vice chair of the Dr. Martin Luther King Jr. Holiday Commission for Howard County, Maryland from 2013-2015. Laura earned her bachelor’s degree from Indiana University in 2001 and her law degree from the George Washington University Law School in 2004. </span><br data-dcnode-id="4493"><br data-dcnode-id="4492"><hr data-dcnode-id="4491"><strong data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">Richard Best</span></strong><span data-dcnode-id="4488" instrument_node=""> - Richard R. Best is the&nbsp;Regional Director of the U.S. Securities and Exchange Commission’s Atlanta Regional Office in February 2018.&nbsp;He was previously the Regional Director of the Salt Lake Regional Office, serving from July 2015 to February 2018. Before coming to the Commission, Mr. Best was a Chief Counsel in the Department of Enforcement of the Financial Industry Regulatory Authority (FINRA). Mr. Best was also a Director, Senior Trial Attorney and Trial Attorney at FINRA. Mr. Best previously worked as an Assistant District Attorney in the Office of the Bronx County District Attorney. He was a supervisor in the Office’s Rackets Bureau where he managed high-profile public integrity and organized crime prosecutions, among other matters.&nbsp;Mr. Best received his bachelor’s degree from the State University of New York, College at Old Westbury and a law degree from the Howard University School of Law. </span><br data-dcnode-id="4487"><br data-dcnode-id="4486"><hr data-dcnode-id="4485"><strong data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">Ru Bhatt</span></strong><span data-dcnode-id="4482" instrument_node=""> - Ru Bhatt is a Partner in the&nbsp;</span><a data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mlaglobal.com/en/service/associate-recruiting"><span data-dcnode-id="4481" instrument_node="">Associate Practice Group</span></a><span data-dcnode-id="4479" instrument_node="">&nbsp;and has been a member of Major, Lindsey &amp; Africa's New York office since 2008. Ru specializes in placing attorneys of all levels in top-tier national, international, regional and boutique law firms. He also places attorneys in prominent in-house positions at companies and financial institutions. Ru distinguishes himself by taking pride in acting as a career counselor and a strong advocate for his candidates by helping them identify opportunities that are consistent with their diverse career goals. In his free time, Ru follows his passion for music as a DJ and is actively involved in fundraising efforts for local and national LGBT charity organizations. </span><br data-dcnode-id="4478"><br data-dcnode-id="4477"><div data-dcnode-id="4468"><strong data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">Lateral Program</span></strong><span data-dcnode-id="4474" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="4473"><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/making-the-move-best-practices-for-lateral-candidates/" target="_blank"><span data-dcnode-id="4472" instrument_node="">Making The Move: Best Practices for Lateral Candidates</span></a><br data-dcnode-id="4470"><br data-dcnode-id="4469"></div><hr data-dcnode-id="4467"><strong data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">Edward Bibko</span></strong><span data-dcnode-id="4464" instrument_node=""> - Edward Bibko&nbsp;is the General Counsel, EMEA and Asia, for Jefferies. Previously he was a law firm partner specializing in cross-border listings onto the London Stock Exchange. Edward is US- and UK-qualified and has advised on capital markets transactions for more than 25 years. In addition to acting as co-chair of the US Lawyers in London Forum, he is on the Court of the Worshipful Company of Solicitors and is currently shortlisted for the Association of Corporate Counsel’s General Counsel of the Year award. Edward lives with his wife and an elderly cat, and enjoys mixing cocktails. </span><br data-dcnode-id="4463"><br data-dcnode-id="4462"><hr data-dcnode-id="4461"><strong data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">Dean Mary Anne Bobinski</span></strong><span data-dcnode-id="4458" instrument_node=""> - Mary Anne Bobinski is dean and Asa Griggs Candler Professor of Law at Emory University School of Law. Before joining Emory Law, Mary Anne Bobinski was a professor at the Allard School of Law, where she served as dean from 2003 to 2015. Previously she was the John and Rebecca Moores Professor of Law and director of the Health Law and Policy Institute at the University of Houston Law Center. Professor Bobinski's research and teaching interests include torts, health law, health care finance, bioethics,&nbsp; legal aspects of HIV infection, and reproductive health law issues. She is a co-author of&nbsp;</span><em data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">Health Care Law &amp; Ethics</span></em><span data-dcnode-id="4455" instrument_node=""> (Wolters Kluwer) and the co-­author/co-editor of a two-volume book series on medical ethics. Bobinski has also published a number of law review articles and book chapters on health law topics. She is a past president and board member of the American Society of Law, Medicine and Ethics and a past member of the Canadian Public Health Officer's Ethics Advisory Committee. She has served as a visiting scholar at the Petrie-­Flom Center for Health Law Policy, Biotechnology, and Bioethics at Harvard Law School, the University of Sydney Law School, the Melbourne Law School and the Faculty of Law at Oxford University, where she also held a Plumer Visiting Research Fellowship at St. Anne’s College. &nbsp;Bobinski recently completed a new edition of&nbsp;</span><em data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">Health Care Law &amp; Ethics</span></em><span data-dcnode-id="4452" instrument_node="">&nbsp;(Wolters Kluwer) with her co-authors and is working on a research project focused on the contested nature of the physician-patient relationship, with a particular focus on legal responses to conflicting values or norms. </span><br data-dcnode-id="4451"><br data-dcnode-id="4450"><div data-dcnode-id="4442"><strong data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4447"><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/law-school-panel/" target="_blank"><span data-dcnode-id="4446" instrument_node="">Out in Leadership: Reflections from LGBTQ+ Law School Deans</span></a><br data-dcnode-id="4444"><br data-dcnode-id="4443"></div><hr data-dcnode-id="4441"><strong data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">Mary Bonauto</span></strong><span data-dcnode-id="4438" instrument_node=""> - </span><span data-dcnode-id="4436" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Mary Bonauto has been the Project Director for Civil Rights at GLAD since 1990. During that period, she has been co-counsel in the Vermont, Massachusetts, Connecticut marriage equality litigations and was the prevailing counsel in Goodridge, the first state supreme court decision to require marriage equality (2003-2004). She was also co-counsel in federal court litigation successfully challenging the Defense of Marriage Act. In 2014, she was awarded a MacArthur Fellowship.&quot;}"><span data-dcnode-id="4437" instrument_node="">Mary Bonauto has been the Project Director for Civil Rights at GLAD since 1990. During that period, she has been co-counsel in the Vermont, Massachusetts, Connecticut marriage equality litigations and was the prevailing counsel in Goodridge, the first state supreme court decision to require marriage equality (2003-2004). She was also co-counsel in federal court litigation successfully challenging the Defense of Marriage Act. In 2014, she was awarded a MacArthur Fellowship.</span></span><span data-dcnode-id="4435" instrument_node=""> </span><br data-dcnode-id="4434"><br data-dcnode-id="4433"><div data-dcnode-id="4425"><strong data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4430"><a data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-fifth-anniversary-of-obergefell-how-we-won-and-what-we-lost/" target="_blank"><span data-dcnode-id="4429" instrument_node="">The Fifth Anniversary of Obergefell: How We Won and What We Lost</span></a><br data-dcnode-id="4427"><br data-dcnode-id="4426"></div><hr data-dcnode-id="4424"><strong data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">Candace Bond-Theriault</span></strong><span data-dcnode-id="4421" instrument_node=""> - </span><span data-dcnode-id="4419" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Candace Bond-Theriault (she/her/hers) is the Senior Policy Counsel for Reproductive Rights, Health and Justice, and the Democracy Project Director at the National LGBTQ Task Force. She works through a black queer feminist lens to create change and shift culture towards intersectional liberation through increasing abortion access, contraceptive equity and ensuring religious perspective don't harm civil rights protections. Candace received her LL.M. degree with a focus on gender and legislation from the American University Washington College of Law, her J.D. from North Carolina Central University School of Law, and her B.A. in Human Rights with a focus on race, gender, and sexuality from the College of William and Mary. She is a yoga teacher, writer, makeup enthusiast, and aspiring optimist. Her writing has appeared in the SELF magazine, Blavity, Rewire, Ms. Magazine, the Advocate, the Grio, Medium, and the Huffington Post.&quot;}"><span data-dcnode-id="4420" instrument_node="">Candace Bond-Theriault (she/her/hers) is the Senior Policy Counsel for Reproductive Rights, Health and Justice, and the Democracy Project Director at the National LGBTQ Task Force. She works through a black queer feminist lens to create change and shift culture towards intersectional liberation through increasing abortion access, contraceptive equity and ensuring religious perspective don't harm civil rights protections. Candace received her LL.M. degree with a focus on gender and legislation from the American University Washington College of Law, her J.D. from North Carolina Central University School of Law, and her B.A. in Human Rights with a focus on race, gender, and sexuality from the College of William and Mary. She is a yoga teacher, writer, makeup enthusiast, and aspiring optimist. Her writing has appeared in the SELF magazine, Blavity, Rewire, Ms. Magazine, the Advocate, the Grio, Medium, and the Huffington Post.</span></span><span data-dcnode-id="4418" instrument_node=""> </span><br data-dcnode-id="4417"><br data-dcnode-id="4416"><div data-dcnode-id="4408"><strong data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4413"><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/health-care-reform-in-2020-and-beyond-whats-at-stake-for-lgbtq-people/" target="_blank"><span data-dcnode-id="4412" instrument_node="">Health Care Reform in 2020 and Beyond: What's at Stake for LGBTQ+ People?</span></a><br data-dcnode-id="4410"><br data-dcnode-id="4409"></div><hr data-dcnode-id="4407"><strong data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">Jess Braverman</span></strong><span data-dcnode-id="4404" instrument_node=""> - </span><span data-dcnode-id="4402" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Jess Braverman is the Legal Director at Gender Justice in Minnesota. Jess attended NYU Law School, where she was an Arthur Garfield Hays Civil Liberties Fellow with a focus on LGBT civil rights. Jess came to Gender Justice from the Hennepin County Public Defender‚Äôs office, where she spearheaded the office‚Äôs Special Litigation Unit focusing on racial profiling in policing. Jess was also an attorney at the Legal Aid Society‚Äôs Juvenile Rights Project, representing young people in delinquency and child protection cases in Brooklyn, New York. Jess was formerly a board member of Crux, the LGBT rock climbing nonprofit in NYC.&quot;}"><span data-dcnode-id="4403" instrument_node="">Jess Braverman is the Legal Director at Gender Justice in Minnesota. Jess attended NYU Law School, where she was an Arthur Garfield Hays Civil Liberties Fellow with a focus on LGBT civil rights. Jess came to Gender Justice from the Hennepin County Public Defender's office, where she spearheaded the office's Special Litigation Unit focusing on racial profiling in policing. Jess was also an attorney at the Legal Aid Society's Juvenile Rights Project, representing young people in delinquency and child protection cases in Brooklyn, New York. Jess was formerly a board member of Crux, the LGBT rock climbing nonprofit in NYC.</span></span><span data-dcnode-id="4401" instrument_node=""> </span><br data-dcnode-id="4400"><br data-dcnode-id="4399"><div data-dcnode-id="4391"><strong data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4396"><a data-dcnode-id="4394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/using-state-and-federal-law-to-safeguard-transgender-inclusion-in-sports/" target="_blank"><span data-dcnode-id="4395" instrument_node="">Using State and Federal Law To Safeguard Transgender Inclusion in Sports</span></a><br data-dcnode-id="4393"><br data-dcnode-id="4392"></div><hr data-dcnode-id="4390"><strong data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Hal Brewster</span></strong><span data-dcnode-id="4387" instrument_node=""> - Hal Brewster focuses his practice on litigating political law matters. In his previous job, Hal was a member of multiple trial teams that tried cases to verdict in state and federal courthouses around the country. He has experience preparing witnesses to testify at trial, drafting direct and cross examination outlines, creating graphics for opening statements and closing arguments, and researching evidentiary issues and drafting related motions&nbsp;</span><em data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">in limine</span></em><span data-dcnode-id="4384" instrument_node=""> and bench briefs. For several years, Hal helped to represent several top aides to former Secretary of State Hillary Clinton in the various investigations and inquiries stemming from the Secretary’s use of a private email account during her tenure at the State Department. Hal also maintains an active pro bono practice. In partnership with the D.C. Volunteer Lawyers Project, Hal has successfully represented survivors of domestic abuse in their petitions for protections from their abusers in hearings and trials in D.C. Superior Court. In this capacity, Hal served as lead trial counsel in a six-day trial before Judge Julie Becker that resulted in his client receiving primary physical and legal custody of her five minor children as well as a sizeable allocation of the marital property. Prior to his law career, Hal spent four years as an active duty U.S. Army officer. As a scout and sniper platoon leader, Hal led 40 specialized soldiers in more than 150 combat missions in support of Operation Iraqi Freedom. He is the recipient of the Bronze Star medal for service. Following his time in the army, Hal published five articles in&nbsp;</span><em data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">The New York Times</span></em><span data-dcnode-id="4381" instrument_node="">&nbsp;blog, “At War,” about his experiences in Iraq. </span><br data-dcnode-id="4380"><br data-dcnode-id="4379"><div data-dcnode-id="4371"><strong data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4376"><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/protecting-lgbtq-voters-in-2020/" target="_blank"><span data-dcnode-id="4375" instrument_node="">Protecting LGBTQ+ Voters in 2020</span></a><br data-dcnode-id="4373"><br data-dcnode-id="4372"></div><hr data-dcnode-id="4370"><strong data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Kylar Broadus</span></strong><span data-dcnode-id="4367" instrument_node=""> - </span><span data-dcnode-id="4365" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Broadus is the founder of Trans People of Color Coalition (TPOCC) exists to advance justice for all trans people of color. We amplify Trans POC stories, support our leadership, and challenge issues of racism, transphobia, and transmisogyny. TPOCC envisions a world where trans people of color can live and work in safety, where health and economic equity are basic rights, and we are celebrated for our visibility and leadership in our workplaces, homes, and communities. His portfolio of work includes his diversity, equity and inclusion work, legal and political consulting. He is on the team of The Chapel Law Group, LLC with offices in Jefferson City and Kansas City, Missouri.&quot;}"><span data-dcnode-id="4366" instrument_node="">Broadus is the founder of Trans People of Color Coalition (TPOCC) exists to advance justice for all trans people of color. We amplify Trans POC stories, support our leadership, and challenge issues of racism, transphobia, and transmisogyny. TPOCC envisions a world where trans people of color can live and work in safety, where health and economic equity are basic rights, and we are celebrated for our visibility and leadership in our workplaces, homes, and communities. His portfolio of work includes his diversity, equity and inclusion work, legal and political consulting. He is on the team of The Chapel Law Group, LLC with offices in Jefferson City and Kansas City, Missouri.</span></span><span data-dcnode-id="4364" instrument_node=""> </span><br data-dcnode-id="4363"><br data-dcnode-id="4362"><div data-dcnode-id="4354"><strong data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4359"><a data-dcnode-id="4357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/aging-end-of-life-legal-issues-in-the-transgender-community/" target="_blank"><span data-dcnode-id="4358" instrument_node="">Aging and End-of-Life Legal Issues in the Transgender Community</span></a><br data-dcnode-id="4356"><br data-dcnode-id="4355"></div><hr data-dcnode-id="4353"><strong data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">Yuliya “Jay” Brodska</span></strong><span data-dcnode-id="4350" instrument_node=""> - Yuliya ‘Jay’&nbsp;</span><span class="il" data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">Brodska</span></span><span data-dcnode-id="4347" instrument_node="">&nbsp;is a rising 2L student at Fordham Law School, where they are a Chair of OutLaws and member of the Media and Entertainment Law Society. Jay was born in Dnipro, Ukraine and immigrated to America at the age of 5. They were raised in Staten Island, NY and earned their bachelors degree in Economics from John Jay College of Criminal Justice. Prior to law school, Jay interned with the EEOC office in New York and volunteered with the LGBT Bar Association, where they served as a translator for Russian-speaking clients seeking asylum. </span><br data-dcnode-id="4346"><br data-dcnode-id="4345"><hr data-dcnode-id="4344"><strong data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">Denise Brogan-Kator</span></strong><span data-dcnode-id="4341" instrument_node=""> - Denise Brogan-Kator is the Chief Policy Officer at Family Equality, joining the organization in 2012.&nbsp; Previously, she was the Executive Director at Equality Michigan and the Managing Director for the Rainbow Law Center in Southeast Michigan.&nbsp; She is the first openly transgender law student to matriculate at the University of Michigan Law School (and later returning as the first openly transgender adjunct law professor). &nbsp;In addition to her JD, she has an MBA from the University of Colorado.&nbsp; She currently lives in Florida with her wife, mother-in-law, and 5 cats.&nbsp; She has three grown daughters and two grandchildren who are, collectively, the lights of her life. </span><br data-dcnode-id="4340"><br data-dcnode-id="4339"><div data-dcnode-id="4331"><strong data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4336"><a data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/family-rights-for-lgbtqia-folks-u-s-surrogacy-parentage-laws/" target="_blank"><span data-dcnode-id="4335" instrument_node="">Family Rights for LGBTQIA+ Folks: U.S. Surrogacy and Parentage Laws</span></a><br data-dcnode-id="4333"><br data-dcnode-id="4332"></div><hr data-dcnode-id="4330"><strong data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">Benjamin Brooks</span></strong><span data-dcnode-id="4327" instrument_node=""> - </span><span data-dcnode-id="4325" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Benjamin Brooks is the Assistant Director of Policy at Whitman-Walker Health. He has a passion for bringing quality healthcare to our community by working with our researchers, providers, and patients to create evidence-based policies that capture opportunities to build health equity. Before joining Whitman-Walker, Brooks worked training providers in LGBT cultural competencies and providing technical assistance and capacity building to HIV providers across the country. He is a graduate of Northeastern University School of Law with a law degree and Tufts University School of Medicine with a master's degree in public health.&quot;}"><span data-dcnode-id="4326" instrument_node="">Benjamin Brooks is the Assistant Director of Policy at Whitman-Walker Health. He has a passion for bringing quality healthcare to our community by working with our researchers, providers, and patients to create evidence-based policies that capture opportunities to build health equity. Before joining Whitman-Walker, Brooks worked training providers in LGBT cultural competencies and providing technical assistance and capacity building to HIV providers across the country. He is a graduate of Northeastern University School of Law with a law degree and Tufts University School of Medicine with a master's degree in public health.</span></span><span data-dcnode-id="4324" instrument_node=""> </span><br data-dcnode-id="4323"><br data-dcnode-id="4322"><div data-dcnode-id="4314"><strong data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4319"><a data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/strolling-the-halls-of-power-interjurisdictional-lessons-from-the-legislative-efforts-to-decriminalize-sex-work/" target="_blank"><span data-dcnode-id="4318" instrument_node="">Strolling the Halls of Power: Interjurisdictional Lessons from the Legislative Efforts to Decriminalize Sex Work</span></a><br data-dcnode-id="4316"><br data-dcnode-id="4315"></div><hr data-dcnode-id="4313"><strong data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">Bria Brown-King</span></strong><span data-dcnode-id="4310" instrument_node=""> - Bria (they/she) identifies as a queer, intersex, masculine presenting black person. They are currently living in Delaware, but was born and raised in Harrisburg, Pennsylvania. Bria’s intersex variation is Congenital Adrenal Hyperplasia, CAH for short. Bria works as the Program Coordinator for InterACT. Bria started doing advocacy work as a youth member with interACT where they published articles for the ACLU, TeenVogue, and Them Magazine. They were also the first out intersex person to speak about intersex issues on the steps of the Supreme Court. </span><br data-dcnode-id="4309"><br data-dcnode-id="4308"><div data-dcnode-id="4300"><strong data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4305"><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/intersex-rights-reproductive-health-care-and-bodily-essentialism-legislative-considerations/" target="_blank"><span data-dcnode-id="4304" instrument_node="">Intersex Rights, Reproductive Health Care, and Bodily Essentialism: Legislative Considerations</span></a><br data-dcnode-id="4302"><br data-dcnode-id="4301"></div><hr data-dcnode-id="4299"><strong data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Daniel Bruner</span></strong><span data-dcnode-id="4296" instrument_node=""> - </span><span data-dcnode-id="4294" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Daniel Bruner (he/him/his) is Senior Director of Policy at Whitman-Walker Health and the Whitman-Walker Institute in Washington, DC. For more than 23 years, he has specialized in HIV and LGBTQ legal and policy issues, including health care discrimination; cultural competency among health care professionals; transgender health care and discrimination against transgender and nonbinary individuals; medical privacy; and coordination of medical and legal services to patients to enhance health (medical-legal partnerships). He has published on HIV policy and law and has given many presentations at national legal and medical conferences on legal and policy issues related to LGBTQ health and wellness and HIV treatment and prevention. Dan received his B.A. (summa cum laude) from Rice University and his J.D. (magna cum laude) and Master‚Äôs in Public Policy from the University of Michigan. He was an associate and then a partner at the public interest law firm Spiegel &amp; McDiarmid from 1981 to 1995 and joined Whitman-Walker‚Äôs staff in 1995. From 2004 through 2014, he was Whitman-Walker‚Äôs Director of Legal Services. He taught HIV law and public interest law at American University‚Äôs Washington School of Law from 2000 to 2005, and has received awards from the American Bar Association‚Äôs HIV/AIDS Project Committee, the LGBT Bar Association of DC, and the Washington Council of Lawyers.&quot;}"><span data-dcnode-id="4295" instrument_node="">Daniel Bruner (he/him/his) is Senior Director of Policy at Whitman-Walker Health and the Whitman-Walker Institute in Washington, DC. For more than 2
