t;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Sasha Buchert (she/her) is a Senior Attorney at Lambda Legal working in their new Washington D.C. office. Before joining Lambda Legal, Sasha served as Staff Attorney and Policy Counsel at Transgender Law Center where she engaged in litigation and policy advocacy that was focused on helping transgender and gender-nonconforming people find meaningful employment, obtain competent health care coverage and secure accurate identity documents. Before joining Transgender Law Center, Sasha worked for Basic Rights Oregon, the largest LGBT rights advocacy organization in the state. Sasha was the first openly transgender person to be appointed to an Oregon state board, and from 2012-13, she served as the chair of the Oregon State Hospital Advisory Board. She holds a J.D. from Willamette University. Sasha served proudly in the United States Marine Corps.&quot;}"><span data-dcnode-id="4276" instrument_node="">Sasha Buchert (she/her) is a Senior Attorney at Lambda Legal working in their new Washington D.C. office. Before joining Lambda Legal, Sasha served as Staff Attorney and Policy Counsel at Transgender Law Center where she engaged in litigation and policy advocacy that was focused on helping transgender and gender-nonconforming people find meaningful employment, obtain competent health care coverage and secure accurate identity documents. Before joining Transgender Law Center, Sasha worked for Basic Rights Oregon, the largest LGBT rights advocacy organization in the state. Sasha was the first openly transgender person to be appointed to an Oregon state board, and from 2012-13, she served as the chair of the Oregon State Hospital Advisory Board. She holds a J.D. from Willamette University. Sasha served proudly in the United States Marine Corps.</span></span><span data-dcnode-id="4274" instrument_node=""> </span><br data-dcnode-id="4273"><br data-dcnode-id="4272"><div data-dcnode-id="4264"><strong data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4269"><a data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/administrative-law-2-0-360-degree-picture-of-government-action/" target="_blank"><span data-dcnode-id="4268" instrument_node="">Administrative Law 2.0: 360 Degree Picture of Government Action</span></a><br data-dcnode-id="4266"><br data-dcnode-id="4265"></div><hr data-dcnode-id="4263"><strong data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Joan Burda</span></strong><span data-dcnode-id="4260" instrument_node=""> - </span><span data-dcnode-id="4249" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Joan M. Burda has a solo law practice concentrating in estate planning and LGBTQ issues in Lakewood, Ohio. She is the author of the award-winning book, Estate Planning for Same-Sex Couples, Third Edition (ABA 2015) as well as Gay, Lesbian and Transgender Clients: A Lawyer‚Äôs Guide (ABA 2008) and An Overview of Federal Consumer Law (ABA 1998) -- out of print but a real page turner. Joan writes about LGBT legal issues, estate planning and other topics for various online and print publications. She is a featured speaker on LGBT legal issues at national and international conferences and workshops. Joan is a member of the American Bar Association, the Ohio State Bar Association, the National Lesbian and Gay Bar Association and the American Society of Journalists and Authors. She is an Adjunct Assistant Professor of Law at Case Western Reserve University School of Law and teaches LGBT Legal Issues and Wills, Trusts and Future Interests. In her spare time, she reviews books for the New York Journal of Books. Joan graduated from Bowling Green State University with a Bachelor of Liberal Studies degree, which means she took what she wanted and skipped all the boring classes. She received her law degree from Pepperdine University School of Law‚ a school located on a bluff overlooking Malibu--not at all conducive to studying so it‚Äôs a good thing the first two years were in a converted warehouse in Anaheim. Speaking of which - during law school, Joan worked as a security officer (aka a \&quot;mouseifer\&quot;) at Disneyland. She lives in Lakewood, Ohio with her spouse, Betsy.&quot;}"><span data-dcnode-id="4259" instrument_node="">Joan M. Burda has a solo law practice concentrating in estate planning and LGBTQ issues in Lakewood, Ohio. She is the author of the award-winning book, </span><em data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">Estate Planning for Same-Sex Couples</span></em><span data-dcnode-id="4256" instrument_node="">, Third Edition (ABA 2015) as well as </span><em data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">Gay, Lesbian and Transgender Clients: A Lawyer's Guide</span></em><span data-dcnode-id="4253" instrument_node=""> (ABA 2008) and </span><em data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">An Overview of Federal Consumer Law</span></em><span data-dcnode-id="4250" instrument_node=""> (ABA 1998) -- out of print but a real page turner. Joan writes about LGBT legal issues, estate planning and other topics for various online and print publications. She is a featured speaker on LGBT legal issues at national and international conferences and workshops. Joan is a member of the American Bar Association, the Ohio State Bar Association, the National Lesbian and Gay Bar Association and the American Society of Journalists and Authors. She is an Adjunct Assistant Professor of Law at Case Western Reserve University School of Law and teaches LGBT Legal Issues and Wills, Trusts and Future Interests. In her spare time, she reviews books for the New York Journal of Books. Joan graduated from Bowling Green State University with a Bachelor of Liberal Studies degree, which means she took what she wanted and skipped all the boring classes. She received her law degree from Pepperdine University School of Law‚ a school located on a bluff overlooking Malibu--not at all conducive to studying so it's a good thing the first two years were in a converted warehouse in Anaheim. Speaking of which - during law school, Joan worked as a security officer (aka a "mouseifer") at Disneyland. She lives in Lakewood, Ohio with her spouse, Betsy.</span></span><span data-dcnode-id="4248" instrument_node=""> </span><br data-dcnode-id="4247"><br data-dcnode-id="4246"><div data-dcnode-id="4238"><strong data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4243"><a data-dcnode-id="4241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/federal-benefits-for-lgbt-people-and-their-families/" target="_blank"><span data-dcnode-id="4242" instrument_node="">Federal Benefits for LGBTQ+ People and Their Families</span></a><br data-dcnode-id="4240"><br data-dcnode-id="4239"></div><hr data-dcnode-id="4237"><strong data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">Lisa Burke</span></strong><span data-dcnode-id="4234" instrument_node=""> - </span><span data-dcnode-id="4232" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Lisa R. Burke currently serves as the Diversity, Inclusion, and Community Engagement Program Coordinator and as a SOGI/LGBTQ Resource Navigator at the New Jersey Administrative Office of the Courts. She began her public sector career in the Bail Unit in Hudson Vicinage in 1990 and joined the staff of the Administrative Office of the Courts in 2004 following six years in higher education administration. She has extensive academic and professional background in diversity issues, the delivery of related trainings, and the development of SOGI/LGBTQ-focused diversity and inclusion-informed best practices in the courts. Some of her areas of academic and professional expertise and interest including gender, race, culture, sexuality, age, religion, ability, and human rights and the intersections of these sometimes seemingly conflicting aspects of identity and experience. Lisa is an active and engaged member of the NJSBA and enjoys involvement in several sections and committees. A published author of both academic and creative works, she also has experience as a PK-16 teacher and expertise in adult education, having designed, developed, and taught a variety of college-level courses and court-based professional development and continuing legal education (CLE) trainings. She has presented nationally and published on the global HIV/AIDS pandemic, human rights across cultures, gender in complex humanitarian crises, law-related education, communication in cyberspace, and LGBTQI and SOGI access to justice issues. Among her many professional endeavors, Lisa is a member of the National Consortium on Racial and Ethnic Fairness in the Courts and the New Jersey State Bar Association. As an NJSBA member she is active and engaged in a number of sections and committees including the LGBT Rights Section, Minorities in the Profession Section, Immigration Law Section, and the Government, Public Sector, and Public Interest Legal Professionals Special Committee. A graduate of New Jersey City University and Columbia University, she also has undertaken post-graduate courses through the University of Colorado at Colorado Springs certificate program in diversity and inclusion and is currently pursuing additional advanced studies through the Washington University at St. Louis School of Law.&quot;}"><span data-dcnode-id="4233" instrument_node="">Lisa R. Burke currently serves as the Diversity, Inclusion, and Community Engagement Program Coordinator and as a SOGI/LGBTQ Resource Navigator at the New Jersey Administrative Office of the Courts. She began her public sector career in the Bail Unit in Hudson Vicinage in 1990 and joined the staff of the Administrative Office of the Courts in 2004 following six years in higher education administration. She has extensive academic and professional background in diversity issues, the delivery of related trainings, and the development of SOGI/LGBTQ-focused diversity and inclusion-informed best practices in the courts. Some of her areas of academic and professional expertise and interest including gender, race, culture, sexuality, age, religion, ability, and human rights and the intersections of these sometimes seemingly conflicting aspects of identity and experience. Lisa is an active and engaged member of the NJSBA and enjoys involvement in several sections and committees. A published author of both academic and creative works, she also has experience as a PK-16 teacher and expertise in adult education, having designed, developed, and taught a variety of college-level courses and court-based professional development and continuing legal education (CLE) trainings. She has presented nationally and published on the global HIV/AIDS pandemic, human rights across cultures, gender in complex humanitarian crises, law-related education, communication in cyberspace, and LGBTQI and SOGI access to justice issues. Among her many professional endeavors, Lisa is a member of the National Consortium on Racial and Ethnic Fairness in the Courts and the New Jersey State Bar Association. As an NJSBA member she is active and engaged in a number of sections and committees including the LGBT Rights Section, Minorities in the Profession Section, Immigration Law Section, and the Government, Public Sector, and Public Interest Legal Professionals Special Committee. A graduate of New Jersey City University and Columbia University, she also has undertaken post-graduate courses through the University of Colorado at Colorado Springs certificate program in diversity and inclusion and is currently pursuing additional advanced studies through the Washington University at St. Louis School of Law.</span></span><span data-dcnode-id="4231" instrument_node=""> </span><br data-dcnode-id="4230"><br data-dcnode-id="4229"><div data-dcnode-id="4221"><strong data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4226"><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/training-trainings-and-more-trainings-advancing-lgbtq-equity-and-access-to-justice-through-professional-development-for-law-schools-private-firms-and-court-systems/" target="_blank"><span data-dcnode-id="4225" instrument_node="">Training, Trainings, and More Trainings? Advancing LGBTQ+ Equity and Access to Justice through Professional Development for Law Schools, Private Firms, and Court Systems</span></a><br data-dcnode-id="4223"><br data-dcnode-id="4222"></div><div data-dcnode-id="4213"><strong data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4218"><a data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/visibilizing-bisexuals-in-lgbtqia-rights-discourse-and-communities/" target="_blank"><span data-dcnode-id="4217" instrument_node="">Visibilizing Bisexuals in LGBTQIA+ Rights Discourse and Communities</span></a><br data-dcnode-id="4215"><br data-dcnode-id="4214"></div><hr data-dcnode-id="4212"><strong data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">Paul Burke</span></strong><span data-dcnode-id="4209" instrument_node=""> - </span><span data-dcnode-id="4207" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Mr. Burke is a shareholder, director, and general counsel of Ray Quinney &amp; Nebeker, which is one of the oldest and largest firms in the Intermountain West. Mr. Burke was honored by the Utah Bar Commission as the Utah's Lawyer of the Year for 2019. Previously he was recognized in 2012 as the Utah State Bar's Pro Bono Lawyer of the Year for his service to the public, the legal profession, and the LGBT community. Mr. Burke serves on the Board of Directors of Equality Utah. He was honored in 2015 by Utah Pride as a \&quot;Utah Hero\&quot; for his public advocacy on behalf of Utah's LGBT citizens. His work defending the rights of an abused lesbian teenager was chronicled in the book \&quot;Saving Alex\&quot; and the recent Lifetime movie \&quot;Trapped: The Alex Cooper Story.\&quot; In addition to his civil rights work, Mr. Burke maintains a complex civil litigation practice with an emphasis in the realm of labor and employment law. He also advises other law firms on professional ethics and risk management, and he defends lawyers accused of ethical misconduct or malpractice.&quot;}"><span data-dcnode-id="4208" instrument_node="">Mr. Burke is a shareholder, director, and general counsel of Ray Quinney &amp; Nebeker, which is one of the oldest and largest firms in the Intermountain West. Mr. Burke was honored by the Utah Bar Commission as the Utah's Lawyer of the Year for 2019. Previously he was recognized in 2012 as the Utah State Bar's Pro Bono Lawyer of the Year for his service to the public, the legal profession, and the LGBT community. Mr. Burke serves on the Board of Directors of Equality Utah. He was honored in 2015 by Utah Pride as a "Utah Hero" for his public advocacy on behalf of Utah's LGBT citizens. His work defending the rights of an abused lesbian teenager was chronicled in the book "Saving Alex" and the recent Lifetime movie "Trapped: The Alex Cooper Story." In addition to his civil rights work, Mr. Burke maintains a complex civil litigation practice with an emphasis in the realm of labor and employment law. He also advises other law firms on professional ethics and risk management, and he defends lawyers accused of ethical misconduct or malpractice.</span></span><span data-dcnode-id="4206" instrument_node=""> </span><br data-dcnode-id="4205"><br data-dcnode-id="4204"><div data-dcnode-id="4196"><strong data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4201"><a data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/born-perfect-the-journey-from-saving-alex-to-ban-conversion-therapy-in-utah/" target="_blank"><span data-dcnode-id="4200" instrument_node="">Born Perfect: The Journey from Saving Alex to Ban Conversion Therapy in Utah</span></a><br data-dcnode-id="4198"><br data-dcnode-id="4197"></div><hr data-dcnode-id="4195"><strong data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Marla Butler</span></strong><span data-dcnode-id="4192" instrument_node=""> - Marla Butler is a Partner in the Business Litigation and Intellectual Property practice groups of Thompson Hine LLP. Marla represents clients in the medical, semiconductor, power, networking and other high-tech industries in high-stakes commercial litigations, arbitrations and trials. Marla has developed a deep understanding of technology and is skilled at building and leading diverse teams of lawyers, scientists and economists, which enhances her ability to devise and implement successful litigation and trial strategies and to simplify complex technology concepts for judges, juries and arbitrators. She has received distinctions from Benchmark Litigation, Super Lawyers, Savoy and Atlanta Volunteer Lawyers Foundation as a leader in Litigation, Intellectual Property and Diversity, Equity and Inclusion. Marla is a fellow of the American Bar Foundation and the Litigation Counsel of America. Marla is also on the Board of Directors of Leadership Institute for Women of Color Attorneys and the National LGBT Bar Association. She is a former board member of Lambda Legal. </span><br data-dcnode-id="4191"><br data-dcnode-id="4190"><div data-dcnode-id="4182"><strong data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4187"><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/navigating-client-expectations-an-experiential-journey-for-diverse-practitioners/" target="_blank"><span data-dcnode-id="4186" instrument_node="">Navigating Client Expectations: An Experiential Journey for Diverse Practitioners</span></a><br data-dcnode-id="4184"><br data-dcnode-id="4183"></div><hr data-dcnode-id="4181"><strong data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">Nevin Caple</span></strong><span data-dcnode-id="4178" instrument_node=""> -  </span><br data-dcnode-id="4177"><br data-dcnode-id="4176"><hr data-dcnode-id="4175"><strong data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">Alejandra Caraballo</span></strong><span data-dcnode-id="4172" instrument_node=""> - </span><span data-dcnode-id="4170" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Alejandra Caraballo currently serves as a staff attorney at the Transgender Legal Defense and Education Fund (TLDEF) where she handles all stages of impact litigation to advance the rights of transgender people. Alejandra previously served as the Staff Attorney of the LGBTQ Law Project at New York Legal Assistance Group where she represented clients in a variety of civil legal matters such as immigration, family law, name and gender marker changes, and anti-discrimination litigation. Alejandra currently serves as the Secretary of the LGBTQ Rights Committee of the New York Bar Association and as a Board Member of the Translatina Network. Alejandra was appointed as the first openly trans community board member in Brooklyn and currently serves as the Housing Committee Chair. Alejandra received her J.D. from Brooklyn Law School where she externed in the Helping Elders through Litigation and Policy (HELP) clinic and the Safe Harbor Asylum Law clinic. Alejandra received her B.A. in Government and World Affairs with a minor in Chemistry at the University of Tampa. In her spare time, Alejandra can be found playing guitar, creating electronic music, and brewing beer.&quot;}"><span data-dcnode-id="4171" instrument_node="">Alejandra Caraballo currently serves as a staff attorney at the Transgender Legal Defense and Education Fund (TLDEF) where she handles all stages of impact litigation to advance the rights of transgender people. Alejandra previously served as the Staff Attorney of the LGBTQ Law Project at New York Legal Assistance Group where she represented clients in a variety of civil legal matters such as immigration, family law, name and gender marker changes, and anti-discrimination litigation. Alejandra currently serves as the Secretary of the LGBTQ Rights Committee of the New York Bar Association and as a Board Member of the Translatina Network. Alejandra was appointed as the first openly trans community board member in Brooklyn and currently serves as the Housing Committee Chair. Alejandra received her J.D. from Brooklyn Law School where she externed in the Helping Elders through Litigation and Policy (HELP) clinic and the Safe Harbor Asylum Law clinic. Alejandra received her B.A. in Government and World Affairs with a minor in Chemistry at the University of Tampa. In her spare time, Alejandra can be found playing guitar, creating electronic music, and brewing beer.</span></span><span data-dcnode-id="4169" instrument_node=""> </span><br data-dcnode-id="4168"><br data-dcnode-id="4167"><div data-dcnode-id="4159"><strong data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4164"><a data-dcnode-id="4162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/existing-and-thriving-as-a-trans-femme-attorney/" target="_blank"><span data-dcnode-id="4163" instrument_node="">Existing and Thriving as a Trans-femme Attorney</span></a><br data-dcnode-id="4161"><br data-dcnode-id="4160"></div><div data-dcnode-id="4148"><strong data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="4156" instrument_node="">: August 13, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4153"><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/why-trans-kids-why-now-the-reactionary-attack-on-transgender-rights/" target="_blank"><span data-dcnode-id="4152" instrument_node="">Why Trans Kids, Why Now: The Reactionary Attack on Transgender Rights</span></a><br data-dcnode-id="4150"><br data-dcnode-id="4149"></div><hr data-dcnode-id="4147"><strong data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Sunu Chandy</span></strong><span data-dcnode-id="4144" instrument_node=""> - Sunu P. Chandy is the Legal Director of the National Women’s Law Center. She oversees the Center’s litigation efforts, providing strategy across the NWLC to create better outcomes for women and girls at school, the workplace, and the healthcare sector. She helped to create the Center’s Legal Network for Gender Equity and build the policies and procedures guiding the TIME’S UP Legal Defense Fund. She also provides guidance for the Center’s policy positions towards greater workplace equality. Until August 2017, Sunu served as the Deputy Director for the Civil Rights Division with the U.S. Department of Health and Human Services, where she led civil rights enforcement including in the areas of language access, auxiliary aids and services for individuals with disabilities and sex discrimination cases under Section 1557 of the Affordable Care Act. Before that, Sunu was the General Counsel of the DC Office of Human Rights (OHR) and in that role oversaw the agency’s legal decisions following civil rights investigations of discrimination in employment, education, housing and public accommodation matters. Previously, Sunu was a federal attorney with the U.S. Employment Opportunity Commission (EEOC) for 15 years and litigated cases including based on sexual harassment and other forms of sex discrimination, as well as race, national origin, disability, age and religion based discrimination cases. At EEOC, Sunu led several outreach and training initiatives including as a member of the White House Initiative on Asian Americans and Pacific Islanders (WHIAPPI) Regional Working Group. Sunu began her legal career as a law firm associate representing unions and individual workers in New York City at Gladstein, Reif and Megginniss, LLP. Sunu earned her B.A. in Peace and Global Studies/Women’s Studies from Earlham College in Richmond, Indiana, her law degree from Northeastern University School of Law in Boston and more recently, she completed her MFA in Creative Writing (Poetry) from CUNY/Queens College. Sunu has served on the boards of directors of several organizations including the Audre Lorde Project, the South Asian Women’s Creative Collective and LeGal (the LGBTQ attorneys’ organization in New York City). Sunu currently serves on the board of directors for the Transgender Law Center and volunteers with Split This Rock, a national social justice poetry organization. </span><br data-dcnode-id="4143"><br data-dcnode-id="4142"><div data-dcnode-id="4131"><strong data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="4139" instrument_node="">: August 12, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4136"><a data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/title-vii-and-beyond-the-scope-of-lgbtq-employment-law-in-the-aftermath-of-bostock-stephens-zarda/" target="_blank"><span data-dcnode-id="4135" instrument_node="">Title VII and Beyond: The Scope of Civil Rights Protections in the Aftermath of Bostock/Stephens/Zarda</span></a><br data-dcnode-id="4133"><br data-dcnode-id="4132"></div><div data-dcnode-id="4123"><strong data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4128"><a data-dcnode-id="4126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/supreme-court-review-2019-2020-term/" target="_blank"><span data-dcnode-id="4127" instrument_node="">Supreme Court Review: The Blockbuster 2019-2020 Term</span></a><br data-dcnode-id="4125"><br data-dcnode-id="4124"></div><hr data-dcnode-id="4122"><strong data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">Tiffany Chang</span></strong><span data-dcnode-id="4119" instrument_node=""> - Tiffany Chang is a counsel in Crowell &amp; Moring's Orange County office, where she practices in the Antitrust Group. Tiffany focuses on claims recovery in large antitrust and tort settlements. In addition to her active recovery practice, Tiffany advocates for the LGBTQ+ community through at Crowell &amp; Moring. As a counsel and a member of the firm’s LGBTQ+ affinity group, Tiffany dedicates a significant part of her practice to pro bono advocacy in the LGBTQ+ space, and is currently representing a gay man from Cuba seeking asylum under the Violence Against Women Act. Tiffany is also a member of Crowell &amp; Moring’s Asian American &amp; Pacific Islander affinity group, the Women’s Leadership Initiative, and the firm’s Diversity Council.&nbsp; Outside of Crowell &amp; Moring, Tiffany is an active member of the Orange County legal community.&nbsp; She is a founding board member of the Orange County Lavender Bar Association and maintains Emeritus status with OCLBA as well as with the Orange County Equality Coalition, and is a member of the Orange County Bar Association. </span><br data-dcnode-id="4118"><br data-dcnode-id="4117"><div data-dcnode-id="4109"><strong data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4114"><a data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/proud-at-work-the-power-of-employee-resource-groups/" target="_blank"><span data-dcnode-id="4113" instrument_node="">Proud At Work: The Power of Employee Resource Groups</span></a><br data-dcnode-id="4111"><br data-dcnode-id="4110"></div><hr data-dcnode-id="4108"><strong data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">Puneet Cheema</span></strong><span data-dcnode-id="4105" instrument_node=""> - Puneet Cheema is a Staff Attorney for Lambda Legal, the oldest and largest national legal organization committed to achieving full recognition of the civil rights of LGBT+ people and people with HIV. Puneet is a member of the LGBT/HIV Criminal Justice Workgroup, and Lambda Legal’s representative in DC’s Sex Worker Advocacy Coalition. Puneet has extensive litigation experience and works to expand and protect the rights of LGBTQ people through litigation, policy, and advocacy in all areas, including access to health care and accurate identity documents, workplace discrimination, and discrimination in schools. She has been lead counsel for Lambda Legal in Family Equality v. Azar, and Equality Arizona v. Hoffman, and counsel in Zzyym v. Pompeo, County of Santa Clara v. Azar, and Eller v. Prince George’s County Public Schools.Prior to joining Lambda, Puneet served as a Trial Attorney in the Special Litigation Section of the Civil Rights Division in the Department of Justice (DOJ) where she played a leading role in the DOJ’s investigation of the Baltimore Police Department and was part of the team that litigated the DOJ’s case against Sheriff Joseph Arpaio of Maricopa County, Arizona. </span><br data-dcnode-id="4104"><br data-dcnode-id="4103"><hr data-dcnode-id="4102"><strong data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Marcy Chell</span></strong><span data-dcnode-id="4099" instrument_node=""> - Marcy Chell, LICSW is a Program Manager at the District of Columbia Child and Family Services Agency.&nbsp; She has worked in Child Welfare, in both DC and NYC, for 15 years. Marcy also worked for the District of Columbia Public School System for 5 years; allowing her time to foster from CFSA and adopt 2 teenagers.&nbsp; She’s also a proud grandmother of a 2 year old.&nbsp; Marcy is a strong advocate for the LGBTQ population and commits to providing the best foster family experience for youth who identify as such, who have to enter foster care.&nbsp; She is thrilled to take part in this Conference. </span><br data-dcnode-id="4098"><br data-dcnode-id="4097"><div data-dcnode-id="4089"><strong data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4094"><a data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/quashing-hope-a-review-of-recent-efforts-to-disrupt-the-participation-of-lgbtq-individuals-in-the-u-s-foster-care-system-and-their-forming-of-families-through-adoption/" target="_blank"><span data-dcnode-id="4093" instrument_node="">Quashing Hope: A Review of Recent Efforts to Disrupt the Participation of LGBTQ+ Individuals in the U.S. Foster Care System and their Forming of Families Through Adoption</span></a><br data-dcnode-id="4091"><br data-dcnode-id="4090"></div><hr data-dcnode-id="4088"><strong data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">Alexander Chen</span></strong><span data-dcnode-id="4085" instrument_node=""> - </span><span data-dcnode-id="4083" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Alexander Chen is a Clinical Instructor and the Founding Director of the Harvard Law School LGBTQ+ Advocacy Clinic. Alexander's work focuses on expanding the rights of LGBTQ+ people through impact litigation, policy advocacy, and direct representation at both the national and local levels. He also teaches the Law School's inaugural course on Gender Identity and the Law. Previously, Alexander served as an Equal Justice Works Fellow at the National Center for Lesbian Rights, one of the nation's leading LGBTQ+ advocacy organizations. At NCLR, Alexander engaged in LGBTQ+ impact litigation and policy advocacy in education, employment, health care, housing, prisons, and juvenile justice and child welfare settings. Alexander was a member of the litigation team in the transgender military cases Doe v. Trump and Stockman v. Trump, as well as the landmark Ninth Circuit transgender prisoner surgery access case Edmo v. Corizon. He also co-drafted AB 2119, a bill that made California the first state to guarantee access to transition-related health care for trans youth in foster care. Alexander received his B.A. from Oxford University, his M.A. from Columbia University, and his J.D. from Harvard Law School, where he was the first openly transgender editor of the Harvard Law Review and worked on trans issues at the Department of Justice, the ACLU LGBT &amp; HIV Project, and the National Center for Transgender Equality. He clerked on the Ninth Circuit for the Hon. M. Margaret McKeown, and in the Southern District of California for the Hon. Gonzalo P. Curiel.&quot;}"><span data-dcnode-id="4084" instrument_node="">Alexander Chen is a Clinical Instructor and the Founding Director of the Harvard Law School LGBTQ+ Advocacy Clinic. Alexander's work focuses on expanding the rights of LGBTQ+ people through impact litigation, policy advocacy, and direct representation at both the national and local levels. He also teaches the Law School's inaugural course on Gender Identity and the Law. Previously, Alexander served as an Equal Justice Works Fellow at the National Center for Lesbian Rights, one of the nation's leading LGBTQ+ advocacy organizations. At NCLR, Alexander engaged in LGBTQ+ impact litigation and policy advocacy in education, employment, health care, housing, prisons, and juvenile justice and child welfare settings. Alexander was a member of the litigation team in the transgender military cases Doe v. Trump and Stockman v. Trump, as well as the landmark Ninth Circuit transgender prisoner surgery access case Edmo v. Corizon. He also co-drafted AB 2119, a bill that made California the first state to guarantee access to transition-related health care for trans youth in foster care. Alexander received his B.A. from Oxford University, his M.A. from Columbia University, and his J.D. from Harvard Law School, where he was the first openly transgender editor of the Harvard Law Review and worked on trans issues at the Department of Justice, the ACLU LGBT &amp; HIV Project, and the National Center for Transgender Equality. He clerked on the Ninth Circuit for the Hon. M. Margaret McKeown, and in the Southern District of California for the Hon. Gonzalo P. Curiel.</span></span><span data-dcnode-id="4082" instrument_node=""> </span><br data-dcnode-id="4081"><br data-dcnode-id="4080"><div data-dcnode-id="4072"><strong data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4077"><a data-dcnode-id="4075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/whats-left-for-transgender-rights-after-harris-funeral-homes-v-eeoc/" target="_blank"><span data-dcnode-id="4076" instrument_node="">What's Left for Transgender Rights After Harris Funeral Homes v EEOC</span></a><br data-dcnode-id="4074"><br data-dcnode-id="4073"></div><div data-dcnode-id="4061"><strong data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="4069" instrument_node="">: August 12, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="4066"><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqba
