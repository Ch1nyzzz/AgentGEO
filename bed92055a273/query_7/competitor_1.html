nce-workshops/the-struggles-faced-by-incarcerated-transgender-gender-non-conforming-intersex-and-non-binary-people-effective-reforms-for-jails-and-prisons/" target="_blank"><span data-dcnode-id="2930" instrument_node="">The Struggles Faced by Incarcerated Transgender, Gender Non-conforming, Intersex and Non-binary People: Effective Reforms for Jails and Prisons</span></a><br data-dcnode-id="2928"><br data-dcnode-id="2927"></div><hr data-dcnode-id="2925"><strong data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Vonda Kirby Pardo</span></strong><span data-dcnode-id="2922" instrument_node=""> - Vonda Kirby Pardo is product and commercial counsel at Google. In this hybrid role, she advises on commercial deals and issues, including those related to Google’s unified mobile development platform, Firebase, and counsels the Material Design team, which has a mission to enable developers and designers to build high-quality digital experiences. She joined Google in April, during the pandemic, after working as an associate general counsel at Facebook. During her time at Facebook, Vonda worked closely with various client teams on commercial-related matters in connection with the development and supply of components for augmented and virtual reality devices. Prior to Facebook, she worked as commercial counsel at GE Appliances, which is where she began her in-house career.&nbsp; Before moving in-house, Vonda spent seven years in private practice as a commercial litigator.&nbsp; She currently lives in the Bay Area with her wife, who is pregnant with their first child due this December, and their two dogs. </span><br data-dcnode-id="2921"><br data-dcnode-id="2920"><hr data-dcnode-id="2919"><strong data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Paula Kohut</span></strong><span data-dcnode-id="2916" instrument_node=""> - </span><span data-dcnode-id="2914" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Paula A. Kohut is a shareholder in Kohut &amp; Adams, PA in Wilmington, North Carolina. Her principal practice areas are estate planning, trust and estate administration, business law and asset protection. Paula is a Fellow in the American College of Trust and Estate Counsel. She received her B.A. degree, from the University of California at Irvine in 1980 and her J.D. degree, with honors, from Wake Forest University School of Law in 1983. She is a Council Member of the Estate and Fiduciary Law Section of the North Carolina Bar Association, the North Carolina Commission on Inclusion and the Governor's Council on Aging. She also serves on the Boards Coastal Women Attorneys and St. Jude's Wilmington Foundation, Inc.&quot;}"><span data-dcnode-id="2915" instrument_node="">Paula A. Kohut is a shareholder in Kohut &amp; Adams, PA in Wilmington, North Carolina. Her principal practice areas are estate planning, trust and estate administration, business law and asset protection. Paula is a Fellow in the American College of Trust and Estate Counsel. She received her B.A. degree, from the University of California at Irvine in 1980 and her J.D. degree, with honors, from Wake Forest University School of Law in 1983. She is a Council Member of the Estate and Fiduciary Law Section of the North Carolina Bar Association, the North Carolina Commission on Inclusion and the Governor's Council on Aging. She also serves on the Boards Coastal Women Attorneys and St. Jude's Wilmington Foundation, Inc.</span></span><span data-dcnode-id="2913" instrument_node=""> </span><br data-dcnode-id="2912"><br data-dcnode-id="2911"><div data-dcnode-id="2903"><strong data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2908"><a data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/aging-end-of-life-legal-issues-in-the-transgender-community/" target="_blank"><span data-dcnode-id="2907" instrument_node="">Aging and End-of-Life Legal Issues in the Transgender Community</span></a><br data-dcnode-id="2905"><br data-dcnode-id="2904"></div><hr data-dcnode-id="2902"><strong data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Sydney Kopp-Richardson</span></strong><span data-dcnode-id="2899" instrument_node=""> - </span><span data-dcnode-id="2897" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Sydney Kopp-Richardson is the Director of SAGE‚Äôs National LGBT Elder Housing Initiative, working to reshape the housing landscape nationally and increase the availability of safer LGBT elder housing through policy advocacy, research, and housing development. Previously, Sydney worked in Chicago, Los Angeles, and New York City in direct service, organizing and advocacy, and policy analysis around affordable housing development. Through an anti-racist framework, Sydney centers the needs of LGBTQ communities, people involved in the justice system, people living with mental health challenges, and others living in the margins. Sydney has developed anti-violence curriculum and policy recommendations for LGBTQ communities and infuses this into her work in housing development and sexual violence prevention in New York City nightlife venues. Sydney brings a reverence for the expertise and legacies of LGBTQ elders in the formation of policies and programming developed to serve them in the fight for collective liberation, and she brings this to SAGE‚Äôs national housing initiative.&quot;}"><span data-dcnode-id="2898" instrument_node="">Sydney Kopp-Richardson is the Director of SAGE's National LGBT Elder Housing Initiative, working to reshape the housing landscape nationally and increase the availability of safer LGBT elder housing through policy advocacy, research, and housing development. Previously, Sydney worked in Chicago, Los Angeles, and New York City in direct service, organizing and advocacy, and policy analysis around affordable housing development. Through an anti-racist framework, Sydney centers the needs of LGBTQ communities, people involved in the justice system, people living with mental health challenges, and others living in the margins. Sydney has developed anti-violence curriculum and policy recommendations for LGBTQ communities and infuses this into her work in housing development and sexual violence prevention in New York City nightlife venues. Sydney brings a reverence for the expertise and legacies of LGBTQ elders in the formation of policies and programming developed to serve them in the fight for collective liberation, and she brings this to SAGE's national housing initiative.</span></span><span data-dcnode-id="2896" instrument_node=""> </span><br data-dcnode-id="2895"><br data-dcnode-id="2894"><div data-dcnode-id="2886"><strong data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2891"><a data-dcnode-id="2889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-state-of-housing-law-affordable-housing-policy-and-development-for-lgbtq-communities/" target="_blank"><span data-dcnode-id="2890" instrument_node="">The State of Housing Law: Affordable Housing Policy and Development for LGBTQ Communities</span></a><br data-dcnode-id="2888"><br data-dcnode-id="2887"></div><hr data-dcnode-id="2885"><strong data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Jay Larry</span></strong><span data-dcnode-id="2882" instrument_node=""> - </span><span data-dcnode-id="2880" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Jay Larry advises domestic and international privately- and publicly-held companies active in the energy industry with regard to mergers, acquisitions, divestitures and joint ventures. Jay has also counseled special purpose acquisition companies in connection with their acquisitions of target companies. Jay represents issuers in capital markets transactions, including private and public offerings of debt and equity securities and tender offers. He also provides guidance in connection with Exchange Act reporting and corporate governance matters, including compliance with the rules of the NYSE and NASDAQ. Jay is a member of the board of the National Trans Bar Association and interned at the Transgender Law Center in 2015. In 2018, he published \&quot;The Transgender Marriage Dilemma\&quot; with the Wisconsin Journal of Law, Gender &amp; Society.&quot;}"><span data-dcnode-id="2881" instrument_node="">Jay Larry advises domestic and international privately- and publicly-held companies active in the energy industry with regard to mergers, acquisitions, divestitures and joint ventures. Jay has also counseled special purpose acquisition companies in connection with their acquisitions of target companies. Jay represents issuers in capital markets transactions, including private and public offerings of debt and equity securities and tender offers. He also provides guidance in connection with Exchange Act reporting and corporate governance matters, including compliance with the rules of the NYSE and NASDAQ. Jay is a member of the board of the National Trans Bar Association and interned at the Transgender Law Center in 2015. In 2018, he published "The Transgender Marriage Dilemma" with the Wisconsin Journal of Law, Gender &amp; Society.</span></span><span data-dcnode-id="2879" instrument_node=""> </span><br data-dcnode-id="2878"><br data-dcnode-id="2877"><div data-dcnode-id="2869"><strong data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2874"><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtqia-in-big-law-a-how-to-guide-for-law-students/" target="_blank"><span data-dcnode-id="2873" instrument_node="">LGBTQIA+ in Big Law: A How-To Guide for Law Students</span></a><br data-dcnode-id="2871"><br data-dcnode-id="2870"></div><div data-dcnode-id="2861"><strong data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2866"><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/navigating-client-expectations-an-experiential-journey-for-diverse-practitioners/" target="_blank"><span data-dcnode-id="2865" instrument_node="">Navigating Client Expectations: An Experiential Journey for Diverse Practitioners</span></a><br data-dcnode-id="2863"><br data-dcnode-id="2862"></div><div data-dcnode-id="2852"><strong data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Law Student Career Planning Program</span></strong><span data-dcnode-id="2858" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="2857"><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/career-planning-program/" target="_blank"><span data-dcnode-id="2856" instrument_node="">Career Services and Job Search Strategies for LGBTQ+ Law Students</span></a><br data-dcnode-id="2854"><br data-dcnode-id="2853"></div><hr data-dcnode-id="2851"><strong data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Melissa Lauderdale-Ward</span></strong><span data-dcnode-id="2848" instrument_node=""> - </span><span data-dcnode-id="2846" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Melissa Lauderdale-Ward is an experienced leader with over 20 years of experience with energy companies. She brings experience in legal operations, policy advocacy to support business growth, compliance programs for regulated industries, legal support for competitive energy companies, and employee development. Melissa currently serves as Chief of Staff to Thomas O‚ÄôNeill, Exelon‚Äôs General Counsel and Director of Legal Operations. In that role she leads the operational side of the Exelon Legal Department where she has overseen an organizational assessment, streamlined processes, upgraded technology, and increased focus on talent development. In her prior role, Melissa served as Assistant General Counsel at Constellation. Melissa led a team that provides regulatory and compliance support to Constellation‚Äôs electricity, natural gas, distributed energy, natural gas and energy efficiency businesses. This included maintaining all licenses and making hundreds of compliance filings as well as counseling her clients on compliance matters, advocating for regulatory policy to support business needs, and supporting strategic transactions. Prior to joining Exelon, Melissa worked for Integrys Energy Services, a retail energy supplier, where she had responsibility for state and federal government and regulatory affairs, compliance, and utility contracts. Her team delivered policy improvements that millions of dollars in O&amp;M reductions and business opportunities. Melissa served as President of the Retail Energy Supplier Association (RESA). RESA is the main trade association for retail suppliers. In that role, she lead the Board of Directors, supervised the staff, developed policies and procedures, and spoke to the media. She has served on other trade association boards, and done extensive public speaking. She has also provided leadership for diversity efforts at both Constellation and Integrys. Melissa obtained her Bachelors of Arts from the Plan II Honors Program, Masters of Public Affairs and Juris Doctorate from the University of Texas at Austin. She also holds a Masters of Laws from the University of Edinburgh in Scotland. She is a member of Texas and the District of Columbia Bar Associations. Melissa and her wife, C.J., have a 14-year-old son and they live in Pikesville, Maryland. Melissa is a member of the Maryland Youth Equality Alliance. Melissa uses she/her/hers pronouns.&quot;}"><span data-dcnode-id="2847" instrument_node="">Melissa Lauderdale-Ward is an experienced leader with over 20 years of experience with energy companies. She brings experience in legal operations, policy advocacy to support business growth, compliance programs for regulated industries, legal support for competitive energy companies, and employee development. Melissa currently serves as Chief of Staff to Thomas O'Neill, Exelon's General Counsel and Director of Legal Operations. In that role she leads the operational side of the Exelon Legal Department where she has overseen an organizational assessment, streamlined processes, upgraded technology, and increased focus on talent development. In her prior role, Melissa served as Assistant General Counsel at Constellation. Melissa led a team that provides regulatory and compliance support to Constellation's electricity, natural gas, distributed energy, natural gas and energy efficiency businesses. This included maintaining all licenses and making hundreds of compliance filings as well as counseling her clients on compliance matters, advocating for regulatory policy to support business needs, and supporting strategic transactions. Prior to joining Exelon, Melissa worked for Integrys Energy Services, a retail energy supplier, where she had responsibility for state and federal government and regulatory affairs, compliance, and utility contracts. Her team delivered policy improvements that millions of dollars in O&amp;M reductions and business opportunities. Melissa served as President of the Retail Energy Supplier Association (RESA). RESA is the main trade association for retail suppliers. In that role, she lead the Board of Directors, supervised the staff, developed policies and procedures, and spoke to the media. She has served on other trade association boards, and done extensive public speaking. She has also provided leadership for diversity efforts at both Constellation and Integrys. Melissa obtained her Bachelors of Arts from the Plan II Honors Program, Masters of Public Affairs and Juris Doctorate from the University of Texas at Austin. She also holds a Masters of Laws from the University of Edinburgh in Scotland. She is a member of Texas and the District of Columbia Bar Associations. Melissa and her wife, C.J., have a 14-year-old son and they live in Pikesville, Maryland. Melissa is a member of the Maryland Youth Equality Alliance. Melissa uses she/her/hers pronouns.</span></span><span data-dcnode-id="2845" instrument_node=""> </span><br data-dcnode-id="2844"><br data-dcnode-id="2843"><div data-dcnode-id="2835"><strong data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2840"><a data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/changing-names-and-changing-lives-partnering-with-corporate-legal-departments-law-firms-and-legal-service-providers-to-help-transgender-clients-petition-for-legal-name-and-gender-marker-changes/" target="_blank"><span data-dcnode-id="2839" instrument_node="">Changing Names and Changing Lives: Partnering with Corporate Legal Departments, Law Firms, and Legal Service Providers to Help Transgender Clients Petition for Legal Name and Gender Marker Changes</span></a><br data-dcnode-id="2837"><br data-dcnode-id="2836"></div><hr data-dcnode-id="2834"><strong data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Jennifer Lav</span></strong><span data-dcnode-id="2831" instrument_node=""> - </span><span data-dcnode-id="2829" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Jennifer Lav (she/her/hers) is a Senior Attorney in the National Health Law Program's D.C. office, where she works on issues related to Medicaid, long-term care services and supports, behavioral health care, and federal health care reform. Before joining National Health Law Program, Jennifer was a staff attorney and then a managing attorney at Disability Rights D.C. at University Legal Services (DRDC), the Protection &amp; Advocacy Program for the District of Columbia. While at DRDC, she supervised the agency's mental health advocacy, focusing on increasing access to community-based services for youth and adults, investigating abuse and neglect in facilities, and protecting and expanding autonomy and choice for District residents with disabilities. She also served as class counsel in several longstanding cases against the District government on behalf of District residents with disabilities. Prior to joining DRDC, Jennifer was a staff attorney at the Alabama Disabilities Advocacy Program and a clinical lecturer at the University of Alabama School of Law. Her work in Alabama focused on special education and Medicaid advocacy. Jennifer received her B.A. from Hampshire College and her J.D. from Columbia Law School. Upon graduation, she clerked for Judge Myron H. Thompson, U.S. District Court, Middle District of Alabama.&quot;}"><span data-dcnode-id="2830" instrument_node="">Jennifer Lav (she/her/hers) is a Senior Attorney in the National Health Law Program's D.C. office, where she works on issues related to Medicaid, long-term care services and supports, behavioral health care, and federal health care reform. Before joining National Health Law Program, Jennifer was a staff attorney and then a managing attorney at Disability Rights D.C. at University Legal Services (DRDC), the Protection &amp; Advocacy Program for the District of Columbia. While at DRDC, she supervised the agency's mental health advocacy, focusing on increasing access to community-based services for youth and adults, investigating abuse and neglect in facilities, and protecting and expanding autonomy and choice for District residents with disabilities. She also served as class counsel in several longstanding cases against the District government on behalf of District residents with disabilities. Prior to joining DRDC, Jennifer was a staff attorney at the Alabama Disabilities Advocacy Program and a clinical lecturer at the University of Alabama School of Law. Her work in Alabama focused on special education and Medicaid advocacy. Jennifer received her B.A. from Hampshire College and her J.D. from Columbia Law School. Upon graduation, she clerked for Judge Myron H. Thompson, U.S. District Court, Middle District of Alabama.</span></span><span data-dcnode-id="2828" instrument_node=""> </span><br data-dcnode-id="2827"><br data-dcnode-id="2826"><div data-dcnode-id="2818"><strong data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2823"><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/health-care-reform-in-2020-and-beyond-whats-at-stake-for-lgbtq-people/" target="_blank"><span data-dcnode-id="2822" instrument_node="">Health Care Reform in 2020 and Beyond: What's at Stake for LGBTQ+ People?</span></a><br data-dcnode-id="2820"><br data-dcnode-id="2819"></div><hr data-dcnode-id="2817"><strong data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Robert Leckey</span></strong><span data-dcnode-id="2814" instrument_node=""> - Robert Leckey is a full professor at the Faculty of Law, where he teaches constitutional law and family law. He served as director of the Paul-André Crépeau Centre for Private and Comparative Law from August 2014 to June 2016. On 1 July 2016, he began a five-year term as Dean of the Faculty of Law. From 2002 to 2003, he served as law clerk for Justice Michel Bastarache of the Supreme Court of Canada. From 2003 to 2006, he undertook doctoral studies in law at the University of Toronto as a Trudeau scholar. His dissertation, which received the Alan Marks Medal for best graduate thesis in 2006, was published as&nbsp;</span><i data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Contextual Subjects: Family, State, and Relational Theory</span></i><span data-dcnode-id="2811" instrument_node="">, by University of Toronto Press in 2008. In 2005-2006, he worked as a visiting scholar at the Centre de recherche en éthique de l’Université de Montréal (CRÉUM). He joined the Faculty of Law in July 2006 and was named a William Dawson Scholar by McGill University in 2011. During his sabbatical leave in 2012-2013, he was a special visitor at the McGill Institute for the Study of Canada. He has been a member of the Law Society of Ontario since 2003 and an advocate of the Barreau du Québec since 2020. From 2017 to 2020, he was a solicitor of the Barreau du Québec. From 2008-2011, he chaired the McGill Equity Subcommittee on Queer People. In 2010-2011, he served as director of research for the Inquiry Commission on the Process for Appointing Judges (the Bastarache Commission). From 2011 to 2015, he was the president of Egale Canada. From 2011 to 2016, he chaired its Legal Issues Committee. Robert Leckey has received the Prix de la Fondation du Barreau du Québec (2007); the Canadian Association of Law Teachers' Scholarly Paper Prize (2009); the McGill Law Students’ Association’s John W. Durnford Teaching Excellence Award (2009); the Canada Prize of the International Academy of Comparative Law (2010); the&nbsp;</span><a data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//publications.mcgill.ca/droit/2010/11/05/teaching-awards/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2810" instrument_node="">Principal's Prize for Excellence in Teaching</span></a><span data-dcnode-id="2808" instrument_node="">&nbsp;(2010); and the&nbsp;</span><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mcgill.ca/law/channels/news/dean-robert-leckey-wins-principals-prize-public-engagement-through-media-321126"><span data-dcnode-id="2807" instrument_node="">Principal’s Change-Maker Prize</span></a><span data-dcnode-id="2805" instrument_node=""> for his public engagement through media in 2020. In 2014, he was selected for membership in the Global Young Academy. </span><br data-dcnode-id="2804"><br data-dcnode-id="2803"><div data-dcnode-id="2795"><strong data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2800"><a data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/demands-for-religious-accommodation-from-non-discrimination-laws-a-comparative-approach-among-the-united-states-and-other-western-democracies/" target="_blank"><span data-dcnode-id="2799" instrument_node="">Demands for Religious Accommodation from Non-Discrimination Laws: A Comparative Approach Among the United States and Other Western Democracies</span></a><br data-dcnode-id="2797"><br data-dcnode-id="2796"></div><hr data-dcnode-id="2794"><strong data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">John LeCrone</span></strong><span data-dcnode-id="2791" instrument_node=""> - John LeCrone (he/him) is an accomplished employment partner and trial lawyer at n Davis Wright Tremaine (“DWT”).&nbsp; John is a vigorous advocate for his clients, representing employers and management in wrongful discharge, harassment, and discrimination litigation; wage and hour class actions, trade secrets/unfair competition and ERISA; and in proceedings before federal and state administrative agencies. His clients include top media and entertainment companies, health care organizations, aerospace, manufacturing, along with hospitalisty and retail chains. John spearheaded the establishment of DWT’s LGBTQ+ affinity group in and currently serves as its co-chair, focusing his attention and energy on building a community where other lawyers feel welcomed and supported. His immediate goal was to create a transformative space, where attorneys could bond over helping promote one another, provide valuable insights, and encourage connections that would lead to more successes. This included starting the first&nbsp; internal LGBTQ mentorship program, connecting with outside LGBTQ+ organizations, and offering scholarships to LGBTQ+ law students to strengthen the firm’s pipeline of LGBTQ+ talent.&nbsp; Hse also spearheaded the firm’s annual LGBTQ “Coming Out” events for local area law students, clients, and in-house counsel in Los Angeles (2018), New York City (2019), and Seattle (2020), with more in the pipeline. He aimed to have his initiatives ensure that “our community knows they have a seat at the table.” In addition, John mentors 3-4 LGBTQ attorneys within the firm, and has been active in Lambda Legal’s Liberty Circle, doing development and supportive work for important cases and legal issues within the community. His efforts resulted in John being named one of the “Top Minority Attorneys in Los Angeles” by the Los Angeles Business Journal, as well as one of the “Best Lawyers in America” in employment law by Best Lawyers in 2020. </span><br data-dcnode-id="2790"><br data-dcnode-id="2789"><div data-dcnode-id="2781"><strong data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2786"><a data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/proud-at-work-the-power-of-employee-resource-groups/" target="_blank"><span data-dcnode-id="2785" instrument_node="">Proud At Work: The Power of Employee Resource Groups</span></a><br data-dcnode-id="2783"><br data-dcnode-id="2782"></div><hr data-dcnode-id="2780"><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Sophia Lee</span></strong><span data-dcnode-id="2777" instrument_node=""> - </span><span data-dcnode-id="2775" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Sophia Lee, Partner and Chief Diversity and Inclusion Officer at Blank Rome LLP, is a trusted adviser to her clients, helping them to meet their business objectives through the legal process. She handles commercial, environmental, products liability, and toxic tort matters in the energy, chemical and other industries. She advises clients on regulatory concerns as well as on matters of constitutional significance. Ms. Lee also has experience with coordinating a national docket consisting of hundreds of toxic tort cases; managing government investigations and inquiries; and developing litigation and information management policies and best practices. She also provides guidance and education to her clients on matters relating to diversity and inclusion. Ms. Lee has advocated for meaningful diversity and inclusion throughout her legal career and serves as Chair of Blank Rome's Diversity and Inclusion Committee and on its Recruiting and Retention Committee. She is an active member of the Forum of the Executive Women; a board member and past president of the Asian Pacific American Bar Association of Pennsylvania; a board member and past co-president of the Philadelphia Diversity Law Group; and a past diversity chair for the Philadelphia Bar Association. Ms. Lee also previously served as vice chair of the Mayor's Commission on Asian American Affairs. Prior to rejoining Blank Rome, Ms. Lee served as chief litigation counsel at Sunoco, Inc., in the litigation department of another Am Law 100 firm, and as a federal judicial law clerk to the late Honorable James McGirr Kelly, U.S. District Judge for the Eastern District of Pennsylvania. She received her J.D. and LL.M. from Temple University Beasley School of Law, where she was a member of the Temple Law Review and the Moot Court Honor Society, and her B.A. from Cornell University.&quot;}"><span data-dcnode-id="2776" instrument_node="">Sophia Lee, Partner and Chief Diversity and Inclusion Officer at Blank Rome LLP, is a trusted adviser to her clients, helping them to meet their business objectives through the legal process. She handles commercial, environmental, products liability, and toxic tort matters in the energy, chemical and other industries. She advises clients on regulatory concerns as well as on matters of constitutional significance. Ms. Lee also has experience with coordinating a national docket consisting of hundreds of toxic tort cases; managing government investigations and inquiries; and d nsel in two landmark marriage equality cases, winning the freedom to marry for same-sex couples in Massachusetts (Goodridge v. Department of Public Health, 2003) and Connecticut (Kerrigan v. Department of Public Health, 2008), and recently secured a groundbreaking child-centered parentage ruling at the Vermont Supreme Court in Sinnott v. Peck (2017). Levi is a law professor at Western New England University, co-editor of Transgender Family Law: A Guide to Effective Advocacy (2012), and serves on the Legal Committee of the World Professional Association for Transgender Health. She is a graduate of the University of Chicago Law School and a former law clerk to the Honorable Judge Michael Boudin at the U.S. Court of Appeals for the First Circuit.&quot;}"><span data-dcnode-id="2711" instrument_node="">Levi is the director of GLBTQ Legal Advocates &amp; Defenders (GLAD)'s Transgender Rights Project and a nationally recognized expert on transgender legal issues. She is one of two transgender attorneys leading the legal fight against President Trump's transgender military ban in both Doe v. Trump and Stockman v. Trump. Levi's precedent-setting transgender rights cases include: O'Donnabhain v. Commissioner of Internal Revenue (2010), which established that medical care relating to gender transition qualifies for a medical tax deduction; Adams v. Bureau of Prisons (2011), which successfully challenged a federal prison policy excluding medical care for 2019 transgender inmates who came into the system without a transition-related medical plan; and Doe v. Clenchy (2014), in which the first state high court ruled that a transgender girl must be fully integrated into her public elementary school as a girl, including having full and equal access to restrooms. In Doe v. MA DOC, Levi currently represents an incarcerated transgender woman seeking to be transferred to a women's correctional facility who is challenging the exclusion of transgender people from the protections of the American with Disabilities Act. Levi was co-counsel in two landmark marriage equality cases, winning the freedom to marry for same-sex couples in Massachusetts (Goodridge v. Department of Public Health, 2003) and Connecticut (Kerrigan v. Department of Public Health, 2008), and recently secured a groundbreaking child-centered parentage ruling at the Vermont Supreme Court in Sinnott v. Peck (2017). Levi is a law professor at Western New England University, co-editor of Transgender Family Law: A Guide to Effective Advocacy (2012), and serves on the Legal Committee of the World Professional Association for Transgender Health. She is a graduate of the University of Chicago Law School and a former law clerk to the Honorable Judge Michael Boudin at the U.S. Court of Appeals for the First Circuit.</span></span><span data-dcnode-id="2709" instrument_node=""> </span><br data-dcnode-id="2708"><br data-dcnode-id="2707"><div data-dcnode-id="2699"><strong data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2704"><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/whats-left-for-transgender-rights-after-harris-funeral-homes-v-eeoc/" target="_blank"><span data-dcnode-id="2703" instrument_node="">What's Left for Transgender Rights After Harris Funeral Homes v EEOC</span></a><br data-dcnode-id="2701"><br data-dcnode-id="2700"></div><hr data-dcnode-id="2698"><strong data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Noah Lewis</span></strong><span data-dcnode-id="2695" instrument_node=""> - </span><span data-dcnode-id="2693" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&qu amin N. Cardozo School of Law, where I was head editor of the Cardozo Law Review and a member of Order of the Coif. I also sit on the Board of Directors of the National LGBT Bar Foundation and am a former director (and was one of the founding directors) of Children's Healthcare Is a Legal Duty (CHILD) USA, a non-profit think tank based in Philadelphia dedicated to protecting children and preventing abuse.&quot;}"><span data-dcnode-id="2637" instrument_node="">I am a commercial litigation partner at Cozen O'Connor resident in the Pittsburgh, PA and New York, NY offices focusing on matters relating to securities law, shareholder litigation, contract, governmental investigations, insurance, real estate, and bankruptcy or distressed businesses. I also have an extensive pro bono practice serving a diverse range of clients in impact litigation, including matters relating to LGBTQ and political asylum, voting rights, women's access to health care, and transgender rights. In that capacity, I have been involved in LGBTQ civil rights cases on behalf of parties and amici in state and federal courts from the trial level to the United States Supreme Court. I earned my undergraduate degree in Government from Harvard University, and earned my law degree, magna cum laude, from Benjamin N. Cardozo School of Law, where I was head editor of the Cardozo Law Review and a member of Order of the Coif. I also sit on the Board of Directors of the National LGBT Bar Foundation and am a former director (and was one of the founding directors) of Children's Healthcare Is a Legal Duty (CHILD) USA, a non-profit think tank based in Philadelphia dedicated to protecting children and preventing abuse.</span></span><span data-dcnode-id="2635" instrument_node=""> </span><br data-dcnode-id="2634"><br data-dcnode-id="2633"><div data-dcnode-id="2625"><strong data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2630"><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/demands-for-religious-accommodation-from-non-discrimination-laws-a-comparative-approach-among-the-united-states-and-other-western-democracies/" target="_blank"><span data-dcnode-id="2629" instrument_node="">Demands for Religious Accommodation from Non-Discrimination Laws: A Comparative Approach Among the United States and Other Western Democracies</span></a><br data-dcnode-id="2627"><br data-dcnode-id="2626"></div><hr data-dcnode-id="2624"><strong data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Deborah Lolai</span></strong><span data-dcnode-id="2621" instrument_node=""> - </span><span data-dcnode-id="2619" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Deborah Lolai is the founder and supervising attorney of the LGBTQ Defense Practice at the Bronx Defenders. In her role, Deborah represents LGBTQ clients in criminal cases and related legal matters, provides internal and external cultural competency and best practices trainings, and engages in community organizing and advocacy efforts to empower our LGBTQ clients, and reduce the harm caused by the various systems they navigate. Deborah is a member of the NYC Board of Correction Task Force on Issues Facing Transgender, Gender Non-Conforming, Non-Binary and/or Intersex People in Custody. She is currently the facilitator of the NYC LGBT Direct Services RoundTable, which organizes direct service providers in NYC serving LGBTQ clients.&quot;}"><span data-dcnode-id="2620" instrument_node="">Deborah Lolai is the founder and supervising attorney of the LGBTQ Defense Practice at the Bronx Defenders. In her role, Deborah represents LGBTQ clients in criminal cases and related legal matters, provides internal and external cultural competency and best practices trainings, and engages in community organizing and advocacy efforts to empower our LGBTQ clients, and reduce the harm caused by the various systems they navigate. Deborah is a member of the NYC Board of Correction Task Force on Issues Facing Transgender, Gender Non-Conforming, Non-Binary and/or Intersex People in Custody. She is currently the facilitator of the NYC LGBT Direct Services RoundTable, which organizes direct service providers in NYC serving LGBTQ clients.</span></span><span data-dcnode-id="2618" instrument_node=""> </span><br data-dcnode-id="2617"><br data-dcnode-id="2616"><div data-dcnode-id="2608"><strong data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2613"><a data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-struggles-faced-by-incarcerated-transgender-gender-non-conforming-intersex-and-non-binary-people-effective-reforms-for-jails-and-prisons/" target="_blank"><span data-dcnode-id="2612" instrument_node="">The Struggles Faced by Incarcerated Transgender, Gender Non-conforming, Intersex and Non-binary People: Effective Reforms for Jails and Prisons</span></a><br data-dcnode-id="2610"><br data-dcnode-id="2609"></div><hr data-dcnode-id="2607"><strong data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Dr. Izzy Lowell</span></strong><span data-dcnode-id="2604" instrument_node=""> - </span><p class="font_8" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Dr. Isabel Lowell grew up in Massachusetts, where she attended Williams College, followed by the University of Connecticut School of Medicine. &nbsp;She completed her Family Medicine residency in Lawrence, MA, where she learned to speak Spanish through caring for the primarily Dominican patient population. &nbsp;She moved to Atlanta in 2013 and joined the faculty at Emory University, where she started the Gender Clinic at Emory. &nbsp;While working at Emory, she completed an MBA at the Goizueta School of Business, graduating first in her class. Dr. Lowell is driven by a sense of fairness and equality. &nbsp;She was drawn to do her residency in Lawrence, MA, for the opportunity to serve an underserved population. &nbsp;After moving to Atlanta, she realized that there are very limited options for trans* people to get medical care. &nbsp;"I met several trans people in this area who told me they couldn't find a doctor who would treat them, not even for basic medical issues. &nbsp;As I started learning about hormone therapy and transgender medicine, I began to realize just how big the need is for trans care in the Southeast." &nbsp;Dr. Lowell has attended conferences and worked with experts around the country to learn more about transgender medicine. &nbsp;She is a member of World Professional Association for Transgender Health (WPATH), Gay and Lesbian Medical Association (GLMA), and gives lectures regularly to educate other medical providers and students about transgender medicine. On a personal level, Dr. Lowell has never fit into typical gender roles. &nbsp;"Growing up, I never wanted to wear a dress, and always played with the boys. &nbsp;While I don't have severe gender dysphoria, I am certainly gender nonconforming - not at either end of the spectrum. &nbsp;I may understand a tiny bit about what it is like to be trans." &nbsp;Dr. Lowell is proud to be a member of the LGBTQ community, and is passionate about equality and respect for all. &nbsp;She lives in Atlanta with her wife and two children.</span></p><span data-dcnode-id="2601" instrument_node=""> </span><br data-dcnode-id="2600"><br data-dcnode-id="2599"><hr data-dcnode-id="2598"><strong data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Laura Maechtlen</span></strong><span data-dcnode-id="2595" instrument_node=""> - Laura Maechtlen is the National Chair of the Labor and Employment Department at Seyfarth Shaw LLP and a member of the Firm’s Executive Committee.&nbsp;&nbsp;Her practice is focused on employment litigation and includes the defense of class, collective and multi-plaintiff actions.&nbsp;&nbsp;Laura also has experience litigating against the Equal Employment Opportunity Commission (EEOC) and the California Department of Fair Employment and Housing (DFEH) in systemic actions, both at the early charge stage and in large-scale EEOC pattern-and-practice litigation.

Laura is a national leader on issues related to diversity and inclusion in the legal industry, and has held a variety of leadership positions through which she has advocated for systemic improvement in the legal industry in the areas of diversity and inclusion.&nbsp;&nbsp;She currently serves on the Executive Committee of the Board of Directors for the California Minority Counsel Program.&nbsp;&nbsp;She is a previous Latina Commissioner for the Hispanic National Bar Association, President of the National LGBT Bar Association, Chair of the CA Minority Counsel Program, and Fellow for the Leadership Council on Legal Diversity (LCLD). Laura is also a founding member of SeyfarthLife, her Firm’s core initiative focused on health, wellness and resiliency for all personnel.

Laura speaks and publishes regularly on a variety of employment law and litigation topics, and issues regarding diversity and inclusion in the legal profession, and has appeared in the</span><i data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">&nbsp;San Francisco Chronicle</span></i><span data-dcnode-id="2592" instrument_node="">,</span><i data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">&nbsp;Wall Street Journal, Forbes, Reuters, The Recorder, Vogue, The Daily Journal,&nbsp;</span></i><span data-dcnode-id="2589" instrument_node="">the</span><i data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">&nbsp;Insurance Journal, CIO.com, Employment Law 360</span></i><span data-dcnode-id="2586" instrument_node="">, and others.&nbsp;&nbsp;She has also served as a contributing editor to multiple editions of&nbsp;</span><i data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">The Fair Labor Standards Act (ABA)&nbsp;</span></i><span data-dcnode-id="2583" instrument_node="">and&nbsp;</span><i data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">The Developing Labor Law (BNA).</span></i><span data-dcnode-id="2580" instrument_node=""> </span><br data-dcnode-id="2579"><br data-dcnode-id="2578"><div data-dcnode-id="2570"><strong data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2575"><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/better-lawyering-through-mindfulness/" target="_blank"><span data-dcnode-id="2574" instrument_node="">Better Lawyering Through Mindfulness</span></a><br data-dcnode-id="2572"><br data-dcnode-id="2571"></div><hr data-dcnode-id="2569"><strong data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Glenn Magpantay</span></strong><span data-dcnode-id="2566" instrument_node=""> - </span><span data-dcnode-id="2564" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Glenn D. Magpantay, Esq. is the Executive Director of the National Queer Asian Pacific Islander Alliance (NQAPIA), which works at the intersections of LGBT equality, racial justice and immigrants rights. Before, Glenn had a long and distinguished career as a civil rights attorney as the Democracy Program Director at the Asian American Legal Defense and Education Fund (AALDEF), where he worked to protect and promote the voting rights and political participation of Asian Americans. He continues to inspire new legal minds and future advocates by teaching Race &amp; the Law at Brooklyn Law School and Asian American Civil Rights at Hunter College/ CUNY. He has published scholarly legal articles, authored a number of reports, and has given commentary to numerous media outlets including The New York Times, USA Today, Boston Globe, CNN, and National Public Radio. Glenn attended the State University of New York (SUNY) at Stony Brook on Long Island, and as a beneficiary of affirmative action, graduated cum laude from the New England School of Law, in Boston.&quot;}"><span data-dcnode-id="2565" instrument_node="">Glenn D. Magpantay, Esq. is the Executive Director of the National Queer Asian Pacific Islander Alliance (NQAPIA), which works at the intersections of LGBT equality, racial justice and immigrants rights. Before, Glenn had a long and distinguished career as a civil rights attorney as the Democracy Program Director at the Asian American Legal Defense and Education Fund (AALDEF), where he worked to protect and promote the voting rights and political participation of Asian Americans. He continues to inspire new legal minds and future advocates by teaching Race &amp; the Law at Brooklyn Law School and Asian American Civil Rights at Hunter College/ CUNY. He has published scholarly legal articles, authored a number of reports, and has given commentary to numerous media outlets including The New York Times, USA Today, Boston Globe, CNN, and National Public Radio. Glenn attended the State University of New York (SUNY) at Stony Brook on Long Island, and as a beneficiary of affirmative action, graduated cum laude from the New England School of Law, in Boston.</span></span><span data-dcnode-id="2563" instrument_node=""> </span><br data-dcnode-id="2562"><br data-dcnode-id="2561"><div data-dcnode-id="2553"><strong data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2558"><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/tax-exempt-vehicles-for-grassroots-and-emerging-lgbt-advocates/" target="_blank"><span data-dcnode-id="2557" instrument_node="">Tax-Exempt Vehicles for Grassroots and Emerging LGBTQ+ Advocates</span></a><br data-dcnode-id="2555"><br data-dcnode-id="2554"></div><hr data-dcnode-id="2552"><strong data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Bendita Cynthia Malakia</span></strong><span data-dcnode-id="2549" instrument_node=""> - </span><span data-dcnode-id="2547" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;One of the most sought after legal diversity professionals in the country, Bendita's experience as a large law firm lawyer, in-house lawyer at two Fortune 500 professional services firms, diversity consultant and certified professional coach help her strategically advance diversity at Hogan Lovells and as an officer of the National LGBT Bar Association.&quot;}"><span data-dcnode-id="2548" instrument_node="">One of the most sought after legal diversity professionals in the country, Bendita's experience as a large law firm lawyer, in-house lawyer at two Fortune 500 professional services firms, diversity consultant and certified professional coach help her strategically advance diversity at Hogan Lovells and as an officer of the National LGBT Bar Association.</span></span><span data-dcnode-id="2546" instrument_node=""> </span><br data-dcnode-id="2545"><br data-dcnode-id="2544"><div data-dcnode-id="2536"><strong data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2541"><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/dodging-bullets-and-jumping-hurdles-womxn-of-color-lawyers-succeeding-through-adversity/" target="_blank"><span data-dcnode-id="2540" instrument_node="">Dodging Bullets and Jumping Hurdles: Womxn of Color Lawyers, Succeeding through Adversity</span></a><br data-dcnode-id="2538"><br data-dcnode-id="2537"></div><div data-dcnode-id="2525"><strong data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">General Attendance Session One</span></strong><span data-dcnode-id="2533" instrument_node="">: August 12, 2020 | 12:30 pm - 2:00 pm</span><strong data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2530"><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/addressing-racial-equity-within-the-lgbtq-legal-community/" target="_blank"><span data-dcnode-id="2529" instrument_node="">Addressing Racial Equity within the LGBTQ+ Legal Community</span></a><br data-dcnode-id="2527"><br data-dcnode-id="2526"></div><div data-dcnode-id="2516"><strong data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">VIP/Top Sponsor Panel (By Invitation Only)</span></strong><span data-dcnode-id="2522" instrument_node="">: August 12, 2020 | 4:00 pm - 5:30 pm</span><br data-dcnode-id="2521"><a data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/vip-top-sponsor-panel/" target="_blank"><span data-dcnode-id="2520" instrument_node="">VIP/Top Sponsor Panel (Sponsored by White &amp; Case LLP)</span></a><br data-dcnode-id="2518"><br data-dcnode-id="2517"></div><hr data-dcnode-id="2515"><strong data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Judge Larnzell Martin Jr.</span></strong><span data-dcnode-id="2512" instrument_node=""> - April 30, 2016, Judge Larnzell Martin, Jr., retired as an Associate Judge of the Prince George’s County, Maryland Circuit Court where he had been a member of that Court beginning in December 1990. He continues to serve as a Senior Judge for the Maryland Judiciary. Judge Martin’s judicial assignments have included service as the Administrative Judge of the District Court of Maryland for Prince George’s County, Chair of the Maryland Judicial Conference’s Committee on Family Law, membership on the Judiciary’s Technology Oversight Board and Lead Judge for the Prince George’s County Model Court. December 2014 through 2017, he served as the first Chair of the Maryland Judicial Council’s Court Access and Community Relations Committee. He has also served as an instructor for the Maryland Judicial Institute, now known as the Judicial College. Prior to his May 1988 appointment to the District Court of Maryland, Judge Martin was the County Attorney for Prince George’s County, the first African American to serve in that capacity for any of Maryland’s counties. Judge Martin is a member of the International Association of LGBTQ+ Judges, having formerly served as Secretary. A 1972 graduate of Carleton College, he currently serves on the College’s Board of Trustees and is a former member of his alma mater’s Alumni Council and its Out @fter Carleton Leadership Committee. Judge Martin received his Juris Doctorate in 1975 from Georgetown University Law Center. </span><br data-dcnode-id="2511"><br data-dcnode-id="2510"><div data-dcnode-id="2502"><strong data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2507"><a data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/judicial-nuts-bolts-academy/" target="_blank"><span data-dcnode-id="2506" instrument_node="">Nuts &amp; Bolts Academy for Judicial Candidates</span></a><br data-dcnode-id="2504"><br data-dcnode-id="2503"></div><hr data-dcnode-id="2501"><strong data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Deian McBryde</span></strong><span data-dcnode-id="2498" instrument_node=""> - Deian McBryde is a New Mexico family law attorney and mediator in solo practice. Before becoming an attorney, Deian worked in business, consulting, employee development, technology, and the arts. In a previous life, he produced Lady Bunny’s Absolut Live! tour and other events that popularized the term “gayborhood,” and he served as executive director of OUTMUSIC, the international LGBTQ musicians network, where he launched the first Outmusic Awards to recognize artists working to inspire and create change from within the LGBTQ community. In 2003, Deian was the executive director of Rainbow25, a project sponsored by Absolut to create the world’s largest rainbow flag: 1.25 miles in the original eight colors (including pink and turquoise), hand-sewn by Gilbert Baker and a team of volunteers. In 2003, the Rainbow25 flag stretched across Key West from the Atlantic Ocean to the Gulf of Mexico, carried by over 3,000 people. As a performer, Deian appeared in clubs, cabarets, and gay pride events around the world. He performed for Stonewall 25 and the Gay Games in New York City, and appeared on the cover of “Girlfriends Magazine,” the national lesbian magazine, as one of 1998’s “America’s Men We Love (Platonically). In modern times, Deian is now a Council Member-at-Large of the ABA’s Solo, Small Firm and General Practice Division (GPSolo) and serves on a variety of local and national committees and boards, including the NM Committee on Diversity in the Legal Profession. Deian is a member of the Family Law Institute, which shares strategies for representing the LGBT community; however, he is most proud of his standing as “the only licensed attorney in the state of New Mexico to have once had backup dancers.” www.mcbrydelaw.com </span><br data-dcnode-id="2497"><br data-dcnode-id="2496"><div data-dcnode-id="2488"><strong data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2493"><a data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/personal-branding-for-lawyers/" target="_blank"><span data-dcnode-id="2492" instrument_node="">Personal Branding for Lawyers</span></a><br data-dcnode-id="2490"><br data-dcnode-id="2489"></div><hr data-dcnode-id="2487"><strong data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Brian McGinnis</span></strong><span data-dcnode-id="2484" instrument_node=""> - Brian J. McGinnis is an Associate in the Labor &amp; Employment Department of Fox Rothschild LLP. He is a magna cum laude graduate of Rutgers University School of Law and a former Executive Editor of the Rutgers University Law Review. A founding member of Fox Rothschild's LGBTQ &amp; Allies Initiative, Brian also serves on the Executive Committee of the Independence Business Alliance, the LGBTQ Chamber of Commerce for the greater Philadelphia region. </span><br data-dcnode-id="2483"><br data-dcnode-id="2482"><div data-dcnode-id="2474"><strong data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2479"><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtq-employment-law-in-practice-2/" target="_blank"><span data-dcnode-id="2478" instrument_node="">LGBTQ Employment Law in Practice</span></a><br data-dcnode-id="2476"><br data-dcnode-id="2475"></div><hr data-dcnode-id="2473"><strong data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Ashe McGovern</span></strong><span data-dcnode-id="2470" instrument_node=""> - </span><span data-dcnode-id="2468" data-sheets-userformat="{&quot;2&quot;:14849,&quot;3&quot;:{&quot;1&quot;:0},&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Arial&quot;,&quot;16&quot;:12}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Ashe McGovern (they, them, theirs) is the Senior LGBTQ Policy Advisor in the Office of the Mayor for the City of New York and Executive Director of the NYC Unity Project. The NYC Unity Project is New York's first Mayoral citywide initiative focused on supporting and empowering LGBTQ communities through innovative policies and programs. Recent initiatives include: funding for permanent housing and supportive services for LGBTQ homeless youth; family support mental health training programs to mitigate family rejection; training and certification for providers in NYC's public hospital system; and the recently announced NYC Unity Works program, which is the largest publicly funded LGBTQ workforce program in the nation, among other key initiatives. Before joining the Mayor's Office, Ashe was the Legislative and Policy Director of the Law, Rights and Religion Project at Columbia Law School and LGBT Policy Analyst at the Center For American Progress (CAP) in Washington DC. Prior to CAP, Ashe was an Equal Justice Works Fellow at New York Legal Assistance Group (NYLAG) where they started the LGBTQ Health and Economic Justice Initiative, a project focused on providing free legal services to low-income LGBTQ New Yorkers. Ashe earned their B.A. from Cornell University, magna cum laude, and J.D. from Cornell Law School, where they received the Freeman Award for Civil-Human Rights. Ashe is co-author and co-editor of Intersecting Injustice: A National Call to Action Addressing LGBTQ Poverty and Economic Justice for All (2018) published by the City University of New York Graduate Center and their work has been featured in a range of media outlets, including The Nation, Slate, Bloomberg Law, Wired, and NPR, among others.&quot;}"><span data-dcnode-id="2469" instrument_node="">Ashe McGovern (they, them, theirs) is the Senior LGBTQ Policy Advisor in the Office of the Mayor for the City of New York and Executive Director of the NYC Unity Project. The NYC Unity Project is New York's first Mayoral citywide initiative focused on supporting and empowering LGBTQ communities through innovative policies and programs. Recent initiatives include: funding for permanent housing and supportive services for LGBTQ homeless youth; family support mental health training programs to mitigate family rejection; training and certification for providers in NYC's public hospital system; and the recently announced NYC Unity Works program, which is the largest publicly funded LGBTQ workforce program in the nation, among other key initiatives. Before joining the Mayor's Office, Ashe was the Legislative and Policy Director of the Law, Rights and Religion Project at Columbia Law School and LGBT Policy Analyst at the Center For American Progress (CAP) in Washington DC. Prior to CAP, Ashe was an Equal Justice Works Fellow at New York Legal Assistance Group (NYLAG) where they started the LGBTQ Health and Economic Justice Initiative, a project focused on providing free legal services to low-income LGBTQ New Yorkers. Ashe earned their B.A. from Cornell University, magna cum laude, and J.D. from Cornell Law School, where they received the Freeman Award for Civil-Human Rights. Ashe is co-author and co-editor of Intersecting Injustice: A National Call to Action Addressing LGBTQ Poverty and Economic Justice for All (2018) published by the City University of New York Graduate Center and their work has been featured in a range of media outlets, including The Nation, Slate, Bloomberg Law, Wired, and NPR, among others.</span></span><span data-dcnode-id="2467" instrument_node=""> </span><br data-dcnode-id="2466"><br data-dcnode-id="2465"><div data-dcnode-id="2457"><strong data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2462"><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/aging-end-of-life-legal-issues-in-the-transgender-community/" target="_blank"><span data-dcnode-id="2461" instrument_node="">Aging and End-of-Life Legal Issues in the Transgender Community</span></a><br data-dcnode-id="2459"><br data-dcnode-id="2458"></div><hr data-dcnode-id="2456"><strong data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Sharon McGowan</span></strong><span data-dcnode-id="2453" instrument_node=""> - Sharon M. McGowan is the Chief Strategy Officer and Legal Director of Lambda Legal, the country’s largest and oldest legal organization committed to achieving full recognition of the civil rights of lesbians, gay men, bisexuals, transgender people and individuals living with HIV. Relying on her litigation expertise and her experience in the Obama administration, Sharon leads the Legal Department’s talented team of over thirty attorneys and paraprofessionals who advocate for our community in courtrooms, statehouses, and other venues throughout the country. As Legal Director, Sharon oversees Lambda Legal’s efforts to resist any attempt by the Trump Administration – or any other opponent of LGBTQ equality – to thwart or roll back our community’s progress toward full formal and lived equality. Sharon joined Lambda Legal in February 2017 as its Director of Strategy, and established Lambda Legal’s Washington, D.C. office. Previously, McGowan served as the Principal Deputy Chief of the Appellate Section of the Civil Rights Division in Department of Justice. In addition to supervising attorneys working on a broad range of civil rights appellate matters in the U.S. Supreme Court and federal courts of appeals, McGowan advised Department of Justice leadership on high-profile and sensitive litigation and policy matters relating to sexual orientation and gender identity, and served as co-chair of the Division’s Lesbian, Gay Bisexual, Transgender and Intersex (LGBTI) Working Group. McGowan served as a law clerk to the Honorable Norman H. Stahl, U.S. Court of Appeals for the First Circuit, and as a law clerk to the Honorable Helen G. Berrigan, U.S. District Court for the Eastern District of Louisiana. McGowan is a graduate of Harvard Law School and the University of Virginia. </span><br data-dcnode-id="2452"><br data-dcnode-id="2451"><div data-dcnode-id="2440"><strong data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="2448" instrument_node="">: August 12, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2445"><a data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/title-vii-and-beyond-the-scope-of-lgbtq-employment-law-in-the-aftermath-of-bostock-stephens-zarda/" target="_blank"><span data-dcnode-id="2444" instrument_node="">Title VII and Beyond: The Scope of Civil Rights Protections in the Aftermath of Bostock/Stephens/Zarda</span></a><br data-dcnode-id="2442"><br data-dcnode-id="2441"></div><div data-dcnode-id="2429"><strong data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">General Attendance Session Two</span></strong><span data-dcnode-id="2437" instrument_node="">: August 13, 2020 | 12:30 pm - 2:00 pm</span><strong data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2434"><a data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/fighting-the-rise-of-anti-lgbtq-legal-groups/" target="_blank"><span data-dcnode-id="2433" instrument_node="">Fighting The Rise of Anti-LGBTQ+ Legal Groups</span></a><br data-dcnode-id="2431"><br data-dcnode-id="2430"></div><hr data-dcnode-id="2428"><strong data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Justice Sabrina McKenna</span></strong><span data-dcnode-id="2425" instrument_node=""> - Sabrina Shizue McKenna grew up in Japan and the Philippines with Japanese as her first language. She received her B.A. from the University of Hawaii at Manoa and her J.D. from the university’s William S. Richardson School of Law (WSRSL). She was then a civil litigator, general counsel to a Japan-based conglomerate, and assistant professor at WSRSL. In 1993, she was appointed a state limited jurisdiction trial judge, and in 1995, a general jurisdiction trial judge. In 2009, she was appointed presiding judge of the Oʻahu family court. Upon her appointment to the Hawaii Supreme Court in 2011, she became the first openly LGBTQ Asian Pacific American justice of a state court of last resort, for which she was awarded the National Asian Pacific American Bar Association’s Daniel K. Inouye Trailblazer Award. She has received various additional awards. </span><br data-dcnode-id="2424"><br data-dcnode-id="2423"><div data-dcnode-id="2412"><strong data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">General Attendance Session One</span></strong><span data-dcnode-id="2420" instrument_node="">: August 12, 2020 | 12:30 pm - 2:00 pm</span><strong data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2417"><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/addressing-racial-equity-within-the-lgbtq-legal-community/" target="_blank"><span data-dcnode-id="2416" instrument_node="">Addressing Racial Equity within the LGBTQ+ Legal Community</span></a><br data-dcnode-id="2414"><br data-dcnode-id="2413"></div><div data-dcnode-id="2404"><strong data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2409"><a data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/judicial-nuts-bolts-academy/" target="_blank"><span data-dcnode-id="2408" instrument_node="">Nuts &amp; Bolts Academy for Judicial Candidates</span></a><br data-dcnode-id="2406"><br data-dcnode-id="2405"></div><hr data-dcnode-id="2403"><strong data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Carrington "Rusty" Mead</span></strong><span data-dcnode-id="2400" instrument_node=""> - </span><span data-dcnode-id="2398" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Carrrington \&quot;Rusty\&quot; Mead - Attorney Carrington Madison Mead has been practicing law, as a solo practitioner, since 2004. He is admitted to practice in Florida, and the Florida Northern and Middle District Courts of Florida. He received a bachelor's in Sociology from the University of North Florida with a minor in accounting. His practices areas include: family, military &amp; veteran's benefits and compensation, estate planning, probate and guardianship law, with a concentration in military and LGBT families. Mr. Mead has been recognized by many organizations for his work for the less fortunate, and his advocacy, by multiple organizations both prior and after becoming an attorney. He is a vetted member of the Family Law Institute, co-sponsored by the National Center for Lesbian Rights and the National LGBT Bar Association. He is a regular trainer for the International Transgender Institute Association's Board Certification in Transgender Therapy program, and speaks often at colleges and workplaces on legal issues involving the LGBT community. He lives in Jacksonville with his wife, and furry and feathered companions. He has a daughter and son-in-law, and when possible, loves a good weekend of camping and/or fishing.&quot;}"><span data-dcnode-id="2399" instrument_node="">Attorney Carrington Madison Mead has been practicing law, as a solo practitioner, since 2004. He is admitted to practice in Florida, and the Florida Northern and Middle District Courts of Florida. He received a bachelor's in Sociology from the University of North Florida with a minor in accounting. His practices areas include: family, military &amp; veteran's benefits and compensation, estate planning, probate and guardianship law, with a concentration in military and LGBT families. Mr. Mead has been recognized by many organizations for his work for the less fortunate, and his advocacy, by multiple organizations both prior and after becoming an attorney. He is a vetted member of the Family Law Institute, co-sponsored by the National Center for Lesbian Rights and the National LGBT Bar Association. He is a regular trainer for the International Transgender Institute Association's Board Certification in Transgender Therapy program, and speaks often at colleges and workplaces on legal issues involving the LGBT community. He lives in Jacksonville with his wife, and furry and feathered companions. He has a daughter and son-in-law, and when possible, loves a good weekend of camping and/or fishing.</span></span><span data-dcnode-id="2397" instrument_node=""> </span><br data-dcnode-id="2396"><br data-dcnode-id="2395"><div data-dcnode-id="2387"><strong data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2392"><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/federal-benefits-for-lgbt-people-and-their-families/" target="_blank"><span data-dcnode-id="2391" instrument_node="">Federal Benefits for LGBTQ+ People and Their Families</span></a><br data-dcnode-id="2389"><br data-dcnode-id="2388"></div><hr data-dcnode-id="2386"><strong data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Emily Meyer</span></strong><span data-dcnode-id="2383" instrument_node=""> - </span><span data-dcnode-id="2381" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Emily Meyer (she/her/hers) is a Staff Attorney in the Equality Ohio Legal Clinic. She graduated from the University of Dayton School of Law in 2008. After a number of years practicing law in Cincinnati, including both transactional and litigation work, she returned to graduate school to study Women's, Gender, &amp; Sexuality Studies at the University of Cincinnati. An Ohio native, Emily counts herself lucky to have resided all across the Buckeye State including in Dayton, Columbus, Cambridge, Cincinnati, and Cleveland. Emily is committed to LGBTQ equality as well as gender and racial justice - and the intersections therein. She is a founding member of both the Cincinnati Women's Fund's Engagement Committee and the YP Board of Cincinnati Works, a local nonprofit working towards poverty reduction by connecting job seekers with employment training and opportunities. Emily is admitted to practice in the State of Ohio and the U.S. District Court for the Southern District of Ohio. She is based remotely in Cincinnati, Ohio.&quot;}"><span data-dcnode-id="2382" instrument_node="">Emily Meyer (she/her/hers) is a Staff Attorney in the Equality Ohio Legal Clinic. She graduated from the University of Dayton School of Law in 2008. After a number of years practicing law in Cincinnati, including both transactional and litigation work, she returned to graduate school to study Women's, Gender, &amp; Sexuality Studies at the University of Cincinnati. An Ohio native, Emily counts herself lucky to have resided all across the Buckeye State including in Dayton, Columbus, Cambridge, Cincinnati, and Cleveland. Emily is committed to LGBTQ equality as well as gender and racial justice - and the intersections therein. She is a founding member of both the Cincinnati Women's Fund's Engagement Committee and the YP Board of Cincinnati Works, a local nonprofit working towards poverty reduction by connecting job seekers with employment training and opportunities. Emily is admitted to practice in the State of Ohio and the U.S. District Court for the Southern District of Ohio. She is based remotely in Cincinnati, Ohio.</span></span><span data-dcnode-id="2380" instrument_node=""> </span><br data-dcnode-id="2379"><br data-dcnode-id="2378"><div data-dcnode-id="2370"><strong data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2375"><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/affiliate-caucus/" target="_blank"><span data-dcnode-id="2374" instrument_node="">LGBTQ+ State and Local Bar Affiliate Congress Caucus</span></a><br data-dcnode-id="2372"><br data-dcnode-id="2371"></div><hr data-dcnode-id="2369"><strong data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Shannon Minter</span></strong><span data-dcnode-id="2366" instrument_node=""> - </span><span data-dcnode-id="2364" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Shannon Minter is the Legal Director of the National Center for Lesbian Rights (NCLR), one of the nation's leading advocacy organizations for lesbian, gay, bisexual, and transgender people. Minter was lead counsel for same-sex couples in the landmark California marriage equality case which held that same-sex couples have the fundamental right to marry and that laws that discriminate based on sexual orientation are inherently discriminatory and subject to the highest level of constitutional scrutiny. Minter was also NCLR's lead attorney in Christian Legal Society v. Martinez, a U.S. Supreme Court decision upholding student group policies prohibiting discrimination based on sexual orientation and gender identity, and rejecting the argument that such policies violated a student group's rights to freedom of speech, religion, and association. NCLR represented Hastings Outlaw, an LGBT student group who intervened to help defend the nondiscrimination policy. In 2009, Minter was named a California Lawyer of the Year by California Lawyer. In 2008, he was named among six Lawyers of the Year by Lawyers USA and among California's Top 100 Lawyers by the legal publication The Daily Journal. He also received th
