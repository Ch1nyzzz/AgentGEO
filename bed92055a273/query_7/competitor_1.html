e 2008 Dan Bradley Award from the National Gay and Lesbian Bar Association for outstanding work in marriage cases and was the recipient of the Cornell Law School Exemplary Public Service Award. In 2005, Minter was one of 18 people to receive the Ford Foundation's \&quot;Leadership for a Changing World\&quot; award. In 2004, he was awarded an Honorary Degree from the City University of New York School of Law for his advocacy on behalf of same-sex couples and their families. Shannon has also received the Anderson Prize Foundation's Creating Change Award by the National Gay and Lesbian Task Force and the Distinguished National Service Award from GAYLAW, the bar association for LGBT lawyers, law students, and legal professionals in Washington, D.C., Cornell Law School's Exemplary Public Service Award, the Unity Award from Bay Area Lawyers for Individual Freedom, the Advocacy Award from the San Francisco Bar Association, and the Justice Award from Equality California. Minter serves on the boards of Faith in America and the Transgender Law &amp; Policy Institute. He has previously served on the American Bar Association Commission on Sexual Orientation and Gender Identity. Minter received his J.D. from Cornell Law School in 1993. He is originally from Texas.&quot;}"><span data-dcnode-id="2365" instrument_node="">Shannon Minter is the Legal Director of the National Center for Lesbian Rights (NCLR), one of the nation's leading advocacy organizations for lesbian, gay, bisexual, and transgender people. Minter was lead counsel for same-sex couples in the landmark California marriage equality case which held that same-sex couples have the fundamental right to marry and that laws that discriminate based on sexual orientation are inherently discriminatory and subject to the highest level of constitutional scrutiny. Minter was also NCLR's lead attorney in Christian Legal Society v. Martinez, a U.S. Supreme Court decision upholding student group policies prohibiting discrimination based on sexual orientation and gender identity, and rejecting the argument that such policies violated a student group's rights to freedom of speech, religion, and association. NCLR represented Hastings Outlaw, an LGBT student group who intervened to help defend the nondiscrimination policy. In 2009, Minter was named a California Lawyer of the Year by California Lawyer. In 2008, he was named among six Lawyers of the Year by Lawyers USA and among California's Top 100 Lawyers by the legal publication The Daily Journal. He also received the 2008 Dan Bradley Award from the National Gay and Lesbian Bar Association for outstanding work in marriage cases and was the recipient of the Cornell Law School Exemplary Public Service Award. In 2005, Minter was one of 18 people to receive the Ford Foundation's "Leadership for a Changing World" award. In 2004, he was awarded an Honorary Degree from the City University of New York School of Law for his advocacy on behalf of same-sex couples and their families. Shannon has also received the Anderson Prize Foundation's Creating Change Award by the National Gay and Lesbian Task Force and the Distinguished National Service Award from GAYLAW, the bar association for LGBT lawyers, law students, and legal professionals in Washington, D.C., Cornell Law School's Exemplary Public Service Award, the Unity Award from Bay Area Lawyers for Individual Freedom, the Advocacy Award from the San Francisco Bar Association, and the Justice Award from Equality California. Minter serves on the boards of Faith in America and the Transgender Law &amp; Policy Institute. He has previously served on the American Bar Association Commission on Sexual Orientation and Gender Identity. Minter received his J.D. from Cornell Law School in 1993. He is originally from Texas.</span></span><span data-dcnode-id="2363" instrument_node=""> </span><br data-dcnode-id="2362"><br data-dcnode-id="2361"><div data-dcnode-id="2353"><strong data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2358"><a data-dcnode-id="2356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-fifth-anniversary-of-obergefell-how-we-won-and-what-we-lost/" target="_blank"><span data-dcnode-id="2357" instrument_node="">The Fifth Anniversary of Obergefell: How We Won and What We Lost</span></a><br data-dcnode-id="2355"><br data-dcnode-id="2354"></div><div data-dcnode-id="2345"><strong data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2350"><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/whats-left-for-transgender-rights-after-harris-funeral-homes-v-eeoc/" target="_blank"><span data-dcnode-id="2349" instrument_node="">What's Left for Transgender Rights After Harris Funeral Homes v EEOC</span></a><br data-dcnode-id="2347"><br data-dcnode-id="2346"></div><div data-dcnode-id="2337"><strong data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2342"><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/extreme-or-essential-understanding-the-shifting-legal-landscape-of-lgbt-specific-community-inclusion-in-u-s-school-curricula/" target="_blank"><span data-dcnode-id="2341" instrument_node="">Extreme or Essential: Understanding the Shifting Legal Landscape of LGBTQ-specific Community Inclusion in U.S. School Curricula</span></a><br data-dcnode-id="2339"><br data-dcnode-id="2338"></div><div data-dcnode-id="2329"><strong data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2334"><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/born-perfect-the-journey-from-saving-alex-to-ban-conversion-therapy-in-utah/" target="_blank"><span data-dcnode-id="2333" instrument_node="">Born Perfect: The Journey from Saving Alex to Ban Conversion Therapy in Utah</span></a><br data-dcnode-id="2331"><br data-dcnode-id="2330"></div><hr data-dcnode-id="2328"><strong data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Chris J. Miritello</span></strong><span data-dcnode-id="2325" instrument_node=""> - Since 2017, Chris Miritello has served as chief legal officer and on the executive leadership team of Memphis, Tennessee-based Mueller Industries, Inc. (NYSE: MLI), a global leader in the manufacturing and distribution of copper tubing, fittings, and an array of other products used in plumbing, refrigeration and industrial applications.&nbsp; At the time of his appointment by the Board of Directors, he was among the youngest chief legal officers of a publicly traded company in the United States.&nbsp; As Mueller’s General Counsel, Chris oversees a diverse portfolio of legal issues and risks, including corporate governance, securities regulation and compliance, litigation, M&amp;A, insurance risk management, executive compensation, environmental law, intellectual property, antitrust, labor and employment, and international trade.&nbsp; Prior to joining Mueller Industries, Chris was associated with the New York office of Willkie Farr &amp; Gallagher LLP, where he focused on securities, insurance and general commercial litigation, and internal investigations.&nbsp; A graduate of Harvard College and Fordham Law School, Chris was previously a member of the Harvard Opportunes (Harvard’s oldest coed acappella group) and the Fordham Law Review.&nbsp; In 2017, Chris was the recipient of the Fordham Law Alumni Association’s Rising Star Award.&nbsp; He was also recently honored with the Memphis Business Journal’s&nbsp;</span><i data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Best of the Bar</span></i><span data-dcnode-id="2322" instrument_node="">&nbsp;Award, and by the National LGBT Bar Association as one of this year’s&nbsp;</span><i data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Best LGBTQ+ Lawyers Under 40</span></i><span data-dcnode-id="2319" instrument_node="">. </span><br data-dcnode-id="2318"><br data-dcnode-id="2317"><div data-dcnode-id="2308"><strong data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">How to Go In-House</span></strong><span data-dcnode-id="2314" instrument_node="">: August 14, 2020 | 12:30 pm - 2:00 pm</span><br data-dcnode-id="2313"><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/career-advice-for-law-students-and-laterals-from-seasoned-in-house-counsel/" target="_blank"><span data-dcnode-id="2312" instrument_node="">Career Advice for Law Students and Laterals from Seasoned In-House Counsel</span></a><br data-dcnode-id="2310"><br data-dcnode-id="2309"></div><hr data-dcnode-id="2307"><strong data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Preston Mitchum</span></strong><span data-dcnode-id="2304" instrument_node=""> - </span><p data-dcnode-id="2294" style="font-weight: 400"><a data-dcnode-id="2302" data-saferedirecturl="https://www.google.com/url?q=http://prestonmitchum.com/&amp;source=gmail&amp;ust=1595685103293000&amp;usg=AFQjCNFRT539Ky7XON_BhQ_EnEQ90uenDg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//prestonmitchum.com/"><span data-dcnode-id="2303" instrument_node="">Preston Mitchum</span></a><span data-dcnode-id="2301" instrument_node="">&nbsp;is a&nbsp;Black queer attorney, writer, and public speaker. He brings more than seven years in both legal and policy experience to his role as the Director of Policy of&nbsp;URGE: Unite for Reproductive &amp; Gender Equity.&nbsp;In addition to his work at URGE, Preston is an Adjunct Professor of Law at Georgetown University Law Center teaching LGBT Health Law and Policy and is the Co-Chair of the Board of Directors for&nbsp;</span><a data-dcnode-id="2299" data-saferedirecturl="https://www.google.com/url?q=https://www.collectiveactiondc.org/&amp;source=gmail&amp;ust=1595685103293000&amp;usg=AFQjCNGYsHQlBvO3Sq53IpChAoNx8JeQQQ" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.collectiveactiondc.org/"><span data-dcnode-id="2300" instrument_node="">Collective Action for Safe Spaces</span></a><span data-dcnode-id="2298" instrument_node="">, a grassroots organization working towards non-carceral solutions to addressing gendered harassment and sexual assault in Washington, DC.&nbsp;Preston is an accomplished author publishing both scholarly work and social commentary for many outlets and law review journals including&nbsp;</span><em data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">The Atlantic, MTV News, Think Progress, The Root, Slate.com, Huffington Post, William &amp; Mary Journal of Women and the Law, Georgetown Journal of Law &amp; Modern Critical Race Perspectives, North Carolina Central University School of Law’s Biotechnology &amp; Pharmaceutical Law Review,&nbsp;</span></em><span data-dcnode-id="2295" instrument_node="">and others. He&nbsp;received his Bachelor of Arts, with honors, from Kent State University; his J.D., with honors, from North Carolina Central University School of Law; and his LL.M. in Law and Government from American University Washington College of Law.</span></p><span data-dcnode-id="2293" instrument_node=""> </span><br data-dcnode-id="2292"><br data-dcnode-id="2291"><hr data-dcnode-id="2290"><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Connie Montoya</span></strong><span data-dcnode-id="2287" instrument_node=""> - </span><span data-dcnode-id="2285" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Connie Montoya brings nearly two decades of class action experience to her trial and litigation practice in employment law and consumer protection defense. Connie has litigated in the federal, state and administrative courts of New York and New Jersey in countless class action lawsuits involving claims brought under various federal and state employment and consumer laws. In the field of labor and employment, Connie counsels her clients on a variety of employment issues, focusing on discrimination and harassment matters, including claims relating to discrimination on the basis of ethnicity, gender, age, pregnancy and disability. She routinely deals with claims involving state and local employment laws, and compliance with the same. As for consumer class action litigation, Connie frequently defends leading financial services organizations against claims arising from various federal regulatory statutes. Before joining Hinshaw, Connie was an Assistant Corporation Counsel in the Special Federal Litigation Division of the Office of the Corporation Counsel of the City of New York, where she defended the City and its municipal employees in federal civil rights actions.&quot;}"><span data-dcnode-id="2286" instrument_node="">Connie Montoya brings nearly two decades of class action experience to her trial and litigation practice in employment law and consumer protection defense. Connie has litigated in the federal, state and administrative courts of New York and New Jersey in countless class action lawsuits involving claims brought under various federal and state employment and consumer laws. In the field of labor and employment, Connie counsels her clients on a variety of employment issues, focusing on discrimination and harassment matters, including claims relating to discrimination on the basis of ethnicity, gender, age, pregnancy and disability. She routinely deals with claims involving state and local employment laws, and compliance with the same. As for consumer class action litigation, Connie frequently defends leading financial services organizations against claims arising from various federal regulatory statutes. Before joining Hinshaw, Connie was an Assistant Corporation Counsel in the Special Federal Litigation Division of the Office of the Corporation Counsel of the City of New York, where she defended the City and its municipal employees in federal civil rights actions.</span></span><span data-dcnode-id="2284" instrument_node=""> </span><br data-dcnode-id="2283"><br data-dcnode-id="2282"><div data-dcnode-id="2274"><strong data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2279"><a data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtq-workplace-harassment-assessing-investigating-and-litigating-sexual-orientation-gender-identity-based-bias-in-states-with-protective-laws/" target="_blank"><span data-dcnode-id="2278" instrument_node="">LGBTQ+ Workplace Harassment: Assessing, Investigating, and Litigating Sexual Orientation and Gender Identity-Based Bias in States with Protective Laws</span></a><br data-dcnode-id="2276"><br data-dcnode-id="2275"></div><hr data-dcnode-id="2273"><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Sarah Moore</span></strong><span data-dcnode-id="2270" instrument_node=""> - Sarah Moore is a partner in Fisher Phillips LLP's Cleveland office. She enjoys a robust practice that crosses industries in the private and public sectors and routinely incorporates the insights and best practices from this diversity in experience into her work. And, she thrives on handling highly sensitive and challenging issues and regularly works hand-in-hand with her clients addressing the full spectrum of labor and employment concerns. Sarah regularly handles labor contract negotiation and administration and has taught Labor Law and Collective Bargaining courses at the Cleveland-Marshall College of Law and Cleveland State University’s Nance College of Business Administration. Although she prefers modified bargaining, her work also includes relying on traditional and interest-based models. She has a solid record of achieving client objectives and fostering positive labor relations. While she has handled strike preparation and associated litigation, Sarah prides herself in successfully bringing all the contracts she served as the primary negotiator to conclusion without a strike. Sarah’s litigation experience includes non-competes, breach of contract, workers’ compensation, discrimination, harassment, constitutional claims, and ERISA fund actions. She has also handled lawsuits for educational institutions and political subdivisions that involved issues in employment, labor, student discipline, special education, negligence and wrongful death. </span><br data-dcnode-id="2269"><br data-dcnode-id="2268"><div data-dcnode-id="2260"><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2265"><a data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/navigating-client-expectations-an-experiential-journey-for-diverse-practitioners/" target="_blank"><span data-dcnode-id="2264" instrument_node="">Navigating Client Expectations: An Experiential Journey for Diverse Practitioners</span></a><br data-dcnode-id="2262"><br data-dcnode-id="2261"></div><hr data-dcnode-id="2259"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Scott Morgan</span></strong><span data-dcnode-id="2256" instrument_node=""> - Scott Morgan currently serves as the Senior Director of Sales Operations for Legal Professionals &amp; Government at Thomson Reuters, the leading global provider of integrated information-based solutions to business and professional customers.&nbsp; Prior to that position and, for the past 20+ years, Scott held various leadership roles at TR with progressive responsibility beginning his tenure there as a reference staff attorney.&nbsp; Scott was the co-chair for the TR MSP Pride at Work Business Resource Group (BRG) from 2001-2004 &amp; 2011-2018 and was its original co-founder. &nbsp;Since 2019, Scott has served as the co-chair of the Business Resource Group Global Leadership Team for TR.&nbsp; Scott also served on the National Lesbian and Gay Law Foundation (NLGLF) board from 2005–2006 and was the NLGLF chair from 2007-2009. Scott was a board member for the Minnesota Lavender Bar Association (MLBA) from 2008-2009 co-chairing the events committee.&nbsp; Scott is licensed to practice law in Minnesota and holds a JD from the Mitchell Hamline School of Law.&nbsp; He received his B.A. from Vanderbilt University where he graduated Magna Cum Laude. </span><br data-dcnode-id="2255"><br data-dcnode-id="2254"><div data-dcnode-id="2245"><strong data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Law Student Career Planning Program</span></strong><span data-dcnode-id="2251" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="2250"><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/career-planning-program/" target="_blank"><span data-dcnode-id="2249" instrument_node="">Career Services and Job Search Strategies for LGBTQ+ Law Students</span></a><br data-dcnode-id="2247"><br data-dcnode-id="2246"></div><div data-dcnode-id="2237"><strong data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2242"><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/proud-at-work-the-power-of-employee-resource-groups/" target="_blank"><span data-dcnode-id="2241" instrument_node="">Proud At Work: The Power of Employee Resource Groups</span></a><br data-dcnode-id="2239"><br data-dcnode-id="2238"></div><hr data-dcnode-id="2236"><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Aaron Morris</span></strong><span data-dcnode-id="2233" instrument_node=""> - </span><span data-dcnode-id="2231" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Aaron C. Morris is Immigration Equality's Executive Director. Prior to becoming ED, Aaron led the organization's law and policy programs. As such, he has supervised Immigration Equality's legal services, impact litigation, policy advocacy, and lobbying efforts. Aaron first joined Immigration Equality as a Pride Law Fellow in the summer of 2004. After law school, he volunteered with the organization whenever he could, joining as a staff attorney in 2008. Aaron is a graduate of the American University's Washington College of Law and the University of Oklahoma. Before joining Immigration Equality, he was an immigration staff attorney in the Office of Legal Affairs of the United States Court of Appeals for the Second Circuit. Aaron is a member of the American Immigration Lawyers Association and the LGBT Bar Association. In 2014, he was named by the LGBT Bar Association as one of the Best LGBT Lawyers Under 40. In 2017, he was honored with the Peter M. Cicchinio award for Outstanding Advocacy in the Public Interest.&quot;}"><span data-dcnode-id="2232" instrument_node="">Aaron C. Morris is Immigration Equality's Executive Director. Prior to becoming ED, Aaron led the organization's law and policy programs. As such, he has supervised Immigration Equality's legal services, impact litigation, policy advocacy, and lobbying efforts. Aaron first joined Immigration Equality as a Pride Law Fellow in the summer of 2004. After law school, he volunteered with the organization whenever he could, joining as a staff attorney in 2008. Aaron is a graduate of the American University's Washington College of Law and the University of Oklahoma. Before joining Immigration Equality, he was an immigration staff attorney in the Office of Legal Affairs of the United States Court of Appeals for the Second Circuit. Aaron is a member of the American Immigration Lawyers Association and the LGBT Bar Association. In 2014, he was named by the LGBT Bar Association as one of the Best LGBT Lawyers Under 40. In 2017, he was honored with the Peter M. Cicchinio award for Outstanding Advocacy in the Public Interest.</span></span><span data-dcnode-id="2230" instrument_node=""> </span><br data-dcnode-id="2229"><br data-dcnode-id="2228"><div data-dcnode-id="2220"><strong data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2225"><a data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-battle-to-protect-asylum-how-advocates-are-fighting-for-the-rights-of-lgbtq-asylum-seekers-at-the-border-and-in-the-interior/" target="_blank"><span data-dcnode-id="2224" instrument_node="">The Battle to Protect Asylum: How Advocates are Fighting for the Rights of LGBTQ+ Asylum Seekers at the Border and in the Interior</span></a><br data-dcnode-id="2222"><br data-dcnode-id="2221"></div><div data-dcnode-id="2212"><strong data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2217"><a data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/same-sex-couples-marital-children-and-birthright-citizenship/" target="_blank"><span data-dcnode-id="2216" instrument_node="">Same-Sex Couples, Marital Children, and Birthright Citizenship</span></a><br data-dcnode-id="2214"><br data-dcnode-id="2213"></div><hr data-dcnode-id="2211"><strong data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Chris Mosier</span></strong><span data-dcnode-id="2208" instrument_node=""> - Chris Mosier is a trailblazing athlete, coach, and the founder of TransAthlete.com. In 2020 he made history by becoming the first transgender athlete to compete in the Olympic Trials in the gender with which they identify. Prior to that, in 2015 he became the first openly trans man to make a Men's US National Team. Following the national championship race, he was instrumental in getting the International Olympic Committee policy on transgender athletes changed, and in June 2016 he became the first trans athlete to compete in a world championship race under the new rules, where he was the second-fastest American man in his group. He has been called&nbsp;"the man who changed the Olympics" by the BBC and New York Magazine. Chris is a six-time member of Team USA, All-American, and 2x National Champion. Beyond his athletic accomplishments, Chris is considered the go-to source for policy information and has helped numerous professional and recreational leagues write their guidelines and rules for the participation of athletes who are transgender. </span><br data-dcnode-id="2207"><br data-dcnode-id="2206"><div data-dcnode-id="2198"><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2203"><a data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/using-state-and-federal-law-to-safeguard-transgender-inclusion-in-sports/" target="_blank"><span data-dcnode-id="2202" instrument_node="">Using State and Federal Law To Safeguard Transgender Inclusion in Sports</span></a><br data-dcnode-id="2200"><br data-dcnode-id="2199"></div><hr data-dcnode-id="2197"><strong data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Kate Mozynski</span></strong><span data-dcnode-id="2194" instrument_node=""> -  </span><br data-dcnode-id="2193"><br data-dcnode-id="2192"><div data-dcnode-id="2184"><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2189"><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/affiliate-caucus/" target="_blank"><span data-dcnode-id="2188" instrument_node="">LGBTQ+ State and Local Bar Affiliate Congress Caucus</span></a><br data-dcnode-id="2186"><br data-dcnode-id="2185"></div><hr data-dcnode-id="2183"><strong data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Elizabeth Munsky</span></strong><span data-dcnode-id="2180" instrument_node=""> - Elizabeth Munsky is the Director of LGBTQ+ Initiatives at the New York City Department of Correction (DOC). A graduate of Stony Brook University, Elizabeth holds a degree in Sociology and Women’s Studies. Elizabeth has built her career on the core values of education, collaboration and introspection.&nbsp; No matter how large or small the system you are trying to change happens to be, in order to create true sustainable change, education and understanding must be your foundation.&nbsp; Education is built on the basis that there is no one teacher and no one student, we must all be open to learning from one another and educating one another.&nbsp; Throughout all of Elizabeth’s roles she has challenged her participants, her colleagues, her employers and herself to look inward and ask ourselves the hard questions we often point at others.&nbsp; Some of her previous work includes the development and implementation of national LGBTQ+ Domestic Violence programming,&nbsp; LGBTQ+ young adult programming; in which Elizabeth brought prominent LGBTQ+ adults back to their high schools to education and empower the current staff and student body through stories of hope and stories of struggle; and regional and national LGBTQ+ responsive training programs, where Elizabeth worked with historically hetero and cis-sexist institutions to build inclusive policies and practices.&nbsp; In her current role she works to build support, affirmation and safety for LGBTQ+ individuals within the DOC's custody as well as LGBTQ+ staff members.&nbsp; To accomplish this some of Elizabeth’s current initiatives are; LGB/TGNC support groups, developing reflective and experiential trainings for all staff members and analyzing current policies to ensure the inclusion, affirmation, support and safety for all LGBTQ+ people in custody. You can reach Elizabeth at Elizabeth.munsky@doc.nyc.gov. </span><br data-dcnode-id="2179"><br data-dcnode-id="2178"><div data-dcnode-id="2170"><strong data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2175"><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-struggles-faced-by-incarcerated-transgender-gender-non-conforming-intersex-and-non-binary-people-effective-reforms-for-jails-and-prisons/" target="_blank"><span data-dcnode-id="2174" instrument_node="">The Struggles Faced by Incarcerated Transgender, Gender Non-conforming, Intersex and Non-binary People: Effective Reforms for Jails and Prisons</span></a><br data-dcnode-id="2172"><br data-dcnode-id="2171"></div><hr data-dcnode-id="2169"><strong data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Lauren Mutti</span></strong><span data-dcnode-id="2166" instrument_node=""> - I oversee a team dedicated to providing practical, solution-oriented legal advice regarding traditional labor and employee relations matters for Southern Glazer's in 45 states and Canada. My team manages the Company's employment litigation with a goal towards efficient resolution of disputes. We also provide day-to-day advice regarding matters relating to employment discrimination/harassment/retaliation, wage and hour issues, whistle-blower claims, trade secret protection and other employee relations matters. Additionally, I oversee a team of trained investigators dedicated to investigating and resolving allegations of discrimination, harassment and retaliation, and we provide nation-wide training on these topics to avoid such claims. We represent the company in charges before federal and state administrative agencies, and we manage litigation brought by employees. Our team also oversees traditional labor matters relating to the Company's 27 collective bargaining agreements. We participate in collective bargaining, advise regarding CBA drafting and interpretation, manage grievances and arbitrations, and represent the Company before the National Labor Relations Board. Finally, we also manage the Company's affirmative action plans and OFCCP compliance. In addition to my legal work, I also co-chair the Dallas corporate office's diversity council. The Council is dedicated to promoting diversity at Southern Glazer's and ensuring that employees of all backgrounds are included in all aspects of our business. As part of this effort, the Council also oversees the Company's business resource groups and encourages cooperation between them. </span><br data-dcnode-id="2165"><br data-dcnode-id="2164"><div data-dcnode-id="2156"><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2161"><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/proud-at-work-the-power-of-employee-resource-groups/" target="_blank"><span data-dcnode-id="2160" instrument_node="">Proud At Work: The Power of Employee Resource Groups</span></a><br data-dcnode-id="2158"><br data-dcnode-id="2157"></div><hr data-dcnode-id="2155"><strong data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">David Nahmias</span></strong><span data-dcnode-id="2152" instrument_node=""> - </span><span data-dcnode-id="2150" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;David is a Law Fellow at the Impact Fund, where he leads Impact LGBTQ, an initiative supported by Justice Catalyst to support advocacy for low-wage workers in California. He has trained over 350 attorneys and advocates on LGBTQ+ workplace discrimination and harassment under federal and California law, and has co-authored three amicus briefs on issues related to vulnerable LGBTQ+ groups, including before the U.S. Supreme Court. He also has represented and provided brief service representation to several LGBTQ+, especially transgender and gender non-conforming, workers who have endured harassment including misgendering. He is a graduate of Claremont McKenna College and U.C. Berkeley School of Law, and was a Fulbright Scholar in Mexico in 2010-2011.&quot;}"><span data-dcnode-id="2151" instrument_node="">David is a Law Fellow at the Impact Fund, where he leads Impact LGBTQ, an initiative supported by Justice Catalyst to support advocacy for low-wage workers in California. He has trained over 350 attorneys and advocates on LGBTQ+ workplace discrimination and harassment under federal and California law, and has co-authored three amicus briefs on issues related to vulnerable LGBTQ+ groups, including before the U.S. Supreme Court. He also has represented and provided brief service representation to several LGBTQ+, especially transgender and gender non-conforming, workers who have endured harassment including misgendering. He is a graduate of Claremont McKenna College and U.C. Berkeley School of Law, and was a Fulbright Scholar in Mexico in 2010-2011.</span></span><span data-dcnode-id="2149" instrument_node=""> </span><br data-dcnode-id="2148"><br data-dcnode-id="2147"><div data-dcnode-id="2139"><strong data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2144"><a data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtq-workplace-harassment-assessing-investigating-and-litigating-sexual-orientation-gender-identity-based-bias-in-states-with-protective-laws/" target="_blank"><span data-dcnode-id="2143" instrument_node="">LGBTQ+ Workplace Harassment: Assessing, Investigating, and Litigating Sexual Orientation and Gender Identity-Based Bias in States with Protective Laws</span></a><br data-dcnode-id="2141"><br data-dcnode-id="2140"></div><hr data-dcnode-id="2138"><strong data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Jean-Marie Navetta</span></strong><span data-dcnode-id="2135" instrument_node=""> - </span><span data-dcnode-id="2133" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Jean-Marie Navetta is the Director of Learning &amp; Inclusion for PFLAG National, leading its Straight for Equality project which aims to invite, educate, and engage new allies in the effort to achieve full inclusion for people who are LGBTQ+. She has been the lead architect of the project since its 2007 inception. She was the primary author of the guide to being a straight ally (now in its fourth edition), Straight for Equality in Healthcare (2010), be not afraid - help is on the way: straight for equality in faith communities (now in its third edition), and the guide to being a trans ally (now in its third edition). Under her leadership, over 19,000 people have been trained, many in Straight for Equality in the Workplace events across the U.S. in more than 140 major corporations. Jean-Marie is the former Director of Communications for PFLAG where she increased the organization's visibility in outlets including The New York Times and The Oprah Winfrey Show. She was also Media Relations Manager for the American Association of University Women, where her work focused on issues such as discrimination in education, pay equity, and Title IX. But Jean-Marie is, most importantly, living proof that Philosophy majors can get real jobs.&quot;}"><span data-dcnode-id="2134" instrument_node="">Jean-Marie Navetta is the Director of Learning &amp; Inclusion for PFLAG National, leading its Straight for Equality project which aims to invite, educate, and engage new allies in the effort to achieve full inclusion for people who are LGBTQ+. She has been the lead architect of the project since its 2007 inception. She was the primary author of the guide to being a straight ally (now in its fourth edition), Straight for Equality in Healthcare (2010), be not afraid - help is on the way: straight for equality in faith communities (now in its third edition), and the guide to being a trans ally (now in its third edition). Under her leadership, over 19,000 people have been trained, many in Straight for Equality in the Workplace events across the U.S. in more than 140 major corporations. Jean-Marie is the former Director of Communications for PFLAG where she increased the organization's visibility in outlets including The New York Times and The Oprah Winfrey Show. She was also Media Relations Manager for the American Association of University Women, where her work focused on issues such as discrimination in education, pay equity, and Title IX. But Jean-Marie is, most importantly, living proof that Philosophy majors can get real jobs.</span></span><span data-dcnode-id="2132" instrument_node=""> </span><br data-dcnode-id="2131"><br data-dcnode-id="2130"><div data-dcnode-id="2122"><strong data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2127"><a data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/training-trainings-and-more-trainings-advancing-lgbtq-equity-and-access-to-justice-through-professional-development-for-law-schools-private-firms-and-court-systems/" target="_blank"><span data-dcnode-id="2126" instrument_node="">Training, Trainings, and More Trainings? Advancing LGBTQ+ Equity and Access to Justice through Professional Development for Law Schools, Private Firms, and Court Systems</span></a><br data-dcnode-id="2124"><br data-dcnode-id="2123"></div><hr data-dcnode-id="2121"><strong data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Ben Needham</span></strong><span data-dcnode-id="2118" instrument_node=""> - Ben Needham is the Director of Strategic Initiatives in the Policy and Political Affairs Department at the Human Rights Campaign (HRC). As Director of Strategic Initiatives, Ben oversees legislative and electoral strategy across several programs and departments. Ben helped create the strategy for the HRC Rising program, which is the largest grassroots and electoral organizing program in the organization’s history, working to elect more pro-equality candidates at every level of government. In addition, Ben works with the Human Rights Campaign Governmental Affairs team to develop a strategy to pass the Equality Act, which would codify full federal equality into law for all LGBTQ Americans. Before being promoted to manage the Human Rights Campaign’s policy and political strategic work, Ben was Director of&nbsp;</span><u data-dcnode-id="2115"><a data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hrc.org/campaigns/project-one-america" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2117" instrument_node="">Project One America</span></a></u><span data-dcnode-id="2114" instrument_node="">, HRC’s comprehensive, multi-year effort to expand LGBTQ equality in the South through permanent campaigns in Alabama, Arkansas and Mississippi. Ben managed in-state staff and coordinated with HRC’s senior leadership in Washington, D.C. to make progress on three fronts—changing hearts and minds, advancing enduring legal protections, and building more inclusive institutions for LGBTQ Southerners from the church pew to the workplace. Ben oversaw grassroots and grasstops campaigns on behalf of HRC in these three states, and led and implemented political strategy and public education campaigns to bring about a new era of inclusiveness and equality for LGBTQ people in the South. Ben’s work in the South has led to the passage of 5 LGBTQ nondiscrimination ordinances in the following communities: Clarksdale, Jackson, and Magnolia, MS; and Birmingham and Montevallo, AL. His work has helped to provide legal protection to over 400,000 residents at work, in housing and public accommodations in Alabama and Mississippi. In addition, there are ten hospitals rated by HRC’s Healthcare Equality Index as having leader statues or rated as top performers on policies and practices dedicated to the equitable treatment and inclusion of their LGBTQ patients, visitors and employees. Ben also helped with the strategy to increase Tyson Foods score on HRC’s Corporate Equality Index from 30 to 100 in just two years, ensuring full workplace equality for LGBTQ workers at every level of the company. Ben&nbsp;is a veteran political strategist with an extensive background in campaigns, issue advocacy, and providing strategy for political parties, progressive organizations, and candidates. He worked as Southern and Western Political Manager for the American Federation of State, County and Municipal Employees (AFSCME), with the Campaign for Tobacco-Free Kids and on several issue advocacy campaigns such as Houston Votes and, Missouri Cures. His experience with political organizations includes working with Obama for America, the Democratic Congressional Campaign Committee, and with several political candidates. </span><br data-dcnode-id="2113"><br data-dcnode-id="2112"><div data-dcnode-id="2104"><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2109"><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/protecting-lgbtq-voters-in-2020/" target="_blank"><span data-dcnode-id="2108" instrument_node="">Protecting LGBTQ+ Voters in 2020</span></a><br data-dcnode-id="2106"><br data-dcnode-id="2105"></div><hr data-dcnode-id="2103"><strong data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Amy Nelson</span></strong><span data-dcnode-id="2100" instrument_node=""> - </span><span data-dcnode-id="2098" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Amy Nelson has served as the Director of Legal Services at Whitman-Walker Health, starting in 2008. Amy organized the name and gender change legal clinic in 2012 which continues to serve hundreds of clients in updating their gender markers on identity documents annually. In 2014, Amy was recognized as a \&quot;Shero of the Movement\&quot; by the DC Mayor's Office of LGBTQ Affairs and honored with Capital Trans Pride's Engendered Spirit award. Amy co-teaches Public Interest Lawyering: Access to Health Care at Georgetown University Law Center. She served on the board of Miriam's House, serving homeless women with HIV, and oversaw its successful transition into N Street Village. A Texas native, she is proud to call DC home for more than 20 years. Amy received degrees from Texas A&amp;M University and the George Washington University Law School.&quot;}"><span data-dcnode-id="2099" instrument_node="">Amy Nelson has served as the Director of Legal Services at Whitman-Walker Health, starting in 2008. Amy organized the name and gender change legal clinic in 2012 which continues to serve hundreds of clients in updating their gender markers on identity documents annually. In 2014, Amy was recognized as a "Shero of the Movement" by the DC Mayor's Office of LGBTQ Affairs and honored with Capital Trans Pride's Engendered Spirit award. Amy co-teaches Public Interest Lawyering: Access to Health Care at Georgetown University Law Center. She served on the board of Miriam's House, serving homeless women with HIV, and oversaw its successful transition into N Street Village. A Texas native, she is proud to call DC home for more than 20 years. Amy received degrees from Texas A&amp;M University and the George Washington University Law School.</span></span><span data-dcnode-id="2097" instrument_node=""> </span><br data-dcnode-id="2096"><br data-dcnode-id="2095"><div data-dcnode-id="2087"><strong data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2092"><a data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/legal-aid-legal-services-caucus/" target="_blank"><span data-dcnode-id="2091" instrument_node="">Legal Aid/Legal Services Caucus</span></a><br data-dcnode-id="2089"><br data-dcnode-id="2088"></div><hr data-dcnode-id="2086"><strong data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Mari Nemec</span></strong><span data-dcnode-id="2083" instrument_node=""> - Mari Nemec (she/her) is a rising 2L at the University of Arizona's James E. Rogers College of Law. Prior to attending law school, Mari was the Manager of Public Affairs at the National LGBT Bar Association. Currently, Mari serves as Secretary of Arizona's PrideLaw Organization, Co-Chair of the National LGBT Bar Association's Law Student Congress, and is a student representative on a committee that seeks to aid LGBTQ+ children in the juvenile court system. After law school, Mari intends to practice family law and continue her work in LGBTQ+ advocacy. </span><br data-dcnode-id="2082"><br data-dcnode-id="2081"><div data-dcnode-id="2073"><strong data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2078"><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/law-student-caucus/" target="_blank"><span data-dcnode-id="2077" instrument_node="">Law Student Congress and Law School Affiliate Caucus</span></a><br data-dcnode-id="2075"><br data-dcnode-id="2074"></div><hr data-dcnode-id="2072"><strong data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Dean Anthony Niedwiecki</span></strong><span data-dcnode-id="2069" instrument_node=""> - Anthony S. Niedwiecki, a longtime legal educator and activist on behalf of LGBTQ rights, is President and Dean at Mitchell Hamline School of Law in St. Paul, Minnesota. Previously dean and professor of law at Golden Gate University School of Law in San Francisco, he is the second president and dean at Mitchell Hamline, which was formed in 2015 through the combination of William Mitchell College of Law and Hamline University School of Law. Niedwiecki is the first openly gay president and dean at Mitchell Hamline or any of its predecessor schools. For the last two decades, Niedwiecki has advocated for social and racial justice as an academic, elected official, and community activist. In 2007, he founded Fight OUT Loud, an organization dedicated to helping people counter discrimination and hate directed at the LGBTQ community, and he has received numerous awards for his advocacy on LGBTQ issues. He has served as city commissioner and vice mayor of Oakland Park, Fla., as well as a member of the Broward County, Fla., Resource Recovery&nbsp;and&nbsp;Human Rights boards. </span><br data-dcnode-id="2068"><br data-dcnode-id="2067"><div data-dcnode-id="2059"><strong data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2064"><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/law-school-panel/" target="_blank"><span data-dcnode-id="2063" instrument_node="">Out in Leadership: Reflections from LGBTQ+ Law School Deans</span></a><br data-dcnode-id="2061"><br data-dcnode-id="2060"></div><hr data-dcnode-id="2058"><strong data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Dale Noll</span></strong><span data-dcnode-id="2055" instrument_node=""> - Dale Noll represents trustees, personal representatives, guardians, and beneficiaries in a wide variety of fiduciary issues, and assists them in their roles as fiduciaries in administering estates, guardianships, and trusts. A particular focus of his practice is the representation of corporate or individual fiduciaries, beneficiaries, and other interested parties in high conflict, complex, and high-profile guardianship, trust, and probate matters at the county probate court and appellate levels. Dale also has experience representing corporate entities and individuals handling issues related to trust administration, incapacity proceedings, prenuptial and postnuptial agreements, and wills and trusts.&nbsp;Dale has served as board member and as a president of the National LGBT Bar Association and has served in leadership positions in various local organizations. </span><br data-dcnode-id="2054"><br data-dcnode-id="2053"><div data-dcnode-id="2045"><strong data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2050"><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/estate-planning-everything-you-need-to-know-but-didnt-think-to-ask-2/" target="_blank"><span data-dcnode-id="2049" instrument_node="">Estate Planning: Everything You Need to Know But Didn't Think to Ask!</span></a><br data-dcnode-id="2047"><br data-dcnode-id="2046"></div><hr data-dcnode-id="2044"><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Sumaya Noush</span></strong><span data-dcnode-id="2041" instrument_node=""> - </span><span data-dcnode-id="2039" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Sumaya M. Noush counsels health care clients on strategic and operational matters including transactions, corporate governance and regulatory compliance. She helps her clients navigate the daily challenges of running their operations while identifying opportunities for growth in today's rapidly evolving and highly competitive health care market. Sumaya is also well-versed in both clinical and research ethics and routinely advises clients on biomedical ethics and related legal standards. Sumaya is an active contributor to the DBR on Data blog, where she regularly publishes material on a wide range of health care information privacy issues, including HIPAA enforcement efforts and government-issued cybersecurity guidance. Sumaya also authored the Illinois section of the American Health Lawyers Association's current Health Care Fraud Law 50-State Survey. She currently serves on the 2020 Illinois Association of Healthcare Attorneys Board of Directors and Co-Chairs the Diversity &amp; Inclusion Committee. Sumaya is admitted to practice law in Illinois, and she holds two Bachelors in Philosophy and Psychology, a Masters in Bioethics and Public Policy, and a J.D., all from Loyola University Chicago.&quot;}"><span data-dcnode-id="2040" instrument_node="">Sumaya M. Noush counsels health care clients on strategic and operational matters including transactions, corporate governance and regulatory compliance. She helps her clients navigate the daily challenges of running their operations while identifying opportunities for growth in today's rapidly evolving and highly competitive health care market. Sumaya is also well-versed in both clinical and research ethics and routinely advises clients on biomedical ethics and related legal standards. Sumaya is an active contributor to the DBR on Data blog, where she regularly publishes material on a wide range of health care information privacy issues, including HIPAA enforcement efforts and government-issued cybersecurity guidance. Sumaya also authored the Illinois section of the American Health Lawyers Association's current Health Care Fraud Law 50-State Survey. She currently serves on the 2020 Illinois Association of Healthcare Attorneys Board of Directors and Co-Chairs the Diversity &amp; Inclusion Committee. Sumaya is admitted to practice law in Illinois, and she holds two Bachelors in Philosophy and Psychology, a Masters in Bioethics and Public Policy, and a J.D., all from Loyola University Chicago.</span></span><span data-dcnode-id="2038" instrument_node=""> </span><br data-dcnode-id="2037"><br data-dcnode-id="2036"><div data-dcnode-id="2028"><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2033"><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/swipe-right-health-care-privacy-in-the-era-of-smart-devices-and-digital-health/" target="_blank"><span data-dcnode-id="2032" instrument_node="">Swipe Right: Health Care Privacy in the Era of Smart Devices and Digital Health</span></a><br data-dcnode-id="2030"><br data-dcnode-id="2029"></div><hr data-dcnode-id="2027"><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Judi O'Kelley</span></strong><span data-dcnode-id="2024" instrument_node=""> - Judi joined the LGBT Bar’s team in 2017, and works on a broad range of programmatic initiatives including building the Bar’s law school affiliate program and supporting the work of the Family Law Institute. Judi brings over twenty years of legal and political experience working for equality within the LGBT community. While in law school, she worked against anti-gay ballot initiatives in Oregon; after graduating and entering private practice, she moved to Georgia and worked on behalf of local and national LGBT groups as a pro bono attorney, drafting and lobbying for successful non-discrimination protections and domestic partnership benefit programs for several Georgia municipalities, including Atlanta and Athens. In 2004, she served as President and Campaign Chair for the campaign for the Athens, Georgia area in opposition to Georgia’s constitutional amendment banning same-sex unions, and continued grass-roots organizing and local political work after the campaign. Judi also was the lead plaintiff from 2004-2006 in the case of&nbsp;</span><em data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">O’Kelley v. Perdue,</span></em><span data-dcnode-id="2021" instrument_node=""> in which Lambda Legal, the Georgia ACLU, and the law firm of Alston &amp; Bird sought to strike down Georgia’s anti-marriage amendment. Judi then spent over eleven years on the staff and in senior management of Lambda Legal in roles ranging from Southern Regional Director, to Director of Life Planning, to Deputy Director of Development, to Director of Leadership. Along the way she moved to Seattle, Washington, where she is involved with a number of local LGBT groups as the Bar’s West Coast outpost. Judi received her B.A. from the Colorado College in 1990. After receiving her J.D. from the University of Oregon School of Law in 1996, she served as a law clerk for Judge James L. Oakes of the U.S. Court of Appeals for the Second Circuit and practiced appellate and employment law in Atlanta for Jones Day and two boutique law firms, before joining Lambda Legal in 2006. Judi has roots in the Washington, D.C. metro area as well as Juneau, Alaska, and is admitted to practice in DC, Alaska, and Georgia. She lives in Seattle with her spouse and twin teenagers, with whom she laughs, cooks, plays video games, and watches Star Trek. Judi&nbsp;has experience speaking on a number of issues related to LGBT rights and the law and is available to speak at future events. </span><br data-dcnode-id="2020"><br data-dcnode-id="2019"><div data-dcnode-id="2011"><strong data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2016"><a data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/affiliate-caucus/" target="_blank"><span data-dcnode-id="2015" instrument_node="">LGBTQ+ State and Local Bar Affiliate Congress Caucus</span></a><br data-dcnode-id="2013"><br data-dcnode-id="2012"></div><hr data-dcnode-id="2010"><strong data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Kathy Ochroch</span></strong><span data-dcnode-id="2007" instrument_node=""> - </span><span data-dcnode-id="2005" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Kathy Ochroch is a Partner and the Director of Pro Bono Services at Blank Rome LLP. As the Director of Pro Bono, she supervises and coordinates all aspects of the Firm's pro bono program. This includes identifying new pro bono matters and finding opportunities to increase the Firm's pro bono involvement. Ms. Ochroch also works closely with in-house counsel to develop pro bono partnerships between the in-house lawyers and the Firm. Ms. Ochroch also maintains a substantive pro bono practice. She serves as one of the lead attorneys on a capital appeal in which Blank Rome was successful in getting the client's death sentence vacated. She also handles pro bono guardianship cases, transgender name change matters, trusts and estates matters, family law matters, social security disability cases, veterans' discharge cases, and immigration and asylum matters. Ms. Ochroch serves as a child advocate for abused and neglected children and volunteers to represent children who have been the victim of sex trafficking. Ms. Ochroch has received multiple awards for her pro bono work, including being named a 2020 \&quot;Champion of Justice\&quot; by the SeniorLAW Center. In addition, she has received the \&quot;White Hat Award\&quot; from the Legal Clinic for the Disabled, the Pro Bono Award from the Pennsylvania Bar Association, the Craig M. Perry Community Service Award from the Philadelphia Bar Association's Young Lawyers Division, and the \&quot;Distinguished Advocate Award\&quot; from the Support Center for Child Advocates. Ms. Ochroch serves as the co-chair of the Law Firm Pro Bono Committee of the Philadelphia Bar Association. She also is a member of the Board of Directors of Smith Memorial Playground and Playhouse, and a member of the Board of Directors of CeaseFirePA. Prior to joining Blank Rome, Ms. Ochroch practiced in the litigation department of another Am Law 100 firm and served as a federal judicial law clerk to the Honorable William H. Yohn, Jr., U.S. District Judge for the Eastern District of Pennsylvania. She received her J.D., with High Honors, from The George Washington University Law School, where she was a member of The George Washington Law Review and the Moot Court Board. Ms. Ochroch earned her B.A., cum laude, from Dickinson College.&quot;}"><span data-dcnode-id="2006" instrument_node="">Kathy Ochroch is a Partner and the Director of Pro Bono Services at Blank Rome LLP. As the Director of Pro Bono, she supervises and coordinates all aspects of the Firm's pro bono program. This includes identifying new pro bono matters and finding opportunities to increase the Firm's pro bono involvement. Ms. Ochroch also works closely with in-house counsel to develop pro bono partnerships between the in-house lawyers and the Firm. Ms. Ochroch also maintains a substantive pro bono practice. She serves as one of the lead attorneys on a capital appeal in which Blank Rome was successful in getting the client's death sentence vacated. She also handles pro bono guardianship cases, transgender name change matters, trusts and estates matters, family law matters, social security disability cases, veterans' discharge cases, and immigration and asylum matters. Ms. Ochroch serves as a child advocate for abused and neglected children and volunteers to represent children who have been the victim of sex trafficking. Ms. Ochroch has received multiple awards for her pro bono work, including being named a 2020 "Champion of Justice" by the SeniorLAW Center. In addition, she has received the "White Hat Award" from the Legal Clinic for the Disabled, the Pro Bono Award from the Pennsylvania Bar Association, the Craig M. Perry Community Service Award from the Philadelphia Bar Association's Young Lawyers Division, and the "Distinguished Advocate Award" from the Support Center for Child Advocates. Ms. Ochroch serves as the co-chair of the Law Firm Pro Bono Committee of the Philadelphia Bar Association. She also is a member of the Board of Directors of Smith Memorial Playground and Playhouse, and a member of the Board of Directors of CeaseFirePA. Prior to joining Blank Rome, Ms. Ochroch practiced in the litigation department of another Am Law 100 firm and served as a federal judicial law clerk to the Honorable William H. Yohn, Jr., U.S. District Judge for the Eastern District of Pennsylvania. She received her J.D., with High Honors, from The George Washington University Law School, where she was a member of The George Washington Law Review and the Moot Court Board. Ms. Ochroch earned her B.A., cum laude, from Dickinson College.</span></span><span data-dcnode-id="2004" instrument_node=""> </span><br data-dcnode-id="2003"><br data-dcnode-id="2002"><div data-dcnode-id="1994"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1999"><a data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/changing-names-and-changing-lives-partnering-with-corporate-legal-departments-law-firms-and-legal-service-providers-to-help-transgender-clients-petition-for-legal-name-and-gender-marker-changes/" target="_blank"><span data-dcnode-id="1998" instrument_node="">Changing Names and Changing Lives: Partnering with Corporate Legal Departments, Law Firms, and Legal Service Providers to Help Transgender Clients Petition for Legal Name and Gender Marker Changes</span></a><br data-dcnode-id="1996"><br data-dcnode-id="1995"></div><hr data-dcnode-id="1993"><strong data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Asaf Orr</span></strong><span data-dcnode-id="1990" instrument_node=""> - </span><span data-dcnode-id="1988" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Developing a passion for social justice at a young age, Asaf joined NCLR in 2012 after years of representing students with disabilities and people living with HIV/AIDS. As NCLR's Transgender Youth Project Staff Attorney, Asaf works to safeguard the rights of transgender and gender-expansive youth to be affirmed and supported. By changing the life trajectories of transgender and gender-expansive youth through litigation, public policy, and advocacy, Asaf hopes to create a future where all children can thrive. For nearly a decade, Asaf worked to advance the rights of the little \&quot;t\&quot; in LGBT. During that time, he represented transgender youth and their families in a wide range of legal matters including discrimination in schools, child custody disputes, child abuse and neglect, and access to affirming medical and mental health care. He was the lead attorney in Student v. Arcadia Unified School District, which resulted in a historic resolution acknowledging that Title IX protects transgender kids from discrimination in schools. Asaf has authored a number of resources on issues affecting transgender youth. After graduating magna cum laude from Rutgers School of Law in Newark in 2008, Asaf clerked for The Honorable Virginia A. Long on the Supreme Court of New Jersey.&quot;}"><span data-dcnode-id="1989" instrument_node="">Developing a passion for social justice at a young age, Asaf joined NCLR in 2012 after years of representing students with disabilities and people living with HIV/AIDS. As NCLR's Transgender Youth Project Staff Attorney, Asaf works to safeguard the rights of transgender and gender-expansive youth to be affirmed and supported. By changing the life trajectories of transgender and gender-expansive youth through litigation, public policy, and advocacy, Asaf hopes to create a future where all children can thrive. For nearly a decade, Asaf worked to advance the rights of the little "t" in LGBT. During that time, he represented transgender youth and their families in a wide range of legal matters including discrimination in schools, child custody disputes, child abuse and neglect, and access to affirming medical and mental health care. He was the lead attorney in Student v. Arcadia Unified School District, which resulted in a historic resolution acknowledging that Title IX protects transgender kids from discrimination in schools. Asaf has authored a number of resources on issues affecting transgender youth. After graduating magna cum laude from Rutgers School of Law in Newark in 2008, Asaf clerked for The Honorable Virginia A. Long on the Supreme Court of New Jersey.</span></span><span data-dcnode-id="1987" instrument_node=""> </span><br data-dcnode-id="1986"><br data-dcnode-id="1985"><div data-dcnode-id="1974"><strong data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="1982" instrument_node="">: August 13, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1979"><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/why-trans-kids-why-now-the-reactionary-attack-on-transgender-rights/" target="_blank"><span data-dcnode-id="1978" instrument_node="">Why Trans Kids, Why Now: The Reactionary Attack on Transgender Rights</span></a><br data-dcnode-id="1976"><br data-dcnode-id="1975"></div><div data-dcnode-id="1966"><strong data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1971"><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/emerging-trends-will-the-supreme-court-strengthen-religion-to-slow-lgbt-advances/" target="_blank"><span data-dcnode-id="1970" instrument_node="">Emerging Trends: Will the Supreme Court Strengthen Religion to Slow LGBTQ+ Advances?</span></a><br data-dcnode-id="1968"><br data-dcnode-id="1967"></div><hr data-dcnode-id="1965"><strong data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Ike Osaki</span></strong><span data-dcnode-id="1962" instrument_node=""> - Isaac (Ike) Osaki is General Counsel of the Europe, Middle East and Africa region of Bank of America. Before assuming his current role, Mr. Osaki was General Counsel, Latin America and head of the legal team supporting the Global Rates and Currencies businesses, the regulatory reform and resolution planning efforts of Global Banking and Markets, and its traded products Agreements and Documentation Group. Mr. Osaki was formerly the Chief Compliance Officer of Global Wealth and Investment Management, composed of Merrill and Bank of America Private Bank, co-chief compliance officer of Merrill Lynch, Pierce, Fenner &amp; Smith Incorporated, the General Counsel of Merrill, and the head of the legal team supporting the fixed income origination businesses at Bank of America, including debt capital markets, leveraged finance, structured finance, credit derivatives, principal finance, leasing, and asset-based lending. Mr. Osaki joined Bank of America as assistant general counsel for Global Corporate and Investment Banking covering M&amp;A advisory services and debt and equity capital markets. Mr. Osaki was an associate at Cadwalader, Wickersham &amp; Taft in its corporate group and before that, the corporate group of Locke Lord. Mr. Osaki is a graduate of Rice University and Columbia Law School. He is a member of the New York and Texas bars and is FINRA Series 7, 14, and 24 registered. </span><br data-dcnode-id="1961"><br data-dcnode-id="1960"><hr data-dcnode-id="1959"><strong data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Judge Tiffany Palmer</span></strong><span data-dcnode-id="1956" instrument_node=""> - The Honorable Tiffany L. Palmer is a Judge of the Court of Common Pleas in Philadelphia, elected in November 2019 to a 10-year term where she serves in the Family Court Division. Prior to her election to the bench, she practiced law in Pennsylvania and New Jersey for 20 years in the areas of LGBTQ family law, adoption and assisted reproductive technology law. Judge Palmer is a judicial fellow to the Academy of Adoption and Assisted Reproductive Technology Attorneys. Judge Palmer is the former Director of the Family Law Institute of the National LGBT Bar Association. Judge Palmer is the recipient of a number of honors and awards. In 2019, Judge Palmer received the Leading Practitioner Award from the National LGBT Bar Association, presented annually to honor an attorney for improving the lives of the members of the LGBTQ+ community through outstanding legal work or by leadership in significant impact litigation while engaged in the private practice of law. She was also awarded the 2019 Hazel Frank Gluck Award from the Center for American Women in Politics, presented annually to acknowledge the accomplishments of NEW Leadership™ New Jersey graduates who have emerged as inspiring advocates, candidates and community leaders. In 2018, Judge Palmer received the “Justice in Action Award” from the Mazzoni Center in Philadelphia for her legal work on behalf of LGBT rights. In 2014, she received the Rutgers University School of Law Mary Philbrook Public Interest Award for her case work and pro bono service on behalf of advancing the rights of LGBT families in Pennsylvania. From 2000 to 2003, Judge Palmer was the first Legal Director at the Equality Advocates Pennsylvania/Center for Lesbian and Gay Civil Rights in Philadelphia, Pennsylvania. From 1998 to 2000, she was the Family Rights Project Attorney through an Equal Justice Works National Fellowship. She graduated from Rutgers University School of Law in 1998. She lives in Philadelphia with her wife of 20 years and their teenage daughter. </span><br data-dcnode-id="1955"><br data-dcnode-id="1954"><div data-dcnode-id="1946"><strong data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1951"><a data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/pathways-to-the-judiciary-2/" target="_blank"><span data-dcnode-id="1950" instrument_node="">Pathways to the Judiciary</span></a><br data-dcnode-id="1948"><br data-dcnode-id="1947"></div><hr data-dcnode-id="1945"><strong data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Judge Christopher Panos</span></strong><span data-dcnode-id="1942" instrument_node=""> - Christopher Panos presides as associate judge of the Circuit Court for Baltimore City. Previously, he served as associate judge of the District Court of Maryland for Baltimore City and Family Division Special Master of the Circuit Court for Baltimore City following a private practice of law at Klemkowski &amp; Panos, P.A. A longtime member of the board of directors of the Judicial Institute of Maryland and its curriculum committee, Judge Panos was board liaison, coordinator and faculty member for numerous judicial education courses. He co-moderated the statewide 2017 New Trial Judge Orientation Refresher Course. Additional past memberships include the Maryland Judicial Conference Planning Committee, and the Domestic Violence and Custody Subcommittees of the Judicial Conference’s Family Law Committee. Judge Panos has been a member of the Maryland State Bar Association and the Bar Association of Baltimore City since 1990. He has co-chaired the Bench-Bar Committee of the BABC since 2017. Judge Panos’ additional bar-related activities include memberships on the MSBA Standing Committee on Professionalism, MSBA Family and Juvenile Law Section Council, past and present BABC Executive Council, and past chair of the BABC Family Law Committee. He is a Maryland Bar Foundation life fellow, a Baltimore Bar Foundation fellow and a member of the International Association of LGBTQ+ Judges. Judge Panos was awarded a Juris Doctor in 1989 from the University of Baltimore, School of Law, a Master of Arts in 1984 from the University of Baltimore, Yale Gordon College of Liberal Arts, and a Bachelor of Arts in 1980 from the University of Maryland at College Park, Division of Behavioral and Social Sciences. </span><br data-dcnode-id="1941"><br data-dcnode-id="1940"><div data-dcnode-id="1932"><strong data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1937"><a data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/pathways-to-the-judiciary-2/" target="_blank"><span data-dcnode-id="1936" instrument_node="">Pathways to the Judiciary</span></a><br data-dcnode-id="1934"><br data-dcnode-id="1933"></div><hr data-dcnode-id="1931"><strong data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Michael Pattarozzi</span></strong><span data-dcnode-id="1928" instrument_node=""> - Michael Pattarozzi is an Assistant State’s Attorney with the Cook County State’s Attorney, Chicago, Illinois, the second largest prosecutor’s office in the nation. Michael has been a prosecutor for the Cook County State’s Attorney’s Office for over 16 years and is currently assigned to the Felony Trial Division as the First Chair in a felony court room advocating for victims of violent crimes in the southern Chicago suburbs. Michael is actively involved in the Cook County State’s Attorney’s Office LGBTQ+ Employee Resource Group., which is part of the larger Diversity and Inclusion Initiative of the Cook County State’s Attorney’s office, and is an member of the Lesbian and Gay Bar Association of Chicago (LAGBAC). </span><br data-dcnode-id="1927"><br data-dcnode-id="1926"><div data-dcnode-id="1918"><strong data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1923"><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/prosecutor-caucus/" target="_blank"><span data-dcnode-id="1922" instrument_node="">Prosecutor Caucus</span></a><br data-dcnode-id="1920"><br data-dcnode-id="1919"></div><hr data-dcnode-id="1917"><strong data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Eric Paulk</span></strong><span data-dcnode-id="1914" instrument_node=""> - Eric Paulk is a lawyer and advocate working on issues impacting LGBTQ communities and communities of people living with and vulnerable to HIV acquisition. He currently serves as Deputy Director at Georgia Equality and oversees all day-to-day operations, developing and managing local, state, and federal policy and advocacy activities that advance equity and fairness for LGBTQ communities and improves public and private responses to the HIV epidemic. Prior to joining Georgia Equality, Eric served as the Tyron Garner Fellow at Lambda Legal, the oldest and largest organization dedicated to advancing the civil rights of lesbians, gay men, bisexuals, transgender people and individuals living with HIV. At Lambda Legal, Paulk’s work focused on HIV law and policy initiatives with an emphasis on legal issues disproportionately impacting Black LGBTQ communities. Eric has spoken at leading law schools and national advocacy conferences on HIV criminal reform, the impact of the school-to-prison pipeline on Black queer youth, and the intersections of race, poverty, HIV, and LGBTQ issues. He serves on the Board of the Atlanta Harm Reduction Coalition, is a former Board Chair of GLSEN New York City and serves on the Fulton County Complete Count Commission. He is also an accomplished author publishing social commentary for online outlets including Huffington Post, Plus Magazine, The Atlanta Voice, The Atlanta Daily World, Project Q Magazine, and others. He is an NLC Fellow, former Victory Institute Victory Empowerment Fellow and Semi-Finalist for the Echoing Green Fellowship for Black Male Achievement. Most recently, Eric was named as one of the state’s top 40 leaders under 40 by Georgia Trend Magazine. Mr. Paulk is a graduate of Morehouse College and received his law degree from Pace University Law School. </span><br data-dcnode-id="1913"><br data-dcnode-id="1912"><div data-dcnode-id="1904"><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1909"><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-criminalization-of-disease/" target="_blank"><span data-dcnode-id="1908" instrument_node="">The Criminalization of Disease: Lessons from HIV, Hepatitis, and COVID-19</span></a><br data-dcnode-id="1906"><br data-dcnode-id="1905"></div><div data-dcnode-id="1896"><strong data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1901"><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/beyond-the-litigation-mindset-ho
