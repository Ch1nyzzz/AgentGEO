mber 2019 as a Senior Attorney specializing in systemic litigation to protect the rights of older adults with disabilities, those neglected in congregate care settings, and those affected by unscrupulous commercial practices. This work includes advocacy on behalf of LGBTQ older adults who face social isolation and financial insecurity. Geron began her legal career in private practice in New York and Florida, representing corporate clients in intellectual property, securities, construction, and related commercial disputes. In 2011, Geron returned to Alabama, from which her family hails, to focus on public interest litigation on behalf of people with disabilities and in various civil rights matters. Prior to joining AARP Foundation, Geron served as Legal Director of the Alabama Disabilities Advocacy Program, where she has lead class counsel in a class action resulting in a consent decree requiring the Alabama Department of Mental Health to timely provide court-ordered psychiatric services. Geron earned a bachelor's degree in political science from Southern Methodist University, a master's degree in theological studies from Harvard Divinity School, and a law degree from Harvard Law School. PLEASE NOTE: I have abbreviated my biography for purposes of brevity. I am happy to provide a resume or more fulsome biography if space permits.&quot;}"><span data-dcnode-id="3520" instrument_node="">M. Geron Gadd (pronouns: she/her) joined AARP Foundation in September 2019 as a Senior Attorney specializing in systemic litigation to protect the rights of older adults with disabilities, those neglected in congregate care settings, and those affected by unscrupulous commercial practices. This work includes advocacy on behalf of LGBTQ older adults who face social isolation and financial insecurity. Geron began her legal career in private practice in New York and Florida, representing corporate clients in intellectual property, securities, construction, and related commercial disputes. In 2011, Geron returned to Alabama, from which her family hails, to focus on public interest litigation on behalf of people with disabilities and in various civil rights matters. Prior to joining AARP Foundation, Geron served as Legal Director of the Alabama Disabilities Advocacy Program, where she has lead class counsel in a class action resulting in a consent decree requiring the Alabama Department of Mental Health to timely provide court-ordered psychiatric services. Geron earned a bachelor's degree in political science from Southern Methodist University, a master's degree in theological studies from Harvard Divinity School, and a law degree from Harvard Law School.</span></span><span data-dcnode-id="3518" instrument_node=""> </span><br data-dcnode-id="3517"><br data-dcnode-id="3516"><div data-dcnode-id="3508"><strong data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3513"><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/silver-pride-aunt-samantha-wants-you-to-advocate-for-lgbt-elders/" target="_blank"><span data-dcnode-id="3512" instrument_node="">Silver Pride: Aunt Samantha Wants YOU to Advocate for LGBTQ+ Elders</span></a><br data-dcnode-id="3510"><br data-dcnode-id="3509"></div><hr data-dcnode-id="3507"><strong data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">Rahwa Ghebre-Ab</span></strong><span data-dcnode-id="3504" instrument_node=""> - As Lionsgate’s Senior Vice President of Business &amp; Legal Affairs and the Company’s lead employment counsel, Rahwa is a fast-rising executive who works closely with Lionsgate senior management, the Company’s Human Resources team, its various film &amp; television productions, and employees at all levels to address the Company’s day-to-day employment needs, support its M&amp;A and other strategic growth initiatives around the world, and ensure compliance with its commitment to a diverse, inclusive, and respectful work environment. Rahwa provided employment legal support for Lionsgate’s May 2018 investment in and partnership with 3 Arts Entertainment, the first-ever collaboration between a major Hollywood studio and a leading talent management and production company. During the year she also helped facilitate the continuing integration of the Good Universe production and distribution company into Lionsgate’s Motion Picture Group and is a key executive in the ongoing integration of Lionsgate and Starz following the biggest acquisition in the Company’s history. She has also helped direct legal and employment matters related to Lionsgate’s recent launch of offices in Mumbai, India, Beijing, China, and Toronto, Canada, as the Company continues to globalize its operations. In addition, she provides legal support and employment counsel to Lionsgate’s numerous film &amp; television productions, joint ventures and SVOD platforms. As employment counsel, Rahwa has played a prominent role in developing and overseeing the implementation of practices and policies that create a safe, tolerant, diverse and inclusive work environment for Lionsgate employees. Last month Lionsgate was one of 109 public companies included in Bloomberg’s second annual Gender Equality Index for its leadership in forward-looking diversity policies and practices. Rahwa was promoted to Senior Vice President in August of 2018. A graduate of The University of Michigan—Ann Arbor with a B.A. degree in History in 2005 and a J.D. degree recipient from the University of Chicago Law School in 2009, Rahwa began her career as an employment litigator at the law firm of Baker McKenzie in Chicago. She joined Lionsgate in 2014. She serves on the Association of Media and Entertainment Counsel’s “Women Who Lead” Board and as Pro Bono Counsel for Holy Trinity Eritrean Orthodox Church. </span><br data-dcnode-id="3503"><br data-dcnode-id="3502"><hr data-dcnode-id="3501"><strong data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Judge Linda Giles</span></strong><span data-dcnode-id="3498" instrument_node=""> - A graduate of McGill University (B.A., Economics, 1974) and New England School of Law (J.D., </span><u data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">cum</span></u><span data-dcnode-id="3495" instrument_node=""> </span><u data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">laude</span></u><span data-dcnode-id="3492" instrument_node="">, 1977), where she served as Case Comment Editor of the Law Review, Judge Giles was engaged in the private practice of law, specializing in trial practice, before joining the bench.&nbsp; In 1991, she was appointed as the first openly lesbian judge in Massachusetts to be an Associate Justice of the Boston Municipal Court by Governor William F. Weld; and, in 1998, she was elevated to the Superior Court by Governor Argeo Paul Cellucci.&nbsp;Judge Giles has served as chair of the Massachusetts Trial Court’s Gender Equality Advisory Board and president of the International Association of LGBTQ+ Judges.&nbsp; She has participated in many educational programs on a variety of topics, such as gender equality, the enhancement of the judicial system, and access to justice.&nbsp; She teaches “Trial Advocacy” at Suffolk University Law School and is a former member of the Board of Editors of the </span><em data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">Boston Bar Journal</span></em><span data-dcnode-id="3489" instrument_node="">.&nbsp;Judge Giles is a recipient of the Massachusetts Judges Conference’s Judicial Excellence Award (President’s Award), the Massachusetts Bar Association’s Public Service Award, and Boston College Law School’s Lambda Student Association’s “Courage in Coming Out” Award. </span><br data-dcnode-id="3488"><br data-dcnode-id="3487"><div data-dcnode-id="3479"><strong data-dcnode-id="3485"><span da oned In-House Counsel</span></a><br data-dcnode-id="3466"><br data-dcnode-id="3465"></div><hr data-dcnode-id="3463"><strong data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">Holly Goldmann</span></strong><span data-dcnode-id="3460" instrument_node=""> - </span><span data-dcnode-id="3458" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Holly Goldmann is the Director of External Affairs at Casa Ruby, which provides a wide range of social services and programs for LGBTQ populations in the Washington, D.C. area, including support services for survivors of violence, housing services, and non-clinical social services.&quot;}"><span data-dcnode-id="3459" instrument_node="">Holly Goldmann is the Director of External Affairs at Casa Ruby, which provides a wide range of social services and programs for LGBTQ populations in the Washington, D.C. area, including support services for survivors of violence, housing services, and non-clinical social services.</span></span><span data-dcnode-id="3457" instrument_node=""> </span><br data-dcnode-id="3456"><br data-dcnode-id="3455"><div data-dcnode-id="3447"><strong data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3452"><a data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/quashing-hope-a-review-of-recent-efforts-to-disrupt-the-participation-of-lgbtq-individuals-in-the-u-s-foster-care-system-and-their-forming-of-families-through-adoption/" target="_blank"><span data-dcnode-id="3451" instrument_node="">Quashing Hope: A Review of Recent Efforts to Disrupt the Participation of LGBTQ+ Individuals in the U.S. Foster Care System and their Forming of Families Through Adoption</span></a><br data-dcnode-id="3449"><br data-dcnode-id="3448"></div><hr data-dcnode-id="3446"><strong data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Omar Gonzalez-Pagan</span></strong><span data-dcnode-id="3443" instrument_node=""> - </span><span data-dcnode-id="3441" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Omar Gonzalez-Pagan is a Senior Attorney in the New York Office of Lambda Legal, the oldest and largest national legal organization committed to achieving full recognition of the civil rights of LGBT people and people living with HIV. Gonzalez-Pagan has played an instrumental role in protecting the rights of LGBT people under federal civil rights laws in education, employment, health care, and housing. As counsel for Lambda Legal, Gonzalez-Pagan helped obtain two landmark decisions\&quot;\&quot;\&quot;\&quot;the first and second appellate rulings in the country‚Äîholding that Title VII covers sexual orientation discrimination in Hively v. Ivy Tech Community College and Zarda v. Altitude Express, Inc. And as lead counsel in Smith v. Avanti, he obtained the first court decision in the country holding that the Federal Housing Act‚Äôs sex discrimination prohibition covers discrimination against LGBT people. Gonzalez-Pagan has also played a key part in advancing the constitutional rights of LGBT people across the United States. As part of the legal team in the landmark case Obergefell v. Hodges, he helped secure the freedom to marry for same sex couples and their families across the United States. He is also a key architect behind Lambda Legal‚Äôs efforts to secure the ability of transgender people to obtain accurate identity documents, serving as lead counsel in the cases challenging the discriminatory birth certificate policies of Kansas, Puerto Rico, and Tennessee. Presently, Gonzalez-Pagan represents two same-sex couples and their children in two cases (Kiviti v. Pompeo and Mize v. Pompeo) challenging the U.S. Department of State's policy treating the children of married same-sex couples as non-marital children and denying them birthright citizenship. Prior to joining Lambda Legal, Gonzalez-Pagan worked for the Commonwealth of Massachusetts as an Assistant Attorney General, a Special Assistant District Attorney, and an Associate General Counsel to the Massachusetts Inspector General. Gonzalez-Pagan is a graduate of the University of Pennsylvania Law School and Cornell University.&quot;}"><span data-dcnode-id="3442" instrument_node="">Omar Gonzalez-Pagan is a Senior Attorney in the New York Office of Lambda Legal, the oldest and largest national legal organization committed to achieving full recognition of the civil rights of LGBT people and people living with HIV. Gonzalez-Pagan has played an instrumental role in protecting the rights of LGBT people under federal civil rights laws in education, employment, health care, and housing. As counsel for Lambda Legal, Gonzalez-Pagan helped obtain two landmark decisions - the first and second appellate rulings in the country - holding that Title VII covers sexual orientation discrimination in Hively v. Ivy Tech Community College and Zarda v. Altitude Express, Inc. And as lead counsel in Smith v. Avanti, he obtained the first court decision in the country holding that the Federal Housing Act's sex discrimination prohibition covers discrimination against LGBT people. Gonzalez-Pagan has also played a key part in advancing the constitutional rights of LGBT people across the United States. As part of the legal team in the landmark case Obergefell v. Hodges, he helped secure the freedom to marry for same sex couples and their families across the United States. He is also a key architect behind Lambda Legal's efforts to secure the ability of transgender people to obtain accurate identity documents, serving as lead counsel in the cases challenging the discriminatory birth certificate policies of Kansas, Puerto Rico, and Tennessee. Presently, Gonzalez-Pagan represents two same-sex couples and their children in two cases (Kiviti v. Pompeo and Mize v. Pompeo) challenging the U.S. Department of State's policy treating the children of married same-sex couples as non-marital children and denying them birthright citizenship. Prior to joining Lambda Legal, Gonzalez-Pagan worked for the Commonwealth of Massachusetts as an Assistant Attorney General, a Special Assistant District Attorney, and an Associate General Counsel to the Massachusetts Inspector General. Gonzalez-Pagan is a graduate of the University of Pennsylvania Law School and Cornell University.</span></span><span data-dcnode-id="3440" instrument_node=""> </span><br data-dcnode-id="3439"><br data-dcnode-id="3438"><div data-dcnode-id="3430"><strong data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3435"><a data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtq-employment-law-in-practice-2/" target="_blank"><span data-dcnode-id="3434" instrument_node="">LGBTQ Employment Law in Practice</span></a><br data-dcnode-id="3432"><br data-dcnode-id="3431"></div><div data-dcnode-id="3422"><strong data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3427"><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/same-sex-couples-marital-children-and-birthright-citizenship/" target="_blank"><span data-dcnode-id="3426" instrument_node="">Same-Sex Couples, Marital n Poverty Law &amp; Policy, and she also received the Refugees and Humanitarian Emergencies Certificate from the Institute for the Study of International Migration. She holds a B.A. in Political Science and Women's Studies from the University of North Carolina at Chapel Hill. Sharita also serves on the board of the Capital Area Immigrant Rights Coalition and was recognized by the National LGBT Bar Association as one of the 40 Best LGBTQ+ Attorneys Under the Age of 40 in 2019.</span></span><span data-dcnode-id="3364" instrument_node=""> </span><br data-dcnode-id="3363"><br data-dcnode-id="3362"><div data-dcnode-id="3354"><strong data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3359"><a data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-battle-to-protect-asylum-how-advocates-are-fighting-for-the-rights-of-lgbtq-asylum-seekers-at-the-border-and-in-the-interior/" target="_blank"><span data-dcnode-id="3358" instrument_node="">The Battle to Protect Asylum: How Advocates are Fighting for the Rights of LGBTQ+ Asylum Seekers at the Border and in the Interior</span></a><br data-dcnode-id="3356"><br data-dcnode-id="3355"></div><div data-dcnode-id="3346"><strong data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3351"><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/health-care-reform-in-2020-and-beyond-whats-at-stake-for-lgbtq-people/" target="_blank"><span data-dcnode-id="3350" instrument_node="">Health Care Reform in 2020 and Beyond: What's at Stake for LGBTQ+ People?</span></a><br data-dcnode-id="3348"><br data-dcnode-id="3347"></div><hr data-dcnode-id="3345"><strong data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Mary Grace Guzmán</span></strong><span data-dcnode-id="3342" instrument_node=""> - Mary&nbsp;Grace&nbsp;Guzmán&nbsp;of Guzmán Legal Solutions advises lawyers, law firms, and law students on their professional responsibilities and risk management needs. She also teaches legal ethics and professional responsibility at JFK Law School. She works with lawyers and law firms regarding legal ethics issues such as conflict of interest issues, fee disputes, and advises lawyers and law firms as outside ethics counsel to manage risk. Ms. Guzmán recognizes that a lawyer’s or law firm’s needs are best met by preventing legal ethical issues before they arise or managing an ethical issue once identified. </span><br data-dcnode-id="3341"><br data-dcnode-id="3340"><hr data-dcnode-id="3339"><strong data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">Tyler Hagenbuch</span></strong><span data-dcnode-id="3336" instrument_node=""> - </span><span data-dcnode-id="3334" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Political law attorney Tyler Hagenbuch advises clients engaged in activities across the political spectrum. When clients participate in this highly regulated field, Tyler helps them navigate their political and ethical compliance requirements in a way that achieves their strategic goals and protects their reputational interests. Tyler also has extensive experience in voting rights and voter participation laws, and regularly counsels organizations around activities such as campaigns for voter registration and get-out-the-vote and the development of election-related technology products.&quot;}"><span data-dcnode-id="3335" instrument_node="">Political law attorney Tyler Hagenbuch advises clients engaged in activities across the political spectrum. When clients participate in this highly regulated field, Tyler helps them navigate their political and ethical compliance requirements in a way that achieves their strategic goals and protects their reputational interests. Tyler also has extensive experience in voting rights and voter participation laws, and regularly counsels organizations around activities such as campaigns for voter registration and get-out-the-vote and the development of election-related technology products.</span></span><span data-dcnode-id="3333" instrument_node=""> </span><br data-dcnode-id="3332"><br data-dcnode-id="3331"><div data-dcnode-id="3323"><strong data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3328"><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/protecting-lgbtq-voters-in-2020/" target="_blank"><span data-dcnode-id="3327" instrument_node="">Protecting LGBTQ+ Voters in 2020</span></a><br data-dcnode-id="3325"><br data-dcnode-id="3324"></div><hr data-dcnode-id="3322"><strong data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">Kevin Hall</span></strong><span data-dcnode-id="3319" instrument_node=""> - Kevin Hall is the Managing Partner of Womble Bond Dickinson (US) LLP’s Columbia, South Carolina office, and serves as a member of the Firm Management Committee. Kevin also has represented multiple clients in constitutional challenges arising from state and federal campaign finance laws and state criminal domestic violence statutes. He served as successful amicus counsel for the South Carolina Equality Coalition in its challenge to the constitutionality of South Carolina’s criminal domestic violence statutes. On the political law front, Kevin has successfully represented multiple statewide elected officials in cases in the original jurisdiction of the South Carolina Supreme Court, before legislative ethics committees, and in impeachment proceedings brought by the South Carolina House of Representatives. Kevin is active in South Carolina politics and public policy. He has served as legal counsel to the South Carolina Republican Party, Governor Mark Sanford, Senator Lindsey Graham, Governor Nikki Haley, Senator Tim Scott, Senator Jim DeMint, and Representative Trey Gowdy, among others. Kevin served as co-chair of the Republican Party's Victory 2008 Committee, and was elected as an alternate delegate in 2008 to the Republican National Convention in St. Paul, Minnesota.&nbsp;Most recently, Kevin successfully challenged South Carolina's "no promo homo" law, resulting in the overturning of the Anti-LGBTQ Curriculum provision of the state’s Comprehensive Health Education Act. </span><br data-dcnode-id="3318"><br data-dcnode-id="3317"><div data-dcnode-id="3309"><strong data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3314"><a data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/beyond-the-litigation-mindset-how-to-effectuate-lasting-change-inside-and-outside-the-courtroom-in-hostile-jurisdictions/" target="_blank"><span data-dcnode-id="3313" instrument_node="">Beyond the “Litigation” Mindset: How to Effectuate Lasting Change Inside and Outside the Courtroom in Hostile Jurisdictions</span></a><br data-dcnode-id="3311"><br data-dcnode-id="3310"></div><hr data-dcnode-id="3308"><strong data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Marci Hamilton</span></strong><span data-dcnode-id="3305" instrument_node=""> - Marci A. Hamilton is the Robert A. Fox Leadership Program Professor of Practice, and Fox Family Pavilion Resident Senior Fellow in the Program for Research on Religion at the University of Pennsylvania. She is also the founder, CEO, and Academic Director of CHILD USA, </span><a class="ext" data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.childusa.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3304" instrument_node="">www.childusa.org</span></a><span data-dcnode-id="3302" instrument_node="">, a 501(c)(3) nonprofit academic think tank at the University of Pennsylvania dedicated to interdisciplinary, evidence-based research to prevent child abuse and neglect. Before moving to the University of Pennsylvania, Professor Hamilton was the Paul R. Verkuil Chair in Public Law at Benjamin N. Cardozo School of Law, Yeshiva University. Hamilton is the leading expert on child sex abuse statutes of limitations and has submitted testimony and advised legislators in every state where significant reform has occurred. She is the author of&nbsp;</span><em data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Justice Denied: What America Must Do to Protect Its Children</span></em><span data-dcnode-id="3299" instrument_node=""> (Cambridge University Press), which advocates for the elimination of child sex abuse statutes of limitations. She has filed countless pro bono amicus briefs for the protection of children at the United States Supreme Court and the state supreme courts. Her textbook, CHILDREN AND THE LAW, co-authored with Martin Gardner, will be published Fall 2017 by Carolina Academic Press, formerly Lexis/Nexis. Hamilton has been a vocal and influential critic of extreme religious liberty, advocating for the vulnerable about overreaching. Hamilton successfully challenged the constitutionality of the Religious Freedom Restoration Act (“RFRA”) at the Supreme Court in&nbsp;</span><em data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">Boerne v. Flores</span></em><span data-dcnode-id="3296" instrument_node="">&nbsp;(1997), and defeated the RFRA claim brought by the Archdiocese of Milwaukee against hundreds of child sex abuse survivors in&nbsp;</span><em data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">Committee of Unsecured Creditors v. Listecki</span></em><span data-dcnode-id="3293" instrument_node="">&nbsp;(7th Cir. 2015). She has represented numerous cities dealing with church-state issues as well as claims brought under the Religious Land Use and Institutionalized Persons Act (“RLUIPA). The author of&nbsp;</span><em data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">God vs. the Gavel: The Perils of Extreme Religious Liberty</span></em><span data-dcnode-id="3290" instrument_node="">&nbsp;(Cambridge University Press), which was nominated for a Pulitzer Prize, she is also a columnist for</span><em data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">&nbsp;Verdict</span></em><span data-dcnode-id="3287" instrument_node=""> on Justia.com. Hamilton has been honored with the 2018 Pennsylvania State University Department of Philosophy Distinguished Alumni Award, the 2017 University of Pennsylvania Law School Louis H. Pollak Public Service Award, the 2016 Voice Today, Voice of Gratitude Award; the 2015 Religious Liberty Award, American Humanist Association; the 2014 Freethought Heroine Award; the National Crime Victim Bar Association’s Frank Carrington Champion of Civil Justice Award, 2012; the E. Nathaniel Gates Award for outstanding public advocacy and scholarship, 2008; and selected as a Pennsylvania Woman of the Year Award, 2012, among others. She is also frequently quoted in the national media on child abuse and neglect, statute of limitations, constitutional, RFRA, RLUIPA, and First Amendment issues. Hamilton clerked for United States Supreme Court Justice Sandra Day O’Connor and Judge Edward R. Becker of the United States Court of Appeals for the Third Circuit. Professor Hamilton is a graduate of Vanderbilt University, B.A.,&nbsp;</span><em data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">summa cum laude</span></em><span data-dcnode-id="3284" instrument_node="">; Pennsylvania State University, M.A. (English, fiction writing,&nbsp;</span><em data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">High Honors</span></em><span data-dcnode-id="3281" instrument_node="">); M.A. (Philosophy); and the University of Pennsylvania School of Law, J.D.,&nbsp;</span><em data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">magna cum laude</span></em><span data-dcnode-id="3278" instrument_node="">, where she served as Editor-in-Chief of the&nbsp;</span><em data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">University of Pennsylvania Law Review</span></em><span data-dcnode-id="3275" instrument_node="">. She is a member of Phi Beta Kappa and Order of the Coif. </span><br data-dcnode-id="3274"><br data-dcnode-id="3273"><div data-dcnode-id="3265"><strong data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3270"><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/demands-for-religious-accommodation-from-non-discrimination-laws-a-comparative-approach-among-the-united-states-and-other-western-democracies/" target="_blank"><span data-dcnode-id="3269" instrument_node="">Demands for Religious Accommodation from Non-Discrimination Laws: A Comparative Approach Among the United States and Other Western Democracies</span></a><br data-dcnode-id="3267"><br data-dcnode-id="3266"></div><hr data-dcnode-id="3264"><strong data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">Emily Hansbarger</span></strong><span data-dcnode-id="3261" instrument_node=""> - Emily Hansbarger is a rising 3L at Charleston School of Law, where she restarted her LGBTQ+ organization, Alliance for Equality, her 1L year (2018-2019). She has worked directly with a dean at her school to have inclusive language on their applications and for there to be gender neutral bathrooms. Emily continues to push for LGBTQ+ inclusivity at her school. Her 2L year she held a spot on the Law Student Congress board and currently holds the position of Co-Chair. Emily earned a Bachelors Degree in Criminal Justice from Aurora University, graduating early, in December 2017. She aspires to work with civil rights, post law school. </span><br data-dcnode-id="3260"><br data-dcnode-id="3259"><div data-dcnode-id="3251"><strong data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3256"><a data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/law-student-caucus/" target="_blank"><span data-dcnode-id="3255" instrument_node="">Law Student Congress and Law School Affiliate Caucus</span></a><br data-dcnode-id="3253"><br data-dcnode-id="3252"></div><hr data-dcnode-id="3250"><strong data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Dr. Keith Hansen</span></strong><span data-dcnode-id="3247" instrument_node=""> - Dr. Keith&nbsp;</span><span class="il" data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Hansen</span></span><span data-dcnode-id="3244" instrument_node="">&nbsp;is the Chairperson of the Department of Obstetrics &amp; Gynecology and a professor in the Department of Pediatrics at the University of South Dakota’s Sanford School of Law.&nbsp; Dr.&nbsp;</span><span class="il" data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">Hansen</span></span><span data-dcnode-id="3241" instrument_node="">&nbsp;is an expert on the medical treatment of transgender children and testified against proposed legislation in South Dakota that sought to criminalize such care. </span><br data-dcnode-id="3240"><br data-dcnode-id="3239"><hr data-dcnode-id="3238"><strong data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">John T. Hendricks</span></strong><span data-dcnode-id="3235" instrument_node=""> - </span><p data-dcnode-id="3233" style="font-weight: 400"><span data-dcnode-id="3234" instrument_node="">After years of litigation practice representing Fortune 500 companies and their management, John Hendricks founded Hendricks Law, P.C. to provide businesses with the highest level of legal expertise and services, complemented by an unparalleled commitment to leverage the latest technology — all to give his clients the best possible representation. Mr. Hendricks’ practice focuses on the areas of business, real estate and employment law, and is well-suited for clients requiring outside general counsel services. He advocates on behalf of clients in both traditional and “new economy” industries. He is a recognized expert in advising local businesses about San Francisco’s unique laws, speaks publicly on relevant topics and has been quoted in leading legal publications, including the ABA Journal and the San Francisco Daily Journal. Mr. Hendricks practices in state and federal courts in California, prosecuting commercial claims and defending employment claims. His skills in trial advocacy were recognized with the NITA Advocate designation by the National Institute for Trial Advocacy in 2007. More recently, Super Lawyers magazine named him a “Rising Star.” A member of the Law Society of England and Wales, Mr. Hendricks is listed on the Roll of Solicitors, qualified to practice law in those countries as well. He provides international expertise, an advantage for clients with business interests around the world. Before practicing law, Mr. Hendricks served as a legislative aide for international trade and other issues in the US House of Representatives. He was an associate at Lafayette &amp; Kumagai LLP, and a law clerk for Tellme Networks, Inc. (a subsidiary of Microsoft Corp.), prior to founding Hendricks Law. Mr. Hendricks participates in numerous professional and civic organizations, and has held leadership roles with several, notably serving in the House of Delegates of the American Bar Association, as a director of Bay Area Lawyers for Individual Freedom (BALIF) and as president of the National LGBT Bar Foundation.</span></p><span data-dcnode-id="3232" instrument_node=""> </span><br data-dcnode-id="3231"><br data-dcnode-id="3230"><hr data-dcnode-id="3229"><strong data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">Jessica Hernandez</span></strong><span data-dcnode-id="3226" instrument_node=""> - Jessica Hernandez is an attorney at Alcock &amp; Associates, P.C. with over 18 years of legal experience, focusing on criminal defense and personal injury. Jessica is an Arizona native, originally from Superior, Arizona. She graduated with honors from the Sandra Day O’Connor College of Law at Arizona State University, in the top 10% of her class. Jessica’s legal experience includes two prestigious federal judicial clerkships with judges on both the U.S. District Court and the Ninth Circuit Court of Appeals. In addition to her experience as a criminal defense attorney and civil litigator, she also worked as a prosecutor with the Yavapai County Attorney’s Office. Throughout her career Jessica has handled felony and misdemeanor cases of all types. She has a passion for defending the rights of individuals and communities whose voices too often go unheard, in particular the LGBT and Latino communities. </span><br data-dcnode-id="3225"><br data-dcnode-id="3224"><div data-dcnode-id="3216"><strong data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3221"><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/affiliate-caucus/" target="_blank"><span data-dcnode-id="3220" instrument_node="">LGBTQ+ State and Local Bar Affiliate Congress Caucus</span></a><br data-dcnode-id="3218"><br data-dcnode-id="3217"></div><hr data-dcnode-id="3215"><strong data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">Michael Hui</span></strong><span data-dcnode-id="3212" instrument_node=""> - Michael J. Hui is an experienced litigator and trial attorney, and has committed his career to defending employers. He focuses his practice on wage and hour class, collective, and representative actions; single-plaintiff lawsuits; and complex litigation in state and federal courts, as well as arbitration. Michael has also appeared and argued before several California Courts of Appeal. &nbsp;Michael’s significant representations include defending international corporations in high stakes sexual harassment matters, winning summary judgment on numerous occasions, and co-chairing civil and administrative trials. In addition, Michael helps employers navigate the ever-changing landscape of California employment law. Michael frequently counsels clients on how to comply with their legal obligations and best practices to avoid costly and avoidable lawsuits. </span><br data-dcnode-id="3211"><br data-dcnode-id="3210"><div data-dcnode-id="3202"><strong data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3207"><a data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtqia-in-big-law-a-how-to-guide-for-law-students/" target="_blank"><span data-dcnode-id="3206" instrument_node="">LGBTQIA+ in Big Law: A How-To Guide for Law Students</span></a><br data-dcnode-id="3204"><br data-dcnode-id="3203"></div><hr data-dcnode-id="3201"><strong data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Nan Hunter</span></strong><span data-dcnode-id="3198" instrument_node=""> - Early in her career, Georgetown Professor Nan Hunter specialized in constitutional and civil rights law as a member of the national legal staff of the American Civil Liberties Union in New York. She has taught as a full-time or visiting professor at Brooklyn Law School, Harvard Law School, the University of Miami Law School, and UCLA Law School, in addition to Georgetown. From 1993 to 1996, she was Deputy General Counsel at the U.S. Department of Health and Human Services. Professor Hunter's scholarship has been published in many law journals, and several of her articles have been selected for reprinting in anthologies. With William Eskridge, she wrote the first casebook to conceptualize sexuality and gender law as embodying a dynamic relationship between state regulation, sexual practices, and gender norms. Her most recent law and social movement scholarship focuses on the ramifications of the same-sex marriage campaign for democratic theory. </span><br data-dcnode-id="3197"><br data-dcnode-id="3196"><div data-dcnode-id="3185"><strong data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="3193" instrument_node="">: August 12, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3190"><a data-dcnode-id="3188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/title-vii-and-beyond-the-scope-of-lgbtq-employment-law-in-the-aftermath-of-bostock-stephens-zarda/" target="_blank"><span data-dcnode-id="3189" instrument_node="">Title VII and Beyond: The Scope of Civil Rights Protections in the Aftermath of Bostock/Stephens/Zarda</span></a><br data-dcnode-id="3187"><br data-dcnode-id="3186"></div><hr data-dcnode-id="3184"><strong data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Kara Ingelhart</span></strong><span data-dcnode-id="3181" instrument_node=""> - Kara Ingelhart is a Staff Attorney in the Midwest Regional Office of Lambda Legal, the oldest and largest organization dedicated to advancing the civil rights of lesbians, gay men, bisexuals, transgender people and individuals living with HIV, where she previously served as a Skadden Fellow.&nbsp;Ingelhart has played an instrumental role in advancing the rights of LGBT people under federal civil rights laws. Most recently, she is counsel in&nbsp;</span><a data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lambdalegal.org/in-court/cases/karnoski-v-trump"><em data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Karnoski v. Trump</span></em></a><span data-dcnode-id="3177" instrument_node="">, a federal lawsuit challenging the constitutionality of the Trump administration’s ban on military service by transgender people, as well as in&nbsp;</span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lambdalegal.org/in-court/cases/roe-and-voe-v-mattis"><em data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Roe v. Mattis</span></em></a><span data-dcnode-id="3173" instrument_node="">, a federal lawsuit brought on behalf of two HIV-positive members of the United States Air Force who were given discharge orders because of their HIV status just days before the 2018 holiday season.&nbsp; She was co-counsel in&nbsp;</span><em data-dcnode-id="3170"><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lambdalegal.org/in-court/cases/evancho-v-pine-richland-school-district"><span data-dcnode-id="3172" instrument_node="">Evancho v. Pine-Richland School District</span></a></em><span data-dcnode-id="3169" instrument_node="">, where a court held that the equal protection guarantee protects transgender students from discrimination in schools (including bathrooms). She has also served as co-counsel in Lambda Legal’s litigation to ensure access to accurate birth certificates for transgender people in every state across the nation, achieving victories in Idaho in&nbsp;</span><a data-dcnode-id="3166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lambdalegal.org/in-court/cases/id_fv-v-armstrong"><em data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">F.V. v. Barron</span></em></a><span data-dcnode-id="3165" instrument_node="">, where the court held that discrimination based on transgender status violated equal protection guarantees, and in Puerto Rico in&nbsp;</span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lambdalegal.org/in-court/cases/pr_arroyo-v-rossello"><em data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Arroyo v. Rosselló</span></em></a><span data-dcnode-id="3161" instrument_node="">, where the Court found that “the forced disclosure of plaintiffs’ transgender status violated their fundamental right to informational privacy.” She is also lead counsel in&nbsp;</span><a data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lambdalegal.org/in-court/cases/ray-v-himes"><em data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">Ray v. Himes</span></em></a><span data-dcnode-id="3157" instrument_node="">, a suit brought on behalf of transgender people born in Ohio who have also been denied accurate birth certificates with accurate gender markers. In addition to her work as a litigator, Ingelhart has contributed to federal and state legislative and policy efforts concerning the inclusion of protections for LGBT people and people living with HIV who are involved in the federal criminal legal system. Recognized as an emerging leader and passionate advocate for the civil rights of LGBT people, Ingelhart has spoken at some of America’s leading law schools, including Northwestern and Notre Dame, and national advocacy conferences on criminalization of LGBT people and people living with HIV and the intersectionality of race, poverty, HIV, and LGBT issues. She has been recognized as one of 2016’s 30 Under 30 best and brightest individuals in Chicago’s LGBTQ Community by the Windy City Times. Ingelhart graduated from The University of Chicago Law School. She received her bachelor’s degree in Biology and Gender Studies from Indiana University, graduating Phi Beta Kappa and with highest honors. Ingelhart is a member of the Illinois bar. </span><br data-dcnode-id="3156"><br data-dcnode-id="3155"><div data-dcnode-id="3147"><strong data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3152"><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-criminalization-of-disease/" target="_blank"><span data-dcnode-id="3151" instrument_node="">The Criminalization of Disease: Lessons from HIV, Hepatitis, and COVID-19</span></a><br data-dcnode-id="3149"><br data-dcnode-id="3148"></div><hr data-dcnode-id="3146"><strong data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">William Isasi</span></strong><span data-dcnode-id="3143" instrument_node=""> - </span><span data-dcnode-id="3141" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;William Isasi represents governments and companies in various industries on all aspects of antidumping and countervailing duty proceedings and World Trade Organization (WTO) litigation. He joined the firm after serving as an Assistant Chief Counsel at the U.S. Department of Commerce, Office of the Chief Counsel for Trade Enforcement &amp; Compliance. In this role, he provided extensive legal advice on trade enforcement to the Assistant Secretary for Enforcement &amp; Compliance, Deputy Assistant Secretaries, and other Department officials. Mr. Isasi has argued before international tribunals including the WTO Appellate Body and panels, and the NAFTA Chapter 19 binational panel pertaining to the 2001 Softwood Lumber from Canada antidumping investigation. He managed legal services for several complex antidumping and countervailing duty proceedings, including the recent countervailing duty investigation of Sugar from Mexico. He also managed a number of significant WTO disputes for the Commerce Department including the China CVD 1 (DS 379) and China CVD 2 (DS 437) disputes.&quot;}"><span data-dcnode-id="3142" instrument_node="">William Isasi represents governments and companies in various industries on all aspects of antidumping and countervailing duty proceedings and World Trade Organization (WTO) litigation. He joined the firm after serving as an Assistant Chief Counsel at the U.S. Department of Commerce, Office of the Chief Counsel for Trade Enforcement &amp; Compliance. In this role, he provided extensive legal advice on trade enforcement to the Assistant Secretary for Enforcement &amp; Compliance, Deputy Assistant Secretaries, and other Department officials. Mr. Isasi has argued before international tribunals including the WTO Appellate Body and panels, and the NAFTA Chapter 19 binational panel pertaining to the 2001 Softwood Lumber from Canada antidumping investigation. He managed legal services for several complex antidumping and countervailing duty proceedings, including the recent countervailing duty investigation of Sugar from Mexico. He also managed a number of significant WTO disputes for the Commerce Department including the China CVD 1 (DS 379) and China CVD 2 (DS 437) disputes.</span></span><span data-dcnode-id="3140" instrument_node=""> </span><br data-dcnode-id="3139"><br data-dcnode-id="3138"><div data-dcnode-id="3130"><strong data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3135"><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/breaking-down-more-than-just-trade-barriers-the-inclusion-of-human-rights-provisions-in-free-trade-agreements/" target="_blank"><span data-dcnode-id="3134" instrument_node="">Breaking Down More Than Just Trade Barriers: The Inclusion of Human Rights Provisions in Free Trade Agreements</span></a><br data-dcnode-id="3132"><br data-dcnode-id="3131"></div><hr data-dcnode-id="3129"><strong data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Matthew Israel</span></strong><span data-dcnode-id="3126" instrument_node=""> - Matt is an attorney with Intel Corporation who currently supports Intel’s marketing, performance analysis, and sports groups. Matt has a wide variety of legal experience both inside and outside of Intel, including technology transactions, IP counseling, gaming, entertainment, new technologies, privacy, and commercial law. </span><br data-dcnode-id="3125"><br data-dcnode-id="3124"><hr data-dcnode-id="3123"><strong data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Alesdair Ittelson</span></strong><span data-dcnode-id="3120" instrument_node=""> - </span><span data-dcnode-id="3118" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Alesdair represents individuals who expand our conceptions of sex and gender and who have experienced discrimination in institutional settings such as schools, hospitals, and juvenile justice facilities. Alesdair has worked with a wide variety of entities including governments, universities, and health care organizations on reducing liability and raising up the voices of youth populations. Prior to joining interACT, Alesdair was the recipient of a Skadden Fellowship and worked at the Southern Poverty Law Center in Montgomery, Alabama, where he represented trans youth throughout the South.&quot;}"><span data-dcnode-id="3119" instrument_node="">Alesdair represents individuals who expand our conceptions of sex and gender and who have experienced discrimination in institutional settings such as schools, hospitals, and juvenile justice facilities. Alesdair has worked with a wide variety of entities including governments, universities, and health care organizations on reducing liability and raising up the voices of youth populations. Prior to joining interACT, Alesdair was the recipient of a Skadden Fellowship and worked at the Southern Poverty Law Center in Montgomery, Alabama, where he represented trans youth throughout the South.</span></span><span data-dcnode-id="3117" instrument_node=""> </span><br data-dcnode-id="3116"><br data-dcnode-id="3115"><div data-dcnode-id="3107"><strong data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3112"><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/intersex-rights-reproductive-health-care-and-bodily-essentialism-legislative-considerations/" target="_blank"><span data-dcnode-id="3111" instrument_node="">Intersex Rights, Reproductive Health Care, and Bodily Essentialism: Legislative Considerations</span></a><br data-dcnode-id="3109"><br data-dcnode-id="3108"></div><hr data-dcnode-id="3106"><strong data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">Mike Jackson</span></strong><span data-dcnode-id="3103" instrument_node=""> - Mike Jackson is Assistant General Counsel/Senior Director for Microsoft’s Global Workplace Investigations Team (WIT) and serves as an At-Large Board Member on the National LGBT Bar Association's Board of Directors. As a member of the WIT leadership team, Mike leads a team of seven ethics and compliance attorneys responsible for conducting complex workplace investigations for the U.S. and Canada. Additionally, Mike helps lead the WIT team’s data governance and data reporting strategy. Prior to Microsoft, Mike was Director, Employee Relations Counsel at Target Corporation where led the employment team for Target’s Central US region (which stretches across 23 states and include over 500 stores). Before Target, Mike led the Employee Relations and Labor Relations functions for all of Smucker’s US manufacturing facilities and, prior to that role, he was global labor and employment counsel at McDonald’s Corporation in Chicago, Illinois. In 2019, Mike was recognized by the LGBT Bar as one of its 40 Best LGBTQ+ Lawyers under 40, and was also recognized as a Leadership Council on Legal Diversity (LCLD) Fellow. Mike is a proud Buckeye (graduate of The Ohio State University) and lives in Seattle, Washington with his husband. </span><br data-dcnode-id="3102"><br data-dcnode-id="3101"><div data-dcnode-id="3092"><strong data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">How to Go In-House</span></strong><span data-dcnode-id="3098" instrument_node="">: August 14, 2020 | 12:30 pm - 2:00 pm</span><br data-dcnode-id="3097"><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/career-advice-for-law-students-and-laterals-from-seasoned-in-house-counsel/" target="_blank"><span data-dcnode-id="3096" instrument_node="">Career Advice for Law Students and Laterals from Seasoned In-House Counsel</span></a><br data-dcnode-id="3094"><br data-dcnode-id="3093"></div><hr data-dcnode-id="3091"><strong data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">Judge Mike Jacobs</span></strong><span data-dcnode-id="3088" instrument_node=""> - </span><span data-dcnode-id="3086" style="font-weight: 400"><span data-dcnode-id="3087" instrument_node="">Judge Mike Jacobs has served as a judge on the State Court of DeKalb County since June 2015. He is one of only two openly bisexual or pansexual judges (state or federal, trial or appellate) in the United States. Prior to his judicial service, Judge Jacobs served ten and a half years in the Georgia House of Representatives. He was chairman of the Metropolitan Atlanta Rapid Transit Oversight Committee (MARTOC), the joint House and Senate committee that oversees the management, budget, and fiscal affairs of Metro Atlanta's transit system. Judge Jacobs also served as chairman of one of the two subcommittees of the House Judiciary Committee. In 2010, he received the Allen Thornell Political Advancement Award from Georgia Equality for passing a stronger anti-bullying law for public schools. Judge Jacobs received his law degree in 2003, magna cum laude, from the University of Georgia School of Law, where he was the executive articles editor of the Georgia Law Review. He received his bachelor's degree in 1997 from Georgetown University. Judge Jacobs serves on the boards of directors of the International Association of LGBTQ+ Judges, Stonewall Bar Association of Georgia, Atlanta Bar Association Judicial Section, and Leadership DeKalb. He also serves as the Stonewall Bar Association of Georgia's representative on the Judicial Council of Georgia's Committee on Access to Justice. In 2019, Judge Jacobs was recognized by the Stonewall Bar Association of Georgia at its annual awards gala with the award for Outstanding Service to the Stonewall Community. Judge Jacobs and his wife Evan are the proud parents of three children, Jonah, Eli, and Samantha.</span></span><span data-dcnode-id="3085" instrument_node=""> </span><br data-dcnode-id="3084"><br data-dcnode-id="3083"><div data-dcnode-id="3075"><strong data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3080"><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/visibilizing-bisexuals-in-lgbtqia-rights-discourse-and-communities/" target="_blank"><span data-dcnode-id="3079" instrument_node="">Visibilizing Bisexuals in LGBTQIA+ Rights Discourse and Communities</span></a><br data-dcnode-id="3077"><br data-dcnode-id="3076"></div><div data-dcnode-id="3067"><strong data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3072"><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/judicial-nuts-bolts-academy/" target="_blank"><span data-dcnode-id="3071" instrument_node="">Nuts &amp; Bolts Academy for Judicial Candidates</span></a><br data-dcnode-id="3069"><br data-dcnode-id="3068"></div><hr data-dcnode-id="3066"><strong data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">Bryanna Jenkins</span></strong><span data-dcnode-id="3063" instrument_node=""> - Bryanna Jenkins, a proud Baltimore native, is a December 2019 graduate of DePaul University College of Law in Chicago, IL. She is the founder and first executive director of the Baltimore Transgender Alliance. She organized the first Baltimore Trans March of Resilience. Her legal writings examine the intersections of racial, gender, and queer identities under the law. Her article&nbsp;</span><i data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Birth Certificate with a Benefit: Using LGBTQ Jurisprudence to Make the Argument for a Transgender Person’s Constitutional Right to Amended Identity Documents</span></i><span data-dcnode-id="3060" instrument_node="">&nbsp;was published in the Winter 2019 edition of the CUNY Law Review. </span><br data-dcnode-id="3059"><br data-dcnode-id="3058"><hr data-dcnode-id="3057"><strong data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Ashland Johnson</span></strong><span data-dcnode-id="3054" instrument_node=""> - </span><span data-dcnode-id="3052" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Ashland Johnson is a civil rights lawyer, sports inclusion policy expert, and former Division I athlete. Recently, she served as the Public Education Director for the Human Rights Campaign, executing public education campaigns on the intersection of race, sexual orientation, sports, gender, and faith. Ashland also served as Athlete Ally's Policy Director, working with sports leaders to promote LGBTQ inclusion on the field and under the law. Prior to joining the Athlete Ally team, she served as Policy Counsel for the National Center for Lesbian Rights where she worked with the first national LGBTQ Sports Project to promote LGBTQ inclusion. Ashland has written and presented extensively on sports inclusion, and on the intersection of sports, race, and gender. Ashland was named as one of the best LGBTQ lawyers under 40 by the National LGBT Bar Association. She currently serves on the national Board of Directors for the Point Foundation.&quot;}"><span data-dcnode-id="3053" instrument_node="">Ashland Johnson is a civil rights lawyer, sports inclusion policy expert, and former Division I athlete. Recently, she served as the Public Education Director for the Human Rights Campaign, executing public education campaigns on the intersection of race, sexual orientation, sports, gender, and faith. Ashland also served as Athlete Ally's Policy Director, working with sports leaders to promote LGBTQ inclusion on the field and under the law. Prior to joining the Athlete Ally team, she served as Policy Counsel for the National Center for Lesbian Rights where she worked with the first national LGBTQ Sports Project to promote LGBTQ inclusion. Ashland has written and presented extensively on sports inclusion, and on the intersection of sports, race, and gender. Ashland was named as one of the best LGBTQ lawyers under 40 by the National LGBT Bar Association. She currently serves on the national Board of Directors for the Point Foundation.</span></span><span data-dcnode-id="3051" instrument_node=""> </span><br data-dcnode-id="3050"><br data-dcnode-id="3049"><div data-dcnode-id="3041"><strong data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3046"><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/using-state-and-federal-law-to-safeguard-transgender-inclusion-in-sports/" target="_blank"><span data-dcnode-id="3045" instrument_node="">Using State and Federal Law To Safeguard Transgender Inclusion in Sports</span></a><br data-dcnode-id="3043"><br data-dcnode-id="3042"></div><hr data-dcnode-id="3040"><strong data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Jennedy Johnson</span></strong><span data-dcnode-id="3037" instrument_node=""> - </span><span data-dcnode-id="3035" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Jennedy S. Johnson is an Assistant General Counsel at PECO Energy Company. In this role she advises senior management in all areas of regulatory law, including utility and administrative law and ethics. She also represents the company in matters before the Pennsylvania Public Utility Commission and the Federal Energy Regulatory Commission. Johnson is a pro bono coordinator for PECO, and also maintains a substantial pro bono practice. She volunteers with numerous organizations including the Homeless Advocacy Project, the SeniorLAW Center, the Nationalities Service Center, and the Transgender Legal Defense and Education Fund. Additionally, she serves on the boards of the Homeless Advocacy Project and Women‚Äôs Way. Ms. Johnson is a member of the Bars of the Supreme Court of the United States and the Commonwealth of Pennsylvania. She earned a JD cum laude from the University of Pittsburgh, and a BS from Pennsylvania State University.&quot;}"><span data-dcnode-id="3036" instrument_node="">Jennedy S. Johnson is an Assistant General Counsel at PECO Energy Company. In this role she advises senior management in all areas of regulatory law, including utility and administrative law and ethics. She also represents the company in matters before the Pennsylvania Public Utility Commission and the Federal Energy Regulatory Commission. Johnson is a pro bono coordinator for PECO, and also maintains a substantial pro bono practice. She volunteers with numerous organizations including the Homeless Advocacy Project, the SeniorLAW Center, the Nationalities Service Center, and the Transgender Legal Defense and Education Fund. Additionally, she serves on the boards of the Homeless Advocacy Project and Women's Way. Ms. Johnson is a member of the Bars of the Supreme Court of the United States and the Commonwealth of Pennsylvania. She earned a JD cum laude from the University of Pittsburgh, and a BS from Pennsylvania State University.</span></span><span data-dcnode-id="3034" instrument_node=""> </span><br data-dcnode-id="3033"><br data-dcnode-id="3032"><div data-dcnode-id="3024"><strong data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3029"><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/changing-names-and-changing-lives-partnering-with-corporate-legal-departments-law-firms-and-legal-service-providers-to-help-transgender-clients-petition-for-legal-name-and-gender-marker-changes/" target="_blank"><span data-dcnode-id="3028" instrument_node="">Changing Names and Changing Lives: Partnering with Corporate Legal Departments, Law Firms, and Legal Service Providers to Help Transgender Clients Petition for Legal Name and Gender Marker Changes</span></a><br data-dcnode-id="3026"><br data-dcnode-id="3025"></div><hr data-dcnode-id="3023"><strong data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Barbara Jones</span></strong><span data-dcnode-id="3020" instrument_node=""> - </span><span data-dcnode-id="3018" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Barbara Jones is a member of the State Bar of California and the U.S. Supreme Court Bar. She has been a Senior Attorney with AARP Foundation Litigation's unit since 2004 where she has worked on a broad spectrum of cases impacting low income adults. She has filed amicus curiae (friend of the court) briefs on behalf of AARP in a variety of cases in the Supreme Court including multiple patent cases impacting low-income adults‚Äô access to health care. While at AARP Foundation, Ms. Jones served as co-counsel in 23 age discrimination class action cases. She has also worked on Social Security, investor fraud, housing, government benefit and arbitration cases. Prior to working for the AARP Foundation, Ms. Jones worked as a Research Attorney for the San Mateo County Superior Court, taught legal research and appellate brief writing at Santa Clara University, School of Law and worked as an attorney for the California Rural Legal Assistance where she served as the state wide employment/labor coordinator. Among the government benefit cases Ms. Jones has argued are: Rosales v. Thompson, 321 F.3d 835 (9th Cir. 2003) (a foster care case described by one commentator as the most significant Title IV- E event since passage of the Child Welfare Act of 1980); California v. Shalala, 166 F.3d 1019 (9th Cir. 1999) Anderson v. Superior Court, 68 Cal.App.4th 1240 (1998) Land v. Anderson, 55 Cal.App.4th 69 (1997).&quot;}"><span data-dcnode-id="3019" instrument_node="">Barbara Jones is a member of the State Bar of California and the U.S. Supreme Court Bar. She has been a Senior Attorney with AARP Foundation Litigation's unit since 2004 where she has worked on a broad spectrum of cases impacting low income adults. She has filed amicus curiae (friend of the court) briefs on behalf of AARP in a variety of cases in the Supreme Court including multiple patent cases impacting low-income adults' access to health care. While at AARP Foundation, Ms. Jones served as co-counsel in 23 age discrimination class action cases. She has also worked on Social Security, investor fraud, housing, government benefit and arbitration cases. Prior to working for the AARP Foundation, Ms. Jones worked as a Research Attorney for the San Mateo County Superior Court, taught legal research and appellate brief writing at Santa Clara University, School of Law and worked as an attorney for the California Rural Legal Assistance where she served as the state wide employment/labor coordinator. Among the government benefit cases Ms. Jones has argued are: Rosales v. Thompson, 321 F.3d 835 (9th Cir. 2003) (a foster care case described by one commentator as the most significant Title IV- E event since passage of the Child Welfare Act of 1980); California v. Shalala, 166 F.3d 1019 (9th Cir. 1999) Anderson v. Superior Court, 68 Cal.App.4th 1240 (1998) Land v. Anderson, 55 Cal.App.4th 69 (1997).</span></span><span data-dcnode-id="3017" instrument_node=""> </span><br data-dcnode-id="3016"><br data-dcnode-id="3015"><div data-dcnode-id="3007"><strong data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="3012"><a data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/administrative-law-2-0-360-degree-picture-of-government-action/" target="_blank"><span data-dcnode-id="3011" instrument_node="">Administrative Law 2.0: 360 Degree Picture of Government Action</span></a><br data-dcnode-id="3009"><br data-dcnode-id="3008"></div><hr data-dcnode-id="3006"><strong data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Courtney Joslin</span></strong><span data-dcnode-id="3003" instrument_node=""> - Courtney Joslin is a Martin Luther King Jr. Professor of Law at UC Davis School of Law. She is a leading expert in the areas of family and relationship recognition, with a particular focus on same-sex and unmarried couples. She is a co-author (with William N. Eskridge Jr. &amp; Nan D. Hunter) of the textbook--Sexuality, Gender, and the Law. She is also co-author (with Shannon P. Minter &amp; Catherine Sakimura) of a leading treatise--Lesbian, Gay, Bisexual, and Transgender Family Law. Professor Joslin served as the Reporter for the Uniform Parentage Act (2017) which, among other things, permits and regulates surrogacy. </span><br data-dcnode-id="3002"><br data-dcnode-id="3001"><div data-dcnode-id="2993"><strong data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2998"><a data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/family-rights-for-lgbtqia-folks-u-s-surrogacy-parentage-laws/" target="_blank"><span data-dcnode-id="2997" instrument_node="">Family Rights for LGBTQIA+ Folks: U.S. Surrogacy and Parentage Laws</span></a><br data-dcnode-id="2995"><br data-dcnode-id="2994"></div><hr data-dcnode-id="2992"><strong data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Richard B. Katskee</span></strong><span data-dcnode-id="2989" instrument_node=""> - Richard B. Katskee is Legal Director at Americans United for Separation of Church and State, where he litigates cases under the First Amendment’s Establishment, Free Exercise, and Free Speech Clauses. Previously, Richard was a member of the Supreme Court &amp; Appellate practice at Mayer Brown LLP and was Deputy Director of the Program Legal Group in the U.S. Department of Education’s Office for Civil Rights (where he led development of policy implementing federal antidiscrimination laws). Richard received his J.D. from the Yale Law School, his A.M. in political science from Harvard University, and his A.B. with highest distinction and high honors from the University of Michigan. He clerked for Judges Stephen Reinhardt (Ninth Circuit) and Guido Calabresi (Second Circuit). He has taught church–state law at the American University Washington College of Law and ethics at the John F. Kennedy School of Government and Harvard College. He is a member of the American Law Institute, an adviser to the Restatement of the Law: Children and the Law, and a Woodrow Wilson Visiting Fellow. He serves on the Board of Advisors for the National Museum of American Religion and formerly served on the Board of Directors for the National Center for Science Education. </span><br data-dcnode-id="2988"><br data-dcnode-id="2987"><div data-dcnode-id="2979"><strong data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2984"><a data-dcnode-id="2982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/emerging-trends-will-the-supreme-court-strengthen-religion-to-slow-lgbt-advances/" target="_blank"><span data-dcnode-id="2983" instrument_node="">Emerging Trends: Will the Supreme Court Strengthen Religion to Slow LGBTQ+ Advances?</span></a><br data-dcnode-id="2981"><br data-dcnode-id="2980"></div><hr data-dcnode-id="2978"><strong data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Anastasia Kaup</span></strong><span data-dcnode-id="2975" instrument_node=""> - Anastasia Kaup is a Partner in the Corporate Practice Group at Duane Morris LLP and advises clients in a broad array of financing transactions.&nbsp; Anastasia's clients include financial institutions, private equity sponsors and portfolio companies, investment funds, asset managers, and other financing counterparties.&nbsp; Anastasia structures, negotiates, and documents complex financing transactions domestically and internationally at all levels of the organizational structure, with specific focuses on fund finance, sponsor finance, and financing in distressed situations. Anastasia is a 2020 National LGBT Bar Association "Best LGBTQ+ Lawyers Under 40" Award recipient who has been involved with LGBTQ+ community advocacy, volunteer work, and education initiatives for nearly two decades.&nbsp; Anastasia has contributed pro bono legal services to and volunteered with numerous community and non-profit organizations including Out in Finance, Lambda Legal, and Transgender Legal Defense and Education Fund.&nbsp; Anastasia is an honors graduate of the University of Michigan Law School and the University of Utah. </span><br data-dcnode-id="2974"><br data-dcnode-id="2973"><div data-dcnode-id="2965"><strong data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2970"><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtqia-in-big-law-a-how-to-guide-for-law-students/" target="_blank"><span data-dcnode-id="2969" instrument_node="">LGBTQIA+ in Big Law: A How-To Guide for Law Students</span></a><br data-dcnode-id="2967"><br data-dcnode-id="2966"></div><div data-dcnode-id="2957"><strong data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2962"><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/proud-at-work-the-power-of-employee-resource-groups/" target="_blank"><span data-dcnode-id="2961" instrument_node="">Proud At Work: The Power of Employee Resource Groups</span></a><br data-dcnode-id="2959"><br data-dcnode-id="2958"></div><hr data-dcnode-id="2956"><strong data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">Ayesha Khan</span></strong><span data-dcnode-id="2953" instrument_node=""> - </span><span data-dcnode-id="2951" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Ayesha N. Khan has represented a party or an amicus curiae in more than thirty U.S. Supreme Court cases, over one hundred appeals, and scores of trial-level matters. She was the Legal Director of Americans United for Separation of Church and State for fifteen years and later served as a Deputy Chief in the Appellate Section of the Civil Rights Division at the U.S. Department of Justice. She left the federal government several years ago to go into private practice. As the Principal at Rock Creek Law, LLC, Khan litigates civil rights cases ranging from employment-discrimination disputes to First Amendment challenges. She also consults to a diverse array of civil rights organizations, providing mentorship to junior attorneys and strategic advice on cases. Khan is also a Partner with the Potomac Law Group, PLLC, where she oversees the firm's appellate practice, which represents commercial and individual clients in state and federal appellate courts nationwide. Khan is admitted to practice in D.C. and Maryland, every federal circuit, and the U.S. Supreme Court. She received her JD from the University of California at Berkeley and her BA from the University of Michigan. She can be reached at khan@rockcreeklaw.com and akhan@potomaclaw.com; or (202) 836-7136.&quot;}"><span data-dcnode-id="2952" instrument_node="">Ayesha N. Khan has represented a party or an amicus curiae in more than thirty U.S. Supreme Court cases, over one hundred appeals, and scores of trial-level matters. She was the Legal Director of Americans United for Separation of Church and State for fifteen years and later served as a Deputy Chief in the Appellate Section of the Civil Rights Division at the U.S. Department of Justice. She left the federal government several years ago to go into private practice. As the Principal at Rock Creek Law, LLC, Khan litigates civil rights cases ranging from employment-discrimination disputes to First Amendment challenges. She also consults to a diverse array of civil rights organizations, providing mentorship to junior attorneys and strategic advice on cases. Khan is also a Partner with the Potomac Law Group, PLLC, where she oversees the firm's appellate practice, which represents commercial and individual clients in state and federal appellate courts nationwide. Khan is admitted to practice in D.C. and Maryland, every federal circuit, and the U.S. Supreme Court. She received her JD from the University of California at Berkeley and her BA from the University of Michigan. She can be reached at khan@rockcreeklaw.com and akhan@potomaclaw.com; or (202) 836-7136.</span></span><span data-dcnode-id="2950" instrument_node=""> </span><br data-dcnode-id="2949"><br data-dcnode-id="2948"><div data-dcnode-id="2940"><strong data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2945"><a data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/emerging-trends-will-the-supreme-court-strengthen-religion-to-slow-lgbt-advances/" target="_blank"><span data-dcnode-id="2944" instrument_node="">Emerging Trends: Will the Supreme Court Strengthen Religion to Slow LGBTQ+ Advances?</span></a><br data-dcnode-id="2942"><br data-dcnode-id="2941"></div><hr data-dcnode-id="2939"><strong data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Mik Kinkead</span></strong><span data-dcnode-id="2936" instrument_node=""> - Mik Kinkead (he/him) is a white transgender man who has worked as a staff attorney at Prisoners’ Legal Services of New York and as the Director of Prisoner Justice at the Sylvia Rivera Law Project (SRLP). He currently works as the staff attorney for the Rikers Island Civil Re-Entry Project at The Legal Aid Society. In this capacity Mik provides civil legal services to reduce the collateral consequences of detention and incarceration.&nbsp; He has taught a weekly Know Your Rights class for TGNCNBI people in the NYC jails since it opened 2015. Mik has also taught CLEs across the US on working with TGNCNBI people as colleagues and in prison and jail contexts and has authored or co-authored six publications on TGNCNBI people and their rights in prison and jail contexts. Mik is a member of the New York City Jails Action Coalition and the New York Campaign for Alternatives to Isolated Confinement. </span><br data-dcnode-id="2935"><br data-dcnode-id="2934"><div data-dcnode-id="2926"><strong data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="2931"><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/confere
