w-to-effectuate-lasting-change-inside-and-outside-the-courtroom-in-hostile-jurisdictions/" target="_blank"><span data-dcnode-id="1900" instrument_node="">Beyond the “Litigation” Mindset: How to Effectuate Lasting Change Inside and Outside the Courtroom in Hostile Jurisdictions</span></a><br data-dcnode-id="1898"><br data-dcnode-id="1897"></div><hr data-dcnode-id="1895"><strong data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Samuel Pearson-Moore</span></strong><span data-dcnode-id="1892" instrument_node=""> - </span><span data-dcnode-id="1890" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Samuel is the Deputy Assistant General Counsel for Regulations for the U.S. Department of Housing and Urban Development‚Äôs (HUD) , Office of General Counsel (OGC) and has worked at HUD for 7 years. Recently, Samuel was selected as a fellow for the President‚Äôs Management Council Interagency Rotation Program meant to identify emerging leaders and expand their leadership competencies. As part of that program, Samuel served for 6-months as a Senior Advisor in the U.S. Department of Veterans Affairs‚Äô OGC. Samuel is also the Vice President of HUD‚Äôs LGBT Affinity Group, HUD FedQ. Prior to his work in the Federal Government, Samuel attended American University Washington College of Law (WCL) where he graduated cum laude and was a member of the Society of Dispute Resolution, an editor for the American University International Law Review, the president of the Lambda Law Society, and the Diversity Chair for the Student Bar Association. Prior to law school, Samuel worked for the Center for Lobbying in the Public Interest and graduated with a BA in Political Science from Augsburg College, in Minneapolis, MD. Samuel also served eight years in the United States Army Reserves, including a deployment to Iraq in 2003.&quot;}"><span data-dcnode-id="1891" instrument_node="">Samuel is the Deputy Assistant General Counsel for Regulations for the U.S. Department of Housing and Urban Development's (HUD) , Office of General Counsel (OGC) and has worked at HUD for 7 years. Recently, Samuel was selected as a fellow for the President's Management Council Interagency Rotation Program meant to identify emerging leaders and expand their leadership competencies. As part of that program, Samuel served for 6-months as a Senior Advisor in the U.S. Department of Veterans Affairs' OGC. Samuel is also the Vice President of HUD's LGBT Affinity Group, HUD FedQ. Prior to his work in the Federal Government, Samuel attended American University Washington College of Law (WCL) where he graduated cum laude and was a member of the Society of Dispute Resolution, an editor for the American University International Law Review, the president of the Lambda Law Society, and the Diversity Chair for the Student Bar Association. Prior to law school, Samuel worked for the Center for Lobbying in the Public Interest and graduated with a BA in Political Science from Augsburg College, in Minneapolis, MD. Samuel also served eight years in the United States Army Reserves, including a deployment to Iraq in 2003.</span></span><span data-dcnode-id="1889" instrument_node=""> </span><br data-dcnode-id="1888"><br data-dcnode-id="1887"><div data-dcnode-id="1879"><strong data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1884"><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/administrative-law-2-0-360-degree-picture-of-government-action/" target="_blank"><span data-dcnode-id="1883" instrument_node="">Administrative Law 2.0: 360 Degree Picture of Government Action</span></a><br data-dcnode-id="1881"><br data-dcnode-id="1880"></div><hr data-dcnode-id="1878"><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Nathan Peart</span></strong><span data-dcnode-id="1875" instrument_node=""> - </span><span data-dcnode-id="1873" data-sheets-userformat="{&quot;2&quot;:33281,&quot;3&quot;:{&quot;1&quot;:0},&quot;12&quot;:0,&quot;18&quot;:1}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Nathan Peart is a Managing Director in our Associate Practice Group based in New York. An expert in cross-border relocation, Nathan works closely with associates to help them make lateral moves into law firms whether in New York City, on the East Coast or internationally. He is focused on providing excellent service to his law firm clients and supporting his candidates through every step of the recruitment process. Nathan is passionate about offering advice and guidance to associates who are interested in learning about the market and have a desire to take the next step in their careers. He is a regular writer and contributor to legal and national publications, including the American Lawyer, Forbes.com and Attorney at Law magazine. Nathan lives in New York City and enjoys going to the gym, cooking and traveling. Originally from London, he has traveled the world, living in Hong Kong, China and Moscow. Nathan speaks fluent Russian and Mandarin.&quot;}"><span data-dcnode-id="1874" instrument_node="">Nathan Peart is a Managing Director in our Associate Practice Group based in New York. An expert in cross-border relocation, Nathan works closely with associates to help them make lateral moves into law firms whether in New York City, on the East Coast or internationally. He is focused on providing excellent service to his law firm clients and supporting his candidates through every step of the recruitment process. Nathan is passionate about offering advice and guidance to associates who are interested in learning about the market and have a desire to take the next step in their careers. He is a regular writer and contributor to legal and national publications, including the American Lawyer, Forbes.com and Attorney at Law magazine. Nathan lives in New York City and enjoys going to the gym, cooking and traveling. Originally from London, he has traveled the world, living in Hong Kong, China and Moscow. Nathan speaks fluent Russian and Mandarin.</span></span><span data-dcnode-id="1872" instrument_node=""> </span><br data-dcnode-id="1871"><br data-dcnode-id="1870"><div data-dcnode-id="1862"><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1867"><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/personal-branding-for-lawyers/" target="_blank"><span data-dcnode-id="1866" instrument_node="">Personal Branding for Lawyers</span></a><br data-dcnode-id="1864"><br data-dcnode-id="1863"></div><hr data-dcnode-id="1861"><strong data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Kristen Pezone</span></strong><span data-dcnode-id="1858" instrument_node=""> - Kristen Pezone is an employment attorney for Intel Corporation. Among other things, Kristen partners with the Intel Diversity &amp; Inclusion team to support inclusion efforts and is currently focused on disability as well as examining the intersectionality of disability and other communities.&nbsp; Prior to joining Intel, Kristen worked for Marvell Semiconductor and Bingham McCutchen. She is a graduate of Occidental College and received her law degree from American University, Washington College of Law. </span><br data-dcnode-id="1857"><br data-dcnode-id="1856"><div data-dcnode-id="1847"><strong data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">VIP/Top Sponsor Panel (By Invitation Only)</span></strong><span data-dcnode-id="1853" instrument_node="">: August 12, 2020 | 4:00 pm - 5:30 pm</span><br data-dcnode-id="1852"><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/vip-top-sponsor-panel/" target="_blank"><span data-dcnode-id="1851" instrument_node="">VIP/Top Sponsor Panel (Sponsored by White &amp; Case LLP)</span></a><br data-dcnode-id="1849"><br data-dcnode-id="1848"></div><hr data-dcnode-id="1846"><strong data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Ashwin Phatak</span></strong><span data-dcnode-id="1843" instrument_node=""> - Ashwin is an Appellate Counsel at the Constitutional Accountability Center. Before joining CAC, Ashwin was an Attorney-Adviser at the Office of Legal Counsel at the U.S. Department of Justice. Ashwin also served as a law clerk for Judge Patricia A. Millett on the U.S. Court of Appeals for the D.C. Circuit and Judge Beverly B. Martin on the U.S. Court of Appeals for the Eleventh Circuit. Ashwin graduated&nbsp;</span><em data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">magna cum laude</span></em><span data-dcnode-id="1840" instrument_node="">&nbsp;from Harvard Law School in 2014, where he served as the Developments in the Law editor on the Harvard Law Review and argued in the finals of the Ames Moot Court Competition. He received his undergraduate degree, summa cum laude, from Tufts University in 2009. </span><br data-dcnode-id="1839"><br data-dcnode-id="1838"><div data-dcnode-id="1830"><strong data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1835"><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/discrimination-on-the-governmental-dime/" target="_blank"><span data-dcnode-id="1834" instrument_node="">Discrimination on the Governmental Dime</span></a><br data-dcnode-id="1832"><br data-dcnode-id="1831"></div><hr data-dcnode-id="1829"><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Dr. Elyse Pine</span></strong><span data-dcnode-id="1826" instrument_node=""> - Elyse Pine, MD is a board-certified pediatric endocrinologist and Trans Youth Lead Physician of the Gender JOY (Journeys of Youth) Program at Chase Brexton Health Care in Maryland. She earned her BA in English and Natural Sciences at Case Western Reserve University in Cleveland OH, and her MD at Washington University in St. Louis. She completed her pediatrics residency training at the Mount Sinai Hospital in NY and moved to the Baltimore area for fellowship training in pediatric endocrinology at Johns Hopkins. Dr. Pine began working with gender diverse children and adolescents while serving as an assistant professor at University of Maryland Medical Center. Transgender care has been the most interesting, exciting and rewarding part of her clinical practice. </span><span data-dcnode-id="1824" lang="EN"><span data-dcnode-id="1825" instrument_node="">The Gender JOY program serves over 1200 transgender and gender diverse youth from ages 4-26. </span></span><span data-dcnode-id="1823" instrument_node="">Dr. Pine has published research and clinical articles related to transgender care and lectures frequently. She has served as an expert witness in legal cases involving medical decisions for transgender youth. </span><br data-dcnode-id="1822"><br data-dcnode-id="1821"><hr data-dcnode-id="1820"><strong data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Jenn Protas</span></strong><span data-dcnode-id="1817" instrument_node=""> - Jenn Protas&nbsp;is a shareholder at Hoge Fenton and helps employers navigate California’s numerous employment laws and defends employers with an eye toward successful, yet cost-effective resolution</span><strong data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">.</span></strong><span data-dcnode-id="1814" instrument_node="">&nbsp; Her practice focuses on matters related to wage and hour advice and litigation, employee leave issues, personnel management, HR investigations and trainings, and defense of wrongful termination, harassment, discrimination, and retaliation litigation. In addition, Jenn has substantial experience drafting employer policies, handbooks, confidentiality and nondisclosure agreements, separation agreements, and settlement agreements. Her practice also includes housing discrimination matters, and general litigation, including business disputes. Jenn is a frequent public speaker and regularly presents seminars and trainings on such employment issues as: annual legal updates, complex leave issues, complying with California wage and hour laws, and effective management of employees. She also provides legally-mandated anti-harassment trainings (AB 1825) and fair housing trainings at clients’ sites. </span><br data-dcnode-id="1813"><br data-dcnode-id="1812"><div data-dcnode-id="1804"><strong data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1809"><a data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtq-workplace-harassment-assessing-investigating-and-litigating-sexual-orientation-gender-identity-based-bias-in-states-with-protective-laws/" target="_blank"><span data-dcnode-id="1808" instrument_node="">LGBTQ+ Workplace Harassment: Assessing, Investigating, and Litigating Sexual Orientation and Gender Identity-Based Bias in States with Protective Laws</span></a><br data-dcnode-id="1806"><br data-dcnode-id="1805"></div><hr data-dcnode-id="1803"><strong data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Jason Qu</span></strong><span data-dcnode-id="1800" instrument_node=""> - </span><span data-dcnode-id="1798" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Jason Z. Qu is the Managing Attorney for Nonprofit and Small Business Legal Assistance Programs at the D.C. Bar Pro Bono Center. Jason trains and counsels nonprofit leaders on a range of matters including corporate governance, tax law, employment law, and risk management, with a focus on both established and start-up organizations. Jason also coordinates legal clinics and certificate training programs, develops online legal resources, and facilitates matches between volunteer attorneys and D.C.-area nonprofits. Before joining the Pro Bono Center, Jason was an associate at a Hogan Lovells LLP where he represented pharmaceutical clients in government regulatory proceedings. Jason holds a JD from Harvard Law School, where he graduated magna cum laude and was an editor of the Harvard Law Review, and an honors degree from the University of Toronto, with high distinction, where he coordinated an incubator for sustainable food and urban agriculture initiatives.&quot;}"><span data-dcnode-id="1799" instrument_node="">Jason Z. Qu is the Managing Attorney for Nonprofit and Small Business Legal Assistance Programs at the D.C. Bar Pro Bono Center. Jason trains and counsels nonprofit leaders on a range of matters including corporate governance, tax law, employment law, and risk management, with a focus on both established and start-up organizations. Jason also coordinates legal clinics and certificate training programs, develops online legal resources, and facilitates matches between volunteer attorneys and D.C.-area nonprofits. Before joining the Pro Bono Center, Jason was an associate at a Hogan Lovells LLP where he represented pharmaceutical clients in government regulatory proceedings. Jason holds a JD from Harvard Law School, where he graduated magna cum laude and was an editor of the Harvard Law Review, and an honors degree from the University of Toronto, with high distinction, where he coordinated an incubator for sustainable food and urban agriculture initiatives.</span></span><span data-dcnode-id="1797" instrument_node=""> </span><br data-dcnode-id="1796"><br data-dcnode-id="1795"><div data-dcnode-id="1787"><strong data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1792"><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/tax-exempt-vehicles-for-grassroots-and-emerging-lgbt-advocates/" target="_blank"><span data-dcnode-id="1791" instrument_node="">Tax-Exempt Vehicles for Grassroots and Emerging LGBTQ+ Advocates</span></a><br data-dcnode-id="1789"><br data-dcnode-id="1788"></div><hr data-dcnode-id="1786"><strong data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Jill Rose Quinn</span></strong><span data-dcnode-id="1783" instrument_node=""> - </span><span data-dcnode-id="1781" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Jill Rose Quinn has an extensive legal background, having worked in both the public and private sectors. She has a lifelong dedication to community service. Jill's private practice experience includes working at general legal practices, where she handled a wide variety of case types. Throughout her career, she handled over 4,000 cases and performed appellate work. Jill formed her own practice in 1997 and focused on helping neighborhood residents with financial challenges, family law matters, small business operations, probate and estate planning. Jill is a current candidate for Cook County Circuit Court Judge and is the first transgender candidate for judge in Illinois. Jill is one of the few transgender legal professionals in Chicago. While she is proud of the progress our society has made, Jill knows there remains a long way to go. Being transgender has taught Jill firsthand what it is like to be marginalized and the vital importance of treating all people with fairness, decency and compassion. Her perspective will be a true asset to the bench, and her service as judge will help every person in our community have a court system in which they can have the utmost confidence. She is a member of the National LGBT Bar Association and Chicago LGBT Chamber of Commerce.&quot;}"><span data-dcnode-id="1782" instrument_node="">Jill Rose Quinn has an extensive legal background, having worked in both the public and private sectors. She has a lifelong dedication to community service. Jill's private practice experience includes working at general legal practices, where she handled a wide variety of case types. Throughout her career, she handled over 4,000 cases and performed appellate work. Jill formed her own practice in 1997 and focused on helping neighborhood residents with financial challenges, family law matters, small business operations, probate and estate planning. Jill is a current candidate for Cook County Circuit Court Judge and is the first transgender candidate for judge in Illinois. Jill is one of the few transgender legal professionals in Chicago. While she is proud of the progress our society has made, Jill knows there remains a long way to go. Being transgender has taught Jill firsthand what it is like to be marginalized and the vital importance of treating all people with fairness, decency and compassion. Her perspective will be a true asset to the bench, and her service as judge will help every person in our community have a court system in which they can have the utmost confidence. She is a member of the National LGBT Bar Association and Chicago LGBT Chamber of Commerce.</span></span><span data-dcnode-id="1780" instrument_node=""> </span><br data-dcnode-id="1779"><br data-dcnode-id="1778"><div data-dcnode-id="1770"><strong data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1775"><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/existing-and-thriving-as-a-trans-femme-attorney/" target="_blank"><span data-dcnode-id="1774" instrument_node="">Existing and Thriving as a Trans-femme Attorney</span></a><br data-dcnode-id="1772"><br data-dcnode-id="1771"></div><hr data-dcnode-id="1769"><strong data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Robert Raben</span></strong><span data-dcnode-id="1766" instrument_node=""> - Robert Raben, and the seventy or so people who have joined him in the unique public policy firm he created in 2002, works to drive public policy in a humane and sensible direction; to bring diversity and equity to the boardrooms and think tanks and corporations of America; to create a fair judiciary and to influence legislation that will broaden civil rights, reform our criminal justice system, and improve education for all our children. Nearly 30 years of professional experience as an attorney, senior Hill staffer, and Assistant Attorney General have given Robert a nuanced understanding of both the legal subtleties and the political realities of the issues he handles. In addition, he brings an aggressively bipartisan approach to the firm, built during a highly respected legislative career that began on Representative Barney Frank's staff and concluded with House Judiciary Committee Chairman Henry Hyde's endorsement of his Justice Department appointment. Robert served as counsel to Congressman Barney Frank, Democratic counsel for two Subcommittees of the House Judiciary Committee; first on the Constitution, then on the Courts and Intellectual Property. In 1999, Robert's reputation and effectiveness caught the attention of the White House, earning him an appointment as Principal Deputy Assistant Attorney General and, subsequently, Assistant Attorney General, Office of Legislative Affairs. After a unanimous confirmation vote by a Republican-controlled Senate, Robert was charged with overseeing Attorney General Janet Reno's legislative initiatives and handling extensive Congressional oversight of the department. Since 2002 he has run The Raben Group. He serves on the Boards of The Joint Center for Political and Economic Studies, and former President Barack Obama’s My Brothers’ Keeper Alliance. Past Board Service includes the American Constitution Society, Alliance for Justice, and the Iraqi Refugee Assistance Project. He is a serial NGO entrepreneur, having formed the Hispanics for a Fair Judiciary, the Friends of the Museum of the American Latino, Green 2.0, Committee for a Fair Judiciary, the March on Washington Film Festival, and the Pasos Graduation ceremony for Latino law students. Robert is a native of Miami, and a graduate of the Wharton School and the New York University Law School. </span><br data-dcnode-id="1765"><br data-dcnode-id="1764"><div data-dcnode-id="1753"><strong data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">General Attendance Session One</span></strong><span data-dcnode-id="1761" instrument_node="">: August 12, 2020 | 12:30 pm - 2:00 pm</span><strong data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1758"><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/addressing-racial-equity-within-the-lgbtq-legal-community/" target="_blank"><span data-dcnode-id="1757" instrument_node="">Addressing Racial Equity within the LGBTQ+ Legal Community</span></a><br data-dcnode-id="1755"><br data-dcnode-id="1754"></div><hr data-dcnode-id="1752"><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Jennifer M. Rafferty</span></strong><span data-dcnode-id="1749" instrument_node=""> - </span><p data-dcnode-id="1747" style="font-weight: 400"><span data-dcnode-id="1748" instrument_node="">Jennifer Rafferty is the Vice President, General Counsel and Secretary of Titan America LLC, a billion-dollar construction materials subsidiary of a Greek parent company.&nbsp; Jen has been with Titan for 17 years, and loves the wide breath of legal and business issues she handles on a daily basis.&nbsp; Prior to Titan, Jen was a busines and M&amp;A lawyer with the regional law firm Willcox &amp; Savage LLC in Norfolk, Virginia. Jen has advised on and actively participated in Covid-19 and business continuity issues for Titan from the beginning, tasked with tracking the many local, state, and federal regulations and guidelines that govern her company’s many “essential worker” sites from Florida to Massachusetts.&nbsp; Jen has also served on the Return to Office multidisciplinary task team for her company’s office employees, who have been working remotely since March. Jen received her Juris Doctorate from The University of Virginia, has a Masters in Counseling Psychology from Boston College and received her undergraduate degree in English from St. Bonaventure University.</span></p><span data-dcnode-id="1746" instrument_node=""> </span><br data-dcnode-id="1745"><br data-dcnode-id="1744"><hr data-dcnode-id="1743"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Ryan Rasdall</span></strong><span data-dcnode-id="1740" instrument_node=""> - </span><div data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Ryan Rasdall is a recent graduate of Northeastern University School of Law. During his time in law school, Ryan held numerous leadership positions such as co-chair of the Black Law Students Association, 1L Criminal Law TA and RA for two faculty members. His coursework focused on his area of passion: health law. Prior to law school, Ryan worked for four years at Lambda Legal in NYC as a Legal Assistant to the Transgender Right Project. Ryan has been a presenter at both the Philly Trans Health Conference and the CT Trans Lives Conference. Before joining Lambda Legal, he was a Patient Navigator at Harlem United Community AIDS Center where he provided direct health services to LGBTQ youth and adults living with HIV. Ryan received his BA in the Study of Women and Gender from Smith College in 2011. Currently Ryan sits on the board of the Jim Collins Foundation, a non profit that raises money for gender affirming surgeries for transgender people, and the National Transgender Bar Association. In his free time, Ryan enjoys listening to podcasts, hiking, and playing board games. After taking the Massachusetts Bar Exam this Fall, Ryan will be joining Goulston &amp; Storrs in Boston, MA as an Associate.</span></div><span data-dcnode-id="1737" instrument_node=""> </span><br data-dcnode-id="1736"><br data-dcnode-id="1735"><hr data-dcnode-id="1734"><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Leila Raven</span></strong><span data-dcnode-id="1731" instrument_node=""> - Leila Raven is a queer mama, community organizer, and prison abolitionist working to build safety for people in the sex trades through art, education, organizing, and resources. For the past 4 years, she has worked on campaigns to decriminalize sex work with Decrim NY and previously DecrimNow DC. </span><br data-dcnode-id="1730"><br data-dcnode-id="1729"><div data-dcnode-id="1721"><strong data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1726"><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/strolling-the-halls-of-power-interjurisdictional-lessons-from-the-legislative-efforts-to-decriminalize-sex-work/" target="_blank"><span data-dcnode-id="1725" instrument_node="">Strolling the Halls of Power: Interjurisdictional Lessons from the Legislative Efforts to Decriminalize Sex Work</span></a><br data-dcnode-id="1723"><br data-dcnode-id="1722"></div><hr data-dcnode-id="1720"><strong data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Sayre Reece</span></strong><span data-dcnode-id="1717" instrument_node=""> - </span><span data-dcnode-id="1715" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Sayre Reece is the Senior Strategist for the National LGBTQ Task Force. Reece was the grassroots coordinator for the campaign against Proposition 8 in California (2008) and participated in or managed several ballot campaigns in other states. They were one of the key thinkers contributing to the successful grassroots strategy followed by marriage advocates in the 2012 ballot measures.&quot;}"><span data-dcnode-id="1716" instrument_node="">Sayre Reece is the Senior Strategist for the National LGBTQ Task Force. Reece was the grassroots coordinator for the campaign against Proposition 8 in California (2008) and participated in or managed several ballot campaigns in other states. They were one of the key thinkers contributing to the successful grassroots strategy followed by marriage advocates in the 2012 ballot measures.</span></span><span data-dcnode-id="1714" instrument_node=""> </span><br data-dcnode-id="1713"><br data-dcnode-id="1712"><div data-dcnode-id="1704"><strong data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1709"><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-fifth-anniversary-of-obergefell-how-we-won-and-what-we-lost/" target="_blank"><span data-dcnode-id="1708" instrument_node="">The Fifth Anniversary of Obergefell: How We Won and What We Lost</span></a><br data-dcnode-id="1706"><br data-dcnode-id="1705"></div><hr data-dcnode-id="1703"><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Fitzann Reid</span></strong><span data-dcnode-id="1700" instrument_node=""> - Fitzann (Fitz) Reid is Senior Counsel in the Division of Enforcement of the U.S. Securities and Exchange Commission in San Francisco, CA. She conducts confidential investigations into potential violations of the federal securities laws. She is Co-Chair of the SEC’s LGBT employee resource group, serves on the SEC’s Digital Assets Specialized Working Group, and is member of the U.S. Department of Justice’s Interagency Securities and Commodities Fraud Working Group of the Financial Fraud Enforcement Task Force.&nbsp; Prior to joining the SEC she worked in-house at Wells Fargo Advisors and clerked for two federal judges. As a first generation Jamaican-American who identifies as a gender nonconforming woman, she aims to increase the visibility of underrepresented lawyers working in finance through teaching and mentorship. </span><br data-dcnode-id="1699"><br data-dcnode-id="1698"><hr data-dcnode-id="1697"><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Elizabeth "Biz" Reilly</span></strong><span data-dcnode-id="1694" instrument_node=""> -  </span><br data-dcnode-id="1693"><br data-dcnode-id="1692"><div data-dcnode-id="1684"><strong data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1689"><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/prosecutor-caucus/" target="_blank"><span data-dcnode-id="1688" instrument_node="">Prosecutor Caucus</span></a><br data-dcnode-id="1686"><br data-dcnode-id="1685"></div><hr data-dcnode-id="1683"><strong data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Antonio Reynolds</span></strong><span data-dcnode-id="1680" instrument_node=""> - </span><span data-dcnode-id="1678" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;A former Assistant United States Attorney, Antonio Reynolds represents companies, as well as their officers and directors, in a variety of civil and criminal enforcement matters before Congress and federal and state agencies. Through his pro bono work, he has been involved in a range of legal matters relating to family law and social justice, including serving as a guardian ad litem in child custody matters and representing youth in immigration matters.&quot;}"><span data-dcnode-id="1679" instrument_node="">A former Assistant United States Attorney, Antonio Reynolds represents companies, as well as their officers and directors, in a variety of civil and criminal enforcement matters before Congress and federal and state agencies. Through his pro bono work, he has been involved in a range of legal matters relating to family law and social justice, including serving as a guardian ad litem in child custody matters and representing youth in immigration matters.</span></span><span data-dcnode-id="1677" instrument_node=""> </span><br data-dcnode-id="1676"><br data-dcnode-id="1675"><div data-dcnode-id="1667"><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1672"><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/quashing-hope-a-review-of-recent-efforts-to-disrupt-the-participation-of-lgbtq-individuals-in-the-u-s-foster-care-system-and-their-forming-of-families-through-adoption/" target="_blank"><span data-dcnode-id="1671" instrument_node="">Quashing Hope: A Review of Recent Efforts to Disrupt the Participation of LGBTQ+ Individuals in the U.S. Foster Care System and their Forming of Families Through Adoption</span></a><br data-dcnode-id="1669"><br data-dcnode-id="1668"></div><hr data-dcnode-id="1666"><strong data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Christopher R. Riano</span></strong><span data-dcnode-id="1663" instrument_node=""> - Christopher R. Riano is the Executive Director for the nation's Center for Civic Education, and a Lecturer in Constitutional Law and Government at Columbia University.&nbsp; He is the co-author with Professor William N. Eskridge, Jr. of "Marriage Equality: From Outlaws to In-Laws," which is forthcoming from Yale University Press in August, 2020.&nbsp; Previously, Riano served as Assistant Counsel to the Governor of New York for Education, Arts, and Constitutional Law, as the General Counsel of the New York State Liquor Authority, and as a Partner at Drohan Lee LLP. </span><br data-dcnode-id="1662"><br data-dcnode-id="1661"><div data-dcnode-id="1653"><strong data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1658"><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-fifth-anniversary-of-obergefell-how-we-won-and-what-we-lost/" target="_blank"><span data-dcnode-id="1657" instrument_node="">The Fifth Anniversary of Obergefell: How We Won and What We Lost</span></a><br data-dcnode-id="1655"><br data-dcnode-id="1654"></div><hr data-dcnode-id="1652"><strong data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Ethan Rice</span></strong><span data-dcnode-id="1649" instrument_node=""> - Ethan&nbsp;</span><span class="il" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Rice</span></span><span data-dcnode-id="1646" instrument_node=""> is the Senior Attorney for the Fair Courts Project at Lambda Legal, the oldest and largest national legal organization committed to achieving full recognition of the rights of LGBT people and everyone living with HIV. The Fair Courts Project focuses its work on issues of judicial independence, judicial diversity, access to justice, and combating bias in the legal system.&nbsp;</span><u data-dcnode-id="1645"></u><u data-dcnode-id="1644"></u><span data-dcnode-id="1643" instrument_node="">Ethan provides education to judges, attorneys, and court staff on access to justice for LGBT people and LGBT legal issues, including bias in jury selection. He has presented to the Pennsylvania Conference of State Trial Judges (Transgender Competency), Florida Conference of Circuit Judges (LGBT Youth in Out-of-Home Care), Kansas Best Practices in Child Welfare Law Series (LGBT Youth in Out-of-Home Care), Hennepin County, Minnesota Fall Bench Retreat (Anti-LGBT Bias in Jury Selection), and many other judicial and legal organizations. Ethan created a model curriculum for legal trainings on LGBT issues,&nbsp;</span><a data-dcnode-id="1641" data-saferedirecturl="https://www.google.com/url?q=https://www.lambdalegal.org/publications/moving-beyond-bias&amp;source=gmail&amp;ust=1591733338784000&amp;usg=AFQjCNF8--W_YuPKzFSkGAnvdQMRZoobYQ" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lambdalegal.org/publications/moving-beyond-bias" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1642" instrument_node="">Moving Beyond Bias: How to Ensure Access to Justice for LGBT People</span></a><span data-dcnode-id="1640" instrument_node="">. </span><u data-dcnode-id="1639"></u><u data-dcnode-id="1638"></u><span data-dcnode-id="1637" instrument_node="">Prior to coming to Lambda Legal, Ethan served as a staff attorney at the Transgender Legal Defense and Education Fund (TLDEF). Before joining TLDEF, he was a child welfare attorney in Florida for four years. Ethan is a member of the Judicial Committee of the LGBT Bar of Greater New York, a member of the National Association of State Judicial Educators, and a 2019 Recipient of the National LGBT Bar Association’s Best LGBTQ+ Lawyers Under 40.</span><u data-dcnode-id="1636"></u><u data-dcnode-id="1635"></u><span data-dcnode-id="1634" instrument_node="">

&nbsp; </span><br data-dcnode-id="1633"><br data-dcnode-id="1632"><hr data-dcnode-id="1631"><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Brad Richter</span></strong><span data-dcnode-id="1628" instrument_node=""> - </span><span data-dcnode-id="1626" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Brad J. Richter is a partner and chair of the trusts and estates department at Fried, Frank, Harris, Shriver &amp; Jacobson LLP, resident in Fried Frank's New York office. Mr. Richter's practice focuses on all aspects of private client representation, including sophisticated tax and estate planning, administration of large estates and trusts, succession and business planning, and formation and operation of charitable foundations. He represents high net worth individuals, entrepreneurs, the fiduciaries of estates and trusts, charitable organizations, family business owners, bankers and financial services personnel, private fund sponsors and principals, and others. He also represents clients engaging in litigation with the IRS or with third parties before the Surrogate's Court on contested tax and probate matters. Mr. Richter received his JD, cum laude, from New York University School of Law, where he was a member of the NYU Law Review. He graduated magna cum laude from Amherst College. He is admitted to the bar in New York and Massachusetts. Mr. Richter is a member of the American Bar Association (Real Property, Probate &amp; Trusts Law Section; Taxation Section), New York State Bar Association (Trusts and Estates Law Section; Entertainment, Arts and Sports Law Section), New York County Lawyers Association (Estates, Trusts and Surrogate's Court Practice Section; previous: Committee on Pro Bono), and the Association of the Bar of the City of New York (previous: Committee on Estate and Gift Taxation, Committee on Surrogate's Courts).&quot;}"><span data-dcnode-id="1627" instrument_node="">Brad J. Richter is a partner and chair of the trusts and estates department at Fried, Frank, Harris, Shriver &amp; Jacobson LLP, resident in Fried Frank's New York office. Mr. Richter's practice focuses on all aspects of private client representation, including sophisticated tax and estate planning, administration of large estates and trusts, succession and business planning, and formation and operation of charitable foundations. He represents high net worth individuals, entrepreneurs, the fiduciaries of estates and trusts, charitable organizations, family business owners, bankers and financial services personnel, private fund sponsors and principals, and others. He also represents clients engaging in litigation with the IRS or with third parties before the Surrogate's Court on contested tax and probate matters. Mr. Richter received his JD, cum laude, from New York University School of Law, where he was a member of the NYU Law Review. He graduated magna cum laude from Amherst College. He is admitted to the bar in New York and Massachusetts. Mr. Richter is a member of the American Bar Association (Real Property, Probate &amp; Trusts Law Section; Taxation Section), New York State Bar Association (Trusts and Estates Law Section; Entertainment, Arts and Sports Law Section), New York County Lawyers Association (Estates, Trusts and Surrogate's Court Practice Section; previous: Committee on Pro Bono), and the Association of the Bar of the City of New York (Committee on Estate and Gift Taxation; previous: Committee on Surrogate’s Courts).</span></span><span data-dcnode-id="1625" instrument_node=""> </span><br data-dcnode-id="1624"><br data-dcnode-id="1623"><div data-dcnode-id="1615"><strong data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1620"><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/estate-planning-everything-you-need-to-know-but-didnt-think-to-ask-2/" target="_blank"><span data-dcnode-id="1619" instrument_node="">Estate Planning: Everything You Need to Know But Didn't Think to Ask!</span></a><br data-dcnode-id="1617"><br data-dcnode-id="1616"></div><hr data-dcnode-id="1614"><strong data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">DuVale Riley</span></strong><span data-dcnode-id="1611" instrument_node=""> - Senior Diversity Recruiter, DuVale Riley, supports ICD&amp;I resource development, training newly hired colleagues, strengthening relationships with national diversity partners and planning strategic diversity recruitment events. DuVale served as a Peace Corps Volunteer in Ukraine from 2011-13 after completing his Bachelor of Arts in Mass Communication at Southern Illinois University Carbondale. As a youth development volunteer, DuVale helped expand a sense of civics within the community he served by encouraging youth and community members to express themselves through various clubs and activities. </span><br data-dcnode-id="1610"><br data-dcnode-id="1609"><div data-dcnode-id="1600"><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Law Student Career Planning Program</span></strong><span data-dcnode-id="1606" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="1605"><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/career-planning-program/" target="_blank"><span data-dcnode-id="1604" instrument_node="">Career Services and Job Search Strategies for LGBTQ+ Law Students</span></a><br data-dcnode-id="1602"><br data-dcnode-id="1601"></div><hr data-dcnode-id="1599"><strong data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Victoria Rodriguez Roldan</span></strong><span data-dcnode-id="1596" instrument_node=""> - Victoria is the Senior Policy Manager for AIDS United, where she brings her own unique lens to the fight against the HIV epidemic. Particular areas of expertise and focus are the intersections of issues affecting people living at the intersections of transgender identity, disability and mental illness from a social justice lens. She frequently speaks on discrimination issues impacting the trans and disability communities. She has been profiled in multiple national media outlets and has been published in multiple academic outlets. Prior to joining AIDS United, she was senior policy counsel at the National LGBTQ Task Force where she led the Trans/GNC Justice Project and the Disability Justice Project. She currently serves in the board of directors of HIPS, an organization dedicated to harm reduction for sex work and drug use in the District of Columbia and of Equality New York, New York State’s leading LGBTQ equality organization. Victoria holds a B.A. in psychology with honors from the University of Puerto Rico, and a J.D. from the University of Maine School of Law. She lives in the Washington, DC area. </span><br data-dcnode-id="1595"><br data-dcnode-id="1594"><div data-dcnode-id="1586"><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1591"><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/whats-left-for-transgender-rights-after-harris-funeral-homes-v-eeoc/" target="_blank"><span data-dcnode-id="1590" instrument_node="">What's Left for Transgender Rights After Harris Funeral Homes v EEOC</span></a><br data-dcnode-id="1588"><br data-dcnode-id="1587"></div><hr data-dcnode-id="1585"><strong data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Judge Kristin Rosi</span></strong><span data-dcnode-id="1582" instrument_node=""> - Judge Kristin L. Rosi has been on the bench since 2007 and serves as the Chief Administrative Law Judge for the California Department of Insurance. Judge Rosi is also a Mental Health Hearing Officer for the Alameda County Superior Court and a Senior Adjunct Professor at Golden Gate University. Judge Rosi is an active member of the National Association of Women Judges, serving as the Co-Chair of Administrative Judiciary Committee and Chair of the LGBTQ Committee. She also sits on the Board of the International Association of LGBTQ Judges, serving on their Education committee. Judge Rosi holds a position on The State Bar of California's Council on Access and Fairness as well as a position on the Executive Committee of the American Bar Association’s National Conference of Administrative Law Judiciary. Judge Rosi holds an A.B. from Smith College in Women’s Studies and Psychology, a J.D. from the University of California, Hastings College of the Law, where she was a Public Interest Scholar, and will receive her Master’s in Judicial Studies from the University of Nevada, Reno in 2020. Judge Rosi lives in the Bay Area and has a seven year old son. </span><br data-dcnode-id="1581"><br data-dcnode-id="1580"><div data-dcnode-id="1572"><strong data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1577"><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/administrative-law-2-0-360-degree-picture-of-government-action/" target="_blank"><span data-dcnode-id="1576" instrument_node="">Administrative Law 2.0: 360 Degree Picture of Government Action</span></a><br data-dcnode-id="1574"><br data-dcnode-id="1573"></div><div data-dcnode-id="1564"><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1569"><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/pathways-to-the-judiciary-2/" target="_blank"><span data-dcnode-id="1568" instrument_node="">Pathways to the Judiciary</span></a><br data-dcnode-id="1566"><br data-dcnode-id="1565"></div><hr data-dcnode-id="1563"><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Amir Sadeghi</span></strong><span data-dcnode-id="1560" instrument_node=""> - Amir Sadeghi, National Policy and Partner Strategist, earned his Master of Arts in Philosophy from the New School for Social Research. While at NSSR, he focused on political theory, social upheavals, and stages where biopower and state violence clashed. He earned his Bachelor of Arts in Philosophy from the University of Central Florida. Previously, he taught debate and public speaking with the Rikers Debate Project at detention facilities on Rikers Island, New York. He is an advocate for people who are incarcerated and answering the severe social costs to the criminal punishment system. </span><br data-dcnode-id="1559"><br data-dcnode-id="1558"><div data-dcnode-id="1550"><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1555"><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-criminalization-of-disease/" target="_blank"><span data-dcnode-id="1554" instrument_node="">The Criminalization of Disease: Lessons from HIV, Hepatitis, and COVID-19</span></a><br data-dcnode-id="1552"><br data-dcnode-id="1551"></div><hr data-dcnode-id="1549"><strong data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Cathy Sakimura</span></strong><span data-dcnode-id="1546" instrument_node=""> - Cathy Sakimura is the Deputy Director and Family Law Director at the National Center for Lesbian Rights. Cathy also founded and oversees NCLR’s Family Protection Project, which improves access to family law services for low-income LGBT parents and their children, with a focus on families of color. She received her J.D. from UC Hastings College of the Law and her B.A. from Stanford University. In 2012, she was named one of the Best LGBT Lawyers under 40 by the National LGBT Bar Association. She is a co-author of the book&nbsp;</span><i data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Lesbian, Gay, Bisexual, and Transgender Family Law</span></i><span data-dcnode-id="1543" instrument_node="">. </span><br data-dcnode-id="1542"><br data-dcnode-id="1541"><div data-dcnode-id="1533"><strong data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1538"><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/family-rights-for-lgbtqia-folks-u-s-surrogacy-parentage-laws/" target="_blank"><span data-dcnode-id="1537" instrument_node="">Family Rights for LGBTQIA+ Folks: U.S. Surrogacy and Parentage Laws</span></a><br data-dcnode-id="1535"><br data-dcnode-id="1534"></div><div data-dcnode-id="1525"><strong data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1530"><a data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/same-sex-couples-marital-children-and-birthright-citizenship/" target="_blank"><span data-dcnode-id="1529" instrument_node="">Same-Sex Couples, Marital Children, and Birthright Citizenship</span></a><br data-dcnode-id="1527"><br data-dcnode-id="1526"></div><div data-dcnode-id="1514"><strong data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">General Attendance Session Two</span></strong><span data-dcnode-id="1522" instrument_node="">: August 13, 2020 | 12:30 pm - 2:00 pm</span><strong data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1519"><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/fighting-the-rise-of-anti-lgbtq-legal-groups/" target="_blank"><span data-dcnode-id="1518" instrument_node="">Fighting The Rise of Anti-LGBTQ+ Legal Groups</span></a><br data-dcnode-id="1516"><br data-dcnode-id="1515"></div><hr data-dcnode-id="1513"><strong data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Bamby Salcedo</span></strong><span data-dcnode-id="1510" instrument_node=""> -  </span><br data-dcnode-id="1509"><br data-dcnode-id="1508"><div data-dcnode-id="1500"><strong data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1505"><a data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-criminalization-of-disease/" target="_blank"><span data-dcnode-id="1504" instrument_node="">The Criminalization of Disease: Lessons from HIV, Hepatitis, and COVID-19</span></a><br data-dcnode-id="1502"><br data-dcnode-id="1501"></div><hr data-dcnode-id="1499"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Ramsey Saleeby</span></strong><span data-dcnode-id="1496" instrument_node=""> - Ramsey Robert Saleeby serves as Associated General Counsel and Associate Director for Legal Resources for the Association of Corporate Counsel. In this role, he provides legal counsel to ACC, as well as develops programming for ACC's various global in-person programs. Ramsey is also an adjunct professor at the George Mason School of Law teaching International Commercial Law, an advanced level law course, and serves on the board of advisors for the Journal of International Commercial Law. Prior to joining ACC, Ramsey served as General Counsel for Armantek, a technology company located in the suburbs of Washington, DC. His experience also includes counseling major financial institutions and the U.S. Government on trade finance and banking law and regulation. He has published and edited numerous books and articles on banking law and practice, with a focus on letters of credit, and served as the case editor for the monthly periodical, Documentary Credit World. He has spoken on these subjects at a number of global conferences, including workshops organized by the Commercial Law Development Program, U.S. Department of Commerce in Baghdad and Istanbul. Ramsey earned a BA from the University of Michigan and a JD degree from the George Mason University School of Law. He is currently an LLM candidate at King’s College London. </span><br data-dcnode-id="1495"><br data-dcnode-id="1494"><hr data-dcnode-id="1493"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Sasha Samberg-Champion</span></strong><span data-dcnode-id="1490" instrument_node=""> - </span><p data-dcnode-id="1488" style="text-align: left"><span data-dcnode-id="1489" instrument_node="">Sasha Samberg-Champion is Counsel at Relman Colfax PLLC, a civil rights law firm with a national practice based in Washington, D.C. His practice covers the Fair Housing Act, Americans with Disabilities Act, Title VII, and other civil rights laws, with an emphasis on appellate litigation. Sasha has helped develop and litigate a variety of groundbreaking cases, including litigation to establish a landlord’s responsibility to address discriminatory harassment by neighbors; challenges to municipal nuisance ordinances that deprive people of housing based on police calls; litigation to establish that people with disabilities have the right to receive service from such businesses as Uber and plasma donation centers; and litigation to protect various rights of LGBTQ people. During the Trump Administration, Sasha has played a key role in several challenges to the Department of Housing and Urban Development’s attempts to roll back, delay, or outright deny important civil rights protections. Previously, he was a senior attorney in the Appellate Section of the U.S. Department of Justice’s Civil Rights Division, where he litigated appeals regarding a wide range of civil rights issues, and an Assistant Solicitor General with the New York State Attorney General’s Office, with a wide-ranging appellate practice that included important decisions in wage-and-hour law and LGBTQ rights. He has argued dozens of appeals and filed briefs in many others, including in proceedings before the U.S. Supreme Court. He is a graduate of Haverford College and Columbia Law School, and a former clerk for the Hon. Jed S. Rakoff of the U.S. District Court for the Southern District of New York and the Hon. Robert A. Katzmann, Chief Judge of the U.S. Court of Appeals for the Second Circuit.</span></p><span data-dcnode-id="1487" instrument_node=""> </span><br data-dcnode-id="1486"><br data-dcnode-id="1485"><div data-dcnode-id="1477"><strong data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1482"><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-state-of-housing-law-affordable-housing-policy-and-development-for-lgbtq-communities/" target="_blank"><span data-dcnode-id="1481" instrument_node="">The State of Housing Law: Affordable Housing Policy and Development for LGBTQ Communities</span></a><br data-dcnode-id="1479"><br data-dcnode-id="1478"></div><hr data-dcnode-id="1476"><strong data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Rose Saxe</span></strong><span data-dcnode-id="1473" instrument_node=""> - </span><span data-dcnode-id="1471" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Rose Saxe is a Deputy Director of the American Civil Liberties Union's LGBT &amp; HIV Project. She has specialized in issues of employment and public accommodation discrimination, denial of medical care, family law issues, and the intersection of civil rights for LGBTQ people, and religious freedom and expression, through litigation and state and federal policy advocacy. She previously co-taught the Columbia Law School Gender &amp; Sexuality Law Clinic. She clerked for Judge Sonia Sotomayor on the 2nd U.S. Circuit Court of Appeals and Judge Janet Bond Arterton on the U.S. District Court for the District of Connecticut. Rose received her J.D. from Yale Law School and her B.A. from Georgetown University.&quot;}"><span data-dcnode-id="1472" instrument_node="">Rose Saxe is a Deputy Director of the American Civil Liberties Union's LGBT &amp; HIV Project. She has specialized in issues of employment and public accommodation discrimination, denial of medical care, family law issues, and the intersection of civil rights for LGBTQ people, and religious freedom and expression, through litigation and state and federal policy advocacy. She previously co-taught the Columbia Law School Gender &amp; Sexuality Law Clinic. She clerked for Judge Sonia Sotomayor on the 2nd U.S. Circuit Court of Appeals and Judge Janet Bond Arterton on the U.S. District Court for the District of Connecticut. Rose received her J.D. from Yale Law School and her B.A. from Georgetown University.</span></span><span data-dcnode-id="1470" instrument_node=""> </span><br data-dcnode-id="1469"><br data-dcnode-id="1468"><div data-dcnode-id="1460"><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1465"><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/discrimination-on-the-governmental-dime/" target="_blank"><span data-dcnode-id="1464" instrument_node="">Discrimination on the Governmental Dime</span></a><br data-dcnode-id="1462"><br data-dcnode-id="1461"></div><div data-dcnode-id="1452"><strong data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1457"><a data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/emerging-trends-will-the-supreme-court-strengthen-religion-to-slow-lgbt-advances/" target="_blank"><span data-dcnode-id="1456" instrument_node="">Emerging Trends: Will the Supreme Court Strengthen Religion to Slow LGBTQ+ Advances?</span></a><br data-dcnode-id="1454"><br data-dcnode-id="1453"></div><hr data-dcnode-id="1451"><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Murray Scheel</span></strong><span data-dcnode-id="1448" instrument_node=""> - </span><span data-dcnode-id="1446" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Murray Scheel is a senior staff attorney at Whitman-Walker Health in Washington, DC, the nation‚Äôs oldest medical-legal partnership, dedicated to queer and HIV health. He focuses on legal services and policy initiatives to address the needs of elderly individuals who are trans, lesbian, gay, bi-sexual, or genderqueer or living with HIV/AIDS. He came to Whitman-Walker Legal Services in 2013 from the firm of Karp, Wigodsky, Norwind, Kudel and Gold, where he served as a senior associate in civil litigation. Before private practice, he clerked for the Honorable No√´l A. Kramer on the DC Superior Court and the Honorable Vanessa Ruiz on the DC Court of Appeals. During law school, he spent a summer internship with the National Lawyers Guild and the San Francisco Human Rights Commission developing draft protocols for the proper treatment of transgender prisoners in the local jails. Scheel graduated with honors from George Washington University Law School in 2003. He is a member of the Maryland and District of Columbia Bars.&quot;}"><span data-dcnode-id="1447" instrument_node="">Murray Scheel is a senior staff attorney at Whitman-Walker Health in Washington, DC, the nation's oldest medical-legal partnership, dedicated to queer and HIV health. He focuses on legal services and policy initiatives to address the needs of elderly individuals who are trans, lesbian, gay, bi-sexual, or genderqueer or living with HIV/AIDS. He came to Whitman-Walker Legal Services in 2013 from the firm of Karp, Wigodsky, Norwind, Kudel and Gold, where he served as a senior associate in civil litigation. Before private practice, he clerked for the Honorable Noël A. Kramer on the DC Superior Court and the Honorable Vanessa Ruiz on the DC Court of Appeals. During law school, he spent a summer internship with the National Lawyers Guild and the San Francisco Human Rights Commission developing draft protocols for the proper treatment of transgender prisoners in the local jails. Scheel graduated with honors from George Washington University Law School in 2003. He is a member of the Maryland and District of Columbia Bars.</span></span><span data-dcnode-id="1445" instrument_node=""> </span><br data-dcnode-id="1444"><br data-dcnode-id="1443"><div data-dcnode-id="1435"><strong data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1440"><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/estate-planning-everything-you-need-to-know-but-didnt-think-to-ask-2/" target="_blank"><span data-dcnode-id="1439" instrument_node="">Estate Planning: Everything You Need to Know But Didn't Think to Ask!</span></a><br data-dcnode-id="1437"><br data-dcnode-id="1436"></div><div data-dcnode-id="1427"><strong data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1432"><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/silver-pride-aunt-samantha-wants-you-to-advocate-for-lgbt-elders/" target="_blank"><span data-dcnode-id="1431" instrument_node="">Silver Pride: Aunt Samantha Wants YOU to Advocate for LGBTQ+ Elders</span></a><br data-dcnode-id="1429"><br data-dcnode-id="1428"></div><hr data-dcnode-id="1426"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Rebekah Scherr</span></strong><span data-dcnode-id="1423" instrument_node=""> - Rebekah Scherr is an associate in Paul, Weiss, Rifkind, Wharton &amp; Garrison, LLP’s Corporate Department and a member of the Mergers &amp; Acquisitions practice group. Rebekah’s practice is focused on advising U.S. and multinational clients on a range of antitrust and competition issues, with an emphasis on merger notification compliance under the Hart-Scott-Rodino Act and globally. Rebekah also counsels clients in various industries with respect to general compliance with antitrust laws. Rebekah serves on Paul, Weiss’s Associate Committee, Inclusion Task Force, and as a Leader of the Pride@Work Network. Rebekah also serves on the Membership and Diversity Committee of the National LGBT Bar Association and on the Leadership Committee of OutNext Leadership. </span><br data-dcnode-id="1422"><br data-dcnode-id="1421"><div data-dcnode-id="1412"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Lateral Program</span></strong><span data-dcnode-id="1418" instrument_node="">: August 14, 2020 | 11:00 am - 12:30 pm</span><br data-dcnode-id="1417"><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/making-the-move-best-practices-for-lateral-candidates/" target="_blank"><span data-dcnode-id="1416" instrument_node="">Making The Move: Best Practices for Lateral Candidates</span></a><br data-dcnode-id="1414"><br data-dcnode-id="1413"></div><hr data-dcnode-id="1411"><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Elizabeth Schwartz</span></strong><span data-dcnode-id="1408" instrument_node=""> - </span><span data-dcnode-id="1406" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Elizabeth Schwartz has been practicing law since 1997 and is a nationally recognized advocate for the legal rights of the lesbian, gay, bisexual and transgender (LGBT) community. She is the author of the book Before I Do: A Legal Guide to Marriage, Gay and Otherwise (The New Press, 2016). While her firm equally works with straight and gay clients in matters of family law, estate planning and probate, she has been at the forefront of providing crucial legal protections for LGBT families. She lectures locally, nationally and internationally about critical topics including the impact of nationwide marriage equality and the continued importance of LGBT couples protecting their loved ones through estate planning, stepparent and second parent adoption. She focuses her practice in family formation (adoption, insemination, and surrogacy) and dissolution, and handled the first divorce for a same-sex couple in Florida.&quot;}"><span data-dcnode-id="1407" instrument_node="">Elizabeth Schwartz has been practicing law since 1997 and is a nationally recognized advocate for the legal rights of the lesbian, gay, bisexual and transgender (LGBT) community. She is the author of the book Before I Do: A Legal Guide to Marriage, Gay and Otherwise (The New Press, 2016). While her firm equally works with straight and gay clients in matters of family law, estate planning and probate, she has been at the forefront of providing crucial legal protections for LGBT families. She lectures locally, nationally and internationally about critical topics including the impact of nationwide marriage equality and the continued importance of LGBT couples protecting their loved ones through estate planning, stepparent and second parent adoption. She focuses her practice in family formation (adoption, insemination, and surrogacy) and dissolution, and handled the first divorce for a same-sex couple in Florida.</span></span><span data-dcnode-id="1405" instrument_node=""> </span><br data-dcnode-id="1404"><br data-dcnode-id="1403"><div data-dcnode-id="1395"><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1400"><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/estate-planning-everything-you-need-to-know-but-didnt-think-to-ask-2/" target="_blank"><span data-dcnode-id="1399" instrument_node="">Estate Planning: Everything You Need to Know But Didn't Think to Ask!</span></a><br data-dcnode-id="1397"><br data-dcnode-id="1396"></div><hr data-dcnode-id="1394"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Allison Scott</span></strong><span data-dcnode-id="1391" instrument_node=""> - Allison is a proud Asheville native who attended Reynolds and Erwin High Schools as well as AB Tech. She is particularly passionate about community outreach, politics, activism, cares deeply about Asheville and its citizenry, and works daily at the local level to ensure that Asheville is a welcoming community for its minorities and traditionally marginalized populations. Allison identifies as a trans woman and uses She and Her pronouns. As part of her advocacy work she has developed and led numerous trainings for local organizations including medical practices, schools, churches, and businesses, established name-change clinics for trans people, conducted support groups, participated in panel discussions, interviews, and coordinated with local school systems, news agencies, and politicians regarding equality for LGBTQ people. In 2018 she was chosen by USA Today to be one of the 50 Faces of Pride for NC along with being a featured speaker for Creative Mornings. Allison also served as Chair of CPAC, the Asheville Citizen’s Police Advisory Council, for approximately three years working to help resolve issues that arise between the community and local law enforcement. She currently serves as Treasure for Girls Rock Asheville. </span><br data-dcnode-id="1390"><br data-dcnode-id="1389"><div data-dcnode-id="1378"><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Featured CLE Program</span></strong><span data-dcnode-id="1386" instrument_node="">: August 13, 2020 | 2:15 pm - 3:45 pm</span><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1383"><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/why-trans-kids-why-now-the-reactionary-attack-on-transgender-rights/" target="_blank"><span data-dcnode-id="1382" instrument_node="">Why Trans Kids, Why Now: The Reactionary Attack on Transgender Rights</span></a><br data-dcnode-id="1380"><br data-dcnode-id="1379"></div><hr data-dcnode-id="1377"><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Nicole Seawright</span></strong><span data-dcnode-id="1374" instrument_node=""> - Nicole serves as the City of Philadelphia Law Department Director of Professional Development, Diversity &amp; Inclusion. In her role she reports to the First Deputy City Solicitor on a wide range of diversity and equity initiatives, within an agency comprised of 220 lawyers and 100 administrative staff members. Nicole is the former Director of Diversity &amp; Inclusion at Benjamin N. Cardozo School of Law. &nbsp;As director, she guided efforts to cultivate an environment that valued and demonstrated the law school’s commitment to equity, diversity, and inclusion. &nbsp;Nicole joined Cardozo after several years as a Staff Attorney with the Connecticut Legal Rights Project, a statewide non-profit agency, which provides legal services to low income individuals with mental health conditions. &nbsp;She has served as a member of the NAACP New Haven Legal Redress Committee and Connecticut Department of Mental Health and Addiction Services Multicultural Advisory Council. &nbsp;Nicole has presented nationally on cultural competency topics. She was awarded the 2020 Best LGBTQ+ Lawyers Under 40 by the National LGBT Bar Association. &nbsp;She earned a B.A. from Fordham University and a J.D. from Quinnipiac University School of Law. &nbsp;She is a member of the Connecticut state bar. </span><br data-dcnode-id="1373"><br data-dcnode-id="1372"><div data-dcnode-id="1364"><strong data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1369"><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/training-trainings-and-more-trainings-advancing-lgbtq-equity-and-access-to-justice-through-professional-development-for-law-schools-private-firms-and-court-systems/" target="_blank"><span data-dcnode-id="1368" instrument_node="">Training, Trainings, and More Trainings? Advancing LGBTQ+ Equity and Access to Justice through Professional Development for Law Schools, Private Firms, and Court Systems</span></a><br data-dcnode-id="1366"><br data-dcnode-id="1365"></div><hr data-dcnode-id="1363"><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Rachel Shalev</span></strong><span data-dcnode-id="1360" instrument_node=""> - Rachel represents clients in high-stakes, complex litigation. She has argued appeals in the Fifth and Ninth Circuits and has been the lead drafter of briefs and dispositive motions in state courts, federal district courts, federal courts of appeals, and the U.S. Supreme Court. Rachel’s experience litigating and advising clients covers a wide range of substantive areas. She focuses in particular on tough questions of constitutional law, administrative law, and statutory interpretation. Rachel maintains an active pro bono practice in the areas of immigrant and women’s rights. Prior to joining Orrick, Rachel served as a law clerk to Supreme Court Justice Stephen G. Breyer, Judge Cornelia T.L. Pillard of the D.C. Circuit, and Judge William A. Fletcher of the Ninth Circuit. Rachel received her J.D. from Yale Law School, where she served as a student director of the Supreme Court Advocacy Clinic and as Essays Editor of the&nbsp;</span><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Yale Law Journal</span></em><span data-dcnode-id="1357" instrument_node="">. She graduated from Williams College and received master’s degrees from University College London and University of St. Andrews, both of which she attended as a Marshall Scholar. </span><br data-dcnode-id="1356"><br data-dcnode-id="1355"><div data-dcnode-id="1347"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="1352"><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/supreme-court-review-2019-2020-term/" target="_blank"><span data-dcnode-id="1351" instrument_node="">Supreme Court Review: The Blockbuster 2019-2020 Term</span></a><br data-dcnode-id="1349"><br data-dcnode-id="1348"></div><hr data-dcnode-id="1346"><strong data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Randall Shorr</span></strong><span data-dcnode-id="1343" instrument_node=""> - </span><span data-dcnode-id="1341" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Randall Shorr ‚Äì Randy is an attorney in solo practice in Cleveland, Ohio. His law practice focuses on the representation of nonprofit and for-profit developers, housing authorities and lenders in affordable housing and other community development projects throughout Ohio and neighboring states. Randy received JD (cum laude) and MBA degrees from Case Western Reserve University, where he served as an Articles Editor of the Case Western Reserve Law Review. He was admitted to the Ohio bar in 1986, and established his solo practice in 1994. He has served on the Cleveland Landmarks Commission and on the boards of various nonprofit organizations. Randy has been a frequent speaker at affordable housing conferences and seminars, and currently serves as the liaison between the ABA Forum on Affordable Housing and Community Development Law and Diversity Commission on Sexual Orientation and Gender Identity.&quot;}"><span data-dcnode-id="1342" instrument_node="">Randy is an attorney in solo practice in Cleveland, Ohio. His law practice focuses on the representation of nonprofit and for-profit developers, housing authorities and le
