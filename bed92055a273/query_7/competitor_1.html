nsgender Law Center from 2012 to 2017. Ilona has authored numerous articles and book chapters on LGBT legal issues and teaches a class on Law and Sexuality at the University of California, Berkeley.</span></span><span data-dcnode-id="855" instrument_node=""> </span><br data-dcnode-id="854"><br data-dcnode-id="853"><div data-dcnode-id="845"><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="850"><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtq-workplace-harassment-assessing-investigating-and-litigating-sexual-orientation-gender-identity-based-bias-in-states-with-protective-laws/" target="_blank"><span data-dcnode-id="849" instrument_node="">LGBTQ+ Workplace Harassment: Assessing, Investigating, and Litigating Sexual Orientation and Gender Identity-Based Bias in States with Protective Laws</span></a><br data-dcnode-id="847"><br data-dcnode-id="846"></div><hr data-dcnode-id="844"><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Wayne Turner</span></strong><span data-dcnode-id="841" instrument_node=""> - </span><span data-dcnode-id="839" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Wayne Turner (he/him/his) is a senior attorney in the National Health Law Program'ss (NHeLP) Washington, DC office, and also teaches a seminar class on LGBT Health Law and Policy at Georgetown Law School. Wayne focuses on consumer protections in Medicaid managed care, Medicaid eligibility methodologies, prescription drug access, and nondiscrimination protections in health care. He is the principal author of several guides for legal advocates, and was the principal attorney in an HIV discrimination case that NHeLP initiated at the HHS Office for civil rights in 2014. Before making the transition to a legal career, Wayne spent more than a decade as an HIV/AIDS activist and is a founding member of the direct-action group ACT UP in Washington, DC. He also served as the primary organizer of DC's medical marijuana Initiative 59, which was approved by 69% of District voters in 1998. Wayne earned his B.A. at Reed College and graduated magna cum laude from the University of the District of Columbia David A. Clarke School of Law. He is featured in the 2011 PBS documentary, Out in America, in which he describes the impact of the HIV pandemic through his personal experience as a caregiver for his life partner Steve Michael, who died from AIDS-related complications in 1998.&quot;}"><span data-dcnode-id="840" instrument_node="">Wayne Turner (he/him/his) is a senior attorney in the National Health Law Program's (NHeLP) Washington, DC office, and also teaches a seminar class on LGBT Health Law and Policy at Georgetown Law School. Wayne focuses on consumer protections in Medicaid managed care, Medicaid eligibility methodologies, prescription drug access, and nondiscrimination protections in health care. He is the principal author of several guides for legal advocates, and was the principal attorney in an HIV discrimination case that NHeLP initiated at the HHS Office for civil rights in 2014. Before making the transition to a legal career, Wayne spent more than a decade as an HIV/AIDS activist and is a founding member of the direct-action group ACT UP in Washington, DC. He also served as the primary organizer of DC's medical marijuana Initiative 59, which was approved by 69% of District voters in 1998. Wayne earned his B.A. at Reed College and graduated magna cum laude from the University of the District of Columbia David A. Clarke School of Law. He is featured in the 2011 PBS documentary, Out in America, in which he describes the impact of the HIV pandemic through his personal experience as a caregiver for his life partner Steve Michael, who died from AIDS-related complications in 1998.</span></span><span data-dcnode-id="838" instrument_node=""> </span><br data-dcnode-id="837"><br data-dcnode-id="836"><div data-dcnode-id="828"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="833"><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/health-care-reform-in-2020-and-beyond-whats-at-stake-for-lgbtq-people/" target="_blank"><span data-dcnode-id="832" instrument_node="">Health Care Reform in 2020 and Beyond: What's at Stake for LGBTQ+ People?</span></a><br data-dcnode-id="830"><br data-dcnode-id="829"></div><hr data-dcnode-id="827"><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Adam Unikowsky</span></strong><span data-dcnode-id="824" instrument_node=""> - Adam G. Unikowsky is a partner in the Litigation Department and a member of the Appellate and Supreme Court Practice at Jenner &amp; Block. Since 2016, he has won eight Supreme Court cases as lead counsel. He also handles high-stakes appellate and district court litigation in numerous areas of law. Mr. Unikowsky litigates cases in the US Supreme Court, appellate courts, trial courts and administrative agencies. At the US Supreme Court, he has won eight cases as lead counsel. In six of those cases, Mr. Unikowsky represented the petitioner and filed a successful petition for certiorari. He has been recognized by "Empirical SCOTUS" as the lawyer in the United States with the highest statistical rate of success in Supreme Court merits cases; he has also separately been recognized by "Empirical SCOTUS" as the lawyer in the United States with the highest statistical rate of success at obtaining grants of certiorari. In 2017, he argued three cases within a 28-day span, leading to unanimous victories in all three. Mr. Unikowsky is a member of the Edward Coke Appellate Inn of Court. He is admitted to practice in the state of New York and the District of Columbia. </span><br data-dcnode-id="823"><br data-dcnode-id="822"><div data-dcnode-id="814"><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="819"><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/emerging-trends-will-the-supreme-court-strengthen-religion-to-slow-lgbt-advances/" target="_blank"><span data-dcnode-id="818" instrument_node="">Emerging Trends: Will the Supreme Court Strengthen Religion to Slow LGBTQ+ Advances?</span></a><br data-dcnode-id="816"><br data-dcnode-id="815"></div><hr data-dcnode-id="813"><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Kenneth Upton</span></strong><span data-dcnode-id="810" instrument_node=""> - </span><span data-dcnode-id="808" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Kenneth Upton is Senior Litigation Counsel for Americans United for Separation of Church and State. With more than 30 years of trial and appellate experience in state and federal courts across the country, Kenneth participates in cases involving the misuse of religion, primarily by government and majoritarian denominations, to justify discrimination that harms or disadvantages others, including LGBTQ people. His docket includes litigation concerning the US Department of Health and Human Service‚Äôs 2019 denial-of-care rule threatening healthcare for marginalized communities, challenges to government-sanctioned religious discrimination in state and federal foster care programs, and suits pushing back against improper exemptions that would allow businesses to discriminate in the provision of goods and services in public accommodations. Prior to joining AU, he served as Senior Counsel for Lambda Legal, the oldest and largest national legal organization committed to achieving full recognition of the civil rights of lesbians, gay men, bisexuals, transgender people and people with HIV.&quot;}"><span data-dcnode-id="809" instrument_node="">Kenneth Upton is Senior Litigation Counsel for Americans United for Separation of Church and State. With more than 30 years of trial and appellate experience in state and federal courts across the country, Kenneth participates in cases involving the misuse of religion, primarily by government and majoritarian denominations, to justify discrimination that harms or disadvantages others, including LGBTQ people. His docket includes litigation concerning the US Department of Health and Human Service's 2019 denial-of-care rule threatening healthcare for marginalized communities, challenges to government-sanctioned religious discrimination in state and federal foster care programs, and suits pushing back against improper exemptions that would allow businesses to discriminate in the provision of goods and services in public accommodations. Prior to joining AU, he served as Senior Counsel for Lambda Legal, the oldest and largest national legal organization committed to achieving full recognition of the civil rights of lesbians, gay men, bisexuals, transgender people and people with HIV.</span></span><span data-dcnode-id="807" instrument_node=""> </span><br data-dcnode-id="806"><br data-dcnode-id="805"><div data-dcnode-id="797"><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="802"><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/emerging-trends-will-the-supreme-court-strengthen-religion-to-slow-lgbt-advances/" target="_blank"><span data-dcnode-id="801" instrument_node="">Emerging Trends: Will the Supreme Court Strengthen Religion to Slow LGBTQ+ Advances?</span></a><br data-dcnode-id="799"><br data-dcnode-id="798"></div><hr data-dcnode-id="796"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Kristina Vaquera</span></strong><span data-dcnode-id="793" instrument_node=""> - Kristina H. Vaquera is a Shareholder in the Norfolk office of Jackson Lewis P.C. Her practice focuses exclusively on labor and employment counseling and litigation. Ms. Vaquera represents employers in federal and state court lawsuits and agency investigations and charges covering a wide range of statutes and subjects, including anti-discrimination and civil rights laws, wrongful termination claims, wage and hour laws, covenants not to compete, leave of absence claims, negligent hire/retention, and breaches of fiduciary duty and contract. Ms. Vaquera has litigated class and collective actions, including FLSA, FCRA, and discrimination class actions. She also represents clients in mediation and arbitration before various national and state entities. As part of Ms. Vaqueras counseling practice, she provides daily counseling and training to management to help employers avoid litigation. She assists clients with employment agreements, handbooks, background checks and drug testing issues, and disciplinary action. She represents employers before the Equal Employment Opportunity Commission, National Labor Relations Board, Department of Labor, and numerous state agencies, such as the Virginia Employment Commission, Virginia Department of Labor and Industry, Virginia Department of Housing Discrimination, and Virginia Workers Compensation Commission. Ms. Vaquera speaks extensively on various employment topics, including to the Society of Human Resource Managers, Virginia State Bar Labor and Employment Section, Equal Employment Opportunity Commission, Virginia Employment Commission, International Professional Managers Association, Virginia Government Contract Attorneys Association, PINK! Women Business Owners Conference, Public Media Business Association, and the Retail Association of Hampton Roads. She lives in Hampton Roads with her family. </span><br data-dcnode-id="792"><br data-dcnode-id="791"><hr data-dcnode-id="790"><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Judge Javier Vargas</span></strong><span data-dcnode-id="787" instrument_node=""> - The Honorable Javier E. Vargas is a Judge in the Family Court of the State of New York, Kings County, appointed in 2015. &nbsp;Between 2013 and 2015, Judge Vargas served&nbsp;as a Civil Court Judge assigned to the Housing Part in Bronx County. &nbsp;Prior thereto, Judge Vargas served with distinction for the New York State Unified Court System since 1993 in various capacities, including Senior Court Attorney at the New York State Court of Appeals; Principal Law Clerk in Supreme Court and Appellate Division; and Chief Court Attorney for the NYS Supreme Court’s Appellate Term.&nbsp; Judge Vargas received his undergraduate degree from the State University of New York (SUNY) at Buffalo, law degree from SUNY Buffalo, School of Law, and a Masters of Law degree from New York University School of Law in 1993.</span><u data-dcnode-id="786"></u><u data-dcnode-id="785"></u><span data-dcnode-id="784" instrument_node="">

Judge Vargas is actively involved with the Hispanic National Bar Association (HNBA), the Latino Judges Association, and the International Association of LGBTQ Judges, where he is a board member.&nbsp; Among the various positions he has held are as HNBA-NY Regional Deputy President for several years, President-Elect of the Puerto Rican Bar Association (PRBA), Co-Founder of HNBA LGBT Division, Chair of the HNBA Law School-Sin Limites, and Chair of the PRBA Scholarship Fund Selection Committee, working with a team selecting hundreds of recipients of law student scholarships. Judge Vargas has received several accolades, including the 2020 OutLaw Award from SUNY at Buffalo Law School, 2018 Spirit Award by the Cervantes Society, 2017 HNBA Latino Judge of the Year and the 2016 Special Recognition Award by the National Hispanic Pre-Law Conference. &nbsp;He is dedicated to a number of other charitable and cultural organizations, such as the Volunteer Lawyers Project, as well as professional bar associations, the New York City Bar Association and the LGBT Bar Association of New York. </span><br data-dcnode-id="783"><br data-dcnode-id="782"><div data-dcnode-id="774"><strong data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="779"><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/pathways-to-the-judiciary-2/" target="_blank"><span data-dcnode-id="778" instrument_node="">Pathways to the Judiciary</span></a><br data-dcnode-id="776"><br data-dcnode-id="775"></div><hr data-dcnode-id="773"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Dean Anthony E. Varona</span></strong><span data-dcnode-id="770" instrument_node=""> - Tony Varona is the Dean and M. Minnette Massey Professor of Law at the University of Miami School of Law. Previously, he was a Professor of Law, a Vice Dean, an Associate Dean for Faculty and Academic Affairs, and an S.J.D. Program Director at American University in Washington, D.C. Before that, Dean Varona served as the General Counsel and Legal Director for the HRC. Earlier in his career, he was an associate at Skadden Arps and at Mintz Levin, and he was an honors program enforcement attorney at the Federal Communications Commission. Between 2001-2002, Dean Varona was a Harvard Law School Washington Public Interest Fellow. Dean Varona received an LL.M. from Georgetown University in 1996, a J.D. from Boston College Law School in 1992, and an A.B. from Boston College in 1989. He has served on the board of directors for GLAAD, HRC, the Alliance for Justice, the New York Advisory Board for the American Constitution Society, and he was founding chairperson of the AIDS Action Legal Advisory Council. He currently sits on the Stonewall Museum board of directors and was a founding co-chair of the Stonewall National Museum and Archives National Advisory Council. He has lectured widely and has appeared as a legal commentator on major national media outlets. He is the recipient of the 2009 </span><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Hugh A. Johnson, Jr. Memorial Award</span></em><span data-dcnode-id="767" instrument_node=""> from the Washington Hispanic Bar Association, and he was honored by American University with the 2014 </span><em data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Outstanding Teaching in a Full-Time Appointment Award</span></em><span data-dcnode-id="764" instrument_node="">, the 2007-2008 </span><em data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Teacher of the Year Award</span></em><span data-dcnode-id="761" instrument_node="">, and with the 2018</span><em data-dcnode-id="759"><span data-dcnode-id="760" instrument_node=""> Egon Guttman Casebook Award</span></em><span data-dcnode-id="758" instrument_node=""> with Professors Andrew Popper and Mark Niles. </span><em data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Lawyers of Color Magazine</span></em><span data-dcnode-id="755" instrument_node="">&nbsp;named Dean Varona to its 2020 Power List, and in 2014 the magazine&nbsp;named him to its “50 Under 50 List.” </span><br data-dcnode-id="754"><br data-dcnode-id="753"><div data-dcnode-id="745"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="750"><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/law-school-panel/" target="_blank"><span data-dcnode-id="749" instrument_node="">Out in Leadership: Reflections from LGBTQ+ Law School Deans</span></a><br data-dcnode-id="747"><br data-dcnode-id="746"></div><hr data-dcnode-id="744"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Arun Venkataraman</span></strong><span data-dcnode-id="741" instrument_node=""> - </span><span data-dcnode-id="739" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Arun Venkataraman is Senior Director, Head of International Affairs, advancing Visa's global government engagement strategy on a range of international policy issues including digital economy, trade, tax and sanctions. Prior to joining Visa, he was Trade &amp; Investment Policy Advisor at Steptoe &amp; Johnson LLP, where he counseled multinational firms and other organizations on e-commerce, intellectual property rights, and U.S. and foreign trade policies. Arun has more than 15 years of experience advising officials at the highest levels of government on trade and economic policy, including in the Office of the US Trade Representative and the US Department of Commerce, and as a Legal Officer in the World Trade Organization. As the first ever Director of Policy at the US Department of Commerce's International Trade Administration, Arun helped shape the US government's responses to critical challenges faced by firms in the US and in markets around the world, including China and India, and led the International Trade Administration's efforts to conclude negotiations on the Trans-Pacific Partnership and secure passage of Trade Promotion Authority legislation. Prior to serving at the Department of Commerce, Arun spent several years in policy and legal roles at the Office of the US Trade Representative. Arun led the development and implementation of US-India trade policy as the Director for India, and, as Associate General Counsel, represented the United States in litigation before the World Trade Organization and in negotiations on international trade agreements. Arun also served as a Legal Officer for the Appellate Body Secretariat of the WTO, advising the seven Members of the Appellate Body on a wide range of issues raised in appeals of trade disputes between countries. Arun holds a J.D. from Columbia Law School, a Master of Arts in Law and Diplomacy from the Fletcher School of Law and Diplomacy, and a B.A. in International Relations and French Literature from Tufts University.&quot;}"><span data-dcnode-id="740" instrument_node="">Arun Venkataraman is Senior Director, Head of International Affairs, advancing Visa's global government engagement strategy on a range of international policy issues including digital economy, trade, tax and sanctions. Prior to joining Visa, he was Trade &amp; Investment Policy Advisor at Steptoe &amp; Johnson LLP, where he counseled multinational firms and other organizations on e-commerce, intellectual property rights, and U.S. and foreign trade policies. Arun has more than 15 years of experience advising officials at the highest levels of government on trade and economic policy, including in the Office of the US Trade Representative and the US Department of Commerce, and as a Legal Officer in the World Trade Organization. As the first ever Director of Policy at the US Department of Commerce's International Trade Administration, Arun helped shape the US government's responses to critical challenges faced by firms in the US and in markets around the world, including China and India, and led the International Trade Administration's efforts to conclude negotiations on the Trans-Pacific Partnership and secure passage of Trade Promotion Authority legislation. Prior to serving at the Department of Commerce, Arun spent several years in policy and legal roles at the Office of the US Trade Representative. Arun led the development and implementation of US-India trade policy as the Director for India, and, as Associate General Counsel, represented the United States in litigation before the World Trade Organization and in negotiations on international trade agreements. Arun also served as a Legal Officer for the Appellate Body Secretariat of the WTO, advising the seven Members of the Appellate Body on a wide range of issues raised in appeals of trade disputes between countries. Arun holds a J.D. from Columbia Law School, a Master of Arts in Law and Diplomacy from the Fletcher School of Law and Diplomacy, and a B.A. in International Relations and French Literature from Tufts University.</span></span><span data-dcnode-id="738" instrument_node=""> </span><br data-dcnode-id="737"><br data-dcnode-id="736"><div data-dcnode-id="728"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="733"><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/breaking-down-more-than-just-trade-barriers-the-inclusion-of-human-rights-provisions-in-free-trade-agreements/" target="_blank"><span data-dcnode-id="732" instrument_node="">Breaking Down More Than Just Trade Barriers: The Inclusion of Human Rights Provisions in Free Trade Agreements</span></a><br data-dcnode-id="730"><br data-dcnode-id="729"></div><hr data-dcnode-id="727"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Denise Visconti</span></strong><span data-dcnode-id="724" instrument_node=""> - Denise M. Visconti handles a broad variety of employment litigation matters, most often stemming from claims arising under the California Labor Code and the Fair Labor Standards Act, alleging overtime misclassification and other wage and hour violations. She also has experience with single-plaintiff claims involving: wrongful termination, sexual harassment, employment discrimination, and accommodation. A large portion of her practice involves the defense of clients in class action litigation, particularly in wage and hour matters, along with representative actions and private attorney general matters. Denise also has extensive experience conducting pay equity audits for all types of employers, from start-ups to Fortune 50 companies, and helped develop the Littler Pay Equity Assessment™, including counseling employers on a broad range of state and federal issues related to pay equity, from compliance, to updating policies and job descriptions, to training managers and recruiters, and more. She appears in state and federal courts and has handled arbitrations in various forums, including the Financial Industry Regulatory Authority, the American Arbitration Association, and JAMS.&nbsp; She is particularly familiar with the Employment Non-Discrimination Act and federal, state and local laws and regulations pertaining to gender identity and expression. Denise regularly provides advice and counseling to clients regarding gender identity and gender expression-related issues, gender transitions in the workplace, and various issues relating to domestic partnerships and same-sex couples. She also has given a number of presentations to human resource professionals, managers, and employees on valuing diversity and creating and maintaining a diverse workplace. Denise works with a diverse group of clients, including bioscience companies, computer technology companies, healthcare organizations, retail establishments, and airlines. Denise previously served as the San Diego Office Managing Shareholder. Prior to that, she served as the San Diego Office representative of the Associates Committee. Prior to joining Littler Mendelson in January 2004, Denise served as a judicial clerk to the Honorable Louisa S. Porter, Presiding Magistrate Judge, Southern District of California and also served as a judicial clerk to the Honorable Peter A. Nowinski, Eastern District of California. She spent her third year of law school working in the Immigration and Human Rights Legal Clinic helping newly-arriving immigrants obtain political asylum. She also was student director for the&nbsp;</span><em data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Legislative Journal</span></em><span data-dcnode-id="721" instrument_node="">. </span><br data-dcnode-id="720"><br data-dcnode-id="719"><div data-dcnode-id="711"><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="716"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtq-employment-law-in-practice-2/" target="_blank"><span data-dcnode-id="715" instrument_node="">LGBTQ Employment Law in Practice</span></a><br data-dcnode-id="713"><br data-dcnode-id="712"></div><hr data-dcnode-id="710"><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Dylan Waguespack</span></strong><span data-dcnode-id="707" instrument_node=""> - </span><span data-dcnode-id="705" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Dylan Waguespack is the Public Policy and External Affairs Director at True Colors United, where he develops, directs, and implements their federal, state, and local regulatory and legislative public policy agenda. He currently serves as a co-chair of the National Policy Coalition of the Every Child Deserves a Family Campaign, a group that fights federal policy efforts that seek to grant government-funded child welfare contract agencies a license to discriminate against same-sex couples and people of differing faiths. Before joining True Colors United, Waguespack was a lobbyist and political consultant working in Baton Rouge, Louisiana and Washington, D.C. In the fall of 2018, Waguespack was the Creative Director for the Unanimous Jury Coalition and the Yes on Amendment 2 campaign to require unanimous juries for felony convictions, which passed with 64 percent of the vote. He led the digital components of the 2017 Louisiana Justice Reinvestment effort to successfully pass ten landmark criminal justice reform bills ‚Äî together, the most progressive package of criminal justice reforms passed by a state legislature in modern US history. Before opening his lobbying and political consulting firm, Waguespack served as Executive Director of Louisiana Progress, the progressive movement-building partnership where he started his career as an intern in 2011. While there, he drafted and successfully lobbied for a number of bills to expand opportunity for children, youth, and families impacted by homelessness, including protection from eviction for survivors of domestic abuse, expanded eligibility for child care assistance for families experiencing homelessness, and in-state tuition and campus housing for current and formerly homeless and foster youth in postsecondary education. Waguespack is a proud New Orleanian and a graduate of Ben Franklin High School. He lives in Northeast D.C. with his partner, Matthew, and his dog, Ham.&quot;}"><span data-dcnode-id="706" instrument_node="">Dylan Waguespack is the Public Policy and External Affairs Director at True Colors United, where he develops, directs, and implements their federal, state, and local regulatory and legislative public policy agenda. He currently serves as a co-chair of the National Policy Coalition of the Every Child Deserves a Family Campaign, a group that fights federal policy efforts that seek to grant government-funded child welfare contract agencies a license to discriminate against same-sex couples and people of differing faiths. Before joining True Colors United, Waguespack was a lobbyist and political consultant working in Baton Rouge, Louisiana and Washington, D.C. In the fall of 2018, Waguespack was the Creative Director for the Unanimous Jury Coalition and the Yes on Amendment 2 campaign to require unanimous juries for felony convictions, which passed with 64 percent of the vote. He led the digital components of the 2017 Louisiana Justice Reinvestment effort to successfully pass ten landmark criminal justice reform bills ‚Äî together, the most progressive package of criminal justice reforms passed by a state legislature in modern US history. Before opening his lobbying and political consulting firm, Waguespack served as Executive Director of Louisiana Progress, the progressive movement-building partnership where he started his career as an intern in 2011. While there, he drafted and successfully lobbied for a number of bills to expand opportunity for children, youth, and families impacted by homelessness, including protection from eviction for survivors of domestic abuse, expanded eligibility for child care assistance for families experiencing homelessness, and in-state tuition and campus housing for current and formerly homeless and foster youth in postsecondary education. Waguespack is a proud New Orleanian and a graduate of Ben Franklin High School. He lives in Northeast D.C. with his partner, Matthew, and his dog, Ham.</span></span><span data-dcnode-id="704" instrument_node=""> </span><br data-dcnode-id="703"><br data-dcnode-id="702"><div data-dcnode-id="694"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="699"><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/multi-system-approaches-to-ending-lgbtq-youth-homelessness-through-law-and-policy/" target="_blank"><span data-dcnode-id="698" instrument_node="">Multi-system Approaches to Ending LGBTQ+ Youth Homelessness Through Law and Policy</span></a><br data-dcnode-id="696"><br data-dcnode-id="695"></div><hr data-dcnode-id="693"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Ray Wendell</span></strong><span data-dcnode-id="690" instrument_node=""> - Raymond&nbsp;</span><span class="il" data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Wendell</span></span><span data-dcnode-id="687" instrument_node="">&nbsp;is an attorney at Goldstein, Borgen, Dardarian &amp; Ho, a boutique litigation firm in Oakland, California. Ray represents plaintiffs in wage-and-hour, employment discrimination, disability access, and consumer rights class actions. Ray was recently selected as a Law360 Rising Star. He has spoken on panels and authored publications on topics ranging from trucking law to LGBT+ rights. Previously, he clerked for the Honorable Marilyn L. Huff in the Southern District of California. In 2013, Ray graduated cum laude from Harvard Law School, where he was an editor of the Harvard Law Review. He is a 2007 graduate of Georgetown University. In his free time, Ray&nbsp;enjoys camping, running, and playing banjo. </span><br data-dcnode-id="686"><br data-dcnode-id="685"><hr data-dcnode-id="684"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Amy Whelan</span></strong><span data-dcnode-id="681" instrument_node=""> - Amy Whelan has been a Senior Staff Attorney at the National Center for Lesbian Rights (NCLR) since 2011 and works on NCLR’s full range of litigation, policy, and public education work. Amy litigates complex civil cases around the country regarding marriage equality, employment discrimination, Title IX, family law, access to healthcare, prisoners’ civil rights, the First Amendment, and other constitutional matters. Before joining NCLR, Amy was an associate at the San Francisco firm of Rosen, Bien, Galvan &amp; Grunfeld LLP (RBGG). There, she represented individuals, organizations, and classes of people in litigation before federal and state courts and administrative agencies, principally in the area of civil rights. In 2008 and 2009, Amy was a member of the trial team in Coleman/Plata v. Schwarzenegger, a combined lawsuit challenging the California prison system’s unconstitutional provision of medical and mental healthcare. A unanimous three-judge panel ruled in favor of the prisoners in that case and the United States Supreme Court affirmed that decision on May 23, 2011. Amy received her Bachelor’s Degree from Princeton University and her Juris Doctorate from Northeastern University School of Law. </span><br data-dcnode-id="680"><br data-dcnode-id="679"><hr data-dcnode-id="678"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Troy Williams</span></strong><span data-dcnode-id="675" instrument_node=""> - Troy is the Executive Director of Equality Utah. He has over 15 years experience as a community organizer for the LGBTQ community. In 2010 the Salt Lake Tribune dubbed him, "the gay mayor of Salt Lake City." In 2015, Troy's team successfully advanced LGBTQ employment and housing nondiscrimination through the conservative Utah Legislature. In 2016, Troy led efforts to rename 20 blocks of downtown Salt Lake City as "Harvey Milk Blvd." In 2017, Equality Utah successfully overturned the state's "No Promo Homo" law which prohibited discussion of homosexuality in Utah public schools. In 2019 they built a broad coalition to successfully pass an LGBTQ inclusive hate crimes law. In 2019, Equality Utah launched their "Still Happening" campaign to end SOGI change efforts. In January 2020, Utah became the 19th (and most conservative) state in the country to enact a ban on conversion therapy for minors. </span><br data-dcnode-id="674"><br data-dcnode-id="673"><div data-dcnode-id="665"><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="670"><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/born-perfect-the-journey-from-saving-alex-to-ban-conversion-therapy-in-utah/" target="_blank"><span data-dcnode-id="669" instrument_node="">Born Perfect: The Journey from Saving Alex to Ban Conversion Therapy in Utah</span></a><br data-dcnode-id="667"><br data-dcnode-id="666"></div><hr data-dcnode-id="664"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Susan Williams</span></strong><span data-dcnode-id="661" instrument_node=""> - Susan (she/her) is a self-described “mama bear” of a transgender child and an advocate for LGBTQ rights. She founded The Transformation Project in 2019 in Sioux Falls, South Dakota. She often speaks at schools, conferences, and businesses. Susan is married to her college sweetheart Jeremy, and together they have two kids and a mini golden-doodle in Sioux Falls. </span><br data-dcnode-id="660"><br data-dcnode-id="659"><div data-dcnode-id="651"><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="656"><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/on-the-team-the-latest-legal-and-political-strategies-to-ensure-equal-opportunities-for-transgender-athletes/" target="_blank"><span data-dcnode-id="655" instrument_node="">On the Team: The Latest Legal and Political Strategies to Ensure Equal Opportunities for Transgender Athletes</span></a><br data-dcnode-id="653"><br data-dcnode-id="652"></div><hr data-dcnode-id="650"><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Christina Wilson Remlin</span></strong><span data-dcnode-id="647" instrument_node=""> - </span><span data-dcnode-id="645" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Since joining Children's Rights in 2011, Christina Wilson Remlin has represented classes of children in foster care in suits challenging violence, inadequate medical care, inappropriate conditions, inadequate special education and over-institutionalization. Her clients include those at risk of discrimination associated with their LGBTQ identity, gender, race, immigration status and class.She is the creator of Children's Rights LGBTQ project and co-author of Safe Havens: Closing the Gap Between Recommended Practice and Reality for Transgender and Gender-Expansive Youth in Out-of-Home Care and Fostering Family: A Guide to Working Well with LGBTQ Youth in Georgia's Child Welfare System. As a native Atlantan, Ms. Remlin is especially proud that she recently helped to open CR's Atlanta office. Previously, Ms. Remlin was a litigation associate in New York City at Baker &amp; McKenzie LLP, where she represented clients in complex commercial disputes and regulatory investigations. She developed an active pro bono docket and represented children and adults in political asylum hearings, Violence Against Women Act petitions, and Special Juvenile Immigration Status and green card applications. Before that, Ms. Remlin was a member of Shearman &amp; Sterling's litigation group. Ms. Remlin received her J.D. from Fordham University in 2004 where she participated in The Crowley Program on International Human Rights‚Äô Annual Mission to Bolivia and interned for the Center for Legal and Social Studies in Argentina. She received her B.A. in Political Science from Furman University in 1999 (cum laude). She has a variety of publications focusing on issues of LGBTQ rights of children, corporate responsibility, investment disputes, environmental protection and human rights reparations.&quot;}"><span data-dcnode-id="646" instrument_node="">Since joining Children's Rights in 2011, Christina Wilson Remlin has represented classes of children in foster care in suits challenging violence, inadequate medical care, inappropriate conditions, inadequate special education and over-institutionalization. Her clients include those at risk of discrimination associated with their LGBTQ identity, gender, race, immigration status and class. She is the creator of Children's Rights LGBTQ project and co-author of Safe Havens: Closing the Gap Between Recommended Practice and Reality for Transgender and Gender-Expansive Youth in Out-of-Home Care and Fostering Family: A Guide to Working Well with LGBTQ Youth in Georgia's Child Welfare System. As a native Atlantan, Ms. Remlin is especially proud that she recently helped to open CR's Atlanta office. Previously, Ms. Remlin was a litigation associate in New York City at Baker &amp; McKenzie LLP, where she represented clients in complex commercial disputes and regulatory investigations. She developed an active pro bono docket and represented children and adults in political asylum hearings, Violence Against Women Act petitions, and Special Juvenile Immigration Status and green card applications. Before that, Ms. Remlin was a member of Shearman &amp; Sterling's litigation group. Ms. Remlin received her J.D. from Fordham University in 2004 where she participated in The Crowley Program on International Human Rights' Annual Mission to Bolivia and interned for the Center for Legal and Social Studies in Argentina. She received her B.A. in Political Science from Furman University in 1999 (cum laude). She has a variety of publications focusing on issues of LGBTQ rights of children, corporate responsibility, investment disputes, environmental protection and human rights reparations.</span></span><span data-dcnode-id="644" instrument_node=""> </span><br data-dcnode-id="643"><br data-dcnode-id="642"><div data-dcnode-id="634"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="639"><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/multi-system-approaches-to-ending-lgbtq-youth-homelessness-through-law-and-policy/" target="_blank"><span data-dcnode-id="638" instrument_node="">Multi-system Approaches to Ending LGBTQ+ Youth Homelessness Through Law and Policy</span></a><br data-dcnode-id="636"><br data-dcnode-id="635"></div><hr data-dcnode-id="633"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Daniel Winterfeldt</span></strong><span data-dcnode-id="630" instrument_node=""> - </span><div data-dcnode-id="627"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Daniel Winterfeldt QC (Hon)</span></strong></div><span data-dcnode-id="626" instrument_node="">

</span><div data-dcnode-id="610"><span data-dcnode-id="623" instrument_node="">Daniel is a partner in Reed Smith’s Global Capital Markets practice. Currently based the London office, Daniel’s practice focuses on representing US, UK, European and Asian investment banks and corporate issuers in a wide range of securities transactions, including Rule 144A and Regulation S equity and debt offerings; Category 3, Regulation S transactions for US companies listing in the United Kingdom; rights offerings; exchange offers; equity-linked securities offerings; initial public offerings and secondary and follow-on offerings of equity securities, including SEC-registered transactions. Daniel founded the&nbsp;&nbsp;</span><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Forum for US Securities Lawyers in London</span></strong><span data-dcnode-id="620" instrument_node=""> in 2006&nbsp;to address US securities issues in the London market across law firms, banks and intermediaries.&nbsp; The Forum was short-listed by the British Legal Awards in 2009 for ‘Law Firm Innovation’.&nbsp;In 2015 the Forum took a leading role in supporting the London Stock Exchange and Euroclear UK &amp; Ireland (CREST) in designing and implementing the system to allow for the electronic trading and settlement of Regulation S, Category 3 securities of US issuers trading on the London Stock Exchange. This innovation makes it easier for US companies to IPO on the London Stock Exchange. For this achievement the Forum was&nbsp;'Highly Commended" by the FT Innovative Lawyers Awards in 2016 in the category ‘Innovation in Navigating Regulation’. Daniel is also the founder and chair of the&nbsp;&nbsp;</span><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">InterLaw Diversity Forum</span></strong><span data-dcnode-id="617" instrument_node="">, which seeks to promote meritocracy and inclusion for all diverse groups in the legal sector.&nbsp; The InterLaw Diversity Forum was "Highly Commended" by the FT Innovative Lawyers Awards in 2016 for 'Innovation in Human Resources”. Daniel was named the "Legal Innovator of the Year" at the FT Innovative Lawyers Awards in 2012 for his work in capital markets and diversity and inclusion.&nbsp;In 2020 Daniel was appointed as Queen's Counsel Honoris Causa (Honorary QC) for both his contributions to capital markets in England &amp; Wales through the&nbsp;&nbsp;</span><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Forum for US Securities Lawyers in London</span></strong><span data-dcnode-id="614" instrument_node="">&nbsp;as well as his contributions to diversity, inclusion and culture in the legal sector through the&nbsp;&nbsp;</span><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">InterLaw Diversity Forum</span></strong><span data-dcnode-id="611" instrument_node="">.</span></div><span data-dcnode-id="609" instrument_node=""> </span><br data-dcnode-id="608"><br data-dcnode-id="607"><hr data-dcnode-id="606"><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Shinming Wong</span></strong><span data-dcnode-id="603" instrument_node=""> - </span><span data-dcnode-id="601" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Ming Wong is the Supervising Helpline Attorney at the National Center for Lesbian Rights. In addition to managing their legal helpline, he also handles their legal aid training work, coordinates the Rural Pride project, and represents asylum-seekers through the Immigration Project. He has conducted trainings for staff and attorneys at legal aid organizations and the EEOC on various issues, including providing culturally competent services to LGBTQ+ clients. He has been named a Best LGBTQ+ Lawyer Under 40 by the National LGBT Bar Association.&quot;}"><span data-dcnode-id="602" instrument_node="">Ming Wong is the Supervising Helpline Attorney at the National Center for Lesbian Rights. In addition to managing their legal helpline, he also handles their legal aid training work, coordinates the Rural Pride project, and represents asylum-seekers through the Immigration Project. He has conducted trainings for staff and attorneys at legal aid organizations and the EEOC on various issues, including providing culturally competent services to LGBTQ+ clients. He has been named a Best LGBTQ+ Lawyer Under 40 by the National LGBT Bar Association.</span></span><span data-dcnode-id="600" instrument_node=""> </span><br data-dcnode-id="599"><br data-dcnode-id="598"><div data-dcnode-id="590"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="595"><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/legal-aid-legal-services-caucus/" target="_blank"><span data-dcnode-id="594" instrument_node="">Legal Aid/Legal Services Caucus</span></a><br data-dcnode-id="592"><br data-dcnode-id="591"></div><div data-dcnode-id="582"><strong data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="587"><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtq-workplace-harassment-assessing-investigating-and-litigating-sexual-orientation-gender-identity-based-bias-in-states-with-protective-laws/" target="_blank"><span data-dcnode-id="586" instrument_node="">LGBTQ+ Workplace Harassment: Assessing, Investigating, and Litigating Sexual Orientation and Gender Identity-Based Bias in States with Protective Laws</span></a><br data-dcnode-id="584"><br  Pride Law fellow Jessie created and led the Pathways Project, an initiative addressing the criminalization and discriminatory targeting of LGBTGNC youth of color, primarily focusing on Trans and gender nonconforming young people at Rikers Island and in City shelters. Jessie is a graduate of CUNY School of Law. While at CUNY, Jessie represented clients in the criminal defense clinic and was a recipient of the Kyle D. Jewell fellowship. Before attending law school, Jessie spent several years in Albuquerque and Santa Fe, NM, teaching writing to incarcerated youth and managing a youth shelter reentry program. Jessie holds a B.A. from Antioch College.</span></span><span data-dcnode-id="575" instrument_node=""> </span><br data-dcnode-id="574"><br data-dcnode-id="573"><div data-dcnode-id="565"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="570"><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/alternatives-to-litigation-tools-to-advocate-for-trans-and-nonbinary-rights/" target="_blank"><span data-dcnode-id="569" instrument_node="">Alternatives to Litigation: Tools to Advocate for Trans and Nonbinary Rights</span></a><br data-dcnode-id="567"><br data-dcnode-id="566"></div><hr data-dcnode-id="564"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Colin Wright</span></strong><span data-dcnode-id="561" instrument_node=""> - </span><span data-dcnode-id="559" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Colin S. Wright is Senior Intellectual Property Counsel with Landis+Gyr, where he focuses on Patents &amp; Trademarks, Cybersecurity and Technology Law. He previously served as Technology &amp; Cybersecurity Counsel at Change Healthcare and IP Counsel at McKesson, both large providers of healthcare software and data services. While at McKesson, he championed the creation of OPEN, McKesson‚Äôs LGBTQ Employee Resource Group. For his work at McKesson and in the Atlanta community, Colin was named Out &amp; Proud Corporate Counsel in 2014 by the National LGBT Bar Association. Colin is admitted to practice law in Georgia and Washington D.C. and is also a registered Patent Attorney. He holds a Bachelors in Electrical Engineering from Georgia Tech and a J.D. from the University of Georgia, and lives in Atlanta with his husband, Toby.&quot;}"><span data-dcnode-id="560" instrument_node="">Colin S. Wright is Senior Intellectual Property Counsel with Landis+Gyr, where he focuses on Patents &amp; Trademarks, Cybersecurity and Technology Law. He previously served as Technology &amp; Cybersecurity Counsel at Change Healthcare and IP Counsel at McKesson, both large providers of healthcare software and data services. While at McKesson, he championed the creation of OPEN, McKesson's LGBTQ Employee Resource Group. For his work at McKesson and in the Atlanta community, Colin was named Out &amp; Proud Corporate Counsel in 2014 by the National LGBT Bar Association. Colin is admitted to practice law in Georgia and Washington D.C. and is also a registered Patent Attorney. He holds a Bachelors in Electrical Engineering from Georgia Tech and a J.D. from the University of Georgia, and lives in Atlanta with his husband, Toby.</span></span><span data-dcnode-id="558" instrument_node=""> </span><br data-dcnode-id="557"><br data-dcnode-id="556"><div data-dcnode-id="548"><strong data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="553"><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/swipe-right-health-care-privacy-in-the-era-of-smart-devices-and-digital-health/" target="_blank"><span data-dcnode-id="552" instrument_node="">Swipe Right: Health Care Privacy in the Era of Smart Devices and Digital Health</span></a><br data-dcnode-id="550"><br data-dcnode-id="549"></div><hr data-dcnode-id="547"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Alan York</span></strong><span data-dcnode-id="544" instrument_node=""> - </span><span data-dcnode-id="542" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Alan York is a partner in Reed Smith's Appellate Group. Alan has been involved in appellate law since the inception of his legal career, serving from 1989 to 1990 as briefing attorney to Justice Sam Robertson on the Fourteenth Court of Appeals. Since that time, Alan has maintained an active involvement in appellate bar activities, serving as chair of the Houston Bar Association Appellate Practice Section, and as a council member of the State Bar of Texas Appellate Practice Section. He has also served as a judicial liaison between these bar sections and the judiciary, and has co-authored and co-presented numerous CLE topics with members of the appellate judiciary. Alan is also the global chair of Reed Smith‚Äôs LGBT+ Business Inclusion Group, PRISM (Pride, Respect, and Inclusion Simply Matter). In that role, Alan has worked closely with organizations such as TLDEF and Lambda Legal to support their important work for our communities. Alan is board certified in civil appellate law, and provides pre-trial and trial strategy and support and error preservation, as well as appellate briefing and argument on significant civil cases. In addition to his appellate docket, Alan is actively involved in trial practice, and served as one of the lead litigation and appellate counsel for Halliburton in civil claims and investigations arising from the Deepwater Horizon blow-out in the Gulf of Mexico, one of the largest environmental litigation matters in U.S. history. Alan has been selected multiple times to the The Best Lawyers in America© list; is a six-time recipient of Thomson Reuters' Top 100 Lawyers in Houston honors; was named one of the Top 100 Lawyers in Texas in 2016, 2017 and 2018; has been selected more than 15 years to the Texas Super Lawyers list; and has been recognized nine times among H Texas Magazine's Top Lawyers in Houston. He is AV-rated \&quot;Preeminent\&quot; by Martindale-Hubbell, its highest ranking for ethics and legal ability. Alan received a J.D. from the University of Houston Law Center in 1989 and a B.B.A., summa cum laude, from the University of Houston in 1986.&quot;}"><span data-dcnode-id="543" instrument_node="">Alan York is a partner in Reed Smith's Appellate Group. Alan has been involved in appellate law since the inception of his legal career, serving from 1989 to 1990 as briefing attorney to Justice Sam Robertson on the Fourteenth Court of Appeals. Since that time, Alan has maintained an active involvement in appellate bar activities, serving as chair of the Houston Bar Association Appellate Practice Section, and as a council member of the State Bar of Texas Appellate Practice Section. He has also served as a judicial liaison between these bar sections and the judiciary, and has co-authored and co-presented numerous CLE topics with members of the appellate judiciary. Alan is also the global chair of Reed Smith's LGBT+ Business Inclusion Group, PRISM (Pride, Respect, and Inclusion Simply Matter). In that role, Alan has worked closely with organizations such as TLDEF and Lambda Legal to support their important work for our communities. Alan is board certified in civil appellate law, and provides pre-trial and trial strategy and support and error preservation, as well as appellate briefing and argument on significant civil cases. In addition to his appellate docket, Alan is actively involved in trial practice, and served as one of the lead litigation and appellate counsel for Halliburton in civil claims and investigations arising from the Deepwater Horizon blow-out in the Gulf of Mexico, one of the largest environmental litigation matters in U.S. history. Alan has been selected multiple times to the The Best Lawyers in America© list; is a six-time recipient of Thomson Reuters' Top 100 Lawyers in Houston honors; was named one of the Top 100 Lawyers in Texas in 2016, 2017 and 2018; has been selected more than 15 years to the Texas Super Lawyers list; and has been recognized nine times among H Texas Magazine's Top Lawyers in Houston. He is AV-rated "Preeminent" by Martindale-Hubbell, its highest ranking for ethics and legal ability. Alan received a J.D. from the University of Houston Law Center in 1989 and a B.B.A., summa cum laude, from the University of Houston in 1986.</span></span><span data-dcnode-id="541" instrument_node=""> </span><br data-dcnode-id="540"><br data-dcnode-id="539"><div data-dcnode-id="531"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="536"><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/lgbtqia-in-big-law-a-how-to-guide-for-law-students/" target="_blank"><span data-dcnode-id="535" instrument_node="">LGBTQIA+ in Big Law: A How-To Guide for Law Students</span></a><br data-dcnode-id="533"><br data-dcnode-id="532"></div><div data-dcnode-id="523"><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="528"><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/id-ready-or-not-the-new-frontier-of-transgender-non-binary-and-intersex-identification-document-change-laws-in-2020-and-beyond/" target="_blank"><span data-dcnode-id="527" instrument_node="">ID Ready or Not?: The New Frontier of Transgender, Non-Binary, and Intersex Identification Document Change Laws in 2020 and Beyond</span></a><br data-dcnode-id="525"><br data-dcnode-id="524"></div><hr data-dcnode-id="522"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Ezra Young</span></strong><span data-dcnode-id="519" instrument_node=""> - </span><span data-dcnode-id="517" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Ezra Young is a nationally recognized civil rights attorney based in New York City. He currently maintains a boutique private practice. His litigation and scholarship centers on trans rights and focuses on rights of recognition, employment protections, and health care and insurance coverage issues. Ezra has litigated trans rights cases in courts and agencies throughout the nation. Highlights include winning an order from the Medicare Appeals Council directing a health plan to cover vaginal reconstruction surgery for a transgender woman; winning an Equal Employment Opportunity Commission precedent finding transgender exclusions in FEHB plans violate federal EEO laws; three pathbreaking co-litigations with the Equal Employment Opportunity Commission and U.S. Department of Justice vindicating transgender worker‚Äôs rights under Title VII and the Americans with Disabilities Act; successfully advocating with large public and private entities to drop transgender exclusions from their health plans; and serving as lead counsel in a first of its kind transgender sex discrimination jury trial where he secured a historic $1.165M damages award. Ezra‚Äôs academic writing has appeared in or is forthcoming in books and articles published by Routledge, Oxford University Press, the New Press, California Law Review Online, and Plastic and Reconstructive Surgery: Journal of the American Society of Plastic Surgery. Ezra currently serves on the board of the Jim Collins Foundation. He is a founding board member and past co-chair of the National ÔªøTrans Bar Association. He has previously served as legal director of the African American ÔªøPolicy ÔªøForum, research director of the Columbia Center for Intersectionality and Social Policy Studies, and director of impact litigation of the Transgender Legal Defense and Education Fund, Inc. Ezra received his BA in Philosophy from Cornell University and his JD from Columbia Law School. From 2012 to 2014, Ezra was a Postdoctoral Scholar at Columbia Law School. His post doctoral studies focused on trans rights, Critical Race Theory, and intersectionality and were supervised by renowned scholar Kimberl√© Crenshaw.&quot;}"><span data-dcnode-id="518" instrument_node="">Ezra Young is a nationally recognized civil rights attorney based in New York City. He currently maintains a boutique private practice. His litigation and scholarship centers on trans rights and focuses on rights of recognition, employment protections, and health care and insurance coverage issues. Ezra has litigated trans rights cases in courts and agencies throughout the nation. Highlights include winning an order from the Medicare Appeals Council directing a health plan to cover vaginal reconstruction surgery for a transgender woman; winning an Equal Employment Opportunity Commission precedent finding transgender exclusions in FEHB plans violate federal EEO laws; three pathbreaking co-litigations with the Equal Employment Opportunity Commission and U.S. Department of Justice vindicating transgender worker's rights under Title VII and the Americans with Disabilities Act; successfully advocating with large public and private entities to drop transgender exclusions from their health plans; and serving as lead counsel in a first of its kind transgender sex discrimination jury trial where he secured a historic $1.165M damages award. Ezra's academic writing has appeared in or is forthcoming in books and articles published by Routledge, Oxford University Press, the New Press, California Law Review Online, and Plastic and Reconstructive Surgery: Journal of the American Society of Plastic Surgery. Ezra currently serves on the board of the Jim Collins Foundation. He is a founding board member and past co-chair of the National Trans Bar Association. He has previously served as legal director of the African American Policy Forum, research director of the Columbia Center for Intersectionality and Social Policy Studies, and director of impact litigation of the Transgender Legal Defense and Education Fund, Inc. Ezra received his BA in Philosophy from Cornell University and his JD from Columbia Law School. From 2012 to 2014, Ezra was a Postdoctoral Scholar at Columbia Law School. His post doctoral studies focused on trans rights, Critical Race Theory, and intersectionality and were supervised by renowned scholar Kimberlé Crenshaw.</span></span><span data-dcnode-id="516" instrument_node=""> </span><br data-dcnode-id="515"><br data-dcnode-id="514"><div data-dcnode-id="506"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="511"><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/visibilizing-bisexuals-in-lgbtqia-rights-discourse-and-communities/" target="_blank"><span data-dcnode-id="510" instrument_node="">Visibilizing Bisexuals in LGBTQIA+ Rights Discourse and Communities</span></a><br data-dcnode-id="508"><br data-dcnode-id="507"></div><div data-dcnode-id="498"><strong data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="503"><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/whats-left-for-transgender-rights-after-harris-funeral-homes-v-eeoc/" target="_blank"><span data-dcnode-id="502" instrument_node="">What's Left for Transgender Rights After Harris Funeral Homes v EEOC</span></a><br data-dcnode-id="500"><br data-dcnode-id="499"></div><hr data-dcnode-id="497"><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Keren Zwick</span></strong><span data-dcnode-id="494" instrument_node=""> - </span><span data-dcnode-id="492" data-sheets-userformat="{&quot;2&quot;:15233,&quot;3&quot;:{&quot;1&quot;:0},&quot;10&quot;:2,&quot;11&quot;:0,&quot;12&quot;:0,&quot;14&quot;:{&quot;1&quot;:2,&quot;2&quot;:0},&quot;15&quot;:&quot;Helvetica Neue&quot;,&quot;16&quot;:11}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Keren Zwick (she/her) is the National Immigrant Justice Center's Director of Litigation, and she works closely with NIJC‚Äôs LGBT Immigrant Rights Initiative. Keren is a member of the American Immigration Lawyers‚Äô Association (AILA) and the current co-chair of the litigation committee of the Chicago chapter. Keren‚Äôs litigation is focused on asylum and protection based claims, largely for detained individuals. She has represented petitioners in dozens of cases before the United States Courts of Appeals, and filed amicus briefs in many others, focusing on applicants for protection whose claims are based on sexual orientation, gender identity, and mental health. She has also led NIJC‚Äôs efforts to preserve access to asylum, arguing in favor of access to asylum for individuals with prior removal orders and co-counseling with other organizations in challenges to regulatory bans seeking to limit access to the asylum process. Keren joined NIJC after clerking for the United States Court of Appeals for the Seventh Circuit. While Keren was a law student at Columbia Law School, she successfully represented clients in the Sexuality &amp; Gender Law Clinic in both immigration and civil rights matters. Before law school, Keren attended the University of Chicago and worked as NIJC‚Äôs asylum project coordinator. Keren is licensed to practice law in Illinois.&quot;}"><span data-dcnode-id="493" instrument_node="">Keren Zwick (she/her) is the National Immigrant Justice Center's Director of Litigation, and she works closely with NIJC's LGBT Immigrant Rights Initiative. Keren is a member of the American Immigration Lawyers' Association (AILA) and the current co-chair of the litigation committee of the Chicago chapter. Keren's litigation is focused on asylum and protection based claims, largely for detained individuals. She has represented petitioners in dozens of cases before the United States Courts of Appeals, and filed amicus briefs in many others, focusing on applicants for protection whose claims are based on sexual orientation, gender identity, and mental health. She has also led NIJC's efforts to preserve access to asylum, arguing in favor of access to asylum for individuals with prior removal orders and co-counseling with other organizations in challenges to regulatory bans seeking to limit access to the asylum process. Keren joined NIJC after clerking for the United States Court of Appeals for the Seventh Circuit. While Keren was a law student at Columbia Law School, she successfully represented clients in the Sexuality &amp; Gender Law Clinic in both immigration and civil rights matters. Before law school, Keren attended the University of Chicago and worked as NIJC's asylum project coordinator. Keren is licensed to practice law in Illinois.</span></span><span data-dcnode-id="491" instrument_node=""> </span><br data-dcnode-id="490"><br data-dcnode-id="489"><div data-dcnode-id="481"><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">CLE Workshops &amp; More</span></strong><br data-dcnode-id="486"><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lgbtqbar.org/annual/conference-workshops/the-battle-to-protect-asylum-how-advocates-are-fighting-for-the-rights-of-lgbtq-asylum-seekers-at-the-border-and-in-the-interior/" target="_blank"><span data-dcnode-id="485" instrument_node="">The Battle to Protect Asylum: How Advocates are Fighting for the Rights of LGBTQ+ Asylum Seekers at the Border and in the Interior</span></a><br data-dcnode-id="483"><br data-dcnode-id="482"></div><hr data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">
