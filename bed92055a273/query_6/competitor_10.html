</span><meta content="Research suggests that active and discussion-driven dialogic approaches to teaching are more effective than passive learning methods. One way to encourage more participatory learning is through the adoption of simple and freely available audience response systems which allow instant and inclusive staff–student dialogue during teaching sessions. Existing literature is largely limited to exploring the impact of basic approaches to audience participation, using handheld cards or simple ‘clickers’. Limited research exists looking at the impact and best use of a new generation of online audience response systems which have significantly expanded functionality. This article explores the impact of one of the most agile platforms, Mentimeter. It outlines impact on student satisfaction, enjoyment, voice and learning within small and large group settings across multiple disciplines drawing on 204 student survey responses. It also explores staff experiences and reflections on the key practical and pedagogical thinking required to optimise the use of this platform in higher education. The research responds to a need within the sector to react to rapid advances in teaching and learning technology, to provide evidence of impact for lecturers looking to improve student learning environments whilst being cognisant of the underlying pedagogy supportive of new practices." data-dcnode-id="1512" name="DC.Description" xml:lang="en"><span data-dcnode-id="1511" instrument_node="">

</span><h3 class="label" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Abstract</span></h3><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Research suggests that active and discussion-driven dialogic approaches to teaching are more effective than passive learning methods. One way to encourage more participatory learning is through the adoption of simple and freely available audience response systems which allow instant and inclusive staff–student dialogue during teaching sessions. Existing literature is largely limited to exploring the impact of basic approaches to audience participation, using handheld cards or simple ‘clickers’. Limited research exists looking at the impact and best use of a new generation of online audience response systems which have significantly expanded functionality. This article explores the impact of one of the most agile platforms, Mentimeter. It outlines impact on student satisfaction, enjoyment, voice and learning within small and large group settings across multiple disciplines drawing on 204 student survey responses. It also explores staff experiences and reflections on the key practical and pedagogical thinking required to optimise the use of this platform in higher education. The research responds to a need within the sector to react to rapid advances in teaching and learning technology, to provide evidence of impact for lecturers looking to improve student learning environments whilst being cognisant of the underlying pedagogy supportive of new practices.</span></p><span data-dcnode-id="1118" instrument_node="">

</span><p data-dcnode-id="431"><span data-dcnode-id="432" style="color: grey; font-size: x-large;"><span data-dcnode-id="433" instrument_node="">About the Journal</span></span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="422"><em data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Research in Learning Technology&nbsp;</span></em><span data-dcnode-id="427" instrument_node="">(RLT)&nbsp;is a peer reviewed, open access&nbsp;journal&nbsp;published by the&nbsp;</span><strong data-dcnode-id="424"><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alt.ac.uk/"><span data-dcnode-id="426" instrument_node="">Association for Learning Technology</span></a></strong><span data-dcnode-id="423" instrument_node="">. RLT&nbsp;aims to raise the profile of research in learning technology, encouraging research that informs good practice and contributes to the development of policy. RLT&nbsp;publishes articles in the following broad areas: technology enhanced learning, online learning, distance learning, mobile learning, flexible learning, wearable technologies, simulation, learning environments, learning spaces, pedagogy, open educational practice and social media.&nbsp;</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="417"><strong data-dcnode-id="418"><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journal.alt.ac.uk/index.php/rlt/about"><span data-dcnode-id="420" instrument_node="">Learn more &gt;&gt;</span></a></strong></p><span data-dcnode-id="416" instrument_node="">

</span><div class="title" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">2022 THEMES</span></div><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">In 2022, we are especially interested in research on the themes of: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">- the ethical usage of learning technology;&nbsp; professional development and recognition for learning technology professionals;&nbsp;</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">- upscaling the use of learning technology for learning, teaching and assessment;&nbsp;</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">- learning technologists working in partnership with students. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="391"><em data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Research in Learning Technology</span></em><span data-dcnode-id="392" instrument_node=""> continues to publish original, scholarly writing on learning technology across the full range of the practice and we will continue to welcome submissions on other topics, in addition to those falling into the broad areas above.&nbsp;</span></p><span data-dcnode-id="390" instrument_node="">

</span><p data-dcnode-id="221"><span data-dcnode-id="226" style="font-weight: bold; color: 079948;"><span data-dcnode-id="227" instrument_node="">Open Access</span></span><span data-dcnode-id="225" instrument_node="">&nbsp;–&nbsp;</span><em data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Research in Learning Technology</span></em><span data-dcnode-id="222" instrument_node="">&nbsp;is free from all access barriers, allowing for the widest possible dissemination of your work.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="216"><span data-dcnode-id="218" style="font-weight: bold; color: 079948;"><span data-dcnode-id="219" instrument_node="">Retain copyright&nbsp;</span></span><span data-dcnode-id="217" instrument_node="">– you are free to disseminate your work, make unlimited copies, and deposit it in any repository.&nbsp;</span></p><span data-dcnode-id="215" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="213" style="font-weight: bold; color: 079948;"><span data-dcnode-id="214" instrument_node="">Free to publish</span></span><span data-dcnode-id="212" instrument_node="">&nbsp;– there are no article submission or article processing </span><a data-dcnode-id="210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journal.alt.ac.uk/index.php/rlt/apc" rel="noopener" target="_blank"><span data-dcnode-id="211" instrument_node="">fees</span></a><span data-dcnode-id="209" instrument_node="">.</span></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="200"><span data-dcnode-id="205" style="font-weight: bold; color: 079948;"><span data-dcnode-id="206" instrument_node="">Personal service</span></span><span data-dcnode-id="204" instrument_node="">&nbsp;–&nbsp;</span><em data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Research in Learning Technology</span></em><span data-dcnode-id="201" instrument_node="">&nbsp;is published in partnership with Open Academia, a Publishing Partner dedicated to giving you excellent service.&nbsp;</span></p><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="197" style="font-weight: bold; color: 079948;"><span data-dcnode-id="198" instrument_node="">Self-archiving</span></span><span data-dcnode-id="196" instrument_node="">&nbsp;– you can deposit&nbsp;</span><em data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">any</span></em><span data-dcnode-id="193" instrument_node="">&nbsp;version of your manuscript in any required repository or archive, or post it to your personal or institutional website.&nbsp;</span></p><span data-dcnode-id="191" instrument_node="">
