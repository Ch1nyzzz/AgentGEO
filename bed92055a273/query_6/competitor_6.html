</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">We should make one final point about young people’s readiness to take part in the experiment more generally, which has implications for compulsory voting and other measures affecting political participation. After distributing well over 1,000 recruiting forms we had expected to receive an excess of applications, from which we would choose 200 respondents who did not expect to vote. Yet of those eligible to vote who filled out a form, only 20 percent stated that they did not expect to vote or were uncertain whether they would vote. In all likelihood, the nonvoters among those enrolled in the classes from which we recruited were more likely to be absent from school or to be unwilling to indicate their interest in participating. This has direct implications for, to give one example, our reliance on permanent registers of electors that are based on voluntary participation.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">We were even unable to get most of the people who completed the form and expressed a willingness to participate to come to a locale within the school they attended regularly. And, despite the fact that we made administrative changes (that is, let subjects complete the forms on-line) and undertook active mobilization exercises (such as repeated e-mails supplemented by telephone calls), we still had a large attrition rate, particularly among the nonvoters. This is particularly significant since, historically, the mechanisms used to increase turnout for Canadian elections — the only ones supported by the Royal Commission on Electoral Reform and Elections Canada to date — have been administrative changes and mobilization efforts. Clearly, such mechanisms will not be sufficient to activate the next generation of recalcitrant voters (young people for whom instantaneous communication and technological convenience will always be present). This may be good news for supporters of compulsory voting, as it implies that past initiatives may be increasingly ineffective; though it is bad news for the health of Canada’s representative democracy. It would also seem to suggest that voter incentives like those Hicks suggests will fail to overcome lack of interest in participating in the groups he identifies as most at risk (2002, 2006).</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">When voter turnout in Canada was at approximately 75 percent, Pammett’s research for the Royal Commission on Electoral Reform suggested that “there is a small hard core of perennial non-voters, numbering perhaps five per cent of the population at most” (1991, 34), and that these persons were distinct from the approximately 20 percent who chose not to participate from election to election. British politician Geoff Hoon, a prominent advocate of compulsory voting, refers to the former group as “serial non-voters” (Ballinger 2007, 11). Milner has identified a similar group among the young, which he calls the “political dropouts,” and he has sounded the alarm that their numbers may be increasing (2005). This group does, in fact, appear to be growing; and it seems likely to include a higher proportion of males than females.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Overall, then, the future does not look bright for voter participation in Canada as this next group of youths enters the electoral pool. If, as seems to be the case, disengagement and lack of interest are becoming the rule and not the exception, then there is good reason to expect that turnout will not return to previous levels — and it may decline even further. Compulsory voting may be one solution, but in this paper we have raised a number of questions surrounding it. Much more work needs to be done on how information related to voting is obtained and processed by members of society who normally do not vote. Specifically, research is needed on whether information collection alters over time with repeated voting. Additionally, many of the other dimensions of this debate should be more deeply examined, such as how parties respond to greater numbers of voters when mobilization is no longer so central to their electoral strategies. The debate over voter engagement and participation is just beginning in Canada, and it can only benefit from more empirical research. We have merely begun to scratch the surface.</span></p><span data-dcnode-id="689" instrument_node="">
</span></div><span data-dcnode-id="687" instrument_node="">
</span></div><span data-dcnode-id="685" instrument_node="">
</span><div class="tab-pane" data-dcnode-id="576" id="study-tab-2" role="tabpanel"><span data-dcnode-id="684" instrument_node="">

</span><span data-dcnode-id="681" instrument_node="">

</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">This study was financed by grants from the SecreÌtariat à la reÌforme des institutions deÌmocratiques, the Ministère du Conseil executive, the Government of Quebec and the Institute for Research on Public Policy. We would like to thank, in particular, the office of Quebec’s Directeur geÌneÌral des elections, without whose cooperation and many hours of effort the project could not have been carried out. We also wish to thank the Canada Research Chair in Electoral Studies at the UniversiteÌ de MontreÌal and various members of the faculty and staff of Vanier College and for their support and cooperation. We are grateful to the Vanier College administration for making this project possible; in particular, we thank Nora Boyadjin for her competent handling of the written questionnaires, consent forms and money distribution. Peter Loewen thanks the Social Sciences and Humanities Research Council of Canada for funding in the form of a Canada Graduate Scholarship doctoral grant.</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">A recent study conducted in Britain, where voter turnout in the last two national elections was the lowest since 1918, found that young people were only half as likely to vote as seniors, and that participation among the first low-turnout generation fell from 70 percent in 1992, when they were in their twenties, to less than 40 percent now that they are in their thirties (Keaney and Rogers 2006).</span></li><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Despite these accommodations, getting oneself on the list is now harder due to the establishment of a permanent voters list and the requirement that voters be on the list prior to election day. Such hurdles also inflate participation figures, since these are calculated by comparing the number who voted with the number on the permanent voters list.</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Plato is quoted from “Gorgias.” Yet, regardless of this measure, voter participation in ancient Athens did not exceed 25 percent. As Mavrogordatos observes, a “significant number of citizens were simply not interested in attending Assembly meetings” (2003, 8).</span></li><span data-dcnode-id="666" instrument_node="">
</span><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">We have no data on how many (if any) of these situations have arisen; imprisonment would be for failure to pay a fine or contempt of court, not for failure to vote per se.</span></li><span data-dcnode-id="663" instrument_node="">
</span><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Hansard House of Commons Debates, vol. CXLII, 4th sess., 13th Parliament, 1920.</span></li><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">This seems to have been the main motivation behind the introduction of compulsory voting in Greece (Malkopoulou 2007).</span></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">The other three criteria were having interests at stake, conforming to the norms of responsible citizenship and being impartial. Impartiality has resulted in election officers and representatives of the other branches of government being prevented from voting (such as judges and the Governor General), and the other criteria have variously prevented men without property, Aboriginal persons, women, children, the mentally ill and prisoners from voting.</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Kingsley was quoted in the National Post (December 19, 2000); Steckle and Stoffer were quoted in the Montreal Gazette (December 20, 2000); and White was quoted in the Edmonton Journal (December 19, 2000).</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Coincidentally, it was in the Australian Senate that compulsory voter legislation was initiated at the federal level through a Senator’s private member’s bill introduced by (Nationalist) Senator Herbert Payne in 1924, though it had already been in place in the Australian state of Queensland as of 1915 (Bennett 2005; Hicks 2002).</span></li><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Debates of the Senate (Hansard), vol. 142, 1st sess., 38th Parliament, 1995, 1425.</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Ibid., 1288.</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Ibid., 674.</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">According to an IRPP study of 2000, 73&nbsp;percent of Canadians are opposed to the idea of compulsory voting, though public opinion in Australia showed similar opposition prior to the adoption of that measure; since its adoption, Australians have remained supportive of compulsory voting — between 56 and 73 percent are in favour (Hicks 2002). Because public opposition was anticipated, this change was made through a Senator’s private member’s bill. While the NationalistCountry government of the time saw a need for the legislation, it was happy not to have direct responsibility; it ensured that the legislation passed quickly, “like a thief in the night,” so that it was in place for the 1925 election. It resulted in an increase of 32 percentage points over the previous election’s turnout and gained public approval (Bennett 2005, 4).</span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Canada was one of the first countries to offer tax credits for political party donations on the grounds that it would encourage citizens to get involved in the electoral process. Canada also moved early to legislate time off work with pay to make voting easier for working Canadians (the legislation has been regularly readjusted, usually with the goal of making it fairer for lower-income Canadians to participate).</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">In fact, the reason some governments find compulsory voting compelling is that low voter turnout in a representative democracy undermines a government’s legitimacy by weakening its mandate to enact its party’s platform.</span></li><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">The DGE stipulated that all the participants had to be paid, because otherwise it would be tantamount to paying people to vote.</span></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Access was facilitated by the fact that the first author is a former professor in this faculty.</span></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">This included questions such as “Do you play sports on campus?” “Do you own a cell phone?” and “Do you plan to go on to university”?</span></li><span data-dcnode-id="621" instrument_node="">
</span><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Vanier College has two campuses located at close proximity. To ensure maximum ease of participation, we gave students a choice of room on either campus and arranged for the appointment time to coincide with the weekly universal break, when no classes are supposed to be scheduled.</span></li><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The attrition rate between the first and second surveys was slightly higher among those in the treatment condition than those in the control condition (32.9 percent and 34.7 percent, respectively). We excluded participants whom the DGE could not find on a voters list.</span></li><span data-dcnode-id="615" instrument_node="">
</span><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">While a subject group of 121 is certainly smaller than those used in most conventional randomly sampled surveys, it is at the high end of sample sizes used in many psychology experiments. Moreover, it is large enough for us to run both difference of mean tests and regression with an expectation of adequate statistical power.</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Of the treatment group, we know that 52 voted and 3 did not. We also assume that 10 did not vote, since they failed to fill out the paper consent forms when told that they would not be paid without having done so — though it is possible that some of them did vote. In the case of 8 participants, it was not possible, for technical reasons, to ascertain whether or not they had voted. We excluded them from the analysis altogether.</span></li><span data-dcnode-id="609" instrument_node="">
</span><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">We have also tested the hypotheses using the differences in knowledge, news consumption and discussion scores between the first and second rounds. Our results do not change substantively.</span></li><span data-dcnode-id="606" instrument_node="">
</span><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">We asked subjects how many days a week they consumed news across four different media: television, the Internet, newspapers and radio.</span></li><span data-dcnode-id="603" instrument_node="">
</span><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">This regression does not include those in the treatment group whom we have identified as nonvoters; but, it does&nbsp;include nonvoters in the control group. The reason for the exclusion is that we wanted to isolate effects among those for whom the experiment worked (that is, those who voted) and then compare them with what our “electorate” would look like without compulsory voting (that is, an electorate that included voters and nonvoters).</span></li><span data-dcnode-id="600" instrument_node="">
</span><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">The treatment effect for those who intended to vote and did vote is captured by the addition of the treatment coefficient and the treatment * expvoter interaction coefficient. Finally, the effect of expecting to vote in the first place is captured by “expected to vote.”</span></li><span data-dcnode-id="597" instrument_node="">
</span><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">If, however, we were undertaking a conventional observational study, we could not assume that these attributes are balanced between control and treatment, and we would have to control for them.</span></li><span data-dcnode-id="594" instrument_node="">
</span><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">See also Gallego Dobon and Rico (2007) and Ackaert, Dumont and de Winter (2007). However, Selb and Lachat argue that the votes of poorer, less-educated citizens do not guarantee electoral outcomes in their own interest, since their votes tend to be uninformed and inconsistent (2007).</span></li><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">We should not be surprised at this, given that more than half the questions were specifically about Quebec politics, which francophones are more likely to follow. It is also possible that there is a certain self-selection among young francophones who choose to go to Englishlanguage junior colleges.</span></li><span data-dcnode-id="588" instrument_node="">
</span><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Even with the attrition in our second round, our groups remained balanced by gender (χ2 = 2.72, p = 0.10), language (χ2 = 0.46, p = 0.79) and Internet usage (χ2 = 9.40, p = 0.15).</span></li><span data-dcnode-id="585" instrument_node="">

</span><h2 data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Appendix 1: Randomization</span></h2><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">The randomization of participants proceeded in three steps. First, we identified all subjects (119) who indicated on the initial recruitment form that they did not expect to vote or were unsure whether they would vote. Using a random number generator, we assigned each of these subjects a number and then ranked them according to this number. The top half were assigned to the treatment condition and the bottom half to the control condition. Second, we assigned a random number to all potential participants who indicated that they were likely to vote. We selected the top 86 of these participants. The top half of the selected group was assigned to the treatment condition and the bottom half to the control condition. Third, to expand our sample using an on-line survey, we invited the remaining 255 eligible participants to take part in the study. We assigned subjects to treatment and control prior to contact using the method of random number assignment and then ranking them as we have described. However, in this instance, 70 percent were assigned to treatment (where attrition could be expected to be high) and the remaining 30 percent to control.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">We have checked our randomization procedure across several key variables, and, for the most part, we found no significant differences between conditions in the first round, suggesting that our randomization worked. In each test of balance, χ2 indicates the score of a chi-square test of the relationship between treatment and another variable. The p-score indicates the probability that the relationship observed is due to chance. Lower χ2 and higher p-scores indicate that the relationship is due to chance and that treatment is thus uncorrelated with that variable. Our treatment was balanced according to gender (χ2 = 0.82, p = 0.37), with female participants making up 73 percent of the treatment group and 67 percent of the control group. (Women students are considerably overrepresented in the pre-university social science program; and, as noted, attrition was lower among the female students.) Internet usage was also insignificantly related to treatment assignment (χ2 = 5.84, p = 0.44). Most importantly, there was no difference in the average knowledge scores in the first wave of the survey between the two groups (χ2 = 7.06, p = 0.63). The same is true for political discussion and media news consumption. Both the control and the treatment groups showed remarkably low levels of knowledge about Quebec politics, with more than half of the respondents in each group getting 3 or fewer questions out of 11 correct. There is also no difference in knowledge when we control for the likelihood of voting. There is, however, a language difference: those who speak French at home as their first language know significantly more about politics than those who do not.30 We should note, however, that language is unrelated to randomization.</span></p><span data-dcnode-id="334" instrument_node="">
</span><div class="column" data-dcnode-id="305"><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">We did encounter one possible problem with our randomization: considering all the students whom we invited to participate, those assigned to the control group chose to participate in larger numbers (66 percent) than those in the treatment group (54 percent). This is a significant difference (χ2 = 6.50, p = 0.03), and it raises the possibility of a difference between those who were assigned to the treatment condition and then chose to participate, and those in the control condition who chose to participate. Because the treatment condition requires more effort than the control condition (that is, voting), those who chose to participate under the treatment regime may be more motivated in general. Their general level of motivation may also make them more likely to seek out political information. If these groups are unbalanced, any growth found in political knowledge in the treatment group could be attributed to its members’ general level of motivation (which could differ from that of the control group members) rather than to the incentive to learn created by mandatory voting. Nevertheless, other factors led us to lay aside this concern.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">In our first round of invitations — we asked potential participants to gather in a room but did not tell them the details of the experiment — we had 31 participants in the control condition and 22 in the treatment condition. No participant who showed up declined to fill out the survey. Despite the fact that participants were randomly assigned, about 50 percent more participants in the control condition showed up than participants in the treatment condition. But, as this was due to chance, there is no unobserved effect among our first set of participants. When we parse out these participants from our larger pool, the possible motivation effect disappears, and the difference between the two groups is no longer significant in terms of likelihood of participating in the experiment. Taken together, all of these tests suggest that our randomization procedure did not lead to any unobserved differences between the groups, which could also be expected to affect knowledge acquisition. As a result, we are confident that any experimental (non-)effects will be the result of our treatment — that is, compulsory voting.31</span></p><span data-dcnode-id="327" instrument_node="">
</span><h2 data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Appendix 2: The Second Questionnaire</span></h2><span data-dcnode-id="324" instrument_node="">

</span><p data-dcnode-id="307"><img alt="Appendix 10" class="left" data-dcnode-id="308" height="253" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irpp.org/wp-content/uploads/sites/2/assets/Uploads/Appendix-10.png&amp;raw" title="" width="506"></p><span data-dcnode-id="306" instrument_node="">

</span><div class="tab-pane" data-dcnode-id="262" id="study-tab-5" role="tabpanel"><span data-dcnode-id="297" instrument_node="">

</span><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">For immediate distribution – November 27, 2007</span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="287"><strong data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Montreal</span></strong><span data-dcnode-id="288" instrument_node=""> – Though penalizing those who do not vote will increase turnout, Canada must develop a more innovative approach to engaging its citizens, particularly the youth. Apathy in politics is becoming a significant problem in Canada. The percentage turnout in federal elections has been declining since the 1980s and has now reached the low sixties. It is even lower among youth, among whom the proportion voting recently hit a low of 38 percent. This has led to calls for compulsory voting, which some view as having the added benefit of increasing political knowledge. However, as the IRPP study being released today argues, you can make voters go to the polls, but doing so is not likely to breed better informed or more engaged citizens.</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">In this study authors Henry Milner, Peter John Loewen and Bruce M. Hicks (all of Université de Montréal) test whether compulsory voting increases political knowledge in a unique experiment involving college students who were eligible to vote in the 2007 Quebec election. They asked two groups of students to complete two surveys (the first before the election and the second after the election). One group, however, was told they would only receive their remuneration if they voted. The latter was the test group for compulsory voting, as that system sometimes includes a financial incentive to vote. The idea was to verify three hypotheses: Would those who had a financial incentive to vote 1) learn more about politics in general; 2) discuss politics more frequently, and 3) follow the news more assiduously; than those who did not have the financial incentive. The authors found no difference in the behaviour or political knowledge of the two groups.</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">The findings of this study should give pause to those who view compulsory voting as a panacea for the declining levels of civic engagement and political knowledge. However, Milner, Loewen and Hicks point out their analysis is not a case against compulsory voting.</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Clearly there is strong evidence to support the fact that compulsory voting leads to higher turnout. The question is, how informed is the citizen who is compelled to vote? The authors’ negative findings on this question “place the ball in the court of the advocates of compulsory voting.”</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">“The Paradox of Compulsory Voting: Participation Does Not Equal Political Knowledge,” by Henry Milner, Peter John Loewen and Bruce M. Hicks, can be downloaded free of charge from www.irpp.org</span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272" style="text-align: center;"><span data-dcnode-id="273" instrument_node="">-30-</span></p><span data-dcnode-id="271" instrument_node="">
