CINCEL is Metafirma-as-a-Service, the suite of multi-signature, notarization, blockchain and identity. It provides agility, trust and compliance in the agreements of people and businesses.
CINCEL is the only solution in LATAM that offers an end-to-end suite tailored to each business. Multi-signature: Ability to sign with a simple signature (autograph), advanced from the SAT (e.firma / FIEL), certified by the Judicial Power of the Federation (FIREL), voice and image signature. Legal compliance: Our smart certified documents have legal validity according to NOM-151 and are compatible with international standards (ISO/IEC + ETSI TS). Integrations and automation: Through Zapier (with +4,000 Apps) or through the API.Biometrics with Artificial Intelligence: Ability to request proof of life from signers (ID Verification + Identity Verification). Blockchain notarization: Time-stamped certificates on the public Bitcoin and Ethereum blockchains.

</span><div class="description" data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">
Meter is a high performance infrastructure that allows smart contracts to scale and travel seamlessly through heterogeneous blockchain networks. Your favorite Ethereum dApps don't have to be costly to be fast and highly decentralized. Financial assets should flow freely among blockchains. Meter’s HotStuff-based consensus allows 1000s of validator nodes, making Meter the most decentralized Layer 2 for Ethereum. Meter processes thousands of transactions per second and transactions are confirmed almost instantly. Meter Passport allows assets and smart contracts travel and communicate across heterogeneous blockchains for the best price, liquidity and yield. Meter is an Ethereum Compatible with unique enhancements. Unlike other Layer 2, DEXes build on Meter are front running/MEV resistant, fast and uncensorable. The Meter system consists of two tokens: MTRG, the governance token (eMTRG is the ERC20 version), and MTR, the low-volatility currency token.

Since 2019, the mission of GetBlock is to ensure cost-effective tools and infrastructure that will help enterprises and individual developers to build high-quality blockchain applications faster. The service allows you to request on-chain information from a node without the need to set up one manually.

S3-Compatible Object Storage powered by Web3. Build Web3 with Web3 by storing data across any of our supported networks, including IPFS, Sia, Skynet, and Storj. Filebase acts as an easy on-ramp for users to upload data to highly secure and geo-redundant blockchain networks without having to manage contracts, service level agreements, or cryptocurrency. On Filebase, all files that are pinned onto IPFS are actually being stored on the Sia network. This creates an environment where the data storage layer for Filebase IPFS nodes is highly available, and most importantly, geo-redundant. Get started today with our 5GB free tier with no limitations. We don't charge for egress or API requests, so there's no need to worry about costly overages. Filebase does not have any minimum object size requirements or data retention policies. Our API functions as a drop-in replacement for existing applications and tools that use AWS S3, making the transition to Filebase seamless.

</span><div class="description" data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">
Bitcoin is an innovative payment network and a new kind of money. Bitcoin uses peer-to-peer technology to operate with no central authority or banks; managing transactions and the issuing of bitcoins is carried out collectively by the network. Bitcoin is open-source; its design is public, nobody owns or controls Bitcoin and everyone can take part. Through many of its unique properties, Bitcoin allows exciting uses that could not be covered by any previous payment system. Bitcoin transactions are secured by mathematics and energy. Cryptographic signatures prevent other people from spending your money. Energy spent by proof of work (PoW) prevents other people from undoing, rearranging or losing your transactions. So long as you take the required steps to protect your wallet, Bitcoin can give you control over your money and a strong level of protection against many types of fraud.
