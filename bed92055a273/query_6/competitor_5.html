eft" data-dcnode-id="7370"><a class="workspace-trigger" data-dcnode-id="7372" href="#enun_H10" name="benun_H10"><span data-dcnode-id="7373" instrument_node="">H10</span></a><span data-dcnode-id="7371" instrument_node=""> is supported</span></td></tr><tr class="valign-top" data-dcnode-id="7358"><td class="align-left" data-dcnode-id="7367"><span data-dcnode-id="7368" instrument_node="">CM&nbsp;×&nbsp;PQ</span></td><td data-dcnode-id="7366"></td><td data-dcnode-id="7365"></td><td class="align-left" data-dcnode-id="7363"><span data-dcnode-id="7364" instrument_node="">0.236*</span></td><td class="align-left" data-dcnode-id="7359"><a class="workspace-trigger" data-dcnode-id="7361" href="#enun_H11" name="benun_H11"><span data-dcnode-id="7362" instrument_node="">H11</span></a><span data-dcnode-id="7360" instrument_node=""> is supported</span></td></tr><tr class="valign-top" data-dcnode-id="7343"><td class="align-left" data-dcnode-id="7351"><span data-dcnode-id="7357" instrument_node="">R</span><sup data-dcnode-id="7355"><span data-dcnode-id="7356" instrument_node="">2</span></sup><span data-dcnode-id="7354" instrument_node=""> </span><sub data-dcnode-id="7352"><span data-dcnode-id="7353" instrument_node="">within-class</span></sub></td><td class="align-left" data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">0.208</span></td><td class="align-left" data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">0.207</span></td><td class="align-left" data-dcnode-id="7345"><span data-dcnode-id="7346" instrument_node="">0.207</span></td><td data-dcnode-id="7344"></td></tr><tr class="valign-top" data-dcnode-id="7328"><td class="align-left" data-dcnode-id="7336"><span data-dcnode-id="7342" instrument_node="">R</span><sup data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">2</span></sup><span data-dcnode-id="7339" instrument_node=""> </span><sub data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">between-class</span></sub></td><td class="align-left" data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">0.023</span></td><td class="align-left" data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">0.010</span></td><td class="align-left" data-dcnode-id="7330"><span data-dcnode-id="7331" instrument_node="">0.010</span></td><td data-dcnode-id="7329"></td></tr><tr class="valign-top" data-dcnode-id="7318"><td class="align-left" data-dcnode-id="7326"><span data-dcnode-id="7327" instrument_node="">Deviance</span></td><td class="align-left" data-dcnode-id="7324"><span data-dcnode-id="7325" instrument_node="">1411.771</span></td><td class="align-left" data-dcnode-id="7322"><span data-dcnode-id="7323" instrument_node="">1404.096</span></td><td class="align-left" data-dcnode-id="7320"><span data-dcnode-id="7321" instrument_node="">1410.649</span></td><td data-dcnode-id="7319"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="7294"></p><p data-dcnode-id="7295" id="tspara0060"><span data-dcnode-id="7314" instrument_node="">Notes: *</span><em data-dcnode-id="7312"><span data-dcnode-id="7313" instrument_node="">p</span></em><span data-dcnode-id="7311" instrument_node="">&nbsp;&lt;&nbsp;0.05, **</span><em data-dcnode-id="7309"><span data-dcnode-id="7310" instrument_node="">p</span></em><span data-dcnode-id="7308" instrument_node="">&nbsp;&lt;&nbsp;0.01, ***</span><em data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">p</span></em><span data-dcnode-id="7305" instrument_node="">&nbsp;&lt;&nbsp;0.001; Level 1&nbsp;</span><em data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">N</span></em><span data-dcnode-id="7302" instrument_node="">&nbsp;=&nbsp;1002. Level 2&nbsp;</span><em data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">N</span></em><span data-dcnode-id="7299" instrument_node="">&nbsp;=&nbsp;30. Estimations of the random variance components are in parentheses. R</span><sup data-dcnode-id="7297"><span data-dcnode-id="7298" instrument_node="">2</span></sup><span data-dcnode-id="7296" instrument_node=""> means the proportion of variance explained for each model.</span></p><p></p></div></div><p data-dcnode-id="7281" id="p0280"><span data-dcnode-id="7291" instrument_node="">Model 1 shows that there is evidence of a direct effect of autonomous motivation on behavioral engagement (γ&nbsp;=&nbsp;0.156, </span><em data-dcnode-id="7289"><span data-dcnode-id="7290" instrument_node="">t</span></em><span data-dcnode-id="7288" instrument_node="">&nbsp;=&nbsp;5.982, </span><em data-dcnode-id="7286"><span data-dcnode-id="7287" instrument_node="">p</span></em><span data-dcnode-id="7285" instrument_node="">&nbsp;&lt;&nbsp;0.001), as expected. Thus, </span><a class="workspace-trigger" data-dcnode-id="7283" href="#enun_H2" name="benun_H2"><span data-dcnode-id="7284" instrument_node="">H2</span></a><span data-dcnode-id="7282" instrument_node=""> was supported. A student stated, “The flipped approach allows me to take more responsibility for my learning and motivates me more to accept more challenges.”</span></p><p data-dcnode-id="7270" id="p0285"><span data-dcnode-id="7280" instrument_node="">Model 1 also shows that controlled motivation is negatively and statistically significantly related to behavioral engagement (γ&nbsp;=&nbsp;−0.064, </span><em data-dcnode-id="7278"><span data-dcnode-id="7279" instrument_node="">t</span></em><span data-dcnode-id="7277" instrument_node="">&nbsp;=&nbsp;−2.741, </span><em data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">p</span></em><span data-dcnode-id="7274" instrument_node="">&nbsp;=&nbsp;0.011); thus, </span><a class="workspace-trigger" data-dcnode-id="7272" href="#enun_H3" name="benun_H3"><span data-dcnode-id="7273" instrument_node="">H3</span></a><span data-dcnode-id="7271" instrument_node=""> was supported. A student said, “Team peers pressured me to find extra information, but what I often found was not what they wanted. That was frustrating.”</span></p><div data-dcnode-id="7192"><p data-dcnode-id="7220" id="p0290"><span data-dcnode-id="7269" instrument_node="">Model 1 shows a statistically significant relationship between the interaction term (Autonomous Motivation&nbsp;×&nbsp;Perceived Self-efficacy) and behavioral engagement (</span><em data-dcnode-id="7267"><span data-dcnode-id="7268" instrument_node="">γ</span></em><span data-dcnode-id="7266" instrument_node="">&nbsp;=&nbsp;0.046, </span><em data-dcnode-id="7264"><span data-dcnode-id="7265" instrument_node="">t</span></em><span data-dcnode-id="7263" instrument_node="">&nbsp;=&nbsp;3.430, </span><em data-dcnode-id="7261"><span data-dcnode-id="7262" instrument_node="">p</span></em><span data-dcnode-id="7260" instrument_node="">&nbsp;=&nbsp;0.002). Running </span><a class="workspace-trigger" data-dcnode-id="7258" href="#bib73" name="bbib73"><span data-dcnode-id="7259" instrument_node="">Preacher, Curran, and Bauer’s (2006)</span></a><span data-dcnode-id="7257" instrument_node=""> HLM two-way interaction tool, we entered specific values of (centered) perceived self-efficacy to assess the effect of autonomous motivation on behavioral engagement at specific conditional values of perceived self-efficacy, in this case, at the mean and at 1 SD above and below the mean (i.e., where centered perceived self-efficacy&nbsp;=&nbsp;−0.889, 0, and +0.889). </span><a class="workspace-trigger" data-dcnode-id="7255" href="#fig3" name="bfig3"><span data-dcnode-id="7256" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7254" instrument_node=""> shows that the simple slope is 0.112&nbsp;at −1 SD (</span><em data-dcnode-id="7252"><span data-dcnode-id="7253" instrument_node="">t</span></em><span data-dcnode-id="7251" instrument_node="">&nbsp;=&nbsp;4.463, </span><em data-dcnode-id="7249"><span data-dcnode-id="7250" instrument_node="">p</span></em><span data-dcnode-id="7248" instrument_node="">&nbsp;&lt;&nbsp;0.001), 0.151&nbsp;at the mean (</span><em data-dcnode-id="7246"><span data-dcnode-id="7247" instrument_node="">t</span></em><span data-dcnode-id="7245" instrument_node="">&nbsp;=&nbsp;5.830, </span><em data-dcnode-id="7243"><span data-dcnode-id="7244" instrument_node="">p</span></em><span data-dcnode-id="7242" instrument_node="">&nbsp;&lt;&nbsp;0.001), and 0.190&nbsp;at +1 SD (</span><em data-dcnode-id="7240"><span data-dcnode-id="7241" instrument_node="">t</span></em><span data-dcnode-id="7239" instrument_node="">&nbsp;=&nbsp;5.893, </span><em data-dcnode-id="7237"><span data-dcnode-id="7238" instrument_node="">p</span></em><span data-dcnode-id="7236" instrument_node="">&nbsp;&lt;&nbsp;0.001), indicating that more positive slopes correspond to high perceived self-efficacy; thus, </span><a class="workspace-trigger" data-dcnode-id="7234" href="#enun_H4" name="benun_H4"><span data-dcnode-id="7235" instrument_node="">H4</span></a><span data-dcnode-id="7233" instrument_node=""> was supported. Model 1 shows that the interaction term (Controlled Motivation&nbsp;×&nbsp;Perceived Self-efficacy) is not statistically significantly negatively related to behavioral engagement (</span><em data-dcnode-id="7231"><span data-dcnode-id="7232" instrument_node="">γ</span></em><span data-dcnode-id="7230" instrument_node="">&nbsp;=&nbsp;−0.009, </span><em data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">t</span></em><span data-dcnode-id="7227" instrument_node="">&nbsp;=&nbsp;−0.768, </span><em data-dcnode-id="7225"><span data-dcnode-id="7226" instrument_node="">p</span></em><span data-dcnode-id="7224" instrument_node="">&nbsp;=&nbsp;0.449); thus, </span><a class="workspace-trigger" data-dcnode-id="7222" href="#enun_H5" name="benun_H5"><span data-dcnode-id="7223" instrument_node="">H5</span></a><span data-dcnode-id="7221" instrument_node=""> was not supported.</span></p><figure class="figure text-xs" data-dcnode-id="7193" id="fig3"><span data-dcnode-id="7204"><img alt="Fig. 3" aria-describedby="cap0020" data-dcnode-id="7219" height="262" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr3.jpg&amp;raw"><span data-dcnode-id="7218" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7205"><li data-dcnode-id="7212"><a class="anchor download-link u-font-sans" data-dcnode-id="7213" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr3_lrg.jpg" target="_blank" title="Download high-res image (361KB)"><span class="anchor-text" data-dcnode-id="7214"><span data-dcnode-id="7217" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7215"><span data-dcnode-id="7216" instrument_node="">Download high-res image (361KB)</span></span></span></a></li><li data-dcnode-id="7206"><a class="anchor download-link u-font-sans" data-dcnode-id="7207" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7208"><span data-dcnode-id="7211" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7209"><span data-dcnode-id="7210" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7194"><span data-dcnode-id="7195" id="cap0020"><p data-dcnode-id="7196" id="fspara0020"><span class="label" data-dcnode-id="7202"><span data-dcnode-id="7203" instrument_node="">Fig. 3</span></span><span data-dcnode-id="7201" instrument_node="">. </span><span data-dcnode-id="7200" instrument_node="">Interaction between autonomous motivation and perceived self-efficacy (</span><a class="workspace-trigger" data-dcnode-id="7198" href="#enun_H4" name="benun_H4"><span data-dcnode-id="7199" instrument_node="">H4</span></a><span data-dcnode-id="7197" instrument_node="">).</span></p></span></span></figure></div></section><section data-dcnode-id="7155" id="sec5.2.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7187" id="sectitle0130"><span data-dcnode-id="7190" instrument_node="">5.2.3</span><span data-dcnode-id="7189" instrument_node="">. </span><span data-dcnode-id="7188" instrument_node="">Class-level results (model 2)</span></h4><p data-dcnode-id="7170" id="p0295"><span data-dcnode-id="7186" instrument_node="">Model 2 in </span><a class="workspace-trigger" data-dcnode-id="7184" href="#tbl3" name="btbl3"><span data-dcnode-id="7185" instrument_node="">Table 3</span></a><span data-dcnode-id="7183" instrument_node=""> demonstrates a statistically significant relationship between perceived teaching quality and behavioral engagement (</span><em data-dcnode-id="7181"><span data-dcnode-id="7182" instrument_node="">γ</span></em><span data-dcnode-id="7180" instrument_node="">&nbsp;=&nbsp;0.203, </span><em data-dcnode-id="7178"><span data-dcnode-id="7179" instrument_node="">t</span></em><span data-dcnode-id="7177" instrument_node="">&nbsp;=&nbsp;3.202, </span><em data-dcnode-id="7175"><span data-dcnode-id="7176" instrument_node="">p</span></em><span data-dcnode-id="7174" instrument_node="">&nbsp;=&nbsp;0.004). </span><a class="workspace-trigger" data-dcnode-id="7172" href="#enun_H6" name="benun_H6"><span data-dcnode-id="7173" instrument_node="">H6</span></a><span data-dcnode-id="7171" instrument_node=""> was supported. The interviews provided further support for causal relationships. A student stated, “I agree that the teacher is working hard to change different activities, but I think that a modern teacher should take the class this way.” Another student said, “The course activities planned by the teacher are very special, often by group and competitions, and this allows me to be more involved in the classroom activities.”</span></p><p data-dcnode-id="7156" id="p0300"><span data-dcnode-id="7169" instrument_node="">However, a non-statistically significant relationship between perceived platform quality and behavioral engagement was found (</span><em data-dcnode-id="7167"><span data-dcnode-id="7168" instrument_node="">γ</span></em><span data-dcnode-id="7166" instrument_node="">&nbsp;=&nbsp;0.024, </span><em data-dcnode-id="7164"><span data-dcnode-id="7165" instrument_node="">t</span></em><span data-dcnode-id="7163" instrument_node="">&nbsp;=&nbsp;0.320, </span><em data-dcnode-id="7161"><span data-dcnode-id="7162" instrument_node="">p</span></em><span data-dcnode-id="7160" instrument_node="">&nbsp;=&nbsp;0.751); thus, </span><a class="workspace-trigger" data-dcnode-id="7158" href="#enun_H7" name="benun_H7"><span data-dcnode-id="7159" instrument_node="">H7</span></a><span data-dcnode-id="7157" instrument_node=""> was not supported. A student stated, “Teachers use Google Cloud and YouTube to post videos. These platforms are very stable, and whether I like them or not, I must watch them.”</span></p></section><section data-dcnode-id="6985" id="sec5.2.4"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7151" id="sectitle0135"><span data-dcnode-id="7154" instrument_node="">5.2.4</span><span data-dcnode-id="7153" instrument_node="">. </span><span data-dcnode-id="7152" instrument_node="">Cross-level interactions (model 3)</span></h4><p data-dcnode-id="7122" id="p0305"><span data-dcnode-id="7150" instrument_node="">Model 3 in </span><a class="workspace-trigger" data-dcnode-id="7148" href="#tbl3" name="btbl3"><span data-dcnode-id="7149" instrument_node="">Table 3</span></a><span data-dcnode-id="7147" instrument_node=""> shows that the interaction terms (autonomous motivation and perceived teaching quality) and behavioral engagement were not statistically significant (</span><em data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node="">γ</span></em><span data-dcnode-id="7144" instrument_node="">&nbsp;=&nbsp;−0.096, </span><em data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">t</span></em><span data-dcnode-id="7141" instrument_node="">&nbsp;=&nbsp;−1.040, </span><em data-dcnode-id="7139"><span data-dcnode-id="7140" instrument_node="">p</span></em><span data-dcnode-id="7138" instrument_node="">&nbsp;=&nbsp;0.308). Moreover, the interaction terms (controlled motivation and perceived teaching quality) and behavioral engagement were not statistically significant (</span><em data-dcnode-id="7136"><span data-dcnode-id="7137" instrument_node="">γ</span></em><span data-dcnode-id="7135" instrument_node="">&nbsp;=&nbsp;−0.116, </span><em data-dcnode-id="7133"><span data-dcnode-id="7134" instrument_node="">t</span></em><span data-dcnode-id="7132" instrument_node="">&nbsp;=&nbsp;−1.951, </span><em data-dcnode-id="7130"><span data-dcnode-id="7131" instrument_node="">p</span></em><span data-dcnode-id="7129" instrument_node="">&nbsp;=&nbsp;0.061). Thus, </span><a class="workspace-trigger" data-dcnode-id="7127" href="#enun_H8" name="benun_H8"><span data-dcnode-id="7128" instrument_node="">H8</span></a><span data-dcnode-id="7126" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="7124" href="#enun_H9" name="benun_H9"><span data-dcnode-id="7125" instrument_node="">H9</span></a><span data-dcnode-id="7123" instrument_node=""> were not supported.</span></p><div data-dcnode-id="7057"><p data-dcnode-id="7085" id="p0310"><a class="workspace-trigger" data-dcnode-id="7120" href="#enun_H10" name="benun_H10"><span data-dcnode-id="7121" instrument_node="">Hypothesis 10</span></a><span data-dcnode-id="7119" instrument_node=""> predicted that perceived platform quality moderates the positive relationship between autonomous motivation and behavioral engagement in which the positive relationship becomes more strongly positive when students’ perceived platform quality is high. Model 3 shows that the interaction term and behavioral engagement were statistically significant (γ&nbsp;=&nbsp;0.156, </span><em data-dcnode-id="7117"><span data-dcnode-id="7118" instrument_node="">t&nbsp;=</span></em><span data-dcnode-id="7116" instrument_node="">&nbsp;2.328, </span><em data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">p&nbsp;=</span></em><span data-dcnode-id="7113" instrument_node="">&nbsp;0.028). Using </span><a class="workspace-trigger" data-dcnode-id="7111" href="#bib73" name="bbib73"><span data-dcnode-id="7112" instrument_node="">Preacher et al.’s (2006)</span></a><span data-dcnode-id="7110" instrument_node=""> HLM two-way interaction tool, we entered specific values of (centered) perceived platform quality to assess the effect of autonomous motivation on behavioral engagement at specific conditional values of perceived platform quality, in this case, at the mean and at 1 SD above and below the mean (i.e., where centered perceived platform quality&nbsp;=&nbsp;−0.330, 0, and +0.330). </span><a class="workspace-trigger" data-dcnode-id="7108" href="#fig4" name="bfig4"><span data-dcnode-id="7109" instrument_node="">Fig. 4</span></a><span data-dcnode-id="7107" instrument_node=""> shows that the simple slope is 0.099&nbsp;at −1 SD (</span><em data-dcnode-id="7105"><span data-dcnode-id="7106" instrument_node="">t&nbsp;=</span></em><span data-dcnode-id="7104" instrument_node="">&nbsp;2.667, </span><em data-dcnode-id="7102"><span data-dcnode-id="7103" instrument_node="">p&nbsp;=</span></em><span data-dcnode-id="7101" instrument_node="">&nbsp;0.013), 0.151&nbsp;at the mean (</span><em data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">t&nbsp;=</span></em><span data-dcnode-id="7098" instrument_node="">&nbsp;5.830, </span><em data-dcnode-id="7096"><span data-dcnode-id="7097" instrument_node="">p&nbsp;&lt;</span></em><span data-dcnode-id="7095" instrument_node="">&nbsp;0.001), and 0.203&nbsp;at +1 SD (</span><em data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">t&nbsp;=</span></em><span data-dcnode-id="7092" instrument_node="">&nbsp;6.638, </span><em data-dcnode-id="7090"><span data-dcnode-id="7091" instrument_node="">p&nbsp;&lt;</span></em><span data-dcnode-id="7089" instrument_node="">&nbsp;0.001), indicating that more positive slopes correspond to high perceived platform quality. Therefore, </span><a class="workspace-trigger" data-dcnode-id="7087" href="#enun_H10" name="benun_H10"><span data-dcnode-id="7088" instrument_node="">H10</span></a><span data-dcnode-id="7086" instrument_node=""> was supported. A student stated, “Initially, I was fully interested in going to the platform to preview courses, but after a while, I became bored. It was also unclear whether the teacher knew that I was the student who had previewed.”</span></p><figure class="figure text-xs" data-dcnode-id="7058" id="fig4"><span data-dcnode-id="7069"><img alt="Fig. 4" aria-describedby="cap0025" data-dcnode-id="7084" height="261" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr4.jpg&amp;raw"><span data-dcnode-id="7083" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7070"><li data-dcnode-id="7077"><a class="anchor download-link u-font-sans" data-dcnode-id="7078" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr4_lrg.jpg" target="_blank" title="Download high-res image (371KB)"><span class="anchor-text" data-dcnode-id="7079"><span data-dcnode-id="7082" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">Download high-res image (371KB)</span></span></span></a></li><li data-dcnode-id="7071"><a class="anchor download-link u-font-sans" data-dcnode-id="7072" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7073"><span data-dcnode-id="7076" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7074"><span data-dcnode-id="7075" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7059"><span data-dcnode-id="7060" id="cap0025"><p data-dcnode-id="7061" id="fspara0025"><span class="label" data-dcnode-id="7067"><span data-dcnode-id="7068" instrument_node="">Fig. 4</span></span><span data-dcnode-id="7066" instrument_node="">. </span><span data-dcnode-id="7065" instrument_node="">Interaction between autonomous motivation and perceived platform quality (</span><a class="workspace-trigger" data-dcnode-id="7063" href="#enun_H10" name="benun_H10"><span data-dcnode-id="7064" instrument_node="">H10</span></a><span data-dcnode-id="7062" instrument_node="">).</span></p></span></span></figure></div><div data-dcnode-id="6986"><p data-dcnode-id="7014" id="p0315"><a class="workspace-trigger" data-dcnode-id="7055" href="#enun_H11" name="benun_H11"><span data-dcnode-id="7056" instrument_node="">Hypothesis 11</span></a><span data-dcnode-id="7054" instrument_node=""> predicted that perceived platform quality moderates the negative relationship between controlled motivation and behavioral engagement in which the negative relationship becomes more strongly negative when students’ perceived platform quality is low. Model 3 shows that the interaction term and behavioral engagement were statistically significant (</span><em data-dcnode-id="7052"><span data-dcnode-id="7053" instrument_node="">γ&nbsp;=</span></em><span data-dcnode-id="7051" instrument_node="">&nbsp;0.236, </span><em data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">t&nbsp;=</span></em><span data-dcnode-id="7048" instrument_node="">&nbsp;2.511, </span><em data-dcnode-id="7046"><span data-dcnode-id="7047" instrument_node="">p&nbsp;=</span></em><span data-dcnode-id="7045" instrument_node="">&nbsp;0.019). Running </span><a class="workspace-trigger" data-dcnode-id="7043" href="#bib73" name="bbib73"><span data-dcnode-id="7044" instrument_node="">Preacher et al.’s (2006)</span></a><span data-dcnode-id="7042" instrument_node=""> HLM two-way interaction tool, we entered specific values of (centered) perceived platform quality to assess the effect of controlled motivation on behavioral engagement at specific conditional values of students’ perceived platform quality, in this case, at the mean and at 1 SD above and below the mean (i.e., where centered perceived platform quality&nbsp;=&nbsp;−0.330, 0, and +0.330). In </span><a class="workspace-trigger" data-dcnode-id="7040" href="#fig5" name="bfig5"><span data-dcnode-id="7041" instrument_node="">Fig. 5</span></a><span data-dcnode-id="7039" instrument_node="">, the simple slope is −0.143&nbsp;at −1 SD (</span><em data-dcnode-id="7037"><span data-dcnode-id="7038" instrument_node="">t&nbsp;=</span></em><span data-dcnode-id="7036" instrument_node="">&nbsp;−3.561, </span><em data-dcnode-id="7034"><span data-dcnode-id="7035" instrument_node="">p&nbsp;=</span></em><span data-dcnode-id="7033" instrument_node="">&nbsp;0.001), −0.065&nbsp;at the mean (</span><em data-dcnode-id="7031"><span data-dcnode-id="7032" instrument_node="">t&nbsp;=</span></em><span data-dcnode-id="7030" instrument_node="">&nbsp;3.286, </span><em data-dcnode-id="7028"><span data-dcnode-id="7029" instrument_node="">p&nbsp;=</span></em><span data-dcnode-id="7027" instrument_node="">&nbsp;0.003), and 0.012&nbsp;at +1 SD (</span><em data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">t&nbsp;=</span></em><span data-dcnode-id="7024" instrument_node="">&nbsp;0.374, </span><em data-dcnode-id="7022"><span data-dcnode-id="7023" instrument_node="">p&nbsp;=</span></em><span data-dcnode-id="7021" instrument_node="">&nbsp;0.712), indicating that more negative slopes correspond to low perceived platform quality. Therefore, </span><a class="workspace-trigger" data-dcnode-id="7019" href="#enun_H11" name="benun_H11"><span data-dcnode-id="7020" instrument_node="">H11</span></a><span data-dcnode-id="7018" instrument_node=""> was supported. A student said, “My teacher stipulated that we should go to the school platform to watch the video before class. I thought I would enter a game-based video platform, such as a cumulative collection of videos that could be converted into scores, but there was none. I was disappointed.” Another student stated, “In class, the platform is used for voting, but the platform often slows down due to multiple logins at the same time</span><em data-dcnode-id="7016"><span data-dcnode-id="7017" instrument_node="">.</span></em><span data-dcnode-id="7015" instrument_node="">”</span></p><figure class="figure text-xs" data-dcnode-id="6987" id="fig5"><span data-dcnode-id="6998"><img alt="Fig. 5" aria-describedby="cap0030" data-dcnode-id="7013" height="262" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr5.jpg&amp;raw"><span data-dcnode-id="7012" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6999"><li data-dcnode-id="7006"><a class="anchor download-link u-font-sans" data-dcnode-id="7007" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr5_lrg.jpg" target="_blank" title="Download high-res image (365KB)"><span class="anchor-text" data-dcnode-id="7008"><span data-dcnode-id="7011" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">Download high-res image (365KB)</span></span></span></a></li><li data-dcnode-id="7000"><a class="anchor download-link u-font-sans" data-dcnode-id="7001" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7002"><span data-dcnode-id="7005" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7003"><span data-dcnode-id="7004" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6988"><span data-dcnode-id="6989" id="cap0030"><p data-dcnode-id="6990" id="fspara0030"><span class="label" data-dcnode-id="6996"><span data-dcnode-id="6997" instrument_node="">Fig. 5</span></span><span data-dcnode-id="6995" instrument_node="">. </span><span data-dcnode-id="6994" instrument_node="">Interaction between controlled motivation and perceived platform quality (</span><a class="workspace-trigger" data-dcnode-id="6992" href="#enun_H11" name="benun_H11"><span data-dcnode-id="6993" instrument_node="">H11</span></a><span data-dcnode-id="6991" instrument_node="">).</span></p></span></span></figure></div></section></section><section data-dcnode-id="6821" id="sec5.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6980" id="sectitle0140"><span data-dcnode-id="6983" instrument_node="">5.3</span><span data-dcnode-id="6982" instrument_node="">. </span><span data-dcnode-id="6981" instrument_node="">Follow-up interviews</span></h3><p data-dcnode-id="6975" id="p0320"><span data-dcnode-id="6979" instrument_node="">It is important to identify obstacles that impede students’ behavioral engagement in flipped classrooms. Because flipped classrooms include different individuals working as a collective unit, </span><a class="workspace-trigger" data-dcnode-id="6977" href="#bib30" name="bbib30"><span data-dcnode-id="6978" instrument_node="">Engeström’s (1987)</span></a><span data-dcnode-id="6976" instrument_node=""> activity theory was chosen to study the problems faced by students in flipped classrooms. In the interviews, students were asked about contradictions (barriers or problems) that they encountered.</span></p><div data-dcnode-id="6927"><p data-dcnode-id="6952" id="p0325"><span data-dcnode-id="6974" instrument_node="">Semi-structured and face-to-face interviews were conducted with 12 students invited to discuss their flipped classroom practices. To understand the contradictions arising in students’ behavioral engagement, we asked interviewees to describe their pre-class activities, in-class activities, the platform used, interactions with teachers and peers, and problems in the flipped classroom approach. Based on the interviews, the activity system with the six components of the flipped classroom is shown in </span><a class="workspace-trigger" data-dcnode-id="6972" href="#fig6" name="bfig6"><span data-dcnode-id="6973" instrument_node="">Fig. 6</span></a><span data-dcnode-id="6971" instrument_node="">. We present the components of the given activity—tools, subject, object, rules, community, and division of labor. The </span><em data-dcnode-id="6969"><span data-dcnode-id="6970" instrument_node="">subject</span></em><span data-dcnode-id="6968" instrument_node=""> in the flipped classroom is the students. The </span><em data-dcnode-id="6966"><span data-dcnode-id="6967" instrument_node="">object</span></em><span data-dcnode-id="6965" instrument_node=""> of the activity system is the flipped classroom that caused the outcome—enhanced student behavioral engagement. The </span><em data-dcnode-id="6963"><span data-dcnode-id="6964" instrument_node="">rules</span></em><span data-dcnode-id="6962" instrument_node=""> in the flipped classroom comprise the grading policy for students, high-group pro-sharing norms, reward schemes for students, and enough time to complete assignments. The </span><em data-dcnode-id="6960"><span data-dcnode-id="6961" instrument_node="">tools</span></em><span data-dcnode-id="6959" instrument_node=""> in the flipped classroom include LMSs, interactive response systems (e.g., Kahoot, Mentimeter, and Seesaw), LINE group, YouTube, Wi-Fi, questionnaires, tasks, books, social media, etc. The </span><em data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">community</span></em><span data-dcnode-id="6956" instrument_node=""> is composed of the teachers, students, and parents. The </span><em data-dcnode-id="6954"><span data-dcnode-id="6955" instrument_node="">division of labor</span></em><span data-dcnode-id="6953" instrument_node=""> includes teachers’ assigned pre-class homework or video lectures, teacher-initiated in-class activities and discussions, and a clear division of group work tasks.</span></p><figure class="figure text-xs" data-dcnode-id="6928" id="fig6"><span data-dcnode-id="6936"><img alt="Fig. 6" aria-describedby="cap0035" data-dcnode-id="6951" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr6.jpg&amp;raw"><span data-dcnode-id="6950" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6937"><li data-dcnode-id="6944"><a class="anchor download-link u-font-sans" data-dcnode-id="6945" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr6_lrg.jpg" target="_blank" title="Download high-res image (647KB)"><span class="anchor-text" data-dcnode-id="6946"><span data-dcnode-id="6949" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6947"><span data-dcnode-id="6948" instrument_node="">Download high-res image (647KB)</span></span></span></a></li><li data-dcnode-id="6938"><a class="anchor download-link u-font-sans" data-dcnode-id="6939" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6940"><span data-dcnode-id="6943" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6929"><span data-dcnode-id="6930" id="cap0035"><p data-dcnode-id="6931" id="fspara0035"><span class="label" data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">Fig. 6</span></span><span data-dcnode-id="6933" instrument_node="">. </span><span data-dcnode-id="6932" instrument_node="">Diagram of flipped classroom activities.</span></p></span></span></figure></div><p data-dcnode-id="6925" id="p0330"><span data-dcnode-id="6926" instrument_node="">Using activity theory for the flipped classroom, we identified the following contradictions.</span></p><p data-dcnode-id="6880" id="p0335"></p><dl class="list" data-dcnode-id="6881"><dt class="list-label" data-dcnode-id="6923"><span data-dcnode-id="6924" instrument_node="">5.3.1</span></dt><dd class="list-description" data-dcnode-id="6909"><p data-dcnode-id="6910" id="p0005u"><span data-dcnode-id="6922" instrument_node="">Level 1 contradiction</span></p><dl class="list" data-dcnode-id="6911"><dt class="list-label" data-dcnode-id="6920"><span data-dcnode-id="6921" instrument_node="">(i)</span></dt><dd class="list-description" data-dcnode-id="6917"><p data-dcnode-id="6918" id="p0340"><span data-dcnode-id="6919" instrument_node="">There is tension between the types of learning at the object node, traditional lectures, or flipped classrooms.</span></p></dd><dt class="list-label" data-dcnode-id="6915"><span data-dcnode-id="6916" instrument_node="">(ii)</span></dt><dd class="list-description" data-dcnode-id="6912"><p data-dcnode-id="6913" id="p0345"><span data-dcnode-id="6914" instrument_node="">At the tool node: Videos are boring compared to lectures.</span></p></dd></dl><p></p></dd><dt class="list-label" data-dcnode-id="6907"><span data-dcnode-id="6908" instrument_node="">5.3.2</span></dt><dd class="list-description" data-dcnode-id="6898"><p data-dcnode-id="6899" id="p0010f"><span data-dcnode-id="6906" instrument_node="">Level 2 contradiction</span></p><dl class="list" data-dcnode-id="6900"><dt class="list-label" data-dcnode-id="6904"><span data-dcnode-id="6905" instrument_node="">(i)</span></dt><dd class="list-description" data-dcnode-id="6901"><p data-dcnode-id="6902" id="p0355"><span data-dcnode-id="6903" instrument_node="">At the rules and division of labor node: There is tension between the rules (use of group work) that influences the division of labor. The tension occurs because the division of labor between students is unclear. However, some team members are free riders. Students are silent in the classroom.</span></p></dd></dl><p></p></dd><dt class="list-label" data-dcnode-id="6896"><span data-dcnode-id="6897" instrument_node="">5.3.3</span></dt><dd class="list-description" data-dcnode-id="6882"><p data-dcnode-id="6883" id="p0015y"><span data-dcnode-id="6895" instrument_node="">Level 3 contradiction</span></p><dl class="list" data-dcnode-id="6884"><dt class="list-label" data-dcnode-id="6893"><span data-dcnode-id="6894" instrument_node="">(i)</span></dt><dd class="list-description" data-dcnode-id="6890"><p data-dcnode-id="6891" id="p0365"><span data-dcnode-id="6892" instrument_node="">Existing activity and more advanced form of activity: The tasks to be completed by students have increased, but class time is not sufficient, and there are not enough rewards for students who use the platform to read materials before class.</span></p></dd><dt class="list-label" data-dcnode-id="6888"><span data-dcnode-id="6889" instrument_node="">(ii)</span></dt><dd class="list-description" data-dcnode-id="6885"><p data-dcnode-id="6886" id="p0370"><span data-dcnode-id="6887" instrument_node="">Existing activity and more advanced form of activity: Some students prefer the traditional lecture method. Lectures allow students to review and capture the teachers’ instruction focus. The teacher guides the flipped classroom. However, not all teachers have good interaction skills.</span></p></dd></dl><p></p></dd></dl><p></p><div data-dcnode-id="6822"><p data-dcnode-id="6875" id="p0375"><span data-dcnode-id="6879" instrument_node="">In </span><a class="workspace-trigger" data-dcnode-id="6877" href="#tbl4" name="btbl4"><span data-dcnode-id="6878" instrument_node="">Table 4</span></a><span data-dcnode-id="6876" instrument_node="">, we present best practices based on the observed and summarized contradictions as recommendations for teachers and educators.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6823" id="tbl4"><span class="captions" data-dcnode-id="6868"><span data-dcnode-id="6869" id="cap0055"><p data-dcnode-id="6870" id="tspara0065"><span class="label" data-dcnode-id="6873"><span data-dcnode-id="6874" instrument_node="">Table 4</span></span><span data-dcnode-id="6872" instrument_node="">. </span><span data-dcnode-id="6871" instrument_node="">Contradictions and best practice recommendations for teachers and educators.</span></p></span></span><div class="groups" data-dcnode-id="6824"><table data-dcnode-id="6825"><thead data-dcnode-id="6860"><tr class="rowsep-1 valign-top" data-dcnode-id="6861"><th data-dcnode-id="6866" scope="col"><span data-dcnode-id="6867" instrument_node="">Levels</span></th><th data-dcnode-id="6864" scope="col"><span data-dcnode-id="6865" instrument_node="">Contradictions</span></th><th data-dcnode-id="6862" scope="col"><span data-dcnode-id="6863" instrument_node="">Best practice advice</span></th></tr></thead><tbody data-dcnode-id="6826"><tr class="valign-top" data-dcnode-id="6853"><td class="align-left" data-dcnode-id="6858" rowspan="2"><span data-dcnode-id="6859" instrument_node="">1</span></td><td class="align-left" data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">Tension between types of learning at the object node</span></td><td class="align-left" data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">It is important to inform students about the object of learning regarding what activities the students are expected to perform in the new approach that differ from the traditional method and show the benefits of the new method.</span></td></tr><tr class="valign-top" data-dcnode-id="6848"><td class="align-left" data-dcnode-id="6851"><span data-dcnode-id="6852" instrument_node="">Videos are boring</span></td><td class="align-left" data-dcnode-id="6849"><span data-dcnode-id="6850" instrument_node="">Interaction is important in learning, especially in flipped classrooms. It is important to ensure interactions between the students and the videos, for example, guided to do homework or embedded quizzes. Moreover, to increase students’ preview completion rates the video should not be too long.</span></td></tr><tr class="valign-top" data-dcnode-id="6841"><td class="align-left" data-dcnode-id="6846"><span data-dcnode-id="6847" instrument_node="">2</span></td><td class="align-left" data-dcnode-id="6844"><span data-dcnode-id="6845" instrument_node="">Ensure that all students actually participate in the discussions</span></td><td class="align-left" data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node="">Pre-class tasks in flipped classrooms can be recorded using the TronClass platform or game badges integrated in the platform. For in-class tasks, collaborative norms have been suggested as a means of promoting group tasks. Peer voting systems, such as Mentimeter and Seesaw, are used to facilitate group discussion.</span></td></tr><tr class="valign-top" data-dcnode-id="6834"><td class="align-left" data-dcnode-id="6839" rowspan="2"><span data-dcnode-id="6840" instrument_node="">3</span></td><td class="align-left" data-dcnode-id="6837"><span data-dcnode-id="6838" instrument_node="">Ensure that students have enough time to complete the assigned activities</span></td><td class="align-left" data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">Give the students a quiz as a reward so that they feel those who used the platform before the class are rewarded.</span></td></tr><tr class="valign-top" data-dcnode-id="6827"><td class="align-left" data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">It is important that teachers are trained to conduct interactive discussions</span></td><td class="align-left" data-dcnode-id="6828"><span data-dcnode-id="6831" instrument_node="">Teachers are trained to promote motivation and allow students to engage in the activities by asking appropriate thought-provoking questions that are authentic and related to their experiences to develop meta-cognitive skills.</span><br data-dcnode-id="6830"><span data-dcnode-id="6829" instrument_node="">Teachers need to react immediately to students' in-class participation displays.</span></td></tr></tbody></table></div></div></div></section></section><section data-dcnode-id="6699" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6816" id="sectitle0160"><span data-dcnode-id="6819" instrument_node="">6</span><span data-dcnode-id="6818" instrument_node="">. </span><span data-dcnode-id="6817" instrument_node="">Discussion and implications</span></h2><section data-dcnode-id="6792" id="sec6.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6812" id="sectitle0165"><span data-dcnode-id="6815" instrument_node="">6.1</span><span data-dcnode-id="6814" instrument_node="">. </span><span data-dcnode-id="6813" instrument_node="">Effect of perceived self-efficacy, autonomous motivation, and controlled motivation</span></h3><p data-dcnode-id="6801" id="p0380"><span data-dcnode-id="6811" instrument_node="">We contribute to the literature by offering evidence that students who perceive high self-efficacy or have autonomous motivation may engage in flipped classrooms. These findings confirm previous research that showed perceived self-efficacy is a significant factor in student engagement (</span><a class="workspace-trigger" data-dcnode-id="6809" href="#bib66" name="bbib66"><span data-dcnode-id="6810" instrument_node="">Maricuțoiu &amp; Sulea, 2019</span></a><span data-dcnode-id="6808" instrument_node="">). Moreover, the findings parallel previous research that autonomous motivation or self-motivation induces more behavioral effort and persistence (</span><a class="workspace-trigger" data-dcnode-id="6806" href="#bib75" name="bbib75"><span data-dcnode-id="6807" instrument_node="">Reinholt, Pedersen, &amp; Foss, 2011</span></a><span data-dcnode-id="6805" instrument_node="">), because people with autonomous motivation feel free to pursue their interests and perform tasks and activities that attract, delight, and satisfy them (</span><a class="workspace-trigger" data-dcnode-id="6803" href="#bib69" name="bbib69"><span data-dcnode-id="6804" instrument_node="">Mouratidis, Michou, Sayil, &amp; Altan, 2021</span></a><span data-dcnode-id="6802" instrument_node="">).</span></p><p data-dcnode-id="6793" id="p0385"><span data-dcnode-id="6800" instrument_node="">The results showed that controlled motivation may hinder students’ behavioral engagement in flipped classrooms. This result parallels previous literature that the higher the individual controlled motivation, the more the activities are carried out due to psychological pressure (</span><a class="workspace-trigger" data-dcnode-id="6798" href="#bib69" name="bbib69"><span data-dcnode-id="6799" instrument_node="">Mouratidis et al., 2021</span></a><span data-dcnode-id="6797" instrument_node="">), and the more anxiety and boredom individuals will have (</span><a class="workspace-trigger" data-dcnode-id="6795" href="#bib81" name="bbib81"><span data-dcnode-id="6796" instrument_node="">Shih, 2008</span></a><span data-dcnode-id="6794" instrument_node="">). Thus, these findings highlight controlled motivation as an inhibitor of behavioral engagement in a flipped classroom.</span></p></section><section data-dcnode-id="6767" id="sec6.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6788" id="sectitle0170"><span data-dcnode-id="6791" instrument_node="">6.2</span><span data-dcnode-id="6790" instrument_node="">. </span><span data-dcnode-id="6789" instrument_node="">Effect of perceived teaching quality and perceived platform quality</span></h3><p data-dcnode-id="6768" id="p0390"><span data-dcnode-id="6787" instrument_node="">Perceived teaching quality was found to represent a significant aspect of students’ behavioral engagement in the flipped classroom. In this context, teachers provide help and feedback, and a diligent attitude can facilitate students’ behavioral engagement in flipped classrooms. Effective teachers need to frequently assess their teaching practices (</span><a class="workspace-trigger" data-dcnode-id="6785" href="#bib4" name="bbib4"><span data-dcnode-id="6786" instrument_node="">Amstelveen, 2019</span></a><span data-dcnode-id="6784" instrument_node="">). Previous researchers have shown that if teachers do not design a well-structured classroom, motivated students may become frustrated (</span><a class="workspace-trigger" data-dcnode-id="6782" href="#bib87" name="bbib87"><span data-dcnode-id="6783" instrument_node="">Strayer, 2012</span></a><span data-dcnode-id="6781" instrument_node="">). Existing literature (</span><a class="workspace-trigger" data-dcnode-id="6779" href="#bib31" name="bbib31"><span data-dcnode-id="6780" instrument_node="">Fauth et al., 2019</span></a><span data-dcnode-id="6778" instrument_node="">) has suggested that teachers’ pedagogical content knowledge and enthusiasm for teaching are related to students’ interest but not to their achievement. The findings of this study extend previous literature by revealing that perceived teaching quality is salient for students’ behavioral engagement in flipped classrooms. However, behavioral engagement in flipped classrooms is not necessarily high for students with high perceived platform quality. This may be because platforms such as LMSs, YouTube, and social media are frequently used by university students, and they may perceive these platforms as not challenging. Video lectures do not affect learning, as the medium is a vehicle for content (</span><a class="workspace-trigger" data-dcnode-id="6776" href="#bib22" name="bbib22"><span data-dcnode-id="6777" instrument_node="">Clark, 1994</span></a><span data-dcnode-id="6775" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6773" href="#bib28" name="bbib28"><span data-dcnode-id="6774" instrument_node="">DeLozier &amp; Rhodes, 2017</span></a><span data-dcnode-id="6772" instrument_node="">). The benefit of providing video lectures outside the classroom comes from freeing up in-class time for active learning (</span><a class="workspace-trigger" data-dcnode-id="6770" href="#bib28" name="bbib28"><span data-dcnode-id="6771" instrument_node="">DeLozier &amp; Rhodes, 2017</span></a><span data-dcnode-id="6769" instrument_node="">).</span></p></section><section data-dcnode-id="6748" id="sec6.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6763" id="sectitle0175"><span data-dcnode-id="6766" instrument_node="">6.3</span><span data-dcnode-id="6765" instrument_node="">. </span><span data-dcnode-id="6764" instrument_node="">Moderating role of perceived self-efficacy</span></h3><p data-dcnode-id="6749" id="p0395"><span data-dcnode-id="6762" instrument_node="">The results suggest that increased self-efficacy might strengthen the positive relationship between autonomous motivation and behavioral engagement. Students with more autonomous motivation may work tirelessly to achieve their goals (</span><a class="workspace-trigger" data-dcnode-id="6760" href="#bib56" name="bbib56"><span data-dcnode-id="6761" instrument_node="">Koestner, Otis, Powers, Pelletier, &amp; Gagnon, 2008</span></a><span data-dcnode-id="6759" instrument_node="">). Moreover, enhanced self-efficacy can decrease students’ burnout rates (</span><a class="workspace-trigger" data-dcnode-id="6757" href="#bib66" name="bbib66"><span data-dcnode-id="6758" instrument_node="">Maricuțoiu &amp; Sulea, 2019</span></a><span data-dcnode-id="6756" instrument_node="">). Thus, the positive relationship between autonomous motivation and behavioral engagement is strengthened when students’ perceived self-efficacy is high. The present study contributes to existing research by revealing that simultaneous effects of autonomous motivation and perceived self-efficacy are critical to enhance students’ behavioral engagement in flipped classrooms. However, the relationship between controlled motivation and behavioral engagement was not contingent on perceived self-efficacy. Previous literature has suggested that controlled motivation is negatively related to students’ feelings of psychological need and frustration (</span><a class="workspace-trigger" data-dcnode-id="6754" href="#bib11" name="bbib11"><span data-dcnode-id="6755" instrument_node="">Bartholomew et al., 2018</span></a><span data-dcnode-id="6753" instrument_node="">) and tends to lead to students postponing studying that should be accomplished within a given time (</span><a class="workspace-trigger" data-dcnode-id="6751" href="#bib68" name="bbib68"><span data-dcnode-id="6752" instrument_node="">Mouratidis, Michou, Aelterman, Haerens, &amp; Vansteenkiste, 2018</span></a><span data-dcnode-id="6750" instrument_node="">). The present study findings extend previous literature by revealing a relationship between controlled motivation and behavioral engagement, regardless of students’ perceived self-efficacy.</span></p></section><section data-dcnode-id="6720" id="sec6.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6744" id="sectitle0180"><span data-dcnode-id="6747" instrument_node="">6.4</span><span data-dcnode-id="6746" instrument_node="">. </span><span data-dcnode-id="6745" instrument_node="">Moderating role of perceived teaching quality and perceived platform quality</span></h3><p data-dcnode-id="6735" id="p0400"><span data-dcnode-id="6743" instrument_node="">The study results clarified that perceived teaching quality and platform quality may differ regarding their moderating role in the relationship between motivation and behavioral engagement in flipped classrooms. The impact of autonomous or controlled motivation on behavioral engagement is not likely to be contingent on perceived teaching quality. This finding indicates that autonomous motivation is a driver, and controlled motivation is an inhibitor of behavioral engagement, irrespective of students’ perception of teaching quality in the flipped classroom. This may be because students seek class credit as their desired outcome; teaching quality does not significantly influence students’ motivation for behavioral engagement. Existing literature (</span><a class="workspace-trigger" data-dcnode-id="6741" href="#bib52" name="bbib52"><span data-dcnode-id="6742" instrument_node="">Jang, Kim, &amp; Reeve, 2016</span></a><span data-dcnode-id="6736"><span data-dcnode-id="6740" instrument_node="">) has specified that students reported their teachers did not react to their engagement displays. The present study results suggest that future research should further examine teachers’ </span><a class="topic-link" data-dcnode-id="6738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/autonomy" title="Learn more about autonomy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6739" instrument_node="">autonomy</span></a><span data-dcnode-id="6737" instrument_node=""> support concerning motivation as an incentive for behavioral engagement.</span></span></p><p data-dcnode-id="6721" id="p0405"><span data-dcnode-id="6734" instrument_node="">However, the relationship between motivation (i.e., autonomous and controlled) and behavioral engagement was contingent on perceived platform quality. Previous literature has suggested that using technology in flipped classrooms can enhance students’ learning process (</span><a class="workspace-trigger" data-dcnode-id="6732" href="#bib70" name="bbib70"><span data-dcnode-id="6733" instrument_node="">Murillo-Zamorano et al., 2019</span></a><span data-dcnode-id="6731" instrument_node="">), and teachers widely use social media such as blogs, YouTube videos, or other media to share resources (</span><a class="workspace-trigger" data-dcnode-id="6729" href="#bib64" name="bbib64"><span data-dcnode-id="6730" instrument_node="">Lundin et al., 2018</span></a><span data-dcnode-id="6728" instrument_node="">). Furthermore, teachers use interactive technology to implement teaching and make learning dynamic (</span><a class="workspace-trigger" data-dcnode-id="6726" href="#bib87" name="bbib87"><span data-dcnode-id="6727" instrument_node="">Strayer, 2012</span></a><span data-dcnode-id="6725" instrument_node="">). The results demonstrate that the positive relationship between autonomous motivation and behavioral engagement is strengthened when perceived platform quality is high. Thus, the more the platform supports the learning process, the more students with autonomous motivation may naturally engage in learning behavior. However, the negative relationship between controlled motivation and behavioral engagement is strengthened when students’ perceived platform quality is low. Thus, although high perceived platform quality may reduce the negative relationship between controlled motivation and behavioral engagement, low perceived platform quality may enhance this negative relationship because the difficulty in the flipped classroom is increased. This implies that the “extra work” students are forced to do increases their workload (</span><a class="workspace-trigger" data-dcnode-id="6723" href="#bib43" name="bbib43"><span data-dcnode-id="6724" instrument_node="">He, Holton, Farkas, &amp; Warschauer, 2016</span></a><span data-dcnode-id="6722" instrument_node="">). These results suggest that the joint effect of motivation and perceived platform quality is important for students’ behavioral engagement in a flipped classroom.</span></p></section><section data-dcnode-id="6710" id="sec6.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6716" id="sectitle0185"><span data-dcnode-id="6719" instrument_node="">6.5</span><span data-dcnode-id="6718" instrument_node="">. </span><span data-dcnode-id="6717" instrument_node="">Theoretical implications</span></h3><p data-dcnode-id="6711" id="p0410"><span data-dcnode-id="6715" instrument_node="">This study may advance knowledge in several ways. First, each class implementing the flipped classroom method has its own unique platform and teaching quality. Considering that students are nested in the class, the quality of the teaching and the flipped classroom platforms in the class differ, and students’ motivation may vary between classes. Therefore, we explored the interaction between the class level and the student level and aggregated the teaching quality and platform quality from the student level into the class level, which indicated the quality of the flipped classroom in a class as good or bad. The development of this research model was based on the MOA perspective. Personal behavior is influenced by personal characteristics (motivation and ability) and the external environment, such as an opportunity (</span><a class="workspace-trigger" data-dcnode-id="6713" href="#bib13" name="bbib13"><span data-dcnode-id="6714" instrument_node="">Blumberg &amp; Pringle, 1982</span></a><span data-dcnode-id="6712" instrument_node="">). This study provides new empirical implications and an understanding of how motivation, perceived self-efficacy, and flipped classroom quality affect students’ behavioral engagement in the flipped classroom. Second, perceived platform quality had no direct effect on students’ behavioral engagement but moderately affected the relationship between motivation and behavioral engagement. This study revealed that perceived platform quality is an important moderator in the flipped classroom. Therefore, it is necessary to investigate the impact of platform quality on the relationship between motivation and students’ behavioral engagement in future research. Third, previous studies did not consider the interaction between students’ motivation and ability, and the present results show that when students’ self-efficacy is high, the positive influence of autonomous motivation on students’ behavioral engagement is stronger. This study revealed the direct and interaction effects of self-efficacy and autonomous motivation on students’ behavioral engagement; thus, it is necessary to explain students’ behavioral engagement based on motivation and ability factors. Finally, previous studies on flipped classrooms lacked theoretical support. This study used the MOA perspective and SDT theory to derive the student behavioral engagement model for university students and to explain which factors affect their behavioral engagement, which can be used as a starting point for future research.</span></p></section><section data-dcnode-id="6700" id="sec6.6"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6706" id="sectitle0190"><span data-dcnode-id="6709" instrument_node="">6.6</span><span data-dcnode-id="6708" instrument_node="">. </span><span data-dcnode-id="6707" instrument_node="">Practical implications</span></h3><p data-dcnode-id="6701" id="p0415"><span data-dcnode-id="6705" instrument_node="">This study developed four important insights for university administrators and teachers. The results provide practitioners with insights into how to enhance students’ behavioral engagement when implementing flipped classrooms. First, the focus on class-level variables allowed for a greater understanding of the contingent nature of flipped classroom quality to stimulate students’ full participation in classroom activities. This study showed that teaching quality is positively related to students’ behavioral engagement. To implement flipped classrooms, students must believe that teachers are diligent in classroom teaching, and students must be satisfied with teachers’ teaching so that the students can engage as well. To effectively improve teaching quality, university administrators should provide more substantial encouragement to teachers (such as bonuses), hold workshops, or provide more software and hardware resources to enrich teaching while promoting the flipped classroom method. Second, the relationship between students’ autonomous motivation and behavioral engagement is affected by the average perceived platform quality of the whole class (such as easy-to-find teaching materials on the platform, ease of use of the platform, the platform does not interfere with learning, etc.). Specifically, the positive relationship between autonomous motivation and behavioral engagement is strengthened when perceived platform quality is high. University administrators should strengthen the software and hardware used in the teaching environment and provide training and seminars on the related platform of the flipped classroom so that teachers can effectively choose a suitable platform for their course. Teachers are also advised to integrate external website resources into the flipped classroom platform, such as other </span><a class="topic-link" data-dcnode-id="6703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/massive-open-online-course" title="Learn more about MOOC from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6704" instrument_node="">MOOC</span></a><span data-dcnode-id="6702" instrument_node=""> websites or other instructional videos on the Internet, so that students do not always learn on a single platform. If teachers integrate the resources of other platforms, learning is more fun and fruitful. Third, students who control their motivational orientation learn because of pressure or reluctance, but when students have low perceived platform quality, the negative relationship between controlled motivation and behavioral engagement is strengthened. Therefore, university administrators should continue to improve the quality of the platform and support resources so that teachers can effectively integrate it in flipped classrooms. For example, the flipped classroom platform can record students’ learning processes; help teachers and students check which homework assignment has not been completed, which video has not been previewed, or homework that needs to be revisited; or even combine the innovative function of the game badge so that interesting features can be added to the platform. For instance, a platform called TronClass includes regular course events (e.g., rollcall, materials, assignment, exam, discussion, interaction, group, and attendance), possible actions (e.g., conduct a live class, set a timer, and random a student), and a teaching achievement dashboard (e.g., grade percentage, rollcall score, video viewed, bulletin viewed, material views, material downloaded, total posts, assignments completed, and examinations completed). However, increased student use of platform functionality is limited by teacher guidance. University administrators could conduct training seminars so that teachers and teacher assistants can successfully use the platform functions. Finally, when students’ self-efficacy is high, the influence of autonomous motivation on students’ behavioral engagement is stronger. Therefore, it is suggested that teachers can strengthen students’ confidence with points, badges, or ranking mechanisms so that students feel that it is interesting to complete the tasks before or in class, thus improving students’ behavioral engagement in flipped classrooms.</span></p></section></section><section data-dcnode-id="6678" id="sec7"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6695" id="sectitle0195"><span data-dcnode-id="6698" instrument_node="">7</span><span data-dcnode-id="6697" instrument_node="">. </span><span data-dcnode-id="6696" instrument_node="">Conclusions and suggestions for future research</span></h2><p data-dcnode-id="6693" id="p0420"><span data-dcnode-id="6694" instrument_node="">In this study, we developed and tested a theoretical model that explores how students’ behavioral engagement can be promoted in flipped classrooms and what contradictions arise. This study contributes to theory and practice in three ways. First, we used a survey to explore the potential antecedents and interaction factors for university students’ behavioral engagement in flipped classrooms. Second, we used the MOA perspective and SDT to select potential factors for student-level motivation (i.e., controlled and autonomous), student-level ability (i.e., perceived self-efficacy), and class-level opportunity (i.e., teaching and platform quality). Third, we used follow-up interviews and activity theory to identify possible contradictions in the flipped classrooms that hindered behavioral engagement.</span></p><p data-dcnode-id="6679" id="p0425"><span data-dcnode-id="6692" instrument_node="">This study also has several limitations that should be noted for future research. First, teachers have different instructional strategies for their courses, and the length of time also differs. For example, a teacher may spend only a small portion of the time in class on class discussions, while the remaining time is for reading and supplementary videos. In-class activities also differ, including games, debates, group reports, and tests. Future research could investigate the impact of different instructional strategies on students’ behavioral engagement or evaluate the effect of the quality of different teaching activities on behavioral engagement. Second, scholars have suggested that first-year university students lack the academic maturity required for success in the flipped classroom method (</span><a class="workspace-trigger" data-dcnode-id="6690" href="#bib67" name="bbib67"><span data-dcnode-id="6691" instrument_node="">Mason et al., 2013</span></a><span data-dcnode-id="6689" instrument_node="">), which could be further investigated to compare differences in behavioral engagement. Third, we focused on behavioral engagement because it was the most frequently used component of student engagement (</span><a class="workspace-trigger" data-dcnode-id="6687" href="#bib16" name="bbib16"><span data-dcnode-id="6688" instrument_node="">Bond et al., 2020</span></a><span data-dcnode-id="6686" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6684" href="#bib44" name="bbib44"><span data-dcnode-id="6685" instrument_node="">Henrie et al., 2015</span></a><span data-dcnode-id="6683" instrument_node="">). Future research may extend this line of work to simultaneously measure all three types of engagement. Fourth, the course data were collected across different subject disciplines. However, as we measured students’ perceptions of class-level factors, such as teaching and platform quality, and aggregated them to the class level, the potential bias was uniform across the courses. In a second-order meta-analysis, </span><a class="workspace-trigger" data-dcnode-id="6681" href="#bib46" name="bbib46"><span data-dcnode-id="6682" instrument_node="">Hew, Bai, Huang, et al. (2021)</span></a><span data-dcnode-id="6680" instrument_node=""> found that the effectiveness of a flipped classroom for student learning outcomes had no significant difference across different disciplines. Finally, cross-sectional data and HLM do not allow reciprocal effects to be examined. Future research could collect longitudinal data to explore the reciprocal effects of the relationship between motivation and behavioral engagement.</span></p></section></div><section data-dcnode-id="6663" id="ack0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6675" id="sectitle0200"><span data-dcnode-id="6676" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="6664" id="p0430"><span data-dcnode-id="6674" instrument_node="">This study was supported by the </span><span data-dcnode-id="6672" id="gs5"><span data-dcnode-id="6673" instrument_node="">Ministry of Science and Technology, Taiwan</span></span><span data-dcnode-id="6671" instrument_node="">, R.O.C ( </span><a data-dcnode-id="6669" href="#gs5"><span data-dcnode-id="6670" instrument_node="">MOST 106-2511-S-270-001-MY2</span></a><span data-dcnode-id="6668" instrument_node=""> and </span><span data-dcnode-id="6666" id="gs6"><span data-dcnode-id="6667" instrument_node="">MOST Add-on Grant for International Cooperation</span></span><span data-dcnode-id="6665" instrument_node="">).</span></p></section><div class="Appendices" data-dcnode-id="6053"><section data-dcnode-id="6435" id="appsec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6660"><span data-dcnode-id="6662" instrument_node="">Appendix A</span><span data-dcnode-id="6661" instrument_node="">. </span></h2><p data-dcnode-id="6436" id="p0435"><span data-dcnode-id="6659" instrument_node="">A comparison of recent research on students’ behavioral engagement in flipped classrooms.</span><span class="display" data-dcnode-id="6437"></span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6438" id="undtbl1"><div class="groups" data-dcnode-id="6448"><table data-dcnode-id="6449"><thead data-dcnode-id="6634"><tr class="rowsep-1 valign-top" data-dcnode-id="6644"><th data-dcnode-id="6657" rowspan="2" scope="col"><span data-dcnode-id="6658" instrument_node="">Study</span></th><th data-dcnode-id="6655" rowspan="2" scope="col"><span data-dcnode-id="6656" instrument_node="">Course</span></th><th data-dcnode-id="6653" rowspan="2" scope="col"><span data-dcnode-id="6654" instrument_node="">Sample</span></th><th data-dcnode-id="6651" rowspan="2" scope="col"><span data-dcnode-id="6652" instrument_node="">Method</span></th><th data-dcnode-id="6649" rowspan="2" scope="col"><span data-dcnode-id="6650" instrument_node="">Measure of behavioral engagement</span></th><th colspan="4" data-dcnode-id="6647" scope="col"><span data-dcnode-id="6648" instrument_node="">Instructional strategy</span></th><th data-dcnode-id="6645" rowspan="2" scope="col"><span data-dcnode-id="6646" instrument_node="">Students’ characteristics or contextual factors</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="6635"><th data-dcnode-id="6642" scope="col"><span data-dcnode-id="6643" instrument_node="">A</span></th><th data-dcnode-id="6640" scope="col"><span data-dcnode-id="6641" instrument_node="">B</span></th><th data-dcnode-id="6638" scope="col"><span data-dcnode-id="6639" instrument_node="">C</span></th><th data-dcnode-id="6636" scope="col"><span data-dcnode-id="6637" instrument_node="">D</span></th></tr></thead><tbody data-dcnode-id="6450"><tr class="valign-top" data-dcnode-id="6616"><td class="align-left" data-dcnode-id="6631"><a class="workspace-trigger" data-dcnode-id="6632" href="#bib59" name="bbib59"><span data-dcnode-id="6633" instrument_node="">Lai (2021)</span></a></td><td class="align-left" data-dcnode-id="6629"><span data-dcnode-id="6630" instrument_node="">Business Intelligence, Internet Marketing</span></td><td class="align-left" data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">276 undergraduate students</span></td><td class="align-left" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">Survey</span></td><td class="align-left" data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">Behavioral engagement</span></td><td data-dcnode-id="6622"></td><td data-dcnode-id="6621"></td><td data-dcnode-id="6620"></td><td data-dcnode-id="6619"></td><td class="align-left" data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">Interest value, utility value, perceived task difficulty, group peer interaction</span></td></tr><tr class="valign-top" data-dcnode-id="6598"><td class="align-left" data-dcnode-id="6613"><a class="workspace-trigger" data-dcnode-id="6614" href="#bib63" name="bbib63"><span data-dcnode-id="6615" instrument_node="">Lo and Hew (2021)</span></a></td><td class="align-left" data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">Mathematics</span></td><td class="align-left" data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">55 Grade 9 students</span></td><td class="align-left" data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">Quasi-experiment</span></td><td class="align-left" data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">Behavioral engagement</span></td><td class="align-left" data-dcnode-id="6603"><span data-dcnode-id="6604" instrument_node="">X</span></td><td data-dcnode-id="6602"></td><td data-dcnode-id="6601"></td><td data-dcnode-id="6600"></td><td data-dcnode-id="6599"></td></tr><tr class="valign-top" data-dcnode-id="6578"><td class="align-left" data-dcnode-id="6595"><a class="workspace-trigger" data-dcnode-id="6596" href="#bib74" name="bbib74"><span data-dcnode-id="6597" instrument_node="">Ranellucci et al. (2021)</span></a></td><td class="align-left" data-dcnode-id="6593"><span data-dcnode-id="6594" instrument_node="">Anatomy</span></td><td class="align-left" data-dcnode-id="6589"><span data-dcnode-id="6592" instrument_node="">269 undergraduate</span><br data-dcnode-id="6591"><span data-dcnode-id="6590" instrument_node="">students</span></td><td class="align-left" data-dcnode-id="6587"><span data-dcnode-id="6588" instrument_node="">Survey</span></td><td class="align-left" data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">In-class behavioral
