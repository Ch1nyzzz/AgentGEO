span></p></section><p></p><p data-dcnode-id="8183" id="p0205"><span data-dcnode-id="8193" instrument_node="">Although a negative relationship exists between controlled motivation and behavioral engagement, perceived teaching quality may moderate the negative relationship. Low perceived teaching quality undermines self-perception, which then feeds disaffection with learning (</span><a class="workspace-trigger" data-dcnode-id="8191" href="#bib84" name="bbib84"><span data-dcnode-id="8192" instrument_node="">Skinner et al., 2008</span></a><span data-dcnode-id="8190" instrument_node="">). Consequently, the relationship between controlled motivation and behavioral engagement becomes more strongly negative. Conversely, if high perceived teaching quality exists, the concern for controlled motivation might not be significant, and thus, controlled motivation plays only a small role in decreasing behavioral engagement. Therefore, we posit that low perceived teaching quality causes the relationship between controlled motivation and students’ behavioral engagement to become more negative. Thus, we hypothesize the following:</span></p><section data-dcnode-id="8184"><p data-dcnode-id="8187" id="enun_H9"><strong data-dcnode-id="8188"><span data-dcnode-id="8189" instrument_node="">H9</span></strong></p><p data-dcnode-id="8185" id="p0210"><span data-dcnode-id="8186" instrument_node="">Perceived teaching quality moderates the negative relationship between controlled motivation and students’ behavioral engagement such that when perceived teaching quality is low, the negative relationship becomes stronger.</span></p></section><p></p><p data-dcnode-id="8165" id="p0215"><span data-dcnode-id="8178"><span data-dcnode-id="8182" instrument_node="">Students with autonomous motivation are more likely to engage in flipped classroom activities. However, the relationship is likely to be contingent on perceived platform quality. The flipped classroom uses technology platforms, such as online videos, LMSs, </span><a class="topic-link" data-dcnode-id="8180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/massive-open-online-course" title="Learn more about massive open online courses from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8181" instrument_node="">massive open online courses</span></a><span data-dcnode-id="8179" instrument_node=""> (MOOCs), social media, etc. These platforms create a convenient and flexible learning environment. Teachers rely on technology to transfer materials to students outside the classroom (</span></span><a class="workspace-trigger" data-dcnode-id="8176" href="#bib87" name="bbib87"><span data-dcnode-id="8177" instrument_node="">Strayer, 2012</span></a><span data-dcnode-id="8175" instrument_node="">). Previous researchers have suggested that students enjoy using web-based technology to access course materials in hybrid courses, and this technology can increase behavioral engagement (</span><a class="workspace-trigger" data-dcnode-id="8173" href="#bib37" name="bbib37"><span data-dcnode-id="8174" instrument_node="">Gasiewski et al., 2012</span></a><span data-dcnode-id="8172" instrument_node="">). Thus, when students have low perceived platform quality, those with autonomous motivation are less likely to engage in flipped classrooms. Conversely, when students have high perceived platform quality, they may consider behavioral engagement in a flipped classroom to be an acceptable activity. Perceived platform quality may make the relationship between autonomous motivation and students’ behavioral engagement to become more positive. Thus, we hypothesize the following:</span></p><section data-dcnode-id="8166"><p data-dcnode-id="8169" id="enun_H10"><strong data-dcnode-id="8170"><span data-dcnode-id="8171" instrument_node="">H10</span></strong></p><p data-dcnode-id="8167" id="p0220"><span data-dcnode-id="8168" instrument_node="">Perceived platform quality moderates the positive relationship between autonomous motivation and students’ behavioral engagement such that when perceived platform quality is high, the positive relationship becomes stronger.</span></p></section><p></p><p data-dcnode-id="8157" id="p0225"><span data-dcnode-id="8164" instrument_node="">Students with high controlled motivation are less likely to engage in flipped classroom activities. The argument above suggests a negative relationship between controlled motivation and students’ behavioral engagement, but this relationship is likely to be contingent on the students’ perceived platform quality. Students with high perceived platform quality may not be sensitive to controlled motivation when they engage in flipped classroom activities. However, students with low perceived platform quality may feel controlled and constrained. This ambivalent emotion may cause the relationship between controlled motivation and students’ behavioral engagement to become more negative. Thus, we hypothesize the following:</span></p><section data-dcnode-id="8158"><p data-dcnode-id="8161" id="enun_H11"><strong data-dcnode-id="8162"><span data-dcnode-id="8163" instrument_node="">H11</span></strong></p><p data-dcnode-id="8159" id="p0230"><span data-dcnode-id="8160" instrument_node="">Perceived platform quality moderates the negative relationship between controlled motivation and students’ behavioral engagement such that when perceived platform quality is low, the negative relationship becomes stronger.</span></p></section><p></p></section></section></section><section data-dcnode-id="7888" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8150" id="sectitle0085"><span data-dcnode-id="8153" instrument_node="">4</span><span data-dcnode-id="8152" instrument_node="">. </span><span data-dcnode-id="8151" instrument_node="">Methodology</span></h2><section data-dcnode-id="7970" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8146" id="sectitle0090"><span data-dcnode-id="8149" instrument_node="">4.1</span><span data-dcnode-id="8148" instrument_node="">. </span><span data-dcnode-id="8147" instrument_node="">Data collection</span></h3><p data-dcnode-id="8141" id="p0235"><span data-dcnode-id="8145" instrument_node="">Before we conducted a formal survey, we performed a pretest and a pilot test to ensure the suitability of the instrument used. Most items were based on previous research (see </span><a class="workspace-trigger" data-dcnode-id="8143" href="#appsec2" name="bappsec2"><span data-dcnode-id="8144" instrument_node="">Appendix B</span></a><span data-dcnode-id="8142" instrument_node="">) and pre-tested with a panel of four e-learning professionals to ensure that all items were appropriately adjusted for a flipped classroom and that there were no semantic biases in the translation process from English to Chinese. We made minor changes based on the professionals’ comments. We then pilot tested the resulting survey with 34 students in a class in January 2019 to reveal the ease of understanding and clarity of the questionnaire items and to confirm the questionnaire’s reliability and validity.</span></p><div data-dcnode-id="7973"><p data-dcnode-id="8130" id="p0240"><span data-dcnode-id="8140" instrument_node="">In the formal survey, we used purposive sampling to confirm that university teachers actually used the flipped classroom approach. In purposive sampling, also known as judgment sampling, sample representatives are carefully selected. It is expected that these individuals will achieve the research purpose, as they are believed to represent the population of interest in the research (</span><a class="workspace-trigger" data-dcnode-id="8138" href="#bib21" name="bbib21"><span data-dcnode-id="8139" instrument_node="">Churchill, Brown, &amp; Suter, 2010</span></a><span data-dcnode-id="8137" instrument_node="">). We invited teachers who used the flipped classroom approach via email, ensured that they assigned pre-class tasks (video lectures were required) and understood the teaching strategies and platform used, and obtained consent from the teachers in each class. We entered the classes to distribute the questionnaire from weeks 15–17 from May 27, 2019, to June 14, 2019. The students received statements on the study’s research purpose and ethics. They participated voluntarily and were encouraged to participate with a prize draw. A sample of 30 classes comprising 1002 students from eight Taiwanese universities was collected. The classes included 10 public university classes totaling 369 students and 20 private university classes totaling 633 students. No international students participated in this study. The demographics of the classes and students are shown in </span><a class="workspace-trigger" data-dcnode-id="8135" href="#tbl1" name="btbl1"><span data-dcnode-id="8136" instrument_node="">Table 1</span></a><span data-dcnode-id="8134" instrument_node="">. Examples of flipped classroom activities for 30 classes are shown in online </span><a class="workspace-trigger" data-dcnode-id="8132" href="#appsec3" name="bappsec3"><span data-dcnode-id="8133" instrument_node="">supplementary Appendix C</span></a><span data-dcnode-id="8131" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7974" id="tbl1"><span class="captions" data-dcnode-id="8123"><span data-dcnode-id="8124" id="cap0040"><p data-dcnode-id="8125" id="tspara0035"><span class="label" data-dcnode-id="8128"><span data-dcnode-id="8129" instrument_node="">Table 1</span></span><span data-dcnode-id="8127" instrument_node="">. </span><span data-dcnode-id="8126" instrument_node="">Demographic profiles of the classes and students.</span></p></span></span><div class="groups" data-dcnode-id="7978"><table data-dcnode-id="7979"><thead data-dcnode-id="8116"><tr class="rowsep-1 valign-top" data-dcnode-id="8117"><th colspan="8" data-dcnode-id="8118" scope="col"><span data-dcnode-id="8122" instrument_node="">(a) Demographic profile of the classes (</span><em data-dcnode-id="8120"><span data-dcnode-id="8121" instrument_node="">N</span></em><span data-dcnode-id="8119" instrument_node="">&nbsp;=&nbsp;30)</span></th></tr></thead><tbody data-dcnode-id="7980"><tr class="valign-top" data-dcnode-id="8111"><td class="align-left" data-dcnode-id="8114"><span data-dcnode-id="8115" instrument_node="">University type</span></td><td class="align-left" colspan="7" data-dcnode-id="8112"><span data-dcnode-id="8113" instrument_node="">Public (3), private (5)</span></td></tr><tr class="valign-top" data-dcnode-id="8106"><td class="align-left" data-dcnode-id="8109"><span data-dcnode-id="8110" instrument_node="">Class type</span></td><td class="align-left" colspan="7" data-dcnode-id="8107"><span data-dcnode-id="8108" instrument_node="">Public universities (10), Private universities (20)</span></td></tr><tr class="valign-top" data-dcnode-id="8101"><td class="align-left" data-dcnode-id="8104"><span data-dcnode-id="8105" instrument_node="">Class name</span></td><td class="align-left" colspan="7" data-dcnode-id="8102"><span data-dcnode-id="8103" instrument_node="">Customer Relationship Management (3), Virtual Reality (1), Human Resources Management (2), Cultural and Creative (1), Business Ethics (1), Marketing Management (4), English (4), English Conversation (1), Business Intelligence (1), Chinese (1), Business English Conversation (1), Project Management (1), Statistics (2), Management (3), Online Creative Marketing (3), Network Programming (1)</span></td></tr><tr class="valign-top" data-dcnode-id="8096"><td class="align-left" data-dcnode-id="8099"><span data-dcnode-id="8100" instrument_node="">Pre-class tasks</span></td><td class="align-left" colspan="7" data-dcnode-id="8097"><span data-dcnode-id="8098" instrument_node="">Video lectures, textbooks, and supplemental materials</span></td></tr><tr class="valign-top" data-dcnode-id="8091"><td class="align-l align-top" data-dcnode-id="8059"><td class="align-left" colspan="2" data-dcnode-id="8070"><span data-dcnode-id="8071" instrument_node="">Demographic variable</span></td><td class="align-left" data-dcnode-id="8068"><span data-dcnode-id="8069" instrument_node="">Count</span></td><td class="align-left" data-dcnode-id="8066"><span data-dcnode-id="8067" instrument_node="">%</span></td><td class="align-left" colspan="2" data-dcnode-id="8064"><span data-dcnode-id="8065" instrument_node="">Demographic variable</span></td><td class="align-left" data-dcnode-id="8062"><span data-dcnode-id="8063" instrument_node="">Count</span></td><td class="align-left" data-dcnode-id="8060"><span data-dcnode-id="8061" instrument_node="">%</span></td></tr><tr class="valign-top" data-dcnode-id="8042"><td class="align-left" data-dcnode-id="8057" rowspan="2"><span data-dcnode-id="8058" instrument_node="">Gender</span></td><td class="align-left" data-dcnode-id="8055"><span data-dcnode-id="8056" instrument_node="">Male</span></td><td class="align-left" data-dcnode-id="8053"><span data-dcnode-id="8054" instrument_node="">408</span></td><td class="align-left" data-dcnode-id="8051"><span data-dcnode-id="8052" instrument_node="">40.7</span></td><td class="align-left" data-dcnode-id="8049" rowspan="6"><span data-dcnode-id="8050" instrument_node="">Flipped classroom experience</span></td><td class="align-left" data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">One course</span></td><td class="align-left" data-dcnode-id="8045"><span data-dcnode-id="8046" instrument_node="">300</span></td><td class="align-left" data-dcnode-id="8043"><span data-dcnode-id="8044" instrument_node="">29.9</span></td></tr><tr class="valign-top" data-dcnode-id="8029"><td class="align-left" data-dcnode-id="8040"><span data-dcnode-id="8041" instrument_node="">Female</span></td><td class="align-left" data-dcnode-id="8038"><span data-dcnode-id="8039" instrument_node="">594</span></td><td class="align-left" data-dcnode-id="8036"><span data-dcnode-id="8037" instrument_node="">59.3</span></td><td class="align-left" data-dcnode-id="8034"><span data-dcnode-id="8035" instrument_node="">Two courses</span></td><td class="align-left" data-dcnode-id="8032"><span data-dcnode-id="8033" instrument_node="">584</span></td><td class="align-left" data-dcnode-id="8030"><span data-dcnode-id="8031" instrument_node="">58.3</span></td></tr><tr class="valign-top" data-dcnode-id="8014"><td class="align-left" data-dcnode-id="8027" rowspan="4"><span data-dcnode-id="8028" instrument_node="">Year</span></td><td class="align-left" data-dcnode-id="8025"><span data-dcnode-id="8026" instrument_node="">Freshman</span></td><td class="align-left" data-dcnode-id="8023"><span data-dcnode-id="8024" instrument_node="">179</span></td><td class="align-left" data-dcnode-id="8021"><span data-dcnode-id="8022" instrument_node="">17.9</span></td><td class="align-left" data-dcnode-id="8019"><span data-dcnode-id="8020" instrument_node="">Three courses</span></td><td class="align-left" data-dcnode-id="8017"><span data-dcnode-id="8018" instrument_node="">90</span></td><td class="align-left" data-dcnode-id="8015"><span data-dcnode-id="8016" instrument_node="">9.00</span></td></tr><tr class="valign-top" data-dcnode-id="8001"><td class="align-left" data-dcnode-id="8012"><span data-dcnode-id="8013" instrument_node="">Sophomore</span></td><td class="align-left" data-dcnode-id="8010"><span data-dcnode-id="8011" instrument_node="">308</span></td><td class="align-left" data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">30.7</span></td><td class="align-left" data-dcnode-id="8006"><span data-dcnode-id="8007" instrument_node="">Four courses</span></td><td class="align-left" data-dcnode-id="8004"><span data-dcnode-id="8005" instrument_node="">24</span></td><td class="align-left" data-dcnode-id="8002"><span data-dcnode-id="8003" instrument_node="">2.40</span></td></tr><tr class="valign-top" data-dcnode-id="7988"><td class="align-left" data-dcnode-id="7999"><span data-dcnode-id="8000" instrument_node="">Junior</span></td><td class="align-left" data-dcnode-id="7997"><span data-dcnode-id="7998" instrument_node="">166</span></td><td class="align-left" data-dcnode-id="7995"><span data-dcnode-id="7996" instrument_node="">16.6</span></td><td class="align-left" data-dcnode-id="7993" rowspan="2"><span data-dcnode-id="7994" instrument_node="">≥ Five courses</span></td><td class="align-left" data-dcnode-id="7991" rowspan="2"><span data-dcnode-id="7992" instrument_node="">4</span></td><td class="align-left" data-dcnode-id="7989" rowspan="2"><span data-dcnode-id="7990" instrument_node="">0.40</span></td></tr><tr class="valign-top" data-dcnode-id="7981"><td class="align-left" data-dcnode-id="7986"><span data-dcnode-id="7987" instrument_node="">Senior</span></td><td class="align-left" data-dcnode-id="7984"><span data-dcnode-id="7985" instrument_node="">349</span></td><td class="align-left" data-dcnode-id="7982"><span data-dcnode-id="7983" instrument_node="">34.8</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="7975"></p><p data-dcnode-id="7976" id="tspara0040"><span data-dcnode-id="7977" instrument_node="">Note: The number of classes is in parentheses.</span></p><p></p></div></div><p data-dcnode-id="7971" id="p0245"><span data-dcnode-id="7972" instrument_node="">We conducted follow-up interviews with 12 students (eight women and four men) from four courses (Chinese, Business Intelligence, Network Programming, and Marketing Management) who consented to be interviewed individually. The students received statements on the research purpose and ethics policy (e.g., anonymity, confidentiality, and ability to withdraw from the study at any time). The students were interviewed in weeks 17–19 from June 14, 2019, to June 29, 2019. The interviews lasted from 40 to 60&nbsp;min. The interviews were digitally recorded and recorded verbatim. They were conducted to (1) describe how the flipped classroom model was conducted in the classroom and (2) identify what contradictions, if any, arose in the students’ behavioral engagement.</span></p></section><section data-dcnode-id="7905" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7966" id="sectitle0095"><span data-dcnode-id="7969" instrument_node="">4.2</span><span data-dcnode-id="7968" instrument_node="">. </span><span data-dcnode-id="7967" instrument_node="">Measures</span></h3><p data-dcnode-id="7906" id="p0250"><span data-dcnode-id="7965" instrument_node="">Most survey items were adapted from existing scales in education and motivation literature. The following items were included: (1) At the student level, students who were motivated by their choices, such as interest or self-endorsed values, were considered to have autonomous motivation (</span><a class="workspace-trigger" data-dcnode-id="7963" href="#bib79" name="bbib79"><span data-dcnode-id="7964" instrument_node="">Ryan &amp; Deci, 2002</span></a><span data-dcnode-id="7962" instrument_node="">). This variable was measured using a three-item scale adapted from </span><a class="workspace-trigger" data-dcnode-id="7960" href="#bib99" name="bbib99"><span data-dcnode-id="7961" instrument_node="">Zhou (2016)</span></a><span data-dcnode-id="7959" instrument_node="">. Students who were motivated by a sense of external pressure and obligation were considered to have controlled motivation (</span><a class="workspace-trigger" data-dcnode-id="7957" href="#bib39" name="bbib39"><span data-dcnode-id="7958" instrument_node="">Hagger &amp; Chatzisarantis, 2014</span></a><span data-dcnode-id="7956" instrument_node="">). This variable was measured using four items adapted from </span><a class="workspace-trigger" data-dcnode-id="7954" href="#bib99" name="bbib99"><span data-dcnode-id="7955" instrument_node="">Zhou (2016)</span></a><span data-dcnode-id="7953" instrument_node="">. Perceived self-efficacy was defined as a student’s self-confidence in his or her ability to successfully organize and perform flipped classroom tasks (</span><a class="workspace-trigger" data-dcnode-id="7951" href="#bib9" name="bbib9"><span data-dcnode-id="7952" instrument_node="">Bandura, 1977</span></a><span data-dcnode-id="7950" instrument_node="">). This variable was measured using four items adapted from </span><a class="workspace-trigger" data-dcnode-id="7948" href="#bib89" name="bbib89"><span data-dcnode-id="7949" instrument_node="">Sun, Fang, and Lim (2012)</span></a><span data-dcnode-id="7947" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="7945" href="#bib93" name="bbib93"><span data-dcnode-id="7946" instrument_node="">Venkatesh, Morris, Davis, and Davis (2003)</span></a><span data-dcnode-id="7944" instrument_node="">. Behavioral engagement was defined as the extent to which students participated in pre- and out-of-class activities (</span><a class="workspace-trigger" data-dcnode-id="7942" href="#bib37" name="bbib37"><span data-dcnode-id="7943" instrument_node="">Gasiewski et al., 2012</span></a><span data-dcnode-id="7941" instrument_node="">). This variable was measured using six items developed based on </span><a class="workspace-trigger" data-dcnode-id="7939" href="#bib37" name="bbib37"><span data-dcnode-id="7940" instrument_node="">Gasiewski et al.’s (2012)</span></a><span data-dcnode-id="7938" instrument_node=""> work. Flipped classroom experience was included as a control variable because previous experience can affect the cognitive process in a new environment and then affect individual behavior (</span><a class="workspace-trigger" data-dcnode-id="7936" href="#bib95" name="bbib95"><span data-dcnode-id="7937" instrument_node="">Wan, Wang, &amp; Haggerty, 2008</span></a><span data-dcnode-id="7935" instrument_node="">). Students were asked to indicate their previous flipped classroom experience (1&nbsp;=&nbsp;1 course; 5&nbsp;=&nbsp;5 or more courses). (2) At the class level, perceived teaching quality was students’ perception of a teacher’s feedback, diligent attitude, and teaching arrangement in the flipped classroom as suitable for the learning environment (</span><a class="workspace-trigger" data-dcnode-id="7933" href="#bib20" name="bbib20"><span data-dcnode-id="7934" instrument_node="">Chen et al., 2014</span></a><span data-dcnode-id="7932" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7930" href="#bib32" name="bbib32"><span data-dcnode-id="7931" instrument_node="">Fidalgo-Blanco et al., 2017</span></a><span data-dcnode-id="7929" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7927" href="#bib55" name="bbib55"><span data-dcnode-id="7928" instrument_node="">Kim et al., 2014</span></a><span data-dcnode-id="7926" instrument_node="">). This variable was assessed using four items adapted from previous research (</span><a class="workspace-trigger" data-dcnode-id="7924" href="#bib20" name="bbib20"><span data-dcnode-id="7925" instrument_node="">Chen et al., 2014</span></a><span data-dcnode-id="7923" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7921" href="#bib32" name="bbib32"><span data-dcnode-id="7922" instrument_node="">Fidalgo-Blanco et al., 2017</span></a><span data-dcnode-id="7920" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7918" href="#bib55" name="bbib55"><span data-dcnode-id="7919" instrument_node="">Kim et al., 2014</span></a><span data-dcnode-id="7917" instrument_node="">). Perceived platform quality was the students’ perception that the flipped classroom platform was familiar and easy to access (</span><a class="workspace-trigger" data-dcnode-id="7915" href="#bib55" name="bbib55"><span data-dcnode-id="7916" instrument_node="">Kim et al., 2014</span></a><span data-dcnode-id="7914" instrument_node="">). This variable was assessed using a three-item scale and was developed based on </span><a class="workspace-trigger" data-dcnode-id="7912" href="#bib55" name="bbib55"><span data-dcnode-id="7913" instrument_node="">Kim et al.’s (2014)</span></a><span data-dcnode-id="7907"><span data-dcnode-id="7911" instrument_node=""> work. University type was included as a control variable because Taiwanese university students’ ability is mainly distinguished by the type of university they attend, either national (public) or private (1&nbsp;=&nbsp;public; 0&nbsp;=&nbsp;private). The admission scores for national (public) universities generally exceed those for private universities; students’ abilities and </span><a class="topic-link" data-dcnode-id="7909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/autonomy" title="Learn more about autonomy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7910" instrument_node="">autonomy</span></a><span data-dcnode-id="7908" instrument_node=""> are also high.</span></span></p></section><section data-dcnode-id="7889" id="sec4.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7901" id="sectitle0100"><span data-dcnode-id="7904" instrument_node="">4.3</span><span data-dcnode-id="7903" instrument_node="">. </span><span data-dcnode-id="7902" instrument_node="">Validation of data aggregation</span></h3><p data-dcnode-id="7890" id="p0255"><span data-dcnode-id="7900" instrument_node="">Perceived teaching quality and perceived platform quality were class-level variables, but data were collected from students. To test the rationality of aggregation, we computed within-group agreement (r</span><sub data-dcnode-id="7898"><span data-dcnode-id="7899" instrument_node="">wg</span></sub><span data-dcnode-id="7897" instrument_node="">). The results showed that the mean value of r</span><sub data-dcnode-id="7895"><span data-dcnode-id="7896" instrument_node="">wg</span></sub><span data-dcnode-id="7894" instrument_node=""> for the perceived teaching quality of the 30 classes was 0.782 and for the perceived platform quality of the 30 classes was 0.706, which exceeded the suggested acceptable value of 0.7 (</span><a class="workspace-trigger" data-dcnode-id="7892" href="#bib51" name="bbib51"><span data-dcnode-id="7893" instrument_node="">James et al., 1993</span></a><span data-dcnode-id="7891" instrument_node="">). Thus, aggregating the data for perceived teaching quality and perceived platform quality from the student level to the class level was acceptable.</span></p></section></section><section data-dcnode-id="6820" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7884" id="sectitle0105"><span data-dcnode-id="7887" instrument_node="">5</span><span data-dcnode-id="7886" instrument_node="">. </span><span data-dcnode-id="7885" instrument_node="">Results</span></h2><section data-dcnode-id="7630" id="sec5.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7880" id="sectitle0110"><span data-dcnode-id="7883" instrument_node="">5.1</span><span data-dcnode-id="7882" instrument_node="">. </span><span data-dcnode-id="7881" instrument_node="">Reliability and validity</span></h3><div data-dcnode-id="7631"><p data-dcnode-id="7844" id="p0260"><span data-dcnode-id="7879" instrument_node="">Cronbach’s alpha and composite reliability were used to evaluate the internal consistency of all variables. </span><a class="workspace-trigger" data-dcnode-id="7877" href="#tbl2" name="btbl2"><span data-dcnode-id="7878" instrument_node="">Table 2</span></a><span data-dcnode-id="7876" instrument_node=""> shows that the Cronbach’s alpha values exceeded the 0.7 cutoff values (</span><a class="workspace-trigger" data-dcnode-id="7874" href="#bib71" name="bbib71"><span data-dcnode-id="7875" instrument_node="">Nunnally, 1978</span></a><span data-dcnode-id="7873" instrument_node="">), and the composite reliability surpassed the 0.70 threshold values (</span><a class="workspace-trigger" data-dcnode-id="7871" href="#bib34" name="bbib34"><span data-dcnode-id="7872" instrument_node="">Fornell &amp; Larcker, 1981</span></a><span data-dcnode-id="7870" instrument_node="">); thus, adequate reliability of all variables was confirmed. A six-factor confirmatory factor analysis (CFA) was performed that included controlled motivation, autonomous motivation, perceived self-efficacy, perceived teaching quality, perceived platform quality, and behavioral engagement. The six-factor model provided an acceptable fit to the data: χ</span><sup data-dcnode-id="7868"><span data-dcnode-id="7869" instrument_node="">2</span></sup><span data-dcnode-id="7867" instrument_node="">(194)&nbsp;=&nbsp;611.851, </span><em data-dcnode-id="7865"><span data-dcnode-id="7866" instrument_node="">p</span></em><span data-dcnode-id="7864" instrument_node="">&nbsp;&lt;&nbsp;0.01, comparative fit index (CFI)&nbsp;=&nbsp;0.96, normed fit index (NFI)&nbsp;=&nbsp;0.95, incremental fit index (IFI)&nbsp;=&nbsp;0.96, and root mean square error of approximation (RMSEA)&nbsp;=&nbsp;0.05. As shown in </span><a class="workspace-trigger" data-dcnode-id="7862" href="#appsec2" name="bappsec2"><span data-dcnode-id="7863" instrument_node="">Appendix B</span></a><span data-dcnode-id="7861" instrument_node="">, all factor loadings were statistically significant, exceeding the 0.5 threshold values (</span><a class="workspace-trigger" data-dcnode-id="7859" href="#bib41" name="bbib41"><span data-dcnode-id="7860" instrument_node="">Hair, Black, Babin, Anderson, &amp; Tatham, 2006</span></a><span data-dcnode-id="7858" instrument_node="">), and the average variance extracted (AVE) of the six variables exceeded the 0.5 threshold value (</span><a class="workspace-trigger" data-dcnode-id="7856" href="#bib34" name="bbib34"><span data-dcnode-id="7857" instrument_node="">Fornell &amp; Larcker, 1981</span></a><span data-dcnode-id="7855" instrument_node="">), demonstrating adequate convergent validity. For verification of discriminant validity, in </span><a class="workspace-trigger" data-dcnode-id="7853" href="#tbl2" name="btbl2"><span data-dcnode-id="7854" instrument_node="">Table 2</span></a><span data-dcnode-id="7848"><span data-dcnode-id="7852" instrument_node="">, the square root of the AVE is presented in the diagonal. The square root of the AVE values exceed the </span><a class="topic-link" data-dcnode-id="7850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/correlation-coefficient" title="Learn more about correlation coefficient from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7851" instrument_node="">correlation coefficient</span></a><span data-dcnode-id="7849" instrument_node=""> between the two variables, indicating adequate discriminant validity (</span></span><a class="workspace-trigger" data-dcnode-id="7846" href="#bib34" name="bbib34"><span data-dcnode-id="7847" instrument_node="">Fornell &amp; Larcker, 1981</span></a><span data-dcnode-id="7845" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7632" id="tbl2"><span class="captions" data-dcnode-id="7835"><span data-dcnode-id="7836" id="cap0045"><p data-dcnode-id="7837" id="tspara0045"><span class="label" data-dcnode-id="7842"><span data-dcnode-id="7843" instrument_node="">Table 2</span></span><span data-dcnode-id="7841" instrument_node="">. </span><a class="topic-link" data-dcnode-id="7839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/descriptive-statistics" title="Learn more about Descriptive statistics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7840" instrument_node="">Descriptive statistics</span></a><span data-dcnode-id="7838" instrument_node="">, reliability, and discriminant validity.</span></p></span></span><div class="groups" data-dcnode-id="7645"><table data-dcnode-id="7646"><thead data-dcnode-id="7813"><tr class=" >0.383</span></td><td class="align-left" data-dcnode-id="7679"><span data-dcnode-id="7680" instrument_node="">0.912</span></td><td class="align-left" data-dcnode-id="7677"><span data-dcnode-id="7678" instrument_node="">0.913</span></td><td class="align-left" data-dcnode-id="7675"><span data-dcnode-id="7676" instrument_node="">−0.609**</span></td><td class="align-left" data-dcnode-id="7672"><strong data-dcnode-id="7673"><span data-dcnode-id="7674" instrument_node="">0.850</span></strong></td><td data-dcnode-id="7671"></td><td data-dcnode-id="7670"></td><td data-dcnode-id="7669"></td></tr><tr class="valign-top" data-dcnode-id="7648"><td class="align-left" data-dcnode-id="7666"><span data-dcnode-id="7667" instrument_node="">3. Perceived platform quality</span></td><td class="align-left" data-dcnode-id="7664"><span data-dcnode-id="7665" instrument_node="">3.251</span></td><td class="align-left" data-dcnode-id="7662"><span data-dcnode-id="7663" instrument_node="">0.330</span></td><td class="align-left" data-dcnode-id="7660"><span data-dcnode-id="7661" instrument_node="">0.861</span></td><td class="align-left" data-dcnode-id="7658"><span data-dcnode-id="7659" instrument_node="">0.867</span></td><td class="align-left" data-dcnode-id="7656"><span data-dcnode-id="7657" instrument_node="">−0.366*</span></td><td class="align-left" data-dcnode-id="7654"><span data-dcnode-id="7655" instrument_node="">0.729**</span></td><td class="align-left" data-dcnode-id="7651"><strong data-dcnode-id="7652"><span data-dcnode-id="7653" instrument_node="">0.829</span></strong></td><td data-dcnode-id="7650"></td><td data-dcnode-id="7649"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="7633"></p><p data-dcnode-id="7634" id="tspara0050"><span data-dcnode-id="7644" instrument_node="">Notes: *</span><em data-dcnode-id="7642"><span data-dcnode-id="7643" instrument_node="">p</span></em><span data-dcnode-id="7641" instrument_node="">&nbsp;&lt;&nbsp;0.05; **</span><em data-dcnode-id="7639"><span data-dcnode-id="7640" instrument_node="">p</span></em><span data-dcnode-id="7638" instrument_node="">&nbsp;&lt;&nbsp;0.01; ***</span><em data-dcnode-id="7636"><span data-dcnode-id="7637" instrument_node="">p</span></em><span data-dcnode-id="7635" instrument_node="">&nbsp;&lt;&nbsp;0.001. SD: Standard deviation; CA: Cronbach’s alpha; CR: Composite reliability. The values in bold on the diagonal are the square roots of the AVEs. University type and flipped classroom experience are categorical variables. The 30 classes comprised 1002 students.</span></p><p></p></div></div></section><section data-dcnode-id="6984" id="sec5.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7626" id="sectitle0115"><span data-dcnode-id="7629" instrument_node="">5.2</span><span data-dcnode-id="7628" instrument_node="">. </span><span data-dcnode-id="7627" instrument_node="">Hypotheses testing</span></h3><p data-dcnode-id="7615" id="p0265"><span data-dcnode-id="7625" instrument_node="">To examine the proposed model with nested data, hierarchical linear modeling (HLM) was conducted using HLM 6.08 to estimate multilevel coefficients, their significance, and variance accounting for each level (</span><a class="workspace-trigger" data-dcnode-id="7623" href="#bib97" name="bbib97"><span data-dcnode-id="7624" instrument_node="">Young et al., 1996</span></a><span data-dcnode-id="7622" instrument_node="">). The effects of student-level variables, class-level variables, and cross-level interactions were examined simultaneously. Cross-level interaction refers to a situation where level 2 variables are proposed to moderate the strength of level 1 relationships (</span><a class="workspace-trigger" data-dcnode-id="7620" href="#bib42" name="bbib42"><span data-dcnode-id="7621" instrument_node="">Heck &amp; Thomas, 2015</span></a><span data-dcnode-id="7619" instrument_node="">). We grand-mean-centered all variables, except for the categorical variables (i.e., university type and flipped classroom experience), to improve the interpretability of the intercept and the variance of random intercepts across groups and reduce potential problems associated with multicollinearity (</span><a class="workspace-trigger" data-dcnode-id="7617" href="#bib48" name="bbib48"><span data-dcnode-id="7618" instrument_node="">Hofmann &amp; Gavin, 1998</span></a><span data-dcnode-id="7616" instrument_node="">). First, a null model without level 1 and level 2 variables was estimated. Next, level 1 variables were inputted in model 1. Then, level 2 variables were entered in model 2, and cross-level variables were added in model 3.</span></p><section data-dcnode-id="7575" id="sec5.2.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7611" id="sectitle0120"><span data-dcnode-id="7614" instrument_node="">5.2.1</span><span data-dcnode-id="7613" instrument_node="">. </span><span data-dcnode-id="7612" instrument_node="">Null model</span></h4><p data-dcnode-id="7576" id="p0270"><span data-dcnode-id="7610" instrument_node="">A null model without predictors was entered to test the significance of the between-class variance in the dependent variable. A statistically significant chi-square for behavioral engagement was found (τ</span><sub data-dcnode-id="7608"><span data-dcnode-id="7609" instrument_node="">00</span></sub><span data-dcnode-id="7607" instrument_node="">&nbsp;=&nbsp;0.047, χ</span><sup data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">2</span></sup><span data-dcnode-id="7604" instrument_node="">(29)&nbsp;=&nbsp;178.190, </span><em data-dcnode-id="7602"><span data-dcnode-id="7603" instrument_node="">p</span></em><span data-dcnode-id="7601" instrument_node="">&nbsp;&lt;&nbsp;0.001), indicating that statistically significant between-class variance existed. In addition, one-way analysis of variance results demonstrated a statistically significant difference in behavioral engagement (F&nbsp;=&nbsp;6.130, </span><em data-dcnode-id="7599"><span data-dcnode-id="7600" instrument_node="">p</span></em><span data-dcnode-id="7598" instrument_node="">&nbsp;&lt;&nbsp;0.001) between classes. Intraclass Correlation Coefficient (ICC</span><sub data-dcnode-id="7596"><span data-dcnode-id="7597" instrument_node="">1</span></sub><span data-dcnode-id="7595" instrument_node="">) is the percentage of the variance that resides between clusters. The results revealed that the ICC</span><sub data-dcnode-id="7593"><span data-dcnode-id="7594" instrument_node="">1</span></sub><span data-dcnode-id="7592" instrument_node=""> estimate was 0.138, indicating that 13.8% of the variance in behavioral engagement was at the class level and 86.2% of the variance in behavioral engagement was at the student level. ICC</span><sub data-dcnode-id="7590"><span data-dcnode-id="7591" instrument_node="">2</span></sub><span data-dcnode-id="7589" instrument_node=""> (the reliability of the mean) is the reliability of the average behavioral engagement between groups. The ICC</span><sub data-dcnode-id="7587"><span data-dcnode-id="7588" instrument_node="">2</span></sub><span data-dcnode-id="7586" instrument_node=""> estimate was 0.837, which means that the mean of the question items at the class level was consistent. In summary, ICC</span><sub data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">1</span></sub><span data-dcnode-id="7583" instrument_node=""> &gt; 0.12 and ICC</span><sub data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">2</span></sub><span data-dcnode-id="7580" instrument_node=""> &gt; 0.6 provide a reasonable follow-up of the cross-level analysis (</span><a class="workspace-trigger" data-dcnode-id="7578" href="#bib17" name="bbib17"><span data-dcnode-id="7579" instrument_node="">Bryk &amp; Raudenbush, 1992</span></a><span data-dcnode-id="7577" instrument_node="">).</span></p></section><section data-dcnode-id="7191" id="sec5.2.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7571" id="sectitle0125"><span data-dcnode-id="7574" instrument_node="">5.2.2</span><span data-dcnode-id="7573" instrument_node="">. </span><span data-dcnode-id="7572" instrument_node="">Student-level results (model 1)</span></h4><div data-dcnode-id="7292"><p data-dcnode-id="7554" id="p0275"><span data-dcnode-id="7570" instrument_node="">Model 1 in </span><a class="workspace-trigger" data-dcnode-id="7568" href="#tbl3" name="btbl3"><span data-dcnode-id="7569" instrument_node="">Table 3</span></a><span data-dcnode-id="7567" instrument_node=""> reveals a statistically significant positive relationship between perceived self-efficacy and behavioral engagement (</span><em data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">γ</span></em><span data-dcnode-id="7564" instrument_node="">&nbsp;=&nbsp;0.164, </span><em data-dcnode-id="7562"><span data-dcnode-id="7563" instrument_node="">t</span></em><span data-dcnode-id="7561" instrument_node="">&nbsp;=&nbsp;5.603, </span><em data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">p</span></em><span data-dcnode-id="7558" instrument_node="">&nbsp;&lt;&nbsp;0.001); thus, </span><a class="workspace-trigger" data-dcnode-id="7556" href="#enun_H1" name="benun_H1"><span data-dcnode-id="7557" instrument_node="">H1</span></a><span data-dcnode-id="7555" instrument_node=""> was supported. A student stated, “I believe I have the knowledge and team skill that can enable me do the in-class task well.”</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7293" id="tbl3"><span class="captions" data-dcnode-id="7547"><span data-dcnode-id="7548" id="cap0050"><p data-dcnode-id="7549" id="tspara0055"><span class="label" data-dcnode-id="7552"><span data-dcnode-id="7553" instrument_node="">Table 3</span></span><span data-dcnode-id="7551" instrument_node="">. </span><span data-dcnode-id="7550" instrument_node="">Hierarchical linear modeling results.</span></p></span></span><div class="groups" data-dcnode-id="7315"><table data-dcnode-id="7316"><thead data-dcnode-id="7535"><tr class="rowsep-1 valign-top" data-dcnode-id="7536"><th data-dcnode-id="7545" scope="col"><span data-dcnode-id="7546" instrument_node="">Variables</span></th><th data-dcnode-id="7543" scope="col"><span data-dcnode-id="7544" instrument_node="">Model 1</span></th><th data-dcnode-id="7541" scope="col"><span data-dcnode-id="7542" instrument_node="">Model 2</span></th><th data-dcnode-id="7539" scope="col"><span data-dcnode-id="7540" instrument_node="">Model 3</span></th><th data-dcnode-id="7537" scope="col"><span data-dcnode-id="7538" instrument_node="">Hypotheses</span></th></tr></thead><tbody data-dcnode-id="7317"><tr class="valign-top" data-dcnode-id="7530"><td class="align-left" colspan="5" data-dcnode-id="7531"><strong data-dcnode-id="7532"><em data-dcnode-id="7533"><span data-dcnode-id="7534" instrument_node="">Level 1: Student level</span></em></strong></td></tr><tr class="valign-top" data-dcnode-id="7520"><td class="align-left" data-dcnode-id="7528"><span data-dcnode-id="7529" instrument_node="">Intercept (U0)</span></td><td class="align-left" data-dcnode-id="7526"><span data-dcnode-id="7527" instrument_node="">2.007*** (0.023***)</span></td><td class="align-left" data-dcnode-id="7524"><span data-dcnode-id="7525" instrument_node="">1.966*** (0.010***)</span></td><td class="align-left" data-dcnode-id="7522"><span data-dcnode-id="7523" instrument_node="">1.969*** (0.010***)</span></td><td data-dcnode-id="7521"></td></tr><tr class="valign-top" data-dcnode-id="7510"><td class="align-left" data-dcnode-id="7518"><span data-dcnode-id="7519" instrument_node="">Flipped classroom experience</span></td><td class="align-left" data-dcnode-id="7516"><span data-dcnode-id="7517" instrument_node="">0.050(0.009)</span></td><td class="align-left" data-dcnode-id="7514"><span data-dcnode-id="7515" instrument_node="">0.052* (0.007)</span></td><td class="align-left" data-dcnode-id="7512"><span data-dcnode-id="7513" instru
