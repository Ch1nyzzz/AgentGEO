</span><meta content="Students’ behavioral engagement is critical for flipped classroom success. Research on flipped and non-flipped classrooms has provided mixed findings …" data-dcnode-id="9547" property="og:description"><span data-dcnode-id="9546" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Students’ behavioral engagement is critical for flipped classroom success. Research on flipped and non-flipped classrooms has provided mixed findings regarding students’ behavioral engagement. Using the motivation-opportunity-ability perspective and self-determination theory, in this study, we aim to empirically test how student-level motivation (i.e., autonomous and controlled), student-level ability (i.e., perceived self-efficacy), and class-level opportunity (i.e., perceived teaching quality and perceived platform quality) influence students’ behavioral engagement in flipped classrooms. Data were collected with a survey completed by 1002 students in 30 classes with flipped classrooms at public and private universities and tested using hierarchical linear modeling (HLM). The results revealed that autonomous motivation, controlled motivation, perceived self-efficacy, and perceived teaching quality were critical determinants of university students’ behavioral engagement in flipped classrooms. When perceived self-efficacy was high, the positive relationship between autonomous motivation and behavioral engagement became stronger. Moreover, when perceived platform quality was high, the positive relationship between autonomous motivation and behavioral engagement became stronger. In addition, when perceived platform quality was low, the negative relationship between controlled motivation and behavioral engagement became stronger. Follow-up interviews with the students emphasized five contradictions in flipped classrooms that hindered behavioral engagement—there was tension between types of learning, the videos were boring, not all students actually participated in the discussions, students lacked sufficient time for in-class activities, and teachers did not have good interaction skills. Implications of flipped classrooms are also discussed.</p></div></div></div>" data-dcnode-id="9545" lang="en" name="citation_abstract"><span data-dcnode-id="9544" instrument_node="">

2.94 32.62c2.64 1.95 6.02 2.93 9.4 2.93s6.78-0.98 9.42-2.93l40.24-30.7v-10.34h-102zm92 56.48l-18.06-22.74-8.04 5.95 17.38 21.89h-64.54l18.38-23.12-8.04-5.96-19.08 24.02v-37.58l-1e1 -8.46v61.1h102v-59.18l-1e1 8.46v35.62" data-dcnode-id="8909"></path></svg></span></a></div></div></div><button class="button show-hide-details button-primary" data-aa-button="icon-expand" data-dcnode-id="8898" id="show-more-btn" type="button"><span class="button-text" data-dcnode-id="8901"><span data-dcnode-id="8902" instrument_node="">Show more</span></span><svg class="icon icon-navigate-down" data-dcnode-id="8899" focusable="false" height="20" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="8900"></path></svg></button><div class="banner-options u-padding-xs-bottom" data-dcnode-id="8875"><button class="button toc-button button-anchor u-hide-from-lg u-margin-s-right" data-dcnode-id="8892" type="button"><svg class="icon icon-list" data-dcnode-id="8896" focusable="false" height="24" viewBox="0 0 104 128" width="19.5"><path d="m2e1 95a9 9 0 0 1 -9 9 9 9 0 0 1 -9 -9 9 9 0 0 1 9 -9 9 9 0 0 1 9 9zm0-3e1a9 9 0 0 1 -9 9 9 9 0 0 1 -9 -9 9 9 0 0 1 9 -9 9 9 0 0 1 9 9zm0-3e1a9 9 0 0 1 -9 9 9 9 0 0 1 -9 -9 9 9 0 0 1 9 -9 9 9 0 0 1 9 9zm14 55h68v1e1h-68zm0-3e1h68v1e1h-68zm0-3e1h68v1e1h-68z" data-dcnode-id="8897"></path></svg><span class="button-text" data-dcnode-id="8893"><span data-dcnode-id="8894"><span data-dcnode-id="8895" instrument_node="">Outline</span></span></span></button><div class="Social u-display-inline-block" data-dcnode-id="8884" id="social"><div class="popover social-popover" data-dcnode-id="8885" id="social-popover"><div data-dcnode-id="8886" id="popover-trigger-social-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="8887" type="button"><svg class="icon icon-share" data-dcnode-id="8890" focusable="false" height="16" viewBox="0 0 128 128" width="16"><path d="m9e1 112c-6.62 0-12-5.38-12 el="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="8873" instrument_node="">https://doi.org/10.1016/j.compedu.2021.104318</span></a><a class="rights-and-content" data-dcnode-id="8870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0360131521001950%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8871" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="8868"></section><section class="ReferencedArticles" data-dcnode-id="8867"></section><div class="PageDivider" data-dcnode-id="8866"></div><div class="Abstracts u-font-serif" data-dcnode-id="8828" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="8835" id="abs0015" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8864"><span data-dcnode-id="8865" instrument_node="">Highlights</span></h2><div data-dcnode-id="8836" id="abssec0015"><p data-dcnode-id="8837" id="abspara0015"></p><dl class="list" data-dcnode-id="8838"><dt class="list-label" data-dcnode-id="8862"><span data-dcnode-id="8863" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8859"><p data-dcnode-id="8860" id="p0010"><span data-dcnode-id="8861" instrument_node="">This study examines the cross-level interaction of student- and class-level factors.</span></p></dd><dt class="list-label" data-dcnode-id="8857"><span data-dcnode-id="8858" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8854"><p data-dcnode-id="8855" id="p0015"><span data-dcnode-id="8856" instrument_node="">Teaching quality and platform quality are positively related to behavioral engagement.</span></p></dd><dt class="list-label" data-dcnode-id="8852"><span data-dcnode-id="8853" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8849"><p data-dcnode-id="8850" id="p0020"><span data-dcnode-id="8851" instrument_node="">Platform quality plays a moderating role between controlled motivation and engagement.</span></p></dd><dt class="list-label" data-dcnode-id="8847"><span data-dcnode-id="8848" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8844"><p data-dcnode-id="8845" id="p0025"><span data-dcnode-id="8846" instrument_node="">Platform quality plays a moderating role between autonomous motivation and engagement.</span></p></dd><dt class="list-label" data-dcnode-id="8842"><span data-dcnode-id="8843" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8839"><p data-dcnode-id="8840" id="p0030"><span data-dcnode-id="8841" instrument_node="">Self-efficacy plays a moderating role between autonomous motivation and engagement.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="8829" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8833"><span data-dcnode-id="8834" instrument_node="">Abstract</span></h2><div data-dcnode-id="8830" id="abssec0010"><p data-dcnode-id="8831" id="abspara0010"><span data-dcnode-id="8832" instrument_node="">Students’ behavioral engagement is critical for flipped classroom success. Research on flipped and non-flipped classrooms has provided mixed findings regarding students’ behavioral engagement. Using the motivation-opportunity-ability perspective and self-determination theory, in this study, we aim to empirically test how student-level motivation (i.e., autonomous and controlled), student-level ability (i.e., perceived self-efficacy), and class-level opportunity (i.e., perceived teaching quality and perceived platform quality) influence students’ behavioral engagement in flipped classrooms. Data were collected with a survey completed by 1002 students in 30 classes with flipped classrooms at public and private universities and tested using hierarchical linear modeling (HLM). The results revealed that autonomous motivation, controlled motivation, perceived self-efficacy, and perceived teaching quality were critical determinants of university students’ behavioral engagement in flipped classrooms. When perceived self-efficacy was high, the positive relationship between autonomous motivation and behavioral engagement became stronger. Moreover, when perceived platform quality was high, the positive relationship between autonomous motivation and behavioral engagement became stronger. In addition, when perceived platform quality was low, the negative relationship between controlled motivation and behavioral engagement became stronger. Follow-up interviews with the students emphasized five contradictions in flipped classrooms that hindered behavioral engagement—there was tension between types of learning, the videos were boring, not all students actually participated in the discussions, students lacked sufficient time for in-class activities, and teachers did not have good interaction skills. Implications of flipped classrooms are also discussed.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8805" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8817"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360131521001974"><svg class="icon icon-navigate-left" data-dcnode-id="8826" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8827"></path></svg><span class="button-alternative-text" data-dcnode-id="8819"><strong data-dcnode-id="8824"><span data-dcnode-id="8825" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8822"><span data-dcnode-id="8823" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8820"><span data-dcnode-id="8821" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8806"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360131521001937"><span class="button-alternative-text" data-dcnode-id="8810"><strong data-dcnode-id="8815"><span data-dcnode-id="8816" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8813"><span data-dcnode-id="8814" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8811"><span data-dcnode-id="8812" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8808" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8809"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8792"><div class="keywords-section" data-dcnode-id="8793" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8803"><span data-dcnode-id="8804" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8800" id="kwrd0010"><span data-dcnode-id="8801"><span data-dcnode-id="8802" instrument_node="">Improving classroom teaching</span></span></div><div class="keyword" data-dcnode-id="8797" id="kwrd0015"><span data-dcnode-id="8798"><span data-dcnode-id="8799" instrument_node="">Pedagogical issues</span></span></div><div class="keyword" data-dcnode-id="8794" id="kwrd0020"><span data-dcnode-id="8795"><span data-dcnode-id="8796" instrument_node="">Teaching/learning strategies</span></span></div></div></div><span data-dcnode-id="8791" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="6052" id="body"><div data-dcnode-id="6677"><section data-dcnode-id="8679" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8787" id="sectitle0025"><span data-dcnode-id="8790" instrument_node="">1</span><span data-dcnode-id="8789" instrument_node="">. </span><span data-dcnode-id="8788" instrument_node="">Introduction</span></h2><p data-dcnode-id="8770" id="p0035"><span data-dcnode-id="8786" instrument_node="">Recently, implementation of flipped classrooms in higher education has accelerated in response to the demand for technology-enhanced and student-centered learning environments (</span><a class="workspace-trigger" data-dcnode-id="8784" href="#bib55" name="bbib55"><span data-dcnode-id="8785" instrument_node="">Kim, Kim, Khera, &amp; Getman, 2014</span></a><span data-dcnode-id="8783" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8781" href="#bib86" name="bbib86"><span data-dcnode-id="8782" instrument_node="">Steen-Utheim &amp; Foldnes, 2018</span></a><span data-dcnode-id="8780" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8778" href="#bib90" name="bbib90"><span data-dcnode-id="8779" instrument_node="">Sun, Xie, &amp; Anderman, 2018</span></a><span data-dcnode-id="8777" instrument_node="">). The flipped classroom is a blended teaching method that combines online learning and face-to-face classroom activities (</span><a class="workspace-trigger" data-dcnode-id="8775" href="#bib91" name="bbib91"><span data-dcnode-id="8776" instrument_node="">Thai, De Wever, &amp; Valcke, 2017</span></a><span data-dcnode-id="8774" instrument_node="">). The idea is to change the order of the education process: The classroom is mainly for knowledge assimilation and is a place for doing homework, learning cooperatively, and solving problems. Out-of-class time is mainly for transmitting knowledge, and students complete learning tasks independently, such as watching instructional videos, reading, and collecting data from websites at a convenient time and place (</span><a class="workspace-trigger" data-dcnode-id="8772" href="#bib32" name="bbib32"><span data-dcnode-id="8773" instrument_node="">Fidalgo-Blanco, Martinez-Nuñez, Borrás-Gene, &amp; Sanchez-Medina, 2017</span></a><span data-dcnode-id="8771" instrument_node="">).</span></p><p data-dcnode-id="8753" id="p0040"><span data-dcnode-id="8769" instrument_node="">The flipped classroom model offers students four benefits for learning: reading flexibility, active learning, rich material availability, and technology utilization. (1) Regarding reading flexibility, students are required to complete learning activities outside the classroom. These learning activities are facilitated through technological resources (</span><a class="workspace-trigger" data-dcnode-id="8767" href="#bib72" name="bbib72"><span data-dcnode-id="8768" instrument_node="">O’Flaherty &amp; Phillips, 2015</span></a><span data-dcnode-id="8766" instrument_node="">), such as learning management systems (LMSs), self-made instructional videos, or open video resources. These resources also allow students to pause or review material, control the pace and frequency, and print slides as additional notes. (2) Regarding active learning, the flipped classroom promotes students’ active, cooperative, and problem-based learning (</span><a class="workspace-trigger" data-dcnode-id="8764" href="#bib67" name="bbib67"><span data-dcnode-id="8765" instrument_node="">Mason, Shuman, &amp; Cook, 2013</span></a><span data-dcnode-id="8763" instrument_node="">). In-class interaction in a flipped classroom creates a meaningful learning interaction between teachers and students (</span><a class="workspace-trigger" data-dcnode-id="8761" href="#bib64" name="bbib64"><span data-dcnode-id="8762" instrument_node="">Lundin, Rensfeldt, Hillman, Lantz-Andersson, &amp; Peterson, 2018</span></a><span data-dcnode-id="8760" instrument_node="">). (3) Regarding rich material availability, instructional material can be presented in various formats and cover more course material without sacrificing content than with the traditional classroom method (</span><a class="workspace-trigger" data-dcnode-id="8758" href="#bib67" name="bbib67"><span data-dcnode-id="8759" instrument_node="">Mason et al., 2013</span></a><span data-dcnode-id="8757" instrument_node="">). (4) Concerning technology utilization, it is much easier for teachers to use online instructional videos and assessment systems, making the flipped classroom effective and scalable (</span><a class="workspace-trigger" data-dcnode-id="8755" href="#bib24" name="bbib24"><span data-dcnode-id="8756" instrument_node="">Davies, Dean, &amp; Ball, 2013</span></a><span data-dcnode-id="8754" instrument_node="">). The reasons above show that the flipped classroom model offers many advantages over the traditional lecture model.</span></p><p data-dcnode-id="8715" id="p0045"><span data-dcnode-id="8752" instrument_node="">To be successful, flipped classrooms need student engagement (</span><a class="workspace-trigger" data-dcnode-id="8750" href="#bib59" name="bbib59"><span data-dcnode-id="8751" instrument_node="">Lai, 2021</span></a><span data-dcnode-id="8749" instrument_node="">). Therefore, improving student engagement in and outside the classroom is imperative (</span><a class="workspace-trigger" data-dcnode-id="8747" href="#bib72" name="bbib72"><span data-dcnode-id="8748" instrument_node="">O’Flaherty &amp; Phillips, 2015</span></a><span data-dcnode-id="8746" instrument_node="">). Student engagement is multidimensional and typically, conceptualized in three domains: cognitive, emotional, and behavioral (</span><a class="workspace-trigger" data-dcnode-id="8744" href="#bib35" name="bbib35"><span data-dcnode-id="8745" instrument_node="">Fredricks, Blumenfeld, &amp; Paris, 2004</span></a><span data-dcnode-id="8743" instrument_node="">). A meta-analysis by </span><a class="workspace-trigger" data-dcnode-id="8741" href="#bib61" name="bbib61"><span data-dcnode-id="8742" instrument_node="">Lei, Cui, and Zhou (2018)</span></a><span data-dcnode-id="8740" instrument_node=""> revealed that behavioral engagement is associated with higher academic achievement, followed by cognitive and emotional engagement. Student engagement was most frequently measured from the behavioral perspective—behavioral engagement (</span><a class="workspace-trigger" data-dcnode-id="8738" href="#bib16" name="bbib16"><span data-dcnode-id="8739" instrument_node="">Bond, Buntins, Bedenlier, Zawacki-Richter, &amp; Kerres, 2020</span></a><span data-dcnode-id="8737" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8735" href="#bib44" name="bbib44"><span data-dcnode-id="8736" instrument_node="">Henrie, Halverson, &amp; Graham, 2015</span></a><span data-dcnode-id="8734" instrument_node="">)—with indicators such as participation, attendance, assignments completed, time spent online, and on-task behavior (</span><a class="workspace-trigger" data-dcnode-id="8732" href="#bib44" name="bbib44"><span data-dcnode-id="8733" instrument_node="">Henrie et al., 2015</span></a><span data-dcnode-id="8731" instrument_node="">). A review of the existing literature revealed two justifications for using the flipped classroom approach and students’ behavioral engagement. First, the growing literature indicates that this approach is related to increased behavioral engagement levels (</span><a class="workspace-trigger" data-dcnode-id="8729" href="#bib14" name="bbib14"><span data-dcnode-id="8730" instrument_node="">Bond, 2020</span></a><span data-dcnode-id="8728" instrument_node="">) compared to behavioral engagement in the traditional classroom approach (</span><a class="workspace-trigger" data-dcnode-id="8726" href="#bib29" name="bbib29"><span data-dcnode-id="8727" instrument_node="">Elmaadaway, 2018</span></a><span data-dcnode-id="8725" instrument_node="">). However, some researchers (</span><a class="workspace-trigger" data-dcnode-id="8723" href="#bib47" name="bbib47"><span data-dcnode-id="8724" instrument_node="">Hodgson, Cunningham, McGee, Kinne, &amp; Murphy, 2017</span></a><span data-dcnode-id="8722" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8720" href="#bib63" name="bbib63"><span data-dcnode-id="8721" instrument_node="">Lo &amp; Hew, 2021</span></a><span data-dcnode-id="8719" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8717" href="#bib88" name="bbib88"><span data-dcnode-id="8718" instrument_node="">Subramaniam &amp; Muniandy, 2019</span></a><span data-dcnode-id="8716" instrument_node="">) found no significant difference in behavioral engagement between flipped and non-flipped classrooms. Thus, the results found have been inconclusive.</span></p><p data-dcnode-id="8701" id="p0050"><span data-dcnode-id="8714" instrument_node="">Second, educational data are typically represented at multiple levels, including the class and student levels. Every student is nested within a particular class, and the teacher and students influence one another (</span><a class="workspace-trigger" data-dcnode-id="8712" href="#bib97" name="bbib97"><span data-dcnode-id="8713" instrument_node="">Young, Reynolds, &amp; Walberg, 1996</span></a><span data-dcnode-id="8711" instrument_node="">). To ensure the persistence of university students’ behavioral engagement in flipped classrooms, it is important to explore how students’ behavioral engagement can be promoted. Their behavioral engagement depends on student- and class-level factors (</span><a class="workspace-trigger" data-dcnode-id="8709" href="#bib37" name="bbib37"><span data-dcnode-id="8710" instrument_node="">Gasiewski, Eagan, Garcia, Hurtado, &amp; Chang, 2012</span></a><span data-dcnode-id="8708" instrument_node="">). The efficiency of the flipped classroom lies in instructor implementation in a classroom setting (</span><a class="workspace-trigger" data-dcnode-id="8706" href="#bib28" name="bbib28"><span data-dcnode-id="8707" instrument_node="">DeLozier &amp; Rhodes, 2017</span></a><span data-dcnode-id="8705" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8703" href="#bib45" name="bbib45"><span data-dcnode-id="8704" instrument_node="">Hew, Bai, Dawson, &amp; Lo, 2021</span></a><span data-dcnode-id="8702" instrument_node="">). Variation in flipped classroom quality must be accounted for; class-level factors may reflect the variation.</span></p><p data-dcnode-id="8688" id="p0055"><span data-dcnode-id="8700" instrument_node="">The aim of this study is to address the research gaps in previous studies. Thus, the following research questions guided this study:</span></p><dl class="list" data-dcnode-id="8689"><dt class="list-label" data-dcnode-id="8698"><span data-dcnode-id="8699" instrument_node="">(1)</span></dt><dd class="list-description" data-dcnode-id="8695"><p data-dcnode-id="8696" id="p0060"><span data-dcnode-id="8697" instrument_node="">How do student- and class-level factors jointly promote students’ behavioral engagement in flipped classrooms?</span></p></dd><dt class="list-label" data-dcnode-id="8693"><span data-dcnode-id="8694" instrument_node="">(2)</span></dt><dd class="list-description" data-dcnode-id="8690"><p data-dcnode-id="8691" id="p0065"><span data-dcnode-id="8692" instrument_node="">What contradictions, if any, arise in students’ behavioral engagement in flipped classrooms?</span></p></dd></dl><p></p><p data-dcnode-id="8680" id="p0070"><span data-dcnode-id="8687" instrument_node="">To address the first question, we investigated student- and class-level factors based on the motivation-opportunity-ability (MOA) perspective and self-determinant theory (SDT) that can help understand how to promote students’ behavioral engagement in flipped classrooms. Our rationale is based on the MOA perspective: Students may have adequate motivation, but ability is needed to perform well in a flipped classroom. Moreover, although students may have adequate motivation, the classroom environment creates the opportunity for engagement. An important implication is that students’ behavioral engagement is enhanced by adequate motivation, readiness to engage in flipped learning, and high perceived teaching quality or perceived platform quality. According to SDT, engagement in human behavior is motivated by autonomous and controlled motivation (</span><a class="workspace-trigger" data-dcnode-id="8685" href="#bib25" name="bbib25"><span data-dcnode-id="8686" instrument_node="">Deci &amp; Ryan, 1985a</span></a><span data-dcnode-id="8684" instrument_node="">). Specifically, student-level motivation (autonomous and controlled motivation), student-level ability (perceived self-efficacy), and class-level opportunity (perceived teaching quality and perceived platform quality) may operate as co-determinants of students’ behavioral engagement in a flipped classroom. To address the second question, we used follow-up interviews and drew on </span><a class="workspace-trigger" data-dcnode-id="8682" href="#bib30" name="bbib30"><span data-dcnode-id="8683" instrument_node="">Engeström’s (1987)</span></a><span data-dcnode-id="8681" instrument_node=""> activity theory to find contradictions that arise in students’ behavioral engagement in flipped classrooms.</span></p></section><section data-dcnode-id="8465" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8675" id="sectitle0030"><span data-dcnode-id="8678" instrument_node="">2</span><span data-dcnode-id="8677" instrument_node="">. </span><span data-dcnode-id="8676" instrument_node="">Literature review</span></h2><section data-dcnode-id="8583" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8671" id="sectitle0035"><span data-dcnode-id="8674" instrument_node="">2.1</span><span data-dcnode-id="8673" instrument_node="">. </span><span data-dcnode-id="8672" instrument_node="">Factors influencing students’ behavioral engagement in flipped classrooms</span></h3><p data-dcnode-id="8660" id="p0075"><span data-dcnode-id="8670" instrument_node="">The term “student engagement” originated from school engagement (</span><a class="workspace-trigger" data-dcnode-id="8668" href="#bib35" name="bbib35"><span data-dcnode-id="8669" instrument_node="">Fredricks et al., 2004</span></a><span data-dcnode-id="8667" instrument_node="">). Student engagement refers to “the energy and effort that students employ within their learning community” (</span><a class="workspace-trigger" data-dcnode-id="8665" href="#bib16" name="bbib16"><span data-dcnode-id="8666" instrument_node="">Bond et al., 2020</span></a><span data-dcnode-id="8664" instrument_node="">, p. 3). In a systematic review of flipped classrooms in K–12 contexts, </span><a class="workspace-trigger" data-dcnode-id="8662" href="#bib14" name="bbib14"><span data-dcnode-id="8663" instrument_node="">Bond (2020)</span></a><span data-dcnode-id="8661" instrument_node=""> proposed that student engagement in a flipped classroom is influenced by the teacher, curriculum, technology, student, family, and peers. Teacher factors include teachers’ presence, feedback, support, time invested, information communication technology (ICT) skill, technology acceptance, use of technology, previous ICT experience, content expertise, professional development, and professional networks. The curriculum or activity factors include reinforcement, quality, design, challenge, usefulness, relevance, use of technology, hands-on activities, and alignment. Technology factors comprise content length, access to technology, usability, design, accessibility, technology choice, sense of community, supportiveness, assessment, and collaboration. Student factors include motivation, interest, identity, ICT skills, technology acceptance, previous ICT experience, personality, self-efficacy, self-regulation, well-being, and familiarity with the approach. Family factors are ICT skills, technology acceptance, previous ICT experience, parent education, relationships, parental engagement with learning, personal development, and engagement with content. Peer factors include creation of learning materials, opportunities to collaborate, respectful relationships, clear boundaries and expectations, seeing each other, sharing, and responding to the work of others.</span></p><p data-dcnode-id="8634" id="p0080"><span data-dcnode-id="8659" instrument_node="">In general, student engagement comprises three components: cognitive, behavioral, and emotional (</span><a class="workspace-trigger" data-dcnode-id="8657" href="#bib35" name="bbib35"><span data-dcnode-id="8658" instrument_node="">Fredricks et al., 2004</span></a><span data-dcnode-id="8656" instrument_node="">). According to </span><a class="workspace-trigger" data-dcnode-id="8654" href="#bib35" name="bbib35"><span data-dcnode-id="8655" instrument_node="">Fredricks et al. (2004)</span></a><span data-dcnode-id="8653" instrument_node="">, behavioral engagement consists of course participation, social activities, and extracurricular activities. They are essential for achieving good grades and reducing dropout rates. Emotional engagement includes positive and negative reactions to teachers, classmates, and school. Cognitive engagement involves consideration and a willingness to work hard to understand complex ideas and acquire difficult skills. The three components are conceptually separate; for example, people can be behaviorally active but not engaged cognitively or emotionally in a task (</span><a class="workspace-trigger" data-dcnode-id="8651" href="#bib12" name="bbib12"><span data-dcnode-id="8652" instrument_node="">Ben-Eliyahu, Moore, Dorph, &amp; Schunn, 2018</span></a><span data-dcnode-id="8650" instrument_node="">). According to </span><a class="workspace-trigger" data-dcnode-id="8648" href="#bib14" name="bbib14"><span data-dcnode-id="8649" instrument_node="">Bond (2020)</span></a><span data-dcnode-id="8647" instrument_node="">, “behavioral engagement relates to persistence, participation, and positive conduct” (p. 3). Pre- and in-class behavioral engagement is important in the flipped classroom (</span><a class="workspace-trigger" data-dcnode-id="8645" href="#bib59" name="bbib59"><span data-dcnode-id="8646" instrument_node="">Lai, 2021</span></a><span data-dcnode-id="8644" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8642" href="#bib63" name="bbib63"><span data-dcnode-id="8643" instrument_node="">Lo &amp; Hew, 2021</span></a><span data-dcnode-id="8641" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8639" href="#bib74" name="bbib74"><span data-dcnode-id="8640" instrument_node="">Ranellucci et al., 2021</span></a><span data-dcnode-id="8638" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8636" href="#bib94" name="bbib94"><span data-dcnode-id="8637" instrument_node="">Wang, 2019</span></a><span data-dcnode-id="8635" instrument_node="">). To understand the level of students’ participation in flipped classroom activities, we considered engagement mainly from the behavioral perspective, such as reviewing class materials before class, asking questions in class, thinking possible solutions, expressing views, and discussing with peers and teachers.</span></p><p data-dcnode-id="8594" id="p0085"><span data-dcnode-id="8633" instrument_node="">A growing body of literature addresses issues surrounding behavioral engagement in flipped classrooms in different subject domains. For example, </span><a class="workspace-trigger" data-dcnode-id="8631" href="#bib59" name="bbib59"><span data-dcnode-id="8632" instrument_node="">Lai (2021)</span></a><span data-dcnode-id="8626"><span data-dcnode-id="8630" instrument_node=""> used a cross-sectional survey and moderated </span><a class="topic-link" data-dcnode-id="8628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/multiple-regression-analysis" title="Learn more about multiple regression analysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8629" instrument_node="">multiple regression analysis</span></a><span data-dcnode-id="8627" instrument_node=""> in management-related courses at a Taiwanese university. The results showed that interest value, utility value, and group peer interaction are positively related to students’ behavioral engagement, whereas perceived task difficulty is negatively related to students’ behavioral engagement. </span></span><a class="workspace-trigger" data-dcnode-id="8624" href="#bib63" name="bbib63"><span data-dcnode-id="8625" instrument_node="">Lo and Hew (2021)</span></a><span data-dcnode-id="8623" instrument_node=""> conducted a series of studies; the Study 5 results showed no significant difference between the traditional lecture and flipped classroom approaches. </span><a class="workspace-trigger" data-dcnode-id="8621" href="#bib74" name="bbib74"><span data-dcnode-id="8622" instrument_node="">Ranellucci et al. (2021)</span></a><span data-dcnode-id="8620" instrument_node=""> investigated longitudinal relations among emotions, engagement, and academic achievement throughout the semester of a flipped anatomy course. In that study, in-class positive-activated emotions and out-of-class positive-activated emotions were positively related to in- and out-of-class behavioral engagement. Notably, out-of-class behavioral engagement predicted academic achievement. </span><a class="workspace-trigger" data-dcnode-id="8618" href="#bib49" name="bbib49"><span data-dcnode-id="8619" instrument_node="">Huang, Hew, and Lo (2019)</span></a><span data-dcnode-id="8613"><span data-dcnode-id="8617" instrument_node=""> examined the use of gamification-enhanced flipped and non-gamified flipped classrooms in behavioral engagement in pre- and post-class activities (e.g., thinking activities and quizzes) in an information management course. The results showed that the gamification-enhanced flipped classroom group was more likely to complete the weekly pre- and post-class activities on time than the non-gamified group. The researchers revealed the effectiveness of using </span><a class="topic-link" data-dcnode-id="8615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/gamification" title="Learn more about gamification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8616" instrument_node="">gamification</span></a><span data-dcnode-id="8614" instrument_node=""> to encourage students’ behavioral engagement in out-of-class activities in flipped classrooms. In studies of the flipped classroom approach in higher education, </span></span><a class="workspace-trigger" data-dcnode-id="8611" href="#bib70" name="bbib70"><span data-dcnode-id="8612" instrument_node="">Murillo-Zamorano, Sánchez, and Godoy-Caballero (2019)</span></a><span data-dcnode-id="8610" instrument_node=""> confirmed that flipped classrooms positively affect students’ knowledge, skills, and engagement. The researchers also proposed a four-dimension flipped classroom measurement scale that includes out-of-class activities, feedback, in-class activities, and technology utilization. In a quasi-experimental study comparing flipped classrooms and traditional lectures with a sample of students in a Malaysian pre-university Computer Science program, </span><a class="workspace-trigger" data-dcnode-id="8608" href="#bib88" name="bbib88"><span data-dcnode-id="8609" instrument_node="">Subramaniam and Muniandy (2019)</span></a><span data-dcnode-id="8607" instrument_node=""> found no significant difference in behavioral engagement between flipped and traditional lecture classrooms. </span><a class="workspace-trigger" data-dcnode-id="8605" href="#bib94" name="bbib94"><span data-dcnode-id="8606" instrument_node="">Wang (2019)</span></a><span data-dcnode-id="8604" instrument_node=""> used log data from 431 undergraduate students across nine programming-related courses and found that engagement in self-reflection and self-assessment indirectly affect achievement mediated by engagement with out-of-class problem solving. Engagement in out-of-class learning is important in mediating the relationship between engagement in in-class learning and achievement. </span><a class="workspace-trigger" data-dcnode-id="8602" href="#bib29" name="bbib29"><span data-dcnode-id="8603" instrument_node="">Elmaadaway (2018)</span></a><span data-dcnode-id="8601" instrument_node=""> used quantitative descriptive analysis of 58 undergraduate students in a Blackboard course at a Saudi university and showed that students in flipped classrooms exhibit greater behavioral engagement than students in traditional lecture classrooms. </span><a class="workspace-trigger" data-dcnode-id="8599" href="#bib18" name="bbib18"><span data-dcnode-id="8600" instrument_node="">Burke and Fedorek (2017)</span></a><span data-dcnode-id="8598" instrument_node=""> found that although flipped classrooms utilize active learning and are designed to increase student engagement, when student engagement is measured, students in the flipped classroom feel less engaged compared with students in traditional and online classrooms. </span><a class="workspace-trigger" data-dcnode-id="8596" href="#bib47" name="bbib47"><span data-dcnode-id="8597" instrument_node="">Hodgson et al. (2017)</span></a><span data-dcnode-id="8595" instrument_node=""> selected three pre-college mathematics classrooms and conducted direct observations of three teachers and their students in flipped and traditional classrooms. The researchers found that in two of the three observed settings, there was no significant difference in behavioral engagement between the students in the flipped and non-flipped classrooms.</span></p><p data-dcnode-id="8584" id="p0090"><a class="workspace-trigger" data-dcnode-id="8592" href="#bib47" name="bbib47"><span data-dcnode-id="8593" instrument_node="">Hodgson et al. (2017)</span></a><span data-dcnode-id="8591" instrument_node=""> suggested that students’ behavioral engagement depends on whether the classroom is flipped and on the teachers’ actions, students’ characteristics, and other contextual factors. We have summarized and compared recent studies based on instructional strategy, students’ characteristics, and contextual factors (see </span><a class="workspace-trigger" data-dcnode-id="8589" href="#appsec1" name="bappsec1"><span data-dcnode-id="8590" instrument_node="">Appendix A</span></a><span data-dcnode-id="8588" instrument_node="">). There are two research gaps in previous studies on flipped classrooms. First, the findings in studies that compared traditional lectures and flipped classrooms in predicting students’ behavioral engagement are mixed. This problem may be resolved by simultaneously including student- and class-level factors to understand how to promote students’ behavioral engagement in flipped classrooms. Second, the relatively small sample sizes in most previous research might have caused the mixed results. Thus, the statistics should be interpreted cautiously. If the sample size is too small, a well-designed study may fail to detect important associations (</span><a class="workspace-trigger" data-dcnode-id="8586" href="#bib83" name="bbib83"><span data-dcnode-id="8587" instrument_node="">Singh &amp; Masuku, 2014</span></a><span data-dcnode-id="8585" instrument_node="">).</span></p></section><section data-dcnode-id="8551" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8579" id="sectitle0040"><span data-dcnode-id="8582" instrument_node="">2.2</span><span data-dcnode-id="8581" instrument_node="">. </span><span data-dcnode-id="8580" instrument_node="">Motivation-opportunity-ability perspective</span></h3><p data-dcnode-id="8552" id="p0095"><span data-dcnode-id="8574"><span data-dcnode-id="8578" instrument_node="">MOA originated from theoretical discussions among industrial </span><a class="topic-link" data-dcnode-id="8576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/psychologists" title="Learn more about psychologists from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8577" instrument_node="">psychologists</span></a><span data-dcnode-id="8575" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8572" href="#bib82" name="bbib82"><span data-dcnode-id="8573" instrument_node="">Siemsen, Roth, &amp; Balasubramanian, 2008</span></a><span data-dcnode-id="8571" instrument_node="">). They assumed that three dimensions—motivation, opportunity, and ability—directly and mutually influence behavior. However, the causal relationship between the dimensions is unclear. The relevant research can be divided into two main streams. First, the relationship between motivation and behavior might be affected by opportunity and ability (</span><a class="workspace-trigger" data-dcnode-id="8569" href="#bib50" name="bbib50"><span data-dcnode-id="8570" instrument_node="">Hughes, 2007</span></a><span data-dcnode-id="8568" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8566" href="#bib65" name="bbib65"><span data-dcnode-id="8567" instrument_node="">MacInnis &amp; Jaworski, 1989</span></a><span data-dcnode-id="8565" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8563" href="#bib85" name="bbib85"><span data-dcnode-id="8564" instrument_node="">Sonnenberg &amp; Erasmus, 2013</span></a><span data-dcnode-id="8562" instrument_node="">). For example, </span><a class="workspace-trigger" data-dcnode-id="8560" href="#bib100" name="bbib100"><span data-dcnode-id="8561" instrument_node="">Lai, Hsiao, and Hsieh (2018)</span></a><span data-dcnode-id="8559" instrument_node=""> applied the MOA perspective to behavioral intentions in flipped classrooms and confirmed that motivation, opportunity, and ability have a ternary interaction. The researchers found that when all three dimensions are high, behavioral intentions are the highest. Second, behavior is directly affected by motivation, opportunity, and ability, and motivation and ability are mediating variables. For example, </span><a class="workspace-trigger" data-dcnode-id="8557" href="#bib54" name="bbib54"><span data-dcnode-id="8558" instrument_node="">Kettinger, Li, Davis, and Kettinger (2015)</span></a><span data-dcnode-id="8556" instrument_node=""> confirmed the causal relationship of opportunity→ability→motivation. </span><a class="workspace-trigger" data-dcnode-id="8554" href="#bib62" name="bbib62"><span data-dcnode-id="8555" instrument_node="">Li, Xu, Chen, &amp; Menassa, 2019</span></a><span data-dcnode-id="8553" instrument_node=""> indicated that motivation is a mediating variable, and that opportunity and ability affect motivation, which, in turn, affects behavior.</span></p></section><section data-dcnode-id="8532" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8547" id="sectitle0045"><span data-dcnode-id="8550" instrument_node="">2.3</span><span data-dcnode-id="8549" instrument_node="">. </span><span data-dcnode-id="8548" instrument_node="">Self-determination theory</span></h3><p data-dcnode-id="8533" id="p0100"><span data-dcnode-id="8546" instrument_node="">SDT is a frequently used theory for motivation development and psychological needs, and for understanding how and why individual behavior occurs (</span><a class="workspace-trigger" data-dcnode-id="8544" href="#bib77" name="bbib77"><span data-dcnode-id="8545" instrument_node="">Ryan &amp; Deci, 2000a</span></a><span data-dcnode-id="8543" instrument_node="">). The central idea of SDT is that individual behavior depends on general and stable motivation, such as autonomous motivation or controlled motivation (</span><a class="workspace-trigger" data-dcnode-id="8541" href="#bib26" name="bbib26"><span data-dcnode-id="8542" instrument_node="">Deci &amp; Ryan, 1985b</span></a><span data-dcnode-id="8540" instrument_node="">). The difference between these two types of motivation reflects why an individual engages in a task and is driven by whether the task can meet the individual’s psychological needs (</span><a class="workspace-trigger" data-dcnode-id="8538" href="#bib40" name="bbib40"><span data-dcnode-id="8539" instrument_node="">Hagger et al., 2014</span></a><span data-dcnode-id="8537" instrument_node="">). Individuals with autonomous motivation might do something without any external reinforcement. In contrast, people with controlled motivation feel responsibility and pressure (such as reducing guilt and shame) when they perform behaviors. Removing the pressure might stop certain behaviors (</span><a class="workspace-trigger" data-dcnode-id="8535" href="#bib40" name="bbib40"><span data-dcnode-id="8536" instrument_node="">Hagger et al., 2014</span></a><span data-dcnode-id="8534" instrument_node="">).</span></p></section><section data-dcnode-id="8466" id="sec2.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8528" id="sectitle0050"><span data-dcnode-id="8531" instrument_node="">2.4</span><span data-dcnode-id="8530" instrument_node="">. </span><span data-dcnode-id="8529" instrument_node="">Activity theory</span></h3><div data-dcnode-id="8481"><p data-dcnode-id="8506" id="p0105"><a class="workspace-trigger" data-dcnode-id="8526" href="#bib30" name="bbib30"><span data-dcnode-id="8527" instrument_node="">Engeström (1987)</span></a><span data-dcnode-id="8525" instrument_node=""> stated that an activity system has six components (see </span><a class="workspace-trigger" data-dcnode-id="8523" href="#fig1" name="bfig1"><span data-dcnode-id="8524" instrument_node="">Fig. 1</span></a><span data-dcnode-id="8522" instrument_node="">). Each component has cultural and historical dimensions (</span><a class="workspace-trigger" data-dcnode-id="8520" href="#bib101" name="bbib101"><span data-dcnode-id="8521" instrument_node="">Uden &amp; Vecchio, 2018</span></a><span data-dcnode-id="8519" instrument_node="">). Activity systems are dynamic, undergoing constant change and development in activity theory. According to </span><a class="workspace-trigger" data-dcnode-id="8517" href="#bib101" name="bbib101"><span data-dcnode-id="8518" instrument_node="">Uden and Vecchio (2018)</span></a><span data-dcnode-id="8516" instrument_node="">, a contradiction is the ongoing breakdown and temporary resolution of inner relations among the six components of the system. They are the causes of the dynamic change. We used activity theory in this study to analyze flipped classrooms because it is important to treat the learning system (flipped classroom) as a unit, not as separate parts. Using contradictions enables us to pinpoint the difference between elements, activities, or development stages for the same activity (</span><a class="workspace-trigger" data-dcnode-id="8514" href="#bib6" name="bbib6"><span data-dcnode-id="8515" instrument_node="">Uden &amp; Hwang, 2013</span></a><span data-dcnode-id="8513" instrument_node="">). Differences are revealed as clashes, conflicts, failures, and problems. Contradictions in activity theory are sources of development. </span><a class="workspace-trigger" data-dcnode-id="8511" href="#bib33" name="bbib33"><span data-dcnode-id="8512" instrument_node="">Foot (2001)</span></a><span data-dcnode-id="8510" instrument_node=""> argued that activities are always in the working process through some contradictions and contradictions that expose opportunities for creative innovations for structuring and enacting the activity. According to </span><a class="workspace-trigger" data-dcnode-id="8508" href="#bib30" name="bbib30"><span data-dcnode-id="8509" instrument_node="">Engeström (1987)</span></a><span data-dcnode-id="8507" instrument_node="">, every activity system has four levels of contradictions, which must be examined in a working environment such as a flipped classroom. The four levels are denoted as 1, 2, 3, and 4.</span></p><figure class="figure text-xs" data-dcnode-id="8482" id="fig1"><span data-dcnode-id="8490"><img alt="Fig. 1" aria-describedby="cap0010" data-dcnode-id="8505" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr1.jpg&amp;raw"><span data-dcnode-id="8504" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8491"><li data-dcnode-id="8498"><a class="anchor download-link u-font-sans" data-dcnode-id="8499" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr1_lrg.jpg" target="_blank" title="Download high-res image (168KB)"><span class="anchor-text" data-dcnode-id="8500"><span data-dcnode-id="8503" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8501"><span data-dcnode-id="8502" instrument_node="">Download high-res image (168KB)</span></span></span></a></li><li data-dcnode-id="8492"><a class="anchor download-link u-font-sans" data-dcnode-id="8493" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8494"><span data-dcnode-id="8497" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8495"><span data-dcnode-id="8496" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8483"><span data-dcnode-id="8484" id="cap0010"><p data-dcnode-id="8485" id="fspara0010"><span class="label" data-dcnode-id="8488"><span data-dcnode-id="8489" instrument_node="">Fig. 1</span></span><span data-dcnode-id="8487" instrument_node="">. </span><span data-dcnode-id="8486" instrument_node="">Students’ and teachers’ activity systems.</span></p></span></span></figure></div><p data-dcnode-id="8467" id="p0110"><span data-dcnode-id="8480" instrument_node="">Level 1 is the primary contradiction. It is found within a single component of the activity system and arises from the tension between use value and exchange value. The primary contradiction is the basic source of instability and development, and it diffuses to every corner of the triangle (</span><a class="workspace-trigger" data-dcnode-id="8478" href="#bib30" name="bbib30"><span data-dcnode-id="8479" instrument_node="">Engeström, 1987</span></a><span data-dcnode-id="8477" instrument_node="">). The primary contradiction can be understood as “breakdowns between actions or sets of actions that realize the activity” (</span><a class="workspace-trigger" data-dcnode-id="8475" href="#bib5" name="bbib5"><span data-dcnode-id="8476" instrument_node="">Uden, 2007</span></a><span data-dcnode-id="8474" instrument_node="">, p. 87). Secondary contradictions (level 2) occur between the component nodes, for example, between the knowledge of the subject (student) and the tool he or she is using, such as a flipped classroom. Tertiary contradictions (level 3) happen “between an existing activity and what is described as a more advanced form of that activity” (</span><a class="workspace-trigger" data-dcnode-id="8472" href="#bib5" name="bbib5"><span data-dcnode-id="8473" instrument_node="">Uden, 2007</span></a><span data-dcnode-id="8471" instrument_node="">, p. 87). This may occur when an activity is restructured to accommodate new motives or methods of working. Quaternary contradictions (level 4) are contradictions “between the central activity and the neighboring activities, e.g. instrument-producing, subject-producing, and rule-producing activities” (</span><a class="workspace-trigger" data-dcnode-id="8469" href="#bib5" name="bbib5"><span data-dcnode-id="8470" instrument_node="">Uden, 2007</span></a><span data-dcnode-id="8468" instrument_node="">, p. 87).</span></p></section></section><section data-dcnode-id="8154" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8461" id="sectitle0055"><span data-dcnode-id="8464" instrument_node="">3</span><span data-dcnode-id="8463" instrument_node="">. </span><span data-dcnode-id="8462" instrument_node="">Research model and hypotheses</span></h2><section data-dcnode-id="8426" id="sec3.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8457" id="sectitle0060"><span data-dcnode-id="8460" instrument_node="">3.1</span><span data-dcnode-id="8459" instrument_node="">. </span><span data-dcnode-id="8458" instrument_node="">Research model</span></h3><div data-dcnode-id="8427"><p data-dcnode-id="8452" id="p0115"><span data-dcnode-id="8456" instrument_node="">To understand how student- and class-level factors promote students’ behavioral engagement in flipped classrooms, we developed a cross-level moderation model (</span><a class="workspace-trigger" data-dcnode-id="8454" href="#fig2" name="bfig2"><span data-dcnode-id="8455" instrument_node="">Fig. 2</span></a><span data-dcnode-id="8453" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="8428" id="fig2"><span data-dcnode-id="8436"><img alt="Fig. 2" aria-describedby="cap0015" data-dcnode-id="8451" height="365" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr2.jpg&amp;raw"><span data-dcnode-id="8450" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8437"><li data-dcnode-id="8444"><a class="anchor download-link u-font-sans" data-dcnode-id="8445" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr2_lrg.jpg" target="_blank" title="Download high-res image (340KB)"><span class="anchor-text" data-dcnode-id="8446"><span data-dcnode-id="8449" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8447"><span data-dcnode-id="8448" instrument_node="">Download high-res image (340KB)</span></span></span></a></li><li data-dcnode-id="8438"><a class="anchor download-link u-font-sans" data-dcnode-id="8439" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360131521001950-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8440"><span data-dcnode-id="8443" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8441"><span data-dcnode-id="8442" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8429"><span data-dcnode-id="8430" id="cap0015"><p data-dcnode-id="8431" id="fspara0015"><span class="label" data-dcnode-id="8434"><span data-dcnode-id="8435" instrument_node="">Fig. 2</span></span><span data-dcnode-id="8433" instrument_node="">. </span><span data-dcnode-id="8432" instrument_node="">Research model.</span></p></span></span></figure></div></section><section data-dcnode-id="8155" id="sec3.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8422" id="sectitle0065"><span data-dcnode-id="8425" instrument_node="">3.2</span><span data-dcnode-id="8424" instrument_node="">. </span><span data-dcnode-id="8423" instrument_node="">Research hypotheses</span></h3><section data-dcnode-id="8284" id="sec3.2.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8418" id="sectitle0070"><span data-dcnode-id="8421" instrument_node="">3.2.1</span><span data-dcnode-id="8420" instrument_node="">. </span><span data-dcnode-id="8419" instrument_node="">Level 1 model</span></h4><p data-dcnode-id="8392" id="p0120"><span data-dcnode-id="8417" instrument_node="">Self-efficacy can be regarded as a self-regulation mechanism (</span><a class="workspace-trigger" data-dcnode-id="8415" href="#bib66" name="bbib66"><span data-dcnode-id="8416" instrument_node="">Maricuțoiu &amp; Sulea, 2019</span></a><span data-dcnode-id="8414" instrument_node="">). People accomplish tasks depending on their skills and beliefs in efficacy (</span><a class="workspace-trigger" data-dcnode-id="8412" href="#bib10" name="bbib10"><span data-dcnode-id="8413" instrument_node="">Bandura, 1993</span></a><span data-dcnode-id="8411" instrument_node="">). Individuals with the same knowledge and skills may perform differently depending on fluctuations in individuals self-efficacy beliefs (</span><a class="workspace-trigger" data-dcnode-id="8409" href="#bib10" name="bbib10"><span data-dcnode-id="8410" instrument_node="">Bandura, 1993</span></a><span data-dcnode-id="8408" instrument_node="">). An increase in self-efficacy may produce a change in human behavior (</span><a class="workspace-trigger" data-dcnode-id="8406" href="#bib9" name="bbib9"><span data-dcnode-id="8407" instrument_node="">Bandura, 1977</span></a><span data-dcnode-id="8405" instrument_node="">). According to </span><a class="workspace-trigger" data-dcnode-id="8403" href="#bib66" name="bbib66"><span data-dcnode-id="8404" instrument_node="">Maricuțoiu and Sulea (2019)</span></a><span data-dcnode-id="8402" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="8400" href="#bib12" name="bbib12"><span data-dcnode-id="8401" instrument_node="">Ben-Eliyahu et al. (2018)</span></a><span data-dcnode-id="8399" instrument_node="">, students’ perceived self-efficacy is a key driver that affects engagement. Thus, we hypothesize the following:</span></p><section data-dcnode-id="8393"><p data-dcnode-id="8396" id="enun_H1"><strong data-dcnode-id="8397"><span data-dcnode-id="8398" instrument_node="">H1</span></strong></p><p data-dcnode-id="8394" id="p0125"><span data-dcnode-id="8395" instrument_node="">Perceived self-efficacy is positively related to students’ behavioral engagement.</span></p></section><p></p><p data-dcnode-id="8369" id="p0130"><span data-dcnode-id="8391" instrument_node="">The effect of the flipped classroom model may depend on students’ motivation (</span><a class="workspace-trigger" data-dcnode-id="8389" href="#bib1" name="bbib1"><span data-dcnode-id="8390" instrument_node="">van Alten, Phielix, Janssen, &amp; Kester, 2019</span></a><span data-dcnode-id="8388" instrument_node="">), as the use of flipped classrooms is mandatory in many courses. Students do not react in the same way to a required context. An antecedent of student engagement is motivation (</span><a class="workspace-trigger" data-dcnode-id="8386" href="#bib16" name="bbib16"><span data-dcnode-id="8387" instrument_node="">Bond et al., 2020</span></a><span data-dcnode-id="8385" instrument_node="">), which is a relatively stable personal trait that can explain students’ actions (</span><a class="workspace-trigger" data-dcnode-id="8383" href="#bib77" name="bbib77"><span data-dcnode-id="8384" instrument_node="">Ryan &amp; Deci, 2000a</span></a><span data-dcnode-id="8382" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8380" href="#bib79" name="bbib79"><span data-dcnode-id="8381" instrument_node="">2002</span></a><span data-dcnode-id="8379" instrument_node="">) and can be divided into autonomous motivation and controlled motivation (</span><a class="workspace-trigger" data-dcnode-id="8377" href="#bib26" name="bbib26"><span data-dcnode-id="8378" instrument_node="">Deci &amp; Ryan, 1985b</span></a><span data-dcnode-id="8376" instrument_node="">). When external factors control a student’s behavior, he or she tends to be driven by controlled motivation. When a student is interested in doing what he or she wants to do, the student tends to be driven by autonomous motivation, which leads to better results (</span><a class="workspace-trigger" data-dcnode-id="8374" href="#bib26" name="bbib26"><span data-dcnode-id="8375" instrument_node="">Deci &amp; Ryan, 1985b</span></a><span data-dcnode-id="8373" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8371" href="#bib36" name="bbib36"><span data-dcnode-id="8372" instrument_node="">Gagné &amp; Deci, 2005</span></a><span data-dcnode-id="8370" instrument_node="">).</span></p><p data-dcnode-id="8346" id="p0135"><span data-dcnode-id="8368" instrument_node="">According to SDT, an individual with autonomous motivation can choose freely, which is helpful for persistence, interest, and enthusiasm (</span><a class="workspace-trigger" data-dcnode-id="8366" href="#bib38" name="bbib38"><span data-dcnode-id="8367" instrument_node="">Grant, Nurmohamed, Ashford, &amp; Dekas, 2011</span></a><span data-dcnode-id="8365" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8363" href="#bib78" name="bbib78"><span data-dcnode-id="8364" instrument_node="">Ryan &amp; Deci, 2000b</span></a><span data-dcnode-id="8362" instrument_node="">), is more willing to take the initiative (</span><a class="workspace-trigger" data-dcnode-id="8360" href="#bib38" name="bbib38"><span data-dcnode-id="8361" instrument_node="">Grant et al., 2011</span></a><span data-dcnode-id="8359" instrument_node="">), and is more deeply engaged (</span><a class="workspace-trigger" data-dcnode-id="8357" href="#bib80" name="bbib80"><span data-dcnode-id="8358" instrument_node="">Ryan &amp; Deci, 2006</span></a><span data-dcnode-id="8356" instrument_node="">). A student with high autonomous motivation, for example, shows “self-determination, competence challenge, task involvement, curiosity, enjoyment, and interest” (</span><a class="workspace-trigger" data-dcnode-id="8354" href="#bib3" name="bbib3"><span data-dcnode-id="8355" instrument_node="">Amabile, 1993</span></a><span data-dcnode-id="8353" instrument_node="">, p. 190). The flipped classroom emphasizes students’ active participation in learning (</span><a class="workspace-trigger" data-dcnode-id="8351" href="#bib32" name="bbib32"><span data-dcnode-id="8352" instrument_node="">Fidalgo-Blanco et al., 2017</span></a><span data-dcnode-id="8350" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8348" href="#bib86" name="bbib86"><span data-dcnode-id="8349" instrument_node="">Steen-Utheim &amp; Foldnes, 2018</span></a><span data-dcnode-id="8347" instrument_node="">). Therefore, autonomous motivation might affect students’ behavioral engagement.</span></p><p data-dcnode-id="8317" id="p0140"><span data-dcnode-id="8345" instrument_node="">Adding to autonomous motivation, a behavioral motivation might be unwilling, passive obedience (</span><a class="workspace-trigger" data-dcnode-id="8343" href="#bib78" name="bbib78"><span data-dcnode-id="8344" instrument_node="">Ryan &amp; Deci, 2000b</span></a><span data-dcnode-id="8342" instrument_node="">), with external pressure (</span><a class="workspace-trigger" data-dcnode-id="8340" href="#bib77" name="bbib77"><span data-dcnode-id="8341" instrument_node="">Ryan &amp; Deci, 2000a</span></a><span data-dcnode-id="8339" instrument_node="">). Such motivation is characterized by feeling controlled and constrained (</span><a class="workspace-trigger" data-dcnode-id="8337" href="#bib3" name="bbib3"><span data-dcnode-id="8338" instrument_node="">Amabile, 1993</span></a><span data-dcnode-id="8336" instrument_node="">). Controlled motivation implies that students perform tasks because of pressure; they experience ambivalent emotions and might be reluctant to act or not be enthusiastic (</span><a class="workspace-trigger" data-dcnode-id="8334" href="#bib38" name="bbib38"><span data-dcnode-id="8335" instrument_node="">Grant et al., 2011</span></a><span data-dcnode-id="8333" instrument_node="">). Students tend to do only what is required (</span><a class="workspace-trigger" data-dcnode-id="8331" href="#bib80" name="bbib80"><span data-dcnode-id="8332" instrument_node="">Ryan &amp; Deci, 2006</span></a><span data-dcnode-id="8330" instrument_node="">). Therefore, students with controlled motivation are less willing to engage in flipped classroom activities. Thus, we hypothesize the following:</span></p><section data-dcnode-id="8324"><p data-dcnode-id="8327" id="enun_H2"><strong data-dcnode-id="8328"><span data-dcnode-id="8329" instrument_node="">H2</span></strong></p><p data-dcnode-id="8325" id="p0145"><span data-dcnode-id="8326" instrument_node="">Autonomous motivation is positively related to students’ behavioral engagement.</span></p></section><section data-dcnode-id="8318"><p data-dcnode-id="8321" id="enun_H3"><strong data-dcnode-id="8322"><span data-dcnode-id="8323" instrument_node="">H3</span></strong></p><p data-dcnode-id="8319" id="p0150"><span data-dcnode-id="8320" instrument_node="">Controlled motivation is negatively related to students’ behavioral engagement.</span></p></section><p></p><p data-dcnode-id="8301" id="p0155"><a class="workspace-trigger" data-dcnode-id="8315" href="#enun_H2" name="benun_H2"><span data-dcnode-id="8316" instrument_node="">Hypothesis 2</span></a><span data-dcnode-id="8314" instrument_node=""> suggests there is a positive relationship between autonomous motivation and students’ behavioral engagement in flipped classrooms. However, this relationship may depend on the students’ perceived self-efficacy. When perceived self-efficacy is high, students believe they possess adequate technical skills required for a specific domain (</span><a class="workspace-trigger" data-dcnode-id="8312" href="#bib53" name="bbib53"><span data-dcnode-id="8313" instrument_node="">Joshi &amp; Kuhn, 2011</span></a><span data-dcnode-id="8311" instrument_node="">) and are likely to participate in course tasks more frequently. Students with high self-efficacy may prefer behaviors that students feel they are good at (</span><a class="workspace-trigger" data-dcnode-id="8309" href="#bib60" name="bbib60"><span data-dcnode-id="8310" instrument_node="">Lam &amp; Lee, 2006</span></a><span data-dcnode-id="8308" instrument_node="">). Thus, autonomous motivation may have a stronger influence on behavioral engagement when students’ perceived self-efficacy is high. Conversely, when students have low perceived self-efficacy, they may feel less confident in their technical skills in executing course tasks, and the relationship between autonomous motivation and behavioral engagement is likely to be weak. Thus, we hypothesize the following:</span></p><section data-dcnode-id="8302"><p data-dcnode-id="8305" id="enun_H4"><strong data-dcnode-id="8306"><span data-dcnode-id="8307" instrument_node="">H4</span></strong></p><p data-dcnode-id="8303" id="p0160"><span data-dcnode-id="8304" instrument_node="">Perceived self-efficacy moderates the positive relationship between autonomous motivation and students’ behavioral engagement such that when students have high perceived self-efficacy, the positive relationship becomes stronger.</span></p></section><p></p><p data-dcnode-id="8285" id="p0165"><a class="workspace-trigger" data-dcnode-id="8299" href="#enun_H3" name="benun_H3"><span data-dcnode-id="8300" instrument_node="">Hypothesis 3</span></a><span data-dcnode-id="8298" instrument_node=""> suggests a negative relationship between controlled motivation and students’ behavioral engagement in flipped classrooms. This relationship is likely moderated by perceived self-efficacy. When students have high perceived self-efficacy, they may believe that they can competently and comfortably use the flipped classroom model (</span><a class="workspace-trigger" data-dcnode-id="8296" href="#bib92" name="bbib92"><span data-dcnode-id="8297" instrument_node="">Vandenbosch &amp; Higgins, 1995</span></a><span data-dcnode-id="8295" instrument_node="">). Controlled motivation may not matter, as the students’ self-efficacy perception might lead them to maximize their ability. Conversely, when students have low perceived self-efficacy, they may feel more anxious (</span><a class="workspace-trigger" data-dcnode-id="8293" href="#bib60" name="bbib60"><span data-dcnode-id="8294" instrument_node="">Lam &amp; Lee, 2006</span></a><span data-dcnode-id="8292" instrument_node="">). Such anxiety may deter behavioral engagement in the flipped classroom. From this discussion, we hypothesize that the relationship between controlled motivation and students’ behavioral engagement becomes more strongly negative when the students have low perceived self-efficacy. Thus, we hypothesize the following:</span></p><section data-dcnode-id="8286"><p data-dcnode-id="8289" id="enun_H5"><strong data-dcnode-id="8290"><span data-dcnode-id="8291" instrument_node="">H5</span></strong></p><p data-dcnode-id="8287" id="p0170"><span data-dcnode-id="8288" instrument_node="">Perceived self-efficacy moderates the negative relationship between controlled motivation and students’ behavioral engagement such that when the students have low perceived self-efficacy, the negative relationship becomes stronger.</span></p></section><p></p></section><section data-dcnode-id="8209" id="sec3.2.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8280" id="sectitle0075"><span data-dcnode-id="8283" instrument_node="">3.2.2</span><span data-dcnode-id="8282" instrument_node="">. </span><span data-dcnode-id="8281" instrument_node="">Level 2 model</span></h4><p data-dcnode-id="8245" id="p0175"><span data-dcnode-id="8279" instrument_node="">Perceived teaching quality and perceived platform quality are class-level factors in the flipped classroom environment. An important factor of the flipped classroom method is that teachers fully use class time to pass on internalized knowledge, such as asking questions, co-solving, and interacting with students (</span><a class="workspace-trigger" data-dcnode-id="8277" href="#bib32" name="bbib32"><span data-dcnode-id="8278" instrument_node="">Fidalgo-Blanco et al., 2017</span></a><span data-dcnode-id="8276" instrument_node="">); that is, teaching and teachers are central to student engagement (</span><a class="workspace-trigger" data-dcnode-id="8274" href="#bib98" name="bbib98"><span data-dcnode-id="8275" instrument_node="">Zepke, Leach, &amp; Butler, 2014</span></a><span data-dcnode-id="8273" instrument_node="">). Teachers act as facilitators and helpers instead of information providers (</span><a class="workspace-trigger" data-dcnode-id="8271" href="#bib27" name="bbib27"><span data-dcnode-id="8272" instrument_node="">Dehghanzadeh &amp; Jafaraghaee, 2018</span></a><span data-dcnode-id="8270" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8268" href="#bib55" name="bbib55"><span data-dcnode-id="8269" instrument_node="">Kim et al., 2014</span></a><span data-dcnode-id="8267" instrument_node="">) and support students’ knowledge construction through feedback (</span><a class="workspace-trigger" data-dcnode-id="8265" href="#bib23" name="bbib23"><span data-dcnode-id="8266" instrument_node="">Coll, Rochera, &amp; Gispert, 2014</span></a><span data-dcnode-id="8264" instrument_node="">). For example, teachers do not correct students’ answers directly but provide detailed suggestions (</span><a class="workspace-trigger" data-dcnode-id="8262" href="#bib2" name="bbib2"><span data-dcnode-id="8263" instrument_node="">Alvarez, Espasa, &amp; Guasch, 2012</span></a><span data-dcnode-id="8261" instrument_node="">) or references to help students self-revise and reflect on the learning process (</span><a class="workspace-trigger" data-dcnode-id="8259" href="#bib96" name="bbib96"><span data-dcnode-id="8260" instrument_node="">Wolsey, 2008</span></a><span data-dcnode-id="8258" instrument_node="">), or encourage students who were not actively involved (</span><a class="workspace-trigger" data-dcnode-id="8256" href="#bib90" name="bbib90"><span data-dcnode-id="8257" instrument_node="">Sun et al., 2018</span></a><span data-dcnode-id="8255" instrument_node="">). This supportive classroom promotes positive self-perception, which, in turn, affects students’ behavioral engagement (</span><a class="workspace-trigger" data-dcnode-id="8253" href="#bib84" name="bbib84"><span data-dcnode-id="8254" instrument_node="">Skinner, Furrer, Marchand, &amp; Kindermann, 2008</span></a><span data-dcnode-id="8252" instrument_node="">). Thus, we hypothesize the following:</span></p><section data-dcnode-id="8246"><p data-dcnode-id="8249" id="enun_H6"><strong data-dcnode-id="8250"><span data-dcnode-id="8251" instrument_node="">H6</span></strong></p><p data-dcnode-id="8247" id="p0180"><span data-dcnode-id="8248" instrument_node="">Perceived teaching quality is positively related to students’ behavioral engagement.</span></p></section><p></p><p data-dcnode-id="8210" id="p0185"><span data-dcnode-id="8244" instrument_node="">Technology is an influential factor in fostering student engagement in higher education contexts (</span><a class="workspace-trigger" data-dcnode-id="8242" href="#bib15" name="bbib15"><span data-dcnode-id="8243" instrument_node="">Bond &amp; Bedenlier, 2019</span></a><span data-dcnode-id="8241" instrument_node="">). The flipped classroom emphasizes a technology-mediated environment (</span><a class="workspace-trigger" data-dcnode-id="8239" href="#bib4" name="bbib4"><span data-dcnode-id="8240" instrument_node="">Amstelveen, 2019</span></a><span data-dcnode-id="8238" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8236" href="#bib14" name="bbib14"><span data-dcnode-id="8237" instrument_node="">Bond, 2020</span></a><span data-dcnode-id="8235" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8233" href="#bib76" name="bbib76"><span data-dcnode-id="8234" instrument_node="">Reyna, 2015</span></a><span data-dcnode-id="8232" instrument_node="">), for example, using online videos, LMSs, Khan Academy, YouTube, Edmodo, Moodle, Google Docs, and Google Classroom that enhance student engagement (</span><a class="workspace-trigger" data-dcnode-id="8230" href="#bib14" name="bbib14"><span data-dcnode-id="8231" instrument_node="">Bond, 2020</span></a><span data-dcnode-id="8229" instrument_node="">). The disadvantage is that instructional videos often have huge challenges, including how to explain a concept clearly and concisely, present the visuals, and dissect the video theme. The advantage is that flipped classrooms can be integrated into an online learning platform, which can automatically record all activities in the classroom, and students can read the materials any time. Students can also upload, discuss, collaborate, and share information on the learning platform (</span><a class="workspace-trigger" data-dcnode-id="8227" href="#bib20" name="bbib20"><span data-dcnode-id="8228" instrument_node="">Chen, Wang, Kinshuk, &amp; Chen, 2014</span></a><span data-dcnode-id="8226" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8224" href="#bib19" name="bbib19"><span data-dcnode-id="8225" instrument_node="">Cheng, Hwang, &amp; Lai, 2020</span></a><span data-dcnode-id="8223" instrument_node="">). It can also help students learn according to their rhythm, and engagement in the class preparation process increases (</span><a class="workspace-trigger" data-dcnode-id="8221" href="#bib57" name="bbib57"><span data-dcnode-id="8222" instrument_node="">Kong, 2014</span></a><span data-dcnode-id="8220" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8218" href="#bib58" name="bbib58"><span data-dcnode-id="8219" instrument_node="">2015</span></a><span data-dcnode-id="8217" instrument_node="">). Thus, we propose the following hypothesis:</span></p><section data-dcnode-id="8211"><p data-dcnode-id="8214" id="enun_H7"><strong data-dcnode-id="8215"><span data-dcnode-id="8216" instrument_node="">H7</span></strong></p><p data-dcnode-id="8212" id="p0190"><span data-dcnode-id="8213" instrument_node="">Perceived platform quality is positively related to students’ behavioral engagement.</span></p></section><p></p></section><section data-dcnode-id="8156" id="sec3.2.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8205" id="sectitle0080"><span data-dcnode-id="8208" instrument_node="">3.2.3</span><span data-dcnode-id="8207" instrument_node="">. </span><span data-dcnode-id="8206" instrument_node="">Cross-level model</span></h4><p data-dcnode-id="8194" id="p0195"><span data-dcnode-id="8204" instrument_node="">A positive relationship between autonomous motivation and students’ behavioral engagement is expected, and perceived teaching quality is likely to moderate the relationship. Student engagement is determined by student factors and the interaction between the teacher and the students (</span><a class="workspace-trigger" data-dcnode-id="8202" href="#bib37" name="bbib37"><span data-dcnode-id="8203" instrument_node="">Gasiewski et al., 2012</span></a><span data-dcnode-id="8201" instrument_node="">). Low perceived teaching quality can lead to even students with autonomous motivation and interest having lower behavioral engagement in the flipped classroom. Conversely, high perceived teaching quality can make autonomous motivation a salient motivator for engaging in the flipped classroom. Thus, we posit that high perceived teaching quality makes the relationship between autonomous motivation and students’ behavioral engagement more positive. Therefore, we hypothesize the following:</span></p><section data-dcnode-id="8195"><p data-dcnode-id="8198" id="enun_H8"><strong data-dcnode-id="8199"><span data-dcnode-id="8200" instrument_node="">H8</span></strong></p><p data-dcnode-id="8196" id="p0200"><span data-dcnode-id="8197" instrument_node="">Perceived teaching quality moderates the positive relationship between autonomous motivation and students’ behavioral engagement such that when perceived teaching quality is high, the positive relationship becomes stronger.</
