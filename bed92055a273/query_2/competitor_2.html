sh Gelernter"><span data-dcnode-id="785" instrument_node="">About Josh Gelernter</span></a></li></ul></div></div></div></div><span class="article-author__timestamp" data-dcnode-id="773"><span data-dcnode-id="774"><time class="article-header__meta-pubdate separator" data-dcnode-id="775" datetime="2014-09-06T04:00:52-04:00" title="September 6, 2014 4:00 AM"><span data-dcnode-id="776" instrument_node="">September 6, 2014 4:00 AM</span></time></span></span></div><div class="article-author--right" data-dcnode-id="767"><button class="listen-to-article button" data-dcnode-id="768" type="button"><span data-dcnode-id="771" instrument_node="">Listen to article</span><svg data-dcnode-id="769" fill="none" height="11" width="11" xmlns="http://www.w3.org/2000/svg"><path d="M1.216 10.868a.455.455 0 01-.455-.453V.453A.451.451 0 011.21 0a.456.456 0 01.226.056l9.09 4.981a.454.454 0 010 .794l-9.09 4.98a.457.457 0 01-.22.057z" data-dcnode-id="770" fill="#2D2D2D"></path></svg></button></div></div></div><div class="article-header__subtitle" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">The Department of Justice thinks voter IDs are unfair.</span></div><div class="section-content--full section-content--thin" data-dcnode-id="595"><div class="article-content article-content--headless" data-dcnode-id="651"><p data-dcnode-id="758"><span data-dcnode-id="759"><span class="drop" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">I</span></span><span data-dcnode-id="760" instrument_node="">t’s September now, in a midterm year, and election season is going to suck up a lot of national attention over the next two months. Hot election topics will include voter IDs and voter suppression: In August, a federal judge declined to issue an injunction against a North Carolina law that requires voters to show photo IDs; this week a federal trial began of a voter ID law in Texas. The DOJ believes that requiring people to have photo IDs is an unreasonably onerous burden. This is a good time, then, to talk about voter suppression.</span></span></p><span data-dcnode-id="757" instrument_node="">
</span><span data-dcnode-id="756" instrument_node="">
</span><aside class="ad-unit ad-unit--center ad-unit--inline" data-dcnode-id="752"><div class="ad-unit__inner" data-dcnode-id="753"><div class="ad-skeleton ad-skeleton--728-90 ad-skeleton--nr_desktop_728x90_1" data-dcnode-id="754" style="height: 90px; width: 728px;"><div class="dfp-ad dfp-nr_desktop_728x90_1" data-dcnode-id="755" id="div-gpt-pb-desk-nr_desktop_728x90_1"></div></div></div></aside><aside class="aside-module aside-module--top-stories aside-module--top-stories--desktop" data-dcnode-id="705"><div class="aside-content" data-dcnode-id="706"><h3 class="aside-module__title" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Top Stories</span></h3><div class="post-list post-list--vertical-ruled post-list--aside-top-stories" data-dcnode-id="707"><div class="post-list-article" data-dcnode-id="740"><div class="post-list-article__text" data-dcnode-id="741"><div class="post-list-article__meta-wrapper" data-dcnode-id="742"><h4 class="post-list-article__title" data-dcnode-id="746"><a data-dcnode-id="747" data-testid="dynamic-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalreview.com/news/fbi-conducted-3-4-million-data-record-searches-in-2021-according-to-report/%3Futm_source%3Drecirc-desktop%26utm_medium%3Darticle%26utm_campaign%3Dright-rail%26utm_content%3Dtop-stories%26utm_term%3Dfirst"><span data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">FBI Conducted Millions of Warrantless Searches of Americans’ Data in 2021: Report</span></span></a></h4><div class="post-list-article__meta" data-dcnode-id="743"><span class="post-list-article__meta-author" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Arjun Singh</span></span></div></div></div></div><div class="post-list-article" data-dcnode-id="724"><div class="post-list-article__text" data-dcnode-id="725"><div class="post-list-article__meta-wrapper" data-dcnode-id="726"><h4 class="post-list-article__title" data-dcnode-id="736"><a data-dcnode-id="737" data-testid="dynamic-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalreview.com/2022/04/nina-jankowicz-bidens-disinformation-board-chief-must-be-placed-in-an-ankle-monitor/%3Futm_source%3Drecirc-desktop%26utm_medium%3Darticle%26utm_campaign%3Dright-rail%26utm_content%3Dtop-stories%26utm_term%3Dsecond"><span data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Nina Jankowicz, Biden’s ‘Disinformation Board’ Chief, Must Be Placed in an Ankle Monitor</span></span></a></h4><div class="post-list-article__meta" data-dcnode-id="727"><span class="post-list-article__meta-author" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Charles C. W. Cooke</span></span><div class="premium-badge" data-dcnode-id="728"><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalreview.com/tag/nrplus-member-articles/"><span class="premium-badge__nr" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">NR</span></span><span class="premium-badge__plus" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">PLUS</span></span></a></div></div></div></div></div><div class="post-list-article" data-dcnode-id="708"><div class="post-list-article__text" data-dcnode-id="709"><div class="post-list-article__meta-wrapper" data-dcnode-id="710"><h4 class="post-list-article__title" data-dcnode-id="720"><a data-dcnode-id="721" data-testid="dynamic-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalreview.com/2022/04/with-biden-reckless-and-congress-awol-will-the-supreme-court-save-remain-in-mexico/%3Futm_source%3Drecirc-desktop%26utm_medium%3Darticle%26utm_campaign%3Dright-rail%26utm_content%3Dtop-stories%26utm_term%3Dthird"><span data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">With Biden Reckless and Congress AWOL, Will the Supreme Court Save ‘Remain in Mexico’?</span></span></a></h4><div class="post-list-article__meta" data-dcnode-id="711"><span class="post-list-article__meta-author" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Andrew C. McCarthy</span></span><div class="premium-badge" data-dcnode-id="712"><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalreview.com/tag/nrplus-member-articles/"><span class="premium-badge__nr" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">NR</span></span><span class="premium-badge__plus" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">PLUS</span></span></a></div></div></div></div></div></div></div></aside><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">By and large, 18-year-olds know nothing and shouldn’t be voting. Let’s suppress them.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Of course you can produce anecdotal evidence to the contrary, evidence of 18-year-olds who don’t know nothing. I’m sure everyone can find a thoughtful 18-year-old who ought to be voting. But if you go to any college campus and talk to the first thousand 18-year-olds you meet, you’ll find five who are qualified to vote and eight hundred who don’t know who Churchill was.</span></p><span data-dcnode-id="698" instrument_node="">
</span><div class="article-connatix-wrap" data-dcnode-id="695"></div><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">If you don’t believe me, I suggest you actually go to a college campus and talk to some students. A lot of them won’t be able to identify the decade in which the Berlin Wall came down. Many of them will have very firm opinions on politics, but won’t know the difference between the debt and the deficit. A lot of them will think the Civil War happened in the 18th century, and a lot will think the Revolution happened in the 1800s. They won’t be able to summarize five amendments in the Bill of Rights, name five presidents between Lincoln and Truman, or name 15 elements on the periodic table.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">It’s not their fault; their schools (and parents) have failed them. Education in this country has gone to hell. Some colleges will do some remedial blank-filling, some won’t, and some kids won’t go to college. But by the time they’re — say — 21, at least they’ll have a little more life under their belts. Some of them will — for instance — have learned what it’s like paying taxes, or paying for groceries.</span></p><span data-dcnode-id="688" instrument_node="">
</span><aside class="ad-unit ad-unit--center ad-unit--inline" data-dcnode-id="684"><div class="ad-unit__inner" data-dcnode-id="685"><div class="ad-skeleton ad-skeleton--728-90 ad-skeleton--nr_desktop_728x90_2" data-dcnode-id="686" style="height: 90px; width: 728px;"><div class="dfp-ad dfp-nr_desktop_728x90_2" data-dcnode-id="687" id="div-gpt-pb-desk-nr_desktop_728x90_2"></div></div></div></aside><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Of course, the voting age will never be raised. That would require a constitutional amendment, which would require two-thirds of both houses and three-fourths of the states. And that would likely require 18-, 19-, and 20-year-olds voting against their right to vote.</span></p><span data-dcnode-id="680" instrument_node="">
</span><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">If only we had something to offer them in return. The age of franchise was lowered to 18 because 18-year-olds can be drafted. When the lowering happened, in ’71, 18-year-olds were being drafted and sent to Vietnam. It seemed fair to let people fighting a war help choose the people running the war. Though of course you could argue that people reach physical maturity before mental maturity, which is why you don’t get a driver’s license when you hit puberty.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">But anyway: At the moment, in the United States, the legal view is that if you’re old enough to fight, you’re old enough to vote — but you’re not old enough to buy liquor. The drinking age is 21. Why can’t someone buy liquor till he’s 21? Because, say the lawmakers, at 18, you’re not old enough to make mature decisions about issues as weighty as alcohol.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">It’s true, the weightiest issue on the minds of 18-, 19-, and 20-year-olds (by and large) is how to get alcohol. They may not know when the market crashed, but they certainly know which bars will serve them and which delis will sell them beer. (I know what I’m talking about; four years ago I was 20.) So, I propose a trade. Raise the voting age to 21 and lower the drinking age to 18, all in one tidy amendment. Surviving three years of being able to drink legally is a good test of fitness to vote, anyway, and maybe this deal could get a little momentum.</span></p><span data-dcnode-id="670" instrument_node="">
</span><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Or maybe, no matter how much a thoughtful electorate might like the voting age raised, they won’t accept the drinking age being lowered. After all, drinking is serious business. We don’t want people who aren’t supposed to drink drinking. That’s why you can’t do it without a photo ID.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="656"><span class="bioline" data-dcnode-id="657"><em data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">— Josh Gelernter writes weekly for </span></em><span data-dcnode-id="663" instrument_node="">NRO</span><em data-dcnode-id="661"><span data-dcnode-id="662" instrument_node=""> and is a regular contributor to </span></em><span data-dcnode-id="660" instrument_node="">The Weekly Standard</span><em data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">.</span></em></span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">&nbsp;</span></p><span data-dcnode-id="652" instrument_node="">
</span></div><div class="article-next-up" data-dcnode-id="645"><a data-dcnode-id="646" data-testid="dynamic-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalreview.com/2014/09/paul-ryan-vs-gop-consulting-class-matthew-continetti/%3Futm_source%3Drecirc-desktop%26utm_medium%3Darticle%26utm_campaign%3Driver%26utm_content%3Dnext-article%26utm_term%3Dfirst"><span class="article-next-up--label" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Next Article</span></span><span class="article-next-up--title" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Paul Ryan vs. the GOP Consulting Class</span></span></a></div><div class="nrplus-cta-wrap" data-dcnode-id="617"><div class="nrplus-cta" data-dcnode-id="618"><h4 data-dcnode-id="642"><span data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Something to Consider</span></span></h4><div class="nrplus-cta--content" data-dcnode-id="619"><div class="nrplus-cta--content--desktop" data-dcnode-id="624"><span data-dcnode-id="625"><p data-dcnode-id="629"><span data-dcnode-id="641" instrument_node="">If you enjoyed this article, we have a proposition for you:&nbsp;</span><a data-dcnode-id="637" data-saferedirecturl="https://www.google.com/url?q=http://www.nationalreview.com/subscribe&amp;source=gmail&amp;ust=1636057300450000&amp;usg=AFQjCNFh_3gOCB3qLnNQLo5QhH0Y291gKg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nationalreview.com/subscribe" rel="noopener"><span data-dcnode-id="640" instrument_node="">Join&nbsp;</span><span class="il" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">NRPLUS</span></span></a><span data-dcnode-id="636" instrument_node="">. Members get all of our content on the site including the digital magazine and archives, no paywalls or content meters, an advertising-minimal experience, and unique access to our writers and editors (through conference calls, social media gr
