</span><div class="rxbodyfield" data-dcnode-id="5373"><p data-dcnode-id="5388"><span data-dcnode-id="5398" instrument_node="">At Oakland University we train scholars and future professionals. But more importantly, we help build informed and active citizens with an eye toward issues of public concern and importance locally, nationally and globally. Our students are empowered to think about dynamic solutions to tackle real-world problems. We challenge the status quo and train tomorrow’s leaders to collaboratively approach complicated problems and unearth new solutions that will move our communities forward.</span><br data-dcnode-id="5397"><br data-dcnode-id="5396"><span data-dcnode-id="5395" instrument_node="">The Oakland University Center for Civic Engagement (CCE) takes important issues of public concern and public policy out of the classroom and actively engages many different stakeholders — includes students, faculty, policy makers and community members — in non-partisan, deliberative and productive dialogue. Indeed, democracy is better served through respectful discussions about important issues.</span><br data-dcnode-id="5394"><br data-dcnode-id="5393"><span data-dcnode-id="5392" instrument_node="">In short, the Center for Civic Engagement acts as a “convener of conversations” on a variety of issues that impact the local, state and federal levels. These types of events are designed to lead to a more informed citizenry in the surrounding communities.</span><br data-dcnode-id="5391"><br data-dcnode-id="5390"><span data-dcnode-id="5389" instrument_node="">The Oakland University Center for Civic Engagement serves the OU and surrounding community by:</span></p><ul data-dcnode-id="5379"><li data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">Informing the campus and community about important issues of public concern through non-partisan dialogue</span></li><li data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">Supporting and undertaking efforts to enhance civic engagement and civic literacy</span></li><li data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">Promoting research related to public policy to inform policy makers and the public</span></li><li data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">Encouraging student involvement in civic engagement and public policy through volunteerism, internships and experiential learning&nbsp;</span></li></ul><p data-dcnode-id="5374"><span data-dcnode-id="5378" instrument_node="">For more information on the Center for Civic Engagement, please contact Dave Dulio at </span><a data-dcnode-id="5376" href="mailto:ddulio@oakland.edu"><span data-dcnode-id="5377" instrument_node="">ddulio@oakland.edu</span></a><span data-dcnode-id="5375" instrument_node="">.</span></p></div></div><span data-dcnode-id="5371" instrument_node="">
</span></div><span data-dcnode-id="5369" instrument_node="">
</span><div class="perc-widget" data-dcnode-id="5360"><span data-dcnode-id="5368" instrument_node="">
</span><div data-dcnode-id="5362"><span data-dcnode-id="5367" instrument_node="">
</span><div class="rxbodyfield" data-dcnode-id="5363"><p data-dcnode-id="5364"><span data-dcnode-id="5365" style="font-weight: 400;"><span data-dcnode-id="5366" instrument_node="">The CCE translates academic knowledge into experiential learning by sending our students and faculty into the community to build solutions. As a “convener of conversations,” we invite and host policy experts to campus and create opportunities for the community to attend panels and engage with these experts. We provide forums for public dialogue to take place, host elected officials on campus to discuss important issues of the day, and work to take OU faculty into the community to share their expertise on a wide range of topics. Utilizing technology, these conversations are shared with an even larger audience through podcasts and social media channels. Where appropriate, CCE partners with community organizations — civic, nonprofit and other public organizations in southeastern Michigan and across the state — to expand our reach into different communities. We aim to help create a more informed citizenry and build democracy through non-partisan, respectful and deliberative discussions about important issues of public concern and policy.</span></span></p></div></div><span data-dcnode-id="5361" instrument_node="">

</span><div data-dcnode-id="4805" tabindex="0"><div class="rxbodyfield" data-dcnode-id="4806"><p data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">My name is Dave Dulio and I am a professor in the Political Science Department at Oakland University. I’m also really pleased to say that I am the director of a new and exciting initiative here at OU – the Center for Civic Engagement.</span></p><p data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">Generally, “civic” refers to those aspects of our lives that involve being an active participant in our democratic society. Activities for the Center will focus on things like political participation, enhancing civic literacy, and hosting civil, respectful, and deliberative conversations about issues of public concern.</span></p><p data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">Civic engagement on our campus is not new; it has been happening here for years. In fact, that’s why we are here at historic Meadow Brook Hall. Civic engagement at OU can be traced back to Matilda Dodge Wilson, OU’s founder, who was the first female lieutenant governor or Michigan (or any state) and who served on the state board of education. One could say that civic engagement is in our blood. In more recent years, we’ve hosted a presidential primary debate and had numerous dignitaries visit campus to address our students and members of the community. We’ve also created special collections in Kresge Library featuring former members of Congress and hosted countless of discussions about issues ranging from election results to foreign policy.</span></p><p data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">The Center will work to broaden these efforts and make them more accessible, conduct them more intentionally, and support the efforts of others who engage in civic engagement efforts across campus.</span></p><p data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">One of the main goals of the Center is to establish for Oakland University as a “convener of conversations” related to issues of public importance. This could be in the form of town hall meeting focused on issues or with elected officials, panel discussions about relevant public policy issues, candidate debates, or other formats.</span></p><p data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">The opportunities to expand civic engagement work on campus are nearly boundless and extend to all corners of campus. Issues of public (and campus) concern stretch across our institution.</span></p><p data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">In the weeks, months, and years to come look for the Oakland University Center for Civic Engagement to be the pre-eminent platform for civic engagement work in Southeast Michigan.</span></p></div></div><span data-dcnode-id="4804" instrument_node="">

></body></html></iframe></div><details data-dcnode-id="1690"><summary data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">Transcript</span></summary><p data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Oakland University: Good evening.</span></p><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Oakland University: You can do better than that.</span></p><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Oakland University: that's better.</span></p><p data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">Oakland University: My name is Dave Dulio and i'm the director of the Center for civic engagement here at oakland university we're delighted to welcome you back once again for in person events here on campus.</span></p><p data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Oakland University: Thank you for following our protocols for code, including filling out your health screener and wearing your masks while you're seated, I would like to recognize a few people and say thank you.</span></p><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Oakland University: First, are terrific staff here in the open Center and our tech support folks they did yeoman's work preparing for this there's other folks in the audience that deserve recognition Rochelle black our Vice President for government and Community affairs is here thanks for shell.</span></p><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Oakland University: And certainly oakland university president or a Hirsch pescovitz deserves great thanks, there is no bigger supporter on campus of the work that we do, we are grateful and.</span></p><p data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Oakland University: And thankful for your continued and unwavering support i'd like to ask President pescovitz come up and just say a couple words.</span></p><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Oakland University: Thank you so much, Professor Giulio i'm just delighted to welcome everyone here, this is actually the first in person event.</span></p><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Oakland University: of our school year and I can't think of a more exciting event to actually start our academic year with all of you, as you know.</span></p><p data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Oakland University: The Center for civic engagement has titled this event toward a more perfect Union.</span></p><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Oakland University: And, as I thought about this, I realized that many of our students were actually not even alive 20 years ago when 911 happened, and so I do think that this will be a very important evening tonight as we discuss what happened in on 911.</span></p><p data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Oakland University: I also want to acknowledge the Center for civic engagement, because it is one of the most important centers that we have here at oakland university and i'm so thrilled that we have this Center under.</span></p><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Oakland University: Dr Julio his leadership and, of course, the rest of the political science department and as you're going to hear tonight we really have bipartisan support for this Center and I see that we have.</span></p><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Oakland University: Congressman Mike Rogers here from a distance, I can see you there, thank you very much for being with us.</span></p><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Oakland University: And of course representative alyssa slack in here with us and we're really delighted to have both of you here.</span></p><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Oakland University: One of the things that we pride ourselves on is civil discussion and.</span></p><p data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Oakland University: debate and tolerance and tolerance takes so many different forms and one of the forms is what you're going to hear tonight, and we are so proud of our Center in the way that we have these conversations together.</span></p><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Oakland University: And so i'm so thrilled to have this Center here at oakland university welcome, and thank you all for being here, both in person and online, thank you very much, Professor.</span></p><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Oakland University: Thank you, President pescovitz if you've been to one of the center's events before.</span></p><p data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Oakland University: You know that we serve as a convener of conversations about issues of public importance well the 20th anniversary of the 911 terrorist attacks is certainly one of those.</span></p><p data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Oakland University: The terrorist attacks on September 11 2001 changed our nation and change the world when nearly 3000 people lost their lives as hijack planes crashed into the World Trade Center the Pentagon and a field in shanksville Pennsylvania.</span></p><p data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Oakland University: we're here tonight to mark the anniversary of that fateful day.</span></p><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Oakland University: we're going to do so in another way tomorrow shameless plug.</span></p><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">Oakland University: In the same room at 7pm and we have a staged reading of a play called tower stories, it was written by damon demarco and the playwright used actual interviews with survivors.</span></p><p data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Oakland University: conducted over a year and a half past 911 tower stories explores the immediate impact of the terrorist attacks.</span></p><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Oakland University: of September 11 and you can just come right back to this room tomorrow at 7pm and hear a staged reading from students and recent alumni from our school of music theater and dance.</span></p><span data-dcnode-id="2529" instrument_node="">&gt; </span><p data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Oakland University: If you've been to one of the center's events you also know that we want to have these conversations in the right way.</span></p><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Oakland University: In other words, we want to support a conversation that occurs in a civil and respectful manner as President pescovitz matt mentioned to support that goal, the Center.</span></p><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Oakland University: has developed what we call the tenants of civic engagement and productive dialogue these tenants, are we will engage in respectful dialogue.</span></p><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Oakland University: employ honest listening model civil behavior in tone support free and open discourse consider viewpoints, other than our own find opportunities to agree not just disagree.</span></p><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">Oakland University: This conversation takes place at a time of great political polarization everyone knows that but let's remember that, in the wake of 911.</span></p><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Oakland University: In the wake of that tragedy our nation was united what's channel that tonight you may not agree with everything our guests, say, but that doesn't mean that they're the enemy.</span></p><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Oakland University: toward the end of the discussion we'll take some audience questions, those of you here in the oakland Center have a.</span></p><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Oakland University: piece of paper with a qr code on it, you can scan that, and you can get to a question submission page, those of you on zoom can use the chat function to submit a question.</span></p><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Oakland University: And with that let's welcome our guests moderating moderating our discussion this evening is route Raj he's The co anchor of the 5pm news on at fox two news Detroit.</span></p><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Oakland University: When candidates from either side of the aisle stop in Detroit route interviews them he's done exclusive interviews with folks like Joe Biden and Donald trump you may have heard of them.</span></p><p data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Oakland University: When Vice President kamala Harris came to Detroit recently to encourage covert vaccinations, the White House chose rupe to conduct an exclusive one on one interview.</span></p><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Oakland University: Prior to coming back to Detroit in 2009 roof was an anchor in flint in New Orleans Louisiana where I think he went through 24 hurricanes 2424 hurricanes.</span></p><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Oakland University: we're delighted and extremely grateful that he's going to lead the discussion this evening.</span></p><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Oakland University: US representative alyssa slotkin is in her second term representing michigan's eighth Congressional district prior to being elected to Congress representative slotkin spent her career in national service she served as a Middle East analyst with the CIA, working alongside the.</span></p><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Oakland University: US military during three tours in Iraq as a military expert.</span></p><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Oakland University: In between her tours in Iraq representative slot can help various Defense and intelligent positions, under President Bush and Obama.</span></p><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Oakland University: In 2011 representative slotkin took a senior position at the Pentagon, and until January 2017 she served as acting Assistant Secretary of Defense.</span></p><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Oakland University: For international security affairs in this role representative slotkin oversaw policy on Russia Europe, the Middle East and Africa at the Pentagon.</span></p><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Oakland University: Last but not least, joining us virtually from Washington DC Mike Rogers is a former member of Congress, representing michigan's eighth Congressional district.</span></p><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Oakland University: And he previously served as an officer in the US army and FBI as an FBI special agent.</span></p><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Oakland University: Congressman Rogers built a reputation as a leader on intelligence cyber security and national security policy from his years of service in the US House of Representatives.</span></p><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Oakland University: where he chaired the powerful house permanent Select Committee on intelligence, as chairman, he authorized and oversaw a budget of $70 billion that funded this nation's 17 intelligence agencies, including a large portion of the national security space.</span></p><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Oakland University: Architecture on the hill Congressman Rogers worked across the aisle with two Presidents Congressional leadership countless diplomats.</span></p><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Oakland University: military service members and intelligence professionals to ensure the brave men and women who fight for our nation are equipped with the resources necessary to get the job done.</span></p><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Oakland University: Washington Post columnist David ignatius remarked that Congressman Rogers was a quote rare example of bipartisanship, in other words you'll be hard pressed to find two more experienced and informed individuals to talk about 911 20 years later, thank Professor Julia Thank you.</span></p><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Oakland University: Professor Professor Julia Thank you so much for your leadership and everything that you're doing with your students, I had the chance to.</span></p><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Oakland University: interview Professor Julio at about 445 today for our five o'clock news that I usually anchor I said, we have to cover this on the news we have to talk about this.</span></p><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Oakland University: Not just in this room and on zoom, but we need to talk about this on TV and so at five, six and 10 tonight you're going to be hearing from Mr Julio and also.</span></p><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Oakland University: Representative slotkin you know, I was talking to my photo journalist can to standing over here and we were discussing 911.</span></p><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Oakland University: And he brought up a really I think cogent and an important point about history September 9 20 years ago today an Afghan leader named met miss Massoud was killed.</span></p><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Oakland University: He was the victim of a Taliban attack the Taliban and those who are in charge of of Al Qaeda and the leadership in that terror cell.</span></p><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Oakland University: wanted to get rid of this man, so that they could go ahead and do what they were going to do, a few days later, and then try to.</span></p><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Oakland University: manipulate the world in a way that in which they could retain power you can't forget that it was on that sunny day on 911 that we remember where we were.</span></p><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Oakland University: But all the planning that went into this for those evil awful human beings, we cannot forget that either.</span></p><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Oakland University: And I want to really reflect for a moment on where our esteemed guests worth the time.</span></p><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Oakland University: And I want to begin with congresswoman slotkin before we get into some of the history, we want to talk about lessons learned, we want to talk about looking into the future, want to talk about civil discourse and how to have it.</span></p><p data-dcnode-id="2455"><span data-dcnode-id=" sage"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=-OmitELir3g" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><details data-dcnode-id="402"><summary data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Transcript</span></summary><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">David Dulio, Oakland University: Good morning, my name is Dave Julio I’m the director of the Center for civic engagement at Oakland university and I’m pleased to welcome you to defy the divide a path to civility.</span></p><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">David Dulio, Oakland University: Thank you again for being here we're also very grateful that our guests have taken time out of their busy schedules, to be part of this important discussion.</span></p><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">David Dulio, Oakland University: This event would not be possible without the help of a number of people.</span></p><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">David Dulio, Oakland University: Thanks to those who helped make it happen at the top of this list is oh you, President Ora Hirsch Pescovitz the Center for civic engagement has no bigger supporter on campus.</span></p><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">David Dulio, Oakland University: In addition, the office of government and community relations university communications and marketing the College of arts and sciences and event support services were great partners in planning this event.</span></p><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">David Dulio, Oakland University: Few other times in our nation's history has there been as pressing a need for public discussion about civility and respect in our national discourse, as there is today.</span></p><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">David Dulio, Oakland University: Oakland university is poised to be a leader in the effort to bring about a better public dialogue, in fact, the Center for civic engagement was started in part, to address the rancor that permeates today's political and civic life.</span></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">David Dulio, Oakland University: To support and foster a more civil and informative public dialogue about some of the fundamental issues dividing Americans.</span></p><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">David Dulio, Oakland University: The Center for civic engagement is launching a series of timely discussions, we are calling toward a more perfect Union.</span></p><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">David Dulio, Oakland University: This is the first session in that series now on to our panel I’ll keep this very brief as our guests are very well known.</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">David Dulio, Oakland University: we're delighted to welcome three of Michigan’s US representatives Elissa Slotkin who represents a portion of all US campus in addition to communities stretching from Rochester to Lansing.</span></p><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">David Dulio, Oakland University: Debbie Dingell who represents portions of Wayne and Washington, our counties and Fred Upton who represents communities and elegant Berrien cast Kalamazoo St Joseph and Van Buren counties all our Members of the US House is problem solvers Caucus.</span></p><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">David Dulio, Oakland University: The Caucuses website states quote only when we work together as Americans can we successfully break through the gridlock of today's politics.</span></p><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">David Dulio, Oakland University: More about the Caucus will certainly come up in the discussion, but I’ll note that Michigan is fortunate to have five members of this group, more than any other state.</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">David Dulio, Oakland University: we're pleased that we could get three of these Members schedules to align and for them to be here today.</span></p><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">David Dulio, Oakland University: guiding the conversation over the next hour or so, will be to others who need no introduction as they are two of our state's preeminent journalists Nolan Finley and Stephen Henderson.</span></p><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">David Dulio, Oakland University: We turn to them for moderators for a different reason, however, their work in starting the civility project which I’m sure they'll bring up during the conversation is much needed as part of the effort to bring about a better public dialogue.</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">David Dulio, Oakland University: As we do at all of our events at the Center for civic engagement I’d like to mention our tenants of civic engagement and productive dialogue.</span></p><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">David Dulio, Oakland University: These are simply guideposts as to how we want conversations to happen when we do have them, we want to engage in respectful dialogue we want to employ honest listening.</span></p><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">David Dulio, Oakland University: model civil behavior and tone support free and open discourse consider viewpoints, other than our own and find opportunities to agree not just agree not just disagree so with that I’ll turn it over to Nolan and Stephen Thank you again for being here and we look forward to the conversation.</span></p><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Nolan Finley: Well, thank you, David and thanks to Oakland university for hosting us today very important subject and a very.</span></p><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Nolan Finley: welcome addition this this whole civic engagement project you all have going on there couldn't be a better time for it and we appreciate Oakland university's efforts.</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Nolan Finley: In this regard, and thanks to our Congress members for joining us today why don't we start out by talking about the problem solvers Caucus what.</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Nolan Finley: What you all hope to accomplish with it, what you have accomplished, and you know what are the prospects that we will, that we will reach a point where we can govern together in Washington.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Congresswoman Debbie Dingell: you're good at it.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Stephen Henderson: Right well first.</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Congressman Fred Upton: pleasure to be here all three of us are happy to be here, that is for sure it's a very important topic comes summers Caucus actually started a couple years ago.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Congressman Fred Upton: Maybe three congress's ago I was not a founding member I’ll confess, but I’ve been very active, the last couple years said last Congress and certainly in this one.</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Congressman Fred Upton: couple things we've accomplished right away, first of all, we actually change the rules of the House to create more bipartisanship.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Congressman Fred Upton: And I give the democrats credit this all happened under Nancy Pelosi his watch and it was this Caucus, particularly the democrats in this Caucus who.</span></p><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Congressman Fred Upton: insisted for their vote for speaker that in fact the rules change, and I will say that had the Republicans won the majority back in 2018.</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Congressman Fred Upton: We had a number of us Republicans that would have insisted on the same changes, then with speak that would have been speaker Kevin McCarthy so that was it that was a big change.</span></p><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Congressman Fred Upton: The other thing a couple things that we've done, we have an absolute civility pledge that all of us take.</span></p><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Congressman Fred Upton: This is a Caucus with an equal number of Republicans and democrats we actually grew by six or eight Members in this Congress as well.</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Congressman Fred Upton: And we've been very active in pursuing a number of what I would call common sense legislative solutions on important national issues.</span></p><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Congressman Fred Upton: Elissa and I went down to the Texas border two years ago it was it was a crisis, then, as I would converse it's a crisis now.</span></p><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Congressman Fred Upton: But it was particularly alarming and with all these kids that were coming in and resources that were strapped so that our our law enforcement folks at the border didn't have the means to take care of us.</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Congressman Fred Upton: It was our group that forced the legislation through.</span></p><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Congressman Fred Upton: Immigration is a big issue we passed actually what I would call to pretty big important immigration measure just in the last couple weeks one dealing with agriculture.</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Congressman Fred Upton: With more than 300 ad groups supporting it, as well as the dreamers things that got stuck to me this side of me, the low hanging fruit, we need comprehensive immigration reform.</span></p><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Congressman Fred Upton: But we took these on his issues and last thing because I don't want to dominate the time we meet.</span></p><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Congressman Fred Upton: Before called it, we met at least once a week for an hour everyone left or labels at the door, there was no leaks, there was absolute.</span></p><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Congressman Fred Upton: work together, no one really pointed fingers in each other we've taken a pledge now to ever campaign against each other, so you really built that trust, which is important.</span></p><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Congressman Fred Upton: And now, because it call it really for a year we've been operating out of our homes and debbie's over to my house is my side porch.</span></p><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Congressman Fred Upton: But we actually are in touch with each other on zoom probably a couple times a week for a couple hours, actually, in fact, already this morning.</span></p><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Congressman Fred Upton: i've talked to our two leaders josh got married in New Jersey and Tom reed republican lead in New York state or can I couple different issues.</span></p><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Congressman Fred Upton: And it is you know with divided government, the only way you're going to get things done is to work together to have crushed with each other to have common sense and try to move the ball forward and that's what this clock is dedicated to.</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Congresswoman Debbie Dingell: Say and i'd like to build on what Fred said, which is to talk about why personal relationships matter.</span></p><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Congresswoman Debbie Dingell: You know it, there was a time when people got to know each other, they work together there's kids what kids went to school together.</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Congresswoman Debbie Dingell: They didn't go home every weekend and, by the way, I think people should be going home every weekend so but that adjustment of you know, is there a plane travel has become easier and regular, although we're all little afraid of it, these days, and coven.</span></p><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Congresswoman Debbie Dingell: People would have dinner said, have potluck dinners people get to know each other.</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Congresswoman Debbie Dingell: In everybody knows, I was married to john dingell he played paddleball every week with George Washington Rumsfeld, they were the best of friends for decades.</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Congresswoman Debbie Dingell: And people don't get develop those kind of relationships anymore and relationship building is critical to trust each other it's critical to work now I talked to Fred almost every day and the days that I don't talk to him when I go to bed i'm like I haven't talked to Fred today.</span></p><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Congressman Fred Upton: i'm already thinking about this.</span></p><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Congresswoman Debbie Dingell: morning.</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Stephen Henderson: We did talk this morning.</span></p><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Congresswoman Debbie Dingell: Before nine o'clock we do we're not afraid to I talked to haley it was another Member problem solvers at 6:45am we will call each other early do.</span></p><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Congresswoman Debbie Dingell: But I’m very clear every person in the Democratic Party new thread up since my one of my closest friends that I would not campaign against him, nor quite frankly I had known Peter Meyer and.</span></p><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Congresswoman Debbie Dingell: paint his father has been my friend, for decades, I serve on the jira for library with him and Gerald Ford school, and I would not campaign against Peter, because in the listen oh so I told people.</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Congresswoman Debbie Dingell: This is a friend, I think that those personal relationships matter and civility matters and you've got to build that trust and that's one of the keys to problem solvers getting to know each other.</span></p><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Congresswoman Elissa Slotkin: And I would just add from a from a perspective of someone who's only in their second term right, you know when I got elected in 2018 from a district that you know voted for Donald trump it is republican.</span></p><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Congresswoman Elissa Slotkin: You show up at Congress, you know in orientation and you say how do I find my people you know who am I going to connect with to get to know to really invest time in.</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Congresswoman Elissa Slotkin: And I took it as a mandate from my district and based on my national security background to find the people who really wanted to do that tough.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Congresswoman Elissa Slotkin: kind of network of bipartisanship, and so the problem solvers is literally the first group and frankly really the only group that I found that was a organized.</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Congresswoman Elissa Slotkin: equal numbers of democrats and Republicans met every week actually worked on legislation didn't leak on each other and and use somehow the press against each other and, at the end of the day.</span></p><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Congresswoman Elissa Slotkin: you realize, you know you, you have a cadre of people on both sides of the aisle who know that we don't agree on everything, and certainly we've had tough moments in the past year on, you know.</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Congresswoman Elissa Slotkin: How that's strained.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Congresswoman Elissa Slotkin: Any relationship, but t their facts are wrong is one of the hardest things to do in I don't know human interaction.</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Congresswoman Elissa Slotkin: But we cannot give up on people, we cannot just say well that's their America, and this is my America we're going to have different facts and that's it.</span></p><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Congresswoman Elissa Slotkin: The media has certain responsibilities social media has certain responsibilities.</span></p><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Congresswoman Elissa Slotkin: i'll be honest with you, you know all of us have probably seen intentional disinformation or misinformation come across our Facebook feeds our social media feeds, you know what you know you get a sense of when you see it.</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Congresswoman Elissa Slotkin: Has any one of us ever mistakenly seen child pornography as we're scrolling no because it's illegal for the social media companies to allow the spread of child pornography, I think one of the things that.</span></p><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Congresswoman Elissa Slotkin: I feel strongly about is that social media has come a long way in 20 years and we haven't really done our jobs in Congress to properly oversee and put some rules of the road in place.</span></p><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Congresswoman Elissa Slotkin: But to me that's some of the hardest work, we have to do, but the most important is talking to people who just have been educated and i'm talking about like my in laws i'm talking about my neighbors right and so i'm getting practiced and having the conversation but it's very difficult.</span></p><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Congresswoman Debbie Dingell: They head out hearing Fred and I have the energy and commerce committee just tap Facebook Twitter.</span></p><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Congresswoman Debbie Dingell: And Google in front of the committee and I actually will tell you it's the first time I see committee united on both sides in a.</span></p><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Congresswoman Debbie Dingell: holding them accountable for the disinformation and the fact of the matter is is that their revenue models is such that the more clicks to get the more money they make, and while they claim.</span></p><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Congresswoman Debbie Dingell: That they're cleaning up their act, the fact of the matter is that they're not, I think he will is Elissa said.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Congresswoman Debbie Dingell: See both energy and commerce in the Judiciary Committee, energy and commerce, should have the lead on this Friday I think you would agree that we will take.</span></p><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Congresswoman Debbie Dingell: It will be tough it's you know this is when you get to really sit down and do the nitty gritty and find where we can unite on this, but we have to do something about this, because people are believing what they are reading.</span></p><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Congresswoman Debbie Dingell: On the social media platforms Facebook was the most comments platform mentioned after the January six.</span></p><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Congresswoman Debbie Dingell: interaction Facebook was where the group that was going to kidnap the governor.</span></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Congresswoman Debbie Dingell: did most of their communications, all of us here that you're talking to today have had a number of threats and we it's a different day in agent it's not okay so.</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Congresswoman Debbie Dingell: They are contributing to it, it, we have to figure out how we address the problem in unfortunately the genies out of the bottle and a lot of this stuff.</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Nolan Finley: Good question.</span></p><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Nolan Finley: We got a lot of questions from our audience on the idea of franchising the problem solvers coc Caucus to the Senate is there a like minded group in the Senate, or is there a possibility that there will that one will be created.</span></p><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Congressman Fred Upton: Actually, there is it's called no labels, not in its bicameral so it's not just i'd say there's probably a bunch of Center you know this unit more collegial so they're all they all have their either ways are all you know they have lunch together every day.</span></p><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Congressman Fred Upton: But there's a bike camera group that's bipartisan we meet actually once a month and it's called no labels.</span></p><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Congressman Fred Upton: Actually, Governor hogan from Maryland is actually hosting an event on immigration, a little bit later this.</span></p><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Congressman Fred Upton: This month, they put out an invite to a number of us to join them to say that we don't have boards so and there's so there's a lot of you know, we talked about immigration, we were about ball with them on the carbon package had a number of meetings, together, we really.</span></p><p  seen so far.</span></p><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Congressman Fred Upton: Well, I reminded the White House of that very issue just yesterday. So.</span></p><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Congressman Fred Upton: read you my email, but I will but.</span></p><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Congressman Fred Upton: we'll see how it, how it develops, but you know we all want the President to succeed, this is a great country, we have to work together, we got a lot of issues.</span></p><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Congressman Fred Upton: That we have to really deal with and the best way to deal with them is in a bipartisan basis and.</span></p><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Congressman Fred Upton: you're right the last call that package, it was a purely partisan boat let's hope that they turn the page on that chapter.</span></p><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Congressman Fred Upton: And we can really resort to some true bipartisanship from both the House and the Senate infrastructure is a big need certainly for us admission.</span></p><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Congressman Fred Upton: Number the governor's say fix the damn roads they're not fixed, yet they need to be fixed we got a lot of issues we have to deal with whether it's.</span></p><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Congressman Fred Upton: The resilience of our grid, so what happened in Texas what always happens in California our lead in our water, the great living there's a lot of different issues, broadband that we can work on together.</span></p><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Congressman Fred Upton: and frankly would send a pretty good message to the rest of the country if in fact that we get this thing done in a bipartisan way so we'll see where it takes us the White House.</span></p><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Congresswoman Debbie Dingell: Is that I don't know, maybe a list has been to the White House I haven't been to the White House someday I know has been down there.</span></p><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Congresswoman Debbie Dingell: There yeah yeah so they're written I think they're so I don't know that any of the democrats in our delegations, the senators made, but the House been there, but they're reaching out to the Republicans and they're trying the list of me at them.</span></p><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Congresswoman Elissa Slotkin: yeah I would just say I think my approach on this is get caught trying right do everything you can to make something bipartisan because.</span></p><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Congresswoman Elissa Slotkin: The country needs to see that because that's what they want from their leaders right, but if you try and you try and you try and you can't compromise Well then, I understand the instinct to go ahead and move out.</span></p><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Congresswoman Elissa Slotkin: And I think that that is, to me, where I probably have a slight difference with the administration on approach is get caught trying let's let's open the door.</span></p><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Congresswoman Elissa Slotkin: And if they don't walk through it Okay, then we move on our own, and I think that.</span></p><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Congresswoman Elissa Slotkin: It would have been my hope that we would have approached Kobe that way, we said that as a problem solvers Caucus many of us put out.</span></p><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Congresswoman Elissa Slotkin: clear statements both publicly but also privately to our colleagues in the new White House.</span></p><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Congresswoman Elissa Slotkin: And you know again in the spirit of not just hitting home runs you know it's great if we pass these two massive bills.</span></p><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Congresswoman Elissa Slotkin: And then, what that's the only legislation we're going to actually pass into law in the next two years, I reject that.</span></p><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Congresswoman Elissa Slotkin: You know, we need to actually be getting to that right now that 60 vote majority in the Senate, we need to be putting up bills that meet that there's a ton of bipartisan bills from the House that are ready to be voted on by the Senate.</span></p><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Congresswoman Elissa Slotkin: i'll never understand why they just don't do a damn up or down vote and put people on record on these things like let them vote against a veteran's bill right go ahead if you're going to do that, so I think.</span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Congresswoman Elissa Slotkin: Some of us may have a slightly different approach, get caught trying.</span></p><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Congresswoman Debbie Dingell: On bipartisan show I would actually argue that they did try I know they try they talk to Republicans Fred know say talk to Republicans.</span></p><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Congresswoman Debbie Dingell: This was one of those times, where and Fred would have voted for some of these bills, except for some provisions in them and communicated it I would actually argue that the White House.</span></p><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Congresswoman Debbie Dingell: they're not talking to me or I mean they're talking but they're talking to Republicans, and I know they're talking to Republicans, and they very much are focused on this.</span></p><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Congresswoman Debbie Dingell: On the infrastructure bill, whether it works or not, but you have to remember that to pass a bill you got it goes to the House the Senate before it gets to the White House and there's leadership.</span></p><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Congresswoman Debbie Dingell: In there along the way, but I know that there's nobody I've known Joe Biden for.</span></p><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Congresswoman Debbie Dingell: 40 years and I know he is committed, I know what the staff has done that's how I know that they talked to Fred more than they talked to me.</span></p><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Congresswoman Debbie Dingell: They tell me they don't have much they talked alyssa but I know that they are very intentional about trying to get republican votes they're not getting there.</span></p><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Congresswoman Debbie Dingell: And we'll see I know that there are people in the White House that suggested that there should be.</span></p><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Congresswoman Debbie Dingell: A bill that has bipartisan agreement and the rest of things should be the different bill.</span></p><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Congresswoman Debbie Dingell: I hope i'm not making and others in the Congress did not want it to go that way, but there have been various here, I have to feel I do feel like I have to defend this administration that the President himself is trying to work with Republicans.</span></p><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Nolan Finley: We have time for final remarks from each of you final thoughts on what it's going to take to make consensus governing.</span></p><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Nolan Finley: The norm in Washington and in places like lansing and perhaps even in our local communities it's going to take to get back to that idea that compromise is a positive thing and not a negative thing.</span></p><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Congressman Fred Upton: Is we have no choice we have no choice, do you want to get things done yet to work together and that's why i'm absolutely committed that's why debbie and alyssa on the same page Peter Meyer.</span></p><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Congressman Fred Upton: Work we're all together on this and you know we're not here to to swing it windmills we're here to try and govern and do what's right for the country.</span></p><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Congresswoman Debbie Dingell: Congress meeting is it coming together.</span></p><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Congresswoman Debbie Dingell: compromises in a dirty word and we need to try to do that.</span></p><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Congresswoman Elissa Slotkin: And I would just say as a national security person I really feel like.</span></p><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Congresswoman Elissa Slotkin: You know, unlike the last 20 years where the greatest threat, I really felt to national security was the external threats right the foreign terrorist organizations that were seeking to attack us from abroad.</span></p><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Congresswoman Elissa Slotkin: I really think that the divisiveness between Americans is the greatest national security threat, certainly, because some people decide to like escalate and become extreme and terrorists.</span></p><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Congresswoman Elissa Slotkin: But honestly because it creates gridlock in governing and it makes people lose faith in democracy that is a threat to us, and so I guess you know, obviously in our own elected lives.</span></p><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Congresswoman Elissa Slotkin: We are all responsible for our own actions and our own decisions we've decided to think about what our roles mean for unifying the country, and until elected leaders realize that their job is to unify and not to split us apart we're going to have a real problem.</span></p><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Congresswoman Elissa Slotkin: And we're committed to working against that.</span></p><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Nolan Finley: Well, we appreciate you all for, thank you for your time today, thank you for what you're doing in Congress to make this a more functional society more a more pleasant place to live, thank you all.</span></p><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Congresswoman Elissa Slotkin: Thank you.</span></p><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Congressman Fred Upton: Good to be with you.</span></p></details></div></div></div><span data-dcnode-id="398" instrument_node="">
