</span><h1 class="entry-title" data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">IA: Political Engagement&nbsp;Activity</span></h1><span data-dcnode-id="1800" instrument_node=""> </span></header><span data-dcnode-id="1797" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1684"><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">The Political Engagement Activity (PEA) is one of the internally assessed components of the course and is compulsory for all students, whether you are taking the course at SL or HL. For SL students it is worth 25% of the final grade and for HL students it is worth 20% (HL students must also complete the Global Challenges HL Extension IA).</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Internally assessed means that your work will be marked in school by Ben or Mike depending on which class you are in. We then submit the marks to the IB who will ask us to send a sample of the work to be moderated (this means it will be remarked by a moderator working for the IB who will usually be a GloPo teacher in another school). If they decide that we have been to generous in our marking then they may adjust all our marks down by a certain percentage. Equally, if they decide we have been too harsh then the marks may be adjusted upwards. If the moderator feels that we have been inconsistent in our marking (eg. marking some of the sample too harshly and some too generously,) then the IB may ask for us to send all IAs and they will be remarked. It’s important to be aware that we both moderate each other’s marking in school as well as working with colleagues in other schools to try and ensure this does not happen but, more importantly, you realise that the aim of moderation is not to catch teachers and schools out but to ensure you get the grade you deserve and that marking across the subject, regardless of the school you attend, is fair.</span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1784" instrument_node="">
</span><h4 data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Introducing the Political Engagement Activity</span></h4><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">The first thing you should do is download a copy of the PEA student guide. This, along with this section of the online hub, will be your first port of call for any questions you have during this component.</span></p><span data-dcnode-id="1778" instrument_node="">
