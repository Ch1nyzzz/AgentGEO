</span><h1 data-dcnode-id="831" style="margin-top:0;size:200%;border-bottom:0"><span data-dcnode-id="832" instrument_node="">Youth and Elections</span></h1><span data-dcnode-id="830" instrument_node="">
</span><a data-dcnode-id="824" href="file://aceproject.org/ace-en/ace-en/topics/yt/onePage" rel="nofollow" style="color:grey;" target="_" title="All on one page"><span data-dcnode-id="829" instrument_node="">

&lt;a title="Topic Index" href="/ace-en/topics//topic_index"&gt;Topic Index&lt;/a&gt;
&lt;br /&gt;
&lt;h2&gt;Lowering the Voting Age &lt;/h2&gt;
&lt;div&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;Most countries have a minimum voting
age of 18 years; however, since the turn of this century, several countries
have had ongoing debates about reducing the voting age to 17 or 16, and several
jurisdictions have legislated to lower the voting age. See Annex: List of
Jurisdictions and their Voting Age.&amp;nbsp;&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;The following countries have
different minimum voting ages:&lt;a name="_ednref1" href="#_edn1"&gt;[i]&lt;/a&gt;&amp;nbsp;&lt;/p&gt;
&lt;ul&gt;&lt;li&gt;&amp;nbsp;16
years: Argentina, Austria, Brazil, Cuba, Ecuador, Germany (only in some local
elections), Malta, Nicaragua, Scotland&amp;nbsp;&lt;/li&gt;&lt;li&gt;&amp;nbsp;17
years: Indonesia, Democratic People’s Republic of Korea, Timor-Leste&amp;nbsp;&lt;/li&gt;&lt;li&gt;&amp;nbsp;19 years:
Republic of Korea&amp;nbsp;&lt;/li&gt;&lt;li&gt;&amp;nbsp;20
years: Bahrain, Cameroon, Nauru&amp;nbsp;&lt;/li&gt;&lt;li&gt;&amp;nbsp;21
years: Côte d’Ivoire, Gabon, Kuwait, Lebanon, Malaysia, Oman, Pakistan, Samoa,
Singapore, Solomon Islands, Tonga&amp;nbsp;&lt;/li&gt;&lt;li&gt;&amp;nbsp;25 years: United Arab Emirates&lt;/li&gt;&lt;/ul&gt;
&lt;p&gt;&amp;nbsp;&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;The arguments for lowering the voting
generally revolve around comparisons with non-electoral rights and
responsibilities, international comparisons, level of political awareness and
interest among the young, and the issue of maturity.&amp;nbsp;&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;In general, those in favor are
convinced that lowering the voting age to 16 – in combination with stronger
civic and voter education programs in schools – could increase the political
participation of youth. The advocates for a lower voting age seek to strengthen
their case by noting that 16-year-olds participate in political debates on
social media and events, work, pay taxes, rent houses, and join the armed
forces in some countries. Consequently, given their contributions to society,
they should have the right to vote and hold representatives accountable for
decisions that are affecting their daily lives. Research shows that 16-17-year-olds
are more likely to vote than 18-20-year-olds—so giving them the vote when
slightly younger enables them to vote when it is most convenient for them.&lt;/p&gt;
&lt;p&gt;&amp;nbsp;The main arguments raised by opponents
of lowering voting ages to 16 or another age younger than 18 are that younger
people lack the maturity to grapple with complex political processes and that
they would most likely be influenced by the positions of their parents or other
adults. The relationship between age, maturity, and intelligence is complex and
contentious. Developmental assumptions about what young people are capable of
understanding and what motivates their behavior can influence public debate.
The assumption that young people do not have enough life experience or maturity
on which to base important decisions (such as voting), and also that they are
easily manipulated, is hotly debated.&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;See Annex: Arguments For and
Against Lowering the Voting Age.&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;There is a school of thought that
believes there should be no fixed minimum age; that it should instead be for
the individual to decide the age at which he or she is ready to vote; the
suggestion being that if you are interested enough, you are mature enough.&lt;a name="_ednref2" href="#_edn2"&gt;&lt;sup&gt;&lt;sup&gt;[ii]&lt;/sup&gt;&lt;/sup&gt;&lt;/a&gt;
But most supporters of change accept that there should be some fixed age at
which voting is permitted, usually 16 or 17.&lt;sup&gt;&lt;a href="#_edn3"&gt;&lt;sup&gt;[iii]&lt;/sup&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;This debate intersects with the
discourse on the rights of children and adolescents and specifically on the
issue of legal minimum age legislation, which can be contentious, contextual,
and contradictory. In setting age limits, states have to balance protection
with empowerment and rights. Human rights law says that there can be
restrictions on who can vote in an election, as long as those restrictions are
based on objective and reasonable criteria. All states have limited eligibility
to vote based on age, no country allows people under 16 to vote in national
elections, and only a minority allow young people aged between 16 and 18 the
right to vote in national or municipal elections, some with conditions such as
being employed or married.&lt;sup&gt;&lt;a href="#_edn4"&gt;&lt;sup&gt;[iv]&lt;/sup&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;
&lt;h3 style="text-align: justify;"&gt;&lt;br /&gt;&lt;/h3&gt;
&lt;div&gt;&lt;strong style="font-size: 14.352px; text-align: justify;"&gt;Countries that have lowered the voting age&lt;/strong&gt;&lt;/div&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;Several of the countries that have
lowered the voting age have opted for an incremental approach, introducing the
new legislation in one local district, for example, as a test-case before
expanding to other districts. This approach was adopted in various
jurisdictions in Austria, Germany, Norway, and the United States, but only
Austria has expanded the legislation to all elections.&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;Since the 2010s, several
jurisdictions have attempted to lower the voting age to 16 or 17 years of age –
some have been successful while other attempts have been short-lived. Most
attempts have been in jurisdictions in developed countries, and most have been
unsuccessful; these include: Australia, New Zealand, Canada, the Council of
Europe, the United Kingdom (the Welsh Assembly and the Northern Ireland
Assembly want to give their 16-year-olds the vote but need UK government
approval&lt;a name="_ednref5" href="#_edn5"&gt;&lt;sup&gt;&lt;sup&gt;[v]&lt;/sup&gt;&lt;/sup&gt;&lt;/a&gt;)
and the United States (including California, Florida, Alaska, and two districts
in Washington DC). Norway&lt;a href="http://www.sciencedirect.com/science/article/pii/S0261379412001333"&gt; experimented&lt;/a&gt;
with a lowered voting age in 2011 in selected municipalities as a pilot.
Despite the growing momentum in many of these countries, there is also
considerable resistance to lowering the voting age among the public and
politicians.&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;There has been limited data (at least
that is available in English) in relation to the experience of those jurisdictions
that have lowered the voting age. And even with the more recent experiences,
there have only been one or two election cycles in which to assess the impact
of the legislation on patterns relating to voter turnout, voting behavior, and
other potential consequences of the legislation. Future research is needed to
examine the short-term and long-term impacts of such electoral reform.&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;The early data is, however, fairly
consistent: “Studies from a&lt;a href="http://www.fairvote.org/brazilian-election-2014#.Utf5oxCwLYg"&gt; municipal
election in the United States&lt;/a&gt;, as well as national elections in&lt;a href="http://www.promoteourvote.com/uploads/9/2/2/7/9227685/leaving_the_nest_and_the_social_act_of_voting.pdf"&gt; Denmark&lt;/a&gt;
and&lt;a href="http://www.timmale.com/uploads/2/9/2/2/2922364/results_voting_at_16_handout.pdf"&gt; Austria&lt;/a&gt;,
have shown that 16- and 17-year-olds are avid political participants and that
voting at 16 and 17 is habit-forming. Socialized into a culture of
participation early on, 16- and 17-year-old voters may age into more
politically active older people than those who do not vote for the first time
until they are 18 or 19.”&lt;a name="_ednref6" href="#_edn6"&gt;[vi]&lt;/a&gt;&lt;/p&gt;
&lt;p style="text-align: justify;" class="MsoBodyText"&gt;For more on the topic of lowering the
voting age, see ACE Spotlight on Voting Age.&lt;/p&gt;
&lt;div&gt;&lt;br clear="all" /&gt;
&lt;hr align="left" size="1" width="33%" /&gt;


&lt;div id="edn1"&gt;
&lt;p class="MsoEndnoteText"&gt;&lt;a name="_edn1" href="#_ednref1"&gt;[i]&lt;/a&gt;
IPU 2011.&lt;/p&gt;
&lt;/div&gt;
&lt;div id="edn2"&gt;
&lt;p class="MsoEndnoteText"&gt;&lt;a name="_edn2" href="#_ednref2"&gt;[ii]&lt;/a&gt;
The Electoral Commission: Consultation summary, How old is old enough? The
minimum age of voting and candidacy in UK elections, 2003.&lt;/p&gt;
&lt;p class="MsoEndnoteText"&gt;A variation on this concept is that
“everybody would be given the vote at birth, but children and young peoples’
votes would be exercised for them by their parents or guardians until age 14,
when individuals would be entitled to vote in their own right”.&lt;/p&gt;
&lt;/div&gt;
&lt;div id="edn3"&gt;
&lt;p class="MsoEndnoteText"&gt;&lt;a name="_edn3" href="#_ednref3"&gt;[iii]&lt;/a&gt;
The Electoral Commission: Consultation summary, How old is old enough? The
minimum age of voting and candidacy in UK elections, 2003.&lt;/p&gt;
&lt;/div&gt;
&lt;div id="edn4"&gt;
&lt;p class="MsoEndnoteText"&gt;&lt;a name="_edn4" href="#_ednref4"&gt;[iv]&lt;/a&gt; &lt;a name="_Hlk521253395"&gt;Child Rights International Network (CRIN), submission to
the first session of the Forum on Human&amp;nbsp;Rights,&amp;nbsp;Democracy and the
Rule of&amp;nbsp;Law on “Widening the Democratic Space: The Role of Youth in Public
Decision-making,” Geneva, November 21–22, 2016, (London: CRIN, 2016),&amp;nbsp; &lt;/a&gt;&lt;a href="https://www.crin.org/sites/default/files/crin_submission_humanrightsdemocracyandtheruleoflaw.pdf"&gt;https://www.crin.org/sites/default/files/crin_submission_humanrightsdemocracyandtheruleoflaw.pdf&lt;/a&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;div id="edn5"&gt;
&lt;p class="MsoEndnoteText"&gt;&lt;a name="_edn5" href="#_ednref5"&gt;[v]&lt;/a&gt; Democratic Audit UK, “&lt;a title="Permanent Link to Votes at 16: what the UK can learn from Austria, Norway and the Crown dependencies" href="http://www.democraticaudit.com/2013/09/28/votes-at-16-what-the-uk-can-learn-from-austria-norway-and-the-crown-dependencies/"&gt;Votes at 16:
What the UK Can Learn from Austria, Norway and the Crown Dependencies&lt;/a&gt;,”
Democratic Audit UK, September 28, 2013, &lt;a href="http://www.democraticaudit.com/2013/09/28/votes-at-16-what-the-uk-can-learn-from-austria-norway-and-the-crown-dependencies"&gt;http://www.democraticaudit.com/2013/09/28/votes-at-16-what-the-uk-can-learn-from-austria-norway-and-the-crown-dependencies&lt;/a&gt;.&lt;/p&gt;
&lt;/div&gt;
&lt;div id="edn6"&gt;
&lt;p class="MsoEndnoteText"&gt;&lt;a name="_edn6" href="#_ednref6"&gt;[vi]&lt;/a&gt; &lt;a href="https://www.fairvote.org/brazilian-election-2014"&gt;https://www.fairvote.org/brazilian-election-2014&lt;/a&gt;.
Note: Austria has lowered the voting age to 16 years, but Denmark has not
lowered their voting age; the Denmark study relates to the habits of first-time
voters. See Yosef Bhatti &amp;amp; Kasper M. Hansen&amp;nbsp;(2012)&amp;nbsp;Leaving the
Nest and the Social Act of Voting: Turnout among First-Time Voters,&amp;nbsp;Journal
of Elections, Public Opinion and Parties,&amp;nbsp;22:4,&amp;nbsp;380-406,&amp;nbsp;DOI:&amp;nbsp;&lt;a href="https://doi.org/10.1080/17457289.2012.721375"&gt;10.1080/17457289.2012.721375&lt;/a&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

ia-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="679" href="file://aceproject.org/ace-en/topics/yt/yt10/yt240/a-continuum-of-youth-participation" id="ui-accordion-27-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="681"></span><span data-dcnode-id="680" instrument_node="">A continuum of youth participation</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-27-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="678" id="ui-accordion-27-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="672" role="tablist"><a aria-controls="ui-accordion-28-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="674" href="file://aceproject.org/ace-en/topics/yt/yt10/yt240/viewing-young-people-through-different-lenses" id="ui-accordion-28-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="676"></span><span data-dcnode-id="675" instrument_node="">Viewing young people through different lenses</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-28-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="673" id="ui-accordion-28-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="667" role="tablist"><a aria-controls="ui-accordion-29-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="669" href="file://aceproject.org/ace-en/topics/yt/yt10/yt240/characteristics-of-meaningful-youth-political" id="ui-accordion-29-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="671"></span><span data-dcnode-id="670" instrument_node="">Characteristics of meaningful youth political participation</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-29-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="668" id="ui-accordion-29-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="662" role="tablist"><a aria-controls="ui-accordion-30-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="664" href="file://aceproject.org/ace-en/topics/yt/yt10/yt240/capacity-development" id="ui-accordion-30-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="666"></span><span data-dcnode-id="665" instrument_node="">Capacity development </span></a><div aria-hidden="true" aria-labelledby="ui-accordion-30-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="663" id="ui-accordion-30-panel-0" role="tabpanel" style="display: none;"></div></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="656" role="tablist"><a aria-controls="ui-accordion-31-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="658" href="file://aceproject.org/ace-en/topics/yt/yt10/youth-as-peacemakers/default" id="ui-accordion-31-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="660"></span><span data-dcnode-id="659" instrument_node=""> Youth as Peacemakers</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-31-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="657" id="ui-accordion-31-panel-0" role="tabpanel" style="display: none;"></div></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="650" role="tablist"><a aria-controls="ui-accordion-32-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="652" href="file://aceproject.org/ace-en/topics/yt/yt20/default" id="ui-accordion-32-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="654"></span><span data-dcnode-id="653" instrument_node=""> YOUTH: LEGISLATIVE AND POLICY FRAMEWORK</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-32-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="651" id="ui-accordion-32-panel-0" role="tabpanel" style="display: none;"></div></div><div data-dcnode-id="435" style="list-style-type: none;padding-right:0;margin-right:0;margin-left:1em;"><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="645" role="tablist"><a aria-controls="ui-accordion-33-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="647" href="file://aceproject.org/ace-en/topics/yt/yt20/international-legal-framework" id="ui-accordion-33-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="649"></span><span data-dcnode-id="648" instrument_node="">International Legal Framework </span></a><div aria-hidden="true" aria-labelledby="ui-accordion-33-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="646" id="ui-accordion-33-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="640" role="tablist"><a aria-controls="ui-accordion-34-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="642" href="file://aceproject.org/ace-en/topics/yt/yt20/national-legal-framework" id="ui-accordion-34-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="644"></span><span data-dcnode-id="643" instrument_node="">National Legal Framework</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-34-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="641" id="ui-accordion-34-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="635" role="tablist"><a aria-controls="ui-accordion-35-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="637" href="file://aceproject.org/ace-en/topics/yt/yt20/quotas-for-youth" id="ui-accordion-35-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="639"></span><span data-dcnode-id="638" instrument_node="">Quotas for Youth</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-35-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="636" id="ui-accordion-35-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="456" role="tablist"><a aria-controls="ui-accordion-36-panel-0" aria-expanded="true" aria-selected="true" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-accordion-icons ui-accordion-header-active ui-state-active ui-corner-top" data-dcnode-id="632" href="file://aceproject.org/ace-en/topics/yt/yt20/lowering-the-voting-age" id="ui-accordion-36-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-s" data-dcnode-id="634"></span><span data-dcnode-id="633" instrument_node="">Lowering the Voting Age </span></a><div aria-hidden="false" aria-labelledby="ui-accordion-36-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom ui-accordion-content-active" data-dcnode-id="457" id="ui-accordion-36-panel-0" role="tabpanel" style="display: block;"><span data-dcnode-id="631" instrument_node="">
</span><div data-dcnode-id="459"><span data-dcnode-id="630" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="628" style="text-align: justify;"><span data-dcnode-id="629" instrument_node="">Most countries have a minimum voting
age of 18 years; however, since the turn of this century, several countries
have had ongoing debates about reducing the voting age to 17 or 16, and several
jurisdictions have legislated to lower the voting age. See Annex: List of
Jurisdictions and their Voting Age.&nbsp;</span></p><span data-dcnode-id="627" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="622" style="text-align: justify;"><span data-dcnode-id="626" instrument_node="">The following countries have
different minimum voting ages:</span><a data-dcnode-id="624" href="file://aceproject.org/ace-en/topics/yt/yt20/%23_edn1" name="_ednref1"><span data-dcnode-id="625" instrument_node="">[i]</span></a><span data-dcnode-id="623" instrument_node="">&nbsp;</span></p><span data-dcnode-id="621" instrument_node="">
</span><ul data-dcnode-id="608"><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">&nbsp;16
years: Argentina, Austria, Brazil, Cuba, Ecuador, Germany (only in some local
elections), Malta, Nicaragua, Scotland&nbsp;</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">&nbsp;17
years: Indonesia, Democratic People’s Republic of Korea, Timor-Leste&nbsp;</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">&nbsp;19 years:
Republic of Korea&nbsp;</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">&nbsp;20
years: Bahrain, Cameroon, Nauru&nbsp;</span></li><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">&nbsp;21
years: Côte d’Ivoire, Gabon, Kuwait, Lebanon, Malaysia, Oman, Pakistan, Samoa,
Singapore, Solomon Islands, Tonga&nbsp;</span></li><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">&nbsp;25 years: United Arab Emirates</span></li></ul><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">&nbsp;</span></p><span data-dcnode-id="604" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="602" style="text-align: justify;"><span data-dcnode-id="603" instrument_node="">The arguments for lowering the voting
generally revolve around comparisons with non-electoral rights and
responsibilities, international comparisons, level of political awareness and
interest among the young, and the issue of maturity.&nbsp;</span></p><span data-dcnode-id="601" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="599" style="text-align: justify;"><span data-dcnode-id="600" instrument_node="">In general, those in favor are
convinced that lowering the voting age to 16 – in combination with stronger
civic and voter education programs in schools – could increase the political
participation of youth. The advocates for a lower voting age seek to strengthen
their case by noting that 16-year-olds participate in political debates on
social media and events, work, pay taxes, rent houses, and join the armed
forces in some countries. Consequently, given their contributions to society,
they should have the right to vote and hold representatives accountable for
decisions that are affecting their daily lives. Research shows that 16-17-year-olds
are more likely to vote than 18-20-year-olds—so giving them the vote when
slightly younger enables them to vote when it is most convenient for them.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">&nbsp;The main arguments raised by opponents
of lowering voting ages to 16 or another age younger than 18 are that younger
people lack the maturity to grapple with complex political processes and that
they would most likely be influenced by the positions of their parents or other
adults. The relationship between age, maturity, and intelligence is complex and
contentious. Developmental assumptions about what young people are capable of
understanding and what motivates their behavior can influence public debate.
The assumption that young people do not have enough life experience or maturity
on which to base important decisions (such as voting), and also that they are
easily manipulated, is hotly debated.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="593" style="text-align: justify;"><span data-dcnode-id="594" instrument_node="">See Annex: Arguments For and
Against Lowering the Voting Age.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="581" style="text-align: justify;"><span data-dcnode-id="591" instrument_node="">There is a school of thought that
believes there should be no fixed minimum age; that it should instead be for
the individual to decide the age at which he or she is ready to vote; the
suggestion being that if you are interested enough, you are mature enough.</span><a data-dcnode-id="587" href="file://aceproject.org/ace-en/topics/yt/yt20/%23_edn2" name="_ednref2"><sup data-dcnode-id="588"><sup data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">[ii]</span></sup></sup></a><span data-dcnode-id="586" instrument_node="">
But most supporters of change accept that there should be some fixed age at
which voting is permitted, usually 16 or 17.</span><sup data-dcnode-id="582"><a data-dcnode-id="583" href="file://aceproject.org/ace-en/topics/yt/yt20/%23_edn3"><sup data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">[iii]</span></sup></a></sup></p><span data-dcnode-id="580" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="574" style="text-align: justify;"><span data-dcnode-id="579" instrument_node="">This debate intersects with the
discourse on the rights of children and adolescents and specifically on the
issue of legal minimum age legislation, which can be contentious, contextual,
and contradictory. In setting age limits, states have to balance protection
with empowerment and rights. Human rights law says that there can be
restrictions on who can vote in an election, as long as those restrictions are
based on objective and reasonable criteria. All states have limited eligibility
to vote based on age, no country allows people under 16 to vote in national
elections, and only a minority allow young people aged between 16 and 18 the
right to vote in national or municipal elections, some with conditions such as
being employed or married.</span><sup data-dcnode-id="575"><a data-dcnode-id="576" href="file://aceproject.org/ace-en/topics/yt/yt20/%23_edn4"><sup data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">[iv]</span></sup></a></sup></p><span data-dcnode-id="573" instrument_node="">
</span><h3 data-dcnode-id="571" style="text-align: justify;"><br data-dcnode-id="572"></h3><span data-dcnode-id="570" instrument_node="">
</span><div data-dcnode-id="567"><strong data-dcnode-id="568" style="font-size: 14.352px; text-align: justify;"><span data-dcnode-id="569" instrument_node="">Countries that have lowered the voting age</span></strong></div><span data-dcnode-id="566" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="564" style="text-align: justify;"><span data-dcnode-id="565" instrument_node="">Several of the countries that have
lowered the voting age have opted for an incremental approach, introducing the
new legislation in one local district, for example, as a test-case before
expanding to other districts. This approach was adopted in various
jurisdictions in Austria, Germany, Norway, and the United States, but only
Austria has expanded the legislation to all elections.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="553" style="text-align: justify;"><span data-dcnode-id="562" instrument_node="">Since the 2010s, several
jurisdictions have attempted to lower the voting age to 16 or 17 years of age –
some have been successful while other attempts have been short-lived. Most
attempts have been in jurisdictions in developed countries, and most have been
unsuccessful; these include: Australia, New Zealand, Canada, the Council of
Europe, the United Kingdom (the Welsh Assembly and the Northern Ireland
Assembly want to give their 16-year-olds the vote but need UK government
approval</span><a data-dcnode-id="558" href="file://aceproject.org/ace-en/topics/yt/yt20/%23_edn5" name="_ednref5"><sup data-dcnode-id="559"><sup data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">[v]</span></sup></sup></a><span data-dcnode-id="557" instrument_node="">)
and the United States (including California, Florida, Alaska, and two districts
in Washington DC). Norway</span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379412001333"><span data-dcnode-id="556" instrument_node=""> experimented</span></a><span data-dcnode-id="554" instrument_node="">
with a lowered voting age in 2011 in selected municipalities as a pilot.
Despite the growing momentum in many of these countries, there is also
considerable resistance to lowering the voting age among the public and
politicians.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="550" style="text-align: justify;"><span data-dcnode-id="551" instrument_node="">There has been limited data (at least
that is available in English) in relation to the experience of those jurisdictions
that have lowered the voting age. And even with the more recent experiences,
there have only been one or two election cycles in which to assess the impact
of the legislation on patterns relating to voter turnout, voting behavior, and
other potential consequences of the legislation. Future research is needed to
examine the short-term and long-term impacts of such electoral reform.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="536" style="text-align: justify;"><span data-dcnode-id="548" instrument_node="">The early data is, however, fairly
consistent: “Studies from a</span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fairvote.org/brazilian-election-2014%23.Utf5oxCwLYg"><span data-dcnode-id="547" instrument_node=""> municipal
election in the United States</span></a><span data-dcnode-id="545" instrument_node="">, as well as national elections in</span><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.promoteourvote.com/uploads/9/2/2/7/9227685/leaving_the_nest_and_the_social_act_of_voting.pdf"><span data-dcnode-id="544" instrument_node=""> Denmark</span></a><span data-dcnode-id="542" instrument_node="">
and</span><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.timmale.com/uploads/2/9/2/2/2922364/results_voting_at_16_handout.pdf"><span data-dcnode-id="541" instrument_node=""> Austria</span></a><span data-dcnode-id="539" instrument_node="">,
have shown that 16- and 17-year-olds are avid political participants and that
voting at 16 and 17 is habit-forming. Socialized into a culture of
participation early on, 16- and 17-year-old voters may age into more
politically active older people than those who do not vote for the first time
until they are 18 or 19.”</span><a data-dcnode-id="537" href="file://aceproject.org/ace-en/topics/yt/yt20/%23_edn6" name="_ednref6"><span data-dcnode-id="538" instrument_node="">[vi]</span></a></p><span data-dcnode-id="535" instrument_node="">
</span><p class="MsoBodyText" data-dcnode-id="533" style="text-align: justify;"><span data-dcnode-id="534" instrument_node="">For more on the topic of lowering the
voting age, see ACE Spotlight on Voting Age.</span></p><span data-dcnode-id="532" instrument_node="">
