class="card-related text-darker-gray bg-very-light-gray my-0" data-dcnode-id="7171"><div class="related-item__heading text-uppercase text-xxs font-weight-bold text-primary" data-dcnode-id="7176" role="heading"><span data-dcnode-id="7177" instrument_node="">Related Others</span></div><div class="card-title mt-2" data-dcnode-id="7172"><div class="text-deep-gray related-item__content" data-dcnode-id="7173"><a class="text-reset animation-underline" data-dcnode-id="7174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.science.org/doi/10.1126/science.1114170"><span data-dcnode-id="7175" instrument_node="">Appearance DOES Matter</span></a></div></div></div></div></div><div data-dcnode-id="7160" id="abstracts"><div class="core-container" data-dcnode-id="7161"><section data-dcnode-id="7164" id="abstract" property="abstract" role="doc-abstract" typeof="Text"><h2 data-dcnode-id="7167" property="name"><span data-dcnode-id="7168" instrument_node="">Abstract</span></h2><div data-dcnode-id="7165" role="paragraph"><span data-dcnode-id="7166" instrument_node="">We show that inferences of competence based solely on facial appearance predicted the outcomes of U.S. congressional elections better than chance (e.g., 68.8% of the Senate races in 2004) and also were linearly related to the margin of victory. These inferences were specific to competence and occurred within a 1-second exposure to the faces of the candidates. The findings suggest that rapid, unreflective trait inferences can contribute to voting choices, which are widely assumed to be based primarily on rational and deliberative considerations.</span></div></section><div class="alert-signup__dropzone" data-dcnode-id="7162"><span data-dcnode-id="7163" instrument_node="">
</span></div></div></div></section><section data-dcnode-id="6613" data-extent="bodymatter" id="bodymatter" property="articleBody" typeof="Text"><div class="core-container" data-dcnode-id="6614"><div data-dcnode-id="7145" role="paragraph"><span data-dcnode-id="7158" instrument_node="">Faces are a major source of information about other people. The rapid recognition of familiar individuals and communication cues (such as expressions of emotion) is critical for successful social interaction (</span><a data-dcnode-id="7155" data-xml-rid="REF1" href="#core-REF1" id="body-ref-REF1" role="doc-biblioref"><i data-dcnode-id="7156"><span data-dcnode-id="7157" instrument_node="">1</span></i></a><span data-dcnode-id="7154" instrument_node="">). However, people go beyond the inferences afforded by a person's facial appearance to make inferences about personal dispositions (</span><a data-dcnode-id="7151" data-xml-rid="REF2" href="#core-REF2" id="body-ref-REF2" role="doc-biblioref"><i data-dcnode-id="7152"><span data-dcnode-id="7153" instrument_node="">2</span></i></a><span data-dcnode-id="7150" instrument_node="">, </span><a data-dcnode-id="7147" data-xml-rid="REF3" href="#core-REF3" id="body-ref-REF3" role="doc-biblioref"><i data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">3</span></i></a><span data-dcnode-id="7146" instrument_node="">). Here, we argue that rapid, unreflective trait inferences from faces influence consequential decisions. Specifically, we show that inferences of competence, based solely on the facial appearance of political candidates and with no prior knowledge about the person, predict the outcomes of elections for the U.S. Congress.</span></div><div data-dcnode-id="7139" role="paragraph"><span data-dcnode-id="7144" instrument_node="">In each election cycle, millions of dollars are spent on campaigns to disseminate information about candidates for the U.S. House of Representatives and Senate and to convince citizens to vote for these candidates. Is it possible that quick, unreflective judgments based solely on facial appearance can predict the outcomes of these elections? There are many reasons why inferences from facial appearance should not play an important role in voting decisions. From a rational perspective, information about the candidates should override any fleeting initial impressions. From an ideological perspective, party affiliation should sway such impressions. Party affiliation is one of the most important predictors of voting decisions in congressional elections (</span><a data-dcnode-id="7141" data-xml-rid="REF4" href="#core-REF4" id="body-ref-REF4" role="doc-biblioref"><i data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">4</span></i></a><span data-dcnode-id="7140" instrument_node="">). From a voter's subjective perspective, voting decisions are justified not in terms of the candidate's looks but in terms of the candidate's position on issues important to the voter.</span></div><div data-dcnode-id="7121" role="paragraph"><span data-dcnode-id="7138" instrument_node="">Yet, from a psychological perspective, rapid automatic inferences from the facial appearance of political candidates can influence processing of subsequent information about these candidates. Recent models of social cognition and decision-making (</span><a data-dcnode-id="7135" data-xml-rid="REF5" href="#core-REF5" id="body-ref-REF5" role="doc-biblioref"><i data-dcnode-id="7136"><span data-dcnode-id="7137" instrument_node="">5</span></i></a><span data-dcnode-id="7134" instrument_node="">, </span><a data-dcnode-id="7131" data-xml-rid="REF6" href="#core-REF6" id="body-ref-REF6" role="doc-biblioref"><i data-dcnode-id="7132"><span data-dcnode-id="7133" instrument_node="">6</span></i></a><span data-dcnode-id="7130" instrument_node="">) posit a qualitative distinction between fast, unreflective, effortless “system 1” processes and slow, deliberate, effortful “system 2” processes. Many inferences about other people, including inferences from facial appearance, can be characterized as system 1 processes (</span><a data-dcnode-id="7127" data-xml-rid="REF7" href="#core-REF7" id="body-ref-REF7" role="doc-biblioref"><i data-dcnode-id="7128"><span data-dcnode-id="7129" instrument_node="">7</span></i></a><span data-dcnode-id="7126" instrument_node="">, </span><a data-dcnode-id="7123" data-xml-rid="REF8" href="#core-REF8" id="body-ref-REF8" role="doc-biblioref"><i data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">8</span></i></a><span data-dcnode-id="7122" instrument_node="">). The implications of the dual-process perspective are that person impressions can be formed “on-line” in the very first encounter with the person and can have subtle and often subjectively unrecognized effects on subsequent deliberate judgments.</span></div><div data-dcnode-id="7104" role="paragraph"><span data-dcnode-id="7120" instrument_node="">Competence emerges as one of the most important trait attributes on which people evaluate politicians (</span><a data-dcnode-id="7117" data-xml-rid="REF9" href="#core-REF9" id="body-ref-REF9" role="doc-biblioref"><i data-dcnode-id="7118"><span data-dcnode-id="7119" instrument_node="">9</span></i></a><span data-dcnode-id="7116" instrument_node="">–</span><a data-dcnode-id="7113" data-xml-rid="REF11" href="#core-REF11" id="body-ref-REF11-1" role="doc-biblioref"><i data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">11</span></i></a><span data-dcnode-id="7112" instrument_node="">). If voters evaluate political candidates on competence, inferences of competence from facial appearance could influence their voting decisions. To test this hypothesis, we asked na“ve participants to evaluate candidates for the U.S. Senate (2000, 2002, and 2004) and House (2002 and 2004) on competence (</span><a data-dcnode-id="7109" data-xml-rid="REF12" href="#core-REF12" id="body-ref-REF12-1" role="doc-biblioref"><i data-dcnode-id="7110"><span data-dcnode-id="7111" instrument_node="">12</span></i></a><span data-dcnode-id="7108" instrument_node="">). In all studies, participants were presented with pairs of black-and-white head-shot photographs of the winners and the runners-up (</span><a class="open-in-viewer" data-dcnode-id="7106" href="#FIG1"><span data-dcnode-id="7107" instrument_node="">Fig. 1A</span></a><span data-dcnode-id="7105" instrument_node="">) from the election races. If participants recognized any of the faces in a race pair, the data for this pair were not used in subsequent analyses. Thus, all findings are based on judgments derived from facial appearance in the absence of prior knowledge about the person.</span></div><div data-dcnode-id="7057" role="paragraph"><span data-dcnode-id="7103" instrument_node="">As shown in </span><a class="open-in-viewer" data-dcnode-id="7101" href="#TBL1"><span data-dcnode-id="7102" instrument_node="">Table 1</span></a><span data-dcnode-id="7100" instrument_node="">, the candidate who was perceived as more competent won in 71.6% of the Senate races and in 66.8% of the House races (</span><a data-dcnode-id="7097" data-xml-rid="REF13" href="#core-REF13" id="body-ref-REF13" role="doc-biblioref"><i data-dcnode-id="7098"><span data-dcnode-id="7099" instrument_node="">13</span></i></a><span data-dcnode-id="7096" instrument_node="">). Although the data for the 2004 elections were collected before the actual elections (</span><a data-dcnode-id="7093" data-xml-rid="REF14" href="#core-REF14" id="body-ref-REF14" role="doc-biblioref"><i data-dcnode-id="7094"><span data-dcnode-id="7095" instrument_node="">14</span></i></a><span data-dcnode-id="7092" instrument_node="">), there were no differences between the accuracy of the prospective predictions for these elections and the accuracy of the retrospective predictions for the 2000 and 2002 elections (</span><a data-dcnode-id="7089" data-xml-rid="REF15" href="#core-REF15" id="body-ref-REF15" role="doc-biblioref"><i data-dcnode-id="7090"><span data-dcnode-id="7091" instrument_node="">15</span></i></a><span data-dcnode-id="7088" instrument_node="">). Inferences of competence not only predicted the winner but also were linearly related to the margin of victory. To model the relation between inferred competence and actual votes, we computed for each race the difference in the proportion of votes (</span><a data-dcnode-id="7085" data-xml-rid="REF16" href="#core-REF16" id="body-ref-REF16" role="doc-biblioref"><i data-dcnode-id="7086"><span data-dcnode-id="7087" instrument_node="">16</span></i></a><span data-dcnode-id="7084" instrument_node="">). As shown in </span><a class="open-in-viewer" data-dcnode-id="7082" href="#FIG1"><span data-dcnode-id="7083" instrument_node="">Fig. 1B</span></a><span data-dcnode-id="7081" instrument_node="">, competence judgments were positively correlated with the differences in votes between the candidates for Senate [</span><i data-dcnode-id="7079"><span data-dcnode-id="7080" instrument_node="">r</span></i><span data-dcnode-id="7078" instrument_node="">(95) = 0.44, </span><i data-dcnode-id="7076"><span data-dcnode-id="7077" instrument_node="">P</span></i><span data-dcnode-id="7075" instrument_node=""> &lt; 0.001] (</span><a data-dcnode-id="7072" data-xml-rid="REF17" href="#core-REF17" id="body-ref-REF17" role="doc-biblioref"><i data-dcnode-id="7073"><span data-dcnode-id="7074" instrument_node="">17</span></i></a><span data-dcnode-id="7071" instrument_node="">, </span><a data-dcnode-id="7068" data-xml-rid="REF18" href="#core-REF18" id="body-ref-REF18-1" role="doc-biblioref"><i data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">18</span></i></a><span data-dcnode-id="7067" instrument_node="">). Similarly, the correlation was 0.37 (</span><i data-dcnode-id="7065"><span data-dcnode-id="7066" instrument_node="">P</span></i><span data-dcnode-id="7064" instrument_node=""> &lt; 0.001) for the 2002 House races and 0.44 (</span><i data-dcnode-id="7062"><span data-dcnode-id="7063" instrument_node="">P</span></i><span data-dcnode-id="7061" instrument_node=""> &lt; 0.001) for the 2004 races. Across 2002 and 2004, the correlation was 0.40 (</span><i data-dcnode-id="7059"><span data-dcnode-id="7060" instrument_node="">P</span></i><span data-dcnode-id="7058" instrument_node=""> &lt; 0.001).</span></div><div data-dcnode-id="6904" role="paragraph"><span data-dcnode-id="7056" instrument_node=""> </span><div class="figure-wrap" data-dcnode-id="6906"><figure class="table" data-dcnode-id="6907" id="TBL1"><div class="table-wrap table-wrap--collapsed" data-dcnode-id="6924" style="height: 280px;"><table data-dcnode-id="6929"><thead data-dcnode-id="7045"><tr data-dcnode-id="7046" data-xml-align="center" data-xml-valign="top"><th data-dcnode-id="7054" data-xml-align="left"><span data-dcnode-id="7055" instrument_node=""> Election </span></th><th data-dcnode-id="7052"><span data-dcnode-id="7053" instrument_node=""> Correctly predicted </span></th><th data-dcnode-id="7047"><span data-dcnode-id="7051" instrument_node=""> χ</span><sup data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">2</span></sup><span data-dcnode-id="7048" instrument_node=""> </span></th></tr></thead><tbody data-dcnode-id="6930"><tr data-dcnode-id="7035" data-xml-align="center" data-xml-valign="top"><td colspan="3" data-dcnode-id="7040"><span data-dcnode-id="7044" instrument_node=""> </span><i data-dcnode-id="7042"><span data-dcnode-id="7043" instrument_node="">U.S. Senate</span></i><span data-dcnode-id="7041" instrument_node=""> </span></td><td data-dcnode-id="7038"><span data-dcnode-id="7039" instrument_node="">&nbsp;</span></td><td data-dcnode-id="7036"><span data-dcnode-id="7037" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="7022" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="7030" data-xml-align="left"><span data-dcnode-id="7034" instrument_node=""> 2000 (</span><i data-dcnode-id="7032"><span data-dcnode-id="7033" instrument_node="">n</span></i><span data-dcnode-id="7031" instrument_node=""> = 30) </span></td><td data-dcnode-id="7028"><span data-dcnode-id="7029" instrument_node=""> 73.3% </span></td><td data-dcnode-id="7023"><span data-dcnode-id="7027" instrument_node=""> 6.53 (</span><i data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">P</span></i><span data-dcnode-id="7024" instrument_node=""> &lt; 0.011) </span></td></tr><tr data-dcnode-id="7009" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="7017" data-xml-align="left"><span data-dcnode-id="7021" instrument_node=""> 2002 (</span><i data-dcnode-id="7019"><span data-dcnode-id="7020" instrument_node="">n</span></i><span data-dcnode-id="7018" instrument_node=""> = 33) </span></td><td data-dcnode-id="7015"><span data-dcnode-id="7016" instrument_node=""> 72.7% </span></td><td data-dcnode-id="7010"><span data-dcnode-id="7014" instrument_node=""> 6.82 (</span><i data-dcnode-id="7012"><span data-dcnode-id="7013" instrument_node="">P</span></i><span data-dcnode-id="7011" instrument_node=""> &lt; 0.009) </span></td></tr><tr data-dcnode-id="6996" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="7004" data-xml-align="left"><span data-dcnode-id="7008" instrument_node=""> 2004 (</span><i data-dcnode-id="7006"><span data-dcnode-id="7007" instrument_node="">n</span></i><span data-dcnode-id="7005" instrument_node=""> = 32) </span></td><td data-dcnode-id="7002"><span data-dcnode-id="7003" instrument_node=""> 68.8% </span></td><td data-dcnode-id="6997"><span data-dcnode-id="7001" instrument_node=""> 4.50 (</span><i data-dcnode-id="6999"><span data-dcnode-id="7000" instrument_node="">P</span></i><span data-dcnode-id="6998" instrument_node=""> &lt; 0.034) </span></td></tr><tr data-dcnode-id="6983" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6991" data-xml-align="left"><span data-dcnode-id="6995" instrument_node=""> Total (</span><i data-dcnode-id="6993"><span data-dcnode-id="6994" instrument_node="">n</span></i><span data-dcnode-id="6992" instrument_node=""> = 95) </span></td><td data-dcnode-id="6989"><span data-dcnode-id="6990" instrument_node=""> 71.6% </span></td><td data-dcnode-id="6984"><span data-dcnode-id="6988" instrument_node=""> 17.70 (</span><i data-dcnode-id="6986"><span data-dcnode-id="6987" instrument_node="">P</span></i><span data-dcnode-id="6985" instrument_node=""> &lt; 0.001) </span></td></tr><tr data-dcnode-id="6973" data-xml-align="center" data-xml-valign="top"><td colspan="3" data-dcnode-id="6978"><span data-dcnode-id="6982" instrument_node=""> </span><i data-dcnode-id="6980"><span data-dcnode-id="6981" instrument_node="">U.S. House of Representatives</span></i><span data-dcnode-id="6979" instrument_node=""> </span></td><td data-dcnode-id="6976"><span data-dcnode-id="6977" instrument_node="">&nbsp;</span></td><td data-dcnode-id="6974"><span data-dcnode-id="6975" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="6960" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6968" data-xml-align="left"><span data-dcnode-id="6972" instrument_node=""> 2002 (</span><i data-dcnode-id="6970"><span data-dcnode-id="6971" instrument_node="">n</span></i><span data-dcnode-id="6969" instrument_node=""> = 321) </span></td><td data-dcnode-id="6966"><span data-dcnode-id="6967" instrument_node=""> 66.0% </span></td><td data-dcnode-id="6961"><span data-dcnode-id="6965" instrument_node=""> 33.05 (</span><i data-dcnode-id="6963"><span data-dcnode-id="6964" instrument_node="">P</span></i><span data-dcnode-id="6962" instrument_node=""> &lt; 0.001) </span></td></tr><tr data-dcnode-id="6947" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6955" data-xml-align="left"><span data-dcnode-id="6959" instrument_node=""> 2004 (</span><i data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">n</span></i><span data-dcnode-id="6956" instrument_node=""> = 279) </span></td><td data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node=""> 67.7% </span></td><td data-dcnode-id="6948"><span data-dcnode-id="6952" instrument_node=""> 35.13 (</span><i data-dcnode-id="6950"><span data-dcnode-id="6951" instrument_node="">P</span></i><span data-dcnode-id="6949" instrument_node=""> &lt; 0.001) </span></td></tr><tr data-dcnode-id="6931" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6941" data-xml-align="left"><span data-dcnode-id="6946" instrument_node=""> Total (</span><i data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">n</span></i><span data-dcnode-id="6943" instrument_node=""> = 600) </span><hr data-dcnode-id="6942"></td><td data-dcnode-id="6938"><span data-dcnode-id="6940" instrument_node=""> 66.8% </span><hr data-dcnode-id="6939"></td><td data-dcnode-id="6932"><span data-dcnode-id="6937" instrument_node=""> 68.01 (</span><i data-dcnode-id="6935"><span data-dcnode-id="6936" instrument_node="">P</span></i><span data-dcnode-id="6934" instrument_node=""> &lt; 0.001) </span><hr data-dcnode-id="6933"></td></tr></tbody></table><span class="justify-content-end mt-n3 figure-expand-button position-absolute table-expand-button" data-dcnode-id="6925"><a class="btn" data-dcnode-id="6926" href="#" role="button"><span data-dcnode-id="6928" instrument_node="">Expand for more</span><i class="icon-arrow-down ml-2" data-dcnode-id="6927"></i></a></span></div><div class="table-collapse figure-expand-button" data-dcnode-id="6919"><button aria-expanded="false" class="btn table-collapse__btn" data-dcnode-id="6920" id="TBL1Collapse"><span data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">Collapse</span></span><i class="icon-arrow-up" data-dcnode-id="6921"></i></button></div><figcaption data-dcnode-id="6912"><span class="heading" data-dcnode-id="6917"><span data-dcnode-id="6918" instrument_node=""> Table 1</span></span><span data-dcnode-id="6916" instrument_node="">. Percentage of correctly predicted races for the U.S. Senate and House of Representatives as a function of the perceived competence of the candidates. The percentages indicate the races in which the candidate who was perceived as more competent won the race. The χ</span><sup data-dcnode-id="6914"><span data-dcnode-id="6915" instrument_node="">2</span></sup><span data-dcnode-id="6913" instrument_node=""> statistic tests the proportion of correctly predicted races against the chance level of 50%.</span></figcaption><a class="btn btn-dark figure-pop-btn open-in-viewer" data-dcnode-id="6908" href="#TBL1"><i aria-hidden="true" class="icon-extlink-smooth" data-dcnode-id="6911"></i><span data-dcnode-id="6909"><span data-dcnode-id="6910" instrument_node="">OPEN IN VIEWER</span></span></a></figure></div><span data-dcnode-id="6905" instrument_node=""> </span></div><div data-dcnode-id="6888" role="paragraph"><span data-dcnode-id="6903" instrument_node="">In the previous studies, there were no time constraints on the participants' judgments. However, system 1 processes are fast and efficient. Thus, minimal time exposure to the faces should be sufficient for participants to make inferences of competence. We conducted an experiment in which 40 participants (</span><a data-dcnode-id="6900" data-xml-rid="REF19" href="#core-REF19" id="body-ref-REF19" role="doc-biblioref"><i data-dcnode-id="6901"><span data-dcnode-id="6902" instrument_node="">19</span></i></a><span data-dcnode-id="6899" instrument_node="">) were exposed to the faces of the candidates for 1 s (per pair of faces) and were then asked to make a competence judgment. The average response time for the judgment was about 1 s (mean = 1051.60 ms, SD = 135.59). These rapid judgments based on minimal time exposure to faces predicted 67.6% of the actual Senate races (</span><i data-dcnode-id="6897"><span data-dcnode-id="6898" instrument_node="">P</span></i><span data-dcnode-id="6896" instrument_node=""> &lt; 0.004) (</span><a data-dcnode-id="6893" data-xml-rid="REF20" href="#core-REF20" id="body-ref-REF20" role="doc-biblioref"><i data-dcnode-id="6894"><span data-dcnode-id="6895" instrument_node="">20</span></i></a><span data-dcnode-id="6892" instrument_node="">). The correlation between competence judgments and differences in votes was 0.46 (</span><i data-dcnode-id="6890"><span data-dcnode-id="6891" instrument_node="">P</span></i><span data-dcnode-id="6889" instrument_node=""> &lt; 0.001).</span></div><div data-dcnode-id="6857" role="paragraph"><span data-dcnode-id="6887" instrument_node="">The findings show that 1-s judgments of competence suffice to predict the outcomes of actual elections, but perhaps people are making global inferences of likability rather than specific inferences of competence. To address this alternative hypothesis, we asked participants to make judgments on seven different trait dimensions: competence, intelligence, leadership, honesty, trustworthiness, charisma, and likability (</span><a data-dcnode-id="6884" data-xml-rid="REF21" href="#core-REF21" id="body-ref-REF21" role="doc-biblioref"><i data-dcnode-id="6885"><span data-dcnode-id="6886" instrument_node="">21</span></i></a><span data-dcnode-id="6883" instrument_node="">). From a simple halo-effect perspective (</span><a data-dcnode-id="6880" data-xml-rid="REF22" href="#core-REF22" id="body-ref-REF22" role="doc-biblioref"><i data-dcnode-id="6881"><span data-dcnode-id="6882" instrument_node="">22</span></i></a><span data-dcnode-id="6879" instrument_node="">), participants should evaluate the candidates in the same manner across traits. However, the trait judgments were highly differentiated. Factor analysis showed that the judgments clustered in three distinctive factors: competence (competence, intelligence, leadership), trust (honesty, trustworthiness), and likability (charisma, likability), each accounting for more than 30% of the variance in the data (table S1). More important, only the judgments forming the competence factor predicted the outcomes of the elections. The correlation between the mean score across the three judgments (competence, intelligence, leadership) and differences in votes was 0.58 (</span><i data-dcnode-id="6877"><span data-dcnode-id="6878" instrument_node="">P</span></i><span data-dcnode-id="6876" instrument_node=""> &lt; 0.001). In contrast to competence-related inferences, neither the trust-related inferences (</span><i data-dcnode-id="6874"><span data-dcnode-id="6875" instrument_node="">r</span></i><span data-dcnode-id="6873" instrument_node=""> = –0.09, </span><i data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">P</span></i><span data-dcnode-id="6870" instrument_node=""> = 0.65) nor the likability-related inferences (</span><i data-dcnode-id="6868"><span data-dcnode-id="6869" instrument_node="">r</span></i><span data-dcnode-id="6867" instrument_node=""> = –0.17, </span><i data-dcnode-id="6865"><span data-dcnode-id="6866" instrument_node="">P</span></i><span data-dcnode-id="6864" instrument_node=""> = 0.38) predicted differences in votes. The correlation between the competence judgment alone and differences in votes was 0.55 (</span><i data-dcnode-id="6862"><span data-dcnode-id="6863" instrument_node="">P</span></i><span data-dcnode-id="6861" instrument_node=""> &lt; 0.002), and this judgment correctly predicted 70% of the Senate races (</span><i data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">P</span></i><span data-dcnode-id="6858" instrument_node=""> &lt; 0.028). These findings show that people make highly differentiated trait inferences from facial appearance and that these inferences have selective effects on decisions.</span></div><div class="figure-wrap" data-dcnode-id="6834"><figure class="graphic" data-dcnode-id="6835" id="FIG1"><img aria-labelledby="FIG1" data-dcnode-id="6856" height="1280" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.science.org/cms/10.1126/science.1110589/asset/e9133b2f-8aa8-4cd6-87e2-3b77535348b3/assets/graphic/308_1623_f1.jpeg&amp;raw" width="1248"><figcaption data-dcnode-id="6840"><span class="heading" data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node=""> Fig. 1</span></span><span data-dcnode-id="6853" instrument_node="">. (</span><b data-dcnode-id="6851"><span data-dcnode-id="6852" instrument_node="">A</span></b><span data-dcnode-id="6850" instrument_node="">) An example of a pair of faces used in the experiments: the 2004 U.S. Senate race in Wisconsin. In all experiments, the positions of the faces were counterbalanced. (</span><b data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">B</span></b><span data-dcnode-id="6847" instrument_node="">) Scatterplot of differences in proportions of votes between the winner and the runner-up in races for the Senate as a function of inferred competence from facial appearance. The upper right and lower left quadrants indicate the correctly predicted races. Each point represents a Senate race from 2000, 2002, or 2004. The competence score on the </span><i data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node="">x</span></i><span data-dcnode-id="6844" instrument_node=""> axis ranges from 0 to 1 and represents the proportion of participants judging the candidate on the right to be more competent than the one on the left. The midpoint score of 0.50 indicates that the candidates were judged as equally competent. The difference in votes on the </span><i data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node="">y</span></i><span data-dcnode-id="6841" instrument_node=""> axis ranges from –1 to +1 [(votes of candidate on the right – votes of candidate on the left)/(sum of votes)]. Scores below 0 indicate that the candidate on the left won the election; scores above 0 indicate that the candidate on the right won the election. [Photos in (A): Capitol Advantage]</span></figcaption><a class="btn btn-dark figure-pop-btn open-in-viewer" data-dcnode-id="6836" href="#FIG1"><i aria-hidden="true" class="icon-extlink-smooth" data-dcnode-id="6839"></i><span data-dcnode-id="6837"><span data-dcnode-id="6838" instrument_node="">OPEN IN VIEWER</span></span></a></figure></div><div data-dcnode-id="6817" role="paragraph"><span data-dcnode-id="6833" instrument_node="">We also ruled out the possibility that the age, attractiveness, and/or familiarity with the faces of the candidates could account for the relation between inferences of competence and election outcomes. For example, older candidates can be judged as more competent (</span><a data-dcnode-id="6830" data-xml-rid="REF23" href="#core-REF23" id="body-ref-REF23-1" role="doc-biblioref"><i data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">23</span></i></a><span data-dcnode-id="6829" instrument_node="">) and be more likely to win. Similarly, more attractive candidates can be judged more favorably and be more likely to win (</span><a data-dcnode-id="6826" data-xml-rid="REF24" href="#core-REF24" id="body-ref-REF24" role="doc-biblioref"><i data-dcnode-id="6827"><span data-dcnode-id="6828" instrument_node="">24</span></i></a><span data-dcnode-id="6825" instrument_node="">). In the case of face familiarity, though unrecognized by our participants, incumbents might be more familiar than challengers, and participants might have misattributed this familiarity to competence (</span><a data-dcnode-id="6822" data-xml-rid="REF25" href="#core-REF25" id="body-ref-REF25" role="doc-biblioref"><i data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">25</span></i></a><span data-dcnode-id="6821" instrument_node="">). However, a regression analysis controlling for all judgments showed that the only significant predictor of differences in votes was competence (</span><a class="open-in-viewer" data-dcnode-id="6819" href="#TBL2"><span data-dcnode-id="6820" instrument_node="">Table 2</span></a><span data-dcnode-id="6818" instrument_node="">). Competence alone accounted for 30.2% of the variance for the analyses of all Senate races and 45.0% of the variance for the races in which candidates were of the same sex and ethnicity. Thus, all other judgments combined contributed only 4.7% of the variance in the former analysis and less than 1.0% in the latter analysis.</span></div><div data-dcnode-id="6702" role="paragraph"><span data-dcnode-id="6816" instrument_node=""> </span><div class="figure-wrap" data-dcnode-id="6704"><figure class="table" data-dcnode-id="6705" id="TBL2"><div class="table-wrap table-wrap--collapsed" data-dcnode-id="6719" style="height: 280px;"><table data-dcnode-id="6724"><thead data-dcnode-id="6800"><tr data-dcnode-id="6808" data-xml-valign="top"><th data-dcnode-id="6814" data-xml-align="left" rowspan="2"><span data-dcnode-id="6815" instrument_node=""> Predictor </span></th><th colspan="2" data-dcnode-id="6811" data-xml-align="center"><span data-dcnode-id="6812"><span data-dcnode-id="6813" instrument_node=""> Differences in votes between winner and runner-up </span></span></th><td data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="6801" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6806"><span data-dcnode-id="6807" instrument_node="">&nbsp;</span></td><th data-dcnode-id="6804"><span data-dcnode-id="6805" instrument_node=""> All races </span></th><th data-dcnode-id="6802"><span data-dcnode-id="6803" instrument_node=""> Matched races </span></th></tr></thead><tbody data-dcnode-id="6725"><tr data-dcnode-id="6787" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6798" data-xml-align="left"><span data-dcnode-id="6799" instrument_node=""> Competence judgments </span></td><td data-dcnode-id="6793"><span data-dcnode-id="6797" instrument_node=""> 0.49 (</span><i data-dcnode-id="6795"><span data-dcnode-id="6796" instrument_node="">P</span></i><span data-dcnode-id="6794" instrument_node=""> &lt; 0.002) </span></td><td data-dcnode-id="6788"><span data-dcnode-id="6792" instrument_node=""> 0.58 (</span><i data-dcnode-id="6790"><span data-dcnode-id="6791" instrument_node="">P</span></i><span data-dcnode-id="6789" instrument_node=""> &lt; 0.002) </span></td></tr><tr data-dcnode-id="6774" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6785" data-xml-align="left"><span data-dcnode-id="6786" instrument_node=""> Age judgments </span></td><td data-dcnode-id="6780"><span data-dcnode-id="6784" instrument_node=""> 0.26 (</span><i data-dcnode-id="6782"><span data-dcnode-id="6783" instrument_node="">P</span></i><span data-dcnode-id="6781" instrument_node=""> &lt; 0.061) </span></td><td data-dcnode-id="6775"><span data-dcnode-id="6779" instrument_node=""> 0.07 (</span><i data-dcnode-id="6777"><span data-dcnode-id="6778" instrument_node="">P</span></i><span data-dcnode-id="6776" instrument_node=""> = 0.62) </span></td></tr><tr data-dcnode-id="6761" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6772" data-xml-align="left"><span data-dcnode-id="6773" instrument_node=""> Attractiveness judgments </span></td><td data-dcnode-id="6767"><span data-dcnode-id="6771" instrument_node=""> 0.07 (</span><i data-dcnode-id="6769"><span data-dcnode-id="6770" instrument_node="">P</span></i><span data-dcnode-id="6768" instrument_node=""> = 0.63) </span></td><td data-dcnode-id="6762"><span data-dcnode-id="6766" instrument_node=""> 0.08 (</span><i data-dcnode-id="6764"><span data-dcnode-id="6765" instrument_node="">P</span></i><span data-dcnode-id="6763" instrument_node=""> = 0.62) </span></td></tr><tr data-dcnode-id="6748" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6759" data-xml-align="left"><span data-dcnode-id="6760" instrument_node=""> Face familiarity judgments </span></td><td data-dcnode-id="6754"><span data-dcnode-id="6758" instrument_node=""> -0.05 (</span><i data-dcnode-id="6756"><span data-dcnode-id="6757" instrument_node="">P</span></i><span data-dcnode-id="6755" instrument_node=""> = 0.76) </span></td><td data-dcnode-id="6749"><span data-dcnode-id="6753" instrument_node=""> 0.03 (</span><i data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">P</span></i><span data-dcnode-id="6750" instrument_node=""> = 0.86) </span></td></tr><tr data-dcnode-id="6736" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6741" data-xml-align="left"><span data-dcnode-id="6747" instrument_node=""> Accounted variance (</span><i data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">R</span></i><sup data-dcnode-id="6743"><span data-dcnode-id="6744" instrument_node="">2</span></sup><span data-dcnode-id="6742" instrument_node="">) </span></td><td data-dcnode-id="6739"><span data-dcnode-id="6740" instrument_node=""> 34.9% </span></td><td data-dcnode-id="6737"><span data-dcnode-id="6738" instrument_node=""> 45.8% </span></td></tr><tr data-dcnode-id="6726" data-xml-align="center" data-xml-valign="top"><td data-dcnode-id="6733" data-xml-align="left"><span data-dcnode-id="6735" instrument_node=""> Number of races </span><hr data-dcnode-id="6734"></td><td data-dcnode-id="6730"><span data-dcnode-id="6732" instrument_node=""> 63 </span><hr data-dcnode-id="6731"></td><td data-dcnode-id="6727"><span data-dcnode-id="6729" instrument_node=""> 47 </span><hr data-dcnode-id="6728"></td></tr></tbody></table><span class="justify-content-end mt-n3 figure-expand-button position-absolute table-expand-button" data-dcnode-id="6720"><a class="btn" data-dcnode-id="6721" href="#" role="button"><span data-dcnode-id="6723" instrument_node="">Expand for more</span><i class="icon-arrow-down ml-2" data-dcnode-id="6722"></i></a></span></div><div class="table-collapse figure-expand-button" data-dcnode-id="6714"><button aria-expanded="false" class="btn table-collapse__btn" data-dcnode-id="6715" id="TBL2Collapse"><span data-dcnode-id="6717"><span data-dcnode-id="6718" instrument_node="">Collapse</span></span><i class="icon-arrow-up" data-dcnode-id="6716"></i></button></div><figcaption data-dcnode-id="6710"><span class="heading" data-dcnode-id="6712"><span data-dcnode-id="6713" instrument_node=""> Table 2</span></span><span data-dcnode-id="6711" instrument_node="">. Standardized regression coefficients of competence, age, attractiveness, and face familiarity judgments as predictors of differences in proportions of votes between the winner and the runner-up in races for the U.S. Senate in 2000 and 2002. Matched races are those in which both candidates were of the same sex and ethnicity.</span></figcaption><a class="btn btn-dark figure-pop-btn open-in-viewer" data-dcnode-id="6706" href="#TBL2"><i aria-hidden="true" class="icon-extlink-smooth" data-dcnode-id="6709"></i><span data-dcnode-id="6707"><span data-dcnode-id="6708" instrument_node="">OPEN IN VIEWER</span></span></a></figure></div><span data-dcnode-id="6703" instrument_node=""> </span></div><div class="figure-wrap" data-dcnode-id="6685"><figure class="graphic" data-dcnode-id="6686" id="FIG2"><img aria-labelledby="FIG2" data-dcnode-id="6701" height="784" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.science.org/cms/10.1126/science.1110589/asset/7ab5ffa8-f3e6-4b24-acc3-5526b1f3c04f/assets/graphic/308_1623_f2.jpeg&amp;raw" width="1280"><figcaption data-dcnode-id="6691"><span class="heading" data-dcnode-id="6699"><span data-dcnode-id="6700" instrument_node=""> Fig. 2</span></span><span data-dcnode-id="6698" instrument_node="">. Scatterplot of simulated voting preferences as a function of inferred competence from facial appearance. Each point represents a U.S. Senate race from 2000 or 2002. One group of participants was asked to cast hypothetical votes and another group was asked to judge the competence of candidates. Both the competence score and the voting preference score range from 0 to 1. The competence score represents the proportion of participants judging the candidate on the right to be more competent than the one on the left. The preference score represents the proportion of participants choosing the candidate on the right over the one on the left. The midpoint score of 0.50 on the </span><i data-dcnode-id="6696"><span data-dcnode-id="6697" instrument_node="">x</span></i><span data-dcnode-id="6695" instrument_node=""> axis indicates that the candidates were judged as equally competent. The midpoint score of 0.50 on the </span><i data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">y</span></i><span data-dcnode-id="6692" instrument_node=""> axis indicates lack of preference for either of the candidates.</span></figcaption><a class="btn btn-dark figure-pop-btn open-in-viewer" data-dcnode-id="6687" href="#FIG2"><i aria-hidden="true" class="icon-extlink-smooth" data-dcnode-id="6690"></i><span data-dcnode-id="6688"><span data-dcnode-id="6689" instrument_node="">OPEN IN VIEWER</span></span></a></figure></div><div data-dcnode-id="6679" role="paragraph"><span data-dcnode-id="6684" instrument_node="">Actual voting decisions are certainly based on multiple sources of information other than inferences from facial appearance. Voters can use this additional information to modify initial impressions of political candidates. However, from a dual-system perspective, correction of intuitive system 1 judgments is a prerogative of system 2 processes that are attention-dependent and are often anchored on intuitive system 1 judgments. Thus, correction of initial impressions may be insufficient (</span><a data-dcnode-id="6681" data-xml-rid="REF26" href="#core-REF26" id="body-ref-REF26" role="doc-biblioref"><i data-dcnode-id="6682"><span data-dcnode-id="6683" instrument_node="">26</span></i></a><span data-dcnode-id="6680" instrument_node="">). In the case of voting decisions, these decisions can be anchored on initial inferences of competence from facial appearance. From this perspective, in the absence of any other information, voting preferences should be closely related to such inferences. In real-life voting decisions, additional information may weaken the relation between inferences from faces and decisions but may not change the nature of the relation.</span></div><div data-dcnode-id="6643" role="paragraph"><span data-dcnode-id="6678" instrument_node="">To test this hypothesis, we conducted simulated voting studies in which participants were asked to choose the person they would have voted for in a political election (</span><a data-dcnode-id="6675" data-xml-rid="REF27" href="#core-REF27" id="body-ref-REF27" role="doc-biblioref"><i data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">27</span></i></a><span data-dcnode-id="6674" instrument_node="">). If voting preferences based on facial appearance derive from inferences of competence, the revealed preferences should be highly correlated with competence judgments. As shown in </span><a class="open-in-viewer" data-dcnode-id="6672" href="#FIG2"><span data-dcnode-id="6673" instrument_node="">Fig. 2</span></a><span data-dcnode-id="6671" instrument_node="">, the correlation was 0.83 (</span><i data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">P</span></i><span data-dcnode-id="6668" instrument_node=""> &lt; 0.001) (</span><a data-dcnode-id="6665" data-xml-rid="REF28" href="#core-REF28" id="body-ref-REF28" role="doc-biblioref"><i data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">28</span></i></a><span data-dcnode-id="6664" instrument_node="">). By comparison, the correlation between competence judgments and actual differences in votes was 0.56 (</span><i data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">P</span></i><span data-dcnode-id="6661" instrument_node=""> &lt; 0.001). These findings suggest that the additional information that voters had about the candidates diluted the effect of initial impressions on voting decisions. The simulated votes were also correlated with the actual votes [</span><i data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">r</span></i><span data-dcnode-id="6658" instrument_node="">(63) = 0.46, </span><i data-dcnode-id="6656"><span data-dcnode-id="6657" instrument_node="">P</span></i><span data-dcnode-id="6655" instrument_node=""> &lt; 0.001] (</span><a data-dcnode-id="6652" data-xml-rid="REF29" href="#core-REF29" id="body-ref-REF29" role="doc-biblioref"><i data-dcnode-id="6653"><span data-dcnode-id="6654" instrument_node="">29</span></i></a><span data-dcnode-id="6651" instrument_node="">, </span><a data-dcnode-id="6648" data-xml-rid="REF30" href="#core-REF30" id="body-ref-REF30-1" role="doc-biblioref"><i data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">30</span></i></a><span data-dcnode-id="6647" instrument_node="">). However, when controlling for inferences of competence, this correlation dropped to 0.01 (</span><i data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">P</span></i><span data-dcnode-id="6644" instrument_node=""> = 0.95), which suggests that both simulated and actual voting preferences were anchored on inferences of competence from facial appearance.</span></div><div data-dcnode-id="6617" role="paragraph"><span data-dcnode-id="6642" instrument_node="">Our findings have challenging implications for the rationality of voting preferences, adding to other findings that consequential decisions can be more “shallow” than we would like to believe (</span><a data-dcnode-id="6639" data-xml-rid="REF31" href="#core-REF31" id="body-ref-REF31" role="doc-biblioref"><i data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">31</span></i></a><span data-dcnode-id="6638" instrument_node="">, </span><a data-dcnode-id="6635" data-xml-rid="REF32" href="#core-REF32" id="body-ref-REF32" role="doc-biblioref"><i data-dcnode-id="6636"><span data-dcnode-id="6637" instrument_node="">32</span></i></a><span data-dcnode-id="6634" instrument_node="">). Of course, if trait inferences from facial appearance are correlated with the underlying traits, the effects of facial appearance on voting decisions can be normatively justified. This is certainly an empirical question that needs to be addressed. Although research has shown that inferences from thin slices of nonverbal behaviors can be surprisingly accurate (</span><a data-dcnode-id="6631" data-xml-rid="REF33" href="#core-REF33" id="body-ref-REF33" role="doc-biblioref"><i data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">33</span></i></a><span data-dcnode-id="6630" instrument_node="">), there is no good evidence that trait inferences from facial appearance are accurate (</span><a data-dcnode-id="6627" data-xml-rid="REF34" href="#core-REF34" id="body-ref-REF34" role="doc-biblioref"><i data-dcnode-id="6628"><span data-dcnode-id="6629" instrument_node="">34</span></i></a><span data-dcnode-id="6626" instrument_node="">–</span><a data-dcnode-id="6623" data-xml-rid="REF39" href="#core-REF39" id="body-ref-REF39-1" role="doc-biblioref"><i data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">39</span></i></a><span data-dcnode-id="6622" instrument_node="">). As Darwin recollected in his autobiography (</span><a data-dcnode-id="6619" data-xml-rid="REF40" href="#core-REF40" id="body-ref-REF40" role="doc-biblioref"><i data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">40</span></i></a><span data-dcnode-id="6618" instrument_node="">), he was almost denied the chance to take the historic Beagle voyage—the one that enabled the main observations of his theory of evolution—on account of his nose. Apparently, the captain did not believe that a person with such a nose would “possess sufficient energy and determination.”</span></div><span data-dcnode-id="6615" instrument_node="">
</span></div></section><section data-dcnode-id="5459" data-extent="backmatter" id="backmatter"><div class="core-container" data-dcnode-id="5460"><section data-dcnode-id="6599" id="footnotes"><h2 data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">Footnote</span></h2><div class="labeled" data-dcnode-id="6600" role="doc-footnote"><div class="label" data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">†</span></div><div data-dcnode-id="6601" id="FN1" role="paragraph"><span data-dcnode-id="6608" instrument_node="">Present address: Department of Psychology, New York University, New York, NY 10003, USA.</span><div class="external-links" data-dcnode-id="6602"><div class="to-citation__wrapper" data-dcnode-id="6603"><button class="to-citation" data-dcnode-id="6604"><i aria-hidden="true" class="icon-return" data-dcnode-id="6607"></i><span data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">Go to Footnote</span></span></button></div></div></div></div></section><section class="core-supplementary-materials" data-dcnode-id="6585" id="supplementary-materials"><h2 data-dcnode-id="6597"><span data-dcnode-id="6598" instrument_node="">Supplementary Material</span></h2><div data-dcnode-id="6586" role="list"><div class="core-supplementary-material" data-dcnode-id="6587" role="listitem"><div class="core-description" data-dcnode-id="6591"><span class="core-label" data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">File</span></span><span data-dcnode-id="6594" instrument_node=""> </span><span class="core-filename" data-dcnode-id="6592"><span data-dcnode-id="6593" instrument_node="">(todorov.som.pdf)</span></span></div><div class="core-link" data-dcnode-id="6588"><a data-dcnode-id="6589" download="todorov.som.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.science.org/doi/suppl/10.1126/science.1110589/suppl_file/todorov.som.pdf"><span data-dcnode-id="6590" instrument_node="">Download</spa dcnode-id="6230" href="#body-ref-REF12-3"><i aria-hidden="true" class="icon-return" data-dcnode-id="6233"></i><span data-dcnode-id="6231"><span data-dcnode-id="6232" instrument_node="">c [...] of the Democratic and Republican candidates </span></span></a></li><li data-dcnode-id="6224"><a class="to-citation" data-dcnode-id="6225" href="#body-ref-REF12-4"><i aria-hidden="true" class="icon-return" data-dcnode-id="6228"></i><span data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">d [...] the accuracy of prediction substantially </span></span></a></li><li data-dcnode-id="6219"><a class="to-citation" data-dcnode-id="6220" href="#body-ref-REF12-5"><i aria-hidden="true" class="icon-return" data-dcnode-id="6223"></i><span data-dcnode-id="6221"><span data-dcnode-id="6222" instrument_node="">e [...] in the absence of time constraints </span></span></a></li><li data-dcnode-id="6214"><a class="to-citation" data-dcnode-id="6215" href="#body-ref-REF12-6"><i aria-hidden="true" class="icon-return" data-dcnode-id="6218"></i><span data-dcnode-id="6216"><span data-dcnode-id="6217" instrument_node="">f [...] we used the 2000 and 2002 Senate races </span></span></a></li></ul></div></div></div></div></div><div class="labeled" data-dcnode-id="6188" role="doc-biblioentry"><div class="label" data-dcnode-id="6206"><span data-dcnode-id="6207" instrument_node="">13</span></div><div class="citations" data-dcnode-id="6189" id="REF13"><div class="citation" data-dcnode-id="6190"><div class="citation-content" data-dcnode-id="6200"><span data-dcnode-id="6205" instrument_node="">For the House races in 2002, we were able to obtain pictures of both the winner and the runner-up for 321 of the 435 races. For the House races in 2004, we were able to obtain pictures for 279 of the 435 races (</span><a data-dcnode-id="6202" data-xml-rid="REF12" href="#core-REF12" id="body-ref-REF12-2" role="doc-biblioref"><i data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">12</span></i></a><span data-dcnode-id="6201" instrument_node="">).</span></div><div class="external-links" data-dcnode-id="6191"><div class="to-citation__wrapper" data-dcnode-id="6195"><a class="to-citation" data-dcnode-id="6196" href="#body-ref-REF13"><i aria-hidden="true" class="icon-return" data-dcnode-id="6199"></i><span data-dcnode-id="6197"><span data-dcnode-id="6198" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="6192"><a data-dcnode-id="6193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DFor%2Bthe%2BHouse%2Braces%2Bin%2B2002%252C%2Bwe%2Bwere%2Bable%2Bto%2Bobtain%2Bpictures%2Bof%2Bboth%2Bthe%2Bwinner%2Band%2Bthe%2Brunner-up%2Bfor%2B321%2Bof%2Bthe%2B435%2Braces.%2BFor%2Bthe%2BHouse%2Braces%2Bin%2B2004%252C%2Bwe%2Bwere%2Bable%2Bto%2Bobtain%2Bpictures%2Bfor%2B279%2Bof%2Bthe%2B435%2Braces%2B%252812%2529."><span data-dcnode-id="6194" instrument_node="">Google Scholar</span></a></div></div></div></div></div><div class="labeled" data-dcnode-id="6168" role="doc-biblioentry"><div class="label" data-dcnode-id="6186"><span data-dcnode-id="6187" instrument_node="">14</span></div><div class="citations" data-dcnode-id="6169" id="REF14"><div class="citation" data-dcnode-id="6170"><div class="citation-content" data-dcnode-id="6180"><span data-dcnode-id="6185" instrument_node="">In the studies involving these races, we used photographs of the Democratic and Republican candidates (</span><a data-dcnode-id="6182" data-xml-rid="REF12" href="#core-REF12" id="body-ref-REF12-3" role="doc-biblioref"><i data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">12</span></i></a><span data-dcnode-id="6181" instrument_node="">).</span></div><div class="external-links" data-dcnode-id="6171"><div class="to-citation__wrapper" data-dcnode-id="6175"><a class="to-citation" data-dcnode-id="6176" href="#body-ref-REF14"><i aria-hidden="true" class="icon-return" data-dcnode-id="6179"></i><span data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="6172"><a data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DIn%2Bthe%2Bstudies%2Binvolving%2Bthese%2Braces%252C%2Bwe%2Bused%2Bphotographs%2Bof%2Bthe%2BDemocratic%2Band%2BRepublican%2Bcandidates%2B%252812%2529."><span data-dcnode-id="6174" instrument_node="">Google Scholar</span></a></div></div></div></div></div><div class="labeled" data-dcnode-id="6152" role="doc-biblioentry"><div class="label" data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">15</span></div><div class="citations" data-dcnode-id="6153" id="REF15"><div class="citation" data-dcnode-id="6154"><div class="citation-content" data-dcnode-id="6164"><span data-dcnode-id="6165" instrument_node="">In addition, the accuracy of the predictions was not affected by the race and sex of the candidates. This is important because participants might have used race and sex stereotypes to make competence judgments for contests in which the candidates were of different sexes and races. For example, in such contests Caucasian male candidates were more likely to win. However, if anything, competence judgments predicted the outcomes of elections in which the candidates were of the same sex and race (73.1% for the Senate and 68.5% for the House) more accurately than elections in which they were of different sexes and races (67.9% and 64.3%, respectively). This difference possibly reflects participants' social desirability concerns when judging people of different race and sex.</span></div><div class="external-links" data-dcnode-id="6155"><div class="to-citation__wrapper" data-dcnode-id="6159"><a class="to-citation" data-dcnode-id="6160" href="#body-ref-REF15"><i aria-hidden="true" class="icon-return" data-dcnode-id="6163"></i><span data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="6156"><a data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DIn%2Baddition%252C%2Bthe%2Baccuracy%2Bof%2Bthe%2Bpredictions%2Bwas%2Bnot%2Baffected%2Bby%2Bthe%2Brace%2Band%2Bsex%2Bof%2Bthe%2Bcandidates.%2BThis%2Bis%2Bimportant%2Bbecause%2Bparticipants%2Bmight%2Bhave%2Bused%2Brace%2Band%2Bsex%2Bstereotypes%2Bto%2Bmake%2Bcompetence%2Bjudgments%2Bfor%2Bcontests%2Bin%2Bwhich%2Bthe%2Bcandidates%2Bwere%2Bof%2Bdifferent%2Bsexes%2Band%2Braces.%2BFor%2Bexample%252C%2Bin%2Bsuch%2Bcontests%2BCaucasian%2Bmale%2Bcandidates%2Bwere%2Bmore%2Blikely%2Bto%2Bwin.%2BHowever%252C%2Bif%2Banything%252C%2Bcompetence%2Bjudgments%2Bpredicted%2Bthe%2Boutcomes%2Bof%2Belections%2Bin%2Bwhich%2Bthe%2Bcandidates%2Bwere%2Bof%2Bthe%2Bsame%2Bsex%2Band%2Brace%2B%252873.1%2525%2Bfor%2Bthe%2BSenate%2Band%2B68.5%2525%2Bfor%2Bthe%2BHouse%2529%2Bmore%2Baccurately%2Bthan%2Belections%2Bin%2Bwhich%2Bthey%2Bwere%2Bof%2Bdifferent%2Bsexes%2Band%2Braces%2B%252867.9%2525%2Band%2B64.3%2525%252C%2Brespectively%2529.%2BThis%2Bdifference%2Bpossibly%2Breflects%2Bparticipants%2527%2Bsocial%2Bdesirability%2Bconcerns%2Bwhen%2Bjudging%2Bpeople%2Bof%2Bdifferent%2Brace%2Band%2Bsex."><span data-dcnode-id="6158" instrument_node="">Google Scholar</span></a></div></div></div></div></div><div class="labeled" data-dcnode-id="6136" role="doc-biblioentry"><div class="label" data-dcnode-id="6150"><span data-dcnode-id="6151" instrument_node="">16</span></div><div class="citations" data-dcnode-id="6137" id="REF16"><div class="citation" data-dcnode-id="6138"><div class="citation-content" data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">For races with more than two candidates, we standardized this difference so that it was comparable to the difference in races with two candidates. Specifically, the difference between the votes of the winner and those of the runner-up was divided by the sum of their votes.</span></div><div class="external-links" data-dcnode-id="6139"><div class="to-citation__wrapper" data-dcnode-id="6143"><a class="to-citation" data-dcnode-id="6144" href="#body-ref-REF16"><i aria-hidden="true" class="icon-return" data-dcnode-id="6147"></i><span data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="6140"><a data-dcnode-id="6141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DFor%2Braces%2Bwith%2Bmore%2Bthan%2Btwo%2Bcandidates%252C%2Bwe%2Bstandardized%2Bthis%2Bdifference%2Bso%2Bthat%2Bit%2Bwas%2Bcomparable%2Bto%2Bthe%2Bdifference%2Bin%2Braces%2Bwith%2Btwo%2Bcandidates.%2BSpecifically%252C%2Bthe%2Bdifference%2Bbetween%2Bthe%2Bvotes%2Bof%2Bthe%2Bwinner%2Band%2Bthose%2Bof%2Bthe%2Brunner-up%2Bwas%2Bdivided%2Bby%2Bthe%2Bsum%2Bof%2Btheir%2Bvotes."><span data-dcnode-id="6142" instrument_node="">Google Scholar</span></a></div></div></div></div></div><div class="labeled" data-dcnode-id="6104" role="doc-biblioentry"><div class="label" data-dcnode-id="6134"><span data-dcnode-id="6135" instrument_node="">17</span></div><div class="citations" data-dcnode-id="6105" id="REF17"><div class="citation" data-dcnode-id="6106"><div class="citation-content" data-dcnode-id="6116"><span data-dcnode-id="6133" instrument_node="">From the scatterplot showing the relation between competence judgments and votes for Senate (</span><a class="open-in-viewer" data-dcnode-id="6131" href="#FIG1"><span data-dcnode-id="6132" instrument_node="">Fig. 1B</span></a><span data-dcnode-id="6130" instrument_node="">), seven races (three in the lower right quadrant and four in the upper left quadrant) could be identified as deviating from the linear trend. It is a well-known fact that incumbents have an advantage in U.S. elections (</span><a data-dcnode-id="6127" data-xml-rid="REF18" href="#core-REF18" id="body-ref-REF18-2" role="doc-biblioref"><i data-dcnode-id="6128"><span data-dcnode-id="6129" instrument_node="">18</span></i></a><span data-dcnode-id="6126" instrument_node="">). In six of the seven races, the incumbent won but was judged as less competent. In the seventh race (Illinois, 2004) there was no incumbent, but the person who won, Barack Obama, was the favorite long before the election. Excluding these seven races, the correlation between competence judgments and differences in votes increased to 0.64 (</span><i data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">P</span></i><span data-dcnode-id="6123" instrument_node=""> &lt; 0.001). Although incumbent status seemed to affect the strength of the linear relation between inferences of competence and the margin of victory, it did not affect the prediction of the outcome. Competence judgments predicted the outcome in 72.9% of the races in which the incumbent won, in 66.7% of the races in which the incumbent lost, and in 68.8% of the cases in which there was no incumbent (χ</span><sup data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">2</span></sup><span data-dcnode-id="6120" instrument_node=""> &lt; 1.0 for the difference between these percentages; </span><i data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">P</span></i><span data-dcnode-id="6117" instrument_node=""> = 0.89).</span></div><div class="external-links" data-dcnode-id="6107"><div class="to-citation__wrapper" data-dcnode-id="6111"><a class="to-citation" data-dcnode-id="6112" href="#body-ref-REF17"><i aria-hidden="true" class="icon-return" data-dcnode-id="6115"></i><span data-dcnode-id="6113"><span data-dcnode-id="6114" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="6108"><a data-dcnode-id="6109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DFrom%2Bthe%2Bscatterplot%2Bshowing%2Bthe%2Brelation%2Bbetween%2Bcompetence%2Bjudgments%2Band%2Bvotes%2Bfor%2BSenate%2B%28Fig.%2B1B%29%252C%2Bseven%2Braces%2B%28three%2Bin%2Bthe%2Blower%2Bright%2Bquadrant%2Band%2Bfour%2Bin%2Bthe%2Bupper%2Bleft%2Bquadrant%29%2Bcould%2Bbe%2Bidentified%2Bas%2Bdeviating%2Bfrom%2Bthe%2Blinear%2Btrend.%2BIt%2Bis%2Ba%2Bwell-known%2Bfact%2Bthat%2Bincumbents%2Bhave%2Ban%2Badvantage%2Bin%2BU.S.%2Belections%2B%2818%29.%2BIn%2Bsix%2Bof%2Bthe%2Bseven%2Braces%252C%2Bthe%2Bincumbent%2Bwon%2Bbut%2Bwas%2Bjudged%2Bas%2Bless%2Bcompetent.%2BIn%2Bthe%2Bseventh%2Brace%2B%28Illinois%252C%2B2004%29%2Bthere%2Bwas%2Bno%2Bincumbent%252C%2Bbut%2Bthe%2Bperson%2Bwho%2Bwon%252C%2BBarack%2BObama%252C%2Bwas%2Bthe%2Bfavorite%2Blong%2Bbefore%2Bthe%2Belection.%2BExcluding%2Bthese%2Bseven%2Braces%252C%2Bthe%2Bcorrelation%2Bbetween%2Bcompetence%2Bjudgments%2Band%2Bdifferences%2Bin%2Bvotes%2Bincreased%2Bto%2B0.64%2B%28P%2B%253C%2B0.001%29.%2BAlthough%2Bincumbent%2Bstatus%2Bseemed%2Bto%2Baffect%2Bthe%2Bstrength%2Bof%2Bthe%2Blinear%2Brelation%2Bbetween%2Binferences%2Bof%2Bcompetence%2Band%2Bthe%2Bmargin%2Bof%2Bvictory%252C%2Bit%2Bdid%2Bnot%2Baffect%2Bthe%2Bprediction%2Bof%2Bthe%2Boutcome.%2BCompetence%2Bjudgments%2Bpredicted%2Bthe%2Boutcome%2Bin%2B72.9%2525%2Bof%2Bthe%2Braces%2Bin%2Bwhich%2Bthe%2Bincumbent%2Bwon%252C%2Bin%2B66.7%2525%2Bof%2Bthe%2Braces%2Bin%2Bwhich%2Bthe%2Bincumbent%2Blost%252C%2Band%2Bin%2B68.8%2525%2Bof%2Bthe%2Bcases%2Bin%2Bwhich%2Bthere%2Bwas%2Bno%2Bincumbent%2B%28%25CF%25872%2B%253C%2B1.0%2Bfor%2Bthe%2Bdifference%2Bbetween%2Bthese%2Bpercentages%253B%2BP%2B%253D%2B0.89%29."><span data-dcnode-id="6110" instrument_node="">Google Scholar</span></a></div></div></div></div></div><div class="labeled" data-dcnode-id="6063" role="doc-biblioentry"><div class="label" data-dcnode-id="6102"><span data-dcnode-id="6103" instrument_node="">18</span></div><div class="citations" data-dcnode-id="6064" id="REF18"><div class="citation" data-dcnode-id="6065"><div class="citation-content" data-dcnode-id="6092"><span class="named-content" data-dcnode-id="6100" data-type="arthw-firstauthor" ation__wrapper" data-dcnode-id="5839"><a class="to-citation" data-dcnode-id="5840" href="#body-ref-REF27"><i aria-hidden="true" class="icon-return" data-dcnode-id="5843"></i><span data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="5836"><a data-dcnode-id="5837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DFor%2Bthese%2Bstudies%252C%2Bwe%2Bused%2Bthe%2B2000%2Band%2B2002%2BSenate%2Braces%2B%252812%2529."><span data-dcnode-id="5838" instrument_node="">Google Scholar</span></a></div></div></div></div></div><div class="labeled" data-dcnode-id="5806" role="doc-biblioentry"><div class="label" data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">28</span></div><div class="citations" data-dcnode-id="5807" id="REF28"><div class="citation" data-dcnode-id="5808"><div class="citation-content" data-dcnode-id="5818"><span data-dcnode-id="5829" instrument_node="">An additional analysis from a study in which participants made judgments of the candidates for the Senate (2000 and 2002) on 13 different traits [see (</span><a data-dcnode-id="5826" data-xml-rid="REF10" href="#core-REF10" id="body-ref-REF10" role="doc-biblioref"><i data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">10</span></i></a><span data-dcnode-id="5825" instrument_node="">) for the list of traits] provided additional evidence that inferences of competence were the key determinants of voting preferences in this situation. We regressed voting preferences on the 13 trait judgments. The only significant predictor of these preferences was the judgment of competence [⚫ = 0.67, </span><i data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">t</span></i><span data-dcnode-id="5822" instrument_node="">(49) = 4.46, </span><i data-dcnode-id="5820"><span data-dcnode-id="5821" instrument_node="">P</span></i><span data-dcnode-id="5819" instrum /?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DSoc.%2BForces%26publication_year%3D1996%26pages%3D823%26doi%3D10.2307%252F2580383"><span data-dcnode-id="5560" instrument_node="">Google Scholar</span></a></div></div></div></div></div><div class="labeled" data-dcnode-id="5535" role="doc-biblioentry"><div class="label" data-dcnode-id="5552"><span data-dcnode-id="5553" instrument_node="">38</span></div><div class="citations" data-dcnode-id="5536"><div class="citation" data-dcnode-id="5537"><div class="citation-content" data-dcnode-id="5542"><span data-dcnode-id="5551" instrument_node="">There is evidence that trait inferences from facial appearance can be wrong. Collins and Zebrowitz [cited in (</span><a data-dcnode-id="5548" data-xml-rid="REF23" href="#core-REF23" id="body-ref-REF23-2" role="doc-biblioref"><i data-dcnode-id="5549"><span data-dcnode-id="5550" instrument_node="">23</span></i></a><span data-dcnode-id="5547" instrument_node="">), p. 136] showed that baby-faced individuals who are judged as less competent than mature-faced individuals actually tend to be more intelligent. There is also evidence that subtle alterations of facial features can influence the trait impressions of highly familiar presidents such as Reagan and Clinton (</span><a data-dcnode-id="5544" data-xml-rid="REF39" href="#core-REF39" id="body-ref-REF39-2" role="doc-biblioref"><i data-dcnode-id="5545"><span data-dcnode-id="5546" instrument_node="">39</span></i></a><span data-dcnode-id="5543" instrument_node="">).</span></div><div class="external-links" data-dcnode-id="5538"><div data-dcnode-id="5539"><a data-dcnode-id="5540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DThere%2Bis%2Bevidence%2Bthat%2Btrait%2Binferences%2Bfrom%2Bfacial%2Bappearance%2Bcan%2Bbe%2Bwrong.%2BCollins%2Band%2BZebrowitz%2B%255Bcited%2Bin%2B%252823%2529%252C%2Bp.%2B136%255D%2Bshowed%2Bthat%2Bbaby-faced%2Bindividuals%2Bwho%2Bare%2B li data-dcnode-id="1086"><a class="to-citation" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF12-4"><i aria-hidden="true" class="icon-return" data-dcnode-id="1090"></i><span data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">d [...] the accuracy of prediction substantially </span></span></a></li><li data-dcnode-id="1081"><a class="to-citation" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF12-5"><i aria-hidden="true" class="icon-return" data-dcnode-id="1085"></i><span data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">e [...] in the absence of time constraints </span></span></a></li><li data-dcnode-id="1076"><a class="to-citation" data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF12-6"><i aria-hidden="true" class="icon-return" data-dcnode-id="1080"></i><span data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">f [...] we used the 2000 and 2002 Senate races </span></span></a></li></ul></div></div></div><div class="citation" data-dcnode-id="1053" id="core-REF13"><div class="citation" data-dcnode-id="1063"><div class="label" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">13</span></div><div class="citation-content" data-dcnode-id="1064"><span data-dcnode-id="1069" instrument_node="">For the House races in 2002, we were able to obtain pictures of both the winner and the runner-up for 321 of the 435 races. For the House races in 2004, we were able to obtain pictures for (</span><a data-dcnode-id="1047" data-xml-rid="REF12" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23core-REF12" id="body-ref-REF12-3" role="doc-biblioref"><i data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">12</span></i></a><span data-dcnode-id="1046" instrument_node="">).</span></div></div><div class="external-links" data-dcnode-id="1035"><div class="to-citation__wrapper" data-dcnode-id="1039"><a class="to-citation" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF14"><i aria-hidden="true" class="icon-return" data-dcnode-id="1043"></i><span data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="1036"><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DIn%2Bthe%2Bstudies%2Binvolving%2Bthese%2Braces%252C%2Bwe%2Bused%2Bphotographs%2Bof%2Bthe%2BDemocratic%2Band%2BRepublican%2Bcandidates%2B%252812%2529."><span data-dcnode-id="1038" instrument_node="">Google Scholar</span></a></div></div></div><div class="citation" data-dcnode-id="1019" id="core-REF15"><div class="citation" data-dcnode-id="1029"><div class="label" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">15</span></div><div class="citation-content" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">In addition, the accuracy of the predictions was not affected by the race and sex of the candidates. This is important because participants might have used race and sex stereotypes to make competence judgments for contests in which the candidates were of different sexes and races. For example, in such contests Caucasian male candidates were more likely to win. However, if anything, competence judgments predicted the outcomes of elections in which the candidates were of the same sex and race (73.1% for the Senate and 68.5% for the House) more accurately than elections in which they were of different sexes and races (67.9% and 64.3%, respectively). This difference possibly reflects participants' social desirability concerns when judging people of different race and sex.</span></div></div><div class="external-links" data-dcnode-id="1020"><div class="to-citation__wrapper" data-dcnode-id="1024"><a class="to-citation" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF15"><i aria-hidden="true" class="icon-return" data-dcnode-id="1028"></i><span data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="1021"><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DIn%2Baddition%252C%2Bthe%2Baccuracy%2Bof%2Bthe%2Bpredictions%2Bwas%2Bnot%2Baffected%2Bby%2Bthe%2Brace%2Band%2Bsex%2Bof%2Bthe%2Bcandidates.%2BThis%2Bis%2Bimportant%2Bbecause%2Bparticipants%2Bmight%2Bhave%2Bused%2Brace%2Band%2Bsex%2Bstereotypes%2Bto%2Bmake%2Bcompetence%2Bjudgments%2Bfor%2Bcontests%2Bin%2Bwhich%2Bthe%2Bcandidates%2Bwere%2Bof%2Bdifferent%2Bsexes%2Band%2Braces.%2BFor%2Bexample%252C%2Bin%2Bsuch%2Bcontests%2BCaucasian%2Bmale%2Bcandidates%2Bwere%2Bmore%2Blikely%2Bto%2Bwin.%2BHowever%252C%2Bif%2Banything%252C%2Bcompetence%2Bjudgments%2Bpredicted%2Bthe%2Boutcomes%2Bof%2Belections%2Bin%2Bwhich%2Bthe%2Bcandidates%2Bwere%2Bof%2Bthe%2Bsame%2Bsex%2Band%2Brace%2B%252873.1%2525%2Bfor%2Bthe%2BSenate%2Band%2B68.5%2525%2Bfor%2Bthe%2BHouse%2529%2Bmore%2Baccurately%2Bthan%2Belections%2Bin%2Bwhich%2Bthey%2Bwere%2Bof%2Bdifferent%2Bsexes%2Band%2Braces%2B%252867.9%2525%2Band%2B64.3%2525%252C%2Brespectively%2529.%2BThis%2Bdifference%2Bpossibly%2Breflects%2Bparticipants%2527%2Bsocial%2Bdesirability%2Bconcerns%2Bwhen%2Bjudging%2Bpeople%2Bof%2Bdifferent%2Brace%2Band%2Bsex."><span data-dcnode-id="1023" instrument_node="">Google Scholar</span></a></div></div></div><div class="citation" data-dcnode-id="1004" id="core-REF16"><div class="citation" data-dcnode-id="1014"><div class="label" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">16</span></div><div class="citation-content" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">For races with more than two candidates, we standardized this difference so that it was comparable to the difference in races with two candidates. Specifically, the difference between the votes of the winner and those of the runner-up was divided by the sum of their votes.</span></div></div><div class="external-links" data-dcnode-id="1005"><div class="to-citation__wrapper" data-dcnode-id="1009"><a class="to-citation" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF16"><i aria-hidden="true" class="icon-return" data-dcnode-id="1013"></i><span data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="1006"><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DFor%2Braces%2Bwith%2Bmore%2Bthan%2Btwo%2Bcandidates%252C%2Bwe%2Bstandardized%2Bthis%2Bdifference%2Bso%2Bthat%2Bit%2Bwas%2Bcomparable%2Bto%2Bthe%2Bdifference%2Bin%2Braces%2Bwith%2Btwo%2Bcandidates.%2BSpecifically%252C%2Bthe%2Bdifference%2Bbetween%2Bthe%2Bvotes%2Bof%2Bthe%2Bwinner%2Band%2Bthose%2Bof%2Bthe%2Brunner-up%2Bwas%2Bdivided%2Bby%2Bthe%2Bsum%2Bof%2Btheir%2Bvotes."><span data-dcnode-id="1008" instrument_node="">Google Scholar</span></a></div></div></div><div class="citation" data-dcnode-id="973" id="core-REF17"><div class="citation" data-dcnode-id="983"><div class="label" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">17</span></div><div class="citation-content" data-dcnode-id="984"><span data-dcnode-id="1001" instrument_node="">From the scatterplot showing the relation between competence judgments and votes for Senate (</span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23FIG1"><span data-dcnode-id="1000" instrument_node="">Fig. 1B</span></a><span data-dcnode-id="998" instrument_node="">), seven races (three in the lower right quadrant and four in the upper left quadrant) could be identified as deviating from the linear trend. It is a well-known fact that incumbents have an advantage in U.S. elections (</span><a data-dcnode-id="995" data-xml-rid="REF18" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23core-REF18" id="body-ref-REF18-2" role="doc-biblioref"><i data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">18</span></i></a><span data-dcnode-id="994" instrument_node="">). In six of the seven races, the incumbent won but was judged as less competent. In the seventh race (Illinois, 2004) there was no incumbent, but the person who won, Barack Obama, was the favorite long before the election. Excluding these seven races, the correlation between competence judgments and differences in votes increased to 0.64 (</span><i data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">P</span></i><span data-dcnode-id="991" instrument_node=""> &lt; 0.001). Although incumbent status seemed to affect the strength of the linear relation between inferences of competence and the margin of victory, it did not affect the prediction of the outcome. Competence judgments predicted the outcome in 72.9% of the races in which the incumbent won, in 66.7% of the races in which the incumbent lost, and in 68.8% of the cases in which there was no incumbent (χ</span><sup data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">2</span></sup><span data-dcnode-id="988" instrument_node=""> &lt; 1.0 for the difference between these percentages; </span><i data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">P</span></i><span data-dcnode-id="985" instrument_node=""> = 0.89).</span></div></div><div class="external-links" data-dcnode-id="974"><div class="to-citation__wrapper" data-dcnode-id="978"><a class="to-citation" data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF17"><i aria-hidden="true" class="icon-return" data-dcnode-id="982"></i><span data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="975"><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DFrom%2Bthe%2Bscatterplot%2Bshowing%2Bthe%2Brelation%2Bbetween%2Bcompetence%2Bjudgments%2Band%2Bvotes%2Bfor%2BSenate%2B%28Fig.%2B1B%29%252C%2Bseven%2Braces%2B%28three%2Bin%2Bthe%2Blower%2Bright%2Bquadrant%2Band%2Bfour%2Bin%2Bthe%2Bupper%2Bleft%2Bquadrant%29%2Bcould%2Bbe%2Bidentified%2Bas%2Bdeviating%2Bfrom%2Bthe%2Blinear%2Btrend.%2BIt%2Bis%2Ba%2Bwell-known%2Bfact%2Bthat%2Bincumbents%2Bhave%2Ban%2Badvantage%2Bin%2BU.S.%2Belections%2B%2818%29.%2BIn%2Bsix%2Bof%2Bthe%2Bseven%2Braces%252C%2Bthe%2Bincumbent%2Bwon%2Bbut%2Bwas%2Bjudged%2Bas%2Bless%2Bcompetent.%2BIn%2Bthe%2Bseventh%2Brace%2B%28Illinois%252C%2B2004%29%2Bthere%2Bwas%2Bno%2Bincumbent%252C%2Bbut%2Bthe%2Bperson%2Bwho%2Bwon%252C%2BBarack%2BObama%252C%2Bwas%2Bthe%2Bfavorite%2Blong%2Bbefore%2Bthe%2Belection.%2BExcluding%2Bthese%2Bseven%2Braces%252C%2Bthe%2Bcorrelation%2Bbetween%2Bcompetence%2Bjudgments%2Band%2Bdifferences%2Bin%2Bvotes%2Bincreased%2Bto%2B0.64%2B%28P%2B%253C%2B0.001%29.%2BAlthough%2Bincumbent%2Bstatus%2Bseemed%2Bto%2Baffect%2Bthe%2Bstrength%2Bof%2Bthe%2Blinear%2Brelation%2Bbetween%2Binferences%2Bof%2Bcompetence%2Band%2Bthe%2Bmargin%2Bof%2Bvictory%252C%2Bit%2Bdid%2Bnot%2Baffect%2Bthe%2Bprediction%2Bof%2Bthe%2Boutcome.%2BCompetence%2Bjudgments%2Bpredicted%2Bthe%2Boutcome%2Bin%2B72.9%2525%2Bof%2Bthe%2Braces%2Bin%2Bwhich%2Bthe%2Bincumbent%2Bwon%252C%2Bin%2B66.7%2525%2Bof%2Bthe%2Braces%2Bin%2Bwhich%2Bthe%2Bincumbent%2Blost%252C%2Band%2Bin%2B68.8%2525%2Bof%2Bthe%2Bcases%2Bin%2Bwhich%2Bthere%2Bwas%2Bno%2Bincumbent%2B%28%25CF%25872%2B%253C%2B1.0%2Bfor%2Bthe%2Bdifference%2Bbetween%2Bthese%2Bpercentages%253B%2BP%2B%253D%2B0.89%29."><span data-dcnode-id="977" instrument_node="">Google Scholar</span></a></div></div></div><div class="citation" data-dcnode-id="933" id="core-REF18"><div class="citation" data-dcnode-id="960"><div class="label" data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">18</span></div><div class="citation-content" data-dcnode-id="961"><span class="named-content" data-dcnode-id="969" data-type="arthw-firstauthor"><span data-dcnode-id="970" instrument_node="">A. D. Cover</span></span><span data-dcnode-id="968" instrument_node="">, </span><em data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Am. J. Polit. Sci.</span></em><b data-dcnode-id="963"><i data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">21</span></i></b><span data-dcnode-id="962" instrument_node="">, 523 (1977).</span></div></div><div class="external-links" data-dcnode-id="934"><div class="to-citation__wrapper"
