ment_node="">a [...] &lt; 0.001] </span></span></a></li><li data-dcnode-id="937"><a class="to-citation" data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF18-2"><i aria-hidden="true" class="icon-return" data-dcnode-id="941"></i><span data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">b [...] have an advantage in U.S. elections </span></span></a></li></ul></div></div></div><div class="citation" data-dcnode-id="914" id="core-REF19"><div class="citation" data-dcnode-id="924"><div class="label" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">19</span></div><div class="citation-content" data-dcnode-id="925"><span data-dcnode-id="930" instrument_node="">A bootstrapping data simulation showed that increasing the sample size to more than 40 participants does not improve the accuracy of prediction substantially (</span><a data-dcnode-id="927" data-xml-rid="REF12" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23core-REF12" id="body-ref-REF12-4" role="doc-biblioref"><i data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">12</span></i></a><span data-dcnode-id="926" instrument_node="">) (fig. S1).</span></div></div><div class="external-links" data-dcnode-id="915"><div class="to-citation__wrapper" data-dcnode-id="919"><a class="to-citation" data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF19"><i aria-hidden="true" class="icon-return" data-dcnode-id="923"></i><span data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="916"><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DA%2Bbootstrapping%2Bdata%2Bsimulation%2Bshowed%2Bthat%2Bincreasing%2Bthe%2Bsample%2Bsize%2Bto%2Bmore%2Bthan%2B40%2Bparticipants%2Bdoes%2Bnot%2Bimprove%2Bthe%2Baccuracy%2Bof%2Bprediction%2Bsubstantially%2B%252812%2529%2B%2528fig.%2BS1%2529."><span data-dcnode-id="918" instrument_node="">Google Scholar</span></a></div></div></div><div class="citation" data-dcnode-id="899" id="core-REF20"><div class="citation" data-dcnode-id="909"><div class="label" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">20</span></div><div class="citation-content" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Given the time constraints in this study, to avoid judgments based on salient differences such as race and sex, we used only Senate races (2000, 2002, and 2004) in which the candidates were of the same sex and race.</span></div></div><div class="external-links" data-dcnode-id="900"><div class="to-citation__wrapper" data-dcnode-id="904"><a class="to-citation" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF20"><i aria-hidden="true" class="icon-return" data-dcnode-id="908"></i><span data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="901"><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DGiven%2Bthe%2Btime%2Bconstraints%2Bin%2Bthis%2Bstudy%252C%2Bto%2Bavoid%2Bjudgments%2Bbased%2Bon%2Bsalient%2Bdifferences%2Bsuch%2Bas%2Brace%2Band%2Bsex%252C%2Bwe%2Bused%2Bonly%2BSenate%2Braces%2B%25282000%252C%2B2002%252C%2Band%2B2004%2529%2Bin%2Bwhich%2Bthe%2Bcandidates%2Bwere%2Bof%2Bthe%2Bsame%2Bsex%2Band%2Brace."><span data-dcnode-id="903" instrument_node="">Google Scholar</span></a></div></div></div><div class="citation" data-dcnode-id="880" id="core-REF21"><div class="citation" data-dcnode-id="890"><div class="label" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">21</span></div><div class="citation-content" data-dcnode-id="891"><span data-dcnode-id="896" instrument_node="">For this study, we used the 2002 Senate races. The judgments in this and the subsequent studies were performed in the absence of time constraints (</span><a data-dcnode-id="893" data-xml-rid="REF12" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23core-REF12" id="body-ref-REF12-5" role="doc-biblioref"><i data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">12</span></i></a><span data-dcnode-id="892" instrument_node="">).</span></div></div><div class="external-links" data-dcnode-id="881"><div class="to-citation__wrapper" data-dcnode-id="885"><a class="to-citation" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF21"><i aria-hidden="true" class="icon-return" data-dcnode-id="889"></i><span data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="882"><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DFor%2Bthis%2Bstudy%252C%2Bwe%2Bused%2Bthe%2B2002%2BSenate%2Braces.%2BThe%2Bjudgments%2Bin%2Bthis%2Band%2Bthe%2Bsubsequent%2Bstudies%2Bwere%2Bperformed%2Bin%2Bthe%2Babsence%2Bof%2Btime%2Bconstraints%2B%252812%2529."><span data-dcnode-id="884" instrument_no nt_node="">Go to reference</span></span></a></div><div data-dcnode-id="732"><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DUnintended%2BThought%26publication_year%3D1989%26pages%3D189"><span data-dcnode-id="734" instrument_node="">Google Scholar</span></a></div></div></div><div class="citation" data-dcnode-id="711" id="core-REF27"><div class="citation" data-dcnode-id="721"><div class="label" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">27</span></div><div class="citation-content" data-dcnode-id="722"><span data-dcnode-id="727" instrument_node="">For these studies, we used the 2000 and 2002 Senate races (</span><a data-dcnode-id="724" data-xml-rid="REF12" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23core-REF12" id="body-ref-REF12-6" role="doc-biblioref"><i data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">12</span></i></a><span data-dcnode-id="723" instrument_node="">).</span></div></div><div class="external-links" data-dcnode-id="712"><div class="to-citation__wrapper" data-dcnode-id="716"><a class="to-citation" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF27"><i aria-hidden="true" class="icon-return" data-dcnode-id="720"></i><span data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="713"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DFor%2Bthese%2Bstudies%252C%2Bwe%2Bused%2Bthe%2B2000%2Band%2B2002%2BSenate%2Braces%2B%252812%2529."><span data-dcnode-id="715" instrument_node="">Google Scholar</span></a></div></div></div><div class="citation" data-dcnode-id="686" id="core-REF28"><div class="citation" data-dcnode-id="696"><div class="label" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">28</span></div><div class="citation-content" data-dcnode-id="697"><span data-dcnode-id="708" instrument_node="">An additional analysis from a study in which participants made judgments of the candidates for the Senate (2000 and 2002) on 13 different traits [see (</span><a data-dcnode-id="705" data-xml-rid="REF10" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23core-REF10" id="body-ref-REF10" role="doc-biblioref"><i data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">10</span></i></a><span data-dcnode-id="704" instrument_node="">) for the list of traits] provided additional evidence that inferences of competence were the key determinants of voting preferences in this situation. We regressed voting preferences on the 13 trait judgments. The only significant predictor of these preferences was the judgment of competence [⚫ = 0.67, </span><i data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">t</span></i><span data-dcnode-id="701" instrument_node="">(49) = 4.46, </span><i data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">P</span></i><span data-dcnode-id="698" instrument_node=""> &lt; 0.001].</span></div></div><div class="external-links" data-dcnode-id="687"><div class="to-citation__wrapper" data-dcnode-id="691"><a class="to-citation" data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF28"><i aria-hidden="true" class="icon-return" data-dcnode-id="695"></i><span d ystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23core-REF35" id="body-ref-REF35-2" role="doc-biblioref"><i data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">35</span></i></a><span data-dcnode-id="538" instrument_node="">)], they seem to be limited to judgments of people from specific age groups (e.g., puberty), and the correlation is accounted for by the judges' reliance on physical attractiveness. That is, attractive people are perceived as more intelligent, and physical attractiveness is modestly correlated with IQ scores.</span></div></div><div class="external-links" data-dcnode-id="527"><div class="to-citation__wrapper" data-dcnode-id="531"><a class="to-citation" data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23body-ref-REF34"><i aria-hidden="true" class="icon-return" data-dcnode-id="535"></i><span data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Go to reference</span></span></a></div><div data-dcnode-id="528"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DThere%2Bis%2Bsome%2Bevidence%2Bthat%2Bjudgments%2Bof%2Bintelligence%2Bfrom%2Bfacial%2Bappearance%2Bcorrelate%2Bmodestly%2Bwith%2BIQ%2Bscores%2B%252835%2529.%2BHowever%252C%2Bthese%2Bcorrelations%2Btend%2Bto%2Bbe%2Bsmall%2B%255Be.g.%252C%2B%253C0.18%2Bin%2B%252835%2529%255D%252C%2Bthey%2Bseem%2Bto%2Bbe%2Blimited%2Bto%2Bjudgments%2Bof%2Bpeople%2Bfrom%2Bspecific%2Bage%2Bgroups%2B%2528e.g.%252C%2Bpuberty%2529%252C%2Band%2Bthe%2Bcorrelation%2Bis%2Baccounted%2Bfor%2Bby%2Bthe%2Bjudges%2527%2Breliance%2Bon%2Bphysical%2Battractiveness.%2BThat%2Bis%252C%2Battractive%2Bpeople%2Bare%2Bperceived%2Bas%2Bmore%2Bintelligent%252C%2Band%2Bphysical%2Battractiveness%2Bis%2Bmodestly%2Bcorrelated%2 a-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">2</span></sup><span data-dcnode-id="114" instrument_node=""> statistic tests the proportion of correctly predicted races against the chance level of 50%.</span></div></div><div class="fv__item" data-dcnode-id="103"><a class="fv__open-item fv__item__view" data-dcnode-id="110" data-type="tables" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medtargetsystem.com/beacon/portal-lite%3Fclient-origin%3Dhttps%3A//www.science.org%26timestamp%3D1652365317469%23fv-TBL2"><i class="icon-table" data-dcnode-id="111"></i></a><div class="fv__item__title" data-dcnode-id="108"><span data-dcnode-id="109" instrument_node=""> Table 2</span></div><div class="fv__item__description" data-dcnode-id="104"><span class="heading" data-dcnode-id="106"><span data-dcnode-id="107" instrument_node=""> Table 2</span></span><span data-dcnode-id="105" instrument_node="">. Standardized regression coefficients of competence, age, attractiveness, and face familiarity judgments as predictors of differences in proportions of votes between the winner and the runner-up in races for the U.S. Senate in 2000 and 2002. Matched races are those in which both candidates were of the same sex and ethnicity.</span></div></div></div></div></div></div></div><div class="st-header" data-dcnode-id="14" role="navigation" title="Sticky Navigation"><div class="st-header__content" data-dcnode-id="15"><div class="st-header__item st-header__menu" data-dcnode-id="95"><button aria-controls="#header-side-menu" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler btn-animate-bg d-inline-block collapsed" data-dcnode-id="96" data-target="#header-side-menu" data-toggle="collapse" type="button"><i class="icon-burger" data-dcnode-id="97"></i></button></div><div class="st-header__current st-header__item" data-dcnode-id="77"><nav class="breadcrumbs" data-dcnode-id="78"><div class="d-none d-sm-flex align-items-center" data-dc
