</span><section class="section" data-dcnode-id="154"><span data-dcnode-id="373" instrument_node="">
</span><h3 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Elections and Voting Lesson Plans</span></h3><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="361"><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teach-nology.com/teachers/lesson_plans/history/civics/"><span data-dcnode-id="369" instrument_node="">Civics Lesson Plans</span></a><span data-dcnode-id="367" instrument_node=""> | </span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teach-nology.com/themes/social/voting/"><span data-dcnode-id="366" instrument_node="">Elections and 
Voting Teaching Theme</span></a><span data-dcnode-id="364" instrument_node=""> | </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teach-nology.com/teachers/lesson_plans/history/government/"><span data-dcnode-id="363" instrument_node="">Government 
Lesson Plans</span></a></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="357"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teach-nology.com/worksheets/soc_studies/voting/"><span data-dcnode-id="359" instrument_node="">Elections 
Worksheets</span></a></p><span data-dcnode-id="356" instrument_node="">
</span><span data-dcnode-id="355" instrument_node="">
</span><span data-dcnode-id="354" instrument_node="">
</span><span data-dcnode-id="351" instrument_node="">
</span><span data-dcnode-id="332" instrument_node="">
</span><span data-dcnode-id="330" instrument_node="">
</span><table border="0" cellpadding="8" cellspacing="0" data-dcnode-id="328" width="100%"><tbody data-dcnode-id="329"><tr data-dcnode-id="331"><td data-dcnode-id="352" width="0%"><span data-dcnode-id="353" instrument_node="">&nbsp;</span></td><td data-dcnode-id="333" width="100%"><span data-dcnode-id="350" instrument_node="">
</span><ul data-dcnode-id="335"><span data-dcnode-id="349" instrument_node="">
</span><li data-dcnode-id="345"><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.beaconlearningcenter.com/Lessons/1792.htm"><span data-dcnode-id="348" instrument_node="">Be 
a Responsible Citizen: Vote!</span></a><span data-dcnode-id="346" instrument_node=""> - Explore American citizens' rights 
and responsibilities through group research on the Internet and 
develop a presentation of content to the class. </span></li><span data-dcnode-id="344" instrument_node="">
</span><li data-dcnode-id="337"><font color="#000000" data-dcnode-id="341"><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/democracy/kids/educators/budget.html"><span data-dcnode-id="343" instrument_node="">Budget 
Making</span></a></font><span data-dcnode-id="340" instrument_node="">- </span><font color="#000000" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">"Introduce students 
to budgets, expenses and savings; learn about government services 
and basic expenses; and create pie charts representing government 
spending priorities."</span></font></li><span data-dcnode-id="336" instrument_node="">
</span></ul><span data-dcnode-id="334" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="327" instrument_node="">
</span><ol data-dcnode-id="167"><span data-dcnode-id="326" instrument_node="">
</span><li data-dcnode-id="322"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.education-world.com/a_lesson/00-2/lp2091.shtml"><span data-dcnode-id="325" instrument_node="">Campaign 
Ad Critique</span></a><span data-dcnode-id="323" instrument_node="">- "Students analyze current campaign TV ads and literature. 
They identify the ad by "type." They learn to look beyond the ad to understand 
its intended purposes and its real content."</span></li><span data-dcnode-id="321" instrument_node="">
</span><li data-dcnode-id="317"><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teach-nology.com/lessons/lsn_pln_view_lessons.php%3Faction%3Dview%26cat_id%3D10%26lsn_id%3D20640"><span data-dcnode-id="320" instrument_node="">Civil 
Rights Movement and Voting</span></a><span data-dcnode-id="318" instrument_node=""> - Students will develop a timeline that 
outlines events and key people during the Civil Rights Movement and explain 
how this movement impacts voting in today's society.</span></li><span data-dcnode-id="316" instrument_node="">
</span><li data-dcnode-id="312"><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.beaconlearningcenter.com/Lessons/47.htm"><span data-dcnode-id="315" instrument_node="">Constitutional 
Amendments Survey</span></a><span data-dcnode-id="313" instrument_node=""> - Students conduct a Constitutional Amendments Survey 
to create an opinion poll forum for the upcoming Florida vote. </span></li><span data-dcnode-id="311" instrument_node="">
</span><li data-dcnode-id="307"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.beaconlearningcenter.com/Lessons/1574.htm"><span data-dcnode-id="310" instrument_node="">Determining 
the President of 1860</span></a><span data-dcnode-id="308" instrument_node=""> - The learner will determine who won the U.S. 
Presidential election of 1860. Students will find the information online, 
create a database, manipulate a spreadsheet and present findings.</span></li><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="302"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.education-world.com/a_lesson/00-2/lp2088.shtml"><span data-dcnode-id="305" instrument_node="">Election 
Results Map</span></a><span data-dcnode-id="303" instrument_node="">- "Students create maps with a color key showing election 
night returns."</span></li><span data-dcnode-id="301" instrument_node="">
</span><li data-dcnode-id="297"><a data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teach-nology.com/lessons/lsn_pln_view_lessons.php%3Faction%3Dview%26cat_id%3D10%26lsn_id%3D2174"><span data-dcnode-id="300" instrument_node="">Election 
Unit</span></a><span data-dcnode-id="298" instrument_node=""> - The student will be able to write an essay about the election 
process in America. </span></li><span data-dcnode-id="296" instrument_node="">
</span><li data-dcnode-id="292"><a data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.beaconlearningcenter.com/Lessons/76.htm"><span data-dcnode-id="295" instrument_node="">Every Vote 
Counts</span></a><span data-dcnode-id="293" instrument_node=""> - This is a multi-phase activity designed to increase student 
awareness and participation in the voting process.</span></li><span data-dcnode-id="291" instrument_node="">
</span><li data-dcnode-id="287"><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teach-nology.com/lessons/lsn_pln_view_lessons.php%3Faction%3Dview%26cat_id%3D10%26lsn_id%3D15994"><span data-dcnode-id="290" instrument_node="">Get 
Out and Vote!</span></a><span data-dcnode-id="288" instrument_node=""> - Students will have a desire to vote and will research 
candidates before voting.</span></li><span data-dcnode-id="286" instrument_node="">
</span><li data-dcnode-id="282"><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.education-world.com/a_lesson/00-2/lp2087.shtml"><span data-dcnode-id="285" instrument_node="">Getting 
Out the Vote: An Election Day Classroom Experiment</span></a><span data-dcnode-id="283" instrument_node="">- "An experiment 
drives home to students the importance of voting!"</span></li><span data-dcnode-id="281" instrument_node="">
</span><li data-dcnode-id="275"><a data-dcnode-id="279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/democracy/kids/educators/graphically.html"><span data-dcnode-id="280" instrument_node="">Graphically 
Speaking</span></a><span data-dcnode-id="278" instrument_node="">- </span><font color="#000000" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">"Explore the relationship between 
congressional representation and state population by graphing current 
statistics and taking a historical look at the Constitution."</span></font></li><span data-dcnode-id="274" instrument_node="">
</span><li data-dcnode-id="270"><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.education-world.com/a_lesson/00-2/lp2090.shtml"><span data-dcnode-id="273" instrument_node="">If 
I Were President ...</span></a><span data-dcnode-id="271" instrument_node="">- "Students think critically about the campaign 
issues in the current election." </span></li><span data-dcnode-id="269" instrument_node="">
</span><li data-dcnode-id="265"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teach-nology.com/lessons/lsn_pln_view_lessons.php%3Faction%3Dview%26cat_id%3D10%26lsn_id%3D1619"><span data-dcnode-id="268" instrument_node="">Presidential 
Election</span></a><span data-dcnode-id="266" instrument_node=""> - This November there will be a presidential election. this 
is the perfect time to learn about the electio process. </span></li><span data-dcnode-id="264" instrument_node="">
</span><li data-dcnode-id="260"><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.education-world.com/a_lesson/00-2/lp2089.shtml"><span data-dcnode-id="263" instrument_node="">Presidents 
at Inauguration Graph: How Old Were They?</span></a><span data-dcnode-id="261" instrument_node="">- "Students graph the 
presidents' ages at inauguration. Who was the youngest president? the 
oldest?"</span></li><span data-dcnode-id="259" instrument_node="">
</span><li data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Propaganda Techniques - How do political Parties use propaganda techniques 
to create influence the way people vote ina general election.</span></li><span data-dcnode-id="256" instrument_node="">
</span><li data-dcnode-id="252"><a data-dcnode-id="254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.beaconlearningcenter.com/Lessons/2516.htm"><span data-dcnode-id="255" instrument_node="">Rock 
the Vote</span></a><span data-dcnode-id="253" instrument_node=""> - Students get the opportunity to participate in the process 
of making laws. After reenacting this process, they explain the function 
and duties of the House and the Senate within the Florida government.</span></li><span data-dcnode-id="251" instrument_node="">
</span><li data-dcnode-id="246"><font color="#000000" data-dcnode-id="247"><a data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/democracy/kids/educators/tastymap.html"><span data-dcnode-id="250" instrument_node="">Tasty 
Mapping</span></a><span data-dcnode-id="248" instrument_node="">- "After learning about government services and branches 
of local government, students identify important landmarks, institutions, 
and structures within their own community, creating an edible map to share 
with classmates, parents and community members."</span></font></li><span data-dcnode-id="245" instrument_node="">
