</span><h2 class="headline" data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Tactical Voting Impact on the 2019 UK General Election</span></h2><span data-dcnode-id="2181" instrument_node="">
</span><span data-dcnode-id="2179" instrument_node="">
</span><div class="byline" data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">
  
  	January 15, 2020 04:16 pm
  
</span></div><span data-dcnode-id="2176" instrument_node="">
</span><span data-dcnode-id="2174" instrument_node="">
</span></div><span data-dcnode-id="2172" instrument_node="">
</span></div><span data-dcnode-id="2170" instrument_node="">
</span><span data-dcnode-id="2168" instrument_node="">
</span><div data-dcnode-id="290" id="content"><span data-dcnode-id="2167" instrument_node="">
</span><div class="width-container mainContent animating" data-dcnode-id="292"><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2161" style="font-weight: 400;"><strong data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">The 2019 General Election delivered a disappointing result for pro-Europeans. W</span></strong><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">hile 53 per cent of votes went to parties that supported Remain or backed a second referendum, the first-past-the-post electoral system delivered a majority government on a minority of votes.</span></strong></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2155" style="font-weight: 400;"><span data-dcnode-id="2159" instrument_node="">Best for Britain worked to encourage voting pacts between opposition parties at constituency level, encouraged voter registration, as well as running a large tactical voting operation.&nbsp;</span><a data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3n8a8pro7vhmx.cloudfront.net/b4b/pages/1344/attachments/original/1603886814/NEW_with_imprint_Report_150120_compressed.pdf%3F1603886814"><span data-dcnode-id="2158" instrument_node="">This report</span></a><span data-dcnode-id="2156" instrument_node=""> is both an examination of the impact Best for Britain had as polling day neared, and a look at the valuable lessons that have&nbsp;been learned.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2151"><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3n8a8pro7vhmx.cloudfront.net/b4b/pages/1344/attachments/original/1603886814/NEW_with_imprint_Report_150120_compressed.pdf%3F1603886814"><img alt="" data-dcnode-id="2153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3n8a8pro7vhmx.cloudfront.net/b4b/pages/1344/attachments/original/1579089758/Copy_of_Copy_of_Copy_of_Copy_of_Untitled.png%3F1579089758&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="100%"></a></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2143" style="font-weight: 400;"><strong data-dcnode-id="2144"><em data-dcnode-id="2145"><span data-dcnode-id="2149" instrument_node="">Read the full Impact Report below, or </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3n8a8pro7vhmx.cloudfront.net/b4b/pages/1344/attachments/original/1603886814/NEW_with_imprint_Report_150120_compressed.pdf%3F1603886814"><span data-dcnode-id="2148" instrument_node="">download a PDF here</span></a><span data-dcnode-id="2146" instrument_node="">.</span></em></strong></p><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140" style="font-weight: 400;"><span data-dcnode-id="2141" instrument_node="">With the honourable exception of 60 constituencies in which Unite to Remain participants (Plaid Cymru, Greens and Lib Dems) fielded a single candidate, the failure of the Remain parties to ally, and replicate the Farage/Johnson pact, meant those wishing to stop a Conservative majority were left with tactical voting as the only weapon in their arsenal.</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2137" style="font-weight: 400;"><span data-dcnode-id="2138" instrument_node="">Our disappointment at the election outcome is tempered by a quiet pride that we had such a significant impact, in a situation where the odds were stacked heavily against us. As this report shows, if we had not done what we did, the result could have been even worse.</span></p><h3 data-dcnode-id="2134" style="font-weight: 400;"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Key Figures</span></strong></h3><span data-dcnode-id="2133" instrument_node="">
</span><ul data-dcnode-id="2089"><span data-dcnode-id="2132" instrument_node="">
</span><li data-dcnode-id="2124" style="font-weight: 400;"><span data-dcnode-id="2131" instrument_node="">Our digital channels achieved more than </span><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">200 million impressions</span></strong><span data-dcnode-id="2128" instrument_node=""> and in the six weeks prior to election day we reached </span><strong data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">25 million people</span></strong><span data-dcnode-id="2125" instrument_node=""> in a 45.8 million electorate.</span></li><span data-dcnode-id="2123" instrument_node="">
</span><li data-dcnode-id="2118" style="font-weight: 400;"><span data-dcnode-id="2122" instrument_node="">More than </span><strong data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">800,000 people voted tactically</span></strong><span data-dcnode-id="2119" instrument_node=""> in line with Best for Britain’s advice.</span></li><span data-dcnode-id="2117" instrument_node="">
</span><li data-dcnode-id="2112" style="font-weight: 400;"><span data-dcnode-id="2116" instrument_node="">Our efforts helped Labour to victory in </span><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">six seats</span></strong><span data-dcnode-id="2113" instrument_node=""> they may well not have otherwise won.</span></li><span data-dcnode-id="2111" instrument_node="">
</span><li data-dcnode-id="2103" style="font-weight: 400;"><span data-dcnode-id="2110" instrument_node="">The party we recommended received a </span><strong data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">significant boost</span></strong><span data-dcnode-id="2107" instrument_node=""> because of our tactical voting advice in </span><strong data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">19 seats</span></strong><span data-dcnode-id="2104" instrument_node="">.</span></li><span data-dcnode-id="2102" instrument_node="">
</span><li data-dcnode-id="2097" style="font-weight: 400;"><span data-dcnode-id="2101" instrument_node="">More than </span><strong data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">4.5 million unique visitors</span></strong><span data-dcnode-id="2098" instrument_node=""> came to getvoting.org for advice</span></li><span data-dcnode-id="2096" instrument_node="">
</span><li data-dcnode-id="2091" style="font-weight: 400;"><span data-dcnode-id="2095" instrument_node="">We recommended the highest placed remain candidate in </span><strong data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">97% of constituencies</span></strong><span data-dcnode-id="2092" instrument_node=""> where we made a recommendation</span></li><span data-dcnode-id="2090" instrument_node="">
</span></ul><span data-dcnode-id="2088" instrument_node="">
</span><h3 data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Tactical Voting</span></h3><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Tactical voting – voting for a party which isn’t your first choice – was a big part of Best for Britain’s election strategy, and with good reason: It’s extremely significant. According to the election day Ashcroft poll and analysis by our own data experts:</span></p><span data-dcnode-id="2082" instrument_node="">
</span><ul data-dcnode-id="2071"><span data-dcnode-id="2081" instrument_node="">
</span><li data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">10 per cent of the electorate voted Labour even though another party was their first choice. This group would largely have been Remain voters who felt Labour were the best chance for a Final Say vote.</span></li><span data-dcnode-id="2078" instrument_node="">
</span><li data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">5 per cent of the electorate voted Lib Dem even though another party was their first choice. This group would largely have voted Labour in 2017.</span></li><span data-dcnode-id="2075" instrument_node="">
</span><li data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">7 per cent of the electorate voted Conservative even though another party was their first choice. Some will have preferred the Brexit Party but there will also have been quite a few who were Lib Dem leaning but very anti-Corbyn (eg people who voted Conservative in 2017, Remain in 2016, Lib Dem in the Euros).</span></li><span data-dcnode-id="2072" instrument_node="">
</span></ul><span data-dcnode-id="2070" instrument_node="">
</span><h3 data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Was our data accurate?</span></h3><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Best for Britain is a data-driven organisation, so it is vital that we have trustworthy figures to use for recommendations. Looking at the election results and our recommendations, the accuracy of our data and resulting predictions were unparalleled. Best for Britain recommended the highest placed Remain candidate in 97 per cent of constituencies where we made a recommendation.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">We used a technique called ‘Multilevel Regression with Poststratification Analysis’ (MRP). MRP starts with a large poll – in this instance, a poll of up to 46,000 respondents – then adds in other data sets, which could include census age and income information, to produce a more accurate reflection of voting intentions in every constituency.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">MRP accurately predicted the surprise wins for Labour in Kensington and Canterbury in 2017, as well as the 2016 election of Donald Trump. Data science company Focaldata carries out the analysis for us, using the most up-to-date polling available. While some tactical voting websites chose to use the 2017 General Election as a baseline for their findings, we insisted on using up-to-the-minute MRP to capture changes in voting sentiment.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2050"><strong data-dcnode-id="2051"><em data-dcnode-id="2052"><br data-dcnode-id="2057"><span data-dcnode-id="2056" instrument_node="">Read the full Impact Report below, or </span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3n8a8pro7vhmx.cloudfront.net/b4b/pages/1344/attachments/original/1603886814/NEW_with_imprint_Report_150120_compressed.pdf%3F1603886814"><span data-dcnode-id="2055" instrument_node="">download a PDF here</span></a><span data-dcnode-id="2053" instrument_node="">.</span></em></strong></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2046" instrument_node="">

="959" style="left:612px;top:2583px;color:#191616"><span data-dcnode-id="966" instrument_node=""> However</span><span class="l11" data-dcnode-id="960"><span data-dcnode-id="965" instrument_node="">, more than </span><span class="w7" data-dcnode-id="964"></span><span data-dcnode-id="963" instrument_node="">800,000 of </span><span class="w7" data-dcnode-id="962"></span><span data-dcnode-id="961" instrument_node="">the</span></span></span><span class="a" data-dcnode-id="957" style="left:591px;top:2660px;word-spacing:2px;color:#191616"><span data-dcnode-id="958" instrument_node="">electorate voted tactically – and our </span></span><span class="a" data-dcnode-id="955" style="left:611px;top:2738px;word-spacing:2px;color:#191616"><span data-dcnode-id="956" instrument_node="">tactical voting advice was based on</span></span><span class="a" data-dcnode-id="953" style="left:545px;top:2815px;word-spacing:1px;color:#191616"><span data-dcnode-id="954" instrument_node="">what we learned from our MRP work.</span></span><span class="a" data-dcnode-id="951" style="left:531px;top:2907px;word-spacing:2px;color:#191616"><span data-dcnode-id="952" instrument_node="">So, what is this methodology, and how</span></span><span class="a" data-dcnode-id="949" style="left:672px;top:2985px;word-spacing:2px;color:#191616"><span data-dcnode-id="950" instrument_node="">did it impact on political parties?</span></span></div><span data-dcnode-id="947" instrument_node="">
</span><div class="ff1" data-dcnode-id="943" style="font-size:177px"><span data-dcnode-id="946" instrument_node="">
</span><span class="a" data-dcnode-id="944" style="left:584px;top:5166px;word-spacing:8px;letter-spacing:2px;color:#191616"><span data-dcnode-id="945" instrument_node="">Case study: Alyn and Deeside</span></span></div><span data-dcnode-id="942" instrument_node="">
</span><div class="ff1" data-dcnode-id="938" style="font-size:136px"><span data-dcnode-id="941" instrument_node="">
</span><span class="a" data-dcnode-id="939" style="left:2284px;top:3285px;word-spacing:5px;letter-spacing:2px;color:#191616"><span data-dcnode-id="940" instrument_node="">A snapshot of what we did</span></span></div><span data-dcnode-id="937" instrument_node="">
</span><div class="ff23" data-dcnode-id="879" style="font-size:68px"><span data-dcnode-id="936" instrument_node="">
</span><span class="a" data-dcnode-id="934" style="left:480px;top:3267px;word-spacing:1px;color:#191616"><span data-dcnode-id="935" instrument_node="">We use a technique called ‘Multilevel Regression with</span></span><span class="a" data-dcnode-id="924" style="left:480px;top:3346px;word-spacing:5px;color:#191616"><span data-dcnode-id="933" instrument_node="">Poststratifcati</span><span class="l6" data-dcnode-id="925"><span data-dcnode-id="932" instrument_node="">on</span><span class="w" data-dcnode-id="931" style="width:14px"></span><span data-dcnode-id="930" instrument_node="">Analysis’</span><span class="w10" data-dcnode-id="929"></span><span data-dcnode-id="928" instrument_node="">(MRP). It’</span><span class="l10" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">s a bit o a</span></span></span></span><span class="a" data-dcnode-id="922" style="left:480px;top:3425px;word-spacing:2px;color:#191616"><span data-dcnode-id="923" instrument_node="">mouthul, and a bit o a complex beast in action as well.</span></span><span class="a" data-dcnode-id="920" style="left:480px;top:3519px;word-spacing:2px;color:#191616"><span data-dcnode-id="921" instrument_node="">MRP starts with a large poll – in this instance, a poll o </span></span><span class="a" data-dcnode-id="918" style="left:480px;top:3598px;word-spacing:2px;color:#191616"><span data-dcnode-id="919" instrument_node="">46,000 respondents – then adds in other data sets, which</span></span><span class="a" data-dcnode-id="916" style="left:480px;top:3677px;word-spacing:2px;color:#191616"><span data-dcnode-id="917" instrument_node="">could include census age and income inormation, to</span></span><span class="a" data-dcnode-id="908" style="left:466px;top:3756px;color:#191616"><span data-dcnode-id="915" instrument_node=""> produce a </span><span class="w7" data-dcnode-id="914"></span><span data-dcnode-id="913" instrument_node="">more accurate reection </span><span class="w6" data-dcnode-id="912"></span><span data-dcnode-id="911" instrument_node="">o voting </span><span class="w6" data-dcnode-id="910"></span><span data-dcnode-id="909" instrument_node="">intentions</span></span><span class="a" data-dcnode-id="906" style="left:480px;top:3835px;color:#191616"><span data-dcnode-id="907" instrument_node="">in every constituency. MRP accurately predicted the</span></span><span class="a" data-dcnode-id="904" style="left:480px;top:3914px;word-spacing:2px;color:#191616"><span data-dcnode-id="905" instrument_node="">surprise wins or Labour in Kensington and Canterbury</span></span><span class="a" data-dcnode-id="902" style="left:480px;top:3993px;word-spacing:2px;color:#191616"><span data-dcnode-id="903" instrument_node="">in 2017, as well as the 2016 election o Donald Trump.</span></span><span class="a" data-dcnode-id="900" style="left:480px;top:4087px;word-spacing:2px;color:#191616"><span data-dcnode-id="901" instrument_node="">Data science company Focaldata carries out the analysis</span></span><span class="a" data-dcnode-id="898" style="left:480px;top:4166px;word-spacing:2px;color:#191616"><span data-dcnode-id="899" instrument_node="">or us, using the most up-to-date polling available.</span></span><span class="a" data-dcnode-id="896" style="left:480px;top:4260px;word-spacing:2px;color:#191616"><span data-dcnode-id="897" instrument_node="">While some tactical voting websites chose to use the</span></span><span class="a" data-dcnode-id="894" style="left:480px;top:4339px;word-spacing:2px;color:#191616"><span data-dcnode-id="895" instrument_node="">2017 General Election as a baseline or their fndings,</span></span><span class="a" data-dcnode-id="892" style="left:480px;top:4418px;word-spacing:1px;color:#191616"><span data-dcnode-id="893" instrument_node="">we insisted on using up-to-the-minute MRP to capture</span></span><span class="a" data-dcnode-id="890" style="left:480px;top:4497px;word-spacing:1px;color:#191616"><span data-dcnode-id="891" instrument_node="">changes in voting sentiment.</span></span><span class="a" data-dcnode-id="888" style="left:480px;top:4591px;word-spacing:2px;color:#191616"><span data-dcnode-id="889" instrument_node="">Trustworthy data, then, is central to all we do. On that</span></span><span class="a" data-dcnode-id="886" style="left:480px;top:4670px;word-spacing:2px;color:#191616"><span data-dcnode-id="887" instrument_node="">note, it is important to acknowledge that, while this</span></span><span class="a" data-dcnode-id="884" style="left:480px;top:4749px;word-spacing:2px;color:#191616"><span data-dcnode-id="885" instrument_node="">report does not cover the impact o ground campaigns,</span></span><span class="a" data-dcnode-id="882" style="left:480px;top:4828px;word-spacing:3px;color:#191616"><span data-dcnode-id="883" instrument_node="">that is in no way intended to downplay the role o </span></span><span class="a" data-dcnode-id="880" style="left:480px;top:4907px;word-spacing:2px;color:#191616"><span data-dcnode-id="881" instrument_node="">volunteers and the importance o their work nationwide.</span></span></div><span data-dcnode-id="878" instrument_node="">
</span><div class="ff15" data-dcnode-id="830" style="font-size:66px"><span data-dcnode-id="877" instrument_node="">
</span><span class="a" data-dcnode-id="875" style="left:2310px;top:3547px;word-spacing:3px;color:#191616"><span data-dcnode-id="876" instrument_node="">Encouraged voter</span></span><span class="a" data-dcnode-id="873" style="left:2255px;top:3621px;word-spacing:2px;color:#191616"><span data-dcnode-id="874" instrument_node="">registration among</span></span><span class="a" data-dcnode-id="867" style="left:2255px;top:3695px;word-spacing:-7px;color:#191616"><span data-dcnode-id="872" instrument_node="">under-r</span><span class="l6" data-dcnode-id="868"><span data-dcnode-id="871" instrument_node="">epresented </span><span class="w9" data-dcnode-id="870"></span><span data-dcnode-id="869" instrument_node="">groups,</span></span></span><span class="a" data-dcnode-id="865" style="left:2255px;top:3769px;word-spacing:4px;color:#191616"><span data-dcnode-id="866" instrument_node="">both directly via our</span></span><span class="a" data-dcnode-id="863" style="left:2255px;top:3843px;word-spacing:2px;color:#191616"><span data-dcnode-id="864" instrument_node="">startvoting.org website</span></span><span class="a" data-dcnode-id="861" style="left:2255px;top:3917px;letter-spacing:1px;color:#191616"><span data-dcnode-id="862" instrument_node="">and by funding a range of </span></span><span class="a" data-dcnode-id="859" style="left:2255px;top:3991px;word-spacing:4px;color:#191616"><span data-dcnode-id="860" instrument_node="">other campaigns such as</span></span><span class="a" data-dcnode-id="857" style="left:2255px;top:4065px;color:#191616"><span data-dcnode-id="858" instrument_node="">Inspire.EU</span></span><span class="a" data-dcnode-id="855" style="left:2310px;top:4161px;word-spacing:4px;color:#191616"><span data-dcnode-id="856" instrument_node="">Launched a petition,</span></span><span class="a" data-dcnode-id="853" style="left:2255px;top:4235px;word-spacing:4px;color:#191616"><span data-dcnode-id="854" instrument_node="">which was signed by more</span></span><span class="a" data-dcnode-id="851" style="left:2255px;top:4309px;word-spacing:4px;color:#191616"><span data-dcnode-id="852" instrument_node="">than 100,000 people,</span></span><span class="a" data-dcnode-id="849" style="left:3194px;top:3547px;word-spacing:4px;color:#191616"><span data-dcnode-id="850" instrument_node="">calling for Remain parties</span></span><span class="a" data-dcnode-id="847" style="left:3194px;top:3627px;word-spacing:4px;color:#191616"><span data-dcnode-id="848" instrument_node="">to work together</span></span><span class="a" data-dcnode-id="845" style="left:3249px;top:3729px;word-spacing:2px;color:#191616"><span data-dcnode-id="846" instrument_node="">Undertook three rounds</span></span><span class="a" data-dcnode-id="843" style="left:3194px;top:3808px;word-spacing:2px;color:#191616"><span data-dcnode-id="844" instrument_node="">of state-of-the-art MRP</span></span><span class="a" data-dcnode-id="841" style="left:3194px;top:3888px;word-spacing:5px;color:#191616"><span data-dcnode-id="842" instrument_node="">polling during the election</span></span><span class="a" data-dcnode-id="839" style="left:3194px;top:3968px;color:#191616"><span data-dcnode-id="840" instrument_node="">campaign</span></span><span class="a" data-dcnode-id="837" style="left:3249px;top:4070px;word-spacing:4px;color:#191616"><span data-dcnode-id="838" instrument_node="">Socialised the concept of </span></span><span class="a" data-dcnode-id="835" style="left:3194px;top:4150px;word-spacing:4px;color:#191616"><span data-dcnode-id="836" instrument_node="">tactical voting into print,</span></span><span class="a" data-dcnode-id="833" style="left:3194px;top:4229px;word-spacing:3px;color:#191616"><span data-dcnode-id="834" instrument_node="">broadcast and social</span></span><span class="a" data-dcnode-id="831" style="left:3194px;top:4309px;color:#191616"><span data-dcnode-id="832" instrument_node="">media</span></span></div><span data-dcnode-id="829" instrument_node="">
</span><div class="ff15" data-dcnode-id="819" style="font-size:158px"><span data-dcnode-id="828" instrument_node="">
</span><span class="a" data-dcnode-id="826" style="left:2245px;top:3510px;color:#191616"><span data-dcnode-id="827" instrument_node="">•</span></span><span class="a" data-dcnode-id="824" style="left:3184px;top:3694px;color:#191616"><span data-dcnode-id="825" instrument_node="">•</span></span><span class="a" data-dcnode-id="822" style="left:3188px;top:4034px;color:#191616"><span data-dcnode-id="823" instrument_node="">•</span></span><span class="a" data-dcnode-id="820" style="left:2245px;top:4125px;color:#191616"><span data-dcnode-id="821" instrument_node="">•</span></span></div><span data-dcnode-id="818" instrument_node="">
</span><div class="ff1" data-dcnode-id="804" style="font-size:79px"><span data-dcnode-id="817" instrument_node="">
</span><span class="a" data-dcnode-id="815" style="left:2395px;top:4456px;word-spacing:6px;color:#191616"><span data-dcnode-id="816" instrument_node="">In assessing our impact on the election, we</span></span><span class="a" data-dcnode-id="813" style="left:2395px;top:4544px;word-spacing:3px;color:#191616"><span data-dcnode-id="814" instrument_node="">have calculated the swing towards the party</span></span><span class="a" data-dcnode-id="811" style="left:2395px;top:4633px;word-spacing:3px;color:#191616"><span data-dcnode-id="812" instrument_node="">we recommended, based on the difference</span></span><span class="a" data-dcnode-id="809" style="left:2395px;top:4721px;word-spacing:4px;color:#191616"><span data-dcnode-id="810" instrument_node="">between the predicted vote share of each</span></span><span class="a" data-dcnode-id="807" style="left:2395px;top:4810px;word-spacing:6px;color:#191616"><span data-dcnode-id="808" instrument_node="">party in our MRP analysis, and the actual result</span></span><span class="a" data-dcnode-id="805" style="left:2395px;top:4898px;word-spacing:2px;color:#191616"><span data-dcnode-id="806" instrument_node="">they achieved on polling day itself</span></span></div><span data-dcnode-id="803" instrument_node="">
