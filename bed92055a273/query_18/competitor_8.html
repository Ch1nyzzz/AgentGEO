</span><h1 class="page-header__title page-header__title--has-type" data-dcnode-id="362"><span data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Voting after lessons included in election pilots</span></span><span data-dcnode-id="363" instrument_node="">
</span></h1><span data-dcnode-id="361" instrument_node="">
</span></header><span data-dcnode-id="359" instrument_node="">
</span><section class="page-content mb-40" data-dcnode-id="158"><span data-dcnode-id="358" instrument_node="">
</span><div class="gov" data-dcnode-id="310" id="hero-block"><span data-dcnode-id="357" instrument_node="">

</span><div data-dcnode-id="349"><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Some students will be able to vote at their college in next May’s local government elections, as part of efforts to increase voter turnout.</span></p><span data-dcnode-id="350" instrument_node="">

</span><div class="col-md-8 col-sm-12 col-xs-12" data-dcnode-id="205"><span data-dcnode-id="276" instrument_node="">
</span><div class="announcement-item__article" data-dcnode-id="207" id="announcement-item__article"><span data-dcnode-id="275" instrument_node="">
</span><div data-dcnode-id="209"><span data-dcnode-id="274" instrument_node="">
</span><div data-dcnode-id="211"><span data-dcnode-id="273" instrument_node=""> </span><div class="paragraph paragraph--type--content paragraph--view-mode--default" data-dcnode-id="213"><span data-dcnode-id="272" instrument_node="">
</span><div data-dcnode-id="215"><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">The Welsh Government has announced details of 4 flexible voting pilot schemes being taken forward by local authorities.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">The next Welsh local government elections will be held on 5 May 2022. The pilots will mean people in the Blaenau Gwent, Bridgend, Caerphilly and Torfaen council areas will be able to vote before polling day.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Coleg Gwent's Blaenau Gwent Learning Zone in Ebbw Vale will be used as an early polling station in the week leading to election day. All students there will be able to cast their votes as Wales lowered the voting age to 16 last year. The polling station will also be available as an early voting centre for all residents of the county, no matter which electoral ward they live in.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">In Bridgend, a new polling station will be created in a school so eligible pupils can cast their votes there ahead of Election Day. Existing polling stations in wards which have had lower turnout will also be open for early voting in the week ahead of the election.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">In Caerphilly and Torfaen, council offices will be used as early voting centres on the weekend before election day. They will be open to all residents of the county, no matter which electoral ward they live in, providing a convenient town centre location to vote.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">The pilots in Blaenau Gwent, Caerphilly and Torfaen will also mean people from anywhere in the county will be able to vote at a central polling station, not just one in their ward, offering flexibility over location as well as timing.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">All four pilots are designed to make it easier for people to vote at a time and a place that is convenient for them. The findings and evidence gathered will influence future decisions and successful pilots could be extended more widely into future local government or Senedd elections.</span></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Mick Antoniw, Counsel General and Minister for the Constitution, said:</span></p><span data-dcnode-id="248" instrument_node="">
</span><blockquote data-dcnode-id="234"><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">More people taking an active part in our democracy is good for our society. These pilots will make it easier and more convenient for people to vote, bringing the ballot box closer to people’s day to day lives.</span></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">At a time when UK government plans for voter ID risk making voting harder, our message is loud and clear that voting should be easier.</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Lowering the voting age to 16 was a progressive step that recognises the valuable contributions young people can make. We’re giving young people the chance to shape our democracy so I’m pleased pilot schemes will take place in a school and in a college.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">The outcomes of the pilots will be carefully considered and could eventually reshape how people cast their votes across all of Wales.</span></p><span data-dcnode-id="235" instrument_node="">
</span></blockquote><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Guy Lacey, Principal at Coleg Gwent, commented:</span></p><span data-dcnode-id="230" instrument_node="">
</span><blockquote data-dcnode-id="225"><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">The learner voice is important to us at Coleg Gwent. So, the chance for 16-year-olds to vote in the election is a fantastic opportunity to have their voices heard in matters that impact on young people beyond college. We're happy to support Welsh Government in making this as easy and convenient as possible for our learners and hope to see this pilot having a positive impact on voter turnout in this age group.</span></p><span data-dcnode-id="226" instrument_node="">
</span></blockquote><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Michelle Morris, Managing Director at Blaenau Gwent Council commented:</span></p><span data-dcnode-id="221" instrument_node="">
</span><blockquote data-dcnode-id="216"><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">We are delighted that our proposal for Ebbw Vale to be one of the flexible voting pilot areas has been successful. It is important that people use their vote and take part in elections and this initiative certainly helps this. It makes it easier for people to cast their vote and will encourage more people to take part in the upcoming local elections.</span></p><span data-dcnode-id="217" instrument_node="">
</span></blockquote></div><span data-dcnode-id="214" instrument_node="">
