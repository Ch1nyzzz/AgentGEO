</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id7&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id8&quot;><p>Well-educated citizens vote more frequently than the poorly educated in some countries, including the USA. However, in many countries, no such differences are observed. One classical explanation of the presence or absence of this inequality in voting is that the strength of left-wing forces sharpens or reduces it. An alternative explanation is that some institutional arrangements and contextual features disproportionately affect the voter participation of some individuals depending on their resources, thus shaping turnout inequality. These theories are tested using multilevel modeling with data from 28 advanced industrial democracies. Compulsory voting reduces inequalities because under this system quasi-universal turnout is achieved. In addition, the poorly educated vote more frequently when the voting procedure is easy and when there are few political parties, thus reducing turnout inequality. However, strong left-wing parties and trade unions are not associated with more equal turnout.</p></div></div></div>" data-dcnode-id="7030" lang="en" name="citation_abstract"><span data-dcnode-id="7029" instrument_node="">

 noopener" target="_blank"><span data-dcnode-id="6497" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="6494"></section><section class="ReferencedArticles" data-dcnode-id="6493"></section><div class="PageDivider" data-dcnode-id="6492"></div><div class="Abstracts u-font-serif" data-dcnode-id="6485" id="abstracts"><div class="abstract author" data-dcnode-id="6486" id="aep-abstract-id7" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6490"><span data-dcnode-id="6491" instrument_node="">Abstract</span></h2><div data-dcnode-id="6487" id="aep-abstract-sec-id8"><p data-dcnode-id="6488"><span data-dcnode-id="6489" instrument_node="">Well-educated citizens vote more frequently than the poorly educated in some countries, including the USA. However, in many countries, no such differences are observed. One classical explanation of the presence or absence of this inequality in voting is that the strength of left-wing forces sharpens or reduces it. An alternative explanation is that some institutional arrangements and contextual features disproportionately affect the voter participation of some individuals depending on their resources, thus shaping turnout inequality. These theories are tested using multilevel modeling with data from 28 advanced industrial democracies. Compulsory voting reduces inequalities because under this system quasi-universal turnout is achieved. In addition, the poorly educated vote more frequently when the voting procedure is easy and when there are few political parties, thus reducing turnout inequality. However, strong left-wing parties and trade unions are not associated with more equal turnout.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="6462" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="6474"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379409001218"><svg class="icon icon-navigate-left" data-dcnode-id="6483" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="6484"></path></svg><span class="button-alternative-text" data-dcnode-id="6476"><strong data-dcnode-id="6481"><span data-dcnode-id="6482" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="6479"><span data-dcnode-id="6480" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6477"><span data-dcnode-id="6478" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="6463"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379410000053"><span class="button-alternative-text" data-dcnode-id="6467"><strong data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="6470"><span data-dcnode-id="6471" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6468"><span data-dcnode-id="6469" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="6465" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="6466"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="6446"><div class="keywords-section" data-dcnode-id="6447" id="aep-keywords-id9"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6460"><span data-dcnode-id="6461" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="6457"><span data-dcnode-id="6458"><span data-dcnode-id="6459" instrument_node="">Voter turnout</span></span></div><div class="keyword" data-dcnode-id="6454"><span data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">Elections</span></span></div><div class="keyword" data-dcnode-id="6451"><span data-dcnode-id="6452"><span data-dcnode-id="6453" instrument_node="">Political inequality</span></span></div><div class="keyword" data-dcnode-id="6448"><span data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">Education</span></span></div></div></div><span data-dcnode-id="6445" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3751" id="body"><div data-dcnode-id="4027"><section data-dcnode-id="6352" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6439"><span data-dcnode-id="6444" instrument_node="">1</span><span data-dcnode-id="6442" instrument_node="">. </span><span data-dcnode-id="6440" instrument_node="">Introduction</span></h2><p data-dcnode-id="6401"><span data-dcnode-id="6438" instrument_node="">Socially privileged citizens vote more often than the disadvantaged. This pattern is known as unequal turnout (</span><a class="workspace-trigger" data-dcnode-id="6436" href="#bib44" name="bbib44"><span data-dcnode-id="6437" instrument_node="">Lijphart, 1997</span></a><span data-dcnode-id="6435" instrument_node="">) and demonstrates a well-established empirical regularity in the United States (</span><a class="workspace-trigger" data-dcnode-id="6433" href="#bib68" name="bbib68"><span data-dcnode-id="6434" instrument_node="">Verba and Nie, 1972</span></a><span data-dcnode-id="6432" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6430" href="#bib48" name="bbib48"><span data-dcnode-id="6431" instrument_node="">Milbrath and Goel, 1977</span></a><span data-dcnode-id="6429" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6427" href="#bib75" name="bbib75"><span data-dcnode-id="6428" instrument_node="">Wolfinger and Rosenstone, 1980</span></a><span data-dcnode-id="6426" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6424" href="#bib70" name="bbib70"><span data-dcnode-id="6425" instrument_node="">Verba et&nbsp;al., 1995</span></a><span data-dcnode-id="6423" instrument_node="">). From a normative point of view, unequal turnout is a relevant phenomenon. If the disadvantaged disproportionately fail to vote, governments and legislators have fewer incentives to consider their points of view in policy-making (</span><a class="workspace-trigger" data-dcnode-id="6421" href="#bib67" name="bbib67"><span data-dcnode-id="6422" instrument_node="">Verba, 2004</span></a><span data-dcnode-id="6420" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6418" href="#bib30" name="bbib30"><span data-dcnode-id="6419" instrument_node="">Griffin and Newman, 2005</span></a><span data-dcnode-id="6417" instrument_node="">). The impact of electoral participation rates on the design and implementation of public policies is not negligible. When lower-class citizens vote frequently, the welfare policies are more generous, and the redistributive performance of the state is greater (</span><a class="workspace-trigger" data-dcnode-id="6415" href="#bib32" name="bbib32"><span data-dcnode-id="6416" instrument_node="">Hill et&nbsp;al., 1995</span></a><span data-dcnode-id="6414" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6412" href="#bib31" name="bbib31"><span data-dcnode-id="6413" instrument_node="">Hicks and Swank, 1992</span></a><span data-dcnode-id="6411" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6409" href="#bib47" name="bbib47"><span data-dcnode-id="6410" instrument_node="">Mahler, 2008</span></a><span data-dcnode-id="6408" instrument_node="">). In addition, unequal turnout can affect partisan outcomes under certain circumstances. Assuming that disadvantaged citizens have different preferences than middle-class voters, election results could even change if everyone voted in close races (</span><a class="workspace-trigger" data-dcnode-id="6406" href="#bib15" name="bbib15"><span data-dcnode-id="6407" instrument_node="">Citrin et&nbsp;al., 2003</span></a><span data-dcnode-id="6405" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6403" href="#bib27" name="bbib27"><span data-dcnode-id="6404" instrument_node="">Gomez et&nbsp;al., 2007</span></a><span data-dcnode-id="6402" instrument_node="">).</span></p><p data-dcnode-id="6375"><span data-dcnode-id="6400" instrument_node="">However, inequality in election turnout is not universal. According to records, in many countries, particularly European democracies, education and income are not associated with voter turnout (</span><a class="workspace-trigger" data-dcnode-id="6398" href="#bib69" name="bbib69"><span data-dcnode-id="6399" instrument_node="">Verba et&nbsp;al., 1978</span></a><span data-dcnode-id="6397" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6395" href="#bib65" name="bbib65"><span data-dcnode-id="6396" instrument_node="">Topf, 1995</span></a><span data-dcnode-id="6394" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6392" href="#bib44" name="bbib44"><span data-dcnode-id="6393" instrument_node="">Lijphart, 1997</span></a><span data-dcnode-id="6391" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6389" href="#bib53" name="bbib53"><span data-dcnode-id="6390" instrument_node="">Norris, 2002</span></a><span data-dcnode-id="6388" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6386" href="#bib55" name="bbib55"><span data-dcnode-id="6387" instrument_node="">Parry et&nbsp;al., 1992</span></a><span data-dcnode-id="6385" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6383" href="#bib56" name="bbib56"><span data-dcnode-id="6384" instrument_node="">Pierce, 1995</span></a><span data-dcnode-id="6382" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6380" href="#bib63" name="bbib63"><span data-dcnode-id="6381" instrument_node="">Teorell et&nbsp;al., 2007</span></a><span data-dcnode-id="6379" instrument_node="">). As </span><a class="workspace-trigger" data-dcnode-id="6377" href="#bib51" name="bbib51"><span data-dcnode-id="6378" instrument_node="">Nevitte et&nbsp;al. (2009)</span></a><span data-dcnode-id="6376" instrument_node=""> state in a recent analysis “There are significant differences in the extent to which SES [socio-economic status] explains the variance in non-voting (…). Education also has a consistent and significant effect on non-voting in 19 out of the 33 elections” (2009, 91). These findings suggest that unequal turnout is context dependent and contingent on the presence or absence of other factors. Despite the normative and empirical importance of unequal participation, few attempts have been made to measure and explain this phenomenon cross-nationally. This paper contributes to the knowledge on unequal turnout by assessing current levels of unequal participation due to education in advanced industrial democracies and by proposing and testing explanations of turnout inequality.</span></p><p data-dcnode-id="6367"><span data-dcnode-id="6374" instrument_node="">Why is voter turnout more unequal in some countries than in others? The first section presents two different theories predicting different levels of unequal turnout across countries. The initial expectation is that a substantial gap exists between the voting rates of the socially advantaged and disadvantaged because the latter are less informed about politics, feel more alienated from the political system, and are not the main target of mobilization efforts by political parties (</span><a class="workspace-trigger" data-dcnode-id="6372" href="#bib70" name="bbib70"><span data-dcnode-id="6373" instrument_node="">Verba et&nbsp;al., 1995</span></a><span data-dcnode-id="6371" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6369" href="#bib60" name="bbib60"><span data-dcnode-id="6370" instrument_node="">Rosenstone and Hansen, 1993</span></a><span data-dcnode-id="6368" instrument_node="">). However, certain factors may reduce or enhance the typical participatory bias. According to one theory, turnout inequality is reduced when there are strong left-wing political organizations that mobilize resource-poor citizens to vote. The main constituency of left-wing parties and trade unions has traditionally been the socially disadvantaged and if they are sufficiently powerful their actions can help to overcome the participatory biases. The institutional theory states that some contextual characteristics disproportionately depress or foster the participation of the resource-poor because they are less able to bear certain costs of voting, and are less likely to perceive its benefits. Where voting is easy and rewarding, many citizens with few resources vote, and no inequalities are observed in voter turnout. Finally, compulsory voting introduces a cost for not voting, which should be sufficient to close the turnout gap.</span></p><p data-dcnode-id="6353"><span data-dcnode-id="6366" instrument_node="">In the second section of the paper unequal turnout is described while focusing on the impact of education on the vote. Education is the socio-economic characteristic that is most closely associated with political participation (</span><a class="workspace-trigger" data-dcnode-id="6364" href="#bib75" name="bbib75"><span data-dcnode-id="6365" instrument_node="">Wolfinger and Rosenstone, 1980</span></a><span data-dcnode-id="6363" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6361" href="#bib7" name="bbib7"><span data-dcnode-id="6362" instrument_node="">Blais, 2000</span></a><span data-dcnode-id="6360" instrument_node="">) and it is also one core predictor of social position and earnings (</span><a class="workspace-trigger" data-dcnode-id="6358" href="#bib14" name="bbib14"><span data-dcnode-id="6359" instrument_node="">Card, 2001</span></a><span data-dcnode-id="6357" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6355" href="#bib64" name="bbib64"><span data-dcnode-id="6356" instrument_node="">Trostel et&nbsp;al., 2001</span></a><span data-dcnode-id="6354" instrument_node="">). Educational measures can be better compared across countries than other factors, such as income. Unequal turnout is operationalized as the relationship between education and the probability to vote. The theories are tested in the third section with data gathered from the European Social Survey and the Comparative Study of Electoral Systems in 28 advanced industrial democracies using hierarchical models.</span></p></section><section data-dcnode-id="6275" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6346"><span data-dcnode-id="6351" instrument_node="">2</span><span data-dcnode-id="6349" instrument_node="">. </span><span data-dcnode-id="6347" instrument_node="">The power of the left reduces inequality</span></h2><p data-dcnode-id="6338"><span data-dcnode-id="6345" instrument_node="">Variation in the strength of left-wing organizations across countries is a classic reason provided to explain the varying degree of influence of socio-economic factors on voter turnout. In their comparative study of inequalities in political involvement within seven countries, </span><a class="workspace-trigger" data-dcnode-id="6343" href="#bib69" name="bbib69"><span data-dcnode-id="6344" instrument_node="">Verba et&nbsp;al. (1978)</span></a><span data-dcnode-id="6342" instrument_node=""> argued that a baseline difference exists in political participation; i.e., people who have a higher socio-economic resource level participate more frequently. However, lower status citizens can participate at roughly the same rates as their fellow socially privileged citizens if certain organizations mobilize them to vote. A lack of individual resources can be compensated by group resources. Lower status groups ‘need a group-based process of political mobilization if they are to catch up to the upper-status groups in terms of political activity. They need a self-conscious ideology as motivation and need organization as a resource’ (</span><a class="workspace-trigger" data-dcnode-id="6340" href="#bib69" name="bbib69"><span data-dcnode-id="6341" instrument_node="">Verba et&nbsp;al., 1978, 14</span></a><span data-dcnode-id="6339" instrument_node="">). If organizations actively work to bring the disadvantaged to the polls, their task will offset or even reverse the typical participatory biases.</span></p><p data-dcnode-id="6321"><span data-dcnode-id="6337" instrument_node="">It is well-known that in some countries, such as the USA, political parties mostly mobilize upper-class individuals (</span><a class="workspace-trigger" data-dcnode-id="6335" href="#bib60" name="bbib60"><span data-dcnode-id="6336" instrument_node="">Rosenstone and Hansen, 1993</span></a><span data-dcnode-id="6334" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6332" href="#bib1" name="bbib1"><span data-dcnode-id="6333" instrument_node="">Abramson and Claggett, 2001</span></a><span data-dcnode-id="6331" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6329" href="#bib10" name="bbib10"><span data-dcnode-id="6330" instrument_node="">Brady et&nbsp;al., 1999</span></a><span data-dcnode-id="6328" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6326" href="#bib73" name="bbib73"><span data-dcnode-id="6327" instrument_node="">Wielhouwer, 2003</span></a><span data-dcnode-id="6325" instrument_node="">). However, this is not necessarily a pervasive pattern. In a recent comparative study, </span><a class="workspace-trigger" data-dcnode-id="6323" href="#bib40" name="bbib40"><span data-dcnode-id="6324" instrument_node="">Karp et&nbsp;al. (2008, 224)</span></a><span data-dcnode-id="6322" instrument_node=""> found that well-educated people are not more likely to be contacted by parties during campaigns than poorly educated people in established democracies.</span></p><p data-dcnode-id="6298"><span data-dcnode-id="6320" instrument_node="">In advanced industrial democracies, the key factor that explains the massive electoral participation of disadvantaged social groups throughout most of the 20th century is class-based mobilization. The efforts of the working-class movement have been essential in the mobilization of the working-class electorate (</span><a class="workspace-trigger" data-dcnode-id="6318" href="#bib3" name="bbib3"><span data-dcnode-id="6319" instrument_node="">Alford, 1963</span></a><span data-dcnode-id="6317" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6315" href="#bib12" name="bbib12"><span data-dcnode-id="6316" instrument_node="">Burnham, 1982</span></a><span data-dcnode-id="6314" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6312" href="#bib6" name="bbib6"><span data-dcnode-id="6313" instrument_node="">Bartolini, 2000</span></a><span data-dcnode-id="6311" instrument_node="">) and to understand the high turnout rates in some countries, presumably because they promote the participation of lower status citizens who would otherwise abstain from voting (</span><a class="workspace-trigger" data-dcnode-id="6309" href="#bib29" name="bbib29"><span data-dcnode-id="6310" instrument_node="">Gray and Caul, 2000</span></a><span data-dcnode-id="6308" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6306" href="#bib54" name="bbib54"><span data-dcnode-id="6307" instrument_node="">Pacek and Radcliff, 1995</span></a><span data-dcnode-id="6305" instrument_node="">; but see </span><a class="workspace-trigger" data-dcnode-id="6303" href="#bib20" name="bbib20"><span data-dcnode-id="6304" instrument_node="">Fisher, 2007</span></a><span data-dcnode-id="6302" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="6299" href="#fn1" name="bfn1"><sup data-dcnode-id="6300"><span data-dcnode-id="6301" instrument_node="">1</span></sup></a></p><p data-dcnode-id="6278"><span data-dcnode-id="6297" instrument_node="">For most of the 20th century, many countries had large social-democratic, socialist, communist, and agrarian political parties that explicitly focused on representing the interests of lower-class citizens (</span><a class="workspace-trigger" data-dcnode-id="6295" href="#bib45" name="bbib45"><span data-dcnode-id="6296" instrument_node="">Lipset and Rokkan, 1967</span></a><span data-dcnode-id="6294" instrument_node="">), and helped to overcome biases in participation. According to Alford ‘where workers have a party clearly appealing to their interests, their participation and sense of efficacy is as great as middle-class persons’ (1963, 302). The size and power of left-wing parties varies widely across countries. In countries with large left-wing parties, the biases in participation should be small or non-existent. Secondly, trade unions have been a pivotal organization in the defense of the interests of the working class during the 19th and the 20th centuries. They increase voter participation rates both of their members and the general electorate (</span><a class="workspace-trigger" data-dcnode-id="6292" href="#bib29" name="bbib29"><span data-dcnode-id="6293" instrument_node="">Gray and Caul, 2000</span></a><span data-dcnode-id="6291" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6289" href="#bib23" name="bbib23"><span data-dcnode-id="6290" instrument_node="">Freeman, 2003</span></a><span data-dcnode-id="6288" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6286" href="#bib58" name="bbib58"><span data-dcnode-id="6287" instrument_node="">Radcliff and Davis, 2000</span></a><span data-dcnode-id="6285" instrument_node="">). They do so either directly by performing mobilization activities or indirectly by influencing the policy positions of left-wing parties to more closely align them to the interests of their members (</span><a class="workspace-trigger" data-dcnode-id="6283" href="#bib58" name="bbib58"><span data-dcnode-id="6284" instrument_node="">Radcliff and Davis, 2000</span></a><span data-dcnode-id="6282" instrument_node="">). Moreover, trade unions have been found to disproportionately enhance the turnout rate of the middle class and socially disadvantaged groups (</span><a class="workspace-trigger" data-dcnode-id="6280" href="#bib43" name="bbib43"><span data-dcnode-id="6281" instrument_node="">Leighley and Nagler, 2007</span></a><span data-dcnode-id="6279" instrument_node="">). The strength of trade unions and its mobilization capacity varies across countries. This should shape also turnout inequality.</span></p><p data-dcnode-id="6276"><span data-dcnode-id="6277" instrument_node="">The power of the left theory mostly applies to explain the electoral mobilization or demobilization of the working-class individuals. Members of the working class are on average less educated than higher status individuals, because education is precisely one of the sorting mechanisms that determine the occupation of the workers. If the mechanism works, i.e. if left-wing parties and trade unions mostly target lower status individuals in their mobilization effort, their action should not only result in higher overall turnout, but also in lower turnout inequalities, since it is the poorly educated, low-status individuals who are disproportionately mobilized to vote.</span></p></section><section data-dcnode-id="6196" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6269"><span data-dcnode-id="6274" instrument_node="">3</span><span data-dcnode-id="6272" instrument_node="">. </span><span data-dcnode-id="6270" instrument_node="">The contextually determined difficulty and rewards of voting</span></h2><p data-dcnode-id="6258"><span data-dcnode-id="6268" instrument_node="">As </span><a class="workspace-trigger" data-dcnode-id="6266" href="#bib18" name="bbib18"><span data-dcnode-id="6267" instrument_node="">Downs (1957, 273–274)</span></a><span data-dcnode-id="6265" instrument_node=""> argued, the costs and benefits of voting are central to understanding why the socially disadvantaged often fail to vote; they face more difficulties gathering information about politics and voting, and they are typically less interested and knowledgeable about politics, thereby often producing participation gaps. Voting is more difficult and less rewarding in some contexts than in others. This argument has been proposed as an explanation for changing participation levels across countries (cf. </span><a class="workspace-trigger" data-dcnode-id="6263" href="#bib34" name="bbib34"><span data-dcnode-id="6264" instrument_node="">Jackman, 1987</span></a><span data-dcnode-id="6262" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6260" href="#bib35" name="bbib35"><span data-dcnode-id="6261" instrument_node="">Jackman and Miller, 1995</span></a><span data-dcnode-id="6259" instrument_node="">). However, it is unlikely that contextual features affect the propensity to vote of all kinds of citizens in the same way. Some costs and rewards of voting, such as the physical fatigue of going to the polls, are homogenously distributed among citizens of all social groups, whereas other costs and benefits of voting are relatively higher or lower conditional on the resources of the individual. For example, the cognitive costs of registration, deciding for whom to vote or to deal with the voting procedure are easy to bear for individuals with many cognitive resources. On the contrary, even a small increase in this kind of costs can discourage resource-poor individuals of voting. The contextual characteristics that shape these heterogeneously distributed costs and benefits of voting should strongly affect turnout inequality.</span></p><p data-dcnode-id="6256"><span data-dcnode-id="6257" instrument_node="">Many institutional and contextual features affect the difficulty and the rewards of voting, but this does not necessarily have an impact on turnout inequality. An institution that on average increases voter turnout of all kinds of individuals by a few percent points should not have a strong effect on turnout gaps. On the contrary, contextual characteristics which disproportionately depress or foster the propensity to vote of resource-poor individuals are expected to strongly shape voter turnout inequality, even if they have only a modest impact on turnout rates.</span></p><p data-dcnode-id="6242"><span data-dcnode-id="6255" instrument_node="">Firstly, the burdensome American registration system has often been considered as one of the main causes for the large class gaps observed in voting in the USA because the registration cost is assigned to the citizen and this makes the process of voting more difficult (</span><a class="workspace-trigger" data-dcnode-id="6253" href="#bib13" name="bbib13"><span data-dcnode-id="6254" instrument_node="">Campbell et&nbsp;al., 1960</span></a><span data-dcnode-id="6252" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6250" href="#bib75" name="bbib75"><span data-dcnode-id="6251" instrument_node="">Wolfinger and Rosenstone, 1980</span></a><span data-dcnode-id="6249" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6247" href="#bib57" name="bbib57"><span data-dcnode-id="6248" instrument_node="">Powell, 1986</span></a><span data-dcnode-id="6246" instrument_node="">). Among the four criteria identified by </span><a class="workspace-trigger" data-dcnode-id="6244" href="#bib46" name="bbib46"><span data-dcnode-id="6245" instrument_node="">Lopez-Pintor and Gratschew (2002, 25)</span></a><span data-dcnode-id="6243" instrument_node=""> to classify voter registration systems, the following two affect turnout inequality: whether registration is voluntary or compulsory and whether it is state- or citizen-initiated. The costs of registration are transferred to the state in state-initiated registration. In addition, registration that is self-initiated and compulsory makes the voting procedure more difficult, but this system is less likely to result in turnout inequality. Thus, if registration is self-initiated and voluntary, turnout inequality is expected to be larger.</span></p><p data-dcnode-id="6237"><span data-dcnode-id="6241" instrument_node="">Secondly, the voting procedure varies greatly across countries and might shape turnout inequality. Voting is more cognitively difficult if citizens are confronted with many different choices. Ordinal or categorical ballot papers, such as those used in closed-list party ballots or in uninominal districts, only allow making one choice among a few options. In other systems, the voter can decide among several candidates of the same party, weight the vote, or assign a rank to the preferences. In a comparative study of voting, </span><a class="workspace-trigger" data-dcnode-id="6239" href="#bib4" name="bbib4"><span data-dcnode-id="6240" instrument_node="">Anduiza (2002)</span></a><span data-dcnode-id="6238" instrument_node=""> found that the opportunity to express preferences depresses turnout among citizens with less resources and motivation while enhancing the turnout of the more economically advantaged and politically interested citizens. This finding suggests that the benefits of voting are higher for well-educated citizens when they can transmit more nuanced messages to the political system, whereas some individuals with fewer cognitive resources refrain from voting because the costs of voting rise if they are confronted with many options. It is hypothesized that open ballots foster turnout inequality.</span></p><p data-dcnode-id="6223"><span data-dcnode-id="6236" instrument_node="">The number of political parties involved in the election process affects the difficulty of staying informed and making a decision for whom to vote (</span><a class="workspace-trigger" data-dcnode-id="6234" href="#bib11" name="bbib11"><span data-dcnode-id="6235" instrument_node="">Brockington, 2004</span></a><span data-dcnode-id="6233" instrument_node="">). Controversy surrounds the effect of the number of parties on electoral turnout. Although some authors predict that it increases turnout, others claim that it depresses it; thus far, the findings are inconclusive (see </span><a class="workspace-trigger" data-dcnode-id="6231" href="#bib8" name="bbib8"><span data-dcnode-id="6232" instrument_node="">Blais, 2006</span></a><span data-dcnode-id="6230" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6228" href="#bib26" name="bbib26"><span data-dcnode-id="6229" instrument_node="">Geys, 2006</span></a><span data-dcnode-id="6227" instrument_node="">). One possible reason for this division in thinking is that the effective number of parties involved in the voting process has different effects on resource-poor citizens than resource-rich citizens. </span><a class="workspace-trigger" data-dcnode-id="6225" href="#bib38" name="bbib38"><span data-dcnode-id="6226" instrument_node="">Jusko and Shively (2005)</span></a><span data-dcnode-id="6224" instrument_node=""> note that among high information citizens, turnout is positively affected by a larger number of parties, whereas low-information people are less likely to vote when a large number of parties are involved. One interpretation of this finding is that well-educated citizens may prefer having a larger pool of choices and they are more likely to find a political party that better represents their individual point of view when many options are available, whereas poorly educated citizens find the process of obtaining information about the positions of many different political parties and deciding which one is preferred burdensome. Thus, I expect that as the number of political parties that are involved increases, the level of inequality will increase.</span></p><p data-dcnode-id="6197"><span data-dcnode-id="6222" instrument_node="">Compulsory voting is a strong, institutionally determined modification of the cost and benefit structure of voting. It is the most influential institution in terms of shaping turnout rates (</span><a class="workspace-trigger" data-dcnode-id="6220" href="#bib9" name="bbib9"><span data-dcnode-id="6221" instrument_node="">Blais and Dobrzynska, 1998</span></a><span data-dcnode-id="6219" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6217" href="#bib21" name="bbib21"><span data-dcnode-id="6218" instrument_node="">Franklin, 2001</span></a><span data-dcnode-id="6216" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6214" href="#bib22" name="bbib22"><span data-dcnode-id="6215" instrument_node="">Franklin et&nbsp;al., 1996</span></a><span data-dcnode-id="6213" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6211" href="#bib34" name="bbib34"><span data-dcnode-id="6212" instrument_node="">Jackman, 1987</span></a><span data-dcnode-id="6210" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6208" href="#bib35" name="bbib35"><span data-dcnode-id="6209" instrument_node="">Jackman and Miller, 1995</span></a><span data-dcnode-id="6207" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6205" href="#bib57" name="bbib57"><span data-dcnode-id="6206" instrument_node="">Powell, 1986</span></a><span data-dcnode-id="6204" instrument_node="">). In countries where compulsory voting is enforced, abstainers run the risk of incurring fines, having to justify their absence at the ballot box, or receiving other sanctions (</span><a class="workspace-trigger" data-dcnode-id="6202" href="#bib28" name="bbib28"><span data-dcnode-id="6203" instrument_node="">Gratschew, 2004</span></a><span data-dcnode-id="6201" instrument_node="">). Even if it is not strictly enforced, this institution increases social pressure to vote. The poor and lesser educated may not be very motivated to participate, but they will vote in large numbers in order to avoid receiving a sanction. In compulsory voting systems with monetary fines for not voting, we can expect the underprivileged to be even more sensitive to the possibility of being fined because they have fewer financial resources; thus, the relative cost of not voting is higher for them. Further, as </span><a class="workspace-trigger" data-dcnode-id="6199" href="#bib36" name="bbib36"><span data-dcnode-id="6200" instrument_node="">Jackman (2001)</span></a><span data-dcnode-id="6198" instrument_node=""> _suggested, the government in a compulsory voting country tends to provide all kinds of facilities to make voting easier, thus reducing the costs associated with voting to the voter. In the presence of compulsory voting, abstainers are more likely to represent a random selection of the population; therefore, education will likely become irrelevant in terms of affecting voter turnout.</span></p></section><section data-dcnode-id="5826" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6190"><span data-dcnode-id="6195" instrument_node="">4</span><span data-dcnode-id="6193" instrument_node="">. </span><span data-dcnode-id="6191" instrument_node="">Where is turnout unequal? Measuring turnout inequality across countries</span></h2><p data-dcnode-id="6173"><span data-dcnode-id="6189" instrument_node="">The scope of this analysis has been limited to advanced industrial democracies in order to achieve a certain degree of homogeneity across the units.</span><a class="workspace-trigger" data-dcnode-id="6186" href="#fn2" name="bfn2"><sup data-dcnode-id="6187"><span data-dcnode-id="6188" instrument_node="">2</span></sup></a><span data-dcnode-id="6185" instrument_node=""> Advanced industrial democracies are defined as free democracies according to Freedom House with an annual GDP per capita that is higher than 20,000 dollars.</span><a class="workspace-trigger" data-dcnode-id="6182" href="#fn3" name="bfn3"><sup data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">3</span></sup></a><span data-dcnode-id="6181" instrument_node=""> The European Social Survey (ESS) and the Comparative Study of Electoral Systems (CSES) are two optimal sources of data for the comparative study of electoral behavior. Currently, two editions of the CSES and three of the ESS are available for public use.</span><a class="workspace-trigger" data-dcnode-id="6178" href="#fn4" name="bfn4"><sup data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">4</span></sup></a><span data-dcnode-id="6177" instrument_node=""> One survey has been selected for each country with prioritization given to the most recent available and the ESS due to its strong emphasis on comparability (see the details of the surveys selected in the </span><a class="workspace-trigger" data-dcnode-id="6175" href="#appseca1" name="bappseca1"><span data-dcnode-id="6176" instrument_node="">appendix</span></a><span data-dcnode-id="6174" instrument_node="">). A pooled dataset that contains survey data for 52,371 individuals in 28 countries has been created for which comparable survey data is available.</span></p><p data-dcnode-id="6165"><span data-dcnode-id="6172" instrument_node="">The concept of unequal turnout is frequently referenced in the literature, but few attempts have been made to measure and compare this phenomenon across countries. The approach used by </span><a class="workspace-trigger" data-dcnode-id="6170" href="#bib69" name="bbib69"><span data-dcnode-id="6171" instrument_node="">Verba et&nbsp;al. (1978)</span></a><span data-dcnode-id="6169" instrument_node=""> was simply to compare the correlation between individual characteristics and political participation across countries. An important decision to make is related to which dimension of inequality should be the focus of investigation because many characteristics, including gender, race, income, social class, and education, can arguably produce inequalities in voter turnout. In this paper, I chose to focus on the impact of education on voter turnout. Education is a good predictor of social position, and it is empirically better than social class or income at predicting whether a person votes (</span><a class="workspace-trigger" data-dcnode-id="6167" href="#bib7" name="bbib7"><span data-dcnode-id="6168" instrument_node="">Blais, 2000</span></a><span data-dcnode-id="6166" instrument_node="">).</span></p><p data-dcnode-id="5863"><span data-dcnode-id="6164" instrument_node="">In order to assess the levels of unequal participation it is necessary to create a summary measure of inequality that can be estimated and compared across countries. Unequal turnout can be operationalized as the empirical relationship between education and voting. In countries where this relationship is strong, large inequalities can be observed in voter participation. On the contrary, in countries where no relationship exists, the probability of voting for people with different education levels is identical and thus creating no turnout inequality. We have </span><em data-dcnode-id="6162"><span data-dcnode-id="6163" instrument_node="">n</span></em><span data-dcnode-id="6161" instrument_node=""> individuals (</span><em data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">i</span></em><span data-dcnode-id="6158" instrument_node="">) nested within </span><em data-dcnode-id="6156"><span data-dcnode-id="6157" instrument_node="">m</span></em><span data-dcnode-id="6155" instrument_node=""> countries (</span><em data-dcnode-id="6153"><span data-dcnode-id="6154" instrument_node="">j</span></em><span data-dcnode-id="6152" instrument_node="">). The strength of the relationship between education measured in years</span><a class="workspace-trigger" data-dcnode-id="6149" href="#fn5" name="bfn5"><sup data-dcnode-id="6150"><span data-dcnode-id="6151" instrument_node="">5</span></sup></a><span data-dcnode-id="6148" instrument_node=""> and the vote is captured by each country's coefficient</span><span class="math" data-dcnode-id="6125"><span class="MathJax_Preview" data-dcnode-id="6147" style=""></span><span class="MathJax_SVG" data-dcnode-id="6128" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi><mn is=&quot;true&quot;>1</mn></msub></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="6137" focusable="false" height="2.463ex" role="img" style="vertical-align: -0.618ex;" viewBox="0 -794.4 1020.4 1060.6" width="2.37ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="6138" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="6139" is="true"><g data-dcnode-id="6140" is="true"><g data-dcnode-id="6144" is="true"><use data-dcnode-id="6145" href="#MJMATHI-3B2"><path d="M29 -194Q23 -188 23 -186Q23 -183 102 134T186 465Q208 533 243 584T309 658Q365 705 429 705H431Q493 705 533 667T573 570Q573 465 469 396L482 383Q533 332 533 252Q533 139 448 65T257 -10Q227 -10 203 -2T165 17T143 40T131 59T126 65L62 -188Q60 -194 42 -194H29ZM353 431Q392 431 427 419L432 422Q436 426 439 429T449 439T461 453T472 471T484 495T493 524T501 560Q503 569 503 593Q503 611 502 616Q487 667 426 667Q384 667 347 643T286 582T247 514T224 455Q219 439 186 308T152 168Q151 163 151 147Q151 99 173 68Q204 26 260 26Q302 26 349 51T425 137Q441 171 449 214T457 279Q457 337 4 a-dcnode-id="5963" id="MJMATHI-6A" stroke-width="1"></path></use></g></g></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="5870" role="presentation"><math data-dcnode-id="5871" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="5872" is="true"><mtext data-dcnode-id="5954" is="true"><span data-dcnode-id="5955" instrument_node="">Logit</span></mtext><mrow data-dcnode-id="5940" is="true"><mo data-dcnode-id="5952" is="true"><span data-dcnode-id="5953" instrument_node="">(</span></mo><msub data-dcnode-id="5943" is="true"><mrow data-dcnode-id="5949" is="true"><mtext data-dcnode-id="5950" is="true"><span data-dcnode-id="5951" instrument_node="">vote</span></mtext></mrow><mrow data-dcnode-id="5944" is="true"><mi data-dcnode-id="5947" is="true"><span data-dcnode-id="5948" instrument_node="">i</span></mi><mi data-dcnode-id="5945" is="true"><span data-dcnode-id="5946" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="5941" is="true"><span data-dcnode-id="5942" instrument_node="">)</span></mo></mrow><mo data-dcnode-id="5938" is="true"><span data-dcnode-id="5939" instrument_node="">=</span></mo><msub data-dcnode-id="5930" is="true"><mi data-dcnode-id="5936" is="true"><span data-dcnode-id="5937" instrument_node="">β</span></mi><mrow data-dcnode-id="5931" is="true"><mn data-dcnode-id="5934" is="true"><span data-dcnode-id="5935" instrument_node="">0</span></mn><mi data-dcnode-id="5932" is="true"><span data-dcnode-id="5933" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="5928" is="true"><span data-dcnode-id="5929" instrument_node="">+</span></mo><msub data-dcnode-id="5920" is="true"><mi data-dcnode-id="5926" is="true"><span data-dcnode-id="5927" instrument_node="">β</span></mi><mrow data-dcnode-id="5921" is="true"><mn data-dcnode-id="5924" is="true"><span data-dcnode-id="5925" instrument_node="">1</span></mn><mi data-dcnode-id="5922" is="true"><span data-dcnode-id="5923" instrument_node="">j</span></mi></mrow></msub><msub data-dcnode-id="5911" is="true"><mrow data-dcnode-id="5917" is="true"><mtext data-dcnode-id="5918" is="true"><span data-dcnode-id="5919" instrument_node="">education</span></mtext></mrow><mrow data-dcnode-id="5912" is="true"><mi data-dcnode-id="5915" is="true"><span data-dcnode-id="5916" instrument_node="">i</span></mi><mi data-dcnode-id="5913" is="true"><span data-dcnode-id="5914" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="5909" is="true"><span data-dcnode-id="5910" instrument_node="">+</span></mo><msub data-dcnode-id="5901" is="true"><mi data-dcnode-id="5907" is="true"><span data-dcnode-id="5908" instrument_node="">β</span></mi><mrow data-dcnode-id="5902" is="true"><mn data-dcnode-id="5905" is="true"><span data-dcnode-id="5906" instrument_node="">2</span></mn><mi data-dcnode-id="5903" is="true"><span data-dcnode-id="5904" instrument_node="">j</span></mi></mrow></msub><msub data-dcnode-id="5892" is="true"><mrow data-dcnode-id="5898" is="true"><mtext data-dcnode-id="5899" is="true"><span data-dcnode-id="5900" instrument_node="">age</span></mtext></mrow><mrow data-dcnode-id="5893" is="true"><mi data-dcnode-id="5896" is="true"><span data-dcnode-id="5897" instrument_node="">i</span></mi><mi data-dcnode-id="5894" is="true"><span data-dcnode-id="5895" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="5890" is="true"><span data-dcnode-id="5891" instrument_node="">+</span></mo><msub data-dcnode-id="5882" is="true"><mi data-dcnode-id="5888" is="true"><span data-dcnode-id="5889" instrument_node="">β</span></mi><mrow data-dcnode-id="5883" is="true"><mn data-dcnode-id="5886" is="true"><span data-dcnode-id="5887" instrument_node="">3</span></mn><mi data-dcnode-id="5884" is="true"><span data-dcnode-id="5885" instrument_node="">j</span></mi></mrow></msub><msub data-dcnode-id="5873" is="true"><mrow data-dcnode-id="5879" is="true"><mtext data-dcnode-id="5880" is="true"><span data-dcnode-id="5881" instrument_node="">agesquared</span></mtext></mrow><mrow data-dcnode-id="5874" is="true"><mi data-dcnode-id="5877" is="true"><span data-dcnode-id="5878" instrument_node="">i</span></mi><mi data-dcnode-id="5875" is="true"><span data-dcnode-id="5876" instrument_node="">j</span></mi></mrow></msub></mrow></math></span></span></span></span></span></p><div data-dcnode-id="5829"><p data-dcnode-id="5849"><span data-dcnode-id="5862" instrument_node="">Other controls are not added because if we are interested in the relationship between two elements, we will not control for intermediary mechanisms. Additionally, factors that are in part a consequence of the variable of interest should not be controlled (</span><a class="workspace-trigger" data-dcnode-id="5860" href="#bib41" name="bbib41"><span data-dcnode-id="5861" instrument_node="">King et&nbsp;al., 1994, 173–174</span></a><span data-dcnode-id="5859" instrument_node="">). Education positively impacts the vote through many intermediary variables; it enhances political interest, the income of the respondent, network centrality, political knowledge, etc. (</span><a class="workspace-trigger" data-dcnode-id="5857" href="#bib50" name="bbib50"><span data-dcnode-id="5858" instrument_node="">Nie et&nbsp;al., 1996</span></a><span data-dcnode-id="5856" instrument_node="">). The logit coefficient should not be interpreted as the net causal relationship between education and voter participation but as a summary measure of the empirical link. A logit removes the ceiling effects derived from the fact that voter turnout has an upper limit of 100%. Thus, this coefficient summarizes the relationship between education and voter participation while disregarding the age of the respondent and the mean level of turnout in a country (see </span><a class="workspace-trigger" data-dcnode-id="5854" href="#bib38" name="bbib38"><span data-dcnode-id="5855" instrument_node="">Jusko and Shively, 2005</span></a><span data-dcnode-id="5853" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5851" href="#fig1" name="bfig1"><span data-dcnode-id="5852" instrument_node="">Graph 1</span></a><span data-dcnode-id="5850" instrument_node=""> displays the logit coefficients of education resulting from running the described logistic regression plotted against the official turnout rates in each country.</span></p><figure class="figure text-xs" data-dcnode-id="5830" id="fig1"><span data-dcnode-id="5839"><img alt="" data-dcnode-id="5848" height="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379409001176-gr1.jpg&amp;raw"><span data-dcnode-id="5847" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5840"><li data-dcnode-id="5841"><a class="anchor download-link u-font-sans" data-dcnode-id="5842" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379409001176-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5843"><span data-dcnode-id="5846" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5844"><span data-dcnode-id="5845" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5831"><span data-dcnode-id="5832"><p data-dcnode-id="5833"><span class="label" data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">Graph 1</span></span><span data-dcnode-id="5836" instrument_node="">. </span><span data-dcnode-id="5834" instrument_node="">Logits of education on the vote by turnout rate.</span></p></span></span></figure></div><p data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">This approach shows that the relationship between education and voting is weakest in compulsory voting countries, such as Cyprus, Greece, Belgium, Luxembourg, and Australia, but it is also weak in countries like Spain and South Korea which do not have particularly high turnout rates. On the contrary, the largest effects of education on voting are found in Germany, the USA, the Netherlands, and the Czech Republic.</span></p></section><section data-dcnode-id="4480" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5820"><span data-dcnode-id="5825" instrument_node="">5</span><span data-dcnode-id="5823" instrument_node="">. </span><span data-dcnode-id="5821" instrument_node="">Explaining variation in turnout inequality across countries</span></h2><p data-dcnode-id="5818"><span data-dcnode-id="5819" instrument_node="">Turnout inequality is operationalized as the strength of the relationship between education and voting. Thus, factors that sharpen or reduce inequality are those that make the link between education and voting more or less intense. I test the predictions of the theories with a multilevel model that includes cross-level interactions between education and contextual characteristics that vary across countries. In that way the slopes of education are allowed to vary depending on the contextual characteristics of the country.</span></p><p data-dcnode-id="5732"><span data-dcnode-id="5817" instrument_node="">Standard regression models rely on the assumption of no serial correlation between the errors because the observations are sampled independently. This assumption is violated in the case of nested data; individuals, i.e., first level units, living in the same country, i.e., second-level units, are more similar to one another in their behavior than citizens from other countries. Multilevel modeling is used in order to avoid underestimating the standard errors and producing type I errors or false positives. In addition, in this research, distinguishing between the impact of contextual characteristics on the voter participation and on turnout inequality is necessary. Multilevel models are well suited for that purpose because they allow distinguishing between the im " is="true"><mtext data-dcnode-id="4948" is="true"><span data-dcnode-id="4949" instrument_node="">agesquared</span></mtext></mrow><mrow data-dcnode-id="4942" is="true"><mi data-dcnode-id="4945" is="true"><span data-dcnode-id="4946" instrument_node="">i</span></mi><mi data-dcnode-id="4943" is="true"><span data-dcnode-id="4944" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="4939" is="true"><span data-dcnode-id="4940" instrument_node="">+</span></mo><msub data-dcnode-id="4931" is="true"><mi data-dcnode-id="4937" is="true"><span data-dcnode-id="4938" instrument_node="">u</span></mi><mrow data-dcnode-id="4932" is="true"><mn data-dcnode-id="4935" is="true"><span data-dcnode-id="4936" instrument_node="">0</span></mn><mi data-dcnode-id="4933" is="true"><span data-dcnode-id="4934" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="4929" is="true"><span data-dcnode-id="4930" instrument_node="">+</span></mo><msub data-dcnode-id="4921" is="true"><mi data-dcnode-id="4927" is="true"><span data-dcnode-id="4928" instrument_node="">u</span></mi><mrow data-dcnode-id="4922" is="true"><mn data-dcnode-id="4925" is="true"><span data-dcnode-id="4926" instrument_node="">1</span></mn><mi data-dcnode-id="4923" is="true"><span data-dcnode-id="4924" instrument_node="">j</span></mi></mrow></msub><msub data-dcnode-id="4912" is="true"><mrow data-dcnode-id="4918" is="true"><mtext data-dcnode-id="4919" is="true"><span data-dcnode-id="4920" instrument_node="">edu</span></mtext></mrow><mrow data-dcnode-id="4913" is="true"><mi data-dcnode-id="4916" is="true"><span data-dcnode-id="4917" instrument_node="">i</span></mi><mi data-dcnode-id="4914" is="true"><span data-dcnode-id="4915" instrument_node="">j</span></mi></mrow></msub></mrow></math></span></span></span></span></span></p><p data-dcnode-id="4897"><span data-dcnode-id="4901" instrument_node="">This model allows us to distinguish between a) the effect of contextual characteristics on the overall or baseline probability to vote and b) the conditional effect of contextual characteristics on the probability to vote depending on education. This is particularly useful for testing the theories on the determinants of turnout inequality because most of the explanatory factors should have an effect both on turnout and on turnout inequality. For example, strong left-wing parties have been found to raise turnout rates (</span><a class="workspace-trigger" data-dcnode-id="4899" href="#bib29" name="bbib29"><span data-dcnode-id="4900" instrument_node="">Gray and Caul, 2000</span></a><span data-dcnode-id="4898" instrument_node="">), but we want to know if they disproportionately foster the participation of poorly educated citizens and reduce turnout inequality.</span></p><p data-dcnode-id="4522"><span data-dcnode-id="4896" instrument_node="">An initial analysis of the variance components confirms that a significant part of the variance of the intercepts and the education slopes can be attributed to the second level. However, there is not sufficient power to fit a random intercepts random slopes model, because even if the group sizes are large, the number of groups is very small (only 28 countries). Requirements for the size of datasets are often large in order to detect significant interactions; therefore, we would need a larger dataset to estimate a random coefficients model. Thus, the multilevel model is a random intercept, fixed slopes model</span><a class="workspace-trigger" data-dcnode-id="4893" href="#fn7" name="bfn7"><sup data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">7</span></sup></a><span data-dcnode-id="4892" instrument_node=""> with individual and contextual predictors of the vote and cross-level interactions between education and level 2 variables:</span><span class="display" data-dcnode-id="4523"><span class="formula" data-dcnode-id="4524"><span class="math" data-dcnode-id="4525"><span class="MathJax_Preview" data-dcnode-id="4891" style=""></span><span cla ent_node="">j</span></mi></msub><mo data-dcnode-id="4597" is="true"><span data-dcnode-id="4598" instrument_node="">+</span></mo><msub data-dcnode-id="4591" is="true"><mi data-dcnode-id="4595" is="true"><span data-dcnode-id="4596" instrument_node="">γ</span></mi><mrow data-dcnode-id="4592" is="true"><mn data-dcnode-id="4593" is="true"><span data-dcnode-id="4594" instrument_node="">11</span></mn></mrow></msub><msub data-dcnode-id="4585" is="true"><mrow data-dcnode-id="4588" is="true"><mtext data-dcnode-id="4589" is="true"><span data-dcnode-id="4590" instrument_node="">context</span></mtext></mrow><mi data-dcnode-id="4586" is="true"><span data-dcnode-id="4587" instrument_node="">j</span></mi></msub><mo data-dcnode-id="4583" is="true"><span data-dcnode-id="4584" instrument_node="">∗</span></mo><msub data-dcnode-id="4574" is="true"><mrow data-dcnode-id="4580" is="true"><mtext data-dcnode-id="4581" is="true"><span data-dcnode-id="4582" instrument_node="">edu</span></mtext></mrow><mrow data-dcnode-id="4575" is="true"><mi data-dcnode-id="4578" is="true"><span data-dcnode-id="4579" instrument_node="">i</span></mi><mi data-dcnode-id="4576" is="true"><span data-dcnode-id="4577" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="4572" is="true"><span data-dcnode-id="4573" instrument_node="">+</span></mo><msub data-dcnode-id="4567" is="true"><mi data-dcnode-id="4570" is="true"><span data-dcnode-id="4571" instrument_node="">β</span></mi><mn data-dcnode-id="4568" is="true"><span data-dcnode-id="4569" instrument_node="">2</span></mn></msub><msub data-dcnode-id="4558" is="true"><mrow data-dcnode-id="4564" is="true"><mtext data-dcnode-id="4565" is="true"><span data-dcnode-id="4566" instrument_node="">age</span></mtext></mrow><mrow data-dcnode-id="4559" is="true"><mi data-dcnode-id="4562" is="true"><span data-dcnode-id="4563" instrument_node="">i</span></mi><mi data-dcnode-id="4560" is="true"><span data-dcnode-id="4561" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="4556" is="true"><span data-dcnode-id="4557" instrument_node="">+</span></mo><msub data-dcnode-id="4551" is="true"><mi data-dcnode-id="4554" is="true"><span data-dcnode-id="4555" instrument_node="">β</span></mi><mn data-dcnode-id="4552" is="true"><span data-dcnode-id="4553" instrument_node="">3</span></mn></msub><msub data-dcnode-id="4542" is="true"><mrow data-dcnode-id="4548" is="true"><mtext data-dcnode-id="4549" is="true"><span data-dcnode-id="4550" instrument_node="">agesquared</span></mtext></mrow><mrow data-dcnode-id="4543" is="true"><mi data-dcnode-id="4546" is="true"><span data-dcnode-id="4547" instrument_node="">i</span></mi><mi data-dcnode-id="4544" is="true"><span data-dcnode-id="4545" instrument_node="">j</span></mi></mrow></msub><mo data-dcnode-id="4540" is="true"><span data-dcnode-id="4541" instrument_node="">+</span></mo><msub data-dcnode-id="4532" is="true"><mi data-dcnode-id="4538" is="true"><span data-dcnode-id="4539" instrument_node="">u</span></mi><mrow data-dcnode-id="4533" is="true"><mn data-dcnode-id="4536" is="true"><span data-dcnode-id="4537" instrument_node="">0</span></mn><mi data-dcnode-id="4534" is="true"><span data-dcnode-id="4535" instrument_node="">j</span></mi></mrow></msub></mrow></math></span></span></span></span></span></p><p data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">The contextual factors are measured as follows:</span></p><p data-dcnode-id="4512"><span data-dcnode-id="4519" instrument_node="">The strength of the left is operationalized as the share of the vote for left-wing parties and union density. The share of the vote for left-wing parties is the percentage of votes cast for social-democratic, socialist, and communist parties. The data is from </span><a class="workspace-trigger" data-dcnode-id="4517" href="#bib5" name="bbib5"><span data-dcnode-id="4518" instrument_node="">Armingeon et&nbsp;al. (2008)</span></a><span data-dcnode-id="4516" instrument_node=""> or self calculated. The strength of unions is measured as the percentage of union members in the sample as calculated from survey data.</span><a class="workspace-trigger" data-dcnode-id="4513" href="#fn8" name="bfn8"><sup data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">8</span></sup></a></p><p data-dcnode-id="4488"><span data-dcnode-id="4511" instrument_node="">The following three factors affect the difficulty of voting:</span></p><dl class="list" data-dcnode-id="4489"><dt class="list-label" data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="4506"><p data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">The type of ballot: Voting is more difficult in a preferential vote system as compared to a categorical system with closed lists or uninominal districts. The categorical vote system is used in Greece, South Korea, Spain, Portugal, Japan, New Zealand, Israel, France, Canada, the USA, and Germany.</span></p></dd><dt class="list-label" data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="4501"><p data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">The type of registration system: Registration is self-initiated and voluntary in the USA, and self-initiated and compulsory in France and New Zealand. All other countries were assigned a 0, while France and New Zealand were assigned a 0.5; the USA is coded as 1.</span></p></dd><dt class="list-label" data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="4490"><p data-dcnode-id="4491"><span data-dcnode-id="4498" instrument_node="">The effective number of electoral parties: This measures the number of political options available to the citizens, and it is calculated as proposed by </span><a class="workspace-trigger" data-dcnode-id="4496" href="#bib42" name="bbib42"><span data-dcnode-id="4497" instrument_node="">Laakso and Taagepera (1979)</span></a><span data-dcnode-id="4495" instrument_node="">.</span><a class="workspace-trigger" data-dcnode-id="4492" href="#fn9" name="bfn9"><sup data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">9</span></sup></a></p></dd></dl><p></p><p data-dcnode-id="4483"><span data-dcnode-id="4487" instrument_node="">Compulsory voting is coded as 1 where it is currently in force (i.e., Australia, Belgium, and Luxemburg). It is coded as 0.5 in the countries where it is not in force (i.e., Greece, Italy, and Cyprus) (see </span><a class="workspace-trigger" data-dcnode-id="4485" href="#bib28" name="bbib28"><span data-dcnode-id="4486" instrument_node="">Gratschew, 2004</span></a><span data-dcnode-id="4484" instrument_node="">).</span></p><p data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">The values of the continuous variables (i.e., the share of left-wing party vote, unionization, and number of electoral parties) were recoded so that the minimum value is 0, and the maximum is 1. In this way, all coefficients can be roughly compared.</span></p></section><section data-dcnode-id="4051" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4474"><span data-dcnode-id="4479" instrument_node="">6</span><span data-dcnode-id="4477" instrument_node="">. </span><span data-dcnode-id="4475" instrument_node="">Unequal voter turnout in advanced industrial democracies</span></h2><div data-dcnode-id="4164"><p data-dcnode-id="4462"><a class="workspace-trigger" data-dcnode-id="4472" href="#tbl1" name="btbl1"><span data-dcnode-id="4473" instrument_node="">Table 1</span></a><span data-dcnode-id="4471" instrument_node=""> reports the results of a random intercepts fixed slopes hierarchical model with individual characteristics, contextual factors, and cross-level interactions as predictors of voter turnout.</span><a class="workspace-trigger" data-dcnode-id="4468" href="#fn10" name="bfn10"><sup data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">10</span></sup></a><span data-dcnode-id="4467" instrument_node=""> Several exploratory analyses have been conducted while adding fewer variables to the model because of concerns about the stability of the&nbsp;results due to the small number of level 2 units. The direction of the coefficients and the standard errors were similar</span><a class="workspace-trigger" data-dcnode-id="4464" href="#fn11" name="bfn11"><sup data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">11</span></sup></a><span data-dcnode-id="4463" instrument_node="">; thus, only the results of the complete model are reported. In addition, the models were run while excluding compulsory voting countries; nevertheless, similar patterns emerged, and an approach to keep the number of level 2 units as large as possible was prioritized.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4165" id="tbl1"><span class="captions" data-dcnode-id="4454"><span data-dcnode-id="4455"><p data-dcnode-id="4456"><span class="label" data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">Table 1</span></span><span data-dcnode-id="4459" instrument_node="">. </span><span data-dcnode-id="4457" instrument_node="">Determinants of voter turnout and turnout inequality.</span></p></span></span><div class="groups" data-dcnode-id="4183"><table data-dcnode-id="4184"><thead data-dcnode-id="4445"><tr class="rowsep-1 valign-top" data-dcnode-id="4446"><th data-dcnode-id="4453" scope="col"></th><th data-dcnode-id="4451" scope="col"><span data-dcnode-id="4452" instrument_node="">Coef.</span></th><th data-dcnode-id="4449" scope="col"><span data-dcnode-id="4450" instrument_node="">Std. Error</span></th><th data-dcnode-id="4447" scope="col"><span data-dcnode-id="4448" instrument_node="">Sig.</span></th></tr></thead><tbody data-dcnode-id="4185"><tr class="valign-top" data-dcnode-id="4441"><td colspan="4" data-dcno n></td><td class="align-char" data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">0.018</span></td><td class="align-char" data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">0.027</span></td></tr><tr class="valign-top" data-dcnode-id="4299"><td data-dcnode-id="4306"><span data-dcnode-id="4315" instrument_node="">Unionization</span><span data-dcnode-id="4313" instrument_node="">&nbsp;</span><span data-dcnode-id="4311" instrument_node="">*</span><span data-dcnode-id="4309" instrument_node="">&nbsp;</span><span data-dcnode-id="4307" instrument_node="">education</span></td><td data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">−0.009</span></td><td class="align-char" data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">0.021</span></td><td class="align-char" data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">0.653</span></td></tr><tr class="valign-top" data-dcnode-id="4282"><td data-dcnode-id="4289"><span data-dcnode-id="4298" instrument_node="">Preferential ballot</span><span data-dcnode-id="4296" instrument_node="">&nbsp;</span><span data-dcnode-id="4294" instrument_node="">*</span><span data-dcnode-id="4292" instrument_node="">&nbsp;</span><span data-dcnode-id="4290" instrument_node="">education</span></td><td data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">0.036</span></td><td class="align-char" data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">0.010</span></td><td class="align-char" data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">0.001</span></td></tr><tr class="valign-top" data-dcnode-id="4265"><td data-dcnode-id="4272"><span data-dcnode-id="4281" instrument_node="">Registration</span><span data-dcnode-id="4279" instrument_node="">&nbsp;</span><span data-dcnode-id="4277" instrument_node="">*</span><span data-dcnode-id="4275" instrument_node="">&nbsp;</span><span data-dcnode-id="4273" instrument_node="">education</span></td><td data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">0.068</span></td><td class="align-char" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">0.022</span></td><td class="align-char" data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">0.002</span></td></tr><tr class="valign-top" data-dcnode-id="4262"><td colspan="4" data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">Eff. number electoral</span></td></tr><tr class="valign-top" data-dcnode-id="4245"><td data-dcnode-id="4252"><span data-dcnode-id="4261" instrument_node="">Parties</span><span data-dcnode-id="4259" instrument_node="">&nbsp;</span><span data-dcnode-id="4257" instrument_node="">*</span><span data-dcnode-id="4255" instrument_node="">&nbsp;</span><span data-dcnode-id="4253" instrument_node="">education</span></td><td data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">0.037</span></td><td class="align-char" data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">0.019</span></td><td class="align-char" data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">0.058</span></td></tr><tr class="valign-top" data-dcnode-id="4228"><td data-dcnode-id="4235"><span data-dcnode-id="4244" instrument_node="">Compulsory voting</span><span data-dcnode-id="4242" instrument_node="">&nbsp;</span><span data-dcnode-id="4240" instrument_node="">*</span><span data-dcnode-id="4238" instrument_node="">&nbsp;</span><span data-dcnode-id="4236" instrument_node="">education</span></td><td data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">−0.033</span></td><td class="align-char" data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">0.020</span></td><td class="align-char" data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">0.105</span></td></tr><tr class="valign-top" data-dcnode-id="4225"><td colspan="4" data-dcnode-id="4226"><br data-dcnode-id="4227"></td></tr><tr class="valign-top" data-dcnode-id="4221"><td colspan="4" data-dcnode-id="4222"><em data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">Random effects</span></em></td></tr><tr class="valign-top" data-dcnode-id="4213"><td data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Standard deviation intercept</span></td><td data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">0.352</span></td><td class="align-char" data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">0.051</span></td><td data-dcnode-id="4214"></td></tr><tr class="valign-top" data-dcnode-id="4210"><td colspan="4" data-dcnode-id="4211"><br data-dcnode-id="4212"></td></tr><tr class="valign-top" data-dcnode-id="4200"><td data-dcnode-id="4205"><span data-dcnode-id="4209" instrument_node="">Log likelihood</span><a class="workspace-trigger" data-dcnode-id="4206" href="#tblfn1" name="btblfn1"><sup data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">a</span></sup></a></td><td data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">−18,970</span></td><td data-dcnode-id="4202"></td><td data-dcnode-id="4201"></td></tr><tr class="valign-top" data-dcnode-id="4193"><td data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">N first level</span></td><td data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">28</span></td><td data-dcnode-id="4195"></td><td data-dcnode-id="4194"></td></tr><tr class="valign-top" data-dcnode-id="4186"><td data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">N second level</span></td><td data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">52,371</span></td><td data-dcnode-id="4188"></td><td data-dcnode-id="4187"></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="4166"><dt data-dcnode-id="4181" id="tblfn1"><span data-dcnode-id="4182" instrument_node="">a</span></dt><dd data-dcnode-id="4167"><p data-dcnode-id="4168"><span data-dcnode-id="4180" instrument_node="">Log likelihood baseline model: −20,381; Prob</span><span data-dcnode-id="4178" instrument_node="">&nbsp;</span><span data-dcnode-id="4176" instrument_node="">&gt;</span><span data-dcnode-id="4174" instrument_node="">&nbsp;</span><span data-dcnode-id="4172" instrument_node="">chi</span><sup data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">2</span></sup><span data-dcnode-id="4169" instrument_node="">: 0.000.</span></p></dd></dl></div></div><p data-dcnode-id="4147"><span data-dcnode-id="4163" instrument_node="">A large share of the vote for left-wing parties is associated with a larger impact of education on voter participation rather than the smaller effect that was hypothesized. Thus, the strong presence of this kind of party is seemingly not an equalizing agent. In addition, the share of union members in the population is not associated with the impact of education on voter participation. Strong trade unions do not foster equality in electoral participation. This result is puzzling because the existence of strong trade unions has often been considered a very relevant factor in the electoral mobilization of the poor. One possible explanation for this result is that while trade unions might have been equalizing institutions in the past, they no longer perform this role. These organizations have been losing affiliates over the last few decades in many advanced industrial societies (</span><a class="workspace-trigger" data-dcnode-id="4161" href="#bib19" name="bbib19"><span data-dcnode-id="4162" instrument_node="">Ebbinghaus and Visser, 2000</span></a><span data-dcnode-id="4160" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4158" href="#bib62" name="bbib62"><span data-dcnode-id="4159" instrument_node="">Scruggs and Lange, 2002</span></a><span data-dcnode-id="4157" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4155" href="#bib71" name="bbib71"><span data-dcnode-id="4156" instrument_node="">Visser, 2006</span></a><span data-dcnode-id="4154" instrument_node="">). The profile of unionized people has also changed dramatically; for example, white-collar workers currently outnumber blue-collar workers as members in unions (</span><a class="workspace-trigger" data-dcnode-id="4152" href="#bib43" name="bbib43"><span data-dcnode-id="4153" instrument_node="">Leighley and Nagler, 2007</span></a><span data-dcnode-id="4151" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4149" href="#bib53" name="bbib53"><span data-dcnode-id="4150" instrument_node="">Norris, 2002</span></a><span data-dcnode-id="4148" instrument_node="">).</span></p><p data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">In preferential voting systems, the impact of education on voter participation is larger than in voting systems with categorical ballots. The same holds true in the case of the registration system. Where registration is voluntary and citizen-initiated, the impact of education on voter participation is larger. However, this result is highly dominated by the American case. The effective number of electoral parties is also linked to turnout inequality as expected: as the number of parties increases, the logit of education also increases. Compulsory voting is of course a strong predictor of voter participation, but it affects the propensity to vote of highly and poorly educated citizens equally. The impact of compulsory voting on turnout inequality is only indirect: inequalities virtually disappear at quasi-universal turnout rates.</span></p><div data-dcnode-id="4054"><p data-dcnode-id="4131"><span data-dcnode-id="4144" instrument_node="">The results of a multilevel logistic regression are not directly interpretable in substantive terms; thus, the results must be transformed into predicted probabilities in order to clarify the magnitude of the impact. </span><a class="workspace-trigger" data-dcnode-id="4142" href="#fig2" name="bfig2"><span data-dcnode-id="4143" instrument_node="">Graph 2</span></a><span data-dcnode-id="4141" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4139" href="#fig3" name="bfig3"><span data-dcnode-id="4140" instrument_node="">Graph 3</span></a><span data-dcnode-id="4138" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4136" href="#fig4" name="bfig4"><span data-dcnode-id="4137" instrument_node="">Graph 4</span></a><span data-dcnode-id="4135" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4133" href="#fig5" name="bfig5"><span data-dcnode-id="4134" instrument_node="">Graph 5</span></a><span data-dcnode-id="4132" instrument_node=""> present the predicted probabilities of voting plotted against the level of education in different contexts. The lines display these probabilities for different values of the contextual variables. With exception of the compulsory voting figure, all other graphs report the predicted probability to vote under voluntary voting systems. The values of the contextual variables are straightforward in the case of the type of ballot, registration, and compulsory voting. The lines represent the predicted probability of voting by education status with open or closed ballots, compulsory or voluntary voting systems, or different registration systems. For the effective number of electoral parties, the lines display the predicted probability of voting when the number of parties is set at the averaged upper and lower quartiles.</span></p><figure class="figure text-xs" data-dcnode-id="4112" id="fig2"><span data-dcnode-id="4121"><img alt="" data-dcnode-id="4130" height="237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379409001176-gr2.jpg&amp;raw"><span data-dcnode-id="4129" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4122"><li data-dcnode-id="4123"><a class="anchor download-link u-
