"><span data-dcnode-id="4101" instrument_node="">Graph 3</span></span><span data-dcnode-id="4099" instrument_node="">. </span><span data-dcnode-id="4097" instrument_node="">Voting by education and registration.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4074" id="fig4"><span data-dcnode-id="4083"><img alt="" data-dcnode-id="4092" height="216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379409001176-gr4.jpg&amp;raw"><span data-dcnode-id="4091" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4084"><li data-dcnode-id="4085"><a class="anchor download-link u-font-sans" data-dcnode-id="4086" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379409001176-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4087"><span data-dcnode-id="4090" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4075"><span data-dcnode-id="4076"><p data-dcnode-id="4077"><span class="label" data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">Graph 4</span></span><span data-dcnode-id="4080" instrument_node="">. </span><span data-dcnode-id="4078" instrument_node="">Voting by education and effect. no. elect. parties.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4055" id="fig5"><span data-dcnode-id="4064"><img alt="" data-dcnode-id="4073" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379409001176-gr5.jpg&amp;raw"><span data-dcnode-id="4072" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4065"><li data-dcnode-id="4066"><a class="anchor download-link u-font-sans" data-dcnode-id="4067" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379409001176-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4068"><span data-dcnode-id="4071" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4056"><span data-dcnode-id="4057"><p data-dcnode-id="4058"><span class="label" data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">Graph 5</span></span><span data-dcnode-id="4061" instrument_node="">. </span><span data-dcnode-id="4059" instrument_node="">Voting by education and voting system.</span></p></span></span></figure></div><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">The graphs clearly illustrate interaction effects between contextual variables and the gradient of the link between education and voter participation. The scale of the voting probability has been set to range between 0.5 and 1. The differences are sizable and as expected. In voluntary voting countries, the relationship between education and the probability to vote is less pronounced when registration is state initiated, when closed ballots are used, and when the number of effective parties is small. Compulsory voting is a special case. When voting is compulsory, turnout rates are high, thereby rendering inequality in voter turnout impossible.</span></p></section><section data-dcnode-id="4028" id="sec7"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4045"><span data-dcnode-id="4050" instrument_node="">7</span><span data-dcnode-id="4048" instrument_node="">. </span><span data-dcnode-id="4046" instrument_node="">Conclusions and discussion</span></h2><p data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">This paper has examined the levels of unequal turnout across advanced industrial democracies and the factors that account for variation in unequal turnout. Empirically, the paper has focused on the impact of education on the vote as a proxy for the theoretical concept of unequal turnout. Variation does indeed exist in the relationship between education and voter participation; in some countries, such as the USA, the Czech Republic, and Germany, this relationship is particularly large, thereby leading to large gaps in the turnout rates of the highly educated group as compared to the poorly educated group of the population. On the contrary, people from different social groups vote at very similar rates in other countries. This difference in the levels of inequality in voter turnout is relevant because it implies that the normatively important phenomenon of unequal participation is not a pervasive and natural feature of democratic political systems; rather, it is context dependent and contingent on other factors. Once this variation is acknowledged, we can better understand why turnout is unequal in some contexts but not in others.</span></p><p data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">Neither the existence of strong left-wing parties nor of trade unions seems to disproportionately foster the electoral mobilization of the poor. The results suggest that parallel to these changes in the composition of trade union membership, the ability of these associations to mobilize working-class people electorally has eroded. Left-wing parties and trade unions are not the equality-enhancing organizations as depicted by the literature and the idea that they focus their mobilization efforts on the economically disadvantaged should be re-examined instead of taken for granted.</span></p><p data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">Compulsory voting has a very strong positive effect on turnout rates. This institution does not disproportionately foster the participation of the socially disadvantaged, but its strong impact makes turnout rates approach 100 percent of citizen participation. Logically, when almost everyone votes, little room is allowed for inequalities to emerge; thus, raising overall turnout rates is an effective way of reducing inequalities in voter participation.</span></p><p data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">The most novel finding of this article is that voter turnout is more equal where voting is easy. This new theory of unequal turnout has been advanced and tested, and the results show that education is less related to the probability to vote where the ballots are simple, where registration is state initiated, and where the number of electoral parties is small. Unequal turnout is thus partly determined by institutions and the electoral context and in particular, it seems to be affected by the cognitive abilities required in the act of voting.</span></p><p data-dcnode-id="4029"><span data-dcnode-id="4036" instrument_node="">Importantly, this finding suggests that gaps in the turnout rates of different groups can be reduced by making the electoral procedure very easy or by introducing compulsory voting. Some political scientists, such as </span><a class="workspace-trigger" data-dcnode-id="4034" href="#bib44" name="bbib44"><span data-dcnode-id="4035" instrument_node="">Lijphart (1997)</span></a><span data-dcnode-id="4033" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="4031" href="#bib72" name="bbib72"><span data-dcnode-id="4032" instrument_node="">Wattenberg (2006)</span></a><span data-dcnode-id="4030" instrument_node="">, have argued that the most promising option to solve the turnout inequality problem is to implement compulsory voting. Obviously, compulsory voting is the most effective means of approaching near-universal rates in voter turnout, thereby eliminating turnout inequality. However, proposals to introduce this measure will likely encounter resistance and will be highly unpopular in most advanced industrial democracies. This work hints at an alternative direction for proposals of electoral reform; i.e., some minor interventions that reduce the difficulty of voting, such as the introduction of closed ballots, could potentially reduce turnout biases. Minor changes are less unpopular and can possibly contribute to the goal of reducing turnout inequality.</span></p></section></div><section data-dcnode-id="4022" id="aep-acknowledgment-id14"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">I thank Eva Anduiza, André Blais, Karen Jusko, Miki Kittilson, Araceli Mateos, and Gábor Tóka for their comments on earlier versions of this paper. The comments of the anonymous reviewers were particularly useful to improve the arguments and the presentation of the results.</span></p></section><div class="Appendices" data-dcnode-id="3752"><section data-dcnode-id="3753" id="appseca1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4018"><span data-dcnode-id="4021" instrument_node="">Appendix</span><span data-dcnode-id="4019" instrument_node="">. </span></h2><p data-dcnode-id="3754"><span data-dcnode-id="4017" instrument_node="">Survey data used</span><span class="display" data-dcnode-id="3755"></span></p><div class="tables frame-topbot" data-dcnode-id="3756" id="aep-table-id15"><div class="groups" data-dcnode-id="3760"><table data-dcnode-id="3761"><thead data-dcnode-id="4001"><tr class="rowsep-1 valign-top" data-dcnode-id="4002"><th data-dcnode-id="4016" scope="col"></th><th data-dcnode-id="4014" scope="col"><span data-dcnode-id="4015" instrument_node="">Survey</span></th><th data-dcnode-id="4012" scope="col"><span data     }"><span data-dcnode-id="504" instrument_node=""></span></els-view-pdf-element></div><span data-dcnode-id="500" instrument_node=""></span><a class="link" data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scopus.com/inward/record.url%3Feid%3D2-s2.0-0142200290%26partnerID%3D10%26rel%3DR3.0.0" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="499" instrument_node="">View Record in Scopus</span></a><a class="link" data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DIn%2520search%2520of%2520Lincolns%2520perfect%2520list%3A%2520targeting%2520in%2520grassroots%2520campaigns" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="497" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="491"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="492" href="#bbib75" id="ref-id-bib75"><span data-dcnode-id="493" instrument_node="">Wolfinger and Rosenstone, 1980</span></a></dt><dd class="reference" data-dcnode-id="457"><div class="contribution" data-dcnode-id="474"><span data-dcnode-id="490" instrument_node="">R.E.</span><span data-dcnode-id="488" instrument_node=""> </span><span data-dcnode-id="486" instrument_node="">Wolfinger</span><span data-dcnode-id="484" instrument_node="">, </span><span data-dcnode-id="482" instrument_node="">S.J.</span><span data-dcnode-id="480" instrument_node=""> </span><span data-dcnode-id="478" instrument_node="">Rosenstone</span><div data-dcnode-id="475"><strong class="title" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Who Votes?</span></strong></div></div><div class="host" data-dcnode-id="462"><span data-dcnode-id="473" instrument_node="">Yale University Press</span><span data-dcnode-id="471" instrument_node="">, </span><span data-dcnode-id="469" instrument_node="">New Haven</span><span data-dcnode-id="467" instrument_node=""> (</span><span data-dcnode-id="465" instrument_node="">1980</span><span data-dcnode-id="463" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="458"><span data-dcnode-id="461" instrument_node=""></span><a class="link" data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DWho%2520Votes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="460" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="367" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="368"><div class="PageDivider" data-dcnode-id="453"></div><header data-dcnode-id="450" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Cited by (117)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="369"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="370"><ul data-dcnode-id="376"><li class="ListArticleItem" data-dcnode-id="432"><div class="sub-heading" data-dcnode-id="444"><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0743016720300814" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="448" id="citing-articles-article0-title"><span data-dcnode-id="449" instrument_node="">Becoming citizens: Policy feedback and the transformation of the Thai rice farmer</span></h3></a><div class="article-source ellipsis" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">2021, Journal of Rural Studies</span></div></div><div class="buttons" data-dcnode-id="438"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="439" type="button"><span class="button-link-text" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="440" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="441"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="433"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="434" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="435"><p data-dcnode-id="436" id="abspara0010"><span data-dcnode-id="437" instrument_node="">Over the past twenty years, Thailand's rice farmers have become one of the country's most important and active political constituencies, a sharp contrast from the previous decades wherein they were treated with neglect or even derision by the Thai political elite. These “political peasants” now actively advocate for and successfully receive extensive subsidies from both authoritarian and democratic governments. What has driven this change? In this essay, we draw on theories of the policy feedback loop wherein policies yield both material and cognitive benefits, which change the political behavior of populations. We argue that the Thaksin Shinawatra government's (2001–2006) paddy pledging policy altered the mindset of Thai rice farmers, creating a new form of social contract between the rural poor and the state. We demonstrate this by tracing the process through which farmers' political behavior changed, drawing on a variety of evidence, including electoral data, secondary sources, an original survey, focus groups, and interviews with Thai farmers. The paper provides additional understanding regarding the mechanisms through which Thai politics has changed since 2001. On a broader scale, these findings suggest the potential of public policy to create enduring political communities among rural populations.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="421"><div class="sub-heading" data-dcnode-id="426"><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S0003055421000551" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="430" id="citing-articles-article1-title"><span data-dcnode-id="431" instrument_node="">Acute Financial Hardship and Voter Turnout: Theory and Evidence from the Sequence of Bank Working Days</span></h3></a><div class="article-source ellipsis" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">2021, American Political Science Review</span></div></div><div class="buttons" data-dcnode-id="425"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="422"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="423" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="424"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="410"><div class="sub-heading" data-dcnode-id="415"><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0192512120922902" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="419" id="citing-articles-article2-title"><span data-dcnode-id="420" instrument_node="">The politics of voter presence</span></h3></a><div class="article-source ellipsis" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">2022, International Political Science Review</span></div></div><div class="buttons" data-dcnode-id="414"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="411"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="412" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="413"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="399"><div class="sub-heading" data-dcnode-id="404"><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/1475-6765.12440" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="408" id="citing-articles-article3-title"><span data-dcnode-id="409" instrument_node="">Why are the affluent better represented around the world?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">2022, European Journal of Political Research</span></div></div><div class="buttons" data-dcnode-id="403"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="400"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="401" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="402"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="388"><div class="sub-heading" data-dcnode-id="393"><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/23754931.2021.1958251" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="397" id="citing-articles-article4-title"><span data-dcnode-id="398" instrument_node="">Voter Turnout in Portugal: A Geographical Perspective</span></h3></a><div class="article-source ellipsis" data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">2022, Papers in Applied Geography</span></div></div><div class="buttons" data-dcnode-id="392"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="389"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="390" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="391"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="377"><div class="sub-heading" data-dcnode-id="382"><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0738894220966577" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="386" id="citing-articles-article5-title"><span data-dcnode-id="387" instrument_node="">The gender gap in voting in post-conflict elections: Evidence from Israel, Mali and Côte d’Ivoire</span></h3></a><div class="article-source ellipsis" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">2022, Conflict Management and Peace Science</span></div></div><div class="buttons" data-dcnode-id="381"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="378"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="379" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="380"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-77951623297%26md5%3D1bc3243b3e2a53b76f88768851df234" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="374" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="375"></path></svg><span class="button-alternative-text" data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="242"><dl class="footnote" data-dcnode-id="356"><dt class="footnote-label" data-dcnode-id="363"><sup data-dcnode-id="364"><a data-dcnode-id="365" href="#bfn1"><span data-dcnode-id="366" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="357"><p data-dcnode-id="358"><span data-dcnode-id="362" instrument_node="">Theoretically, the relationship between voter turnout and share of the left-wing vote could be endogenous. However, </span><a class="workspace-trigger" data-dcnode-id="360" href="#bib20" name="bbib20"><span data-dcnode-id="361" instrument_node="">Fisher (2007)</span></a><span data-dcnode-id="359" instrument_node=""> has found that, while there is a correlation between these two factors, changes in turnout do not produce changes in the share of vote for left-wing parties, with very few exceptions.</span></p></dd></dl><dl class="footnote" data-dcnode-id="345"><dt class="footnote-label" data-dcnode-id="352"><sup data-dcnode-id="353"><a data-dcnode-id="354" href="#bfn2"><span data-dcnode-id="355" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="346"><p data-dcnode-id="347"><span data-dcnode-id="351" instrument_node="">Otherwise, we would need to include controls for such relevant characteristics as the level of economic development or the degree of democratization. Further, </span><a class="workspace-trigger" data-dcnode-id="349" href="#bib52" name="bbib52"><span data-dcnode-id="350" instrument_node="">Norris (2004)</span></a><span data-dcnode-id="348" instrument_node=""> has shown that many contextual level factors operate differently in developed versus developing countries.</span></p></dd></dl><dl class="footnote" data-dcnode-id="331"><dt class="footnote-label" data-dcnode-id="341"><sup data-dcnode-id="342"><a data-dcnode-id="343" href="#bfn3"><span data-dcnode-id="344" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="332"><p data-dcnode-id="333"><span data-dcnode-id="340" instrument_node="">Data from Freedom House </span><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freedomhouse.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="339" instrument_node="">http://www.freedomhouse.org</span></a><span data-dcnode-id="337" instrument_node=""> and the World Economic Outlook Database of the International Monetary Fund in </span><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imf.org/external/ns/cs.aspx%253Fid%253D28" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="336" instrument_node="">http://www.imf.org/external/ns/cs.aspx?id=28</span></a><span data-dcnode-id="334" instrument_node="">. Both were visited on September 2007.</span></p></dd></dl><dl class="footnote" data-dcnode-id="317"><dt class="footnote-label" data-dcnode-id="327"><sup data-dcnode-id="328"><a data-dcnode-id="329" href="#bfn4"><span data-dcnode-id="330" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="318"><p data-dcnode-id="319"><span data-dcnode-id="326" instrument_node="">The CSES documentation and data is accessible at </span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cses.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="325" instrument_node="">http://www.cses.org</span></a><span data-dcnode-id="323" instrument_node="">. The ESS is archived and distributed by the Norwegian Social Science Data Services (see </span><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ess.nsd.uib.no/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="322" instrument_node="">http://ess.nsd.uib.no</span></a><span data-dcnode-id="320" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="309"><dt class="footnote-label" data-dcnode-id="313"><sup data-dcnode-id="314"><a data-dcnode-id="315" href="#bfn5"><span data-dcnode-id="316" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="310"><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Education measured in years is frequently used in comparative studies, even if this measure is not exempt from problems. Since the ESS and the CSES ask about education in different ways, there are problems in applying other measures of education. The only option would be the collapse the education variable in three categories (No qualification or only primary completed, upper secondary completed or tertiary completed) which would represent a loss of information compared to the current operationalization.</span></p></dd></dl><dl class="footnote" data-dcnode-id="301"><dt class="footnote-label" data-dcnode-id="305"><sup data-dcnode-id="306"><a data-dcnode-id="307" href="#bfn6"><span data-dcnode-id="308" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="302"><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Note that no first level random effect is included because the dependent variable (i.e., voting) is binary, and thus the variance of the level 1 errors is fixed in order to identify the rest of the parameters.</span></p></dd></dl><dl class="footnote" data-dcnode-id="290"><dt class="footnote-label" data-dcnode-id="297"><sup data-dcnode-id="298"><a data-dcnode-id="299" href="#bfn7"><span data-dcnode-id="300" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="291"><p data-dcnode-id="292"><span data-dcnode-id="296" instrument_node="">Theoretically, it would be better to include a random term, but an N at the second level of 28 cases is too low to do that. Allowing the slope of education to vary depending on the presence of contextual variables allows testing for conditional impacts of education on the vote. This is what conventional interaction models do (</span><a class="workspace-trigger" data-dcnode-id="294" href="#bib39" name="bbib39"><span data-dcnode-id="295" instrument_node="">Kam and Franzese, 2007</span></a><span data-dcnode-id="293" instrument_node="">), and it is enough to assess if the conditional relationships predicted by the theory exist. Analyses with random slopes reveal that even if the coefficients often fail to reach statistically significant levels, the direction of the coefficients is very stable.</span></p></dd></dl><dl class="footnote" data-dcnode-id="273"><dt class="footnote-label" data-dcnode-id="286"><sup data-dcnode-id="287"><a data-dcnode-id="288" href="#bfn8"><span data-dcnode-id="289" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="274"><p data-dcnode-id="275"><span data-dcnode-id="285" instrument_node="">Union density is an alternative way to operationalize the power of trade unions and is calculated as the percentage of wage and salary earners that are members within the employment pool. The data was collected from </span><a class="workspace-trigger" data-dcnode-id="283" href="#bib16" name="bbib16"><span data-dcnode-id="284" instrument_node="">Cohen et&nbsp;al., 2003</span></a><span data-dcnode-id="282" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="280" href="#bib71" name="bbib71"><span data-dcnode-id="281" instrument_node="">Visser, 2006</span></a><span data-dcnode-id="279" instrument_node="">; and </span><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eurofound.europa.eu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="278" instrument_node="">http://eurofound.europa.eu</span></a><span data-dcnode-id="276" instrument_node="">. The two methods result in very different estimates of trade union strength. However, the results of the analysis led to the same conclusion; i.e., unionization is related to the probability to vote but no significant interaction is observed between union strength and the impact of education on voter participation.</span></p></dd></dl><dl class="footnote" data-dcnode-id="262"><dt class="footnote-label" data-dcnode-id="269"><sup data-dcnode-id="270"><a data-dcnode-id="271" href="#bfn9"><span data-dcnode-id="272" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="263"><p data-dcnode-id="264"><span data-dcnode-id="268" instrument_node="">The data is from </span><a class="workspace-trigger" data-dcnode-id="266" href="#bib24" name="bbib24"><span data-dcnode-id="267" instrument_node="">Gallagher and Mitchell (2005)</span></a><span data-dcnode-id="265" instrument_node=""> or self calculated. Belgium is an outlier with 8.84 effective parties. In order to reflect the fact that this country has two party systems (Walloon and Flanders), this number is divided by 2. For France, a method to calculate the effective number of parties in Presidential elections is unclear. In the first round, the number of electoral parties in the 2002 election was 8.4. Moreover, 3 elections (i.e., one parliamentarian and the two rounds of the presidential elections) were held in a three-month time span, each with a different number of electoral parties occurring. The value of this variable is set to the mean in the French case.</span></p></dd></dl><dl class="footnote" data-dcnode-id="251"><dt class="footnote-label" data-dcnode-id="258"><sup data-dcnode-id="259"><a data-dcnode-id="260" href="#bfn10"><span data-dcnode-id="261" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="252"><p data-dcnode-id="253"><span data-dcnode-id="257" instrument_node="">It is well-known that voter participation is overreported in surveys due to several reasons. This fact biases descriptive inference and can bias causal inference if there is a systematic relationship between overreporting and independent variables of interest (</span><a class="workspace-trigger" data-dcnode-id="255" href="#bib76" name="bbib76"><span data-dcnode-id="256" instrument_node="">Bernstein, Chadha, and Montjoy, 2001</span></a><span data-dcnode-id="254" instrument_node="">). In the present research there are no reasons to suspect that the well educated overreport more frequently in countries with weak left-wing parties and trade unions, open ballots, burdensome registration or a large number of parties. One frequent correction is to weight for actual turnout rates. However, the focus of interest in this paper is the conditional impact of education on voting rather than voting per se. In the absence of information about the relationship between education and overreporting in each of the countries, effective corrections are not doable. Thus this kind of weighting is not applied.</span></p></dd></dl><dl class="footnote" data-dcnode-id="243"><dt class="footnote-label" data-dcnode-id="247"><sup data-dcnode-id="248"><a data-dcnode-id="249" href="#bfn11"><span data-dcnode-id="250" instrument_node="">11</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="244"><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">The main differences are that the interaction between left-wing party share of the vote and education is not significant when excluding the difficulty of voting variables, and the interaction between registration and education is not significant when excluding the other variables.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0261379409001176"><span class="anchor-text" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="236"><span class="copyright-line" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Copyright © 2009 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><aside aria-label="Related content" class="RelatedContent"
